name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.artifact-name.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: node node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Verify
        run: npm run verify

      - name: Verify site build identity
        run: npm run site:verify

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Name branch build artifact
        id: artifact-name
        shell: bash
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "name=github-pages-${safe_ref}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: dist

  windows-visual-gate:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: node node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Verify reviewed Windows visual baseline
        env:
          MOONWEAVE_VISUAL_BASELINE: "1"
        run: npm run test:ontology-ui

  deploy:
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - windows-visual-gate
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: ${{ needs.build.outputs.artifact_name }}

  verify-deployment:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy
    env:
      DEPLOYMENT_URL: ${{ needs.deploy.outputs.page_url }}
      EXPECTED_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: node node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Verify deployment manifest
        run: npm run site:verify-deployment

      - name: Verify runtime build identity
        run: node node_modules/@playwright/test/cli.js test e2e/deployment-fingerprint.spec.ts --project=chromium
