name: Ontology validation

on:
  pull_request:
  push:
    branches:
      - main
      - "chore/**"
      - "feat/**"

permissions:
  contents: read

jobs:
  yaml-source-validation:
    name: ${{ matrix.os }} YAML ontology and generated-artifact validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 24
          - os: windows-latest
            node-version: 22
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build ontology from YAML source
        run: npm run ontology:build

      - name: Verify deterministic module-owned community projection
        run: npm run ontology:communities:check

      - name: Verify dependency policy
        run: npm run dependency:policy

      - name: Validate ontology contracts
        run: npm run ontology:validate

      - name: Install Playwright Chromium
        if: runner.os == 'Windows'
        run: node node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Windows visual and interaction regression
        if: runner.os == 'Windows'
        env:
          MOONWEAVE_VISUAL_BASELINE: "1"
        run: npm run test:ontology-ui

      - name: Upload Windows Playwright report on failure
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ontology-playwright-report-windows
          path: playwright-report
          if-no-files-found: ignore

      - name: Reject validation side effects
        run: npm run worktree:check-clean

  quality-gates:
    name: Coverage, types, build, and explorer E2E
    needs: yaml-source-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit all known dependency vulnerabilities
        run: npm run dependency:audit

      - name: Unit and integration coverage (80% minimum)
        run: npm run test:coverage

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: node node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Complete browser contract suite
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ontology-playwright-report
          path: playwright-report
          if-no-files-found: ignore
