id: node.lifecycle
artifact: NodeClass
label: Lifecycle
label_zh: 生命周期
intra_level: 3
intra_group: governance-metadata
intra_group_zh: 治理元数据
intra_axis: governance-provenance
intra_axis_zh: 证据溯源 / 治理元数据
intra_role: state
parent_node: node.version
layer: meta
description: >
  Abstract lifecycle marker node representing active, deprecated, or removed
  status applied to any ontology artifact. Distinct from StateMachine which
  governs operational runtime states.
attributes:
  status:
    type: enum
    required: true
    values: [active, deprecated, removed]
    description: Current lifecycle status
  deprecated_since:
    type: string
    required: false
    description: Version when artifact was deprecated
  removal_target:
    type: string
    required: false
    description: Planned version for removal
  superseded_by:
    type: string
    required: false
    description: Replacement node or edge id if deprecated
state_machine:
  ref: state.lifecycle
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
