id: node.source_claim
artifact: NodeClass
label: SourceClaim
label_zh: 来源主张
intra_level: 4
intra_group: provenance
intra_group_zh: 证据溯源
intra_axis: governance-provenance
intra_axis_zh: 证据溯源 / 治理元数据
intra_role: claim
parent_node: node.evidence_ref
layer: meta
description: >
  Atomic claim extracted from a paper, protocol, framework document, benchmark,
  or standard and mapped to the ontology objects it supports or challenges.
description_zh: >
  从论文、协议、框架文档、基准或标准中提取的原子主张，并映射到其支持或挑战的本体对象。
attributes:
  claim_id:
    type: string
    required: true
    description: Globally unique id with claim. prefix.
  source_id:
    type: string
    required: true
    description: Source catalog id that produced this claim.
  ontology_impact:
    type: string
    required: true
    description: Why the claim changes, supports, or constrains ontology design.
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
