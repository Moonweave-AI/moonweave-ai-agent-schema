id: node.state_machine
artifact: NodeClass
label: StateMachine
label_zh: 状态机
intra_level: 2
intra_group: contract-model
intra_group_zh: 契约模型
intra_role: state
parent_node: node.node_class
layer: meta
description: >
  Finite state machine definition governing lifecycle or operational states of
  node instances. Includes states, transitions, guards, and terminal conditions.
attributes:
  state_machine_id:
    type: string
    required: true
    description: Globally unique id with state. prefix
  state_count:
    type: integer
    required: false
    description: Number of defined states
  initial_state:
    type: string
    required: true
    description: Name of the initial state
required_edges:
  incoming:
    - predicate: HAS_STATE_MACHINE
      source: node.node_class
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
