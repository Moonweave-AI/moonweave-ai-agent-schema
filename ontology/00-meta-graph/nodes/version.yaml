id: node.version
artifact: NodeClass
label: Version
label_zh: 版本
intra_level: 2
intra_group: governance-metadata
intra_group_zh: 治理元数据
intra_axis: governance-provenance
intra_axis_zh: 证据溯源 / 治理元数据
intra_role: version
parent_node: node.ontology_graph
layer: meta
description: >
  Semantic version record tracking ontology releases, changelogs, and
  compatibility guarantees across subgraph modules.
description_zh: >
  语义版本记录跟踪本体发布、变更日志和跨子图模块的兼容性保证。
attributes:
  version_string:
    type: string
    required: true
    description: Semver string (e.g., 1.0.0)
  release_date:
    type: datetime
    required: false
    description: ISO date of release
  changelog_ref:
    type: uri
    required: false
    description: Link to release notes or changelog entry
  breaking_changes:
    type: boolean
    required: false
    description: Whether this version introduces breaking schema changes
required_edges:
  incoming:
    - predicate: VERSIONED_AS
      source: node.ontology_graph
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
