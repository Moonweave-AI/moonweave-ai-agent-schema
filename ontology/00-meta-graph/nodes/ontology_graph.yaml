id: node.ontology_graph
artifact: NodeClass
label: OntologyGraph
label_zh: 本体图谱
intra_level: 0
intra_group: ontology-root
intra_group_zh: 本体根
intra_axis: ontology-foundation
intra_axis_zh: 本体根
intra_role: anchor
layer: meta
description: >
  Root container representing the complete agent ontology as a typed graph.
  Aggregates subgraphs, namespaces, versions, and cross-subgraph edge declarations.
attributes:
  graph_id:
    type: string
    required: true
    description: Stable identifier for the ontology graph instance
  name:
    type: string
    required: true
    description: Human-readable ontology name
  version:
    type: string
    required: true
    description: Semantic version of the ontology release
  status:
    type: enum
    required: true
    values: [active, deprecated, removed]
    description: Lifecycle status of the graph definition
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
