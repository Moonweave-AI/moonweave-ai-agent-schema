id: node.subgraph
artifact: NodeClass
label: Subgraph
label_zh: 子图
layer: meta
description: >
  Named module partition of the ontology covering a coherent domain such as
  agent core, context, memory, tools, or safety. Subgraphs contain their own
  node and edge class definitions plus local constraints.
attributes:
  subgraph_id:
    type: string
    required: true
    description: Short kebab-case identifier (e.g., agent-core-graph)
  path:
    type: string
    required: true
    description: Repository-relative path to subgraph directory
  scope_summary:
    type: string
    required: false
    description: One-line summary of subgraph responsibility
required_edges:
  outgoing:
    - predicate: CONTAINS
      target: node.node_class
    - predicate: CONTAINS
      target: node.edge_class
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
