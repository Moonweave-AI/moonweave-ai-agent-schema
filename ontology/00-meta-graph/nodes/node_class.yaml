id: node.node_class
artifact: NodeClass
label: NodeClass
label_zh: 节点类
intra_level: 1
intra_group: type-system
intra_group_zh: 类型系统
intra_axis: schema-structure
intra_axis_zh: 类型细节 / 类型系统 / 模块模型
intra_role: schema
parent_node: node.ontology_graph
layer: meta
description: >
  Schema definition for a typed node in the agent ontology. NodeClass specifies
  identity, attributes, optional state machines, interface contracts, required
  edges, and evidentiary provenance.
attributes:
  node_id:
    type: string
    required: true
    description: Globally unique id with node. prefix
  label:
    type: string
    required: true
    description: Primary English display label
  plane:
    type: string
    required: false
    description: Optional four-plane assignment (Info, Orchestration, Memory, Tool)
  attribute_schema:
    type: object
    required: false
    description: Map of attribute name to AttributeSpec references
required_edges:
  incoming:
    - predicate: DEFINES
      source: node.subgraph
  outgoing:
    - predicate: EVIDENCED_BY
      target: node.evidence_ref
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
state_machine:
  ref: state.lifecycle
evidence:
  - ref: evidence.ontology_self_description
status: active
