id: node.graph_constraint
artifact: NodeClass
label: GraphConstraint
label_zh: 图约束
intra_level: 2
intra_group: constraint-model
intra_group_zh: 约束模型
intra_axis: contract-constraint
intra_axis_zh: 约束模型 / 契约模型
intra_role: validator
parent_node: node.ontology_graph
layer: meta
description: >
  Declarative integrity rule enforced over ontology instances. Constraints may
  target specific node or edge classes with severity levels (error, warning, info).
description_zh: >
  在本体实例上强制执行声明性完整性规则。约束可能针对具有严重级别（错误、警告、信息）的特定节点或边缘类别。
attributes:
  constraint_id:
    type: string
    required: true
    description: Globally unique id with constraint. prefix
  severity:
    type: enum
    required: true
    values: [error, warning, info]
    description: Validation severity when rule is violated
  rule_expression:
    type: string
    required: true
    description: Human-readable or formal rule statement
required_edges:
  incoming:
    - predicate: CONSTRAINED_BY
      source_any_of: [node.node_class, node.edge_class, node.subgraph]
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
