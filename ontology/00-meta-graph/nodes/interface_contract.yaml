id: node.interface_contract
artifact: NodeClass
label: InterfaceContract
label_zh: 接口契约
intra_level: 2
intra_group: contract-model
intra_group_zh: 契约模型
intra_role: contract
parent_node: node.node_class
layer: meta
description: >
  Behavioral contract specifying operations that implementing node classes must
  support. Used for validation, code generation, and cross-subgraph interoperability.
attributes:
  contract_id:
    type: string
    required: true
    description: Globally unique id with contract. prefix
  operation_count:
    type: integer
    required: false
    description: Number of declared operations in the contract
required_edges:
  incoming:
    - predicate: HAS_CONTRACT
      source: node.node_class
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
