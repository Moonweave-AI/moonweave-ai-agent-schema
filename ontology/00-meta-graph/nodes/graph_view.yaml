id: node.graph_view
artifact: NodeClass
label: GraphView
label_zh: 图视图
intra_level: 2
intra_group: projection-model
intra_group_zh: 投影视图
intra_axis: projection-interface
intra_axis_zh: 投影视图
intra_role: view
parent_node: node.ontology_graph
layer: meta
description: >
  Named projection over the ontology graph for visualization, documentation, or
  domain-specific exploration. Filters nodes, edges, and layout strategy.
description_zh: >
  本体图上的命名投影，用于可视化、文档化或特定领域的探索。过滤节点、边缘和布局策略。
attributes:
  view_id:
    type: string
    required: true
    description: Globally unique id with view. prefix
  layout:
    type: enum
    required: false
    values: [force, hierarchical, radial, layered]
    description: Preferred graph layout algorithm
  root_nodes:
    type: array
    required: false
    description: Entry-point node class ids for the view
  included_subgraphs:
    type: array
    required: false
    description: Subgraph ids included in this view
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
