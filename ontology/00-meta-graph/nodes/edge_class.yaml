id: node.edge_class
artifact: NodeClass
label: EdgeClass
label_zh: 边类
intra_level: 1
intra_group: type-system
intra_group_zh: 类型系统
intra_axis: schema-structure
intra_axis_zh: 类型细节 / 类型系统 / 模块模型
intra_role: schema
parent_node: node.ontology_graph
layer: meta
description: >
  Schema definition for a typed directed relationship between node instances.
  EdgeClass specifies predicate name, source domain, target range, cardinality,
  optional policy hooks, and provenance.
description_zh: >
  节点实例之间类型化定向关系的模式定义。 EdgeClass 指定谓词名称、源域、目标范围、基数、可选策略挂钩和出处。
attributes:
  edge_id:
    type: string
    required: true
    description: Globally unique id with edge. prefix
  predicate:
    type: string
    required: true
    description: UPPER_SNAKE_CASE relationship name
  cardinality:
    type: enum
    required: false
    values: ["1:1", "1:N", "N:1", "N:M"]
    description: Relationship cardinality constraint
  source_domain:
    type: string
    required: true
    description: NodeClass id or list of allowed source types
  target_range:
    type: string
    required: true
    description: NodeClass id or list of allowed target types
required_edges:
  incoming:
    - predicate: DEFINES
      source: node.subgraph
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
