id: node.attribute_spec
artifact: NodeClass
label: AttributeSpec
label_zh: 属性规格
intra_level: 3
intra_group: type-detail
intra_group_zh: 类型细节
intra_role: attribute
parent_node: node.node_class
layer: meta
description: >
  Typed attribute declaration attached to NodeClass or EdgeClass definitions.
  Specifies data type, required flag, allowed values, and documentation.
attributes:
  attr_name:
    type: string
    required: true
    description: Attribute key on the owning class
  data_type:
    type: enum
    required: true
    values: [string, integer, float, boolean, enum, object, array, datetime, uri]
    description: Logical data type of the attribute
  required:
    type: boolean
    required: true
    description: Whether instances must populate this attribute
  allowed_values:
    type: array
    required: false
    description: Enumeration members when data_type is enum
  default_value:
    type: string
    required: false
    description: Default when not explicitly set
required_edges:
  incoming:
    - predicate: HAS_ATTRIBUTE
      source: node.node_class
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
