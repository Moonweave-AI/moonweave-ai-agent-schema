id: node.namespace
artifact: NodeClass
label: Namespace
label_zh: 命名空间
layer: meta
description: >
  Logical grouping and id prefix domain preventing collisions across teams,
  extensions, and third-party ontology modules.
attributes:
  namespace_id:
    type: string
    required: true
    description: Short identifier (e.g., moonweave, ext.acme)
  prefix:
    type: string
    required: true
    description: Id prefix applied to nodes and edges in this namespace
  owner:
    type: string
    required: false
    description: Maintaining organization or team
  governance_url:
    type: uri
    required: false
    description: Link to namespace governance policy
required_edges:
  incoming:
    - predicate: BELONGS_TO_NAMESPACE
      source_any_of: [node.node_class, node.edge_class, node.subgraph]
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
