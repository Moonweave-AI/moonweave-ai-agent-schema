id: node.evidence_ref
artifact: NodeClass
label: EvidenceRef
label_zh: 证据引用
intra_level: 3
intra_group: provenance
intra_group_zh: 证据溯源
intra_axis: governance-provenance
intra_axis_zh: 证据溯源 / 治理元数据
intra_role: artifact
parent_node: node.ontology_graph
layer: meta
description: >
  Provenance link from ontology constructs to external sources: academic papers,
  protocol specifications, diagrams, framework documentation, or standards.
attributes:
  evidence_id:
    type: string
    required: true
    description: Globally unique id with evidence. prefix
  source_type:
    type: enum
    required: true
    values: [diagram, paper, protocol_spec, framework_doc, blog, standard]
    description: Category of external source
  source_name:
    type: string
    required: true
    description: Title or name of the source document
  location:
    type: string
    required: false
    description: URI, file path, or citation key locating the source
required_edges:
  incoming:
    - predicate: EVIDENCED_BY
      source: node.node_class
interfaces:
  - ref: contract.identifiable
  - ref: contract.describable
evidence:
  - ref: evidence.ontology_self_description
status: active
