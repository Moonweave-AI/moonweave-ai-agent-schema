id: constraint.core_nodes_must_have_evidence
artifact: GraphConstraint
label: Core Nodes Must Have Evidence
label_zh: 核心节点必须有证据
severity: warning
rule: >
  NodeClass definitions in normative subgraphs (agent-core, context-info,
  memory, tool-action, orchestration, safety-policy) MUST have at least one
  EVIDENCED_BY edge to an EvidenceRef.
applies_to:
  nodes: [node.node_class]
  edges: [edge.EVIDENCED_BY]
description: >
  Traceability requirement: core ontology concepts must cite diagram, paper,
  or protocol sources. Warnings emitted when evidence is missing.
status: active
