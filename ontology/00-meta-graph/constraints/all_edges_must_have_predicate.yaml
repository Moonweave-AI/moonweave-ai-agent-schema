id: constraint.all_edges_must_have_predicate
artifact: GraphConstraint
label: All Edges Must Have Predicate
label_zh: 所有边必须有谓词
severity: error
rule: >
  Every EdgeClass definition MUST declare a non-empty predicate in
  UPPER_SNAKE_CASE matching ^[A-Z][A-Z0-9_]*$.
applies_to:
  nodes: [node.edge_class]
  edges: [edge.DEFINES]
description: >
  Predicates are the canonical relationship names used in cross-subgraph
  queries and visualization. Missing predicates break graph traversal.
status: active
