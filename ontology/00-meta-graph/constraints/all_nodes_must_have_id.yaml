id: constraint.all_nodes_must_have_id
artifact: GraphConstraint
label: All Nodes Must Have ID
label_zh: 所有节点必须有 ID
severity: error
rule: >
  Every NodeClass definition and every runtime node instance MUST have a
  non-empty id attribute matching the pattern ^node\.[a-z][a-z0-9_]*$.
applies_to:
  nodes: [node.node_class]
description: >
  Ensures global identifiability and referential integrity across subgraphs.
  Validators reject node artifacts missing or malformed ids.
status: active
