id: contract.describable
artifact: InterfaceContract
label: Describable
label_zh: 可描述
description: >
  All ontology nodes must provide human-readable label and description fields
  supporting documentation generation and UI display.
operations:
  - name: get_label
    description: Return primary display label
    input: {}
    output:
      label:
        type: string
    errors: [MissingLabelError]
  - name: get_description
    description: Return substantive description of the node semantics
    input: {}
    output:
      description:
        type: string
    errors: [MissingDescriptionError]
  - name: get_label_localized
    description: Return localized label if available
    input:
      locale:
        type: string
        description: BCP 47 locale tag (e.g., zh-CN)
    output:
      label:
        type: string
    errors: []
status: active
