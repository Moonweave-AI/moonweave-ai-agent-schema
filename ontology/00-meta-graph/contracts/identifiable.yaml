id: contract.identifiable
artifact: InterfaceContract
label: Identifiable
label_zh: 可标识
description: >
  All ontology nodes must carry a globally unique, stable identifier following
  namespace prefix conventions.
operations:
  - name: get_id
    description: Return the canonical node identifier
    input: {}
    output:
      id:
        type: string
        description: Unique node id (e.g., node.agent)
    errors: [MissingIdError]
  - name: validate_id_format
    description: Verify id matches expected prefix pattern for artifact type
    input:
      id:
        type: string
    output:
      valid:
        type: boolean
    errors: [InvalidIdFormatError]
status: active
