id: state.lifecycle
artifact: StateMachine
label: Artifact Lifecycle
label_zh: artifact 生命周期
description: >
  Standard lifecycle states for ontology schema artifacts: active (in use),
  deprecated (scheduled for removal), removed (no longer valid).
states:
  - name: active
    initial: true
    description: Artifact is current and valid for new instances
  - name: deprecated
    description: Artifact remains valid but discouraged; supersession announced
  - name: removed
    terminal: true
    description: Artifact no longer accepted by validators
transitions:
  - from: active
    to: deprecated
    trigger: deprecate
    description: Mark artifact deprecated with optional supersession pointer
  - from: deprecated
    to: removed
    trigger: remove
    guard: removal_target_version_reached
    description: Permanently remove artifact from active schema
  - from: deprecated
    to: active
    trigger: reactivate
    description: Restore deprecated artifact if removal cancelled
status: active
