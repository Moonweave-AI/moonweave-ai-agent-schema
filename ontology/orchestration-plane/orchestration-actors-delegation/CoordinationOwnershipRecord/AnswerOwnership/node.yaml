source_claims:
  - id: claim-answer-ownership-001
    source: eng-fw-openai-orchestration
    supports: OpenAI distinguishes a manager pattern, where the manager owns the final answer while specialist agents are called as tools, from a handoff that transfers the active conversation. Moonweave records that accountability explicitly as AnswerOwnership and keeps it distinct from next-step control.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-answer-ownership-002
    source: eng-fw-openai-orchestration
    supports: OpenAI recommends manager orchestration when one agent should own the final answer and combine specialist outputs, grounding a precise accountable-output scope.
    locator: Agent orchestration > Core SDK patterns > Agents as tools > Best when
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-answer-ownership-003
    source: eng-fw-openai-orchestration
    supports: The manager combines specialist outputs and can enforce shared guardrails, supporting a review obligation before approving the final answer.
    locator: Agent orchestration > Core SDK patterns > Agents as tools and shared guardrails
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-answer-ownership-004
    source: eng-fw-openai-orchestration
    supports: Manager-style orchestration retains final-answer ownership, supporting a sole finalization boundary when one manager remains accountable.
    locator: Agent orchestration > Core SDK patterns > Agents as tools > Final-answer ownership
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-answer-ownership-005
    source: eng-fw-openai-orchestration
    supports: The documented distinction between manager control and specialist contribution motivates an explicit joint boundary when final approval is intentionally shared.
    locator: Agent orchestration > Core SDK patterns > Pattern comparison table
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-answer-ownership-006
    source: eng-fw-openai-orchestration
    supports: Specialists used as tools contribute bounded results while the manager owns the final answer, directly motivating a draft-only specialist authority.
    locator: Agent orchestration > Core SDK patterns > Agents as tools > Final-answer ownership
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-answer-ownership-007
    source: eng-fw-openai-orchestration
    supports: Final-answer ownership in manager orchestration is distinct from specialist contribution, motivating an explicit finalization-authority boundary.
    locator: Agent orchestration > Core SDK patterns > Agents as tools > Final-answer ownership
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-answer-ownership-008
    source: eng-fw-openai-orchestration
    supports: The manager-pattern documentation states that the manager retains ownership of the final answer after specialists return results; this case instantiates that retained accountability without treating a specialist call as a handoff.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-answer-ownership-009
