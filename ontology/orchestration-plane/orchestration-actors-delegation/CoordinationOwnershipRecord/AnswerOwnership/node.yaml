schema: moonweave.ai/ontology-node/v1
id: AnswerOwnership
kind: concept
status: accepted
labels:
  en: answer ownership
  zh: 答案归属
  ja: 回答帰属
semantics:
  short_definition:
    zh: 答案责任归属是对最终答案或最终产物负责者的可审计记录。
    en: Answer ownership is an auditable record of who is accountable for the final answer or deliverable.
    ja: 回答責任の帰属は、最終回答または最終成果物に責任を負う者の監査可能な記録です。
  definition:
    zh: 答案责任归属是一种协同责任记录，其种差是：它在指定任务与有效期内标明谁必须审核、形成并对最终答案或产物负责；它不表示谁当前选择下一步。
    en: Answer ownership is a CoordinationOwnershipRecord distinguished by naming, for a stated task and validity interval, who must review, compose, and remain accountable for the final answer or deliverable; it does not say who controls the next workflow step.
    ja: 回答責任の帰属は調整責任記録の一種であり、指定されたタスクと有効期間について、最終回答または成果物を確認・構成し説明責任を負う者を示します。次のワークフローステップを制御する者は示しません。
  why_needed:
    zh: 委派后，执行者、当前控制者和最终答复者可能不同；显式记录答案责任才能判断谁应汇总证据、处理冲突并签署输出。
    en: After delegation, the performer, current controller, and final respondent can differ; explicit answer ownership is needed to know who synthesizes evidence, resolves conflicts, and signs off the output.
    ja: 委任後は実行者、現在の制御者、最終回答者が異なり得るため、証拠の統合、競合解決、出力承認を誰が担うかを回答責任として明示する必要があります。
  includes:
    - zh: 最终回复、报告或产物的责任主体，以及任务范围和有效期。
      en: The accountable party for a final response, report, or artifact, together with task scope and validity interval.
      ja: 最終応答・報告・成果物の責任主体、およびタスク範囲と有効期間。
    - zh: 委派或汇总后仍保留答案责任的记录，以及明确转移该责任的记录。
      en: Records that retain answer accountability after delegation or synthesis, and records that explicitly transfer it.
      ja: 委任・統合後も回答責任を保持する記録、およびその責任を明示的に移転する記録。
  excludes:
    - zh: 仅表示谁可决定下一步的 ControlOwnership；控制权不自动产生最终答案责任。
      en: ControlOwnership that only identifies who may choose the next step; control does not automatically create final-answer accountability.
      ja: 次の手順を選べる者だけを示す ControlOwnership。制御権だけでは最終回答責任は生じません。
    - zh: 没有责任主体、任务范围或生效时间的“最后发言者”日志。
      en: A last-speaker log with no accountable party, task scope, or effective time.
      ja: 責任主体、タスク範囲、有効時刻を欠く最終発言者ログ。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: accountable_output_scope
      labels:
        zh: 问责输出范围
        en: accountable-output scope
        ja: 説明責任出力範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定持有者必须形成并负责的最终答案、报告或产物部分，区别于中间专家返回。
        en: Delimits the final answer, report, or artifact portion the holder must produce and answer for, distinct from intermediate specialist returns.
        ja: 保持者が作成し責任を負う最終回答・報告・成果物範囲を、中間専門家返却物と区別して定めます。
      allowed_values: []
      pattern: null
      example_value:
        output_ref: customer-response-204
        sections:
          - decision
          - rationale
      source_claims:
        - claim-answer-ownership-002
    - id: review_obligation
      labels:
        zh: 审核义务
        en: review obligation
        ja: 審査義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定最终输出发布前必须由答案责任持有者完成的证据核对、冲突处理和安全检查。
        en: Specifies evidence reconciliation, conflict handling, and safety checks the answer owner must complete before final output release.
        ja: 最終出力公開前に回答責任者が完了すべき証拠照合・衝突処理・安全確認を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required_checks:
          - evidence
          - policy
          - citation
      source_claims:
        - claim-answer-ownership-003
    - id: finalization_authority
      labels:
        zh: 最终定稿权限
        en: finalization authority
        ja: 最終確定権限
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明持有者可直接批准最终输出、必须联合批准，或只能提出草案而不得发布。
        en: States whether the holder may approve the final output alone, requires joint approval, or may draft but not release it.
        ja: 保持者が単独承認・共同承認・草案のみのいずれで最終出力を確定できるかを示します。
      allowed_values:
        - id: FinalizationAuthoritySole
          value: sole
          labels:
            zh: 单独定稿
            en: sole finalization
            ja: 単独確定
          definitions:
            zh: 持有者可在其责任范围内独立批准并发布最终输出。
            en: The holder may independently approve and release the final output within its responsibility scope.
            ja: 保持者は責任範囲内で最終出力を単独承認・公開できます。
          status: accepted
          source_claims:
            - claim-answer-ownership-004
        - id: FinalizationAuthorityJoint
          value: joint
          labels:
            zh: 共同定稿
            en: joint finalization
            ja: 共同確定
          definitions:
            zh: 持有者必须与另一名明确的责任方共同批准后才能发布最终输出。
            en: The holder must obtain approval from another named accountable party before releasing the final output.
            ja: 保持者は別の明示された責任主体と共同承認した後にのみ最終出力を公開できます。
          status: accepted
          source_claims:
            - claim-answer-ownership-005
        - id: FinalizationAuthorityDraftOnly
          value: draft-only
          labels:
            zh: 仅可起草
            en: draft only
            ja: 草案のみ
          definitions:
            zh: 持有者可以形成候选草案，但无权批准或发布最终输出。
            en: The holder may produce a candidate draft but cannot approve or release the final output.
            ja: 保持者は候補草案を作成できますが最終出力を承認・公開できません。
          status: accepted
          source_claims:
            - claim-answer-ownership-006
      pattern: null
      example_value: sole
      source_claims:
        - claim-answer-ownership-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: AnswerOwnership-manual-positive-20260715
    kind: positive
    labels:
      zh: 答案归属正例
      en: Positive case for answer ownership
      ja: 回答帰属の正例
    scenario_id: null
    descriptions:
      zh: 客服协调器调用退款与政策专家作为工具，核对两者返回后亲自生成并批准给客户的最终答复；记录把该协调器的有效角色绑定列为答案责任持有者。
      en: A support coordinator calls refund and policy specialists as tools, reconciles both returns, and composes and approves the customer-facing final answer; the record names the coordinator's active role binding as answer owner.
      ja: サポート調整役が返金専門家と方針専門家をツールとして呼び出し、両方の結果を照合して顧客向け最終回答を作成・承認し、その有効な役割バインディングを回答責任者として記録します。
    field_values:
      ownership_record_id: ownership-refund-answer-204
      revision: "3"
      responsibility_type: answer
      scope_ref: customer-refund-case-204#final-response
      effective_at: 2026-07-15T10:05:00Z
      accountable_output_scope:
        output_ref: customer-refund-response-204
        sections:
          - decision
          - policy-rationale
          - next-actions
      review_obligation:
        required_checks:
          - refund-facts
          - policy-version
          - citation
          - safety
      finalization_authority: sole
    related_node_ids:
      - AnswerOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    expected_result:
      zh: 建立 AnswerOwnership；专家执行了子任务，但最终答案责任仍由协调器承担。
      en: Create AnswerOwnership for the coordinator; specialists performed subtasks but did not acquire final-answer accountability.
      ja: 調整役に AnswerOwnership を設定し、専門家は部分作業を実行しても最終回答責任は取得しません。
    why_valid_or_invalid:
      zh: 该记录同时给出最终输出、责任主体、任务范围与有效期，符合答案责任的身份条件。
      en: The record names the final output, accountable party, task scope, and validity interval, satisfying the identity conditions for answer ownership.
      ja: 最終出力、責任主体、タスク範囲、有効期間を示しており、回答責任の同一性条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-answer-ownership-008
  - id: AnswerOwnership-manual-boundary-20260715
    kind: boundary
    labels:
      zh: 答案归属边界例
      en: Boundary case for answer ownership
      ja: 回答帰属の境界例
    scenario_id: null
    descriptions:
      zh: 路由器把会话 handoff 给西班牙语专员，专员成为后续活跃智能体并直接形成答复；旧路由器仅保留审计记录。
      en: A router hands the conversation off to a Spanish-language specialist, which becomes the active agent and produces the subsequent response; the former router only remains in the audit trail.
      ja: ルーターが会話をスペイン語担当へハンドオフし、担当が後続のアクティブエージェントとして回答を作成し、旧ルーターは監査証跡だけに残ります。
    field_values: {}
    related_node_ids:
      - AnswerOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    expected_result:
      zh: 不得仅因路由器发起 handoff 就继续把它记为答案责任持有者；需依据 handoff 契约另行确定。
      en: Do not keep the router as answer owner merely because it initiated the handoff; ownership must be determined from the handoff contract.
      ja: ハンドオフを開始しただけでルーターを回答責任者として保持せず、ハンドオフ契約から別途判断します。
    why_valid_or_invalid:
      zh: 发起转移与承担最终答复责任是不同事实，缺少明确保留条款时不能推断旧主体仍负责。
      en: Initiating a transfer and remaining accountable for the final response are different facts; without an explicit retention clause the former party cannot be inferred to remain answer owner.
      ja: 移転の開始と最終回答への説明責任は別の事実であり、明示的な保持条項がなければ旧主体の責任を推定できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-answer-ownership-009
