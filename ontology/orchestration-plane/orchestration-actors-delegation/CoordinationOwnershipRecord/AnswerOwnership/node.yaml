schema: moonweave.ai/ontology-node/v1
id: AnswerOwnership
kind: concept
labels:
  en: answer ownership
  zh: 答案归属
  ja: 回答帰属
semantics:
  short_definition:
    zh: 记录谁必须审核、形成并对最终答案或产物负责的可审计归属。
    en: An auditable record of who must review, compose, and remain accountable for the final answer or deliverable.
    ja: 最終回答または成果物の確認・構成・説明責任を負う者を記録する監査可能な帰属です。
  definition:
    zh: AnswerOwnership 是 CoordinationOwnershipRecord 的特化，responsibility_type=answer，并附加 accountable_output_scope、review_obligation 与 finalization_authority。OpenAI Agents SDK manager-as-tools 模式中 manager 保留 final-answer ownership；CrewAI hierarchical process 的 manager_llm 也汇总 worker 输出。它不表示谁控制下一步（那是 ControlOwnership），也不把 specialist 的中间返回当作最终答案责任。
    en: AnswerOwnership specializes CoordinationOwnershipRecord with responsibility_type=answer plus accountable_output_scope, review_obligation, and finalization_authority. OpenAI Agents SDK manager-as-tools retains final-answer ownership; CrewAI hierarchical manager_llm synthesizes worker outputs. It does not identify next-step control (ControlOwnership) and does not treat specialist intermediate returns as final-answer accountability.
    ja: AnswerOwnership は responsibility_type=answer と accountable_output_scope・review_obligation・finalization_authority を持つ CoordinationOwnershipRecord の特化です。OpenAI manager-as-tools と CrewAI manager_llm が最終回答責任を保持します。次手制御（ControlOwnership）や中間返却の最終責任ではありません。
  why_needed:
    zh: 委派后执行者、控制者与最终答复者可能不同；显式答案责任才能判断谁汇总证据、处理冲突并签署输出。
    en: After delegation, performer, controller, and final respondent can differ; explicit answer ownership identifies who synthesizes evidence, resolves conflicts, and signs off output.
    ja: 委任後は実行者・制御者・最終回答者が異なり得るため、証拠統合・競合解決・出力承認の責任を明示する必要があります。
  includes:
    - zh: 最终回复、报告或产物的责任主体，以及任务范围和有效期。
      en: Accountable party for final response, report, or artifact with task scope and validity.
      ja: 最終応答・報告・成果物の責任主体とタスク範囲・有効期間。
    - zh: 委派或汇总后仍保留答案责任的记录，以及明确转移该责任的记录。
      en: Records retaining answer accountability after delegation or synthesis, and records transferring it.
      ja: 委任・統合後も回答責任を保持または移転する記録。
  excludes:
    - zh: 仅表示谁可决定下一步的 ControlOwnership；控制权不自动产生最终答案责任。
      en: ControlOwnership without final-answer duty; control does not automatically create answer accountability.
      ja: 次手選択権のみの ControlOwnership。制御権だけでは最終回答責任は生じません。
    - zh: 没有责任主体、任务范围或生效时间的“最后发言者”日志。
      en: A last-speaker log without accountable party, scope, or effective time.
      ja: 責任主体・範囲・有効時刻を欠く最終発言者ログ。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射 OpenAI manager 在 specialist tool 返回后继续持有 AnswerOwnership；handoff 到 refund specialist 时须依据 handoff 契约决定是否转移 AnswerOwnership。CrewAI manager 在 hierarchical crew 中合成最终 task output 时同样建立 AnswerOwnership。
    en: Map OpenAI managers retaining AnswerOwnership after specialist tool returns; handoffs to refund specialists require contract-based AnswerOwnership transfer decisions. CrewAI managers synthesizing hierarchical crew outputs likewise establish AnswerOwnership.
    ja: OpenAI manager の specialist tool 返却後も AnswerOwnership を保持し、handoff 時は契約に基づき移転を判断します。CrewAI hierarchical manager も同様です。
  typical_input:
    - description: OpenAI manager synthesizing specialist tool outputs.
      format: |
        # Manager retains final answer; specialists return bounded results
        result = await Runner.run(manager, input=user_message)
      source_claims: [claim-ao-openai]
    - description: CrewAI manager_llm reviewing worker task outputs.
      format: |
        from crewai import Crew, Process
        crew = Crew(agents=[manager, worker], tasks=[...], process=Process.hierarchical)
      source_claims: [claim-ao-crewai]
  typical_output:
    - description: AnswerOwnership record with finalization authority.
      format: |
        {
          "responsibility_type": "answer",
          "accountable_output_scope": {"output_ref": "customer-response-204"},
          "finalization_authority": "sole"
        }
      source_claims: [claim-ao-design]
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Manager final-answer ownership after agents-as-tools.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager_llm output synthesis.
structure:
  identity_keys: []
  fields:
    - id: accountable_output_scope
      labels:
        zh: 问责输出范围
        en: accountable-output scope
        ja: 説明責任出力範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定持有者必须形成并负责的最终答案、报告或产物部分。
        en: Delimits the final answer, report, or artifact portion the holder must produce and answer for.
        ja: 保持者が作成し責任を負う最終回答・報告・成果物範囲を定めます。
      example_value:
        output_ref: customer-response-204
        sections: [decision, rationale]
      source_claims: [claim-ao-design]
    - id: review_obligation
      labels:
        zh: 审核义务
        en: review obligation
        ja: 審査義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定发布前必须完成的证据核对、冲突处理和安全检查。
        en: Evidence reconciliation, conflict handling, and safety checks required before release.
        ja: 公開前に必要な証拠照合・衝突処理・安全確認を規定します。
      example_value:
        required_checks: [evidence, policy, citation]
      source_claims: [claim-ao-openai]
    - id: finalization_authority
      labels:
        zh: 最终定稿权限
        en: finalization authority
        ja: 最終確定権限
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明持有者可单独批准、需联合批准或仅可起草。
        en: States sole, joint, or draft-only finalization authority.
        ja: 単独承認・共同承認・草案のみのいずれかを示します。
      allowed_values:
        - id: FinalizationAuthoritySole
          value: sole
          labels:
            zh: 单独定稿
            en: sole finalization
            ja: 単独確定
          definitions:
            zh: 持有者可独立批准并发布最终输出。
            en: Holder may independently approve and release final output.
            ja: 保持者は最終出力を単独承認・公開できます。
          source_claims: [claim-ao-openai]
        - id: FinalizationAuthorityJoint
          value: joint
          labels:
            zh: 共同定稿
            en: joint finalization
            ja: 共同確定
          definitions:
            zh: 持有者必须与另一责任方共同批准后才能发布。
            en: Holder must obtain joint approval before release.
            ja: 共同承認後にのみ公開できます。
          source_claims: [claim-ao-design]
        - id: FinalizationAuthorityDraftOnly
          value: draft-only
          labels:
            zh: 仅可起草
            en: draft only
            ja: 草案のみ
          definitions:
            zh: 持有者可形成草案但无权批准或发布。
            en: Holder may draft but cannot approve or release.
            ja: 草案のみ作成でき、承認・公開はできません。
          source_claims: [claim-ao-openai]
      example_value: sole
      source_claims: [claim-ao-design]
  constraints: []
  required_relation_constraints: []
examples:
  - id: AnswerOwnership-openai-manager
    labels:
      zh: OpenAI manager 保留答案责任
      en: OpenAI manager retains answer ownership
      ja: OpenAI manager が回答責任を保持
    descriptions:
      zh: 客服协调器调用退款与政策专家作为 tools，核对返回后亲自批准客户答复。
      en: A support coordinator calls refund and policy specialists as tools, reconciles returns, and approves the customer-facing answer.
      ja: サポート調整役が専門家を tool として呼び、返却を照合して顧客向け回答を承認します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: manager pattern
    field_values:
      ownership_record_id: ownership-refund-answer-204
      responsibility_type: answer
      finalization_authority: sole
    related_node_ids: [AnswerOwnership, CoordinationOwnershipRecord]
    related_relation_ids: [AnswerOwnership-is_a-CoordinationOwnershipRecord]
    source_claims: [claim-ao-openai, claim-ao-design]
  - id: AnswerOwnership-crewai-manager
    labels:
      zh: CrewAI manager 汇总输出
      en: CrewAI manager synthesizes output
      ja: CrewAI manager が出力を統合
    descriptions:
      zh: hierarchical crew 中 manager_llm 汇总 worker 任务结果并形成最终报告，AnswerOwnership 绑定 manager 角色。
      en: In a hierarchical crew, manager_llm synthesizes worker task results into the final report; AnswerOwnership binds the manager role.
      ja: hierarchical crew で manager_llm が worker 結果を統合し、AnswerOwnership は manager 役割に結び付きます。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      finalization_authority: sole
      review_obligation:
        required_checks: [worker-output, policy]
    related_node_ids: [AnswerOwnership, Orchestrator]
    related_relation_ids: []
    source_claims: [claim-ao-crewai]
  - id: AnswerOwnership-boundary-handoff
    labels:
      zh: handoff 不自动保留答案责任
      en: Handoff does not auto-retain answer ownership
      ja: handoff は回答責任を自動保持しない
    descriptions:
      zh: 路由器 handoff 给西班牙语专员后，专员直接回复用户；不得仅因发起 handoff 就把路由器记为答案责任者。
      en: After handoff to a Spanish specialist who responds directly, the router must not remain answer owner merely because it initiated the handoff.
      ja: スペイン語担当へ handoff 後に担当が直接回答する場合、ルーターを自動的に回答責任者としません。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values: {}
    related_node_ids: [AnswerOwnership, ControlOwnership]
    related_relation_ids: []
    source_claims: [claim-ao-openai]
