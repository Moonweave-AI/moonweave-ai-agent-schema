schema: moonweave.ai/ontology-node/v1
id: AnswerOwnership
kind: concept
labels:
  en: answer ownership
  zh: 答案归属
  ja: 回答帰属
semantics:
  short_definition:
    zh: 答案责任归属是对最终答案或最终产物负责者的可审计记录。
    en: Answer ownership is an auditable record of who is accountable for the final answer or deliverable.
    ja: 回答責任の帰属は、最終回答または最終成果物に責任を負う者の監査可能な記録です。
  definition:
    zh: 答案责任归属是一种协同责任记录，其种差是：它在指定任务与有效期内标明谁必须审核、形成并对最终答案或产物负责；它不表示谁当前选择下一步。
    en: Answer ownership is a CoordinationOwnershipRecord distinguished by naming, for a stated task and validity interval, who must review, compose, and remain accountable for the final answer or deliverable; it does not say who controls the next workflow step.
    ja: 回答責任の帰属は調整責任記録の一種であり、指定されたタスクと有効期間について、最終回答または成果物を確認・構成し説明責任を負う者を示します。次のワークフローステップを制御する者は示しません。
  why_needed:
    zh: 委派后，执行者、当前控制者和最终答复者可能不同；显式记录答案责任才能判断谁应汇总证据、处理冲突并签署输出。
    en: After delegation, the performer, current controller, and final respondent can differ; explicit answer ownership is needed to know who synthesizes evidence, resolves conflicts, and signs off the output.
    ja: 委任後は実行者、現在の制御者、最終回答者が異なり得るため、証拠の統合、競合解決、出力承認を誰が担うかを回答責任として明示する必要があります。
  includes:
    - zh: 最终回复、报告或产物的责任主体，以及任务范围和有效期。
      en: The accountable party for a final response, report, or artifact, together with task scope and validity interval.
      ja: 最終応答・報告・成果物の責任主体、およびタスク範囲と有効期間。
    - zh: 委派或汇总后仍保留答案责任的记录，以及明确转移该责任的记录。
      en: Records that retain answer accountability after delegation or synthesis, and records that explicitly transfer it.
      ja: 委任・統合後も回答責任を保持する記録、およびその責任を明示的に移転する記録。
  excludes:
    - zh: 仅表示谁可决定下一步的 ControlOwnership；控制权不自动产生最终答案责任。
      en: ControlOwnership that only identifies who may choose the next step; control does not automatically create final-answer accountability.
      ja: 次の手順を選べる者だけを示す ControlOwnership。制御権だけでは最終回答責任は生じません。
    - zh: 没有责任主体、任务范围或生效时间的“最后发言者”日志。
      en: A last-speaker log with no accountable party, task scope, or effective time.
      ja: 責任主体、タスク範囲、有効時刻を欠く最終発言者ログ。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys: []
  fields:
    - id: accountable_output_scope
      labels:
        zh: 问责输出范围
        en: accountable-output scope
        ja: 説明責任出力範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定持有者必须形成并负责的最终答案、报告或产物部分，区别于中间专家返回。
        en: Delimits the final answer, report, or artifact portion the holder must produce and answer for, distinct from intermediate specialist returns.
        ja: 保持者が作成し責任を負う最終回答・報告・成果物範囲を、中間専門家返却物と区別して定めます。
      allowed_values: []
      pattern: null
      example_value:
        output_ref: customer-response-204
        sections:
          - decision
          - rationale
      source_claims:
        - claim-answer-ownership-002
    - id: review_obligation
      labels:
        zh: 审核义务
        en: review obligation
        ja: 審査義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定最终输出发布前必须由答案责任持有者完成的证据核对、冲突处理和安全检查。
        en: Specifies evidence reconciliation, conflict handling, and safety checks the answer owner must complete before final output release.
        ja: 最終出力公開前に回答責任者が完了すべき証拠照合・衝突処理・安全確認を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required_checks:
          - evidence
          - policy
          - citation
      source_claims:
        - claim-answer-ownership-003
    - id: finalization_authority
      labels:
        zh: 最终定稿权限
        en: finalization authority
        ja: 最終確定権限
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明持有者可直接批准最终输出、必须联合批准，或只能提出草案而不得发布。
        en: States whether the holder may approve the final output alone, requires joint approval, or may draft but not release it.
        ja: 保持者が単独承認・共同承認・草案のみのいずれで最終出力を確定できるかを示します。
      allowed_values:
        - id: FinalizationAuthoritySole
          value: sole
          labels:
            zh: 单独定稿
            en: sole finalization
            ja: 単独確定
          definitions:
            zh: 持有者可在其责任范围内独立批准并发布最终输出。
            en: The holder may independently approve and release the final output within its responsibility scope.
            ja: 保持者は責任範囲内で最終出力を単独承認・公開できます。
          status: accepted
          source_claims:
            - claim-answer-ownership-004
        - id: FinalizationAuthorityJoint
          value: joint
          labels:
            zh: 共同定稿
            en: joint finalization
            ja: 共同確定
          definitions:
            zh: 持有者必须与另一名明确的责任方共同批准后才能发布最终输出。
            en: The holder must obtain approval from another named accountable party before releasing the final output.
            ja: 保持者は別の明示された責任主体と共同承認した後にのみ最終出力を公開できます。
          status: accepted
          source_claims:
            - claim-answer-ownership-005
        - id: FinalizationAuthorityDraftOnly
          value: draft-only
          labels:
            zh: 仅可起草
            en: draft only
            ja: 草案のみ
          definitions:
            zh: 持有者可以形成候选草案，但无权批准或发布最终输出。
            en: The holder may produce a candidate draft but cannot approve or release the final output.
            ja: 保持者は候補草案を作成できますが最終出力を承認・公開できません。
          status: accepted
          source_claims:
            - claim-answer-ownership-006
      pattern: null
      example_value: sole
      source_claims:
        - claim-answer-ownership-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: AnswerOwnership-manual-positive-20260715
    labels:
      zh: AnswerOwnership positive
      en: AnswerOwnership positive
      ja: AnswerOwnership positive
    descriptions:
      zh: CrewAI 映射 AnswerOwnership：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps AnswerOwnership: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI AnswerOwnership: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {ownership_record_id: ownership-refund-answer-204, revision: 3, responsibility_type: answer, scope_ref: "customer-refund-case-204#final-response", effective_at: 2026-07-15T10:05:00Z}

    related_node_ids:
      - AnswerOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-answer-ownership-008

  - id: AnswerOwnership-manual-boundary-20260715
    labels:
      zh: AnswerOwnership boundary
      en: AnswerOwnership boundary
      ja: AnswerOwnership boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 AnswerOwnership 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not AnswerOwnership delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で AnswerOwnership delegation spec ではない。
    field_values: {}

    related_node_ids:
      - AnswerOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-answer-ownership-009

  - id: AnswerOwnership-counterexample-control-ownership-confusion
    labels:
      zh: AnswerOwnership counterexample
      en: AnswerOwnership counterexample
      ja: AnswerOwnership counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 AnswerOwnership RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style AnswerOwnership RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 AnswerOwnership ではない。
    field_values: {ownership_record_id: ownership-travel-next-step-9, responsibility_type: control, accountable_output_scope: absent, review_obligation: absent, finalization_authority: absent}

    related_node_ids:
      - AnswerOwnership
      - ControlOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
      - ControlOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-answer-ownership-009

  - id: AnswerOwnership-instance-refund-coordinator-sole
    labels:
      zh: AnswerOwnership instance
      en: AnswerOwnership instance
      ja: AnswerOwnership instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 AnswerOwnership HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to AnswerOwnership HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が AnswerOwnership HandoffDecision に写像。
    field_values: {ownership_record_id: ownership-refund-answer-204, revision: 3, responsibility_type: answer, scope_ref: "customer-refund-case-204#final-response", effective_at: 2026-07-15T10:05:00Z}

    related_node_ids:
      - AnswerOwnership
      - CoordinationOwnershipRecord
      - Orchestrator
    related_relation_ids:
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-answer-ownership-008
      - claim-coordination-role-002

