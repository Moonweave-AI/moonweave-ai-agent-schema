sibling_differentiation:
  - sibling_concept_id: ControlOwnership
    shared_parent_concept_id: CoordinationOwnershipRecord
    differentia:
      zh: 已审查兄弟区分：父节点 CoordinationOwnershipRecord：AnswerOwnership（semantic kind=information，骨架 AnswerOwnership-is_a-CoordinationOwnershipRecord）；ControlOwnership（semantic kind=information，骨架 ControlOwnership-is_a-CoordinationOwnershipRecord）。双端条件：AnswerOwnership 条件：“答案归属是以如下事实为区分特征的协调归属记录：它记录在委派、交接、审查或综合之后，哪个协同参与者对最终答复或产物负责”；ControlOwnership 条件：“控制归属是一种协调归属记录；其区分条件是：它记录当前由哪个参与者控制下一步工作流，包括管理者保留控制或通过交接转移控制”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent CoordinationOwnershipRecord: AnswerOwnership (semantic kind=information, backbone AnswerOwnership-is_a-CoordinationOwnershipRecord); ControlOwnership (semantic kind=information, backbone ControlOwnership-is_a-CoordinationOwnershipRecord). Endpoint conditions: AnswerOwnership condition: “Answer ownership is a coordination ownership record; its differentiating condition is that it records which coordinating actor is accountable for the final response or artifact after delegation, handoff, review, or synthesis”; ControlOwnership condition: “As a coordination ownership record, Control ownership is distinguished by the fact that it records which actor currently controls the next workflow step, including whether control is retained by a manager or transferred through handoff”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 CoordinationOwnershipRecord：AnswerOwnership（semantic kind=information、バックボーン AnswerOwnership-is_a-CoordinationOwnershipRecord）；ControlOwnership（semantic kind=information、バックボーン ControlOwnership-is_a-CoordinationOwnershipRecord）。両端条件：AnswerOwnership の条件：「回答帰属は調整帰属記録の一種であり、次の条件で区別されます：それは、委任、引き継ぎ、レビュー、統合の後で、どの協調参加者が最終回答または成果物に責任を持つかを記録します」；ControlOwnership の条件：「調整帰属記録に属する制御帰属は、次の事実を種差とします：それは、次のワークフロー手順を現在どの参加者が制御するかを記録し、管理者が保持する場合と引き継ぎで移転する場合を区別します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-answer-ownership-010
