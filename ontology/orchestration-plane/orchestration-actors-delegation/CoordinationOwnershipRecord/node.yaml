source_claims:
  - id: claim-coordination-ownership-record-001
    source: eng-fw-openai-orchestration
    supports: The manager and handoff patterns change who retains or receives control and final-answer responsibility. Moonweave captures those time-varying responsibilities in a holder- and scope-specific CoordinationOwnershipRecord.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-ownership-record-002
    source: eng-fw-openai-orchestration
    supports: OpenAI distinguishes retained manager ownership from transferred handoff control; Moonweave records each ownership assertion with a stable identifier.
    locator: Agent orchestration > Core SDK patterns > Agents as tools versus Handoffs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-ownership-record-003
    source: eng-fw-openai-orchestration
    supports: Handoffs can change the active agent while manager calls do not; Moonweave versions ownership assertions to preserve that change history.
