schema: moonweave.ai/ontology-node/v1
id: CoordinationOwnershipRecord
kind: concept
labels:
  zh: 协调归属记录
  en: coordination ownership record
  ja: 調整帰属記録
semantics:
  short_definition:
    zh: 把一种协同责任在特定范围与时间内绑定到实际承担者的可审计记录。
    en: An auditable record binding one coordination responsibility to an actual bearer for a stated scope and time.
    ja: 一つの調整責任を指定範囲・時間について実際の担い手へ結び付ける監査可能な記録です。
  definition:
    zh: CoordinationOwnershipRecord 以 ownership_record_id、responsibility_type、scope_ref、effective_at 标识，引用有效 ActorRoleBinding 并记录责任类型（control、answer、result-accountability）、适用范围与转移依据。OpenAI Agents SDK 的 manager 保留 final-answer ownership 而 specialist handoff 转移 control；LangGraph supervisor 与 worker 切换时也需同样区分。它不是抽象 CoordinationRole、委派请求或仅按发言顺序推断的日志。
    en: A CoordinationOwnershipRecord is identified by ownership_record_id, responsibility_type, scope_ref, and effective_at, referencing an effective ActorRoleBinding with responsibility type (control, answer, result-accountability), scope, and transfer basis. OpenAI Agents SDK managers retain final-answer ownership while handoffs transfer control; LangGraph supervisor/worker switches need the same distinction. It is not an abstract CoordinationRole, a delegation request, or a last-speaker log.
    ja: CoordinationOwnershipRecord は ownership_record_id・responsibility_type・scope_ref・effective_at で識別し、有効 ActorRoleBinding と責任種別・範囲・移転根拠を記録します。OpenAI Agents SDK の manager は final-answer ownership を保持し handoff は control を移します。抽象 CoordinationRole や発言順ログではありません。
  why_needed:
    zh: 同一角色可由多人承担且随 handoff 变化；带时间与范围的责任记录才能重建某一时刻谁真正负责控制或答案。
    en: The same role may be borne by different actors and change through handoff; only scoped, time-bounded ownership records reconstruct who was accountable at a moment.
    ja: 同じ役割を複数主体が担いハンドオフで変化するため、範囲と時間を持つ責任記録だけが特定時点の実責任者を再構成できます。
  includes:
    - zh: 责任类型、持有者 ActorRoleBinding、任务或会话范围、有效区间、转移来源。
      en: Responsibility type, holder ActorRoleBinding, task or session scope, validity interval, transfer source.
      ja: 責任種別、保持者 ActorRoleBinding、対象範囲、有効期間、移転元。
  excludes:
    - zh: 无实际承担者的角色定义、一次委派请求、只记录发言顺序的消息日志。
      en: A role definition without a bearer, a delegation request, and a message log recording only speaking order.
      ja: 実際の担い手を持たない役割定義、委任要求、発言順だけのメッセージログ。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成时将 OpenAI manager-as-tools 会话映射为 retained ControlOwnership + AnswerOwnership；handoff 产生新 ControlOwnership 并可能转移 AnswerOwnership。LangGraph interrupt/resume 前后也应写入 scope_ref 与 effective_at。禁止用 role 名称代替 ActorRoleBinding。
    en: Map OpenAI manager-as-tools sessions to retained ControlOwnership and AnswerOwnership; handoffs create new ControlOwnership and may transfer AnswerOwnership. LangGraph interrupt/resume boundaries should populate scope_ref and effective_at. Do not substitute role names for ActorRoleBinding identifiers.
    ja: OpenAI manager-as-tools を retained ControlOwnership/AnswerOwnership に、handoff を新 ControlOwnership に写像します。role 名で ActorRoleBinding を置換しません。
  typical_input:
    - description: OpenAI handoff transferring active agent control.
      format: |
        handoff(to_agent=refund_specialist, input={"case_id": "204"})
      source_claims: [claim-cor-openai]
    - description: LangGraph supervisor retaining control after worker return.
      format: |
        builder.add_node("supervisor", supervisor_node)
        builder.add_node("research_worker", research_worker)
      source_claims: [claim-cor-langgraph]
  typical_output:
    - description: Moonweave ownership record projection.
      format: |
        {
          "ownership_record_id": "ownership-travel-control-204",
          "responsibility_type": "control",
          "scope_ref": "travel-session-9#next-step",
          "effective_at": "2026-07-15T09:20:00Z",
          "held_by": "binding-travel-manager-2"
        }
      source_claims: [claim-cor-design]
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Manager versus handoff ownership boundaries.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Supervisor/worker control retention across graph steps.
structure:
  identity_keys:
    - ownership_record_id
    - revision
  fields:
    - id: ownership_record_id
      labels:
        zh: 归属记录标识
        en: ownership-record ID
        ja: 帰属記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一条协调责任归属记录；责任转移产生新 revision。
        en: Stably identifies a coordination-ownership record; transfers create new revisions.
        ja: 調整責任帰属記録を安定識別し、移転は新 revision を作ります。
      allowed_values: []
      pattern: ^ownership-[A-Za-z0-9._:-]+$
      example_value: ownership-support-answer-204
      source_claims: [claim-cor-design]
    - id: revision
      labels:
        zh: 归属修订
        en: ownership revision
        ja: 帰属リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 持有者或责任范围变更后的不可变版本。
        en: Immutable version after holder or scope change.
        ja: 保持者または範囲変更後の不変版。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
      example_value: "5"
      source_claims: [claim-cor-design]
    - id: responsibility_type
      labels:
        zh: 责任类型
        en: responsibility type
        ja: 責任種別
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分下一步控制、最终答案责任与结果问责。
        en: Distinguishes next-step control, final-answer accountability, and result accountability.
        ja: 次手制御・最終回答責任・結果説明責任を区別します。
      allowed_values:
        - id: ResponsibilityTypeControl
          value: control
          labels:
            zh: 控制责任
            en: control responsibility
            ja: 制御責任
          definitions:
            zh: 对路由、暂停、重试、升级或 handoff 决定负责。
            en: Responsibility for routing, pause, retry, escalation, or handoff decisions.
            ja: 経路選択・停止・再試行・上位移管・引継ぎ判断への責任。
          source_claims: [claim-cor-openai]
        - id: ResponsibilityTypeAnswer
          value: answer
          labels:
            zh: 最终答案责任
            en: final-answer responsibility
            ja: 最終回答責任
          definitions:
            zh: 对面向请求方的最终答案完整性、批准和发布负责。
            en: Responsibility for completeness, approval, and release of the final answer.
            ja: 最終回答の完全性・承認・公開への責任。
          source_claims: [claim-cor-openai]
        - id: ResponsibilityTypeResultAccountability
          value: result-accountability
          labels:
            zh: 结果问责
            en: result accountability
            ja: 結果説明責任
          definitions:
            zh: 对委派结果的正确性、证据和可追溯解释负责，不自动拥有控制或发布权。
            en: Accountability for delegated result correctness and evidence without automatic control or release rights.
            ja: 委任結果の正確性・証拠・説明責任（制御権は自動付与しない）。
          source_claims: [claim-cor-openai]
      example_value: answer
      source_claims: [claim-cor-design]
    - id: scope_ref
      labels:
        zh: 责任范围引用
        en: responsibility-scope reference
        ja: 責任範囲参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用责任适用的 task、session、work item 或 output 范围。
        en: References task, session, work item, or output scope for the responsibility.
        ja: 責任が適用される task/session/work item/output 範囲を参照します。
      example_value: task-risk-204#final-answer
      source_claims: [claim-cor-design]
    - id: effective_at
      labels:
        zh: 生效时刻
        en: effective at
        ja: 発効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 角色绑定开始承担责任的时刻。
        en: When the role binding begins bearing the responsibility.
        ja: role binding が責任を担い始める時刻。
      example_value: 2026-07-16T08:30:00Z
      source_claims: [claim-cor-design]
    - id: released_at
      labels:
        zh: 解除时刻
        en: released at
        ja: 解除時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 停止承担责任的时刻；未设置表示尚未观察到解除。
        en: When responsibility ends; absence means no release observed yet.
        ja: 責任を担わなくなる時刻；未設定は解除未観測。
      example_value: null
      source_claims: [claim-cor-design]
    - id: transfer_basis_ref
      labels:
        zh: 转移依据引用
        en: transfer-basis reference
        ja: 移転根拠参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用 handoff、委派契约或控制决定，说明责任获得或解除依据。
        en: References handoff, delegation contract, or control decision justifying acquisition or release.
        ja: handoff・delegation contract・control decision など移転根拠を参照します。
      example_value: handoff-event-refund-77
      source_claims: [claim-cor-openai]
  constraints:
    - id: coordination-ownership-effective-interval
      severity: error
      expression_language: plain
      expression: released_at is absent or released_at > effective_at
      explanations:
        zh: 责任解除时刻必须晚于生效时刻。
        en: Release must occur after effectiveness begins.
        ja: 解除時刻は発効時刻より後でなければなりません。
      source_claims: [claim-cor-design]
  required_relation_constraints:
    - id: coordination-ownership-held-by-one-binding
      direction: outgoing
      predicate: held_by
      target_concept_id: ActorRoleBinding
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条记录必须指向恰好一个有效 ActorRoleBinding。
        en: Every record must name exactly one effective ActorRoleBinding.
        ja: 各記録は有効 ActorRoleBinding を一つだけ指します。
      source_claims: [claim-cor-design]
examples:
  - id: CoordinationOwnershipRecord-openai-manager
    labels:
      zh: OpenAI manager 保留答案责任
      en: OpenAI manager retains answer ownership
      ja: OpenAI manager が回答責任を保持
    descriptions:
      zh: 客服 manager 调用退款与政策专家作为 tools，核对返回后自行批准客户答复；AnswerOwnership 绑定 manager 的 ActorRoleBinding。
      en: A support manager calls refund and policy specialists as tools, reconciles returns, and approves the customer answer; AnswerOwnership binds the manager ActorRoleBinding.
      ja: サポート manager が専門家を tool として呼び、返却を照合して顧客回答を承認し、AnswerOwnership を manager binding に結び付けます。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: manager pattern (agents as tools)
    field_values:
      ownership_record_id: ownership-refund-answer-204
      responsibility_type: answer
      scope_ref: customer-refund-case-204#final-response
    related_node_ids:
      - CoordinationOwnershipRecord
      - AnswerOwnership
      - ControlOwnership
    related_relation_ids:
      - CoordinationOwnershipRecord-held_by-ActorRoleBinding
    source_claims:
      - claim-cor-openai
      - claim-cor-design
  - id: CoordinationOwnershipRecord-langgraph-handoff
    labels:
      zh: LangGraph handoff 转移控制
      en: LangGraph handoff transfers control
      ja: LangGraph handoff で制御移転
    descriptions:
      zh: 分诊节点 handoff 后专科节点成为活跃 agent；旧 ControlOwnership 在 released_at 终止，并为接收方创建新记录。
      en: After triage handoff the specialist becomes active; the former ControlOwnership ends at released_at and a new record is created for the recipient.
      ja: トリアージ handoff 後、専門ノードが active になり、旧 ControlOwnership は released_at で終了し受信側に新記録を作成します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: supervisor/worker handoff
    field_values:
      ownership_record_id: ownership-triage-control-9
      responsibility_type: control
      released_at: 2026-07-15T09:31:00Z
    related_node_ids:
      - CoordinationOwnershipRecord
      - ControlOwnership
    related_relation_ids: []
    source_claims:
      - claim-cor-langgraph
      - claim-cor-design
  - id: CoordinationOwnershipRecord-boundary-last-speaker
    labels:
      zh: 最后发言者不是归属记录
      en: Last speaker is not ownership
      ja: 最終発言者は帰属記録ではない
    descriptions:
      zh: 追踪仅显示 worker-3 最后发送消息，没有 responsibility_type、scope 或 ActorRoleBinding。
      en: A trace only shows worker-3 sent the latest message with no responsibility_type, scope, or ActorRoleBinding.
      ja: トレースは worker-3 が最後に送信したことだけを示し、responsibility_type・scope・ActorRoleBinding がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: ownership versus activity boundary
    field_values: {}
    related_node_ids:
      - CoordinationOwnershipRecord
    related_relation_ids: []
    source_claims:
      - claim-cor-design
parent_relation: null
relations:
  - id: CoordinationOwnershipRecord-held_by-ActorRoleBinding
    predicate: held_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由参与者角色绑定持有
      en: held by actor-role binding
      ja: アクター役割バインディングに保持される
    definitions:
      zh: 协同责任记录由有效 ActorRoleBinding 持有，而不是抽象角色类或最后发言者。
      en: CoordinationOwnershipRecord is held by an effective ActorRoleBinding rather than an abstract role class or latest speaker.
      ja: CoordinationOwnershipRecord は抽象役割や最終発言者ではなく有効 ActorRoleBinding によって保持されます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: holds_ownership_record
      labels:
        zh: 持有协同责任记录
        en: holds coordination ownership record
        ja: 調整責任記録を保持する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-cor-design]
    distinct_fact_rationale:
      zh: 记录实际责任落点，不与角色分类或主体身份合并。
      en: Records actual responsibility holder separate from role taxonomy or actor identity.
      ja: 実際の責任保持者を役割分類や主体同一性と統合しません。
    layout_role: cross-link
    target: concept:ActorRoleBinding
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Supervisor/worker control and handoff intervals.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Manager final-answer ownership versus handoff control.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Ownership record versus role definition boundary.
source_claims:
  - id: claim-cor-openai
    source: openai-agents
    supports: OpenAI distinguishes manager final-answer ownership from handoff control transfer; Moonweave records each as scoped CoordinationOwnershipRecord intervals.
    locator: Orchestrating multiple agents > Manager pattern and handoffs
    evidence_kind: official
    confidence: high
  - id: claim-cor-langgraph
    source: langgraph
    supports: LangGraph supervisor/worker patterns change active controller at runtime; ownership intervals must move with control.
    locator: Multi-agent > Subagents and supervisor nodes
    evidence_kind: official
    confidence: high
  - id: claim-cor-design
    source: moonweave-design
    supports: Moonweave separates ownership facts from role definitions and message order.
    locator: CoordinationOwnershipRecord concept boundary
    evidence_kind: design-inference
    confidence: high
