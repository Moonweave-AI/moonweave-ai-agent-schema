schema: moonweave.ai/ontology-node/v1
id: CoordinationOwnershipRecord
kind: concept
labels:
  zh: 协调归属记录
  en: coordination ownership record
  ja: 調整帰属記録
semantics:
  short_definition:
    zh: 协同责任记录是在给定范围与时间内把一种协同责任绑定到实际承担者的信息记录。
    en: A coordination ownership record binds one coordination responsibility to an actual holder for a stated scope and time.
    ja: 調整責任記録は、指定範囲と時間について一つの調整責任を実際の保持者に結び付ける情報記録です。
  definition:
    zh: 协同责任记录是一种信息记录，其种差是：它引用有效 ActorRoleBinding，并记录责任类型、任务或会话范围、生效与终止时间以及转移依据；角色类别本身不是责任持有者。
    en: A CoordinationOwnershipRecord is an information record distinguished by referencing an effective ActorRoleBinding and recording responsibility type, task or session scope, effective and end times, and transfer provenance; a role class by itself is not the holder.
    ja: 調整責任記録は情報記録の一種であり、有効な ActorRoleBinding を参照して責任種別、タスクまたはセッション範囲、開始・終了時刻、移転根拠を記録します。役割クラス自体は保持者ではありません。
  why_needed:
    zh: 角色说明可能由多人承担且会随 handoff 改变；带时间与范围的责任记录才能重建某一时刻谁真正负责。
    en: A role description may be borne by several actors and can change through handoff; only a scoped, time-bounded ownership record can reconstruct who was actually responsible at a given moment.
    ja: 同じ役割を複数主体が担いハンドオフで変化し得るため、範囲と時間を持つ責任記録だけが特定時点の実責任者を再構成できます。
  includes:
    - zh: 责任类型、持有者的 ActorRoleBinding、适用任务或会话、有效区间和转移来源。
      en: Responsibility type, holder ActorRoleBinding, applicable task or session, validity interval, and transfer source.
      ja: 責任種別、保持者の ActorRoleBinding、対象タスクまたはセッション、有効期間、移転元。
  excludes:
    - zh: 没有实际承担者的角色定义、一次委派请求，以及只记录发言顺序的消息日志。
      en: A role definition without an actual bearer, a delegation request, and a message log that only records speaking order.
      ja: 実際の担い手を持たない役割定義、委任要求、発言順だけを記録するメッセージログ。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys:
    - ownership_record_id
    - revision
  fields:
    - id: ownership_record_id
      labels:
        zh: 归属记录标识
        en: ownership-record ID
        ja: 帰属記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一条协调责任归属记录；责任转移或范围变化产生新修订而不覆盖原记录。
        en: Stably identifies a coordination-ownership record; responsibility transfer or scope change creates a new revision without overwriting history.
        ja: 一件の調整責任帰属記録を安定して識別し、責任移転や範囲変更は履歴を上書きせず新リビジョンにします。
      allowed_values: []
      pattern: ^ownership-[A-Za-z0-9._:-]+$
      example_value: ownership-support-answer-204
      source_claims:
        - claim-coordination-ownership-record-002
    - id: revision
      labels:
        zh: 归属修订
        en: ownership revision
        ja: 帰属リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一归属记录在责任范围或持有者发生有效变更后形成的不可变版本。
        en: Identifies an immutable version created when the effective holder or responsibility scope of the record changes.
        ja: 有効な保持者または責任範囲が変わった際に作成される不変版を識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
      example_value: "5"
      source_claims:
        - claim-coordination-ownership-record-003
    - id: responsibility_type
      labels:
        zh: 责任类型
        en: responsibility type
        ja: 責任種別
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分下一步控制、最终答案责任和结果问责，禁止用笼统 owner 值掩盖三者差异。
        en: Distinguishes next-step control, final-answer accountability, and result accountability instead of collapsing them into a generic owner value.
        ja: 次手制御・最終回答責任・結果説明責任を区別し、曖昧な owner 値へ統合しません。
      allowed_values:
        - id: ResponsibilityTypeControl
          value: control
          labels:
            zh: 控制责任
            en: control responsibility
            ja: 制御責任
          definitions:
            zh: 对下一步路由、暂停、重试、升级或交接决定承担责任。
            en: Responsibility for next-step routing, pause, retry, escalation, or handoff decisions.
            ja: 次手の経路選択・停止・再試行・上位移管・引継ぎ判断に対する責任です。
          status: accepted
          source_claims:
            - claim-coordination-ownership-record-004
        - id: ResponsibilityTypeAnswer
          value: answer
          labels:
            zh: 最终答案责任
            en: final-answer responsibility
            ja: 最終回答責任
          definitions:
            zh: 对面向请求方的最终答案之完整性、批准和发布承担责任。
            en: Responsibility for the completeness, approval, and release of the final answer delivered to the requester.
            ja: 依頼者へ届ける最終回答の完全性・承認・公開に対する責任です。
          status: accepted
          source_claims:
            - claim-coordination-ownership-record-005
        - id: ResponsibilityTypeResultAccountability
          value: result-accountability
          labels:
            zh: 结果问责
            en: result accountability
            ja: 結果説明責任
          definitions:
            zh: 对某项委派工作结果的正确性、证据和可追溯解释承担问责，但不自动拥有会话控制或最终发布权。
            en: Accountability for a delegated result's correctness, evidence, and traceable explanation without automatically owning conversation control or final release.
            ja: 委任結果の正確性・証拠・追跡可能な説明に対する責任であり、会話制御や最終公開権を自動的には含みません。
          status: accepted
          source_claims:
            - claim-coordination-ownership-record-006
      pattern: null
      example_value: answer
      source_claims:
        - claim-coordination-ownership-record-007
    - id: scope_ref
      labels:
        zh: 责任范围引用
        en: responsibility-scope reference
        ja: 責任範囲参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该责任适用的任务、会话、工作项或输出范围，防止把局部责任扩张为全局所有权。
        en: References the task, session, work item, or output scope to which responsibility applies, preventing local responsibility from becoming global ownership.
        ja: 責任が適用される task・session・work item・output 範囲を参照し、局所責任を全体所有へ拡張しません。
      allowed_values: []
      pattern: null
      example_value: task-risk-204#final-answer
      source_claims:
        - claim-coordination-ownership-record-008
    - id: effective_at
      labels:
        zh: 生效时刻
        en: effective at
        ja: 発効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该角色绑定开始实际承担指定责任的时刻，而不是记录创建文档的时间。
        en: Records when the named role binding actually begins bearing the specified responsibility rather than when the document was authored.
        ja: 文書作成時刻ではなく、指定 role binding が責任を実際に担い始める時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:30:00Z
      source_claims:
        - claim-coordination-ownership-record-009
    - id: released_at
      labels:
        zh: 解除时刻
        en: released at
        ja: 解除時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该角色绑定停止承担本记录所述责任的时刻；为空只表示尚未观察到解除。
        en: Records when the role binding stops bearing the responsibility asserted by this record; absence means no release has yet been observed.
        ja: この記録の責任を role binding が担わなくなる時刻を記録し、未設定は解除未観測のみを表します。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-coordination-ownership-record-010
    - id: transfer_basis_ref
      labels:
        zh: 转移依据引用
        en: transfer-basis reference
        ja: 移転根拠参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用授权、委派契约、移交事件或控制决定，用于说明本次责任获得或解除的合法依据。
        en: References an authorization, delegation contract, handoff event, or control decision that justifies acquiring or releasing this responsibility.
        ja: 責任取得・解除を正当化する authorization・delegation contract・handoff event・control decision を参照します。
      allowed_values: []
      pattern: null
      example_value: handoff-event-refund-77
      source_claims:
        - claim-coordination-ownership-record-011
  constraints:
    - id: coordination-ownership-effective-interval
      severity: error
      expression_language: plain
      expression: released_at is absent or released_at > effective_at
      explanations:
        zh: 责任解除时刻必须晚于其生效时刻。
        en: Responsibility must be released after it becomes effective.
        ja: 責任の解除時刻は発効時刻より後でなければなりません。
      source_claims:
        - claim-coordination-ownership-record-012
  required_relation_constraints:
    - id: coordination-ownership-held-by-one-binding
      direction: outgoing
      predicate: held_by
      target_concept_id: ActorRoleBinding
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条归属记录必须指向恰好一个在该范围和时点有效的 ActorRoleBinding；角色类别本身不能持有责任。
        en: Every ownership record must name exactly one ActorRoleBinding effective for its scope and time; a role class cannot itself hold responsibility.
        ja: 各帰属記録は範囲・時点で有効な ActorRoleBinding を一つだけ指し、役割クラス自体は責任を保持できません。
      source_claims:
        - claim-coordination-ownership-record-013
examples:
  - id: CoordinationOwnershipRecord-manual-positive-20260715
    labels:
      zh: CoordinationOwnershipRecord positive
      en: CoordinationOwnershipRecord positive
      ja: CoordinationOwnershipRecord positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 CoordinationOwnershipRecord：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps CoordinationOwnershipRecord: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が CoordinationOwnershipRecord 多 agent 協調に写像。
    field_values: {ownership_record_id: ownership-travel-control-204, revision: 1, responsibility_type: control, scope_ref: "travel-session-9#next-step", effective_at: 2026-07-15T09:20:00Z, released_at: 2026-07-15T09:31:00Z, transfer_basis_ref: handoff-88}

    related_node_ids:
      - CoordinationOwnershipRecord
    related_relation_ids: []
    source_claims:
      - claim-coordination-ownership-record-014

  - id: CoordinationOwnershipRecord-manual-boundary-20260715
    labels:
      zh: CoordinationOwnershipRecord boundary
      en: CoordinationOwnershipRecord boundary
      ja: CoordinationOwnershipRecord boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 CoordinationOwnershipRecord 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not CoordinationOwnershipRecord work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で CoordinationOwnershipRecord work_specification ではない。
    field_values: {}

    related_node_ids:
      - CoordinationOwnershipRecord
    related_relation_ids: []
    source_claims:
      - claim-coordination-ownership-record-015

  - id: CoordinationOwnershipRecord-counterexample-role-class-label
    labels:
      zh: CoordinationOwnershipRecord counterexample
      en: CoordinationOwnershipRecord counterexample
      ja: CoordinationOwnershipRecord counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 CoordinationOwnershipRecord RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style CoordinationOwnershipRecord RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 CoordinationOwnershipRecord ではない。
    field_values: {ownership_record_id: absent, responsibility_type: absent, scope_ref: absent, effective_at: absent, actor_role_binding_ref: absent}

    related_node_ids:
      - CoordinationOwnershipRecord
      - CoordinationRole
    related_relation_ids: []
    source_claims:
      - claim-coordination-ownership-record-015

  - id: CoordinationOwnershipRecord-instance-travel-control-handoff
    labels:
      zh: CoordinationOwnershipRecord instance
      en: CoordinationOwnershipRecord instance
      ja: CoordinationOwnershipRecord instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 CoordinationOwnershipRecord DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to CoordinationOwnershipRecord DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が CoordinationOwnershipRecord に写像。
    field_values: {ownership_record_id: ownership-travel-control-204, revision: 1, responsibility_type: control, scope_ref: "travel-session-9#next-step", effective_at: 2026-07-15T09:20:00Z, released_at: 2026-07-15T09:31:00Z, transfer_basis_ref: handoff-88, actor_role_binding_ref: actor-role-binding-manager-7}

    related_node_ids:
      - CoordinationOwnershipRecord
      - ControlOwnership
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-coordination-ownership-record-014

