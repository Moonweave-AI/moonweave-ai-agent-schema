          en: Positive case for held by actor-role binding
          ja: アクター役割バインディングに保持されるの正例
        scenario_id: null
        descriptions:
          zh: control-17 的 held_by 指向 binding-travel-manager-2；该绑定在 session-4 有效并连接实际协调器与 Orchestrator。
          en: control-17 is held_by binding-travel-manager-2, which is effective for session-4 and connects the actual coordinator to Orchestrator.
          ja: control-17 の held_by は binding-travel-manager-2 を指し、このバインディングは session-4 で有効で実際の調整役を Orchestrator へ接続します。
        field_values: {}
