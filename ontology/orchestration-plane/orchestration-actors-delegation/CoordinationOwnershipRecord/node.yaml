    definitions:
      zh: 协同责任记录由参与者角色绑定持有，表示一个责任记录把答案或控制责任落实到特定有效 ActorRoleBinding，而不是抽象角色类或最后发言者。
      en: CoordinationOwnershipRecord is held by ActorRoleBinding when an ownership record assigns answer or control responsibility to one effective role binding rather than to an abstract role class or latest speaker.
      ja: CoordinationOwnershipRecord が ActorRoleBinding に保持されるとは、回答または制御責任を抽象役割クラスや最終発言者ではなく、一つの有効な役割バインディングへ割り当てることです。
    cardinality: null
