sibling_differentiation:
  - sibling_concept_id: AnswerOwnership
    shared_parent_concept_id: CoordinationOwnershipRecord
    differentia:
      zh: 端点特定对照：父节点 CoordinationOwnershipRecord：ControlOwnership（semantic kind=information，骨架 ControlOwnership-is_a-CoordinationOwnershipRecord）；AnswerOwnership（semantic kind=information，骨架 AnswerOwnership-is_a-CoordinationOwnershipRecord）。双端条件：ControlOwnership 条件：“控制归属是一种协调归属记录；其区分条件是：它记录当前由哪个参与者控制下一步工作流，包括管理者保留控制或通过交接转移控制”；AnswerOwnership 条件：“答案归属是以如下事实为区分特征的协调归属记录：它记录在委派、交接、审查或综合之后，哪个协同参与者对最终答复或产物负责”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent CoordinationOwnershipRecord: ControlOwnership (semantic kind=information, backbone ControlOwnership-is_a-CoordinationOwnershipRecord); AnswerOwnership (semantic kind=information, backbone AnswerOwnership-is_a-CoordinationOwnershipRecord). Endpoint conditions: ControlOwnership condition: “As a coordination ownership record, Control ownership is distinguished by the fact that it records which actor currently controls the next workflow step, including whether control is retained by a manager or transferred through handoff”; AnswerOwnership condition: “Answer ownership is a coordination ownership record; its differentiating condition is that it records which coordinating actor is accountable for the final response or artifact after delegation, handoff, review, or synthesis”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 CoordinationOwnershipRecord：ControlOwnership（semantic kind=information、バックボーン ControlOwnership-is_a-CoordinationOwnershipRecord）；AnswerOwnership（semantic kind=information、バックボーン AnswerOwnership-is_a-CoordinationOwnershipRecord）。両端条件：ControlOwnership の条件：「調整帰属記録に属する制御帰属は、次の事実を種差とします：それは、次のワークフロー手順を現在どの参加者が制御するかを記録し、管理者が保持する場合と引き継ぎで移転する場合を区別します」；AnswerOwnership の条件：「回答帰属は調整帰属記録の一種であり、次の条件で区別されます：それは、委任、引き継ぎ、レビュー、統合の後で、どの協調参加者が最終回答または成果物に責任を持つかを記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-control-ownership-012
