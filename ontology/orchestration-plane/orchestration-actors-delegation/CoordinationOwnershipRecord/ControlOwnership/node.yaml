schema: moonweave.ai/ontology-node/v1
id: ControlOwnership
kind: concept
labels:
  en: control ownership
  zh: 控制归属
  ja: 制御帰属
semantics:
  short_definition:
    zh: 记录谁可在特定范围内路由、继续、暂停或 handoff 工作流下一步。
    en: Records who may route, continue, pause, or hand off the next workflow step within a scope.
    ja: 指定範囲内で次のワークフロー手順をルーティング・続行・一時停止・handoff できる者を記録します。
  definition:
    zh: ControlOwnership 是 CoordinationOwnershipRecord 的特化，responsibility_type=control，并附加 control_action_scope 与 decision_boundary。OpenAI handoff 转移 active agent 时 ControlOwnership 随接收方移动；LangGraph supervisor 在 worker 返回后仍保留 ControlOwnership；CrewAI manager_llm 在 hierarchical 模式中控制 task 分配。它不是最终答案责任（AnswerOwnership），也不赋予 WorkerRole 全局路由权。
    en: ControlOwnership specializes CoordinationOwnershipRecord with responsibility_type=control plus control_action_scope and decision_boundary. OpenAI handoffs move ControlOwnership to the recipient; LangGraph supervisors retain ControlOwnership after worker returns; CrewAI manager_llm controls task assignment in hierarchical mode. It is not AnswerOwnership and does not grant WorkerRole global routing authority.
    ja: ControlOwnership は responsibility_type=control と control_action_scope・decision_boundary を持つ特化です。OpenAI handoff で移転し、LangGraph supervisor は worker 返却後も保持、CrewAI manager_llm は hierarchical で task 割当を制御します。AnswerOwnership でも WorkerRole の全体ルーティング権でもありません。
  why_needed:
    zh: manager 调用子智能体与 handoff 给另一智能体后果不同；显式控制责任防止两个参与者同时推进同一流程。
    en: Manager subagent calls and handoffs have different consequences; explicit control ownership prevents two participants advancing the same workflow concurrently.
    ja: manager の subagent 呼び出しと handoff は結果が異なるため、制御責任を明示して同時進行を防ぎます。
  includes:
    - zh: 对下一步路由、继续、暂停、重试或 handoff 的有效决策权限。
      en: Effective authority to route, continue, pause, retry, or hand off the next step.
      ja: 次手のルーティング・続行・一時停止・再試行・handoff 権限。
  excludes:
    - zh: 只对最终答复负责的 AnswerOwnership，以及仅执行已分配步骤的 WorkerRole。
      en: AnswerOwnership without next-step authority, and WorkerRole executing assigned steps only.
      ja: 次手権限のない AnswerOwnership、割当手順のみ実行する WorkerRole。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangGraph conditional_edges 的 route 函数返回值决定下一节点，但 ControlOwnership 归属 supervisor 而非 worker。OpenAI agents-as-tools 调用不转移 ControlOwnership；handoff 必须终止旧记录并创建新记录。CrewAI Process 控制 task 顺序时也应对齐 ControlOwnership 区间。
    en: LangGraph route functions choose the next node, but ControlOwnership stays with the supervisor, not the worker. OpenAI agents-as-tools calls do not transfer ControlOwnership; handoffs must end the old record and create a new one. CrewAI Process task ordering should align ControlOwnership intervals similarly.
    ja: LangGraph route 関数は次ノードを選びますが ControlOwnership は supervisor に残ります。OpenAI agents-as-tools は ControlOwnership を移しません。handoff では旧記録を終了し新記録を作成します。
  typical_input:
    - description: OpenAI handoff changing active agent.
      format: |
        handoff(to_agent=refund_specialist)
      source_claims: [claim-co-openai]
    - description: LangGraph supervisor routing after worker return.
      format: |
        builder.add_conditional_edges("supervisor", route_fn, {...})
      source_claims: [claim-co-langgraph]
  typical_output:
    - description: ControlOwnership interval with permitted actions.
      format: |
        {
          "responsibility_type": "control",
          "control_action_scope": ["route", "pause", "handoff"],
          "scope_ref": "travel-session-9#next-step"
        }
      source_claims: [claim-co-design]
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff versus manager-as-tools control retention.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Supervisor conditional routing after worker nodes.
structure:
  identity_keys: []
  fields:
    - id: control_action_scope
      labels:
        zh: 控制动作范围
        en: control-action scope
        ja: 制御動作範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出持有者可执行的路由、继续、暂停、重试、升级或 handoff 动作。
        en: Lists routing, continue, pause, retry, escalation, or handoff actions the holder may perform.
        ja: routing・continue・pause・retry・escalation・handoff 動作を列挙します。
      allowed_values:
        - id: ControlActionRoute
          value: route
          labels:
            zh: 选择路径
            en: route
            ja: 経路選択
          definitions:
            zh: 从可用目标中选择下一条执行路径。
            en: Select the next execution path from eligible targets.
            ja: 適格な対象から次の実行経路を選択します。
          source_claims: [claim-co-langgraph]
        - id: ControlActionContinue
          value: continue
          labels:
            zh: 继续
            en: continue
            ja: 続行
          definitions:
            zh: 允许当前控制流进入已确定的下一步。
            en: Allow control flow to proceed to the determined next step.
            ja: 制御フローを次手へ進めます。
          source_claims: [claim-co-openai]
        - id: ControlActionPause
          value: pause
          labels:
            zh: 暂停
            en: pause
            ja: 一時停止
          definitions:
            zh: 在保留可恢复状态的同时暂停后续执行。
            en: Pause further execution while retaining resumable state.
            ja: 再開可能な状態を保持して後続実行を一時停止します。
          source_claims: [claim-co-langgraph]
        - id: ControlActionRetry
          value: retry
          labels:
            zh: 重试
            en: retry
            ja: 再試行
          definitions:
            zh: 依据失败与次数边界重新安排一次尝试。
            en: Schedule another attempt under failure and attempt bounds.
            ja: 失敗条件と回数境界に従い再試行を予定します。
          source_claims: [claim-co-design]
        - id: ControlActionEscalate
          value: escalate
          labels:
            zh: 升级处理
            en: escalate
            ja: 上位移管
          definitions:
            zh: 把决定权移交给更高权限或专门责任方。
            en: Refer decision authority to a higher-authority or specialist party.
            ja: 判断権限を上位または専門責任主体へ移します。
          source_claims: [claim-co-design]
        - id: ControlActionHandoff
          value: handoff
          labels:
            zh: 交接控制
            en: handoff
            ja: 制御引継ぎ
          definitions:
            zh: 把当前会话或任务的主动控制权转移给另一智能体。
            en: Transfer active control of the conversation or task to another agent.
            ja: 会話またはタスクの能動制御を別エージェントへ移します。
          source_claims: [claim-co-openai]
      example_value: [route, pause, handoff]
      source_claims: [claim-co-design]
    - id: decision_boundary
      labels:
        zh: 决定边界
        en: decision boundary
        ja: 判断境界
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定每类控制动作的适用条件、禁止条件和必须升级边界。
        en: Applicability, prohibition, and mandatory-escalation boundaries for control actions.
        ja: 各制御動作の適用条件・禁止条件・必須エスカレーション境界を規定します。
      example_value:
        may_route_when: confidence>=0.8
        must_escalate_when: policy_override_required
      source_claims: [claim-co-openai]
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlOwnership-openai-tools
    labels:
      zh: OpenAI tools 调用保留控制
      en: OpenAI tool call retains control
      ja: OpenAI tool 呼び出しで制御保持
    descriptions:
      zh: 旅行协调器调用航班专家作为 tool；专家返回后不能自行呼叫酒店专家，ControlOwnership 仍在协调器。
      en: A travel coordinator calls a flight specialist as a tool; after return the specialist cannot invoke the hotel specialist; ControlOwnership stays with the coordinator.
      ja: 旅行調整役が航空券専門家を tool として呼び、返却後も ControlOwnership は調整役に残ります。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: agents as tools
    field_values:
      control_action_scope: [route, pause, handoff]
    related_node_ids: [ControlOwnership, Orchestrator]
    related_relation_ids: []
    source_claims: [claim-co-openai]
  - id: ControlOwnership-langgraph-supervisor
    labels:
      zh: LangGraph supervisor 保留控制
      en: LangGraph supervisor retains control
      ja: LangGraph supervisor が制御を保持
    descriptions:
      zh: centralized supervisor 调用 research_worker 并接收结果；下一步路由仍由 supervisor 的 ControlOwnership 决定。
      en: A centralized supervisor calls research_worker and receives its result; next-step routing remains under supervisor ControlOwnership.
      ja: centralized supervisor が research_worker を呼び結果を受け取り、次手ルーティングは supervisor の ControlOwnership 下にあります。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: centralized supervisor
    field_values:
      scope_ref: research-session-4#next-step
    related_node_ids: [ControlOwnership, Orchestrator, WorkerRole]
    related_relation_ids: []
    source_claims: [claim-co-langgraph]
  - id: ControlOwnership-boundary-handoff
    labels:
      zh: handoff 转移控制
      en: Handoff transfers control
      ja: handoff で制御移転
    descriptions:
      zh: 分诊 handoff 后专科决定后续工具调用；旧 ControlOwnership 必须终止并为接收方创建新记录。
      en: After triage handoff the specialist decides subsequent tool calls; the former ControlOwnership must end and a new record is created for the recipient.
      ja: トリアージ handoff 後、専門側が後続 tool 呼び出しを決め、旧 ControlOwnership は終了し受信側に新記録を作成します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values: {}
    related_node_ids: [ControlOwnership, AnswerOwnership]
    related_relation_ids: []
    source_claims: [claim-co-openai]
