schema: moonweave.ai/ontology-node/v1
id: ControlOwnership
kind: concept
labels:
  en: control ownership
  zh: 控制归属
  ja: 制御帰属
semantics:
  short_definition:
    zh: 控制责任归属是对谁可决定工作流下一步的可审计记录。
    en: Control ownership is an auditable record of who may decide the next workflow step.
    ja: 制御責任の帰属は、次のワークフローステップを決定できる者の監査可能な記録です。
  definition:
    zh: 控制责任归属是一种协同责任记录，其种差是：它在特定时点和范围内标明哪个有效角色绑定可路由、继续、暂停或 handoff 工作流；它不等同于最终答案责任。
    en: Control ownership is a CoordinationOwnershipRecord distinguished by naming the active role binding authorized, at a stated time and scope, to decide the next workflow step by routing, continuing, pausing, or handing off the workflow; it is not final-answer accountability.
    ja: 制御責任の帰属は調整責任記録の一種であり、指定時刻と範囲でワークフローをルーティング、続行、一時停止、ハンドオフできる有効な役割バインディングを示します。最終回答責任とは異なります。
  why_needed:
    zh: 管理者调用子智能体与把控制权 handoff 给另一个智能体具有不同后果；显式控制责任可防止两个参与者同时推进同一流程。
    en: A manager calling a subagent and handing control to another agent have different consequences; explicit control ownership prevents two participants from advancing the same workflow concurrently.
    ja: 管理者によるサブエージェント呼び出しと別エージェントへの制御移転は結果が異なるため、制御責任を明示して二者が同じフローを同時に進めることを防ぎます。
  includes:
    - zh: 对下一步路由、继续、暂停、重试或 handoff 的有效决策权限。
      en: Effective authority to route, continue, pause, retry, or hand off the next step.
      ja: 次のステップをルーティング、続行、一時停止、再試行、ハンドオフする有効な権限。
  excludes:
    - zh: 只对最终答复负责但无权选择下一步的 AnswerOwnership，以及单纯执行已分配步骤的 WorkerRole。
      en: AnswerOwnership without authority over the next step, and a WorkerRole merely executing an assigned step.
      ja: 次の手順を選ぶ権限のない AnswerOwnership、および割り当て済み手順を実行するだけの WorkerRole。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys: []
  fields:
    - id: control_action_scope
      labels:
        zh: 控制动作范围
        en: control-action scope
        ja: 制御動作範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出持有者在给定范围内可执行的路由、继续、暂停、重试、升级或移交动作。
        en: Lists routing, continue, pause, retry, escalation, or handoff actions the holder may perform within the stated scope.
        ja: 指定範囲で保持者が行える routing・continue・pause・retry・escalation・handoff 動作を列挙します。
      allowed_values:
        - id: ControlActionRoute
          value: route
          labels:
            zh: 选择路径
            en: route
            ja: 経路選択
          definitions:
            zh: 从可用目标中选择下一条执行路径。
            en: Select the next execution path from eligible targets.
            ja: 適格な対象から次の実行経路を選択します。
          status: accepted
          source_claims:
            - claim-control-ownership-002
        - id: ControlActionContinue
          value: continue
          labels:
            zh: 继续
            en: continue
            ja: 続行
          definitions:
            zh: 允许当前控制流进入已确定的下一步。
            en: Allow the current control flow to proceed to its determined next step.
            ja: 現在の制御フローを決定済みの次手へ進めます。
          status: accepted
          source_claims:
            - claim-control-ownership-003
        - id: ControlActionPause
          value: pause
          labels:
            zh: 暂停
            en: pause
            ja: 一時停止
          definitions:
            zh: 在保留可恢复状态的同时暂停后续执行。
            en: Pause further execution while retaining resumable state.
            ja: 再開可能な状態を保持して後続実行を一時停止します。
          status: accepted
          source_claims:
            - claim-control-ownership-004
        - id: ControlActionRetry
          value: retry
          labels:
            zh: 重试
            en: retry
            ja: 再試行
          definitions:
            zh: 依据适用的失败与次数边界重新安排一次尝试。
            en: Schedule another attempt under the applicable failure and attempt bounds.
            ja: 適用される失敗条件と回数境界に従って再試行を予定します。
          status: accepted
          source_claims:
            - claim-control-ownership-005
        - id: ControlActionEscalate
          value: escalate
          labels:
            zh: 升级处理
            en: escalate
            ja: 上位移管
          definitions:
            zh: 把决定权或处理责任移交给更高权限或专门责任方。
            en: Refer decision authority or handling responsibility to a higher-authority or specialist party.
            ja: 判断権限または処理責任を上位権限・専門責任主体へ移します。
          status: accepted
          source_claims:
            - claim-control-ownership-006
        - id: ControlActionHandoff
          value: handoff
          labels:
            zh: 交接控制
            en: handoff
            ja: 制御引継ぎ
          definitions:
            zh: 把当前会话或任务的主动控制权转移给另一智能体。
            en: Transfer active control of the current conversation or task to another agent.
            ja: 現在の会話またはタスクの能動制御を別エージェントへ移します。
          status: accepted
          source_claims:
            - claim-control-ownership-007
      pattern: null
      example_value:
        - route
        - pause
        - handoff
      source_claims:
        - claim-control-ownership-008
    - id: decision_boundary
      labels:
        zh: 决定边界
        en: decision boundary
        ja: 判断境界
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定每类控制动作的适用条件、禁止条件和必须升级到其他角色的边界。
        en: Specifies applicability, prohibition, and mandatory-escalation boundaries for each permitted control action.
        ja: 各許可制御動作の適用条件・禁止条件・他役割への必須エスカレーション境界を規定します。
      allowed_values: []
      pattern: null
      example_value:
        may_route_when: confidence>=0.8
        must_escalate_when: policy_override_required
      source_claims:
        - claim-control-ownership-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlOwnership-manual-positive-20260715
    labels:
      zh: ControlOwnership positive
      en: ControlOwnership positive
      ja: ControlOwnership positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 ControlOwnership：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps ControlOwnership: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が ControlOwnership 多 agent 協調に写像。
    field_values: {ownership_record_id: ownership-travel-next-step-9, revision: 2, responsibility_type: control, scope_ref: "travel-session-9#next-step", effective_at: 2026-07-15T09:20:00Z}

    related_node_ids:
      - ControlOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - ControlOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-control-ownership-010

  - id: ControlOwnership-manual-boundary-20260715
    labels:
      zh: ControlOwnership boundary
      en: ControlOwnership boundary
      ja: ControlOwnership boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 ControlOwnership 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not ControlOwnership work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で ControlOwnership work_specification ではない。
    field_values: {}

    related_node_ids:
      - ControlOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - ControlOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-control-ownership-011

  - id: ControlOwnership-counterexample-answer-ownership-confusion
    labels:
      zh: ControlOwnership counterexample
      en: ControlOwnership counterexample
      ja: ControlOwnership counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 ControlOwnership RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style ControlOwnership RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 ControlOwnership ではない。
    field_values: {ownership_record_id: ownership-refund-answer-204, responsibility_type: answer, control_action_scope: absent, decision_boundary: absent}

    related_node_ids:
      - ControlOwnership
      - AnswerOwnership
      - CoordinationOwnershipRecord
    related_relation_ids:
      - ControlOwnership-is_a-CoordinationOwnershipRecord
      - AnswerOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-control-ownership-011

  - id: ControlOwnership-instance-travel-manager-retains-control
    labels:
      zh: ControlOwnership instance
      en: ControlOwnership instance
      ja: ControlOwnership instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 ControlOwnership DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to ControlOwnership DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が ControlOwnership に写像。
    field_values: {ownership_record_id: ownership-travel-next-step-9, revision: 2, responsibility_type: control, scope_ref: "travel-session-9#next-step", effective_at: 2026-07-15T09:20:00Z, released_at: null}

    related_node_ids:
      - ControlOwnership
      - CoordinationOwnershipRecord
      - Orchestrator
    related_relation_ids:
      - ControlOwnership-is_a-CoordinationOwnershipRecord
    source_claims:
      - claim-control-ownership-010
      - claim-coordination-role-002

