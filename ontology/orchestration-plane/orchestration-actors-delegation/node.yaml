      zh: 查询 task-risk-204 在 2026-07-16T09:30:00Z 的承担者时，Actor agent-coordinator-7 通过 has_actor_role_binding 指向仍在有效期内的 arb-coordinator-7-task-204，该绑定再通过 ActorRoleBinding-binds-CoordinationRole 指向 Orchestrator。
