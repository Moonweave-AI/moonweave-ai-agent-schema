  key_notion:
    zh: 协作职责与责任持有
    en: coordination duty and responsibility holding
    ja: 協調責務と責任保持
  owns_when:
    zh: 当对象是可由不同主体承担的协作职责定义，或是说明某一有效 ActorRoleBinding 在给定范围和时间内实际持有何种协调责任的记录时，由本模块拥有。
    en: Own an object when it is a collaboration-duty definition that different actors may bear, or a record stating which coordination responsibility an effective ActorRoleBinding actually holds for a stated scope and interval.
    ja: 対象が異なる主体の担える協働責務定義、または有効な ActorRoleBinding が指定範囲・期間に実際に保持する調整責任を示す記録である場合に所有します。
  references_when:
    zh: 需要确认承担者身份时引用 runtime-actors 的 Actor 与 ActorRoleBinding；需要确认一次委派、移交、工具调用或授权决定时引用其各自模块。本模块只回答“职责是什么”和“在何时何范围由谁负责”，不重建这些发生。
    en: Reference runtime Actors and ActorRoleBindings to identify the bearer, and reference the owning modules for a delegation, handoff, tool invocation, or authorization decision. This module answers only what the duty is and who is responsible over which scope and interval; it does not recreate those occurrences.
    ja: 担い手の同一性には runtime-actors の Actor と ActorRoleBinding を、委任・引き継ぎ・ツール呼出し・認可判断には各所有モジュールを参照します。本モジュールは「責務は何か」「いつ・どの範囲で誰が負うか」だけを答え、それらの発生を再構築しません。
  boundary_decisions:
    - other_module_id: orchestration-delegation-handoff
      subject_concept_ids:
        - WorkerRole
      decision: owns
      owner_module_id: orchestration-actors-delegation
      rationale:
        zh: WorkerRole 是可跨委派复用的职责类型，由协同角色拥有；委派与移交域的 WorkerPool 只把它列为某次选择的合格成员。contains 建立成员资格，不把 WorkerRole 的 owner 转移给候选池。
        en: WorkerRole is a responsibility type reusable across delegations and is owned by coordination roles; WorkerPool in delegation and handoff only lists it as an eligible member for one selection context. contains establishes membership without transferring WorkerRole ownership to the pool.
        ja: WorkerRole は delegation を跨いで再利用する responsibility type で coordination roles が所有します。delegation/handoff の WorkerPool は一 selection context の eligible member として列挙するだけです。contains は membership を成立させますが WorkerRole の owner を pool へ移しません。
      relation_ids:
        - WorkerPool-contains-WorkerRole
      relation_not_applicable_reason: null
      source_claims:
        - claim-orchestration-actors-delegation-014
        - claim-orchestration-actors-delegation-015
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-orchestration-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项复核确认本条只投影跨模块边 WorkerPool-contains-WorkerRole 的角色端点 WorkerRole。WorkerRole 是可复用角色类型；候选池成员关系不会把其 canonical owner 转给委派模块。
              en: Point-by-point review confirms that this record projects only the WorkerRole endpoint of the cross-module WorkerPool-contains-WorkerRole relation. WorkerRole is a reusable role type, and pool membership does not transfer its canonical owner to the delegation module.
              ja: 項目別審査により、この記録は module 横断 WorkerPool-contains-WorkerRole 関係の WorkerRole endpoint だけを投影すると確認しました。WorkerRole は再利用可能な role type であり、pool membership は canonical owner を delegation module へ移しません。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核确认 subject_concept_ids 必须恰好等于所引跨模块关系中由本模块拥有的端点，因此只保留 WorkerRole；CoordinationOwnershipRecord 与 SubagentRole 不参与这条边。
              en: Structural review confirms that subject_concept_ids must equal the owner-side endpoint of the cited cross-module relation, so only WorkerRole remains; CoordinationOwnershipRecord and SubagentRole do not participate in this edge.
              ja: 構造審査により subject_concept_ids は引用する module 横断関係の owner 側 endpoint と一致すべきため WorkerRole だけを残し、CoordinationOwnershipRecord と SubagentRole はこの edge に参加しません。
    - other_module_id: orchestration-delegation-handoff
      subject_concept_ids:
        - WorkerPool
      decision: references
      owner_module_id: orchestration-delegation-handoff
      rationale:
        zh: WorkerPool 是一次委派选择上下文中的候选角色集合，由委派与移交拥有；协同角色域只因 WorkerPool-contains-WorkerRole 跨模块成员关系而引用它，不把候选池并入角色类型层级。
        en: WorkerPool is the candidate-role collection for one delegation selection context and is owned by delegation and handoff. Coordination roles reference it only through the cross-module WorkerPool-contains-WorkerRole membership relation and do not place the pool in the role-type hierarchy.
        ja: WorkerPool は一 delegation selection context の candidate-role collection で delegation/handoff が所有します。coordination roles は module 横断 WorkerPool-contains-WorkerRole membership relation を通じて参照するだけで、pool を role-type hierarchy へ入れません。
      relation_ids:
        - WorkerPool-contains-WorkerRole
      relation_not_applicable_reason: null
      source_claims:
        - claim-orchestration-actors-delegation-016
        - claim-orchestration-actors-delegation-017
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-orchestration-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项复核确认本条只投影 WorkerPool-contains-WorkerRole 的候选池端点 WorkerPool。它由一次委派选择上下文识别并归委派模块；本模块不把候选池误列为角色类型。
              en: Point-by-point review confirms that this record projects only the WorkerPool endpoint of WorkerPool-contains-WorkerRole. It is identified by one delegation selection context and owned by delegation-handoff; this module does not classify the pool as a role type.
              ja: 項目別審査により、この記録は WorkerPool-contains-WorkerRole の WorkerPool endpoint だけを投影すると確認しました。これは一件の delegation selection context で識別され delegation-handoff が所有し、本 module は pool を role type として分類しません。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
