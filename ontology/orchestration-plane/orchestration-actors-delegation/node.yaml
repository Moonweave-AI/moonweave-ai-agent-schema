schema: moonweave.ai/ontology-node/v1
id: orchestration-actors-delegation
kind: module
labels:
  zh: 协作职责与责任归属
  en: Coordination responsibilities and ownership
  ja: 協調責務と責任帰属
semantics:
  short_definition:
    zh: 定义多智能体协作中可复用的职责类型（CoordinationRole），并记录在特定工作范围与时间内由谁承担协调责任（CoordinationOwnershipRecord）。
    en: Defines reusable coordination duty types (CoordinationRole) and records who bears coordination responsibility for a stated work scope and interval (CoordinationOwnershipRecord).
    ja: マルチエージェント協働の再利用可能な責務型（CoordinationRole）と、特定作業範囲・期間の調整責任保持者（CoordinationOwnershipRecord）を定義します。
  definition:
    zh: orchestration-actors-delegation 有两个互补而不重叠的根：CoordinationRole 是可复用的职责定义，不是承担职责的主体；CoordinationOwnershipRecord 是带范围、时间与转移依据的责任事实，不是角色类别。OpenAI Agents SDK 的 Agent 与 A2A AgentCard 描述参与者能力，但 Actor 与 ActorRoleBinding 仍由运行域拥有；委派和移交发生仍由 delegation-handoff 域拥有。角色可以声明履职所需的权限范围，但角色本身不等于授权决定，也不会自动产生委派、handoff 或控制转移。
    en: orchestration-actors-delegation has two complementary, non-overlapping roots. CoordinationRole is a reusable duty definition, not the actor that bears it. CoordinationOwnershipRecord is a scoped and time-bounded responsibility fact with transfer provenance, not a role class. OpenAI Agents SDK Agents and A2A AgentCards describe participant capabilities, but Actors and ActorRoleBindings remain runtime-owned; delegation and handoff occurrences remain delegation-handoff-owned. A role may state authority scope needed to perform duties but is not an authorization decision and does not automatically create delegation, handoff, or control transfer.
    ja: CoordinationRole は責務定義、CoordinationOwnershipRecord は責任事実です。Actor/ActorRoleBinding は runtime 所有、delegation/handoff は delegation-handoff 所有です。
  why_needed:
    zh: 在不改变参与者身份的前提下表达职责切换，并能回答某个时点、某项工作由谁负有协调、执行、审查或汇总责任。
    en: Expresses responsibility changes without changing participant identity and answers who bore coordination, execution, review, or synthesis responsibility for particular work at a particular time.
    ja: 参加者同一性を変えず責務切替を表し、特定時点・作業の責任者を回答できます。
  includes:
    - zh: CoordinationRole 及 Orchestrator、SubagentRole、WorkerRole 等专门类型。
      en: CoordinationRole and Orchestrator, SubagentRole, WorkerRole, and related specializations.
      ja: CoordinationRole と Orchestrator、SubagentRole、WorkerRole 等。
    - zh: CoordinationOwnershipRecord、ControlOwnership、AnswerOwnership 及 bearer binding、有效区间、转移依据。
      en: CoordinationOwnershipRecord, ControlOwnership, AnswerOwnership, bearer binding, validity interval, and transfer provenance.
      ja: CoordinationOwnershipRecord、ControlOwnership、AnswerOwnership、bearer binding、有効期間、移転根拠。
  excludes:
    - zh: HumanActor、AgentActor、ActorRoleBinding（runtime 域）；DelegationProcess、Handoff（delegation-handoff 域）；AgentCard 协议对象（除非真实 A2A 载荷）。
      en: HumanActor, AgentActor, ActorRoleBinding (runtime domain); DelegationProcess, Handoff (delegation-handoff domain); AgentCard protocol objects unless a real A2A payload exists.
      ja: HumanActor/AgentActor/ActorRoleBinding、DelegationProcess/Handoff、実 A2A payload 以外の AgentCard。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 实现时先发布 CoordinationRole 版本，再在责任变更边界创建 CoordinationOwnershipRecord，引用 actor_role_binding_ref、scope_ref、valid_from/valid_to 与 transfer_basis_ref。OpenAI Agent 名称或 A2A AgentCard.name 是能力描述来源，不直接当作 Moonweave Role 身份；Runner 运行记录也不自动产生 OwnershipRecord。
    en: Publish CoordinationRole revisions first, then create CoordinationOwnershipRecord at responsibility-change boundaries referencing actor_role_binding_ref, scope_ref, valid_from/valid_to, and transfer_basis_ref. OpenAI Agent names or A2A AgentCard.name are capability description sources, not direct Moonweave Role identity; Runner run records do not automatically create OwnershipRecords.
    ja: 先に CoordinationRole を公開し、責任変更境界で CoordinationOwnershipRecord を作成して actor_role_binding_ref/scope_ref/valid_from/valid_to/transfer_basis_ref を参照します。
  typical_input:
    - description: Role assignment at delegation acceptance
      format: |-
        ownership = record_ownership(role_ref="worker-role@v2", bearer_binding_ref="binding:agent-7", scope_ref="deleg:pr-42", valid_from="2026-07-19T10:00:00Z")
    - description: Control ownership transfer after handoff
      format: |-
        control = transfer_control(from_binding="binding:orchestrator-1", to_binding="binding:billing-agent", scope_ref="session:8821", basis_ref="handoff:ho-91")
  typical_output:
    - description: Scoped ownership record with validity interval
      format: |-
        {"ownership_record_id":"own-worker-42","role_ref":"worker-role@v2","bearer_binding_ref":"binding:agent-7","scope_ref":"deleg:pr-42","valid_from":"2026-07-19T10:00:00Z","valid_to":null}
  reference_implementations:
    - name: OpenAI Agents SDK Agent definition
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents Agent identity and instructions as capability sources, not Moonweave role ownership.
    - name: A2A AgentCard
      url: https://google.github.io/A2A/specification/
      description: Documents agent capability advertisement separate from coordination ownership facts.
  source_claims:
    - claim-orchestration-actors-delegation-module
    - claim-orchestration-actors-delegation-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识协作职责与责任归属模块。
        en: Stably identifies the coordination responsibilities and ownership module.
        ja: 協調責務と責任帰属モジュールを安定して識別します。
      allowed_values: [orchestration-actors-delegation]
      example_value: orchestration-actors-delegation
      source_claims: [claim-orchestration-actors-delegation-module]
    - id: role_roots
      labels:
        zh: 角色根概念
        en: role root concepts
        ja: 役割根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出可复用协调职责根概念。
        en: Lists reusable coordination duty roots.
        ja: 再利用可能な協調責務根を列挙します。
      example_value: '["CoordinationRole","Orchestrator","WorkerRole"]'
      source_claims: [claim-orchestration-actors-delegation-module]
    - id: ownership_roots
      labels:
        zh: 归属根概念
        en: ownership root concepts
        ja: 帰属根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出记录责任事实的根概念。
        en: Lists roots recording responsibility facts.
        ja: 責任事実を記録する根を列挙します。
      example_value: '["CoordinationOwnershipRecord","ControlOwnership","AnswerOwnership"]'
      source_claims: [claim-orchestration-actors-delegation-module]
  constraints:
    - id: orchestration-actors-delegation-role-not-actor
      expression: CoordinationRole defines duty types; concrete actors bear duties only through runtime-owned ActorRoleBinding referenced by CoordinationOwnershipRecord.
      explanation:
        zh: 角色描述职责，不替代参与者身份；责任记录必须引用 binding 与有效区间。
        en: Roles describe duties and do not replace participant identity; ownership records must reference bindings and validity intervals.
        ja: role は責務を記述し参加者 identity を置き換えません。ownership record は binding と有効期間を参照必須です。
      source_claims: [claim-orchestration-actors-delegation-boundary]
  required_relations: []
examples:
  - id: orchestration-actors-delegation-example-positive-worker-ownership
    labels:
      zh: orchestration-actors-delegation positive
      en: orchestration-actors-delegation positive
      ja: orchestration-actors-delegation positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 orchestration-actors-delegation：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps orchestration-actors-delegation: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が orchestration-actors-delegation 多 agent 協調に写像。
    field_values: {module_id: orchestration-actors-delegation, ownership_record_id: own-worker-42, role_ref: "worker-role@v2", bearer_binding_ref: binding:agent-7, scope_ref: deleg:pr-42, valid_from: 2026-07-19T10:00:00Z}

    related_node_ids:
      - CoordinationOwnershipRecord
      - WorkerRole
      - DelegationProcess
    related_relation_ids:
      - CoordinationOwnershipRecord-applies-CoordinationRole
    source_claims:
      - claim-orchestration-actors-delegation-module

  - id: orchestration-actors-delegation-example-counterexample-agent-as-role
    labels:
      zh: orchestration-actors-delegation counterexample
      en: orchestration-actors-delegation counterexample
      ja: orchestration-actors-delegation counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 orchestration-actors-delegation TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style orchestration-actors-delegation TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 orchestration-actors-delegation ではない。
    field_values: {module_id: orchestration-actors-delegation, role_ref: null, bearer_binding_ref: null}

    related_node_ids:
      - CoordinationRole
    related_relation_ids: []
    source_claims:
      - claim-orchestration-actors-delegation-boundary

  - id: orchestration-actors-delegation-example-boundary-handoff-control
    labels:
      zh: orchestration-actors-delegation boundary
      en: orchestration-actors-delegation boundary
      ja: orchestration-actors-delegation boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 orchestration-actors-delegation 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not orchestration-actors-delegation routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で orchestration-actors-delegation routing spec ではない。
    field_values: {module_id: orchestration-actors-delegation, ownership_record_id: own-control-91, role_ref: "orchestrator-role@v1", bearer_binding_ref: binding:billing-agent, scope_ref: session:8821, transfer_basis_ref: handoff:ho-91}

    related_node_ids:
      - ControlOwnership
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-orchestration-actors-delegation-module

  - id: orchestration-actors-delegation-example-instance-orchestrator-round
    labels:
      zh: orchestration-actors-delegation instance
      en: orchestration-actors-delegation instance
      ja: orchestration-actors-delegation instance
    descriptions:
      zh: Voyager 实例：curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → 映射 orchestration-actors-delegation。
      en: Voyager instance: curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → maps to orchestration-actors-delegation.
      ja: Voyager 实例 propose_task→code_generation→add が orchestration-actors-delegation に写像。
    field_values: {module_id: orchestration-actors-delegation, ownership_record_id: own-orch-round-3, role_ref: "orchestrator-role@v1", bearer_binding_ref: binding:orchestrator-1, scope_ref: loop-7:round-3, valid_from: 2026-07-19T09:00:00Z, valid_to: 2026-07-19T09:45:00Z}

    related_node_ids:
      - Orchestrator
      - ControlOwnership
      - ImprovementLoop
    related_relation_ids:
      - ControlOwnership-applies-Orchestrator
    source_claims:
      - claim-orchestration-actors-delegation-module

