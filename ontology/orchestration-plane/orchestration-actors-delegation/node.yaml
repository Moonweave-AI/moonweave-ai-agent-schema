        en: An object identified by role, responsibility scope, and validity interval belongs to coordination roles; one identified by invocation ID, arguments, attempts, and tool result belongs to invocation and execution.
        ja: ロール・責務範囲・有効期間で識別される対象は協調ロール、invocation id・引数・試行・ツール結果で識別される対象は呼び出しと実行に属します。
