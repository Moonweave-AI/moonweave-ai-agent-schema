      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-orchestration-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐根反例复核：CoordinationRole 是可由不同主体承担的职责定义；没有一次有效 ActorRoleBinding 也能先定义角色。CoordinationOwnershipRecord 则必须指向一个有效 ActorRoleBinding，故以 held_by 事实接入运行时承担者骨架，不再作为独立根。
            en: "Root-by-root counterexample review: CoordinationRole is a reusable responsibility definition and can exist before any effective ActorRoleBinding. A CoordinationOwnershipRecord, by contrast, must identify one effective ActorRoleBinding, so the held_by fact places it under the runtime bearer backbone instead of leaving it as an independent root."
            ja: 根ごとの反証確認：CoordinationRole は異なる主体が担える再利用可能な責任定義であり、有効な ActorRoleBinding がなくても先に定義できます。一方 CoordinationOwnershipRecord は有効な ActorRoleBinding を必ず特定するため、held_by 事実で runtime bearer 骨格へ接続し、独立根には残しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体反例确认 CoordinationRole 不能挂在承担者之下：角色类不等于实际主体。CoordinationOwnershipRecord 的完整身份却要求实际绑定、范围和有效期，因此 CoordinationOwnershipRecord-held_by-ActorRoleBinding 采用 parent=ActorRoleBinding、child=CoordinationOwnershipRecord 的非 is_a 主干。
            en: The ontology counterexample keeps CoordinationRole out from under a bearer because a role class is not an actual participant. The complete identity of CoordinationOwnershipRecord does require a concrete binding, scope, and validity, so CoordinationOwnershipRecord-held_by-ActorRoleBinding is the non-is_a backbone with parent ActorRoleBinding and child CoordinationOwnershipRecord.
            ja: ontology の反証では role class は実主体ではないため CoordinationRole を bearer 配下に置きません。CoordinationOwnershipRecord の完全な同一性には具体的 binding・scope・validity が必要なので、CoordinationOwnershipRecord-held_by-ActorRoleBinding を parent=ActorRoleBinding、child=CoordinationOwnershipRecord の非 is_a 主幹とします。
