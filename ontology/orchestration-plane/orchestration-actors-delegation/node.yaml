      semantic_area:
        zh: 协调责任与智能体工具调用
        en: Coordination responsibility versus agent-as-tool invocation
        ja: 協調責任とエージェントツール呼び出し
      candidate_concept_ids:
        - AnswerOwnership
        - Orchestrator
      overlap_reason:
        zh: Orchestrator 可发起 AgentAsToolInvocation，但前者是可复用协作角色，后者是具有调用参数、尝试和结果的一次程序化工具调用。 本条仅记录 AnswerOwnership、Orchestrator；其 canonical owner 是协同角色（orchestration-actors-delegation），因此 orchestration-actors-delegation 在此拥有这些概念。
        en: An Orchestrator may initiate AgentAsToolInvocation, but the former is a reusable collaboration role while the latter is one programmatic tool-call occurrence with arguments, attempts, and results. This record is limited to AnswerOwnership, Orchestrator; their canonical owner is Coordination roles (orchestration-actors-delegation), so orchestration-actors-delegation owns these concepts here.
        ja: Orchestrator は AgentAsToolInvocation を開始できますが、前者は再利用可能な協働ロール、後者は引数・試行・結果を持つ一回のプログラム的ツール呼び出しです。 この記録は AnswerOwnership、Orchestrator だけを対象とし、canonical owner は協調ロール（orchestration-actors-delegation）です。したがって orchestration-actors-delegation はここでこれらを所有します。
      disambiguation_test:
