      ja: task-risk-204 を 2026-07-16T09:30:00Z に照会すると、Actor agent-coordinator-7 は has_actor_role_binding で有効な arb-coordinator-7-task-204 に至り、その binding は ActorRoleBinding-binds-CoordinationRole で Orchestrator に至ります。
    field_values:
