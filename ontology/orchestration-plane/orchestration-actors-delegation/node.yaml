schema: moonweave.ai/ontology-node/v1
id: orchestration-actors-delegation
kind: module
labels:
  zh: 协作职责与责任归属
  en: Coordination responsibilities and ownership
  ja: 協調責務と責任帰属
semantics:
  short_definition:
    zh: 协作职责描述多智能体系统中“谁承担什么角色、在何时对哪项工作负责”。
    en: Coordination responsibilities describe who bears which role and is accountable for which work at a given time in multi-agent systems.
    ja: 協調責務は、マルチエージェントシステムで誰がどの役割を担い、いつどの作業に責任を負うかを表します。
  definition:
    zh: 本模块有两个互补根：CoordinationRole（Orchestrator、SubagentRole、WorkerRole 等）是可复用职责定义，不是承担主体；CoordinationOwnershipRecord（ControlOwnership、AnswerOwnership 等）是带范围、时间与转移依据的责任事实。实际主体通过运行域 ActorRoleBinding 承担角色，OwnershipRecord 引用该 binding。CrewAI Agent(role, goal, tools)、AutoGen AssistantAgent/UserProxyAgent、A2A AgentCard、LangGraph 节点函数是常见映射来源，但角色本身不等于 Actor、授权决定或委派发生。
    en: "This module has two complementary roots: CoordinationRole (Orchestrator, SubagentRole, WorkerRole, etc.) is a reusable duty definition, not the bearer; CoordinationOwnershipRecord (ControlOwnership, AnswerOwnership, etc.) is a scoped, time-bounded responsibility fact with transfer provenance. Concrete actors bear roles through runtime-owned ActorRoleBinding, which OwnershipRecord references. CrewAI Agent(role, goal, tools), AutoGen AssistantAgent/UserProxyAgent, A2A AgentCard, and LangGraph node functions are common mapping sources, but a role is not an Actor, authorization decision, or delegation occurrence."
    ja: 本モジュールは CoordinationRole（Orchestrator・SubagentRole・WorkerRole 等）と CoordinationOwnershipRecord（ControlOwnership・AnswerOwnership 等）の二根を持ちます。前者は再利用責務定義、後者は範囲・期間・移転根拠付き責任事実です。実主体は runtime ActorRoleBinding で役割を担い OwnershipRecord が binding を参照します。CrewAI Agent・AutoGen AssistantAgent/UserProxyAgent・A2A AgentCard・LangGraph ノード関数は写像源ですが、role は Actor・認可判断・委任発生ではありません。
  why_needed:
    zh: 同一个 agent 可能在一次运行中先当编排者、再当工作者；没有职责记录，就无法回答“九点三十分谁对这项任务负审查责任”。
    en: One agent may act as orchestrator then worker in a single run; without responsibility records, you cannot answer who bore review responsibility for a task at 9:30.
    ja: 一 agent が一回の実行で orchestrator から worker に変わることがあります。責務記録がなければ 9:30 に誰が review 責任を負ったか答えられません。
  includes:
    - zh: CoordinationRole 及 Orchestrator、SubagentRole、WorkerRole 等职责专门类型与其 is_a 树。
      en: CoordinationRole and specializations such as Orchestrator, SubagentRole, and WorkerRole with their is_a tree.
      ja: CoordinationRole と Orchestrator・SubagentRole・WorkerRole 等の特殊型と is_a tree。
    - zh: CoordinationOwnershipRecord 及 ControlOwnership、AnswerOwnership，含责任类型、ActorRoleBinding 引用、任务/会话范围、有效区间与转移依据。
      en: CoordinationOwnershipRecord including ControlOwnership and AnswerOwnership with responsibility type, ActorRoleBinding reference, task or session scope, validity interval, and transfer provenance.
      ja: CoordinationOwnershipRecord（ControlOwnership・AnswerOwnership）と責任種別・ActorRoleBinding 参照・task/session 範囲・有効期間・移転根拠。
  excludes:
    - zh: "HumanActor、AgentActor、SystemServiceActor 与 ActorRoleBinding 主体身份（owner: runtime-actors-bindings）；Role 不等于 Actor。"
      en: "HumanActor, AgentActor, SystemServiceActor, and ActorRoleBinding bearer identity (owner: runtime-actors-bindings); Role is not Actor."
      ja: "HumanActor・AgentActor・SystemServiceActor・ActorRoleBinding 主体 identity（owner: runtime-actors-bindings）。Role は Actor ではありません。"
    - zh: "DelegationProcess、Handoff、WorkerSelection（owner: orchestration-delegation-handoff）；角色不自动产生委派事件。"
      en: "DelegationProcess, Handoff, and WorkerSelection (owner: orchestration-delegation-handoff); a role does not automatically create delegation events."
      ja: "DelegationProcess・Handoff・WorkerSelection（owner: orchestration-delegation-handoff）。role は委任イベントを自動生成しません。"
    - zh: "AuthorizationGrant 与 PolicyDecision（owner: safety-permission-policy）；角色可声明所需权限范围，但不等于授权结果。"
      en: "AuthorizationGrant and PolicyDecision (owner: safety-permission-policy); a role may state required authority scope but is not an authorization outcome."
      ja: "AuthorizationGrant・PolicyDecision（owner: safety-permission-policy）。role は必要権限範囲を示せますが認可結果ではありません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 CrewAI Agent(role, goal, tools) 为可承担 WorkerRole/Orchestrator 的配置源、AutoGen AssistantAgent/UserProxyAgent 为对话参与者与职责边界、A2A AgentCard(name, skills, endpoint) 为远程 actor 发现与技能声明、LangGraph 节点函数为图内 actor 执行单元。Agent 配置与 CoordinationRole 是规范；一次 ActorRoleBinding 生效区间与 CoordinationOwnershipRecord 是发生事实。AgentCard skills 支持 capability match 证据，但不替代 WorkerSelectionDecisionActivity。
    en: "Integrations should map CrewAI Agent(role, goal, tools) as configuration sources for WorkerRole/Orchestrator bearers, AutoGen AssistantAgent/UserProxyAgent as conversational participants with duty boundaries, A2A AgentCard(name, skills, endpoint) for remote actor discovery and skill declaration, and LangGraph node functions as in-graph actor execution units separately. Agent configuration and CoordinationRole are specifications; one ActorRoleBinding validity interval and CoordinationOwnershipRecord are occurrences. AgentCard skills support capability-match evidence but do not replace WorkerSelectionDecisionActivity."
    ja: 統合では CrewAI Agent(role, goal, tools)、AutoGen AssistantAgent/UserProxyAgent、A2A AgentCard(name, skills, endpoint)、LangGraph ノード関数を個別に写像します。Agent 設定と CoordinationRole は仕様、ActorRoleBinding 有効区間と CoordinationOwnershipRecord は発生事実です。AgentCard skills は capability match 証拠を支援しますが WorkerSelectionDecisionActivity を代替しません。
  typical_input:
    - description: CrewAI Agent with role, goal, and tools mapped to a CoordinationRole bearer.
      format: |
        from crewai import Agent

        researcher = Agent(
            role="Senior Research Analyst",
            goal="Uncover cutting-edge developments in AI",
            backstory="Expert at finding sources",
            tools=[search_tool, scrape_tool],
        )
        # Map role string → WorkerRole; runtime binding via ActorRoleBinding
      source_claims: [claim-orchestration-actors-delegation-crewai]
    - description: AutoGen AssistantAgent and UserProxyAgent as conversational actor pair.
      format: |
        from autogen import AssistantAgent, UserProxyAgent

        assistant = AssistantAgent(name="coder", llm_config={"model": "gpt-4o"})
        user_proxy = UserProxyAgent(name="user", human_input_mode="NEVER")
        # Orchestrator ↔ Worker duty split via role bindings per task scope
      source_claims: [claim-orchestration-actors-delegation-autogen]
    - description: A2A AgentCard declaring name, skills, and endpoint for remote actor discovery.
      format: |
        GET /.well-known/agent-card.json
        {
          "name": "Billing Specialist",
          "url": "https://billing.example.com/a2a/v1",
          "skills": [{"id": "process-refund", "name": "Process Refund"}],
          "capabilities": {"streaming": true}
        }
      source_claims: [claim-orchestration-actors-delegation-a2a]
    - description: LangGraph node function as an in-graph actor execution unit.
      format: |
        def billing_agent(state):
            return {"messages": [model.invoke(state["messages"])]}

        builder.add_node("billing_agent", billing_agent)
        # Node name + function → actor binding for WorkerRole in graph scope
      source_claims: [claim-orchestration-actors-delegation-langgraph]
  typical_output:
    - description: Moonweave-local role binding and ownership projection at query time.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "query_task_id": "task-risk-204",
          "query_at": "2026-07-16T09:30:00Z",
          "actor_id": "agent-coordinator-7",
          "actor_role_binding_id": "arb-coordinator-7-task-204",
          "coordination_role_id": "Orchestrator",
          "ownership_record_id": "ownership-control-204@1"
        }
      source_claims: [claim-orchestration-actors-delegation-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent(role, goal, tools) configuration for crew role assignments.
    - name: AutoGen
      url: https://microsoft.github.io/autogen/
      description: AssistantAgent, UserProxyAgent conversational actor patterns.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: AgentCard with name, skills, endpoint for remote actor discovery.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node functions as in-graph actor execution units.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 协作职责模块的稳定标识，不是某个 CoordinationRole 或 OwnershipRecord 的标识。
        en: Stable identifier of the coordination-responsibilities module, not a CoordinationRole or OwnershipRecord identifier.
        ja: 協調責務モジュールの安定識別子であり、CoordinationRole や OwnershipRecord の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-actors-delegation$'
      example_value: orchestration-actors-delegation
      allowed_values: []
      source_claims: [claim-orchestration-actors-delegation-design]
    - id: role_actor_boundary
      labels: {zh: 角色/主体边界, en: Role/actor boundary, ja: 役割／主体境界}
      definitions:
        zh: 声明 CoordinationRole 为职责定义，Actor 与 ActorRoleBinding 为运行主体与承担关系，CoordinationOwnershipRecord 为责任事实。
        en: States that CoordinationRole is a duty definition, Actor and ActorRoleBinding are runtime bearer relations, and CoordinationOwnershipRecord is a responsibility fact.
        ja: CoordinationRole は責務定義、Actor と ActorRoleBinding は runtime 担い手関係、CoordinationOwnershipRecord は責任事実であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: role-vs-actor
      allowed_values: [role-vs-actor]
      source_claims: [claim-orchestration-actors-delegation-design]
  constraints:
    - id: role-binding-requires-validity-and-role-fact
      severity: error
      expression_language: plain
      expression: A CoordinationRole bearer query must traverse Actor-has_actor_role_binding-ActorRoleBinding and ActorRoleBinding-binds-CoordinationRole with valid_from/valid_until covering query_at; UI labels alone are insufficient.
      explanation:
        zh: 看板列名不能证明职责承担。
        en: A board column label does not prove role bearing.
        ja: ボード列ラベルは role 担当を証明しません。
      source_claims: [claim-orchestration-actors-delegation-design]
    - id: coordination-role-not-actor-subtype
      severity: error
      expression_language: plain
      expression: Orchestrator, SubagentRole, and WorkerRole must reach CoordinationRole via is_a; they must not be modeled as permanent Actor subtypes.
      explanation:
        zh: 同一 AgentActor 可在不同区间承担不同角色。
        en: One AgentActor may bear different roles in different intervals.
        ja: 同一 AgentActor は異なる区間で異なる role を担えます。
      source_claims: [claim-orchestration-actors-delegation-design]
    - id: ownership-record-requires-scope-and-provenance
      severity: warning
      expression_language: plain
      expression: CoordinationOwnershipRecord must declare responsibility type, scope (task or session), validity interval, and transfer provenance when superseded.
      explanation:
        zh: 无范围与区间的“负责人”不可审计。
        en: An owner without scope and interval is not auditable.
        ja: 範囲と区間のない owner は監査できません。
      source_claims: [claim-orchestration-actors-delegation-design]
  required_relations:
    - id: actors-module-organizes-coordination-role
      direction: outgoing
      predicate: organizes
      target_concept_id: CoordinationRole
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 CoordinationRole 职责类型链。
        en: The module organizes at least one CoordinationRole duty-type chain.
        ja: モジュールは少なくとも一つの CoordinationRole 責務型連鎖を組織します。
      source_claims: [claim-orchestration-actors-delegation-design]
    - id: actors-module-records-ownership
      direction: outgoing
      predicate: records
      target_concept_id: CoordinationOwnershipRecord
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块通过 CoordinationOwnershipRecord 记录带范围与区间的责任事实。
        en: The module records scoped, interval-bounded responsibility facts through CoordinationOwnershipRecord.
        ja: モジュールは CoordinationOwnershipRecord を通じ範囲・区間付き責任事実を記録します。
      source_claims: [claim-orchestration-actors-delegation-design]
examples:
  - id: orchestration-actors-delegation-example-crewai-agent-role
    labels:
      zh: CrewAI Agent 映射 WorkerRole
      en: CrewAI Agent mapped to WorkerRole
      ja: CrewAI Agent を WorkerRole に対応
    descriptions:
      zh: CrewAI researcher Agent(role="Senior Research Analyst", goal="...", tools=[search_tool]) 在 task-benchmark-31 运行中通过 arb-researcher-31 绑定 WorkerRole；AgentActor agent-researcher-4 的 Actor 类型不因承担 WorkerRole 而改变。
      en: CrewAI researcher Agent(role="Senior Research Analyst", goal="...", tools=[search_tool]) bears WorkerRole via arb-researcher-31 during task-benchmark-31; AgentActor agent-researcher-4 retains its Actor type while bearing WorkerRole.
      ja: CrewAI researcher Agent が task-benchmark-31 実行中 arb-researcher-31 経由で WorkerRole を担い、AgentActor agent-researcher-4 の Actor 型は WorkerRole 担当で変わりません。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: v1.15 — Agent(role, goal, tools)
    field_values:
      framework: crewai
      agent_role_string: Senior Research Analyst
      agent_goal: Uncover cutting-edge developments in AI
      agent_tools:
        - search_tool
        - scrape_tool
      actor_id: agent-researcher-4
      actor_type: AgentActor
      actor_role_binding_id: arb-researcher-31
      coordination_role_id: WorkerRole
      scope_task_id: task-benchmark-31
      valid_from: 2026-07-16T10:00:00Z
      valid_until: 2026-07-16T11:30:00Z
    related_node_ids:
      - CoordinationRole
      - WorkerRole
      - Actor
      - ActorRoleBinding
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
      - has_actor_role_binding
      - ActorRoleBinding-binds-CoordinationRole
    source_claims:
      - claim-orchestration-actors-delegation-crewai
      - claim-orchestration-actors-delegation-design
  - id: orchestration-actors-delegation-example-autogen-assistant-proxy
    labels:
      zh: AutoGen AssistantAgent 与 UserProxyAgent 职责分工
      en: AutoGen AssistantAgent and UserProxyAgent duty split
      ja: AutoGen AssistantAgent と UserProxyAgent の責務分担
    descriptions:
      zh: AutoGen 对话中 AssistantAgent coder 通过 arb-coder-run-55 承担 WorkerRole 执行代码任务，UserProxyAgent user 通过 arb-user-run-55 承担 Orchestrator 范围的 ControlOwnership ownership-control-55@1；二者均为 AgentActor，职责通过 binding 切换而非类型变更。
      en: In an AutoGen conversation, AssistantAgent coder bears WorkerRole via arb-coder-run-55 for code tasks while UserProxyAgent user bears ControlOwnership ownership-control-55@1 with Orchestrator scope via arb-user-run-55; both are AgentActors and duties switch via bindings, not type changes.
      ja: AutoGen 対話で AssistantAgent coder は arb-coder-run-55 経由 WorkerRole を担い、UserProxyAgent user は arb-user-run-55 経由 Orchestrator 範囲の ControlOwnership ownership-control-55@1 を担います。両者は AgentActor で、責務は binding 切替であり型変更ではありません。
    example_source:
      product: AutoGen
      url: https://microsoft.github.io/autogen/
      version: AgentChat — AssistantAgent, UserProxyAgent
    field_values:
      framework: autogen
      assistant_name: coder
      user_proxy_name: user
      run_id: run-55
      worker_binding_id: arb-coder-run-55
      orchestrator_binding_id: arb-user-run-55
      ownership_record_id: ownership-control-55@1
      ownership_type: ControlOwnership
      scope_run_id: run-55
    related_node_ids:
      - CoordinationRole
      - Orchestrator
      - WorkerRole
      - CoordinationOwnershipRecord
      - ControlOwnership
    related_relation_ids:
      - ActorRoleBinding-binds-CoordinationRole
      - CoordinationOwnershipRecord-records-ControlOwnership
    source_claims:
      - claim-orchestration-actors-delegation-autogen
      - claim-orchestration-actors-delegation-design
  - id: orchestration-actors-delegation-example-a2a-agent-card
    labels:
      zh: A2A AgentCard 远程 actor 发现
      en: A2A AgentCard remote actor discovery
      ja: A2A AgentCard による remote actor 発見
    descriptions:
      zh: 协调 agent 读取 billing AgentCard(name="Billing Specialist", skills=[process-refund]) 后将 RemoteAgentReference ref-billing@1 与 WorkerRole 绑定；Capability match 使用 skills 列表作为 evidence，但 binding 仍需有效区间与 ActorRoleBinding-binds-CoordinationRole 事实。
      en: After reading billing AgentCard(name="Billing Specialist", skills=[process-refund]), the coordinator binds RemoteAgentReference ref-billing@1 to WorkerRole; capability match uses the skills list as evidence, but the binding still requires a validity interval and ActorRoleBinding-binds-CoordinationRole fact.
      ja: 調整 agent が billing AgentCard を読み RemoteAgentReference ref-billing@1 を WorkerRole に binding します。capability match は skills リストを証拠に使いますが、binding には有効区間と ActorRoleBinding-binds-CoordinationRole 事実が必要です。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: v1.0 — AgentCard name, skills, endpoint
    field_values:
      framework: a2a
      agent_card_name: Billing Specialist
      agent_card_url: https://billing.example.com/.well-known/agent-card.json
      skills:
        - process-refund
      remote_agent_ref: ref-billing@1
      actor_role_binding_id: arb-billing-remote-884
      coordination_role_id: WorkerRole
      capability_match_skill: process-refund
      valid_from: 2026-07-16T14:00:00Z
    related_node_ids:
      - CoordinationRole
      - WorkerRole
      - ActorRoleBinding
      - RemoteAgentReference
    related_relation_ids:
      - ActorRoleBinding-binds-CoordinationRole
      - ActorRoleBinding-references-RemoteAgentReference
    source_claims:
      - claim-orchestration-actors-delegation-a2a
      - claim-orchestration-actors-delegation-design
  - id: orchestration-actors-delegation-example-langgraph-node-actor
    labels:
      zh: LangGraph 节点函数作为 actor
      en: LangGraph node function as actor
      ja: LangGraph ノード関数を actor として扱う
    descriptions:
      zh: LangGraph 图内 billing_agent 与 triage 节点函数分别通过 arb-billing-graph-7 与 arb-triage-graph-7 绑定 WorkerRole 与 Orchestrator；查询 09:30Z 时只有 arb-coordinator-7-task-204 仍在有效期内并 binds Orchestrator。
      en: In-graph billing_agent and triage node functions bind WorkerRole and Orchestrator via arb-billing-graph-7 and arb-triage-graph-7; at query 09:30Z only arb-coordinator-7-task-204 remains effective and binds Orchestrator.
      ja: グラフ内 billing_agent と triage ノード関数は arb-billing-graph-7 と arb-triage-graph-7 で WorkerRole と Orchestrator に binding します。09:30Z 照会時有効なのは arb-coordinator-7-task-204 の Orchestrator binding のみです。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 — add_node actor functions
    field_values:
      framework: langgraph
      nodes:
        triage: triage_node_fn
        billing_agent: billing_node_fn
      query_task_id: task-risk-204
      query_at: 2026-07-16T09:30:00Z
      effective_binding_id: arb-coordinator-7-task-204
      effective_role_id: Orchestrator
      expired_binding_id: arb-worker-22-task-204
      expired_valid_until: 2026-07-16T09:00:00Z
    related_node_ids:
      - CoordinationRole
      - Orchestrator
      - WorkerRole
      - ActorRoleBinding
    related_relation_ids:
      - has_actor_role_binding
      - ActorRoleBinding-binds-CoordinationRole
    source_claims:
      - claim-orchestration-actors-delegation-langgraph
      - claim-orchestration-actors-delegation-design
  - id: orchestration-actors-delegation-example-expired-binding-counter
    labels:
      zh: 失效 binding 不得返回为当前职责承担者
      en: Expired binding must not be returned as current role bearer
      ja: 失効 binding を現在の role 担当として返してはならない
    descriptions:
      zh: task-risk-204 看板显示 agent-worker-22 在 Worker 列，但 arb-worker-22-task-204 已于 09:00Z 失效且无 ActorRoleBinding-binds-CoordinationRole 事实；查询 09:30Z 时不得将其返回为 WorkerRole 承担者。
      en: The task-risk-204 board shows agent-worker-22 under Worker, but arb-worker-22-task-204 expired at 09:00Z with no ActorRoleBinding-binds-CoordinationRole fact; it must not be returned as WorkerRole bearer at query 09:30Z.
      ja: task-risk-204 board は agent-worker-22 を Worker 欄に表示しますが arb-worker-22-task-204 は 09:00Z に失効し ActorRoleBinding-binds-CoordinationRole 事実がありません。09:30Z 照会で WorkerRole 担当として返してはなりません。
    example_source:
      product: Moonweave coordination boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: role binding validity contract
    field_values:
      query_task_id: task-risk-204
      query_at: 2026-07-16T09:30:00Z
      actor_id: agent-worker-22
      actor_role_binding_id: arb-worker-22-task-204
      displayed_role_label: Worker
      valid_until: 2026-07-16T09:00:00Z
      role_binding_fact_present: false
      bearer_valid_at_query: false
    related_node_ids:
      - Actor
      - ActorRoleBinding
      - WorkerRole
    related_relation_ids:
      - has_actor_role_binding
      - ActorRoleBinding-binds-CoordinationRole
    source_claims:
      - claim-orchestration-actors-delegation-design
