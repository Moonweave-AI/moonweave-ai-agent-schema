schema: moonweave.ai/ontology-node/v1
id: orchestration-actors-delegation
kind: module
status: review
labels:
  zh: 协作职责与责任归属
  en: Coordination responsibilities and ownership
  ja: 協調責務と責任帰属
semantics:
  short_definition:
    zh: 定义多智能体协作中可复用的职责类型，并记录在特定工作范围和时间内由谁承担协调责任。CoordinationRole 描述编排、执行、审查、汇总等职责；CoordinationOwnershipRecord 记录责任持有者及有效区间。Actor 与 ActorRoleBinding 仍由运行域拥有，委派和移交发生仍由委派域拥有。
    en: Defines reusable responsibility types for multi-agent collaboration and records who bears a coordination responsibility for a stated work scope and interval. CoordinationRole describes duties such as orchestration, execution, review, and synthesis; CoordinationOwnershipRecord records the responsible bearer and validity interval. Actors and ActorRoleBindings remain runtime-owned, while delegation and handoff occurrences remain delegation-owned.
    ja: マルチエージェント協働で再利用できる責務型を定義し、特定の作業範囲と期間について誰が調整責任を負うかを記録します。CoordinationRole は編成・実行・審査・統合などの責務を表し、CoordinationOwnershipRecord は責任保持者と有効期間を記録します。Actor と ActorRoleBinding は実行域、委任・引き継ぎの発生は委任域が所有します。
  definition:
    zh: 本模块有两个互补而不重叠的根：CoordinationRole 是可复用的职责定义，不是承担职责的主体；CoordinationOwnershipRecord 是带范围、时间与转移依据的责任事实，不是角色类别。实际主体通过运行域的 ActorRoleBinding 承担角色，责任记录再引用该绑定。角色可以声明履职所需的权限范围，但角色本身不等于授权决定，也不会自动产生委派、调用或控制转移。
    en: This module has two complementary, non-overlapping roots. CoordinationRole is a reusable duty definition, not the actor that bears it. CoordinationOwnershipRecord is a scoped and time-bounded responsibility fact with transfer provenance, not a role class. A concrete actor bears a role through a runtime-owned ActorRoleBinding, which the ownership record then references. A role may state the authority scope needed to perform its duties, but it is not an authorization decision and does not itself create delegation, invocation, or control transfer.
    ja: 本モジュールには相補的で重複しない二つの根があります。CoordinationRole は再利用可能な責務定義で、担い手ではありません。CoordinationOwnershipRecord は範囲・期間・移転根拠を持つ責任事実で、役割クラスではありません。実主体は実行域の ActorRoleBinding を通じて役割を担い、責任記録がその binding を参照します。役割は履行に必要な権限範囲を示せますが、認可判断そのものではなく、委任・呼出し・制御移転を自動発生させません。
  why_needed:
    zh: 在不改变参与者身份的前提下表达职责切换，并能回答某个时点、某项工作由谁负有协调、执行、审查或汇总责任。
    en: Expresses responsibility changes without changing participant identity and answers who bore coordination, execution, review, or synthesis responsibility for particular work at a particular time.
    ja: 参加者の同一性を変えずに責務の切替を表し、特定時点・特定作業の調整・実行・審査・統合責任者を回答できるようにします。
  includes:
    - zh: CoordinationRole 及编排者、子智能体、工作者、审查者等角色专门类型。
      en: CoordinationRole and orchestrator, subagent, worker, reviewer, and related role specializations.
      ja: CoordinationRole と orchestrator、subagent、worker、reviewer などの役割特殊型。
    - zh: CoordinationOwnershipRecord，以及责任类型、实际承担者绑定、任务或会话范围、有效区间和责任转移依据。
      en: CoordinationOwnershipRecord together with responsibility type, actual bearer binding, task or session scope, validity interval, and responsibility-transfer provenance.
      ja: CoordinationOwnershipRecord と、責任種別・実担い手 binding・タスクまたはセッション範囲・有効期間・責任移転根拠。
  excludes:
    - zh: AgentAsToolInvocation 归调用与执行；协调角色只描述调用者在协作中的职责，不拥有一次程序化工具调用的发生身份。
      en: AgentAsToolInvocation belongs to invocation and execution; coordination roles describe the caller's collaboration responsibility but do not own the occurrence identity of a programmatic tool call.
      ja: AgentAsToolInvocation は呼び出しと実行に属し、協調ロールは呼び出し元の協働責務を記述しますが、プログラム的ツール呼び出しの発生同一性を所有しません。
    - zh: HumanActor、AgentActor、SystemServiceActor、ToolServiceActor 和 Model 等运行参与者归运行参与者与绑定；Role 不等于 Actor。
      en: HumanActor, AgentActor, SystemServiceActor, ToolServiceActor, Model, and other runtime participants belong to runtime actors and bindings; Role is not Actor.
      ja: HumanActor、AgentActor、SystemServiceActor、ToolServiceActor、Model 等は runtime actor/binding に属し、Role は Actor ではありません。
    - zh: DelegationProcess、Handoff、WorkerSelection 和委派契约归委派与移交；角色不会自动产生委派事件。
      en: DelegationProcess, Handoff, WorkerSelection, and delegation contracts belong to delegation and handoff; a role does not automatically create a delegation event.
      ja: DelegationProcess、Handoff、WorkerSelection、委任契約は委任と引き継ぎに属し、役割が自動的に委任イベントを生成することはありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 在不改变参与者身份的前提下表达职责切换，并能回答某个时点、某项工作由谁负有协调、执行、审查或汇总责任。
  en: Expresses responsibility changes without changing participant identity and answers who bore coordination, execution, review, or synthesis responsibility for particular work at a particular time.
  ja: 参加者の同一性を変えずに責務の切替を表し、特定時点・特定作業の調整・実行・審査・統合責任者を回答できるようにします。
