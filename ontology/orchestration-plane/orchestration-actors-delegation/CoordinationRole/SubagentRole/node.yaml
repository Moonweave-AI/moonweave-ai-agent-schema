schema: moonweave.ai/ontology-node/v1
id: SubagentRole
kind: concept
status: review
labels:
  zh: 子智能体角色
  en: subagent role
  ja: サブエージェント役割
semantics:
  short_definition:
    zh: 子智能体角色是在上级协同上下文中承担有边界自主工作的角色。
    en: A subagent role performs bounded autonomous work within a parent coordination context.
    ja: サブエージェント役割は、上位の調整コンテキスト内で境界付きの自律作業を担う役割です。
  definition:
    zh: 子智能体角色是一种 CoordinationRole，其种差是：它接收明确任务、上下文、权限和返回契约，进行有边界的智能体推理或工具使用，并把结果返回上级；它不是所有嵌套进程，也不是 AgentActor 子类。
    en: A SubagentRole is a CoordinationRole distinguished by receiving an explicit task, context, authority, and return contract, performing bounded agentic reasoning or tool use, and returning a result to a parent context; it is neither every nested process nor an AgentActor subtype.
    ja: サブエージェント役割は CoordinationRole の一種であり、明示されたタスク、コンテキスト、権限、返却契約を受け、境界付きのエージェント推論またはツール使用を行い、結果を上位コンテキストへ返します。すべての入れ子プロセスでも AgentActor の下位型でもありません。
  why_needed:
    zh: 该角色把被委派的推理边界和权限记录下来，使上级可验证返回结果是否在授权范围内，并区分子智能体与普通工具调用。
    en: The role records delegated reasoning boundaries and authority so the parent can verify whether returned results stayed within scope and distinguish a subagent from an ordinary tool call.
    ja: 委任された推論境界と権限を記録し、上位側が返却結果の範囲適合を検証し、通常のツール呼び出しと区別できます。
  includes:
    - zh: 具名子任务、最小必要上下文、可用工具或数据权限、预算和向上返回格式。
      en: A named subtask, minimum necessary context, tool or data authority, budget, and upward return format.
      ja: 名前付きサブタスク、必要最小限のコンテキスト、ツール・データ権限、予算、上位への返却形式。
  excludes:
    - zh: 没有自主推理职责的普通函数或资源，以及获得整个会话控制权后不再向原管理者返回的 handoff 接收者。
      en: A plain function or resource with no autonomous reasoning duty, and a handoff recipient that gains the whole conversation and no longer returns to the former manager.
      ja: 自律推論責務を持たない通常関数・資源、および会話全体の制御を得て旧管理者へ戻らないハンドオフ受信者。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: scoped_work_contract_ref
      labels:
        zh: 范围化工作合同引用
        en: scoped-work contract reference
        ja: 範囲付き作業契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须完成的具名工作范围、输入边界和完成判据，不把整场会话控制默认交给它。
        en: References the named work scope, input boundary, and completion criteria assigned to the subagent without implicitly transferring the whole conversation.
        ja: サブエージェントに割り当てる作業範囲・入力境界・完了基準を参照し、会話全体の制御は暗黙に移しません。
      allowed_values: []
      pattern: null
      example_value: work-contract-policy-check@4
      source_claims:
        - claim-subagent-role-002
    - id: return_contract_ref
      labels:
        zh: 返回合同引用
        en: return-contract reference
        ja: 返却契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体向上级返回结果、证据、警告和未完成原因所必须遵守的结构合同。
        en: References the structure contract governing results, evidence, warnings, and incompletion reasons returned to the supervising role.
        ja: 上位役割へ返す結果・証拠・警告・未完了理由の構造契約を参照します。
      allowed_values: []
      pattern: null
      example_value: subagent-return@2
      source_claims:
        - claim-subagent-role-003
    - id: allowed_capability_refs
      labels:
        zh: 允许能力引用
        en: allowed capability references
        ja: 許可能力参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该子智能体角色在范围化工作中可使用的工具、检索或执行能力版本；未列出的能力默认不可用。
        en: Lists tool, retrieval, and execution capability revisions available to the subagent role for the scoped work; unlisted capabilities remain unavailable.
        ja: 範囲付き作業で使用できる tool・retrieval・execution 能力版を列挙し、未列挙能力は既定で利用不可とします。
      allowed_values: []
      pattern: null
      example_value:
        - capability-policy-search@3
        - capability-citation-check@1
      source_claims:
        - claim-subagent-role-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SubagentRole-manual-positive-20260715
    kind: positive
    labels:
      zh: 子智能体角色正例
      en: Positive case for subagent role
      ja: サブエージェント役割の正例
    scenario_id: null
    descriptions:
      zh: 合规协调器把“核对第 4 条许可条件”连同两段法规上下文和只读检索工具交给 legal-review 子智能体，要求返回结论与引文。
      en: A compliance coordinator gives a legal-review subagent the task 'check condition 4', two regulation excerpts, read-only retrieval authority, and a contract to return a conclusion with citations.
      ja: コンプライアンス調整役が legal-review サブエージェントへ「条件4を確認」というタスク、規則抜粋2件、読み取り専用検索権限、結論と引用の返却契約を渡します。
    field_values:
      coordination_role_id: coord-role-legal-review-subagent
      revision: "3"
      responsibility_scope:
        includes:
          - check-license-condition-4
          - return-citations
        excludes:
          - approve-license
      authority_scope:
        may:
          - read-regulation
          - verify-citation
        must_escalate:
          - legal-policy-conflict
      valid_from: 2026-07-15T08:00:00Z
      scoped_work_contract_ref: work-contract-license-condition-4@3
      return_contract_ref: subagent-legal-review-return@2
      allowed_capability_refs:
        - capability-read-regulation@5
        - capability-citation-check@2
    related_node_ids:
      - SubagentRole
      - CoordinationRole
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    expected_result:
      zh: legal-review 的有效职责绑定归为 SubagentRole；控制与最终答案仍由上级协调器持有。
      en: Classify legal-review's effective duty binding as SubagentRole; control and final-answer ownership remain with the parent coordinator.
      ja: legal-review の有効な責務バインディングを SubagentRole とし、制御と最終回答責任は上位調整役に残します。
    why_valid_or_invalid:
      zh: 任务、上下文、权限与返回契约均有边界，并明确向上返回结果。
      en: Task, context, authority, and return contract are bounded, and the result explicitly returns upward.
      ja: タスク、コンテキスト、権限、返却契約が境界付けられ、結果を明示的に上位へ返します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-subagent-role-005
  - id: SubagentRole-manual-boundary-20260715
    kind: boundary
    labels:
      zh: 子智能体角色边界例
      en: Boundary case for subagent role
      ja: サブエージェント役割の境界例
    scenario_id: null
    descriptions:
      zh: 工作流启动一个 OCR 函数解析图片；函数没有独立目标、推理策略、委派权限或向上报告契约。
      en: A workflow starts an OCR function to parse an image; the function has no independent goal, reasoning policy, delegated authority, or upward reporting contract.
      ja: ワークフローが画像解析の OCR 関数を起動しますが、独立目標、推論方針、委任権限、上位報告契約を持ちません。
    field_values: {}
    related_node_ids:
      - SubagentRole
      - CoordinationRole
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    expected_result:
      zh: 该函数调用不是 SubagentRole；它应作为工具调用建模。
      en: The function call is not a SubagentRole and should be modeled as a tool invocation.
      ja: この関数呼び出しは SubagentRole ではなく、ツール呼び出しとして表します。
    why_valid_or_invalid:
      zh: 进程嵌套并不等于承担有边界的智能体职责，缺少自主推理和返回契约时不成立。
      en: Process nesting does not establish a bounded agentic responsibility; without autonomous reasoning and a return contract the role does not apply.
      ja: プロセスの入れ子だけでは境界付きエージェント責務にならず、自律推論と返却契約がなければ成立しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-subagent-role-006
