schema: moonweave.ai/ontology-node/v1
id: SubagentRole
kind: concept
labels:
  zh: 子智能体角色
  en: subagent role
  ja: サブエージェント役割
semantics:
  short_definition:
    zh: 在上级协同上下文中承担有边界自主工作并向上返回结果的协调角色。
    en: A coordination role performing bounded autonomous work within a parent context and returning results upward.
    ja: 上位調整コンテキスト内で境界付き自律作業を行い結果を上位へ返す調整役割です。
  definition:
    zh: SubagentRole 是 CoordinationRole 的特化，接收 scoped_work_contract_ref、return_contract_ref 与 allowed_capability_refs，进行有边界的推理或工具使用并向上级返回。映射：Cursor Task 子代理（独立上下文、返回父会话）；OpenAI Agents SDK handoff 目标（接管 bounded 工作）；LangGraph supervisor 调用的 subagent 节点。它不是普通函数调用，也不是 handoff 后获得整个会话控制且不再返回的接收者。
    en: SubagentRole specializes CoordinationRole with scoped_work_contract_ref, return_contract_ref, and allowed_capability_refs for bounded reasoning or tool use returning upward. Maps to Cursor Task subagents (isolated context, return to parent), OpenAI Agents SDK handoff targets (bounded work), and LangGraph subagent nodes called by a supervisor. It is not a plain function call nor a handoff recipient that keeps whole-conversation control without returning.
    ja: SubagentRole は scoped_work_contract_ref・return_contract_ref・allowed_capability_refs を持ち、境界付き推論/ツール使用を行い上位へ返します。Cursor Task subagent、OpenAI handoff 対象、LangGraph subagent ノードに写像されます。通常関数呼び出しや、会話全体制御を得て戻らない handoff 受信者ではありません。
  why_needed:
    zh: 记录被委派的推理边界与权限，使上级可验证返回是否在授权范围内，并区分子智能体与普通 tool 调用。
    en: Records delegated reasoning boundaries and authority so the parent verifies returns stayed in scope and distinguishes subagents from ordinary tool calls.
    ja: 委任された推論境界と権限を記録し、上位が返却範囲を検証し、通常 tool 呼び出しと区別できます。
  includes:
    - zh: 具名子任务、最小必要上下文、可用工具或数据权限、预算和向上返回格式。
      en: Named subtask, minimum context, tool or data authority, budget, and upward return format.
      ja: 名前付きサブタスク、最小コンテキスト、ツール/データ権限、予算、上位返却形式。
  excludes:
    - zh: 没有自主推理职责的普通函数，以及获得整个会话控制权后不再返回的 handoff 接收者。
      en: Plain functions without autonomous reasoning duty, and handoff recipients keeping whole conversation without returning.
      ja: 自律推論責務のない通常関数、会話全体を得て戻らない handoff 受信者。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: Cursor 中 spawn 的 Task subagent 应映射为 SubagentRole：带 scoped prompt、工具白名单与 structured return。OpenAI handoff 目标若仍向 manager 返回 bounded result 则接近 SubagentRole；若完全接管会话则不是。LangGraph subagent 模式要求 scoped input 与 final result return to supervisor。
    en: Cursor Task subagents map to SubagentRole with scoped prompt, tool allowlist, and structured return. OpenAI handoff targets returning bounded results to a manager resemble SubagentRole; full conversation takeover does not. LangGraph subagent pattern requires scoped input and final result return to supervisor.
    ja: Cursor Task subagent、OpenAI bounded handoff return、LangGraph subagent scoped input/return が SubagentRole に写像されます。
  typical_input:
    - description: Cursor Task subagent delegation.
      format: |
        # Parent agent spawns isolated subagent with scoped task and return contract
        Task(description="Verify license condition 4", readonly=True)
      source_claims: [claim-sar-cursor]
    - description: OpenAI handoff to specialist with return expectation.
      format: |
        handoff(to_agent=legal_review_agent, input={"clause": 4})
      source_claims: [claim-sar-openai]
  typical_output:
    - description: SubagentRole binding with return contract.
      format: |
        {
          "coordination_role_id": "coord-role-legal-review-subagent",
          "scoped_work_contract_ref": "work-contract-license-condition-4@3",
          "return_contract_ref": "subagent-legal-review-return@2"
        }
      source_claims: [claim-sar-design]
  reference_implementations:
    - name: Cursor
      url: https://cursor.com/docs
      description: Task subagent with isolated context and return to parent.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff targets for bounded specialist work.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Centralized supervisor subagent calls.
structure:
  identity_keys: []
  fields:
    - id: scoped_work_contract_ref
      labels:
        zh: 范围化工作合同引用
        en: scoped-work contract reference
        ja: 範囲付き作業契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须完成的具名工作范围、输入边界和完成判据。
        en: References named work scope, input boundary, and completion criteria for the subagent.
        ja: サブエージェントに割り当てる作業範囲・入力境界・完了基準を参照します。
      example_value: work-contract-policy-check@4
      source_claims: [claim-sar-langgraph]
    - id: return_contract_ref
      labels:
        zh: 返回合同引用
        en: return-contract reference
        ja: 返却契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用向上级返回结果、证据、警告和未完成原因的结构合同。
        en: Structure contract for results, evidence, warnings, and incompletion reasons returned upward.
        ja: 上位へ返す結果・証拠・警告・未完了理由の構造契約を参照します。
      example_value: subagent-return@2
      source_claims: [claim-sar-langgraph]
    - id: allowed_capability_refs
      labels:
        zh: 允许能力引用
        en: allowed capability references
        ja: 許可能力参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该子智能体在范围化工作中可使用的工具、检索或执行能力版本。
        en: Tool, retrieval, and execution capability revisions available for scoped work.
        ja: 範囲付き作業で使用できる tool/retrieval/execution 能力版を列挙します。
      example_value:
        - capability-policy-search@3
        - capability-citation-check@1
      source_claims: [claim-sar-openai]
  constraints: []
  required_relation_constraints: []
examples:
  - id: SubagentRole-cursor-task
    labels:
      zh: Cursor Task 子代理
      en: Cursor Task subagent
      ja: Cursor Task サブエージェント
    descriptions:
      zh: 父代理 spawn 法律审查 subagent，限定只读检索与引文返回格式；控制与最终答案仍在上级。
      en: A parent agent spawns a legal-review subagent with read-only retrieval and citation return format; control and final answer remain upstream.
      ja: 親エージェントが読み取り専用検索と引用返却形式付きの legal-review subagent を spawn し、制御と最終回答は上位に残ります。
    example_source:
      product: Cursor
      url: https://cursor.com/docs
      version: Task subagent
    field_values:
      coordination_role_id: coord-role-legal-review-subagent
      scoped_work_contract_ref: work-contract-license-condition-4@3
    related_node_ids: [SubagentRole, Orchestrator]
    related_relation_ids: [delegates_to_subagent]
    source_claims: [claim-sar-cursor]
  - id: SubagentRole-langgraph-subagent
    labels:
      zh: LangGraph subagent 返回
      en: LangGraph subagent return
      ja: LangGraph subagent 返却
    descriptions:
      zh: supervisor 向 research subagent 发送 scoped input，subagent 返回 final result 给 supervisor。
      en: A supervisor sends scoped input to a research subagent that returns a final result to the supervisor.
      ja: supervisor が scoped input を research subagent に送り、subagent が final result を supervisor へ返します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: subagent pattern
    field_values:
      return_contract_ref: subagent-research-return@1
    related_node_ids: [SubagentRole, WorkerRole]
    related_relation_ids: [SubagentRole-is_a-CoordinationRole]
    source_claims: [claim-sar-langgraph]
  - id: SubagentRole-boundary-ocr-function
    labels:
      zh: OCR 函数不是子智能体
      en: OCR function is not subagent
      ja: OCR 関数は subagent ではない
    descriptions:
      zh: 工作流调用 OCR 函数解析图片，没有独立目标、推理策略、委派权限或向上报告契约。
      en: A workflow invokes an OCR function to parse an image with no independent goal, reasoning policy, delegated authority, or upward reporting contract.
      ja: OCR 関数呼び出しには独立目標・推論方針・委任権限・上位報告契約がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: subagent versus tool boundary
    field_values: {}
    related_node_ids: [SubagentRole]
    related_relation_ids: []
    source_claims: [claim-sar-design]
parent_relation:
  id: SubagentRole-is_a-CoordinationRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: SubagentRole 接受有边界的任务、上下文、权限与返回契约并向上级返回结果。
    en: SubagentRole receives bounded task, context, authority, and return contracts and reports upward.
    ja: SubagentRole は境界付きタスク・コンテキスト・権限・返却契約を受け上位へ返します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-sar-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Centralized supervisor subagent pattern.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Handoff targets with bounded work.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Subagent versus tool invocation boundary.
source_claims:
  - id: claim-sar-cursor
    source: moonweave-design
    supports: Cursor Task subagents receive scoped work, isolated context, and structured return to the parent orchestrator.
    locator: SubagentRole mapping inference
    evidence_kind: design-inference
    confidence: medium
  - id: claim-sar-openai
    source: openai-agents
    supports: OpenAI handoff targets can perform bounded specialist work with explicit inputs distinct from whole-conversation takeover.
    locator: Handoffs
    evidence_kind: official
    confidence: high
  - id: claim-sar-langgraph
    source: langgraph
    supports: LangGraph subagent pattern sends scoped input down and returns final result to the supervising agent.
    locator: Multi-agent > Subagents
    evidence_kind: official
    confidence: high
  - id: claim-sar-design
    source: moonweave-design
    supports: Moonweave models bounded delegated agentic responsibility as SubagentRole distinct from tools and full handoff control transfer.
    locator: SubagentRole concept boundary
    evidence_kind: design-inference
    confidence: high
