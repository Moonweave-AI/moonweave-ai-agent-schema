schema: moonweave.ai/ontology-node/v1
id: SubagentRole
kind: concept
labels:
  zh: 子智能体角色
  en: subagent role
  ja: サブエージェント役割
semantics:
  short_definition:
    zh: 子智能体角色是在上级协同上下文中承担有边界自主工作的角色。
    en: A subagent role performs bounded autonomous work within a parent coordination context.
    ja: サブエージェント役割は、上位の調整コンテキスト内で境界付きの自律作業を担う役割です。
  definition:
    zh: 子智能体角色是一种 CoordinationRole，其种差是：它接收明确任务、上下文、权限和返回契约，进行有边界的智能体推理或工具使用，并把结果返回上级；它不是所有嵌套进程，也不是 AgentActor 子类。
    en: A SubagentRole is a CoordinationRole distinguished by receiving an explicit task, context, authority, and return contract, performing bounded agentic reasoning or tool use, and returning a result to a parent context; it is neither every nested process nor an AgentActor subtype.
    ja: サブエージェント役割は CoordinationRole の一種であり、明示されたタスク、コンテキスト、権限、返却契約を受け、境界付きのエージェント推論またはツール使用を行い、結果を上位コンテキストへ返します。すべての入れ子プロセスでも AgentActor の下位型でもありません。
  why_needed:
    zh: 该角色把被委派的推理边界和权限记录下来，使上级可验证返回结果是否在授权范围内，并区分子智能体与普通工具调用。
    en: The role records delegated reasoning boundaries and authority so the parent can verify whether returned results stayed within scope and distinguish a subagent from an ordinary tool call.
    ja: 委任された推論境界と権限を記録し、上位側が返却結果の範囲適合を検証し、通常のツール呼び出しと区別できます。
  includes:
    - zh: 具名子任务、最小必要上下文、可用工具或数据权限、预算和向上返回格式。
      en: A named subtask, minimum necessary context, tool or data authority, budget, and upward return format.
      ja: 名前付きサブタスク、必要最小限のコンテキスト、ツール・データ権限、予算、上位への返却形式。
  excludes:
    - zh: 没有自主推理职责的普通函数或资源，以及获得整个会话控制权后不再向原管理者返回的 handoff 接收者。
      en: A plain function or resource with no autonomous reasoning duty, and a handoff recipient that gains the whole conversation and no longer returns to the former manager.
      ja: 自律推論責務を持たない通常関数・資源、および会話全体の制御を得て旧管理者へ戻らないハンドオフ受信者。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys: []
  fields:
    - id: scoped_work_contract_ref
      labels:
        zh: 范围化工作合同引用
        en: scoped-work contract reference
        ja: 範囲付き作業契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须完成的具名工作范围、输入边界和完成判据，不把整场会话控制默认交给它。
        en: References the named work scope, input boundary, and completion criteria assigned to the subagent without implicitly transferring the whole conversation.
        ja: サブエージェントに割り当てる作業範囲・入力境界・完了基準を参照し、会話全体の制御は暗黙に移しません。
      allowed_values: []
      pattern: null
      example_value: work-contract-policy-check@4
      source_claims:
        - claim-subagent-role-002
    - id: return_contract_ref
      labels:
        zh: 返回合同引用
        en: return-contract reference
        ja: 返却契約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体向上级返回结果、证据、警告和未完成原因所必须遵守的结构合同。
        en: References the structure contract governing results, evidence, warnings, and incompletion reasons returned to the supervising role.
        ja: 上位役割へ返す結果・証拠・警告・未完了理由の構造契約を参照します。
      allowed_values: []
      pattern: null
      example_value: subagent-return@2
      source_claims:
        - claim-subagent-role-003
    - id: allowed_capability_refs
      labels:
        zh: 允许能力引用
        en: allowed capability references
        ja: 許可能力参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该子智能体角色在范围化工作中可使用的工具、检索或执行能力版本；未列出的能力默认不可用。
        en: Lists tool, retrieval, and execution capability revisions available to the subagent role for the scoped work; unlisted capabilities remain unavailable.
        ja: 範囲付き作業で使用できる tool・retrieval・execution 能力版を列挙し、未列挙能力は既定で利用不可とします。
      allowed_values: []
      pattern: null
      example_value:
        - capability-policy-search@3
        - capability-citation-check@1
      source_claims:
        - claim-subagent-role-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SubagentRole-manual-positive-20260715
    labels:
      zh: SubagentRole positive
      en: SubagentRole positive
      ja: SubagentRole positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 SubagentRole：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps SubagentRole: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が SubagentRole 多 agent 協調に写像。
    field_values: {coordination_role_id: coord-role-legal-review-subagent, revision: 3}

    related_node_ids:
      - SubagentRole
      - CoordinationRole
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    source_claims:
      - claim-subagent-role-005

  - id: SubagentRole-manual-boundary-20260715
    labels:
      zh: SubagentRole boundary
      en: SubagentRole boundary
      ja: SubagentRole boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 SubagentRole 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not SubagentRole static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで SubagentRole 静的 TaskPlan ではない。
    field_values: {}

    related_node_ids:
      - SubagentRole
      - CoordinationRole
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    source_claims:
      - claim-subagent-role-006

  - id: SubagentRole-counterexample-handoff-target
    labels:
      zh: SubagentRole counterexample
      en: SubagentRole counterexample
      ja: SubagentRole counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 SubagentRole RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style SubagentRole RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 SubagentRole ではない。
    field_values: {coordination_role_id: coord-role-refund-specialist, scoped_work_contract_ref: absent, return_contract_ref: absent, allowed_capability_refs: absent, control_after_transfer: full-session}

    related_node_ids:
      - SubagentRole
      - Orchestrator
      - Handoff
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    source_claims:
      - claim-subagent-role-006

  - id: SubagentRole-instance-openai-as-tool-legal
    labels:
      zh: SubagentRole instance
      en: SubagentRole instance
      ja: SubagentRole instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 SubagentRole DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to SubagentRole DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が SubagentRole に写像。
    field_values: {coordination_role_id: coord-role-legal-review-subagent, revision: 3}

    related_node_ids:
      - SubagentRole
      - CoordinationRole
      - Orchestrator
    related_relation_ids:
      - SubagentRole-is_a-CoordinationRole
    source_claims:
      - claim-subagent-role-005
      - claim-coordination-role-002

