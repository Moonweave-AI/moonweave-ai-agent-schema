sibling_differentiation:
  - sibling_concept_id: WorkerRole
    shared_parent_concept_id: CoordinationRole
    differentia:
      zh: 端点特定对照：父节点 CoordinationRole：SubagentRole（semantic kind=role，骨架 SubagentRole-is_a-CoordinationRole）；WorkerRole（semantic kind=role，骨架 WorkerRole-is_a-CoordinationRole）。双端条件：SubagentRole 条件：“子智能体角色是以如下事实为区分特征的协调角色：它是以受限任务、权限、上下文和向上汇报为区分特征的一种协调角色”；WorkerRole 条件：“工作者角色是接收有范围工作、执行约定任务并返回证据的协调角色，可由 Agent、模型服务或工具服务承担”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent CoordinationRole: SubagentRole (semantic kind=role, backbone SubagentRole-is_a-CoordinationRole); WorkerRole (semantic kind=role, backbone WorkerRole-is_a-CoordinationRole). Endpoint conditions: SubagentRole condition: “Subagent role is a coordination role; its differentiating condition is that it is a CoordinationRole distinguished by bounded work, authority, context, and upward reporting”; WorkerRole condition: “Worker role is a coordination role that accepts scoped work, performs agreed tasks, and returns evidence; it may be borne by an agent, model service, or tool service”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 CoordinationRole：SubagentRole（semantic kind=role、バックボーン SubagentRole-is_a-CoordinationRole）；WorkerRole（semantic kind=role、バックボーン WorkerRole-is_a-CoordinationRole）。両端条件：SubagentRole の条件：「サブエージェント役割は調整役割の一種であり、次の条件で区別されます：SubagentRole は限定された作業、権限、文脈、上位への報告で区別される CoordinationRole である」；WorkerRole の条件：「調整役割に属するワーカーロールは、次の事実を種差とします：それは範囲付き作業を受け、合意したタスクを実行し、証拠を返す協調ロールで、Agent、モデルサービス、ツールサービスが担えます」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-subagent-role-007
