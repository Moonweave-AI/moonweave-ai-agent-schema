schema: moonweave.ai/ontology-node/v1
id: Orchestrator
kind: concept
labels:
  zh: 编排者角色
  en: orchestrator role
  ja: オーケストレーター役割
semantics:
  short_definition:
    zh: 协调者是负责分解、路由、委派并整合结果的协同角色。
    en: An orchestrator is the coordination role that decomposes, routes, delegates, and integrates results.
    ja: オーケストレーターは、分解、ルーティング、委任、結果統合を担う調整役割です。
  definition:
    zh: 协调者是一种 CoordinationRole，其种差是：它维护全局任务状态，选择或调用专门执行者，并在 manager 模式下保留下一步控制和最终答案责任；它可由智能体、人或工作流引擎承担，而非一种固定 Actor。
    en: An Orchestrator is a CoordinationRole distinguished by maintaining global task state, selecting or invoking specialized performers, and, in the manager pattern, retaining next-step control and final-answer accountability; it may be borne by an agent, human, or workflow engine rather than being a fixed Actor type.
    ja: オーケストレーターは CoordinationRole の一種であり、全体タスク状態を保持し、専門実行者を選択・呼び出し、manager パターンでは次ステップ制御と最終回答責任を保持します。エージェント、人、ワークフローエンジンが担えますが固定の Actor 型ではありません。
  why_needed:
    zh: 它标明谁负责跨子任务保持全局目标、解决返回结果冲突并决定何时继续或结束，而不会把承担者与职责混成一个节点。
    en: It identifies the responsibility for preserving the global goal across subtasks, resolving conflicting returns, and deciding when to continue or finish without conflating the bearer with the duty.
    ja: サブタスク間で全体目標を維持し、返却結果の競合を解決し、続行・終了を決める責任を、担い手と混同せず示します。
  includes:
    - zh: manager-as-tools 模式中的任务分解、专家选择、上下文裁剪、结果整合和最终输出职责。
      en: Task decomposition, specialist selection, context scoping, result synthesis, and final-output duties in a manager-as-tools pattern.
      ja: manager-as-tools パターンでのタスク分解、専門家選択、コンテキスト制限、結果統合、最終出力の責務。
  excludes:
    - zh: 仅执行已分配工作的 WorkerRole，以及 handoff 后已不再控制后续步骤的发送方角色。
      en: A WorkerRole that only performs assigned work, and the sender role after a handoff has transferred subsequent control.
      ja: 割り当て作業だけを実行する WorkerRole、およびハンドオフ後に後続制御を失った送信側役割。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys: []
  fields:
    - id: control_retention_policy
      labels:
        zh: 控制保留策略
        en: control-retention policy
        ja: 制御保持方針
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定编排者在调用专家、并行分支或失败升级期间保留、转移和收回下一步控制权的条件。
        en: Specifies when the orchestrator retains, transfers, or recovers next-step control while invoking specialists, running branches, or escalating failures.
        ja: 専門家呼出し・並列分岐・失敗エスカレーション時に次手制御を保持・移転・回収する条件を規定します。
      allowed_values: []
      pattern: null
      example_value:
        default: retain
        handoff_effect: transfer
        on_return: recover
      source_claims:
        - claim-orchestrator-002
    - id: answer_synthesis_obligation
      labels:
        zh: 答案综合义务
        en: answer-synthesis obligation
        ja: 回答統合義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定编排者是否必须整合专家结果、解决冲突并批准最终面向用户的答案，以及可转移该义务的条件。
        en: Specifies whether the orchestrator must integrate specialist results, resolve conflicts, and approve the final user-facing answer, plus conditions for transferring that duty.
        ja: 専門家結果の統合・衝突解決・最終ユーザー回答の承認義務と、その移転条件を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required: true
        approval_required: true
        transfer_allowed: false
      source_claims:
        - claim-orchestrator-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: Orchestrator-manual-positive-20260715
    labels:
      zh: Orchestrator positive
      en: Orchestrator positive
      ja: Orchestrator positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 Orchestrator：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps Orchestrator: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が Orchestrator 多 agent 協調に写像。
    field_values: {coordination_role_id: coord-role-research-orchestrator, revision: 5}

    related_node_ids:
      - Orchestrator
      - CoordinationRole
    related_relation_ids:
      - Orchestrator-is_a-CoordinationRole
    source_claims:
      - claim-orchestrator-004

  - id: Orchestrator-manual-boundary-20260715
    labels:
      zh: Orchestrator boundary
      en: Orchestrator boundary
      ja: Orchestrator boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 Orchestrator 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not Orchestrator routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で Orchestrator routing spec ではない。
    field_values: {}

    related_node_ids:
      - Orchestrator
      - CoordinationRole
    related_relation_ids:
      - Orchestrator-is_a-CoordinationRole
    source_claims:
      - claim-orchestrator-005

  - id: Orchestrator-counterexample-worker-decomposition
    labels:
      zh: Orchestrator counterexample
      en: Orchestrator counterexample
      ja: Orchestrator counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 Orchestrator TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style Orchestrator TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 Orchestrator ではない。
    field_values: {coordination_role_id: coord-role-tabular-cleaning-worker}

    related_node_ids:
      - Orchestrator
      - WorkerRole
      - CoordinationRole
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    source_claims:
      - claim-orchestrator-005

  - id: Orchestrator-instance-openai-manager-research
    labels:
      zh: Orchestrator instance
      en: Orchestrator instance
      ja: Orchestrator instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 Orchestrator DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to Orchestrator DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が Orchestrator に写像。
    field_values: {coordination_role_id: coord-role-research-orchestrator, revision: 5}

    related_node_ids:
      - Orchestrator
      - CoordinationRole
      - SubagentRole
    related_relation_ids:
      - Orchestrator-is_a-CoordinationRole
    source_claims:
      - claim-orchestrator-004
      - claim-coordination-role-002

