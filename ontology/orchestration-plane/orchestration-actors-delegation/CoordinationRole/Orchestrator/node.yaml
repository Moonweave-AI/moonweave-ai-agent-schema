schema: moonweave.ai/ontology-node/v1
id: Orchestrator
kind: concept
status: review
labels:
  zh: 编排者角色
  en: orchestrator role
  ja: オーケストレーター役割
semantics:
  short_definition:
    zh: 协调者是负责分解、路由、委派并整合结果的协同角色。
    en: An orchestrator is the coordination role that decomposes, routes, delegates, and integrates results.
    ja: オーケストレーターは、分解、ルーティング、委任、結果統合を担う調整役割です。
  definition:
    zh: 协调者是一种 CoordinationRole，其种差是：它维护全局任务状态，选择或调用专门执行者，并在 manager 模式下保留下一步控制和最终答案责任；它可由智能体、人或工作流引擎承担，而非一种固定 Actor。
    en: An Orchestrator is a CoordinationRole distinguished by maintaining global task state, selecting or invoking specialized performers, and, in the manager pattern, retaining next-step control and final-answer accountability; it may be borne by an agent, human, or workflow engine rather than being a fixed Actor type.
    ja: オーケストレーターは CoordinationRole の一種であり、全体タスク状態を保持し、専門実行者を選択・呼び出し、manager パターンでは次ステップ制御と最終回答責任を保持します。エージェント、人、ワークフローエンジンが担えますが固定の Actor 型ではありません。
  why_needed:
    zh: 它标明谁负责跨子任务保持全局目标、解决返回结果冲突并决定何时继续或结束，而不会把承担者与职责混成一个节点。
    en: It identifies the responsibility for preserving the global goal across subtasks, resolving conflicting returns, and deciding when to continue or finish without conflating the bearer with the duty.
    ja: サブタスク間で全体目標を維持し、返却結果の競合を解決し、続行・終了を決める責任を、担い手と混同せず示します。
  includes:
    - zh: manager-as-tools 模式中的任务分解、专家选择、上下文裁剪、结果整合和最终输出职责。
      en: Task decomposition, specialist selection, context scoping, result synthesis, and final-output duties in a manager-as-tools pattern.
      ja: manager-as-tools パターンでのタスク分解、専門家選択、コンテキスト制限、結果統合、最終出力の責務。
  excludes:
    - zh: 仅执行已分配工作的 WorkerRole，以及 handoff 后已不再控制后续步骤的发送方角色。
      en: A WorkerRole that only performs assigned work, and the sender role after a handoff has transferred subsequent control.
      ja: 割り当て作業だけを実行する WorkerRole、およびハンドオフ後に後続制御を失った送信側役割。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: control_retention_policy
      labels:
        zh: 控制保留策略
        en: control-retention policy
        ja: 制御保持方針
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定编排者在调用专家、并行分支或失败升级期间保留、转移和收回下一步控制权的条件。
        en: Specifies when the orchestrator retains, transfers, or recovers next-step control while invoking specialists, running branches, or escalating failures.
        ja: 専門家呼出し・並列分岐・失敗エスカレーション時に次手制御を保持・移転・回収する条件を規定します。
      allowed_values: []
      pattern: null
      example_value:
        default: retain
        handoff_effect: transfer
        on_return: recover
      source_claims:
        - claim-orchestrator-002
    - id: answer_synthesis_obligation
      labels:
        zh: 答案综合义务
        en: answer-synthesis obligation
        ja: 回答統合義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定编排者是否必须整合专家结果、解决冲突并批准最终面向用户的答案，以及可转移该义务的条件。
        en: Specifies whether the orchestrator must integrate specialist results, resolve conflicts, and approve the final user-facing answer, plus conditions for transferring that duty.
        ja: 専門家結果の統合・衝突解決・最終ユーザー回答の承認義務と、その移転条件を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required: true
        approval_required: true
        transfer_allowed: false
      source_claims:
        - claim-orchestrator-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: Orchestrator-manual-positive-20260715
    kind: positive
    labels:
      zh: 编排者角色正例
      en: Positive case for orchestrator role
      ja: オーケストレーター役割の正例
    scenario_id: null
    descriptions:
      zh: 研究协调器把问题拆为检索、统计核验与反方审查三项，分别调用专家，比较证据后由自己形成最终报告。
      en: A research coordinator decomposes a question into retrieval, statistical verification, and adversarial review, calls a specialist for each, compares their evidence, and writes the final report itself.
      ja: 研究調整役が問題を検索、統計検証、反対観点レビューに分解し、それぞれ専門家を呼び、証拠を比較して自ら最終報告を作成します。
    field_values:
      coordination_role_id: coord-role-research-orchestrator
      revision: "5"
      responsibility_scope:
        includes:
          - decompose
          - delegate
          - compare-evidence
          - synthesize
        excludes:
          - fabricate-specialist-evidence
      authority_scope:
        may:
          - invoke-specialists
          - request-revision
          - approve-final-report
        must_escalate:
          - override-safety-policy
      valid_from: 2026-07-15T08:00:00Z
      control_retention_policy:
        default: retain
        specialist_tool_call: retain
        handoff: transfer
        on_tool_return: recover
      answer_synthesis_obligation:
        required: true
        approval_required: true
        transfer_allowed: false
    related_node_ids:
      - Orchestrator
      - CoordinationRole
    related_relation_ids:
      - Orchestrator-is_a-CoordinationRole
    expected_result:
      zh: 该职责实例是 Orchestrator，并保留 ControlOwnership 与 AnswerOwnership。
      en: The responsibility instance is an Orchestrator and retains both ControlOwnership and AnswerOwnership.
      ja: この責任インスタンスは Orchestrator であり、ControlOwnership と AnswerOwnership を保持します。
    why_valid_or_invalid:
      zh: 它掌握全局状态、选择执行者、决定下一步并整合最终输出，具备协调者的完整种差。
      en: It maintains global state, selects performers, chooses the next step, and synthesizes the final output, satisfying the full orchestrator differentia.
      ja: 全体状態を保持し、実行者を選び、次の手順を決め、最終出力を統合するため、オーケストレーターの種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestrator-004
  - id: Orchestrator-manual-boundary-20260715
    kind: boundary
    labels:
      zh: 编排者角色边界例
      en: Boundary case for orchestrator role
      ja: オーケストレーター役割の境界例
    scenario_id: null
    descriptions:
      zh: 分诊角色只根据语言把会话 handoff 给专员；handoff 后专员自行决定工具与回复，分诊角色不再维护该会话的下一步。
      en: A triage role only hands a conversation to a language specialist; after the handoff the specialist chooses tools and responses, and triage no longer controls the conversation's next step.
      ja: トリアージ役は言語担当へ会話をハンドオフするだけで、その後は担当がツールと応答を決め、トリアージ役は次の手順を制御しません。
    field_values: {}
    related_node_ids:
      - Orchestrator
      - CoordinationRole
    related_relation_ids:
      - Orchestrator-is_a-CoordinationRole
    expected_result:
      zh: 分诊角色在转移前可执行路由职责，但不能把 handoff 后的有效角色继续归为当前 Orchestrator。
      en: Triage may perform routing before transfer, but its post-handoff binding must not remain classified as the current Orchestrator.
      ja: トリアージは移転前にルーティングできますが、ハンドオフ後のバインディングを現在の Orchestrator として維持してはいけません。
    why_valid_or_invalid:
      zh: 协调者身份取决于当前全局控制职责；控制已转移时，旧承担者不再满足种差。
      en: Orchestrator identity depends on current global-control duties; once control transfers, the former bearer no longer satisfies the differentia.
      ja: オーケストレーターの同一性は現在の全体制御責務に依存し、制御移転後は旧担い手が種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestrator-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SubagentRole
    shared_parent_concept_id: CoordinationRole
    differentia:
      zh: 端点特定对照：父节点 CoordinationRole：Orchestrator（semantic kind=role，骨架 Orchestrator-is_a-CoordinationRole）；SubagentRole（semantic kind=role，骨架 SubagentRole-is_a-CoordinationRole）。双端条件：Orchestrator 条件：“编排者角色是一种协调角色；其区分条件是：它描述分解、委派、路由和综合职责，是可由不同 Actor 承担的协调角色，而非固定 Actor 子类”；SubagentRole 条件：“子智能体角色是以如下事实为区分特征的协调角色：它是以受限任务、权限、上下文和向上汇报为区分特征的一种协调角色”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent CoordinationRole: Orchestrator (semantic kind=role, backbone Orchestrator-is_a-CoordinationRole); SubagentRole (semantic kind=role, backbone SubagentRole-is_a-CoordinationRole). Endpoint conditions: Orchestrator condition: “As a coordination role, Orchestrator role is distinguished by the fact that orchestrator denotes decomposition, delegation, routing, and synthesis responsibilities and is therefore a CoordinationRole borne by actors, not a fixed actor subtype”; SubagentRole condition: “Subagent role is a coordination role; its differentiating condition is that it is a CoordinationRole distinguished by bounded work, authority, context, and upward reporting”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 CoordinationRole：Orchestrator（semantic kind=role、バックボーン Orchestrator-is_a-CoordinationRole）；SubagentRole（semantic kind=role、バックボーン SubagentRole-is_a-CoordinationRole）。両端条件：Orchestrator の条件：「調整役割に属するオーケストレーター役割は、次の事実を種差とします：Orchestrator は分解、委任、経路制御、統合の責務を表すため、固定アクター下位型でなくアクターが担う CoordinationRole である」；SubagentRole の条件：「サブエージェント役割は調整役割の一種であり、次の条件で区別されます：SubagentRole は限定された作業、権限、文脈、上位への報告で区別される CoordinationRole である」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-orchestrator-006
