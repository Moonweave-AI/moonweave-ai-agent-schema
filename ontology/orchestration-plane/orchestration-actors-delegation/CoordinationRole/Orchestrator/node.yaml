    supports: OpenAI states that a manager keeps conversation control when agents are tools while a handoff transfers the active role, grounding an explicit control-retention policy.
    locator: Agent orchestration > Core SDK patterns > Agents as tools versus Handoffs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestrator-003
