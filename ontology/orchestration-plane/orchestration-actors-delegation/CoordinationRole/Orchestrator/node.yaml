  - id: claim-orchestrator-001
    source: eng-fw-openai-orchestration
    supports: OpenAI's manager pattern keeps orchestration and final-answer ownership with the manager while specialized agents are invoked as tools. Moonweave uses those responsibilities as the defining differentia of Orchestrator.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
