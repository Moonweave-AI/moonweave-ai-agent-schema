    predicate: delegates_to_subagent
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: delegates to subagent
      en: delegates to subagent
      ja: delegates to subagent
    definitions:
      zh: 协调者委派给子智能体角色，表示一个协调者角色实例把有边界的工作说明、上下文、权限、预算和返回契约交给一个子智能体角色实例，同时保留或明确转移控制责任。
      en: Orchestrator delegates to SubagentRole when an orchestrator-role instance gives a subagent-role instance bounded work, context, authority, budget, and a return contract while explicitly retaining or transferring control ownership.
      ja: オーケストレーターがサブエージェント役割へ委任するとは、境界付き作業、コンテキスト、権限、予算、返却契約を渡し、制御責任の保持または移転を明示することです。
