schema: moonweave.ai/ontology-node/v1
id: Orchestrator
kind: concept
labels:
  zh: 编排者角色
  en: orchestrator role
  ja: オーケストレーター役割
semantics:
  short_definition:
    zh: 负责分解、路由、委派并整合全局结果的协调角色。
    en: The coordination role that decomposes, routes, delegates, and synthesizes global results.
    ja: 分解・ルーティング・委任・全体結果統合を担う調整役割です。
  definition:
    zh: Orchestrator 是 CoordinationRole 的特化，维护全局任务状态，选择或调用 WorkerRole/SubagentRole，并在 manager 模式下保留 ControlOwnership 与 AnswerOwnership。映射：CrewAI Process.hierarchical 的 manager_llm；LangGraph centralized supervisor 节点；OpenAI Agents SDK manager-as-tools 模式。它不是固定 Actor 子类，handoff 后失去控制的旧承担者也不再满足种差。
    en: Orchestrator specializes CoordinationRole by maintaining global task state, selecting or invoking WorkerRole/SubagentRole, and—in manager mode—retaining ControlOwnership and AnswerOwnership. Maps to CrewAI Process.hierarchical manager_llm, LangGraph centralized supervisor nodes, and OpenAI Agents SDK manager-as-tools. It is not a fixed Actor subtype; a former bearer after handoff no longer satisfies the differentia.
    ja: Orchestrator は CoordinationRole の特化で、全体タスク状態を保持し WorkerRole/SubagentRole を選択・呼び出し、manager モードでは ControlOwnership/AnswerOwnership を保持します。CrewAI manager_llm、LangGraph supervisor、OpenAI manager-as-tools に写像されます。固定 Actor 下位型ではなく、handoff 後の旧担い手は種差を満たしません。
  why_needed:
    zh: 标明谁负责跨子任务保持全局目标、解决冲突并决定何时继续或结束，而不把承担者与职责混成一个节点。
    en: Identifies who preserves the global goal across subtasks, resolves conflicts, and decides when to continue or finish without conflating bearer and duty.
    ja: サブタスク間の全体目標維持・競合解決・続行/終了判断の責任を、担い手と混同せず示します。
  includes:
    - zh: manager-as-tools 模式中的任务分解、专家选择、上下文裁剪、结果整合和最终输出职责。
      en: Decomposition, specialist selection, context scoping, synthesis, and final-output duties in manager-as-tools patterns.
      ja: manager-as-tools における分解・専門家選択・コンテキスト制限・統合・最終出力責務。
  excludes:
    - zh: 仅执行已分配工作的 WorkerRole，以及 handoff 后不再控制后续步骤的发送方。
      en: WorkerRole performing assigned work only, and a sender after handoff that no longer controls subsequent steps.
      ja: 割当作業のみの WorkerRole、handoff 後に後続制御を失った送信側。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: LangGraph supervisor 节点通过 add_node("supervisor", ...) 与 conditional_edges 实现 Orchestrator；CrewAI hierarchical crew 的 manager_llm 字段绑定 Orchestrator 职责；OpenAI manager 通过 agents-as-tools 保留控制与最终答案。delegates_to_subagent 与 uses_agent_as_tool 关系记录有边界委派，但不转移 Orchestrator 身份到 specialist。
    en: LangGraph supervisor nodes via add_node and conditional_edges implement Orchestrator; CrewAI hierarchical manager_llm binds Orchestrator duty; OpenAI managers retain control and final answer through agents-as-tools. delegates_to_subagent and uses_agent_as_tool record bounded delegation without transferring Orchestrator identity to specialists.
    ja: LangGraph supervisor、CrewAI manager_llm、OpenAI manager-as-tools が Orchestrator を実装します。delegates_to_subagent/uses_agent_as_tool は有境界委任を記録し、Orchestrator 同一性は specialist へ移しません。
  typical_input:
    - description: CrewAI hierarchical manager_llm orchestration.
      format: |
        crew = Crew(
            agents=[manager, researcher, writer],
            tasks=[...],
            process=Process.hierarchical,
            manager_llm=llm,
        )
      source_claims: [claim-orch-crewai]
    - description: LangGraph centralized supervisor workflow.
      format: |
        builder.add_node("supervisor", supervisor_node)
        builder.add_node("research_agent", research_agent)
        builder.add_edge("research_agent", "supervisor")
      source_claims: [claim-orch-langgraph]
  typical_output:
    - description: Orchestrator role binding with control retention policy.
      format: |
        {
          "coordination_role_id": "coord-role-research-orchestrator",
          "control_retention_policy": {"default": "retain", "handoff": "transfer"},
          "answer_synthesis_obligation": {"required": true}
        }
      source_claims: [claim-orch-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.hierarchical manager_llm.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Centralized supervisor subagent workflow.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Manager pattern with agents as tools.
structure:
  identity_keys: []
  fields:
    - id: control_retention_policy
      labels:
        zh: 控制保留策略
        en: control-retention policy
        ja: 制御保持方針
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定调用专家、并行分支或失败升级期间保留、转移和收回控制权的条件。
        en: When the orchestrator retains, transfers, or recovers control during specialist calls, branches, or escalations.
        ja: 専門家呼出し・並列分岐・失敗エスカレーション時の制御保持・移転・回収条件。
      example_value:
        default: retain
        handoff_effect: transfer
        on_return: recover
      source_claims: [claim-orch-openai]
    - id: answer_synthesis_obligation
      labels:
        zh: 答案综合义务
        en: answer-synthesis obligation
        ja: 回答統合義務
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定是否必须整合专家结果、解决冲突并批准最终面向用户的答案。
        en: Whether the orchestrator must integrate specialist results, resolve conflicts, and approve the final user-facing answer.
        ja: 専門家結果の統合・衝突解決・最終ユーザー回答承認義務。
      example_value:
        required: true
        approval_required: true
        transfer_allowed: false
      source_claims: [claim-orch-openai]
  constraints: []
  required_relation_constraints: []
examples:
  - id: Orchestrator-crewai-hierarchical
    labels:
      zh: CrewAI hierarchical manager
      en: CrewAI hierarchical manager
      ja: CrewAI hierarchical manager
    descriptions:
      zh: manager_llm 分解研究问题、分配 worker tasks 并汇总最终报告，保留 ControlOwnership 与 AnswerOwnership。
      en: manager_llm decomposes the research question, assigns worker tasks, and synthesizes the final report, retaining ControlOwnership and AnswerOwnership.
      ja: manager_llm が研究問題を分解し worker task を割当て、最終報告を統合し ControlOwnership/AnswerOwnership を保持します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      coordination_role_id: coord-role-research-orchestrator
      control_retention_policy:
        default: retain
    related_node_ids: [Orchestrator, CoordinationRole, WorkerRole]
    related_relation_ids: [Orchestrator-is_a-CoordinationRole]
    source_claims: [claim-orch-crewai]
  - id: Orchestrator-langgraph-supervisor
    labels:
      zh: LangGraph supervisor 节点
      en: LangGraph supervisor node
      ja: LangGraph supervisor ノード
    descriptions:
      zh: centralized supervisor 调用 research_agent 并决定下一步路由，符合 Orchestrator 种差。
      en: A centralized supervisor calls research_agent and decides next-step routing, satisfying the orchestrator differentia.
      ja: centralized supervisor が research_agent を呼び次手ルーティングを決め、Orchestrator の種差を満たします。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: centralized supervisor
    field_values:
      answer_synthesis_obligation:
        required: true
    related_node_ids: [Orchestrator, SubagentRole]
    related_relation_ids: [delegates_to_subagent]
    source_claims: [claim-orch-langgraph]
  - id: Orchestrator-boundary-post-handoff
    labels:
      zh: handoff 后不再是编排者
      en: Not orchestrator after handoff
      ja: handoff 後は orchestrator ではない
    descriptions:
      zh: 分诊角色 handoff 后不再维护会话下一步；其 post-handoff binding 不得继续归为当前 Orchestrator。
      en: After triage handoff the sender no longer controls next steps; its post-handoff binding must not remain the current Orchestrator.
      ja: トリアージ handoff 後、送信側は次手を制御せず、post-handoff binding を現在の Orchestrator としません。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values: {}
    related_node_ids: [Orchestrator, ControlOwnership]
    related_relation_ids: []
    source_claims: [claim-orch-openai]
parent_relation:
  id: Orchestrator-is_a-CoordinationRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Orchestrator 承担全局任务状态、工作分解、执行者选择与结果整合。
    en: Orchestrator owns global task state, decomposition, performer selection, and synthesis.
    ja: Orchestrator は全体タスク状態・分解・実行者選択・統合を担います。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-orch-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: delegates_to_subagent
    predicate: delegates_to_subagent
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 委派给子智能体
      en: delegates to subagent
      ja: サブエージェントへ委任
    definitions:
      zh: Orchestrator 把有边界的工作、上下文、权限、预算和返回契约交给 SubagentRole，同时明确保留或转移 ControlOwnership。
      en: Orchestrator gives SubagentRole bounded work, context, authority, budget, and return contract while explicitly retaining or transferring ControlOwnership.
      ja: Orchestrator が SubagentRole へ境界付き作業・コンテキスト・権限・予算・返却契約を渡し、ControlOwnership の保持/移転を明示します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: receives_delegation_from_orchestrator
      labels:
        zh: 接收编排者委派
        en: receives delegation from orchestrator
        ja: オーケストレーター委任を受ける
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-orch-langgraph]
    layout_role: cross-link
    target: concept:SubagentRole
  - id: uses_agent_as_tool
    predicate: uses_agent_as_tool
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 以工具方式使用智能体
      en: uses agent as tool
      ja: エージェントをツールとして使用
    definitions:
      zh: Orchestrator 发起 AgentAsToolInvocation，接收结果并保留 ControlOwnership 与 AnswerOwnership；不是 handoff。
      en: Orchestrator starts AgentAsToolInvocation, receives the result, and retains ControlOwnership and AnswerOwnership; not a handoff.
      ja: Orchestrator が AgentAsToolInvocation を開始し結果を受け取り ControlOwnership/AnswerOwnership を保持します。handoff ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_uses_agent_as_tool
      labels:
        zh: 反向：以工具方式使用智能体
        en: is target of uses agent as tool
        ja: 逆方向：エージェントをツールとして使用
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-orch-openai]
    layout_role: cross-link
    target: concept:AgentAsToolInvocation
