schema: moonweave.ai/ontology-node/v1
id: CoordinationRole
kind: concept
labels:
  zh: 协调角色
  en: coordination role
  ja: 調整役割
semantics:
  short_definition:
    zh: 协同角色是分解、委派、执行、监督或汇总工作的一组职责。
    en: A coordination role is a responsibility bundle for decomposing, delegating, performing, supervising, or synthesizing work.
    ja: 調整役割は、作業の分解、委任、実行、監督、統合を担う責任の束です。
  definition:
    zh: 协同角色是一种角色，其种差是：它规定智能体编排中的职责、权限与汇报义务，并通过 ActorRoleBinding 由实际参与者在特定范围和时间内承担；它不是 Actor、Agent 或服务的子类。
    en: A CoordinationRole is a role distinguished by specifying responsibilities, authority, and reporting duties in agent orchestration and being borne by an actual participant through an ActorRoleBinding for a stated scope and time; it is not a subtype of Actor, Agent, or service.
    ja: 調整役割は役割の一種であり、エージェント編成における責任、権限、報告義務を規定し、指定範囲と時間について ActorRoleBinding を介して実際の参加者が担います。Actor、Agent、サービスの下位型ではありません。
  why_needed:
    zh: 把职责建模为角色后，同一智能体可在不同任务中切换协调者与执行者，多个不同主体也可承担同一种职责，而不会篡改其运行身份。
    en: Modeling responsibility as a role lets one agent switch between coordinator and performer across tasks and lets different participants bear the same responsibility without changing their runtime identity.
    ja: 責任を役割として表すことで、同じエージェントがタスクごとに調整者と実行者を切り替え、異なる主体が同じ責任を担っても実行時の同一性を変更せずに済みます。
  includes:
    - zh: 任务分解、委派、执行、监督、结果汇总和向上汇报等可分配职责。
      en: Assignable duties for task decomposition, delegation, performance, supervision, result synthesis, and upward reporting.
      ja: タスク分解、委任、実行、監督、結果統合、上位報告の割り当て可能な責務。
    - zh: 职责适用的权限、任务范围、有效期和报告对象。
      en: The authority, task scope, validity interval, and reporting target attached to the responsibility.
      ja: 責任に付随する権限、タスク範囲、有効期間、報告先。
  excludes:
    - zh: 承担角色的 HumanActor、AgentActor 或工作流引擎本身。
      en: The HumanActor, AgentActor, or workflow engine that bears the role.
      ja: 役割を担う HumanActor、AgentActor、ワークフローエンジン自体。
    - zh: 谁在某时刻拥有答案或控制责任的 CoordinationOwnershipRecord。
      en: A CoordinationOwnershipRecord stating who holds answer or control responsibility at a given time.
      ja: 特定時点の回答責任または制御責任の保持者を示す CoordinationOwnershipRecord。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys:
    - coordination_role_id
    - revision
  fields:
    - id: coordination_role_id
      labels:
        zh: 协调角色标识
        en: coordination-role ID
        ja: 調整役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项可由不同 ActorRoleBinding 在不同时间与范围内承担的协调职责规范。
        en: Stably identifies a coordination-duty specification that different ActorRoleBindings may bear at different times and scopes.
        ja: 異なる ActorRoleBinding が時刻・範囲ごとに担える調整責務仕様を安定して識別します。
      allowed_values: []
      pattern: ^coord-role-[A-Za-z0-9._:-]+$
      example_value: coord-role-support-manager
      source_claims:
        - claim-coordination-role-002
    - id: revision
      labels:
        zh: 角色修订
        en: role revision
        ja: 役割リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识职责、权限或汇报义务的一次不可变修订，使既有角色绑定仍可追溯其实际采用版本。
        en: Identifies an immutable revision of responsibilities, authority, and reporting obligations so existing bindings retain the version they actually used.
        ja: 責務・権限・報告義務の不変リビジョンを示し、既存 binding が実際に用いた版を追跡可能にします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
      example_value: "3"
      source_claims:
        - claim-coordination-role-003
    - id: responsibility_scope
      labels:
        zh: 职责范围
        en: responsibility scope
        ja: 責務範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该角色必须完成、监督或交付的工作类别及明确排除项，不用于记录当前承担者。
        en: Declares work categories the role must perform, supervise, or deliver together with explicit exclusions, without naming the current bearer.
        ja: 役割が実行・監督・納品すべき作業分類と明示的除外を宣言し、現在の担当者は記録しません。
      allowed_values: []
      pattern: null
      example_value:
        includes:
          - decompose
          - synthesize
        excludes:
          - approve-refund
      source_claims:
        - claim-coordination-role-004
    - id: authority_scope
      labels:
        zh: 权限范围
        en: authority scope
        ja: 権限範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定该角色可以作出的控制决定、可以调用的能力类别及必须升级处理的决定边界。
        en: Specifies control decisions the role may make, capability classes it may invoke, and decision boundaries that require escalation.
        ja: 役割が行える制御判断・呼び出せる能力分類・エスカレーション必須の判断境界を規定します。
      allowed_values: []
      pattern: null
      example_value:
        may:
          - route
          - pause
        must_escalate:
          - policy-override
      source_claims:
        - claim-coordination-role-005
    - id: reporting_obligations
      labels:
        zh: 汇报义务
        en: reporting obligations
        ja: 報告義務
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定该角色必须向上级或协作者返回的状态、证据、结果格式及报告时点。
        en: Specifies statuses, evidence, result formats, and reporting times the role must return to a manager or collaborator.
        ja: 上位役割または協働者へ返す状態・証拠・結果形式・報告時点を規定します。
      allowed_values: []
      pattern: null
      example_value:
        events:
          - completion
          - blocked
        contract_ref: worker-return@2
      source_claims:
        - claim-coordination-role-006
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: 有効開始時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本角色修订开始可被新 ActorRoleBinding 采用的时间。
        en: Records when this role revision becomes available for new ActorRoleBindings to adopt.
        ja: この役割リビジョンを新しい ActorRoleBinding が採用できる開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-coordination-role-007
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: 有効終了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录本角色修订停止用于新绑定的时间；为空表示尚未安排失效，而非永久有效。
        en: Records when this role revision stops being eligible for new bindings; absence means no retirement is scheduled, not timeless validity.
        ja: この役割版を新規 binding に使えなくなる時刻を記録し、未設定は無期限ではなく廃止予定なしを表します。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-coordination-role-008
  constraints:
    - id: coordination-role-valid-interval
      severity: error
      expression_language: plain
      expression: valid_until is absent or valid_until > valid_from
      explanations:
        zh: 角色修订的失效时间必须晚于生效时间。
        en: A role revision must retire after it becomes valid.
        ja: 役割リビジョンの終了時刻は開始時刻より後でなければなりません。
      source_claims:
        - claim-coordination-role-009
  required_relation_constraints: []
examples:
  - id: CoordinationRole-manual-positive-20260715
    labels:
      zh: CoordinationRole positive
      en: CoordinationRole positive
      ja: CoordinationRole positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 CoordinationRole：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps CoordinationRole: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が CoordinationRole 多 agent 協調に写像。
    field_values: {coordination_role_id: coord-role-incident-coordinator, revision: 4}

    related_node_ids:
      - CoordinationRole
    related_relation_ids: []
    source_claims:
      - claim-coordination-role-010

  - id: CoordinationRole-manual-boundary-20260715
    labels:
      zh: CoordinationRole boundary
      en: CoordinationRole boundary
      ja: CoordinationRole boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 CoordinationRole 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not CoordinationRole work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で CoordinationRole work_specification ではない。
    field_values: {}

    related_node_ids:
      - CoordinationRole
    related_relation_ids: []
    source_claims:
      - claim-coordination-role-011

  - id: CoordinationRole-counterexample-agentcard-capability
    labels:
      zh: CoordinationRole counterexample
      en: CoordinationRole counterexample
      ja: CoordinationRole counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 CoordinationRole。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style CoordinationRole.
      ja: module dispatch なし直接回答は MRKL 式 CoordinationRole にならない。
    field_values: {coordination_role_id: absent, revision: absent, responsibility_scope: absent, authority_scope: absent, valid_from: absent}

    related_node_ids:
      - CoordinationRole
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - claim-coordination-role-011

  - id: CoordinationRole-instance-langgraph-supervisor-binding
    labels:
      zh: CoordinationRole instance
      en: CoordinationRole instance
      ja: CoordinationRole instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 CoordinationRole DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to CoordinationRole DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が CoordinationRole に写像。
    field_values: {coordination_role_id: coord-role-incident-coordinator, revision: 4}

    related_node_ids:
      - CoordinationRole
      - Orchestrator
    related_relation_ids: []
    source_claims:
      - claim-coordination-role-010

