source_claims:
  - id: claim-coordination-role-001
    source: eng-fw-openai-orchestration
    supports: OpenAI presents orchestration responsibilities through manager and specialist participation patterns rather than asserting new runtime actor species. Moonweave therefore models orchestrator, subagent, and worker as CoordinationRole specializations borne through role bindings.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-role-002
    source: eng-fw-openai-orchestration
    supports: OpenAI distinguishes manager, specialist-tool, and handoff responsibilities; Moonweave assigns a stable identity to the reusable role specification rather than to any one actor.
    locator: Agent orchestration > Core SDK patterns > Agents as tools and Handoffs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-role-003
    source: eng-fw-openai-orchestration
    supports: OpenAI describes materially different orchestration responsibilities; Moonweave versions a role whenever those normative responsibilities change.
    locator: Agent orchestration > Core SDK patterns > Pattern comparison table
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-role-004
    source: eng-fw-openai-orchestration
    supports: The manager pattern retains decomposition and synthesis responsibility while specialists perform bounded work, grounding an explicit responsibility scope.
    locator: Agent orchestration > Core SDK patterns > Agents as tools
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-role-005
    source: eng-fw-openai-orchestration
    supports: Manager orchestration and handoff assign different control authority, supporting an explicit authority boundary independent of actor identity.
    locator: Agent orchestration > Core SDK patterns > Agents as tools versus Handoffs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-role-006
    source: eng-fw-openai-orchestration
    supports: Agents-as-tools return bounded specialist results to the manager, supporting an explicit reporting contract on the reusable role.
    locator: Agent orchestration > Core SDK patterns > Agents as tools
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-coordination-role-007
    source: eng-fw-openai-orchestration
    supports: Moonweave adds valid time so changing orchestration responsibilities does not retroactively rewrite existing role bindings.
    locator: Agent orchestration > Core SDK patterns > Pattern comparison table
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-role-008
    source: eng-fw-openai-orchestration
    supports: Moonweave adds an optional retirement boundary so historical bindings remain auditable after an orchestration-role revision is superseded.
    locator: Agent orchestration > Core SDK patterns > Pattern comparison table
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-role-009
    source: eng-fw-openai-orchestration
    supports: This temporal integrity rule is a Moonweave design inference for versioned orchestration-role governance.
    locator: Agent orchestration > Core SDK patterns > Pattern comparison table
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-role-010
    source: eng-fw-openai-orchestration
    supports: OpenAI's manager pattern assigns orchestration duties to the manager while specialists remain callable agents, supporting a role/bearer separation rather than an actor-subclass interpretation.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-coordination-role-011
    source: eng-fw-openai-orchestration
    supports: The official orchestration patterns describe concrete responsibility and control behavior; a component label without those behaviors is insufficient evidence of a coordination role.
    locator: Agents SDK > Orchestrating multiple agents > Manager pattern (agents as tools) and handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
