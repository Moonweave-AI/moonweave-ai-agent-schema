schema: moonweave.ai/ontology-node/v1
id: CoordinationRole
kind: concept
labels:
  zh: 协调角色
  en: coordination role
  ja: 調整役割
semantics:
  short_definition:
    zh: 可绑定到不同 Actor 的编排职责规范，而非 Actor 子类。
    en: A bindable orchestration-duty specification, not an Actor subtype.
    ja: Actor の下位型ではなく、異なる Actor に束縛可能な編成責務仕様です。
  definition:
    zh: CoordinationRole 以 coordination_role_id、responsibility_scope、authority_scope 与 valid_from 标识，规定分解、委派、执行、监督或汇总工作的职责、权限与汇报义务，并通过 ActorRoleBinding 由参与者在特定范围与时间内承担。A2A AgentCard 的 roles/skills 映射为此处可复用职责规范；CrewAI Agent 与 LangGraph node 是承担者而非角色本身。它不是 Actor、Agent 服务或 CoordinationOwnershipRecord。
    en: A CoordinationRole is identified by coordination_role_id, responsibility_scope, authority_scope, and valid_from, specifying duties, authority, and reporting for decomposing, delegating, performing, supervising, or synthesizing work, borne through ActorRoleBinding for a scope and time. A2A AgentCard roles/skills map to reusable duty specifications here; CrewAI Agents and LangGraph nodes are bearers, not the role itself. It is not an Actor, agent service, or CoordinationOwnershipRecord.
    ja: CoordinationRole は coordination_role_id・responsibility_scope・authority_scope・valid_from で識別し、分解・委任・実行・監督・統合の責務・権限・報告義務を規定し ActorRoleBinding で担われます。A2A AgentCard の roles/skills が reusable 責務仕様に写像されます。Actor や CoordinationOwnershipRecord ではありません。
  why_needed:
    zh: 职责与承担者分离后，同一 Agent 可在不同任务中切换 orchestrator 与 worker，多个主体也可承担同一职责规范。
    en: Separating duty from bearer lets one agent switch orchestrator and worker roles across tasks and lets different actors bear the same duty specification.
    ja: 責務と担い手を分離することで、同一 Agent がタスクごとに orchestrator/worker を切り替え、複数主体が同じ責務仕様を担えます。
  includes:
    - zh: 任务分解、委派、执行、监督、结果汇总和向上汇报等可分配职责。
      en: Assignable duties for decomposition, delegation, performance, supervision, synthesis, and reporting.
      ja: 分解・委任・実行・監督・統合・報告の割当可能な責務。
    - zh: 职责适用的权限、任务范围、有效期和报告对象。
      en: Authority, task scope, validity interval, and reporting target for the duty.
      ja: 権限・タスク範囲・有効期間・報告先。
  excludes:
    - zh: 承担角色的 HumanActor、AgentActor 或工作流引擎本身。
      en: The HumanActor, AgentActor, or workflow engine bearing the role.
      ja: 役割を担う HumanActor、AgentActor、ワークフローエンジン自体。
    - zh: 谁在某时刻拥有答案或控制责任的 CoordinationOwnershipRecord。
      en: A CoordinationOwnershipRecord stating who holds answer or control at a time.
      ja: 特定時点の回答/制御責任を示す CoordinationOwnershipRecord。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 将 A2A AgentCard.skills 与 roles 投影为 CoordinationRole 修订；将 CrewAI Agent 的 role/goal/backstory 中的“职责”部分与 Agent 实例分离。LangGraph 图中 supervisor、worker 节点名不是 CoordinationRole——需通过 ActorRoleBinding 绑定到具体承担者。
    en: Project A2A AgentCard skills and roles to CoordinationRole revisions; separate CrewAI Agent duty descriptions from agent instances. LangGraph supervisor/worker node names are not CoordinationRole—bind duties through ActorRoleBinding to bearers.
    ja: A2A AgentCard の skills/roles を CoordinationRole revision に、CrewAI Agent の責務記述をインスタンスから分離します。LangGraph ノード名自体は CoordinationRole ではありません。
  typical_input:
    - description: A2A AgentCard roles and skills declaration.
      format: |
        {
          "name": "Research Agent",
          "skills": [{"id": "deep_research", "name": "Deep Research"}]
        }
      source_claims: [claim-cr-a2a]
    - description: CrewAI agent role configuration.
      format: |
        from crewai import Agent
        researcher = Agent(role="Senior Researcher", goal="...", backstory="...")
      source_claims: [claim-cr-crewai]
  typical_output:
    - description: Versioned CoordinationRole specification.
      format: |
        {
          "coordination_role_id": "coord-role-research-orchestrator",
          "responsibility_scope": {"includes": ["decompose", "delegate", "synthesize"]},
          "authority_scope": {"may": ["invoke-specialists"]}
        }
      source_claims: [claim-cr-design]
  reference_implementations:
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: AgentCard roles and skills as reusable duty specs.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent role/goal as bindable coordination duty.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Manager versus specialist participation patterns.
structure:
  identity_keys:
    - coordination_role_id
    - revision
  fields:
    - id: coordination_role_id
      labels:
        zh: 协调角色标识
        en: coordination-role ID
        ja: 調整役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项可由不同 ActorRoleBinding 承担的协调职责规范。
        en: Stably identifies a coordination-duty specification borne by different bindings.
        ja: 異なる binding が担える調整責務仕様を安定識別します。
      pattern: ^coord-role-[A-Za-z0-9._:-]+$
      example_value: coord-role-support-manager
      source_claims: [claim-cr-design]
    - id: revision
      labels:
        zh: 角色修订
        en: role revision
        ja: 役割リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 职责、权限或汇报义务变化后的不可变修订。
        en: Immutable revision after duty, authority, or reporting change.
        ja: 責務・権限・報告義務変更後の不変リビジョン。
      example_value: "3"
      source_claims: [claim-cr-design]
    - id: responsibility_scope
      labels:
        zh: 职责范围
        en: responsibility scope
        ja: 責務範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该角色必须完成、监督或交付的工作类别及排除项。
        en: Work categories the role must perform, supervise, or deliver, with exclusions.
        ja: 役割が実行・監督・納品すべき作業分類と除外を宣言します。
      example_value:
        includes: [decompose, synthesize]
        excludes: [approve-refund]
      source_claims: [claim-cr-a2a]
    - id: authority_scope
      labels:
        zh: 权限范围
        en: authority scope
        ja: 権限範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定可作出的控制决定、可调用的能力类别及必须升级的边界。
        en: Control decisions, invocable capability classes, and escalation boundaries.
        ja: 制御判断・呼び出せる能力・エスカレーション境界を規定します。
      example_value:
        may: [route, pause]
        must_escalate: [policy-override]
      source_claims: [claim-cr-openai]
    - id: reporting_obligations
      labels:
        zh: 汇报义务
        en: reporting obligations
        ja: 報告義務
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定必须返回的状态、证据、结果格式及报告时点。
        en: Statuses, evidence, result formats, and reporting times to return upward.
        ja: 上位へ返す状態・証拠・結果形式・報告時点を規定します。
      example_value:
        events: [completion, blocked]
        contract_ref: worker-return@2
      source_claims: [claim-cr-crewai]
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: 有効開始時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本角色修订可被新 ActorRoleBinding 采用的开始时间。
        en: When this role revision becomes available for new bindings.
        ja: 新 binding が採用できる開始時刻。
      example_value: 2026-07-16T00:00:00Z
      source_claims: [claim-cr-design]
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: 有効終了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 停止用于新绑定的时间；未设置表示尚未安排失效。
        en: When the revision stops being eligible for new bindings.
        ja: 新規 binding に使えなくなる時刻。
      example_value: null
      source_claims: [claim-cr-design]
  constraints:
    - id: coordination-role-valid-interval
      severity: error
      expression_language: plain
      expression: valid_until is absent or valid_until > valid_from
      explanations:
        zh: 角色修订的失效时间必须晚于生效时间。
        en: Role revision must expire after it becomes valid.
        ja: 終了時刻は開始時刻より後でなければなりません。
      source_claims: [claim-cr-design]
  required_relation_constraints: []
examples:
  - id: CoordinationRole-a2a-agentcard
    labels:
      zh: A2A AgentCard 技能映射
      en: A2A AgentCard skill mapping
      ja: A2A AgentCard スキル写像
    descriptions:
      zh: AgentCard 声明 deep_research 技能与 researcher 角色，投影为 CoordinationRole 修订，而非 Agent 实例本身。
      en: An AgentCard declares deep_research skill and researcher role, projected as a CoordinationRole revision rather than the agent instance.
      ja: AgentCard の deep_research スキルと researcher 役割を Agent インスタンスではなく CoordinationRole revision に投影します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard roles/skills
    field_values:
      coordination_role_id: coord-role-deep-researcher
      revision: "2"
    related_node_ids: [CoordinationRole, WorkerRole]
    related_relation_ids: []
    source_claims: [claim-cr-a2a]
  - id: CoordinationRole-crewai-agent
    labels:
      zh: CrewAI Agent 职责绑定
      en: CrewAI agent duty binding
      ja: CrewAI Agent 責務バインディング
    descriptions:
      zh: incident 分析任务中 agent-17 通过 binding 承担协调职责，负责拆分日志检查并委派数据库分析。
      en: In incident analysis, agent-17 bears a coordination role through binding, decomposing log checks and delegating database analysis.
      ja: 障害分析で agent-17 が binding を介してログ確認分解と DB 分析委任の調整責務を担います。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Agents and tasks
    field_values:
      coordination_role_id: coord-role-incident-coordinator
      revision: "4"
    related_node_ids: [CoordinationRole, Orchestrator]
    related_relation_ids: []
    source_claims: [claim-cr-crewai]
  - id: CoordinationRole-boundary-service-name
    labels:
      zh: 服务名不是协调角色
      en: Service name is not coordination role
      ja: サービス名は調整役割ではない
    descriptions:
      zh: 注册表把进程命名为 orchestrator-service，但没有职责、权限、汇报义务或有效绑定。
      en: A registry names a process orchestrator-service but provides no duties, authority, reporting, or effective binding.
      ja: レジストリが orchestrator-service と命名するだけで、責務・権限・報告・有効 binding がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: role versus deployment identity
    field_values: {}
    related_node_ids: [CoordinationRole]
    related_relation_ids: []
    source_claims: [claim-cr-design]
parent_relation: null
relations: []
sources:
  - id: a2a-spec
    title: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-doc
    relevance: AgentCard roles and skills.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Agent role configuration.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Manager and specialist duty patterns.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Role versus bearer separation.
source_claims:
  - id: claim-cr-a2a
    source: a2a-spec
    supports: A2A AgentCard exposes reusable roles and skills distinct from runtime agent identity.
    locator: AgentCard > roles and skills
    evidence_kind: official
    confidence: high
  - id: claim-cr-crewai
    source: crewai
    supports: CrewAI Agent role/goal describe bindable duties borne across tasks by the same agent instance.
    locator: Concepts > Agents
    evidence_kind: official
    confidence: high
  - id: claim-cr-openai
    source: openai-agents
    supports: OpenAI orchestration patterns assign distinct manager and specialist responsibilities.
    locator: Orchestrating multiple agents
    evidence_kind: official
    confidence: high
  - id: claim-cr-design
    source: moonweave-design
    supports: Moonweave models orchestrator, subagent, and worker as CoordinationRole specializations borne through bindings.
    locator: CoordinationRole concept boundary
    evidence_kind: design-inference
    confidence: high
