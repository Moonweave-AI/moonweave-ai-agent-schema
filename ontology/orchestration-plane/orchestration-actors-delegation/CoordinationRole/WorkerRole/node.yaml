source_claims:
  - id: claim-worker-role-001
    source: lit-mech-owl
    supports: OWL separates planner/coordinator nodes from worker nodes that execute assigned domain work. Moonweave generalizes the performer responsibility as WorkerRole while retaining the bearer's concrete actor or service type.
    locator: Paper > OWL > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-002
    source: lit-mech-owl
    supports: The reviewed multi-agent workflow separates coordinator and worker responsibilities; Moonweave records the worker's eligible work types as a role differentia.
    locator: Paper > OWL workflow > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-003
    source: lit-mech-owl
    supports: The worker stage produces evidence consumed by coordinating stages; Moonweave makes that return requirement an explicit evidence contract.
    locator: Paper > OWL workflow > worker output and coordinator aggregation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-004
    source: lit-mech-owl
    supports: OWL's worker nodes execute assigned work under planner/coordinator organization; this case instantiates that performer responsibility with explicit completion evidence.
    locator: Paper > OWL > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-005
    source: lit-mech-owl
    supports: The worker distinction in OWL concerns nodes that carry out assigned work, not passive resources consumed by those nodes.
    locator: Paper > OWL > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-006
    source: eng-fw-crewai-docs
    supports: CrewAI describes a process as controlling assignments and agents as performing individual tasks. Moonweave consequently keeps WorkerRole focused on executing a scoped work item and Orchestrator focused on selecting, routing, and coordinating workers; the sibling classification is a reviewed design inference.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-007
    source: lit-mech-owl
    supports: OWL distinguishes worker nodes that execute assigned work under coordination, supporting WorkerRole as a specialization of coordination responsibility.
    locator: Paper > OWL > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-worker-role-008
    source: lit-mech-owl
    supports: The worker evidence concerns active performer nodes, not passive resources consumed by a workflow.
    locator: Paper > OWL > planner, coordinator, and worker nodes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
