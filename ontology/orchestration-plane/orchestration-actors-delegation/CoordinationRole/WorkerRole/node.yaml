schema: moonweave.ai/ontology-node/v1
id: WorkerRole
kind: concept
labels:
  zh: 工作者角色
  en: worker role
  ja: ワーカーロール
semantics:
  short_definition:
    zh: 接受已界定 WorkItem 并返回完成证据的执行者协调角色。
    en: A coordination role that accepts a scoped WorkItem and returns completion evidence.
    ja: 境界付き WorkItem を受け取り完了証拠を返す実行者調整役割です。
  definition:
    zh: WorkerRole 是 CoordinationRole 的特化，通过 work_type_scope 与 completion_evidence_contract 规定可接收的工作类型与必须返回的验证证据，执行分配的 WorkItem 但不拥有全局分解或路由权。映射：CrewAI Agent 执行 Task；AutoGen AssistantAgent 处理委派消息；LangGraph worker 节点执行 supervisor 分配的单步工作。SubagentRole 是具备有边界智能体推理的一种 WorkerRole 特化。它不是 Orchestrator，也不是被读取的对象存储等资源。
    en: WorkerRole specializes CoordinationRole with work_type_scope and completion_evidence_contract, performing assigned WorkItems without global decomposition or routing authority. Maps to CrewAI Agents executing Tasks, AutoGen AssistantAgents handling delegated messages, and LangGraph worker nodes running supervisor-assigned steps. SubagentRole is a WorkerRole specialization with bounded agentic reasoning. It is not an Orchestrator nor a passive resource like object storage.
    ja: WorkerRole は work_type_scope・completion_evidence_contract を持ち、WorkItem を実行しますが全体分解/ルーティング権限は持ちません。CrewAI Agent、AutoGen AssistantAgent、LangGraph worker ノードに写像されます。SubagentRole は境界付きエージェント推論を持つ WorkerRole 特化です。
  why_needed:
    zh: 用统一执行者角色描述异构劳动力，保留承担者真实类型，并分离完成证据与协调决策的责任边界。
    en: A common worker role describes heterogeneous performers while preserving bearer types and separating completion evidence from orchestration decisions.
    ja: 異種実行者を共通 worker 役割で表し、完了証拠と編成判断の責任境界を分離します。
  includes:
    - zh: 接收 WorkItem、在授权范围内执行、报告状态并返回结果或完成证据。
      en: Receiving WorkItem, executing within authority, reporting status, and returning result or completion evidence.
      ja: WorkItem 受領・権限内実行・状態報告・結果/完了証拠返却。
  excludes:
    - zh: 决定全局任务分解与路由的 Orchestrator，以及没有工作分配或返回义务的资源端点。
      en: Orchestrator deciding global decomposition and routing, and resource endpoints with no assignment or return duty.
      ja: 全体分解/ルーティングを決める Orchestrator、割当/返却義務のない資源エンドポイント。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: CrewAI Task.agent 绑定 WorkerRole；AutoGen 中 AssistantAgent 接收来自 UserProxy 或 GroupChatManager 的委派；LangGraph worker 节点通常只实现单步 transform 并返回 state patch。集成时必须同时记录 WorkItem 分配与 completion_evidence_contract 要求的产物。
    en: CrewAI Task.agent binds WorkerRole; AutoGen AssistantAgents receive delegation from UserProxy or GroupChatManager; LangGraph worker nodes typically apply one transform and return a state patch. Integrations must record WorkItem allocation and artifacts required by completion_evidence_contract.
    ja: CrewAI Task.agent、AutoGen AssistantAgent、LangGraph worker ノードが WorkerRole を実装します。WorkItem 割当と completion_evidence_contract 必須成果物を記録します。
  typical_input:
    - description: CrewAI agent executing an assigned task.
      format: |
        from crewai import Agent, Task
        analyst = Agent(role="Data Analyst", goal="...", backstory="...")
        analysis_task = Task(description="Clean table", agent=analyst, expected_output="...")
      source_claims: [claim-wr-crewai]
    - description: LangGraph worker node processing supervisor assignment.
      format: |
        builder.add_node("research_worker", research_worker_node)
      source_claims: [claim-wr-langgraph]
  typical_output:
    - description: WorkerRole completion evidence package.
      format: |
        {
          "coordination_role_id": "coord-role-tabular-cleaning-worker",
          "completion_evidence_contract": {
            "required": ["validated_table_ref", "validation_status"]
          }
        }
      source_claims: [claim-wr-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent executing assigned Task.
    - name: AutoGen
      url: https://microsoft.github.io/autogen/
      description: AssistantAgent as delegated worker.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Worker nodes in supervisor workflows.
structure:
  identity_keys: []
  fields:
    - id: work_type_scope
      labels:
        zh: 工作类型范围
        en: work-type scope
        ja: 作業種別範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该工作者角色可被分派的工作类型，不嵌入当前 WorkItem 或承担者。
        en: Work types assignable to the worker role without embedding a current WorkItem or bearer.
        ja: 割当可能な作業種別を列挙し、現在の WorkItem/担い手は埋め込みません。
      example_value: [document-review, evidence-extraction]
      source_claims: [claim-wr-crewai]
    - id: completion_evidence_contract
      labels:
        zh: 完成证据合同
        en: completion-evidence contract
        ja: 完了証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定必须返回何种产物、验证结果和来源记录以证明工作完成或明确失败。
        en: Artifacts, verification results, and provenance required to prove completion or explicit failure.
        ja: 完了または明示的失敗を証明する成果物・検証結果・来歴を規定します。
      example_value:
        required: [artifact_ref, verification_status, source_refs]
      source_claims: [claim-wr-design]
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkerRole-crewai-agent
    labels:
      zh: CrewAI Agent 执行 Task
      en: CrewAI Agent executes Task
      ja: CrewAI Agent が Task を実行
    descriptions:
      zh: Python 执行服务通过 binding 承担 WorkerRole，清洗 work-item-31 并返回校验表格与行数证明。
      en: A Python execution service bears WorkerRole through binding, cleans work-item-31, and returns a validated table plus row-count evidence.
      ja: Python 実行サービスが binding で WorkerRole を担い work-item-31 を清洗し、検証済み表と行数証拠を返します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Agents and Tasks
    field_values:
      coordination_role_id: coord-role-tabular-cleaning-worker
      work_type_scope: [tabular-data-cleaning]
    related_node_ids: [WorkerRole, WorkItem, Task]
    related_relation_ids: [WorkerRole-is_a-CoordinationRole]
    source_claims: [claim-wr-crewai]
  - id: WorkerRole-langgraph-worker
    labels:
      zh: LangGraph worker 节点
      en: LangGraph worker node
      ja: LangGraph worker ノード
    descriptions:
      zh: research_worker 节点接收 supervisor 分配的子问题，执行检索并返回 state patch，无全局路由职责。
      en: research_worker receives a sub-question from the supervisor, performs retrieval, and returns a state patch without global routing duty.
      ja: research_worker が supervisor から部分問題を受け、検索して state patch を返し、全体ルーティング責務は持ちません。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: worker node
    field_values:
      completion_evidence_contract:
        required: [retrieval_citations, summary_ref]
    related_node_ids: [WorkerRole, Orchestrator]
    related_relation_ids: []
    source_claims: [claim-wr-langgraph]
  - id: WorkerRole-boundary-storage
    labels:
      zh: 存储桶不是 WorkerRole
      en: Storage bucket is not WorkerRole
      ja: ストレージは WorkerRole ではない
    descriptions:
      zh: 对象存储被读取获取输入文件，但没有接收 WorkItem、报告状态或承担结果质量责任。
      en: Object storage is read for input but receives no WorkItem, reports no status, and bears no result-quality duty.
      ja: オブジェクトストレージは入力取得に使われるだけで、WorkItem 受領や完了責任を持ちません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: worker versus resource boundary
    field_values: {}
    related_node_ids: [WorkerRole]
    related_relation_ids: []
    source_claims: [claim-wr-design]
parent_relation:
  id: WorkerRole-is_a-CoordinationRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: WorkerRole 接收已分配工作、在授权范围内执行并返回结果或完成证据。
    en: WorkerRole receives assigned work, executes within authority, and returns result or completion evidence.
    ja: WorkerRole は割当作業を受け、権限内で実行し結果/完了証拠を返します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-wr-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Agent task execution.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Worker nodes in multi-agent graphs.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Worker versus orchestrator and resource boundaries.
source_claims:
  - id: claim-wr-crewai
    source: crewai
    supports: CrewAI Agents execute assigned Tasks and return expected outputs as worker responsibility.
    locator: Concepts > Agents and Tasks
    evidence_kind: official
    confidence: high
  - id: claim-wr-langgraph
    source: langgraph
    supports: LangGraph worker nodes perform bounded steps assigned by a supervisor and return results upstream.
    locator: Multi-agent > Subagents
    evidence_kind: official
    confidence: high
  - id: claim-wr-design
    source: moonweave-design
    supports: Moonweave generalizes performer responsibility as WorkerRole while preserving concrete bearer types.
    locator: WorkerRole concept boundary
    evidence_kind: design-inference
    confidence: high
