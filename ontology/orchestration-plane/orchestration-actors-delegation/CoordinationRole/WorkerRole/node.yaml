schema: moonweave.ai/ontology-node/v1
id: WorkerRole
kind: concept
status: accepted
labels:
  zh: 工作者角色
  en: Worker role
  ja: ワーカーロール
semantics:
  short_definition:
    zh: 执行者角色是接受已界定工作并返回结果或证据的协同角色。
    en: A worker role accepts defined work and returns a result or evidence.
    ja: ワーカー役割は、定義済み作業を受け取り結果または証拠を返す調整役割です。
  definition:
    zh: 执行者角色是一种 CoordinationRole，其种差是：它按照分配的 WorkItem 执行工作并返回完成证据，但不必拥有全局分解或路由权；承担者可为人、智能体、模型服务或工具服务，SubagentRole 是其中具备有边界智能体推理的一种特化。
    en: A WorkerRole is a CoordinationRole distinguished by performing an assigned WorkItem and returning completion evidence without necessarily owning global decomposition or routing; it may be borne by a human, agent, model service, or tool service, while SubagentRole is the specialization with bounded agentic reasoning.
    ja: ワーカー役割は CoordinationRole の一種であり、割り当てられた WorkItem を実行して完了証拠を返しますが、全体分解やルーティング権限は必須ではありません。人、エージェント、モデルサービス、ツールサービスが担え、SubagentRole は境界付きエージェント推論を行う特化です。
  why_needed:
    zh: 用统一执行者角色可以描述异构劳动力，同时保留承担者真实类型，并明确执行证据与协调决策的责任边界。
    en: A common worker role describes heterogeneous performers while preserving their actual types and separating responsibility for completion evidence from orchestration decisions.
    ja: 共通のワーカー役割で異種実行者を表しつつ実際の型を保持し、完了証拠と編成判断の責任境界を明確にします。
  includes:
    - zh: 接收 WorkItem、在授权范围内执行、报告状态并返回结果或完成证据。
      en: Receiving a WorkItem, executing within authority, reporting status, and returning a result or completion evidence.
      ja: WorkItem の受領、権限内の実行、状態報告、結果または完了証拠の返却。
  excludes:
    - zh: 决定全局任务分解与路由的 Orchestrator，以及没有工作分配或返回义务的资源端点。
      en: An Orchestrator deciding global decomposition and routing, and a resource endpoint with no work assignment or return duty.
      ja: 全体分解・ルーティングを決める Orchestrator、および作業割り当てや返却義務を持たない資源エンドポイント。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: work_type_scope
      labels:
        zh: 工作类型范围
        en: work-type scope
        ja: 作業種別範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该工作者角色可被分派的工作类型，而不把某个当前 WorkItem 或承担者写入角色定义。
        en: Lists work types assignable to the worker role without embedding a current WorkItem or role bearer in the reusable role definition.
        ja: 再利用可能な役割定義に現在の WorkItem や担当者を埋め込まず、割当可能な作業種別を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - document-review
        - evidence-extraction
      source_claims:
        - claim-worker-role-002
    - id: completion_evidence_contract
      labels:
        zh: 完成证据合同
        en: completion-evidence contract
        ja: 完了証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定工作者返回何种产物、验证结果和来源记录，才能证明所分派工作已经完成或明确失败。
        en: Specifies artifacts, verification results, and provenance records a worker must return to prove assigned work completed or failed explicitly.
        ja: 割当作業の完了または明示的失敗を証明するため返す成果物・検証結果・来歴記録を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - artifact_ref
          - verification_status
          - source_refs
      source_claims:
        - claim-worker-role-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkerRole-manual-positive-20260715
    kind: positive
    labels:
      zh: 工作者角色正例
      en: Positive case for Worker role
      ja: ワーカーロールの正例
    scenario_id: null
    descriptions:
      zh: 协调器把数据清洗 work-item-31 分配给 Python 执行服务，要求输出校验后的表格与行数证明；服务不能改变整体计划。
      en: A coordinator assigns data-cleaning work-item-31 to a Python execution service and requires a validated table plus row-count evidence; the service cannot change the global plan.
      ja: 調整役がデータ整形 work-item-31 を Python 実行サービスへ割り当て、検証済み表と行数証拠を要求し、サービスは全体計画を変更できません。
    field_values:
      coordination_role_id: coord-role-tabular-cleaning-worker
      revision: "2"
      responsibility_scope:
        includes:
          - clean-table
          - validate-row-count
        excludes:
          - change-task-plan
      authority_scope:
        may:
          - run-approved-python
          - write-output-artifact
        must_escalate:
          - source-schema-change
      valid_from: 2026-07-15T08:00:00Z
      work_type_scope:
        - tabular-data-cleaning
        - row-count-verification
      completion_evidence_contract:
        required:
          - validated_table_ref
          - input_row_count
          - output_row_count
          - validation_status
    related_node_ids:
      - WorkerRole
      - CoordinationRole
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    expected_result:
      zh: 该服务在此任务范围承担 WorkerRole，并以实际服务身份通过角色绑定连接。
      en: The service bears WorkerRole for this task scope and remains linked through a role binding to its actual service identity.
      ja: サービスはこのタスク範囲で WorkerRole を担い、実際のサービス同一性へ役割バインディングで接続されます。
    why_valid_or_invalid:
      zh: 它接收界定工作、受权限约束并返回完成证据，但没有全局协调职责。
      en: It receives bounded work, acts under authority constraints, and returns completion evidence without global orchestration duties.
      ja: 境界付き作業を受け、権限制約下で実行し完了証拠を返しますが、全体編成責務は持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-role-004
  - id: WorkerRole-manual-boundary-20260715
    kind: boundary
    labels:
      zh: 工作者角色边界例
      en: Boundary case for Worker role
      ja: ワーカーロールの境界例
    scenario_id: null
    descriptions:
      zh: 对象存储桶被读取以取得输入文件，但它没有接收 WorkItem、报告状态或承担结果质量责任。
      en: An object-storage bucket is read for an input file, but it receives no WorkItem, reports no status, and bears no responsibility for result quality.
      ja: 入力ファイル取得のためオブジェクトストレージを読みますが、WorkItem を受けず、状態報告も結果品質責任もありません。
    field_values: {}
    related_node_ids:
      - WorkerRole
      - CoordinationRole
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    expected_result:
      zh: 存储桶是资源而非 WorkerRole 的承担者。
      en: The bucket is a resource, not a bearer of WorkerRole.
      ja: ストレージは資源であり WorkerRole の担い手ではありません。
    why_valid_or_invalid:
      zh: 被使用的资源不等于承担工作；缺少分配、执行义务与返回证据时不属于执行者角色。
      en: A used resource is not a work performer; without assignment, execution duty, and returned evidence the worker role does not apply.
      ja: 利用される資源は作業実行者ではなく、割り当て、実行義務、返却証拠がなければワーカー役割は成立しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-role-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Orchestrator
    shared_parent_concept_id: CoordinationRole
    differentia:
      zh: 共享父节点对照：父节点 CoordinationRole：WorkerRole（semantic kind=role，骨架 WorkerRole-is_a-CoordinationRole）；Orchestrator（semantic kind=role，骨架 Orchestrator-is_a-CoordinationRole）。双端条件：WorkerRole 条件：“工作者角色是接收有范围工作、执行约定任务并返回证据的协调角色，可由 Agent、模型服务或工具服务承担”；Orchestrator 条件：“编排者角色是一种协调角色；其区分条件是：它描述分解、委派、路由和综合职责，是可由不同 Actor 承担的协调角色，而非固定 Actor 子类”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent CoordinationRole: WorkerRole (semantic kind=role, backbone WorkerRole-is_a-CoordinationRole); Orchestrator (semantic kind=role, backbone Orchestrator-is_a-CoordinationRole). Endpoint conditions: WorkerRole condition: “Worker role is a coordination role that accepts scoped work, performs agreed tasks, and returns evidence; it may be borne by an agent, model service, or tool service”; Orchestrator condition: “As a coordination role, Orchestrator role is distinguished by the fact that orchestrator denotes decomposition, delegation, routing, and synthesis responsibilities and is therefore a CoordinationRole borne by actors, not a fixed actor subtype”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 CoordinationRole：WorkerRole（semantic kind=role、バックボーン WorkerRole-is_a-CoordinationRole）；Orchestrator（semantic kind=role、バックボーン Orchestrator-is_a-CoordinationRole）。両端条件：WorkerRole の条件：「調整役割に属するワーカーロールは、次の事実を種差とします：それは範囲付き作業を受け、合意したタスクを実行し、証拠を返す協調ロールで、Agent、モデルサービス、ツールサービスが担えます」；Orchestrator の条件：「調整役割に属するオーケストレーター役割は、次の事実を種差とします：Orchestrator は分解、委任、経路制御、統合の責務を表すため、固定アクター下位型でなくアクターが担う CoordinationRole である」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-worker-role-006
