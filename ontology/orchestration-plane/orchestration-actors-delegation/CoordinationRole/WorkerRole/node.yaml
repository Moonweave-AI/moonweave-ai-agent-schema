schema: moonweave.ai/ontology-node/v1
id: WorkerRole
kind: concept
labels:
  zh: 工作者角色
  en: Worker role
  ja: ワーカーロール
semantics:
  short_definition:
    zh: 执行者角色是接受已界定工作并返回结果或证据的协同角色。
    en: A worker role accepts defined work and returns a result or evidence.
    ja: ワーカー役割は、定義済み作業を受け取り結果または証拠を返す調整役割です。
  definition:
    zh: 执行者角色是一种 CoordinationRole，其种差是：它按照分配的 WorkItem 执行工作并返回完成证据，但不必拥有全局分解或路由权；承担者可为人、智能体、模型服务或工具服务，SubagentRole 是其中具备有边界智能体推理的一种特化。
    en: A WorkerRole is a CoordinationRole distinguished by performing an assigned WorkItem and returning completion evidence without necessarily owning global decomposition or routing; it may be borne by a human, agent, model service, or tool service, while SubagentRole is the specialization with bounded agentic reasoning.
    ja: ワーカー役割は CoordinationRole の一種であり、割り当てられた WorkItem を実行して完了証拠を返しますが、全体分解やルーティング権限は必須ではありません。人、エージェント、モデルサービス、ツールサービスが担え、SubagentRole は境界付きエージェント推論を行う特化です。
  why_needed:
    zh: 用统一执行者角色可以描述异构劳动力，同时保留承担者真实类型，并明确执行证据与协调决策的责任边界。
    en: A common worker role describes heterogeneous performers while preserving their actual types and separating responsibility for completion evidence from orchestration decisions.
    ja: 共通のワーカー役割で異種実行者を表しつつ実際の型を保持し、完了証拠と編成判断の責任境界を明確にします。
  includes:
    - zh: 接收 WorkItem、在授权范围内执行、报告状态并返回结果或完成证据。
      en: Receiving a WorkItem, executing within authority, reporting status, and returning a result or completion evidence.
      ja: WorkItem の受領、権限内の実行、状態報告、結果または完了証拠の返却。
  excludes:
    - zh: 决定全局任务分解与路由的 Orchestrator，以及没有工作分配或返回义务的资源端点。
      en: An Orchestrator deciding global decomposition and routing, and a resource endpoint with no work assignment or return duty.
      ja: 全体分解・ルーティングを決める Orchestrator、および作業割り当てや返却義務を持たない資源エンドポイント。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      CoordinationRole 与 CoordinationOwnershipRecord 把 OpenAI/LangGraph supervisor-worker 职责投影为可版本化
      本地规范，经 ActorRoleBinding 绑定 PROV Agent。OpenAI handoff 转移会话控制时更新 ControlOwnership，
      编排者整合最终答案时保留 AnswerOwnership，不重命名 SDK Agent 或 A2A Task。
    en: >-
      CoordinationRole and CoordinationOwnershipRecord project OpenAI/LangGraph supervisor-worker duties into
      versioned local specifications bound to PROV Agents through ActorRoleBinding. OpenAI handoffs update
      ControlOwnership when conversation control transfers; orchestrators retain AnswerOwnership when synthesizing
      final answers, without renaming SDK Agents or A2A Tasks.
    ja: >-
      CoordinationRole/CoordinationOwnershipRecord は supervisor-worker duty を versioned local spec に投影し
      ActorRoleBinding で PROV Agent に bind する。OpenAI handoff は ControlOwnership を更新し orchestrator は
      AnswerOwnership を保持する。SDK Agent や A2A Task に改名しない。
  typical_input:
    - description:
        zh: 声明协调职责、权限范围与 ActorRoleBinding 的角色 revision。
        en: Role revision declaring coordination duties, authority scope, and ActorRoleBinding.
        ja: coordination duty/authority scope/ActorRoleBinding を宣言する role revision。
      format: |-
        {"coordination_role_id":"coord-role-research-orchestrator","revision":"5","responsibility_scope":{"includes":["decompose","delegate","synthesize"]},"authority_scope":{"may":["invoke-specialists"],"must_escalate":["policy-override"]}}
  typical_output:
    - description:
        zh: 绑定到具体 Actor 的有效角色与所有权记录引用。
        en: Effective role and ownership record references bound to a concrete Actor.
        ja: concrete Actor に bind された effective role/ownership record reference。
      format: |-
        {"actor_binding_ref":"binding-incident-4","coordination_role_ref":"coord-role-research-orchestrator@5","control_ownership_ref":"control-own-91","answer_ownership_ref":"answer-own-91"}
  reference_implementations:
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#term_Agent
      description: Defines Agent as a responsible entity distinct from activities and entities.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager, specialist, and handoff orchestration roles.
    - name: LangChain subagents
      url: https://docs.langchain.com/oss/python/langchain/multi-agent/subagents
      description: Documents supervisor orchestrator routing work to subagents.
  source_claims:
    - claim-coordination-role-002
    - claim-coordination-role-010
structure:
  identity_keys: []
  fields:
    - id: work_type_scope
      labels:
        zh: 工作类型范围
        en: work-type scope
        ja: 作業種別範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该工作者角色可被分派的工作类型，而不把某个当前 WorkItem 或承担者写入角色定义。
        en: Lists work types assignable to the worker role without embedding a current WorkItem or role bearer in the reusable role definition.
        ja: 再利用可能な役割定義に現在の WorkItem や担当者を埋め込まず、割当可能な作業種別を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - document-review
        - evidence-extraction
      source_claims:
        - claim-worker-role-002
    - id: completion_evidence_contract
      labels:
        zh: 完成证据合同
        en: completion-evidence contract
        ja: 完了証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定工作者返回何种产物、验证结果和来源记录，才能证明所分派工作已经完成或明确失败。
        en: Specifies artifacts, verification results, and provenance records a worker must return to prove assigned work completed or failed explicitly.
        ja: 割当作業の完了または明示的失敗を証明するため返す成果物・検証結果・来歴記録を規定します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - artifact_ref
          - verification_status
          - source_refs
      source_claims:
        - claim-worker-role-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkerRole-manual-positive-20260715
    labels:
      zh: WorkerRole positive
      en: WorkerRole positive
      ja: WorkerRole positive
    descriptions:
      zh: CrewAI 映射 WorkerRole：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps WorkerRole: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI WorkerRole: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {coordination_role_id: coord-role-tabular-cleaning-worker, revision: 2}

    related_node_ids:
      - WorkerRole
      - CoordinationRole
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    source_claims:
      - claim-worker-role-004

  - id: WorkerRole-manual-boundary-20260715
    labels:
      zh: WorkerRole boundary
      en: WorkerRole boundary
      ja: WorkerRole boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 WorkerRole 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not WorkerRole static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで WorkerRole 静的 TaskPlan ではない。
    field_values: {}

    related_node_ids:
      - WorkerRole
      - CoordinationRole
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    source_claims:
      - claim-worker-role-005

  - id: WorkerRole-counterexample-orchestrator-plan-change
    labels:
      zh: WorkerRole counterexample
      en: WorkerRole counterexample
      ja: WorkerRole counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 WorkerRole。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style WorkerRole.
      ja: Python/code なし自然言語計画は TaskWeaver 式 WorkerRole にならない。
    field_values: {coordination_role_id: coord-role-tabular-cleaning-worker}

    related_node_ids:
      - WorkerRole
      - Orchestrator
      - TaskPlan
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    source_claims:
      - claim-worker-role-005

  - id: WorkerRole-instance-langchain-subagent-run
    labels:
      zh: WorkerRole instance
      en: WorkerRole instance
      ja: WorkerRole instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 WorkerRole HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to WorkerRole HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が WorkerRole HandoffDecision に写像。
    field_values: {coordination_role_id: coord-role-tabular-cleaning-worker, revision: 2}

    related_node_ids:
      - WorkerRole
      - CoordinationRole
      - TaskStep
    related_relation_ids:
      - WorkerRole-is_a-CoordinationRole
    source_claims:
      - claim-worker-role-004
      - claim-coordination-role-002

