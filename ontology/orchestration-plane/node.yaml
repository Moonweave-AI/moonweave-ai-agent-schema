schema: moonweave.ai/ontology-node/v1
id: orchestration-plane
kind: domain
labels:
  zh: 智能体编排域
  en: Agent Orchestration Domain
  ja: エージェントオーケストレーションドメイン
semantics:
  short_definition:
    zh: 定义目标分解、计划步骤、路由、委派、控制转移与工作流组合的领域。
    en: The domain for goal decomposition, plan steps, routing, delegation, control transfer, and workflow composition.
    ja: 目標分解、計画 step、routing、delegation、制御移転、workflow composition のドメイン。
  definition:
    zh: 智能体编排域描述在执行之前或执行之间如何决定“接下来由谁做什么”：内部 Objective、TaskPlan 和 TaskStep 的分解与依赖，工作流节点和边的路由，保留控制权的委派，以及将会话/任务处理交给另一主体的 handoff。它记录意图与控制结构，而不是实际运行、工具副作用或质量判断。A2A `Task`、`TaskStatus`、`Message`、`Part` 和 `Artifact` 仅在真实 A2A 协议载荷中使用；内部计划步骤不能因类似而被命名为 A2A Task。反之，OpenAI handoff 即使通过模型可选的 tool 触发，只要接收智能体接管对话处理，就属于编排而不是普通 ToolCall。
    en: >-
      The Agent Orchestration Domain describes how an agent system decides “who does what next” before or between executions: decomposition and dependencies of internal Objective, TaskPlan, and TaskStep objects; routing over workflow nodes and edges; delegation that retains control; and handoff that gives conversation or task handling to another party. It records intent and control structure, not actual runs, tool side effects, or quality judgments. A2A `Task`, `TaskStatus`, `Message`, `Part`, and `Artifact` are used only for a real A2A protocol payload; an internal plan step is not an A2A Task by resemblance. Conversely, an OpenAI handoff belongs to orchestration rather than an ordinary ToolCall when the receiving agent takes over conversation handling, even though the model invokes it through a tool-shaped interface.
    ja: エージェントオーケストレーションドメインは、実行前または実行間にシステムが「次に誰が何をするか」をどのように決めるかを記述します。内部 Objective、TaskPlan、TaskStep の分解と依存関係、workflow node/edge の routing、制御を保持する delegation、会話または task 処理を他者に渡す handoff が対象です。実行結果、tool 副作用、品質判断ではなく、意図と制御構造を記録します。A2A `Task`、`TaskStatus`、`Message`、`Part`、`Artifact` は実際の A2A protocol payload の場合だけに使い、似ている内部計画 step を A2A Task とは扱いません。反対に OpenAI handoff はモデルが tool 形状の interface で起動しても、受信 agent が会話処理を引き継ぐ場合には通常の ToolCall ではなく orchestration に属します。
  why_needed:
    zh: 复杂工作需要明确的分解、并行、停止条件和责任边界。若把计划当作运行、把 handoff 当作工具结果、或把协议任务当作所有内部工作，系统就无法正确恢复、审计或向用户解释谁负责下一步。
    en: Complex work needs explicit decomposition, parallelism, stopping conditions, and responsibility boundaries. If plans are confused with runs, handoffs with tool results, or protocol tasks with all internal work, the system cannot recover, audit, or explain who is responsible for the next step.
    ja: 複雑な作業には、明示的な分解、並列性、停止条件、責任境界が必要です。計画を run と、handoff を tool result と、protocol task をすべての内部作業と混同すると、システムは回復、監査、次 step の責任説明を正しく行えません。
  includes:
    - zh: 内部 Objective、TaskPlan、TaskStep、依赖、完成条件和可执行路由规范。
      en: Internal Objective, TaskPlan, TaskStep, dependencies, completion criteria, and executable routing specifications.
      ja: 内部 Objective、TaskPlan、TaskStep、依存関係、完了条件、実行可能な routing 仕様。
    - zh: 工作流图的节点、固定/条件边、扇出扇入、循环边界和组合规则。
      en: Workflow-graph nodes, fixed and conditional edges, fan-out/fan-in, loop bounds, and composition rules.
      ja: workflow graph の node、固定/条件 edge、fan-out/fan-in、loop bound、composition rule。
    - zh: 有明确接收者、输入范围和控制语义的委派与 handoff。
      en: Delegation and handoff with explicit recipients, input scope, and control semantics.
      ja: 明示的 recipient、入力範囲、制御意味論を持つ delegation と handoff。
    - zh: 真实 A2A 调用中的 Agent Card、SendMessageRequest、Task、TaskStatus、Message、Part 与 Artifact。
      en: Agent Card, SendMessageRequest, Task, TaskStatus, Message, Part, and Artifact in a real A2A exchange.
      ja: 実際の A2A exchange における Agent Card、SendMessageRequest、Task、TaskStatus、Message、Part、Artifact。
    - zh: 触发评估或修订的编排活动，但评估标准、得分和反馈内容属于反馈域。
      en: Orchestration activities that trigger evaluation or revision, while evaluation criteria, scores, and feedback content belong to Feedback.
      ja: evaluation または revision を起動する orchestration activity。ただし評価基準、score、feedback 内容は Feedback に属します。
  excludes:
    - zh: 实际 RunAttempt、检查点、恢复、原始 telemetry 和已发生的执行事实，属于运行时域。
      en: Actual RunAttempt objects, checkpoints, recovery, raw telemetry, and execution facts, which belong to Runtime.
      ja: 実際の RunAttempt、checkpoint、recovery、生 telemetry、実行事実。これらは Runtime に属します。
    - zh: 工具契约、参数绑定、工具调用、结果和副作用，属于工具域；只有控制转移才进入编排。
      en: Tool contracts, argument binding, tool calls, results, and effects, which belong to Tool; only control transfer enters Orchestration.
      ja: tool 契約、引数束縛、tool call、result、副作用。これらは Tool に属し、制御移転だけが Orchestration に入ります。
    - zh: 安全策略、授权、批准和披露决定，属于安全域；编排只能在其结果上路由。
      en: Safety policies, authorization, approval, and disclosure decisions, which belong to Safety; orchestration can only route on their results.
      ja: Safety policy、authorization、approval、disclosure decision。これらは Safety に属し、orchestration はその結果で routing するだけです。
    - zh: 评估量表、分数、偏好或批评结论，属于反馈域；编排不把“触发评估”误作“产生评估”。
      en: Evaluation rubrics, scores, preferences, or critique conclusions, which belong to Feedback; orchestration does not mistake triggering evaluation for producing it.
      ja: 評価 rubric、score、preference、critique conclusion。これらは Feedback に属し、orchestration は evaluation の起動を評価の生成と取り違えません。
  semantic_kind: domain
  aliases: [agent orchestration, workflow control, multi-agent coordination]
engineering:
  explanation:
    zh: 编排实现先建立可验证的计划/图结构，再由运行时执行。LangGraph 的 `StateGraph` 明确由 state、node 与 edge 构成，开发者添加节点/边后调用 `.compile()`，再以 `.invoke()` 运行；这些是实际图 API，而非所有工作流的通用协议。OpenAI Agents SDK 通过 `handoffs` 或 `handoff()` 指定接收 agent、输入 schema/filter 和控制转移；其 handoff 在 LLM 层呈现为 tool，但接收 agent 获得后续会话处理。A2A 则用 JSON-RPC `SendMessage` 携带 SendMessageRequest，返回 Task 或 Message；本体只在该协议载荷存在时建立 A2A 节点。
    en: An orchestration implementation builds a verifiable plan or graph before Runtime executes it. LangGraph's `StateGraph` explicitly consists of state, nodes, and edges; developers add nodes and edges, call `.compile()`, then run `.invoke()`. Those are real graph APIs, not a universal protocol for every workflow. The OpenAI Agents SDK specifies a receiving agent, input schema/filter, and control transfer through `handoffs` or `handoff()`; the handoff appears as a tool to the LLM but gives the receiving agent subsequent conversation handling. A2A instead carries SendMessageRequest through JSON-RPC `SendMessage` and returns a Task or Message; the ontology creates A2A nodes only when that payload exists.
    ja: orchestration 実装は Runtime が実行する前に検証可能な plan または graph を構築します。LangGraph の `StateGraph` は state、node、edge から成り、開発者は node と edge を追加して `.compile()` を呼び、その後 `.invoke()` で実行します。これは実際の graph API であり、すべての workflow の普遍 protocol ではありません。OpenAI Agents SDK は `handoffs` または `handoff()` により受信 agent、入力 schema/filter、制御移転を指定します。handoff は LLM には tool として現れますが、受信 agent が後続の会話処理を担います。A2A は代わりに JSON-RPC `SendMessage` で SendMessageRequest を送り、Task または Message を返します。本体が A2A node を作るのはその payload が存在する場合だけです。
  typical_input:
    - description:
        zh: LangGraph 状态图定义
        en: LangGraph StateGraph definition
        ja: LangGraph StateGraph 定義
      format: |-
        builder = StateGraph(ReviewState); builder.add_node("triage", triage); builder.add_edge(START, "triage"); graph = builder.compile()
    - description:
        zh: A2A SendMessage JSON-RPC 请求
        en: A2A SendMessage JSON-RPC request
        ja: A2A SendMessage JSON-RPC 要求
      format: |-
        {"jsonrpc":"2.0","id":1,"method":"SendMessage","params":{"message":{"messageId":"m-1","role":"ROLE_USER","parts":[{"text":"Review this change"}]}}}
  typical_output:
    - description:
        zh: 已编译的工作流调用结果
        en: Compiled-workflow invocation result
        ja: compile 済み workflow invocation 結果
      format: |-
        {"graph":"review-workflow","next_node":"security_review","state_update":{"review_request_id":"pr-42"}}
    - description:
        zh: A2A SendMessage 响应
        en: A2A SendMessage response
        ja: A2A SendMessage 応答
      format: |-
        {"jsonrpc":"2.0","id":1,"result":{"task":{"id":"task-42","status":{"state":"TASK_STATE_WORKING"}}}}
  reference_implementations:
    - name: LangGraph Graph API overview
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Defines StateGraph state, nodes, edges, conditional routing, compilation, and invocation.
    - name: OpenAI Agents SDK Handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Defines handoff targets, input schema/filtering, and transfer to a receiving agent.
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Defines agents-as-tools as a control-retaining alternative to a full handoff.
    - name: A2A Protocol Specification 1.0
      url: https://a2a-protocol.org/latest/specification/
      description: Defines Agent Card, SendMessageRequest, Task, TaskStatus, TaskState, Message, Part, and Artifact.
structure:
  identity_keys:
    - id
  fields:
    - id: id
      labels:
        zh: 领域标识
        en: Domain identifier
        ja: ドメイン識別子
      definitions:
        zh: 智能体编排域的稳定本体标识。
        en: Stable ontology identifier for the Agent Orchestration Domain.
        ja: エージェントオーケストレーションドメインの安定した本体識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-plane$'
      example_value: orchestration-plane
      source_claims: [claim-orchestration-plane-design]
    - id: module_ids
      labels:
        zh: 模块标识列表
        en: Module identifier list
        ja: モジュール識別子リスト
      definitions:
        zh: 角色/委派、计划、路由控制、组合、协议 handoff 与评估触发模块的标识。
        en: Identifiers for actor/delegation, planning, routing control, composition, protocol handoff, and evaluation-trigger modules.
        ja: actor/delegation、planning、routing control、composition、protocol handoff、evaluation trigger module の識別子。
      datatype: array
      required: true
      cardinality: {min: 6, max: 6}
      example_value: '["orchestration-actors-delegation","orchestration-task-planning","orchestration-routing-control","orchestration-composition","orchestration-delegation-handoff","orchestration-evaluation"]'
      source_claims: [claim-orchestration-plane-design]
  constraints:
    - id: orchestration-plane-control-boundary
      severity: error
      language: plain
      expression: Keep an internal objective, plan, step, graph route, delegation, and handoff distinct from the runtime record that realizes it. Use A2A protocol names only for an actual A2A payload. Treat a subagent call as Tool only while the caller retains control; record it as Handoff when the receiving agent takes over conversation or task processing.
      explanation:
        zh: 该约束保护计划与执行、工具调用与控制移交、内部任务与协议 Task 的不同语义。
        en: This protects distinct semantics for plan versus execution, tool call versus control transfer, and internal work versus a protocol Task.
        ja: この制約は、plan と execution、tool call と control transfer、内部作業と protocol Task の異なる意味論を守ります。
      source_claims: [claim-orchestration-langgraph, claim-orchestration-handoff, claim-orchestration-a2a-boundary, claim-orchestration-plane-design]
  required_relations: []
examples:
  - id: orchestration-plane-positive-review-plan
    labels:
      zh: orchestration-plane positive
      en: orchestration-plane positive
      ja: orchestration-plane positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 orchestration-plane 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for orchestration-plane: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が orchestration-plane で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {objective_id: "objective-review-42, plan_id: plan-review-42, step_ids: \"'[\\\"security", execution_ref: null}
    related_node_ids:
      - orchestration-plane
      - Objective
      - TaskPlan
      - TaskStep
    related_relation_ids: []
    source_claims:
      - claim-orchestration-plane-design

  - id: orchestration-plane-counterexample-tool-call
    labels:
      zh: orchestration-plane counterexample
      en: orchestration-plane counterexample
      ja: orchestration-plane counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 orchestration-plane 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style orchestration-plane group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 orchestration-plane ではない。
    field_values: {tool_call_id: call-weather-7, plan_id: null, handoff_id: null}
    related_node_ids:
      - orchestration-plane
      - tool-plane
      - ToolCall
    related_relation_ids: []
    source_claims:
      - claim-orchestration-plane-design

  - id: orchestration-plane-boundary-handoff-agent-tool
    labels:
      zh: orchestration-plane boundary
      en: orchestration-plane boundary
      ja: orchestration-plane boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 orchestration-plane 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not orchestration-plane internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で orchestration-plane 内部 spec ではない。
    field_values: {handoff_target: refund_agent, receiving_agent_takes_control: true, agent_as_tool_manager_retains_control: true}
    related_node_ids:
      - orchestration-plane
      - Handoff
      - AgentAsToolInvocation
    related_relation_ids: []
    source_claims:
      - claim-orchestration-handoff
      - claim-orchestration-agent-tool

  - id: orchestration-plane-instance-a2a-send-message
    labels:
      zh: orchestration-plane instance
      en: orchestration-plane instance
      ja: orchestration-plane instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 orchestration-plane。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to orchestration-plane.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が orchestration-plane に写像。
    field_values: {jsonrpc_id: rpc-1, method: SendMessage, task_id: task-42, task_state: TASK_STATE_WORKING}
    related_node_ids:
      - orchestration-plane
      - A2ASendMessageRequest
      - A2ATask
      - A2ATaskStatus
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - claim-orchestration-a2a-boundary

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API overview
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Defines graph state, nodes, fixed/conditional edges, StateGraph construction, compilation, and invocation.
  - id: openai-agents-handoffs
    title: OpenAI Agents SDK — Handoffs
    url: https://openai.github.io/openai-agents-python/handoffs/
    source_type: official-doc
    relevance: Defines handoff destinations, inputs, filters, and transfer to a receiving agent.
  - id: openai-agents-tools
    title: OpenAI Agents SDK — Tools
    url: https://openai.github.io/openai-agents-python/tools/
    source_type: official-doc
    relevance: Defines agents-as-tools as callable subagents without a full handoff.
  - id: a2a-protocol-specification
    title: Agent2Agent (A2A) Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines Agent Card, SendMessageRequest, Task, TaskStatus, TaskState, Message, Part, and Artifact protocol data-model objects.
source_claims:
  - id: claim-orchestration-langgraph
    source: langgraph-graph-api
    supports: LangGraph models workflows as state, nodes, and edges; developers add nodes and edges, compile a StateGraph, then invoke it. These facts support a concrete graph-workflow implementation, not a universal workflow protocol.
    locator: Graph API overview — Graphs; StateGraph; Compiling your graph; Nodes; Edges
    evidence_kind: normative
    confidence: high
  - id: claim-orchestration-handoff
    source: openai-agents-handoffs
    supports: The OpenAI Agents SDK defines handoffs as delegating work to another agent, with target selection, optional input schema/filtering, and subsequent receiving-agent conversation handling; the LLM sees a tool-shaped handoff entry point.
    locator: Handoffs — overview; creating a handoff; handoff inputs; input filters
    evidence_kind: normative
    confidence: high
  - id: claim-orchestration-agent-tool
    source: openai-agents-tools
    supports: The OpenAI Agents SDK documents agents-as-tools as exposing an agent as callable without a full handoff, which supports the retained-control boundary.
    locator: Tools — overview; Agents as tools
    evidence_kind: normative
    confidence: high
  - id: claim-orchestration-a2a-boundary
    source: a2a-protocol-specification
    supports: A2A defines SendMessageRequest, Task, TaskStatus, TaskState, Message, Part, and Artifact as protocol data-model objects and specifies SendMessage responses containing a Task or Message. Moonweave reserves these names for real A2A payloads.
    locator: Protocol operations — SendMessage; Protocol data model — Task, TaskStatus, TaskState, Message, Part, Artifact
    evidence_kind: normative
    confidence: high
  - id: claim-orchestration-plane-design
    source: langgraph-graph-api
    supports: Moonweave's separation of internal Objective/TaskPlan/TaskStep, routing, delegation, handoff, execution, and feedback is a local design boundary informed by workflow mechanics; it is not a LangGraph class hierarchy.
    locator: Graph API overview — Graphs; state, nodes, and edges
    evidence_kind: design-inference
    confidence: high
