source_claims:
  - id: claim-orchestration-plane-001
    source: eng-fw-crewai-docs
    supports: CrewAI documents agents as autonomous task performers, tasks as work descriptions with expected outputs, crews as collaborating agents and tasks governed by a process, and flows as event-driven workflow control. These distinct objects support keeping work intent, assignment, collaboration, and control topology in orchestration rather than collapsing them into one runtime trace. CrewAI does not define Moonweave's complete delegation, gate, voting, synthesis-provenance, or retry ontology; those structures remain reviewed design inferences.
    locator: Documentation > Concepts > Agents, Tasks, Crews, Processes, and Flows
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-orchestration-plane-002
    source: eng-fw-langgraph-docs
    supports: LangGraph models an agent workflow as shared state plus nodes and directed edges, and separately provides durable execution, human-in-the-loop suspension, memory, and subgraphs. This supports explicit orchestration topology and nested control while preserving a distinction between the declared graph and persisted execution state. LangGraph does not prescribe Moonweave's Objective, DelegationProcess, WorkerAssignment, VotingRule, or synthesis-provenance classes; their hierarchy and ownership are ontology decisions.
    locator: Overview > Graphs, state, nodes, and edges; Core benefits > Durable execution, human-in-the-loop, memory; Subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-orchestration-plane-003
    source: eng-fw-langgraph-docs
    supports: LangGraph documents graph-based workflows, subgraphs, durable execution, and human-in-the-loop control. Moonweave uses that operational separation to ground explicit planning, parallel composition, gates, and handoff records.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
