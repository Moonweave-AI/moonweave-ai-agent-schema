schema: moonweave.ai/ontology-node/v1
id: orchestration-plane
kind: domain
labels:
  en: Control & Orchestration Domain
  zh: 控制与编排域
  ja: 制御とオーケストレーションドメイン
semantics:
  short_definition:
    zh: 控制与编排域决定多智能体工作应当如何分解、委派、路由、组合与收敛，而不记录具体运行尝试本身。
    en: The control and orchestration domain decides how multi-agent work should be decomposed, delegated, routed, composed, and converged without recording the runtime attempt itself.
    ja: 制御とオーケストレーションドメインは、マルチエージェント作業をどう分解・委任・経路制御・構成・収束させるかを決め、実行試行そのものは記録しません。
  definition:
    zh: 控制与编排域拥有把目标转化为可执行协作结构所需的规范与发生事实：任务与计划、委派与交接、路由与门控、并行/链式/层级组合，以及基于评估的改路与重试决策。它把“应当发生什么、由谁承担、下一步去哪里”与运行域中的“实际发生了什么”分开。编排可以引用评估分数、工具结果或会话状态作为路由证据，但不重新拥有指标定义、运行日志或安全授权语义。各子模块分别承载规划、委派、路由、组合与改进活动；域根只声明这些能力的边界与协作关系。
    en: "The control and orchestration domain owns the specifications and occurrence facts needed to turn goals into executable collaboration structure: tasks and plans, delegation and handoff, routing and gates, parallel/chain/hierarchical composition, and evaluation-driven reroute or retry decisions. It separates what should happen, who should bear responsibility, and where control goes next from what actually happened in the runtime domain. Orchestration may reference evaluation scores, tool results, or conversation state as routing evidence, but it does not re-own metric definitions, runtime logs, or security-authorization semantics. Child modules carry planning, delegation, routing, composition, and improvement activities; the domain root declares only their boundaries and collaboration relationships."
    ja: 制御とオーケストレーションドメインは、目標を実行可能な協働構造へ変換するために必要な仕様と発生事実—タスクと計画、委任と引き継ぎ、ルーティングとゲート、並列／連鎖／階層構成、評価に基づく経路変更と再試行判断—を所有します。「何を誰が次にどこへ進むべきか」と実行ドメインの「実際に何が起きたか」を分離します。編成は評価スコア、ツール結果、会話状態をルーティング証拠として参照できますが、指標定義、実行ログ、安全認可意味を再所有しません。子モジュールが計画、委任、ルーティング、構成、改善活動を担い、ドメイン根はそれらの境界と協働関係だけを宣言します。
  why_needed:
    zh: 没有这层语义，系统只能看到模型调用和工具日志，无法回答谁该接下一棒、为何走这条分支、交接是否完成，或在失败后应当重试还是停止。
    en: Without this layer, a system only sees model calls and tool logs and cannot answer who should take the next turn, why a branch was chosen, whether a handoff completed, or whether control should retry or stop after failure.
    ja: この層がなければ、システムはモデル呼び出しとツールログしか見えず、次に誰が引き継ぐか、なぜその分岐を選んだか、引き継ぎが完了したか、失敗後に再試行すべきか停止すべきかを答えられません。
  includes:
    - zh: "目标与任务规划（owner: orchestration-task-planning）、委派与交接（owner: orchestration-delegation-handoff）、路由与门控（owner: orchestration-routing-control）、协作组合（owner: orchestration-composition）、编排角色与所有权（owner: orchestration-actors-delegation）、评估驱动的改进活动（owner: orchestration-evaluation）。"
      en: "Goal and task planning (owner: orchestration-task-planning), delegation and handoff (owner: orchestration-delegation-handoff), routing and gates (owner: orchestration-routing-control), collaboration composition (owner: orchestration-composition), orchestration roles and ownership (owner: orchestration-actors-delegation), and evaluation-driven improvement activities (owner: orchestration-evaluation)."
      ja: "目標とタスク計画（owner: orchestration-task-planning）、委任と引き継ぎ（owner: orchestration-delegation-handoff）、ルーティングとゲート（owner: orchestration-routing-control）、協働構成（owner: orchestration-composition）、編成ロールと所有権（owner: orchestration-actors-delegation）、評価駆動の改善活動（owner: orchestration-evaluation）。"
    - zh: 可复用的路由/委派/组合规范，以及一次运行产生的 RoutingDecision、Handoff、GateOutcome、CompositionActivity 等控制发生事实。
      en: Reusable routing, delegation, and composition specifications plus run-time control occurrences such as RoutingDecision, Handoff, GateOutcome, and CompositionActivity.
      ja: 再利用可能な routing／delegation／composition 仕様と、RoutingDecision、Handoff、GateOutcome、CompositionActivity などの実行時制御発生事実。
  excludes:
    - zh: "运行尝试、RunAttempt、RunResult 与具体工具/模型调用轨迹（owner: runtime-execution-attempts、runtime-plane）；编排只决定应当执行什么，不冒充执行本身。"
      en: "Runtime attempts, RunAttempt, RunResult, and concrete tool or model invocation traces (owner: runtime-execution-attempts, runtime-plane); orchestration decides what should run and does not impersonate execution itself."
      ja: "実行試行、RunAttempt、RunResult、具体的なツール／モデル呼び出し軌跡（owner: runtime-execution-attempts、runtime-plane）。編成は何を実行すべきかを決めるだけで、実行そのものになりすましません。"
    - zh: "评估规范、分数、量规与判定语义（owner: feedback-metrics-evaluation）；编排可消费评估结果改路，但不重新定义指标。"
      en: "Evaluation specifications, scores, rubrics, and verdict semantics (owner: feedback-metrics-evaluation); orchestration may consume evaluation results to reroute but does not redefine metrics."
      ja: "評価仕様、スコア、ルーブリック、判定意味（owner: feedback-metrics-evaluation）。編成は評価結果を消費して経路変更できますが、指標を再定義しません。"
    - zh: "AuthorizationGrant、PolicyDecision 与 ToolApprovalGate 的授权判定（owner: safety-permission-policy）；路由门控可以引用授权结果作为证据，但不替代安全域的允许/拒绝语义。"
      en: "AuthorizationGrant, PolicyDecision, and ToolApprovalGate authorization adjudication (owner: safety-permission-policy); routing gates may reference authorization results as evidence but do not replace safety-domain allow/deny semantics."
      ja: "AuthorizationGrant、PolicyDecision、ToolApprovalGate の認可判定（owner: safety-permission-policy）。ルーティングゲートは認可結果を証拠として参照できますが、安全ドメインの allow／deny 意味を代替しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 新集成应把 LangGraph StateGraph、CrewAI Crew/Flow、A2A tasks/send 与 OpenAI Agents SDK 的 handoff 视为可映射的编排 API 形状，再用 Moonweave 本地对象记录规范与一次控制决定。静态图边、Crew Process、AgentCard 与 handoffs 列表属于可复用规范；Command(goto=...)、RoutingDecision、A2A Task 状态迁移与 handoff 调用属于发生事实。interrupt/resume 与 human-in-the-loop 提供可暂停的控制点，但不自动等于安全授权记录。
    en: "New integrations should treat LangGraph StateGraph, CrewAI Crew/Flow, A2A tasks/send, and OpenAI Agents SDK handoffs as mappable orchestration API shapes, then persist Moonweave-local objects for specifications and one control decision. Static graph edges, Crew Process, AgentCard, and handoff lists are reusable specifications; Command(goto=...), RoutingDecision, A2A Task state transitions, and handoff invocations are occurrences. interrupt/resume and human-in-the-loop provide pausable control points but do not automatically equal safety-authorization records."
    ja: 新しい統合では LangGraph StateGraph、CrewAI Crew/Flow、A2A tasks/send、OpenAI Agents SDK handoff を写像可能な orchestration API 形状として扱い、Moonweave ローカルオブジェクトで仕様と一回の制御判断を保存します。静的グラフ edge、Crew Process、AgentCard、handoffs リストは再利用仕様、Command(goto=...)、RoutingDecision、A2A Task 状態遷移、handoff 呼び出しは発生事実です。interrupt/resume と human-in-the-loop は一時停止可能な制御点を提供しますが、安全認可記録と自動的には同一になりません。
  typical_input:
    - description: LangGraph compiled graph invoke with shared state before conditional routing.
      format: |
        from langgraph.graph import StateGraph, START, END
        from langgraph.types import Command

        builder = StateGraph(State)
        builder.add_node("classify", classify_node)
        builder.add_node("billing", billing_node)
        builder.add_conditional_edges(
            "classify",
            route_by_category,
            {"billing": "billing", "general": END},
        )
        graph = builder.compile()
        graph.invoke({"messages": [{"role": "user", "content": "I was double charged"}]})
      source_claims: [claim-orchestration-langgraph-routing]
    - description: CrewAI hierarchical crew kickoff with manager delegation.
      format: |
        from crewai import Agent, Crew, Process, Task

        research_manager = Agent(role="Research Manager", goal="Delegate research", ...)
        researcher = Agent(role="Researcher", goal="Find sources", ...)
        crew = Crew(
            agents=[research_manager, researcher],
            tasks=[research_task, summary_task],
            process=Process.hierarchical,
            manager_agent=research_manager,
        )
        crew.kickoff(inputs={"topic": "agent routing benchmarks"})
      source_claims: [claim-orchestration-crewai-hierarchical]
    - description: A2A tasks/send delegation after AgentCard discovery.
      format: |
        POST /a2a/v1/tasks/send
        {
          "message": {
            "role": "user",
            "parts": [{"kind": "text", "text": "Summarize ticket T-104 for billing review."}]
          },
          "configuration": {"acceptedOutputModes": ["text/plain"]}
        }
      source_claims: [claim-orchestration-a2a-task-send]
  typical_output:
    - description: Moonweave-local orchestration projection linking specification, control decision, and downstream target without collapsing them.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "routing_policy_ref": "policy-support@7",
          "routing_decision_id": "decision-884",
          "selected_target_ref": "target-billing-worker@5",
          "gate_outcome_id": null,
          "handoff_id": null
        }
      source_claims: [claim-orchestration-domain-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: StateGraph, conditional_edges, Command, Send, interrupt/resume control topology.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agents, Tasks, Crews, Flows, Process.sequential and Process.hierarchical.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: AgentCard discovery, tasks/send, tasks/get task lifecycle.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Agent loop, handoffs, and session-scoped control transfer.
    - name: ReAct
      url: https://arxiv.org/abs/2210.03629
      description: Reasoning-and-acting loop motivating explicit next-step control in agent workflows.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 域标识, en: Domain identifier, ja: ドメイン識別子}
      definitions:
        zh: 控制与编排域的稳定标识，不是某次 RoutingDecision 或 Handoff 的标识。
        en: Stable identifier of the control and orchestration domain, not a RoutingDecision or Handoff identifier.
        ja: 制御とオーケストレーションドメインの安定識別子であり、RoutingDecision や Handoff の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-plane$'
      example_value: orchestration-plane
      allowed_values: []
      source_claims: [claim-orchestration-domain-design]
    - id: control_boundary
      labels: {zh: 控制边界, en: Control boundary, ja: 制御境界}
      definitions:
        zh: 声明编排拥有控制规范与控制决定，而运行尝试、指标语义与安全授权由其他域拥有。
        en: States that orchestration owns control specifications and control decisions while runtime attempts, metric semantics, and security authorization belong to other domains.
        ja: 編成が制御仕様と制御判断を所有し、実行試行、指標意味、安全認可は他ドメインが所有することを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: specification-and-decision-only
      allowed_values: [specification-and-decision-only]
      source_claims: [claim-orchestration-domain-design]
  constraints:
    - id: orchestration-separates-specification-from-attempt
      severity: error
      expression_language: plain
      expression: A reusable TaskPlan, Route, RoutingPolicy, Crew Process, or handoff list must not be asserted as a RunAttempt, A2A Task occurrence, or Handoff completion without a separate control or execution occurrence record.
      explanation:
        zh: 静态协作配置不能冒充已经发生的执行或交接。
        en: Static collaboration configuration cannot impersonate an executed run or completed handoff.
        ja: 静的協働設定は実行済み run や完了 handoff になりすませません。
      source_claims: [claim-orchestration-langgraph-routing, claim-orchestration-domain-design]
    - id: orchestration-does-not-own-metric-semantics
      severity: warning
      expression_language: plain
      expression: A routing gate may reference an evaluation score or verdict as evidence but must not redefine EvaluationMetric, Rubric, or Verdict ownership.
      explanation:
        zh: 路由可以消费评估结果，但不能把指标对象迁入编排域。
        en: Routing may consume evaluation results but cannot relocate metric objects into orchestration.
        ja: ルーティングは評価結果を消費できますが、指標オブジェクトを編成域へ移せません。
      source_claims: [claim-orchestration-domain-design]
  required_relations:
    - id: orchestration-domain-organizes-task-planning
      direction: outgoing
      predicate: organizes
      target_concept_id: orchestration-task-planning
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 域至少组织任务规划模块以承载 Goal、TaskPlan 与 WorkItem 规范。
        en: The domain organizes the task-planning module to carry Goal, TaskPlan, and WorkItem specifications.
        ja: ドメインは Goal、TaskPlan、WorkItem 仕様を担う task-planning モジュールを少なくとも一つ組織します。
      source_claims: [claim-orchestration-domain-design]
    - id: orchestration-domain-organizes-routing-control
      direction: outgoing
      predicate: organizes
      target_concept_id: orchestration-routing-control
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 域至少组织路由与门控模块以承载 RoutingPolicy、Gate 与 RoutingDecision。
        en: The domain organizes the routing-and-gates module to carry RoutingPolicy, Gate, and RoutingDecision.
        ja: ドメインは RoutingPolicy、Gate、RoutingDecision を担う routing-control モジュールを少なくとも一つ組織します。
      source_claims: [claim-orchestration-domain-design]
examples:
  - id: orchestration-plane-example-langgraph-conditional-routing
    labels:
      zh: LangGraph 分类器条件路由
      en: LangGraph classifier conditional routing
      ja: LangGraph 分類器条件ルーティング
    descriptions:
      zh: "classify 节点读取 state.messages 并返回 Command(goto=\"billing\", update={\"category\": \"billing\", \"confidence\": 0.94})；compiled graph 的 conditional_edges 表将 billing 映射到 billing_handler，对应 RoutingPolicy 中的 BranchCondition 与一次 RoutingDecision。"
      en: "The classify node reads state.messages and returns Command(goto=\"billing\", update={\"category\": \"billing\", \"confidence\": 0.94}); the compiled graph conditional-edge map routes billing to billing_handler, matching a BranchCondition in RoutingPolicy and one RoutingDecision occurrence."
      ja: "classify ノードは state.messages を読み Command(goto=\"billing\", update={\"category\": \"billing\", \"confidence\": 0.94}) を返し、compiled graph の conditional_edges 表は billing を billing_handler へ写像し、RoutingPolicy 内 BranchCondition と一回 RoutingDecision に対応します。"
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 Graph API — conditional_edges and Command
    field_values:
      framework: langgraph
      graph_node: classify
      conditional_map:
        billing: billing_handler
        general: __end__
      command_return:
        goto: billing
        update:
          category: billing
          confidence: 0.94
      moonweave_projection:
        routing_policy_ref: policy-support@7
        routing_decision_id: decision-884
        selected_target_ref: target-billing-worker@5
    related_node_ids:
      - orchestration-plane
      - orchestration-routing-control
      - RoutingPolicy
      - BranchCondition
      - RoutingDecision
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-evaluates-RoutingCondition
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-orchestration-langgraph-routing
      - claim-orchestration-domain-design
  - id: orchestration-plane-example-crewai-hierarchical-delegation
    labels:
      zh: CrewAI 层级 crew 委派
      en: CrewAI hierarchical crew delegation
      ja: CrewAI 階層 crew 委任
    descriptions:
      zh: research_manager 作为 manager_agent 运行 Process.hierarchical crew；manager 把 research_task 委派给 researcher，summary_task 在子任务完成后由 manager 汇总，对应 DelegationProcess 与 Handoff 链。
      en: research_manager runs a Process.hierarchical crew as manager_agent; the manager delegates research_task to researcher and synthesizes summary_task after subtasks complete, matching a DelegationProcess and Handoff chain.
      ja: research_manager が manager_agent として Process.hierarchical crew を実行し、research_task を researcher へ委任し、子タスク完了後 summary_task を統合します。DelegationProcess と Handoff 連鎖に対応します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: v1.15 — Process.hierarchical and manager_agent
    field_values:
      framework: crewai
      process: hierarchical
      manager_agent: research_manager
      worker_agents:
        - researcher
      tasks:
        - research_task
        - summary_task
      moonweave_projection:
        delegation_process_id: delegation-research-12
        handoff_ids:
          - handoff-manager-to-researcher-12
          - handoff-researcher-to-manager-12
    related_node_ids:
      - orchestration-plane
      - orchestration-delegation-handoff
      - DelegationProcess
      - Handoff
      - WorkerAssignment
    related_relation_ids:
      - DelegationProcess-has_phase-DelegationPhase
      - Handoff-transfers-ControlOwnership
    source_claims:
      - claim-orchestration-crewai-hierarchical
      - claim-orchestration-domain-design
  - id: orchestration-plane-example-a2a-task-delegation
    labels:
      zh: A2A 协议跨智能体任务委派
      en: A2A Protocol cross-agent task delegation
      ja: A2A プロトコル跨エージェント task 委任
    descriptions:
      zh: 协调者读取远程 billing_agent 的 AgentCard 后调用 tasks/send；返回 Task id=task-a2a-551，status.state 从 TASK_STATE_SUBMITTED 进入 TASK_STATE_WORKING，history 含用户消息与远程 agent 回复，对应跨 Actor 的 DelegationProcess 与 Execution 引用。
      en: After reading the remote billing_agent AgentCard, the coordinator calls tasks/send; the returned Task id=task-a2a-551 moves status.state from TASK_STATE_SUBMITTED to TASK_STATE_WORKING with user and remote-agent messages in history, matching a cross-actor DelegationProcess and Execution reference.
      ja: 調整者は remote billing_agent の AgentCard を読み tasks/send を呼び出し、返却 Task id=task-a2a-551 の status.state が TASK_STATE_SUBMITTED から TASK_STATE_WORKING へ遷移し、history に user と remote agent メッセージを含みます。跨 Actor DelegationProcess と Execution 参照に対応します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: v1.0 — tasks/send, tasks/get, AgentCard
    field_values:
      framework: a2a
      remote_agent_card_url: https://billing.example.com/.well-known/agent-card.json
      rpc_method: tasks/send
      task_id: task-a2a-551
      task_state_path:
        - TASK_STATE_SUBMITTED
        - TASK_STATE_WORKING
      moonweave_projection:
        delegation_process_id: delegation-a2a-551
        remote_agent_ref: billing_agent
    related_node_ids:
      - orchestration-plane
      - orchestration-delegation-handoff
      - DelegationProcess
      - RemoteAgentReference
    related_relation_ids:
      - DelegationProcess-targets-RemoteAgentReference
    source_claims:
      - claim-orchestration-a2a-task-send
      - claim-orchestration-domain-design
  - id: orchestration-plane-example-openai-handoff
    labels:
      zh: OpenAI Agents SDK handoff 模式
      en: OpenAI Agents SDK handoff pattern
      ja: OpenAI Agents SDK handoff パターン
    descriptions:
      zh: triage_agent 声明 handoffs=[billing_agent, refund_agent]；当模型调用 transfer_to_billing_agent 工具时，会话控制从 triage_agent 转到 billing_agent，并保留 HandoffOutputItem 作为 ResponsibilityTransfer 证据。
      en: triage_agent declares handoffs=[billing_agent, refund_agent]; when the model invokes transfer_to_billing_agent, session control moves from triage_agent to billing_agent and a HandoffOutputItem preserves ResponsibilityTransfer evidence.
      ja: triage_agent は handoffs=[billing_agent, refund_agent] を宣言し、モデルが transfer_to_billing_agent を呼ぶと session 制御が triage_agent から billing_agent へ移り、HandoffOutputItem が ResponsibilityTransfer 証拠を保持します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs — transfer_to_* tool invocation
    field_values:
      framework: openai-agents-sdk
      source_agent: triage_agent
      target_agent: billing_agent
      handoff_tool: transfer_to_billing_agent
      session_id: session-support-042
      moonweave_projection:
        handoff_id: handoff-triage-billing-042
        control_ownership_from: triage_agent
        control_ownership_to: billing_agent
    related_node_ids:
      - orchestration-plane
      - orchestration-delegation-handoff
      - Handoff
      - ResponsibilityTransfer
      - ControlOwnership
    related_relation_ids:
      - Handoff-transfers-ControlOwnership
      - Handoff-records-ResponsibilityTransfer
    source_claims:
      - claim-orchestration-openai-handoff
      - claim-orchestration-domain-design
  - id: orchestration-plane-example-cursor-agent-orchestration
    labels:
      zh: Cursor Agent 模式多步编排
      en: Cursor agent mode multi-step orchestration
      ja: Cursor Agent モード多段オーケストレーション
    descriptions:
