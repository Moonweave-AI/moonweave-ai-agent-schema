schema: moonweave.ai/ontology-node/v1
id: orchestration-plane
kind: domain
status: accepted
labels:
  en: Control & Orchestration Domain
  zh: 控制与编排域
  ja: 制御とオーケストレーションドメイン
semantics:
  short_definition:
    en: Control & Orchestration Domain is the operational concern domain for transforming goals into executable, delegated, routed, reviewed, and synthesized workflows. It models objectives, task plans, delegation ownership, handoffs, agents-as-tools, context isolation, worker selection, routing targets, gates, topology, prompt chains, parallel composition, synthesis provenance, and bounded feedback or retry loops.
    zh: 控制与编排域是把目标转化为可执行、可委派、可路由、可审查和可综合工作流的运行关注域。它描述可操作目标、任务计划、委派归属、交接、智能体作为工具调用、上下文隔离、工作者选择、路由目标、闸门、拓扑、提示链、并行组合、综合来源，以及有边界的反馈或重试循环。
    ja: 制御とオーケストレーションドメインは、目標を実行、委任、経路づけ、レビュー、統合が可能なワークフローへ変換する運用関心ドメインです。操作可能な目的、タスク計画、委任帰属、引き継ぎ、エージェント道具呼び出し、文脈隔離、作業者選択、経路目標、ゲート、構造、プロンプト連鎖、並列構成、統合来歴、境界付きフィードバックまたは再試行ループを記述します。
  definition:
    en: Control & Orchestration Domain is the operational concern domain for transforming goals into executable, delegated, routed, reviewed, and synthesized workflows. It models objectives, task plans, delegation ownership, handoffs, agents-as-tools, context isolation, worker selection, routing targets, gates, topology, prompt chains, parallel composition, synthesis provenance, and bounded feedback or retry loops.
    zh: 控制与编排域是把目标转化为可执行、可委派、可路由、可审查和可综合工作流的运行关注域。它描述可操作目标、任务计划、委派归属、交接、智能体作为工具调用、上下文隔离、工作者选择、路由目标、闸门、拓扑、提示链、并行组合、综合来源，以及有边界的反馈或重试循环。
    ja: 制御とオーケストレーションドメインは、目標を実行、委任、経路づけ、レビュー、統合が可能なワークフローへ変換する運用関心ドメインです。操作可能な目的、タスク計画、委任帰属、引き継ぎ、エージェント道具呼び出し、文脈隔離、作業者選択、経路目標、ゲート、構造、プロンプト連鎖、並列構成、統合来歴、境界付きフィードバックまたは再試行ループを記述します。
  why_needed:
    zh: 把目标分解为任务，并通过角色、委派、路由和组合控制协作。
    en: Decomposes goals into tasks and controls collaboration through roles, delegation, routing, and composition.
    ja: 目標をタスクへ分解し、ロール、委任、経路制御、構成で協働を制御します。
  includes:
    - zh: "编排域负责目标与任务规划（owner: orchestration-task-planning）以及委派与移交（owner: orchestration-delegation-handoff），把目标分解、责任转移和交付确认组织成连续协作决策。"
      en: "Orchestration owns Goals and task planning (owner: orchestration-task-planning) and Delegation and handoff (owner: orchestration-delegation-handoff), organizing goal decomposition, responsibility transfer, and delivery confirmation into continuous collaboration decisions."
      ja: "編成ドメインは目標とタスク計画（owner: orchestration-task-planning）および委任と引き継ぎ（owner: orchestration-delegation-handoff）を所有し、目標分解・責任移転・引き渡し確認を連続した協働判断へ編成します。"
    - zh: "编排域还负责路由与门控（owner: orchestration-routing-control），根据任务状态、候选能力和协作约束选择下一路径并控制分支汇合，而不执行具体运行尝试。"
      en: "Orchestration also owns routing and gates (owner: orchestration-routing-control), selecting the next path and controlling branch convergence from task state, candidate capabilities, and collaboration constraints without executing the concrete runtime attempt."
      ja: "編成ドメインはルーティングとゲート制御（owner: orchestration-routing-control）も所有し、タスク状態・候補能力・協働制約から次の経路と分岐統合を制御しますが、具体的な実行試行は行いません。"
  excludes:
    - zh: "执行尝试与结果（owner: runtime-execution-attempts）属于运行域，因为它记录一次实际执行的开始、终止和结果身份；编排域只决定应当执行什么及由谁执行。"
      en: "Execution attempts and outcomes (owner: runtime-execution-attempts) belongs to Runtime because it records the identity, start, termination, and outcome of an actual execution; Orchestration decides what should run and who should run it."
      ja: "実行試行と結果（owner: runtime-execution-attempts）は実際の実行の同一性・開始・終了・結果を記録するため実行ドメインに属します。編成ドメインは何を誰が実行すべきかだけを決めます。"
    - zh: "评估与测量（owner: feedback-metrics-evaluation）属于反馈域，因为它定义测量、阈值和评价证据；编排域可以触发评估或依据结果改路，但不重新拥有指标语义。"
      en: "The evaluation and measurement module (owner: feedback-metrics-evaluation) belongs to Feedback because it defines measurements, thresholds, and evaluation evidence; Orchestration may trigger evaluation or reroute from its result but does not re-own metric semantics."
      ja: "評価と測定（owner: feedback-metrics-evaluation）は測定・閾値・評価証拠を定義するためフィードバックドメインに属します。編成は評価を起動し結果で経路変更できますが、指標意味を再所有しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 把目标分解为任务，并通过角色、委派、路由和组合控制协作。
  en: Decomposes goals into tasks and controls collaboration through roles, delegation, routing, and composition.
  ja: 目標をタスクへ分解し、ロール、委任、経路制御、構成で協働を制御します。
structure: null
examples:
  - id: orchestration-plane-example-positive-001
    kind: positive
    labels:
      zh: 有归属的并行审查与交接
      en: Owned parallel review and handoff
      ja: 所有権付き並列レビューと引継ぎ
    scenario_id: null
    descriptions:
      zh: 目标 goal-release-12 被展开为 plan-release-12@4。计划创建 security-review 与 ontology-review 两个 WorkItem，分别绑定 reviewer-binding-6 和 reviewer-binding-9；Parallelization 同时启动两项审查，Synthesis 只合并带来源的结论，Gate 在两项都通过后把控制权从 manager-binding-2 交给 publisher-binding-3，并留下 handoff-204。
      en: Goal goal-release-12 is elaborated into plan-release-12@4. The plan creates security-review and ontology-review WorkItems bound to reviewer-binding-6 and reviewer-binding-9. Parallelization starts both reviews, Synthesis merges only sourced findings, and a Gate transfers control from manager-binding-2 to publisher-binding-3 as handoff-204 only after both pass.
      ja: goal-release-12 は plan-release-12@4 へ展開されます。security-review と ontology-review の WorkItem を reviewer-binding-6/9 に割り当て、Parallelization が同時開始し、Synthesis は出典付き結論だけを統合します。両方通過後 Gate が manager-binding-2 から publisher-binding-3 へ handoff-204 として制御を移します。
    field_values:
      goal_id: goal-release-12
      task_plan_ref: plan-release-12@4
      work_item_ids:
        - security-review
        - ontology-review
      assignee_binding_ids:
        - reviewer-binding-6
        - reviewer-binding-9
      composition_pattern: parallel-review-then-synthesis
      gate_outcome: passed
      handoff_id: handoff-204
    related_node_ids:
      - orchestration-plane
    related_relation_ids: []
    expected_result:
      zh: 可沿目标、计划、工作项、角色绑定、并行组合、闸门和交接恢复完整控制链，并分别回答谁执行、谁保留答案责任以及何时转移控制。
      en: The full control chain is recoverable across goal, plan, work items, role bindings, parallel composition, gate, and handoff, separately answering who performed work, who retained answer ownership, and when control transferred.
      ja: goal・plan・work item・role binding・parallel composition・gate・handoff を辿って制御連鎖を復元し、実行者・回答責任者・制御移転時点を別々に答えられます。
    why_valid_or_invalid:
      zh: 该对象的身份由尚待执行的工作规范、显式分配、组合拓扑、路由判定和责任交接构成；运行日志和结果只是后续实现证据，不能替代这条编排链。
      en: Identity is formed by work specifications not yet executed, explicit allocation, composition topology, routing adjudication, and responsibility transfer. Runtime logs and results are later realization evidence and cannot replace this orchestration chain.
      ja: 同一性は未実行 work specification・明示割当・composition topology・routing adjudication・責任移転で構成され、runtime log/result は後続の実現証拠で連鎖を代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-plane-003
  - id: orchestration-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 已有轨迹但没有计划或控制决定
      en: A trace without a plan or control decision
      ja: 計画や制御判断を欠くトレース
    scenario_id: null
    descriptions:
      zh: trace-551 显示 actor-8 调用工具并生成 result-551，但记录中没有 Goal、TaskPlan、WorkItem、Route、Gate、DelegationProcess 或 Handoff；只能确认一次执行已经发生。
      en: Trace-551 shows actor-8 calling a tool and producing result-551, but records no Goal, TaskPlan, WorkItem, Route, Gate, DelegationProcess, or Handoff. It establishes only that an execution occurred.
      ja: trace-551 は actor-8 の tool call と result-551 生成を示しますが、Goal・TaskPlan・WorkItem・Route・Gate・DelegationProcess・Handoff を記録しません。実行発生だけを確認できます。
    field_values:
      trace_id: trace-551
      actor_id: actor-8
      run_result_id: result-551
      planning_facts_present: false
      control_transfer_present: false
    related_node_ids:
      - orchestration-plane
      - runtime-plane
    related_relation_ids: []
    expected_result:
      zh: 把 trace-551、参与者和结果归入运行时域；不得从调用先后或最后发言者反推不存在的计划、委派归属或交接。
      en: Assign trace-551, its participant, and result to Runtime; do not infer a missing plan, delegation ownership, or handoff from call order or the last speaker.
      ja: trace-551・participant・result は Runtime に置き、呼出順や最後の発言者から存在しない plan・delegation ownership・handoff を推論しません。
    why_valid_or_invalid:
      zh: 发生事实回答“做过什么”，而编排事实回答“为何这样分解、由谁承担、何种规则决定下一步”；缺少后者时不能把运行轨迹归为控制与编排。
      en: Occurrence facts answer what happened; orchestration facts answer why work was decomposed that way, who bore it, and which rule selected the next step. Without the latter, a runtime trace is not Control & Orchestration.
      ja: occurrence fact は何が起きたかを答え、orchestration fact は分解理由・担い手・次手規則を答えます。後者がなければ runtime trace を Control & Orchestration に分類しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-plane-004
