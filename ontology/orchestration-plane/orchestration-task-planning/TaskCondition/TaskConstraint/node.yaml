schema: moonweave.ai/ontology-node/v1
id: TaskConstraint
kind: concept
status: accepted
labels:
  zh: 任务约束
  en: task constraint
  ja: タスク制約
semantics:
  short_definition:
    zh: 任务约束是限制任务可采用方式、资源或边界的任务条件。
    en: A task constraint limits the methods, resources, or boundaries permitted for a task.
    ja: タスク制約は、タスクに許される方法、資源、境界を制限するタスク条件です。
  definition:
    zh: 任务约束是一种 TaskCondition，其种差是：它对任务或其 Execution 施加期限、预算、权限、能力、数据、环境或安全限制，并规定违反后果；它不表示另一个工作必须先完成，也不判定任务是否成功。
    en: A TaskConstraint is a TaskCondition distinguished by imposing deadline, budget, authority, capability, data, environment, or safety limits on a task or its Execution and defining the consequence of violation. It neither states that another work item must finish first nor determines task success.
    ja: TaskConstraint は TaskCondition の一種であり、タスクまたは Execution に期限、予算、権限、能力、データ、環境、安全の制限と違反時の結果を課します。別作業の先行完了や成功判定は表しません。
  why_needed:
    zh: 将约束与依赖和完成标准分开，可让计划器在生成步骤前判定可行性，让策略层在运行时执行同一边界。
    en: Separating constraints from dependencies and completion criteria lets a planner assess feasibility before generating steps and lets policy enforcement apply the same boundary at runtime.
    ja: 制約を依存・完了基準から分けることで、計画器が手順生成前に実行可能性を判定し、実行時ポリシーが同じ境界を適用できます。
  includes:
    - zh: 最大成本、截止时间、允许工具、权限范围、数据驻留、沙箱或网络边界。
      en: Maximum cost, deadline, allowed tools, authority scope, data residency, sandbox, or network boundary.
      ja: 最大費用、期限、許可ツール、権限範囲、データ所在、サンドボックス、ネットワーク境界。
  excludes:
    - zh: 要求上游任务先完成的 TaskDependency，以及用输出证据判定完成的 TaskCompletionCriterion。
      en: A TaskDependency requiring predecessor work, and a TaskCompletionCriterion deciding completion from output evidence.
      ja: 先行作業を要求する TaskDependency、出力証拠から完了を判定する TaskCompletionCriterion。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: constraint_kind
      labels:
        zh: 约束类型
        en: constraint kind
        ja: 制約種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明约束限制资源、权限、环境、期限还是方法，以支持互斥边界查询。
        en: States whether the constraint limits resources, authority, environment, deadline, or method for disjoint boundary queries.
        ja: 資源・権限・環境・期限・方法のどれを制限するかを宣言し、境界を明確に照会できるようにします。
      allowed_values:
        - id: TaskConstraintKindResource
          value: resource
          labels:
            zh: 资源
            en: resource
            ja: 資源
          definitions:
            zh: 限制可消耗资源、工具或配额。
            en: Limits consumable resources, tools, or quotas.
            ja: 消費資源・ツール・割当量を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-002
        - id: TaskConstraintKindAuthority
          value: authority
          labels:
            zh: 权限
            en: authority
            ja: 権限
          definitions:
            zh: 限制允许承担或批准工作的主体权限。
            en: Limits the authority allowed to perform or approve the work.
            ja: 作業実施・承認に許される権限を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-003
        - id: TaskConstraintKindEnvironment
          value: environment
          labels:
            zh: 环境
            en: environment
            ja: 環境
          definitions:
            zh: 限制允许的运行环境或隔离边界。
            en: Limits the permitted runtime environment or isolation boundary.
            ja: 許可された実行環境または隔離境界を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-004
        - id: TaskConstraintKindDeadline
          value: deadline
          labels:
            zh: 期限
            en: deadline
            ja: 期限
          definitions:
            zh: 限制开始或完成工作的时间窗口。
            en: Limits the time window for starting or completing work.
            ja: 作業開始または完了の時間窓を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-005
        - id: TaskConstraintKindMethod
          value: method
          labels:
            zh: 方法
            en: method
            ja: 方法
          definitions:
            zh: 限制允许或禁止的执行方法。
            en: Limits permitted or prohibited methods of execution.
            ja: 許可または禁止される実行方法を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-006
      pattern: null
      example_value: environment
      source_claims:
        - claim-task-constraint-007
    - id: expression_language
      labels:
        zh: 约束语言
        en: constraint language
        ja: 制約言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 predicate_expression 采用的可执行规则语言。
        en: Declares the executable rule language used by predicate_expression.
        ja: predicate_expression が用いる実行可能な規則言語を宣言します。
      allowed_values: []
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: rego
      source_claims:
        - claim-task-constraint-008
    - id: predicate_expression
      labels:
        zh: 约束谓词
        en: constraint predicate
        ja: 制約述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对计划或执行上下文求值并返回是否位于允许边界内的布尔表达式。
        en: A Boolean expression evaluated over planning or execution context to decide whether it remains within the permitted boundary.
        ja: 計画または実行文脈を評価し、許可境界内かを返す真偽式です。
      allowed_values: []
      pattern: null
      example_value: runtime.environment == 'sandbox-release' && network.egress == false
      source_claims:
        - claim-task-constraint-009
    - id: violation_effect
      labels:
        zh: 违反后果
        en: violation effect
        ja: 違反効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定约束被违反时必须阻止开始、暂停、失败或请求批准。
        en: Specifies whether a violation blocks start, pauses or fails execution, or requires approval.
        ja: 制約違反時に開始阻止・一時停止・失敗・承認要求のどれを行うか定めます。
      allowed_values: []
      pattern: ^(block_start|pause_execution|fail_execution|require_approval)$
      example_value: block_start
      source_claims:
        - claim-task-constraint-010
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: 適用範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明约束适用于整个 Task、特定 TaskStep 或某种 Execution 环境。
        en: Declares whether the constraint applies to the whole Task, selected TaskSteps, or a class of Execution environment.
        ja: 制約が Task 全体・特定 TaskStep・Execution 環境種別のどれに適用されるか宣言します。
      allowed_values: []
      pattern: null
      example_value:
        scope: task-and-all-steps
        environment_class: sandbox
      source_claims:
        - claim-task-constraint-011
  constraints:
    - id: task-constraint-decidable
      severity: error
      expression_language: plain
      expression: predicate_expression parses under expression_language and returns a Boolean for applicability_scope
      explanations:
        zh: 任务约束必须能在声明范围内一致求值，不能只是自然语言建议。
        en: A task constraint must evaluate consistently in its declared scope rather than remain an informal recommendation.
        ja: タスク制約は宣言範囲で一貫して評価でき、単なる自然言語上の推奨であってはなりません。
      source_claims:
        - claim-task-constraint-012
    - id: task-constraint-not-dependency-or-completion
      severity: error
      expression_language: plain
      expression: constraint_kind limits permitted execution but names neither a predecessor Task nor an acceptance threshold
      explanations:
        zh: 资源或权限边界不得替代前置依赖，也不得被解释为完成判据。
        en: A resource or authority bound must not replace a predecessor dependency or be interpreted as a completion criterion.
        ja: 資源・権限境界は先行依存の代用でも完了基準でもありません。
      source_claims:
        - claim-task-constraint-013
  required_relation_constraints:
    - id: task-constraint-governs-task
      direction: incoming
      predicate: constrained_by
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个 TaskConstraint 至少约束一个明确 Task，避免形成无归属规则。
        en: Each TaskConstraint governs at least one explicit Task so it is not an ownerless rule.
        ja: 各 TaskConstraint は少なくとも一つの明示 Task を統制し、所有先のない規則にはしません。
      source_claims:
        - claim-task-constraint-014
examples:
  - id: TaskConstraint-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务约束正例
      en: Positive example for task constraint
      ja: タスク制約の正例
    scenario_id: null
    descriptions:
      zh: constraint-release-sandbox@1 规定发布任务及其全部步骤只能在 sandbox-release 环境中运行，并且网络出口必须关闭；启动前证据不足时阻止任务开始。
      en: constraint-release-sandbox@1 requires the release task and all of its steps to run only in sandbox-release with network egress disabled; missing readiness evidence blocks task start.
      ja: constraint-release-sandbox@1 は release task と全 step を sandbox-release だけで実行し、network egress を無効にします。readiness evidence が不足する場合は task 開始を阻止します。
    field_values:
      condition_specification_id: task-condition-release-sandbox
      evaluation_phase: readiness
      required_evidence_contract:
        required:
          - RuntimeEnvironment:sandbox-release
          - NetworkPolicy:no-egress
        bind_to: execution_environment_digest
      unsatisfied_effect: block_start
      version: "1"
      constraint_kind: environment
      expression_language: rego
      predicate_expression: runtime.environment == 'sandbox-release' && network.egress == false
      violation_effect: block_start
      applicability_scope:
        scope: task-and-all-steps
        environment_class: sandbox
    related_node_ids:
      - TaskConstraint
      - TaskCondition
      - Task
    related_relation_ids:
      - TaskConstraint-is_a-TaskCondition
      - Task-constrained_by-TaskConstraint
    expected_result:
      zh: constraint-release-sandbox@1 是 TaskConstraint；就绪检查根据环境摘要和无出口策略证据决定是否允许开始。
      en: constraint-release-sandbox@1 is a TaskConstraint whose readiness check uses the environment digest and no-egress policy evidence to decide whether start is permitted.
      ja: constraint-release-sandbox@1 は TaskConstraint であり、readiness check が environment digest と no-egress policy evidence から開始可否を決めます。
    why_valid_or_invalid:
      zh: 环境身份、无网络出口要求、适用范围、就绪证据和阻止启动的效果均与谓词一致。
      en: Environment identity, no-egress requirement, applicability scope, readiness evidence, and block-start effect all agree with the predicate.
      ja: environment identity、no-egress requirement、applicability scope、readiness evidence、block-start effect が predicate と一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-constraint-015
  - id: TaskConstraint-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务约束边界例
      en: Boundary case for task constraint
      ja: タスク制約の境界例
    scenario_id: null
    descriptions:
      zh: 任务 B 只有在任务 A 产生 approved_schema 后才能开始。
      en: Task B may start only after Task A produces approved_schema.
      ja: Task B は Task A が approved_schema を生成した後だけ開始できます。
    field_values:
      condition_specification_id: constraint-ui-comment
      version: "1"
      constraint_kind: method
      expression_language: plain-text
      predicate_expression: please be careful with production
      violation_effect: none
      applicability_scope: {}
    related_node_ids:
      - TaskConstraint
      - TaskCondition
    related_relation_ids:
      - TaskConstraint-is_a-TaskCondition
    expected_result:
      zh: 该条件应建模为 TaskDependency，而非一般 TaskConstraint。
      en: Model the condition as TaskDependency rather than a general TaskConstraint.
      ja: この条件は一般 TaskConstraint ではなく TaskDependency として表します。
    why_valid_or_invalid:
      zh: 其身份由特定前置工作和产物决定，而非对 B 的资源或执行方式施加限制。
      en: Its identity depends on specific predecessor work and an artifact, not on limiting B's resources or execution method.
      ja: 特定の先行作業と成果物で決まり、B の資源や実行方法の制限ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-constraint-016
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaskDependency
    shared_parent_concept_id: TaskCondition
    differentia:
      zh: 已审查兄弟区分：父节点 TaskCondition：TaskConstraint（semantic kind=specification，骨架 TaskConstraint-is_a-TaskCondition）；TaskDependency（semantic kind=specification，骨架 TaskDependency-is_a-TaskCondition）。双端条件：TaskConstraint 条件：“任务约束是一种任务条件；其区分条件是：它记录影响任务执行的规划限制，例如期限、预算、权限、能力、上下文、安全或依赖限制”；TaskDependency 条件：“任务依赖属于任务条件，区别于其他同类对象的条件是：它说明某个任务、步骤或工作项必须等待另一结果、条件、资源或批准后才能继续”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent TaskCondition: TaskConstraint (semantic kind=specification, backbone TaskConstraint-is_a-TaskCondition); TaskDependency (semantic kind=specification, backbone TaskDependency-is_a-TaskCondition). Endpoint conditions: TaskConstraint condition: “As a task condition, Task constraint is distinguished by the fact that it records a planning constraint such as deadline, budget, authority, capability, context, safety, or dependency limit that shapes task execution”; TaskDependency condition: “Task dependency is a task condition whose defining condition is that it states that one task, step, or work item depends on another result, condition, resource, or approval before it can proceed”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 TaskCondition：TaskConstraint（semantic kind=specification、バックボーン TaskConstraint-is_a-TaskCondition）；TaskDependency（semantic kind=specification、バックボーン TaskDependency-is_a-TaskCondition）。両端条件：TaskConstraint の条件：「タスク条件に属するタスク制約は、次の事実を種差とします：それは、期限、予算、権限、能力、文脈、安全、依存制限など、実行を形づくる計画上の制約を記録します」；TaskDependency の条件：「タスク依存関係はタスク条件のうち、次の事実を定義条件とする対象です：それは、あるタスク、手順、作業項目が、別の結果、条件、資源、承認を待たなければ進めないことを示します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-task-constraint-017
parent_relation:
  id: TaskConstraint-is_a-TaskCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TaskConstraint —is_a→ TaskCondition 表示约束是一种可判定任务条件，其种差是限制允许的资源、权限、环境、期限或方法，而不决定完成。
    en: TaskConstraint —is_a→ TaskCondition classifies a constraint as an evaluable task condition whose differentia is limiting permitted resources, authority, environment, deadline, or method rather than deciding completion.
    ja: TaskConstraint —is_a→ TaskCondition は、完了判定ではなく、許可資源・権限・環境・期限・方法を制限する種差を持つ評価可能なタスク条件として制約を分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TaskConstraint-is_a-TaskCondition-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: constraint-no-write 禁止任务使用任何外部写入工具，并规定违反时立即终止。
        en: constraint-no-write forbids any external write tool and requires immediate termination on violation.
        ja: constraint-no-write は外部書込みツールを禁止し、違反時の即時終了を要求します。
      field_values: {}
      related_node_ids:
        - TaskConstraint
        - TaskCondition
      related_relation_ids:
        - TaskConstraint-is_a-TaskCondition
      expected_result:
        zh: 该对象通过 is_a 同时属于 TaskConstraint 和 TaskCondition。
        en: Through is_a, the object is both TaskConstraint and TaskCondition.
        ja: is_a により、この対象は TaskConstraint かつ TaskCondition です。
      why_valid_or_invalid:
        zh: 它具有可验证限制与违规后果，并专门约束允许的执行方式。
        en: It supplies an evaluable limit and violation consequence and specifically restricts permitted execution.
        ja: 評価可能な制限と違反結果を持ち、許可実行方法を特に制約するためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-constraint-018
    - id: TaskConstraint-is_a-TaskCondition-example-boundary-manual-001
