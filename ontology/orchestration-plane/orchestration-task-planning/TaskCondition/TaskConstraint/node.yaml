schema: moonweave.ai/ontology-node/v1
id: TaskConstraint
kind: concept
labels:
  zh: 任务约束
  en: task constraint
  ja: タスク制約
semantics:
  short_definition:
    zh: 任务约束是限制任务可采用方式、资源或边界的任务条件。
    en: A task constraint limits the methods, resources, or boundaries permitted for a task.
    ja: タスク制約は、タスクに許される方法、資源、境界を制限するタスク条件です。
  definition:
    zh: 任务约束是一种 TaskCondition，其种差是：它对任务或其 Execution 施加期限、预算、权限、能力、数据、环境或安全限制，并规定违反后果；它不表示另一个工作必须先完成，也不判定任务是否成功。
    en: A TaskConstraint is a TaskCondition distinguished by imposing deadline, budget, authority, capability, data, environment, or safety limits on a task or its Execution and defining the consequence of violation. It neither states that another work item must finish first nor determines task success.
    ja: TaskConstraint は TaskCondition の一種であり、タスクまたは Execution に期限、予算、権限、能力、データ、環境、安全の制限と違反時の結果を課します。別作業の先行完了や成功判定は表しません。
  why_needed:
    zh: 将约束与依赖和完成标准分开，可让计划器在生成步骤前判定可行性，让策略层在运行时执行同一边界。
    en: Separating constraints from dependencies and completion criteria lets a planner assess feasibility before generating steps and lets policy enforcement apply the same boundary at runtime.
    ja: 制約を依存・完了基準から分けることで、計画器が手順生成前に実行可能性を判定し、実行時ポリシーが同じ境界を適用できます。
  includes:
    - zh: 最大成本、截止时间、允许工具、权限范围、数据驻留、沙箱或网络边界。
      en: Maximum cost, deadline, allowed tools, authority scope, data residency, sandbox, or network boundary.
      ja: 最大費用、期限、許可ツール、権限範囲、データ所在、サンドボックス、ネットワーク境界。
  excludes:
    - zh: 要求上游任务先完成的 TaskDependency，以及用输出证据判定完成的 TaskCompletionCriterion。
      en: A TaskDependency requiring predecessor work, and a TaskCompletionCriterion deciding completion from output evidence.
      ja: 先行作業を要求する TaskDependency、出力証拠から完了を判定する TaskCompletionCriterion。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      TaskConstraint 在规划阶段由可行性检查器读取，在运行阶段由 OPA 或 LangGraph 入口 gate 执行：例如 budget ceiling、
      allowed_tools 列表写入 Rego 或节点前置校验。Agents SDK Runner 可在调用前检查 tool 权限。违反后果映射为路由拒绝或
      Execution 失败，但不修改 constraint revision；A2A canceled 状态是协议终态，不是约束规约本身。
    en: >-
      TaskConstraint is read by a feasibility checker at plan time and enforced at runtime by OPA or LangGraph entry gates:
      for example, budget ceilings and allowed_tools lists compile to Rego or pre-node validation. Agents SDK Runner may check
      tool permissions before invocation. Violation consequences map to routing rejection or Execution failure without
      rewriting constraint revision; A2A canceled status is a protocol terminal state, not the constraint specification.
    ja: >-
      TaskConstraint は plan time に feasibility checker が読み、runtime では OPA または LangGraph entry gate が適用する。
      例として budget ceiling と allowed_tools list は Rego または pre-node validation にコンパイルされる。Agents SDK Runner
      は invocation 前に tool 権限を検査できる。違反結果は routing rejection または Execution failure に対応し constraint
      revision は変更しない。A2A canceled status は protocol terminal state であり constraint specification ではない。
  typical_input:
    - description:
        zh: 限制任务执行方式或资源的约束规约。
        en: A constraint specification limiting task execution methods or resources.
        ja: task execution method または resource を制限する constraint specification。
      format: |-
        {"condition_specification_id":"constraint:audit-budget@1","version":"1","constraint_kind":"budget","limit":{"max_cost_usd":25},"allowed_tools":["ledger.read","ledger.reconcile"],"violation_consequence":"reject_dispatch"}
  typical_output:
    - description:
        zh: 编译到策略引擎或 Runner 前置校验的约束绑定。
        en: A constraint binding compiled to a policy engine or Runner pre-check.
        ja: policy engine または Runner pre-check にコンパイルされた constraint binding。
      format: |-
        {"constraint_ref":"constraint:audit-budget@1","policy_package":"task/constraints","rego_module":"audit_budget","runner_precheck":{"max_cost_usd":25,"allowed_tools":["ledger.read","ledger.reconcile"]}}
  reference_implementations:
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents evaluating structured constraints as policy decisions at dispatch and runtime.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents entry validation and conditional routing before node execution.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner invocation boundaries including tool allowlists.
  source_claims:
    - claim-task-constraint-014
    - claim-task-constraint-015
structure:
  identity_keys: []
  fields:
    - id: constraint_kind
      labels:
        zh: 约束类型
        en: constraint kind
        ja: 制約種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明约束限制资源、权限、环境、期限还是方法，以支持互斥边界查询。
        en: States whether the constraint limits resources, authority, environment, deadline, or method for disjoint boundary queries.
        ja: 資源・権限・環境・期限・方法のどれを制限するかを宣言し、境界を明確に照会できるようにします。
      allowed_values:
        - id: TaskConstraintKindResource
          value: resource
          labels:
            zh: 资源
            en: resource
            ja: 資源
          definitions:
            zh: 限制可消耗资源、工具或配额。
            en: Limits consumable resources, tools, or quotas.
            ja: 消費資源・ツール・割当量を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-002
        - id: TaskConstraintKindAuthority
          value: authority
          labels:
            zh: 权限
            en: authority
            ja: 権限
          definitions:
            zh: 限制允许承担或批准工作的主体权限。
            en: Limits the authority allowed to perform or approve the work.
            ja: 作業実施・承認に許される権限を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-003
        - id: TaskConstraintKindEnvironment
          value: environment
          labels:
            zh: 环境
            en: environment
            ja: 環境
          definitions:
            zh: 限制允许的运行环境或隔离边界。
            en: Limits the permitted runtime environment or isolation boundary.
            ja: 許可された実行環境または隔離境界を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-004
        - id: TaskConstraintKindDeadline
          value: deadline
          labels:
            zh: 期限
            en: deadline
            ja: 期限
          definitions:
            zh: 限制开始或完成工作的时间窗口。
            en: Limits the time window for starting or completing work.
            ja: 作業開始または完了の時間窓を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-005
        - id: TaskConstraintKindMethod
          value: method
          labels:
            zh: 方法
            en: method
            ja: 方法
          definitions:
            zh: 限制允许或禁止的执行方法。
            en: Limits permitted or prohibited methods of execution.
            ja: 許可または禁止される実行方法を制限します。
          status: accepted
          source_claims:
            - claim-task-constraint-006
      pattern: null
      example_value: environment
      source_claims:
        - claim-task-constraint-007
    - id: expression_language
      labels:
        zh: 约束语言
        en: constraint language
        ja: 制約言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 predicate_expression 采用的可执行规则语言。
        en: Declares the executable rule language used by predicate_expression.
        ja: predicate_expression が用いる実行可能な規則言語を宣言します。
      allowed_values: []
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: rego
      source_claims:
        - claim-task-constraint-008
    - id: predicate_expression
      labels:
        zh: 约束谓词
        en: constraint predicate
        ja: 制約述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对计划或执行上下文求值并返回是否位于允许边界内的布尔表达式。
        en: A Boolean expression evaluated over planning or execution context to decide whether it remains within the permitted boundary.
        ja: 計画または実行文脈を評価し、許可境界内かを返す真偽式です。
      allowed_values: []
      pattern: null
      example_value: runtime.environment == 'sandbox-release' && network.egress == false
      source_claims:
        - claim-task-constraint-009
    - id: violation_effect
      labels:
        zh: 违反后果
        en: violation effect
        ja: 違反効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定约束被违反时必须阻止开始、暂停、失败或请求批准。
        en: Specifies whether a violation blocks start, pauses or fails execution, or requires approval.
        ja: 制約違反時に開始阻止・一時停止・失敗・承認要求のどれを行うか定めます。
      allowed_values: []
      pattern: ^(block_start|pause_execution|fail_execution|require_approval)$
      example_value: block_start
      source_claims:
        - claim-task-constraint-010
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: 適用範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明约束适用于整个 Task、特定 TaskStep 或某种 Execution 环境。
        en: Declares whether the constraint applies to the whole Task, selected TaskSteps, or a class of Execution environment.
        ja: 制約が Task 全体・特定 TaskStep・Execution 環境種別のどれに適用されるか宣言します。
      allowed_values: []
      pattern: null
      example_value:
        scope: task-and-all-steps
        environment_class: sandbox
      source_claims:
        - claim-task-constraint-011
  constraints:
    - id: task-constraint-decidable
      severity: error
      expression_language: plain
      expression: predicate_expression parses under expression_language and returns a Boolean for applicability_scope
      explanations:
        zh: 任务约束必须能在声明范围内一致求值，不能只是自然语言建议。
        en: A task constraint must evaluate consistently in its declared scope rather than remain an informal recommendation.
        ja: タスク制約は宣言範囲で一貫して評価でき、単なる自然言語上の推奨であってはなりません。
      source_claims:
        - claim-task-constraint-012
    - id: task-constraint-not-dependency-or-completion
      severity: error
      expression_language: plain
      expression: constraint_kind limits permitted execution but names neither a predecessor Task nor an acceptance threshold
      explanations:
        zh: 资源或权限边界不得替代前置依赖，也不得被解释为完成判据。
        en: A resource or authority bound must not replace a predecessor dependency or be interpreted as a completion criterion.
        ja: 資源・権限境界は先行依存の代用でも完了基準でもありません。
      source_claims:
        - claim-task-constraint-013
  required_relation_constraints:
    - id: task-constraint-governs-task
      direction: incoming
      predicate: constrained_by
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个 TaskConstraint 至少约束一个明确 Task，避免形成无归属规则。
        en: Each TaskConstraint governs at least one explicit Task so it is not an ownerless rule.
        ja: 各 TaskConstraint は少なくとも一つの明示 Task を統制し、所有先のない規則にはしません。
      source_claims:
        - claim-task-constraint-014
examples:
  - id: TaskConstraint-example-positive-manual-001
    labels:
      zh: TaskConstraint positive
      en: TaskConstraint positive
      ja: TaskConstraint positive
    descriptions:
      zh: Temporal 持久化工作流映射 TaskConstraint：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps TaskConstraint: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal TaskConstraint: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {condition_specification_id: task-condition-release-sandbox, evaluation_phase: readiness}

    related_node_ids:
      - TaskConstraint
      - TaskCondition
      - Task
    related_relation_ids:
      - TaskConstraint-is_a-TaskCondition
      - Task-constrained_by-TaskConstraint
    source_claims:
      - claim-task-constraint-015

  - id: TaskConstraint-example-boundary-manual-001
    labels:
      zh: TaskConstraint boundary
      en: TaskConstraint boundary
      ja: TaskConstraint boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 TaskConstraint 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not TaskConstraint static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で TaskConstraint 静的 RetryPolicy ではない。
    field_values: {condition_specification_id: constraint-ui-comment, version: 1, constraint_kind: method, expression_language: plain-text, predicate_expression: "please be careful with production", violation_effect: none, applicability_scope: {}

    related_node_ids:
      - TaskConstraint
      - TaskCondition
    related_relation_ids:
      - TaskConstraint-is_a-TaskCondition
    source_claims:
      - claim-task-constraint-016

  - id: TaskConstraint-example-counterexample-confusable
    labels:
      zh: TaskConstraint counterexample
      en: TaskConstraint counterexample
      ja: TaskConstraint counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 TaskConstraint。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style TaskConstraint.
      ja: Python/code なし自然言語計画は TaskWeaver 式 TaskConstraint にならない。
    field_values: {constraint_id: absent, constrained_work_ref: absent, infra_quota: k8s-cpu-limit}

    related_node_ids:
      - TaskConstraint
      - TaskCondition
      - WorkSpecification
      - Task
    related_relation_ids: []
    source_claims:
      - claim-task-constraint-015

  - id: TaskConstraint-example-instance-concrete
    labels:
      zh: TaskConstraint instance
      en: TaskConstraint instance
      ja: TaskConstraint instance
    descriptions:
      zh: CoT 实例 prompt："Q: Roger has 5 tennis balls... A: Let's think step by step." → 逐步算术推理 → 映射 TaskConstraint。
      en: CoT instance: "Q: Roger has 5 tennis balls... A: Let's think step by step." → stepwise arithmetic → maps to TaskConstraint.
      ja: CoT 实例 step-by-step 算術推論が TaskConstraint に写像。
    field_values: {condition_specification_id: task-condition-release-sandbox, evaluation_phase: readiness}

    related_node_ids:
      - TaskConstraint
      - TaskCondition
      - Task
    related_relation_ids: []
    source_claims:
      - claim-task-constraint-015

