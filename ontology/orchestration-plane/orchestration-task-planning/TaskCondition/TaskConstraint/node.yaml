schema: moonweave.ai/ontology-node/v1
id: TaskConstraint
kind: concept
labels:
  zh: 任务约束
  en: task constraint
  ja: タスク制約
semantics:
  short_definition:
    zh: 限制任务可采用方式、资源或边界的 TaskCondition 特化。
    en: A TaskCondition specialization limiting permitted methods, resources, or boundaries for a task.
    ja: タスクに許される方法・資源・境界を制限する TaskCondition 特化です。
  definition:
    zh: TaskConstraint 是 TaskCondition 的特化，对 Task 或其 Execution 施加 deadline、budget、authority、capability、data、environment 或 method 限制，并规定 violation_effect；它不表示另一工作必须先完成，也不判定任务是否成功。LangGraph 节点/边策略与 CrewAI 工具/配置限制可映射为 execution 或 readiness 阶段 TaskConstraint。
    en: TaskConstraint specializes TaskCondition by imposing deadline, budget, authority, capability, data, environment, or method limits on a Task or its Execution with a violation_effect; it neither requires predecessor work nor decides success. LangGraph node/edge policies and CrewAI tool/configuration limits map to execution or readiness TaskConstraint.
    ja: TaskConstraint は期限・予算・権限・能力・データ・環境・方法制限と violation_effect を課す TaskCondition 特化です。LangGraph ポリシーと CrewAI ツール/設定制限に写像されます。
  why_needed:
    zh: 将约束与依赖和完成标准分开，可让计划器在生成步骤前判定可行性，让策略层在运行时执行同一边界。
    en: Separating constraints from dependencies and completion criteria lets planners assess feasibility before step generation and lets policy enforce the same boundary at runtime.
    ja: 制約を依存・完了基準から分離し、計画前の実行可能性判定と実行時ポリシー適用を可能にします。
  includes:
    - zh: 最大成本、截止时间、允许工具、权限范围、数据驻留、沙箱或网络边界。
      en: Maximum cost, deadline, allowed tools, authority scope, data residency, sandbox, or network boundary.
      ja: 最大費用、期限、許可ツール、権限範囲、データ所在、サンドボックス、ネットワーク境界。
  excludes:
    - zh: 要求上游任务先完成的 TaskDependency，以及用输出证据判定完成的 TaskCompletionCriterion。
      en: TaskDependency requiring predecessor work and TaskCompletionCriterion deciding completion from output evidence.
      ja: 先行作業を要求する TaskDependency、出力証拠で完了を判定する TaskCompletionCriterion。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: CrewAI Task 的 tools 列表、human_input、max_rpm 等属性投影为 resource/method/authority 类 TaskConstraint；LangGraph 节点 interrupt_before/after 与 sandbox 配置投影为 environment/method 约束。constraint_kind 必须互斥，避免与 TaskDependency 混用。
    en: CrewAI Task tools, human_input, max_rpm project to resource/method/authority TaskConstraint; LangGraph interrupt_before/after and sandbox settings project to environment/method constraints. constraint_kind must stay disjoint from TaskDependency semantics.
    ja: CrewAI tools/human_input/max_rpm と LangGraph interrupt/sandbox を TaskConstraint に写像し TaskDependency と混同しません。
  typical_input:
    - description: CrewAI task tool and environment limits.
      format: |
        task = Task(
            description="Export audit data",
            tools=[read_only_tools],
            max_rpm=10,
        )
      source_claims: [claim-tcon-crewai]
  typical_output:
    - description: Versioned task constraint specification.
      format: |
        {
          "condition_specification_id": "constraint-release-sandbox",
          "constraint_kind": "environment",
          "violation_effect": "block_start"
        }
      source_claims: [claim-tcon-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task tools, configuration, human_input limits.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node interrupts and execution boundaries.
structure:
  identity_keys: []
  fields:
    - id: constraint_kind
      labels: {zh: 约束类型, en: constraint kind, ja: 制約種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明约束限制资源、权限、环境、期限还是方法。
        en: Whether the constraint limits resources, authority, environment, deadline, or method.
        ja: 資源・権限・環境・期限・方法のどれを制限するか。
      allowed_values:
        - {id: TaskConstraintKindResource, value: resource, labels: {zh: 资源, en: resource, ja: 資源}, definitions: {zh: 限制可消耗资源、工具或配额, en: Limits consumable resources, tools, or quotas, ja: 消費資源・ツール・割当量を制限}, source_claims: [claim-tcon-crewai]}
        - {id: TaskConstraintKindAuthority, value: authority, labels: {zh: 权限, en: authority, ja: 権限}, definitions: {zh: 限制允许承担或批准工作的主体权限, en: Limits authority to perform or approve work, ja: 作業実施・承認権限を制限}, source_claims: [claim-tcon-crewai]}
        - {id: TaskConstraintKindEnvironment, value: environment, labels: {zh: 环境, en: environment, ja: 環境}, definitions: {zh: 限制允许的运行环境或隔离边界, en: Limits permitted runtime environment or isolation, ja: 実行環境・隔離境界を制限}, source_claims: [claim-tcon-langgraph]}
        - {id: TaskConstraintKindDeadline, value: deadline, labels: {zh: 期限, en: deadline, ja: 期限}, definitions: {zh: 限制开始或完成工作的时间窗口, en: Limits time window for start or completion, ja: 開始/完了の時間窓を制限}, source_claims: [claim-tcon-design]}
        - {id: TaskConstraintKindMethod, value: method, labels: {zh: 方法, en: method, ja: 方法}, definitions: {zh: 限制允许或禁止的执行方法, en: Limits permitted or prohibited execution methods, ja: 許可/禁止実行方法を制限}, source_claims: [claim-tcon-crewai]}
      example_value: environment
      source_claims: [claim-tcon-design]
    - id: expression_language
      labels: {zh: 约束语言, en: constraint language, ja: 制約言語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: predicate_expression 采用的可执行规则语言。
        en: Executable rule language for predicate_expression.
        ja: predicate_expression の実行可能規則言語。
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: rego
      source_claims: [claim-tcon-langgraph]
    - id: predicate_expression
      labels: {zh: 约束谓词, en: constraint predicate, ja: 制約述語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 对计划或执行上下文求值并返回是否位于允许边界内的布尔表达式。
        en: Boolean over planning or execution context deciding permitted-boundary membership.
        ja: 計画/実行文脈を評価し許可境界内かを返す真偽式。
      example_value: runtime.environment == 'sandbox-release' && network.egress == false
      source_claims: [claim-tcon-langgraph]
    - id: violation_effect
      labels: {zh: 违反后果, en: violation effect, ja: 違反効果}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 约束被违反时必须阻止开始、暂停、失败或请求批准。
        en: Whether violation blocks start, pauses or fails execution, or requires approval.
        ja: 違反時に開始阻止・一時停止・失敗・承認要求のどれを行うか。
      pattern: ^(block_start|pause_execution|fail_execution|require_approval)$
      example_value: block_start
      source_claims: [claim-tcon-crewai]
    - id: applicability_scope
      labels: {zh: 适用范围, en: applicability scope, ja: 適用範囲}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 约束适用于整个 Task、特定 TaskStep 或某种 Execution 环境。
        en: Whether the constraint applies to the whole Task, selected TaskSteps, or an Execution environment class.
        ja: Task 全体・特定 TaskStep・Execution 環境種別のどれに適用するか。
      example_value: {scope: task-and-all-steps, environment_class: sandbox}
      source_claims: [claim-tcon-design]
  constraints:
    - id: task-constraint-decidable
      severity: error
      expression_language: plain
      expression: predicate_expression parses under expression_language and returns a Boolean for applicability_scope
      explanations:
        zh: 任务约束必须能在声明范围内一致求值，不能只是自然语言建议。
        en: A task constraint must evaluate consistently in its declared scope rather than remain an informal recommendation.
        ja: 宣言範囲で一貫評価でき、単なる推奨であってはなりません。
      source_claims: [claim-tcon-langgraph]
    - id: task-constraint-not-dependency-or-completion
      severity: error
      expression_language: plain
      expression: constraint_kind limits permitted execution but names neither a predecessor Task nor an acceptance threshold
      explanations:
        zh: 资源或权限边界不得替代前置依赖，也不得被解释为完成判据。
        en: Resource or authority bounds must not replace predecessor dependencies or completion criteria.
        ja: 資源・権限境界は先行依存や完了基準の代用になりません。
      source_claims: [claim-tcon-design]
  required_relation_constraints:
    - id: task-constraint-governs-task
      direction: incoming
      predicate: constrained_by
      target_concept_id: Task
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每个 TaskConstraint 至少约束一个明确 Task，避免形成无归属规则。
        en: Each TaskConstraint governs at least one explicit Task so it is not an ownerless rule.
        ja: 各 TaskConstraint は少なくとも一つの明示 Task を統制します。
      source_claims: [claim-tcon-crewai]
examples:
  - id: TaskConstraint-sandbox-release
    labels: {zh: 发布沙箱约束, en: Release sandbox constraint, ja: リリース sandbox 制約}
    descriptions:
      zh: constraint-release-sandbox@1 规定发布任务及其全部步骤只能在 sandbox-release 环境中运行且网络出口关闭；证据不足时阻止开始。
      en: constraint-release-sandbox@1 requires the release task and all steps to run only in sandbox-release with network egress disabled; missing evidence blocks start.
      ja: constraint-release-sandbox@1 は sandbox-release のみ・egress 無効を要求し、証拠不足時は開始を阻止します。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/, version: execution boundaries}
    field_values:
      constraint_kind: environment
      evaluation_phase: readiness
      unsatisfied_effect: block_start
      predicate_expression: runtime.environment == 'sandbox-release' && network.egress == false
    related_node_ids: [TaskConstraint, Task, TaskCondition]
    related_relation_ids: [TaskConstraint-is_a-TaskCondition, Task-constrained_by-TaskConstraint]
    source_claims: [claim-tcon-langgraph]
  - id: TaskConstraint-crewai-tools
    labels: {zh: CrewAI 工具约束, en: CrewAI tool constraint, ja: CrewAI ツール制約}
    descriptions:
      zh: constraint-no-write 禁止任务使用任何外部写入工具，违反时立即终止；对应 CrewAI tools 白名单与 method 类约束。
      en: constraint-no-write forbids external write tools and requires immediate termination on violation, mapping to CrewAI tool allowlists as a method constraint.
      ja: constraint-no-write は外部書込みツールを禁止し違反時即終了、CrewAI tools 許可リストに対応します。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task tools}
    field_values:
      constraint_kind: method
      violation_effect: fail_execution
    related_node_ids: [TaskConstraint, Task]
    related_relation_ids: []
    source_claims: [claim-tcon-crewai]
  - id: TaskConstraint-boundary-dependency
    labels: {zh: 前置依赖不是约束, en: Predecessor is not constraint, ja: 先行依存は制約ではない}
    descriptions:
      zh: 任务 B 只有在任务 A 产生 approved_schema 后才能开始；这是 TaskDependency，不是 TaskConstraint。
      en: Task B may start only after Task A produces approved_schema; this is TaskDependency, not TaskConstraint.
      ja: Task B は Task A が approved_schema 生成後に開始、TaskDependency であり TaskConstraint ではありません。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: constraint versus dependency}
    field_values: {}
    related_node_ids: [TaskConstraint, TaskDependency]
    related_relation_ids: []
    source_claims: [claim-tcon-design]
parent_relation:
  id: TaskConstraint-is_a-TaskCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: TaskConstraint 以限制允许的资源、权限、环境、期限或方法为种差的 TaskCondition 特化。
    en: TaskConstraint is a TaskCondition whose differentia is limiting permitted resources, authority, environment, deadline, or method.
    ja: 許可資源・権限・環境・期限・方法を制限する TaskCondition 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tcon-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task tools and configuration limits.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Execution boundaries and interrupts.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TaskConstraint versus TaskDependency.
source_claims:
  - id: claim-tcon-crewai
    source: crewai
    supports: CrewAI task attributes constrain tools, agents, and execution settings as explicit planning bounds.
    locator: Tasks > attributes and guardrails
    evidence_kind: official
    confidence: high
  - id: claim-tcon-langgraph
    source: langgraph
    supports: LangGraph node and graph configuration expresses execution environment and flow boundaries evaluable as constraints.
    locator: StateGraph configuration
    evidence_kind: official
    confidence: high
  - id: claim-tcon-design
    source: moonweave-design
    supports: Moonweave separates resource/method limits (TaskConstraint) from predecessor ordering (TaskDependency).
    locator: TaskConstraint concept boundary
    evidence_kind: design-inference
    confidence: high
