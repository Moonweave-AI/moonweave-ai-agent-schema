    supports: Agent Framework workflows expose explicit control flow and checkpointable execution; Moonweave uses pause_execution as a governed response to an unsatisfied in-progress condition.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
