source_claims:
  - id: claim-task-condition-001
    source: lit-planning-ontology-2023
    supports: The planning ontology represents goals, actions, ordering, and planning constraints as distinct planning knowledge. Moonweave groups evaluable task-governance predicates under TaskCondition.
    locator: Planning Ontology paper > goals, actions, ordering constraints, and plan structure
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-002
    source: lit-planning-ontology-2023
    supports: The planning ontology treats constraints and ordering knowledge as explicit planning objects; Moonweave assigns such a condition a stable specification identifier.
    locator: Planning Ontology paper > goals, actions, ordering constraints, and plan structure
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-003
    source: eng-ont-prov-o
    supports: PROV-O models plans as entities whose provenance can be tracked as they evolve; Moonweave versions task-condition specifications for the same reason.
    locator: PROV-O Recommendation > expanded terms > prov:Plan, prov:Activity, prov:Association, prov:hadPlan, and prov:hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-004
    source: eng-fw-maf-workflows
    supports: Agent Framework conditional edges evaluate explicit functions over typed messages; Moonweave therefore records which evaluator language gives a condition operational meaning.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-005
    source: eng-fw-maf-workflows
    supports: Agent Framework edges may apply conditions to message contents; Moonweave captures the condition as a side-effect-free predicate rather than an informal note.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-006
    source: eng-fw-crewai-tasks
    supports: CrewAI task context makes a downstream task wait for upstream task output; Moonweave names that pre-execution evaluation phase readiness.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-007
    source: eng-fw-maf-workflows
    supports: Agent Framework workflow executors perform bounded processing between typed graph edges; Moonweave uses execution as the phase for in-progress constraints.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-008
    source: eng-fw-crewai-tasks
    supports: CrewAI expected_output and output guardrails define what acceptable task completion looks like; Moonweave records that evaluation phase as completion.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-009
    source: eng-fw-crewai-tasks
    supports: CrewAI separates upstream task context from output guardrails; Moonweave makes the corresponding readiness and completion phases explicit.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-010
    source: eng-fw-crewai-tasks
    supports: CrewAI task context and guardrails consume specific upstream outputs; Moonweave records that required evidence as a contract independent of the observed result.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-task-condition-011
    source: eng-fw-crewai-tasks
    supports: A CrewAI task using another task as context waits for that upstream task; Moonweave represents the unsatisfied readiness effect as block_start.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
