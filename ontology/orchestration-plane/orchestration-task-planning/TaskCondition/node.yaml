schema: moonweave.ai/ontology-node/v1
id: TaskCondition
kind: concept
labels:
  zh: 任务条件
  en: task condition
  ja: タスク条件
semantics:
  short_definition:
    zh: 可被计划器或控制逻辑重复判定的任务约束性规范。
    en: A reusable task specification expressing an evaluable predicate planners or control logic can decide.
    ja: 計画器や制御ロジックが反復判定できる評価可能述語を表す再利用可能タスク仕様です。
  definition:
    zh: TaskCondition 以 condition_specification_id、predicate_expression、evaluation_phase 与 required_evidence_contract 标识，表达可判定谓词，决定任务何时可开始、以何种边界执行、依赖何物或何时可认定完成；特化为 TaskConstraint、TaskDependency 或 TaskCompletionCriterion。LangGraph conditional_edges、CrewAI task context/guardrails 提供运行映射，但一次布尔检查结果不是 TaskCondition。
    en: A TaskCondition is identified by condition_specification_id, predicate_expression, evaluation_phase, and required_evidence_contract, expressing an evaluable predicate for start readiness, execution bounds, dependencies, or completion. It specializes into TaskConstraint, TaskDependency, or TaskCompletionCriterion. LangGraph conditional_edges and CrewAI task context/guardrails provide runtime mappings, but one Boolean check result is not a TaskCondition.
    ja: TaskCondition は condition_specification_id・predicate_expression・evaluation_phase・required_evidence_contract で識別し、TaskConstraint/TaskDependency/TaskCompletionCriterion に特化します。LangGraph conditional_edges と CrewAI task context/guardrails が実行写像を提供します。
  why_needed:
    zh: 独立条件规范让计划器、策略闸门和评估器引用同一判定语义，同时区分约束、依赖和完成标准。
    en: Independent condition specs let planners, policy gates, and evaluators reuse one decision semantics while keeping constraints, dependencies, and completion criteria distinct.
    ja: 独立条件仕様により制約・依存・完了基準を区別しつつ同一判定意味を再利用できます。
  includes:
    - zh: 可计算谓词、适用范围、评估时点、所需证据以及条件不满足时的后果。
      en: Evaluable predicate, scope, evaluation point, required evidence, and unsatisfied consequence.
      ja: 評価可能述語、適用範囲、評価時点、必要証拠、不成立時結果。
  excludes:
    - zh: 执行条件检查的活动、布尔检查结果、没有可判定语义的自然语言备注。
      en: Condition-check activity, Boolean result, informal note without decidable semantics.
      ja: 条件評価活動、真偽結果、判定不能な自然言語メモ。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 边条件函数应投影为 TaskCondition（readiness/completion 阶段由 evaluation_phase 区分）；CrewAI context task 列表映射为 readiness TaskDependency；expected_output/guardrails 映射为 completion TaskCompletionCriterion。谓词必须无副作用且只读 required_evidence_contract 声明字段。
    en: LangGraph edge condition functions project to TaskCondition (evaluation_phase separates readiness versus completion); CrewAI context tasks map to readiness TaskDependency; expected_output/guardrails map to completion TaskCompletionCriterion. Predicates must be side-effect free and read only declared evidence fields.
    ja: LangGraph 辺条件は TaskCondition に、CrewAI context は readiness TaskDependency に、expected_output/guardrails は completion TaskCompletionCriterion に写像します。
  typical_input:
    - description: LangGraph conditional edge predicate.
      format: |
        def route_after_audit(state):
            return "proceed" if state["authorization"].valid and state["snapshot"].exists else "block"
      source_claims: [claim-tc-langgraph]
    - description: CrewAI task readiness context.
      format: |
        downstream = Task(description="Audit", context=[upstream_task])
      source_claims: [claim-tc-crewai]
  typical_output:
    - description: Versioned task condition specification.
      format: |
        {
          "condition_specification_id": "condition-audit-readiness",
          "evaluation_phase": "readiness",
          "predicate_expression": "authorization.valid && snapshot.exists"
        }
      source_claims: [claim-tc-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Conditional edges and readiness gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task context, guardrails, expected_output.
structure:
  identity_keys:
    - condition_specification_id
    - version
  fields:
    - id: condition_specification_id
      labels: {zh: 条件规约标识, en: condition-specification ID, ja: 条件仕様 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 跨计划引用时稳定识别同一任务条件规约。
        en: Stably identifies the same task-condition specification across plan references.
        ja: 計画参照をまたいで同じタスク条件仕様を安定識別します。
      pattern: ^condition-[A-Za-z0-9._:-]+$
      example_value: condition-audit-readiness
      source_claims: [claim-tc-design]
    - id: version
      labels: {zh: 条件版本, en: condition version, ja: 条件版}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 不可变谓词与证据合同的修订版本。
        en: Immutable revision of predicate and evidence contract.
        ja: 述語と証拠契約の不変リビジョン。
      example_value: "3"
      source_claims: [claim-tc-design]
    - id: expression_language
      labels: {zh: 表达式语言, en: expression language, ja: 式言語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: predicate_expression 所用的可执行语言或受控方言。
        en: Executable language or controlled dialect for predicate_expression.
        ja: predicate_expression の実行可能言語/方言。
      example_value: cel
      source_claims: [claim-tc-langgraph]
    - id: predicate_expression
      labels: {zh: 判定谓词, en: predicate expression, ja: 判定述語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 返回布尔判定的无副作用表达式。
        en: Side-effect-free expression returning a Boolean decision.
        ja: 真偽判定を返す副作用のない式。
      example_value: authorization.valid && snapshot.exists
      source_claims: [claim-tc-crewai]
    - id: evaluation_phase
      labels: {zh: 评估阶段, en: evaluation phase, ja: 評価段階}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分开始前、执行中或完成判定时应用。
        en: Distinguishes application before start, during execution, or at completion.
        ja: 開始前/実行中/完了判定の適用段階。
      allowed_values:
        - {id: TaskConditionPhaseReadiness, value: readiness, labels: {zh: 就绪判定, en: readiness, ja: 実行準備判定}, definitions: {zh: 开始前判定, en: Before start, ja: 開始前判定}, source_claims: [claim-tc-crewai]}
        - {id: TaskConditionPhaseExecution, value: execution, labels: {zh: 执行期判定, en: execution, ja: 実行中判定}, definitions: {zh: 执行中持续检查, en: During execution, ja: 実行中チェック}, source_claims: [claim-tc-langgraph]}
        - {id: TaskConditionPhaseCompletion, value: completion, labels: {zh: 完成判定, en: completion, ja: 完了判定}, definitions: {zh: 完成证据判定, en: At completion, ja: 完了証拠判定}, source_claims: [claim-tc-crewai]}
      example_value: readiness
      source_claims: [claim-tc-design]
    - id: required_evidence_contract
      labels: {zh: 所需证据合同, en: required-evidence contract, ja: 必要証拠契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明谓词可读取的证据类型、字段、版本与新鲜度。
        en: Evidence types, fields, versions, and freshness the predicate may read.
        ja: 述語が参照できる証拠種別・項目・版・鮮度。
      example_value:
        required: [AuthorizationRecord, SnapshotManifest]
        max_age_seconds: 300
      source_claims: [claim-tc-crewai]
    - id: unsatisfied_effect
      labels: {zh: 不满足后果, en: unsatisfied effect, ja: 不成立時の効果}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 条件为 false 或证据缺失时对开始、继续或完成判定的治理后果。
        en: Governance consequence for start, continuation, or completion when unsatisfied.
        ja: 不成立時の開始/継続/完了への統制結果。
      allowed_values:
        - {id: TaskConditionEffectBlockStart, value: block_start, labels: {zh: 阻止开始, en: block start, ja: 開始を阻止}, definitions: {zh: 不得创建 Execution, en: No Execution may start, ja: Execution 作成不可}, source_claims: [claim-tc-crewai]}
        - {id: TaskConditionEffectPauseExecution, value: pause_execution, labels: {zh: 暂停执行, en: pause execution, ja: 実行を一時停止}, definitions: {zh: 暂停进行中 Execution, en: Pause in-progress Execution, ja: 実行中 Execution を一時停止}, source_claims: [claim-tc-langgraph]}
        - {id: TaskConditionEffectRejectCompletion, value: reject_completion, labels: {zh: 拒绝完成, en: reject completion, ja: 完了を拒否}, definitions: {zh: 拒绝成功判定, en: Reject success judgment, ja: 成功判定を拒否}, source_claims: [claim-tc-crewai]}
      example_value: block_start
      source_claims: [claim-tc-design]
  constraints:
    - id: task-condition-decidable
      severity: error
      expression_language: plain
      expression: predicate_expression parses under expression_language and returns a Boolean using only required_evidence_contract fields
      explanations:
        zh: 必须可重复判定，不得依赖未声明数据或产生副作用。
        en: Must be repeatably decidable without undeclared data or side effects.
        ja: 未宣言データ/副作用なしで反復可能に判定可能。
      source_claims: [claim-tc-design]
  required_relation_constraints: []
examples:
  - id: TaskCondition-crewai-readiness
    labels: {zh: CrewAI 就绪条件, en: CrewAI readiness condition, ja: CrewAI readiness 条件}
    descriptions:
      zh: 审计任务仅当数据许可有效且上游快照存在时可开始；CrewAI context 与 LangGraph 边条件应对齐同一 TaskCondition。
      en: An audit task may start only when authorization is valid and an upstream snapshot exists; CrewAI context and LangGraph edge conditions should align to one TaskCondition.
      ja: 監査タスクは許可有効かつ上流スナップショット存在時のみ開始可能です。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task context}
    field_values:
      condition_specification_id: condition-audit-readiness
      evaluation_phase: readiness
      unsatisfied_effect: block_start
    related_node_ids: [TaskCondition, TaskDependency, TaskCompletionCriterion]
    related_relation_ids: []
    source_claims: [claim-tc-crewai, claim-tc-design]
  - id: TaskCondition-langgraph-edge
    labels: {zh: LangGraph 边条件, en: LangGraph edge condition, ja: LangGraph 辺条件}
    descriptions:
      zh: route 函数检查 authorization 与 snapshot 后决定下一节点，是 readiness 阶段 TaskCondition 的运行时求值。
      en: A route function checks authorization and snapshot before choosing the next node, runtime evaluation of a readiness TaskCondition.
      ja: route 関数が authorization/snapshot を確認し次ノードを選ぶ readiness TaskCondition 実行時評価です。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/, version: conditional_edges}
    field_values:
      expression_language: python
      predicate_expression: authorization.valid && snapshot.exists
    related_node_ids: [TaskCondition]
    related_relation_ids: []
    source_claims: [claim-tc-langgraph]
  - id: TaskCondition-boundary-informal
    labels: {zh: 非结构化备注不是条件, en: Informal note is not condition, ja: 非構造化メモは条件ではない}
    descriptions:
      zh: 日志写“可能需要更多数据”，没有谓词、评估时点或失败后果。
      en: A log says 'more data may be needed' with no predicate, evaluation point, or failure consequence.
      ja: 「追加データが必要かも」だけでは述語/評価時点/結果がありません。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: decidable predicate boundary}
    field_values: {}
    related_node_ids: [TaskCondition]
    related_relation_ids: []
    source_claims: [claim-tc-design]
parent_relation: null
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Conditional edge predicates.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task context and guardrails.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TaskCondition specialization boundaries.
source_claims:
  - id: claim-tc-langgraph
    source: langgraph
    supports: LangGraph conditional edges evaluate explicit predicates over state/evidence, grounding TaskCondition semantics.
    locator: StateGraph conditional_edges
    evidence_kind: official
    confidence: high
  - id: claim-tc-crewai
    source: crewai
    supports: CrewAI separates task context readiness from output guardrails completion acceptance.
    locator: Tasks > context and guardrails
    evidence_kind: official
    confidence: high
  - id: claim-tc-design
    source: moonweave-design
    supports: Moonweave groups evaluable task-governance predicates under TaskCondition with explicit evaluation phases.
    locator: TaskCondition concept boundary
    evidence_kind: design-inference
    confidence: high
