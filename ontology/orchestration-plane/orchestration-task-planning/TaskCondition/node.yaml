  - id: claim-task-condition-017
    source: lit-planning-ontology-2023
    supports: Planning-ontology evidence treats constraints and ordering conditions as explicit planning knowledge; this case is an evaluable condition independent of an evaluation occurrence.
    locator: Planning Ontology paper > goals, actions, ordering constraints, and plan structure
