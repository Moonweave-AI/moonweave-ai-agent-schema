schema: moonweave.ai/ontology-node/v1
id: TaskCondition
kind: concept
labels:
  zh: 任务条件
  en: task condition
  ja: タスク条件
semantics:
  short_definition:
    zh: 任务条件是可被计划或控制逻辑判定的任务约束性规范。
    en: A task condition is an evaluable specification that constrains a task or its execution.
    ja: タスク条件は、タスクまたはその実行を制約する評価可能な仕様です。
  definition:
    zh: 任务条件是一种规范，其种差是：它表达可判定谓词，用于决定任务何时可开始、以何种边界执行、依赖何物或何时可认定完成；它特化为 TaskConstraint、TaskDependency 或 TaskCompletionCriterion，而不是一次条件检查活动或检查结果。
    en: A TaskCondition is a specification distinguished by expressing an evaluable predicate that determines when a task may start, within which bounds it may execute, what it depends on, or when it is complete. It specializes into TaskConstraint, TaskDependency, or TaskCompletionCriterion and is not a condition-check activity or its result.
    ja: TaskCondition は仕様の一種であり、タスクの開始時点、実行境界、依存対象、完了判定を決める評価可能な述語を表します。TaskConstraint、TaskDependency、TaskCompletionCriterion に特化し、条件評価活動や結果ではありません。
  why_needed:
    zh: 把条件作为独立规范可让计划器、策略闸门和评估器引用同一判定语义，同时避免把约束、依赖和完成标准挤成同一个字段。
    en: Representing conditions independently lets planners, policy gates, and evaluators reuse one decision semantics while keeping constraints, dependencies, and completion criteria distinct.
    ja: 条件を独立仕様として表すことで、計画器、ポリシーゲート、評価器が同じ判定意味を再利用し、制約、依存、完了基準を区別できます。
  includes:
    - zh: 可计算谓词、适用范围、评估时点、所需证据以及条件不满足时的后果。
      en: An evaluable predicate, applicability scope, evaluation point, required evidence, and consequence of non-satisfaction.
      ja: 評価可能な述語、適用範囲、評価時点、必要証拠、不成立時の結果。
  excludes:
    - zh: 执行条件检查的活动、布尔检查结果、以及没有可判定语义的自然语言备注。
      en: The activity that evaluates a condition, its Boolean result, and an informal note with no decidable semantics.
      ja: 条件を評価する活動、その真偽結果、判定可能な意味を持たない自然言語メモ。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      TaskCondition 是规划器、LangGraph conditional_edges 与 OPA 策略共享的谓词语义源：编译时生成边条件或 Rego
      输入 schema，运行时评估器返回布尔结果但不回写 condition revision。TaskConstraint、TaskDependency、
      TaskCompletionCriterion 分别映射不同评估钩子；A2A TASK_STATE_INPUT_REQUIRED 表示协议等待输入，不是
      TaskCondition 求值结果存储位置。
    en: >-
      TaskCondition is the shared predicate semantics source for planners, LangGraph conditional_edges, and OPA policy:
      compile time emits edge conditions or Rego input schemas; runtime evaluators return Boolean results without rewriting
      condition revision. TaskConstraint, TaskDependency, and TaskCompletionCriterion map to distinct evaluation hooks; A2A
      TASK_STATE_INPUT_REQUIRED signals protocol input wait, not TaskCondition verdict storage.
    ja: >-
      TaskCondition は planner、LangGraph conditional_edges、OPA policy が共有する predicate semantics source である。
      compile time は edge condition または Rego input schema を生成し、runtime evaluator は Boolean result を返すが
      condition revision は書き換えない。TaskConstraint、TaskDependency、TaskCompletionCriterion は異なる evaluation hook
      に対応する。A2A TASK_STATE_INPUT_REQUIRED は protocol input wait を示し TaskCondition verdict 保存場所ではない。
  typical_input:
    - description:
        zh: 带版本的可判定任务条件规约。
        en: A versioned, decidable task-condition specification.
        ja: version 付きの decidable task-condition specification。
      format: |-
        {"condition_specification_id":"cond:release-gates@2","version":"2","predicate_kind":"readiness","expression_language":"cel","expression":"inputs.signed == true","evaluation_point":"before_step:approve"}
  typical_output:
    - description:
        zh: 编译到图或策略引擎的条件绑定及运行时求值槽位。
        en: A condition binding compiled into graph or policy engines plus a runtime evaluation slot.
        ja: graph または policy engine にコンパイルされた condition binding と runtime evaluation slot。
      format: |-
        {"condition_ref":"cond:release-gates@2","compiled_to":{"adapter":"langgraph","edge":"approve","when":"inputs.signed == true"},"runtime_verdict_slot":"gate:release-signatures"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents conditional_edges that evaluate predicates over graph state at runtime.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents declarative policy evaluation over structured input separate from verdict storage.
    - name: A2A Protocol life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents protocol states distinct from local condition specifications.
  source_claims:
    - claim-task-condition-002
    - claim-task-condition-010
structure:
  identity_keys:
    - condition_specification_id
    - version
  fields:
    - id: condition_specification_id
      labels:
        zh: 条件规约标识
        en: condition-specification ID
        ja: 条件仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在跨计划引用时稳定识别同一任务条件规约。
        en: Stably identifies the same task-condition specification across plan references.
        ja: 計画参照をまたいで同じタスク条件仕様を安定して識別します。
      allowed_values: []
      pattern: ^condition-[A-Za-z0-9._:-]+$
      example_value: condition-audit-readiness
      source_claims:
        - claim-task-condition-002
    - id: version
      labels:
        zh: 条件版本
        en: condition version
        ja: 条件版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识不可变谓词与证据合同的一次修订，修改判定语义必须产生新版本。
        en: Identifies one immutable revision of the predicate and evidence contract; changing decision semantics creates a new version.
        ja: 述語と証拠契約の不変リビジョンを識別し、判定意味の変更では新しい版を作成します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
      example_value: "3"
      source_claims:
        - claim-task-condition-003
    - id: expression_language
      labels:
        zh: 表达式语言
        en: expression language
        ja: 式言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 predicate_expression 所用的可执行语言或受控表达式方言。
        en: Declares the executable language or controlled expression dialect used by predicate_expression.
        ja: predicate_expression が用いる実行可能言語または統制式方言を宣言します。
      allowed_values: []
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: cel
      source_claims:
        - claim-task-condition-004
    - id: predicate_expression
      labels:
        zh: 判定谓词
        en: predicate expression
        ja: 判定述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 返回布尔判定的无副作用表达式，引用字段必须由证据合同声明。
        en: A side-effect-free expression returning a Boolean decision whose referenced values are declared by the evidence contract.
        ja: 証拠契約で宣言した値だけを参照し、真偽判定を返す副作用のない式です。
      allowed_values: []
      pattern: null
      example_value: authorization.valid && snapshot.exists
      source_claims:
        - claim-task-condition-005
    - id: evaluation_phase
      labels:
        zh: 评估阶段
        en: evaluation phase
        ja: 評価段階
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分条件是在开始前、执行中还是完成判定时应用，防止把完成标准误作就绪门槛。
        en: Distinguishes application before start, during execution, or at completion so a completion criterion is not mistaken for a readiness gate.
        ja: 開始前・実行中・完了判定のどこで適用するかを区別し、完了基準を開始条件と誤認しないようにします。
      allowed_values:
        - id: TaskConditionPhaseReadiness
          value: readiness
          labels:
            zh: 就绪判定
            en: readiness
            ja: 実行準備判定
          definitions:
            zh: 在创建执行前判定任务是否具备开始条件。
            en: Evaluates whether a task may start before an Execution is created.
            ja: Execution 作成前にタスクを開始できるか判定します。
          status: accepted
          source_claims:
            - claim-task-condition-006
        - id: TaskConditionPhaseExecution
          value: execution
          labels:
            zh: 执行期判定
            en: execution
            ja: 実行中判定
          definitions:
            zh: 在执行活动进行期间持续检查允许的资源、方法或权限边界。
            en: Evaluates resource, method, or authority bounds while an Execution is in progress.
            ja: Execution の進行中に資源・方法・権限の境界を評価します。
          status: accepted
          source_claims:
            - claim-task-condition-007
        - id: TaskConditionPhaseCompletion
          value: completion
          labels:
            zh: 完成判定
            en: completion
            ja: 完了判定
          definitions:
            zh: 依据结果证据判定任务预期结果是否可被接受。
            en: Evaluates result evidence to decide whether the task's desired outcome may be accepted.
            ja: 結果証拠からタスクの望ましい結果を受け入れられるか判定します。
          status: accepted
          source_claims:
            - claim-task-condition-008
      pattern: null
      example_value: readiness
      source_claims:
        - claim-task-condition-009
    - id: required_evidence_contract
      labels:
        zh: 所需证据合同
        en: required-evidence contract
        ja: 必要証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明谓词可读取的证据类型、字段、版本与新鲜度要求，而不存储一次判定结果。
        en: Declares evidence types, fields, versions, and freshness that the predicate may read without storing one evaluation result.
        ja: 述語が参照できる証拠種別・項目・版・鮮度を宣言し、一回の評価結果は保存しません。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - AuthorizationRecord
          - SnapshotManifest
        max_age_seconds: 300
      source_claims:
        - claim-task-condition-010
    - id: unsatisfied_effect
      labels:
        zh: 不满足后果
        en: unsatisfied effect
        ja: 不成立時の効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定条件为 false 或证据缺失时对开始、继续或完成判定产生的治理后果。
        en: Specifies the governance consequence for start, continuation, or completion when the predicate is false or evidence is missing.
        ja: 述語が false または証拠不足の場合に、開始・継続・完了判定へ及ぼす統制結果を定めます。
      allowed_values:
        - id: TaskConditionEffectBlockStart
          value: block_start
          labels:
            zh: 阻止开始
            en: block start
            ja: 開始を阻止
          definitions:
            zh: 条件不满足时不得创建该任务的执行。
            en: No Execution for the task may be created while the condition is unsatisfied.
            ja: 条件が不成立の間は当該タスクの Execution を作成できません。
          status: accepted
          source_claims:
            - claim-task-condition-011
        - id: TaskConditionEffectPauseExecution
          value: pause_execution
          labels:
            zh: 暂停执行
            en: pause execution
            ja: 実行を一時停止
          definitions:
            zh: 运行期边界不再成立时暂停正在进行的执行并等待新判定。
            en: Pause the in-progress Execution when a runtime bound ceases to hold and await a new decision.
            ja: 実行中の境界が成立しなくなった場合は Execution を一時停止し、再判定を待ちます。
          status: accepted
          source_claims:
            - claim-task-condition-012
        - id: TaskConditionEffectRejectCompletion
          value: reject_completion
          labels:
            zh: 拒绝完成
            en: reject completion
            ja: 完了を拒否
          definitions:
            zh: 完成证据不足时拒绝成功结论，但不删除已发生的执行记录。
            en: Reject a success judgment when completion evidence is insufficient without deleting the Execution record.
            ja: 完了証拠が不足する場合は成功判定を拒否し、発生済み Execution 記録は削除しません。
          status: accepted
          source_claims:
            - claim-task-condition-013
      pattern: null
      example_value: block_start
      source_claims:
        - claim-task-condition-014
  constraints:
    - id: task-condition-decidable
      severity: error
      expression_language: plain
      expression: predicate_expression parses under expression_language and returns a Boolean using only required_evidence_contract fields
      explanations:
        zh: 任务条件必须可重复判定，且不得依赖未声明数据或产生副作用。
        en: A task condition must be repeatably decidable without undeclared data or side effects.
        ja: タスク条件は未宣言データや副作用に依存せず、反復可能に判定できなければなりません。
      source_claims:
        - claim-task-condition-015
    - id: task-condition-phase-effect-coherent
      severity: error
      expression_language: plain
      expression: readiness implies unsatisfied_effect=block_start; completion implies unsatisfied_effect=reject_completion
      explanations:
        zh: 应用阶段必须与不满足后果一致，完成判据不得阻止一个尚未被评估的任务开始。
        en: The evaluation phase and unsatisfied effect must agree; a completion criterion must not block start merely because completion has not yet been evaluated.
        ja: 評価段階と不成立時効果は整合し、未評価の完了基準だけで開始を阻止してはなりません。
      source_claims:
        - claim-task-condition-016
  required_relation_constraints: []
examples:
  - id: TaskCondition-example-positive-manual-001
    labels:
      zh: TaskCondition positive
      en: TaskCondition positive
      ja: TaskCondition positive
    descriptions:
      zh: Prefect 数据流编排映射 TaskCondition：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps TaskCondition: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect TaskCondition: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {condition_specification_id: condition-audit-readiness, version: 3, expression_language: cel, predicate_expression: "authorization.valid && snapshot.exists", evaluation_phase: readiness}

    related_node_ids:
      - TaskCondition
    related_relation_ids: []
    source_claims:
      - claim-task-condition-017

  - id: TaskCondition-example-boundary-manual-001
    labels:
      zh: TaskCondition boundary
      en: TaskCondition boundary
      ja: TaskCondition boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 TaskCondition WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not TaskCondition WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で TaskCondition WorkflowStep spec ではない。
    field_values: {condition_specification_id: condition-informal-note, version: 1, expression_language: plain-text, predicate_expression: "more data may be needed", evaluation_phase: readiness, required_evidence_contract: {}, unsatisfied_effect: block_start}

    related_node_ids:
      - TaskCondition
    related_relation_ids: []
    source_claims:
      - claim-task-condition-018

  - id: TaskCondition-example-counterexample-confusable
    labels:
      zh: TaskCondition counterexample
      en: TaskCondition counterexample
      ja: TaskCondition counterexample
    descriptions:
      zh: 失败后直接重试而无 reflect(trajectory) 生成 verbal feedback 的路径不是 Reflexion 式 TaskCondition。
      en: Retry after failure without reflect(trajectory) verbal feedback is not Reflexion-style TaskCondition.
      ja: reflect なし retry は Reflexion 式 TaskCondition ではない。
    field_values: {condition_id: absent, condition_kind: absent, gate_outcome_ref: gate-outcome-884}

    related_node_ids:
      - TaskCondition
      - GateOutcome
      - TaskDependency
    related_relation_ids: []
    source_claims:
      - claim-task-condition-017

  - id: TaskCondition-example-instance-concrete
    labels:
      zh: TaskCondition instance
      en: TaskCondition instance
      ja: TaskCondition instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 TaskCondition 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable TaskCondition instance.
      ja: ReAct 实例 Thought→Action Search→Observation が TaskCondition 監査实例に写像。
    field_values: {condition_specification_id: condition-audit-readiness, version: 3, expression_language: cel, predicate_expression: "authorization.valid && snapshot.exists", evaluation_phase: readiness}

    related_node_ids:
      - TaskCondition
    related_relation_ids: []
    source_claims:
      - claim-task-condition-017

