schema: moonweave.ai/ontology-node/v1
id: TaskDependency
kind: concept
labels:
  zh: 任务依赖
  en: task dependency
  ja: タスク依存関係
semantics:
  short_definition:
    zh: 任务依赖是以一个前置 Task、一个依赖 Task 和满足谓词为身份的前置条件。
    en: A task dependency is a prerequisite identified by one predecessor Task, one dependent Task, and a satisfaction predicate.
    ja: タスク依存は、一つの先行 Task、一つの依存 Task、充足述語で識別される前提条件です。
  definition:
    zh: TaskDependency 是一种 TaskCondition，其种差是同时通过 has_predecessor 与 has_dependent 指向两个不同 Task，并规定前置 Task 的哪些结果证据满足依赖；Task-depends_on-Task 是这对端点的可遍历投影。TaskStep 与 WorkItem 的依赖由各自同型边表达，产物或批准要求则写入 required_evidence_contract，而不是冒充第三个端点。
    en: A TaskDependency is a TaskCondition distinguished by pointing through has_predecessor and has_dependent to two different Tasks and specifying which predecessor-result evidence satisfies the dependency. Task-depends_on-Task is the traversable projection of that endpoint pair. TaskStep and WorkItem dependencies use their own homogeneous edges, while artifact or approval requirements belong in required_evidence_contract rather than masquerading as a third endpoint.
    ja: TaskDependency は TaskCondition の一種で、has_predecessor と has_dependent により異なる二つの Task を指し、先行 Task のどの結果証拠で依存が成立するかを定めます。Task-depends_on-Task はその端点対の走査可能な投影です。TaskStep と WorkItem の依存は各同型辺で表し、成果物・承認要件は第三端点ではなく required_evidence_contract に置きます。
  why_needed:
    zh: 双端点条件既能回答谁依赖谁，又能保存依赖类型、证据合同与失败传播规则；直接 DAG 边负责快速遍历，两者必须保持一致。
    en: The two-endpoint condition answers who depends on whom while retaining dependency kind, evidence contract, and failure behavior; a direct DAG edge supports fast traversal and must remain consistent with it.
    ja: 二端点条件は誰が誰に依存するかを答えつつ、依存種別・証拠契約・失敗挙動を保持し、直接 DAG 辺は高速走査を担い両者は整合します。
  includes:
    - zh: 一个 predecessor Task、一个不同的 dependent Task、依赖类型、可执行满足谓词、证据合同和是否强制。
      en: One predecessor Task, one different dependent Task, dependency kind, executable satisfaction predicate, evidence contract, and mandatory flag.
      ja: 一つの先行 Task、異なる一つの依存 Task、依存種別、実行可能な充足述語、証拠契約、必須フラグ。
  excludes:
    - zh: TaskStep 或 WorkItem 的同层排序边、仅凭数组位置推断的先后、一般资源限制，以及一次实际就绪检查结果。
      en: TaskStep or WorkItem same-level ordering edges, precedence inferred only from array position, general resource limits, and one actual readiness-check result.
      ja: TaskStep・WorkItem の同階層順序辺、配列位置だけの先後、一般資源制限、一回の実行準備チェック結果。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      TaskDependency 的双端点谓词在 LangGraph 编译为 prerequisite 节点的 finish-to-start 边或 join 等待；规划器
      同时维护 Task-depends_on-Task 投影边以做环检测。Agents SDK 顺序编排用 await 前置 Runner 完成再启动 dependent
      Agent。required_evidence_contract 由评估器在运行时核对 predecessor Execution 产物；A2A history 只是协议观测，
      不能单独满足依赖而不经 evidence 合同校验。
    en: >-
      TaskDependency two-endpoint predicates compile in LangGraph to finish-to-start edges or join waits from prerequisite
      nodes; planners maintain Task-depends_on-Task projection edges for cycle detection. Agents SDK sequential orchestration
      awaits predecessor Runner completion before starting the dependent Agent. required_evidence_contract is checked at
      runtime against predecessor Execution artifacts; A2A history is protocol observation alone and cannot satisfy a
      dependency without evidence-contract validation.
    ja: >-
      TaskDependency の二端点 predicate は LangGraph で prerequisite node からの finish-to-start edge または join wait に
      コンパイルされる。planner は環検出のため Task-depends_on-Task projection edge も維持する。Agents SDK sequential
      orchestration は predecessor Runner 完了を await してから dependent Agent を起動する。required_evidence_contract は
      runtime で predecessor Execution artifact に対して検証される。A2A history は protocol observation のみで、evidence
      contract 検証なしに dependency を充足できない。
  typical_input:
    - description:
        zh: 声明 predecessor 与 dependent Task 及证据合同的依赖规约。
        en: A dependency specification declaring predecessor and dependent Tasks plus an evidence contract.
        ja: predecessor と dependent Task および evidence contract を宣言する dependency specification。
      format: |-
        {"condition_specification_id":"dep:report-after-reconcile@1","version":"1","dependency_kind":"finish-to-start","predecessor_task_ref":"task-spec-reconcile-7@4","dependent_task_ref":"task-spec-publish-report@2","required_evidence_contract":"reconciliation-report@3","mandatory":true}
  typical_output:
    - description:
        zh: 编译后的 DAG 边与就绪评估输入，不是就绪检查活动的结果。
        en: A compiled DAG edge and readiness-evaluation input, not the result of a readiness-check activity.
        ja: コンパイル済み DAG edge と readiness evaluation input。readiness-check activity の結果ではない。
      format: |-
        {"dependency_ref":"dep:report-after-reconcile@1","dag_edge":{"from":"task-spec-reconcile-7@4","to":"task-spec-publish-report@2"},"readiness_eval_input":{"required_artifact":"reconciliation-report@3"}}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents fixed edges and join semantics for prerequisite-dependent structure.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents sequential handoffs awaiting predecessor agent completion.
    - name: A2A Protocol life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents task history as protocol observation separate from plan dependency contracts.
  source_claims:
    - claim-task-dependency-012
    - claim-task-dependency-014
structure:
  identity_keys: []
  fields:
    - id: dependency_kind
      labels:
        zh: 依赖类型
        en: dependency kind
        ja: 依存種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分等待前置完成、等待产物可用或等待授权批准三种满足语义。
        en: Distinguishes waiting for predecessor completion, artifact availability, or an authority approval.
        ja: 先行完了待ち・成果物利用可能待ち・権限承認待ちの充足意味を区別します。
      allowed_values:
        - id: TaskDependencyFinishToStart
          value: finish_to_start
          labels:
            zh: 完成后开始
            en: finish to start
            ja: 完了後開始
          definitions:
            zh: 前置 Task 的满足证据成立后，依赖 Task 才可开始。
            en: The dependent Task may start only after satisfaction evidence for the predecessor Task holds.
            ja: 先行 Task の充足証拠が成立した後にのみ依存 Task を開始できます。
          status: accepted
          source_claims:
            - claim-task-dependency-003
        - id: TaskDependencyArtifactAvailable
          value: artifact_available
          labels:
            zh: 产物可用
            en: artifact available
            ja: 成果物利用可能
          definitions:
            zh: 前置 Task 产生符合证据合同的产物后，依赖才满足。
            en: The dependency is satisfied after the predecessor Task produces an artifact conforming to the evidence contract.
            ja: 先行 Task が証拠契約に適合する成果物を生成した後に依存が成立します。
          status: accepted
          source_claims:
            - claim-task-dependency-004
        - id: TaskDependencyApprovalGranted
          value: approval_granted
          labels:
            zh: 批准已授予
            en: approval granted
            ja: 承認済み
          definitions:
            zh: 前置 Task 的审查证据包含指定授权主体批准时依赖才满足。
            en: The dependency is satisfied only when predecessor review evidence includes approval by the specified authority.
            ja: 先行 Task の審査証拠に指定権限主体の承認が含まれる場合だけ依存が成立します。
          status: accepted
          source_claims:
            - claim-task-dependency-005
      pattern: null
      example_value: artifact_available
      source_claims:
        - claim-task-dependency-006
    - id: satisfaction_predicate
      labels:
        zh: 满足谓词
        en: satisfaction predicate
        ja: 充足述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 依据前置 Task 的结果证据返回依赖是否满足，不能只读取前置任务名称或数组位置。
        en: Returns whether the dependency is satisfied from predecessor Task result evidence and may not rely only on a task name or array position.
        ja: 先行 Task の結果証拠から依存の成立を返し、タスク名や配列位置だけには依存しません。
      allowed_values: []
      pattern: null
      example_value: predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true
      source_claims:
        - claim-task-dependency-007
    - id: required_evidence_contract
      labels:
        zh: 依赖证据合同
        en: dependency-evidence contract
        ja: 依存証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明满足谓词必须引用的前置结果、产物摘要或批准记录及其完整性要求。
        en: Declares the predecessor result, artifact digest, or approval record and integrity requirements required by the satisfaction predicate.
        ja: 充足述語が必要とする先行結果・成果物要約・承認記録と完全性要件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - RunOutcome:succeeded
          - Artifact:schema-v3
          - ReviewApproval
        bind_to: artifact_digest
      source_claims:
        - claim-task-dependency-008
    - id: mandatory
      labels:
        zh: 强制依赖
        en: mandatory dependency
        ja: 必須依存
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明该依赖必须满足，还是仅用于排序建议或机会性输入。
        en: States whether the dependency must be satisfied or is only an ordering preference or opportunistic input.
        ja: 依存が必須か、順序上の選好または任意入力だけかを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-task-dependency-009
  constraints:
    - id: task-dependency-distinct-endpoints
      severity: error
      expression_language: plain
      expression: has_predecessor exactly one Task and has_dependent exactly one different Task
      explanations:
        zh: 依赖必须具备不同的前置 Task 与依赖 Task；自依赖不构成合法先决条件。
        en: A dependency has one predecessor Task and one different dependent Task; self-dependency is not a valid prerequisite.
        ja: 依存には一つの先行 Task と異なる一つの依存 Task が必要で、自己依存は正当な前提ではありません。
      source_claims:
        - claim-task-dependency-010
    - id: task-dependency-dag-projection
      severity: error
      expression_language: plain
      expression: project each has_dependent/has_predecessor pair as dependent Task depends_on predecessor Task; the Task dependency graph is acyclic within a TaskPlan version
      explanations:
        zh: 双端点关系投影为从依赖 Task 指向前置 Task 的有向无环边；需要循环时应使用运行时路由控制。
        en: The two endpoints project to a directed acyclic edge from dependent Task to predecessor Task; runtime routing control represents intentional loops.
        ja: 二端点は依存 Task から先行 Task への有向非循環辺へ投影し、意図的な反復は実行時ルーティングで表します。
      source_claims:
        - claim-task-dependency-011
  required_relation_constraints:
    - id: task-dependency-predecessor
      direction: outgoing
      predicate: has_predecessor
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskDependency 恰好指向一个提供所需证据的前置 Task。
        en: Each TaskDependency points to exactly one predecessor Task that supplies the required evidence.
        ja: 各 TaskDependency は必要証拠を供給する先行 Task を一つだけ指します。
      source_claims:
        - claim-task-dependency-012
    - id: task-dependency-dependent
      direction: outgoing
      predicate: has_dependent
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskDependency 恰好指向一个被该条件控制就绪性的依赖 Task。
        en: Each TaskDependency points to exactly one dependent Task whose readiness it governs.
        ja: 各 TaskDependency はその条件で実行準備を統制する依存 Task を一つだけ指します。
      source_claims:
        - claim-task-dependency-013
examples:
  - id: TaskDependency-example-positive-manual-001
    labels:
      zh: TaskDependency positive
      en: TaskDependency positive
      ja: TaskDependency positive
    descriptions:
      zh: Prefect 数据流编排映射 TaskDependency：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps TaskDependency: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect TaskDependency: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {condition_specification_id: task-condition-schema-review-after-draft, expression_language: cel, predicate_expression: "predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true", evaluation_phase: readiness, unsatisfied_effect: block_start, version: 1, dependency_kind: artifact_available, satisfaction_predicate: "predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true"}

    related_node_ids:
      - TaskDependency
      - TaskCondition
      - Task
    related_relation_ids:
      - TaskDependency-is_a-TaskCondition
      - TaskDependency-has_predecessor-Task
      - TaskDependency-has_dependent-Task
      - Task-depends_on-Task
    source_claims:
      - claim-task-dependency-014

  - id: TaskDependency-example-boundary-manual-001
    labels:
      zh: TaskDependency boundary
      en: TaskDependency boundary
      ja: TaskDependency boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 TaskDependency WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not TaskDependency WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で TaskDependency WorkflowStep spec ではない。
    field_values: {condition_specification_id: dependency-array-adjacency, version: 1, dependency_kind: finish_to_start, satisfaction_predicate: "previous array element comes first", required_evidence_contract: {}, mandatory: true}

    related_node_ids:
      - TaskDependency
      - TaskCondition
    related_relation_ids:
      - TaskDependency-is_a-TaskCondition
    source_claims:
      - claim-task-dependency-015

  - id: TaskDependency-example-counterexample-confusable
    labels:
      zh: TaskDependency counterexample
      en: TaskDependency counterexample
      ja: TaskDependency counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 TaskDependency。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style TaskDependency.
      ja: Python/code なし自然言語計画は TaskWeaver 式 TaskDependency にならない。
    field_values: {dependency_id: absent, predecessor_step_ref: absent, graph_edge: approve_to_package}

    related_node_ids:
      - TaskDependency
      - TaskPlan
      - TaskStep
      - TaskCondition
      - Task
    related_relation_ids: []
    source_claims:
      - claim-task-dependency-014

  - id: TaskDependency-example-instance-concrete
    labels:
      zh: TaskDependency instance
      en: TaskDependency instance
      ja: TaskDependency instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 TaskDependency policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to TaskDependency policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が TaskDependency policy-prefect@1 に写像。
    field_values: {condition_specification_id: task-condition-schema-review-after-draft, expression_language: cel, predicate_expression: "predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true", evaluation_phase: readiness, unsatisfied_effect: block_start, version: 1, dependency_kind: artifact_available, satisfaction_predicate: "predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true"}

    related_node_ids:
      - TaskDependency
      - TaskCondition
      - Task
    related_relation_ids: []
    source_claims:
      - claim-task-dependency-014

