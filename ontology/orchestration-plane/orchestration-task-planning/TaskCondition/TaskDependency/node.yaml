schema: moonweave.ai/ontology-node/v1
id: TaskDependency
kind: concept
labels:
  zh: 任务依赖
  en: task dependency
  ja: タスク依存関係
semantics:
  short_definition:
    zh: 以 predecessor Task、dependent Task 与满足谓词为身份的前置 TaskCondition。
    en: A prerequisite TaskCondition identified by predecessor Task, dependent Task, and a satisfaction predicate.
    ja: 先行 Task・依存 Task・充足述語で識別される前提 TaskCondition です。
  definition:
    zh: TaskDependency 是 TaskCondition 的特化，通过 has_predecessor 与 has_dependent 指向两个不同 Task，并规定前置 Task 的哪些结果证据满足依赖；Task-depends_on-Task 是该端点对的 DAG 投影。映射：LangGraph 有向边与 conditional routing 的前置条件；CrewAI Task.context 上游任务列表。数组邻接或展示顺序不能替代显式依赖。
    en: TaskDependency specializes TaskCondition by pointing through has_predecessor and has_dependent to two different Tasks and specifying which predecessor-result evidence satisfies the dependency; Task-depends_on-Task is the DAG projection of that endpoint pair. Maps to LangGraph directed edges and conditional routing prerequisites and CrewAI Task.context upstream task lists. Array adjacency or display order cannot replace an explicit dependency.
    ja: TaskDependency は has_predecessor/has_dependent で二つの Task を指し、先行結果証拠の充足を定義します。LangGraph 有向辺・CrewAI Task.context に写像されます。
  why_needed:
    zh: 双端点条件既能回答谁依赖谁，又能保存依赖类型、证据合同与失败传播规则；直接 DAG 边负责快速遍历，两者必须保持一致。
    en: Two-endpoint conditions answer who depends on whom while retaining dependency kind, evidence contract, and failure behavior; direct DAG edges support fast traversal and must stay consistent.
    ja: 二端点条件は誰が誰に依存するかを答え、依存種別・証拠契約・失敗挙動を保持し、DAG 辺と整合します。
  includes:
    - zh: 一个 predecessor Task、一个不同的 dependent Task、依赖类型、可执行满足谓词、证据合同和是否强制。
      en: One predecessor Task, one different dependent Task, dependency kind, executable satisfaction predicate, evidence contract, and mandatory flag.
      ja: 一つの先行 Task、異なる依存 Task、依存種別、実行可能充足述語、証拠契約、必須フラグ。
  excludes:
    - zh: TaskStep 或 WorkItem 的同层排序边、仅凭数组位置推断的先后、一般资源限制，以及一次实际就绪检查结果。
      en: TaskStep or WorkItem ordering edges, precedence from array position alone, general resource limits, and one actual readiness-check result.
      ja: TaskStep/WorkItem 順序辺、配列位置だけの先後、一般資源制限、一回の readiness チェック結果。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: CrewAI downstream Task.context=[upstream_task] 应投影为 finish_to_start 或 artifact_available TaskDependency，并同步 Task-depends_on-Task 边。LangGraph add_edge(A,B) 表示 B 依赖 A 的输出/state；conditional_edges 上的 readiness 谓词写入 satisfaction_predicate 与 required_evidence_contract。规划图内 Task 依赖必须无环。
    en: CrewAI downstream Task.context=[upstream_task] projects to finish_to_start or artifact_available TaskDependency with a matching Task-depends_on-Task edge. LangGraph add_edge(A,B) means B depends on A output/state; readiness predicates on conditional_edges populate satisfaction_predicate and required_evidence_contract. Task dependency graphs within a plan must be acyclic.
    ja: CrewAI context と LangGraph 辺を TaskDependency に写像し、Task-depends_on-Task と整合させ、計画内は非循環とします。
  typical_input:
    - description: CrewAI task context dependency.
      format: |
        review = Task(description="Review schema", context=[draft_task])
      source_claims: [claim-tdep-crewai]
    - description: LangGraph edge prerequisite.
      format: |
        builder.add_edge("draft_schema", "review_schema")
      source_claims: [claim-tdep-langgraph]
  typical_output:
    - description: Reified task dependency with endpoints.
      format: |
        {
          "condition_specification_id": "dependency-schema-review-after-draft",
          "dependency_kind": "artifact_available",
          "has_predecessor": "task-schema-draft",
          "has_dependent": "task-schema-review"
        }
      source_claims: [claim-tdep-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Directed edges and conditional routing.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task context upstream dependencies.
structure:
  identity_keys: []
  fields:
    - id: dependency_kind
      labels: {zh: 依赖类型, en: dependency kind, ja: 依存種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分等待前置完成、等待产物可用或等待授权批准。
        en: Distinguishes waiting for predecessor completion, artifact availability, or authority approval.
        ja: 先行完了・成果物利用可能・権限承認待ちを区別します。
      allowed_values:
        - {id: TaskDependencyFinishToStart, value: finish_to_start, labels: {zh: 完成后开始, en: finish to start, ja: 完了後開始}, definitions: {zh: 前置 Task 满足后依赖 Task 才可开始, en: Dependent may start after predecessor satisfaction, ja: 先行充足後に依存開始可能}, source_claims: [claim-tdep-crewai]}
        - {id: TaskDependencyArtifactAvailable, value: artifact_available, labels: {zh: 产物可用, en: artifact available, ja: 成果物利用可能}, definitions: {zh: 前置产生符合证据合同的产物后依赖才满足, en: Satisfied after predecessor produces conforming artifact, ja: 適合成果物生成後に成立}, source_claims: [claim-tdep-crewai]}
        - {id: TaskDependencyApprovalGranted, value: approval_granted, labels: {zh: 批准已授予, en: approval granted, ja: 承認済み}, definitions: {zh: 前置审查证据包含指定授权批准时依赖才满足, en: Satisfied when predecessor review includes specified approval, ja: 指定承認を含む場合に成立}, source_claims: [claim-tdep-crewai]}
      example_value: artifact_available
      source_claims: [claim-tdep-design]
    - id: satisfaction_predicate
      labels: {zh: 满足谓词, en: satisfaction predicate, ja: 充足述語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 依据前置 Task 的结果证据返回依赖是否满足，不能只读取任务名称或数组位置。
        en: Returns whether the dependency is satisfied from predecessor Task result evidence, not task name or array position alone.
        ja: 先行 Task 結果証拠から依存成立を返し、名称/配列位置だけには依存しません。
      example_value: predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true
      source_claims: [claim-tdep-langgraph]
    - id: required_evidence_contract
      labels: {zh: 依赖证据合同, en: dependency-evidence contract, ja: 依存証拠契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 满足谓词必须引用的前置结果、产物摘要或批准记录及其完整性要求。
        en: Predecessor result, artifact digest, or approval record and integrity requirements required by the satisfaction predicate.
        ja: 充足述語が必要とする先行結果・成果物要約・承認記録と完全性要件。
      example_value:
        required: [RunOutcome:succeeded, Artifact:schema-v3, ReviewApproval]
        bind_to: artifact_digest
      source_claims: [claim-tdep-crewai]
    - id: mandatory
      labels: {zh: 强制依赖, en: mandatory dependency, ja: 必須依存}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指明该依赖必须满足，还是仅用于排序建议或机会性输入。
        en: Whether the dependency must be satisfied or is only an ordering preference or opportunistic input.
        ja: 依存が必須か、順序選好/任意入力だけかを示します。
      example_value: true
      source_claims: [claim-tdep-langgraph]
  constraints:
    - id: task-dependency-distinct-endpoints
      severity: error
      expression_language: plain
      expression: has_predecessor exactly one Task and has_dependent exactly one different Task
      explanations:
        zh: 依赖必须具备不同的前置 Task 与依赖 Task；自依赖不构成合法先决条件。
        en: A dependency has one predecessor Task and one different dependent Task; self-dependency is invalid.
        ja: 異なる二端点が必要で自己依存は無効です。
      source_claims: [claim-tdep-design]
    - id: task-dependency-dag-projection
      severity: error
      expression_language: plain
      expression: project each has_dependent/has_predecessor pair as dependent Task depends_on predecessor Task; the Task dependency graph is acyclic within a TaskPlan version
      explanations:
        zh: 双端点关系投影为从依赖 Task 指向前置 Task 的有向无环边；循环应使用运行时路由控制。
        en: Endpoints project to an acyclic dependent-to-predecessor edge; intentional loops use runtime routing control.
        ja: 依存→先行の有向非循環辺へ投影し、意図的循環は実行時ルーティングで表します。
      source_claims: [claim-tdep-langgraph]
  required_relation_constraints:
    - id: task-dependency-predecessor
      direction: outgoing
      predicate: has_predecessor
      target_concept_id: Task
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 TaskDependency 恰好指向一个提供所需证据的前置 Task。
        en: Each TaskDependency points to exactly one predecessor Task supplying required evidence.
        ja: 各 TaskDependency は証拠を供給する先行 Task を一つ指します。
      source_claims: [claim-tdep-crewai]
    - id: task-dependency-dependent
      direction: outgoing
      predicate: has_dependent
      target_concept_id: Task
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 TaskDependency 恰好指向一个被该条件控制就绪性的依赖 Task。
        en: Each TaskDependency points to exactly one dependent Task whose readiness it governs.
        ja: 各 TaskDependency は実行準備を統制する依存 Task を一つ指します。
      source_claims: [claim-tdep-crewai]
examples:
  - id: TaskDependency-crewai-context
    labels: {zh: CrewAI context 依赖, en: CrewAI context dependency, ja: CrewAI context 依存}
    descriptions:
      zh: dependency-schema-review-after-draft 规定 review 任务仅在前置 draft 成功并产生经批准的 schema-v3 后可开始；对应 CrewAI context 与 LangGraph 边。
      en: dependency-schema-review-after-draft permits review to start only after draft succeeds with approved schema-v3, mapping to CrewAI context and a LangGraph edge.
      ja: draft 成功と承認 schema-v3 後に review 開始可能、CrewAI context と LangGraph 辺に対応します。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task context}
    field_values:
      dependency_kind: artifact_available
      evaluation_phase: readiness
      unsatisfied_effect: block_start
      mandatory: true
    related_node_ids: [TaskDependency, Task, TaskCondition]
    related_relation_ids: [TaskDependency-has_predecessor-Task, TaskDependency-has_dependent-Task, Task-depends_on-Task]
    source_claims: [claim-tdep-crewai, claim-tdep-langgraph]
  - id: TaskDependency-langgraph-edge
    labels: {zh: LangGraph 边依赖, en: LangGraph edge dependency, ja: LangGraph 辺依存}
    descriptions:
      zh: add_edge("draft_schema","review_schema") 表示 review 节点消费 draft 输出；应同步 TaskDependency 双端点与 Task-depends_on-Task。
      en: add_edge('draft_schema','review_schema') means review consumes draft output; sync TaskDependency endpoints and Task-depends_on-Task.
      ja: add_edge で review が draft 出力を消費し、TaskDependency 端点と Task-depends_on-Task を同期します。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/, version: StateGraph edges}
    field_values:
      dependency_kind: finish_to_start
      satisfaction_predicate: predecessor.outcome == 'succeeded'
    related_node_ids: [TaskDependency, Task]
    related_relation_ids: [Task-depends_on-Task]
    source_claims: [claim-tdep-langgraph]
  - id: TaskDependency-boundary-array-order
    labels: {zh: 数组顺序不是依赖, en: Array order is not dependency, ja: 配列順は依存ではない}
    descriptions:
      zh: 两个任务出现在计划 JSON 相邻位置，但没有 edge、前置标识或产物要求；不得推断 TaskDependency。
      en: Two tasks are adjacent in a plan JSON array with no edge, predecessor id, or artifact requirement; do not infer TaskDependency.
      ja: 計画 JSON で隣接しても edge/先行 ID/成果物要件がなければ TaskDependency を推定しません。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: explicit dependency boundary}
    field_values: {}
    related_node_ids: [TaskDependency]
    related_relation_ids: []
    source_claims: [claim-tdep-design]
parent_relation:
  id: TaskDependency-is_a-TaskCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: TaskDependency 以具名前置工作、产物或批准以及明确满足谓词为种差的 TaskCondition 特化。
    en: TaskDependency is a TaskCondition whose differentia is named predecessor work, artifact, or approval with an explicit satisfaction predicate.
    ja: 具名先行作業・成果物・承認と明示充足述語を種差とする TaskCondition 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tdep-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TaskDependency-has_predecessor-Task
    predicate: has_predecessor
    direction: source-to-target
    relation_kind: information
    labels: {zh: 具有前置任务, en: has predecessor, ja: 先行タスクを持つ}
    definitions:
      zh: 指向提供满足证据的唯一前置 Task；一 Task 可服务多个依赖，但一 TaskDependency 不得指向多个前置 Task。
      en: Identifies the single predecessor supplying satisfaction evidence; one Task may precede many dependencies but one TaskDependency may not name multiple predecessors.
      ja: 充足証拠を供給する唯一の先行 Task を示します。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 1, max: 1}
    inverse_reading:
      predicate: is_predecessor_for
      labels: {zh: 作为依赖的前置任务, en: is predecessor for, ja: 依存の先行である}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tdep-crewai]
    layout_role: cross-link
    target: concept:Task
  - id: TaskDependency-has_dependent-Task
    predicate: has_dependent
    direction: source-to-target
    relation_kind: information
    labels: {zh: 具有依赖任务, en: has dependent, ja: 依存タスクを持つ}
    definitions:
      zh: 指向其就绪性受该条件控制的唯一依赖 Task；方向不能反转为前置任务依赖后续任务。
      en: Identifies the single Task whose readiness is governed by this condition; direction must not reverse predecessor/dependent roles.
      ja: 実行準備をこの条件で統制される唯一の依存 Task を示します。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 1, max: 1}
    inverse_reading:
      predicate: is_dependent_of_condition
      labels: {zh: 受依赖条件控制, en: is dependent of condition, ja: 依存条件に統制される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tdep-crewai]
    layout_role: cross-link
    target: concept:Task
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Directed edges and conditional routing prerequisites.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task context upstream dependencies.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TaskDependency endpoint model and DAG projection.
source_claims:
  - id: claim-tdep-langgraph
    source: langgraph
    supports: LangGraph workflow flow uses explicit directed edges and conditional routing that require evaluable predecessor conditions.
    locator: StateGraph edges and conditional_edges
    evidence_kind: official
    confidence: high
  - id: claim-tdep-crewai
    source: crewai
    supports: CrewAI task context names upstream Tasks whose outputs feed and delay a downstream Task.
    locator: Tasks > context
    evidence_kind: official
    confidence: high
  - id: claim-tdep-design
    source: moonweave-design
    supports: Moonweave reifies prerequisites as TaskDependency with distinct predecessor and dependent endpoints plus DAG projection.
    locator: TaskDependency concept boundary
    evidence_kind: design-inference
    confidence: high
