schema: moonweave.ai/ontology-node/v1
id: TaskDependency
kind: concept
status: review
labels:
  zh: 任务依赖
  en: task dependency
  ja: タスク依存関係
semantics:
  short_definition:
    zh: 任务依赖是以一个前置 Task、一个依赖 Task 和满足谓词为身份的前置条件。
    en: A task dependency is a prerequisite identified by one predecessor Task, one dependent Task, and a satisfaction predicate.
    ja: タスク依存は、一つの先行 Task、一つの依存 Task、充足述語で識別される前提条件です。
  definition:
    zh: TaskDependency 是一种 TaskCondition，其种差是同时通过 has_predecessor 与 has_dependent 指向两个不同 Task，并规定前置 Task 的哪些结果证据满足依赖；Task-depends_on-Task 是这对端点的可遍历投影。TaskStep 与 WorkItem 的依赖由各自同型边表达，产物或批准要求则写入 required_evidence_contract，而不是冒充第三个端点。
    en: A TaskDependency is a TaskCondition distinguished by pointing through has_predecessor and has_dependent to two different Tasks and specifying which predecessor-result evidence satisfies the dependency. Task-depends_on-Task is the traversable projection of that endpoint pair. TaskStep and WorkItem dependencies use their own homogeneous edges, while artifact or approval requirements belong in required_evidence_contract rather than masquerading as a third endpoint.
    ja: TaskDependency は TaskCondition の一種で、has_predecessor と has_dependent により異なる二つの Task を指し、先行 Task のどの結果証拠で依存が成立するかを定めます。Task-depends_on-Task はその端点対の走査可能な投影です。TaskStep と WorkItem の依存は各同型辺で表し、成果物・承認要件は第三端点ではなく required_evidence_contract に置きます。
  why_needed:
    zh: 双端点条件既能回答谁依赖谁，又能保存依赖类型、证据合同与失败传播规则；直接 DAG 边负责快速遍历，两者必须保持一致。
    en: The two-endpoint condition answers who depends on whom while retaining dependency kind, evidence contract, and failure behavior; a direct DAG edge supports fast traversal and must remain consistent with it.
    ja: 二端点条件は誰が誰に依存するかを答えつつ、依存種別・証拠契約・失敗挙動を保持し、直接 DAG 辺は高速走査を担い両者は整合します。
  includes:
    - zh: 一个 predecessor Task、一个不同的 dependent Task、依赖类型、可执行满足谓词、证据合同和是否强制。
      en: One predecessor Task, one different dependent Task, dependency kind, executable satisfaction predicate, evidence contract, and mandatory flag.
      ja: 一つの先行 Task、異なる一つの依存 Task、依存種別、実行可能な充足述語、証拠契約、必須フラグ。
  excludes:
    - zh: TaskStep 或 WorkItem 的同层排序边、仅凭数组位置推断的先后、一般资源限制，以及一次实际就绪检查结果。
      en: TaskStep or WorkItem same-level ordering edges, precedence inferred only from array position, general resource limits, and one actual readiness-check result.
      ja: TaskStep・WorkItem の同階層順序辺、配列位置だけの先後、一般資源制限、一回の実行準備チェック結果。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: dependency_kind
      labels:
        zh: 依赖类型
        en: dependency kind
        ja: 依存種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分等待前置完成、等待产物可用或等待授权批准三种满足语义。
        en: Distinguishes waiting for predecessor completion, artifact availability, or an authority approval.
        ja: 先行完了待ち・成果物利用可能待ち・権限承認待ちの充足意味を区別します。
      allowed_values:
        - id: TaskDependencyFinishToStart
          value: finish_to_start
          labels:
            zh: 完成后开始
            en: finish to start
            ja: 完了後開始
          definitions:
            zh: 前置 Task 的满足证据成立后，依赖 Task 才可开始。
            en: The dependent Task may start only after satisfaction evidence for the predecessor Task holds.
            ja: 先行 Task の充足証拠が成立した後にのみ依存 Task を開始できます。
          status: accepted
          source_claims:
            - claim-task-dependency-003
        - id: TaskDependencyArtifactAvailable
          value: artifact_available
          labels:
            zh: 产物可用
            en: artifact available
            ja: 成果物利用可能
          definitions:
            zh: 前置 Task 产生符合证据合同的产物后，依赖才满足。
            en: The dependency is satisfied after the predecessor Task produces an artifact conforming to the evidence contract.
            ja: 先行 Task が証拠契約に適合する成果物を生成した後に依存が成立します。
          status: accepted
          source_claims:
            - claim-task-dependency-004
        - id: TaskDependencyApprovalGranted
          value: approval_granted
          labels:
            zh: 批准已授予
            en: approval granted
            ja: 承認済み
          definitions:
            zh: 前置 Task 的审查证据包含指定授权主体批准时依赖才满足。
            en: The dependency is satisfied only when predecessor review evidence includes approval by the specified authority.
            ja: 先行 Task の審査証拠に指定権限主体の承認が含まれる場合だけ依存が成立します。
          status: accepted
          source_claims:
            - claim-task-dependency-005
      pattern: null
      example_value: artifact_available
      source_claims:
        - claim-task-dependency-006
    - id: satisfaction_predicate
      labels:
        zh: 满足谓词
        en: satisfaction predicate
        ja: 充足述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 依据前置 Task 的结果证据返回依赖是否满足，不能只读取前置任务名称或数组位置。
        en: Returns whether the dependency is satisfied from predecessor Task result evidence and may not rely only on a task name or array position.
        ja: 先行 Task の結果証拠から依存の成立を返し、タスク名や配列位置だけには依存しません。
      allowed_values: []
      pattern: null
      example_value: predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true
      source_claims:
        - claim-task-dependency-007
    - id: required_evidence_contract
      labels:
        zh: 依赖证据合同
        en: dependency-evidence contract
        ja: 依存証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明满足谓词必须引用的前置结果、产物摘要或批准记录及其完整性要求。
        en: Declares the predecessor result, artifact digest, or approval record and integrity requirements required by the satisfaction predicate.
        ja: 充足述語が必要とする先行結果・成果物要約・承認記録と完全性要件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - RunOutcome:succeeded
          - Artifact:schema-v3
          - ReviewApproval
        bind_to: artifact_digest
      source_claims:
        - claim-task-dependency-008
    - id: mandatory
      labels:
        zh: 强制依赖
        en: mandatory dependency
        ja: 必須依存
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明该依赖必须满足，还是仅用于排序建议或机会性输入。
        en: States whether the dependency must be satisfied or is only an ordering preference or opportunistic input.
        ja: 依存が必須か、順序上の選好または任意入力だけかを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-task-dependency-009
  constraints:
    - id: task-dependency-distinct-endpoints
      severity: error
      expression_language: plain
      expression: has_predecessor exactly one Task and has_dependent exactly one different Task
      explanations:
        zh: 依赖必须具备不同的前置 Task 与依赖 Task；自依赖不构成合法先决条件。
        en: A dependency has one predecessor Task and one different dependent Task; self-dependency is not a valid prerequisite.
        ja: 依存には一つの先行 Task と異なる一つの依存 Task が必要で、自己依存は正当な前提ではありません。
      source_claims:
        - claim-task-dependency-010
    - id: task-dependency-dag-projection
      severity: error
      expression_language: plain
      expression: project each has_dependent/has_predecessor pair as dependent Task depends_on predecessor Task; the Task dependency graph is acyclic within a TaskPlan version
      explanations:
        zh: 双端点关系投影为从依赖 Task 指向前置 Task 的有向无环边；需要循环时应使用运行时路由控制。
        en: The two endpoints project to a directed acyclic edge from dependent Task to predecessor Task; runtime routing control represents intentional loops.
        ja: 二端点は依存 Task から先行 Task への有向非循環辺へ投影し、意図的な反復は実行時ルーティングで表します。
      source_claims:
        - claim-task-dependency-011
  required_relation_constraints:
    - id: task-dependency-predecessor
      direction: outgoing
      predicate: has_predecessor
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskDependency 恰好指向一个提供所需证据的前置 Task。
        en: Each TaskDependency points to exactly one predecessor Task that supplies the required evidence.
        ja: 各 TaskDependency は必要証拠を供給する先行 Task を一つだけ指します。
      source_claims:
        - claim-task-dependency-012
    - id: task-dependency-dependent
      direction: outgoing
      predicate: has_dependent
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskDependency 恰好指向一个被该条件控制就绪性的依赖 Task。
        en: Each TaskDependency points to exactly one dependent Task whose readiness it governs.
        ja: 各 TaskDependency はその条件で実行準備を統制する依存 Task を一つだけ指します。
      source_claims:
        - claim-task-dependency-013
examples:
  - id: TaskDependency-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务依赖正例
      en: Positive example for task dependency
      ja: タスク依存関係の正例
    scenario_id: null
    descriptions:
      zh: dependency-schema-review-after-draft@1 规定：依赖任务只有在前置任务成功并产生经批准的 schema-v3 后才可开始；条件未满足时继续阻止依赖任务启动。
      en: dependency-schema-review-after-draft@1 permits the dependent task to start only after its predecessor succeeds and produces approved schema-v3; otherwise the dependent task remains blocked from starting.
      ja: dependency-schema-review-after-draft@1 は predecessor が成功して承認済み schema-v3 を生成した後だけ dependent task の開始を許し、未充足なら開始を阻止し続けます。
    field_values:
      condition_specification_id: task-condition-schema-review-after-draft
      expression_language: cel
      predicate_expression: predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true
      evaluation_phase: readiness
      unsatisfied_effect: block_start
      version: "1"
      dependency_kind: artifact_available
      satisfaction_predicate: predecessor.outcome == 'succeeded' && artifact('schema-v3').approved == true
      required_evidence_contract:
        required:
          - RunOutcome:succeeded
          - Artifact:schema-v3
          - ReviewApproval
        bind_to: artifact_digest
      mandatory: true
    related_node_ids:
      - TaskDependency
      - TaskCondition
      - Task
    related_relation_ids:
      - TaskDependency-is_a-TaskCondition
      - TaskDependency-has_predecessor-Task
      - TaskDependency-has_dependent-Task
      - Task-depends_on-Task
    expected_result:
      zh: 建立 TaskDependency，并以批准产物作为满足证据。
      en: Create a TaskDependency using the approved artifact as satisfaction evidence.
      ja: 承認済み成果物を充足証拠とする TaskDependency を作成します。
    why_valid_or_invalid:
      zh: 依赖方、前置方、所需产物、满足谓词、就绪阶段和阻止启动的效果均明确且相互一致。
      en: Dependent, predecessor, required artifact, satisfaction predicate, readiness phase, and block-start effect are explicit and mutually consistent.
      ja: dependent、predecessor、required artifact、satisfaction predicate、readiness phase、block-start effect が明示され相互に一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-dependency-014
  - id: TaskDependency-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务依赖边界例
      en: Boundary case for task dependency
      ja: タスク依存関係の境界例
    scenario_id: null
    descriptions:
      zh: 两个任务出现在计划 JSON 的相邻位置，但没有 edge、前置标识或产物要求。
      en: Two tasks are adjacent in a plan JSON array but have no edge, predecessor identifier, or artifact requirement.
      ja: 二つのタスクが計画 JSON 配列で隣接しますが、edge、先行ID、成果物要件がありません。
    field_values:
      condition_specification_id: dependency-array-adjacency
      version: "1"
      dependency_kind: finish_to_start
      satisfaction_predicate: previous array element comes first
      required_evidence_contract: {}
      mandatory: true
    related_node_ids:
      - TaskDependency
      - TaskCondition
    related_relation_ids:
      - TaskDependency-is_a-TaskCondition
    expected_result:
      zh: 不得仅凭数组顺序推断 TaskDependency。
      en: Do not infer TaskDependency from array order alone.
      ja: 配列順だけで TaskDependency を推定しません。
    why_valid_or_invalid:
      zh: 展示顺序可能任意，缺少可验证的依赖断言与满足条件。
      en: Presentation order may be arbitrary and supplies no verifiable dependency assertion or satisfaction condition.
      ja: 表示順は任意であり、検証可能な依存アサーションや充足条件を提供しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-dependency-015
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaskCompletionCriterion
    shared_parent_concept_id: TaskCondition
    differentia:
      zh: 已审查兄弟区分：父节点 TaskCondition：TaskDependency（semantic kind=specification，骨架 TaskDependency-is_a-TaskCondition）；TaskCompletionCriterion（semantic kind=specification，骨架 TaskCompletionCriterion-is_a-TaskCondition）。双端条件：TaskDependency 条件：“任务依赖属于任务条件，区别于其他同类对象的条件是：它说明某个任务、步骤或工作项必须等待另一结果、条件、资源或批准后才能继续”；TaskCompletionCriterion 条件：“任务完成判据是一种任务条件；其区分条件是：任务完成准则规定某类任务达到完成状态所需的可检验条件、阈值和证据要求；它由 EvaluationRun 应用，而不自行评估运行结局”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent TaskCondition: TaskDependency (semantic kind=specification, backbone TaskDependency-is_a-TaskCondition); TaskCompletionCriterion (semantic kind=specification, backbone TaskCompletionCriterion-is_a-TaskCondition). Endpoint conditions: TaskDependency condition: “Task dependency is a task condition whose defining condition is that it states that one task, step, or work item depends on another result, condition, resource, or approval before it can proceed”; TaskCompletionCriterion condition: “As a task condition, Task completion criterion is distinguished by the fact that it specifies testable conditions, thresholds, and evidence required for a task to be complete; EvaluationRun applies it rather than the criterion evaluating a run outcome itself”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 TaskCondition：TaskDependency（semantic kind=specification、バックボーン TaskDependency-is_a-TaskCondition）；TaskCompletionCriterion（semantic kind=specification、バックボーン TaskCompletionCriterion-is_a-TaskCondition）。両端条件：TaskDependency の条件：「タスク依存関係はタスク条件のうち、次の事実を定義条件とする対象です：それは、あるタスク、手順、作業項目が、別の結果、条件、資源、承認を待たなければ進めないことを示します」；TaskCompletionCriterion の条件：「タスク条件に属するタスク完了基準は、次の事実を種差とします：それはタスク完了に必要な検査可能条件、閾値、証拠要件を規定し、基準自体ではなく EvaluationRun が実行結果へ適用します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-task-dependency-016
parent_relation:
  id: TaskDependency-is_a-TaskCondition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TaskDependency —is_a→ TaskCondition 表示依赖是一种可判定任务条件，其种差是引用具名前置工作、产物或批准以及明确的满足谓词。
    en: TaskDependency —is_a→ TaskCondition classifies a dependency as an evaluable task condition whose differentia is a named predecessor work item, artifact, or approval together with an explicit satisfaction predicate.
    ja: TaskDependency —is_a→ TaskCondition は、具名の前置作業・成果物・承認と明示的な充足述語を種差とする評価可能なタスク条件として依存を分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TaskDependency-is_a-TaskCondition-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: dependency-review-pass 指明 review-step、ApprovalRecord 产物以及 status=approved 的满足谓词。
        en: dependency-review-pass names review-step, an ApprovalRecord artifact, and the satisfaction predicate status=approved.
        ja: dependency-review-pass は review-step、ApprovalRecord 成果物、status=approved の充足述語を指定します。
      field_values: {}
      related_node_ids:
        - TaskDependency
        - TaskCondition
      related_relation_ids:
        - TaskDependency-is_a-TaskCondition
      expected_result:
        zh: 该对象通过 is_a 同时属于 TaskDependency 与 TaskCondition。
        en: Through is_a, the object is both TaskDependency and TaskCondition.
        ja: is_a により、この対象は TaskDependency かつ TaskCondition です。
      why_valid_or_invalid:
        zh: 具名前置项和可判定满足条件共同形成依赖的完整种差。
        en: A named predecessor and evaluable satisfaction condition jointly form the dependency differentia.
        ja: 具名の前置項目と評価可能な充足条件が依存の完全な種差を成すためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-dependency-017
    - id: TaskDependency-is_a-TaskCondition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 两个步骤仅在 UI 列表中相邻，没有边或前置标识。
        en: Two steps are merely adjacent in a UI list and have no edge or predecessor identifier.
        ja: 二つのステップは UI リストで隣接するだけで、辺や前置識別子がありません。
      field_values: {}
      related_node_ids:
        - TaskDependency
        - TaskCondition
      related_relation_ids:
        - TaskDependency-is_a-TaskCondition
      expected_result:
        zh: 不得把展示邻接项分类为 TaskDependency。
        en: Do not classify display adjacency as TaskDependency.
        ja: 表示上の隣接を TaskDependency に分類しません。
      why_valid_or_invalid:
        zh: 缺少明确前置对象与满足谓词，无法由控制逻辑验证。
        en: There is no explicit predecessor or satisfaction predicate for control logic to evaluate.
        ja: 制御ロジックが評価できる明示的前置対象と充足述語を欠くためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-dependency-018
  source_claims:
    - claim-task-dependency-019
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: TaskDependency-has_predecessor-Task
    predicate: has_predecessor
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 具有前置任务
      en: has predecessor
      ja: 先行タスクを持つ
    definitions:
      zh: TaskDependency —has_predecessor→ Task 指向提供满足证据的唯一前置任务；前置 Task 可服务多个依赖，但同一 TaskDependency 不得指向多个前置 Task。
      en: TaskDependency —has_predecessor→ Task identifies the single predecessor that supplies satisfaction evidence. One Task may precede many dependencies, but one TaskDependency may not name multiple predecessor Tasks.
      ja: TaskDependency —has_predecessor→ Task は充足証拠を供給する唯一の先行 Task を示します。一つの Task は複数依存の先行になれますが、一つの TaskDependency が複数先行 Task を指すことはできません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_predecessor_for
      labels:
        zh: 作为依赖的前置任务
        en: is predecessor for
        ja: 依存の先行である
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: TaskDependency-has_predecessor-Task-example-positive-manual-001
        kind: positive
        labels:
          zh: 前置任务端点正例
          en: Positive predecessor endpoint
          ja: 先行端点の正例
        scenario_id: null
        descriptions:
          zh: dependency-schema-review-after-draft 通过该边指向 task-schema-draft；schema-v3 的批准摘要由后者结果提供。
          en: dependency-schema-review-after-draft points to task-schema-draft, whose result supplies the approved schema-v3 digest.
          ja: dependency-schema-review-after-draft は task-schema-draft を指し、その結果が承認済み schema-v3 要約を供給します。
        field_values:
          predecessor_task_id: task-schema-draft
        related_node_ids:
          - TaskDependency
          - Task
        related_relation_ids:
