    supports: The OASIS planning extension separates task descriptions and procedure specifications from their plan executions. Moonweave makes the acceptance predicate an explicit TaskCompletionCriterion applied to execution evidence.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-completion-criterion-002
    source: eng-fw-crewai-tasks
    supports: CrewAI supports function-based deterministic guardrails; Moonweave records the evaluator language needed to execute equivalent completion logic.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-completion-criterion-003
