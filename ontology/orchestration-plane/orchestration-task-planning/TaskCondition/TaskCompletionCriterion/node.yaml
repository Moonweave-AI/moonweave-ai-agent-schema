schema: moonweave.ai/ontology-node/v1
id: TaskCompletionCriterion
kind: concept
labels:
  zh: 任务完成判据
  en: task completion criterion
  ja: タスク完了基準
semantics:
  short_definition:
    zh: 任务完成标准是规定何种证据足以认定任务完成的任务条件。
    en: A task completion criterion states which evidence is sufficient to declare a task complete.
    ja: タスク完了基準は、どの証拠でタスク完了を宣言できるかを定めるタスク条件です。
  definition:
    zh: 任务完成标准是一种 TaskCondition，其种差是：它定义完成谓词、验收阈值和所需证据，由评估活动应用于 Execution 的结果；它不存储完成事件、RunOutcome 或输出内容。
    en: A TaskCompletionCriterion is a TaskCondition distinguished by defining a completion predicate, acceptance threshold, and required evidence that an evaluation activity applies to an Execution's results. It does not store the completion event, RunOutcome, or output content.
    ja: TaskCompletionCriterion は TaskCondition の一種であり、完了述語、受入閾値、必要証拠を定義し、評価活動が Execution の結果へ適用します。完了イベント、RunOutcome、出力内容は保存しません。
  why_needed:
    zh: 显式完成标准防止“产生了输出”被误当成“任务成功”，并使重试、人工批准和评估结果可围绕同一验收条件闭环。
    en: An explicit completion criterion prevents 'produced output' from being mistaken for 'task succeeded' and gives retries, human approval, and evaluation a shared acceptance condition.
    ja: 明示的完了基準は「出力生成」を「成功」と誤認することを防ぎ、再試行、人手承認、評価に共通の受入条件を与えます。
  includes:
    - zh: 可判定完成谓词、阈值、必须提交的证据、容差和验收主体。
      en: A decidable completion predicate, threshold, required evidence, tolerance, and acceptance authority.
      ja: 判定可能な完了述語、閾値、必要証拠、許容差、受入主体。
  excludes:
    - zh: RunOutcome 的成功记录、生成的 Artifact，以及规定执行方式但不判定完成的 TaskConstraint。
      en: A successful RunOutcome record, a generated Artifact, and a TaskConstraint that governs execution without deciding completion.
      ja: 成功 RunOutcome 記録、生成 Artifact、実行方法を制約しても完了判定しない TaskConstraint。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      TaskCompletionCriterion 供 EvaluationRun 或 OpenAI Agent Evals 对 Execution 输出求值：completion_predicate 与
      threshold 编译为评估器配置，Verdict 写入 EvaluationRun 而非 criterion revision。LangGraph 终结节点可触发评估
      hook，但判据定义仍引用稳定 criterion_ref。A2A TASK_STATE_COMPLETED 只表示协议状态到达终态，不能替代本地验收
      谓词 unless 适配器显式映射且保留 criterion 引用。
    en: >-
      TaskCompletionCriterion feeds EvaluationRun or OpenAI Agent Evals to evaluate Execution outputs: completion_predicate
      and threshold compile to evaluator configuration; Verdict writes to EvaluationRun, not criterion revision. A LangGraph
      terminal node may trigger an evaluation hook, but criterion definitions still reference a stable criterion_ref. A2A
      TASK_STATE_COMPLETED only signals protocol terminal status and cannot replace local acceptance predicates unless an
      adapter maps explicitly while retaining criterion reference.
    ja: >-
      TaskCompletionCriterion は EvaluationRun または OpenAI Agent Evals が Execution output を評価する入力となる。
      completion_predicate と threshold は evaluator configuration にコンパイルされ、Verdict は criterion revision ではなく
      EvaluationRun に書き込まれる。LangGraph terminal node は evaluation hook を起動できるが、criterion 定義は安定
      criterion_ref を参照し続ける。A2A TASK_STATE_COMPLETED は protocol terminal status を示すだけで、criterion reference
      を保持した明示的 adapter mapping がない限り local acceptance predicate を置き換えられない。
  typical_input:
    - description:
        zh: 定义完成谓词、阈值与必需证据的验收规约。
        en: An acceptance specification defining completion predicate, threshold, and required evidence.
        ja: completion predicate、threshold、required evidence を定義する acceptance specification。
      format: |-
        {"condition_specification_id":"criterion:zero-unexplained-differences@4","version":"4","expression_language":"cel","completion_predicate":"metrics.unexplained_differences == 0","threshold":0,"required_evidence":["reconciliation-report@3"]}
  typical_output:
    - description:
        zh: 评估活动对 Execution 结果求值时使用的判据绑定与 verdict 槽位。
        en: A criterion binding and verdict slot used when an evaluation activity scores Execution results.
        ja: evaluation activity が Execution result を採点するときに使う criterion binding と verdict slot。
      format: |-
        {"criterion_ref":"criterion:zero-unexplained-differences@4","evaluation_run_ref":"eval-run-2601","verdict":{"passed":true,"score":1.0,"evidence_refs":["reconciliation-report@3"]}}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents scoring agent outputs against declared acceptance criteria.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Separates evaluation activities from specification entities they apply to.
    - name: A2A Protocol life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents TASK_STATE_COMPLETED as protocol terminal status distinct from local acceptance predicates.
  source_claims:
    - claim-task-completion-criterion-009
    - claim-task-completion-criterion-010
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels:
        zh: 判据语言
        en: criterion language
        ja: 基準言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明完成谓词所用的可执行表达式语言。
        en: Declares the executable expression language used by the completion predicate.
        ja: 完了述語が用いる実行可能な式言語を宣言します。
      allowed_values: []
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: cel
      source_claims:
        - claim-task-completion-criterion-002
    - id: predicate_expression
      labels:
        zh: 完成谓词
        en: completion predicate
        ja: 完了述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对结果证据求值并返回是否满足任务预期结果的无副作用布尔表达式。
        en: A side-effect-free Boolean expression evaluated over result evidence to decide whether the Task's desired outcome is satisfied.
        ja: 結果証拠を評価し、Task の望ましい結果が満たされたかを返す副作用のない真偽式です。
      allowed_values: []
      pattern: null
      example_value: tests.failed == 0 && static_analysis.high_severity == 0 && review.approved
      source_claims:
        - claim-task-completion-criterion-003
    - id: acceptance_threshold
      labels:
        zh: 验收阈值
        en: acceptance threshold
        ja: 受入閾値
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明数值阈值、容差与合取规则，使成功结论可被独立复算。
        en: Declares numeric thresholds, tolerances, and conjunction rules so the success judgment can be recomputed independently.
        ja: 数値閾値・許容差・論理結合を宣言し、成功判定を独立に再計算可能にします。
      allowed_values: []
      pattern: null
      example_value:
        failed_tests: 0
        high_severity_findings: 0
        reviewer_approval: true
      source_claims:
        - claim-task-completion-criterion-004
    - id: required_evidence_contract
      labels:
        zh: 完成证据合同
        en: completion-evidence contract
        ja: 完了証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出完成判定所需证据类型、字段、完整性和版本要求。
        en: Lists the evidence types, fields, integrity, and version requirements needed for completion adjudication.
        ja: 完了判定に必要な証拠種別・項目・完全性・版要件を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - UnitTestReport
          - StaticAnalysisReport
          - ReviewApproval
        bind_to: patch_digest
      source_claims:
        - claim-task-completion-criterion-005
    - id: acceptance_authority_ref
      labels:
        zh: 验收主体引用
        en: acceptance-authority reference
        ja: 受入主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用有权作出最终验收判定的评估器、策略或人工角色绑定。
        en: References the evaluator, policy, or human role binding authorized to make the final acceptance decision.
        ja: 最終受入判定を行う権限を持つ評価器・ポリシー・人間ロール束縛を参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:release-reviewer
      source_claims:
        - claim-task-completion-criterion-006
  constraints:
    - id: completion-criterion-evidence-bound
      severity: error
      expression_language: plain
      expression: predicate_expression references only required_evidence_contract fields and acceptance_threshold values
      explanations:
        zh: 完成判定必须能由声明证据复算，不能读取未记录的隐式上下文。
        en: Completion must be recomputable from declared evidence and must not read unrecorded implicit context.
        ja: 完了判定は宣言済み証拠から再計算でき、未記録の暗黙文脈を参照してはなりません。
      source_claims:
        - claim-task-completion-criterion-007
    - id: completion-criterion-not-observed-outcome
      severity: error
      expression_language: plain
      expression: the criterion stores no Execution status, RunOutcome identity, or produced artifact instance
      explanations:
        zh: 完成判据是可复用规范，不得把一次执行的成功状态或产物实例写入身份。
        en: A completion criterion is reusable normative knowledge and must not embed one Execution status or artifact instance in its identity.
        ja: 完了基準は再利用可能な規範であり、一回の Execution 状態や成果物インスタンスを同一性へ埋め込んではなりません。
      source_claims:
        - claim-task-completion-criterion-008
  required_relation_constraints:
    - id: completion-criterion-used-by-task
      direction: incoming
      predicate: has_completion_criterion
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个完成判据至少必须被一个稳定 Task 规范引用。
        en: Each completion criterion is referenced by at least one stable Task specification.
        ja: 各完了基準は少なくとも一つの安定した Task 仕様から参照されます。
      source_claims:
        - claim-task-completion-criterion-009
examples:
  - id: TaskCompletionCriterion-example-positive-manual-001
    labels:
      zh: TaskCompletionCriterion positive
      en: TaskCompletionCriterion positive
      ja: TaskCompletionCriterion positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 TaskCompletionCriterion 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for TaskCompletionCriterion: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) TaskCompletionCriterion: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {condition_specification_id: task-condition-repair-acceptance, evaluation_phase: completion, unsatisfied_effect: reject_completion, version: 2, expression_language: cel, predicate_expression: "tests.failed == 0 && static_analysis.high_severity == 0 && review.approved"}

    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
      - EvaluationRun
    related_relation_ids:
      - TaskCompletionCriterion-is_a-TaskCondition
      - EvaluationRun-uses-TaskCompletionCriterion
    source_claims:
      - claim-task-completion-criterion-010

  - id: TaskCompletionCriterion-example-boundary-manual-001
    labels:
      zh: TaskCompletionCriterion boundary
      en: TaskCompletionCriterion boundary
      ja: TaskCompletionCriterion boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 TaskCompletionCriterion 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not TaskCompletionCriterion static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で TaskCompletionCriterion 静的 spec ではない。
    field_values: {condition_specification_id: criterion-observed-run-status, version: 1, expression_language: literal, predicate_expression: "run-19.status == 'succeeded'"}

    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
    related_relation_ids:
      - TaskCompletionCriterion-is_a-TaskCondition
    source_claims:
      - claim-task-completion-criterion-011

  - id: TaskCompletionCriterion-example-counterexample-confusable
    labels:
      zh: TaskCompletionCriterion counterexample
      en: TaskCompletionCriterion counterexample
      ja: TaskCompletionCriterion counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 TaskCompletionCriterion 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style TaskCompletionCriterion positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 TaskCompletionCriterion 正例にならない。
    field_values: {criterion_id: absent, acceptance_expression: absent, exit_code: 0}

    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
      - TaskStep
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-task-completion-criterion-010

  - id: TaskCompletionCriterion-example-instance-concrete
    labels:
      zh: TaskCompletionCriterion instance
      en: TaskCompletionCriterion instance
      ja: TaskCompletionCriterion instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 TaskCompletionCriterion 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable TaskCompletionCriterion instance.
      ja: ReAct 实例 Thought→Action Search→Observation が TaskCompletionCriterion 監査实例に写像。
    field_values: {condition_specification_id: task-condition-repair-acceptance, evaluation_phase: completion, unsatisfied_effect: reject_completion, version: 2, expression_language: cel, predicate_expression: "tests.failed == 0 && static_analysis.high_severity == 0 && review.approved"}

    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-task-completion-criterion-010

