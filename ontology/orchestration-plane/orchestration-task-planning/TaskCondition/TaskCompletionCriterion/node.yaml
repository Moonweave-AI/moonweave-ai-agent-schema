      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: criterion-zero-diff 要求差异数为 0 且审计签名有效，可由评估器计算。
        en: criterion-zero-diff requires a difference count of zero and a valid audit signature, both evaluable by an evaluator.
        ja: criterion-zero-diff は差異数0と有効な監査署名を要求し、評価器で判定できます。
      field_values: {}
      related_node_ids:
        - TaskCompletionCriterion
        - TaskCondition
      related_relation_ids:
        - TaskCompletionCriterion-is_a-TaskCondition
      expected_result:
        zh: 该标准通过 is_a 同时属于 TaskCompletionCriterion 与 TaskCondition。
        en: Through is_a, the criterion is both TaskCompletionCriterion and TaskCondition.
        ja: is_a により、この基準は TaskCompletionCriterion かつ TaskCondition です。
      why_valid_or_invalid:
        zh: 它具有可判定谓词，并专门决定何时认定任务完成。
        en: It has an evaluable predicate specifically deciding when the Task is accepted as complete.
        ja: 評価可能な述語を持ち、Task を完了と認める時点を特に決めるためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-completion-criterion-013
    - id: TaskCompletionCriterion-is_a-TaskCondition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: constraint-budget-5 限制最多花费 5 欧元，但没有判断预期结果是否完成。
        en: constraint-budget-5 limits spending to EUR 5 but does not decide whether the desired outcome is complete.
        ja: constraint-budget-5 は支出を5ユーロに制限しますが、望ましい結果の完了を判定しません。
      field_values: {}
      related_node_ids:
        - TaskCompletionCriterion
        - TaskCondition
      related_relation_ids:
        - TaskCompletionCriterion-is_a-TaskCondition
      expected_result:
        zh: 它是 TaskConstraint，不是 TaskCompletionCriterion。
        en: It is TaskConstraint rather than TaskCompletionCriterion.
        ja: これは TaskCompletionCriterion ではなく TaskConstraint です。
      why_valid_or_invalid:
        zh: 预算限制控制允许的执行边界，与验收结果的谓词不同。
        en: A budget limit governs permitted execution bounds, unlike a predicate accepting the outcome.
        ja: 予算制限は許可実行境界を統制し、結果を受け入れる述語とは異なるためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-completion-criterion-014
  source_claims:
