schema: moonweave.ai/ontology-node/v1
id: TaskCompletionCriterion
kind: concept
labels:
  zh: 任务完成判据
  en: task completion criterion
  ja: タスク完了基準
semantics:
  short_definition:
    zh: 规定何种证据足以认定任务完成的 TaskCondition 特化。
    en: A TaskCondition specialization stating which evidence suffices to declare a task complete.
    ja: どの証拠でタスク完了を宣言できるかを定める TaskCondition 特化です。
  definition:
    zh: TaskCompletionCriterion 是 TaskCondition 的特化，定义 completion 阶段谓词、acceptance_threshold 与 required_evidence_contract，由 EvaluationRun 对 Execution 结果求值；它不存储 RunOutcome、完成事件或输出内容。映射：CrewAI expected_output 与 task guardrails；A2A Task 成功语义在运行层由 Execution 承载，此处保留可复用验收规范。
    en: TaskCompletionCriterion specializes TaskCondition with a completion-phase predicate, acceptance_threshold, and required_evidence_contract that an EvaluationRun applies to Execution results; it stores no RunOutcome, completion event, or output content. Maps to CrewAI expected_output and task guardrails; A2A Task success semantics live on Execution at runtime while this node holds reusable acceptance specs.
    ja: TaskCompletionCriterion は completion 段階述語・acceptance_threshold・required_evidence_contract を定義し EvaluationRun が Execution 結果へ適用します。CrewAI expected_output/guardrails に写像され、RunOutcome は保持しません。
  why_needed:
    zh: 显式完成标准防止“产生输出”被误当成“任务成功”，并使重试、人工批准和评估围绕同一验收条件闭环。
    en: Explicit completion criteria prevent 'produced output' from being mistaken for 'task succeeded' and let retries, human approval, and evaluation share one acceptance condition.
    ja: 明示的完了基準は出力生成と成功の混同を防ぎ、再試行・人手承認・評価に共通受入条件を与えます。
  includes:
    - zh: 可判定完成谓词、阈值、必须提交的证据、容差和验收主体。
      en: Decidable completion predicate, threshold, required evidence, tolerance, and acceptance authority.
      ja: 判定可能な完了述語、閾値、必要証拠、許容差、受入主体。
  excludes:
    - zh: RunOutcome 成功记录、生成的 Artifact，以及只限制执行方式而不判定完成的 TaskConstraint。
      en: Successful RunOutcome records, generated Artifacts, and TaskConstraint that limits execution without deciding completion.
      ja: 成功 RunOutcome、生成 Artifact、完了判定しない TaskConstraint。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: CrewAI Task.expected_output 与 guardrail 函数应投影为 TaskCompletionCriterion；guardrail 返回 (bool, feedback) 对应 evaluation_phase=completion 与 unsatisfied_effect=reject_completion。谓词输入必须全部来自 required_evidence_contract。
    en: CrewAI Task.expected_output and guardrail functions project to TaskCompletionCriterion; guardrail (bool, feedback) maps to evaluation_phase=completion and unsatisfied_effect=reject_completion. Predicate inputs must come only from required_evidence_contract.
    ja: CrewAI expected_output/guardrail を TaskCompletionCriterion に写像し、述語入力は required_evidence_contract のみとします。
  typical_input:
    - description: CrewAI expected_output and guardrail.
      format: |
        task = Task(
            description="Fix regression",
            expected_output="All target tests pass; patch approved",
            guardrails=[validate_patch_output],
        )
      source_claims: [claim-tcc-crewai]
  typical_output:
    - description: Versioned completion criterion specification.
      format: |
        {
          "condition_specification_id": "criterion-repair-acceptance",
          "evaluation_phase": "completion",
          "predicate_expression": "tests.failed == 0 && review.approved"
        }
      source_claims: [claim-tcc-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: expected_output and task guardrails.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task lifecycle success semantics (runtime layer).
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels: {zh: 判据语言, en: criterion language, ja: 基準言語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 完成谓词所用的可执行表达式语言。
        en: Executable expression language for the completion predicate.
        ja: 完了述語の実行可能式言語。
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: cel
      source_claims: [claim-tcc-crewai]
    - id: predicate_expression
      labels: {zh: 完成谓词, en: completion predicate, ja: 完了述語}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 对结果证据求值并返回是否满足 Task 预期结果的无副作用布尔表达式。
        en: Side-effect-free Boolean over result evidence deciding whether the Task desired outcome is satisfied.
        ja: 結果証拠を評価し Task の望ましい結果充足を返す副作用のない真偽式。
      example_value: tests.failed == 0 && static_analysis.high_severity == 0 && review.approved
      source_claims: [claim-tcc-crewai]
    - id: acceptance_threshold
      labels: {zh: 验收阈值, en: acceptance threshold, ja: 受入閾値}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 数值阈值、容差与合取规则，使成功结论可被独立复算。
        en: Numeric thresholds, tolerances, and conjunction rules for independent recomputation of success.
        ja: 成功判定を独立再計算可能にする数値閾値・許容差・論理結合。
      example_value: {failed_tests: 0, high_severity_findings: 0, reviewer_approval: true}
      source_claims: [claim-tcc-crewai]
    - id: required_evidence_contract
      labels: {zh: 完成证据合同, en: completion-evidence contract, ja: 完了証拠契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 完成判定所需证据类型、字段、完整性和版本要求。
        en: Evidence types, fields, integrity, and version requirements for completion adjudication.
        ja: 完了判定に必要な証拠種別・項目・完全性・版要件。
      example_value:
        required: [UnitTestReport, StaticAnalysisReport, ReviewApproval]
        bind_to: patch_digest
      source_claims: [claim-tcc-crewai]
    - id: acceptance_authority_ref
      labels: {zh: 验收主体引用, en: acceptance-authority reference, ja: 受入主体参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 有权作出最终验收判定的评估器、策略或人工角色绑定。
        en: Evaluator, policy, or human role binding authorized for the final acceptance decision.
        ja: 最終受入判定を行う評価器・ポリシー・人間ロール束縛。
      example_value: ActorRoleBinding:release-reviewer
      source_claims: [claim-tcc-design]
  constraints:
    - id: completion-criterion-evidence-bound
      severity: error
      expression_language: plain
      expression: predicate_expression references only required_evidence_contract fields and acceptance_threshold values
      explanations:
        zh: 完成判定必须能由声明证据复算，不能读取未记录的隐式上下文。
        en: Completion must be recomputable from declared evidence without unrecorded implicit context.
        ja: 宣言済み証拠から再計算でき、未記録暗黙文脈を参照してはなりません。
      source_claims: [claim-tcc-crewai]
    - id: completion-criterion-not-observed-outcome
      severity: error
      expression_language: plain
      expression: the criterion stores no Execution status, RunOutcome identity, or produced artifact instance
      explanations:
        zh: 完成判据是可复用规范，不得把一次执行的成功状态或产物实例写入身份。
        en: A completion criterion is reusable normative knowledge and must not embed one Execution status or artifact instance.
        ja: 再利用可能な規範であり、一回の Execution 状態や成果物インスタンスを同一性へ埋め込んではなりません。
      source_claims: [claim-tcc-design]
  required_relation_constraints:
    - id: completion-criterion-used-by-task
      direction: incoming
      predicate: has_completion_criterion
      target_concept_id: Task
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每个完成判据至少必须被一个稳定 Task 规范引用。
        en: Each completion criterion is referenced by at least one stable Task specification.
        ja: 各完了基準は少なくとも一つの安定 Task 仕様から参照されます。
      source_claims: [claim-tcc-crewai]
examples:
  - id: TaskCompletionCriterion-crewai-guardrail
    labels: {zh: CrewAI 完成 guardrail, en: CrewAI completion guardrail, ja: CrewAI 完了 guardrail}
    descriptions:
      zh: criterion-8 要求目标测试全部通过、静态检查无高危问题且评审人批准补丁哈希；CrewAI guardrail 对其 TaskOutput 求值。
      en: criterion-8 requires target tests pass, no high-severity static findings, and reviewer approval of the patch hash; a CrewAI guardrail evaluates TaskOutput.
      ja: criterion-8 は対象テスト合格・高重大度静的問題なし・パッチハッシュ承認を要求し CrewAI guardrail が TaskOutput を評価します。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task guardrails}
    field_values:
      evaluation_phase: completion
      unsatisfied_effect: reject_completion
      predicate_expression: tests.failed == 0 && static_analysis.high_severity == 0 && review.approved
    related_node_ids: [TaskCompletionCriterion, Task, TaskCondition]
    related_relation_ids: [TaskCompletionCriterion-is_a-TaskCondition, Task-has_completion_criterion-TaskCompletionCriterion]
    source_claims: [claim-tcc-crewai]
  - id: TaskCompletionCriterion-expected-output
    labels: {zh: expected_output 映射, en: expected_output mapping, ja: expected_output 写像}
    descriptions:
      zh: CrewAI expected_output 文本描述成功形态，Moonweave 将其与 guardrail 谓词一起固化为可复算 TaskCompletionCriterion。
      en: CrewAI expected_output text describes success shape; Moonweave materializes it with guardrail predicates as a recomputable TaskCompletionCriterion.
      ja: CrewAI expected_output の成功形態を guardrail 述語と共に再計算可能 TaskCompletionCriterion へ具体化します。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: expected_output}
    field_values:
      expression_language: cel
      acceptance_threshold: {failed_tests: 0}
    related_node_ids: [TaskCompletionCriterion, Task]
    related_relation_ids: []
    source_claims: [claim-tcc-crewai]
  - id: TaskCompletionCriterion-boundary-runoutcome
    labels: {zh: RunOutcome 不是判据, en: RunOutcome is not criterion, ja: RunOutcome は基準ではない}
    descriptions:
      zh: run-19 的 RunOutcome 写着 succeeded 并附测试报告；它记录一次实际判定，没有定义未来运行必须满足的规则。
      en: RunOutcome for run-19 says succeeded with a test report; it records one judgment but defines no rule future runs must satisfy.
      ja: run-19 の RunOutcome は succeeded とテスト報告を記録するだけで将来実行の規則を定義しません。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: spec versus outcome}
    field_values: {}
    related_node_ids: [TaskCompletionCriterion]
    related_relation_ids: []
    source_claims: [claim-tcc-design]
parent_relation:
  id: TaskCompletionCriterion-is_a-TaskCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: TaskCompletionCriterion 以判断预期结果何时有足够证据被接受为种差的 TaskCondition 特化。
    en: TaskCompletionCriterion is a TaskCondition whose differentia is deciding when sufficient evidence supports acceptance of the desired outcome.
    ja: 望ましい結果の受入に十分な証拠がある時点を判定する TaskCondition 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tcc-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: expected_output and task guardrails.
  - id: a2a-spec
    title: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-doc
    relevance: Runtime task success versus specification.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Completion criterion versus RunOutcome.
source_claims:
  - id: claim-tcc-crewai
    source: crewai
    supports: CrewAI expected_output and guardrails define reusable acceptance semantics applied to TaskOutput at completion.
    locator: Tasks > expected_output and guardrails
    evidence_kind: official
    confidence: high
  - id: claim-tcc-design
    source: moonweave-design
    supports: Moonweave keeps acceptance predicates as TaskCompletionCriterion distinct from observed RunOutcome records.
    locator: TaskCompletionCriterion concept boundary
    evidence_kind: design-inference
    confidence: high
