schema: moonweave.ai/ontology-node/v1
id: TaskCompletionCriterion
kind: concept
status: accepted
labels:
  zh: 任务完成判据
  en: task completion criterion
  ja: タスク完了基準
semantics:
  short_definition:
    zh: 任务完成标准是规定何种证据足以认定任务完成的任务条件。
    en: A task completion criterion states which evidence is sufficient to declare a task complete.
    ja: タスク完了基準は、どの証拠でタスク完了を宣言できるかを定めるタスク条件です。
  definition:
    zh: 任务完成标准是一种 TaskCondition，其种差是：它定义完成谓词、验收阈值和所需证据，由评估活动应用于 Execution 的结果；它不存储完成事件、RunOutcome 或输出内容。
    en: A TaskCompletionCriterion is a TaskCondition distinguished by defining a completion predicate, acceptance threshold, and required evidence that an evaluation activity applies to an Execution's results. It does not store the completion event, RunOutcome, or output content.
    ja: TaskCompletionCriterion は TaskCondition の一種であり、完了述語、受入閾値、必要証拠を定義し、評価活動が Execution の結果へ適用します。完了イベント、RunOutcome、出力内容は保存しません。
  why_needed:
    zh: 显式完成标准防止“产生了输出”被误当成“任务成功”，并使重试、人工批准和评估结果可围绕同一验收条件闭环。
    en: An explicit completion criterion prevents 'produced output' from being mistaken for 'task succeeded' and gives retries, human approval, and evaluation a shared acceptance condition.
    ja: 明示的完了基準は「出力生成」を「成功」と誤認することを防ぎ、再試行、人手承認、評価に共通の受入条件を与えます。
  includes:
    - zh: 可判定完成谓词、阈值、必须提交的证据、容差和验收主体。
      en: A decidable completion predicate, threshold, required evidence, tolerance, and acceptance authority.
      ja: 判定可能な完了述語、閾値、必要証拠、許容差、受入主体。
  excludes:
    - zh: RunOutcome 的成功记录、生成的 Artifact，以及规定执行方式但不判定完成的 TaskConstraint。
      en: A successful RunOutcome record, a generated Artifact, and a TaskConstraint that governs execution without deciding completion.
      ja: 成功 RunOutcome 記録、生成 Artifact、実行方法を制約しても完了判定しない TaskConstraint。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels:
        zh: 判据语言
        en: criterion language
        ja: 基準言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明完成谓词所用的可执行表达式语言。
        en: Declares the executable expression language used by the completion predicate.
        ja: 完了述語が用いる実行可能な式言語を宣言します。
      allowed_values: []
      pattern: ^[a-z][a-z0-9._-]*$
      example_value: cel
      source_claims:
        - claim-task-completion-criterion-002
    - id: predicate_expression
      labels:
        zh: 完成谓词
        en: completion predicate
        ja: 完了述語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对结果证据求值并返回是否满足任务预期结果的无副作用布尔表达式。
        en: A side-effect-free Boolean expression evaluated over result evidence to decide whether the Task's desired outcome is satisfied.
        ja: 結果証拠を評価し、Task の望ましい結果が満たされたかを返す副作用のない真偽式です。
      allowed_values: []
      pattern: null
      example_value: tests.failed == 0 && static_analysis.high_severity == 0 && review.approved
      source_claims:
        - claim-task-completion-criterion-003
    - id: acceptance_threshold
      labels:
        zh: 验收阈值
        en: acceptance threshold
        ja: 受入閾値
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明数值阈值、容差与合取规则，使成功结论可被独立复算。
        en: Declares numeric thresholds, tolerances, and conjunction rules so the success judgment can be recomputed independently.
        ja: 数値閾値・許容差・論理結合を宣言し、成功判定を独立に再計算可能にします。
      allowed_values: []
      pattern: null
      example_value:
        failed_tests: 0
        high_severity_findings: 0
        reviewer_approval: true
      source_claims:
        - claim-task-completion-criterion-004
    - id: required_evidence_contract
      labels:
        zh: 完成证据合同
        en: completion-evidence contract
        ja: 完了証拠契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出完成判定所需证据类型、字段、完整性和版本要求。
        en: Lists the evidence types, fields, integrity, and version requirements needed for completion adjudication.
        ja: 完了判定に必要な証拠種別・項目・完全性・版要件を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        required:
          - UnitTestReport
          - StaticAnalysisReport
          - ReviewApproval
        bind_to: patch_digest
      source_claims:
        - claim-task-completion-criterion-005
    - id: acceptance_authority_ref
      labels:
        zh: 验收主体引用
        en: acceptance-authority reference
        ja: 受入主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用有权作出最终验收判定的评估器、策略或人工角色绑定。
        en: References the evaluator, policy, or human role binding authorized to make the final acceptance decision.
        ja: 最終受入判定を行う権限を持つ評価器・ポリシー・人間ロール束縛を参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:release-reviewer
      source_claims:
        - claim-task-completion-criterion-006
  constraints:
    - id: completion-criterion-evidence-bound
      severity: error
      expression_language: plain
      expression: predicate_expression references only required_evidence_contract fields and acceptance_threshold values
      explanations:
        zh: 完成判定必须能由声明证据复算，不能读取未记录的隐式上下文。
        en: Completion must be recomputable from declared evidence and must not read unrecorded implicit context.
        ja: 完了判定は宣言済み証拠から再計算でき、未記録の暗黙文脈を参照してはなりません。
      source_claims:
        - claim-task-completion-criterion-007
    - id: completion-criterion-not-observed-outcome
      severity: error
      expression_language: plain
      expression: the criterion stores no Execution status, RunOutcome identity, or produced artifact instance
      explanations:
        zh: 完成判据是可复用规范，不得把一次执行的成功状态或产物实例写入身份。
        en: A completion criterion is reusable normative knowledge and must not embed one Execution status or artifact instance in its identity.
        ja: 完了基準は再利用可能な規範であり、一回の Execution 状態や成果物インスタンスを同一性へ埋め込んではなりません。
      source_claims:
        - claim-task-completion-criterion-008
  required_relation_constraints:
    - id: completion-criterion-used-by-task
      direction: incoming
      predicate: has_completion_criterion
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个完成判据至少必须被一个稳定 Task 规范引用。
        en: Each completion criterion is referenced by at least one stable Task specification.
        ja: 各完了基準は少なくとも一つの安定した Task 仕様から参照されます。
      source_claims:
        - claim-task-completion-criterion-009
examples:
  - id: TaskCompletionCriterion-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务完成判据正例
      en: Positive example for task completion criterion
      ja: タスク完了基準の正例
    scenario_id: null
    descriptions:
      zh: criterion-8 规定：修复任务只有在指定单元测试全部通过、静态检查无高危问题且评审人批准补丁哈希时完成。
      en: criterion-8 states that the repair task is complete only when the named unit tests pass, static analysis reports no high-severity issue, and a reviewer approves the patch hash.
      ja: criterion-8 は、指定単体テストが合格し、静的解析に高重大度問題がなく、レビュー担当がパッチハッシュを承認した場合のみ修復タスク完了とします。
    field_values:
      condition_specification_id: task-condition-repair-acceptance
      evaluation_phase: completion
      unsatisfied_effect: reject_completion
      version: "2"
      expression_language: cel
      predicate_expression: tests.failed == 0 && static_analysis.high_severity == 0 && review.approved
      acceptance_threshold:
        failed_tests: 0
        high_severity_findings: 0
        reviewer_approval: true
      required_evidence_contract:
        required:
          - UnitTestReport
          - StaticAnalysisReport
          - ReviewApproval
        bind_to: patch_digest
      acceptance_authority_ref: ActorRoleBinding:release-reviewer
    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
      - EvaluationRun
    related_relation_ids:
      - TaskCompletionCriterion-is_a-TaskCondition
      - EvaluationRun-uses-TaskCompletionCriterion
    expected_result:
      zh: criterion-8 是 TaskCompletionCriterion，EvaluationRun 可用测试报告与批准记录判定。
      en: criterion-8 is a TaskCompletionCriterion that an EvaluationRun can assess from test reports and approval records.
      ja: criterion-8 は TaskCompletionCriterion であり、EvaluationRun がテスト報告と承認記録から判定できます。
    why_valid_or_invalid:
      zh: 完成谓词、阈值、证据类型和验收主体都明确，且没有把结果本身嵌入标准。
      en: The completion predicate, thresholds, evidence types, and acceptance authority are explicit without embedding the result itself in the criterion.
      ja: 完了述語、閾値、証拠種別、受入主体が明示され、結果自体を基準へ埋め込んでいません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-completion-criterion-010
  - id: TaskCompletionCriterion-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务完成判据边界例
      en: Boundary case for task completion criterion
      ja: タスク完了基準の境界例
    scenario_id: null
    descriptions:
      zh: run-19 的 RunOutcome 写着 succeeded，并附测试报告；它记录一次实际判定，没有定义未来运行必须满足的规则。
      en: RunOutcome for run-19 says succeeded and attaches a test report; it records one actual judgment but defines no rule future runs must satisfy.
      ja: run-19 の RunOutcome は succeeded とテスト報告を記録しますが、一回の判定であり将来実行の規則を定義しません。
    field_values:
      condition_specification_id: criterion-observed-run-status
      version: "1"
      expression_language: literal
      predicate_expression: run-19.status == 'succeeded'
      acceptance_threshold:
        copied_observed_status: succeeded
      required_evidence_contract:
        actual_run_outcome_id: run-outcome-19
      acceptance_authority_ref: Execution:run-19
    related_node_ids:
      - TaskCompletionCriterion
      - TaskCondition
    related_relation_ids:
      - TaskCompletionCriterion-is_a-TaskCondition
    expected_result:
      zh: 该对象是 RunOutcome，不是 TaskCompletionCriterion。
      en: The object is a RunOutcome, not a TaskCompletionCriterion.
      ja: このオブジェクトは RunOutcome であり TaskCompletionCriterion ではありません。
    why_valid_or_invalid:
      zh: 规范与规范应用结果具有不同身份；一次成功不能反向充当可复用完成标准。
      en: A specification and the result of applying it have different identities; one success cannot become the reusable completion criterion.
      ja: 仕様とその適用結果は異なる同一性を持ち、一回の成功を再利用可能な完了基準にはできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-completion-criterion-011
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaskConstraint
    shared_parent_concept_id: TaskCondition
    differentia:
      zh: 端点特定对照：父节点 TaskCondition：TaskCompletionCriterion（semantic kind=specification，骨架 TaskCompletionCriterion-is_a-TaskCondition）；TaskConstraint（semantic kind=specification，骨架 TaskConstraint-is_a-TaskCondition）。双端条件：TaskCompletionCriterion 条件：“任务完成判据是一种任务条件；其区分条件是：任务完成准则规定某类任务达到完成状态所需的可检验条件、阈值和证据要求；它由 EvaluationRun 应用，而不自行评估运行结局”；TaskConstraint 条件：“任务约束是一种任务条件；其区分条件是：它记录影响任务执行的规划限制，例如期限、预算、权限、能力、上下文、安全或依赖限制”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent TaskCondition: TaskCompletionCriterion (semantic kind=specification, backbone TaskCompletionCriterion-is_a-TaskCondition); TaskConstraint (semantic kind=specification, backbone TaskConstraint-is_a-TaskCondition). Endpoint conditions: TaskCompletionCriterion condition: “As a task condition, Task completion criterion is distinguished by the fact that it specifies testable conditions, thresholds, and evidence required for a task to be complete; EvaluationRun applies it rather than the criterion evaluating a run outcome itself”; TaskConstraint condition: “As a task condition, Task constraint is distinguished by the fact that it records a planning constraint such as deadline, budget, authority, capability, context, safety, or dependency limit that shapes task execution”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 TaskCondition：TaskCompletionCriterion（semantic kind=specification、バックボーン TaskCompletionCriterion-is_a-TaskCondition）；TaskConstraint（semantic kind=specification、バックボーン TaskConstraint-is_a-TaskCondition）。両端条件：TaskCompletionCriterion の条件：「タスク条件に属するタスク完了基準は、次の事実を種差とします：それはタスク完了に必要な検査可能条件、閾値、証拠要件を規定し、基準自体ではなく EvaluationRun が実行結果へ適用します」；TaskConstraint の条件：「タスク条件に属するタスク制約は、次の事実を種差とします：それは、期限、予算、権限、能力、文脈、安全、依存制限など、実行を形づくる計画上の制約を記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-task-completion-criterion-012
parent_relation:
  id: TaskCompletionCriterion-is_a-TaskCondition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TaskCompletionCriterion —is_a→ TaskCondition 表示完成标准是一种可判定任务条件，其专有种差是判断预期结果何时有足够证据被接受。
    en: TaskCompletionCriterion —is_a→ TaskCondition classifies a completion criterion as an evaluable task condition whose specific differentia is deciding when sufficient evidence supports acceptance of the desired outcome.
    ja: TaskCompletionCriterion —is_a→ TaskCondition は、望ましい結果を受け入れる十分な証拠がいつあるかを判定する種差を持つ、評価可能なタスク条件として完了基準を分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
