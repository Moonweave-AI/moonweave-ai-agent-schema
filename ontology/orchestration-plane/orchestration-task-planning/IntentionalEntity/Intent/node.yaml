      ja: commits to
    definitions:
      zh: Intent —commits_to→ Goal 表示主体以 Intent 明确采纳某个 Goal 作为行动承诺；该治理边不表示目标已完成，也不把目标降格为指令。
      en: Intent —commits_to→ Goal means that an actor explicitly adopts a Goal as an action commitment through an Intent; the governance edge neither asserts completion nor turns the Goal into an instruction.
      ja: Intent —commits_to→ Goal は、主体が Intent を通じて Goal を行動コミットメントとして明示採用することを示し、完了を主張せず Goal を指示へ変えません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: committed_to_by
      labels:
        zh: 反向：commits to
        en: committed to by
        ja: 逆方向：commits to
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Intent-commits_to-Goal-example-positive-manual-001
        kind: positive
        labels:
