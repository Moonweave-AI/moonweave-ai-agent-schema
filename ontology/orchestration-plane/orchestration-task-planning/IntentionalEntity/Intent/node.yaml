schema: moonweave.ai/ontology-node/v1
id: Intent
kind: concept
status: review
labels:
  zh: 行动意图
  en: intent
  ja: 行動意図
semantics:
  short_definition:
    zh: 行动意图是主体在给定范围内承诺追求某个 Goal 的意向实体。
    en: An intent is an actor's scoped commitment to pursue a Goal.
    ja: Intent は、指定範囲で Goal を追求する主体のコミットメントです。
  definition:
    zh: 行动意图是一种 IntentionalEntity，其种差是：它记录具名主体采纳某个 Goal 并承诺在权限、范围和有效期内采取行动；它不是自然语言分类标签、Goal 本身、TaskPlan 或一次 Execution。
    en: An Intent is an IntentionalEntity distinguished by recording that a named actor adopts a Goal and commits to act within stated authority, scope, and validity. It is not a natural-language classification label, the Goal itself, a TaskPlan, or an Execution.
    ja: Intent は IntentionalEntity の一種であり、名前付き主体が Goal を採用し、指定権限、範囲、有効期間内で行動することを約束した記録です。自然言語分類ラベル、Goal 自体、TaskPlan、Execution ではありません。
  why_needed:
    zh: 同一 Goal 可被不同主体以不同权限和时段采纳；显式 Intent 才能追踪谁真正承诺推进，而不从角色或消息内容猜测。
    en: Different actors may adopt the same Goal with different authority and timing; explicit Intent records who actually committed to pursue it instead of guessing from role names or message text.
    ja: 同じ Goal を異なる主体が異なる権限・時期で採用できるため、Intent を明示して誰が実際に推進を約束したかを記録します。
  includes:
    - zh: 承诺主体、所采纳 Goal、授权范围、承诺时间、有效期和撤销依据。
      en: Committing actor, adopted Goal, authority scope, commitment time, validity, and revocation basis.
      ja: コミット主体、採用 Goal、権限範囲、コミット時刻、有効期間、取消根拠。
  excludes:
    - zh: 用户话语的意图分类、没有主体承诺的 Goal、以及描述实现步骤的 TaskPlan。
      en: Intent classification of an utterance, a Goal with no actor commitment, and a TaskPlan describing implementation steps.
      ja: 発話の意図分類、主体コミットメントのない Goal、実現手順を記述する TaskPlan。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: adopting_actor_binding_ref
      labels:
        zh: 采纳者角色绑定引用
        en: adopting actor-role binding reference
        ja: 採用者役割 binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在特定范围和时间内采纳该行动承诺的 ActorRoleBinding，而不是只写抽象角色或 Agent 类别。
        en: References the ActorRoleBinding that adopts the action commitment for a specific scope and time rather than an abstract role or Agent class.
        ja: 抽象 role や Agent class ではなく、特定範囲・時刻に行動 commitment を採用する ActorRoleBinding を参照します。
      allowed_values: []
      pattern: null
      example_value: actor-role-binding-finance-agent-7
      source_claims:
        - claim-intent-002
    - id: commitment_scope
      labels:
        zh: 承诺范围
        en: commitment scope
        ja: コミットメント範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定采纳者承诺采取的行动类别、授权边界和免责项，不把目标本身当作已执行动作。
        en: Specifies action classes, authority limits, and exclusions the adopter commits to without treating the Goal itself as an executed action.
        ja: 採用者が約束する行動分類・権限境界・除外を規定し、Goal 自体を実行済み行動として扱いません。
      allowed_values: []
      pattern: null
      example_value:
        actions:
          - investigate
          - propose-correction
        excludes:
          - post-ledger-entry
      source_claims:
        - claim-intent-003
    - id: adopted_at
      labels:
        zh: 采纳时刻
        en: adopted at
        ja: 採用時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录角色绑定正式采纳该行动承诺的时刻，区别于 Goal 创建时间和首次 Execution 开始时间。
        en: Records when the actor-role binding formally adopts the commitment, distinct from Goal creation and the start of any first Execution.
        ja: role binding が commitment を正式採用する時刻を記録し、Goal 作成時刻や最初の Execution 開始時刻と区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:00:00Z
      source_claims:
        - claim-intent-004
  constraints: []
  required_relation_constraints:
    - id: intent-commits-to-goal
      direction: outgoing
      predicate: commits_to
      target_concept_id: Goal
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个已采纳 Intent 必须指向至少一个其承诺追求的 Goal；没有目标的动作偏好不构成此类 Intent。
        en: Every adopted Intent must point to at least one Goal it commits to pursue; an action preference with no desired Goal is not this Intent.
        ja: 採用済み Intent は追求を約束する Goal を少なくとも一つ指し、目標のない行動選好はこの Intent ではありません。
      source_claims:
        - claim-intent-005
examples:
  - id: Intent-example-positive-manual-001
    kind: positive
    labels:
      zh: 行动意图正例
      en: Positive example for intent
      ja: 行動意図の正例
    scenario_id: null
    descriptions:
      zh: 运营负责人在变更评审后签署 intent-27，采纳“降低许可等待时间”目标，权限限于线上流程，有效至季度末。
      en: After change review, the operations lead signs intent-27 adopting the Goal 'reduce permit wait time', limited to the online workflow and valid through quarter end.
      ja: 変更審査後、運用責任者が intent-27 に署名し、「許可待ち時間短縮」Goal を採用し、オンラインフローに限定して四半期末まで有効とします。
    field_values:
      intentional_entity_id: intentional-permit-wait-commitment
      revision: "1"
      desired_state: The online permit service reduces applicant waiting time without changing statutory review authority.
      subject_scope:
        organization_ref: municipal-permit-office
        service_ref: online-permits
      valid_from: 2026-07-02T10:30:00Z
      valid_until: 2026-09-30T23:59:59Z
      adopting_actor_binding_ref: actor-role-binding-permit-operations-lead
      commitment_scope:
        actions:
          - redesign-online-intake
          - prioritize-complete-applications
        excludes:
          - change-statutory-review
      adopted_at: 2026-07-02T10:30:00Z
    related_node_ids:
      - Intent
      - IntentionalEntity
      - Goal
    related_relation_ids:
      - Intent-is_a-IntentionalEntity
      - Intent-commits_to-Goal
    expected_result:
      zh: intent-27 是 Intent，并通过 commits_to 连接所采纳 Goal。
      en: intent-27 is an Intent and connects to the adopted Goal through commits_to.
      ja: intent-27 は Intent であり commits_to で採用 Goal に接続します。
    why_valid_or_invalid:
      zh: 具名主体、目标、权限范围、承诺时点和有效期均明确。
      en: Named actor, Goal, authority scope, commitment time, and validity are all explicit.
      ja: 名前付き主体、Goal、権限範囲、コミット時点、有効期間がすべて明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-intent-006
  - id: Intent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 行动意图边界例
      en: Boundary case for intent
      ja: 行動意図の境界例
    scenario_id: null
    descriptions:
      zh: NLU 模型把“帮我退款”分类为 refund_intent=0.93，但没有任何主体采纳目标或承诺执行。
      en: An NLU model classifies 'refund me' as refund_intent=0.93, but no actor adopts a Goal or commits to act.
      ja: NLU モデルが「返金して」を refund_intent=0.93 と分類しますが、主体は Goal を採用せず行動を約束していません。
    field_values: {}
    related_node_ids:
      - Intent
      - IntentionalEntity
    related_relation_ids:
      - Intent-is_a-IntentionalEntity
    expected_result:
      zh: 该分类结果不是本体中的 Intent。
      en: The classification output is not an Intent in this ontology.
      ja: この分類出力は本オントロジーの Intent ではありません。
    why_valid_or_invalid:
      zh: 预测标签缺少承诺主体、Goal、权限和有效期，不能建立行动承诺。
      en: The prediction lacks committing actor, Goal, authority, and validity and therefore cannot establish a commitment to act.
      ja: 予測ラベルはコミット主体、Goal、権限、有効期間を欠き、行動コミットメントを成立させません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-intent-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Objective
    shared_parent_concept_id: IntentionalEntity
    differentia:
      zh: 共享父节点对照：父节点 IntentionalEntity：Intent（semantic kind=specification，骨架 Intent-is_a-IntentionalEntity）；Objective（semantic kind=specification，骨架 Objective-is_a-IntentionalEntity）。双端条件：Intent 条件：“行动意图是一种由具名主体采纳、表达其愿意在一定范围和约束下为推进目标采取行动的意图性实体；它不等同于目标、计划或一次执行”；Objective 条件：“可度量目标是以如下事实为区分特征的意图性实体：可操作目标是从目标中导出的可度量单元，可被分配、检查，并通过任务、约束和完成准则追踪”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent IntentionalEntity: Intent (semantic kind=specification, backbone Intent-is_a-IntentionalEntity); Objective (semantic kind=specification, backbone Objective-is_a-IntentionalEntity). Endpoint conditions: Intent condition: “Intent is an intentional entity whose defining condition is that it is an itionalEntity adopted by a named actor that expresses commitment to act toward a goal within defined scope and constraints; it is not the goal, plan, or execution itself”; Objective condition: “Objective is an intentional entity; its differentiating condition is that it is an operational and measurable target derived from a goal that can be assigned, checked, and traced through tasks, constraints, and completion criteria”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 IntentionalEntity：Intent（semantic kind=specification、バックボーン Intent-is_a-IntentionalEntity）；Objective（semantic kind=specification、バックボーン Objective-is_a-IntentionalEntity）。両端条件：Intent の条件：「行動意図は意図的実体のうち、次の事実を定義条件とする対象です：Intent は記名主体が採用し、定義された範囲と制約内で目標へ向け行動する意思を表す IntentionalEntity であり、目標、計画、実行そのものではない」；Objective の条件：「測定可能目標は意図的実体の一種であり、次の条件で区別されます：操作可能な目的は目標から導かれる測定可能な単位であり、割り当て、確認、タスクや制約や完了基準による追跡ができます」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-intent-008
      - claim-intent-009
