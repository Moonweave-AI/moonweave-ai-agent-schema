    source: langgraph-graph-api
    supports: Intent boundary from adjacent orchestration concepts is supported by LangGraph Graph API separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Plan/Entity semantics; graph workflow composition; A2A Task boundary
    evidence_kind: official
    confidence: high
  - id: claim-intent-003
