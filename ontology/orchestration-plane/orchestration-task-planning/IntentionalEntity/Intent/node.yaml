    supports: Intent field or status vocabulary is a Moonweave audit projection informed by W3C PROV-O.
    locator: Plan/Entity semantics; graph workflow composition; A2A Task boundary
    evidence_kind: official
    confidence: high
  - id: claim-intent-004
    source: a2a-protocol-specification
    supports: Moonweave Intent constraints, examples, or local audit fields for claim claim-intent-004 are design projections informed by Agent2Agent (A2A) Protocol Specification.
    locator: Plan/Entity semantics; graph workflow composition; A2A Task boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-intent-005
    source: langgraph-graph-api
    supports: Moonweave Intent constraints, examples, or local audit fields for claim claim-intent-005 are design projections informed by LangGraph Graph API.
    locator: Plan/Entity semantics; graph workflow composition; A2A Task boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-intent-006
    source: prov-o
    supports: Moonweave Intent constraints, examples, or local audit fields for claim claim-intent-006 are design projections informed by W3C PROV-O.
    locator: Plan/Entity semantics; graph workflow composition; A2A Task boundary
