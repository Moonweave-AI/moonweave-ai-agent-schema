    en: Intent —is_a→ IntentionalEntity classifies Intent as an intentional entity identified by an actor's commitment to a course of action, distinct from a desired-state Goal and a measurable Objective.
    ja: Intent —is_a→ IntentionalEntity は、主体が行動方針へコミットすることで識別される意向実体として Intent を分類し、望ましい状態の Goal や測定可能な Objective と区別します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
