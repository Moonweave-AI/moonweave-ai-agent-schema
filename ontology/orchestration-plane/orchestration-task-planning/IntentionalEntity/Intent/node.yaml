          en: Positive example for commits to
          ja: commits toの正例
        scenario_id: null
        descriptions:
          zh: Intent‘本次发布遵守双人审批’明确承诺 Goal‘所有高风险发布均有两份批准证据’。
          en: Intent 'apply dual approval to this release' commits to Goal 'every high-risk release has two approval records'.
          ja: Intent『今回の公開に二者承認を適用する』は Goal『全高リスク公開に二件の承認記録がある』へコミットします。
        field_values: {}
