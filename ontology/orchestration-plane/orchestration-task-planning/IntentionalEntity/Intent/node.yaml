schema: moonweave.ai/ontology-node/v1
id: Intent
kind: concept
labels:
  zh: 行动意图
  en: intent
  ja: 行動意図
semantics:
  short_definition:
    zh: 行动意图是主体在给定范围内承诺追求某个 Goal 的意向实体。
    en: An intent is an actor's scoped commitment to pursue a Goal.
    ja: Intent は、指定範囲で Goal を追求する主体のコミットメントです。
  definition:
    zh: 行动意图是一种 IntentionalEntity，其种差是：它记录具名主体采纳某个 Goal 并承诺在权限、范围和有效期内采取行动；它不是自然语言分类标签、Goal 本身、TaskPlan 或一次 Execution。
    en: An Intent is an IntentionalEntity distinguished by recording that a named actor adopts a Goal and commits to act within stated authority, scope, and validity. It is not a natural-language classification label, the Goal itself, a TaskPlan, or an Execution.
    ja: Intent は IntentionalEntity の一種であり、名前付き主体が Goal を採用し、指定権限、範囲、有効期間内で行動することを約束した記録です。自然言語分類ラベル、Goal 自体、TaskPlan、Execution ではありません。
  why_needed:
    zh: 同一 Goal 可被不同主体以不同权限和时段采纳；显式 Intent 才能追踪谁真正承诺推进，而不从角色或消息内容猜测。
    en: Different actors may adopt the same Goal with different authority and timing; explicit Intent records who actually committed to pursue it instead of guessing from role names or message text.
    ja: 同じ Goal を異なる主体が異なる権限・時期で採用できるため、Intent を明示して誰が実際に推進を約束したかを記録します。
  includes:
    - zh: 承诺主体、所采纳 Goal、授权范围、承诺时间、有效期和撤销依据。
      en: Committing actor, adopted Goal, authority scope, commitment time, validity, and revocation basis.
      ja: コミット主体、採用 Goal、権限範囲、コミット時刻、有効期間、取消根拠。
  excludes:
    - zh: 用户话语的意图分类、没有主体承诺的 Goal、以及描述实现步骤的 TaskPlan。
      en: Intent classification of an utterance, a Goal with no actor commitment, and a TaskPlan describing implementation steps.
      ja: 発話の意図分類、主体コミットメントのない Goal、実現手順を記述する TaskPlan。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      Intent 记录谁承诺推进 Goal：授权服务在 Agents SDK Runner 启动前校验 adopting_actor_binding_ref 与
      authority_scope；LangGraph 入口节点可拒绝无有效 Intent 的规划请求。Intent 撤销只影响后续派发，不删除 Goal；
      A2A AgentCard 描述远程能力，不是本地 Intent 存储。
    en: >-
      Intent records who commits to pursue a Goal: an authorization service validates adopting_actor_binding_ref and
      authority_scope before Agents SDK Runner starts; a LangGraph entry node may reject planning requests without valid
      Intent. Intent revocation affects only future dispatch, not Goal deletion; an A2A AgentCard describes remote capability,
      not local Intent storage.
    ja: >-
      Intent は誰が Goal を推進すると約束したかを記録する。authorization service は Agents SDK Runner 開始前に
      adopting_actor_binding_ref と authority_scope を検証する。LangGraph entry node は valid Intent のない planning request
      を拒否できる。Intent 取消は将来 dispatch にのみ影響し Goal 削除ではない。A2A AgentCard は remote capability を記述し
      local Intent 保存ではない。
  typical_input:
    - description:
        zh: 具名主体对 Goal 的 scoped 行动承诺。
        en: A scoped action commitment by a named actor to a Goal.
        ja: named actor による Goal への scoped action commitment。
      format: |-
        {"intentional_entity_id":"intent:release-approval-2026-07","revision":"1","adopting_actor_binding_ref":"binding-release-manager-1","goal_ref":"goal:release-2026-07@1","authority_scope":"release:2026-07","valid_until":"2026-07-20T00:00:00Z"}
  typical_output:
    - description:
        zh: 规划或派发网关接受的 Intent 引用与校验结果。
        en: An Intent reference and validation result accepted by a planning or dispatch gateway.
        ja: planning または dispatch gateway が受理した Intent reference と validation result。
      format: |-
        {"intent_ref":"intent:release-approval-2026-07@1","authorization":"permitted","planning_allowed":true,"dispatch_allowed_until":"2026-07-20T00:00:00Z"}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner invocation gated by configured agent identity and scope.
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#Agent
      description: Associates activities with responsible agents analogous to adopting actor bindings.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote agent capability discovery distinct from local commitment records.
  source_claims:
    - claim-intent-003
    - claim-intent-006
structure:
  identity_keys: []
  fields:
    - id: adopting_actor_binding_ref
      labels:
        zh: 采纳者角色绑定引用
        en: adopting actor-role binding reference
        ja: 採用者役割 binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在特定范围和时间内采纳该行动承诺的 ActorRoleBinding，而不是只写抽象角色或 Agent 类别。
        en: References the ActorRoleBinding that adopts the action commitment for a specific scope and time rather than an abstract role or Agent class.
        ja: 抽象 role や Agent class ではなく、特定範囲・時刻に行動 commitment を採用する ActorRoleBinding を参照します。
      allowed_values: []
      pattern: null
      example_value: actor-role-binding-finance-agent-7
      source_claims:
        - claim-intent-002
    - id: commitment_scope
      labels:
        zh: 承诺范围
        en: commitment scope
        ja: コミットメント範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定采纳者承诺采取的行动类别、授权边界和免责项，不把目标本身当作已执行动作。
        en: Specifies action classes, authority limits, and exclusions the adopter commits to without treating the Goal itself as an executed action.
        ja: 採用者が約束する行動分類・権限境界・除外を規定し、Goal 自体を実行済み行動として扱いません。
      allowed_values: []
      pattern: null
      example_value:
        actions:
          - investigate
          - propose-correction
        excludes:
          - post-ledger-entry
      source_claims:
        - claim-intent-003
    - id: adopted_at
      labels:
        zh: 采纳时刻
        en: adopted at
        ja: 採用時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录角色绑定正式采纳该行动承诺的时刻，区别于 Goal 创建时间和首次 Execution 开始时间。
        en: Records when the actor-role binding formally adopts the commitment, distinct from Goal creation and the start of any first Execution.
        ja: role binding が commitment を正式採用する時刻を記録し、Goal 作成時刻や最初の Execution 開始時刻と区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:00:00Z
      source_claims:
        - claim-intent-004
  constraints: []
  required_relation_constraints:
    - id: intent-commits-to-goal
      direction: outgoing
      predicate: commits_to
      target_concept_id: Goal
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个已采纳 Intent 必须指向至少一个其承诺追求的 Goal；没有目标的动作偏好不构成此类 Intent。
        en: Every adopted Intent must point to at least one Goal it commits to pursue; an action preference with no desired Goal is not this Intent.
        ja: 採用済み Intent は追求を約束する Goal を少なくとも一つ指し、目標のない行動選好はこの Intent ではありません。
      source_claims:
        - claim-intent-005
examples:
  - id: Intent-example-positive-manual-001
    labels:
      zh: Intent positive
      en: Intent positive
      ja: Intent positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 Intent 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for Intent via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が Intent 多段推論を誘発；GSM8K 精度向上。
    field_values: {intentional_entity_id: intentional-permit-wait-commitment, revision: 1, desired_state: "The online permit service reduces applicant waiting time without changing statutory review authority."}

    related_node_ids:
      - Intent
      - IntentionalEntity
      - Goal
    related_relation_ids:
      - Intent-is_a-IntentionalEntity
      - Intent-commits_to-Goal
    source_claims:
      - claim-intent-006

  - id: Intent-example-boundary-manual-001
    labels:
      zh: Intent boundary
      en: Intent boundary
      ja: Intent boundary
    descriptions:
      zh: ReAct 轨迹中 Observation 是运行时环境反馈（如 Search 返回的 snippet），不是 Intent 规范身份字段；Moonweave 投影时保留 identity_keys，不以 wire JSON 覆盖规约。
      en: In ReAct trajectories Observation is runtime environment feedback (e.g. Search snippet), not Intent specification identity; Moonweave projection preserves identity_keys without wire JSON overwrite.
      ja: ReAct Observation は runtime feedback で Intent spec identity ではない；identity_keys 保持。
    field_values: {}

    related_node_ids:
      - Intent
      - IntentionalEntity
    related_relation_ids:
      - Intent-is_a-IntentionalEntity
    source_claims:
      - claim-intent-007

  - id: Intent-example-counterexample-confusable
    labels:
      zh: Intent counterexample
      en: Intent counterexample
      ja: Intent counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 Intent。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style Intent.
      ja: module dispatch なし直接回答は MRKL 式 Intent にならない。
    field_values: {intentional_entity_id: absent, intent_kind: absent, intent_label: billing}

    related_node_ids:
      - Intent
      - IntentionalEntity
      - RoutingDecision
      - Goal
    related_relation_ids: []
    source_claims:
      - claim-intent-006

  - id: Intent-example-instance-concrete
    labels:
      zh: Intent instance
      en: Intent instance
      ja: Intent instance
    descriptions:
      zh: ToT 实例：generate_thoughts(state, k=5) 返回 5 个候选 plan → evaluate 选 score 最高 → select(greedy) 写入 Intent 实例。
      en: ToT instance: generate_thoughts(state, k=5) yields 5 plan candidates → evaluate picks highest score → select(greedy) writes Intent instance.
      ja: ToT 实例 k=5 候補→evaluate→select が Intent 实例。
    field_values: {intentional_entity_id: intentional-permit-wait-commitment, revision: 1, desired_state: "The online permit service reduces applicant waiting time without changing statutory review authority."}

    related_node_ids:
      - Intent
      - IntentionalEntity
      - Goal
    related_relation_ids: []
    source_claims:
      - claim-intent-006

sources:
  - id: a2a-protocol-specification
    title: Agent2Agent (A2A) Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines A2A Task as a protocol work unit distinct from internal planning objects.
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Documents stateful graph planning, workflow nodes, and composition.
  - id: prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Separates Plan-like specifications from Activities and execution evidence.
