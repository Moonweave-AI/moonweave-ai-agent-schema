schema: moonweave.ai/ontology-node/v1
id: Intent
kind: concept
labels:
  zh: 行动意图
  en: intent
  ja: 行動意図
semantics:
  short_definition:
    zh: 具名主体在明确范围内承诺为实现 Goal 而采取行动的 IntentionalEntity。
    en: An IntentionalEntity where a named actor commits to act toward a Goal within explicit scope.
    ja: 記名主体が明示範囲内で Goal 達成のため行動を約束する IntentionalEntity です。
  definition:
    zh: Intent 是 IntentionalEntity 的特化，记录 adopting_actor_binding_ref、commitment_scope 与 adopted_at，表示主体采纳 Goal 并承诺在权限与有效期内行动。映射：OpenAI reasoning tokens 中检测并经主体采纳的 user intent；A2A 消息 intent 在创建 stateful Task 之前的 actor 承诺（非 NLU 标签本身）。它不是 Goal 本身、TaskPlan 或 Execution。
    en: Intent specializes IntentionalEntity with adopting_actor_binding_ref, commitment_scope, and adopted_at, recording that an actor adopts a Goal and commits to act within authority and validity. Maps to OpenAI reasoning-detected user intent once adopted by an actor, and A2A message intent as actor commitment before creating a stateful Task—not the NLU label itself. It is not the Goal, TaskPlan, or Execution.
    ja: Intent は adopting_actor_binding_ref・commitment_scope・adopted_at を持ち、主体が Goal を採用し行動を約束します。OpenAI reasoning intent detection の採用結果、A2A メッセージ intent の主体 commitment（NLU ラベル自体ではない）に写像されます。
  why_needed:
    zh: 同一 Goal 可被不同主体以不同权限和时段采纳；显式 Intent 追踪谁真正承诺推进，而不从角色名或消息文本猜测。
    en: Different actors may adopt the same Goal with different authority and timing; explicit Intent records who actually committed instead of inferring from roles or message text.
    ja: 同じ Goal を異なる主体が異なる権限・時期で採用できるため、Intent で実際の commitment を記録します。
  includes:
    - zh: 承诺主体、所采纳 Goal、授权范围、承诺时间、有效期和撤销依据。
      en: Committing actor, adopted Goal, authority scope, commitment time, validity, revocation basis.
      ja: コミット主体、採用 Goal、権限範囲、コミット時刻、有効期間、取消根拠。
  excludes:
    - zh: 用户话语的 NLU 分类、没有主体承诺的 Goal、描述实现步骤的 TaskPlan。
      en: NLU utterance classification, Goal without actor commitment, TaskPlan describing steps.
      ja: NLU 分類、主体 commitment のない Goal、TaskPlan。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: OpenAI o1/reasoning 模型输出的 intent detection 只在写入 adopting_actor_binding_ref 与 commits_to Goal 后才成为 Intent。A2A “map incoming-message intent to capability” 之前的 routing label 不是 Intent；创建 Task 后的 stateful 生命周期属于 Execution 对齐层。
    en: OpenAI reasoning intent detection becomes Intent only after recording adopting_actor_binding_ref and commits_to Goal. A2A routing labels before capability mapping are not Intent; post-Task stateful lifecycle aligns to Execution.
    ja: OpenAI reasoning intent detection は adopting_actor_binding_ref と commits_to Goal 記録後に Intent になります。
  typical_input:
    - description: OpenAI reasoning-detected user intent adopted by operations lead.
      format: |
        # Reasoning identifies refund assistance intent; actor formally adopts commitment
        intent_commitment(adopting_actor="ops-lead-7", goal="resolve-refund-case-204")
      source_claims: [claim-intent-openai]
  typical_output:
    - description: Intent linked to Goal through commits_to.
      format: |
        {
          "intentional_entity_id": "intentional-permit-wait-commitment",
          "adopting_actor_binding_ref": "binding-permit-operations-lead",
          "commits_to": "intentional-permit-cycle-time"
        }
      source_claims: [claim-intent-design]
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Reasoning-time intent detection and commitment.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message intent before stateful Task creation.
structure:
  identity_keys: []
  fields:
    - id: adopting_actor_binding_ref
      labels:
        zh: 采纳者角色绑定引用
        en: adopting actor-role binding reference
        ja: 採用者役割 binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用采纳该行动承诺的有效 ActorRoleBinding。
        en: References the ActorRoleBinding adopting the action commitment.
        ja: 行動 commitment を採用する ActorRoleBinding を参照します。
      example_value: actor-role-binding-finance-agent-7
      source_claims: [claim-intent-design]
    - id: commitment_scope
      labels:
        zh: 承诺范围
        en: commitment scope
        ja: コミットメント範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定采纳者承诺采取的行动类别、授权边界和免责项。
        en: Action classes, authority limits, and exclusions the adopter commits to.
        ja: 採用者が約束する行動分類・権限境界・除外。
      example_value:
        actions: [investigate, propose-correction]
        excludes: [post-ledger-entry]
      source_claims: [claim-intent-a2a]
    - id: adopted_at
      labels:
        zh: 采纳时刻
        en: adopted at
        ja: 採用時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 角色绑定正式采纳该行动承诺的时刻。
        en: When the role binding formally adopts the commitment.
        ja: role binding が commitment を正式採用する時刻。
      example_value: 2026-07-16T09:00:00Z
      source_claims: [claim-intent-design]
  constraints: []
  required_relation_constraints:
    - id: intent-commits-to-goal
      direction: outgoing
      predicate: commits_to
      target_concept_id: Goal
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个已采纳 Intent 必须指向至少一个其承诺追求的 Goal。
        en: Every adopted Intent must point to at least one Goal it commits to pursue.
        ja: 採用済み Intent は pursuit を約束する Goal を少なくとも一つ指します。
      source_claims: [claim-intent-design]
examples:
  - id: Intent-operations-commitment
    labels:
      zh: 运营负责人签署承诺
      en: Operations lead signs commitment
      ja: 運用責任者が commitment 署名
    descriptions:
      zh: 变更评审后运营负责人签署 intent-27，采纳缩短许可等待时间的 Goal，权限限于线上流程。
      en: After change review the operations lead signs intent-27 adopting the permit-wait Goal limited to the online workflow.
      ja: 変更審査後、運用責任者が intent-27 に署名し、オンラインフロー限定で許可待ち Goal を採用します。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: actor commitment
    field_values:
      adopting_actor_binding_ref: binding-permit-operations-lead
      adopted_at: 2026-07-02T10:30:00Z
    related_node_ids: [Intent, Goal]
    related_relation_ids: [Intent-commits_to-Goal]
    source_claims: [claim-intent-design]
  - id: Intent-openai-reasoning
    labels:
      zh: OpenAI reasoning intent 采纳
      en: OpenAI reasoning intent adoption
      ja: OpenAI reasoning intent 採用
    descriptions:
      zh: reasoning 模型识别用户希望“优先保护隐私即使降低召回”，主体在 run 开始时正式采纳为 Intent。
      en: Reasoning detects the user wants privacy prioritized even if recall drops; the actor formally adopts this as Intent at run start.
      ja: reasoning がプライバシー優先 intent を検出し、主体が run 開始時に Intent として正式採用します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: reasoning intent detection
    field_values:
      commitment_scope:
        actions: [apply-privacy-policy]
    related_node_ids: [Intent, IntentionalEntity]
    related_relation_ids: [Intent-is_a-IntentionalEntity]
    source_claims: [claim-intent-openai]
  - id: Intent-boundary-nlu
    labels:
      zh: NLU 分类不是 Intent
      en: NLU classification is not Intent
      ja: NLU 分類は Intent ではない
    descriptions:
      zh: NLU 把“帮我退款”分类为 refund_intent=0.93，但没有主体采纳 Goal 或承诺行动。
      en: NLU classifies 'refund me' as refund_intent=0.93 without actor Goal adoption or commitment to act.
      ja: NLU が refund_intent=0.93 と分類するだけで、主体 adoption/commitment がありません。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: message intent mapping
    field_values: {}
    related_node_ids: [Intent]
    related_relation_ids: []
    source_claims: [claim-intent-a2a]
parent_relation:
  id: Intent-is_a-IntentionalEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Intent 以主体对行动方向的承诺为身份的 IntentionalEntity 特化。
    en: Intent is an IntentionalEntity identified by an actor's commitment to a course of action.
    ja: Intent は主体の行動方針 commitment で識別される IntentionalEntity 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-intent-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Intent-commits_to-Goal
    predicate: commits_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 承诺追求目标
      en: commits to
      ja: 目標へコミット
    definitions:
      zh: 主体通过 Intent 明确采纳 Goal 作为行动承诺；不表示 Goal 已完成。
      en: An actor explicitly adopts a Goal as an action commitment through Intent without asserting completion.
      ja: Intent を通じ Goal を行動 commitment として明示採用し、完了は主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: committed_to_by
      labels:
        zh: 反向：承诺追求目标
        en: committed to by
        ja: 逆方向：目標へコミット
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-intent-design]
    layout_role: cross-link
    target: concept:Goal
sources:
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Reasoning intent detection versus commitment.
  - id: a2a-spec
    title: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-doc
    relevance: Message intent before Task creation.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Intent versus NLU label boundary.
source_claims:
  - id: claim-intent-openai
    source: openai-agents
    supports: OpenAI reasoning can detect user intent, but Moonweave Intent requires formal actor adoption and Goal linkage.
    locator: Agent orchestration and reasoning
    evidence_kind: design-inference
    confidence: medium
  - id: claim-intent-a2a
    source: a2a-spec
    supports: A2A maps incoming message intent to capabilities before creating a stateful Task; actor commitment is distinct from the routing label.
    locator: Life of a Task
    evidence_kind: official
    confidence: high
  - id: claim-intent-design
    source: moonweave-design
    supports: Moonweave uses Intent for actor-specific commitment to pursue an adopted Goal.
    locator: Intent concept boundary
    evidence_kind: design-inference
    confidence: high
