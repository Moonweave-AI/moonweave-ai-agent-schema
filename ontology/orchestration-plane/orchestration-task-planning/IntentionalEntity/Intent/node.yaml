        zh: ‘在本轮中优先保护用户隐私，即使降低召回率’表达了明确的行动取向承诺。
        en: "'Protect user privacy in this run even if recall decreases' expresses an explicit commitment to a course of action."
        ja: 『今回の実行では再現率が下がっても利用者のプライバシーを優先する』は明示的な行動方針へのコミットメントです。
      field_values: {}
