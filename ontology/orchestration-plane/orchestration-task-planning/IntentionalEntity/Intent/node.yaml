        en: Classify the object as Intent and through is_a as IntentionalEntity.
        ja: この対象を Intent とし、is_a により IntentionalEntity に分類します。
      why_valid_or_invalid:
        zh: 其核心是主体采纳行动取向，而不是目标阈值或执行步骤。
        en: Its core is an actor adopting an action orientation rather than a target threshold or execution step.
        ja: 中心が目標閾値や実行ステップではなく、主体による行動方針の採用だからです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-intent-010
    - id: Intent-is_a-IntentionalEntity-example-boundary-manual-001
      kind: boundary
