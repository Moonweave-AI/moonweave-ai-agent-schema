schema: moonweave.ai/ontology-node/v1
id: Objective
kind: concept
labels:
  zh: 可度量目标
  en: objective
  ja: 測定可能目標
semantics:
  short_definition:
    zh: 具体目标是把 Goal 细化为可测量、可验收目标的意向实体。
    en: An objective refines a Goal into a measurable, assessable target.
    ja: Objective は Goal を測定・判定可能な目標へ詳細化する意向的エンティティです。
  definition:
    zh: 具体目标是一种 IntentionalEntity，其种差是：它规定目标变量、基线或参考点、期望阈值、适用范围和期限，使 EvaluationRun 能判定是否达到；它仍是期望状态，不是执行它的 Task 或观测到的 Measurement。
    en: An Objective is an IntentionalEntity distinguished by specifying a target variable, baseline or reference point, desired threshold, scope, and deadline so an EvaluationRun can determine attainment. It remains a desired state, not the Task that pursues it or the Measurement that observes it.
    ja: Objective は IntentionalEntity の一種であり、対象変数、基準値または参照点、期待閾値、範囲、期限を定め、EvaluationRun が達成を判定できるようにします。追求する Task や観測 Measurement ではなく望ましい状態です。
  why_needed:
    zh: 可测量目标把方向性 Goal 转化为可审计验收点，使计划、任务、指标和结果可沿同一目标链对齐。
    en: A measurable objective turns a directional Goal into an auditable acceptance point, aligning plans, tasks, metrics, and results along one intention chain.
    ja: 測定可能な Objective は方向的 Goal を監査可能な受入点へ変換し、計画、タスク、指標、結果を同じ意向連鎖に整列させます。
  includes:
    - zh: 目标变量、基线、阈值、适用群体或范围、截止时间和验收指标。
      en: Target variable, baseline, threshold, applicable population or scope, deadline, and assessment metric.
      ja: 対象変数、基準値、閾値、対象集団・範囲、期限、評価指標。
  excludes:
    - zh: 没有衡量条件的 Goal、描述动作的 Task，以及某次观测数值 Measurement。
      en: A Goal without measurement conditions, a Task describing work, and an observed Measurement value.
      ja: 測定条件のない Goal、作業を記述する Task、観測値の Measurement。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      Objective 的 metric_ref 与 threshold 供 EvaluationRun 或 OpenAI Agent Evals 判据使用；规划器把它们写入
      TaskCompletionCriterion 与 TaskPlan planning_basis。LangGraph 条件边可引用 objective 阈值做路由，但阈值本身
      保存在规范 revision；A2A Task status 或 Responses API 分数是观测值，不能覆盖 Objective 定义。
    en: >-
      Objective metric_ref and threshold feed EvaluationRun or OpenAI Agent Evals criteria; a planner writes them into
      TaskCompletionCriterion and TaskPlan planning_basis. LangGraph conditional edges may reference objective thresholds for
      routing, but thresholds remain in specification revision; A2A Task status or Responses API scores are observations that
      must not overwrite Objective definitions.
    ja: >-
      Objective の metric_ref と threshold は EvaluationRun または OpenAI Agent Evals criteria に供給される。planner は
      TaskCompletionCriterion と TaskPlan planning_basis に書き込む。LangGraph conditional edge は routing に objective
      threshold を参照できるが、threshold 自体は specification revision に残る。A2A Task status や Responses API score は
      観測値であり Objective 定義を上書きしてはならない。
  typical_input:
    - description:
        zh: 从 Goal 细化的可测量目标与截止条件。
        en: A measurable target and deadline refined from a Goal.
        ja: Goal から詳細化された measurable target と deadline。
      format: |-
        {"intentional_entity_id":"objective:zero-diff@1","revision":"1","goal_ref":"goal:release-2026-07@1","metric_ref":"metric:unexplained-differences","baseline":0,"threshold":0,"deadline":"2026-07-16T18:00:00Z"}
  typical_output:
    - description:
        zh: 绑定 Objective 的完成判据与评估配置引用。
        en: Completion-criterion and evaluation-config references bound to an Objective.
        ja: Objective に bound された completion-criterion と evaluation-config reference。
      format: |-
        {"completion_criterion_ref":"criterion:zero-unexplained-differences@4","evaluation_config":{"metric_ref":"metric:unexplained-differences","threshold":0},"objective_ref":"objective:zero-diff@1"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents evaluating agent outputs against declared metrics and thresholds.
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing on state predicates derived from objective thresholds at runtime.
    - name: W3C PROV-O Entity
      url: https://www.w3.org/TR/prov-o/#Entity
      description: Separates intended measurable targets from generated entities observed at runtime.
  source_claims:
    - claim-objective-010
    - claim-objective-016
structure:
  identity_keys: []
  fields:
    - id: metric_ref
      labels:
        zh: 指标引用
        en: metric reference
        ja: 指標参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用用于测量目标变量的版本化指标定义，使评价运行可复算而不依赖自然语言近似。
        en: References the versioned metric definition used to measure the objective variable so evaluation can be recomputed without natural-language approximation.
        ja: 目標変数を測定する版付き metric 定義を参照し、自然言語近似なしで evaluation を再計算可能にします。
      allowed_values: []
      pattern: null
      example_value: metric-unexplained-ledger-differences@2
      source_claims:
        - claim-objective-002
    - id: comparison_operator
      labels:
        zh: 比较算子
        en: comparison operator
        ja: 比較演算子
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定测量值与目标值之间的达成关系，避免只有数字却无法判定达到与否。
        en: Specifies the satisfaction relation between measured and target values so a number alone cannot be mistaken for an achieved objective.
        ja: 測定値と目標値の達成関係を規定し、数値だけで達成と誤判定しません。
      allowed_values:
        - id: ObjectiveComparisonEqual
          value: eq
          labels:
            zh: 等于
            en: equal
            ja: 等しい
          definitions:
            zh: 测量值与目标值相等时达成。
            en: Satisfied when the measured value equals the target value.
            ja: 測定値が目標値と等しい場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-003
        - id: ObjectiveComparisonNotEqual
          value: neq
          labels:
            zh: 不等于
            en: not equal
            ja: 等しくない
          definitions:
            zh: 测量值与禁用或基准值不相等时达成。
            en: Satisfied when the measured value differs from the excluded or baseline value.
            ja: 測定値が除外値・基準値と異なる場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-004
        - id: ObjectiveComparisonLessThan
          value: lt
          labels:
            zh: 小于
            en: less than
            ja: 未満
          definitions:
            zh: 测量值严格小于目标上界时达成。
            en: Satisfied when the measured value is strictly below the target bound.
            ja: 測定値が目標上限を厳密に下回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-005
        - id: ObjectiveComparisonLessThanOrEqual
          value: lte
          labels:
            zh: 小于等于
            en: less than or equal
            ja: 以下
          definitions:
            zh: 测量值不超过目标上界时达成。
            en: Satisfied when the measured value does not exceed the target bound.
            ja: 測定値が目標上限を超えない場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-006
        - id: ObjectiveComparisonGreaterThan
          value: gt
          labels:
            zh: 大于
            en: greater than
            ja: 超過
          definitions:
            zh: 测量值严格大于目标下界时达成。
            en: Satisfied when the measured value is strictly above the target bound.
            ja: 測定値が目標下限を厳密に上回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-007
        - id: ObjectiveComparisonGreaterThanOrEqual
          value: gte
          labels:
            zh: 大于等于
            en: greater than or equal
            ja: 以上
          definitions:
            zh: 测量值达到或超过目标下界时达成。
            en: Satisfied when the measured value reaches or exceeds the target bound.
            ja: 測定値が目標下限に達するか上回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-008
        - id: ObjectiveComparisonWithinRange
          value: within-range
          labels:
            zh: 位于区间
            en: within range
            ja: 範囲内
          definitions:
            zh: 测量值同时满足明确的下界、上界及端点包含规则时达成。
            en: Satisfied when the measured value meets explicit lower and upper bounds together with their endpoint-inclusion rule.
            ja: 測定値が明示された下限・上限・端点包含規則を同時に満たす場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-009
      pattern: null
      example_value: eq
      source_claims:
        - claim-objective-010
    - id: target_value
      labels:
        zh: 目标值
        en: target value
        ja: 目標値
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录与指标数据类型一致的期望阈值或区间，不保存评价运行实际测得的数值。
        en: Records the expected threshold or range using the metric's datatype without storing the value actually observed by an evaluation run.
        ja: metric のデータ型に合う期待閾値または範囲を記録し、evaluation run の実測値は保存しません。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-objective-011
    - id: baseline_value
      labels:
        zh: 基线值
        en: baseline value
        ja: 基準値
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录制定 Objective 时可比的起始值；缺失表示没有可验证基线，而不是默认为零。
        en: Records a comparable starting value available when the Objective is specified; absence means no verified baseline, not an implicit zero.
        ja: Objective 定義時の比較可能な開始値を記録し、未設定は暗黙のゼロではなく検証済み基準なしを表します。
      allowed_values: []
      pattern: null
      example_value: 37
      source_claims:
        - claim-objective-012
    - id: evaluation_scope
      labels:
        zh: 评价范围
        en: evaluation scope
        ja: 評価範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定计算指标时纳入的数据集、对象集合、时间窗和排除项，使同一指标不会在不同分母上误判。
        en: Delimits datasets, object populations, time windows, and exclusions used to compute the metric so different denominators cannot masquerade as the same objective.
        ja: metric 計算に含む dataset・object population・time window・exclusion を定め、異なる分母を同じ objective と誤認しません。
      allowed_values: []
      pattern: null
      example_value:
        ledger_ref: ledger-q2@final
        region: EMEA
        exclude:
          - pending-appeal
      source_claims:
        - claim-objective-013
    - id: deadline
      labels:
        zh: 达成期限
        en: achievement deadline
        ja: 達成期限
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定目标值最迟必须成立的时间；它约束期望状态，不等于某次 Task 执行的调度结束时间。
        en: Specifies when the target condition must be true at the latest; it constrains the desired state rather than a particular Task execution schedule.
        ja: 目標条件が最遅で成立すべき時刻を規定し、特定 Task execution の予定終了時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-09-30T23:59:59Z
      source_claims:
        - claim-objective-014
  constraints:
    - id: objective-target-is-evaluable
      severity: error
      expression_language: plain
      expression: metric_ref resolves and target_value is compatible with the metric datatype and comparison_operator
      explanations:
        zh: 目标指标、算子和值必须能够组成可复算判据。
        en: Metric, operator, and target value must form a recomputable satisfaction test.
        ja: metric・operator・target value は再計算可能な達成判定を構成しなければなりません。
      source_claims:
        - claim-objective-015
  required_relation_constraints: []
examples:
  - id: Objective-example-positive-manual-001
    labels:
      zh: Objective positive
      en: Objective positive
      ja: Objective positive
    descriptions:
      zh: Voyager (Wang et al., 2023) 对 Objective 实现自动课程→技能生成→技能库：curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill)；Minecraft 中持续积累可复用 JavaScript 技能。
      en: Voyager (Wang et al., 2023) for Objective: curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill); accumulates reusable JavaScript skills in Minecraft.
      ja: Voyager (Wang et al., 2023) Objective: propose_task→code_generation→skill_library.add；Minecraft 技能蓄積。
    field_values: {intentional_entity_id: intentional-permit-median-three-days, revision: 2, desired_state: "The median processing time for complete online permit applications is no more than three days."}

    related_node_ids:
      - Objective
      - IntentionalEntity
      - Goal
      - TaskPlan
    related_relation_ids:
      - Objective-is_a-IntentionalEntity
      - Goal-refined_into-Objective
      - Objective-realized_by-TaskPlan
    source_claims:
      - claim-objective-016

  - id: Objective-example-boundary-manual-001
    labels:
      zh: Objective boundary
      en: Objective boundary
      ja: Objective boundary
    descriptions:
      zh: ToT 评估分数是运行时 heuristic/LLM 评分，不是 Objective 静态规范；BranchCondition 规约与 evaluate() 运行时结果应分离。
      en: ToT evaluation scores are runtime heuristic/LLM ratings, not Objective static spec; separate BranchCondition specification from evaluate() runtime results.
      ja: ToT 評価スコアは runtime で Objective 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - Objective
      - IntentionalEntity
    related_relation_ids:
      - Objective-is_a-IntentionalEntity
    source_claims:
      - claim-objective-017

  - id: Objective-example-counterexample-confusable
    labels:
      zh: Objective counterexample
      en: Objective counterexample
      ja: Objective counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 Objective TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style Objective TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 Objective ではない。
    field_values: {objective_id: absent, threshold: absent, deadline: absent, desired_state: "reduce readmissions"}

    related_node_ids:
      - Objective
      - Goal
      - IntentionalEntity
      - TaskPlan
    related_relation_ids: []
    source_claims:
      - claim-objective-016

  - id: Objective-example-instance-concrete
    labels:
      zh: Objective instance
      en: Objective instance
      ja: Objective instance
    descriptions:
      zh: CoT 实例 prompt："Q: Roger has 5 tennis balls... A: Let's think step by step." → 逐步算术推理 → 映射 Objective。
      en: CoT instance: "Q: Roger has 5 tennis balls... A: Let's think step by step." → stepwise arithmetic → maps to Objective.
      ja: CoT 实例 step-by-step 算術推論が Objective に写像。
    field_values: {intentional_entity_id: intentional-permit-median-three-days, revision: 2, desired_state: "The median processing time for complete online permit applications is no more than three days."}

    related_node_ids:
      - Objective
      - IntentionalEntity
      - Goal
      - TaskPlan
    related_relation_ids: []
    source_claims:
      - claim-objective-016

