schema: moonweave.ai/ontology-node/v1
id: Objective
kind: concept
labels:
  zh: 可度量目标
  en: objective
  ja: 測定可能目標
semantics:
  short_definition:
    zh: 把 Goal 细化为带指标、阈值、范围与期限的可验收 IntentionalEntity。
    en: An IntentionalEntity refining a Goal with metric, threshold, scope, and deadline for acceptance testing.
    ja: Goal を指標・閾値・範囲・期限付きで受入検査可能に細化した IntentionalEntity です。
  definition:
    zh: Objective 是 IntentionalEntity 的特化，规定 metric_ref、comparison_operator、target_value、evaluation_scope 与 deadline，使 EvaluationRun 能判定是否达到。CrewAI Task 的 expected_output 在可度量时可对齐 Objective；它仍是期望状态，不是 Task 或 Measurement。
    en: Objective specializes IntentionalEntity with metric_ref, comparison_operator, target_value, evaluation_scope, and deadline so EvaluationRun can determine attainment. CrewAI Task expected_output may align when measurable. It remains a desired state, not a Task or Measurement.
    ja: Objective は metric_ref・comparison_operator・target_value・evaluation_scope・deadline を持ち EvaluationRun で達成判定可能な IntentionalEntity 特化です。CrewAI Task expected_output と整合可能です。
  why_needed:
    zh: 可测量目标把方向性 Goal 转化为可审计验收点，使计划、任务、指标和结果沿同一意向链对齐。
    en: Measurable objectives turn directional Goals into auditable acceptance points aligning plans, tasks, metrics, and results.
    ja: 測定可能 Objective は方向的 Goal を監査可能な受入点へ変換し、計画/タスク/指標/結果を整列させます。
  includes:
    - zh: 目标变量、基线、阈值、适用群体或范围、截止时间和验收指标。
      en: Target variable, baseline, threshold, population or scope, deadline, assessment metric.
      ja: 対象変数、基準値、閾値、対象集団/範囲、期限、評価指標。
  excludes:
    - zh: 没有衡量条件的 Goal、描述动作的 Task、某次观测数值 Measurement。
      en: Goal without measurement conditions, Task describing work, observed Measurement value.
      ja: 測定条件のない Goal、Task、Measurement 観測値。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 将 CrewAI Task.expected_output 中可量化部分投影为 Objective；LangGraph 图级 success criteria 也可引用 Objective。EvaluationRun 读取 Measurement 与 Objective 比较，但 Objective 本身不存储观测值。
    en: Project quantifiable CrewAI Task.expected_output to Objective; LangGraph graph-level success criteria may reference Objective. EvaluationRun compares Measurement to Objective without storing observed values on Objective.
    ja: CrewAI Task.expected_output の定量化部分を Objective に写像し、EvaluationRun が Measurement と比較します。
  typical_input:
    - description: Goal refined into measurable objective.
      format: |
        Goal: reduce response risk
        Objective: human-review coverage for high-risk recommendations >= 100% by July
      source_claims: [claim-obj-design]
  typical_output:
    - description: Objective with metric and deadline.
      format: |
        {
          "metric_ref": "metric-permit-median-processing-days@2",
          "comparison_operator": "lte",
          "target_value": 3,
          "deadline": "2026-09-30T23:59:59Z"
        }
      source_claims: [claim-obj-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task expected_output as measurable success statement.
    - name: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      description: Objective-realized_by-TaskPlan linkage.
structure:
  identity_keys: []
  fields:
    - id: metric_ref
      labels:
        zh: 指标引用
        en: metric reference
        ja: 指標参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用测量目标变量的版本化指标定义。
        en: Versioned metric definition for the objective variable.
        ja: 目標変数を測定する版付き metric 定義。
      example_value: metric-unexplained-ledger-differences@2
      source_claims: [claim-obj-design]
    - id: comparison_operator
      labels:
        zh: 比较算子
        en: comparison operator
        ja: 比較演算子
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定测量值与目标值的达成关系。
        en: Satisfaction relation between measured and target values.
        ja: 測定値と目標値の達成関係。
      allowed_values:
        - {id: ObjectiveComparisonEqual, value: eq, labels: {zh: 等于, en: equal, ja: 等しい}, definitions: {zh: 相等时达成, en: Satisfied when equal, ja: 等しい場合に達成}, source_claims: [claim-obj-design]}
        - {id: ObjectiveComparisonLessThanOrEqual, value: lte, labels: {zh: 小于等于, en: less than or equal, ja: 以下}, definitions: {zh: 不超过上界, en: Does not exceed upper bound, ja: 上限を超えない}, source_claims: [claim-obj-crewai]}
        - {id: ObjectiveComparisonGreaterThanOrEqual, value: gte, labels: {zh: 大于等于, en: greater than or equal, ja: 以上}, definitions: {zh: 达到或超过下界, en: Reaches or exceeds lower bound, ja: 下限に達するか上回る}, source_claims: [claim-obj-design]}
      example_value: lte
      source_claims: [claim-obj-design]
    - id: target_value
      labels:
        zh: 目标值
        en: target value
        ja: 目標値
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与指标数据类型一致的期望阈值或区间，不存储实测值。
        en: Expected threshold or range matching metric datatype without storing observed values.
        ja: metric 型に合う期待閾値/範囲（実測値は保存しない）。
      example_value: 3
      source_claims: [claim-obj-design]
    - id: baseline_value
      labels:
        zh: 基线值
        en: baseline value
        ja: 基準値
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 制定 Objective 时可比的起始值；缺失不默认为零。
        en: Comparable starting value when specified; absence is not implicit zero.
        ja: 指定時の比較可能開始値；未設定は暗黙のゼロではない。
      example_value: 6.2
      source_claims: [claim-obj-design]
    - id: evaluation_scope
      labels:
        zh: 评价范围
        en: evaluation scope
        ja: 評価範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定计算指标时纳入的数据集、对象集合、时间窗和排除项。
        en: Datasets, populations, time windows, and exclusions for metric computation.
        ja: metric 計算に含む dataset/population/time window/exclusion。
      example_value:
        channel: online
        application_state: complete
        window: 2026-Q3
      source_claims: [claim-obj-design]
    - id: deadline
      labels:
        zh: 达成期限
        en: achievement deadline
        ja: 達成期限
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目标值最迟必须成立的时间；约束期望状态而非某次 Task 调度。
        en: Latest time the target condition must hold; constrains desired state not one Task schedule.
        ja: 目標条件が最遅で成立すべき時刻。
      example_value: 2026-09-30T23:59:59Z
      source_claims: [claim-obj-design]
  constraints:
    - id: objective-target-is-evaluable
      severity: error
      expression_language: plain
      expression: metric_ref resolves and target_value is compatible with the metric datatype and comparison_operator
      explanations:
        zh: 指标、算子和值必须组成可复算判据。
        en: Metric, operator, and target must form a recomputable test.
        ja: metric/operator/target が再計算可能な判定を構成します。
      source_claims: [claim-obj-design]
  required_relation_constraints: []
examples:
  - id: Objective-permit-median
    labels:
      zh: 许可处理中位数目标
      en: Permit median objective
      ja: 許可処理中央値 Objective
    descriptions:
      zh: 2026-09-30 前把完整线上申请的中位处理时间从 6.2 天降至不超过 3 天。
      en: By 2026-09-30 reduce median processing time for complete online applications from 6.2 to at most 3 days.
      ja: 2026-09-30 までに完全オンライン申請の中央処理時間を6.2日から3日以下へ。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: measurable objective
    field_values:
      comparison_operator: lte
      target_value: 3
      baseline_value: 6.2
    related_node_ids: [Objective, Goal, TaskPlan]
    related_relation_ids: [Objective-realized_by-TaskPlan, Goal-refined_into-Objective]
    source_claims: [claim-obj-design]
  - id: Objective-crewai-expected-output
    labels:
      zh: CrewAI expected_output 对齐
      en: CrewAI expected_output alignment
      ja: CrewAI expected_output 整合
    descriptions:
      zh: Task expected_output“零未解释差异的对账报告”在量化后可 refined 为 Objective 并链接 TaskCompletionCriterion。
      en: Task expected_output for a zero-unexplained-differences report may refine to Objective and link TaskCompletionCriterion when quantified.
      ja: Task expected_output が定量化されれば Objective と TaskCompletionCriterion にリンクできます。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Task expected_output
    field_values:
      metric_ref: metric-unexplained-differences@2
      target_value: 0
    related_node_ids: [Objective, Task]
    related_relation_ids: []
    source_claims: [claim-obj-crewai]
  - id: Objective-boundary-measurement
    labels:
      zh: 观测值不是 Objective
      en: Measurement is not Objective
      ja: Measurement は Objective ではない
    descriptions:
      zh: 监控记录本周中位处理时间 3.4 天，但没有期望阈值或期限。
      en: Monitoring records median 3.4 days this week but declares no desired threshold or deadline.
      ja: 監視が中央値3.4日を記録するだけで、期待閾値/期限がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: objective versus measurement
    field_values: {}
    related_node_ids: [Objective]
    related_relation_ids: []
    source_claims: [claim-obj-design]
parent_relation:
  id: Objective-is_a-IntentionalEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Objective 是以可验证目标状态、度量和阈值为身份的 IntentionalEntity 特化。
    en: Objective is an IntentionalEntity identified by verifiable target state, measure, and threshold.
    ja: Objective は検証可能な目標状態・指標・閾値で識別される IntentionalEntity 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-obj-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Objective-realized_by-TaskPlan
    predicate: realized_by
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由任务计划实现
      en: realized by
      ja: タスク計画により実現
    definitions:
      zh: TaskPlan 被指定为实现可度量 Objective 的规范路径；实际实现仍需执行证据满足 metric。
      en: TaskPlan is designated as the normative path to realize a measurable Objective; actual realization still requires execution evidence satisfying the metric.
      ja: TaskPlan が Objective 実現の規範経路として指定されます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_realized_by
      labels:
        zh: 反向：由任务计划实现
        en: is target of realized by
        ja: 逆方向：タスク計画により実現
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-obj-design]
    layout_role: cross-link
    target: concept:TaskPlan
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task expected_output as measurable success.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Objective refinement and realization boundaries.
source_claims:
  - id: claim-obj-crewai
    source: crewai
    supports: CrewAI task expected_output states testable success conditions that Moonweave can refine as Objective.
    locator: Concepts > Tasks
    evidence_kind: official
    confidence: high
  - id: claim-obj-design
    source: moonweave-design
    supports: Moonweave uses Objective for measurable desired-state refinement with explicit evaluation scope and deadline.
    locator: Objective concept boundary
    evidence_kind: design-inference
    confidence: high
