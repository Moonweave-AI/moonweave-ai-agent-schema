schema: moonweave.ai/ontology-node/v1
id: Objective
kind: concept
status: accepted
labels:
  zh: 可度量目标
  en: objective
  ja: 測定可能目標
semantics:
  short_definition:
    zh: 具体目标是把 Goal 细化为可测量、可验收目标的意向实体。
    en: An objective refines a Goal into a measurable, assessable target.
    ja: Objective は Goal を測定・判定可能な目標へ詳細化する意向的エンティティです。
  definition:
    zh: 具体目标是一种 IntentionalEntity，其种差是：它规定目标变量、基线或参考点、期望阈值、适用范围和期限，使 EvaluationRun 能判定是否达到；它仍是期望状态，不是执行它的 Task 或观测到的 Measurement。
    en: An Objective is an IntentionalEntity distinguished by specifying a target variable, baseline or reference point, desired threshold, scope, and deadline so an EvaluationRun can determine attainment. It remains a desired state, not the Task that pursues it or the Measurement that observes it.
    ja: Objective は IntentionalEntity の一種であり、対象変数、基準値または参照点、期待閾値、範囲、期限を定め、EvaluationRun が達成を判定できるようにします。追求する Task や観測 Measurement ではなく望ましい状態です。
  why_needed:
    zh: 可测量目标把方向性 Goal 转化为可审计验收点，使计划、任务、指标和结果可沿同一目标链对齐。
    en: A measurable objective turns a directional Goal into an auditable acceptance point, aligning plans, tasks, metrics, and results along one intention chain.
    ja: 測定可能な Objective は方向的 Goal を監査可能な受入点へ変換し、計画、タスク、指標、結果を同じ意向連鎖に整列させます。
  includes:
    - zh: 目标变量、基线、阈值、适用群体或范围、截止时间和验收指标。
      en: Target variable, baseline, threshold, applicable population or scope, deadline, and assessment metric.
      ja: 対象変数、基準値、閾値、対象集団・範囲、期限、評価指標。
  excludes:
    - zh: 没有衡量条件的 Goal、描述动作的 Task，以及某次观测数值 Measurement。
      en: A Goal without measurement conditions, a Task describing work, and an observed Measurement value.
      ja: 測定条件のない Goal、作業を記述する Task、観測値の Measurement。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: metric_ref
      labels:
        zh: 指标引用
        en: metric reference
        ja: 指標参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用用于测量目标变量的版本化指标定义，使评价运行可复算而不依赖自然语言近似。
        en: References the versioned metric definition used to measure the objective variable so evaluation can be recomputed without natural-language approximation.
        ja: 目標変数を測定する版付き metric 定義を参照し、自然言語近似なしで evaluation を再計算可能にします。
      allowed_values: []
      pattern: null
      example_value: metric-unexplained-ledger-differences@2
      source_claims:
        - claim-objective-002
    - id: comparison_operator
      labels:
        zh: 比较算子
        en: comparison operator
        ja: 比較演算子
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定测量值与目标值之间的达成关系，避免只有数字却无法判定达到与否。
        en: Specifies the satisfaction relation between measured and target values so a number alone cannot be mistaken for an achieved objective.
        ja: 測定値と目標値の達成関係を規定し、数値だけで達成と誤判定しません。
      allowed_values:
        - id: ObjectiveComparisonEqual
          value: eq
          labels:
            zh: 等于
            en: equal
            ja: 等しい
          definitions:
            zh: 测量值与目标值相等时达成。
            en: Satisfied when the measured value equals the target value.
            ja: 測定値が目標値と等しい場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-003
        - id: ObjectiveComparisonNotEqual
          value: neq
          labels:
            zh: 不等于
            en: not equal
            ja: 等しくない
          definitions:
            zh: 测量值与禁用或基准值不相等时达成。
            en: Satisfied when the measured value differs from the excluded or baseline value.
            ja: 測定値が除外値・基準値と異なる場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-004
        - id: ObjectiveComparisonLessThan
          value: lt
          labels:
            zh: 小于
            en: less than
            ja: 未満
          definitions:
            zh: 测量值严格小于目标上界时达成。
            en: Satisfied when the measured value is strictly below the target bound.
            ja: 測定値が目標上限を厳密に下回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-005
        - id: ObjectiveComparisonLessThanOrEqual
          value: lte
          labels:
            zh: 小于等于
            en: less than or equal
            ja: 以下
          definitions:
            zh: 测量值不超过目标上界时达成。
            en: Satisfied when the measured value does not exceed the target bound.
            ja: 測定値が目標上限を超えない場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-006
        - id: ObjectiveComparisonGreaterThan
          value: gt
          labels:
            zh: 大于
            en: greater than
            ja: 超過
          definitions:
            zh: 测量值严格大于目标下界时达成。
            en: Satisfied when the measured value is strictly above the target bound.
            ja: 測定値が目標下限を厳密に上回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-007
        - id: ObjectiveComparisonGreaterThanOrEqual
          value: gte
          labels:
            zh: 大于等于
            en: greater than or equal
            ja: 以上
          definitions:
            zh: 测量值达到或超过目标下界时达成。
            en: Satisfied when the measured value reaches or exceeds the target bound.
            ja: 測定値が目標下限に達するか上回る場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-008
        - id: ObjectiveComparisonWithinRange
          value: within-range
          labels:
            zh: 位于区间
            en: within range
            ja: 範囲内
          definitions:
            zh: 测量值同时满足明确的下界、上界及端点包含规则时达成。
            en: Satisfied when the measured value meets explicit lower and upper bounds together with their endpoint-inclusion rule.
            ja: 測定値が明示された下限・上限・端点包含規則を同時に満たす場合に達成します。
          status: accepted
          source_claims:
            - claim-objective-009
      pattern: null
      example_value: eq
      source_claims:
        - claim-objective-010
    - id: target_value
      labels:
        zh: 目标值
        en: target value
        ja: 目標値
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录与指标数据类型一致的期望阈值或区间，不保存评价运行实际测得的数值。
        en: Records the expected threshold or range using the metric's datatype without storing the value actually observed by an evaluation run.
        ja: metric のデータ型に合う期待閾値または範囲を記録し、evaluation run の実測値は保存しません。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-objective-011
    - id: baseline_value
      labels:
        zh: 基线值
        en: baseline value
        ja: 基準値
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录制定 Objective 时可比的起始值；缺失表示没有可验证基线，而不是默认为零。
        en: Records a comparable starting value available when the Objective is specified; absence means no verified baseline, not an implicit zero.
        ja: Objective 定義時の比較可能な開始値を記録し、未設定は暗黙のゼロではなく検証済み基準なしを表します。
      allowed_values: []
      pattern: null
      example_value: 37
      source_claims:
        - claim-objective-012
    - id: evaluation_scope
      labels:
        zh: 评价范围
        en: evaluation scope
        ja: 評価範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定计算指标时纳入的数据集、对象集合、时间窗和排除项，使同一指标不会在不同分母上误判。
        en: Delimits datasets, object populations, time windows, and exclusions used to compute the metric so different denominators cannot masquerade as the same objective.
        ja: metric 計算に含む dataset・object population・time window・exclusion を定め、異なる分母を同じ objective と誤認しません。
      allowed_values: []
      pattern: null
      example_value:
        ledger_ref: ledger-q2@final
        region: EMEA
        exclude:
          - pending-appeal
      source_claims:
        - claim-objective-013
    - id: deadline
      labels:
        zh: 达成期限
        en: achievement deadline
        ja: 達成期限
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定目标值最迟必须成立的时间；它约束期望状态，不等于某次 Task 执行的调度结束时间。
        en: Specifies when the target condition must be true at the latest; it constrains the desired state rather than a particular Task execution schedule.
        ja: 目標条件が最遅で成立すべき時刻を規定し、特定 Task execution の予定終了時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-09-30T23:59:59Z
      source_claims:
        - claim-objective-014
  constraints:
    - id: objective-target-is-evaluable
      severity: error
      expression_language: plain
      expression: metric_ref resolves and target_value is compatible with the metric datatype and comparison_operator
      explanations:
        zh: 目标指标、算子和值必须能够组成可复算判据。
        en: Metric, operator, and target value must form a recomputable satisfaction test.
        ja: metric・operator・target value は再計算可能な達成判定を構成しなければなりません。
      source_claims:
        - claim-objective-015
  required_relation_constraints: []
examples:
  - id: Objective-example-positive-manual-001
    kind: positive
    labels:
      zh: 可度量目标正例
      en: Positive example for objective
      ja: 測定可能目標の正例
    scenario_id: null
    descriptions:
      zh: 在 2026-09-30 前，把许可申请的中位处理时间从 6.2 天降至不超过 3 天，范围为线上完整申请。
      en: By 2026-09-30, reduce median permit-processing time from 6.2 days to at most 3 days for complete online applications.
      ja: 2026-09-30 までに、完全なオンライン申請の許可処理中央値を6.2日から3日以下へ短縮します。
    field_values:
      intentional_entity_id: intentional-permit-median-three-days
      revision: "2"
      desired_state: The median processing time for complete online permit applications is no more than three days.
      subject_scope:
        organization_ref: municipal-permit-office
        service_ref: online-permits
        application_state: complete
      valid_from: 2026-07-01T00:00:00Z
      valid_until: 2026-09-30T23:59:59Z
      metric_ref: metric-permit-median-processing-days@2
      comparison_operator: lte
      target_value: 3
      baseline_value: 6.2
      evaluation_scope:
        channel: online
        application_state: complete
        window: 2026-Q3
      deadline: 2026-09-30T23:59:59Z
    related_node_ids:
      - Objective
      - IntentionalEntity
      - Goal
      - TaskPlan
    related_relation_ids:
      - Objective-is_a-IntentionalEntity
      - Goal-refined_into-Objective
      - Objective-realized_by-TaskPlan
    expected_result:
      zh: 建立 Objective，并把它作为 Goal 的可测量细化和 TaskPlan 的实现目标。
      en: Create an Objective as the measurable refinement of the Goal and the target realized by a TaskPlan.
      ja: Goal の測定可能な詳細化かつ TaskPlan の実現対象として Objective を作成します。
    why_valid_or_invalid:
      zh: 变量、基线、阈值、范围和期限均明确，可由评估活动判定。
      en: Variable, baseline, threshold, scope, and deadline are explicit and can be assessed by an evaluation activity.
      ja: 変数、基準値、閾値、範囲、期限が明示され、評価活動で判定できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-objective-016
  - id: Objective-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 可度量目标边界例
      en: Boundary case for objective
      ja: 測定可能目標の境界例
    scenario_id: null
    descriptions:
      zh: 监控记录本周中位处理时间为 3.4 天，但没有声明期望阈值或期限。
      en: Monitoring records a median processing time of 3.4 days this week but declares no desired threshold or deadline.
      ja: 監視が今週の処理中央値3.4日を記録しますが、期待閾値や期限を宣言しません。
    field_values: {}
    related_node_ids:
      - Objective
      - IntentionalEntity
    related_relation_ids:
      - Objective-is_a-IntentionalEntity
    expected_result:
      zh: 该值是 Measurement，不是 Objective。
      en: The value is a Measurement, not an Objective.
      ja: この値は Measurement であり Objective ではありません。
    why_valid_or_invalid:
      zh: 观测事实说明现在发生了什么，不说明主体希望达到什么。
      en: An observation states what occurred, not what an actor intends to achieve.
      ja: 観測事実は何が起きたかを示し、主体が何を達成したいかは示しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-objective-017
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Goal
    shared_parent_concept_id: IntentionalEntity
    differentia:
      zh: 端点特定对照：父节点 IntentionalEntity：Objective（semantic kind=specification，骨架 Objective-is_a-IntentionalEntity）；Goal（semantic kind=specification，骨架 Goal-is_a-IntentionalEntity）。双端条件：Objective 条件：“可度量目标是以如下事实为区分特征的意图性实体：可操作目标是从目标中导出的可度量单元，可被分配、检查，并通过任务、约束和完成准则追踪”；Goal 条件：“目标是以如下事实为区分特征的意图性实体：它表示用户或系统希望达成的高层意图，是后续拆解为可操作它、任务和完成准则的起点”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent IntentionalEntity: Objective (semantic kind=specification, backbone Objective-is_a-IntentionalEntity); Goal (semantic kind=specification, backbone Goal-is_a-IntentionalEntity). Endpoint conditions: Objective condition: “Objective is an intentional entity; its differentiating condition is that it is an operational and measurable target derived from a goal that can be assigned, checked, and traced through tasks, constraints, and completion criteria”; Goal condition: “Goal is an intentional entity; its differentiating condition is that it is a high-level user or system intent that motivates an agent workflow before it is decomposed into operational objectives, tasks, or success criteria”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 IntentionalEntity：Objective（semantic kind=specification、バックボーン Objective-is_a-IntentionalEntity）；Goal（semantic kind=specification、バックボーン Goal-is_a-IntentionalEntity）。両端条件：Objective の条件：「測定可能目標は意図的実体の一種であり、次の条件で区別されます：操作可能な目的は目標から導かれる測定可能な単位であり、割り当て、確認、タスクや制約や完了基準による追跡ができます」；Goal の条件：「目標は意図的実体の一種であり、次の条件で区別されます：それは、利用者またはシステムが達成したい高位の意図であり、操作可能な目的、タスク、完了基準へ分解する出発点です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-objective-018
parent_relation:
  id: Objective-is_a-IntentionalEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Objective —is_a→ IntentionalEntity 表示 Objective 是以可验证目标状态、度量和阈值为身份的意向实体；它比 Goal 具体，但仍不是执行任务。
    en: Objective —is_a→ IntentionalEntity classifies Objective as an intentional entity identified by a verifiable target state, measure, and threshold; it is more specific than Goal but is still not executable work.
    ja: Objective —is_a→ IntentionalEntity は、検証可能な目標状態・指標・閾値で識別される意向実体として Objective を分類し、Goal より具体的でも実行作業ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Objective-is_a-IntentionalEntity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: Objective‘7 月内将高风险调用人工审批覆盖率提升到 100%’包含对象、期限、度量和阈值。
        en: Objective 'raise human-approval coverage of high-risk calls to 100% by July' includes population, deadline, measure, and threshold.
        ja: Objective『7月中に高リスク呼出しの人手承認率を100%へ』は対象・期限・指標・閾値を含みます。
      field_values: {}
      related_node_ids:
        - Objective
        - IntentionalEntity
      related_relation_ids:
        - Objective-is_a-IntentionalEntity
      expected_result:
        zh: 该对象通过 is_a 归入 IntentionalEntity，同时保持 Objective 类型。
        en: Classify it through is_a as IntentionalEntity while retaining Objective type.
        ja: is_a により IntentionalEntity に分類し、Objective 型を保持します。
      why_valid_or_invalid:
        zh: 它规定可检验的期望状态，但没有规定实现它的任务动作。
        en: It specifies a testable desired state but not the task actions that realize it.
        ja: 検証可能な望ましい状態を定めますが、それを実現するタスク動作は定めないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-objective-019
    - id: Objective-is_a-IntentionalEntity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: Task‘为所有高风险调用配置审批步骤’规定了实现目标的工作结果。
        en: Task 'configure approval steps for all high-risk calls' specifies work used to realize the target.
        ja: Task『全高リスク呼出しへ承認ステップを設定する』は目標実現の作業を規定します。
      field_values: {}
      related_node_ids:
        - Objective
        - IntentionalEntity
      related_relation_ids:
        - Objective-is_a-IntentionalEntity
      expected_result:
        zh: 该对象不因支持 Objective 就成为 Objective。
        en: The object does not become Objective merely because it supports one.
        ja: Objective を支援するだけで、この対象は Objective になりません。
      why_valid_or_invalid:
        zh: 它是待完成工作的规范，而不是度量化的意向状态。
        en: It is a specification of work to perform rather than a measurable intentional state.
        ja: 実行すべき作業の仕様であり、測定可能な意向状態ではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-objective-020
  source_claims:
    - claim-objective-021
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Objective-realized_by-TaskPlan
    predicate: realized_by
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: realized by
      en: realized by
      ja: realized by
    definitions:
      zh: Objective —realized_by→ TaskPlan 表示该计划被指定为实现可度量目标的规范路径；只有计划对应的执行证据满足目标度量时，才能断言 Objective 实际实现。
      en: Objective —realized_by→ TaskPlan means that the plan is designated as the normative path for realizing a measurable objective; actual realization still requires execution evidence satisfying the objective's measure.
      ja: Objective —realized_by→ TaskPlan は、計画が測定可能な目標を実現する規範経路として指定されることを示し、実際の実現には目標指標を満たす実行証拠が必要です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_realized_by
      labels:
        zh: 反向：realized by
        en: is target of realized by
        ja: 逆方向：realized by
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: Objective-realized_by-TaskPlan-example-positive-manual-001
        kind: positive
        labels:
          zh: realized by正例
          en: Positive example for realized by
          ja: realized byの正例
        scenario_id: null
        descriptions:
