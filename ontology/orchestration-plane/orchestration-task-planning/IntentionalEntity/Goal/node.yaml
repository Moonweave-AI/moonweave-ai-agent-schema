schema: moonweave.ai/ontology-node/v1
id: Goal
kind: concept
status: accepted
labels:
  zh: 目标
  en: goal
  ja: 目標
semantics:
  short_definition:
    zh: 目标是描述所追求终局状态的高层意向实体。
    en: A goal is a high-level intentional entity describing a sought end state.
    ja: ゴールは、追求する最終状態を記述する高水準の意向的エンティティです。
  definition:
    zh: 目标是一种 IntentionalEntity，其种差是：它表达主体希望达到的方向性终局状态，可以尚未给出指标、期限或实现路径；Objective 可把它细化为可测量目标，TaskPlan 则说明如何实现。
    en: A Goal is an IntentionalEntity distinguished by expressing a directional end state an actor wants to reach, even before metrics, deadlines, or a realizing path are fixed. An Objective may refine it into a measurable target, while a TaskPlan specifies how to realize it.
    ja: Goal は IntentionalEntity の一種であり、指標、期限、実現経路が未確定でも主体が到達したい方向的な最終状態を表します。Objective が測定可能な目標へ詳細化し、TaskPlan が実現方法を規定します。
  why_needed:
    zh: 高层目标为多个可替换的计划和具体目标提供共同理由，避免把某一实施方案误当成唯一目的。
    en: A high-level goal supplies a shared rationale for multiple alternative objectives and plans, preventing one implementation path from being mistaken for the purpose itself.
    ja: 高水準ゴールは複数の代替 Objective と計画に共通理由を与え、特定実装経路を目的そのものと誤認することを防ぎます。
  includes:
    - zh: 被主体明确采纳的业务、用户或系统期望终局。
      en: A business, user, or system end state explicitly adopted by an actor.
      ja: 主体が明示的に採用した業務、利用者、システムの最終状態。
  excludes:
    - zh: 带阈值和期限的 Objective、实现步骤 Task、以及已经发生的结果或 Outcome。
      en: An Objective with threshold and deadline, a realizing Task, and an already observed result or Outcome.
      ja: 閾値と期限を持つ Objective、実現手順の Task、既に観測された結果や Outcome。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: goal_horizon
      labels:
        zh: 目标展望期
        en: goal horizon
        ja: 目標展望期間
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分方向性目标预期在当前任务、会话、项目或长期组织层面被追求，但不把它伪装成精确截止时间。
        en: Distinguishes whether a directional goal is pursued at task, session, project, or long-term organizational horizon without inventing a precise deadline.
        ja: 方向的目標を task・session・project・長期組織のどの期間で追求するか区別し、精密な期限を捏造しません。
      allowed_values:
        - id: GoalHorizonTask
          value: task
          labels:
            zh: 当前任务
            en: task horizon
            ja: タスク期間
          definitions:
            zh: 该目标只在一个有边界的任务生命周期内被追求和判断。
            en: The goal is pursued and judged within one bounded task lifecycle.
            ja: 一つの境界付きタスクライフサイクル内で目標を追求・判断します。
          status: accepted
          source_claims:
            - claim-goal-002
        - id: GoalHorizonSession
          value: session
          labels:
            zh: 当前会话
            en: session horizon
            ja: セッション期間
          definitions:
            zh: 该目标跨越同一会话中的若干任务或轮次，但不延伸到会话之外。
            en: The goal spans multiple tasks or turns in one session but does not persist beyond that session.
            ja: 同一セッション内の複数タスク・ターンにまたがりますがセッション外へ持続しません。
          status: accepted
          source_claims:
            - claim-goal-003
        - id: GoalHorizonProject
          value: project
          labels:
            zh: 项目周期
            en: project horizon
            ja: プロジェクト期間
          definitions:
            zh: 该目标由多个任务、会话或工作流在一个项目范围内共同推进。
            en: The goal is advanced by multiple tasks, sessions, or workflows within one project scope.
            ja: 一つのプロジェクト範囲で複数タスク・セッション・ワークフローが共同して進めます。
          status: accepted
          source_claims:
            - claim-goal-004
        - id: GoalHorizonLongTerm
          value: long-term
          labels:
            zh: 长期组织目标
            en: long-term horizon
            ja: 長期組織期間
          definitions:
            zh: 该目标持续指导多个项目或组织周期，不以单一任务、会话或项目完成为终点。
            en: The goal guides multiple projects or organizational cycles and does not end with a single task, session, or project.
            ja: 複数プロジェクト・組織サイクルを長期に導き、一つのタスク・セッション・プロジェクト完了では終了しません。
          status: accepted
          source_claims:
            - claim-goal-005
      pattern: null
      example_value: project
      source_claims:
        - claim-goal-006
    - id: beneficiary_scope
      labels:
        zh: 受益方范围
        en: beneficiary scope
        ja: 受益者範囲
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明目标状态旨在改善的用户、团队、组织或公共范围；未声明时不得根据执行者身份推断受益方。
        en: States the user, team, organization, or public scope intended to benefit; when absent, beneficiary identity must not be inferred from the performer.
        ja: 目標状態が利益をもたらす user・team・organization・public 範囲を示し、未指定時に実行者から受益者を推定しません。
      allowed_values: []
      pattern: null
      example_value:
        organization_ref: finance-emea
        stakeholder_refs:
          - audit-team
      source_claims:
        - claim-goal-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: Goal-example-positive-manual-001
    kind: positive
    labels:
      zh: 目标正例
      en: Positive example for goal
      ja: 目標の正例
    scenario_id: null
    descriptions:
      zh: 医院助手采纳“减少出院后可避免的再次入院”作为服务改进方向，但尚未确定具体比例和季度。
      en: A hospital assistant adopts 'reduce avoidable readmissions after discharge' as a service-improvement direction before setting a percentage or quarter.
      ja: 病院アシスタントが、割合や四半期を決める前に「退院後の回避可能な再入院を減らす」を改善方向として採用します。
    field_values:
      intentional_entity_id: intentional-reduce-avoidable-readmission
      revision: "1"
      desired_state: Avoidable readmissions after discharge are reduced across the hospital care network.
      subject_scope:
        organization_ref: hospital-care-network
        service_ref: post-discharge-care
      valid_from: 2026-07-01T00:00:00Z
      goal_horizon: long-term
      beneficiary_scope:
        organization_ref: hospital-care-network
        stakeholder_refs:
          - discharged-patients
    related_node_ids:
      - Goal
      - IntentionalEntity
    related_relation_ids:
      - Goal-is_a-IntentionalEntity
    expected_result:
      zh: 该期望是 Goal，随后可细化成带基线、阈值和期限的 Objective。
      en: The desired state is a Goal and can later be refined into an Objective with baseline, threshold, and deadline.
      ja: この望ましい状態は Goal であり、基準値、閾値、期限を持つ Objective へ詳細化できます。
    why_valid_or_invalid:
      zh: 它说明所追求的终局方向，但没有达到可测量 Objective 的身份条件。
      en: It states the sought end-state direction but does not yet meet the identity conditions of a measurable Objective.
      ja: 追求する最終方向を示しますが、測定可能な Objective の同一性条件はまだ満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-goal-008
  - id: Goal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 目标边界例
      en: Boundary case for goal
      ja: 目標の境界例
    scenario_id: null
    descriptions:
      zh: 计划写明“每天 02:00 运行去重作业”，只规定一个执行安排，没有说明希望达到的业务终局。
      en: A plan says 'run the deduplication job daily at 02:00'; it specifies an execution arrangement but no desired business end state.
      ja: 計画に「毎日02:00に重複排除ジョブを実行」とありますが、実行配置だけで望ましい業務最終状態を示しません。
    field_values: {}
    related_node_ids:
      - Goal
      - IntentionalEntity
    related_relation_ids:
      - Goal-is_a-IntentionalEntity
    expected_result:
      zh: 该条目属于计划或任务约束，不是 Goal。
      en: Treat the entry as a plan or task constraint, not a Goal.
      ja: この項目は計画またはタスク制約であり Goal ではありません。
    why_valid_or_invalid:
      zh: 执行时间回答何时做，不回答为什么做或要达到什么终局。
      en: An execution time answers when to act, not why the work exists or which end state is sought.
      ja: 実行時刻はいつ行うかを答え、なぜ行うか、どの最終状態を目指すかは答えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-goal-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Intent
    shared_parent_concept_id: IntentionalEntity
    differentia:
      zh: 正向身份比较：父节点 IntentionalEntity：Goal（semantic kind=specification，骨架 Goal-is_a-IntentionalEntity）；Intent（semantic kind=specification，骨架 Intent-is_a-IntentionalEntity）。双端条件：Goal 条件：“目标是以如下事实为区分特征的意图性实体：它表示用户或系统希望达成的高层意图，是后续拆解为可操作它、任务和完成准则的起点”；Intent 条件：“行动意图是一种由具名主体采纳、表达其愿意在一定范围和约束下为推进目标采取行动的意图性实体；它不等同于目标、计划或一次执行”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent IntentionalEntity: Goal (semantic kind=specification, backbone Goal-is_a-IntentionalEntity); Intent (semantic kind=specification, backbone Intent-is_a-IntentionalEntity). Endpoint conditions: Goal condition: “Goal is an intentional entity; its differentiating condition is that it is a high-level user or system intent that motivates an agent workflow before it is decomposed into operational objectives, tasks, or success criteria”; Intent condition: “Intent is an intentional entity whose defining condition is that it is an itionalEntity adopted by a named actor that expresses commitment to act toward a goal within defined scope and constraints; it is not the goal, plan, or execution itself”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 IntentionalEntity：Goal（semantic kind=specification、バックボーン Goal-is_a-IntentionalEntity）；Intent（semantic kind=specification、バックボーン Intent-is_a-IntentionalEntity）。両端条件：Goal の条件：「目標は意図的実体の一種であり、次の条件で区別されます：それは、利用者またはシステムが達成したい高位の意図であり、操作可能な目的、タスク、完了基準へ分解する出発点です」；Intent の条件：「行動意図は意図的実体のうち、次の事実を定義条件とする対象です：Intent は記名主体が採用し、定義された範囲と制約内で目標へ向け行動する意思を表す IntentionalEntity であり、目標、計画、実行そのものではない」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-goal-010
      - claim-goal-011
parent_relation:
  id: Goal-is_a-IntentionalEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Goal —is_a→ IntentionalEntity 表示 Goal 是以期望世界状态为身份的意向实体；它区别于表达承诺的 Intent 和用于可检验细化的 Objective。
    en: Goal —is_a→ IntentionalEntity classifies Goal as an intentional entity identified by a desired world state, distinct from an Intent that records commitment and an Objective that supplies a testable refinement.
    ja: Goal —is_a→ IntentionalEntity は、望ましい世界状態で識別される意向実体として Goal を分類し、コミットメントを表す Intent や検証可能な細化を行う Objective と区別します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Goal-is_a-IntentionalEntity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: ‘所有发布均可追溯到批准证据’描述了尚待实现的期望状态，而非执行命令。
        en: "'Every release is traceable to approval evidence' states a desired state to be achieved rather than an execution command."
        ja: 『すべての公開版を承認証拠へ追跡できる』は実行命令ではなく、実現すべき望ましい状態を述べます。
      field_values: {}
      related_node_ids:
        - Goal
        - IntentionalEntity
      related_relation_ids:
        - Goal-is_a-IntentionalEntity
      expected_result:
        zh: 该对象分类为 Goal，并通过 is_a 归入 IntentionalEntity。
        en: Classify the object as Goal and, through is_a, as IntentionalEntity.
        ja: この対象を Goal とし、is_a により IntentionalEntity に分類します。
      why_valid_or_invalid:
        zh: 其身份由期望状态决定，符合意向实体的共同种差。
        en: Its identity is determined by a desired state, satisfying the common differentia of intentional entities.
        ja: 同一性が望ましい状態で決まり、意向実体の共通種差を満たすためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-goal-012
    - id: Goal-is_a-IntentionalEntity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: ‘调用发布工具并上传 build-7’规定了一个动作步骤，没有描述期望世界状态。
        en: "'Invoke the release tool and upload build-7' prescribes an action step and does not describe a desired world state."
        ja: 『公開ツールを呼び build-7 をアップロードする』は動作ステップを規定し、望ましい世界状態を述べません。
      field_values: {}
      related_node_ids:
        - Goal
        - IntentionalEntity
      related_relation_ids:
        - Goal-is_a-IntentionalEntity
      expected_result:
        zh: 该记录不应因带有目的色彩就分类为 Goal。
        en: Do not classify the record as Goal merely because the action serves a purpose.
        ja: 目的に寄与するだけで、この記録を Goal に分類してはいけません。
      why_valid_or_invalid:
        zh: 它规定如何行动，属于工作规约内容，而非意向状态本身。
        en: It specifies how to act and belongs to work-specification content rather than the intentional state itself.
        ja: 行動方法を定める作業仕様内容であり、意向状態そのものではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-goal-013
  source_claims:
    - claim-goal-014
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Goal-elaborated_by-TaskPlan
    predicate: elaborated_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: elaborated by
      en: elaborated by
      ja: elaborated by
    definitions:
      zh: Goal —elaborated_by→ TaskPlan 表示计划把一个仍然抽象的期望状态展开为任务、步骤、依赖与分配结构，但计划本身不保证目标已经实现。
      en: Goal —elaborated_by→ TaskPlan means that a plan expands an abstract desired state into tasks, steps, dependencies, and allocations; the plan itself does not establish that the goal has been achieved.
      ja: Goal —elaborated_by→ TaskPlan は、抽象的な望ましい状態をタスク・ステップ・依存・割当構造へ展開することを示し、計画自体は目標達成を証明しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: elaborates_goal
      labels:
        zh: 展开目标
        en: elaborates goal
        ja: 目標を展開する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Goal-elaborated_by-TaskPlan-example-positive-manual-001
        kind: positive
        labels:
          zh: elaborated by正例
          en: Positive example for elaborated by
          ja: elaborated byの正例
        scenario_id: null
        descriptions:
          zh: Goal‘发布可审计版本’由 plan-release-12 展开为验证、打包、审批三个步骤及其依赖。
          en: Goal 'publish an auditable release' is elaborated by plan-release-12 into verify, package, and approve steps with dependencies.
          ja: Goal『監査可能な版を公開する』は plan-release-12 により検証・梱包・承認ステップと依存へ展開されます。
        field_values: {}
        related_node_ids:
          - Goal
          - TaskPlan
        related_relation_ids:
          - Goal-elaborated_by-TaskPlan
        expected_result:
          zh: 记录 Goal-elaborated_by-TaskPlan；目标仍保持未实现状态。
          en: Record Goal-elaborated_by-TaskPlan while the Goal remains unrealized.
          ja: Goal-elaborated_by-TaskPlan を記録し、Goal は未実現のままです。
        why_valid_or_invalid:
          zh: 计划提供实现路径的结构细节，却没有提供任何执行结果证据。
          en: The plan supplies structural detail for a path to achievement but no execution-result evidence.
          ja: 計画は達成経路の構造詳細を与えますが、実行結果の証拠は与えないためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-goal-015
      - id: Goal-elaborated_by-TaskPlan-example-boundary-manual-001
        kind: boundary
        labels:
          zh: elaborated by边界例
          en: Boundary case for elaborated by
          ja: elaborated byの境界例
        scenario_id: null
        descriptions:
          zh: report-44 显示发布已经成功并附带签名产物，但没有任务计划结构。
          en: report-44 shows that publication succeeded and attaches a signed artifact but contains no task-plan structure.
          ja: report-44 は公開成功と署名成果物を示しますが、タスク計画構造を含みません。
        field_values: {}
        related_node_ids:
          - Goal
          - TaskPlan
        related_relation_ids:
          - Goal-elaborated_by-TaskPlan
        expected_result:
          zh: 该证据不能建立 elaborated_by 关系；它更接近实现结果。
          en: The evidence does not establish elaborated_by; it concerns realization results instead.
          ja: この証拠では elaborated_by は成立せず、実現結果に関するものです。
        why_valid_or_invalid:
          zh: 成功报告没有把目标分解成规范性的步骤、依赖或工作分配。
          en: A success report does not decompose the Goal into normative steps, dependencies, or allocations.
          ja: 成功報告は Goal を規範的ステップ・依存・割当へ分解しないためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-goal-016
    source_claims:
      - claim-goal-017
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:TaskPlan
  - id: Goal-refined_into-Objective
    predicate: refined_into
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: refined into
      en: refined into
      ja: refined into
    definitions:
      zh: Goal —refined_into→ Objective 表示把宽泛期望状态转写为更具体、可度量且可验收的目标陈述；Objective 仍不是任务步骤或完成结果。
      en: Goal —refined_into→ Objective means that a broad desired state is restated as a more specific, measurable, and acceptable objective; the Objective is still neither a task step nor a completion result.
      ja: Goal —refined_into→ Objective は、広い望ましい状態を、より具体的・測定可能・受入可能な目標記述へ細化することを示し、Objective はタスクステップや完了結果ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_refined_into
      labels:
        zh: 反向：refined into
        en: is target of refined into
        ja: 逆方向：refined into
    conditions: []
    temporal_scope: timeless
    boundary_context: null
