schema: moonweave.ai/ontology-node/v1
id: Goal
kind: concept
labels:
  zh: 目标
  en: goal
  ja: 目標
semantics:
  short_definition:
    zh: 表达所追求方向性终局状态的高层 IntentionalEntity。
    en: A high-level IntentionalEntity expressing a directional end state to pursue.
    ja: 追求する方向的終局状態を表す高水準 IntentionalEntity です。
  definition:
    zh: Goal 是 IntentionalEntity 的特化，表达主体希望达到的方向性终局，可尚未固定指标、期限或实现路径；Objective 细化为可测量目标，TaskPlan 说明如何实现。映射：CrewAI Agent.goal 字段；用户意图解析后采纳的业务终局；A2A 会话背后要达成的服务结果（非 Task 对象本身）。它不是带阈值的 Objective，也不是执行步骤。
    en: Goal specializes IntentionalEntity with a directional end state an actor wants to reach, often before metrics, deadlines, or paths are fixed; Objective refines measurably and TaskPlan realizes. Maps to CrewAI Agent.goal, parsed user-intent end states once adopted, and service outcomes behind A2A interactions (not the A2A Task object). It is not a threshold-bearing Objective nor an execution step.
    ja: Goal は方向的終局状態を表す IntentionalEntity 特化です。CrewAI Agent.goal、解析後に採用された user intent 終局、A2A 相互作用のサービス結果（A2A Task オブジェクト自体ではない）に写像されます。
  why_needed:
    zh: 高层目标为多个可替换计划与具体目标提供共同理由，避免把某一实施方案误当成唯一目的。
    en: High-level goals supply shared rationale for alternative objectives and plans, preventing one implementation path from being mistaken for the purpose itself.
    ja: 高水準 Goal は複数の代替 Objective/Plan に共通理由を与え、実装経路を目的と誤認しません。
  includes:
    - zh: 被主体明确采纳的业务、用户或系统期望终局。
      en: Business, user, or system end states explicitly adopted by an actor.
      ja: 主体が明示採用した業務/利用者/システムの期望終局。
  excludes:
    - zh: 带阈值和期限的 Objective、实现步骤 Task、已经发生的结果或 Outcome。
      en: Threshold-bearing Objective, realizing Task, observed result or Outcome.
      ja: 閾値付き Objective、Task、観測済み Outcome。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 将 CrewAI Agent.goal 直接映射为 Goal；若 goal 已含明确 metric 与 deadline，则 refined_into Objective。OpenAI o1 链式规划前的“要解决什么问题”应记录为 Goal；具体 plan 文件属于 TaskPlan 而非 Goal。
    en: Map CrewAI Agent.goal directly to Goal; if the goal already includes metric and deadline, refine into Objective. The problem statement before OpenAI o1 chain planning is a Goal; concrete plan artifacts belong to TaskPlan, not Goal.
    ja: CrewAI Agent.goal を Goal に写像し、metric/deadline があれば Objective へ refined_into。OpenAI o1 計画前の問題設定は Goal です。
  typical_input:
    - description: CrewAI agent enduring goal.
      format: |
        agent = Agent(
            role="Hospital Operations Analyst",
            goal="Reduce avoidable readmissions after discharge",
        )
      source_claims: [claim-goal-crewai]
  typical_output:
    - description: Goal specification with horizon.
      format: |
        {
          "intentional_entity_id": "intentional-reduce-avoidable-readmission",
          "goal_horizon": "long-term",
          "desired_state": "Avoidable readmissions after discharge are reduced..."
        }
      source_claims: [claim-goal-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent.goal field.
    - name: OpenAI
      url: https://platform.openai.com/docs/
      description: Problem statement before chain-of-thought planning.
structure:
  identity_keys: []
  fields:
    - id: goal_horizon
      labels:
        zh: 目标展望期
        en: goal horizon
        ja: 目標展望期間
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分目标在 task、session、project 或 long-term 层面被追求。
        en: Whether the goal is pursued at task, session, project, or long-term horizon.
        ja: task/session/project/long-term のどの期間で追求するか。
      allowed_values:
        - id: GoalHorizonTask
          value: task
          labels:
            zh: 当前任务
            en: task horizon
            ja: タスク期間
          definitions:
            zh: 只在一个有边界任务生命周期内追求和判断。
            en: Pursued and judged within one bounded task lifecycle.
            ja: 境界付きタスクライフサイクル内で追求・判断。
          source_claims: [claim-goal-design]
        - id: GoalHorizonSession
          value: session
          labels:
            zh: 当前会话
            en: session horizon
            ja: セッション期間
          definitions:
            zh: 跨越同一会话中的若干任务或轮次。
            en: Spans multiple tasks or turns in one session.
            ja: 同一セッション内の複数タスク/ターンにまたがる。
          source_claims: [claim-goal-design]
        - id: GoalHorizonProject
          value: project
          labels:
            zh: 项目周期
            en: project horizon
            ja: プロジェクト期間
          definitions:
            zh: 由多个任务、会话或工作流在一个项目范围内共同推进。
            en: Advanced by multiple tasks, sessions, or workflows in one project.
            ja: 一プロジェクト内で複数タスク/セッション/ワークフローが共同推進。
          source_claims: [claim-goal-design]
        - id: GoalHorizonLongTerm
          value: long-term
          labels:
            zh: 长期组织目标
            en: long-term horizon
            ja: 長期組織期間
          definitions:
            zh: 持续指导多个项目或组织周期。
            en: Guides multiple projects or organizational cycles.
            ja: 複数プロジェクト/組織サイクルを長期に導く。
          source_claims: [claim-goal-design]
      example_value: project
      source_claims: [claim-goal-design]
    - id: beneficiary_scope
      labels:
        zh: 受益方范围
        en: beneficiary scope
        ja: 受益者範囲
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明目标状态旨在改善的用户、团队、组织或公共范围。
        en: User, team, organization, or public scope intended to benefit.
        ja: 目標状態が利益をもたらす user/team/organization/public 範囲。
      example_value:
        organization_ref: hospital-care-network
        stakeholder_refs: [discharged-patients]
      source_claims: [claim-goal-design]
  constraints: []
  required_relation_constraints: []
examples:
  - id: Goal-crewai-agent-goal
    labels:
      zh: CrewAI Agent.goal
      en: CrewAI Agent.goal
      ja: CrewAI Agent.goal
    descriptions:
      zh: 医院 Agent.goal 采纳“减少出院后可避免再次入院”方向，尚未确定具体比例和季度。
      en: Hospital Agent.goal adopts reducing avoidable readmissions before setting percentage or quarter targets.
      ja: 病院 Agent.goal が再入院削減方向を採用し、割合や四半期は未確定です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Agent.goal
    field_values:
      goal_horizon: long-term
    related_node_ids: [Goal, IntentionalEntity]
    related_relation_ids: [Goal-is_a-IntentionalEntity]
    source_claims: [claim-goal-crewai]
  - id: Goal-elaborated-by-plan
    labels:
      zh: Goal 由 TaskPlan 展开
      en: Goal elaborated by TaskPlan
      ja: Goal が TaskPlan により展開
    descriptions:
      zh: Goal“发布可审计版本”由 plan-release-12 展开为 verify、package、approve 步骤；Goal 仍未实现。
      en: Goal 'publish an auditable release' is elaborated by plan-release-12 into verify, package, and approve steps while the Goal remains unrealized.
      ja: Goal「監査可能な版を公開」が plan-release-12 により展開され、Goal は未実現のままです。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: Goal-elaborated_by-TaskPlan
    field_values: {}
    related_node_ids: [Goal, TaskPlan]
    related_relation_ids: [Goal-elaborated_by-TaskPlan]
    source_claims: [claim-goal-design]
  - id: Goal-boundary-schedule
    labels:
      zh: 执行安排不是 Goal
      en: Schedule is not Goal
      ja: 実行スケジュールは Goal ではない
    descriptions:
      zh: “每天 02:00 运行去重作业”只规定执行安排，没有说明希望达到的业务终局。
      en: "Run deduplication daily at 02:00 specifies scheduling, not a desired business end state."
      ja: 「毎日02:00に重複排除」はスケジュールであり期望終局ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: goal versus task boundary
    field_values: {}
    related_node_ids: [Goal, Task]
    related_relation_ids: []
    source_claims: [claim-goal-design]
parent_relation:
  id: Goal-is_a-IntentionalEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Goal 以期望世界状态为身份的 IntentionalEntity 特化。
    en: Goal is an IntentionalEntity identified by a desired world state.
    ja: Goal は望ましい世界状態で識別される IntentionalEntity 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-goal-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Goal-elaborated_by-TaskPlan
    predicate: elaborated_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由任务计划展开
      en: elaborated by
      ja: タスク計画により展開
    definitions:
      zh: TaskPlan 把抽象 Goal 展开为任务、步骤、依赖与分配结构；计划本身不证明 Goal 已实现。
      en: TaskPlan expands an abstract Goal into tasks, steps, dependencies, and allocations without proving achievement.
      ja: TaskPlan が抽象 Goal をタスク/ステップ/依存/割当へ展開し、達成は証明しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: elaborates_goal
      labels:
        zh: 展开目标
        en: elaborates goal
        ja: 目標を展開する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-goal-design]
    layout_role: cross-link
    target: concept:TaskPlan
  - id: Goal-refined_into-Objective
    predicate: refined_into
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 细化为可度量目标
      en: refined into
      ja: 測定可能目標へ細化
    definitions:
      zh: 把宽泛 Goal 转写为更具体、可度量且可验收的 Objective。
      en: Restates a broad Goal as a more specific, measurable, acceptable Objective.
      ja: 広い Goal をより具体的・測定可能・受入可能な Objective へ細化します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し、一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_refined_into
      labels:
        zh: 反向：细化为可度量目标
        en: is target of refined into
        ja: 逆方向：測定可能目標へ細化
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-goal-design]
    layout_role: cross-link
    target: concept:Objective
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Agent.goal as directional desired state.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Goal versus Objective and TaskPlan boundaries.
source_claims:
  - id: claim-goal-crewai
    source: crewai
    supports: CrewAI Agent.goal expresses enduring directional intent before task-level objectives are defined.
    locator: Concepts > Agents
    evidence_kind: official
    confidence: high
  - id: claim-goal-design
    source: moonweave-design
    supports: Moonweave uses Goal for high-level desired end states refined by Objective and elaborated by TaskPlan.
    locator: Goal concept boundary
    evidence_kind: design-inference
    confidence: high
