schema: moonweave.ai/ontology-node/v1
id: Goal
kind: concept
labels:
  zh: 目标
  en: goal
  ja: 目標
semantics:
  short_definition:
    zh: 目标是描述所追求终局状态的高层意向实体。
    en: A goal is a high-level intentional entity describing a sought end state.
    ja: ゴールは、追求する最終状態を記述する高水準の意向的エンティティです。
  definition:
    zh: 目标是一种 IntentionalEntity，其种差是：它表达主体希望达到的方向性终局状态，可以尚未给出指标、期限或实现路径；Objective 可把它细化为可测量目标，TaskPlan 则说明如何实现。
    en: A Goal is an IntentionalEntity distinguished by expressing a directional end state an actor wants to reach, even before metrics, deadlines, or a realizing path are fixed. An Objective may refine it into a measurable target, while a TaskPlan specifies how to realize it.
    ja: Goal は IntentionalEntity の一種であり、指標、期限、実現経路が未確定でも主体が到達したい方向的な最終状態を表します。Objective が測定可能な目標へ詳細化し、TaskPlan が実現方法を規定します。
  why_needed:
    zh: 高层目标为多个可替换的计划和具体目标提供共同理由，避免把某一实施方案误当成唯一目的。
    en: A high-level goal supplies a shared rationale for multiple alternative objectives and plans, preventing one implementation path from being mistaken for the purpose itself.
    ja: 高水準ゴールは複数の代替 Objective と計画に共通理由を与え、特定実装経路を目的そのものと誤認することを防ぎます。
  includes:
    - zh: 被主体明确采纳的业务、用户或系统期望终局。
      en: A business, user, or system end state explicitly adopted by an actor.
      ja: 主体が明示的に採用した業務、利用者、システムの最終状態。
  excludes:
    - zh: 带阈值和期限的 Objective、实现步骤 Task、以及已经发生的结果或 Outcome。
      en: An Objective with threshold and deadline, a realizing Task, and an already observed result or Outcome.
      ja: 閾値と期限を持つ Objective、実現手順の Task、既に観測された結果や Outcome。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      规划适配器读取 Goal 文本生成 TaskPlan，与 orchestration-task-planning/Goal 节点相同：Agents SDK 的 Agent
      instructions 来自 desired_outcome 摘要，LangGraph 规划节点把 goal_ref 写入 planning_basis。Objective 细化
      阈值后仍保持 Goal 独立；A2A Task artifacts 只证明一次运行产出，不能当作 Goal 达成证明写回 Goal。
    en: >-
      A planning adapter reads Goal text to create a TaskPlan, aligned with orchestration-task-planning/Goal: Agents SDK Agent
      instructions derive from a desired_outcome digest and LangGraph planner nodes write goal_ref into planning_basis.
      Objectives refine thresholds while Goals stay independent; A2A Task artifacts prove one run's output, not Goal attainment
      written back into Goal.
    ja: >-
      planning adapter は Goal 文本から TaskPlan を作成し、orchestration-task-planning/Goal と整合する。Agents SDK Agent
      instructions は desired_outcome digest から派生し、LangGraph planner node は goal_ref を planning_basis に書く。
      Objective が閾値を詳細化しても Goal は独立。A2A Task artifacts は一回 run の output を証明するだけで Goal 達成証明として
      Goal へ書き戻してはならない。
  typical_input:
    - description:
        zh: 方向性终局状态声明，尚未绑定指标或步骤。
        en: A directional end-state declaration without fixed metrics or steps yet.
        ja: 指標や step が未固定の directional end-state declaration。
      format: |-
        {"intentional_entity_id":"goal:release-2026-07","revision":"1","desired_outcome":"approve a signed production release","goal_horizon":"project","scope_ref":"release:2026-07"}
  typical_output:
    - description:
        zh: 引用 Goal 的计划 revision，不是 Execution 记录。
        en: A plan revision referencing a Goal, not an Execution record.
        ja: Goal を参照する plan revision。Execution record ではない。
      format: |-
        {"plan_ref":"plan:release-2026-07","plan_revision":"v1","planning_basis":{"goal_ref":"goal:release-2026-07@1"},"step_refs":["step:sign","step:smoke"]}
  reference_implementations:
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents deriving Agent instructions from goal-oriented planning input.
    - name: W3C PROV-O Plan
      url: https://www.w3.org/TR/prov-o/#Plan
      description: Defines Plan as intended steps toward goals, separate from achieved entities.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph planning nodes that emit structure without rewriting goal records.
  source_claims:
    - claim-goal-006
    - claim-goal-008
structure:
  identity_keys: []
  fields:
    - id: goal_horizon
      labels:
        zh: 目标展望期
        en: goal horizon
        ja: 目標展望期間
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分方向性目标预期在当前任务、会话、项目或长期组织层面被追求，但不把它伪装成精确截止时间。
        en: Distinguishes whether a directional goal is pursued at task, session, project, or long-term organizational horizon without inventing a precise deadline.
        ja: 方向的目標を task・session・project・長期組織のどの期間で追求するか区別し、精密な期限を捏造しません。
      allowed_values:
        - id: GoalHorizonTask
          value: task
          labels:
            zh: 当前任务
            en: task horizon
            ja: タスク期間
          definitions:
            zh: 该目标只在一个有边界的任务生命周期内被追求和判断。
            en: The goal is pursued and judged within one bounded task lifecycle.
            ja: 一つの境界付きタスクライフサイクル内で目標を追求・判断します。
          status: accepted
          source_claims:
            - claim-goal-002
        - id: GoalHorizonSession
          value: session
          labels:
            zh: 当前会话
            en: session horizon
            ja: セッション期間
          definitions:
            zh: 该目标跨越同一会话中的若干任务或轮次，但不延伸到会话之外。
            en: The goal spans multiple tasks or turns in one session but does not persist beyond that session.
            ja: 同一セッション内の複数タスク・ターンにまたがりますがセッション外へ持続しません。
          status: accepted
          source_claims:
            - claim-goal-003
        - id: GoalHorizonProject
          value: project
          labels:
            zh: 项目周期
            en: project horizon
            ja: プロジェクト期間
          definitions:
            zh: 该目标由多个任务、会话或工作流在一个项目范围内共同推进。
            en: The goal is advanced by multiple tasks, sessions, or workflows within one project scope.
            ja: 一つのプロジェクト範囲で複数タスク・セッション・ワークフローが共同して進めます。
          status: accepted
          source_claims:
            - claim-goal-004
        - id: GoalHorizonLongTerm
          value: long-term
          labels:
            zh: 长期组织目标
            en: long-term horizon
            ja: 長期組織期間
          definitions:
            zh: 该目标持续指导多个项目或组织周期，不以单一任务、会话或项目完成为终点。
            en: The goal guides multiple projects or organizational cycles and does not end with a single task, session, or project.
            ja: 複数プロジェクト・組織サイクルを長期に導き、一つのタスク・セッション・プロジェクト完了では終了しません。
          status: accepted
          source_claims:
            - claim-goal-005
      pattern: null
      example_value: project
      source_claims:
        - claim-goal-006
    - id: beneficiary_scope
      labels:
        zh: 受益方范围
        en: beneficiary scope
        ja: 受益者範囲
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明目标状态旨在改善的用户、团队、组织或公共范围；未声明时不得根据执行者身份推断受益方。
        en: States the user, team, organization, or public scope intended to benefit; when absent, beneficiary identity must not be inferred from the performer.
        ja: 目標状態が利益をもたらす user・team・organization・public 範囲を示し、未指定時に実行者から受益者を推定しません。
      allowed_values: []
      pattern: null
      example_value:
        organization_ref: finance-emea
        stakeholder_refs:
          - audit-team
      source_claims:
        - claim-goal-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: Goal-example-positive-manual-001
    labels:
      zh: Goal positive
      en: Goal positive
      ja: Goal positive
    descriptions:
      zh: Voyager (Wang et al., 2023) 对 Goal 实现自动课程→技能生成→技能库：curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill)；Minecraft 中持续积累可复用 JavaScript 技能。
      en: Voyager (Wang et al., 2023) for Goal: curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill); accumulates reusable JavaScript skills in Minecraft.
      ja: Voyager (Wang et al., 2023) Goal: propose_task→code_generation→skill_library.add；Minecraft 技能蓄積。
    field_values: {intentional_entity_id: intentional-reduce-avoidable-readmission, revision: 1, desired_state: "Avoidable readmissions after discharge are reduced across the hospital care network."}

    related_node_ids:
      - Goal
      - IntentionalEntity
    related_relation_ids:
      - Goal-is_a-IntentionalEntity
    source_claims:
      - claim-goal-008

  - id: Goal-example-boundary-manual-001
    labels:
      zh: Goal boundary
      en: Goal boundary
      ja: Goal boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 Goal 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not Goal specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で Goal spec ではない。
    field_values: {}

    related_node_ids:
      - Goal
      - IntentionalEntity
    related_relation_ids:
      - Goal-is_a-IntentionalEntity
    source_claims:
      - claim-goal-009

  - id: Goal-example-counterexample-confusable
    labels:
      zh: Goal counterexample
      en: Goal counterexample
      ja: Goal counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 Goal TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style Goal TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 Goal ではない。
    field_values: {intentional_entity_id: absent, goal_horizon: absent, prompt_text: "Summarize incident"}

    related_node_ids:
      - Goal
      - Intent
      - Objective
      - IntentionalEntity
    related_relation_ids: []
    source_claims:
      - claim-goal-008

  - id: Goal-example-instance-concrete
    labels:
      zh: Goal instance
      en: Goal instance
      ja: Goal instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 Goal 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable Goal instance.
      ja: ReAct 实例 Thought→Action Search→Observation が Goal 監査实例に写像。
    field_values: {intentional_entity_id: intentional-reduce-avoidable-readmission, revision: 1, desired_state: "Avoidable readmissions after discharge are reduced across the hospital care network."}

    related_node_ids:
      - Goal
      - IntentionalEntity
    related_relation_ids: []
    source_claims:
      - claim-goal-008

