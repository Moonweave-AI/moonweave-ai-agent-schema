schema: moonweave.ai/ontology-node/v1
id: IntentionalEntity
kind: concept
labels:
  zh: 意图性实体
  en: intentional entity
  ja: 意図的実体
semantics:
  short_definition:
    zh: 表达尚未实现但被主体期望、采纳或承诺追求的规范状态。
    en: A normative desired state that an actor wants, adopts, or commits to pursue but has not yet realized.
    ja: 主体が望み・採用し・追求を約束するが未実現の規範的状态です。
  definition:
    zh: IntentionalEntity 以 intentional_entity_id、desired_state、subject_scope 与 valid_from 标识，表达尚待实现的期望状态规范，可特化为 Goal、Objective 或 Intent。它不是 TaskPlan、Execution，也不是 NLU 分类标签。CrewAI Agent.goal 与 A2A 消息 intent 映射需先落到可归属的 IntentionalEntity，再与实现路径分离。
    en: An IntentionalEntity is identified by intentional_entity_id, desired_state, subject_scope, and valid_from, expressing a not-yet-realized desired-state specification specializing into Goal, Objective, or Intent. It is not a TaskPlan, Execution, or NLU classification label. CrewAI Agent.goal and A2A message intent must map to an attributable IntentionalEntity before separating realization paths.
    ja: IntentionalEntity は intentional_entity_id・desired_state・subject_scope・valid_from で識別し、Goal/Objective/Intent に特化する未実現期望状態仕様です。TaskPlan・Execution・NLU ラベルではありません。
  why_needed:
    zh: 将期望状态与工作定义和运行活动分开，才能追踪目标为何被采纳、如何细化以及哪些计划或执行真正实现它。
    en: Separating desired states from work definitions and runtime activities enables tracing adoption, refinement, and realization through plans or executions.
    ja: 望ましい状態を作業定義・実行活動から分離し、採用・詳細化・実現を追跡できます。
  includes:
    - zh: 高层期望状态、可测量目标，以及主体在明确范围内作出的行动承诺。
      en: High-level desired states, measurable objectives, and actor commitments within explicit scope.
      ja: 高水準期望状態、測定可能目標、明示範囲内の行為コミットメント。
  excludes:
    - zh: 实现路径 TaskPlan、可执行 Task、实际 Execution，以及从文本分类得到的 NLU 标签。
      en: Realizing TaskPlan, executable Task, actual Execution, and NLU labels from text classification.
      ja: TaskPlan、Task、Execution、NLU 分類ラベル。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 将 CrewAI Agent.goal 字符串投影为 Goal 或 Objective；将 OpenAI reasoning 中检测到的 user intent 在主体承诺后投影为 Intent；A2A 消息 intent 到 capability 的映射是路由输入，不等同于 IntentionalEntity，除非记录为 actor 承诺。
    en: Project CrewAI Agent.goal strings to Goal or Objective; project OpenAI-detected user intent to Intent only after actor commitment; A2A message-to-capability intent mapping is routing input, not IntentionalEntity unless recorded as commitment.
    ja: CrewAI Agent.goal を Goal/Objective に、OpenAI intent detection を主体 commitment 後に Intent に写像します。
  typical_input:
    - description: CrewAI agent goal configuration.
      format: |
        agent = Agent(role="Analyst", goal="Reduce unexplained ledger differences to zero")
      source_claims: [claim-ie-crewai]
    - description: Adopted organizational desired state before planning.
      format: |
        desired_state: "Average permit-processing time is no more than three days during the quarter."
      source_claims: [claim-ie-design]
  typical_output:
    - description: Versioned intentional entity specification.
      format: |
        {
          "intentional_entity_id": "intentional-permit-cycle-time",
          "desired_state": "...",
          "subject_scope": {"organization_ref": "municipal-permit-office"}
        }
      source_claims: [claim-ie-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent.goal as enduring desired state.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message intent versus committed goal state.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Reasoning-time intent detection feeding commitments.
structure:
  identity_keys:
    - intentional_entity_id
    - revision
  fields:
    - id: intentional_entity_id
      labels:
        zh: 意图实体标识
        en: intentional-entity ID
        ja: 意図的実体 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别尚待实现的期望状态规范。
        en: Stably identifies a desired-state specification yet to be realized.
        ja: 未実現期望状態仕様を安定識別します。
      pattern: ^intentional-[A-Za-z0-9._:-]+$
      example_value: intentional-reconcile-ledger
      source_claims: [claim-ie-design]
    - id: revision
      labels:
        zh: 意图实体修订
        en: intentional-entity revision
        ja: 意図的実体リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 期望状态、主体范围或有效期变化后的不可变版本。
        en: Immutable version after desired state, subject scope, or validity change.
        ja: 期望状態・主体範囲・有効期間変更後の不変版。
      example_value: "2"
      source_claims: [claim-ie-design]
    - id: desired_state
      labels:
        zh: 期望状态
        en: desired state
        ja: 望ましい状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 描述主体希望、采纳或承诺追求的世界状态，不写入实现步骤或实测值。
        en: World state a subject desires, adopts, or commits to without implementation steps or measured values.
        ja: 主体が望み・採用し・追求する世界状態（実装手順・実測値なし）。
      example_value: Every posted ledger difference has an accepted explanation or a correction entry.
      source_claims: [claim-ie-crewai]
    - id: subject_scope
      labels:
        zh: 主体范围
        en: subject scope
        ja: 主体範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定期望状态适用的组织、会话、任务或受益方。
        en: Organization, session, task, or beneficiary to which the desired state applies.
        ja: 期望状態が適用される組織・session・task・beneficiary。
      example_value:
        organization_ref: finance-emea
        task_ref: reconcile-q2
      source_claims: [claim-ie-design]
    - id: valid_from
      labels:
        zh: 有效起点
        en: valid from
        ja: 有効開始
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本修订可被承诺、规划或评估的开始时间。
        en: When this revision becomes available for commitment, planning, or evaluation.
        ja: commitment/planning/evaluation に使用できる開始時刻。
      example_value: 2026-07-01T00:00:00Z
      source_claims: [claim-ie-design]
    - id: valid_until
      labels:
        zh: 有效终点
        en: valid until
        ja: 有効終了
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 停止用于新承诺和计划的时间；未设置不表示已实现。
        en: When the revision stops being usable for new commitments; absence does not mean achieved.
        ja: 新規 commitment/plan 使用終了時刻；未設定は達成済みを意味しません。
      example_value: 2026-12-31T23:59:59Z
      source_claims: [claim-ie-design]
  constraints:
    - id: intentional-entity-valid-interval
      severity: error
      expression_language: plain
      expression: valid_until is absent or valid_until > valid_from
      explanations:
        zh: 失效时间必须晚于生效时间。
        en: Expiration must follow validity start.
        ja: 終了時刻は開始時刻より後でなければなりません。
      source_claims: [claim-ie-design]
  required_relation_constraints: []
examples:
  - id: IntentionalEntity-crewai-goal
    labels:
      zh: CrewAI Agent.goal 采纳
      en: CrewAI Agent.goal adoption
      ja: CrewAI Agent.goal 採用
    descriptions:
      zh: 财务 Agent 的 goal 被项目负责人采纳为季度内消除未解释差异的期望状态，尚未指定步骤。
      en: A finance agent goal is adopted as the desired state to eliminate unexplained differences this quarter before any steps are chosen.
      ja: 財務 Agent の goal が四半期内の未説明差異解消という採用済み期望状態になります。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Agent.goal
    field_values:
      intentional_entity_id: intentional-unexplained-differences
      revision: "1"
    related_node_ids: [IntentionalEntity, Goal]
    related_relation_ids: []
    source_claims: [claim-ie-crewai]
  - id: IntentionalEntity-municipal-objective
    labels:
      zh: 市政许可周期目标
      en: Municipal permit cycle goal
      ja: 自治体許可周期目標
    descriptions:
      zh: 市政助手记录被采纳的期望状态：本季度把平均许可处理时间降到三天以内。
      en: A municipal assistant records the adopted desired state to reduce average permit-processing time to three days this quarter.
      ja: 自治体アシスタントが「今四半期に許可処理平均3日以内」という採用済み期望状態を記録します。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: intentional specification
    field_values:
      desired_state: The average permit-processing time is no more than three days during the quarter.
    related_node_ids: [IntentionalEntity, Objective]
    related_relation_ids: []
    source_claims: [claim-ie-design]
  - id: IntentionalEntity-boundary-nlu
    labels:
      zh: NLU 标签不是 IntentionalEntity
      en: NLU label is not IntentionalEntity
      ja: NLU ラベルは IntentionalEntity ではない
    descriptions:
      zh: 分类器把用户句子标为 refund_request，但系统未记录主体承诺或期望状态。
      en: A classifier labels an utterance refund_request but no actor commitment or desired state is recorded.
      ja: 分類器が refund_request とするだけで、主体 commitment や期望状態は記録されません。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: intent detection versus commitment
    field_values: {}
    related_node_ids: [IntentionalEntity, Intent]
    related_relation_ids: []
    source_claims: [claim-ie-openai]
parent_relation: null
relations: []
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Agent.goal as desired state.
  - id: a2a-spec
    title: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-doc
    relevance: Message intent versus committed goals.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Reasoning-time intent detection.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Intentional specification versus plan and execution.
source_claims:
  - id: claim-ie-crewai
    source: crewai
    supports: CrewAI Agent.goal expresses an enduring desired state guiding tasks without being the tasks themselves.
    locator: Concepts > Agents
    evidence_kind: official
    confidence: high
  - id: claim-ie-openai
    source: openai-agents
    supports: OpenAI reasoning may detect user intent, but IntentionalEntity requires attributable commitment or desired state, not a classifier label alone.
    locator: Agent orchestration and reasoning
    evidence_kind: design-inference
    confidence: medium
  - id: claim-ie-design
    source: moonweave-design
    supports: Moonweave groups Goal, Objective, and Intent under IntentionalEntity while keeping plans and executions separate.
    locator: IntentionalEntity concept boundary
    evidence_kind: design-inference
    confidence: high
