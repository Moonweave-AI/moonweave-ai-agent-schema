schema: moonweave.ai/ontology-node/v1
id: IntentionalEntity
kind: concept
labels:
  zh: 意图性实体
  en: intentional entity
  ja: 意図的実体
semantics:
  short_definition:
    zh: 意向实体是描述期望未来状态或行动承诺的规范性信息。
    en: An intentional entity is normative information describing a desired future state or a commitment to act.
    ja: 意向的エンティティは、望ましい将来状態または行為へのコミットメントを記述する規範情報です。
  definition:
    zh: 意向实体是一种规范，其种差是：它表达尚未实现但被主体期望、采纳或承诺追求的状态；它可以特化为 Goal、Objective 或 Intent，但不是实现这些状态的 TaskPlan、Execution 或主体瞬时心理状态。
    en: An IntentionalEntity is a specification distinguished by expressing a not-yet-realized state that an actor desires, adopts, or commits to pursue. It specializes into Goal, Objective, or Intent, but is not the TaskPlan or Execution that realizes the state, nor a claim about an actor's hidden mental state.
    ja: IntentionalEntity は仕様の一種であり、主体が望み、採用し、追求を約束する未実現状態を表します。Goal、Objective、Intent に特化しますが、それを実現する TaskPlan や Execution、主体の隠れた心理状態ではありません。
  why_needed:
    zh: 将期望状态与工作定义和运行活动分开，才能追踪目标为何被采纳、如何细化以及哪些计划或执行真正实现它。
    en: Separating desired states from work definitions and runtime activities makes it possible to trace why a goal was adopted, how it was refined, and which plans or executions actually realize it.
    ja: 望ましい状態を作業定義と実行活動から分けることで、目標の採用理由、詳細化、実現する計画・実行を追跡できます。
  includes:
    - zh: 高层期望状态、可测量目标，以及主体在明确范围内作出的行动承诺。
      en: High-level desired states, measurable objectives, and actor commitments made within an explicit scope.
      ja: 高水準の望ましい状態、測定可能な目標、明示範囲内の主体の行為コミットメント。
  excludes:
    - zh: 实现路径 TaskPlan、可执行工作 Task、实际 Execution，以及从文本分类得到的 NLU 标签。
      en: A realizing TaskPlan, executable Task, actual Execution, and an NLU label inferred from text.
      ja: 実現経路の TaskPlan、実行可能な Task、実際の Execution、テキスト分類による NLU ラベル。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      规划入口把 IntentionalEntity 投影为 OpenAI Agents SDK Agent instructions 或 LangGraph 规划节点的 system
      上下文，但本体存储仍保持独立 revision。TaskPlan 的 planning_basis 只保存引用摘要；Execution 成功或 A2A
      TASK_STATE_COMPLETED 不得反向改写 intentional_entity_id 所标识的期望状态。
    en: >-
      A planning entrypoint projects IntentionalEntity into OpenAI Agents SDK Agent instructions or LangGraph planner-node
      system context while ontology storage keeps an independent revision. TaskPlan planning_basis retains reference digests
      only; Execution success or A2A TASK_STATE_COMPLETED must not rewrite the desired state identified by
      intentional_entity_id.
    ja: >-
      planning entrypoint は IntentionalEntity を OpenAI Agents SDK Agent instructions または LangGraph planner-node system
      context に投影するが、ontology 保存は独立 revision を保つ。TaskPlan planning_basis は reference digest のみ保持する。
      Execution 成功や A2A TASK_STATE_COMPLETED は intentional_entity_id が識別する desired state を逆書きしてはならない。
  typical_input:
    - description:
        zh: 产品或策略层采纳的期望状态声明及其 revision。
        en: An adopted desired-state declaration and revision from product or policy layers.
        ja: product または policy 層が採用した desired-state declaration と revision。
      format: |-
        {"intentional_entity_id":"intent:release-approval-2026-07","revision":"1","statement_kind":"commitment","scope_ref":"release:2026-07","valid_from":"2026-07-16T08:00:00Z"}
  typical_output:
    - description:
        zh: 被 TaskPlan planning_basis 或 planning Agent 引用的意向实体引用。
        en: An intentional-entity reference carried by TaskPlan planning_basis or a planning Agent.
        ja: TaskPlan planning_basis または planning Agent が保持する intentional-entity reference。
      format: |-
        {"planning_basis":{"goal_ref":"goal:release-2026-07","intent_ref":"intent:release-approval-2026-07@1"},"planner_agent":"release-planner"}
  reference_implementations:
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents static instructions derived from planning intent without storing runtime outcomes.
    - name: W3C PROV-O Plan
      url: https://www.w3.org/TR/prov-o/#Plan
      description: Separates intended entities from activities that realize them.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents planner nodes whose outputs are graph structure, not rewritten intent records.
  source_claims:
    - claim-intentional-entity-002
    - claim-intentional-entity-010
structure:
  identity_keys:
    - intentional_entity_id
    - revision
  fields:
    - id: intentional_entity_id
      labels:
        zh: 意图实体标识
        en: intentional-entity ID
        ja: 意図的実体 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一个尚待实现的期望状态规范，使其与实现活动、执行者和观测结果保持独立。
        en: Stably identifies a desired-state specification that remains distinct from realizing activities, performers, and observed outcomes.
        ja: 未実現の望ましい状態仕様を安定して識別し、実現活動・実行者・観測結果から分離します。
      allowed_values: []
      pattern: ^intentional-[A-Za-z0-9._:-]+$
      example_value: intentional-reconcile-ledger
      source_claims:
        - claim-intentional-entity-002
    - id: revision
      labels:
        zh: 意图实体修订
        en: intentional-entity revision
        ja: 意図的実体リビジョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识期望状态、适用主体范围或有效期发生规范性变化后形成的不可变版本。
        en: Identifies an immutable version created when the desired state, subject scope, or validity interval changes normatively.
        ja: 望ましい状態・主体範囲・有効期間の規範的変更時に作成される不変版を識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
      example_value: "2"
      source_claims:
        - claim-intentional-entity-003
    - id: desired_state
      labels:
        zh: 期望状态
        en: desired state
        ja: 望ましい状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 描述主体希望、采纳或承诺追求的世界状态，不写入实现步骤、当前进度或实际测量值。
        en: Describes a world state a subject desires, adopts, or commits to pursue without embedding implementation steps, current progress, or measured values.
        ja: 主体が望み・採用し・追求を約束する世界状態を記述し、実装手順・進捗・実測値は埋め込みません。
      allowed_values: []
      pattern: null
      example_value: Every posted ledger difference has an accepted explanation or a correction entry.
      source_claims:
        - claim-intentional-entity-004
    - id: subject_scope
      labels:
        zh: 主体范围
        en: subject scope
        ja: 主体範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定该期望状态适用于哪个组织、会话、任务或受益方，避免把局部目标误读为全局目标。
        en: Delimits the organization, session, task, or beneficiary to which the desired state applies so a local objective is not read as global.
        ja: 望ましい状態が適用される組織・session・task・beneficiary を定め、局所目標を全体目標と誤読しません。
      allowed_values: []
      pattern: null
      example_value:
        organization_ref: finance-emea
        task_ref: reconcile-q2
      source_claims:
        - claim-intentional-entity-005
    - id: valid_from
      labels:
        zh: 有效起点
        en: valid from
        ja: 有効開始
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该意图实体修订开始可被承诺、规划或评估的时间。
        en: Records when this intentional-entity revision becomes available for commitment, planning, or evaluation.
        ja: この意図的実体リビジョンを commitment・planning・evaluation に使用できる開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-01T00:00:00Z
      source_claims:
        - claim-intentional-entity-006
    - id: valid_until
      labels:
        zh: 有效终点
        en: valid until
        ja: 有効終了
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该意图实体修订停止用于新承诺和计划的时间；为空不表示已实现。
        en: Records when this intentional-entity revision stops being usable for new commitments and plans; absence does not mean it has been achieved.
        ja: 新規 commitment・plan への使用終了時刻を記録し、未設定は達成済みを意味しません。
      allowed_values: []
      pattern: null
      example_value: 2026-12-31T23:59:59Z
      source_claims:
        - claim-intentional-entity-007
  constraints:
    - id: intentional-entity-valid-interval
      severity: error
      expression_language: plain
      expression: valid_until is absent or valid_until > valid_from
      explanations:
        zh: 意图实体的失效时间必须晚于其生效时间。
        en: An intentional entity must expire after it becomes valid.
        ja: 意図的実体の終了時刻は開始時刻より後でなければなりません。
      source_claims:
        - claim-intentional-entity-008
  required_relation_constraints: []
examples:
  - id: IntentionalEntity-example-positive-manual-001
    labels:
      zh: IntentionalEntity positive
      en: IntentionalEntity positive
      ja: IntentionalEntity positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 IntentionalEntity 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for IntentionalEntity via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が IntentionalEntity 多段推論を誘発；GSM8K 精度向上。
    field_values: {intentional_entity_id: intentional-permit-cycle-time, revision: 1, desired_state: "The average permit-processing time is no more than three days during the quarter."}

    related_node_ids:
      - IntentionalEntity
    related_relation_ids: []
    source_claims:
      - claim-intentional-entity-009

  - id: IntentionalEntity-example-boundary-manual-001
    labels:
      zh: IntentionalEntity boundary
      en: IntentionalEntity boundary
      ja: IntentionalEntity boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 IntentionalEntity 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not IntentionalEntity static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで IntentionalEntity 静的 TaskPlan ではない。
    field_values: {}

    related_node_ids:
      - IntentionalEntity
    related_relation_ids: []
    source_claims:
      - claim-intentional-entity-010

  - id: IntentionalEntity-example-counterexample-confusable
    labels:
      zh: IntentionalEntity counterexample
      en: IntentionalEntity counterexample
      ja: IntentionalEntity counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 IntentionalEntity。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style IntentionalEntity.
      ja: module dispatch なし直接回答は MRKL 式 IntentionalEntity にならない。
    field_values: {intentional_entity_id: absent, revision: absent, utterance: "fix the report"}

    related_node_ids:
      - IntentionalEntity
      - Intent
      - Goal
    related_relation_ids: []
    source_claims:
      - claim-intentional-entity-009

  - id: IntentionalEntity-example-instance-concrete
    labels:
      zh: IntentionalEntity instance
      en: IntentionalEntity instance
      ja: IntentionalEntity instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 IntentionalEntity 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable IntentionalEntity instance.
      ja: ReAct 实例 Thought→Action Search→Observation が IntentionalEntity 監査实例に写像。
    field_values: {intentional_entity_id: intentional-permit-cycle-time, revision: 1, desired_state: "The average permit-processing time is no more than three days during the quarter."}

    related_node_ids:
      - IntentionalEntity
    related_relation_ids: []
    source_claims:
      - claim-intentional-entity-009

