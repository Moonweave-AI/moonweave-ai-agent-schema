    source_claims: []
source_claims:
  - id: claim-intentional-entity-001
    source: lit-mas-oasis-v2
    supports: OASIS v2 models agents through commitments, goals, behaviours, tasks, and plans. Moonweave groups desired-state and commitment specifications under IntentionalEntity while keeping plans and executions separate.
    locator: OASIS v2 paper > agent templates, commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-002
    source: lit-mas-oasis-v2
    supports: OASIS v2 distinguishes goals and commitments from concrete agent behavior; Moonweave gives the intentional specification its own stable identity.
    locator: OASIS v2 paper > agent templates, commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-intentional-entity-003
    source: lit-mas-oasis-v2
    supports: OASIS v2 models intentional and commitment information separately from occurrences; Moonweave versions changes without rewriting prior plan references.
    locator: OASIS v2 paper > agent templates, commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-004
    source: lit-planning-ontology-2023
    supports: The planning ontology represents goals as desired states distinct from actions and plan ordering, grounding Moonweave's desired-state field.
    locator: Planning Ontology paper > goals, actions, ordering constraints, and plan structure
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-intentional-entity-005
    source: lit-mas-oasis-v2
    supports: OASIS v2 relates goals and commitments to agent and organization contexts; Moonweave makes that applicability scope explicit.
    locator: OASIS v2 paper > agents, organizations, commitments, goals, and tasks
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-006
    source: lit-mas-oasis-v2
    supports: Moonweave adds a valid-time boundary so plans and commitments reference the intentional specification effective when they were formed.
    locator: OASIS v2 paper > commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-007
    source: lit-mas-oasis-v2
    supports: Moonweave separates specification validity from achievement state so retiring a desired-state revision does not assert that it was realized.
    locator: OASIS v2 paper > commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-008
    source: lit-mas-oasis-v2
    supports: This interval rule is a Moonweave integrity inference for versioned goals, objectives, and commitments.
    locator: OASIS v2 paper > commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-009
    source: lit-mas-oasis-v2
    supports: OASIS v2 separates agent goals and commitments from task and plan descriptions; this case is desired-state information before work decomposition.
    locator: OASIS v2 paper > agent templates, commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-intentional-entity-010
    source: lit-mas-oasis-v2
    supports: OASIS commitment and goal constructs concern agent commitments and desired states, not generic natural-language intent labels.
    locator: OASIS v2 paper > agent templates, commitments, behaviours, goals, tasks, and plans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
