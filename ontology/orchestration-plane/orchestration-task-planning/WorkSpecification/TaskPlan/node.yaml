schema: moonweave.ai/ontology-node/v1
id: TaskPlan
kind: concept
status: review
labels:
  zh: 任务计划
  en: task plan
  ja: タスク計画
semantics:
  short_definition:
    zh: 任务计划是把工作规约组织成可执行依赖图的版本化规约。
    en: A task plan is a versioned specification that organizes work specifications into an executable dependency graph.
    ja: タスク計画は、作業仕様を実行可能な依存グラフへ編成する版管理された仕様です。
  definition:
    zh: TaskPlan 是一种 WorkSpecification，其种差是把 Task、TaskStep、WorkItem、TaskDependency 和 TaskCondition 组织为一个有版本的依赖图，明确顺序、分支、汇合和分配结构。它是执行安排的规范，不是单个 Task，也不是某次图运行的 Execution。
    en: A TaskPlan is a WorkSpecification distinguished by organizing Tasks, TaskSteps, WorkItems, TaskDependencies, and TaskConditions into a versioned dependency graph with explicit ordering, branching, joins, and allocation structure. It is a normative execution arrangement, not one Task and not an Execution occurrence of the graph.
    ja: TaskPlan は、Task、TaskStep、WorkItem、TaskDependency、TaskCondition を、順序・分岐・合流・割当構造が明示された版管理付き依存グラフへ編成する WorkSpecification です。単一の Task でも、グラフの一回の Execution でもなく、実行配置の規範です。
  why_needed:
    zh: 计划作为独立且不可变的版本，可在执行前检查环路、缺失依赖与授权，并在变更时保留每次运行采用的确切计划。
    en: Keeping a plan as an independently versioned immutable specification permits cycle, dependency, and authorization checks before execution and preserves the exact plan used by each run after later changes.
    ja: 計画を独立した不変バージョンとして保つことで、実行前に循環・依存欠落・権限を検査し、後の変更後も各実行が用いた正確な計画を保存できます。
  includes:
    - zh: 计划标识与版本、计划治理状态，以及通过关系连接的步骤、任务、分配包、依赖条件、分支和汇合。
      en: Plan identity and version, governance state, and related steps, tasks, allocation packages, dependency conditions, branches, and joins.
      ja: 計画識別子と版、ガバナンス状態、関係で結ばれるステップ・タスク・割当パッケージ・依存条件・分岐・合流を含みます。
  excludes:
    - zh: 一次图运行的当前节点、检查点、开始结束时间与输出；这些属于 Execution、RunState 或 Checkpoint。
      en: The current node, checkpoint, start and end times, and outputs of a graph run; those belong to Execution, RunState, or Checkpoint.
      ja: グラフ実行の現在ノード、チェックポイント、開始終了時刻、出力は含まず、Execution、RunState、Checkpoint に属します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: planning_basis
      labels:
        zh: 规划依据
        en: planning basis
        ja: 計画根拠
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录用于形成计划的 Goal、Objective、假设和输入版本摘要，但语义连接仍由显式关系表达。
        en: Records the Goal, Objective, assumptions, and input-version digest used to form the plan while semantic links remain explicit relations.
        ja: 計画形成に用いた Goal・Objective・仮定・入力版要約を記録し、意味的接続は明示関係で表します。
      allowed_values: []
      pattern: null
      example_value:
        goal_id: goal-release-safe
        objective_ids:
          - objective-zero-critical-findings
        input_digest: sha256:plan-basis-3
      source_claims:
        - claim-task-plan-002
    - id: change_rationale
      labels:
        zh: 变更理由
        en: change rationale
        ja: 変更理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释相对前版增加、删除或重排节点与边的原因，以支持人工审查。
        en: Explains why nodes or edges were added, removed, or reordered relative to the prior version for human review.
        ja: 前版からノードや辺を追加・削除・再配置した理由を説明し、人手審査を支援します。
      allowed_values: []
      pattern: null
      example_value: Split package verification from release approval and add an explicit approval dependency.
      source_claims:
        - claim-task-plan-003
  constraints:
    - id: task-plan-dependency-graphs-acyclic
      severity: error
      expression_language: plain
      expression: Task, TaskStep, and WorkItem depends_on subgraphs are acyclic within this TaskPlan version
      explanations:
        zh: 任务、步骤和分配依赖都必须无环；循环控制属于 Route、Gate 或 Retry。
        en: Task, TaskStep, and WorkItem dependency graphs are acyclic; Route, Gate, or Retry owns cyclic control.
        ja: Task・TaskStep・WorkItem の依存グラフは非循環で、循環制御は Route・Gate・Retry が所有します。
      source_claims:
        - claim-task-plan-004
    - id: task-plan-step-task-closure
      severity: error
      expression_language: plain
      expression: every contained TaskStep is the target of exactly one Task-decomposes_into-TaskStep edge from a Task specified by this TaskPlan
      explanations:
        zh: 计划中的每个步骤必须归属一个被同一计划规定的 Task，不能成为无任务来源的孤立步骤。
        en: Every plan step belongs to exactly one Task specified by the same plan and cannot be an orphan step with no Task origin.
        ja: 計画内の各ステップは同じ計画が指定する一つの Task に属し、Task 起源のない孤立ステップにはできません。
      source_claims:
        - claim-task-plan-005
  required_relation_constraints:
    - id: task-plan-specifies-task
      direction: outgoing
      predicate: specifies
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 任务计划至少规定一个稳定 Task 作为实现范围。
        en: A TaskPlan specifies at least one stable Task in its realization scope.
        ja: TaskPlan は実現範囲として少なくとも一つの安定した Task を指定します。
      source_claims:
        - claim-task-plan-006
    - id: task-plan-contains-step
      direction: outgoing
      predicate: contains_step
      target_concept_id: TaskStep
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 可执行任务计划至少包含一个具备输入—动作—输出合同的步骤。
        en: An executable TaskPlan contains at least one step with an input-action-output contract.
        ja: 実行可能 TaskPlan は入出力・動作契約を持つステップを少なくとも一つ含みます。
      source_claims:
        - claim-task-plan-007
examples:
  - id: TaskPlan-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务计划正例
      en: Positive example for task plan
      ja: タスク計画の正例
    scenario_id: null
    descriptions:
      zh: plan-release-12 v3 含 verify、package、approve 三个 TaskStep，两项 WorkItem 以及 approve 成功后才能 package 的显式依赖边。
      en: plan-release-12 v3 contains verify, package, and approve TaskSteps, two WorkItems, and an explicit dependency requiring approve to succeed before package starts.
      ja: plan-release-12 v3 は verify・package・approve の三つの TaskStep、二つの WorkItem、approve 成功後に package を開始する明示依存辺を含みます。
    field_values:
      planning_basis:
        goal_id: goal-release-safe
        objective_ids:
          - objective-zero-critical-findings
        input_digest: sha256:plan-basis-3
      change_rationale: Split package verification from release approval and add an explicit approval dependency.
      work_specification_id: plan-release-12
      revision: "3"
      intended_transformation: organize verification, approval, and packaging into an executable release plan
      input_contract_refs:
        - release-candidate@12
        - release-policy@3
      output_contract_refs:
        - approved-release-package@3
      acceptance_basis_ref: safe-release-plan-acceptance@3
      applicability_boundary:
        release_id: release-12
        environment: production
    related_node_ids:
      - TaskPlan
      - WorkSpecification
      - TaskStep
      - WorkItem
    related_relation_ids:
      - TaskPlan-is_a-WorkSpecification
      - TaskPlan-contains_step-TaskStep
      - TaskPlan-contains_work_item-WorkItem
    expected_result:
      zh: 该对象是 TaskPlan；执行器可验证其依赖图，再创建实现该版本的 Execution。
      en: The object is a TaskPlan whose dependency graph can be validated before an Execution realizes that version.
      ja: この対象は TaskPlan であり、依存グラフを検証した後、その版を実現する Execution を作成できます。
    why_valid_or_invalid:
      zh: 它组织多个工作规范、顺序和分配关系，并以版本标识保持安排的稳定身份。
      en: It organizes multiple work specifications, ordering, and allocation relations and gives that arrangement a stable versioned identity.
      ja: 複数の作業仕様、順序、割当関係を編成し、その配置へ安定した版付き同一性を与えるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-plan-008
  - id: TaskPlan-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务计划边界例
      en: Boundary case for task plan
      ja: タスク計画の境界例
    scenario_id: null
    descriptions:
      zh: execution-plan-release-12-v3 记录当前停在 approve、checkpoint 44、开始时间和重试计数。
      en: execution-plan-release-12-v3 records that the graph is currently paused at approve with checkpoint 44, a start time, and a retry count.
      ja: execution-plan-release-12-v3 は、グラフが approve で停止中であること、checkpoint 44、開始時刻、再試行回数を記録します。
    field_values:
      work_specification_id: plan-release-runtime-state
      revision: 3-running
      planning_basis:
        execution_id: execution-plan-release-12-v3
        checkpoint_id: checkpoint-44
      change_rationale: Current node is approve and retry count is two.
    related_node_ids:
      - TaskPlan
      - WorkSpecification
    related_relation_ids:
      - TaskPlan-is_a-WorkSpecification
    expected_result:
      zh: 该记录是计划的一次 Execution 状态，不是 TaskPlan 本身。
      en: The record is the state of one Execution of a plan, not the TaskPlan itself.
      ja: この記録は計画の一回の Execution 状態であり、TaskPlan 自体ではありません。
    why_valid_or_invalid:
      zh: 当前节点和检查点会随运行推进而变化，而同一 TaskPlan 版本必须保持不可变。
      en: Current node and checkpoint change as a run advances, whereas one TaskPlan version must remain immutable.
      ja: 現在ノードとチェックポイントは実行進行で変化しますが、同じ TaskPlan 版は不変でなければならないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-plan-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaskStep
    shared_parent_concept_id: WorkSpecification
    differentia:
      zh: 共享父节点对照：父节点 WorkSpecification：TaskPlan（semantic kind=specification，骨架 TaskPlan-is_a-WorkSpecification）；TaskStep（semantic kind=specification，骨架 TaskStep-is_a-WorkSpecification）。双端条件：TaskPlan 条件：“任务计划属于工作规约，区别于其他同类对象的条件是：它把目标组织为有序任务、工作项、依赖、约束和完成准则，使委派与审计有明确结构”；TaskStep 条件：“任务步骤是以如下事实为区分特征的工作规约：它规定顺序、依赖、负责人、完成证据以及可选的调用计划；它不执行工具调用，执行身份由 ToolCall 与 ToolCallAttempt 承担”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent WorkSpecification: TaskPlan (semantic kind=specification, backbone TaskPlan-is_a-WorkSpecification); TaskStep (semantic kind=specification, backbone TaskStep-is_a-WorkSpecification). Endpoint conditions: TaskPlan condition: “Task plan is a work specification whose defining condition is that it organizes a goal into ordered tasks, work items, dependencies, constraints, and completion criteria that can be delegated and audited”; TaskStep condition: “Task step is a work specification; its differentiating condition is that it specifies ordering, dependencies, owner, completion evidence, and an optional invocation plan; it does not execute a tool call, whose execution identity belongs to ToolCall and ToolCallAttempt”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 WorkSpecification：TaskPlan（semantic kind=specification、バックボーン TaskPlan-is_a-WorkSpecification）；TaskStep（semantic kind=specification、バックボーン TaskStep-is_a-WorkSpecification）。両端条件：TaskPlan の条件：「タスク計画は作業仕様のうち、次の事実を定義条件とする対象です：それは目標を順序付きタスク、作業項目、依存、制約、完了基準へ整理し、委任と監査の構造を与えます」；TaskStep の条件：「タスクステップは作業仕様の一種であり、次の条件で区別されます：タスク手順は順序、依存、担当者、完了証拠、任意の呼出し計画を規定します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-task-plan-010
parent_relation:
  id: TaskPlan-is_a-WorkSpecification
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TaskPlan —is_a→ WorkSpecification 表示任务计划是一种规范性工作结构，其种差是把多个任务、步骤、依赖和分配组织为版本化依赖图。
    en: TaskPlan —is_a→ WorkSpecification classifies a task plan as normative work whose differentia is organizing multiple tasks, steps, dependencies, and allocations into a versioned dependency graph.
    ja: TaskPlan —is_a→ WorkSpecification は、複数のタスク・ステップ・依存・割当を版管理付き依存グラフへ編成する種差を持つ規範的作業として計画を分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TaskPlan-is_a-WorkSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: plan-release-12 v3 规定步骤、分支、依赖和工作项分配，且没有运行检查点。
        en: plan-release-12 v3 specifies steps, branches, dependencies, and WorkItem allocations and contains no runtime checkpoint.
        ja: plan-release-12 v3 はステップ・分岐・依存・WorkItem 割当を定め、実行チェックポイントを含みません。
      field_values: {}
      related_node_ids:
        - TaskPlan
        - WorkSpecification
      related_relation_ids:
        - TaskPlan-is_a-WorkSpecification
      expected_result:
        zh: 该对象既是 TaskPlan，也是 WorkSpecification。
        en: The object is both TaskPlan and WorkSpecification.
        ja: この対象は TaskPlan であり WorkSpecification でもあります。
      why_valid_or_invalid:
        zh: 它规范组织尚待实现的工作，而不是记录一次已发生运行。
        en: It normatively organizes work yet to be realized rather than recording one occurrence.
        ja: 未実現の作業を規範的に編成し、一回の発生を記録しないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-plan-011
    - id: TaskPlan-is_a-WorkSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: run-plan-12 记录当前节点、检查点、失败时间和重试次数。
        en: run-plan-12 records the current node, checkpoint, failure time, and retry count.
        ja: run-plan-12 は現在ノード、チェックポイント、失敗時刻、再試行回数を記録します。
      field_values: {}
      related_node_ids:
        - TaskPlan
        - WorkSpecification
      related_relation_ids:
        - TaskPlan-is_a-WorkSpecification
      expected_result:
        zh: 该运行对象不是 TaskPlan，也不通过此边成为 WorkSpecification。
        en: The run object is not TaskPlan and does not become WorkSpecification through this edge.
        ja: この実行対象は TaskPlan ではなく、この辺で WorkSpecification にもなりません。
      why_valid_or_invalid:
        zh: 其身份由具体运行进度和结果决定，不是版本化规范图。
        en: Its identity comes from concrete run progress and outcome rather than a versioned normative graph.
        ja: 同一性が版管理付き規範グラフではなく、具体的実行進捗と結果で決まるためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-plan-012
  source_claims:
    - claim-task-plan-013
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: has_control_topology
    predicate: has_control_topology
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: has control topology
      en: has control topology
      ja: has control topology
    definitions:
      zh: TaskPlan —has_control_topology→ OrchestrationTopology 表示任务计划采用某个路由、分支、汇合与循环控制结构来调度步骤；该边不声明计划包含拓扑节点本体。
      en: TaskPlan —has_control_topology→ OrchestrationTopology states that a plan adopts a routing structure of branches, joins, and loops to control step scheduling; it does not assert that the plan taxonomically contains the topology object.
      ja: TaskPlan —has_control_topology→ OrchestrationTopology は、分岐・合流・ループからなるルーティング構造をステップ制御に採用することを示し、計画がトポロジ対象を分類的に包含するとは述べません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_has_control_topology
      labels:
        zh: 反向：has control topology
        en: is target of has control topology
        ja: 逆方向：has control topology
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: has_control_topology-example-positive-manual-001
        kind: positive
        labels:
          zh: has control topology正例
          en: Positive example for has control topology
          ja: has control topologyの正例
        scenario_id: null
        descriptions:
          zh: plan-triage-4 采用 topology-review-fanout：三个审查步骤并行，全部汇合后才允许发布。
          en: "plan-triage-4 adopts topology-review-fanout: three review steps run concurrently and all join before release."
          ja: plan-triage-4 は topology-review-fanout を採用し、三つの審査ステップを並列実行して全て合流後に公開します。
        field_values: {}
        related_node_ids:
          - TaskPlan
          - OrchestrationTopology
        related_relation_ids:
          - has_control_topology
        expected_result:
          zh: 记录 has_control_topology，供执行器解释分支与汇合规则。
          en: Record has_control_topology so the executor can interpret branch and join rules.
          ja: has_control_topology を記録し、実行器が分岐・合流規則を解釈できるようにします。
        why_valid_or_invalid:
          zh: 拓扑对象明确规定步骤间控制流，而不是仅列出计划内容。
          en: The topology explicitly defines control flow between steps rather than merely listing plan contents.
          ja: トポロジ対象が計画内容の列挙ではなく、ステップ間制御流を明示するためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-task-plan-014
      - id: has_control_topology-example-boundary-manual-001
        kind: boundary
        labels:
          zh: has control topology边界例
          en: Boundary case for has control topology
          ja: has control topologyの境界例
        scenario_id: null
        descriptions:
          zh: plan-flat-2 只按数组保存三个步骤，未声明边、分支、汇合或循环。
          en: plan-flat-2 stores three steps in an array but declares no edges, branches, joins, or loops.
          ja: plan-flat-2 は三つのステップを配列保存するだけで、辺・分岐・合流・ループを宣言しません。
        field_values: {}
        related_node_ids:
          - TaskPlan
          - OrchestrationTopology
        related_relation_ids:
          - has_control_topology
        expected_result:
          zh: 不能从数组顺序推断 has_control_topology。
          en: Do not infer has_control_topology from array order alone.
          ja: 配列順だけから has_control_topology を推論しません。
        why_valid_or_invalid:
          zh: 展示顺序没有足够语义区分串行、并行或条件路由。
          en: Presentation order lacks the semantics needed to distinguish sequential, concurrent, or conditional routing.
          ja: 表示順には直列・並列・条件ルーティングを区別する意味が不足するためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-task-plan-015
    source_claims:
      - claim-task-plan-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:OrchestrationTopology
  - id: TaskPlan-contains_step-TaskStep
    predicate: contains_step
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: contains step
      en: contains step
