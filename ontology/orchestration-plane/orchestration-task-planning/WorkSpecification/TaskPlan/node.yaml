schema: moonweave.ai/ontology-node/v1
id: TaskPlan
kind: concept
labels:
  zh: 任务计划
  en: task plan
  ja: タスク計画
semantics:
  short_definition:
    zh: 把工作规约组织成可执行依赖图的版本化 WorkSpecification。
    en: A versioned WorkSpecification organizing work specs into an executable dependency graph.
    ja: 作業仕様を実行可能依存グラフへ編成する版管理 WorkSpecification です。
  definition:
    zh: TaskPlan 是 WorkSpecification 的特化，把 Task、TaskStep、WorkItem、TaskDependency 与 TaskCondition 组织为有版本的依赖图，明确顺序、分支、汇合与分配结构；它是执行安排的规范，不是单个 Task 也不是图运行的 Execution。映射：OpenAI o1 等模型的 chain-of-thought 规划输出；Cursor .plan.md 计划文件；LangGraph StateGraph 编译前的规范拓扑。
    en: TaskPlan specializes WorkSpecification by organizing Tasks, TaskSteps, WorkItems, TaskDependencies, and TaskConditions into a versioned dependency graph with ordering, branching, joins, and allocation. It is normative execution arrangement, not one Task or a graph Execution. Maps to OpenAI o1 chain-of-thought planning output, Cursor .plan.md plan files, and pre-compile LangGraph StateGraph topology.
    ja: TaskPlan は Task/TaskStep/WorkItem/TaskDependency/TaskCondition を版管理依存グラフへ編成する WorkSpecification 特化です。OpenAI o1 計画、Cursor plan ファイル、LangGraph トポロジに写像されます。
  why_needed:
    zh: 独立且不可变的计划版本可在执行前检查环路、缺失依赖与授权，并在变更后保留每次运行采用的确切计划。
    en: Independently versioned immutable plans permit cycle, dependency, and authorization checks before execution and preserve the exact plan each run used after later changes.
    ja: 独立不変計画版により実行前検査と各実行が用いた正確な計画の保存が可能です。
  includes:
    - zh: 计划标识与版本、planning_basis、变更理由，以及步骤、任务、分配包、依赖条件、分支与汇合关系。
      en: Plan identity and version, planning_basis, change rationale, and related steps, tasks, allocations, dependency conditions, branches, and joins.
      ja: 計画 ID/版、planning_basis、変更理由、ステップ/タスク/割当/依存/分岐/合流。
  excludes:
    - zh: 一次图运行的当前节点、检查点、开始结束时间与输出；这些属于 Execution、RunState 或 Checkpoint。
      en: Current node, checkpoint, start/end times, and outputs of a graph run; those belong to Execution, RunState, or Checkpoint.
      ja: グラフ実行の現在ノード、チェックポイント、開始終了、出力（Execution/RunState/Checkpoint）。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Cursor plan 文件与 OpenAI o1 推理链中的步骤列表应解析为 TaskPlan revision，其中每步为 TaskStep，边为 TaskDependency 或 OrchestrationTopology。LangGraph builder 编译前可 round-trip TaskPlan→StateGraph；Execution 记录 realizes 所采用的 plan revision。planning_basis 引用 Goal/Objective 但不替代 elaborated_by 关系。
    en: Cursor plan files and OpenAI o1 reasoning step lists parse into TaskPlan revisions with TaskStep nodes and TaskDependency or OrchestrationTopology edges. LangGraph builders may round-trip TaskPlan→StateGraph before compile; Execution records which plan revision was realized. planning_basis references Goal/Objective without replacing elaborated_by relations.
    ja: Cursor plan/OpenAI o1 ステップを TaskPlan revision へ解析し、LangGraph コンパイル前に round-trip 可能にします。
  typical_input:
    - description: OpenAI o1 style multi-step plan text.
      format: |
        Plan:
        1. Gather ledger snapshot
        2. Run reconciliation
        3. Produce signed report
      source_claims: [claim-tplan-openai]
    - description: Cursor markdown plan file.
      format: |
        # Release plan v3
        - verify signature (step 1)
        - approve release (step 2, depends on verify)
      source_claims: [claim-tplan-design]
  typical_output:
    - description: Versioned task plan specification.
      format: |
        {
          "work_specification_id": "plan-release-12",
          "revision": "3",
          "planning_basis": {"goal_id": "goal-release-safe"}
        }
      source_claims: [claim-tplan-design]
  reference_implementations:
    - name: OpenAI
      url: https://platform.openai.com/docs/
      description: o1 chain-of-thought planning.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: StateGraph topology before compile.
    - name: Cursor
      url: https://cursor.com
      description: Plan markdown files.
structure:
  identity_keys: []
  fields:
    - id: planning_basis
      labels: {zh: 规划依据, en: planning basis, ja: 計画根拠}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录形成计划的 Goal、Objective、假设和输入版本摘要；语义连接仍由显式关系表达。
        en: Goal, Objective, assumptions, and input-version digest used to form the plan; semantic links remain explicit relations.
        ja: 計画形成に用いた Goal/Objective/仮定/入力版要約（意味接続は明示関係）。
      example_value: {goal_id: goal-release-safe, objective_ids: [objective-zero-critical-findings], input_digest: sha256:plan-basis-3}
      source_claims: [claim-tplan-design]
    - id: change_rationale
      labels: {zh: 变更理由, en: change rationale, ja: 変更理由}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 解释相对前版增加、删除或重排节点与边的原因，以支持人工审查。
        en: Why nodes or edges were added, removed, or reordered relative to the prior version for human review.
        ja: 前版からノード/辺を追加・削除・再配置した理由。
      example_value: Split package verification from release approval and add an explicit approval dependency.
      source_claims: [claim-tplan-design]
  constraints:
    - id: task-plan-dependency-graphs-acyclic
      severity: error
      expression_language: plain
      expression: Task, TaskStep, and WorkItem depends_on subgraphs are acyclic within this TaskPlan version
      explanations:
        zh: 任务、步骤和分配依赖都必须无环；循环控制属于 Route、Gate 或 Retry。
        en: Task, TaskStep, and WorkItem dependency graphs are acyclic; Route, Gate, or Retry owns cyclic control.
        ja: 依存グラフは非循環で、循環制御は Route/Gate/Retry が担当します。
      source_claims: [claim-tplan-langgraph]
    - id: task-plan-step-task-closure
      severity: error
      expression_language: plain
      expression: every contained TaskStep is the target of exactly one Task-decomposes_into-TaskStep edge from a Task specified by this TaskPlan
      explanations:
        zh: 计划中的每个步骤必须归属一个被同一计划规定的 Task，不能成为无任务来源的孤立步骤。
        en: Every plan step belongs to exactly one Task specified by the same plan.
        ja: 各ステップは同一計画が指定する一 Task に属します。
      source_claims: [claim-tplan-design]
  required_relation_constraints:
    - id: task-plan-specifies-task
      direction: outgoing
      predicate: specifies
      target_concept_id: Task
      cardinality: {min: 1, max: null}
      explanations:
        zh: 任务计划至少规定一个稳定 Task 作为实现范围。
        en: A TaskPlan specifies at least one stable Task in its realization scope.
        ja: 少なくとも一つの安定 Task を指定します。
      source_claims: [claim-tplan-design]
    - id: task-plan-contains-step
      direction: outgoing
      predicate: contains_step
      target_concept_id: TaskStep
      cardinality: {min: 1, max: null}
      explanations:
        zh: 可执行任务计划至少包含一个具备输入—动作—输出合同的步骤。
        en: An executable TaskPlan contains at least one step with an input-action-output contract.
        ja: 入出力・動作契約を持つステップを少なくとも一つ含みます。
      source_claims: [claim-tplan-langgraph]
examples:
  - id: TaskPlan-cursor-release
    labels: {zh: Cursor 发布计划, en: Cursor release plan, ja: Cursor リリース計画}
    descriptions:
      zh: plan-release-12 v3 含 verify、package、approve 三个 TaskStep、两项 WorkItem 以及 approve 成功后才能 package 的显式依赖边。
      en: plan-release-12 v3 contains verify, package, and approve TaskSteps, two WorkItems, and an explicit dependency requiring approve before package.
      ja: plan-release-12 v3 は verify/package/approve ステップ、WorkItem、approve 後 package の依存を含みます。
    example_source: {product: Cursor, url: https://cursor.com, version: plan files}
    field_values:
      work_specification_id: plan-release-12
      revision: "3"
    related_node_ids: [TaskPlan, WorkSpecification, TaskStep, WorkItem]
    related_relation_ids: [TaskPlan-is_a-WorkSpecification, TaskPlan-contains_step-TaskStep, TaskPlan-contains_work_item-WorkItem]
    source_claims: [claim-tplan-design]
  - id: TaskPlan-o1-chain
    labels: {zh: o1 链式规划, en: o1 chain plan, ja: o1 連鎖計画}
    descriptions:
      zh: OpenAI o1 在修复 bug 前输出 gather-context、patch、test 三步计划；应物化为 TaskPlan revision 而非直接当作 Execution。
      en: OpenAI o1 outputs gather-context, patch, and test steps before bug fix; materialize as TaskPlan revision rather than Execution.
      ja: OpenAI o1 の gather-context/patch/test 三步骤は TaskPlan revision として具体化します。
    example_source: {product: OpenAI, url: https://platform.openai.com/docs/, version: o1 reasoning}
    field_values:
      planning_basis: {goal_id: goal-fix-regression}
    related_node_ids: [TaskPlan, TaskStep]
    related_relation_ids: [TaskPlan-contains_step-TaskStep]
    source_claims: [claim-tplan-openai]
  - id: TaskPlan-boundary-runtime
    labels: {zh: 运行态不是计划, en: Runtime state is not plan, ja: 実行状態は計画ではない}
    descriptions:
      zh: execution-plan-release-12-v3 记录当前停在 approve、checkpoint 44 与重试计数；应建模 Execution 而非 TaskPlan。
      en: execution-plan-release-12-v3 records paused-at-approve, checkpoint 44, and retry count; model as Execution not TaskPlan.
      ja: checkpoint/再試行を記録する execution-plan-release-12-v3 は Execution です。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: plan versus execution}
    field_values: {}
    related_node_ids: [TaskPlan, Execution]
    related_relation_ids: []
    source_claims: [claim-tplan-design]
parent_relation:
  id: TaskPlan-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: TaskPlan 以组织多工作规范为依赖图的种差继承 WorkSpecification；运行进度不属于该继承链。
    en: TaskPlan inherits WorkSpecification with differentia of organizing multiple work specs into a dependency graph; run progress is excluded.
    ja: 複数作業仕様を依存グラフへ編成する WorkSpecification 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tplan-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: has_control_topology
    predicate: has_control_topology
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 具有控制拓扑, en: has control topology, ja: 制御トポロジを持つ}
    definitions:
      zh: 计划采用某个路由、分支、汇合与循环控制结构调度步骤；不声明计划分类包含拓扑节点本体。
      en: Plan adopts a routing structure of branches, joins, and loops to control step scheduling without taxonomic containment of topology.
      ja: 分岐・合流・ループのルーティング構造をステップ制御に採用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录可查询语义事实，不对所有实例施加统一基数。
      en: Records a queryable semantic fact without universal cardinality.
      ja: 検索可能な意味事実を記録し一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_has_control_topology
      labels: {zh: 反向：具有控制拓扑, en: is target of has control topology, ja: 逆方向：制御トポロジを持つ}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tplan-langgraph]
    layout_role: cross-link
    target: concept:OrchestrationTopology
  - id: TaskPlan-contains_step-TaskStep
    predicate: contains_step
    direction: source-to-target
    relation_kind: composition
    labels: {zh: 包含步骤, en: contains step, ja: ステップを含む}
    definitions:
      zh: 步骤是该计划版本的组成位置；修改步骤产生新计划版本，步骤不是 TaskPlan 的子类型。
      en: Step is a compositional position in this plan version; step changes create a new plan version without making TaskStep a subtype of TaskPlan.
      ja: ステップは計画版の構成位置で、変更は新計画版を作ります。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 1, max: null}
    inverse_reading:
      predicate: is_step_of
      labels: {zh: 属于计划, en: is step of, ja: 計画のステップである}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tplan-design]
    layout_role: cross-link
    target: concept:TaskStep
  - id: TaskPlan-specifies-Task
    predicate: specifies
    direction: source-to-target
    relation_kind: information
    labels: {zh: 规定任务, en: specifies, ja: タスクを規定する}
    definitions:
      zh: 声明该计划版本要实现或编排哪些稳定 Task；一个 Task 可被多个计划版本引用。
      en: Declares which stable Tasks this plan version realizes or orchestrates; one Task may appear in many plan versions.
      ja: この計画版が実現/編成する安定 Task を宣言します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 1, max: null}
    inverse_reading:
      predicate: is_specified_by
      labels: {zh: 由计划规定, en: is specified by, ja: 計画により規定される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tplan-design]
    layout_role: cross-link
    target: concept:Task
  - id: TaskPlan-contains_work_item-WorkItem
    predicate: contains_work_item
    direction: source-to-target
    relation_kind: composition
    labels: {zh: 包含工作项, en: contains work item, ja: 作業項目を含む}
    definitions:
      zh: 工作项是该计划版本内的分配包；重新分配产生新 WorkItem 或修订，而非改写 Task。
      en: WorkItem is an allocation package within this plan version; reassignment creates new WorkItem or revision without rewriting Task.
      ja: WorkItem は計画版内の割当パッケージで、再割当は Task を書き換えません。
    cardinality:
      source: {min: 0, max: 1}
      target: {min: 0, max: null}
    inverse_reading:
      predicate: is_work_item_of
      labels: {zh: 属于计划的工作项, en: is work item of, ja: 計画の作業項目である}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tplan-design]
    layout_role: cross-link
    target: concept:WorkItem
sources:
  - id: openai
    title: OpenAI Platform
    url: https://platform.openai.com/docs/
    source_type: official-doc
    relevance: o1 chain-of-thought planning output.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Graph topology and acyclic dependencies.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Sequential and hierarchical task processes.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TaskPlan versioning and closure constraints.
source_claims:
  - id: claim-tplan-openai
    source: openai
    supports: OpenAI o1 models emit explicit multi-step reasoning plans that can be materialized as versioned TaskPlan specifications before execution.
    locator: o1 reasoning models
    evidence_kind: official
    confidence: medium
  - id: claim-tplan-langgraph
    source: langgraph
    supports: LangGraph StateGraph represents multi-step work as typed nodes and directed acyclic edges suitable for TaskPlan topology.
    locator: StateGraph
    evidence_kind: official
    confidence: high
  - id: claim-tplan-design
    source: moonweave-design
    supports: Moonweave models pre-execution arrangement of tasks, steps, dependencies, and allocations as independently versioned TaskPlan.
    locator: TaskPlan concept boundary
    evidence_kind: design-inference
    confidence: high
