schema: moonweave.ai/ontology-node/v1
id: TaskPlan
kind: concept
labels:
  zh: 任务计划
  en: task plan
  ja: タスク計画
semantics:
  short_definition:
    zh: 任务计划是把工作规约组织成可执行依赖图的版本化规约。
    en: A task plan is a versioned specification that organizes work specifications into an executable dependency graph.
    ja: タスク計画は、作業仕様を実行可能な依存グラフへ編成する版管理された仕様です。
  definition:
    zh: TaskPlan 是一种 WorkSpecification，其种差是把 Task、TaskStep、WorkItem、TaskDependency 和 TaskCondition 组织为一个有版本的依赖图，明确顺序、分支、汇合和分配结构。它是执行安排的规范，不是单个 Task，也不是某次图运行的 Execution。
    en: A TaskPlan is a WorkSpecification distinguished by organizing Tasks, TaskSteps, WorkItems, TaskDependencies, and TaskConditions into a versioned dependency graph with explicit ordering, branching, joins, and allocation structure. It is a normative execution arrangement, not one Task and not an Execution occurrence of the graph.
    ja: TaskPlan は、Task、TaskStep、WorkItem、TaskDependency、TaskCondition を、順序・分岐・合流・割当構造が明示された版管理付き依存グラフへ編成する WorkSpecification です。単一の Task でも、グラフの一回の Execution でもなく、実行配置の規範です。
  why_needed:
    zh: 计划作为独立且不可变的版本，可在执行前检查环路、缺失依赖与授权，并在变更时保留每次运行采用的确切计划。
    en: Keeping a plan as an independently versioned immutable specification permits cycle, dependency, and authorization checks before execution and preserves the exact plan used by each run after later changes.
    ja: 計画を独立した不変バージョンとして保つことで、実行前に循環・依存欠落・権限を検査し、後の変更後も各実行が用いた正確な計画を保存できます。
  includes:
    - zh: 计划标识与版本、计划治理状态，以及通过关系连接的步骤、任务、分配包、依赖条件、分支和汇合。
      en: Plan identity and version, governance state, and related steps, tasks, allocation packages, dependency conditions, branches, and joins.
      ja: 計画識別子と版、ガバナンス状態、関係で結ばれるステップ・タスク・割当パッケージ・依存条件・分岐・合流を含みます。
  excludes:
    - zh: 一次图运行的当前节点、检查点、开始结束时间与输出；这些属于 Execution、RunState 或 Checkpoint。
      en: The current node, checkpoint, start and end times, and outputs of a graph run; those belong to Execution, RunState, or Checkpoint.
      ja: グラフ実行の現在ノード、チェックポイント、開始終了時刻、出力は含まず、Execution、RunState、Checkpoint に属します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      TaskPlan 编译为 LangGraph StateGraph：TaskStep 映射为 add_node，TaskDependency 映射为 add_edge 或
      conditional_edges 的前置结构。Agents SDK 多 Agent 编排把同一计划表达为 handoff 图或顺序 Runner 调用链。
      计划 revision 不可变；LangGraph checkpoint 与 A2A Task status 属于 Execution，不能回写 plan_revision。
    en: >-
      A TaskPlan compiles to a LangGraph StateGraph: TaskSteps map to add_node, TaskDependencies to add_edge or prerequisite
      structure for conditional_edges. Agents SDK multi-agent orchestration expresses the same plan as a handoff graph or
      sequential Runner call chain. Plan revision is immutable; LangGraph checkpoints and A2A Task status belong to Execution
      and must not rewrite plan_revision.
    ja: >-
      TaskPlan は LangGraph StateGraph にコンパイルされる。TaskStep は add_node、TaskDependency は add_edge または
      conditional_edges の prerequisite structure に対応する。Agents SDK multi-agent orchestration は同一 plan を handoff graph
      または sequential Runner call chain として表す。plan revision は不変。LangGraph checkpoint と A2A Task status は
      Execution に属し plan_revision を書き換えてはならない。
  typical_input:
    - description:
        zh: 由 Goal 与 Objective 生成的版本化依赖图规约。
        en: A versioned dependency-graph specification generated from a Goal and Objective.
        ja: Goal と Objective から生成された versioned dependency-graph specification。
      format: |-
        {"work_specification_id":"plan:ledger-reconcile-2026-07","revision":"v2","planning_basis":{"goal_ref":"goal:release-2026-07","objective_refs":["objective:zero-diff@1"]},"step_refs":["step:fetch","step:reconcile","step:report"],"dependency_refs":["dep:fetch-before-reconcile"]}
  typical_output:
    - description:
        zh: 编译器输出的 LangGraph 图定义或 Agents SDK 编排清单，不是一次运行检查点。
        en: A LangGraph graph definition or Agents SDK orchestration manifest from a compiler, not a run checkpoint.
        ja: compiler 出力の LangGraph graph definition または Agents SDK orchestration manifest。run checkpoint ではない。
      format: |-
        {"plan_ref":"plan:ledger-reconcile-2026-07","plan_revision":"v2","adapter":"langgraph","nodes":["fetch","reconcile","report"],"edges":[{"from":"fetch","to":"reconcile"}]}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents StateGraph, add_node, add_edge, and compilation separate from checkpointed execution.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents orchestrating multiple agents as an alternative plan implementation surface.
    - name: A2A Protocol life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents protocol task lifecycle kept distinct from local plan revisions.
  source_claims:
    - claim-task-plan-002
    - claim-task-plan-005
structure:
  identity_keys: []
  fields:
    - id: planning_basis
      labels:
        zh: 规划依据
        en: planning basis
        ja: 計画根拠
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录用于形成计划的 Goal、Objective、假设和输入版本摘要，但语义连接仍由显式关系表达。
        en: Records the Goal, Objective, assumptions, and input-version digest used to form the plan while semantic links remain explicit relations.
        ja: 計画形成に用いた Goal・Objective・仮定・入力版要約を記録し、意味的接続は明示関係で表します。
      allowed_values: []
      pattern: null
      example_value:
        goal_id: goal-release-safe
        objective_ids:
          - objective-zero-critical-findings
        input_digest: sha256:plan-basis-3
      source_claims:
        - claim-task-plan-002
    - id: change_rationale
      labels:
        zh: 变更理由
        en: change rationale
        ja: 変更理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释相对前版增加、删除或重排节点与边的原因，以支持人工审查。
        en: Explains why nodes or edges were added, removed, or reordered relative to the prior version for human review.
        ja: 前版からノードや辺を追加・削除・再配置した理由を説明し、人手審査を支援します。
      allowed_values: []
      pattern: null
      example_value: Split package verification from release approval and add an explicit approval dependency.
      source_claims:
        - claim-task-plan-003
  constraints:
    - id: task-plan-dependency-graphs-acyclic
      severity: error
      expression_language: plain
      expression: Task, TaskStep, and WorkItem depends_on subgraphs are acyclic within this TaskPlan version
      explanations:
        zh: 任务、步骤和分配依赖都必须无环；循环控制属于 Route、Gate 或 Retry。
        en: Task, TaskStep, and WorkItem dependency graphs are acyclic; Route, Gate, or Retry owns cyclic control.
        ja: Task・TaskStep・WorkItem の依存グラフは非循環で、循環制御は Route・Gate・Retry が所有します。
      source_claims:
        - claim-task-plan-004
    - id: task-plan-step-task-closure
      severity: error
      expression_language: plain
      expression: every contained TaskStep is the target of exactly one Task-decomposes_into-TaskStep edge from a Task specified by this TaskPlan
      explanations:
        zh: 计划中的每个步骤必须归属一个被同一计划规定的 Task，不能成为无任务来源的孤立步骤。
        en: Every plan step belongs to exactly one Task specified by the same plan and cannot be an orphan step with no Task origin.
        ja: 計画内の各ステップは同じ計画が指定する一つの Task に属し、Task 起源のない孤立ステップにはできません。
      source_claims:
        - claim-task-plan-005
  required_relation_constraints:
    - id: task-plan-specifies-task
      direction: outgoing
      predicate: specifies
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 任务计划至少规定一个稳定 Task 作为实现范围。
        en: A TaskPlan specifies at least one stable Task in its realization scope.
        ja: TaskPlan は実現範囲として少なくとも一つの安定した Task を指定します。
      source_claims:
        - claim-task-plan-006
    - id: task-plan-contains-step
      direction: outgoing
      predicate: contains_step
      target_concept_id: TaskStep
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 可执行任务计划至少包含一个具备输入—动作—输出合同的步骤。
        en: An executable TaskPlan contains at least one step with an input-action-output contract.
        ja: 実行可能 TaskPlan は入出力・動作契約を持つステップを少なくとも一つ含みます。
      source_claims:
        - claim-task-plan-007
examples:
  - id: TaskPlan-example-positive-manual-001
    labels:
      zh: TaskPlan positive
      en: TaskPlan positive
      ja: TaskPlan positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 TaskPlan 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to TaskPlan: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) TaskPlan で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {}

    related_node_ids:
      - TaskPlan
      - WorkSpecification
      - TaskStep
      - WorkItem
    related_relation_ids:
      - TaskPlan-is_a-WorkSpecification
      - TaskPlan-contains_step-TaskStep
      - TaskPlan-contains_work_item-WorkItem
    source_claims:
      - claim-task-plan-008

  - id: TaskPlan-example-boundary-manual-001
    labels:
      zh: TaskPlan boundary
      en: TaskPlan boundary
      ja: TaskPlan boundary
    descriptions:
      zh: ReAct 轨迹中 Observation 是运行时环境反馈（如 Search 返回的 snippet），不是 TaskPlan 规范身份字段；Moonweave 投影时保留 identity_keys，不以 wire JSON 覆盖规约。
      en: In ReAct trajectories Observation is runtime environment feedback (e.g. Search snippet), not TaskPlan specification identity; Moonweave projection preserves identity_keys without wire JSON overwrite.
      ja: ReAct Observation は runtime feedback で TaskPlan spec identity ではない；identity_keys 保持。
    field_values: {work_specification_id: plan-release-runtime-state, revision: 3-running}

    related_node_ids:
      - TaskPlan
      - WorkSpecification
    related_relation_ids:
      - TaskPlan-is_a-WorkSpecification
    source_claims:
      - claim-task-plan-009

  - id: TaskPlan-example-counterexample-confusable
    labels:
      zh: TaskPlan counterexample
      en: TaskPlan counterexample
      ja: TaskPlan counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 TaskPlan。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style TaskPlan.
      ja: Python/code なし自然言語計画は TaskWeaver 式 TaskPlan にならない。
    field_values: {work_specification_id: plan-release-runtime-state, checkpoint_id: checkpoint-44, planning_basis: absent}

    related_node_ids:
      - TaskPlan
      - WorkSpecification
      - Execution
      - TaskStep
      - WorkItem
    related_relation_ids: []
    source_claims:
      - claim-task-plan-008

  - id: TaskPlan-example-instance-concrete
    labels:
      zh: TaskPlan instance
      en: TaskPlan instance
      ja: TaskPlan instance
    descriptions:
      zh: Voyager 实例：curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → 映射 TaskPlan。
      en: Voyager instance: curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → maps to TaskPlan.
      ja: Voyager 实例 propose_task→code_generation→add が TaskPlan に写像。
    field_values: {}

    related_node_ids:
      - TaskPlan
      - WorkSpecification
      - TaskStep
      - WorkItem
    related_relation_ids: []
    source_claims:
      - claim-task-plan-008

