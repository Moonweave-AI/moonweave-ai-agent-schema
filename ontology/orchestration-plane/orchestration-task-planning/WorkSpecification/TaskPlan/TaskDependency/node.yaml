schema: moonweave.ai/ontology-node/v1
id: TaskDependency
kind: concept
labels:
  zh: 计划步骤依赖
  en: Task Dependency
  ja: タスク依存関係
semantics:
  short_definition:
    zh: 一个计划修订内声明前置步骤与后续步骤关系的结构记录。
    en: A structural record that declares a prerequisite-to-dependent step relationship within one plan revision.
    ja: 一つの plan revision 内の prerequisite step と dependent step の関係を宣言する構造 record。
  definition:
    zh: >-
      TaskDependency 是 TaskPlan 的组成部分，声明同一计划修订中一个 prerequisite TaskStep 与一个 dependent TaskStep
      的先后、汇合或数据可用性关系，以及何种声明性依据使依赖满足。它不是 TaskCondition：依赖本身不计算谓词或保存判断结果；
      条件可以决定是否走某条路径。它也不是一次失败、重试、调用因果关系或实际并行调度记录。循环控制必须由计划的显式条件和退出
      策略说明，不能用无界依赖环掩盖。
    en: >-
      TaskDependency is a constituent of TaskPlan that declares precedence, join, or data-availability relationship from one
      prerequisite TaskStep to one dependent TaskStep in the same plan revision, plus the declarative basis by which it is
      satisfied. It is not TaskCondition: dependency itself computes no predicate and stores no verdict; a condition can decide
      whether a path is taken. It is also not one failure, retry, invocation causality, or actual parallel-scheduling record.
      Loop control must be stated by explicit plan conditions and exit policy, not hidden in an unbounded dependency cycle.
    ja: >-
      TaskDependency は TaskPlan の constituent であり、同じ plan revision 内の一つの prerequisite TaskStep から一つの dependent
      TaskStep への precedence、join、data-availability relation と、その dependency が満たされる宣言的 basis を示す。これは
      TaskCondition ではない。dependency 自体は predicate を計算せず verdict を保存しない。condition は path を取るかどうかを
      決められる。また一回の failure、retry、invocation causality、実際の parallel-scheduling record でもない。loop control は
      明示的な plan condition と exit policy で示し、unbounded dependency cycle に隠してはならない。
  why_needed:
    zh: 将先后与汇合结构从条件和运行结果中分离，能让计划在实现不同框架时仍保留可审计的可选顺序。Plan-and-Solve 为将工作拆分为子任务的通用实践提供动机，但不定义本依赖模式或本地边语义。
    en: Separating precedence and join structure from conditions and runtime outcomes preserves auditable eligible order when a plan is implemented in different frameworks. Plan-and-Solve motivates the broad practice of dividing work into subtasks, but does not define this dependency schema or its local edge semantics.
    ja: precedence と join structure を condition と runtime outcome から分離することで、異なる framework で plan を実装しても監査可能な eligible order を保てる。Plan-and-Solve は work を subtask に分割する一般的な実践の動機を与えるが、この dependency schema や local edge semantics を定義しない。
  includes:
    - zh: 所属计划和修订、依赖标识、前置步骤、后续步骤、依赖类型和满足依据。
      en: Owning plan and revision, dependency identifier, prerequisite step, dependent step, dependency kind, and satisfaction basis.
      ja: 所属 plan と revision、dependency ID、prerequisite step、dependent step、dependency kind、satisfaction basis。
  excludes:
    - zh: 已执行边、任务状态、重试次数、实际排程顺序、运行时间、错误及调用间因果事件。
      en: Traversed edge, task status, retry count, actual scheduling order, runtime time, error, or invocation-to-invocation causal event.
      ja: 通過済み edge、task status、retry count、実際の scheduling order、runtime time、error、invocation 間 causal event。
  semantic_kind: information
  source_claims: [claim-task-dependency-plan-method]
engineering:
  explanation:
    zh: >-
      编译器可把 prerequisite_step_ref 与 dependent_step_ref 转译为 LangGraph 固定边、等待汇合的边，或 Agents SDK
      代码编排中的先完成后汇总逻辑。LangGraph 允许多个目的地在同一 superstep 并行执行；实际调度顺序、线程和节点输出属于运行时。
      Agents SDK 的 asyncio.gather 也只是并行实现方式，不能由一次并行调用反推出持久依赖。
    en: >-
      A compiler can translate prerequisite_step_ref and dependent_step_ref into LangGraph fixed edges, join-waiting edges, or
      completion-before-synthesis code in Agents SDK orchestration. LangGraph can execute multiple destinations in one superstep;
      actual schedule order, threads, and node outputs belong to runtime. Agents SDK asyncio.gather is likewise an implementation
      mechanism for parallel work and cannot infer a durable dependency from one parallel invocation.
    ja: >-
      compiler は prerequisite_step_ref と dependent_step_ref を LangGraph fixed edge、join-waiting edge、または Agents SDK
      orchestration の completion-before-synthesis code に変換できる。LangGraph は複数 destination を一つの superstep で並行実行できる。
      実際の schedule order、thread、node output は runtime に属する。Agents SDK の asyncio.gather も parallel work の実装機構であり、
      一回の parallel invocation から durable dependency を推論できない。
  typical_input:
    - description:
        zh: 发布计划中“签名检查完成后才可批准”的依赖声明。
        en: A release-plan dependency declaration that allows approval only after signature checking.
        ja: signature check の完了後にのみ approval を許可する release-plan dependency declaration。
      format: |-
        {"plan_ref":"plan:release-2026-07","plan_revision":"v3","dependency_id":"dep:sign-before-approve","prerequisite_step_ref":"step:sign","dependent_step_ref":"step:approve","dependency_kind":"finish-to-start","satisfaction_basis":"criterion:signature-valid"}
  typical_output:
    - description:
        zh: 从依赖声明生成的固定边或汇合绑定，不表示该边已经执行。
        en: A fixed-edge or join binding generated from the dependency declaration, not evidence that the edge executed.
        ja: dependency declaration から生成した fixed-edge または join binding。edge が実行済みである evidence ではない。
      format: |-
        {"dependency_ref":"dep:sign-before-approve","adapter":"langgraph","edge":{"from":"sign","to":"approve"},"wait_for":["criterion:signature-valid"]}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents fixed and conditional edges, graph supersteps, and parallel execution of multiple destinations.
    - name: OpenAI Agents SDK agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents code-driven chaining and parallel work using asyncio.gather.
    - name: Plan-and-Solve Prompting
      url: https://arxiv.org/abs/2305.04091
      description: Presents a planning method that first divides a task into subtasks, used only as method evidence rather than a schema definition.
structure:
  identity_keys:
    - plan_ref
    - plan_revision
    - dependency_id
  fields:
    - id: plan_ref
      labels: {zh: 所属计划引用, en: Owning-plan reference, ja: 所属 plan 参照}
      definitions:
        zh: 指向包含该依赖的 TaskPlan 系列。
        en: Points to the TaskPlan series that contains this dependency.
        ja: この dependency を含む TaskPlan series を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: plan:release-2026-07
      source_claims: [claim-task-dependency-local]
    - id: plan_revision
      labels: {zh: 所属计划修订, en: Owning-plan revision, ja: 所属 plan revision}
      definitions:
        zh: 指明依赖端点共享的计划修订。
        en: Names the plan revision shared by the dependency endpoints.
        ja: dependency endpoint が共有する plan revision を示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
      example_value: v3
      source_claims: [claim-task-dependency-local]
    - id: dependency_id
      labels: {zh: 依赖标识, en: Dependency identifier, ja: dependency 識別子}
      definitions:
        zh: 在计划修订内稳定标识一条步骤关系声明。
        en: Stably identifies one step-relation declaration within a plan revision.
        ja: plan revision 内の一つの step-relation declaration を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z][A-Za-z0-9._:-]*$'
      example_value: dep:sign-before-approve
      source_claims: [claim-task-dependency-local]
    - id: prerequisite_step_ref
      labels: {zh: 前置步骤引用, en: Prerequisite-step reference, ja: prerequisite step 参照}
      definitions:
        zh: 指向必须先满足所声明依赖基础的 TaskStep。
        en: Points to the TaskStep that must first satisfy the declared dependency basis.
        ja: 宣言済み dependency basis を先に満たすべき TaskStep を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: step:sign
      source_claims: [claim-task-dependency-langgraph, claim-task-dependency-local]
    - id: dependent_step_ref
      labels: {zh: 后续步骤引用, en: Dependent-step reference, ja: dependent step 参照}
      definitions:
        zh: 指向在依赖满足后才具备选择资格的 TaskStep。
        en: Points to the TaskStep that becomes eligible for selection only after the dependency is satisfied.
        ja: dependency が満たされた後にのみ selection の対象となる TaskStep を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: step:approve
      source_claims: [claim-task-dependency-langgraph, claim-task-dependency-local]
    - id: dependency_kind
      labels: {zh: 依赖类型, en: Dependency kind, ja: dependency kind}
      definitions:
        zh: 声明该关系是前置完成、汇合等待还是数据可用性依赖，而非实际调度日志。
        en: Declares whether the relation is prerequisite completion, join waiting, or data availability, not an actual scheduling log.
        ja: relation が prerequisite completion、join waiting、data availability のいずれかを宣言し、実際の scheduling log ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: finish-to-start
      source_claims: [claim-task-dependency-local]
    - id: satisfaction_basis
      labels: {zh: 满足依据, en: Satisfaction basis, ja: satisfaction basis}
      definitions:
        zh: 指向或描述使后续步骤获得选择资格的声明性完成准则或数据契约。
        en: Points to or describes the declared completion criterion or data contract that makes the dependent step eligible.
        ja: dependent step を eligible にする宣言済み completion criterion または data contract を指す、または記述する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: criterion:signature-valid
      source_claims: [claim-task-dependency-local]
  constraints:
    - id: task-dependency-endpoints-share-plan-revision
      severity: error
      language: plain
      expression: prerequisite_step_ref and dependent_step_ref must be distinct TaskSteps whose plan_ref equals this dependency plan_ref and whose revision equals this dependency plan_revision.
      explanation:
        zh: 依赖的含义只在一个计划版本的成员集合中成立。
        en: The meaning of a dependency is valid only in the member set of one plan version.
        ja: dependency の意味は一つの plan version の member set 内でのみ有効である。
      source_claims: [claim-task-dependency-local]
    - id: task-dependency-has-declared-basis
      severity: error
      language: plain
      expression: satisfaction_basis must resolve to a declared completion criterion or data contract compatible with prerequisite_step_ref; a retry count, checkpoint, or elapsed time is not a dependency basis.
      explanation:
        zh: 后续选择取决于计划定义的可验证条件，而不是偶然的运行参数。
        en: Subsequent selection depends on a plan-defined verifiable condition rather than incidental runtime parameters.
        ja: subsequent selection は偶発的 runtime parameter ではなく、plan-defined で検証可能な condition に依存する。
      source_claims: [claim-task-dependency-local]
    - id: task-dependency-graph-has-no-implicit-cycle
      severity: error
      language: plain
      expression: The dependency graph for one plan revision must not contain a cycle; intentional repetition must be represented by an explicit TaskCondition with an exit policy in TaskPlan.
      explanation:
        zh: 依赖描述先后结构，重复选择需要额外的退出语义，不能隐藏为死循环。
        en: Dependencies describe precedence structure; repeated selection needs separate exit semantics and cannot be hidden as a dead cycle.
        ja: dependency は precedence structure を記述する。反復 selection には別の exit semantics が必要で、dead cycle に隠せない。
      source_claims: [claim-task-dependency-langgraph, claim-task-dependency-local]
  required_relations: []
examples:
  - id: task-dependency-positive-sign-before-approve
    labels:
      zh: TaskDependency positive
      en: TaskDependency positive
      ja: TaskDependency positive
    descriptions:
      zh: Prefect 数据流编排映射 TaskDependency：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps TaskDependency: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect TaskDependency: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {plan_ref: plan:release-2026-07, plan_revision: v3, dependency_id: dep:sign-before-approve, prerequisite_step_ref: step:sign, dependent_step_ref: step:approve, dependency_kind: finish-to-start, satisfaction_basis: criterion:signature-valid}

    related_node_ids:
      - TaskDependency
      - TaskPlan
      - TaskStep
      - TaskCompletionCriterion
    related_relation_ids:
      - TaskDependency-part_of-TaskPlan
      - TaskDependency-has_prerequisite_step-TaskStep
      - TaskDependency-has_dependent_step-TaskStep
      - TaskCompletionCriterion-evaluates-TaskStep
    source_claims:
      - claim-task-dependency-langgraph
      - claim-task-dependency-local

  - id: task-dependency-counterexample-retry-record
    labels:
      zh: TaskDependency counterexample
      en: TaskDependency counterexample
      ja: TaskDependency counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 TaskDependency DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style TaskDependency DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 TaskDependency ではない。
    field_values: {run_attempt_id: run-attempt:19, step_id: step:sign, retry_count: 3, error: "signature service timeout", checkpoint_id: checkpoint:33}

    related_node_ids:
      - TaskDependency
      - RunAttempt
    related_relation_ids: []
    source_claims:
      - claim-task-dependency-local

  - id: task-dependency-boundary-condition-route
    labels:
      zh: TaskDependency boundary
      en: TaskDependency boundary
      ja: TaskDependency boundary
    descriptions:
      zh: TaskWeaver CodeExecutor stdout 是运行时执行输出，不是 TaskDependency 规范 expected_output；TaskStep 规约与执行 trace 应分离。
      en: TaskWeaver CodeExecutor stdout is runtime execution output, not TaskDependency expected_output spec; separate TaskStep specification from execution trace.
      ja: TaskWeaver stdout は runtime で TaskDependency expected_output spec ではない。
    field_values: {condition_id: condition:high-risk-escalation, predicate_description: "risk classification equals high", decision_effect: "select step:human-review"}

    related_node_ids:
      - TaskDependency
      - TaskCondition
    related_relation_ids:
      - TaskPlan-has_condition-TaskCondition
    source_claims:
      - claim-task-dependency-langgraph
      - claim-task-dependency-local

  - id: task-dependency-instance-research-join
    labels:
      zh: TaskDependency instance
      en: TaskDependency instance
      ja: TaskDependency instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 TaskDependency policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to TaskDependency policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が TaskDependency policy-prefect@1 に写像。
    field_values: {plan_ref: plan:research-brief, plan_revision: v2, dependency_id: dep:fact-check-before-synthesize, prerequisite_step_ref: step:fact-check, dependent_step_ref: step:synthesize, dependency_kind: data-availability, satisfaction_basis: contract:verified-findings}

    related_node_ids:
      - TaskDependency
      - TaskPlan
      - TaskStep
    related_relation_ids:
      - TaskDependency-part_of-TaskPlan
      - TaskDependency-has_prerequisite_step-TaskStep
      - TaskDependency-has_dependent_step-TaskStep
    source_claims:
      - claim-task-dependency-openai
      - claim-task-dependency-local

parent_relation:
  id: TaskDependency-part_of-TaskPlan
  predicate: part_of
  target: concept:TaskPlan
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于任务计划, en: is part of task plan, ja: task plan の一部である}
  definitions:
    zh: TaskDependency 是其端点和选择语境由该 TaskPlan 修订界定的组成结构。
    en: TaskDependency is a constituent whose endpoints and selection context are bounded by its TaskPlan revision.
    ja: TaskDependency は endpoint と selection context がその TaskPlan revision により境界付けられる constituent である。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_dependency, labels: {zh: 具有步骤依赖, en: has step dependency, ja: step dependency を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-task-dependency-local]
  distinct_fact_rationale: {zh: 组成关系说明依赖由哪个计划拥有；端点由独立关系说明。, en: Composition says which plan owns the dependency; separate relations state its endpoints., ja: composition はどの plan が dependency を所有するかを示し、別 relation が endpoint を示す。}
  layout_role: primary-backbone
relations:
  - id: TaskDependency-has_prerequisite_step-TaskStep
    predicate: has_prerequisite_step
    target: concept:TaskStep
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 具有前置步骤, en: has prerequisite step, ja: prerequisite step を持つ}
    definitions:
      zh: 将依赖与必须先满足声明基础的 TaskStep 相连。
      en: Connects a dependency to the TaskStep that must first satisfy its declared basis.
      ja: dependency を、その宣言済み basis を先に満たすべき TaskStep に接続する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_prerequisite_for_dependency, labels: {zh: 是依赖前置步骤, en: is prerequisite for dependency, ja: dependency の prerequisite である}}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints:
      - id: dependency-prerequisite-plan-match
        severity: error
        language: plain
        expression: The prerequisite TaskStep plan_ref must equal the TaskDependency plan_ref and its revision must equal the TaskDependency plan_revision.
        explanation: {zh: 前置关系不能跨越未声明计划版本。, en: A prerequisite relation cannot cross an undeclared plan version., ja: prerequisite relation は未宣言の plan version をまたげない。}
        source_claims: [claim-task-dependency-local]
    examples: []
    source_claims: [claim-task-dependency-local]
    distinct_fact_rationale:
      zh: 此关系标识依赖前端，不标识后续端或实际完成。
      en: >-
        This relation identifies the dependency's front endpoint, not its dependent endpoint or actual completion.
      ja: この relation は dependency の front endpoint を識別し、dependent endpoint や実際の completion は示さない。
    layout_role: cross-link
  - id: TaskDependency-has_dependent_step-TaskStep
    predicate: has_dependent_step
    target: concept:TaskStep
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 具有后续步骤, en: has dependent step, ja: dependent step を持つ}
    definitions:
      zh: 将依赖与满足后才可选择的 TaskStep 相连。
      en: Connects a dependency to the TaskStep eligible only after it is satisfied.
      ja: dependency を、それが満たされた後にのみ eligible となる TaskStep に接続する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_dependent_for_dependency, labels: {zh: 是依赖后续步骤, en: is dependent for dependency, ja: dependency の dependent である}}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints:
      - id: dependency-dependent-plan-match
        severity: error
        language: plain
        expression: The dependent TaskStep plan_ref must equal the TaskDependency plan_ref and its revision must equal the TaskDependency plan_revision.
        explanation: {zh: 后续资格只能在同一计划版本中被解释。, en: Dependent eligibility can be interpreted only in the same plan version., ja: dependent eligibility は同じ plan version でのみ解釈できる。}
        source_claims: [claim-task-dependency-local]
    examples: []
    source_claims: [claim-task-dependency-local]
    distinct_fact_rationale:
      zh: 此关系标识依赖后端，不表示是否已被调度。
      en: >-
        This relation identifies the dependency's back endpoint, not whether it has been scheduled.
      ja: この relation は dependency の back endpoint を識別し、schedule 済みかは示さない。
    layout_role: cross-link
sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API overview
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents fixed and conditional edges, supersteps, and parallel execution of multiple destination nodes.
  - id: openai-agents-orchestration
    title: OpenAI Agents SDK agent orchestration
    url: https://openai.github.io/openai-agents-python/multi_agent/
    source_type: official-doc
    relevance: Documents code-driven chaining and asyncio.gather-based parallel orchestration.
  - id: prov-o-plan
    title: W3C PROV-O Plan
    url: https://www.w3.org/TR/prov-o/#Plan
    source_type: standard
    relevance: Defines plans as intended actions or steps rather than occurred executions.
  - id: plan-and-solve
    title: Plan-and-Solve Prompting
    url: https://arxiv.org/abs/2305.04091
    source_type: research-paper
    relevance: Describes making a plan that divides a task into subtasks; it is method evidence only and does not define this schema.
source_claims:
  - id: claim-task-dependency-langgraph
    source: langgraph-graph-api
    supports: LangGraph graph APIs use edges to determine which nodes run next and may execute multiple destination nodes in parallel in a superstep.
    locator: Graph API overview, Edges and Graph API concepts
    evidence_kind: official
    confidence: high
  - id: claim-task-dependency-openai
    source: openai-agents-orchestration
    supports: The Agents SDK documents code-driven chaining and parallel work with asyncio.gather, providing implementation patterns for a local dependency structure.
    locator: Agent orchestration, Orchestrating via code
    evidence_kind: official
    confidence: high
  - id: claim-task-dependency-plan-method
    source: plan-and-solve
    supports: Plan-and-Solve prompting first devises a plan to divide a task into subtasks, supporting only the general planning-method motivation for explicit subtask structure.
    locator: Abstract and method description
    evidence_kind: research
    confidence: medium
  - id: claim-task-dependency-local
    source: prov-o-plan
    supports: TaskDependency fields, acyclic plan-local precedence semantics, endpoint relations, and its separation from condition and runtime retry are Moonweave local design semantics informed by intended-action planning.
