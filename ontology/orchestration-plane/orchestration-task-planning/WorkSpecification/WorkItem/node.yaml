source_claims:
  - id: claim-work-item-001
    source: lit-oasis-process-planning
    supports: OASIS separates task descriptions and their planned or executed occurrences. Moonweave introduces WorkItem as the assignment-specific layer between reusable Task and runtime Execution.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-002
    source: eng-fw-crewai-tasks
    supports: CrewAI Task assignment keeps a concrete task identity alongside the assigned agent; Moonweave serializes that identity while retaining an explicit allocates edge.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-003
    source: eng-ont-prov-o
    supports: PROV-O qualifies an activity-agent association with Role and Plan; Moonweave serializes the concrete role-binding identifier on the allocation package.
    locator: PROV-O Recommendation > expanded terms > prov:Plan, prov:Activity, prov:Association, prov:hadPlan, and prov:hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-004
    source: eng-fw-crewai-tasks
    supports: CrewAI may assign tasks to agents while task descriptions remain stable; Moonweave places assignment-specific scheduling priority on WorkItem.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-005
    source: lit-oasis-process-planning
    supports: OASIS 2 models agent roles and plan execution context separately from task descriptions; Moonweave places assignment scheduling context on WorkItem.
    locator: OASIS 2 process-planning paper > process and procedure descriptions, task descriptions, roles, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-006
    source: eng-ont-prov-o
    supports: PROV-O qualifies an agent's association with an Activity using role and plan context; Moonweave records the rationale for selecting that role binding.
    locator: PROV-O Recommendation > expanded terms > prov:Plan, prov:Activity, prov:Association, prov:hadPlan, and prov:hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-007
    source: eng-fw-crewai-tasks
    supports: CrewAI exposes task identity and assignment together; Moonweave requires its serialized task key to agree with the canonical allocation edge.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-008
    source: eng-ont-prov-o
    supports: PROV-O qualified Association motivates keeping the agent-role-plan binding coherent; Moonweave checks the serialized binding key against that relation.
    locator: PROV-O Recommendation > expanded terms > prov:Plan, prov:Activity, prov:Association, prov:hadPlan, and prov:hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-009
    source: eng-fw-crewai-tasks
    supports: CrewAI separates task content from agent assignment; Moonweave further normalizes assignment priority on WorkItem for deterministic scheduling.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-010
    source: eng-fw-maf-workflows
    supports: Agent Framework uses explicit directed edges for downstream activation; Moonweave applies an acyclic constraint to WorkItem prerequisite scheduling.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-011
    source: eng-fw-crewai-tasks
    supports: CrewAI defines a task as a specific assignment and names the responsible agent; Moonweave normalizes each assignment package to exactly one reusable Task.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-012
    source: eng-ont-prov-o
    supports: PROV-O uses a qualified Association to bind an Activity, Agent, Role, and Plan; Moonweave assigns one WorkItem to one concrete actor-role binding.
    locator: PROV-O Recommendation > expanded terms > prov:Plan, prov:Activity, prov:Association, prov:hadPlan, and prov:hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-013
    source: eng-fw-maf-workflows
    supports: Agent Framework executors and edges belong to a particular workflow graph; Moonweave likewise anchors each allocation in one plan version.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-014
    source: lit-oasis-process-planning
    supports: The plan-description/execution distinction leaves a separate need for assignment context; WorkItem fills that layer without collapsing the stable Task into a run.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-015
    source: lit-oasis-process-planning
    supports: OASIS keeps reusable task descriptions separate from their enactment context; absence of an assignment binding keeps this record at the Task level.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-016
    source: eng-fw-crewai-docs
    supports: CrewAI describes tasks as individual assignments made to agents within a process. Moonweave uses that assignment-facing boundary for WorkItem, while Task retains the broader stateful work identity and lifecycle.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-017
    source: eng-proto-a2a-docs
    supports: A2A defines Task as a uniquely identified, stateful unit of work with status and artifacts. The protocol does not define Moonweave's finer assignable WorkItem specification, so this claim supports Task only and leaves WorkItem as a design inference.
    locator: Core Concepts and Components > Fundamental Communication Elements > Task
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-018
    source: lit-oasis-process-planning
    supports: The assignment layer remains normative before an execution occurrence begins.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-019
    source: lit-oasis-process-planning
    supports: Task descriptions and their execution occurrences remain separate in OASIS planning semantics.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-item-020
    source: lit-oasis-process-planning
    supports: OASIS separates task descriptions from enactment; Moonweave models assignment context as a specialized WorkSpecification between Task and Execution.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
