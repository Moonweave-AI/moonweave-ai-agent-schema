schema: moonweave.ai/ontology-node/v1
id: WorkItem
kind: concept
labels:
  zh: 工作项
  en: work item
  ja: 作業項目
semantics:
  short_definition:
    zh: 工作项是把任务分配给具体角色绑定并附加调度上下文的分配包。
    en: A work item is an allocation package that assigns a Task to a specific role binding with scheduling context.
    ja: 作業項目は、Task を具体的なロール束縛へ割り当て、スケジュール文脈を付ける割当パッケージです。
  definition:
    zh: WorkItem 是一种 WorkSpecification，其种差是把一个 Task 规范分配给代表具体受派者的 ActorRoleBinding，并携带本次分配的优先级、期限或队列上下文；重新分配会产生新的 WorkItem 或修订。它不是 Task 的预期结果定义，也不是分配后发生的 Execution。
    en: A WorkItem is a WorkSpecification distinguished as an allocation package that binds one Task specification to an ActorRoleBinding representing the assignee and carries assignment-specific priority, due date, or queue context; reassignment creates a new WorkItem or revision. It is neither the Task's desired-outcome definition nor the Execution that occurs after allocation.
    ja: WorkItem は、一つの Task 仕様を担当者を表す ActorRoleBinding に割り当て、割当固有の優先度・期限・キュー文脈を持つ WorkSpecification です。再割当では新しい WorkItem または改訂を作ります。Task の望ましい結果定義でも、割当後に発生する Execution でもありません。
  why_needed:
    zh: 单独表示分配，可在不改写 Task 的情况下调整负责人和优先级，并保留谁以何种角色承担何项工作的问责历史。
    en: Representing allocation separately permits performer and priority changes without rewriting Task and preserves an accountability history of who accepted which work in which role.
    ja: 割当を分離して表すことで、Task を書き換えず担当者や優先度を変更でき、誰がどの役割で何を引き受けたかの説明責任履歴を保てます。
  includes:
    - zh: 工作项标识、被分配的 task_id、assignee_binding_id、优先级，以及可选期限和队列上下文。
      en: A work-item identifier, allocated task_id, assignee_binding_id, priority, and optional due-date and queue context.
      ja: 作業項目識別子、割当対象 task_id、assignee_binding_id、優先度、任意の期限とキュー文脈を含みます。
  excludes:
    - zh: Task 的稳定预期结果、Actor 本身、一次运行状态、实际开始时间和运行产物。
      en: The Task's stable desired outcome, the Actor itself, one run's state, actual start time, and runtime artifacts.
      ja: Task の安定した望ましい結果、Actor 自体、一回の実行状態、実開始時刻、実行成果物は含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      调度器读取 WorkItem 的 assignee_binding_id 与 scheduling_context，在 Agents SDK 中选择目标 Agent 并设置
      Runner 优先级或队列键；LangGraph 部署中同一分配映射为 worker 路由元数据，而不是新图节点。重新分配创建新
      WorkItem revision 或新标识，Execution 引用具体 WorkItem 实例；A2A SendMessage 触发的 Task 仍由 Execution
      承载，WorkItem 只保留规范层分配事实。
    en: >-
      A scheduler reads assignee_binding_id and scheduling_context from a WorkItem to select a target Agent and set Runner
      priority or queue keys in the Agents SDK; in LangGraph deployments the same allocation maps to worker routing metadata,
      not a new graph node. Reassignment creates a new WorkItem revision or identifier; Execution references a concrete
      WorkItem instance; an A2A SendMessage-triggered Task is still carried by Execution while WorkItem retains normative
      allocation facts only.
    ja: >-
      scheduler は WorkItem の assignee_binding_id と scheduling_context を読み、Agents SDK で target Agent を選び Runner
      priority や queue key を設定する。LangGraph deployment では同一 allocation は worker routing metadata に対応し新 graph
      node にはならない。再割当は新 WorkItem revision または新 ID を作り、Execution は具体 WorkItem instance を参照する。
      A2A SendMessage で起動した Task も Execution が担い、WorkItem は normative allocation fact のみ保持する。
  typical_input:
    - description:
        zh: 把任务规范绑定到角色绑定并附带调度上下文的分配包。
        en: An allocation package binding a task specification to a role binding with scheduling context.
        ja: task specification を role binding に結び scheduling context を付けた allocation package。
      format: |-
        {"work_specification_id":"work-item-71","revision":"2","task_id":"task-spec-reconcile-7","assignee_binding_id":"binding-agent-auditor-3","priority":80,"scheduling_context":{"queue":"release-audit","due_by":"2026-07-16T18:00:00Z"}}
  typical_output:
    - description:
        zh: 调度器入队或派发 Execution 时携带的分配引用，不是 Task 规范本身。
        en: An allocation reference carried when a scheduler enqueues or dispatches Execution, not the Task specification itself.
        ja: scheduler が Execution を enqueue/dispatch するときに持つ allocation reference。Task specification 自体ではない。
      format: |-
        {"work_item_ref":"work-item-71@2","execution_ref":"execution-884","assignee_binding_id":"binding-agent-auditor-3","dispatch_at":"2026-07-16T09:05:00Z"}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner invocation targeting a configured Agent as runtime dispatch.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph execution metadata distinct from normative allocation specifications.
    - name: A2A Protocol SendMessage
      url: https://a2a-protocol.org/latest/specification/
      description: Documents message-triggered Task creation mapped to runtime Execution, not WorkItem storage.
  source_claims:
    - claim-work-item-011
    - claim-work-item-014
structure:
  identity_keys: []
  fields:
    - id: task_id
      labels:
        zh: 被分配任务标识
        en: allocated task ID
        ja: 割当対象 Task ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 allocates 关系所指 Task 的规范标识，供序列化与边界校验使用；它不得取代关系本身。
        en: Carries the specification identifier of the Task targeted by the allocates relation for serialization and boundary validation; it never replaces that relation.
        ja: allocates 関係が指す Task の仕様識別子をシリアライズと境界検証用に保持し、関係自体を置換しません。
      allowed_values: []
      pattern: ^task-spec-[A-Za-z0-9._:-]+$
      example_value: task-spec-reconcile-7
      source_claims:
        - claim-work-item-002
    - id: assignee_binding_id
      labels:
        zh: 受派角色绑定标识
        en: assignee role-binding ID
        ja: 担当ロール束縛 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 assigned_to 关系所指 ActorRoleBinding 的标识，使一次分配可被完整交换并与规范边核对。
        en: Carries the ActorRoleBinding identifier targeted by assigned_to so an allocation can be exchanged completely and checked against its canonical edge.
        ja: assigned_to が指す ActorRoleBinding 識別子を保持し、割当を完全に交換して正規辺と照合可能にします。
      allowed_values: []
      pattern: ^binding-[A-Za-z0-9._:-]+$
      example_value: binding-agent-auditor-3
      source_claims:
        - claim-work-item-003
    - id: priority
      labels:
        zh: 调度优先级
        en: scheduling priority
        ja: スケジュール優先度
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在同一调度队列中以 0 至 100 表示该分配的相对优先级，不改变 Task 身份。
        en: Represents this allocation's relative priority from 0 through 100 within one scheduling queue without changing Task identity.
        ja: 同一キュー内で割当の相対優先度を 0〜100 で表し、Task 同一性は変更しません。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims:
        - claim-work-item-004
    - id: scheduling_context
      labels:
        zh: 调度上下文
        en: scheduling context
        ja: スケジュール文脈
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明队列、最早派发时间、期限与并发分区等本次分配属性。
        en: Declares assignment-specific queue, earliest dispatch time, due time, and concurrency partition.
        ja: 割当固有のキュー・最早配信時刻・期限・並行区画を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        queue: release-audit
        not_before: 2026-07-16T09:00:00Z
        due_by: 2026-07-16T18:00:00Z
        concurrency_key: ledger-2026-07
      source_claims:
        - claim-work-item-005
    - id: assignment_rationale
      labels:
        zh: 分配理由
        en: assignment rationale
        ja: 割当理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明为何由该 ActorRoleBinding 承担此 Task，支持问责和重新分配审查。
        en: Explains why this ActorRoleBinding carries the Task for accountability and reassignment review.
        ja: 説明責任と再割当審査のため、この ActorRoleBinding が Task を担当する理由を示します。
      allowed_values: []
      pattern: null
      example_value: The auditor binding holds the required ledger-review authority and is available before the deadline.
      source_claims:
        - claim-work-item-006
  constraints:
    - id: work-item-task-id-matches-allocation-edge
      severity: error
      expression_language: plain
      expression: task_id equals the target identifier of the single WorkItem-allocates-Task edge
      explanations:
        zh: task_id 是交换键而非第二套关系；若它与 allocates 端点不一致，工作项无效。
        en: task_id is an interchange key rather than a second relationship; the WorkItem is invalid when it disagrees with the allocates endpoint.
        ja: task_id は交換キーであって第二の関係ではなく、allocates 端点と不一致なら WorkItem は無効です。
      source_claims:
        - claim-work-item-007
    - id: work-item-assignee-id-matches-assignment-edge
      severity: error
      expression_language: plain
      expression: assignee_binding_id equals the target identifier of the single WorkItem-assigned_to-ActorRoleBinding edge
      explanations:
        zh: assignee_binding_id 只镜像规范关系端点；不一致时不能据此覆盖 assigned_to 边。
        en: assignee_binding_id only mirrors the canonical relation endpoint; a mismatch must not overwrite the assigned_to edge.
        ja: assignee_binding_id は正規関係端点だけを写し、不一致時に assigned_to 辺を上書きしてはなりません。
      source_claims:
        - claim-work-item-008
    - id: work-item-priority-range
      severity: error
      expression_language: plain
      expression: priority is an integer between 0 and 100 inclusive
      explanations:
        zh: 优先级必须处于同一受控范围，便于跨分配比较而不污染 Task。
        en: Priority remains in one controlled range for comparing allocations without contaminating Task identity.
        ja: 優先度は統制範囲内とし、Task 同一性を汚染せず割当間比較を可能にします。
      source_claims:
        - claim-work-item-009
    - id: work-item-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: WorkItem-depends_on-WorkItem edges remain within one TaskPlan version and are acyclic
      explanations:
        zh: 分配级调度依赖必须同计划且无环；重试不会创建反向依赖环。
        en: Allocation-level scheduling dependencies stay in one plan and are acyclic; a retry does not create a reverse dependency cycle.
        ja: 割当レベルのスケジュール依存は同一計画内・非循環で、再試行は逆向き依存循環を作りません。
      source_claims:
        - claim-work-item-010
  required_relation_constraints:
    - id: work-item-allocates-one-task
      direction: outgoing
      predicate: allocates
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好分配一个稳定 Task；批量分配必须拆成多个 WorkItem。
        en: A WorkItem allocates exactly one stable Task; batch allocation is represented by multiple WorkItems.
        ja: 一つの WorkItem は安定 Task を一つだけ割り当て、複数一括割当は複数 WorkItem で表します。
      source_claims:
        - claim-work-item-011
    - id: work-item-assigned-to-one-role-binding
      direction: outgoing
      predicate: assigned_to
      target_concept_id: ActorRoleBinding
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好由一个 ActorRoleBinding 承担；协作需以多个工作项或显式协同结构表示。
        en: A WorkItem is carried by exactly one ActorRoleBinding; collaboration uses multiple WorkItems or an explicit coordination structure.
        ja: 一つの WorkItem は一つの ActorRoleBinding が担当し、協働は複数 WorkItem または明示協調構造で表します。
      source_claims:
        - claim-work-item-012
    - id: work-item-belongs-to-plan
      direction: incoming
      predicate: contains_work_item
      target_concept_id: TaskPlan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好属于一个 TaskPlan 版本，其调度依赖在该版本内解释。
        en: A WorkItem belongs to exactly one TaskPlan version in which its scheduling dependencies are interpreted.
        ja: 一つの WorkItem は一つの TaskPlan 版だけに属し、その版内でスケジュール依存を解釈します。
      source_claims:
        - claim-work-item-013
examples:
  - id: WorkItem-example-positive-manual-001
    labels:
      zh: WorkItem positive
      en: WorkItem positive
      ja: WorkItem positive
    descriptions:
      zh: CrewAI 映射 WorkItem：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps WorkItem: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI WorkItem: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {task_id: task-spec-reconcile-7, assignee_binding_id: binding-agent-auditor-3, priority: 80}

    related_node_ids:
      - WorkItem
      - WorkSpecification
      - Task
      - ActorRoleBinding
      - Execution
    related_relation_ids:
      - WorkItem-is_a-WorkSpecification
      - WorkItem-allocates-Task
      - WorkItem-assigned_to-ActorRoleBinding
      - Execution-carries_out-WorkItem
    source_claims:
      - claim-work-item-014

  - id: WorkItem-example-boundary-manual-001
    labels:
      zh: WorkItem boundary
      en: WorkItem boundary
      ja: WorkItem boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 WorkItem 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not WorkItem static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で WorkItem 静的 RetryPolicy ではない。
    field_values: {work_specification_id: work-item-missing-allocation, revision: 1, task_id: task-spec-reconcile-7, assignee_binding_id: binding-missing-allocation-edge, priority: 80}

    related_node_ids:
      - WorkItem
      - WorkSpecification
      - Task
    related_relation_ids:
      - WorkItem-is_a-WorkSpecification
      - WorkItem-allocates-Task
    source_claims:
      - claim-work-item-015

  - id: WorkItem-example-counterexample-confusable
    labels:
      zh: WorkItem counterexample
      en: WorkItem counterexample
      ja: WorkItem counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 WorkItem。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style WorkItem.
      ja: Python/code なし自然言語計画は TaskWeaver 式 WorkItem にならない。
    field_values: {work_item_id: absent, allocation_ref: absent, work_specification_id: "work-spec-incident@3"}

    related_node_ids:
      - WorkItem
      - WorkSpecification
      - TaskPlan
      - Task
      - ActorRoleBinding
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-work-item-014

  - id: WorkItem-example-instance-concrete
    labels:
      zh: WorkItem instance
      en: WorkItem instance
      ja: WorkItem instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 WorkItem HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to WorkItem HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が WorkItem HandoffDecision に写像。
    field_values: {task_id: task-spec-reconcile-7, assignee_binding_id: binding-agent-auditor-3, priority: 80}

    related_node_ids:
      - WorkItem
      - WorkSpecification
      - Task
      - ActorRoleBinding
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-work-item-014

