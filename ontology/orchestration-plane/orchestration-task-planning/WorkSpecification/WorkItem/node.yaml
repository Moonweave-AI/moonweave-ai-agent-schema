schema: moonweave.ai/ontology-node/v1
id: WorkItem
kind: concept
labels:
  zh: 工作项
  en: work item
  ja: 作業項目
semantics:
  short_definition:
    zh: 把 Task 分配给具体角色绑定并附加调度上下文的 WorkSpecification 分配包。
    en: A WorkSpecification allocation package assigning a Task to a role binding with scheduling context.
    ja: Task をロール束縛へ割り当てスケジュール文脈を付ける WorkSpecification 割当パッケージです。
  definition:
    zh: WorkItem 是 WorkSpecification 的特化，把一个 Task 规范绑定到代表受派者的 ActorRoleBinding，并携带 priority、scheduling_context 与 assignment_rationale；重新分配产生新 WorkItem 或修订。它不是 Task 的预期结果定义，也不是分配后发生的 Execution。CrewAI 将 agent 绑定到 task、OpenAI Agents handoff 后的受派上下文可投影为 WorkItem，但不改写 Task 本身。
    en: WorkItem specializes WorkSpecification as an allocation package binding one Task to an ActorRoleBinding assignee with priority, scheduling_context, and assignment_rationale; reassignment creates a new WorkItem or revision. It is neither the Task desired-outcome definition nor post-allocation Execution. CrewAI agent-to-task assignment and OpenAI Agents handoff assignee context project to WorkItem without rewriting Task.
    ja: WorkItem は Task を ActorRoleBinding に割当て priority/scheduling_context を付ける WorkSpecification 特化です。CrewAI agent 割当・OpenAI handoff 文脈に写像されます。
  why_needed:
    zh: 单独表示分配，可在不改写 Task 的情况下调整负责人和优先级，并保留谁以何种角色承担何项工作的问责历史。
    en: Representing allocation separately permits performer and priority changes without rewriting Task and preserves accountability history of who accepted which work in which role.
    ja: 割当を分離し Task を書き換えず担当/優先度変更と説明責任履歴を保持します。
  includes:
    - zh: 工作项标识、被分配的 task_id、assignee_binding_id、优先级，以及可选期限和队列上下文。
      en: Work-item identifier, allocated task_id, assignee_binding_id, priority, and optional due-date and queue context.
      ja: 作業項目 ID、task_id、assignee_binding_id、優先度、期限/キュー文脈。
  excludes:
    - zh: Task 的稳定预期结果、Actor 本身、一次运行状态、实际开始时间和运行产物。
      en: Task stable desired outcome, Actor itself, one run state, actual start time, and runtime artifacts.
      ja: Task 安定結果、Actor 自体、一回の実行状態、実開始時刻、実行成果物。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: CrewAI Task.agent 字段与 crew kickoff 时的受派关系应生成 WorkItem(allocates→Task, assigned_to→ActorRoleBinding)；priority 与 scheduling_context 仅存在于 WorkItem。WorkItem-depends_on-WorkItem 表达分配级调度顺序，须同 TaskPlan 版本且无环。task_id 与 assignee_binding_id 是 allocates/assigned_to 边的交换键，不得替代关系本身。
    en: CrewAI Task.agent and crew kickoff assignee bindings generate WorkItem(allocates→Task, assigned_to→ActorRoleBinding); priority and scheduling_context live only on WorkItem. WorkItem-depends_on-WorkItem expresses allocation-level scheduling order within one TaskPlan version acyclically. task_id and assignee_binding_id mirror relation endpoints and must not replace canonical edges.
    ja: CrewAI Task.agent から WorkItem を生成し、priority/scheduling_context は WorkItem のみに保持します。
  typical_input:
    - description: CrewAI task agent assignment.
      format: |
        task = Task(description="Audit ledger", agent=auditor_agent)
      source_claims: [claim-witem-crewai]
  typical_output:
    - description: Work item allocation record.
      format: |
        {
          "work_specification_id": "workitem-reconcile-auditor-3",
          "task_id": "task-spec-reconcile-7",
          "assignee_binding_id": "binding-agent-auditor-3",
          "priority": 80
        }
      source_claims: [claim-witem-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task agent assignment.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff assignee context.
structure:
  identity_keys: []
  fields:
    - id: task_id
      labels: {zh: 被分配任务标识, en: allocated task ID, ja: 割当対象 Task ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: allocates 关系所指 Task 的规范标识，供序列化与边界校验；不得取代关系本身。
        en: Specification identifier of the Task targeted by allocates for serialization and validation; never replaces the relation.
        ja: allocates が指す Task 仕様 ID（関係自体の置換不可）。
      pattern: ^task-spec-[A-Za-z0-9._:-]+$
      example_value: task-spec-reconcile-7
      source_claims: [claim-witem-design]
    - id: assignee_binding_id
      labels: {zh: 受派角色绑定标识, en: assignee role-binding ID, ja: 担当ロール束縛 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: assigned_to 关系所指 ActorRoleBinding 标识，使一次分配可被完整交换并与规范边核对。
        en: ActorRoleBinding identifier targeted by assigned_to for complete interchange and canonical edge verification.
        ja: assigned_to が指す ActorRoleBinding ID。
      pattern: ^binding-[A-Za-z0-9._:-]+$
      example_value: binding-agent-auditor-3
      source_claims: [claim-witem-design]
    - id: priority
      labels: {zh: 调度优先级, en: scheduling priority, ja: スケジュール優先度}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在同一调度队列中以 0 至 100 表示该分配的相对优先级，不改变 Task 身份。
        en: Relative priority from 0 through 100 within one scheduling queue without changing Task identity.
        ja: 同一キュー内 0–100 の相対優先度（Task 同一性は不変）。
      example_value: 80
      source_claims: [claim-witem-design]
    - id: scheduling_context
      labels: {zh: 调度上下文, en: scheduling context, ja: スケジュール文脈}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 队列、最早派发时间、期限与并发分区等本次分配属性。
        en: Assignment-specific queue, earliest dispatch time, due time, and concurrency partition.
        ja: 割当固有のキュー/最早配信/期限/並行区画。
      example_value:
        queue: release-audit
        not_before: 2026-07-16T09:00:00Z
        due_by: 2026-07-16T18:00:00Z
        concurrency_key: ledger-2026-07
      source_claims: [claim-witem-design]
    - id: assignment_rationale
      labels: {zh: 分配理由, en: assignment rationale, ja: 割当理由}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 说明为何由该 ActorRoleBinding 承担此 Task，支持问责和重新分配审查。
        en: Why this ActorRoleBinding carries the Task for accountability and reassignment review.
        ja: この ActorRoleBinding が Task を担当する理由。
      example_value: The auditor binding holds the required ledger-review authority and is available before the deadline.
      source_claims: [claim-witem-design]
  constraints:
    - id: work-item-task-id-matches-allocation-edge
      severity: error
      expression_language: plain
      expression: task_id equals the target identifier of the single WorkItem-allocates-Task edge
      explanations:
        zh: task_id 是交换键而非第二套关系；若与 allocates 端点不一致，工作项无效。
        en: task_id is an interchange key; mismatch with allocates endpoint invalidates the WorkItem.
        ja: task_id は交換キーで allocates 端点と不一致なら無効です。
      source_claims: [claim-witem-design]
    - id: work-item-assignee-id-matches-assignment-edge
      severity: error
      expression_language: plain
      expression: assignee_binding_id equals the target identifier of the single WorkItem-assigned_to-ActorRoleBinding edge
      explanations:
        zh: assignee_binding_id 只镜像规范关系端点；不一致时不能覆盖 assigned_to 边。
        en: assignee_binding_id mirrors the canonical endpoint and must not overwrite assigned_to on mismatch.
        ja: 正規 assigned_to 端点の写像のみで上書き不可。
      source_claims: [claim-witem-design]
    - id: work-item-priority-range
      severity: error
      expression_language: plain
      expression: priority is an integer between 0 and 100 inclusive
      explanations:
        zh: 优先级必须处于同一受控范围，便于跨分配比较而不污染 Task。
        en: Priority stays in one controlled range for comparing allocations without contaminating Task.
        ja: 統制範囲内で割当間比較可能にします。
      source_claims: [claim-witem-design]
    - id: work-item-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: WorkItem-depends_on-WorkItem edges remain within one TaskPlan version and are acyclic
      explanations:
        zh: 分配级调度依赖必须同计划且无环；重试不会创建反向依赖环。
        en: Allocation-level scheduling dependencies stay in one plan and are acyclic; retries do not create reverse cycles.
        ja: 同一計画内・非循環の割当依存が必要です。
      source_claims: [claim-witem-design]
  required_relation_constraints:
    - id: work-item-allocates-one-task
      direction: outgoing
      predicate: allocates
      target_concept_id: Task
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 一个 WorkItem 恰好分配一个稳定 Task；批量分配必须拆成多个 WorkItem。
        en: A WorkItem allocates exactly one stable Task; batch allocation uses multiple WorkItems.
        ja: 一 WorkItem は一 Task のみ割当。
      source_claims: [claim-witem-crewai]
    - id: work-item-assigned-to-one-role-binding
      direction: outgoing
      predicate: assigned_to
      target_concept_id: ActorRoleBinding
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 一个 WorkItem 恰好由一个 ActorRoleBinding 承担；协作需以多个工作项或显式协同结构表示。
        en: A WorkItem is carried by exactly one ActorRoleBinding; collaboration uses multiple WorkItems or explicit coordination.
        ja: 一 WorkItem は一 ActorRoleBinding が担当。
      source_claims: [claim-witem-crewai]
examples:
  - id: WorkItem-crewai-agent-assign
    labels: {zh: CrewAI agent 分配, en: CrewAI agent assignment, ja: CrewAI agent 割当}
    descriptions:
      zh: workitem-reconcile-auditor-3 把 task-spec-reconcile-7 分配给 binding-agent-auditor-3，priority 80，队列 release-audit；Task 预期结果不变。
      en: workitem-reconcile-auditor-3 allocates task-spec-reconcile-7 to binding-agent-auditor-3 at priority 80 on queue release-audit without changing Task outcome.
      ja: workitem-reconcile-auditor-3 が task-spec-reconcile-7 を auditor binding へ priority 80 で割当します。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task.agent}
    field_values:
      task_id: task-spec-reconcile-7
      assignee_binding_id: binding-agent-auditor-3
      priority: 80
    related_node_ids: [WorkItem, Task, ActorRoleBinding]
    related_relation_ids: [WorkItem-allocates-Task, WorkItem-assigned_to-ActorRoleBinding, WorkItem-is_a-WorkSpecification]
    source_claims: [claim-witem-crewai]
  - id: WorkItem-openai-handoff
    labels: {zh: OpenAI handoff 分配, en: OpenAI handoff allocation, ja: OpenAI handoff 割当}
    descriptions:
      zh: handoff 至 billing specialist 后创建新 WorkItem，assigned_to 指向 specialist binding，原 Task 规范保持不变。
      en: After handoff to billing specialist, a new WorkItem assigns to specialist binding while the Task spec remains unchanged.
      ja: billing specialist への handoff 後、新 WorkItem が specialist binding を assigned_to し Task 仕様は不変です。
    example_source: {product: OpenAI Agents SDK, url: https://openai.github.io/openai-agents-python/, version: handoffs}
    field_values:
      assignment_rationale: Billing specialist holds payment dispute authority.
    related_node_ids: [WorkItem, Task]
    related_relation_ids: [WorkItem-assigned_to-ActorRoleBinding]
    source_claims: [claim-witem-openai-agents]
  - id: WorkItem-boundary-execution
    labels: {zh: 运行不是工作项, en: Execution is not work item, ja: 実行は作業項目ではない}
    descriptions:
      zh: execution-reconcile-91 记录 running、开始时间与已生成日志；其身份由一次运行决定，应建模 Execution 而非 WorkItem。
      en: execution-reconcile-91 records running, start time, and generated logs; model as Execution not WorkItem.
      ja: running/開始時刻/ログを持つ execution-reconcile-91 は Execution です。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: allocation versus execution}
    field_values: {}
    related_node_ids: [WorkItem, Execution]
    related_relation_ids: []
    source_claims: [claim-witem-design]
parent_relation:
  id: WorkItem-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: WorkItem 以 Task 到 ActorRoleBinding 的分配语义为种差的 WorkSpecification 特化。
    en: WorkItem is a WorkSpecification whose differentia is allocation of a Task to an ActorRoleBinding.
    ja: Task を ActorRoleBinding へ割当てる WorkSpecification 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-witem-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: WorkItem-allocates-Task
    predicate: allocates
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 分配任务, en: allocates, ja: タスクを割り当てる}
    definitions:
      zh: 声明该 WorkItem 分配哪一个稳定 Task；一个 Task 可被多个 WorkItem 分配，但一个 WorkItem 只分配一个 Task。
      en: Declares which stable Task this WorkItem allocates; one Task may have many WorkItems but one WorkItem allocates one Task.
      ja: この WorkItem が割当する安定 Task を宣言します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 1, max: 1}
    inverse_reading:
      predicate: is_allocated_by
      labels: {zh: 由工作项分配, en: is allocated by, ja: 作業項目により割当}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-witem-crewai]
    layout_role: cross-link
    target: concept:Task
  - id: WorkItem-assigned_to-ActorRoleBinding
    predicate: assigned_to
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 分配给角色绑定, en: assigned to, ja: ロール束縛に割当}
    definitions:
      zh: 声明承担该 WorkItem 的 ActorRoleBinding；重新分配创建新 WorkItem 或修订，不修改 Task。
      en: Declares the ActorRoleBinding carrying this WorkItem; reassignment creates new WorkItem or revision without modifying Task.
      ja: この WorkItem を担当する ActorRoleBinding を宣言します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 1, max: 1}
    inverse_reading:
      predicate: carries
      labels: {zh: 承担工作项, en: carries, ja: 作業項目を担当}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-witem-crewai]
    layout_role: cross-link
    target: concept:ActorRoleBinding
  - id: WorkItem-depends_on-WorkItem
    predicate: depends_on
    direction: source-to-target
    relation_kind: information
    labels: {zh: 依赖于前置工作项, en: depends on, ja: 先行作業項目に依存する}
    definitions:
      zh: 分配级调度依赖：依赖 WorkItem 的派发须在前置 WorkItem 的分配条件满足之后；须同 TaskPlan 版本且无环。
      en: "Allocation-level scheduling dependency — dependent WorkItem dispatch waits until predecessor allocation conditions hold; same TaskPlan version and acyclic."
      ja: 割当レベル依存：依存 WorkItem の配信は先行割当条件成立後、同一 TaskPlan 版・非循環。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 0, max: null}
    inverse_reading:
      predicate: is_predecessor_of
      labels: {zh: 是前置工作项, en: is predecessor of, ja: 先行作業項目である}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-witem-design]
    layout_role: cross-link
    target: concept:WorkItem
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task agent assignment.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Handoff assignee context.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: WorkItem versus Task and Execution boundaries.
source_claims:
  - id: claim-witem-crewai
    source: crewai
    supports: CrewAI binds a responsible agent to each task without changing the task's reusable description, matching WorkItem allocation semantics.
    locator: Tasks > agent assignment
    evidence_kind: official
    confidence: high
  - id: claim-witem-openai-agents
    source: openai-agents
    supports: OpenAI Agents handoffs reassign work to another agent binding while preserving the underlying task intent as a separate specification concern.
    locator: Handoffs
    evidence_kind: official
    confidence: medium
  - id: claim-witem-design
    source: moonweave-design
    supports: Moonweave models allocation packages with priority and scheduling context as WorkItem distinct from Task specs and Execution runs.
    locator: WorkItem concept boundary
    evidence_kind: design-inference
    confidence: high
