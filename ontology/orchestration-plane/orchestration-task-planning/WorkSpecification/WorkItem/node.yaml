schema: moonweave.ai/ontology-node/v1
id: WorkItem
kind: concept
status: accepted
labels:
  zh: 工作项
  en: work item
  ja: 作業項目
semantics:
  short_definition:
    zh: 工作项是把任务分配给具体角色绑定并附加调度上下文的分配包。
    en: A work item is an allocation package that assigns a Task to a specific role binding with scheduling context.
    ja: 作業項目は、Task を具体的なロール束縛へ割り当て、スケジュール文脈を付ける割当パッケージです。
  definition:
    zh: WorkItem 是一种 WorkSpecification，其种差是把一个 Task 规范分配给代表具体受派者的 ActorRoleBinding，并携带本次分配的优先级、期限或队列上下文；重新分配会产生新的 WorkItem 或修订。它不是 Task 的预期结果定义，也不是分配后发生的 Execution。
    en: A WorkItem is a WorkSpecification distinguished as an allocation package that binds one Task specification to an ActorRoleBinding representing the assignee and carries assignment-specific priority, due date, or queue context; reassignment creates a new WorkItem or revision. It is neither the Task's desired-outcome definition nor the Execution that occurs after allocation.
    ja: WorkItem は、一つの Task 仕様を担当者を表す ActorRoleBinding に割り当て、割当固有の優先度・期限・キュー文脈を持つ WorkSpecification です。再割当では新しい WorkItem または改訂を作ります。Task の望ましい結果定義でも、割当後に発生する Execution でもありません。
  why_needed:
    zh: 单独表示分配，可在不改写 Task 的情况下调整负责人和优先级，并保留谁以何种角色承担何项工作的问责历史。
    en: Representing allocation separately permits performer and priority changes without rewriting Task and preserves an accountability history of who accepted which work in which role.
    ja: 割当を分離して表すことで、Task を書き換えず担当者や優先度を変更でき、誰がどの役割で何を引き受けたかの説明責任履歴を保てます。
  includes:
    - zh: 工作项标识、被分配的 task_id、assignee_binding_id、优先级，以及可选期限和队列上下文。
      en: A work-item identifier, allocated task_id, assignee_binding_id, priority, and optional due-date and queue context.
      ja: 作業項目識別子、割当対象 task_id、assignee_binding_id、優先度、任意の期限とキュー文脈を含みます。
  excludes:
    - zh: Task 的稳定预期结果、Actor 本身、一次运行状态、实际开始时间和运行产物。
      en: The Task's stable desired outcome, the Actor itself, one run's state, actual start time, and runtime artifacts.
      ja: Task の安定した望ましい結果、Actor 自体、一回の実行状態、実開始時刻、実行成果物は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: task_id
      labels:
        zh: 被分配任务标识
        en: allocated task ID
        ja: 割当対象 Task ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 allocates 关系所指 Task 的规范标识，供序列化与边界校验使用；它不得取代关系本身。
        en: Carries the specification identifier of the Task targeted by the allocates relation for serialization and boundary validation; it never replaces that relation.
        ja: allocates 関係が指す Task の仕様識別子をシリアライズと境界検証用に保持し、関係自体を置換しません。
      allowed_values: []
      pattern: ^task-spec-[A-Za-z0-9._:-]+$
      example_value: task-spec-reconcile-7
      source_claims:
        - claim-work-item-002
    - id: assignee_binding_id
      labels:
        zh: 受派角色绑定标识
        en: assignee role-binding ID
        ja: 担当ロール束縛 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 assigned_to 关系所指 ActorRoleBinding 的标识，使一次分配可被完整交换并与规范边核对。
        en: Carries the ActorRoleBinding identifier targeted by assigned_to so an allocation can be exchanged completely and checked against its canonical edge.
        ja: assigned_to が指す ActorRoleBinding 識別子を保持し、割当を完全に交換して正規辺と照合可能にします。
      allowed_values: []
      pattern: ^binding-[A-Za-z0-9._:-]+$
      example_value: binding-agent-auditor-3
      source_claims:
        - claim-work-item-003
    - id: priority
      labels:
        zh: 调度优先级
        en: scheduling priority
        ja: スケジュール優先度
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在同一调度队列中以 0 至 100 表示该分配的相对优先级，不改变 Task 身份。
        en: Represents this allocation's relative priority from 0 through 100 within one scheduling queue without changing Task identity.
        ja: 同一キュー内で割当の相対優先度を 0〜100 で表し、Task 同一性は変更しません。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims:
        - claim-work-item-004
    - id: scheduling_context
      labels:
        zh: 调度上下文
        en: scheduling context
        ja: スケジュール文脈
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明队列、最早派发时间、期限与并发分区等本次分配属性。
        en: Declares assignment-specific queue, earliest dispatch time, due time, and concurrency partition.
        ja: 割当固有のキュー・最早配信時刻・期限・並行区画を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        queue: release-audit
        not_before: 2026-07-16T09:00:00Z
        due_by: 2026-07-16T18:00:00Z
        concurrency_key: ledger-2026-07
      source_claims:
        - claim-work-item-005
    - id: assignment_rationale
      labels:
        zh: 分配理由
        en: assignment rationale
        ja: 割当理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明为何由该 ActorRoleBinding 承担此 Task，支持问责和重新分配审查。
        en: Explains why this ActorRoleBinding carries the Task for accountability and reassignment review.
        ja: 説明責任と再割当審査のため、この ActorRoleBinding が Task を担当する理由を示します。
      allowed_values: []
      pattern: null
      example_value: The auditor binding holds the required ledger-review authority and is available before the deadline.
      source_claims:
        - claim-work-item-006
  constraints:
    - id: work-item-task-id-matches-allocation-edge
      severity: error
      expression_language: plain
      expression: task_id equals the target identifier of the single WorkItem-allocates-Task edge
      explanations:
        zh: task_id 是交换键而非第二套关系；若它与 allocates 端点不一致，工作项无效。
        en: task_id is an interchange key rather than a second relationship; the WorkItem is invalid when it disagrees with the allocates endpoint.
        ja: task_id は交換キーであって第二の関係ではなく、allocates 端点と不一致なら WorkItem は無効です。
      source_claims:
        - claim-work-item-007
    - id: work-item-assignee-id-matches-assignment-edge
      severity: error
      expression_language: plain
      expression: assignee_binding_id equals the target identifier of the single WorkItem-assigned_to-ActorRoleBinding edge
      explanations:
        zh: assignee_binding_id 只镜像规范关系端点；不一致时不能据此覆盖 assigned_to 边。
        en: assignee_binding_id only mirrors the canonical relation endpoint; a mismatch must not overwrite the assigned_to edge.
        ja: assignee_binding_id は正規関係端点だけを写し、不一致時に assigned_to 辺を上書きしてはなりません。
      source_claims:
        - claim-work-item-008
    - id: work-item-priority-range
      severity: error
      expression_language: plain
      expression: priority is an integer between 0 and 100 inclusive
      explanations:
        zh: 优先级必须处于同一受控范围，便于跨分配比较而不污染 Task。
        en: Priority remains in one controlled range for comparing allocations without contaminating Task identity.
        ja: 優先度は統制範囲内とし、Task 同一性を汚染せず割当間比較を可能にします。
      source_claims:
        - claim-work-item-009
    - id: work-item-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: WorkItem-depends_on-WorkItem edges remain within one TaskPlan version and are acyclic
      explanations:
        zh: 分配级调度依赖必须同计划且无环；重试不会创建反向依赖环。
        en: Allocation-level scheduling dependencies stay in one plan and are acyclic; a retry does not create a reverse dependency cycle.
        ja: 割当レベルのスケジュール依存は同一計画内・非循環で、再試行は逆向き依存循環を作りません。
      source_claims:
        - claim-work-item-010
  required_relation_constraints:
    - id: work-item-allocates-one-task
      direction: outgoing
      predicate: allocates
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好分配一个稳定 Task；批量分配必须拆成多个 WorkItem。
        en: A WorkItem allocates exactly one stable Task; batch allocation is represented by multiple WorkItems.
        ja: 一つの WorkItem は安定 Task を一つだけ割り当て、複数一括割当は複数 WorkItem で表します。
      source_claims:
        - claim-work-item-011
    - id: work-item-assigned-to-one-role-binding
      direction: outgoing
      predicate: assigned_to
      target_concept_id: ActorRoleBinding
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好由一个 ActorRoleBinding 承担；协作需以多个工作项或显式协同结构表示。
        en: A WorkItem is carried by exactly one ActorRoleBinding; collaboration uses multiple WorkItems or an explicit coordination structure.
        ja: 一つの WorkItem は一つの ActorRoleBinding が担当し、協働は複数 WorkItem または明示協調構造で表します。
      source_claims:
        - claim-work-item-012
    - id: work-item-belongs-to-plan
      direction: incoming
      predicate: contains_work_item
      target_concept_id: TaskPlan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 WorkItem 恰好属于一个 TaskPlan 版本，其调度依赖在该版本内解释。
        en: A WorkItem belongs to exactly one TaskPlan version in which its scheduling dependencies are interpreted.
        ja: 一つの WorkItem は一つの TaskPlan 版だけに属し、その版内でスケジュール依存を解釈します。
      source_claims:
        - claim-work-item-013
examples:
  - id: WorkItem-example-positive-manual-001
    kind: positive
    labels:
      zh: 工作项正例
      en: Positive example for work item
      ja: 作業項目の正例
    scenario_id: null
    descriptions:
      zh: work-item-71 把 task-spec-reconcile-7 分配给 binding-agent-auditor-3，优先级为 2，截止到 18:00。
      en: work-item-71 allocates task-spec-reconcile-7 to binding-agent-auditor-3 with priority 2 and an 18:00 due time.
      ja: work-item-71 は task-spec-reconcile-7 を binding-agent-auditor-3 に優先度2、期限18:00で割り当てます。
    field_values:
      task_id: task-spec-reconcile-7
      assignee_binding_id: binding-agent-auditor-3
      priority: 80
      scheduling_context:
        queue: release-audit
        not_before: 2026-07-16T09:00:00Z
        due_by: 2026-07-16T18:00:00Z
        concurrency_key: ledger-2026-07
      assignment_rationale: The auditor binding holds the required ledger-review authority and is available before the deadline.
      work_specification_id: work-item-71
      revision: "2"
      intended_transformation: allocate authorized ledger reconciliation work to an eligible bearer
      input_contract_refs:
        - task-spec-reconcile-7@4
        - ledger-snapshot@2
      output_contract_refs:
        - reconciliation-report@3
      acceptance_basis_ref: reconciliation-zero-unexplained-differences@4
      applicability_boundary:
        queue: release-audit
        concurrency_key: ledger-2026-07
    related_node_ids:
      - WorkItem
      - WorkSpecification
      - Task
      - ActorRoleBinding
      - Execution
    related_relation_ids:
      - WorkItem-is_a-WorkSpecification
      - WorkItem-allocates-Task
      - WorkItem-assigned_to-ActorRoleBinding
      - Execution-carries_out-WorkItem
    expected_result:
      zh: work-item-71 是 WorkItem；Task 保持不变，后续 Execution 可引用该分配上下文。
      en: work-item-71 is a WorkItem; the Task remains unchanged and a later Execution may reference this allocation context.
      ja: work-item-71 は WorkItem であり、Task は不変のまま、後続 Execution がこの割当文脈を参照できます。
    why_valid_or_invalid:
      zh: 它同时标识被分配任务、角色绑定和调度属性，满足分配包而非任务规范的身份条件。
      en: It identifies the allocated task, role binding, and scheduling attributes, satisfying allocation-package rather than task-specification identity.
      ja: 割当タスク、ロール束縛、スケジュール属性を識別し、タスク仕様ではなく割当パッケージの同一性を満たすためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-work-item-014
  - id: WorkItem-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工作项边界例
      en: Boundary case for work item
      ja: 作業項目の境界例
    scenario_id: null
    descriptions:
      zh: task-spec-reconcile-7 只定义预期对账结果、输入和完成标准，没有 assignee_binding_id 或 priority。
      en: task-spec-reconcile-7 defines only the desired reconciliation outcome, inputs, and completion criterion and has no assignee_binding_id or priority.
      ja: task-spec-reconcile-7 は望ましい照合結果、入力、完了基準だけを定め、assignee_binding_id や priority を持ちません。
    field_values:
      work_specification_id: work-item-missing-allocation
      revision: "1"
      task_id: task-spec-reconcile-7
      assignee_binding_id: binding-missing-allocation-edge
      priority: 80
      scheduling_context:
        queue: release-audit
      assignment_rationale: Only a Task desired outcome was supplied; no Task or ActorRoleBinding relation exists.
    related_node_ids:
      - WorkItem
      - WorkSpecification
      - Task
    related_relation_ids:
      - WorkItem-is_a-WorkSpecification
      - WorkItem-allocates-Task
    expected_result:
      zh: 该对象仍是 Task；应由另一个 WorkItem 对它进行分配。
      en: The object remains a Task and should be allocated by a separate WorkItem.
      ja: この対象は Task のままで、別の WorkItem により割り当てます。
    why_valid_or_invalid:
      zh: 预期结果定义与负责人无关，缺少分配对象和调度上下文，不能成为 WorkItem。
      en: The desired-outcome definition is assignee-independent and lacks both an allocation target and scheduling context, so it is not a WorkItem.
      ja: 望ましい結果の定義は担当者から独立し、割当対象とスケジュール文脈を欠くため WorkItem ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-work-item-015
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Task
    shared_parent_concept_id: WorkSpecification
    differentia:
      zh: 正向身份比较：父节点 WorkSpecification：WorkItem（semantic kind=specification，骨架 WorkItem-is_a-WorkSpecification）；Task（semantic kind=specification，骨架 Task-is_a-WorkSpecification）。双端条件：WorkItem 条件：“工作项属于工作规约，区别于其他同类对象的条件是：它是从任务中拆出的可分配工作单元，可限定到参与者、工具、子智能体、路由或产物结果”；Task 条件：“任务是一种工作规约（WorkSpecification），以 task_id 标识一项可分派工作，并用状态、优先级、约束与完成标准描述尚待实现的工作；一次具体执行由 RunAttempt 表示”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent WorkSpecification: WorkItem (semantic kind=specification, backbone WorkItem-is_a-WorkSpecification); Task (semantic kind=specification, backbone Task-is_a-WorkSpecification). Endpoint conditions: WorkItem condition: “Work item is a work specification whose defining condition is that it is an assignable unit of planned work derived from a task and scoped to an actor, tool, subagent, route, or artifact outcome”; Task condition: “A Task is a WorkSpecification identified by task_id that describes assignable work through status, priority, constraints, and completion criteria; one concrete execution is represented by a RunAttempt”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 WorkSpecification：WorkItem（semantic kind=specification、バックボーン WorkItem-is_a-WorkSpecification）；Task（semantic kind=specification、バックボーン Task-is_a-WorkSpecification）。両端条件：WorkItem の条件：「作業項目は作業仕様のうち、次の事実を定義条件とする対象です：それはタスクから派生する割り当て可能な作業単位で、参加者、道具、サブエージェント、経路、成果物に範囲づけられます」；Task の条件：「タスクは作業仕様（WorkSpecification）の一種で、task_id により割当可能な作業を識別し、状態、優先度、制約、完了基準によって未実現の作業を記述します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-work-item-016
      - claim-work-item-017
parent_relation:
  id: WorkItem-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: WorkItem —is_a→ WorkSpecification 表示工作项是一种规范性工作，其种差是把稳定 Task 分配给具体 ActorRoleBinding 并附加本次分配的调度上下文。
    en: WorkItem —is_a→ WorkSpecification classifies a work item as normative work whose differentia is allocating a stable Task to a particular ActorRoleBinding with assignment-specific scheduling context.
    ja: WorkItem —is_a→ WorkSpecification は、安定した Task を具体的 ActorRoleBinding へ割り当て、割当固有のスケジュール文脈を付ける種差を持つ規範的作業として分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: WorkItem-is_a-WorkSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: work-item-71 把 task-spec-reconcile-7 分配给 auditor 角色绑定并设置队列优先级。
        en: work-item-71 allocates task-spec-reconcile-7 to an auditor role binding and sets queue priority.
        ja: work-item-71 は task-spec-reconcile-7 を auditor ロール束縛へ割り当て、キュー優先度を設定します。
      field_values: {}
      related_node_ids:
        - WorkItem
        - WorkSpecification
      related_relation_ids:
        - WorkItem-is_a-WorkSpecification
      expected_result:
        zh: work-item-71 既是 WorkItem，也是 WorkSpecification。
        en: work-item-71 is both WorkItem and WorkSpecification.
        ja: work-item-71 は WorkItem であり WorkSpecification でもあります。
      why_valid_or_invalid:
        zh: 它规定尚待执行的分配工作，没有一次运行的时间线或结果。
        en: It specifies allocated work still to be performed and has no timeline or outcome of one run.
        ja: 未実行の割当作業を規定し、一回の実行時系列や結果を持たないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-work-item-018
    - id: WorkItem-is_a-WorkSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: execution-71 记录受派 agent 实际开始、失败并生成诊断日志。
        en: execution-71 records the assigned agent actually starting, failing, and producing a diagnostic log.
        ja: execution-71 は担当 agent が実際に開始・失敗し、診断ログを生成したことを記録します。
      field_values: {}
      related_node_ids:
        - WorkItem
        - WorkSpecification
      related_relation_ids:
        - WorkItem-is_a-WorkSpecification
      expected_result:
        zh: execution-71 是 Execution，而不是 WorkItem 或 WorkSpecification。
        en: execution-71 is Execution rather than WorkItem or WorkSpecification.
        ja: execution-71 は Execution であり、WorkItem や WorkSpecification ではありません。
      why_valid_or_invalid:
        zh: 实际发生的状态和产物使它越过分配规范进入运行层。
        en: Actual state and artifacts place it in the runtime layer beyond the allocation specification.
        ja: 実状態と成果物を持つため、割当仕様を越えて実行層に属します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-work-item-019
  source_claims:
    - claim-work-item-020
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: WorkItem-allocates-Task
    predicate: allocates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 分配
      en: allocates
      ja: 割り当てる
    definitions:
      zh: WorkItem —allocates→ Task 表示该工作项选择一个稳定任务规范作为被分配工作；重新分配不会修改 Task 的预期结果，而会产生新的工作项或版本。
      en: WorkItem —allocates→ Task means that the work item selects one stable Task specification as the work being allocated. Reassignment does not modify the Task's desired outcome; it creates a new WorkItem or revision.
      ja: WorkItem —allocates→ Task は、割当対象として一つの安定 Task 仕様を選び、再割当では Task の望ましい結果を変更せず、新 WorkItem または改訂を作ることを示します。
    cardinality:
