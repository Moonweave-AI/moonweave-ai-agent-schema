      en: WorkItem —depends_on→ WorkItem points from an allocation awaiting scheduling to a predecessor allocation in the same TaskPlan that must first release evidence. It refines allocation-level scheduling without changing the underlying Task dependency.
      ja: WorkItem —depends_on→ WorkItem はスケジュール待ち割当から同じ TaskPlan 内で先に証拠を解放する先行割当へ向かい、基礎 Task 依存を変更せず割当レベルの調度を細化します。
