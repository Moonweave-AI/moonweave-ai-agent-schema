schema: moonweave.ai/ontology-node/v1
id: TaskStep
kind: concept
labels:
  zh: 任务步骤
  en: task step
  ja: タスクステップ
semantics:
  short_definition:
    zh: 任务步骤是任务计划中具有明确输入、动作和预期输出的有序位置。
    en: A task step is an ordered position in a task plan with explicit input, action, and expected output.
    ja: タスクステップは、明示した入力・動作・期待出力を持つタスク計画内の順序位置です。
  definition:
    zh: TaskStep 是一种 WorkSpecification，其身份由特定 TaskPlan 中的有序位置、所需输入、动作规约和预期输出共同决定；它可进一步指定 ToolCallPlan。它不是完整的结果导向 Task，也不是执行该位置时产生的 step event。
    en: A TaskStep is a WorkSpecification whose identity is jointly determined by an ordered position in a particular TaskPlan, required input, action specification, and expected output; it may further specify a ToolCallPlan. It is neither the complete outcome-oriented Task nor the step event produced when that position executes.
    ja: TaskStep は、特定 TaskPlan 内の順序位置、必要入力、動作仕様、期待出力によって同一性が決まり、さらに ToolCallPlan を指定できる WorkSpecification です。結果全体を定める Task でも、その位置を実行した step event でもありません。
  why_needed:
    zh: 显式步骤节点使计划能表达依赖、分支和工具调用意图，同时让运行事件引用稳定步骤而不把运行状态写回计划。
    en: An explicit step node lets a plan express dependencies, branches, and intended tool calls while runtime events reference a stable step without writing execution state back into the plan.
    ja: 明示的ステップにより、計画は依存・分岐・ツール呼出し意図を表し、実行イベントは状態を計画へ書き戻さず安定したステップを参照できます。
  includes:
    - zh: 步骤标识、计划内有序位置、动作规约、所需输入和预期输出，以及到依赖或 ToolCallPlan 的规范关系。
      en: A step identifier, ordered plan position, action specification, required input, expected output, and normative links to dependencies or a ToolCallPlan.
      ja: ステップ識別子、計画内順序位置、動作仕様、必要入力、期待出力、依存または ToolCallPlan への規範的リンクを含みます。
  excludes:
    - zh: 整个任务的最终结果定义、当前执行状态、工具调用响应、持续时间和步骤失败事件。
      en: The whole task's final outcome definition, current execution state, tool-call response, elapsed duration, and step-failure event.
      ja: タスク全体の最終結果定義、現在の実行状態、ツール呼出し応答、所要時間、ステップ失敗イベントは含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      每个 TaskStep 编译为 LangGraph 具名节点函数，其 action_spec 决定节点内工具调用或 LLM 调用；Agents SDK 中
      对应一个带 instructions 的 Agent 或一次 tool-enabled Runner 步骤。节点返回的 state 更新写入 checkpoint，
      不修改 TaskStep 的 position 或 expected_output；A2A input-required 状态只影响协议 Task，不改变计划步骤规约。
    en: >-
      Each TaskStep compiles to a named LangGraph node function whose action_spec determines in-node tool or LLM calls; in the
      Agents SDK it corresponds to an Agent with instructions or one tool-enabled Runner step. Node state updates write to
      checkpoints without changing TaskStep position or expected_output; A2A input-required status affects only the protocol
      Task, not the plan step specification.
    ja: >-
      各 TaskStep は LangGraph の named node function にコンパイルされ、action_spec が node 内 tool または LLM call を決める。
      Agents SDK では instructions を持つ Agent または tool-enabled Runner step に対応する。node の state update は checkpoint
      に書き込まれ TaskStep の position や expected_output は変更しない。A2A input-required status は protocol Task にのみ
      影響し plan step specification は変更しない。
  typical_input:
    - description:
        zh: 计划内一步的输入、动作与预期输出声明。
        en: A plan step declaration with input, action, and expected output.
        ja: input、action、expected output を持つ plan step declaration。
      format: |-
        {"step_id":"step:reconcile","plan_ref":"plan:ledger-reconcile-2026-07","plan_revision":"v2","position":2,"action_spec":{"kind":"tool","tool_name":"ledger.reconcile"},"required_input_refs":["ledger-snapshot@2"],"expected_output_ref":"reconciliation-report@3"}
  typical_output:
    - description:
        zh: 图编译器注册的节点绑定，不含节点执行后的 state 快照。
        en: A node binding registered by a graph compiler, without the post-execution state snapshot.
        ja: graph compiler が登録した node binding。実行後 state snapshot は含まない。
      format: |-
        {"step_ref":"step:reconcile","graph_node":"reconcile","adapter":"langgraph","depends_on":["step:fetch"],"tool_call_plan_ref":"tcp:reconcile-ledger@1"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents add_node and node functions that return state updates at runtime.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner steps whose outputs are runtime facts, not plan revisions.
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Documents TASK_STATE_INPUT_REQUIRED as protocol runtime status, not plan structure.
  source_claims:
    - claim-task-step-002
    - claim-task-step-009
structure:
  identity_keys: []
  fields:
    - id: position
      labels:
        zh: 计划位置
        en: plan position
        ja: 計画位置
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供同一计划版中的稳定展示位置；执行先后仍由 depends_on 边决定。
        en: Provides a stable display position within one plan version; depends_on edges, not this number, determine execution precedence.
        ja: 同一計画版内の安定表示位置を示し、実行順序はこの番号ではなく depends_on 辺で決まります。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-task-step-002
    - id: input_contract
      labels:
        zh: 步骤输入合同
        en: step input contract
        ja: ステップ入力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明动作开始前必须可用的数据类型、模式、来源与完整性条件。
        en: Declares data types, schemas, provenance, and integrity conditions required before the action begins.
        ja: 動作開始前に必要なデータ種別・スキーマ・来歴・完全性条件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: SignedPackage
        schema: signed-package@2
        integrity: signature-present
      source_claims:
        - claim-task-step-003
    - id: action_specification
      labels:
        zh: 动作规约
        en: action specification
        ja: 動作仕様
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定该位置应执行的操作及可选 ToolCallPlan 引用，不记录一次调用事件。
        en: Specifies the operation at this position and an optional ToolCallPlan reference without recording an invocation occurrence.
        ja: この位置で行う操作と任意 ToolCallPlan 参照を定め、一回の呼出し事象は記録しません。
      allowed_values: []
      pattern: null
      example_value:
        operation: verify-package-signature
        tool_call_plan_ref: ToolCallPlan:cosign-verify@1
      source_claims:
        - claim-task-step-004
    - id: output_contract
      labels:
        zh: 步骤输出合同
        en: step output contract
        ja: ステップ出力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该动作完成后供下游步骤消费的结果类型、模式与保证。
        en: Declares the result type, schema, and guarantees made available to downstream steps after the action completes.
        ja: 動作完了後に下流ステップへ提供する結果種別・スキーマ・保証を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: VerificationReport
        schema: verification-report@1
        guarantees:
          - signature_checked
      source_claims:
        - claim-task-step-005
  constraints:
    - id: task-step-contract-complete
      severity: error
      expression_language: plain
      expression: position >= 0 and input_contract, action_specification, and output_contract are non-empty
      explanations:
        zh: 任务步骤必须同时给出位置、输入、动作和输出，不能只以名称充当可执行规约。
        en: A TaskStep supplies position, input, action, and output and cannot use a name alone as an executable specification.
        ja: TaskStep は位置・入力・動作・出力を全て示し、名称だけを実行仕様にはできません。
      source_claims:
        - claim-task-step-006
    - id: task-step-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: TaskStep-depends_on-TaskStep edges remain within one TaskPlan version and are acyclic; every predecessor output_contract is compatible with the dependent input_contract
      explanations:
        zh: 步骤依赖必须同计划、无环且类型相容；数组位置不能替代依赖边。
        en: Step dependencies stay in one plan, are acyclic, and have compatible output-input contracts; array position does not replace an edge.
        ja: ステップ依存は同一計画内・非循環・入出力型互換で、配列位置は依存辺の代用になりません。
      source_claims:
        - claim-task-step-007
  required_relation_constraints:
    - id: task-step-refines-task
      direction: incoming
      predicate: decomposes_into
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskStep 恰好细化一个稳定 Task，避免步骤游离于预期结果之外。
        en: Each TaskStep refines exactly one stable Task so it cannot float free of a desired outcome.
        ja: 各 TaskStep は一つの安定 Task だけを細化し、望ましい結果から遊離しません。
      source_claims:
        - claim-task-step-008
    - id: task-step-belongs-to-plan
      direction: incoming
      predicate: contains_step
      target_concept_id: TaskPlan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskStep 恰好属于一个 TaskPlan 版本，其位置和依赖均在该版本内解释。
        en: Each TaskStep belongs to exactly one TaskPlan version in which its position and dependencies are interpreted.
        ja: 各 TaskStep は一つの TaskPlan 版だけに属し、その版内で位置と依存を解釈します。
      source_claims:
        - claim-task-step-009
examples:
  - id: TaskStep-example-positive-manual-001
    labels:
      zh: TaskStep positive
      en: TaskStep positive
      ja: TaskStep positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 TaskStep 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for TaskStep: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が TaskStep で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {position: 2}

    related_node_ids:
      - TaskStep
      - WorkSpecification
      - TaskPlan
      - ToolCallPlan
    related_relation_ids:
      - TaskStep-is_a-WorkSpecification
      - TaskPlan-contains_step-TaskStep
      - TaskStep-depends_on-TaskStep
      - TaskStep-specifies-ToolCallPlan
    source_claims:
      - claim-task-step-010

  - id: TaskStep-example-boundary-manual-001
    labels:
      zh: TaskStep boundary
      en: TaskStep boundary
      ja: TaskStep boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 TaskStep 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not TaskStep specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で TaskStep spec ではない。
    field_values: {work_specification_id: step-event-995, revision: runtime-occurrence, position: 2}

    related_node_ids:
      - TaskStep
      - WorkSpecification
    related_relation_ids:
      - TaskStep-is_a-WorkSpecification
    source_claims:
      - claim-task-step-011

  - id: TaskStep-example-counterexample-confusable
    labels:
      zh: TaskStep counterexample
      en: TaskStep counterexample
      ja: TaskStep counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 TaskStep。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style TaskStep.
      ja: Python/code なし自然言語計画は TaskWeaver 式 TaskStep にならない。
    field_values: {step_id: absent, step_kind: absent, runtime_node: approve}

    related_node_ids:
      - TaskStep
      - TaskPlan
      - WorkItem
      - WorkSpecification
      - ToolCallPlan
    related_relation_ids: []
    source_claims:
      - claim-task-step-010

  - id: TaskStep-example-instance-concrete
    labels:
      zh: TaskStep instance
      en: TaskStep instance
      ja: TaskStep instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 TaskStep 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable TaskStep instance.
      ja: ReAct 实例 Thought→Action Search→Observation が TaskStep 監査实例に写像。
    field_values: {position: 2}

    related_node_ids:
      - TaskStep
      - WorkSpecification
      - TaskPlan
      - ToolCallPlan
    related_relation_ids: []
    source_claims:
      - claim-task-step-010

