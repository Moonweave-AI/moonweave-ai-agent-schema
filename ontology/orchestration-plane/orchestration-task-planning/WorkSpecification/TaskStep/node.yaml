schema: moonweave.ai/ontology-node/v1
id: TaskStep
kind: concept
status: accepted
labels:
  zh: 任务步骤
  en: task step
  ja: タスクステップ
semantics:
  short_definition:
    zh: 任务步骤是任务计划中具有明确输入、动作和预期输出的有序位置。
    en: A task step is an ordered position in a task plan with explicit input, action, and expected output.
    ja: タスクステップは、明示した入力・動作・期待出力を持つタスク計画内の順序位置です。
  definition:
    zh: TaskStep 是一种 WorkSpecification，其身份由特定 TaskPlan 中的有序位置、所需输入、动作规约和预期输出共同决定；它可进一步指定 ToolCallPlan。它不是完整的结果导向 Task，也不是执行该位置时产生的 step event。
    en: A TaskStep is a WorkSpecification whose identity is jointly determined by an ordered position in a particular TaskPlan, required input, action specification, and expected output; it may further specify a ToolCallPlan. It is neither the complete outcome-oriented Task nor the step event produced when that position executes.
    ja: TaskStep は、特定 TaskPlan 内の順序位置、必要入力、動作仕様、期待出力によって同一性が決まり、さらに ToolCallPlan を指定できる WorkSpecification です。結果全体を定める Task でも、その位置を実行した step event でもありません。
  why_needed:
    zh: 显式步骤节点使计划能表达依赖、分支和工具调用意图，同时让运行事件引用稳定步骤而不把运行状态写回计划。
    en: An explicit step node lets a plan express dependencies, branches, and intended tool calls while runtime events reference a stable step without writing execution state back into the plan.
    ja: 明示的ステップにより、計画は依存・分岐・ツール呼出し意図を表し、実行イベントは状態を計画へ書き戻さず安定したステップを参照できます。
  includes:
    - zh: 步骤标识、计划内有序位置、动作规约、所需输入和预期输出，以及到依赖或 ToolCallPlan 的规范关系。
      en: A step identifier, ordered plan position, action specification, required input, expected output, and normative links to dependencies or a ToolCallPlan.
      ja: ステップ識別子、計画内順序位置、動作仕様、必要入力、期待出力、依存または ToolCallPlan への規範的リンクを含みます。
  excludes:
    - zh: 整个任务的最终结果定义、当前执行状态、工具调用响应、持续时间和步骤失败事件。
      en: The whole task's final outcome definition, current execution state, tool-call response, elapsed duration, and step-failure event.
      ja: タスク全体の最終結果定義、現在の実行状態、ツール呼出し応答、所要時間、ステップ失敗イベントは含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: position
      labels:
        zh: 计划位置
        en: plan position
        ja: 計画位置
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供同一计划版中的稳定展示位置；执行先后仍由 depends_on 边决定。
        en: Provides a stable display position within one plan version; depends_on edges, not this number, determine execution precedence.
        ja: 同一計画版内の安定表示位置を示し、実行順序はこの番号ではなく depends_on 辺で決まります。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-task-step-002
    - id: input_contract
      labels:
        zh: 步骤输入合同
        en: step input contract
        ja: ステップ入力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明动作开始前必须可用的数据类型、模式、来源与完整性条件。
        en: Declares data types, schemas, provenance, and integrity conditions required before the action begins.
        ja: 動作開始前に必要なデータ種別・スキーマ・来歴・完全性条件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: SignedPackage
        schema: signed-package@2
        integrity: signature-present
      source_claims:
        - claim-task-step-003
    - id: action_specification
      labels:
        zh: 动作规约
        en: action specification
        ja: 動作仕様
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定该位置应执行的操作及可选 ToolCallPlan 引用，不记录一次调用事件。
        en: Specifies the operation at this position and an optional ToolCallPlan reference without recording an invocation occurrence.
        ja: この位置で行う操作と任意 ToolCallPlan 参照を定め、一回の呼出し事象は記録しません。
      allowed_values: []
      pattern: null
      example_value:
        operation: verify-package-signature
        tool_call_plan_ref: ToolCallPlan:cosign-verify@1
      source_claims:
        - claim-task-step-004
    - id: output_contract
      labels:
        zh: 步骤输出合同
        en: step output contract
        ja: ステップ出力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该动作完成后供下游步骤消费的结果类型、模式与保证。
        en: Declares the result type, schema, and guarantees made available to downstream steps after the action completes.
        ja: 動作完了後に下流ステップへ提供する結果種別・スキーマ・保証を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: VerificationReport
        schema: verification-report@1
        guarantees:
          - signature_checked
      source_claims:
        - claim-task-step-005
  constraints:
    - id: task-step-contract-complete
      severity: error
      expression_language: plain
      expression: position >= 0 and input_contract, action_specification, and output_contract are non-empty
      explanations:
        zh: 任务步骤必须同时给出位置、输入、动作和输出，不能只以名称充当可执行规约。
        en: A TaskStep supplies position, input, action, and output and cannot use a name alone as an executable specification.
        ja: TaskStep は位置・入力・動作・出力を全て示し、名称だけを実行仕様にはできません。
      source_claims:
        - claim-task-step-006
    - id: task-step-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: TaskStep-depends_on-TaskStep edges remain within one TaskPlan version and are acyclic; every predecessor output_contract is compatible with the dependent input_contract
      explanations:
        zh: 步骤依赖必须同计划、无环且类型相容；数组位置不能替代依赖边。
        en: Step dependencies stay in one plan, are acyclic, and have compatible output-input contracts; array position does not replace an edge.
        ja: ステップ依存は同一計画内・非循環・入出力型互換で、配列位置は依存辺の代用になりません。
      source_claims:
        - claim-task-step-007
  required_relation_constraints:
    - id: task-step-refines-task
      direction: incoming
      predicate: decomposes_into
      target_concept_id: Task
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskStep 恰好细化一个稳定 Task，避免步骤游离于预期结果之外。
        en: Each TaskStep refines exactly one stable Task so it cannot float free of a desired outcome.
        ja: 各 TaskStep は一つの安定 Task だけを細化し、望ましい結果から遊離しません。
      source_claims:
        - claim-task-step-008
    - id: task-step-belongs-to-plan
      direction: incoming
      predicate: contains_step
      target_concept_id: TaskPlan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 TaskStep 恰好属于一个 TaskPlan 版本，其位置和依赖均在该版本内解释。
        en: Each TaskStep belongs to exactly one TaskPlan version in which its position and dependencies are interpreted.
        ja: 各 TaskStep は一つの TaskPlan 版だけに属し、その版内で位置と依存を解釈します。
      source_claims:
        - claim-task-step-009
examples:
  - id: TaskStep-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务步骤正例
      en: Positive example for task step
      ja: タスクステップの正例
    scenario_id: null
    descriptions:
      zh: step-verify 位于 plan-release-12 的第 2 位，要求签名包作为输入，动作是验证签名，预期输出为 VerificationReport。
      en: step-verify occupies position 2 in plan-release-12, requires a signed package, specifies signature verification, and expects a VerificationReport.
      ja: step-verify は plan-release-12 の位置2にあり、署名済みパッケージを入力として要求し、署名検証を行い、VerificationReport を期待します。
    field_values:
      position: 2
      input_contract:
        type: SignedPackage
        schema: signed-package@2
        integrity: signature-present
      action_specification:
        operation: verify-package-signature
        tool_call_plan_ref: ToolCallPlan:cosign-verify@1
      output_contract:
        type: VerificationReport
        schema: verification-report@1
        guarantees:
          - signature_checked
      work_specification_id: step-verify-signature
      revision: "2"
      intended_transformation: verify the package signature and produce a verification report
      input_contract_refs:
        - signed-package@2
      output_contract_refs:
        - verification-report@1
      acceptance_basis_ref: signature-verification-success@1
      applicability_boundary:
        plan_ref: plan-release-12@3
        position: 2
    related_node_ids:
      - TaskStep
      - WorkSpecification
      - TaskPlan
      - ToolCallPlan
    related_relation_ids:
      - TaskStep-is_a-WorkSpecification
      - TaskPlan-contains_step-TaskStep
      - TaskStep-depends_on-TaskStep
      - TaskStep-specifies-ToolCallPlan
    expected_result:
      zh: step-verify 是 TaskStep，可被依赖边引用并可指定验证工具的 ToolCallPlan。
      en: step-verify is a TaskStep that dependency edges can reference and that may specify a ToolCallPlan for the verification tool.
      ja: step-verify は TaskStep であり、依存辺から参照でき、検証ツール用 ToolCallPlan を指定できます。
    why_valid_or_invalid:
      zh: 记录给出计划归属、有序位置、动作输入和预期输出，足以建立稳定的步骤身份。
      en: The record supplies plan membership, ordered position, action input, and expected output, establishing stable step identity.
      ja: 計画所属、順序位置、動作入力、期待出力が示され、安定したステップ同一性を確立するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-step-010
  - id: TaskStep-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务步骤边界例
      en: Boundary case for task step
      ja: タスクステップの境界例
    scenario_id: null
    descriptions:
      zh: step-event-995 记录 step-verify 在 15:08 调用工具、耗时 420 ms 并返回 exit code 2。
      en: step-event-995 records that step-verify invoked a tool at 15:08, took 420 ms, and returned exit code 2.
      ja: step-event-995 は step-verify が 15:08 にツールを呼び、420 ms を要し、exit code 2 を返したことを記録します。
    field_values:
      work_specification_id: step-event-995
      revision: runtime-occurrence
      position: 2
      input_contract:
        observed_at: 2026-07-16T15:08:00Z
      action_specification:
        tool_call_id: tool-call-995
        duration_ms: 420
      output_contract:
        exit_code: 2
    related_node_ids:
      - TaskStep
      - WorkSpecification
    related_relation_ids:
      - TaskStep-is_a-WorkSpecification
    expected_result:
      zh: step-event-995 是运行事件或 ToolCall，不是 TaskStep。
      en: step-event-995 is a runtime event or ToolCall, not a TaskStep.
      ja: step-event-995 は実行イベントまたは ToolCall であり、TaskStep ではありません。
    why_valid_or_invalid:
      zh: 时间、耗时和响应码描述一次发生；步骤规约在多次执行之间保持不变。
      en: Timestamp, duration, and response code describe one occurrence, whereas the step specification remains stable across executions.
      ja: 時刻、所要時間、応答コードは一回の出来事を表し、ステップ仕様は複数実行にわたり安定するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-step-011
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: WorkItem
    shared_parent_concept_id: WorkSpecification
    differentia:
      zh: 共享父节点对照：父节点 WorkSpecification：TaskStep（semantic kind=specification，骨架 TaskStep-is_a-WorkSpecification）；WorkItem（semantic kind=specification，骨架 WorkItem-is_a-WorkSpecification）。双端条件：TaskStep 条件：“任务步骤是以如下事实为区分特征的工作规约：它规定顺序、依赖、负责人、完成证据以及可选的调用计划；它不执行工具调用，执行身份由 ToolCall 与 ToolCallAttempt 承担”；WorkItem 条件：“工作项属于工作规约，区别于其他同类对象的条件是：它是从任务中拆出的可分配工作单元，可限定到参与者、工具、子智能体、路由或产物结果”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent WorkSpecification: TaskStep (semantic kind=specification, backbone TaskStep-is_a-WorkSpecification); WorkItem (semantic kind=specification, backbone WorkItem-is_a-WorkSpecification). Endpoint conditions: TaskStep condition: “Task step is a work specification; its differentiating condition is that it specifies ordering, dependencies, owner, completion evidence, and an optional invocation plan; it does not execute a tool call, whose execution identity belongs to ToolCall and ToolCallAttempt”; WorkItem condition: “Work item is a work specification whose defining condition is that it is an assignable unit of planned work derived from a task and scoped to an actor, tool, subagent, route, or artifact outcome”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 WorkSpecification：TaskStep（semantic kind=specification、バックボーン TaskStep-is_a-WorkSpecification）；WorkItem（semantic kind=specification、バックボーン WorkItem-is_a-WorkSpecification）。両端条件：TaskStep の条件：「タスクステップは作業仕様の一種であり、次の条件で区別されます：タスク手順は順序、依存、担当者、完了証拠、任意の呼出し計画を規定します」；WorkItem の条件：「作業項目は作業仕様のうち、次の事実を定義条件とする対象です：それはタスクから派生する割り当て可能な作業単位で、参加者、道具、サブエージェント、経路、成果物に範囲づけられます」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-task-step-012
parent_relation:
  id: TaskStep-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TaskStep —is_a→ WorkSpecification 表示步骤是规范性工作，其种差是所属 TaskPlan 中的有序位置以及该位置的输入、动作和预期输出。
    en: TaskStep —is_a→ WorkSpecification classifies a step as normative work whose differentia is an ordered position in a TaskPlan together with that position's input, action, and expected output.
    ja: TaskStep —is_a→ WorkSpecification は、TaskPlan 内の順序位置と、その位置の入力・動作・期待出力を種差とする規範的作業としてステップを分類します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TaskStep-is_a-WorkSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: step-sign 位于发布计划第 4 位，规定输入包、签名动作和 SignatureRecord 输出。
        en: step-sign occupies position 4 in the release plan and specifies package input, signing action, and SignatureRecord output.
        ja: step-sign は公開計画の位置4にあり、パッケージ入力、署名動作、SignatureRecord 出力を定めます。
      field_values: {}
      related_node_ids:
        - TaskStep
        - WorkSpecification
      related_relation_ids:
        - TaskStep-is_a-WorkSpecification
      expected_result:
        zh: step-sign 既是 TaskStep，也是 WorkSpecification。
        en: step-sign is both TaskStep and WorkSpecification.
        ja: step-sign は TaskStep であり WorkSpecification でもあります。
      why_valid_or_invalid:
        zh: 它完整具备计划位置和待执行动作规约，不包含一次执行状态。
        en: It has a complete plan position and action specification and contains no one-run state.
        ja: 完全な計画位置と実行予定動作仕様を持ち、一回の実行状態を含まないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-step-013
    - id: TaskStep-is_a-WorkSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: tool-call-17 记录 step-sign 实际调用签名服务并返回 503。
        en: tool-call-17 records step-sign actually invoking the signing service and receiving HTTP 503.
        ja: tool-call-17 は step-sign が実際に署名サービスを呼び HTTP 503 を受けたことを記録します。
      field_values: {}
      related_node_ids:
        - TaskStep
        - WorkSpecification
      related_relation_ids:
        - TaskStep-is_a-WorkSpecification
      expected_result:
        zh: 该对象是 ToolCall 运行活动，不是 TaskStep。
        en: The object is a runtime ToolCall activity, not TaskStep.
        ja: この対象は実行時 ToolCall 活動で、TaskStep ではありません。
      why_valid_or_invalid:
        zh: 响应码和实际调用属于一次发生，不能充当稳定步骤规约。
        en: A response code and actual invocation belong to one occurrence and cannot serve as the stable step specification.
        ja: 応答コードと実呼出しは一回の出来事に属し、安定ステップ仕様にはならないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-step-014
  source_claims:
    - claim-task-step-015
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: TaskStep-specifies-ToolCallPlan
    predicate: specifies
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: specifies
      en: specifies
      ja: specifies
    definitions:
      zh: TaskStep —specifies→ ToolCallPlan 表示步骤规范选定一个尚未执行的工具调用意图、参数绑定与预期返回契约；实际 ToolCall 和响应留在运行层。
      en: TaskStep —specifies→ ToolCallPlan means that the step defines a not-yet-executed tool-call intent, argument bindings, and expected return contract; the actual ToolCall and response remain in the runtime layer.
      ja: TaskStep —specifies→ ToolCallPlan は、未実行のツール呼出し意図、引数束縛、期待戻り契約を定め、実際の ToolCall と応答は実行層に残すことを示します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_specifies
      labels:
        zh: 反向 specifies
        en: inverse specifies
        ja: 逆 specifies
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 任务步骤仍由 orchestration-task-planning 唯一拥有，工具调用计划仍由 tool-invocation-execution 唯一拥有；specifies 只建立跨域事实，不转移定义权。若该事实触发运行操作，还必须引用适用的 PolicyDecision 或 AuthorizationGrant。
        en: task step remains uniquely owned by orchestration-task-planning and tool call plan by tool-invocation-execution; specifies establishes a cross-Domain fact without transferring definitional ownership. If the fact triggers a runtime operation, it must also reference an applicable PolicyDecision or AuthorizationGrant.
        ja: タスクステップは orchestration-task-planning、ツール呼び出し計画は tool-invocation-execution に引き続き一意に所有されます。specifies は定義所有権を移さずドメイン横断事実だけを確立し、実行操作を起動する場合は適用される PolicyDecision または AuthorizationGrant も参照します。
      protocol_or_resource_context:
        zh: 查询沿 TaskStep-specifies-ToolCallPlan 的 source→target 方向、端点 canonical ID 与本关系来源主张执行；协议版本、资源身份和信任判定继续附着在原节点或原关系。
        en: Queries follow the source-to-target direction, endpoint canonical IDs, and source claims of TaskStep-specifies-ToolCallPlan; protocol versions, resource identity, and trust decisions remain attached to the original nodes or relation.
        ja: 照会は TaskStep-specifies-ToolCallPlan の source→target 方向、端点 canonical ID、当該関係の出典主張に従い、プロトコル版、資源同一性、信頼判断は元のノードまたは関係に保持されます。
    constraints: []
    examples:
      - id: TaskStep-specifies-ToolCallPlan-example-positive-manual-001
        kind: positive
        labels:
          zh: specifies正例
          en: Positive example for specifies
          ja: specifiesの正例
        scenario_id: null
        descriptions:
          zh: step-lookup 指定 call-plan-search-v2：调用 search_documents，参数 query 来自上一步输出，期望 DocumentSet。
          en: "step-lookup specifies call-plan-search-v2: invoke search_documents, bind query from the previous step, and expect DocumentSet."
          ja: step-lookup は call-plan-search-v2 を指定し、search_documents を呼び、前ステップ出力を query へ束縛し、DocumentSet を期待します。
