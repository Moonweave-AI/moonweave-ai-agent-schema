schema: moonweave.ai/ontology-node/v1
id: TaskStep
kind: concept
labels:
  zh: 任务步骤
  en: task step
  ja: タスクステップ
semantics:
  short_definition:
    zh: 任务计划中具有明确输入、动作和预期输出的有序 WorkSpecification 位置。
    en: An ordered WorkSpecification position in a task plan with explicit input, action, and expected output.
    ja: 明示入力・動作・期待出力を持つタスク計画内の順序 WorkSpecification 位置です。
  definition:
    zh: TaskStep 是 WorkSpecification 的特化，身份由特定 TaskPlan 中的 position、input_contract、action_specification 与 output_contract 共同决定，可进一步指定 ToolCallPlan。它不是完整的结果导向 Task，也不是执行该位置时产生的 step event。映射：LangGraph 节点一次 invoke/execution；ReAct 论文中的 action step（Thought→Action→Observation 中的 Action）；CrewAI 流程中的顺序任务位置。
    en: TaskStep specializes WorkSpecification with identity from position, input_contract, action_specification, and output_contract within a TaskPlan, optionally specifying ToolCallPlan. It is neither the complete outcome-oriented Task nor the step event when the position executes. Maps to one LangGraph node invoke/execution, a ReAct action step (Action within Thought→Action→Observation), and sequential positions in CrewAI processes.
    ja: TaskStep は TaskPlan 内 position/入出力/動作で同一性が決まる WorkSpecification 特化です。LangGraph ノード実行、ReAct action step、CrewAI 順序位置に写像されます。
  why_needed:
    zh: 显式步骤节点使计划能表达依赖、分支和工具调用意图，同时让运行事件引用稳定步骤而不把运行状态写回计划。
    en: Explicit step nodes let plans express dependencies, branches, and intended tool calls while runtime events reference a stable step without writing execution state back into the plan.
    ja: 明示ステップにより依存・分岐・ツール意図を表し、実行イベントは計画へ状態を書き戻しません。
  includes:
    - zh: 步骤标识、计划内有序位置、动作规约、所需输入和预期输出，以及到依赖或 ToolCallPlan 的规范关系。
      en: Step identifier, ordered plan position, action specification, required input, expected output, and normative links to dependencies or ToolCallPlan.
      ja: ステップ ID、計画内順序、動作仕様、必要入力、期待出力、依存/ToolCallPlan リンク。
  excludes:
    - zh: 整个任务的最终结果定义、当前执行状态、工具调用响应、持续时间和步骤失败事件。
      en: Whole-task final outcome definition, current execution state, tool-call response, elapsed duration, and step-failure event.
      ja: タスク全体最終結果、実行状態、ツール応答、所要時間、ステップ失敗イベント。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 每个 add_node 函数签名定义 input/output state keys，应投影为 TaskStep 的 input/output_contract；一次 node.invoke 产生 Execution 事件而非改写 TaskStep。ReAct 循环中每次 tool call 应对应一个 TaskStep（action_specification 引用 ToolCallPlan）。position 仅用于展示，执行先后由 depends_on 边决定。
    en: Each LangGraph add_node function signature defines input/output state keys projecting to TaskStep contracts; one node.invoke yields Execution events without mutating TaskStep. Each ReAct tool call maps to a TaskStep whose action_specification references ToolCallPlan. position is display-only; depends_on edges determine precedence.
    ja: LangGraph ノード契約を TaskStep 入出力へ写像し、ReAct tool call を action_specification へ結び付けます。
  typical_input:
    - description: LangGraph node function contract.
      format: |
        def verify_signature(state: GraphState) -> GraphState:
            ...
        builder.add_node("verify_signature", verify_signature)
      source_claims: [claim-tstep-langgraph]
    - description: ReAct action step.
      format: |
        Action: search[ledger snapshot Q3]
        Observation: {...}
      source_claims: [claim-tstep-react]
  typical_output:
    - description: Task step specification in plan.
      format: |
        {
          "work_specification_id": "step-verify-signature",
          "position": 2,
          "action_specification": {"operation": "verify-package-signature"}
        }
      source_claims: [claim-tstep-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node execution as step realization.
    - name: ReAct
      url: https://arxiv.org/abs/2210.03629
      description: Thought-Action-Observation action steps.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Sequential process task positions.
structure:
  identity_keys: []
  fields:
    - id: position
      labels: {zh: 计划位置, en: plan position, ja: 計画位置}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 同一计划版中的稳定展示位置；执行先后仍由 depends_on 边决定。
        en: Stable display position within one plan version; depends_on edges determine execution precedence.
        ja: 同一計画版の表示位置；実行順序は depends_on 辺で決定。
      example_value: 2
      source_claims: [claim-tstep-design]
    - id: input_contract
      labels: {zh: 步骤输入合同, en: step input contract, ja: ステップ入力契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 动作开始前必须可用的数据类型、模式、来源与完整性条件。
        en: Data types, schemas, provenance, and integrity required before the action begins.
        ja: 動作開始前に必要なデータ種別/スキーマ/来歴/完全性。
      example_value: {type: SignedPackage, schema: signed-package@2, integrity: signature-present}
      source_claims: [claim-tstep-langgraph]
    - id: action_specification
      labels: {zh: 动作规约, en: action specification, ja: 動作仕様}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 该位置应执行的操作及可选 ToolCallPlan 引用，不记录一次调用事件。
        en: Operation at this position and optional ToolCallPlan reference without recording an invocation occurrence.
        ja: この位置の操作と任意 ToolCallPlan 参照（呼出し事象は記録しない）。
      example_value: {operation: verify-package-signature, tool_call_plan_ref: ToolCallPlan:cosign-verify@1}
      source_claims: [claim-tstep-react]
    - id: output_contract
      labels: {zh: 步骤输出合同, en: step output contract, ja: ステップ出力契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 动作完成后供下游步骤消费的结果类型、模式与保证。
        en: Result type, schema, and guarantees available to downstream steps after the action completes.
        ja: 動作完了後に下流が消費する結果種別/スキーマ/保証。
      example_value: {type: VerificationReport, schema: verification-report@1, guarantees: [signature_checked]}
      source_claims: [claim-tstep-langgraph]
  constraints:
    - id: task-step-contract-complete
      severity: error
      expression_language: plain
      expression: position >= 0 and input_contract, action_specification, and output_contract are non-empty
      explanations:
        zh: 任务步骤必须同时给出位置、输入、动作和输出，不能只以名称充当可执行规约。
        en: A TaskStep supplies position, input, action, and output and cannot use a name alone as an executable specification.
        ja: 位置・入力・動作・出力を全て示し、名称だけでは不十分です。
      source_claims: [claim-tstep-design]
    - id: task-step-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: TaskStep-depends_on-TaskStep edges remain within one TaskPlan version and are acyclic; every predecessor output_contract is compatible with the dependent input_contract
      explanations:
        zh: 步骤依赖必须同计划、无环且类型相容；数组位置不能替代依赖边。
        en: Step dependencies stay in one plan, are acyclic, and have compatible output-input contracts.
        ja: 同一計画内・非循環・入出力互換が必要です。
      source_claims: [claim-tstep-langgraph]
  required_relation_constraints:
    - id: task-step-refines-task
      direction: incoming
      predicate: decomposes_into
      target_concept_id: Task
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 TaskStep 恰好细化一个稳定 Task，避免步骤游离于预期结果之外。
        en: Each TaskStep refines exactly one stable Task so it cannot float free of a desired outcome.
        ja: 各 TaskStep は一つの安定 Task のみ細化します。
      source_claims: [claim-tstep-design]
    - id: task-step-belongs-to-plan
      direction: incoming
      predicate: contains_step
      target_concept_id: TaskPlan
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 TaskStep 恰好属于一个 TaskPlan 版本，其位置和依赖均在该版本内解释。
        en: Each TaskStep belongs to exactly one TaskPlan version in which its position and dependencies are interpreted.
        ja: 各 TaskStep は一つの TaskPlan 版に属します。
      source_claims: [claim-tstep-design]
examples:
  - id: TaskStep-langgraph-node
    labels: {zh: LangGraph 节点步骤, en: LangGraph node step, ja: LangGraph ノードステップ}
    descriptions:
      zh: step-verify 位于 plan-release-12 第 2 位，要求 SignedPackage 输入，执行 verify-package-signature，输出 VerificationReport；对应 LangGraph 节点一次 invoke。
      en: step-verify at position 2 in plan-release-12 requires SignedPackage input, runs verify-package-signature, outputs VerificationReport, mapping to one LangGraph node invoke.
      ja: step-verify は SignedPackage 入力で署名検証し VerificationReport を出力、LangGraph ノード invoke に対応します。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/, version: node execution}
    field_values:
      position: 2
      action_specification: {operation: verify-package-signature}
    related_node_ids: [TaskStep, TaskPlan, Task]
    related_relation_ids: [TaskPlan-contains_step-TaskStep, Task-decomposes_into-TaskStep]
    source_claims: [claim-tstep-langgraph]
  - id: TaskStep-react-action
    labels: {zh: ReAct 动作步骤, en: ReAct action step, ja: ReAct 動作ステップ}
    descriptions:
      zh: "ReAct 循环中 Action search[ledger Q3] 是 TaskStep 的 action_specification，Observation 属于运行层而非步骤规约。"
      en: "In a ReAct loop, Action search[ledger Q3] is TaskStep action_specification; Observation belongs to the runtime layer not the step spec."
      ja: ReAct の Action search[ledger Q3] は action_specification で、Observation は実行層です。
    example_source: {product: ReAct, url: https://arxiv.org/abs/2210.03629, version: Thought-Action-Observation}
    field_values:
      action_specification: {operation: search, query: ledger Q3}
    related_node_ids: [TaskStep]
    related_relation_ids: []
    source_claims: [claim-tstep-react]
  - id: TaskStep-boundary-step-event
    labels: {zh: 步骤事件不是规约, en: Step event is not spec, ja: ステップイベントは仕様ではない}
    descriptions:
      zh: step-event-44 记录 120ms 耗时、tool 响应与失败原因；应建模为 Execution/RunAttempt 事件而非 TaskStep。
      en: step-event-44 records 120ms duration, tool response, and failure reason; model as Execution/RunAttempt event not TaskStep.
      ja: step-event-44 は所要時間/ツール応答/失敗理由を記録する Execution イベントです。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: step spec versus event}
    field_values: {}
    related_node_ids: [TaskStep, Execution]
    related_relation_ids: []
    source_claims: [claim-tstep-design]
parent_relation:
  id: TaskStep-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: TaskStep 以计划内有序位置与输入—动作—输出合同为种差的 WorkSpecification 特化。
    en: TaskStep is a WorkSpecification whose differentia is ordered plan position with input-action-output contracts.
    ja: 計画内順序と入出力・動作契約を種差とする WorkSpecification 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tstep-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TaskStep-specifies-ToolCallPlan
    predicate: specifies
    direction: source-to-target
    relation_kind: information
    labels: {zh: 规定工具调用计划, en: specifies, ja: ツール呼出し計画を規定する}
    definitions:
      zh: 声明该步骤位置意图调用的 ToolCallPlan；实际 ToolCall 与 ToolCallAttempt 属于运行层。
      en: Declares the ToolCallPlan this step position intends to invoke; actual ToolCall and ToolCallAttempt belong to runtime.
      ja: このステップが意図する ToolCallPlan を宣言し、実 ToolCall は実行層です。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 0, max: 1}
    inverse_reading:
      predicate: is_specified_by
      labels: {zh: 由步骤规定, en: is specified by, ja: ステップにより規定される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tstep-react]
    layout_role: cross-link
    target: concept:ToolCallPlan
  - id: TaskStep-depends_on-TaskStep
    predicate: depends_on
    direction: source-to-target
    relation_kind: information
    labels: {zh: 依赖于前置步骤, en: depends on, ja: 先行ステップに依存する}
    definitions:
      zh: 从依赖步骤指向前置步骤的计划内 DAG 边；必须同 TaskPlan 版本、无环且 predecessor output_contract 与 dependent input_contract 相容。
      en: In-plan DAG edge from dependent step to predecessor; same TaskPlan version, acyclic, compatible output-input contracts.
      ja: 同一 TaskPlan 版内の DAG 辺で、入出力契約互換・非循環が必要です。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 0, max: null}
    inverse_reading:
      predicate: is_predecessor_of
      labels: {zh: 是前置步骤, en: is predecessor of, ja: 先行ステップである}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-tstep-langgraph]
    layout_role: cross-link
    target: concept:TaskStep
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Node execution as step realization.
  - id: react-paper
    title: ReAct
    url: https://arxiv.org/abs/2210.03629
    source_type: paper
    relevance: Action steps in Thought-Action-Observation loops.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Sequential process positions.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TaskStep versus step event boundary.
source_claims:
  - id: claim-tstep-langgraph
    source: langgraph
    supports: LangGraph node functions define typed input/output contracts realized as one execution invocation per step.
    locator: StateGraph nodes
    evidence_kind: official
    confidence: high
  - id: claim-tstep-react
    source: react-paper
    supports: ReAct interleaves reasoning with discrete Action steps that invoke tools, matching TaskStep action_specification semantics.
    locator: Thought-Action-Observation loop
    evidence_kind: paper
    confidence: high
  - id: claim-tstep-design
    source: moonweave-design
    supports: Moonweave models stable plan positions with input-action-output contracts as TaskStep distinct from runtime step events.
    locator: TaskStep concept boundary
    evidence_kind: design-inference
    confidence: high
