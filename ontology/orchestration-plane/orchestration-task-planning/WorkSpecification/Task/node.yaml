source_claims:
  - id: claim-task-001
    source: eng-proto-a2a-spec
    supports: The A2A specification defines its Task as a stateful unit of work with lifecycle status and artifacts. Moonweave deliberately reserves Task for reusable desired-work specification and maps the protocol lifecycle object to Execution.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-002
    source: eng-fw-crewai-tasks
    supports: CrewAI task expected_output describes what completion looks like; Moonweave separates that desired outcome from assignment and execution state.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-003
    source: eng-fw-maf-workflows
    supports: Agent Framework executors receive typed input messages; Moonweave records the corresponding reusable Task input contract.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-004
    source: eng-fw-crewai-tasks
    supports: CrewAI tasks declare expected_output and optional structured output schemas; Moonweave captures those requirements as a Task output contract.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-005
    source: eng-fw-crewai-tasks
    supports: CrewAI combines task description, expected_output, structured output, and guardrails; Moonweave requires those normative pieces to be mutually consistent.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-006
    source: eng-fw-maf-workflows
    supports: Agent Framework separates directed workflow edges and conditional or dynamic control flow; Moonweave keeps prerequisite Task dependencies acyclic.
    locator: Microsoft Agent Framework Workflows > Key Features and Core Concepts > typed executors and directed edges
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-007
    source: eng-fw-crewai-tasks
    supports: CrewAI requires expected_output for a task and supports output guardrails; Moonweave requires at least one explicit completion criterion.
    locator: CrewAI Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-008
    source: eng-proto-a2a-spec
    supports: A2A's stateful Task demonstrates why protocol lifecycle state must be separated from Moonweave's reusable desired-work specification.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-009
    source: eng-proto-a2a-spec
    supports: The A2A core model explicitly assigns status, history, and artifacts to its Task lifecycle object, which Moonweave represents in the runtime Execution layer.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-010
    source: eng-proto-a2a-docs
    supports: A2A defines Task as the stateful unit of work with a unique identifier and lifecycle. Moonweave uses that boundary for Task; the ordered specification that decomposes work before execution is separately modeled as TaskPlan.
    locator: Core Concepts and Components > Fundamental Communication Elements > Task
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-task-011
    source: eng-fw-crewai-docs
    supports: CrewAI processes define sequential, hierarchical, or hybrid collaboration patterns across tasks. Moonweave models that pre-execution arrangement of steps and dependencies as TaskPlan, distinct from one stateful Task execution unit.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
