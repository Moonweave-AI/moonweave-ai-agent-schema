schema: moonweave.ai/ontology-node/v1
id: Task
kind: concept
labels:
  zh: 任务
  en: task
  ja: タスク
semantics:
  short_definition:
    zh: 以预期结果为身份、可被执行多次的结果导向 WorkSpecification。
    en: An outcome-oriented WorkSpecification identified by its desired outcome and executable many times.
    ja: 望ましい結果で識別され複数回実行可能な結果指向 WorkSpecification です。
  definition:
    zh: Task 是一种 WorkSpecification，规定应从给定输入实现的 desired_outcome、适用约束与完成标准，并独立于当前受派者、调度优先级和运行状态。映射：CrewAI Task 对象；Cursor Task 子代理任务；A2A Task 在协议层是有状态生命周期对象，Moonweave 将其对齐 Execution 而非此规范类。一次 Cursor 聊天中的“做 X”若未固化为可复用规约，仍只是 Intent 而非 Task。
    en: Task is a WorkSpecification stating the desired_outcome from given inputs with applicable constraints and completion criteria, independent of assignee, scheduling priority, or run state. Maps to CrewAI Task objects and Cursor Task subagent assignments; A2A Task at protocol layer is a stateful lifecycle object aligned to Execution, not this specification class. An ad hoc 'do X' in chat remains Intent until materialized as a reusable spec.
    ja: Task は desired_outcome・制約・完了基準を定める WorkSpecification です。CrewAI Task、Cursor Task、A2A 実行時 Task（Execution 側）に写像されます。
  why_needed:
    zh: 稳定的任务规范使计划、分配和执行引用同一个“要实现什么”，同时允许每次 Execution 拥有独立状态、重试和产物谱系。
    en: A stable Task lets planning, allocation, and execution refer to the same statement of what must be achieved while each Execution keeps independent state, retries, and artifact lineage.
    ja: 安定 Task により計画・割当・実行が同一達成内容を参照し、各 Execution は独立状態・再試行・成果物系譜を保持します。
  includes:
    - zh: 稳定任务规范标识、预期结果、输入/输出契约，以及指向 TaskConstraint 与 TaskCompletionCriterion 的规范关系。
      en: Stable task-spec identifier, desired outcome, input/output contracts, and normative links to TaskConstraint and TaskCompletionCriterion.
      ja: 安定タスク仕様 ID、望ましい結果、入出力契約、TaskConstraint/TaskCompletionCriterion への規範リンク。
  excludes:
    - zh: 当前 assignee、priority、queued/running/completed 状态、运行时间、重试次数和实际产物；这些属于 WorkItem 或 Execution。
      en: Current assignee, priority, lifecycle state, runtime timestamps, retry count, and actual artifacts; those belong to WorkItem or Execution.
      ja: 担当者、優先度、ライフサイクル状態、実行時刻、再試行回数、実成果物（WorkItem/Execution）。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 导入 CrewAI Task(description, expected_output, context) 为 Task + TaskCompletionCriterion + 可选 TaskDependency；Cursor Task 工具调用创建子代理时绑定 task_spec_id；A2A 客户端收到的 Task{id,status,history} 写入 Execution 并 Execution-realizes-Task 指向规范 Task。has_completion_criterion 至少一条；depends_on 边须由 TaskDependency 双端点支撑。
    en: Ingest CrewAI Task(description, expected_output, context) as Task + TaskCompletionCriterion + optional TaskDependency; Cursor Task subagent creation binds task_spec_id; A2A Task{id,status,history} lands on Execution with Execution-realizes-Task to the spec Task. has_completion_criterion requires at least one edge; depends_on edges must be backed by TaskDependency endpoints.
    ja: CrewAI Task を Task+完了基準+依存へ分解し、A2A 実行時 Task は Execution へ、Cursor Task は spec Task へ結び付けます。
  typical_input:
    - description: CrewAI task specification.
      format: |
        task = Task(
            description="Reconcile ledger snapshot",
            expected_output="Reconciliation report with zero unexplained differences",
        )
      source_claims: [claim-task-crewai]
    - description: Cursor subagent task assignment.
      format: |
        Task(subagent_type="explore", prompt="Find all API routes", description="Route audit")
      source_claims: [claim-task-openai-agents]
  typical_output:
    - description: Stable task specification with contracts.
      format: |
        {
          "work_specification_id": "task-spec-reconcile-7",
          "desired_outcome": "Zero unexplained differences in reconciliation report",
          "input_contract": {"type": "LedgerSnapshot", "schema": "ledger-snapshot@2"}
        }
      source_claims: [claim-task-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Task objects with expected_output.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Stateful protocol Task (runtime layer).
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff and subagent task patterns.
structure:
  identity_keys: []
  fields:
    - id: desired_outcome
      labels: {zh: 预期结果, en: desired outcome, ja: 望ましい結果}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 以可验收状态描述要实现什么，而不是规定谁执行或记录当前运行状态。
        en: Acceptable state to achieve without assigning a performer or recording run status.
        ja: 誰が実行するか/実行状態ではなく達成すべき受入可能状態。
      example_value: Produce a reconciliation report with zero unexplained differences.
      source_claims: [claim-task-crewai]
    - id: input_contract
      labels: {zh: 任务输入合同, en: task input contract, ja: タスク入力契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 开始实现任务所需的信息类型、模式、版本与完整性要求。
        en: Information types, schemas, versions, and integrity requirements needed to begin realizing the Task.
        ja: Task 実現開始に必要な情報種別・スキーマ・版・完全性。
      example_value: {type: LedgerSnapshot, schema: ledger-snapshot@2, authorization_required: true}
      source_claims: [claim-task-langgraph]
    - id: output_contract
      labels: {zh: 任务输出合同, en: task output contract, ja: タスク出力契約}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 成功实现时必须提供的结果类型与模式；实际输出实例属于运行层。
        en: Result type and schema required by successful realization; actual instances remain in the runtime layer.
        ja: 成功実現で必要な結果種別/スキーマ（実インスタンスは実行層）。
      example_value: {type: ReconciliationReport, schema: reconciliation-report@3}
      source_claims: [claim-task-crewai]
  constraints:
    - id: task-contract-outcome-consistent
      severity: error
      expression_language: plain
      expression: desired_outcome is non-empty and output_contract can provide evidence required by every completion criterion
      explanations:
        zh: 预期结果、输出合同与完成判据必须可相互验证，不能只写抽象口号。
        en: Desired outcome, output contract, and completion criteria must be mutually verifiable.
        ja: 望ましい結果・出力契約・完了基準は相互検証可能である必要があります。
      source_claims: [claim-task-crewai]
    - id: task-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: Task-depends_on-Task edges are acyclic within each TaskPlan version
      explanations:
        zh: 前置任务依赖必须无环；需要反复执行的流程由路由循环而不是依赖环表示。
        en: Predecessor Task dependencies are acyclic; repeated execution uses routing loops rather than dependency cycles.
        ja: 先行 Task 依存は非循環で、反復はルーティングループで表します。
      source_claims: [claim-task-langgraph]
  required_relation_constraints:
    - id: task-has-completion-criterion
      direction: outgoing
      predicate: has_completion_criterion
      target_concept_id: TaskCompletionCriterion
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每个可执行 Task 至少具有一个可复算的完成判据。
        en: Every executable Task has at least one recomputable completion criterion.
        ja: 各実行可能 Task は少なくとも一つの再計算可能完了基準を持ちます。
      source_claims: [claim-task-crewai]
examples:
  - id: Task-crewai-reconcile
    labels: {zh: CrewAI 对账任务, en: CrewAI reconcile task, ja: CrewAI 照合タスク}
    descriptions:
      zh: task-spec-reconcile-7 要求把授权账本快照转换为零未解释差异的对账报告，引用输入契约与完成标准，不绑定执行者或状态。
      en: task-spec-reconcile-7 transforms an authorized ledger snapshot into a reconciliation report with zero unexplained differences, referencing contracts and completion criteria without assignee or state.
      ja: task-spec-reconcile-7 は許可台帳スナップショットを未説明差異ゼロ照合報告へ変換する仕様です。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task}
    field_values:
      desired_outcome: Produce a reconciliation report with zero unexplained differences.
    related_node_ids: [Task, WorkSpecification, TaskCompletionCriterion, WorkItem, Execution]
    related_relation_ids: [Task-is_a-WorkSpecification, Task-has_completion_criterion-TaskCompletionCriterion, WorkItem-allocates-Task, Execution-realizes-Task]
    source_claims: [claim-task-crewai]
  - id: Task-cursor-subagent
    labels: {zh: Cursor Task 子代理, en: Cursor Task subagent, ja: Cursor Task サブエージェント}
    descriptions:
      zh: Cursor Task 工具派发 explore 子代理审计 API 路由；规范 Task 描述预期结果，实际运行由 Execution 记录。
      en: Cursor Task tool dispatches an explore subagent to audit API routes; the spec Task states desired outcome while Execution records the run.
      ja: Cursor Task が explore サブエージェントを配信し、仕様 Task が結果を定義、Execution が実行を記録します。
    example_source: {product: Cursor, url: https://cursor.com, version: Task subagent}
    field_values:
      desired_outcome: Complete inventory of API routes with auth requirements documented.
    related_node_ids: [Task, Execution]
    related_relation_ids: [Execution-realizes-Task]
    source_claims: [claim-task-design]
  - id: Task-boundary-a2a-runtime
    labels: {zh: A2A 运行态不是规范 Task, en: A2A runtime is not spec Task, ja: A2A 実行時は仕様 Task ではない}
    descriptions:
      zh: A2A task-93 当前 working，含三条消息历史与 artifact report-12；应映射 Execution 并通过 realizes 指向规范 Task。
      en: A2A task-93 is working with three history messages and artifact report-12; map to Execution pointing to spec Task via realizes.
      ja: A2A task-93 は working/履歴/artifact を持ち Execution へ写像、spec Task へ realizes します。
    example_source: {product: A2A Protocol, url: https://google.github.io/A2A/, version: Task lifecycle}
    field_values: {}
    related_node_ids: [Task, Execution]
    related_relation_ids: [Execution-realizes-Task]
    source_claims: [claim-task-a2a]
parent_relation:
  id: Task-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a, ja: の一種である}
  definitions:
    zh: Task 继承未实现工作的规范身份，并以稳定 expected_outcome 为种差；受派者、优先级和生命周期状态不属于该继承链。
    en: Task inherits normative unrealized work with stable desired_outcome as differentia; assignee, priority, and lifecycle state are excluded.
    ja: 安定 desired_outcome を種差とする WorkSpecification 特化です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-task-design]
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Task-constrained_by-TaskConstraint
    predicate: constrained_by
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 受约束于, en: constrained by, ja: 制約を受ける}
    definitions:
      zh: 限制适用于该稳定 Task 规范及其所有实现执行；限制方法/资源/权限，不表达前置依赖或完成判定。
      en: Limit governs the stable Task and every realizing Execution, restricting method/resource/authority without predecessor or completion semantics.
      ja: 安定 Task と全 Execution を統制し、方法/資源/権限を制限（先行/完了意味は含まない）。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 1, max: null}
    inverse_reading:
      predicate: constrains
      labels: {zh: 约束, en: constrains, ja: 制約する}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-task-design]
    layout_role: cross-link
    target: concept:TaskConstraint
  - id: Task-has_completion_criterion-TaskCompletionCriterion
    predicate: has_completion_criterion
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 具有完成判据, en: has completion criterion, ja: 完了基準を持つ}
    definitions:
      zh: 可复用验收谓词决定何种执行证据足以认定此 Task 的预期结果已实现；不连接一次实际 RunOutcome。
      en: Reusable acceptance predicate determining sufficient evidence to recognize desired outcome as realized; does not link one RunOutcome.
      ja: 再利用可能受入述語が desired outcome 実現の十分証拠を定め、一回の RunOutcome には接続しません。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 1, max: null}
    inverse_reading:
      predicate: is_target_of_has_completion_criterion
      labels: {zh: 反向：具有完成判据, en: is target of has completion criterion, ja: 逆方向：完了基準を持つ}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-task-crewai]
    layout_role: cross-link
    target: concept:TaskCompletionCriterion
  - id: Task-depends_on-Task
    predicate: depends_on
    direction: source-to-target
    relation_kind: information
    labels: {zh: 依赖于前置任务, en: depends on, ja: 先行タスクに依存する}
    definitions:
      zh: 从依赖 Task 指向前置 Task 的可遍历 DAG 投影；每条边由同一 TaskDependency 的 has_dependent 与 has_predecessor 端点共同支撑。
      en: Traversable DAG projection from dependent Task to predecessor Task; each edge backed by the same TaskDependency endpoints.
      ja: 依存 Task から先行 Task への走査可能 DAG 投影で、TaskDependency 端点で裏付けます。
    cardinality:
      source: {min: 0, max: null}
      target: {min: 0, max: null}
    inverse_reading:
      predicate: is_predecessor_of
      labels: {zh: 是前置任务, en: is predecessor of, ja: 先行タスクである}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints:
      - id: task-depends-on-backed-and-acyclic
        severity: error
        expression_language: plain
        expression: source != target; a matching TaskDependency names source as dependent and target as predecessor; all such edges are acyclic within one TaskPlan version
        explanations:
          zh: 直接边必须有双端点依赖条件作证且无环。
          en: Direct edge must be backed by two-endpoint dependency and remain acyclic.
          ja: 二端点依存に裏付けられ非循環である必要があります。
        source_claims: [claim-task-langgraph]
    examples: []
    source_claims: [claim-task-langgraph]
    layout_role: cross-link
    target: concept:Task
  - id: Task-decomposes_into-TaskStep
    predicate: decomposes_into
    direction: source-to-target
    relation_kind: information
    labels: {zh: 分解为任务步骤, en: decomposes into, ja: タスクステップへ分解する}
    definitions:
      zh: 计划位置细化该稳定 Task 的一部分工作；每个 TaskStep 恰好细化一个 Task，一个 Task 可在不同 TaskPlan 版本中拥有零个或多个步骤分解。
      en: A plan position refines part of the stable Task; each TaskStep refines exactly one Task while one Task may have zero or many step decompositions across plan versions.
      ja: 計画位置が安定 Task の一部を細化；各 TaskStep は一 Task のみ細化。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    inverse_reading:
      predicate: refines_task
      labels: {zh: 细化任务, en: refines task, ja: タスクを細化する}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints:
      - id: task-decomposition-same-plan-closure
        severity: error
        expression_language: plain
        expression: the TaskStep belongs to a TaskPlan that specifies the source Task
        explanations:
          zh: 步骤只能细化其所属计划明确规定的 Task，防止跨计划误连。
          en: A step refines only a Task specified by its containing plan.
          ja: 所属計画が指定する Task のみ細化します。
        source_claims: [claim-task-design]
    examples: []
    source_claims: [claim-task-design]
    layout_role: cross-link
    target: concept:TaskStep
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Task definitions with expected_output.
  - id: a2a-spec
    title: A2A Protocol
    url: https://google.github.io/A2A/
    source_type: official-doc
    relevance: Stateful protocol Task versus specification.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Acyclic task dependencies in graphs.
  - id: openai-agents
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Subagent task handoff patterns.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Task spec versus Execution boundary.
source_claims:
  - id: claim-task-crewai
    source: crewai
    supports: CrewAI Task expected_output and guardrails define reusable desired-work specification separate from execution state.
    locator: Tasks > attributes
    evidence_kind: official
    confidence: high
  - id: claim-task-a2a
    source: a2a-spec
    supports: A2A Task is a stateful lifecycle object with status, history, and artifacts; Moonweave maps it to Execution not spec Task.
    locator: Core Concepts > Task
    evidence_kind: official
    confidence: high
  - id: claim-task-langgraph
    source: langgraph
    supports: LangGraph directed workflow edges express acyclic prerequisite relationships between task-like nodes.
    locator: StateGraph edges
    evidence_kind: official
    confidence: high
  - id: claim-task-openai-agents
    source: openai-agents
    supports: OpenAI Agents SDK subagent and handoff patterns assign bounded work units analogous to Task specifications.
    locator: Handoffs and agents
    evidence_kind: official
    confidence: medium
  - id: claim-task-design
    source: moonweave-design
    supports: Moonweave reserves Task for outcome-oriented reusable WorkSpecification distinct from WorkItem allocation and Execution runs.
    locator: Task concept boundary
    evidence_kind: design-inference
    confidence: high
