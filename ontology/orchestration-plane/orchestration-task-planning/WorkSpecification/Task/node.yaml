schema: moonweave.ai/ontology-node/v1
id: Task
kind: concept
labels:
  zh: 任务
  en: task
  ja: タスク
semantics:
  short_definition:
    zh: 任务是以预期结果为身份、可被执行多次的工作规约。
    en: A task is a reusable work specification identified by its desired outcome.
    ja: タスクは、望ましい結果によって識別され、複数回実行できる作業仕様です。
  definition:
    zh: Task 是一种面向结果的 WorkSpecification：它规定应从给定输入实现的预期结果、适用约束与完成标准，并独立于当前受派者、调度优先级和某次运行状态。A2A Task 是带标识、状态、历史和产物的有状态生命周期对象，在本体中对齐运行层的 Execution，而不是复用此规范类。
    en: A Task is an outcome-oriented WorkSpecification that states the desired outcome to be realized from given inputs together with applicable constraints and completion criteria and is independent of its current assignee, scheduling priority, or any run state. An A2A Task is a stateful lifecycle object with identity, status, history, and artifacts; Moonweave aligns that protocol object with runtime Execution rather than reusing this specification class.
    ja: Task は、入力から実現すべき望ましい結果、適用制約、完了基準を定める結果指向の WorkSpecification であり、現在の担当者、スケジュール優先度、個別実行状態から独立します。A2A Task は識別子・状態・履歴・成果物を持つステートフルなライフサイクル対象なので、この仕様クラスではなく実行層の Execution に対応付けます。
  why_needed:
    zh: 稳定的任务规范使计划、分配和执行引用同一个‘要实现什么’，同时允许每次 Execution 拥有独立状态、重试和产物谱系。
    en: A stable Task lets planning, allocation, and execution refer to the same statement of what must be achieved while each Execution keeps an independent state, retry history, and artifact lineage.
    ja: 安定した Task により、計画・割当・実行が同じ『何を達成するか』を参照しつつ、各 Execution は独立した状態、再試行履歴、成果物系譜を保持できます。
  includes:
    - zh: 稳定任务规范标识、预期结果、输入契约，以及指向 TaskConstraint 与 TaskCompletionCriterion 的规范关系。
      en: A stable task-specification identifier, desired outcome, input contract, and normative links to TaskConstraint and TaskCompletionCriterion.
      ja: 安定したタスク仕様識別子、望ましい結果、入力契約、TaskConstraint と TaskCompletionCriterion への規範的リンクを含みます。
  excludes:
    - zh: 当前 assignee、priority、queued/running/completed 状态、运行时间、重试次数和实际产物；这些分别属于 WorkItem 或 Execution。
      en: Current assignee, priority, queued/running/completed state, runtime timestamps, retry count, and actual artifacts; those belong to WorkItem or Execution.
      ja: 現在の担当者、優先度、queued/running/completed 状態、実行時刻、再試行回数、実成果物は含まず、WorkItem または Execution に属します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      任务规范由规划器写入 TaskPlan 或 WorkItem 的 allocates 边，编译为 LangGraph 节点名与 Agents SDK 子 Agent
      的 outcome 描述。运行时 A2A 客户端收到的 Task JSON（id、status.state）映射到 Execution，而不是覆盖
      desired_outcome；重试只新增 RunAttempt，不修改 task-spec 标识或完成判据。
    en: >-
      A task specification is written by a planner into TaskPlan or WorkItem allocates edges and compiled into LangGraph node
      names and Agents SDK sub-agent outcome descriptions. At runtime, A2A Task JSON (id, status.state) received by a client
      maps to Execution rather than overwriting desired_outcome; retries add RunAttempts without changing the task-spec
      identifier or completion criteria.
    ja: >-
      task specification は planner が TaskPlan または WorkItem の allocates 辺へ書き込み、LangGraph node 名と Agents SDK
      sub-agent の outcome 記述へコンパイルする。runtime では A2A client が受け取る Task JSON（id、status.state）は
      desired_outcome を上書きせず Execution に対応付ける。retry は RunAttempt を追加するだけで task-spec ID や完了判据は
      変更しない。
  typical_input:
    - description:
        zh: 从 Goal 分解出的结果导向任务规范。
        en: An outcome-oriented task specification decomposed from a Goal.
        ja: Goal から分解された outcome-oriented task specification。
      format: |-
        {"work_specification_id":"task-spec-reconcile-7","revision":"4","desired_outcome":"Produce a reconciliation report with zero unexplained differences","input_contract_refs":["ledger-snapshot@2"],"acceptance_basis_ref":"reconciliation-zero-unexplained-differences@4"}
  typical_output:
    - description:
        zh: 被 WorkItem 分配且被 Execution 引用的稳定任务规范引用。
        en: A stable task-specification reference allocated by a WorkItem and carried by an Execution.
        ja: WorkItem により割当され Execution が参照する安定 task-specification reference。
      format: |-
        {"task_spec_ref":"task-spec-reconcile-7@4","work_item_ref":"work-item-71","execution_ref":"execution-884","a2a_task_mapping":"optional-protocol-ref-only"}
  reference_implementations:
    - name: A2A Protocol life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents protocol Task lifecycle states kept separate from local planning specifications.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph nodes as named work units whose runtime state lives in checkpoints.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner execution results as runtime facts distinct from static task intent.
  source_claims:
    - claim-task-spec-outcome
    - claim-task-spec-a2a-boundary
structure:
  identity_keys: []
  fields:
    - id: desired_outcome
      labels:
        zh: 预期结果
        en: desired outcome
        ja: 望ましい結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可验收状态描述要实现什么，而不是规定谁执行或记录当前运行状态。
        en: States the acceptable state to be achieved without assigning a performer or recording current run status.
        ja: 誰が実行するかや現在の実行状態ではなく、達成すべき受入可能状態を記述します。
      allowed_values: []
      pattern: null
      example_value: Produce a reconciliation report with zero unexplained differences.
      source_claims:
        - claim-task-002
    - id: input_contract
      labels:
        zh: 任务输入合同
        en: task input contract
        ja: タスク入力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明开始实现任务所需的信息类型、模式、版本与完整性要求。
        en: Declares information types, schemas, versions, and integrity requirements needed to begin realizing the Task.
        ja: Task 実現開始に必要な情報種別・スキーマ・版・完全性要件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: LedgerSnapshot
        schema: ledger-snapshot@2
        authorization_required: true
      source_claims:
        - claim-task-003
    - id: output_contract
      labels:
        zh: 任务输出合同
        en: task output contract
        ja: タスク出力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明成功实现时必须提供的结果类型与模式；实际输出实例仍属于运行层。
        en: Declares the result type and schema required by a successful realization while actual output instances remain in the runtime layer.
        ja: 成功実現で必要な結果種別とスキーマを宣言し、実際の出力インスタンスは実行層に残します。
      allowed_values: []
      pattern: null
      example_value:
        type: ReconciliationReport
        schema: reconciliation-report@3
      source_claims:
        - claim-task-004
  constraints:
    - id: task-contract-outcome-consistent
      severity: error
      expression_language: plain
      expression: desired_outcome is non-empty and output_contract can provide evidence required by every completion criterion
      explanations:
        zh: 预期结果、输出合同与完成判据必须可相互验证，不能只写抽象口号。
        en: Desired outcome, output contract, and completion criteria must be mutually verifiable rather than an abstract slogan.
        ja: 望ましい結果・出力契約・完了基準は相互検証可能で、抽象的標語だけでは不十分です。
      source_claims:
        - claim-task-005
    - id: task-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: Task-depends_on-Task edges are acyclic within each TaskPlan version
      explanations:
        zh: 前置任务依赖必须无环；需要反复执行的流程由路由循环而不是依赖环表示。
        en: Predecessor Task dependencies are acyclic; repeated execution is represented by routing loops rather than dependency cycles.
        ja: 先行 Task 依存は非循環で、反復実行は依存循環ではなくルーティングループで表します。
      source_claims:
        - claim-task-006
  required_relation_constraints:
    - id: task-has-completion-criterion
      direction: outgoing
      predicate: has_completion_criterion
      target_concept_id: TaskCompletionCriterion
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个可执行 Task 至少具有一个可复算的完成判据。
        en: Every executable Task has at least one recomputable completion criterion.
        ja: 各実行可能 Task は少なくとも一つの再計算可能な完了基準を持ちます。
      source_claims:
        - claim-task-007
examples:
  - id: Task-example-positive-manual-001
    labels:
      zh: Task positive
      en: Task positive
      ja: Task positive
    descriptions:
      zh: CrewAI 映射 Task：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps Task: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI Task: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {desired_outcome: "Produce a reconciliation report with zero unexplained differences."}

    related_node_ids:
      - Task
      - WorkSpecification
      - TaskCompletionCriterion
      - WorkItem
      - Execution
    related_relation_ids:
      - Task-is_a-WorkSpecification
      - Task-has_completion_criterion-TaskCompletionCriterion
      - WorkItem-allocates-Task
      - Execution-realizes-Task
    source_claims:
      - claim-task-008

  - id: Task-example-boundary-manual-001
    labels:
      zh: Task boundary
      en: Task boundary
      ja: Task boundary
    descriptions:
      zh: TaskWeaver CodeExecutor stdout 是运行时执行输出，不是 Task 规范 expected_output；TaskStep 规约与执行 trace 应分离。
      en: TaskWeaver CodeExecutor stdout is runtime execution output, not Task expected_output spec; separate TaskStep specification from execution trace.
      ja: TaskWeaver stdout は runtime で Task expected_output spec ではない。
    field_values: {work_specification_id: task-spec-protocol-lifecycle-copy, revision: 1, desired_outcome: working}

    related_node_ids:
      - Task
      - Execution
    related_relation_ids:
      - Execution-realizes-Task
    source_claims:
      - claim-task-009

  - id: Task-example-counterexample-confusable
    labels:
      zh: Task counterexample
      en: Task counterexample
      ja: Task counterexample
    descriptions:
      zh: 一次性脚本无 skill_library.add 持久化不能作为 Voyager 式 Task 技能组合。
      en: One-off script without skill_library.add persistence cannot classify as Voyager-style Task skill composition.
      ja: skill_library.add なし一回脚本は Voyager 式 Task ではない。
    field_values: {task_id: absent, work_specification_ref: absent, a2a_task_id: task-20260718-001}

    related_node_ids:
      - Task
      - A2ATask
      - TaskPlan
      - WorkSpecification
      - TaskCompletionCriterion
      - WorkItem
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-task-008

  - id: Task-example-instance-concrete
    labels:
      zh: Task instance
      en: Task instance
      ja: Task instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 Task HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to Task HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が Task HandoffDecision に写像。
    field_values: {desired_outcome: "Produce a reconciliation report with zero unexplained differences."}

    related_node_ids:
      - Task
      - WorkSpecification
      - TaskCompletionCriterion
      - WorkItem
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-task-008

