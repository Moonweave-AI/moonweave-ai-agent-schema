schema: moonweave.ai/ontology-node/v1
id: Task
kind: concept
status: accepted
labels:
  zh: 任务
  en: task
  ja: タスク
semantics:
  short_definition:
    zh: 任务是以预期结果为身份、可被执行多次的工作规约。
    en: A task is a reusable work specification identified by its desired outcome.
    ja: タスクは、望ましい結果によって識別され、複数回実行できる作業仕様です。
  definition:
    zh: Task 是一种面向结果的 WorkSpecification：它规定应从给定输入实现的预期结果、适用约束与完成标准，并独立于当前受派者、调度优先级和某次运行状态。A2A Task 是带标识、状态、历史和产物的有状态生命周期对象，在本体中对齐运行层的 Execution，而不是复用此规范类。
    en: A Task is an outcome-oriented WorkSpecification that states the desired outcome to be realized from given inputs together with applicable constraints and completion criteria and is independent of its current assignee, scheduling priority, or any run state. An A2A Task is a stateful lifecycle object with identity, status, history, and artifacts; Moonweave aligns that protocol object with runtime Execution rather than reusing this specification class.
    ja: Task は、入力から実現すべき望ましい結果、適用制約、完了基準を定める結果指向の WorkSpecification であり、現在の担当者、スケジュール優先度、個別実行状態から独立します。A2A Task は識別子・状態・履歴・成果物を持つステートフルなライフサイクル対象なので、この仕様クラスではなく実行層の Execution に対応付けます。
  why_needed:
    zh: 稳定的任务规范使计划、分配和执行引用同一个‘要实现什么’，同时允许每次 Execution 拥有独立状态、重试和产物谱系。
    en: A stable Task lets planning, allocation, and execution refer to the same statement of what must be achieved while each Execution keeps an independent state, retry history, and artifact lineage.
    ja: 安定した Task により、計画・割当・実行が同じ『何を達成するか』を参照しつつ、各 Execution は独立した状態、再試行履歴、成果物系譜を保持できます。
  includes:
    - zh: 稳定任务规范标识、预期结果、输入契约，以及指向 TaskConstraint 与 TaskCompletionCriterion 的规范关系。
      en: A stable task-specification identifier, desired outcome, input contract, and normative links to TaskConstraint and TaskCompletionCriterion.
      ja: 安定したタスク仕様識別子、望ましい結果、入力契約、TaskConstraint と TaskCompletionCriterion への規範的リンクを含みます。
  excludes:
    - zh: 当前 assignee、priority、queued/running/completed 状态、运行时间、重试次数和实际产物；这些分别属于 WorkItem 或 Execution。
      en: Current assignee, priority, queued/running/completed state, runtime timestamps, retry count, and actual artifacts; those belong to WorkItem or Execution.
      ja: 現在の担当者、優先度、queued/running/completed 状態、実行時刻、再試行回数、実成果物は含まず、WorkItem または Execution に属します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: desired_outcome
      labels:
        zh: 预期结果
        en: desired outcome
        ja: 望ましい結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可验收状态描述要实现什么，而不是规定谁执行或记录当前运行状态。
        en: States the acceptable state to be achieved without assigning a performer or recording current run status.
        ja: 誰が実行するかや現在の実行状態ではなく、達成すべき受入可能状態を記述します。
      allowed_values: []
      pattern: null
      example_value: Produce a reconciliation report with zero unexplained differences.
      source_claims:
        - claim-task-002
    - id: input_contract
      labels:
        zh: 任务输入合同
        en: task input contract
        ja: タスク入力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明开始实现任务所需的信息类型、模式、版本与完整性要求。
        en: Declares information types, schemas, versions, and integrity requirements needed to begin realizing the Task.
        ja: Task 実現開始に必要な情報種別・スキーマ・版・完全性要件を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        type: LedgerSnapshot
        schema: ledger-snapshot@2
        authorization_required: true
      source_claims:
        - claim-task-003
    - id: output_contract
      labels:
        zh: 任务输出合同
        en: task output contract
        ja: タスク出力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明成功实现时必须提供的结果类型与模式；实际输出实例仍属于运行层。
        en: Declares the result type and schema required by a successful realization while actual output instances remain in the runtime layer.
        ja: 成功実現で必要な結果種別とスキーマを宣言し、実際の出力インスタンスは実行層に残します。
      allowed_values: []
      pattern: null
      example_value:
        type: ReconciliationReport
        schema: reconciliation-report@3
      source_claims:
        - claim-task-004
  constraints:
    - id: task-contract-outcome-consistent
      severity: error
      expression_language: plain
      expression: desired_outcome is non-empty and output_contract can provide evidence required by every completion criterion
      explanations:
        zh: 预期结果、输出合同与完成判据必须可相互验证，不能只写抽象口号。
        en: Desired outcome, output contract, and completion criteria must be mutually verifiable rather than an abstract slogan.
        ja: 望ましい結果・出力契約・完了基準は相互検証可能で、抽象的標語だけでは不十分です。
      source_claims:
        - claim-task-005
    - id: task-dependency-graph-acyclic
      severity: error
      expression_language: plain
      expression: Task-depends_on-Task edges are acyclic within each TaskPlan version
      explanations:
        zh: 前置任务依赖必须无环；需要反复执行的流程由路由循环而不是依赖环表示。
        en: Predecessor Task dependencies are acyclic; repeated execution is represented by routing loops rather than dependency cycles.
        ja: 先行 Task 依存は非循環で、反復実行は依存循環ではなくルーティングループで表します。
      source_claims:
        - claim-task-006
  required_relation_constraints:
    - id: task-has-completion-criterion
      direction: outgoing
      predicate: has_completion_criterion
      target_concept_id: TaskCompletionCriterion
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个可执行 Task 至少具有一个可复算的完成判据。
        en: Every executable Task has at least one recomputable completion criterion.
        ja: 各実行可能 Task は少なくとも一つの再計算可能な完了基準を持ちます。
      source_claims:
        - claim-task-007
examples:
  - id: Task-example-positive-manual-001
    kind: positive
    labels:
      zh: 任务正例
      en: Positive example for task
      ja: タスクの正例
    scenario_id: null
    descriptions:
      zh: task-spec-reconcile-7 规定‘把授权账本快照转换为零未解释差异的对账报告’，并引用输入契约与完成标准；它没有绑定执行者或状态。
      en: task-spec-reconcile-7 requires transforming an authorized ledger snapshot into a reconciliation report with zero unexplained differences and references an input contract and completion criterion, but binds no assignee or state.
      ja: task-spec-reconcile-7 は、許可済み台帳スナップショットを未説明差異ゼロの照合報告へ変換し、入力契約と完了基準を参照しますが、担当者や状態は束縛しません。
    field_values:
      desired_outcome: Produce a reconciliation report with zero unexplained differences.
      input_contract:
        type: LedgerSnapshot
        schema: ledger-snapshot@2
        authorization_required: true
      output_contract:
        type: ReconciliationReport
        schema: reconciliation-report@3
      work_specification_id: task-spec-reconcile-7
      revision: "4"
      intended_transformation: transform an authorized ledger snapshot into a reconciliation report with zero unexplained differences
      input_contract_refs:
        - ledger-snapshot@2
      output_contract_refs:
        - reconciliation-report@3
      acceptance_basis_ref: reconciliation-zero-unexplained-differences@4
      applicability_boundary:
        ledger_scope: authorized-snapshot
        reconciliation_period: 2026-07
    related_node_ids:
      - Task
      - WorkSpecification
      - TaskCompletionCriterion
      - WorkItem
      - Execution
    related_relation_ids:
      - Task-is_a-WorkSpecification
      - Task-has_completion_criterion-TaskCompletionCriterion
      - WorkItem-allocates-Task
      - Execution-realizes-Task
    expected_result:
      zh: task-spec-reconcile-7 是 Task；多个 WorkItem 可分配它，多个 Execution 可实现它。
      en: task-spec-reconcile-7 is a Task that multiple WorkItems may allocate and multiple Executions may realize.
      ja: task-spec-reconcile-7 は Task であり、複数の WorkItem が割り当て、複数の Execution が実現できます。
    why_valid_or_invalid:
      zh: 其身份由稳定的预期结果和验收语义决定，而不随人员、优先级或一次运行失败而改变。
      en: Its identity comes from a stable desired outcome and acceptance semantics and does not change with performer, priority, or one failed run.
      ja: 同一性が安定した望ましい結果と受入意味で決まり、担当者、優先度、一回の失敗で変わらないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-008
  - id: Task-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 任务边界例
      en: Boundary case for task
      ja: タスクの境界例
    scenario_id: null
    descriptions:
      zh: A2A 对象 task-93 当前为 working，包含三条消息历史和 artifact report-12，随后转为 failed。
      en: A2A object task-93 is currently working, contains three history messages and artifact report-12, and later transitions to failed.
      ja: A2A オブジェクト task-93 は現在 working で、3件の履歴メッセージと artifact report-12 を持ち、その後 failed へ遷移します。
    field_values:
      work_specification_id: task-spec-protocol-lifecycle-copy
      revision: "1"
      desired_outcome: working
      input_contract:
        a2a_task_id: task-93
        current_status: working
      output_contract:
        actual_artifact_id: report-12
        terminal_status: failed
    related_node_ids:
      - Task
      - Execution
    related_relation_ids:
      - Execution-realizes-Task
    expected_result:
      zh: 该有状态对象映射为 Execution；它可以通过 Execution-realizes-Task 指向规范 Task。
      en: The stateful object maps to Execution and may point to its specification through Execution-realizes-Task.
      ja: この状態付き対象は Execution に写像し、Execution-realizes-Task により仕様 Task を指せます。
    why_valid_or_invalid:
      zh: 状态转换、历史和本次产物都是运行身份，而非独立于运行的预期结果定义。
      en: State transitions, history, and run artifacts determine runtime identity rather than an execution-independent desired-outcome definition.
      ja: 状態遷移、履歴、実行成果物は実行の同一性を定め、実行から独立した望ましい結果の定義ではないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-task-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaskPlan
    shared_parent_concept_id: WorkSpecification
    differentia:
      zh: 正向身份比较：父节点 WorkSpecification：Task（semantic kind=specification，骨架 Task-is_a-WorkSpecification）；TaskPlan（semantic kind=specification，骨架 TaskPlan-is_a-WorkSpecification）。双端条件：Task 条件：“任务是一种工作规约（WorkSpecification），以 task_id 标识一项可分派工作，并用状态、优先级、约束与完成标准描述尚待实现的工作；一次具体执行由 RunAttempt 表示”；TaskPlan 条件：“任务计划属于工作规约，区别于其他同类对象的条件是：它把目标组织为有序任务、工作项、依赖、约束和完成准则，使委派与审计有明确结构”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent WorkSpecification: Task (semantic kind=specification, backbone Task-is_a-WorkSpecification); TaskPlan (semantic kind=specification, backbone TaskPlan-is_a-WorkSpecification). Endpoint conditions: Task condition: “A Task is a WorkSpecification identified by task_id that describes assignable work through status, priority, constraints, and completion criteria; one concrete execution is represented by a RunAttempt”; TaskPlan condition: “Task plan is a work specification whose defining condition is that it organizes a goal into ordered tasks, work items, dependencies, constraints, and completion criteria that can be delegated and audited”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 WorkSpecification：Task（semantic kind=specification、バックボーン Task-is_a-WorkSpecification）；TaskPlan（semantic kind=specification、バックボーン TaskPlan-is_a-WorkSpecification）。両端条件：Task の条件：「タスクは作業仕様（WorkSpecification）の一種で、task_id により割当可能な作業を識別し、状態、優先度、制約、完了基準によって未実現の作業を記述します」；TaskPlan の条件：「タスク計画は作業仕様のうち、次の事実を定義条件とする対象です：それは目標を順序付きタスク、作業項目、依存、制約、完了基準へ整理し、委任と監査の構造を与えます」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-task-010
      - claim-task-011
  - sibling_concept_id: TaskStep
    shared_parent_concept_id: WorkSpecification
    differentia:
      zh: 端点特定对照：父节点 WorkSpecification：Task（semantic kind=specification，骨架 Task-is_a-WorkSpecification）；TaskStep（semantic kind=specification，骨架 TaskStep-is_a-WorkSpecification）。双端条件：Task 条件：“任务是一种工作规约（WorkSpecification），以 task_id 标识一项可分派工作，并用状态、优先级、约束与完成标准描述尚待实现的工作；一次具体执行由 RunAttempt 表示”；TaskStep 条件：“任务步骤是以如下事实为区分特征的工作规约：它规定顺序、依赖、负责人、完成证据以及可选的调用计划；它不执行工具调用，执行身份由 ToolCall 与 ToolCallAttempt 承担”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent WorkSpecification: Task (semantic kind=specification, backbone Task-is_a-WorkSpecification); TaskStep (semantic kind=specification, backbone TaskStep-is_a-WorkSpecification). Endpoint conditions: Task condition: “A Task is a WorkSpecification identified by task_id that describes assignable work through status, priority, constraints, and completion criteria; one concrete execution is represented by a RunAttempt”; TaskStep condition: “Task step is a work specification; its differentiating condition is that it specifies ordering, dependencies, owner, completion evidence, and an optional invocation plan; it does not execute a tool call, whose execution identity belongs to ToolCall and ToolCallAttempt”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 WorkSpecification：Task（semantic kind=specification、バックボーン Task-is_a-WorkSpecification）；TaskStep（semantic kind=specification、バックボーン TaskStep-is_a-WorkSpecification）。両端条件：Task の条件：「タスクは作業仕様（WorkSpecification）の一種で、task_id により割当可能な作業を識別し、状態、優先度、制約、完了基準によって未実現の作業を記述します」；TaskStep の条件：「タスクステップは作業仕様の一種であり、次の条件で区別されます：タスク手順は順序、依存、担当者、完了証拠、任意の呼出し計画を規定します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-task-012
      - claim-task-013
parent_relation:
  id: Task-is_a-WorkSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Task —is_a→ WorkSpecification 表示 Task 继承未实现工作的规范身份，并以稳定预期结果作为种差；受派者、优先级和生命周期状态不属于该继承链。
    en: Task —is_a→ WorkSpecification classifies Task as normative unrealized work, with a stable desired outcome as its differentia; assignee, priority, and lifecycle state do not belong to this inheritance chain.
    ja: Task —is_a→ WorkSpecification は、Task を未実現作業の規範として分類し、安定した望ましい結果を種差とします。担当者・優先度・ライフサイクル状態はこの継承鎖に属しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Task-is_a-WorkSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: task-spec-audit 规定输入快照、预期差异报告和完成标准，不包含当前运行状态。
        en: task-spec-audit states an input snapshot, desired difference report, and completion criterion and contains no current run state.
        ja: task-spec-audit は入力スナップショット、期待差分報告、完了基準を定め、現在の実行状態を含みません。
      field_values: {}
      related_node_ids:
        - Task
        - WorkSpecification
      related_relation_ids:
        - Task-is_a-WorkSpecification
      expected_result:
        zh: task-spec-audit 既是 Task，也是 WorkSpecification。
        en: task-spec-audit is both Task and WorkSpecification.
        ja: task-spec-audit は Task であり WorkSpecification でもあります。
      why_valid_or_invalid:
        zh: 它符合规范性工作属，并以独立于执行的预期结果区分自身。
        en: It satisfies the normative-work genus and distinguishes itself through an execution-independent desired outcome.
        ja: 規範的作業という属を満たし、実行から独立した望ましい結果で自身を区別するためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-014
    - id: Task-is_a-WorkSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: execution-audit-91 当前为 running，含开始时间、重试次数和已生成日志。
        en: execution-audit-91 is running and contains a start time, retry count, and generated logs.
        ja: execution-audit-91 は running で、開始時刻、再試行回数、生成ログを含みます。
      field_values: {}
      related_node_ids:
        - Task
        - WorkSpecification
      related_relation_ids:
        - Task-is_a-WorkSpecification
      expected_result:
        zh: 该对象是 Execution，不通过此 is_a 边归类为 WorkSpecification。
        en: The object is Execution and is not classified through this is_a edge as WorkSpecification.
        ja: この対象は Execution で、この is_a 辺により WorkSpecification へ分類しません。
      why_valid_or_invalid:
        zh: 其身份由一次运行的时间线和状态决定，而非未实现的结果规范。
        en: Its identity comes from one run's timeline and state rather than an unrealized outcome specification.
        ja: 同一性が未実現結果仕様ではなく、一回の実行時系列と状態で決まるためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-task-015
  source_claims:
    - claim-task-016
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Task-constrained_by-TaskConstraint
    predicate: constrained_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: constrained by
      en: constrained by
      ja: constrained by
    definitions:
      zh: Task —constrained_by→ TaskConstraint 表示该限制适用于这个稳定任务规范及其所有实现执行；它限制允许的方法、资源或权限，但不表达前置依赖或完成判定。
      en: Task —constrained_by→ TaskConstraint means that the limit governs the stable Task specification and every realizing Execution. It restricts permitted method, resource, or authority but expresses neither a predecessor dependency nor a completion decision.
      ja: Task —constrained_by→ TaskConstraint は、その制限が安定した Task 仕様と全ての実現 Execution を統制し、許可方法・資源・権限を制限する一方、前提依存や完了判定を表さないことを示します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: constrains
      labels:
        zh: 反向：constrained by
        en: constrains
        ja: 逆方向：constrained by
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Task-constrained_by-TaskConstraint-example-positive-manual-001
        kind: positive
        labels:
          zh: constrained by正例
          en: Positive example for constrained by
          ja: constrained byの正例
        scenario_id: null
        descriptions:
          zh: task-spec-export 被 constraint-eu-only 限定为只在欧盟区域沙箱内处理数据。
          en: task-spec-export is constrained by constraint-eu-only to process data only in an EU-region sandbox.
          ja: task-spec-export は constraint-eu-only により EU 地域サンドボックス内だけでデータ処理するよう制約されます。
        field_values: {}
        related_node_ids:
          - Task
          - TaskConstraint
        related_relation_ids:
          - Task-constrained_by-TaskConstraint
