schema: moonweave.ai/ontology-node/v1
id: WorkSpecification
kind: concept
labels:
  zh: 工作规约
  en: work specification
  ja: 作業仕様
semantics:
  short_definition:
    zh: 描述尚待实现工作而非一次已发生运行的规范性工作描述属。
    en: The normative genus describing work to be realized rather than an execution occurrence.
    ja: 実行済み事象ではなく未実現作業を記述する規範的作業記述属です。
  definition:
    zh: WorkSpecification 以 intended_transformation、input/output 契约、acceptance_basis_ref 与 applicability_boundary 界定尚待实现的工作；Task、TaskPlan、TaskStep 与 WorkItem 分别特化结果、组织、位置与分配语义。它不携带某次运行的开始时间、状态轨迹或实际产物。CrewAI Task 定义、LangGraph 图节点规约、Cursor 任务/计划文件均在此属下特化。
    en: WorkSpecification defines unrealized work through intended_transformation, input/output contracts, acceptance_basis_ref, and applicability_boundary; Task, TaskPlan, TaskStep, and WorkItem specialize outcome, organization, ordered position, and allocation. It carries no run start time, lifecycle trace, or actual artifacts. CrewAI Task definitions, LangGraph node specs, and Cursor task/plan files specialize under this genus.
    ja: WorkSpecification は intended_transformation・入出力契約・acceptance_basis_ref・applicability_boundary で未実現作業を定義し、Task/TaskPlan/TaskStep/WorkItem が特化します。CrewAI Task、LangGraph ノード仕様、Cursor タスク/計画ファイルもここで特化します。
  why_needed:
    zh: 将工作描述和运行事实分开后，同一任务可被多次执行、重试或重新分配，而不会改写其原始意图和验收依据。
    en: Separating work descriptions from runtime facts allows one specification to be executed, retried, or reassigned repeatedly without rewriting original intent or acceptance basis.
    ja: 作業記述と実行事実を分離し、意図と受入根拠を書き換えず再実行・再試行・再割当できます。
  includes:
    - zh: 预期变换、输入与输出契约、验收依据、适用范围，以及对任务、计划、步骤或分配包的规范性约束。
      en: Intended transformation, input/output contracts, acceptance basis, applicability scope, and normative constraints specialized by task, plan, step, or allocation packages.
      ja: 意図する変換、入出力契約、受入根拠、適用範囲、タスク/計画/ステップ/割当での規範的制約。
  excludes:
    - zh: Execution、RunAttempt、状态转换记录、耗时、实际工具调用和本次运行生成的 Artifact。
      en: Execution, RunAttempt, state-transition records, elapsed time, actual tool calls, and artifacts produced by a particular run.
      ja: Execution、RunAttempt、状態遷移、経過時間、実ツール呼出し、特定実行の Artifact。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 导入层应把 CrewAI Task(description, expected_output)、LangGraph 节点函数签名、Cursor .plan.md/.task 文件解析为 WorkSpecification 子类型，而非 Execution。work_specification_id+revision 作为不可变版本键；运行态 A2A Task 对象映射 Execution-realizes-Task。
    en: Ingestion maps CrewAI Task(description, expected_output), LangGraph node function contracts, and Cursor .plan.md/.task files to WorkSpecification subtypes, not Execution. work_specification_id+revision is the immutable version key; runtime A2A Task objects map via Execution-realizes-Task.
    ja: CrewAI Task、LangGraph ノード契約、Cursor plan/task ファイルを WorkSpecification 下位型へ写像し、実行時 A2A Task は Execution へ対応付けます。
  typical_input:
    - description: CrewAI reusable task definition.
      format: |
        task = Task(description="Reconcile ledger", expected_output="Zero unexplained differences")
      source_claims: [claim-ws-crewai]
  typical_output:
    - description: Versioned work specification record.
      format: |
        {
          "work_specification_id": "spec-data-audit",
          "revision": "4",
          "intended_transformation": "compare authorized snapshot against baseline"
        }
      source_claims: [claim-ws-design]
  reference_implementations:
    - name: CrewAI
      url: https://docs.crewai.com
      description: Reusable Task definitions.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Graph node work contracts.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Spec versus runtime task lifecycle split.
structure:
  identity_keys:
    - work_specification_id
    - revision
  fields:
    - id: work_specification_id
      labels: {zh: 工作规约标识, en: work-specification ID, ja: work specification ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 跨修订稳定标识同一项尚待实现工作的规范系列，不标识任何运行发生。
        en: Stably identifies one specification series for unrealized work across revisions, never an execution occurrence.
        ja: revision 間で未実現 work の specification series を安定識別し execution は識別しません。
      example_value: spec-data-audit
      source_claims: [claim-ws-design]
    - id: revision
      labels: {zh: 工作规约修订号, en: work-specification revision, ja: work specification revision}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 适用的不可变规约版本；输入、输出、验收或边界变化必须产生新修订。
        en: Immutable specification revision in force; input/output/acceptance/boundary changes create a new revision.
        ja: 適用中の immutable revision で、契約変更は新 revision を作ります。
      example_value: "4"
      source_claims: [claim-ws-design]
    - id: intended_transformation
      labels: {zh: 预期变换, en: intended transformation, ja: 意図する transformation}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 合格执行应把满足输入契约的对象变为满足输出契约的对象；只陈述预期工作，不声称变换已经发生。
        en: How conforming execution transforms inputs satisfying input contracts into outputs satisfying output contracts, without claiming occurrence.
        ja: input 契約を満たす object を output 契約を満たす object へ変換する expected work を記述します。
      example_value: compare an authorized data snapshot against the approved baseline
      source_claims: [claim-ws-crewai]
    - id: input_contract_refs
      labels: {zh: 所需输入契约引用, en: required input-contract references, ja: 必要 input contract 参照}
      datatype: array[reference]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 实现该工作前必须满足的版本化输入形状、授权或完整性契约。
        en: Versioned shape, authority, or integrity contracts inputs must satisfy before realization.
        ja: 実現前に input が満たす versioned shape/authority/integrity contracts。
      example_value: [authorized-data-snapshot@4]
      source_claims: [claim-ws-design]
    - id: output_contract_refs
      labels: {zh: 预期输出契约引用, en: expected output-contract references, ja: 期待 output contract 参照}
      datatype: array[reference]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 合格实现应产生的版本化输出形状与保证，不把实际 Artifact 写入规约身份。
        en: Versioned output shapes and guarantees a conforming realization should produce without embedding run artifacts.
        ja: conforming realization が生成すべき versioned output shapes/guarantees。
      example_value: [evidence-bearing-difference-report@4]
      source_claims: [claim-ws-design]
    - id: acceptance_basis_ref
      labels: {zh: 验收依据引用, en: acceptance-basis reference, ja: acceptance basis 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 判断一次实现是否满足规约的版本化判据；判据定义与某次判定结果保持分离。
        en: Versioned criterion judging whether a realization satisfies the specification, separate from an occurrence verdict.
        ja: realization 充足を判定する versioned criterion で occurrence verdict と分離します。
      example_value: difference-report-acceptance-threshold@4
      source_claims: [claim-ws-design]
    - id: applicability_boundary
      labels: {zh: 适用边界, en: applicability boundary, ja: applicability boundary}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 以可核验选择条件限定规约适用的主体、数据类别、环境或范围。
        en: Verifiable selectors limiting principals, data classes, environments, or scopes to which the specification applies.
        ja: 検証可能 selector で applicable な principal/data class/environment/scope を限定します。
      example_value: {tenant_scope: authorized-tenant, data_class: approved-audit-source}
      source_claims: [claim-ws-design]
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkSpecification-crewai-task-def
    labels: {zh: CrewAI 任务规约, en: CrewAI task specification, ja: CrewAI タスク仕様}
    descriptions:
      zh: spec-data-audit-v4 声明输入为授权数据快照、输出为带证据的差异报告及通过阈值；它是可复用 Task 规约而非一次 crew 运行。
      en: spec-data-audit-v4 requires an authorized snapshot, evidence-bearing difference report, and acceptance threshold as a reusable Task spec, not one crew run.
      ja: spec-data-audit-v4 は許可スナップショットと証拠付き差分報告を要求する再利用可能 Task 仕様です。
    example_source: {product: CrewAI, url: https://docs.crewai.com, version: Task definition}
    field_values:
      work_specification_id: spec-data-audit
      revision: "4"
    related_node_ids: [WorkSpecification, Task]
    related_relation_ids: [Task-is_a-WorkSpecification]
    source_claims: [claim-ws-crewai]
  - id: WorkSpecification-cursor-plan
    labels: {zh: Cursor 计划文件, en: Cursor plan file, ja: Cursor 計画ファイル}
    descriptions:
      zh: plan-release-12@3 以 markdown 计划文件组织 verify/package/approve 步骤与依赖，是 TaskPlan 特化的 WorkSpecification。
      en: plan-release-12@3 organizes verify, package, and approve steps with dependencies in a markdown plan file as a TaskPlan WorkSpecification.
      ja: plan-release-12@3 は markdown 計画で verify/package/approve を編成する TaskPlan 特化 WorkSpecification です。
    example_source: {product: Cursor, url: https://cursor.com, version: plan files}
    field_values:
      work_specification_id: plan-release-12
      revision: "3"
    related_node_ids: [WorkSpecification, TaskPlan]
    related_relation_ids: [TaskPlan-is_a-WorkSpecification]
    source_claims: [claim-ws-design]
  - id: WorkSpecification-boundary-execution
    labels: {zh: 运行不是规约, en: Execution is not specification, ja: 実行は仕様ではない}
    descriptions:
      zh: execution-884 记录 15:02 开始、15:04 失败及错误日志；其身份由一次具体发生决定，应建模为 Execution。
      en: execution-884 records 15:02 start, 15:04 failure, and error logs; its identity is one concrete occurrence and belongs on Execution.
      ja: execution-884 は開始/失敗/ログを記録する一回の occurrence で Execution に属します。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: spec versus execution}
    field_values: {}
    related_node_ids: [WorkSpecification, Execution]
    related_relation_ids: []
    source_claims: [claim-ws-design]
parent_relation: null
relations: []
sources:
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Reusable task definitions separate from runs.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Graph node work contracts.
  - id: a2a-spec
    title: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-doc
    relevance: Task description versus lifecycle object.
  - id: moonweave-design
    title: Moonweave orchestration design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: WorkSpecification genus and versioning.
source_claims:
  - id: claim-ws-crewai
    source: crewai
    supports: CrewAI Task definitions describe reusable work to be performed independently of a particular crew execution occurrence.
    locator: Concepts > Tasks
    evidence_kind: official
    confidence: high
  - id: claim-ws-design
    source: moonweave-design
    supports: Moonweave uses WorkSpecification as the common normative genus for Task, TaskPlan, TaskStep, and WorkItem with immutable revisions.
    locator: WorkSpecification concept boundary
    evidence_kind: design-inference
    confidence: high
