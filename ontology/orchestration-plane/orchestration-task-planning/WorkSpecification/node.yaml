schema: moonweave.ai/ontology-node/v1
id: WorkSpecification
kind: concept
labels:
  zh: 工作规约
  en: work specification
  ja: 作業仕様
semantics:
  short_definition:
    zh: 工作规约描述尚待实现的工作，而不是一次已经发生的运行。
    en: A work specification describes work to be realized rather than an execution occurrence.
    ja: 作業仕様は、実行済みの出来事ではなく、これから実現する作業を記述します。
  definition:
    zh: 工作规约是一类规范性描述：它以预期变换、所需输入、预期产出、验收依据和适用边界界定尚待实现的工作；Task、TaskPlan、TaskStep 与 WorkItem 分别特化其结果、组织、位置和分配语义。它不携带某次运行的开始时间、状态轨迹或实际产物。
    en: A WorkSpecification is a normative description distinguished by defining work yet to be realized through its intended transformation, required inputs, expected outputs, acceptance basis, and applicability boundary. Task, TaskPlan, TaskStep, and WorkItem specialize its outcome, organization, ordered-position, and allocation semantics respectively. It carries neither the start time, lifecycle trace, nor actual artifacts of an execution occurrence.
    ja: WorkSpecification は、意図する変換、必要入力、期待出力、受入根拠、適用境界によって未実現の作業を定める規範的記述です。Task、TaskPlan、TaskStep、WorkItem はそれぞれ結果、編成、順序位置、割当の意味を特殊化します。実行事象の開始時刻、状態履歴、実成果物は保持しません。
  why_needed:
    zh: 将工作描述和运行事实分开后，同一任务可被多次执行、重试或重新分配，而不会改写其原始意图和验收依据。
    en: Separating work descriptions from runtime facts allows one specification to be executed, retried, or reassigned repeatedly without rewriting its original intent or acceptance basis.
    ja: 作業記述と実行事実を分離することで、元の意図や受入根拠を書き換えずに、同じ仕様を複数回実行・再試行・再割当できます。
  includes:
    - zh: 预期变换、输入与输出契约、验收依据、适用范围，以及对后续任务、计划、步骤或分配包的规范性约束。
      en: The intended transformation, input and output contracts, acceptance basis, applicability scope, and normative constraints later specialized by a task, plan, step, or allocation package.
      ja: 意図する変換、入出力契約、受入根拠、適用範囲、およびタスク・計画・ステップ・割当パッケージで特殊化される規範的制約を含みます。
  excludes:
    - zh: Execution、RunAttempt、状态转换记录、耗时、实际工具调用和本次运行生成的 Artifact。
      en: Execution, RunAttempt, state-transition records, elapsed time, actual tool calls, and artifacts produced by a particular run.
      ja: Execution、RunAttempt、状態遷移記録、経過時間、実際のツール呼出し、特定実行が生成した Artifact は含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      规划编译器把 WorkSpecification 序列化为 LangGraph StateGraph 的节点规约或 OpenAI Agents SDK 的静态 Agent
      配置，再与 Execution 运行时分离存储。同一 work_specification_id 可被多次 Runner.run 引用，每次运行写入
      RunAttempt 而不回写 revision；A2A Task 载荷只在互操作边界出现，不能当作 WorkSpecification 的存储格式。
    en: >-
      A planning compiler serializes WorkSpecification into LangGraph StateGraph node specs or OpenAI Agents SDK static
      Agent configuration, stored separately from Execution runtime facts. The same work_specification_id may be referenced
      by multiple Runner.run calls, each writing a RunAttempt without rewriting revision; A2A Task payloads appear only at
      an interoperability boundary and are not the storage format for WorkSpecification.
    ja: >-
      planning compiler は WorkSpecification を LangGraph StateGraph の node spec または OpenAI Agents SDK の static Agent
      configuration にシリアライズし、Execution runtime 事実と分離保存する。同一 work_specification_id は複数の Runner.run
      から参照でき、各 run は revision を書き換えず RunAttempt を記録する。A2A Task payload は相互運用境界でのみ現れ、
      WorkSpecification の保存形式ではない。
  typical_input:
    - description:
        zh: 规划代理从 Goal 与输入契约生成的未实现工作声明。
        en: An unrealized work declaration produced by a planning agent from a Goal and input contracts.
        ja: Goal と input contract から planning agent が生成した未実現 work declaration。
      format: |-
        {"work_specification_id":"spec-data-audit-v4","revision":"4","intended_transformation":"reconcile ledger against bank feed","input_contract_refs":["ledger-snapshot@2","bank-feed@1"],"output_contract_refs":["reconciliation-report@3"],"acceptance_basis_ref":"reconciliation-zero-unexplained-differences@4"}
  typical_output:
    - description:
        zh: 被 Task、TaskPlan 或 WorkItem 特化引用的规范包络，不含运行状态。
        en: A specification envelope referenced by Task, TaskPlan, or WorkItem specialization, without runtime state.
        ja: Task、TaskPlan、WorkItem の特殊化が参照する specification envelope。runtime state は含まない。
      format: |-
        {"work_specification_id":"spec-data-audit-v4","revision":"4","specialization":"TaskPlan","plan_ref":"plan:ledger-reconcile-2026-07","plan_revision":"v2"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents StateGraph nodes as reusable graph structure distinct from checkpointed execution state.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents static Agent instructions and tool declarations as invocation configuration, not run records.
    - name: W3C PROV-O Plan
      url: https://www.w3.org/TR/prov-o/#Plan
      description: Defines Plan as an Entity representing intended actions, analogous to normative work description.
  source_claims:
    - claim-work-specification-002
    - claim-work-specification-010
structure:
  identity_keys:
    - work_specification_id
    - revision
  fields:
    - id: work_specification_id
      labels:
        zh: 工作规约标识
        en: work-specification ID
        ja: work specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一项尚待实现工作的规范系列，不标识任何运行发生。
        en: Stably identifies one specification series for work yet to be realized across revisions, never an execution occurrence.
        ja: 未実現 work の specification series を revision 間で安定識別し execution occurrence は識別しません。
      allowed_values: []
      pattern: null
      example_value: spec-data-audit
      source_claims:
        - claim-work-specification-002
    - id: revision
      labels:
        zh: 工作规约修订号
        en: work-specification revision
        ja: work specification revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识适用的不可变规约版本；输入、输出、验收或边界变化必须产生新修订。
        en: Identifies the immutable specification revision in force; changing inputs, outputs, acceptance, or boundary creates a new revision.
        ja: 適用中の immutable specification revision を識別し input、output、acceptance、boundary の変更は new revision を作ります。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-work-specification-003
    - id: intended_transformation
      labels:
        zh: 预期变换
        en: intended transformation
        ja: 意図する transformation
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明合格执行应把满足输入契约的对象变为满足输出契约的对象；只陈述预期工作，不声称变换已经发生。
        en: States how a conforming execution should transform objects satisfying the input contracts into objects satisfying the output contracts, without claiming the transformation occurred.
        ja: input contracts を満たす object を output contracts を満たす object へ変換する expected work を記述し、実行済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value: compare an authorized data snapshot against the approved baseline
      source_claims:
        - claim-work-specification-004
    - id: input_contract_refs
      labels:
        zh: 所需输入契约引用
        en: required input-contract references
        ja: 必要 input contract 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出实现该工作前必须满足的版本化输入形状、授权或完整性契约，不记录某次运行实际消费的对象。
        en: Lists versioned shape, authority, or integrity contracts that inputs must satisfy before the work can be realized; it does not list objects consumed by a run.
        ja: work 実現前に input が満たす versioned shape、authority、integrity contracts を列挙し run が消費した object は記録しません。
      allowed_values: []
      pattern: null
      example_value:
        - authorized-data-snapshot@4
      source_claims:
        - claim-work-specification-005
    - id: output_contract_refs
      labels:
        zh: 预期输出契约引用
        en: expected output-contract references
        ja: 期待 output contract 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出合格实现应产生的版本化输出形状与保证，不把某次运行的实际 Artifact 写入规约身份。
        en: Lists versioned output shapes and guarantees a conforming realization should produce, without embedding actual run artifacts in specification identity.
        ja: conforming realization が生成すべき versioned output shapes と guarantees を列挙し actual run Artifact を specification identity に埋め込みません。
      allowed_values: []
      pattern: null
      example_value:
        - evidence-bearing-difference-report@4
      source_claims:
        - claim-work-specification-006
    - id: acceptance_basis_ref
      labels:
        zh: 验收依据引用
        en: acceptance-basis reference
        ja: acceptance basis 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用判断一次实现是否满足规约的版本化判据；判据定义与某次判定结果保持分离。
        en: References the versioned criterion used to judge whether a realization satisfies the specification, keeping criterion definition separate from an occurrence verdict.
        ja: realization が specification を満たすか判定する versioned criterion を参照し criterion definition と occurrence verdict を分離します。
      allowed_values: []
      pattern: null
      example_value: difference-report-acceptance-threshold@4
      source_claims:
        - claim-work-specification-007
    - id: applicability_boundary
      labels:
        zh: 适用边界
        en: applicability boundary
        ja: applicability boundary
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可核验选择条件限定规约适用的主体、数据类别、环境或范围；边界不等同于某次运行上下文。
        en: Limits the principals, data classes, environments, or scopes to which the specification applies through verifiable selectors; it is not a run context.
        ja: 検証可能な selector で specification が applicable な principal、data class、environment、scope を限定し run context とは区別します。
      allowed_values: []
      pattern: null
      example_value:
        tenant_scope: authorized-tenant
        data_class: approved-audit-source
      source_claims:
        - claim-work-specification-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkSpecification-example-positive-manual-001
    labels:
      zh: WorkSpecification positive
      en: WorkSpecification positive
      ja: WorkSpecification positive
    descriptions:
      zh: TaskWeaver (Qiao et al., 2024, Microsoft) 将用户请求分解为 WorkSpecification 可执行代码子计划：Planner 生成 Python 步骤 → CodeExecutor 运行 → 结果反馈 Planner；code-first 框架使计划直接映射 CodeExecution。
      en: TaskWeaver (Qiao et al., 2024, Microsoft) decomposes requests into WorkSpecification executable code sub-plans: Planner generates Python steps → CodeExecutor runs → feedback to Planner; code-first framework maps plans directly to CodeExecution.
      ja: TaskWeaver (Qiao et al., 2024) WorkSpecification 向け Python 子計画→CodeExecutor→Planner feedback。
    field_values: {work_specification_id: spec-data-audit, revision: 4, intended_transformation: "compare an authorized data snapshot against the approved baseline"}

    related_node_ids:
      - WorkSpecification
    related_relation_ids: []
    source_claims:
      - claim-work-specification-009

  - id: WorkSpecification-example-boundary-manual-001
    labels:
      zh: WorkSpecification boundary
      en: WorkSpecification boundary
      ja: WorkSpecification boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 WorkSpecification 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not WorkSpecification static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で WorkSpecification 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - WorkSpecification
    related_relation_ids: []
    source_claims:
      - claim-work-specification-010

  - id: WorkSpecification-example-counterexample-confusable
    labels:
      zh: WorkSpecification counterexample
      en: WorkSpecification counterexample
      ja: WorkSpecification counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 WorkSpecification 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style WorkSpecification positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 WorkSpecification 正例にならない。
    field_values: {work_specification_id: absent, revision: absent, checkpoint_id: checkpoint-44}

    related_node_ids:
      - WorkSpecification
      - TaskPlan
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-work-specification-009

  - id: WorkSpecification-example-instance-concrete
    labels:
      zh: WorkSpecification instance
      en: WorkSpecification instance
      ja: WorkSpecification instance
    descriptions:
      zh: TaskWeaver 实例：Planner 生成 "df = pd.read_csv('sales.csv'); print(df.groupby('region').sum())" → CodeExecutor 运行 → 映射 WorkSpecification 可审计实例。
      en: TaskWeaver instance: Planner generates pandas groupby code → CodeExecutor runs → maps to auditable WorkSpecification instance.
      ja: TaskWeaver 实例 pandas code→CodeExecutor が WorkSpecification 实例に写像。
    field_values: {work_specification_id: spec-data-audit, revision: 4, intended_transformation: "compare an authorized data snapshot against the approved baseline"}

    related_node_ids:
      - WorkSpecification
    related_relation_ids: []
    source_claims:
      - claim-work-specification-009

