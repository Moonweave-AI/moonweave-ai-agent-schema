schema: moonweave.ai/ontology-node/v1
id: WorkSpecification
kind: concept
status: accepted
labels:
  zh: 工作规约
  en: work specification
  ja: 作業仕様
semantics:
  short_definition:
    zh: 工作规约描述尚待实现的工作，而不是一次已经发生的运行。
    en: A work specification describes work to be realized rather than an execution occurrence.
    ja: 作業仕様は、実行済みの出来事ではなく、これから実現する作業を記述します。
  definition:
    zh: 工作规约是一类规范性描述：它以预期变换、所需输入、预期产出、验收依据和适用边界界定尚待实现的工作；Task、TaskPlan、TaskStep 与 WorkItem 分别特化其结果、组织、位置和分配语义。它不携带某次运行的开始时间、状态轨迹或实际产物。
    en: A WorkSpecification is a normative description distinguished by defining work yet to be realized through its intended transformation, required inputs, expected outputs, acceptance basis, and applicability boundary. Task, TaskPlan, TaskStep, and WorkItem specialize its outcome, organization, ordered-position, and allocation semantics respectively. It carries neither the start time, lifecycle trace, nor actual artifacts of an execution occurrence.
    ja: WorkSpecification は、意図する変換、必要入力、期待出力、受入根拠、適用境界によって未実現の作業を定める規範的記述です。Task、TaskPlan、TaskStep、WorkItem はそれぞれ結果、編成、順序位置、割当の意味を特殊化します。実行事象の開始時刻、状態履歴、実成果物は保持しません。
  why_needed:
    zh: 将工作描述和运行事实分开后，同一任务可被多次执行、重试或重新分配，而不会改写其原始意图和验收依据。
    en: Separating work descriptions from runtime facts allows one specification to be executed, retried, or reassigned repeatedly without rewriting its original intent or acceptance basis.
    ja: 作業記述と実行事実を分離することで、元の意図や受入根拠を書き換えずに、同じ仕様を複数回実行・再試行・再割当できます。
  includes:
    - zh: 预期变换、输入与输出契约、验收依据、适用范围，以及对后续任务、计划、步骤或分配包的规范性约束。
      en: The intended transformation, input and output contracts, acceptance basis, applicability scope, and normative constraints later specialized by a task, plan, step, or allocation package.
      ja: 意図する変換、入出力契約、受入根拠、適用範囲、およびタスク・計画・ステップ・割当パッケージで特殊化される規範的制約を含みます。
  excludes:
    - zh: Execution、RunAttempt、状态转换记录、耗时、实际工具调用和本次运行生成的 Artifact。
      en: Execution, RunAttempt, state-transition records, elapsed time, actual tool calls, and artifacts produced by a particular run.
      ja: Execution、RunAttempt、状態遷移記録、経過時間、実際のツール呼出し、特定実行が生成した Artifact は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - work_specification_id
    - revision
  fields:
    - id: work_specification_id
      labels:
        zh: 工作规约标识
        en: work-specification ID
        ja: work specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一项尚待实现工作的规范系列，不标识任何运行发生。
        en: Stably identifies one specification series for work yet to be realized across revisions, never an execution occurrence.
        ja: 未実現 work の specification series を revision 間で安定識別し execution occurrence は識別しません。
      allowed_values: []
      pattern: null
      example_value: spec-data-audit
      source_claims:
        - claim-work-specification-002
    - id: revision
      labels:
        zh: 工作规约修订号
        en: work-specification revision
        ja: work specification revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识适用的不可变规约版本；输入、输出、验收或边界变化必须产生新修订。
        en: Identifies the immutable specification revision in force; changing inputs, outputs, acceptance, or boundary creates a new revision.
        ja: 適用中の immutable specification revision を識別し input、output、acceptance、boundary の変更は new revision を作ります。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-work-specification-003
    - id: intended_transformation
      labels:
        zh: 预期变换
        en: intended transformation
        ja: 意図する transformation
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明合格执行应把满足输入契约的对象变为满足输出契约的对象；只陈述预期工作，不声称变换已经发生。
        en: States how a conforming execution should transform objects satisfying the input contracts into objects satisfying the output contracts, without claiming the transformation occurred.
        ja: input contracts を満たす object を output contracts を満たす object へ変換する expected work を記述し、実行済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value: compare an authorized data snapshot against the approved baseline
      source_claims:
        - claim-work-specification-004
    - id: input_contract_refs
      labels:
        zh: 所需输入契约引用
        en: required input-contract references
        ja: 必要 input contract 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出实现该工作前必须满足的版本化输入形状、授权或完整性契约，不记录某次运行实际消费的对象。
        en: Lists versioned shape, authority, or integrity contracts that inputs must satisfy before the work can be realized; it does not list objects consumed by a run.
        ja: work 実現前に input が満たす versioned shape、authority、integrity contracts を列挙し run が消費した object は記録しません。
      allowed_values: []
      pattern: null
      example_value:
        - authorized-data-snapshot@4
      source_claims:
        - claim-work-specification-005
    - id: output_contract_refs
      labels:
        zh: 预期输出契约引用
        en: expected output-contract references
        ja: 期待 output contract 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出合格实现应产生的版本化输出形状与保证，不把某次运行的实际 Artifact 写入规约身份。
        en: Lists versioned output shapes and guarantees a conforming realization should produce, without embedding actual run artifacts in specification identity.
        ja: conforming realization が生成すべき versioned output shapes と guarantees を列挙し actual run Artifact を specification identity に埋め込みません。
      allowed_values: []
      pattern: null
      example_value:
        - evidence-bearing-difference-report@4
      source_claims:
        - claim-work-specification-006
    - id: acceptance_basis_ref
      labels:
        zh: 验收依据引用
        en: acceptance-basis reference
        ja: acceptance basis 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用判断一次实现是否满足规约的版本化判据；判据定义与某次判定结果保持分离。
        en: References the versioned criterion used to judge whether a realization satisfies the specification, keeping criterion definition separate from an occurrence verdict.
        ja: realization が specification を満たすか判定する versioned criterion を参照し criterion definition と occurrence verdict を分離します。
      allowed_values: []
      pattern: null
      example_value: difference-report-acceptance-threshold@4
      source_claims:
        - claim-work-specification-007
    - id: applicability_boundary
      labels:
        zh: 适用边界
        en: applicability boundary
        ja: applicability boundary
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可核验选择条件限定规约适用的主体、数据类别、环境或范围；边界不等同于某次运行上下文。
        en: Limits the principals, data classes, environments, or scopes to which the specification applies through verifiable selectors; it is not a run context.
        ja: 検証可能な selector で specification が applicable な principal、data class、environment、scope を限定し run context とは区別します。
      allowed_values: []
      pattern: null
      example_value:
        tenant_scope: authorized-tenant
        data_class: approved-audit-source
      source_claims:
        - claim-work-specification-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: WorkSpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: 工作规约正例
      en: Positive example for work specification
      ja: 作業仕様の正例
    scenario_id: null
    descriptions:
      zh: 规约 spec-data-audit-v4 声明输入为授权数据快照、输出为带证据的差异报告，并给出通过阈值；它尚未指定任何一次运行。
      en: Specification spec-data-audit-v4 requires an authorized data snapshot, an evidence-bearing difference report, and an acceptance threshold, without identifying any particular run.
      ja: 仕様 spec-data-audit-v4 は、許可済みデータのスナップショット、証拠付き差分報告、受入閾値を要求しますが、特定の実行は識別しません。
    field_values:
      work_specification_id: spec-data-audit
      revision: "4"
      intended_transformation: compare an authorized data snapshot against the approved baseline
      input_contract_refs:
        - authorized-data-snapshot@4
      output_contract_refs:
        - evidence-bearing-difference-report@4
      acceptance_basis_ref: difference-report-acceptance-threshold@4
      applicability_boundary:
        tenant_scope: authorized-tenant
        data_class: approved-audit-source
    related_node_ids:
      - WorkSpecification
    related_relation_ids: []
    expected_result:
      zh: spec-data-audit-v4 被识别为 WorkSpecification，可由 Task、TaskPlan、TaskStep 或 WorkItem 进一步特化。
      en: spec-data-audit-v4 is a WorkSpecification that may be specialized further as a Task, TaskPlan, TaskStep, or WorkItem.
      ja: spec-data-audit-v4 は WorkSpecification であり、Task、TaskPlan、TaskStep、WorkItem としてさらに特殊化できます。
    why_valid_or_invalid:
      zh: 它完整描述未实现工作的变换、输入、输出和验收依据，却没有混入运行时间线或实际结果。
      en: It defines the transformation, input, output, and acceptance basis of unrealized work without mixing in a runtime timeline or actual result.
      ja: 未実現作業の変換、入力、出力、受入根拠を定め、実行時系列や実結果を混在させていないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-work-specification-009
  - id: WorkSpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工作规约边界例
      en: Boundary case for work specification
      ja: 作業仕様の境界例
    scenario_id: null
    descriptions:
      zh: execution-884 记录 15:02 开始、15:04 失败，并关联本次生成的错误日志和补丁产物。
      en: execution-884 records a 15:02 start, a 15:04 failure, and the error log and patch artifact produced by that run.
      ja: execution-884 は 15:02 の開始、15:04 の失敗、その実行で生成されたエラーログとパッチ成果物を記録します。
    field_values: {}
    related_node_ids:
      - WorkSpecification
    related_relation_ids: []
    expected_result:
      zh: execution-884 是运行事实，应建模为 Execution，而不是 WorkSpecification。
      en: execution-884 is a runtime occurrence and must be modeled as Execution rather than WorkSpecification.
      ja: execution-884 は実行事実であり、WorkSpecification ではなく Execution として表します。
    why_valid_or_invalid:
      zh: 其身份由一次具体发生的时间线与结果决定，而不是由可复用的工作意图和验收规则决定。
      en: Its identity is determined by one concrete timeline and outcome, not by reusable work intent and acceptance rules.
      ja: 同一性が再利用可能な作業意図や受入規則ではなく、具体的な一回の時系列と結果で決まるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-work-specification-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-tool-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照权威来源逐项完成人工语义核验；概念定义、层级、关系、结构与来源主张成立。
    en: Manual semantic verification against authoritative sources completed; concept definitions, hierarchy, relations, structure, and source claims hold.
    ja: 権威ソースに照らし手動意味検証を完了し、概念定義・階層・関係・構造・出典主張が成立。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-work-specification-001
    source: lit-oasis-process-planning
    supports: The OASIS process-planning model separates task and procedure descriptions from plan-execution occurrences; Moonweave uses WorkSpecification as the common normative genus for reusable work descriptions.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-specification-002
    source: lit-oasis-process-planning
    supports: OASIS process-planning distinguishes reusable task or procedure descriptions from their executions. Moonweave gives the description series a stable identifier.
    locator: OASIS process-planning paper > task descriptions, plans, procedures, and executions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-003
    source: lit-oasis-process-planning
    supports: Reusable process descriptions can evolve independently of execution histories. Moonweave versions each normative work description instead of overwriting it.
    locator: OASIS process-planning paper > plans, procedures, and plan descriptions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-004
    source: lit-oasis-process-planning
    supports: OASIS planning evidence separates intended task effects from a plan execution. Moonweave records that intended transformation on the specification.
    locator: OASIS process-planning paper > task descriptions and intended effects
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-005
    source: lit-oasis-process-planning
    supports: Reusable task descriptions define required inputs separately from particular execution resources. Moonweave references versioned input contracts.
    locator: OASIS process-planning paper > task inputs and execution bindings
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-006
    source: lit-oasis-process-planning
    supports: OASIS planning distinguishes expected task outputs from outputs produced by a concrete execution. Moonweave references the former as contracts.
    locator: OASIS process-planning paper > expected outputs and execution results
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-007
    source: lit-oasis-process-planning
    supports: Process descriptions can prescribe completion or success conditions independently from execution status. Moonweave records the versioned acceptance basis.
    locator: OASIS process-planning paper > goals, success conditions, and plan execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-008
    source: lit-oasis-process-planning
    supports: Planning descriptions constrain when a task or procedure is applicable. Moonweave materializes that normative boundary as selectors.
    locator: OASIS process-planning paper > task applicability and plan constraints
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-work-specification-009
    source: lit-oasis-process-planning
    supports: OASIS distinguishes descriptions of tasks and procedures from their executions; this record is the reusable description side of that distinction.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-work-specification-010
    source: lit-oasis-process-planning
    supports: OASIS models plan executions separately from the task and procedure descriptions they enact; the dated occurrence belongs on the execution side.
    locator: OASIS process-planning paper > plans, procedures, task descriptions, and plan executions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
