schema: moonweave.ai/ontology-node/v1
id: Goal
kind: concept
labels:
  zh: 目标
  en: Goal
  ja: 目標
semantics:
  short_definition:
    zh: 说明规划希望达成的结果及其验收依据的持久声明。
    en: A durable declaration of an outcome a plan is intended to achieve and how it is accepted.
    ja: 計画が達成を意図する成果と、その受入根拠を宣言する永続的な記述。
  definition:
    zh: >-
      Goal 是面向未来的期望结果声明，由稳定标识、适用范围、所需结果和可审查的验收准则组成。一个或多个
      TaskPlan 可以追求同一 Goal；Goal 本身不记录某次执行是否已经成功，也不规定执行步骤、A2A 生命周期或工具调用。
      这是 Moonweave 的本地规划概念，而非 PROV-O、LangGraph 或 Agents SDK 定义的同名运行时类型。
    en: >-
      A Goal is a future-facing desired-outcome declaration with a stable identifier, applicable scope, required outcome,
      and reviewable acceptance criteria. One or more TaskPlans may pursue the same Goal. A Goal does not record whether
      a particular execution succeeded, prescribe an execution step, or carry an A2A lifecycle or tool call. It is a
      Moonweave local planning concept, not a same-named runtime type defined by PROV-O, LangGraph, or the Agents SDK.
    ja: >-
      Goal は、安定した識別子、適用範囲、必要な成果、レビュー可能な受入基準からなる未来志向の成果宣言である。
      一つ以上の TaskPlan が同じ Goal を追求できる。Goal は特定の実行の成功、実行 step、A2A の lifecycle、
      または tool call を記録しない。これは Moonweave 固有の planning concept であり、PROV-O、LangGraph、
      Agents SDK が定義する同名の runtime type ではない。
  why_needed:
    zh: 目标把“为什么安排这些步骤”从步骤和运行记录中分离出来，使计划可以变更而验收意图仍可追溯。
    en: A separate outcome declaration preserves why steps were arranged even when a plan revision or a runtime attempt changes.
    ja: 独立した成果宣言により、計画 revision や runtime attempt が変わっても、step を配置した理由を追跡できる。
  includes:
    - zh: 稳定目标标识、期望结果、适用范围、验收准则和所需证据的声明。
      en: A stable goal identifier, desired outcome, applicable scope, acceptance criteria, and declared evidence need.
      ja: 安定した goal ID、desired outcome、適用範囲、acceptance criteria、必要な evidence の宣言。
  excludes:
    - zh: 原始用户消息、实际执行状态、进度百分比、一次评测分数、A2A TaskStatus 和工具响应。
      en: A raw user message, actual execution state, progress percentage, one evaluation score, A2A TaskStatus, or tool response.
      ja: raw user message、実行状態、進捗率、一回の evaluation score、A2A TaskStatus、tool response。
  semantic_kind: entity
engineering:
  explanation:
    zh: >-
      规划适配器可把 desired_outcome 与 acceptance_criteria 传给 OpenAI Agents SDK 的规划代理，生成
      TaskPlan；但 Agent instructions 是调用配置，不是 Goal 的存储位置。LangGraph 节点返回的 state 更新和
      A2A 任务状态必须保存在其各自的运行时或协议记录中，不能反向改写 Goal。
    en: >-
      A planning adapter can pass desired_outcome and acceptance_criteria to an OpenAI Agents SDK planning agent to create
      a TaskPlan, but Agent instructions are invocation configuration rather than Goal storage. LangGraph node state updates
      and A2A task status remain in their runtime or protocol records and must not rewrite the Goal.
    ja: >-
      planning adapter は desired_outcome と acceptance_criteria を OpenAI Agents SDK の planning agent に渡して
      TaskPlan を作成できる。しかし Agent instructions は invocation configuration であり Goal の保存場所ではない。
      LangGraph node の state update と A2A task status はそれぞれの runtime または protocol record に残し、
      Goal を逆方向に書き換えてはならない。
  source_claims: [claim-goal-agent-projection]
  typical_input:
    - description:
        zh: 由产品负责人确认过范围和验收条件的结果声明。
        en: An outcome statement whose scope and acceptance conditions were confirmed by the product owner.
        ja: product owner が scope と acceptance condition を確認した成果宣言。
      format: |-
        {"goal_id":"goal:release-2026-07","desired_outcome":"approve a signed production release","scope_ref":"release:2026-07","acceptance_criteria":["artifact signature verifies","production smoke suite passes"],"evidence_requirement":"signed artifact and smoke report"}
  typical_output:
    - description:
        zh: 用 Goal 引用生成的本地计划，而不是已发生的执行记录。
        en: A local plan generated with a Goal reference, rather than an occurred execution record.
        ja: Goal reference を使って生成された local plan。発生済みの execution record ではない。
      format: |-
        {"specification_id":"plan:release-2026-07","revision":"v1","goal_ref":"goal:release-2026-07","scope_ref":"release:2026-07","step_refs":["step:sign","step:smoke","step:approve"]}
  reference_implementations:
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents static and dynamic Agent instructions that an adapter may derive from goal text.
    - name: W3C PROV-O Plan
      url: https://www.w3.org/TR/prov-o/#Plan
      description: Defines Plan as an Entity representing intended actions or steps toward goals.
structure:
  identity_keys:
    - goal_id
  fields:
    - id: goal_id
      labels: {zh: 目标标识, en: Goal identifier, ja: goal 識別子}
      definitions:
        zh: 在规划边界内稳定标识一个期望结果声明。
        en: Stably identifies one desired-outcome declaration within the planning boundary.
        ja: planning boundary 内の一つの desired-outcome declaration を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z][A-Za-z0-9._:-]*$'
      example_value: goal:release-2026-07
      source_claims: [claim-goal-local]
    - id: desired_outcome
      labels: {zh: 期望结果, en: Desired outcome, ja: desired outcome}
      definitions:
        zh: 描述要达成的状态，不断言任何一次运行已经达成该状态。
        en: States the outcome to achieve without asserting that any one run achieved it.
        ja: 達成すべき outcome を記述し、特定の run が達成済みだとは主張しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approve a signed production release
      source_claims: [claim-goal-plan]
    - id: scope_ref
      labels: {zh: 范围引用, en: Scope reference, ja: scope 参照}
      definitions:
        zh: 指向该结果适用的产品、环境或变更边界。
        en: Points to the product, environment, or change boundary to which the result applies.
        ja: 成果が適用される product、environment、または change boundary を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: release:2026-07
      source_claims: [claim-goal-local]
    - id: acceptance_criteria
      labels: {zh: 验收准则, en: Acceptance criteria, ja: acceptance criteria}
      definitions:
        zh: 评审者可据以判断期望结果是否满足的声明性条件集合。
        en: Declarative conditions by which a reviewer can judge whether the desired outcome is satisfied.
        ja: reviewer が desired outcome の充足を判断するための宣言的 condition の集合。
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: [artifact signature verifies, production smoke suite passes]
      source_claims: [claim-goal-local]
    - id: evidence_requirement
      labels: {zh: 证据要求, en: Evidence requirement, ja: evidence 要件}
      definitions:
        zh: 说明验收时应查阅何种证据，而不保存某次运行产出的证据本身。
        en: Names evidence to inspect at acceptance time without storing evidence produced by a particular run.
        ja: 受入時に確認する evidence を示すが、特定の run が生んだ evidence 自体は保存しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: signed artifact and smoke report
      source_claims: [claim-goal-local]
  constraints:
    - id: goal-criteria-remain-declarative
      severity: error
      language: plain
      expression: acceptance_criteria and evidence_requirement must describe conditions and required evidence, not a timestamp, observed score, runtime verdict, or tool response from one run.
      explanation:
        zh: 验收定义可以约束如何判定成功，却不能成为保存运行观测的容器。
        en: Acceptance definitions may constrain how success is judged but cannot become storage for runtime observations.
        ja: acceptance definition は成功判断を制約できるが、runtime observation の保存先にはならない。
      source_claims: [claim-goal-entity-boundary, claim-goal-local]
    - id: goal-must-have-reviewable-criterion
      severity: error
      language: plain
      expression: A Goal must name at least one acceptance criterion and one evidence requirement before a TaskPlan may pursue it.
      explanation:
        zh: 没有可核查准则的愿望无法为步骤选择提供可审计的目标依据。
        en: A wish without checkable criteria cannot provide an auditable target for choosing plan steps.
        ja: 検証可能な criterion のない願望は、plan step 選択の監査可能な目標根拠にならない。
      source_claims: [claim-goal-local]
  required_relations: []
examples:
  - id: goal-positive-signed-release
    labels:
      zh: Goal positive
      en: Goal positive
      ja: Goal positive
    descriptions:
      zh: Voyager (Wang et al., 2023) 对 Goal 实现自动课程→技能生成→技能库：curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill)；Minecraft 中持续积累可复用 JavaScript 技能。
      en: Voyager (Wang et al., 2023) for Goal: curriculum.propose_task() → skill = code_generation(task) → skill_library.add(skill); accumulates reusable JavaScript skills in Minecraft.
      ja: Voyager (Wang et al., 2023) Goal: propose_task→code_generation→skill_library.add；Minecraft 技能蓄積。
    field_values: {goal_id: goal:release-2026-07, desired_outcome: "approve a signed production release", scope_ref: release:2026-07, acceptance_criteria: [artifact signature verifies, evidence_requirement: "signed artifact and smoke report"}

    related_node_ids:
      - Goal
      - TaskPlan
    related_relation_ids:
      - TaskPlan-pursues-Goal
    source_claims:
      - claim-goal-plan
      - claim-goal-local

  - id: goal-counterexample-raw-request
    labels:
      zh: Goal counterexample
      en: Goal counterexample
      ja: Goal counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 Goal 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style Goal positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 Goal 正例にならない。
    field_values: {message_id: chat:119, content: "Fix the release failure now"}

    related_node_ids:
      - Goal
    related_relation_ids: []
    source_claims:
      - claim-goal-local

  - id: goal-boundary-observed-coverage
    labels:
      zh: Goal boundary
      en: Goal boundary
      ja: Goal boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 Goal 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not Goal work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で Goal work_specification ではない。
    field_values: {execution_id: test-run:21, observed_coverage: "65%"}

    related_node_ids:
      - Goal
      - Execution
    related_relation_ids: []
    source_claims:
      - claim-goal-entity-boundary

  - id: goal-instance-human-approval
    labels:
      zh: Goal instance
      en: Goal instance
      ja: Goal instance
    descriptions:
      zh: ReAct 实例：Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → 映射 Goal 可审计实例。
      en: ReAct instance: Thought: I need to search... → Action: Search["2023 GDP France"] → Observation: France GDP was... → maps to auditable Goal instance.
      ja: ReAct 实例 Thought→Action Search→Observation が Goal 監査实例に写像。
    field_values: {goal_id: goal:approve-data-export, desired_outcome: "approve the governed data export", scope_ref: export:customer-archive, acceptance_criteria: [compliance owner approves export], evidence_requirement: "signed approval record"}

    related_node_ids:
      - Goal
      - TaskPlan
    related_relation_ids:
      - TaskPlan-pursues-Goal
    source_claims:
      - claim-goal-local

sources:
  - id: prov-o-plan
    title: W3C PROV-O Plan
    url: https://www.w3.org/TR/prov-o/#Plan
    source_type: standard
    relevance: Defines a Plan as an Entity representing intended actions or steps toward goals.
  - id: prov-o-entity-activity
    title: W3C PROV-O Entity and Activity
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes Entities from time-bounded Activities and supports the declaration-versus-occurrence boundary.
  - id: openai-agents-agents
    title: OpenAI Agents SDK Agents
    url: https://openai.github.io/openai-agents-python/agents/
    source_type: official-doc
    relevance: Documents Agent instructions as static text or dynamic callbacks.
source_claims:
  - id: claim-goal-plan
    source: prov-o-plan
    supports: PROV-O defines Plan as an Entity representing intended actions or steps by agents to achieve goals.
    locator: PROV-O, section 3.2, prov:Plan
    evidence_kind: normative
    confidence: high
  - id: claim-goal-entity-boundary
    source: prov-o-entity-activity
    supports: PROV-O distinguishes an Entity with fixed aspects from a time-bounded Activity, supporting separation of a desired result from a run observation.
    locator: PROV-O, section 3.1, Entity and Activity
    evidence_kind: normative
    confidence: high
  - id: claim-goal-agent-projection
    source: openai-agents-agents
    supports: The Agents SDK supports static and dynamic Agent instructions, allowing an adapter to project a Goal into a planning prompt without making the prompt the Goal.
    locator: Agents, Basic configuration and Dynamic instructions
    evidence_kind: official
    confidence: high
  - id: claim-goal-local
    source: prov-o-plan
    supports: Goal fields and its boundary from TaskPlan, TaskStep, protocol state, and runtime evidence are Moonweave local modeling choices informed by Plan's intended-action semantics.
    locator: PROV-O, section 3.2, prov:Plan
    evidence_kind: design-inference
    confidence: high
