schema: moonweave.ai/ontology-node/v1
id: orchestration-task-planning
kind: module
labels:
  zh: 意向、目标与任务规划
  en: Intent, goals, and task planning
  ja: 意向・目標・タスク計画
semantics:
  short_definition:
    zh: 将“为什么做、要达到什么、怎样分解工作、何时可开始或已完成”组织成可复用的工作规约；A2A Task 仅在真实协议载荷中使用，内部 TaskPlan/TaskStep 不因形似而被命名为 A2A Task。
    en: Organizes why work exists, what must be achieved, how it is decomposed, and when it is ready or complete into reusable work specifications; A2A Task is used only in real protocol payloads—internal TaskPlan/TaskStep are not A2A Tasks by resemblance.
    ja: 作業の理由・達成目標・分解方法・開始/完了判定を再利用可能な作業仕様として整理します。A2A Task は実 protocol payload のみで使用し、内部 TaskPlan/TaskStep を A2A Task とみなしません。
  definition:
    zh: orchestration-task-planning 拥有三类正交规划对象：IntentionalEntity（Intent、Goal、Objective）说明期望状态；WorkSpecification（Task、TaskPlan、TaskStep、WorkItem）说明稳定工作单元及版本化分解；TaskCondition（TaskDependency、TaskConstraint、TaskCompletionCriterion）说明可判定规则。A2A Task 生命周期（submitted→working→input-required→completed/failed/canceled）属于协议载荷语义，内部计划步骤映射为 TaskStep 而非 A2A Task。Execution、RunAttempt 与 RunResult 是规约被实际执行后的发生与证据，归运行域所有。
    en: orchestration-task-planning owns three orthogonal planning families. IntentionalEntity (Intent, Goal, Objective) describes desired states; WorkSpecification (Task, TaskPlan, TaskStep, WorkItem) describes stable work units and versioned decomposition; TaskCondition (TaskDependency, TaskConstraint, TaskCompletionCriterion) describes decidable rules. A2A Task lifecycle (submitted→working→input-required→completed/failed/canceled) belongs to protocol payload semantics; internal plan steps map to TaskStep, not A2A Task. Execution, RunAttempt, and RunResult are occurrences and evidence when specifications are carried out and remain runtime-owned.
    ja: orchestration-task-planning は IntentionalEntity、WorkSpecification、TaskCondition の三族を所有します。A2A Task lifecycle は protocol payload 意味論に属し、内部 plan step は TaskStep に対応します。Execution、RunAttempt、RunResult は runtime 所有です。
  why_needed:
    zh: 让目标能够逐层展开、验证和分配，同时保证规划定义与运行事实分离，使每次执行都能追溯到确切的任务、计划版本、步骤和完成条件。
    en: Makes goals decomposable, testable, and allocatable while separating planning definitions from runtime facts so every execution traces to an exact task, plan revision, step, and completion condition.
    ja: 目標の段階的分解・検証・割当を可能にし、計画定義と実行事実を分離して各実行を正確な task/plan/step/完了条件へ追跡します。
  includes:
    - zh: Intent、Goal、Objective 意向层次与 Goal→TaskPlan 展开。
      en: Intent, Goal, Objective intention hierarchy and Goal-to-TaskPlan elaboration.
      ja: Intent/Goal/Objective 階層と Goal→TaskPlan 展開。
    - zh: Task、TaskPlan、TaskStep、WorkItem 分解与同层 DAG。
      en: Task, TaskPlan, TaskStep, WorkItem decomposition and same-level DAGs.
      ja: Task/TaskPlan/TaskStep/WorkItem 分解と同階層 DAG。
    - zh: TaskDependency、TaskConstraint、TaskCompletionCriterion 可执行字段与证据合同。
      en: Executable fields and evidence contracts for TaskDependency, TaskConstraint, and TaskCompletionCriterion.
      ja: TaskDependency/TaskConstraint/TaskCompletionCriterion の実行可能 field と証拠契約。
  excludes:
    - zh: Execution、RunAttempt、RunResult、路由循环决策、A2A Task 协议对象（除非真实 A2A 载荷）。
      en: Execution, RunAttempt, RunResult, routing loop decisions, and A2A Task protocol objects unless a real A2A payload exists.
      ja: Execution、RunAttempt、RunResult、routing loop decision、実 A2A payload 以外の A2A Task。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 实现时先发布 WorkSpecification 与 TaskCondition 版本，再在运行边界引用 plan_ref、step_ref 与 dependency closure；A2A Task JSON 仅在 SendMessage 返回 Task 时映射到 delegation-handoff 的 A2ATask，内部 TaskPlan 步骤通过 task_plan_id/task_step_id 本地标识，不借用 A2A taskId 字段名。
    en: Publish WorkSpecification and TaskCondition revisions first, then reference plan_ref, step_ref, and dependency closure at run boundaries; A2A Task JSON maps to delegation-handoff A2ATask only when SendMessage returns a Task—internal TaskPlan steps use local task_plan_id/task_step_id and do not borrow A2A taskId field names.
    ja: 先に WorkSpecification/TaskCondition を公開し、実行境界で plan_ref/step_ref/dependency closure を参照します。A2A Task JSON は SendMessage が Task を返す場合のみ delegation-handoff の A2ATask に対応します。
  typical_input:
    - description: Versioned TaskPlan with acyclic TaskDependency closure
      format: |-
        {"task_plan_id":"plan-release-12","version":"3","steps":[{"task_step_id":"build","depends_on":[]},{"task_step_id":"test","depends_on":["build"]}]}
    - description: Goal elaboration into allocatable WorkItems
      format: |-
        {"objective_id":"obj-ship-v2","task_plan_ref":"plan-release-12@3","work_items":[{"work_item_id":"wi-build","step_ref":"build"}]}
  typical_output:
    - description: Planning specification ready for runtime reference
      format: |-
        {"task_plan_id":"plan-release-12","version":"3","completion_criterion_ref":"criterion-all-green@v1","dependency_graph_digest":"sha256:..."}
  reference_implementations:
    - name: A2A Protocol Task lifecycle
      url: https://google.github.io/A2A/specification/
      description: Documents Task, TaskStatus, and TaskState lifecycle distinct from internal planning steps.
    - name: W3C PROV-O Plan
      url: https://www.w3.org/TR/prov-o/
      description: Separates Plan-like specifications from Activities and execution evidence.
  source_claims:
    - claim-orchestration-task-planning-module
    - claim-orchestration-task-planning-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识任务规划模块。
        en: Stably identifies the task planning module.
        ja: タスク計画モジュールを安定して識別します。
      allowed_values: [orchestration-task-planning]
      example_value: orchestration-task-planning
      source_claims: [claim-orchestration-task-planning-module]
    - id: intentional_roots
      labels:
        zh: 意向根概念
        en: intentional root concepts
        ja: 意向根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出描述期望状态的意向根。
        en: Lists intentional roots describing desired states.
        ja: 期待状態を記述する意向根を列挙します。
      example_value: '["IntentionalEntity","Intent","Goal","Objective"]'
      source_claims: [claim-orchestration-task-planning-module]
    - id: work_specification_roots
      labels:
        zh: 工作规约根概念
        en: work specification root concepts
        ja: 作業仕様根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出工作分解与分配规约根。
        en: Lists work decomposition and allocation specification roots.
        ja: 作業分解・割当仕様根を列挙します。
      example_value: '["WorkSpecification","Task","TaskPlan","TaskStep","WorkItem"]'
      source_claims: [claim-orchestration-task-planning-module]
  constraints:
    - id: orchestration-task-planning-acyclic-dependencies
      expression: TaskDependency projections within one TaskPlan revision must be verifiably acyclic and identify explicit predecessor and successor steps.
      explanation:
        zh: 规划依赖表达先决结构，不是运行时的动态重试或路由循环。
        en: Planning dependencies express prerequisite structure, not runtime dynamic retry or routing loops.
        ja: 計画依存は前提構造を表し、runtime の動的 retry/routing loop ではありません。
      source_claims: [claim-orchestration-task-planning-boundary]
  required_relations: []
examples:
  - id: orchestration-task-planning-example-positive-plan-version
    labels:
      zh: orchestration-task-planning positive
      en: orchestration-task-planning positive
      ja: orchestration-task-planning positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 orchestration-task-planning 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for orchestration-task-planning: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が orchestration-task-planning で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {module_id: orchestration-task-planning, task_plan_id: plan-release-12, version: 3, dependency_graph_digest: sha256:plan12v3}

    related_node_ids:
      - TaskPlan
      - TaskDependency
      - TaskStep
    related_relation_ids:
      - TaskPlan-contains-TaskStep
    source_claims:
      - claim-orchestration-task-planning-module

  - id: orchestration-task-planning-example-counterexample-a2a-task-as-step
    labels:
      zh: orchestration-task-planning counterexample
      en: orchestration-task-planning counterexample
      ja: orchestration-task-planning counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 orchestration-task-planning 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style orchestration-task-planning positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 orchestration-task-planning 正例にならない。
    field_values: {module_id: orchestration-task-planning, task_step_id: build, a2a_task_id: null}

    related_node_ids:
      - TaskStep
      - Task
    related_relation_ids: []
    source_claims:
      - claim-orchestration-task-planning-boundary

  - id: orchestration-task-planning-example-boundary-goal-taskplan
    labels:
      zh: orchestration-task-planning boundary
      en: orchestration-task-planning boundary
      ja: orchestration-task-planning boundary
    descriptions:
      zh: TaskWeaver CodeExecutor stdout 是运行时执行输出，不是 orchestration-task-planning 规范 expected_output；TaskStep 规约与执行 trace 应分离。
      en: TaskWeaver CodeExecutor stdout is runtime execution output, not orchestration-task-planning expected_output spec; separate TaskStep specification from execution trace.
      ja: TaskWeaver stdout は runtime で orchestration-task-planning expected_output spec ではない。
    field_values: {module_id: orchestration-task-planning, goal_id: ship-v2, task_plan_ref: "plan-release-12@3"}

    related_node_ids:
      - Goal
      - TaskPlan
      - Objective
    related_relation_ids:
      - Goal-elaborates-TaskPlan
    source_claims:
      - claim-orchestration-task-planning-module

  - id: orchestration-task-planning-example-instance-workitem-allocation
    labels:
      zh: orchestration-task-planning instance
      en: orchestration-task-planning instance
      ja: orchestration-task-planning instance
    descriptions:
      zh: Voyager 实例：curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → 映射 orchestration-task-planning。
      en: Voyager instance: curriculum.propose_task("mine iron") → code_generation → skill_library.add("mineIronOre") → maps to orchestration-task-planning.
      ja: Voyager 实例 propose_task→code_generation→add が orchestration-task-planning に写像。
    field_values: {module_id: orchestration-task-planning, work_item_id: wi-build, task_step_ref: "build@plan-release-12@3", completion_criterion_ref: "criterion-all-green@v1"}

    related_node_ids:
      - WorkItem
      - TaskStep
      - TaskCompletionCriterion
    related_relation_ids:
      - WorkItem-binds-TaskStep
    source_claims:
      - claim-orchestration-task-planning-module

sources:
  - id: a2a-protocol-task
    title: A2A Protocol Task lifecycle
    url: https://google.github.io/A2A/specification/
    source_type: standard
    relevance: Documents Task, TaskStatus, and TaskState lifecycle separate from internal planning.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Separates Plan-like specifications from Activities and execution evidence.
source_claims:
  - id: claim-orchestration-task-planning-module
    source: w3c-prov-o
    supports: PROV-O separates Plan-like work specifications from time-bounded execution activities and evidence.
    locator: PROV-O Plan, Activity, wasAssociatedWith
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-task-planning-boundary
    source: a2a-protocol-task
    supports: A2A Task lifecycle semantics apply only to protocol Task payloads and must not rename internal TaskPlan/TaskStep objects as A2A Tasks.
    locator: Task, TaskStatus, TaskState
    evidence_kind: design-inference
    confidence: high
