schema: moonweave.ai/ontology-node/v1
id: orchestration-task-planning
kind: module
status: accepted
labels:
  zh: 意向、目标与任务规划
  en: Intent, goals, and task planning
  ja: 意向・目標・タスク計画
semantics:
  short_definition:
    zh: 将“为什么做、要达到什么、怎样分解工作、何时算可开始或已完成”组织成可复用的工作规约。IntentionalEntity 表达尚待实现的意向与目标，WorkSpecification 表达 Task、版本化 TaskPlan、计划内 TaskStep 和可分配 WorkItem，TaskCondition 表达前置、约束、依赖与完成判据；实际运行只引用这些规约，不改变其身份。
    en: Organizes why work exists, what must be achieved, how it is decomposed, and when it is ready or complete into reusable work specifications. IntentionalEntity captures unrealized intent and goals, WorkSpecification captures Tasks, versioned TaskPlans, in-plan TaskSteps, and allocatable WorkItems, and TaskCondition captures prerequisites, constraints, dependencies, and completion criteria; runtime occurrences reference these specifications without changing their identity.
    ja: 「なぜ行うか、何を達成するか、作業をどう分解するか、いつ開始可能または完了と判定するか」を再利用可能な作業仕様として整理します。IntentionalEntity は未実現の意向と目標、WorkSpecification は Task・版管理 TaskPlan・計画内 TaskStep・割当可能な WorkItem、TaskCondition は前提・制約・依存・完了基準を表し、実行事象は仕様を参照するだけで同一性を変更しません。
  definition:
    zh: 本模块拥有三类彼此正交的规划对象：意向对象说明期望状态，工作规约说明实现该状态的稳定工作单元及版本化分解，任务条件说明对这些工作单元的可判定规则。TaskDependency 必须指明前驱与后继，计划内依赖投影必须保持同一计划版本并可验证为无环；Execution、RunAttempt 与 RunResult 是这些规约被实际执行后的发生与证据，归运行域所有。
    en: "This module owns three orthogonal planning object families: intentional entities describe desired states, work specifications describe stable work units and their versioned decomposition, and task conditions describe decidable rules over those units. A TaskDependency must identify predecessor and successor, and plan-local dependency projections must remain within one plan revision and be verifiably acyclic. Execution, RunAttempt, and RunResult are occurrences and evidence produced when these specifications are carried out and remain runtime-owned."
    ja: 本モジュールは三つの直交する計画対象を所有します。意向対象は期待状態、作業仕様はそれを実現する安定作業単位と版管理された分解、タスク条件は作業単位に適用する判定可能な規則を表します。TaskDependency は前駆と後続を明示し、計画内依存投影は同一計画版に閉じて非循環であることを検証できなければなりません。Execution・RunAttempt・RunResult は仕様を実行した発生と証拠であり、実行域が所有します。
  why_needed:
    zh: 让目标能够被逐层展开、验证和分配，同时保证规划定义与运行事实分离，使每次执行都能追溯到确切的任务、计划版本、步骤和完成条件。
    en: Makes goals decomposable, testable, and allocatable while separating planning definitions from runtime facts, so every execution can be traced to an exact task, plan revision, step, and completion condition.
    ja: 目標を段階的に分解・検証・割当できるようにし、計画定義と実行事実を分離して、各実行を正確なタスク・計画版・ステップ・完了条件へ追跡可能にします。
  includes:
    - zh: Intent、Goal 与 Objective 的意向层次，以及 Goal 到 TaskPlan 的展开。
      en: The Intent, Goal, and Objective intention hierarchy and Goal-to-TaskPlan elaboration.
      ja: Intent・Goal・Objective の意向階層と Goal から TaskPlan への展開。
    - zh: TaskCondition、TaskConstraint、TaskDependency 与 TaskCompletionCriterion 的可执行字段、证据合同和应用阶段。
      en: Executable fields, evidence contracts, and application phases for TaskCondition, TaskConstraint, TaskDependency, and TaskCompletionCriterion.
      ja: TaskCondition・TaskConstraint・TaskDependency・TaskCompletionCriterion の実行可能項目・証拠契約・適用段階。
    - zh: Task、TaskPlan、TaskStep 与 WorkItem 的分解、同层 DAG、精确分配和 Execution 映射。
      en: Decomposition, same-level DAGs, exact allocation, and Execution mapping for Task, TaskPlan, TaskStep, and WorkItem.
      ja: Task・TaskPlan・TaskStep・WorkItem の分解・同階層 DAG・正確な割当・Execution 対応。
  excludes:
    - zh: Execution、RunAttempt、RunResult、RunOutcome、运行状态、实际产物和重试谱系；这些属于运行时与结果本体。
      en: Execution, RunAttempt, RunResult, RunOutcome, runtime state, actual artifacts, and retry lineage; these belong to runtime and outcome ontologies.
      ja: Execution・RunAttempt・RunResult・RunOutcome・実行状態・実成果物・再試行系譜は実行時と結果オントロジーに属します。
    - zh: Route、Gate、Retry 与 Stop 的动态循环、分支和恢复决策；规划依赖只表达无环先决结构。
      en: Dynamic loops, branches, and recovery decisions of Route, Gate, Retry, and Stop; planning dependencies express only acyclic prerequisite structure.
      ja: Route・Gate・Retry・Stop の動的ループ・分岐・回復判断は除外し、計画依存は非循環前提構造だけを表します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 让目标能够被逐层展开、验证和分配，同时保证规划定义与运行事实分离，使每次执行都能追溯到确切的任务、计划版本、步骤和完成条件。
  en: Makes goals decomposable, testable, and allocatable while separating planning definitions from runtime facts, so every execution can be traced to an exact task, plan revision, step, and completion condition.
  ja: 目標を段階的に分解・検証・割当できるようにし、計画定義と実行事実を分離して、各実行を正確なタスク・計画版・ステップ・完了条件へ追跡可能にします。
structure: null
examples:
  - id: orchestration-task-planning-cq-goal-realization-v3-example-positive
    kind: positive
    labels:
      zh: 某个 Goal 由哪份工作规约定义，并由哪些 TaskPlan、Task 和 TaskStep 逐层实现？：正例
      en: "Which work specification defines a Goal, and which TaskPlan, Task, and TaskStep values realize it by decomposition?: positive case"
      ja: ある Goal はどの作業仕様で定義され、どの TaskPlan、Task、TaskStep によって段階的に実現されますか。：正例
    scenario_id: null
    descriptions:
      zh: Goal goal-release-2026 由 TaskPlan plan-release-7@4 展开；该计划规定 Task task-publish-schema@2，Task 又分解为 step-validate-31 与 step-deploy-32，且两个 TaskStep 都由同一计划版本 contains_step。
      en: Goal goal-release-2026 is elaborated by TaskPlan plan-release-7@4; the plan specifies Task task-publish-schema@2, the Task decomposes into step-validate-31 and step-deploy-32, and both TaskSteps are contained by the same plan version.
      ja: Goal goal-release-2026 は TaskPlan plan-release-7@4 で展開され、その plan は Task task-publish-schema@2 を規定します。Task は step-validate-31 と step-deploy-32 に分解され、両 TaskStep は同じ plan 版に含まれます。
    field_values:
      goal_id: goal-release-2026
      task_plan_ref: plan-release-7
      task_plan_version: 4
      task_id: task-publish-schema
      task_version: 2
      task_step_ids:
        - step-validate-31
        - step-deploy-32
      task_step_positions:
        - 1
        - 2
      all_steps_in_plan_version: true
    related_node_ids:
      - Goal
      - TaskPlan
      - Task
      - TaskStep
    related_relation_ids:
      - Goal-elaborated_by-TaskPlan
      - TaskPlan-specifies-Task
      - Task-decomposes_into-TaskStep
      - TaskPlan-contains_step-TaskStep
    expected_result:
      zh: 返回 plan-release-7@4、task-publish-schema@2 及两个有序步骤；四类对象通过展开、规定、分解和包含关系连接，不互相冒充子类。
      en: Return plan-release-7@4, task-publish-schema@2, and both ordered steps; connect the four object kinds through elaboration, specification, decomposition, and containment rather than subtype claims.
      ja: plan-release-7@4、task-publish-schema@2、二つの順序付き step を返し、四種類を展開・規定・分解・包含で結び、相互の subtype とはしません。
    why_valid_or_invalid:
      zh: Goal、计划版本、稳定任务与计划内步骤都有独立标识；Task-decomposes_into-TaskStep 和 TaskPlan-contains_step-TaskStep 同时证明语义分解与版本归属。
      en: Goal, plan version, stable Task, and in-plan steps have separate identities; decomposes_into proves semantic breakdown while contains_step proves version membership.
      ja: Goal・plan 版・安定 Task・plan 内 step は別識別を持ち、decomposes_into が意味分解、contains_step が版所属を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-task-planning-003
      - claim-orchestration-task-planning-004
  - id: orchestration-task-planning-cq-goal-realization-v3-example-counter
    kind: counterexample
    labels:
      zh: 某个 Goal 由哪份工作规约定义，并由哪些 TaskPlan、Task 和 TaskStep 逐层实现？：反例
      en: "Which work specification defines a Goal, and which TaskPlan, Task, and TaskStep values realize it by decomposition?: counterexample"
      ja: ある Goal はどの作業仕様で定義され、どの TaskPlan、Task、TaskStep によって段階的に実現されますか。：反例
    scenario_id: null
    descriptions:
      zh: goal-release-2026 与 task-publish-schema@2 名称相近，step-validate-31 也标有 position=1，但记录没有 Goal-elaborated_by-TaskPlan、TaskPlan-specifies-Task 或 TaskPlan-contains_step-TaskStep，且步骤声明属于旧版 plan-release-7@3。
      en: goal-release-2026 and task-publish-schema@2 have similar names and step-validate-31 has position=1, but the record lacks Goal-elaborated_by-TaskPlan, TaskPlan-specifies-Task, and TaskPlan-contains_step-TaskStep, while the step declares membership in obsolete plan-release-7@3.
      ja: goal-release-2026 と task-publish-schema@2 は名称が似ており step-validate-31 に position=1 もありますが、三つの必要 relation がなく、step は旧版 plan-release-7@3 所属を宣言しています。
    field_values:
      goal_id: goal-release-2026
      candidate_task_plan_id: plan-release-7
      candidate_task_plan_version: 4
      task_id: task-publish-schema
      task_step_ref: step-validate-31
      task_step_position: 1
      declared_step_plan_version: 3
      missing_relation_ids:
        - Goal-elaborated_by-TaskPlan
        - TaskPlan-specifies-Task
        - TaskPlan-contains_step-TaskStep
    related_node_ids:
      - Goal
      - TaskPlan
      - Task
      - TaskStep
    related_relation_ids:
      - Goal-elaborated_by-TaskPlan
      - TaskPlan-specifies-Task
      - TaskPlan-contains_step-TaskStep
    expected_result:
      zh: 不得返回 plan-release-7@4 的完整实现链；应报告三条关系缺失和 TaskStep 版本归属不一致。
      en: Do not return a complete realization chain for plan-release-7@4; report the three missing relations and the TaskStep plan-version mismatch.
      ja: plan-release-7@4 の完全な実現 chain を返さず、三 relation の欠落と TaskStep の plan 版不一致を報告します。
    why_valid_or_invalid:
      zh: 名称相似与步骤序号不能证明展开、规定或包含事实；旧版所属还直接反驳“同一计划版本”条件。
      en: Name similarity and position cannot prove elaboration, specification, or containment, and obsolete-version membership contradicts the same-plan condition.
      ja: 名称類似と position は展開・規定・包含を証明せず、旧版所属は same-plan 条件を直接否定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-task-planning-005
      - claim-orchestration-task-planning-006
  - id: orchestration-task-planning-cq-readiness-v3-example-positive
    kind: positive
    labels:
      zh: 任务就绪与完成判定分离：正例
      en: "Separate task readiness from completion adjudication: positive case"
      ja: task readiness と completion 判定の分離：正例
    scenario_id: null
    descriptions:
      zh: Task task-index-18 的 TaskDependency dep-index-18 明确以 task-ingest-17 为 predecessor，manifest-17 的摘要满足 required_evidence_contract，安全扫描 TaskConstraint 也通过；完成判据 criterion-index-18 只由 eval-index-18 通过 EvaluationRun-uses-TaskCompletionCriterion 引用。
      en: Task task-index-18 has TaskDependency dep-index-18 with task-ingest-17 as predecessor; manifest-17 satisfies the required evidence contract and its security-scan TaskConstraint passes. Completion criterion criterion-index-18 is referenced only later by eval-index-18 through EvaluationRun-uses-TaskCompletionCriterion.
      ja: Task task-index-18 の TaskDependency dep-index-18 は task-ingest-17 を predecessor とし、manifest-17 が required evidence contract を満たし security-scan TaskConstraint も通過します。completion criterion criterion-index-18 は後段の eval-index-18 が EvaluationRun-uses-TaskCompletionCriterion で参照します。
    field_values:
      dependent_task_id: task-index-18
      predecessor_task_id: task-ingest-17
      task_dependency_ref: dep-index-18
      required_evidence_contract: artifact-manifest/v2
      observed_evidence_id: manifest-17
      dependency_satisfaction: true
      task_constraint_ref: constraint-security-scan-18
      constraint_evaluation: passed
      completion_criterion_ref: criterion-index-18
      evaluation_run_id: eval-index-18
      ready_to_start: true
    related_node_ids:
      - Task
      - TaskDependency
      - TaskConstraint
      - TaskCompletionCriterion
      - EvaluationRun
    related_relation_ids:
      - TaskDependency-has_predecessor-Task
      - TaskDependency-has_dependent-Task
      - Task-depends_on-Task
      - Task-constrained_by-TaskConstraint
      - Task-has_completion_criterion-TaskCompletionCriterion
      - EvaluationRun-uses-TaskCompletionCriterion
    expected_result:
      zh: 判定 task-index-18 可开始，同时把 criterion-index-18 单独返回为 eval-index-18 的后续完成判据，不把它当作启动条件。
      en: Mark task-index-18 ready and return criterion-index-18 separately as a later completion criterion used by eval-index-18, never as a start condition.
      ja: task-index-18 を ready とし、criterion-index-18 は eval-index-18 が後段で使う completion criterion として別返却し、開始条件にはしません。
    why_valid_or_invalid:
      zh: 就绪结论来自 predecessor、依赖证据与启动约束；唯一跨 owner 证据绑定连接 EvaluationRun 与 TaskCompletionCriterion，未把评估内部的 RunOutcome 关系伪装成本模块证据。
      en: Readiness comes from predecessor, dependency evidence, and start constraint; the sole cross-owner binding connects EvaluationRun to TaskCompletionCriterion without presenting evaluation-internal RunOutcome facts as planning evidence.
      ja: readiness は predecessor・dependency evidence・開始 constraint に基づき、唯一の cross-owner binding は EvaluationRun と TaskCompletionCriterion を結び、評価内部 RunOutcome 事実を planning 証拠に偽装しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-task-planning-007
  - id: orchestration-task-planning-cq-readiness-v3-example-counter
    kind: counterexample
    labels:
      zh: 任务就绪与完成判定分离：反例
      en: "Separate task readiness from completion adjudication: counterexample"
      ja: task readiness と completion 判定の分離：反例
    scenario_id: null
    descriptions:
      zh: task-index-19 的 predecessor task-ingest-19 已标记 completed，但 required artifact-manifest/v2 不存在，security-scan 约束也返回 failed；即使 eval-index-19 已引用完成判据 criterion-index-19，也不能据此宣布任务可开始。
      en: The predecessor task-ingest-19 is marked completed, but task-index-19 lacks the required artifact-manifest/v2 and its security-scan constraint failed. Even though eval-index-19 references completion criterion criterion-index-19, that does not make the task ready.
      ja: predecessor task-ingest-19 は completed ですが、task-index-19 に必須 artifact-manifest/v2 がなく security-scan constraint も failed です。eval-index-19 が criterion-index-19 を参照していても task を ready にはできません。
    field_values:
      dependent_task_id: task-index-19
      predecessor_task_id: task-ingest-19
      task_dependency_ref: dep-index-19
      required_evidence_contract: artifact-manifest/v2
      observed_evidence_id: null
      dependency_satisfaction: false
      task_constraint_ref: constraint-security-scan-19
      constraint_evaluation: failed
      completion_criterion_ref: criterion-index-19
      evaluation_run_id: eval-index-19
      ready_to_start: false
    related_node_ids:
      - Task
      - TaskDependency
      - TaskConstraint
      - TaskCompletionCriterion
      - EvaluationRun
    related_relation_ids:
      - TaskDependency-has_predecessor-Task
      - TaskDependency-has_dependent-Task
      - Task-depends_on-Task
      - Task-constrained_by-TaskConstraint
      - Task-has_completion_criterion-TaskCompletionCriterion
      - EvaluationRun-uses-TaskCompletionCriterion
    expected_result:
      zh: 判定 task-index-19 不可开始，分别报告依赖证据缺失与启动约束失败；保留 criterion-index-19 作为后续完成判据而不用于覆盖失败。
      en: Mark task-index-19 not ready, report missing dependency evidence and a failed start constraint separately, and keep criterion-index-19 only for later completion adjudication.
      ja: task-index-19 を not ready とし、dependency evidence 欠落と開始 constraint 失敗を別報告し、criterion-index-19 は後段 completion 判定専用に保ちます。
    why_valid_or_invalid:
      zh: predecessor 状态只是依赖证据的一部分，且完成判据不属于启动条件；用评估引用替代缺失 manifest 会混淆两个不同阶段。
      en: Predecessor status is only part of dependency evidence and a completion criterion is not a start condition; using the evaluation reference to replace the missing manifest conflates two stages.
      ja: predecessor 状態は dependency evidence の一部にすぎず completion criterion は開始条件ではないため、評価参照で欠落 manifest を代替すると段階を混同します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-task-planning-008
  - id: orchestration-task-planning-cq-definition-versus-attempt-v3-example-positive
    kind: positive
    labels:
      zh: 任务、分配、执行与尝试四层分离：正例
      en: "Separate Task, allocation, Execution, and attempt: positive case"
      ja: Task・割当・Execution・attempt の四層分離：正例
    scenario_id: null
    descriptions:
      zh: WorkItem wi-review-42@3 把可复用 Task task-review-schema@2 分配给 arb-reviewer-9；Execution exec-review-42-1 同时 realizes 该 Task 并 carries_out 该 WorkItem，且只包含 RunAttempt attempt-review-42-1。
      en: WorkItem wi-review-42@3 allocates reusable Task task-review-schema@2 to arb-reviewer-9; Execution exec-review-42-1 both realizes that Task and carries out that WorkItem, and it contains only RunAttempt attempt-review-42-1.
      ja: WorkItem wi-review-42@3 は reusable Task task-review-schema@2 を arb-reviewer-9 へ割り当てます。Execution exec-review-42-1 はその Task を realizes し WorkItem を carries_out し、RunAttempt attempt-review-42-1 だけを含みます。
    field_values:
