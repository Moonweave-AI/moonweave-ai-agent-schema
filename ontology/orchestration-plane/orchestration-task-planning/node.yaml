  key_notion:
    zh: 可执行工作规约
    en: executable work specification
    ja: 実行可能な作業仕様
  owns_when:
    zh: 当对象说明尚待实现的意向或目标、稳定任务定义、某个计划版本内的分解与分配，或任务的前置、约束、依赖和完成判据时，由本模块拥有。
    en: Own an object when it specifies an unrealized intent or goal, a stable task definition, decomposition or allocation within a particular plan revision, or a task prerequisite, constraint, dependency, or completion criterion.
    ja: 対象が未実現の意向・目標、安定したタスク定義、特定計画版内の分解・割当、またはタスクの前提・制約・依存・完了基準を示す場合に所有します。
  references_when:
    zh: 执行、路由、委派或评估只在需要说明“正在实现哪个目标、执行哪个工作项、依据哪个计划版本和条件”时引用本模块；开始时间、状态、尝试、结果和实际产物仍写入各自运行或反馈节点。
    en: Execution, routing, delegation, and evaluation reference this module only to identify which goal is being realized, which work item is being carried out, and which plan revision and conditions govern it; start time, state, attempts, results, and actual artifacts remain on their runtime or feedback nodes.
    ja: 実行・経路制御・委任・評価は「どの目標を実現し、どの WorkItem を実行し、どの計画版と条件に従うか」を示す場合だけ本モジュールを参照します。開始時刻・状態・試行・結果・実成果物は各実行またはフィードバックノードに保持します。
  boundary_decisions:
    - other_module_id: runtime-execution-attempts
      subject_concept_ids:
        - Task
        - WorkItem
      decision: owns
      owner_module_id: orchestration-task-planning
