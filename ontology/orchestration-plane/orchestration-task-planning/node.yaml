      task_version: 2
      work_item_ref: wi-review-42
      work_item_version: 3
      assignee_binding_id: arb-reviewer-9
      execution_id: exec-review-42-1
      run_attempt_id: attempt-review-42-1
      attempt_number: 1
      execution_started_at: 2026-07-16T14:00:00Z
      attempt_started_at: 2026-07-16T14:00:04Z
    related_node_ids:
      - Task
      - WorkItem
      - ActorRoleBinding
      - Execution
      - RunAttempt
    related_relation_ids:
      - WorkItem-allocates-Task
      - WorkItem-assigned_to-ActorRoleBinding
      - Execution-realizes-Task
      - Execution-carries_out-WorkItem
      - Execution-has_attempt-RunAttempt
    expected_result:
      zh: 返回四个独立身份及五条有向事实：Task 可跨分配复用，WorkItem 固定一次任务—角色分配，Execution 是发生，RunAttempt 是该发生内的有界尝试。
      en: "Return four distinct identities and five directed facts: Task is reusable, WorkItem fixes one task-to-role allocation, Execution is the occurrence, and RunAttempt is a bounded effort within it."
      ja: 四つの別 identity と五つの有向 fact を返し、Task は再利用、WorkItem は一 task-to-role 割当、Execution は occurrence、RunAttempt は内部の有界試行とします。
