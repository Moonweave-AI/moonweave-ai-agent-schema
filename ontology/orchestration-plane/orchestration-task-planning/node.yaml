        en: If the condition changes with task_id, task_version, and desired business delivery, it belongs to task planning. If identity is determined by evaluator, metric, rubric, threshold, dataset/run input, or score/result, it belongs to feedback evaluation. An EvaluationRun reference to a completion condition does not make them identical.
        ja: 条件が task_id・task_version・期待する業務納品とともに変わるなら task planning に属します。evaluator・metric・rubric・threshold・dataset/run input・score/result で識別されるなら feedback evaluation に属します。EvaluationRun から完了条件への参照で両者が同一になることはありません。
