schema: moonweave.ai/ontology-node/v1
id: orchestration-task-planning
kind: module
labels:
  zh: 意向、目标与任务规划
  en: Intent, goals, and task planning
  ja: 意向・目標・タスク計画
semantics:
  short_definition:
    zh: 任务规划描述“为什么做、做什么、怎样分解、何时算完成”的可复用工作规约。
    en: Task planning describes reusable work specifications for why, what, how to decompose, and when work is complete.
    ja: タスク計画は、なぜ・何を・どう分解し・いつ完了とみなすかの再利用可能な作業仕様を表します。
  definition:
    zh: 本模块拥有三类正交对象：IntentionalEntity（Intent、Goal、Objective）表达期望状态；WorkSpecification（Task、TaskPlan、TaskStep、WorkItem）表达版本化工作分解；TaskCondition（TaskDependency、TaskConstraint、TaskCompletionCriterion）表达可判定规则。TaskDependency 必须指明前驱与后继且在同一 TaskPlan 版本内可验证为无环。Execution、RunAttempt 与 RunResult 是规约被实际执行后的发生与证据，归运行域所有；规划对象不因被引用而改变身份。
    en: "This module owns three orthogonal families: IntentionalEntity (Intent, Goal, Objective) for desired states; WorkSpecification (Task, TaskPlan, TaskStep, WorkItem) for versioned decomposition; and TaskCondition (TaskDependency, TaskConstraint, TaskCompletionCriterion) for decidable rules. TaskDependency must identify predecessor and successor and be verifiably acyclic within one TaskPlan revision. Execution, RunAttempt, and RunResult are occurrences and evidence when specifications are carried out and remain runtime-owned; planning objects do not change identity when referenced."
    ja: 本モジュールは IntentionalEntity（Intent・Goal・Objective）、WorkSpecification（Task・TaskPlan・TaskStep・WorkItem）、TaskCondition（TaskDependency・TaskConstraint・TaskCompletionCriterion）の三直交族を所有します。TaskDependency は前駆・後続を明示し同一 TaskPlan 版内で非循環と検証可能でなければなりません。Execution・RunAttempt・RunResult は仕様実行の発生・証拠であり runtime 所有です。計画対象は参照されても identity を変えません。
  why_needed:
    zh: 没有版本化的任务计划，团队无法回答“这次运行针对哪个目标、哪版计划、哪一步、凭什么判定完成”，也容易把 LLM 草稿误当成正式规约。
    en: Without versioned task plans, teams cannot answer which goal, plan revision, step, and completion criterion a run targeted, and LLM drafts get misreported as formal specifications.
    ja: 版管理された task plan がなければ、どの goal・plan 版・step・完了基準を対象にした実行か答えられず、LLM 草稿が正式仕様と誤報されます。
  includes:
    - zh: 意向层次 Intent→Goal→Objective 及 Goal 到 TaskPlan 的 elaborated_by 展开链。
      en: Intent→Goal→Objective intention hierarchy and Goal-to-TaskPlan elaborated_by elaboration chains.
      ja: Intent→Goal→Objective 意向階層と Goal から TaskPlan への elaborated_by 展開連鎖。
    - zh: Task、TaskPlan、TaskStep、WorkItem 的分解、同层 DAG、精确分配与对 Execution 的引用映射。
      en: Decomposition, same-level DAGs, exact allocation, and Execution reference mapping for Task, TaskPlan, TaskStep, and WorkItem.
      ja: Task・TaskPlan・TaskStep・WorkItem の分解・同階層 DAG・正確割当・Execution 参照対応。
    - zh: TaskDependency、TaskConstraint、TaskCompletionCriterion 的可执行字段、证据合同与应用阶段。
      en: Executable fields, evidence contracts, and application phases for TaskDependency, TaskConstraint, and TaskCompletionCriterion.
      ja: TaskDependency・TaskConstraint・TaskCompletionCriterion の実行可能項目・証拠契約・適用段階。
  excludes:
    - zh: "Execution、RunAttempt、RunResult、运行状态与实际产物（owner: runtime-plane）；规划只被引用。"
      en: "Execution, RunAttempt, RunResult, runtime state, and actual artifacts (owner: runtime-plane); planning is referenced only."
      ja: "Execution・RunAttempt・RunResult・実行状態・実成果物（owner: runtime-plane）。計画は参照のみです。"
    - zh: "Route、Gate、Retry 的动态分支与恢复（owner: orchestration-routing-control）；TaskDependency 只表达无环先决结构。"
      en: "Dynamic branches and recovery of Route, Gate, and Retry (owner: orchestration-routing-control); TaskDependency expresses acyclic prerequisite structure only."
      ja: "Route・Gate・Retry の動的分岐・回復（owner: orchestration-routing-control）。TaskDependency は非循環前提構造のみです。"
    - zh: "OrchestrationTopology 与组合结构（owner: orchestration-composition）；TaskPlan 通过 has_control_topology 引用控制拓扑，不拥有拓扑部件。"
      en: "OrchestrationTopology and composition structure (owner: orchestration-composition); TaskPlan references control topology via has_control_topology without owning topology parts."
      ja: "OrchestrationTopology と構成構造（owner: orchestration-composition）。TaskPlan は has_control_topology で control topology を参照し topology part を所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI plan mode（o1/o1-pro 的 extended reasoning 产出分步计划）、Cursor plan 文件（.cursor/plans 或 plan mode 生成的结构化步骤）、LangGraph 子图作为 subtask（compiled subgraph 或 add_node 嵌套图）、以及 ReAct 循环（Thought→Action→Observation 驱动下一步）。plan 文件与 TaskPlan 是规范；一次 subgraph invoke、ReAct step 或 plan-mode 输出被冻结为 plan-release@N 才是可审计版本。ReAct 的 Observation 提供步骤就绪证据，但不替代 TaskCompletionCriterion 的正式判定。
    en: "Integrations should map OpenAI plan mode (o1/o1-pro extended reasoning producing step plans), Cursor plan files (.cursor/plans or plan-mode structured steps), LangGraph subgraphs as subtasks (compiled subgraph or nested add_node graphs), and ReAct loops (Thought→Action→Observation driving the next step) separately. Plan files and TaskPlan are specifications; one subgraph invoke, ReAct step, or frozen plan-mode output at plan-release@N is an auditable revision. ReAct Observation supplies step-readiness evidence but does not replace formal TaskCompletionCriterion adjudication."
    ja: 統合では OpenAI plan mode（o1/o1-pro extended reasoning による段階 plan）、Cursor plan ファイル、LangGraph サブグラフ subtask、ReAct ループ（Thought→Action→Observation）を個別に写像します。plan ファイルと TaskPlan は仕様、subgraph invoke・ReAct step・plan-mode 出力を plan-release@N に固定した版が監査可能 revision です。ReAct Observation は step readiness 証拠を提供しますが TaskCompletionCriterion の正式判定を代替しません。
  typical_input:
    - description: OpenAI o1-pro plan mode producing a structured multi-step plan before execution.
      format: |
        # OpenAI Responses API with reasoning model in plan-first workflow
        response = client.responses.create(
            model="o1-pro",
            input="Decompose release checklist for schema v2 migration",
            reasoning={"effort": "high"},
        )
        # Output: numbered steps with dependencies → map to TaskPlan + TaskStep
      source_claims: [claim-orchestration-task-planning-openai]
    - description: Cursor plan file with ordered steps and acceptance criteria.
      format: |
        # .cursor/plans/release-schema-v2.plan.md
        ---
        goal: Publish schema v2.0.0
        steps:
          - id: validate-ontology
            depends_on: []
          - id: update-examples
            depends_on: [validate-ontology]
        completion: all steps pass CI
        ---
      source_claims: [claim-orchestration-task-planning-cursor]
    - description: LangGraph compiled subgraph invoked as a subtask from a parent graph node.
      format: |
        from langgraph.graph import StateGraph

        sub_builder = StateGraph(SubState)
        sub_builder.add_node("validate", validate_node)
        sub_builder.add_edge(START, "validate")
        sub_builder.add_edge("validate", END)
        sub_graph = sub_builder.compile()

        def run_subtask(state):
            result = sub_graph.invoke({"input": state["payload"]})
            return {"subtask_result": result}

        parent_builder.add_node("run_validation_subtask", run_subtask)
      source_claims: [claim-orchestration-task-planning-langgraph]
    - description: ReAct loop step producing Thought, Action, and Observation for next planning decision.
      format: |
        # ReAct trace (Yao et al. 2022)
        Thought: I need to verify the ontology YAML parses before editing examples.
        Action: run_validator[path=ontology/orchestration-plane/node.yaml]
        Observation: Validation passed with 0 errors.
        Thought: Step validate-ontology is complete; proceed to update-examples.
      source_claims: [claim-orchestration-task-planning-react]
  typical_output:
    - description: Moonweave-local TaskPlan projection with frozen revision, steps, and completion criterion references.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "goal_ref": "goal-release-2026",
          "task_plan_ref": "plan-release-7@4",
          "task_step_refs": ["step-validate-31", "step-deploy-32"],
          "task_dependency_refs": ["dep-index-18"],
          "completion_criterion_ref": "criterion-index-18@2"
        }
      source_claims: [claim-orchestration-task-planning-design]
  reference_implementations:
    - name: OpenAI
      url: https://platform.openai.com/docs/guides/reasoning
      description: o1/o1-pro extended reasoning and plan-first workflows.
    - name: Cursor
      url: https://docs.cursor.com/agent/plan
      description: Plan mode and structured plan files for multi-step work decomposition.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Subgraphs, nested StateGraph nodes as executable subtasks.
    - name: ReAct paper
      url: https://arxiv.org/abs/2210.03629
      description: Thought→Action→Observation loop informing step readiness and replanning.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 任务规划模块的稳定标识，不是某个 TaskPlan 或 TaskStep 的标识。
        en: Stable identifier of the task-planning module, not a TaskPlan or TaskStep identifier.
        ja: タスク計画モジュールの安定識別子であり、TaskPlan や TaskStep の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-task-planning$'
      example_value: orchestration-task-planning
      allowed_values: []
      source_claims: [claim-orchestration-task-planning-design]
    - id: planning_runtime_boundary
      labels: {zh: 规划/运行边界, en: Planning/runtime boundary, ja: 計画／実行境界}
      definitions:
        zh: 声明 TaskPlan/TaskStep/TaskCompletionCriterion 为可复用规范，Execution/RunAttempt 为运行发生事实。
        en: States that TaskPlan, TaskStep, and TaskCompletionCriterion are reusable specifications while Execution and RunAttempt are runtime occurrences.
        ja: TaskPlan・TaskStep・TaskCompletionCriterion は再利用仕様、Execution・RunAttempt は runtime 発生事実であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: spec-vs-execution
      allowed_values: [spec-vs-execution]
      source_claims: [claim-orchestration-task-planning-design]
  constraints:
    - id: goal-realization-requires-elaboration-chain
      severity: error
      expression_language: plain
      expression: Goal-to-TaskPlan realization must traverse Goal-elaborated_by-TaskPlan, TaskPlan-specifies-Task, and TaskPlan-contains_step-TaskStep; name similarity alone is insufficient.
      explanation:
        zh: 名称相近不能证明目标已被计划展开。
        en: Similar names do not prove a goal was elaborated by a plan.
        ja: 名称の類似だけでは goal が plan により展開されたとは証明できません。
      source_claims: [claim-orchestration-task-planning-design]
    - id: task-dependency-acyclic-in-plan-version
      severity: error
      expression_language: plain
      expression: TaskDependency predecessor and successor must belong to the same TaskPlan revision and the dependency graph must be verifiably acyclic.
      explanation:
        zh: 跨版本或含环依赖会破坏就绪判定。
        en: Cross-revision or cyclic dependencies corrupt readiness adjudication.
        ja: 版を跨ぐまたは循環する依存は readiness 判定を壊します。
      source_claims: [claim-orchestration-task-planning-design]
    - id: readiness-separate-from-completion
      severity: warning
      expression_language: plain
      expression: TaskDependency and TaskConstraint evidence adjudicate readiness; TaskCompletionCriterion is referenced only by EvaluationRun or equivalent completion adjudication, not by prerequisite checks alone.
      explanation:
        zh: “可以开始”与“已经完成”是不同判定阶段。
        en: Ready to start and completed are different adjudication phases.
        ja: 開始可能と完了済みは異なる判定段階です。
      source_claims: [claim-orchestration-task-planning-design]
  required_relations:
    - id: planning-module-organizes-work-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: WorkSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 WorkSpecification 分解链（TaskPlan→Task→TaskStep）。
        en: The module organizes at least one WorkSpecification decomposition chain (TaskPlan→Task→TaskStep).
        ja: モジュールは少なくとも一つの WorkSpecification 分解連鎖（TaskPlan→Task→TaskStep）を組織します。
      source_claims: [claim-orchestration-task-planning-design]
    - id: planning-module-organizes-intentional-entity
      direction: outgoing
      predicate: organizes
      target_concept_id: IntentionalEntity
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 IntentionalEntity 意向链（Intent→Goal）。
        en: The module organizes at least one IntentionalEntity intention chain (Intent→Goal).
        ja: モジュールは少なくとも一つの IntentionalEntity 意向連鎖（Intent→Goal）を組織します。
      source_claims: [claim-orchestration-task-planning-design]
examples:
  - id: orchestration-task-planning-example-openai-plan-mode
    labels:
      zh: OpenAI o1-pro plan mode 产出 TaskPlan
      en: OpenAI o1-pro plan mode producing TaskPlan
      ja: OpenAI o1-pro plan mode が TaskPlan を生成
    descriptions:
      zh: o1-pro 对 goal-release-2026 产出四步推理计划并冻结为 plan-release-7@4；TaskPlan 通过 specifies 指向 task-publish-schema@2，两步 TaskStep 由同一计划版本 contains_step，Goal-elaborated_by-TaskPlan 链完整。
      en: o1-pro produces a four-step reasoning plan for goal-release-2026 frozen as plan-release-7@4; TaskPlan specifies task-publish-schema@2, two TaskSteps are contained by the same plan revision, and the Goal-elaborated_by-TaskPlan chain is complete.
      ja: o1-pro が goal-release-2026 に四段階 reasoning plan を生成し plan-release-7@4 に固定します。TaskPlan は task-publish-schema@2 を specifies し、二 TaskStep が同一 plan 版に contains_step、Goal-elaborated_by-TaskPlan 連鎖が完全です。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/reasoning
      version: o1-pro — extended reasoning plan output
    field_values:
      framework: openai
      model: o1-pro
      goal_id: goal-release-2026
      task_plan_ref: plan-release-7@4
      task_ref: task-publish-schema@2
      task_step_ids:
        - step-validate-31
        - step-deploy-32
      reasoning_effort: high
      frozen_at: 2026-07-16T08:00:00Z
    related_node_ids:
      - Goal
      - TaskPlan
      - Task
      - TaskStep
    related_relation_ids:
      - Goal-elaborated_by-TaskPlan
      - TaskPlan-specifies-Task
      - TaskPlan-contains_step-TaskStep
    source_claims:
      - claim-orchestration-task-planning-openai
      - claim-orchestration-task-planning-design
  - id: orchestration-task-planning-example-cursor-plan-file
    labels:
      zh: Cursor plan 文件映射 TaskStep
      en: Cursor plan file mapped to TaskStep
      ja: Cursor plan ファイルを TaskStep に対応
    descriptions:
      zh: .cursor/plans/schema-v2.plan.md 定义 validate-ontology 与 update-examples 两步及 depends_on；导入后形成 TaskPlan plan-schema-v2@1，TaskDependency dep-2 以 step-1 为 predecessor，completion 字段映射 criterion-schema-v2@1。
      en: .cursor/plans/schema-v2.plan.md defines validate-ontology and update-examples with depends_on; import yields TaskPlan plan-schema-v2@1, TaskDependency dep-2 with step-1 as predecessor, and completion maps to criterion-schema-v2@1.
      ja: .cursor/plans/schema-v2.plan.md が validate-ontology と update-examples を depends_on 付きで定義し、取り込み後 TaskPlan plan-schema-v2@1、TaskDependency dep-2（predecessor=step-1）、completion が criterion-schema-v2@1 に対応します。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/plan
      version: plan mode — structured plan files
    field_values:
      framework: cursor
      plan_file: .cursor/plans/schema-v2.plan.md
      task_plan_ref: plan-schema-v2@1
      task_step_ids:
        - step-validate-ontology
        - step-update-examples
      task_dependency_id: dep-2
      predecessor_ref: step-validate-ontology
      successor_ref: step-update-examples
      completion_criterion_ref: criterion-schema-v2@1
    related_node_ids:
      - TaskPlan
      - TaskStep
      - TaskDependency
      - TaskCompletionCriterion
    related_relation_ids:
      - TaskPlan-contains_step-TaskStep
      - TaskDependency-links_predecessor-TaskStep
      - TaskDependency-links_successor-TaskStep
    source_claims:
      - claim-orchestration-task-planning-cursor
      - claim-orchestration-task-planning-design
  - id: orchestration-task-planning-example-langgraph-subgraph
    labels:
      zh: LangGraph 子图作为 subtask
      en: LangGraph subgraph as subtask
      ja: LangGraph サブグラフを subtask として実行
    descriptions:
      zh: 父图 run_validation_subtask 节点 invoke 已编译 subgraph validation-graph@3；Task task-validate-18 引用该 subgraph 作为 WorkItem 执行单元，TaskStep step-validate-31 的 execution_mapping 指向 subgraph invoke run-884。
      en: Parent node run_validation_subtask invokes compiled subgraph validation-graph@3; Task task-validate-18 references that subgraph as a WorkItem execution unit and TaskStep step-validate-31 execution_mapping points to subgraph invoke run-884.
      ja: 親ノード run_validation_subtask が compiled subgraph validation-graph@3 を invoke し、Task task-validate-18 が WorkItem 実行単位として参照、TaskStep step-validate-31 の execution_mapping が subgraph invoke run-884 を指します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 — subgraph compile and invoke
    field_values:
      framework: langgraph
      subgraph_ref: validation-graph@3
      parent_node: run_validation_subtask
      task_ref: task-validate-18@1
      task_step_ref: step-validate-31
      work_item_ref: wi-validation-subgraph@1
      execution_mapping_ref: run-884
      invoke_input_digest: sha256:payload-884
    related_node_ids:
      - Task
      - TaskStep
      - WorkItem
      - TaskPlan
    related_relation_ids:
      - TaskPlan-specifies-Task
      - Task-decomposes_into-TaskStep
      - TaskStep-maps_to-WorkItem
    source_claims:
      - claim-orchestration-task-planning-langgraph
      - claim-orchestration-task-planning-design
  - id: orchestration-task-planning-example-react-step-readiness
    labels:
      zh: ReAct 循环判定步骤就绪
      en: ReAct loop adjudicating step readiness
      ja: ReAct ループによる step readiness 判定
    descriptions:
      zh: ReAct trace 中 Observation“Validation passed”使 TaskDependency dep-index-18 的前驱 task-ingest-17 满足就绪证据；TaskCompletionCriterion criterion-index-18 仍只由后续 eval-index-18 引用，不因 Observation  alone 判定完成。
      en: ReAct Observation "Validation passed" satisfies readiness evidence for TaskDependency dep-index-18 predecessor task-ingest-17; TaskCompletionCriterion criterion-index-18 is referenced only by later eval-index-18, not adjudicated complete by Observation alone.
      ja: ReAct Observation「Validation passed」により TaskDependency dep-index-18 の predecessor task-ingest-17 が readiness 証拠を満たします。TaskCompletionCriterion criterion-index-18 は後段 eval-index-18 のみが参照し、Observation だけでは完了判定しません。
    example_source:
      product: ReAct
      url: https://arxiv.org/abs/2210.03629
      version: Thought→Action→Observation loop
    field_values:
      framework: react
      task_ref: task-index-18@1
      task_dependency_id: dep-index-18
      predecessor_ref: task-ingest-17@2
      react_thought: Verify ingest manifest before indexing.
      react_action: check_manifest[task-ingest-17]
      react_observation: Validation passed with required fields present.
      readiness_satisfied: true
      completion_criterion_ref: criterion-index-18@2
      completion_adjudicated: false
    related_node_ids:
      - Task
      - TaskDependency
      - TaskConstraint
      - TaskCompletionCriterion
    related_relation_ids:
      - TaskDependency-links_predecessor-Task
      - TaskDependency-links_successor-Task
    source_claims:
      - claim-orchestration-task-planning-react
      - claim-orchestration-task-planning-design
  - id: orchestration-task-planning-example-goal-realization-counter
    labels:
      zh: 缺少展开链不得断言 Goal 已实现
      en: Missing elaboration chain must not assert Goal realization
      ja: 展開連鎖欠落時は Goal 実現を断言不可
    descriptions:
      zh: goal-release-2026 与 task-publish-schema@2 名称相近且 step-validate-31 有 position=1，但缺少 Goal-elaborated_by-TaskPlan 与 TaskPlan-contains_step-TaskStep，且 step 声明属于旧版 plan-release-7@3；不得返回完整实现链。
      en: goal-release-2026 and task-publish-schema@2 have similar names and step-validate-31 has position=1, but Goal-elaborated_by-TaskPlan and TaskPlan-contains_step-TaskStep are missing and the step declares obsolete plan-release-7@3; a complete realization chain must not be returned.
      ja: goal-release-2026 と task-publish-schema@2 は名称が似て step-validate-31 に position=1 がありますが、Goal-elaborated_by-TaskPlan と TaskPlan-contains_step-TaskStep が欠落し step は旧 plan-release-7@3 を宣言します。完全実現 chain を返してはなりません。
    example_source:
      product: Moonweave task planning boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: goal realization evidence contract
    field_values:
      goal_id: goal-release-2026
      candidate_task_plan_ref: plan-release-7@4
      task_ref: task-publish-schema@2
      task_step_ref: step-validate-31
      declared_step_plan_version: 3
      missing_relation_ids:
        - Goal-elaborated_by-TaskPlan
        - TaskPlan-specifies-Task
        - TaskPlan-contains_step-TaskStep
      realization_chain_valid: false
    related_node_ids:
      - Goal
      - TaskPlan
      - Task
      - TaskStep
    related_relation_ids:
      - Goal-elaborated_by-TaskPlan
      - TaskPlan-specifies-Task
      - TaskPlan-contains_step-TaskStep
    source_claims:
      - claim-orchestration-task-planning-design
parent_relation: null
