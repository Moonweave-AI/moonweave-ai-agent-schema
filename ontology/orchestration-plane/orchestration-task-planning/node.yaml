module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入不是一个含混的‘目标’标签，而是可追溯的意向链：Intent 通过 commits_to 固定承诺的 Goal，Goal 通过 refined_into 给出可判定 Objective，Goal 或 Objective 再分别通过 elaborated_by 与 realized_by 指向一个版本化 TaskPlan。
          en: "The input is not an undifferentiated goal label but a traceable intention chain: Intent commits_to a Goal, Goal refined_into answerable Objectives, and Goal or Objective then points to a versioned TaskPlan through elaborated_by or realized_by respectively."
          ja: 入力は曖昧な目標ラベルではなく追跡可能な意向連鎖です。Intent は commits_to で Goal を固定し、Goal は refined_into で判定可能な Objective を示し、Goal または Objective はそれぞれ elaborated_by／realized_by で版管理 TaskPlan を指します。
        family_concept_ids:
          - Intent
          - Goal
          - Objective
        relation_ids:
          - Intent-commits_to-Goal
          - Goal-refined_into-Objective
          - Goal-elaborated_by-TaskPlan
          - Objective-realized_by-TaskPlan
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是可执行但仍保持规范身份的工作图：TaskPlan specifies 稳定 Task，Task decomposes_into 计划内 TaskStep，TaskPlan contains_step 与 contains_work_item 固定版本边界，WorkItem allocates 恰好一个 Task 并 assigned_to 恰好一个角色绑定；Execution-realizes-Task 可从运行侧引用 Task，而以 Execution 为源的 carries_out 事实由 runtime-execution-attempts 规范存储。
          en: "The output is an executable work graph whose nodes retain specification identity: TaskPlan specifies stable Tasks, each Task decomposes_into in-plan TaskSteps, contains_step and contains_work_item fix the plan-version boundary, and each WorkItem allocates exactly one Task and is assigned_to exactly one role binding; Execution-realizes-Task may reference Task from runtime, while the Execution-sourced carries_out fact is canonically stored by runtime-execution-attempts."
          ja: 出力は仕様同一性を保つ実行可能な作業グラフです。TaskPlan は安定 Task を specifies し、Task は計画内 TaskStep へ decomposes_into され、contains_step／contains_work_item が計画版境界を固定し、各 WorkItem は一つの Task を allocates して一つの role binding へ assigned_to されます。Execution-realizes-Task は runtime 側から Task を参照し、Execution を source とする carries_out 事実は runtime-execution-attempts が canonical storage を担います。
        family_concept_ids:
          - TaskPlan
          - Task
          - TaskStep
          - WorkItem
        relation_ids:
          - TaskPlan-specifies-Task
          - Task-decomposes_into-TaskStep
          - TaskPlan-contains_step-TaskStep
          - TaskPlan-contains_work_item-WorkItem
          - WorkItem-allocates-Task
          - WorkItem-assigned_to-ActorRoleBinding
          - Execution-realizes-Task
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。执行、路由、委派或评估需要说明所实现的目标和任务定义时，引用计划实体而不把运行状态写回定义。
          en: This ontology does not own runtime-failure adjudication. Execution, routing, delegation, or evaluation references planning entities when identifying the goal and task definition being realized without writing runtime state into the definition.
          ja: このオントロジーは実行失敗の判定を所有しません。実行、経路制御、委任、評価が実現対象の目標とタスク定義を示すとき、実行状態を定義へ書き戻さず計画実体を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。执行、路由、委派或评估需要说明所实现的目标和任务定义时，引用计划实体而不把运行状态写回定义。
          en: This ontology does not initiate a recovery workflow. Execution, routing, delegation, or evaluation references planning entities when identifying the goal and task definition being realized without writing runtime state into the definition.
          ja: このオントロジーは回復ワークフローを開始しません。実行、経路制御、委任、評価が実現対象の目標とタスク定義を示すとき、実行状態を定義へ書き戻さず計画実体を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-orchestration-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 逐根反例复核：IntentionalEntity 可只记录行动者采用的期望未来状态而尚无计划；WorkSpecification 可由法规或外部委托直接规定，即使没有行动者欲望记录；TaskCondition 可作为可复用谓词独立存在，且并非每个 WorkSpecification 都已绑定约束、依赖或完成判据。因此三者不能因都属于规划语境而合并。
            en: "Root-by-root counterexample review: IntentionalEntity can record an adopted desired future state before a plan exists; WorkSpecification can be imposed by regulation or external assignment without any recorded actor desire; TaskCondition can exist as a reusable predicate and not every WorkSpecification has a bound constraint, dependency, or completion criterion. Sharing planning context therefore does not merge the three roots."
            ja: 根ごとの反証確認：IntentionalEntity は plan 前の adopted desired future state だけを記録でき、WorkSpecification は actor desire 記録なしに regulation や external assignment から規定でき、TaskCondition は reusable predicate として独立し、すべての WorkSpecification が constraint・dependency・completion criterion を持つわけではありません。planning context の共有だけで三 root を統合しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本体反例确认 WorkSpecification、IntentionalEntity 与 TaskCondition 是三个独立规范轴：Goal-elaborated_by-TaskPlan 只覆盖已被展开的 Goal，未规划 Goal 仍有效；Task-constrained_by-TaskConstraint 只连接 TaskCondition 的一个子类与 Task，不能让所有 WorkSpecification 或所有 TaskCondition 互为父级。现有 is_a 树分别闭合，不新增伪 is_a。
            en: "Ontology counterexamples retain WorkSpecification, IntentionalEntity, and TaskCondition as three independent specification axes: Goal-elaborated_by-TaskPlan covers only an elaborated Goal, while an unplanned Goal remains valid; Task-constrained_by-TaskConstraint links one TaskCondition subtype to Task and cannot make every WorkSpecification or every TaskCondition the other's parent. The existing is_a trees remain separately closed without fabricated is_a."
            ja: ontology の反証により WorkSpecification・IntentionalEntity・TaskCondition を三つの独立 specification axis とします。Goal-elaborated_by-TaskPlan は elaborated Goal だけを覆い unplanned Goal も有効です。Task-constrained_by-TaskConstraint は TaskCondition の一 subtype と Task だけを結び、全 WorkSpecification または全 TaskCondition を相手の親にはできません。既存 is_a tree を別々に閉じ、偽 is_a を追加しません。
