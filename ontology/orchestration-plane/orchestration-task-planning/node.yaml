      en: All three evidence-binding relations genuinely cross planning and declared runtime owners; the two owner-internal relations complete the example chain without masquerading as cross-module bindings.
      ja: 三つの evidence-binding relation は planning と宣言 runtime owner を実際に跨ぎ、二つの owner 内 relation は完全 chain を示すだけで cross-module binding には偽装しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-task-planning-009
