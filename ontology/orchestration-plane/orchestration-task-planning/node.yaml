source_claims:
  - id: claim-orchestration-task-planning-001
    source: eng-fw-crewai-docs
    supports: CrewAI documents Task description, expected output, assigned Agent, dependency context, and output guardrails. Moonweave uses these operational distinctions to inform WorkSpecification, allocation, dependency, and completion-condition boundaries without claiming CrewAI defines its ontology.
    locator: Core Concepts > Tasks > Task Attributes; Task Dependencies and Context; Task Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-orchestration-task-planning-002
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Plan entities, occurring Activities, Agents, Roles, and qualified Associations. Moonweave's WorkSpecification taxonomy and exact planning/runtime ownership split are explicit design inferences over those authoritative distinctions.
    locator: PROV-O Recommendation > §3.1 Starting Point Terms; §3.3 prov:Plan, prov:Association, prov:hadRole, and prov:hadPlan
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-orchestration-task-planning-003
    source: eng-ont-prov-o
    supports: PROV-O defines prov:Plan as an entity representing actions or steps intended to achieve goals. Moonweave's versioned Goal-to-TaskPlan-to-Task-to-TaskStep relations and same-plan membership rule are additional design inferences.
    locator: PROV-O Recommendation > §3.3 Qualified Terms > Class prov:Plan and Property prov:hadPlan
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-orchestration-task-planning-004
    source: eng-fw-maf-workflows
    supports: Microsoft Agent Framework describes a Workflow as executors and edges assembled into a directed graph. Moonweave interprets that operational structure as evidence for explicit plan-step membership without equating workflow executors with its ontology classes.
    locator: "Workflow Builder & Execution > Building Workflows > Workflow Components: Executor, Edge, Builder, and Run"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-orchestration-task-planning-005
    source: eng-ont-prov-o
    supports: PROV-O represents a plan explicitly and notes that plans may evolve over time and carry provenance. Moonweave therefore refuses to infer plan membership from names or positions and requires matching versioned facts; that rule is local inference.
    locator: PROV-O Recommendation > §3.3 Class prov:Plan > plan evolution, provenance, and validation discussion
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
