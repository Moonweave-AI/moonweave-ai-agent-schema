        en: TaskCompletionCriterion states what one Task version must deliver and can be referenced by multiple evaluation runs. Even if its wording says pass or acceptance, it remains a Task specification—not an evaluator, evaluation threshold, or evaluation occurrence—when its identity is fixed by task_id, task_version, and desired delivery.
