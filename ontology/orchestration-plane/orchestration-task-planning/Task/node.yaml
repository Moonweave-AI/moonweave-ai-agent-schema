schema: moonweave.ai/ontology-node/v1
id: Task
kind: concept
labels:
  zh: A2A 协议任务
  en: A2A Task
  ja: A2A プロトコル Task
semantics:
  short_definition:
    zh: A2A 协议定义的、有状态的工作单元。
    en: The stateful unit of work defined by the A2A protocol.
    ja: A2A protocol が定義する stateful な work unit。
  definition:
    zh: >-
      Task 仅指真实 A2A 协议载荷中的核心工作对象。它含有服务端标识 id、必需的 status，以及可选的
      contextId、artifacts、history 和 metadata，并按 A2A 规定的任务生命周期演进。Task 不是 Moonweave 的通用“待办事项”
      标签：内部 Goal、TaskPlan、TaskStep、TaskDependency、Execution 和 RunAttempt 不能因为都涉及工作而改称 Task。
    en: >-
      Task denotes only the core work object in a real A2A protocol payload. It has a server identifier id, required status,
      and optional contextId, artifacts, history, and metadata, and evolves through the A2A task lifecycle. Task is not Moonweave's
      generic label for work: an internal Goal, TaskPlan, TaskStep, TaskDependency, Execution, or RunAttempt must not be
      renamed Task merely because each concerns work.
    ja: >-
      Task は実際の A2A protocol payload にある中核の work object だけを指す。server identifier の id、必須の status、
      任意の contextId、artifacts、history、metadata を持ち、A2A task lifecycle に沿って変化する。Task は Moonweave の一般的な
      work の呼称ではない。内部の Goal、TaskPlan、TaskStep、TaskDependency、Execution、RunAttempt は、いずれも work に
      関係するというだけで Task と改名してはならない。
  why_needed:
    zh: 保留协议原生名称能让跨代理互操作载荷保持可验证，也避免把内部规划的静态声明误当作协议状态机。
    en: Retaining the protocol-native name keeps inter-agent payloads verifiable and prevents static local plans from being mistaken for a protocol state machine.
    ja: protocol-native の名称を保持すると agent 間 payload を検証可能にし、静的な local plan を protocol state machine と誤認しない。
  includes:
    - zh: A2A Task 的 id、status、可选 contextId、artifacts、history、metadata 及其协议生命周期。
      en: An A2A Task's id, status, optional contextId, artifacts, history, metadata, and protocol lifecycle.
      ja: A2A Task の id、status、任意の contextId、artifacts、history、metadata、protocol lifecycle。
  excludes:
    - zh: 内部计划标识、计划步骤、依赖边、LangGraph checkpoint、Agents SDK Runner 结果和通用工作清单。
      en: An internal plan identifier, plan step, dependency edge, LangGraph checkpoint, Agents SDK Runner result, or generic work list.
      ja: 内部 plan ID、plan step、dependency edge、LangGraph checkpoint、Agents SDK Runner result、一般的な work list。
  semantic_kind: protocol-entity
engineering:
  explanation:
    zh: >-
      A2A 客户端通过协议方法接收或查询 Task JSON，并依 status.state 决定是否继续轮询、提交输入或处理 artifacts。
      本地规划系统最多保存一个显式映射引用；它不复制 Task status 到 TaskPlan。OpenAI Agents SDK 的 Runner 返回的是 SDK
      运行结果，除非适配器实际生成符合 A2A 规范的载荷，否则也不是该概念。
    en: >-
      An A2A client receives or queries Task JSON and uses status.state to decide whether to poll, submit input, or process
      artifacts. A local planning system may retain an explicit mapping reference but does not copy Task status into a TaskPlan.
      An OpenAI Agents SDK Runner return is an SDK run result, not this concept unless an adapter actually produces a conforming
      A2A payload.
    ja: >-
      A2A client は Task JSON を受信または照会し、status.state により poll、input 提出、artifact 処理を決める。local planning
      system は明示的 mapping reference を保持できるが、Task status を TaskPlan に複製しない。OpenAI Agents SDK Runner の戻り値は、
      adapter が準拠 A2A payload を実際に生成しない限り SDK run result であり、この concept ではない。
  typical_input:
    - description:
        zh: A2A 服务返回的进行中任务载荷。
        en: An in-progress task payload returned by an A2A service.
        ja: A2A service が返した進行中 task payload。
      format: |-
        {"id":"task-7f83","contextId":"ctx-release-2026-07","status":{"state":"TASK_STATE_WORKING"}}
  typical_output:
    - description:
        zh: 客户端根据终结状态保存的协议响应，不是计划修订。
        en: A protocol response retained by a client after a terminal state, rather than a plan revision.
        ja: terminal state 後に client が保持する protocol response。plan revision ではない。
      format: |-
        {"id":"task-7f83","contextId":"ctx-release-2026-07","status":{"state":"TASK_STATE_COMPLETED"},"artifacts":[{"artifactId":"release-report","parts":[{"text":"Release approved"}]}],"history":[{"messageId":"msg-release-approved","contextId":"ctx-release-2026-07","taskId":"task-7f83","role":"ROLE_AGENT","parts":[{"text":"Release approved"}]}],"metadata":{"origin":"release-manager"}}
  reference_implementations:
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the Task protocol data model and its required and optional fields.
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents Task state transitions, terminal states, and follow-up task behavior.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents the separate SDK Runner execution interface used for contrast at an integration boundary.
structure:
  identity_keys:
    - id
  fields:
    - id: id
      labels: {zh: 任务标识, en: Task ID, ja: task ID}
      definitions:
        zh: A2A 服务端为该 Task 分配的唯一标识。
        en: The unique identifier assigned to this Task by the A2A server.
        ja: A2A server がこの Task に割り当てる一意の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task-7f83
      source_claims: [claim-a2a-task-shape]
    - id: contextId
      labels: {zh: 上下文标识, en: Context ID, ja: context ID}
      definitions:
        zh: 可选的 A2A 上下文标识，用于把相关协议交互放入同一上下文。
        en: The optional A2A context identifier that places related protocol interactions in one context.
        ja: 関連する protocol interaction を一つの context に置く任意の A2A context identifier。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: ctx-release-2026-07
      source_claims: [claim-a2a-task-shape]
    - id: status
      labels: {zh: 任务状态, en: Task status, ja: task status}
      definitions:
        zh: 必需的协议状态对象，其中 state 采用适用 A2A 版本定义的生命周期值。
        en: The required protocol status object whose state uses the lifecycle values defined by the applicable A2A version.
        ja: 適用する A2A version が定義した lifecycle value を state に使う必須の protocol status object。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {state: TASK_STATE_WORKING}
      source_claims: [claim-a2a-task-shape, claim-a2a-task-lifecycle]
    - id: artifacts
      labels: {zh: 任务产物, en: Task artifacts, ja: task artifacts}
      definitions:
        zh: 服务在任务处理中选择返回时提供的可选协议产物集合；对未请求产物的 ListTasks 响应应省略该字段。
        en: The optional collection of protocol artifacts supplied when the service elects to return them; a ListTasks response not requesting artifacts omits this field.
        ja: service が返却を選ぶときに提供する任意の protocol artifact の集合。artifact を要求しない ListTasks response ではこの field を省略する。
      datatype: array[object]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: [{artifactId: release-report, parts: [{text: Release approved}]}]
      source_claims: [claim-a2a-task-shape]
    - id: history
      labels: {zh: 交互历史, en: Interaction history, ja: interaction history}
      definitions:
        zh: 可选的协议消息历史，用于保留任务交互上下文。
        en: The optional protocol message history that retains the task interaction context.
        ja: task interaction context を保持する任意の protocol message history。
      datatype: array[object]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: [{messageId: msg-release-approved, contextId: ctx-release-2026-07, taskId: task-7f83, role: ROLE_AGENT, parts: [{text: Release approved}]}]
      source_claims: [claim-a2a-task-shape]
    - id: metadata
      labels: {zh: 任务元数据, en: Task metadata, ja: task メタデータ}
      definitions:
        zh: A2A Task 可选的键值元数据对象；它补充任务信息，但不替代协议 id、status 或本体中的本地规划字段。
        en: The optional key/value metadata object for an A2A Task; it supplements task information without replacing protocol id, status, or local planning fields.
        ja: A2A Task の任意の key/value metadata object。task information を補足するが、protocol の id、status、または local planning field を置き換えない。
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {origin: release-manager}
      source_claims: [claim-a2a-task-shape]
  constraints:
    - id: a2a-task-requires-protocol-identity-and-status
      severity: error
      language: plain
      expression: A record is classified as Task only when it is a real A2A Task payload with non-empty id and status; local planning records must use their own concept identities.
      explanation:
        zh: 协议身份和状态是区分 A2A Task 与本地工作声明的必要依据。
        en: Protocol identity and status are necessary evidence for distinguishing an A2A Task from a local work declaration.
        ja: protocol identity と status は、A2A Task と local work declaration を区別するために必要な evidence である。
      source_claims: [claim-a2a-task-shape, claim-a2a-task-local-boundary]
    - id: a2a-terminal-task-does-not-restart
      severity: error
      language: plain
      expression: Once status.state is terminal under the applicable A2A lifecycle, the same Task must not restart; a later follow-up is represented by a new Task.
      explanation:
        zh: 终结任务的不可重启规则避免将新请求伪装成旧协议实例的状态回退。
        en: The no-restart rule for terminal tasks prevents a later request from being disguised as a state reversal of an old protocol instance.
        ja: terminal task の no-restart rule は、後続 request を古い protocol instance の state reversal に偽装することを防ぐ。
      source_claims: [claim-a2a-task-lifecycle]
    - id: a2a-task-artifact-omission-is-protocol-shaped
      severity: error
      language: plain
      expression: In an A2A ListTasks response with includeArtifacts=false, the Task artifacts field must be omitted rather than represented as an empty placeholder; when included, it must carry the response's actual artifact collection.
      explanation:
        zh: 对 ListTasks 而言，省略与空数组表达的协议含义不同，不能把未请求返回的产物伪造成“已返回但为空”。
        en: For ListTasks, omission and an empty array have different protocol meanings, so an unrequested artifact collection must not be fabricated as a returned empty collection.
        ja: ListTasks では omission と empty array は異なる protocol 意味を持つため、要求されていない artifact collection を返却済みの empty collection として捏造してはならない。
      source_claims: [claim-a2a-task-shape]
    - id: a2a-task-embedded-message-and-artifact-shapes
      severity: error
      language: plain
      expression: Every Task history entry must be an A2A Message with messageId, role, and parts. A server-originated history entry must have role=ROLE_AGENT and contextId; if it is associated with this Task, taskId must equal Task.id. Every included artifact must have artifactId and at least one Part, and each included Part must use exactly one content alternative.
      explanation:
        zh: history、artifact 和 Part 都有独立的协议数据模型；只保留简写 role 或 artifactId 会把可验证的协议对象误写成局部注释。
        en: History, Artifact, and Part each have their own protocol data model; retaining only a shorthand role or artifactId would turn a verifiable protocol object into a local annotation.
        ja: history、Artifact、Part にはそれぞれ protocol data model がある。role や artifactId だけの短縮形を残すと、検証可能な protocol object を local annotation にしてしまう。
      source_claims: [claim-a2a-task-shape]
  required_relations: []
examples:
  - id: a2a-task-positive-working
    labels:
      zh: Task positive
      en: Task positive
      ja: Task positive
    descriptions:
      zh: CrewAI 映射 Task：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps Task: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI Task: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {id: task-7f83, contextId: ctx-release-2026-07, status: {state: TASK_STATE_WORKING}

    related_node_ids:
      - Task
    related_relation_ids: []
    source_claims:
      - claim-a2a-task-shape

  - id: a2a-task-counterexample-plan-record
    labels:
      zh: Task counterexample
      en: Task counterexample
      ja: Task counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 Task。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style Task.
      ja: Python/code なし自然言語計画は TaskWeaver 式 Task にならない。
    field_values: {specification_id: plan:release-v3, revision: v3, goal_ref: goal:release-2026-07, scope_ref: release:2026-07, step_refs: [step:sign, step: "approve]"}

    related_node_ids:
      - Task
      - TaskPlan
    related_relation_ids: []
    source_claims:
      - claim-a2a-task-local-boundary

  - id: a2a-task-boundary-runner-result
    labels:
      zh: Task boundary
      en: Task boundary
      ja: Task boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 Task 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not Task static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで Task 静的 TaskPlan ではない。
    field_values: {runner: Runner.run, final_output: "release approved", current_agent: release_manager}

    related_node_ids:
      - Task
    related_relation_ids: []
    source_claims:
      - claim-agents-runner-boundary
      - claim-a2a-task-local-boundary

  - id: a2a-task-instance-completed-export
    labels:
      zh: Task instance
      en: Task instance
      ja: Task instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 Task HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to Task HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が Task HandoffDecision に写像。
    field_values: {id: task-export-41, contextId: ctx-export-41, status: {state: TASK_STATE_COMPLETED}, artifacts: [{artifactId: export-report, parts: [{text: Export completed}]}], history: [{messageId: msg-export-completed, taskId: task-export-41, role: ROLE_AGENT, metadata: {origin: export-service}

    related_node_ids:
      - Task
    related_relation_ids: []
    source_claims:
      - claim-a2a-task-shape
      - claim-a2a-task-lifecycle

sources:
  - id: a2a-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: protocol-specification
    relevance: Defines Task, its required id and status fields, optional contextId, artifacts, history, and metadata, and the nested Message, Role, Part, and Artifact shapes used by Task.
  - id: a2a-life-of-task
    title: A2A life of a task
    url: https://a2a-protocol.org/latest/topics/life-of-a-task/
    source_type: official-doc
    relevance: Defines task lifecycle behavior including terminal tasks and follow-up work.
  - id: openai-agents-running
    title: OpenAI Agents SDK Running agents
    url: https://openai.github.io/openai-agents-python/running_agents/
    source_type: official-doc
    relevance: Documents Runner as the SDK interface for starting and receiving agent runs.
source_claims:
  - id: claim-a2a-task-shape
    source: a2a-specification
    supports: A2A defines Task with required id and status plus optional contextId, artifacts, history, and metadata. History entries are Message objects with required messageId, role, and parts; server messages use ROLE_AGENT and need contextId. Artifacts require artifactId and at least one Part, whose content is exactly one of text, raw, url, or data. For ListTasks responses, artifacts must be omitted when includeArtifacts is false rather than emitted as an empty placeholder.
    locator: Protocol Data Model, Task; Message; Role; Part; Artifact; ListTasks, includeArtifacts behavior
    evidence_kind: normative
    confidence: high
  - id: claim-a2a-task-lifecycle
    source: a2a-life-of-task
    supports: The A2A task lifecycle is stateful, terminal Tasks do not restart, and follow-up work uses a new Task.
    locator: Life of a Task, Task lifecycle and terminal states
    evidence_kind: official
    confidence: high
  - id: claim-agents-runner-boundary
    source: openai-agents-running
    supports: The Agents SDK Runner starts an Agent from input and returns SDK run state or result, which is distinct from the A2A Task protocol data model.
    locator: Running agents, Runner.run and run configuration
    evidence_kind: official
    confidence: high
  - id: claim-a2a-task-local-boundary
    source: a2a-specification
    supports: Reserving the local Task concept for real A2A payloads and keeping internal plan concepts separately named is a Moonweave design boundary based on the A2A Task data shape.
    locator: Protocol Data Model, Task
    evidence_kind: design-inference
    confidence: high
