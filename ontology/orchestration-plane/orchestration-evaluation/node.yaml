        en: EvaluationAttempt is an improvement-loop control attempt identified by loop, round, attempt_id, and the coordinated run; EvaluationRun is the independently owned evaluation activity in feedback evaluation. EvaluationAttempt-coordinates-EvaluationRun connects the two occurrences without merging their identities.
        ja: EvaluationAttempt は loop・round・attempt_id・調整対象 run で識別する改善ループ内 control attempt で、EvaluationRun は feedback evaluation が独立所有する評価 activity です。EvaluationAttempt-coordinates-EvaluationRun は同一性を統合せず二つの occurrence を接続します。
