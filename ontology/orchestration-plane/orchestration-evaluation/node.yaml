examples:
  - id: orchestration-evaluation-cq-loop-v4-example-positive
    kind: positive
    labels:
      zh: 质量阈值在第三轮满足并终止报告改进循环
      en: Quality threshold is met on round three and terminates report improvement
      ja: 第三 round で品質 threshold を満たし report 改善 loop を終了
    scenario_id: orchestration-evaluation-cq-loop-v4-positive
    descriptions:
      zh: report-quality-loop-42 包含评价、修订、再评价三次有序尝试，由 evaluator-optimizer:report-quality 控制；第二轮实际采用 add-citation-plan@2，第三轮对 quality-threshold@4 求值得到 0.93≥0.90 后终止。
      en: report-quality-loop-42 contains ordered evaluation, revision, and re-evaluation attempts under evaluator-optimizer:report-quality; round two applies add-citation-plan@2, and round three stops after quality-threshold@4 evaluates 0.93 against 0.90.
      ja: report-quality-loop-42 は evaluator-optimizer:report-quality の下で評価・修訂・再評価の三 attempt を含み、第二 round で add-citation-plan@2 を適用し、第三 round で quality-threshold@4 が 0.93≥0.90 となり終了します。
    field_values:
      improvement_activity_id: report-quality-loop-42
      attempt_refs:
        - evaluation-42-1
        - revision-42-2
        - evaluation-42-3
      round_indices:
        - 1
        - 2
        - 3
      controller_role_ref: evaluator-optimizer:report-quality
      decision_authority:
        - revise
        - accept
        - stop
      revision_plan_ref: add-citation-plan@2
      stop_condition_ref: quality-threshold@4
      observed_value: 0.93
      threshold: 0.9
      condition_result: true
      termination_action: stop-success
      ended_at: 2026-07-16T12:22:09Z
    related_node_ids:
      - ImprovementLoop
      - ImprovementAttempt
      - EvaluatorOptimizer
      - RevisionPlan
      - StopCondition
    related_relation_ids:
      - ImprovementLoop-contains_attempt-ImprovementAttempt
      - EvaluatorOptimizer-controls-ImprovementLoop
      - ImprovementLoop-uses_revision-RevisionPlan
      - ImprovementLoop-terminates_on-StopCondition
    expected_result:
      zh: 按 round_index 返回三次尝试、控制角色、实际应用的计划版本，以及带观测值和真假判定的终止条件。
      en: Return all three attempts by round_index, the controlling role, the applied plan revision, and the terminating condition with observed value and verdict.
      ja: round_index 順に三 attempt、controlling role、適用 plan revision、observed value と verdict を持つ termination condition を返します。
    why_valid_or_invalid:
      zh: LangGraph 的 evaluator-optimizer 直到显式成功标准满足才结束；本例同时保存循环成员、决策权限、实际修订与求值结果，能够解释为何停止。
      en: LangGraph's evaluator-optimizer iterates until explicit success criteria pass; this case records loop membership, authority, applied revision, and evaluated result to explain termination.
      ja: LangGraph evaluator-optimizer は明示的 success criteria まで反復し、本例は loop membership、authority、applied revision、evaluated result を保持して終了理由を説明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-evaluation-001
      - claim-orchestration-evaluation-002
  - id: orchestration-evaluation-cq-loop-v4-example-counter
    kind: counterexample
    labels:
      zh: 配置库中的超时条件被误当作本轮终止原因
      en: Configured timeout is mistaken for this loop's termination cause
      ja: 設定済み timeout condition を今回 loop の終了原因と誤認
    scenario_id: orchestration-evaluation-cq-loop-v4-counterexample
    descriptions:
      zh: report-quality-loop-43 可访问 tone-plan@1 与 timeout@1，但运行记录只应用 add-citation-plan@2；timeout@1 的 observed_value 为 41 秒、阈值 60 秒且 result=false，循环随后因人工取消结束。
      en: report-quality-loop-43 can access tone-plan@1 and timeout@1, but execution applies only add-citation-plan@2; timeout@1 observes 41 seconds against 60 with result=false, and the loop later ends by human cancellation.
      ja: report-quality-loop-43 は tone-plan@1 と timeout@1 を参照可能ですが、実行は add-citation-plan@2 のみを適用し、timeout は 41/60 秒で false、loop は後に human cancellation で終了します。
    field_values:
      improvement_activity_id: report-quality-loop-43
      configured_revision_plan_ref: tone-plan@1
      applied_revision_plan_ref: add-citation-plan@2
      configured_stop_condition_ref: timeout@1
      timeout_observed_seconds: 41
      timeout_threshold_seconds: 60
      timeout_condition_result: false
      actual_termination_cause: human-cancel-event-7
      terminates_on_timeout_fact_present: false
    related_node_ids:
      - ImprovementLoop
      - RevisionPlan
      - StopCondition
    related_relation_ids:
      - ImprovementLoop-uses_revision-RevisionPlan
      - ImprovementLoop-terminates_on-StopCondition
    expected_result:
      zh: 不得返回 tone-plan@1 作为已用计划，也不得返回 timeout@1 作为终止原因；应返回实际计划并把取消事件标为外部终止事实。
      en: Do not return tone-plan@1 as used or timeout@1 as terminating; return the applied plan and classify the cancellation event as the external termination fact.
      ja: tone-plan@1 を使用済み、timeout@1 を終了原因として返さず、実際の plan と cancellation event を外部 termination fact として返します。
    why_valid_or_invalid:
      zh: 配置可用性只说明可能采用或求值，不能证明实际发生；false 条件尤其不能被解释为终止原因，否则会扭曲循环控制谱系。
      en: Configuration availability proves only possibility, not occurrence; a false condition cannot be the termination cause without corrupting the loop's control lineage.
      ja: 設定上の可用性は可能性だけを示し、実行を証明しません。false condition を終了原因にすると loop の control lineage を歪めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-evaluation-001
      - claim-orchestration-evaluation-002
