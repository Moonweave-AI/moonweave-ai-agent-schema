  key_notion:
    zh: 有证据的改进控制循环
    en: evidence-backed improvement control loop
    ja: 証拠に基づく改善制御ループ
  owns_when:
    zh: 当对象的身份由某个改进循环及轮次、循环内协调活动、控制规范版本、循环职责、优化状态版本，或由反馈到继续/重试/停止决定的控制谱系决定时，由本模块拥有。
    en: Own an object when its identity is determined by an improvement loop and round, an in-loop coordination activity, a control-specification revision, a loop role, an optimization-state revision, or the control lineage from feedback to a continue, retry, or stop decision.
    ja: 対象の同一性が改善 loop と round・loop 内 coordination activity・control specification 版・loop role・optimization state 版、または feedback から continue／retry／stop 判断への制御系譜で決まる場合に所有します。
  references_when:
    zh: 循环需要评价运行与测量、反馈内容、修订计划、纠正活动、评审证据、通用停止条件或实际参与者时，引用其规范所有者；控制谱系只记录“采用了什么以及据此作出什么决定”，不复制被引用对象。
    en: When a loop needs evaluation runs and measurements, feedback content, revision plans, correction activities, review evidence, generic stop conditions, or concrete participants, reference their canonical owners. Control lineage records only what was used and which decision followed; it does not copy the referenced objects.
    ja: loop が evaluation run・measurement・feedback 内容・revision plan・correction activity・review evidence・一般 stop condition・実参加者を必要とする場合は正規所有者を参照します。control lineage は「何を採用し、どの判断へ至ったか」だけを記録し、参照対象を複製しません。
