module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入端接收反馈域已形成的 EvaluationRun 与 Feedback，并通过 ReviewAssignment-governs-ReviewActivity 明确哪份指派约束哪次审查；RevisionPlan 和 StopCondition 继续作为控制引用，均不转移定义所有权。
          en: Inputs include feedback-owned EvaluationRun and Feedback, while ReviewAssignment-governs-ReviewActivity identifies which assignment constrains a review; RevisionPlan and StopCondition remain control references without transferring definitional ownership.
          ja: 入力には feedback-owned EvaluationRun と Feedback を含み、ReviewAssignment-governs-ReviewActivity がどの割当てがどの審査を制約するかを明示します。RevisionPlan と StopCondition は定義所有権を移さない制御参照のままです。
        family_concept_ids:
          - EvaluationRun
          - Feedback
          - ReviewAssignment
          - RevisionPlan
          - StopCondition
        relation_ids:
          - EvaluationAttempt-coordinates-EvaluationRun
          - FeedbackRouting-routes-Feedback
          - ReviewAssignment-governs-ReviewActivity
          - ImprovementLoop-uses_revision-RevisionPlan
          - ImprovementLoop-terminates_on-StopCondition
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出端形成有序 ImprovementAttempt、新版 OptimizerState 和不可变 StopRetryLineage；实际评价结果和修订产物仍由反馈域输出。
          en: Outputs are ordered ImprovementAttempts, new OptimizerState revisions, and immutable StopRetryLineage records; actual evaluation results and revision artifacts remain feedback outputs.
          ja: output は ordered ImprovementAttempt・new OptimizerState revision・immutable StopRetryLineage で actual evaluation result/revision artifact は feedback output です。
        family_concept_ids:
          - ImprovementAttempt
          - OptimizerState
          - StopRetryLineage
        relation_ids:
          - ImprovementLoop-contains_attempt-ImprovementAttempt
          - ImprovementAttempt-updates-OptimizerState
          - StopRetryLineage-records_source_attempt-ImprovementAttempt
          - StopRetryLineage-records_stop_condition-StopCondition
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 失败或不能继续由实际求值的 StopCondition 与终止事实表达；超预算、超时或无法满足阈值均需保留条件版本和观测值。
          en: Failure or inability to continue is expressed by an evaluated StopCondition and termination fact; exhausted budget, timeout, or unmet threshold must retain condition revision and observed value.
          ja: failure/inability to continue は evaluated StopCondition/termination fact で表し budget・timeout・unmet threshold は condition revision/observed value を保持します。
        family_concept_ids:
          - StopCondition
          - StopRetryLineage
        relation_ids:
          - ImprovementLoop-terminates_on-StopCondition
          - StopRetryLineage-records_stop_condition-StopCondition
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 恢复端由 FeedbackRouting 选择适用 RevisionPlan，ReviewCoordination 分派新的 RevisionAttempt，并在该尝试完成后产生新的 OptimizerState 版本。
          en: Recovery has FeedbackRouting select an applicable RevisionPlan, ReviewCoordination dispatch a new RevisionAttempt, and the completed attempt create a new OptimizerState revision.
          ja: recovery は FeedbackRouting が RevisionPlan を select し ReviewCoordination が new RevisionAttempt を dispatch し completion 後 new OptimizerState revision を作ります。
        family_concept_ids:
          - FeedbackRouting
          - RevisionPlan
          - RevisionAttempt
          - OptimizerState
        relation_ids:
          - FeedbackRouting-selects-RevisionPlan
          - ReviewCoordination-dispatches-ImprovementAttempt
          - RevisionAttempt-coordinates-CorrectionActivity
          - ImprovementAttempt-updates-OptimizerState
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-improvement-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐根反例复核五个身份轴：ImprovementActivity 以 activity ID、时间和状态发生；ImprovementControlSpecification 可在无任何运行时先发布；ImprovementRole 可由不同人或模型承担且暂时无人承担；ImprovementState 是某时点快照，不是写入它的活动；ControlLineageRecord 只有在来源尝试、证据、StopCondition 与决定均被固化时成立，普通状态快照并不自动拥有该链。
            en: "Root-by-root counterexample review covers five identity axes: ImprovementActivity occurs with activity ID, time, and status; ImprovementControlSpecification can be published before any run; ImprovementRole can have replaceable or temporarily absent bearers; ImprovementState is a point-in-time snapshot rather than the activity that wrote it; ControlLineageRecord exists only when source attempt, evidence, StopCondition, and decision are fixed, which an ordinary state snapshot does not guarantee."
            ja: 根ごとの反証確認は五つの identity axis を扱います。ImprovementActivity は activity ID・time・status で発生し、ImprovementControlSpecification は実行前に公開でき、ImprovementRole は担い手を交換でき一時的に不在でもよく、ImprovementState は書込 activity ではなく時点 snapshot です。ControlLineageRecord は source attempt・evidence・StopCondition・decision が固定された時だけ成立し、通常 state snapshot はその chain を保証しません。
        - reviewer_id: moonweave-improvement-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体反例确认 ImprovementActivity、ImprovementControlSpecification、ImprovementRole、ImprovementState、ControlLineageRecord 均不能互为 is_a：review-assignment-security@3 无 start/status，review-run-18 无可复用 revision，reviewer-model-3 是角色承担者而非 ImprovementRole，revision-attempt-1 是活动而非 ImprovementState，optimizer-state-loop-42#3 缺少不可变决定证据链而非 ControlLineageRecord。因此现有 controls、governs、updates、records 均不足以成为全称主父。
            en: "Ontology counterexamples show that ImprovementActivity, ImprovementControlSpecification, ImprovementRole, ImprovementState, and ControlLineageRecord cannot be mutual is_a parents: review-assignment-security@3 has no start/status, review-run-18 has no reusable revision, reviewer-model-3 is a role bearer rather than ImprovementRole, revision-attempt-1 is an activity rather than ImprovementState, and optimizer-state-loop-42#3 lacks the immutable decision-evidence chain of ControlLineageRecord. Existing controls, governs, updates, and records facts are therefore not universal structural parents."
            ja: ontology の反証では ImprovementActivity・ImprovementControlSpecification・ImprovementRole・ImprovementState・ControlLineageRecord は互いの is_a 親になれません。review-assignment-security@3 は start/status を持たず、review-run-18 は reusable revision を持たず、reviewer-model-3 は ImprovementRole ではなく role bearer、revision-attempt-1 は ImprovementState ではなく activity、optimizer-state-loop-42#3 は ControlLineageRecord の immutable decision-evidence chain を欠きます。既存 controls・governs・updates・records は全称 structural parent ではありません。
        - reviewer_id: moonweave-improvement-evidence-reviewer
          reviewer_role: schema
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 三语证据复核逐一保留 ImprovementActivity、ImprovementControlSpecification、ImprovementRole、ImprovementState 与 ControlLineageRecord 的正例和上述边界反例，并将 LangGraph 运行/状态与 PROV 活动/实体证据绑定到具体对象；不以“改进”共享词干推导父关系。
            en: Trilingual evidence review preserves the positive cases and foregoing boundary counterexamples for ImprovementActivity, ImprovementControlSpecification, ImprovementRole, ImprovementState, and ControlLineageRecord and binds LangGraph runtime/state and PROV activity/entity evidence to the concrete objects; a shared “improvement” stem never determines parentage.
            ja: 三言語 evidence review は ImprovementActivity・ImprovementControlSpecification・ImprovementRole・ImprovementState・ControlLineageRecord の正例と上記境界反証を保持し、LangGraph runtime/state と PROV activity/entity evidence を具体 object に結びます。共通 “improvement” 語幹から親関係を推論しません。
