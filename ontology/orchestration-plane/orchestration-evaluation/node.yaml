schema: moonweave.ai/ontology-node/v1
id: orchestration-evaluation
kind: module
labels:
  zh: 改进循环编排与控制
  en: Improvement-loop orchestration and control
  ja: 改善ループの編成と制御
semantics:
  short_definition:
    zh: 改进循环编排描述“评价—反馈—修订—再评价”如何按轮次推进以及何时停止或重试。
    en: Improvement-loop orchestration describes how evaluate–feedback–revise–re-evaluate progresses in rounds and when to stop or retry.
    ja: 改善ループ編成は、評価・フィードバック・修訂・再評価が round 単位でどう進み、いつ停止または再試行するかを表します。
  definition:
    zh: 本模块五个根承担不同职责：ImprovementActivity 表示有时界的循环、轮次或协调发生；ImprovementControlSpecification 表示可复用评审分配与控制规则；ImprovementRole（EvaluatorOptimizer 等）表示循环内决策或执行职责；ImprovementState 表示版本化优化状态；ControlLineageRecord 保存从反馈和条件求值到停止/重试/继续决定的不可变证据链。EvaluationRun、Metric、Feedback、RevisionPlan 与 CorrectionActivity 只被引用，不在此复制。LangGraph evaluator-optimizer 与 interrupt/resume、代码审查循环、test-fix-verify 周期是常见工程映射。
    en: "This module's five roots have distinct responsibilities: ImprovementActivity is a time-bounded loop, round, or coordination occurrence; ImprovementControlSpecification is reusable review-assignment and control rules; ImprovementRole (EvaluatorOptimizer, etc.) is decision or execution duty within a loop; ImprovementState is versioned optimization state; ControlLineageRecord preserves immutable evidence from feedback and condition evaluation to stop, retry, or continue decisions. EvaluationRun, Metric, Feedback, RevisionPlan, and CorrectionActivity are referenced, not copied. LangGraph evaluator-optimizer and interrupt/resume, code review loops, and test-fix-verify cycles are common engineering mappings."
    ja: 本モジュールの五根は ImprovementActivity（loop・round 発生）、ImprovementControlSpecification（再利用制御規則）、ImprovementRole（EvaluatorOptimizer 等）、ImprovementState（版管理状態）、ControlLineageRecord（stop/retry/continue 証拠系譜）です。EvaluationRun・Metric・Feedback・RevisionPlan・CorrectionActivity は参照のみ複製しません。LangGraph evaluator-optimizer・interrupt/resume、code review loop、test-fix-verify cycle が一般的な写像です。
  why_needed:
    zh: 没有可审计的循环控制记录，团队无法解释“为什么在第三轮停止”“用了哪版修订计划”或“拒绝评价后谁负责下一轮”。
    en: Without auditable loop control records, teams cannot explain why a loop stopped on round three, which revision plan was applied, or who owned the next round after a rejected evaluation.
    ja: 監査可能な loop 制御記録がなければ、第三 round でなぜ停止したか、どの revision plan を適用したか、reject 後誰が次 round を担ったか説明できません。
  includes:
    - zh: ImprovementLoop、ImprovementAttempt、ImprovementCoordinationActivity 及 EvaluatorOptimizerLoop、ReviewRevisionLoop 等可判定循环类型。
      en: ImprovementLoop, ImprovementAttempt, ImprovementCoordinationActivity, and testable loop types such as EvaluatorOptimizerLoop and ReviewRevisionLoop.
      ja: ImprovementLoop・ImprovementAttempt・ImprovementCoordinationActivity と EvaluatorOptimizerLoop・ReviewRevisionLoop 等の判定可能 loop 型。
    - zh: ReviewAssignment 规范、EvaluatorOptimizer 职责、OptimizerState 版本化状态、StopRetryLineage 停止/重试控制谱系。
      en: ReviewAssignment specifications, EvaluatorOptimizer duties, versioned OptimizerState, and StopRetryLineage stop/retry control lineage.
      ja: ReviewAssignment 仕様、EvaluatorOptimizer 責務、OptimizerState 版管理、StopRetryLineage stop/retry 系譜。
  excludes:
    - zh: "EvaluationRun、EvaluationSpecification、Metric、Measurement（owner: feedback-metrics-evaluation）；本模块引用评价数据，不拥有度量内容。"
      en: "EvaluationRun, EvaluationSpecification, Metric, and Measurement (owner: feedback-metrics-evaluation); this module references evaluation data without owning metric content."
      ja: "EvaluationRun・EvaluationSpecification・Metric・Measurement（owner: feedback-metrics-evaluation）。評価データは参照のみです。"
    - zh: "ReviewActivity、CorrectionActivity、Feedback、RevisionPlan（owner: feedback-review-optimization）；循环控制引用修订内容，不复制反馈正文。"
      en: "ReviewActivity, CorrectionActivity, Feedback, and RevisionPlan (owner: feedback-review-optimization); loop control references revision content without copying feedback body."
      ja: "ReviewActivity・CorrectionActivity・Feedback・RevisionPlan（owner: feedback-review-optimization）。loop 制御は修訂内容を参照し feedback 本文を複製しません。"
    - zh: "通用 StopCondition、Route、RetryPolicy（owner: orchestration-routing-control）；ImprovementLoop 的 terminates_on 引用停止条件，不拥有路由规范。"
      en: "Generic StopCondition, Route, and RetryPolicy (owner: orchestration-routing-control); ImprovementLoop terminates_on references stop conditions without owning routing specifications."
      ja: "汎用 StopCondition・Route・RetryPolicy（owner: orchestration-routing-control）。ImprovementLoop terminates_on は停止条件を参照し routing 仕様を所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 LangGraph evaluator-optimizer 循环（generate→evaluate→revise 直到满足 success criteria）、LangGraph interrupt/resume 人工批准门（approve/reject 驱动 continue/stop）、代码审查循环（PR review→fix→re-review）、以及 test-fix-verify 周期（test fail→patch→retest）。ImprovementControlSpecification 与 StopCondition 配置是规范；一次 EvaluationAttempt、RevisionAttempt、interrupt resume 值或 CI 重跑是发生事实。Human-in-the-loop interrupt 提供可暂停 Gate 证据，但不自动创建 ToolApprovalGate 授权记录。
    en: "Integrations should map LangGraph evaluator-optimizer loops (generate→evaluate→revise until success criteria), LangGraph interrupt/resume human approval gates (approve/reject driving continue/stop), code review loops (PR review→fix→re-review), and test-fix-verify cycles (test fail→patch→retest) separately. ImprovementControlSpecification and StopCondition configuration are specifications; one EvaluationAttempt, RevisionAttempt, interrupt resume value, or CI rerun is an occurrence. Human-in-the-loop interrupt supplies pausable gate evidence but does not automatically create ToolApprovalGate authorization records."
    ja: 統合では LangGraph evaluator-optimizer loop、interrupt/resume 人工 approve gate、code review loop、test-fix-verify cycle を個別に写像します。ImprovementControlSpecification と StopCondition 設定は仕様、EvaluationAttempt・RevisionAttempt・interrupt resume 値・CI 再実行は発生事実です。human-in-the-loop interrupt は一時停止 gate 証拠を提供しますが ToolApprovalGate 認可記録を自動生成しません。
  typical_input:
    - description: LangGraph evaluator-optimizer loop with explicit success criteria.
      format: |
        from langgraph.graph import StateGraph

        def generate(state):
            return {"draft": llm.invoke(state["prompt"])}

        def evaluate(state):
            score = scorer(state["draft"])
            return {"score": score, "feedback": critique(state["draft"])}

        def revise(state):
            return {"draft": llm.invoke(state["prompt"] + state["feedback"])}

        def should_continue(state):
            return "accept" if state["score"] >= 0.9 else "revise"

        builder.add_node("generate", generate)
        builder.add_node("evaluate", evaluate)
        builder.add_node("revise", revise)
        builder.add_conditional_edges("evaluate", should_continue, {"revise": "revise", "accept": END})
      source_claims: [claim-orchestration-evaluation-langgraph]
    - description: LangGraph interrupt/resume for human approve or reject gate.
      format: |
        from langgraph.types import interrupt, Command

        def human_review_gate(state):
            decision = interrupt({"kind": "review", "artifact": state["draft"]})
            if decision == "approve":
                return Command(goto="__end__")
            if decision == "reject":
                return Command(goto="revise")
            return Command(goto="escalate")
      source_claims: [claim-orchestration-evaluation-langgraph]
    - description: Code review loop coordinating review, fix, and re-review attempts.
      format: |
        # PR workflow: open → review → changes_requested → fix → re-review → approve
        improvement_loop_id: code-review-loop-42
        rounds:
          - evaluation_attempt: review-42-1  # result: changes_requested
          - revision_attempt: fix-42-2       # applies finding-4
          - evaluation_attempt: review-42-3  # result: approve
      source_claims: [claim-orchestration-evaluation-design]
    - description: Test-fix-verify cycle driven by failing CI then patch and retest.
      format: |
        # CI loop
        1. pytest → FAIL (test_auth_token_expiry)
        2. RevisionAttempt patch-884 applies fix-auth-884
        3. pytest → PASS
        4. ImprovementLoop terminates_on quality-gate@3 with result=true
      source_claims: [claim-orchestration-evaluation-design]
  typical_output:
    - description: Moonweave-local improvement loop with rounds, applied revision, and termination evidence.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "improvement_activity_id": "report-quality-loop-42",
          "controller_role_ref": "evaluator-optimizer:report-quality",
          "round_count": 3,
          "applied_revision_plan_ref": "add-citation-plan@2",
          "stop_condition_ref": "quality-threshold@4",
          "observed_value": 0.93,
          "termination_action": "stop-success"
        }
      source_claims: [claim-orchestration-evaluation-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer loops, interrupt/resume human-in-the-loop gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative task refinement and review cycles in crews.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Agent loops with tool-based evaluation and revision steps.
    - name: ReAct
      url: https://arxiv.org/abs/2210.03629
      description: Observation-driven replanning informing evaluation attempts.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 改进循环模块的稳定标识，不是某次 ImprovementLoop 或 EvaluationAttempt 的标识。
        en: Stable identifier of the improvement-loop module, not an ImprovementLoop or EvaluationAttempt identifier.
        ja: 改善ループモジュールの安定識別子であり、ImprovementLoop や EvaluationAttempt の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-evaluation$'
      example_value: orchestration-evaluation
      allowed_values: []
      source_claims: [claim-orchestration-evaluation-design]
    - id: control_content_boundary
      labels: {zh: 控制/内容边界, en: Control/content boundary, ja: 制御／内容境界}
      definitions:
        zh: 声明 ImprovementControlSpecification/StopCondition 为可复用规范，ImprovementActivity/ControlLineageRecord 为循环控制发生事实，Feedback/RevisionPlan 为引用内容。
        en: States that ImprovementControlSpecification and StopCondition are reusable specifications, ImprovementActivity and ControlLineageRecord are loop-control occurrences, and Feedback/RevisionPlan are referenced content.
        ja: ImprovementControlSpecification・StopCondition は再利用仕様、ImprovementActivity・ControlLineageRecord は loop 制御発生事実、Feedback/RevisionPlan は参照内容であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: control-vs-feedback
      allowed_values: [control-vs-feedback]
      source_claims: [claim-orchestration-evaluation-design]
  constraints:
    - id: loop-termination-requires-evaluated-condition
      severity: error
      expression_language: plain
      expression: ImprovementLoop termination must record an evaluated StopCondition with observed value and verdict via ControlLineageRecord; configured but false or unevaluated conditions cannot be termination causes.
      explanation:
        zh: 配置可用不等于实际终止原因。
        en: Configuration availability is not an actual termination cause.
        ja: 設定上の可用性は実際の終了原因ではありません。
      source_claims: [claim-orchestration-evaluation-langgraph, claim-orchestration-evaluation-design]
    - id: attempt-membership-by-round-not-proximity
      severity: error
      expression_language: plain
      expression: ImprovementAttempt membership in an ImprovementLoop must be proven by contains_attempt with round_index and loop ownership; temporal proximity alone is insufficient.
      explanation:
        zh: 时间邻近不能把无关活动拼成同一轮。
        en: Temporal proximity cannot join unrelated activities into one round.
        ja: 時間的近接だけでは無関係活動を同一 round に結合できません。
      source_claims: [claim-orchestration-evaluation-design]
    - id: applied-revision-not-configured-only
      severity: warning
      expression_language: plain
      expression: ImprovementLoop-uses_revision-RevisionPlan must reference the revision plan revision actually applied in a RevisionAttempt, not merely configured as available.
      explanation:
        zh: 可用修订计划不等于已应用修订计划。
        en: An available revision plan is not an applied revision plan.
        ja: 利用可能 revision plan は適用済み revision plan ではありません。
      source_claims: [claim-orchestration-evaluation-design]
  required_relations:
    - id: evaluation-module-organizes-improvement-control-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: ImprovementControlSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 ImprovementControlSpecification 控制规范链。
        en: The module organizes at least one ImprovementControlSpecification control chain.
        ja: モジュールは少なくとも一つの ImprovementControlSpecification 制御連鎖を組織します。
      source_claims: [claim-orchestration-evaluation-design]
    - id: evaluation-module-records-improvement-activity
      direction: outgoing
      predicate: records
      target_concept_id: ImprovementActivity
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块通过 ImprovementActivity 记录实际改进循环发生，而不把 ReviewAssignment 本身当作循环。
        en: The module records actual improvement-loop occurrences through ImprovementActivity rather than treating ReviewAssignment itself as a loop.
        ja: モジュールは ReviewAssignment 自体を loop とせず、ImprovementActivity を通じ実際の改善 loop 発生を記録します。
      source_claims: [claim-orchestration-evaluation-design]
examples:
  - id: orchestration-evaluation-example-langgraph-evaluator-optimizer
    labels:
      zh: LangGraph evaluator-optimizer 第三轮满足阈值停止
      en: LangGraph evaluator-optimizer stops on round three threshold
      ja: LangGraph evaluator-optimizer が第三 round で threshold 満足停止
    descriptions:
      zh: report-quality-loop-42 在 evaluator-optimizer:report-quality 控制下经历三轮 generate→evaluate→revise；第二轮应用 add-citation-plan@2，第三轮 quality-threshold@4 求值 0.93≥0.90 后 ImprovementLoop 以 stop-success 终止。
      en: report-quality-loop-42 runs three generate→evaluate→revise rounds under evaluator-optimizer:report-quality; round two applies add-citation-plan@2, and round three stops with stop-success after quality-threshold@4 evaluates 0.93 against 0.90.
      ja: report-quality-loop-42 は evaluator-optimizer:report-quality 下で三 round generate→evaluate→revise を実行。第二 round で add-citation-plan@2 を適用し、第三 round で quality-threshold@4 が 0.93≥0.90 となり stop-success で終了します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator-optimizer workflow pattern
    field_values:
      framework: langgraph
      improvement_activity_id: report-quality-loop-42
      controller_role_ref: evaluator-optimizer:report-quality
      attempt_refs:
        - evaluation-42-1
        - revision-42-2
        - evaluation-42-3
      round_indices:
        - 1
        - 2
        - 3
      revision_plan_ref: add-citation-plan@2
      stop_condition_ref: quality-threshold@4
      observed_value: 0.93
      threshold: 0.9
      condition_result: true
      termination_action: stop-success
    related_node_ids:
      - ImprovementLoop
      - EvaluatorOptimizerLoop
      - ImprovementAttempt
      - EvaluatorOptimizer
      - StopCondition
    related_relation_ids:
      - ImprovementLoop-contains_attempt-ImprovementAttempt
      - EvaluatorOptimizer-controls-ImprovementLoop
      - ImprovementLoop-uses_revision-RevisionPlan
      - ImprovementLoop-terminates_on-StopCondition
    source_claims:
      - claim-orchestration-evaluation-langgraph
      - claim-orchestration-evaluation-design
  - id: orchestration-evaluation-example-langgraph-interrupt-approve
    labels:
      zh: LangGraph interrupt 人工批准门
      en: LangGraph interrupt human approval gate
      ja: LangGraph interrupt 人工 approve gate
    descriptions:
      zh: "human_review_gate 对 draft-report@8 调用 interrupt({\"kind\": \"review\"})；审批者返回 approve 后 ControlLineageRecord lineage-884 记录 continue→stop-success，返回 reject 则驱动 RevisionAttempt revision-884 进入 revise 分支。"
      en: "human_review_gate calls interrupt({\"kind\": \"review\"}) on draft-report@8; approver returns approve and ControlLineageRecord lineage-884 records continue→stop-success, while reject drives RevisionAttempt revision-884 into the revise branch."
      ja: "human_review_gate が draft-report@8 に interrupt({\"kind\": \"review\"}) を呼び、approve なら ControlLineageRecord lineage-884 が continue→stop-success を記録、reject なら RevisionAttempt revision-884 が revise branch へ進みます。"
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: interrupt/resume — human-in-the-loop gates
    field_values:
      framework: langgraph
      interrupt_kind: review
      artifact_ref: draft-report@8
      human_decision_approve: approve
      human_decision_reject: reject
      lineage_approve_id: lineage-884
      revision_attempt_id: revision-884
      termination_on_approve: stop-success
      continuation_on_reject: revise
    related_node_ids:
      - ImprovementLoop
      - ImprovementAttempt
      - RevisionAttempt
      - ControlLineageRecord
      - EvaluatorOptimizer
    related_relation_ids:
      - ImprovementLoop-contains_attempt-ImprovementAttempt
      - ControlLineageRecord-records-StopRetryLineage
    source_claims:
      - claim-orchestration-evaluation-langgraph
      - claim-orchestration-evaluation-design
  - id: orchestration-evaluation-example-code-review-loop
    labels:
      zh: 代码审查 review-fix-rereview 循环
      en: Code review review-fix-rereview loop
      ja: コード review の review-fix-rereview loop
    descriptions:
      zh: ReviewRevisionLoop code-review-loop-42 第一轮 EvaluationAttempt review-42-1 得到 changes_requested 并引用 finding-4；RevisionAttempt fix-42-2 协调 correction-run-9 产生 OptimizerState state@7；第二轮 review-42-3 批准后 loop 终止。
      en: ReviewRevisionLoop code-review-loop-42 has EvaluationAttempt review-42-1 with changes_requested referencing finding-4; RevisionAttempt fix-42-2 coordinates correction-run-9 producing OptimizerState state@7; round-two review-42-3 approval terminates the loop.
      ja: ReviewRevisionLoop code-review-loop-42 は EvaluationAttempt review-42-1 で changes_requested（finding-4 参照）、RevisionAttempt fix-42-2 で correction-run-9 が OptimizerState state@7 を生成、第二 round review-42-3 approve で loop 終了します。
    example_source:
      product: GitHub pull request review workflow
      url: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/reviewing-changes-in-pull-requests
      version: review → changes requested → fix → re-review → approve
    field_values:
      framework: code-review
      improvement_activity_id: code-review-loop-42
      loop_type: ReviewRevisionLoop
      evaluation_attempt_1: review-42-1
      evaluation_result_1: changes_requested
      feedback_ref: finding-4
      revision_attempt: fix-42-2
      correction_run_ref: correction-run-9
      optimizer_state_ref: state@7
      evaluation_attempt_2: review-42-3
      evaluation_result_2: approve
      termination_action: stop-success
    related_node_ids:
      - ReviewRevisionLoop
      - ImprovementAttempt
      - EvaluationAttempt
      - RevisionAttempt
      - OptimizerState
      - ImprovementRole
    related_relation_ids:
      - ImprovementLoop-contains_attempt-ImprovementAttempt
      - RevisionAttempt-produces-OptimizerState
    source_claims:
      - claim-orchestration-evaluation-design
  - id: orchestration-evaluation-example-test-fix-verify
    labels:
      zh: test-fix-verify CI 循环
      en: test-fix-verify CI cycle
      ja: test-fix-verify CI cycle
    descriptions:
      zh: test-fix-loop-18 第一轮 EvaluationAttempt test-run-18-1 观测 pytest FAIL（test_auth_token_expiry）；RevisionAttempt patch-884 应用 fix-auth-884 后 test-run-18-2 PASS，quality-gate@3 求值 true，ImprovementLoop 终止。
      en: test-fix-loop-18 round-one EvaluationAttempt test-run-18-1 observes pytest FAIL (test_auth_token_expiry); after RevisionAttempt patch-884 applies fix-auth-884, test-run-18-2 PASS and quality-gate@3 evaluates true, terminating ImprovementLoop.
      ja: test-fix-loop-18 の EvaluationAttempt test-run-18-1 は pytest FAIL（test_auth_token_expiry）を観測。RevisionAttempt patch-884 が fix-auth-884 適用後 test-run-18-2 が PASS し quality-gate@3=true で ImprovementLoop 終了します。
    example_source:
      product: CI test-fix-verify pattern
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: fail → patch → retest → pass
    field_values:
      framework: ci-test-fix-verify
      improvement_activity_id: test-fix-loop-18
      evaluation_attempt_1: test-run-18-1
      test_result_1: FAIL
      failing_test: test_auth_token_expiry
      revision_attempt: patch-884
      fix_ref: fix-auth-884
      evaluation_attempt_2: test-run-18-2
      test_result_2: PASS
      stop_condition_ref: quality-gate@3
      condition_result: true
    related_node_ids:
      - ImprovementLoop
      - EvaluatorOptimizerLoop
      - EvaluationAttempt
      - RevisionAttempt
      - StopCondition
      - ControlLineageRecord
    related_relation_ids:
      - ImprovementLoop-contains_attempt-ImprovementAttempt
      - ImprovementLoop-terminates_on-StopCondition
      - ControlLineageRecord-records-StopRetryLineage
    source_claims:
      - claim-orchestration-evaluation-design
  - id: orchestration-evaluation-example-false-timeout-counter
    labels:
      zh: 未求值的 timeout 配置不得作为终止原因
      en: Unevaluated timeout config must not be termination cause
      ja: 未評価 timeout 設定を終了原因にしてはならない
    descriptions:
      zh: report-quality-loop-43 可访问 timeout@1 但 observed 41s/阈值 60s 且 result=false；实际因 human-cancel-event-7 终止。不得返回 timeout@1 为 terminates_on 原因，应标记 terminates_on_timeout_fact_present=false。
      en: report-quality-loop-43 can access timeout@1 but observes 41s/60s with result=false; it actually ends via human-cancel-event-7. timeout@1 must not be returned as terminates_on cause; terminates_on_timeout_fact_present=false must be flagged.
      ja: report-quality-loop-43 は timeout@1 を参照可能ですが 41s/60s で result=false、実際は human-cancel-event-7 で終了。timeout@1 を terminates_on 原因として返さず terminates_on_timeout_fact_present=false とします。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: termination evidence contract
    field_values:
      improvement_activity_id: report-quality-loop-43
      configured_stop_condition_ref: timeout@1
      timeout_observed_seconds: 41
      timeout_threshold_seconds: 60
      timeout_condition_result: false
      actual_termination_cause: human-cancel-event-7
      terminates_on_timeout_fact_present: false
    related_node_ids:
      - ImprovementLoop
      - StopCondition
      - ControlLineageRecord
    related_relation_ids:
      - ImprovementLoop-terminates_on-StopCondition
    source_claims:
      - claim-orchestration-evaluation-design
