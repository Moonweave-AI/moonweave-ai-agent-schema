  competency_questions:
    - id: orchestration-evaluation-cq-loop-v4
      semantic_key: orchestration-evaluation.loop-control
      primary_owner_module_id: orchestration-evaluation
      related_module_ids:
        - feedback-review-optimization
        - orchestration-routing-control
      questions:
        zh: 某次改进循环包含哪些尝试、由哪个职责角色控制、采用哪项修订计划，并因哪个条件终止？
        en: Which attempts does an improvement loop contain, which role controls it, which revision plan does it use, and which condition terminates it?
        ja: improvement loop は which attempts を含み、which role が control し、which revision plan を使い、which condition で terminate しますか。
      query: Resolve one ImprovementLoop, its ordered ImprovementAttempts, controlling EvaluatorOptimizer, applied RevisionPlan, and evaluated terminating StopCondition.
      expected_assertion: Every attempt belongs to that loop, the role has explicit authority, the plan is actually applied, and the named condition is the recorded termination cause.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - ImprovementLoop
          - ImprovementAttempt
          - EvaluatorOptimizer
        related_concept_ids:
          - RevisionPlan
          - StopCondition
        relation_ids:
          - ImprovementLoop-uses_revision-RevisionPlan
          - ImprovementLoop-terminates_on-StopCondition
        not_applicable_reason: null
      positive_example_ids:
        - orchestration-evaluation-cq-loop-v4-example-positive
      counterexample_ids:
        - orchestration-evaluation-cq-loop-v4-example-counter
      source_claims:
        - claim-orchestration-evaluation-001
        - claim-orchestration-evaluation-002
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-improvement-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本模块只拥有改进循环的控制活动、控制规范、职责角色、状态和谱系；评价、反馈、修订计划与纠正内容保留给反馈域。
              en: This module owns only improvement-loop control activities, control specifications, responsibility roles, state, and lineage; evaluation, feedback, revision plans, and correction content remain feedback-owned.
              ja: 本 module は improvement-loop control activity・specification・role・state・lineage のみを所有し evaluation・feedback・revision plan・correction content は feedback domain に残します。
          - reviewer_id: moonweave-improvement-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 五个真实根和十三条 is_a 主干已逐点核实；包含、控制、路由、时序、更新和谱系引用均为交叉事实。
              en: Five real roots and thirteen is_a backbone edges were checked point by point; containment, control, routing, order, updates, and lineage references remain cross-facts.
              ja: five real roots・thirteen is_a backbone edges を個別確認し containment・control・routing・order・update・lineage ref は cross-facts とします。
          - reviewer_id: moonweave-improvement-evidence-reviewer
            reviewer_role: schema
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 四个能力问题、八个正反场景、交互面和相邻模块边界均已绑定官方一手资料与精确关系。
              en: Four competency questions, eight paired cases, interaction facets, and neighboring-module boundaries are bound to primary official evidence and exact relations.
              ja: four competency questions・eight paired cases・interaction facets・neighbor boundaries を official primary evidence/exact relations に結びました。
    - id: orchestration-evaluation-cq-attempt-v4
      semantic_key: orchestration-evaluation.attempt-transition
      primary_owner_module_id: orchestration-evaluation
      related_module_ids:
        - feedback-metrics-evaluation
        - feedback-review-optimization
      questions:
        zh: 某轮评价尝试协调了哪个评价运行、为何先于哪次修订尝试、该修订协调了哪项纠正，以及尝试产生了哪个状态版本？
        en: Which evaluation run did a round coordinate, why did it precede a particular revision attempt, which correction did that revision coordinate, and which state revision did the attempt create?
        ja: round evaluation は which run を coordinate し why which revision に precede し、その revision は which correction を coordinate し which state revision を作りましたか。
      query: Trace EvaluationAttempt to EvaluationRun, temporal successor RevisionAttempt, coordinated CorrectionActivity, and the immutable OptimizerState revision produced by the attempt.
      expected_assertion: Control attempts remain distinct from feedback-owned execution activities, ordering is run-specific, and the new state revision names its source attempt and predecessor.
