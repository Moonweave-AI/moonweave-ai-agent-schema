schema: moonweave.ai/ontology-node/v1
id: orchestration-evaluation
kind: module
status: review
labels:
  zh: 改进循环编排与控制
  en: Improvement-loop orchestration and control
  ja: 改善ループの編成と制御
semantics:
  short_definition:
    zh: 组织“评价—反馈—修订—再评价”怎样按轮次推进。它记录改进活动、控制规范、循环内职责、版本化状态和控制决定谱系，回答何时开始下一轮、由谁行动、为什么选定某个修订方案，以及为什么继续、停止或重试；评价数据和纠正内容由反馈域拥有。
    en: Organizes how evaluation, feedback, revision, and re-evaluation progress in rounds. It records improvement activities, control specifications, loop-specific roles, versioned state, and control-decision lineage, answering when another round starts, who acts, why a revision plan was selected, and why the loop continues, stops, or retries. Evaluation data and correction content remain feedback-owned.
    ja: 「評価・フィードバック・修訂・再評価」がどのように round 単位で進むかを編成します。改善活動・制御仕様・ループ内役割・版管理状態・制御判断系譜を記録し、次 round の開始時点・実行者・修訂案の選択理由・継続／停止／再試行理由を回答します。評価データと修正内容は feedback 域が所有します。
  definition:
    zh: 本模块的五个直属根分别承担不同职责：ImprovementActivity 表示一次有时界的循环、轮次或协调发生；ImprovementControlSpecification 表示可复用的评审分配与控制规则；ImprovementRole 表示循环内决策或执行职责；ImprovementState 表示某一版本的优化状态；ControlLineageRecord 保存从反馈和条件求值到路由、重试或停止决定的不可变证据链。EvaluationRun、Metric、Feedback、RevisionPlan 与 CorrectionActivity 只被引用，不在此复制。
    en: The five direct roots have distinct responsibilities. ImprovementActivity represents a time-bounded loop, round, or coordination occurrence; ImprovementControlSpecification represents reusable review-assignment and control rules; ImprovementRole represents decision or execution duties within a loop; ImprovementState represents a versioned optimization state; and ControlLineageRecord preserves immutable evidence from feedback and condition evaluation to a routing, retry, or stop decision. EvaluationRun, Metric, Feedback, RevisionPlan, and CorrectionActivity are referenced rather than copied.
    ja: 五つの直下根は異なる責務を持ちます。ImprovementActivity は時間範囲を持つ loop・round・coordination の発生、ImprovementControlSpecification は再利用可能な review assignment と制御規則、ImprovementRole は loop 内の判断・実行責務、ImprovementState は版管理された最適化状態、ControlLineageRecord は feedback と条件評価から routing・retry・stop 判断までの不変証拠系譜を表します。EvaluationRun・Metric・Feedback・RevisionPlan・CorrectionActivity は複製せず参照します。
  why_needed:
    zh: 把零散的评价和修改连成可审计的改进过程，避免仅凭时间相邻就把两次无关活动拼成同一轮，也避免把反馈内容与循环控制混为一类。
    en: Connects separate evaluation and revision facts into an auditable improvement process without joining unrelated nearby activities into one round or conflating feedback content with loop control.
    ja: 個別の評価・修訂事実を監査可能な改善過程へ結び、時間的近接だけで無関係な活動を同一 round に結合したり、feedback 内容と loop 制御を混同したりすることを防ぎます。
  includes:
    - zh: 循环、尝试与协调活动的任意深度 is_a 树，以及评价器—优化器和评审—修订两类可判定循环。
      en: The arbitrary-depth is_a tree for loops, attempts, and coordination activities, including testable evaluator-optimizer and review-revision loops.
      ja: loop・attempt・coordination activity の arbitrary-depth is_a tree と evaluator-optimizer/review-revision loops。
    - zh: 评审任务规范、评价—优化职责角色、版本化优化状态和停止—重试控制谱系。
      en: Review-assignment specifications, evaluator-optimizer responsibility roles, versioned optimizer state, and stop-retry control lineage.
      ja: review assignment spec・evaluator-optimizer role・versioned optimizer state・stop-retry lineage。
  excludes:
    - zh: EvaluationRun、EvaluationSpecification、Metric、Measurement 和数据集切片由 feedback-metrics-evaluation 拥有。
      en: EvaluationRun, EvaluationSpecification, Metric, Measurement, and dataset slices are owned by feedback-metrics-evaluation.
      ja: EvaluationRun・EvaluationSpecification・Metric・Measurement・dataset slice は feedback-metrics-evaluation 所有です。
    - zh: ReviewActivity、CorrectionActivity、Feedback、RevisionPlan 与评审证据由 feedback-review-optimization 拥有；通用 StopCondition 由 orchestration-routing-control 拥有。
      en: ReviewActivity, CorrectionActivity, Feedback, RevisionPlan, and review evidence are owned by feedback-review-optimization; generic StopCondition is owned by orchestration-routing-control.
      ja: ReviewActivity・CorrectionActivity・Feedback・RevisionPlan・review evidence は feedback-review-optimization、generic StopCondition は orchestration-routing-control 所有です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把零散的评价和修改连成可审计的改进过程，避免仅凭时间相邻就把两次无关活动拼成同一轮，也避免把反馈内容与循环控制混为一类。
  en: Connects separate evaluation and revision facts into an auditable improvement process without joining unrelated nearby activities into one round or conflating feedback content with loop control.
  ja: 個別の評価・修訂事実を監査可能な改善過程へ結び、時間的近接だけで無関係な活動を同一 round に結合したり、feedback 内容と loop 制御を混同したりすることを防ぎます。
