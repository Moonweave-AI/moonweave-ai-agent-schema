source_claims:
  - id: claim-orchestration-evaluation-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official evaluator-optimizer pattern separates a generator occurrence from an evaluator occurrence, routes rejected output back with feedback, and stops when explicit success criteria accept the output. Moonweave uses that operational distinction for improvement loops, attempts, state, and stop control without modeling LangGraph itself as a graph node.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API treats state snapshots, executable nodes, and fixed or conditional edges as separate workflow elements. Moonweave uses this evidence to distinguish ImprovementState from ImprovementActivity and to keep containment, dispatch, updates, and termination as cross-facts rather than type parents.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-003
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure and testing criteria from distinct evaluation runs and run outputs. Moonweave uses that distinction to keep EvaluationAttempt, the feedback-owned EvaluationRun it coordinates, and reusable ReviewAssignment or RevisionPlan specifications as different objects.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-004
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-005
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure from distinct evaluation runs and run outputs. Moonweave further distinguishes the improvement-loop attempt that coordinates a run from the run resource itself.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-006
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's evaluator-optimizer pattern separates evaluator feedback, conditional routing, and repeated generator work. Moonweave projects those responsibilities through distinct feedback content, routing control, revision plan, and correction activity endpoints.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-007
    source: eng-ont-prov-o
    supports: PROV-O separates Activities from Plans and Entities and relates them through explicit usage and association facts. Moonweave likewise keeps improvement-control activities separate from feedback content, plans, review, and correction occurrences.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, usage, and association"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-008
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's evaluator-optimizer workflow routes rejected results back for another attempt and ends when explicit success criteria accept the result. Moonweave records the concrete loop termination separately from the reusable condition definition.
    locator: "Workflows and agents > Evaluator-optimizer: conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-009
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure and testing criteria from distinct evaluation runs and run outputs. Moonweave therefore treats EvaluationRun as a feedback-owned run resource while EvaluationAttempt remains the improvement-loop control occurrence that coordinates it.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-010
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's evaluator-optimizer pattern separates evaluator feedback, conditional regeneration, and the loop occurrence. Moonweave uses that evidence to keep the feedback-owned CorrectionActivity and RevisionPlan distinct from the loop-owned RevisionAttempt.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-evaluation-011
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API separates fixed or conditional routing edges from state updates and execution occurrences. Moonweave uses this evidence to keep reusable StopCondition in routing control while recording applied stop-or-retry history as improvement lineage.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
