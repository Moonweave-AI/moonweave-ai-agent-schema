      en: Evaluation and correction executions remain feedback-owned while this module coordinates them; feedback reference, non-overlapping times, and state predecessor prove one improvement chain.
      ja: evaluation/correction execution は feedback owner のままで、本 module は調整のみを行い、feedback ref、非重複時間、state predecessor が同一 improvement chain を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-evaluation-001
      - claim-orchestration-evaluation-003
