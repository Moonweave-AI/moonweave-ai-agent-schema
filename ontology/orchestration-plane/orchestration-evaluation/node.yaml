schema: moonweave.ai/ontology-node/v1
id: orchestration-evaluation
kind: module
labels:
  zh: 改进循环编排与控制
  en: Improvement-loop orchestration and control
  ja: 改善ループの編成と制御
semantics:
  short_definition:
    zh: 组织“评价—反馈—修订—再评价”怎样按轮次推进，记录 EvaluationActivity、RevisionActivity 与改进循环控制；评价数据与纠正内容由反馈域拥有。
    en: Organizes how evaluation, feedback, revision, and re-evaluation progress in rounds, recording EvaluationActivity, RevisionActivity, and improvement-loop control; evaluation data and correction content remain feedback-owned.
    ja: 評価・フィードバック・修訂・再評価が round 単位でどう進むかを編成し、EvaluationActivity、RevisionActivity、改善 loop 制御を記録します。評価データと修正内容は feedback 域が所有します。
  definition:
    zh: orchestration-evaluation 的五个直属根分别承担不同职责：ImprovementActivity 表示一次有时界的循环、轮次或协调发生；ImprovementControlSpecification 表示可复用的评审分配与控制规则；ImprovementRole 表示循环内决策或执行职责；ImprovementState 表示某一版本的优化状态；ControlLineageRecord 保存从反馈和条件求值到路由、重试或停止决定的不可变证据链。EvaluationActivity 与 RevisionActivity 是编排域对“触发评估”和“触发修订”的本地发生记录；EvaluationRun、Metric、Feedback、RevisionPlan 与 CorrectionActivity 只被引用，不在此复制。
    en: orchestration-evaluation's five direct roots have distinct responsibilities. ImprovementActivity represents a time-bounded loop, round, or coordination occurrence; ImprovementControlSpecification represents reusable review-assignment and control rules; ImprovementRole represents decision or execution duties within a loop; ImprovementState represents a versioned optimization state; ControlLineageRecord preserves immutable evidence from feedback and condition evaluation to routing, retry, or stop decisions. EvaluationActivity and RevisionActivity are orchestration-local occurrence records for triggering evaluation and revision; EvaluationRun, Metric, Feedback, RevisionPlan, and CorrectionActivity are referenced rather than copied.
    ja: 五つの直下根は異なる責務を持ち、EvaluationActivity/RevisionActivity は orchestration ローカル発生記録です。EvaluationRun/Metric/Feedback 等は参照のみです。
  why_needed:
    zh: 把零散的评价和修改连成可审计的改进过程，避免仅凭时间相邻就把两次无关活动拼成同一轮，也避免把反馈内容与循环控制混为一类。
    en: Connects separate evaluation and revision facts into an auditable improvement process without joining unrelated nearby activities into one round or conflating feedback content with loop control.
    ja: 個別の評価・修訂事実を監査可能な改善過程へ結び、feedback 内容と loop 制御を混同しません。
  includes:
    - zh: ImprovementActivity 族（ImprovementLoop、ImprovementAttempt、ImprovementCoordinationActivity）及 evaluator-optimizer/review-revision 循环。
      en: ImprovementActivity family (ImprovementLoop, ImprovementAttempt, ImprovementCoordinationActivity) and evaluator-optimizer/review-revision loops.
      ja: ImprovementActivity 族と evaluator-optimizer/review-revision loop。
    - zh: EvaluationActivity、RevisionActivity 及 ImprovementControlSpecification、ImprovementRole、ImprovementState、ControlLineageRecord。
      en: EvaluationActivity, RevisionActivity, ImprovementControlSpecification, ImprovementRole, ImprovementState, and ControlLineageRecord.
      ja: EvaluationActivity、RevisionActivity、ImprovementControlSpecification、ImprovementRole、ImprovementState、ControlLineageRecord。
  excludes:
    - zh: EvaluationRun、Metric、Score、Feedback、RevisionPlan、CorrectionActivity（feedback 域）；generic StopCondition（routing-control 域）。
      en: EvaluationRun, Metric, Score, Feedback, RevisionPlan, CorrectionActivity (feedback domain); generic StopCondition (routing-control domain).
      ja: EvaluationRun/Metric/Score/Feedback 等（feedback 域）、generic StopCondition（routing-control 域）。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 编排实现只在边界创建 EvaluationActivity/RevisionActivity，封存 trigger_ref、evaluation_run_ref 或 revision_plan_ref、round_id 与 execution_binding_ref；反馈域拥有 rubric、score 与 correction 内容。LangGraph 循环与 OpenAI evaluator Agent 是 binding 来源，不重命名为 EvaluationActivity。
    en: Orchestration creates EvaluationActivity/RevisionActivity only at boundaries, sealing trigger_ref, evaluation_run_ref or revision_plan_ref, round_id, and execution_binding_ref; the feedback domain owns rubrics, scores, and correction content. LangGraph loops and OpenAI evaluator Agents are binding sources and are not renamed as EvaluationActivity.
    ja: orchestration は境界でのみ EvaluationActivity/RevisionActivity を作成し trigger_ref/evaluation_run_ref/round_id/execution_binding_ref を固定します。rubric/score/correction は feedback 域が所有します。
  typical_input:
    - description: Trigger evaluation after a workflow step completes
      format: |-
        evaluation_activity = record_evaluation(trigger_ref="step:review@2", evaluation_run_ref="eval-run-44", round_id="round-3")
    - description: Trigger revision from feedback routing
      format: |-
        revision_activity = record_revision(trigger_ref="feedback:fb-19", revision_plan_ref="plan-revise-intro@v1", round_id="round-3")
  typical_output:
    - description: Local orchestration activity bound to feedback references
      format: |-
        {"evaluation_activity_id":"eval-act-44","evaluation_run_ref":"eval-run-44","round_id":"round-3","execution_binding_ref":"langgraph:node:evaluate","completion_disposition":"completed"}
  reference_implementations:
    - name: LangGraph iterative workflows
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents evaluator-optimizer and review-revision workflow patterns.
    - name: OpenAI Agents SDK running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner execution used as binding for orchestration activities.
  source_claims:
    - claim-orchestration-evaluation-module
    - claim-orchestration-evaluation-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识改进循环编排模块。
        en: Stably identifies the improvement-loop orchestration module.
        ja: 改善 loop 編成モジュールを安定して識別します。
      allowed_values: [orchestration-evaluation]
      example_value: orchestration-evaluation
      source_claims: [claim-orchestration-evaluation-module]
    - id: activity_roots
      labels:
        zh: 活动根概念
        en: activity root concepts
        ja: 活動根概念
      datatype: array[string]
      required: true
      cardinality: {min: 2, max: null}
      definitions:
        zh: 列出记录已发生评估或修订触发的根概念。
        en: Lists roots recording occurred evaluation or revision triggers.
        ja: 発生した評価または修訂 trigger を記録する根を列挙します。
      example_value: '["EvaluationActivity","RevisionActivity","ImprovementActivity"]'
      source_claims: [claim-orchestration-evaluation-module]
    - id: control_roots
      labels:
        zh: 控制根概念
        en: control root concepts
        ja: 制御根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出改进循环控制与谱系根概念。
        en: Lists improvement-loop control and lineage roots.
        ja: 改善 loop 制御と系譜根を列挙します。
      example_value: '["ImprovementControlSpecification","ControlLineageRecord"]'
      source_claims: [claim-orchestration-evaluation-module]
  constraints:
    - id: orchestration-evaluation-trigger-not-content
      expression: EvaluationActivity and RevisionActivity record orchestration triggers and bindings; they do not copy EvaluationRun scores, Feedback text, or RevisionPlan content from the feedback domain.
      explanation:
        zh: 编排记录“何时触发、由谁协调、绑定哪次反馈运行”；反馈域拥有评价与修正内容。
        en: Orchestration records when a trigger occurred, who coordinated it, and which feedback run is bound; the feedback domain owns evaluation and correction content.
        ja: orchestration は trigger 時点・coordination・bound feedback run を記録し、評価/修正内容は feedback 域が所有します。
      source_claims: [claim-orchestration-evaluation-boundary]
  required_relations: []
examples:
  - id: orchestration-evaluation-example-positive-eval-round
    labels:
      zh: orchestration-evaluation positive
      en: orchestration-evaluation positive
      ja: orchestration-evaluation positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 orchestration-evaluation 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for orchestration-evaluation: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) orchestration-evaluation: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {module_id: orchestration-evaluation, evaluation_activity_id: eval-act-44, evaluation_run_ref: eval-run-44, round_id: round-3}

    related_node_ids:
      - EvaluationActivity
      - ImprovementLoop
      - EvaluationRun
    related_relation_ids:
      - EvaluationActivity-triggers-EvaluationRun
    source_claims:
      - claim-orchestration-evaluation-module

  - id: orchestration-evaluation-example-counterexample-score-in-activity
    labels:
      zh: orchestration-evaluation counterexample
      en: orchestration-evaluation counterexample
      ja: orchestration-evaluation counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 orchestration-evaluation PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style orchestration-evaluation PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 orchestration-evaluation ではない。
    field_values: {module_id: orchestration-evaluation, evaluation_activity_id: eval-act-bad, evaluation_run_ref: null, overall_score: 0.82}

    related_node_ids:
      - EvaluationActivity
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-orchestration-evaluation-boundary

  - id: orchestration-evaluation-example-boundary-revision-trigger
    labels:
      zh: orchestration-evaluation boundary
      en: orchestration-evaluation boundary
      ja: orchestration-evaluation boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 orchestration-evaluation 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not orchestration-evaluation specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で orchestration-evaluation spec ではない。
    field_values: {module_id: orchestration-evaluation, revision_activity_id: rev-act-19, revision_plan_ref: "plan-revise-intro@v1", round_id: round-3}

    related_node_ids:
      - RevisionActivity
      - RevisionPlan
      - CorrectionActivity
    related_relation_ids:
      - RevisionActivity-triggers-RevisionPlan
    source_claims:
      - claim-orchestration-evaluation-boundary

  - id: orchestration-evaluation-example-instance-review-revision-loop
    labels:
      zh: orchestration-evaluation instance
      en: orchestration-evaluation instance
      ja: orchestration-evaluation instance
    descriptions:
      zh: ToT 实例：generate_thoughts(state, k=5) 返回 5 个候选 plan → evaluate 选 score 最高 → select(greedy) 写入 orchestration-evaluation 实例。
      en: ToT instance: generate_thoughts(state, k=5) yields 5 plan candidates → evaluate picks highest score → select(greedy) writes orchestration-evaluation instance.
      ja: ToT 实例 k=5 候補→evaluate→select が orchestration-evaluation 实例。
    field_values: {module_id: orchestration-evaluation, improvement_loop_id: loop-7, round_id: round-2, evaluation_activity_id: eval-act-44, revision_activity_id: rev-act-19}

    related_node_ids:
      - ReviewRevisionLoop
      - EvaluationActivity
      - RevisionActivity
      - ControlLineageRecord
    related_relation_ids:
      - ReviewRevisionLoop-includes-EvaluationActivity
    source_claims:
      - claim-orchestration-evaluation-module

