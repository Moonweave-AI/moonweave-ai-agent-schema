              zh: 四个能力问题、八个正反场景、交互面和相邻模块边界均已绑定官方一手资料与精确关系。
              en: Four competency questions, eight paired cases, interaction facets, and neighboring-module boundaries are bound to primary official evidence and exact relations.
              ja: four competency questions・eight paired cases・interaction facets・neighbor boundaries を official primary evidence/exact relations に結びました。
    - other_module_id: feedback-metrics-evaluation
      semantic_area:
        zh: 改进循环中的评价尝试与独立评价运行
        en: Evaluation attempt in an improvement loop versus independently identified evaluation run
        ja: 改善ループ内の評価試行と独立した評価実行
      candidate_concept_ids:
        - EvaluationRun
      overlap_reason:
        zh: 二者同轮出现，但前者由 loop、round 与调度身份决定，后者由数据源、评价规范和结果身份决定。
        en: They co-occur in one round, but the former is identified by loop, round, and scheduling while the latter is identified by data source, evaluation specification, and result.
        ja: same round でも former は loop/round/scheduling、latter は data source/eval spec/result で識別されます。
      disambiguation_test:
        zh: 若移除循环 ID 和轮次后对象仍是一项完整评价运行，则归反馈指标与评价；若身份必须依赖循环轮次与控制结果，则归 EvaluationAttempt。
        en: If removing loop ID and round still leaves a complete evaluation run, it belongs to feedback metrics and evaluation; if identity requires the loop round and control outcome, it belongs to EvaluationAttempt.
        ja: loop ID と round を除いても完全な評価実行なら feedback metrics/evaluation、loop round と control outcome が同一性に必要なら EvaluationAttempt です。
      result: distinct
      owner_module_id: feedback-metrics-evaluation
      source_claims:
        - claim-orchestration-evaluation-009
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-improvement-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项确认 EvaluationRun 的唯一 owner 为 feedback-metrics-evaluation；本记录不把评价运行提升为改进控制活动。
              en: Point-by-point review confirms feedback-metrics-evaluation as EvaluationRun's sole owner; this record does not promote the evaluation run into an improvement-control activity.
              ja: EvaluationRun の唯一 owner が feedback-metrics-evaluation であることを個別確認し、改善制御活動へ昇格させません。
    - other_module_id: feedback-review-optimization
      semantic_area:
        zh: 循环修订尝试与纠正活动、修订计划
        en: Loop revision attempt versus correction activity and revision plan
        ja: ループ修訂試行と訂正活動・修訂計画
      candidate_concept_ids:
        - CorrectionActivity
        - RevisionPlan
      overlap_reason:
        zh: CorrectionActivity 是实际改变内容的有时限活动，RevisionPlan 是可复用的改动规格；二者都由反馈审查域拥有，RevisionAttempt 仅在某轮改进中协调它们。
        en: CorrectionActivity is the time-bounded activity that changes content, while RevisionPlan is a reusable change specification; both are feedback-review-owned, and RevisionAttempt only coordinates them in one improvement round.
        ja: CorrectionActivity は内容を変更する時間限定活動、RevisionPlan は再利用可能な変更仕様です。両者は feedback review が所有し、RevisionAttempt は一回の改善ラウンドで調整するだけです。
      disambiguation_test:
        zh: 修改区间和目标工件识别 CorrectionActivity，计划 ID 与版本识别 RevisionPlan；只有循环 ID 与轮次识别 RevisionAttempt。
        en: A modification interval and target artifact identify CorrectionActivity, and plan ID plus revision identify RevisionPlan; only loop ID plus round identify RevisionAttempt.
        ja: modification interval と target artifact は CorrectionActivity、plan ID と revision は RevisionPlan、loop ID と round だけが RevisionAttempt を識別します。
      result: distinct
      owner_module_id: feedback-review-optimization
      source_claims:
        - claim-orchestration-evaluation-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-improvement-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项确认 CorrectionActivity 与 RevisionPlan 由 feedback-review-optimization 拥有，且活动、规格与循环尝试保持不同身份。
              en: Point-by-point review confirms feedback-review-optimization owns CorrectionActivity and RevisionPlan and keeps activity, specification, and loop attempt as distinct identities.
              ja: CorrectionActivity と RevisionPlan を feedback-review-optimization が所有し、activity・specification・loop attempt を別同一性として保つことを確認しました。
    - other_module_id: orchestration-routing-control
      semantic_area:
        zh: 通用停止规范与特定停止证据
        en: Generic stop specification versus concrete stop evidence
        ja: generic stop spec と concrete stop evidence
      candidate_concept_ids:
        - StopCondition
      overlap_reason:
        zh: 同一停止场景同时出现可复用的 StopCondition 与不可变的 StopRetryLineage；旧图容易因二者都描述“停止”而把规范和已发生证据压成一个节点。
        en: One stop scenario contains both a reusable StopCondition and an immutable StopRetryLineage; the old graph could collapse specification and occurred evidence merely because both describe stopping.
        ja: 同じ停止場面には再利用可能な StopCondition と不変の StopRetryLineage が共存し、旧グラフはどちらも停止を表すというだけで仕様と発生済み証拠を一ノードへ潰しがちでした。
      disambiguation_test:
        zh: 由条件编号、表达式、所需证据和适用范围识别的是 StopCondition；由来源尝试、实际采用的条件版本、观测值、判定与后继结果识别的是 StopRetryLineage。ControlLineageRecord 只是后者的上位信息类型。
        en: Condition ID, expression, required evidence, and applicability identify StopCondition; source attempt, evaluated condition revision, observed value, verdict, and successor outcome identify StopRetryLineage. ControlLineageRecord is only the latter's information superclass.
        ja: condition ID・expression・required evidence・applicability で識別するものは StopCondition、source attempt・評価した condition revision・observed value・verdict・successor outcome で識別するものは StopRetryLineage です。ControlLineageRecord は後者の上位情報型にすぎません。
      result: distinct
      owner_module_id: orchestration-routing-control
      source_claims:
        - claim-orchestration-evaluation-011
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-improvement-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项确认 StopCondition 由 orchestration-routing-control 拥有；本模块仅引用该规格并拥有具体改进谱系。
              en: Point-by-point review confirms orchestration-routing-control owns StopCondition; this module only references the specification and owns the concrete improvement lineage.
              ja: StopCondition の owner が orchestration-routing-control であり、本 module は仕様を参照して具体的改善系譜を所有することを確認しました。
    - other_module_id: orchestration-actors-delegation
      semantic_area:
        zh: 改进循环专用角色与通用协同角色
        en: Improvement-loop roles versus general coordination roles
        ja: 改善ループ専用ロールと一般協調ロール
      candidate_concept_ids:
        - Orchestrator
        - WorkerRole
      overlap_reason:
        zh: EvaluatorOptimizer 可同时承担编排或工作职责，因此它会与 Orchestrator、WorkerRole 在同一协作中共现；但前者由评价、修订和停止权限识别，后两者由全局协调或工作项交付职责识别。
        en: EvaluatorOptimizer may co-occur with Orchestrator or WorkerRole in one collaboration, but it is identified by authority over evaluation, revision, and stopping, whereas the latter roles are identified by global coordination or work-item delivery responsibility.
        ja: EvaluatorOptimizer は同じ協働で Orchestrator や WorkerRole と共起できますが、前者は評価・改訂・停止権限で、後者は全体調整または作業項目の遂行責務で識別されます。
      disambiguation_test:
        zh: 若角色在离开改进循环后仍以全局协调或工作交付职责成立，则归通用协同角色；若其身份必须引用特定改进循环，并拥有评价、修订或停止决策权限，则归 ImprovementRole 或 EvaluatorOptimizer。Actor 仅作为角色承担者另行绑定。
        en: If the role remains meaningful outside an improvement loop through global coordination or work-delivery duties, it is a general coordination role; if its identity requires a particular improvement loop and authority over evaluation, revision, or stopping, it is ImprovementRole or EvaluatorOptimizer. Actor is bound separately as the role bearer.
        ja: 改善ループを離れても全体調整または作業遂行責務で成立するなら一般協調ロールです。特定改善ループと評価・改訂・停止の決定権限を必要とするなら ImprovementRole または EvaluatorOptimizer です。Actor は役割の担い手として別にバインドします。
      result: distinct
      owner_module_id: orchestration-actors-delegation
      source_claims:
        - claim-orchestration-evaluation-012
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-improvement-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项确认 Orchestrator 与 WorkerRole 的唯一 owner 为 orchestration-actors-delegation，且不因参与改进循环而改变类型归属。
              en: Point-by-point review confirms orchestration-actors-delegation as the sole owner of Orchestrator and WorkerRole; participation in an improvement loop does not change their type ownership.
              ja: Orchestrator と WorkerRole の唯一 owner が orchestration-actors-delegation であり、改善ループへの参加で型所有が変わらないことを確認しました。
