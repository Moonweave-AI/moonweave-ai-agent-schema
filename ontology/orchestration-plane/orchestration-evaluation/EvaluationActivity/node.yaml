schema: moonweave.ai/ontology-node/v1
id: EvaluationActivity
kind: concept
labels:
  zh: 候选评估活动
  en: Candidate Evaluation Activity
  ja: 候補評価活動
semantics:
  short_definition:
    zh: 使用候选工件和评估规范并产生反馈的一次有时间边界的活动。
    en: A time-bounded activity that uses a candidate artifact and an evaluation specification to generate feedback.
    ja: 候補成果物と評価仕様を用いてフィードバックを生成する、時間境界を持つ一回の活動。
  definition:
    zh: >
      EvaluationActivity 是一次实际发生的编排级质量评估。它将特定候选工件与适用的 EvaluationSpecification 作为输入，
      并产生可供后续路由或 RevisionActivity 使用的反馈实体。它不是 feedback-plane 中的 EvaluationSpecification、Score 或
      Verdict 本身，也不是 TaskPlan 条件、A2A TaskStatus 或 LangGraph checkpoint 状态。
    en: >
      EvaluationActivity is one occurred orchestration-level quality assessment. It takes a specific candidate artifact
      and applicable EvaluationSpecification as inputs and generates feedback usable by later routing or RevisionActivity.
      It is not the feedback-plane EvaluationSpecification, Score, or Verdict itself, nor a TaskPlan condition, A2A
      TaskStatus, or LangGraph checkpoint state.
    ja: >
      EvaluationActivity は実際に発生した編成レベルの品質評価です。特定候補と EvaluationSpecification を入力に取り、
      後続ルーティングまたは RevisionActivity で使えるフィードバックを生成します。feedback-plane の仕様・Score・Verdict、
      TaskPlan 条件、A2A TaskStatus、LangGraph checkpoint 状態ではありません。
  why_needed:
    zh: >
      仅保存分数或“通过”无法说明评估了什么、按什么标准评估。活动记录把候选、标准和产生的反馈绑定为一次可审计发生，
      使后续改动能追溯到真正的评价依据，并与 feedback-plane 的持久评估实体区分开。
    en: >
      A score or pass label alone does not show what was assessed or under which criteria. The activity binds candidate,
      criteria, and generated feedback into one auditable occurrence traceable for later change, distinct from persistent
      feedback-plane evaluation entities.
    ja: >
      スコアや合格ラベルだけでは、何をどの基準で評価したかを示せません。活動記録は候補、基準、生成フィードバックを
      一つの監査可能な発生に結び、feedback-plane の永続評価実体と区別します。
  includes:
    - zh: 一次明确指向候选工件的评估发生及产生的反馈引用。
      en: One evaluation occurrence directed at a concrete candidate and the feedback reference it produced.
      ja: 具体的候補に向けられた一回の評価発生と生成されたフィードバック参照。
  excludes:
    - zh: 只声明规则而尚未评估任何候选的 EvaluationSpecification。
      en: An EvaluationSpecification that declares rules but has not assessed any candidate.
      ja: 規則だけを宣言し候補を評価していない EvaluationSpecification。
    - zh: feedback-plane 的持久 Score、Verdict 或 benchmark 运行定义本身。
      en: Persistent feedback-plane Score, Verdict, or benchmark-run definitions themselves.
      ja: feedback-plane の永続 Score、Verdict、benchmark 実行定義そのもの。
  semantic_kind: activity
  aliases: [candidate assessment, evaluator invocation]
engineering:
  explanation:
    zh: >
      实现中可让评估 agent 通过 OpenAI Agents SDK 的 Runner.run 返回结构化判断，再将其持久化为 feedback-plane 的
      Feedback 记录，并在此节点记录 EvaluationActivity 发生。LangGraph 可把 evaluate 定义为图节点，但活动记录的是
      一次节点调用对应的发生，不是图定义本身。不要把 A2A Task 生命周期字段复制为评估活动状态。
    en: >
      An evaluator may return a structured judgment via OpenAI Agents SDK Runner.run, persist it as feedback-plane Feedback,
      and record the EvaluationActivity occurrence here. LangGraph may define evaluate as a graph node, but this node
      records the occurrence for one invocation, not the graph definition. Do not copy A2A Task lifecycle fields as
      evaluation-activity status.
    ja: >
      評価 agent は OpenAI Agents SDK Runner.run で構造化判断を返し、feedback-plane Feedback として永続化し、
      ここで EvaluationActivity 発生を記録します。A2A Task lifecycle フィールドを評価活動状態として複製してはならない。
  typical_input:
    - description: OpenAI Agents SDK evaluation invocation
      format: |
        evaluation_result = await Runner.run(evaluator, candidate_text)
  typical_output:
    - description: Local activity record with feedback reference
      format: |
        {
          "activity_id": "eval-31",
          "candidate_ref": "candidate-18",
          "specification_ref": "eval-spec-release",
          "feedback_ref": "feedback-31",
          "started_at": "2026-07-18T10:00:00Z",
          "ended_at": "2026-07-18T10:00:12Z"
        }
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes time-bounded activities from generated entities.
    - name: OpenAI Agents SDK — Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner.run and structured agent output.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: activity ID, ja: 活動 ID}
      definitions:
        zh: 稳定标识一次评估活动发生。
        en: Stably identifies one evaluation-activity occurrence.
        ja: 一回の評価活動発生を安定識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: eval-31
      source_claims: [claim-evaluation-activity-prov]
    - id: candidate_ref
      labels: {zh: 候选引用, en: candidate reference, ja: 候補参照}
      definitions:
        zh: 引用被评估的具体候选工件。
        en: References the concrete candidate artifact assessed.
        ja: 評価された具体的候補成果物を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: candidate-18
      source_claims: [claim-evaluation-activity-prov]
    - id: specification_ref
      labels: {zh: 评估规范引用, en: evaluation specification reference, ja: 評価仕様参照}
      definitions:
        zh: 引用本次评估使用的 EvaluationSpecification。
        en: References the EvaluationSpecification used for this assessment.
        ja: この評価で用いた EvaluationSpecification を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: eval-spec-release
      source_claims: [claim-evaluation-activity-prov]
    - id: feedback_ref
      labels: {zh: 反馈引用, en: feedback reference, ja: フィードバック参照}
      definitions:
        zh: 引用由本次活动生成、位于 feedback-plane 的 Feedback 实体。
        en: References the feedback-plane Feedback entity generated by this activity.
        ja: この活動が生成した feedback-plane の Feedback 実体を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: feedback-31
      source_claims: [claim-evaluation-activity-prov]
    - id: started_at
      labels: {zh: 开始时间, en: started at, ja: 開始時刻}
      definitions:
        zh: 评估活动实际开始时间。
        en: When the evaluation activity actually started.
        ja: 評価活動が実際に開始した時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: "2026-07-18T10:00:00Z"
      source_claims: [claim-evaluation-activity-prov]
    - id: ended_at
      labels: {zh: 结束时间, en: ended at, ja: 終了時刻}
      definitions:
        zh: 评估活动完成并产生反馈的时间；不得早于 started_at。
        en: When evaluation completed and produced feedback; must not precede started_at.
        ja: 評価が完了しフィードバックを生成した時刻。started_at より前であってはならない。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: "2026-07-18T10:00:12Z"
      source_claims: [claim-evaluation-activity-prov]
  constraints:
    - id: EvaluationActivity-feedback-required
      expression: "feedback_ref must reference Feedback generated by this activity for candidate_ref under specification_ref."
      explanation:
        zh: 评估活动必须产生可追踪的反馈，不能把规范本身当作输出。
        en: An evaluation activity must produce traceable feedback, not merely restate the specification.
        ja: 評価活動は仕様の再述ではなく、追跡可能なフィードバックを生成しなければならない。
      source_claims: [claim-evaluation-activity-prov]
examples:
  - id: EvaluationActivity-example-positive-release
    labels:
      zh: EvaluationActivity positive
      en: EvaluationActivity positive
      ja: EvaluationActivity positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 EvaluationActivity 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for EvaluationActivity: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) EvaluationActivity: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {activity_id: eval-31, candidate_ref: candidate-18, specification_ref: eval-spec-release, feedback_ref: feedback-31, started_at: 2026-07-18T10:00:00Z, ended_at: 2026-07-18T10:00:12Z}

    related_node_ids:
      - EvaluationActivity
    related_relation_ids: []
    source_claims:
      - claim-evaluation-activity-prov

  - id: EvaluationActivity-example-counterexample-spec-only
    labels:
      zh: EvaluationActivity counterexample
      en: EvaluationActivity counterexample
      ja: EvaluationActivity counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 EvaluationActivity PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style EvaluationActivity PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 EvaluationActivity ではない。
    field_values: {activity_id: absent, feedback_ref: absent}

    related_node_ids:
      - EvaluationActivity
    related_relation_ids: []
    source_claims:
      - claim-evaluation-activity-prov

  - id: EvaluationActivity-example-boundary-a2a-task
    labels:
      zh: EvaluationActivity boundary
      en: EvaluationActivity boundary
      ja: EvaluationActivity boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 EvaluationActivity 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not EvaluationActivity specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で EvaluationActivity spec ではない。
    field_values: {activity_id: absent}

    related_node_ids:
      - EvaluationActivity
      - A2ATask
    related_relation_ids: []
    source_claims:
      - claim-evaluation-activity-boundary

  - id: EvaluationActivity-example-instance-routing-trigger
    labels:
      zh: EvaluationActivity instance
      en: EvaluationActivity instance
      ja: EvaluationActivity instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 EvaluationActivity。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to EvaluationActivity.
      ja: Reflexion 实例 failed→reflect→retry が EvaluationActivity に写像。
    field_values: {activity_id: eval-32, feedback_ref: feedback-32}

    related_node_ids:
      - EvaluationActivity
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-evaluation-activity-prov

sources:
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes activities from generated entities and provenance links.
  - id: openai-agents-running
    title: OpenAI Agents SDK — Running agents
    url: https://openai.github.io/openai-agents-python/running_agents/
    source_type: official-doc
    relevance: Documents evaluator invocation via Runner.run.
source_claims:
  - id: claim-evaluation-activity-prov
    source: w3c-prov-o
    supports: PROV-O separates time-bounded Activity from generated Entity; EvaluationActivity records one assessment occurrence producing feedback.
    locator: PROV-O Activity and wasGeneratedBy
    evidence_kind: normative
    confidence: high
  - id: claim-evaluation-activity-boundary
    source: w3c-prov-o
    supports: A2A Task completion is a protocol state transition, not an orchestration-level evaluation activity unless explicitly modeled with candidate, specification, and feedback.
    locator: PROV-O Activity versus Entity boundary
    evidence_kind: design-inference
    confidence: high
