schema: moonweave.ai/ontology-node/v1
id: RevisionActivity
kind: concept
labels:
  zh: 基于反馈的修订活动
  en: Feedback-Driven Revision Activity
  ja: フィードバック駆動の改訂活動
semantics:
  short_definition:
    zh: 使用候选工件和反馈并产生新修订工件的一次有时间边界的活动。
    en: A time-bounded activity that uses a candidate artifact and feedback to generate a new revision artifact.
    ja: 候補成果物とフィードバックを用いて新しい改訂成果物を生成する、時間境界を持つ一回の活動。
  definition:
    zh: >
      RevisionActivity 是一次实际发生的编排级变换活动。它以具体候选工件和 feedback-plane 的 Feedback 为输入，
      生成与原候选不同的 RevisionArtifact，供再次 EvaluationActivity 或交付使用。它不是 RevisionArtifact 或 Feedback
      实体本身，也不是 LangGraph checkpoint 恢复、RunAttempt 重试或尚未执行的修订计划。
    en: >
      RevisionActivity is one occurred orchestration-level transformation. It uses a concrete candidate artifact and
      feedback-plane Feedback as inputs and generates a RevisionArtifact distinct from the source candidate for later
      EvaluationActivity or delivery. It is neither the RevisionArtifact or Feedback entity itself, nor LangGraph
      checkpoint recovery, RunAttempt retry, or an unexecuted revision plan.
    ja: >
      RevisionActivity は実際に発生した編成レベルの変換活動です。具体候補と feedback-plane Feedback を入力に取り、
      元候補と異なる RevisionArtifact を生成します。RevisionArtifact や Feedback 実体、LangGraph checkpoint 回復、
      RunAttempt リトライ、未実行改訂計画ではありません。
  why_needed:
    zh: >
      “已修订”若没有原始候选与所依据的反馈，就无法解释改变为何发生。该活动将来源、理由和新工件关联起来，
      使系统既能重跑评估，也能区分生成新版本与恢复旧状态或运行时回滚。
    en: >
      A revision claim cannot explain why change happened without source candidate and feedback used. This activity links
      source, rationale, and new artifact so the system can reevaluate and distinguish new-version generation from restore
      or runtime rollback.
    ja: >
      元候補と用いたフィードバックがなければ改訂理由を説明できません。この活動は出所、根拠、新成果物を結び、
      再評価と新版生成・旧状態復元・ランタイムロールバックを区別します。
  includes:
    - zh: 一次使用明确候选和反馈来生成新 RevisionArtifact 的变换。
      en: One transformation using identified candidate and feedback to generate a new RevisionArtifact.
      ja: 特定候補とフィードバックで新 RevisionArtifact を生成する一回の変換。
  excludes:
    - zh: 仅描述打算修改什么而尚未产生工件的计划。
      en: A plan describing intended changes without producing an artifact.
      ja: 意図だけを述べ成果物を生成していない計画。
    - zh: 故障后把运行时恢复到检查点的回滚。
      en: Rollback restoring runtime state to a checkpoint after failure.
      ja: 障害後に実行時状態を checkpoint へ戻すロールバック。
  semantic_kind: activity
  aliases: [revision step, feedback-based transformation]
engineering:
  explanation:
    zh: >
      实现中可让修订 agent 通过 Runner.run 接受 candidate 与 feedback，返回新的候选文本或结构化输出，
      并持久化为 RevisionArtifact；在此记录 RevisionActivity 发生。LangGraph 可把 revise 定义为条件边后的节点，
      但活动记录的是一次调用发生，不是“若失败则修订”的计划条件本身。
    en: >
      A reviser agent may accept candidate and feedback via Runner.run, return a new candidate, persist it as
      RevisionArtifact, and record RevisionActivity here. LangGraph may place revise after a conditional edge, but this
      node records one invocation occurrence, not the planned "revise if failed" condition itself.
    ja: >
      改訂 agent は Runner.run で candidate と feedback を受け、新候補を RevisionArtifact として永続化し、
      RevisionActivity をここで記録します。計画条件そのものではなく一回の呼出発生を記録します。
  typical_input:
    - description: OpenAI Agents SDK revision invocation
      format: |
        revision_result = await Runner.run(
          reviser,
          {"candidate": candidate_text, "feedback": feedback_payload},
        )
  typical_output:
    - description: Local revision activity record
      format: |
        {
          "activity_id": "revise-31",
          "candidate_ref": "candidate-18",
          "feedback_ref": "feedback-31",
          "revision_artifact_ref": "revision-18",
          "started_at": "2026-07-18T10:05:00Z",
          "ended_at": "2026-07-18T10:05:20Z"
        }
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Models activities that use and generate entities with revision provenance.
    - name: OpenAI Agents SDK — Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents structured revision output from an agent invocation.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: activity ID, ja: 活動 ID}
      definitions:
        zh: 稳定标识一次修订活动发生。
        en: Stably identifies one revision-activity occurrence.
        ja: 一回の改訂活動発生を安定識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: revise-31
      source_claims: [claim-revision-activity-prov]
    - id: candidate_ref
      labels: {zh: 源候选引用, en: source candidate reference, ja: 源候補参照}
      definitions:
        zh: 引用被修订的原始候选工件。
        en: References the original candidate artifact being revised.
        ja: 改訂される元の候補成果物を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: candidate-18
      source_claims: [claim-revision-activity-prov]
    - id: feedback_ref
      labels: {zh: 反馈引用, en: feedback reference, ja: フィードバック参照}
      definitions:
        zh: 引用驱动本次修订的 Feedback 实体。
        en: References the Feedback entity that drove this revision.
        ja: この改訂を駆動した Feedback 実体を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: feedback-31
      source_claims: [claim-revision-activity-prov]
    - id: revision_artifact_ref
      labels: {zh: 修订工件引用, en: revision artifact reference, ja: 改訂成果物参照}
      definitions:
        zh: 引用由本次活动生成、与原候选身份不同的 RevisionArtifact。
        en: References the RevisionArtifact generated by this activity and distinct from the source candidate.
        ja: この活動が生成し、元候補と異なる RevisionArtifact を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: revision-18
      source_claims: [claim-revision-activity-prov]
    - id: started_at
      labels: {zh: 开始时间, en: started at, ja: 開始時刻}
      definitions:
        zh: 修订活动实际开始时间。
        en: When the revision activity actually started.
        ja: 改訂活動が実際に開始した時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: "2026-07-18T10:05:00Z"
      source_claims: [claim-revision-activity-prov]
    - id: ended_at
      labels: {zh: 结束时间, en: ended at, ja: 終了時刻}
      definitions:
        zh: 修订完成并产生 RevisionArtifact 的时间。
        en: When revision completed and produced the RevisionArtifact.
        ja: 改訂が完了し RevisionArtifact を生成した時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: "2026-07-18T10:05:20Z"
      source_claims: [claim-revision-activity-prov]
  constraints:
    - id: RevisionActivity-distinct-output
      expression: "revision_artifact_ref must identify an artifact distinct from candidate_ref."
      explanation:
        zh: 修订活动必须产生新工件，不能把原候选重新标记为修订结果。
        en: A revision activity must produce a new artifact, not relabel the source candidate as the revision output.
        ja: 改訂活動は新成果物を生成し、元候補を改訂結果として再ラベルしてはならない。
      source_claims: [claim-revision-activity-prov]
examples:
  - id: RevisionActivity-example-positive-feedback-revise
    labels:
      zh: RevisionActivity positive
      en: RevisionActivity positive
      ja: RevisionActivity positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 RevisionActivity 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for RevisionActivity: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) RevisionActivity: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {activity_id: revise-31, candidate_ref: candidate-18, feedback_ref: feedback-31, revision_artifact_ref: revision-18, started_at: 2026-07-18T10:05:00Z, ended_at: 2026-07-18T10:05:20Z}

    related_node_ids:
      - RevisionActivity
      - EvaluationActivity
    related_relation_ids: []
    source_claims:
      - claim-revision-activity-prov

  - id: RevisionActivity-example-counterexample-checkpoint
    labels:
      zh: RevisionActivity counterexample
      en: RevisionActivity counterexample
      ja: RevisionActivity counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 RevisionActivity 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style RevisionActivity positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 RevisionActivity 正例にならない。
    field_values: {activity_id: absent}

    related_node_ids:
      - RevisionActivity
    related_relation_ids: []
    source_claims:
      - claim-revision-activity-prov

  - id: RevisionActivity-example-boundary-same-content
    labels:
      zh: RevisionActivity boundary
      en: RevisionActivity boundary
      ja: RevisionActivity boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 RevisionActivity 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not RevisionActivity static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で RevisionActivity 静的 spec ではない。
    field_values: {activity_id: revise-32, candidate_ref: candidate-18, feedback_ref: absent, revision_artifact_ref: revision-19}

    related_node_ids:
      - RevisionActivity
    related_relation_ids: []
    source_claims:
      - claim-revision-activity-prov

  - id: RevisionActivity-example-instance-reeval-loop
    labels:
      zh: RevisionActivity instance
      en: RevisionActivity instance
      ja: RevisionActivity instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 RevisionActivity。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to RevisionActivity.
      ja: Reflexion 实例 failed→reflect→retry が RevisionActivity に写像。
    field_values: {activity_id: revise-31, revision_artifact_ref: revision-18}

    related_node_ids:
      - RevisionActivity
      - EvaluationActivity
    related_relation_ids: []
    source_claims:
      - claim-revision-activity-prov

sources:
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Models revision activities that use inputs and generate new entities.
  - id: openai-agents-running
    title: OpenAI Agents SDK — Running agents
    url: https://openai.github.io/openai-agents-python/running_agents/
    source_type: official-doc
    relevance: Documents reviser agent invocation and structured output.
source_claims:
  - id: claim-revision-activity-prov
    source: w3c-prov-o
    supports: PROV-O distinguishes transformation activities from generated revision entities and their provenance inputs.
    locator: PROV-O Activity, Entity, wasRevisionOf
    evidence_kind: normative
    confidence: high
