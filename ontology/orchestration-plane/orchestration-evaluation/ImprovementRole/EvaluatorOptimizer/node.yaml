schema: moonweave.ai/ontology-node/v1
id: EvaluatorOptimizer
kind: concept
labels:
  zh: 评价—优化责任角色
  en: evaluator-optimizer role
  ja: 評価—最適化責務ロール
semantics:
  short_definition:
    zh: 负责依据评价结果决定接受、修订、升级或停止，并控制改进循环的职责角色。
    en: A responsibility role controlling an improvement loop by deciding accept, revise, escalate, or stop from evaluation results.
    ja: evaluation result から accept・revise・escalate・stop を決め improvement loop を control する responsibility role です。
  definition:
    zh: 评价—优化责任角色是 ImprovementRole 的子类，以 role_id、责任范围和决策权限为身份；它可由模型、代理或人类在具体运行中承担，并控制 ImprovementLoop 的路径选择。角色不等同于承担者、评价尝试、提示词或某个框架组件。
    en: EvaluatorOptimizer is an ImprovementRole identified by role ID, responsibility scope, and decision authority. A model, agent, or human may bear it in a run, and it controls path decisions for ImprovementLoop. The role is not its bearer, an EvaluationAttempt, a prompt, or a framework component.
    ja: EvaluatorOptimizer は role ID・responsibility scope・decision authority で識別する ImprovementRole です。model・agent・human が bear し ImprovementLoop path を control しますが bearer・attempt・prompt・framework component ではありません。
  why_needed:
    zh: 角色层保留“谁有权作改进决定”的稳定语义，同时允许实际承担者替换，避免把模型名称或工具名称写进本体层级。
    en: The role layer preserves stable semantics for who is authorized to make improvement decisions while allowing bearers to change, avoiding model or tool names in the ontology hierarchy.
    ja: who is authorized の stable semantics を保持し bearer replacement を許し model/tool name を taxonomy に入れません。
  includes:
    - zh: 具有接受、拒绝、要求修订、升级人工或终止预算权限的评价—优化职责。
      en: Evaluator-optimizer responsibilities with authority to accept, reject, request revision, escalate to a human, or stop on budget.
      ja: accept・reject・revision request・human escalation・budget stop authority を持つ responsibility。
  excludes:
    - zh: 承担角色的模型或人、EvaluationAttempt、EvaluationRun、ReviewerAssignment 和评价标准。
      en: Models or people bearing the role, EvaluationAttempt, EvaluationRun, ReviewAssignment, and evaluation criteria.
      ja: role bearer model/person・EvaluationAttempt・EvaluationRun・ReviewAssignment・evaluation criteria。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: LangGraph evaluator-optimizer 双角色控制、Cursor verification loop 控制映射为 EvaluatorOptimizer；controls ImprovementLoop 通过 generate/evaluate/revise 路由。
    en: LangGraph evaluator-optimizer dual-role control and Cursor verification loop control map to EvaluatorOptimizer controlling ImprovementLoop via generate/evaluate/revise routing.
    ja: LangGraph evaluator-optimizer 双 role 制御・Cursor verification loop 制御を generate/evaluate/revise route 経由 ImprovementLoop controls 付き EvaluatorOptimizer へ写像します。
  typical_input:
    - description: Evaluator-optimizer controller.
      format: evaluator-optimizer:report-quality controls report-quality-loop-42
      source_claims:
        - claim-evaluator-optimizer-design
  typical_output:
    - description: Moonweave EvaluatorOptimizer role.
      format: '{"role_id": "evaluator-optimizer:report-quality"}'
      source_claims:
        - claim-evaluator-optimizer-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: decision_authority
      labels:
        zh: 决策权限范围
        en: decision-authority scope
        ja: decision authority scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明该角色可作出的循环控制决定。
        en: Lists the loop-control decisions the role is authorized to make.
        ja: role が authorized な loop-control decisions を列挙します。
      allowed_values: []
      pattern: null
      example_value: accept|revise|escalate|stop
      source_claims:
        - claim-evaluator-optimizer-design
        - claim-evaluator-optimizer-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluatorOptimizer-report-quality
    labels:
      zh: 报告质量控制
      en: Report quality control
      ja: report quality 制御
    descriptions:
      zh: evaluator-optimizer:report-quality 控制 report-quality-loop-42 的 generate/evaluate/revise 路由。
      en: evaluator-optimizer:report-quality controls generate/evaluate/revise routing in report-quality-loop-42.
      ja: evaluator-optimizer:report-quality が report-quality-loop-42 の generate/evaluate/revise route を制御。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator-optimizer
    field_values:
      role_id: evaluator-optimizer:report-quality
    related_node_ids:
      - EvaluatorOptimizer
      - EvaluatorOptimizerLoop
      - ImprovementLoop
    related_relation_ids:
      - EvaluatorOptimizer-controls-ImprovementLoop
    source_claims:
      - claim-evaluator-optimizer-langgraph
      - claim-evaluator-optimizer-design
  - id: EvaluatorOptimizer-cursor-ci
    labels:
      zh: Cursor CI 验证控制
      en: Cursor CI verification control
      ja: Cursor CI 検証制御
    descriptions:
      zh: test-fix-verify 循环中 evaluator 观测 pytest、optimizer 应用 patch。
      en: In test-fix-verify loop evaluator observes pytest and optimizer applies patch.
      ja: test-fix-verify loop で evaluator が pytest を観測し optimizer が patch を適用。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: verification loop
    field_values: {}
    related_node_ids:
      - EvaluatorOptimizer
      - EvaluatorOptimizerLoop
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-cookbook
      - claim-evaluator-optimizer-design
  - id: EvaluatorOptimizer-boundary-reviewer
    labels:
      zh: PR 评审者不是 EvaluatorOptimizer
      en: PR reviewer is not EvaluatorOptimizer
      ja: PR reviewer は EvaluatorOptimizer ではない
    descriptions:
      zh: security-reviewer 驱动 ReviewRevisionLoop 不是 EvaluatorOptimizer 职责。
      en: security-reviewer drives ReviewRevisionLoop not EvaluatorOptimizer duty.
      ja: security-reviewer は ReviewRevisionLoop を駆動し EvaluatorOptimizer duty ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: role subtype boundary
    field_values: {}
    related_node_ids:
      - EvaluatorOptimizer
      - ImprovementRole
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-design
parent_relation:
  id: EvaluatorOptimizer-is_a-ImprovementRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: EvaluatorOptimizer 是一种 ImprovementRole；其必要种差是拥有接受、修订、升级或停止循环的决策责任且承担者可替换。
    en: EvaluatorOptimizer is a ImprovementRole whose necessary differentia is holding accept, revise, escalate, or stop responsibility while allowing replaceable bearers.
    ja: EvaluatorOptimizer は ImprovementRole の一種で、必要種差は accept・revise・escalate・stop responsibility を持ち bearer が replaceable なこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: EvaluatorOptimizer-is_a-ImprovementRole-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementRole AND instance.decision_authority INCLUDES accept-or-revise-or-escalate-or-stop AND bearer replacement PRESERVES role identity
      explanations:
        zh: 仅当对象既满足 ImprovementRole 的完整定义，又满足“拥有接受、修订、升级或停止循环的决策责任且承担者可替换”时断言。
        en: Assert only when the object satisfies the complete ImprovementRole definition and holding accept, revise, escalate, or stop responsibility while allowing replaceable bearers.
        ja: object が ImprovementRole の complete definition と「accept・revise・escalate・stop responsibility を持ち bearer が replaceable なこと」を満たす時のみ assert します。
      source_claims:
        - claim-evaluator-optimizer-design
        - claim-evaluator-optimizer-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-evaluator-optimizer-design
    - claim-evaluator-optimizer-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: EvaluatorOptimizer-controls-ImprovementLoop
    predicate: controls
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 控制改进循环
      en: controls improvement loop
      ja: 改善ループを制御
    definitions:
      zh: EvaluatorOptimizer controls ImprovementLoop 表示该职责角色对指定循环拥有接受、要求修订、升级或停止的决策权限，承担者变化不改变角色—循环事实。
      en: EvaluatorOptimizer controls ImprovementLoop means the responsibility role is authorized to accept, request revision, escalate, or stop that loop; changing the bearer does not change the role-to-loop fact.
      ja: EvaluatorOptimizer controls ImprovementLoop は role が loop の accept・revise・escalate・stop authority を持ち bearer change でも role-loop fact が変わらないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_controls
      labels:
        zh: 反向 控制改进循环
        en: inverse controls improvement loop
        ja: 逆 改善ループを制御
    conditions:
      - id: EvaluatorOptimizer-controls-ImprovementLoop-assertion-condition
        severity: error
        expression_language: plain
        expression: loop.control_assignment NAMES role AND role.decision_authority COVERS loop.scope AND granted_action IN {accept, revise, escalate, stop}
        explanations:
          zh: 仅当循环规范或评审任务明确授予该角色相应决策权限和适用范围时成立。
          en: Assert only when the loop specification or review assignment explicitly grants the role those decisions and scope.
          ja: loop spec/review assignment が role に decisions/scope を明示付与する時のみ assert します。
        source_claims:
          - claim-evaluator-optimizer-design
          - claim-evaluator-optimizer-design
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-evaluator-optimizer-design
      - claim-evaluator-optimizer-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ImprovementLoop
