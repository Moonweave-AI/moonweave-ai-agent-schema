schema: moonweave.ai/ontology-node/v1
id: EvaluatorOptimizer
kind: concept
status: review
labels:
  zh: 评价—优化责任角色
  en: evaluator-optimizer role
  ja: 評価—最適化責務ロール
semantics:
  short_definition:
    zh: 负责依据评价结果决定接受、修订、升级或停止，并控制改进循环的职责角色。
    en: A responsibility role controlling an improvement loop by deciding accept, revise, escalate, or stop from evaluation results.
    ja: evaluation result から accept・revise・escalate・stop を決め improvement loop を control する responsibility role です。
  definition:
    zh: 评价—优化责任角色是 ImprovementRole 的子类，以 role_id、责任范围和决策权限为身份；它可由模型、代理或人类在具体运行中承担，并控制 ImprovementLoop 的路径选择。角色不等同于承担者、评价尝试、提示词或某个框架组件。
    en: EvaluatorOptimizer is an ImprovementRole identified by role ID, responsibility scope, and decision authority. A model, agent, or human may bear it in a run, and it controls path decisions for ImprovementLoop. The role is not its bearer, an EvaluationAttempt, a prompt, or a framework component.
    ja: EvaluatorOptimizer は role ID・responsibility scope・decision authority で識別する ImprovementRole です。model・agent・human が bear し ImprovementLoop path を control しますが bearer・attempt・prompt・framework component ではありません。
  why_needed:
    zh: 角色层保留“谁有权作改进决定”的稳定语义，同时允许实际承担者替换，避免把模型名称或工具名称写进本体层级。
    en: The role layer preserves stable semantics for who is authorized to make improvement decisions while allowing bearers to change, avoiding model or tool names in the ontology hierarchy.
    ja: who is authorized の stable semantics を保持し bearer replacement を許し model/tool name を taxonomy に入れません。
  includes:
    - zh: 具有接受、拒绝、要求修订、升级人工或终止预算权限的评价—优化职责。
      en: Evaluator-optimizer responsibilities with authority to accept, reject, request revision, escalate to a human, or stop on budget.
      ja: accept・reject・revision request・human escalation・budget stop authority を持つ responsibility。
  excludes:
    - zh: 承担角色的模型或人、EvaluationAttempt、EvaluationRun、ReviewerAssignment 和评价标准。
      en: Models or people bearing the role, EvaluationAttempt, EvaluationRun, ReviewAssignment, and evaluation criteria.
      ja: role bearer model/person・EvaluationAttempt・EvaluationRun・ReviewAssignment・evaluation criteria。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: decision_authority
      labels:
        zh: 决策权限范围
        en: decision-authority scope
        ja: decision authority scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明该角色可作出的循环控制决定。
        en: Lists the loop-control decisions the role is authorized to make.
        ja: role が authorized な loop-control decisions を列挙します。
      allowed_values: []
      pattern: null
      example_value: accept|revise|escalate|stop
      source_claims:
        - claim-evaluator-optimizer-001
        - claim-evaluator-optimizer-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluatorOptimizer-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告质量评价—优化角色
      en: Report-quality evaluator-optimizer role
      ja: report quality evaluator-optimizer role
    scenario_id: null
    descriptions:
      zh: role-report-quality 可由 model-3 或 human-7 承担，并有权依据 rubric@4 接受候选或要求下一轮修订。
      en: role-report-quality may be borne by model-3 or human-7 and may accept a candidate or request another revision under rubric@4.
      ja: role-report-quality は model-3/human-7 が bear でき rubric@4 下で accept/revise を決めます。
    field_values:
      improvement_role_id: role-report-quality
      responsibility_scope: report-quality acceptance, revision, escalation, and stop decisions
      decision_authority: accept|revise|escalate|stop
    related_node_ids:
      - EvaluatorOptimizer
      - ImprovementLoop
    related_relation_ids:
      - EvaluatorOptimizer-controls-ImprovementLoop
    expected_result:
      zh: 保留一个独立于承担者的职责角色并连接其控制循环。
      en: Preserve a bearer-independent responsibility role and connect the loop it controls.
      ja: bearer-independent responsibility role を保持し controlled loop へ接続します。
    why_valid_or_invalid:
      zh: 职责权限持续存在，即使本轮从模型切换到人工承担。
      en: The responsibility authority persists even when the bearer changes from a model to a human.
      ja: bearer が model から human へ変わっても responsibility authority は持続します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluator-optimizer-001
      - claim-evaluator-optimizer-002
  - id: EvaluatorOptimizer-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 承担角色的评审模型
      en: Reviewer model bearing the role
      ja: reviewer model bearing role
    scenario_id: improvement-review-evaluatoroptimizer-boundary
    descriptions:
      zh: reviewer-model-3 在 run-42 中承担 role-report-quality，但其模型版本和运行生命周期独立存在。
      en: reviewer-model-3 bears role-report-quality in run-42, but its model revision and runtime lifecycle exist independently.
      ja: reviewer-model-3 は role を bear しますが model revision/runtime lifecycle は独立です。
    field_values: {}
    related_node_ids:
      - EvaluatorOptimizer
      - Actor
    related_relation_ids: []
    expected_result:
      zh: 模型保持 Actor/模型类型，仅通过角色承担关系连接。
      en: Keep the model as an Actor or model type and connect it only through role bearing.
      ja: model は Actor/model type とし role-bearing relation でのみ接続します。
    why_valid_or_invalid:
      zh: 承担一种职责不改变主体的本体类型。
      en: Bearing a responsibility does not change the actor's ontological type.
      ja: responsibility bearing は actor ontological type を変更しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluator-optimizer-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EvaluatorOptimizer-is_a-ImprovementRole
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: EvaluatorOptimizer 是一种 ImprovementRole；其必要种差是拥有接受、修订、升级或停止循环的决策责任且承担者可替换。
    en: EvaluatorOptimizer is a ImprovementRole whose necessary differentia is holding accept, revise, escalate, or stop responsibility while allowing replaceable bearers.
    ja: EvaluatorOptimizer は ImprovementRole の一種で、必要種差は accept・revise・escalate・stop responsibility を持ち bearer が replaceable なこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: EvaluatorOptimizer-is_a-ImprovementRole-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementRole AND instance.decision_authority INCLUDES accept-or-revise-or-escalate-or-stop AND bearer replacement PRESERVES role identity
      explanations:
        zh: 仅当对象既满足 ImprovementRole 的完整定义，又满足“拥有接受、修订、升级或停止循环的决策责任且承担者可替换”时断言。
        en: Assert only when the object satisfies the complete ImprovementRole definition and holding accept, revise, escalate, or stop responsibility while allowing replaceable bearers.
        ja: object が ImprovementRole の complete definition と「accept・revise・escalate・stop responsibility を持ち bearer が replaceable なこと」を満たす時のみ assert します。
      source_claims:
        - claim-evaluator-optimizer-001
        - claim-evaluator-optimizer-002
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EvaluatorOptimizer-is_a-ImprovementRole-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-evaluatoroptimizer-is_a-improvementrole-positive
      descriptions:
        zh: role-report-quality 可先由 model-3、后由 human-7 承担。
        en: role-report-quality may be borne first by model-3 and later by human-7.
        ja: role-report-quality は model-3 の後 human-7 が bear できます。
      field_values: {}
      related_node_ids:
        - EvaluatorOptimizer
        - ImprovementRole
      related_relation_ids:
        - EvaluatorOptimizer-is_a-ImprovementRole
      expected_result:
        zh: 类型查询返回 EvaluatorOptimizer→ImprovementRole 的严格上位路径。
        en: Type traversal returns the strict EvaluatorOptimizer-to-ImprovementRole genus path.
        ja: type traversal は strict EvaluatorOptimizer→ImprovementRole genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementRole 的共同条件和 EvaluatorOptimizer 的独有种差。
        en: The instance satisfies both the common ImprovementRole conditions and the unique EvaluatorOptimizer differentia.
        ja: instance は ImprovementRole の common conditions と EvaluatorOptimizer の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluator-optimizer-001
        - claim-evaluator-optimizer-002
    - id: EvaluatorOptimizer-is_a-ImprovementRole-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-evaluatoroptimizer-is_a-improvementrole-boundary
      descriptions:
        zh: reviewer-model-3 是角色承担主体，模型版本决定其自身身份。
        en: reviewer-model-3 is the role bearer and its model revision determines its own identity.
        ja: reviewer-model-3 は role bearer で model revision が own identity を決めます。
      field_values: {}
      related_node_ids:
        - EvaluatorOptimizer
        - ImprovementRole
      related_relation_ids:
        - EvaluatorOptimizer-is_a-ImprovementRole
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 EvaluatorOptimizer。
        en: Relatedness or co-occurrence must not classify the boundary object as EvaluatorOptimizer.
        ja: relatedness/co-occurrence だけで boundary object を EvaluatorOptimizer に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 EvaluatorOptimizer 的必要种差，至多属于 ImprovementRole 或相邻类型。
        en: The boundary object lacks the necessary EvaluatorOptimizer differentia and is at most ImprovementRole or an adjacent type.
        ja: boundary object は EvaluatorOptimizer の necessary differentia を欠き ImprovementRole または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluator-optimizer-001
        - claim-evaluator-optimizer-002
  source_claims:
    - claim-evaluator-optimizer-001
    - claim-evaluator-optimizer-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: EvaluatorOptimizer-controls-ImprovementLoop
    predicate: controls
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 控制改进循环
      en: controls improvement loop
      ja: 改善ループを制御
    definitions:
      zh: EvaluatorOptimizer controls ImprovementLoop 表示该职责角色对指定循环拥有接受、要求修订、升级或停止的决策权限，承担者变化不改变角色—循环事实。
      en: EvaluatorOptimizer controls ImprovementLoop means the responsibility role is authorized to accept, request revision, escalate, or stop that loop; changing the bearer does not change the role-to-loop fact.
      ja: EvaluatorOptimizer controls ImprovementLoop は role が loop の accept・revise・escalate・stop authority を持ち bearer change でも role-loop fact が変わらないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_controls
      labels:
        zh: 反向 控制改进循环
        en: inverse controls improvement loop
        ja: 逆 改善ループを制御
    conditions:
      - id: EvaluatorOptimizer-controls-ImprovementLoop-assertion-condition
        severity: error
        expression_language: plain
        expression: loop.control_assignment NAMES role AND role.decision_authority COVERS loop.scope AND granted_action IN {accept, revise, escalate, stop}
        explanations:
          zh: 仅当循环规范或评审任务明确授予该角色相应决策权限和适用范围时成立。
          en: Assert only when the loop specification or review assignment explicitly grants the role those decisions and scope.
          ja: loop spec/review assignment が role に decisions/scope を明示付与する時のみ assert します。
        source_claims:
          - claim-evaluator-optimizer-001
          - claim-evaluator-optimizer-002
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluatorOptimizer-controls-ImprovementLoop-example-positive-manual-20260716
        kind: positive
        labels:
          zh: controls 正例
          en: controls positive case
          ja: controls 正例
        scenario_id: improvement-relation-evaluatoroptimizer-controls-improvementloop-positive
        descriptions:
          zh: assignment@3 授予 role-report-quality 对 loop-42 的 accept、revise 和 escalate 权限。
          en: assignment@3 grants role-report-quality accept, revise, and escalate authority over loop-42.
          ja: assignment@3 は role-report-quality に loop-42 の accept/revise/escalate authority を付与します。
        field_values: {}
        related_node_ids:
          - EvaluatorOptimizer
          - ImprovementLoop
        related_relation_ids:
          - EvaluatorOptimizer-controls-ImprovementLoop
        expected_result:
          zh: 查询返回 EvaluatorOptimizer —controls→ ImprovementLoop 的有向事实及其证据。
          en: The query returns the directed EvaluatorOptimizer —controls→ ImprovementLoop fact with its evidence.
          ja: query は EvaluatorOptimizer —controls→ ImprovementLoop の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 controls 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for controls are explicit while both endpoints retain independent identity.
          ja: source・target・controls basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluator-optimizer-001
          - claim-evaluator-optimizer-002
      - id: EvaluatorOptimizer-controls-ImprovementLoop-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: controls 边界例
          en: controls boundary case
          ja: controls 境界例
        scenario_id: improvement-relation-evaluatoroptimizer-controls-improvementloop-boundary
        descriptions:
          zh: reviewer-model-3 执行一次评分，但没有获得停止 loop-42 的权限。
          en: reviewer-model-3 performs one score but has not been granted authority to stop loop-42.
          ja: reviewer-model-3 は one score を実行しますが loop-42 stop authority がありません。
        field_values: {}
        related_node_ids:
          - EvaluatorOptimizer
          - ImprovementLoop
        related_relation_ids:
          - EvaluatorOptimizer-controls-ImprovementLoop
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 controls。
          en: Co-occurrence, nearby time, or similar fields must not imply controls.
          ja: co-occurrence・nearby time・similar fields だけで controls を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 EvaluatorOptimizer 对 ImprovementLoop 承担 controls 语义的显式记录。
          en: The boundary case lacks an explicit record proving that EvaluatorOptimizer bears controls semantics toward ImprovementLoop.
          ja: boundary case は EvaluatorOptimizer が ImprovementLoop に controls semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluator-optimizer-001
          - claim-evaluator-optimizer-002
    source_claims:
