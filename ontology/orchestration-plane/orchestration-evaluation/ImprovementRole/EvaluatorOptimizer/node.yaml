schema: moonweave.ai/ontology-node/v1
id: EvaluatorOptimizer
kind: concept
labels:
  zh: 评价—优化责任角色
  en: evaluator-optimizer role
  ja: 評価—最適化責務ロール
semantics:
  short_definition:
    zh: 负责依据评价结果决定接受、修订、升级或停止，并控制改进循环的职责角色。
    en: A responsibility role controlling an improvement loop by deciding accept, revise, escalate, or stop from evaluation results.
    ja: evaluation result から accept・revise・escalate・stop を決め improvement loop を control する responsibility role です。
  definition:
    zh: 评价—优化责任角色是 ImprovementRole 的子类，以 role_id、责任范围和决策权限为身份；它可由模型、代理或人类在具体运行中承担，并控制 ImprovementLoop 的路径选择。角色不等同于承担者、评价尝试、提示词或某个框架组件。
    en: EvaluatorOptimizer is an ImprovementRole identified by role ID, responsibility scope, and decision authority. A model, agent, or human may bear it in a run, and it controls path decisions for ImprovementLoop. The role is not its bearer, an EvaluationAttempt, a prompt, or a framework component.
    ja: EvaluatorOptimizer は role ID・responsibility scope・decision authority で識別する ImprovementRole です。model・agent・human が bear し ImprovementLoop path を control しますが bearer・attempt・prompt・framework component ではありません。
  why_needed:
    zh: 角色层保留“谁有权作改进决定”的稳定语义，同时允许实际承担者替换，避免把模型名称或工具名称写进本体层级。
    en: The role layer preserves stable semantics for who is authorized to make improvement decisions while allowing bearers to change, avoiding model or tool names in the ontology hierarchy.
    ja: who is authorized の stable semantics を保持し bearer replacement を許し model/tool name を taxonomy に入れません。
  includes:
    - zh: 具有接受、拒绝、要求修订、升级人工或终止预算权限的评价—优化职责。
      en: Evaluator-optimizer responsibilities with authority to accept, reject, request revision, escalate to a human, or stop on budget.
      ja: accept・reject・revision request・human escalation・budget stop authority を持つ responsibility。
  excludes:
    - zh: 承担角色的模型或人、EvaluationAttempt、EvaluationRun、ReviewerAssignment 和评价标准。
      en: Models or people bearing the role, EvaluationAttempt, EvaluationRun, ReviewAssignment, and evaluation criteria.
      ja: role bearer model/person・EvaluationAttempt・EvaluationRun・ReviewAssignment・evaluation criteria。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: decision_authority
      labels:
        zh: 决策权限范围
        en: decision-authority scope
        ja: decision authority scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明该角色可作出的循环控制决定。
        en: Lists the loop-control decisions the role is authorized to make.
        ja: role が authorized な loop-control decisions を列挙します。
      allowed_values: []
      pattern: null
      example_value: accept|revise|escalate|stop
      source_claims:
        - claim-evaluator-optimizer-001
        - claim-evaluator-optimizer-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluatorOptimizer-example-positive-manual-20260716
    labels:
      zh: EvaluatorOptimizer positive
      en: EvaluatorOptimizer positive
      ja: EvaluatorOptimizer positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 EvaluatorOptimizer 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for EvaluatorOptimizer: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) EvaluatorOptimizer: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_role_id: role-report-quality, responsibility_scope: "report-quality acceptance", decision_authority: "accept|revise|escalate|stop"}

    related_node_ids:
      - EvaluatorOptimizer
      - ImprovementLoop
    related_relation_ids:
      - EvaluatorOptimizer-controls-ImprovementLoop
    source_claims:
      - claim-evaluator-optimizer-001
      - claim-evaluator-optimizer-002

  - id: EvaluatorOptimizer-example-boundary-manual-20260716
    labels:
      zh: EvaluatorOptimizer boundary
      en: EvaluatorOptimizer boundary
      ja: EvaluatorOptimizer boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 EvaluatorOptimizer 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not EvaluatorOptimizer static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で EvaluatorOptimizer 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - EvaluatorOptimizer
      - Actor
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-002

  - id: EvaluatorOptimizer-example-counterexample-confusable
    labels:
      zh: EvaluatorOptimizer counterexample
      en: EvaluatorOptimizer counterexample
      ja: EvaluatorOptimizer counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 EvaluatorOptimizer；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style EvaluatorOptimizer; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 EvaluatorOptimizer として拒否。
    field_values: {role_id: absent, role_kind: absent, separation_policy_ref: absent}

    related_node_ids:
      - EvaluatorOptimizer
      - ImprovementRole
      - EvaluationActivity
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-001

  - id: EvaluatorOptimizer-example-instance-concrete
    labels:
      zh: EvaluatorOptimizer instance
      en: EvaluatorOptimizer instance
      ja: EvaluatorOptimizer instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 EvaluatorOptimizer。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to EvaluatorOptimizer.
      ja: Reflexion 实例 failed→reflect→retry が EvaluatorOptimizer に写像。
    field_values: {improvement_role_id: role-report-quality, responsibility_scope: "report-quality acceptance", decision_authority: "accept|revise|escalate|stop"}

    related_node_ids:
      - EvaluatorOptimizer
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-001

