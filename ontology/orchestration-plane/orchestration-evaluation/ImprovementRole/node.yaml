schema: moonweave.ai/ontology-node/v1
id: ImprovementRole
kind: concept
labels:
  zh: 改进职责角色
  en: improvement role
  ja: 改善責務ロール
semantics:
  short_definition:
    zh: 承担评估、选择修订或停止改进责任而不固定具体执行者的角色类型。
    en: A role type carrying responsibility for evaluation, revision selection, or stopping improvement without fixing a concrete actor.
    ja: evaluation・revision selection・stop responsibility を担い concrete actor を固定しない role type です。
  definition:
    zh: 改进职责角色是本域角色身份的共同上位概念，以角色标识、责任范围、授权边界和有效期为身份；EvaluatorOptimizer 是其下位类型。角色可由人、模型或服务承担，但不等于承担者、不等于控制规范，也不是实际循环。
    en: ImprovementRole is the genus of role identity in this domain, identified by role ID, responsibility scope, authority boundary, and validity; EvaluatorOptimizer is its subtype. A human, model, or service may bear the role, but the role is neither its bearer, a control specification, nor an actual loop.
    ja: ImprovementRole は role ID・responsibility scope・authority boundary・validity で識別する role genus です。human/model/service が bear できますが bearer・spec・actual loop ではありません。
  why_needed:
    zh: 角色根让“谁负责决定下一步”与“谁实际执行”和“循环本身”分离，避免把 EvaluatorOptimizer 当成固定 Agent 类。
    en: The role root separates responsibility for the next decision from the actor bearing it and from the loop itself, avoiding a fixed-agent interpretation of EvaluatorOptimizer.
    ja: role root は next-decision responsibility を bearer/loop から分け EvaluatorOptimizer の fixed-agent 誤読を防ぎます。
  includes:
    - zh: 负责评估接受、选择修订、升级或停止的可承担职责。
      en: Bearable responsibilities for evaluation acceptance, revision selection, escalation, or stopping.
      ja: evaluation acceptance・revision selection・escalation・stop の bearable responsibility。
  excludes:
    - zh: 具体模型、用户、评审活动、循环状态、策略文档和评估结果。
      en: Concrete models, users, review activities, loop state, policy documents, and evaluation results.
      ja: concrete model・user・review activity・loop state・policy document・evaluation result。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: improvement_role_id
      labels:
        zh: 改进角色标识
        en: improvement-role ID
        ja: 改善 role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一种改进控制职责。
        en: Stably identifies one improvement-control responsibility.
        ja: 一 improvement-control responsibility を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluator-optimizer-role
      source_claims:
        - claim-improvement-role-002
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明角色可以评估、选择或终止哪些目标和循环。
        en: Declares which targets and loops the role may evaluate, select for, or stop.
        ja: role が evaluate/select/stop できる targets/loops を宣言します。
      allowed_values: []
      pattern: null
      example_value: report-quality loops
      source_claims:
        - claim-improvement-role-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementRole-example-positive-manual-20260716
    labels:
      zh: ImprovementRole positive
      en: ImprovementRole positive
      ja: ImprovementRole positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ImprovementRole 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ImprovementRole: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ImprovementRole: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_role_id: evaluator-optimizer-role, responsibility_scope: "report-quality loops"}

    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-001
      - claim-improvement-role-002

  - id: ImprovementRole-example-boundary-manual-20260716
    labels:
      zh: ImprovementRole boundary
      en: ImprovementRole boundary
      ja: ImprovementRole boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 ImprovementRole 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not ImprovementRole static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で ImprovementRole 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-002

  - id: ImprovementRole-example-counterexample-confusable
    labels:
      zh: ImprovementRole counterexample
      en: ImprovementRole counterexample
      ja: ImprovementRole counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 ImprovementRole 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style ImprovementRole group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 ImprovementRole ではない。
    field_values: {role_id: absent, responsibility_scope_ref: absent, prompt_ref: prompt-evaluator-v2}

    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-001

  - id: ImprovementRole-example-instance-concrete
    labels:
      zh: ImprovementRole instance
      en: ImprovementRole instance
      ja: ImprovementRole instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ImprovementRole。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ImprovementRole.
      ja: Reflexion 实例 failed→reflect→retry が ImprovementRole に写像。
    field_values: {improvement_role_id: evaluator-optimizer-role, responsibility_scope: "report-quality loops"}

    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-001

