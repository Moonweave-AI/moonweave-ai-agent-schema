schema: moonweave.ai/ontology-node/v1
id: ImprovementRole
kind: concept
status: review
labels:
  zh: 改进职责角色
  en: improvement role
  ja: 改善責務ロール
semantics:
  short_definition:
    zh: 承担评估、选择修订或停止改进责任而不固定具体执行者的角色类型。
    en: A role type carrying responsibility for evaluation, revision selection, or stopping improvement without fixing a concrete actor.
    ja: evaluation・revision selection・stop responsibility を担い concrete actor を固定しない role type です。
  definition:
    zh: 改进职责角色是本域角色身份的共同上位概念，以角色标识、责任范围、授权边界和有效期为身份；EvaluatorOptimizer 是其下位类型。角色可由人、模型或服务承担，但不等于承担者、不等于控制规范，也不是实际循环。
    en: ImprovementRole is the genus of role identity in this domain, identified by role ID, responsibility scope, authority boundary, and validity; EvaluatorOptimizer is its subtype. A human, model, or service may bear the role, but the role is neither its bearer, a control specification, nor an actual loop.
    ja: ImprovementRole は role ID・responsibility scope・authority boundary・validity で識別する role genus です。human/model/service が bear できますが bearer・spec・actual loop ではありません。
  why_needed:
    zh: 角色根让“谁负责决定下一步”与“谁实际执行”和“循环本身”分离，避免把 EvaluatorOptimizer 当成固定 Agent 类。
    en: The role root separates responsibility for the next decision from the actor bearing it and from the loop itself, avoiding a fixed-agent interpretation of EvaluatorOptimizer.
    ja: role root は next-decision responsibility を bearer/loop から分け EvaluatorOptimizer の fixed-agent 誤読を防ぎます。
  includes:
    - zh: 负责评估接受、选择修订、升级或停止的可承担职责。
      en: Bearable responsibilities for evaluation acceptance, revision selection, escalation, or stopping.
      ja: evaluation acceptance・revision selection・escalation・stop の bearable responsibility。
  excludes:
    - zh: 具体模型、用户、评审活动、循环状态、策略文档和评估结果。
      en: Concrete models, users, review activities, loop state, policy documents, and evaluation results.
      ja: concrete model・user・review activity・loop state・policy document・evaluation result。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: improvement_role_id
      labels:
        zh: 改进角色标识
        en: improvement-role ID
        ja: 改善 role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一种改进控制职责。
        en: Stably identifies one improvement-control responsibility.
        ja: 一 improvement-control responsibility を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluator-optimizer-role
      source_claims:
        - claim-improvement-role-002
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明角色可以评估、选择或终止哪些目标和循环。
        en: Declares which targets and loops the role may evaluate, select for, or stop.
        ja: role が evaluate/select/stop できる targets/loops を宣言します。
      allowed_values: []
      pattern: null
      example_value: report-quality loops
      source_claims:
        - claim-improvement-role-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementRole-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告质量决策角色
      en: Report-quality decision role
      ja: report-quality decision role
    scenario_id: null
    descriptions:
      zh: evaluator-optimizer-role 可由 reviewer-model-3 或 human-7 承担，负责接受、修订或停止 report-quality 循环。
      en: evaluator-optimizer-role may be borne by reviewer-model-3 or human-7 and decides accept, revise, or stop for report-quality loops.
      ja: role は model または human が bear し report-quality loop の accept/revise/stop を決めます。
    field_values:
      improvement_role_id: evaluator-optimizer-role
      responsibility_scope: report-quality loops
    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids: []
    expected_result:
      zh: 保留独立角色身份，并允许不同主体在不同时间承担。
      en: Keep independent role identity and allow different principals to bear it over time.
      ja: independent role identity を保持し different principals が bear できます。
    why_valid_or_invalid:
      zh: 职责稳定而承担者可替换，符合角色而非主体的身份条件。
      en: Responsibility is stable while the bearer is replaceable, satisfying role rather than actor identity.
      ja: responsibility は stable、bearer は replaceable で role identity を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-role-001
      - claim-improvement-role-002
  - id: ImprovementRole-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评审模型实例
      en: Reviewer-model instance
      ja: reviewer model instance
    scenario_id: improvement-review-improvementrole-boundary
    descriptions:
      zh: reviewer-model-3 在 run-42 中承担该角色，但模型版本可更换且拥有自己的运行身份。
      en: reviewer-model-3 bears the role in run-42, but its model revision may change and has its own runtime identity.
      ja: reviewer-model-3 は role bearer ですが model revision/runtime identity を持ちます。
    field_values: {}
    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids: []
    expected_result:
      zh: 模型保持运行主体类型，不归入 ImprovementRole。
      en: Keep the model as a runtime actor rather than classifying it as ImprovementRole.
      ja: model は runtime actor とし ImprovementRole に分類しません。
    why_valid_or_invalid:
      zh: 承担角色不使主体成为角色类型本身。
      en: Bearing a role does not make the actor the role type itself.
      ja: role bearing は actor を role type 自体にしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-role-002
