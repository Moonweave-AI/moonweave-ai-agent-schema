schema: moonweave.ai/ontology-node/v1
id: ImprovementRole
kind: concept
labels:
  zh: 改进职责角色
  en: improvement role
  ja: 改善責務ロール
semantics:
  short_definition:
    zh: 承担评估、选择修订或停止改进责任而不固定具体执行者的角色类型。
    en: A role type carrying responsibility for evaluation, revision selection, or stopping improvement without fixing a concrete actor.
    ja: evaluation・revision selection・stop responsibility を担い concrete actor を固定しない role type です。
  definition:
    zh: 改进职责角色是本域角色身份的共同上位概念，以角色标识、责任范围、授权边界和有效期为身份；EvaluatorOptimizer 是其下位类型。角色可由人、模型或服务承担，但不等于承担者、不等于控制规范，也不是实际循环。
    en: ImprovementRole is the genus of role identity in this domain, identified by role ID, responsibility scope, authority boundary, and validity; EvaluatorOptimizer is its subtype. A human, model, or service may bear the role, but the role is neither its bearer, a control specification, nor an actual loop.
    ja: ImprovementRole は role ID・responsibility scope・authority boundary・validity で識別する role genus です。human/model/service が bear できますが bearer・spec・actual loop ではありません。
  why_needed:
    zh: 角色根让“谁负责决定下一步”与“谁实际执行”和“循环本身”分离，避免把 EvaluatorOptimizer 当成固定 Agent 类。
    en: The role root separates responsibility for the next decision from the actor bearing it and from the loop itself, avoiding a fixed-agent interpretation of EvaluatorOptimizer.
    ja: role root は next-decision responsibility を bearer/loop から分け EvaluatorOptimizer の fixed-agent 誤読を防ぎます。
  includes:
    - zh: 负责评估接受、选择修订、升级或停止的可承担职责。
      en: Bearable responsibilities for evaluation acceptance, revision selection, escalation, or stopping.
      ja: evaluation acceptance・revision selection・escalation・stop の bearable responsibility。
  excludes:
    - zh: 具体模型、用户、评审活动、循环状态、策略文档和评估结果。
      en: Concrete models, users, review activities, loop state, policy documents, and evaluation results.
      ja: concrete model・user・review activity・loop state・policy document・evaluation result。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 循环内 evaluator、optimizer、reviewer 职责映射为 ImprovementRole；声明 decision 或 execution duty 不绑定具体 model 实例。
    en: Evaluator, optimizer, and reviewer duties within loops map to ImprovementRole declaring decision or execution duty without binding specific model instances.
    ja: loop 内 evaluator/optimizer/reviewer 責務を decision/execution duty 宣言付き ImprovementRole へ写像し具体 model 实例に bind しません。
  typical_input:
    - description: Loop role declaration.
      format: '{"role_id": "evaluator-optimizer:report-quality", "duty": "loop-control"}'
      source_claims:
        - claim-improvement-role-design
  typical_output:
    - description: Moonweave ImprovementRole.
      format: '{"role_id": "security-reviewer", "duty": "formal-review"}'
      source_claims:
        - claim-improvement-role-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - improvement_role_id
  fields:
    - id: improvement_role_id
      labels:
        zh: 改进角色标识
        en: improvement-role ID
        ja: 改善 role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一种改进控制职责。
        en: Stably identifies one improvement-control responsibility.
        ja: 一 improvement-control responsibility を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluator-optimizer-role
      source_claims:
        - claim-improvement-role-design
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明角色可以评估、选择或终止哪些目标和循环。
        en: Declares which targets and loops the role may evaluate, select for, or stop.
        ja: role が evaluate/select/stop できる targets/loops を宣言します。
      allowed_values: []
      pattern: null
      example_value: report-quality loops
      source_claims:
        - claim-improvement-role-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementRole-reviewer
    labels:
      zh: 评审者角色
      en: Reviewer role
      ja: reviewer role
    descriptions:
      zh: security-reviewer 承担 formal-review duty 在 ReviewRevisionLoop 中。
      en: security-reviewer bears formal-review duty in ReviewRevisionLoop.
      ja: security-reviewer が ReviewRevisionLoop で formal-review duty を担う。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: PR review roles
    field_values:
      role_id: security-reviewer
    related_node_ids:
      - ImprovementRole
      - ReviewRevisionLoop
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-cookbook
      - claim-improvement-role-design
  - id: ImprovementRole-evaluator
    labels:
      zh: 评价者角色
      en: Evaluator role
      ja: evaluator role
    descriptions:
      zh: report-quality-evaluator 在 EvaluatorOptimizerLoop 中执行评分 duty。
      en: report-quality-evaluator performs scoring duty in EvaluatorOptimizerLoop.
      ja: report-quality-evaluator が EvaluatorOptimizerLoop で scoring duty を実行。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator node role
    field_values: {}
    related_node_ids:
      - ImprovementRole
      - EvaluatorOptimizer
    related_relation_ids:
      - EvaluatorOptimizer-controls-ImprovementLoop
    source_claims:
      - claim-improvement-role-langgraph
      - claim-improvement-role-design
  - id: ImprovementRole-boundary-agent
    labels:
      zh: Agent 实例不是角色
      en: Agent instance is not role
      ja: agent 实例は role ではない
    descriptions:
      zh: gpt-4-reviewer 是 model 实例不是 ImprovementRole 职责声明。
      en: gpt-4-reviewer is model instance not ImprovementRole duty declaration.
      ja: gpt-4-reviewer は model 实例で ImprovementRole duty 宣言ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: role versus instance
    field_values: {}
    related_node_ids:
      - ImprovementRole
    related_relation_ids: []
    source_claims:
      - claim-improvement-role-design
parent_relation: null
relations: []
