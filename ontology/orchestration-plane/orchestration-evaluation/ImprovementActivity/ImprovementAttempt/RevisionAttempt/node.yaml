schema: moonweave.ai/ontology-node/v1
id: RevisionAttempt
kind: concept
status: accepted
labels:
  zh: 修订尝试
  en: revision attempt
  ja: 改訂試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次 CorrectionActivity，并产生可供下一轮评价的候选版本的尝试。
    en: An attempt coordinating one CorrectionActivity in a definite loop round and producing a candidate revision for the next evaluation.
    ja: definite loop round で one CorrectionActivity を coordinate し next evaluation 用 candidate revision を生む attempt です。
  definition:
    zh: 修订尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次、输入版本和被协调的 CorrectionActivity 为身份；它依据 RevisionPlan 安排纠正，产生新的候选版本并更新 OptimizerState。实际修改内容的活动和修订产物由反馈域拥有，本节点只表达循环控制中的一次修订尝试。
    en: RevisionAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, input revision, and coordinated CorrectionActivity. It schedules correction under a RevisionPlan, produces a new candidate revision, and updates OptimizerState. The content-changing activity and revision artifact remain feedback-owned; this node represents one revision-control attempt.
    ja: RevisionAttempt は attempt ID・loop・round・input revision・coordinated CorrectionActivity で識別します。RevisionPlan 下で correction を配置し new candidate/state update を行いますが content-changing activity/artifact は feedback domain 所有です。
  why_needed:
    zh: 将尝试控制与实际纠正活动分开后，可以回答谁安排了哪次修改、修改属于第几轮以及何时进入下一次评价。
    en: Separating attempt control from the correction activity makes it possible to answer who scheduled which change, in which round, and when it entered the next evaluation.
    ja: attempt control と correction activity を分け who scheduled which change・round・next evaluation timing を回答できます。
  includes:
    - zh: 引用 RevisionPlan、协调 CorrectionActivity、产生新候选并更新循环状态的有序尝试。
      en: Ordered attempts that reference a RevisionPlan, coordinate CorrectionActivity, produce a new candidate, and update loop state.
      ja: RevisionPlan reference・CorrectionActivity coordination・new candidate・state update を持つ ordered attempt。
  excludes:
    - zh: CorrectionActivity 本身、RevisionPlan、修订产物、没有循环归属的一次编辑和整个 ReviewRevisionLoop。
      en: CorrectionActivity itself, RevisionPlan, revision artifacts, one edit without loop membership, and the whole ReviewRevisionLoop.
      ja: CorrectionActivity 自体・RevisionPlan・revision artifact・loop membership なし edit・whole ReviewRevisionLoop。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: correction_activity_ref
      labels:
        zh: 纠正活动引用
        en: correction-activity reference
        ja: correction activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由本尝试协调并实际修改目标内容的 CorrectionActivity。
        en: References the CorrectionActivity coordinated by this attempt that actually changes target content.
        ja: attempt が coordinate し target content を実際に変更する CorrectionActivity を参照します。
      allowed_values: []
      pattern: null
      example_value: correction-run-9
      source_claims:
        - claim-revision-attempt-002
        - claim-revision-attempt-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: RevisionAttempt-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 缺失事实修订尝试
      en: Missing-fact revision attempt
      ja: missing-fact revision attempt
    scenario_id: null
    descriptions:
      zh: revision-attempt-42-1 按 plan-2 启动 correction-run-9，把缺失事实写入 report@8，并将候选交给下一轮评价。
      en: revision-attempt-42-1 starts correction-run-9 under plan-2, writes the missing fact into report@8, and hands the candidate to the next evaluation.
      ja: revision-attempt-42-1 は plan-2 下で correction-run-9 を開始し missing fact を report@8 に加え next evaluation へ渡します。
    field_values:
      improvement_activity_id: revision-attempt-42-1
      target_ref: report@7
      status: completed
      round_index: 1
      correction_activity_ref: correction-run-9
    related_node_ids:
      - RevisionAttempt
      - CorrectionActivity
      - RevisionPlan
    related_relation_ids:
      - RevisionAttempt-coordinates-CorrectionActivity
    expected_result:
      zh: 作为修订尝试返回，同时把实际修改保留给 CorrectionActivity。
      en: Return it as a revision attempt while leaving the actual content change to CorrectionActivity.
      ja: revision attempt として返し actual content change は CorrectionActivity に保持します。
    why_valid_or_invalid:
      zh: 该对象拥有循环轮次和协调责任，而不是修改产物本身。
      en: The object owns loop-round and coordination responsibility rather than the modified artifact itself.
      ja: object は loop round/coordination responsibility を所有し modified artifact 自体ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-attempt-001
      - claim-revision-attempt-002
  - id: RevisionAttempt-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 用户直接编辑文档
      en: User directly edits a document
      ja: user direct document edit
    scenario_id: improvement-review-revisionattempt-boundary
    descriptions:
      zh: human-7 在编辑器中直接修改 report@7，没有 ImprovementLoop、RevisionPlan 或 attempt_id。
      en: human-7 directly edits report@7 in an editor with no ImprovementLoop, RevisionPlan, or attempt ID.
      ja: human-7 は editor で report@7 を直接変更し ImprovementLoop・RevisionPlan・attempt ID がありません。
    field_values: {}
    related_node_ids:
      - RevisionAttempt
      - CorrectionActivity
    related_relation_ids: []
    expected_result:
      zh: 若需记录则建 CorrectionActivity，不建立 RevisionAttempt。
      en: If recorded, create CorrectionActivity but not RevisionAttempt.
      ja: 必要なら CorrectionActivity を作り RevisionAttempt は作りません。
    why_valid_or_invalid:
      zh: 内容修订不自动意味着它被某个改进循环作为有序尝试控制。
      en: Changing content does not automatically mean an improvement loop controlled it as an ordered attempt.
      ja: content change は ordered loop attempt control を自動的に意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-attempt-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RevisionAttempt-is_a-ImprovementAttempt
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: RevisionAttempt 是一种 ImprovementAttempt；其必要种差是依据修订计划协调一个 CorrectionActivity 并产生下一候选。
    en: RevisionAttempt is a ImprovementAttempt whose necessary differentia is coordinating one CorrectionActivity under a revision plan and producing the next candidate.
    ja: RevisionAttempt は ImprovementAttempt の一種で、必要種差は revision plan 下で one CorrectionActivity を coordinate し next candidate を生むこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: RevisionAttempt-is_a-ImprovementAttempt-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementAttempt AND instance.revision_plan_ref IS VERSIONED AND instance.correction_activity_ref IDENTIFIES one CorrectionActivity AND instance PRODUCES a next candidate
      explanations:
        zh: 仅当对象既满足 ImprovementAttempt 的完整定义，又满足“依据修订计划协调一个 CorrectionActivity 并产生下一候选”时断言。
        en: Assert only when the object satisfies the complete ImprovementAttempt definition and coordinating one CorrectionActivity under a revision plan and producing the next candidate.
        ja: object が ImprovementAttempt の complete definition と「revision plan 下で one CorrectionActivity を coordinate し next candidate を生むこと」を満たす時のみ assert します。
      source_claims:
        - claim-revision-attempt-001
        - claim-revision-attempt-002
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RevisionAttempt-is_a-ImprovementAttempt-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-revisionattempt-is_a-improvementattempt-positive
      descriptions:
        zh: revision-attempt-42-1 协调 correction-run-9 并提交 report@8。
        en: revision-attempt-42-1 coordinates correction-run-9 and submits report@8.
        ja: revision-attempt-42-1 は correction-run-9 を coordinate し report@8 を提出します。
      field_values: {}
      related_node_ids:
        - RevisionAttempt
        - ImprovementAttempt
      related_relation_ids:
        - RevisionAttempt-is_a-ImprovementAttempt
      expected_result:
        zh: 类型查询返回 RevisionAttempt→ImprovementAttempt 的严格上位路径。
        en: Type traversal returns the strict RevisionAttempt-to-ImprovementAttempt genus path.
        ja: type traversal は strict RevisionAttempt→ImprovementAttempt genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementAttempt 的共同条件和 RevisionAttempt 的独有种差。
        en: The instance satisfies both the common ImprovementAttempt conditions and the unique RevisionAttempt differentia.
        ja: instance は ImprovementAttempt の common conditions と RevisionAttempt の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-revision-attempt-001
        - claim-revision-attempt-002
    - id: RevisionAttempt-is_a-ImprovementAttempt-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-revisionattempt-is_a-improvementattempt-boundary
      descriptions:
        zh: eval-attempt-42-2 读取候选并评分，但不修改候选内容。
        en: eval-attempt-42-2 reads and scores a candidate but does not change its content.
        ja: eval-attempt-42-2 は candidate を score しますが content を変更しません。
      field_values: {}
      related_node_ids:
        - RevisionAttempt
        - ImprovementAttempt
      related_relation_ids:
        - RevisionAttempt-is_a-ImprovementAttempt
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 RevisionAttempt。
        en: Relatedness or co-occurrence must not classify the boundary object as RevisionAttempt.
        ja: relatedness/co-occurrence だけで boundary object を RevisionAttempt に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 RevisionAttempt 的必要种差，至多属于 ImprovementAttempt 或相邻类型。
        en: The boundary object lacks the necessary RevisionAttempt differentia and is at most ImprovementAttempt or an adjacent type.
        ja: boundary object は RevisionAttempt の necessary differentia を欠き ImprovementAttempt または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-revision-attempt-001
        - claim-revision-attempt-002
  source_claims:
    - claim-revision-attempt-001
    - claim-revision-attempt-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: RevisionAttempt-coordinates-CorrectionActivity
    predicate: coordinates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 协调纠正活动
      en: coordinates correction activity
      ja: 是正活動を調整
    definitions:
      zh: RevisionAttempt coordinates CorrectionActivity 表示循环内一次修订尝试按照 RevisionPlan 安排并等待一个实际修改目标内容的纠正活动，控制尝试与修改活动不合并。
      en: RevisionAttempt coordinates CorrectionActivity means one loop revision attempt schedules and awaits a content-changing correction activity under RevisionPlan; the control attempt and modification activity remain separate.
      ja: RevisionAttempt coordinates CorrectionActivity は loop revision attempt が RevisionPlan 下で content-changing correction activity を schedule/await し control attempt と modification activity を分離することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_coordinates
      labels:
        zh: 反向 协调纠正活动
        en: inverse coordinates correction activity
        ja: 逆 是正活動を調整
    conditions:
      - id: RevisionAttempt-coordinates-CorrectionActivity-assertion-condition
        severity: error
        expression_language: plain
        expression: attempt.correction_activity_ref = correction.activity_id AND attempt.revision_plan_ref IS VERSIONED AND attempt.output_candidate_ref IS SET AND correction runtime IS TRACEABLE
        explanations:
          zh: 仅当 RevisionAttempt 明确引用 CorrectionActivity、计划版本和输出候选，且运行时段可追踪时成立。
          en: Assert only when RevisionAttempt explicitly references CorrectionActivity, plan revision, and output candidate and the runtime interval is traceable.
          ja: RevisionAttempt が CorrectionActivity・plan revision・output candidate を明示参照し runtime interval が traceable な時のみ assert します。
        source_claims:
          - claim-revision-attempt-001
          - claim-revision-attempt-002
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RevisionAttempt-coordinates-CorrectionActivity-example-positive-manual-20260716
        kind: positive
        labels:
          zh: coordinates 正例
          en: coordinates positive case
          ja: coordinates 正例
        scenario_id: improvement-relation-revisionattempt-coordinates-correctionactivity-positive
        descriptions:
          zh: revision-attempt-42-1 按 plan@2 启动 correction-run-9，并在其生成 report@8 后完成。
          en: revision-attempt-42-1 starts correction-run-9 under plan@2 and completes after it produces report@8.
          ja: revision-attempt-42-1 は plan@2 下で correction-run-9 を開始し report@8 生成後に完了します。
        field_values: {}
        related_node_ids:
          - RevisionAttempt
          - CorrectionActivity
        related_relation_ids:
          - RevisionAttempt-coordinates-CorrectionActivity
        expected_result:
          zh: 查询返回 RevisionAttempt —coordinates→ CorrectionActivity 的有向事实及其证据。
          en: The query returns the directed RevisionAttempt —coordinates→ CorrectionActivity fact with its evidence.
          ja: query は RevisionAttempt —coordinates→ CorrectionActivity の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 coordinates 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for coordinates are explicit while both endpoints retain independent identity.
          ja: source・target・coordinates basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-attempt-001
          - claim-revision-attempt-002
      - id: RevisionAttempt-coordinates-CorrectionActivity-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: coordinates 边界例
          en: coordinates boundary case
          ja: coordinates 境界例
        scenario_id: improvement-relation-revisionattempt-coordinates-correctionactivity-boundary
        descriptions:
          zh: correction-run-10 也修改 report@7，但属于用户直接编辑，没有 RevisionAttempt 引用。
          en: correction-run-10 also changes report@7 but is a direct user edit with no RevisionAttempt reference.
          ja: correction-run-10 は report@7 を変更しますが direct user edit で RevisionAttempt ref がありません。
        field_values: {}
        related_node_ids:
          - RevisionAttempt
          - CorrectionActivity
        related_relation_ids:
          - RevisionAttempt-coordinates-CorrectionActivity
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 coordinates。
          en: Co-occurrence, nearby time, or similar fields must not imply coordinates.
          ja: co-occurrence・nearby time・similar fields だけで coordinates を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 RevisionAttempt 对 CorrectionActivity 承担 coordinates 语义的显式记录。
          en: The boundary case lacks an explicit record proving that RevisionAttempt bears coordinates semantics toward CorrectionActivity.
          ja: boundary case は RevisionAttempt が CorrectionActivity に coordinates semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-attempt-001
          - claim-revision-attempt-002
    source_claims:
      - claim-revision-attempt-001
      - claim-revision-attempt-002
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:CorrectionActivity
