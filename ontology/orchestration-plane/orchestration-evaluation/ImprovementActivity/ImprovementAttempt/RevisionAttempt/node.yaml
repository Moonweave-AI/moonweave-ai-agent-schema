schema: moonweave.ai/ontology-node/v1
id: RevisionAttempt
kind: concept
labels:
  zh: 修订尝试
  en: revision attempt
  ja: 改訂試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次 CorrectionActivity，并产生可供下一轮评价的候选版本的尝试。
    en: An attempt coordinating one CorrectionActivity in a definite loop round and producing a candidate revision for the next evaluation.
    ja: definite loop round で one CorrectionActivity を coordinate し next evaluation 用 candidate revision を生む attempt です。
  definition:
    zh: 修订尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次、输入版本和被协调的 CorrectionActivity 为身份；它依据 RevisionPlan 安排纠正，产生新的候选版本并更新 OptimizerState。实际修改内容的活动和修订产物由反馈域拥有，本节点只表达循环控制中的一次修订尝试。
    en: RevisionAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, input revision, and coordinated CorrectionActivity. It schedules correction under a RevisionPlan, produces a new candidate revision, and updates OptimizerState. The content-changing activity and revision artifact remain feedback-owned; this node represents one revision-control attempt.
    ja: RevisionAttempt は attempt ID・loop・round・input revision・coordinated CorrectionActivity で識別します。RevisionPlan 下で correction を配置し new candidate/state update を行いますが content-changing activity/artifact は feedback domain 所有です。
  why_needed:
    zh: 将尝试控制与实际纠正活动分开后，可以回答谁安排了哪次修改、修改属于第几轮以及何时进入下一次评价。
    en: Separating attempt control from the correction activity makes it possible to answer who scheduled which change, in which round, and when it entered the next evaluation.
    ja: attempt control と correction activity を分け who scheduled which change・round・next evaluation timing を回答できます。
  includes:
    - zh: 引用 RevisionPlan、协调 CorrectionActivity、产生新候选并更新循环状态的有序尝试。
      en: Ordered attempts that reference a RevisionPlan, coordinate CorrectionActivity, produce a new candidate, and update loop state.
      ja: RevisionPlan reference・CorrectionActivity coordination・new candidate・state update を持つ ordered attempt。
  excludes:
    - zh: CorrectionActivity 本身、RevisionPlan、修订产物、没有循环归属的一次编辑和整个 ReviewRevisionLoop。
      en: CorrectionActivity itself, RevisionPlan, revision artifacts, one edit without loop membership, and the whole ReviewRevisionLoop.
      ja: CorrectionActivity 自体・RevisionPlan・revision artifact・loop membership なし edit・whole ReviewRevisionLoop。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: correction_activity_ref
      labels:
        zh: 纠正活动引用
        en: correction-activity reference
        ja: correction activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由本尝试协调并实际修改目标内容的 CorrectionActivity。
        en: References the CorrectionActivity coordinated by this attempt that actually changes target content.
        ja: attempt が coordinate し target content を実際に変更する CorrectionActivity を参照します。
      allowed_values: []
      pattern: null
      example_value: correction-run-9
      source_claims:
        - claim-revision-attempt-002
        - claim-revision-attempt-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: RevisionAttempt-example-positive-manual-20260716
    labels:
      zh: RevisionAttempt positive
      en: RevisionAttempt positive
      ja: RevisionAttempt positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 RevisionAttempt 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for RevisionAttempt: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) RevisionAttempt: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: revision-attempt-42-1, target_ref: "report@7", status: completed, round_index: 1, correction_activity_ref: correction-run-9}

    related_node_ids:
      - RevisionAttempt
      - CorrectionActivity
      - RevisionPlan
    related_relation_ids:
      - RevisionAttempt-coordinates-CorrectionActivity
    source_claims:
      - claim-revision-attempt-001
      - claim-revision-attempt-002

  - id: RevisionAttempt-example-boundary-manual-20260716
    labels:
      zh: RevisionAttempt boundary
      en: RevisionAttempt boundary
      ja: RevisionAttempt boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 RevisionAttempt 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not RevisionAttempt static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で RevisionAttempt 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - RevisionAttempt
      - CorrectionActivity
    related_relation_ids: []
    source_claims:
      - claim-revision-attempt-002

  - id: RevisionAttempt-example-counterexample-confusable
    labels:
      zh: RevisionAttempt counterexample
      en: RevisionAttempt counterexample
      ja: RevisionAttempt counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 RevisionAttempt 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style RevisionAttempt positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 RevisionAttempt 正例にならない。
    field_values: {attempt_id: absent, revision_activity_ref: absent, diff_ref: diff-report-7}

    related_node_ids:
      - RevisionAttempt
      - RevisionActivity
      - ImprovementAttempt
      - CorrectionActivity
      - RevisionPlan
    related_relation_ids: []
    source_claims:
      - claim-revision-attempt-001

  - id: RevisionAttempt-example-instance-concrete
    labels:
      zh: RevisionAttempt instance
      en: RevisionAttempt instance
      ja: RevisionAttempt instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 RevisionAttempt。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to RevisionAttempt.
      ja: Reflexion 实例 failed→reflect→retry が RevisionAttempt に写像。
    field_values: {improvement_activity_id: revision-attempt-42-1, target_ref: "report@7", status: completed, round_index: 1, correction_activity_ref: correction-run-9}

    related_node_ids:
      - RevisionAttempt
      - CorrectionActivity
      - RevisionPlan
    related_relation_ids: []
    source_claims:
      - claim-revision-attempt-001

