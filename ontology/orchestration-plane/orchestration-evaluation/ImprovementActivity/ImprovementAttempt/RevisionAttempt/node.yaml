schema: moonweave.ai/ontology-node/v1
id: RevisionAttempt
kind: concept
labels:
  zh: 修订尝试
  en: revision attempt
  ja: 改訂試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次 CorrectionActivity，并产生可供下一轮评价的候选版本的尝试。
    en: An attempt coordinating one CorrectionActivity in a definite loop round and producing a candidate revision for the next evaluation.
    ja: definite loop round で one CorrectionActivity を coordinate し next evaluation 用 candidate revision を生む attempt です。
  definition:
    zh: 修订尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次、输入版本和被协调的 CorrectionActivity 为身份；它依据 RevisionPlan 安排纠正，产生新的候选版本并更新 OptimizerState。实际修改内容的活动和修订产物由反馈域拥有，本节点只表达循环控制中的一次修订尝试。
    en: RevisionAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, input revision, and coordinated CorrectionActivity. It schedules correction under a RevisionPlan, produces a new candidate revision, and updates OptimizerState. The content-changing activity and revision artifact remain feedback-owned; this node represents one revision-control attempt.
    ja: RevisionAttempt は attempt ID・loop・round・input revision・coordinated CorrectionActivity で識別します。RevisionPlan 下で correction を配置し new candidate/state update を行いますが content-changing activity/artifact は feedback domain 所有です。
  why_needed:
    zh: 将尝试控制与实际纠正活动分开后，可以回答谁安排了哪次修改、修改属于第几轮以及何时进入下一次评价。
    en: Separating attempt control from the correction activity makes it possible to answer who scheduled which change, in which round, and when it entered the next evaluation.
    ja: attempt control と correction activity を分け who scheduled which change・round・next evaluation timing を回答できます。
  includes:
    - zh: 引用 RevisionPlan、协调 CorrectionActivity、产生新候选并更新循环状态的有序尝试。
      en: Ordered attempts that reference a RevisionPlan, coordinate CorrectionActivity, produce a new candidate, and update loop state.
      ja: RevisionPlan reference・CorrectionActivity coordination・new candidate・state update を持つ ordered attempt。
  excludes:
    - zh: CorrectionActivity 本身、RevisionPlan、修订产物、没有循环归属的一次编辑和整个 ReviewRevisionLoop。
      en: CorrectionActivity itself, RevisionPlan, revision artifacts, one edit without loop membership, and the whole ReviewRevisionLoop.
      ja: CorrectionActivity 自体・RevisionPlan・revision artifact・loop membership なし edit・whole ReviewRevisionLoop。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangGraph revise 节点、Cursor verification loop fix 与 PR patch 映射为 RevisionAttempt；produces OptimizerState 并 applies RevisionPlan。
    en: LangGraph revise nodes, Cursor verification loop fixes, and PR patches map to RevisionAttempt producing OptimizerState and applying RevisionPlan.
    ja: LangGraph revise node・Cursor verification loop fix・PR patch を OptimizerState produce/RevisionPlan apply 付き RevisionAttempt へ写像します。
  typical_input:
    - description: Revision step after rejection.
      format: 'def revise(state): return {"draft": llm.invoke(state["prompt"] + state["feedback"])}'
      source_claims:
        - claim-revision-attempt-design
  typical_output:
    - description: Moonweave RevisionAttempt.
      format: '{"improvement_activity_id": "revision-42-2", "revision_plan_ref": "add-citation-plan@2"}'
      source_claims:
        - claim-revision-attempt-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys: []
  fields:
    - id: correction_activity_ref
      labels:
        zh: 纠正活动引用
        en: correction-activity reference
        ja: correction activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由本尝试协调并实际修改目标内容的 CorrectionActivity。
        en: References the CorrectionActivity coordinated by this attempt that actually changes target content.
        ja: attempt が coordinate し target content を実際に変更する CorrectionActivity を参照します。
      allowed_values: []
      pattern: null
      example_value: correction-run-9
      source_claims:
        - claim-revision-attempt-design
        - claim-revision-attempt-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RevisionAttempt-langgraph-revise
    labels:
      zh: LangGraph 修订尝试
      en: LangGraph revision attempt
      ja: LangGraph 修訂 attempt
    descriptions:
      zh: revision-42-2 应用 add-citation-plan@2 更新 draft 产生 state@7。
      en: revision-42-2 applies add-citation-plan@2 updating draft producing state@7.
      ja: revision-42-2 が add-citation-plan@2 を適用し draft 更新で state@7 生成。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: revise node
    field_values:
      improvement_activity_id: revision-42-2
    related_node_ids:
      - RevisionAttempt
      - OptimizerState
    related_relation_ids:
      - RevisionAttempt-produces-OptimizerState
    source_claims:
      - claim-revision-attempt-langgraph
      - claim-revision-attempt-design
  - id: RevisionAttempt-cursor-verify
    labels:
      zh: Cursor 验证修复
      en: Cursor verification fix
      ja: Cursor 検証 fix
    descriptions:
      zh: patch-884 应用 fix-auth-884 后 pytest 重跑 PASS。
      en: patch-884 applies fix-auth-884 then pytest rerun PASS.
      ja: patch-884 が fix-auth-884 適用後 pytest 再実行 PASS。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: test-fix-verify
    field_values: {}
    related_node_ids:
      - RevisionAttempt
      - EvaluatorOptimizerLoop
    related_relation_ids: []
    source_claims:
      - claim-revision-attempt-cookbook
      - claim-revision-attempt-design
  - id: RevisionAttempt-boundary-plan
    labels:
      zh: 修订计划不是尝试
      en: Revision plan is not attempt
      ja: revision plan は attempt ではない
    descriptions:
      zh: add-citation-plan@2 是 RevisionPlan 规范不是 revision-42-2 发生。
      en: add-citation-plan@2 is RevisionPlan spec not revision-42-2 occurrence.
      ja: add-citation-plan@2 は RevisionPlan spec で revision-42-2 occurrence ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: plan versus attempt
    field_values: {}
    related_node_ids:
      - RevisionAttempt
    related_relation_ids: []
    source_claims:
      - claim-revision-attempt-design
parent_relation:
  id: RevisionAttempt-is_a-ImprovementAttempt
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: RevisionAttempt 是一种 ImprovementAttempt；其必要种差是依据修订计划协调一个 CorrectionActivity 并产生下一候选。
    en: RevisionAttempt is a ImprovementAttempt whose necessary differentia is coordinating one CorrectionActivity under a revision plan and producing the next candidate.
    ja: RevisionAttempt は ImprovementAttempt の一種で、必要種差は revision plan 下で one CorrectionActivity を coordinate し next candidate を生むこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: RevisionAttempt-is_a-ImprovementAttempt-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementAttempt AND instance.revision_plan_ref IS VERSIONED AND instance.correction_activity_ref IDENTIFIES one CorrectionActivity AND instance PRODUCES a next candidate
      explanations:
        zh: 仅当对象既满足 ImprovementAttempt 的完整定义，又满足“依据修订计划协调一个 CorrectionActivity 并产生下一候选”时断言。
        en: Assert only when the object satisfies the complete ImprovementAttempt definition and coordinating one CorrectionActivity under a revision plan and producing the next candidate.
        ja: object が ImprovementAttempt の complete definition と「revision plan 下で one CorrectionActivity を coordinate し next candidate を生むこと」を満たす時のみ assert します。
      source_claims:
        - claim-revision-attempt-design
        - claim-revision-attempt-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-revision-attempt-design
    - claim-revision-attempt-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: null
