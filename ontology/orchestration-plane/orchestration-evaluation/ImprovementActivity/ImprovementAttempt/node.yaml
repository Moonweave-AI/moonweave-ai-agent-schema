schema: moonweave.ai/ontology-node/v1
id: ImprovementAttempt
kind: concept
status: accepted
labels:
  zh: 改进尝试
  en: improvement attempt
  ja: 改善試行
semantics:
  short_definition:
    zh: 在一个改进循环内占据确定轮次、执行一种改进职责并产生结果的单次活动。
    en: One activity occupying a definite round in an improvement loop, performing one improvement responsibility, and producing an outcome.
    ja: improvement loop の definite round で one responsibility を実行し outcome を生む single activity です。
  definition:
    zh: 改进尝试是 ImprovementActivity 的子类，以尝试标识、所属循环、轮次和尝试类型为身份；EvaluationAttempt 与 RevisionAttempt 分别协调评价运行和纠正活动。尝试可更新 OptimizerState，但不拥有整个循环的终止身份，也不是评价证据本身。
    en: ImprovementAttempt is an ImprovementActivity identified by attempt ID, containing loop, round number, and attempt kind. EvaluationAttempt and RevisionAttempt specialize coordination of evaluation runs and correction activities. An attempt may update OptimizerState but does not own the loop's termination identity and is not evaluation evidence itself.
    ja: ImprovementAttempt は attempt ID・containing loop・round・kind で識別する ImprovementActivity です。EvaluationAttempt/RevisionAttempt を特殊化し state を更新できますが loop termination や evaluation evidence 自体ではありません。
  why_needed:
    zh: 共同尝试层防止“评估尝试”和“修订尝试”直接平挂在模块下，并为循环包含、顺序和状态更新提供统一端点。
    en: The common attempt layer prevents evaluation and revision attempts from hanging directly under the module and gives containment, ordering, and state updates one coherent endpoint.
    ja: common attempt layer により evaluation/revision attempt の module 直下平置きを除き containment・ordering・state update に coherent endpoint を与えます。
  includes:
    - zh: 具有 attempt_id、loop_id、round_index、开始结束时间和结果状态的评估或修订尝试。
      en: Evaluation or revision attempts with attempt ID, loop ID, round index, start and end times, and outcome status.
      ja: attempt ID・loop ID・round index・start/end・outcome status を持つ evaluation/revision attempt。
  excludes:
    - zh: 跨多轮的 ImprovementLoop、ReviewActivity、EvaluationRun、CorrectionActivity、RevisionPlan 与反馈证据。
      en: The multi-round ImprovementLoop, ReviewActivity, EvaluationRun, CorrectionActivity, RevisionPlan, and feedback evidence.
      ja: multi-round ImprovementLoop・ReviewActivity・EvaluationRun・CorrectionActivity・RevisionPlan・feedback evidence。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: round_index
      labels:
        zh: 轮次序号
        en: round index
        ja: round index
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录尝试在所属循环中的单调顺序。
        en: Records the attempt's monotonic order within its loop.
        ja: loop 内の attempt monotonic order を記録します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-improvement-attempt-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementAttempt-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 第二轮修订尝试
      en: Second-round revision attempt
      ja: second-round revision attempt
    scenario_id: null
    descriptions:
      zh: attempt-42-2 属于 loop-42 的第二轮，在 10:03 至 10:04 协调一次纠正并写入状态版本 3。
      en: attempt-42-2 is round two of loop-42, coordinates one correction from 10:03 to 10:04, and writes state revision three.
      ja: attempt-42-2 は loop-42 round two で one correction を coordinate し state revision three を書きます。
    field_values:
      improvement_activity_id: attempt-42-2
      target_ref: report@7
      status: completed
      round_index: 2
    related_node_ids:
      - ImprovementAttempt
      - RevisionAttempt
    related_relation_ids: []
    expected_result:
      zh: 作为 loop-42 的第二个尝试返回，并保留具体 RevisionAttempt 类型。
      en: Return it as the second attempt in loop-42 while retaining the specific RevisionAttempt type.
      ja: loop-42 の second attempt として返し RevisionAttempt type を保持します。
    why_valid_or_invalid:
      zh: 明确循环归属、轮次、时段和单一职责足以确定一次尝试。
      en: Loop membership, round, interval, and one responsibility determine one attempt.
      ja: loop membership・round・interval・one responsibility が one attempt を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-attempt-001
      - claim-improvement-attempt-003
  - id: ImprovementAttempt-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 循环结束后的汇总状态
      en: Post-loop summary state
      ja: post-loop summary state
    scenario_id: improvement-review-improvementattempt-boundary
    descriptions:
      zh: optimizer-state-42#final 汇总最后分数和停止原因，但没有开始时间、执行职责或 attempt_id。
      en: optimizer-state-42#final summarizes the final score and stop reason but has no start time, executed responsibility, or attempt ID.
      ja: optimizer-state-42#final は final score/stop reason を保持しますが start time・responsibility・attempt ID がありません。
    field_values: {}
    related_node_ids:
      - ImprovementAttempt
      - OptimizerState
    related_relation_ids: []
    expected_result:
      zh: 分类为 OptimizerState，不创建改进尝试。
      en: Classify it as OptimizerState and do not create an improvement attempt.
      ja: OptimizerState とし improvement attempt は作りません。
    why_valid_or_invalid:
      zh: 状态快照描述尝试后的情况，不是执行工作的活动发生。
      en: A state snapshot describes conditions after an attempt; it is not the work-performing occurrence.
      ja: state snapshot は attempt 後の condition で work-performing occurrence ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-attempt-002
      - claim-improvement-attempt-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ImprovementCoordinationActivity
    shared_parent_concept_id: ImprovementActivity
    differentia:
      zh: 端点特定对照：父节点 ImprovementActivity：ImprovementAttempt（semantic kind=activity，骨架 ImprovementAttempt-is_a-ImprovementActivity）；ImprovementCoordinationActivity（semantic kind=activity，骨架 ImprovementCoordinationActivity-is_a-ImprovementActivity）。双端条件：ImprovementAttempt 条件：“在一个改进循环内占据确定轮次、执行一种改进职责并产生结果的单次活动”；ImprovementCoordinationActivity 条件：“在改进循环中分派尝试、路由反馈或组织评审责任的改进活动”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ImprovementActivity: ImprovementAttempt (semantic kind=activity, backbone ImprovementAttempt-is_a-ImprovementActivity); ImprovementCoordinationActivity (semantic kind=activity, backbone ImprovementCoordinationActivity-is_a-ImprovementActivity). Endpoint conditions: ImprovementAttempt condition: “One activity occupying a definite round in an improvement loop, performing one improvement responsibility, and producing an outcome”; ImprovementCoordinationActivity condition: “An improvement activity dispatching attempts, routing feedback, or organizing review responsibility inside a loop”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ImprovementActivity：ImprovementAttempt（semantic kind=activity、バックボーン ImprovementAttempt-is_a-ImprovementActivity）；ImprovementCoordinationActivity（semantic kind=activity、バックボーン ImprovementCoordinationActivity-is_a-ImprovementActivity）。両端条件：ImprovementAttempt の条件：「improvement loop の definite round で one responsibility を実行し outcome を生む single activity です」；ImprovementCoordinationActivity の条件：「loop 内で attempt dispatch・feedback routing・review responsibility を調整する improvement activity です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-improvement-attempt-004
parent_relation:
  id: ImprovementAttempt-is_a-ImprovementActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ImprovementAttempt 是一种 ImprovementActivity；其必要种差是在所属循环中具有确定轮次且只承担一次评价或修订职责。
    en: ImprovementAttempt is a ImprovementActivity whose necessary differentia is having a definite round in a containing loop and one evaluation or revision responsibility.
    ja: ImprovementAttempt は ImprovementActivity の一種で、必要種差は containing loop の definite round と one evaluation/revision responsibility を持つこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ImprovementAttempt-is_a-ImprovementActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementActivity AND instance.round_index IS DEFINED WITHIN one loop AND instance duty IS EXACTLY ONE OF {evaluation, revision}
      explanations:
        zh: 仅当对象既满足 ImprovementActivity 的完整定义，又满足“在所属循环中具有确定轮次且只承担一次评价或修订职责”时断言。
        en: Assert only when the object satisfies the complete ImprovementActivity definition and having a definite round in a containing loop and one evaluation or revision responsibility.
        ja: object が ImprovementActivity の complete definition と「containing loop の definite round と one evaluation/revision responsibility を持つこと」を満たす時のみ assert します。
      source_claims:
        - claim-improvement-attempt-001
        - claim-improvement-attempt-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ImprovementAttempt-is_a-ImprovementActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-improvementattempt-is_a-improvementactivity-positive
      descriptions:
        zh: attempt-42-2 是 loop-42 第二轮的单次修订控制活动。
        en: attempt-42-2 is one revision-control activity in round two of loop-42.
        ja: attempt-42-2 は loop-42 round two の one revision-control activity です。
      field_values: {}
      related_node_ids:
        - ImprovementAttempt
        - ImprovementActivity
      related_relation_ids:
        - ImprovementAttempt-is_a-ImprovementActivity
      expected_result:
        zh: 类型查询返回 ImprovementAttempt→ImprovementActivity 的严格上位路径。
        en: Type traversal returns the strict ImprovementAttempt-to-ImprovementActivity genus path.
        ja: type traversal は strict ImprovementAttempt→ImprovementActivity genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementActivity 的共同条件和 ImprovementAttempt 的独有种差。
        en: The instance satisfies both the common ImprovementActivity conditions and the unique ImprovementAttempt differentia.
        ja: instance は ImprovementActivity の common conditions と ImprovementAttempt の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-improvement-attempt-001
        - claim-improvement-attempt-003
    - id: ImprovementAttempt-is_a-ImprovementActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-improvementattempt-is_a-improvementactivity-boundary
      descriptions:
        zh: loop-42 汇集多次尝试并拥有整体终止结果，不是单次尝试。
        en: loop-42 aggregates multiple attempts and owns overall termination, so it is not one attempt.
        ja: loop-42 は multiple attempts と overall termination を持ち single attempt ではありません。
      field_values: {}
      related_node_ids:
        - ImprovementAttempt
        - ImprovementActivity
      related_relation_ids:
        - ImprovementAttempt-is_a-ImprovementActivity
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 ImprovementAttempt。
        en: Relatedness or co-occurrence must not classify the boundary object as ImprovementAttempt.
        ja: relatedness/co-occurrence だけで boundary object を ImprovementAttempt に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 ImprovementAttempt 的必要种差，至多属于 ImprovementActivity 或相邻类型。
        en: The boundary object lacks the necessary ImprovementAttempt differentia and is at most ImprovementActivity or an adjacent type.
        ja: boundary object は ImprovementAttempt の necessary differentia を欠き ImprovementActivity または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-improvement-attempt-001
        - claim-improvement-attempt-003
  source_claims:
    - claim-improvement-attempt-001
    - claim-improvement-attempt-003
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ImprovementAttempt-updates-OptimizerState
    predicate: updates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 更新优化器状态
      en: updates optimizer state
      ja: 最適化器状態を更新
    definitions:
      zh: ImprovementAttempt updates OptimizerState 表示一次尝试完成后产生该循环状态系列的新不可变版本，记录候选、评价摘要、预算和下一动作；旧版本保持可审计。
      en: ImprovementAttempt updates OptimizerState means completion of one attempt creates a new immutable revision in the loop's state series with candidate, evaluation summary, budget, and next action while prior revisions remain auditable.
      ja: ImprovementAttempt updates OptimizerState は attempt completion が candidate・summary・budget・next action を持つ new immutable state revision を作り prior revisions を保持することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_updates
      labels:
        zh: 反向 更新优化器状态
        en: inverse updates optimizer state
        ja: 逆 最適化器状態を更新
    conditions:
      - id: ImprovementAttempt-updates-OptimizerState-assertion-condition
        severity: error
        expression_language: plain
        expression: new_state.source_attempt_ref = attempt.improvement_attempt_id AND new_state.predecessor_ref IS SET AND new_state.revision_sequence > predecessor.revision_sequence
        explanations:
          zh: 仅当新状态版本明确记录来源 attempt_id、前驱状态版本和更高的 revision_sequence 时成立。
          en: Assert only when the new state revision records the source attempt ID, predecessor revision, and a higher revision sequence.
          ja: new state revision が source attempt ID・predecessor revision・higher sequence を記録する時のみ assert します。
        source_claims:
          - claim-improvement-attempt-002
          - claim-improvement-attempt-003
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ImprovementAttempt-updates-OptimizerState-example-positive-manual-20260716
        kind: positive
        labels:
          zh: updates 正例
          en: updates positive case
          ja: updates 正例
        scenario_id: improvement-relation-improvementattempt-updates-optimizerstate-positive
        descriptions:
          zh: revision-attempt-42-1 完成后从 state#2 产生 state#3，并记录 next=evaluate。
          en: revision-attempt-42-1 completes and produces state#3 from state#2 with next=evaluate.
          ja: revision-attempt-42-1 完了後 state#2 から state#3 を作り next=evaluate を記録します。
        field_values: {}
        related_node_ids:
          - ImprovementAttempt
          - OptimizerState
        related_relation_ids:
          - ImprovementAttempt-updates-OptimizerState
        expected_result:
          zh: 查询返回 ImprovementAttempt —updates→ OptimizerState 的有向事实及其证据。
          en: The query returns the directed ImprovementAttempt —updates→ OptimizerState fact with its evidence.
          ja: query は ImprovementAttempt —updates→ OptimizerState の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 updates 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for updates are explicit while both endpoints retain independent identity.
          ja: source・target・updates basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-improvement-attempt-002
          - claim-improvement-attempt-003
      - id: ImprovementAttempt-updates-OptimizerState-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: updates 边界例
          en: updates boundary case
          ja: updates 境界例
        scenario_id: improvement-relation-improvementattempt-updates-optimizerstate-boundary
        descriptions:
          zh: state#3 在同一时间附近出现，但没有 source_attempt_ref 或前驱版本。
          en: state#3 appears near the same time but has no source-attempt reference or predecessor revision.
          ja: state#3 は nearby time にありますが source attempt ref/predecessor revision がありません。
        field_values: {}
        related_node_ids:
          - ImprovementAttempt
          - OptimizerState
        related_relation_ids:
          - ImprovementAttempt-updates-OptimizerState
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 updates。
          en: Co-occurrence, nearby time, or similar fields must not imply updates.
          ja: co-occurrence・nearby time・similar fields だけで updates を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 ImprovementAttempt 对 OptimizerState 承担 updates 语义的显式记录。
          en: The boundary case lacks an explicit record proving that ImprovementAttempt bears updates semantics toward OptimizerState.
          ja: boundary case は ImprovementAttempt が OptimizerState に updates semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-improvement-attempt-002
          - claim-improvement-attempt-003
    source_claims:
      - claim-improvement-attempt-002
      - claim-improvement-attempt-003
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:OptimizerState
