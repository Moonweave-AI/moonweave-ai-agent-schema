schema: moonweave.ai/ontology-node/v1
id: ImprovementAttempt
kind: concept
labels:
  zh: 改进尝试
  en: improvement attempt
  ja: 改善試行
semantics:
  short_definition:
    zh: 在一个改进循环内占据确定轮次、执行一种改进职责并产生结果的单次活动。
    en: One activity occupying a definite round in an improvement loop, performing one improvement responsibility, and producing an outcome.
    ja: improvement loop の definite round で one responsibility を実行し outcome を生む single activity です。
  definition:
    zh: 改进尝试是 ImprovementActivity 的子类，以尝试标识、所属循环、轮次和尝试类型为身份；EvaluationAttempt 与 RevisionAttempt 分别协调评价运行和纠正活动。尝试可更新 OptimizerState，但不拥有整个循环的终止身份，也不是评价证据本身。
    en: ImprovementAttempt is an ImprovementActivity identified by attempt ID, containing loop, round number, and attempt kind. EvaluationAttempt and RevisionAttempt specialize coordination of evaluation runs and correction activities. An attempt may update OptimizerState but does not own the loop's termination identity and is not evaluation evidence itself.
    ja: ImprovementAttempt は attempt ID・containing loop・round・kind で識別する ImprovementActivity です。EvaluationAttempt/RevisionAttempt を特殊化し state を更新できますが loop termination や evaluation evidence 自体ではありません。
  why_needed:
    zh: 共同尝试层防止“评估尝试”和“修订尝试”直接平挂在模块下，并为循环包含、顺序和状态更新提供统一端点。
    en: The common attempt layer prevents evaluation and revision attempts from hanging directly under the module and gives containment, ordering, and state updates one coherent endpoint.
    ja: common attempt layer により evaluation/revision attempt の module 直下平置きを除き containment・ordering・state update に coherent endpoint を与えます。
  includes:
    - zh: 具有 attempt_id、loop_id、round_index、开始结束时间和结果状态的评估或修订尝试。
      en: Evaluation or revision attempts with attempt ID, loop ID, round index, start and end times, and outcome status.
      ja: attempt ID・loop ID・round index・start/end・outcome status を持つ evaluation/revision attempt。
  excludes:
    - zh: 跨多轮的 ImprovementLoop、ReviewActivity、EvaluationRun、CorrectionActivity、RevisionPlan 与反馈证据。
      en: The multi-round ImprovementLoop, ReviewActivity, EvaluationRun, CorrectionActivity, RevisionPlan, and feedback evidence.
      ja: multi-round ImprovementLoop・ReviewActivity・EvaluationRun・CorrectionActivity・RevisionPlan・feedback evidence。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: round_index
      labels:
        zh: 轮次序号
        en: round index
        ja: round index
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录尝试在所属循环中的单调顺序。
        en: Records the attempt's monotonic order within its loop.
        ja: loop 内の attempt monotonic order を記録します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-improvement-attempt-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementAttempt-example-positive-manual-20260716
    labels:
      zh: ImprovementAttempt positive
      en: ImprovementAttempt positive
      ja: ImprovementAttempt positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ImprovementAttempt 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ImprovementAttempt: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ImprovementAttempt: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: attempt-42-2, target_ref: "report@7", status: completed, round_index: 2}

    related_node_ids:
      - ImprovementAttempt
      - RevisionAttempt
    related_relation_ids: []
    source_claims:
      - claim-improvement-attempt-001
      - claim-improvement-attempt-003

  - id: ImprovementAttempt-example-boundary-manual-20260716
    labels:
      zh: ImprovementAttempt boundary
      en: ImprovementAttempt boundary
      ja: ImprovementAttempt boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 ImprovementAttempt 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not ImprovementAttempt static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で ImprovementAttempt 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - ImprovementAttempt
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-improvement-attempt-002
      - claim-improvement-attempt-003

  - id: ImprovementAttempt-example-counterexample-confusable
    labels:
      zh: ImprovementAttempt counterexample
      en: ImprovementAttempt counterexample
      ja: ImprovementAttempt counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 ImprovementAttempt PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style ImprovementAttempt PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 ImprovementAttempt ではない。
    field_values: {attempt_id: absent, started_at: absent, template_ref: eval-run-template-security}

    related_node_ids:
      - ImprovementAttempt
      - EvaluationAttempt
      - ImprovementActivity
      - RevisionAttempt
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-improvement-attempt-001

  - id: ImprovementAttempt-example-instance-concrete
    labels:
      zh: ImprovementAttempt instance
      en: ImprovementAttempt instance
      ja: ImprovementAttempt instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ImprovementAttempt。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ImprovementAttempt.
      ja: Reflexion 实例 failed→reflect→retry が ImprovementAttempt に写像。
    field_values: {improvement_activity_id: attempt-42-2, target_ref: "report@7", status: completed, round_index: 2}

    related_node_ids:
      - ImprovementAttempt
      - RevisionAttempt
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-improvement-attempt-001

