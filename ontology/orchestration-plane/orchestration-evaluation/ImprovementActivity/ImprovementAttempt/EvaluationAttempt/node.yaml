schema: moonweave.ai/ontology-node/v1
id: EvaluationAttempt
kind: concept
labels:
  zh: 评价尝试
  en: evaluation attempt
  ja: 評価試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次独立 EvaluationRun 并形成接受或拒绝判定的尝试。
    en: An attempt that coordinates one independent EvaluationRun in a definite loop round and forms an accept-or-reject decision.
    ja: definite loop round で one EvaluationRun を coordinate し accept/reject decision を形成する attempt です。
  definition:
    zh: 评价尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次和被协调的 EvaluationRun 为身份；它安排评价运行、读取其测量与发现，并向后续 RevisionAttempt 提供顺序依据。评价标准和 EvaluationRun 的结果仍由反馈评价域拥有，本概念只拥有循环内的控制发生。
    en: EvaluationAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, and coordinated EvaluationRun. It schedules evaluation, reads measurements and findings, and establishes ordering for a later RevisionAttempt. Evaluation criteria and EvaluationRun results remain feedback-owned; this concept owns only the control occurrence inside the loop.
    ja: EvaluationAttempt は attempt ID・loop・round・coordinated EvaluationRun で識別する ImprovementAttempt です。evaluation を schedule し measurements/findings を読み next RevisionAttempt の order を定めますが evaluation result 自体は feedback domain が所有します。
  why_needed:
    zh: 该节点把“评估作为循环控制步骤”与“评估运行及其指标结果”分开，消除旧 ThinkAsTool 把实现技巧实体化的问题。
    en: This node separates evaluation as a loop-control step from the evaluation run and metric results, removing the old ThinkAsTool implementation metaphor.
    ja: evaluation を loop-control step と evaluation run/metric result に分離し旧 ThinkAsTool implementation metaphor を除きます。
  includes:
    - zh: 有明确循环轮次、协调 EvaluationRun、读取判定并产生路由信号的评价尝试。
      en: Evaluation attempts with an explicit loop round that coordinate EvaluationRun, read its decision, and emit a routing signal.
      ja: explicit loop round で EvaluationRun を coordinate し decision を読み routing signal を出す attempt。
  excludes:
    - zh: EvaluationRun 本身、EvaluationSpecification、独立 ReviewActivity、评分结果以及把思考包装成工具调用的实现模式。
      en: EvaluationRun itself, EvaluationSpecification, independent ReviewActivity, score results, and implementation patterns that wrap reasoning as a tool call.
      ja: EvaluationRun 自体・EvaluationSpecification・ReviewActivity・score result・reasoning-as-tool implementation pattern。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: evaluation_run_ref
      labels:
        zh: 评价运行引用
        en: evaluation-run reference
        ja: evaluation run ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由该尝试协调且保留独立身份的 EvaluationRun。
        en: References the independently identified EvaluationRun coordinated by this attempt.
        ja: attempt が coordinate する independently identified EvaluationRun を参照します。
      allowed_values: []
      pattern: null
      example_value: eval-run-42-2
      source_claims:
        - claim-evaluation-attempt-002
        - claim-evaluation-attempt-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationAttempt-example-positive-manual-20260716
    labels:
      zh: EvaluationAttempt positive
      en: EvaluationAttempt positive
      ja: EvaluationAttempt positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 EvaluationAttempt 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for EvaluationAttempt: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) EvaluationAttempt: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: eval-attempt-42-2, target_ref: "report@7", status: completed, round_index: 2, evaluation_run_ref: eval-run-42-2}

    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
    related_relation_ids:
      - EvaluationAttempt-coordinates-EvaluationRun
    source_claims:
      - claim-evaluation-attempt-002
      - claim-evaluation-attempt-001

  - id: EvaluationAttempt-example-boundary-manual-20260716
    labels:
      zh: EvaluationAttempt boundary
      en: EvaluationAttempt boundary
      ja: EvaluationAttempt boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 EvaluationAttempt 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not EvaluationAttempt static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で EvaluationAttempt 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluation-attempt-002
      - claim-evaluation-attempt-003

  - id: EvaluationAttempt-example-counterexample-confusable
    labels:
      zh: EvaluationAttempt counterexample
      en: EvaluationAttempt counterexample
      ja: EvaluationAttempt counterexample
    descriptions:
      zh: 直接输出最终答案而无 step-by-step 推理链的响应不能作为 CoT 式 EvaluationAttempt 正例。
      en: Responses with final answer only and no step-by-step chain cannot serve as CoT-style EvaluationAttempt positive example.
      ja: 最終回答のみで step-by-step 欠落は CoT 式 EvaluationAttempt 正例にならない。
    field_values: {attempt_id: absent, target_ref: absent, grader_config_ref: grader-security-rubric.yaml}

    related_node_ids:
      - EvaluationAttempt
      - EvaluationActivity
      - ImprovementAttempt
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluation-attempt-002

  - id: EvaluationAttempt-example-instance-concrete
    labels:
      zh: EvaluationAttempt instance
      en: EvaluationAttempt instance
      ja: EvaluationAttempt instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 EvaluationAttempt。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to EvaluationAttempt.
      ja: Reflexion 实例 failed→reflect→retry が EvaluationAttempt に写像。
    field_values: {improvement_activity_id: eval-attempt-42-2, target_ref: "report@7", status: completed, round_index: 2, evaluation_run_ref: eval-run-42-2}

    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluation-attempt-002

