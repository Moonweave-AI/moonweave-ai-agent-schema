schema: moonweave.ai/ontology-node/v1
id: EvaluationAttempt
kind: concept
labels:
  zh: 评价尝试
  en: evaluation attempt
  ja: 評価試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次独立 EvaluationRun 并形成接受或拒绝判定的尝试。
    en: An attempt that coordinates one independent EvaluationRun in a definite loop round and forms an accept-or-reject decision.
    ja: definite loop round で one EvaluationRun を coordinate し accept/reject decision を形成する attempt です。
  definition:
    zh: 评价尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次和被协调的 EvaluationRun 为身份；它安排评价运行、读取其测量与发现，并向后续 RevisionAttempt 提供顺序依据。评价标准和 EvaluationRun 的结果仍由反馈评价域拥有，本概念只拥有循环内的控制发生。
    en: EvaluationAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, and coordinated EvaluationRun. It schedules evaluation, reads measurements and findings, and establishes ordering for a later RevisionAttempt. Evaluation criteria and EvaluationRun results remain feedback-owned; this concept owns only the control occurrence inside the loop.
    ja: EvaluationAttempt は attempt ID・loop・round・coordinated EvaluationRun で識別する ImprovementAttempt です。evaluation を schedule し measurements/findings を読み next RevisionAttempt の order を定めますが evaluation result 自体は feedback domain が所有します。
  why_needed:
    zh: 该节点把“评估作为循环控制步骤”与“评估运行及其指标结果”分开，消除旧 ThinkAsTool 把实现技巧实体化的问题。
    en: This node separates evaluation as a loop-control step from the evaluation run and metric results, removing the old ThinkAsTool implementation metaphor.
    ja: evaluation を loop-control step と evaluation run/metric result に分離し旧 ThinkAsTool implementation metaphor を除きます。
  includes:
    - zh: 有明确循环轮次、协调 EvaluationRun、读取判定并产生路由信号的评价尝试。
      en: Evaluation attempts with an explicit loop round that coordinate EvaluationRun, read its decision, and emit a routing signal.
      ja: explicit loop round で EvaluationRun を coordinate し decision を読み routing signal を出す attempt。
  excludes:
    - zh: EvaluationRun 本身、EvaluationSpecification、独立 ReviewActivity、评分结果以及把思考包装成工具调用的实现模式。
      en: EvaluationRun itself, EvaluationSpecification, independent ReviewActivity, score results, and implementation patterns that wrap reasoning as a tool call.
      ja: EvaluationRun 自体・EvaluationSpecification・ReviewActivity・score result・reasoning-as-tool implementation pattern。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangGraph evaluate 节点、pytest CI 运行与 LLM-as-judge 评分映射为 EvaluationAttempt；coordinates EvaluationRun 但不拥有 Metric 内容。
    en: LangGraph evaluate nodes, pytest CI runs, and LLM-as-judge scoring map to EvaluationAttempt coordinating EvaluationRun without owning Metric content.
    ja: LangGraph evaluate node・pytest CI run・LLM-as-judge score を EvaluationRun coordinate 付き EvaluationAttempt へ写像し Metric 内容は所有しません。
  typical_input:
    - description: Evaluation step in loop.
      format: 'def evaluate(state): return {"score": scorer(state["draft"]), "feedback": critique(state["draft"])}'
      source_claims:
        - claim-evaluation-attempt-design
  typical_output:
    - description: Moonweave EvaluationAttempt.
      format: '{"improvement_activity_id": "evaluation-42-1", "evaluation_run_ref": "eval-run-42-1"}'
      source_claims:
        - claim-evaluation-attempt-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys: []
  fields:
    - id: evaluation_run_ref
      labels:
        zh: 评价运行引用
        en: evaluation-run reference
        ja: evaluation run ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由该尝试协调且保留独立身份的 EvaluationRun。
        en: References the independently identified EvaluationRun coordinated by this attempt.
        ja: attempt が coordinate する independently identified EvaluationRun を参照します。
      allowed_values: []
      pattern: null
      example_value: eval-run-42-2
      source_claims:
        - claim-evaluation-attempt-design
        - claim-evaluation-attempt-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationAttempt-langgraph-evaluate
    labels:
      zh: LangGraph 评估尝试
      en: LangGraph evaluation attempt
      ja: LangGraph 評価 attempt
    descriptions:
      zh: evaluation-42-1 协调 eval-run-42-1 对 draft@7 打分 0.72 并产生 feedback。
      en: evaluation-42-1 coordinates eval-run-42-1 scoring draft@7 at 0.72 with feedback.
      ja: evaluation-42-1 が eval-run-42-1 を coordinate し draft@7 を 0.72 score。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator node
    field_values:
      improvement_activity_id: evaluation-42-1
    related_node_ids:
      - EvaluationAttempt
      - ImprovementLoop
    related_relation_ids:
      - EvaluationAttempt-coordinates-EvaluationRun
      - EvaluationAttempt-precedes-RevisionAttempt
    source_claims:
      - claim-evaluation-attempt-langgraph
      - claim-evaluation-attempt-design
  - id: EvaluationAttempt-pytest-ci
    labels:
      zh: pytest CI 评估
      en: pytest CI evaluation
      ja: pytest CI 評価
    descriptions:
      zh: test-run-18-1 观测 pytest FAIL test_auth_token_expiry。
      en: test-run-18-1 observes pytest FAIL test_auth_token_expiry.
      ja: test-run-18-1 が pytest FAIL test_auth_token_expiry を観測。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: test-fix-verify
    field_values: {}
    related_node_ids:
      - EvaluationAttempt
      - EvaluatorOptimizerLoop
    related_relation_ids: []
    source_claims:
      - claim-evaluation-attempt-cookbook
      - claim-evaluation-attempt-design
  - id: EvaluationAttempt-boundary-metric
    labels:
      zh: Metric 定义不是尝试
      en: Metric definition is not attempt
      ja: Metric 定義は attempt ではない
    descriptions:
      zh: safety-score@2 是 Metric 规范不是 EvaluationAttempt 发生。
      en: safety-score@2 is Metric spec not EvaluationAttempt occurrence.
      ja: safety-score@2 は Metric spec で EvaluationAttempt occurrence ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: metric versus attempt
    field_values: {}
    related_node_ids:
      - EvaluationAttempt
    related_relation_ids: []
    source_claims:
      - claim-evaluation-attempt-design
parent_relation:
  id: EvaluationAttempt-is_a-ImprovementAttempt
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: EvaluationAttempt 是一种 ImprovementAttempt；其必要种差是协调一个独立 EvaluationRun 并形成该轮接受或拒绝信号。
    en: EvaluationAttempt is a ImprovementAttempt whose necessary differentia is coordinating one independent EvaluationRun and forming that round's accept-or-reject signal.
    ja: EvaluationAttempt は ImprovementAttempt の一種で、必要種差は one independent EvaluationRun を coordinate し round accept/reject signal を形成すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: EvaluationAttempt-is_a-ImprovementAttempt-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementAttempt AND instance.evaluation_run_ref IDENTIFIES ONE independent EvaluationRun AND instance RECORDS that run's accept-or-reject signal
      explanations:
        zh: 仅当对象既满足 ImprovementAttempt 的完整定义，又满足“协调一个独立 EvaluationRun 并形成该轮接受或拒绝信号”时断言。
        en: Assert only when the object satisfies the complete ImprovementAttempt definition and coordinating one independent EvaluationRun and forming that round's accept-or-reject signal.
        ja: object が ImprovementAttempt の complete definition と「one independent EvaluationRun を coordinate し round accept/reject signal を形成すること」を満たす時のみ assert します。
      source_claims:
        - claim-evaluation-attempt-design
        - claim-evaluation-attempt-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-evaluation-attempt-design
    - claim-evaluation-attempt-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: EvaluationAttempt-coordinates-EvaluationRun
    predicate: coordinates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 协调评价运行
      en: coordinates evaluation run
      ja: 評価実行を調整
    definitions:
      zh: EvaluationAttempt coordinates EvaluationRun 表示循环内一次评价尝试安排并跟踪一个由反馈评价域拥有的评价运行，二者共享该轮引用但不合并身份。
      en: EvaluationAttempt coordinates EvaluationRun means one loop attempt schedules and tracks one feedback-owned evaluation run; they share a round reference but retain distinct identities.
      ja: EvaluationAttempt coordinates EvaluationRun は loop attempt が feedback-owned evaluation run を schedule/track し round ref を共有しても identity を分離することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_coordinates
      labels:
        zh: 反向 协调评价运行
        en: inverse coordinates evaluation run
        ja: 逆 評価実行を調整
    conditions:
      - id: EvaluationAttempt-coordinates-EvaluationRun-assertion-condition
        severity: error
        expression_language: plain
        expression: attempt.evaluation_run_ref = run.evaluation_run_id AND run.started_at IS TRACEABLE AND run.completed_at IS TRACEABLE
        explanations:
          zh: 仅当尝试记录明确引用其启动或等待的 EvaluationRun，并可追踪开始与完成时成立。
          en: Assert only when the attempt explicitly references the EvaluationRun it starts or awaits and the start and completion are traceable.
          ja: attempt が start/await する EvaluationRun を明示参照し start/completion が traceable な時のみ assert します。
        source_claims:
          - claim-evaluation-attempt-design
          - claim-evaluation-attempt-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-evaluation-attempt-design
      - claim-evaluation-attempt-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:EvaluationRun
  - id: EvaluationAttempt-precedes-RevisionAttempt
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于修订尝试
      en: precedes revision attempt
      ja: 改訂試行に先行
    definitions:
      zh: EvaluationAttempt precedes RevisionAttempt 表示同一循环中的一次评价尝试先产生拒绝依据，随后特定修订尝试才开始；这是实例时序而非类型层级。
      en: EvaluationAttempt precedes RevisionAttempt means one evaluation attempt produces a rejection basis before a particular revision attempt starts in the same loop; this is instance order, not taxonomy.
      ja: EvaluationAttempt precedes RevisionAttempt は same loop で evaluation rejection basis 後に particular revision attempt が開始する instance order で taxonomy ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_precedes
      labels:
        zh: 反向 先于修订尝试
        en: inverse precedes revision attempt
        ja: 逆 改訂試行に先行
    conditions:
      - id: EvaluationAttempt-precedes-RevisionAttempt-assertion-condition
        severity: error
        expression_language: plain
        expression: evaluation.containing_loop_ref = revision.containing_loop_ref AND evaluation.ended_at <= revision.started_at AND revision.feedback_ref ORIGINATES_FROM evaluation
        explanations:
          zh: 仅当两次尝试属于同一循环、评价结束不晚于修订开始，且后者引用前者反馈时成立。
          en: Assert only when both attempts belong to the same loop, evaluation ends no later than revision starts, and the latter references the former's feedback.
          ja: same loop・evaluation end≤revision start・latter が former feedback を参照する時のみ assert します。
        source_claims:
          - claim-evaluation-attempt-design
          - claim-evaluation-attempt-design
          - claim-evaluation-attempt-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-evaluation-attempt-design
      - claim-evaluation-attempt-design
      - claim-evaluation-attempt-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RevisionAttempt
