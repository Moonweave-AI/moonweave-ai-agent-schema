schema: moonweave.ai/ontology-node/v1
id: EvaluationAttempt
kind: concept
status: review
labels:
  zh: 评价尝试
  en: evaluation attempt
  ja: 評価試行
semantics:
  short_definition:
    zh: 在改进循环的确定轮次中协调一次独立 EvaluationRun 并形成接受或拒绝判定的尝试。
    en: An attempt that coordinates one independent EvaluationRun in a definite loop round and forms an accept-or-reject decision.
    ja: definite loop round で one EvaluationRun を coordinate し accept/reject decision を形成する attempt です。
  definition:
    zh: 评价尝试是 ImprovementAttempt 的子类，以 attempt_id、所属循环、轮次和被协调的 EvaluationRun 为身份；它安排评价运行、读取其测量与发现，并向后续 RevisionAttempt 提供顺序依据。评价标准和 EvaluationRun 的结果仍由反馈评价域拥有，本概念只拥有循环内的控制发生。
    en: EvaluationAttempt is an ImprovementAttempt identified by attempt ID, containing loop, round, and coordinated EvaluationRun. It schedules evaluation, reads measurements and findings, and establishes ordering for a later RevisionAttempt. Evaluation criteria and EvaluationRun results remain feedback-owned; this concept owns only the control occurrence inside the loop.
    ja: EvaluationAttempt は attempt ID・loop・round・coordinated EvaluationRun で識別する ImprovementAttempt です。evaluation を schedule し measurements/findings を読み next RevisionAttempt の order を定めますが evaluation result 自体は feedback domain が所有します。
  why_needed:
    zh: 该节点把“评估作为循环控制步骤”与“评估运行及其指标结果”分开，消除旧 ThinkAsTool 把实现技巧实体化的问题。
    en: This node separates evaluation as a loop-control step from the evaluation run and metric results, removing the old ThinkAsTool implementation metaphor.
    ja: evaluation を loop-control step と evaluation run/metric result に分離し旧 ThinkAsTool implementation metaphor を除きます。
  includes:
    - zh: 有明确循环轮次、协调 EvaluationRun、读取判定并产生路由信号的评价尝试。
      en: Evaluation attempts with an explicit loop round that coordinate EvaluationRun, read its decision, and emit a routing signal.
      ja: explicit loop round で EvaluationRun を coordinate し decision を読み routing signal を出す attempt。
  excludes:
    - zh: EvaluationRun 本身、EvaluationSpecification、独立 ReviewActivity、评分结果以及把思考包装成工具调用的实现模式。
      en: EvaluationRun itself, EvaluationSpecification, independent ReviewActivity, score results, and implementation patterns that wrap reasoning as a tool call.
      ja: EvaluationRun 自体・EvaluationSpecification・ReviewActivity・score result・reasoning-as-tool implementation pattern。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: evaluation_run_ref
      labels:
        zh: 评价运行引用
        en: evaluation-run reference
        ja: evaluation run ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由该尝试协调且保留独立身份的 EvaluationRun。
        en: References the independently identified EvaluationRun coordinated by this attempt.
        ja: attempt が coordinate する independently identified EvaluationRun を参照します。
      allowed_values: []
      pattern: null
      example_value: eval-run-42-2
      source_claims:
        - claim-evaluation-attempt-002
        - claim-evaluation-attempt-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationAttempt-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 第二轮质量评价尝试
      en: Second-round quality evaluation attempt
      ja: second-round quality evaluation attempt
    scenario_id: null
    descriptions:
      zh: eval-attempt-42-2 在 loop-42 的第二轮启动 eval-run-42-2，读取 quality=0.92，并形成 accept 路由信号。
      en: eval-attempt-42-2 starts eval-run-42-2 in round two of loop-42, reads quality 0.92, and forms an accept routing signal.
      ja: eval-attempt-42-2 は loop-42 round two で eval-run を開始し quality 0.92 を読み accept signal を形成します。
    field_values:
      improvement_activity_id: eval-attempt-42-2
      target_ref: report@7
      status: completed
      round_index: 2
      evaluation_run_ref: eval-run-42-2
    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
    related_relation_ids:
      - EvaluationAttempt-coordinates-EvaluationRun
    expected_result:
      zh: 保留评价尝试与评价运行两个身份，并用 coordinates 连接。
      en: Preserve separate attempt and run identities and connect them with coordinates.
      ja: attempt/run の separate identity を保持し coordinates で接続します。
    why_valid_or_invalid:
      zh: 一个对象控制循环轮次，另一个拥有评价数据与结果，二者不能合并。
      en: One object controls the loop round while the other owns evaluation data and result; they cannot be merged.
      ja: one object は loop round を control し other は evaluation data/result を所有するため merge できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-attempt-002
      - claim-evaluation-attempt-001
  - id: EvaluationAttempt-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 独立回归评测运行
      en: Independent regression eval run
      ja: independent regression eval run
    scenario_id: improvement-review-evaluationattempt-boundary
    descriptions:
      zh: eval-run-nightly-7 按定时任务评分数据集，没有所属 ImprovementLoop、round_index 或后续修订。
      en: eval-run-nightly-7 scores a dataset on schedule with no ImprovementLoop, round index, or subsequent revision.
      ja: eval-run-nightly-7 は schedule で dataset を score し ImprovementLoop・round・revision がありません。
    field_values: {}
    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
    related_relation_ids: []
    expected_result:
      zh: 仅分类为 EvaluationRun，不建立 EvaluationAttempt。
      en: Classify it only as EvaluationRun and do not create EvaluationAttempt.
      ja: EvaluationRun のみとし EvaluationAttempt は作りません。
    why_valid_or_invalid:
      zh: 评价发生若不承担循环内轮次控制，就不是改进尝试。
      en: An evaluation occurrence is not an improvement attempt unless it performs round control inside a loop.
      ja: evaluation occurrence が loop round control を担わなければ improvement attempt ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-attempt-002
      - claim-evaluation-attempt-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EvaluationAttempt-is_a-ImprovementAttempt
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: EvaluationAttempt 是一种 ImprovementAttempt；其必要种差是协调一个独立 EvaluationRun 并形成该轮接受或拒绝信号。
    en: EvaluationAttempt is a ImprovementAttempt whose necessary differentia is coordinating one independent EvaluationRun and forming that round's accept-or-reject signal.
    ja: EvaluationAttempt は ImprovementAttempt の一種で、必要種差は one independent EvaluationRun を coordinate し round accept/reject signal を形成すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: EvaluationAttempt-is_a-ImprovementAttempt-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementAttempt AND instance.evaluation_run_ref IDENTIFIES ONE independent EvaluationRun AND instance RECORDS that run's accept-or-reject signal
      explanations:
        zh: 仅当对象既满足 ImprovementAttempt 的完整定义，又满足“协调一个独立 EvaluationRun 并形成该轮接受或拒绝信号”时断言。
        en: Assert only when the object satisfies the complete ImprovementAttempt definition and coordinating one independent EvaluationRun and forming that round's accept-or-reject signal.
        ja: object が ImprovementAttempt の complete definition と「one independent EvaluationRun を coordinate し round accept/reject signal を形成すること」を満たす時のみ assert します。
      source_claims:
        - claim-evaluation-attempt-001
        - claim-evaluation-attempt-002
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EvaluationAttempt-is_a-ImprovementAttempt-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-evaluationattempt-is_a-improvementattempt-positive
      descriptions:
        zh: eval-attempt-42-2 协调 eval-run-42-2 并返回 accept。
        en: eval-attempt-42-2 coordinates eval-run-42-2 and returns accept.
        ja: eval-attempt-42-2 は eval-run-42-2 を coordinate し accept を返します。
      field_values: {}
      related_node_ids:
        - EvaluationAttempt
        - ImprovementAttempt
      related_relation_ids:
        - EvaluationAttempt-is_a-ImprovementAttempt
      expected_result:
        zh: 类型查询返回 EvaluationAttempt→ImprovementAttempt 的严格上位路径。
        en: Type traversal returns the strict EvaluationAttempt-to-ImprovementAttempt genus path.
        ja: type traversal は strict EvaluationAttempt→ImprovementAttempt genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementAttempt 的共同条件和 EvaluationAttempt 的独有种差。
        en: The instance satisfies both the common ImprovementAttempt conditions and the unique EvaluationAttempt differentia.
        ja: instance は ImprovementAttempt の common conditions と EvaluationAttempt の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-attempt-001
        - claim-evaluation-attempt-002
    - id: EvaluationAttempt-is_a-ImprovementAttempt-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-evaluationattempt-is_a-improvementattempt-boundary
      descriptions:
        zh: revision-attempt-42-1 协调内容纠正，不协调评价运行。
        en: revision-attempt-42-1 coordinates content correction rather than an evaluation run.
        ja: revision-attempt-42-1 は content correction を coordinate し evaluation run ではありません。
      field_values: {}
      related_node_ids:
        - EvaluationAttempt
        - ImprovementAttempt
      related_relation_ids:
        - EvaluationAttempt-is_a-ImprovementAttempt
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 EvaluationAttempt。
        en: Relatedness or co-occurrence must not classify the boundary object as EvaluationAttempt.
        ja: relatedness/co-occurrence だけで boundary object を EvaluationAttempt に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 EvaluationAttempt 的必要种差，至多属于 ImprovementAttempt 或相邻类型。
        en: The boundary object lacks the necessary EvaluationAttempt differentia and is at most ImprovementAttempt or an adjacent type.
        ja: boundary object は EvaluationAttempt の necessary differentia を欠き ImprovementAttempt または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-attempt-001
        - claim-evaluation-attempt-002
  source_claims:
    - claim-evaluation-attempt-001
    - claim-evaluation-attempt-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: EvaluationAttempt-coordinates-EvaluationRun
    predicate: coordinates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 协调评价运行
      en: coordinates evaluation run
      ja: 評価実行を調整
    definitions:
      zh: EvaluationAttempt coordinates EvaluationRun 表示循环内一次评价尝试安排并跟踪一个由反馈评价域拥有的评价运行，二者共享该轮引用但不合并身份。
      en: EvaluationAttempt coordinates EvaluationRun means one loop attempt schedules and tracks one feedback-owned evaluation run; they share a round reference but retain distinct identities.
      ja: EvaluationAttempt coordinates EvaluationRun は loop attempt が feedback-owned evaluation run を schedule/track し round ref を共有しても identity を分離することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_coordinates
      labels:
        zh: 反向 协调评价运行
        en: inverse coordinates evaluation run
        ja: 逆 評価実行を調整
    conditions:
      - id: EvaluationAttempt-coordinates-EvaluationRun-assertion-condition
        severity: error
        expression_language: plain
        expression: attempt.evaluation_run_ref = run.evaluation_run_id AND run.started_at IS TRACEABLE AND run.completed_at IS TRACEABLE
        explanations:
          zh: 仅当尝试记录明确引用其启动或等待的 EvaluationRun，并可追踪开始与完成时成立。
          en: Assert only when the attempt explicitly references the EvaluationRun it starts or awaits and the start and completion are traceable.
          ja: attempt が start/await する EvaluationRun を明示参照し start/completion が traceable な時のみ assert します。
        source_claims:
          - claim-evaluation-attempt-002
          - claim-evaluation-attempt-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluationAttempt-coordinates-EvaluationRun-example-positive-manual-20260716
        kind: positive
        labels:
          zh: coordinates 正例
          en: coordinates positive case
          ja: coordinates 正例
        scenario_id: improvement-relation-evaluationattempt-coordinates-evaluationrun-positive
        descriptions:
          zh: eval-attempt-42-2 启动 eval-run-42-2，等待其 quality=0.92 结果后形成 accept 信号。
          en: eval-attempt-42-2 starts eval-run-42-2 and forms accept only after its quality 0.92 result.
          ja: eval-attempt-42-2 は eval-run-42-2 を開始し quality 0.92 後に accept を形成します。
        field_values: {}
        related_node_ids:
          - EvaluationAttempt
          - EvaluationRun
        related_relation_ids:
          - EvaluationAttempt-coordinates-EvaluationRun
        expected_result:
          zh: 查询返回 EvaluationAttempt —coordinates→ EvaluationRun 的有向事实及其证据。
          en: The query returns the directed EvaluationAttempt —coordinates→ EvaluationRun fact with its evidence.
          ja: query は EvaluationAttempt —coordinates→ EvaluationRun の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 coordinates 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for coordinates are explicit while both endpoints retain independent identity.
          ja: source・target・coordinates basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-attempt-002
          - claim-evaluation-attempt-001
      - id: EvaluationAttempt-coordinates-EvaluationRun-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: coordinates 边界例
          en: coordinates boundary case
          ja: coordinates 境界例
        scenario_id: improvement-relation-evaluationattempt-coordinates-evaluationrun-boundary
        descriptions:
          zh: nightly-eval-run-7 独立运行，附近虽有 loop-42，但没有任何尝试引用该运行。
          en: nightly-eval-run-7 runs independently; loop-42 exists nearby but no attempt references the run.
          ja: nightly-eval-run-7 は independent で nearby loop-42 があっても attempt reference がありません。
        field_values: {}
        related_node_ids:
          - EvaluationAttempt
          - EvaluationRun
        related_relation_ids:
          - EvaluationAttempt-coordinates-EvaluationRun
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 coordinates。
          en: Co-occurrence, nearby time, or similar fields must not imply coordinates.
          ja: co-occurrence・nearby time・similar fields だけで coordinates を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 EvaluationAttempt 对 EvaluationRun 承担 coordinates 语义的显式记录。
          en: The boundary case lacks an explicit record proving that EvaluationAttempt bears coordinates semantics toward EvaluationRun.
          ja: boundary case は EvaluationAttempt が EvaluationRun に coordinates semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-attempt-002
          - claim-evaluation-attempt-001
    source_claims:
      - claim-evaluation-attempt-002
      - claim-evaluation-attempt-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:EvaluationRun
  - id: EvaluationAttempt-precedes-RevisionAttempt
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于修订尝试
      en: precedes revision attempt
      ja: 改訂試行に先行
    definitions:
      zh: EvaluationAttempt precedes RevisionAttempt 表示同一循环中的一次评价尝试先产生拒绝依据，随后特定修订尝试才开始；这是实例时序而非类型层级。
      en: EvaluationAttempt precedes RevisionAttempt means one evaluation attempt produces a rejection basis before a particular revision attempt starts in the same loop; this is instance order, not taxonomy.
      ja: EvaluationAttempt precedes RevisionAttempt は same loop で evaluation rejection basis 後に particular revision attempt が開始する instance order で taxonomy ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_precedes
      labels:
        zh: 反向 先于修订尝试
        en: inverse precedes revision attempt
        ja: 逆 改訂試行に先行
    conditions:
      - id: EvaluationAttempt-precedes-RevisionAttempt-assertion-condition
        severity: error
        expression_language: plain
        expression: evaluation.containing_loop_ref = revision.containing_loop_ref AND evaluation.ended_at <= revision.started_at AND revision.feedback_ref ORIGINATES_FROM evaluation
        explanations:
          zh: 仅当两次尝试属于同一循环、评价结束不晚于修订开始，且后者引用前者反馈时成立。
          en: Assert only when both attempts belong to the same loop, evaluation ends no later than revision starts, and the latter references the former's feedback.
          ja: same loop・evaluation end≤revision start・latter が former feedback を参照する時のみ assert します。
        source_claims:
          - claim-evaluation-attempt-001
          - claim-evaluation-attempt-004
          - claim-evaluation-attempt-003
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluationAttempt-precedes-RevisionAttempt-example-positive-manual-20260716
        kind: positive
        labels:
          zh: precedes 正例
          en: precedes positive case
          ja: precedes 正例
        scenario_id: improvement-relation-evaluationattempt-precedes-revisionattempt-positive
        descriptions:
          zh: eval-attempt-42-1 于 10:02 拒绝，revision-attempt-42-1 于 10:03 读取该反馈后开始。
          en: eval-attempt-42-1 rejects at 10:02; revision-attempt-42-1 reads that feedback and starts at 10:03.
          ja: eval-attempt-42-1 は 10:02 reject、revision-attempt-42-1 は feedback を読み 10:03 start します。
        field_values: {}
        related_node_ids:
          - EvaluationAttempt
          - RevisionAttempt
        related_relation_ids:
          - EvaluationAttempt-precedes-RevisionAttempt
        expected_result:
          zh: 查询返回 EvaluationAttempt —precedes→ RevisionAttempt 的有向事实及其证据。
          en: The query returns the directed EvaluationAttempt —precedes→ RevisionAttempt fact with its evidence.
          ja: query は EvaluationAttempt —precedes→ RevisionAttempt の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 precedes 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for precedes are explicit while both endpoints retain independent identity.
          ja: source・target・precedes basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-attempt-001
          - claim-evaluation-attempt-004
          - claim-evaluation-attempt-003
      - id: EvaluationAttempt-precedes-RevisionAttempt-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: precedes 边界例
          en: precedes boundary case
          ja: precedes 境界例
        scenario_id: improvement-relation-evaluationattempt-precedes-revisionattempt-boundary
        descriptions:
          zh: 另一个循环的 revision-attempt-51-1 在 10:03 开始，但与 eval-attempt-42-1 没有反馈引用。
          en: revision-attempt-51-1 starts at 10:03 in another loop but has no feedback reference to eval-attempt-42-1.
          ja: another loop の revision-attempt-51-1 は same time でも eval-attempt-42-1 feedback ref がありません。
        field_values: {}
        related_node_ids:
          - EvaluationAttempt
          - RevisionAttempt
        related_relation_ids:
          - EvaluationAttempt-precedes-RevisionAttempt
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 precedes。
          en: Co-occurrence, nearby time, or similar fields must not imply precedes.
          ja: co-occurrence・nearby time・similar fields だけで precedes を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 EvaluationAttempt 对 RevisionAttempt 承担 precedes 语义的显式记录。
          en: The boundary case lacks an explicit record proving that EvaluationAttempt bears precedes semantics toward RevisionAttempt.
          ja: boundary case は EvaluationAttempt が RevisionAttempt に precedes semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-attempt-001
          - claim-evaluation-attempt-004
          - claim-evaluation-attempt-003
    source_claims:
      - claim-evaluation-attempt-001
      - claim-evaluation-attempt-004
      - claim-evaluation-attempt-003
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:RevisionAttempt
