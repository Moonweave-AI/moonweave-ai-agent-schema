source_claims:
  - id: claim-improvement-loop-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official evaluator-optimizer pattern separates a generator occurrence from an evaluator occurrence, routes rejected output back with feedback, and stops when explicit success criteria accept the output. Moonweave uses that operational distinction for improvement loops, attempts, state, and stop control without modeling LangGraph itself as a graph node.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API treats state snapshots, executable nodes, and fixed or conditional edges as separate workflow elements. Moonweave uses this evidence to distinguish ImprovementState from ImprovementActivity and to keep containment, dispatch, updates, and termination as cross-facts rather than type parents.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-004
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure and testing criteria from distinct evaluation runs and run outputs. Moonweave uses that distinction to keep EvaluationAttempt, the feedback-owned EvaluationRun it coordinates, and reusable ReviewAssignment or RevisionPlan specifications as different objects.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-005
    source: eng-ont-prov-o
    supports: PROV-O defines an Activity as occurring over time and provides prov:startedAtTime and prov:endedAtTime. Moonweave records the loop occurrence's start explicitly.
    locator: "PROV-O Recommendation Section 3.1: Activity, startedAtTime, and endedAtTime"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-006
    source: eng-ont-prov-o
    supports: PROV-O uses an activity end event and prov:endedAtTime to delimit the end of an Activity. Moonweave uses that boundary for a completed improvement-loop occurrence.
    locator: PROV-O Recommendation Section 3.1 and PROV Constraints activity end event
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-007
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's evaluator-optimizer workflow routes an accepted candidate to END. Moonweave names that loop-level outcome accepted.
    locator: "Workflows and agents > Evaluator-optimizer: Accepted path to END"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-008
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional routing can terminate from current graph state. Moonweave infers an explicit attempt-budget condition so termination is bounded and auditable.
    locator: Graph API overview > Conditional edges may route to END based on state
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-009
    source: eng-fw-langgraph-graph-api
    supports: LangGraph edges determine both routing and graph termination. Moonweave keeps the reusable stop condition distinct from its occurrence-level stopped outcome.
    locator: Graph API overview > Edges define routing and how the graph decides to stop
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-010
    source: eng-ont-prov-o
    supports: PROV-O allows an Activity to be ended by an Entity or Agent-associated event. Moonweave distinguishes such external cancellation from a stop-condition evaluation.
    locator: "PROV-O Recommendation Section 3.2: wasEndedBy and qualified End"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-011
    source: eng-fw-langgraph-workflows-agents
    supports: The evaluator-optimizer pattern iterates on rejected feedback and ends on acceptance. Moonweave generalizes the loop-level terminal state into explicit, non-overlapping outcomes.
    locator: Workflows and agents > Evaluator-optimizer conditional routing
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-012
    source: eng-fw-langgraph-graph-api
    supports: A LangGraph conditional edge evaluates current state to choose a destination or END. Moonweave records the exact versioned condition used in that occurrence rather than inferring it from graph adjacency.
    locator: Graph API overview > Conditional edges and routing functions
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-improvement-loop-013
    source: eng-ont-prov-o
    supports: PROV-O and PROV Constraints delimit an Activity with start and end events. Moonweave adds the domain-specific requirement that a control-loop end preserve its evaluated decision basis.
    locator: PROV-O Section 3.1 and PROV Constraints activity start/end events
    evidence_kind: design-inference
    confidence: high
    review_status: pending
