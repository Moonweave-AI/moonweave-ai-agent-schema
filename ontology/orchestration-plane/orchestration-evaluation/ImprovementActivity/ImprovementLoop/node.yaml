    source_claims:
      - claim-improvement-loop-langgraph
      - claim-improvement-loop-design
  - id: ImprovementLoop-interrupt-resume
    labels:
      zh: interrupt 人工反馈循环
      en: Interrupt human feedback loop
      ja: interrupt 人工 feedback loop
    descriptions:
      zh: human_review_gate interrupt 等待 approve/reject 驱动 continue/stop。
      en: human_review_gate interrupt awaits approve/reject driving continue/stop.
      ja: human_review_gate interrupt が approve/reject を待ち continue/stop を駆動。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: interrupt/resume
    field_values: {}
    related_node_ids:
      - ImprovementLoop
      - ControlLineageRecord
    related_relation_ids: []
    source_claims:
      - claim-improvement-loop-langgraph
      - claim-improvement-loop-design
  - id: ImprovementLoop-boundary-assignment
    labels:
      zh: 评审分派不是循环
      en: Review assignment is not loop
      ja: review assignment は loop ではない
    descriptions:
      zh: review-assignment-security@3 是规范不是 ImprovementLoop 发生。
      en: review-assignment-security@3 is specification not ImprovementLoop occurrence.
      ja: review-assignment-security@3 は spec で ImprovementLoop occurrence ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus loop
    field_values: {}
    related_node_ids:
      - ImprovementLoop
      - ReviewAssignment
    related_relation_ids: []
    source_claims:
      - claim-improvement-loop-design
parent_relation:
  id: ImprovementLoop-is_a-ImprovementActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ImprovementLoop 是一种 ImprovementActivity；其必要种差是跨一个以上尝试维持预算、状态与停止判定。
    en: ImprovementLoop is a ImprovementActivity whose necessary differentia is maintaining budget, state, and a stop decision across one or more attempts.
    ja: ImprovementLoop は ImprovementActivity の一種で、必要種差は one or more attempts を跨いで budget・state・stop decision を維持すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ImprovementLoop-is_a-ImprovementActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementActivity AND count(instance.attempts) >= 1 AND instance MAINTAINS budget, state, and a stop decision across attempts
      explanations:
        zh: 仅当对象既满足 ImprovementActivity 的完整定义，又满足“跨一个以上尝试维持预算、状态与停止判定”时断言。
        en: Assert only when the object satisfies the complete ImprovementActivity definition and maintaining budget, state, and a stop decision across one or more attempts.
        ja: object が ImprovementActivity の complete definition と「one or more attempts を跨いで budget・state・stop decision を維持すること」を満たす時のみ assert します。
      source_claims:
        - claim-improvement-loop-design
        - claim-improvement-loop-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-improvement-loop-design
    - claim-improvement-loop-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ImprovementLoop-contains_attempt-ImprovementAttempt
    predicate: contains_attempt
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含改进尝试
      en: contains improvement attempt
      ja: 改善試行を含む
    definitions:
      zh: ImprovementLoop contains_attempt ImprovementAttempt 表示一次循环运行按轮次组成性地包含特定尝试；尝试不能同时属于两个循环，且仍保留自己的时间与结果身份。
      en: ImprovementLoop contains_attempt ImprovementAttempt means one loop execution compositionally contains a particular ordered attempt; the attempt cannot belong to two loops and retains its own time and outcome identity.
      ja: ImprovementLoop contains_attempt ImprovementAttempt は one loop execution が particular ordered attempt を compositionally 含み attempt は two loops に属せず own time/outcome identity を保持することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_contains_attempt
      labels:
        zh: 反向 包含改进尝试
        en: inverse contains improvement attempt
        ja: 逆 改善試行を含む
    conditions:
      - id: ImprovementLoop-contains_attempt-ImprovementAttempt-assertion-condition
        severity: error
        expression_language: plain
        expression: attempt.containing_loop_ref = loop.improvement_loop_id AND UNIQUE(loop.improvement_loop_id, attempt.round_index)
        explanations:
          zh: 仅当 attempt 的 containing_loop_ref 指向该循环且 round_index 在该循环内唯一时成立。
          en: Assert only when the attempt's containing-loop reference names that loop and its round index is unique within the loop.
          ja: attempt containing-loop ref が loop を指し round index が loop 内 unique な時のみ assert します。
        source_claims:
          - claim-improvement-loop-design
          - claim-improvement-loop-design
          - claim-improvement-loop-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-improvement-loop-design
      - claim-improvement-loop-design
      - claim-improvement-loop-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ImprovementAttempt
  - id: ImprovementLoop-terminates_on-StopCondition
    predicate: terminates_on
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 依据停止条件终止
      en: terminates on stop condition
      ja: 停止条件で終了
    definitions:
      zh: ImprovementLoop terminates_on StopCondition 表示一次循环实际求值指定条件并因其为真而结束；条件可以是接受阈值、预算耗尽、超时或人工停止，但必须保留求值证据。
      en: ImprovementLoop terminates_on StopCondition means one loop evaluates the named condition and ends because it is true; acceptance threshold, budget exhaustion, timeout, or human stop all require evaluation evidence.
      ja: ImprovementLoop terminates_on StopCondition は loop が named condition を evaluate し true のため終了することを表し threshold・budget・timeout・human stop いずれも evidence を要します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_terminates_on
      labels:
        zh: 反向 依据停止条件终止
        en: inverse terminates on stop condition
        ja: 逆 停止条件で終了
    conditions:
      - id: ImprovementLoop-terminates_on-StopCondition-assertion-condition
        severity: error
        expression_language: plain
        expression: termination.condition_ref = condition.versioned_id AND termination.observed_value IS RECORDED AND termination.condition_result = true AND loop.ended_at >= termination.evaluated_at
        explanations:
          zh: 仅当循环终止记录、条件版本、观测值和判定结果均明确，且结束时间不早于求值时成立。
          en: Assert only when termination record, condition revision, observed value, and decision are explicit and loop end is not earlier than evaluation.
          ja: termination record・condition revision・observed value・decision が explicit で loop end≥evaluation time の時のみ assert します。
        source_claims:
          - claim-improvement-loop-design
          - claim-improvement-loop-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-improvement-loop-design
      - claim-improvement-loop-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StopCondition
