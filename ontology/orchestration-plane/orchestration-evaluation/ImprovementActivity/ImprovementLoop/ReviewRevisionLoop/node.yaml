schema: moonweave.ai/ontology-node/v1
id: ReviewRevisionLoop
kind: concept
labels:
  zh: 评审—修订循环
  en: review-revision loop
  ja: レビュー—改訂ループ
semantics:
  short_definition:
    zh: 在评审发现、修订计划与纠正活动之间反复协调，直到评审结论允许结束的改进循环。
    en: An improvement loop repeatedly coordinating review findings, revision plans, and correction activities until a review decision permits termination.
    ja: review finding・revision plan・correction activity を反復調整し review decision で終了する improvement loop です。
  definition:
    zh: 评审—修订循环是 ImprovementLoop 的子类，以 ReviewActivity 产生的发现、ReviewAssignment 规定的责任和 CorrectionActivity 执行的修订为种差；它用 ReviewCoordination 分派尝试，并保留每轮评审与修订的独立身份。它不是单次代码评审，也不是自动评分专用的 evaluator-optimizer 循环。
    en: ReviewRevisionLoop is an ImprovementLoop differentiated by findings produced by ReviewActivity, responsibility prescribed by ReviewAssignment, and revisions executed by CorrectionActivity. ReviewCoordination dispatches attempts while each review and revision retains its own identity. It is neither one code review nor a scoring-only evaluator-optimizer loop.
    ja: ReviewRevisionLoop は ReviewActivity findings・ReviewAssignment responsibility・CorrectionActivity revision を種差とする ImprovementLoop です。ReviewCoordination が attempt を dispatch し各 review/revision の identity を保ちます。
  why_needed:
    zh: 它把人工或代理评审的责任链与自动评分回路分开，避免所有“改进”都被压成同一种循环。
    en: It separates the responsibility chain of human or agent review from automated scoring loops, avoiding one undifferentiated notion of improvement.
    ja: human/agent review の responsibility chain と automated scoring loop を分け all improvement を一概念へ圧縮しません。
  includes:
    - zh: 由正式评审任务触发、产生可追溯发现、形成修订计划并再次评审的循环。
      en: Loops triggered by formal review assignments that produce traceable findings, form revision plans, and review again.
      ja: formal review assignment で始まり traceable finding・revision plan・re-review を持つ loop。
  excludes:
    - zh: 一次 ReviewActivity、一次 CorrectionActivity、没有责任分派的自我润色和仅执行数值评价的循环。
      en: A single ReviewActivity, one CorrectionActivity, unguided self-polishing, and loops performing only numeric evaluation.
      ja: single ReviewActivity・one CorrectionActivity・assignment なし self-polishing・numeric-evaluation-only loop。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: review_assignment_ref
      labels:
        zh: 评审任务引用
        en: review-assignment reference
        ja: review assignment ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用规定评审范围、责任和完成条件的 ReviewAssignment。
        en: References the ReviewAssignment prescribing review scope, responsibility, and completion conditions.
        ja: review scope・responsibility・completion condition を定める ReviewAssignment を参照します。
      allowed_values: []
      pattern: null
      example_value: review-assignment-security@3
      source_claims:
        - claim-review-revision-loop-003
        - claim-review-revision-loop-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewRevisionLoop-example-positive-manual-20260716
    labels:
      zh: ReviewRevisionLoop positive
      en: ReviewRevisionLoop positive
      ja: ReviewRevisionLoop positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ReviewRevisionLoop 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ReviewRevisionLoop: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ReviewRevisionLoop: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: loop-security-3, target_ref: "security-report@3", status: completed, review_assignment_ref: "review-assignment-security@3", started_at: 2026-07-16T14:00:00Z, ended_at: 2026-07-16T14:35:00Z, termination_outcome: accepted, stop_condition_ref: "finding-resolved@3"}

    related_node_ids:
      - ReviewRevisionLoop
      - ReviewCoordination
      - RevisionAttempt
    related_relation_ids: []
    source_claims:
      - claim-review-revision-loop-003
      - claim-review-revision-loop-002

  - id: ReviewRevisionLoop-example-boundary-manual-20260716
    labels:
      zh: ReviewRevisionLoop boundary
      en: ReviewRevisionLoop boundary
      ja: ReviewRevisionLoop boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 ReviewRevisionLoop 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not ReviewRevisionLoop specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で ReviewRevisionLoop spec ではない。
    field_values: {}

    related_node_ids:
      - ReviewRevisionLoop
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-revision-loop-003
      - claim-review-revision-loop-002

  - id: ReviewRevisionLoop-example-counterexample-confusable
    labels:
      zh: ReviewRevisionLoop counterexample
      en: ReviewRevisionLoop counterexample
      ja: ReviewRevisionLoop counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 ReviewRevisionLoop PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style ReviewRevisionLoop PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 ReviewRevisionLoop ではない。
    field_values: {loop_id: absent, improvement_activity_ref: absent, platform: github_pr}

    related_node_ids:
      - ReviewRevisionLoop
      - ImprovementLoop
      - RevisionActivity
      - ReviewCoordination
      - RevisionAttempt
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-revision-loop-003

  - id: ReviewRevisionLoop-example-instance-concrete
    labels:
      zh: ReviewRevisionLoop instance
      en: ReviewRevisionLoop instance
      ja: ReviewRevisionLoop instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ReviewRevisionLoop。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ReviewRevisionLoop.
      ja: Reflexion 实例 failed→reflect→retry が ReviewRevisionLoop に写像。
    field_values: {improvement_activity_id: loop-security-3, target_ref: "security-report@3", status: completed, review_assignment_ref: "review-assignment-security@3", started_at: 2026-07-16T14:00:00Z, ended_at: 2026-07-16T14:35:00Z, termination_outcome: accepted, stop_condition_ref: "finding-resolved@3"}

    related_node_ids:
      - ReviewRevisionLoop
      - ReviewCoordination
      - RevisionAttempt
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-revision-loop-003

