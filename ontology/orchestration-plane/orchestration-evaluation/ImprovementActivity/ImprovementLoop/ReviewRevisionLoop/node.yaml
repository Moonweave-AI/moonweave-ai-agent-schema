parent_relation:
  id: ReviewRevisionLoop-is_a-ImprovementLoop
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ReviewRevisionLoop 是一种 ImprovementLoop；其必要种差是正式评审发现、责任分派、纠正和复核共同驱动循环。
    en: ReviewRevisionLoop is a ImprovementLoop whose necessary differentia is being driven jointly by formal review findings, responsibility dispatch, correction, and re-review.
    ja: ReviewRevisionLoop は ImprovementLoop の一種で、必要種差は formal review finding・responsibility dispatch・correction・re-review が共同駆動すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ReviewRevisionLoop-is_a-ImprovementLoop-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementLoop AND instance.review_assignment_ref IS SET AND formal finding, assignment, correction, and re-review ARE LINKED within the loop
      explanations:
        zh: 仅当对象既满足 ImprovementLoop 的完整定义，又满足“正式评审发现、责任分派、纠正和复核共同驱动循环”时断言。
        en: Assert only when the object satisfies the complete ImprovementLoop definition and being driven jointly by formal review findings, responsibility dispatch, correction, and re-review.
        ja: object が ImprovementLoop の complete definition と「formal review finding・responsibility dispatch・correction・re-review が共同駆動すること」を満たす時のみ assert します。
      source_claims:
        - claim-review-revision-loop-design
        - claim-review-revision-loop-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
