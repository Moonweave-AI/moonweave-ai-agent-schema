schema: moonweave.ai/ontology-node/v1
id: ReviewRevisionLoop
kind: concept
status: accepted
labels:
  zh: 评审—修订循环
  en: review-revision loop
  ja: レビュー—改訂ループ
semantics:
  short_definition:
    zh: 在评审发现、修订计划与纠正活动之间反复协调，直到评审结论允许结束的改进循环。
    en: An improvement loop repeatedly coordinating review findings, revision plans, and correction activities until a review decision permits termination.
    ja: review finding・revision plan・correction activity を反復調整し review decision で終了する improvement loop です。
  definition:
    zh: 评审—修订循环是 ImprovementLoop 的子类，以 ReviewActivity 产生的发现、ReviewAssignment 规定的责任和 CorrectionActivity 执行的修订为种差；它用 ReviewCoordination 分派尝试，并保留每轮评审与修订的独立身份。它不是单次代码评审，也不是自动评分专用的 evaluator-optimizer 循环。
    en: ReviewRevisionLoop is an ImprovementLoop differentiated by findings produced by ReviewActivity, responsibility prescribed by ReviewAssignment, and revisions executed by CorrectionActivity. ReviewCoordination dispatches attempts while each review and revision retains its own identity. It is neither one code review nor a scoring-only evaluator-optimizer loop.
    ja: ReviewRevisionLoop は ReviewActivity findings・ReviewAssignment responsibility・CorrectionActivity revision を種差とする ImprovementLoop です。ReviewCoordination が attempt を dispatch し各 review/revision の identity を保ちます。
  why_needed:
    zh: 它把人工或代理评审的责任链与自动评分回路分开，避免所有“改进”都被压成同一种循环。
    en: It separates the responsibility chain of human or agent review from automated scoring loops, avoiding one undifferentiated notion of improvement.
    ja: human/agent review の responsibility chain と automated scoring loop を分け all improvement を一概念へ圧縮しません。
  includes:
    - zh: 由正式评审任务触发、产生可追溯发现、形成修订计划并再次评审的循环。
      en: Loops triggered by formal review assignments that produce traceable findings, form revision plans, and review again.
      ja: formal review assignment で始まり traceable finding・revision plan・re-review を持つ loop。
  excludes:
    - zh: 一次 ReviewActivity、一次 CorrectionActivity、没有责任分派的自我润色和仅执行数值评价的循环。
      en: A single ReviewActivity, one CorrectionActivity, unguided self-polishing, and loops performing only numeric evaluation.
      ja: single ReviewActivity・one CorrectionActivity・assignment なし self-polishing・numeric-evaluation-only loop。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: review_assignment_ref
      labels:
        zh: 评审任务引用
        en: review-assignment reference
        ja: review assignment ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用规定评审范围、责任和完成条件的 ReviewAssignment。
        en: References the ReviewAssignment prescribing review scope, responsibility, and completion conditions.
        ja: review scope・responsibility・completion condition を定める ReviewAssignment を参照します。
