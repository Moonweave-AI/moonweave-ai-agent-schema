      zh: 分类为 ReviewActivity；只有修订和复核路径实际发生后才建立循环。
      en: Classify it as ReviewActivity; create the loop only when revision and re-review paths actually occur.
      ja: ReviewActivity とし revision/re-review path 発生時のみ loop を作ります。
    why_valid_or_invalid:
      zh: 评审发生是循环的一部分，不足以证明跨轮控制身份。
      en: A review occurrence is part of the loop but does not prove cross-round control identity.
