schema: moonweave.ai/ontology-node/v1
id: EvaluatorOptimizerLoop
kind: concept
labels:
  zh: 评价器—优化器循环
  en: evaluator-optimizer loop
  ja: 評価器—最適化器ループ
semantics:
  short_definition:
    zh: 由显式评价标准判定候选输出，并把拒绝反馈送回下一次修订的改进循环。
    en: An improvement loop that judges candidate output against explicit criteria and sends rejection feedback into the next revision.
    ja: explicit criteria で candidate output を判定し rejection feedback を next revision へ戻す improvement loop です。
  definition:
    zh: 评价器—优化器循环是 ImprovementLoop 的子类，以评价标准、候选输出序列和接受判定为种差；每轮 EvaluationAttempt 协调独立 EvaluationRun，拒绝时由 FeedbackRouting 选择修订计划，接受或预算耗尽时停止。它不把评价器模型、提示词或框架名称当作循环身份。
    en: EvaluatorOptimizerLoop is an ImprovementLoop differentiated by its evaluation criteria, sequence of candidate outputs, and acceptance decision. Each EvaluationAttempt coordinates a separate EvaluationRun; rejection feedback selects a revision plan, while acceptance or budget exhaustion stops the loop. Evaluator model, prompt text, and framework name are not its identity.
    ja: EvaluatorOptimizerLoop は evaluation criteria・candidate sequence・acceptance decision を種差とする ImprovementLoop です。各 EvaluationAttempt は separate EvaluationRun を coordinate し、reject feedback は revision plan を選び accept/budget exhaustion で停止します。
  why_needed:
    zh: 该概念表达官方 evaluator-optimizer 工作流的控制语义，而不是把某个 SDK 模式名或模型实例塞进知识树。
    en: This concept captures the control semantics of the evaluator-optimizer workflow without inserting an SDK pattern name or model instance into the knowledge tree.
    ja: evaluator-optimizer workflow の control semantics を表し SDK pattern name/model instance を taxonomy に混入させません。
  includes:
    - zh: 评价标准稳定、候选输出可版本化、拒绝反馈驱动再生成且接受条件明确的循环。
      en: Loops with stable evaluation criteria, versioned candidate outputs, rejection-driven regeneration, and explicit acceptance conditions.
      ja: stable criteria・versioned candidates・rejection-driven regeneration・explicit acceptance condition を持つ loop。
  excludes:
    - zh: 没有反馈回路的一次评分、只由人工评审和修订构成的 ReviewRevisionLoop、评价器角色或 EvaluationRun。
      en: One-off scoring without a feedback loop, a ReviewRevisionLoop driven only by review and revision, the evaluator role, and EvaluationRun.
      ja: feedback loop のない one-off scoring・review/revision only loop・evaluator role・EvaluationRun。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: acceptance_criterion_ref
      labels:
        zh: 接受标准引用
        en: acceptance-criterion reference
        ja: acceptance criterion ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用用于每轮一致判断接受或拒绝的评价标准。
        en: References the criterion consistently used to accept or reject each round.
        ja: 各 round の accept/reject に一貫利用する criterion を参照します。
      allowed_values: []
      pattern: null
      example_value: quality-rubric@4
      source_claims:
        - claim-evaluator-optimizer-loop-001
        - claim-evaluator-optimizer-loop-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluatorOptimizerLoop-example-positive-manual-20260716
    labels:
      zh: EvaluatorOptimizerLoop positive
      en: EvaluatorOptimizerLoop positive
      ja: EvaluatorOptimizerLoop positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 EvaluatorOptimizerLoop 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for EvaluatorOptimizerLoop: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) EvaluatorOptimizerLoop: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: loop-summary-8, target_ref: "summary-candidate-set@8", status: completed, acceptance_criterion_ref: "rubric@4", started_at: 2026-07-16T11:00:00Z, ended_at: 2026-07-16T11:06:20Z, termination_outcome: accepted, stop_condition_ref: "quality-threshold@4"}

    related_node_ids:
      - EvaluatorOptimizerLoop
      - EvaluationAttempt
      - FeedbackRouting
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-loop-001
      - claim-evaluator-optimizer-loop-002

  - id: EvaluatorOptimizerLoop-example-boundary-manual-20260716
    labels:
      zh: EvaluatorOptimizerLoop boundary
      en: EvaluatorOptimizerLoop boundary
      ja: EvaluatorOptimizerLoop boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 EvaluatorOptimizerLoop 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not EvaluatorOptimizerLoop static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で EvaluatorOptimizerLoop 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - EvaluatorOptimizerLoop
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-loop-001
      - claim-evaluator-optimizer-loop-002

  - id: EvaluatorOptimizerLoop-example-counterexample-confusable
    labels:
      zh: EvaluatorOptimizerLoop counterexample
      en: EvaluatorOptimizerLoop counterexample
      ja: EvaluatorOptimizerLoop counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 EvaluatorOptimizerLoop；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style EvaluatorOptimizerLoop; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 EvaluatorOptimizerLoop として拒否。
    field_values: {loop_id: absent, optimizer_state_ref: absent, max_iterations: 3}

    related_node_ids:
      - EvaluatorOptimizerLoop
      - ImprovementLoop
      - OptimizerState
      - EvaluationAttempt
      - FeedbackRouting
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-loop-001

  - id: EvaluatorOptimizerLoop-example-instance-concrete
    labels:
      zh: EvaluatorOptimizerLoop instance
      en: EvaluatorOptimizerLoop instance
      ja: EvaluatorOptimizerLoop instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 EvaluatorOptimizerLoop。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to EvaluatorOptimizerLoop.
      ja: Reflexion 实例 failed→reflect→retry が EvaluatorOptimizerLoop に写像。
    field_values: {improvement_activity_id: loop-summary-8, target_ref: "summary-candidate-set@8", status: completed, acceptance_criterion_ref: "rubric@4", started_at: 2026-07-16T11:00:00Z, ended_at: 2026-07-16T11:06:20Z, termination_outcome: accepted, stop_condition_ref: "quality-threshold@4"}

    related_node_ids:
      - EvaluatorOptimizerLoop
      - EvaluationAttempt
      - FeedbackRouting
      - EvaluationRun
    related_relation_ids: []
    source_claims:
      - claim-evaluator-optimizer-loop-001

