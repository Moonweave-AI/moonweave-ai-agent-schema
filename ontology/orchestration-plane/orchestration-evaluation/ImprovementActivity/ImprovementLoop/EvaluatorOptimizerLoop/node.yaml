parent_relation:
  id: EvaluatorOptimizerLoop-is_a-ImprovementLoop
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: EvaluatorOptimizerLoop 是一种 ImprovementLoop；其必要种差是评价拒绝反馈被送回下一候选，接受标准决定停止。
    en: EvaluatorOptimizerLoop is a ImprovementLoop whose necessary differentia is routing rejection feedback to the next candidate and stopping on acceptance criteria.
    ja: EvaluatorOptimizerLoop は ImprovementLoop の一種で、必要種差は rejection feedback を next candidate へ戻し acceptance criteria で停止すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: EvaluatorOptimizerLoop-is_a-ImprovementLoop-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementLoop AND rejected feedback IS ROUTED TO a next candidate AND instance.acceptance_criterion_ref DETERMINES termination
      explanations:
        zh: 仅当对象既满足 ImprovementLoop 的完整定义，又满足“评价拒绝反馈被送回下一候选，接受标准决定停止”时断言。
        en: Assert only when the object satisfies the complete ImprovementLoop definition and routing rejection feedback to the next candidate and stopping on acceptance criteria.
        ja: object が ImprovementLoop の complete definition と「rejection feedback を next candidate へ戻し acceptance criteria で停止すること」を満たす時のみ assert します。
      source_claims:
        - claim-evaluator-optimizer-loop-design
        - claim-evaluator-optimizer-loop-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-evaluator-optimizer-loop-design
    - claim-evaluator-optimizer-loop-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
