      en: Summary-quality optimization loop
      ja: summary quality optimization loop
    scenario_id: null
    descriptions:
      zh: loop-summary-8 用 rubric@4 评价三个候选摘要，前两次反馈事实遗漏，第三次达到 0.92 后接受。
      en: loop-summary-8 evaluates three candidate summaries with rubric@4, reports missing facts twice, and accepts the third at 0.92.
      ja: loop-summary-8 は rubric@4 で three candidates を評価し two rejection feedback 後 0.92 で accept します。
    field_values:
      improvement_activity_id: loop-summary-8
      target_ref: summary-candidate-set@8
      status: completed
      acceptance_criterion_ref: rubric@4
      started_at: 2026-07-16T11:00:00Z
      ended_at: 2026-07-16T11:06:20Z
      termination_outcome: accepted
      stop_condition_ref: quality-threshold@4
    related_node_ids:
      - EvaluatorOptimizerLoop
      - EvaluationAttempt
      - FeedbackRouting
    related_relation_ids: []
    expected_result:
      zh: 返回一个以评价反馈闭合再生路径的 evaluator-optimizer 循环。
      en: Return one evaluator-optimizer loop whose evaluation feedback closes the regeneration path.
      ja: evaluation feedback が regeneration path を閉じる evaluator-optimizer loop を返します。
    why_valid_or_invalid:
      zh: 显式标准、拒绝反馈、再修订和接受终点共同构成该子类的种差。
      en: Explicit criteria, rejection feedback, revision, and an acceptance endpoint jointly establish this subtype.
      ja: explicit criteria・rejection feedback・revision・accept endpoint が subtype differentia を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
