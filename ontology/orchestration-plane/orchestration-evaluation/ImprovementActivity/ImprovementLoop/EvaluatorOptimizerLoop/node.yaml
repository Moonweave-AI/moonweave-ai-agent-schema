schema: moonweave.ai/ontology-node/v1
id: EvaluatorOptimizerLoop
kind: concept
status: accepted
labels:
  zh: 评价器—优化器循环
  en: evaluator-optimizer loop
  ja: 評価器—最適化器ループ
semantics:
  short_definition:
    zh: 由显式评价标准判定候选输出，并把拒绝反馈送回下一次修订的改进循环。
    en: An improvement loop that judges candidate output against explicit criteria and sends rejection feedback into the next revision.
    ja: explicit criteria で candidate output を判定し rejection feedback を next revision へ戻す improvement loop です。
  definition:
    zh: 评价器—优化器循环是 ImprovementLoop 的子类，以评价标准、候选输出序列和接受判定为种差；每轮 EvaluationAttempt 协调独立 EvaluationRun，拒绝时由 FeedbackRouting 选择修订计划，接受或预算耗尽时停止。它不把评价器模型、提示词或框架名称当作循环身份。
    en: EvaluatorOptimizerLoop is an ImprovementLoop differentiated by its evaluation criteria, sequence of candidate outputs, and acceptance decision. Each EvaluationAttempt coordinates a separate EvaluationRun; rejection feedback selects a revision plan, while acceptance or budget exhaustion stops the loop. Evaluator model, prompt text, and framework name are not its identity.
    ja: EvaluatorOptimizerLoop は evaluation criteria・candidate sequence・acceptance decision を種差とする ImprovementLoop です。各 EvaluationAttempt は separate EvaluationRun を coordinate し、reject feedback は revision plan を選び accept/budget exhaustion で停止します。
  why_needed:
    zh: 该概念表达官方 evaluator-optimizer 工作流的控制语义，而不是把某个 SDK 模式名或模型实例塞进知识树。
    en: This concept captures the control semantics of the evaluator-optimizer workflow without inserting an SDK pattern name or model instance into the knowledge tree.
    ja: evaluator-optimizer workflow の control semantics を表し SDK pattern name/model instance を taxonomy に混入させません。
  includes:
    - zh: 评价标准稳定、候选输出可版本化、拒绝反馈驱动再生成且接受条件明确的循环。
      en: Loops with stable evaluation criteria, versioned candidate outputs, rejection-driven regeneration, and explicit acceptance conditions.
      ja: stable criteria・versioned candidates・rejection-driven regeneration・explicit acceptance condition を持つ loop。
  excludes:
    - zh: 没有反馈回路的一次评分、只由人工评审和修订构成的 ReviewRevisionLoop、评价器角色或 EvaluationRun。
      en: One-off scoring without a feedback loop, a ReviewRevisionLoop driven only by review and revision, the evaluator role, and EvaluationRun.
      ja: feedback loop のない one-off scoring・review/revision only loop・evaluator role・EvaluationRun。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: acceptance_criterion_ref
      labels:
        zh: 接受标准引用
        en: acceptance-criterion reference
        ja: acceptance criterion ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用用于每轮一致判断接受或拒绝的评价标准。
        en: References the criterion consistently used to accept or reject each round.
        ja: 各 round の accept/reject に一貫利用する criterion を参照します。
      allowed_values: []
      pattern: null
      example_value: quality-rubric@4
      source_claims:
        - claim-evaluator-optimizer-loop-001
        - claim-evaluator-optimizer-loop-002
  constraints: []
  required_relation_constraints: []
