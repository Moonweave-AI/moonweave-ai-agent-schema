      ja: one offline benchmark score
    scenario_id: improvement-review-evaluatoroptimizerloop-boundary
    descriptions:
      zh: eval-run-50 对固定模型输出评分一次并存档，没有把反馈路由到新的候选。
      en: eval-run-50 scores a fixed model output once and archives it without routing feedback to a new candidate.
      ja: eval-run-50 は fixed output を one time score し feedback を new candidate へ route しません。
    field_values: {}
    related_node_ids:
      - EvaluatorOptimizerLoop
      - EvaluationRun
    related_relation_ids: []
    expected_result:
      zh: 保留为反馈指标域 EvaluationRun，不创建循环。
      en: Keep it as feedback-metrics EvaluationRun and do not create a loop.
      ja: feedback-metrics の EvaluationRun とし loop は作りません。
    why_valid_or_invalid:
      zh: 一次评估发生没有反馈驱动的重复控制，因此不是 evaluator-optimizer 循环。
      en: One evaluation occurrence has no feedback-driven repeated control and is not an evaluator-optimizer loop.
      ja: one evaluation occurrence は feedback-driven repeated control を持たず loop ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluator-optimizer-loop-001
      - claim-evaluator-optimizer-loop-002
