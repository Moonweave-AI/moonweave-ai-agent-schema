    en: EvaluatorOptimizerLoop is a ImprovementLoop whose necessary differentia is routing rejection feedback to the next candidate and stopping on acceptance criteria.
    ja: EvaluatorOptimizerLoop は ImprovementLoop の一種で、必要種差は rejection feedback を next candidate へ戻し acceptance criteria で停止すること です。
