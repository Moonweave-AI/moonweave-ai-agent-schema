schema: moonweave.ai/ontology-node/v1
id: ImprovementActivity
kind: concept
labels:
  zh: 改进活动
  en: improvement activity
  ja: 改善活動
semantics:
  short_definition:
    zh: 为评估、修订、协调或终止改进而在具体时间发生的运行活动。
    en: A time-bounded runtime activity that evaluates, revises, coordinates, or terminates improvement.
    ja: evaluation・revision・coordination・termination のため concrete time に発生する runtime activity です。
  definition:
    zh: 改进活动是本域所有运行发生的共同上位概念，以活动标识、开始结束时间、目标引用和状态为身份；ImprovementLoop、ImprovementAttempt 与 ImprovementCoordinationActivity 分别刻画重复控制、单次尝试和协调动作。它不是计划、角色、状态快照或证据记录。
    en: ImprovementActivity is the common genus of runtime occurrences in this domain, identified by activity ID, start and end times, target reference, and status. ImprovementLoop, ImprovementAttempt, and ImprovementCoordinationActivity specialize repeated control, one bounded attempt, and coordination. It is not a plan, role, state snapshot, or evidence record.
    ja: ImprovementActivity は activity ID・start/end・target ref・status で識別する runtime occurrence の genus です。Loop・Attempt・Coordination を特殊化し plan・role・state snapshot・evidence record ではありません。
  why_needed:
    zh: 共同活动根消除“循环、尝试、评审协调、反馈路由”平挂为多个无关根的问题，并保留它们的真实下位层级。
    en: A common activity root removes the flat collection of loop, attempt, review coordination, and feedback routing while preserving their real specialization layers.
    ja: common activity root により loop・attempt・coordination・routing の flat roots を除き true specialization layers を保持します。
  includes:
    - zh: 有可追踪开始、结束、目标和状态的循环执行、评估尝试、修订尝试、评审协调与反馈路由。
      en: Loop executions, evaluation attempts, revision attempts, review coordination, and feedback routing with traceable time, target, and status.
      ja: traceable time・target・status を持つ loop execution・evaluation/revision attempt・review coordination・feedback routing。
  excludes:
    - zh: 评审任务规范、改进角色、优化器状态、控制谱系记录、EvaluationRun 定义和 CorrectionActivity 本身。
      en: Review-assignment specifications, improvement roles, optimizer state, control-lineage records, EvaluationRun definitions, and CorrectionActivity itself.
      ja: review assignment spec・role・optimizer state・lineage record・EvaluationRun definition・CorrectionActivity。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys:
    - improvement_activity_id
  fields:
    - id: improvement_activity_id
      labels:
        zh: 改进活动标识
        en: improvement-activity ID
        ja: 改善活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次具体改进活动发生。
        en: Stably identifies one concrete improvement occurrence.
        ja: 一 concrete improvement occurrence を安定識別します。
      allowed_values: []
      pattern: null
      example_value: improvement-run-42
      source_claims:
        - claim-improvement-activity-003
    - id: target_ref
      labels:
        zh: 改进目标引用
        en: improvement-target reference
        ja: 改善対象 ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动试图评估或改善的对象版本。
        en: References the object revision this activity evaluates or improves.
        ja: activity が evaluate/improve する object revision を参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-report@7
      source_claims:
        - claim-improvement-activity-004
        - claim-improvement-activity-003
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 stopped。
        en: Records queued, running, completed, failed, or stopped.
        ja: queued・running・completed・failed・stopped を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-improvement-activity-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementActivity-example-positive-manual-20260716
    labels:
      zh: ImprovementActivity positive
      en: ImprovementActivity positive
      ja: ImprovementActivity positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ImprovementActivity 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ImprovementActivity: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ImprovementActivity: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: improvement-run-42, target_ref: "artifact-report@7", status: completed}

    related_node_ids:
      - ImprovementActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-001
      - claim-improvement-activity-003

  - id: ImprovementActivity-example-boundary-manual-20260716
    labels:
      zh: ImprovementActivity boundary
      en: ImprovementActivity boundary
      ja: ImprovementActivity boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 ImprovementActivity 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not ImprovementActivity static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で ImprovementActivity 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - ImprovementControlSpecification
      - ImprovementActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-003
      - claim-improvement-activity-004

  - id: ImprovementActivity-example-counterexample-confusable
    labels:
      zh: ImprovementActivity counterexample
      en: ImprovementActivity counterexample
      ja: ImprovementActivity counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 ImprovementActivity PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style ImprovementActivity PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 ImprovementActivity ではない。
    field_values: {improvement_activity_id: absent, started_at: absent, score_value: 0.87}

    related_node_ids:
      - ImprovementActivity
      - EvaluationActivity
      - Score
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-001

  - id: ImprovementActivity-example-instance-concrete
    labels:
      zh: ImprovementActivity instance
      en: ImprovementActivity instance
      ja: ImprovementActivity instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ImprovementActivity。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ImprovementActivity.
      ja: Reflexion 实例 failed→reflect→retry が ImprovementActivity に写像。
    field_values: {improvement_activity_id: improvement-run-42, target_ref: "artifact-report@7", status: completed}

    related_node_ids:
      - ImprovementActivity
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-001

