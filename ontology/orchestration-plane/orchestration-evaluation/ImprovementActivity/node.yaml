schema: moonweave.ai/ontology-node/v1
id: ImprovementActivity
kind: concept
status: accepted
labels:
  zh: 改进活动
  en: improvement activity
  ja: 改善活動
semantics:
  short_definition:
    zh: 为评估、修订、协调或终止改进而在具体时间发生的运行活动。
    en: A time-bounded runtime activity that evaluates, revises, coordinates, or terminates improvement.
    ja: evaluation・revision・coordination・termination のため concrete time に発生する runtime activity です。
  definition:
    zh: 改进活动是本域所有运行发生的共同上位概念，以活动标识、开始结束时间、目标引用和状态为身份；ImprovementLoop、ImprovementAttempt 与 ImprovementCoordinationActivity 分别刻画重复控制、单次尝试和协调动作。它不是计划、角色、状态快照或证据记录。
    en: ImprovementActivity is the common genus of runtime occurrences in this domain, identified by activity ID, start and end times, target reference, and status. ImprovementLoop, ImprovementAttempt, and ImprovementCoordinationActivity specialize repeated control, one bounded attempt, and coordination. It is not a plan, role, state snapshot, or evidence record.
    ja: ImprovementActivity は activity ID・start/end・target ref・status で識別する runtime occurrence の genus です。Loop・Attempt・Coordination を特殊化し plan・role・state snapshot・evidence record ではありません。
  why_needed:
    zh: 共同活动根消除“循环、尝试、评审协调、反馈路由”平挂为多个无关根的问题，并保留它们的真实下位层级。
    en: A common activity root removes the flat collection of loop, attempt, review coordination, and feedback routing while preserving their real specialization layers.
    ja: common activity root により loop・attempt・coordination・routing の flat roots を除き true specialization layers を保持します。
  includes:
    - zh: 有可追踪开始、结束、目标和状态的循环执行、评估尝试、修订尝试、评审协调与反馈路由。
      en: Loop executions, evaluation attempts, revision attempts, review coordination, and feedback routing with traceable time, target, and status.
      ja: traceable time・target・status を持つ loop execution・evaluation/revision attempt・review coordination・feedback routing。
  excludes:
    - zh: 评审任务规范、改进角色、优化器状态、控制谱系记录、EvaluationRun 定义和 CorrectionActivity 本身。
      en: Review-assignment specifications, improvement roles, optimizer state, control-lineage records, EvaluationRun definitions, and CorrectionActivity itself.
      ja: review assignment spec・role・optimizer state・lineage record・EvaluationRun definition・CorrectionActivity。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - improvement_activity_id
  fields:
    - id: improvement_activity_id
      labels:
        zh: 改进活动标识
        en: improvement-activity ID
        ja: 改善活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次具体改进活动发生。
        en: Stably identifies one concrete improvement occurrence.
        ja: 一 concrete improvement occurrence を安定識別します。
      allowed_values: []
      pattern: null
      example_value: improvement-run-42
      source_claims:
        - claim-improvement-activity-003
    - id: target_ref
      labels:
        zh: 改进目标引用
        en: improvement-target reference
        ja: 改善対象 ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动试图评估或改善的对象版本。
        en: References the object revision this activity evaluates or improves.
        ja: activity が evaluate/improve する object revision を参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-report@7
      source_claims:
        - claim-improvement-activity-004
        - claim-improvement-activity-003
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 stopped。
        en: Records queued, running, completed, failed, or stopped.
        ja: queued・running・completed・failed・stopped を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-improvement-activity-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告改进活动
      en: Report-improvement activity
      ja: report improvement activity
    scenario_id: null
    descriptions:
      zh: improvement-run-42 于 10:00 开始评估 artifact-report@7，在一次修订后于 10:06 完成。
      en: improvement-run-42 starts at 10:00 on artifact-report@7 and completes at 10:06 after one revision.
      ja: improvement-run-42 は 10:00 target を evaluate し one revision 後 10:06 complete します。
    field_values:
      improvement_activity_id: improvement-run-42
      target_ref: artifact-report@7
      status: completed
    related_node_ids:
      - ImprovementActivity
    related_relation_ids: []
    expected_result:
      zh: 作为一次有时间、目标和状态的改进发生返回。
      en: Return one improvement occurrence with time, target, and status.
      ja: time・target・status を持つ improvement occurrence として返します。
    why_valid_or_invalid:
      zh: 活动标识、目标、时间和状态共同证明一次运行发生。
      en: Activity ID, target, time, and status jointly prove one occurrence.
      ja: activity ID・target・time・status が one occurrence を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-activity-001
      - claim-improvement-activity-003
  - id: ImprovementActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评审任务模板
      en: Review-assignment template
      ja: review assignment template
    scenario_id: improvement-review-improvementactivity-boundary
    descriptions:
      zh: review-assignment-security@3 规定审查范围和资格，可被多次执行，但没有本次开始时间或状态。
      en: review-assignment-security@3 defines scope and eligibility and may be reused, but has no occurrence start time or status.
      ja: review assignment revision は scope/eligibility を定め reusable ですが occurrence time/status はありません。
    field_values: {}
    related_node_ids:
      - ImprovementControlSpecification
      - ImprovementActivity
    related_relation_ids: []
    expected_result:
      zh: 分类为控制规范，不创建 ImprovementActivity。
      en: Classify it as a control specification and do not create ImprovementActivity.
      ja: control specification とし ImprovementActivity は作りません。
    why_valid_or_invalid:
      zh: 可复用约束与一次有时间状态的运行具有不同身份。
      en: Reusable constraints and one time-bounded run have different identities.
      ja: reusable constraints と time-bounded run は identity が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-activity-003
      - claim-improvement-activity-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-tool-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照权威来源逐项完成人工语义核验；概念定义、层级、关系、结构与来源主张成立。
    en: Manual semantic verification against authoritative sources completed; concept definitions, hierarchy, relations, structure, and source claims hold.
    ja: 権威ソースに照らし手動意味検証を完了し、概念定義・階層・関係・構造・出典主張が成立。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-improvement-activity-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official evaluator-optimizer pattern separates a generator occurrence from an evaluator occurrence, routes rejected output back with feedback, and stops when explicit success criteria accept the output. Moonweave uses that operational distinction for improvement loops, attempts, state, and stop control without modeling LangGraph itself as a graph node.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-improvement-activity-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API treats state snapshots, executable nodes, and fixed or conditional edges as separate workflow elements. Moonweave uses this evidence to distinguish ImprovementState from ImprovementActivity and to keep containment, dispatch, updates, and termination as cross-facts rather than type parents.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-improvement-activity-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-improvement-activity-004
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure and testing criteria from distinct evaluation runs and run outputs. Moonweave uses that distinction to keep EvaluationAttempt, the feedback-owned EvaluationRun it coordinates, and reusable ReviewAssignment or RevisionPlan specifications as different objects.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
