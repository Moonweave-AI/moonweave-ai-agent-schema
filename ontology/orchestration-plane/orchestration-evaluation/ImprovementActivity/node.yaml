schema: moonweave.ai/ontology-node/v1
id: ImprovementActivity
kind: concept
labels:
  zh: 改进活动
  en: improvement activity
  ja: 改善活動
semantics:
  short_definition:
    zh: 为评估、修订、协调或终止改进而在具体时间发生的运行活动。
    en: A time-bounded runtime activity that evaluates, revises, coordinates, or terminates improvement.
    ja: evaluation・revision・coordination・termination のため concrete time に発生する runtime activity です。
  definition:
    zh: 改进活动是本域所有运行发生的共同上位概念，以活动标识、开始结束时间、目标引用和状态为身份；ImprovementLoop、ImprovementAttempt 与 ImprovementCoordinationActivity 分别刻画重复控制、单次尝试和协调动作。它不是计划、角色、状态快照或证据记录。
    en: ImprovementActivity is the common genus of runtime occurrences in this domain, identified by activity ID, start and end times, target reference, and status. ImprovementLoop, ImprovementAttempt, and ImprovementCoordinationActivity specialize repeated control, one bounded attempt, and coordination. It is not a plan, role, state snapshot, or evidence record.
    ja: ImprovementActivity は activity ID・start/end・target ref・status で識別する runtime occurrence の genus です。Loop・Attempt・Coordination を特殊化し plan・role・state snapshot・evidence record ではありません。
  why_needed:
    zh: 共同活动根消除“循环、尝试、评审协调、反馈路由”平挂为多个无关根的问题，并保留它们的真实下位层级。
    en: A common activity root removes the flat collection of loop, attempt, review coordination, and feedback routing while preserving their real specialization layers.
    ja: common activity root により loop・attempt・coordination・routing の flat roots を除き true specialization layers を保持します。
  includes:
    - zh: 有可追踪开始、结束、目标和状态的循环执行、评估尝试、修订尝试、评审协调与反馈路由。
      en: Loop executions, evaluation attempts, revision attempts, review coordination, and feedback routing with traceable time, target, and status.
      ja: traceable time・target・status を持つ loop execution・evaluation/revision attempt・review coordination・feedback routing。
  excludes:
    - zh: 评审任务规范、改进角色、优化器状态、控制谱系记录、EvaluationRun 定义和 CorrectionActivity 本身。
      en: Review-assignment specifications, improvement roles, optimizer state, control-lineage records, EvaluationRun definitions, and CorrectionActivity itself.
      ja: review assignment spec・role・optimizer state・lineage record・EvaluationRun definition・CorrectionActivity。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangGraph evaluator-optimizer 节点执行、interrupt/resume 与 PR review 活动映射为 ImprovementActivity；须记录 target_ref 与起止时间。
    en: LangGraph evaluator-optimizer node runs, interrupt/resume, and PR review activities map to ImprovementActivity with target_ref and start/end times.
    ja: LangGraph evaluator-optimizer ノード実行・interrupt/resume・PR review 活動を target_ref/start-end 付き ImprovementActivity へ写像します。
  typical_input:
    - description: Improvement loop step occurrence.
      format: improvement-run-42 evaluates artifact-report@7 then revises
      source_claims:
        - claim-improvement-activity-design
  typical_output:
    - description: Moonweave ImprovementActivity.
      format: '{"improvement_activity_id": "improvement-run-42", "target_ref": "artifact-report@7", "status": "completed"}'
      source_claims:
        - claim-improvement-activity-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - improvement_activity_id
  fields:
    - id: improvement_activity_id
      labels:
        zh: 改进活动标识
        en: improvement-activity ID
        ja: 改善活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次具体改进活动发生。
        en: Stably identifies one concrete improvement occurrence.
        ja: 一 concrete improvement occurrence を安定識別します。
      allowed_values: []
      pattern: null
      example_value: improvement-run-42
      source_claims:
        - claim-improvement-activity-design
    - id: target_ref
      labels:
        zh: 改进目标引用
        en: improvement-target reference
        ja: 改善対象 ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动试图评估或改善的对象版本。
        en: References the object revision this activity evaluates or improves.
        ja: activity が evaluate/improve する object revision を参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-report@7
      source_claims:
        - claim-improvement-activity-design
        - claim-improvement-activity-design
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 stopped。
        en: Records queued, running, completed, failed, or stopped.
        ja: queued・running・completed・failed・stopped を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-improvement-activity-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementActivity-report-loop
    labels:
      zh: 报告改进活动
      en: Report improvement activity
      ja: report 改善 activity
    descriptions:
      zh: improvement-run-42 10:00 评估 artifact-report@7，一次修订后 10:06 完成。
      en: improvement-run-42 evaluates artifact-report@7 at 10:00 completing 10:06 after one revision.
      ja: improvement-run-42 が 10:00 artifact-report@7 を evaluate し one revision 後 10:06 complete。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator-optimizer
    field_values:
      improvement_activity_id: improvement-run-42
      target_ref: artifact-report@7
    related_node_ids:
      - ImprovementActivity
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-langgraph
      - claim-improvement-activity-design
  - id: ImprovementActivity-interrupt-gate
    labels:
      zh: interrupt 人工门活动
      en: Interrupt human gate activity
      ja: interrupt 人工 gate activity
    descriptions:
      zh: human_review_gate 调用 interrupt 等待审批者 approve/reject 决定。
      en: human_review_gate calls interrupt awaiting approver approve/reject decision.
      ja: human_review_gate が interrupt を呼び approver approve/reject を待つ。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: interrupt/resume
    field_values: {}
    related_node_ids:
      - ImprovementActivity
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-langgraph
      - claim-improvement-activity-design
  - id: ImprovementActivity-boundary-spec
    labels:
      zh: 评审规范不是活动
      en: Review spec is not activity
      ja: review spec は activity ではない
    descriptions:
      zh: review-assignment-security@3 可复用但无 occurrence 开始时间。
      en: review-assignment-security@3 is reusable without occurrence start time.
      ja: review-assignment-security@3 は reusable で occurrence start time なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - ImprovementActivity
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-improvement-activity-design
parent_relation: null
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Evaluator-optimizer loops, interrupt/resume, retry with state.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Iterative task refinement and review cycles.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Evaluator-optimizer and human-in-the-loop workflow patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Evaluation loops and structured feedback routing.
  - id: evaluation-design
    title: Moonweave improvement-loop boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Loop control versus feedback content separation.
source_claims:
  - id: claim-improvement-activity-langgraph
    source: langgraph
    supports: Evaluator-optimizer and interrupt/resume are time-bounded improvement activities.
    locator: Evaluator-optimizer and interrupt/resume
    evidence_kind: design-inference
    confidence: high
  - id: claim-improvement-activity-design
    source: evaluation-design
    supports: ImprovementActivity is genus of loop, attempt, and coordination occurrences.
    locator: ImprovementActivity boundary
    evidence_kind: design-inference
    confidence: high
