schema: moonweave.ai/ontology-node/v1
id: ImprovementCoordinationActivity
kind: concept
labels:
  zh: 改进协调活动
  en: improvement coordination activity
  ja: 改善調整活動
semantics:
  short_definition:
    zh: 在改进循环中分派尝试、路由反馈或组织评审责任的改进活动。
    en: An improvement activity dispatching attempts, routing feedback, or organizing review responsibility inside a loop.
    ja: loop 内で attempt dispatch・feedback routing・review responsibility を調整する improvement activity です。
  definition:
    zh: 改进协调活动是 ImprovementActivity 的子类，以协调活动标识、所服务循环、输入控制信号和产生的分派决定为种差，是 ReviewCoordination 与 FeedbackRouting 的上位概念。它协调其他活动，但不执行评价或修订内容本身。
    en: ImprovementCoordinationActivity is an ImprovementActivity distinguished by coordination ID, served loop, input control signal, and produced dispatch decision and is the genus of ReviewCoordination and FeedbackRouting. It coordinates other activities but does not itself evaluate or revise content.
    ja: ImprovementCoordinationActivity は coordination ID・served loop・input signal・dispatch decision で区別され ReviewCoordination/FeedbackRouting の genus です。content evaluation/revision 自体は行いません。
  why_needed:
    zh: 协调上位层避免 ReviewCoordination 和 FeedbackRouting 作为无关根节点，也明确两者都只决定工作去向。
    en: The coordination genus prevents ReviewCoordination and FeedbackRouting from becoming unrelated roots and makes explicit that both decide where work goes.
    ja: coordination genus により ReviewCoordination/FeedbackRouting の unrelated roots を除き work destination responsibility を明示します。
  includes:
    - zh: 为评审分配责任、把反馈路由到修订计划、从队列分派改进尝试的活动。
      en: Activities assigning review responsibility, routing feedback to revision plans, and dispatching improvement attempts from a queue.
      ja: review responsibility assignment・feedback-to-plan routing・attempt queue dispatch activities。
  excludes:
    - zh: 实际 ReviewActivity、EvaluationRun、CorrectionActivity、RevisionPlan 和反馈记录。
      en: Actual ReviewActivity, EvaluationRun, CorrectionActivity, RevisionPlan, and feedback records.
      ja: actual ReviewActivity・EvaluationRun・CorrectionActivity・RevisionPlan・feedback record。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 循环内 ReviewCoordination 与 FeedbackRouting 映射为 ImprovementCoordinationActivity；协调 attempt 分派但不执行评审正文。
    en: ReviewCoordination and FeedbackRouting within loops map to ImprovementCoordinationActivity coordinating attempt dispatch without performing review body.
    ja: loop 内 ReviewCoordination/FeedbackRouting を attempt 分派 coordinate 付き ImprovementCoordinationActivity へ写像し review 本文は実行しません。
  typical_input:
    - description: Loop coordination step.
      format: FeedbackRouting selects add-citation-plan@2 after evaluation-42-1 rejection
      source_claims:
        - claim-improvement-coordination-design
  typical_output:
    - description: Moonweave ImprovementCoordinationActivity.
      format: '{"improvement_activity_id": "feedback-route-42-2"}'
      source_claims:
        - claim-improvement-coordination-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys: []
  fields:
    - id: loop_ref
      labels:
        zh: 循环引用
        en: loop reference
        ja: loop ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该协调活动服务的 ImprovementLoop。
        en: References the ImprovementLoop served by this coordination activity.
        ja: coordination activity が serve する ImprovementLoop を参照します。
      allowed_values: []
      pattern: null
      example_value: loop-42
      source_claims:
        - claim-improvement-coordination-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementCoordinationActivity-feedback-routing
    labels:
      zh: 反馈路由协调
      en: Feedback routing coordination
      ja: feedback 路由协调
    descriptions:
      zh: feedback-route-42-2 将 finding-4 路由到 add-citation-plan@2。
      en: feedback-route-42-2 routes finding-4 to add-citation-plan@2.
      ja: feedback-route-42-2 が finding-4 を add-citation-plan@2 へ route。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional routing
    field_values: {}
    related_node_ids:
      - ImprovementCoordinationActivity
      - FeedbackRouting
    related_relation_ids:
      - FeedbackRouting-routes-Feedback
    source_claims:
      - claim-improvement-coordination-langgraph
      - claim-improvement-coordination-design
  - id: ImprovementCoordinationActivity-review-coord
    labels:
      zh: 评审协调
      en: Review coordination
      ja: review 协调
    descriptions:
      zh: review-coord-42 分派 security-reviewer 执行 evaluation-42-1。
      en: review-coord-42 dispatches security-reviewer for evaluation-42-1.
      ja: review-coord-42 が security-reviewer に evaluation-42-1 を dispatch。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: review dispatch
    field_values: {}
    related_node_ids:
      - ImprovementCoordinationActivity
      - ReviewCoordination
    related_relation_ids:
      - ReviewCoordination-dispatches-ImprovementAttempt
    source_claims:
      - claim-improvement-coordination-crewai
      - claim-improvement-coordination-design
  - id: ImprovementCoordinationActivity-boundary-review
    labels:
      zh: 评审活动不是协调
      en: Review activity is not coordination
      ja: review activity は coordination ではない
    descriptions:
      zh: review-run-18 产生 finding-4 是 ReviewActivity 不是 ImprovementCoordinationActivity。
      en: review-run-18 producing finding-4 is ReviewActivity not ImprovementCoordinationActivity.
      ja: review-run-18 finding-4 生成は ReviewActivity で ImprovementCoordinationActivity ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: coordination versus review
    field_values: {}
    related_node_ids:
      - ImprovementCoordinationActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-coordination-design
parent_relation:
  id: ImprovementCoordinationActivity-is_a-ImprovementActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ImprovementCoordinationActivity 是一种 ImprovementActivity；其必要种差是输出责任分派或路径选择而不亲自执行评价和修订。
    en: ImprovementCoordinationActivity is a ImprovementActivity whose necessary differentia is producing a responsibility dispatch or path choice without performing evaluation or revision.
    ja: ImprovementCoordinationActivity は ImprovementActivity の一種で、必要種差は evaluation/revision を実行せず responsibility dispatch/path choice を出すこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ImprovementCoordinationActivity-is_a-ImprovementActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementActivity AND output IS responsibility-assignment OR path-selection AND instance DOES NOT execute evaluation or revision
      explanations:
        zh: 仅当对象既满足 ImprovementActivity 的完整定义，又满足“输出责任分派或路径选择而不亲自执行评价和修订”时断言。
        en: Assert only when the object satisfies the complete ImprovementActivity definition and producing a responsibility dispatch or path choice without performing evaluation or revision.
        ja: object が ImprovementActivity の complete definition と「evaluation/revision を実行せず responsibility dispatch/path choice を出すこと」を満たす時のみ assert します。
      source_claims:
        - claim-improvement-coordination-design
        - claim-improvement-coordination-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-improvement-coordination-design
    - claim-improvement-coordination-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
