        - ImprovementActivity
      related_relation_ids:
        - ImprovementCoordinationActivity-is_a-ImprovementActivity
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 ImprovementCoordinationActivity。
        en: Relatedness or co-occurrence must not classify the boundary object as ImprovementCoordinationActivity.
        ja: relatedness/co-occurrence だけで boundary object を ImprovementCoordinationActivity に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 ImprovementCoordinationActivity 的必要种差，至多属于 ImprovementActivity 或相邻类型。
        en: The boundary object lacks the necessary ImprovementCoordinationActivity differentia and is at most ImprovementActivity or an adjacent type.
        ja: boundary object は ImprovementCoordinationActivity の necessary differentia を欠き ImprovementActivity または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-improvement-coordination-activity-001
        - claim-improvement-coordination-activity-003
  source_claims:
    - claim-improvement-coordination-activity-001
    - claim-improvement-coordination-activity-003
