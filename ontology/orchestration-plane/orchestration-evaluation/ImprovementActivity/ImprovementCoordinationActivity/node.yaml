schema: moonweave.ai/ontology-node/v1
id: ImprovementCoordinationActivity
kind: concept
status: review
labels:
  zh: 改进协调活动
  en: improvement coordination activity
  ja: 改善調整活動
semantics:
  short_definition:
    zh: 在改进循环中分派尝试、路由反馈或组织评审责任的改进活动。
    en: An improvement activity dispatching attempts, routing feedback, or organizing review responsibility inside a loop.
    ja: loop 内で attempt dispatch・feedback routing・review responsibility を調整する improvement activity です。
  definition:
    zh: 改进协调活动是 ImprovementActivity 的子类，以协调活动标识、所服务循环、输入控制信号和产生的分派决定为种差，是 ReviewCoordination 与 FeedbackRouting 的上位概念。它协调其他活动，但不执行评价或修订内容本身。
    en: ImprovementCoordinationActivity is an ImprovementActivity distinguished by coordination ID, served loop, input control signal, and produced dispatch decision and is the genus of ReviewCoordination and FeedbackRouting. It coordinates other activities but does not itself evaluate or revise content.
    ja: ImprovementCoordinationActivity は coordination ID・served loop・input signal・dispatch decision で区別され ReviewCoordination/FeedbackRouting の genus です。content evaluation/revision 自体は行いません。
  why_needed:
    zh: 协调上位层避免 ReviewCoordination 和 FeedbackRouting 作为无关根节点，也明确两者都只决定工作去向。
    en: The coordination genus prevents ReviewCoordination and FeedbackRouting from becoming unrelated roots and makes explicit that both decide where work goes.
    ja: coordination genus により ReviewCoordination/FeedbackRouting の unrelated roots を除き work destination responsibility を明示します。
  includes:
    - zh: 为评审分配责任、把反馈路由到修订计划、从队列分派改进尝试的活动。
      en: Activities assigning review responsibility, routing feedback to revision plans, and dispatching improvement attempts from a queue.
      ja: review responsibility assignment・feedback-to-plan routing・attempt queue dispatch activities。
  excludes:
    - zh: 实际 ReviewActivity、EvaluationRun、CorrectionActivity、RevisionPlan 和反馈记录。
      en: Actual ReviewActivity, EvaluationRun, CorrectionActivity, RevisionPlan, and feedback records.
      ja: actual ReviewActivity・EvaluationRun・CorrectionActivity・RevisionPlan・feedback record。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: loop_ref
      labels:
        zh: 循环引用
        en: loop reference
        ja: loop ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该协调活动服务的 ImprovementLoop。
        en: References the ImprovementLoop served by this coordination activity.
        ja: coordination activity が serve する ImprovementLoop を参照します。
      allowed_values: []
      pattern: null
      example_value: loop-42
      source_claims:
        - claim-improvement-coordination-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementCoordinationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 反馈路由协调
      en: Feedback-routing coordination
      ja: feedback routing coordination
    scenario_id: null
    descriptions:
      zh: feedback-routing-42 读取 finding-4，选择 revision-plan-2，并把 revision-attempt-1 分派到 loop-42。
      en: feedback-routing-42 reads finding-4, selects revision-plan-2, and dispatches revision-attempt-1 into loop-42.
      ja: feedback-routing-42 は finding を読み plan を select して attempt を dispatch します。
    field_values:
      improvement_activity_id: feedback-routing-42
      target_ref: report@7
      status: completed
      loop_ref: loop-42
    related_node_ids:
      - ImprovementCoordinationActivity
      - FeedbackRouting
      - ReviewCoordination
    related_relation_ids: []
    expected_result:
      zh: 记录一次有输入信号和分派结果的协调活动。
      en: Record one coordination occurrence with input signal and dispatch result.
      ja: input signal/dispatch result を持つ coordination occurrence を記録します。
    why_valid_or_invalid:
      zh: 它决定工作去向而不生成评价分数或修订内容。
      en: It decides work destination without generating an evaluation score or revised content.
      ja: work destination を決め evaluation score/revised content は生成しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-coordination-activity-001
      - claim-improvement-coordination-activity-003
  - id: ImprovementCoordinationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 执行修订的纠正活动
      en: Correction activity executing revision
      ja: revision correction activity
    scenario_id: improvement-review-improvementcoordinationactivity-boundary
    descriptions:
      zh: correction-run-9 修改 artifact-report@7 并产生 revision artifact，执行了被分派工作。
      en: correction-run-9 modifies artifact-report@7 and produces a revision artifact, executing the dispatched work.
      ja: correction-run-9 は target を modify し revision artifact を produce する dispatched work です。
    field_values: {}
    related_node_ids:
      - ImprovementCoordinationActivity
      - CorrectionActivity
    related_relation_ids: []
    expected_result:
      zh: 保留为反馈域 CorrectionActivity，不归入协调活动。
      en: Keep it as feedback-owned CorrectionActivity, not an improvement coordination activity.
      ja: feedback-owned CorrectionActivity とし coordination activity に分類しません。
    why_valid_or_invalid:
      zh: 协调决定谁做什么；纠正活动实际修改目标内容。
      en: Coordination decides who does what; correction actually changes target content.
      ja: coordination は destination、correction は target content change を担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-coordination-activity-001
      - claim-improvement-coordination-activity-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ImprovementLoop
    shared_parent_concept_id: ImprovementActivity
    differentia:
      zh: 正向身份比较：父节点 ImprovementActivity：ImprovementCoordinationActivity（semantic kind=activity，骨架 ImprovementCoordinationActivity-is_a-ImprovementActivity）；ImprovementLoop（semantic kind=activity，骨架 ImprovementLoop-is_a-ImprovementActivity）。双端条件：ImprovementCoordinationActivity 条件：“在改进循环中分派尝试、路由反馈或组织评审责任的改进活动”；ImprovementLoop 条件：“按停止条件反复安排改进尝试，并在每轮更新状态的有界控制活动”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent ImprovementActivity: ImprovementCoordinationActivity (semantic kind=activity, backbone ImprovementCoordinationActivity-is_a-ImprovementActivity); ImprovementLoop (semantic kind=activity, backbone ImprovementLoop-is_a-ImprovementActivity). Endpoint conditions: ImprovementCoordinationActivity condition: “An improvement activity dispatching attempts, routing feedback, or organizing review responsibility inside a loop”; ImprovementLoop condition: “A bounded control activity that repeatedly schedules improvement attempts and updates state until a stop condition holds”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 ImprovementActivity：ImprovementCoordinationActivity（semantic kind=activity、バックボーン ImprovementCoordinationActivity-is_a-ImprovementActivity）；ImprovementLoop（semantic kind=activity、バックボーン ImprovementLoop-is_a-ImprovementActivity）。両端条件：ImprovementCoordinationActivity の条件：「loop 内で attempt dispatch・feedback routing・review responsibility を調整する improvement activity です」；ImprovementLoop の条件：「stop condition まで improvement attempt を反復配置し state を更新する bounded control activity です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-improvement-coordination-activity-004
parent_relation:
  id: ImprovementCoordinationActivity-is_a-ImprovementActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ImprovementCoordinationActivity 是一种 ImprovementActivity；其必要种差是输出责任分派或路径选择而不亲自执行评价和修订。
    en: ImprovementCoordinationActivity is a ImprovementActivity whose necessary differentia is producing a responsibility dispatch or path choice without performing evaluation or revision.
    ja: ImprovementCoordinationActivity は ImprovementActivity の一種で、必要種差は evaluation/revision を実行せず responsibility dispatch/path choice を出すこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ImprovementCoordinationActivity-is_a-ImprovementActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementActivity AND output IS responsibility-assignment OR path-selection AND instance DOES NOT execute evaluation or revision
      explanations:
        zh: 仅当对象既满足 ImprovementActivity 的完整定义，又满足“输出责任分派或路径选择而不亲自执行评价和修订”时断言。
        en: Assert only when the object satisfies the complete ImprovementActivity definition and producing a responsibility dispatch or path choice without performing evaluation or revision.
        ja: object が ImprovementActivity の complete definition と「evaluation/revision を実行せず responsibility dispatch/path choice を出すこと」を満たす時のみ assert します。
      source_claims:
        - claim-improvement-coordination-activity-001
        - claim-improvement-coordination-activity-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ImprovementCoordinationActivity-is_a-ImprovementActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-improvementcoordinationactivity-is_a-improvementactivity-positive
      descriptions:
        zh: routing-42 选择 plan-2 并把下一尝试送入修订路径。
        en: routing-42 selects plan-2 and sends the next attempt to the revision path.
        ja: routing-42 は plan-2 を選び next attempt を revision path へ送ります。
      field_values: {}
      related_node_ids:
        - ImprovementCoordinationActivity
        - ImprovementActivity
      related_relation_ids:
        - ImprovementCoordinationActivity-is_a-ImprovementActivity
      expected_result:
        zh: 类型查询返回 ImprovementCoordinationActivity→ImprovementActivity 的严格上位路径。
        en: Type traversal returns the strict ImprovementCoordinationActivity-to-ImprovementActivity genus path.
        ja: type traversal は strict ImprovementCoordinationActivity→ImprovementActivity genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementActivity 的共同条件和 ImprovementCoordinationActivity 的独有种差。
        en: The instance satisfies both the common ImprovementActivity conditions and the unique ImprovementCoordinationActivity differentia.
        ja: instance は ImprovementActivity の common conditions と ImprovementCoordinationActivity の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-improvement-coordination-activity-001
        - claim-improvement-coordination-activity-003
    - id: ImprovementCoordinationActivity-is_a-ImprovementActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-improvementcoordinationactivity-is_a-improvementactivity-boundary
      descriptions:
        zh: correction-run-9 实际修改报告内容，因此属于纠正活动。
        en: correction-run-9 actually changes report content and is therefore a correction activity.
        ja: correction-run-9 は report content を実際に変更する correction activity です。
      field_values: {}
      related_node_ids:
