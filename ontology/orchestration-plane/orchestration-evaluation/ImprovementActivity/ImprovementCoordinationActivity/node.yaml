schema: moonweave.ai/ontology-node/v1
id: ImprovementCoordinationActivity
kind: concept
labels:
  zh: 改进协调活动
  en: improvement coordination activity
  ja: 改善調整活動
semantics:
  short_definition:
    zh: 在改进循环中分派尝试、路由反馈或组织评审责任的改进活动。
    en: An improvement activity dispatching attempts, routing feedback, or organizing review responsibility inside a loop.
    ja: loop 内で attempt dispatch・feedback routing・review responsibility を調整する improvement activity です。
  definition:
    zh: 改进协调活动是 ImprovementActivity 的子类，以协调活动标识、所服务循环、输入控制信号和产生的分派决定为种差，是 ReviewCoordination 与 FeedbackRouting 的上位概念。它协调其他活动，但不执行评价或修订内容本身。
    en: ImprovementCoordinationActivity is an ImprovementActivity distinguished by coordination ID, served loop, input control signal, and produced dispatch decision and is the genus of ReviewCoordination and FeedbackRouting. It coordinates other activities but does not itself evaluate or revise content.
    ja: ImprovementCoordinationActivity は coordination ID・served loop・input signal・dispatch decision で区別され ReviewCoordination/FeedbackRouting の genus です。content evaluation/revision 自体は行いません。
  why_needed:
    zh: 协调上位层避免 ReviewCoordination 和 FeedbackRouting 作为无关根节点，也明确两者都只决定工作去向。
    en: The coordination genus prevents ReviewCoordination and FeedbackRouting from becoming unrelated roots and makes explicit that both decide where work goes.
    ja: coordination genus により ReviewCoordination/FeedbackRouting の unrelated roots を除き work destination responsibility を明示します。
  includes:
    - zh: 为评审分配责任、把反馈路由到修订计划、从队列分派改进尝试的活动。
      en: Activities assigning review responsibility, routing feedback to revision plans, and dispatching improvement attempts from a queue.
      ja: review responsibility assignment・feedback-to-plan routing・attempt queue dispatch activities。
  excludes:
    - zh: 实际 ReviewActivity、EvaluationRun、CorrectionActivity、RevisionPlan 和反馈记录。
      en: Actual ReviewActivity, EvaluationRun, CorrectionActivity, RevisionPlan, and feedback records.
      ja: actual ReviewActivity・EvaluationRun・CorrectionActivity・RevisionPlan・feedback record。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: loop_ref
      labels:
        zh: 循环引用
        en: loop reference
        ja: loop ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该协调活动服务的 ImprovementLoop。
        en: References the ImprovementLoop served by this coordination activity.
        ja: coordination activity が serve する ImprovementLoop を参照します。
      allowed_values: []
      pattern: null
      example_value: loop-42
      source_claims:
        - claim-improvement-coordination-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementCoordinationActivity-example-positive-manual-20260716
    labels:
      zh: ImprovementCoordinationActivity positive
      en: ImprovementCoordinationActivity positive
      ja: ImprovementCoordinationActivity positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ImprovementCoordinationActivity 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ImprovementCoordinationActivity: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ImprovementCoordinationActivity: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: feedback-routing-42, target_ref: "report@7", status: completed, loop_ref: loop-42}

    related_node_ids:
      - ImprovementCoordinationActivity
      - FeedbackRouting
      - ReviewCoordination
    related_relation_ids: []
    source_claims:
      - claim-improvement-coordination-activity-001
      - claim-improvement-coordination-activity-003

  - id: ImprovementCoordinationActivity-example-boundary-manual-20260716
    labels:
      zh: ImprovementCoordinationActivity boundary
      en: ImprovementCoordinationActivity boundary
      ja: ImprovementCoordinationActivity boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 ImprovementCoordinationActivity 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not ImprovementCoordinationActivity delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で ImprovementCoordinationActivity delegation spec ではない。
    field_values: {}

    related_node_ids:
      - ImprovementCoordinationActivity
      - CorrectionActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-coordination-activity-001
      - claim-improvement-coordination-activity-003

  - id: ImprovementCoordinationActivity-example-counterexample-confusable
    labels:
      zh: ImprovementCoordinationActivity counterexample
      en: ImprovementCoordinationActivity counterexample
      ja: ImprovementCoordinationActivity counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 ImprovementCoordinationActivity PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style ImprovementCoordinationActivity PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 ImprovementCoordinationActivity ではない。
    field_values: {coordination_activity_id: absent, routed_feedback_ref: absent, channel: email}

    related_node_ids:
      - ImprovementCoordinationActivity
      - FeedbackRouting
      - ReviewCoordination
      - CorrectionActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-coordination-activity-001

  - id: ImprovementCoordinationActivity-example-instance-concrete
    labels:
      zh: ImprovementCoordinationActivity instance
      en: ImprovementCoordinationActivity instance
      ja: ImprovementCoordinationActivity instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ImprovementCoordinationActivity。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ImprovementCoordinationActivity.
      ja: Reflexion 实例 failed→reflect→retry が ImprovementCoordinationActivity に写像。
    field_values: {improvement_activity_id: feedback-routing-42, target_ref: "report@7", status: completed, loop_ref: loop-42}

    related_node_ids:
      - ImprovementCoordinationActivity
      - FeedbackRouting
      - ReviewCoordination
      - CorrectionActivity
    related_relation_ids: []
    source_claims:
      - claim-improvement-coordination-activity-001

