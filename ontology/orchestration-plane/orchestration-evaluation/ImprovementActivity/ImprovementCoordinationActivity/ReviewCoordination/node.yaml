      zh: review-coord-42 按 review-assignment-security@3 分派 evaluation-42-1。
      en: review-coord-42 dispatches evaluation-42-1 per review-assignment-security@3.
      ja: review-coord-42 が review-assignment-security@3 に従い evaluation-42-1 を dispatch。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: code review loop
    field_values: {}
    related_node_ids:
      - ReviewCoordination
      - ReviewAssignment
      - EvaluationAttempt
    related_relation_ids:
