schema: moonweave.ai/ontology-node/v1
id: ReviewCoordination
kind: concept
status: accepted
labels:
  zh: 评审协调
  en: review coordination
  ja: レビュー調整
semantics:
  short_definition:
    zh: 依据评审任务选择合格评审者、分派改进尝试并跟踪评审责任完成的协调活动。
    en: A coordination activity selecting eligible reviewers, dispatching improvement attempts, and tracking review responsibility under an assignment.
    ja: review assignment 下で eligible reviewer を選び attempt を dispatch し responsibility completion を追う coordination activity です。
  definition:
    zh: 评审协调是 ImprovementCoordinationActivity 的子类，以协调活动标识、ReviewAssignment、被分派尝试和责任状态为身份；它决定由谁在何时执行评审或修订，却不执行 ReviewActivity、EvaluationRun 或 CorrectionActivity 本身。
    en: ReviewCoordination is an ImprovementCoordinationActivity identified by coordination ID, ReviewAssignment, dispatched attempt, and responsibility status. It decides who performs review or revision and when, but does not itself perform ReviewActivity, EvaluationRun, or CorrectionActivity.
    ja: ReviewCoordination は coordination ID・ReviewAssignment・dispatched attempt・responsibility status で識別します。who/when を決めますが ReviewActivity・EvaluationRun・CorrectionActivity 自体は実行しません。
  why_needed:
    zh: 该层把责任分派从评审执行中分开，避免“评审”“评审者”“评审任务”和“协调动作”四种身份混成一个节点。
    en: This layer separates responsibility dispatch from review execution, preventing review, reviewer, assignment, and coordination from collapsing into one node.
    ja: responsibility dispatch と review execution を分け review・reviewer・assignment・coordination の四 identity を混同しません。
  includes:
    - zh: 按资格与范围选择承担者、分派 EvaluationAttempt 或 RevisionAttempt、记录接受和完成状态的活动。
      en: Activities selecting a bearer by eligibility and scope, dispatching EvaluationAttempt or RevisionAttempt, and recording acceptance and completion status.
      ja: eligibility/scope で bearer を選び EvaluationAttempt/RevisionAttempt を dispatch し acceptance/completion status を記録する activity。
  excludes:
    - zh: ReviewAssignment 规范、EvaluatorOptimizer 角色、ReviewActivity 执行、评审发现和 RevisionPlan。
      en: ReviewAssignment specifications, EvaluatorOptimizer roles, ReviewActivity execution, review findings, and RevisionPlan.
      ja: ReviewAssignment spec・EvaluatorOptimizer role・ReviewActivity execution・review finding・RevisionPlan。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: assignment_ref
      labels:
        zh: 评审任务引用
        en: review-assignment reference
        ja: review assignment ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调所应用的职责、范围和资格规范。
        en: References the responsibility, scope, and eligibility specification applied by this coordination occurrence.
        ja: coordination occurrence が適用する responsibility・scope・eligibility specification を参照します。
      allowed_values: []
      pattern: null
      example_value: review-assignment-security@3
      source_claims:
        - claim-review-coordination-001
        - claim-review-coordination-002
    - id: selected_bearer_ref
      labels:
        zh: 所选角色承担关系引用
        en: selected role-bearing reference
        ja: 選択された role-bearing 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调从合格候选中选出的当前 ActorRoleBinding；它必须证明具体承担者持有 assignment_ref 要求的现行角色，不把承担者本人或角色类型并入协调活动。
        en: References the current ActorRoleBinding selected from eligible candidates for this coordination occurrence. It must prove that the concrete bearer holds the role required by assignment_ref without merging the bearer or role type into the coordination activity.
        ja: この coordination occurrence で eligible candidates から選択した current ActorRoleBinding を参照します。concrete bearer が assignment_ref の required role を持つことを証明し、bearer や role type を coordination activity に統合しません。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:reviewer-7
      source_claims:
        - claim-review-coordination-003
    - id: dispatched_attempt_ref
      labels:
        zh: 被分派改进尝试引用
        en: dispatched improvement-attempt reference
        ja: dispatch 済み improvement attempt 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调实际创建并分派的 EvaluationAttempt 或 RevisionAttempt；它必须是一次运行发生，不得用评审任务规范、静态图节点或模型名称代替。
        en: References the concrete EvaluationAttempt or RevisionAttempt created and dispatched by this coordination occurrence. It is a runtime occurrence and cannot be replaced by the review specification, a static graph node, or a model name.
        ja: この coordination occurrence が作成し dispatch した concrete EvaluationAttempt または RevisionAttempt を参照します。runtime occurrence であり review specification、static graph node、model name で代用できません。
      allowed_values: []
      pattern: null
      example_value: evaluation-attempt-18-1
      source_claims:
        - claim-review-coordination-004
    - id: responsibility_status
      labels:
        zh: 责任承接状态
        en: responsibility-bearing status
        ja: responsibility-bearing 状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录所选角色承担关系对被分派尝试的责任进展：已发送、已接受、已拒绝或已履行。它描述责任承接，而不是尝试自身的执行状态。
        en: "Records the selected role bearing's responsibility progress for the dispatched attempt: dispatched, accepted, declined, or fulfilled. It describes responsibility bearing, not the attempt's own execution status."
        ja: selected role bearing が dispatched attempt に対して持つ責任の進捗、dispatched、accepted、declined、fulfilled を記録します。attempt 自体の execution status ではなく responsibility bearing を表します。
      allowed_values:
        - id: ReviewResponsibilityDispatched
          value: dispatched
          labels:
            zh: 已发送责任
            en: dispatched
            ja: dispatched
          definitions:
            zh: 尝试已发送给所选承担关系，但尚无承担者接受或拒绝的确证。
            en: The attempt has been sent to the selected role bearing, but no acceptance or decline has yet been established.
            ja: attempt は selected role bearing へ送信済みですが、acceptance または decline はまだ確定していません。
          status: accepted
          source_claims:
            - claim-review-coordination-005
        - id: ReviewResponsibilityAccepted
          value: accepted
          labels:
            zh: 已接受责任
            en: accepted
            ja: accepted
          definitions:
            zh: 所选承担者明确接受被分派尝试的责任，但该值不表示尝试已经执行完成。
            en: The selected bearer explicitly accepts responsibility for the dispatched attempt; this does not mean the attempt has completed execution.
            ja: selected bearer が dispatched attempt の責任を明示的に受け入れましたが、attempt の execution completion は意味しません。
          status: accepted
          source_claims:
            - claim-review-coordination-006
        - id: ReviewResponsibilityDeclined
          value: declined
          labels:
            zh: 已拒绝责任
            en: declined
            ja: declined
          definitions:
            zh: 所选承担者拒绝该分派；原尝试不得据此视为已履行，后续必须另行协调或终止。
            en: The selected bearer declines the dispatch. The attempt cannot be treated as fulfilled and requires separate re-coordination or termination.
            ja: selected bearer が dispatch を拒否しました。attempt を fulfilled と扱えず、別の re-coordination または termination が必要です。
          status: accepted
          source_claims:
            - claim-review-coordination-007
        - id: ReviewResponsibilityFulfilled
          value: fulfilled
          labels:
            zh: 责任已履行
            en: fulfilled
            ja: fulfilled
          definitions:
            zh: 被分派尝试已满足 assignment_ref 的完成判据，责任承接闭环；具体评审输出仍由其执行活动或反馈对象保存。
            en: The dispatched attempt has satisfied assignment_ref's completion criteria and closes the responsibility bearing. Concrete review output remains on the execution activity or feedback object.
            ja: dispatched attempt が assignment_ref の completion criteria を満たし responsibility bearing を閉じます。concrete review output は execution activity または feedback object に残ります。
          status: accepted
          source_claims:
            - claim-review-coordination-008
      pattern: null
      example_value: dispatched
      source_claims:
        - claim-review-coordination-009
    - id: decided_at
      labels:
        zh: 分派决定时间
        en: dispatch decision time
        ja: dispatch decision 時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录所选承担关系、目标尝试和初始责任状态被共同固定的有效时间；它不是被分派尝试的开始或结束时间。
        en: Records the valid time when selected bearer, target attempt, and initial responsibility status were fixed together. It is not the dispatched attempt's start or end time.
        ja: selected bearer、target attempt、initial responsibility status が同時に固定された valid time を記録します。dispatched attempt の start/end time ではありません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:01:00Z
      source_claims:
        - claim-review-coordination-010
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewCoordination-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 安全评审分派
      en: Security-review dispatch
      ja: security review dispatch
    scenario_id: null
    descriptions:
      zh: coordination-18 读取 review-assignment-security@3，于 10:01 从合格成员中选择 ActorRoleBinding:reviewer-7，把 evaluation-attempt-18-1 分派给它，并记录责任状态 dispatched。
      en: coordination-18 reads review-assignment-security@3 and at 10:01 selects ActorRoleBinding:reviewer-7, dispatches evaluation-attempt-18-1 to it, and records responsibility status dispatched.
      ja: coordination-18 は review-assignment-security@3 を読み、10:01 に ActorRoleBinding:reviewer-7 を選択し evaluation-attempt-18-1 を dispatch して responsibility status=dispatched を記録します。
    field_values:
      improvement_activity_id: coordination-18
      target_ref: security-report@3
      status: completed
      loop_ref: loop-security-3
      assignment_ref: review-assignment-security@3
      selected_bearer_ref: ActorRoleBinding:reviewer-7
      dispatched_attempt_ref: evaluation-attempt-18-1
      responsibility_status: dispatched
      decided_at: 2026-07-16T10:01:00Z
    related_node_ids:
      - ReviewCoordination
      - ReviewAssignment
      - ImprovementAttempt
    related_relation_ids:
      - ReviewCoordination-dispatches-ImprovementAttempt
    expected_result:
      zh: 返回一条可追溯的责任分派活动及其被分派尝试。
      en: Return one traceable responsibility-dispatch activity and its dispatched attempt.
      ja: traceable responsibility-dispatch activity と dispatched attempt を返します。
    why_valid_or_invalid:
      zh: 规范、被选承担者与具体尝试共同证明一次协调发生。
      en: The specification, selected bearer, and concrete attempt jointly prove one coordination occurrence.
      ja: specification・selected bearer・concrete attempt が coordination occurrence を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-coordination-001
      - claim-review-coordination-002
  - id: ReviewCoordination-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评审者给出发现
      en: Reviewer emits a finding
      ja: reviewer emits finding
    scenario_id: improvement-review-reviewcoordination-boundary
    descriptions:
      zh: review-run-18 由 reviewer-7 检查报告并产生 finding-4；它执行评审而不是选择承担者。
      en: review-run-18 has reviewer-7 inspect the report and emit finding-4; it performs review rather than selecting a bearer.
      ja: review-run-18 は reviewer-7 が report を inspect し finding-4 を出す review execution です。
    field_values: {}
    related_node_ids:
      - ReviewCoordination
      - ReviewActivity
    related_relation_ids: []
    expected_result:
      zh: 分类为 ReviewActivity，并从协调活动指向它的尝试，而非将其归为协调。
      en: Classify it as ReviewActivity and connect through its dispatched attempt rather than treating it as coordination.
      ja: ReviewActivity とし dispatched attempt 経由で接続し coordination に分類しません。
    why_valid_or_invalid:
      zh: 分派责任与实际履行责任是前后相邻但身份不同的活动。
      en: Dispatching responsibility and fulfilling it are adjacent but distinct activities.
      ja: responsibility dispatch と fulfillment は adjacent ですが distinct activities です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-coordination-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ReviewCoordination-is_a-ImprovementCoordinationActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ReviewCoordination 是一种 ImprovementCoordinationActivity；其必要种差是按 ReviewAssignment 选择承担者并分派改进尝试。
    en: ReviewCoordination is a ImprovementCoordinationActivity whose necessary differentia is selecting a bearer and dispatching an improvement attempt under ReviewAssignment.
    ja: ReviewCoordination は ImprovementCoordinationActivity の一種で、必要種差は ReviewAssignment 下で bearer を選び improvement attempt を dispatch すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ReviewCoordination-is_a-ImprovementCoordinationActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementCoordinationActivity AND instance.assignment_ref IDENTIFIES ReviewAssignment AND output SELECTS a bearer and dispatches an ImprovementAttempt
      explanations:
        zh: 仅当对象既满足 ImprovementCoordinationActivity 的完整定义，又满足“按 ReviewAssignment 选择承担者并分派改进尝试”时断言。
        en: Assert only when the object satisfies the complete ImprovementCoordinationActivity definition and selecting a bearer and dispatching an improvement attempt under ReviewAssignment.
        ja: object が ImprovementCoordinationActivity の complete definition と「ReviewAssignment 下で bearer を選び improvement attempt を dispatch すること」を満たす時のみ assert します。
      source_claims:
        - claim-review-coordination-002
        - claim-review-coordination-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ReviewCoordination-is_a-ImprovementCoordinationActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-reviewcoordination-is_a-improvementcoordinationactivity-positive
      descriptions:
        zh: coordination-18 按 assignment@3 选择 reviewer-7 并分派 attempt-18-1。
        en: coordination-18 selects reviewer-7 under assignment@3 and dispatches attempt-18-1.
        ja: coordination-18 は assignment@3 下で reviewer-7 を選び attempt を dispatch します。
      field_values: {}
      related_node_ids:
        - ReviewCoordination
        - ImprovementCoordinationActivity
      related_relation_ids:
        - ReviewCoordination-is_a-ImprovementCoordinationActivity
      expected_result:
        zh: 类型查询返回 ReviewCoordination→ImprovementCoordinationActivity 的严格上位路径。
        en: Type traversal returns the strict ReviewCoordination-to-ImprovementCoordinationActivity genus path.
        ja: type traversal は strict ReviewCoordination→ImprovementCoordinationActivity genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementCoordinationActivity 的共同条件和 ReviewCoordination 的独有种差。
        en: The instance satisfies both the common ImprovementCoordinationActivity conditions and the unique ReviewCoordination differentia.
        ja: instance は ImprovementCoordinationActivity の common conditions と ReviewCoordination の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-review-coordination-002
        - claim-review-coordination-001
    - id: ReviewCoordination-is_a-ImprovementCoordinationActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-reviewcoordination-is_a-improvementcoordinationactivity-boundary
      descriptions:
        zh: routing-42 根据反馈选择修订计划，不选择评审责任承担者。
        en: routing-42 selects a revision plan from feedback and does not choose a review-responsibility bearer.
        ja: routing-42 は feedback から revision plan を選び review bearer を選びません。
      field_values: {}
      related_node_ids:
        - ReviewCoordination
        - ImprovementCoordinationActivity
      related_relation_ids:
        - ReviewCoordination-is_a-ImprovementCoordinationActivity
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 ReviewCoordination。
        en: Relatedness or co-occurrence must not classify the boundary object as ReviewCoordination.
        ja: relatedness/co-occurrence だけで boundary object を ReviewCoordination に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 ReviewCoordination 的必要种差，至多属于 ImprovementCoordinationActivity 或相邻类型。
        en: The boundary object lacks the necessary ReviewCoordination differentia and is at most ImprovementCoordinationActivity or an adjacent type.
        ja: boundary object は ReviewCoordination の necessary differentia を欠き ImprovementCoordinationActivity または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-review-coordination-002
        - claim-review-coordination-001
  source_claims:
    - claim-review-coordination-002
    - claim-review-coordination-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ReviewCoordination-dispatches-ImprovementAttempt
    predicate: dispatches
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 分派改进尝试
      en: dispatches improvement attempt
      ja: 改善試行を分派
    definitions:
      zh: ReviewCoordination dispatches ImprovementAttempt 表示一次协调活动为特定尝试选择责任承担者、安排开始条件并记录接受状态；它不等同于尝试执行。
      en: ReviewCoordination dispatches ImprovementAttempt means one coordination occurrence selects a responsible bearer, schedules start conditions, and records acceptance for a particular attempt; it is not the attempt's execution.
      ja: ReviewCoordination dispatches ImprovementAttempt は coordination occurrence が particular attempt の bearer・start conditions・acceptance を記録し attempt execution 自体ではないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_dispatches
      labels:
        zh: 反向 分派改进尝试
        en: inverse dispatches improvement attempt
        ja: 逆 改善試行を分派
    conditions:
      - id: ReviewCoordination-dispatches-ImprovementAttempt-assertion-condition
        severity: error
        expression_language: plain
        expression: dispatch.attempt_ref = attempt.improvement_attempt_id AND dispatch.bearer_ref IS SET AND dispatch.dispatched_at IS SET AND dispatch.result IN {accepted, rejected}
        explanations:
          zh: 仅当协调记录包含 attempt_id、被选承担者、分派时间和接受或拒绝结果时成立。
          en: Assert only when the coordination record includes attempt ID, selected bearer, dispatch time, and acceptance or rejection outcome.
          ja: coordination record が attempt ID・selected bearer・dispatch time・accept/reject outcome を含む時のみ assert します。
        source_claims:
          - claim-review-coordination-001
          - claim-review-coordination-011
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ReviewCoordination-dispatches-ImprovementAttempt-example-positive-manual-20260716
        kind: positive
        labels:
          zh: dispatches 正例
          en: dispatches positive case
          ja: dispatches 正例
        scenario_id: improvement-relation-reviewcoordination-dispatches-improvementattempt-positive
        descriptions:
          zh: coordination-18 在 10:01 把 attempt-18-1 分派给 reviewer-7，并记录 10:01:04 接受。
          en: coordination-18 dispatches attempt-18-1 to reviewer-7 at 10:01 and records acceptance at 10:01:04.
          ja: coordination-18 は 10:01 attempt-18-1 を reviewer-7 に dispatch し acceptance を記録します。
        field_values: {}
        related_node_ids:
          - ReviewCoordination
          - ImprovementAttempt
        related_relation_ids:
          - ReviewCoordination-dispatches-ImprovementAttempt
        expected_result:
          zh: 查询返回 ReviewCoordination —dispatches→ ImprovementAttempt 的有向事实及其证据。
          en: The query returns the directed ReviewCoordination —dispatches→ ImprovementAttempt fact with its evidence.
          ja: query は ReviewCoordination —dispatches→ ImprovementAttempt の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 dispatches 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for dispatches are explicit while both endpoints retain independent identity.
          ja: source・target・dispatches basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-coordination-001
          - claim-review-coordination-011
      - id: ReviewCoordination-dispatches-ImprovementAttempt-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: dispatches 边界例
          en: dispatches boundary case
          ja: dispatches 境界例
        scenario_id: improvement-relation-reviewcoordination-dispatches-improvementattempt-boundary
        descriptions:
          zh: attempt-18-2 由调度器自行开始，coordination-18 没有引用或选择它。
          en: attempt-18-2 starts from another scheduler and coordination-18 neither references nor selects it.
          ja: attempt-18-2 は another scheduler で開始し coordination-18 は reference/select しません。
        field_values: {}
        related_node_ids:
          - ReviewCoordination
          - ImprovementAttempt
        related_relation_ids:
          - ReviewCoordination-dispatches-ImprovementAttempt
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 dispatches。
          en: Co-occurrence, nearby time, or similar fields must not imply dispatches.
          ja: co-occurrence・nearby time・similar fields だけで dispatches を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 ReviewCoordination 对 ImprovementAttempt 承担 dispatches 语义的显式记录。
          en: The boundary case lacks an explicit record proving that ReviewCoordination bears dispatches semantics toward ImprovementAttempt.
          ja: boundary case は ReviewCoordination が ImprovementAttempt に dispatches semantics を持つ explicit record を欠きます。
        synthetic: true
