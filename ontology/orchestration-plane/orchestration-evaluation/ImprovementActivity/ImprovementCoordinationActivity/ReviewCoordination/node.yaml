source_claims:
  - id: claim-review-coordination-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-002
    source: eng-api-openai-evals
    supports: OpenAI's Evals API separates reusable evaluation structure and testing criteria from distinct evaluation runs and run outputs. Moonweave uses that distinction to keep EvaluationAttempt, the feedback-owned EvaluationRun it coordinates, and reusable ReviewAssignment or RevisionPlan specifications as different objects.
    locator: "Evals API > Create an eval and Runs: reusable evaluation structure, testing criteria, data-source schema, and separate run resources"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-003
    source: eng-ont-prov-o
    supports: PROV-O qualifies responsibility by associating an Activity with an Agent under a Role. Moonweave references the concrete role-bearing record selected for this dispatch rather than flattening Agent, Role, and Activity.
    locator: "PROV-O Recommendation Section 3.3: qualified Association, Agent, and hadRole"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-004
    source: eng-api-openai-evals
    supports: OpenAI Evals represents reusable evaluation structure separately from concrete run resources with their own IDs and statuses. Moonweave likewise dispatches a concrete attempt rather than treating the assignment as its execution.
    locator: Evals API > Create eval and Get eval runs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-005
    source: eng-ont-prov-o
    supports: PROV-O separates an Activity's association from the Agent and Role bearing responsibility. Moonweave records dispatch as the initial occurrence-level responsibility state.
    locator: "PROV-O Recommendation Section 3.3: Association and Role"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-006
    source: eng-ont-prov-o
    supports: PROV-O models responsibility through qualified association. Moonweave distinguishes confirmed role acceptance from mere dispatch and from activity completion.
    locator: "PROV-O Recommendation Section 3.3: qualified Association"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-007
    source: eng-ont-prov-o
    supports: PROV-O keeps responsibility association explicit rather than inferring it from co-occurrence. Moonweave records a declined dispatch so failed responsibility transfer is not mistaken for execution.
    locator: "PROV-O Recommendation Sections 3.1 and 3.3: responsibility and qualified Association"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-008
    source: eng-api-openai-evals
    supports: OpenAI Eval runs have their own completion status and outputs, distinct from the reusable eval definition. Moonweave infers a fulfilled responsibility state only after the dispatched attempt meets its assignment criteria.
    locator: Evals API > Eval run statuses and run outputs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-009
    source: eng-ont-prov-o
    supports: PROV-O makes responsibility an explicit association among Activity, Agent, and Role. Moonweave persists the occurrence-level progress of that responsibility separately from attempt execution status.
    locator: "PROV-O Recommendation Section 3.3: qualified Association and Role"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-010
    source: eng-ont-prov-o
    supports: PROV-O can qualify associations and instantaneous events with time. Moonweave records when the responsibility-dispatch decision was fixed without conflating it with execution time.
    locator: "PROV-O Recommendation Section 3.3: qualified Association, InstantaneousEvent, and atTime"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-coordination-011
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official evaluator-optimizer pattern separates a generator occurrence from an evaluator occurrence, routes rejected output back with feedback, and stops when explicit success criteria accept the output. Moonweave uses that operational distinction for improvement loops, attempts, state, and stop control without modeling LangGraph itself as a graph node.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
