schema: moonweave.ai/ontology-node/v1
id: ReviewCoordination
kind: concept
labels:
  zh: 评审协调
  en: review coordination
  ja: レビュー調整
semantics:
  short_definition:
    zh: 依据评审任务选择合格评审者、分派改进尝试并跟踪评审责任完成的协调活动。
    en: A coordination activity selecting eligible reviewers, dispatching improvement attempts, and tracking review responsibility under an assignment.
    ja: review assignment 下で eligible reviewer を選び attempt を dispatch し responsibility completion を追う coordination activity です。
  definition:
    zh: 评审协调是 ImprovementCoordinationActivity 的子类，以协调活动标识、ReviewAssignment、被分派尝试和责任状态为身份；它决定由谁在何时执行评审或修订，却不执行 ReviewActivity、EvaluationRun 或 CorrectionActivity 本身。
    en: ReviewCoordination is an ImprovementCoordinationActivity identified by coordination ID, ReviewAssignment, dispatched attempt, and responsibility status. It decides who performs review or revision and when, but does not itself perform ReviewActivity, EvaluationRun, or CorrectionActivity.
    ja: ReviewCoordination は coordination ID・ReviewAssignment・dispatched attempt・responsibility status で識別します。who/when を決めますが ReviewActivity・EvaluationRun・CorrectionActivity 自体は実行しません。
  why_needed:
    zh: 该层把责任分派从评审执行中分开，避免“评审”“评审者”“评审任务”和“协调动作”四种身份混成一个节点。
    en: This layer separates responsibility dispatch from review execution, preventing review, reviewer, assignment, and coordination from collapsing into one node.
    ja: responsibility dispatch と review execution を分け review・reviewer・assignment・coordination の四 identity を混同しません。
  includes:
    - zh: 按资格与范围选择承担者、分派 EvaluationAttempt 或 RevisionAttempt、记录接受和完成状态的活动。
      en: Activities selecting a bearer by eligibility and scope, dispatching EvaluationAttempt or RevisionAttempt, and recording acceptance and completion status.
      ja: eligibility/scope で bearer を選び EvaluationAttempt/RevisionAttempt を dispatch し acceptance/completion status を記録する activity。
  excludes:
    - zh: ReviewAssignment 规范、EvaluatorOptimizer 角色、ReviewActivity 执行、评审发现和 RevisionPlan。
      en: ReviewAssignment specifications, EvaluatorOptimizer roles, ReviewActivity execution, review findings, and RevisionPlan.
      ja: ReviewAssignment spec・EvaluatorOptimizer role・ReviewActivity execution・review finding・RevisionPlan。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: assignment_ref
      labels:
        zh: 评审任务引用
        en: review-assignment reference
        ja: review assignment ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调所应用的职责、范围和资格规范。
        en: References the responsibility, scope, and eligibility specification applied by this coordination occurrence.
        ja: coordination occurrence が適用する responsibility・scope・eligibility specification を参照します。
      allowed_values: []
      pattern: null
      example_value: review-assignment-security@3
      source_claims:
        - claim-review-coordination-001
        - claim-review-coordination-002
    - id: selected_bearer_ref
      labels:
        zh: 所选角色承担关系引用
        en: selected role-bearing reference
        ja: 選択された role-bearing 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调从合格候选中选出的当前 ActorRoleBinding；它必须证明具体承担者持有 assignment_ref 要求的现行角色，不把承担者本人或角色类型并入协调活动。
        en: References the current ActorRoleBinding selected from eligible candidates for this coordination occurrence. It must prove that the concrete bearer holds the role required by assignment_ref without merging the bearer or role type into the coordination activity.
        ja: この coordination occurrence で eligible candidates から選択した current ActorRoleBinding を参照します。concrete bearer が assignment_ref の required role を持つことを証明し、bearer や role type を coordination activity に統合しません。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:reviewer-7
      source_claims:
        - claim-review-coordination-003
    - id: dispatched_attempt_ref
      labels:
        zh: 被分派改进尝试引用
        en: dispatched improvement-attempt reference
        ja: dispatch 済み improvement attempt 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次协调实际创建并分派的 EvaluationAttempt 或 RevisionAttempt；它必须是一次运行发生，不得用评审任务规范、静态图节点或模型名称代替。
        en: References the concrete EvaluationAttempt or RevisionAttempt created and dispatched by this coordination occurrence. It is a runtime occurrence and cannot be replaced by the review specification, a static graph node, or a model name.
        ja: この coordination occurrence が作成し dispatch した concrete EvaluationAttempt または RevisionAttempt を参照します。runtime occurrence であり review specification、static graph node、model name で代用できません。
      allowed_values: []
      pattern: null
      example_value: evaluation-attempt-18-1
      source_claims:
        - claim-review-coordination-004
    - id: responsibility_status
      labels:
        zh: 责任承接状态
        en: responsibility-bearing status
        ja: responsibility-bearing 状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录所选角色承担关系对被分派尝试的责任进展：已发送、已接受、已拒绝或已履行。它描述责任承接，而不是尝试自身的执行状态。
        en: "Records the selected role bearing's responsibility progress for the dispatched attempt: dispatched, accepted, declined, or fulfilled. It describes responsibility bearing, not the attempt's own execution status."
        ja: selected role bearing が dispatched attempt に対して持つ責任の進捗、dispatched、accepted、declined、fulfilled を記録します。attempt 自体の execution status ではなく responsibility bearing を表します。
      allowed_values:
        - id: ReviewResponsibilityDispatched
          value: dispatched
          labels:
            zh: 已发送责任
            en: dispatched
            ja: dispatched
          definitions:
            zh: 尝试已发送给所选承担关系，但尚无承担者接受或拒绝的确证。
            en: The attempt has been sent to the selected role bearing, but no acceptance or decline has yet been established.
            ja: attempt は selected role bearing へ送信済みですが、acceptance または decline はまだ確定していません。
          status: accepted
          source_claims:
            - claim-review-coordination-005
        - id: ReviewResponsibilityAccepted
          value: accepted
          labels:
            zh: 已接受责任
            en: accepted
            ja: accepted
          definitions:
            zh: 所选承担者明确接受被分派尝试的责任，但该值不表示尝试已经执行完成。
            en: The selected bearer explicitly accepts responsibility for the dispatched attempt; this does not mean the attempt has completed execution.
            ja: selected bearer が dispatched attempt の責任を明示的に受け入れましたが、attempt の execution completion は意味しません。
          status: accepted
          source_claims:
            - claim-review-coordination-006
        - id: ReviewResponsibilityDeclined
          value: declined
          labels:
            zh: 已拒绝责任
            en: declined
            ja: declined
          definitions:
            zh: 所选承担者拒绝该分派；原尝试不得据此视为已履行，后续必须另行协调或终止。
            en: The selected bearer declines the dispatch. The attempt cannot be treated as fulfilled and requires separate re-coordination or termination.
            ja: selected bearer が dispatch を拒否しました。attempt を fulfilled と扱えず、別の re-coordination または termination が必要です。
          status: accepted
          source_claims:
            - claim-review-coordination-007
        - id: ReviewResponsibilityFulfilled
          value: fulfilled
          labels:
            zh: 责任已履行
            en: fulfilled
            ja: fulfilled
          definitions:
            zh: 被分派尝试已满足 assignment_ref 的完成判据，责任承接闭环；具体评审输出仍由其执行活动或反馈对象保存。
            en: The dispatched attempt has satisfied assignment_ref's completion criteria and closes the responsibility bearing. Concrete review output remains on the execution activity or feedback object.
            ja: dispatched attempt が assignment_ref の completion criteria を満たし responsibility bearing を閉じます。concrete review output は execution activity または feedback object に残ります。
          status: accepted
          source_claims:
            - claim-review-coordination-008
      pattern: null
      example_value: dispatched
      source_claims:
        - claim-review-coordination-009
    - id: decided_at
      labels:
        zh: 分派决定时间
        en: dispatch decision time
        ja: dispatch decision 時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录所选承担关系、目标尝试和初始责任状态被共同固定的有效时间；它不是被分派尝试的开始或结束时间。
        en: Records the valid time when selected bearer, target attempt, and initial responsibility status were fixed together. It is not the dispatched attempt's start or end time.
        ja: selected bearer、target attempt、initial responsibility status が同時に固定された valid time を記録します。dispatched attempt の start/end time ではありません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:01:00Z
      source_claims:
        - claim-review-coordination-010
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewCoordination-example-positive-manual-20260716
    labels:
      zh: ReviewCoordination positive
      en: ReviewCoordination positive
      ja: ReviewCoordination positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ReviewCoordination 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ReviewCoordination: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ReviewCoordination: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: coordination-18, target_ref: "security-report@3", status: completed, loop_ref: loop-security-3, assignment_ref: "review-assignment-security@3", selected_bearer_ref: ActorRoleBinding:reviewer-7, dispatched_attempt_ref: evaluation-attempt-18-1, responsibility_status: dispatched, decided_at: 2026-07-16T10:01:00Z}

    related_node_ids:
      - ReviewCoordination
      - ReviewAssignment
      - ImprovementAttempt
    related_relation_ids:
      - ReviewCoordination-dispatches-ImprovementAttempt
    source_claims:
      - claim-review-coordination-001
      - claim-review-coordination-002

  - id: ReviewCoordination-example-boundary-manual-20260716
    labels:
      zh: ReviewCoordination boundary
      en: ReviewCoordination boundary
      ja: ReviewCoordination boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 ReviewCoordination 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not ReviewCoordination delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で ReviewCoordination delegation spec ではない。
    field_values: {}

    related_node_ids:
      - ReviewCoordination
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-coordination-001

  - id: ReviewCoordination-example-counterexample-confusable
    labels:
      zh: ReviewCoordination counterexample
      en: ReviewCoordination counterexample
      ja: ReviewCoordination counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 ReviewCoordination TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style ReviewCoordination TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 ReviewCoordination ではない。
    field_values: {coordination_id: absent, review_assignment_ref: absent, calendar_event_ref: cal-invite-42}

    related_node_ids:
      - ReviewCoordination
      - ReviewAssignment
      - ImprovementCoordinationActivity
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-review-coordination-001

  - id: ReviewCoordination-example-instance-concrete
    labels:
      zh: ReviewCoordination instance
      en: ReviewCoordination instance
      ja: ReviewCoordination instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ReviewCoordination。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ReviewCoordination.
      ja: Reflexion 实例 failed→reflect→retry が ReviewCoordination に写像。
    field_values: {improvement_activity_id: coordination-18, target_ref: "security-report@3", status: completed, loop_ref: loop-security-3, assignment_ref: "review-assignment-security@3", selected_bearer_ref: ActorRoleBinding:reviewer-7, dispatched_attempt_ref: evaluation-attempt-18-1, responsibility_status: dispatched, decided_at: 2026-07-16T10:01:00Z}

    related_node_ids:
      - ReviewCoordination
      - ReviewAssignment
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-review-coordination-001

