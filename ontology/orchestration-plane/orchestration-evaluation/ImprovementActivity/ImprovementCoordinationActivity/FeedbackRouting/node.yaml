schema: moonweave.ai/ontology-node/v1
id: FeedbackRouting
kind: concept
labels:
  zh: 反馈路由
  en: feedback routing
  ja: フィードバック経路選択
semantics:
  short_definition:
    zh: 读取已形成的反馈，选择适用修订计划并把下一尝试送往相应改进路径的协调活动。
    en: A coordination activity reading established feedback, selecting an applicable revision plan, and sending the next attempt to the corresponding improvement path.
    ja: established feedback を読み applicable revision plan を選び next attempt を improvement path へ送る coordination activity です。
  definition:
    zh: 反馈路由是 ImprovementCoordinationActivity 的子类，以路由活动标识、输入 Feedback、所选 RevisionPlan 和目标尝试为身份；它依据反馈类别和循环状态决定继续、升级或停止路径，但不生成反馈内容、不执行修订，也不拥有路由规则规范本身。
    en: FeedbackRouting is an ImprovementCoordinationActivity identified by routing ID, input Feedback, selected RevisionPlan, and target attempt. It chooses continue, escalate, or stop paths from feedback category and loop state, but does not generate feedback content, perform revision, or own the routing-rule specification itself.
    ja: FeedbackRouting は routing ID・input Feedback・selected RevisionPlan・target attempt で識別します。feedback category/loop state から continue/escalate/stop を選びますが feedback generation・revision execution・rule spec ownership は行いません。
  why_needed:
    zh: 将反馈记录、路由发生和修订计划分开后，图中能清楚显示“为什么走这条边”，而不会把三种信息平铺成同类节点。
    en: Separating feedback records, routing occurrences, and revision plans makes the graph explain why a path was chosen without flattening three kinds of information into peers.
    ja: feedback record・routing occurrence・revision plan を分け why this path を説明し three kinds を peer nodes にしません。
  includes:
    - zh: 消费 Feedback、读取循环状态、选择 RevisionPlan 并确定下一 ImprovementAttempt 或停止分支的活动。
      en: Activities consuming Feedback, reading loop state, selecting RevisionPlan, and choosing the next ImprovementAttempt or stop branch.
      ja: Feedback consume・loop state read・RevisionPlan select・next attempt/stop branch choice を行う activity。
  excludes:
    - zh: Feedback 内容、RevisionPlan 规范、消息路由、工具路由和实际 RevisionAttempt。
      en: Feedback content, RevisionPlan specifications, message routing, tool routing, and the actual RevisionAttempt.
      ja: Feedback content・RevisionPlan spec・message routing・tool routing・actual RevisionAttempt。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangGraph conditional_edges 拒绝分支、evaluator feedback 到 revise 路由映射为 FeedbackRouting；routes Feedback 到 RevisionPlan。
    en: LangGraph conditional_edges rejection branch and evaluator feedback-to-revise routing map to FeedbackRouting routing Feedback to RevisionPlan.
    ja: LangGraph conditional_edges reject branch・evaluator feedback→revise route を Feedback→RevisionPlan routes 付き FeedbackRouting へ写像します。
  typical_input:
    - description: Feedback routing decision.
      format: return "revise" if state["score"] < 0.9 else "accept"
      source_claims:
        - claim-feedback-routing-design
  typical_output:
    - description: Moonweave FeedbackRouting.
      format: '{"improvement_activity_id": "feedback-route-42-2", "selected_revision_plan_ref": "add-citation-plan@2"}'
      source_claims:
        - claim-feedback-routing-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys: []
  fields:
    - id: feedback_ref
      labels:
        zh: 反馈引用
        en: feedback reference
        ja: feedback ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用触发本次路径选择的已形成 Feedback。
        en: References the established Feedback that triggered this path selection.
        ja: path selection を trigger した established Feedback を参照します。
      allowed_values: []
      pattern: null
      example_value: feedback-finding-4
      source_claims:
        - claim-feedback-routing-design
        - claim-feedback-routing-design
    - id: selected_action
      labels:
        zh: 所选后续动作
        en: selected next action
        ja: 選択された次動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次路由从当前反馈与循环状态作出的决定：继续进入明确的下一尝试、升级给更高责任层，或停止循环；它不是可复用路由规则。
        en: "Records the occurrence-level decision made from current feedback and loop state: continue into a named next attempt, escalate to a higher responsibility boundary, or stop the loop. It is not a reusable routing rule."
        ja: current feedback と loop state から決めた occurrence-level action、continue、escalate、stop を記録します。reusable routing rule ではありません。
      allowed_values:
        - id: FeedbackRoutingActionContinue
          value: continue
          labels:
            zh: 继续改进
            en: continue
            ja: continue
          definitions:
            zh: 反馈未满足停止依据，按已选计划进入一个明确的后继改进尝试。
            en: Feedback does not satisfy a stop basis, so the selected plan leads to a named successor improvement attempt.
            ja: feedback が stop basis を満たさず selected plan から明示された successor improvement attempt へ進みます。
          source_claims:
            - claim-feedback-routing-design
        - id: FeedbackRoutingActionEscalate
          value: escalate
          labels:
            zh: 升级处置
            en: escalate
            ja: escalate
          definitions:
            zh: 自动路径不足以安全决定下一步，控制转交更高权限或专门资格的责任边界。
            en: The automatic path cannot safely choose the next step, so control moves to a higher-authority or specialist responsibility boundary.
            ja: automatic path では安全に決定できず、より高い authority または specialist responsibility boundary へ移します。
          source_claims:
            - claim-feedback-routing-design
        - id: FeedbackRoutingActionStop
          value: stop
          labels:
            zh: 停止循环
            en: stop
            ja: stop
          definitions:
            zh: 反馈与循环状态满足显式停止依据，不再创建后继尝试。
            en: Feedback and loop state satisfy an explicit stop basis, so no successor attempt is created.
            ja: feedback と loop state が explicit stop basis を満たし successor attempt を作りません。
          source_claims:
            - claim-feedback-routing-design
      pattern: null
      example_value: continue
      source_claims:
        - claim-feedback-routing-design
    - id: selected_revision_plan_ref
      labels:
        zh: 所选修订计划引用
        en: selected revision-plan reference
        ja: 選択された revision plan 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次实际采用的版本化 RevisionPlan；升级或停止时可为空，不得以未版本化计划名替代。
        en: When selected_action is continue, references the versioned RevisionPlan actually chosen. It may be absent for escalation or stop and cannot be replaced by an unversioned name.
        ja: selected_action=continue では実際に選んだ versioned RevisionPlan を参照します。escalate/stop では空にでき unversioned name で代用できません。
      allowed_values: []
      pattern: null
      example_value: revision-plan-2
      source_claims:
        - claim-feedback-routing-design
    - id: target_attempt_ref
      labels:
        zh: 目标改进尝试引用
        en: target improvement-attempt reference
        ja: 対象 improvement attempt 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次决定实际送往的下一次 ImprovementAttempt；它是运行发生，不是静态流程节点。
        en: When selected_action is continue, references the next ImprovementAttempt actually selected. It is a runtime occurrence, not a static workflow node.
        ja: selected_action=continue では実際に選んだ次の ImprovementAttempt を参照します。static workflow node ではなく runtime occurrence です。
      allowed_values: []
      pattern: null
      example_value: revision-attempt-42-1
      source_claims:
        - claim-feedback-routing-design
  constraints:
    - id: feedback-routing-continue-requires-plan-and-target-attempt
      severity: error
      expression_language: plain
      expression: selected_action = continue IMPLIES selected_revision_plan_ref IS PRESENT AND target_attempt_ref IS PRESENT
      explanations:
        zh: 继续动作只有在所选计划版本和目标尝试均已固定时才可核验；否则无法回答采用了什么方案以及路由到哪次运行。
        en: A continue action is verifiable only when both the selected plan revision and target attempt are fixed; otherwise neither the applied plan nor runtime destination can be answered.
        ja: continue action は selected plan revision と target attempt の両方が固定された場合のみ検証可能です。欠けると applied plan と runtime destination を回答できません。
      source_claims:
        - claim-feedback-routing-design
  required_relation_constraints: []
examples:
  - id: FeedbackRouting-eval-reject
    labels:
      zh: 评估拒绝路由
      en: Evaluation rejection routing
      ja: 評価 reject 路由
    descriptions:
      zh: evaluation-42-1 拒绝后 feedback-route-42-2 选择 add-citation-plan@2。
      en: After evaluation-42-1 rejection feedback-route-42-2 selects add-citation-plan@2.
      ja: evaluation-42-1 reject 後 feedback-route-42-2 が add-citation-plan@2 を選択。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: should_continue routing
    field_values: {}
    related_node_ids:
      - FeedbackRouting
      - RevisionAttempt
    related_relation_ids:
      - FeedbackRouting-routes-Feedback
    source_claims:
      - claim-feedback-routing-langgraph
      - claim-feedback-routing-design
  - id: FeedbackRouting-interrupt-reject
    labels:
      zh: interrupt 拒绝路由
      en: Interrupt reject routing
      ja: interrupt reject 路由
    descriptions:
      zh: human reject 驱动 feedback-route 进入 revise 分支。
      en: Human reject drives feedback-route into revise branch.
      ja: human reject が feedback-route を revise branch へ。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: interrupt/resume
    field_values: {}
    related_node_ids:
      - FeedbackRouting
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-feedback-routing-langgraph
      - claim-feedback-routing-design
  - id: FeedbackRouting-boundary-feedback
    labels:
      zh: Feedback 正文不是路由
      en: Feedback body is not routing
      ja: Feedback 本文は routing ではない
    descriptions:
      zh: finding-4 是 Feedback 内容，feedback-route-42-2 是路由活动。
      en: finding-4 is Feedback content; feedback-route-42-2 is routing activity.
      ja: finding-4 は Feedback 内容、feedback-route-42-2 は routing activity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: content versus control
    field_values: {}
    related_node_ids:
      - FeedbackRouting
    related_relation_ids: []
    source_claims:
      - claim-feedback-routing-design
parent_relation:
  id: FeedbackRouting-is_a-ImprovementCoordinationActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: FeedbackRouting 是一种 ImprovementCoordinationActivity；其必要种差是以已形成 Feedback 和循环状态选择修订计划或停止分支。
    en: FeedbackRouting is a ImprovementCoordinationActivity whose necessary differentia is selecting a revision plan or stop branch from established Feedback and loop state.
    ja: FeedbackRouting は ImprovementCoordinationActivity の一種で、必要種差は established Feedback/loop state から revision plan/stop branch を選ぶこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: FeedbackRouting-is_a-ImprovementCoordinationActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementCoordinationActivity AND instance.feedback_ref IS ESTABLISHED AND output CHOOSES exactly one of {revision-plan, escalation, stop}
      explanations:
        zh: 仅当对象既满足 ImprovementCoordinationActivity 的完整定义，又满足“以已形成 Feedback 和循环状态选择修订计划或停止分支”时断言。
        en: Assert only when the object satisfies the complete ImprovementCoordinationActivity definition and selecting a revision plan or stop branch from established Feedback and loop state.
        ja: object が ImprovementCoordinationActivity の complete definition と「established Feedback/loop state から revision plan/stop branch を選ぶこと」を満たす時のみ assert します。
      source_claims:
        - claim-feedback-routing-design
        - claim-feedback-routing-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-feedback-routing-design
    - claim-feedback-routing-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: FeedbackRouting-routes-Feedback
    predicate: routes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 路由反馈
      en: routes feedback
      ja: フィードバックを経路選択
    definitions:
      zh: FeedbackRouting routes Feedback 表示一次路由活动读取特定反馈的类别、严重度和目标引用，并据此决定该反馈进入修订、升级或停止路径。
      en: FeedbackRouting routes Feedback means one routing occurrence reads a particular feedback record's category, severity, and target and decides whether it enters revision, escalation, or stop.
      ja: FeedbackRouting routes Feedback は one routing occurrence が feedback category・severity・target を読み revision・escalation・stop path を決めることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_routes
      labels:
        zh: 反向 路由反馈
        en: inverse routes feedback
        ja: 逆 フィードバックを経路選択
    conditions:
      - id: FeedbackRouting-routes-Feedback-assertion-condition
        severity: error
        expression_language: plain
        expression: routing.feedback_ref = feedback.feedback_id AND routing.selected_path IS RECORDED AND feedback.available_at <= routing.decided_at
        explanations:
          zh: 仅当路由活动保存输入反馈引用和实际所选路径，且反馈早于或同时可用于决定时成立。
          en: Assert only when the routing occurrence stores the input feedback reference and selected path and the feedback was available for the decision.
          ja: routing occurrence が input feedback ref/selected path を保存し feedback が decision 時に available な時のみ assert します。
        source_claims:
          - claim-feedback-routing-design
          - claim-feedback-routing-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-feedback-routing-design
      - claim-feedback-routing-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Feedback
