schema: moonweave.ai/ontology-node/v1
id: FeedbackRouting
kind: concept
labels:
  zh: 反馈路由
  en: feedback routing
  ja: フィードバック経路選択
semantics:
  short_definition:
    zh: 读取已形成的反馈，选择适用修订计划并把下一尝试送往相应改进路径的协调活动。
    en: A coordination activity reading established feedback, selecting an applicable revision plan, and sending the next attempt to the corresponding improvement path.
    ja: established feedback を読み applicable revision plan を選び next attempt を improvement path へ送る coordination activity です。
  definition:
    zh: 反馈路由是 ImprovementCoordinationActivity 的子类，以路由活动标识、输入 Feedback、所选 RevisionPlan 和目标尝试为身份；它依据反馈类别和循环状态决定继续、升级或停止路径，但不生成反馈内容、不执行修订，也不拥有路由规则规范本身。
    en: FeedbackRouting is an ImprovementCoordinationActivity identified by routing ID, input Feedback, selected RevisionPlan, and target attempt. It chooses continue, escalate, or stop paths from feedback category and loop state, but does not generate feedback content, perform revision, or own the routing-rule specification itself.
    ja: FeedbackRouting は routing ID・input Feedback・selected RevisionPlan・target attempt で識別します。feedback category/loop state から continue/escalate/stop を選びますが feedback generation・revision execution・rule spec ownership は行いません。
  why_needed:
    zh: 将反馈记录、路由发生和修订计划分开后，图中能清楚显示“为什么走这条边”，而不会把三种信息平铺成同类节点。
    en: Separating feedback records, routing occurrences, and revision plans makes the graph explain why a path was chosen without flattening three kinds of information into peers.
    ja: feedback record・routing occurrence・revision plan を分け why this path を説明し three kinds を peer nodes にしません。
  includes:
    - zh: 消费 Feedback、读取循环状态、选择 RevisionPlan 并确定下一 ImprovementAttempt 或停止分支的活动。
      en: Activities consuming Feedback, reading loop state, selecting RevisionPlan, and choosing the next ImprovementAttempt or stop branch.
      ja: Feedback consume・loop state read・RevisionPlan select・next attempt/stop branch choice を行う activity。
  excludes:
    - zh: Feedback 内容、RevisionPlan 规范、消息路由、工具路由和实际 RevisionAttempt。
      en: Feedback content, RevisionPlan specifications, message routing, tool routing, and the actual RevisionAttempt.
      ja: Feedback content・RevisionPlan spec・message routing・tool routing・actual RevisionAttempt。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: feedback_ref
      labels:
        zh: 反馈引用
        en: feedback reference
        ja: feedback ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用触发本次路径选择的已形成 Feedback。
        en: References the established Feedback that triggered this path selection.
        ja: path selection を trigger した established Feedback を参照します。
      allowed_values: []
      pattern: null
      example_value: feedback-finding-4
      source_claims:
        - claim-feedback-routing-001
        - claim-feedback-routing-003
    - id: selected_action
      labels:
        zh: 所选后续动作
        en: selected next action
        ja: 選択された次動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次路由从当前反馈与循环状态作出的决定：继续进入明确的下一尝试、升级给更高责任层，或停止循环；它不是可复用路由规则。
        en: "Records the occurrence-level decision made from current feedback and loop state: continue into a named next attempt, escalate to a higher responsibility boundary, or stop the loop. It is not a reusable routing rule."
        ja: current feedback と loop state から決めた occurrence-level action、continue、escalate、stop を記録します。reusable routing rule ではありません。
      allowed_values:
        - id: FeedbackRoutingActionContinue
          value: continue
          labels:
            zh: 继续改进
            en: continue
            ja: continue
          definitions:
            zh: 反馈未满足停止依据，按已选计划进入一个明确的后继改进尝试。
            en: Feedback does not satisfy a stop basis, so the selected plan leads to a named successor improvement attempt.
            ja: feedback が stop basis を満たさず selected plan から明示された successor improvement attempt へ進みます。
          status: accepted
          source_claims:
            - claim-feedback-routing-004
        - id: FeedbackRoutingActionEscalate
          value: escalate
          labels:
            zh: 升级处置
            en: escalate
            ja: escalate
          definitions:
            zh: 自动路径不足以安全决定下一步，控制转交更高权限或专门资格的责任边界。
            en: The automatic path cannot safely choose the next step, so control moves to a higher-authority or specialist responsibility boundary.
            ja: automatic path では安全に決定できず、より高い authority または specialist responsibility boundary へ移します。
          status: accepted
          source_claims:
            - claim-feedback-routing-005
        - id: FeedbackRoutingActionStop
          value: stop
          labels:
            zh: 停止循环
            en: stop
            ja: stop
          definitions:
            zh: 反馈与循环状态满足显式停止依据，不再创建后继尝试。
            en: Feedback and loop state satisfy an explicit stop basis, so no successor attempt is created.
            ja: feedback と loop state が explicit stop basis を満たし successor attempt を作りません。
          status: accepted
          source_claims:
            - claim-feedback-routing-006
      pattern: null
      example_value: continue
      source_claims:
        - claim-feedback-routing-007
    - id: selected_revision_plan_ref
      labels:
        zh: 所选修订计划引用
        en: selected revision-plan reference
        ja: 選択された revision plan 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次实际采用的版本化 RevisionPlan；升级或停止时可为空，不得以未版本化计划名替代。
        en: When selected_action is continue, references the versioned RevisionPlan actually chosen. It may be absent for escalation or stop and cannot be replaced by an unversioned name.
        ja: selected_action=continue では実際に選んだ versioned RevisionPlan を参照します。escalate/stop では空にでき unversioned name で代用できません。
      allowed_values: []
      pattern: null
      example_value: revision-plan-2
      source_claims:
        - claim-feedback-routing-008
    - id: target_attempt_ref
      labels:
        zh: 目标改进尝试引用
        en: target improvement-attempt reference
        ja: 対象 improvement attempt 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次决定实际送往的下一次 ImprovementAttempt；它是运行发生，不是静态流程节点。
        en: When selected_action is continue, references the next ImprovementAttempt actually selected. It is a runtime occurrence, not a static workflow node.
        ja: selected_action=continue では実際に選んだ次の ImprovementAttempt を参照します。static workflow node ではなく runtime occurrence です。
      allowed_values: []
      pattern: null
      example_value: revision-attempt-42-1
      source_claims:
        - claim-feedback-routing-009
  constraints:
    - id: feedback-routing-continue-requires-plan-and-target-attempt
      severity: error
      expression_language: plain
      expression: selected_action = continue IMPLIES selected_revision_plan_ref IS PRESENT AND target_attempt_ref IS PRESENT
      explanations:
        zh: 继续动作只有在所选计划版本和目标尝试均已固定时才可核验；否则无法回答采用了什么方案以及路由到哪次运行。
        en: A continue action is verifiable only when both the selected plan revision and target attempt are fixed; otherwise neither the applied plan nor runtime destination can be answered.
        ja: continue action は selected plan revision と target attempt の両方が固定された場合のみ検証可能です。欠けると applied plan と runtime destination を回答できません。
      source_claims:
        - claim-feedback-routing-010
  required_relation_constraints: []
examples:
  - id: FeedbackRouting-example-positive-manual-20260716
    labels:
      zh: FeedbackRouting positive
      en: FeedbackRouting positive
      ja: FeedbackRouting positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 FeedbackRouting 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for FeedbackRouting: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) FeedbackRouting: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_activity_id: routing-42, target_ref: "report@7", status: completed, loop_ref: loop-42, feedback_ref: feedback-finding-4, selected_action: continue, selected_revision_plan_ref: revision-plan-2, target_attempt_ref: revision-attempt-42-1}

    related_node_ids:
      - FeedbackRouting
      - Feedback
      - RevisionPlan
      - RevisionAttempt
    related_relation_ids:
      - FeedbackRouting-routes-Feedback
      - FeedbackRouting-selects-RevisionPlan
    source_claims:
      - claim-feedback-routing-001
      - claim-feedback-routing-002

  - id: FeedbackRouting-example-boundary-manual-20260716
    labels:
      zh: FeedbackRouting boundary
      en: FeedbackRouting boundary
      ja: FeedbackRouting boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 FeedbackRouting 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not FeedbackRouting routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で FeedbackRouting routing spec ではない。
    field_values: {}

    related_node_ids:
      - FeedbackRouting
      - EvaluationRun
      - Feedback
    related_relation_ids: []
    source_claims:
      - claim-feedback-routing-001
      - claim-feedback-routing-011

  - id: FeedbackRouting-example-counterexample-confusable
    labels:
      zh: FeedbackRouting counterexample
      en: FeedbackRouting counterexample
      ja: FeedbackRouting counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 FeedbackRouting PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style FeedbackRouting PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 FeedbackRouting ではない。
    field_values: {routing_activity_id: absent, feedback_ref: absent, implementation: inline_code}

    related_node_ids:
      - FeedbackRouting
      - ImprovementCoordinationActivity
      - EvaluationActivity
      - Feedback
      - RevisionPlan
      - RevisionAttempt
    related_relation_ids: []
    source_claims:
      - claim-feedback-routing-001

  - id: FeedbackRouting-example-instance-concrete
    labels:
      zh: FeedbackRouting instance
      en: FeedbackRouting instance
      ja: FeedbackRouting instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 FeedbackRouting。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to FeedbackRouting.
      ja: Reflexion 实例 failed→reflect→retry が FeedbackRouting に写像。
    field_values: {improvement_activity_id: routing-42, target_ref: "report@7", status: completed, loop_ref: loop-42, feedback_ref: feedback-finding-4, selected_action: continue, selected_revision_plan_ref: revision-plan-2, target_attempt_ref: revision-attempt-42-1}

    related_node_ids:
      - FeedbackRouting
      - Feedback
      - RevisionPlan
      - RevisionAttempt
    related_relation_ids: []
    source_claims:
      - claim-feedback-routing-001

