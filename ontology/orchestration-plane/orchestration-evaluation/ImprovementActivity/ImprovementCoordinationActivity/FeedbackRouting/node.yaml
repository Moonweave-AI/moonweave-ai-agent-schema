schema: moonweave.ai/ontology-node/v1
id: FeedbackRouting
kind: concept
status: accepted
labels:
  zh: 反馈路由
  en: feedback routing
  ja: フィードバック経路選択
semantics:
  short_definition:
    zh: 读取已形成的反馈，选择适用修订计划并把下一尝试送往相应改进路径的协调活动。
    en: A coordination activity reading established feedback, selecting an applicable revision plan, and sending the next attempt to the corresponding improvement path.
    ja: established feedback を読み applicable revision plan を選び next attempt を improvement path へ送る coordination activity です。
  definition:
    zh: 反馈路由是 ImprovementCoordinationActivity 的子类，以路由活动标识、输入 Feedback、所选 RevisionPlan 和目标尝试为身份；它依据反馈类别和循环状态决定继续、升级或停止路径，但不生成反馈内容、不执行修订，也不拥有路由规则规范本身。
    en: FeedbackRouting is an ImprovementCoordinationActivity identified by routing ID, input Feedback, selected RevisionPlan, and target attempt. It chooses continue, escalate, or stop paths from feedback category and loop state, but does not generate feedback content, perform revision, or own the routing-rule specification itself.
    ja: FeedbackRouting は routing ID・input Feedback・selected RevisionPlan・target attempt で識別します。feedback category/loop state から continue/escalate/stop を選びますが feedback generation・revision execution・rule spec ownership は行いません。
  why_needed:
    zh: 将反馈记录、路由发生和修订计划分开后，图中能清楚显示“为什么走这条边”，而不会把三种信息平铺成同类节点。
    en: Separating feedback records, routing occurrences, and revision plans makes the graph explain why a path was chosen without flattening three kinds of information into peers.
    ja: feedback record・routing occurrence・revision plan を分け why this path を説明し three kinds を peer nodes にしません。
  includes:
    - zh: 消费 Feedback、读取循环状态、选择 RevisionPlan 并确定下一 ImprovementAttempt 或停止分支的活动。
      en: Activities consuming Feedback, reading loop state, selecting RevisionPlan, and choosing the next ImprovementAttempt or stop branch.
      ja: Feedback consume・loop state read・RevisionPlan select・next attempt/stop branch choice を行う activity。
  excludes:
    - zh: Feedback 内容、RevisionPlan 规范、消息路由、工具路由和实际 RevisionAttempt。
      en: Feedback content, RevisionPlan specifications, message routing, tool routing, and the actual RevisionAttempt.
      ja: Feedback content・RevisionPlan spec・message routing・tool routing・actual RevisionAttempt。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: feedback_ref
      labels:
        zh: 反馈引用
        en: feedback reference
        ja: feedback ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用触发本次路径选择的已形成 Feedback。
        en: References the established Feedback that triggered this path selection.
        ja: path selection を trigger した established Feedback を参照します。
      allowed_values: []
      pattern: null
      example_value: feedback-finding-4
      source_claims:
        - claim-feedback-routing-001
        - claim-feedback-routing-003
    - id: selected_action
      labels:
        zh: 所选后续动作
        en: selected next action
        ja: 選択された次動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次路由从当前反馈与循环状态作出的决定：继续进入明确的下一尝试、升级给更高责任层，或停止循环；它不是可复用路由规则。
        en: "Records the occurrence-level decision made from current feedback and loop state: continue into a named next attempt, escalate to a higher responsibility boundary, or stop the loop. It is not a reusable routing rule."
        ja: current feedback と loop state から決めた occurrence-level action、continue、escalate、stop を記録します。reusable routing rule ではありません。
      allowed_values:
        - id: FeedbackRoutingActionContinue
          value: continue
          labels:
            zh: 继续改进
            en: continue
            ja: continue
          definitions:
            zh: 反馈未满足停止依据，按已选计划进入一个明确的后继改进尝试。
            en: Feedback does not satisfy a stop basis, so the selected plan leads to a named successor improvement attempt.
            ja: feedback が stop basis を満たさず selected plan から明示された successor improvement attempt へ進みます。
          status: accepted
          source_claims:
            - claim-feedback-routing-004
        - id: FeedbackRoutingActionEscalate
          value: escalate
          labels:
            zh: 升级处置
            en: escalate
            ja: escalate
          definitions:
            zh: 自动路径不足以安全决定下一步，控制转交更高权限或专门资格的责任边界。
            en: The automatic path cannot safely choose the next step, so control moves to a higher-authority or specialist responsibility boundary.
            ja: automatic path では安全に決定できず、より高い authority または specialist responsibility boundary へ移します。
          status: accepted
          source_claims:
            - claim-feedback-routing-005
        - id: FeedbackRoutingActionStop
          value: stop
          labels:
            zh: 停止循环
            en: stop
            ja: stop
          definitions:
            zh: 反馈与循环状态满足显式停止依据，不再创建后继尝试。
            en: Feedback and loop state satisfy an explicit stop basis, so no successor attempt is created.
            ja: feedback と loop state が explicit stop basis を満たし successor attempt を作りません。
          status: accepted
          source_claims:
            - claim-feedback-routing-006
      pattern: null
      example_value: continue
      source_claims:
        - claim-feedback-routing-007
    - id: selected_revision_plan_ref
      labels:
        zh: 所选修订计划引用
        en: selected revision-plan reference
        ja: 選択された revision plan 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次实际采用的版本化 RevisionPlan；升级或停止时可为空，不得以未版本化计划名替代。
        en: When selected_action is continue, references the versioned RevisionPlan actually chosen. It may be absent for escalation or stop and cannot be replaced by an unversioned name.
        ja: selected_action=continue では実際に選んだ versioned RevisionPlan を参照します。escalate/stop では空にでき unversioned name で代用できません。
      allowed_values: []
      pattern: null
      example_value: revision-plan-2
      source_claims:
        - claim-feedback-routing-008
    - id: target_attempt_ref
      labels:
        zh: 目标改进尝试引用
        en: target improvement-attempt reference
        ja: 対象 improvement attempt 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=continue 时引用本次决定实际送往的下一次 ImprovementAttempt；它是运行发生，不是静态流程节点。
        en: When selected_action is continue, references the next ImprovementAttempt actually selected. It is a runtime occurrence, not a static workflow node.
        ja: selected_action=continue では実際に選んだ次の ImprovementAttempt を参照します。static workflow node ではなく runtime occurrence です。
      allowed_values: []
      pattern: null
      example_value: revision-attempt-42-1
      source_claims:
        - claim-feedback-routing-009
  constraints:
    - id: feedback-routing-continue-requires-plan-and-target-attempt
      severity: error
      expression_language: plain
      expression: selected_action = continue IMPLIES selected_revision_plan_ref IS PRESENT AND target_attempt_ref IS PRESENT
      explanations:
        zh: 继续动作只有在所选计划版本和目标尝试均已固定时才可核验；否则无法回答采用了什么方案以及路由到哪次运行。
        en: A continue action is verifiable only when both the selected plan revision and target attempt are fixed; otherwise neither the applied plan nor runtime destination can be answered.
        ja: continue action は selected plan revision と target attempt の両方が固定された場合のみ検証可能です。欠けると applied plan と runtime destination を回答できません。
      source_claims:
        - claim-feedback-routing-010
  required_relation_constraints: []
examples:
  - id: FeedbackRouting-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 事实遗漏反馈路由
      en: Missing-fact feedback routing
      ja: missing-fact feedback routing
    scenario_id: null
    descriptions:
      zh: routing-42 读取 feedback-finding-4，决定 continue，选择 revision-plan-2，并把 revision-attempt-42-1 作为下一次尝试。
      en: routing-42 reads feedback-finding-4, selects continue with revision-plan-2, and targets revision-attempt-42-1 as the next attempt.
      ja: routing-42 は feedback-finding-4 を読み、continue と revision-plan-2 を選択し、revision-attempt-42-1 を次の attempt に指定します。
    field_values:
      improvement_activity_id: routing-42
      target_ref: report@7
      status: completed
      loop_ref: loop-42
      feedback_ref: feedback-finding-4
      selected_action: continue
      selected_revision_plan_ref: revision-plan-2
      target_attempt_ref: revision-attempt-42-1
    related_node_ids:
      - FeedbackRouting
      - Feedback
      - RevisionPlan
      - RevisionAttempt
    related_relation_ids:
      - FeedbackRouting-routes-Feedback
      - FeedbackRouting-selects-RevisionPlan
    expected_result:
      zh: 返回输入反馈、所选计划和目标尝试完整的一次路由活动。
      en: Return one routing occurrence with complete input feedback, selected plan, and target attempt.
      ja: input feedback・selected plan・target attempt が complete な routing occurrence を返します。
    why_valid_or_invalid:
      zh: 输入反馈、continue 动作、版本化计划和目标尝试共同固定一次具体路由决定；它不是静态规则、反馈文本或修订执行本身。
      en: Input feedback, the continue action, a versioned plan, and the target attempt jointly fix one concrete routing decision; it is not a static rule, feedback text, or the revision execution itself.
      ja: input feedback、continue action、versioned plan、target attempt が一つの具体的 routing decision を固定します。static rule、feedback text、revision execution 自体ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-routing-001
      - claim-feedback-routing-002
  - id: FeedbackRouting-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评价器生成反馈
      en: Evaluator generates feedback
      ja: evaluator generates feedback
    scenario_id: improvement-review-feedbackrouting-boundary
    descriptions:
      zh: eval-run-42 输出 feedback-finding-4 及评分，但尚未选择修订计划或下一尝试。
      en: eval-run-42 emits feedback-finding-4 and a score but has not selected a revision plan or next attempt.
      ja: eval-run-42 は feedback/score を出しますが revision plan/next attempt を選んでいません。
    field_values: {}
    related_node_ids:
      - FeedbackRouting
      - EvaluationRun
      - Feedback
    related_relation_ids: []
    expected_result:
      zh: 保留 EvaluationRun 和 Feedback；发生路径选择时再创建 FeedbackRouting。
      en: Keep EvaluationRun and Feedback; create FeedbackRouting only when a path is selected.
      ja: EvaluationRun/Feedback を保持し path selection 発生時のみ FeedbackRouting を作ります。
    why_valid_or_invalid:
      zh: 反馈产生与基于反馈作出路由决定是两个连续但不同的事件。
      en: Producing feedback and making a routing decision from it are consecutive but different events.
      ja: feedback production と routing decision は consecutive ですが distinct events です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-routing-001
      - claim-feedback-routing-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: FeedbackRouting-is_a-ImprovementCoordinationActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: FeedbackRouting 是一种 ImprovementCoordinationActivity；其必要种差是以已形成 Feedback 和循环状态选择修订计划或停止分支。
    en: FeedbackRouting is a ImprovementCoordinationActivity whose necessary differentia is selecting a revision plan or stop branch from established Feedback and loop state.
    ja: FeedbackRouting は ImprovementCoordinationActivity の一種で、必要種差は established Feedback/loop state から revision plan/stop branch を選ぶこと です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: FeedbackRouting-is_a-ImprovementCoordinationActivity-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementCoordinationActivity AND instance.feedback_ref IS ESTABLISHED AND output CHOOSES exactly one of {revision-plan, escalation, stop}
      explanations:
        zh: 仅当对象既满足 ImprovementCoordinationActivity 的完整定义，又满足“以已形成 Feedback 和循环状态选择修订计划或停止分支”时断言。
        en: Assert only when the object satisfies the complete ImprovementCoordinationActivity definition and selecting a revision plan or stop branch from established Feedback and loop state.
        ja: object が ImprovementCoordinationActivity の complete definition と「established Feedback/loop state から revision plan/stop branch を選ぶこと」を満たす時のみ assert します。
      source_claims:
        - claim-feedback-routing-001
        - claim-feedback-routing-002
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FeedbackRouting-is_a-ImprovementCoordinationActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: improvement-relation-feedbackrouting-is_a-improvementcoordinationactivity-positive
      descriptions:
        zh: routing-42 由 missing-fact feedback 选择 plan-2 和 revision-attempt-1。
        en: routing-42 selects plan-2 and revision-attempt-1 from missing-fact feedback.
        ja: routing-42 は missing-fact feedback から plan-2 と revision-attempt-1 を選びます。
      field_values: {}
      related_node_ids:
        - FeedbackRouting
        - ImprovementCoordinationActivity
      related_relation_ids:
        - FeedbackRouting-is_a-ImprovementCoordinationActivity
      expected_result:
        zh: 类型查询返回 FeedbackRouting→ImprovementCoordinationActivity 的严格上位路径。
        en: Type traversal returns the strict FeedbackRouting-to-ImprovementCoordinationActivity genus path.
        ja: type traversal は strict FeedbackRouting→ImprovementCoordinationActivity genus path を返します。
      why_valid_or_invalid:
        zh: 该实例同时满足 ImprovementCoordinationActivity 的共同条件和 FeedbackRouting 的独有种差。
        en: The instance satisfies both the common ImprovementCoordinationActivity conditions and the unique FeedbackRouting differentia.
        ja: instance は ImprovementCoordinationActivity の common conditions と FeedbackRouting の unique differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-feedback-routing-001
        - claim-feedback-routing-002
    - id: FeedbackRouting-is_a-ImprovementCoordinationActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: improvement-relation-feedbackrouting-is_a-improvementcoordinationactivity-boundary
      descriptions:
        zh: review-coordination-18 按资格分派评审者，未读取反馈选择路径。
        en: review-coordination-18 dispatches a reviewer by eligibility without choosing a path from feedback.
        ja: review-coordination-18 は eligibility で reviewer を dispatch し feedback path choice はしません。
      field_values: {}
      related_node_ids:
        - FeedbackRouting
        - ImprovementCoordinationActivity
      related_relation_ids:
        - FeedbackRouting-is_a-ImprovementCoordinationActivity
      expected_result:
        zh: 不得仅因相关或共现就把边界对象分类为 FeedbackRouting。
        en: Relatedness or co-occurrence must not classify the boundary object as FeedbackRouting.
        ja: relatedness/co-occurrence だけで boundary object を FeedbackRouting に分類しません。
      why_valid_or_invalid:
        zh: 边界对象缺少 FeedbackRouting 的必要种差，至多属于 ImprovementCoordinationActivity 或相邻类型。
        en: The boundary object lacks the necessary FeedbackRouting differentia and is at most ImprovementCoordinationActivity or an adjacent type.
        ja: boundary object は FeedbackRouting の necessary differentia を欠き ImprovementCoordinationActivity または adjacent type に留まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-feedback-routing-001
        - claim-feedback-routing-002
  source_claims:
    - claim-feedback-routing-001
    - claim-feedback-routing-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: FeedbackRouting-routes-Feedback
    predicate: routes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 路由反馈
      en: routes feedback
      ja: フィードバックを経路選択
    definitions:
      zh: FeedbackRouting routes Feedback 表示一次路由活动读取特定反馈的类别、严重度和目标引用，并据此决定该反馈进入修订、升级或停止路径。
      en: FeedbackRouting routes Feedback means one routing occurrence reads a particular feedback record's category, severity, and target and decides whether it enters revision, escalation, or stop.
      ja: FeedbackRouting routes Feedback は one routing occurrence が feedback category・severity・target を読み revision・escalation・stop path を決めることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_routes
      labels:
        zh: 反向 路由反馈
        en: inverse routes feedback
        ja: 逆 フィードバックを経路選択
    conditions:
      - id: FeedbackRouting-routes-Feedback-assertion-condition
        severity: error
        expression_language: plain
        expression: routing.feedback_ref = feedback.feedback_id AND routing.selected_path IS RECORDED AND feedback.available_at <= routing.decided_at
        explanations:
          zh: 仅当路由活动保存输入反馈引用和实际所选路径，且反馈早于或同时可用于决定时成立。
          en: Assert only when the routing occurrence stores the input feedback reference and selected path and the feedback was available for the decision.
          ja: routing occurrence が input feedback ref/selected path を保存し feedback が decision 時に available な時のみ assert します。
        source_claims:
          - claim-feedback-routing-001
          - claim-feedback-routing-003
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: FeedbackRouting-routes-Feedback-example-positive-manual-20260716
        kind: positive
        labels:
          zh: routes 正例
          en: routes positive case
          ja: routes 正例
        scenario_id: improvement-relation-feedbackrouting-routes-feedback-positive
        descriptions:
          zh: routing-42 读取 missing-fact feedback-4，并将其送入 revision 路径。
          en: routing-42 reads missing-fact feedback-4 and sends it to the revision path.
          ja: routing-42 は missing-fact feedback-4 を読み revision path へ送ります。
        field_values: {}
        related_node_ids:
          - FeedbackRouting
          - Feedback
        related_relation_ids:
          - FeedbackRouting-routes-Feedback
        expected_result:
          zh: 查询返回 FeedbackRouting —routes→ Feedback 的有向事实及其证据。
          en: The query returns the directed FeedbackRouting —routes→ Feedback fact with its evidence.
          ja: query は FeedbackRouting —routes→ Feedback の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 routes 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for routes are explicit while both endpoints retain independent identity.
          ja: source・target・routes basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-routing-001
          - claim-feedback-routing-003
      - id: FeedbackRouting-routes-Feedback-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: routes 边界例
          en: routes boundary case
          ja: routes 境界例
        scenario_id: improvement-relation-feedbackrouting-routes-feedback-boundary
        descriptions:
          zh: feedback-5 与 routing-42 属于同一报告，但 routing-42 的输入引用只指向 feedback-4。
          en: feedback-5 concerns the same report as routing-42, but the routing input reference names only feedback-4.
          ja: feedback-5 は same report でも routing-42 input ref は feedback-4 のみです。
        field_values: {}
        related_node_ids:
          - FeedbackRouting
          - Feedback
        related_relation_ids:
          - FeedbackRouting-routes-Feedback
        expected_result:
          zh: 不得仅凭共现、相邻时间或字段相似推导 routes。
          en: Co-occurrence, nearby time, or similar fields must not imply routes.
          ja: co-occurrence・nearby time・similar fields だけで routes を推論しません。
        why_valid_or_invalid:
          zh: 边界情形缺少能证明 FeedbackRouting 对 Feedback 承担 routes 语义的显式记录。
          en: The boundary case lacks an explicit record proving that FeedbackRouting bears routes semantics toward Feedback.
          ja: boundary case は FeedbackRouting が Feedback に routes semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-routing-001
          - claim-feedback-routing-003
    source_claims:
      - claim-feedback-routing-001
      - claim-feedback-routing-003
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Feedback
  - id: FeedbackRouting-selects-RevisionPlan
    predicate: selects
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 选择修订计划
      en: selects revision plan
      ja: 改訂計画を選択
    definitions:
      zh: FeedbackRouting selects RevisionPlan 表示路由活动在候选计划中依据输入反馈、适用条件和循环预算选定一个计划供后续修订尝试执行。
      en: FeedbackRouting selects RevisionPlan means the routing occurrence chooses one plan from eligible candidates using input feedback, applicability conditions, and loop budget for the next revision attempt.
