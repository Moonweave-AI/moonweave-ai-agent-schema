source_claims:
  - id: claim-optimizer-state-001
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API treats state snapshots, executable nodes, and fixed or conditional edges as separate workflow elements. Moonweave uses this evidence to distinguish ImprovementState from ImprovementActivity and to keep containment, dispatch, updates, and termination as cross-facts rather than type parents.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-002
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-003
    source: eng-fw-langgraph-graph-api
    supports: LangGraph nodes read current state and return state updates. Moonweave makes the candidate revision consumed by a control decision explicit in each immutable snapshot.
    locator: Graph API overview > State, Nodes, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-004
    source: eng-api-openai-evals
    supports: OpenAI Evals separates an evaluation definition from distinct runs and their outputs. Moonweave retains only the decision-relevant summary in optimizer state while leaving the complete evaluation output in its canonical owner.
    locator: Evals API > Create eval and Eval runs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-005
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional routing reads graph state to decide whether execution continues or ends. Moonweave exposes remaining attempt budget as an explicit state input so bounded iteration is auditable.
    locator: Graph API overview > State and conditional edges
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-006
    source: eng-fw-langgraph-workflows-agents
    supports: The evaluator-optimizer pattern sends generated output to a separate evaluator. Moonweave records that next control step as evaluate.
    locator: "Workflows and agents > Evaluator-optimizer: generator to evaluator edge"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-007
    source: eng-fw-langgraph-workflows-agents
    supports: The evaluator-optimizer pattern routes rejected output with feedback back to generation. Moonweave names that state-level next action revise.
    locator: "Workflows and agents > Evaluator-optimizer: Rejected + Feedback path"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimizer-state-008
    source: eng-ont-prov-o
