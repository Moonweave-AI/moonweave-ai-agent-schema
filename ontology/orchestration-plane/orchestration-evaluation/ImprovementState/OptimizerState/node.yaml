schema: moonweave.ai/ontology-node/v1
id: OptimizerState
kind: concept
labels:
  zh: 优化器状态
  en: optimizer state
  ja: 最適化器状態
semantics:
  short_definition:
    zh: 记录一个改进循环在特定轮次后的当前候选、分数、剩余预算和下一动作的版本化状态快照。
    en: A versioned state snapshot recording current candidate, score, remaining budget, and next action after a specific improvement-loop round.
    ja: specific loop round 後の current candidate・score・remaining budget・next action を記録する versioned state snapshot です。
  definition:
    zh: 优化器状态是 ImprovementState 的子类，以 state_series_id、revision_sequence 和 observed_at 为身份；它在每次 ImprovementAttempt 后记录当前候选引用、评价摘要、剩余尝试预算和下一动作，但不执行评价、修订或路由，也不覆盖先前状态版本。
    en: OptimizerState is an ImprovementState identified by state-series ID, revision sequence, and observation time. After each ImprovementAttempt it records current candidate reference, evaluation summary, remaining attempt budget, and next action, but it performs no evaluation, revision, or routing and never overwrites prior state revisions.
    ja: OptimizerState は state-series ID・revision sequence・observed_at で識別する ImprovementState です。各 attempt 後の candidate・evaluation summary・remaining budget・next action を記録し、activity を実行せず prior revision を上書きしません。
  why_needed:
    zh: 独立状态节点让每轮控制决定可回放，并避免把“当前状态字段”误作循环、尝试或评价结果的子类。
    en: A separate state node makes each control decision replayable and prevents current-state fields from being mistaken for subtypes of loops, attempts, or evaluation results.
    ja: separate state node により control decision を replay でき current-state fields を loop/attempt/evaluation result subtype と誤認しません。
  includes:
    - zh: 带单调修订号、观测时间、候选引用、最近评价摘要、剩余预算和下一动作的循环快照。
      en: Loop snapshots with monotonic revision, observation time, candidate reference, latest evaluation summary, remaining budget, and next action.
      ja: monotonic revision・observation time・candidate ref・evaluation summary・remaining budget・next action を持つ loop snapshot。
  excludes:
    - zh: ImprovementLoop 活动、ImprovementAttempt、EvaluationRun 结果、StopCondition 规范和可变内存对象。
      en: ImprovementLoop activity, ImprovementAttempt, EvaluationRun result, StopCondition specification, and mutable in-memory objects.
      ja: ImprovementLoop activity・ImprovementAttempt・EvaluationRun result・StopCondition spec・mutable in-memory object。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: candidate_ref
      labels:
        zh: 当前候选引用
        en: current candidate reference
        ja: 現在 candidate 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本状态版本据以作出下一控制决定的确切候选修订；后续修订产生新候选时必须创建新的 OptimizerState，而不是覆盖该引用。
        en: References the exact candidate revision on which this state revision bases its next control decision. A later revision produces a new OptimizerState instead of overwriting this reference.
        ja: この state revision が次の control decision の基礎とする正確な candidate revision を参照します。後続 revision はこの参照を上書きせず、新しい OptimizerState を生成します。
      allowed_values: []
      pattern: null
      example_value: report@8
      source_claims:
        - claim-optimizer-state-003
    - id: evaluation_summary
      labels:
        zh: 当前评价摘要
        en: current evaluation summary
        ja: 現在 evaluation summary
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存支撑 next_action 的最小评价事实，例如量化质量值和未解决发现数量；它是对具体评价输出的状态摘要，不替代 EvaluationRun 或 Feedback 原文。
        en: Preserves the minimal evaluation facts supporting next_action, such as a quantitative quality value and unresolved-finding count. It is a state summary of concrete evaluation output, not a replacement for EvaluationRun or Feedback content.
        ja: next_action を支える最小 evaluation facts、たとえば quantitative quality value と unresolved-finding count を保持します。具体的 evaluation output の state summary であり EvaluationRun や Feedback content を置き換えません。
      allowed_values: []
      pattern: null
      example_value:
        quality_score: 0.84
        finding_count: 1
      source_claims:
        - claim-optimizer-state-004
    - id: remaining_attempt_budget
      labels:
        zh: 剩余尝试预算
        en: remaining attempt budget
        ja: 残り attempt budget
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在该状态版本之后仍允许启动的改进尝试数量，必须为非负整数；它是循环限界的剩余额度，不是已经发生的尝试计数。
        en: Records the non-negative number of additional improvement attempts permitted after this state revision. It is the loop's remaining bound, not a count of attempts already performed.
        ja: この state revision 後に許可される追加 improvement attempts の非負整数を記録します。既に実行した attempt count ではなく loop の remaining bound です。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-optimizer-state-005
    - id: next_action
      labels:
        zh: 下一控制动作
        en: next control action
        ja: 次の control action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 依据当前候选、评价摘要与剩余预算声明下一步应评价、修订、升级或停止；它是该不可变状态版本的决定输出，不表示相应活动已经完成。
        en: Declares whether the next step is evaluate, revise, escalate, or stop based on the current candidate, evaluation summary, and remaining budget. It is the decision output of this immutable state revision and does not assert that the corresponding activity has completed.
        ja: current candidate、evaluation summary、remaining budget に基づき次に evaluate、revise、escalate、stop のどれを行うか宣言します。この immutable state revision の decision output で、対応 activity の完了を主張しません。
      allowed_values:
        - id: OptimizerStateNextActionEvaluate
          value: evaluate
          labels:
            zh: 进入评价
            en: evaluate
            ja: evaluate
          definitions:
            zh: 当前候选尚需由下一次 EvaluationAttempt 按适用判据进行评价。
            en: The current candidate must next be assessed by an EvaluationAttempt under the applicable criteria.
            ja: current candidate を次の EvaluationAttempt が applicable criteria に基づいて評価する必要があります。
          status: accepted
          source_claims:
            - claim-optimizer-state-006
        - id: OptimizerStateNextActionRevise
          value: revise
          labels:
            zh: 进入修订
            en: revise
            ja: revise
          definitions:
            zh: 评价未通过且仍有尝试预算，下一步按反馈产生新的候选修订。
            en: Evaluation has not accepted the candidate and attempt budget remains, so feedback drives a new candidate revision.
            ja: evaluation が candidate を受理せず attempt budget が残るため、feedback に基づいて新しい candidate revision を生成します。
          status: accepted
          source_claims:
            - claim-optimizer-state-007
        - id: OptimizerStateNextActionEscalate
          value: escalate
          labels:
            zh: 升级处置
            en: escalate
            ja: escalate
          definitions:
            zh: 自动评价—修订路径缺少足够授权或确定性，下一步转交更高责任层判断。
            en: The automatic evaluate-revise path lacks sufficient authority or certainty, so the next decision moves to a higher responsibility boundary.
            ja: automatic evaluate-revise path に十分な authority または certainty がなく、次の decision を上位 responsibility boundary へ移します。
          status: accepted
          source_claims:
            - claim-optimizer-state-008
        - id: OptimizerStateNextActionStop
          value: stop
          labels:
            zh: 停止循环
            en: stop
            ja: stop
          definitions:
            zh: 当前状态满足接受或其他终止依据，不再安排后继改进尝试。
            en: The current state satisfies acceptance or another termination basis and schedules no successor improvement attempt.
            ja: current state が acceptance または他の termination basis を満たし、successor improvement attempt を配置しません。
          status: accepted
          source_claims:
            - claim-optimizer-state-009
      pattern: null
      example_value: revise
      source_claims:
        - claim-optimizer-state-010
    - id: source_attempt_ref
      labels:
        zh: 来源尝试引用
        en: source improvement-attempt reference
        ja: source improvement attempt 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生本状态版本的确切 ImprovementAttempt，使状态更新关系可从快照回溯到一次运行发生。
        en: References the exact ImprovementAttempt that produced this state revision, making the state update traceable from snapshot to runtime occurrence.
        ja: この state revision を生成した正確な ImprovementAttempt を参照し、snapshot から runtime occurrence へ state update を追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: evaluation-attempt-42-2
      source_claims:
        - claim-optimizer-state-011
    - id: predecessor_state_ref
      labels:
        zh: 前一状态版本引用
        en: predecessor state reference
        ja: predecessor state 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当 revision_sequence 大于 1 时，引用同一 state_series_id 中紧邻的前一不可变状态版本；首版为空，且不得跨系列连接。
        en: When revision_sequence is greater than one, references the immediately preceding immutable revision in the same state_series_id. It is absent for revision one and cannot cross series.
        ja: revision_sequence が 1 より大きい場合、同じ state_series_id の直前 immutable revision を参照します。revision one では空で、series を跨げません。
      allowed_values: []
      pattern: null
      example_value: optimizer-state-loop-42#2
      source_claims:
        - claim-optimizer-state-012
  constraints:
    - id: optimizer-state-budget-and-predecessor-consistency
      severity: error
      expression_language: plain
      expression: remaining_attempt_budget >= 0; revision_sequence = 1 IFF predecessor_state_ref IS ABSENT; revision_sequence > 1 IMPLIES predecessor_state_ref identifies revision_sequence - 1 in the same state_series_id; next_action IN {evaluate, revise} IMPLIES remaining_attempt_budget > 0
      explanations:
        zh: 剩余预算不得为负，状态修订必须形成同系列连续前驱链；需要新尝试的 evaluate 或 revise 只有在预算仍大于零时才成立。
        en: Remaining budget is non-negative, state revisions form a consecutive same-series predecessor chain, and evaluate or revise is valid only while budget remains positive.
        ja: remaining budget は非負で、state revisions は同一 series の連続 predecessor chain を形成します。新しい attempt を要する evaluate または revise は budget が正の場合のみ有効です。
      source_claims:
        - claim-optimizer-state-013
  required_relation_constraints: []
examples:
  - id: OptimizerState-example-positive-manual-20260716
    labels:
      zh: OptimizerState positive
      en: OptimizerState positive
      ja: OptimizerState positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 OptimizerState 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for OptimizerState: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) OptimizerState: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_state_id: "optimizer-state-loop-42#3", observed_at: 2026-07-16T10:04:00Z, revision_sequence: 3, candidate_ref: "report@8"}

    related_node_ids:
      - OptimizerState
      - ImprovementAttempt
    related_relation_ids:
      - ImprovementAttempt-updates-OptimizerState
    source_claims:
      - claim-optimizer-state-001
      - claim-optimizer-state-002

  - id: OptimizerState-example-boundary-manual-20260716
    labels:
      zh: OptimizerState boundary
      en: OptimizerState boundary
      ja: OptimizerState boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 OptimizerState 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not OptimizerState static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で OptimizerState 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - OptimizerState
      - EvaluationAttempt
    related_relation_ids: []
    source_claims:
      - claim-optimizer-state-001
      - claim-optimizer-state-002

  - id: OptimizerState-example-counterexample-confusable
    labels:
      zh: OptimizerState counterexample
      en: OptimizerState counterexample
      ja: OptimizerState counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 OptimizerState；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style OptimizerState; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 OptimizerState として拒否。
    field_values: {optimizer_state_id: absent, remaining_attempts: absent, retry_count: 2}

    related_node_ids:
      - OptimizerState
      - ImprovementState
      - EvaluatorOptimizerLoop
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-optimizer-state-001

  - id: OptimizerState-example-instance-concrete
    labels:
      zh: OptimizerState instance
      en: OptimizerState instance
      ja: OptimizerState instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 OptimizerState。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to OptimizerState.
      ja: Reflexion 实例 failed→reflect→retry が OptimizerState に写像。
    field_values: {improvement_state_id: "optimizer-state-loop-42#3", observed_at: 2026-07-16T10:04:00Z, revision_sequence: 3, candidate_ref: "report@8"}

    related_node_ids:
      - OptimizerState
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-optimizer-state-001

