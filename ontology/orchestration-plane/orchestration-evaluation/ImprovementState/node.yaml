schema: moonweave.ai/ontology-node/v1
id: ImprovementState
kind: concept
labels:
  zh: 改进状态
  en: improvement state
  ja: 改善状態
semantics:
  short_definition:
    zh: 在一个时间点描述改进循环当前尝试、预算、反馈和质量候选的状态快照。
    en: A state snapshot describing a loop's current attempt, budget, feedback, and quality candidate at one time.
    ja: one time に loop の current attempt・budget・feedback・quality candidate を記述する state snapshot です。
  definition:
    zh: 改进状态是本域运行状态的共同上位概念，以状态标识、循环引用、版本序号和观测时间为身份；OptimizerState 是其下位类型。状态可被尝试更新，但不是更新活动、不等于不可变谱系记录，也不定义循环规则。
    en: ImprovementState is the genus of runtime state in this domain, identified by state ID, loop reference, revision sequence, and observed time; OptimizerState is its subtype. State may be updated by attempts but is neither the update activity nor an immutable lineage record and does not define loop rules.
    ja: ImprovementState は state ID・loop ref・revision sequence・observed time で識別する runtime state genus です。attempt に update されますが activity・immutable lineage・rule definition ではありません。
  why_needed:
    zh: 状态根把“当前循环处于什么情况”与“循环活动做了什么”和“最终为何停止的证据”分开。
    en: A state root separates the loop's current condition from what activities did and from immutable evidence explaining the final stop.
    ja: state root は current condition を activity actions と final stop evidence から分離します。
  includes:
    - zh: 当前尝试号、剩余预算、选中反馈、候选质量和待执行动作的可版本化快照。
      en: Versioned snapshots of current attempt, remaining budget, selected feedback, candidate quality, and pending action.
      ja: current attempt・remaining budget・selected feedback・candidate quality・pending action の versioned snapshot。
  excludes:
    - zh: 改进活动、优化器角色、停止条件规范、审计谱系和输出工件。
      en: Improvement activities, optimizer roles, stop-condition specifications, audit lineage, and output artifacts.
      ja: improvement activity・optimizer role・stop condition spec・audit lineage・output artifact。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: LangGraph state snapshot 版本、循环内 draft/score/attempt_counter 映射为 ImprovementState；与 Activity 分离，RevisionAttempt 产生 OptimizerState。
    en: LangGraph state snapshot versions and loop draft/score/attempt_counter map to ImprovementState separate from Activity; RevisionAttempt produces OptimizerState.
    ja: LangGraph state snapshot 版・loop 内 draft/score/attempt_counter を Activity と分離した ImprovementState へ写像し RevisionAttempt が OptimizerState を生成します。
  typical_input:
    - description: Loop state snapshot.
      format: '{"state_id": "state@7", "attempt_counter": 2, "latest_score": 0.85}'
      source_claims:
        - claim-improvement-state-design
  typical_output:
    - description: Moonweave ImprovementState.
      format: '{"state_id": "state@7", "revision": "7"}'
      source_claims:
        - claim-improvement-state-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - improvement_state_id
    - revision_sequence
  fields:
    - id: improvement_state_id
      labels:
        zh: 改进状态标识
        en: improvement-state ID
        ja: 改善 state ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个循环状态系列。
        en: Stably identifies one loop-state series.
        ja: 一 loop-state series を安定識別します。
      allowed_values: []
      pattern: null
      example_value: optimizer-state-run-42
      source_claims:
        - claim-improvement-state-design
    - id: revision_sequence
      labels:
        zh: 状态版本序号
        en: state revision sequence
        ja: state revision sequence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 单调标识循环状态更新顺序。
        en: Monotonically identifies loop-state update order.
        ja: loop-state update order を monotonically 識別します。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-improvement-state-design
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该状态版本生效的 UTC 时间。
        en: Records the UTC time this state revision became effective.
        ja: state revision が effective となった UTC time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:00Z
      source_claims:
        - claim-improvement-state-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementState-loop-snapshot
    labels:
      zh: 循环状态快照
      en: Loop state snapshot
      ja: loop state snapshot
    descriptions:
      zh: state@7 记录第二轮后 draft 版本与 score 0.85。
      en: state@7 records draft revision and score 0.85 after round two.
      ja: state@7 が第二 round 後 draft 版と score 0.85 を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: state snapshots
    field_values:
      state_id: state@7
    related_node_ids:
      - ImprovementState
      - OptimizerState
      - ImprovementLoop
    related_relation_ids:
      - RevisionAttempt-produces-OptimizerState
    source_claims:
      - claim-improvement-state-langgraph
      - claim-improvement-state-design
  - id: ImprovementState-attempt-counter
    labels:
      zh: 尝试计数状态
      en: Attempt counter state
      ja: attempt counter state
    descriptions:
      zh: attempt_counter=3 与 LangGraph retry state 对齐。
      en: attempt_counter=3 aligns with LangGraph retry state.
      ja: attempt_counter=3 が LangGraph retry state と一致。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: retry with state
    field_values: {}
    related_node_ids:
      - ImprovementState
      - ImprovementAttempt
    related_relation_ids:
      - ImprovementAttempt-updates-OptimizerState
    source_claims:
      - claim-improvement-state-langgraph
      - claim-improvement-state-design
  - id: ImprovementState-boundary-activity
    labels:
      zh: 活动不是状态
      en: Activity is not state
      ja: activity は state ではない
    descriptions:
      zh: evaluation-42-1 是 EvaluationAttempt 发生不是 ImprovementState 快照。
      en: evaluation-42-1 is EvaluationAttempt occurrence not ImprovementState snapshot.
      ja: evaluation-42-1 は EvaluationAttempt occurrence で ImprovementState snapshot ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: state versus activity
    field_values: {}
    related_node_ids:
      - ImprovementState
      - EvaluationAttempt
    related_relation_ids: []
    source_claims:
      - claim-improvement-state-design
parent_relation: null
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Evaluator-optimizer loops, interrupt/resume, retry with state.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Iterative task refinement and review cycles.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Evaluator-optimizer and human-in-the-loop workflow patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Evaluation loops and structured feedback routing.
  - id: evaluation-design
    title: Moonweave improvement-loop boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Loop control versus feedback content separation.
source_claims:
  - id: claim-improvement-state-langgraph
    source: langgraph
    supports: Graph state snapshots version loop optimization state.
    locator: State and checkpoints
    evidence_kind: design-inference
    confidence: high
  - id: claim-improvement-state-design
    source: evaluation-design
    supports: ImprovementState is versioned mutable loop state genus.
    locator: ImprovementState boundary
    evidence_kind: design-inference
    confidence: high
