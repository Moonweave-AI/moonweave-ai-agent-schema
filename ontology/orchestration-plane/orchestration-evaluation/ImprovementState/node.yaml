schema: moonweave.ai/ontology-node/v1
id: ImprovementState
kind: concept
labels:
  zh: 改进状态
  en: improvement state
  ja: 改善状態
semantics:
  short_definition:
    zh: 在一个时间点描述改进循环当前尝试、预算、反馈和质量候选的状态快照。
    en: A state snapshot describing a loop's current attempt, budget, feedback, and quality candidate at one time.
    ja: one time に loop の current attempt・budget・feedback・quality candidate を記述する state snapshot です。
  definition:
    zh: 改进状态是本域运行状态的共同上位概念，以状态标识、循环引用、版本序号和观测时间为身份；OptimizerState 是其下位类型。状态可被尝试更新，但不是更新活动、不等于不可变谱系记录，也不定义循环规则。
    en: ImprovementState is the genus of runtime state in this domain, identified by state ID, loop reference, revision sequence, and observed time; OptimizerState is its subtype. State may be updated by attempts but is neither the update activity nor an immutable lineage record and does not define loop rules.
    ja: ImprovementState は state ID・loop ref・revision sequence・observed time で識別する runtime state genus です。attempt に update されますが activity・immutable lineage・rule definition ではありません。
  why_needed:
    zh: 状态根把“当前循环处于什么情况”与“循环活动做了什么”和“最终为何停止的证据”分开。
    en: A state root separates the loop's current condition from what activities did and from immutable evidence explaining the final stop.
    ja: state root は current condition を activity actions と final stop evidence から分離します。
  includes:
    - zh: 当前尝试号、剩余预算、选中反馈、候选质量和待执行动作的可版本化快照。
      en: Versioned snapshots of current attempt, remaining budget, selected feedback, candidate quality, and pending action.
      ja: current attempt・remaining budget・selected feedback・candidate quality・pending action の versioned snapshot。
  excludes:
    - zh: 改进活动、优化器角色、停止条件规范、审计谱系和输出工件。
      en: Improvement activities, optimizer roles, stop-condition specifications, audit lineage, and output artifacts.
      ja: improvement activity・optimizer role・stop condition spec・audit lineage・output artifact。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys:
    - improvement_state_id
    - revision_sequence
  fields:
    - id: improvement_state_id
      labels:
        zh: 改进状态标识
        en: improvement-state ID
        ja: 改善 state ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个循环状态系列。
        en: Stably identifies one loop-state series.
        ja: 一 loop-state series を安定識別します。
      allowed_values: []
      pattern: null
      example_value: optimizer-state-run-42
      source_claims:
        - claim-improvement-state-001
    - id: revision_sequence
      labels:
        zh: 状态版本序号
        en: state revision sequence
        ja: state revision sequence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 单调标识循环状态更新顺序。
        en: Monotonically identifies loop-state update order.
        ja: loop-state update order を monotonically 識別します。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-improvement-state-001
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该状态版本生效的 UTC 时间。
        en: Records the UTC time this state revision became effective.
        ja: state revision が effective となった UTC time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:00Z
      source_claims:
        - claim-improvement-state-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementState-example-positive-manual-20260716
    labels:
      zh: ImprovementState positive
      en: ImprovementState positive
      ja: ImprovementState positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ImprovementState 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ImprovementState: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ImprovementState: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_state_id: optimizer-state-run-42, revision_sequence: 3, observed_at: 2026-07-16T10:04:00Z}

    related_node_ids:
      - ImprovementState
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-improvement-state-001
      - claim-improvement-state-002

  - id: ImprovementState-example-boundary-manual-20260716
    labels:
      zh: ImprovementState boundary
      en: ImprovementState boundary
      ja: ImprovementState boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 ImprovementState 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not ImprovementState static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で ImprovementState 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - ImprovementAttempt
      - ImprovementState
    related_relation_ids: []
    source_claims:
      - claim-improvement-state-001
      - claim-improvement-state-002

  - id: ImprovementState-example-counterexample-confusable
    labels:
      zh: ImprovementState counterexample
      en: ImprovementState counterexample
      ja: ImprovementState counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 ImprovementState DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style ImprovementState DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 ImprovementState ではない。
    field_values: {state_id: absent, improvement_loop_ref: absent, graph_checkpoint: present}

    related_node_ids:
      - ImprovementState
      - OptimizerState
      - ImprovementLoop
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-improvement-state-001

  - id: ImprovementState-example-instance-concrete
    labels:
      zh: ImprovementState instance
      en: ImprovementState instance
      ja: ImprovementState instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ImprovementState。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ImprovementState.
      ja: Reflexion 实例 failed→reflect→retry が ImprovementState に写像。
    field_values: {improvement_state_id: optimizer-state-run-42, revision_sequence: 3, observed_at: 2026-07-16T10:04:00Z}

    related_node_ids:
      - ImprovementState
      - OptimizerState
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-improvement-state-001

