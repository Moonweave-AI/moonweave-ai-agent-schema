schema: moonweave.ai/ontology-node/v1
id: ImprovementState
kind: concept
status: review
labels:
  zh: 改进状态
  en: improvement state
  ja: 改善状態
semantics:
  short_definition:
    zh: 在一个时间点描述改进循环当前尝试、预算、反馈和质量候选的状态快照。
    en: A state snapshot describing a loop's current attempt, budget, feedback, and quality candidate at one time.
    ja: one time に loop の current attempt・budget・feedback・quality candidate を記述する state snapshot です。
  definition:
    zh: 改进状态是本域运行状态的共同上位概念，以状态标识、循环引用、版本序号和观测时间为身份；OptimizerState 是其下位类型。状态可被尝试更新，但不是更新活动、不等于不可变谱系记录，也不定义循环规则。
    en: ImprovementState is the genus of runtime state in this domain, identified by state ID, loop reference, revision sequence, and observed time; OptimizerState is its subtype. State may be updated by attempts but is neither the update activity nor an immutable lineage record and does not define loop rules.
    ja: ImprovementState は state ID・loop ref・revision sequence・observed time で識別する runtime state genus です。attempt に update されますが activity・immutable lineage・rule definition ではありません。
  why_needed:
    zh: 状态根把“当前循环处于什么情况”与“循环活动做了什么”和“最终为何停止的证据”分开。
    en: A state root separates the loop's current condition from what activities did and from immutable evidence explaining the final stop.
    ja: state root は current condition を activity actions と final stop evidence から分離します。
  includes:
    - zh: 当前尝试号、剩余预算、选中反馈、候选质量和待执行动作的可版本化快照。
      en: Versioned snapshots of current attempt, remaining budget, selected feedback, candidate quality, and pending action.
      ja: current attempt・remaining budget・selected feedback・candidate quality・pending action の versioned snapshot。
  excludes:
    - zh: 改进活动、优化器角色、停止条件规范、审计谱系和输出工件。
      en: Improvement activities, optimizer roles, stop-condition specifications, audit lineage, and output artifacts.
      ja: improvement activity・optimizer role・stop condition spec・audit lineage・output artifact。
  semantic_kind: state
  aliases: []
structure:
  identity_keys:
    - improvement_state_id
    - revision_sequence
  fields:
    - id: improvement_state_id
      labels:
        zh: 改进状态标识
        en: improvement-state ID
        ja: 改善 state ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个循环状态系列。
        en: Stably identifies one loop-state series.
        ja: 一 loop-state series を安定識別します。
      allowed_values: []
      pattern: null
      example_value: optimizer-state-run-42
      source_claims:
        - claim-improvement-state-001
    - id: revision_sequence
      labels:
        zh: 状态版本序号
        en: state revision sequence
        ja: state revision sequence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 单调标识循环状态更新顺序。
        en: Monotonically identifies loop-state update order.
        ja: loop-state update order を monotonically 識別します。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-improvement-state-001
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该状态版本生效的 UTC 时间。
        en: Records the UTC time this state revision became effective.
        ja: state revision が effective となった UTC time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:00Z
      source_claims:
        - claim-improvement-state-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementState-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 第三版优化器状态
      en: Optimizer state revision three
      ja: optimizer state revision three
    scenario_id: null
    descriptions:
      zh: optimizer-state-run-42#3 记录当前 revision-attempt-1、剩余一次预算和 quality=0.84。
      en: optimizer-state-run-42#3 records current revision-attempt-1, one remaining attempt, and quality 0.84.
      ja: state revision three は current attempt・remaining budget・quality 0.84 を記録します。
    field_values:
      improvement_state_id: optimizer-state-run-42
      revision_sequence: 3
      observed_at: 2026-07-16T10:04:00Z
    related_node_ids:
      - ImprovementState
      - OptimizerState
    related_relation_ids: []
    expected_result:
      zh: 返回指定时间点的状态版本，不覆盖前一版本。
      en: Return the state revision for that time without overwriting the prior revision.
      ja: specified time の state revision を返し prior revision を overwrite しません。
    why_valid_or_invalid:
      zh: 状态系列、单调序号和时间共同确定快照身份。
      en: State series, monotonic sequence, and time jointly determine snapshot identity.
      ja: state series・sequence・time が snapshot identity を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-state-001
      - claim-improvement-state-002
  - id: ImprovementState-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 更新状态的修订尝试
      en: Revision attempt updating state
      ja: state-updating revision attempt
    scenario_id: improvement-review-improvementstate-boundary
    descriptions:
      zh: revision-attempt-1 在 10:03 运行并写入状态版本 3；它具有活动状态而非快照序号身份。
      en: revision-attempt-1 runs at 10:03 and writes state revision three; it has activity status rather than snapshot-sequence identity.
      ja: revision-attempt-1 は state revision を write する activity で snapshot identity ではありません。
    field_values: {}
    related_node_ids:
      - ImprovementAttempt
      - ImprovementState
    related_relation_ids: []
    expected_result:
      zh: 分类为 RevisionAttempt，并通过 updates 关系连接状态。
      en: Classify it as RevisionAttempt and connect it to state through updates.
      ja: RevisionAttempt とし updates relation で state に接続します。
    why_valid_or_invalid:
      zh: 状态更新者与更新后状态版本不是同一对象。
      en: The state updater and resulting state revision are different objects.
      ja: state updater と resulting state revision は different objects です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-state-001
      - claim-improvement-state-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
