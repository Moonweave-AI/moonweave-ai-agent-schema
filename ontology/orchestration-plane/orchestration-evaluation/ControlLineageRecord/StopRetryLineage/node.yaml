source_claims:
  - id: claim-stop-retry-lineage-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official evaluator-optimizer pattern separates a generator occurrence from an evaluator occurrence, routes rejected output back with feedback, and stops when explicit success criteria accept the output. Moonweave uses that operational distinction for improvement loops, attempts, state, and stop control without modeling LangGraph itself as a graph node.
    locator: "Workflows and agents > Evaluator-optimizer: generator, evaluator, structured feedback, conditional routing, accepted end, and rejected regeneration"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API treats state snapshots, executable nodes, and fixed or conditional edges as separate workflow elements. Moonweave uses this evidence to distinguish ImprovementState from ImprovementActivity and to keep containment, dispatch, updates, and termination as cross-facts rather than type parents.
    locator: Graph API overview > Graphs, State, Nodes, Edges, conditional edges, and state updates
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes time-bounded Activities from Entities and Plans and supports usage, generation, association, and derivation. Moonweave uses those distinctions for improvement activities, control specifications, role responsibility, mutable state snapshots, and immutable control-lineage records.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Activity, Entity, Plan, Agent, usage, generation, association, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-004
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional routing evaluates current graph state to select a next destination or END. Moonweave records the exact state evidence used by the evaluated stop condition.
    locator: "Graph API overview > Conditional edges: routing function reads current state"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-005
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional edges use the routing function's evaluated return value to select a destination. Moonweave preserves the condition verdict independently from the chosen action.
    locator: Graph API overview > Conditional edges and routing-function return values
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-006
    source: eng-fw-langgraph-workflows-agents
    supports: The evaluator-optimizer workflow routes rejected output with feedback back to another generation attempt. Moonweave records that concrete lineage action as retry.
    locator: "Workflows and agents > Evaluator-optimizer: Rejected + Feedback path"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-007
    source: eng-fw-langgraph-workflows-agents
    supports: The evaluator-optimizer workflow routes an accepted candidate to END. Moonweave records that concrete lineage action as stop.
    locator: "Workflows and agents > Evaluator-optimizer: Accepted path to END"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-008
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's evaluator-optimizer pattern distinguishes iterative rejection from terminal acceptance. Moonweave persists the occurrence-level branch as an explicit controlled action.
    locator: Workflows and agents > Evaluator-optimizer conditional routing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-009
    source: eng-fw-langgraph-graph-api
    supports: A LangGraph conditional edge selects a concrete next destination or END. Moonweave binds a retry decision to the concrete successor attempt created at that destination.
    locator: Graph API overview > Conditional edges
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-010
    source: eng-fw-langgraph-graph-api
    supports: LangGraph edges determine how a graph stops. Moonweave references the concrete loop-termination fact rather than using the reusable condition itself as an occurrence.
    locator: Graph API overview > Edges define routing and how the graph decides to stop
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-stop-retry-lineage-011
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional routing selects a next destination or END for a branch outcome. Moonweave encodes the corresponding retry-versus-stop result as an exclusive lineage invariant.
    locator: Graph API overview > Conditional edges and END
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
