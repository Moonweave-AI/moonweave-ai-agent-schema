schema: moonweave.ai/ontology-node/v1
id: StopRetryLineage
kind: concept
labels:
  zh: 停止—重试谱系
  en: stop-retry lineage
  ja: 停止—再試行系譜
semantics:
  short_definition:
    zh: 把一个来源尝试与导致继续、重试或停止的明确 StopCondition 共同记录的控制谱系记录。
    en: A control-lineage record jointly recording a source attempt and the explicit StopCondition that caused continue, retry, or stop.
    ja: source attempt と continue/retry/stop を生じた explicit StopCondition を共同記録する control-lineage record です。
  definition:
    zh: 停止—重试谱系是 ControlLineageRecord 的子类，以 lineage_record_id、source_attempt_ref 和 stop_condition_ref 为身份；它通过 StopRetryLineage-records_source_attempt-ImprovementAttempt 明确记录来源尝试，通过 StopRetryLineage-records_stop_condition-StopCondition 明确记录实际求值的停止条件，并保存选定动作以及后继尝试或循环终止结果，使“从哪次尝试为何重试或停止”可查询。它不是 RevisionArtifact，也不会用一条含混边压缩整条控制链。
    en: StopRetryLineage is a ControlLineageRecord identified by lineage-record ID, source-attempt reference, and stop-condition reference. StopRetryLineage-records_source_attempt-ImprovementAttempt explicitly records the source attempt, and StopRetryLineage-records_stop_condition-StopCondition explicitly records the evaluated stop condition; the record also preserves the selected action and successor-attempt or loop-termination outcome so that why a particular attempt retried or stopped is queryable. It is not a RevisionArtifact and does not compress the control chain into one ambiguous edge.
    ja: StopRetryLineage は lineage_record_id、source_attempt_ref、stop_condition_ref で識別する ControlLineageRecord である。StopRetryLineage-records_source_attempt-ImprovementAttempt が出所となる試行を明示し、StopRetryLineage-records_stop_condition-StopCondition が実際に評価した停止条件を明示する。さらに選択した action と後続試行または loop termination の結果を保持し、どの試行がなぜ再試行または停止したかを query 可能にする。RevisionArtifact ではなく、制御連鎖を一つの曖昧な edge に圧縮しない。
  why_needed:
    zh: 专门下位概念补齐重试和停止的共同证据结构，并把旧的无端点谓词拆成可核验的两条引用。
    en: This subtype completes the shared evidence structure for retry and stop and replaces old endpoint-poor predicates with two verifiable references.
    ja: retry/stop の shared evidence structure を完成し old endpoint-poor predicates を two verifiable references へ置換します。
  includes:
    - zh: 同时记录来源 ImprovementAttempt、被求值 StopCondition、求值结果、动作及后继或终止目标的谱系记录。
      en: Lineage records jointly storing source ImprovementAttempt, evaluated StopCondition, evaluation result, action, and successor or termination target.
      ja: source ImprovementAttempt・evaluated StopCondition・result・action・successor/termination target を共同保存する lineage record。
  excludes:
    - zh: 普通 ControlLineageRecord、RevisionArtifact、StopCondition 本身、循环当前状态和没有来源尝试的静态停止规则。
      en: Generic ControlLineageRecord, RevisionArtifact, StopCondition itself, current loop state, and static stop rules without a source attempt.
      ja: generic ControlLineageRecord・RevisionArtifact・StopCondition 自体・current loop state・source attempt なし static rule。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ImprovementLoop 终止/重试/继续的 evaluated StopCondition、observed_value 与 source_attempt 映射为 StopRetryLineage。
    en: ImprovementLoop stop/retry/continue with evaluated StopCondition, observed_value, and source_attempt map to StopRetryLineage.
    ja: ImprovementLoop stop/retry/continue の evaluated StopCondition/observed_value/source_attempt を StopRetryLineage へ写像します。
  typical_input:
    - description: Stop/retry lineage record.
      format: '{"lineage_id": "lineage-884", "stop_condition_ref": "quality-threshold@4", "observed_value": 0.93, "condition_result": true}'
      source_claims:
        - claim-stop-retry-lineage-design
  typical_output:
    - description: Moonweave StopRetryLineage.
      format: '{"lineage_id": "lineage-884", "termination_action": "stop-success"}'
      source_claims:
        - claim-stop-retry-lineage-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - lineage_record_id
  fields:
    - id: source_attempt_ref
      labels:
        zh: 来源尝试引用
        en: source-attempt reference
        ja: source attempt ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用触发该控制判定的 ImprovementAttempt。
        en: References the ImprovementAttempt that triggered this control decision.
        ja: control decision を trigger した ImprovementAttempt を参照します。
      allowed_values: []
      pattern: null
      example_value: eval-attempt-42-2
      source_claims:
        - claim-stop-retry-lineage-design
        - claim-stop-retry-lineage-design
    - id: stop_condition_ref
      labels:
        zh: 停止条件引用
        en: stop-condition reference
        ja: stop condition ref
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被实际求值并决定重试或停止的 StopCondition。
        en: References the StopCondition actually evaluated to decide retry or stop.
        ja: retry/stop を決めるため実際に evaluated された StopCondition を参照します。
      allowed_values: []
      pattern: null
      example_value: quality-threshold@4
      source_claims:
        - claim-stop-retry-lineage-design
        - claim-stop-retry-lineage-design
    - id: observed_evidence
      labels:
        zh: 条件求值观测证据
        en: condition-evaluation evidence
        ja: condition evaluation evidence
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 stop_condition_ref 在 source_attempt_ref 之后实际读取的最小观测键值，例如 quality_score=0.92；它必须足以复核判定，但不复制完整 EvaluationRun 输出。
        en: Preserves the minimal observed key-value evidence actually read by stop_condition_ref after source_attempt_ref, such as quality_score=0.92. It must support replay of the decision without copying the full EvaluationRun output.
        ja: source_attempt_ref 後に stop_condition_ref が実際に読んだ最小 observed key-value evidence、たとえば quality_score=0.92 を保持します。decision を再検証できる必要がありますが full EvaluationRun output は複製しません。
      allowed_values: []
      pattern: null
      example_value:
        quality_score: 0.92
      source_claims:
        - claim-stop-retry-lineage-design
    - id: condition_result
      labels:
        zh: 停止条件求值结果
        en: stop-condition evaluation result
        ja: stop condition evaluation result
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 stop_condition_ref 对 observed_evidence 的实际布尔求值结果；不得从 selected_action 反向臆测该结果。
        en: Records the actual Boolean result of evaluating stop_condition_ref against observed_evidence. It must not be guessed backward from selected_action.
        ja: stop_condition_ref を observed_evidence に対して評価した実際の Boolean result を記録します。selected_action から逆推測してはなりません。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-stop-retry-lineage-design
    - id: selected_action
      labels:
        zh: 停止—重试决定
        en: stop-or-retry decision
        ja: stop-or-retry decision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次条件求值后选定的互斥控制动作：创建一个明确后继尝试，或结束当前循环。它描述已经发生的决定，不是 StopCondition 规则文本。
        en: "Records the mutually exclusive control action selected after this condition evaluation: create a named successor attempt or terminate the current loop. It describes the executed decision, not the StopCondition rule text."
        ja: この condition evaluation 後に選択された排他的 control action、すなわち明示された successor attempt を作るか current loop を終了するかを記録します。StopCondition rule text ではなく実行済み decision です。
      allowed_values:
        - id: StopRetryActionRetry
          value: retry
          labels:
            zh: 创建后继尝试
            en: retry
            ja: retry
          definitions:
            zh: 条件求值未要求结束循环，控制链创建并引用一个新的后继 ImprovementAttempt。
            en: The condition evaluation does not require loop termination, so the control chain creates and references a new successor ImprovementAttempt.
            ja: condition evaluation が loop termination を要求せず、control chain が新しい successor ImprovementAttempt を作成し参照します。
          source_claims:
            - claim-stop-retry-lineage-design
        - id: StopRetryActionStop
          value: stop
          labels:
            zh: 结束循环
            en: stop
            ja: stop
          definitions:
            zh: 条件求值满足终止依据，控制链记录循环终止事实且不创建后继尝试。
            en: The condition evaluation satisfies the termination basis, so the control chain records loop termination and creates no successor attempt.
            ja: condition evaluation が termination basis を満たし、control chain が loop termination を記録して successor attempt を作成しません。
          source_claims:
            - claim-stop-retry-lineage-design
      pattern: null
      example_value: stop
      source_claims:
        - claim-stop-retry-lineage-design
    - id: successor_attempt_ref
      labels:
        zh: 后继尝试引用
        en: successor-attempt reference
        ja: successor attempt 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=retry 时引用由该决定创建的唯一后继 ImprovementAttempt；selected_action=stop 时必须为空或显式为 null。
        en: When selected_action is retry, references the single successor ImprovementAttempt created by the decision. It must be absent or explicitly null when selected_action is stop.
        ja: selected_action=retry の場合、decision が作成した唯一の successor ImprovementAttempt を参照します。selected_action=stop では空または明示的 null でなければなりません。
      allowed_values: []
      pattern: null
      example_value: revision-attempt-42-3
      source_claims:
        - claim-stop-retry-lineage-design
    - id: loop_termination_ref
      labels:
        zh: 循环终止事实引用
        en: loop-termination fact reference
        ja: loop termination fact 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: selected_action=stop 时引用由本次条件求值形成的循环终止事实，并保留循环身份与条件版本；selected_action=retry 时必须为空或显式为 null。
        en: When selected_action is stop, references the loop-termination fact established by this condition evaluation while preserving loop identity and condition revision. It must be absent or explicitly null for retry.
        ja: selected_action=stop の場合、この condition evaluation が成立させた loop-termination fact を参照し loop identity と condition revision を保持します。retry では空または明示的 null でなければなりません。
      allowed_values: []
      pattern: null
      example_value: loop-42#completed:quality-threshold@4
      source_claims:
        - claim-stop-retry-lineage-design
  constraints:
    - id: stop-retry-lineage-has-exclusive-outcome
      severity: error
      expression_language: plain
      expression: selected_action = retry IFF (successor_attempt_ref IS NON-NULL AND (loop_termination_ref IS ABSENT OR NULL)); selected_action = stop IFF ((successor_attempt_ref IS ABSENT OR NULL) AND loop_termination_ref IS NON-NULL)
      explanations:
        zh: 每条谱系记录必须在后继尝试与循环终止之间二选一，不能同时连接两个结果，也不能两者皆空。
        en: Each lineage record chooses exactly one of successor attempt and loop termination; it cannot point to both outcomes or to neither.
        ja: 各 lineage record は successor attempt と loop termination のちょうど一方を選び、両方またはどちらもない状態を許しません。
      source_claims:
        - claim-stop-retry-lineage-design
  required_relation_constraints: []
examples:
  - id: StopRetryLineage-success-stop
    labels:
      zh: 成功停止谱系
      en: Success stop lineage
      ja: success 停止 lineage
    descriptions:
      zh: lineage-884 绑定 evaluation-42-3 与 quality-threshold@4 求值 true。
      en: lineage-884 binds evaluation-42-3 and quality-threshold@4 evaluation true.
      ja: lineage-884 が evaluation-42-3 と quality-threshold@4 評価 true を束縛。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: evaluator-optimizer stop
    field_values:
      lineage_id: lineage-884
      termination_action: stop-success
    related_node_ids:
      - StopRetryLineage
      - ControlLineageRecord
      - ImprovementLoop
    related_relation_ids:
      - StopRetryLineage-records_stop_condition-StopCondition
      - StopRetryLineage-records_source_attempt-ImprovementAttempt
    source_claims:
      - claim-stop-retry-lineage-langgraph
      - claim-stop-retry-lineage-design
  - id: StopRetryLineage-retry
    labels:
      zh: 重试谱系
      en: Retry lineage
      ja: retry lineage
    descriptions:
      zh: lineage-886 记录 attempt_counter 未达 max_retries 触发 retry-continue。
      en: lineage-886 records attempt_counter below max_retries triggering retry-continue.
      ja: lineage-886 が attempt_counter max_retries 未満で retry-continue を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: retry with state
    field_values: {}
    related_node_ids:
      - StopRetryLineage
      - ImprovementAttempt
    related_relation_ids: []
    source_claims:
      - claim-stop-retry-lineage-langgraph
      - claim-stop-retry-lineage-design
  - id: StopRetryLineage-boundary-false-timeout
    labels:
      zh: 未触发 timeout 不是原因
      en: Untriggered timeout is not cause
      ja: 未発火 timeout は原因ではない
    descriptions:
      zh: timeout@1 result=false 时不得作为 report-quality-loop-43 终止原因返回。
      en: When timeout@1 result=false it must not be returned as termination cause for report-quality-loop-43.
      ja: timeout@1 result=false のとき report-quality-loop-43 終了原因として返してはならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: evaluated condition required
    field_values: {}
    related_node_ids:
      - StopRetryLineage
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-stop-retry-lineage-design
parent_relation:
  id: StopRetryLineage-is_a-ControlLineageRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: StopRetryLineage 是一种 ControlLineageRecord；其必要种差是同时记录来源尝试、实际求值的 StopCondition 及重试或停止结果。
    en: StopRetryLineage is a ControlLineageRecord whose necessary differentia is jointly recording the source attempt, evaluated StopCondition, and retry-or-stop outcome.
    ja: StopRetryLineage は ControlLineageRecord の一種で、必要種差は source attempt・evaluated StopCondition・retry/stop outcome を共同記録すること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: StopRetryLineage-is_a-ControlLineageRecord-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ControlLineageRecord AND instance.source_attempt_ref IS SET AND instance.stop_condition_ref IS VERSIONED AND outcome IN {retry, stop}
      explanations:
        zh: 仅当对象既满足 ControlLineageRecord 的完整定义，又满足“同时记录来源尝试、实际求值的 StopCondition 及重试或停止结果”时断言。
        en: Assert only when the object satisfies the complete ControlLineageRecord definition and jointly recording the source attempt, evaluated StopCondition, and retry-or-stop outcome.
        ja: object が ControlLineageRecord の complete definition と「source attempt・evaluated StopCondition・retry/stop outcome を共同記録すること」を満たす時のみ assert します。
      source_claims:
        - claim-stop-retry-lineage-design
        - claim-stop-retry-lineage-design
        - claim-stop-retry-lineage-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-stop-retry-lineage-design
    - claim-stop-retry-lineage-design
    - claim-stop-retry-lineage-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: StopRetryLineage-records_source_attempt-ImprovementAttempt
    predicate: records_source_attempt
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录来源尝试
      en: records source attempt
      ja: 由来試行を記録
    definitions:
      zh: StopRetryLineage records_source_attempt ImprovementAttempt 表示不可变谱系记录明确锚定触发重试或停止判定的那一次尝试，而不是仅指向整个循环或候选产物。
      en: StopRetryLineage records_source_attempt ImprovementAttempt means the immutable lineage record anchors the exact attempt that triggered retry or stop rather than pointing only to the loop or candidate artifact.
      ja: StopRetryLineage records_source_attempt ImprovementAttempt は immutable lineage が retry/stop を trigger した exact attempt を anchor し loop/artifact のみを指さないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_records_source_attempt
      labels:
        zh: 反向 记录来源尝试
        en: inverse records source attempt
        ja: 逆 由来試行を記録
    conditions:
      - id: StopRetryLineage-records_source_attempt-ImprovementAttempt-assertion-condition
        severity: error
        expression_language: plain
        expression: lineage.source_attempt_ref = attempt.improvement_attempt_id AND attempt.containing_loop_ref = lineage.loop_ref AND attempt.ended_at <= lineage.recorded_at
        explanations:
          zh: 仅当谱系记录保存 canonical attempt_id，且该尝试属于同一循环并早于控制决定时成立。
          en: Assert only when the lineage record stores the canonical attempt ID and that attempt belongs to the same loop and precedes the control decision.
          ja: lineage record が canonical attempt ID を保存し attempt が same loop かつ decision 前の時のみ assert します。
        source_claims:
          - claim-stop-retry-lineage-design
          - claim-stop-retry-lineage-design
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-stop-retry-lineage-design
      - claim-stop-retry-lineage-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ImprovementAttempt
  - id: StopRetryLineage-records_stop_condition-StopCondition
    predicate: records_stop_condition
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录停止条件
      en: records stop condition
      ja: 停止条件を記録
    definitions:
      zh: StopRetryLineage records_stop_condition StopCondition 表示谱系记录锚定实际参与判定的条件版本，并保存观测值与真假结果，使规则定义和一次求值历史保持分离。
      en: StopRetryLineage records_stop_condition StopCondition means the lineage record anchors the exact condition revision used in the decision and stores observed value plus truth result, separating rule definition from evaluation history.
      ja: StopRetryLineage records_stop_condition StopCondition は decision で used condition revision と observed value/truth result を anchor し rule definition と evaluation history を分離します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_records_stop_condition
      labels:
        zh: 反向 记录停止条件
        en: inverse records stop condition
        ja: 逆 停止条件を記録
    conditions:
      - id: StopRetryLineage-records_stop_condition-StopCondition-assertion-condition
        severity: error
        expression_language: plain
        expression: lineage.stop_condition_ref = condition.canonical_id@condition.revision AND lineage.observed_value IS RECORDED AND lineage.condition_result IN {true, false}
        explanations:
          zh: 仅当谱系记录包含 canonical condition ID、revision、观测值和求值结果时成立。
          en: Assert only when the lineage record includes canonical condition ID, revision, observed value, and evaluation result.
          ja: lineage record が canonical condition ID・revision・observed value・evaluation result を含む時のみ assert します。
        source_claims:
          - claim-stop-retry-lineage-design
          - claim-stop-retry-lineage-design
          - claim-stop-retry-lineage-design
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-stop-retry-lineage-design
      - claim-stop-retry-lineage-design
      - claim-stop-retry-lineage-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StopCondition
