schema: moonweave.ai/ontology-node/v1
id: ControlLineageRecord
kind: concept
status: review
labels:
  zh: 控制谱系记录
  en: control-lineage record
  ja: 制御系譜記録
semantics:
  short_definition:
    zh: 不可变记录一次改进控制决定的来源尝试、所用条件、所选动作和证据锚点的信息对象。
    en: An immutable information object recording a control decision's source attempt, applied condition, selected action, and evidence anchors.
    ja: control decision の source attempt・applied condition・selected action・evidence anchors を記録する immutable information object です。
  definition:
    zh: 控制谱系记录是本域的独立信息根，以 lineage_record_id 与 recorded_at 为身份；它保存从来源尝试、评价证据和 StopCondition 到继续、重试、升级或停止决定的可追溯链。它不是运行活动、状态快照、修订产物或把整条链压成一个关系标签。
    en: ControlLineageRecord is an independent information root identified by lineage-record ID and recorded time. It preserves the trace from source attempt, evaluation evidence, and StopCondition to a continue, retry, escalate, or stop decision. It is not a runtime activity, state snapshot, revision artifact, or a relation label collapsing the whole chain.
    ja: ControlLineageRecord は lineage record ID/recorded time で識別する independent information root です。source attempt・evidence・StopCondition から decision までを保存し activity/state/artifact/overloaded relation label ではありません。
  why_needed:
    zh: 谱系记录允许审计每次控制转移的依据，又不把“重试”“终止”等事件关系误当成类型父子或活动实体。
    en: The lineage record makes each control transition auditable without turning retry or termination relations into type parents or activity entities.
    ja: control transition basis を audit 可能にし retry/termination relation を type parent/activity entity に誤変換しません。
  includes:
    - zh: 具唯一记录标识、来源尝试、条件引用、决定、证据锚点和记录时间的不可变控制记录。
      en: Immutable control records with unique ID, source attempt, condition reference, decision, evidence anchors, and recorded time.
      ja: unique ID・source attempt・condition ref・decision・evidence anchors・recorded time を持つ immutable control record。
  excludes:
    - zh: ImprovementAttempt 活动、OptimizerState 快照、StopCondition 规范、ReviewEvidenceArtifact 和通用 Trace。
      en: ImprovementAttempt activities, OptimizerState snapshots, StopCondition specifications, ReviewEvidenceArtifact, and generic Trace.
      ja: ImprovementAttempt activity・OptimizerState snapshot・StopCondition spec・ReviewEvidenceArtifact・generic Trace。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - lineage_record_id
  fields:
    - id: lineage_record_id
      labels:
        zh: 谱系记录标识
        en: lineage-record ID
        ja: lineage record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条不可变控制谱系记录。
        en: Stably identifies one immutable control-lineage record.
        ja: one immutable control-lineage record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: control-lineage-42-3
      source_claims:
        - claim-control-lineage-record-001
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded time
        ja: recorded time
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录控制决定进入审计谱系的时间。
        en: Records when the control decision entered the audit lineage.
        ja: control decision が audit lineage に入った time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:05Z
      source_claims:
        - claim-control-lineage-record-001
  constraints: []
  required_relation_constraints: []
