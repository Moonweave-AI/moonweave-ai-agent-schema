schema: moonweave.ai/ontology-node/v1
id: ControlLineageRecord
kind: concept
labels:
  zh: 控制谱系记录
  en: control-lineage record
  ja: 制御系譜記録
semantics:
  short_definition:
    zh: 不可变记录一次改进控制决定的来源尝试、所用条件、所选动作和证据锚点的信息对象。
    en: An immutable information object recording a control decision's source attempt, applied condition, selected action, and evidence anchors.
    ja: control decision の source attempt・applied condition・selected action・evidence anchors を記録する immutable information object です。
  definition:
    zh: 控制谱系记录是本域的独立信息根，以 lineage_record_id 与 recorded_at 为身份；它保存从来源尝试、评价证据和 StopCondition 到继续、重试、升级或停止决定的可追溯链。它不是运行活动、状态快照、修订产物或把整条链压成一个关系标签。
    en: ControlLineageRecord is an independent information root identified by lineage-record ID and recorded time. It preserves the trace from source attempt, evaluation evidence, and StopCondition to a continue, retry, escalate, or stop decision. It is not a runtime activity, state snapshot, revision artifact, or a relation label collapsing the whole chain.
    ja: ControlLineageRecord は lineage record ID/recorded time で識別する independent information root です。source attempt・evidence・StopCondition から decision までを保存し activity/state/artifact/overloaded relation label ではありません。
  why_needed:
    zh: 谱系记录允许审计每次控制转移的依据，又不把“重试”“终止”等事件关系误当成类型父子或活动实体。
    en: The lineage record makes each control transition auditable without turning retry or termination relations into type parents or activity entities.
    ja: control transition basis を audit 可能にし retry/termination relation を type parent/activity entity に誤変換しません。
  includes:
    - zh: 具唯一记录标识、来源尝试、条件引用、决定、证据锚点和记录时间的不可变控制记录。
      en: Immutable control records with unique ID, source attempt, condition reference, decision, evidence anchors, and recorded time.
      ja: unique ID・source attempt・condition ref・decision・evidence anchors・recorded time を持つ immutable control record。
  excludes:
    - zh: ImprovementAttempt 活动、OptimizerState 快照、StopCondition 规范、ReviewEvidenceArtifact 和通用 Trace。
      en: ImprovementAttempt activities, OptimizerState snapshots, StopCondition specifications, ReviewEvidenceArtifact, and generic Trace.
      ja: ImprovementAttempt activity・OptimizerState snapshot・StopCondition spec・ReviewEvidenceArtifact・generic Trace。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys:
    - lineage_record_id
  fields:
    - id: lineage_record_id
      labels:
        zh: 谱系记录标识
        en: lineage-record ID
        ja: lineage record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条不可变控制谱系记录。
        en: Stably identifies one immutable control-lineage record.
        ja: one immutable control-lineage record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: control-lineage-42-3
      source_claims:
        - claim-control-lineage-record-001
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded time
        ja: recorded time
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录控制决定进入审计谱系的时间。
        en: Records when the control decision entered the audit lineage.
        ja: control decision が audit lineage に入った time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:05Z
      source_claims:
        - claim-control-lineage-record-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlLineageRecord-example-positive-manual-20260716
    labels:
      zh: ControlLineageRecord positive
      en: ControlLineageRecord positive
      ja: ControlLineageRecord positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ControlLineageRecord 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ControlLineageRecord: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ControlLineageRecord: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {lineage_record_id: control-lineage-42-3, recorded_at: 2026-07-16T10:04:05Z}

    related_node_ids:
      - ControlLineageRecord
      - StopRetryLineage
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-001
      - claim-control-lineage-record-002

  - id: ControlLineageRecord-example-boundary-manual-20260716
    labels:
      zh: ControlLineageRecord boundary
      en: ControlLineageRecord boundary
      ja: ControlLineageRecord boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 ControlLineageRecord WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not ControlLineageRecord WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で ControlLineageRecord WorkflowStep spec ではない。
    field_values: {}

    related_node_ids:
      - ControlLineageRecord
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-001
      - claim-control-lineage-record-002

  - id: ControlLineageRecord-example-counterexample-confusable
    labels:
      zh: ControlLineageRecord counterexample
      en: ControlLineageRecord counterexample
      ja: ControlLineageRecord counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 ControlLineageRecord PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style ControlLineageRecord PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 ControlLineageRecord ではない。
    field_values: {lineage_record_id: absent, recorded_at: absent, remaining_attempts: 1}

    related_node_ids:
      - ControlLineageRecord
      - OptimizerState
      - StopRetryLineage
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-001

  - id: ControlLineageRecord-example-instance-concrete
    labels:
      zh: ControlLineageRecord instance
      en: ControlLineageRecord instance
      ja: ControlLineageRecord instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ControlLineageRecord。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ControlLineageRecord.
      ja: Reflexion 实例 failed→reflect→retry が ControlLineageRecord に写像。
    field_values: {lineage_record_id: control-lineage-42-3, recorded_at: 2026-07-16T10:04:05Z}

    related_node_ids:
      - ControlLineageRecord
      - StopRetryLineage
      - OptimizerState
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-001

