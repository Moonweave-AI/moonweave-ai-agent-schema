    why_valid_or_invalid:
      zh: 可演进当前状态与不可变历史证据记录具有不同生命周期。
      en: Evolving current state and immutable historical evidence have different lifecycles.
      ja: evolving current state と immutable historical evidence は lifecycle が異なります。
    synthetic: true
