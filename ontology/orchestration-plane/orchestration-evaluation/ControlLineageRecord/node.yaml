  - id: ControlLineageRecord-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 第三轮控制决定记录
      en: Round-three control decision record
      ja: round-three control decision record
    scenario_id: null
    descriptions:
      zh: control-lineage-42-3 记录 eval-attempt-42-2、quality-threshold@4、quality=0.92 和 action=stop-success。
      en: control-lineage-42-3 records eval-attempt-42-2, quality-threshold@4, quality 0.92, and action=stop-success.
      ja: control-lineage-42-3 は source attempt・threshold・quality 0.92・stop-success を記録します。
    field_values:
