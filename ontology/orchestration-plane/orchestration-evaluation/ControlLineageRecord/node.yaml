schema: moonweave.ai/ontology-node/v1
id: ControlLineageRecord
kind: concept
labels:
  zh: 控制谱系记录
  en: control-lineage record
  ja: 制御系譜記録
semantics:
  short_definition:
    zh: 不可变记录一次改进控制决定的来源尝试、所用条件、所选动作和证据锚点的信息对象。
    en: An immutable information object recording a control decision's source attempt, applied condition, selected action, and evidence anchors.
    ja: control decision の source attempt・applied condition・selected action・evidence anchors を記録する immutable information object です。
  definition:
    zh: 控制谱系记录是本域的独立信息根，以 lineage_record_id 与 recorded_at 为身份；它保存从来源尝试、评价证据和 StopCondition 到继续、重试、升级或停止决定的可追溯链。它不是运行活动、状态快照、修订产物或把整条链压成一个关系标签。
    en: ControlLineageRecord is an independent information root identified by lineage-record ID and recorded time. It preserves the trace from source attempt, evaluation evidence, and StopCondition to a continue, retry, escalate, or stop decision. It is not a runtime activity, state snapshot, revision artifact, or a relation label collapsing the whole chain.
    ja: ControlLineageRecord は lineage record ID/recorded time で識別する independent information root です。source attempt・evidence・StopCondition から decision までを保存し activity/state/artifact/overloaded relation label ではありません。
  why_needed:
    zh: 谱系记录允许审计每次控制转移的依据，又不把“重试”“终止”等事件关系误当成类型父子或活动实体。
    en: The lineage record makes each control transition auditable without turning retry or termination relations into type parents or activity entities.
    ja: control transition basis を audit 可能にし retry/termination relation を type parent/activity entity に誤変換しません。
  includes:
    - zh: 具唯一记录标识、来源尝试、条件引用、决定、证据锚点和记录时间的不可变控制记录。
      en: Immutable control records with unique ID, source attempt, condition reference, decision, evidence anchors, and recorded time.
      ja: unique ID・source attempt・condition ref・decision・evidence anchors・recorded time を持つ immutable control record。
  excludes:
    - zh: ImprovementAttempt 活动、OptimizerState 快照、StopCondition 规范、ReviewEvidenceArtifact 和通用 Trace。
      en: ImprovementAttempt activities, OptimizerState snapshots, StopCondition specifications, ReviewEvidenceArtifact, and generic Trace.
      ja: ImprovementAttempt activity・OptimizerState snapshot・StopCondition spec・ReviewEvidenceArtifact・generic Trace。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 从 feedback、StopCondition 求值到 stop/retry/continue 决定的不可变证据链映射为 ControlLineageRecord；配置可用不等于实际终止原因。
    en: Immutable evidence chains from feedback and StopCondition evaluation to stop/retry/continue decisions map to ControlLineageRecord; configuration availability is not termination cause.
    ja: feedback・StopCondition 評価から stop/retry/continue 決定への immutable 証拠鎖を ControlLineageRecord へ写像し設定可用≠終了原因です。
  typical_input:
    - description: Control decision lineage.
      format: '{"lineage_id": "lineage-884", "decision": "stop-success", "evaluated_condition_ref": "quality-threshold@4"}'
      source_claims:
        - claim-control-lineage-record-design
  typical_output:
    - description: Moonweave ControlLineageRecord.
      format: '{"lineage_id": "lineage-884", "termination_action": "stop-success"}'
      source_claims:
        - claim-control-lineage-record-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - lineage_record_id
  fields:
    - id: lineage_record_id
      labels:
        zh: 谱系记录标识
        en: lineage-record ID
        ja: lineage record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条不可变控制谱系记录。
        en: Stably identifies one immutable control-lineage record.
        ja: one immutable control-lineage record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: control-lineage-42-3
      source_claims:
        - claim-control-lineage-record-design
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded time
        ja: recorded time
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录控制决定进入审计谱系的时间。
        en: Records when the control decision entered the audit lineage.
        ja: control decision が audit lineage に入った time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:04:05Z
      source_claims:
        - claim-control-lineage-record-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlLineageRecord-threshold-stop
    labels:
      zh: 阈值停止谱系
      en: Threshold stop lineage
      ja: threshold 停止 lineage
    descriptions:
      zh: lineage-884 记录 quality-threshold@4 求值 0.93≥0.90 导致 stop-success。
      en: lineage-884 records quality-threshold@4 evaluating 0.93≥0.90 causing stop-success.
      ja: lineage-884 が quality-threshold@4 評価 0.93≥0.90 で stop-success を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: success criteria stop
    field_values:
      lineage_id: lineage-884
    related_node_ids:
      - ControlLineageRecord
      - StopRetryLineage
      - ImprovementLoop
    related_relation_ids:
      - ControlLineageRecord-records-StopRetryLineage
    source_claims:
      - claim-control-lineage-record-langgraph
      - claim-control-lineage-record-design
  - id: ControlLineageRecord-interrupt-approve
    labels:
      zh: interrupt 批准谱系
      en: Interrupt approve lineage
      ja: interrupt approve lineage
    descriptions:
      zh: approve 后 lineage-885 记录 continue→stop-success。
      en: After approve lineage-885 records continue→stop-success.
      ja: approve 後 lineage-885 が continue→stop-success を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: interrupt/resume
    field_values: {}
    related_node_ids:
      - ControlLineageRecord
      - ImprovementLoop
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-langgraph
      - claim-control-lineage-record-design
  - id: ControlLineageRecord-boundary-config
    labels:
      zh: 未求值配置不是谱系
      en: Unevaluated config is not lineage
      ja: 未評価設定は lineage ではない
    descriptions:
      zh: timeout@1 可访问但 result=false 且未作为 terminates_on 原因，不得写入谱系。
      en: timeout@1 accessible but result=false and not terminates_on cause must not enter lineage.
      ja: timeout@1 は参照可能だが result=false で terminates_on 原因にならず lineage に書き込まない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: termination evidence
    field_values: {}
    related_node_ids:
      - ControlLineageRecord
      - StopRetryLineage
    related_relation_ids: []
    source_claims:
      - claim-control-lineage-record-design
parent_relation: null
relations: []
