schema: moonweave.ai/ontology-node/v1
id: ReviewAssignment
kind: concept
labels:
  zh: 评审任务规范
  en: review assignment
  ja: レビュー割当仕様
semantics:
  short_definition:
    zh: 规定评审对象、责任角色、资格、范围、时限和完成判据的可版本化改进控制规范。
    en: A versioned improvement-control specification prescribing review target, responsible role, eligibility, scope, deadline, and completion criteria.
    ja: review target・responsible role・eligibility・scope・deadline・completion criteria を定める versioned control specification です。
  definition:
    zh: 评审任务是 ImprovementControlSpecification 的子类，以 assignment_id 与 revision 为身份；它在任何具体评审发生前规定对象范围、所需 EvaluatorOptimizer 角色、资格、交付物和完成判据，并可治理多次 ReviewActivity。它不是一次分派活动、评审者本人或已经发生的评审运行。
    en: ReviewAssignment is an ImprovementControlSpecification identified by assignment ID and revision. Before any review occurs it prescribes target scope, required EvaluatorOptimizer role, eligibility, deliverables, and completion criteria and may govern multiple ReviewActivities. It is not a dispatch occurrence, the reviewer, or an executed review run.
    ja: ReviewAssignment は assignment ID/revision で識別する ImprovementControlSpecification です。review 前に scope・required role・eligibility・deliverables・completion criteria を定め multiple ReviewActivity を govern します。
  why_needed:
    zh: 把规范从执行和承担者分开，可同时回答“应当如何评审”“谁被分派”“实际做了什么”，而不让规则、角色和活动混成同级节点。
    en: Separating specification from execution and bearer lets the graph answer how review should happen, who was assigned, and what actually occurred without mixing rule, role, and activity as peers.
    ja: specification・execution・bearer を分け how/whom/what occurred を答え rule・role・activity の peer 混在を防ぎます。
  includes:
    - zh: 具有稳定任务标识、版本、对象范围、资格要求、责任角色、截止时间和可验证完成条件的评审委托。
      en: Review mandates with stable ID, revision, target scope, eligibility requirements, responsible role, deadline, and verifiable completion conditions.
      ja: stable ID・revision・target scope・eligibility・responsible role・deadline・verifiable completion condition を持つ review mandate。
  excludes:
    - zh: ReviewCoordination 分派发生、ReviewActivity 执行、具体评审者、反馈发现和没有版本身份的临时消息。
      en: ReviewCoordination dispatch occurrences, ReviewActivity execution, concrete reviewers, feedback findings, and ad-hoc messages without version identity.
      ja: ReviewCoordination dispatch・ReviewActivity execution・concrete reviewer・feedback finding・version identity なし ad-hoc message。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      改进域节点把 OpenAI Agent Evals 的 trace、grader 与 eval run 流程投影为 PROV 风格活动、规范、
      状态与谱系记录。实现用 Responses API 或 Agents SDK 返回结构化评估结果，并在此记录 ImprovementActivity
      发生，不把 API wire object 重命名成本体类型。
    en: >-
      Improvement-domain nodes project OpenAI Agent Evals trace, grader, and eval-run flows into PROV-style
      activities, specifications, state, and lineage records. Implementations use the Responses API or Agents SDK
      for structured evaluation output and record ImprovementActivity occurrences here without renaming API wire
      objects as ontology types.
    ja: >-
      improvement domain ノードは OpenAI Agent Evals の trace/grader/eval run flow を PROV 風 activity/spec/state/
      lineage record に投影する。Responses API または Agents SDK の structured evaluation output を用い API wire object
      を ontology 型に改名しない。
  typical_input:
    - description:
        zh: OpenAI Agent Evals 对候选工件启动评估或改进循环的输入。
        en: OpenAI Agent Evals input starting evaluation or an improvement loop on a candidate artifact.
        ja: 候補 artifact に対する evaluation/improvement loop 開始入力。
      format: |-
        {"target_ref":"artifact-report@7","improvement_control_specification_ref":"review-assignment-security@3","dataset_item_ref":"eval-case-12"}
  typical_output:
    - description:
        zh: 带时间与状态字段的本地改进活动或控制记录。
        en: Local improvement activity or control record with time and status fields.
        ja: time/status field を持つ local improvement/control record。
      format: |-
        {"improvement_activity_id":"improvement-run-42","target_ref":"artifact-report@7","status":"completed","started_at":"2026-07-18T10:00:00Z","ended_at":"2026-07-18T10:06:00Z"}
  reference_implementations:
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents trace-based evaluation, graders, datasets, and eval runs.
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Documents structured model responses used by evaluator and optimizer agents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates activities, entities, agents, and lineage records.
  source_claims:
    - claim-improvement-activity-001
    - claim-improvement-activity-003
structure:
  identity_keys: []
  fields:
    - id: target_scope
      labels:
        zh: 评审对象范围
        en: review target scope
        ja: review 対象 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可核验选择条件规定本规范覆盖的对象集合；artifact_type 限定工件类别，field_class 限定需检查的字段类，不指代某次运行。
        en: "Prescribes the governed object set through verifiable selectors: artifact_type limits the artifact class and field_class limits fields to inspect. It does not identify a run."
        ja: 検証可能な selector で governed object set を定め、artifact_type と field_class を限定します。run は識別しません。
      allowed_values: []
      pattern: null
      example_value:
        artifact_type: security-report
        field_class: sensitive
      source_claims:
        - claim-review-assignment-003
    - id: required_role_ref
      labels:
        zh: 所需责任角色引用
        en: required responsibility-role reference
        ja: 必要 responsibility role 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用有权承担该规范的 ImprovementRole；它规定角色资格，不把具体 Agent 或一次角色承担关系写入可复用规范。
        en: References the ImprovementRole authorized to bear this specification without embedding a concrete Agent or occurrence-specific role bearing.
        ja: この specification を担う ImprovementRole を参照し concrete Agent や occurrence-specific role bearing を埋め込みません。
      allowed_values: []
      pattern: null
      example_value: ImprovementRole:safety-reviewer
      source_claims:
        - claim-review-assignment-004
    - id: eligibility_condition
      labels:
        zh: 承担资格条件
        en: bearer eligibility condition
        ja: bearer eligibility condition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定 ReviewCoordination 选择承担者时必须验证的现行授权条件，不以姓名、模型名或未版本化成员表替代。
        en: States the current-authority condition ReviewCoordination must verify when selecting a bearer; a name, model label, or unversioned roster is insufficient.
        ja: ReviewCoordination が bearer 選択時に検証する current-authority condition で、name、model label、unversioned roster では代用できません。
      allowed_values: []
      pattern: null
      example_value: bearer holds current safety-review authority
      source_claims:
        - claim-review-assignment-005
    - id: deliverable_contract_ref
      labels:
        zh: 评审交付契约引用
        en: review deliverable-contract reference
        ja: review deliverable contract 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用版本化交付契约，规定发现与通过判据的输出形状；它不是具体评审结果。
        en: References the versioned contract defining finding and pass-criteria output shapes; it is not a concrete review result.
        ja: finding と pass-criteria の output shape を定める versioned contract で、concrete review result ではありません。
      allowed_values: []
      pattern: null
      example_value: review-findings-and-pass-criteria@3
      source_claims:
        - claim-review-assignment-006
    - id: completion_criteria_ref
      labels:
        zh: 完成判据引用
        en: completion-criteria reference
        ja: completion criteria 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用可版本化判据，规定受治理 ReviewActivity 何时可以判为完成；它不等同于评价分数或运行状态。
        en: References versioned criteria defining when a governed ReviewActivity may be judged complete; it is not a score or runtime status.
        ja: governed ReviewActivity を complete と判定する versioned criteria で、score や runtime status ではありません。
      allowed_values: []
      pattern: null
      example_value: security-review-completion@3
      source_claims:
        - claim-review-assignment-007
    - id: completion_window
      labels:
        zh: 完成时限窗口
        en: completion window
        ja: completion window
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 ISO 8601 duration 表示从受治理 ReviewActivity 开始到应完成的相对时限；绝对开始与结束时间仍属于运行发生。
        en: Expresses the relative interval from governed ReviewActivity start to required completion as an ISO 8601 duration; absolute times remain on the occurrence.
        ja: governed ReviewActivity start から required completion までを ISO 8601 duration で表し absolute time は occurrence に保持します。
      allowed_values: []
      pattern: ^P(?!$).+$
      example_value: PT2H
      source_claims:
        - claim-review-assignment-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewAssignment-example-positive-manual-20260716
    labels:
      zh: ReviewAssignment positive
      en: ReviewAssignment positive
      ja: ReviewAssignment positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ReviewAssignment 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ReviewAssignment: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ReviewAssignment: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {improvement_control_specification_id: security-review, revision: 3}

    related_node_ids:
      - ReviewAssignment
      - EvaluatorOptimizer
      - ImprovementRole
      - ReviewActivity
    related_relation_ids:
      - ReviewAssignment-governs-ReviewActivity
    source_claims:
      - claim-review-assignment-001
      - claim-review-assignment-002

  - id: ReviewAssignment-example-boundary-manual-20260716
    labels:
      zh: ReviewAssignment boundary
      en: ReviewAssignment boundary
      ja: ReviewAssignment boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 ReviewAssignment 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not ReviewAssignment work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で ReviewAssignment work_specification ではない。
    field_values: {}

    related_node_ids:
      - ReviewAssignment
      - ReviewCoordination
    related_relation_ids: []
    source_claims:
      - claim-review-assignment-002

  - id: ReviewAssignment-example-counterexample-confusable
    labels:
      zh: ReviewAssignment counterexample
      en: ReviewAssignment counterexample
      ja: ReviewAssignment counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 ReviewAssignment 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style ReviewAssignment group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 ReviewAssignment ではない。
    field_values: {assignment_id: absent, review_scope_ref: absent, reviewer_label: alice}

    related_node_ids:
      - ReviewAssignment
      - ImprovementControlSpecification
      - ImprovementRole
      - EvaluatorOptimizer
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-assignment-001

  - id: ReviewAssignment-example-instance-concrete
    labels:
      zh: ReviewAssignment instance
      en: ReviewAssignment instance
      ja: ReviewAssignment instance
    descriptions:
      zh: Reflexion 实例：attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → 映射 ReviewAssignment。
      en: Reflexion instance: attempt_1 failed → reflect("I should have checked API docs first") → attempt_2 with reflection → maps to ReviewAssignment.
      ja: Reflexion 实例 failed→reflect→retry が ReviewAssignment に写像。
    field_values: {improvement_control_specification_id: security-review, revision: 3}

    related_node_ids:
      - ReviewAssignment
      - EvaluatorOptimizer
      - ImprovementRole
      - ReviewActivity
    related_relation_ids: []
    source_claims:
      - claim-review-assignment-001

