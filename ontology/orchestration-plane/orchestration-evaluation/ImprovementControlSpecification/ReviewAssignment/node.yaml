schema: moonweave.ai/ontology-node/v1
id: ReviewAssignment
kind: concept
labels:
  zh: 评审任务规范
  en: review assignment
  ja: レビュー割当仕様
semantics:
  short_definition:
    zh: 规定评审对象、责任角色、资格、范围、时限和完成判据的可版本化改进控制规范。
    en: A versioned improvement-control specification prescribing review target, responsible role, eligibility, scope, deadline, and completion criteria.
    ja: review target・responsible role・eligibility・scope・deadline・completion criteria を定める versioned control specification です。
  definition:
    zh: 评审任务是 ImprovementControlSpecification 的子类，以 assignment_id 与 revision 为身份；它在任何具体评审发生前规定对象范围、所需 EvaluatorOptimizer 角色、资格、交付物和完成判据，并可治理多次 ReviewActivity。它不是一次分派活动、评审者本人或已经发生的评审运行。
    en: ReviewAssignment is an ImprovementControlSpecification identified by assignment ID and revision. Before any review occurs it prescribes target scope, required EvaluatorOptimizer role, eligibility, deliverables, and completion criteria and may govern multiple ReviewActivities. It is not a dispatch occurrence, the reviewer, or an executed review run.
    ja: ReviewAssignment は assignment ID/revision で識別する ImprovementControlSpecification です。review 前に scope・required role・eligibility・deliverables・completion criteria を定め multiple ReviewActivity を govern します。
  why_needed:
    zh: 把规范从执行和承担者分开，可同时回答“应当如何评审”“谁被分派”“实际做了什么”，而不让规则、角色和活动混成同级节点。
    en: Separating specification from execution and bearer lets the graph answer how review should happen, who was assigned, and what actually occurred without mixing rule, role, and activity as peers.
    ja: specification・execution・bearer を分け how/whom/what occurred を答え rule・role・activity の peer 混在を防ぎます。
  includes:
    - zh: 具有稳定任务标识、版本、对象范围、资格要求、责任角色、截止时间和可验证完成条件的评审委托。
      en: Review mandates with stable ID, revision, target scope, eligibility requirements, responsible role, deadline, and verifiable completion conditions.
      ja: stable ID・revision・target scope・eligibility・responsible role・deadline・verifiable completion condition を持つ review mandate。
  excludes:
    - zh: ReviewCoordination 分派发生、ReviewActivity 执行、具体评审者、反馈发现和没有版本身份的临时消息。
      en: ReviewCoordination dispatch occurrences, ReviewActivity execution, concrete reviewers, feedback findings, and ad-hoc messages without version identity.
      ja: ReviewCoordination dispatch・ReviewActivity execution・concrete reviewer・feedback finding・version identity なし ad-hoc message。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: PR reviewer 分配规则、安全评审 eligibility 映射为 ReviewAssignment；声明 scope、reviewer 要求与 attempt budget。
    en: PR reviewer assignment rules and security review eligibility map to ReviewAssignment declaring scope, reviewer requirements, and attempt budget.
    ja: PR reviewer 分配 rule・security review eligibility を scope/reviewer 要求/attempt budget 宣言付き ReviewAssignment へ写像します。
  typical_input:
    - description: Review assignment spec.
      format: '{"assignment_id": "review-assignment-security", "revision": "3", "max_revisions": 2}'
      source_claims:
        - claim-review-assignment-design
  typical_output:
    - description: Moonweave ReviewAssignment.
      format: '{"improvement_control_specification_id": "review-assignment-security", "revision": "3"}'
      source_claims:
        - claim-review-assignment-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys: []
  fields:
    - id: target_scope
      labels:
        zh: 评审对象范围
        en: review target scope
        ja: review 対象 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可核验选择条件规定本规范覆盖的对象集合；artifact_type 限定工件类别，field_class 限定需检查的字段类，不指代某次运行。
        en: "Prescribes the governed object set through verifiable selectors: artifact_type limits the artifact class and field_class limits fields to inspect. It does not identify a run."
        ja: 検証可能な selector で governed object set を定め、artifact_type と field_class を限定します。run は識別しません。
      allowed_values: []
      pattern: null
      example_value:
        artifact_type: security-report
        field_class: sensitive
      source_claims:
        - claim-review-assignment-design
    - id: required_role_ref
      labels:
        zh: 所需责任角色引用
        en: required responsibility-role reference
        ja: 必要 responsibility role 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用有权承担该规范的 ImprovementRole；它规定角色资格，不把具体 Agent 或一次角色承担关系写入可复用规范。
        en: References the ImprovementRole authorized to bear this specification without embedding a concrete Agent or occurrence-specific role bearing.
        ja: この specification を担う ImprovementRole を参照し concrete Agent や occurrence-specific role bearing を埋め込みません。
      allowed_values: []
      pattern: null
      example_value: ImprovementRole:safety-reviewer
      source_claims:
        - claim-review-assignment-design
    - id: eligibility_condition
      labels:
        zh: 承担资格条件
        en: bearer eligibility condition
        ja: bearer eligibility condition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定 ReviewCoordination 选择承担者时必须验证的现行授权条件，不以姓名、模型名或未版本化成员表替代。
        en: States the current-authority condition ReviewCoordination must verify when selecting a bearer; a name, model label, or unversioned roster is insufficient.
        ja: ReviewCoordination が bearer 選択時に検証する current-authority condition で、name、model label、unversioned roster では代用できません。
      allowed_values: []
      pattern: null
      example_value: bearer holds current safety-review authority
      source_claims:
        - claim-review-assignment-design
    - id: deliverable_contract_ref
      labels:
        zh: 评审交付契约引用
        en: review deliverable-contract reference
        ja: review deliverable contract 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用版本化交付契约，规定发现与通过判据的输出形状；它不是具体评审结果。
        en: References the versioned contract defining finding and pass-criteria output shapes; it is not a concrete review result.
        ja: finding と pass-criteria の output shape を定める versioned contract で、concrete review result ではありません。
      allowed_values: []
      pattern: null
      example_value: review-findings-and-pass-criteria@3
      source_claims:
        - claim-review-assignment-design
    - id: completion_criteria_ref
      labels:
        zh: 完成判据引用
        en: completion-criteria reference
        ja: completion criteria 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用可版本化判据，规定受治理 ReviewActivity 何时可以判为完成；它不等同于评价分数或运行状态。
        en: References versioned criteria defining when a governed ReviewActivity may be judged complete; it is not a score or runtime status.
        ja: governed ReviewActivity を complete と判定する versioned criteria で、score や runtime status ではありません。
      allowed_values: []
      pattern: null
      example_value: security-review-completion@3
      source_claims:
        - claim-review-assignment-design
    - id: completion_window
      labels:
        zh: 完成时限窗口
        en: completion window
        ja: completion window
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 ISO 8601 duration 表示从受治理 ReviewActivity 开始到应完成的相对时限；绝对开始与结束时间仍属于运行发生。
        en: Expresses the relative interval from governed ReviewActivity start to required completion as an ISO 8601 duration; absolute times remain on the occurrence.
        ja: governed ReviewActivity start から required completion までを ISO 8601 duration で表し absolute time は occurrence に保持します。
      allowed_values: []
      pattern: ^P(?!$).+$
      example_value: PT2H
      source_claims:
        - claim-review-assignment-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewAssignment-security
    labels:
      zh: 安全评审分派
      en: Security review assignment
      ja: security review 分派
    descriptions:
      zh: review-assignment-security@3 限定高风险报告需 security-reviewer。
      en: review-assignment-security@3 requires security-reviewer for high-risk reports.
      ja: review-assignment-security@3 が high-risk report に security-reviewer を要求。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: review assignment
    field_values:
      improvement_control_specification_id: review-assignment-security
      revision: "3"
    related_node_ids:
      - ReviewAssignment
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-review-assignment-cookbook
      - claim-review-assignment-design
  - id: ReviewAssignment-pr-codeowners
    labels:
      zh: CODEOWNERS 分派
      en: CODEOWNERS assignment
      ja: CODEOWNERS 分派
    descriptions:
      zh: CODEOWNERS 规则定义 PR 必须的后端 reviewer 分派。
      en: CODEOWNERS rules define required backend reviewer assignment for PRs.
      ja: CODEOWNERS rule が PR 必須 backend reviewer 分派を定義。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: code review
    field_values: {}
    related_node_ids:
      - ReviewAssignment
      - ReviewCoordination
    related_relation_ids:
      - ReviewCoordination-dispatches-ImprovementAttempt
    source_claims:
      - claim-review-assignment-cookbook
      - claim-review-assignment-design
  - id: ReviewAssignment-boundary-run
    labels:
      zh: 评审运行不是分派
      en: Review run is not assignment
      ja: review run は assignment ではない
    descriptions:
      zh: review-run-18 是一次评审发生不是 ReviewAssignment 规范。
      en: review-run-18 is one review occurrence not ReviewAssignment spec.
      ja: review-run-18 は一回 review occurrence で ReviewAssignment spec ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - ReviewAssignment
    related_relation_ids: []
    source_claims:
      - claim-review-assignment-design
parent_relation:
  id: ReviewAssignment-is_a-ImprovementControlSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ReviewAssignment 是一种 ImprovementControlSpecification；其必要种差是规定评审范围、资格、责任、时限和完成判据并可跨运行复用。
    en: ReviewAssignment is a ImprovementControlSpecification whose necessary differentia is prescribing reusable review scope, eligibility, responsibility, deadline, and completion criteria.
    ja: ReviewAssignment は ImprovementControlSpecification の一種で、必要種差は reusable review scope・eligibility・responsibility・deadline・completion criteria を定めること です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
    en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
    ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 是一种
      en: inverse is a
      ja: 逆 の一種
  conditions:
    - id: ReviewAssignment-is_a-ImprovementControlSpecification-assertion-condition
      severity: error
      expression_language: plain
      expression: instance SATISFIES ImprovementControlSpecification AND instance DEFINES review scope, qualification, responsibility, deadline, and completion criteria AND IS REUSABLE across runs
      explanations:
        zh: 仅当对象既满足 ImprovementControlSpecification 的完整定义，又满足“规定评审范围、资格、责任、时限和完成判据并可跨运行复用”时断言。
        en: Assert only when the object satisfies the complete ImprovementControlSpecification definition and prescribing reusable review scope, eligibility, responsibility, deadline, and completion criteria.
        ja: object が ImprovementControlSpecification の complete definition と「reusable review scope・eligibility・responsibility・deadline・completion criteria を定めること」を満たす時のみ assert します。
      source_claims:
        - claim-review-assignment-design
        - claim-review-assignment-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-review-assignment-design
    - claim-review-assignment-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: null
