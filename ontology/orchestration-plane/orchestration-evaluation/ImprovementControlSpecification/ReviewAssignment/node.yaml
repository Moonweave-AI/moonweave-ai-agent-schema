          ja: boundary case は ReviewAssignment が ReviewActivity に governs semantics を持つ explicit record を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-assignment-001
          - claim-review-assignment-002
    source_claims:
      - claim-review-assignment-001
      - claim-review-assignment-002
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:ReviewActivity
