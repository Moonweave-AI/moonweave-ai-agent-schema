relations:
  - id: ReviewAssignment-governs-ReviewActivity
    predicate: governs
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 治理评审活动
      en: governs review activity
      ja: レビュー活動を統治
    definitions:
      zh: ReviewAssignment governs ReviewActivity 表示一次实际评审在指定任务版本规定的范围、资格、交付物和完成判据下执行；规范与活动保持不同身份。
      en: ReviewAssignment governs ReviewActivity means an actual review executes under the scope, eligibility, deliverables, and completion criteria prescribed by a particular assignment revision; specification and activity retain distinct identities.
      ja: ReviewAssignment governs ReviewActivity は actual review が assignment revision の scope・eligibility・deliverables・completion criteria 下で実行し spec/activity identity を分離することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 实例基数由具体循环规范和运行记录约束，本体边只声明可核验的有向事实。
      en: Instance cardinality is constrained by the concrete loop specification and run record; this ontology edge states only a verifiable directed fact.
      ja: instance cardinality は concrete loop specification/run record が制約し ontology edge は verifiable directed fact のみを宣言します。
    inverse_reading:
      predicate: inverse_of_governs
      labels:
        zh: 反向 治理评审活动
        en: inverse governs review activity
        ja: 逆 レビュー活動を統治
    conditions:
      - id: ReviewAssignment-governs-ReviewActivity-assertion-condition
        severity: error
        expression_language: plain
        expression: activity.assignment_ref = assignment.review_assignment_id@assignment.revision AND activity.scope CONFORMS_TO assignment.scope AND activity.bearer SATISFIES assignment.qualification
        explanations:
          zh: 仅当 ReviewActivity 记录 assignment revision 引用，且其执行范围与承担者满足该规范时成立。
          en: Assert only when ReviewActivity records the assignment revision and its scope and bearer satisfy that specification.
          ja: ReviewActivity が assignment revision を記録し scope/bearer が specification を満たす時のみ assert します。
        source_claims:
          - claim-review-assignment-001
          - claim-review-assignment-002
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ReviewAssignment-governs-ReviewActivity-example-positive-manual-20260716
        kind: positive
        labels:
          zh: governs 正例
          en: governs positive case
          ja: governs 正例
        scenario_id: improvement-relation-reviewassignment-governs-reviewactivity-positive
        descriptions:
          zh: security-review@3 治理 review-run-18；运行由合格 reviewer-7 执行并提交所需发现。
          en: security-review@3 governs review-run-18, which eligible reviewer-7 performs and supplies the required findings.
          ja: security-review@3 は review-run-18 を govern し eligible reviewer-7 が required findings を提出します。
        field_values: {}
        related_node_ids:
          - ReviewAssignment
          - ReviewActivity
        related_relation_ids:
          - ReviewAssignment-governs-ReviewActivity
        expected_result:
          zh: 查询返回 ReviewAssignment —governs→ ReviewActivity 的有向事实及其证据。
          en: The query returns the directed ReviewAssignment —governs→ ReviewActivity fact with its evidence.
          ja: query は ReviewAssignment —governs→ ReviewActivity の directed fact と evidence を返します。
        why_valid_or_invalid:
          zh: 来源、目标和 governs 的运行依据均明确，且两个端点保留独立身份。
          en: Source, target, and operational basis for governs are explicit while both endpoints retain independent identity.
          ja: source・target・governs basis が explicit で both endpoints は independent identity を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-assignment-001
          - claim-review-assignment-002
      - id: ReviewAssignment-governs-ReviewActivity-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: governs 边界例
          en: governs boundary case
          ja: governs 境界例
        scenario_id: improvement-relation-reviewassignment-governs-reviewactivity-boundary
        descriptions:
