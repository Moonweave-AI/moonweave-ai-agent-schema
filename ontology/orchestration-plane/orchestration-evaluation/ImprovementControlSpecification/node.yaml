schema: moonweave.ai/ontology-node/v1
id: ImprovementControlSpecification
kind: concept
labels:
  zh: 改进控制规范
  en: improvement control specification
  ja: 改善制御仕様
semantics:
  short_definition:
    zh: 规定改进责任、预算、评审范围或终止约束的可版本化规范。
    en: A versioned specification defining improvement responsibility, budget, review scope, or termination constraints.
    ja: improvement responsibility・budget・review scope・termination constraints を定める versioned specification です。
  definition:
    zh: 改进控制规范是本域可复用约束的共同上位概念，以规范标识、版本、有效期和适用目标类型为身份；ReviewAssignment 是其下位类型。规范可治理活动，但不执行评审、不更新状态，也不记录某次停止谱系。
    en: ImprovementControlSpecification is the genus of reusable constraints in this domain, identified by specification ID, revision, validity, and applicable target type; ReviewAssignment is its subtype. A specification may govern activities but does not perform review, update state, or record one stop lineage.
    ja: ImprovementControlSpecification は specification ID・revision・validity・target type で識別する reusable constraints の genus です。ReviewAssignment を特殊化し activity 実行・state update・lineage recording は行いません。
  why_needed:
    zh: 控制规范独立成树后，评审分派不会与评审活动、执行角色和运行状态处于同一级。
    en: A separate specification tree prevents review assignments from appearing as peers of review activities, executing roles, and runtime state.
    ja: separate specification tree により review assignment を activity・role・state と同列にしません。
  includes:
    - zh: 可复用评审分派、尝试预算、质量门槛和循环终止政策。
      en: Reusable review assignments, attempt budgets, quality thresholds, and loop-termination policies.
      ja: reusable review assignment・attempt budget・quality threshold・loop termination policy。
  excludes:
    - zh: 一次评审活动、评审者角色、当前优化器状态、评审结果和停止谱系记录。
      en: One review activity, reviewer role, current optimizer state, review result, and stop-lineage record.
      ja: one review activity・reviewer role・optimizer state・review result・stop lineage。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: ReviewAssignment、attempt budget 与 quality threshold 映射为 ImprovementControlSpecification；规范可治理循环但不执行评审。
    en: ReviewAssignment, attempt budgets, and quality thresholds map to ImprovementControlSpecification governing loops without performing review.
    ja: ReviewAssignment・attempt budget・quality threshold を loop を govern し review を実行しない ImprovementControlSpecification へ写像します。
  typical_input:
    - description: Control spec manifest.
      format: '{"improvement_control_specification_id": "security-review-control", "revision": "3"}'
      source_claims:
        - claim-improvement-control-specification-design
  typical_output:
    - description: Moonweave ImprovementControlSpecification.
      format: '{"improvement_control_specification_id": "security-review-control", "revision": "3"}'
      source_claims:
        - claim-improvement-control-specification-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Evaluator-optimizer and interrupt/resume gates.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Iterative crew refinement cycles.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Evaluator-optimizer workflow control.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Structured evaluation and revision loops.
structure:
  identity_keys:
    - improvement_control_specification_id
    - revision
  fields:
    - id: improvement_control_specification_id
      labels:
        zh: 控制规范标识
        en: control-specification ID
        ja: control specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个改进控制规范系列。
        en: Stably identifies one improvement-control specification series.
        ja: 一 improvement-control specification series を安定識別します。
      allowed_values: []
      pattern: null
      example_value: security-review-control
      source_claims:
        - claim-improvement-control-specification-design
    - id: revision
      labels:
        zh: 规范版本
        en: specification revision
        ja: 仕様 revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定责任、预算和适用范围的不可变版本。
        en: Fixes an immutable revision of responsibility, budget, and scope.
        ja: responsibility・budget・scope の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-improvement-control-specification-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementControlSpecification-security
    labels:
      zh: 安全评审控制规范
      en: Security review control spec
      ja: security review control spec
    descriptions:
      zh: security-review-control@3 要求一名安全评审者、最多两次修订、safety-score≥0.9。
      en: security-review-control@3 requires one security reviewer, max two revisions, safety-score≥0.9.
      ja: security-review-control@3 が reviewer 一名・max two revisions・safety-score≥0.9 を要求。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: review control
    field_values:
      improvement_control_specification_id: security-review-control
      revision: "3"
    related_node_ids:
      - ImprovementControlSpecification
      - ReviewAssignment
    related_relation_ids: []
    source_claims:
      - claim-improvement-control-specification-cookbook
      - claim-improvement-control-specification-design
  - id: ImprovementControlSpecification-quality-gate
    labels:
      zh: 质量门槛规范
      en: Quality gate spec
      ja: quality gate spec
    descriptions:
      zh: quality-threshold@4 声明 0.90 接受门槛供 ImprovementLoop terminates_on 引用。
      en: quality-threshold@4 declares 0.90 acceptance threshold for ImprovementLoop terminates_on.
      ja: quality-threshold@4 が 0.90 accept threshold を宣言し ImprovementLoop terminates_on が参照。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: success criteria
    field_values: {}
    related_node_ids:
      - ImprovementControlSpecification
      - ImprovementLoop
    related_relation_ids:
      - ImprovementLoop-terminates_on-StopCondition
    source_claims:
      - claim-improvement-control-specification-langgraph
      - claim-improvement-control-specification-design
  - id: ImprovementControlSpecification-boundary-review
    labels:
      zh: 评审运行不是规范
      en: Review run is not spec
      ja: review run は spec ではない
    descriptions:
      zh: review-run-18 有 10:02 开始时间，是 ReviewActivity 不是控制规范。
      en: review-run-18 has 10:02 start and is ReviewActivity not control spec.
      ja: review-run-18 は 10:02 start を持ち ReviewActivity で control spec ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - ImprovementControlSpecification
    related_relation_ids: []
    source_claims:
      - claim-improvement-control-specification-design
