schema: moonweave.ai/ontology-node/v1
id: ImprovementControlSpecification
kind: concept
status: review
labels:
  zh: 改进控制规范
  en: improvement control specification
  ja: 改善制御仕様
semantics:
  short_definition:
    zh: 规定改进责任、预算、评审范围或终止约束的可版本化规范。
    en: A versioned specification defining improvement responsibility, budget, review scope, or termination constraints.
    ja: improvement responsibility・budget・review scope・termination constraints を定める versioned specification です。
  definition:
    zh: 改进控制规范是本域可复用约束的共同上位概念，以规范标识、版本、有效期和适用目标类型为身份；ReviewAssignment 是其下位类型。规范可治理活动，但不执行评审、不更新状态，也不记录某次停止谱系。
    en: ImprovementControlSpecification is the genus of reusable constraints in this domain, identified by specification ID, revision, validity, and applicable target type; ReviewAssignment is its subtype. A specification may govern activities but does not perform review, update state, or record one stop lineage.
    ja: ImprovementControlSpecification は specification ID・revision・validity・target type で識別する reusable constraints の genus です。ReviewAssignment を特殊化し activity 実行・state update・lineage recording は行いません。
  why_needed:
    zh: 控制规范独立成树后，评审分派不会与评审活动、执行角色和运行状态处于同一级。
    en: A separate specification tree prevents review assignments from appearing as peers of review activities, executing roles, and runtime state.
    ja: separate specification tree により review assignment を activity・role・state と同列にしません。
  includes:
    - zh: 可复用评审分派、尝试预算、质量门槛和循环终止政策。
      en: Reusable review assignments, attempt budgets, quality thresholds, and loop-termination policies.
      ja: reusable review assignment・attempt budget・quality threshold・loop termination policy。
  excludes:
    - zh: 一次评审活动、评审者角色、当前优化器状态、评审结果和停止谱系记录。
      en: One review activity, reviewer role, current optimizer state, review result, and stop-lineage record.
      ja: one review activity・reviewer role・optimizer state・review result・stop lineage。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - improvement_control_specification_id
    - revision
  fields:
    - id: improvement_control_specification_id
      labels:
        zh: 控制规范标识
        en: control-specification ID
        ja: control specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个改进控制规范系列。
        en: Stably identifies one improvement-control specification series.
        ja: 一 improvement-control specification series を安定識別します。
      allowed_values: []
      pattern: null
      example_value: security-review-control
      source_claims:
        - claim-improvement-control-specification-002
    - id: revision
      labels:
        zh: 规范版本
        en: specification revision
        ja: 仕様 revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定责任、预算和适用范围的不可变版本。
        en: Fixes an immutable revision of responsibility, budget, and scope.
        ja: responsibility・budget・scope の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-improvement-control-specification-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImprovementControlSpecification-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 安全评审控制规范
      en: Security-review control specification
      ja: security review control specification
    scenario_id: null
    descriptions:
      zh: security-review-control@3 规定高风险报告需要一名安全评审者、两次最大修订和 safety-score≥0.9。
      en: security-review-control@3 requires one security reviewer, at most two revisions, and safety-score at least 0.9 for high-risk reports.
      ja: security-review-control@3 は reviewer・max two revisions・score threshold を定めます。
    field_values:
      improvement_control_specification_id: security-review-control
      revision: "3"
    related_node_ids:
      - ImprovementControlSpecification
      - ReviewAssignment
    related_relation_ids: []
    expected_result:
      zh: 建立可被多个循环复用的不可变控制规范。
      en: Create an immutable control specification reusable by multiple loops.
      ja: multiple loops が再利用できる immutable control specification を作ります。
    why_valid_or_invalid:
      zh: 责任、预算和阈值完整，但未声称任何评审已发生。
      en: Responsibility, budget, and threshold are complete without claiming that review occurred.
      ja: responsibility・budget・threshold は complete で review occurrence は主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-control-specification-001
      - claim-improvement-control-specification-002
  - id: ImprovementControlSpecification-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 正在进行的安全评审
      en: Running security review
      ja: running security review
    scenario_id: improvement-review-improvementcontrolspecification-boundary
    descriptions:
      zh: review-run-18 于 10:02 开始并产生 finding-4，身份由时间和状态而非规范版本决定。
      en: review-run-18 starts at 10:02 and produces finding-4; time and state rather than specification revision determine its identity.
      ja: review-run-18 は start time/status/finding で識別され specification revision ではありません。
    field_values: {}
    related_node_ids:
      - ReviewActivity
      - ImprovementControlSpecification
    related_relation_ids: []
    expected_result:
      zh: 分类为反馈域的 ReviewActivity，并引用控制规范。
      en: Classify it as feedback-owned ReviewActivity and reference the control specification.
      ja: feedback-owned ReviewActivity とし control spec を参照します。
    why_valid_or_invalid:
      zh: 一次发生与可重复适用的规范拥有不同生命周期。
      en: An occurrence and a repeatedly applicable specification have different lifecycles.
      ja: occurrence と reusable specification は lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-improvement-control-specification-001
      - claim-improvement-control-specification-002
