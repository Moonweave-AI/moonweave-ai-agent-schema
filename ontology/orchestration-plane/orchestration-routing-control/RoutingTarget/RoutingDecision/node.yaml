schema: moonweave.ai/ontology-node/v1
id: RoutingDecision
kind: concept
labels:
  zh: 路由决定
  en: routing decision
  ja: routing decision
semantics:
  short_definition:
    zh: 在给定输入状态下求值路由规范并选择目标的一次可观测决定发生。
    en: An observable decision occurrence that evaluates routing specifications against input state and selects a target.
    ja: input state に対し routing specification を evaluate し target を select する observable decision occurrence。
  definition:
    zh: 路由决定是一种事件，以决定标识、输入状态引用、求值时间、决定结果和理由为身份；它应用 RoutingPolicy 或 RetryPolicy、求值 RoutingCondition、可记录 GateOutcome，并选择 RoutingTarget。它不是可复用策略、目标本身或下游执行活动。
    en: A RoutingDecision is an event identified by decision ID, input-state reference, evaluation time, outcome, and rationale. It applies RoutingPolicy or RetryPolicy, evaluates RoutingCondition, may record GateOutcome, and selects RoutingTarget. It is not a reusable policy, the target itself, or downstream execution activity.
    ja: RoutingDecision は decision ID・input state ref・evaluated time・outcome・rationale で識別する event で RoutingPolicy/RetryPolicy を apply、Condition を evaluate、GateOutcome を record し RoutingTarget を select します。policy/target/execution activity ではありません。
  why_needed:
    zh: 把选择发生置于中心，可以从输入状态追溯条件、策略、门控结果和最终目标。
    en: Centering the selection occurrence makes conditions, policy, gate outcome, and final target traceable from input state.
    ja: selection occurrence を中心に input state から condition・policy・gate outcome・target を trace できます。
  includes:
    - zh: 分支选择、下一工作者选择、重试/停止选择、转向人工或协议适配器的决定。
      en: Branch, next-worker, retry-or-stop, human-review, and protocol-adapter routing decisions.
      ja: branch・next worker・retry/stop・human review・protocol adapter routing decision。
  excludes:
    - zh: 静态 Route、RoutingPolicy、候选目标列表和已执行的 RunAttempt。
      en: A static Route, RoutingPolicy, candidate-target list, and executed RunAttempt.
      ja: static Route・RoutingPolicy・candidate target list・executed RunAttempt。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: >-
      RoutingDecision 事件在 LangGraph conditional_edges 或 OPA decision 返回后创建：绑定 input_state_ref、
      applied_policy_ref、GateOutcome 引用与 selected_target_ref。Command(goto=...) 原生返回值应保留副本；
      本节点是 Moonweave 审计投影，不是 LangGraph API 类型。DownstreamOperation 在 allow 后开始，不在
      RoutingDecision 内执行。
    en: >-
      A RoutingDecision event is created after LangGraph conditional_edges or OPA decision returns: binds input_state_ref,
      applied_policy_ref, GateOutcome reference, and selected_target_ref. Retain a copy of native Command(goto=...) returns;
      this node is a Moonweave audit projection, not a LangGraph API type. DownstreamOperation starts after allow, not inside
      RoutingDecision.
    ja: >-
      RoutingDecision event は LangGraph conditional_edges または OPA decision 返却後に作成される。input_state_ref、
      applied_policy_ref、GateOutcome reference、selected_target_ref を bind する。native Command(goto=...) 返却値の copy を
      保持する。本 node は Moonweave audit projection で LangGraph API type ではない。DownstreamOperation は allow 後に開始し
      RoutingDecision 内では実行しない。
  typical_input:
    - description:
        zh: 路由函数或 OPA 在输入状态下的求值上下文。
        en: Evaluation context for a router function or OPA over input state.
        ja: input state に対する router function または OPA の evaluation context。
      format: |-
        {"input_state_ref":"state:post-sign@884","routing_spec_ref":"rs:release-routing@3","applied_policy_ref":"policy:release-branch@2","gate_outcome_ref":"go-902","candidate_targets":["target:node:approve","target:node:review"]}
  typical_output:
    - description:
        zh: 记录所选目标与理由的路由决定事件。
        en: A routing decision event recording selected target and rationale.
        ja: selected target と rationale を記録する routing decision event。
      format: |-
        {"routing_decision_id":"rd-891","evaluated_at":"2026-07-16T09:12:03Z","selected_target_ref":"target:node:review","outcome":"redirect","rationale":{"gate_outcome_ref":"go-902","match":"risk_high"},"native_return_ref":"Command(goto=review)"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing function returns mapped to named destinations.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents Command goto values auditable as routing decisions.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/management-decision-logs/
      description: Documents policy decision records analogous to routing decision events.
  source_claims:
    - claim-routing-decision-001
    - claim-routing-decision-004
structure:
  identity_keys:
    - routing_decision_id
  fields:
    - id: routing_decision_id
      labels:
        zh: 路由决定标识
        en: routing decision ID
        ja: routing decision ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次路由求值和选择。
        en: Stably identifies one routing evaluation and selection.
        ja: one routing evaluation/selection を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: routing-decision-884
      source_claims:
        - claim-routing-decision-004
    - id: input_state_ref
      labels:
        zh: 输入状态引用
        en: input-state reference
        ja: input-state reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被冻结用于本次决定的状态版本或摘要。
        en: References the state revision or digest frozen for this decision.
        ja: decision 用に frozen した state revision/digest を参照します。
      allowed_values: []
      pattern: null
      example_value: workflow-state-77@12
      source_claims:
        - claim-routing-decision-001
    - id: evaluated_at
      labels:
        zh: 求值时间
        en: evaluated at
        ja: evaluated at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录条件和策略完成求值的时间。
        en: Records when condition and policy evaluation completed.
        ja: condition/policy evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-routing-decision-004
    - id: decision_outcome
      labels:
        zh: 决定结果
        en: decision outcome
        ja: decision outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 selected、retry、stop、redirect、escalate 或 no-route。
        en: Records selected, retry, stop, redirect, escalate, or no-route.
        ja: selected・retry・stop・redirect・escalate・no-route を記録します。
      allowed_values: []
      pattern: null
      example_value: redirect
      source_claims:
        - claim-routing-decision-001
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: decision rationale
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明哪些条件、证据和优先规则导致结果。
        en: Explains which conditions, evidence, and precedence rules caused the outcome.
        ja: condition・evidence・precedence rule が outcome を導いた理由。
      allowed_values: []
      pattern: null
      example_value: quality score below publish threshold
      source_claims:
        - claim-routing-decision-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: routing-event-langgraph-policy-eval
    labels:
      zh: RoutingDecision positive
      en: RoutingDecision positive
      ja: RoutingDecision positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 RoutingDecision 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for RoutingDecision: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が RoutingDecision で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {routing_decision_id: routing-decision-884, input_state_ref: "workflow-state-77@12", decision_outcome: selected, selected_target_ref: researcher_agent}

    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - BranchCondition
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-001

  - id: routing-event-semantic-router-no-route
    labels:
      zh: RoutingDecision positive
      en: RoutingDecision positive
      ja: RoutingDecision positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingDecision 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingDecision router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingDecision から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {routing_decision_id: routing-decision-901, decision_outcome: no-route, rationale: all_scores_below_threshold}

    related_node_ids:
      - RoutingDecision
      - StopCondition
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-004

  - id: routing-event-opa-gate-redirect
    labels:
      zh: RoutingDecision positive
      en: RoutingDecision positive
      ja: RoutingDecision positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 RoutingDecision 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to RoutingDecision: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) RoutingDecision で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {routing_decision_id: routing-decision-912, decision_outcome: redirect, selected_target_ref: human_review}

    related_node_ids:
      - RoutingDecision
      - GateOutcome
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-002

  - id: routing-event-openai-handoff-selected
    labels:
      zh: RoutingDecision positive
      en: RoutingDecision positive
      ja: RoutingDecision positive
    descriptions:
      zh: LiteLLM 映射 RoutingDecision LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps RoutingDecision LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM RoutingDecision: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {routing_decision_id: routing-decision-920, decision_outcome: selected, selected_target_ref: billing_agent}

    related_node_ids:
      - RoutingDecision
      - RoutingTarget
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-001

  - id: routing-event-retry-policy-stop
    labels:
      zh: RoutingDecision positive
      en: RoutingDecision positive
      ja: RoutingDecision positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 RoutingDecision 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for RoutingDecision: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が RoutingDecision で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {routing_decision_id: routing-decision-933, decision_outcome: stop, selected_target_ref: END}

    related_node_ids:
      - RoutingDecision
      - RetryPolicy
      - StopCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-004

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-routing-decision-001
    source: langgraph-graph-api
    supports: RoutingDecision core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-routing-decision-002
    source: opa-policy-language
    supports: RoutingDecision boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-routing-decision-004
    source: opa-policy-language
    supports: Moonweave RoutingDecision constraints, examples, or local audit fields for claim claim-routing-decision-004 are design projections informed by Open Policy Agent - Policy Language.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: design-inference
    confidence: high
