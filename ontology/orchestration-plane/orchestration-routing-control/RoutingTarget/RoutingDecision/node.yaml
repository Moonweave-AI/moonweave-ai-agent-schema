schema: moonweave.ai/ontology-node/v1
id: RoutingDecision
kind: concept
status: accepted
labels:
  zh: 路由决定
  en: routing decision
  ja: routing decision
semantics:
  short_definition:
    zh: 在给定输入状态下求值路由规范并选择目标的一次可观测决定发生。
    en: An observable decision occurrence that evaluates routing specifications against input state and selects a target.
    ja: input state に対し routing specification を evaluate し target を select する observable decision occurrence。
  definition:
    zh: 路由决定是一种事件，以决定标识、输入状态引用、求值时间、决定结果和理由为身份；它应用 RoutingPolicy 或 RetryPolicy、求值 RoutingCondition、可记录 GateOutcome，并选择 RoutingTarget。它不是可复用策略、目标本身或下游执行活动。
    en: A RoutingDecision is an event identified by decision ID, input-state reference, evaluation time, outcome, and rationale. It applies RoutingPolicy or RetryPolicy, evaluates RoutingCondition, may record GateOutcome, and selects RoutingTarget. It is not a reusable policy, the target itself, or downstream execution activity.
    ja: RoutingDecision は decision ID・input state ref・evaluated time・outcome・rationale で識別する event で RoutingPolicy/RetryPolicy を apply、Condition を evaluate、GateOutcome を record し RoutingTarget を select します。policy/target/execution activity ではありません。
  why_needed:
    zh: 把选择发生置于中心，可以从输入状态追溯条件、策略、门控结果和最终目标。
    en: Centering the selection occurrence makes conditions, policy, gate outcome, and final target traceable from input state.
    ja: selection occurrence を中心に input state から condition・policy・gate outcome・target を trace できます。
  includes:
    - zh: 分支选择、下一工作者选择、重试/停止选择、转向人工或协议适配器的决定。
      en: Branch, next-worker, retry-or-stop, human-review, and protocol-adapter routing decisions.
      ja: branch・next worker・retry/stop・human review・protocol adapter routing decision。
  excludes:
    - zh: 静态 Route、RoutingPolicy、候选目标列表和已执行的 RunAttempt。
      en: A static Route, RoutingPolicy, candidate-target list, and executed RunAttempt.
      ja: static Route・RoutingPolicy・candidate target list・executed RunAttempt。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - routing_decision_id
  fields:
    - id: routing_decision_id
      labels:
        zh: 路由决定标识
        en: routing decision ID
        ja: routing decision ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次路由求值和选择。
        en: Stably identifies one routing evaluation and selection.
        ja: one routing evaluation/selection を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: routing-decision-884
      source_claims:
        - claim-routing-decision-004
    - id: input_state_ref
      labels:
        zh: 输入状态引用
        en: input-state reference
        ja: input-state reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被冻结用于本次决定的状态版本或摘要。
        en: References the state revision or digest frozen for this decision.
        ja: decision 用に frozen した state revision/digest を参照します。
      allowed_values: []
      pattern: null
      example_value: workflow-state-77@12
      source_claims:
        - claim-routing-decision-001
    - id: evaluated_at
      labels:
        zh: 求值时间
        en: evaluated at
        ja: evaluated at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录条件和策略完成求值的时间。
        en: Records when condition and policy evaluation completed.
        ja: condition/policy evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-routing-decision-004
    - id: decision_outcome
      labels:
        zh: 决定结果
        en: decision outcome
        ja: decision outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 selected、retry、stop、redirect、escalate 或 no-route。
        en: Records selected, retry, stop, redirect, escalate, or no-route.
        ja: selected・retry・stop・redirect・escalate・no-route を記録します。
      allowed_values: []
      pattern: null
      example_value: redirect
      source_claims:
        - claim-routing-decision-001
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: decision rationale
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明哪些条件、证据和优先规则导致结果。
        en: Explains which conditions, evidence, and precedence rules caused the outcome.
        ja: condition・evidence・precedence rule が outcome を導いた理由。
      allowed_values: []
      pattern: null
      example_value: quality score below publish threshold
      source_claims:
        - claim-routing-decision-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingDecision-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 转向人工复核
      en: Redirect to human review
      ja: human review へ redirect
    scenario_id: null
    descriptions:
      zh: routing-decision-884 冻结 workflow-state-77@12，应用 policy@7、求值 quality condition 和 gate-outcome-884，在 04:20 选择 human-review-queue。
      en: routing-decision-884 freezes workflow-state-77@12, applies policy@7, evaluates the quality condition and gate-outcome-884, and selects human-review-queue at 04:20.
      ja: routing-decision-884 は state@12 を freeze、policy@7/quality condition/gate outcome を evaluate し 04:20 human-review-queue を select します。
    field_values:
      routing_decision_id: routing-decision-884
      input_state_ref: workflow-state-77@12
      evaluated_at: 2026-07-16T04:20:00Z
      decision_outcome: redirect
      rationale: quality score below publish threshold
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - RoutingCondition
      - RoutingTarget
      - GateOutcome
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-evaluates-RoutingCondition
      - RoutingDecision-records-GateOutcome
      - RoutingDecision-selects-RoutingTarget
    expected_result:
      zh: 建立一条可从状态、策略、条件和结果追溯到目标的决定链。
      en: Create a decision chain traceable from state, policy, condition, and outcome to target.
      ja: state・policy・condition・outcome から target へ traceable な decision chain を作成します。
    why_valid_or_invalid:
      zh: 所有关系引用同一输入状态和求值时点。
      en: Every relation references the same input state and evaluation time.
      ja: 全 relation が same input state/evaluation time を参照します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-decision-001
      - claim-routing-decision-002
      - claim-routing-decision-004
  - id: RoutingDecision-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 静态路由映射
      en: Static route map
      ja: static route map
    scenario_id: routing-review-routingdecision-boundary
    descriptions:
      zh: route-billing 声明 condition=billing-intent 时目标为 billing-worker，但没有具体输入状态、时间或选择结果。
      en: route-billing declares billing-worker when condition=billing-intent but has no concrete input state, time, or selection outcome.
      ja: route-billing は billing-intent→billing-worker を宣言しますが concrete state・time・selection outcome はありません。
    field_values: {}
    related_node_ids:
      - Route
      - RoutingDecision
    related_relation_ids: []
    expected_result:
      zh: 分类为 Route，不创建 RoutingDecision。
      en: Classify it as Route and do not create a RoutingDecision.
      ja: Route とし RoutingDecision を作りません。
    why_valid_or_invalid:
      zh: 映射规范不是一次已经完成的求值。
      en: A mapping specification is not a completed evaluation occurrence.
      ja: mapping specification は completed evaluation occurrence ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-decision-001
      - claim-routing-decision-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RoutingDecision-selects-RoutingTarget
  predicate: selects
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 选择
    en: selects
    ja: 選択する
  definitions:
    zh: RoutingDecision 在已求值条件、策略、门控结果和目标可用性证据上选定一个 RoutingTarget，并把目标标识写入决定结果。
    en: A RoutingDecision chooses one RoutingTarget from evaluated conditions, policy, gate outcome, and availability evidence and writes its target ID into the decision result.
    ja: RoutingDecision は evaluated condition・policy・gate outcome・availability evidence から one RoutingTarget を選び target ID を decision result に記録します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: selected_by
    labels:
      zh: 由其选择
      en: selected by
      ja: により選択される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RoutingDecision-selects-RoutingTarget-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 账单决定选择账单 worker
        en: Billing decision selects billing worker
        ja: billing decision selects billing worker
      scenario_id: routing-relation-routingdecision-selects-routingtarget-positive
      descriptions:
        zh: decision-884 在 policy@7 下选择 target-billing-worker，并记录候选比较理由。
        en: decision-884 selects target-billing-worker under policy@7 and records candidate-comparison rationale.
        ja: decision-884 は policy@7 で target-billing-worker を select し comparison rationale を記録します。
      field_values: {}
      related_node_ids:
        - RoutingDecision
        - RoutingTarget
      related_relation_ids:
        - RoutingDecision-selects-RoutingTarget
      expected_result:
        zh: 建立一次决定到唯一选中目标的边。
        en: Create the edge from one decision to its selected target.
        ja: one decision から selected target への edge を作成します。
      why_valid_or_invalid:
        zh: 目标在候选集合中、可用且满足能力约束。
        en: The target is a candidate, available, and capability-compatible.
        ja: target は candidate/available/capability-compatible です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-routing-decision-001
        - claim-routing-decision-002
        - claim-routing-decision-004
    - id: RoutingDecision-selects-RoutingTarget-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 候选列表不是选择结果
        en: Candidate list is not a selection
        ja: candidate list は selection ではない
      scenario_id: routing-relation-routingdecision-selects-routingtarget-boundary
      descriptions:
        zh: policy@7 列出三个 RoutingTarget，但决定尚未运行。
        en: policy@7 lists three RoutingTargets, but no decision has run.
        ja: policy@7 は three targets を列挙しますが decision は未実行です。
      field_values: {}
      related_node_ids:
        - RoutingDecision
        - RoutingTarget
      related_relation_ids:
        - RoutingDecision-selects-RoutingTarget
      expected_result:
        zh: 保留候选，不断言 selects。
        en: Keep candidates but do not assert selects.
        ja: candidate を保持し selects を assert しません。
      why_valid_or_invalid:
        zh: 目标具有候选资格不能证明它已经成为某次决定的最终选择。
        en: Eligibility does not prove final selection.
        ja: eligibility は final selection を証明しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-routing-decision-001
        - claim-routing-decision-002
        - claim-routing-decision-004
  source_claims:
    - claim-routing-decision-001
    - claim-routing-decision-002
    - claim-routing-decision-004
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: RoutingDecision-applies-RetryPolicy
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用
      en: applies
      ja: 適用する
    definitions:
      zh: RoutingDecision 在一次失败后应用具体 RetryPolicy 版本，结合已用尝试数和失败类别决定 retry、redirect 或 stop。
      en: After a failure, RoutingDecision applies a concrete RetryPolicy revision together with attempts used and failure class to choose retry, redirect, or stop.
      ja: failure 後 RoutingDecision は RetryPolicy revision と attempts used/failure class を用い retry・redirect・stop を選びます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: applied_by
      labels:
        zh: 由其应用
        en: applied by
        ja: により適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-applies-RetryPolicy-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 超时决定应用重试策略
          en: Timeout decision applies retry policy
          ja: timeout decision applies retry policy
        scenario_id: routing-relation-routingdecision-applies-retrypolicy-positive
        descriptions:
          zh: decision-timeout-9 在首次超时后应用 retry-api@2，剩余两次尝试。
          en: decision-timeout-9 applies retry-api@2 after the first timeout with two attempts remaining.
          ja: decision-timeout-9 は first timeout 後 retry-api@2 を apply し remaining attempts=2 です。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RetryPolicy
        related_relation_ids:
          - RoutingDecision-applies-RetryPolicy
        expected_result:
          zh: 记录决定使用的重试策略版本。
          en: Record the retry-policy revision used by the decision.
          ja: decision が使用した retry policy revision を記録します。
        why_valid_or_invalid:
          zh: 失败类别属于可重试集合，并且策略规定的尝试次数尚未耗尽。
          en: The failure is retryable and attempts are not exhausted.
          ja: failure は retryable で attempts は未 exhausted です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-routing-decision-003
          - claim-routing-decision-004
      - id: RoutingDecision-applies-RetryPolicy-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 实际第二次调用不是应用关系
          en: Second invocation is not the policy-application fact
          ja: second invocation は policy application ではない
        scenario_id: routing-relation-routingdecision-applies-retrypolicy-boundary
        descriptions:
          zh: attempt-2 执行 API 调用；它由 RetryActivity 实现，不是决定应用策略的记录。
          en: attempt-2 executes the API call; it is performed by RetryActivity, not the record of applying policy.
          ja: attempt-2 は API call を execute する RetryActivity で policy application record ではありません。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RetryPolicy
        related_relation_ids:
          - RoutingDecision-applies-RetryPolicy
        expected_result:
          zh: 把调用归运行时尝试，应用关系留在决定。
          en: Keep the call as a runtime attempt and the application relation on the decision.
          ja: call は runtime attempt、application relation は decision に置きます。
        why_valid_or_invalid:
          zh: 执行重试尝试与作出控制选择是身份和时间都不同的两次发生。
          en: Execution attempt and control selection are distinct occurrences.
          ja: execution attempt と control selection は distinct occurrences です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-routing-decision-003
          - claim-routing-decision-004
    source_claims:
      - claim-routing-decision-003
      - claim-routing-decision-004
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:RetryPolicy
  - id: RoutingDecision-applies-RoutingPolicy
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用
      en: applies
      ja: 適用する
    definitions:
      zh: RoutingDecision 在策略有效期内冻结并应用一个 RoutingPolicy 版本，以取得候选路径、条件优先级和无匹配行为。
      en: A RoutingDecision freezes and applies one RoutingPolicy revision within its validity interval to obtain candidate paths, condition precedence, and no-match behavior.
      ja: RoutingDecision は validity 内の RoutingPolicy revision を freeze/apply し candidate path・condition precedence・no-match behavior を取得します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: applied_by
      labels:
        zh: 由其应用
        en: applied by
        ja: により適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-applies-RoutingPolicy-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 账单决定应用客服路由策略
          en: Billing decision applies support routing policy
          ja: billing decision applies support routing policy
        scenario_id: routing-relation-routingdecision-applies-routingpolicy-positive
        descriptions:
          zh: routing-decision-884 在 04:20 应用 policy-support@7，并保存该版本引用。
          en: routing-decision-884 applies policy-support@7 at 04:20 and stores that revision reference.
          ja: routing-decision-884 は 04:20 policy-support@7 を apply し revision ref を保存します。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RoutingPolicy
        related_relation_ids:
          - RoutingDecision-applies-RoutingPolicy
        expected_result:
          zh: 连接一次决定与实际使用的策略版本。
          en: Link the decision to the exact policy revision used.
          ja: decision と exact policy revision を接続します。
        why_valid_or_invalid:
          zh: 时间在有效期内且决定证据含策略摘要。
          en: Time lies within validity and decision evidence contains the policy digest.
          ja: time は validity 内で decision evidence は policy digest を持ちます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-routing-decision-001
          - claim-routing-decision-002
          - claim-routing-decision-004
      - id: RoutingDecision-applies-RoutingPolicy-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 策略列在配置但未被决定使用
          en: Policy configured but not used by decision
          ja: policy configured but not used
        scenario_id: routing-relation-routingdecision-applies-routingpolicy-boundary
        descriptions:
          zh: workflow 列出 policy-support@7 和 policy-emergency@2，decision-884 只使用前者。
          en: The workflow lists policy-support@7 and policy-emergency@2; decision-884 uses only the former.
          ja: workflow は two policies を列挙しますが decision-884 は前者のみ使います。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RoutingPolicy
        related_relation_ids:
          - RoutingDecision-applies-RoutingPolicy
        expected_result:
          zh: 只对实际使用版本断言 applies。
          en: Assert applies only for the revision actually used.
          ja: actual used revision のみに applies を assert します。
        why_valid_or_invalid:
          zh: 候选配置只说明可能使用，并不能证明某次决定实际应用了策略。
          en: Candidate configuration is not decision application.
          ja: candidate configuration は decision application ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-routing-decision-001
          - claim-routing-decision-002
          - claim-routing-decision-004
    source_claims:
      - claim-routing-decision-001
      - claim-routing-decision-002
      - claim-routing-decision-004
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:RoutingPolicy
  - id: RoutingDecision-evaluates-RoutingCondition
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 求值
      en: evaluates
      ja: 評価する
    definitions:
      zh: RoutingDecision 将其 input_state_ref 对应的冻结状态绑定到一个 RoutingCondition 版本并记录结果与时间。
      en: A RoutingDecision binds the frozen state referenced by input_state_ref to one RoutingCondition revision and records result and time.
      ja: RoutingDecision は input_state_ref の frozen state を RoutingCondition revision に bind し result/time を記録します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 由其求值
        en: evaluated by
        ja: により評価される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-evaluates-RoutingCondition-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 路由决定求值账单意图
          en: Routing decision evaluates billing intent
          ja: routing decision evaluates billing intent
        scenario_id: routing-relation-routingdecision-evaluates-routingcondition-positive
        descriptions:
          zh: decision-884 对 state@12 求值 branch-billing@3，结果为 true。
          en: decision-884 evaluates branch-billing@3 against state@12 and obtains true.
          ja: decision-884 は state@12 に branch-billing@3 を evaluate し true を得ます。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RoutingCondition
        related_relation_ids:
          - RoutingDecision-evaluates-RoutingCondition
        expected_result:
          zh: 建立决定到被求值条件的事实。
          en: Create the fact from decision to evaluated condition.
          ja: decision から evaluated condition への fact を作成します。
        why_valid_or_invalid:
          zh: 条件版本、输入状态与结果可核对。
          en: Condition revision, input state, and result can be reconciled.
          ja: condition revision・input state・result を照合できます。
        synthetic: true
