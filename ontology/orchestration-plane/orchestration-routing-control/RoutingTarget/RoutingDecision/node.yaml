      zh: RoutingDecision 把路径选择所依据的 GateOutcome 标识、结果与证据摘要纳入决定记录。
      en: A RoutingDecision records the GateOutcome ID, result, and evidence digest on which its path selection depends.
      ja: RoutingDecision は selection 根拠 GateOutcome ID/result/evidence digest を記録します。
    cardinality: null
    cardinality_not_applicable_reason:
