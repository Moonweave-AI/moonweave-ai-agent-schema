      - id: RoutingDecision-records-GateOutcome-example-positive
        kind: positive
        labels:
          zh: 转向决定记录质量门结果
          en: Redirect decision records gate outcome
          ja: redirect decision records gate outcome
        descriptions:
          zh: decision-884 记录 gate-outcome-884=redirect 与 score-44 摘要。
          en: decision-884 records gate-outcome-884=redirect and score-44 digest.
          ja: decision-884 は gate-outcome-884=redirect を記録します。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - GateOutcome
        related_relation_ids:
          - RoutingDecision-records-GateOutcome
        source_claims:
          - claim-routing-decision-design
