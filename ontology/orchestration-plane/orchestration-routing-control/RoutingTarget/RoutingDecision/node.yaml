  - id: RoutingDecision-satisfies-StopCondition
    predicate: satisfies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 满足
      en: satisfies
      ja: 満たす
    definitions:
      zh: RoutingDecision 根据冻结证据确认 StopCondition 在本次求值中为真，支持选择 stop target，但不等于 RuntimeSession 已终止。
      en: A RoutingDecision confirms from frozen evidence that a StopCondition is true in this evaluation, supporting stop-target selection but not meaning RuntimeSession has terminated.
      ja: RoutingDecision は StopCondition=true を確認し stop target selection を支持しますが session terminated ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: satisfied_by
      labels:
        zh: 由其满足
        en: satisfied by
        ja: により満たされる
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
