schema: moonweave.ai/ontology-node/v1
id: RoutingDecision
kind: concept
labels:
  zh: 路由决定
  en: routing decision
  ja: ルーティング決定
semantics:
  short_definition:
    zh: 在给定输入状态下求值路由规范并选择目标的一次可观测决定发生。
    en: An observable decision occurrence that evaluates routing specifications against input state and selects a target.
    ja: input state に対し routing specification を evaluate し target を select する observable decision occurrence です。
  definition:
    zh: RoutingDecision 是以 routing_decision_id、input_state_ref、evaluated_at、decision_outcome 与 rationale 标识的事件；它应用 RoutingPolicy 或 RetryPolicy、求值 RoutingCondition、可记录 GateOutcome，并选择 RoutingTarget。它对应 LangGraph route function 一次返回值或 Command(goto=...)、CrewAI manager 一次委派、A2A tasks/send 目标选择、OpenAI transfer_to_* 的运行时求值。它不是可复用策略、目标本身或下游执行活动。
    en: A RoutingDecision is an event identified by routing_decision_id, input_state_ref, evaluated_at, decision_outcome, and rationale. It applies RoutingPolicy or RetryPolicy, evaluates RoutingCondition, may record GateOutcome, and selects RoutingTarget. It corresponds to one LangGraph route-function return or Command(goto=...), one CrewAI manager delegation, one A2A tasks/send target selection, or one OpenAI transfer_to_* runtime evaluation. It is not a reusable policy, the target itself, or downstream execution activity.
    ja: RoutingDecision は LangGraph route function 戻り値/Command(goto=...)/CrewAI 委任/A2A tasks/send/OpenAI transfer_to_* の runtime evaluation に対応する event です。
  why_needed:
    zh: 把选择发生置于中心，可从冻结 input state 追溯条件、策略、门控结果与最终 RoutingTarget，解释“为何这次走了 billing 分支”。
    en: Centering the selection occurrence makes conditions, policy, gate outcome, and final RoutingTarget traceable from frozen input state, explaining why this run took the billing branch.
    ja: selection occurrence を中心に input state から condition/policy/gate outcome/target を trace できます。
  includes:
    - zh: 分支选择、下一 worker 选择、重试/停止选择、转向人工、A2A 远程委派与 handoff 决定。
      en: Branch, next-worker, retry-or-stop, human-review, A2A remote delegation, and handoff routing decisions.
      ja: branch/next worker/retry/stop/human review/A2A delegation/handoff routing decision。
  excludes:
    - zh: 静态 Route、RoutingPolicy、候选目标列表和已执行的 RunAttempt。
      en: A static Route, RoutingPolicy, candidate-target list, and executed RunAttempt.
      ja: static Route/RoutingPolicy/candidate list/executed RunAttempt。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 每次 LangGraph route function 调用产生一条 RoutingDecision：input_state_ref 冻结 state snapshot，evaluated_at 记录求值时间，decision_outcome 记录 selected/retry/stop/redirect，selected_target_ref 写入 rationale。Command(goto="billing_handler") 同样投影为 RoutingDecision。集成 MUST 引用实际使用的 policy/condition 版本，不能把 compiled graph 边误报为决定。
    en: Each LangGraph route-function invocation produces one RoutingDecision with input_state_ref freezing a state snapshot, evaluated_at recording evaluation time, decision_outcome recording selected/retry/stop/redirect, and selected target in rationale. Command(goto="billing_handler") likewise projects to RoutingDecision. Integrations MUST reference the policy/condition revisions actually used; compiled graph edges must not be misreported as decisions.
    ja: LangGraph route function 各呼び出しは RoutingDecision を生成し compiled graph edge を decision と誤報してはいけません。
  typical_input:
    - description: LangGraph route function evaluation against frozen state.
      format: |
        input_state_ref: workflow-state-77@12
        routing_policy_ref: policy-support@7
        route_function_return: billing
        evaluated_at: 2026-07-16T04:20:00Z
      source_claims: [claim-routing-decision-langgraph]
    - description: OpenAI handoff invocation evidence.
      format: |
        session_id: session-support-042
        handoff_tool: transfer_to_billing_agent
        selected_target_ref: target-billing-agent@3
      source_claims: [claim-routing-decision-openai]
  typical_output:
    - description: Persisted routing decision record.
      format: |
        {
          "routing_decision_id": "routing-decision-884",
          "input_state_ref": "workflow-state-77@12",
          "evaluated_at": "2026-07-16T04:20:00Z",
          "decision_outcome": "selected",
          "selected_target_ref": "target-billing-worker@5",
          "rationale": "branch-billing@3 true under policy-support@7"
        }
      source_claims: [claim-routing-decision-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Route function returns and Command(goto=...) as routing decisions.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Manager worker selection decisions.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send remote target selection.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: transfer_to_* handoff routing decisions.
structure:
  identity_keys:
    - routing_decision_id
  fields:
    - id: routing_decision_id
      labels:
        zh: 路由决定标识
        en: routing decision ID
        ja: routing decision ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次路由求值和选择。
        en: Stably identifies one routing evaluation and selection.
        ja: one routing evaluation/selection を stable 識別。
      allowed_values: []
      pattern: null
      example_value: routing-decision-884
      source_claims:
        - claim-routing-decision-design
    - id: input_state_ref
      labels:
        zh: 输入状态引用
        en: input-state reference
        ja: input-state reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被冻结用于本次决定的状态版本或摘要。
        en: References the state revision or digest frozen for this decision.
        ja: decision 用 frozen state revision/digest。
      allowed_values: []
      pattern: null
      example_value: workflow-state-77@12
      source_claims:
        - claim-routing-decision-langgraph
    - id: evaluated_at
      labels:
        zh: 求值时间
        en: evaluated at
        ja: evaluated at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录条件和策略完成求值的时间。
        en: Records when condition and policy evaluation completed.
        ja: condition/policy evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-routing-decision-design
    - id: decision_outcome
      labels:
        zh: 决定结果
        en: decision outcome
        ja: decision outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 selected、retry、stop、redirect、escalate 或 no-route。
        en: Records selected, retry, stop, redirect, escalate, or no-route.
        ja: selected/retry/stop/redirect/escalate/no-route。
      allowed_values: []
      pattern: null
      example_value: selected
      source_claims:
        - claim-routing-decision-langgraph
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: decision rationale
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明哪些条件、证据和优先规则导致结果。
        en: Explains which conditions, evidence, and precedence rules caused the outcome.
        ja: condition/evidence/precedence rule が outcome を導いた理由。
      allowed_values: []
      pattern: null
      example_value: branch-billing@3 true; policy-support@7 precedence selected billing-worker
      source_claims:
        - claim-routing-decision-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingDecision-example-langgraph-classifier
    labels:
      zh: LangGraph 分类器路由决定
      en: LangGraph classifier routing decision
      ja: LangGraph classifier routing decision
    descriptions:
      zh: decision-884 冻结 state@12，应用 policy@7，branch-billing@3 为 true，04:20 选择 target-billing-worker@5，对应 route function 返回 "billing"。
      en: decision-884 freezes state@12, applies policy@7, branch-billing@3 true, selects target-billing-worker@5 at 04:20 matching route function return "billing".
      ja: decision-884 は route function "billing" 返却に対応します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges routing function
    field_values:
      routing_decision_id: routing-decision-884
      input_state_ref: workflow-state-77@12
      evaluated_at: 2026-07-16T04:20:00Z
      decision_outcome: selected
      rationale: branch-billing@3 true under policy-support@7
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - BranchCondition
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-evaluates-RoutingCondition
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-routing-decision-langgraph
  - id: RoutingDecision-example-a2a-delegation
    labels:
      zh: A2A 远程委派决定
      en: A2A remote delegation decision
      ja: A2A remote delegation decision
    descriptions:
      zh: decision-a2a-551 在 AgentCard 发现 billing_agent 后选择 target-billing-agent@1 并触发 tasks/send。
      en: decision-a2a-551 selects target-billing-agent@1 after AgentCard discovery and triggers tasks/send.
      ja: decision-a2a-551 は A2A tasks/send 前 target 選択を記録します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: tasks/send
    field_values:
      routing_decision_id: decision-a2a-551
      input_state_ref: coordinator-state-12@3
      evaluated_at: 2026-07-16T04:21:00Z
      decision_outcome: selected
      rationale: remote billing_agent selected via AgentCard discovery
    related_node_ids:
      - RoutingDecision
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-routing-decision-a2a
  - id: RoutingDecision-example-openai-handoff
    labels:
      zh: OpenAI handoff 路由决定
      en: OpenAI handoff routing decision
      ja: OpenAI handoff routing decision
    descriptions:
      zh: decision-handoff-042 在 session-support-042 中 transfer_to_billing_agent 后选择 target-billing-agent@3，decision_outcome=redirect。
      en: decision-handoff-042 selects target-billing-agent@3 after transfer_to_billing_agent in session-support-042 with decision_outcome=redirect.
      ja: decision-handoff-042 は transfer_to_billing_agent 後 target 選択を記録します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values:
      routing_decision_id: decision-handoff-042
      input_state_ref: session-support-042@1
      evaluated_at: 2026-07-16T04:22:00Z
      decision_outcome: redirect
      rationale: triage_agent invoked transfer_to_billing_agent
    related_node_ids:
      - RoutingDecision
      - RoutingTarget
      - GateOutcome
    related_relation_ids:
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-routing-decision-openai
  - id: RoutingDecision-example-gate-redirect
    labels:
      zh: 质量门转向人工复核
      en: Quality gate redirect to human review
      ja: quality gate redirect to human review
    descriptions:
      zh: decision-884 应用 policy@7、记录 gate-outcome-884=redirect，04:20 选择 human-review-queue，rationale 含 eval score 低于阈值。
      en: decision-884 applies policy@7, records gate-outcome-884=redirect, selects human-review-queue at 04:20 with rationale citing eval score below threshold.
      ja: decision-884 は gate outcome redirect 後 human-review target を選択します。
    example_source:
      product: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      version: verification gate routing
    field_values:
      routing_decision_id: routing-decision-884
      input_state_ref: workflow-state-77@12
      evaluated_at: 2026-07-16T04:20:00Z
      decision_outcome: redirect
      rationale: quality score below publish threshold
    related_node_ids:
      - RoutingDecision
      - GateOutcome
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-records-GateOutcome
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-routing-decision-design
  - id: RoutingDecision-example-boundary-static-route
    labels:
      zh: 静态 Route 不是决定
      en: Static Route is not decision
      ja: static Route は decision ではない
    descriptions:
      zh: route-billing 声明 billing-intent→billing-worker 映射，但没有 input state、时间或 selection outcome。
      en: route-billing declares billing-intent→billing-worker mapping but has no input state, time, or selection outcome.
      ja: route-billing は mapping spec で decision occurrence ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: route versus decision
    field_values: {}
    related_node_ids:
      - Route
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-routing-decision-design
parent_relation:
  id: RoutingDecision-selects-RoutingTarget
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 选择
    en: selects
    ja: 選択する
  definitions:
    zh: RoutingDecision 在已求值条件、策略、门控结果与目标可用性证据上选定 RoutingTarget，并把目标标识写入决定结果。
    en: A RoutingDecision chooses RoutingTarget from evaluated conditions, policy, gate outcome, and availability evidence and writes its target ID into the decision result.
    ja: RoutingDecision は evaluated condition/policy/gate outcome/availability から RoutingTarget を選び target ID を記録します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由其选择
      en: selected by
      ja: により選択される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RoutingDecision-selects-RoutingTarget-example-positive
      kind: positive
      labels:
        zh: 账单决定选择 billing worker
        en: Billing decision selects billing worker
        ja: billing decision selects billing worker
      descriptions:
        zh: decision-884 在 policy@7 下选择 target-billing-worker。
        en: decision-884 selects target-billing-worker under policy@7.
        ja: decision-884 は target-billing-worker を select します。
      field_values: {}
      related_node_ids:
        - RoutingDecision
        - RoutingTarget
      related_relation_ids:
        - RoutingDecision-selects-RoutingTarget
      source_claims:
        - claim-routing-decision-langgraph
  source_claims:
    - claim-routing-decision-design
  endpoint_order: child-to-parent
relations:
  - id: RoutingDecision-applies-RetryPolicy
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用
      en: applies
      ja: 適用する
    definitions:
      zh: RoutingDecision 在失败后应用 RetryPolicy 版本，结合已用尝试数决定 retry、redirect 或 stop。
      en: After failure, RoutingDecision applies a RetryPolicy revision with attempts used to choose retry, redirect, or stop.
      ja: failure 後 RoutingDecision は RetryPolicy revision を apply し retry/redirect/stop を選びます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: applied_by
      labels:
        zh: 由其应用
        en: applied by
        ja: により適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-applies-RetryPolicy-example-positive
        kind: positive
        labels:
          zh: 超时决定应用重试策略
          en: Timeout decision applies retry policy
          ja: timeout decision applies retry policy
        descriptions:
          zh: decision-timeout-9 在首次超时后应用 retry-api@2，剩余两次尝试。
          en: decision-timeout-9 applies retry-api@2 after first timeout with two attempts remaining.
          ja: decision-timeout-9 は retry-api@2 を apply します。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RetryPolicy
        related_relation_ids:
          - RoutingDecision-applies-RetryPolicy
        source_claims:
          - claim-routing-decision-langgraph
    target: concept:RetryPolicy
  - id: RoutingDecision-applies-RoutingPolicy
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用
      en: applies
      ja: 適用する
    definitions:
      zh: RoutingDecision 在策略有效期内冻结并应用 RoutingPolicy 版本以取得候选路径、条件优先级与无匹配行为。
      en: A RoutingDecision freezes and applies one RoutingPolicy revision within its validity interval to obtain candidate paths, condition precedence, and no-match behavior.
      ja: RoutingDecision は RoutingPolicy revision を freeze/apply します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: applied_by
      labels:
        zh: 由其应用
        en: applied by
        ja: により適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-applies-RoutingPolicy-example-positive
        kind: positive
        labels:
          zh: 决定应用客服路由策略
          en: Decision applies support routing policy
          ja: decision applies support routing policy
        descriptions:
          zh: routing-decision-884 在 04:20 应用 policy-support@7。
          en: routing-decision-884 applies policy-support@7 at 04:20.
          ja: routing-decision-884 は policy-support@7 を apply します。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RoutingPolicy
        related_relation_ids:
          - RoutingDecision-applies-RoutingPolicy
        source_claims:
          - claim-routing-decision-langgraph
    target: concept:RoutingPolicy
  - id: RoutingDecision-evaluates-RoutingCondition
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 求值
      en: evaluates
      ja: 評価する
    definitions:
      zh: RoutingDecision 将 input_state_ref 对应冻结状态绑定到 RoutingCondition 版本并记录结果与时间。
      en: A RoutingDecision binds frozen state referenced by input_state_ref to one RoutingCondition revision and records result and time.
      ja: RoutingDecision は frozen state を RoutingCondition revision に bind し result/time を記録します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 由其求值
        en: evaluated by
        ja: により評価される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingDecision-evaluates-RoutingCondition-example-positive
        kind: positive
        labels:
          zh: 决定求值账单意图
          en: Decision evaluates billing intent
          ja: decision evaluates billing intent
        descriptions:
          zh: decision-884 对 state@12 求值 branch-billing@3，结果为 true。
          en: decision-884 evaluates branch-billing@3 against state@12 and obtains true.
          ja: decision-884 は branch-billing@3 を evaluate し true を得ます。
        field_values: {}
        related_node_ids:
          - RoutingDecision
          - RoutingCondition
        related_relation_ids:
