schema: moonweave.ai/ontology-node/v1
id: RoutingTarget
kind: concept
labels:
  zh: 路由目标
  en: routing target
  ja: ルーティングターゲット
semantics:
  short_definition:
    zh: 可被路由决定选择、且能解析为具体控制流入口的类型化目标引用。
    en: A typed target reference selectable by a routing decision and resolvable to a concrete control-flow entry point.
    ja: routing decision が select でき concrete control-flow entry point に resolve する typed target reference です。
  definition:
    zh: RoutingTarget 是以 routing_target_id、target_type、resolves_to_ref、required_capabilities 与 availability_state 标识的信息对象，表示 LangGraph 目标节点名、CrewAI worker agent、OpenAI handoff 目标 agent 或 A2A AgentCard 远程 endpoint 等可选落点。它只回答“控制可以去哪里”，不是执行主体完整定义，也不证明已选择或已开始执行。
    en: A RoutingTarget is an information object identified by routing_target_id, target_type, resolves_to_ref, required_capabilities, and availability_state, representing LangGraph destination node names, CrewAI worker agents, OpenAI handoff target agents, or A2A AgentCard remote endpoints. It answers only where control may go, not the full executor definition, and does not prove selection or execution occurred.
    ja: RoutingTarget は LangGraph node 名・CrewAI worker・OpenAI handoff agent・A2A AgentCard endpoint 等「control が行ける場所」を表す information object です。
  why_needed:
    zh: 统一类型化目标引用，使 Route 与 RoutingDecision 指向同一可解析对象，并支持 LangGraph 节点名与 A2A endpoint 的对齐映射。
    en: A common typed target reference lets Route and RoutingDecision point to the same resolvable object and aligns LangGraph node names with A2A endpoints.
    ja: common typed target reference により Route/Decision が同じ resolvable object を指し LangGraph node 名と A2A endpoint を整合します。
  includes:
    - zh: 指向 worker、tool、workflow node、protocol adapter、人工队列、A2A remote-agent 或 stop endpoint 的解析引用。
      en: Resolvable references to workers, tools, workflow nodes, protocol adapters, human queues, A2A remote agents, or stop endpoints.
      ja: worker/tool/workflow node/adapter/human queue/A2A remote-agent/stop endpoint reference。
  excludes:
    - zh: 实际 worker 实例、工具定义、一次选择记录、执行尝试和无类型 URL 字符串。
      en: An actual worker instance, tool definition, selection record, execution attempt, and untyped URL string.
      ja: actual worker instance/tool definition/selection record/execution attempt/untyped URL。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangGraph conditional_edges path map 值（如 "billing_handler"）解析为 target_type=worker 的 RoutingTarget，resolves_to_ref 存 graph node 名。A2A AgentCard url 解析为 target_type=remote-agent，resolves_to_ref 存 agent endpoint。OpenAI transfer_to_billing_agent 映射 target_type=worker、resolves_to_ref=billing_agent。availability_state 来自 WorkerAvailability 或 A2A Task 状态探测，不是 Route 本身。
    en: LangGraph conditional_edges path-map values such as "billing_handler" resolve to RoutingTarget with target_type=worker and resolves_to_ref as the graph node name. A2A AgentCard URLs resolve to target_type=remote-agent. OpenAI transfer_to_billing_agent maps to target_type=worker, resolves_to_ref=billing_agent. availability_state comes from WorkerAvailability or A2A Task probes, not from Route itself.
    ja: LangGraph path map 値は worker RoutingTarget、A2A AgentCard は remote-agent RoutingTarget に resolve します。
  typical_input:
    - description: LangGraph destination node name from path map.
      format: |
        routing_target_id: target-billing-worker
        target_type: worker
        resolves_to_ref: billing_handler
      source_claims: [claim-routing-target-langgraph]
    - description: A2A AgentCard remote endpoint.
      format: |
        routing_target_id: target-billing-agent
        target_type: remote-agent
        resolves_to_ref: https://billing.example.com/.well-known/agent-card.json
      source_claims: [claim-routing-target-a2a]
  typical_output:
    - description: Typed routing target reference record.
      format: |
        {
          "routing_target_id": "target-billing-worker",
          "target_type": "worker",
          "resolves_to_ref": "worker:billing-worker-2@5",
          "availability_state": "available"
        }
      source_claims: [claim-routing-target-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Graph node names as routing targets.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: AgentCard endpoints as remote routing targets.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff destination agents as targets.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Worker agents as routing targets in hierarchical crews.
structure:
  identity_keys:
    - routing_target_id
  fields:
    - id: routing_target_id
      labels:
        zh: 路由目标标识
        en: routing-target ID
        ja: routing-target ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可选控制流落点。
        en: Stably identifies one eligible control-flow destination.
        ja: eligible control-flow destination を stable 識別。
      allowed_values: []
      pattern: null
      example_value: target-billing-worker
      source_claims:
        - claim-routing-target-design
    - id: target_type
      labels:
        zh: 目标类型
        en: target type
        ja: target type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定解析结果为 worker、tool、branch、adapter、human、remote-agent、operation 或 stop。
        en: Constrains resolution to worker, tool, branch, adapter, human, remote-agent, operation, or stop.
        ja: worker/tool/branch/adapter/human/remote-agent/operation/stop。
      allowed_values: []
      pattern: null
      example_value: worker
      source_claims:
        - claim-routing-target-langgraph
    - id: resolves_to_ref
      labels:
        zh: 解析引用
        en: resolves-to reference
        ja: resolves-to reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用 LangGraph 节点名、worker 规范、A2A AgentCard URL 或 stop endpoint。
        en: References LangGraph node name, worker specification, A2A AgentCard URL, or stop endpoint.
        ja: LangGraph node 名/worker spec/A2A AgentCard URL/stop endpoint。
      allowed_values: []
      pattern: null
      example_value: worker:billing-worker-2@5
      source_claims:
        - claim-routing-target-a2a
    - id: required_capabilities
      labels:
        zh: 所需能力
        en: required capabilities
        ja: required capabilities
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明选择该目标前必须满足的能力约束。
        en: Declares capability constraints that must hold before selecting the target.
        ja: target selection 前 capability constraint。
      allowed_values: []
      pattern: null
      example_value:
        - billing.read
        - billing.explain
      source_claims:
        - claim-routing-target-design
    - id: availability_state
      labels:
        zh: 可用状态
        en: availability state
        ja: availability state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选生成时目标是 available、degraded、paused 或 unavailable。
        en: Records whether the target is available, degraded, paused, or unavailable when candidates are formed.
        ja: candidate formation 時 available/degraded/paused/unavailable。
      allowed_values: []
      pattern: null
      example_value: available
      source_claims:
        - claim-routing-target-a2a
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingTarget-example-langgraph-node
    labels:
      zh: LangGraph 节点目标
      en: LangGraph node target
      ja: LangGraph node target
    descriptions:
      zh: target-billing-worker@5 类型 worker，resolves_to_ref=billing_handler（LangGraph 节点名），候选生成时 available。
      en: target-billing-worker@5 type worker resolves_to_ref=billing_handler (LangGraph node name), available at candidate formation.
      ja: target-billing-worker@5 は LangGraph node billing_handler に resolve します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: graph node names
    field_values:
      routing_target_id: target-billing-worker
      target_type: worker
      resolves_to_ref: billing_handler
      required_capabilities:
        - billing.read
        - billing.explain
      availability_state: available
    related_node_ids:
      - RoutingTarget
      - Route
    related_relation_ids:
      - Route-points_to-RoutingTarget
    source_claims:
      - claim-routing-target-langgraph
  - id: RoutingTarget-example-a2a-remote
    labels:
      zh: A2A 远程 agent 目标
      en: A2A remote agent target
      ja: A2A remote agent target
    descriptions:
      zh: target-billing-agent@1 类型 remote-agent，resolves_to_ref 为 AgentCard URL，tasks/send 可激活。
      en: target-billing-agent@1 type remote-agent with resolves_to_ref as AgentCard URL activatable via tasks/send.
      ja: target-billing-agent@1 は A2A AgentCard endpoint です。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard, tasks/send
    field_values:
      routing_target_id: target-billing-agent
      target_type: remote-agent
      resolves_to_ref: https://billing.example.com/.well-known/agent-card.json
      availability_state: available
    related_node_ids:
      - RoutingTarget
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-routing-target-a2a
  - id: RoutingTarget-example-openai-handoff
    labels:
      zh: OpenAI handoff 目标 agent
      en: OpenAI handoff target agent
      ja: OpenAI handoff target agent
    descriptions:
      zh: target-billing-agent@3 类型 worker，resolves_to_ref=billing_agent，对应 transfer_to_billing_agent handoff。
      en: target-billing-agent@3 type worker resolves_to_ref=billing_agent for transfer_to_billing_agent handoff.
      ja: target-billing-agent@3 は OpenAI handoff 先 agent です。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values:
      routing_target_id: target-billing-agent
      target_type: worker
      resolves_to_ref: billing_agent
      availability_state: available
    related_node_ids:
      - RoutingTarget
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-target-openai
  - id: RoutingTarget-example-boundary-execution
    labels:
      zh: worker 正在执行不是目标引用
      en: Executing worker is not target reference
      ja: executing worker は target reference ではない
    descriptions:
      zh: worker-run-44 在 04:22 处理请求并调用工具；是 RunAttempt，不是 RoutingTarget。
      en: worker-run-44 processes a request and invokes a tool at 04:22; it is RunAttempt, not RoutingTarget.
      ja: worker-run-44 は execution occurrence で target reference ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: target versus execution
    field_values: {}
    related_node_ids:
      - RunAttempt
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-target-design
parent_relation: null
relations: []
sources:
  - id: langgraph-routing-target
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Graph node names as typed routing targets.
  - id: a2a-routing-target
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: AgentCard remote agent endpoints.
  - id: openai-routing-target
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Handoff destination agents.
  - id: crewai-routing-target
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Worker agents in hierarchical crews.
  - id: routing-target-design
    title: Moonweave routing and gates design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: RoutingTarget as selectable entry reference.
source_claims:
  - id: claim-routing-target-langgraph
    source: langgraph-routing-target
    supports: LangGraph destination node names in edges and conditional_edges are typed routing targets.
    locator: Graph API — Nodes, Edges, conditional routing destinations
    evidence_kind: official
    confidence: high
  - id: claim-routing-target-a2a
    source: a2a-routing-target
    supports: A2A AgentCard URLs identify remote agent endpoints mappable to RoutingTarget resolves_to_ref.
    locator: Specification — AgentCard
    evidence_kind: official
    confidence: high
  - id: claim-routing-target-openai
    source: openai-routing-target
    supports: OpenAI handoff destination agents are routing targets selectable by RoutingDecision.
    locator: Handoffs — transfer_to_* destinations
    evidence_kind: official
    confidence: high
  - id: claim-routing-target-design
    source: routing-target-design
    supports: RoutingTarget is information reference distinct from RoutingDecision and RunAttempt.
    locator: RoutingTarget concept boundary
    evidence_kind: design-inference
    confidence: high
