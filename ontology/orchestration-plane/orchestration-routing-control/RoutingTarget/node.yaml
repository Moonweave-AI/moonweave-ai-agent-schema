schema: moonweave.ai/ontology-node/v1
id: RoutingTarget
kind: concept
labels:
  zh: 路由目标
  en: routing target
  ja: routing target
semantics:
  short_definition:
    zh: 可被路由决定选择、且能解析为具体控制流入口的类型化目标引用。
    en: A typed target reference selectable by a routing decision and resolvable to a concrete control-flow entry point.
    ja: routing decision が select でき concrete control-flow entry point に resolve する typed target reference。
  definition:
    zh: 路由目标是一种可在运行选择前独立存在的信息对象，以目标标识、目标类型、解析引用、能力约束和可用状态为身份，表示 worker、tool、branch、adapter、human queue、operation entry 或 stop endpoint 等可选落点。它只回答“控制可以去哪里”，不是执行主体的完整定义，也不证明“已经选择”或“已经开始执行”。当引用解析到某个操作入口时，后续实际活动仍以独立的 DownstreamOperation 标识、开始时间和状态记录。
    en: A RoutingTarget is an information object that may exist independently before runtime selection, identified by target ID, target type, resolution reference, capability constraints, and availability state. It represents an eligible worker, tool, branch, adapter, human queue, operation entry, or stop endpoint and answers only where control may go. It is neither the full executor definition nor evidence that selection or execution occurred. When it resolves to an operation entry point, the subsequent activity is still recorded separately with a DownstreamOperation ID, start time, and state.
    ja: RoutingTarget は runtime selection 前から独立して存在できる information object で、target ID・type・resolution ref・capability constraint・availability で識別します。worker/tool/branch/adapter/human queue/operation entry/stop endpoint など「control が行ける場所」だけを表し、executor 完全定義や selection/execution occurrence の証明ではありません。operation entry に resolve しても、後続 activity は DownstreamOperation ID・start time・state で別に記録します。
  why_needed:
    zh: 统一类型化目标引用，可以让 Route 与 RoutingDecision 指向同一可解析对象，同时避免把 worker、工具或操作复制进本模块。
    en: A common typed target reference lets Route and RoutingDecision point to the same resolvable object without copying workers, tools, or operations into this module.
    ja: common typed target reference により Route/Decision が同じ resolvable object を指し worker/tool/operation を本 module に複製しません。
  includes:
    - zh: 指向 worker、tool、workflow node、protocol adapter、人工队列、下游操作或停止端点的解析引用。
      en: Resolvable references to workers, tools, workflow nodes, protocol adapters, human queues, downstream operations, or stop endpoints.
      ja: worker・tool・workflow node・adapter・human queue・downstream operation・stop endpoint への resolvable reference。
  excludes:
    - zh: 实际 worker 实例、工具定义、一次选择记录、执行尝试和无类型字符串地址。
      en: An actual worker instance, tool definition, selection record, execution attempt, and untyped string address.
      ja: actual worker instance・tool definition・selection record・execution attempt・untyped string address。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      RoutingTarget 注册表在编译期解析 target_ref 为 LangGraph 节点名、工具 ID、Agents SDK Agent 名或 stop
      endpoint；availability_state 由能力服务刷新。RoutingDecision 只保存 selected_target_ref；Send(node_name)
      使用解析后的 entry_point 派发，不复制 RoutingTarget 定义。
    en: >-
      A RoutingTarget registry resolves target_ref at compile time to LangGraph node names, tool IDs, Agents SDK Agent names,
      or stop endpoints; availability_state refreshes from capability services. RoutingDecision stores only selected_target_ref;
      Send(node_name) dispatches using the resolved entry_point without copying RoutingTarget definition.
    ja: >-
      RoutingTarget registry は compile time に target_ref を LangGraph node 名、tool ID、Agents SDK Agent 名、stop endpoint
      に resolve する。availability_state は capability service から refresh される。RoutingDecision は selected_target_ref のみ
      保存する。Send(node_name) は resolved entry_point で dispatch し RoutingTarget 定義を複製しない。
  typical_input:
    - description:
        zh: 注册可解析控制流入口的类型化目标引用。
        en: A typed target reference registering a resolvable control-flow entry point.
        ja: resolvable control-flow entry point を登録する typed target reference。
      format: |-
        {"routing_target_id":"target:node:approve","target_type":"workflow_node","resolution_ref":"node:approve","capability_constraints":{"required_role":"release-manager"},"availability_state":"available"}
  typical_output:
    - description:
        zh: RoutingDecision 或 Route 引用的已解析目标条目。
        en: A resolved target entry referenced by RoutingDecision or Route.
        ja: RoutingDecision または Route が参照する resolved target entry。
      format: |-
        {"routing_target_ref":"target:node:approve","resolved_entry_point":"node:approve","adapter":"langgraph","available":true}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents named node destinations resolved from routing target references.
    - name: LangGraph Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents dispatch to resolved node names at runtime.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents named agents as routable targets in multi-agent orchestration.
  source_claims:
    - claim-routing-target-001
    - claim-routing-target-003
structure:
  identity_keys:
    - routing_target_id
  fields:
    - id: routing_target_id
      labels:
        zh: 路由目标标识
        en: routing-target ID
        ja: routing-target ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可选控制流落点。
        en: Stably identifies one eligible control-flow destination.
        ja: eligible control-flow destination を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: target-billing-worker
      source_claims:
        - claim-routing-target-001
        - claim-routing-target-002
    - id: target_type
      labels:
        zh: 目标类型
        en: target type
        ja: target type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定解析结果为 worker、tool、branch、adapter、human、operation 或 stop。
        en: Constrains resolution to worker, tool, branch, adapter, human, operation, or stop.
        ja: resolution result を worker/tool/branch/adapter/human/operation/stop に制約します。
      allowed_values: []
      pattern: null
      example_value: worker
      source_claims:
        - claim-routing-target-001
    - id: resolves_to_ref
      labels:
        zh: 解析引用
        en: resolves-to reference
        ja: resolves-to reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由其规范所有模块维护的具体对象或入口。
        en: References the concrete object or entry point maintained by its owning module.
        ja: owner module が管理する concrete object/entry point を参照します。
      allowed_values: []
      pattern: null
      example_value: worker:billing-worker-2@5
      source_claims:
        - claim-routing-target-001
    - id: required_capabilities
      labels:
        zh: 所需能力
        en: required capabilities
        ja: required capabilities
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明选择该目标前必须满足的能力约束。
        en: Declares capability constraints that must hold before selecting the target.
        ja: target selection 前に満たす capability constraint を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - billing.read
        - billing.explain
      source_claims:
        - claim-routing-target-002
    - id: availability_state
      labels:
        zh: 可用状态
        en: availability state
        ja: availability state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选生成时目标是可用、降级、暂停或不可用。
        en: Records whether the target is available, degraded, paused, or unavailable when candidates are formed.
        ja: candidate formation 時の available/degraded/paused/unavailable を記録します。
      allowed_values: []
      pattern: null
      example_value: available
      source_claims:
        - claim-routing-target-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: routing-target-langgraph-node-name
    labels:
      zh: RoutingTarget positive
      en: RoutingTarget positive
      ja: RoutingTarget positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingTarget 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingTarget router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingTarget から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {target_id: human_review, target_kind: worker_node, graph_node: human_review}

    related_node_ids:
      - RoutingTarget
      - Route
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-routing-target-001

  - id: routing-target-semantic-router-handler
    labels:
      zh: RoutingTarget positive
      en: RoutingTarget positive
      ja: RoutingTarget positive
    descriptions:
      zh: LiteLLM 映射 RoutingTarget LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps RoutingTarget LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM RoutingTarget: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {target_id: billing_handler, handler_ref: billing_handler}

    related_node_ids:
      - RoutingTarget
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-target-001

  - id: routing-target-openai-subagent
    labels:
      zh: RoutingTarget positive
      en: RoutingTarget positive
      ja: RoutingTarget positive
    descriptions:
      zh: A2A Protocol 映射 RoutingTarget：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps RoutingTarget: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol RoutingTarget: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {target_id: billing_agent, target_kind: agent, name: "Billing agent"}

    related_node_ids:
      - RoutingTarget
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-routing-target-001

  - id: routing-target-langgraph-send-worker
    labels:
      zh: RoutingTarget positive
      en: RoutingTarget positive
      ja: RoutingTarget positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingTarget 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingTarget router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingTarget から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {target_id: worker, target_kind: graph_node, api: Send}

    related_node_ids:
      - RoutingTarget
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-routing-target-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-routing-target-001
    source: langgraph-graph-api
    supports: RoutingTarget core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-routing-target-002
    source: opa-policy-language
    supports: RoutingTarget boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-routing-target-003
    source: langgraph-graph-api
    supports: RoutingTarget field or status vocabulary is a Moonweave audit projection informed by LangGraph Graph API.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
