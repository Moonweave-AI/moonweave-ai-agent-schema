schema: moonweave.ai/ontology-node/v1
id: DownstreamOperation
kind: concept
status: accepted
labels:
  zh: 下游操作
  en: downstream operation
  ja: downstream operation
semantics:
  short_definition:
    zh: 在路由或门控结果允许后实际启动的有界下游执行活动。
    en: A bounded downstream execution activity actually started after a routing or gate outcome permits it.
    ja: routing/gate outcome の許可後に実際に開始する bounded downstream execution activity。
  definition:
    zh: 下游操作是一种有时限活动，以操作标识、操作类型、执行入口、开始时间和执行状态为身份，表示 GateOutcome 触发后真正发生的发布、调用、转交、停止或其他运行步骤。RoutingTarget 只是可在执行前存在、并解析到入口的信息引用；两者即使指向同一入口，也不构成子类关系。只有触发结果、入口、开始时间与执行状态能够核对时，才建立 GateOutcome→DownstreamOperation 的因果事实。
    en: A DownstreamOperation is a time-bounded activity identified by operation ID, operation type, execution entry point, start time, and execution state, representing publication, invocation, handoff, stop, or another runtime step actually initiated by a GateOutcome. RoutingTarget is only an information reference that may exist before execution and resolve to an entry point; sharing that entry point does not create a subclass relation. The GateOutcome→DownstreamOperation causal fact is asserted only when outcome, entry point, start time, and execution state reconcile.
    ja: DownstreamOperation は operation ID・type・entry point・start time・state で識別する time-bounded activity で、GateOutcome 後に実際に始まる publish/invoke/handoff/stop step です。RoutingTarget は実行前から存在でき entry point に resolve する information reference にすぎず、同じ entry を指しても subtype 関係にはなりません。outcome・entry・start time・state を照合できる場合だけ GateOutcome→DownstreamOperation causal fact を立てます。
  why_needed:
    zh: 把实际下游活动显式化，门控闭环才能从条件、求值、结果、决定一直追到被触发的执行。
    en: Making the actual downstream activity explicit closes traceability from condition through evaluation, outcome, and decision to execution.
    ja: actual downstream activity を明示し condition→evaluation→outcome→decision→execution の traceability を閉じます。
  includes:
    - zh: 发布输出、启动工具调用、转交人工、进入后续工作流节点和执行会话停止。
      en: Publishing output, starting a tool call, handing off to a human, entering a subsequent workflow node, and executing session stop.
      ja: output publish・tool call start・human handoff・next workflow node・session stop execution。
  excludes:
    - zh: 静态目标引用、未发生的计划步骤、门控结果记录、路由条件和整个工作流定义。
      en: A static target reference, unexecuted planned step, gate-outcome record, routing condition, and whole workflow definition.
      ja: static target ref・unexecuted plan step・gate outcome・routing condition・whole workflow definition。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - downstream_operation_id
  fields:
    - id: downstream_operation_id
      labels:
        zh: 下游操作标识
        en: downstream-operation ID
        ja: downstream-operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次被触发的下游活动。
        en: Stably identifies one triggered downstream activity.
        ja: triggered downstream activity を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: operation-human-review-884
      source_claims:
        - claim-downstream-operation-002
    - id: operation_type
      labels:
        zh: 操作类型
        en: operation type
        ja: operation type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 publish、invoke、handoff、continue 或 stop 等动作类别。
        en: Declares an action category such as publish, invoke, handoff, continue, or stop.
        ja: publish・invoke・handoff・continue・stop 等の action category を宣言します。
      allowed_values: []
      pattern: null
      example_value: handoff
      source_claims:
        - claim-downstream-operation-001
    - id: execution_entry_ref
      labels:
        zh: 执行入口引用
        en: execution-entry reference
        ja: execution-entry reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收控制权的运行入口。
        en: References the runtime entry point that actually receives control.
        ja: control を実際に受け取る runtime entry point を参照します。
      allowed_values: []
      pattern: null
      example_value: human-queue:quality-review
      source_claims:
        - claim-downstream-operation-001
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录下游活动开始接收控制权的时间。
        en: Records when the downstream activity began receiving control.
        ja: downstream activity が control を受け始めた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:03Z
      source_claims:
        - claim-downstream-operation-002
    - id: execution_state
      labels:
        zh: 执行状态
        en: execution state
        ja: execution state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 cancelled。
        en: Records queued, running, completed, failed, or cancelled.
        ja: queued・running・completed・failed・cancelled を記録します。
      allowed_values: []
      pattern: null
      example_value: queued
      source_claims:
        - claim-downstream-operation-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: DownstreamOperation-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 转交人工质量复核
      en: Handoff to human quality review
      ja: human quality-review handoff
    scenario_id: null
    descriptions:
      zh: operation-human-review-884 因 gate-outcome-884=redirect 于 04:20:03 将控制权交给 quality-review 队列，状态为 queued。
      en: operation-human-review-884 receives gate-outcome-884=redirect and hands control to the quality-review queue at 04:20:03 with state queued.
      ja: operation-human-review-884 は gate-outcome-884=redirect により 04:20:03 quality-review queue へ control を渡し queued です。
    field_values:
      downstream_operation_id: operation-human-review-884
      operation_type: handoff
      execution_entry_ref: human-queue:quality-review
      started_at: 2026-07-16T04:20:03Z
      execution_state: queued
    related_node_ids:
      - DownstreamOperation
      - GateOutcome
    related_relation_ids:
      - GateOutcome-triggers-DownstreamOperation
    expected_result:
      zh: 建立一次有时间与状态的下游活动。
      en: Create one downstream activity with time and execution state.
      ja: time/state を持つ downstream activity occurrence を作成します。
    why_valid_or_invalid:
      zh: 实际入口、开始时间和状态证明执行已被触发。
      en: Concrete entry point, start time, and state prove that execution was triggered.
      ja: entry point・start time・state が execution trigger を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-downstream-operation-001
      - claim-downstream-operation-002
  - id: DownstreamOperation-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 人工复核候选目标
      en: Human-review candidate target
      ja: human-review candidate target
    scenario_id: routing-review-downstreamoperation-boundary
    descriptions:
      zh: target-human-review 仅解析到 quality-review 队列并声明可用，没有开始时间、状态或触发结果。
      en: target-human-review only resolves to the quality-review queue and declares availability; it has no start time, execution state, or triggering outcome.
      ja: target-human-review は quality-review queue に resolve し availability を宣言するだけで start time/state/trigger outcome はありません。
    field_values: {}
    related_node_ids:
      - RoutingTarget
      - DownstreamOperation
    related_relation_ids: []
    expected_result:
      zh: 只保留 RoutingTarget，不创建 DownstreamOperation。
      en: Keep only a RoutingTarget; do not create a DownstreamOperation.
      ja: RoutingTarget のみとし DownstreamOperation を作りません。
    why_valid_or_invalid:
      zh: 候选入口不证明下游活动已经发生。
      en: An eligible entry point does not prove that downstream activity occurred.
      ja: eligible entry point は downstream activity occurrence を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-downstream-operation-001
      - claim-downstream-operation-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: GateOutcome-triggers-DownstreamOperation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 触发
    en: triggers
    ja: 起動する
  definitions:
    zh: 一个可执行的 GateOutcome 使相应 DownstreamOperation 获得控制权并开始；目标操作、触发结果和开始时间必须一致。
    en: An actionable GateOutcome causes the corresponding DownstreamOperation to receive control and start; target operation, triggering outcome, and start time must agree.
    ja: actionable GateOutcome により corresponding DownstreamOperation が control を受け start し target・outcome・start time が一致します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由其触发
      en: triggered by
      ja: により起動される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: GateOutcome-triggers-DownstreamOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 转向结果触发人工复核
        en: Redirect outcome triggers human review
        ja: redirect outcome triggers human review
      scenario_id: routing-relation-gateoutcome-triggers-downstreamoperation-positive
      descriptions:
        zh: gate-outcome-884=redirect 在 04:20:03 触发 operation-human-review-884。
        en: gate-outcome-884=redirect triggers operation-human-review-884 at 04:20:03.
        ja: gate-outcome-884=redirect は 04:20:03 operation-human-review-884 を trigger します。
      field_values: {}
      related_node_ids:
        - GateOutcome
        - DownstreamOperation
      related_relation_ids:
        - GateOutcome-triggers-DownstreamOperation
      expected_result:
        zh: 建立结果到实际操作的因果边。
        en: Create the causal edge from outcome to actual operation.
        ja: outcome から actual operation への causal edge を作成します。
      why_valid_or_invalid:
        zh: 操作记录明确引用触发结果并在其后开始。
        en: The operation explicitly references the triggering outcome and starts afterward.
        ja: operation は triggering outcome を参照し後に start します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-downstream-operation-001
        - claim-downstream-operation-002
    - id: GateOutcome-triggers-DownstreamOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 允许结果后客户端断开
        en: Client disconnects after allow outcome
        ja: client disconnects after allow outcome
      scenario_id: routing-relation-gateoutcome-triggers-downstreamoperation-boundary
      descriptions:
        zh: outcome-885=allow，但发送操作没有开始时间或执行状态。
        en: outcome-885=allow, but the delivery operation has no start time or execution state.
        ja: outcome-885=allow でも delivery operation に start time/state がありません。
      field_values: {}
      related_node_ids:
        - GateOutcome
        - DownstreamOperation
      related_relation_ids:
        - GateOutcome-triggers-DownstreamOperation
      expected_result:
        zh: 保留结果，不断言触发成功。
        en: Keep the outcome but do not assert successful triggering.
        ja: outcome を保持し successful trigger を assert しません。
      why_valid_or_invalid:
        zh: 获得允许结果并不等于下游入口已经接收控制并开始执行。
        en: Allow does not mean downstream control was received.
        ja: allow は downstream control received を意味しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-downstream-operation-001
        - claim-downstream-operation-002
  source_claims:
    - claim-downstream-operation-001
    - claim-downstream-operation-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
