schema: moonweave.ai/ontology-node/v1
id: DownstreamOperation
kind: concept
labels:
  zh: 下游操作
  en: downstream operation
  ja: downstream operation
semantics:
  short_definition:
    zh: 在路由或门控结果允许后实际启动的有界下游执行活动。
    en: A bounded downstream execution activity actually started after a routing or gate outcome permits it.
    ja: routing/gate outcome の許可後に実際に開始する bounded downstream execution activity。
  definition:
    zh: 下游操作是一种有时限活动，以操作标识、操作类型、执行入口、开始时间和执行状态为身份，表示 GateOutcome 触发后真正发生的发布、调用、转交、停止或其他运行步骤。RoutingTarget 只是可在执行前存在、并解析到入口的信息引用；两者即使指向同一入口，也不构成子类关系。只有触发结果、入口、开始时间与执行状态能够核对时，才建立 GateOutcome→DownstreamOperation 的因果事实。
    en: A DownstreamOperation is a time-bounded activity identified by operation ID, operation type, execution entry point, start time, and execution state, representing publication, invocation, handoff, stop, or another runtime step actually initiated by a GateOutcome. RoutingTarget is only an information reference that may exist before execution and resolve to an entry point; sharing that entry point does not create a subclass relation. The GateOutcome→DownstreamOperation causal fact is asserted only when outcome, entry point, start time, and execution state reconcile.
    ja: DownstreamOperation は operation ID・type・entry point・start time・state で識別する time-bounded activity で、GateOutcome 後に実際に始まる publish/invoke/handoff/stop step です。RoutingTarget は実行前から存在でき entry point に resolve する information reference にすぎず、同じ entry を指しても subtype 関係にはなりません。outcome・entry・start time・state を照合できる場合だけ GateOutcome→DownstreamOperation causal fact を立てます。
  why_needed:
    zh: 把实际下游活动显式化，门控闭环才能从条件、求值、结果、决定一直追到被触发的执行。
    en: Making the actual downstream activity explicit closes traceability from condition through evaluation, outcome, and decision to execution.
    ja: actual downstream activity を明示し condition→evaluation→outcome→decision→execution の traceability を閉じます。
  includes:
    - zh: 发布输出、启动工具调用、转交人工、进入后续工作流节点和执行会话停止。
      en: Publishing output, starting a tool call, handing off to a human, entering a subsequent workflow node, and executing session stop.
      ja: output publish・tool call start・human handoff・next workflow node・session stop execution。
  excludes:
    - zh: 静态目标引用、未发生的计划步骤、门控结果记录、路由条件和整个工作流定义。
      en: A static target reference, unexecuted planned step, gate-outcome record, routing condition, and whole workflow definition.
      ja: static target ref・unexecuted plan step・gate outcome・routing condition・whole workflow definition。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      allow/redirect 的 GateOutcome 触发调度器启动 DownstreamOperation：LangGraph Command(goto=...) 或
      Send(node_name, state) 进入目标节点；Agents SDK handoff 启动下游 Agent Runner。操作以独立
      downstream_operation_id 记录 started_at 与 status；RoutingTarget 解析引用不等于操作已开始。
    en: >-
      allow/redirect GateOutcome triggers a scheduler to start DownstreamOperation: LangGraph Command(goto=...) or
      Send(node_name, state) enters the target node; Agents SDK handoff starts a downstream Agent Runner. The operation
      records started_at and status under a distinct downstream_operation_id; RoutingTarget resolution does not prove
      start.
    ja: >-
      allow/redirect GateOutcome は scheduler に DownstreamOperation 開始を trigger する。LangGraph Command(goto=...) または
      Send(node_name, state) で target node に入り、Agents SDK handoff は downstream Agent Runner を起動する。operation は
      独立 downstream_operation_id で started_at と status を記録する。RoutingTarget resolve は start を証明しない。
  typical_input:
    - description:
        zh: 允许继续的 GateOutcome 与解析后的 RoutingTarget 入口。
        en: An allow GateOutcome and resolved RoutingTarget entry point.
        ja: allow GateOutcome と resolved RoutingTarget entry point。
      format: |-
        {"gate_outcome_id":"go-902","result":"allow","routing_target_ref":"target:tool:ledger.publish","entry_point":"node:publish","routing_decision_ref":"rd-885"}
  typical_output:
    - description:
        zh: 已启动的下游操作活动记录，含开始时间与运行状态。
        en: A started downstream operation activity record with start time and runtime status.
        ja: start time と runtime status を持つ started downstream operation activity record。
      format: |-
        {"downstream_operation_id":"dop-771","operation_type":"invoke_tool","entry_point":"node:publish","started_at":"2026-07-16T09:12:05Z","status":"running","triggered_by_gate_outcome":"go-902"}
  reference_implementations:
    - name: LangGraph Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents dynamic dispatch to named nodes as downstream execution entry.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents goto transitions that start downstream graph steps after gate allow.
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents transferring control to another agent as a downstream operation.
  source_claims:
    - claim-downstream-operation-001
    - claim-downstream-operation-002
structure:
  identity_keys:
    - downstream_operation_id
  fields:
    - id: downstream_operation_id
      labels:
        zh: 下游操作标识
        en: downstream-operation ID
        ja: downstream-operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次被触发的下游活动。
        en: Stably identifies one triggered downstream activity.
        ja: triggered downstream activity を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: operation-human-review-884
      source_claims:
        - claim-downstream-operation-002
    - id: operation_type
      labels:
        zh: 操作类型
        en: operation type
        ja: operation type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 publish、invoke、handoff、continue 或 stop 等动作类别。
        en: Declares an action category such as publish, invoke, handoff, continue, or stop.
        ja: publish・invoke・handoff・continue・stop 等の action category を宣言します。
      allowed_values: []
      pattern: null
      example_value: handoff
      source_claims:
        - claim-downstream-operation-001
    - id: execution_entry_ref
      labels:
        zh: 执行入口引用
        en: execution-entry reference
        ja: execution-entry reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收控制权的运行入口。
        en: References the runtime entry point that actually receives control.
        ja: control を実際に受け取る runtime entry point を参照します。
      allowed_values: []
      pattern: null
      example_value: human-queue:quality-review
      source_claims:
        - claim-downstream-operation-001
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录下游活动开始接收控制权的时间。
        en: Records when the downstream activity began receiving control.
        ja: downstream activity が control を受け始めた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:03Z
      source_claims:
        - claim-downstream-operation-002
    - id: execution_state
      labels:
        zh: 执行状态
        en: execution state
        ja: execution state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 cancelled。
        en: Records queued, running, completed, failed, or cancelled.
        ja: queued・running・completed・failed・cancelled を記録します。
      allowed_values: []
      pattern: null
      example_value: queued
      source_claims:
        - claim-downstream-operation-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: downstream-opa-allow-deploy
    labels:
      zh: DownstreamOperation positive
      en: DownstreamOperation positive
      ja: DownstreamOperation positive
    descriptions:
      zh: Prefect 数据流编排映射 DownstreamOperation：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps DownstreamOperation: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect DownstreamOperation: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {operation_id: op-deploy-v2, operation_kind: node_invoke, target_ref: deploy}

    related_node_ids:
      - DownstreamOperation
      - GateOutcome
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-001

  - id: downstream-langgraph-resume-human
    labels:
      zh: DownstreamOperation positive
      en: DownstreamOperation positive
      ja: DownstreamOperation positive
    descriptions:
      zh: Temporal 持久化工作流映射 DownstreamOperation：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps DownstreamOperation: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal DownstreamOperation: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {operation_id: op-resume-human-review, operation_kind: resume, target_ref: human_review}

    related_node_ids:
      - DownstreamOperation
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-001

  - id: downstream-openai-handoff-billing
    labels:
      zh: DownstreamOperation positive
      en: DownstreamOperation positive
      ja: DownstreamOperation positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 DownstreamOperation 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as DownstreamOperation router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が DownstreamOperation から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {operation_id: op-run-billing-agent, operation_kind: agent_run, target_ref: billing_agent}

    related_node_ids:
      - DownstreamOperation
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-001

  - id: downstream-block-no-op
    labels:
      zh: DownstreamOperation positive
      en: DownstreamOperation positive
      ja: DownstreamOperation positive
    descriptions:
      zh: Prefect 数据流编排映射 DownstreamOperation：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps DownstreamOperation: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect DownstreamOperation: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {operation_kind: none, gate_outcome_ref: gate-outcome-901}

    related_node_ids:
      - DownstreamOperation
      - GateOutcome
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-downstream-operation-001
    source: langgraph-graph-api
    supports: DownstreamOperation core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-downstream-operation-002
    source: opa-policy-language
    supports: DownstreamOperation boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
