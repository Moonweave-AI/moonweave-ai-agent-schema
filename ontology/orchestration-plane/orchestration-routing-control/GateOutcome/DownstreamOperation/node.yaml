schema: moonweave.ai/ontology-node/v1
id: DownstreamOperation
kind: concept
labels:
  zh: 下游操作
  en: downstream operation
  ja: 下流操作
semantics:
  short_definition:
    zh: 路由或门控结果允许后实际启动的有界下游执行活动。
    en: A bounded downstream execution activity actually started after a routing or gate outcome permits it.
    ja: routing/gate outcome の許可後に実際に開始する bounded downstream execution activity です。
  definition:
    zh: DownstreamOperation 是以 downstream_operation_id、operation_type、execution_entry_ref、started_at 与 execution_state 标识的有时限活动，表示 GateOutcome 或 RoutingDecision 触发后真正发生的发布、调用、转交、停止或其他运行步骤。LangGraph Command(goto=...) 后的节点执行、A2A tasks/send 激活的远程任务、OpenAI handoff 后的 agent 循环均可产生 DownstreamOperation。RoutingTarget 只是执行前存在的入口引用；同入口不构成子类关系。
    en: A DownstreamOperation is a time-bounded activity identified by operation ID, operation type, execution entry reference, start time, and execution state, representing publication, invocation, handoff, stop, or another runtime step actually initiated after a GateOutcome or RoutingDecision. LangGraph execution after Command(goto=...), A2A tasks/send activated remote tasks, and OpenAI agent loops after handoff may produce DownstreamOperation. RoutingTarget is only a pre-execution entry reference; sharing an entry point does not create a subclass relation.
    ja: DownstreamOperation は operation ID・type・entry point・start time・state で識別する time-bounded activity で GateOutcome/RoutingDecision 後に実際に始まる publish/invoke/handoff/stop step です。LangGraph Command 後 node execution、A2A tasks/send、OpenAI handoff 後 agent loop が DownstreamOperation を生成できます。
  why_needed:
    zh: 显式记录被触发的下游活动，使门控与路由闭环可从条件、求值、结果、决定一直追到实际执行。
    en: Explicit downstream activity records close traceability from condition through evaluation, outcome, and decision to actual execution.
    ja: downstream activity を明示し condition→evaluation→outcome→decision→execution の traceability を閉じます。
  includes:
    - zh: 发布输出、启动工具调用、转交人工、进入后续工作流节点、A2A 远程任务激活和执行会话停止。
      en: Publishing output, starting tool calls, handing off to humans, entering subsequent workflow nodes, A2A remote task activation, and session stop execution.
      ja: output publish・tool call start・human handoff・next workflow node・A2A remote task・session stop execution。
  excludes:
    - zh: 静态目标引用、未发生的计划步骤、门控结果记录、路由条件和整个工作流定义。
      en: Static target references, unexecuted planned steps, gate-outcome records, routing conditions, and whole workflow definitions.
      ja: static target ref・unexecuted plan step・gate outcome・routing condition・whole workflow definition。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: GateOutcome=redirect 且 RoutingDecision 选中 human-review 目标后，创建 operation_type=handoff 的 DownstreamOperation 并写入 started_at。LangGraph 中 Command(goto="billing_handler") 后的 billing_handler 节点首次接收控制即 downstream 活动。A2A tasks/get 返回 TASK_STATE_WORKING 表示 remote downstream 已开始。allow 结果不等于 downstream 已启动——必须有 started_at 与 execution_state。
    en: After GateOutcome=redirect and RoutingDecision selects a human-review target, create DownstreamOperation with operation_type=handoff and started_at. In LangGraph, the billing_handler node first receiving control after Command(goto="billing_handler") is a downstream activity. A2A tasks/get returning TASK_STATE_WORKING shows remote downstream started. allow alone does not prove downstream started—started_at and execution_state are required.
    ja: GateOutcome=redirect かつ RoutingDecision が human-review target を選んだ後 handoff DownstreamOperation を作成します。LangGraph Command 後の node 初回 control 受領も downstream activity です。allow だけでは downstream start を証明しません。
  typical_input:
    - description: Triggering gate outcome and selected target.
      format: |
        gate_outcome_id: gate-outcome-884
        gate_result: redirect
        selected_target_ref: human-queue:quality-review
      source_claims: [claim-downstream-operation-design]
  typical_output:
    - description: Started downstream operation record.
      format: |
        {
          "downstream_operation_id": "operation-human-review-884",
          "operation_type": "handoff",
          "execution_entry_ref": "human-queue:quality-review",
          "started_at": "2026-07-16T04:20:03Z",
          "execution_state": "queued"
        }
      source_claims: [claim-downstream-operation-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node execution after Command(goto=...) as downstream activity.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send activation and TASK_STATE_WORKING as downstream start.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Agent loop continuation after handoff as downstream operation.
structure:
  identity_keys:
    - downstream_operation_id
  fields:
    - id: downstream_operation_id
      labels:
        zh: 下游操作标识
        en: downstream-operation ID
        ja: downstream-operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次被触发的下游活动。
        en: Stably identifies one triggered downstream activity.
        ja: triggered downstream activity を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: operation-human-review-884
      source_claims:
        - claim-downstream-operation-design
    - id: operation_type
      labels:
        zh: 操作类型
        en: operation type
        ja: operation type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 publish、invoke、handoff、continue 或 stop 等动作类别。
        en: Declares an action category such as publish, invoke, handoff, continue, or stop.
        ja: publish・invoke・handoff・continue・stop 等 action category。
      allowed_values: []
      pattern: null
      example_value: handoff
      source_claims:
        - claim-downstream-operation-langgraph
    - id: execution_entry_ref
      labels:
        zh: 执行入口引用
        en: execution-entry reference
        ja: execution-entry reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收控制权的运行入口。
        en: References the runtime entry point that actually receives control.
        ja: control を実際に受け取る runtime entry point を参照します。
      allowed_values: []
      pattern: null
      example_value: human-queue:quality-review
      source_claims:
        - claim-downstream-operation-langgraph
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录下游活动开始接收控制权的时间。
        en: Records when the downstream activity began receiving control.
        ja: downstream activity が control を受け始めた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:03Z
      source_claims:
        - claim-downstream-operation-design
    - id: execution_state
      labels:
        zh: 执行状态
        en: execution state
        ja: execution state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 cancelled。
        en: Records queued, running, completed, failed, or cancelled.
        ja: queued・running・completed・failed・cancelled を記録します。
      allowed_values: []
      pattern: null
      example_value: queued
      source_claims:
        - claim-downstream-operation-a2a
  constraints: []
  required_relation_constraints: []
examples:
  - id: DownstreamOperation-example-handoff-human
    labels:
      zh: 转向人工质量复核
      en: Handoff to human quality review
      ja: human quality review handoff
    descriptions:
      zh: operation-human-review-884 因 gate-outcome-884=redirect 于 04:20:03 将控制权交给 quality-review 队列，状态 queued。
      en: operation-human-review-884 receives gate-outcome-884=redirect and hands control to the quality-review queue at 04:20:03 with state queued.
      ja: operation-human-review-884 は redirect outcome により 04:20:03 quality-review queue へ control を渡します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Command goto downstream execution
    field_values:
      downstream_operation_id: operation-human-review-884
      operation_type: handoff
      execution_entry_ref: human-queue:quality-review
      started_at: 2026-07-16T04:20:03Z
      execution_state: queued
    related_node_ids:
      - DownstreamOperation
      - GateOutcome
    related_relation_ids:
      - GateOutcome-triggers-DownstreamOperation
    source_claims:
      - claim-downstream-operation-design
  - id: DownstreamOperation-example-a2a-remote
    labels:
      zh: A2A 远程任务激活
      en: A2A remote task activation
      ja: A2A remote task 活性化
    descriptions:
      zh: operation-a2a-551 在 tasks/send 后于 04:21 启动 billing_agent，execution_state=running，tasks/get 返回 TASK_STATE_WORKING。
      en: operation-a2a-551 starts billing_agent at 04:21 after tasks/send with execution_state=running; tasks/get returns TASK_STATE_WORKING.
      ja: operation-a2a-551 は tasks/send 後 04:21 billing_agent を running で開始します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: tasks/send, tasks/get
    field_values:
      downstream_operation_id: operation-a2a-551
      operation_type: invoke
      execution_entry_ref: agent:billing-agent@1
      started_at: 2026-07-16T04:21:00Z
      execution_state: running
    related_node_ids:
      - DownstreamOperation
      - RoutingTarget
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-a2a
  - id: DownstreamOperation-example-openai-handoff
    labels:
      zh: OpenAI handoff 后继续执行
      en: OpenAI handoff continuation
      ja: OpenAI handoff 継続実行
    descriptions:
      zh: operation-handoff-042 在 transfer_to_billing_agent 后于 04:22 启动 billing_agent 循环，execution_state=running。
      en: operation-handoff-042 starts the billing_agent loop at 04:22 after transfer_to_billing_agent with execution_state=running.
      ja: operation-handoff-042 は transfer_to_billing_agent 後 04:22 billing_agent loop を running で開始します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values:
      downstream_operation_id: operation-handoff-042
      operation_type: continue
      execution_entry_ref: agent:billing_agent
      started_at: 2026-07-16T04:22:00Z
      execution_state: running
    related_node_ids:
      - DownstreamOperation
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-openai
  - id: DownstreamOperation-example-boundary-target
    labels:
      zh: 候选目标不是下游操作
      en: Candidate target is not downstream operation
      ja: 候補 target は downstream operation ではない
    descriptions:
      zh: target-human-review 仅解析到 quality-review 队列并声明可用，没有 started_at、execution_state 或触发结果。
      en: target-human-review only resolves to the quality-review queue and declares availability; it has no start time, execution state, or triggering outcome.
      ja: target-human-review は queue に resolve するだけで start time/state/trigger outcome がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: target versus operation
    field_values: {}
    related_node_ids:
      - RoutingTarget
      - DownstreamOperation
    related_relation_ids: []
    source_claims:
      - claim-downstream-operation-design
parent_relation:
  id: GateOutcome-triggers-DownstreamOperation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 触发
    en: triggers
    ja: 起動する
  definitions:
    zh: 可执行的 GateOutcome 使相应 DownstreamOperation 获得控制权并开始；目标操作、触发结果和开始时间必须一致。
    en: An actionable GateOutcome causes the corresponding DownstreamOperation to receive control and start; target operation, triggering outcome, and start time must agree.
    ja: actionable GateOutcome により DownstreamOperation が control を受け start し target・outcome・start time が一致します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由其触发
      en: triggered by
      ja: により起動される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: GateOutcome-triggers-DownstreamOperation-example-positive
      kind: positive
      labels:
        zh: 转向结果触发人工复核
        en: Redirect outcome triggers human review
        ja: redirect outcome triggers human review
      descriptions:
        zh: gate-outcome-884=redirect 在 04:20:03 触发 operation-human-review-884。
        en: gate-outcome-884=redirect triggers operation-human-review-884 at 04:20:03.
        ja: gate-outcome-884=redirect は 04:20:03 operation-human-review-884 を trigger します。
      field_values: {}
      related_node_ids:
        - GateOutcome
        - DownstreamOperation
      related_relation_ids:
        - GateOutcome-triggers-DownstreamOperation
      source_claims:
        - claim-downstream-operation-design
  source_claims:
    - claim-downstream-operation-design
  endpoint_order: parent-to-child
relations: []
sources:
  - id: langgraph-downstream
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Node execution after Command routing as downstream activity.
  - id: a2a-downstream
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send and Task state as downstream operation evidence.
  - id: openai-downstream
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Agent loop continuation after handoff.
  - id: downstream-operation-design
    title: Moonweave routing and gates design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: DownstreamOperation distinct from RoutingTarget reference.
source_claims:
  - id: claim-downstream-operation-langgraph
    source: langgraph-downstream
    supports: LangGraph Command(goto=...) routes control to a node whose execution is a downstream operation occurrence.
    locator: Graph API — Command, goto
    evidence_kind: official
    confidence: high
  - id: claim-downstream-operation-a2a
    source: a2a-downstream
    supports: A2A Task state transitions after tasks/send evidence downstream operation start.
    locator: Specification — tasks/send, tasks/get, Task state
    evidence_kind: official
    confidence: high
  - id: claim-downstream-operation-openai
    source: openai-downstream
    supports: OpenAI handoff transfers control to another agent loop as downstream operation.
    locator: Handoffs — transfer_to_*
    evidence_kind: official
    confidence: high
  - id: claim-downstream-operation-design
    source: downstream-operation-design
    supports: DownstreamOperation is time-bounded activity distinct from RoutingTarget information reference.
    locator: DownstreamOperation concept boundary
    evidence_kind: design-inference
    confidence: high
