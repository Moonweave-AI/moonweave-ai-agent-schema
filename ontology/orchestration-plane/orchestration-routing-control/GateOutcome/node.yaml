schema: moonweave.ai/ontology-node/v1
id: GateOutcome
kind: concept
labels:
  zh: 门控结果
  en: gate outcome
  ja: ゲート結果
semantics:
  short_definition:
    zh: 一次门控求值产生的 allow、block、redirect、retry、escalate 或 stop 记录。
    en: A record of allow, block, redirect, retry, escalate, or stop produced by one gate evaluation.
    ja: one gate evaluation が生成した allow/block/redirect/retry/escalate/stop record です。
  definition:
    zh: GateOutcome 是以 gate_outcome_id、gate_ref、result、evidence_refs 与 produced_at 标识的信息记录，证明某个 Gate 对一组条件和证据完成了一次求值。它对应 pass/fail/escalate 等运行时决定：LangGraph interrupt resume 值、CrewAI 人工输入结果、Cursor 验证通过/失败均可投影为此记录。RoutingDecision 可引用它并触发 DownstreamOperation，但它不是 Gate 能力、RoutingCondition 或长期策略。
    en: A GateOutcome is an information record identified by gate_outcome_id, gate_ref, result, evidence_refs, and produced_at, proving that a Gate completed one evaluation over conditions and evidence. It corresponds to pass/fail/escalate runtime decisions; LangGraph interrupt resume values, CrewAI human-input results, and Cursor verification pass/fail may project here. RoutingDecision may record it and trigger DownstreamOperation, but it is not a Gate capability, RoutingCondition, or durable policy.
    ja: GateOutcome は outcome ID・gate ref・result・evidence ref・produced time で識別し Gate の one evaluation を証明する information record です。pass/fail/escalate 等 runtime decision に対応し LangGraph resume 値・CrewAI human input・Cursor 検証結果を写像できます。
  why_needed:
    zh: 结果独立于能力和决定，可保留相同 Gate 多次求值的不同证据，并支撑 pass/fail/escalate 审计链。
    en: Keeping outcome separate from capability and decision preserves different evidence across repeated evaluations and supports pass/fail/escalate audit chains.
    ja: outcome を capability/decision と分け repeated evaluation evidence と pass/fail/escalate audit chain を保持します。
  includes:
    - zh: 带求值证据和时间的 allow、block、redirect、retry、escalate、defer 或 stop 结果。
      en: Allow, block, redirect, retry, escalate, defer, or stop results with evaluation evidence and time.
      ja: evaluation evidence/time を持つ allow・block・redirect・retry・escalate・defer・stop result。
  excludes:
    - zh: 门控实现、布尔条件、路由策略和没有实际求值的预期结果。
      en: Gate implementation, Boolean condition, routing policy, and expected results without actual evaluation.
      ja: gate implementation・Boolean condition・routing policy・actual evaluation のない expected result。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangGraph interrupt 返回的外部决定映射为 result（approve→allow，reject→block）；CrewAI human_input 收集的文本/选择映射为 allow/escalate；Cursor 验证失败映射为 redirect 或 block。集成时务必写入 gate_ref、evidence_refs 与 produced_at，以便 RoutingDecision 与 DownstreamOperation 追溯。
    en: Map LangGraph interrupt external decisions to result (approve→allow, reject→block); map CrewAI human_input text/choices to allow/escalate; map Cursor verification failure to redirect or block. Always persist gate_ref, evidence_refs, and produced_at for RoutingDecision and DownstreamOperation traceability.
    ja: LangGraph interrupt 外部決定を result に、CrewAI human_input を allow/escalate に、Cursor 検証失敗を redirect/block に写像します。gate_ref/evidence_refs/produced_at を必ず記録します。
  typical_input:
    - description: Evidence bundle from one gate evaluation.
      format: |
        gate_ref: control-gate-4@3
        evidence_refs: [score-44, safety-decision-9]
        evaluation_time: 2026-07-16T04:20:00Z
      source_claims: [claim-gate-outcome-design]
  typical_output:
    - description: Persisted GateOutcome record.
      format: |
        {
          "gate_outcome_id": "gate-outcome-884",
          "gate_ref": "control-gate-4@3",
          "result": "redirect",
          "evidence_refs": ["score-44"],
          "produced_at": "2026-07-16T04:20:00Z"
        }
      source_claims: [claim-gate-outcome-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: interrupt/resume decision values as gate outcomes.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Human input results after human_input gates.
    - name: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      description: Verification pass/fail as gate outcomes.
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: gate outcome ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次门控求值结果。
        en: Stably identifies one gate-evaluation result.
        ja: one gate evaluation result を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: gate-outcome-884
      source_claims:
        - claim-gate-outcome-design
    - id: gate_ref
      labels:
        zh: 门控引用
        en: gate reference
        ja: gate reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该结果的 Gate 版本。
        en: References the Gate revision that produced the outcome.
        ja: outcome を生成した Gate revision を参照します。
      allowed_values: []
      pattern: null
      example_value: control-gate-4@3
      source_claims:
        - claim-gate-outcome-design
    - id: result
      labels:
        zh: 结果值
        en: result
        ja: result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allow、block、redirect、retry、escalate、defer 或 stop；对应 pass/fail/escalate 语义。
        en: Records allow, block, redirect, retry, escalate, defer, or stop; maps pass/fail/escalate semantics.
        ja: allow・block・redirect・retry・escalate・defer・stop を記録し pass/fail/escalate 意味に対応します。
      allowed_values: []
      pattern: null
      example_value: redirect
      source_claims:
        - claim-gate-outcome-langgraph
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际参与求值的状态、评分、策略决定或人工输入。
        en: References state, scores, policy decisions, or human input actually evaluated.
        ja: 実際に evaluate した state・score・policy decision・human input を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - score-44
        - safety-decision-9
      source_claims:
        - claim-gate-outcome-langgraph
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录门控求值完成时间。
        en: Records when gate evaluation completed.
        ja: gate evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-gate-outcome-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: GateOutcome-example-pass-allow
    labels:
      zh: 验证通过允许继续
      en: Verification pass allows continue
      ja: 検証 pass で continue 許可
    descriptions:
      zh: gate-outcome-883 引用 control-gate-cursor-4@4，lint/typecheck/test 全部通过，result=allow，04:18 记录。
      en: gate-outcome-883 references control-gate-cursor-4@4, all lint/typecheck/test pass, result=allow, recorded at 04:18.
      ja: gate-outcome-883 は verification pass で result=allow を 04:18 に記録します。
    example_source:
      product: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      version: verification pass
    field_values:
      gate_outcome_id: gate-outcome-883
      gate_ref: control-gate-cursor-4@4
      result: allow
      evidence_refs:
        - lint-pass
        - typecheck-pass
        - test-pass
      produced_at: 2026-07-16T04:18:00Z
    related_node_ids:
      - GateOutcome
      - ControlGate
      - RoutingDecision
    related_relation_ids:
      - ControlGate-produces-GateOutcome
    source_claims:
      - claim-gate-outcome-design
  - id: GateOutcome-example-fail-redirect
    labels:
      zh: 质量门失败转向人工
      en: Quality gate fail redirects to human
      ja: 品質 gate fail で human へ redirect
    descriptions:
      zh: gate-outcome-884 因 score-44 低于阈值返回 redirect，04:20 记录人工复核证据。
      en: gate-outcome-884 returns redirect because score-44 is below threshold and records human-review evidence at 04:20.
      ja: gate-outcome-884 は score-44 below threshold で redirect を 04:20 に記録します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: post-node quality gate
    field_values:
      gate_outcome_id: gate-outcome-884
      gate_ref: control-gate-4@3
      result: redirect
      evidence_refs:
        - score-44
      produced_at: 2026-07-16T04:20:00Z
    related_node_ids:
      - GateOutcome
      - ControlGate
      - RoutingDecision
    related_relation_ids:
      - RoutingDecision-records-GateOutcome
    source_claims:
      - claim-gate-outcome-langgraph
  - id: GateOutcome-example-escalate-crewai
    labels:
      zh: CrewAI 人工升级
      en: CrewAI human escalation
      ja: CrewAI human escalation
    descriptions:
      zh: gate-outcome-885 引用 gate-human-sql-review@1，人工输入“needs DBA review”，result=escalate。
      en: gate-outcome-885 references gate-human-sql-review@1; human input "needs DBA review" yields result=escalate.
      ja: gate-outcome-885 は human input により result=escalate を記録します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: human_input escalation
    field_values:
      gate_outcome_id: gate-outcome-885
      gate_ref: gate-human-sql-review@1
      result: escalate
      evidence_refs:
        - human-input-dba-review
      produced_at: 2026-07-16T04:25:00Z
    related_node_ids:
      - GateOutcome
      - Gate
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-crewai
  - id: GateOutcome-example-boundary-interface
    labels:
      zh: 接口声明的可能结果
      en: Interface declared possible outcomes
      ja: interface 宣言 possible outcomes
    descriptions:
      zh: gate@3 接口声明可返回 allow 或 redirect，但没有 execution、outcome ID 或 produced_at。
      en: gate@3's interface declares allow or redirect but has no execution, outcome ID, or produced_at.
      ja: gate@3 interface は allow/redirect を宣言しますが outcome ID/time がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: capability versus outcome
    field_values: {}
    related_node_ids:
      - Gate
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-design
parent_relation: null
relations: []
sources:
  - id: langgraph-gate-outcome
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: interrupt/resume values as pass/fail gate decisions.
  - id: crewai-gate-outcome
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Human input results as gate outcomes.
  - id: gate-outcome-design
    title: Moonweave routing and gates design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: GateOutcome as information produced by gate evaluation.
source_claims:
  - id: claim-gate-outcome-langgraph
    source: langgraph-gate-outcome
    supports: LangGraph interrupt/resume supplies concrete decision values that Moonweave records as GateOutcome.result with evidence.
    locator: Graph API — interrupt, resume
    evidence_kind: official
    confidence: high
  - id: claim-gate-outcome-crewai
    source: crewai-gate-outcome
    supports: CrewAI human_input captures human decisions mappable to allow/escalate GateOutcome records.
    locator: Tasks — human_input
    evidence_kind: official
    confidence: high
  - id: claim-gate-outcome-design
    source: gate-outcome-design
    supports: GateOutcome is information distinct from Gate capability and RoutingDecision occurrence.
    locator: GateOutcome concept boundary
    evidence_kind: design-inference
    confidence: high
