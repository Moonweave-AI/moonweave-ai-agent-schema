schema: moonweave.ai/ontology-node/v1
id: GateOutcome
kind: concept
status: review
labels:
  zh: 门控结果
  en: gate outcome
  ja: gate outcome
semantics:
  short_definition:
    zh: 一次门控求值产生的允许、阻断、转向、重试、升级或停止记录。
    en: A record of allow, block, redirect, retry, escalate, or stop produced by one gate evaluation.
    ja: one gate evaluation が生成した allow/block/redirect/retry/escalate/stop record。
  definition:
    zh: 门控结果是一种信息记录，以结果标识、门控引用、结果值、证据引用和产生时间为身份，证明某个 Gate 对一组条件和证据完成了一次求值。它可被 RoutingDecision 记录并触发 DownstreamOperation，但不是 Gate 能力、RoutingCondition 规范或长期策略。
    en: A GateOutcome is an information record identified by outcome ID, gate reference, result value, evidence references, and production time, proving that a Gate completed one evaluation over conditions and evidence. A RoutingDecision may record it and it may trigger a DownstreamOperation, but it is not a Gate capability, RoutingCondition specification, or durable policy.
    ja: GateOutcome は outcome ID・gate ref・result・evidence ref・produced time で識別し Gate の one evaluation を証明する information record です。RoutingDecision が record し downstream operation を trigger できますが Gate/Condition/policy ではありません。
  why_needed:
    zh: 结果独立于能力和决定，可保留相同 Gate 多次求值的不同证据。
    en: Keeping outcome separate from capability and decision preserves different evidence across repeated evaluations of one Gate.
    ja: outcome を capability/decision と分け one Gate の repeated evaluation evidence を保持します。
  includes:
    - zh: 带求值证据和时间的 allow、block、redirect、retry、escalate、defer 或 stop 结果。
      en: Allow, block, redirect, retry, escalate, defer, or stop results with evaluation evidence and time.
      ja: evaluation evidence/time を持つ allow・block・redirect・retry・escalate・defer・stop result。
  excludes:
    - zh: 门控实现、布尔条件、路由策略和没有实际求值的预期结果。
      en: Gate implementation, Boolean condition, routing policy, and an expected result without actual evaluation.
      ja: gate implementation・Boolean condition・routing policy・actual evaluation のない expected result。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: gate outcome ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次门控求值结果。
        en: Stably identifies one gate-evaluation result.
        ja: one gate evaluation result を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: gate-outcome-884
      source_claims:
        - claim-gate-outcome-002
    - id: gate_ref
      labels:
        zh: 门控引用
        en: gate reference
        ja: gate reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该结果的 Gate 版本。
        en: References the Gate revision that produced the outcome.
        ja: outcome を生成した Gate revision を参照します。
      allowed_values: []
      pattern: null
      example_value: control-gate-4@3
      source_claims:
        - claim-gate-outcome-002
    - id: result
      labels:
        zh: 结果值
        en: result
        ja: result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allow、block、redirect、retry、escalate、defer 或 stop。
        en: Records allow, block, redirect, retry, escalate, defer, or stop.
        ja: allow・block・redirect・retry・escalate・defer・stop を記録します。
      allowed_values: []
      pattern: null
      example_value: redirect
      source_claims:
        - claim-gate-outcome-001
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际参与求值的状态、评分、策略决定或人工输入。
        en: References state, scores, policy decisions, or human input actually evaluated.
        ja: 実際に evaluate した state・score・policy decision・human input を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - score-44
        - safety-decision-9
      source_claims:
        - claim-gate-outcome-001
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录门控求值完成时间。
        en: Records when gate evaluation completed.
        ja: gate evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-gate-outcome-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: GateOutcome-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 质量门转向人工复核
      en: Quality gate redirects to human review
      ja: quality gate redirects to human review
    scenario_id: null
    descriptions:
      zh: gate-outcome-884 引用 control-gate-4@3，因 score-44 低于阈值而返回 redirect，并在 04:20 记录人工复核目标证据。
      en: gate-outcome-884 references control-gate-4@3, returns redirect because score-44 is below threshold, and records human-review evidence at 04:20.
      ja: gate-outcome-884 は gate@3 を参照し score-44 below threshold により redirect、04:20 human-review evidence を記録します。
    field_values:
      gate_outcome_id: gate-outcome-884
      gate_ref: control-gate-4@3
      result: redirect
      evidence_refs:
        - score-44
      produced_at: 2026-07-16T04:20:00Z
    related_node_ids:
      - GateOutcome
      - ControlGate
      - RoutingDecision
    related_relation_ids:
      - ControlGate-produces-GateOutcome
      - RoutingDecision-records-GateOutcome
    expected_result:
      zh: 建立一次结果记录，并让决定引用它。
      en: Create one outcome record and let the decision reference it.
      ja: one outcome record を作り decision が参照します。
    why_valid_or_invalid:
      zh: 门控、结果、证据和时间完整对应一次求值。
      en: Gate, result, evidence, and time correspond to one evaluation.
      ja: gate・result・evidence・time が one evaluation に対応します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-outcome-001
      - claim-gate-outcome-002
  - id: GateOutcome-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 门控支持的结果列表
      en: Gate's supported outcome list
      ja: gate supported outcome list
    scenario_id: routing-review-gateoutcome-boundary
    descriptions:
      zh: gate@3 的接口声明可以返回 allow 或 redirect，但没有实际证据、时间或一次求值标识。
      en: gate@3's interface declares that it can return allow or redirect, but has no actual evidence, time, or evaluation identifier.
      ja: gate@3 interface は allow/redirect を宣言しますが actual evidence・time・evaluation ID はありません。
    field_values: {}
    related_node_ids:
      - Gate
      - GateOutcome
    related_relation_ids: []
    expected_result:
      zh: 保留为 Gate 能力定义，不创建 GateOutcome。
      en: Keep it as a Gate capability definition and do not create GateOutcome.
      ja: Gate capability definition とし GateOutcome を作りません。
    why_valid_or_invalid:
      zh: 可能结果集合不证明某个结果已经产生。
      en: A possible-outcome set does not prove that an outcome was produced.
      ja: possible outcome set は produced outcome を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-outcome-002
