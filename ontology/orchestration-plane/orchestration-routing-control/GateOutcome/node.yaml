schema: moonweave.ai/ontology-node/v1
id: GateOutcome
kind: concept
labels:
  zh: 门控结果
  en: gate outcome
  ja: gate outcome
semantics:
  short_definition:
    zh: 一次门控求值产生的允许、阻断、转向、重试、升级或停止记录。
    en: A record of allow, block, redirect, retry, escalate, or stop produced by one gate evaluation.
    ja: one gate evaluation が生成した allow/block/redirect/retry/escalate/stop record。
  definition:
    zh: 门控结果是一种信息记录，以结果标识、门控引用、结果值、证据引用和产生时间为身份，证明某个 Gate 对一组条件和证据完成了一次求值。它可被 RoutingDecision 记录并触发 DownstreamOperation，但不是 Gate 能力、RoutingCondition 规范或长期策略。
    en: A GateOutcome is an information record identified by outcome ID, gate reference, result value, evidence references, and production time, proving that a Gate completed one evaluation over conditions and evidence. A RoutingDecision may record it and it may trigger a DownstreamOperation, but it is not a Gate capability, RoutingCondition specification, or durable policy.
    ja: GateOutcome は outcome ID・gate ref・result・evidence ref・produced time で識別し Gate の one evaluation を証明する information record です。RoutingDecision が record し downstream operation を trigger できますが Gate/Condition/policy ではありません。
  why_needed:
    zh: 结果独立于能力和决定，可保留相同 Gate 多次求值的不同证据。
    en: Keeping outcome separate from capability and decision preserves different evidence across repeated evaluations of one Gate.
    ja: outcome を capability/decision と分け one Gate の repeated evaluation evidence を保持します。
  includes:
    - zh: 带求值证据和时间的 allow、block、redirect、retry、escalate、defer 或 stop 结果。
      en: Allow, block, redirect, retry, escalate, defer, or stop results with evaluation evidence and time.
      ja: evaluation evidence/time を持つ allow・block・redirect・retry・escalate・defer・stop result。
  excludes:
    - zh: 门控实现、布尔条件、路由策略和没有实际求值的预期结果。
      en: Gate implementation, Boolean condition, routing policy, and an expected result without actual evaluation.
      ja: gate implementation・Boolean condition・routing policy・actual evaluation のない expected result。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      GateOutcome 在 Gate 求值后立即持久化为审计事件：LangGraph 路由包装器或 OPA decision log 写入
      gate_outcome_id、result 与 evidence_refs。RoutingDecision 引用该 outcome 选择 RoutingTarget；
      DownstreamOperation 只在 allow/redirect 后启动。GateOutcome 不可变，重试产生新 outcome 而非覆盖旧记录。
    en: >-
      GateOutcome persists immediately after Gate evaluation as an audit event: LangGraph router wrappers or OPA decision
      logs write gate_outcome_id, result, and evidence_refs. RoutingDecision references the outcome to select
      RoutingTarget; DownstreamOperation starts only after allow/redirect. GateOutcome is immutable; retries produce new
      outcomes rather than overwriting prior records.
    ja: >-
      GateOutcome は Gate evaluation 直後に audit event として persist する。LangGraph router wrapper または OPA decision
      log が gate_outcome_id、result、evidence_refs を書く。RoutingDecision は outcome を参照して RoutingTarget を select する。
      DownstreamOperation は allow/redirect 後のみ開始する。GateOutcome は immutable で retry は新 outcome を生成する。
  typical_input:
    - description:
        zh: Gate 对条件与证据完成一次求值后的结果载荷。
        en: Result payload after Gate completes one evaluation over conditions and evidence.
        ja: Gate が condition と evidence に対し one evaluation を完了した result payload。
      format: |-
        {"gate_ref":"gate:budget-check@2","result":"block","evidence_refs":["cost-estimate@3"],"evaluated_conditions":["cond:max-cost@1"],"input_state_ref":"state:pre-tool-call@884"}
  typical_output:
    - description:
        zh: 被 RoutingDecision 与下游调度消费的不可变 outcome 记录。
        en: An immutable outcome record consumed by RoutingDecision and downstream dispatch.
        ja: RoutingDecision と downstream dispatch が consume する immutable outcome record。
      format: |-
        {"gate_outcome_id":"go-885","gate_ref":"gate:budget-check@2","result":"block","produced_at":"2026-07-16T09:12:01Z","routing_decision_ref":"rd-884","downstream_operation_ref":null}
  reference_implementations:
    - name: Open Policy Agent decision logs
      url: https://www.openpolicyagent.org/docs/latest/management-decision-logs/
      description: Documents immutable policy decision records with input and result metadata.
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing wrappers that can emit audit events alongside native returns.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents allow/deny/redirect-style policy outcomes over structured evidence.
  source_claims:
    - claim-gate-outcome-001
    - claim-gate-outcome-002
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: gate outcome ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次门控求值结果。
        en: Stably identifies one gate-evaluation result.
        ja: one gate evaluation result を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: gate-outcome-884
      source_claims:
        - claim-gate-outcome-002
    - id: gate_ref
      labels:
        zh: 门控引用
        en: gate reference
        ja: gate reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该结果的 Gate 版本。
        en: References the Gate revision that produced the outcome.
        ja: outcome を生成した Gate revision を参照します。
      allowed_values: []
      pattern: null
      example_value: control-gate-4@3
      source_claims:
        - claim-gate-outcome-002
    - id: result
      labels:
        zh: 结果值
        en: result
        ja: result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allow、block、redirect、retry、escalate、defer 或 stop。
        en: Records allow, block, redirect, retry, escalate, defer, or stop.
        ja: allow・block・redirect・retry・escalate・defer・stop を記録します。
      allowed_values: []
      pattern: null
      example_value: redirect
      source_claims:
        - claim-gate-outcome-001
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际参与求值的状态、评分、策略决定或人工输入。
        en: References state, scores, policy decisions, or human input actually evaluated.
        ja: 実際に evaluate した state・score・policy decision・human input を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - score-44
        - safety-decision-9
      source_claims:
        - claim-gate-outcome-001
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录门控求值完成时间。
        en: Records when gate evaluation completed.
        ja: gate evaluation completion time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-gate-outcome-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: gate-outcome-opa-allow
    labels:
      zh: GateOutcome positive
      en: GateOutcome positive
      ja: GateOutcome positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 GateOutcome 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for GateOutcome: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) GateOutcome: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {outcome_id: gate-outcome-884, result: allow, gate_ref: gate-support-quality}

    related_node_ids:
      - GateOutcome
      - Gate
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-001

  - id: gate-outcome-opa-block
    labels:
      zh: GateOutcome positive
      en: GateOutcome positive
      ja: GateOutcome positive
    descriptions:
      zh: Prefect 数据流编排映射 GateOutcome：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps GateOutcome: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect GateOutcome: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {outcome_id: gate-outcome-901, result: block}

    related_node_ids:
      - GateOutcome
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-001

  - id: gate-outcome-guardrails-fail
    labels:
      zh: GateOutcome positive
      en: GateOutcome positive
      ja: GateOutcome positive
    descriptions:
      zh: Temporal 持久化工作流映射 GateOutcome：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps GateOutcome: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal GateOutcome: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {outcome_id: gate-outcome-toxic-55, result: block, gate_ref: gate-content-safety}

    related_node_ids:
      - GateOutcome
      - Gate
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-001

  - id: gate-outcome-langgraph-interrupt
    labels:
      zh: GateOutcome positive
      en: GateOutcome positive
      ja: GateOutcome positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 GateOutcome 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for GateOutcome: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) GateOutcome: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {outcome_id: gate-outcome-interrupt-7, result: revise, gate_ref: gate-human-approval}

    related_node_ids:
      - GateOutcome
      - ControlGate
      - DownstreamOperation
    related_relation_ids: []
    source_claims:
      - claim-gate-outcome-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-gate-outcome-001
    source: langgraph-graph-api
    supports: GateOutcome core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-gate-outcome-002
    source: opa-policy-language
    supports: GateOutcome boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
