schema: moonweave.ai/ontology-node/v1
id: SuccessorDispatch
kind: concept
labels:
  zh: 工作流后继调度记录
  en: Workflow Successor Dispatch Record
  ja: ワークフロー後続ディスパッチ記録
semantics:
  short_definition:
    zh: 控制门结果之后，对一个后继目标是否被调度的本地记录。
    en: A local record of whether one successor target was dispatched after a control-gate outcome.
    ja: 制御ゲート結果の後に、一つの後続対象が予定されたかを記録するローカル記録。
  definition:
    zh: >
      SuccessorDispatch 连接 GateOutcome 与 RoutingTarget，记录执行器是否已安排该后继、明确保留或以终止结束分支。
      它与 GateOutcome 中的 successor 决议不同：后者是“应走向何处”，调度记录是“是否已发出该转移”的发生事实；
      不表示后继节点、工具或部署动作已经完成。
    en: >
      SuccessorDispatch links a GateOutcome to a RoutingTarget and records whether the executor scheduled that successor,
      deliberately withheld it, or ended the branch at a terminal. Unlike a successor decision in GateOutcome, this is
      the occurrence fact of whether the transition was issued, not proof that the successor node, tool, or deployment completed.
    ja: >
      SuccessorDispatch は GateOutcome と RoutingTarget を結び、実行器が後続を予定したか、保留したか、
      終端で分岐を終了したかを記録します。GateOutcome の後続決議とは異なり、遷移が発行されたかという発生事実です。
  why_needed:
    zh: >
      “门允许继续”与“运行时确实安排了下一步”之间可能有图配置错误、重试或执行器故障。分开两者才能发现
      本应阻断却被调度的旁路，或本应继续却从未调度的停滞。
    en: >
      Between gate permission and runtime scheduling there can be misconfiguration, retry, or executor failure.
      Separating them exposes bypasses scheduled despite a block or permitted transitions never scheduled.
    ja: >
      ゲート許可とランタイム予定の間には設定誤り、再試行、実行器故障があり得ます。両者を分けることで、
      block 後も予定されたバイパスや、許可された遷移が予定されない停滞を発見できます。
  includes:
    - zh: Command(goto=...) 或条件边目标后的已调度记录。
      en: A scheduled record after Command(goto=...) or a conditional-edge target.
      ja: Command(goto=...) または条件付きエッジ対象後の予定記録。
    - zh: block 或 cancel 时对受保护目标的 withheld 记录。
      en: A withheld record for a protected target on block or cancel.
      ja: block または cancel 時の保護対象に対する withheld 記録。
  excludes:
    - zh: 门评估本身；它属于 GateOutcome。
      en: The gate evaluation itself; that belongs to GateOutcome.
      ja: ゲート評価そのもの。GateOutcome に属する。
    - zh: 后继节点执行后的工具结果或副作用回执。
      en: Tool results or side-effect receipts after the successor executes.
      ja: 後続実行後のツール結果または副作用受領書。
  semantic_kind: local-runtime-record
  aliases: []
engineering:
  explanation:
    zh: >
      LangGraph 在 conditional edge 或 Command.goto 解析后调度下一节点；Send 可扇出多个目标。
      若需要审计“是否已发出转移”，在调度器周围写入 SuccessorDispatch，引用 gate_outcome_ref、
      successor_target_ref 与 dispatch_status（scheduled、withheld、terminated）。不要把 LangGraph 内部
      队列状态直接当作 Moonweave 字段。
    en: >
      LangGraph schedules the next node after resolving a conditional edge or Command.goto; Send can fan out targets.
      For audit, write SuccessorDispatch around the scheduler with gate_outcome_ref, successor_target_ref, and
      dispatch_status (scheduled, withheld, terminated). Do not expose LangGraph internal queue state as Moonweave fields.
    ja: >
      LangGraph は条件付きエッジまたは Command.goto 解決後に次ノードを予定します。監査には gate_outcome_ref、
      successor_target_ref、dispatch_status を持つ SuccessorDispatch を書きます。
  typical_input:
    - description: LangGraph Command goto after a gate passes
      format: |
        return Command(goto="merge")
  typical_output:
    - description: Local dispatch record
      format: |
        {
          "dispatch_id": "dispatch-2026-07-18-001",
          "gate_outcome_ref": "gate-outcome-884",
          "successor_target_ref": "merge",
          "dispatch_status": "scheduled",
          "recorded_at": "2026-07-18T09:31:05Z"
        }
  reference_implementations:
    - name: LangGraph Graph API — Command and Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents goto dispatch and fan-out via Send.
structure:
  identity_keys: [dispatch_id]
  fields:
    - id: dispatch_id
      labels: {zh: 调度标识, en: dispatch ID, ja: ディスパッチ ID}
      definitions:
        zh: 稳定标识一次后继调度发生。
        en: Stably identifies one successor-dispatch occurrence.
        ja: 一回の後続ディスパッチ発生を安定識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: dispatch-2026-07-18-001
      source_claims: [claim-successor-dispatch-local]
    - id: gate_outcome_ref
      labels: {zh: 门控结果引用, en: gate outcome reference, ja: ゲート結果参照}
      definitions:
        zh: 引用触发或约束此次调度的 GateOutcome。
        en: References the GateOutcome that triggered or constrained this dispatch.
        ja: このディスパッチを起動または制約した GateOutcome を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: gate-outcome-884
      source_claims: [claim-successor-dispatch-local]
    - id: successor_target_ref
      labels: {zh: 后继目标引用, en: successor target reference, ja: 後続対象参照}
      definitions:
        zh: 引用 RoutingTarget 或 LangGraph 节点名/END/Send 目标。
        en: References a RoutingTarget or LangGraph node name, END, or Send target.
        ja: RoutingTarget または LangGraph ノード名、END、Send 対象を参照する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: merge
      source_claims: [claim-successor-dispatch-langgraph]
    - id: dispatch_status
      labels: {zh: 调度状态, en: dispatch status, ja: ディスパッチ状態}
      definitions:
        zh: scheduled、withheld 或 terminated 之一，表示是否已发出转移。
        en: One of scheduled, withheld, or terminated, stating whether the transition was issued.
        ja: scheduled、withheld、terminated のいずれか。遷移が発行されたかを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [scheduled, withheld, terminated]
      example_value: scheduled
      source_claims: [claim-successor-dispatch-local]
    - id: recorded_at
      labels: {zh: 记录时间, en: recorded at, ja: 記録時刻}
      definitions:
        zh: 调度决定被记录的时间。
        en: When the dispatch decision was recorded.
        ja: ディスパッチ決定が記録された時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: "2026-07-18T09:31:05Z"
      source_claims: [claim-successor-dispatch-local]
  constraints:
    - id: SuccessorDispatch-withheld-on-block
      expression: "dispatch_status=withheld requires a gate_outcome_ref whose result is block, cancel, or stop."
      explanation:
        zh: withheld 必须对应阻断类门控结果，不能从缺失调度自动推断。
        en: withheld must correspond to a blocking gate outcome, not be inferred from missing scheduling alone.
        ja: withheld は block 系 GateOutcome に対応しなければならず、未予定だけから推論してはならない。
      source_claims: [claim-successor-dispatch-local]
examples:
  - id: dispatch-langgraph-send-fanout
    labels:
      zh: SuccessorDispatch positive
      en: SuccessorDispatch positive
      ja: SuccessorDispatch positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 SuccessorDispatch 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as SuccessorDispatch router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が SuccessorDispatch から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {dispatch_id: dispatch-2026-07-18-003, successor_target_ref: worker, dispatch_status: scheduled}

    related_node_ids:
      - SuccessorDispatch
      - RoutingTarget
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-successor-dispatch-langgraph

  - id: dispatch-langgraph-command-goto-merge
    labels:
      zh: SuccessorDispatch positive
      en: SuccessorDispatch positive
      ja: SuccessorDispatch positive
    descriptions:
      zh: Prefect 数据流编排映射 SuccessorDispatch：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps SuccessorDispatch: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect SuccessorDispatch: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {dispatch_id: dispatch-2026-07-18-001, successor_target_ref: merge, dispatch_status: scheduled}

    related_node_ids:
      - SuccessorDispatch
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-successor-dispatch-langgraph

  - id: dispatch-openai-handoff-scheduled
    labels:
      zh: SuccessorDispatch positive
      en: SuccessorDispatch positive
      ja: SuccessorDispatch positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 SuccessorDispatch：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps SuccessorDispatch: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が SuccessorDispatch 多 agent 協調に写像。
    field_values: {successor_target_ref: billing_agent, dispatch_status: scheduled, gate_outcome_ref: gate-outcome-triage-12}

    related_node_ids:
      - SuccessorDispatch
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-successor-dispatch-local

  - id: dispatch-gate-block-withheld
    labels:
      zh: SuccessorDispatch positive
      en: SuccessorDispatch positive
      ja: SuccessorDispatch positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 SuccessorDispatch 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for SuccessorDispatch: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が SuccessorDispatch で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {dispatch_id: dispatch-2026-07-18-002, dispatch_status: withheld, gate_outcome_ref: gate-outcome-901}

    related_node_ids:
      - SuccessorDispatch
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-successor-dispatch-local

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API overview
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents Command.goto and Send fan-out dispatch semantics.
source_claims:
  - id: claim-successor-dispatch-langgraph
    source: langgraph-graph-api
    supports: LangGraph issues next-node dispatch via conditional edges, Command.goto, or Send fan-out.
    locator: Graph API — Command; Send
    evidence_kind: normative
    confidence: high
  - id: claim-successor-dispatch-local
    source: langgraph-graph-api
    supports: dispatch_id and dispatch_status are Moonweave local audit fields distinct from GateOutcome decisions.
    locator: Graph API — Conditional edges
    evidence_kind: design-inference
    confidence: high
