schema: moonweave.ai/ontology-node/v1
id: orchestration-routing-control
kind: module
labels:
  zh: 路由与门控
  en: Routing and gates
  ja: ルーティングとゲート制御
semantics:
  short_definition:
    zh: 描述控制流应当怎样选择（RoutingSpecification），以及一次运行实际选择了什么（Gate、GateOutcome、RoutingDecision、SuccessorDispatch）。
    en: Describes how control flow should choose (RoutingSpecification) and what one run actually chose (Gate, GateOutcome, RoutingDecision, SuccessorDispatch).
    ja: 制御フローがどう選ぶべきか（RoutingSpecification）と一回の実行が実際に何を選んだか（Gate、GateOutcome、RoutingDecision、SuccessorDispatch）を表します。
  definition:
    zh: orchestration-routing-control 包含可复用规范层与发生事实层。RoutingSpecification 下的 Route、RoutingPolicy、RetryPolicy、RoutingCondition 规定候选、求值与停止/重试；Gate/ControlGate 执行门控并产生 GateOutcome；RoutingDecision 记录一次具体求值与选择；SuccessorDispatch 记录对 RoutingTarget 的后续派发。LangGraph conditional_edges 与 Command(goto=...) 是工程参考，Moonweave 不把 Edge 或 Command 直接当作 RoutingDecision。RoutingTarget 只是候选入口的类型化引用，RoutingDecision 不是 RoutingTarget 的 is_a 子类。
    en: orchestration-routing-control has reusable specification and occurrence layers. Route, RoutingPolicy, RetryPolicy, and RoutingCondition under RoutingSpecification govern candidates, evaluation, stopping, and retry; Gate/ControlGate execute gate control and produce GateOutcome; RoutingDecision records one concrete evaluation and selection; SuccessorDispatch records downstream dispatch to a RoutingTarget. LangGraph conditional_edges and Command(goto=...) are engineering references; Moonweave does not treat Edge or Command directly as RoutingDecision. RoutingTarget is only a typed reference to a candidate entry point; RoutingDecision is not an is_a child of RoutingTarget.
    ja: orchestration-routing-control は再利用仕様層と発生事実層を持ちます。RoutingSpecification 配下が候補・評価・停止／retry、Gate/ControlGate が門制御、RoutingDecision が具体評価と選択、SuccessorDispatch が RoutingTarget への後続 dispatch を表します。LangGraph conditional_edges と Command(goto=...) は工程参照であり、Edge/Command を RoutingDecision そのものとはしません。
  why_needed:
    zh: 每次分支、阻断、重试或停止都需要可追溯的输入状态、规则版本、求值结果与选中目标；把静态路由配置误报为已执行决定会破坏恢复与审计。
    en: Every branch, block, retry, or stop needs traceable input state, rule revision, evaluation result, and selected target; misreporting static routing configuration as an executed decision breaks recovery and audit.
    ja: 各 branch/block/retry/stop に追跡可能な入力状態・規則版・評価結果・選択対象が必要です。静的 route 設定を実行済み判断と誤報すると回復と監査が壊れます。
  includes:
    - zh: RoutingSpecification、Route、RoutingPolicy、RetryPolicy、RoutingCondition（Branch/Gate/Stop）。
      en: RoutingSpecification, Route, RoutingPolicy, RetryPolicy, RoutingCondition (Branch/Gate/Stop).
      ja: RoutingSpecification、Route、RoutingPolicy、RetryPolicy、RoutingCondition。
    - zh: Gate、ControlGate、GateOutcome、RoutingDecision、RoutingTarget、SuccessorDispatch、DownstreamOperation 引用。
      en: Gate, ControlGate, GateOutcome, RoutingDecision, RoutingTarget, SuccessorDispatch, and DownstreamOperation references.
      ja: Gate、ControlGate、GateOutcome、RoutingDecision、RoutingTarget、SuccessorDispatch、DownstreamOperation 参照。
  excludes:
    - zh: LangGraph Edge/Node 本体、RunAttempt、通用日志、静态协作拓扑（composition 域）。
      en: LangGraph Edge/Node objects themselves, RunAttempt, generic logs, static collaboration topology (composition domain).
      ja: LangGraph Edge/Node 自体、RunAttempt、generic log、static composition topology。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: LangGraph 通过 add_conditional_edges(source, path, path_map) 或节点返回 Command(goto=...) 实现条件路由；适配器在路由边界读取 state snapshot、condition_ref、选中 target 与 binding_ref，写入 RoutingDecision 与 SuccessorDispatch，而不把 conditional edge 函数重命名为 RoutingDecision。
    en: LangGraph implements conditional routing through add_conditional_edges(source, path, path_map) or nodes returning Command(goto=...); adapters read state snapshot, condition_ref, selected target, and binding_ref at routing boundaries into RoutingDecision and SuccessorDispatch without renaming conditional edge functions as RoutingDecision.
    ja: LangGraph は add_conditional_edges または Command(goto=...) で条件 routing を実装します。adapter は routing 境界で state snapshot、condition_ref、選択 target、binding_ref を RoutingDecision/SuccessorDispatch に書き、conditional edge 関数を RoutingDecision と改名しません。
  typical_input:
    - description: LangGraph conditional edge evaluation
      format: |-
        builder.add_conditional_edges("triage", route_by_severity, {"high": "security_review", "low": "auto_close"})
        result = graph.invoke({"severity": "high"})
    - description: LangGraph Command goto from a node
      format: |-
        def reviewer(state): return Command(goto="revise" if state["needs_revision"] else "publish")
  typical_output:
    - description: Local routing decision with selected target
      format: |-
        {"routing_decision_id":"rd-184","condition_ref":"route-by-severity@v2","selected_target_ref":"security_review","state_digest":"sha256:...","execution_binding_ref":"langgraph:edge:triage"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents conditional edges, Command, and graph routing.
    - name: LangGraph conditional routing
      url: https://docs.langchain.com/oss/python/langgraph/graph-api#conditional-edges
      description: Documents add_conditional_edges and dynamic routing patterns.
  source_claims:
    - claim-orchestration-routing-control-module
    - claim-orchestration-routing-control-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识路由与门控模块。
        en: Stably identifies the routing and gates module.
        ja: ルーティングとゲート制御モジュールを安定して識別します。
      allowed_values: [orchestration-routing-control]
      example_value: orchestration-routing-control
      source_claims: [claim-orchestration-routing-control-module]
    - id: specification_roots
      labels:
        zh: 规范根概念
        en: specification root concepts
        ja: 仕様根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出可复用路由规范根。
        en: Lists reusable routing specification roots.
        ja: 再利用可能な routing 仕様根を列挙します。
      example_value: '["RoutingSpecification"]'
      source_claims: [claim-orchestration-routing-control-module]
    - id: occurrence_roots
      labels:
        zh: 发生根概念
        en: occurrence root concepts
        ja: 発生根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出记录已发生路由决定与派发的根概念。
        en: Lists roots recording occurred routing decisions and dispatches.
        ja: 発生した routing decision と dispatch を記録する根を列挙します。
      example_value: '["RoutingDecision","SuccessorDispatch"]'
      source_claims: [claim-orchestration-routing-control-module]
  constraints:
    - id: orchestration-routing-control-spec-decision-separation
      expression: RoutingSpecification and RoutingDecision connect only through evaluates, selects, or applies relations; never through is_a between specification and decision families.
      explanation:
        zh: 规范描述应如何选择；决定证明某次运行实际选了什么。混为 is_a 会把设计稿误报为已执行事实。
        en: Specifications describe how selection should occur; decisions prove what one run actually chose. is_a between them would misreport design as executed fact.
        ja: 仕様は選択方法を示し、decision は一回の実行が実際に選んだことを証明します。
      source_claims: [claim-orchestration-routing-control-boundary]
  required_relations: []
examples:
  - id: routing-langgraph-conditional-edges
    labels:
      zh: orchestration-routing-control positive
      en: orchestration-routing-control positive
      ja: orchestration-routing-control positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 orchestration-routing-control 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as orchestration-routing-control router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が orchestration-routing-control から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {source: LangGraph, api: add_conditional_edges, router: route_by_severity}

    related_node_ids:
      - RoutingDecision
      - BranchCondition
      - Route
    related_relation_ids: []
    source_claims:
      - claim-orchestration-routing-control-module

  - id: routing-semantic-router-layer
    labels:
      zh: orchestration-routing-control positive
      en: orchestration-routing-control positive
      ja: orchestration-routing-control positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 orchestration-routing-control 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to orchestration-routing-control: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) orchestration-routing-control で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {source: semantic-router, api: SemanticRouter, method: "cosine similarity"}

    related_node_ids:
      - RoutingPolicy
      - RoutingCondition
      - Route
    related_relation_ids: []
    source_claims:
      - claim-orchestration-routing-control-module

  - id: routing-openai-agents-handoff
    labels:
      zh: orchestration-routing-control positive
      en: orchestration-routing-control positive
      ja: orchestration-routing-control positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 orchestration-routing-control 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for orchestration-routing-control: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が orchestration-routing-control で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {source: "OpenAI Agents SDK", api: handoffs, method: "model-driven selection"}

    related_node_ids:
      - RoutingDecision
      - SuccessorDispatch
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-orchestration-routing-control-module

  - id: routing-opa-gate-retry
    labels:
      zh: orchestration-routing-control positive
      en: orchestration-routing-control positive
      ja: orchestration-routing-control positive
    descriptions:
      zh: LiteLLM 映射 orchestration-routing-control LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps orchestration-routing-control LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM orchestration-routing-control: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {source: OPA, api: "rego eval", retry: retry_router}

    related_node_ids:
      - Gate
      - GateOutcome
      - RetryPolicy
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-orchestration-routing-control-boundary

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents conditional edges, Command, nodes, and routing control flow.
source_claims:
  - id: claim-orchestration-routing-control-module
    source: langgraph-graph-api
    supports: LangGraph documents conditional_edges and Command(goto=...) as graph routing mechanisms distinct from one immutable decision record.
    locator: Graph API, conditional edges and Command
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-routing-control-boundary
    source: langgraph-graph-api
    supports: Routing specifications describe possible paths while a decision record must seal the evaluated state and selected target for one run.
    locator: Graph API, edges versus invocation results
    evidence_kind: design-inference
    confidence: high
