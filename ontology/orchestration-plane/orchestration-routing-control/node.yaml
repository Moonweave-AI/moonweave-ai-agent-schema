schema: moonweave.ai/ontology-node/v1
id: orchestration-routing-control
kind: module
status: accepted
labels:
  zh: 路由与门控
  en: Routing and gates
  ja: ルーティングとゲート制御
semantics:
  short_definition:
    zh: 描述控制流应当怎样选择，以及一次运行实际选择了什么。RoutingSpecification 定义路由、策略、重试和条件；Gate 对条件进行控制性求值并产生 GateOutcome；RoutingDecision 记录一次具体求值与选择；RoutingTarget 是可被选择的入口引用。规范、决定、目标和后续执行是四种不同身份，只能通过关系连接。
    en: Describes how control flow should choose and what one run actually chose. RoutingSpecification defines routes, policies, retry rules, and conditions; Gate performs a control evaluation and produces a GateOutcome; RoutingDecision records one concrete evaluation and selection; RoutingTarget is a selectable entry-point reference. Specification, decision, target, and downstream execution are distinct identities connected only by relations.
    ja: 制御フローがどのように選ぶべきか、一回の実行で実際に何を選んだかを表します。RoutingSpecification は route・policy・retry・condition、Gate は制御評価と GateOutcome、RoutingDecision は具体的な評価と選択、RoutingTarget は選択可能な entry point 参照を表します。仕様・判断・対象・後続実行は異なる同一性で、関係だけで接続します。
  definition:
    zh: 本模块包含可复用规范与发生事实两层。RoutingSpecification 下的 Route、RoutingPolicy、RetryPolicy 和 RoutingCondition 规定候选、求值与停止/重试方式；Gate/ControlGate 负责执行门控；GateOutcome 和 RoutingDecision 是一次运行产生的事实；RoutingTarget 只是对候选入口的类型化引用。当前目录把 RoutingDecision 放在 RoutingTarget 下、把 DownstreamOperation 放在 GateOutcome 下，二者都不是 is_a：决定不是一种目标，操作也不是一种结果。后续概念重构应将决定提升为独立发生根，并把后续操作提升为活动根或改为引用运行域活动。
    en: "This module has reusable specification and occurrence layers. Route, RoutingPolicy, RetryPolicy, and RoutingCondition beneath RoutingSpecification govern candidates, evaluation, stopping, and retry; Gate and ControlGate execute gate control; GateOutcome and RoutingDecision are facts produced by one run; RoutingTarget is only a typed reference to a candidate entry point. The current directory places RoutingDecision beneath RoutingTarget and DownstreamOperation beneath GateOutcome, but neither relation is is_a: a decision is not a target, and an operation is not an outcome. A later concept refactor must lift decision to an independent occurrence root and lift downstream operation to an activity root or reference a runtime-owned activity."
    ja: 本モジュールは再利用仕様層と発生事実層を持ちます。RoutingSpecification 配下の Route・RoutingPolicy・RetryPolicy・RoutingCondition は候補・評価・停止／再試行方式、Gate／ControlGate は門制御の実行、GateOutcome と RoutingDecision は一回の実行で生成された事実、RoutingTarget は候補 entry point の型付き参照を表します。現ディレクトリは RoutingDecision を RoutingTarget 配下、DownstreamOperation を GateOutcome 配下に置きますが、どちらも is_a ではありません。decision は target ではなく、operation は outcome ではありません。後続概念再構成では decision を独立発生根へ、downstream operation を activity 根へ引き上げるか実行域 activity を参照します。
  why_needed:
    zh: 让每次分支、阻断、重试或停止都有可追溯的输入状态、采用的规则版本、求值结果和选中目标，而不是把静态路由配置误报成已经发生的决定。
    en: Gives every branch, block, retry, or stop traceable input state, rule revision, evaluation result, and selected target without misreporting static routing configuration as an executed decision.
    ja: 各 branch・block・retry・stop に追跡可能な入力状態・規則版・評価結果・選択対象を与え、静的 route 設定を実行済み判断と誤報しないために必要です。
  includes:
    - zh: 可复用的路由规范族及其目标模型：规则、策略、类型化目标与停止条件描述应该如何选择，不冒充一次实际决定。
      en: "Reusable routing specifications and their target model: rules, policies, typed targets, and stop conditions describe how selection should occur without impersonating one actual decision."
      ja: 再利用可能な routing specification と target model：rule・policy・typed target・stop condition は選択方法を記述し、actual decision を装いません。
    - zh: 实际控制链：ControlGate 作为 Gate 的编排专化求值条件并产生 GateOutcome；RoutingDecision 记录结果并选择 RoutingTarget，GateOutcome 则在证据可核对时触发真正的 DownstreamOperation。目标引用与执行活动始终是两个节点。
      en: "The operational control chain: ControlGate specializes Gate for orchestration, evaluates conditions, and produces a GateOutcome. RoutingDecision records that outcome and selects a RoutingTarget, while an evidenced GateOutcome triggers the actual DownstreamOperation. The target reference and execution activity remain separate nodes."
      ja: 実行 control chain：ControlGate は orchestration 用 Gate specialization として condition を評価し GateOutcome を生成します。RoutingDecision は outcome を記録して RoutingTarget を選択し、証拠で確認できる GateOutcome が actual DownstreamOperation を trigger します。target reference と execution activity は別 node のままです。
  excludes:
    - zh: 静态协作拓扑、授权策略与授权决定、运行尝试、来源文献、框架产品和仅用于展示的社区节点。
      en: Static collaboration topology, authorization policies and decisions, runtime attempts, source literature, framework products, and visualization-only community nodes.
      ja: static composition topology・authorization policy/decision・runtime attempt・source literature・framework product・visual-only community node。
  semantic_kind: null
  aliases: []
purpose:
  zh: 让每次分支、阻断、重试或停止都有可追溯的输入状态、采用的规则版本、求值结果和选中目标，而不是把静态路由配置误报成已经发生的决定。
  en: Gives every branch, block, retry, or stop traceable input state, rule revision, evaluation result, and selected target without misreporting static routing configuration as an executed decision.
  ja: 各 branch・block・retry・stop に追跡可能な入力状態・規則版・評価結果・選択対象を与え、静的 route 設定を実行済み判断と誤報しないために必要です。
structure: null
examples:
  - id: orchestration-routing-control-cq-route-decision-v3-example-positive
    kind: positive
    labels:
      zh: 冻结账单意图状态选择专属处理目标
      en: Frozen billing-intent state selects the dedicated handling target
      ja: 固定 billing-intent state が専用 handling target を選択
    scenario_id: orchestration-routing-control-cq-route-decision-v3-example-positive
    descriptions:
      zh: decision-884 对 state-snapshot-551@1 应用 policy-support@7，求值 branch-billing@3 得到 true，并在三个候选路径中选择 target-billing-worker@5；route-billing@4 静态指向同一目标。
      en: decision-884 applies policy-support@7 to state-snapshot-551@1, evaluates branch-billing@3 as true, and selects target-billing-worker@5 from three candidates; route-billing@4 statically points to the same target.
      ja: decision-884 は state-snapshot-551@1 に policy-support@7 を適用し branch-billing@3=true を評価し、三 candidate route から target-billing-worker@5 を選び、route-billing@4 も同じ target を指します。
    field_values:
      routing_decision_id: decision-884
      input_state_ref: state-snapshot-551@1
      input_state_digest: sha256:state-snapshot-551-1
      routing_policy_ref: policy-support@7
      candidate_route_refs:
        - route-billing@4
        - route-technical@6
        - route-general@2
      evaluated_condition_ref: branch-billing@3
      condition_observation:
        intent: billing
        confidence: 0.94
      condition_result: true
      selected_target_ref: target-billing-worker@5
      static_route_target_ref: target-billing-worker@5
      evaluated_at: 2026-07-16T14:00:05Z
      rationale: billing confidence 0.94 exceeds policy threshold 0.85
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - BranchCondition
      - Route
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-evaluates-RoutingCondition
      - RoutingDecision-selects-RoutingTarget
      - Route-points_to-RoutingTarget
    expected_result:
      zh: 返回冻结输入摘要、策略版本、全部已求值条件与结果、选中目标和与之对应的静态路径，并保留决定时间。
      en: Return the frozen input digest, policy revision, every evaluated condition and result, selected target, matching static route, and decision time.
      ja: 固定 input digest、policy revision、全 evaluated condition/result、selected target、対応 static route、decision time を返します。
    why_valid_or_invalid:
      zh: LangGraph 将静态边与条件路由区分开；本例也把 Route 的配置目标与 RoutingDecision 的一次求值选择分开，并以同一版本目标核对。
      en: LangGraph distinguishes static edges from conditional routing; this case likewise separates a Route's configured target from one RoutingDecision occurrence and reconciles the exact target revision.
      ja: LangGraph が static edge と conditional routing を区別するように、本例も Route の設定 target と RoutingDecision occurrence を分離し同一 target revision で照合します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-routing-control-001
      - claim-orchestration-routing-control-003
  - id: orchestration-routing-control-cq-route-decision-v3-example-counter
    kind: boundary
    labels:
      zh: 静态账单路径被误报为已执行选择
      en: Static billing route is misreported as an executed selection
      ja: static billing route を実行済み selection と誤報
    scenario_id: orchestration-routing-control-cq-route-decision-v3-example-counter
    descriptions:
      zh: policy-support@7 配置了 branch-billing@3，route-billing@4 也指向账单目标，但请求 request-552 没有冻结状态、RoutingDecision、条件观测或 selected_target 记录。
      en: policy-support@7 configures branch-billing@3 and route-billing@4 points to the billing target, but request-552 has no frozen state, RoutingDecision, condition observation, or selected_target record.
      ja: policy-support@7 は branch-billing@3 を設定し route-billing@4 も billing target を指しますが、request-552 には fixed state、RoutingDecision、condition observation、selected_target record がありません。
    field_values:
      request_id: request-552
      routing_policy_ref: policy-support@7
      configured_condition_ref: branch-billing@3
      static_route_ref: route-billing@4
      static_target_ref: target-billing-worker@5
      input_state_ref: null
      routing_decision_id: null
      condition_observation: null
      condition_result: null
      selected_target_ref: null
    related_node_ids:
      - RoutingPolicy
      - Route
    related_relation_ids:
      - RoutingPolicy-has_condition-BranchCondition
    expected_result:
      zh: 只返回可配置候选路径，不返回任何已选择目标；明确指出缺少一次决定及其输入、求值和时间证据。
      en: Return only configured candidate reachability and no selected target; state that decision occurrence, input, evaluation, and time evidence are missing.
      ja: configured candidate reachability のみを返し selected target は返さず、decision occurrence、input、evaluation、time evidence の欠落を示します。
    why_valid_or_invalid:
      zh: 策略、条件和路径属于可复用规范，存在它们只说明某目标可达；没有 RoutingDecision 就不能声称条件被求值或目标被实际选择。
      en: Policies, conditions, and routes are reusable specifications that show reachability only; without RoutingDecision, no evaluation or actual selection occurred.
      ja: policy、condition、route は再利用 specification で reachability だけを示し、RoutingDecision がなければ condition 評価や実際の target selection はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-routing-control-001
  - id: orchestration-routing-control-cq-gate-outcome-v3-example-positive
    kind: positive
    labels:
      zh: 质量门把低分答复转向人工复核操作
      en: Quality gate redirects a low-scoring answer to a human-review operation
      ja: 品質 gate が低 score 回答を human-review operation へ redirect
    scenario_id: orchestration-routing-control-cq-gate-outcome-v3-example-positive
    descriptions:
      zh: control-gate-4 使用 eval-score-991=0.62 求值 gate-quality@5 的 0.80 阈值，产生 redirect outcome-884；decision-884 记录该结果并选择 target-human-review@2，随后触发 operation-human-review-884。
      en: control-gate-4 evaluates gate-quality@5 threshold 0.80 with eval-score-991=0.62 and produces redirect outcome-884; decision-884 records it, selects target-human-review@2, and triggers operation-human-review-884.
      ja: control-gate-4 は eval-score-991=0.62 で gate-quality@5 の threshold 0.80 を評価し redirect outcome-884 を生成し、decision-884 が target-human-review@2 を選び operation-human-review-884 を trigger します。
    field_values:
      control_gate_id: control-gate-4
      gate_condition_ref: gate-quality@5
      evidence_ref: eval-score-991
      observed_score: 0.62
      threshold: 0.8
      gate_outcome_id: outcome-884
      gate_result: redirect
      routing_decision_id: decision-884
      selected_target_ref: target-human-review@2
      downstream_operation_id: operation-human-review-884
      operation_started_at: 2026-07-16T14:20:03Z
      trigger_evidence_ref: outcome-884
    related_node_ids:
      - ControlGate
      - GateCondition
      - GateOutcome
      - RoutingDecision
      - RoutingTarget
      - DownstreamOperation
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
      - ControlGate-produces-GateOutcome
      - RoutingDecision-records-GateOutcome
      - RoutingDecision-selects-RoutingTarget
      - GateOutcome-triggers-DownstreamOperation
    expected_result:
      zh: 分别返回条件版本与证据、门控结果、记录该结果的决定、目标引用，以及具有开始时间和触发证据的实际人工复核操作。
      en: Return condition revision and evidence, gate outcome, recording decision, target reference, and actual human-review operation with start time and triggering evidence separately.
      ja: condition revision/evidence、gate outcome、recording decision、target reference、開始時刻と trigger evidence を持つ actual human-review operation を別々に返します。
    why_valid_or_invalid:
      zh: RoutingTarget 是可选目的引用，DownstreamOperation 是被结果实际启动的活动；保留两层可防止把“可以去哪里”误作“已经执行什么”。
      en: RoutingTarget is a selectable destination reference, while DownstreamOperation is the activity actually started; keeping both prevents reachability from becoming execution.
      ja: RoutingTarget は選択可能 destination ref、DownstreamOperation は実際に開始した activity で、両者を分けると reachability を execution と誤認しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-routing-control-001
      - claim-orchestration-routing-control-004
  - id: orchestration-routing-control-cq-gate-outcome-v3-example-counter
    kind: boundary
    labels:
      zh: 支持 allow/block 的门接口被误当作已产生阻断
      en: Allow-block gate capability is mistaken for a produced block outcome
      ja: allow/block gate capability を生成済み block outcome と誤認
    scenario_id: orchestration-routing-control-cq-gate-outcome-v3-example-counter
    descriptions:
      zh: gate-interface@3 声明支持 allow 与 block，且库中存在 gate-quality@5，但 request-992 没有 ControlGate 实例、输入证据、GateOutcome、RoutingDecision 或下游操作。
      en: gate-interface@3 declares allow and block and gate-quality@5 exists in the library, but request-992 has no ControlGate occurrence, input evidence, GateOutcome, RoutingDecision, or downstream operation.
      ja: gate-interface@3 は allow/block を宣言し gate-quality@5 も library にありますが、request-992 に ControlGate occurrence、input evidence、GateOutcome、RoutingDecision、downstream operation はありません。
    field_values:
      request_id: request-992
      gate_interface_ref: gate-interface@3
