    supports: Source eng-fw-crewai-docs at Documentation > Agents, tasks, crews, flows, and processes supports operational notions used to compare orchestration-routing-control with orchestration-composition, including OrchestrationTopology, ParallelBranch. The source does not define Moonweave Modules orchestration-routing-control or orchestration-composition, their class or relation placement, or their ownership split. Under orchestration-routing-control's owns_when "Own an object when its identity is determined by a routing specification, condition evaluation, path selection, gate judgment, retry, or stop control.", Moonweave applies the disambiguation test "If an edge remains collaboration structure after removing runtime state and condition values, it belongs to collaboration composition; if existence depends on one condition evaluation, it belongs to routing and gates."; result=references and owner=orchestration-composition are a Moonweave design inference over the registered evidence.
