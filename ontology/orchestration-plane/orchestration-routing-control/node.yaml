      - RetryPolicy
      - StopCondition
      - RoutingTarget
      - RetryActivity
    related_relation_ids:
      - RoutingDecision-applies-RetryPolicy
      - RoutingDecision-satisfies-StopCondition
      - RoutingDecision-selects-RoutingTarget
      - RetryActivity-governed_by-RetryPolicy
    expected_result:
      zh: 返回策略版本、三次尝试历史、两个实际重试活动、剩余次数计算、停止条件求值和最终人工升级目标。
      en: Return the policy revision, three-attempt history, two actual retry activities, remaining-attempt calculation, stop-condition evaluation, and final human-escalation target.
      ja: policy revision、三 attempt history、二 actual retry activity、remaining 計算、stop-condition evaluation、final human-escalation target を返します。
    why_valid_or_invalid:
      zh: 内部路由事实解释为何停止，跨模块 RetryActivity-governed_by-RetryPolicy 则证明实际重试确实遵守同一有界策略，两者职责不混合。
      en: Internal routing facts explain why control stops, while cross-module RetryActivity governance proves actual retries followed the same bounded policy without merging responsibilities.
      ja: 内部 routing fact は停止理由を説明し、cross-module RetryActivity governance は実際の retry が同じ bounded policy に従ったことを証明し、責務を混同しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
