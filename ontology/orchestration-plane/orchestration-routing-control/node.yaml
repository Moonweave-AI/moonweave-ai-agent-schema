    expected_result:
      zh: 停止 retry-activity-99，不从自然语言补造策略；要求提供有版本的上限、退避、错误分类和停止或转向条件后才能继续。
      en: Stop retry-activity-99 and infer no policy from prose; require a versioned limit, backoff, failure classes, and stop or redirect condition before continuation.
      ja: retry-activity-99 を停止し prose から policy を捏造せず、versioned limit、backoff、failure class、stop/redirect condition を要求します。
    why_valid_or_invalid:
      zh: RetryPolicy 是可审计规范而非提示短语；没有边界与终止条件时，重试活动既无法证明受治理，也可能形成不可控循环。
      en: RetryPolicy is an auditable specification, not a prompt phrase; without bounds and termination, the retry activity is ungoverned and may loop indefinitely.
      ja: RetryPolicy は監査可能 specification で prompt phrase ではなく、boundary と termination がなければ retry activity は ungoverned で無限 loop になり得ます。
