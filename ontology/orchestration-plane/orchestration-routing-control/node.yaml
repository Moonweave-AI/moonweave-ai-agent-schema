schema: moonweave.ai/ontology-node/v1
id: orchestration-routing-control
kind: module
labels:
  zh: 路由与门控
  en: Routing and gates
  ja: ルーティングとゲート制御
semantics:
  short_definition:
    zh: 路由与门控描述控制流应当如何选择，以及一次运行实际选择了什么。
    en: Routing and gates describe how control flow should choose and what one run actually chose.
    ja: ルーティングとゲート制御は、制御フローがどう選ぶべきかと一回の実行で実際に何を選んだかを表します。
  definition:
    zh: 本模块拥有两层对象：可复用的 RoutingSpecification（Route、RoutingPolicy、RetryPolicy、BranchCondition、GateCondition）规定候选路径、求值方式与停止/重试边界；Gate/ControlGate 执行门控求值并产生 GateOutcome；RoutingDecision 记录一次具体求值与选中的 RoutingTarget。规范、决定、目标引用与下游操作启动是四种不同身份，只能通过关系连接。RoutingDecision 不是 RoutingTarget 的子类，DownstreamOperation 也不是 GateOutcome 的子类；前者记录“选了哪里”，后者记录“结果触发了什么活动”。
    en: "This module owns two layers: reusable RoutingSpecification objects—Route, RoutingPolicy, RetryPolicy, BranchCondition, and GateCondition—govern candidate paths, evaluation, and stop/retry bounds; Gate and ControlGate perform gate evaluation and produce GateOutcome; RoutingDecision records one concrete evaluation and selected RoutingTarget. Specification, decision, target reference, and downstream-operation start are four distinct identities connected only by relations. RoutingDecision is not a subtype of RoutingTarget, and DownstreamOperation is not a subtype of GateOutcome; the former records where control went, the latter records which activity a result actually triggered."
    ja: 本モジュールは二層を所有します。再利用 RoutingSpecification—Route、RoutingPolicy、RetryPolicy、BranchCondition、GateCondition—が候補経路・評価・停止／再試行境界を規定し、Gate／ControlGate がゲート評価と GateOutcome を生成し、RoutingDecision が一回の具体評価と選択 RoutingTarget を記録します。仕様、判断、対象参照、downstream 操作開始は四つの別 identity で、関係だけで接続します。RoutingDecision は RoutingTarget の subtype ではなく、DownstreamOperation も GateOutcome の subtype ではありません。
  why_needed:
    zh: 没有可追溯的路由决定，团队无法解释为何一次请求走了 billing 分支、为何质量门把人转到人工复核，或为何重试在第三次后停止；静态 YAML 配置也会被误报成已经发生的控制选择。
    en: Without traceable routing decisions, teams cannot explain why a request took the billing branch, why a quality gate redirected to human review, or why retry stopped after the third attempt; static YAML configuration gets misreported as an executed control choice.
    ja: 追跡可能な routing decision がなければ、リクエストが billing 分岐を取った理由、品質 gate が human review へ向けた理由、3 回目以降 retry が止まった理由を説明できず、静的 YAML 設定が実行済み制御選択と誤報されます。
  includes:
    - zh: 可复用路由规范族：RoutingPolicy、Route、RetryPolicy、BranchCondition、GateCondition、StopCondition 与类型化 RoutingTarget。
      en: "Reusable routing specification family: RoutingPolicy, Route, RetryPolicy, BranchCondition, GateCondition, StopCondition, and typed RoutingTarget."
      ja: 再利用 routing specification 族：RoutingPolicy、Route、RetryPolicy、BranchCondition、GateCondition、StopCondition、型付き RoutingTarget。
    - zh: 实际控制链：ControlGate 求值条件并产生 GateOutcome；RoutingDecision 记录结果、应用策略并选择 RoutingTarget；有证据的 GateOutcome 可触发 DownstreamOperation。
      en: "Operational control chain: ControlGate evaluates conditions and produces GateOutcome; RoutingDecision records the outcome, applies policy, and selects RoutingTarget; an evidenced GateOutcome may trigger DownstreamOperation."
      ja: 実行 control chain：ControlGate が condition を評価し GateOutcome を生成；RoutingDecision が outcome を記録し policy を適用して RoutingTarget を選択；証拠付き GateOutcome が DownstreamOperation を trigger 可能。
  excludes:
    - zh: "静态协作拓扑与并行/链式组合结构（owner: orchestration-composition）；路由只在特定状态下选择其中一条可达路径。"
      en: "Static collaboration topology and parallel/chain composition structure (owner: orchestration-composition); routing chooses one reachable path for a particular state."
      ja: "静的協働 topology と parallel／chain composition 構造（owner: orchestration-composition）。routing は特定状態で到達可能経路の一つを選びます。"
    - zh: "AuthorizationGrant、PolicyDecision 与 ToolApprovalGate 的授权判定（owner: safety-permission-policy）；Gate 可引用授权结果作为证据，但不替代允许/拒绝语义。"
      en: "AuthorizationGrant, PolicyDecision, and ToolApprovalGate authorization adjudication (owner: safety-permission-policy); a Gate may reference authorization results as evidence but does not replace allow/deny semantics."
      ja: "AuthorizationGrant、PolicyDecision、ToolApprovalGate の認可判定（owner: safety-permission-policy）。Gate は認可結果を証拠として参照できますが allow／deny 意味を代替しません。"
    - zh: "RunAttempt、RetryActivity 与具体工具/模型调用（owner: runtime-execution-attempts）；RetryPolicy 在此是规范，实际重试尝试归运行域。"
      en: "RunAttempt, RetryActivity, and concrete tool or model invocations (owner: runtime-execution-attempts); RetryPolicy here is specification while actual retry attempts belong to runtime."
      ja: "RunAttempt、RetryActivity、具体的 tool／model 呼び出し（owner: runtime-execution-attempts）。RetryPolicy はここでは仕様であり、実 retry attempt は runtime 域です。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 LangGraph conditional_edges/Command/Send/interrupt、CrewAI Process 层级委派中的路由点、A2A tasks/send 触发的远程分支、OpenAI handoff 的控制转移，以及 Cursor Agent 模式中的验证门。compiled graph 边与 RoutingPolicy 是规范；一次 Command(goto=...)、RoutingDecision、A2A Task 状态迁移或 transfer_to_* 调用是发生事实。interrupt/resume 提供可暂停 Gate，但不自动创建 ToolApprovalGate 授权记录。
    en: "Integrations should map LangGraph conditional_edges/Command/Send/interrupt, routing points in CrewAI hierarchical Process delegation, remote branches triggered by A2A tasks/send, OpenAI handoff control transfer, and verification gates in Cursor agent mode separately. Compiled graph edges and RoutingPolicy are specifications; one Command(goto=...), RoutingDecision, A2A Task state transition, or transfer_to_* invocation is an occurrence. interrupt/resume provides a pausable Gate but does not automatically create ToolApprovalGate authorization records."
    ja: 統合では LangGraph conditional_edges／Command／Send／interrupt、CrewAI hierarchical Process 委任の routing point、A2A tasks/send が trigger する remote branch、OpenAI handoff 制御移転、Cursor Agent モードの verification gate を個別に写像します。compiled graph edge と RoutingPolicy は仕様、一回の Command(goto=...)、RoutingDecision、A2A Task 状態遷移、transfer_to_* 呼び出しは発生事実です。interrupt/resume は一時停止可能 Gate を提供しますが ToolApprovalGate 認可記録を自動生成しません。
  typical_input:
    - description: LangGraph conditional routing function reading classifier output from shared state.
      format: |
        from langgraph.types import Command

        def route_by_category(state):
            category = state.get("category")
            if category == "billing":
                return Command(goto="billing_handler", update={"routed_by": "classifier"})
            return Command(goto="__end__")

        builder.add_conditional_edges(
            "classify",
            route_by_category,
            {"billing_handler": "billing_handler", "__end__": END},
        )
      source_claims: [claim-orchestration-routing-control-langgraph]
    - description: LangGraph Send API for dynamic worker dispatch after a plan node.
      format: |
        from langgraph.types import Send

        def dispatch_workers(state):
            return [Send("worker", {"item": item}) for item in state["items"]]

        builder.add_conditional_edges("plan", dispatch_workers)
      source_claims: [claim-orchestration-routing-control-langgraph]
    - description: LangGraph interrupt before resume with explicit external value.
      format: |
        from langgraph.types import interrupt, Command

        def approval_gate(state):
            decision = interrupt({"kind": "approval", "tool_call": state["pending_tool"]})
            if decision == "approve":
                return Command(goto="execute_tool")
            return Command(goto="reject_tool")
      source_claims: [claim-orchestration-routing-control-langgraph]
    - description: A2A tasks/send creating a remote routed task after AgentCard discovery.
      format: |
        POST /a2a/v1/tasks/send
        {
          "message": {"role": "user", "parts": [{"kind": "text", "text": "Route to billing specialist"}]},
          "configuration": {"blocking": true}
        }
      source_claims: [claim-orchestration-routing-control-a2a]
  typical_output:
    - description: Moonweave-local routing decision projection separating policy, evaluation, selected target, and optional gate outcome.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "routing_policy_ref": "policy-support@7",
          "routing_decision_id": "decision-884",
          "evaluated_condition_ref": "branch-billing@3",
          "condition_result": true,
          "selected_target_ref": "target-billing-worker@5",
          "gate_outcome_id": null
        }
      source_claims: [claim-orchestration-routing-control-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: StateGraph, conditional_edges, Command(goto=...), Send(node, state), interrupt/resume.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Crews, Flows, @task, @crew, Process.sequential, Process.hierarchical routing through manager delegation.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send, tasks/get, AgentCard discovery for remote routing targets.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Agent loop, handoffs, sessions for control-transfer routing.
    - name: ReAct
      url: https://arxiv.org/abs/2210.03629
      description: Explicit next-action selection informing branch conditions in agent loops.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 路由与门控模块的稳定标识，不是某次 RoutingDecision 或 GateOutcome 的标识。
        en: Stable identifier of the routing-and-gates module, not a RoutingDecision or GateOutcome identifier.
        ja: ルーティングとゲート制御モジュールの安定識別子であり、RoutingDecision や GateOutcome の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-routing-control$'
      example_value: orchestration-routing-control
      allowed_values: []
      source_claims: [claim-orchestration-routing-control-design]
    - id: specification_occurrence_boundary
      labels: {zh: 规范/发生边界, en: Specification/occurrence boundary, ja: 仕様／発生境界}
      definitions:
        zh: 声明 RoutingPolicy/Route/RetryPolicy 为可复用规范，RoutingDecision/GateOutcome 为一次运行发生事实，RoutingTarget 为候选入口引用。
        en: States that RoutingPolicy, Route, and RetryPolicy are reusable specifications; RoutingDecision and GateOutcome are run occurrences; RoutingTarget is a candidate entry reference.
        ja: RoutingPolicy／Route／RetryPolicy は再利用仕様、RoutingDecision／GateOutcome は一回の実行発生事実、RoutingTarget は候補 entry 参照であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: spec-vs-decision
      allowed_values: [spec-vs-decision]
      source_claims: [claim-orchestration-routing-control-design]
  constraints:
    - id: routing-decision-requires-evaluation-evidence
      severity: error
      expression_language: plain
      expression: A RoutingDecision must identify frozen input state or equivalent evaluation evidence, the policy or condition revision used, and the selected RoutingTarget; a static Route or RoutingPolicy alone is insufficient.
      explanation:
        zh: 配置可达性不等于一次已执行的选择。
        en: Configured reachability is not an executed selection.
        ja: 設定された到達可能性は実行済み選択ではありません。
      source_claims: [claim-orchestration-routing-control-langgraph, claim-orchestration-routing-control-design]
    - id: gate-outcome-triggers-operation-not-target
      severity: error
      expression_language: plain
      expression: GateOutcome-triggers-DownstreamOperation must not be modeled as RoutingTarget-is_a-DownstreamOperation or GateOutcome-is_a-RoutingTarget.
      explanation:
        zh: 目标引用与已启动活动必须保持不同身份。
        en: A target reference and a started activity must remain distinct identities.
        ja: 対象参照と開始済み activity は別 identity のままにします。
      source_claims: [claim-orchestration-routing-control-design]
    - id: retry-policy-not-prose
      severity: warning
      expression_language: plain
      expression: RetryPolicy must declare versioned maximum attempts, backoff, retryable failure classes, and stop or redirect conditions; natural-language retry hints cannot substitute for RetryPolicy.
      explanation:
        zh: 无边界重试会把提示短语误报成可审计规范。
        en: Unbounded retry misreports prompt phrases as auditable specifications.
        ja: 境界のない retry は prompt 句を監査可能仕様と誤報します。
      source_claims: [claim-orchestration-routing-control-langgraph]
  required_relations:
    - id: routing-module-organizes-routing-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: RoutingSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条可复用 RoutingSpecification 规范链。
        en: The module organizes at least one reusable RoutingSpecification chain.
        ja: モジュールは少なくとも一つの再利用 RoutingSpecification 連鎖を組織します。
      source_claims: [claim-orchestration-routing-control-design]
    - id: routing-module-records-routing-decision
      direction: outgoing
      predicate: records
      target_concept_id: RoutingDecision
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块通过 RoutingDecision 记录一次条件求值与目标选择，而不把 Route 本身当作决定。
        en: The module records one condition evaluation and target selection through RoutingDecision rather than treating Route itself as the decision.
        ja: モジュールは Route 自体を decision とせず、RoutingDecision を通じ一回の condition 評価と target 選択を記録します。
      source_claims: [claim-orchestration-routing-control-design]
examples:
  - id: orchestration-routing-control-example-langgraph-conditional
    labels:
      zh: LangGraph 分类器条件路由
      en: LangGraph classifier conditional routing
      ja: LangGraph 分類器条件ルーティング
    descriptions:
      zh: classify 节点写入 state.category="billing" 后，route_by_category 返回 Command(goto="billing_handler")；RoutingDecision decision-884 记录 branch-billing@3 求值为 true 并选择 target-billing-worker@5，与 static route-billing@4 的候选一致。
      en: After classify writes state.category="billing", route_by_category returns Command(goto="billing_handler"); RoutingDecision decision-884 records branch-billing@3 as true and selects target-billing-worker@5, matching static candidate route-billing@4.
      ja: classify が state.category="billing" を書き込んだ後 route_by_category は Command(goto="billing_handler") を返し、RoutingDecision decision-884 は branch-billing@3=true を記録して target-billing-worker@5 を選択し、static route-billing@4 候補と一致します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 — conditional_edges and Command(goto=...)
    field_values:
      framework: langgraph
      input_state_ref: state-snapshot-551@1
      routing_policy_ref: policy-support@7
      evaluated_condition_ref: branch-billing@3
      condition_observation:
        category: billing
        confidence: 0.94
      condition_result: true
      command_return:
        goto: billing_handler
      routing_decision_id: decision-884
      selected_target_ref: target-billing-worker@5
      static_route_ref: route-billing@4
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - BranchCondition
      - Route
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-evaluates-RoutingCondition
      - RoutingDecision-selects-RoutingTarget
      - Route-points_to-RoutingTarget
    source_claims:
      - claim-orchestration-routing-control-langgraph
      - claim-orchestration-routing-control-design
  - id: orchestration-routing-control-example-crewai-hierarchical
    labels:
      zh: CrewAI 层级 crew 路由委派
      en: CrewAI hierarchical crew routing delegation
      ja: CrewAI 階層 crew ルーティング委任
    descriptions:
      zh: Process.hierarchical crew 中 manager_agent 读取当前 task 输出并决定下一执行者为 researcher 或 writer；RoutingDecision decision-crew-31 记录 RoutingPolicy crew-hierarchical@2 选择 target-researcher@1，对应 manager 的委派路由而非静态顺序边。
      en: In a Process.hierarchical crew, manager_agent reads current task output and chooses researcher or writer as the next executor; RoutingDecision decision-crew-31 records RoutingPolicy crew-hierarchical@2 selecting target-researcher@1 as manager delegation routing rather than a static sequential edge.
      ja: Process.hierarchical crew では manager_agent が現在 task 出力を読み次 executor を researcher か writer か決め、RoutingDecision decision-crew-31 は RoutingPolicy crew-hierarchical@2 が target-researcher@1 を選んだ manager 委任 routing を記録し、static sequential edge ではありません。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: v1.15 — Process.hierarchical and manager_agent
    field_values:
      framework: crewai
      process: hierarchical
      manager_agent: research_manager
      routing_policy_ref: crew-hierarchical@2
      candidate_targets:
        - target-researcher@1
        - target-writer@2
      routing_decision_id: decision-crew-31
      selected_target_ref: target-researcher@1
      delegation_rationale: unresolved source gathering for topic benchmark
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
      - RoutingTarget
      - DelegationProcess
    related_relation_ids:
      - RoutingDecision-applies-RoutingPolicy
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-orchestration-routing-control-crewai
      - claim-orchestration-routing-control-design
  - id: orchestration-routing-control-example-a2a-delegation
    labels:
      zh: A2A 协议任务委派路由
      en: A2A Protocol task delegation routing
      ja: A2A プロトコル task 委任ルーティング
    descriptions:
      zh: 协调 agent 通过 AgentCard 发现 billing_agent 后调用 tasks/send；RoutingDecision decision-a2a-551 记录选中 target-billing-agent@1，随后 tasks/get 返回 Task status.state=TASK_STATE_WORKING，表明远程路由目标已被激活。
      en: After discovering billing_agent through AgentCard, the coordinator calls tasks/send; RoutingDecision decision-a2a-551 records selected target-billing-agent@1, and tasks/get then returns Task status.state=TASK_STATE_WORKING, showing the remote routing target was activated.
      ja: 調整 agent が AgentCard で billing_agent を発見し tasks/send を呼び出すと、RoutingDecision decision-a2a-551 は target-billing-agent@1 選択を記録し、tasks/get は Task status.state=TASK_STATE_WORKING を返して remote routing target が活性化されたことを示します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: v1.0 — tasks/send, tasks/get, AgentCard
    field_values:
      framework: a2a
      agent_card_url: https://billing.example.com/.well-known/agent-card.json
      rpc_send: tasks/send
      rpc_get: tasks/get
      task_id: task-a2a-551
      routing_decision_id: decision-a2a-551
      selected_target_ref: target-billing-agent@1
      observed_task_state: TASK_STATE_WORKING
    related_node_ids:
      - RoutingDecision
      - RoutingTarget
      - RemoteAgentReference
    related_relation_ids:
      - RoutingDecision-selects-RoutingTarget
    source_claims:
      - claim-orchestration-routing-control-a2a
      - claim-orchestration-routing-control-design
  - id: orchestration-routing-control-example-openai-handoff
    labels:
      zh: OpenAI Agents SDK handoff 路由
      en: OpenAI Agents SDK handoff routing
      ja: OpenAI Agents SDK handoff ルーティング
    descriptions:
      zh: triage_agent 在 session-support-042 中调用 transfer_to_billing_agent；RoutingDecision decision-handoff-042 记录选中 target-billing-agent@3，HandoffOutputItem 作为 GateOutcome 类证据表明控制从 triage 转到 billing，而不是仅存在 handoffs 列表配置。
      en: triage_agent invokes transfer_to_billing_agent in session-support-042; RoutingDecision decision-handoff-042 records selected target-billing-agent@3, and a HandoffOutputItem acts as GateOutcome-class evidence that control moved from triage to billing rather than merely configuring a handoffs list.
      ja: triage_agent が session-support-042 で transfer_to_billing_agent を呼び、RoutingDecision decision-handoff-042 は target-billing-agent@3 選択を記録し、HandoffOutputItem が GateOutcome 級証拠として handoffs リスト設定だけでなく triage から billing へ制御が移ったことを示します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs — transfer_to_* within session loop
    field_values:
      framework: openai-agents-sdk
      session_id: session-support-042
      source_agent: triage_agent
      target_agent: billing_agent
      handoff_tool: transfer_to_billing_agent
      routing_decision_id: decision-handoff-042
      selected_target_ref: target-billing-agent@3
      handoff_output_item_id: handoff-output-042
    related_node_ids:
      - RoutingDecision
      - RoutingTarget
      - GateOutcome
      - Handoff
    related_relation_ids:
      - RoutingDecision-selects-RoutingTarget
      - ControlGate-produces-GateOutcome
    source_claims:
      - claim-orchestration-routing-control-openai
      - claim-orchestration-routing-control-design
  - id: orchestration-routing-control-example-cursor-agent-gates
    labels:
      zh: Cursor Agent 模式多步验证门
      en: Cursor agent mode multi-step verification gates
      ja: Cursor Agent モード多段検証ゲート
    descriptions:
      zh: Cursor Agent 模式在 rewrite-node-yaml 后运行 validation；eval-score-991=0.62 低于 gate-quality@5 阈值 0.80，ControlGate control-gate-4 产生 redirect outcome-884，RoutingDecision decision-884 选择 target-human-review@2 并触发 operation-human-review-884。
      en: Cursor agent mode runs validation after rewrite-node-yaml; eval-score-991=0.62 is below gate-quality@5 threshold 0.80, ControlGate control-gate-4 produces redirect outcome-884, and RoutingDecision decision-884 selects target-human-review@2 and triggers operation-human-review-884.
      ja: Cursor Agent モードは rewrite-node-yaml 後 validation を実行し、eval-score-991=0.62 が gate-quality@5 閾値 0.80 未満のため ControlGate control-gate-4 は redirect outcome-884 を生成し、RoutingDecision decision-884 は target-human-review@2 を選び operation-human-review-884 を trigger します。
    example_source:
      product: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      version: multi-step orchestration with linter/test verification gates
