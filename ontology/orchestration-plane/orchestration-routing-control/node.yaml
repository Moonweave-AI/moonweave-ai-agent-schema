  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Gate
      - RoutingSpecification
    allowed_backbone_predicates:
      - is_a
      - selects
      - triggers
    flat_root_exception_concept_ids:
      - GateOutcome
      - RoutingTarget
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-routing-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐根反例复核：Gate 是可复用求值能力，RoutingSpecification 是可复用控制规范，二者都可在无运行事实时存在；GateOutcome 可来自非 ControlGate 的领域 Gate，不能挂到 ControlGate；RoutingTarget 可作为候选先于任何决定存在。RoutingDecision 则必须选出一个 RoutingTarget，故以 selects 接入目标骨架。
            en: "Root-by-root counterexample review: Gate is a reusable evaluation capability and RoutingSpecification a reusable control specification, both of which can exist without a run. GateOutcome may be produced by a domain Gate other than ControlGate and therefore cannot be placed under ControlGate; RoutingTarget can exist as an eligible candidate before any decision. RoutingDecision must select one RoutingTarget, so selects places the occurrence in the target backbone."
            ja: 根ごとの反証確認：Gate は再利用可能な評価能力、RoutingSpecification は再利用可能な制御仕様で、どちらも実行事実なしに存在できます。GateOutcome は ControlGate 以外の domain Gate からも生成され得るため ControlGate 配下に置けず、RoutingTarget は決定前の候補として存在できます。RoutingDecision は一つの RoutingTarget を必ず選ぶため、selects で target 骨格へ接続します。
        - reviewer_id: moonweave-routing-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体反例保留四个独立根轴：Gate、RoutingSpecification、GateOutcome、RoutingTarget。GateOutcome 的 gate_ref 指向一般 Gate，而当前 accepted 的 produces 只覆盖 ControlGate，不能冒充全称主干；RoutingTarget 的候选身份也不证明已被选择。RoutingDecision-selects-RoutingTarget 只把每次已发生决定挂在其选中目标下，GateOutcome-triggers-DownstreamOperation 继续承载结果到实际活动的因果链。
            en: "Ontology counterexamples retain four independent root axes: Gate, RoutingSpecification, GateOutcome, and RoutingTarget. GateOutcome's gate_ref names a general Gate while the accepted produces relation covers only ControlGate, so it cannot serve as a universal backbone; candidate status likewise does not prove a RoutingTarget was selected. RoutingDecision-selects-RoutingTarget places only an occurred decision under its selected target, while GateOutcome-triggers-DownstreamOperation continues the outcome-to-activity causal chain."
            ja: ontology の反証により Gate・RoutingSpecification・GateOutcome・RoutingTarget の四つの独立 root axis を残します。GateOutcome の gate_ref は一般 Gate を指す一方、accepted produces は ControlGate のみを覆うため全称主幹にはできません。候補であることも RoutingTarget の選択を証明しません。RoutingDecision-selects-RoutingTarget は発生済み decision だけを selected target 配下に置き、GateOutcome-triggers-DownstreamOperation は outcome-to-activity の因果鎖を継続します。
        - reviewer_id: moonweave-routing-terminology-reviewer
          reviewer_role: schema
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 三语复核逐一保留 Gate、RoutingSpecification、GateOutcome、RoutingTarget 的身份差异，并把“候选列表存在但决定尚未运行”写为 selects 的边界反例；RoutingDecision 与 RoutingTarget 不被表述为 is_a。
            en: Trilingual review preserves the distinct identities of Gate, RoutingSpecification, GateOutcome, and RoutingTarget and states “the candidate list exists but no decision has run” as the selects boundary counterexample; RoutingDecision and RoutingTarget are never described through is_a.
            ja: 三言語審査は Gate・RoutingSpecification・GateOutcome・RoutingTarget の identity 差を保持し、「candidate list は存在するが decision は未実行」を selects の境界反証とします。RoutingDecision と RoutingTarget を is_a で表現しません。
