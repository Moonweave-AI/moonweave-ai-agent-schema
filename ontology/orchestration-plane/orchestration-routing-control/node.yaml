        - allow
        - block
      configured_condition_ref: gate-quality@5
      control_gate_id: null
      evidence_ref: null
      gate_outcome_id: null
      routing_decision_id: null
      selected_target_ref: null
      downstream_operation_id: null
    related_node_ids:
      - Gate
      - ControlGate
      - GateCondition
      - GateOutcome
      - RoutingDecision
      - RoutingTarget
      - DownstreamOperation
    related_relation_ids:
      - ControlGate-is_a-Gate
      - ControlGate-evaluates-GateCondition
      - ControlGate-produces-GateOutcome
      - RoutingDecision-records-GateOutcome
      - RoutingDecision-selects-RoutingTarget
      - GateOutcome-triggers-DownstreamOperation
    expected_result:
      zh: 只返回门能力与可用条件，不创建结果、决定、目标选择或下游触发事实，并报告缺少发生证据。
      en: Return only gate capability and available condition; create no outcome, decision, target selection, or downstream trigger and report missing occurrence evidence.
      ja: gate capability と available condition のみを返し、outcome、decision、target selection、downstream trigger を作らず occurrence evidence 欠落を報告します。
    why_valid_or_invalid:
      zh: Gate 是一般能力类型，ControlGate 才是编排控制专门化；即使类型和条件都存在，也不能替代一次求值活动及其结果。
      en: Gate is a general capability and ControlGate its orchestration specialization; the type and a condition cannot substitute for an evaluation occurrence and result.
      ja: Gate は一般 capability、ControlGate は orchestration specialization であり、type と condition の存在だけで evaluation occurrence と result を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-routing-control-001
      - claim-orchestration-routing-control-004
  - id: orchestration-routing-control-cq-retry-stop-v3-example-positive
    kind: positive
    labels:
      zh: 第三次受治理尝试耗尽后转向人工升级
      en: Third governed attempt exhausts the policy and redirects to human escalation
      ja: 第三 governed attempt で policy を使い切り human escalation へ redirect
    scenario_id: orchestration-routing-control-cq-retry-stop-v3-example-positive
    descriptions:
      zh: decision-failure-9 应用 retry-api@2；retry-activity-2 与 retry-activity-3 均明确受该版本治理，第三次 RunAttempt 失败后 remaining=0，stop-exhausted@3 求值为 true，决定转向 target-human-escalation@2。
      en: decision-failure-9 applies retry-api@2; retry-activity-2 and retry-activity-3 are explicitly governed by that revision, and after the third RunAttempt fails with remaining=0, stop-exhausted@3 evaluates true and target-human-escalation@2 is selected.
      ja: decision-failure-9 は retry-api@2 を適用し、retry-activity-2/3 は同 revision に govern され、第三 RunAttempt failure で remaining=0、stop-exhausted@3=true となり target-human-escalation@2 を選びます。
    field_values:
      routing_decision_id: decision-failure-9
      retry_policy_ref: retry-api@2
      maximum_attempts: 3
      run_attempt_refs:
        - run-attempt-901
        - run-attempt-902
        - run-attempt-903
      retry_activity_refs:
        - retry-activity-2
        - retry-activity-3
      governing_policy_refs:
        - retry-api@2
        - retry-api@2
      last_failure_class: upstream-timeout
      remaining_attempts: 0
      stop_condition_ref: stop-exhausted@3
      stop_condition_result: true
      selected_target_ref: target-human-escalation@2
      decided_at: 2026-07-16T14:40:18Z
    related_node_ids:
