        zh: 两者都连接步骤，但拓扑定义可能路径结构，路由决定在特定状态下实际走哪一条。 本条仅记录 OrchestrationTopology、ParallelBranch；其 canonical owner 是协作组合（orchestration-composition），因此 orchestration-routing-control 在此引用这些概念。
