source_claims:
  - id: claim-routing-policy-001
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API distinguishes workflow state, executable nodes, static edges, conditional routing functions, termination targets, and Command values that combine state updates with a selected destination. Moonweave uses this to separate reusable routing specifications and targets from one RoutingDecision occurrence.
    locator: LangGraph Graph API documentation, Graphs, Edges, Conditional edges, and Command sections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-002
    source: eng-fw-autogen-agentchat
    supports: AutoGen SelectorGroupChat selects a next participant from described candidates using current conversation context and stops when an explicit termination condition is satisfied. Moonweave uses this as evidence for typed routing targets, selection decisions, and separately evaluated stop conditions.
    locator: AutoGen AgentChat documentation, Selector Group Chat workflow and Termination Conditions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes plans and other Entities from time-bounded Activities that use or generate Entities. Moonweave therefore treats routing policy and conditions as reusable specifications, RoutingDecision as an occurrence, and GateOutcome as information produced by gate evaluation.
    locator: W3C PROV-O Recommendation Sections 3.1 and 3.2, Entity, Activity, generation, and Plan
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-004
    source: eng-fw-langgraph-graph-api
    supports: The official LangGraph Graph API defines conditional edges through a routing function evaluated after a source node and maps its result to next nodes. Moonweave reifies the reusable predicates evaluated by that function as condition references.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-005
    source: eng-fw-autogen-agentchat
    supports: The official AutoGen SelectorGroupChat documentation defines candidate_func to narrow the potential agents for each selection and rejects an empty candidate list. Moonweave records the admissible Route set before any one selection occurs.
    locator: AutoGen Selector Group Chat > Custom Candidate Function
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-006
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional routing returns one or more destination node names and may map routing outputs to those names. Moonweave binds the permitted destinations through candidate Route references.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges and routing output map
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-007
    source: eng-fw-autogen-agentchat
    supports: The official AutoGen SelectorGroupChat documentation permits a custom selector function for complex selection logic and state-based transitions. Moonweave requires the winner order and tie resolution to be declared so the same evidence yields a reproducible choice.
    locator: AutoGen Selector Group Chat > Custom Selector Function
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-008
    source: eng-fw-autogen-agentchat
    supports: AutoGen documents that a custom selector may return None to fall back to the default selection mechanism. Moonweave makes the fallback explicit and binds it to a reviewed candidate Route.
    locator: AutoGen Selector Group Chat > Custom Selector Function > None fallback
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-009
    source: eng-fw-langgraph-graph-api
    supports: The official LangGraph Graph API states that conditional edges may optionally route to one or more edges or terminate. This controlled value preserves the explicit termination outcome.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges > optional termination
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-010
    source: eng-fw-autogen-agentchat
    supports: The official AutoGen SelectorGroupChat documentation states that candidate_func returning None or an empty list raises ValueError. Moonweave generalizes that fail-fast outcome as a routing error code.
    locator: AutoGen Selector Group Chat > Custom Candidate Function > empty candidate error
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-011
    source: eng-fw-langgraph-graph-api
    supports: LangGraph conditional edges may route to one or more nodes or terminate, establishing that no-match behavior cannot remain implicit in a reusable routing policy.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-012
    source: eng-fw-autogen-agentchat
    supports: AutoGen distinguishes selector fallback from an invalid empty candidate result. Moonweave turns fallback, termination, and error into reviewed mutually exclusive policy outcomes.
    locator: AutoGen Selector Group Chat > Custom Selector Function and Custom Candidate Function
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-013
    source: eng-fw-langgraph-graph-api
    supports: The official LangGraph Graph API permits a routing result to be mapped to the exact name of the next node. Moonweave records the exact reviewed fallback Route rather than merely saying that fallback exists.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges > path map
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-014
    source: eng-fw-langgraph-graph-api
    supports: The official LangGraph Graph API states that a routing function receives the current graph state and returns the next destination. Moonweave requires the exact state snapshot and classifier evidence used by that function to be named for replay.
    locator: LangGraph Graph API > Graphs > Edges > Conditional edges > routing function state input
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-015
    source: eng-fw-autogen-agentchat
    supports: AutoGen SelectorGroupChat exposes candidate roles and conversation history to the selector and supports state-based custom selection. Moonweave records those selection inputs as explicit evidence requirements.
    locator: AutoGen Selector Group Chat > Selector Prompt and Custom Selector Function
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-policy-016
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph fault-tolerance documentation defines retry policy parameters such as maximum attempts, backoff, jitter, retryable errors, timeouts, exhaustion, and subsequent error handling. Moonweave uses these as fields of RetryPolicy while keeping each retry decision and attempt as separate occurrences.
    locator: LangGraph Fault tolerance documentation, Retries, Parameters, Timeouts, and Error handling sections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
