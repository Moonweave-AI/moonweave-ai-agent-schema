schema: moonweave.ai/ontology-node/v1
id: RoutingPolicy
kind: concept
labels:
  zh: 路由策略
  en: routing policy
  ja: ルーティングポリシー
semantics:
  short_definition:
    zh: 组合候选 Route、条件优先级与无匹配处理的选择规则规范。
    en: A selection-rule specification composing candidate routes, condition precedence, and no-match handling.
    ja: candidate route・condition precedence・no-match handling を組み合わせる selection rule specification です。
  definition:
    zh: RoutingPolicy 是 RoutingSpecification 的子类，种差为把 BranchCondition、candidate_route_refs、precedence_rule、no_match_behavior、fallback_route_ref 与 evidence_requirements 组合成版本化选择规则。LangGraph conditional_edges 的 path map 与 route function 组合、CrewAI manager 选择逻辑、OpenAI handoff 列表的优先级均可投影为 RoutingPolicy；RoutingDecision 应用它产生一次结果，策略本身不选择目标。
    en: A RoutingPolicy is a RoutingSpecification distinguished by combining BranchCondition records, candidate_route_refs, precedence_rule, no_match_behavior, fallback_route_ref, and evidence_requirements into a versioned selection rule. LangGraph conditional_edges path maps with route functions, CrewAI manager selection logic, and OpenAI handoff list precedence may project to RoutingPolicy; RoutingDecision applies it to produce one outcome while the policy selects no target.
    ja: RoutingPolicy は BranchCondition/candidate routes/precedence/no-match/fallback/evidence requirements を組み合わせる subtype です。LangGraph conditional_edges・CrewAI manager・OpenAI handoffs が写像可能です。
  why_needed:
    zh: 明确策略与决定的分工，可审计策略版本变化而不改写历史选择，并强制声明 fallback 与 priority ordering。
    en: Separating policy from decision audits policy revisions without rewriting historical selections and forces explicit fallback and priority ordering.
    ja: policy と decision を分け revision audit と fallback/priority ordering 明示を強制します。
  includes:
    - zh: 意图路由、能力路由、负载路由、风险转向、人工升级和无匹配回退规则。
      en: Intent, capability, load, risk, human-escalation, and no-match fallback routing rules.
      ja: intent/capability/load/risk/human escalation/no-match fallback rule。
  excludes:
    - zh: 策略求值结果、候选 worker 自身、一次 GateOutcome 和网络访问策略。
      en: Policy-evaluation outcome, a candidate worker itself, one GateOutcome, and network-access policy.
      ja: policy outcome・candidate worker・GateOutcome・network access policy。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph conditional_edges(source, fn, path_map) 整体映射为一个 RoutingPolicy：condition_refs 来自 BranchCondition，candidate_route_refs 来自 path_map 值，precedence_rule 固定 tie-breaker。no_match_behavior 必须显式声明 select-fallback-route、terminate-without-route 或 raise-routing-error 之一；CrewAI selector 返回 None 时映射 select-fallback-route。
    en: LangGraph conditional_edges(source, fn, path_map) maps to one RoutingPolicy where condition_refs come from BranchConditions, candidate_route_refs from path_map values, and precedence_rule fixes tie-breakers. no_match_behavior must explicitly declare select-fallback-route, terminate-without-route, or raise-routing-error; CrewAI selector returning None maps to select-fallback-route.
    ja: LangGraph conditional_edges 全体を RoutingPolicy に写像し no_match_behavior を明示必須とします。
  typical_input:
    - description: LangGraph conditional routing policy declaration.
      format: |
        builder.add_conditional_edges(
            "classify",
            route_by_category,
            {
                "billing": "billing_handler",
                "technical": "technical_handler",
                "fallback": "human_review",
                END: END,
            },
        )
      source_claims: [claim-routing-policy-langgraph]
  typical_output:
    - description: Versioned routing policy manifest.
      format: |
        {
          "routing_specification_id": "policy-support-routing",
          "version": "7",
          "candidate_route_refs": ["route-billing", "route-technical", "route-human-review"],
          "no_match_behavior": "select-fallback-route",
          "fallback_route_ref": "route-human-review"
        }
      source_claims: [claim-routing-policy-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: conditional_edges path maps, fallback and END termination.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Manager selector precedence and None fallback.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff list priority ordering.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent candidate ordering in multi-agent routing.
structure:
  identity_keys: []
  fields:
    - id: condition_refs
      labels:
        zh: 条件引用集合
        en: condition references
        ja: 条件参照集合
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出本策略必须求值的一个或多个 RoutingCondition 标识。
        en: Lists one or more RoutingCondition identifiers this policy must evaluate.
        ja: policy が evaluate する RoutingCondition 識別子集合。
      allowed_values: []
      pattern: null
      example_value:
        - condition-billing-intent
        - condition-technical-intent
        - condition-high-risk
      source_claims:
        - claim-routing-policy-langgraph
    - id: candidate_route_refs
      labels:
        zh: 候选路径引用集合
        en: candidate route references
        ja: 候補経路参照集合
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该策略获准选择的非空 Route 集合。
        en: Lists the non-empty set of Route identifiers this policy may select.
        ja: policy が選択可能な非空 Route 集合。
      allowed_values: []
      pattern: null
      example_value:
        - route-billing
        - route-technical
        - route-human-review
      source_claims:
        - claim-routing-policy-langgraph
    - id: precedence_rule
      labels:
        zh: 优先规则
        en: precedence rule
        ja: 優先順位規則
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定多条件同时成立时的路径顺序与确定性平局处理。
        en: Defines route order and deterministic tie handling when multiple conditions hold.
        ja: 複数条件成立時の経路順序と tie handling。
      allowed_values: []
      pattern: null
      example_value:
        ordered_route_refs:
          - route-human-review
          - route-billing
          - route-technical
        tie_breaker: first-listed
      source_claims:
        - claim-routing-policy-crewai
    - id: no_match_behavior
      labels:
        zh: 无匹配处理
        en: no-match behavior
        ja: 不一致時の処理
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 无合法候选时选择后备路径、无路径终止或抛出路由错误。
        en: Selects fallback route, terminates without route, or raises routing error when no eligible candidate exists.
        ja: 適格候補なし時 fallback/terminate/error の排他選択。
      allowed_values:
        - id: RoutingPolicyNoMatchSelectFallbackRoute
          value: select-fallback-route
          labels:
            zh: 选择后备路径
            en: select fallback route
            ja: 後備経路を選択
          definitions:
            zh: 无匹配时选择 fallback_route_ref 所指且已列入候选集合的路径。
            en: Select the fallback_route_ref route from the candidate set when no condition matches.
            ja: 不一致時 candidate 内 fallback route を選択。
          source_claims:
            - claim-routing-policy-crewai
        - id: RoutingPolicyNoMatchTerminateWithoutRoute
          value: terminate-without-route
          labels:
            zh: 无路径终止
            en: terminate without route
            ja: 経路なしで終了
          definitions:
            zh: 无匹配时结束控制流，不选择任何候选路径（LangGraph END）。
            en: End control flow without selecting any candidate route (LangGraph END).
            ja: 不一致時 END 相当で終了。
          source_claims:
            - claim-routing-policy-langgraph
        - id: RoutingPolicyNoMatchRaiseRoutingError
          value: raise-routing-error
          labels:
            zh: 抛出路由错误
            en: raise routing error
            ja: ルーティングエラーを送出
          definitions:
            zh: 无匹配时将缺失合法候选视为配置或运行错误。
            en: Treat missing eligible candidate as configuration or runtime error.
            ja: 適格候補なしを設定/実行時エラーとみなす。
          source_claims:
            - claim-routing-policy-crewai
      pattern: null
      example_value: select-fallback-route
      source_claims:
        - claim-routing-policy-design
    - id: fallback_route_ref
      labels:
        zh: 后备路径引用
        en: fallback route reference
        ja: 後備経路参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: no_match_behavior 为 select-fallback-route 时引用的唯一 Route。
        en: References the one Route when no_match_behavior is select-fallback-route.
        ja: select-fallback-route 時の単一 Route 参照。
      allowed_values: []
      pattern: null
      example_value: route-human-review
      source_claims:
        - claim-routing-policy-langgraph
    - id: evidence_requirements
      labels:
        zh: 选择证据要求
        en: selection evidence requirements
        ja: 選択証拠要件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定求值前必须取得的证据引用、最低分类置信度与是否要求冻结输入快照。
        en: Fixes evidence references, minimum classifier confidence, and frozen-input requirement before evaluation.
        ja: 評価前 evidence ref/最低信頼度/frozen input 必須性。
      allowed_values: []
      pattern: null
      example_value:
        required_evidence_refs:
          - request-state-snapshot
          - intent-classifier-result
        minimum_classifier_confidence: 0.8
        require_frozen_input: true
      source_claims:
        - claim-routing-policy-langgraph
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingPolicy-example-langgraph-conditional
    labels:
      zh: LangGraph 条件路由策略
      en: LangGraph conditional routing policy
      ja: LangGraph conditional routing policy
    descriptions:
      zh: policy-support@7 对应 classify 节点 conditional_edges path map，候选 billing/technical/human-review，同分优先 human，无匹配 fallback human-review。
      en: policy-support@7 corresponds to classify conditional_edges path map with billing/technical/human-review candidates, human preferred on tie, human-review fallback on no match.
      ja: policy-support@7 は LangGraph conditional_edges path map に対応します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges
    field_values:
      routing_specification_id: policy-support-routing
      version: "7"
      eligible_target_types:
        - worker
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      condition_refs:
        - condition-billing-intent
        - condition-technical-intent
        - condition-high-risk
      candidate_route_refs:
        - route-billing
        - route-technical
        - route-human-review
      precedence_rule:
        ordered_route_refs:
          - route-human-review
          - route-billing
          - route-technical
        tie_breaker: first-listed
      no_match_behavior: select-fallback-route
      fallback_route_ref: route-human-review
      evidence_requirements:
        required_evidence_refs:
          - request-state-snapshot
          - intent-classifier-result
        minimum_classifier_confidence: 0.8
        require_frozen_input: true
    related_node_ids:
      - RoutingPolicy
      - BranchCondition
      - Route
    related_relation_ids:
      - RoutingPolicy-has_condition-BranchCondition
    source_claims:
      - claim-routing-policy-langgraph
  - id: RoutingPolicy-example-crewai-manager
    labels:
      zh: CrewAI manager 路由策略
      en: CrewAI manager routing policy
      ja: CrewAI manager routing policy
    descriptions:
      zh: policy-crew-hierarchical@2 声明 manager 在 researcher/writer 间按 precedence 选择，selector 返回 None 时 fallback writer。
      en: policy-crew-hierarchical@2 declares manager selects among researcher/writer by precedence with writer fallback when selector returns None.
      ja: policy-crew-hierarchical@2 は manager precedence+None fallback を宣言します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical selector
    field_values:
      routing_specification_id: policy-crew-hierarchical
      version: "2"
      candidate_route_refs:
        - route-researcher
        - route-writer
      no_match_behavior: select-fallback-route
      fallback_route_ref: route-writer
    related_node_ids:
      - RoutingPolicy
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-crewai
  - id: RoutingPolicy-example-openai-handoffs
    labels:
      zh: OpenAI handoff 优先级策略
      en: OpenAI handoff priority policy
      ja: OpenAI handoff priority policy
    descriptions:
      zh: policy-triage@1 按 billing→technical→general handoff 顺序排列 candidate_route_refs，无匹配 raise-routing-error。
      en: policy-triage@1 orders candidate_route_refs billing→technical→general handoff with raise-routing-error on no match.
      ja: policy-triage@1 は handoff 優先順序と no-match error を宣言します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs priority
    field_values:
      routing_specification_id: policy-triage
      version: "1"
      candidate_route_refs:
        - route-to-billing
        - route-to-technical
        - route-to-general
      no_match_behavior: raise-routing-error
    related_node_ids:
      - RoutingPolicy
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-openai
  - id: RoutingPolicy-example-boundary-rationale
    labels:
      zh: 一次选择理由不是策略
      en: One selection rationale is not policy
      ja: one rationale は policy ではない
    descriptions:
      zh: decision-884.rationale 只解释一次账单分流，没有版本化候选集合。
      en: decision-884.rationale explains one billing selection with no versioned candidate set.
      ja: decision-884.rationale は one selection のみで versioned candidate set がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: policy versus decision
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-design
parent_relation:
  id: RoutingPolicy-is_a-RoutingSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: RoutingPolicy 是一种 RoutingSpecification；其种差是组合候选路径、分支条件、优先级和无匹配处理。
    en: A RoutingPolicy is a RoutingSpecification distinguished by combining candidate paths, branch conditions, precedence, and no-match handling.
    ja: RoutingPolicy は candidate path/branch condition/precedence/no-match を組み合わせる subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RoutingPolicy-is_a-RoutingSpecification-example-positive
      kind: positive
      labels:
        zh: 客服意图路由策略
        en: Support-intent routing policy
        ja: support intent routing policy
      descriptions:
        zh: policy-support@7 组合三类条件、候选 worker 与人工后备。
        en: policy-support@7 combines three condition classes, candidate workers, and human fallback.
        ja: policy-support@7 は versioned reusable selection rule です。
      field_values: {}
      related_node_ids:
        - RoutingPolicy
        - RoutingSpecification
      related_relation_ids:
        - RoutingPolicy-is_a-RoutingSpecification
      source_claims:
        - claim-routing-policy-design
  source_claims:
    - claim-routing-policy-design
  endpoint_order: child-to-parent
relations:
  - id: RoutingPolicy-has_condition-BranchCondition
    predicate: has_condition
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 包含条件
      en: has condition
      ja: 条件を持つ
    definitions:
      zh: RoutingPolicy 组合并版本锁定 BranchCondition，定义候选路径适用结果与优先级。
      en: A RoutingPolicy composes and version-locks BranchCondition defining candidate-path applicability and precedence.
      ja: RoutingPolicy は BranchCondition revision を compose/lock します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: condition_of
      labels:
        zh: 是其条件
        en: is condition of
        ja: の条件である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: RoutingPolicy-has_condition-BranchCondition-example-positive
        kind: positive
        labels:
          zh: 客服策略包含账单分支条件
          en: Support policy has billing branch condition
          ja: support policy has billing branch
        descriptions:
          zh: policy-support@7 包含 branch-billing@3 并规定优先级 20。
          en: policy-support@7 includes branch-billing@3 at precedence 20.
          ja: policy-support@7 は branch-billing@3 precedence=20 を含みます。
        field_values: {}
        related_node_ids:
          - RoutingPolicy
          - BranchCondition
        related_relation_ids:
          - RoutingPolicy-has_condition-BranchCondition
        source_claims:
          - claim-routing-policy-design
    target: concept:BranchCondition
