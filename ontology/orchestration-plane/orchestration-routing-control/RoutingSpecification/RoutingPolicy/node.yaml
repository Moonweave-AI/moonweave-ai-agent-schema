    source: langgraph-routing-policy
    supports: LangGraph conditional_edges combine route functions and path maps into reusable selection policies with fallback and END outcomes.
    locator: Graph API — Conditional edges, path map, END
    evidence_kind: official
    confidence: high
  - id: claim-routing-policy-crewai
    source: crewai-routing-policy
    supports: CrewAI selector None fallback and candidate narrowing map to no_match_behavior and precedence_rule.
