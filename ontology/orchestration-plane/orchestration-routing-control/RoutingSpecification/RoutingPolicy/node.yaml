schema: moonweave.ai/ontology-node/v1
id: RoutingPolicy
kind: concept
labels:
  zh: 路由策略
  en: routing policy
  ja: routing policy
semantics:
  short_definition:
    zh: 规定如何从候选路径与目标中作出选择的版本化路由规范。
    en: A versioned routing specification governing how a target is selected from candidate paths and targets.
    ja: candidate path/target から selection する方法を govern する versioned routing specification。
  definition:
    zh: 路由策略是 RoutingSpecification 的子类，其种差是把一组 BranchCondition、候选 Route、优先规则、无匹配处理和证据要求组合成选择规则。RoutingDecision 应用它产生一次结果；策略本身不选择目标。
    en: A RoutingPolicy is a RoutingSpecification distinguished by combining BranchCondition records, candidate Routes, precedence rules, no-match handling, and evidence requirements into a selection rule. A RoutingDecision applies it to produce one outcome; the policy itself selects no target.
    ja: RoutingPolicy は BranchCondition・candidate Route・precedence・no-match handling・evidence requirement を selection rule に組合せる subtype で RoutingDecision が apply します。policy 自体は target を select しません。
  why_needed:
    zh: 明确策略与决定的分工，可审计策略版本变化而不改写历史选择。
    en: Separating policy from decision audits policy revisions without rewriting historical selections.
    ja: policy と decision を分け policy revision を audit し historical selection を書換えません。
  includes:
    - zh: 意图路由、能力路由、负载路由、风险转向、人工升级和无匹配回退规则。
      en: Intent, capability, load, risk, human-escalation, and no-match fallback routing rules.
      ja: intent・capability・load・risk・human escalation・no-match fallback rule。
  excludes:
    - zh: 策略求值结果、候选 worker 自身、一次 GateOutcome 和网络访问策略。
      en: Policy-evaluation outcome, a candidate worker itself, one GateOutcome, and network-access policy.
      ja: policy outcome・candidate worker・GateOutcome・network access policy。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      RoutingPolicy 在 RoutingDecision 求值时合并 Route、RetryPolicy 与 RoutingCondition：LangGraph 路由函数
      读取 policy_ref 决定候选目标排序与冲突消解；OPA 用 default 与 partial set 规则表达同语义。Policy
      revision 不变；一次 decision 输出 selected_target 与 applied_policy_ref。
    en: >-
      RoutingPolicy merges Route, RetryPolicy, and RoutingCondition during RoutingDecision evaluation: LangGraph routing
      functions read policy_ref to order candidate targets and resolve conflicts; OPA expresses the same with default and
      partial set rules. Policy revision stays immutable; one decision outputs selected_target and applied_policy_ref.
    ja: >-
      RoutingPolicy は RoutingDecision evaluation 時に Route、RetryPolicy、RoutingCondition を merge する。LangGraph routing
      function は policy_ref を読み candidate target の order と conflict resolution を決める。OPA は default と partial set
      rule で同语义を表す。policy revision は immutable。one decision は selected_target と applied_policy_ref を出力する。
  typical_input:
    - description:
        zh: 绑定多条 Route 与 Condition 的路由策略规约。
        en: A routing policy specification binding multiple Routes and Conditions.
        ja: 複数 Route と Condition を bind する routing policy specification。
      format: |-
        {"policy_id":"policy:release-branch@2","routing_spec_ref":"rs:release-routing@3","route_refs":["route:sign-to-approve","route:sign-to-review"],"condition_refs":["cond:risk-high@1"],"conflict_resolution":"highest_precedence"}
  typical_output:
    - description:
        zh: RoutingDecision 求值时应用的政策引用与候选目标排序。
        en: Applied policy reference and candidate target ordering during RoutingDecision evaluation.
        ja: RoutingDecision evaluation 時の applied policy reference と candidate target ordering。
      format: |-
        {"applied_policy_ref":"policy:release-branch@2","candidates":[{"target_ref":"target:node:review","precedence":10},{"target_ref":"target:node:approve","precedence":5}],"routing_decision_id":"rd-886"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing functions that apply policy-ordered target selection.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents default and conflict rules for policy-driven routing decisions.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents goto results after policy evaluation selects a target.
  source_claims:
    - claim-routing-policy-001
    - claim-routing-policy-003
structure:
  identity_keys: []
  fields:
    - id: condition_refs
      labels:
        zh: 条件引用集合
        en: condition references
        ja: 条件参照集合
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出本策略必须求值的一个或多个 RoutingCondition 标识；每个标识引用版本内固定的判定规范，而不是某次求值结果。
        en: Lists one or more RoutingCondition identifiers that this policy must evaluate; each identifier denotes a fixed predicate specification, not an evaluation result.
        ja: この方針が評価する一つ以上の RoutingCondition 識別子を列挙し、各識別子は評価結果ではなく版内で固定された判定仕様を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - condition-billing-intent
        - condition-technical-intent
        - condition-high-risk
      source_claims:
        - claim-routing-policy-004
    - id: candidate_route_refs
      labels:
        zh: 候选路径引用集合
        en: candidate route references
        ja: 候補経路参照集合
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该策略获准选择的非空 Route 集合；运行时决定只能从这些版本化候选路径中选择。
        en: Lists the non-empty set of Route identifiers this policy is allowed to select; a runtime decision may choose only from these versioned candidates.
        ja: この方針が選択を許される空でない Route 識別子集合を列挙し、実行時決定は版管理された候補からのみ選びます。
      allowed_values: []
      pattern: null
      example_value:
        - route-billing
        - route-technical
        - route-human-review
      source_claims:
        - claim-routing-policy-005
        - claim-routing-policy-006
    - id: precedence_rule
      labels:
        zh: 优先规则
        en: precedence rule
        ja: 優先順位規則
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定多个候选条件同时成立时的路径顺序和确定性平局处理；其中引用的每条路径都必须属于 candidate_route_refs。
        en: Defines route order and deterministic tie handling when multiple candidate conditions hold; every referenced route must also occur in candidate_route_refs.
        ja: 複数の候補条件が同時に成立した場合の経路順序と決定的な同順位処理を定め、参照経路はすべて candidate_route_refs に含めます。
      allowed_values: []
      pattern: null
      example_value:
        ordered_route_refs:
          - route-human-review
          - route-billing
          - route-technical
        tie_breaker: first-listed
      source_claims:
        - claim-routing-policy-007
    - id: no_match_behavior
      labels:
        zh: 无匹配处理
        en: no-match behavior
        ja: 不一致時の処理
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当所有条件均不产生可选路径时，明确选择后备路径、无路径终止或抛出路由错误三种互斥结果。
        en: "Selects one of three mutually exclusive outcomes when no condition yields an eligible route: use a fallback route, terminate without a route, or raise a routing error."
        ja: どの条件からも適格経路が得られない場合に、後備経路を選ぶ、経路なしで終了する、ルーティングエラーを送出する、の排他的な結果を一つ指定します。
      allowed_values:
        - id: RoutingPolicyNoMatchSelectFallbackRoute
          value: select-fallback-route
          labels:
            zh: 选择后备路径
            en: select fallback route
            ja: 後備経路を選択
          definitions:
            zh: 没有条件匹配时选择 fallback_route_ref 所指且已列入候选集合的路径。
            en: Select the route named by fallback_route_ref, which must already belong to the candidate route set, when no condition matches.
            ja: 条件が一致しないとき、候補集合に含まれる fallback_route_ref の経路を選択します。
          status: accepted
          source_claims:
            - claim-routing-policy-008
        - id: RoutingPolicyNoMatchTerminateWithoutRoute
          value: terminate-without-route
          labels:
            zh: 无路径终止
            en: terminate without route
            ja: 経路なしで終了
          definitions:
            zh: 没有条件匹配时结束当前控制流，不选择也不触发任何候选路径。
            en: End the current control flow without selecting or triggering any candidate route when no condition matches.
            ja: 条件が一致しないとき、候補経路を選択も起動もせず現在の制御フローを終了します。
          status: accepted
          source_claims:
            - claim-routing-policy-009
        - id: RoutingPolicyNoMatchRaiseRoutingError
          value: raise-routing-error
          labels:
            zh: 抛出路由错误
            en: raise routing error
            ja: ルーティングエラーを送出
          definitions:
            zh: 没有条件匹配时将缺少合法候选视为配置或运行错误，并停止正常路径选择。
            en: Treat the absence of an eligible candidate as a configuration or runtime error and stop normal route selection.
            ja: 適格候補がない状態を設定または実行時エラーとして扱い、通常の経路選択を停止します。
          status: accepted
          source_claims:
            - claim-routing-policy-010
      pattern: null
      example_value: select-fallback-route
      source_claims:
        - claim-routing-policy-011
        - claim-routing-policy-012
    - id: fallback_route_ref
      labels:
        zh: 后备路径引用
        en: fallback route reference
        ja: 後備経路参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当 no_match_behavior 为 select-fallback-route 时，引用必须选择且同时属于 candidate_route_refs 的唯一 Route；其他行为下可以省略。
        en: When no_match_behavior is select-fallback-route, references the one Route that must be selected and must also occur in candidate_route_refs; it may be absent for other behaviors.
        ja: no_match_behavior が select-fallback-route の場合に必ず選ぶ単一 Route を参照し、その経路は candidate_route_refs にも含めます。それ以外では省略できます。
      allowed_values: []
      pattern: null
      example_value: route-human-review
      source_claims:
        - claim-routing-policy-013
    - id: evidence_requirements
      labels:
        zh: 选择证据要求
        en: selection evidence requirements
        ja: 選択証拠要件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定求值条件前必须取得的证据引用、最低分类置信度以及是否要求冻结输入快照，使决定可以重放并证明所用输入。
        en: Fixes the evidence references required before condition evaluation, the minimum classifier confidence, and whether a frozen input snapshot is mandatory, making the decision replayable and its inputs provable.
        ja: 条件評価前に必要な証拠参照、分類器の最低信頼度、凍結入力 snapshot の必須性を固定し、決定の再現と使用入力の立証を可能にします。
      allowed_values: []
      pattern: null
      example_value:
        required_evidence_refs:
          - request-state-snapshot
          - intent-classifier-result
        minimum_classifier_confidence: 0.8
        require_frozen_input: true
      source_claims:
        - claim-routing-policy-014
        - claim-routing-policy-015
  constraints: []
  required_relation_constraints: []
examples:
  - id: policy-semantic-router-multi-route
    labels:
      zh: RoutingPolicy positive
      en: RoutingPolicy positive
      ja: RoutingPolicy positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingPolicy 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingPolicy router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingPolicy から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {routing_specification_id: policy-intent-routing, version: 2, default_route_ref: route-general-fallback}

    related_node_ids:
      - RoutingPolicy
      - BranchCondition
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-001

  - id: policy-langgraph-supervisor-routing
    labels:
      zh: RoutingPolicy positive
      en: RoutingPolicy positive
      ja: RoutingPolicy positive
    descriptions:
      zh: LiteLLM 映射 RoutingPolicy LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps RoutingPolicy LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM RoutingPolicy: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {routing_specification_id: policy-supervisor-v1, evaluation_order: precedence-desc}

    related_node_ids:
      - RoutingPolicy
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-001

  - id: policy-openai-triage-handoffs
    labels:
      zh: RoutingPolicy positive
      en: RoutingPolicy positive
      ja: RoutingPolicy positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 RoutingPolicy 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to RoutingPolicy: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) RoutingPolicy で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {routing_specification_id: policy-triage-handoff, fallback_target_ref: general_agent}

    related_node_ids:
      - RoutingPolicy
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-001

  - id: policy-crewai-process-routing
    labels:
      zh: RoutingPolicy positive
      en: RoutingPolicy positive
      ja: RoutingPolicy positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 RoutingPolicy 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for RoutingPolicy: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が RoutingPolicy で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {routing_specification_id: policy-crew-sequential, evaluation_order: fixed-list}

    related_node_ids:
      - RoutingPolicy
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-policy-001

