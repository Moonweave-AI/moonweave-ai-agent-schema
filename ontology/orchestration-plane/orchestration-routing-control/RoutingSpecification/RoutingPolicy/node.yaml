sibling_differentiation:
  - sibling_concept_id: RetryPolicy
    shared_parent_concept_id: RoutingSpecification
    differentia:
      zh: RoutingPolicy 在一般候选目标之间选路；RetryPolicy 仅在失败后治理再次尝试或耗尽转向。
      en: RoutingPolicy selects among general candidate targets; RetryPolicy governs another attempt or exhaustion routing only after failure.
      ja: RoutingPolicy は general target selection、RetryPolicy は failure 後 retry/exhaustion routing を govern します。
    source_claims:
      - claim-routing-policy-001
      - claim-routing-policy-016
