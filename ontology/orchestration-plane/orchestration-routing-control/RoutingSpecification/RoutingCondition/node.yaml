schema: moonweave.ai/ontology-node/v1
id: RoutingCondition
kind: concept
labels:
  zh: 路由条件
  en: routing condition
  ja: ルーティング条件
semantics:
  short_definition:
    zh: 由路由决定对冻结输入状态求值的可复用布尔或枚举条件规范。
    en: A reusable Boolean or enumerated condition specification evaluated by a routing decision against frozen input state.
    ja: frozen input state に対し routing decision が evaluate する reusable Boolean/enum condition specification です。
  definition:
    zh: RoutingCondition 是 RoutingSpecification 的子类，以 expression_language、expression、input_schema_ref 与 result_type 标识；它只声明如何判定，不读取实时状态、不自行跳转。LangGraph conditional_edges 的 route function 返回值（如 "billing"、"END"）是 RoutingDecision 对 RoutingCondition 求值的结果投影，不是条件规范本身。
    en: A RoutingCondition is a RoutingSpecification identified by expression_language, expression, input_schema_ref, and result_type. It declares how to judge but neither reads live state nor changes control flow by itself. LangGraph conditional_edges route-function return values such as "billing" or "END" project RoutingDecision evaluation results, not the condition specification itself.
    ja: RoutingCondition は expression/input schema/result type で識別する subtype です。LangGraph route function 戻り値は RoutingDecision evaluation result の投影であり condition 仕様自体ではありません。
  why_needed:
    zh: 把条件规范与求值发生分开，才能解释同一 LangGraph route function 在不同 state 下为何返回不同下一节点。
    en: Separating condition specification from evaluation explains why the same LangGraph route function returns different next nodes for different states.
    ja: condition specification と evaluation occurrence を分け同一 route function が state により異なる next node を返す理由を説明します。
  includes:
    - zh: 基于状态字段、分类结果、置信度、预算、时间或门控结果的可复用判定表达式。
      en: Reusable predicates over state fields, classifications, confidence, budget, time, or gate outcomes.
      ja: state field・classification・confidence・budget・time・gate outcome predicate。
  excludes:
    - zh: 一次求值结果、脚本执行活动、状态读取动作、路由目标和终止事件。
      en: One evaluation result, script execution activity, state-read action, routing target, and termination event.
      ja: evaluation result・script execution・state read・routing target・termination event。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph route function 接收 state 并返回 path map 键或 Command(goto=...)；Moonweave 把表达式版本存为 RoutingCondition，把一次返回值与时间存为 RoutingDecision 证据。CrewAI selector/candidate 函数中的 predicate 同样应外提为 RoutingCondition 规范。
    en: LangGraph route functions receive state and return path-map keys or Command(goto=...); Moonweave stores expression revisions as RoutingCondition and one return value with time as RoutingDecision evidence. CrewAI selector/candidate predicates should likewise be externalized as RoutingCondition specifications.
    ja: LangGraph route function は state を受け path map key/Command を返し expression revision は RoutingCondition、戻り値は RoutingDecision 証拠です。
  typical_input:
    - description: LangGraph routing function reading frozen state.
      format: |
        def route_by_category(state):
            if state.get("category") == "billing":
                return "billing"
            if state.get("category") == "technical":
                return "technical"
            return END
      source_claims: [claim-routing-condition-langgraph]
  typical_output:
    - description: Reusable condition specification without runtime value.
      format: |
        {
          "routing_specification_id": "condition-confidence-high",
          "version": "4",
          "expression": "state.confidence >= 0.85",
          "result_type": "boolean"
        }
      source_claims: [claim-routing-condition-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: conditional_edges routing function return values.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Selector and candidate function predicates.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff routing predicates in agent loops.
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: expression language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释表达式所需的受控语言或求值器版本。
        en: Declares the controlled language or evaluator revision needed to interpret the expression.
        ja: expression interpreter language/evaluator revision。
      allowed_values: []
      pattern: null
      example_value: cel@1
      source_claims:
        - claim-routing-condition-design
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: condition expression
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存只读、确定性的判定表达式。
        en: Stores the read-only deterministic predicate expression.
        ja: read-only deterministic predicate expression。
      allowed_values: []
      pattern: null
      example_value: state.confidence >= 0.85
      source_claims:
        - claim-routing-condition-langgraph
    - id: input_schema_ref
      labels:
        zh: 输入模式引用
        en: input-schema reference
        ja: input-schema reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用求值时允许读取的冻结状态模式。
        en: References the frozen-state schema readable during evaluation.
        ja: evaluation 中 readable frozen-state schema。
      allowed_values: []
      pattern: null
      example_value: routing-state@4
      source_claims:
        - claim-routing-condition-design
    - id: result_type
      labels:
        zh: 结果类型
        en: result type
        ja: result type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定求值输出为布尔值或受控枚举（含 LangGraph path map 键）。
        en: Constrains evaluation output to Boolean or controlled enumeration including LangGraph path-map keys.
        ja: Boolean または controlled enum（LangGraph path map key 含む）。
      allowed_values: []
      pattern: null
      example_value: boolean
      source_claims:
        - claim-routing-condition-langgraph
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingCondition-example-langgraph-route-return
    labels:
      zh: LangGraph 路由函数返回值规范
      en: LangGraph route function return specification
      ja: LangGraph route function return specification
    descriptions:
      zh: condition-category-billing@3 表达式 state.category=='billing'，result_type=enum，对应 route function 返回 "billing" 键的条件版本。
      en: condition-category-billing@3 expression state.category=='billing' with result_type=enum corresponds to the condition revision whose route function returns the "billing" key.
      ja: condition-category-billing@3 は route function が "billing" を返す条件版です。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges routing function
    field_values:
      routing_specification_id: condition-category-billing
      version: "3"
      eligible_target_types:
        - worker
      valid_from: 2026-07-16T00:00:00Z
      expression_language: python@3.11
      expression: state.get("category") == "billing"
      input_schema_ref: routing-state@3
      result_type: enum
    related_node_ids:
      - RoutingCondition
      - BranchCondition
      - RoutingDecision
    related_relation_ids:
      - RoutingDecision-evaluates-RoutingCondition
    source_claims:
      - claim-routing-condition-langgraph
  - id: RoutingCondition-example-confidence-boolean
    labels:
      zh: 高置信度布尔条件
      en: High-confidence boolean condition
      ja: high-confidence boolean condition
    descriptions:
      zh: condition-confidence-high@4 使用 cel@1 判断 routing-state@4.confidence>=0.85，无当前值或求值时间。
      en: condition-confidence-high@4 uses cel@1 to test routing-state@4.confidence>=0.85 with no current value or evaluation time.
      ja: condition-confidence-high@4 は confidence>=0.85 を宣言する reusable spec です。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: reusable predicate
    field_values:
      routing_specification_id: condition-confidence-high
      version: "4"
      eligible_target_types:
        - worker
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: state.confidence >= 0.85
      input_schema_ref: routing-state@4
      result_type: boolean
    related_node_ids:
      - RoutingCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-design
  - id: RoutingCondition-example-crewai-selector
    labels:
      zh: CrewAI 选择器谓词
      en: CrewAI selector predicate
      ja: CrewAI selector predicate
    descriptions:
      zh: condition-research-needed@2 声明 manager 在 unresolved_sources>0 时选择 researcher；对应 custom selector predicate 规范。
      en: condition-research-needed@2 declares manager selects researcher when unresolved_sources>0 as a custom selector predicate specification.
      ja: condition-research-needed@2 は unresolved_sources>0 時 researcher 選択 predicate です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: custom selector function
    field_values:
      routing_specification_id: condition-research-needed
      version: "2"
      expression: state.unresolved_sources > 0
      result_type: boolean
    related_node_ids:
      - RoutingCondition
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-crewai
  - id: RoutingCondition-example-boundary-evaluated-true
    labels:
      zh: 求值 true 不是条件规范
      en: Evaluated true is not condition spec
      ja: evaluated true は condition spec ではない
    descriptions:
      zh: decision-884 在 04:20 读取 state@12 并记录 true；这是一次 RoutingDecision 求值事实。
      en: decision-884 reads state@12 at 04:20 and records true; this is one RoutingDecision evaluation fact.
      ja: decision-884 の true 記録は RoutingDecision evaluation fact です。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: condition versus evaluation
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - RoutingCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-design
parent_relation:
  id: RoutingCondition-is_a-RoutingSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: RoutingCondition 是一种 RoutingSpecification；其种差是声明可对冻结状态求值的布尔或枚举判定。
    en: A RoutingCondition is a RoutingSpecification distinguished by a Boolean or enumerated predicate a decision can evaluate against frozen state.
    ja: RoutingCondition は frozen state に evaluate 可能な Boolean/enum predicate を宣言する subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RoutingCondition-is_a-RoutingSpecification-example-positive
      kind: positive
      labels:
        zh: 高置信度路由条件
        en: High-confidence routing condition
        ja: high-confidence routing condition
      descriptions:
        zh: condition-confidence@4 声明 confidence>=0.85 和输入模式。
        en: condition-confidence@4 declares confidence>=0.85 and an input schema.
        ja: condition-confidence@4 は reusable evaluation specification です。
      field_values: {}
      related_node_ids:
        - RoutingCondition
        - RoutingSpecification
      related_relation_ids:
        - RoutingCondition-is_a-RoutingSpecification
      source_claims:
        - claim-routing-condition-design
  source_claims:
    - claim-routing-condition-design
  endpoint_order: child-to-parent
relations: []
