schema: moonweave.ai/ontology-node/v1
id: RoutingCondition
kind: concept
labels:
  zh: 路由条件
  en: routing condition
  ja: routing condition
semantics:
  short_definition:
    zh: 由路由决定对冻结输入状态求值的可复用布尔或枚举条件规范。
    en: A reusable Boolean or enumerated condition specification evaluated by a routing decision against frozen input state.
    ja: frozen input state に対し routing decision が評価する reusable Boolean/enum condition specification。
  definition:
    zh: 路由条件是 RoutingSpecification 的子类，以条件标识、表达语言、表达式、输入模式和结果类型为身份；它只声明如何判定，不读取实时状态、不自行跳转，也不终止会话。RoutingDecision 负责绑定输入、记录求值时间和结果，并据此选择 RoutingTarget。
    en: A RoutingCondition is a RoutingSpecification identified by condition ID, expression language, expression, input schema, and result type. It declares how to judge but neither reads live state, changes control flow, nor terminates a session by itself. RoutingDecision binds input, records evaluation time and result, and selects a RoutingTarget accordingly.
    ja: RoutingCondition は condition ID・expression language・expression・input schema・result type で識別する RoutingSpecification subtype です。判定方法のみを宣言し live state を読まず、自ら遷移・終了しません。RoutingDecision が input を bind し evaluation と target selection を記録します。
  why_needed:
    zh: 把条件规范与求值发生分开，才能回答同一条件在不同状态、不同时间为何产生不同路由。
    en: Separating the condition specification from evaluation explains why the same condition yields different routes for different states and times.
    ja: condition specification と evaluation occurrence を分け、同一条件が state/time により異なる route を生む理由を説明します。
  includes:
    - zh: 基于状态字段、分类结果、置信度、预算、时间或门控结果的可复用判定表达式。
      en: Reusable predicates over state fields, classifications, confidence, budget, time, or gate outcomes.
      ja: state field・classification・confidence・budget・time・gate outcome に対する reusable predicate。
  excludes:
    - zh: 一次求值结果、脚本执行活动、状态读取动作、路由目标和终止事件。
      en: One evaluation result, script execution activity, state-read action, routing target, and termination event.
      ja: evaluation result・script execution・state read・routing target・termination event。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      RoutingCondition 提供 RoutingDecision 与 LangGraph conditional_edges 共享的谓词：编译为路由函数内的
      expression 或 OPA input 字段。BranchCondition、GateCondition、StopCondition 特化不同求值钩子；求值结果
      写入 RoutingDecision 或 GateOutcome，不回写 condition version。
    en: >-
      RoutingCondition supplies predicates shared by RoutingDecision and LangGraph conditional_edges: compiled into router
      expressions or OPA input fields. BranchCondition, GateCondition, and StopCondition specialize evaluation hooks; results
      write to RoutingDecision or GateOutcome without rewriting condition version.
    ja: >-
      RoutingCondition は RoutingDecision と LangGraph conditional_edges が共有する predicate を供給する。router expression
      または OPA input field にコンパイルされる。BranchCondition、GateCondition、StopCondition が evaluation hook を
      特殊化し、結果は RoutingDecision または GateOutcome に書き込まれ condition version は変更しない。
  typical_input:
    - description:
        zh: 版本化、可判定的路由条件规约。
        en: A versioned, decidable routing-condition specification.
        ja: versioned decidable routing-condition specification。
      format: |-
        {"condition_id":"cond:release-ready@1","routing_spec_ref":"rs:release-routing@3","predicate_language":"cel","predicate":"state.signed == true && state.smoke_passed == true","evaluation_point":"after_node:smoke"}
  typical_output:
    - description:
        zh: 编译到路由函数或 OPA 的条件绑定与运行时求值槽位。
        en: A condition binding compiled to router or OPA plus a runtime evaluation slot.
        ja: router または OPA にコンパイルされた condition binding と runtime evaluation slot。
      format: |-
        {"condition_ref":"cond:release-ready@1","compiled_to":{"adapter":"langgraph","router":"classify_release","when":"state.signed && state.smoke_passed"},"runtime_slot":"routing_decision:rd-888"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents predicate evaluation inside routing functions over graph state.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents declarative conditions evaluated at routing decision time.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing outcomes after condition evaluation selects targets.
  source_claims:
    - claim-routing-condition-001
    - claim-routing-condition-002
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: expression language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释表达式所需的受控语言或求值器版本。
        en: Declares the controlled language or evaluator revision needed to interpret the expression.
        ja: expression を解釈する controlled language/evaluator revision を宣言します。
      allowed_values: []
      pattern: null
      example_value: cel@1
      source_claims:
        - claim-routing-condition-001
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: condition expression
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存只读、确定性的判定表达式。
        en: Stores the read-only deterministic predicate expression.
        ja: read-only deterministic predicate expression を保存します。
      allowed_values: []
      pattern: null
      example_value: state.confidence >= 0.85
      source_claims:
        - claim-routing-condition-001
    - id: input_schema_ref
      labels:
        zh: 输入模式引用
        en: input-schema reference
        ja: input-schema reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用求值时允许读取的冻结状态模式。
        en: References the frozen-state schema readable during evaluation.
        ja: evaluation 中に読める frozen-state schema を参照します。
      allowed_values: []
      pattern: null
      example_value: routing-state@4
      source_claims:
        - claim-routing-condition-001
    - id: result_type
      labels:
        zh: 结果类型
        en: result type
        ja: result type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定求值输出为布尔值或受控枚举。
        en: Constrains evaluation output to Boolean or a controlled enumeration.
        ja: evaluation output を Boolean または controlled enum に制約します。
      allowed_values: []
      pattern: null
      example_value: boolean
      source_claims:
        - claim-routing-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: routing-condition-branch-parent
    labels:
      zh: RoutingCondition positive
      en: RoutingCondition positive
      ja: RoutingCondition positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 RoutingCondition 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to RoutingCondition: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) RoutingCondition で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {input_schema_ref: "routing-state@3", result_type: boolean}

    related_node_ids:
      - RoutingCondition
      - BranchCondition
      - GateCondition
      - StopCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-001

  - id: routing-condition-cel-expression
    labels:
      zh: RoutingCondition positive
      en: RoutingCondition positive
      ja: RoutingCondition positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 RoutingCondition 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for RoutingCondition: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が RoutingCondition で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {routing_specification_id: condition-billing-intent, expression_language: "cel@1"}

    related_node_ids:
      - RoutingCondition
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-001

  - id: routing-condition-opa-rego
    labels:
      zh: RoutingCondition positive
      en: RoutingCondition positive
      ja: RoutingCondition positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingCondition 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingCondition router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingCondition から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {expression_language: "rego@1", expression: data.support.allow_route}

    related_node_ids:
      - RoutingCondition
      - GateCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-001

  - id: routing-condition-semantic-threshold
    labels:
      zh: RoutingCondition positive
      en: RoutingCondition positive
      ja: RoutingCondition positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 RoutingCondition 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for RoutingCondition via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が RoutingCondition 多段推論を誘発；GSM8K 精度向上。
    field_values: {result_type: similarity_score, match_value: above_threshold}

    related_node_ids:
      - RoutingCondition
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-condition-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-routing-condition-001
    source: langgraph-graph-api
    supports: RoutingCondition core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-routing-condition-002
    source: opa-policy-language
    supports: RoutingCondition boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
