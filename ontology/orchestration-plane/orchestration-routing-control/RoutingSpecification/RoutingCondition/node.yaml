schema: moonweave.ai/ontology-node/v1
id: RoutingCondition
kind: concept
status: review
labels:
  zh: 路由条件
  en: routing condition
  ja: routing condition
semantics:
  short_definition:
    zh: 由路由决定对冻结输入状态求值的可复用布尔或枚举条件规范。
    en: A reusable Boolean or enumerated condition specification evaluated by a routing decision against frozen input state.
    ja: frozen input state に対し routing decision が評価する reusable Boolean/enum condition specification。
  definition:
    zh: 路由条件是 RoutingSpecification 的子类，以条件标识、表达语言、表达式、输入模式和结果类型为身份；它只声明如何判定，不读取实时状态、不自行跳转，也不终止会话。RoutingDecision 负责绑定输入、记录求值时间和结果，并据此选择 RoutingTarget。
    en: A RoutingCondition is a RoutingSpecification identified by condition ID, expression language, expression, input schema, and result type. It declares how to judge but neither reads live state, changes control flow, nor terminates a session by itself. RoutingDecision binds input, records evaluation time and result, and selects a RoutingTarget accordingly.
    ja: RoutingCondition は condition ID・expression language・expression・input schema・result type で識別する RoutingSpecification subtype です。判定方法のみを宣言し live state を読まず、自ら遷移・終了しません。RoutingDecision が input を bind し evaluation と target selection を記録します。
  why_needed:
    zh: 把条件规范与求值发生分开，才能回答同一条件在不同状态、不同时间为何产生不同路由。
    en: Separating the condition specification from evaluation explains why the same condition yields different routes for different states and times.
    ja: condition specification と evaluation occurrence を分け、同一条件が state/time により異なる route を生む理由を説明します。
  includes:
    - zh: 基于状态字段、分类结果、置信度、预算、时间或门控结果的可复用判定表达式。
      en: Reusable predicates over state fields, classifications, confidence, budget, time, or gate outcomes.
      ja: state field・classification・confidence・budget・time・gate outcome に対する reusable predicate。
  excludes:
    - zh: 一次求值结果、脚本执行活动、状态读取动作、路由目标和终止事件。
      en: One evaluation result, script execution activity, state-read action, routing target, and termination event.
      ja: evaluation result・script execution・state read・routing target・termination event。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: expression language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释表达式所需的受控语言或求值器版本。
        en: Declares the controlled language or evaluator revision needed to interpret the expression.
        ja: expression を解釈する controlled language/evaluator revision を宣言します。
      allowed_values: []
      pattern: null
      example_value: cel@1
      source_claims:
        - claim-routing-condition-001
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: condition expression
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存只读、确定性的判定表达式。
        en: Stores the read-only deterministic predicate expression.
        ja: read-only deterministic predicate expression を保存します。
      allowed_values: []
      pattern: null
      example_value: state.confidence >= 0.85
      source_claims:
        - claim-routing-condition-001
    - id: input_schema_ref
      labels:
        zh: 输入模式引用
        en: input-schema reference
        ja: input-schema reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用求值时允许读取的冻结状态模式。
        en: References the frozen-state schema readable during evaluation.
        ja: evaluation 中に読める frozen-state schema を参照します。
      allowed_values: []
      pattern: null
      example_value: routing-state@4
      source_claims:
        - claim-routing-condition-001
    - id: result_type
      labels:
        zh: 结果类型
        en: result type
        ja: result type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定求值输出为布尔值或受控枚举。
        en: Constrains evaluation output to Boolean or a controlled enumeration.
        ja: evaluation output を Boolean または controlled enum に制約します。
      allowed_values: []
      pattern: null
      example_value: boolean
      source_claims:
        - claim-routing-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingCondition-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 高置信度条件
      en: High-confidence condition
      ja: high-confidence condition
    scenario_id: null
    descriptions:
      zh: condition-confidence-high@4 使用 cel@1 对 routing-state@4 中的 confidence 字段判断是否大于等于 0.85；它没有当前状态值和求值时间。
      en: condition-confidence-high@4 uses cel@1 to test whether confidence in routing-state@4 is at least 0.85; it carries no current state value or evaluation time.
      ja: condition-confidence-high@4 は cel@1 で routing-state@4.confidence >= 0.85 を宣言し、current value/evaluation time は持ちません。
    field_values:
      routing_specification_id: condition-confidence-high
      version: "4"
      eligible_target_types:
        - worker
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: state.confidence >= 0.85
      input_schema_ref: routing-state@4
      result_type: boolean
    related_node_ids:
      - RoutingCondition
      - RoutingDecision
    related_relation_ids:
      - RoutingDecision-evaluates-RoutingCondition
    expected_result:
      zh: 建立可被多次决定求值的条件规范。
      en: Create a condition specification reusable across decisions.
      ja: multiple decision が evaluate できる condition specification を作成します。
    why_valid_or_invalid:
      zh: 表达式、输入模式与结果类型完整，且没有冒充一次求值。
      en: Expression, input schema, and result type are complete without masquerading as one evaluation.
      ja: expression・input schema・result type が完全で one evaluation を装いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-condition-001
      - claim-routing-condition-002
  - id: RoutingCondition-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 条件求值为真
      en: Condition evaluated true
      ja: condition evaluated true
    scenario_id: routing-review-routingcondition-boundary
    descriptions:
      zh: decision-884 在 04:20 读取 state@12 并记录 true；这是一次决定中的求值事实，不是条件规范的新版本。
      en: decision-884 reads state@12 at 04:20 and records true; this is an evaluation fact within one decision, not a new condition revision.
      ja: decision-884 が 04:20 state@12 を読み true を記録するのは one decision evaluation fact で condition revision ではありません。
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - RoutingCondition
    related_relation_ids: []
    expected_result:
      zh: 把 true 与时间存入 RoutingDecision，不创建 RoutingCondition。
      en: Store true and time on RoutingDecision; do not create a RoutingCondition.
      ja: true/time を RoutingDecision に保存し RoutingCondition を作りません。
    why_valid_or_invalid:
      zh: 发生结果由输入与时间识别，规范由表达式版本识别。
      en: The occurrence is identified by input and time; the specification by expression revision.
      ja: occurrence は input/time、specification は expression revision で識別します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-condition-001
      - claim-routing-condition-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RoutingPolicy
    shared_parent_concept_id: RoutingSpecification
    differentia:
      zh: RoutingCondition 是一个可独立求值的判定；RoutingPolicy 组合多个条件、候选 Route、优先级和回退。
      en: RoutingCondition is one independently evaluable predicate; RoutingPolicy composes conditions, candidate Routes, precedence, and fallback.
      ja: RoutingCondition は independently evaluable predicate、RoutingPolicy は conditions/routes/precedence/fallback の composition です。
    source_claims:
      - claim-routing-condition-001
