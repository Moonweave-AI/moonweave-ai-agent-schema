    source: langgraph-gate-condition
    supports: LangGraph control gates evaluate shared-state evidence against declared thresholds before routing continues.
    locator: Graph API — interrupt, state-based gates
    evidence_kind: official
    confidence: high
  - id: claim-gate-condition-crewai
    source: crewai-gate-condition
    supports: CrewAI human_input requires human evidence before task continuation mappable to GateCondition.
    locator: Tasks — human_input
    evidence_kind: official
    confidence: high
  - id: claim-gate-condition-design
    source: gate-condition-design
    supports: GateCondition is reusable threshold specification distinct from GateOutcome occurrence.
    locator: GateCondition concept boundary
    evidence_kind: design-inference
    confidence: high
