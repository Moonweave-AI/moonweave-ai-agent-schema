  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: GateCondition 是一种 RoutingCondition；其种差是为 ControlGate 规定证据要求、阈值与缺失证据处理。
    en: A GateCondition is a RoutingCondition distinguished by evidence requirements, thresholds, and missing-evidence handling for ControlGate.
    ja: GateCondition は ControlGate 向け evidence/threshold/missing handling subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GateCondition-is_a-RoutingCondition-example-positive
      kind: positive
      labels:
        zh: 发布质量门条件
        en: Publication quality gate condition
        ja: 公開品質ゲート条件
      descriptions:
        zh: gate-quality 要求质量分与安全决定并规定缺失时升级。
        en: gate-quality requires quality score and safety decision and escalates when evidence is missing.
        ja: gate-quality は missing evidence escalation を規定します。
      field_values: {}
      related_node_ids:
        - GateCondition
        - RoutingCondition
      related_relation_ids:
        - GateCondition-is_a-RoutingCondition
      source_claims:
        - claim-gate-condition-design
  source_claims:
    - claim-gate-condition-design
  endpoint_order: child-to-parent
relations: []
