schema: moonweave.ai/ontology-node/v1
id: GateCondition
kind: concept
labels:
  zh: 门控条件
  en: gate condition
  ja: gate condition
semantics:
  short_definition:
    zh: 规定控制门允许、阻断、转向或升级所需证据与阈值的路由条件。
    en: A routing condition specifying evidence and thresholds for a gate to allow, block, redirect, or escalate.
    ja: gate の allow・block・redirect・escalate に必要な evidence/threshold を規定する routing condition。
  definition:
    zh: 门控条件是 RoutingCondition 的子类，其种差是声明 ControlGate 必须读取的证据类型、比较算子、阈值、缺失证据处理和可能结果。它是可复用判定规范；ControlGate 执行求值并产生 GateOutcome，条件本身不产生结果。
    en: A GateCondition is a RoutingCondition distinguished by required evidence types, comparison operator, threshold, missing-evidence handling, and possible outcomes for a ControlGate. It is a reusable decision specification; ControlGate performs evaluation and produces GateOutcome, while the condition itself produces nothing.
    ja: GateCondition は ControlGate が必要とする evidence type・operator・threshold・missing-evidence handling・possible outcome を宣言する RoutingCondition subtype です。ControlGate が evaluate し GateOutcome を生成し、condition 自体は生成しません。
  why_needed:
    zh: 把门控标准与门控能力、门控结果拆开，可分别复用标准、升级实现和审计每次判断。
    en: Separating gate criteria, gate capability, and gate outcome permits criterion reuse, implementation upgrades, and per-evaluation audit.
    ja: gate criteria・capability・outcome を分け criterion reuse、implementation upgrade、per-evaluation audit を可能にします。
  includes:
    - zh: 质量下限、安全决策要求、预算上限、人工批准要求和证据完备性门槛。
      en: Quality floors, safety-decision requirements, budget ceilings, human-approval requirements, and evidence-completeness thresholds.
      ja: quality floor・safety decision requirement・budget ceiling・human approval・evidence completeness threshold。
  excludes:
    - zh: 门控实现、一次门控结果、路由分支映射、一般业务校验规则和 UI 禁用状态。
      en: Gate implementation, one gate outcome, branch mapping, general business-validation rule, and UI disabled state.
      ja: gate implementation・gate outcome・branch mapping・general validation・UI disabled state。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      GateCondition 作为 ControlGate.decision_function 的输入 schema：OPA Rego 或 LangGraph 包装器读取
      required_evidence_types、threshold 与 operator 求值。ControlGate 产生 GateOutcome(allow/block/redirect)；
      GateCondition  revision 不因单次求值改变。BranchCondition 的 path_map 不包含门控阈值逻辑。
    en: >-
      GateCondition serves as input schema for ControlGate.decision_function: OPA Rego or LangGraph wrappers read
      required_evidence_types, threshold, and operator for evaluation. ControlGate emits GateOutcome(allow/block/redirect);
      GateCondition revision does not change from one evaluation. BranchCondition path_map excludes gate threshold logic.
    ja: >-
      GateCondition は ControlGate.decision_function の input schema として機能する。OPA Rego または LangGraph wrapper が
      required_evidence_types、threshold、operator を読み evaluate する。ControlGate は GateOutcome(allow/block/redirect) を
      emit し GateCondition revision は evaluation で変わらない。BranchCondition path_map は gate threshold logic を含まない。
  typical_input:
    - description:
        zh: 声明门控所需证据与阈值的 GateCondition 规约。
        en: A GateCondition specification declaring required evidence and thresholds.
        ja: required evidence と threshold を宣言する GateCondition specification。
      format: |-
        {"condition_id":"cond:max-cost@1","required_evidence_types":["cost_estimate"],"operator":"lte","threshold":{"max_cost_usd":25},"missing_evidence_handling":"block","possible_outcomes":["allow","block"]}
  typical_output:
    - description:
        zh: ControlGate 求值产生的 GateOutcome 与证据引用。
        en: A GateOutcome and evidence references produced by ControlGate evaluation.
        ja: ControlGate evaluation が生成した GateOutcome と evidence reference。
      format: |-
        {"gate_outcome_id":"go-903","gate_ref":"gate:budget-check@2","result":"block","evidence_refs":["cost-estimate@3"],"evaluated_condition_ref":"cond:max-cost@1"}
  reference_implementations:
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents threshold and evidence checks as gate decision input.
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents control-gate wrappers evaluating conditions before routing.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents redirect/goto after gate condition yields allow or redirect.
  source_claims:
    - claim-gate-condition-001
    - claim-gate-condition-002
structure:
  identity_keys: []
  fields:
    - id: required_evidence_types
      labels:
        zh: 必需证据类型
        en: required evidence types
        ja: required evidence types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出求值前必须存在的证据类别。
        en: Lists evidence categories that must exist before evaluation.
        ja: evaluation 前に必要な evidence category を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - quality-score
        - safety-decision
      source_claims:
        - claim-gate-condition-001
    - id: comparison
      labels:
        zh: 比较规则
        en: comparison rule
        ja: comparison rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明证据值和阈值的确定性比较。
        en: Declares deterministic comparison between evidence values and thresholds.
        ja: evidence value と threshold の deterministic comparison を宣言します。
      allowed_values: []
      pattern: null
      example_value: quality_score >= 0.90 && safety_decision == 'allow'
      source_claims:
        - claim-gate-condition-001
    - id: on_missing_evidence
      labels:
        zh: 证据缺失处理
        en: missing-evidence handling
        ja: missing-evidence handling
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定证据缺失时阻断、转人工或延后，而不是隐式通过。
        en: Specifies block, human escalation, or defer when evidence is missing rather than implicit allow.
        ja: evidence missing 時は implicit allow でなく block/escalate/defer を指定します。
      allowed_values: []
      pattern: null
      example_value: escalate
      source_claims:
        - claim-gate-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: gate-condition-opa-allow-input
    labels:
      zh: GateCondition positive
      en: GateCondition positive
      ja: GateCondition positive
    descriptions:
      zh: Prefect 数据流编排映射 GateCondition：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps GateCondition: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect GateCondition: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {gate_ref: gate-support-quality, match_value: allow, expression: "input.ticket.severity!=critical"}

    related_node_ids:
      - GateCondition
      - Gate
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-001

  - id: gate-condition-langgraph-interrupt-pending
    labels:
      zh: GateCondition positive
      en: GateCondition positive
      ja: GateCondition positive
    descriptions:
      zh: Temporal 持久化工作流映射 GateCondition：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps GateCondition: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal GateCondition: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {gate_ref: gate-human-approval, match_value: block}

    related_node_ids:
      - GateCondition
      - ControlGate
      - SuccessorDispatch
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-001

  - id: gate-condition-guardrails-toxic
    labels:
      zh: GateCondition positive
      en: GateCondition positive
      ja: GateCondition positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 GateCondition 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for GateCondition: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) GateCondition: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {gate_ref: gate-content-safety, match_value: block, expression: "toxic_score>0.7"}

    related_node_ids:
      - GateCondition
      - Gate
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-001

  - id: gate-condition-nemo-competitor
    labels:
      zh: GateCondition positive
      en: GateCondition positive
      ja: GateCondition positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 GateCondition 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for GateCondition: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が GateCondition で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {gate_ref: gate-competitor-policy, match_value: revise}

    related_node_ids:
      - GateCondition
      - Gate
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-gate-condition-001
    source: langgraph-graph-api
    supports: GateCondition core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-gate-condition-002
    source: opa-policy-language
    supports: GateCondition boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
