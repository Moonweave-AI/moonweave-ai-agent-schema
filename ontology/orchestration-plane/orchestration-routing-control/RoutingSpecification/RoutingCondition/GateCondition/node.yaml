schema: moonweave.ai/ontology-node/v1
id: GateCondition
kind: concept
status: accepted
labels:
  zh: 门控条件
  en: gate condition
  ja: gate condition
semantics:
  short_definition:
    zh: 规定控制门允许、阻断、转向或升级所需证据与阈值的路由条件。
    en: A routing condition specifying evidence and thresholds for a gate to allow, block, redirect, or escalate.
    ja: gate の allow・block・redirect・escalate に必要な evidence/threshold を規定する routing condition。
  definition:
    zh: 门控条件是 RoutingCondition 的子类，其种差是声明 ControlGate 必须读取的证据类型、比较算子、阈值、缺失证据处理和可能结果。它是可复用判定规范；ControlGate 执行求值并产生 GateOutcome，条件本身不产生结果。
    en: A GateCondition is a RoutingCondition distinguished by required evidence types, comparison operator, threshold, missing-evidence handling, and possible outcomes for a ControlGate. It is a reusable decision specification; ControlGate performs evaluation and produces GateOutcome, while the condition itself produces nothing.
    ja: GateCondition は ControlGate が必要とする evidence type・operator・threshold・missing-evidence handling・possible outcome を宣言する RoutingCondition subtype です。ControlGate が evaluate し GateOutcome を生成し、condition 自体は生成しません。
  why_needed:
    zh: 把门控标准与门控能力、门控结果拆开，可分别复用标准、升级实现和审计每次判断。
    en: Separating gate criteria, gate capability, and gate outcome permits criterion reuse, implementation upgrades, and per-evaluation audit.
    ja: gate criteria・capability・outcome を分け criterion reuse、implementation upgrade、per-evaluation audit を可能にします。
  includes:
    - zh: 质量下限、安全决策要求、预算上限、人工批准要求和证据完备性门槛。
      en: Quality floors, safety-decision requirements, budget ceilings, human-approval requirements, and evidence-completeness thresholds.
      ja: quality floor・safety decision requirement・budget ceiling・human approval・evidence completeness threshold。
  excludes:
    - zh: 门控实现、一次门控结果、路由分支映射、一般业务校验规则和 UI 禁用状态。
      en: Gate implementation, one gate outcome, branch mapping, general business-validation rule, and UI disabled state.
      ja: gate implementation・gate outcome・branch mapping・general validation・UI disabled state。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: required_evidence_types
      labels:
        zh: 必需证据类型
        en: required evidence types
        ja: required evidence types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出求值前必须存在的证据类别。
        en: Lists evidence categories that must exist before evaluation.
        ja: evaluation 前に必要な evidence category を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - quality-score
        - safety-decision
      source_claims:
        - claim-gate-condition-001
    - id: comparison
      labels:
        zh: 比较规则
        en: comparison rule
        ja: comparison rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明证据值和阈值的确定性比较。
        en: Declares deterministic comparison between evidence values and thresholds.
        ja: evidence value と threshold の deterministic comparison を宣言します。
      allowed_values: []
      pattern: null
      example_value: quality_score >= 0.90 && safety_decision == 'allow'
      source_claims:
        - claim-gate-condition-001
    - id: on_missing_evidence
      labels:
        zh: 证据缺失处理
        en: missing-evidence handling
        ja: missing-evidence handling
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定证据缺失时阻断、转人工或延后，而不是隐式通过。
        en: Specifies block, human escalation, or defer when evidence is missing rather than implicit allow.
        ja: evidence missing 時は implicit allow でなく block/escalate/defer を指定します。
      allowed_values: []
      pattern: null
      example_value: escalate
      source_claims:
        - claim-gate-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: GateCondition-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 发布质量门槛
      en: Publication-quality gate condition
      ja: publication quality gate condition
    scenario_id: null
    descriptions:
      zh: gate-condition-publication-quality@5 要求 quality-score 与 safety-decision，质量分至少 0.90 且安全结果为 allow；任一证据缺失即升级人工。
      en: gate-condition-publication-quality@5 requires quality-score and safety-decision, with score at least 0.90 and safety=allow; missing evidence escalates to a human.
      ja: gate-condition-publication-quality@5 は quality-score/safety-decision、score>=0.90、safety=allow を要求し evidence missing は human escalation です。
    field_values:
      routing_specification_id: gate-condition-publication-quality
      version: "5"
      eligible_target_types:
        - operation
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: evidence.quality_score >= 0.90 && evidence.safety_decision == 'allow'
      input_schema_ref: publication-gate-evidence@5
      result_type: boolean
      required_evidence_types:
        - quality-score
        - safety-decision
      comparison: quality_score >= 0.90 && safety_decision == 'allow'
      on_missing_evidence: escalate
    related_node_ids:
      - GateCondition
      - ControlGate
      - GateOutcome
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
    expected_result:
      zh: 作为可复用门控条件，由 ControlGate 求值。
      en: Keep it as a reusable gate condition evaluated by ControlGate.
      ja: reusable GateCondition とし ControlGate が evaluate します。
    why_valid_or_invalid:
      zh: 证据、阈值和缺失行为均明确，尚未声称产生结果。
      en: Evidence, threshold, and missing behavior are explicit without claiming an outcome.
      ja: evidence・threshold・missing behavior が明確で outcome を主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-condition-001
  - id: GateCondition-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 质量门已阻断
      en: Quality gate blocked
      ja: quality gate blocked
    scenario_id: routing-review-gatecondition-boundary
    descriptions:
      zh: gate-outcome-884 记录 score=0.72、result=block 和 04:20；这是一次 GateOutcome，不是门槛规范。
      en: gate-outcome-884 records score=0.72, result=block, and 04:20; it is one GateOutcome, not a threshold specification.
      ja: gate-outcome-884 の score=0.72/result=block/04:20 は GateOutcome で threshold specification ではありません。
    field_values: {}
    related_node_ids:
      - GateOutcome
      - GateCondition
    related_relation_ids: []
    expected_result:
      zh: 保存为 GateOutcome，并引用既有 GateCondition。
      en: Store it as GateOutcome and reference the existing GateCondition.
      ja: GateOutcome として保存し existing GateCondition を参照します。
    why_valid_or_invalid:
      zh: 结果由时间和证据识别，条件由可复用阈值版本识别。
      en: Outcome is identified by time and evidence; condition by reusable threshold revision.
      ja: outcome は time/evidence、condition は reusable threshold revision で識別します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-condition-002
      - claim-gate-condition-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StopCondition
    shared_parent_concept_id: RoutingCondition
    differentia:
      zh: GateCondition 的结果进入 GateOutcome；StopCondition 的满足事实使 RoutingDecision 选择停止目标，条件本身均不执行动作。
      en: GateCondition feeds GateOutcome; satisfaction of StopCondition makes RoutingDecision select a stop target, and neither condition performs the action itself.
      ja: GateCondition は GateOutcome へ、StopCondition satisfaction は stop target selection へ進み、condition 自体は action を実行しません。
    source_claims:
      - claim-gate-condition-001
      - claim-gate-condition-003
parent_relation:
  id: GateCondition-is_a-RoutingCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: GateCondition 是一种 RoutingCondition；其种差是为 ControlGate 规定证据要求、阈值与缺失证据处理。
    en: A GateCondition is a RoutingCondition distinguished by evidence requirements, thresholds, and missing-evidence handling for ControlGate.
    ja: GateCondition は ControlGate の evidence requirement・threshold・missing-evidence handling を規定する subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GateCondition-is_a-RoutingCondition-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 发布质量门条件
        en: Publication-quality gate condition
        ja: publication quality gate condition
      scenario_id: routing-relation-gatecondition-is_a-routingcondition-positive
      descriptions:
        zh: gate-quality 要求质量分与安全决定并规定缺失时升级。
        en: gate-quality requires quality score and safety decision and escalates when evidence is missing.
        ja: gate-quality は quality score/safety decision と missing evidence escalation を規定します。
      field_values: {}
      related_node_ids:
        - GateCondition
        - RoutingCondition
      related_relation_ids:
        - GateCondition-is_a-RoutingCondition
      expected_result:
        zh: 断言 GateCondition → RoutingCondition。
        en: Assert GateCondition → RoutingCondition.
        ja: GateCondition → RoutingCondition を assert します。
      why_valid_or_invalid:
        zh: 该对象既满足可求值条件身份，也完整具备门控阈值种差。
        en: It is evaluable and has gate-specific differentia.
        ja: evaluable condition かつ gate-specific differentia を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-gate-condition-001
        - claim-gate-condition-002
    - id: GateCondition-is_a-RoutingCondition-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 门控结果不是门控条件
        en: Gate outcome is not GateCondition
        ja: gate outcome は GateCondition ではない
      scenario_id: routing-relation-gatecondition-is_a-routingcondition-boundary
      descriptions:
        zh: outcome-884 记录 block 和证据时间，没有可复用阈值。
        en: outcome-884 records block, evidence, and time but no reusable threshold.
        ja: outcome-884 は block/evidence/time を記録し reusable threshold がありません。
      field_values: {}
      related_node_ids:
        - GateCondition
        - RoutingCondition
      related_relation_ids:
        - GateCondition-is_a-RoutingCondition
      expected_result:
        zh: 归 GateOutcome。
        en: Classify as GateOutcome.
        ja: GateOutcome とします。
      why_valid_or_invalid:
        zh: 一次门控发生结果不能继承可复用条件规范的概念身份。
        en: An occurrence outcome cannot inherit from a specification.
        ja: occurrence outcome は specification を継承できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-gate-condition-001
        - claim-gate-condition-002
  source_claims:
    - claim-gate-condition-001
    - claim-gate-condition-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
