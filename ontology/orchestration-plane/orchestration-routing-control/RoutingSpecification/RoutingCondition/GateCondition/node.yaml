schema: moonweave.ai/ontology-node/v1
id: GateCondition
kind: concept
labels:
  zh: 门控条件
  en: gate condition
  ja: ゲート条件
semantics:
  short_definition:
    zh: 为 ControlGate 规定证据、阈值与缺失处理的路由条件。
    en: A routing condition specifying evidence, thresholds, and missing-evidence handling for ControlGate.
    ja: ControlGate の evidence/threshold/missing-evidence handling を規定する routing condition です。
  definition:
    zh: GateCondition 是 RoutingCondition 的子类，种差为声明 ControlGate 必须读取的 required_evidence_types、comparison、on_missing_evidence 与可能结果。它是可复用判定规范；ControlGate 执行求值并产生 GateOutcome，条件本身不产生结果。Cursor 验证门（lint/typecheck/test 阈值）与 LangGraph 发布前质量门均引用 GateCondition 版本。
    en: A GateCondition is a RoutingCondition distinguished by required_evidence_types, comparison, on_missing_evidence, and possible outcomes for ControlGate. It is a reusable decision specification; ControlGate performs evaluation and produces GateOutcome while the condition produces nothing. Cursor verification gates and LangGraph pre-publication quality gates reference GateCondition revisions.
    ja: GateCondition は ControlGate 向け evidence/threshold/missing handling を宣言する subtype で Cursor/LangGraph quality gate が参照します。
  why_needed:
    zh: 把门控标准与门控能力、门控结果拆开，可分别复用标准、升级实现和审计每次判断。
    en: Separating gate criteria, gate capability, and gate outcome permits criterion reuse, implementation upgrades, and per-evaluation audit.
    ja: gate criteria/capability/outcome を分け criterion reuse と per-evaluation audit を可能にします。
  includes:
    - zh: 质量下限、安全决策要求、预算上限、人工批准要求、Cursor 验证阈值和证据完备性门槛。
      en: Quality floors, safety-decision requirements, budget ceilings, human-approval requirements, Cursor verification thresholds, and evidence-completeness gates.
      ja: quality floor・safety requirement・budget ceiling・human approval・Cursor verification threshold。
  excludes:
    - zh: 门控实现、一次 GateOutcome、路由分支映射、一般业务校验规则和 UI 禁用状态。
      en: Gate implementation, one GateOutcome, branch mapping, general validation rules, and UI disabled state.
      ja: gate implementation・gate outcome・branch mapping・general validation・UI disabled state。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Cursor Agent 模式将 gate-quality@5 定义为 eval_score>=0.80 且 lint/typecheck/test 全 pass；ControlGate 读取 evidence_refs 求值并产生 allow/redirect。LangGraph interrupt 前的 tool_approval GateCondition 应声明 required_evidence_types=[human_decision]。缺失证据时 on_missing_evidence=escalate，不得隐式 allow。
    en: Cursor agent mode defines gate-quality@5 as eval_score>=0.80 with lint/typecheck/test all pass; ControlGate reads evidence_refs and yields allow/redirect. LangGraph pre-interrupt tool_approval GateCondition should declare required_evidence_types=[human_decision]. on_missing_evidence=escalate—never implicit allow.
    ja: Cursor gate-quality@5 は eval_score>=0.80+lint/typecheck/test pass。missing evidence は escalate で implicit allow 禁止。
  typical_input:
    - description: Evidence bundle for gate evaluation.
      format: |
        gate_condition_ref: gate-quality@5
        required_evidence_types: [quality-score, safety-decision]
        comparison: quality_score >= 0.90 && safety_decision == 'allow'
        on_missing_evidence: escalate
      source_claims: [claim-gate-condition-design]
  typical_output:
    - description: Reusable gate threshold specification.
      format: |
        {
          "routing_specification_id": "gate-condition-publication-quality",
          "version": "5",
          "comparison": "evidence.quality_score >= 0.90",
          "on_missing_evidence": "escalate"
        }
      source_claims: [claim-gate-condition-design]
  reference_implementations:
    - name: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      description: Lint/typecheck/test verification thresholds.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: interrupt gates and post-node quality checks.
    - name: CrewAI
      url: https://docs.crewai.com
      description: human_input evidence requirements.
structure:
  identity_keys: []
  fields:
    - id: required_evidence_types
      labels:
        zh: 必需证据类型
        en: required evidence types
        ja: required evidence types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出求值前必须存在的证据类别。
        en: Lists evidence categories that must exist before evaluation.
        ja: evaluation 前必要 evidence category。
      allowed_values: []
      pattern: null
      example_value:
        - quality-score
        - safety-decision
      source_claims:
        - claim-gate-condition-design
    - id: comparison
      labels:
        zh: 比较规则
        en: comparison rule
        ja: comparison rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明证据值和阈值的确定性比较。
        en: Declares deterministic comparison between evidence values and thresholds.
        ja: evidence/threshold deterministic comparison。
      allowed_values: []
      pattern: null
      example_value: quality_score >= 0.90 && safety_decision == 'allow'
      source_claims:
        - claim-gate-condition-design
    - id: on_missing_evidence
      labels:
        zh: 证据缺失处理
        en: missing-evidence handling
        ja: missing-evidence handling
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证据缺失时 block、escalate 或 defer，不得隐式通过。
        en: Specifies block, escalate, or defer when evidence is missing rather than implicit allow.
        ja: evidence missing 時 block/escalate/defer、implicit allow 禁止。
      allowed_values: []
      pattern: null
      example_value: escalate
      source_claims:
        - claim-gate-condition-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: GateCondition-example-cursor-quality
    labels:
      zh: Cursor 质量验证门槛
      en: Cursor quality verification threshold
      ja: Cursor 品質検証閾値
    descriptions:
      zh: gate-quality@5 要求 eval_score、lint、typecheck、test 证据；comparison 规定 score>=0.80 且三项验证 pass，缺失则 escalate。
      en: gate-quality@5 requires eval_score, lint, typecheck, and test evidence; comparison requires score>=0.80 and all three checks pass; missing evidence escalates.
      ja: gate-quality@5 は Cursor 検証 evidence と score>=0.80 を要求します。
    example_source:
      product: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      version: verification gates
    field_values:
      routing_specification_id: gate-condition-publication-quality
      version: "5"
      eligible_target_types:
        - operation
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: evidence.quality_score >= 0.80 && evidence.lint == 'pass'
      input_schema_ref: cursor-verification-evidence@5
      result_type: boolean
      required_evidence_types:
        - eval-score
        - lint-result
        - typecheck-result
        - test-result
      comparison: quality_score >= 0.80 && lint == 'pass' && typecheck == 'pass' && test == 'pass'
      on_missing_evidence: escalate
    related_node_ids:
      - GateCondition
      - ControlGate
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
    source_claims:
      - claim-gate-condition-design
  - id: GateCondition-example-langgraph-publication
    labels:
      zh: LangGraph 发布质量门槛
      en: LangGraph publication quality threshold
      ja: LangGraph 公開品質閾値
    descriptions:
      zh: gate-condition-publication@5 要求 quality-score 与 safety-decision，score>=0.90 且 safety=allow。
      en: gate-condition-publication@5 requires quality-score and safety-decision with score>=0.90 and safety=allow.
      ja: gate-condition-publication@5 は score>=0.90/safety=allow を要求します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: post-node quality gate
    field_values:
      routing_specification_id: gate-condition-publication-quality
      version: "5"
      required_evidence_types:
        - quality-score
        - safety-decision
      comparison: quality_score >= 0.90 && safety_decision == 'allow'
      on_missing_evidence: escalate
    related_node_ids:
      - GateCondition
      - ControlGate
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-langgraph
  - id: GateCondition-example-crewai-human
    labels:
      zh: CrewAI 人工输入门槛
      en: CrewAI human-input threshold
      ja: CrewAI human-input 閾値
    descriptions:
      zh: gate-human-sql@1 要求 human-input 证据类型，comparison 检查 approval=='yes'，缺失 block。
      en: gate-human-sql@1 requires human-input evidence type with comparison approval=='yes'; missing evidence blocks.
      ja: gate-human-sql@1 は human-input evidence を要求し missing は block です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: human_input
    field_values:
      routing_specification_id: gate-human-sql
      version: "1"
      required_evidence_types:
        - human-input
      comparison: human_approval == 'yes'
      on_missing_evidence: block
    related_node_ids:
      - GateCondition
      - Gate
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-crewai
  - id: GateCondition-example-boundary-outcome
    labels:
      zh: 门控结果不是门槛规范
      en: Gate outcome is not threshold spec
      ja: gate outcome は threshold spec ではない
    descriptions:
      zh: gate-outcome-884 记录 block 与 score=0.72，没有可复用 comparison 版本。
      en: gate-outcome-884 records block and score=0.72 with no reusable comparison revision.
      ja: gate-outcome-884 は outcome record で threshold spec ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: condition versus outcome
    field_values: {}
    related_node_ids:
      - GateOutcome
      - GateCondition
    related_relation_ids: []
    source_claims:
      - claim-gate-condition-design
parent_relation:
