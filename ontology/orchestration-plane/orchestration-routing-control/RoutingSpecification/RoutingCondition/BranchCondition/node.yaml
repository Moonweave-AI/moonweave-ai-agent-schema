    source: langgraph-branch-condition
    supports: LangGraph route functions implement if/else branches returning path-map keys mappable to BranchCondition match_value and candidate_route_refs.
    locator: Graph API — Conditional edges, should_continue patterns
    evidence_kind: official
    confidence: high
  - id: claim-branch-condition-crewai
    source: crewai-branch-condition
    supports: CrewAI hierarchical manager routing selects among worker routes based on intent-like predicates.
    locator: Process.hierarchical — manager delegation
    evidence_kind: official
    confidence: high
  - id: claim-branch-condition-design
    source: branch-condition-design
    supports: BranchCondition is RoutingCondition subtype mapping match results to candidate Routes with precedence.
    locator: BranchCondition concept boundary
    evidence_kind: design-inference
    confidence: high
