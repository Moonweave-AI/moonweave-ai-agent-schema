schema: moonweave.ai/ontology-node/v1
id: BranchCondition
kind: concept
labels:
  zh: 分支条件
  en: branch condition
  ja: 分岐条件
semantics:
  short_definition:
    zh: 将匹配结果映射到候选 Route 并规定优先级的路由条件。
    en: A routing condition that maps a match result to candidate routes with precedence.
    ja: match result を candidate route と precedence に mapping する routing condition です。
  definition:
    zh: BranchCondition 是 RoutingCondition 的子类，种差为把 predicate 结果与 candidate_route_refs、precedence 关联。它对应 LangGraph route function 中的 if/else 分支（should_continue 式逻辑）：匹配 billing 则返回 "billing" 键并启用 route-billing-primary 等候选。它不是 Route 本身，也不是选择某条分支的 RoutingDecision。
    en: "A BranchCondition is a RoutingCondition distinguished by associating a predicate outcome with candidate_route_refs and precedence. It corresponds to if/else branches in LangGraph route functions (should_continue-style logic) where matching billing returns the billing key and enables candidate routes such as route-billing-primary. It is neither a Route nor the RoutingDecision that selects one branch."
    ja: BranchCondition は predicate outcome を candidate Route/precedence に関連付ける subtype で LangGraph route function の if/else（should_continue 型）に対応します。
  why_needed:
    zh: 分支语义单列后，StopCondition 与 GateCondition 不会被误画成同级候选路径。
    en: Explicit branch semantics prevent StopCondition and GateCondition from being misdrawn as peer candidate paths.
    ja: branch semantics を明示し stop/gate condition を peer candidate path と誤表示しません。
  includes:
    - zh: 意图分类、置信度区间、业务状态和策略结果到候选 Route 的映射条件。
      en: Conditions mapping intent classes, confidence bands, business states, or policy outcomes to candidate Routes.
      ja: intent class・confidence band・business state・policy outcome→candidate Route mapping。
  excludes:
    - zh: 路由边、一次分支选择、停止条件、门阈值和原始 if 语句文本。
      en: A route edge, one branch selection, stop condition, gate threshold, and raw if-statement text.
      ja: route edge・branch selection occurrence・stop condition・gate threshold・raw if statement。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph should_continue(state) 返回 "continue"/END 的模式投影为 BranchCondition：match_value 对应返回值，candidate_route_refs 对应 path map 目标。OpenAI/ReAct 循环中 next-action 选择也可建模为 BranchCondition，但应存为版本化表达式而非一次 action 文本。
    en: LangGraph should_continue(state) returning "continue"/END projects to BranchCondition where match_value is the return and candidate_route_refs are path-map targets. OpenAI/ReAct next-action selection can also model as BranchCondition but must be stored as versioned expressions, not one action string.
    ja: LangGraph should_continue の "continue"/END 返却を BranchCondition に写像します。match_value は戻り値、candidate_route_refs は path map target です。
  typical_input:
    - description: LangGraph should_continue branch function.
      format: |
        def should_continue(state):
            if state.get("step_count", 0) >= 10:
                return END
            if state.get("last_tool_error"):
                return "repair"
            return "continue"
      source_claims: [claim-branch-condition-langgraph]
  typical_output:
    - description: Branch condition with route mapping.
      format: |
        {
          "routing_specification_id": "branch-condition-billing",
          "version": "3",
          "match_value": "billing",
          "candidate_route_refs": ["route-billing-primary", "route-billing-fallback"],
          "precedence": 20
        }
      source_claims: [claim-branch-condition-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: should_continue and conditional_edges if/else routing.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Intent-based branch routing in hierarchical crews.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Next-agent selection branches in multi-agent loops.
structure:
  identity_keys: []
  fields:
    - id: match_value
      labels:
        zh: 匹配值
        en: match value
        ja: match value
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明条件结果或 route function 返回值必须匹配的受控值。
        en: Declares the controlled value the evaluated result or route-function return must match.
        ja: evaluated result/route function return が一致すべき controlled value。
      allowed_values: []
      pattern: null
      example_value: billing
      source_claims:
        - claim-branch-condition-langgraph
    - id: candidate_route_refs
      labels:
        zh: 候选路径引用
        en: candidate-route references
        ja: candidate-route references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用匹配时可被选择的一组 Route。
        en: References Routes eligible when the condition matches.
        ja: condition match 時 eligible な Route。
      allowed_values: []
      pattern: null
      example_value:
        - route-billing-primary
        - route-billing-fallback
      source_claims:
        - claim-branch-condition-langgraph
    - id: precedence
      labels:
        zh: 分支优先级
        en: branch precedence
        ja: branch precedence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 多个条件同时为真时的比较顺序。
        en: Ordering when multiple conditions are true.
        ja: multiple condition true 時 ordering。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-branch-condition-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: BranchCondition-example-langgraph-if-else
    labels:
      zh: LangGraph if/else 账单分支
      en: LangGraph if/else billing branch
      ja: LangGraph if/else billing branch
    descriptions:
      zh: branch-billing@3 在 intent=billing 时映射 route-billing-primary 与 route-billing-fallback，precedence=20；对应 route function 返回 "billing"。
      en: branch-billing@3 maps route-billing-primary and route-billing-fallback when intent=billing at precedence 20, matching route function return "billing".
      ja: branch-billing@3 は intent=billing で "billing" 返却に対応します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges if/else
    field_values:
      routing_specification_id: branch-condition-billing
      version: "3"
      eligible_target_types:
        - worker
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: state.intent == 'billing'
      input_schema_ref: routing-state@3
      result_type: boolean
      match_value: billing
      candidate_route_refs:
        - route-billing-primary
        - route-billing-fallback
      precedence: 20
    related_node_ids:
      - BranchCondition
      - Route
      - RoutingPolicy
    related_relation_ids:
      - RoutingPolicy-has_condition-BranchCondition
    source_claims:
      - claim-branch-condition-langgraph
  - id: BranchCondition-example-should-continue
    labels:
      zh: should_continue 继续/停止分支
      en: should_continue continue/stop branch
      ja: should_continue continue/stop branch
    descriptions:
      zh: branch-continue@1 match_value=continue 映射 route-agent-loop；match_value=END 由 StopCondition 处理，不在此 BranchCondition 候选内。
      en: branch-continue@1 match_value=continue maps route-agent-loop; match_value=END is handled by StopCondition, not this BranchCondition's candidates.
      ja: branch-continue@1 は continue→route-agent-loop を mapping します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: should_continue pattern
    field_values:
      routing_specification_id: branch-continue
      version: "1"
      match_value: continue
      candidate_route_refs:
        - route-agent-loop
      precedence: 10
    related_node_ids:
      - BranchCondition
      - StopCondition
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-langgraph
  - id: BranchCondition-example-crewai-intent
    labels:
      zh: CrewAI 意图分支
      en: CrewAI intent branch
      ja: CrewAI intent branch
    descriptions:
      zh: branch-research@2 在 unresolved_sources>0 时提供 researcher/writer 候选 Route，manager 层级 crew 使用。
      en: branch-research@2 offers researcher/writer candidate Routes when unresolved_sources>0 in hierarchical crew manager routing.
      ja: branch-research@2 は hierarchical crew manager routing の intent branch です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      routing_specification_id: branch-research
      version: "2"
      match_value: research
      candidate_route_refs:
        - route-researcher
        - route-writer
      precedence: 15
    related_node_ids:
      - BranchCondition
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-crewai
  - id: BranchCondition-example-boundary-decision
    labels:
      zh: 已走账单分支不是条件定义
      en: Taken billing branch is not condition definition
      ja: taken billing branch は condition 定義ではない
    descriptions:
      zh: decision-884 记录选择 route-billing-primary 和 billing-worker-2；是 RoutingDecision 发生事实。
      en: decision-884 records selecting route-billing-primary and billing-worker-2; it is a RoutingDecision occurrence.
      ja: decision-884 は RoutingDecision occurrence です。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: branch versus decision
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-design
parent_relation:
  id: BranchCondition-is_a-RoutingCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: BranchCondition 是一种 RoutingCondition；其种差是把匹配结果映射为候选 Route 并规定冲突优先级。
    en: A BranchCondition is a RoutingCondition distinguished by mapping a match result to candidate Routes and conflict precedence.
    ja: BranchCondition は match result→candidate Route/precedence mapping subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: BranchCondition-is_a-RoutingCondition-example-positive
      kind: positive
      labels:
        zh: 账单意图分支条件
        en: Billing-intent branch condition
        ja: billing-intent branch condition
      descriptions:
        zh: branch-billing 把 billing 匹配到主路径与人工后备路径。
        en: branch-billing maps billing to primary and human-fallback Routes.
        ja: branch-billing は primary/human-fallback Route を mapping します。
      field_values: {}
      related_node_ids:
        - BranchCondition
        - RoutingCondition
      related_relation_ids:
        - BranchCondition-is_a-RoutingCondition
      source_claims:
        - claim-branch-condition-design
  source_claims:
    - claim-branch-condition-design
  endpoint_order: child-to-parent
relations: []
