schema: moonweave.ai/ontology-node/v1
id: BranchCondition
kind: concept
labels:
  zh: 分支条件
  en: branch condition
  ja: branch condition
semantics:
  short_definition:
    zh: 将一种求值结果映射到候选路由并规定优先级的路由条件。
    en: A routing condition that maps an evaluation result to candidate routes with precedence.
    ja: evaluation result を candidate route と precedence に対応付ける routing condition。
  definition:
    zh: 分支条件是 RoutingCondition 的子类，其种差是把判定结果与一个或多个候选 Route、优先级和冲突消解方式关联起来。它适用于互斥或有序分支；它不是 Route 本身，也不是选择某条分支的 RoutingDecision。
    en: A BranchCondition is a RoutingCondition distinguished by associating a predicate outcome with one or more candidate Routes, precedence, and conflict resolution. It governs exclusive or ordered branching; it is neither a Route nor the RoutingDecision that selects one branch.
    ja: BranchCondition は predicate outcome を candidate Route・precedence・conflict resolution に関連付ける RoutingCondition subtype です。exclusive/ordered branch を規定しますが Route 自体でも selection decision でもありません。
  why_needed:
    zh: 分支语义单列后，普通停止条件和门控条件不会被误画成同级候选路径。
    en: Making branch semantics explicit prevents stop and gate conditions from being misdrawn as peer candidate paths.
    ja: branch semantics を明示し stop/gate condition を peer candidate path と誤表示しません。
  includes:
    - zh: 意图分类、置信度区间、业务状态和策略结果到候选 Route 的映射条件。
      en: Conditions mapping intent classes, confidence bands, business states, or policy outcomes to candidate Routes.
      ja: intent class・confidence band・business state・policy outcome から candidate Route への mapping condition。
  excludes:
    - zh: 路由边、一次分支选择、停止条件、门阈值和编程语言 if 语句文本。
      en: A route edge, one branch selection, stop condition, gate threshold, and raw programming-language if statement.
      ja: route edge・branch selection occurrence・stop condition・gate threshold・raw if statement。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      BranchCondition 编译为 LangGraph conditional_edges 的 path_map：match_value 映射到 candidate Route 列表与
      precedence。RoutingDecision 在互斥分支中记录 selected_route_ref；OPA 用 ordered deny/allow 实现冲突消解。
      StopCondition 与 GateCondition 不在此映射中竞争同级路径。
    en: >-
      BranchCondition compiles to LangGraph conditional_edges path_map: match_value maps to candidate Route lists with
      precedence. RoutingDecision records selected_route_ref on exclusive branches; OPA uses ordered deny/allow for conflict
      resolution. StopCondition and GateCondition do not compete as peer paths in this map.
    ja: >-
      BranchCondition は LangGraph conditional_edges path_map にコンパイルされる。match_value が candidate Route list と
      precedence に map される。RoutingDecision は exclusive branch で selected_route_ref を記録する。OPA は ordered deny/allow
      で conflict resolution する。StopCondition と GateCondition はこの map で peer path として競合しない。
  typical_input:
    - description:
        zh: 将判定结果映射到候选 Route 的分支条件。
        en: A branch condition mapping evaluation results to candidate Routes.
        ja: evaluation result を candidate Route に map する branch condition。
      format: |-
        {"condition_id":"cond:risk-branch@1","match_value":"high","candidate_routes":[{"route_ref":"route:sign-to-review","precedence":10},{"route_ref":"route:sign-to-approve","precedence":5}],"conflict_resolution":"highest_precedence"}
  typical_output:
    - description:
        zh: 路由函数 path_map 项与 RoutingDecision 的 selected_route_ref。
        en: A router path_map entry and RoutingDecision selected_route_ref.
        ja: router path_map entry と RoutingDecision selected_route_ref。
      format: |-
        {"path_map_entry":{"when":"high","goto":"review"},"routing_decision_id":"rd-889","selected_route_ref":"route:sign-to-review","selected_target_ref":"target:node:review"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents path maps from predicate outcomes to named destinations.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents precedence-ordered routing rules for branch selection.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents goto targets chosen after branch condition evaluation.
  source_claims:
    - claim-branch-condition-001
    - claim-branch-condition-002
structure:
  identity_keys: []
  fields:
    - id: match_value
      labels:
        zh: 匹配值
        en: match value
        ja: match value
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明条件结果必须匹配的受控值。
        en: Declares the controlled value that the evaluated result must match.
        ja: evaluated result が一致すべき controlled value を宣言します。
      allowed_values: []
      pattern: null
      example_value: billing
      source_claims:
        - claim-branch-condition-001
    - id: candidate_route_refs
      labels:
        zh: 候选路径引用
        en: candidate-route references
        ja: candidate-route references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用匹配时可被选择的一组 Route。
        en: References Routes eligible when the condition matches.
        ja: condition match 時に eligible な Route を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - route-billing-primary
        - route-billing-fallback
      source_claims:
        - claim-branch-condition-001
    - id: precedence
      labels:
        zh: 分支优先级
        en: branch precedence
        ja: branch precedence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在多个条件同时为真时规定比较顺序。
        en: Defines ordering when multiple conditions are true.
        ja: multiple condition true 時の ordering を定義します。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-branch-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: branch-langgraph-should-continue
    labels:
      zh: BranchCondition positive
      en: BranchCondition positive
      ja: BranchCondition positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 BranchCondition 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to BranchCondition: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) BranchCondition で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {routing_specification_id: branch-condition-tool-loop, expression: has_tool_calls, match_value: tools}

    related_node_ids:
      - BranchCondition
      - Route
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-001

  - id: branch-semantic-router-billing-intent
    labels:
      zh: BranchCondition positive
      en: BranchCondition positive
      ja: BranchCondition positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 BranchCondition 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for BranchCondition: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が BranchCondition で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {match_value: billing, precedence: 20, candidate_route_refs: [route-billing-primary}

    related_node_ids:
      - BranchCondition
      - Route
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-001

  - id: branch-langgraph-route-by-severity
    labels:
      zh: BranchCondition positive
      en: BranchCondition positive
      ja: BranchCondition positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 BranchCondition 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as BranchCondition router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が BranchCondition から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {expression: state.severity, match_value: high, precedence: 30}

    related_node_ids:
      - BranchCondition
      - RoutingCondition
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-003

  - id: branch-opa-support-tier
    labels:
      zh: BranchCondition positive
      en: BranchCondition positive
      ja: BranchCondition positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 BranchCondition 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for BranchCondition via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が BranchCondition 多段推論を誘発；GSM8K 精度向上。
    field_values: {expression_language: "rego@1", expression: data.support.tier, match_value: premium}

    related_node_ids:
      - BranchCondition
      - GateCondition
    related_relation_ids: []
    source_claims:
      - claim-branch-condition-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-branch-condition-001
    source: langgraph-graph-api
    supports: BranchCondition core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-branch-condition-002
    source: opa-policy-language
    supports: BranchCondition boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-branch-condition-003
    source: langgraph-graph-api
    supports: BranchCondition field or status vocabulary is a Moonweave audit projection informed by LangGraph Graph API.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
