schema: moonweave.ai/ontology-node/v1
id: BranchCondition
kind: concept
status: accepted
labels:
  zh: 分支条件
  en: branch condition
  ja: branch condition
semantics:
  short_definition:
    zh: 将一种求值结果映射到候选路由并规定优先级的路由条件。
    en: A routing condition that maps an evaluation result to candidate routes with precedence.
    ja: evaluation result を candidate route と precedence に対応付ける routing condition。
  definition:
    zh: 分支条件是 RoutingCondition 的子类，其种差是把判定结果与一个或多个候选 Route、优先级和冲突消解方式关联起来。它适用于互斥或有序分支；它不是 Route 本身，也不是选择某条分支的 RoutingDecision。
    en: A BranchCondition is a RoutingCondition distinguished by associating a predicate outcome with one or more candidate Routes, precedence, and conflict resolution. It governs exclusive or ordered branching; it is neither a Route nor the RoutingDecision that selects one branch.
    ja: BranchCondition は predicate outcome を candidate Route・precedence・conflict resolution に関連付ける RoutingCondition subtype です。exclusive/ordered branch を規定しますが Route 自体でも selection decision でもありません。
  why_needed:
    zh: 分支语义单列后，普通停止条件和门控条件不会被误画成同级候选路径。
    en: Making branch semantics explicit prevents stop and gate conditions from being misdrawn as peer candidate paths.
    ja: branch semantics を明示し stop/gate condition を peer candidate path と誤表示しません。
  includes:
    - zh: 意图分类、置信度区间、业务状态和策略结果到候选 Route 的映射条件。
      en: Conditions mapping intent classes, confidence bands, business states, or policy outcomes to candidate Routes.
      ja: intent class・confidence band・business state・policy outcome から candidate Route への mapping condition。
  excludes:
    - zh: 路由边、一次分支选择、停止条件、门阈值和编程语言 if 语句文本。
      en: A route edge, one branch selection, stop condition, gate threshold, and raw programming-language if statement.
      ja: route edge・branch selection occurrence・stop condition・gate threshold・raw if statement。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: match_value
      labels:
        zh: 匹配值
        en: match value
        ja: match value
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明条件结果必须匹配的受控值。
        en: Declares the controlled value that the evaluated result must match.
        ja: evaluated result が一致すべき controlled value を宣言します。
      allowed_values: []
      pattern: null
      example_value: billing
      source_claims:
        - claim-branch-condition-001
    - id: candidate_route_refs
      labels:
        zh: 候选路径引用
        en: candidate-route references
        ja: candidate-route references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用匹配时可被选择的一组 Route。
        en: References Routes eligible when the condition matches.
        ja: condition match 時に eligible な Route を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - route-billing-primary
        - route-billing-fallback
      source_claims:
        - claim-branch-condition-001
    - id: precedence
      labels:
        zh: 分支优先级
        en: branch precedence
        ja: branch precedence
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在多个条件同时为真时规定比较顺序。
        en: Defines ordering when multiple conditions are true.
        ja: multiple condition true 時の ordering を定義します。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-branch-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: BranchCondition-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 账单意图分支
      en: Billing-intent branch
      ja: billing-intent branch
    scenario_id: null
    descriptions:
      zh: branch-billing@3 在 intent=billing 时提供主账单 worker 与人工后备两条 Route，并以 20 的优先级参与冲突消解。
      en: branch-billing@3 offers primary billing-worker and human-fallback Routes when intent=billing and participates in conflict resolution at precedence 20.
      ja: branch-billing@3 は intent=billing で primary worker/human fallback Route を候補にし precedence 20 で競合解消します。
    field_values:
      routing_specification_id: branch-condition-billing
      version: "3"
      eligible_target_types:
        - worker
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: state.intent == 'billing'
      input_schema_ref: routing-state@3
      result_type: boolean
      match_value: billing
      candidate_route_refs:
        - route-billing-primary
        - route-billing-fallback
      precedence: 20
    related_node_ids:
      - BranchCondition
      - RoutingPolicy
      - Route
    related_relation_ids:
      - RoutingPolicy-has_condition-BranchCondition
    expected_result:
      zh: 归入 RoutingCondition 下，并由 RoutingPolicy 组合。
      en: Place it under RoutingCondition and compose it through RoutingPolicy.
      ja: RoutingCondition 下に置き RoutingPolicy が compose します。
    why_valid_or_invalid:
      zh: 它描述匹配结果与候选路径的可复用映射。
      en: It describes a reusable mapping from match result to candidate paths.
      ja: match result から candidate path への reusable mapping です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-branch-condition-001
  - id: BranchCondition-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 已走账单分支
      en: Billing branch was taken
      ja: billing branch taken
    scenario_id: routing-review-branchcondition-boundary
    descriptions:
      zh: decision-884 记录最终选择 route-billing-primary 和 billing-worker-2；它是发生事实，不是 branch-billing 的定义。
      en: decision-884 records selecting route-billing-primary and billing-worker-2; it is an occurrence fact, not the definition of branch-billing.
      ja: decision-884 の route-billing-primary/billing-worker-2 selection は occurrence fact で branch-billing definition ではありません。
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - BranchCondition
    related_relation_ids: []
    expected_result:
      zh: 保存为 RoutingDecision，不创建新的 BranchCondition。
      en: Store it as RoutingDecision, not a new BranchCondition.
      ja: RoutingDecision として保存し BranchCondition を新設しません。
    why_valid_or_invalid:
      zh: 最终选择与可复用映射具有不同身份和生命周期。
      en: Final selection and reusable mapping have different identity and lifecycle.
      ja: final selection と reusable mapping は identity/lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-branch-condition-001
      - claim-branch-condition-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GateCondition
    shared_parent_concept_id: RoutingCondition
    differentia:
      zh: BranchCondition 把匹配值映射到候选 Route 与优先级；GateCondition 为 ControlGate 规定证据、阈值和缺失处理。
      en: BranchCondition maps match values to candidate Routes and precedence; GateCondition sets evidence, threshold, and missing-evidence handling for ControlGate.
      ja: BranchCondition は match value→candidate Route/precedence、GateCondition は ControlGate evidence/threshold/missing handling を規定します。
    source_claims:
      - claim-branch-condition-001
parent_relation:
  id: BranchCondition-is_a-RoutingCondition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: BranchCondition 是一种 RoutingCondition；其种差是把匹配结果映射为候选 Route 并规定冲突优先级。
    en: A BranchCondition is a RoutingCondition distinguished by mapping a match result to candidate Routes and conflict precedence.
    ja: BranchCondition は match result を candidate Route と conflict precedence に mapping する RoutingCondition subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: BranchCondition-is_a-RoutingCondition-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 账单意图分支条件
        en: Billing-intent branch condition
        ja: billing-intent branch condition
      scenario_id: routing-relation-branchcondition-is_a-routingcondition-positive
      descriptions:
        zh: branch-billing 把 billing 匹配到主路径与人工后备路径。
        en: branch-billing maps billing to primary and human-fallback Routes.
        ja: branch-billing は billing を primary/human-fallback Route に mapping します。
      field_values: {}
      related_node_ids:
        - BranchCondition
        - RoutingCondition
      related_relation_ids:
        - BranchCondition-is_a-RoutingCondition
      expected_result:
        zh: 断言 BranchCondition → RoutingCondition。
        en: Assert BranchCondition → RoutingCondition.
        ja: BranchCondition → RoutingCondition を assert します。
      why_valid_or_invalid:
        zh: 它满足一般条件身份和分支映射种差。
        en: It satisfies condition identity and branch-mapping differentia.
        ja: condition identity と branch-mapping differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-branch-condition-001
        - claim-branch-condition-002
    - id: BranchCondition-is_a-RoutingCondition-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 停止条件不是分支条件
        en: Stop condition is not a branch condition
        ja: stop condition は branch condition ではない
      scenario_id: routing-relation-branchcondition-is_a-routingcondition-boundary
      descriptions:
        zh: stop-budget 声明预算耗尽标准，但不映射候选 Route 或优先级。
        en: stop-budget declares a budget-exhaustion criterion but maps no candidate Route or precedence.
        ja: stop-budget は budget exhaustion を宣言しますが candidate Route/precedence を mapping しません。
      field_values: {}
      related_node_ids:
        - BranchCondition
        - RoutingCondition
      related_relation_ids:
        - BranchCondition-is_a-RoutingCondition
      expected_result:
        zh: 仅归 StopCondition。
        en: Classify only as StopCondition.
        ja: StopCondition のみとします。
      why_valid_or_invalid:
        zh: 共享上位类只说明同属一类，不能证明两个概念共享相同种差。
        en: A shared parent does not imply a shared differentia.
        ja: shared parent は shared differentia を意味しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-branch-condition-001
        - claim-branch-condition-002
  source_claims:
    - claim-branch-condition-001
    - claim-branch-condition-002
