schema: moonweave.ai/ontology-node/v1
id: StopCondition
kind: concept
labels:
  zh: 停止条件
  en: stop condition
  ja: 停止条件
semantics:
  short_definition:
    zh: 声明何时应选择停止目标的终止判定规范。
    en: A termination predicate specifying when a routing decision should select a stop target.
    ja: routing decision が stop target を選ぶ時点を宣言する termination predicate です。
  definition:
    zh: StopCondition 是 RoutingCondition 的子类，以 termination_category、required_evidence_refs 与 stop_reason_code 标识，描述成功、失败、取消、预算耗尽、超时或 max_iterations 等停止标准。LangGraph END 节点与 should_continue 中 step_count>=max_iterations 检查映射到此概念；它不会自行终止 RuntimeSession——RoutingDecision 求值、记录满足事实并选择 stop RoutingTarget。
    en: A StopCondition is a RoutingCondition identified by termination_category, required_evidence_refs, and stop_reason_code, covering success, failure, cancellation, budget exhaustion, timeout, or max_iterations stop criteria. LangGraph END nodes and should_continue checks such as step_count>=max_iterations map here; it does not terminate RuntimeSession itself—RoutingDecision evaluates it, records satisfaction, and selects a stop RoutingTarget.
    ja: StopCondition は termination category/evidence/reason で識別する subtype で LangGraph END/max_iterations 检查に写像されます。
  why_needed:
    zh: 条件不是行动主体；分离“满足停止条件”与“执行终止”，才能保留谁、何时、基于何证据做出停止决定。
    en: A condition is not an acting subject; separating satisfaction from termination preserves who decided, when, and from what evidence.
    ja: condition は actor ではなく satisfaction と termination を分け who/when/evidence を保持します。
  includes:
    - zh: 任务成功、不可恢复失败、用户取消、预算耗尽、时限到达和 max_iterations 的可复用停止标准。
      en: Reusable stop criteria for task success, unrecoverable failure, user cancellation, budget exhaustion, deadline, and max_iterations.
      ja: success/failure/cancel/budget/deadline/max_iterations reusable stop criteria。
  excludes:
    - zh: RuntimeSession 终止事件、停止按钮、一次取消请求和无证据约束的自然语言愿望。
      en: RuntimeSession termination event, stop button, one cancellation request, and unconstrained natural-language wish.
      ja: RuntimeSession termination event・stop button・cancellation request・unconstrained wish。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 中 return END 或 conditional_edges 映射到 END 对应 StopCondition；agent 循环应声明 max_iterations 表达式（如 state.step_count>=10）作为 StopCondition 版本。OpenAI Agents SDK session 终止 predicate 同样外提为 StopCondition，一次 END 路由记为 RoutingDecision+satisfies-StopCondition。
    en: LangGraph return END or conditional_edges mapped to END correspond to StopCondition; agent loops should declare max_iterations expressions such as state.step_count>=10 as StopCondition revisions. OpenAI Agents SDK session termination predicates likewise externalize as StopCondition; one END route records RoutingDecision+satisfies-StopCondition.
    ja: LangGraph END/max_iterations は StopCondition に写像し one END route は RoutingDecision+satisfies を記録します。
  typical_input:
    - description: LangGraph max_iterations stop check.
      format: |
        def should_continue(state):
            if state.get("step_count", 0) >= 10:
                return END
            return "continue"
      source_claims: [claim-stop-condition-langgraph]
  typical_output:
    - description: Versioned stop condition specification.
      format: |
        {
          "routing_specification_id": "stop-condition-max-iterations",
          "version": "6",
          "termination_category": "round-limit",
          "stop_reason_code": "max-iterations-reached"
        }
      source_claims: [claim-stop-condition-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: END node and max_iterations in should_continue.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Session termination predicates in agent loops.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Flow termination conditions.
structure:
  identity_keys: []
  fields:
    - id: termination_category
      labels:
        zh: 终止类别
        en: termination category
        ja: termination category
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 success、failure、cancel、timeout、budget 或 round-limit（max_iterations）。
        en: Declares success, failure, cancellation, timeout, budget, or round-limit (max_iterations).
        ja: success/failure/cancel/timeout/budget/round-limit(max_iterations)。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-stop-condition-langgraph
    - id: required_evidence_refs
      labels:
        zh: 所需证据引用
        en: required-evidence references
        ja: required-evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用判断停止所需的结果、预算、迭代计数或用户请求类型。
        en: References result, budget, iteration count, or user-request types needed to judge stopping.
        ja: stop 判定に必要 result/budget/iteration count/user request type。
      allowed_values: []
      pattern: null
      example_value:
        - task-result
        - acceptance-check
      source_claims:
        - claim-stop-condition-design
    - id: stop_reason_code
      labels:
        zh: 停止原因代码
        en: stop-reason code
        ja: stop-reason code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 条件满足时提供给 RoutingDecision 的受控原因代码。
        en: Provides a controlled reason code when the condition is satisfied for RoutingDecision.
        ja: condition satisfied 時 RoutingDecision 向け controlled reason code。
      allowed_values: []
      pattern: null
      example_value: goal-satisfied
      source_claims:
        - claim-stop-condition-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: StopCondition-example-langgraph-end
    labels:
      zh: LangGraph END 停止条件
      en: LangGraph END stop condition
      ja: LangGraph END stop condition
    descriptions:
      zh: stop-success@6 表达式满足时 route function 返回 END，stop_reason_code=goal-satisfied，RoutingDecision 选择 stop target。
      en: stop-success@6 when expression satisfied makes route function return END with stop_reason_code=goal-satisfied; RoutingDecision selects stop target.
      ja: stop-success@6 成立時 route function は END を返し stop target を選択します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: END node routing
    field_values:
      routing_specification_id: stop-condition-success
      version: "6"
      eligible_target_types:
        - stop
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: evidence.task_result.status == 'complete' && evidence.acceptance_check.outcome == 'pass'
      input_schema_ref: termination-evidence@6
      result_type: boolean
      termination_category: success
      required_evidence_refs:
        - task-result
        - acceptance-check
      stop_reason_code: goal-satisfied
    related_node_ids:
      - StopCondition
      - RoutingDecision
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-satisfies-StopCondition
    source_claims:
      - claim-stop-condition-langgraph
  - id: StopCondition-example-max-iterations
    labels:
      zh: max_iterations 停止条件
      en: max_iterations stop condition
      ja: max_iterations stop condition
    descriptions:
      zh: stop-max-iterations@3 表达式 state.step_count>=10，termination_category=round-limit，stop_reason_code=max-iterations-reached。
      en: stop-max-iterations@3 expression state.step_count>=10 with termination_category=round-limit and stop_reason_code=max-iterations-reached.
      ja: stop-max-iterations@3 は step_count>=10 で round-limit stop です。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: should_continue max_iterations
    field_values:
      routing_specification_id: stop-max-iterations
      version: "3"
      expression: state.step_count >= 10
      termination_category: round-limit
      required_evidence_refs:
        - step-count
      stop_reason_code: max-iterations-reached
    related_node_ids:
      - StopCondition
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-langgraph
  - id: StopCondition-example-openai-session
    labels:
      zh: OpenAI 会话终止条件
      en: OpenAI session stop condition
      ja: OpenAI session stop condition
    descriptions:
      zh: stop-handoff-complete@1 在 handoff 完成且 billing_agent 返回 final_output 时满足，stop_reason_code=session-complete。
      en: stop-handoff-complete@1 satisfies when handoff completes and billing_agent returns final_output with stop_reason_code=session-complete.
      ja: stop-handoff-complete@1 は handoff 完了+final_output で session-complete です。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: session loop termination
    field_values:
      routing_specification_id: stop-handoff-complete
      version: "1"
      termination_category: success
      stop_reason_code: session-complete
    related_node_ids:
      - StopCondition
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-openai
  - id: StopCondition-example-boundary-session-terminated
    labels:
      zh: 会话终止事件不是停止条件
      en: Session termination event is not StopCondition
      ja: session termination event は StopCondition ではない
    descriptions:
      zh: runtime-session-7 在 04:30 以 goal-satisfied 结束；是运行时状态变化，不是 StopCondition 规范。
      en: runtime-session-7 ends at 04:30 with goal-satisfied; this is a runtime state transition, not a StopCondition specification.
      ja: runtime-session-7 terminated は runtime transition で stop condition spec ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: condition versus termination
    field_values: {}
    related_node_ids:
      - RuntimeSession
      - StopCondition
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-design
parent_relation:
  id: StopCondition-is_a-RoutingCondition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StopCondition 是一种 RoutingCondition；其种差是规定何时应选择停止目标，而不是自行终止运行。
    en: A StopCondition is a RoutingCondition distinguished by specifying when a stop target should be selected rather than terminating runtime itself.
    ja: StopCondition は stop target 選択時点を規定し runtime 自体 terminate しない subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StopCondition-is_a-RoutingCondition-example-positive
      kind: positive
      labels:
        zh: 目标达成停止条件
        en: Goal-satisfied stop condition
        ja: goal-satisfied stop condition
      descriptions:
        zh: stop-success 要求任务完成且验收通过。
        en: stop-success requires task completion and acceptance pass.
        ja: stop-success は task complete/acceptance pass を要求します。
      field_values: {}
      related_node_ids:
        - StopCondition
        - RoutingCondition
      related_relation_ids:
        - StopCondition-is_a-RoutingCondition
      source_claims:
        - claim-stop-condition-design
  source_claims:
    - claim-stop-condition-design
  endpoint_order: child-to-parent
relations: []
