schema: moonweave.ai/ontology-node/v1
id: StopCondition
kind: concept
labels:
  zh: 停止条件
  en: stop condition
  ja: stop condition
semantics:
  short_definition:
    zh: 声明路由决定何时应选择停止目标的终止判定规范。
    en: A termination predicate specifying when a routing decision should select a stop target.
    ja: routing decision が stop target を選ぶ時点を宣言する termination predicate。
  definition:
    zh: 停止条件是 RoutingCondition 的子类，以停止条件标识、终止类别、表达式、所需证据和停止原因为身份，描述成功、失败、取消、预算耗尽、超时或最大轮次等停止标准。它不会自行终止 RuntimeSession；RoutingDecision 对它求值、记录满足事实并选择相应 RoutingTarget，随后运行时执行终止。
    en: A StopCondition is a RoutingCondition identified by stop-condition ID, termination category, expression, required evidence, and stop reason, covering success, failure, cancellation, budget exhaustion, timeout, or maximum rounds. It does not terminate RuntimeSession itself; RoutingDecision evaluates it, records satisfaction, and selects the corresponding RoutingTarget before runtime performs termination.
    ja: StopCondition は stop ID・termination category・expression・required evidence・reason で識別し success/failure/cancel/budget/timeout/max-round を規定します。自ら RuntimeSession を terminate せず RoutingDecision が evaluate/satisfy を記録し stop target を選び、runtime が終了を実行します。
  why_needed:
    zh: 条件不是行动主体；将“满足停止条件”与“执行终止”分开，才能保留谁、何时、基于何证据做出停止决定。
    en: A condition is not an acting subject; separating satisfaction from termination preserves who decided, when, and from what evidence.
    ja: condition は actor ではなく satisfaction と termination を分け、who/when/evidence を保持します。
  includes:
    - zh: 任务成功、不可恢复失败、用户取消、预算耗尽、时限到达和最大轮次的可复用停止标准。
      en: Reusable stop criteria for task success, unrecoverable failure, user cancellation, budget exhaustion, deadline, and maximum rounds.
      ja: task success・unrecoverable failure・user cancel・budget exhaustion・deadline・max rounds の reusable stop criteria。
  excludes:
    - zh: RuntimeSession 的终止事件、停止按钮、一次取消请求和没有证据约束的自然语言愿望。
      en: RuntimeSession termination event, stop button, one cancellation request, and unconstrained natural-language wish.
      ja: RuntimeSession termination event・stop button・cancellation request・unconstrained natural-language wish。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      StopCondition 在 RoutingDecision 求值为 true 时选择 stop 类型 RoutingTarget，LangGraph 映射为 goto END
      或 Command(update=..., goto=END)。RuntimeSession 终止由 DownstreamOperation 或运行时执行器完成；
      StopCondition 只定义何时应停止，不记录终止事件时间戳。
    en: >-
      When RoutingDecision evaluates StopCondition true, it selects a stop-type RoutingTarget; LangGraph maps this to goto END
      or Command(update=..., goto=END). RuntimeSession termination is performed by DownstreamOperation or a runtime executor;
      StopCondition defines when to stop, not termination event timestamps.
    ja: >-
      RoutingDecision が StopCondition を true と evaluate すると stop type RoutingTarget を select する。LangGraph では
      goto END または Command(update=..., goto=END) に map する。RuntimeSession termination は DownstreamOperation または
      runtime executor が実行する。StopCondition は when to stop を定義し termination event timestamp は記録しない。
  typical_input:
    - description:
        zh: 声明终止类别与表达式的停止条件规约。
        en: A stop-condition specification declaring termination category and expression.
        ja: termination category と expression を宣言する stop-condition specification。
      format: |-
        {"stop_condition_id":"stop:max-rounds@1","termination_category":"max_rounds","expression":"state.round >= 5","stop_reason":"evaluator_optimizer_exhausted","required_evidence":["round_counter"]}
  typical_output:
    - description:
        zh: RoutingDecision 选择 stop target 并触发 END 路由的结果。
        en: RoutingDecision selecting a stop target and triggering END routing.
        ja: stop target を select し END routing を trigger する RoutingDecision result。
      format: |-
        {"routing_decision_id":"rd-890","stop_condition_ref":"stop:max-rounds@1","selected_target_ref":"target:stop:max_rounds","native_goto":"END","stop_reason":"evaluator_optimizer_exhausted"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents END as terminal routing destination after stop conditions.
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents Command goto END with state updates on termination.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents termination rules evaluated before selecting stop targets.
  source_claims:
    - claim-stop-condition-001
    - claim-stop-condition-002
structure:
  identity_keys: []
  fields:
    - id: termination_category
      labels:
        zh: 终止类别
        en: termination category
        ja: termination category
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明成功、失败、取消、超时、预算或轮次上限。
        en: Declares success, failure, cancellation, timeout, budget, or round limit.
        ja: success・failure・cancel・timeout・budget・round-limit を宣言します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-stop-condition-001
    - id: required_evidence_refs
      labels:
        zh: 所需证据引用
        en: required-evidence references
        ja: required-evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用判断停止所需的结果、预算或用户请求类型。
        en: References result, budget, or user-request types needed to judge stopping.
        ja: stop 判定に必要な result/budget/user-request type を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - task-result
        - acceptance-check
      source_claims:
        - claim-stop-condition-001
        - claim-stop-condition-003
    - id: stop_reason_code
      labels:
        zh: 停止原因代码
        en: stop-reason code
        ja: stop-reason code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给满足该条件的决定提供受控原因代码。
        en: Provides a controlled reason code when the condition is satisfied.
        ja: condition satisfied 時の controlled reason code を提供します。
      allowed_values: []
      pattern: null
      example_value: goal-satisfied
      source_claims:
        - claim-stop-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: stop-langgraph-max-iterations
    labels:
      zh: StopCondition positive
      en: StopCondition positive
      ja: StopCondition positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 StopCondition 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for StopCondition: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) StopCondition: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {routing_specification_id: stop-max-iterations, expression: "state.iteration>=10", match_value: stop}

    related_node_ids:
      - StopCondition
      - Route
      - RetryPolicy
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-001

  - id: stop-openai-max-turns
    labels:
      zh: StopCondition positive
      en: StopCondition positive
      ja: StopCondition positive
    descriptions:
      zh: Prefect 数据流编排映射 StopCondition：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps StopCondition: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect StopCondition: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {expression: "turn_count>=5", match_value: halt}

    related_node_ids:
      - StopCondition
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-001

  - id: stop-semantic-router-no-match
    labels:
      zh: StopCondition positive
      en: StopCondition positive
      ja: StopCondition positive
    descriptions:
      zh: Temporal 持久化工作流映射 StopCondition：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps StopCondition: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal StopCondition: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {match_value: stop, default_action: END}

    related_node_ids:
      - StopCondition
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-001

  - id: stop-autogen-max-round
    labels:
      zh: StopCondition positive
      en: StopCondition positive
      ja: StopCondition positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 StopCondition 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for StopCondition via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が StopCondition 多段推論を誘発；GSM8K 精度向上。
    field_values: {expression: "round>=12", match_value: terminate}

    related_node_ids:
      - StopCondition
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-stop-condition-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-stop-condition-001
    source: langgraph-graph-api
    supports: StopCondition core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-stop-condition-002
    source: opa-policy-language
    supports: StopCondition boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-stop-condition-003
    source: langgraph-graph-api
    supports: StopCondition field or status vocabulary is a Moonweave audit projection informed by LangGraph Graph API.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
