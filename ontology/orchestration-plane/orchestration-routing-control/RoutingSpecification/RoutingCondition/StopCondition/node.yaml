schema: moonweave.ai/ontology-node/v1
id: StopCondition
kind: concept
status: review
labels:
  zh: 停止条件
  en: stop condition
  ja: stop condition
semantics:
  short_definition:
    zh: 声明路由决定何时应选择停止目标的终止判定规范。
    en: A termination predicate specifying when a routing decision should select a stop target.
    ja: routing decision が stop target を選ぶ時点を宣言する termination predicate。
  definition:
    zh: 停止条件是 RoutingCondition 的子类，以停止条件标识、终止类别、表达式、所需证据和停止原因为身份，描述成功、失败、取消、预算耗尽、超时或最大轮次等停止标准。它不会自行终止 RuntimeSession；RoutingDecision 对它求值、记录满足事实并选择相应 RoutingTarget，随后运行时执行终止。
    en: A StopCondition is a RoutingCondition identified by stop-condition ID, termination category, expression, required evidence, and stop reason, covering success, failure, cancellation, budget exhaustion, timeout, or maximum rounds. It does not terminate RuntimeSession itself; RoutingDecision evaluates it, records satisfaction, and selects the corresponding RoutingTarget before runtime performs termination.
    ja: StopCondition は stop ID・termination category・expression・required evidence・reason で識別し success/failure/cancel/budget/timeout/max-round を規定します。自ら RuntimeSession を terminate せず RoutingDecision が evaluate/satisfy を記録し stop target を選び、runtime が終了を実行します。
  why_needed:
    zh: 条件不是行动主体；将“满足停止条件”与“执行终止”分开，才能保留谁、何时、基于何证据做出停止决定。
    en: A condition is not an acting subject; separating satisfaction from termination preserves who decided, when, and from what evidence.
    ja: condition は actor ではなく satisfaction と termination を分け、who/when/evidence を保持します。
  includes:
    - zh: 任务成功、不可恢复失败、用户取消、预算耗尽、时限到达和最大轮次的可复用停止标准。
      en: Reusable stop criteria for task success, unrecoverable failure, user cancellation, budget exhaustion, deadline, and maximum rounds.
      ja: task success・unrecoverable failure・user cancel・budget exhaustion・deadline・max rounds の reusable stop criteria。
  excludes:
    - zh: RuntimeSession 的终止事件、停止按钮、一次取消请求和没有证据约束的自然语言愿望。
      en: RuntimeSession termination event, stop button, one cancellation request, and unconstrained natural-language wish.
      ja: RuntimeSession termination event・stop button・cancellation request・unconstrained natural-language wish。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: termination_category
      labels:
        zh: 终止类别
        en: termination category
        ja: termination category
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明成功、失败、取消、超时、预算或轮次上限。
        en: Declares success, failure, cancellation, timeout, budget, or round limit.
        ja: success・failure・cancel・timeout・budget・round-limit を宣言します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-stop-condition-001
    - id: required_evidence_refs
      labels:
        zh: 所需证据引用
        en: required-evidence references
        ja: required-evidence references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用判断停止所需的结果、预算或用户请求类型。
        en: References result, budget, or user-request types needed to judge stopping.
        ja: stop 判定に必要な result/budget/user-request type を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - task-result
        - acceptance-check
      source_claims:
        - claim-stop-condition-001
        - claim-stop-condition-003
    - id: stop_reason_code
      labels:
        zh: 停止原因代码
        en: stop-reason code
        ja: stop-reason code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给满足该条件的决定提供受控原因代码。
        en: Provides a controlled reason code when the condition is satisfied.
        ja: condition satisfied 時の controlled reason code を提供します。
      allowed_values: []
      pattern: null
      example_value: goal-satisfied
      source_claims:
        - claim-stop-condition-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: StopCondition-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 目标验收通过后停止
      en: Stop after goal acceptance
      ja: stop after goal acceptance
    scenario_id: null
    descriptions:
      zh: stop-success@6 要求 task-result=complete 且 acceptance-check=pass，并把停止原因规范为 goal-satisfied；它不含实际会话 ID 或终止时间。
      en: stop-success@6 requires task-result=complete and acceptance-check=pass and maps the reason to goal-satisfied; it contains no actual session ID or termination time.
      ja: stop-success@6 は task-result=complete/acceptance=pass と reason=goal-satisfied を規定し actual session ID/termination time は持ちません。
    field_values:
      routing_specification_id: stop-condition-success
      version: "6"
      eligible_target_types:
        - stop
      valid_from: 2026-07-16T00:00:00Z
      expression_language: cel@1
      expression: evidence.task_result.status == 'complete' && evidence.acceptance_check.outcome == 'pass'
      input_schema_ref: termination-evidence@6
      result_type: boolean
      termination_category: success
      required_evidence_refs:
        - task-result
        - acceptance-check
      stop_reason_code: goal-satisfied
    related_node_ids:
      - StopCondition
      - RoutingDecision
      - RoutingTarget
    related_relation_ids:
      - RoutingDecision-satisfies-StopCondition
      - RoutingDecision-selects-RoutingTarget
    expected_result:
      zh: 建立停止规范，由决定记录满足并选择停止目标。
      en: Create a stop specification; let a decision record satisfaction and select a stop target.
      ja: stop specification を作り decision が satisfaction/stop target selection を記録します。
    why_valid_or_invalid:
      zh: 条件描述证据要求，没有把规范写成终止执行者。
      en: The condition describes evidence requirements without becoming the termination executor.
      ja: evidence requirement を記述し termination executor を装いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-stop-condition-001
      - claim-stop-condition-003
  - id: StopCondition-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 会话在 04:30 结束
      en: Session ended at 04:30
      ja: session ended at 04:30
    scenario_id: routing-review-stopcondition-boundary
    descriptions:
      zh: runtime-session-7 在 04:30 以 goal-satisfied 结束并释放资源；这是运行时状态变化，不是停止条件。
      en: runtime-session-7 ends at 04:30 with goal-satisfied and releases resources; this is a runtime state transition, not a stop condition.
      ja: runtime-session-7 が 04:30 goal-satisfied で終了し resource release するのは runtime transition で stop condition ではありません。
    field_values: {}
    related_node_ids:
      - RuntimeSession
      - StopCondition
    related_relation_ids: []
    expected_result:
      zh: 归运行时终止事实，并引用导致决定的 StopCondition。
      en: Keep it as a runtime termination fact and reference the StopCondition behind the decision.
      ja: runtime termination fact とし decision の StopCondition を参照します。
    why_valid_or_invalid:
      zh: 终止发生由会话和时间识别，停止规范由表达式版本识别。
      en: Termination occurrence is identified by session and time; stop specification by expression revision.
      ja: termination occurrence は session/time、specification は expression revision で識別します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-stop-condition-001
      - claim-stop-condition-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: BranchCondition
    shared_parent_concept_id: RoutingCondition
    differentia:
      zh: StopCondition 判断是否结束控制流；BranchCondition 判断在继续运行时哪些路径可选。
      en: StopCondition judges whether control flow should end; BranchCondition judges which paths are eligible while execution continues.
      ja: StopCondition は control flow end、BranchCondition は continuing execution の eligible path を判定します。
    source_claims:
      - claim-stop-condition-001
      - claim-stop-condition-002
parent_relation:
  id: StopCondition-is_a-RoutingCondition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StopCondition 是一种 RoutingCondition；其种差是规定何时应选择停止目标，而不是自行终止运行。
    en: A StopCondition is a RoutingCondition distinguished by specifying when a stop target should be selected rather than terminating runtime itself.
    ja: StopCondition は stop target を選ぶ時点を規定し runtime 自体を terminate しない RoutingCondition subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
