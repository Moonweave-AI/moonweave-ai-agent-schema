source_claims:
  - id: claim-stop-condition-001
    source: eng-fw-autogen-agentchat
    supports: AutoGen SelectorGroupChat selects a next participant from described candidates using current conversation context and stops when an explicit termination condition is satisfied. Moonweave uses this as evidence for typed routing targets, selection decisions, and separately evaluated stop conditions.
    locator: AutoGen AgentChat documentation, Selector Group Chat workflow and Termination Conditions
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-stop-condition-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API distinguishes workflow state, executable nodes, static edges, conditional routing functions, termination targets, and Command values that combine state updates with a selected destination. Moonweave uses this to separate reusable routing specifications and targets from one RoutingDecision occurrence.
    locator: LangGraph Graph API documentation, Graphs, Edges, Conditional edges, and Command sections
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-stop-condition-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes plans and other Entities from time-bounded Activities that use or generate Entities. Moonweave therefore treats routing policy and conditions as reusable specifications, RoutingDecision as an occurrence, and GateOutcome as information produced by gate evaluation.
    locator: W3C PROV-O Recommendation Sections 3.1 and 3.2, Entity, Activity, generation, and Plan
    evidence_kind: design-inference
    confidence: high
    review_status: pending
