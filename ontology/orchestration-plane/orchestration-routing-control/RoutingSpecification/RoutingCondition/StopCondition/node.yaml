        ja: StopCondition → RoutingCondition を assert します。
      why_valid_or_invalid:
        zh: 该对象以证据和表达式版本形成可复用的终止判定规范。
        en: It is a reusable termination predicate.
        ja: reusable termination predicate です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
