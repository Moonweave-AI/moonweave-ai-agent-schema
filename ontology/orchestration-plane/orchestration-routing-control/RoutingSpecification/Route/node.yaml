schema: moonweave.ai/ontology-node/v1
id: Route
kind: concept
labels:
  zh: 路由路径
  en: route
  ja: ルート
semantics:
  short_definition:
    zh: 从一个控制位置指向一个类型化目标的静态路由规范。
    en: A static routing specification from one control location to one typed target.
    ja: one control location から typed target へ指す static routing specification です。
  definition:
    zh: Route 是 RoutingSpecification 的子类，种差为声明 source_control_ref、target_ref、可选 condition_refs 与 transfer_contract 的静态边。LangGraph add_edge(source, target) 与 conditional_edges 映射中的单条 source→target 路径对应 Route；它规定“可以去哪里”，RoutingDecision 记录一次运行“实际选择了哪里”。Send(node, state) 的动态派发可引用多条 Route 候选。
    en: A Route is a RoutingSpecification distinguished by a static edge declaring source_control_ref, target_ref, optional condition_refs, and transfer_contract. A single source→target path in LangGraph add_edge(source, target) and conditional_edges maps corresponds to Route; it states where control may go while RoutingDecision records where one run actually went. Dynamic Send(node, state) dispatch may reference multiple Route candidates.
    ja: Route は source control location→typed RoutingTarget の static edge という differentia を持つ subtype です。LangGraph edge/conditional_edges の単一 path が Route に対応します。
  why_needed:
    zh: 把静态路径与动态选择分开，可避免 compiled graph 边被误读为已经发生的路由。
    en: Separating static path from dynamic selection prevents compiled graph edges from being misread as occurred routing.
    ja: static path と dynamic selection を分け graph edge を occurred routing と誤読しません。
  includes:
    - zh: 工作流节点、分支、工具、协议适配器或停止目标之间的可选控制边。
      en: Eligible control edges among workflow nodes, branches, tools, protocol adapters, or stop targets.
      ja: workflow node・branch・tool・protocol adapter・stop target 間 eligible control edge。
  excludes:
    - zh: 一次选择事件、网络 Route、文件路径和没有类型化目标的视觉连线。
      en: One selection event, a network Route, a filesystem path, and visual connectors without typed targets.
      ja: selection event・network Route・filesystem path・typed target のない visual connector。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph builder.add_edge("classify", "billing_handler") 创建 Route；conditional_edges 的 path map {"billing":"billing_handler","END":END} 中每条命名映射也是 Route。Command(goto="billing_handler") 与 Send("worker", payload) 是运行时选择证据，不是 Route 本身。transfer_contract 应对齐 LangGraph Send/Command 的状态投影。
    en: LangGraph builder.add_edge("classify", "billing_handler") creates a Route; each named mapping in conditional_edges path maps is also a Route. Command(goto="billing_handler") and Send("worker", payload) are runtime selection evidence, not Route itself. transfer_contract should align with LangGraph Send/Command state projection.
    ja: LangGraph add_edge/conditional_edges path map の各 mapping が Route です。Command/Send は runtime selection 証拠です。
  typical_input:
    - description: LangGraph static and conditional edge declaration.
      format: |
        builder.add_edge("classify", "billing_handler")
        builder.add_conditional_edges(
            "classify",
            route_by_category,
            {"billing": "billing_handler", "technical": "technical_handler", END: END},
        )
      source_claims: [claim-route-langgraph]
  typical_output:
    - description: Versioned Route specification.
      format: |
        {
          "routing_specification_id": "route-billing",
          "version": "1",
          "source_control_ref": "classify-request",
          "target_ref": "target-billing-worker",
          "condition_refs": ["condition-billing-intent"]
        }
      source_claims: [claim-route-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: add_edge, conditional_edges, Send, Command goto as routes.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff paths as static routes between agents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent routes via tasks/send targets.
structure:
  identity_keys: []
  fields:
    - id: source_control_ref
      labels:
        zh: 来源控制位置
        en: source-control reference
        ja: source-control reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用路径开始的 LangGraph 节点或控制点。
        en: References the LangGraph node or control point where the route begins.
        ja: route start node/control point を参照します。
      allowed_values: []
      pattern: null
      example_value: classify-request
      source_claims:
        - claim-route-langgraph
    - id: target_ref
      labels:
        zh: 目标引用
        en: target reference
        ja: target reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该路径允许到达的 RoutingTarget。
        en: References the RoutingTarget reachable through this route.
        ja: route で reachable な RoutingTarget を参照します。
      allowed_values: []
      pattern: null
      example_value: target-billing-worker
      source_claims:
        - claim-route-langgraph
    - id: condition_refs
      labels:
        zh: 条件引用
        en: condition references
        ja: condition references
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用启用该路径所需的 RoutingCondition。
        en: References RoutingCondition records required to enable the route.
        ja: route enable に必要な RoutingCondition を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - condition-billing-intent
      source_claims:
        - claim-route-langgraph
    - id: transfer_contract
      labels:
        zh: 传递契约
        en: transfer contract
        ja: 引き渡し契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定该路径交给目标的载荷模式、状态投影、交付方式与接受证据引用。
        en: Fixes payload schema, source-state projection, delivery mode, and acceptance evidence for the edge.
        ja: payload schema/state projection/delivery mode/acceptance evidence を固定します。
      allowed_values: []
      pattern: null
      example_value:
        payload_schema_ref: support-ticket-v3
        state_projection:
          - ticket_id
          - customer_id
          - intent
          - summary
        delivery_mode: state-projection
        acceptance_evidence_ref: billing-worker-input-validation
      source_claims:
        - claim-route-langgraph
  constraints: []
  required_relation_constraints: []
examples:
  - id: Route-example-langgraph-static-edge
    labels:
      zh: LangGraph 静态边
      en: LangGraph static edge
      ja: LangGraph static edge
    descriptions:
      zh: route-billing 从 classify-request 指向 target-billing-worker，对应 add_edge("classify", "billing_handler")。
      en: route-billing points from classify-request to target-billing-worker, matching add_edge("classify", "billing_handler").
      ja: route-billing は add_edge("classify","billing_handler") に対応します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: add_edge
    field_values:
      routing_specification_id: route-billing
      version: "1"
      eligible_target_types:
        - worker
      valid_from: 2026-07-16T00:00:00Z
      source_control_ref: classify-request
      target_ref: target-billing-worker
      condition_refs:
        - condition-billing-intent
      transfer_contract:
        payload_schema_ref: support-ticket-v3
        state_projection:
          - ticket_id
          - customer_id
          - intent
          - summary
        delivery_mode: state-projection
        acceptance_evidence_ref: billing-worker-input-validation
    related_node_ids:
      - Route
      - RoutingTarget
    related_relation_ids:
      - Route-points_to-RoutingTarget
    source_claims:
      - claim-route-langgraph
  - id: Route-example-langgraph-conditional-map
    labels:
      zh: LangGraph 条件边映射
      en: LangGraph conditional edge mapping
      ja: LangGraph conditional edge mapping
    descriptions:
      zh: route-technical 是 conditional_edges path map 中 technical→technical_handler 条目，启用 condition-technical-intent。
      en: route-technical is the technical→technical_handler entry in a conditional_edges path map, enabled by condition-technical-intent.
      ja: route-technical は conditional_edges path map の technical 条目です。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges path map
    field_values:
      routing_specification_id: route-technical
      version: "1"
      source_control_ref: classify-request
      target_ref: target-technical-worker
      condition_refs:
        - condition-technical-intent
    related_node_ids:
      - Route
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-route-langgraph
  - id: Route-example-openai-handoff
    labels:
      zh: OpenAI handoff 静态路径
      en: OpenAI handoff static route
      ja: OpenAI handoff static route
    descriptions:
      zh: route-triage-to-billing 从 triage_agent 指向 target-billing-agent，对应 transfer_to_billing_agent handoff 配置。
      en: route-triage-to-billing goes from triage_agent to target-billing-agent, matching transfer_to_billing_agent handoff configuration.
      ja: route-triage-to-billing は transfer_to_billing_agent handoff 設定に対応します。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values:
      routing_specification_id: route-triage-to-billing
      version: "1"
      source_control_ref: triage_agent
      target_ref: target-billing-agent
    related_node_ids:
      - Route
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-route-openai
  - id: Route-example-boundary-decision
    labels:
      zh: 已选路径不是 Route 定义
      en: Selected path is not Route definition
      ja: selected path は Route 定義ではない
    descriptions:
      zh: decision-884 在 04:20 选择 route-billing；该记录是 RoutingDecision，不是新的 Route 类型。
      en: decision-884 selects route-billing at 04:20; that record is RoutingDecision, not a new Route type.
      ja: decision-884 の selection は RoutingDecision です。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: route versus decision
    field_values: {}
    related_node_ids:
      - Route
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-route-design
parent_relation:
  id: Route-is_a-RoutingSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Route 是一种 RoutingSpecification；其种差是声明从控制位置到类型化 RoutingTarget 的静态可用路径。
    en: A Route is a RoutingSpecification distinguished by declaring a static eligible path from a control location to a typed RoutingTarget.
    ja: Route は control location から typed RoutingTarget への static eligible path を宣言する subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Route-is_a-RoutingSpecification-example-positive
      kind: positive
      labels:
        zh: 账单分支路径
        en: Billing branch route
        ja: billing branch route
      descriptions:
        zh: route-billing 声明 classify-request 到 billing-worker 的可用控制边。
        en: route-billing declares an eligible control edge from classify-request to billing-worker.
        ja: route-billing は eligible edge を宣言します。
      field_values: {}
      related_node_ids:
        - Route
        - RoutingSpecification
      related_relation_ids:
        - Route-is_a-RoutingSpecification
      source_claims:
        - claim-route-design
  source_claims:
    - claim-route-design
  endpoint_order: child-to-parent
relations:
  - id: Route-points_to-RoutingTarget
    predicate: points_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 指向
      en: points to
      ja: 指し示す
    definitions:
      zh: Route 的 target_ref 解析为类型与能力约束一致的 RoutingTarget；声明可到达性，不声明运行时已选择。
      en: A Route's target_ref resolves to a RoutingTarget whose type and capability constraints agree; declares eligibility, not runtime selection.
      ja: Route target ref は type/capability constraint が一致する RoutingTarget に resolve し eligibility を宣言します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: is_target_of
      labels:
        zh: 是其目标
        en: is target of
        ja: の target である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Route-points_to-RoutingTarget-example-positive
        kind: positive
        labels:
          zh: 账单路径指向 worker 目标
          en: Billing route points to worker target
          ja: billing route points to worker target
        descriptions:
          zh: route-billing.target_ref 解析为 target-billing-worker，类型 worker。
          en: route-billing.target_ref resolves to target-billing-worker of type worker.
          ja: route-billing.target_ref は worker type target に resolve します。
        field_values: {}
        related_node_ids:
          - Route
          - RoutingTarget
        related_relation_ids:
          - Route-points_to-RoutingTarget
        source_claims:
          - claim-route-langgraph
    target: concept:RoutingTarget
sources:
  - id: langgraph-route
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Edges, conditional_edges, Send, Command as static routes.
  - id: openai-route
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: Handoff paths between agents.
  - id: route-design
    title: Moonweave routing and gates design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Route as static RoutingSpecification edge.
source_claims:
  - id: claim-route-langgraph
    source: langgraph-route
    supports: LangGraph edges and conditional_edges path maps declare static source-to-target routes distinct from one routing occurrence.
    locator: Graph API — Edges, Conditional edges, Send, Command
    evidence_kind: official
    confidence: high
  - id: claim-route-openai
    source: openai-route
    supports: OpenAI handoff configuration declares static agent-to-agent routes.
    locator: Handoffs — agent transfer configuration
    evidence_kind: official
    confidence: high
  - id: claim-route-design
    source: route-design
    supports: Moonweave Route is reusable static path specification separate from RoutingDecision.
    locator: Route concept boundary
    evidence_kind: design-inference
    confidence: high
