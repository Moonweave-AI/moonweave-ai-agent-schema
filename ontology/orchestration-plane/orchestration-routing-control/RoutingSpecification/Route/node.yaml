schema: moonweave.ai/ontology-node/v1
id: Route
kind: concept
labels:
  zh: 路由路径
  en: route
  ja: route
semantics:
  short_definition:
    zh: 从一个控制位置指向一个类型化目标的静态路由规范。
    en: A static routing specification from one control location to one typed target.
    ja: one control location から typed target へ指す static routing specification。
  definition:
    zh: 路由路径是 RoutingSpecification 的子类，其种差是声明来源控制位置、目标引用、可选条件和传递契约的静态边；它规定“可以去哪里”，而 RoutingDecision 记录一次运行“实际选择了哪里”。
    en: A Route is a RoutingSpecification distinguished by a static edge declaring source control location, target reference, optional conditions, and transfer contract. It states where control may go, while RoutingDecision records where one run actually went.
    ja: Route は source control location・target ref・optional condition・transfer contract を宣言する static edge という differentia を持つ RoutingSpecification subtype です。possible destination と actual selected destination を区別します。
  why_needed:
    zh: 把静态路径与动态选择分开，可避免图上的连线被误读为已经发生的路由。
    en: Separating static path from dynamic selection prevents a diagram edge from being misread as an occurred route.
    ja: static path と dynamic selection を分け diagram edge を occurred routing と誤読しません。
  includes:
    - zh: 工作流节点、分支、工具、协议适配器或停止目标之间的可选控制边。
      en: Eligible control edges among workflow nodes, branches, tools, protocol adapters, or stop targets.
      ja: workflow node・branch・tool・protocol adapter・stop target 間の eligible control edge。
  excludes:
    - zh: 一次选择事件、网络 Route、文件路径和没有类型化目标的视觉连线。
      en: One selection event, a network Route, a filesystem path, and a visual connector without a typed target.
      ja: selection event・network Route・filesystem path・typed target のない visual connector。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      Route 编译为 LangGraph add_edge 或 conditional_edges 映射表项：source_control_ref 与 target_ref 定义
      静态可选边。RoutingDecision 记录一次运行沿哪条 Route 前进；Send 动态派发不替代 Route 规范。OPA 可将
      Route 表达为 allow 规则的目标集合成员。
    en: >-
      Route compiles to LangGraph add_edge or conditional_edges map entries: source_control_ref and target_ref define static
      eligible edges. RoutingDecision records which Route a run traversed; Send dynamic dispatch does not replace Route
      specification. OPA may express Route as membership in an allowed target set.
    ja: >-
      Route は LangGraph add_edge または conditional_edges map entry にコンパイルされる。source_control_ref と target_ref
      が static eligible edge を定義する。RoutingDecision は run がどの Route を通ったかを記録する。Send dynamic dispatch は
      Route specification を置き換えない。OPA では Route を allowed target set の member として表せる。
  typical_input:
    - description:
        zh: 从控制位置到类型化目标的静态路由边声明。
        en: A static routing edge declaration from a control location to a typed target.
        ja: control location から typed target への static routing edge declaration。
      format: |-
        {"route_id":"route:sign-to-approve","routing_spec_ref":"rs:release-routing@3","source_control_ref":"cp:post-sign","target_ref":"target:node:approve","transfer_contract":{"state_keys":["signature_valid"]}}
  typical_output:
    - description:
        zh: 图编译器注册的边绑定，不含该边是否已被遍历。
        en: An edge binding registered by a graph compiler, without evidence the edge was traversed.
        ja: graph compiler が登録した edge binding。edge が traverse された evidence は含まない。
      format: |-
        {"route_ref":"route:sign-to-approve","compiled_edge":{"from":"sign","to":"approve","adapter":"langgraph"},"eligible":true}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents add_edge and conditional edge maps for static route declarations.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents allowed-target sets analogous to static route eligibility.
    - name: LangGraph Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents dynamic dispatch distinct from static Route specifications.
  source_claims:
    - claim-route-001
    - claim-route-002
structure:
  identity_keys: []
  fields:
    - id: source_control_ref
      labels:
        zh: 来源控制位置
        en: source-control reference
        ja: source-control reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用路径开始的节点或控制点。
        en: References the node or control point where the route begins.
        ja: route start node/control point を参照します。
      allowed_values: []
      pattern: null
      example_value: classify-request
      source_claims:
        - claim-route-001
    - id: target_ref
      labels:
        zh: 目标引用
        en: target reference
        ja: target reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该路径允许到达的 RoutingTarget。
        en: References the RoutingTarget reachable through this route.
        ja: route で reachable な RoutingTarget を参照します。
      allowed_values: []
      pattern: null
      example_value: target-billing-worker
      source_claims:
        - claim-route-001
    - id: condition_refs
      labels:
        zh: 条件引用
        en: condition references
        ja: condition references
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用启用该路径所需的 RoutingCondition。
        en: References RoutingCondition records required to enable the route.
        ja: route enable に必要な RoutingCondition を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - condition-billing-intent
      source_claims:
        - claim-route-001
    - id: transfer_contract
      labels:
        zh: 传递契约
        en: transfer contract
        ja: 引き渡し契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定该路径交给目标的载荷模式、来源状态投影、交付方式和目标接受证据引用；四项共同界定边上实际允许传递的内容。
        en: Fixes the payload schema, source-state projection, delivery mode, and target-acceptance evidence reference; together these four parts define what the edge may transfer.
        ja: この経路が対象へ渡す payload schema、元状態の projection、delivery mode、対象の受入証拠参照を固定し、辺で受け渡せる内容を四項目で定めます。
      allowed_values: []
      pattern: null
      example_value:
        payload_schema_ref: support-ticket-v3
        state_projection:
          - ticket_id
          - customer_id
          - intent
          - summary
        delivery_mode: state-projection
        acceptance_evidence_ref: billing-worker-input-validation
      source_claims:
        - claim-route-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: route-langgraph-path-map-billing
    labels:
      zh: Route positive
      en: Route positive
      ja: Route positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 Route 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as Route router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が Route から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {routing_specification_id: route-billing, target_ref: target-billing-worker, transfer_contract: {payload_schema_ref: support-ticket-v3}

    related_node_ids:
      - Route
      - BranchCondition
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-route-001

  - id: route-semantic-router-billing-primary
    labels:
      zh: Route positive
      en: Route positive
      ja: Route positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 Route 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to Route: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) Route で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {routing_specification_id: route-billing-primary, score_threshold: 0.82}

    related_node_ids:
      - Route
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-route-001

  - id: route-crewai-task-routing
    labels:
      zh: Route positive
      en: Route positive
      ja: Route positive
    descriptions:
      zh: Prefect 数据流编排映射 Route：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps Route: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect Route: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {source_control_ref: research_complete, target_ref: analysis_task, delivery_mode: task-output-projection}

    related_node_ids:
      - Route
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-route-003

  - id: route-autogen-groupchat-speaker
    labels:
      zh: Route positive
      en: Route positive
      ja: Route positive
    descriptions:
      zh: ReAct (Yao et al., 2023) 在 Route 场景实现 Thought→Action→Observation 交替循环：agent 输出 Thought（推理当前应做什么），执行 Action（如 Search["query"] 或 Lookup["term"]），获得 Observation（环境反馈），再生成下一个 Thought。HotpotQA 上 ReAct 通过多步推理+搜索达到比 CoT 更高准确率；LangChain create_react_agent() 直接实现此模式。
      en: ReAct (Yao et al., 2023) implements Thought→Action→Observation loops for Route: agent outputs Thought (reasoning), executes Action (e.g. Search["query"]), receives Observation (feedback), then next Thought. On HotpotQA ReAct beats CoT via multi-step reasoning+search; LangChain create_react_agent() implements this pattern.
      ja: ReAct (Yao et al., 2023) が Route で Thought→Action→Observation ループ：Thought 推論→Action Search["query"]→Observation→次 Thought。HotpotQA で CoT 超え；create_react_agent() 実装。
    field_values: {routing_specification_id: route-next-speaker, target_ref: coder_agent}

    related_node_ids:
      - Route
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-route-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-route-001
    source: langgraph-graph-api
    supports: Route core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-route-002
    source: opa-policy-language
    supports: Route boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-route-003
    source: langgraph-graph-api
    supports: Route field or status vocabulary is a Moonweave audit projection informed by LangGraph Graph API.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
