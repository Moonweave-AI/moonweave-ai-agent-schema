      kind: positive
      labels:
        zh: API 有界重试策略
        en: Bounded API retry policy
        ja: bounded API retry policy
      descriptions:
        zh: retry-api@2 声明三次尝试、指数退避和 timeout/5xx 可重试。
        en: retry-api@2 declares three attempts, exponential backoff, and timeout/5xx eligibility.
        ja: retry-api@2 は 3 attempts/exponential backoff/timeout/5xx を宣言します。
      field_values: {}
      related_node_ids:
        - RetryPolicy
        - RoutingSpecification
      related_relation_ids:
        - RetryPolicy-is_a-RoutingSpecification
      source_claims:
        - claim-retry-policy-design
  source_claims:
    - claim-retry-policy-design
