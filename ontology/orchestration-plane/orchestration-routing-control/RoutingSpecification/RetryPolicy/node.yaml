schema: moonweave.ai/ontology-node/v1
id: RetryPolicy
kind: concept
labels:
  zh: 重试策略
  en: retry policy
  ja: retry policy
semantics:
  short_definition:
    zh: 规定哪些失败可重试、次数、退避、超时与耗尽行为的路由规范。
    en: A routing specification declaring retryable failures, attempts, backoff, timeouts, and exhaustion behavior.
    ja: retryable failure・attempt・backoff・timeout・exhaustion behavior を宣言する routing specification。
  definition:
    zh: 重试策略是 RoutingSpecification 的子类，其种差是为失败后的控制流规定最大尝试数、初始等待、退避因子、最大等待、抖动、可重试错误和耗尽目标。RoutingDecision 应用策略决定 retry 或 stop，而 RetryActivity 执行实际重试。
    en: A RetryPolicy is a RoutingSpecification distinguished by maximum attempts, initial delay, backoff factor, maximum delay, jitter, retryable failures, and exhaustion target after failure. RoutingDecision applies the policy to choose retry or stop, while RetryActivity performs the actual retry.
    ja: RetryPolicy は max attempts・initial delay・backoff・max delay・jitter・retryable failure・exhaustion target を持つ subtype です。RoutingDecision が retry/stop を選び RetryActivity が actual retry を実行します。
  why_needed:
    zh: 把重试边界从重试活动和决定中拆出，可防止无限循环并准确解释剩余次数。
    en: Separating retry bounds from retry activity and decision prevents infinite loops and explains remaining attempts precisely.
    ja: retry bound を activity/decision と分け infinite loop を防ぎ remaining attempts を説明します。
  includes:
    - zh: 节点失败、超时、临时网络错误或限流后的有界重试规则。
      en: Bounded retry rules after node failure, timeout, transient network error, or rate limiting.
      ja: node failure・timeout・transient network error・rate limit 後の bounded retry rule。
  excludes:
    - zh: 一次 RetryActivity、实际 RunAttempt、恢复动作和没有次数上限的“再试一次”文本。
      en: One RetryActivity, an actual RunAttempt, a recovery action, and an unbounded “try again” text.
      ja: RetryActivity・actual RunAttempt・recovery action・unbounded try-again text。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      RetryPolicy 嵌入 LangGraph 路由或 OPA 策略：RoutingDecision 在失败时比较 attempt_count 与 max_attempts，
      计算 backoff 后选择 retry 目标或 StopCondition 的 stop endpoint。实际重试由 RetryActivity/RunAttempt 执行；
      策略本身不记录 attempt_count。
    en: >-
      RetryPolicy embeds in LangGraph routing or OPA policy: RoutingDecision compares attempt_count to max_attempts on
      failure, computes backoff, then selects a retry target or StopCondition stop endpoint. Actual retries run via
      RetryActivity/RunAttempt; the policy does not store attempt_count.
    ja: >-
      RetryPolicy は LangGraph routing または OPA policy に embed される。failure 時 RoutingDecision は attempt_count と
      max_attempts を比較し backoff を計算して retry target または StopCondition stop endpoint を選ぶ。actual retry は
      RetryActivity/RunAttempt が実行し policy は attempt_count を保持しない。
  typical_input:
    - description:
        zh: 声明重试边界与耗尽行为的重试策略规约。
        en: A retry policy specification declaring retry bounds and exhaustion behavior.
        ja: retry bound と exhaustion behavior を宣言する retry policy specification。
      format: |-
        {"policy_id":"policy:retry-transient@1","routing_spec_ref":"rs:release-routing@3","max_attempts":3,"initial_delay_ms":500,"backoff_factor":2,"retryable_errors":["timeout","rate_limited"],"exhaustion_target_ref":"target:stop:failed"}
  typical_output:
    - description:
        zh: RoutingDecision 在失败上下文中的 retry/stop 选择结果。
        en: A retry/stop selection from RoutingDecision in a failure context.
        ja: failure context における RoutingDecision の retry/stop selection。
      format: |-
        {"routing_decision_id":"rd-887","applied_retry_policy_ref":"policy:retry-transient@1","decision":"retry","next_attempt_at":"2026-07-16T09:12:10Z","attempt_count":2,"selected_target_ref":"target:node:reconcile"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing on failure state including retry target selection.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents bounded retry rules as declarative policy specifications.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph execution separate from retry policy revision storage.
  source_claims:
    - claim-retry-policy-001
    - claim-retry-policy-002
structure:
  identity_keys: []
  fields:
    - id: max_attempts
      labels:
        zh: 最大尝试数
        en: maximum attempts
        ja: maximum attempts
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 包括首次尝试在内的总上限。
        en: Total attempt limit including the first attempt.
        ja: first attempt を含む total limit。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-retry-policy-001
    - id: initial_interval_seconds
      labels:
        zh: 初始等待秒数
        en: initial interval seconds
        ja: initial interval seconds
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 首次重试前的等待时间。
        en: Delay before the first retry.
        ja: first retry 前 delay。
      allowed_values: []
      pattern: null
      example_value: 0.5
      source_claims:
        - claim-retry-policy-001
    - id: backoff_factor
      labels:
        zh: 退避因子
        en: backoff factor
        ja: backoff factor
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 后续等待时间的乘数。
        en: Multiplier for subsequent retry intervals.
        ja: subsequent retry interval multiplier。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-retry-policy-001
    - id: max_interval_seconds
      labels:
        zh: 最大重试间隔（秒）
        en: maximum retry interval seconds
        ja: 最大再試行間隔（秒）
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制任意两次相邻尝试之间的退避等待上限；计算出的间隔超过该值时取此上限。
        en: Caps the computed delay between adjacent attempts; any backoff interval above this value is reduced to this many seconds.
        ja: 隣接する試行間の計算済み待機時間の上限であり、退避間隔がこの値を超える場合はこの秒数に切り詰めます。
      allowed_values: []
      pattern: null
      example_value: 8
      source_claims:
        - claim-retry-policy-003
    - id: jitter_enabled
      labels:
        zh: 随机抖动开关
        en: jitter enabled
        ja: ジッター有効
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指示是否在每个计算出的重试等待间隔上加入随机变化，以避免多个失败任务同步再次发起请求。
        en: Indicates whether random variation is added to each computed retry interval so concurrently failing work does not retry in lockstep.
        ja: 計算された各再試行間隔にランダムな変動を加え、同時に失敗した処理が一斉に再試行することを避けるかを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-retry-policy-004
    - id: retry_on
      labels:
        zh: 可重试条件
        en: retry-on conditions
        ja: retry-on conditions
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出允许重试的错误、状态或谓词。
        en: Lists errors, states, or predicates eligible for retry.
        ja: retry eligible error・state・predicate。
      allowed_values: []
      pattern: null
      example_value:
        - timeout
        - http-5xx
      source_claims:
        - claim-retry-policy-001
    - id: exhaustion_target_ref
      labels:
        zh: 耗尽目标引用
        en: exhaustion target reference
        ja: 再試行枯渇時の遷移先参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用策略不再允许继续尝试时必须转入的唯一恢复或升级路径，包括达到尝试上限后的去向。
        en: References the single recovery or escalation route required when the policy permits no further attempt, including after the attempt limit is reached.
        ja: 試行上限への到達を含め、方針が追加試行を許可しないときに必ず移る単一の回復またはエスカレーション経路を参照します。
      allowed_values: []
      pattern: null
      example_value: route-human-review
      source_claims:
        - claim-retry-policy-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: retry-langgraph-attempts-router
    labels:
      zh: RetryPolicy positive
      en: RetryPolicy positive
      ja: RetryPolicy positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 RetryPolicy 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for RetryPolicy: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) RetryPolicy: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {routing_specification_id: policy-retry-transient, max_attempts: 3, backoff_seconds: [1}

    related_node_ids:
      - RetryPolicy
      - StopCondition
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-001

  - id: retry-temporal-workflow
    labels:
      zh: RetryPolicy positive
      en: RetryPolicy positive
      ja: RetryPolicy positive
    descriptions:
      zh: Prefect 数据流编排映射 RetryPolicy：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps RetryPolicy: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect RetryPolicy: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {routing_specification_id: policy-temporal-agent, max_attempts: 5, backoff_coefficient: 2.0}

    related_node_ids:
      - RetryPolicy
      - Route
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-001

  - id: retry-openai-responses
    labels:
      zh: RetryPolicy positive
      en: RetryPolicy positive
      ja: RetryPolicy positive
    descriptions:
      zh: Temporal 持久化工作流映射 RetryPolicy：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps RetryPolicy: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal RetryPolicy: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {max_attempts: 2, backoff_seconds: [0.5}

    related_node_ids:
      - RetryPolicy
      - StopCondition
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-001

  - id: retry-crewai-task-retry
    labels:
      zh: RetryPolicy positive
      en: RetryPolicy positive
      ja: RetryPolicy positive
    descriptions:
      zh: CrewAI 映射 RetryPolicy：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps RetryPolicy: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI RetryPolicy: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {routing_specification_id: policy-crew-task, max_attempts: 3}

    related_node_ids:
      - RetryPolicy
      - Route
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-001

