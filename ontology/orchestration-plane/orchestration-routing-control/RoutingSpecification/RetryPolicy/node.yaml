schema: moonweave.ai/ontology-node/v1
id: RetryPolicy
kind: concept
labels:
  zh: 重试策略
  en: retry policy
  ja: 再試行ポリシー
semantics:
  short_definition:
    zh: 规定失败后次数、退避、可重试错误与耗尽去向的路由规范。
    en: A routing specification declaring post-failure attempts, backoff, retryable errors, and exhaustion routing.
    ja: failure 後 attempts/backoff/retryable error/exhaustion routing を宣言する routing specification です。
  definition:
    zh: RetryPolicy 是 RoutingSpecification 的子类，种差为失败后控制流：max_attempts、initial_interval_seconds、backoff_factor、max_interval_seconds、jitter_enabled、retry_on 与 exhaustion_target_ref。LangGraph RetryPolicy 参数（max_retries、backoff、retry_policy on nodes）映射到这些字段；RoutingDecision 应用策略决定 retry 或 stop，RetryActivity 执行实际重试。
    en: A RetryPolicy is a RoutingSpecification distinguished by post-failure control flow fields max_attempts, initial_interval_seconds, backoff_factor, max_interval_seconds, jitter_enabled, retry_on, and exhaustion_target_ref. LangGraph RetryPolicy parameters (max_retries, backoff, retry_policy on nodes) map to these fields; RoutingDecision applies the policy to choose retry or stop while RetryActivity performs the actual retry.
    ja: RetryPolicy は max attempts/backoff/jitter/retry_on/exhaustion target を持つ subtype で LangGraph RetryPolicy 参数に写像されます。
  why_needed:
    zh: 把重试边界从重试活动与决定中拆出，可防止无限循环并准确解释剩余次数与耗尽转向。
    en: Separating retry bounds from retry activity and decision prevents infinite loops and explains remaining attempts and exhaustion routing precisely.
    ja: retry bound を activity/decision と分け infinite loop を防ぎ exhaustion routing を説明します。
  includes:
    - zh: 节点失败、超时、临时网络错误或限流后的有界重试规则。
      en: Bounded retry rules after node failure, timeout, transient network error, or rate limiting.
      ja: node failure・timeout・transient network error・rate limit 後の bounded retry rule。
  excludes:
    - zh: 一次 RetryActivity、实际 RunAttempt、恢复动作和没有次数上限的“再试一次”文本。
      en: One RetryActivity, an actual RunAttempt, a recovery action, and unbounded try-again text.
      ja: RetryActivity・actual RunAttempt・recovery action・unbounded try-again text。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 在 add_node(..., retry=RetryPolicy(max_attempts=3, ...)) 或 node-level retry_policy 声明可复用 RetryPolicy；耗尽后 error handler 返回 Command(goto=...) 对应 exhaustion_target_ref。集成时把每次 retry 决定记为 RoutingDecision，把实际 API 调用记为 RunAttempt，不要混淆。
    en: LangGraph declares reusable RetryPolicy via add_node(..., retry=RetryPolicy(max_attempts=3, ...)) or node-level retry_policy; post-exhaustion error handlers returning Command(goto=...) map to exhaustion_target_ref. Record each retry choice as RoutingDecision and each API invocation as RunAttempt separately.
    ja: LangGraph RetryPolicy 参数を reusable RetryPolicy に写像し exhaustion 後 Command(goto=...) を exhaustion_target_ref に対応させます。
  typical_input:
    - description: LangGraph RetryPolicy on a node.
      format: |
        from langgraph.types import RetryPolicy

        builder.add_node(
            "call_api",
            call_api_node,
            retry=RetryPolicy(
                max_attempts=3,
                initial_interval=0.5,
                backoff_factor=2.0,
                max_interval=8.0,
                jitter=True,
            ),
        )
      source_claims: [claim-retry-policy-langgraph]
  typical_output:
    - description: Versioned retry policy specification.
      format: |
        {
          "routing_specification_id": "retry-policy-api",
          "version": "2",
          "max_attempts": 3,
          "exhaustion_target_ref": "route-human-review"
        }
      source_claims: [claim-retry-policy-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: RetryPolicy parameters, max_retries, backoff, jitter, exhaustion handling.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Session-level retry patterns for tool failures.
structure:
  identity_keys: []
  fields:
    - id: max_attempts
      labels:
        zh: 最大尝试数
        en: maximum attempts
        ja: maximum attempts
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 包括首次尝试在内的总上限；对应 LangGraph max_attempts/max_retries。
        en: Total attempt limit including the first attempt; maps to LangGraph max_attempts/max_retries.
        ja: first attempt を含む total limit。LangGraph max_attempts に対応。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-retry-policy-langgraph
    - id: initial_interval_seconds
      labels:
        zh: 初始等待秒数
        en: initial interval seconds
        ja: initial interval seconds
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 首次重试前的等待时间。
        en: Delay before the first retry.
        ja: first retry 前 delay。
      allowed_values: []
      pattern: null
      example_value: 0.5
      source_claims:
        - claim-retry-policy-langgraph
    - id: backoff_factor
      labels:
        zh: 退避因子
        en: backoff factor
        ja: backoff factor
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 后续等待时间的乘数。
        en: Multiplier for subsequent retry intervals.
        ja: subsequent retry interval multiplier。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-retry-policy-langgraph
    - id: max_interval_seconds
      labels:
        zh: 最大重试间隔（秒）
        en: maximum retry interval seconds
        ja: 最大再試行間隔（秒）
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制相邻尝试间退避等待上限。
        en: Caps computed delay between adjacent attempts.
        ja: 隣接試行間 delay 上限。
      allowed_values: []
      pattern: null
      example_value: 8
      source_claims:
        - claim-retry-policy-langgraph
    - id: jitter_enabled
      labels:
        zh: 随机抖动开关
        en: jitter enabled
        ja: ジッター有効
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 是否在重试等待间隔上加入随机变化。
        en: Whether random variation is added to retry intervals.
        ja: retry interval に random variation を加えるか。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-retry-policy-langgraph
    - id: retry_on
      labels:
        zh: 可重试条件
        en: retry-on conditions
        ja: retry-on conditions
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出允许重试的错误、状态或谓词。
        en: Lists errors, states, or predicates eligible for retry.
        ja: retry eligible error・state・predicate。
      allowed_values: []
      pattern: null
      example_value:
        - timeout
        - http-5xx
      source_claims:
        - claim-retry-policy-langgraph
    - id: exhaustion_target_ref
      labels:
        zh: 耗尽目标引用
        en: exhaustion target reference
        ja: 再試行枯渇時の遷移先参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用尝试上限后必须转入的恢复或升级 Route。
        en: References the Route required after the attempt limit is reached.
        ja: 試行上限後に必ず移る Route を参照します。
      allowed_values: []
      pattern: null
      example_value: route-human-review
      source_claims:
        - claim-retry-policy-langgraph
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetryPolicy-example-langgraph-node
    labels:
      zh: LangGraph 节点重试策略
      en: LangGraph node retry policy
      ja: LangGraph node retry policy
    descriptions:
      zh: retry-policy-api@2 映射 call_api 节点 RetryPolicy：6 次尝试、0.5s 起、×2 退避、8s 封顶、jitter 开启，耗尽转 route-human-review。
      en: retry-policy-api@2 maps call_api node RetryPolicy with six attempts, 0.5s start, ×2 backoff, 8s cap, jitter on, exhaustion to route-human-review.
      ja: retry-policy-api@2 は LangGraph node RetryPolicy に写像します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Fault tolerance RetryPolicy
    field_values:
      routing_specification_id: retry-policy-api
      version: "2"
      eligible_target_types:
        - retry
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      max_attempts: 6
      initial_interval_seconds: 0.5
      backoff_factor: 2
      max_interval_seconds: 8
      jitter_enabled: true
      retry_on:
        - timeout
        - http-5xx
      exhaustion_target_ref: route-human-review
    related_node_ids:
      - RetryPolicy
      - RoutingDecision
    related_relation_ids:
      - RoutingDecision-applies-RetryPolicy
    source_claims:
      - claim-retry-policy-langgraph
  - id: RetryPolicy-example-exhaustion-command
    labels:
      zh: 耗尽后 Command 路由
      en: Post-exhaustion Command routing
      ja: 枯渇後 Command routing
    descriptions:
      zh: 三次 API 失败后 LangGraph error handler 返回 Command(goto="human_review")，RoutingDecision 应用 retry-policy-api@2 并记录 exhaustion。
      en: After three API failures LangGraph error handler returns Command(goto="human_review"); RoutingDecision applies retry-policy-api@2 and records exhaustion.
      ja: 3 回 API failure 後 error handler が Command(goto="human_review") を返し exhaustion を記録します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Error handling after retry exhaustion
    field_values:
      routing_specification_id: retry-policy-api
      version: "2"
      exhaustion_target_ref: route-human-review
    related_node_ids:
      - RetryPolicy
      - Route
      - RoutingDecision
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-langgraph
  - id: RetryPolicy-example-boundary-attempt
    labels:
      zh: 第二次运行尝试不是策略
      en: Second run attempt is not policy
      ja: second run attempt は policy ではない
    descriptions:
      zh: attempt-2 在 04:22 实际调用 API 并失败，有 input/output/error，但不是重试规则。
      en: attempt-2 invokes the API at 04:22 and fails with input, output, and error but is not the retry rule.
      ja: attempt-2 は API invoke occurrence で retry rule ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: specification versus attempt
    field_values: {}
    related_node_ids:
      - RunAttempt
      - RetryPolicy
    related_relation_ids: []
    source_claims:
      - claim-retry-policy-design
