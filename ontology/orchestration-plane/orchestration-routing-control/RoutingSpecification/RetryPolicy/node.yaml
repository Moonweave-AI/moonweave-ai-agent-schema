    en: A RetryPolicy is a RoutingSpecification distinguished by attempts, backoff, retryable failures, and exhaustion target for post-failure retry-or-stop selection.
    ja: RetryPolicy は failure 後 retry/stop selection に attempts/backoff/retryable failures/exhaustion target を規定する subtype です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
