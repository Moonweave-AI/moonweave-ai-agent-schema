schema: moonweave.ai/ontology-node/v1
id: RetryPolicy
kind: concept
status: accepted
labels:
  zh: 重试策略
  en: retry policy
  ja: retry policy
semantics:
  short_definition:
    zh: 规定哪些失败可重试、次数、退避、超时与耗尽行为的路由规范。
    en: A routing specification declaring retryable failures, attempts, backoff, timeouts, and exhaustion behavior.
    ja: retryable failure・attempt・backoff・timeout・exhaustion behavior を宣言する routing specification。
  definition:
    zh: 重试策略是 RoutingSpecification 的子类，其种差是为失败后的控制流规定最大尝试数、初始等待、退避因子、最大等待、抖动、可重试错误和耗尽目标。RoutingDecision 应用策略决定 retry 或 stop，而 RetryActivity 执行实际重试。
    en: A RetryPolicy is a RoutingSpecification distinguished by maximum attempts, initial delay, backoff factor, maximum delay, jitter, retryable failures, and exhaustion target after failure. RoutingDecision applies the policy to choose retry or stop, while RetryActivity performs the actual retry.
    ja: RetryPolicy は max attempts・initial delay・backoff・max delay・jitter・retryable failure・exhaustion target を持つ subtype です。RoutingDecision が retry/stop を選び RetryActivity が actual retry を実行します。
  why_needed:
    zh: 把重试边界从重试活动和决定中拆出，可防止无限循环并准确解释剩余次数。
    en: Separating retry bounds from retry activity and decision prevents infinite loops and explains remaining attempts precisely.
    ja: retry bound を activity/decision と分け infinite loop を防ぎ remaining attempts を説明します。
  includes:
    - zh: 节点失败、超时、临时网络错误或限流后的有界重试规则。
      en: Bounded retry rules after node failure, timeout, transient network error, or rate limiting.
      ja: node failure・timeout・transient network error・rate limit 後の bounded retry rule。
  excludes:
    - zh: 一次 RetryActivity、实际 RunAttempt、恢复动作和没有次数上限的“再试一次”文本。
      en: One RetryActivity, an actual RunAttempt, a recovery action, and an unbounded “try again” text.
      ja: RetryActivity・actual RunAttempt・recovery action・unbounded try-again text。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: max_attempts
      labels:
        zh: 最大尝试数
        en: maximum attempts
        ja: maximum attempts
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 包括首次尝试在内的总上限。
        en: Total attempt limit including the first attempt.
        ja: first attempt を含む total limit。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-retry-policy-001
    - id: initial_interval_seconds
      labels:
        zh: 初始等待秒数
        en: initial interval seconds
        ja: initial interval seconds
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 首次重试前的等待时间。
        en: Delay before the first retry.
        ja: first retry 前 delay。
      allowed_values: []
      pattern: null
      example_value: 0.5
      source_claims:
        - claim-retry-policy-001
    - id: backoff_factor
      labels:
        zh: 退避因子
        en: backoff factor
        ja: backoff factor
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 后续等待时间的乘数。
        en: Multiplier for subsequent retry intervals.
        ja: subsequent retry interval multiplier。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-retry-policy-001
    - id: max_interval_seconds
      labels:
        zh: 最大重试间隔（秒）
        en: maximum retry interval seconds
        ja: 最大再試行間隔（秒）
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制任意两次相邻尝试之间的退避等待上限；计算出的间隔超过该值时取此上限。
        en: Caps the computed delay between adjacent attempts; any backoff interval above this value is reduced to this many seconds.
        ja: 隣接する試行間の計算済み待機時間の上限であり、退避間隔がこの値を超える場合はこの秒数に切り詰めます。
      allowed_values: []
      pattern: null
      example_value: 8
      source_claims:
        - claim-retry-policy-003
    - id: jitter_enabled
      labels:
        zh: 随机抖动开关
        en: jitter enabled
        ja: ジッター有効
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指示是否在每个计算出的重试等待间隔上加入随机变化，以避免多个失败任务同步再次发起请求。
        en: Indicates whether random variation is added to each computed retry interval so concurrently failing work does not retry in lockstep.
        ja: 計算された各再試行間隔にランダムな変動を加え、同時に失敗した処理が一斉に再試行することを避けるかを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-retry-policy-004
    - id: retry_on
      labels:
        zh: 可重试条件
        en: retry-on conditions
        ja: retry-on conditions
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出允许重试的错误、状态或谓词。
        en: Lists errors, states, or predicates eligible for retry.
        ja: retry eligible error・state・predicate。
      allowed_values: []
      pattern: null
      example_value:
        - timeout
        - http-5xx
      source_claims:
        - claim-retry-policy-001
    - id: exhaustion_target_ref
      labels:
        zh: 耗尽目标引用
        en: exhaustion target reference
        ja: 再試行枯渇時の遷移先参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用策略不再允许继续尝试时必须转入的唯一恢复或升级路径，包括达到尝试上限后的去向。
        en: References the single recovery or escalation route required when the policy permits no further attempt, including after the attempt limit is reached.
        ja: 試行上限への到達を含め、方針が追加試行を許可しないときに必ず移る単一の回復またはエスカレーション経路を参照します。
      allowed_values: []
      pattern: null
      example_value: route-human-review
      source_claims:
        - claim-retry-policy-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetryPolicy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: API 临时失败重试
      en: Retry transient API failures
      ja: transient API failure retry
    scenario_id: null
    descriptions:
      zh: retry-policy-api@2 仅重试 timeout 和 HTTP 5xx；共至多六次尝试，首个重试等待 0.5 秒，后续间隔乘以 2、封顶 8 秒并加入随机抖动，耗尽后转入 route-human-review。
      en: retry-policy-api@2 retries only timeouts and HTTP 5xx responses, allows six total attempts, starts at 0.5 seconds, doubles each interval, caps it at 8 seconds with jitter enabled, and transfers exhaustion to route-human-review.
      ja: retry-policy-api@2 は timeout と HTTP 5xx のみを対象に合計六回まで試行し、初回待機を 0.5 秒、倍率を 2、上限を 8 秒としてジッターを加え、枯渇時は route-human-review へ移します。
    field_values:
      routing_specification_id: retry-policy-api
      version: "2"
      eligible_target_types:
        - retry
        - human-review
      valid_from: 2026-07-16T00:00:00Z
      max_attempts: 6
      initial_interval_seconds: 0.5
      backoff_factor: 2
      max_interval_seconds: 8
      jitter_enabled: true
      retry_on:
        - timeout
        - http-5xx
      exhaustion_target_ref: route-human-review
    related_node_ids:
      - RetryPolicy
      - RoutingDecision
    related_relation_ids:
      - RoutingDecision-applies-RetryPolicy
    expected_result:
      zh: 建立可由失败后路由决定应用的重试规范。
      en: Create a retry specification applicable by post-failure routing decisions.
      ja: post-failure RoutingDecision が apply する retry specification を作成します。
    why_valid_or_invalid:
      zh: 可重试失败集、尝试上限、完整退避函数、抖动开关和耗尽目标均可直接判定；该对象描述规范而不是某次尝试。
      en: The retryable failure set, attempt ceiling, complete backoff function, jitter switch, and exhaustion target are directly decidable; the object specifies a policy rather than one attempt.
      ja: 再試行可能な失敗集合、試行上限、完全な退避関数、ジッター設定、枯渇時の遷移先を直接判定でき、個別試行ではなく方針を記述しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retry-policy-001
  - id: RetryPolicy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 第二次运行尝试
      en: Second run attempt
      ja: second run attempt
    scenario_id: routing-review-retrypolicy-boundary
    descriptions:
      zh: attempt-2 在 04:22 实际调用 API 并失败，它具有输入、输出和错误，但不是重试规则。
      en: attempt-2 actually invokes the API at 04:22 and fails; it has input, output, and error but is not the retry rule.
      ja: attempt-2 は 04:22 actual API invoke して fail し input/output/error を持ちますが retry rule ではありません。
    field_values: {}
    related_node_ids:
      - RunAttempt
      - RetryPolicy
    related_relation_ids: []
    expected_result:
      zh: 作为 RunAttempt 保存，不创建 RetryPolicy。
      en: Keep it as a RunAttempt and do not create a RetryPolicy.
      ja: RunAttempt とし RetryPolicy を作りません。
    why_valid_or_invalid:
      zh: 运行发生与控制规范具有不同身份。
      en: Runtime occurrence and control specification have different identities.
      ja: runtime occurrence と control specification は identity が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retry-policy-001
      - claim-retry-policy-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Route
    shared_parent_concept_id: RoutingSpecification
    differentia:
      zh: RetryPolicy 规定失败后的次数、退避与耗尽行为；Route 只声明一个控制位置到目标的静态边。
      en: RetryPolicy governs attempts, backoff, and exhaustion after failure; Route declares only a static edge from a control location to a target.
      ja: RetryPolicy は failure 後 attempts/backoff/exhaustion、Route は control location→target の static edge を規定します。
    source_claims:
      - claim-retry-policy-001
      - claim-retry-policy-002
