schema: moonweave.ai/ontology-node/v1
id: RoutingSpecification
kind: concept
labels:
  zh: 路由规范
  en: routing specification
  ja: routing specification
semantics:
  short_definition:
    zh: 声明一组可选目标、适用条件和有效期的版本化控制流规范。
    en: A versioned control-flow specification declaring eligible targets, applicable conditions, and validity.
    ja: eligible target・applicable condition・validity を宣言する versioned control-flow specification。
  definition:
    zh: 路由规范是一种规范，以规范标识、版本、允许的目标类型和有效期为身份，描述 Route、RoutingPolicy、RetryPolicy 与 RoutingCondition 可复用的控制约束。它不执行分支、不产生门控结果，也不证明某个目标已被选择；这些是 RoutingDecision 和 GateOutcome 的发生事实。
    en: A RoutingSpecification is a specification identified by specification ID, version, eligible target types, and validity interval, providing reusable control constraints for Route, RoutingPolicy, RetryPolicy, and RoutingCondition. It executes no branch, produces no gate outcome, and does not prove that a target was selected; those are occurrence facts of RoutingDecision and GateOutcome.
    ja: RoutingSpecification は specification ID・version・eligible target type・validity interval で識別し Route/Policy/RetryPolicy/Condition の reusable control constraint を記述します。branch を execute せず gate outcome や selected target を証明しません。
  why_needed:
    zh: 规范与决定分开后，同一策略可被多次求值，且每次选择仍保留独立证据。
    en: Separating specification from decision allows one policy to be evaluated repeatedly while preserving evidence for every selection.
    ja: specification と decision を分け one policy の repeated evaluation と各 selection evidence を保持します。
  includes:
    - zh: 静态路径、候选目标集合、分支条件、重试边界和终止条件的版本化声明。
      en: Versioned declarations of static paths, candidate-target sets, branch conditions, retry bounds, and stop conditions.
      ja: static path・candidate target set・branch condition・retry bound・stop condition の versioned declaration。
  excludes:
    - zh: 一次实际选择、门控求值结果、已执行的下游操作和只为绘图创建的连线。
      en: One actual selection, a gate-evaluation outcome, an executed downstream operation, and connectors created only for visualization.
      ja: actual selection・gate outcome・executed downstream operation・visual-only connector。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      RoutingSpecification 编译为 LangGraph 路由表与 OPA 策略包：Route、RoutingPolicy、RetryPolicy、
      RoutingCondition 共享 routing_specification_id 版本。运行时 RoutingDecision 读取规范求值但不修改
      version；conditional_edges 函数引用规范中的 BranchCondition/GateCondition/StopCondition 映射。
    en: >-
      RoutingSpecification compiles to LangGraph routing tables and OPA policy packages: Route, RoutingPolicy, RetryPolicy,
      and RoutingCondition share routing_specification_id version. Runtime RoutingDecision reads and evaluates specs without
      mutating version; conditional_edges functions reference BranchCondition, GateCondition, and StopCondition mappings
      from the spec.
    ja: >-
      RoutingSpecification は LangGraph routing table と OPA policy package にコンパイルされる。Route、RoutingPolicy、
      RetryPolicy、RoutingCondition は routing_specification_id version を共有する。runtime RoutingDecision は spec を
      evaluate するが version は変更しない。conditional_edges function は spec 内 BranchCondition/GateCondition/StopCondition
      mapping を参照する。
  typical_input:
    - description:
        zh: 版本化路由控制流规范声明。
        en: A versioned routing control-flow specification declaration.
        ja: versioned routing control-flow specification declaration。
      format: |-
        {"routing_specification_id":"rs:release-routing@3","version":"3","valid_from":"2026-07-01T00:00:00Z","eligible_target_types":["workflow_node","tool","stop"],"route_refs":["route:sign-to-approve"],"policy_refs":["policy:retry-transient@1"]}
  typical_output:
    - description:
        zh: 编译到图或 OPA 的路由规范工件，不是一次 RoutingDecision。
        en: A routing-specification artifact compiled to graph or OPA, not one RoutingDecision.
        ja: graph または OPA にコンパイルされた routing-specification artifact。RoutingDecision ではない。
      format: |-
        {"routing_spec_ref":"rs:release-routing@3","compiled":{"adapter":"langgraph","conditional_edges":"classify_release","opa_package":"routing/release"}}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents compile-time edge maps driven by declarative routing specifications.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents versioned policy packages as routing specification implementations.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph structure separate from per-run routing decisions.
  source_claims:
    - claim-routing-specification-001
    - claim-routing-specification-002
structure:
  identity_keys:
    - routing_specification_id
    - version
  fields:
    - id: routing_specification_id
      labels:
        zh: 路由规范标识
        en: routing specification ID
        ja: routing specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项路由规范。
        en: Stably identifies a routing specification across revisions.
        ja: revision 間で routing specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: routing-spec-support
      source_claims:
        - claim-routing-specification-001
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的一组目标与条件。
        en: Fixes an immutable revision of targets and conditions.
        ja: target/condition の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-routing-specification-001
    - id: eligible_target_types
      labels:
        zh: 允许目标类型
        en: eligible target types
        ja: eligible target types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该规范可以选择的 worker、tool、branch、operation 或 stop 类型。
        en: Lists worker, tool, branch, operation, or stop target types this specification may select.
        ja: specification が select できる worker/tool/branch/operation/stop type。
      allowed_values: []
      pattern: null
      example_value:
        - worker
        - stop
      source_claims:
        - claim-routing-specification-001
        - claim-routing-specification-003
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-routing-specification-004
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；为空表示未计划结束。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time、null は scheduled end 無し。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-routing-specification-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: routing-spec-langgraph-stategraph
    labels:
      zh: RoutingSpecification positive
      en: RoutingSpecification positive
      ja: RoutingSpecification positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingSpecification 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingSpecification router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingSpecification から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {routing_specification_id: routing-spec-support-v3, version: 1}

    related_node_ids:
      - RoutingSpecification
      - Route
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-001

  - id: routing-spec-semantic-router-index
    labels:
      zh: RoutingSpecification positive
      en: RoutingSpecification positive
      ja: RoutingSpecification positive
    descriptions:
      zh: Prefect 数据流编排映射 RoutingSpecification：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps RoutingSpecification: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect RoutingSpecification: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {routing_specification_id: routing-spec-intent-v2, encoder: OpenAIEncoder}

    related_node_ids:
      - RoutingSpecification
      - Route
      - BranchCondition
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-001

  - id: routing-spec-openai-multi-agent
    labels:
      zh: RoutingSpecification positive
      en: RoutingSpecification positive
      ja: RoutingSpecification positive
    descriptions:
      zh: LiteLLM 映射 RoutingSpecification LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps RoutingSpecification LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM RoutingSpecification: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {routing_specification_id: routing-spec-customer-service, max_turns: 8}

    related_node_ids:
      - RoutingSpecification
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-001

  - id: routing-spec-opa-bundle
    labels:
      zh: RoutingSpecification positive
      en: RoutingSpecification positive
      ja: RoutingSpecification positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 RoutingSpecification 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as RoutingSpecification router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が RoutingSpecification から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {routing_specification_id: routing-spec-opa-support, version: 4}

    related_node_ids:
      - RoutingSpecification
      - GateCondition
      - Route
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-routing-specification-001
    source: langgraph-graph-api
    supports: RoutingSpecification core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-routing-specification-002
    source: opa-policy-language
    supports: RoutingSpecification boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-routing-specification-003
    source: langgraph-graph-api
    supports: RoutingSpecification field or status vocabulary is a Moonweave audit projection informed by LangGraph Graph API.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
  - id: claim-routing-specification-004
    source: opa-policy-language
    supports: Moonweave RoutingSpecification constraints, examples, or local audit fields for claim claim-routing-specification-004 are design projections informed by Open Policy Agent - Policy Language.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: design-inference
    confidence: high
