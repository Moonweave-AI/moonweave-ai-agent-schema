schema: moonweave.ai/ontology-node/v1
id: RoutingSpecification
kind: concept
labels:
  zh: 路由规范
  en: routing specification
  ja: ルーティング仕様
semantics:
  short_definition:
    zh: 声明候选目标、适用条件与有效期的版本化控制流规范。
    en: A versioned control-flow specification declaring eligible targets, applicable conditions, and validity.
    ja: eligible target・applicable condition・validity を宣言する versioned control-flow specification です。
  definition:
    zh: RoutingSpecification 是以 routing_specification_id、version、eligible_target_types 与 valid_from/valid_until 标识的规范，描述 Route、RoutingPolicy、RetryPolicy 与 RoutingCondition 可复用的控制约束。LangGraph StateGraph 编译后的节点、边与 conditional_edges 映射到此层规范族；它执行不分支、不产生 GateOutcome，也不证明某目标已被选择——那些是 RoutingDecision 与 GateOutcome 的发生事实。
    en: A RoutingSpecification is a specification identified by routing_specification_id, version, eligible_target_types, and valid_from/valid_until, providing reusable control constraints for Route, RoutingPolicy, RetryPolicy, and RoutingCondition. A compiled LangGraph StateGraph's nodes, edges, and conditional_edges map to this specification family; it executes no branch, produces no gate outcome, and does not prove a target was selected—those are occurrence facts of RoutingDecision and GateOutcome.
    ja: RoutingSpecification は specification ID・version・eligible target type・validity interval で識別し Route/Policy/RetryPolicy/Condition の reusable control constraint を記述します。LangGraph StateGraph の node/edge/conditional_edges がこの specification 族に写像されます。
  why_needed:
    zh: 规范与决定分开后，同一 StateGraph 或策略可被多次求值，且每次选择仍保留独立证据。
    en: Separating specification from decision lets one StateGraph or policy be evaluated repeatedly while preserving evidence for every selection.
    ja: specification と decision を分け one policy の repeated evaluation と各 selection evidence を保持します。
  includes:
    - zh: 静态路径、候选目标集合、分支条件、重试边界和终止条件的版本化声明。
      en: Versioned declarations of static paths, candidate-target sets, branch conditions, retry bounds, and stop conditions.
      ja: static path・candidate target set・branch condition・retry bound・stop condition の versioned declaration。
  excludes:
    - zh: 一次实际选择、门控求值结果、已执行的下游操作和仅为绘图创建的连线。
      en: One actual selection, a gate-evaluation outcome, an executed downstream operation, and connectors created only for visualization.
      ja: actual selection・gate outcome・executed downstream operation・visual-only connector。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph builder.add_node/add_edge/add_conditional_edges 定义的是 RoutingSpecification 族；一次 route function 返回值或 Command(goto=...) 是 RoutingDecision 证据。CrewAI Process 与 Flow 中的路由规则、A2A AgentCard 暴露的 remote target 类型也应投影为 eligible_target_types。版本字段必须固定，避免原地修改已审计规范。
    en: LangGraph builder.add_node/add_edge/add_conditional_edges define the RoutingSpecification family; one route-function return or Command(goto=...) is RoutingDecision evidence. CrewAI Process/Flow routing rules and A2A AgentCard remote target types should project to eligible_target_types. Version fields must be immutable to preserve audited specifications.
    ja: LangGraph add_node/add_edge/add_conditional_edges は RoutingSpecification 族を定義し route function 戻り値は RoutingDecision 証拠です。version は immutable に固定します。
  typical_input:
    - description: LangGraph StateGraph topology declaration.
      format: |
        builder = StateGraph(State)
        builder.add_node("classify", classify_node)
        builder.add_node("billing_handler", billing_node)
        builder.add_conditional_edges(
            "classify",
            route_by_category,
            {"billing": "billing_handler", END: END},
        )
        graph = builder.compile()
      source_claims: [claim-routing-specification-langgraph]
  typical_output:
    - description: Versioned routing specification manifest.
      format: |
        {
          "routing_specification_id": "routing-spec-support",
          "version": "7",
          "eligible_target_types": ["worker", "stop"],
          "valid_from": "2026-07-16T00:00:00Z"
        }
      source_claims: [claim-routing-specification-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: StateGraph nodes, edges, conditional_edges as routing specification.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process and Flow routing configuration.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: AgentCard remote target types for routing specifications.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Handoff lists as routing specification inputs.
structure:
  identity_keys:
    - routing_specification_id
    - version
  fields:
    - id: routing_specification_id
      labels:
        zh: 路由规范标识
        en: routing specification ID
        ja: routing specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项路由规范。
        en: Stably identifies a routing specification across revisions.
        ja: revision 間で routing specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: routing-spec-support
      source_claims:
        - claim-routing-specification-design
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的一组目标与条件。
        en: Fixes an immutable revision of targets and conditions.
        ja: target/condition の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-routing-specification-design
    - id: eligible_target_types
      labels:
        zh: 允许目标类型
        en: eligible target types
        ja: eligible target types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该规范可以选择的 worker、tool、branch、operation、remote-agent 或 stop 类型。
        en: Lists worker, tool, branch, operation, remote-agent, or stop target types this specification may select.
        ja: specification が select できる worker/tool/branch/operation/remote-agent/stop type。
      allowed_values: []
      pattern: null
      example_value:
        - worker
        - stop
      source_claims:
        - claim-routing-specification-a2a
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-routing-specification-design
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；为空表示未计划结束。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time、null は scheduled end 無し。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-routing-specification-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingSpecification-example-langgraph-stategraph
    labels:
      zh: LangGraph StateGraph 路由规范
      en: LangGraph StateGraph routing specification
      ja: LangGraph StateGraph routing specification
    descriptions:
      zh: routing-spec-support@7 对应 classify→billing_handler/technical_handler/stop 的 compiled graph，允许 worker 与 stop 目标，7 月 16 日生效。
      en: routing-spec-support@7 corresponds to a compiled graph classify→billing_handler/technical_handler/stop, permits worker and stop targets, effective July 16.
      ja: routing-spec-support@7 は classify から billing/technical/stop への compiled graph に対応します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: StateGraph compile
    field_values:
      routing_specification_id: routing-spec-support
      version: "7"
      eligible_target_types:
        - worker
        - stop
      valid_from: 2026-07-16T00:00:00Z
      valid_until: null
    related_node_ids:
      - RoutingSpecification
      - Route
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-langgraph
  - id: RoutingSpecification-example-crewai-process
    labels:
      zh: CrewAI 层级路由规范
      en: CrewAI hierarchical routing specification
      ja: CrewAI hierarchical routing specification
    descriptions:
      zh: routing-spec-crew-hierarchical@2 声明 manager 可在 researcher/writer 间路由，eligible_target_types 含 worker。
      en: routing-spec-crew-hierarchical@2 declares manager routing among researcher/writer with worker eligible target types.
      ja: routing-spec-crew-hierarchical@2 は manager が researcher/writer 間を route する worker 型仕様です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      routing_specification_id: routing-spec-crew-hierarchical
      version: "2"
      eligible_target_types:
        - worker
      valid_from: 2026-07-16T00:00:00Z
    related_node_ids:
      - RoutingSpecification
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-crewai
  - id: RoutingSpecification-example-a2a-remote
    labels:
      zh: A2A 远程目标路由规范
      en: A2A remote-target routing specification
      ja: A2A remote target routing specification
    descriptions:
      zh: routing-spec-a2a@1 允许 remote-agent 与 stop 类型，引用 AgentCard 发现的 billing/technical endpoint。
      en: routing-spec-a2a@1 permits remote-agent and stop types referencing billing/technical endpoints from AgentCard discovery.
      ja: routing-spec-a2a@1 は AgentCard から発見した remote-agent/stop 型を許可します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard
    field_values:
      routing_specification_id: routing-spec-a2a
      version: "1"
      eligible_target_types:
        - remote-agent
        - stop
      valid_from: 2026-07-16T00:00:00Z
    related_node_ids:
      - RoutingSpecification
      - RoutingTarget
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-a2a
  - id: RoutingSpecification-example-boundary-decision
    labels:
      zh: 一次选择不是规范
      en: One selection is not specification
      ja: one selection は specification ではない
    descriptions:
      zh: decision-884 在 04:20 选择 billing-worker-2，有输入状态摘要，但没有可复用版本或 eligible_target_types 声明。
      en: decision-884 selects billing-worker-2 at 04:20 with input-state digest but no reusable revision or eligible-target declaration.
      ja: decision-884 は selection occurrence で reusable revision がありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus decision
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - RoutingSpecification
    related_relation_ids: []
    source_claims:
      - claim-routing-specification-design
parent_relation: null
relations: []
sources:
  - id: langgraph-routing-spec
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph topology as routing specification.
  - id: crewai-routing-spec
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process and Flow routing rules.
  - id: a2a-routing-spec
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Remote agent target types in routing specs.
  - id: routing-specification-design
    title: Moonweave routing and gates design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: RoutingSpecification as reusable control-flow genus.
source_claims:
  - id: claim-routing-specification-langgraph
    source: langgraph-routing-spec
    supports: LangGraph StateGraph nodes, edges, and conditional_edges are reusable routing specifications distinct from one routing occurrence.
    locator: Graph API — StateGraph, Edges, Conditional edges
    evidence_kind: official
    confidence: high
  - id: claim-routing-specification-crewai
    source: crewai-routing-spec
    supports: CrewAI Process and hierarchical manager routing declare reusable target selection rules.
    locator: Concepts — Processes, hierarchical delegation
    evidence_kind: official
    confidence: high
  - id: claim-routing-specification-a2a
    source: a2a-routing-spec
    supports: A2A AgentCard exposes remote agent endpoints as typed routing targets in specifications.
    locator: Specification — AgentCard
    evidence_kind: official
    confidence: high
  - id: claim-routing-specification-design
    source: routing-specification-design
    supports: Moonweave separates RoutingSpecification from RoutingDecision occurrence.
    locator: RoutingSpecification concept boundary
    evidence_kind: design-inference
    confidence: high
