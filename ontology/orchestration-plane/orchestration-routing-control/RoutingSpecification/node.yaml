schema: moonweave.ai/ontology-node/v1
id: RoutingSpecification
kind: concept
status: accepted
labels:
  zh: 路由规范
  en: routing specification
  ja: routing specification
semantics:
  short_definition:
    zh: 声明一组可选目标、适用条件和有效期的版本化控制流规范。
    en: A versioned control-flow specification declaring eligible targets, applicable conditions, and validity.
    ja: eligible target・applicable condition・validity を宣言する versioned control-flow specification。
  definition:
    zh: 路由规范是一种规范，以规范标识、版本、允许的目标类型和有效期为身份，描述 Route、RoutingPolicy、RetryPolicy 与 RoutingCondition 可复用的控制约束。它不执行分支、不产生门控结果，也不证明某个目标已被选择；这些是 RoutingDecision 和 GateOutcome 的发生事实。
    en: A RoutingSpecification is a specification identified by specification ID, version, eligible target types, and validity interval, providing reusable control constraints for Route, RoutingPolicy, RetryPolicy, and RoutingCondition. It executes no branch, produces no gate outcome, and does not prove that a target was selected; those are occurrence facts of RoutingDecision and GateOutcome.
    ja: RoutingSpecification は specification ID・version・eligible target type・validity interval で識別し Route/Policy/RetryPolicy/Condition の reusable control constraint を記述します。branch を execute せず gate outcome や selected target を証明しません。
  why_needed:
    zh: 规范与决定分开后，同一策略可被多次求值，且每次选择仍保留独立证据。
    en: Separating specification from decision allows one policy to be evaluated repeatedly while preserving evidence for every selection.
    ja: specification と decision を分け one policy の repeated evaluation と各 selection evidence を保持します。
  includes:
    - zh: 静态路径、候选目标集合、分支条件、重试边界和终止条件的版本化声明。
      en: Versioned declarations of static paths, candidate-target sets, branch conditions, retry bounds, and stop conditions.
      ja: static path・candidate target set・branch condition・retry bound・stop condition の versioned declaration。
  excludes:
    - zh: 一次实际选择、门控求值结果、已执行的下游操作和只为绘图创建的连线。
      en: One actual selection, a gate-evaluation outcome, an executed downstream operation, and connectors created only for visualization.
      ja: actual selection・gate outcome・executed downstream operation・visual-only connector。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - routing_specification_id
    - version
  fields:
    - id: routing_specification_id
      labels:
        zh: 路由规范标识
        en: routing specification ID
        ja: routing specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项路由规范。
        en: Stably identifies a routing specification across revisions.
        ja: revision 間で routing specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: routing-spec-support
      source_claims:
        - claim-routing-specification-001
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的一组目标与条件。
        en: Fixes an immutable revision of targets and conditions.
        ja: target/condition の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-routing-specification-001
    - id: eligible_target_types
      labels:
        zh: 允许目标类型
        en: eligible target types
        ja: eligible target types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该规范可以选择的 worker、tool、branch、operation 或 stop 类型。
        en: Lists worker, tool, branch, operation, or stop target types this specification may select.
        ja: specification が select できる worker/tool/branch/operation/stop type。
      allowed_values: []
      pattern: null
      example_value:
        - worker
        - stop
      source_claims:
        - claim-routing-specification-001
        - claim-routing-specification-003
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-routing-specification-004
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；为空表示未计划结束。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time、null は scheduled end 無し。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-routing-specification-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RoutingSpecification-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 客服分流规范第七版
      en: Support routing specification revision seven
      ja: support routing specification revision 7
    scenario_id: null
    descriptions:
      zh: routing-spec-support@7 允许目标为 billing-worker、technical-worker 和 stop，引用分支条件与三次重试上限，并从 7 月 16 日生效。
      en: routing-spec-support@7 permits billing-worker, technical-worker, and stop targets, references branch conditions and a three-attempt retry bound, and is effective from July 16.
      ja: routing-spec-support@7 は billing/technical worker と stop target、branch condition、3-attempt retry bound を宣言し July 16 から valid です。
    field_values:
      routing_specification_id: routing-spec-support
      version: "7"
      eligible_target_types:
        - worker
        - stop
      valid_from: 2026-07-16T00:00:00Z
      valid_until: null
    related_node_ids:
      - RoutingSpecification
      - RoutingPolicy
      - RetryPolicy
    related_relation_ids: []
    expected_result:
      zh: 建立可被多次 RoutingDecision 引用的规范版本。
      en: Create a specification revision reusable by many RoutingDecision occurrences.
      ja: many RoutingDecision が reuse できる specification revision を作成します。
    why_valid_or_invalid:
      zh: 版本、候选类型、条件范围和有效期均明确，但未声称已经路由。
      en: Version, candidate types, condition scope, and validity are explicit without claiming that routing occurred.
      ja: version・candidate type・condition scope・validity が明確で routing occurrence を主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-specification-001
      - claim-routing-specification-002
  - id: RoutingSpecification-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 一次已选目标记录
      en: One selected-target record
      ja: one selected-target record
    scenario_id: routing-review-routingspecification-boundary
    descriptions:
      zh: decision-884 在 04:20 选择 billing-worker-2，并保存输入状态摘要和理由，但没有可复用版本或候选类型声明。
      en: decision-884 selects billing-worker-2 at 04:20 and stores an input-state digest and rationale, but has no reusable revision or eligible-target declaration.
      ja: decision-884 は 04:20 billing-worker-2 を select し state digest/rationale を持ちますが reusable revision/eligible target declaration はありません。
    field_values: {}
    related_node_ids:
      - RoutingDecision
      - RoutingSpecification
    related_relation_ids: []
    expected_result:
      zh: 分类为 RoutingDecision，不创建 RoutingSpecification。
      en: Classify it as a RoutingDecision and do not create a RoutingSpecification.
      ja: RoutingDecision とし RoutingSpecification を作りません。
    why_valid_or_invalid:
      zh: 一次发生记录与长期规范具有不同身份。
      en: An occurrence record and a durable specification have different identities.
      ja: occurrence record と durable specification は identity が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-routing-specification-001
      - claim-routing-specification-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-tool-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照权威来源逐项完成人工语义核验；概念定义、层级、关系、结构与来源主张成立。
    en: Manual semantic verification against authoritative sources completed; concept definitions, hierarchy, relations, structure, and source claims hold.
    ja: 権威ソースに照らし手動意味検証を完了し、概念定義・階層・関係・構造・出典主張が成立。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-routing-specification-001
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API distinguishes workflow state, executable nodes, static edges, conditional routing functions, termination targets, and Command values that combine state updates with a selected destination. Moonweave uses this to separate reusable routing specifications and targets from one RoutingDecision occurrence.
    locator: LangGraph Graph API documentation, Graphs, Edges, Conditional edges, and Command sections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-specification-002
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph fault-tolerance documentation defines retry policy parameters such as maximum attempts, backoff, jitter, retryable errors, timeouts, exhaustion, and subsequent error handling. Moonweave uses these as fields of RetryPolicy while keeping each retry decision and attempt as separate occurrences.
    locator: LangGraph Fault tolerance documentation, Retries, Parameters, Timeouts, and Error handling sections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-specification-003
    source: eng-fw-autogen-agentchat
    supports: AutoGen SelectorGroupChat selects a next participant from described candidates using current conversation context and stops when an explicit termination condition is satisfied. Moonweave uses this as evidence for typed routing targets, selection decisions, and separately evaluated stop conditions.
    locator: AutoGen AgentChat documentation, Selector Group Chat workflow and Termination Conditions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-routing-specification-004
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes plans and other Entities from time-bounded Activities that use or generate Entities. Moonweave therefore treats routing policy and conditions as reusable specifications, RoutingDecision as an occurrence, and GateOutcome as information produced by gate evaluation.
    locator: W3C PROV-O Recommendation Sections 3.1 and 3.2, Entity, Activity, generation, and Plan
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
