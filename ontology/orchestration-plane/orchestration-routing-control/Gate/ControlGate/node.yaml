        en: Publication-quality control gate inherits Gate
        ja: publication quality gate は Gate を継承
      scenario_id: routing-relation-controlgate-is_a-gate-positive
      descriptions:
        zh: control-gate-4 具有通用 gate_id、决定函数和结果集合，并增加控制点。
        en: control-gate-4 has general gate ID, decision function, and outcome set plus a control point.
        ja: control-gate-4 は general gate ID/function/outcomes に control point を加えます。
      field_values: {}
      related_node_ids:
        - ControlGate
        - Gate
      related_relation_ids:
        - ControlGate-is_a-Gate
      expected_result:
        zh: 断言 ControlGate → Gate。
        en: Assert ControlGate → Gate.
        ja: ControlGate → Gate を assert します。
      why_valid_or_invalid:
        zh: 它满足 Gate 属概念和编排控制点种差。
        en: It satisfies the Gate genus and orchestration-control-point differentia.
        ja: Gate genus と orchestration-control-point differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-control-gate-001
