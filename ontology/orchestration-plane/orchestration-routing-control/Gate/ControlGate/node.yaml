relations:
  - id: ControlGate-evaluates-GateCondition
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 求值
      en: evaluates
      ja: 評価する
    definitions:
      zh: ControlGate 在一个编排控制点把冻结状态和证据绑定到 GateCondition，并执行其阈值与缺失证据规则。
      en: A ControlGate binds frozen state and evidence to a GateCondition at an orchestration control point and executes its threshold and missing-evidence rules.
      ja: ControlGate は orchestration control point で frozen state/evidence を GateCondition に bind し threshold/missing-evidence rule を実行します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 由其求值
        en: evaluated by
        ja: により評価される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ControlGate-evaluates-GateCondition-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 发布门求值质量条件
          en: Publication gate evaluates quality condition
          ja: publication gate evaluates quality condition
        scenario_id: routing-relation-controlgate-evaluates-gatecondition-positive
        descriptions:
          zh: control-gate-4 对 gate-quality@5 读取 score-44 与 safety-decision-9。
          en: control-gate-4 evaluates gate-quality@5 using score-44 and safety-decision-9.
          ja: control-gate-4 は score-44/safety-decision-9 で gate-quality@5 を evaluate します。
        field_values: {}
        related_node_ids:
