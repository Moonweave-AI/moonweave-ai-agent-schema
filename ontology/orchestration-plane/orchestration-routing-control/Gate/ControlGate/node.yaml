schema: moonweave.ai/ontology-node/v1
id: ControlGate
kind: concept
status: review
labels:
  zh: 编排控制门
  en: orchestration control gate
  ja: orchestration control gate
semantics:
  short_definition:
    zh: 在编排流程控制点求值 GateCondition 并约束下一步控制流的 Gate。
    en: A Gate that evaluates GateCondition at an orchestration control point and constrains the next control-flow step.
    ja: orchestration control point で GateCondition を evaluate し next control flow を constrain する Gate。
  definition:
    zh: 编排控制门是 Gate 的子类，其种差是部署在编排控制点，读取当前状态与证据、求值 GateCondition 并产生 GateOutcome，供 RoutingDecision 选择继续、阻断、重试、转向、升级或停止。它不是所有 Gate 的上位类，也不是一次 GateOutcome。
    en: A ControlGate is a Gate distinguished by deployment at an orchestration control point, where it reads current state and evidence, evaluates GateCondition, and produces GateOutcome for a RoutingDecision to continue, block, retry, redirect, escalate, or stop. It is neither the superclass of every Gate nor one GateOutcome.
    ja: ControlGate は orchestration control point に配置され state/evidence を読み GateCondition を evaluate して GateOutcome を生成し RoutingDecision が continue/block/retry/redirect/escalate/stop を選ぶ Gate subtype です。Gate の superclass や outcome ではありません。
  why_needed:
    zh: 修正 Gate 与 ControlGate 的倒置关系，使领域专用门可共享通用能力。
    en: Correcting the Gate-ControlGate inversion lets domain-specific gates share the general capability.
    ja: Gate-ControlGate inversion を修正し domain-specific gate が general capability を共有できます。
  includes:
    - zh: 工作流步骤前的质量门、安全门、预算门、人工检查门和结果验收门。
      en: Quality, safety, budget, human-review, and result-acceptance gates before workflow steps.
      ja: workflow step 前の quality・safety・budget・human-review・acceptance gate。
  excludes:
    - zh: 提交专用 CommitGate、工具审批专用门、条件规范和结果记录。
      en: A commit-specific CommitGate, tool-approval gate, condition specification, and outcome record.
      ja: commit-specific CommitGate・tool approval gate・condition spec・outcome record。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: control_point_ref
      labels:
        zh: 控制点引用
        en: control-point reference
        ja: control-point reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用门控能力部署的编排步骤或边。
        en: References the orchestration step or edge where the gate is deployed.
        ja: gate が配置される orchestration step/edge を参照します。
      allowed_values: []
      pattern: null
      example_value: after-draft-before-publish
      source_claims:
        - claim-control-gate-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlGate-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 发布前质量门
      en: Pre-publication quality gate
      ja: pre-publication quality gate
    scenario_id: null
    descriptions:
      zh: control-gate-4 位于 draft 与 publish 之间，读取评分与安全证据并求值 gate-condition-4。
      en: control-gate-4 sits between draft and publish, reads score and safety evidence, and evaluates gate-condition-4.
      ja: control-gate-4 は draft/publish 間で score/safety evidence を読み gate-condition-4 を evaluate します。
    field_values:
      gate_id: control-gate-4
      gate_kind: evidence-threshold
      decision_function_ref: gate-condition-4
      version: "4"
      control_point_ref: after-draft-before-publish
    related_node_ids:
      - ControlGate
      - GateCondition
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
    expected_result:
      zh: 建立 ControlGate 并保留 Gate 上位身份。
      en: Create a ControlGate while retaining its Gate genus.
      ja: ControlGate を作り Gate genus を保持します。
    why_valid_or_invalid:
      zh: 部署位置和求值职责均属于编排控制流。
      en: Deployment point and evaluation responsibility both belong to orchestration control flow.
      ja: deployment point/evaluation responsibility が orchestration control flow に属します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-control-gate-001
  - id: ControlGate-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 提交确认门
      en: Commit confirmation gate
      ja: commit confirmation gate
    scenario_id: routing-review-controlgate-boundary
    descriptions:
      zh: commit-gate-2 只决定代码是否可提交，身份由 CommitRequest 与仓库状态决定，不选择编排下游目标。
      en: commit-gate-2 decides only whether code may be committed; its identity depends on CommitRequest and repository state and it selects no orchestration target.
      ja: commit-gate-2 は commit 可否のみを決め CommitRequest/repository state で identity が決まり orchestration target を選びません。
    field_values: {}
    related_node_ids:
      - CommitGate
      - ControlGate
    related_relation_ids: []
    expected_result:
      zh: 归 CommitGate 所有域，不创建 ControlGate。
      en: Keep it in the CommitGate owner module and do not create a ControlGate.
      ja: CommitGate owner module に置き ControlGate を作りません。
    why_valid_or_invalid:
      zh: 同为 Gate 不表示具有编排控制点种差。
      en: Sharing Gate does not prove the orchestration-control-point differentia.
      ja: Gate shared genus だけでは orchestration control point differentia を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-control-gate-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
