          en: Link the concrete gate to the concrete outcome record.
          ja: concrete gate と outcome record を接続します。
        why_valid_or_invalid:
          zh: 结果含 gate 引用、证据和时间。
          en: The outcome carries gate reference, evidence, and time.
          ja: outcome は gate ref・evidence・time を持ちます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-control-gate-001
          - claim-control-gate-002
      - id: ControlGate-produces-GateOutcome-example-boundary-manual-20260716
