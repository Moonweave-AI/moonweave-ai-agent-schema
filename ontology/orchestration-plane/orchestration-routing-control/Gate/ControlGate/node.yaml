schema: moonweave.ai/ontology-node/v1
id: ControlGate
kind: concept
labels:
  zh: 编排控制门
  en: orchestration control gate
  ja: orchestration control gate
semantics:
  short_definition:
    zh: 在编排流程控制点求值 GateCondition 并约束下一步控制流的 Gate。
    en: A Gate that evaluates GateCondition at an orchestration control point and constrains the next control-flow step.
    ja: orchestration control point で GateCondition を evaluate し next control flow を constrain する Gate。
  definition:
    zh: 编排控制门是 Gate 的子类，其种差是部署在编排控制点，读取当前状态与证据、求值 GateCondition 并产生 GateOutcome，供 RoutingDecision 选择继续、阻断、重试、转向、升级或停止。它不是所有 Gate 的上位类，也不是一次 GateOutcome。
    en: A ControlGate is a Gate distinguished by deployment at an orchestration control point, where it reads current state and evidence, evaluates GateCondition, and produces GateOutcome for a RoutingDecision to continue, block, retry, redirect, escalate, or stop. It is neither the superclass of every Gate nor one GateOutcome.
    ja: ControlGate は orchestration control point に配置され state/evidence を読み GateCondition を evaluate して GateOutcome を生成し RoutingDecision が continue/block/retry/redirect/escalate/stop を選ぶ Gate subtype です。Gate の superclass や outcome ではありません。
  why_needed:
    zh: 修正 Gate 与 ControlGate 的倒置关系，使领域专用门可共享通用能力。
    en: Correcting the Gate-ControlGate inversion lets domain-specific gates share the general capability.
    ja: Gate-ControlGate inversion を修正し domain-specific gate が general capability を共有できます。
  includes:
    - zh: 工作流步骤前的质量门、安全门、预算门、人工检查门和结果验收门。
      en: Quality, safety, budget, human-review, and result-acceptance gates before workflow steps.
      ja: workflow step 前の quality・safety・budget・human-review・acceptance gate。
  excludes:
    - zh: 提交专用 CommitGate、工具审批专用门、条件规范和结果记录。
      en: A commit-specific CommitGate, tool-approval gate, condition specification, and outcome record.
      ja: commit-specific CommitGate・tool approval gate・condition spec・outcome record。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: >-
      ControlGate 部署在 LangGraph 图节点出口或 Agents SDK handoff 前：读取 graph state 与 GateCondition，调用
      Gate.decision_function，将 GateOutcome.result 映射为 Command(goto=...) 或 OPA deny/allow。RoutingDecision
      记录所选目标与 outcome 引用；StopCondition 触发时 goto END 而非跳过 GateOutcome 记录。
    en: >-
      ControlGate deploys at LangGraph node exits or before Agents SDK handoffs: reads graph state and GateCondition, invokes
      Gate.decision_function, maps GateOutcome.result to Command(goto=...) or OPA deny/allow. RoutingDecision records selected
      target and outcome reference; when StopCondition fires, goto END while still recording GateOutcome.
    ja: >-
      ControlGate は LangGraph node exit または Agents SDK handoff 前に deploy する。graph state と GateCondition を読み
      Gate.decision_function を呼び、GateOutcome.result を Command(goto=...) または OPA deny/allow に map する。
      RoutingDecision は selected target と outcome reference を記録する。StopCondition 発火時は GateOutcome 記録を残し goto END。
  typical_input:
    - description:
        zh: 编排控制点的 state 快照与 GateCondition 引用。
        en: A state snapshot and GateCondition reference at an orchestration control point.
        ja: orchestration control point の state snapshot と GateCondition reference。
      format: |-
        {"control_point_ref":"cp:pre-publish","gate_ref":"gate:release-signatures@1","state":{"signed":false,"risk":"high"},"condition_ref":"cond:signature-valid@2"}
  typical_output:
    - description:
        zh: 供 RoutingDecision 使用的 GateOutcome 与建议路由目标。
        en: A GateOutcome and suggested routing target for RoutingDecision.
        ja: RoutingDecision 用の GateOutcome と suggested routing target。
      format: |-
        {"gate_outcome_id":"go-901","result":"redirect","routing_target_ref":"target:human-review-queue","routing_decision_input":{"selected_target":"human-review-queue","gate_outcome_ref":"go-901"}}
  reference_implementations:
    - name: LangGraph Command
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents Command(goto=...) mapping gate outcomes to next control-flow steps.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents policy decisions at orchestration control points.
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents conditional routing after control-gate evaluation.
  source_claims:
    - claim-control-gate-001
    - claim-control-gate-002
structure:
  identity_keys: []
  fields:
    - id: control_point_ref
      labels:
        zh: 控制点引用
        en: control-point reference
        ja: control-point reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用门控能力部署的编排步骤或边。
        en: References the orchestration step or edge where the gate is deployed.
        ja: gate が配置される orchestration step/edge を参照します。
      allowed_values: []
      pattern: null
      example_value: after-draft-before-publish
      source_claims:
        - claim-control-gate-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: control-gate-opa-quality
    labels:
      zh: ControlGate positive
      en: ControlGate positive
      ja: ControlGate positive
    descriptions:
      zh: Temporal 持久化工作流映射 ControlGate：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps ControlGate: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal ControlGate: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {gate_id: gate-support-quality, gate_kind: control, decision_function_ref: "quality-gate-evaluator@3"}

    related_node_ids:
      - ControlGate
      - Gate
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-control-gate-001

  - id: control-gate-langgraph-interrupt
    labels:
      zh: ControlGate positive
      en: ControlGate positive
      ja: ControlGate positive
    descriptions:
      zh: Prefect 数据流编排映射 ControlGate：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps ControlGate: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect ControlGate: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {gate_id: gate-human-approval, gate_kind: approval}

    related_node_ids:
      - ControlGate
      - Gate
      - GateCondition
    related_relation_ids: []
    source_claims:
      - claim-control-gate-001

  - id: control-gate-guardrails-safety
    labels:
      zh: ControlGate positive
      en: ControlGate positive
      ja: ControlGate positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 ControlGate 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for ControlGate: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) ControlGate: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {gate_id: gate-content-safety, gate_kind: safety}

    related_node_ids:
      - ControlGate
      - Gate
      - DownstreamOperation
    related_relation_ids: []
    source_claims:
      - claim-control-gate-001

  - id: control-gate-opa-budget
    labels:
      zh: ControlGate positive
      en: ControlGate positive
      ja: ControlGate positive
    descriptions:
      zh: Temporal 持久化工作流映射 ControlGate：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps ControlGate: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal ControlGate: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {gate_id: gate:budget-check, gate_kind: control, decision_function_ref: "opa:bundle/budget/check@v2"}

    related_node_ids:
      - ControlGate
      - Gate
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-control-gate-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-control-gate-001
    source: langgraph-graph-api
    supports: ControlGate core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-control-gate-002
    source: opa-policy-language
    supports: ControlGate boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
