    - id: ControlGate-is_a-Gate-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 通用合规门不是控制门
        en: Generic compliance gate is not necessarily ControlGate
        ja: general compliance gate は ControlGate とは限らない
      scenario_id: routing-relation-controlgate-is_a-gate-boundary
      descriptions:
        zh: gate-compliance 只暴露可调用求值接口，未部署在编排边或节点。
        en: gate-compliance exposes a callable evaluation interface but is not deployed on an orchestration edge or node.
        ja: gate-compliance は callable evaluation interface のみで orchestration edge/node に配置されません。
      field_values: {}
      related_node_ids:
        - ControlGate
        - Gate
      related_relation_ids:
        - ControlGate-is_a-Gate
      expected_result:
        zh: 该对象仅应分类为通用 Gate，而不能分类为编排 ControlGate。
        en: Classify only as Gate.
        ja: Gate のみとします。
      why_valid_or_invalid:
        zh: 对象没有部署在编排控制点，因而缺少 ControlGate 的必要种差。
        en: The orchestration-control-point differentia is absent.
        ja: orchestration-control-point differentia がありません。
