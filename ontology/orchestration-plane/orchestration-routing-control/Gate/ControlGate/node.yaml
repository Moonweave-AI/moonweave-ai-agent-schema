schema: moonweave.ai/ontology-node/v1
id: ControlGate
kind: concept
labels:
  zh: 编排控制门
  en: orchestration control gate
  ja: オーケストレーション制御ゲート
semantics:
  short_definition:
    zh: 部署在编排控制点、求值 GateCondition 并约束下一步控制流的 Gate。
    en: A Gate deployed at an orchestration control point that evaluates GateCondition and constrains the next control-flow step.
    ja: orchestration control point に配置され GateCondition を evaluate して next control flow を constrain する Gate です。
  definition:
    zh: ControlGate 是 Gate 的子类，种差为部署在编排控制点：读取当前状态与证据、求值 GateCondition 并产生 GateOutcome，供 RoutingDecision 选择继续、阻断、重试、转向、升级或停止。Cursor Agent 模式在 rewrite/lint/typecheck/test 验证步骤前部署 ControlGate；LangGraph 节点后的质量检查同理。它不是所有 Gate 的上位类，也不是一次 GateOutcome。
    en: A ControlGate is a Gate distinguished by deployment at an orchestration control point, where it reads current state and evidence, evaluates GateCondition, and produces GateOutcome for RoutingDecision to continue, block, retry, redirect, escalate, or stop. Cursor agent mode deploys ControlGate before rewrite/lint/typecheck/test verification steps; LangGraph post-node quality checks follow the same pattern. It is neither the superclass of every Gate nor one GateOutcome.
    ja: ControlGate は orchestration control point に配置され state/evidence を読み GateCondition を evaluate して GateOutcome を生成し RoutingDecision が continue/block/retry/redirect/escalate/stop を選ぶ Gate subtype です。Cursor Agent モードは rewrite/lint/typecheck/test 前に ControlGate を配置します。
  why_needed:
    zh: 把编排控制点门控与领域专用门（如 CommitGate）分开，使质量、安全与验证门共享通用 Gate 身份而不倒置层级。
    en: Separating orchestration control gates from domain-specific gates such as CommitGate lets quality, safety, and verification gates share Gate identity without reversing the hierarchy.
    ja: orchestration control gate を domain-specific gate から分け quality/safety/verification gate が Gate identity を共有します。
  includes:
    - zh: 工作流步骤前的质量门、安全门、预算门、人工检查门、Cursor 验证门和结果验收门。
      en: Quality, safety, budget, human-review, Cursor verification, and result-acceptance gates before workflow steps.
      ja: workflow step 前の quality・safety・budget・human-review・Cursor verification・acceptance gate。
  excludes:
    - zh: 提交专用 CommitGate、工具审批专用门、条件规范和结果记录。
      en: A commit-specific CommitGate, tool-approval gate, condition specification, and outcome record.
      ja: commit-specific CommitGate・tool approval gate・condition spec・outcome record。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: 映射 Cursor Agent 多步验证（lint/typecheck/test 通过后 proceed）；LangGraph 节点输出后的 eval-score 阈值检查；OpenAI Agents SDK 在 handoff 前的 guardrail 检查。control_point_ref 应对应 graph 边或 agent 步骤 ID；GateCondition 引用可复用阈值规范；一次 eval 产生 GateOutcome 供 RoutingDecision 消费。
    en: Maps Cursor agent multi-step verification (proceed after lint/typecheck/test pass); LangGraph post-node eval-score threshold checks; OpenAI Agents SDK guardrail checks before handoffs. control_point_ref should match a graph edge or agent step ID; GateCondition references reusable threshold specs; one evaluation produces GateOutcome consumed by RoutingDecision.
    ja: Cursor Agent 多段検証、LangGraph post-node eval-score 閾値、OpenAI guardrail を写像します。control_point_ref は graph edge/agent step ID に対応し GateCondition は reusable threshold を参照します。
  typical_input:
    - description: Cursor agent verification gate after file rewrite.
      format: |
        control_point: after-rewrite-before-commit
        gate_condition_ref: gate-quality@5
        evidence:
          linter: pass
          typecheck: pass
          test: fail
          eval_score: 0.62
      source_claims: [claim-control-gate-design]
    - description: LangGraph node post-execution quality gate.
      format: |
        control_point_ref: after-draft-before-publish
        gate_ref: control-gate-4@3
        evidence_refs: [score-44, safety-decision-9]
      source_claims: [claim-control-gate-langgraph]
  typical_output:
    - description: GateOutcome from ControlGate evaluation.
      format: |
        {
          "gate_outcome_id": "gate-outcome-884",
          "gate_ref": "control-gate-4@3",
          "result": "redirect",
          "evidence_refs": ["score-44"]
        }
      source_claims: [claim-control-gate-design]
  reference_implementations:
    - name: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      description: Multi-step verification gates before proceed.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Post-node control gates on shared state evidence.
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: Guardrail checks before handoffs and tool calls.
structure:
  identity_keys: []
  fields:
    - id: control_point_ref
      labels:
        zh: 控制点引用
        en: control-point reference
        ja: control-point reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用门控能力部署的编排步骤或边。
        en: References the orchestration step or edge where the gate is deployed.
        ja: gate が配置される orchestration step/edge を参照します。
      allowed_values: []
      pattern: null
      example_value: after-draft-before-publish
      source_claims:
        - claim-control-gate-langgraph
  constraints: []
  required_relation_constraints: []
examples:
  - id: ControlGate-example-cursor-verification
    labels:
      zh: Cursor 验证控制门
      en: Cursor verification control gate
      ja: Cursor 検証制御ゲート
    descriptions:
      zh: control-gate-cursor-4 位于 rewrite-node-yaml 与 git-commit 之间，读取 lint/typecheck/test 证据并求值 gate-quality@5；eval-score-991=0.62 低于 0.80 产生 redirect。
      en: control-gate-cursor-4 sits between rewrite-node-yaml and git-commit, reads lint/typecheck/test evidence, evaluates gate-quality@5, and redirects when eval-score-991=0.62 is below 0.80.
      ja: control-gate-cursor-4 は rewrite と commit 間で lint/typecheck/test evidence を読み gate-quality@5 を evaluate し 0.62<0.80 で redirect します。
    example_source:
      product: Cursor Agent Mode
      url: https://docs.cursor.com/agent
      version: verification gates
    field_values:
      gate_id: control-gate-cursor-4
      gate_kind: control
      decision_function_ref: gate-quality@5
      version: "4"
      control_point_ref: after-rewrite-before-commit
    related_node_ids:
      - ControlGate
      - GateCondition
      - GateOutcome
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
      - ControlGate-produces-GateOutcome
    source_claims:
      - claim-control-gate-design
  - id: ControlGate-example-langgraph-quality
    labels:
      zh: LangGraph 发布前质量门
      en: LangGraph pre-publication quality gate
      ja: LangGraph 公開前品質ゲート
    descriptions:
      zh: control-gate-4 位于 draft 与 publish 节点之间，读取 score-44 与 safety-decision-9 并求值 gate-condition-4。
      en: control-gate-4 sits between draft and publish nodes, reads score-44 and safety-decision-9, and evaluates gate-condition-4.
      ja: control-gate-4 は draft/publish 間で score-44/safety-decision-9 を読み gate-condition-4 を evaluate します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: StateGraph node gates
    field_values:
      gate_id: control-gate-4
      gate_kind: evidence-threshold
      decision_function_ref: gate-condition-4
      version: "4"
      control_point_ref: after-draft-before-publish
    related_node_ids:
      - ControlGate
      - GateCondition
    related_relation_ids:
      - ControlGate-evaluates-GateCondition
    source_claims:
      - claim-control-gate-langgraph
  - id: ControlGate-example-boundary-commit-gate
    labels:
      zh: 提交确认门不是控制门
      en: Commit confirmation gate is not ControlGate
      ja: commit confirmation gate は ControlGate ではない
    descriptions:
      zh: commit-gate-2 只决定代码是否可提交，身份由 CommitRequest 与仓库状态决定，不选择编排下游目标。
      en: commit-gate-2 decides only whether code may be committed; its identity depends on CommitRequest and repository state and selects no orchestration target.
      ja: commit-gate-2 は commit 可否のみを決め orchestration target を選びません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: domain gate boundary
    field_values: {}
    related_node_ids:
      - CommitGate
      - ControlGate
    related_relation_ids: []
    source_claims:
      - claim-control-gate-design
parent_relation:
  id: ControlGate-is_a-Gate
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 编排控制门是一种 Gate；其种差是在编排控制点读取状态与证据、求值 GateCondition 并产生 GateOutcome。
    en: An orchestration ControlGate is a Gate, distinguished by evaluating GateCondition from state and evidence at an orchestration control point and producing GateOutcome.
    ja: ControlGate は Gate の一種で orchestration control point にて state/evidence から GateCondition を evaluate し GateOutcome を生成する点で区別します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系表达类型级语义，不在此规定实例基数。
    en: This relation expresses type-level semantics; instance cardinality is not fixed here.
    ja: type-level semantics を表すため instance cardinality はここで固定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ControlGate-is_a-Gate-example-positive
      kind: positive
      labels:
        zh: 发布前质量门继承 Gate
        en: Publication gate inherits Gate
        ja: 公開前品質ゲートは Gate を継承
      descriptions:
        zh: control-gate-4 具有 gate_id、决定函数、结果集合与控制点。
        en: control-gate-4 has gate ID, decision function, outcome set, and control point.
        ja: control-gate-4 は gate ID/function/outcomes/control point を持ちます。
      field_values: {}
      related_node_ids:
        - ControlGate
        - Gate
      related_relation_ids:
        - ControlGate-is_a-Gate
      source_claims:
        - claim-control-gate-design
  source_claims:
    - claim-control-gate-design
  endpoint_order: child-to-parent
relations:
  - id: ControlGate-evaluates-GateCondition
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 求值
      en: evaluates
      ja: 評価する
    definitions:
      zh: ControlGate 在编排控制点把冻结状态与证据绑定到 GateCondition 并执行阈值与缺失证据规则。
      en: A ControlGate binds frozen state and evidence to a GateCondition at an orchestration control point and executes threshold and missing-evidence rules.
      ja: ControlGate は orchestration control point で frozen state/evidence を GateCondition に bind し threshold/missing-evidence rule を実行します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
      ja: type-level semantics を表すため instance cardinality はここで固定しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 由其求值
        en: evaluated by
        ja: により評価される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ControlGate-evaluates-GateCondition-example-positive
        kind: positive
        labels:
          zh: 发布门求值质量条件
          en: Publication gate evaluates quality condition
          ja: 公開ゲートは品質条件を評価
        descriptions:
          zh: control-gate-4 对 gate-quality@5 读取 score-44 与 safety-decision-9。
          en: control-gate-4 evaluates gate-quality@5 using score-44 and safety-decision-9.
          ja: control-gate-4 は score-44/safety-decision-9 で gate-quality@5 を evaluate します。
        field_values: {}
        related_node_ids:
          - ControlGate
          - GateCondition
        related_relation_ids:
          - ControlGate-evaluates-GateCondition
        source_claims:
          - claim-control-gate-langgraph
    target: concept:GateCondition
  - id: ControlGate-produces-GateOutcome
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生
      en: produces
      ja: 生成する
    definitions:
      zh: ControlGate 完成 GateCondition 求值后产生可追踪 GateOutcome，记录结果、证据和产生时间。
      en: After GateCondition evaluation, ControlGate produces a traceable GateOutcome recording result, evidence, and production time.
      ja: ControlGate は GateCondition evaluation 後 result・evidence・time を持つ traceable GateOutcome を生成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达类型级语义，不在此规定实例基数。
      en: This relation expresses type-level semantics; instance cardinality is not fixed here.
