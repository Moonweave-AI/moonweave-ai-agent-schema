        en: produced by
        ja: により生成される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ControlGate-produces-GateOutcome-example-positive
        kind: positive
        labels:
          zh: 质量门产生转向结果
          en: Quality gate produces redirect outcome
          ja: 品質ゲートは redirect outcome を生成
        descriptions:
          zh: control-gate-4 因 score-44 低于阈值产生 gate-outcome-884=redirect。
          en: control-gate-4 produces gate-outcome-884=redirect because score-44 is below threshold.
          ja: control-gate-4 は score-44 below threshold により gate-outcome-884=redirect を生成します。
        field_values: {}
        related_node_ids:
          - ControlGate
          - GateOutcome
        related_relation_ids:
