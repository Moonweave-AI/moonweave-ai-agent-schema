          en: Create the ControlGate → GateCondition evaluation fact.
          ja: ControlGate → GateCondition evaluation fact を作成します。
        why_valid_or_invalid:
          zh: 具体门、条件版本和输入证据均已绑定。
          en: Concrete gate, condition revision, and input evidence are bound.
          ja: gate・condition revision・input evidence が bind されています。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-control-gate-001
          - claim-control-gate-002
      - id: ControlGate-evaluates-GateCondition-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 条件仅被配置但未求值
          en: Condition configured but not evaluated
          ja: condition configured but not evaluated
        scenario_id: routing-relation-controlgate-evaluates-gatecondition-boundary
        descriptions:
          zh: workflow@7 引用 gate-quality@5，但运行尚未到达控制点。
          en: workflow@7 references gate-quality@5 but runtime has not reached the control point.
          ja: workflow@7 は gate-quality@5 を参照しますが runtime は control point に未到達です。
        field_values: {}
        related_node_ids:
          - ControlGate
          - GateCondition
        related_relation_ids:
