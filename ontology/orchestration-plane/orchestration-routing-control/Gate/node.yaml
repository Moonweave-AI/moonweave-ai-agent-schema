schema: moonweave.ai/ontology-node/v1
id: Gate
kind: concept
labels:
  zh: 门控能力
  en: gate capability
  ja: gate capability
semantics:
  short_definition:
    zh: 在控制点求值条件并产生允许、阻断、转向或升级结果的通用能力。
    en: A general capability that evaluates conditions at a control point and produces allow, block, redirect, or escalate outcomes.
    ja: control point で condition を evaluate し allow/block/redirect/escalate outcome を生成する general capability。
  definition:
    zh: 门控能力是一种可复用能力，以门控标识、能力类型、决定函数和版本为身份，在控制点接收证据、求值条件并产生 GateOutcome。ControlGate 是其面向编排控制流的子类；具体 CommitGate 或 ToolApprovalGate 也可在各自域中继承 Gate。Gate 不是求值结果、条件规范或一次路由决定。
    en: A Gate is a reusable capability identified by gate ID, capability kind, decision function, and version. At a control point it receives evidence, evaluates conditions, and produces a GateOutcome. ControlGate is its orchestration-control-flow subtype, while domain gates such as CommitGate or ToolApprovalGate may also inherit Gate. A Gate is not an outcome, condition specification, or one routing decision.
    ja: Gate は gate ID・capability kind・decision function・version で識別する reusable capability で control point にて evidence を受け condition を evaluate し GateOutcome を生成します。ControlGate は orchestration subtype で Gate は outcome/condition/decision ではありません。
  why_needed:
    zh: 以 Gate 为上位概念可让编排门、提交门和审批门共享真实能力语义，而不倒置父子。
    en: Using Gate as the genus lets orchestration, commit, and approval gates share genuine capability semantics without reversing parent and child.
    ja: Gate を genus とし orchestration/commit/approval gate が genuine capability semantics を共有し parent-child inversion を防ぎます。
  includes:
    - zh: 能够接收条件与证据、执行求值并给出可审计结果的控制点能力。
      en: Control-point capabilities that receive conditions and evidence, evaluate them, and return auditable outcomes.
      ja: condition/evidence を受け evaluate し auditable outcome を返す control-point capability。
  excludes:
    - zh: 普通布尔字段、分支条件文本、一次允许结果和只在页面上分隔社区的视觉节点。
      en: A plain Boolean field, branch-condition text, one allow outcome, and a visual node used only to separate communities.
      ja: plain Boolean・branch condition text・one allow outcome・visual community separator。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: >-
      Gate 实现为可注册的门控服务：LangGraph conditional_edges 的路由函数可委托 Gate.decision_function 求值；
      OPA Rego 包可实现同一 decision_function 契约。求值产生 GateOutcome 事件供 RoutingDecision 引用，Gate
      revision 不因单次 allow/block 改变；Send(node_name, state) 派发的是运行时动作，不是 Gate 能力定义。
    en: >-
      Gate implements as a registrable gate service: LangGraph conditional_edges routing functions may delegate to
      Gate.decision_function; OPA Rego packages may implement the same contract. Evaluation emits GateOutcome events for
      RoutingDecision reference; Gate revision does not change from one allow/block. Send(node_name, state) dispatches
      runtime action, not Gate capability definition.
    ja: >-
      Gate は registrable gate service として実装する。LangGraph conditional_edges の routing function は
      Gate.decision_function に委譲でき、OPA Rego package も同一 contract を実装できる。evaluation は GateOutcome event
      を emit し RoutingDecision が参照する。Gate revision は一回の allow/block で変わらない。Send(node_name, state) は
      runtime action を dispatch し Gate capability 定義ではない。
  typical_input:
    - description:
        zh: 控制点提交的 GateCondition 与证据载荷。
        en: GateCondition and evidence payload submitted at a control point.
        ja: control point で submit された GateCondition と evidence payload。
      format: |-
        {"gate_id":"gate:budget-check@2","version":"2","control_point_ref":"cp:pre-tool-call","condition_ref":"cond:max-cost@1","evidence":{"estimated_cost_usd":12.5,"state":{"risk":"medium"}}}
  typical_output:
    - description:
        zh: 一次门控求值产生的 GateOutcome，不是 Gate 定义本身。
        en: A GateOutcome from one gate evaluation, not the Gate definition itself.
        ja: 一回 gate evaluation が生成した GateOutcome。Gate 定義自体ではない。
      format: |-
        {"gate_outcome_id":"go-884","gate_ref":"gate:budget-check@2","result":"allow","evidence_refs":["cost-estimate@3"],"produced_at":"2026-07-16T09:12:00Z"}
  reference_implementations:
    - name: LangGraph conditional edges
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents routing functions that may wrap gate evaluation before selecting targets.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents declarative decision functions over structured evidence input.
    - name: LangGraph Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents dynamic node dispatch as runtime action distinct from gate capability specs.
  source_claims:
    - claim-gate-001
    - claim-gate-002
structure:
  identity_keys:
    - gate_id
    - version
  fields:
    - id: gate_id
      labels:
        zh: 门控标识
        en: gate ID
        ja: gate ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一种门控能力。
        en: Stably identifies one gate capability.
        ja: one gate capability を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: gate-support-quality
      source_claims:
        - claim-gate-001
    - id: gate_kind
      labels:
        zh: 门控类型
        en: gate kind
        ja: gate kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 control、commit、approval 或 safety 等能力类型。
        en: Declares a capability kind such as control, commit, approval, or safety.
        ja: control・commit・approval・safety 等 capability kind。
      allowed_values: []
      pattern: null
      example_value: control
      source_claims:
        - claim-gate-001
    - id: decision_function_ref
      labels:
        zh: 决定函数引用
        en: decision-function reference
        ja: decision-function reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行条件求值的版本化函数或策略入口。
        en: References the versioned function or policy entry point performing evaluation.
        ja: condition evaluation を行う versioned function/policy entry を参照します。
      allowed_values: []
      pattern: null
      example_value: quality-gate-evaluator@3
      source_claims:
        - claim-gate-001
    - id: version
      labels:
        zh: 能力版本
        en: capability version
        ja: capability version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定门控输入、输出与求值语义的版本。
        en: Fixes a revision of gate input, output, and evaluation semantics.
        ja: gate input/output/evaluation semantics の revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-gate-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: gate-opa-quality-evaluator
    labels:
      zh: Gate positive
      en: Gate positive
      ja: Gate positive
    descriptions:
      zh: Prefect 数据流编排映射 Gate：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps Gate: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect Gate: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {gate_id: gate-support-quality, gate_kind: control, decision_function_ref: "quality-gate-evaluator@3", version: 3}

    related_node_ids:
      - Gate
      - ControlGate
      - GateCondition
    related_relation_ids: []
    source_claims:
      - claim-gate-001

  - id: gate-langgraph-interrupt-human
    labels:
      zh: Gate positive
      en: Gate positive
      ja: Gate positive
    descriptions:
      zh: Temporal 持久化工作流映射 Gate：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps Gate: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal Gate: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {gate_id: gate-human-approval, gate_kind: approval, decision_function_ref: "langgraph:interrupt@1"}

    related_node_ids:
      - Gate
      - ControlGate
    related_relation_ids: []
    source_claims:
      - claim-gate-001

  - id: gate-guardrails-ai-validator
    labels:
      zh: Gate positive
      en: Gate positive
      ja: Gate positive
    descriptions:
      zh: Reflexion (Shinn et al., 2023) 对 Gate 实现执行→失败→verbal self-reflection→重试：reflexion_agent.run() → if failed: reflect(trajectory) → retry with reflection；AlfWorld 上 verbal feedback 提升成功率。
      en: Reflexion (Shinn et al., 2023) for Gate: run() → if failed: reflect(trajectory) → retry with reflection; verbal feedback improves AlfWorld success rate.
      ja: Reflexion (Shinn et al., 2023) Gate: run→failed→reflect(trajectory)→retry；AlfWorld 成功率向上。
    field_values: {gate_id: gate-content-safety, gate_kind: safety, decision_function_ref: "guardrails:validator@2"}

    related_node_ids:
      - Gate
      - GateOutcome
    related_relation_ids: []
    source_claims:
      - claim-gate-002

  - id: gate-nemo-guardrails-colang
    labels:
      zh: Gate positive
      en: Gate positive
      ja: Gate positive
    descriptions:
      zh: Prefect 数据流编排映射 Gate：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps Gate: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect Gate: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {gate_id: gate-competitor-policy, gate_kind: control, decision_function_ref: "nemo:rails/competitor@1"}

    related_node_ids:
      - Gate
      - ControlGate
    related_relation_ids: []
    source_claims:
      - claim-gate-002

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://langchain-ai.github.io/langgraph/reference/graphs/
    source_type: official-doc
    relevance: Defines conditional edges, Command routing, nodes, END, and graph control flow.
  - id: opa-policy-language
    title: Open Policy Agent - Policy Language
    url: https://www.openpolicyagent.org/docs/latest/
    source_type: official-doc
    relevance: Defines declarative policy evaluation for gate and routing decisions over structured input.
source_claims:
  - id: claim-gate-001
    source: langgraph-graph-api
    supports: Gate core identity and classification criteria align with LangGraph Graph API definitions for orchestration control structures.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: normative
    confidence: high
  - id: claim-gate-002
    source: opa-policy-language
    supports: Gate boundary from adjacent orchestration concepts is supported by Open Policy Agent - Policy Language separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Conditional edges; Command routing; policy evaluation
    evidence_kind: official
    confidence: high
