schema: moonweave.ai/ontology-node/v1
id: Gate
kind: concept
status: review
labels:
  zh: 门控能力
  en: gate capability
  ja: gate capability
semantics:
  short_definition:
    zh: 在控制点求值条件并产生允许、阻断、转向或升级结果的通用能力。
    en: A general capability that evaluates conditions at a control point and produces allow, block, redirect, or escalate outcomes.
    ja: control point で condition を evaluate し allow/block/redirect/escalate outcome を生成する general capability。
  definition:
    zh: 门控能力是一种可复用能力，以门控标识、能力类型、决定函数和版本为身份，在控制点接收证据、求值条件并产生 GateOutcome。ControlGate 是其面向编排控制流的子类；具体 CommitGate 或 ToolApprovalGate 也可在各自域中继承 Gate。Gate 不是求值结果、条件规范或一次路由决定。
    en: A Gate is a reusable capability identified by gate ID, capability kind, decision function, and version. At a control point it receives evidence, evaluates conditions, and produces a GateOutcome. ControlGate is its orchestration-control-flow subtype, while domain gates such as CommitGate or ToolApprovalGate may also inherit Gate. A Gate is not an outcome, condition specification, or one routing decision.
    ja: Gate は gate ID・capability kind・decision function・version で識別する reusable capability で control point にて evidence を受け condition を evaluate し GateOutcome を生成します。ControlGate は orchestration subtype で Gate は outcome/condition/decision ではありません。
  why_needed:
    zh: 以 Gate 为上位概念可让编排门、提交门和审批门共享真实能力语义，而不倒置父子。
    en: Using Gate as the genus lets orchestration, commit, and approval gates share genuine capability semantics without reversing parent and child.
    ja: Gate を genus とし orchestration/commit/approval gate が genuine capability semantics を共有し parent-child inversion を防ぎます。
  includes:
    - zh: 能够接收条件与证据、执行求值并给出可审计结果的控制点能力。
      en: Control-point capabilities that receive conditions and evidence, evaluate them, and return auditable outcomes.
      ja: condition/evidence を受け evaluate し auditable outcome を返す control-point capability。
  excludes:
    - zh: 普通布尔字段、分支条件文本、一次允许结果和只在页面上分隔社区的视觉节点。
      en: A plain Boolean field, branch-condition text, one allow outcome, and a visual node used only to separate communities.
      ja: plain Boolean・branch condition text・one allow outcome・visual community separator。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - gate_id
    - version
  fields:
    - id: gate_id
      labels:
        zh: 门控标识
        en: gate ID
        ja: gate ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一种门控能力。
        en: Stably identifies one gate capability.
        ja: one gate capability を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: gate-support-quality
      source_claims:
        - claim-gate-001
    - id: gate_kind
      labels:
        zh: 门控类型
        en: gate kind
        ja: gate kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 control、commit、approval 或 safety 等能力类型。
        en: Declares a capability kind such as control, commit, approval, or safety.
        ja: control・commit・approval・safety 等 capability kind。
      allowed_values: []
      pattern: null
      example_value: control
      source_claims:
        - claim-gate-001
    - id: decision_function_ref
      labels:
        zh: 决定函数引用
        en: decision-function reference
        ja: decision-function reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行条件求值的版本化函数或策略入口。
        en: References the versioned function or policy entry point performing evaluation.
        ja: condition evaluation を行う versioned function/policy entry を参照します。
      allowed_values: []
      pattern: null
      example_value: quality-gate-evaluator@3
      source_claims:
        - claim-gate-001
    - id: version
      labels:
        zh: 能力版本
        en: capability version
        ja: capability version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定门控输入、输出与求值语义的版本。
        en: Fixes a revision of gate input, output, and evaluation semantics.
        ja: gate input/output/evaluation semantics の revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-gate-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: Gate-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 质量控制门能力
      en: Quality-control gate capability
      ja: quality-control gate capability
    scenario_id: null
    descriptions:
      zh: gate-support-quality@3 接受质量分、人工覆盖和安全状态，调用 evaluator@3，返回 allow、block、redirect 或 escalate。
      en: gate-support-quality@3 accepts quality score, human override, and safety state, invokes evaluator@3, and returns allow, block, redirect, or escalate.
      ja: gate-support-quality@3 は quality score・human override・safety state を受け evaluator@3 で allow/block/redirect/escalate を返します。
    field_values:
      gate_id: gate-support-quality
      gate_kind: control
      decision_function_ref: quality-gate-evaluator@3
      version: "3"
    related_node_ids:
      - Gate
      - ControlGate
    related_relation_ids:
      - ControlGate-is_a-Gate
    expected_result:
      zh: 建立通用 Gate，并让 ControlGate 继承它。
      en: Create the general Gate and let ControlGate inherit it.
      ja: general Gate を作り ControlGate が継承します。
    why_valid_or_invalid:
      zh: 具有可重用求值接口和结果集合，不是某次结果。
      en: It has a reusable evaluation interface and outcome set rather than one result.
      ja: reusable evaluation interface/outcome set を持ち one result ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-001
      - claim-gate-002
  - id: Gate-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 允许结果
      en: Allow outcome
      ja: allow outcome
    scenario_id: routing-review-gate-boundary
    descriptions:
      zh: outcome-884 记录某次求值为 allow、证据摘要和 04:20 时间，但没有可调用求值能力。
      en: outcome-884 records allow, an evidence digest, and 04:20 for one evaluation, but provides no callable evaluation capability.
      ja: outcome-884 は one evaluation の allow・evidence digest・04:20 を記録しますが callable capability はありません。
    field_values: {}
    related_node_ids:
      - GateOutcome
      - Gate
    related_relation_ids: []
    expected_result:
      zh: 分类为 GateOutcome，不分类为 Gate。
      en: Classify it as GateOutcome, not Gate.
      ja: GateOutcome とし Gate にはしません。
    why_valid_or_invalid:
      zh: 结果是能力一次执行的产物，不是能力本身。
      en: An outcome is a product of one capability execution, not the capability itself.
      ja: outcome は capability execution product で capability 自体ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-gate-002
