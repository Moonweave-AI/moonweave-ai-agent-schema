schema: moonweave.ai/ontology-node/v1
id: VoteBallot
kind: concept
labels:
  zh: 投票选票
  en: Vote Ballot
  ja: 投票バロット
semantics:
  short_definition:
    zh: 一个可被本地投票活动消费的独立、可归因选择输入实体。
    en: An independent attributable choice input entity consumable by a local voting activity.
    ja: ローカル投票活動が消費できる、独立した帰属可能な選択入力エンティティ。
  definition:
    zh: >-
      VoteBallot 是 Moonweave 的独立本地输入实体，记录一个已识别投票者针对一个已识别候选或结果标签作出的选择，以及可选理由和来源引用。它可被 VotingActivity 消费并由 VotingRule 评估，但不因被消费而成为 CompositionArtifact、CompositionOutput 或活动的组成部分。它不是 LangGraph State reducer、OpenAI Agents SDK structured output、A2A Message、MCP content 或 self-consistency 研究的原生数据类型。SDK 输出或图状态更新可作为 ballot 的来源被引用，但不因此改变其原生类型。
    en: >-
      A VoteBallot is Moonweave's independent local input entity recording a choice made by one identified voter for one identified candidate or result label, together with optional rationale and source reference. A VotingActivity may consume it and a VotingRule may evaluate it, but consumption does not make it a CompositionArtifact, a CompositionOutput, or a structural part of the activity. It is not a LangGraph State reducer, an OpenAI Agents SDK structured output, an A2A Message, MCP content, or a native data type from self-consistency research. An SDK output or graph-state update can be cited as a ballot source without changing its native type.
    ja: >-
      VoteBallot は Moonweave の独立したローカル入力エンティティであり、識別された投票者が識別された候補または結果ラベルに対して行った選択と、任意の理由・出所参照を記録します。VotingActivity はこれを消費でき、VotingRule は評価できますが、消費されたことだけで CompositionArtifact、CompositionOutput、または活動の構成部品にはなりません。これは LangGraph State reducer、OpenAI Agents SDK structured output、A2A Message、MCP content、self-consistency 研究のネイティブデータ型ではありません。SDK 出力またはグラフ状態更新を ballot の出所として参照できますが、そのネイティブ型は変わりません。
  why_needed:
    zh: >-
      多个评审者或多次采样产生相同标签时，聚合计数本身无法说明谁投了什么、是否重复、是否来自允许的候选。显式选票让阈值、权重和冲突处理能被检查，并保留少数意见而非只保存获胜答案。
    en: >-
      When several reviewers or samples produce the same label, an aggregate count alone cannot show who chose what, whether a vote was duplicated, or whether it came from an allowed candidate. Explicit ballots make thresholds, weights, and conflict handling inspectable and retain minority opinions instead of saving only the winner.
    ja: >-
      複数のレビュー担当者やサンプルが同じラベルを出すと、集計数だけでは誰が何を選んだか、重複投票か、許可候補から来たかを示せません。明示的な ballot により、しきい値、重み、競合処理を検査でき、勝者だけでなく少数意見も保持できます。
  includes:
    - zh: 一个 voter 对一个 candidate_ref 的带来源、可检查选择记录。
      en: A provenance-bearing, inspectable selection by one voter for one candidate_ref.
      ja: 一人の voter が一つの candidate_ref に対して行う、出所付きで検査可能な選択記録。
    - zh: 从实际并行节点结果或 Agent 结构化结果投影出的独立本地输入实体。
      en: An independent local input entity projected from actual parallel-node results or Agent structured results.
      ja: 実際の並列ノード結果または Agent 構造化結果から投影された独立ローカル入力エンティティ。
  excludes:
    - zh: 汇总票数、最终胜者、匿名意见列表、无候选引用的评分、VotingRule 本身，或仅因被消费就被称作 CompositionArtifact 的记录。
      en: An aggregate count, the final winner, an anonymous opinion list, a score without candidate reference, VotingRule itself, or a record called a CompositionArtifact merely because it is consumed.
      ja: 集計数、最終勝者、匿名意見リスト、候補参照のないスコア、VotingRule 自体、または消費されたことだけで CompositionArtifact と呼ばれる記録。
    - zh: 自我一致论文中的抽样推理路径本身；该论文是方法证据，不定义本地 ballot 架构。
      en: A sampled reasoning path from self-consistency research itself; that paper is method evidence and does not define the local ballot schema.
      ja: self-consistency 研究のサンプル推論経路そのもの。この論文は手法の証拠であり、ローカル ballot スキーマを定義しない。
  semantic_kind: entity
engineering:
  explanation:
    zh: >-
      LangGraph 可在出边并行执行多个节点；每个节点可返回独立状态更新。Agents SDK 可让多个专业 Agent 作为工具或 handoff 参与运行。投票适配器从每个已保存结果建立一个独立 VoteBallot 输入实体，使用 voter_ref 和 candidate_ref 去重；VotingActivity 消费经验证的 ballot 并应用本地 VotingRule。该过程不要求任何框架提供 VoteBallot 类。
    en: >-
      LangGraph can execute multiple destination nodes in parallel, and each node can return an independent state update. The Agents SDK can involve multiple specialist Agents as tools or handoffs. A voting adapter creates one independent VoteBallot input entity from each persisted result and deduplicates with voter_ref and candidate_ref; VotingActivity consumes validated ballots and applies a local VotingRule. This does not require any framework to provide a VoteBallot class.
    ja: >-
      LangGraph は複数の宛先ノードを並列実行でき、各ノードは独立した状態更新を返せます。Agents SDK は複数の専門 Agent をツールまたは handoff として実行に参加させられます。投票アダプターは永続化済みの各結果から独立した VoteBallot 入力エンティティを作り、voter_ref と candidate_ref で重複を除きます。VotingActivity は検証済み ballot を消費してローカル VotingRule を適用します。この過程はどのフレームワークにも VoteBallot クラスを要求しません。
  typical_input:
    - description:
        zh: LangGraph 的两个并行评审节点各自返回候选选择。
        en: Two parallel LangGraph review nodes each return a candidate selection.
        ja: 二つの並列 LangGraph レビューノードがそれぞれ候補選択を返す。
      format: |-
        def legal_review(state: State):
            return {"legal_choice": "approve"}

        def security_review(state: State):
            return {"security_choice": "approve"}
    - description:
        zh: Agents SDK Agent 以结构化输出返回一个选择。
        en: An Agents SDK Agent returns one choice as structured output.
        ja: Agents SDK Agent が構造化出力として一つの選択を返す。
      format: |-
        reviewer = Agent(name="Reviewer", output_type=ReviewChoice)
        result = await Runner.run(reviewer, "Choose approve or reject for candidate out-42.")
  typical_output:
    - description:
        zh: 一个本地、可归因的投票输入实体。
        en: A local attributable ballot input entity.
        ja: ローカルで帰属可能な ballot 入力エンティティ。
      format: |-
        {"ballot_id":"ballot-legal-42","voter_ref":"node:legal_review","candidate_ref":"out-42","choice":"approve","rationale_ref":"store://runs/42/legal-rationale.txt","source_ref":"langgraph:state:legal_choice"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents parallel destination execution and node state updates.
    - name: OpenAI Agents SDK agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents Agent configuration including structured outputs, tools, and handoffs.
    - name: Self-Consistency paper
      url: https://arxiv.org/abs/2203.11171
      description: Describes sampling diverse reasoning paths and selecting the most consistent answer.
structure:
  identity_keys:
    - ballot_id
  fields:
    - id: ballot_id
      labels:
        zh: 选票标识
        en: Ballot identifier
        ja: バロット識別子
      definitions:
        zh: 稳定标识一条本地投票选择记录。
        en: Stably identifies one local voting choice record.
        ja: 一件のローカル投票選択記録を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: ballot-legal-42
    - id: voter_ref
      labels:
        zh: 投票者引用
        en: Voter reference
        ja: 投票者参照
      definitions:
        zh: 指向作出该选择的本地分支、活动或已识别 Agent。
        en: Points to the local branch, activity, or identified Agent that made the choice.
        ja: 選択を行ったローカル分岐、活動、または特定された Agent を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: "node:legal_review"
    - id: candidate_ref
      labels:
        zh: 候选引用
        en: Candidate reference
        ja: 候補参照
      definitions:
        zh: 指向被投票的 CompositionOutput 或受限结果标签。
        en: Points to the CompositionOutput or constrained result label being voted on.
        ja: 投票対象の CompositionOutput または制約された結果ラベルを指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: out-42
    - id: choice
      labels:
        zh: 选择值
        en: Choice value
        ja: 選択値
      definitions:
        zh: 记录投票者对候选作出的离散选择，例如 approve 或 reject。
        en: Records the voter's discrete choice for the candidate, such as approve or reject.
        ja: approve または reject など、候補に対する投票者の離散選択を記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: approve
    - id: rationale_ref
      labels:
        zh: 理由引用
        en: Rationale reference
        ja: 理由参照
      definitions:
        zh: 可选地指向保存的理由或证据，不把推理文本视为投票本身。
        en: Optionally points to persisted rationale or evidence without treating reasoning text as the ballot itself.
        ja: 推論テキストを ballot 自体と扱わず、任意で永続化された理由または証拠を指す。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      example_value: "store://runs/42/legal-rationale.txt"
    - id: source_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: 出所参照
      definitions:
        zh: 指向实际图更新、SDK 输出或应用决定记录。
        en: Points to the actual graph update, SDK output, or application decision record.
        ja: 実際のグラフ更新、SDK 出力、アプリケーション決定記録を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: "langgraph:state:legal_choice"
  constraints:
    - id: vote-ballot-one-voter-one-candidate
      severity: error
      language: plain
      expression: A ballot must identify one voter_ref, one candidate_ref, and one choice; the same voter and candidate may appear at most once per voting activity.
      explanation:
        zh: 这使重复票、匿名票和候选漂移可被检测。
        en: This makes duplicate votes, anonymous votes, and candidate drift detectable.
        ja: これにより重複投票、匿名投票、候補のすり替えを検出できる。
      source_claims:
        - claim-vote-ballot-local
    - id: vote-ballot-keeps-source-boundary
      severity: error
      language: plain
      expression: source_ref must retain the native source type, and VoteBallot must remain a Moonweave-local input entity rather than a framework, paper-native type, or CompositionArtifact created solely by consumption.
      explanation:
        zh: 方法论文和 SDK 能提供运行证据，但不提供本地选票架构名称。
        en: Method research and SDKs can supply execution evidence but do not supply the local ballot-schema name.
        ja: 手法研究と SDK は実行証拠を与えられるが、ローカル ballot スキーマ名を与えるものではない。
      source_claims:
        - claim-vote-ballot-langgraph
        - claim-vote-ballot-openai
        - claim-vote-ballot-self-consistency
  required_relations: []
examples:
  - id: vote-ballot-positive-attributed-choice
    labels:
      zh: VoteBallot positive
      en: VoteBallot positive
      ja: VoteBallot positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 VoteBallot：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps VoteBallot: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が VoteBallot 多 agent 協調に写像。
    field_values: {ballot_id: ballot-legal-42, voter_ref: node:legal_review, candidate_ref: out-42, choice: approve, rationale_ref: "store://runs/42/legal-rationale.txt", source_ref: langgraph:state:legal_choice}

    related_node_ids:
      - VoteBallot
      - VotingActivity
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
    source_claims:
      - claim-vote-ballot-langgraph
      - claim-vote-ballot-local

  - id: vote-ballot-counterexample-anonymous-score
    labels:
      zh: VoteBallot counterexample
      en: VoteBallot counterexample
      ja: VoteBallot counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 VoteBallot；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style VoteBallot; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 VoteBallot として拒否。
    field_values: {ballot_id: null, voter_ref: null, candidate_ref: null, choice: null, rationale_ref: null, source_ref: application:score:8}

    related_node_ids:
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-vote-ballot-local

  - id: vote-ballot-boundary-sdk-structured-output
    labels:
      zh: VoteBallot boundary
      en: VoteBallot boundary
      ja: VoteBallot boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 VoteBallot 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not VoteBallot work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で VoteBallot work_specification ではない。
    field_values: {ballot_id: ballot-sdk-9, voter_ref: agent:reviewer, candidate_ref: out-42, choice: reject, rationale_ref: "store://runs/9/rationale.txt", source_ref: openai-agents-sdk:RunResult:9}

    related_node_ids:
      - VoteBallot
      - VotingActivity
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
    source_claims:
      - claim-vote-ballot-openai
      - claim-vote-ballot-local

  - id: vote-ballot-instance-self-consistency-projection
    labels:
      zh: VoteBallot instance
      en: VoteBallot instance
      ja: VoteBallot instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 VoteBallot DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to VoteBallot DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が VoteBallot に写像。
    field_values: {ballot_id: ballot-sample-3, voter_ref: run:sample-3, candidate_ref: answer-17, choice: answer-17, rationale_ref: null, source_ref: application:self-consistency:sample-3}

    related_node_ids:
      - VoteBallot
      - VotingActivity
      - VotingRule
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
    source_claims:
      - claim-vote-ballot-self-consistency
      - claim-vote-ballot-local

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API overview
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents parallel destination execution and node state updates.
  - id: openai-agents-agents
    title: OpenAI Agents SDK agents
    url: https://openai.github.io/openai-agents-python/agents/
    source_type: official-doc
    relevance: Documents Agents, structured outputs, tools, and handoffs.
  - id: self-consistency-paper
    title: Self-Consistency Improves Chain of Thought Reasoning in Language Models
    url: https://arxiv.org/abs/2203.11171
    source_type: research-paper
    relevance: Describes sampling diverse reasoning paths and selecting the most consistent answer.
source_claims:
  - id: claim-vote-ballot-langgraph
    source: langgraph-graph-api
    supports: LangGraph documents that multiple outgoing edges execute destination nodes in parallel and nodes return state updates.
    locator: Graph API overview, Edges and Nodes
    evidence_kind: normative
    confidence: high
  - id: claim-vote-ballot-openai
    source: openai-agents-agents
    supports: The OpenAI Agents SDK documents Agent configuration with output types, tools, and handoffs.
    locator: Agents, basic configuration and output types
    evidence_kind: normative
    confidence: high
  - id: claim-vote-ballot-self-consistency
    source: self-consistency-paper
    supports: The self-consistency method samples diverse reasoning paths and selects the most consistent answer after marginalizing sampled paths.
    locator: Abstract
    evidence_kind: empirical
    confidence: high
  - id: claim-vote-ballot-local
    source: self-consistency-paper
    supports: VoteBallot identity, attribution, and independent input-entity boundary are Moonweave design choices; the paper does not define this schema.
    locator: Abstract
    evidence_kind: design-inference
    confidence: high
