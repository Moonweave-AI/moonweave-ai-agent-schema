schema: moonweave.ai/ontology-node/v1
id: MergeRule
kind: concept
status: review
labels:
  zh: 内容合并规则
  en: content merge rule
  ja: 内容マージ規則
semantics:
  short_definition:
    zh: 用合并键、重复项策略、字段冲突策略和输出顺序组合结构化内容的聚合规则。
    en: An aggregation rule combining structured content through a merge key, duplicate policy, field-conflict policy, and output-order policy.
    ja: merge key・duplicate policy・field-conflict policy・output-order policy で structured content を結合する aggregation rule です。
  definition:
    zh: 内容合并规则是 AggregationRule 的下位类型；它继承输入资格、聚合方法、完成与一般冲突语义，并以记录身份键、重复记录处置、同字段不兼容值处置和结果排序为种差。它是可复用的组合规范，不是某次合并活动、合并后的工件，也不通过选票阈值裁决。
    en: A MergeRule is an AggregationRule subtype inheriting input eligibility, method, completion, and general conflict semantics and distinguished by record identity key, duplicate-record treatment, incompatible field-value treatment, and result ordering. It is a reusable composition specification, not a merge activity, merged artifact, or ballot-threshold adjudication.
    ja: MergeRule は input eligibility・method・completion・general conflict semantics を継承し、record identity key・duplicate record treatment・incompatible field-value treatment・result ordering を種差とする AggregationRule 下位型です。merge activity・merged artifact・ballot threshold adjudication ではありません。
  why_needed:
    zh: 显式区分重复记录、字段冲突与结果顺序，才能避免实现把 JSON 对象覆盖、列表拼接或“最后写入胜出”误当成同一种聚合语义。
    en: Separating duplicate records, field conflicts, and result order prevents implementations from treating object overwrite, list concatenation, and last-write-wins as the same aggregation semantics.
    ja: duplicate record・field conflict・result order を分けることで object overwrite・list concatenation・last-write-wins を同一 semantics と誤認しません。
  includes:
    - zh: 按稳定键汇集结构化记录、拒绝或归并重复项、对字段冲突作显式决定并确定输出顺序的可版本化规范。
      en: Versioned specifications that collect structured records by stable key, reject or consolidate duplicates, decide field conflicts explicitly, and determine output order.
      ja: stable key で structured record を集め、duplicate を reject/consolidate、field conflict を明示処理し output order を定める versioned specification。
  excludes:
    - zh: 法定人数与胜出阈值、实际输入记录集合、一次合并运行、合并输出，以及未声明重复和顺序语义的偶然覆盖行为。
      en: Quorum and winning thresholds, concrete input-record sets, one merge run, merged output, and accidental overwrite behavior without declared duplicate and ordering semantics.
      ja: quorum/winning threshold・concrete input set・one merge run・merged output、および duplicate/order semantics を宣言しない偶発的 overwrite。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: merge_key
      labels:
        zh: 合并键
        en: merge key
        ja: merge key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定判断两项是否代表同一逻辑记录的稳定字段或复合键。
        en: Names the stable field or compound key used to decide whether two items represent the same logical record.
        ja: 二 item が同じ logical record を表すか判断する stable field または compound key を指定します。
      allowed_values: []
      pattern: null
      example_value: section_id
      source_claims:
        - claim-merge-rule-002
    - id: duplicate_policy
      labels:
        zh: 重复项策略
        en: duplicate policy
        ja: duplicate policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定同一合并键出现多个输入项时拒绝、去重、择版或保留多值，并给出判定前提。
        en: Specifies reject, deduplicate, select-version, or retain-multiple behavior when several inputs share a merge key, including its preconditions.
        ja: 同一 merge key の複数 input を reject・deduplicate・select-version・retain-multiple のどれで扱うかと前提を規定します。
      allowed_values: []
      pattern: null
      example_value: reject duplicates unless one is an explicitly superseding revision
      source_claims:
        - claim-merge-rule-003
    - id: field_conflict_policy
      labels:
        zh: 字段冲突策略
        en: field conflict policy
        ja: field conflict policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定同一逻辑记录的同一字段出现不兼容非空值时如何拒绝、择版、保留多值或升级人工处理。
        en: Specifies rejection, version selection, multivalue retention, or escalation when one field of the same logical record has incompatible non-null values.
        ja: 同一 logical record の一 field に incompatible non-null value がある場合の reject・version selection・multivalue retention・escalation を規定します。
      allowed_values: []
      pattern: null
      example_value: accept a newer revision only when its provenance names the superseded revision; otherwise escalate
      source_claims:
        - claim-merge-rule-004
    - id: order_policy
      labels:
        zh: 结果顺序策略
        en: result order policy
        ja: result order policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定合并结果是无序映射还是按明确字段稳定排序，禁止把输入或序列化器的偶然顺序当作语义。
        en: Declares whether the result is an unordered mapping or stably sorted by an explicit field, rather than treating incidental input or serializer order as semantic.
        ja: result を unordered mapping とするか明示 field で stable sort するかを定め、input/serializer の偶然の順序を semantics にしません。
      allowed_values: []
      pattern: null
      example_value: ascending section_ordinal, then section_id
      source_claims:
        - claim-merge-rule-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: MergeRule-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 审阅章节稳定合并
      en: Stable merge of reviewed sections
      ja: reviewed section stable merge
    scenario_id: null
    descriptions:
      zh: reviewed-section-merge@4 以 section_id 识别章节；默认拒绝重复项，仅当新记录的 provenance 明确指向被替代修订时择新；不兼容字段否则升级人工处理，最终按 section_ordinal、section_id 稳定排序。
      en: reviewed-section-merge@4 identifies sections by section_id, rejects duplicates unless a newer record's provenance explicitly names the superseded revision, escalates other incompatible fields, and sorts by section_ordinal then section_id.
      ja: reviewed-section-merge@4 は section_id で識別し、new record provenance が superseded revision を明示する場合のみ新 revision を選び、他の incompatible field は escalate、section_ordinal と section_id で stable sort します。
    field_values:
      composition_specification_id: reviewed-section-merge
      version: "4"
      valid_from: 2026-07-16T00:00:00Z
      eligible_input_type: ReviewedCompositionArtifact
      aggregation_method: keyed-merge
      completion_policy: close when every assigned section arrives or its deadline expires
      conflict_policy: select only a provenance-proven superseding revision; otherwise escalate
      merge_key: section_id
      duplicate_policy: reject unless provenance proves explicit supersession
      field_conflict_policy: select proven superseding revision; otherwise escalate
      order_policy: ascending section_ordinal, then section_id
    related_node_ids:
      - MergeRule
      - AggregationRule
      - CompositionArtifact
    related_relation_ids:
      - MergeRule-is_a-AggregationRule
    expected_result:
      zh: 相同输入在任意到达顺序下产生同一有序结果，无法证明的冲突不会被静默覆盖。
      en: The same inputs produce one ordered result regardless of arrival order, and unproven conflicts are never silently overwritten.
      ja: 同じ input は arrival order に依存せず同じ ordered result を作り、証明できない conflict は silent overwrite されません。
    why_valid_or_invalid:
      zh: 键、重复项、字段冲突与输出顺序各有独立规则，完整刻画了结构化内容合并而没有引入投票概念。
      en: Key matching, duplicates, field conflicts, and output order each have an independent rule, fully characterizing structured-content merge without voting concepts.
      ja: key match・duplicate・field conflict・output order が独立して定まり、voting concept なしで structured-content merge を完全に表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-merge-rule-006
  - id: MergeRule-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 审阅者多数票裁决
      en: Reviewer majority adjudication
      ja: reviewer majority adjudication
    scenario_id: composition-merge-rule-boundary
    descriptions:
      zh: 五名审阅者对同一提案提交 approve、reject 或 abstain，只有达到法定参与量且非弃权严格过半才通过，平票转人工。
      en: Five reviewers cast approve, reject, or abstain on one proposal; adoption requires quorum and a strict majority of non-abstentions, while a tie escalates.
      ja: five reviewers が approve/reject/abstain を投じ、quorum と非棄権 strict majority を満たす場合のみ採択し、tie は escalate します。
    field_values: {}
    related_node_ids:
      - MergeRule
      - VotingRule
    related_relation_ids: []
    expected_result:
      zh: 分类为 VotingRule，而不是 MergeRule。
      en: Classify the specification as VotingRule, not MergeRule.
      ja: MergeRule ではなく VotingRule と分類します。
    why_valid_or_invalid:
      zh: 结果由参与者票值、法定人数和多数阈值决定，没有记录键或字段合并语义。
      en: The result depends on participant ballots, quorum, and a majority threshold, with no record key or field-merge semantics.
      ja: result は participant ballot・quorum・majority threshold で決まり、record key や field-merge semantics はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-merge-rule-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: VotingRule
    shared_parent_concept_id: AggregationRule
    differentia:
      zh: MergeRule 以记录键、重复与字段冲突组合内容；VotingRule 以参与者票值、法定参与量和胜出阈值裁决。
      en: MergeRule combines content through record keys, duplicates, and field conflicts; VotingRule adjudicates participant ballots through quorum and a winning threshold.
      ja: MergeRule は record key・duplicate・field conflict で content を結合し、VotingRule は participant ballot を quorum/threshold で裁定します。
    source_claims:
      - claim-merge-rule-008
parent_relation:
  id: MergeRule-is_a-AggregationRule
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个内容合并规则都继承聚合规则的输入资格、方法、完成与冲突语义，并增加合并键、重复项、字段冲突和结果顺序条件。
    en: Every MergeRule inherits AggregationRule input-eligibility, method, completion, and conflict semantics and adds merge-key, duplicate, field-conflict, and result-order conditions.
    ja: すべての MergeRule は AggregationRule の input eligibility・method・completion・conflict semantics を継承し merge key・duplicate・field conflict・result order condition を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 表达类型包含而非实例间数量约束。
    en: is_a states type inclusion rather than an instance-to-instance quantity constraint.
    ja: is_a は instance 間の数量制約ではなく type inclusion を表します。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MergeRule-is_a-AggregationRule-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 章节合并继承聚合公共语义
        en: Section merge inherits common aggregation semantics
        ja: section merge inherits aggregation semantics
      scenario_id: composition-relation-mergerule-is_a-aggregationrule-positive
      descriptions:
        zh: reviewed-section-merge@4 先声明合格输入、合并方法、关闭条件与一般冲突策略，再以 section_id、重复修订条件和稳定排序收窄。
        en: reviewed-section-merge@4 first declares eligible inputs, merge method, closure condition, and general conflict policy, then narrows them through section_id, duplicate-revision conditions, and stable ordering.
        ja: reviewed-section-merge@4 は eligible input・merge method・closure・general conflict policy を持ち、その上で section_id・duplicate revision condition・stable order を定めます。
      field_values: {}
      related_node_ids:
        - MergeRule
        - AggregationRule
      related_relation_ids:
        - MergeRule-is_a-AggregationRule
      expected_result:
        zh: 沿 AggregationRule 到 MergeRule 的主干路径读取公共语义和合并种差。
        en: Read common semantics and merge-specific differentia along the AggregationRule-to-MergeRule backbone path.
        ja: AggregationRule から MergeRule の backbone path で共通 semantics と merge-specific differentia を読みます。
      why_valid_or_invalid:
        zh: 该规则满足所有聚合规则条件，并以键、重复、字段冲突和顺序进一步收窄，没有把合并输出当作规范。
        en: The rule satisfies all aggregation-rule conditions and narrows them through keys, duplicates, field conflicts, and order without treating merged output as a specification.
        ja: aggregation-rule condition を全て満たし key・duplicate・field conflict・order で狭め、merged output を specification としません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-merge-rule-009
    - id: MergeRule-is_a-AggregationRule-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 多数票不是内容合并下位型
        en: Majority voting is not a content-merge subtype
        ja: majority voting is not content-merge subtype
      scenario_id: composition-relation-mergerule-is_a-aggregationrule-boundary
      descriptions:
        zh: review-board-majority@3 虽然聚合多张票，但结果由三人法定参与量和非弃权严格过半决定，不按记录键合并字段。
        en: review-board-majority@3 aggregates several ballots, but its result depends on three-person quorum and strict non-abstaining majority rather than merging fields by record key.
        ja: review-board-majority@3 は複数 ballot を aggregate しますが result は three-person quorum と非棄権 strict majority で決まり record key による field merge ではありません。
      field_values: {}
      related_node_ids:
        - MergeRule
        - AggregationRule
        - VotingRule
      related_relation_ids:
        - MergeRule-is_a-AggregationRule
      expected_result:
        zh: 保留 AggregationRule 分类，但改走 VotingRule 下位路径。
        en: Keep the AggregationRule classification but use the VotingRule subtype path.
        ja: AggregationRule classification は保ち VotingRule subtype path を使います。
      why_valid_or_invalid:
        zh: 多输入聚合只满足上位条件；缺少合并键、重复项、字段冲突和顺序条件，因此不能断言 MergeRule。
        en: Multiple-input aggregation satisfies only the genus; without merge key, duplicate, field-conflict, and order conditions it cannot be asserted as MergeRule.
        ja: multiple-input aggregation は上位条件のみ満たし merge key・duplicate・field conflict・order condition がないため MergeRule と断言できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-merge-rule-010
  source_claims:
    - claim-merge-rule-011
