schema: moonweave.ai/ontology-node/v1
id: MergeRule
kind: concept
labels:
  zh: 内容合并规则
  en: content merge rule
  ja: 内容マージ規則
semantics:
  short_definition:
    zh: 用合并键、重复项策略、字段冲突策略和输出顺序组合结构化内容的聚合规则。
    en: An aggregation rule combining structured content through a merge key, duplicate policy, field-conflict policy, and output-order policy.
    ja: merge key・duplicate policy・field-conflict policy・output-order policy で structured content を結合する aggregation rule です。
  definition:
    zh: 内容合并规则是 AggregationRule 的下位类型；它继承输入资格、聚合方法、完成与一般冲突语义，并以记录身份键、重复记录处置、同字段不兼容值处置和结果排序为种差。它是可复用的组合规范，不是某次合并活动、合并后的工件，也不通过选票阈值裁决。
    en: A MergeRule is an AggregationRule subtype inheriting input eligibility, method, completion, and general conflict semantics and distinguished by record identity key, duplicate-record treatment, incompatible field-value treatment, and result ordering. It is a reusable composition specification, not a merge activity, merged artifact, or ballot-threshold adjudication.
    ja: MergeRule は input eligibility・method・completion・general conflict semantics を継承し、record identity key・duplicate record treatment・incompatible field-value treatment・result ordering を種差とする AggregationRule 下位型です。merge activity・merged artifact・ballot threshold adjudication ではありません。
  why_needed:
    zh: 显式区分重复记录、字段冲突与结果顺序，才能避免实现把 JSON 对象覆盖、列表拼接或“最后写入胜出”误当成同一种聚合语义。
    en: Separating duplicate records, field conflicts, and result order prevents implementations from treating object overwrite, list concatenation, and last-write-wins as the same aggregation semantics.
    ja: duplicate record・field conflict・result order を分けることで object overwrite・list concatenation・last-write-wins を同一 semantics と誤認しません。
  includes:
    - zh: 按稳定键汇集结构化记录、拒绝或归并重复项、对字段冲突作显式决定并确定输出顺序的可版本化规范。
      en: Versioned specifications that collect structured records by stable key, reject or consolidate duplicates, decide field conflicts explicitly, and determine output order.
      ja: stable key で structured record を集め、duplicate を reject/consolidate、field conflict を明示処理し output order を定める versioned specification。
  excludes:
    - zh: 法定人数与胜出阈值、实际输入记录集合、一次合并运行、合并输出，以及未声明重复和顺序语义的偶然覆盖行为。
      en: Quorum and winning thresholds, concrete input-record sets, one merge run, merged output, and accidental overwrite behavior without declared duplicate and ordering semantics.
      ja: quorum/winning threshold・concrete input set・one merge run・merged output、および duplicate/order semantics を宣言しない偶発的 overwrite。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      MergeRule 编译为 keyed-merge 函数：按 merge_key 归并结构化记录，duplicate_policy 处理重复项，
      field_conflict_policy 处理同字段不兼容值，order_policy 固定输出顺序。LangGraph state reducer
      是实现，不能从一次 merge 反推持久规则 revision。
    en: >-
      MergeRule compiles to a keyed-merge function that merges structured records by merge_key, applies
      duplicate_policy and field_conflict_policy, and fixes output order via order_policy. LangGraph state
      reducers are implementations and cannot infer a durable rule revision from one merge.
    ja: >-
      MergeRule は merge_key で structured record を merge し duplicate_policy・field_conflict_policy を適用し
      order_policy で output order を固定する keyed-merge function にコンパイルされる。LangGraph state reducer は
      implementation であり durable rule revision は推論できない。
  typical_input:
    - description:
        zh: 声明合并键、重复项与字段冲突策略的内容合并规则。
        en: A content merge rule declaring merge key, duplicate, and field-conflict policies.
        ja: merge key・duplicate・field-conflict policy を宣言する content merge rule。
      format: |-
        {"composition_specification_id":"reviewed-section-merge","version":"4","merge_key":"section_id","aggregation_method":"keyed-merge","duplicate_policy":"reject unless provenance proves explicit supersession","field_conflict_policy":"select proven superseding revision; otherwise escalate","order_policy":"ascending section_ordinal, then section_id"}
  typical_output:
    - description:
        zh: 合并活动绑定的规则 revision 与 ordered result 快照。
        en: Rule revision and ordered result snapshot bound by a merge activity.
        ja: merge activity が bind する rule revision と ordered result snapshot。
      format: |-
        {"merge_rule_ref":"reviewed-section-merge@4","merge_fn":"keyed_merge","params":{"merge_key":"section_id"},"input_refs":["artifact-section-17","artifact-section-18"],"output_ref":"artifact-report-merged@1"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents state reducers and fan-in merge over branch outputs.
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker result consolidation patterns.
  source_claims:
    - claim-merge-rule-hierarchy
    - claim-merge-rule-002
structure:
  identity_keys: []
  fields:
    - id: eligible_input_type
      labels: { zh: 鍚堟牸杈撳叆绫诲瀷, en: eligible input type, ja: eligible input type }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鍙繘鍏ユ湰瑙勫垯鐨勮緭鍏ヨ涔夌被鍨嬨€? en: Declares eligible input semantic type for the rule., ja: rule 銇叆銈屻倠 input semantic type 銈掑瑷€銇椼伨銇欍€?}
      example_value: CompositionArtifact
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: aggregation_method
      labels: { zh: 鑱氬悎鏂规硶, en: aggregation method, ja: aggregation method }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鑱氬悎绠楁硶鏃忋€? en: Declares aggregation algorithm family., ja: aggregation algorithm family 銈掑瑷€銇椼伨銇欍€?}
      example_value: collect
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: completion_policy
      labels: { zh: 瀹屾垚绛栫暐, en: completion policy, ja: completion policy }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 瑙勫畾浣曟椂杈撳叆闆嗗悎瓒充互鍏抽棴鑱氬悎銆? en: Specifies when input set is sufficient to close aggregation., ja: input set 銇?aggregation 銈掗枆銇樸倠鏉′欢銈掕瀹氥仐銇俱仚銆?}
      example_value: close when inputs complete
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: conflict_policy
      labels: { zh: 鍐茬獊绛栫暐, en: conflict policy, ja: conflict policy }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 瑙勫畾涓嶅吋瀹硅础鐚殑澶勭悊鏂瑰紡銆? en: Specifies handling of incompatible contributions., ja: incompatible contribution 銇嚘鐞嗘柟寮忋倰瑕忓畾銇椼伨銇欍€?}
      example_value: defer-to-subtype-policy
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: merge_key
      labels:
        zh: 合并键
        en: merge key
        ja: merge key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定判断两项是否代表同一逻辑记录的稳定字段或复合键。
        en: Names the stable field or compound key used to decide whether two items represent the same logical record.
        ja: 二 item が同じ logical record を表すか判断する stable field または compound key を指定します。
      allowed_values: []
      pattern: null
      example_value: section_id
      source_claims:
        - claim-merge-rule-002
    - id: duplicate_policy
      labels:
        zh: 重复项策略
        en: duplicate policy
        ja: duplicate policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定同一合并键出现多个输入项时拒绝、去重、择版或保留多值，并给出判定前提。
        en: Specifies reject, deduplicate, select-version, or retain-multiple behavior when several inputs share a merge key, including its preconditions.
        ja: 同一 merge key の複数 input を reject・deduplicate・select-version・retain-multiple のどれで扱うかと前提を規定します。
      allowed_values: []
      pattern: null
      example_value: reject duplicates unless one is an explicitly superseding revision
      source_claims:
        - claim-merge-rule-003
    - id: field_conflict_policy
      labels:
        zh: 字段冲突策略
        en: field conflict policy
        ja: field conflict policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定同一逻辑记录的同一字段出现不兼容非空值时如何拒绝、择版、保留多值或升级人工处理。
        en: Specifies rejection, version selection, multivalue retention, or escalation when one field of the same logical record has incompatible non-null values.
        ja: 同一 logical record の一 field に incompatible non-null value がある場合の reject・version selection・multivalue retention・escalation を規定します。
      allowed_values: []
      pattern: null
      example_value: accept a newer revision only when its provenance names the superseded revision; otherwise escalate
      source_claims:
        - claim-merge-rule-004
    - id: order_policy
      labels:
        zh: 结果顺序策略
        en: result order policy
        ja: result order policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定合并结果是无序映射还是按明确字段稳定排序，禁止把输入或序列化器的偶然顺序当作语义。
        en: Declares whether the result is an unordered mapping or stably sorted by an explicit field, rather than treating incidental input or serializer order as semantic.
        ja: result を unordered mapping とするか明示 field で stable sort するかを定め、input/serializer の偶然の順序を semantics にしません。
      allowed_values: []
      pattern: null
      example_value: ascending section_ordinal, then section_id
      source_claims:
        - claim-merge-rule-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: MergeRule-example-positive-manual-20260716
    labels:
      zh: MergeRule positive
      en: MergeRule positive
      ja: MergeRule positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 MergeRule 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes MergeRule programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy MergeRule: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_specification_id: reviewed-section-merge, version: 4, valid_from: 2026-07-16T00:00:00Z, eligible_input_type: ReviewedCompositionArtifact, aggregation_method: keyed-merge, completion_policy: "close when every assigned section arrives or its deadline expires", conflict_policy: "select only a provenance-proven superseding revision; otherwise escalate", merge_key: section_id, duplicate_policy: "reject unless provenance proves explicit supersession", field_conflict_policy: "select proven superseding revision; otherwise escalate", order_policy: "ascending section_ordinal"}

    related_node_ids:
      - MergeRule
      - AggregationRule
      - CompositionArtifact
    related_relation_ids:
      - MergeRule-is_a-AggregationRule
    source_claims:
      - claim-merge-rule-006

  - id: MergeRule-example-boundary-manual-20260716
    labels:
      zh: MergeRule boundary
      en: MergeRule boundary
      ja: MergeRule boundary
    descriptions:
      zh: ToT 评估分数是运行时 heuristic/LLM 评分，不是 MergeRule 静态规范；BranchCondition 规约与 evaluate() 运行时结果应分离。
      en: ToT evaluation scores are runtime heuristic/LLM ratings, not MergeRule static spec; separate BranchCondition specification from evaluate() runtime results.
      ja: ToT 評価スコアは runtime で MergeRule 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - MergeRule
      - VotingRule
    related_relation_ids: []
    source_claims:
      - claim-merge-rule-007

  - id: MergeRule-example-counterexample-manual-20260719
    labels:
      zh: MergeRule counterexample
      en: MergeRule counterexample
      ja: MergeRule counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 MergeRule TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style MergeRule TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 MergeRule ではない。
    field_values: {composition_specification_id: absent, merge_key: section_id, duplicate_policy: absent, field_conflict_policy: absent, order_policy: absent, version: absent, native_impl: langgraph-state-reducer}

    related_node_ids:
      - MergeRule
      - AggregationActivity
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-merge-rule-007
      - claim-merge-rule-002

  - id: MergeRule-example-instance-manual-20260719
    labels:
      zh: MergeRule instance
      en: MergeRule instance
      ja: MergeRule instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 MergeRule。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to MergeRule.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が MergeRule に写像。
    field_values: {aggregation_method: keyed-merge, completion_policy: "all assigned sections received or deadline expired", conflict_policy: "pause and escalate incompatible versions of the same section", merge_key: section_id, duplicate_policy: "reject duplicates unless one is an explicitly superseding revision", field_conflict_policy: "preserve highest review confidence"}

    related_node_ids:
      - MergeRule
      - AggregationRule
    related_relation_ids:
      - MergeRule-is_a-AggregationRule
    source_claims:
      - claim-merge-rule-hierarchy

parent_relation:
  id: MergeRule-is_a-AggregationRule
  predicate: is_a
  target: concept:AggregationRule
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是聚合规则
    en: is an aggregation rule
    ja: 集約 rule である
  definition:
    zh: MergeRule 继承 AggregationRule 的可复用聚合决策角色，并特化为 keyed merge。
    en: MergeRule inherits AggregationRule reusable aggregation-decision role and specializes it as keyed merge.
    ja: MergeRule は AggregationRule の reusable aggregation-decision 役割を継承し keyed merge として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_merge_rule
    labels: { zh: 具有合并规则, en: has merge rule, ja: merge rule を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-merge-rule-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；merge 键与字段冲突策略使用子类型字段表达。
    en: is_a only states type membership; merge keys and field-conflict policies use subtype fields.
    ja: is_a は型従属のみを述べ、merge key と field conflict policy は subtype field で表現します。
sources:
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents reusable workflow composition patterns used as engineering references.
source_claims:
  - id: claim-merge-rule-hierarchy
    source: langgraph-workflows-agents
    supports: MergeRule is modeled as an is_a specialization of AggregationRule in Moonweave composition semantics.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-002
    source: langgraph-workflows-agents
    supports: Merge rules name stable merge keys and explicit duplicate, field-conflict, and ordering policies rather than incidental overwrite.
    locator: Workflows and agents, result consolidation
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-003
    source: langgraph-workflows-agents
    supports: Duplicate policies specify treatment when several inputs share one merge key.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-004
    source: langgraph-workflows-agents
    supports: Field conflict policies decide incompatible non-null values for the same logical record field.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-005
    source: langgraph-workflows-agents
    supports: Order policies declare stable result ordering rather than incidental serializer order.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-006
    source: langgraph-workflows-agents
    supports: A merge rule instance fully characterizes structured-content merge without voting concepts.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-rule-007
    source: langgraph-workflows-agents
    supports: Ballot thresholds and quorum belong to VotingRule, not MergeRule.
    locator: Workflows and agents, voting versus merge boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-hierarchy
    source: langgraph-workflows-agents
    supports: Moonweave records MergeRule using claim claim-aggregation-rule-hierarchy to anchor aggregation rule hierarchy semantics against the cited official source rather than renaming API wire objects as ontology types.
    locator: PROV-O Activity, Entity, Agent, and lineage model
    evidence_kind: design-inference
    confidence: high
