    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-merge-rule-001
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 defines recursive object-member merge and replacement/removal, while stating that duplicate member handling and textual order are not dependable; those gaps justify explicit duplicate, conflict, and order policies.
    locator: RFC 7396 Section 2, Processing Merge Patch Documents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-002
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 processes object members by name, which grounds explicit key-based matching while leaving application-level record identity to the profile.
    locator: RFC 7396 Section 2, object member-name processing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-003
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 explicitly states that results are unspecified when objects contain duplicate member names, so a reusable merge rule must select its own duplicate policy.
    locator: RFC 7396 Section 2, duplicate member-name behavior is unspecified
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-004
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 defines replacement and null-driven removal of target members, showing that replacement semantics must be explicit for conflicting field values.
    locator: RFC 7396 Section 2, replacement and null-removal processing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-005
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 states that object member ordering is not preserved, directly ruling out reliance on incidental textual order.
    locator: RFC 7396 Section 2, object member ordering is not preserved
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-006
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 provides recursive member merge, replacement, and removal semantics while warning that duplicate names and textual ordering are not reliable; Moonweave makes the remaining application policies explicit.
    locator: RFC 7396 Section 2, recursive processing, replacement, duplicate names, and ordering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-007
    source: eng-governance-crs-voting-quorum-2023
    supports: CRS majority procedure uses votes, quorum, and threshold rather than keyed content combination, providing the merge-rule boundary.
    locator: CRS 98-988, version 5, quorum and simple-majority procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-008
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 member-level merge processing differs structurally from quorum-and-threshold voting procedure.
    locator: RFC 7396 Section 2, object member merge processing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-009
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 supplies concrete member-merge behavior while leaving duplicate and ordering policy to an explicit profile.
    locator: RFC 7396 Section 2, member processing, duplicate names, and ordering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-010
    source: eng-governance-crs-voting-quorum-2023
    supports: CRS majority voting relies on participant votes and thresholds rather than record-key merge processing, marking the boundary of MergeRule.
    locator: CRS 98-988, version 5, quorum and simple-majority procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-merge-rule-011
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 member-level processing grounds merge-specific behavior below the generic notion of aggregating multiple inputs.
    locator: RFC 7396 Section 2, Processing Merge Patch Documents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
