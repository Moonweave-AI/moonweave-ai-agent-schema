schema: moonweave.ai/ontology-node/v1
id: VotingRule
kind: concept
status: review
labels:
  zh: 投票裁决规则
  en: voting adjudication rule
  ja: 投票裁定規則
semantics:
  short_definition:
    zh: 用票值域、法定参与量、胜出阈值、弃权与平票策略裁决候选结果的聚合规则。
    en: An aggregation rule adjudicating candidates through a ballot domain, quorum, winning threshold, abstention policy, and tie policy.
    ja: ballot domain・quorum・winning threshold・abstention policy・tie policy で候補を裁定する aggregation rule です。
  definition:
    zh: 投票裁决规则是 AggregationRule 的下位类型；它继承输入资格、聚合方法、完成与冲突语义，并以可投票值域、法定参与量、胜出阈值、弃权计法和平票结果为种差。它描述可重复使用的裁决制度，不是一次投票活动、某张选票或最终决定。
    en: A VotingRule is an AggregationRule subtype inheriting input eligibility, method, completion, and conflict semantics and distinguished by ballot value domain, quorum, winning threshold, abstention treatment, and tie outcome. It describes a reusable adjudication regime, not a voting activity, ballot, or final decision.
    ja: VotingRule は input eligibility・method・completion・conflict semantics を継承し、ballot value domain・quorum・winning threshold・abstention treatment・tie outcome を種差とする AggregationRule 下位型です。再利用可能な制度であり、voting activity・ballot・final decision ではありません。
  why_needed:
    zh: 把票制专属语义放在独立下位层，才能避免所有聚合被误读为投票，也能逐版审计法定人数、弃权与平票处理。
    en: A dedicated subtype prevents every aggregation from being misread as voting and makes quorum, abstention, and tie handling auditable by revision.
    ja: 専用 subtype により全 aggregation を voting と誤読せず、quorum・abstention・tie handling を revision ごとに監査できます。
  includes:
    - zh: 多数决、特定多数、加权投票和共识投票中可明确复现的票值、参与、胜出、弃权与平票规则。
      en: Reproducible ballot-domain, participation, winning, abstention, and tie rules for majority, supermajority, weighted, or consensus voting.
      ja: majority・supermajority・weighted・consensus voting の再現可能な ballot domain・participation・winning・abstention・tie rule。
  excludes:
    - zh: 记录按键去重与字段覆盖、实际投票运行、单张票、计票结果，以及没有明确参与和胜出语义的泛化偏好。
      en: Keyed record deduplication and field overwrite, concrete voting runs, individual ballots, tally results, and vague preferences without explicit participation and winning semantics.
      ja: keyed record dedup/field overwrite・concrete voting run・individual ballot・tally result、および participation/winning semantics のない曖昧な preference。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: ballot_value_domain
      labels:
        zh: 票值域
        en: ballot value domain
        ja: ballot value domain
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明合格选票可以表达的互斥值及其含义。
        en: Enumerates the mutually distinguishable values an eligible ballot may express.
        ja: eligible ballot が表せる相互に区別された値と意味を列挙します。
      allowed_values: []
      pattern: null
      example_value: approve | reject | abstain
      source_claims:
        - claim-voting-rule-003
    - id: quorum_requirement
      labels:
        zh: 法定参与量
        en: quorum requirement
        ja: quorum requirement
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定裁决可成立前必须参与的最小人数、权重或比例，并说明弃权是否计入。
        en: Specifies the minimum participating count, weight, or proportion required for a valid adjudication and whether abstentions count.
        ja: valid adjudication に必要な最小参加 count・weight・proportion と abstention を数えるかを規定します。
      allowed_values: []
      pattern: null
      example_value: at least 3 of 5 eligible reviewers; abstentions count toward quorum
      source_claims:
        - claim-voting-rule-004
    - id: winning_threshold
      labels:
        zh: 胜出阈值
        en: winning threshold
        ja: winning threshold
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定候选结果相对于指定分母必须达到的支持数、权重或比例。
        en: Specifies the support count, weight, or proportion a candidate must reach against an explicitly named denominator.
        ja: 明示した denominator に対し候補が達するべき support count・weight・proportion を規定します。
      allowed_values: []
      pattern: null
      example_value: strictly more than 50% of non-abstaining ballots
      source_claims:
        - claim-voting-rule-005
    - id: abstention_policy
      labels:
        zh: 弃权策略
        en: abstention policy
        ja: abstention policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别说明弃权对法定参与量、胜出分母和结果记录的影响。
        en: States separately how abstentions affect quorum, the winning denominator, and the recorded result.
        ja: abstention が quorum・winning denominator・recorded result に与える影響を別々に記述します。
      allowed_values: []
      pattern: null
      example_value: count for quorum; exclude from winning denominator; retain in audit record
      source_claims:
        - claim-voting-rule-006
    - id: tie_policy
      labels:
        zh: 平票策略
        en: tie policy
        ja: tie policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定支持相等且无候选越过胜出阈值时返回未决、失败、重投或升级。
        en: Specifies unresolved, failure, revote, or escalation when support is tied and no candidate crosses the winning threshold.
        ja: support が tie で threshold を越える候補がない場合の unresolved・failure・revote・escalation を規定します。
      allowed_values: []
      pattern: null
      example_value: return unresolved and escalate to the designated reviewer
      source_claims:
        - claim-voting-rule-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: VotingRule-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 五人审阅委员会严格多数制
      en: Five-reviewer strict-majority regime
      ja: five-reviewer strict-majority regime
    scenario_id: null
    descriptions:
      zh: review-board-majority@3 接收 approve、reject、abstain；至少五名合格审阅者中的三人提交票，弃权计入法定人数但不进入胜出分母，非弃权票严格过半才通过，平票返回 unresolved 并升级。
      en: review-board-majority@3 accepts approve, reject, and abstain; at least three of five eligible reviewers must vote, abstentions count toward quorum but not the winning denominator, a strict majority of non-abstentions is required, and a tie returns unresolved for escalation.
      ja: review-board-majority@3 は approve/reject/abstain を受け、five eligible reviewers のうち三人を quorum とし、abstention は quorum に数えるが winning denominator から除外し、非棄権の strict majority がなければ tie を unresolved として escalate します。
    field_values:
      composition_specification_id: review-board-majority
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      eligible_input_type: VoteBallot
      aggregation_method: majority-vote
      completion_policy: close when at least three of five eligible reviewers submit ballots
      conflict_policy: return unresolved and escalate when non-abstaining choices tie
      ballot_value_domain: approve | reject | abstain
      quorum_requirement: 3 of 5; abstentions count
      winning_threshold: "> 50% of non-abstaining ballots"
      abstention_policy: quorum=yes; denominator=no; audit=yes
      tie_policy: unresolved; escalate
    related_node_ids:
      - VotingRule
      - AggregationRule
      - VotingActivity
    related_relation_ids:
      - VotingRule-is_a-AggregationRule
    expected_result:
      zh: 保存一个可由多次 VotingActivity 引用且判定结果可复现的规则版本。
      en: Store a reproducible rule revision referenceable by multiple VotingActivity occurrences.
      ja: 複数 VotingActivity から参照できる再現可能な rule revision を保存します。
    why_valid_or_invalid:
      zh: 参与条件、胜出分母、弃权和平票结果全部明确，而且没有把本次票据或计票时间写入规则身份。
      en: Participation, winning denominator, abstention, and tie outcomes are explicit, while concrete ballots and tally time are absent from rule identity.
      ja: participation・winning denominator・abstention・tie outcome が明示され、concrete ballot と tally time は rule identity に入りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-rule-008
      - claim-voting-rule-009
  - id: VotingRule-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 章节记录按键合并
      en: Keyed section-record merge
      ja: keyed section-record merge
    scenario_id: composition-voting-rule-boundary
    descriptions:
      zh: 系统按 section_id 合并章节记录，遇到重复键就拒绝，并按章节序号排序；过程中没有选票、法定人数或胜出阈值。
      en: The system merges section records by section_id, rejects duplicate keys, and orders the result by section ordinal without ballots, quorum, or a winning threshold.
      ja: system は section_id で record を merge し duplicate key を reject、section ordinal で整列しますが ballot・quorum・winning threshold はありません。
    field_values: {}
    related_node_ids:
      - VotingRule
      - MergeRule
    related_relation_ids: []
    expected_result:
      zh: 分类为 MergeRule，而不是 VotingRule。
      en: Classify the specification as MergeRule, not VotingRule.
      ja: VotingRule ではなく MergeRule と分類します。
    why_valid_or_invalid:
      zh: 它的决定因素是键、重复记录与顺序，不是参与者表达的票值和裁决门槛。
      en: Its deciding factors are keys, duplicate records, and order rather than participant ballot values and adjudication thresholds.
      ja: 決定要因は key・duplicate record・order であり、participant ballot value や adjudication threshold ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-rule-010
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MergeRule
    shared_parent_concept_id: AggregationRule
    differentia:
      zh: VotingRule 以参与者票值、法定参与量和胜出阈值裁决；MergeRule 以记录键、重复与字段冲突组合内容。
      en: VotingRule adjudicates participant ballots through quorum and a winning threshold; MergeRule combines content through record keys, duplicates, and field conflicts.
      ja: VotingRule は participant ballot を quorum/threshold で裁定し、MergeRule は record key・duplicate・field conflict で content を結合します。
    source_claims:
      - claim-voting-rule-011
parent_relation:
  id: VotingRule-is_a-AggregationRule
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个投票裁决规则都继承聚合规则的输入资格、方法、完成与冲突语义，并增加票值域、法定参与量、胜出阈值、弃权和平票条件。
    en: Every VotingRule inherits AggregationRule input-eligibility, method, completion, and conflict semantics and adds ballot domain, quorum, winning threshold, abstention, and tie conditions.
    ja: すべての VotingRule は AggregationRule の input eligibility・method・completion・conflict semantics を継承し ballot domain・quorum・winning threshold・abstention・tie condition を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 表达类型包含而非实例间数量约束。
    en: is_a states type inclusion rather than an instance-to-instance quantity constraint.
    ja: is_a は instance 間の数量制約ではなく type inclusion を表します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: VotingRule-is_a-AggregationRule-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 严格多数制继承聚合公共语义
        en: Strict-majority regime inherits common aggregation semantics
        ja: strict-majority regime inherits aggregation semantics
      scenario_id: composition-relation-votingrule-is_a-aggregationrule-positive
      descriptions:
        zh: review-board-majority@3 先声明合格输入、聚合方法、关闭条件与冲突处理，再声明三人法定参与量、非弃权严格过半和未决平票。
        en: review-board-majority@3 first declares eligible inputs, aggregation method, closure condition, and conflict handling, then specifies three-person quorum, strict non-abstaining majority, and unresolved ties.
        ja: review-board-majority@3 は eligible input・aggregation method・closure・conflict handling を持ち、その上で three-person quorum・非棄権 strict majority・unresolved tie を定めます。
      field_values: {}
      related_node_ids:
        - VotingRule
        - AggregationRule
      related_relation_ids:
        - VotingRule-is_a-AggregationRule
      expected_result:
        zh: 沿 AggregationRule 到 VotingRule 的主干路径读取公共语义和票制种差。
        en: Read common semantics and ballot-specific differentia along the AggregationRule-to-VotingRule backbone path.
        ja: AggregationRule から VotingRule の backbone path で共通 semantics と ballot-specific differentia を読みます。
      why_valid_or_invalid:
        zh: 该规则满足所有聚合规则条件，并以票制字段进一步收窄，而没有把一次计票活动当作类型。
        en: The rule satisfies all aggregation-rule conditions and narrows them through ballot fields without treating one tally activity as a type.
        ja: aggregation-rule condition を全て満たし ballot field で狭め、one tally activity を type としません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-voting-rule-012
    - id: VotingRule-is_a-AggregationRule-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 键合并不是投票下位型
        en: Keyed merge is not a voting subtype
        ja: keyed merge is not voting subtype
      scenario_id: composition-relation-votingrule-is_a-aggregationrule-boundary
      descriptions:
        zh: section-merge@4 虽然聚合多个输入，但只按 section_id 处理重复、字段冲突与顺序，不定义参与者票值或胜出阈值。
        en: section-merge@4 aggregates multiple inputs but handles duplicates, field conflicts, and order by section_id without participant ballots or a winning threshold.
        ja: section-merge@4 は複数 input を aggregate しますが section_id で duplicate・field conflict・order を扱い participant ballot や threshold はありません。
      field_values: {}
      related_node_ids:
        - VotingRule
        - AggregationRule
        - MergeRule
      related_relation_ids:
        - VotingRule-is_a-AggregationRule
      expected_result:
        zh: 保留 AggregationRule 分类，但改走 MergeRule 下位路径。
        en: Keep the AggregationRule classification but use the MergeRule subtype path.
        ja: AggregationRule classification は保ち MergeRule subtype path を使います。
      why_valid_or_invalid:
        zh: 多输入聚合只满足上位条件；缺少票值、法定参与量和胜出条件，因此不能断言 VotingRule。
        en: Multiple-input aggregation satisfies only the genus; without ballots, quorum, and winning conditions it cannot be asserted as VotingRule.
        ja: multiple-input aggregation は上位条件のみ満たし ballot・quorum・winning condition がないため VotingRule と断言できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-voting-rule-013
  source_claims:
    - claim-voting-rule-014
