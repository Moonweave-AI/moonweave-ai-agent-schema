schema: moonweave.ai/ontology-node/v1
id: VotingRule
kind: concept
labels:
  zh: 投票裁决规则
  en: voting adjudication rule
  ja: 投票裁定規則
semantics:
  short_definition:
    zh: 用票值域、法定参与量、胜出阈值、弃权与平票策略裁决候选结果的聚合规则。
    en: An aggregation rule adjudicating candidates through a ballot domain, quorum, winning threshold, abstention policy, and tie policy.
    ja: ballot domain・quorum・winning threshold・abstention policy・tie policy で候補を裁定する aggregation rule です。
  definition:
    zh: 投票裁决规则是 AggregationRule 的下位类型；它继承输入资格、聚合方法、完成与冲突语义，并以可投票值域、法定参与量、胜出阈值、弃权计法和平票结果为种差。它描述可重复使用的裁决制度，不是一次投票活动、某张选票或最终决定。
    en: A VotingRule is an AggregationRule subtype inheriting input eligibility, method, completion, and conflict semantics and distinguished by ballot value domain, quorum, winning threshold, abstention treatment, and tie outcome. It describes a reusable adjudication regime, not a voting activity, ballot, or final decision.
    ja: VotingRule は input eligibility・method・completion・conflict semantics を継承し、ballot value domain・quorum・winning threshold・abstention treatment・tie outcome を種差とする AggregationRule 下位型です。再利用可能な制度であり、voting activity・ballot・final decision ではありません。
  why_needed:
    zh: 把票制专属语义放在独立下位层，才能避免所有聚合被误读为投票，也能逐版审计法定人数、弃权与平票处理。
    en: A dedicated subtype prevents every aggregation from being misread as voting and makes quorum, abstention, and tie handling auditable by revision.
    ja: 専用 subtype により全 aggregation を voting と誤読せず、quorum・abstention・tie handling を revision ごとに監査できます。
  includes:
    - zh: 多数决、特定多数、加权投票和共识投票中可明确复现的票值、参与、胜出、弃权与平票规则。
      en: Reproducible ballot-domain, participation, winning, abstention, and tie rules for majority, supermajority, weighted, or consensus voting.
      ja: majority・supermajority・weighted・consensus voting の再現可能な ballot domain・participation・winning・abstention・tie rule。
  excludes:
    - zh: 记录按键去重与字段覆盖、实际投票运行、单张票、计票结果，以及没有明确参与和胜出语义的泛化偏好。
      en: Keyed record deduplication and field overwrite, concrete voting runs, individual ballots, tally results, and vague preferences without explicit participation and winning semantics.
      ja: keyed record dedup/field overwrite・concrete voting run・individual ballot・tally result、および participation/winning semantics のない曖昧な preference。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: best-of-N 选优、majority voting 与 LLM-as-judge Borda 计票映射为 VotingRule；VotingActivity 须引用 rule@version 使结果可从 VoteBallot 重算。
    en: Best-of-N selection, majority voting, and LLM-as-judge Borda tally map to VotingRule; VotingActivity must reference rule@version so results are recomputable from VoteBallot.
    ja: best-of-N 選优・majority voting・LLM-as-judge Borda 集計を VotingRule へ写像し VotingActivity は rule@version 参照で VoteBallot から再計算可能にします。
  typical_input:
    - description: Borda count voting rule.
      format: '{"voting_rule_id": "borda-count", "version": "4", "method": "borda"}'
      source_claims:
        - claim-voting-rule-design
  typical_output:
    - description: Moonweave VotingRule with tally method.
      format: '{"voting_rule_id": "borda-count", "version": "4"}'
      source_claims:
        - claim-voting-rule-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: ballot_value_domain
      labels:
        zh: 票值域
        en: ballot value domain
        ja: ballot value domain
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明合格选票可以表达的互斥值及其含义。
        en: Enumerates the mutually distinguishable values an eligible ballot may express.
        ja: eligible ballot が表せる相互に区別された値と意味を列挙します。
      allowed_values: []
      pattern: null
      example_value: approve | reject | abstain
      source_claims:
        - claim-voting-rule-design
    - id: quorum_requirement
      labels:
        zh: 法定参与量
        en: quorum requirement
        ja: quorum requirement
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定裁决可成立前必须参与的最小人数、权重或比例，并说明弃权是否计入。
        en: Specifies the minimum participating count, weight, or proportion required for a valid adjudication and whether abstentions count.
        ja: valid adjudication に必要な最小参加 count・weight・proportion と abstention を数えるかを規定します。
      allowed_values: []
      pattern: null
      example_value: at least 3 of 5 eligible reviewers; abstentions count toward quorum
      source_claims:
        - claim-voting-rule-design
    - id: winning_threshold
      labels:
        zh: 胜出阈值
        en: winning threshold
        ja: winning threshold
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定候选结果相对于指定分母必须达到的支持数、权重或比例。
        en: Specifies the support count, weight, or proportion a candidate must reach against an explicitly named denominator.
        ja: 明示した denominator に対し候補が達するべき support count・weight・proportion を規定します。
      allowed_values: []
      pattern: null
      example_value: strictly more than 50% of non-abstaining ballots
      source_claims:
        - claim-voting-rule-design
    - id: abstention_policy
      labels:
        zh: 弃权策略
        en: abstention policy
        ja: abstention policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别说明弃权对法定参与量、胜出分母和结果记录的影响。
        en: States separately how abstentions affect quorum, the winning denominator, and the recorded result.
        ja: abstention が quorum・winning denominator・recorded result に与える影響を別々に記述します。
      allowed_values: []
      pattern: null
      example_value: count for quorum; exclude from winning denominator; retain in audit record
      source_claims:
        - claim-voting-rule-design
    - id: tie_policy
      labels:
        zh: 平票策略
        en: tie policy
        ja: tie policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定支持相等且无候选越过胜出阈值时返回未决、失败、重投或升级。
        en: Specifies unresolved, failure, revote, or escalation when support is tied and no candidate crosses the winning threshold.
        ja: support が tie で threshold を越える候補がない場合の unresolved・failure・revote・escalation を規定します。
      allowed_values: []
      pattern: null
      example_value: return unresolved and escalate to the designated reviewer
      source_claims:
        - claim-voting-rule-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: VotingRule-borda
    labels:
      zh: Borda 计票规则
      en: Borda tally rule
      ja: Borda 集計 rule
    descriptions:
      zh: borda-count@4 对三张 digest 固定选票计算 rank 加权得分。
      en: borda-count@4 computes rank-weighted scores over three digest-fixed ballots.
      ja: borda-count@4 は三 digest 固定 ballot で rank 加重 score を計算。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N voting
    field_values:
      voting_rule_id: borda-count
      version: "4"
    related_node_ids:
      - VotingRule
      - VotingActivity
      - VoteBallot
    related_relation_ids:
      - VotingActivity-applies-VotingRule
    source_claims:
      - claim-voting-rule-anthropic
      - claim-voting-rule-design
  - id: VotingRule-llm-judge
    labels:
      zh: LLM 评判规则
      en: LLM-as-judge rule
      ja: LLM-as-judge rule
    descriptions:
      zh: judge-rubric@2 定义 LLM 评判维度与 tie-break 策略。
      en: judge-rubric@2 defines LLM judge dimensions and tie-break policy.
      ja: judge-rubric@2 は LLM judge 次元と tie-break 方針を定義。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: LLM evaluation
    field_values:
      voting_rule_id: judge-rubric
      version: "2"
    related_node_ids:
      - VotingRule
      - Voting
    related_relation_ids: []
    source_claims:
      - claim-voting-rule-cookbook
      - claim-voting-rule-design
  - id: VotingRule-boundary-merge
    labels:
      zh: 合并规则不是计票规则
      en: Merge rule is not voting rule
      ja: merge rule は voting rule ではない
    descriptions:
      zh: conflict-preserving@2 合并文档冲突，不进行候选排名。
      en: conflict-preserving@2 merges document conflicts without candidate ranking.
      ja: conflict-preserving@2 は document conflict を merge し candidate ranking は行いません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: subtype boundary
    field_values: {}
    related_node_ids:
      - VotingRule
      - MergeRule
    related_relation_ids: []
    source_claims:
      - claim-voting-rule-design
parent_relation:
  id: VotingRule-is_a-AggregationRule
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个投票裁决规则都继承聚合规则的输入资格、方法、完成与冲突语义，并增加票值域、法定参与量、胜出阈值、弃权和平票条件。
    en: Every VotingRule inherits AggregationRule input-eligibility, method, completion, and conflict semantics and adds ballot domain, quorum, winning threshold, abstention, and tie conditions.
    ja: すべての VotingRule は AggregationRule の input eligibility・method・completion・conflict semantics を継承し ballot domain・quorum・winning threshold・abstention・tie condition を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 表达类型包含而非实例间数量约束。
    en: is_a states type inclusion rather than an instance-to-instance quantity constraint.
    ja: is_a は instance 間の数量制約ではなく type inclusion を表します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-voting-rule-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
