schema: moonweave.ai/ontology-node/v1
id: VotingRule
kind: concept
labels:
  zh: 投票裁决规则
  en: voting adjudication rule
  ja: 投票裁定規則
semantics:
  short_definition:
    zh: 用票值域、法定参与量、胜出阈值、弃权与平票策略裁决候选结果的聚合规则。
    en: An aggregation rule adjudicating candidates through a ballot domain, quorum, winning threshold, abstention policy, and tie policy.
    ja: ballot domain・quorum・winning threshold・abstention policy・tie policy で候補を裁定する aggregation rule です。
  definition:
    zh: 投票裁决规则是 AggregationRule 的下位类型；它继承输入资格、聚合方法、完成与冲突语义，并以可投票值域、法定参与量、胜出阈值、弃权计法和平票结果为种差。它描述可重复使用的裁决制度，不是一次投票活动、某张选票或最终决定。
    en: A VotingRule is an AggregationRule subtype inheriting input eligibility, method, completion, and conflict semantics and distinguished by ballot value domain, quorum, winning threshold, abstention treatment, and tie outcome. It describes a reusable adjudication regime, not a voting activity, ballot, or final decision.
    ja: VotingRule は input eligibility・method・completion・conflict semantics を継承し、ballot value domain・quorum・winning threshold・abstention treatment・tie outcome を種差とする AggregationRule 下位型です。再利用可能な制度であり、voting activity・ballot・final decision ではありません。
  why_needed:
    zh: 把票制专属语义放在独立下位层，才能避免所有聚合被误读为投票，也能逐版审计法定人数、弃权与平票处理。
    en: A dedicated subtype prevents every aggregation from being misread as voting and makes quorum, abstention, and tie handling auditable by revision.
    ja: 専用 subtype により全 aggregation を voting と誤読せず、quorum・abstention・tie handling を revision ごとに監査できます。
  includes:
    - zh: 多数决、特定多数、加权投票和共识投票中可明确复现的票值、参与、胜出、弃权与平票规则。
      en: Reproducible ballot-domain, participation, winning, abstention, and tie rules for majority, supermajority, weighted, or consensus voting.
      ja: majority・supermajority・weighted・consensus voting の再現可能な ballot domain・participation・winning・abstention・tie rule。
  excludes:
    - zh: 记录按键去重与字段覆盖、实际投票运行、单张票、计票结果，以及没有明确参与和胜出语义的泛化偏好。
      en: Keyed record deduplication and field overwrite, concrete voting runs, individual ballots, tally results, and vague preferences without explicit participation and winning semantics.
      ja: keyed record dedup/field overwrite・concrete voting run・individual ballot・tally result、および participation/winning semantics のない曖昧な preference。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      VotingRule 实现计票函数：读取 VoteBallot 集合，应用 quorum、threshold、abstention 与 tie_policy 输出
      胜出候选。LangGraph join 节点或 AggregationActivity 引用 rule revision；规范不存储 tally 结果，
      Verdict 写入 EvaluationRun 或 CompositionOutput。
    en: >-
      VotingRule implements tally function: reads VoteBallot set, applies quorum, threshold, abstention, and tie_policy to
      emit winner. LangGraph join node or AggregationActivity references rule revision; spec stores no tally result; Verdict
      writes to EvaluationRun or CompositionOutput.
    ja: >-
      VotingRule は tally function を実装する。VoteBallot set を読み quorum、threshold、abstention、tie_policy を適用して
      winner を emit する。LangGraph join node または AggregationActivity が rule revision を参照する。spec は tally result を
      保持せず Verdict は EvaluationRun または CompositionOutput に書き込む。
  typical_input:
    - description:
        zh: 投票裁决规则规约与选票值域声明。
        en: Voting adjudication rule specification with ballot domain declaration.
        ja: ballot domain declaration 付き voting adjudication rule specification。
      format: |-
        {"rule_id":"rule:majority@2","ballot_domain":["approve","reject","abstain"],"quorum":2,"winning_threshold":0.5,"abstention_policy":"exclude_from_denominator","tie_policy":"fail"}
  typical_output:
    - description:
        zh: VotingActivity 计票时绑定的规则函数与参数。
        en: Rule function and parameters bound during VotingActivity tally.
        ja: VotingActivity tally 時に bind される rule function と parameter。
      format: |-
        {"voting_rule_ref":"rule:majority@2","tally_fn":"majority_winner","params":{"quorum":2,"threshold":0.5},"ballots_ref":"ballots:release-vote-901"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents join aggregation over collected branch outputs.
    - name: LangGraph parallel execution
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents fan-in after parallel reviewer branches for voting tally.
    - name: OpenAI Agent evals
      url: https://platform.openai.com/docs/guides/agent-evals
      description: Documents collective verdicts from multiple evaluator outputs analogous to voting rules.
  source_claims:
    - claim-voting-rule-001
    - claim-voting-rule-002
structure:
  identity_keys: []
  fields:
    - id: eligible_input_type
      labels: { zh: 鍚堟牸杈撳叆绫诲瀷, en: eligible input type, ja: eligible input type }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鍙繘鍏ユ湰瑙勫垯鐨勮緭鍏ヨ涔夌被鍨嬨€? en: Declares eligible input semantic type for the rule., ja: rule 銇叆銈屻倠 input semantic type 銈掑瑷€銇椼伨銇欍€?}
      example_value: CompositionArtifact
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: aggregation_method
      labels: { zh: 鑱氬悎鏂规硶, en: aggregation method, ja: aggregation method }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鑱氬悎绠楁硶鏃忋€? en: Declares aggregation algorithm family., ja: aggregation algorithm family 銈掑瑷€銇椼伨銇欍€?}
      example_value: collect
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: completion_policy
      labels: { zh: 瀹屾垚绛栫暐, en: completion policy, ja: completion policy }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 瑙勫畾浣曟椂杈撳叆闆嗗悎瓒充互鍏抽棴鑱氬悎銆? en: Specifies when input set is sufficient to close aggregation., ja: input set 銇?aggregation 銈掗枆銇樸倠鏉′欢銈掕瀹氥仐銇俱仚銆?}
      example_value: close when inputs complete
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: conflict_policy
      labels: { zh: 鍐茬獊绛栫暐, en: conflict policy, ja: conflict policy }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 瑙勫畾涓嶅吋瀹硅础鐚殑澶勭悊鏂瑰紡銆? en: Specifies handling of incompatible contributions., ja: incompatible contribution 銇嚘鐞嗘柟寮忋倰瑕忓畾銇椼伨銇欍€?}
      example_value: defer-to-subtype-policy
      source_claims: [claim-aggregation-rule-hierarchy]
    - id: ballot_value_domain
      labels:
        zh: 票值域
        en: ballot value domain
        ja: ballot value domain
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明合格选票可以表达的互斥值及其含义。
        en: Enumerates the mutually distinguishable values an eligible ballot may express.
        ja: eligible ballot が表せる相互に区別された値と意味を列挙します。
      allowed_values: []
      pattern: null
      example_value: approve | reject | abstain
      source_claims:
        - claim-voting-rule-003
    - id: quorum_requirement
      labels:
        zh: 法定参与量
        en: quorum requirement
        ja: quorum requirement
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定裁决可成立前必须参与的最小人数、权重或比例，并说明弃权是否计入。
        en: Specifies the minimum participating count, weight, or proportion required for a valid adjudication and whether abstentions count.
        ja: valid adjudication に必要な最小参加 count・weight・proportion と abstention を数えるかを規定します。
      allowed_values: []
      pattern: null
      example_value: at least 3 of 5 eligible reviewers; abstentions count toward quorum
      source_claims:
        - claim-voting-rule-004
    - id: winning_threshold
      labels:
        zh: 胜出阈值
        en: winning threshold
        ja: winning threshold
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定候选结果相对于指定分母必须达到的支持数、权重或比例。
        en: Specifies the support count, weight, or proportion a candidate must reach against an explicitly named denominator.
        ja: 明示した denominator に対し候補が達するべき support count・weight・proportion を規定します。
      allowed_values: []
      pattern: null
      example_value: strictly more than 50% of non-abstaining ballots
      source_claims:
        - claim-voting-rule-005
    - id: abstention_policy
      labels:
        zh: 弃权策略
        en: abstention policy
        ja: abstention policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别说明弃权对法定参与量、胜出分母和结果记录的影响。
        en: States separately how abstentions affect quorum, the winning denominator, and the recorded result.
        ja: abstention が quorum・winning denominator・recorded result に与える影響を別々に記述します。
      allowed_values: []
      pattern: null
      example_value: count for quorum; exclude from winning denominator; retain in audit record
      source_claims:
        - claim-voting-rule-006
    - id: tie_policy
      labels:
        zh: 平票策略
        en: tie policy
        ja: tie policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定支持相等且无候选越过胜出阈值时返回未决、失败、重投或升级。
        en: Specifies unresolved, failure, revote, or escalation when support is tied and no candidate crosses the winning threshold.
        ja: support が tie で threshold を越える候補がない場合の unresolved・failure・revote・escalation を規定します。
      allowed_values: []
      pattern: null
      example_value: return unresolved and escalate to the designated reviewer
      source_claims:
        - claim-voting-rule-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: VotingRule-example-positive-manual-20260716
    labels:
      zh: VotingRule positive
      en: VotingRule positive
      ja: VotingRule positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 VotingRule：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps VotingRule: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が VotingRule 多 agent 協調に写像。
    field_values: {composition_specification_id: review-board-majority, version: 3, valid_from: 2026-07-16T00:00:00Z, eligible_input_type: VoteBallot, aggregation_method: majority-vote, completion_policy: "close when at least three of five eligible reviewers submit ballots", conflict_policy: "return unresolved and escalate when non-abstaining choices tie", ballot_value_domain: "approve | reject | abstain", quorum_requirement: "3 of 5; abstentions count", winning_threshold: "> 50% of non-abstaining ballots", abstention_policy: "quorum=yes; denominator=no; audit=yes", tie_policy: "unresolved; escalate"}

    related_node_ids:
      - VotingRule
      - AggregationRule
      - VotingActivity
    related_relation_ids:
      - VotingRule-is_a-AggregationRule
    source_claims:
      - claim-voting-rule-008
      - claim-voting-rule-009

  - id: VotingRule-example-boundary-manual-20260716
    labels:
      zh: VotingRule boundary
      en: VotingRule boundary
      ja: VotingRule boundary
    descriptions:
      zh: ToT 评估分数是运行时 heuristic/LLM 评分，不是 VotingRule 静态规范；BranchCondition 规约与 evaluate() 运行时结果应分离。
      en: ToT evaluation scores are runtime heuristic/LLM ratings, not VotingRule static spec; separate BranchCondition specification from evaluate() runtime results.
      ja: ToT 評価スコアは runtime で VotingRule 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - VotingRule
      - MergeRule
    related_relation_ids: []
    source_claims:
      - claim-voting-rule-010

  - id: VotingRule-example-counterexample-manual-20260719
    labels:
      zh: VotingRule counterexample
      en: VotingRule counterexample
      ja: VotingRule counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 VotingRule PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style VotingRule PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 VotingRule ではない。
    field_values: {composition_specification_id: absent, ballot_value_domain: absent, quorum_requirement: absent, winning_threshold: absent, started_at: 2026-07-16T04:20:00Z, tally_outcome: adopt}

    related_node_ids:
      - VotingRule
      - VotingActivity
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-voting-rule-010
      - claim-voting-rule-008

  - id: VotingRule-example-instance-manual-20260719
    labels:
      zh: VotingRule instance
      en: VotingRule instance
      ja: VotingRule instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 VotingRule DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to VotingRule DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が VotingRule に写像。
    field_values: {aggregation_method: tally-ballots, completion_policy: "close when quorum reached or deadline expires", conflict_policy: "escalate ties and abstention-only outcomes", quorum_threshold: 3, majority_basis: "non-abstention strict majority"}

    related_node_ids:
      - VotingRule
      - AggregationRule
    related_relation_ids:
      - VotingRule-is_a-AggregationRule
    source_claims:
      - claim-voting-rule-hierarchy

parent_relation:
  id: VotingRule-is_a-AggregationRule
  predicate: is_a
  target: concept:AggregationRule
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是聚合规则
    en: is an aggregation rule
    ja: 集約 rule である
  definition:
    zh: VotingRule 继承 AggregationRule 的可复用聚合决策角色，并特化为 ballot tally。
    en: VotingRule inherits AggregationRule reusable aggregation-decision role and specializes it as ballot tally.
    ja: VotingRule は AggregationRule の reusable aggregation-decision 役割を継承し ballot tally として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_voting_rule
    labels: { zh: 具有投票规则, en: has voting rule, ja: voting rule を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-voting-rule-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；quorum 与 majority 参数使用子类型字段表达。
    en: is_a only states type membership; quorum and majority parameters use subtype fields.
    ja: is_a は型従属のみを述べ、quorum/majority parameter は subtype field で表現します。
