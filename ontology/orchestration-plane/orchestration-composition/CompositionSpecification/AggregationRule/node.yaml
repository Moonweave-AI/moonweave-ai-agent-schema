schema: moonweave.ai/ontology-node/v1
id: AggregationRule
kind: concept
status: review
labels:
  zh: 聚合规则
  en: aggregation rule
  ja: 集約規則
semantics:
  short_definition:
    zh: 规定一组候选结果如何验证、归并、冲突处理并形成聚合结果的组合规范。
    en: A composition specification defining how candidate results are validated, combined, conflict-resolved, and turned into an aggregate result.
    ja: 候補結果を検証・結合・衝突解決して集約結果にする方法を定める構成仕様です。
  definition:
    zh: 聚合规则是 CompositionSpecification 的子类，以规则标识、适用输入类型、聚合方法、完成策略和冲突策略为共同种差。AggregationActivity 在运行时应用它；投票阈值属于 VotingRule，记录合并键属于 MergeRule，公共层不预设某一种聚合机制。
    en: An AggregationRule is a CompositionSpecification distinguished by rule ID, eligible input type, aggregation method, completion policy, and conflict policy. An AggregationActivity applies it at runtime; ballot thresholds belong to VotingRule and record keys to MergeRule, so the genus does not assume one aggregation mechanism.
    ja: AggregationRule は rule ID・eligible input type・aggregation method・completion policy・conflict policy を共通種差とする CompositionSpecification です。runtime では AggregationActivity が適用し、ballot threshold は VotingRule、record key は MergeRule に属するため、上位型は一つの方式を前提にしません。
  why_needed:
    zh: 把规则与活动分开，才能审计某次聚合使用了哪一版判定逻辑，并允许同一规则被多次执行。
    en: Separating rule from activity makes the applied decision logic auditable by revision and lets one rule be executed repeatedly.
    ja: rule と activity を分け、適用した判定論理 revision を監査し一 rule を複数回実行できます。
  includes:
    - zh: 任何可版本化并明确输入资格、聚合方法、完成条件与冲突处置的投票、计分、收集或合并规范。
      en: Any versioned voting, scoring, collecting, or merging specification with explicit input eligibility, aggregation method, completion condition, and conflict treatment.
      ja: input eligibility・aggregation method・completion condition・conflict treatment を明示した versioned voting・scoring・collecting・merging specification。
  excludes:
    - zh: 实际票据或记录、一次聚合运行、聚合结果、路由选择策略，以及只适用于投票或只适用于键合并的专属参数。
      en: Concrete ballots or records, one aggregation run, aggregate results, routing-selection policies, and parameters specific only to voting or keyed merging.
      ja: concrete ballot/record・一回の aggregation run・aggregate result・routing policy、および voting または keyed merge のみに固有な parameter。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: eligible_input_type
      labels:
        zh: 合格输入类型
        en: eligible input type
        ja: eligible input type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可进入本规则的候选项、票据、记录或其它输入的语义类型，而不是某次运行的实际输入集合。
        en: Declares the semantic type of candidates, ballots, records, or other inputs eligible for the rule, not the concrete input set of one run.
        ja: rule に入れる candidate・ballot・record 等の semantic type を宣言し、一 run の具体 input set ではありません。
      allowed_values: []
      pattern: null
      example_value: CompositionArtifact
      source_claims:
        - claim-aggregation-rule-003
    - id: aggregation_method
      labels:
        zh: 聚合方法
        en: aggregation method
        ja: aggregation method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明把多个合格输入变换为一个聚合结果或结果集合的算法族；语言子型在自身字段中给出专属参数。
        en: Declares the algorithm family that transforms multiple eligible inputs into one aggregate result or result collection; subtype fields provide language-specific parameters.
        ja: 複数 eligible input を一 aggregate result または result collection に変換する algorithm family を宣言し、subtype field が固有 parameter を与えます。
      allowed_values: []
      pattern: null
      example_value: collect
      source_claims:
        - claim-aggregation-rule-004
    - id: completion_policy
      labels:
        zh: 完成策略
        en: completion policy
        ja: completion policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定何时输入集合足以关闭聚合并产生结果，例如时间窗结束、输入齐备、达到法定参与量或满足其它可判定条件。
        en: Specifies when the input set is sufficient to close aggregation and produce a result, such as window expiry, complete inputs, quorum, or another decidable condition.
        ja: window expiry・input 完備・quorum 等、いつ input set が aggregation を閉じ result を出すのに十分かを規定します。
      allowed_values: []
      pattern: null
      example_value: close when all assigned inputs arrive or the deadline expires
      source_claims:
        - claim-aggregation-rule-005
    - id: conflict_policy
      labels:
        zh: 冲突策略
        en: conflict policy
        ja: conflict policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定多个合格输入对同一候选、键或结果位置给出不兼容贡献时，是拒绝、延迟、升级还是交由子型专属处置。
        en: Specifies whether incompatible contributions to the same candidate, key, or result position are rejected, deferred, escalated, or handled by subtype-specific policy.
        ja: 同一 candidate・key・result position への incompatible contribution を reject・defer・escalate または subtype 固有処理するかを規定します。
      allowed_values: []
      pattern: null
      example_value: defer-to-subtype-policy
      source_claims:
        - claim-aggregation-rule-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: AggregationRule-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 审阅章节收集规则
      en: Reviewed-section collection rule
      ja: reviewed section collection rule
    scenario_id: null
    descriptions:
      zh: reviewed-section-collection@3 只接收通过审阅的 CompositionArtifact，待全部已分配章节到齐或期限届满后收集；同一章节出现不兼容版本时暂停并升级，而不暗定投票或覆盖行为。
      en: reviewed-section-collection@3 accepts only reviewed CompositionArtifact inputs, collects after all assigned sections arrive or the deadline expires, and escalates incompatible versions of one section instead of assuming voting or overwrite behavior.
      ja: reviewed-section-collection@3 は review 済み CompositionArtifact のみを受け、assigned section 完備または deadline 後に collect し、同一 section の incompatible version は voting や overwrite を仮定せず escalate します。
    field_values:
      composition_specification_id: reviewed-section-collection
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      eligible_input_type: ReviewedCompositionArtifact
      aggregation_method: collect
      completion_policy: all assigned sections received or deadline expired
      conflict_policy: pause and escalate incompatible versions of the same section
    related_node_ids:
      - AggregationRule
      - AggregationActivity
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    expected_result:
      zh: 建立不偏向投票或键合并实现的公共聚合规则版本。
      en: Create a common aggregation-rule revision that assumes neither voting nor keyed-merge implementation.
      ja: voting と keyed merge のどちらも前提にしない共通 aggregation-rule revision を作ります。
    why_valid_or_invalid:
      zh: 六个字段只描述跨聚合机制共有的资格、方法、完成与冲突条件，没有把票制或键合并参数上提。
      en: The six fields describe eligibility, method, completion, and conflict conditions shared across mechanisms without lifting ballot or keyed-merge parameters into the genus.
      ja: 六 field は mechanism 共通の eligibility・method・completion・conflict のみを表し ballot や keyed-merge parameter を上位型へ持ち上げません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-aggregation-rule-007
      - claim-aggregation-rule-008
  - id: AggregationRule-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 本次投票计票活动
      en: This ballot-counting activity
      ja: 今回の票集計 activity
    scenario_id: composition-review-aggregationrule-boundary
    descriptions:
      zh: vote-run-52 在 10:31 读取七张票并应用 majority-with-abstention@2，具有开始、结束和运行状态。
      en: vote-run-52 reads seven ballots at 10:31 and applies majority-with-abstention@2 with start, end, and runtime status.
      ja: vote-run-52 は 10:31 seven ballots を読み rule を適用し start/end/status を持ちます。
    field_values: {}
    related_node_ids:
      - AggregationRule
      - VotingActivity
    related_relation_ids: []
    expected_result:
      zh: 分类为 VotingActivity，并通过 applies 关系引用规则。
      en: Classify it as VotingActivity and reference the rule through applies.
      ja: VotingActivity とし applies 関係で rule を参照します。
    why_valid_or_invalid:
      zh: 发生时间与输入集合属于活动身份，不属于可复用规则身份。
      en: Occurrence time and input set belong to activity identity, not reusable rule identity.
      ja: occurrence time と input set は activity identity で reusable rule identity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-aggregation-rule-001
      - claim-aggregation-rule-002
