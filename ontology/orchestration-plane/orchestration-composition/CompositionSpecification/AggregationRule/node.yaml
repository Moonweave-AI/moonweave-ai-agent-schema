schema: moonweave.ai/ontology-node/v1
id: AggregationRule
kind: concept
labels:
  zh: 聚合规则
  en: aggregation rule
  ja: 集約規則
semantics:
  short_definition:
    zh: 规定一组候选结果如何验证、归并、冲突处理并形成聚合结果的组合规范。
    en: A composition specification defining how candidate results are validated, combined, conflict-resolved, and turned into an aggregate result.
    ja: 候補結果を検証・結合・衝突解決して集約結果にする方法を定める構成仕様です。
  definition:
    zh: 聚合规则是 CompositionSpecification 的子类，以规则标识、适用输入类型、聚合方法、完成策略和冲突策略为共同种差。AggregationActivity 在运行时应用它；投票阈值属于 VotingRule，记录合并键属于 MergeRule，公共层不预设某一种聚合机制。
    en: An AggregationRule is a CompositionSpecification distinguished by rule ID, eligible input type, aggregation method, completion policy, and conflict policy. An AggregationActivity applies it at runtime; ballot thresholds belong to VotingRule and record keys to MergeRule, so the genus does not assume one aggregation mechanism.
    ja: AggregationRule は rule ID・eligible input type・aggregation method・completion policy・conflict policy を共通種差とする CompositionSpecification です。runtime では AggregationActivity が適用し、ballot threshold は VotingRule、record key は MergeRule に属するため、上位型は一つの方式を前提にしません。
  why_needed:
    zh: 把规则与活动分开，才能审计某次聚合使用了哪一版判定逻辑，并允许同一规则被多次执行。
    en: Separating rule from activity makes the applied decision logic auditable by revision and lets one rule be executed repeatedly.
    ja: rule と activity を分け、適用した判定論理 revision を監査し一 rule を複数回実行できます。
  includes:
    - zh: 任何可版本化并明确输入资格、聚合方法、完成条件与冲突处置的投票、计分、收集或合并规范。
      en: Any versioned voting, scoring, collecting, or merging specification with explicit input eligibility, aggregation method, completion condition, and conflict treatment.
      ja: input eligibility・aggregation method・completion condition・conflict treatment を明示した versioned voting・scoring・collecting・merging specification。
  excludes:
    - zh: 实际票据或记录、一次聚合运行、聚合结果、路由选择策略，以及只适用于投票或只适用于键合并的专属参数。
      en: Concrete ballots or records, one aggregation run, aggregate results, routing-selection policies, and parameters specific only to voting or keyed merging.
      ja: concrete ballot/record・一回の aggregation run・aggregate result・routing policy、および voting または keyed merge のみに固有な parameter。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      AggregationRule 编译为 join 节点或 AggregationActivity 引用的可版本化判定函数：读取合格输入集合，
      按 completion_policy 关闭聚合，按 conflict_policy 处置不兼容贡献，再按 aggregation_method 产出结果。
      LangGraph fan-in 与 Agents SDK gather 是实现，不能从一次 gather 反推持久规则 revision。
    en: >-
      An AggregationRule compiles to a versioned decision function referenced by a join node or AggregationActivity:
      read eligible inputs, close under completion_policy, treat conflicts per conflict_policy, then emit a result per
      aggregation_method. LangGraph fan-in and Agents SDK gather are implementations and cannot infer a durable rule
      revision from one gather call.
    ja: >-
      AggregationRule は join node または AggregationActivity が参照する versioned decision function にコンパイルされる。
      eligible input を読み completion_policy で close、conflict_policy で incompatible contribution を処理し
      aggregation_method で result を emit する。LangGraph fan-in と Agents SDK gather は implementation であり
      一回 gather から durable rule revision は推論できない。
  typical_input:
    - description:
        zh: 声明输入资格、聚合方法、完成与冲突策略的聚合规则规约。
        en: An aggregation-rule specification declaring input eligibility, method, completion, and conflict policies.
        ja: input eligibility・method・completion・conflict policy を宣言する aggregation-rule specification。
      format: |-
        {"composition_specification_id":"reviewed-section-collection","version":"3","eligible_input_type":"ReviewedCompositionArtifact","aggregation_method":"collect","completion_policy":"all assigned sections received or deadline expired","conflict_policy":"pause and escalate incompatible versions of the same section"}
  typical_output:
    - description:
        zh: AggregationActivity 运行时绑定的规则 revision 与参数快照。
        en: Rule revision and parameter snapshot bound at AggregationActivity runtime.
        ja: AggregationActivity runtime で bind される rule revision と parameter snapshot。
      format: |-
        {"aggregation_rule_ref":"reviewed-section-collection@3","aggregation_fn":"collect_until_complete","params":{"eligible_input_type":"ReviewedCompositionArtifact","conflict_policy":"escalate"},"input_refs":["artifact-section-17","artifact-section-18"]}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents fan-in join nodes that aggregate parallel branch outputs under explicit policies.
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker aggregation patterns used as composition references.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents collecting specialist outputs as an implementation analogue to aggregation rules.
  source_claims:
    - claim-aggregation-rule-001
    - claim-aggregation-rule-004
structure:
  identity_keys: []
  fields:
    - id: eligible_input_type
      labels:
        zh: 合格输入类型
        en: eligible input type
        ja: eligible input type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可进入本规则的候选项、票据、记录或其它输入的语义类型，而不是某次运行的实际输入集合。
        en: Declares the semantic type of candidates, ballots, records, or other inputs eligible for the rule, not the concrete input set of one run.
        ja: rule に入れる candidate・ballot・record 等の semantic type を宣言し、一 run の具体 input set ではありません。
      allowed_values: []
      pattern: null
      example_value: CompositionArtifact
      source_claims:
        - claim-aggregation-rule-003
    - id: aggregation_method
      labels:
        zh: 聚合方法
        en: aggregation method
        ja: aggregation method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明把多个合格输入变换为一个聚合结果或结果集合的算法族；语言子型在自身字段中给出专属参数。
        en: Declares the algorithm family that transforms multiple eligible inputs into one aggregate result or result collection; subtype fields provide language-specific parameters.
        ja: 複数 eligible input を一 aggregate result または result collection に変換する algorithm family を宣言し、subtype field が固有 parameter を与えます。
      allowed_values: []
      pattern: null
      example_value: collect
      source_claims:
        - claim-aggregation-rule-004
    - id: completion_policy
      labels:
        zh: 完成策略
        en: completion policy
        ja: completion policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定何时输入集合足以关闭聚合并产生结果，例如时间窗结束、输入齐备、达到法定参与量或满足其它可判定条件。
        en: Specifies when the input set is sufficient to close aggregation and produce a result, such as window expiry, complete inputs, quorum, or another decidable condition.
        ja: window expiry・input 完備・quorum 等、いつ input set が aggregation を閉じ result を出すのに十分かを規定します。
      allowed_values: []
      pattern: null
      example_value: close when all assigned inputs arrive or the deadline expires
      source_claims:
        - claim-aggregation-rule-005
    - id: conflict_policy
      labels:
        zh: 冲突策略
        en: conflict policy
        ja: conflict policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定多个合格输入对同一候选、键或结果位置给出不兼容贡献时，是拒绝、延迟、升级还是交由子型专属处置。
        en: Specifies whether incompatible contributions to the same candidate, key, or result position are rejected, deferred, escalated, or handled by subtype-specific policy.
        ja: 同一 candidate・key・result position への incompatible contribution を reject・defer・escalate または subtype 固有処理するかを規定します。
      allowed_values: []
      pattern: null
      example_value: defer-to-subtype-policy
      source_claims:
        - claim-aggregation-rule-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: AggregationRule-example-positive-manual-20260716
    labels:
      zh: AggregationRule positive
      en: AggregationRule positive
      ja: AggregationRule positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 AggregationRule 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to AggregationRule: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) AggregationRule で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {composition_specification_id: reviewed-section-collection, version: 3, valid_from: 2026-07-16T00:00:00Z, eligible_input_type: ReviewedCompositionArtifact, aggregation_method: collect, completion_policy: "all assigned sections received or deadline expired", conflict_policy: "pause and escalate incompatible versions of the same section"}

    related_node_ids:
      - AggregationRule
      - AggregationActivity
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-rule-007
      - claim-aggregation-rule-008

  - id: AggregationRule-example-boundary-manual-20260716
    labels:
      zh: AggregationRule boundary
      en: AggregationRule boundary
      ja: AggregationRule boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 AggregationRule 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not AggregationRule delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で AggregationRule delegation spec ではない。
    field_values: {}

    related_node_ids:
      - AggregationRule
      - VotingActivity
    related_relation_ids: []
    source_claims:
      - claim-aggregation-rule-001
      - claim-aggregation-rule-002

  - id: AggregationRule-counterexample-vote-run-tally
    labels:
      zh: AggregationRule counterexample
      en: AggregationRule counterexample
      ja: AggregationRule counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 AggregationRule PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style AggregationRule PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 AggregationRule ではない。
    field_values: {aggregation_rule_id: absent, version: absent, activity_id: vote-run-52, started_at: 2026-07-16T10:31:00Z}

    related_node_ids:
      - AggregationRule
      - VotingActivity
      - VotingRule
    related_relation_ids: []
    source_claims:
      - claim-aggregation-rule-002

  - id: AggregationRule-instance-majority-with-abstention
    labels:
      zh: AggregationRule instance
      en: AggregationRule instance
      ja: AggregationRule instance
    descriptions:
      zh: ToT 实例：generate_thoughts(state, k=5) 返回 5 个候选 plan → evaluate 选 score 最高 → select(greedy) 写入 AggregationRule 实例。
      en: ToT instance: generate_thoughts(state, k=5) yields 5 plan candidates → evaluate picks highest score → select(greedy) writes AggregationRule instance.
      ja: ToT 实例 k=5 候補→evaluate→select が AggregationRule 实例。
    field_values: {aggregation_rule_id: majority-with-abstention, version: 2, valid_from: 2026-07-16T00:00:00Z, aggregation_kind: vote-tally, input_cardinality: many-ballots, tie_policy: chair-cast, abstention_policy: exclude-from-quorum}

    related_node_ids:
      - AggregationRule
      - VotingRule
      - MergeRule
    related_relation_ids: []
    source_claims:
      - claim-aggregation-rule-001

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents fan-in aggregation over parallel branch outputs at join nodes.
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents reusable aggregation and orchestrator-worker composition patterns.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Separates reusable plans/specifications from time-bounded activities that apply them.
source_claims:
  - id: claim-aggregation-rule-001
    source: w3c-prov-o
    supports: PROV-O distinguishes a reusable Plan/specification from an Activity that applies it at runtime; AggregationRule is the reusable aggregation decision specification.
    locator: PROV-O Plan and Activity model
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-002
    source: w3c-prov-o
    supports: Occurrence time and concrete input sets belong to AggregationActivity identity, not reusable AggregationRule identity.
    locator: PROV-O Activity versus Entity boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-003
    source: langgraph-workflows-agents
    supports: Aggregation rules declare eligible input semantic types rather than one run's concrete input collection.
    locator: Workflows and agents, aggregation inputs
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-004
    source: langgraph-graph-api
    supports: Join nodes apply an aggregation method family to multiple eligible branch outputs.
    locator: Graph API, parallel execution and fan-in
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-005
    source: langgraph-workflows-agents
    supports: Completion policies express when an input set is sufficient to close aggregation and emit a result.
    locator: Workflows and agents, join completion
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-006
    source: langgraph-workflows-agents
    supports: Conflict policies specify treatment of incompatible contributions to the same candidate, key, or result position.
    locator: Workflows and agents, conflict handling
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-007
    source: langgraph-workflows-agents
    supports: A common aggregation-rule revision can describe eligibility, method, completion, and conflict without assuming voting or keyed merge.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-rule-008
    source: w3c-prov-o
    supports: Voting thresholds and record merge keys belong to subtype fields, not the aggregation-rule genus.
    locator: PROV-O specialization boundary
    evidence_kind: design-inference
    confidence: high
