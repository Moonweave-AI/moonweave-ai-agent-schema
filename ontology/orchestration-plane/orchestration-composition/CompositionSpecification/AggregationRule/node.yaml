schema: moonweave.ai/ontology-node/v1
id: AggregationRule
kind: concept
labels:
  zh: 聚合规则
  en: aggregation rule
  ja: 集約規則
semantics:
  short_definition:
    zh: 规定一组候选结果如何验证、归并、冲突处理并形成聚合结果的组合规范。
    en: A composition specification defining how candidate results are validated, combined, conflict-resolved, and turned into an aggregate result.
    ja: 候補結果を検証・結合・衝突解決して集約結果にする方法を定める構成仕様です。
  definition:
    zh: 聚合规则是 CompositionSpecification 的子类，以规则标识、适用输入类型、聚合方法、完成策略和冲突策略为共同种差。AggregationActivity 在运行时应用它；投票阈值属于 VotingRule，记录合并键属于 MergeRule，公共层不预设某一种聚合机制。
    en: An AggregationRule is a CompositionSpecification distinguished by rule ID, eligible input type, aggregation method, completion policy, and conflict policy. An AggregationActivity applies it at runtime; ballot thresholds belong to VotingRule and record keys to MergeRule, so the genus does not assume one aggregation mechanism.
    ja: AggregationRule は rule ID・eligible input type・aggregation method・completion policy・conflict policy を共通種差とする CompositionSpecification です。runtime では AggregationActivity が適用し、ballot threshold は VotingRule、record key は MergeRule に属するため、上位型は一つの方式を前提にしません。
  why_needed:
    zh: 把规则与活动分开，才能审计某次聚合使用了哪一版判定逻辑，并允许同一规则被多次执行。
    en: Separating rule from activity makes the applied decision logic auditable by revision and lets one rule be executed repeatedly.
    ja: rule と activity を分け、適用した判定論理 revision を監査し一 rule を複数回実行できます。
  includes:
    - zh: 任何可版本化并明确输入资格、聚合方法、完成条件与冲突处置的投票、计分、收集或合并规范。
      en: Any versioned voting, scoring, collecting, or merging specification with explicit input eligibility, aggregation method, completion condition, and conflict treatment.
      ja: input eligibility・aggregation method・completion condition・conflict treatment を明示した versioned voting・scoring・collecting・merging specification。
  excludes:
    - zh: 实际票据或记录、一次聚合运行、聚合结果、路由选择策略，以及只适用于投票或只适用于键合并的专属参数。
      en: Concrete ballots or records, one aggregation run, aggregate results, routing-selection policies, and parameters specific only to voting or keyed merging.
      ja: concrete ballot/record・一回の aggregation run・aggregate result・routing policy、および voting または keyed merge のみに固有な parameter。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph state reducer、CrewAI output consolidation 与 map-reduce reduce 函数映射为 AggregationRule；AggregationActivity 通过 applies 引用不可变 rule@version。
    en: LangGraph state reducers, CrewAI output consolidation, and map-reduce reduce functions map to AggregationRule; AggregationActivity references immutable rule@version via applies.
    ja: LangGraph state reducer・CrewAI output consolidation・map-reduce reduce 関数を AggregationRule へ写像し AggregationActivity は applies で rule@version を参照します。
  typical_input:
    - description: LangGraph reducer function.
      format: 'def reduce_results(state): return {"merged": combine(state["worker_outputs"])}'
      source_claims:
        - claim-aggregation-rule-design
  typical_output:
    - description: Moonweave AggregationRule record.
      format: '{"aggregation_rule_id": "evidence-priority", "version": "2"}'
      source_claims:
        - claim-aggregation-rule-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: eligible_input_type
      labels:
        zh: 合格输入类型
        en: eligible input type
        ja: eligible input type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可进入本规则的候选项、票据、记录或其它输入的语义类型，而不是某次运行的实际输入集合。
        en: Declares the semantic type of candidates, ballots, records, or other inputs eligible for the rule, not the concrete input set of one run.
        ja: rule に入れる candidate・ballot・record 等の semantic type を宣言し、一 run の具体 input set ではありません。
      allowed_values: []
      pattern: null
      example_value: CompositionArtifact
      source_claims:
        - claim-aggregation-rule-design
    - id: aggregation_method
      labels:
        zh: 聚合方法
        en: aggregation method
        ja: aggregation method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明把多个合格输入变换为一个聚合结果或结果集合的算法族；语言子型在自身字段中给出专属参数。
        en: Declares the algorithm family that transforms multiple eligible inputs into one aggregate result or result collection; subtype fields provide language-specific parameters.
        ja: 複数 eligible input を一 aggregate result または result collection に変換する algorithm family を宣言し、subtype field が固有 parameter を与えます。
      allowed_values: []
      pattern: null
      example_value: collect
      source_claims:
        - claim-aggregation-rule-design
    - id: completion_policy
      labels:
        zh: 完成策略
        en: completion policy
        ja: completion policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定何时输入集合足以关闭聚合并产生结果，例如时间窗结束、输入齐备、达到法定参与量或满足其它可判定条件。
        en: Specifies when the input set is sufficient to close aggregation and produce a result, such as window expiry, complete inputs, quorum, or another decidable condition.
        ja: window expiry・input 完備・quorum 等、いつ input set が aggregation を閉じ result を出すのに十分かを規定します。
      allowed_values: []
      pattern: null
      example_value: close when all assigned inputs arrive or the deadline expires
      source_claims:
        - claim-aggregation-rule-design
    - id: conflict_policy
      labels:
        zh: 冲突策略
        en: conflict policy
        ja: conflict policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定多个合格输入对同一候选、键或结果位置给出不兼容贡献时，是拒绝、延迟、升级还是交由子型专属处置。
        en: Specifies whether incompatible contributions to the same candidate, key, or result position are rejected, deferred, escalated, or handled by subtype-specific policy.
        ja: 同一 candidate・key・result position への incompatible contribution を reject・defer・escalate または subtype 固有処理するかを規定します。
      allowed_values: []
      pattern: null
      example_value: defer-to-subtype-policy
      source_claims:
        - claim-aggregation-rule-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AggregationRule-langgraph-reducer
    labels:
      zh: LangGraph reducer
      en: LangGraph reducer
      ja: LangGraph reducer
    descriptions:
      zh: evidence-priority@2 定义 fan-in 时按证据优先级合并分支输出。
      en: evidence-priority@2 defines fan-in merge by evidence priority across branch outputs.
      ja: evidence-priority@2 は fan-in で evidence priority により branch output を merge。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: fan-in reducer
    field_values:
      aggregation_rule_id: evidence-priority
      version: "2"
    related_node_ids:
      - AggregationRule
      - MergeRule
      - AggregationActivity
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-rule-langgraph
      - claim-aggregation-rule-design
  - id: AggregationRule-crewai-consolidation
    labels:
      zh: CrewAI 输出合并规则
      en: CrewAI consolidation rule
      ja: CrewAI consolidation rule
    descriptions:
      zh: writer task 的 expected_output 契约充当并行结果合并规则。
      en: Writer task expected_output contract acts as parallel result consolidation rule.
      ja: writer task expected_output 契約が並列結果 merge rule として機能。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: output consolidation
    field_values:
      aggregation_rule_id: crew-merge
      version: "1"
    related_node_ids:
      - AggregationRule
      - Synthesis
    related_relation_ids: []
    source_claims:
      - claim-aggregation-rule-crewai
      - claim-aggregation-rule-design
  - id: AggregationRule-boundary-activity
    labels:
      zh: 应用活动不是规则
      en: Applying activity is not rule
      ja: apply activity は rule ではない
    descriptions:
      zh: reduce 节点执行是 AggregationActivity 发生，不是 AggregationRule 规范。
      en: Reduce node execution is AggregationActivity occurrence not AggregationRule specification.
      ja: reduce ノード実行は AggregationActivity 発生で AggregationRule spec ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus activity
    field_values: {}
    related_node_ids:
      - AggregationRule
      - AggregationActivity
    related_relation_ids: []
    source_claims:
      - claim-aggregation-rule-design
parent_relation:
  id: AggregationRule-is_a-CompositionSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 聚合规则继承组合规范的可复用身份，并以输入资格、聚合方法、完成策略和冲突策略为共同种差；投票和内容合并的专属条件继续位于下位类型。
    en: AggregationRule inherits reusable composition-specification identity and is distinguished by input eligibility, aggregation method, completion policy, and conflict policy; voting- and content-merge-specific conditions remain on subtypes.
    ja: AggregationRule は reusable composition-specification identity を継承し input eligibility・method・completion policy・conflict policy を共通種差とし、voting/content-merge 固有条件は下位型に残します。
