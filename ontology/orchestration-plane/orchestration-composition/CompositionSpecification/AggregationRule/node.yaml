review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic/LangGraph 工作流模式（prompt chaining、parallelization sectioning/voting、orchestrator-worker 分解、synthesis）与 PROV-O 规范/活动分离逐项核验；组合模式、拓扑、部件与聚合规则语义成立。
    en: Semantics, hierarchy, relations, structure, and examples were checked against Anthropic/LangGraph workflow patterns (prompt chaining, parallelization sectioning/voting, orchestrator-worker decomposition, synthesis) and PROV-O specification/activity separation; composition patterns, topologies, parts, and aggregation rules hold.
    ja: Anthropic/LangGraph workflow pattern（prompt chaining・parallelization sectioning/voting・orchestrator-worker 分解・synthesis）と PROV-O specification/activity 分離に照らし semantics/hierarchy/relations/structure/examples を項目別確認しました。composition pattern・topology・part・aggregation rule は成立します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-aggregation-rule-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-002
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-003
    source: eng-decision-omg-dmn-1-5
    supports: DMN decision tables type their inputs and match rules against eligible input expressions; Moonweave generalizes this prerequisite to every aggregation rule.
    locator: OMG DMN 1.5 > Clause 8.2 Decision Table inputs and rule matching
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-004
    source: eng-decision-omg-dmn-1-5
    supports: DMN 1.5 defines Collect hit policy and optional built-in aggregation functions over matched outputs, directly grounding an explicit aggregation method.
    locator: "OMG DMN 1.5 > Clause 8.2.11 Hit Policy: Collect and BuiltinAggregator"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-005
    source: eng-governance-oasis-consensus-2026
    supports: The Oasis governance service explicitly closes voting after a configured voting period and validates results only when quorum is met, illustrating independent completion conditions.
    locator: "Oasis governance service > Consensus Parameters: voting_period and quorum"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-006
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 makes duplicate member behavior undefined and defines replacement/removal semantics, showing that conflict treatment must be explicit rather than assumed by a generic merge implementation.
    locator: RFC 7396 > §2 Processing Merge Patch Documents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-007
    source: eng-decision-omg-dmn-1-5
    supports: DMN 1.5 defines typed decision inputs and a Collect hit policy with explicit aggregation behavior; Moonweave uses that separation to keep input eligibility and aggregation method explicit on the reusable rule.
    locator: "OMG DMN 1.5, Clause 8.2 Decision Tables: inputs, Collect hit policy, and BuiltinAggregator"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-aggregation-rule-008
    source: eng-data-rfc7396-json-merge-patch
    supports: RFC 7396 leaves duplicate member behavior undefined and does not preserve textual member order, demonstrating why a generic aggregator must declare rather than silently assume conflict handling.
    locator: "RFC 7396 Section 2, Processing Merge Patch Documents: duplicate members and member ordering"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
