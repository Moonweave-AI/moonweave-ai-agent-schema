schema: moonweave.ai/ontology-node/v1
id: SynthesisPlan
kind: concept
labels:
  zh: 综合计划
  en: synthesis plan
  ja: 統合計画
semantics:
  short_definition:
    zh: 规定综合目标、输入选择、证据处理和输出契约的可版本化组合规范。
    en: A versioned composition specification defining synthesis objective, input selection, evidence treatment, and output contract.
    ja: 統合目的・入力選択・証拠処理・出力契約を定める versioned composition specification です。
  definition:
    zh: 综合计划是 CompositionSpecification 的子类，以计划标识、版本、综合目标、输入资格、冲突处理和输出契约为种差。Synthesis 活动受其约束，但计划不包含本次实际输入、不保存运行状态，也不是生成后的 SynthesisOutput。
    en: A SynthesisPlan is a CompositionSpecification distinguished by plan ID, revision, synthesis objective, input eligibility, conflict handling, and output contract. A Synthesis activity is governed by it, but the plan contains neither the actual inputs of a run nor runtime state and is not the generated SynthesisOutput.
    ja: SynthesisPlan は plan ID・revision・synthesis objective・input eligibility・conflict handling・output contract で区別される CompositionSpecification です。Synthesis activity を制約しますが actual run inputs や runtime state を含まず SynthesisOutput でもありません。
  why_needed:
    zh: 独立计划使综合意图和证据政策可审核、可复用，并能与某次执行及其产物分开版本化。
    en: An independent plan makes synthesis intent and evidence policy reviewable and reusable, with versioning separate from runs and outputs.
    ja: plan を独立させ synthesis intent/evidence policy を監査・再利用し run/output と別 versioning できます。
  includes:
    - zh: 报告汇编计划、证据调和计划、候选方案归纳计划和多章节综合计划。
      en: Report-assembly, evidence-reconciliation, candidate-consolidation, and multi-section synthesis plans.
      ja: report assembly・evidence reconciliation・candidate consolidation・multi-section synthesis plan。
  excludes:
    - zh: 实际章节片段、执行中的综合活动、已生成报告、通用提示模板和模型供应商配置。
      en: Actual section fragments, running synthesis activities, generated reports, generic prompt templates, and model-provider configuration.
      ja: actual section fragment・running synthesis activity・generated report・generic prompt template・model provider config。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      SynthesisPlan 约束 Synthesis 活动如何选择 SynthesisInput、处理冲突并满足 output_contract_ref。
      LangGraph synthesize 节点或 Agents SDK 结构化输出读取 plan revision；plan 不存储本次实际输入集合。
    en: >-
      SynthesisPlan constrains how Synthesis activities select SynthesisInput, handle conflicts, and satisfy
      output_contract_ref. LangGraph synthesize nodes or Agents SDK structured outputs read a plan revision; the plan
      does not store one run's actual input set.
    ja: >-
      SynthesisPlan は Synthesis activity の SynthesisInput 選択・conflict handling・output_contract_ref 充足を制約する。
      LangGraph synthesize node または Agents SDK structured output が plan revision を読む。plan は actual input set を保持しない。
  typical_input:
    - description:
        zh: 声明综合目标、输入资格、冲突处理与输出契约的计划 revision。
        en: Plan revision declaring synthesis objective, input eligibility, conflict handling, and output contract.
        ja: synthesis objective/input eligibility/conflict handling/output contract を宣言する plan revision。
      format: |-
        {"synthesis_plan_id":"report-synthesis","version":"2","objective":"assemble reviewed sections into one report","input_eligibility":"ReviewedCompositionArtifact","conflict_handling":"prefer higher review confidence","output_contract_ref":"report-schema@1"}
  typical_output:
    - description:
        zh: Synthesis 活动绑定的计划 revision 与输出 schema 快照。
        en: Plan revision and output schema snapshot bound by a Synthesis activity.
        ja: Synthesis activity が bind する plan revision と output schema snapshot。
      format: |-
        {"synthesis_plan_ref":"report-synthesis@2","bound_activity":"synthesis-884","output_contract_ref":"report-schema@1"}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator synthesis consolidating specialist outputs.
    - name: OpenAI Agents SDK running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents structured synthesis output from agent runs.
  source_claims:
    - claim-synthesis-plan-001
    - claim-synthesis-plan-002
structure:
  identity_keys: []
  fields:
    - id: objective
      labels:
        zh: 综合目标
        en: synthesis objective
        ja: 統合目的
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明输出必须回答的问题和不得丢失的证据维度。
        en: States the question the output must answer and evidence dimensions it must preserve.
        ja: output が答える question と保持すべき evidence dimensions を示します。
      allowed_values: []
      pattern: null
      example_value: reconcile audit findings by control family
      source_claims:
        - claim-synthesis-plan-001
    - id: input_eligibility
      labels:
        zh: 输入资格契约
        en: input-eligibility contract
        ja: input eligibility contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可进入综合的工件类型、必须覆盖的输入角色及完整性条件；它描述输入类别，不列出某次运行实际读取的工件。
        en: Declares the artifact type, required input roles, and integrity conditions eligible for synthesis. It describes input classes and does not list the artifacts actually read by one run.
        ja: synthesis に入れる artifact type、required input role、integrity condition を宣言します。input class を記述し、一 run が実際に読んだ artifact は列挙しません。
      allowed_values: []
      pattern: null
      example_value:
        required_roles:
          - access
          - network
          - data
        artifact_type: reviewed-section
      source_claims:
        - claim-synthesis-plan-003
    - id: conflict_policy
      labels:
        zh: 冲突处理策略
        en: conflict-handling policy
        ja: conflict handling policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定输入主张相互冲突时是保留并列意见、按证据裁决还是升级；不得用静默覆盖替代明确策略。
        en: Specifies whether conflicting input claims are preserved side by side, adjudicated by evidence, or escalated. Silent overwrite cannot substitute for an explicit policy.
        ja: input claim が衝突する場合に並列保持、evidence adjudication、escalation のどれを行うか規定し、silent overwrite を明示 policy の代わりにできません。
      allowed_values: []
      pattern: null
      example_value: preserve dissent and cite each conflicting source
      source_claims:
        - claim-synthesis-plan-004
    - id: output_contract_ref
      labels:
        zh: 输出契约引用
        en: output-contract reference
        ja: output contract 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用综合结果必须满足的结构、完整性和证据追踪契约；引用固定规范，不是本次生成的输出工件。
        en: References the structure, completeness, and provenance contract that a synthesis result must satisfy. It fixes a specification and is not the output artifact generated by a run.
        ja: synthesis result が満たす structure・completeness・provenance contract を参照します。specification を固定し、run が生成した output artifact ではありません。
      allowed_values: []
      pattern: null
      example_value: report-schema@2
      source_claims:
        - claim-synthesis-plan-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisPlan-example-positive-manual-20260716
    labels:
      zh: SynthesisPlan positive
      en: SynthesisPlan positive
      ja: SynthesisPlan positive
    descriptions:
      zh: Tree of Thoughts (Yao et al., 2023) 对 SynthesisPlan 使用 BFS/DFS 思维树：tree.generate_thoughts(state, k=5) 生成候选 → tree.evaluate(thoughts) 评估 → tree.select(evaluated, method="greedy") 选最优分支；Game of 24 任务上 ToT 显著优于 CoT。
      en: Tree of Thoughts (Yao et al., 2023) applies BFS/DFS thought trees to SynthesisPlan: tree.generate_thoughts(state, k=5) → tree.evaluate(thoughts) → tree.select(evaluated, method="greedy"); ToT beats CoT on Game of 24.
      ja: ToT (Yao et al., 2023) SynthesisPlan で generate_thoughts(k=5)→evaluate→select(greedy)；Game of 24 で CoT 超え。
    field_values: {composition_specification_id: audit-report-synthesis, version: 5, valid_from: 2026-07-16T00:00:00Z, objective: "reconcile audit findings by control family"}

    related_node_ids:
      - SynthesisPlan
      - Synthesis
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
    source_claims:
      - claim-synthesis-plan-001
      - claim-synthesis-plan-002

  - id: SynthesisPlan-example-boundary-manual-20260716
    labels:
      zh: SynthesisPlan boundary
      en: SynthesisPlan boundary
      ja: SynthesisPlan boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 SynthesisPlan 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not SynthesisPlan static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で SynthesisPlan 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - SynthesisPlan
      - SynthesisOutput
    related_relation_ids: []
    source_claims:
      - claim-synthesis-plan-002
      - claim-synthesis-plan-001

  - id: SynthesisPlan-example-counterexample-manual-20260719
    labels:
      zh: SynthesisPlan counterexample
      en: SynthesisPlan counterexample
      ja: SynthesisPlan counterexample
    descriptions:
      zh: 自然语言计划列表无 Python/code 可执行步骤不能作为 TaskWeaver 式 SynthesisPlan。
      en: Natural-language plan list without Python/code executable steps cannot serve as TaskWeaver-style SynthesisPlan.
      ja: Python/code なし自然言語計画は TaskWeaver 式 SynthesisPlan にならない。
    field_values: {composition_specification_id: absent, objective: absent, input_eligibility: absent, output_contract_ref: absent, started_at: 2026-07-16T04:20:00Z, governed_by_plan_ref: "audit-report-synthesis@5", output_ref: report-884}

    related_node_ids:
      - SynthesisPlan
      - Synthesis
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
    source_claims:
      - claim-synthesis-plan-001
      - claim-synthesis-plan-005

  - id: SynthesisPlan-example-instance-manual-20260719
    labels:
      zh: SynthesisPlan instance
      en: SynthesisPlan instance
      ja: SynthesisPlan instance
    descriptions:
      zh: ToT 实例：generate_thoughts(state, k=5) 返回 5 个候选 plan → evaluate 选 score 最高 → select(greedy) 写入 SynthesisPlan 实例。
      en: ToT instance: generate_thoughts(state, k=5) yields 5 plan candidates → evaluate picks highest score → select(greedy) writes SynthesisPlan instance.
      ja: ToT 实例 k=5 候補→evaluate→select が SynthesisPlan 实例。
    field_values: {composition_specification_id: audit-report-synthesis, version: 5, valid_from: 2026-07-16T00:00:00Z, objective: "reconcile audit findings by control family"}

    related_node_ids:
      - SynthesisPlan
      - SynthesisPattern
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
    source_claims:
      - claim-synthesis-plan-001
      - claim-synthesis-plan-005

