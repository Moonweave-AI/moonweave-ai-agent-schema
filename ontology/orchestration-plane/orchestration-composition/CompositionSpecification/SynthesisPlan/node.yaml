review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic/LangGraph 工作流模式（prompt chaining、parallelization sectioning/voting、orchestrator-worker 分解、synthesis）与 PROV-O 规范/活动分离逐项核验；组合模式、拓扑、部件与聚合规则语义成立。
    en: Semantics, hierarchy, relations, structure, and examples were checked against Anthropic/LangGraph workflow patterns (prompt chaining, parallelization sectioning/voting, orchestrator-worker decomposition, synthesis) and PROV-O specification/activity separation; composition patterns, topologies, parts, and aggregation rules hold.
    ja: Anthropic/LangGraph workflow pattern（prompt chaining・parallelization sectioning/voting・orchestrator-worker 分解・synthesis）と PROV-O specification/activity 分離に照らし semantics/hierarchy/relations/structure/examples を項目別確認しました。composition pattern・topology・part・aggregation rule は成立します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-synthesis-plan-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-synthesis-plan-002
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-synthesis-plan-003
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's orchestrator-worker pattern assigns subtasks whose outputs are later synthesized. Moonweave records the eligible output roles and artifact type on the reusable synthesis plan rather than inferring them from one run.
    locator: "Workflows and agents: Orchestrator-worker and synthesizer"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-synthesis-plan-004
    source: eng-ont-prov-o
    supports: PROV-O keeps entities and their derivations distinct rather than erasing provenance. Moonweave applies that provenance boundary to conflict handling in a synthesis plan.
    locator: PROV-O Recommendation Sections 3.1-3.2, Entity, Activity, usage, and derivation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-synthesis-plan-005
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph distinguishes orchestrated worker outputs from the final synthesizer output. Moonweave fixes the required final-output contract on the reusable plan while runtime output remains a separate artifact.
    locator: "Workflows and agents: Orchestrator-worker and final synthesis"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
