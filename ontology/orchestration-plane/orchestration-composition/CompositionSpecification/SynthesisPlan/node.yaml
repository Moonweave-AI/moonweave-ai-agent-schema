    en: is a
    ja: の一種である
  definitions:
    zh: 综合计划继承组合规范身份，并以具体综合目标、输入政策、冲突处理与输出契约为种差。
    en: SynthesisPlan inherits composition-specification identity and is distinguished by a concrete objective, input policy, conflict handling, and output contract.
    ja: SynthesisPlan は specification identity を継承し concrete objective・input policy・conflict handling・output contract を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
