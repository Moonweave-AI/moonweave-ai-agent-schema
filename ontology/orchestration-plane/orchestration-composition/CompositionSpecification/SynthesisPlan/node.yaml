schema: moonweave.ai/ontology-node/v1
id: SynthesisPlan
kind: concept
labels:
  zh: 综合计划
  en: synthesis plan
  ja: 統合計画
semantics:
  short_definition:
    zh: 规定综合目标、输入选择、证据处理和输出契约的可版本化组合规范。
    en: A versioned composition specification defining synthesis objective, input selection, evidence treatment, and output contract.
    ja: 統合目的・入力選択・証拠処理・出力契約を定める versioned composition specification です。
  definition:
    zh: 综合计划是 CompositionSpecification 的子类，以计划标识、版本、综合目标、输入资格、冲突处理和输出契约为种差。Synthesis 活动受其约束，但计划不包含本次实际输入、不保存运行状态，也不是生成后的 SynthesisOutput。
    en: A SynthesisPlan is a CompositionSpecification distinguished by plan ID, revision, synthesis objective, input eligibility, conflict handling, and output contract. A Synthesis activity is governed by it, but the plan contains neither the actual inputs of a run nor runtime state and is not the generated SynthesisOutput.
    ja: SynthesisPlan は plan ID・revision・synthesis objective・input eligibility・conflict handling・output contract で区別される CompositionSpecification です。Synthesis activity を制約しますが actual run inputs や runtime state を含まず SynthesisOutput でもありません。
  why_needed:
    zh: 独立计划使综合意图和证据政策可审核、可复用，并能与某次执行及其产物分开版本化。
    en: An independent plan makes synthesis intent and evidence policy reviewable and reusable, with versioning separate from runs and outputs.
    ja: plan を独立させ synthesis intent/evidence policy を監査・再利用し run/output と別 versioning できます。
  includes:
    - zh: 报告汇编计划、证据调和计划、候选方案归纳计划和多章节综合计划。
      en: Report-assembly, evidence-reconciliation, candidate-consolidation, and multi-section synthesis plans.
      ja: report assembly・evidence reconciliation・candidate consolidation・multi-section synthesis plan。
  excludes:
    - zh: 实际章节片段、执行中的综合活动、已生成报告、通用提示模板和模型供应商配置。
      en: Actual section fragments, running synthesis activities, generated reports, generic prompt templates, and model-provider configuration.
      ja: actual section fragment・running synthesis activity・generated report・generic prompt template・model provider config。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Synthesis 前置计划声明输入清单、MergeRule 与输出契约；LangGraph reduce 前 planner 节点与 CrewAI synthesis task 描述映射为 SynthesisPlan。
    en: SynthesisPlan declares input inventory, MergeRule, and output contract; LangGraph pre-reduce planner nodes and CrewAI synthesis task descriptions map to SynthesisPlan.
    ja: SynthesisPlan は input 清单・MergeRule・output 契约を宣言し LangGraph reduce 前 planner node・CrewAI synthesis task 描述を写像します。
  typical_input:
    - description: Synthesis plan specification.
      format: '{"plan_id": "evidence-synthesis-plan", "version": "2", "merge_rule_ref": "conflict-preserving@2"}'
      source_claims:
        - claim-synthesis-plan-design
  typical_output:
    - description: Moonweave SynthesisPlan.
      format: '{"composition_specification_id": "evidence-synthesis-plan", "version": "2"}'
      source_claims:
        - claim-synthesis-plan-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: objective
      labels:
        zh: 综合目标
        en: synthesis objective
        ja: 統合目的
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明输出必须回答的问题和不得丢失的证据维度。
        en: States the question the output must answer and evidence dimensions it must preserve.
        ja: output が答える question と保持すべき evidence dimensions を示します。
      allowed_values: []
      pattern: null
      example_value: reconcile audit findings by control family
      source_claims:
        - claim-synthesis-plan-design
    - id: input_eligibility
      labels:
        zh: 输入资格契约
        en: input-eligibility contract
        ja: input eligibility contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可进入综合的工件类型、必须覆盖的输入角色及完整性条件；它描述输入类别，不列出某次运行实际读取的工件。
        en: Declares the artifact type, required input roles, and integrity conditions eligible for synthesis. It describes input classes and does not list the artifacts actually read by one run.
        ja: synthesis に入れる artifact type、required input role、integrity condition を宣言します。input class を記述し、一 run が実際に読んだ artifact は列挙しません。
      allowed_values: []
      pattern: null
      example_value:
        required_roles:
          - access
          - network
          - data
        artifact_type: reviewed-section
      source_claims:
        - claim-synthesis-plan-design
    - id: conflict_policy
      labels:
        zh: 冲突处理策略
        en: conflict-handling policy
        ja: conflict handling policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定输入主张相互冲突时是保留并列意见、按证据裁决还是升级；不得用静默覆盖替代明确策略。
        en: Specifies whether conflicting input claims are preserved side by side, adjudicated by evidence, or escalated. Silent overwrite cannot substitute for an explicit policy.
        ja: input claim が衝突する場合に並列保持、evidence adjudication、escalation のどれを行うか規定し、silent overwrite を明示 policy の代わりにできません。
      allowed_values: []
      pattern: null
      example_value: preserve dissent and cite each conflicting source
      source_claims:
        - claim-synthesis-plan-design
    - id: output_contract_ref
      labels:
        zh: 输出契约引用
        en: output-contract reference
        ja: output contract 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用综合结果必须满足的结构、完整性和证据追踪契约；引用固定规范，不是本次生成的输出工件。
        en: References the structure, completeness, and provenance contract that a synthesis result must satisfy. It fixes a specification and is not the output artifact generated by a run.
        ja: synthesis result が満たす structure・completeness・provenance contract を参照します。specification を固定し、run が生成した output artifact ではありません。
      allowed_values: []
      pattern: null
      example_value: report-schema@2
      source_claims:
        - claim-synthesis-plan-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisPlan-evidence-merge
    labels:
      zh: 证据综合计划
      en: Evidence synthesis plan
      ja: evidence 統合 plan
    descriptions:
      zh: evidence-synthesis-plan@2 声明三输入 digest 与 conflict-preserving@2。
      en: evidence-synthesis-plan@2 declares three input digests and conflict-preserving@2.
      ja: evidence-synthesis-plan@2 が三 input digest と conflict-preserving@2 を宣言。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: map-reduce plan
    field_values:
      composition_specification_id: evidence-synthesis-plan
      version: "2"
    related_node_ids:
      - SynthesisPlan
      - MergeRule
      - Synthesis
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
    source_claims:
      - claim-synthesis-plan-cookbook
      - claim-synthesis-plan-design
  - id: SynthesisPlan-crewai-writer
    labels:
      zh: CrewAI writer 计划
      en: CrewAI writer plan
      ja: CrewAI writer plan
    descriptions:
      zh: write_task description/expected_output 充当 synthesis 计划契约。
      en: write_task description/expected_output acts as synthesis plan contract.
      ja: write_task description/expected_output が synthesis plan 契约として機能。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: synthesis task spec
    field_values: {}
    related_node_ids:
      - SynthesisPlan
      - SynthesisPattern
    related_relation_ids: []
    source_claims:
      - claim-synthesis-plan-crewai
      - claim-synthesis-plan-design
  - id: SynthesisPlan-boundary-run
    labels:
      zh: 综合运行不是计划
      en: Synthesis run is not plan
      ja: synthesis run は plan ではない
    descriptions:
      zh: synthesis-run-31 有起止时间，是 Synthesis 不是 SynthesisPlan。
      en: synthesis-run-31 has start/end and is Synthesis not SynthesisPlan.
      ja: synthesis-run-31 は start/end を持ち Synthesis で SynthesisPlan ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - SynthesisPlan
      - Synthesis
    related_relation_ids: []
    source_claims:
      - claim-synthesis-plan-design
parent_relation:
