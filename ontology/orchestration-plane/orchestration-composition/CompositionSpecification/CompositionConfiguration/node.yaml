schema: moonweave.ai/ontology-node/v1
id: CompositionConfiguration
kind: concept
labels:
  zh: 完整组合配置
  en: Composition Configuration
  ja: 完全構成設定
semantics:
  short_definition:
    zh: 绑定一个拓扑、所选模式与规则以及实现来源的完整本地声明性组合配置。
    en: A complete local declarative composition configuration that binds a topology, selected patterns and rules, and implementation provenance.
    ja: トポロジー、選択したパターンと規則、実装出所を結び付ける完全なローカル宣言的構成設定。
  definition:
    zh: >-
      CompositionConfiguration 是 CompositionSpecification 的一种，用于表达可执行前的完整 Moonweave 本地组合配置。它引用一个 OrchestrationTopology、采用的 CompositionPattern、可用 AggregationRule，以及一个实际实现绑定，从而把结构、策略和实现来源聚合为同一声明。与抽象的 CompositionSpecification 不同，只有该完整配置类型要求 topology_ref 和 binding_ref。它不是 LangGraph StateGraph、OpenAI Agents SDK Agent 配置、A2A AgentCard、MCP server 配置或协议原生 schema；适配器只能保留这些实际对象作为来源。
    en: >-
      A CompositionConfiguration is a kind of CompositionSpecification that expresses one complete Moonweave-local composition configuration before execution. It references one OrchestrationTopology, adopted CompositionPattern values, available AggregationRule values, and one actual implementation binding, bringing structure, policy, and implementation provenance into the same declaration. Unlike the abstract CompositionSpecification, only this complete-configuration type requires topology_ref and binding_ref. It is not a LangGraph StateGraph, an OpenAI Agents SDK Agent configuration, an A2A AgentCard, an MCP server configuration, or a protocol-native schema; adapters retain those actual objects only as sources.
    ja: >-
      CompositionConfiguration は CompositionSpecification の一種であり、実行前の完全な Moonweave ローカル構成設定を表します。一つの OrchestrationTopology、採用した CompositionPattern、利用可能な AggregationRule、実際の実装バインディングを参照し、構造、方針、実装出所を同じ宣言にまとめます。抽象的な CompositionSpecification と異なり、topology_ref と binding_ref を必須とするのはこの完全設定型だけです。LangGraph StateGraph、OpenAI Agents SDK Agent 設定、A2A AgentCard、MCP server 設定、プロトコルネイティブ schema ではありません。アダプターはそれらの実在オブジェクトを出所としてのみ保持します。
  why_needed:
    zh: >-
      模式、规则和拓扑可被独立复用，但发布或验证一次端到端组合时，需要一个明确对象说明它们在何处共同适用，以及其实现来自何处。完整配置保留这项绑定事实，而不把各个可复用声明误作完整部署。
    en: >-
      Patterns, rules, and topologies can be reused independently, but publishing or validating an end-to-end composition needs one explicit object saying where they apply together and which implementation supplies it. A complete configuration retains that binding fact without mistaking each reusable declaration for a deployment.
    ja: >-
      パターン、規則、トポロジーは独立して再利用できますが、エンドツーエンド構成を公開または検証するには、それらがどこで一緒に適用され、どの実装が供給するかを示す明示的なオブジェクトが必要です。完全設定はこのバインディング事実を保持し、各再利用可能な宣言をデプロイメントと取り違えません。
  includes:
    - zh: 同时引用本地拓扑、采用模式、可用归并规则和实际实现绑定的完整组合声明。
      en: A complete composition declaration that references local topology, adopted patterns, available aggregation rules, and an actual implementation binding.
      ja: ローカルトポロジー、採用パターン、利用可能な集約規則、実際の実装バインディングを参照する完全な構成宣言。
    - zh: 从实际 StateGraph、Agents SDK 应用或部署配置获得来源证据的本地配置投影。
      en: A local configuration projection with provenance from an actual StateGraph, Agents SDK application, or deployment configuration.
      ja: 実際の StateGraph、Agents SDK アプリケーション、またはデプロイ設定から出所証拠を得るローカル設定投影。
  excludes:
    - zh: 单独的 CompositionPart、CompositionPattern、AggregationRule、OrchestrationTopology 或 SynthesisPlan；它们可被配置采用，但本身不必包含完整绑定。
      en: A standalone CompositionPart, CompositionPattern, AggregationRule, OrchestrationTopology, or SynthesisPlan; each may be adopted by a configuration but need not contain the complete binding.
      ja: 単独の CompositionPart、CompositionPattern、AggregationRule、OrchestrationTopology、SynthesisPlan。これらは設定に採用できるが、完全なバインディングを含む必要はない。
    - zh: 实际可执行图对象、SDK Agent 实例、一次运行活动或供应商原生配置对象本身。
      en: An executable graph object, SDK Agent instance, occurred activity, or vendor-native configuration object itself.
      ja: 実行可能なグラフオブジェクト、SDK Agent インスタンス、発生した活動、またはベンダーネイティブ設定オブジェクトそのもの。
  semantic_kind: information
engineering:
  explanation:
    zh: >-
      LangGraph 通过 StateGraph.add_node、add_edge 和条件路由定义实际图；Agents SDK 通过 Agent、tools、handoffs 和 Runner 定义运行行为。配置构建器读取这些真实配置，选择本地拓扑、模式和规则，分配 configuration_id，并以 binding_ref 回指可执行代码或部署配置，而不重命名来源对象。
    en: >-
      LangGraph defines an actual graph through StateGraph.add_node, add_edge, and conditional routing, while the Agents SDK defines run behavior through Agent, tools, handoffs, and Runner. A configuration builder reads those real configurations, selects local topology, patterns, and rules, assigns configuration_id, and uses binding_ref to point back to executable code or deployment configuration without renaming source objects.
    ja: >-
      LangGraph は StateGraph.add_node、add_edge、条件ルーティングで実際のグラフを定義し、Agents SDK は Agent、tools、handoffs、Runner で実行動作を定義します。設定ビルダーはこれらの実在設定を読み、ローカルトポロジー、パターン、規則を選び、configuration_id を割り当て、binding_ref で実行可能コードまたはデプロイ設定を指し戻します。出所オブジェクトを改名しません。
  typical_input:
    - description:
        zh: LangGraph 代码定义节点、边和条件路由。
        en: LangGraph code defines nodes, edges, and conditional routing.
        ja: LangGraph コードがノード、辺、条件ルーティングを定義する。
      format: |-
        graph = StateGraph(State)
        graph.add_node("research", research)
        graph.add_node("write", write)
        graph.add_edge(START, "research")
        graph.add_edge("research", "write")
        graph.add_edge("write", END)
    - description:
        zh: Agents SDK 代码配置带工具和 handoff 的 Agent。
        en: Agents SDK code configures an Agent with tools and handoffs.
        ja: Agents SDK コードがツールと handoff を持つ Agent を設定する。
      format: |-
        triage = Agent(name="Triage", tools=[search_tool], handoffs=[billing_agent])
  typical_output:
    - description:
        zh: 绑定真实实现来源的完整本地组合配置。
        en: A complete local composition configuration bound to real implementation provenance.
        ja: 実際の実装出所に結び付いた完全なローカル構成設定。
      format: |-
        {"configuration_id":"config-support-4","topology_ref":"topology-support-4","pattern_refs":["pattern-triage-handoff"],"aggregation_rule_refs":[],"binding_ref":"openai-agents-sdk:app:support"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents StateGraph configuration through nodes, edges, and routing.
    - name: OpenAI Agents SDK agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents Agent configuration with instructions, tools, handoffs, and runtime behavior.
structure:
  identity_keys:
    - configuration_id
  fields:
    - id: configuration_id
      labels:
        zh: 配置标识
        en: Configuration identifier
        ja: 設定識別子
      definitions:
        zh: 稳定标识一份完整本地组合配置。
        en: Stably identifies one complete local composition configuration.
        ja: 一つの完全なローカル構成設定を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: config-support-4
    - id: topology_ref
      labels:
        zh: 拓扑引用
        en: Topology reference
        ja: トポロジー参照
      definitions:
        zh: 指向声明组成部分及其依赖安排的本地 OrchestrationTopology。
        en: Points to the local OrchestrationTopology that declares composition parts and their dependency arrangement.
        ja: 構成部分と依存配置を宣言するローカル OrchestrationTopology を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: topology-support-4
    - id: pattern_refs
      labels:
        zh: 模式引用
        en: Pattern references
        ja: パターン参照
      definitions:
        zh: 列出该配置采用的本地 CompositionPattern。
        en: Lists local CompositionPattern values adopted by this configuration.
        ja: この設定が採用するローカル CompositionPattern を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 0
        max: null
      example_value:
        - pattern-triage-handoff
    - id: aggregation_rule_refs
      labels:
        zh: 归并规则引用
        en: Aggregation rule references
        ja: 集約規則参照
      definitions:
        zh: 列出本地归并阶段可使用的 AggregationRule。
        en: Lists AggregationRule values that local aggregation stages may use.
        ja: ローカル集約ステージが使い得る AggregationRule を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 0
        max: null
      example_value: []
    - id: binding_ref
      labels:
        zh: 实现绑定引用
        en: Implementation binding reference
        ja: 実装バインディング参照
      definitions:
        zh: 指向实际可执行图、SDK 应用或部署配置，并保留其来源系统名。
        en: Points to an actual executable graph, SDK application, or deployment configuration and retains its source-system name.
        ja: 実際に実行可能なグラフ、SDK アプリケーション、デプロイ設定を指し、出所システム名を保持する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: "openai-agents-sdk:app:support"
  constraints:
    - id: composition-configuration-requires-topology-and-binding
      severity: error
      language: plain
      expression: A CompositionConfiguration must reference exactly one topology_ref and one binding_ref before it can be used for execution planning.
      explanation:
        zh: 完整配置必须把结构意图和真实实现绑定在一起，而不是停留在无效标签集合。
        en: A complete configuration must bind structural intent to a real implementation rather than remain an inert set of labels.
        ja: 完全設定は不活性なラベル集合に留まらず、構造意図を実際の実装へ結び付けなければならない。
      source_claims:
        - claim-composition-configuration-local
    - id: composition-configuration-keeps-native-config
      severity: error
      language: plain
      expression: binding_ref must retain the native graph or SDK configuration type; CompositionConfiguration must not be labeled as StateGraph or Agent configuration.
      explanation:
        zh: 本地配置提供跨实现语义，但不取代供应商配置对象。
        en: The local configuration provides cross-implementation meaning but does not replace vendor configuration objects.
        ja: ローカル設定は実装横断の意味を与えるが、ベンダー設定オブジェクトを置換しない。
      source_claims:
        - claim-composition-configuration-langgraph
        - claim-composition-configuration-openai
  required_relations: []
examples:
  - id: composition-configuration-positive-bound-support
    labels:
      zh: CompositionConfiguration positive
      en: CompositionConfiguration positive
      ja: CompositionConfiguration positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionConfiguration 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionConfiguration programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionConfiguration: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {configuration_id: config-support-4, topology_ref: topology-support-4}

    related_node_ids:
      - CompositionConfiguration
      - CompositionSpecification
      - OrchestrationTopology
    related_relation_ids:
      - CompositionConfiguration-is_a-CompositionSpecification
    source_claims:
      - claim-composition-configuration-openai
      - claim-composition-configuration-local

  - id: composition-configuration-counterexample-unbound-diagram
    labels:
      zh: CompositionConfiguration counterexample
      en: CompositionConfiguration counterexample
      ja: CompositionConfiguration counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 CompositionConfiguration PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style CompositionConfiguration PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 CompositionConfiguration ではない。
    field_values: {configuration_id: config-sketch-1, topology_ref: null}

    related_node_ids:
      - CompositionConfiguration
    related_relation_ids: []
    source_claims:
      - claim-composition-configuration-local

  - id: composition-configuration-boundary-stategraph-definition
    labels:
      zh: CompositionConfiguration boundary
      en: CompositionConfiguration boundary
      ja: CompositionConfiguration boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 CompositionConfiguration 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not CompositionConfiguration delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で CompositionConfiguration delegation spec ではない。
    field_values: {configuration_id: config-release-9, topology_ref: topology-release-9}

    related_node_ids:
      - CompositionConfiguration
      - CompositionSpecification
      - OrchestrationTopology
    related_relation_ids:
      - CompositionConfiguration-is_a-CompositionSpecification
    source_claims:
      - claim-composition-configuration-langgraph
      - claim-composition-configuration-local

  - id: composition-configuration-instance-graph-and-sdk-views
    labels:
      zh: CompositionConfiguration instance
      en: CompositionConfiguration instance
      ja: CompositionConfiguration instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 CompositionConfiguration。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to CompositionConfiguration.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が CompositionConfiguration に写像。
    field_values: {configuration_id: config-dual-3, topology_ref: topology-dual-3}

    related_node_ids:
      - CompositionConfiguration
      - CompositionSpecification
      - AggregationRule
    related_relation_ids:
      - CompositionConfiguration-is_a-CompositionSpecification
    source_claims:
      - claim-composition-configuration-langgraph
      - claim-composition-configuration-openai
      - claim-composition-configuration-local

parent_relation:
  id: CompositionConfiguration-is_a-CompositionSpecification
  predicate: is_a
  target: concept:CompositionSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合规约
    en: is a composition specification
    ja: 構成仕様である
  definition:
    zh: CompositionConfiguration 继承本地声明性组合规约的抽象角色，并特化为完整拓扑和实现绑定。
    en: CompositionConfiguration inherits the abstract local declarative role of CompositionSpecification and specializes it with complete topology and implementation binding.
    ja: CompositionConfiguration は CompositionSpecification の抽象的なローカル宣言役割を継承し、完全なトポロジーと実装バインディングで特化する。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_composition_configuration
    labels:
      zh: 具有完整组合配置
      en: has composition configuration
      ja: 完全構成設定を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a Moonweave local hierarchy and does not assert a subtype in LangGraph, the Agents SDK, A2A, or MCP.
  constraints: []
  examples: []
  source_claims:
    - claim-composition-configuration-local
  distinct_fact_rationale:
    zh: 层级说明完整配置是一种声明性规约，不说明某次运行已使用该配置。
    en: The hierarchy says a complete configuration is a declarative specification; it does not state that any run has used it.
    ja: 階層は完全設定が宣言的仕様であることを示し、いずれかの実行がそれを使用したことは示さない。
relations: []
sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API overview
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents StateGraph, nodes, edges, and conditional routing as graph-definition mechanisms.
  - id: openai-agents-agents
    title: OpenAI Agents SDK agents
    url: https://openai.github.io/openai-agents-python/agents/
    source_type: official-doc
    relevance: Documents Agent configuration with tools, handoffs, and runtime behavior.
source_claims:
  - id: claim-composition-configuration-langgraph
    source: langgraph-graph-api
    supports: LangGraph graphs are configured with State, nodes, edges, and routing behavior through the Graph API.
    locator: Graph API overview, Graphs, Nodes, and Edges
    evidence_kind: normative
    confidence: high
  - id: claim-composition-configuration-openai
    source: openai-agents-agents
    supports: The OpenAI Agents SDK Agent configuration includes instructions, tools, handoffs, models, and runtime behavior.
    locator: Agents, basic configuration
    evidence_kind: normative
    confidence: high
  - id: claim-composition-configuration-local
    source: langgraph-graph-api
    supports: CompositionConfiguration combines local topology, adopted declarations, and implementation provenance as a Moonweave design concept rather than a native StateGraph or Agent configuration schema.
    locator: Graph API overview, Graph definition
    evidence_kind: design-inference
    confidence: high
