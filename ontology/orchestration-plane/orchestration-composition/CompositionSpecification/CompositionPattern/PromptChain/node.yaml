        zh: 查询同时返回 CompositionPattern 上位类型与 PromptChain 下位类型。
        en: The query returns the CompositionPattern genus and the PromptChain subtype together.
        ja: query は CompositionPattern genus と PromptChain subtype をともに返します。
      why_valid_or_invalid:
        zh: 该记录保留 CompositionPattern 的共同身份并满足 PromptChain 的完整种差。
        en: The record retains CompositionPattern identity and satisfies the complete PromptChain differentia.
        ja: record は CompositionPattern identity を保持し PromptChain differentia を完全に満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-prompt-chain-001
        - claim-prompt-chain-002
    - id: PromptChain-is_a-CompositionPattern-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: PromptChain 的近邻反例
        en: Near-boundary non-PromptChain
