      scenario_id: composition-relation-promptchain-is_a-compositionpattern-boundary
      descriptions:
        zh: 三条聊天提示按时间出现，但没有稳定阶段、契约或可复用链版本。
        en: Three chat prompts occur over time but have no stable stages, contracts, or reusable chain revision.
