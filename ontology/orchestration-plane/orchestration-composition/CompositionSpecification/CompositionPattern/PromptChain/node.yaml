schema: moonweave.ai/ontology-node/v1
id: PromptChain
kind: concept
labels:
  zh: 提示链
  en: prompt chain
  ja: プロンプト連鎖
semantics:
  short_definition:
    zh: 将多个阶段按确定顺序连接，并把前一阶段产物显式传给后一阶段的组合模式。
    en: A composition pattern connecting stages in a fixed order and explicitly passing each stage output to the next.
    ja: 複数 stage を固定順序で接続し前 stage output を次へ明示的に渡す composition pattern です。
  definition:
    zh: 提示链是 CompositionPattern 的子类，以有序 ChainStage 集合、首尾阶段、阶段间数据契约和短路条件为种差。它描述可复用控制形态，而不是一串提示文本，也不是某次模型调用轨迹。
    en: A PromptChain is a CompositionPattern distinguished by an ordered ChainStage set, first and last stages, inter-stage data contracts, and short-circuit conditions. It describes a reusable control shape, not a string of prompt text or a trace of model calls.
    ja: PromptChain は ordered ChainStage set・first/last stages・inter-stage contract・short-circuit condition で区別される CompositionPattern で、prompt text 列や model-call trace ではありません。
  why_needed:
    zh: 明确链式控制与提示内容的边界，可检查阶段遗漏、顺序和输入输出契约，而不把 Prompt 节点塞进编排层。
    en: Separating chain control from prompt content supports stage, order, and I/O-contract checks without placing Prompt nodes in orchestration.
    ja: chain control と prompt content を分け stage/order/I/O contract を検査し Prompt node を orchestration に混ぜません。
  includes:
    - zh: 顺序草拟—复核—修订、抽取—验证—发布等具有显式阶段交接的可复用控制形态。
      en: Reusable draft-review-revise and extract-validate-publish shapes with explicit stage handoffs.
      ja: draft-review-revise、extract-validate-publish 等 explicit stage handoff を持つ reusable shape。
  excludes:
    - zh: 单个 Prompt、消息序列、无顺序并行分支、某次调用日志和仅含一个步骤的任务。
      en: Individual prompts, message sequences, unordered parallel branches, call logs, and one-step tasks.
      ja: individual Prompt・message sequence・unordered parallel branch・call log・one-step task。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 顺序边、CrewAI Process.sequential 与 Anthropic prompt chaining 映射为 PromptChain；以有序 ChainStage 与 short_circuit_rule 为种差。
    en: LangGraph sequential edges, CrewAI Process.sequential, and Anthropic prompt chaining map to PromptChain with ordered ChainStages and short_circuit_rule.
    ja: LangGraph 順序 edge・CrewAI Process.sequential・Anthropic prompt chaining を ordered ChainStage と short_circuit_rule 付き PromptChain へ写像します。
  typical_input:
    - description: Multi-step prompt pipeline.
      format: builder.add_edge("draft", "review"); builder.add_edge("review", "revise")
      source_claims:
        - claim-prompt-chain-design
  typical_output:
    - description: Moonweave PromptChain spec.
      format: '{"composition_specification_id": "draft-review-revise", "version": "3", "short_circuit_rule": "stop after validation rejection"}'
      source_claims:
        - claim-prompt-chain-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: short_circuit_rule
      labels:
        zh: 短路规则
        en: short-circuit rule
        ja: 短絡規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明何种阶段结果可停止后续阶段。
        en: Declares which stage result may stop later stages.
        ja: どの stage result が後続 stage を停止できるか宣言します。
      allowed_values: []
      pattern: null
      example_value: stop after validation rejection
      source_claims:
        - claim-prompt-chain-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptChain-draft-review-revise
    labels:
      zh: 草拟复核修订链
      en: Draft-review-revise chain
      ja: draft-review-revise chain
    descriptions:
      zh: draft-review-revise@3 含 draft、review、revise 三 ChainStage；review 拒绝时短路。
      en: draft-review-revise@3 has draft, review, revise ChainStages; short-circuits on review rejection.
      ja: draft-review-revise@3 が三 ChainStage を含み review reject で短絡。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: prompt chaining
    field_values:
      composition_specification_id: draft-review-revise
      version: "3"
    related_node_ids:
      - PromptChain
      - ChainStage
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    source_claims:
      - claim-prompt-chain-anthropic
      - claim-prompt-chain-design
  - id: PromptChain-crewai-sequential
    labels:
      zh: CrewAI 顺序 pipeline
      en: CrewAI sequential pipeline
      ja: CrewAI 順序 pipeline
    descriptions:
      zh: research→write→edit 三 task 顺序构成 PromptChain。
      en: research→write→edit three tasks in order form PromptChain.
      ja: research→write→edit 三 task 順序が PromptChain を構成。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.sequential
    field_values: {}
    related_node_ids:
      - PromptChain
      - ChainStage
    related_relation_ids: []
    source_claims:
      - claim-prompt-chain-crewai
      - claim-prompt-chain-design
  - id: PromptChain-boundary-chat
    labels:
      zh: 聊天序列不是链
      en: Chat sequence is not chain
      ja: chat 序列は chain ではない
    descriptions:
      zh: 三条用户提示按时间出现但无稳定 stage ID 与 handoff 契约。
      en: Three user prompts appear over time without stable stage IDs or handoff contracts.
      ja: 三 user prompt が時間順に現れるが stable stage ID/handoff contract なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: structure versus messages
    field_values: {}
    related_node_ids:
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-prompt-chain-design
parent_relation:
  id: PromptChain-is_a-CompositionPattern
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 提示链继承组合模式身份，并以严格有序的 ChainStage、阶段交接契约和短路条件为种差。
    en: PromptChain inherits composition-pattern identity and is distinguished by strictly ordered ChainStages, stage handoff contracts, and short-circuit conditions.
    ja: PromptChain は composition-pattern identity を継承し ordered ChainStages・handoff contracts・short-circuit conditions を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-prompt-chain-design
    - claim-prompt-chain-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: PromptChain-contains_stage-ChainStage
    predicate: contains_stage
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含有序阶段
      en: contains ordered stage
      ja: 順序段階を含む
    definitions:
      zh: 提示链的某一版本把链式阶段纳入其有序阶段清单，并由阶段序位和相邻契约确定位置。
      en: A PromptChain revision contains a ChainStage by listing it in the ordered stage inventory whose ordinal and adjacent contracts determine position.
      ja: PromptChain revision が ChainStage を ordered inventory に列挙し ordinal/adjacent contracts で位置を決めます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: stage_of_chain
      labels:
        zh: 是链的阶段
        en: is stage of chain
        ja: chain の stage である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-prompt-chain-design
      - claim-prompt-chain-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ChainStage
