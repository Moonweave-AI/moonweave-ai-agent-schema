schema: moonweave.ai/ontology-node/v1
id: PromptChain
kind: concept
labels:
  zh: 提示链
  en: prompt chain
  ja: プロンプト連鎖
semantics:
  short_definition:
    zh: 将多个阶段按确定顺序连接，并把前一阶段产物显式传给后一阶段的组合模式。
    en: A composition pattern connecting stages in a fixed order and explicitly passing each stage output to the next.
    ja: 複数 stage を固定順序で接続し前 stage output を次へ明示的に渡す composition pattern です。
  definition:
    zh: 提示链是 CompositionPattern 的子类，以有序 ChainStage 集合、首尾阶段、阶段间数据契约和短路条件为种差。它描述可复用控制形态，而不是一串提示文本，也不是某次模型调用轨迹。
    en: A PromptChain is a CompositionPattern distinguished by an ordered ChainStage set, first and last stages, inter-stage data contracts, and short-circuit conditions. It describes a reusable control shape, not a string of prompt text or a trace of model calls.
    ja: PromptChain は ordered ChainStage set・first/last stages・inter-stage contract・short-circuit condition で区別される CompositionPattern で、prompt text 列や model-call trace ではありません。
  why_needed:
    zh: 明确链式控制与提示内容的边界，可检查阶段遗漏、顺序和输入输出契约，而不把 Prompt 节点塞进编排层。
    en: Separating chain control from prompt content supports stage, order, and I/O-contract checks without placing Prompt nodes in orchestration.
    ja: chain control と prompt content を分け stage/order/I/O contract を検査し Prompt node を orchestration に混ぜません。
  includes:
    - zh: 顺序草拟—复核—修订、抽取—验证—发布等具有显式阶段交接的可复用控制形态。
      en: Reusable draft-review-revise and extract-validate-publish shapes with explicit stage handoffs.
      ja: draft-review-revise、extract-validate-publish 等 explicit stage handoff を持つ reusable shape。
  excludes:
    - zh: 单个 Prompt、消息序列、无顺序并行分支、某次调用日志和仅含一个步骤的任务。
      en: Individual prompts, message sequences, unordered parallel branches, call logs, and one-step tasks.
      ja: individual Prompt・message sequence・unordered parallel branch・call log・one-step task。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      PromptChain 编译为 LangGraph 顺序边与 stage 列表，short_circuit_rule 决定何时停止后续阶段。
      Agents SDK 顺序 handoff 是实现，不能从一次 Runner 链反推持久 PromptChain revision。
    en: >-
      PromptChain compiles to LangGraph sequential edges and an ordered stage list; short_circuit_rule decides when
      later stages stop. Agents SDK sequential handoffs are implementations and cannot infer a durable PromptChain
      revision from one Runner chain.
    ja: >-
      PromptChain は LangGraph sequential edge と ordered stage list にコンパイルされ short_circuit_rule が後続 stage
      停止を決める。Agents SDK sequential handoff は implementation です。
  typical_input:
    - description:
        zh: 声明 sequential 控制形态与短路规则的模式 revision。
        en: Pattern revision declaring sequential control shape and short-circuit rule.
        ja: sequential control shape/short-circuit rule を宣言する pattern revision。
      format: |-
        {"composition_specification_id":"draft-review-revise","version":"2","control_shape":"sequential-chain","short_circuit_rule":"stop after validation rejection"}
  typical_output:
    - description:
        zh: 编译后的顺序 stage 绑定。
        en: Compiled ordered stage binding.
        ja: compiled ordered stage binding。
      format: |-
        {"pattern_ref":"draft-review-revise@2","compiled_stages":["draft","review","revise"],"short_circuit":"validation-reject"}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents prompt chaining as ordered workflow stages.
  source_claims:
    - claim-prompt-chain-hierarchy
    - claim-prompt-chain-001
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels:
        zh: 控制形态
        en: control shape
        ja: control shape
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 sequential、fan-out/fan-in、partition、vote 或 synthesize 等控制形态。
        en: Declares control shapes such as sequential, fan-out/fan-in, partition, vote, or synthesize.
        ja: sequential、fan-out/fan-in、partition、vote、synthesize 等の control shape を宣言します。
      example_value: sequential-chain
      source_claims:
        - claim-prompt-chain-hierarchy
    - id: short_circuit_rule
      labels:
        zh: 短路规则
        en: short-circuit rule
        ja: 短絡規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明何种阶段结果可停止后续阶段。
        en: Declares which stage result may stop later stages.
        ja: どの stage result が後続 stage を停止できるか宣言します。
      allowed_values: []
      pattern: null
      example_value: stop after validation rejection
      source_claims:
        - claim-prompt-chain-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptChain-example-positive-manual-20260716
    labels:
      zh: PromptChain positive
      en: PromptChain positive
      ja: PromptChain positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 PromptChain 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for PromptChain via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が PromptChain 多段推論を誘発；GSM8K 精度向上。
    field_values: {composition_specification_id: draft-review-revise, version: 3, valid_from: 2026-07-16T00:00:00Z, control_shape: sequential-chain, short_circuit_rule: "stop after validation rejection"}

    related_node_ids:
      - PromptChain
      - ChainStage
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    source_claims:
      - claim-prompt-chain-001
      - claim-prompt-chain-002

  - id: PromptChain-example-boundary-manual-20260716
    labels:
      zh: PromptChain boundary
      en: PromptChain boundary
      ja: PromptChain boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 PromptChain 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not PromptChain static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で PromptChain 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-prompt-chain-001

  - id: PromptChain-example-counterexample-manual-20260719
    labels:
      zh: PromptChain counterexample
      en: PromptChain counterexample
      ja: PromptChain counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 PromptChain PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style PromptChain PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 PromptChain ではない。
    field_values: {composition_specification_id: absent, control_shape: absent, short_circuit_rule: absent, version: absent, native_impl: langgraph-linear-edges}

    related_node_ids:
      - PromptChain
      - ChainStage
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-prompt-chain-001
      - claim-prompt-chain-002

  - id: PromptChain-example-instance-manual-20260719
    labels:
      zh: PromptChain instance
      en: PromptChain instance
      ja: PromptChain instance
    descriptions:
      zh: CoT 实例 prompt："Q: Roger has 5 tennis balls... A: Let's think step by step." → 逐步算术推理 → 映射 PromptChain。
      en: CoT instance: "Q: Roger has 5 tennis balls... A: Let's think step by step." → stepwise arithmetic → maps to PromptChain.
      ja: CoT 实例 step-by-step 算術推論が PromptChain に写像。
    field_values: {control_shape: sequential-chain, short_circuit_rule: "stop after validation rejection"}

    related_node_ids:
      - PromptChain
      - CompositionPattern
    related_relation_ids:
      - PromptChain-is_a-CompositionPattern
    source_claims:
      - claim-prompt-chain-hierarchy

parent_relation:
  id: PromptChain-is_a-CompositionPattern
  predicate: is_a
  target: concept:CompositionPattern
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合模式
    en: is a composition pattern
    ja: 構成 pattern である
  definition:
    zh: PromptChain 继承 CompositionPattern 的可复用控制形态角色，并特化为有序阶段链。
    en: PromptChain inherits CompositionPattern's reusable control-shape role and specializes it as an ordered stage chain.
    ja: PromptChain は CompositionPattern の reusable control-shape 役割を継承し ordered stage chain として特化します。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_prompt_chain
    labels:
      zh: 具有提示链
      en: has prompt chain
      ja: プロンプト連鎖を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy; not a LangGraph compiled graph subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-prompt-chain-hierarchy
  distinct_fact_rationale:
    zh: 层级说明提示链是一种组合模式；它不说明某次运行是否执行了该链。
    en: The hierarchy says a prompt chain is a composition pattern; it does not state whether a run executed the chain.
    ja: 階層は prompt chain が composition pattern であることを示し、run が chain を実行したかは示しません。
sources:
