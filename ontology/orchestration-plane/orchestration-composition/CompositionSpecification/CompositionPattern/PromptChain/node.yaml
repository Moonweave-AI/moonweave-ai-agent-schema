schema: moonweave.ai/ontology-node/v1
id: PromptChain
kind: concept
status: review
labels:
  zh: 提示链
  en: prompt chain
  ja: プロンプト連鎖
semantics:
  short_definition:
    zh: 将多个阶段按确定顺序连接，并把前一阶段产物显式传给后一阶段的组合模式。
    en: A composition pattern connecting stages in a fixed order and explicitly passing each stage output to the next.
    ja: 複数 stage を固定順序で接続し前 stage output を次へ明示的に渡す composition pattern です。
  definition:
    zh: 提示链是 CompositionPattern 的子类，以有序 ChainStage 集合、首尾阶段、阶段间数据契约和短路条件为种差。它描述可复用控制形态，而不是一串提示文本，也不是某次模型调用轨迹。
    en: A PromptChain is a CompositionPattern distinguished by an ordered ChainStage set, first and last stages, inter-stage data contracts, and short-circuit conditions. It describes a reusable control shape, not a string of prompt text or a trace of model calls.
    ja: PromptChain は ordered ChainStage set・first/last stages・inter-stage contract・short-circuit condition で区別される CompositionPattern で、prompt text 列や model-call trace ではありません。
  why_needed:
    zh: 明确链式控制与提示内容的边界，可检查阶段遗漏、顺序和输入输出契约，而不把 Prompt 节点塞进编排层。
    en: Separating chain control from prompt content supports stage, order, and I/O-contract checks without placing Prompt nodes in orchestration.
    ja: chain control と prompt content を分け stage/order/I/O contract を検査し Prompt node を orchestration に混ぜません。
  includes:
    - zh: 顺序草拟—复核—修订、抽取—验证—发布等具有显式阶段交接的可复用控制形态。
      en: Reusable draft-review-revise and extract-validate-publish shapes with explicit stage handoffs.
      ja: draft-review-revise、extract-validate-publish 等 explicit stage handoff を持つ reusable shape。
  excludes:
    - zh: 单个 Prompt、消息序列、无顺序并行分支、某次调用日志和仅含一个步骤的任务。
      en: Individual prompts, message sequences, unordered parallel branches, call logs, and one-step tasks.
      ja: individual Prompt・message sequence・unordered parallel branch・call log・one-step task。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: short_circuit_rule
      labels:
        zh: 短路规则
        en: short-circuit rule
        ja: 短絡規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明何种阶段结果可停止后续阶段。
        en: Declares which stage result may stop later stages.
        ja: どの stage result が後続 stage を停止できるか宣言します。
      allowed_values: []
      pattern: null
      example_value: stop after validation rejection
      source_claims:
        - claim-prompt-chain-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptChain-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 草拟复核修订链
      en: Draft-review-revise chain
      ja: draft-review-revise chain
    scenario_id: null
    descriptions:
      zh: draft-review-revise@3 依次包含 draft、review、revise 三个 ChainStage；review 拒绝时短路，不进入 revise。
      en: draft-review-revise@3 contains draft, review, and revise ChainStages in order and short-circuits before revise when review rejects.
      ja: draft-review-revise@3 は draft・review・revise ChainStage を順序保持し review reject 時に revise 前で短絡します。
    field_values:
      composition_specification_id: draft-review-revise
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: sequential-chain
      short_circuit_rule: stop after validation rejection
    related_node_ids:
      - PromptChain
      - ChainStage
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    expected_result:
      zh: 保存模式及有序阶段成员，不创建提示内容节点。
      en: Store the pattern and ordered stage membership without creating prompt-content nodes.
      ja: pattern と ordered stage membership を保存し prompt-content node は作りません。
    why_valid_or_invalid:
      zh: 顺序、交接和短路共同构成链式控制种差。
      en: Order, handoff, and short-circuit jointly establish the chain-control differentia.
      ja: order・handoff・short-circuit が chain-control differentia を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-chain-001
      - claim-prompt-chain-002
  - id: PromptChain-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 对话中的三条提示
      en: Three prompts in a conversation
      ja: 会話の three prompts
    scenario_id: composition-review-promptchain-boundary
    descriptions:
      zh: 一个对话依次出现三条用户提示，但没有稳定阶段标识、交接契约或可复用顺序规范。
      en: A conversation contains three user prompts in sequence but has no stable stage IDs, handoff contracts, or reusable ordering specification.
      ja: conversation に three user prompts が順に現れても stable stage ID・handoff contract・reusable order spec はありません。
    field_values: {}
    related_node_ids:
      - PromptChain
    related_relation_ids: []
    expected_result:
      zh: 保留为消息或提示内容，不建立 PromptChain。
      en: Keep it as message or prompt content and do not create PromptChain.
      ja: message/prompt content とし PromptChain は作りません。
    why_valid_or_invalid:
      zh: 时间上相邻的文本不等于具有结构身份和契约的组合模式。
      en: Temporally adjacent text is not a composition pattern with structural identity and contracts.
      ja: temporal adjacency の text は structural identity/contract を持つ pattern ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-chain-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
