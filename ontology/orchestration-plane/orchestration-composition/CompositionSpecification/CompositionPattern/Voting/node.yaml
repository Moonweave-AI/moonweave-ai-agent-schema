      - claim-voting-002

  - id: Voting-example-boundary-manual-20260716
    labels:
      zh: Voting boundary
      en: Voting boundary
      ja: Voting boundary
    descriptions:
      zh: ToT 评估分数是运行时 heuristic/LLM 评分，不是 Voting 静态规范；BranchCondition 规约与 evaluate() 运行时结果应分离。
      en: ToT evaluation scores are runtime heuristic/LLM ratings, not Voting static spec; separate BranchCondition specification from evaluate() runtime results.
      ja: ToT 評価スコアは runtime で Voting 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - Voting
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-voting-001
      - claim-voting-003

  - id: Voting-counterexample-voting-activity-tally
    labels:
      zh: Voting counterexample
      en: Voting counterexample
      ja: Voting counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 Voting TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style Voting TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 Voting ではない。
    field_values: {composition_specification_id: absent, eligible_voter_refs: absent, ballot_schema_ref: absent, closure_condition: absent, activity_id: voting-activity-884, started_at: 2026-07-16T04:22:00Z}

    related_node_ids:
      - Voting
      - VotingActivity
      - VoteBallot
    related_relation_ids:
      - VotingActivity-realizes-Voting
    source_claims:
      - claim-voting-003

  - id: Voting-instance-review-board-vote-revision
    labels:
      zh: Voting instance
      en: Voting instance
      ja: Voting instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 Voting DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to Voting DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が Voting に写像。
    field_values: {composition_specification_id: review-board-vote, version: 2, valid_from: 2026-07-16T00:00:00Z, control_shape: "quorum ballot aggregation", closure_condition: "quorum 5 or deadline"}

    related_node_ids:
      - Voting
      - CompositionPattern
      - VotingRule
    related_relation_ids:
      - Voting-is_a-CompositionPattern
    source_claims:
      - claim-voting-001
      - claim-voting-pattern-hierarchy

parent_relation:
  id: Voting-is_a-CompositionPattern
  predicate: is_a
  target: concept:CompositionPattern
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合模式
    en: is a composition pattern
    ja: 構成 pattern である
  definition:
    zh: Voting 继承 CompositionPattern 的可复用控制形态角色，并特化为 quorum ballot aggregation。
    en: Voting inherits CompositionPattern reusable control-shape role and specializes it as quorum ballot aggregation.
    ja: Voting は CompositionPattern の reusable control-shape 役割を継承し quorum ballot aggregation として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_voting
    labels: { zh: 具有投票模式, en: has voting, ja: 投票 pattern を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-voting-pattern-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；具体字段与运行事实使用独立字段或关系表达。
    en: is_a only states type membership; concrete fields and runtime facts use separate fields or relations.
    ja: is_a は型従属のみを述べ、具体 field と runtime fact は別 field または relation で表現します。
