relations:
  - id: Voting-governed_by-VotingRule
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由投票裁决规则治理
      en: is governed by voting rule
      ja: 投票裁定規則により統治される
    definitions:
      zh: 一个 Voting 模式修订通过该关系指定恰好一个 VotingRule 修订，用它固定法定参与量、胜出分母、弃权和平票语义；规则不是模式的子节点实例，也不表示投票已经发生。
      en: A Voting pattern revision uses this relation to name exactly one VotingRule revision fixing quorum, winning denominator, abstention, and tie semantics; the rule is neither an occurrence contained by the pattern nor evidence that voting happened.
      ja: Voting pattern revision はこの関係で一つだけの VotingRule revision を指定し quorum・winning denominator・abstention・tie semantics を固定します。rule は pattern 内の occurrence でも voting 発生の証拠でもありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 具体的一对一要求定义在 Voting 的必需关系约束中，以便同时校验来源类型和目标类型。
      en: The exact-one requirement is declared on Voting's required-relation constraint so source and target types are validated together.
      ja: exact-one requirement は source/target type を同時検証する Voting required-relation constraint に定義します。
    inverse_reading:
      predicate: governs_voting_pattern
      labels:
        zh: 治理投票模式
        en: governs voting pattern
        ja: 投票パターンを統治する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: Voting-governed_by-VotingRule-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 评审投票模式固定多数制版本
          en: Review voting pattern fixes a majority-rule revision
          ja: review voting pattern fixes majority-rule revision
        scenario_id: composition-voting-governed-by-rule-positive
        descriptions:
          zh: review-board-vote@2 明确引用 review-board-majority@3，因此同一模式的法定三人、非弃权严格过半和未决平票语义不会随运行实现漂移。
          en: review-board-vote@2 explicitly references review-board-majority@3, so its three-person quorum, strict non-abstaining majority, and unresolved-tie semantics cannot drift across implementations.
          ja: review-board-vote@2 は review-board-majority@3 を明示参照し three-person quorum・非棄権 strict majority・unresolved tie semantics の実装間 drift を防ぎます。
        field_values: {}
        related_node_ids:
          - Voting
          - VotingRule
        related_relation_ids:
          - Voting-governed_by-VotingRule
        expected_result:
          zh: 返回模式修订到唯一裁决规则修订的可追溯治理事实。
          en: Return a traceable governance fact from the pattern revision to its sole adjudication-rule revision.
          ja: pattern revision から sole adjudication-rule revision への traceable governance fact を返します。
        why_valid_or_invalid:
          zh: 模式显式记录完整规则修订，既没有只写“多数票”标签，也没有引用某次计票活动。
          en: The pattern records the complete rule revision rather than a vague majority label or one tally activity.
          ja: pattern は曖昧な majority label や one tally activity ではなく complete rule revision を記録します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-voting-011
      - id: Voting-governed_by-VotingRule-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 运行时临时覆盖不是模式治理规则
          en: Runtime override is not the pattern's governing rule
          ja: runtime override is not pattern governing rule
        scenario_id: composition-voting-governed-by-rule-boundary
        descriptions:
          zh: vote-run-53 临时使用 weighted-review@1，但 review-board-vote@2 仍引用 review-board-majority@3，且没有发布新的模式修订。
          en: vote-run-53 temporarily uses weighted-review@1 while review-board-vote@2 still references review-board-majority@3 and no new pattern revision was issued.
          ja: vote-run-53 が一時的に weighted-review@1 を使っても review-board-vote@2 は review-board-majority@3 を参照したままで new pattern revision はありません。
        field_values: {}
        related_node_ids:
          - Voting
          - VotingRule
          - VotingActivity
        related_relation_ids:
          - Voting-governed_by-VotingRule
        expected_result:
          zh: 保留模式的原治理规则，并把该活动标记为模式不符合。
          en: Keep the pattern's original governing rule and mark the activity non-conformant to the pattern.
          ja: pattern の original governing rule を保持し activity を non-conformant とします。
        why_valid_or_invalid:
          zh: 一次活动的偏离不能静默改写可复用模式的版本化治理语义。
          en: One activity's deviation cannot silently rewrite the reusable pattern's versioned governance semantics.
          ja: one activity の deviation は reusable pattern の versioned governance semantics を silent rewrite できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-voting-012
    source_claims:
      - claim-voting-013
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:VotingRule
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic/LangGraph 工作流模式（prompt chaining、parallelization sectioning/voting、orchestrator-worker 分解、synthesis）与 PROV-O 规范/活动分离逐项核验；组合模式、拓扑、部件与聚合规则语义成立。
    en: Semantics, hierarchy, relations, structure, and examples were checked against Anthropic/LangGraph workflow patterns (prompt chaining, parallelization sectioning/voting, orchestrator-worker decomposition, synthesis) and PROV-O specification/activity separation; composition patterns, topologies, parts, and aggregation rules hold.
    ja: Anthropic/LangGraph workflow pattern（prompt chaining・parallelization sectioning/voting・orchestrator-worker 分解・synthesis）と PROV-O specification/activity 分離に照らし semantics/hierarchy/relations/structure/examples を項目別確認しました。composition pattern・topology・part・aggregation rule は成立します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-voting-001
    source: eng-fw-autogen-agentchat
    supports: AutoGen's official AgentChat documentation describes teams whose participant order and termination are managed separately from participant messages. Moonweave uses this as supporting evidence that collaboration patterns and topology specifications are not the same objects as runtime activities or produced ballots and outputs.
    locator: "AgentChat user guide: Teams, SelectorGroupChat, RoundRobinGroupChat, and termination conditions"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-voting-002
