schema: moonweave.ai/ontology-node/v1
id: Voting
kind: concept
status: review
labels:
  zh: 投票组合
  en: voting
  ja: 投票構成
semantics:
  short_definition:
    zh: 通过可审计选票和计票规则把多个候选判断汇合成集体决定的组合模式。
    en: A composition pattern combining multiple candidate judgments into a collective decision through auditable ballots and counting rules.
    ja: auditable ballots と counting rules により multiple judgments を collective decision へ統合する composition pattern です。
  definition:
    zh: 投票组合是 CompositionPattern 的子类，以合格投票者、选票模式、匿名性、截止条件和恰好一个 VotingRule 修订为种差。VotingActivity 实现该模式并消费 VoteBallot；模式本身不投票、不计票，也不是共识结果。
    en: Voting is a CompositionPattern distinguished by eligible voters, ballot schema, anonymity, closure condition, and exactly one VotingRule revision. A VotingActivity realizes it and consumes VoteBallots; the pattern itself neither casts nor counts votes and is not the consensus result.
    ja: Voting は eligible voters・ballot schema・anonymity・closure condition・exactly one VotingRule revision で区別される CompositionPattern です。VotingActivity が実現して VoteBallot を消費し、pattern 自体は投票・集計せず consensus result ではありません。
  why_needed:
    zh: 把投票制度、投票活动和选票记录分开，才能避免把“多数票规则”“某次计票”“某张票”放在同一级。
    en: Separating voting institution, voting activity, and ballot record prevents majority rule, one count, and one ballot from appearing as peers.
    ja: voting institution・activity・ballot record を分け majority rule・one count・one ballot の同列化を防ぎます。
  includes:
    - zh: 多数决、排序投票、评分投票、带弃权与法定人数条件的集体选择模式。
      en: Majority, ranked, scored, abstention-aware, and quorum-bound collective-choice patterns.
      ja: majority・ranked・scored・abstention-aware・quorum-bound collective choice patterns。
  excludes:
    - zh: 单张 VoteBallot、一次 VotingActivity、用于路由的随机抽样以及未保留个体判断的模型集成平均。
      en: One VoteBallot, one VotingActivity, random routing samples, and model-ensemble averaging without individual judgments.
      ja: one VoteBallot・one VotingActivity・random routing sample・individual judgment を残さない ensemble average。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: closure_condition
      labels:
        zh: 关闭条件
        en: closure condition
        ja: closure condition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明收齐、截止时间或法定人数达到时停止收票。
        en: Declares closure on completeness, deadline, or quorum.
        ja: completeness・deadline・quorum のどれで ballot intake を閉じるか示します。
      allowed_values: []
      pattern: null
      example_value: quorum 5 or deadline
      source_claims:
        - claim-voting-001
    - id: eligible_voter_refs
      labels:
        zh: 合格投票者引用
        en: eligible-voter references
        ja: eligible voter 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该投票模式修订下具有投票资格的主体引用；投票活动只能接纳能证明属于此集合的选票。
        en: Lists the principals eligible under this voting-pattern revision. A VotingActivity may accept only ballots whose eligibility can be proven against this set.
        ja: この voting-pattern revision で投票資格を持つ principal reference を列挙します。VotingActivity はこの集合に対する eligibility を証明できる ballot だけを受け入れます。
      allowed_values: []
      pattern: null
      example_value:
        - reviewer-a
        - reviewer-b
        - reviewer-c
        - reviewer-d
        - reviewer-e
        - reviewer-f
        - reviewer-g
      source_claims:
        - claim-voting-004
    - id: ballot_schema_ref
      labels:
        zh: 选票契约引用
        en: ballot-schema reference
        ja: ballot schema 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用选票必须满足的选择域、理由要求和完整性契约；它固定允许的票形，不是某张 VoteBallot。
        en: References the choice domain, rationale requirement, and integrity contract that ballots must satisfy. It fixes the ballot form and is not one VoteBallot.
        ja: ballot が満たす choice domain・rationale requirement・integrity contract を参照します。ballot form を固定し、一 VoteBallot ではありません。
      allowed_values: []
      pattern: null
      example_value: approve-reject-reasoned-ballot@2
      source_claims:
        - claim-voting-005
    - id: anonymity_mode
      labels:
        zh: 投票身份披露模式
        en: voter-identity disclosure mode
        ja: voter identity disclosure mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定 VoteBallot 的 voter_ref 是直接身份、仅在本次投票稳定的假名，还是不可复用的一次性资格证明；该值不改变资格校验要求。
        en: Declares whether VoteBallot.voter_ref carries a direct identity, an election-scoped pseudonym, or a non-reusable one-time eligibility proof. The mode never removes the eligibility check.
        ja: VoteBallot.voter_ref が direct identity、election-scoped pseudonym、non-reusable one-time eligibility proof のどれかを宣言します。mode は eligibility check を除去しません。
      allowed_values:
        - id: VotingAnonymityIdentified
          value: identified
          labels:
            zh: 实名可审计
            en: identified
            ja: identified
          definitions:
            zh: voter_ref 直接解析到合格主体，计票者和审计者均可把选票归属于该主体。
            en: voter_ref resolves directly to an eligible principal, allowing tally and audit to attribute the ballot to that principal.
            ja: voter_ref が eligible principal へ直接解決され、tally と audit が ballot をその principal に帰属できます。
          status: accepted
          source_claims:
            - claim-voting-006
        - id: VotingAnonymityPseudonymous
          value: pseudonymous
          labels:
            zh: 投票内假名
            en: pseudonymous
            ja: pseudonymous
          definitions:
            zh: voter_ref 在本次投票内稳定且可防止重复投票，但主体映射受独立访问控制保护。
            en: voter_ref is stable within this voting event and prevents duplicate voting, while the principal mapping is protected by separate access control.
            ja: voter_ref はこの voting event 内で安定し duplicate voting を防ぎますが、principal mapping は別の access control で保護されます。
          status: accepted
          source_claims:
            - claim-voting-007
        - id: VotingAnonymityAnonymous
          value: anonymous
          labels:
            zh: 匿名一次性凭证
            en: anonymous
            ja: anonymous
          definitions:
            zh: voter_ref 是不可跨票复用或关联到主体的一次性资格证明；合格性和一人一票必须由外部证明保持，不能因匿名而跳过。
            en: voter_ref is a one-time eligibility proof that cannot be reused across ballots or linked back to a principal. External proof must still enforce eligibility and one vote per voter.
            ja: voter_ref は ballot 間で再利用できず principal に link back できない one-time eligibility proof です。外部 proof が eligibility と one-vote-per-voter を維持しなければなりません。
          status: accepted
          source_claims:
            - claim-voting-008
      pattern: null
      example_value: identified
      source_claims:
        - claim-voting-009
  constraints: []
  required_relation_constraints:
    - id: voting-pattern-has-one-voting-rule-revision
      direction: outgoing
      predicate: governed_by
      target_concept_id: VotingRule
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 Voting 模式修订必须指定恰好一个 VotingRule 修订，才能固定法定参与量、胜出、弃权和平票语义。
        en: Every Voting pattern revision names exactly one VotingRule revision to fix quorum, winning, abstention, and tie semantics.
        ja: 各 Voting pattern revision は quorum・winning・abstention・tie semantics を固定する一つだけの VotingRule revision を指定します。
      source_claims:
        - claim-voting-010
examples:
  - id: Voting-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 评审委员会投票模式
      en: Review-board voting pattern
      ja: review-board voting pattern
    scenario_id: null
    descriptions:
      zh: review-board-vote@2 允许七名评审各投一张有理由的 approve/reject 票，达到五票或截止时关闭。
      en: review-board-vote@2 lets seven reviewers cast one reasoned approve/reject ballot and closes at five ballots or deadline.
      ja: review-board-vote@2 は seven reviewers に one reasoned approve/reject ballot を許し five ballots または deadline で閉じます。
    field_values:
      composition_specification_id: review-board-vote
      version: "2"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: quorum ballot aggregation
      closure_condition: quorum 5 or deadline
      eligible_voter_refs:
        - reviewer-a
        - reviewer-b
        - reviewer-c
        - reviewer-d
        - reviewer-e
        - reviewer-f
        - reviewer-g
      ballot_schema_ref: approve-reject-reasoned-ballot@2
      anonymity_mode: identified
    related_node_ids:
      - Voting
      - VotingActivity
      - VoteBallot
    related_relation_ids:
      - VotingActivity-realizes-Voting
      - VotingActivity-consumes-VoteBallot
    expected_result:
      zh: 建立可复用投票制度，不创建任何实际票或计票结果。
      en: Create a reusable voting regime without creating actual ballots or a count result.
      ja: reusable voting regime を作り actual ballot/count result は作りません。
    why_valid_or_invalid:
      zh: 参与资格、票式和关闭条件完整且不含发生时间。
      en: Eligibility, ballot form, and closure are complete without occurrence time.
      ja: eligibility・ballot form・closure が完全で occurrence time はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-001
      - claim-voting-002
  - id: Voting-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评审员甲的拒绝票
      en: Reviewer A's reject ballot
      ja: reviewer A の reject ballot
    scenario_id: composition-review-voting-boundary
    descriptions:
      zh: ballot-17 记录 reviewer-a 对 candidate-b 的 reject、权重 1 和理由摘要，是模式下产生的一条信息记录。
      en: ballot-17 records reviewer-a's reject choice for candidate-b, weight one, and rationale summary as one information record under the pattern.
      ja: ballot-17 は reviewer-a の candidate-b reject・weight 1・rationale を記録する一 information record です。
    field_values: {}
    related_node_ids:
      - Voting
      - VoteBallot
    related_relation_ids: []
    expected_result:
      zh: 分类为 VoteBallot，并引用所适用的 Voting 模式。
      en: Classify it as VoteBallot and reference the applicable Voting pattern.
      ja: VoteBallot とし applicable Voting pattern を参照します。
    why_valid_or_invalid:
      zh: 单条不可变选择记录不具有可复用投票制度的身份。
      en: One immutable choice record lacks the identity of a reusable voting regime.
      ja: one immutable choice record は reusable voting regime の identity を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-001
      - claim-voting-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
