      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps Voting: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が Voting 多 agent 協調に写像。
    field_values: {composition_specification_id: review-board-vote, version: 2, valid_from: 2026-07-16T00:00:00Z, control_shape: "quorum ballot aggregation", closure_condition: "quorum 5 or deadline"}

    related_node_ids:
      - Voting
      - VotingActivity
      - VoteBallot
    related_relation_ids:
