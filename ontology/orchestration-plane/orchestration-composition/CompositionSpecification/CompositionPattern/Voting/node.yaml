schema: moonweave.ai/ontology-node/v1
id: Voting
kind: concept
labels:
  zh: 投票组合
  en: voting
  ja: 投票構成
semantics:
  short_definition:
    zh: 通过可审计选票和计票规则把多个候选判断汇合成集体决定的组合模式。
    en: A composition pattern combining multiple candidate judgments into a collective decision through auditable ballots and counting rules.
    ja: auditable ballots と counting rules により multiple judgments を collective decision へ統合する composition pattern です。
  definition:
    zh: 投票组合是 CompositionPattern 的子类，以合格投票者、选票模式、匿名性、截止条件和恰好一个 VotingRule 修订为种差。VotingActivity 实现该模式并消费 VoteBallot；模式本身不投票、不计票，也不是共识结果。
    en: Voting is a CompositionPattern distinguished by eligible voters, ballot schema, anonymity, closure condition, and exactly one VotingRule revision. A VotingActivity realizes it and consumes VoteBallots; the pattern itself neither casts nor counts votes and is not the consensus result.
    ja: Voting は eligible voters・ballot schema・anonymity・closure condition・exactly one VotingRule revision で区別される CompositionPattern です。VotingActivity が実現して VoteBallot を消費し、pattern 自体は投票・集計せず consensus result ではありません。
  why_needed:
    zh: 把投票制度、投票活动和选票记录分开，才能避免把“多数票规则”“某次计票”“某张票”放在同一级。
    en: Separating voting institution, voting activity, and ballot record prevents majority rule, one count, and one ballot from appearing as peers.
    ja: voting institution・activity・ballot record を分け majority rule・one count・one ballot の同列化を防ぎます。
  includes:
    - zh: 多数决、排序投票、评分投票、带弃权与法定人数条件的集体选择模式。
      en: Majority, ranked, scored, abstention-aware, and quorum-bound collective-choice patterns.
      ja: majority・ranked・scored・abstention-aware・quorum-bound collective choice patterns。
  excludes:
    - zh: 单张 VoteBallot、一次 VotingActivity、用于路由的随机抽样以及未保留个体判断的模型集成平均。
      en: One VoteBallot, one VotingActivity, random routing samples, and model-ensemble averaging without individual judgments.
      ja: one VoteBallot・one VotingActivity・random routing sample・individual judgment を残さない ensemble average。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: best-of-N、majority voting 与 LLM-as-judge 映射为 Voting 模式；通过 governed_by 引用 VotingRule 并消费 VoteBallot。
    en: Best-of-N, majority voting, and LLM-as-judge map to Voting pattern referencing VotingRule via governed_by and consuming VoteBallot.
    ja: best-of-N・majority voting・LLM-as-judge を governed_by で VotingRule 参照・VoteBallot consume 付き Voting 模式へ写像します。
  typical_input:
    - description: Best-of-N parallel sampling.
      format: candidates = await asyncio.gather(*[generate(prompt) for _ in range(n)])
      source_claims:
        - claim-voting-design
  typical_output:
    - description: Moonweave Voting pattern spec.
      format: '{"composition_specification_id": "regime-borda", "version": "2", "voting_rule_ref": "borda-count@4"}'
      source_claims:
        - claim-voting-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: closure_condition
      labels:
        zh: 关闭条件
        en: closure condition
        ja: closure condition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明收齐、截止时间或法定人数达到时停止收票。
        en: Declares closure on completeness, deadline, or quorum.
        ja: completeness・deadline・quorum のどれで ballot intake を閉じるか示します。
      allowed_values: []
      pattern: null
      example_value: quorum 5 or deadline
      source_claims:
        - claim-voting-design
    - id: eligible_voter_refs
      labels:
        zh: 合格投票者引用
        en: eligible-voter references
        ja: eligible voter 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该投票模式修订下具有投票资格的主体引用；投票活动只能接纳能证明属于此集合的选票。
        en: Lists the principals eligible under this voting-pattern revision. A VotingActivity may accept only ballots whose eligibility can be proven against this set.
        ja: この voting-pattern revision で投票資格を持つ principal reference を列挙します。VotingActivity はこの集合に対する eligibility を証明できる ballot だけを受け入れます。
      allowed_values: []
      pattern: null
      example_value:
        - reviewer-a
        - reviewer-b
        - reviewer-c
        - reviewer-d
        - reviewer-e
        - reviewer-f
        - reviewer-g
      source_claims:
        - claim-voting-design
    - id: ballot_schema_ref
      labels:
        zh: 选票契约引用
        en: ballot-schema reference
        ja: ballot schema 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用选票必须满足的选择域、理由要求和完整性契约；它固定允许的票形，不是某张 VoteBallot。
        en: References the choice domain, rationale requirement, and integrity contract that ballots must satisfy. It fixes the ballot form and is not one VoteBallot.
        ja: ballot が満たす choice domain・rationale requirement・integrity contract を参照します。ballot form を固定し、一 VoteBallot ではありません。
      allowed_values: []
      pattern: null
      example_value: approve-reject-reasoned-ballot@2
      source_claims:
        - claim-voting-design
    - id: anonymity_mode
      labels:
        zh: 投票身份披露模式
        en: voter-identity disclosure mode
        ja: voter identity disclosure mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定 VoteBallot 的 voter_ref 是直接身份、仅在本次投票稳定的假名，还是不可复用的一次性资格证明；该值不改变资格校验要求。
        en: Declares whether VoteBallot.voter_ref carries a direct identity, an election-scoped pseudonym, or a non-reusable one-time eligibility proof. The mode never removes the eligibility check.
        ja: VoteBallot.voter_ref が direct identity、election-scoped pseudonym、non-reusable one-time eligibility proof のどれかを宣言します。mode は eligibility check を除去しません。
      allowed_values:
        - id: VotingAnonymityIdentified
          value: identified
          labels:
            zh: 实名可审计
            en: identified
            ja: identified
          definitions:
            zh: voter_ref 直接解析到合格主体，计票者和审计者均可把选票归属于该主体。
            en: voter_ref resolves directly to an eligible principal, allowing tally and audit to attribute the ballot to that principal.
            ja: voter_ref が eligible principal へ直接解決され、tally と audit が ballot をその principal に帰属できます。
          source_claims:
            - claim-voting-design
        - id: VotingAnonymityPseudonymous
          value: pseudonymous
          labels:
            zh: 投票内假名
            en: pseudonymous
            ja: pseudonymous
          definitions:
            zh: voter_ref 在本次投票内稳定且可防止重复投票，但主体映射受独立访问控制保护。
            en: voter_ref is stable within this voting event and prevents duplicate voting, while the principal mapping is protected by separate access control.
            ja: voter_ref はこの voting event 内で安定し duplicate voting を防ぎますが、principal mapping は別の access control で保護されます。
          source_claims:
            - claim-voting-design
        - id: VotingAnonymityAnonymous
          value: anonymous
          labels:
            zh: 匿名一次性凭证
            en: anonymous
            ja: anonymous
          definitions:
            zh: voter_ref 是不可跨票复用或关联到主体的一次性资格证明；合格性和一人一票必须由外部证明保持，不能因匿名而跳过。
            en: voter_ref is a one-time eligibility proof that cannot be reused across ballots or linked back to a principal. External proof must still enforce eligibility and one vote per voter.
            ja: voter_ref は ballot 間で再利用できず principal に link back できない one-time eligibility proof です。外部 proof が eligibility と one-vote-per-voter を維持しなければなりません。
          source_claims:
            - claim-voting-design
      pattern: null
      example_value: identified
      source_claims:
        - claim-voting-design
  constraints: []
  required_relation_constraints:
    - id: voting-pattern-has-one-voting-rule-revision
      direction: outgoing
      predicate: governed_by
      target_concept_id: VotingRule
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 Voting 模式修订必须指定恰好一个 VotingRule 修订，才能固定法定参与量、胜出、弃权和平票语义。
        en: Every Voting pattern revision names exactly one VotingRule revision to fix quorum, winning, abstention, and tie semantics.
        ja: 各 Voting pattern revision は quorum・winning・abstention・tie semantics を固定する一つだけの VotingRule revision を指定します。
      source_claims:
        - claim-voting-design
examples:
  - id: Voting-best-of-n
    labels:
      zh: best-of-N 投票模式
      en: best-of-N voting pattern
      ja: best-of-N voting pattern
    descriptions:
      zh: regime-borda@2 三并行分支生成 VoteBallot 后 Borda 选优。
      en: regime-borda@2 generates VoteBallots from three parallel branches then Borda selects winner.
      ja: regime-borda@2 が三並列 branch から VoteBallot 生成後 Borda 選优。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N
    field_values:
      composition_specification_id: regime-borda
      version: "2"
    related_node_ids:
      - Voting
      - VotingRule
      - VoteBallot
    related_relation_ids:
      - Voting-governed_by-VotingRule
    source_claims:
      - claim-voting-anthropic
      - claim-voting-design
  - id: Voting-llm-judge
    labels:
      zh: LLM 评判投票
      en: LLM-as-judge voting
      ja: LLM-as-judge voting
    descriptions:
      zh: judge 模型对候选打分形成选票并由 majority 规则选优。
      en: Judge model scores candidates forming ballots selected by majority rule.
      ja: judge model が候補を score し majority rule で選优。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: LLM evaluation
    field_values: {}
    related_node_ids:
      - Voting
      - VotingRule
    related_relation_ids: []
    source_claims:
      - claim-voting-cookbook
      - claim-voting-design
  - id: Voting-boundary-single
    labels:
      zh: 单次生成不是投票
      en: Single generation is not voting
      ja: 単一生成は voting ではない
    descriptions:
      zh: 一次 LLM 调用无并行候选与计票规则，不是 Voting 模式。
      en: One LLM call without parallel candidates and tally rule is not Voting pattern.
      ja: 並列候補と集計 rule なし一回 LLM 呼出は Voting pattern ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: voting boundary
    field_values: {}
    related_node_ids:
      - Voting
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-voting-design
parent_relation:
  id: Voting-is_a-CompositionPattern
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 投票组合继承组合模式身份，并以合格投票者、选票模式、关闭条件和适用计票规则为种差。
    en: Voting inherits composition-pattern identity and is distinguished by eligible voters, ballot schema, closure condition, and applicable counting rule.
    ja: Voting は pattern identity を継承し eligible voters・ballot schema・closure condition・counting rule を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-voting-design
    - claim-voting-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Voting-governed_by-VotingRule
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由投票裁决规则治理
      en: is governed by voting rule
      ja: 投票裁定規則により統治される
    definitions:
      zh: 一个 Voting 模式修订通过该关系指定恰好一个 VotingRule 修订，用它固定法定参与量、胜出分母、弃权和平票语义；规则不是模式的子节点实例，也不表示投票已经发生。
      en: A Voting pattern revision uses this relation to name exactly one VotingRule revision fixing quorum, winning denominator, abstention, and tie semantics; the rule is neither an occurrence contained by the pattern nor evidence that voting happened.
      ja: Voting pattern revision はこの関係で一つだけの VotingRule revision を指定し quorum・winning denominator・abstention・tie semantics を固定します。rule は pattern 内の occurrence でも voting 発生の証拠でもありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 具体的一对一要求定义在 Voting 的必需关系约束中，以便同时校验来源类型和目标类型。
      en: The exact-one requirement is declared on Voting's required-relation constraint so source and target types are validated together.
      ja: exact-one requirement は source/target type を同時検証する Voting required-relation constraint に定義します。
    inverse_reading:
      predicate: governs_voting_pattern
      labels:
        zh: 治理投票模式
        en: governs voting pattern
        ja: 投票パターンを統治する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-voting-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:VotingRule
