schema: moonweave.ai/ontology-node/v1
id: Sectioning
kind: concept
labels:
  zh: 分区编排
  en: sectioning
  ja: 分区編成
semantics:
  short_definition:
    zh: 按明确分区依据把一个整体工作拆成有覆盖边界的 SectionAssignment 集合的组合模式。
    en: A composition pattern partitioning one body of work into SectionAssignments with explicit basis and coverage boundaries.
    ja: 一 work body を explicit partition basis と coverage boundaries を持つ SectionAssignment 集合へ分ける composition pattern です。
  definition:
    zh: 分区编排是 CompositionPattern 的子类，以分区依据、覆盖规则、重叠处理、未分配处理和 SectionAssignment 集合为种差。它只声明如何切分与指派，不是实际章节内容，也不等同于把任意并行分支重新命名为 section。
    en: Sectioning is a CompositionPattern distinguished by partition basis, coverage rule, overlap handling, unassigned handling, and a SectionAssignment set. It declares how work is partitioned and assigned; it is neither section content nor an arbitrary parallel branch renamed as a section.
    ja: Sectioning は partition basis・coverage rule・overlap handling・unassigned handling・SectionAssignment set で区別される CompositionPattern です。section content でも任意 parallel branch の改名でもありません。
  why_needed:
    zh: 显式覆盖和重叠规则可发现漏章、重复职责及不可合并的边界，而不是仅凭标签把工作者聚成社区。
    en: Explicit coverage and overlap rules expose gaps, duplicated responsibility, and incompatible boundaries rather than grouping workers by labels.
    ja: coverage/overlap rules により gap・duplicated responsibility・incompatible boundary を検出し label community に依存しません。
  includes:
    - zh: 按章节、地区、时间区间、数据分片或能力域进行的完备分区及其指派规则。
      en: Complete partitioning by chapter, region, time interval, data shard, or capability area with assignment rules.
      ja: chapter・region・time interval・data shard・capability area による complete partition と assignment rules。
  excludes:
    - zh: 无覆盖声明的标签集合、临时任务清单、章节正文、Agent 组织层级和社区发现结果。
      en: Label sets without coverage, temporary task lists, section bodies, agent hierarchies, and community-detection results.
      ja: coverage のない label set・temporary task list・section body・agent hierarchy・community detection result。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic orchestrator-worker 分解、LangGraph orchestrator Send 派发映射为 Sectioning；通过 specifies 引用 SectionAssignment 清单。
    en: Anthropic orchestrator-worker decomposition and LangGraph orchestrator Send dispatch map to Sectioning referencing SectionAssignment inventory via specifies.
    ja: Anthropic orchestrator-worker 分解・LangGraph orchestrator Send 派发を specifies 経由 SectionAssignment 清单参照付き Sectioning へ写像します。
  typical_input:
    - description: Orchestrator section plan.
      format: '{"sections": ["intro", "methods", "results"], "workers": ["intro-agent", "methods-agent", "results-agent"]}'
      source_claims:
        - claim-sectioning-design
  typical_output:
    - description: Moonweave Sectioning pattern.
      format: '{"composition_specification_id": "report-sectioning", "version": "1"}'
      source_claims:
        - claim-sectioning-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: coverage_rule
      labels:
        zh: 覆盖规则
        en: coverage rule
        ja: coverage rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明输入范围必须恰好覆盖、允许重叠或允许保留未分配项。
        en: Declares exact coverage, permitted overlap, or allowed unassigned items.
        ja: exact coverage・permitted overlap・allowed unassigned items を宣言します。
      allowed_values: []
      pattern: null
      example_value: exactly-once by control family
      source_claims:
        - claim-sectioning-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: Sectioning-orchestrator-worker
    labels:
      zh: 编排者工作者分区
      en: Orchestrator-worker sectioning
      ja: orchestrator-worker sectioning
    descriptions:
      zh: report-sectioning@1 指派 intro/methods/results 三 SectionAssignment。
      en: report-sectioning@1 assigns intro/methods/results SectionAssignments.
      ja: report-sectioning@1 が intro/methods/results 三 SectionAssignment を指派。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: orchestrator-worker
    field_values:
      composition_specification_id: report-sectioning
      version: "1"
    related_node_ids:
      - Sectioning
      - SectionAssignment
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    source_claims:
      - claim-sectioning-anthropic
      - claim-sectioning-design
  - id: Sectioning-langgraph-orchestrator
    labels:
      zh: LangGraph 编排者派发
      en: LangGraph orchestrator dispatch
      ja: LangGraph orchestrator 派发
    descriptions:
      zh: orchestrator 节点按 section 列表 Send 到 worker 节点后 fan-in 合并。
      en: Orchestrator node Send-dispatches to worker nodes by section list then fan-in merges.
      ja: orchestrator ノードが section 列表で worker へ Send 後 fan-in merge。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: orchestrator-worker
    field_values: {}
    related_node_ids:
      - Sectioning
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-sectioning-langgraph
      - claim-sectioning-design
  - id: Sectioning-boundary-parallel
    labels:
      zh: 无分区并行不是 Sectioning
      en: Parallel without sections is not sectioning
      ja: section なし parallel は sectioning ではない
    descriptions:
      zh: 三相同 worker 处理同质 item 是 Parallelization 不是 Sectioning。
      en: Three identical workers on homogeneous items is Parallelization not Sectioning.
      ja: 同质 item 三同一 worker は Parallelization で Sectioning ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: sectioning versus parallelization
    field_values: {}
    related_node_ids:
      - Sectioning
      - Parallelization
    related_relation_ids: []
    source_claims:
      - claim-sectioning-design
