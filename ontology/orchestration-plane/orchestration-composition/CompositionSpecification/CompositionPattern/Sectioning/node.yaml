source_claims:
  - id: claim-sectioning-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-sectioning-002
    source: eng-fw-autogen-agentchat
    supports: AutoGen's official AgentChat documentation describes teams whose participant order and termination are managed separately from participant messages. Moonweave uses this as supporting evidence that collaboration patterns and topology specifications are not the same objects as runtime activities or produced ballots and outputs.
    locator: "AgentChat user guide: Teams, SelectorGroupChat, RoundRobinGroupChat, and termination conditions"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
