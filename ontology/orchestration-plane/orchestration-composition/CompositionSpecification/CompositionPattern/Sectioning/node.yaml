    en: Sectioning inherits composition-pattern identity and is distinguished by partition basis, coverage completeness, overlap handling, and a SectionAssignment set.
    ja: Sectioning は pattern identity を継承し partition basis・coverage completeness・overlap handling・assignment set を種差とします。
