schema: moonweave.ai/ontology-node/v1
id: Sectioning
kind: concept
labels:
  zh: 分区编排
  en: sectioning
  ja: 分区編成
semantics:
  short_definition:
    zh: 按明确分区依据把一个整体工作拆成有覆盖边界的 SectionAssignment 集合的组合模式。
    en: A composition pattern partitioning one body of work into SectionAssignments with explicit basis and coverage boundaries.
    ja: 一 work body を explicit partition basis と coverage boundaries を持つ SectionAssignment 集合へ分ける composition pattern です。
  definition:
    zh: 分区编排是 CompositionPattern 的子类，以分区依据、覆盖规则、重叠处理、未分配处理和 SectionAssignment 集合为种差。它只声明如何切分与指派，不是实际章节内容，也不等同于把任意并行分支重新命名为 section。
    en: Sectioning is a CompositionPattern distinguished by partition basis, coverage rule, overlap handling, unassigned handling, and a SectionAssignment set. It declares how work is partitioned and assigned; it is neither section content nor an arbitrary parallel branch renamed as a section.
    ja: Sectioning は partition basis・coverage rule・overlap handling・unassigned handling・SectionAssignment set で区別される CompositionPattern です。section content でも任意 parallel branch の改名でもありません。
  why_needed:
    zh: 显式覆盖和重叠规则可发现漏章、重复职责及不可合并的边界，而不是仅凭标签把工作者聚成社区。
    en: Explicit coverage and overlap rules expose gaps, duplicated responsibility, and incompatible boundaries rather than grouping workers by labels.
    ja: coverage/overlap rules により gap・duplicated responsibility・incompatible boundary を検出し label community に依存しません。
  includes:
    - zh: 按章节、地区、时间区间、数据分片或能力域进行的完备分区及其指派规则。
      en: Complete partitioning by chapter, region, time interval, data shard, or capability area with assignment rules.
      ja: chapter・region・time interval・data shard・capability area による complete partition と assignment rules。
  excludes:
    - zh: 无覆盖声明的标签集合、临时任务清单、章节正文、Agent 组织层级和社区发现结果。
      en: Label sets without coverage, temporary task lists, section bodies, agent hierarchies, and community-detection results.
      ja: coverage のない label set・temporary task list・section body・agent hierarchy・community detection result。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      Sectioning 把 work 分区为 SectionAssignment 部件供并行或顺序执行，LangGraph map 阶段绑定 section part。
      Anthropic orchestrator-worker 的 section 分解在本体中建模为 Sectioning 模式而非独立框架类型。
    en: >-
      Sectioning partitions work into SectionAssignment parts for parallel or sequential execution, binding section
      parts to LangGraph map stages. Anthropic orchestrator-worker section decomposition is modeled here as Sectioning
      rather than as a separate framework type.
    ja: >-
      Sectioning は work を SectionAssignment part に partition し LangGraph map stage に bind する。
  typical_input:
    - description:
        zh: 声明 partition 控制形态与 section 覆盖规则的模式 revision。
        en: Pattern revision declaring partition control shape and section coverage rules.
        ja: partition control shape/section coverage rule を宣言する pattern revision。
      format: |-
        {"composition_specification_id":"report-sectioning","version":"1","control_shape":"partition","coverage_rule":"exactly-once by section_id"}
  typical_output:
    - description:
        zh: 编译后的 section assignment 绑定列表。
        en: Compiled section assignment binding list.
        ja: compiled section assignment binding list。
      format: |-
        {"pattern_ref":"report-sectioning@1","section_assignment_refs":["section-finance","section-ops"]}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker section decomposition patterns.
  source_claims:
    - claim-sectioning-hierarchy
    - claim-sectioning-001
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels: { zh: 鎺у埗褰㈡€? en: control shape, ja: control shape }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鍙鐢ㄦ帶鍒跺舰鎬併€? en: Declares reusable control shape., ja: reusable control shape 銈掑瑷€銇椼伨銇欍€?}
      example_value: fan-out-fan-in
      source_claims: [claim-composition-pattern-hierarchy]
    - id: coverage_rule
      labels:
        zh: 覆盖规则
        en: coverage rule
        ja: coverage rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明输入范围必须恰好覆盖、允许重叠或允许保留未分配项。
        en: Declares exact coverage, permitted overlap, or allowed unassigned items.
        ja: exact coverage・permitted overlap・allowed unassigned items を宣言します。
      allowed_values: []
      pattern: null
      example_value: exactly-once by control family
      source_claims:
        - claim-sectioning-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: Sectioning-example-positive-manual-20260716
    labels:
      zh: Sectioning positive
      en: Sectioning positive
      ja: Sectioning positive
    descriptions:
      zh: CrewAI 映射 Sectioning：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps Sectioning: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI Sectioning: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {composition_specification_id: report-by-control-family, version: 4, valid_from: 2026-07-16T00:00:00Z, control_shape: partition-and-join, coverage_rule: "exactly-once by control family"}

    related_node_ids:
      - Sectioning
      - SectionAssignment
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    source_claims:
      - claim-sectioning-001

  - id: Sectioning-example-boundary-manual-20260716
    labels:
      zh: Sectioning boundary
      en: Sectioning boundary
      ja: Sectioning boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 Sectioning 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not Sectioning delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で Sectioning delegation spec ではない。
    field_values: {}

    related_node_ids:
      - Sectioning
    related_relation_ids: []
    source_claims:
      - claim-sectioning-001

  - id: Sectioning-example-counterexample-manual-20260719
    labels:
      zh: Sectioning counterexample
      en: Sectioning counterexample
      ja: Sectioning counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 Sectioning PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style Sectioning PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 Sectioning ではない。
    field_values: {composition_specification_id: absent, control_shape: absent, coverage_rule: absent, version: absent, prompt_text: "split findings across finance"}

    related_node_ids:
      - Sectioning
      - SectionAssignment
      - Orchestrator
    related_relation_ids: []
    source_claims:
      - claim-sectioning-001

  - id: Sectioning-example-instance-manual-20260719
    labels:
      zh: Sectioning instance
      en: Sectioning instance
      ja: Sectioning instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 Sectioning HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to Sectioning HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が Sectioning HandoffDecision に写像。
    field_values: {}

    related_node_ids:
      - Sectioning
      - CompositionPattern
    related_relation_ids:
      - Sectioning-is_a-CompositionPattern
    source_claims:
      - claim-sectioning-hierarchy

parent_relation:
  id: Sectioning-is_a-CompositionPattern
  predicate: is_a
  target: concept:CompositionPattern
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合模式
    en: is a composition pattern
    ja: 構成 pattern である
  definition:
    zh: Sectioning 继承 CompositionPattern 的可复用控制形态角色，并特化为分区与 SectionAssignment 绑定。
    en: Sectioning inherits CompositionPattern reusable control-shape role and specializes it as partition with SectionAssignment bindings.
    ja: Sectioning は CompositionPattern の reusable control-shape 役割を継承し partition/SectionAssignment binding として特化します。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_sectioning
    labels:
      zh: 具有分区分派
      en: has sectioning
      ja: 分区分派を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims:
    - claim-sectioning-hierarchy
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；具体字段与运行事实使用独立字段或关系表达。
    en: is_a only states type membership; concrete fields and runtime facts use separate fields or relations.
    ja: is_a は型従属のみを述べ、具体 field と runtime fact は別 field または relation で表現します。
