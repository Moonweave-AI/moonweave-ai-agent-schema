    predicate: specifies
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 规定分区分派
      en: specifies section assignment
      ja: 分区割当を規定する
    definitions:
      zh: 分区模式规定一个分区分派的覆盖范围、承担资格和交付契约，使其成为该模式的责任位置。
      en: A Sectioning specifies a SectionAssignment by defining its coverage scope, assignee eligibility, and deliverable contract as a responsibility position of the pattern.
      ja: Sectioning が assignment の coverage scope・eligibility・deliverable contract を定め responsibility position とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
