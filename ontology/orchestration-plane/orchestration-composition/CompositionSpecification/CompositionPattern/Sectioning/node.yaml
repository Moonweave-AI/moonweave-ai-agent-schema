schema: moonweave.ai/ontology-node/v1
id: Sectioning
kind: concept
status: review
labels:
  zh: 分区编排
  en: sectioning
  ja: 分区編成
semantics:
  short_definition:
    zh: 按明确分区依据把一个整体工作拆成有覆盖边界的 SectionAssignment 集合的组合模式。
    en: A composition pattern partitioning one body of work into SectionAssignments with explicit basis and coverage boundaries.
    ja: 一 work body を explicit partition basis と coverage boundaries を持つ SectionAssignment 集合へ分ける composition pattern です。
  definition:
    zh: 分区编排是 CompositionPattern 的子类，以分区依据、覆盖规则、重叠处理、未分配处理和 SectionAssignment 集合为种差。它只声明如何切分与指派，不是实际章节内容，也不等同于把任意并行分支重新命名为 section。
    en: Sectioning is a CompositionPattern distinguished by partition basis, coverage rule, overlap handling, unassigned handling, and a SectionAssignment set. It declares how work is partitioned and assigned; it is neither section content nor an arbitrary parallel branch renamed as a section.
    ja: Sectioning は partition basis・coverage rule・overlap handling・unassigned handling・SectionAssignment set で区別される CompositionPattern です。section content でも任意 parallel branch の改名でもありません。
  why_needed:
    zh: 显式覆盖和重叠规则可发现漏章、重复职责及不可合并的边界，而不是仅凭标签把工作者聚成社区。
    en: Explicit coverage and overlap rules expose gaps, duplicated responsibility, and incompatible boundaries rather than grouping workers by labels.
    ja: coverage/overlap rules により gap・duplicated responsibility・incompatible boundary を検出し label community に依存しません。
  includes:
    - zh: 按章节、地区、时间区间、数据分片或能力域进行的完备分区及其指派规则。
      en: Complete partitioning by chapter, region, time interval, data shard, or capability area with assignment rules.
      ja: chapter・region・time interval・data shard・capability area による complete partition と assignment rules。
  excludes:
    - zh: 无覆盖声明的标签集合、临时任务清单、章节正文、Agent 组织层级和社区发现结果。
      en: Label sets without coverage, temporary task lists, section bodies, agent hierarchies, and community-detection results.
      ja: coverage のない label set・temporary task list・section body・agent hierarchy・community detection result。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: coverage_rule
      labels:
        zh: 覆盖规则
        en: coverage rule
        ja: coverage rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明输入范围必须恰好覆盖、允许重叠或允许保留未分配项。
        en: Declares exact coverage, permitted overlap, or allowed unassigned items.
        ja: exact coverage・permitted overlap・allowed unassigned items を宣言します。
      allowed_values: []
      pattern: null
      example_value: exactly-once by control family
      source_claims:
        - claim-sectioning-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: Sectioning-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 按控制族分区报告
      en: Report partitioned by control family
      ja: control family 別 report partition
    scenario_id: null
    descriptions:
      zh: report-by-control-family@4 将每条审计发现恰好分给访问、网络或数据三个 SectionAssignment 之一，并拒绝未分类发现。
      en: report-by-control-family@4 assigns every finding exactly once to access, network, or data SectionAssignment and rejects unclassified findings.
      ja: report-by-control-family@4 は finding を access・network・data の一 SectionAssignment に exactly once 割当て unclassified を拒否します。
    field_values:
      composition_specification_id: report-by-control-family
      version: "4"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: partition-and-join
      coverage_rule: exactly-once by control family
    related_node_ids:
      - Sectioning
      - SectionAssignment
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    expected_result:
      zh: 保存分区模式和三个覆盖明确的分派规范。
      en: Store the sectioning pattern and three assignments with explicit coverage.
      ja: sectioning pattern と explicit coverage の three assignments を保存します。
    why_valid_or_invalid:
      zh: 分区依据、覆盖完备性和未分类处理均可判定。
      en: Partition basis, coverage completeness, and unclassified handling are all decidable.
      ja: partition basis・coverage completeness・unclassified handling が判定可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sectioning-001
  - id: Sectioning-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 自动发现的三个社区
      en: Three detected communities
      ja: three detected communities
    scenario_id: composition-review-sectioning-boundary
    descriptions:
      zh: Leiden 将节点聚为三个社区，但社区没有业务覆盖规则，也没有 SectionAssignment 的职责与交付契约。
      en: Leiden clusters nodes into three communities, but the communities have no business coverage rule or SectionAssignment responsibility and deliverable contract.
      ja: Leiden が nodes を three communities に分けても business coverage rule や SectionAssignment responsibility/deliverable contract はありません。
    field_values: {}
    related_node_ids:
      - Sectioning
    related_relation_ids: []
    expected_result:
      zh: 仅作为可视化布局信息，不建立 Sectioning 本体事实。
      en: Keep it only as visualization-layout information and do not assert Sectioning.
      ja: visualization layout information のみとし Sectioning fact を主張しません。
    why_valid_or_invalid:
      zh: 统计聚类不提供领域分区身份、覆盖约束或可审计分派。
      en: Statistical clustering provides no domain partition identity, coverage constraint, or auditable assignment.
      ja: statistical clustering は domain partition identity・coverage constraint・auditable assignment を与えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sectioning-001
