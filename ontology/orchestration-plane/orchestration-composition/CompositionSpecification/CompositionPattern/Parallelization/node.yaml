      en: Three-source parallel verification
      ja: three-source parallel verification
    scenario_id: null
    descriptions:
      zh: independent-source-review@2 启动法规、官方文档和论文三个独立 ParallelBranch，全部 settled 后再进入综合。
      en: independent-source-review@2 launches independent regulation, official-document, and paper branches and joins only after all settle.
      ja: independent-source-review@2 は regulation・official docs・paper の独立 branches を起動し all-settled 後に synthesis へ join します。
    field_values:
      composition_specification_id: independent-source-review
      version: "2"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: fan-out-fan-in
      join_policy: all-settled
      branch_refs:
        - regulation-branch
        - official-docs-branch
        - paper-branch
      independence_condition: branches do not read one another's intermediate state
      launch_semantics: launch all ready branches as one bounded fan-out
      max_concurrency: 3
    related_node_ids:
      - Parallelization
      - ParallelBranch
    related_relation_ids:
      - Parallelization-contains_branch-ParallelBranch
    expected_result:
      zh: 保存并行模式、独立性约束和三条分支成员关系。
      en: Store the parallel pattern, independence constraint, and three branch memberships.
      ja: parallel pattern・independence constraint・three branch memberships を保存します。
    why_valid_or_invalid:
      zh: 三条分支不读取彼此中间状态，且存在明确 fan-in 条件。
      en: The branches do not read each other's intermediate state and have an explicit fan-in condition.
      ja: branches は互いの intermediate state を読まず explicit fan-in condition を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-parallelization-001
      - claim-parallelization-002
  - id: Parallelization-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 草拟之后再复核
      en: Review after drafting
      ja: draft 後の review
    scenario_id: composition-review-parallelization-boundary
    descriptions:
      zh: review 阶段必须读取完整 draft；即使调度器预先创建两个任务，它们也不能在语义上并行。
      en: The review stage must read the completed draft; even if the scheduler creates both tasks early, they are not semantically parallel.
      ja: review stage は completed draft を必要とし scheduler が早期作成しても意味的 parallel ではありません。
    field_values: {}
    related_node_ids:
      - Parallelization
      - PromptChain
    related_relation_ids: []
    expected_result:
      zh: 分类为 PromptChain 的顺序阶段，而不是 Parallelization。
      en: Classify it as ordered PromptChain stages, not Parallelization.
      ja: ordered PromptChain stages とし Parallelization にはしません。
    why_valid_or_invalid:
      zh: 未满足分支独立性，运行时重叠不能替代语义依赖判断。
      en: Branch independence is absent; runtime overlap cannot replace the semantic dependency test.
      ja: branch independence がなく runtime overlap は semantic dependency test を代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-parallelization-001
      - claim-parallelization-002
