    predicate: contains_branch
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含并行分支
      en: contains parallel branch
      ja: 並列分岐を含む
    definitions:
      zh: 并行模式把满足其独立性声明和汇合契约的并行分支列为结构成员。
      en: A Parallelization contains a ParallelBranch when the branch is listed as a structural member satisfying its independence assertion and join contract.
      ja: Parallelization が independence assertion/join contract を満たす branch を structural member として列挙します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: branch_of_parallelization
      labels:
        zh: 是并行模式的分支
        en: is branch of parallelization
        ja: parallelization の branch である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
