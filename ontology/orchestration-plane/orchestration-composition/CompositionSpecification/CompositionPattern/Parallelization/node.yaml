source_claims:
  - id: claim-parallelization-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-parallelization-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API defines workflows through state, executable nodes, and fixed or conditional edges, including fan-out and fan-in behavior. Moonweave uses that operational evidence to distinguish a reusable OrchestrationTopology from its parts and from a time-bounded CompositionActivity that realizes the topology.
    locator: "Graph API overview: Graphs, Nodes, Edges, normal edges, conditional edges, and parallel supersteps"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-parallelization-003
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's parallelization pattern sends independent subtasks concurrently and aggregates their outputs. Moonweave records the exact reusable branch membership separately from runtime task instances.
    locator: "Workflows and agents: Parallelization"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-parallelization-004
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph distinguishes parallel independent subtasks from sequential prompt chaining in which later work depends on earlier output. Moonweave turns that boundary into an explicit independence condition.
    locator: "Workflows and agents: Prompt chaining versus Parallelization"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-parallelization-005
    source: eng-fw-langgraph-graph-api
    supports: LangGraph documents parallel supersteps and fan-out/fan-in graph edges. Moonweave records the reusable launch rule while keeping concrete scheduler occurrences outside the specification.
    locator: "Graph API overview: Edges and parallel supersteps"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-parallelization-006
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph presents parallelization as concurrent execution of independent subtasks. Moonweave adds an explicit concurrency bound so the reusable pattern does not imply unbounded resource use.
    locator: "Workflows and agents: Parallelization"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
