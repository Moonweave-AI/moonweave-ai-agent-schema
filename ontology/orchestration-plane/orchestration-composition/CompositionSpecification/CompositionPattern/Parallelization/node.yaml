schema: moonweave.ai/ontology-node/v1
id: Parallelization
kind: concept
status: review
labels:
  zh: 并行化
  en: parallelization
  ja: 並列化
semantics:
  short_definition:
    zh: 把彼此独立的工作分派到多个并行分支，并在明确汇合条件下收集结果的组合模式。
    en: A composition pattern dispatching independent work to parallel branches and collecting results under an explicit join condition.
    ja: 独立 work を parallel branches へ分派し explicit join condition で結果を集める composition pattern です。
  definition:
    zh: 并行化是 CompositionPattern 的子类，以 ParallelBranch 集合、分支独立性条件、启动语义、最大并发量和 fan-in 规则为种差。它不表示线程实现、不保证加速，也不适用于必须读取前一分支未完成结果的顺序依赖。
    en: Parallelization is a CompositionPattern distinguished by a ParallelBranch set, branch-independence condition, launch semantics, concurrency bound, and fan-in rule. It denotes neither a thread implementation nor guaranteed speedup and does not apply when a branch requires an unfinished result from another branch.
    ja: Parallelization は ParallelBranch set・independence condition・launch semantics・concurrency bound・fan-in rule で区別される CompositionPattern です。thread implementation や速度保証ではなく未完了 branch 依存には適用しません。
  why_needed:
    zh: 显式建模独立性和汇合语义，才能区分真正并行分解与只是画在同一层的顺序任务。
    en: Explicit independence and join semantics distinguish genuine parallel decomposition from sequential tasks merely drawn on one level.
    ja: independence と join semantics を明示し、同一層に描かれただけの sequential tasks と区別します。
  includes:
    - zh: 独立资料检索、多个评审视角、按来源并行抽取以及可分别失败后统一汇合的分支。
      en: Independent research, multiple review perspectives, per-source extraction, and separately failing branches joined afterward.
      ja: independent research・multiple review perspectives・per-source extraction・separately failing branches with later join。
  excludes:
    - zh: 具有数据前后依赖的阶段、仅由运行时调度器碰巧同时执行的任务、复制同一调用的重试。
      en: Data-dependent stages, tasks only coincidentally concurrent at runtime, and retries duplicating one call.
      ja: data-dependent stages・偶然 concurrent tasks・one call を複製する retry。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: join_policy
      labels:
        zh: 汇合策略
        en: join policy
        ja: join policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明等待全部、达到阈值或首次成功后汇合。
        en: Declares join after all, a threshold, or first success.
        ja: all・threshold・first success のどれで join するか宣言します。
      allowed_values: []
      pattern: null
      example_value: all-settled
      source_claims:
        - claim-parallelization-001
        - claim-parallelization-002
    - id: branch_refs
      labels:
        zh: 并行分支引用
        en: parallel-branch references
        ja: parallel branch 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出同一模式修订中可并发启动的 ParallelBranch；每个引用必须解析到独立的分支规范，而不是运行中的线程或执行尝试。
        en: Lists the ParallelBranch specifications eligible for concurrent launch in this pattern revision. Each reference resolves to a branch specification, not a runtime thread or execution attempt.
        ja: 同じ pattern revision で並行起動できる ParallelBranch specification を列挙します。各参照は runtime thread や execution attempt ではなく branch specification を指します。
      allowed_values: []
      pattern: null
      example_value:
        - regulation-branch
        - official-docs-branch
        - paper-branch
      source_claims:
        - claim-parallelization-003
    - id: independence_condition
      labels:
        zh: 分支独立条件
        en: branch-independence condition
        ja: branch independence 条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出允许并发的可判定条件，至少说明分支不得读取其他分支尚未完成的中间状态；仅声称速度更快不构成独立性。
        en: States the decidable condition permitting concurrency, including that a branch does not read another branch's unfinished intermediate state. A speed claim alone does not establish independence.
        ja: 並行性を許す判定可能な条件を示し、少なくとも branch が他 branch の未完了 intermediate state を読まないことを含みます。速度向上の主張だけでは independence を成立させません。
      allowed_values: []
      pattern: null
      example_value: branches do not read one another's intermediate state
      source_claims:
        - claim-parallelization-004
    - id: launch_semantics
      labels:
        zh: 启动语义
        en: launch semantics
        ja: launch semantics
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定所有就绪分支是一次性形成有界 fan-out，还是按容量逐批启动；它不记录某次调度器实际启动的时间。
        en: Specifies whether ready branches form one bounded fan-out or launch in capacity-limited waves. It does not record the actual launch time of a scheduler run.
        ja: ready branch が一つの bounded fan-out を形成するか capacity-limited wave で起動するかを規定し、scheduler run の実際の起動時刻は記録しません。
      allowed_values: []
      pattern: null
      example_value: launch all ready branches as one bounded fan-out
      source_claims:
        - claim-parallelization-005
    - id: max_concurrency
      labels:
        zh: 最大并发分支数
        en: maximum concurrent branches
        ja: 最大並行 branch 数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制同一模式实例中可同时处于活动状态的分支数量，必须为正整数且不得超过可选分支数量。
        en: Bounds the number of branches that may be active concurrently in one pattern realization. It is a positive integer and cannot exceed the available branch count.
        ja: 一 pattern realization で同時 active になれる branch 数を制限し、正整数で available branch 数を超えてはなりません。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-parallelization-006
  constraints: []
  required_relation_constraints: []
examples:
