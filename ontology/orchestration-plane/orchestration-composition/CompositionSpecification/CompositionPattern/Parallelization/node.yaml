schema: moonweave.ai/ontology-node/v1
id: Parallelization
kind: concept
labels:
  zh: 并行化
  en: parallelization
  ja: 並列化
semantics:
  short_definition:
    zh: 把彼此独立的工作分派到多个并行分支，并在明确汇合条件下收集结果的组合模式。
    en: A composition pattern dispatching independent work to parallel branches and collecting results under an explicit join condition.
    ja: 独立 work を parallel branches へ分派し explicit join condition で結果を集める composition pattern です。
  definition:
    zh: 并行化是 CompositionPattern 的子类，以 ParallelBranch 集合、分支独立性条件、启动语义、最大并发量和 fan-in 规则为种差。它不表示线程实现、不保证加速，也不适用于必须读取前一分支未完成结果的顺序依赖。
    en: Parallelization is a CompositionPattern distinguished by a ParallelBranch set, branch-independence condition, launch semantics, concurrency bound, and fan-in rule. It denotes neither a thread implementation nor guaranteed speedup and does not apply when a branch requires an unfinished result from another branch.
    ja: Parallelization は ParallelBranch set・independence condition・launch semantics・concurrency bound・fan-in rule で区別される CompositionPattern です。thread implementation や速度保証ではなく未完了 branch 依存には適用しません。
  why_needed:
    zh: 显式建模独立性和汇合语义，才能区分真正并行分解与只是画在同一层的顺序任务。
    en: Explicit independence and join semantics distinguish genuine parallel decomposition from sequential tasks merely drawn on one level.
    ja: independence と join semantics を明示し、同一層に描かれただけの sequential tasks と区別します。
  includes:
    - zh: 独立资料检索、多个评审视角、按来源并行抽取以及可分别失败后统一汇合的分支。
      en: Independent research, multiple review perspectives, per-source extraction, and separately failing branches joined afterward.
      ja: independent research・multiple review perspectives・per-source extraction・separately failing branches with later join。
  excludes:
    - zh: 具有数据前后依赖的阶段、仅由运行时调度器碰巧同时执行的任务、复制同一调用的重试。
      en: Data-dependent stages, tasks only coincidentally concurrent at runtime, and retries duplicating one call.
      ja: data-dependent stages・偶然 concurrent tasks・one call を複製する retry。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph Send fan-out/fan-in、CrewAI Process.parallel 与 Anthropic parallelization 模式映射为 Parallelization；包含 ParallelBranch 成员与 join 策略引用。
    en: LangGraph Send fan-out/fan-in, CrewAI Process.parallel, and Anthropic parallelization map to Parallelization with ParallelBranch members and join strategy reference.
    ja: LangGraph Send fan-out/fan-in・CrewAI Process.parallel・Anthropic parallelization を ParallelBranch 成员と join strategy 参照付き Parallelization へ写像します。
  typical_input:
    - description: Parallel fan-out definition.
      format: builder.add_conditional_edges("plan", dispatch_workers)
      source_claims:
        - claim-parallelization-design
  typical_output:
    - description: Moonweave Parallelization pattern.
      format: '{"composition_specification_id": "parallelization", "version": "2", "branch_count": 3}'
      source_claims:
        - claim-parallelization-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: join_policy
      labels:
        zh: 汇合策略
        en: join policy
        ja: join policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明等待全部、达到阈值或首次成功后汇合。
        en: Declares join after all, a threshold, or first success.
        ja: all・threshold・first success のどれで join するか宣言します。
      allowed_values: []
      pattern: null
      example_value: all-settled
      source_claims:
        - claim-parallelization-design
        - claim-parallelization-design
    - id: branch_refs
      labels:
        zh: 并行分支引用
        en: parallel-branch references
        ja: parallel branch 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出同一模式修订中可并发启动的 ParallelBranch；每个引用必须解析到独立的分支规范，而不是运行中的线程或执行尝试。
        en: Lists the ParallelBranch specifications eligible for concurrent launch in this pattern revision. Each reference resolves to a branch specification, not a runtime thread or execution attempt.
        ja: 同じ pattern revision で並行起動できる ParallelBranch specification を列挙します。各参照は runtime thread や execution attempt ではなく branch specification を指します。
      allowed_values: []
      pattern: null
      example_value:
        - regulation-branch
        - official-docs-branch
        - paper-branch
      source_claims:
        - claim-parallelization-design
    - id: independence_condition
      labels:
        zh: 分支独立条件
        en: branch-independence condition
        ja: branch independence 条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出允许并发的可判定条件，至少说明分支不得读取其他分支尚未完成的中间状态；仅声称速度更快不构成独立性。
        en: States the decidable condition permitting concurrency, including that a branch does not read another branch's unfinished intermediate state. A speed claim alone does not establish independence.
        ja: 並行性を許す判定可能な条件を示し、少なくとも branch が他 branch の未完了 intermediate state を読まないことを含みます。速度向上の主張だけでは independence を成立させません。
      allowed_values: []
      pattern: null
      example_value: branches do not read one another's intermediate state
      source_claims:
        - claim-parallelization-design
    - id: launch_semantics
      labels:
        zh: 启动语义
        en: launch semantics
        ja: launch semantics
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定所有就绪分支是一次性形成有界 fan-out，还是按容量逐批启动；它不记录某次调度器实际启动的时间。
        en: Specifies whether ready branches form one bounded fan-out or launch in capacity-limited waves. It does not record the actual launch time of a scheduler run.
        ja: ready branch が一つの bounded fan-out を形成するか capacity-limited wave で起動するかを規定し、scheduler run の実際の起動時刻は記録しません。
      allowed_values: []
      pattern: null
      example_value: launch all ready branches as one bounded fan-out
      source_claims:
        - claim-parallelization-design
    - id: max_concurrency
      labels:
        zh: 最大并发分支数
        en: maximum concurrent branches
        ja: 最大並行 branch 数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制同一模式实例中可同时处于活动状态的分支数量，必须为正整数且不得超过可选分支数量。
        en: Bounds the number of branches that may be active concurrently in one pattern realization. It is a positive integer and cannot exceed the available branch count.
        ja: 一 pattern realization で同時 active になれる branch 数を制限し、正整数で available branch 数を超えてはなりません。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-parallelization-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: Parallelization-langgraph-send
    labels:
      zh: LangGraph 并行模式
      en: LangGraph parallel pattern
      ja: LangGraph 並列 pattern
    descriptions:
      zh: parallelization@2 含三 ParallelBranch，plan 节点 Send fan-out 后 reduce fan-in。
      en: parallelization@2 contains three ParallelBranches with plan Send fan-out and reduce fan-in.
      ja: parallelization@2 が三 ParallelBranch を含み plan Send fan-out 後 reduce fan-in。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Send API
    field_values:
      composition_specification_id: parallelization
      version: "2"
    related_node_ids:
      - Parallelization
      - ParallelBranch
      - AggregationRule
    related_relation_ids:
      - Parallelization-contains_branch-ParallelBranch
    source_claims:
      - claim-parallelization-langgraph
      - claim-parallelization-design
  - id: Parallelization-crewai
    labels:
      zh: CrewAI 并行 crew
      en: CrewAI parallel crew
      ja: CrewAI 並列 crew
    descriptions:
      zh: Process.parallel crew 同时执行 research 与 analysis task 后 writer 汇合。
      en: Process.parallel crew runs research and analysis tasks concurrently then writer joins.
      ja: Process.parallel crew が research/analysis を同時実行後 writer が join。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.parallel
    field_values: {}
    related_node_ids:
      - Parallelization
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-parallelization-crewai
      - claim-parallelization-design
  - id: Parallelization-boundary-chain
    labels:
      zh: 顺序链不是并行
      en: Sequential chain is not parallelization
      ja: 順序 chain は parallelization ではない
    descriptions:
      zh: draft-review-revise@3 是 PromptChain 无 fan-out 分支。
      en: draft-review-revise@3 is PromptChain without fan-out branches.
      ja: draft-review-revise@3 は fan-out branch なし PromptChain。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: prompt chaining
    field_values: {}
    related_node_ids:
      - Parallelization
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-parallelization-design
parent_relation:
  id: Parallelization-is_a-CompositionPattern
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 并行化继承组合模式身份，并以独立 ParallelBranch、并发界限和明确 fan-in 规则为种差。
    en: Parallelization inherits composition-pattern identity and is distinguished by independent ParallelBranches, a concurrency bound, and an explicit fan-in rule.
    ja: Parallelization は pattern identity を継承し independent branches・concurrency bound・fan-in rule を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-parallelization-design
    - claim-parallelization-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
