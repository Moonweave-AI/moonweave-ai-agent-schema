schema: moonweave.ai/ontology-node/v1
id: Parallelization
kind: concept
labels:
  zh: 并行化
  en: parallelization
  ja: 並列化
semantics:
  short_definition:
    zh: 把彼此独立的工作分派到多个并行分支，并在明确汇合条件下收集结果的组合模式。
    en: A composition pattern dispatching independent work to parallel branches and collecting results under an explicit join condition.
    ja: 独立 work を parallel branches へ分派し explicit join condition で結果を集める composition pattern です。
  definition:
    zh: 并行化是 CompositionPattern 的子类，以 ParallelBranch 集合、分支独立性条件、启动语义、最大并发量和 fan-in 规则为种差。它不表示线程实现、不保证加速，也不适用于必须读取前一分支未完成结果的顺序依赖。
    en: Parallelization is a CompositionPattern distinguished by a ParallelBranch set, branch-independence condition, launch semantics, concurrency bound, and fan-in rule. It denotes neither a thread implementation nor guaranteed speedup and does not apply when a branch requires an unfinished result from another branch.
    ja: Parallelization は ParallelBranch set・independence condition・launch semantics・concurrency bound・fan-in rule で区別される CompositionPattern です。thread implementation や速度保証ではなく未完了 branch 依存には適用しません。
  why_needed:
    zh: 显式建模独立性和汇合语义，才能区分真正并行分解与只是画在同一层的顺序任务。
    en: Explicit independence and join semantics distinguish genuine parallel decomposition from sequential tasks merely drawn on one level.
    ja: independence と join semantics を明示し、同一層に描かれただけの sequential tasks と区別します。
  includes:
    - zh: 独立资料检索、多个评审视角、按来源并行抽取以及可分别失败后统一汇合的分支。
      en: Independent research, multiple review perspectives, per-source extraction, and separately failing branches joined afterward.
      ja: independent research・multiple review perspectives・per-source extraction・separately failing branches with later join。
  excludes:
    - zh: 具有数据前后依赖的阶段、仅由运行时调度器碰巧同时执行的任务、复制同一调用的重试。
      en: Data-dependent stages, tasks only coincidentally concurrent at runtime, and retries duplicating one call.
      ja: data-dependent stages・偶然 concurrent tasks・one call を複製する retry。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      Parallelization 编译为 LangGraph 同 superstep 多 destination 边或 Send 列表；fan-in 由 AggregationRule
      在 join 节点执行。Agents SDK asyncio.gather 是并行实现，不能从一次 gather 反推持久 ParallelBranch 规范。
      分支独立性必须在规范中声明，不能仅靠运行时调度巧合。
    en: >-
      Parallelization compiles to LangGraph same-superstep multi-destination edges or Send lists; fan-in runs at join nodes
      via AggregationRule. Agents SDK asyncio.gather is parallel implementation and cannot infer durable ParallelBranch spec
      from one gather call. Branch independence must be declared in specification, not inferred from scheduling coincidence.
    ja: >-
      Parallelization は LangGraph same-superstep multi-destination edge または Send list にコンパイルされる。fan-in は join node
      で AggregationRule が実行する。Agents SDK asyncio.gather は parallel implementation で一回 gather から durable
      ParallelBranch spec は推論できない。branch independence は spec で宣言し scheduling coincidence から推論してはならない。
  typical_input:
    - description:
        zh: 声明并行分支与汇合规则的组合模式规约。
        en: A composition pattern specifying parallel branches and join rules.
        ja: parallel branch と join rule を指定する composition pattern。
      format: |-
        {"pattern_id":"pattern:parallel-reviews@1","parallel_branch_refs":["branch:security","branch:legal","branch:ops"],"independence_condition":"no_shared_mutable_state","max_concurrency":3,"fan_in_rule_ref":"rule:merge-votes@1"}
  typical_output:
    - description:
        zh: 图编译器生成的并行边与 join 绑定。
        en: Parallel edges and join binding generated by graph compiler.
        ja: graph compiler が生成した parallel edge と join binding。
      format: |-
        {"pattern_ref":"pattern:parallel-reviews@1","compiled":{"adapter":"langgraph","parallel_destinations":["security","legal","ops"],"join_node":"synthesize"}}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents parallel execution of multiple destinations in one superstep.
    - name: LangGraph Send
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents dynamic parallel dispatch to named nodes.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents parallel agent execution as implementation, not specification storage.
  source_claims:
    - claim-parallelization-001
    - claim-parallelization-002
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels: { zh: 鎺у埗褰㈡€? en: control shape, ja: control shape }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鍙鐢ㄦ帶鍒跺舰鎬併€? en: Declares reusable control shape., ja: reusable control shape 銈掑瑷€銇椼伨銇欍€?}
      example_value: fan-out-fan-in
      source_claims: [claim-composition-pattern-hierarchy]
    - id: join_policy
      labels:
        zh: 汇合策略
        en: join policy
        ja: join policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明等待全部、达到阈值或首次成功后汇合。
        en: Declares join after all, a threshold, or first success.
        ja: all・threshold・first success のどれで join するか宣言します。
      allowed_values: []
      pattern: null
      example_value: all-settled
      source_claims:
        - claim-parallelization-001
        - claim-parallelization-002
    - id: branch_refs
      labels:
        zh: 并行分支引用
        en: parallel-branch references
        ja: parallel branch 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出同一模式修订中可并发启动的 ParallelBranch；每个引用必须解析到独立的分支规范，而不是运行中的线程或执行尝试。
        en: Lists the ParallelBranch specifications eligible for concurrent launch in this pattern revision. Each reference resolves to a branch specification, not a runtime thread or execution attempt.
        ja: 同じ pattern revision で並行起動できる ParallelBranch specification を列挙します。各参照は runtime thread や execution attempt ではなく branch specification を指します。
      allowed_values: []
      pattern: null
      example_value:
        - regulation-branch
        - official-docs-branch
        - paper-branch
      source_claims:
        - claim-parallelization-003
    - id: independence_condition
      labels:
        zh: 分支独立条件
        en: branch-independence condition
        ja: branch independence 条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出允许并发的可判定条件，至少说明分支不得读取其他分支尚未完成的中间状态；仅声称速度更快不构成独立性。
        en: States the decidable condition permitting concurrency, including that a branch does not read another branch's unfinished intermediate state. A speed claim alone does not establish independence.
        ja: 並行性を許す判定可能な条件を示し、少なくとも branch が他 branch の未完了 intermediate state を読まないことを含みます。速度向上の主張だけでは independence を成立させません。
      allowed_values: []
      pattern: null
      example_value: branches do not read one another's intermediate state
      source_claims:
        - claim-parallelization-004
    - id: launch_semantics
      labels:
        zh: 启动语义
        en: launch semantics
        ja: launch semantics
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定所有就绪分支是一次性形成有界 fan-out，还是按容量逐批启动；它不记录某次调度器实际启动的时间。
        en: Specifies whether ready branches form one bounded fan-out or launch in capacity-limited waves. It does not record the actual launch time of a scheduler run.
        ja: ready branch が一つの bounded fan-out を形成するか capacity-limited wave で起動するかを規定し、scheduler run の実際の起動時刻は記録しません。
      allowed_values: []
      pattern: null
      example_value: launch all ready branches as one bounded fan-out
      source_claims:
        - claim-parallelization-005
    - id: max_concurrency
      labels:
        zh: 最大并发分支数
        en: maximum concurrent branches
        ja: 最大並行 branch 数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制同一模式实例中可同时处于活动状态的分支数量，必须为正整数且不得超过可选分支数量。
        en: Bounds the number of branches that may be active concurrently in one pattern realization. It is a positive integer and cannot exceed the available branch count.
        ja: 一 pattern realization で同時 active になれる branch 数を制限し、正整数で available branch 数を超えてはなりません。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-parallelization-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: Parallelization-example-positive-manual-20260716
    labels:
      zh: Parallelization positive
      en: Parallelization positive
      ja: Parallelization positive
    descriptions:
      zh: Prefect 数据流编排映射 Parallelization：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps Parallelization: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect Parallelization: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {composition_specification_id: independent-source-review, version: 2, valid_from: 2026-07-16T00:00:00Z, control_shape: fan-out-fan-in, join_policy: all-settled}

    related_node_ids:
      - Parallelization
      - ParallelBranch
    related_relation_ids:
      - Parallelization-contains_branch-ParallelBranch
    source_claims:
      - claim-parallelization-001
      - claim-parallelization-002

  - id: Parallelization-example-boundary-manual-20260716
    labels:
      zh: Parallelization boundary
      en: Parallelization boundary
      ja: Parallelization boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 Parallelization 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not Parallelization delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で Parallelization delegation spec ではない。
    field_values: {}

    related_node_ids:
      - Parallelization
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-parallelization-001
      - claim-parallelization-002

  - id: Parallelization-counterexample-parallel-activity-run
    labels:
      zh: Parallelization counterexample
      en: Parallelization counterexample
      ja: Parallelization counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 Parallelization TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style Parallelization TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 Parallelization ではない。
    field_values: {composition_specification_id: absent, branch_refs: absent, independence_condition: absent, started_at: 2026-07-16T04:20:00Z}

    related_node_ids:
      - Parallelization
      - CompositionActivity
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-parallelization-001

  - id: Parallelization-instance-independent-source-review
    labels:
      zh: Parallelization instance
      en: Parallelization instance
      ja: Parallelization instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 Parallelization policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to Parallelization policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が Parallelization policy-prefect@1 に写像。
    field_values: {composition_specification_id: independent-source-review, version: 2, valid_from: 2026-07-16T00:00:00Z, control_shape: fan-out-fan-in, join_policy: all-settled}

    related_node_ids:
      - Parallelization
      - CompositionPattern
      - ParallelBranch
    related_relation_ids:
      - Parallelization-is_a-CompositionPattern
    source_claims:
      - claim-parallelization-001
      - claim-parallelization-hierarchy

parent_relation:
  id: Parallelization-is_a-CompositionPattern
  predicate: is_a
  target: concept:CompositionPattern
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合模式
    en: is a composition pattern
    ja: 構成 pattern である
  definition:
    zh: Parallelization 继承 CompositionPattern 的可复用控制形态角色，并特化为 fan-out/fan-in 并行分支。
    en: Parallelization inherits CompositionPattern reusable control-shape role and specializes it as fan-out/fan-in parallel branches.
    ja: Parallelization は CompositionPattern の reusable control-shape 役割を継承し fan-out/fan-in parallel branch として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_parallelization
    labels: { zh: 具有并行化, en: has parallelization, ja: 並列化を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-parallelization-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；具体字段与运行事实使用独立字段或关系表达。
    en: is_a only states type membership; concrete fields and runtime facts use separate fields or relations.
    ja: is_a は型従属のみを述べ、具体 field と runtime fact は別 field または relation で表現します。
