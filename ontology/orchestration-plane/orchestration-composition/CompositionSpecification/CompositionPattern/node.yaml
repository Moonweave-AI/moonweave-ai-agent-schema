schema: moonweave.ai/ontology-node/v1
id: CompositionPattern
kind: concept
labels:
  zh: 组合模式
  en: composition pattern
  ja: composition pattern
semantics:
  short_definition:
    zh: 规定协作控制形态与部件协调规则的组合规范。
    en: A composition specification defining collaboration control shape and part-coordination rules.
    ja: collaboration control shape と part-coordination rule を定義する composition specification。
  definition:
    zh: 组合模式是 CompositionSpecification 的子类，沿用 composition_specification_id 与 version 的单一规范身份；其种差是以控制形态、允许部件类型和汇合语义描述可复用协作办法，并作为 PromptChain、Parallelization、Sectioning、Voting 与 SynthesisPattern 的上位概念。模式不另建 pattern_id 或 revision，不含某次运行状态，也不等于完整 OrchestrationTopology。
    en: A CompositionPattern is a CompositionSpecification that retains the single composition_specification_id and version identity. It is distinguished by reusable control shape, allowed part types, and join semantics and is the genus of PromptChain, Parallelization, Sectioning, Voting, and SynthesisPattern. It introduces no separate pattern ID or revision, contains no occurrence state, and is not a complete OrchestrationTopology.
    ja: CompositionPattern は composition_specification_id と version の単一 specification identity を継承する CompositionSpecification subtype です。control shape・allowed part type・join semantics で区別され、PromptChain・Parallelization・Sectioning・Voting・SynthesisPattern の genus です。別の pattern ID/revision や occurrence state を持たず complete Topology でもありません。
  why_needed:
    zh: 模式与拓扑分开后，同一模式可以被多个具有不同部件和入口的拓扑复用。
    en: Separating pattern from topology lets one pattern be reused by topologies with different parts and entry points.
    ja: pattern と topology を分け one pattern を different parts/entry points の topology が reuse できます。
  includes:
    - zh: 链式、并行、分区、投票和综合等框架无关的协作控制形态；LangGraph/Anthropic 的 orchestrator-worker 在本体中分解为 Sectioning 部件与 SynthesisPattern 汇合，而非独立模式节点。
      en: Framework-neutral chain, parallel, sectioning, voting, and synthesis collaboration shapes; LangGraph/Anthropic orchestrator-worker decomposes here into Sectioning parts plus SynthesisPattern join rather than a separate pattern node.
      ja: framework-neutral chain・parallel・sectioning・voting・synthesis collaboration shape。
  excludes:
    - zh: 具体拓扑版本、某次运行、框架类名、参与者角色和一次路由选择。
      en: Concrete topology revisions, runtime occurrences, framework class names, participant roles, and one routing selection.
      ja: concrete topology revision・runtime occurrence・framework class name・participant role・one routing selection。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      CompositionPattern 描述可复用 control_shape 与汇合语义，供多个 OrchestrationTopology 引用。
      LangGraph 工作流模式是实现参考，不能把一次 compiled graph 直接当作 pattern revision。
    en: >-
      CompositionPattern describes reusable control_shape and join semantics referenced by multiple
      OrchestrationTopology revisions. LangGraph workflow patterns are implementation references; a compiled
      graph is not itself a pattern revision.
    ja: >-
      CompositionPattern は reusable control_shape/join semantics を記述し複数 OrchestrationTopology から参照される。
      LangGraph workflow pattern は implementation reference であり compiled graph 自体は pattern revision ではない。
  typical_input:
    - description:
        zh: 声明控制形态的组合模式规约 revision。
        en: Composition pattern revision declaring control shape.
        ja: control shape を宣言する composition pattern revision。
      format: |-
        {"composition_specification_id":"parallel-review","version":"3","control_shape":"fan-out-fan-in","valid_from":"2026-07-16T00:00:00Z"}
  typical_output:
    - description:
        zh: 拓扑编译时绑定的模式引用与允许部件类型。
        en: Pattern reference and allowed part types bound during topology compilation.
        ja: topology コンパイル時に bind される pattern reference と allowed part types。
      format: |-
        {"pattern_ref":"parallel-review@3","compiled_control_shape":"fan-out-fan-in","allowed_part_types":["ParallelBranch","ChainStage"]}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents reusable chain, parallel, and orchestrator-worker control shapes.
  source_claims:
    - claim-composition-pattern-001
    - claim-composition-pattern-002
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels:
        zh: 控制形态
        en: control shape
        ja: control shape
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 sequential、fan-out/fan-in、partition、vote 或 synthesize。
        en: Declares sequential, fan-out/fan-in, partition, vote, or synthesize.
        ja: sequential・fan-out/fan-in・partition・vote・synthesize を宣言します。
      allowed_values: []
      pattern: null
      example_value: fan-out-fan-in
      source_claims:
        - claim-composition-pattern-001
        - claim-composition-pattern-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionPattern-example-positive-manual-20260716
    labels:
      zh: CompositionPattern positive
      en: CompositionPattern positive
      ja: CompositionPattern positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionPattern 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionPattern programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionPattern: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_specification_id: parallel-review, version: 3, valid_from: 2026-07-16T00:00:00Z, control_shape: fan-out-fan-in}

    related_node_ids:
      - CompositionPattern
      - Parallelization
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-001
      - claim-composition-pattern-002

  - id: CompositionPattern-example-boundary-manual-20260716
    labels:
      zh: CompositionPattern boundary
      en: CompositionPattern boundary
      ja: CompositionPattern boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 CompositionPattern 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not CompositionPattern static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で CompositionPattern 静的 RetryPolicy ではない。
    field_values: {}

    related_node_ids:
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-002
      - claim-composition-pattern-001

  - id: CompositionPattern-counterexample-orchestration-topology
    labels:
      zh: CompositionPattern counterexample
      en: CompositionPattern counterexample
      ja: CompositionPattern counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 CompositionPattern 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style CompositionPattern group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 CompositionPattern ではない。
    field_values: {composition_specification_id: report-topology, control_shape: absent, entry_ref: report-entry, exit_ref: report-exit}

    related_node_ids:
      - CompositionPattern
      - OrchestrationTopology
      - CompositionPart
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-002

  - id: CompositionPattern-instance-parallel-reviews-control-shape
    labels:
      zh: CompositionPattern instance
      en: CompositionPattern instance
      ja: CompositionPattern instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 CompositionPattern。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to CompositionPattern.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が CompositionPattern に写像。
    field_values: {composition_specification_id: parallel-reviews, version: 1, valid_from: 2026-07-16T00:00:00Z, control_shape: fan-out-fan-in, join_policy: all-settled}

    related_node_ids:
      - CompositionPattern
      - Parallelization
      - CompositionSpecification
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-001

sources:
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents reusable chain, parallel, and orchestrator-worker control shapes.
source_claims:
  - id: claim-composition-pattern-001
    source: langgraph-workflows-agents
    supports: Composition patterns declare reusable control shapes such as sequential chains and fan-out/fan-in joins.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-pattern-002
    source: langgraph-workflows-agents
    supports: Concrete topology revisions with entry, exit, and part sets are OrchestrationTopology, not CompositionPattern.
    locator: Workflows and agents, topology versus pattern
    evidence_kind: design-inference
    confidence: high
