      ja: OrchestrationTopology とし used pattern を参照します。
    why_valid_or_invalid:
      zh: 具体部件与入口出口属于拓扑版本，不是通用模式种差。
      en: Concrete parts and entry/exit belong to a topology revision, not the general pattern differentia.
      ja: concrete parts/entry/exit は topology revision に属し general pattern differentia ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-pattern-002
      - claim-composition-pattern-001
