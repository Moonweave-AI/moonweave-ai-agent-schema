    scenario_id: composition-review-compositionpattern-boundary
    descriptions:
      zh: report-topology@4 指定入口、出口、三个 section part 和一个 synthesizer，身份由具体部件集合决定。
      en: report-topology@4 fixes entry, exit, three section parts, and a synthesizer; its concrete part set determines identity.
      ja: report-topology@4 は entry/exit・three section parts・synthesizer を固定し concrete part set が identity を決めます。
