schema: moonweave.ai/ontology-node/v1
id: CompositionPattern
kind: concept
labels:
  zh: 组合模式
  en: composition pattern
  ja: composition pattern
semantics:
  short_definition:
    zh: 规定协作控制形态与部件协调规则的组合规范。
    en: A composition specification defining collaboration control shape and part-coordination rules.
    ja: collaboration control shape と part-coordination rule を定義する composition specification。
  definition:
    zh: 组合模式是 CompositionSpecification 的子类，沿用 composition_specification_id 与 version 的单一规范身份；其种差是以控制形态、允许部件类型和汇合语义描述可复用协作办法，并作为 PromptChain、Parallelization、Sectioning、Voting 与 SynthesisPattern 的上位概念。模式不另建 pattern_id 或 revision，不含某次运行状态，也不等于完整 OrchestrationTopology。
    en: A CompositionPattern is a CompositionSpecification that retains the single composition_specification_id and version identity. It is distinguished by reusable control shape, allowed part types, and join semantics and is the genus of PromptChain, Parallelization, Sectioning, Voting, and SynthesisPattern. It introduces no separate pattern ID or revision, contains no occurrence state, and is not a complete OrchestrationTopology.
    ja: CompositionPattern は composition_specification_id と version の単一 specification identity を継承する CompositionSpecification subtype です。control shape・allowed part type・join semantics で区別され、PromptChain・Parallelization・Sectioning・Voting・SynthesisPattern の genus です。別の pattern ID/revision や occurrence state を持たず complete Topology でもありません。
  why_needed:
    zh: 模式与拓扑分开后，同一模式可以被多个具有不同部件和入口的拓扑复用。
    en: Separating pattern from topology lets one pattern be reused by topologies with different parts and entry points.
    ja: pattern と topology を分け one pattern を different parts/entry points の topology が reuse できます。
  includes:
    - zh: 链式、并行、分区、投票和综合等框架无关的协作控制形态；LangGraph/Anthropic 的 orchestrator-worker 在本体中分解为 Sectioning 部件与 SynthesisPattern 汇合，而非独立模式节点。
      en: Framework-neutral chain, parallel, sectioning, voting, and synthesis collaboration shapes; LangGraph/Anthropic orchestrator-worker decomposes here into Sectioning parts plus SynthesisPattern join rather than a separate pattern node.
      ja: framework-neutral chain・parallel・sectioning・voting・synthesis collaboration shape。
  excludes:
    - zh: 具体拓扑版本、某次运行、框架类名、参与者角色和一次路由选择。
      en: Concrete topology revisions, runtime occurrences, framework class names, participant roles, and one routing selection.
      ja: concrete topology revision・runtime occurrence・framework class name・participant role・one routing selection。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic workflow patterns（prompt chaining、parallelization、routing、orchestrator-worker）映射为 CompositionPattern 子类型；Pattern 是规范，CompositionActivity 通过 realizes 引用。
    en: Anthropic workflow patterns (prompt chaining, parallelization, routing, orchestrator-worker) map to CompositionPattern subtypes; patterns are specifications referenced by CompositionActivity via realizes.
    ja: Anthropic workflow patterns を CompositionPattern 下位型へ写像し Pattern は spec、CompositionActivity は realizes で参照します。
  typical_input:
    - description: Anthropic pattern declaration.
      format: '{"pattern_id": "parallelization", "version": "2", "control_shape": "parallel-fan-out-fan-in"}'
      source_claims:
        - claim-composition-pattern-design
  typical_output:
    - description: Moonweave CompositionPattern.
      format: '{"composition_specification_id": "parallelization", "version": "2"}'
      source_claims:
        - claim-composition-pattern-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels:
        zh: 控制形态
        en: control shape
        ja: control shape
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 sequential、fan-out/fan-in、partition、vote 或 synthesize。
        en: Declares sequential, fan-out/fan-in, partition, vote, or synthesize.
        ja: sequential・fan-out/fan-in・partition・vote・synthesize を宣言します。
      allowed_values: []
      pattern: null
      example_value: fan-out-fan-in
      source_claims:
        - claim-composition-pattern-design
        - claim-composition-pattern-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionPattern-anthropic-catalog
    labels:
      zh: Anthropic 模式目录
      en: Anthropic pattern catalog
      ja: Anthropic pattern catalog
    descriptions:
      zh: parallelization@2 声明 fan-out/fan-in 控制形态，可被多拓扑复用。
      en: parallelization@2 declares fan-out/fan-in control shape reusable across topologies.
      ja: parallelization@2 が fan-out/fan-in control shape を宣言し複数 topology で再利用可能。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: workflow patterns
    field_values:
      composition_specification_id: parallelization
      version: "2"
    related_node_ids:
      - CompositionPattern
      - Parallelization
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-anthropic
      - claim-composition-pattern-design
  - id: CompositionPattern-langgraph-realize
    labels:
      zh: LangGraph 实现模式
      en: LangGraph realizes pattern
      ja: LangGraph realizes pattern
    descriptions:
      zh: composition-run-204 通过 realizes 引用 parallelization@2 而非把 graph 边当作模式。
      en: composition-run-204 references parallelization@2 via realizes rather than treating graph edges as the pattern.
      ja: composition-run-204 が graph 辺ではなく realizes で parallelization@2 を参照。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: realizes pattern
    field_values: {}
    related_node_ids:
      - CompositionPattern
      - CompositionActivity
    related_relation_ids:
      - CompositionActivity-realizes-CompositionPattern
    source_claims:
      - claim-composition-pattern-langgraph
      - claim-composition-pattern-design
  - id: CompositionPattern-boundary-run
    labels:
      zh: 一次运行不是模式
      en: One run is not pattern
      ja: 一回 run は pattern ではない
    descriptions:
      zh: composition-run-884 有开始时间，是 CompositionActivity 不是 CompositionPattern。
      en: composition-run-884 has start time and is CompositionActivity not CompositionPattern.
      ja: composition-run-884 は start time を持ち CompositionActivity で CompositionPattern ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - CompositionPattern
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-pattern-design
parent_relation:
  id: CompositionPattern-is_a-CompositionSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 组合模式继承可版本化组合规范的身份，并以可复用控制形态、允许部件种类和协调语义为种差。
    en: CompositionPattern inherits versioned composition-specification identity and is distinguished by reusable control shape, permitted part kinds, and coordination semantics.
    ja: CompositionPattern は versioned specification identity を継承し reusable control shape・permitted part kinds・coordination semantics を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-composition-pattern-design
    - claim-composition-pattern-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
