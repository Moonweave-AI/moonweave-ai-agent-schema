      en: Parallel-review pattern
      ja: parallel review pattern
    scenario_id: null
    descriptions:
      zh: parallel-review@3 声明 fan-out/fan-in，允许多个独立复核分支并在汇合点聚合结果。
      en: parallel-review@3 declares fan-out/fan-in with independent review branches and aggregation at a join point.
      ja: parallel-review@3 は fan-out/fan-in、independent review branches、join aggregation を宣言します。
    field_values:
      composition_specification_id: parallel-review
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: fan-out-fan-in
    related_node_ids:
      - CompositionPattern
      - Parallelization
    related_relation_ids: []
    expected_result:
      zh: 建立可供多个拓扑复用的模式版本。
      en: Create a pattern revision reusable by multiple topologies.
      ja: multiple topologies が reuse できる pattern revision を作成します。
    why_valid_or_invalid:
      zh: 控制形态和汇合语义完整，但没有具体运行或部件实例。
      en: Control shape and join semantics are complete without a concrete run or part instance.
      ja: control shape/join semantics が complete で concrete run/part instance はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
