schema: moonweave.ai/ontology-node/v1
id: SynthesisPattern
kind: concept
labels:
  zh: 综合模式
  en: synthesis pattern
  ja: 統合パターン
semantics:
  short_definition:
    zh: 把多个异质输入在保留来源与冲突的前提下转化为新整体表达的组合模式。
    en: A composition pattern transforming heterogeneous inputs into a new whole while preserving provenance and conflicts.
    ja: heterogeneous inputs を provenance/conflicts を保ちながら新しい whole へ変換する composition pattern です。
  definition:
    zh: 综合模式是 CompositionPattern 的子类，以输入异质性、整合策略、来源保留要求、冲突呈现和输出完整性条件为种差。Synthesis 活动实现它；模式既不是 SynthesisPlan 的具体目标，也不是生成后的 SynthesisOutput。
    en: A SynthesisPattern is a CompositionPattern distinguished by input heterogeneity, integration strategy, provenance-preservation requirement, conflict presentation, and output-completeness condition. A Synthesis activity realizes it; the pattern is neither a SynthesisPlan's concrete objective nor the resulting SynthesisOutput.
    ja: SynthesisPattern は input heterogeneity・integration strategy・provenance preservation・conflict presentation・output completeness で区別されます。Synthesis activity が実現し concrete plan objective や resulting output ではありません。
  why_needed:
    zh: 把通用综合控制与具体计划分开，可复用“调和、并置、摘要”等方式，同时让每次计划声明自己的目标和契约。
    en: Separating generic synthesis control from a concrete plan lets reconciliation, juxtaposition, and summarization be reused while each plan states its own objective and contract.
    ja: generic synthesis control と concrete plan を分け reconciliation・juxtaposition・summarization を再利用し plan ごとに objective/contract を定めます。
  includes:
    - zh: 保留分歧的证据调和、按主题综合、候选方案归纳和多章节统一表达模式。
      en: Dissent-preserving evidence reconciliation, thematic synthesis, candidate consolidation, and multi-section unification patterns.
      ja: dissent-preserving evidence reconciliation・thematic synthesis・candidate consolidation・multi-section unification pattern。
  excludes:
    - zh: 简单拼接、无来源追踪的覆盖写入、具体报告计划、执行活动和最终文档。
      en: Simple concatenation, provenance-free overwrite, concrete report plans, execution activities, and final documents.
      ja: simple concatenation・provenance-free overwrite・concrete plan・execution activity・final document。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangChain MapReduce reduce、CrewAI 合并 task 与 LangGraph fan-in reducer 映射为 SynthesisPattern；声明输入契约与 MergeRule 引用。
    en: LangChain MapReduce reduce, CrewAI merge task, and LangGraph fan-in reducer map to SynthesisPattern declaring input contracts and MergeRule reference.
    ja: LangChain MapReduce reduce・CrewAI merge task・LangGraph fan-in reducer を input 契约と MergeRule 参照付き SynthesisPattern へ写像します。
  typical_input:
    - description: Map-reduce synthesis pattern.
      format: '{"pattern_id": "evidence-merge", "version": "3", "merge_rule_ref": "conflict-preserving@2"}'
      source_claims:
        - claim-synthesis-pattern-design
  typical_output:
    - description: Moonweave SynthesisPattern.
      format: '{"composition_specification_id": "evidence-merge", "version": "3"}'
      source_claims:
        - claim-synthesis-pattern-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: provenance_requirement
      labels:
        zh: 来源保留要求
        en: provenance requirement
        ja: 来歴保持要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明输出必须如何追溯到每项输入与冲突。
        en: States how output claims trace to each input and conflict.
        ja: output claim が input/conflict へどう trace するか定めます。
      allowed_values: []
      pattern: null
      example_value: claim-synthesis-pattern-design source links
      source_claims:
        - claim-synthesis-pattern-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisPattern-mapreduce
    labels:
      zh: MapReduce 综合模式
      en: MapReduce synthesis pattern
      ja: MapReduce 統合 pattern
    descriptions:
      zh: evidence-merge@3 消费 map 阶段输出并应用 conflict-preserving@2。
      en: evidence-merge@3 consumes map-phase outputs applying conflict-preserving@2.
      ja: evidence-merge@3 が map 段出力を consume し conflict-preserving@2 を適用。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: map-reduce
    field_values:
      composition_specification_id: evidence-merge
      version: "3"
    related_node_ids:
      - SynthesisPattern
      - MergeRule
      - Synthesis
    related_relation_ids:
      - Synthesis-realizes-SynthesisPattern
    source_claims:
      - claim-synthesis-pattern-cookbook
      - claim-synthesis-pattern-design
  - id: SynthesisPattern-crewai-writer
    labels:
      zh: CrewAI writer 综合
      en: CrewAI writer synthesis
      ja: CrewAI writer 統合
    descriptions:
      zh: writer task 合并并行 research/analysis 输出为最终报告。
      en: Writer task synthesizes parallel research/analysis outputs into final report.
      ja: writer task が並列 research/analysis 出力を最終 report に統合。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: parallel + synthesis
    field_values: {}
    related_node_ids:
      - SynthesisPattern
      - Synthesis
    related_relation_ids: []
    source_claims:
      - claim-synthesis-pattern-crewai
      - claim-synthesis-pattern-design
  - id: SynthesisPattern-boundary-voting
    labels:
      zh: 投票模式不是综合
      en: Voting pattern is not synthesis
      ja: voting pattern は synthesis ではない
    descriptions:
      zh: regime-borda@2 选择最优候选而非 merge 多输入。
      en: regime-borda@2 selects best candidate rather than merging multiple inputs.
      ja: regime-borda@2 は多 input merge ではなく最良 candidate を選択。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: voting versus synthesis
    field_values: {}
    related_node_ids:
      - SynthesisPattern
      - Voting
    related_relation_ids: []
    source_claims:
      - claim-synthesis-pattern-design
