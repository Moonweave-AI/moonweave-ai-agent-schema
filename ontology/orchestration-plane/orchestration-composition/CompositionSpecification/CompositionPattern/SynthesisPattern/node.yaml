    en: is a
    ja: の一種である
  definitions:
    zh: 综合模式继承组合模式身份，并以异质输入整合、来源保留、冲突呈现和输出完整性为种差。
    en: SynthesisPattern inherits composition-pattern identity and is distinguished by heterogeneous-input integration, provenance preservation, conflict presentation, and output completeness.
    ja: SynthesisPattern は pattern identity を継承し heterogeneous integration・provenance・conflict presentation・completeness を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
