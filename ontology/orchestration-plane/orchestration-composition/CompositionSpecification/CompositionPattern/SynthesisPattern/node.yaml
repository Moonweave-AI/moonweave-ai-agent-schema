schema: moonweave.ai/ontology-node/v1
id: SynthesisPattern
kind: concept
status: review
labels:
  zh: 综合模式
  en: synthesis pattern
  ja: 統合パターン
semantics:
  short_definition:
    zh: 把多个异质输入在保留来源与冲突的前提下转化为新整体表达的组合模式。
    en: A composition pattern transforming heterogeneous inputs into a new whole while preserving provenance and conflicts.
    ja: heterogeneous inputs を provenance/conflicts を保ちながら新しい whole へ変換する composition pattern です。
  definition:
    zh: 综合模式是 CompositionPattern 的子类，以输入异质性、整合策略、来源保留要求、冲突呈现和输出完整性条件为种差。Synthesis 活动实现它；模式既不是 SynthesisPlan 的具体目标，也不是生成后的 SynthesisOutput。
    en: A SynthesisPattern is a CompositionPattern distinguished by input heterogeneity, integration strategy, provenance-preservation requirement, conflict presentation, and output-completeness condition. A Synthesis activity realizes it; the pattern is neither a SynthesisPlan's concrete objective nor the resulting SynthesisOutput.
    ja: SynthesisPattern は input heterogeneity・integration strategy・provenance preservation・conflict presentation・output completeness で区別されます。Synthesis activity が実現し concrete plan objective や resulting output ではありません。
  why_needed:
    zh: 把通用综合控制与具体计划分开，可复用“调和、并置、摘要”等方式，同时让每次计划声明自己的目标和契约。
    en: Separating generic synthesis control from a concrete plan lets reconciliation, juxtaposition, and summarization be reused while each plan states its own objective and contract.
    ja: generic synthesis control と concrete plan を分け reconciliation・juxtaposition・summarization を再利用し plan ごとに objective/contract を定めます。
  includes:
    - zh: 保留分歧的证据调和、按主题综合、候选方案归纳和多章节统一表达模式。
      en: Dissent-preserving evidence reconciliation, thematic synthesis, candidate consolidation, and multi-section unification patterns.
      ja: dissent-preserving evidence reconciliation・thematic synthesis・candidate consolidation・multi-section unification pattern。
  excludes:
    - zh: 简单拼接、无来源追踪的覆盖写入、具体报告计划、执行活动和最终文档。
      en: Simple concatenation, provenance-free overwrite, concrete report plans, execution activities, and final documents.
      ja: simple concatenation・provenance-free overwrite・concrete plan・execution activity・final document。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: provenance_requirement
      labels:
        zh: 来源保留要求
        en: provenance requirement
        ja: 来歴保持要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明输出必须如何追溯到每项输入与冲突。
        en: States how output claims trace to each input and conflict.
        ja: output claim が input/conflict へどう trace するか定めます。
      allowed_values: []
      pattern: null
      example_value: claim-level source links
      source_claims:
        - claim-synthesis-pattern-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisPattern-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 证据调和综合模式
      en: Evidence-reconciliation pattern
      ja: evidence reconciliation pattern
    scenario_id: null
    descriptions:
      zh: evidence-reconciliation@3 按主张合并三份异质报告，冲突结论并置显示，并为每句结论保留输入引用。
      en: evidence-reconciliation@3 merges three heterogeneous reports by claim, juxtaposes conflicting conclusions, and retains input references per conclusion.
      ja: evidence-reconciliation@3 は three heterogeneous reports を claim 単位で統合し conflicts を並置して conclusion ごとの input refs を保持します。
    field_values:
      composition_specification_id: evidence-reconciliation
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      control_shape: many-to-one reconciliation
      provenance_requirement: claim-level source links
    related_node_ids:
      - SynthesisPattern
      - Synthesis
    related_relation_ids:
      - Synthesis-realizes-SynthesisPattern
    expected_result:
      zh: 保存可被不同综合计划采用的通用综合模式。
      en: Store a generic synthesis pattern usable by different synthesis plans.
      ja: different synthesis plans が使える generic synthesis pattern を保存します。
    why_valid_or_invalid:
      zh: 整合与来源语义完整，但没有指定某份报告的业务目标。
      en: Integration and provenance semantics are complete without a report-specific business objective.
      ja: integration/provenance semantics は完全で report-specific objective はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-pattern-001
      - claim-synthesis-pattern-002
  - id: SynthesisPattern-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 审计报告第五版计划
      en: Audit-report plan revision five
      ja: audit-report plan revision 5
    scenario_id: composition-review-synthesispattern-boundary
    descriptions:
      zh: audit-report-synthesis@5 指定控制族、三类输入和 report-schema@2，采用 evidence-reconciliation@3 但具有独立计划身份。
      en: audit-report-synthesis@5 names control families, three input classes, and report-schema@2 and uses evidence-reconciliation@3 while retaining plan identity.
      ja: audit-report-synthesis@5 は control families・three input classes・report-schema@2 を指定し pattern を使いますが plan identity を持ちます。
    field_values: {}
    related_node_ids:
      - SynthesisPattern
      - SynthesisPlan
    related_relation_ids: []
    expected_result:
      zh: 分类为 SynthesisPlan，并让计划引用该模式。
      en: Classify it as SynthesisPlan and let the plan reference this pattern.
      ja: SynthesisPlan とし plan から pattern を参照します。
    why_valid_or_invalid:
      zh: 具体目标、输入范围和输出契约是计划种差，不是通用模式种差。
      en: Concrete objective, input scope, and output contract distinguish a plan, not a generic pattern.
      ja: concrete objective・input scope・output contract は plan differentia です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-pattern-001
      - claim-synthesis-pattern-002
