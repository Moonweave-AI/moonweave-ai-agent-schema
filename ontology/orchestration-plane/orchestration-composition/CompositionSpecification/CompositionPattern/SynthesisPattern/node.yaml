schema: moonweave.ai/ontology-node/v1
id: SynthesisPattern
kind: concept
labels:
  zh: 综合模式
  en: synthesis pattern
  ja: 統合パターン
semantics:
  short_definition:
    zh: 把多个异质输入在保留来源与冲突的前提下转化为新整体表达的组合模式。
    en: A composition pattern transforming heterogeneous inputs into a new whole while preserving provenance and conflicts.
    ja: heterogeneous inputs を provenance/conflicts を保ちながら新しい whole へ変換する composition pattern です。
  definition:
    zh: 综合模式是 CompositionPattern 的子类，以输入异质性、整合策略、来源保留要求、冲突呈现和输出完整性条件为种差。Synthesis 活动实现它；模式既不是 SynthesisPlan 的具体目标，也不是生成后的 SynthesisOutput。
    en: A SynthesisPattern is a CompositionPattern distinguished by input heterogeneity, integration strategy, provenance-preservation requirement, conflict presentation, and output-completeness condition. A Synthesis activity realizes it; the pattern is neither a SynthesisPlan's concrete objective nor the resulting SynthesisOutput.
    ja: SynthesisPattern は input heterogeneity・integration strategy・provenance preservation・conflict presentation・output completeness で区別されます。Synthesis activity が実現し concrete plan objective や resulting output ではありません。
  why_needed:
    zh: 把通用综合控制与具体计划分开，可复用“调和、并置、摘要”等方式，同时让每次计划声明自己的目标和契约。
    en: Separating generic synthesis control from a concrete plan lets reconciliation, juxtaposition, and summarization be reused while each plan states its own objective and contract.
    ja: generic synthesis control と concrete plan を分け reconciliation・juxtaposition・summarization を再利用し plan ごとに objective/contract を定めます。
  includes:
    - zh: 保留分歧的证据调和、按主题综合、候选方案归纳和多章节统一表达模式。
      en: Dissent-preserving evidence reconciliation, thematic synthesis, candidate consolidation, and multi-section unification patterns.
      ja: dissent-preserving evidence reconciliation・thematic synthesis・candidate consolidation・multi-section unification pattern。
  excludes:
    - zh: 简单拼接、无来源追踪的覆盖写入、具体报告计划、执行活动和最终文档。
      en: Simple concatenation, provenance-free overwrite, concrete report plans, execution activities, and final documents.
      ja: simple concatenation・provenance-free overwrite・concrete plan・execution activity・final document。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      SynthesisPattern 声明 fan-in 汇合与 provenance_requirement，Synthesis 活动读取该模式 revision 并在
      join 节点产出 SynthesisOutput。LangGraph synthesize 节点是实现，不能把一次 merge 反推为模式规范。
    en: >-
      SynthesisPattern declares fan-in join and provenance_requirement; Synthesis activities read this pattern
      revision and emit SynthesisOutput at join nodes. LangGraph synthesize nodes are implementations and cannot infer
      the pattern specification from one merge.
    ja: >-
      SynthesisPattern は fan-in join/provenance_requirement を宣言し Synthesis activity が join node で
      SynthesisOutput を emit する。
  typical_input:
    - description:
        zh: 声明 synthesize 控制形态与 provenance 要求的模式 revision。
        en: Pattern revision declaring synthesize control shape and provenance requirements.
        ja: synthesize control shape/provenance requirement を宣言する pattern revision。
      format: |-
        {"composition_specification_id":"report-synthesis-pattern","version":"1","control_shape":"synthesize","provenance_requirement":"claim-level source links"}
  typical_output:
    - description:
        zh: 编译后的 synthesize join 绑定。
        en: Compiled synthesize join binding.
        ja: compiled synthesize join binding。
      format: |-
        {"pattern_ref":"report-synthesis-pattern@1","join_node":"synthesize","provenance_required":true}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator synthesis consolidating specialist outputs.
  source_claims:
    - claim-synthesis-pattern-hierarchy
    - claim-synthesis-pattern-001
structure:
  identity_keys: []
  fields:
    - id: control_shape
      labels: { zh: 鎺у埗褰㈡€? en: control shape, ja: control shape }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑鍙鐢ㄦ帶鍒跺舰鎬併€? en: Declares reusable control shape., ja: reusable control shape 銈掑瑷€銇椼伨銇欍€?}
      example_value: fan-out-fan-in
      source_claims: [claim-composition-pattern-hierarchy]
    - id: provenance_requirement
      labels:
        zh: 来源保留要求
        en: provenance requirement
        ja: 来歴保持要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明输出必须如何追溯到每项输入与冲突。
        en: States how output claims trace to each input and conflict.
        ja: output claim が input/conflict へどう trace するか定めます。
      allowed_values: []
      pattern: null
      example_value: claim-level source links
      source_claims:
        - claim-synthesis-pattern-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisPattern-example-positive-manual-20260716
    labels:
      zh: SynthesisPattern positive
      en: SynthesisPattern positive
      ja: SynthesisPattern positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 SynthesisPattern 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes SynthesisPattern programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy SynthesisPattern: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_specification_id: evidence-reconciliation, version: 3, valid_from: 2026-07-16T00:00:00Z, control_shape: "many-to-one reconciliation", provenance_requirement: "claim-level source links"}

    related_node_ids:
      - SynthesisPattern
      - Synthesis
    related_relation_ids:
      - Synthesis-realizes-SynthesisPattern
    source_claims:
      - claim-synthesis-pattern-001
      - claim-synthesis-pattern-002

  - id: SynthesisPattern-example-boundary-manual-20260716
    labels:
      zh: SynthesisPattern boundary
      en: SynthesisPattern boundary
      ja: SynthesisPattern boundary
    descriptions:
      zh: ToT 评估分数是运行时 heuristic/LLM 评分，不是 SynthesisPattern 静态规范；BranchCondition 规约与 evaluate() 运行时结果应分离。
      en: ToT evaluation scores are runtime heuristic/LLM ratings, not SynthesisPattern static spec; separate BranchCondition specification from evaluate() runtime results.
      ja: ToT 評価スコアは runtime で SynthesisPattern 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - SynthesisPattern
      - SynthesisPlan
    related_relation_ids: []
    source_claims:
      - claim-synthesis-pattern-001
      - claim-synthesis-pattern-002

  - id: SynthesisPattern-example-counterexample-manual-20260719
    labels:
      zh: SynthesisPattern counterexample
      en: SynthesisPattern counterexample
      ja: SynthesisPattern counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 SynthesisPattern TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style SynthesisPattern TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 SynthesisPattern ではない。
    field_values: {composition_specification_id: absent, control_shape: absent, version: absent, native_node_name: synthesizer, inline_prompt: "merge three sections and keep sources"}

    related_node_ids:
      - SynthesisPattern
      - Synthesis
      - SynthesisPlan
    related_relation_ids: []
    source_claims:
      - claim-synthesis-pattern-001
      - claim-synthesis-pattern-002

  - id: SynthesisPattern-example-instance-manual-20260719
    labels:
      zh: SynthesisPattern instance
      en: SynthesisPattern instance
      ja: SynthesisPattern instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 SynthesisPattern。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to SynthesisPattern.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が SynthesisPattern に写像。
    field_values: {}

    related_node_ids:
      - SynthesisPattern
      - CompositionPattern
    related_relation_ids:
      - SynthesisPattern-is_a-CompositionPattern
    source_claims:
      - claim-synthesis-pattern-hierarchy

parent_relation:
  id: SynthesisPattern-is_a-CompositionPattern
  predicate: is_a
  target: concept:CompositionPattern
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合模式
    en: is a composition pattern
    ja: 構成 pattern である
  definition:
    zh: SynthesisPattern 继承 CompositionPattern 的可复用控制形态角色，并特化为 many-to-one 综合汇合。
    en: SynthesisPattern inherits CompositionPattern reusable control-shape role and specializes it as many-to-one synthesis join.
    ja: SynthesisPattern は CompositionPattern の reusable control-shape 役割を継承し many-to-one synthesis join として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_synthesis_pattern
    labels: { zh: 具有综合模式, en: has synthesis pattern, ja: 総合 pattern を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-synthesis-pattern-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；具体字段与运行事实使用独立字段或关系表达。
    en: is_a only states type membership; concrete fields and runtime facts use separate fields or relations.
    ja: is_a は型従属のみを述べ、具体 field と runtime fact は別 field または relation で表現します。
