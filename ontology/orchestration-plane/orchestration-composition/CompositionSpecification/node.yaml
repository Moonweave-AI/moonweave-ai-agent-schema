schema: moonweave.ai/ontology-node/v1
id: CompositionSpecification
kind: concept
labels:
  zh: 组合规范
  en: composition specification
  ja: composition specification
semantics:
  short_definition:
    zh: 声明协作结构、角色位置、聚合约束或输出契约的版本化可复用规范。
    en: A versioned reusable specification declaring collaboration structure, participant positions, aggregation constraints, or output contracts.
    ja: collaboration structure・participant position・aggregation constraint・output contract を宣言する versioned reusable specification。
  definition:
    zh: 组合规范是一种规范，以规范标识、版本和有效期为身份，作为 CompositionPattern、OrchestrationTopology、CompositionPart、AggregationRule 与 SynthesisPlan 的共同上位概念。它描述工作如何被组织，但不执行任何步骤，也不证明某个输出已经产生。
    en: A CompositionSpecification is a specification identified by specification ID, version, and validity interval and serves as the common genus of CompositionPattern, OrchestrationTopology, CompositionPart, AggregationRule, and SynthesisPlan. It describes how work is organized but executes no step and proves no output was produced.
    ja: CompositionSpecification は specification ID・version・validity interval で識別し Pattern・Topology・Part・AggregationRule・SynthesisPlan の common genus です。work organization を記述しますが step を execute せず output generation を証明しません。
  why_needed:
    zh: 共同上位概念避免把 contains、uses_pattern 或 governs 等业务边误作分类父关系。
    en: A common genus prevents business links such as contains, uses_pattern, or governs from being mistaken for taxonomic parents.
    ja: common genus により contains・uses_pattern・governs 等を taxonomy parent と誤認しません。
  includes:
    - zh: 工作流拓扑、组合模式、拓扑部件、聚合规则和综合计划的不可变版本。
      en: Immutable revisions of workflow topology, composition patterns, topology parts, aggregation rules, and synthesis plans.
      ja: workflow topology・composition pattern・part・aggregation rule・synthesis plan の immutable revision。
  excludes:
    - zh: 正在运行的组合活动、一次投票、一个输入工件、框架产品名称和只为可视化生成的社区。
      en: A running composition activity, one vote, an input artifact, framework product names, and visualization-only communities.
      ja: running activity・one vote・input artifact・framework product name・visual-only community。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph compiled graph 边、CrewAI crew 拓扑与 Anthropic workflow pattern 声明映射为 CompositionSpecification 子类型；version 不可变，CompositionActivity 通过 uses_topology/realizes 引用。
    en: LangGraph compiled graph edges, CrewAI crew topology, and Anthropic workflow pattern declarations map to CompositionSpecification subtypes; versions are immutable and CompositionActivity references via uses_topology/realizes.
    ja: LangGraph compiled graph 辺・CrewAI crew topology・Anthropic workflow pattern 宣言を CompositionSpecification 下位型へ写像し version は immutable、CompositionActivity は uses_topology/realizes で参照します。
  typical_input:
    - description: Versioned composition spec manifest.
      format: '{"composition_specification_id": "composition-spec-report", "version": "4"}'
      source_claims:
        - claim-composition-specification-design
  typical_output:
    - description: Moonweave CompositionSpecification bundle.
      format: '{"composition_specification_id": "composition-spec-report", "version": "4", "valid_from": "2026-07-16T00:00:00Z"}'
      source_claims:
        - claim-composition-specification-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys:
    - composition_specification_id
    - version
  fields:
    - id: composition_specification_id
      labels:
        zh: 组合规范标识
        en: composition-specification ID
        ja: composition specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项组合规范。
        en: Stably identifies a composition specification across revisions.
        ja: revision 間で composition specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: composition-spec-report
      source_claims:
        - claim-composition-specification-design
        - claim-composition-specification-design
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的结构与约束版本。
        en: Fixes an immutable revision of structure and constraints.
        ja: structure/constraint の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-composition-specification-design
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-composition-specification-design
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；空值表示未计划终止。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time を記録し null は scheduled end 無しです。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-composition-specification-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionSpecification-report-topology
    labels:
      zh: 报告协作规范
      en: Report collaboration spec
      ja: report 協調 spec
    descriptions:
      zh: composition-spec-report@4 引用拓扑、并行模式与综合计划，不含运行开始时间。
      en: composition-spec-report@4 references topology, parallel pattern, and synthesis plan without runtime start time.
      ja: composition-spec-report@4 は topology・parallel pattern・synthesis plan を参照し runtime start time はありません。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: orchestrator-worker
    field_values:
      composition_specification_id: composition-spec-report
      version: "4"
    related_node_ids:
      - CompositionSpecification
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-anthropic
      - claim-composition-specification-design
  - id: CompositionSpecification-langgraph-graph
    labels:
      zh: LangGraph 图规范
      en: LangGraph graph spec
      ja: LangGraph graph spec
    descriptions:
      zh: compiled StateGraph 边与节点签名是 OrchestrationTopology 的工程投影。
      en: Compiled StateGraph edges and node contracts project to OrchestrationTopology.
      ja: compiled StateGraph 辺と node 契約は OrchestrationTopology の engineering 投影。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: StateGraph definition
    field_values:
      composition_specification_id: report-topology
      version: "11"
    related_node_ids:
      - CompositionSpecification
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-langgraph
      - claim-composition-specification-design
  - id: CompositionSpecification-boundary-run
    labels:
      zh: 运行不是规范
      en: Run is not specification
      ja: run は spec ではない
    descriptions:
      zh: composition-run-884 有 04:20 开始时间与 running 状态，应建模为 CompositionActivity。
      en: composition-run-884 has 04:20 start and running status and belongs on CompositionActivity.
      ja: composition-run-884 は 04:20 start と running status を持ち CompositionActivity に属します。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - CompositionSpecification
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-design
parent_relation: null
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-composition-specification-langgraph
    source: langgraph
    supports: Predetermined graph structure is specification separate from execution.
    locator: Workflows versus agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-specification-anthropic
    source: anthropic-workflows
    supports: Anthropic workflow patterns are reusable structural prescriptions.
    locator: Building effective agents patterns
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-specification-design
    source: composition-design
    supports: CompositionSpecification genus groups topology, pattern, part, rule, and plan specs.
    locator: CompositionSpecification boundary
    evidence_kind: design-inference
    confidence: high
