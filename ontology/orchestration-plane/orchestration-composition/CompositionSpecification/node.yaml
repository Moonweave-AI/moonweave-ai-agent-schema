  - id: CompositionSpecification-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告协作规范第四版
      en: Report collaboration specification revision four
      ja: report collaboration specification revision 4
    scenario_id: null
    descriptions:
      zh: composition-spec-report@4 从 7 月 16 日生效，引用拓扑、并行模式、分区部件和综合计划，但不含运行开始时间。
      en: composition-spec-report@4 is valid from July 16 and references topology, parallel pattern, section parts, and synthesis plan without a runtime start time.
      ja: composition-spec-report@4 は July 16 から valid で topology・parallel pattern・section parts・synthesis plan を参照し runtime start time はありません。
    field_values:
      composition_specification_id: composition-spec-report
      version: "4"
      valid_from: 2026-07-16T00:00:00Z
      valid_until: null
    related_node_ids:
      - CompositionSpecification
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids: []
    expected_result:
      zh: 建立可被多次组合活动实现的不可变规范版本。
      en: Create an immutable specification revision reusable by many composition activities.
      ja: many composition activities が realize できる immutable specification revision を作成します。
    why_valid_or_invalid:
      zh: 标识、版本、有效期和结构引用完整，且未声称发生执行。
      en: Identity, version, validity, and structural references are complete without claiming execution.
      ja: identity・version・validity・structure ref が complete で execution を主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
