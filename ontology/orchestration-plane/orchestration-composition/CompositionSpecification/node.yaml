schema: moonweave.ai/ontology-node/v1
id: CompositionSpecification
kind: concept
status: review
labels:
  zh: 组合规范
  en: composition specification
  ja: composition specification
semantics:
  short_definition:
    zh: 声明协作结构、角色位置、聚合约束或输出契约的版本化可复用规范。
    en: A versioned reusable specification declaring collaboration structure, participant positions, aggregation constraints, or output contracts.
    ja: collaboration structure・participant position・aggregation constraint・output contract を宣言する versioned reusable specification。
  definition:
    zh: 组合规范是一种规范，以规范标识、版本和有效期为身份，作为 CompositionPattern、OrchestrationTopology、CompositionPart、AggregationRule 与 SynthesisPlan 的共同上位概念。它描述工作如何被组织，但不执行任何步骤，也不证明某个输出已经产生。
    en: A CompositionSpecification is a specification identified by specification ID, version, and validity interval and serves as the common genus of CompositionPattern, OrchestrationTopology, CompositionPart, AggregationRule, and SynthesisPlan. It describes how work is organized but executes no step and proves no output was produced.
    ja: CompositionSpecification は specification ID・version・validity interval で識別し Pattern・Topology・Part・AggregationRule・SynthesisPlan の common genus です。work organization を記述しますが step を execute せず output generation を証明しません。
  why_needed:
    zh: 共同上位概念避免把 contains、uses_pattern 或 governs 等业务边误作分类父关系。
    en: A common genus prevents business links such as contains, uses_pattern, or governs from being mistaken for taxonomic parents.
    ja: common genus により contains・uses_pattern・governs 等を taxonomy parent と誤認しません。
  includes:
    - zh: 工作流拓扑、组合模式、拓扑部件、聚合规则和综合计划的不可变版本。
      en: Immutable revisions of workflow topology, composition patterns, topology parts, aggregation rules, and synthesis plans.
      ja: workflow topology・composition pattern・part・aggregation rule・synthesis plan の immutable revision。
  excludes:
    - zh: 正在运行的组合活动、一次投票、一个输入工件、框架产品名称和只为可视化生成的社区。
      en: A running composition activity, one vote, an input artifact, framework product names, and visualization-only communities.
      ja: running activity・one vote・input artifact・framework product name・visual-only community。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - composition_specification_id
    - version
  fields:
    - id: composition_specification_id
      labels:
        zh: 组合规范标识
        en: composition-specification ID
        ja: composition specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项组合规范。
        en: Stably identifies a composition specification across revisions.
        ja: revision 間で composition specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: composition-spec-report
      source_claims:
        - claim-composition-specification-001
        - claim-composition-specification-003
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的结构与约束版本。
        en: Fixes an immutable revision of structure and constraints.
        ja: structure/constraint の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-composition-specification-003
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-composition-specification-003
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；空值表示未计划终止。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time を記録し null は scheduled end 無しです。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-composition-specification-003
  constraints: []
  required_relation_constraints: []
