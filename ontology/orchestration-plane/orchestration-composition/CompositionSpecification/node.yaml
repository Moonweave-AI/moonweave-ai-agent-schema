      en: Running report synthesis
      ja: running report synthesis
    scenario_id: composition-review-compositionspecification-boundary
    descriptions:
      zh: composition-run-884 在 04:20 开始、读取三个输入并处于 running，身份由时间与状态决定。
      en: composition-run-884 starts at 04:20, consumes three inputs, and is running; time and state determine its identity.
      ja: composition-run-884 は 04:20 start、three inputs consume、status=running で time/state が identity を決めます。
    field_values: {}
    related_node_ids:
      - CompositionActivity
      - CompositionSpecification
    related_relation_ids: []
    expected_result:
      zh: 分类为 CompositionActivity，并引用所实现的规范。
      en: Classify as CompositionActivity and reference the specification realized.
      ja: CompositionActivity とし realized specification を参照します。
    why_valid_or_invalid:
      zh: 一次运行发生与可复用规范具有不同的身份和生命周期。
      en: A runtime occurrence and reusable specification have different identity and lifecycle.
      ja: runtime occurrence と reusable specification は identity/lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-specification-003
      - claim-composition-specification-001
