schema: moonweave.ai/ontology-node/v1
id: CompositionSpecification
kind: concept
labels:
  zh: 组合规范
  en: composition specification
  ja: composition specification
semantics:
  short_definition:
    zh: 声明协作结构、角色位置、聚合约束或输出契约的版本化可复用规范。
    en: A versioned reusable specification declaring collaboration structure, participant positions, aggregation constraints, or output contracts.
    ja: collaboration structure・participant position・aggregation constraint・output contract を宣言する versioned reusable specification。
  definition:
    zh: 组合规范是一种规范，以规范标识、版本和有效期为身份，作为 CompositionPattern、OrchestrationTopology、CompositionPart、AggregationRule 与 SynthesisPlan 的共同上位概念。它描述工作如何被组织，但不执行任何步骤，也不证明某个输出已经产生。
    en: A CompositionSpecification is a specification identified by specification ID, version, and validity interval and serves as the common genus of CompositionPattern, OrchestrationTopology, CompositionPart, AggregationRule, and SynthesisPlan. It describes how work is organized but executes no step and proves no output was produced.
    ja: CompositionSpecification は specification ID・version・validity interval で識別し Pattern・Topology・Part・AggregationRule・SynthesisPlan の common genus です。work organization を記述しますが step を execute せず output generation を証明しません。
  why_needed:
    zh: 共同上位概念避免把 contains、uses_pattern 或 governs 等业务边误作分类父关系。
    en: A common genus prevents business links such as contains, uses_pattern, or governs from being mistaken for taxonomic parents.
    ja: common genus により contains・uses_pattern・governs 等を taxonomy parent と誤認しません。
  includes:
    - zh: 工作流拓扑、组合模式、拓扑部件、聚合规则和综合计划的不可变版本。
      en: Immutable revisions of workflow topology, composition patterns, topology parts, aggregation rules, and synthesis plans.
      ja: workflow topology・composition pattern・part・aggregation rule・synthesis plan の immutable revision。
  excludes:
    - zh: 正在运行的组合活动、一次投票、一个输入工件、框架产品名称和只为可视化生成的社区。
      en: A running composition activity, one vote, an input artifact, framework product names, and visualization-only communities.
      ja: running activity・one vote・input artifact・framework product name・visual-only community。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      CompositionSpecification 编译为 LangGraph StateGraph 结构或 Agents SDK 多 Agent 编排清单：Pattern、Part、
      AggregationRule、SynthesisPlan 共享 composition_spec revision。CompositionActivity 运行时实例引用规范
      但不回写 version；subgraph 边界由 OrchestrationTopology 声明。
    en: >-
      CompositionSpecification compiles to LangGraph StateGraph structure or Agents SDK multi-agent orchestration manifests:
      Pattern, Part, AggregationRule, and SynthesisPlan share composition_spec revision. CompositionActivity runtime
      instances reference specs without rewriting version; subgraph boundaries are declared by OrchestrationTopology.
    ja: >-
      CompositionSpecification は LangGraph StateGraph structure または Agents SDK multi-agent orchestration manifest に
      コンパイルされる。Pattern、Part、AggregationRule、SynthesisPlan が composition_spec revision を共有する。
      CompositionActivity runtime instance は spec を参照するが version を書き換えない。subgraph boundary は
      OrchestrationTopology が宣言する。
  typical_input:
    - description:
        zh: 版本化组合协作结构规范。
        en: A versioned composition collaboration-structure specification.
        ja: versioned composition collaboration-structure specification。
      format: |-
        {"composition_specification_id":"cs:release-report@2","version":"2","pattern_refs":["pattern:parallel-reviews@1"],"topology_ref":"topo:release-report@1","aggregation_rule_refs":["rule:merge-votes@1"]}
  typical_output:
    - description:
        zh: 编译后的图结构或编排清单工件。
        en: Compiled graph structure or orchestration manifest artifact.
        ja: コンパイル済み graph structure または orchestration manifest artifact。
      format: |-
        {"composition_spec_ref":"cs:release-report@2","compiled":{"adapter":"langgraph","subgraphs":["reviews","synthesis"],"parallel_branches":3}}
  reference_implementations:
    - name: LangGraph subgraphs
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents composing graphs from nested subgraphs and parallel branches.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents orchestration manifests as composition specification implementations.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents graph compilation separate from composition activity runtime.
  source_claims:
    - claim-composition-specification-001
    - claim-composition-specification-002
structure:
  identity_keys:
    - composition_specification_id
    - version
  fields:
    - id: composition_specification_id
      labels:
        zh: 组合规范标识
        en: composition-specification ID
        ja: composition specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一项组合规范。
        en: Stably identifies a composition specification across revisions.
        ja: revision 間で composition specification を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: composition-spec-report
      source_claims:
        - claim-composition-specification-001
        - claim-composition-specification-003
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定不可原地修改的结构与约束版本。
        en: Fixes an immutable revision of structure and constraints.
        ja: structure/constraint の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-composition-specification-003
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本开始适用的时间。
        en: Records when this revision becomes applicable.
        ja: revision applicability start time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-composition-specification-003
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；空值表示未计划终止。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time を記録し null は scheduled end 無しです。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-composition-specification-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionSpecification-example-positive-manual-20260716
    labels:
      zh: CompositionSpecification positive
      en: CompositionSpecification positive
      ja: CompositionSpecification positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionSpecification 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionSpecification programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionSpecification: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_specification_id: composition-spec-report, version: 4, valid_from: 2026-07-16T00:00:00Z, valid_until: null}

    related_node_ids:
      - CompositionSpecification
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-001
      - claim-composition-specification-003

  - id: CompositionSpecification-example-boundary-manual-20260716
    labels:
      zh: CompositionSpecification boundary
      en: CompositionSpecification boundary
      ja: CompositionSpecification boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 CompositionSpecification 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not CompositionSpecification static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で CompositionSpecification 静的 RetryPolicy ではない。
    field_values: {}

    related_node_ids:
      - CompositionActivity
      - CompositionSpecification
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-003
      - claim-composition-specification-001

  - id: CompositionSpecification-counterexample-langgraph-state-misclassified
    labels:
      zh: CompositionSpecification counterexample
      en: CompositionSpecification counterexample
      ja: CompositionSpecification counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 CompositionSpecification 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style CompositionSpecification group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 CompositionSpecification ではない。
    field_values: {composition_specification_id: absent, version: absent, valid_from: absent, checkpoint_messages_count: 12}

    related_node_ids:
      - CompositionSpecification
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-003

  - id: CompositionSpecification-instance-release-report-spec
    labels:
      zh: CompositionSpecification instance
      en: CompositionSpecification instance
      ja: CompositionSpecification instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 CompositionSpecification。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to CompositionSpecification.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が CompositionSpecification に写像。
    field_values: {composition_specification_id: composition-spec-report, version: 4, valid_from: 2026-07-16T00:00:00Z, valid_until: null}

    related_node_ids:
      - CompositionSpecification
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids: []
    source_claims:
      - claim-composition-specification-001
      - claim-composition-specification-002

