  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 组合部件继承组合规范身份，并以在某拓扑版本中的局部位置、端口和职责为种差。
    en: CompositionPart inherits composition-specification identity and is distinguished by local position, ports, and responsibility in one topology revision.
    ja: CompositionPart は specification identity を継承し topology revision 内の local position・ports・responsibility を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
