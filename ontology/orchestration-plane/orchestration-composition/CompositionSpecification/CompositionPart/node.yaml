schema: moonweave.ai/ontology-node/v1
id: CompositionPart
kind: concept
labels:
  zh: 组合部件
  en: composition part
  ja: 構成部品
semantics:
  short_definition:
    zh: 在某一拓扑版本中占据可引用位置并承担局部协调职责的结构规范。
    en: A structural specification occupying a referenceable position and carrying a local coordination responsibility in one topology revision.
    ja: 一つの topology revision で参照可能な位置と局所的な協調責務を持つ構造仕様です。
  definition:
    zh: 组合部件是 CompositionSpecification 的子类，以部件标识、所属拓扑、局部职责和连接端口为种差；ChainStage、ParallelBranch 与 SectionAssignment 分别刻画顺序位置、并行位置和分区分派位置。部件是静态结构声明，不是一次执行步骤，也不是执行者。
    en: A CompositionPart is a CompositionSpecification distinguished by part ID, owning topology, local responsibility, and connection ports. ChainStage, ParallelBranch, and SectionAssignment specialize sequential, parallel, and partition-assignment positions. A part is a static structural declaration, not an execution occurrence or actor.
    ja: CompositionPart は part ID・owning topology・local responsibility・connection ports で区別される CompositionSpecification です。ChainStage、ParallelBranch、SectionAssignment は順序・並列・分区割当の位置を特殊化し、実行 occurrence や actor ではありません。
  why_needed:
    zh: 把部件作为规范分支，可在不混淆执行状态的前提下回答拓扑由哪些位置组成、每个位置接受什么输入。
    en: Treating parts as specifications answers which positions compose a topology and what each position accepts without mixing in execution state.
    ja: part を specification として、execution state を混ぜず topology の位置と受入入力を説明できます。
  includes:
    - zh: 有稳定部件标识、拓扑归属、端口契约和局部职责的阶段、分支与分区分派。
      en: Stages, branches, and section assignments with stable part identity, topology membership, port contracts, and local responsibility.
      ja: stable part identity・topology membership・port contract・local responsibility を持つ stage、branch、section assignment。
  excludes:
    - zh: 已经开始或结束的步骤尝试、Agent 角色、消息、工具调用以及只描述一般控制形态的模式。
      en: Started or ended step attempts, agent roles, messages, tool calls, and patterns that only describe a general control shape.
      ja: 開始済み step attempt、agent role、message、tool call、一般 control shape の pattern。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: OrchestrationTopology 通过 contains 引用 ChainStage、ParallelBranch、SectionAssignment；LangGraph 节点与 CrewAI task 槽位映射为 CompositionPart 静态位置。
    en: OrchestrationTopology references ChainStage, ParallelBranch, and SectionAssignment via contains; LangGraph nodes and CrewAI task slots map to CompositionPart static positions.
    ja: OrchestrationTopology は contains で ChainStage・ParallelBranch・SectionAssignment を参照し LangGraph node・CrewAI task slot を CompositionPart 静的位置へ写像します。
  typical_input:
    - description: Topology part membership.
      format: '{"topology_ref": "report-topology@11", "part_ref": "official-docs-branch@2"}'
      source_claims:
        - claim-composition-part-design
  typical_output:
    - description: Moonweave CompositionPart in topology.
      format: '{"composition_part_id": "official-docs-branch", "topology_ref": "report-topology@11"}'
      source_claims:
        - claim-composition-part-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      allowed_values: []
      pattern: null
      example_value: report-topology@4
      source_claims:
        - claim-composition-part-design
        - claim-composition-part-design
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      allowed_values: []
      pattern: null
      example_value: draft finance section
      source_claims:
        - claim-composition-part-design
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别列出该结构位置可接收和可产生的命名端口及其数据契约；端口只描述拓扑兼容性，不表示某次运行已经传输数据。
        en: Lists the named input and output ports of this structural position together with their data-contract references. Ports describe topology compatibility and do not assert that a run transferred data.
        ja: この構造位置の named input/output port と data-contract reference を列挙します。port は topology compatibility を記述し、run が data を転送済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value:
        inputs:
          - name: finance-evidence
            contract_ref: finance-evidence-set@2
        outputs:
          - name: section-draft
            contract_ref: section-draft@3
      source_claims:
        - claim-composition-part-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionPart-parallel-branch
    labels:
      zh: 并行分支部件
      en: Parallel branch part
      ja: 並列 branch part
    descriptions:
      zh: official-docs-branch@2 是 report-topology@11 中的 ParallelBranch 部件。
      en: official-docs-branch@2 is a ParallelBranch part in report-topology@11.
      ja: official-docs-branch@2 は report-topology@11 内 ParallelBranch part。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Send worker slot
    field_values:
      composition_part_id: official-docs-branch
    related_node_ids:
      - CompositionPart
      - ParallelBranch
      - OrchestrationTopology
    related_relation_ids:
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-composition-part-langgraph
      - claim-composition-part-design
  - id: CompositionPart-chain-stage
    labels:
      zh: 链式阶段部件
      en: Chain stage part
      ja: chain stage part
    descriptions:
      zh: review-stage 是 draft-review-revise@3 的 ChainStage 部件。
      en: review-stage is a ChainStage part of draft-review-revise@3.
      ja: review-stage は draft-review-revise@3 の ChainStage part。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: prompt chaining
    field_values:
      composition_part_id: review-stage
    related_node_ids:
      - CompositionPart
      - ChainStage
      - PromptChain
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    source_claims:
      - claim-composition-part-anthropic
      - claim-composition-part-design
  - id: CompositionPart-boundary-worker
    labels:
      zh: 工作者不是部件
      en: Worker is not part
      ja: worker は part ではない
    descriptions:
      zh: researcher-7 是可替换执行者，不改变 ParallelBranch 结构身份。
      en: researcher-7 is a replaceable executor and does not change ParallelBranch structural identity.
      ja: researcher-7 は replaceable executor で ParallelBranch 構造 identity を変えません。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: agent versus task slot
    field_values: {}
    related_node_ids:
      - CompositionPart
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-composition-part-crewai
      - claim-composition-part-design
parent_relation:
  id: CompositionPart-is_a-CompositionSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 组合部件继承组合规范身份，并以在某拓扑版本中的局部位置、端口和职责为种差。
    en: CompositionPart inherits composition-specification identity and is distinguished by local position, ports, and responsibility in one topology revision.
    ja: CompositionPart は specification identity を継承し topology revision 内の local position・ports・responsibility を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-composition-part-design
    - claim-composition-part-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-composition-part-langgraph
    source: langgraph
    supports: Graph nodes occupy static positions in orchestration topology.
    locator: Graph API nodes and edges
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-anthropic
    source: anthropic-workflows
    supports: Workflow patterns decompose into named structural parts.
    locator: Orchestrator-worker decomposition
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-crewai
    source: crewai
    supports: Task slots in crew topology are structural parts not agent identities.
    locator: Process.sequential/parallel
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-design
    source: composition-design
    supports: CompositionPart genus covers chain, parallel, and section positions.
    locator: CompositionPart boundary
    evidence_kind: design-inference
    confidence: high
