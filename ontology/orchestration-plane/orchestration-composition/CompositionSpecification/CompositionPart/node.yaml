schema: moonweave.ai/ontology-node/v1
id: CompositionPart
kind: concept
labels:
  zh: 组合部件
  en: composition part
  ja: 構成部品
semantics:
  short_definition:
    zh: 在某一拓扑版本中占据可引用位置并承担局部协调职责的结构规范。
    en: A structural specification occupying a referenceable position and carrying a local coordination responsibility in one topology revision.
    ja: 一つの topology revision で参照可能な位置と局所的な協調責務を持つ構造仕様です。
  definition:
    zh: 组合部件是 CompositionSpecification 的子类，以部件标识、所属拓扑、局部职责和连接端口为种差；ChainStage、ParallelBranch 与 SectionAssignment 分别刻画顺序位置、并行位置和分区分派位置。部件是静态结构声明，不是一次执行步骤，也不是执行者。
    en: A CompositionPart is a CompositionSpecification distinguished by part ID, owning topology, local responsibility, and connection ports. ChainStage, ParallelBranch, and SectionAssignment specialize sequential, parallel, and partition-assignment positions. A part is a static structural declaration, not an execution occurrence or actor.
    ja: CompositionPart は part ID・owning topology・local responsibility・connection ports で区別される CompositionSpecification です。ChainStage、ParallelBranch、SectionAssignment は順序・並列・分区割当の位置を特殊化し、実行 occurrence や actor ではありません。
  why_needed:
    zh: 把部件作为规范分支，可在不混淆执行状态的前提下回答拓扑由哪些位置组成、每个位置接受什么输入。
    en: Treating parts as specifications answers which positions compose a topology and what each position accepts without mixing in execution state.
    ja: part を specification として、execution state を混ぜず topology の位置と受入入力を説明できます。
  includes:
    - zh: 有稳定部件标识、拓扑归属、端口契约和局部职责的阶段、分支与分区分派。
      en: Stages, branches, and section assignments with stable part identity, topology membership, port contracts, and local responsibility.
      ja: stable part identity・topology membership・port contract・local responsibility を持つ stage、branch、section assignment。
  excludes:
    - zh: 已经开始或结束的步骤尝试、Agent 角色、消息、工具调用以及只描述一般控制形态的模式。
      en: Started or ended step attempts, agent roles, messages, tool calls, and patterns that only describe a general control shape.
      ja: 開始済み step attempt、agent role、message、tool call、一般 control shape の pattern。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      CompositionPart 编译为 LangGraph 具名节点或 Send 目标，以及拓扑中的静态 slot：topology_ref 与
      connection_ports 定义输入输出契约，local_role 说明职责。一次 invoke 轨迹引用 part revision，但不把
      运行状态写入 part 规范。
    en: >-
      A CompositionPart compiles to a LangGraph named node or Send target and a static topology slot: topology_ref and
      connection_ports define IO contracts while local_role states duty. A run trace references a part revision but does
      not store runtime state in the part specification.
    ja: >-
      CompositionPart は LangGraph named node または Send target と topology 内 static slot にコンパイルされる。
      topology_ref/connection_ports が IO contract、local_role が duty を示す。run trace は part revision を参照するが
      runtime state を part spec に書き込まない。
  typical_input:
    - description:
        zh: 拓扑版本中对部件位置、角色与端口绑定的声明。
        en: Topology revision declaration of part placement, role, and port bindings.
        ja: topology revision における part placement/role/port binding 宣言。
      format: |-
        {"composition_part_id":"section-finance","revision":"4","topology_ref":"report-topology@4","local_role":"draft finance section","connection_ports":{"inputs":[{"name":"finance-evidence","contract_ref":"finance-evidence-set@2"}],"outputs":[{"name":"section-draft","contract_ref":"section-draft@3"}]}}
  typical_output:
    - description:
        zh: 图编译器生成的节点绑定与端口校验结果。
        en: Node binding and port validation result from the graph compiler.
        ja: graph compiler が生成する node binding と port validation result。
      format: |-
        {"part_ref":"section-finance@4","compiled":{"adapter":"langgraph","node_name":"section_finance","validated_ports":["finance-evidence","section-draft"]}}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents named nodes, edges, and Send targets in compiled graphs.
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker decomposition into specialist parts.
  source_claims:
    - claim-composition-part-001
    - claim-composition-part-002
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      allowed_values: []
      pattern: null
      example_value: report-topology@4
      source_claims:
        - claim-composition-part-001
        - claim-composition-part-003
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      allowed_values: []
      pattern: null
      example_value: draft finance section
      source_claims:
        - claim-composition-part-002
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别列出该结构位置可接收和可产生的命名端口及其数据契约；端口只描述拓扑兼容性，不表示某次运行已经传输数据。
        en: Lists the named input and output ports of this structural position together with their data-contract references. Ports describe topology compatibility and do not assert that a run transferred data.
        ja: この構造位置の named input/output port と data-contract reference を列挙します。port は topology compatibility を記述し、run が data を転送済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value:
        inputs:
          - name: finance-evidence
            contract_ref: finance-evidence-set@2
        outputs:
          - name: section-draft
            contract_ref: section-draft@3
      source_claims:
        - claim-composition-part-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionPart-example-positive-manual-20260716
    labels:
      zh: CompositionPart positive
      en: CompositionPart positive
      ja: CompositionPart positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionPart 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionPart programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionPart: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_specification_id: section-finance, version: 4, valid_from: 2026-07-16T00:00:00Z, topology_ref: "report-topology@4", local_role: "draft finance section"}

    related_node_ids:
      - CompositionPart
      - OrchestrationTopology
    related_relation_ids:
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-002

  - id: CompositionPart-example-boundary-manual-20260716
    labels:
      zh: CompositionPart boundary
      en: CompositionPart boundary
      ja: CompositionPart boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 CompositionPart 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not CompositionPart static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で CompositionPart 静的 RetryPolicy ではない。
    field_values: {}

    related_node_ids:
      - CompositionPart
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-003

  - id: CompositionPart-example-counterexample-manual-20260719
    labels:
      zh: CompositionPart counterexample
      en: CompositionPart counterexample
      ja: CompositionPart counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 CompositionPart TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style CompositionPart TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 CompositionPart ではない。
    field_values: {composition_specification_id: absent, topology_ref: absent, local_role: absent, connection_ports: absent, native_node_name: section_finance, compiled_adapter: langgraph}

    related_node_ids:
      - CompositionPart
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-004

  - id: CompositionPart-example-instance-manual-20260719
    labels:
      zh: CompositionPart instance
      en: CompositionPart instance
      ja: CompositionPart instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 CompositionPart。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to CompositionPart.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が CompositionPart に写像。
    field_values: {composition_specification_id: section-finance, version: 4, valid_from: 2026-07-16T00:00:00Z, topology_ref: "report-topology@4", local_role: "draft finance section"}

    related_node_ids:
      - CompositionPart
      - OrchestrationTopology
      - ChainStage
    related_relation_ids:
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-002

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents static graph nodes and edges compiled from topology declarations.
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents decomposing work into reusable specialist stages bound to graph nodes.
source_claims:
  - id: claim-composition-part-001
    source: langgraph-graph-api
    supports: Composition parts are static structural slots with topology revision, position, and ports rather than runtime attempts.
    locator: Graph API nodes and topology compilation
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-002
    source: langgraph-workflows-agents
    supports: Connection ports declare typed input and output contracts for a part within a topology revision.
    locator: Workflows and agents, specialist stages
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-003
    source: langgraph-graph-api
    supports: A timed execution attempt referencing a part is an activity occurrence, not the part specification itself.
    locator: Graph API invoke versus graph definition
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-part-004
    source: langgraph-workflows-agents
    supports: Local role text describes duty within a topology without naming the current bearer actor.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
