schema: moonweave.ai/ontology-node/v1
id: CompositionPart
kind: concept
status: review
labels:
  zh: 组合部件
  en: composition part
  ja: 構成部品
semantics:
  short_definition:
    zh: 在某一拓扑版本中占据可引用位置并承担局部协调职责的结构规范。
    en: A structural specification occupying a referenceable position and carrying a local coordination responsibility in one topology revision.
    ja: 一つの topology revision で参照可能な位置と局所的な協調責務を持つ構造仕様です。
  definition:
    zh: 组合部件是 CompositionSpecification 的子类，以部件标识、所属拓扑、局部职责和连接端口为种差；ChainStage、ParallelBranch 与 SectionAssignment 分别刻画顺序位置、并行位置和分区分派位置。部件是静态结构声明，不是一次执行步骤，也不是执行者。
    en: A CompositionPart is a CompositionSpecification distinguished by part ID, owning topology, local responsibility, and connection ports. ChainStage, ParallelBranch, and SectionAssignment specialize sequential, parallel, and partition-assignment positions. A part is a static structural declaration, not an execution occurrence or actor.
    ja: CompositionPart は part ID・owning topology・local responsibility・connection ports で区別される CompositionSpecification です。ChainStage、ParallelBranch、SectionAssignment は順序・並列・分区割当の位置を特殊化し、実行 occurrence や actor ではありません。
  why_needed:
    zh: 把部件作为规范分支，可在不混淆执行状态的前提下回答拓扑由哪些位置组成、每个位置接受什么输入。
    en: Treating parts as specifications answers which positions compose a topology and what each position accepts without mixing in execution state.
    ja: part を specification として、execution state を混ぜず topology の位置と受入入力を説明できます。
  includes:
    - zh: 有稳定部件标识、拓扑归属、端口契约和局部职责的阶段、分支与分区分派。
      en: Stages, branches, and section assignments with stable part identity, topology membership, port contracts, and local responsibility.
      ja: stable part identity・topology membership・port contract・local responsibility を持つ stage、branch、section assignment。
  excludes:
    - zh: 已经开始或结束的步骤尝试、Agent 角色、消息、工具调用以及只描述一般控制形态的模式。
      en: Started or ended step attempts, agent roles, messages, tool calls, and patterns that only describe a general control shape.
      ja: 開始済み step attempt、agent role、message、tool call、一般 control shape の pattern。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      allowed_values: []
      pattern: null
      example_value: report-topology@4
      source_claims:
        - claim-composition-part-001
        - claim-composition-part-003
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      allowed_values: []
      pattern: null
      example_value: draft finance section
      source_claims:
        - claim-composition-part-002
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分别列出该结构位置可接收和可产生的命名端口及其数据契约；端口只描述拓扑兼容性，不表示某次运行已经传输数据。
        en: Lists the named input and output ports of this structural position together with their data-contract references. Ports describe topology compatibility and do not assert that a run transferred data.
        ja: この構造位置の named input/output port と data-contract reference を列挙します。port は topology compatibility を記述し、run が data を転送済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value:
        inputs:
          - name: finance-evidence
            contract_ref: finance-evidence-set@2
        outputs:
          - name: section-draft
            contract_ref: section-draft@3
      source_claims:
        - claim-composition-part-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionPart-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 财务章节部件
      en: Finance-section part
      ja: 財務 section part
    scenario_id: null
    descriptions:
      zh: section-finance 属于 report-topology@4，职责是接收财务证据并产生章节草稿，端口契约固定在该拓扑版本中。
      en: section-finance belongs to report-topology@4, receives finance evidence, and produces a section draft under ports fixed by that revision.
      ja: section-finance は report-topology@4 に属し finance evidence を受け section draft を生成する固定 port を持ちます。
    field_values:
      composition_specification_id: section-finance
      version: "4"
      valid_from: 2026-07-16T00:00:00Z
      topology_ref: report-topology@4
      local_role: draft finance section
      connection_ports:
        inputs:
          - name: finance-evidence
            contract_ref: finance-evidence-set@2
        outputs:
          - name: section-draft
            contract_ref: section-draft@3
    related_node_ids:
      - CompositionPart
      - OrchestrationTopology
    related_relation_ids:
      - OrchestrationTopology-contains-CompositionPart
    expected_result:
      zh: 作为拓扑内可引用结构部件保存，而不创建运行记录。
      en: Store it as a referenceable structural part without creating a run record.
      ja: 参照可能な topology part として保存し run record は作りません。
    why_valid_or_invalid:
      zh: 其身份由拓扑版本、位置和端口决定，并无开始时间或运行状态。
      en: Its identity comes from topology revision, position, and ports, with no start time or runtime status.
      ja: identity は topology revision・position・ports で決まり start time/status を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-002
  - id: CompositionPart-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 章节执行尝试
      en: Section execution attempt
      ja: section 実行試行
    scenario_id: composition-review-compositionpart-boundary
    descriptions:
      zh: attempt-91 在 04:20 执行 section-finance，记录 started、failed 和错误；它引用部件但身份由尝试时间与状态决定。
      en: attempt-91 executes section-finance at 04:20 and records started, failed, and an error; it references the part but is identified by attempt time and state.
      ja: attempt-91 は 04:20 section-finance を実行し started・failed・error を記録し、part を参照しますが attempt time/state で識別されます。
    field_values: {}
    related_node_ids:
      - CompositionPart
      - CompositionActivity
    related_relation_ids: []
    expected_result:
      zh: 保留为运行尝试或活动，不把它归为 CompositionPart。
      en: Keep it as a runtime attempt or activity rather than classifying it as CompositionPart.
      ja: runtime attempt/activity とし CompositionPart に分類しません。
    why_valid_or_invalid:
      zh: 引用静态位置不使一次有时间状态的执行成为该位置本身。
      en: Referencing a static position does not make a time-bounded execution the position itself.
      ja: static position の参照だけで time-bounded execution が part 自体にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-part-001
      - claim-composition-part-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: CompositionPattern
    shared_parent_concept_id: CompositionSpecification
    differentia:
      zh: 已审查兄弟区分：父节点 CompositionSpecification：CompositionPart（semantic kind=specification，骨架 CompositionPart-is_a-CompositionSpecification）；CompositionPattern（semantic kind=specification，骨架 CompositionPattern-is_a-CompositionSpecification）。双端条件：CompositionPart 条件：“在某一拓扑版本中占据可引用位置并承担局部协调职责的结构规范”；CompositionPattern 条件：“规定协作控制形态与部件协调规则的组合规范”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent CompositionSpecification: CompositionPart (semantic kind=specification, backbone CompositionPart-is_a-CompositionSpecification); CompositionPattern (semantic kind=specification, backbone CompositionPattern-is_a-CompositionSpecification). Endpoint conditions: CompositionPart condition: “A structural specification occupying a referenceable position and carrying a local coordination responsibility in one topology revision”; CompositionPattern condition: “A composition specification defining collaboration control shape and part-coordination rules”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 CompositionSpecification：CompositionPart（semantic kind=specification、バックボーン CompositionPart-is_a-CompositionSpecification）；CompositionPattern（semantic kind=specification、バックボーン CompositionPattern-is_a-CompositionSpecification）。両端条件：CompositionPart の条件：「一つの topology revision で参照可能な位置と局所的な協調責務を持つ構造仕様です」；CompositionPattern の条件：「collaboration control shape と part-coordination rule を定義する composition specification」。一方の成立は他方を証明しません。
    source_claims:
      - claim-composition-part-005
parent_relation:
