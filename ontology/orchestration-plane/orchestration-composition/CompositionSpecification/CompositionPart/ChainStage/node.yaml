schema: moonweave.ai/ontology-node/v1
id: ChainStage
kind: concept
labels:
  zh: 链式阶段
  en: chain stage
  ja: 連鎖段階
semantics:
  short_definition:
    zh: 在提示链中具有固定序位、输入契约和输出契约的组合部件。
    en: A composition part with fixed ordinal, input contract, and output contract inside a prompt chain.
    ja: prompt chain 内で fixed ordinal・input contract・output contract を持つ composition part です。
  definition:
    zh: 链式阶段是 CompositionPart 的子类，以阶段标识、所属 PromptChain、序位、输入输出契约和继续条件为种差。同一阶段规范可在多次运行中被执行；它不是阶段提示文本，也不是某次调用尝试。
    en: A ChainStage is a CompositionPart distinguished by stage ID, owning PromptChain, ordinal, input and output contracts, and continuation condition. The same stage specification may be executed in many runs; it is neither stage prompt text nor one call attempt.
    ja: ChainStage は stage ID・owning PromptChain・ordinal・I/O contracts・continuation condition で区別される CompositionPart です。複数 run で実行でき、prompt text や one call attempt ではありません。
  why_needed:
    zh: 阶段节点让链的真实中间层可见，可检查顺序、漏级与契约衔接，而不是让“草拟、复核、修订”直接平挂在模块下。
    en: Stage nodes expose the chain's real intermediate layer for order, missing-level, and contract checks instead of hanging draft, review, and revise directly under the module.
    ja: stage nodes により chain の中間層を可視化し order・missing level・contract handoff を検査します。
  includes:
    - zh: 草拟阶段、验证阶段、修订阶段、抽取阶段等有稳定序位和契约的位置。
      en: Draft, validation, revision, and extraction positions with stable ordinals and contracts.
      ja: stable ordinal/contract を持つ draft・validation・revision・extraction position。
  excludes:
    - zh: 阶段中使用的 Prompt、阶段执行尝试、并行分支、任务目标和输出文档。
      en: Prompts used by a stage, stage attempts, parallel branches, task goals, and output documents.
      ja: stage Prompt・stage attempt・parallel branch・task goal・output document。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      ChainStage 是 PromptChain 拓扑中的有序阶段 slot，以 stage_ordinal 与 connection_ports 绑定 LangGraph
      顺序节点。一次 invoke 引用 part revision，运行状态写入 CompositionActivity 而非 part 规范。
    en: >-
      ChainStage is an ordered stage slot in a PromptChain topology, binding stage_ordinal and connection_ports to
      LangGraph sequential nodes. An invoke references a part revision while runtime state belongs to
      CompositionActivity, not the part specification.
    ja: >-
      ChainStage は PromptChain topology 内の ordered stage slot で stage_ordinal/connection_ports を LangGraph
      sequential node に bind する。
  typical_input:
    - description:
        zh: 拓扑 revision 中 chain stage 的位置、序号与端口声明。
        en: Chain stage placement, ordinal, and port declaration in a topology revision.
        ja: topology revision における chain stage placement/ordinal/port 宣言。
      format: |-
        {"composition_part_id":"review-stage","revision":"2","stage_ordinal":2,"topology_ref":"draft-review-revise-topology@1","connection_ports":{"inputs":[{"name":"draft","contract_ref":"draft@2"}],"outputs":[{"name":"reviewed","contract_ref":"reviewed@1"}]}}
  typical_output:
    - description:
        zh: 编译器生成的顺序节点绑定。
        en: Sequential node binding from the compiler.
        ja: compiler が生成する sequential node binding。
      format: |-
        {"part_ref":"review-stage@2","compiled_node":"review","stage_ordinal":2}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents ordered prompt-chain stages as graph nodes.
  source_claims:
    - claim-chain-stage-hierarchy
    - claim-chain-stage-001
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      example_value: draft-review-revise@3
      source_claims:
        - claim-chain-stage-hierarchy
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      example_value: review a draft before revision
      source_claims:
        - claim-chain-stage-hierarchy
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该结构位置可接收和可产生的命名端口及其数据契约。
        en: Lists named input and output ports and their data-contract references.
        ja: named input/output port と data-contract reference を列挙します。
      example_value:
        inputs:
          - name: draft
            contract_ref: draft-schema@2
        outputs:
          - name: review-verdict
            contract_ref: review-input@1
      source_claims:
        - claim-chain-stage-hierarchy
    - id: ordinal
      labels:
        zh: 阶段序位
        en: stage ordinal
        ja: 段階順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定阶段在链中的严格顺序。
        en: Specifies the stage's strict order in the chain.
        ja: chain 内の strict order を指定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-chain-stage-001
    - id: handoff_contract
      labels:
        zh: 交接契约
        en: handoff contract
        ja: handoff contract
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定前一阶段输出与本阶段输入之间的验证要求。
        en: Fixes validation requirements between previous output and this input.
        ja: previous output と current input 間の validation requirements を固定します。
      allowed_values: []
      pattern: null
      example_value: draft-schema@2 -> review-input@1
      source_claims:
        - claim-chain-stage-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChainStage-example-positive-manual-20260716
    labels:
      zh: ChainStage positive
      en: ChainStage positive
      ja: ChainStage positive
    descriptions:
      zh: Chain-of-Thought (Wei et al., 2022) 用 "Let's think step by step" 触发 ChainStage 多步推理：模型逐步展开中间推理链再给出结论，在 GSM8K 等数学推理基准显著提升准确率；可作为 TaskPlan 内纯推理步骤的 action_spec。
      en: Chain-of-Thought (Wei et al., 2022) triggers multi-step reasoning for ChainStage via "Let's think step by step": model expands intermediate reasoning before conclusion, boosting GSM8K accuracy; usable as pure-reasoning action_spec in TaskPlan.
      ja: CoT (Wei et al., 2022) "Let's think step by step" が ChainStage 多段推論を誘発；GSM8K 精度向上。
    field_values: {composition_part_id: review-stage, topology_ref: "draft-review-revise@3", local_role: "review a draft before revision", ordinal: 2, handoff_contract: "draft-schema@2 -> review-input@1"}

    related_node_ids:
      - ChainStage
      - PromptChain
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    source_claims:
      - claim-chain-stage-001
      - claim-chain-stage-002

  - id: ChainStage-example-boundary-manual-20260716
    labels:
      zh: ChainStage boundary
      en: ChainStage boundary
      ja: ChainStage boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 ChainStage 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not ChainStage static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で ChainStage 静的 spec ではない。
    field_values: {}

    related_node_ids:
      - ChainStage
    related_relation_ids: []
    source_claims:
      - claim-chain-stage-002
      - claim-chain-stage-003

  - id: ChainStage-example-counterexample-manual-20260719
    labels:
      zh: ChainStage counterexample
      en: ChainStage counterexample
      ja: ChainStage counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 ChainStage PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style ChainStage PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 ChainStage ではない。
    field_values: {composition_part_id: absent, topology_ref: absent, ordinal: absent, handoff_contract: absent, native_node_name: review}

    related_node_ids:
      - ChainStage
      - PromptChain
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-chain-stage-001
      - claim-chain-stage-003

  - id: ChainStage-example-instance-manual-20260719
    labels:
      zh: ChainStage instance
      en: ChainStage instance
      ja: ChainStage instance
    descriptions:
      zh: CoT 实例 prompt："Q: Roger has 5 tennis balls... A: Let's think step by step." → 逐步算术推理 → 映射 ChainStage。
      en: CoT instance: "Q: Roger has 5 tennis balls... A: Let's think step by step." → stepwise arithmetic → maps to ChainStage.
      ja: CoT 实例 step-by-step 算術推論が ChainStage に写像。
    field_values: {topology_ref: "draft-review-revise@3", local_role: "review a draft before revision"}

    related_node_ids:
      - ChainStage
      - CompositionPart
    related_relation_ids:
      - ChainStage-is_a-CompositionPart
    source_claims:
      - claim-chain-stage-hierarchy

parent_relation:
  id: ChainStage-is_a-CompositionPart
  predicate: is_a
  target: concept:CompositionPart
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合部件
    en: is a composition part
    ja: 構成部品である
  definition:
    zh: ChainStage 继承 CompositionPart 的静态结构位置角色，并特化为提示链中的有序阶段。
    en: ChainStage inherits CompositionPart's static structural position role and specializes it as an ordered stage in a prompt chain.
    ja: ChainStage は CompositionPart の static structural position 役割を継承し prompt chain 内 ordered stage として特化します。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_chain_stage
    labels:
      zh: 具有链式阶段
      en: has chain stage
      ja: 連鎖段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy; not a LangGraph Node subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-chain-stage-hierarchy
  distinct_fact_rationale:
    zh: 层级说明链式阶段是一种组合部件；它不说明某次运行是否执行了该阶段。
    en: The hierarchy says a chain stage is a composition part; it does not state whether a run executed the stage.
    ja: 階層は chain stage が composition part であることを示し、run が stage を実行したかは示しません。
sources:
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents prompt chaining as an ordered workflow pattern with explicit stage handoffs.
