schema: moonweave.ai/ontology-node/v1
id: ChainStage
kind: concept
labels:
  zh: 链式阶段
  en: chain stage
  ja: 連鎖段階
semantics:
  short_definition:
    zh: 在提示链中具有固定序位、输入契约和输出契约的组合部件。
    en: A composition part with fixed ordinal, input contract, and output contract inside a prompt chain.
    ja: prompt chain 内で fixed ordinal・input contract・output contract を持つ composition part です。
  definition:
    zh: 链式阶段是 CompositionPart 的子类，以阶段标识、所属 PromptChain、序位、输入输出契约和继续条件为种差。同一阶段规范可在多次运行中被执行；它不是阶段提示文本，也不是某次调用尝试。
    en: A ChainStage is a CompositionPart distinguished by stage ID, owning PromptChain, ordinal, input and output contracts, and continuation condition. The same stage specification may be executed in many runs; it is neither stage prompt text nor one call attempt.
    ja: ChainStage は stage ID・owning PromptChain・ordinal・I/O contracts・continuation condition で区別される CompositionPart です。複数 run で実行でき、prompt text や one call attempt ではありません。
  why_needed:
    zh: 阶段节点让链的真实中间层可见，可检查顺序、漏级与契约衔接，而不是让“草拟、复核、修订”直接平挂在模块下。
    en: Stage nodes expose the chain's real intermediate layer for order, missing-level, and contract checks instead of hanging draft, review, and revise directly under the module.
    ja: stage nodes により chain の中間層を可視化し order・missing level・contract handoff を検査します。
  includes:
    - zh: 草拟阶段、验证阶段、修订阶段、抽取阶段等有稳定序位和契约的位置。
      en: Draft, validation, revision, and extraction positions with stable ordinals and contracts.
      ja: stable ordinal/contract を持つ draft・validation・revision・extraction position。
  excludes:
    - zh: 阶段中使用的 Prompt、阶段执行尝试、并行分支、任务目标和输出文档。
      en: Prompts used by a stage, stage attempts, parallel branches, task goals, and output documents.
      ja: stage Prompt・stage attempt・parallel branch・task goal・output document。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph 顺序边连接的节点、CrewAI Process.sequential 中的 task 顺序映射为 ChainStage；以 stage_ordinal 与相邻 handoff 契约为身份。
    en: LangGraph sequentially connected nodes and CrewAI Process.sequential task order map to ChainStage identified by stage_ordinal and adjacent handoff contracts.
    ja: LangGraph 順序 edge 接続 node・CrewAI Process.sequential task 順序を stage_ordinal と adjacent handoff 契約で ChainStage へ写像します。
  typical_input:
    - description: Sequential LangGraph edges.
      format: builder.add_edge("draft", "review"); builder.add_edge("review", "revise")
      source_claims:
        - claim-chain-stage-design
  typical_output:
    - description: Moonweave ChainStage with ordinal.
      format: '{"stage_id": "review-stage", "stage_ordinal": 2, "handoff_contract_ref": "draft-to-review@3"}'
      source_claims:
        - claim-chain-stage-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: ordinal
      labels:
        zh: 阶段序位
        en: stage ordinal
        ja: 段階順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定阶段在链中的严格顺序。
        en: Specifies the stage's strict order in the chain.
        ja: chain 内の strict order を指定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-chain-stage-design
    - id: handoff_contract
      labels:
        zh: 交接契约
        en: handoff contract
        ja: handoff contract
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定前一阶段输出与本阶段输入之间的验证要求。
        en: Fixes validation requirements between previous output and this input.
        ja: previous output と current input 間の validation requirements を固定します。
      allowed_values: []
      pattern: null
      example_value: draft-schema@2 -> review-input@1
      source_claims:
        - claim-chain-stage-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChainStage-langgraph-sequential
    labels:
      zh: LangGraph 顺序阶段
      en: LangGraph sequential stage
      ja: LangGraph 順序 stage
    descriptions:
      zh: review-stage ordinal=2 接收 draft-stage 输出并传递给 revise-stage。
      en: review-stage ordinal=2 receives draft-stage output and passes to revise-stage.
      ja: review-stage ordinal=2 が draft-stage 出力を受け revise-stage へ渡す。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: sequential edges
    field_values:
      stage_id: review-stage
      stage_ordinal: 2
    related_node_ids:
      - ChainStage
      - PromptChain
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    source_claims:
      - claim-chain-stage-langgraph
      - claim-chain-stage-design
  - id: ChainStage-crewai-sequential
    labels:
      zh: CrewAI 顺序任务阶段
      en: CrewAI sequential task stage
      ja: CrewAI 順序 task stage
    descriptions:
      zh: write_task 在 research_task 之后执行，构成 PromptChain 的 ChainStage。
      en: write_task executes after research_task forming a ChainStage in PromptChain.
      ja: write_task が research_task 後に実行され PromptChain の ChainStage を構成。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.sequential
    field_values:
      stage_id: write-stage
      stage_ordinal: 2
    related_node_ids:
      - ChainStage
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-chain-stage-crewai
      - claim-chain-stage-design
  - id: ChainStage-boundary-prompt-text
    labels:
      zh: 提示文本不是阶段
      en: Prompt text is not stage
      ja: prompt text は stage ではない
    descriptions:
      zh: review-prompt 是 stage 使用的文本，不在链的结构阶段清单中。
      en: review-prompt is text used by a stage absent from the chain structural stage inventory.
      ja: review-prompt は stage が使う text で structural stage inventory にありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: structure versus content
    field_values: {}
    related_node_ids:
      - ChainStage
      - PromptChain
    related_relation_ids: []
    source_claims:
      - claim-chain-stage-design
parent_relation:
  id: ChainStage-is_a-CompositionPart
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 链式阶段继承组合部件身份，并以所属链、严格序位、输入输出契约和继续条件为种差。
    en: ChainStage inherits composition-part identity and is distinguished by owning chain, strict ordinal, input/output contracts, and continuation condition.
    ja: ChainStage は part identity を継承し owning chain・ordinal・I/O contracts・continuation condition を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-chain-stage-design
    - claim-chain-stage-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
