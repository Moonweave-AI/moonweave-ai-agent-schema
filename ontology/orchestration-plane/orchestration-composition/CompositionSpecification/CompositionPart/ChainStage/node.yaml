        en: The record retains CompositionPart identity and satisfies the complete ChainStage differentia.
        ja: record は CompositionPart identity を保持し ChainStage differentia を完全に満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
