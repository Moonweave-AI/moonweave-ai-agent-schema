schema: moonweave.ai/ontology-node/v1
id: ChainStage
kind: concept
status: review
labels:
  zh: 链式阶段
  en: chain stage
  ja: 連鎖段階
semantics:
  short_definition:
    zh: 在提示链中具有固定序位、输入契约和输出契约的组合部件。
    en: A composition part with fixed ordinal, input contract, and output contract inside a prompt chain.
    ja: prompt chain 内で fixed ordinal・input contract・output contract を持つ composition part です。
  definition:
    zh: 链式阶段是 CompositionPart 的子类，以阶段标识、所属 PromptChain、序位、输入输出契约和继续条件为种差。同一阶段规范可在多次运行中被执行；它不是阶段提示文本，也不是某次调用尝试。
    en: A ChainStage is a CompositionPart distinguished by stage ID, owning PromptChain, ordinal, input and output contracts, and continuation condition. The same stage specification may be executed in many runs; it is neither stage prompt text nor one call attempt.
    ja: ChainStage は stage ID・owning PromptChain・ordinal・I/O contracts・continuation condition で区別される CompositionPart です。複数 run で実行でき、prompt text や one call attempt ではありません。
  why_needed:
    zh: 阶段节点让链的真实中间层可见，可检查顺序、漏级与契约衔接，而不是让“草拟、复核、修订”直接平挂在模块下。
    en: Stage nodes expose the chain's real intermediate layer for order, missing-level, and contract checks instead of hanging draft, review, and revise directly under the module.
    ja: stage nodes により chain の中間層を可視化し order・missing level・contract handoff を検査します。
  includes:
    - zh: 草拟阶段、验证阶段、修订阶段、抽取阶段等有稳定序位和契约的位置。
      en: Draft, validation, revision, and extraction positions with stable ordinals and contracts.
      ja: stable ordinal/contract を持つ draft・validation・revision・extraction position。
  excludes:
    - zh: 阶段中使用的 Prompt、阶段执行尝试、并行分支、任务目标和输出文档。
      en: Prompts used by a stage, stage attempts, parallel branches, task goals, and output documents.
      ja: stage Prompt・stage attempt・parallel branch・task goal・output document。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: ordinal
      labels:
        zh: 阶段序位
        en: stage ordinal
        ja: 段階順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定阶段在链中的严格顺序。
        en: Specifies the stage's strict order in the chain.
        ja: chain 内の strict order を指定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-chain-stage-001
    - id: handoff_contract
      labels:
        zh: 交接契约
        en: handoff contract
        ja: handoff contract
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定前一阶段输出与本阶段输入之间的验证要求。
        en: Fixes validation requirements between previous output and this input.
        ja: previous output と current input 間の validation requirements を固定します。
      allowed_values: []
      pattern: null
      example_value: draft-schema@2 -> review-input@1
      source_claims:
        - claim-chain-stage-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChainStage-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 复核阶段
      en: Review stage
      ja: review stage
    scenario_id: null
    descriptions:
      zh: review-stage 是 draft-review-revise@3 的第 2 阶段，只接受 draft-schema@2，输出带结论的 review-input@1。
      en: review-stage is ordinal two in draft-review-revise@3, accepts only draft-schema@2, and emits a verdict-bearing review-input@1.
      ja: review-stage は chain の ordinal 2 で draft-schema@2 のみ受け verdict-bearing output を出します。
    field_values:
      composition_specification_id: review-stage
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      topology_ref: draft-review-revise@3
      local_role: review a draft before revision
      ordinal: 2
      handoff_contract: draft-schema@2 -> review-input@1
      connection_ports:
        inputs:
          - name: draft
            contract_ref: draft-schema@2
        outputs:
          - name: review-verdict
            contract_ref: review-input@1
    related_node_ids:
      - ChainStage
      - PromptChain
    related_relation_ids:
      - PromptChain-contains_stage-ChainStage
    expected_result:
      zh: 作为链中第二个结构位置返回，并验证前后契约。
      en: Return it as the second structural position and validate adjacent contracts.
      ja: chain の second position として返し adjacent contracts を検証します。
    why_valid_or_invalid:
      zh: 稳定序位、所属链和交接契约共同确定阶段身份。
      en: Stable ordinal, owning chain, and handoff contract jointly determine stage identity.
      ja: ordinal・owning chain・handoff contract が stage identity を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chain-stage-001
      - claim-chain-stage-002
  - id: ChainStage-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 复核阶段的一次失败调用
      en: One failed call in the review stage
      ja: review stage の failed call
    scenario_id: composition-review-chainstage-boundary
    descriptions:
      zh: call-attempt-88 引用 review-stage，于 10:02 超时并重试；它有运行状态但不改变阶段序位或契约。
      en: call-attempt-88 references review-stage, times out at 10:02, and retries; it has runtime state but does not change stage order or contract.
      ja: call-attempt-88 は review-stage を参照し 10:02 timeout/retry しますが stage order/contract を変えません。
    field_values: {}
    related_node_ids:
      - ChainStage
    related_relation_ids: []
    expected_result:
      zh: 保留为调用尝试，仍只引用同一 ChainStage。
      en: Keep it as a call attempt that references the same ChainStage.
      ja: call attempt として同一 ChainStage を参照します。
    why_valid_or_invalid:
      zh: 发生时间、结果与重试计数是尝试身份，不是静态阶段身份。
      en: Occurrence time, result, and retry count identify an attempt, not a static stage.
      ja: time・result・retry count は attempt identity で static stage identity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chain-stage-002
      - claim-chain-stage-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ChainStage-is_a-CompositionPart
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 链式阶段继承组合部件身份，并以所属链、严格序位、输入输出契约和继续条件为种差。
    en: ChainStage inherits composition-part identity and is distinguished by owning chain, strict ordinal, input/output contracts, and continuation condition.
    ja: ChainStage は part identity を継承し owning chain・ordinal・I/O contracts・continuation condition を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ChainStage-is_a-CompositionPart-example-positive-manual-20260716
      kind: positive
      labels:
        zh: ChainStage 的有效分类
        en: Valid ChainStage classification
        ja: ChainStage の valid classification
      scenario_id: composition-relation-chainstage-is_a-compositionpart-positive
      descriptions:
        zh: review-stage 是 chain revision 3 的第二位置，具有 draft 到 review-result 的交接契约。
        en: review-stage is position two of chain revision three with a draft-to-review-result handoff contract.
        ja: review-stage は chain revision 3 の ordinal two と handoff contract を持ちます。
      field_values: {}
      related_node_ids:
        - ChainStage
        - CompositionPart
      related_relation_ids:
        - ChainStage-is_a-CompositionPart
      expected_result:
        zh: 查询同时返回 CompositionPart 上位类型与 ChainStage 下位类型。
        en: The query returns the CompositionPart genus and the ChainStage subtype together.
        ja: query は CompositionPart genus と ChainStage subtype をともに返します。
      why_valid_or_invalid:
