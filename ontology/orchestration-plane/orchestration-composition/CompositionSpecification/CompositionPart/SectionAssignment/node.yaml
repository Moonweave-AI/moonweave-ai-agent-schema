schema: moonweave.ai/ontology-node/v1
id: SectionAssignment
kind: concept
labels:
  zh: 分区分派
  en: section assignment
  ja: 分区割当
semantics:
  short_definition:
    zh: 把一个有边界的分区范围与承担条件、交付契约和合并键绑定的组合部件。
    en: A composition part binding a bounded section scope to eligibility, deliverable contract, and merge key.
    ja: bounded section scope を eligibility・deliverable contract・merge key と結ぶ composition part です。
  definition:
    zh: 分区分派是 CompositionPart 的子类，以分派标识、所属 Sectioning、分区范围、承担者选择条件、交付契约和 merge key 为种差。它声明拓扑位置及责任条件，不等于实际被选中的 Agent，也不包含章节正文。
    en: A SectionAssignment is a CompositionPart distinguished by assignment ID, owning Sectioning, section scope, assignee-selection condition, deliverable contract, and merge key. It declares a topology position and responsibility conditions; it is neither the selected Agent nor the section body.
    ja: SectionAssignment は assignment ID・owning Sectioning・section scope・assignee condition・deliverable contract・merge key で区別される CompositionPart で selected Agent や section body ではありません。
  why_needed:
    zh: 在 Sectioning 与具体章节之间增加分派层，才能表达“如何切分、谁可承担、交付什么”，避免三个章节名称直接平挂。
    en: An assignment layer between Sectioning and section content expresses how work is split, who may take it, and what is delivered instead of hanging section names flatly.
    ja: Sectioning と section content 間の assignment layer で split・eligible assignee・deliverable を表し flat labels を避けます。
  includes:
    - zh: 按控制族、地区或数据分片定义范围，并带选择条件及交付契约的结构分派。
      en: Structural assignments with control-family, region, or shard scope plus selection and deliverable conditions.
      ja: control family・region・shard scope と selection/deliverable conditions を持つ structural assignment。
  excludes:
    - zh: 实际 Agent、已完成章节、临时聊天委派、任务实例和无覆盖范围的标签。
      en: Actual agents, completed sections, ad-hoc chat delegation, task instances, and labels without coverage scope.
      ja: actual agent・completed section・ad-hoc delegation・task instance・coverage scope のない label。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      SectionAssignment 把 section 职责绑定到 topology 内 part，含 section_id 与 delivery_contract_ref。
      LangGraph map 阶段按 section_id 路由输入；assignment 是静态规范，不是一次 section 执行尝试。
    en: >-
      SectionAssignment binds section duty to a topology part with section_id and delivery_contract_ref. LangGraph map
      stages route inputs by section_id; an assignment is a static specification, not one section execution attempt.
    ja: >-
      SectionAssignment は section duty を topology part に bind し section_id/delivery_contract_ref を持つ。
  typical_input:
    - description:
        zh: Section assignment part revision 与交付契约声明。
        en: Section assignment part revision and delivery contract declaration.
        ja: section assignment part revision/delivery contract 宣言。
      format: |-
        {"composition_part_id":"section-finance","revision":"3","section_id":"finance","delivery_contract_ref":"section-draft@3","topology_ref":"report-topology@4"}
  typical_output:
    - description:
        zh: 编译后的 section 路由绑定。
        en: Compiled section routing binding.
        ja: compiled section routing binding。
      format: |-
        {"part_ref":"section-finance@3","section_id":"finance","compiled_node":"section_finance"}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker section assignment to specialist stages.
  source_claims:
    - claim-section-assignment-hierarchy
    - claim-section-assignment-001
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      example_value: report-by-control-family@4
      source_claims:
        - claim-section-assignment-hierarchy
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      example_value: review network-control findings and produce the assigned section
      source_claims:
        - claim-section-assignment-hierarchy
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该结构位置可接收和可产生的命名端口及其数据契约。
        en: Lists named input and output ports and their data-contract references.
        ja: named input/output port と data-contract reference を列挙します。
      example_value:
        inputs:
          - name: network-findings
            contract_ref: control-findings@3
        outputs:
          - name: section-draft
            contract_ref: section-schema@3
      source_claims:
        - claim-section-assignment-hierarchy
    - id: section_scope
      labels:
        zh: 分区范围
        en: section scope
        ja: section scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可判定条件描述该位置覆盖的输入集合。
        en: Describes the input set covered by this position with a decidable condition.
        ja: この position が cover する input set を decidable condition で記述します。
      allowed_values: []
      pattern: null
      example_value: control_family = network
      source_claims:
        - claim-section-assignment-001
    - id: assignee_selector
      labels:
        zh: 承担者选择条件
        en: assignee selector
        ja: assignee selector
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明承担者必须具备的能力或资格，不固定某个运行时个体。
        en: Declares required capability or eligibility without fixing one runtime individual.
        ja: required capability/eligibility を宣言し one runtime individual は固定しません。
      allowed_values: []
      pattern: null
      example_value: capability:network-security-review
      source_claims:
        - claim-section-assignment-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SectionAssignment-example-positive-manual-20260716
    labels:
      zh: SectionAssignment positive
      en: SectionAssignment positive
      ja: SectionAssignment positive
    descriptions:
      zh: CrewAI 映射 SectionAssignment：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps SectionAssignment: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI SectionAssignment: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {composition_specification_id: assignment-network-controls, version: 3, valid_from: 2026-07-16T00:00:00Z, topology_ref: "report-by-control-family@4", local_role: "review network-control findings and produce the assigned section", section_scope: "control_family = network", assignee_selector: capability:network-security-review}

    related_node_ids:
      - SectionAssignment
      - Sectioning
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    source_claims:
      - claim-section-assignment-001
      - claim-section-assignment-002

  - id: SectionAssignment-example-boundary-manual-20260716
    labels:
      zh: SectionAssignment boundary
      en: SectionAssignment boundary
      ja: SectionAssignment boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 SectionAssignment 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not SectionAssignment delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で SectionAssignment delegation spec ではない。
    field_values: {}

    related_node_ids:
      - SectionAssignment
      - CompositionOutput
    related_relation_ids: []
    source_claims:
      - claim-section-assignment-003
      - claim-section-assignment-001

  - id: SectionAssignment-example-counterexample-manual-20260719
    labels:
      zh: SectionAssignment counterexample
      en: SectionAssignment counterexample
      ja: SectionAssignment counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 SectionAssignment PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style SectionAssignment PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 SectionAssignment ではない。
    field_values: {composition_specification_id: absent, section_scope: absent, assignee_selector: absent, topology_ref: absent, actor_ref: researcher-7, started_at: 2026-07-16T04:20:00Z}

    related_node_ids:
      - SectionAssignment
      - WorkerRole
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-section-assignment-002
      - claim-section-assignment-003

  - id: SectionAssignment-example-instance-manual-20260719
    labels:
      zh: SectionAssignment instance
      en: SectionAssignment instance
      ja: SectionAssignment instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 SectionAssignment HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to SectionAssignment HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が SectionAssignment HandoffDecision に写像。
    field_values: {topology_ref: "report-by-control-family@4", local_role: "review network-control findings and produce the assigned section"}

    related_node_ids:
      - SectionAssignment
      - CompositionPart
    related_relation_ids:
      - SectionAssignment-is_a-CompositionPart
    source_claims:
      - claim-section-assignment-hierarchy

parent_relation:
  id: SectionAssignment-is_a-CompositionPart
  predicate: is_a
  target: concept:CompositionPart
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合部件
    en: is a composition part
    ja: 構成部品である
  definition:
    zh: SectionAssignment 继承 CompositionPart 的静态结构位置角色，并特化为 orchestrator-worker 分区分派位置。
    en: SectionAssignment inherits CompositionPart's static structural position role and specializes it as an orchestrator-worker partition assignment position.
    ja: SectionAssignment は CompositionPart の static structural position 役割を継承し orchestrator-worker partition assignment position として特化します。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_section_assignment
    labels:
      zh: 具有分区分派
      en: has section assignment
      ja: 分区分派を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy; not an Agent or Worker subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-section-assignment-hierarchy
  distinct_fact_rationale:
    zh: 层级说明分区分派是一种组合部件；它不说明某次运行由谁执行。
    en: The hierarchy says a section assignment is a composition part; it does not state who executed it in a run.
    ja: 階層は section assignment が composition part であることを示し、run の実行者は示しません。
