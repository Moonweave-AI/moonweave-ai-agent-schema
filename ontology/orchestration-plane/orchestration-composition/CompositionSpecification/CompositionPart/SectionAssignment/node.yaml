schema: moonweave.ai/ontology-node/v1
id: SectionAssignment
kind: concept
labels:
  zh: 分区分派
  en: section assignment
  ja: 分区割当
semantics:
  short_definition:
    zh: 把一个有边界的分区范围与承担条件、交付契约和合并键绑定的组合部件。
    en: A composition part binding a bounded section scope to eligibility, deliverable contract, and merge key.
    ja: bounded section scope を eligibility・deliverable contract・merge key と結ぶ composition part です。
  definition:
    zh: 分区分派是 CompositionPart 的子类，以分派标识、所属 Sectioning、分区范围、承担者选择条件、交付契约和 merge key 为种差。它声明拓扑位置及责任条件，不等于实际被选中的 Agent，也不包含章节正文。
    en: A SectionAssignment is a CompositionPart distinguished by assignment ID, owning Sectioning, section scope, assignee-selection condition, deliverable contract, and merge key. It declares a topology position and responsibility conditions; it is neither the selected Agent nor the section body.
    ja: SectionAssignment は assignment ID・owning Sectioning・section scope・assignee condition・deliverable contract・merge key で区別される CompositionPart で selected Agent や section body ではありません。
  why_needed:
    zh: 在 Sectioning 与具体章节之间增加分派层，才能表达“如何切分、谁可承担、交付什么”，避免三个章节名称直接平挂。
    en: An assignment layer between Sectioning and section content expresses how work is split, who may take it, and what is delivered instead of hanging section names flatly.
    ja: Sectioning と section content 間の assignment layer で split・eligible assignee・deliverable を表し flat labels を避けます。
  includes:
    - zh: 按控制族、地区或数据分片定义范围，并带选择条件及交付契约的结构分派。
      en: Structural assignments with control-family, region, or shard scope plus selection and deliverable conditions.
      ja: control family・region・shard scope と selection/deliverable conditions を持つ structural assignment。
  excludes:
    - zh: 实际 Agent、已完成章节、临时聊天委派、任务实例和无覆盖范围的标签。
      en: Actual agents, completed sections, ad-hoc chat delegation, task instances, and labels without coverage scope.
      ja: actual agent・completed section・ad-hoc delegation・task instance・coverage scope のない label。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic orchestrator-worker 分区、LangGraph Send 按 section 派发映射为 SectionAssignment；声明 section_scope 与 deliverable_contract。
    en: Anthropic orchestrator-worker sectioning and LangGraph Send dispatch by section map to SectionAssignment declaring section_scope and deliverable_contract.
    ja: Anthropic orchestrator-worker sectioning・LangGraph Send section 派发を section_scope/deliverable_contract 付き SectionAssignment へ写像します。
  typical_input:
    - description: Orchestrator section dispatch.
      format: 'assignments = [{"section": "methods", "worker": "methods-agent"}, ...]'
      source_claims:
        - claim-section-assignment-design
  typical_output:
    - description: Moonweave SectionAssignment.
      format: '{"assignment_id": "methods-section", "section_scope": "report#methods"}'
      source_claims:
        - claim-section-assignment-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: section_scope
      labels:
        zh: 分区范围
        en: section scope
        ja: section scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可判定条件描述该位置覆盖的输入集合。
        en: Describes the input set covered by this position with a decidable condition.
        ja: この position が cover する input set を decidable condition で記述します。
      allowed_values: []
      pattern: null
      example_value: control_family = network
      source_claims:
        - claim-section-assignment-design
    - id: assignee_selector
      labels:
        zh: 承担者选择条件
        en: assignee selector
        ja: assignee selector
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明承担者必须具备的能力或资格，不固定某个运行时个体。
        en: Declares required capability or eligibility without fixing one runtime individual.
        ja: required capability/eligibility を宣言し one runtime individual は固定しません。
      allowed_values: []
      pattern: null
      example_value: capability:network-security-review
      source_claims:
        - claim-section-assignment-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SectionAssignment-orchestrator-worker
    labels:
      zh: 编排者分区指派
      en: Orchestrator section assignment
      ja: orchestrator section 指派
    descriptions:
      zh: methods-section 指派 methods-agent 独立撰写方法章节。
      en: methods-section assigns methods-agent to write the methods section independently.
      ja: methods-section が methods-agent に methods 章を独立執筆させる。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: orchestrator-worker
    field_values:
      assignment_id: methods-section
      section_scope: report#methods
    related_node_ids:
      - SectionAssignment
      - Sectioning
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    source_claims:
      - claim-section-assignment-anthropic
      - claim-section-assignment-design
  - id: SectionAssignment-langgraph-dispatch
    labels:
      zh: LangGraph 分区派发
      en: LangGraph section dispatch
      ja: LangGraph section 派发
    descriptions:
      zh: orchestrator 节点按 section_id Send 到对应 worker 节点。
      en: Orchestrator node Send-dispatches by section_id to corresponding worker nodes.
      ja: orchestrator ノードが section_id で worker ノードへ Send 派发。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Send by section
    field_values:
      assignment_id: intro-section
    related_node_ids:
      - SectionAssignment
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-section-assignment-langgraph
      - claim-section-assignment-design
  - id: SectionAssignment-boundary-full-doc
    labels:
      zh: 整文档任务不是分区
      en: Full-document task is not sectioning
      ja: 全文 task は sectioning ではない
    descriptions:
      zh: 单 task 生成整篇报告无 section_scope 切分，不是 SectionAssignment。
      en: Single task generating full report without section_scope split is not SectionAssignment.
      ja: section_scope 分割なし単 task 全文生成は SectionAssignment ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: sectioning boundary
    field_values: {}
    related_node_ids:
      - SectionAssignment
      - ChainStage
    related_relation_ids: []
    source_claims:
      - claim-section-assignment-design
parent_relation:
  id: SectionAssignment-is_a-CompositionPart
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 分区分派继承组合部件身份，并以有界分区范围、承担者资格、交付契约和合并键为种差。
    en: SectionAssignment inherits composition-part identity and is distinguished by bounded section scope, assignee eligibility, deliverable contract, and merge key.
    ja: SectionAssignment は part identity を継承し bounded scope・assignee eligibility・deliverable contract・merge key を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-section-assignment-design
    - claim-section-assignment-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
