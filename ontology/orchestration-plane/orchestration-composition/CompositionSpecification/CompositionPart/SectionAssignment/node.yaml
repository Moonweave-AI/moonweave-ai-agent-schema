schema: moonweave.ai/ontology-node/v1
id: SectionAssignment
kind: concept
status: review
labels:
  zh: 分区分派
  en: section assignment
  ja: 分区割当
semantics:
  short_definition:
    zh: 把一个有边界的分区范围与承担条件、交付契约和合并键绑定的组合部件。
    en: A composition part binding a bounded section scope to eligibility, deliverable contract, and merge key.
    ja: bounded section scope を eligibility・deliverable contract・merge key と結ぶ composition part です。
  definition:
    zh: 分区分派是 CompositionPart 的子类，以分派标识、所属 Sectioning、分区范围、承担者选择条件、交付契约和 merge key 为种差。它声明拓扑位置及责任条件，不等于实际被选中的 Agent，也不包含章节正文。
    en: A SectionAssignment is a CompositionPart distinguished by assignment ID, owning Sectioning, section scope, assignee-selection condition, deliverable contract, and merge key. It declares a topology position and responsibility conditions; it is neither the selected Agent nor the section body.
    ja: SectionAssignment は assignment ID・owning Sectioning・section scope・assignee condition・deliverable contract・merge key で区別される CompositionPart で selected Agent や section body ではありません。
  why_needed:
    zh: 在 Sectioning 与具体章节之间增加分派层，才能表达“如何切分、谁可承担、交付什么”，避免三个章节名称直接平挂。
    en: An assignment layer between Sectioning and section content expresses how work is split, who may take it, and what is delivered instead of hanging section names flatly.
    ja: Sectioning と section content 間の assignment layer で split・eligible assignee・deliverable を表し flat labels を避けます。
  includes:
    - zh: 按控制族、地区或数据分片定义范围，并带选择条件及交付契约的结构分派。
      en: Structural assignments with control-family, region, or shard scope plus selection and deliverable conditions.
      ja: control family・region・shard scope と selection/deliverable conditions を持つ structural assignment。
  excludes:
    - zh: 实际 Agent、已完成章节、临时聊天委派、任务实例和无覆盖范围的标签。
      en: Actual agents, completed sections, ad-hoc chat delegation, task instances, and labels without coverage scope.
      ja: actual agent・completed section・ad-hoc delegation・task instance・coverage scope のない label。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: section_scope
      labels:
        zh: 分区范围
        en: section scope
        ja: section scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可判定条件描述该位置覆盖的输入集合。
        en: Describes the input set covered by this position with a decidable condition.
        ja: この position が cover する input set を decidable condition で記述します。
      allowed_values: []
      pattern: null
      example_value: control_family = network
      source_claims:
        - claim-section-assignment-001
    - id: assignee_selector
      labels:
        zh: 承担者选择条件
        en: assignee selector
        ja: assignee selector
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明承担者必须具备的能力或资格，不固定某个运行时个体。
        en: Declares required capability or eligibility without fixing one runtime individual.
        ja: required capability/eligibility を宣言し one runtime individual は固定しません。
      allowed_values: []
      pattern: null
      example_value: capability:network-security-review
      source_claims:
        - claim-section-assignment-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SectionAssignment-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 网络控制分派
      en: Network-controls assignment
      ja: network-controls assignment
    scenario_id: null
    descriptions:
      zh: assignment-network-controls 覆盖 control_family=network 的全部发现，要求 network-security-review 能力并交付 section-schema@3。
      en: assignment-network-controls covers all findings where control_family=network, requires network-security-review capability, and delivers section-schema@3.
      ja: assignment-network-controls は network findings を cover し capability を要求して section-schema@3 を交付します。
    field_values:
      composition_specification_id: assignment-network-controls
      version: "3"
      valid_from: 2026-07-16T00:00:00Z
      topology_ref: report-by-control-family@4
      local_role: review network-control findings and produce the assigned section
      section_scope: control_family = network
      assignee_selector: capability:network-security-review
      connection_ports:
        inputs:
          - name: network-findings
            contract_ref: control-findings@3
        outputs:
          - name: section-draft
            contract_ref: section-schema@3
    related_node_ids:
      - SectionAssignment
      - Sectioning
    related_relation_ids:
      - Sectioning-specifies-SectionAssignment
    expected_result:
      zh: 返回可被运行时分配给合格执行者的结构分派。
      en: Return a structural assignment that runtime may allocate to an eligible actor.
      ja: runtime が eligible actor に割当可能な structural assignment を返します。
    why_valid_or_invalid:
      zh: 范围、资格和交付契约共同确定责任位置，而非某个执行者。
      en: Scope, eligibility, and deliverable contract determine the responsibility position rather than one actor.
      ja: scope・eligibility・deliverable contract が position identity を決め actor ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-section-assignment-001
      - claim-section-assignment-002
  - id: SectionAssignment-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 已生成的网络控制章节
      en: Generated network-controls section
      ja: generated network-controls section
    scenario_id: composition-review-sectionassignment-boundary
    descriptions:
      zh: section-network-17 是 text/markdown 内容，带摘要和产生时间；它由该分派产生但不再是职责规范。
      en: section-network-17 is text/markdown content with digest and production time; it is produced under the assignment but is no longer a responsibility specification.
      ja: section-network-17 は digest/production time を持つ content で assignment の下で生成されますが responsibility spec ではありません。
    field_values: {}
    related_node_ids:
      - SectionAssignment
      - CompositionOutput
    related_relation_ids: []
    expected_result:
      zh: 分类为输出工件，并以 provenance 引用分派。
      en: Classify it as an output artifact and reference the assignment through provenance.
      ja: output artifact とし provenance で assignment を参照します。
    why_valid_or_invalid:
      zh: 固定内容身份与结构责任身份采用不同标识条件。
      en: Fixed content identity and structural responsibility identity use different criteria.
      ja: fixed content identity と structural responsibility identity は異なる criteria を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-section-assignment-003
      - claim-section-assignment-001
