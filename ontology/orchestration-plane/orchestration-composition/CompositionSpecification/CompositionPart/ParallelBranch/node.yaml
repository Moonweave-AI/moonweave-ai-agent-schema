      en: Actor substitutability shows that role identity differs from structural-position identity.
      ja: actor substitutability により role identity と structural position identity が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-parallel-branch-003
      - claim-parallel-branch-001
