schema: moonweave.ai/ontology-node/v1
id: ParallelBranch
kind: concept
labels:
  zh: 并行分支
  en: parallel branch
  ja: 並列分岐
semantics:
  short_definition:
    zh: 在并行模式中具有独立输入范围、局部交付物和汇合键的组合部件。
    en: A composition part with an independent input scope, local deliverable, and join key inside a parallel pattern.
    ja: parallel pattern 内で independent input scope・local deliverable・join key を持つ composition part です。
  definition:
    zh: 并行分支是 CompositionPart 的子类，以分支标识、所属 Parallelization、独立性声明、输入范围、交付契约和 join key 为种差。它描述并行拓扑中的静态位置，不是线程、工作者角色或本次分支运行。
    en: A ParallelBranch is a CompositionPart distinguished by branch ID, owning Parallelization, independence assertion, input scope, deliverable contract, and join key. It is a static position in a parallel topology, not a thread, worker role, or one branch run.
    ja: ParallelBranch は branch ID・owning Parallelization・independence assertion・input scope・deliverable contract・join key で区別され、thread・worker role・one branch run ではありません。
  why_needed:
    zh: 独立分支作为真实下位层，可说明并行模式由哪些职责组成，并防止把工作者、来源或运行尝试误作模式子类。
    en: A true branch layer states which responsibilities compose a parallel pattern and prevents workers, sources, or attempts from becoming pattern subtypes.
    ja: true branch layer で parallel pattern の responsibilities を示し worker/source/attempt の subtype 誤用を防ぎます。
  includes:
    - zh: 法规核验分支、论文核验分支、代码审查分支等可独立完成并在汇合点交付的结构位置。
      en: Regulation, paper, and code-review positions that complete independently and deliver at a join.
      ja: regulation・paper・code-review positions that complete independently and deliver at join。
  excludes:
    - zh: 分支执行者、来源文档、线程、无法独立的下游阶段以及汇合后的综合输出。
      en: Branch actors, source documents, threads, dependent downstream stages, and post-join synthesis output.
      ja: branch actor・source document・thread・dependent downstream stage・post-join output。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      ParallelBranch 声明独立并行分支 slot，编译为 LangGraph 同 superstep 多 destination 或 Send 列表。
      分支独立性必须在规范中声明，不能从运行时调度巧合推断。
    en: >-
      ParallelBranch declares an independent parallel branch slot compiled as LangGraph same-superstep destinations
      or Send lists. Branch independence must be declared in specification and cannot be inferred from scheduling
      coincidence.
    ja: >-
      ParallelBranch は independent parallel branch slot を宣言し LangGraph same-superstep destination または Send list
      にコンパイルされる。
  typical_input:
    - description:
        zh: 并行分支 part revision 与 independence 条件声明。
        en: Parallel branch part revision and independence condition declaration.
        ja: parallel branch part revision/independence condition 宣言。
      format: |-
        {"composition_part_id":"regulation-branch","revision":"1","branch_id":"regulation","independence_condition":"no shared mutable state","connection_ports":{"outputs":[{"name":"findings","contract_ref":"findings@1"}]}}
  typical_output:
    - description:
        zh: 编译后的并行 destination 绑定。
        en: Compiled parallel destination binding.
        ja: compiled parallel destination binding。
      format: |-
        {"part_ref":"regulation-branch@1","compiled_destination":"regulation","parallel_group":"source-review"}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents parallel execution of multiple destinations in one superstep.
  source_claims:
    - claim-parallel-branch-hierarchy
    - claim-parallel-branch-001
structure:
  identity_keys: []
  fields:
    - id: topology_ref
      labels:
        zh: 所属拓扑
        en: topology reference
        ja: 所属 topology
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用定义该部件的不可变 OrchestrationTopology 版本。
        en: References the immutable OrchestrationTopology revision defining this part.
        ja: この部品を定義する immutable OrchestrationTopology revision を参照します。
      example_value: source-review-topology@2
      source_claims:
        - claim-parallel-branch-hierarchy
    - id: local_role
      labels:
        zh: 局部职责
        en: local responsibility
        ja: 局所責務
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该位置在拓扑内接收、变换或汇合什么。
        en: States what this position receives, transforms, or joins in the topology.
        ja: topology 内で何を受け、変換し、join する位置かを示します。
      example_value: retrieve and assess official specifications independently
      source_claims:
        - claim-parallel-branch-hierarchy
    - id: connection_ports
      labels:
        zh: 连接端口契约
        en: connection-port contracts
        ja: 接続 port contract
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该结构位置可接收和可产生的命名端口及其数据契约。
        en: Lists named input and output ports and their data-contract references.
        ja: named input/output port と data-contract reference を列挙します。
      example_value:
        inputs:
          - name: source-review-scope
            contract_ref: official-source-review-scope@2
        outputs:
          - name: evidence-set
            contract_ref: evidence-set/official
      source_claims:
        - claim-parallel-branch-hierarchy
    - id: independence_key
      labels:
        zh: 独立性键
        en: independence key
        ja: 独立性 key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明分支不依赖其他未完成分支的依据。
        en: States why the branch does not depend on unfinished peers.
        ja: unfinished peer に依存しない根拠を示します。
      allowed_values: []
      pattern: null
      example_value: source-family:official-docs
      source_claims:
        - claim-parallel-branch-001
    - id: join_key
      labels:
        zh: 汇合键
        en: join key
        ja: join key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识 fan-in 时匹配该分支交付物的键。
        en: Identifies this branch deliverable at fan-in.
        ja: fan-in で branch deliverable を対応付ける key です。
      allowed_values: []
      pattern: null
      example_value: evidence-set/official
      source_claims:
        - claim-parallel-branch-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ParallelBranch-example-positive-manual-20260716
    labels:
      zh: ParallelBranch positive
      en: ParallelBranch positive
      ja: ParallelBranch positive
    descriptions:
      zh: Prefect 数据流编排映射 ParallelBranch：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps ParallelBranch: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect ParallelBranch: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {composition_specification_id: official-docs-branch, version: 2, valid_from: 2026-07-16T00:00:00Z, topology_ref: "source-review-topology@2", local_role: "retrieve and assess official specifications independently", independence_key: source-family:official-docs, join_key: "evidence-set/official"}

    related_node_ids:
      - ParallelBranch
      - Parallelization
    related_relation_ids:
      - Parallelization-contains_branch-ParallelBranch
    source_claims:
      - claim-parallel-branch-001
      - claim-parallel-branch-002

  - id: ParallelBranch-example-boundary-manual-20260716
    labels:
      zh: ParallelBranch boundary
      en: ParallelBranch boundary
      ja: ParallelBranch boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 ParallelBranch 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not ParallelBranch work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で ParallelBranch work_specification ではない。
    field_values: {}

    related_node_ids:
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-parallel-branch-003
      - claim-parallel-branch-001

  - id: ParallelBranch-example-counterexample-manual-20260719
    labels:
      zh: ParallelBranch counterexample
      en: ParallelBranch counterexample
      ja: ParallelBranch counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 ParallelBranch 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style ParallelBranch group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 ParallelBranch ではない。
    field_values: {composition_specification_id: absent, independence_key: absent, join_key: absent, topology_ref: absent, native_dispatch: "Send(official_docs", started_at: 2026-07-16T04:20:00Z}

    related_node_ids:
      - ParallelBranch
      - Parallelization
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-parallel-branch-001
      - claim-parallel-branch-003

  - id: ParallelBranch-example-instance-manual-20260719
    labels:
      zh: ParallelBranch instance
      en: ParallelBranch instance
      ja: ParallelBranch instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 ParallelBranch policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to ParallelBranch policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が ParallelBranch policy-prefect@1 に写像。
    field_values: {topology_ref: "source-review-topology@2", local_role: "retrieve and assess official specifications independently"}

    related_node_ids:
      - ParallelBranch
      - CompositionPart
    related_relation_ids:
      - ParallelBranch-is_a-CompositionPart
    source_claims:
      - claim-parallel-branch-hierarchy

parent_relation:
  id: ParallelBranch-is_a-CompositionPart
  predicate: is_a
  target: concept:CompositionPart
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合部件
    en: is a composition part
    ja: 構成部品である
  definition:
    zh: ParallelBranch 继承 CompositionPart 的静态结构位置角色，并特化为可独立执行的并行分支。
    en: ParallelBranch inherits CompositionPart's static structural position role and specializes it as an independently executable parallel branch.
    ja: ParallelBranch は CompositionPart の static structural position 役割を継承し independent parallel branch として特化します。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_parallel_branch
    labels:
      zh: 具有并行分支
      en: has parallel branch
      ja: 並列 branch を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy; not a LangGraph Send target subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-parallel-branch-hierarchy
  distinct_fact_rationale:
    zh: 层级说明并行分支是一种组合部件；它不说明某次运行是否执行了该分支。
    en: The hierarchy says a parallel branch is a composition part; it does not state whether a run executed the branch.
    ja: 階層は parallel branch が composition part であることを示し、run が branch を実行したかは示しません。
