schema: moonweave.ai/ontology-node/v1
id: ParallelBranch
kind: concept
labels:
  zh: 并行分支
  en: parallel branch
  ja: 並列分岐
semantics:
  short_definition:
    zh: 在并行模式中具有独立输入范围、局部交付物和汇合键的组合部件。
    en: A composition part with an independent input scope, local deliverable, and join key inside a parallel pattern.
    ja: parallel pattern 内で independent input scope・local deliverable・join key を持つ composition part です。
  definition:
    zh: 并行分支是 CompositionPart 的子类，以分支标识、所属 Parallelization、独立性声明、输入范围、交付契约和 join key 为种差。它描述并行拓扑中的静态位置，不是线程、工作者角色或本次分支运行。
    en: A ParallelBranch is a CompositionPart distinguished by branch ID, owning Parallelization, independence assertion, input scope, deliverable contract, and join key. It is a static position in a parallel topology, not a thread, worker role, or one branch run.
    ja: ParallelBranch は branch ID・owning Parallelization・independence assertion・input scope・deliverable contract・join key で区別され、thread・worker role・one branch run ではありません。
  why_needed:
    zh: 独立分支作为真实下位层，可说明并行模式由哪些职责组成，并防止把工作者、来源或运行尝试误作模式子类。
    en: A true branch layer states which responsibilities compose a parallel pattern and prevents workers, sources, or attempts from becoming pattern subtypes.
    ja: true branch layer で parallel pattern の responsibilities を示し worker/source/attempt の subtype 誤用を防ぎます。
  includes:
    - zh: 法规核验分支、论文核验分支、代码审查分支等可独立完成并在汇合点交付的结构位置。
      en: Regulation, paper, and code-review positions that complete independently and deliver at a join.
      ja: regulation・paper・code-review positions that complete independently and deliver at join。
  excludes:
    - zh: 分支执行者、来源文档、线程、无法独立的下游阶段以及汇合后的综合输出。
      en: Branch actors, source documents, threads, dependent downstream stages, and post-join synthesis output.
      ja: branch actor・source document・thread・dependent downstream stage・post-join output。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph Send(node, state) 动态并行分支、CrewAI Process.parallel 任务槽映射为 ParallelBranch；以 independence_key 与 join_key 标识 fan-out/fan-in 位置。
    en: LangGraph Send(node, state) dynamic parallel branches and CrewAI Process.parallel task slots map to ParallelBranch with independence_key and join_key for fan-out/fan-in positions.
    ja: LangGraph Send(node, state) 動的並列 branch・CrewAI Process.parallel task slot を independence_key/join_key で ParallelBranch へ写像します。
  typical_input:
    - description: LangGraph Send fan-out.
      format: 'return [Send("worker", {"item": item}) for item in state["items"]]'
      source_claims:
        - claim-parallel-branch-design
  typical_output:
    - description: Moonweave ParallelBranch spec.
      format: '{"branch_id": "official-docs-branch", "independence_key": "source-family:official-docs", "join_key": "evidence-set/official"}'
      source_claims:
        - claim-parallel-branch-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: independence_key
      labels:
        zh: 独立性键
        en: independence key
        ja: 独立性 key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明分支不依赖其他未完成分支的依据。
        en: States why the branch does not depend on unfinished peers.
        ja: unfinished peer に依存しない根拠を示します。
      allowed_values: []
      pattern: null
      example_value: source-family:official-docs
      source_claims:
        - claim-parallel-branch-design
    - id: join_key
      labels:
        zh: 汇合键
        en: join key
        ja: join key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识 fan-in 时匹配该分支交付物的键。
        en: Identifies this branch deliverable at fan-in.
        ja: fan-in で branch deliverable を対応付ける key です。
      allowed_values: []
      pattern: null
      example_value: evidence-set/official
      source_claims:
        - claim-parallel-branch-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ParallelBranch-langgraph-send
    labels:
      zh: LangGraph Send 分支
      en: LangGraph Send branch
      ja: LangGraph Send branch
    descriptions:
      zh: 'plan 节点 Send("worker", {"item": item}) 创建三 ParallelBranch worker 槽。'
      en: 'Plan node Send("worker", {"item": item}) creates three ParallelBranch worker slots.'
      ja: plan ノード Send が三 ParallelBranch worker slot を作成。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Send API
    field_values:
      branch_id: worker-branch-a
      join_key: evidence-set/official
    related_node_ids:
      - ParallelBranch
      - Parallelization
    related_relation_ids:
      - Parallelization-contains_branch-ParallelBranch
    source_claims:
      - claim-parallel-branch-langgraph
      - claim-parallel-branch-design
  - id: ParallelBranch-crewai-parallel
    labels:
      zh: CrewAI 并行任务分支
      en: CrewAI parallel task branch
      ja: CrewAI 並列 task branch
    descriptions:
      zh: research_task 与 analysis_task 是 Process.parallel 中的两 ParallelBranch。
      en: research_task and analysis_task are two ParallelBranches in Process.parallel.
      ja: research_task と analysis_task が Process.parallel 内二 ParallelBranch。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.parallel
    field_values:
      branch_id: branch-research
      join_key: research-output
    related_node_ids:
      - ParallelBranch
      - Parallelization
    related_relation_ids: []
    source_claims:
      - claim-parallel-branch-crewai
      - claim-parallel-branch-design
  - id: ParallelBranch-boundary-agent
    labels:
      zh: Agent 不是分支
      en: Agent is not branch
      ja: agent は branch ではない
    descriptions:
      zh: researcher-7 执行 branch 但可被替换而不改变 branch 身份。
      en: researcher-7 executes a branch but is substitutable without changing branch identity.
      ja: researcher-7 は branch を実行するが replaceable で branch identity は不変。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: actor versus structure
    field_values: {}
    related_node_ids:
      - ParallelBranch
    related_relation_ids: []
    source_claims:
      - claim-parallel-branch-design
