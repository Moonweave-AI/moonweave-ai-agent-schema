    en: is a
    ja: の一種である
  definitions:
    zh: 并行分支继承组合部件身份，并以独立输入范围、局部交付契约和汇合键为种差。
    en: ParallelBranch inherits composition-part identity and is distinguished by independent input scope, local deliverable contract, and join key.
    ja: ParallelBranch は part identity を継承し independent input scope・deliverable contract・join key を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
