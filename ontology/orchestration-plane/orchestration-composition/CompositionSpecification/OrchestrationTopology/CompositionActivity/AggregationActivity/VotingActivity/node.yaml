schema: moonweave.ai/ontology-node/v1
id: VotingActivity
kind: concept
status: review
labels:
  zh: 投票聚合活动
  en: voting activity
  ja: 投票集約活動
semantics:
  short_definition:
    zh: 实现投票模式、消费一组有效选票并按聚合规则产生集体结果的聚合活动。
    en: An aggregation activity realizing a voting pattern, consuming valid ballots, and producing a collective result under an aggregation rule.
    ja: voting pattern を実現し valid ballots を consume、aggregation rule で collective result を produce する aggregation activity です。
  definition:
    zh: 投票聚合活动是 AggregationActivity 的子类，以活动标识、所实现 Voting、选票集合摘要、实际应用的恰好一个 VotingRule 修订和关闭时间为种差。它消费 VoteBallot 并产生 CompositionOutput；它不是投票制度、单张票或投票者。
    en: A VotingActivity is an AggregationActivity distinguished by activity ID, realized Voting pattern, ballot-set digest, exactly one VotingRule revision actually applied, and closure time. It consumes VoteBallots and produces a CompositionOutput; it is neither the voting regime, one ballot, nor a voter.
    ja: VotingActivity は activity ID・realized Voting・ballot-set digest・実際に applied した exactly one VotingRule revision・closure time で区別される AggregationActivity です。VoteBallot を consume し CompositionOutput を produce、regime・one ballot・voter ではありません。
  why_needed:
    zh: 活动层连接投票模式、票据、规则和结果，消除旧图中 Voting 同时“治理活动又消费票”的角色混乱。
    en: The activity layer connects voting pattern, ballots, rule, and result and removes the old confusion where Voting both governed an activity and consumed ballots.
    ja: activity layer で pattern・ballots・rule・result を結び Voting 自体が consume/govern する混乱を除きます。
  includes:
    - zh: 委员会计票、模型评审投票结算、排序票聚合和带法定人数的批准投票运行。
      en: Board counts, model-review ballot settlement, ranked-vote aggregation, and quorum-bound approval votes.
      ja: board count・model review ballot settlement・ranked vote aggregation・quorum approval vote run。
  excludes:
    - zh: 投票模式定义、选票记录、投票参与者、聚合规则和不产生集体结果的意见收集。
      en: Voting-pattern definitions, ballot records, voters, aggregation rules, and opinion collection without a collective result.
      ja: voting pattern・ballot record・voter・aggregation rule・collective result のない opinion collection。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: ballot_set_digest
      labels:
        zh: 选票集合摘要
        en: ballot-set digest
        ja: ballot set digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定关闭时纳入计票的选票集合。
        en: Fixes the ballot set included when voting closes.
        ja: voting close 時に含む ballot set を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:ballots-52
      source_claims:
        - claim-voting-activity-003
    - id: closed_at
      labels:
        zh: 关闭时间
        en: closed at
        ja: close time
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录投票停止接受选票并开始结算的时间。
        en: Records when ballot intake closes and settlement begins.
        ja: ballot intake が閉じ settlement が始まる時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:31:00Z
      source_claims:
        - claim-voting-activity-001
  constraints: []
  required_relation_constraints:
    - id: voting-activity-applies-one-voting-rule-revision
      direction: outgoing
      predicate: applies
      target_concept_id: VotingRule
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次 VotingActivity 必须记录恰好一个实际应用的 VotingRule 修订，并与所实现 Voting 模式指定的规则一致。
        en: Every VotingActivity records exactly one VotingRule revision actually applied, consistent with the rule named by the realized Voting pattern.
        ja: 各 VotingActivity は実際に applied した一つだけの VotingRule revision を記録し、realized Voting pattern の rule と一致させます。
      source_claims:
        - claim-voting-activity-004
examples:
  - id: VotingActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 评审委员会计票
      en: Review-board ballot count
      ja: review-board ballot count
    scenario_id: null
    descriptions:
      zh: vote-run-52 在五票达到法定人数时关闭，消费五张 VoteBallot，应用 majority-with-abstention@2 并产生 approved 结果。
      en: vote-run-52 closes at quorum five, consumes five VoteBallots, applies majority-with-abstention@2, and produces an approved result.
      ja: vote-run-52 は quorum five で close、five VoteBallots を consume、rule を apply して approved result を produce します。
    field_values:
      composition_activity_id: vote-run-52
      topology_ref: review-board-topology@2
      started_at: 2026-07-16T10:30:00Z
      ended_at: 2026-07-16T10:31:00Z
      status: completed
      input_set_digest: sha256:ballots-52
      settlement_status: settled
      ballot_set_digest: sha256:ballots-52
      closed_at: 2026-07-16T10:31:00Z
    related_node_ids:
      - VotingActivity
      - Voting
      - VoteBallot
      - AggregationActivity
      - AggregationRule
      - CompositionOutput
    related_relation_ids:
      - VotingActivity-realizes-Voting
      - VotingActivity-consumes-VoteBallot
      - AggregationActivity-applies-AggregationRule
      - VotingActivity-produces-CompositionOutput
    expected_result:
      zh: 返回一条从模式和选票到规则及结果的完整活动链。
      en: Return a complete activity chain from pattern and ballots through rule to result.
      ja: pattern/ballots から rule/result への complete activity chain を返します。
    why_valid_or_invalid:
      zh: 收票关闭、票集合、计票规则和结果均绑定同一次发生。
      en: Closure, ballot set, counting rule, and result bind to one occurrence.
      ja: closure・ballot set・counting rule・result が one occurrence に結合します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-activity-001
      - claim-voting-activity-002
      - claim-voting-activity-003
  - id: VotingActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 评审员乙的一张赞成票
      en: Reviewer B's approve ballot
      ja: reviewer B の approve ballot
    scenario_id: composition-review-votingactivity-boundary
    descriptions:
      zh: ballot-18 只记录 reviewer-b 的 approve、理由和时间，不关闭收票、不应用规则也不产生集体结果。
      en: ballot-18 records reviewer-b's approve choice, rationale, and time but closes no ballot set, applies no rule, and produces no collective result.
      ja: ballot-18 は one approve/rationale/time のみで close/rule/collective result はありません。
    field_values: {}
    related_node_ids:
      - VotingActivity
      - VoteBallot
    related_relation_ids: []
    expected_result:
      zh: 分类为 VoteBallot，并作为 VotingActivity 的输入。
      en: Classify it as VoteBallot and use it as VotingActivity input.
      ja: VoteBallot として VotingActivity input にします。
    why_valid_or_invalid:
      zh: 单票信息没有活动的收票集合、关闭与聚合身份。
      en: A single ballot lacks the collection, closure, and aggregation identity of an activity.
      ja: single ballot は activity の collection・closure・aggregation identity を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-voting-activity-001
      - claim-voting-activity-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
