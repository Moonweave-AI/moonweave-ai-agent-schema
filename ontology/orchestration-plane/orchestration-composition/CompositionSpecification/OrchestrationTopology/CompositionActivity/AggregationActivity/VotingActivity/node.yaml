schema: moonweave.ai/ontology-node/v1
id: VotingActivity
kind: concept
labels:
  zh: 投票聚合活动
  en: voting activity
  ja: 投票集約活動
semantics:
  short_definition:
    zh: 实现投票模式、消费一组有效选票并按聚合规则产生集体结果的聚合活动。
    en: An aggregation activity realizing a voting pattern, consuming valid ballots, and producing a collective result under an aggregation rule.
    ja: voting pattern を実現し valid ballots を consume、aggregation rule で collective result を produce する aggregation activity です。
  definition:
    zh: 投票聚合活动是 AggregationActivity 的子类，以活动标识、所实现 Voting、选票集合摘要、实际应用的恰好一个 VotingRule 修订和关闭时间为种差。它消费 VoteBallot 并产生 CompositionOutput；它不是投票制度、单张票或投票者。
    en: A VotingActivity is an AggregationActivity distinguished by activity ID, realized Voting pattern, ballot-set digest, exactly one VotingRule revision actually applied, and closure time. It consumes VoteBallots and produces a CompositionOutput; it is neither the voting regime, one ballot, nor a voter.
    ja: VotingActivity は activity ID・realized Voting・ballot-set digest・実際に applied した exactly one VotingRule revision・closure time で区別される AggregationActivity です。VoteBallot を consume し CompositionOutput を produce、regime・one ballot・voter ではありません。
  why_needed:
    zh: 活动层连接投票模式、票据、规则和结果，消除旧图中 Voting 同时“治理活动又消费票”的角色混乱。
    en: The activity layer connects voting pattern, ballots, rule, and result and removes the old confusion where Voting both governed an activity and consumed ballots.
    ja: activity layer で pattern・ballots・rule・result を結び Voting 自体が consume/govern する混乱を除きます。
  includes:
    - zh: 委员会计票、模型评审投票结算、排序票聚合和带法定人数的批准投票运行。
      en: Board counts, model-review ballot settlement, ranked-vote aggregation, and quorum-bound approval votes.
      ja: board count・model review ballot settlement・ranked vote aggregation・quorum approval vote run。
  excludes:
    - zh: 投票模式定义、选票记录、投票参与者、聚合规则和不产生集体结果的意见收集。
      en: Voting-pattern definitions, ballot records, voters, aggregation rules, and opinion collection without a collective result.
      ja: voting pattern・ballot record・voter・aggregation rule・collective result のない opinion collection。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: best-of-N 计票运行、LLM-as-judge 选优映射为 VotingActivity；consumes VoteBallot、applies VotingRule、produces CompositionOutput、realizes Voting。
    en: Best-of-N tally runs and LLM-as-judge selection map to VotingActivity consuming VoteBallot, applying VotingRule, producing CompositionOutput, realizing Voting.
    ja: best-of-N 集計 run・LLM-as-judge 選优を VoteBallot consume/VotingRule apply/CompositionOutput produce/Voting realize 付き VotingActivity へ写像します。
  typical_input:
    - description: Vote tally occurrence.
      format: vote-run-18 consumes ballot-a@1,b@1,c@1; applies borda-count@4
      source_claims:
        - claim-voting-activity-design
  typical_output:
    - description: Moonweave VotingActivity.
      format: '{"composition_activity_id": "vote-run-18", "voting_regime_ref": "regime-borda@2"}'
      source_claims:
        - claim-voting-activity-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: ballot_set_digest
      labels:
        zh: 选票集合摘要
        en: ballot-set digest
        ja: ballot set digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定关闭时纳入计票的选票集合。
        en: Fixes the ballot set included when voting closes.
        ja: voting close 時に含む ballot set を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:ballots-52
      source_claims:
        - claim-voting-activity-design
    - id: closed_at
      labels:
        zh: 关闭时间
        en: closed at
        ja: close time
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录投票停止接受选票并开始结算的时间。
        en: Records when ballot intake closes and settlement begins.
        ja: ballot intake が閉じ settlement が始まる時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:31:00Z
      source_claims:
        - claim-voting-activity-design
  constraints: []
  required_relation_constraints:
    - id: voting-activity-applies-one-voting-rule-revision
      direction: outgoing
      predicate: applies
      target_concept_id: VotingRule
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次 VotingActivity 必须记录恰好一个实际应用的 VotingRule 修订，并与所实现 Voting 模式指定的规则一致。
        en: Every VotingActivity records exactly one VotingRule revision actually applied, consistent with the rule named by the realized Voting pattern.
        ja: 各 VotingActivity は実際に applied した一つだけの VotingRule revision を記録し、realized Voting pattern の rule と一致させます。
      source_claims:
        - claim-voting-activity-design
examples:
  - id: VotingActivity-borda-run
    labels:
      zh: Borda 投票运行
      en: Borda voting run
      ja: Borda voting run
    descriptions:
      zh: vote-run-18 消费三 digest 固定选票，应用 borda-count@4，产生 vote-result-18@1。
      en: vote-run-18 consumes three digest-fixed ballots, applies borda-count@4, produces vote-result-18@1.
      ja: vote-run-18 が三 digest 固定 ballot を consume し borda-count@4 適用、vote-result-18@1 生成。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N voting
    field_values:
      composition_activity_id: vote-run-18
    related_node_ids:
      - VotingActivity
      - VoteBallot
      - VotingRule
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
      - VotingActivity-applies-VotingRule
      - VotingActivity-produces-CompositionOutput
    source_claims:
      - claim-voting-activity-anthropic
      - claim-voting-activity-design
  - id: VotingActivity-llm-judge
    labels:
      zh: LLM 评判选优
      en: LLM judge selection
      ja: LLM judge 選优
    descriptions:
      zh: judge 模型打分后 majority 规则选出获胜候选。
      en: Judge model scores then majority rule selects winning candidate.
      ja: judge model score 後 majority rule が winner を選択。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: LLM-as-judge
    field_values: {}
    related_node_ids:
      - VotingActivity
      - Voting
    related_relation_ids:
      - VotingActivity-realizes-Voting
    source_claims:
      - claim-voting-activity-cookbook
      - claim-voting-activity-design
  - id: VotingActivity-boundary-ballot
    labels:
      zh: 选票不是投票活动
      en: Ballot is not voting activity
      ja: ballot は voting activity ではない
    descriptions:
      zh: ballot-a@1 是输入工件，vote-run-18 才是 VotingActivity。
      en: ballot-a@1 is input artifact; vote-run-18 is VotingActivity.
      ja: ballot-a@1 は input artifact、vote-run-18 が VotingActivity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: artifact versus activity
    field_values: {}
    related_node_ids:
      - VotingActivity
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-voting-activity-design
parent_relation:
  id: VotingActivity-is_a-AggregationActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 投票聚合活动继承聚合活动身份，并以投票模式、选票集合、计票规则和集体结果为种差。
    en: VotingActivity inherits aggregation-activity identity and is distinguished by voting pattern, ballot set, counting rule, and collective result.
    ja: VotingActivity は aggregation activity identity を継承し voting pattern・ballot set・counting rule・collective result を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-voting-activity-design
    - claim-voting-activity-design
    - claim-voting-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: VotingActivity-consumes-VoteBallot
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费投票票据
      en: consumes vote ballot
      ja: 投票票を消費する
    definitions:
      zh: 一次投票活动把一张已验证、未重复且在关闭前有效的投票票据纳入本次计票输入集合。
      en: A VotingActivity consumes a VoteBallot when a validated, nonduplicate ballot cast before closure is admitted to that count's input set.
      ja: VotingActivity が validated・nonduplicate・before-closure ballot を count input set に採用すると consumes が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: consumed_by_voting_activity
      labels:
        zh: 被投票活动消费
        en: is consumed by voting activity
        ja: voting activity に消費される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-voting-activity-design
      - claim-voting-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:VoteBallot
  - id: VotingActivity-produces-CompositionOutput
    predicate: produces
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 产生组合输出
      en: produces composition output
      ja: 構成出力を生成する
    definitions:
      zh: 一次投票活动完成计票后生成一个符合投票输出契约、记录票集合和规则版本的不可变组合输出。
      en: A VotingActivity produces an immutable CompositionOutput after settlement, conforming to the voting-output contract and recording ballot set and rule revision.
      ja: VotingActivity が settlement 後に output contract・ballot set・rule revision を持つ immutable CompositionOutput を生成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: produced_by_voting_activity
      labels:
        zh: 由投票活动产生
        en: is produced by voting activity
        ja: voting activity により生成される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-voting-activity-design
      - claim-voting-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CompositionOutput
  - id: VotingActivity-realizes-Voting
    predicate: realizes
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 实现投票模式
      en: realizes voting pattern
      ja: 投票パターンを実現する
    definitions:
      zh: 一次投票活动遵守某投票模式版本的投票资格、选票契约、关闭条件和匿名性时，该活动实现该模式。
      en: A VotingActivity realizes a Voting revision when it follows that revision's voter eligibility, ballot contract, closure condition, and anonymity.
      ja: VotingActivity が Voting revision の eligibility・ballot contract・closure・anonymity を満たすとき realizes が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: realized_by_voting_activity
      labels:
        zh: 由投票活动实现
        en: is realized by voting activity
        ja: voting activity により実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-voting-activity-design
      - claim-voting-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Voting
  - id: VotingActivity-applies-VotingRule
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用投票裁决规则
      en: applies voting rule
      ja: 投票裁定規則を適用する
    definitions:
      zh: 一次 VotingActivity 通过该关系记录实际执行的恰好一个 VotingRule 修订；只有该修订与其实现的 Voting 模式所指定规则一致，活动才符合模式。
      en: A VotingActivity records through this relation exactly one VotingRule revision it actually executed; the occurrence conforms to its realized Voting pattern only when both name the same revision.
      ja: VotingActivity はこの関係で実際に実行した一つだけの VotingRule revision を記録し、realized Voting pattern と同じ revision の場合のみ pattern-conformant です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 具体的一对一要求定义在 VotingActivity 的必需关系约束中，以便同时校验活动和规则类型。
      en: The exact-one requirement is declared on VotingActivity's required-relation constraint so activity and rule types are validated together.
      ja: exact-one requirement は activity/rule type を同時検証する VotingActivity required-relation constraint に定義します。
    inverse_reading:
      predicate: applied_by_voting_activity
      labels:
        zh: 由投票活动应用
        en: is applied by voting activity
        ja: 投票活動に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-voting-activity-design
    distinct_fact_rationale:
      zh: 通用 AggregationActivity-applies-AggregationRule 允许所有聚合机制；本关系把来源与目标同时收窄到 VotingActivity 和 VotingRule，并承担模式一致性校验，因此不是重复边。
      en: The generic AggregationActivity-applies-AggregationRule covers every aggregation mechanism; this relation narrows both endpoints to VotingActivity and VotingRule and carries pattern-consistency validation, so it is not a duplicate edge.
      ja: generic AggregationActivity-applies-AggregationRule は全 mechanism を扱い、本関係は両 endpoint を VotingActivity/VotingRule に狭め pattern consistency を検証するため duplicate edge ではありません。
    layout_role: cross-link
    target: concept:VotingRule
