schema: moonweave.ai/ontology-node/v1
id: Synthesis
kind: concept
labels:
  zh: 综合活动
  en: synthesis
  ja: 統合活動
semantics:
  short_definition:
    zh: 依据综合计划与综合模式，把多个异质输入生成新的可追溯整体表达的聚合活动。
    en: An aggregation activity generating a new traceable whole from heterogeneous inputs under a synthesis plan and pattern.
    ja: synthesis plan/pattern に従い heterogeneous inputs から新しい traceable whole を生成する aggregation activity です。
  definition:
    zh: 综合活动是 AggregationActivity 的子类，以综合活动标识、所实现 SynthesisPattern、所受 SynthesisPlan、输入集合摘要和输出引用为种差。它消费 SynthesisInput 并产生 SynthesisOutput；不同于简单选择，它需要形成新的整体表达并保留输入来源。
    en: A Synthesis is an AggregationActivity distinguished by activity ID, realized SynthesisPattern, governing SynthesisPlan, input-set digest, and output reference. It consumes SynthesisInputs and produces a SynthesisOutput; unlike simple selection, it forms a new whole and preserves input provenance.
    ja: Synthesis は activity ID・realized pattern・governing plan・input-set digest・output ref で区別される AggregationActivity です。SynthesisInput を consume し SynthesisOutput を produce、simple selection と異なり new whole/provenance を形成します。
  why_needed:
    zh: 单独建模综合活动，可把“怎么综合”的模式、“为何综合”的计划、“本次综合”的发生与“综合结果”分开。
    en: A separate synthesis activity distinguishes how to synthesize, why to synthesize, this occurrence, and its result.
    ja: how pattern・why plan・this occurrence・result を分離します。
  includes:
    - zh: 报告综合、证据调和、章节汇编和多方案归纳等会生成新整体内容的运行。
      en: Report synthesis, evidence reconciliation, section assembly, and candidate consolidation runs that generate new whole content.
      ja: report synthesis・evidence reconciliation・section assembly・candidate consolidation run。
  excludes:
    - zh: 选择一个现有候选的路由、只计票的活动、简单拼接、计划规范和已生成输出。
      en: Routing that selects an existing candidate, ballot counting alone, simple concatenation, plan specifications, and generated outputs.
      ja: existing candidate routing・ballot count only・simple concat・plan spec・generated output。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: MapReduce reduce invoke、CrewAI writer task 与 LangGraph reduce 节点映射为 Synthesis；consumes SynthesisInput、produces SynthesisOutput、governed_by SynthesisPlan。
    en: MapReduce reduce invoke, CrewAI writer task, and LangGraph reduce node map to Synthesis consuming SynthesisInput, producing SynthesisOutput, governed_by SynthesisPlan.
    ja: MapReduce reduce invoke・CrewAI writer task・LangGraph reduce node を SynthesisInput consume/SynthesisOutput produce/SynthesisPlan governed_by 付き Synthesis へ写像します。
  typical_input:
    - description: Synthesis activity run.
      format: synthesis-run-31 consumes draft-report@8, citation-pack@5; applies conflict-preserving@2
      source_claims:
        - claim-synthesis-design
  typical_output:
    - description: Moonweave Synthesis occurrence.
      format: '{"composition_activity_id": "synthesis-run-31", "synthesis_pattern_ref": "evidence-merge@3"}'
      source_claims:
        - claim-synthesis-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: plan_ref
      labels:
        zh: 综合计划引用
        en: synthesis-plan reference
        ja: synthesis plan ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次综合遵守的不可变计划版本。
        en: References the immutable plan revision governing this synthesis.
        ja: 今回 synthesis を govern する immutable plan revision を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-report-synthesis@5
      source_claims:
        - claim-synthesis-design
        - claim-synthesis-design
    - id: output_ref
      labels:
        zh: 综合输出引用
        en: synthesis-output reference
        ja: synthesis output ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该活动产生的不可变 SynthesisOutput。
        en: References the immutable SynthesisOutput generated by this activity.
        ja: activity が生成した immutable SynthesisOutput を参照します。
      allowed_values: []
      pattern: null
      example_value: report-884
      source_claims:
        - claim-synthesis-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: Synthesis-mapreduce-run
    labels:
      zh: MapReduce 综合运行
      en: MapReduce synthesis run
      ja: MapReduce 統合 run
    descriptions:
      zh: synthesis-run-31 消费固定 digest 输入并产生 final-report@9。
      en: synthesis-run-31 consumes fixed-digest inputs producing final-report@9.
      ja: synthesis-run-31 が固定 digest input を consume し final-report@9 を生成。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: map-reduce reduce
    field_values:
      composition_activity_id: synthesis-run-31
    related_node_ids:
      - Synthesis
      - SynthesisInput
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-synthesis-cookbook
      - claim-synthesis-design
  - id: Synthesis-crewai-writer
    labels:
      zh: CrewAI writer 综合
      en: CrewAI writer synthesis
      ja: CrewAI writer 統合
    descriptions:
      zh: writer task kickoff 合并并行分支输出。
      en: Writer task kickoff merges parallel branch outputs.
      ja: writer task kickoff が並列 branch 出力を merge。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: synthesis task
    field_values: {}
    related_node_ids:
      - Synthesis
      - SynthesisPattern
    related_relation_ids:
      - Synthesis-realizes-SynthesisPattern
    source_claims:
      - claim-synthesis-crewai
      - claim-synthesis-design
  - id: Synthesis-boundary-pattern
    labels:
      zh: 模式不是综合运行
      en: Pattern is not synthesis run
      ja: pattern は synthesis run ではない
    descriptions:
      zh: evidence-merge@3 是 SynthesisPattern 规范不是 synthesis-run-31 发生。
      en: evidence-merge@3 is SynthesisPattern spec not synthesis-run-31 occurrence.
      ja: evidence-merge@3 は SynthesisPattern spec で synthesis-run-31 occurrence ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - Synthesis
      - SynthesisPattern
    related_relation_ids: []
    source_claims:
      - claim-synthesis-design
parent_relation:
  id: Synthesis-is_a-AggregationActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 综合活动继承聚合活动身份，并以综合模式、综合计划、异质输入和新整体输出为种差。
    en: Synthesis inherits aggregation-activity identity and is distinguished by a synthesis pattern, synthesis plan, heterogeneous inputs, and a newly formed whole output.
    ja: Synthesis は aggregation activity identity を継承し pattern・plan・heterogeneous inputs・new whole output を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-synthesis-design
    - claim-synthesis-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Synthesis-consumes-SynthesisInput
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费综合输入
      en: consumes synthesis input
      ja: 統合入力を消費する
    definitions:
      zh: 一次综合活动读取并固定某综合输入版本，将其内容摘要纳入本次输入集合和追踪清单。
      en: A Synthesis consumes a SynthesisInput when it reads and fixes that input revision in the run's input set and trace manifest.
      ja: Synthesis が input revision を読み fixed input set/trace manifest に含めると consumes が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: consumed_by_synthesis
      labels:
        zh: 被综合活动消费
        en: is consumed by synthesis
        ja: synthesis に消費される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-synthesis-design
      - claim-synthesis-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:SynthesisInput
  - id: Synthesis-governed_by-SynthesisPlan
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受综合计划约束
      en: is governed by synthesis plan
      ja: 統合計画に統制される
    definitions:
      zh: 一次综合活动在执行和验证输出时受某个不可变综合计划版本的目标、输入政策和输出契约约束。
      en: A Synthesis is governed by an immutable SynthesisPlan revision whose objective, input policy, and output contract constrain execution and output validation.
      ja: Synthesis は immutable plan revision の objective・input policy・output contract により execution/output validation を制約されます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: governs_synthesis
      labels:
        zh: 约束综合活动
        en: governs synthesis
        ja: synthesis を統制する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-synthesis-design
      - claim-synthesis-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:SynthesisPlan
  - id: Synthesis-produces-SynthesisOutput
    predicate: produces
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 产生综合输出
      en: produces synthesis output
      ja: 統合出力を生成する
    definitions:
      zh: 一次综合活动完成后生成一个满足计划契约、具有固定内容摘要和输入追踪清单的不可变综合输出。
      en: A Synthesis produces an immutable SynthesisOutput on completion when the artifact satisfies the plan contract and carries a fixed digest and input trace manifest.
      ja: Synthesis completion 時に plan contract・fixed digest・input trace manifest を持つ immutable SynthesisOutput を生成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: produced_by_synthesis
      labels:
        zh: 由综合活动产生
        en: is produced by synthesis
        ja: synthesis により生成される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-synthesis-design
      - claim-synthesis-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:SynthesisOutput
  - id: Synthesis-realizes-SynthesisPattern
    predicate: realizes
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 实现综合模式
      en: realizes synthesis pattern
      ja: 統合パターンを実現する
    definitions:
      zh: 一次综合活动的输入处理、冲突呈现、来源保留和完成检查满足某综合模式版本时，该活动实现该模式。
      en: A Synthesis realizes a SynthesisPattern revision when input handling, conflict presentation, provenance preservation, and completion checks satisfy that revision.
      ja: Synthesis が pattern revision の input handling・conflict presentation・provenance・completion checks を満たすと realizes が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: realized_by_synthesis
      labels:
        zh: 由综合活动实现
        en: is realized by synthesis
        ja: synthesis により実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-synthesis-design
      - claim-synthesis-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:SynthesisPattern
sources:
