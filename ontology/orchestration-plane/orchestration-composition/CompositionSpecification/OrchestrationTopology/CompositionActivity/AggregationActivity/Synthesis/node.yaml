schema: moonweave.ai/ontology-node/v1
id: Synthesis
kind: concept
status: review
labels:
  zh: 综合活动
  en: synthesis
  ja: 統合活動
semantics:
  short_definition:
    zh: 依据综合计划与综合模式，把多个异质输入生成新的可追溯整体表达的聚合活动。
    en: An aggregation activity generating a new traceable whole from heterogeneous inputs under a synthesis plan and pattern.
    ja: synthesis plan/pattern に従い heterogeneous inputs から新しい traceable whole を生成する aggregation activity です。
  definition:
    zh: 综合活动是 AggregationActivity 的子类，以综合活动标识、所实现 SynthesisPattern、所受 SynthesisPlan、输入集合摘要和输出引用为种差。它消费 SynthesisInput 并产生 SynthesisOutput；不同于简单选择，它需要形成新的整体表达并保留输入来源。
    en: A Synthesis is an AggregationActivity distinguished by activity ID, realized SynthesisPattern, governing SynthesisPlan, input-set digest, and output reference. It consumes SynthesisInputs and produces a SynthesisOutput; unlike simple selection, it forms a new whole and preserves input provenance.
    ja: Synthesis は activity ID・realized pattern・governing plan・input-set digest・output ref で区別される AggregationActivity です。SynthesisInput を consume し SynthesisOutput を produce、simple selection と異なり new whole/provenance を形成します。
  why_needed:
    zh: 单独建模综合活动，可把“怎么综合”的模式、“为何综合”的计划、“本次综合”的发生与“综合结果”分开。
    en: A separate synthesis activity distinguishes how to synthesize, why to synthesize, this occurrence, and its result.
    ja: how pattern・why plan・this occurrence・result を分離します。
  includes:
    - zh: 报告综合、证据调和、章节汇编和多方案归纳等会生成新整体内容的运行。
      en: Report synthesis, evidence reconciliation, section assembly, and candidate consolidation runs that generate new whole content.
      ja: report synthesis・evidence reconciliation・section assembly・candidate consolidation run。
  excludes:
    - zh: 选择一个现有候选的路由、只计票的活动、简单拼接、计划规范和已生成输出。
      en: Routing that selects an existing candidate, ballot counting alone, simple concatenation, plan specifications, and generated outputs.
      ja: existing candidate routing・ballot count only・simple concat・plan spec・generated output。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: plan_ref
      labels:
        zh: 综合计划引用
        en: synthesis-plan reference
        ja: synthesis plan ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次综合遵守的不可变计划版本。
        en: References the immutable plan revision governing this synthesis.
        ja: 今回 synthesis を govern する immutable plan revision を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-report-synthesis@5
      source_claims:
        - claim-synthesis-001
        - claim-synthesis-002
    - id: output_ref
      labels:
        zh: 综合输出引用
        en: synthesis-output reference
        ja: synthesis output ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该活动产生的不可变 SynthesisOutput。
        en: References the immutable SynthesisOutput generated by this activity.
        ja: activity が生成した immutable SynthesisOutput を参照します。
      allowed_values: []
      pattern: null
      example_value: report-884
      source_claims:
        - claim-synthesis-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: Synthesis-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 审计报告综合运行
      en: Audit-report synthesis run
      ja: audit-report synthesis run
    scenario_id: null
    descriptions:
      zh: synthesis-884 依据 audit-report-synthesis@5 消费三份章节输入，按 evidence-reconciliation@3 综合并产生 report-884。
      en: synthesis-884 consumes three section inputs under audit-report-synthesis@5, realizes evidence-reconciliation@3, and produces report-884.
      ja: synthesis-884 は plan 下で three section inputs を consume、pattern を realize して report-884 を produce します。
    field_values:
      composition_activity_id: synthesis-884
      topology_ref: report-topology@4
      started_at: 2026-07-16T04:20:00Z
      ended_at: 2026-07-16T04:22:00Z
      status: completed
      input_set_digest: sha256:synthesis-inputs-884
      settlement_status: settled
      plan_ref: audit-report-synthesis@5
      output_ref: report-884
    related_node_ids:
      - Synthesis
      - SynthesisPlan
      - SynthesisInput
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
      - Synthesis-consumes-SynthesisInput
      - Synthesis-produces-SynthesisOutput
    expected_result:
      zh: 返回一次由计划、输入和输出完整追踪的综合活动。
      en: Return one synthesis activity fully traced through plan, inputs, and output.
      ja: plan・inputs・output で fully traced synthesis activity を返します。
    why_valid_or_invalid:
      zh: 它发生于具体时间，读取输入并生成新的整体工件。
      en: It occurs at concrete times, reads inputs, and generates a new whole artifact.
      ja: concrete time に occurrence し inputs を読み new whole artifact を生成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-001
      - claim-synthesis-002
  - id: Synthesis-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 从两个候选中选择高分者
      en: Select the higher-scored candidate
      ja: higher-scored candidate selection
    scenario_id: composition-review-synthesis-boundary
    descriptions:
      zh: decision-9 只从 candidate-a 和 candidate-b 中返回现有 candidate-b，没有生成新内容或输入到输出的主张追踪。
      en: decision-9 returns existing candidate-b from two candidates and creates no new content or input-to-output claim trace.
      ja: decision-9 は existing candidate-b を返すだけで new content/claim trace を生成しません。
    field_values: {}
    related_node_ids:
      - Synthesis
      - VotingActivity
    related_relation_ids: []
    expected_result:
      zh: 按投票或路由决定建模，不分类为 Synthesis。
      en: Model it as voting or routing selection, not Synthesis.
      ja: voting/routing selection とし Synthesis に分類しません。
    why_valid_or_invalid:
      zh: 选择已有候选不满足形成新整体表达的综合种差。
      en: Selecting an existing candidate does not satisfy synthesis's new-whole differentia.
      ja: existing candidate selection は new-whole synthesis differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
