    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
