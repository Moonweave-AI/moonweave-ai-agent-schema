schema: moonweave.ai/ontology-node/v1
id: AggregationActivity
kind: concept
labels:
  zh: 聚合活动
  en: aggregation activity
  ja: 集約活動
semantics:
  short_definition:
    zh: 在具体时间应用聚合规则，把一组输入结算为一个或多个组合输出的组合活动。
    en: A composition activity applying an aggregation rule at concrete times to settle an input set into one or more composition outputs.
    ja: concrete time に aggregation rule を適用し input set を composition outputs に確定する composition activity です。
  definition:
    zh: 聚合活动是 CompositionActivity 的子类，以活动标识、输入集合摘要、所用 AggregationRule、开始结束时间和结算状态为种差，是 Synthesis 与 VotingActivity 的上位概念。它表示真实发生的 fan-in 或归并，不是规则、模式或产物。
    en: An AggregationActivity is a CompositionActivity distinguished by activity ID, input-set digest, applied AggregationRule, start and end times, and settlement status and is the genus of Synthesis and VotingActivity. It is an actual fan-in or merge occurrence, not a rule, pattern, or artifact.
    ja: AggregationActivity は activity ID・input-set digest・applied rule・start/end・settlement status で区別される CompositionActivity で Synthesis/VotingActivity の genus です。rule・pattern・artifact ではありません。
  why_needed:
    zh: 共同上位层表达投票和综合都属于运行时聚合，同时保留两者不同的输入与输出种差。
    en: The common genus expresses that voting and synthesis are runtime aggregation while preserving their distinct input and output differentiae.
    ja: common genus により voting/synthesis の runtime aggregation 共通性と異なる input/output differentia を保持します。
  includes:
    - zh: 一次投票计票、一次多章节综合、一次并行分支 fan-in 或一次证据去重归并。
      en: One ballot count, multi-section synthesis, parallel-branch fan-in, or evidence-deduplication merge.
      ja: one ballot count・multi-section synthesis・parallel fan-in・evidence dedup merge。
  excludes:
    - zh: 聚合规则版本、综合模式、输入票据、最终报告以及仅等待分支但未归并内容的屏障。
      en: Aggregation-rule revisions, synthesis patterns, input ballots, final reports, and barriers that wait without merging content.
      ja: rule revision・synthesis pattern・input ballot・final report・content merge しない barrier。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangGraph fan-in reducer 执行、CrewAI 合并 task 运行映射为 AggregationActivity；通过 applies 引用 AggregationRule@version。
    en: LangGraph fan-in reducer execution and CrewAI merge task runs map to AggregationActivity referencing AggregationRule@version via applies.
    ja: LangGraph fan-in reducer 実行・CrewAI merge task 実行を applies で AggregationRule@version 参照付き AggregationActivity へ写像します。
  typical_input:
    - description: Reducer node execution.
      format: 'def reduce_results(state): return {"merged": combine(state["worker_outputs"])}'
      source_claims:
        - claim-aggregation-activity-design
  typical_output:
    - description: Moonweave AggregationActivity.
      format: '{"aggregation_activity_id": "reduce-run-12", "aggregation_rule_ref": "evidence-priority@2"}'
      source_claims:
        - claim-aggregation-activity-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: input_set_digest
      labels:
        zh: 输入集合摘要
        en: input-set digest
        ja: input set digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次被聚合输入的有序或无序集合。
        en: Fixes the ordered or unordered set aggregated in this occurrence.
        ja: 今回 aggregation の ordered/unordered input set を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:inputs-52
      source_claims:
        - claim-aggregation-activity-design
    - id: settlement_status
      labels:
        zh: 结算状态
        en: settlement status
        ja: settlement status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 collecting、settled、unresolved 或 failed。
        en: Records collecting, settled, unresolved, or failed.
        ja: collecting・settled・unresolved・failed を記録します。
      allowed_values: []
      pattern: null
      example_value: settled
      source_claims:
        - claim-aggregation-activity-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AggregationActivity-reducer
    labels:
      zh: Reducer 聚合活动
      en: Reducer aggregation activity
      ja: reducer 集約 activity
    descriptions:
      zh: reduce-run-12 应用 evidence-priority@2 合并三 worker 输出。
      en: reduce-run-12 applies evidence-priority@2 merging three worker outputs.
      ja: reduce-run-12 が evidence-priority@2 を適用し三 worker 出力を merge。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: fan-in reducer
    field_values:
      aggregation_rule_ref: evidence-priority@2
    related_node_ids:
      - AggregationActivity
      - MergeRule
      - AggregationRule
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-activity-langgraph
      - claim-aggregation-activity-design
  - id: AggregationActivity-vote-tally
    labels:
      zh: 计票聚合活动
      en: Vote tally aggregation
      ja: 集計 aggregation
    descriptions:
      zh: VotingActivity 是 AggregationActivity 子类执行 borda-count@4。
      en: VotingActivity is AggregationActivity subtype applying borda-count@4.
      ja: VotingActivity が AggregationActivity 下位型で borda-count@4 を適用。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: voting tally
    field_values: {}
    related_node_ids:
      - AggregationActivity
      - VotingActivity
      - VotingRule
    related_relation_ids: []
    source_claims:
      - claim-aggregation-activity-anthropic
      - claim-aggregation-activity-design
  - id: AggregationActivity-boundary-rule
    labels:
      zh: 规则不是活动
      en: Rule is not activity
      ja: rule は activity ではない
    descriptions:
      zh: evidence-priority@2 是 MergeRule 规范不是 reduce 节点执行。
      en: evidence-priority@2 is MergeRule spec not reduce node execution.
      ja: evidence-priority@2 は MergeRule spec で reduce ノード実行ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus activity
    field_values: {}
    related_node_ids:
      - AggregationActivity
      - AggregationRule
    related_relation_ids: []
    source_claims:
      - claim-aggregation-activity-design
parent_relation:
  id: AggregationActivity-is_a-CompositionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 聚合活动继承组合活动的时间和状态身份，并以输入集合、所用规则和结算结果为种差。
    en: AggregationActivity inherits the time and state identity of CompositionActivity and is distinguished by input set, applied rule, and settlement result.
    ja: AggregationActivity は activity time/state identity を継承し input set・applied rule・settlement result を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-aggregation-activity-design
    - claim-aggregation-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: AggregationActivity-applies-AggregationRule
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用聚合规则
      en: applies aggregation rule
      ja: 集約規則を適用する
    definitions:
      zh: 一次聚合活动在结算输入集合时执行并记录某个不可变聚合规则版本及其参数。
      en: An AggregationActivity applies an immutable AggregationRule revision and records it with parameters when settling its input set.
      ja: AggregationActivity が input set settlement 時に immutable rule revision/parameters を実行・記録します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: applied_by_aggregation_activity
      labels:
        zh: 由聚合活动应用
        en: is applied by aggregation activity
        ja: aggregation activity に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-aggregation-activity-design
      - claim-aggregation-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AggregationRule
