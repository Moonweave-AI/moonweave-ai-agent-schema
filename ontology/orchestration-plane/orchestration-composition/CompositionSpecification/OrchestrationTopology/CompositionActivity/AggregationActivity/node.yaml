    ja: activity semantics と uses_topology/realizes cross-link は LangGraph runtime/graph API・PROV-O で確認済みです。ディレクトリは OrchestrationTopology 配下のままですが parent_relation は is_a ではなく uses_topology のため、後続の directory move が必要です。
