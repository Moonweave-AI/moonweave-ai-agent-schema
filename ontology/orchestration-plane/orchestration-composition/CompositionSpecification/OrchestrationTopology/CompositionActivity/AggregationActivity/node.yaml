schema: moonweave.ai/ontology-node/v1
id: AggregationActivity
kind: concept
status: review
labels:
  zh: 聚合活动
  en: aggregation activity
  ja: 集約活動
semantics:
  short_definition:
    zh: 在具体时间应用聚合规则，把一组输入结算为一个或多个组合输出的组合活动。
    en: A composition activity applying an aggregation rule at concrete times to settle an input set into one or more composition outputs.
    ja: concrete time に aggregation rule を適用し input set を composition outputs に確定する composition activity です。
  definition:
    zh: 聚合活动是 CompositionActivity 的子类，以活动标识、输入集合摘要、所用 AggregationRule、开始结束时间和结算状态为种差，是 Synthesis 与 VotingActivity 的上位概念。它表示真实发生的 fan-in 或归并，不是规则、模式或产物。
    en: An AggregationActivity is a CompositionActivity distinguished by activity ID, input-set digest, applied AggregationRule, start and end times, and settlement status and is the genus of Synthesis and VotingActivity. It is an actual fan-in or merge occurrence, not a rule, pattern, or artifact.
    ja: AggregationActivity は activity ID・input-set digest・applied rule・start/end・settlement status で区別される CompositionActivity で Synthesis/VotingActivity の genus です。rule・pattern・artifact ではありません。
  why_needed:
    zh: 共同上位层表达投票和综合都属于运行时聚合，同时保留两者不同的输入与输出种差。
    en: The common genus expresses that voting and synthesis are runtime aggregation while preserving their distinct input and output differentiae.
    ja: common genus により voting/synthesis の runtime aggregation 共通性と異なる input/output differentia を保持します。
  includes:
    - zh: 一次投票计票、一次多章节综合、一次并行分支 fan-in 或一次证据去重归并。
      en: One ballot count, multi-section synthesis, parallel-branch fan-in, or evidence-deduplication merge.
      ja: one ballot count・multi-section synthesis・parallel fan-in・evidence dedup merge。
  excludes:
    - zh: 聚合规则版本、综合模式、输入票据、最终报告以及仅等待分支但未归并内容的屏障。
      en: Aggregation-rule revisions, synthesis patterns, input ballots, final reports, and barriers that wait without merging content.
      ja: rule revision・synthesis pattern・input ballot・final report・content merge しない barrier。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: input_set_digest
      labels:
        zh: 输入集合摘要
        en: input-set digest
        ja: input set digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次被聚合输入的有序或无序集合。
        en: Fixes the ordered or unordered set aggregated in this occurrence.
        ja: 今回 aggregation の ordered/unordered input set を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:inputs-52
      source_claims:
        - claim-aggregation-activity-003
    - id: settlement_status
      labels:
        zh: 结算状态
        en: settlement status
        ja: settlement status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 collecting、settled、unresolved 或 failed。
        en: Records collecting, settled, unresolved, or failed.
        ja: collecting・settled・unresolved・failed を記録します。
      allowed_values: []
      pattern: null
      example_value: settled
      source_claims:
        - claim-aggregation-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: AggregationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 三分支证据汇合
      en: Three-branch evidence fan-in
      ja: three-branch evidence fan-in
    scenario_id: null
    descriptions:
      zh: aggregate-run-52 固定三条分支输出摘要，应用 deduplicate-by-source@2，并在 10:42 结算为 settled。
      en: aggregate-run-52 fixes three branch-output digests, applies deduplicate-by-source@2, and settles at 10:42.
      ja: aggregate-run-52 は three branch outputs を固定し rule を適用して 10:42 settled になります。
    field_values:
      composition_activity_id: aggregate-run-52
      topology_ref: report-topology@4
      started_at: 2026-07-16T10:42:00Z
      ended_at: 2026-07-16T10:42:05Z
      status: completed
      input_set_digest: sha256:inputs-52
      settlement_status: settled
    related_node_ids:
      - AggregationActivity
      - AggregationRule
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    expected_result:
      zh: 记录一次可追踪输入集合和规则版本的聚合发生。
      en: Record one aggregation occurrence with traceable inputs and rule revision.
      ja: traceable inputs/rule revision を持つ aggregation occurrence を記録します。
    why_valid_or_invalid:
      zh: 活动具有时间、输入快照、所用规则和结算状态。
      en: The activity has time, input snapshot, applied rule, and settlement state.
      ja: activity は time・input snapshot・applied rule・settlement state を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-aggregation-activity-001
      - claim-aggregation-activity-003
  - id: AggregationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 等待全部分支的同步屏障
      en: Barrier waiting for all branches
      ja: all branches 待機 barrier
    scenario_id: composition-review-aggregationactivity-boundary
    descriptions:
      zh: barrier-7 只等待三个分支结束并转移控制权，不检查内容、不应用规则，也不产生聚合输出。
      en: barrier-7 only waits for three branches and transfers control; it neither inspects content nor applies a rule or produces an aggregate output.
      ja: barrier-7 は branches を待って control transfer するだけで content/rule/output aggregation はありません。
    field_values: {}
    related_node_ids:
      - AggregationActivity
      - Parallelization
    related_relation_ids: []
    expected_result:
      zh: 保留为拓扑汇合控制，不分类为 AggregationActivity。
      en: Keep it as topology join control rather than an AggregationActivity.
      ja: topology join control とし AggregationActivity に分類しません。
    why_valid_or_invalid:
      zh: 仅同步控制流不满足对输入内容执行聚合的种差。
      en: Control-flow synchronization alone does not satisfy the differentia of aggregating input content.
      ja: control-flow synchronization だけでは input content aggregation differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-aggregation-activity-002
      - claim-aggregation-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: AggregationActivity-is_a-CompositionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 聚合活动继承组合活动的时间和状态身份，并以输入集合、所用规则和结算结果为种差。
    en: AggregationActivity inherits the time and state identity of CompositionActivity and is distinguished by input set, applied rule, and settlement result.
    ja: AggregationActivity は activity time/state identity を継承し input set・applied rule・settlement result を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AggregationActivity-is_a-CompositionActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: AggregationActivity 的有效分类
        en: Valid AggregationActivity classification
        ja: AggregationActivity の valid classification
      scenario_id: composition-relation-aggregationactivity-is_a-compositionactivity-positive
      descriptions:
        zh: aggregate-run-52 在具体时间固定三项输入、应用规则并结算为 settled。
        en: aggregate-run-52 fixes three inputs at concrete times, applies a rule, and settles as completed.
        ja: aggregate-run-52 は concrete time・three inputs・rule・settled result を持ちます。
      field_values: {}
      related_node_ids:
        - AggregationActivity
        - CompositionActivity
      related_relation_ids:
        - AggregationActivity-is_a-CompositionActivity
      expected_result:
        zh: 查询同时返回 CompositionActivity 上位类型与 AggregationActivity 下位类型。
        en: The query returns the CompositionActivity genus and the AggregationActivity subtype together.
        ja: query は CompositionActivity genus と AggregationActivity subtype をともに返します。
      why_valid_or_invalid:
        zh: 该记录保留 CompositionActivity 的共同身份并满足 AggregationActivity 的完整种差。
        en: The record retains CompositionActivity identity and satisfies the complete AggregationActivity differentia.
        ja: record は CompositionActivity identity を保持し AggregationActivity differentia を完全に満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-aggregation-activity-001
        - claim-aggregation-activity-003
    - id: AggregationActivity-is_a-CompositionActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: AggregationActivity 的近邻反例
        en: Near-boundary non-AggregationActivity
        ja: AggregationActivity near-boundary
      scenario_id: composition-relation-aggregationactivity-is_a-compositionactivity-boundary
      descriptions:
        zh: barrier-7 仅等待分支并转移控制，不检查或归并输入内容。
        en: barrier-7 only waits for branches and transfers control without inspecting or merging content.
        ja: barrier-7 は wait/control transfer のみで content aggregation はありません。
      field_values: {}
      related_node_ids:
        - AggregationActivity
        - CompositionActivity
      related_relation_ids:
        - AggregationActivity-is_a-CompositionActivity
      expected_result:
        zh: 不得仅凭相邻出现把该对象沿本关系归为 AggregationActivity。
        en: Do not classify the object as AggregationActivity through adjacency alone.
        ja: adjacency だけで object を AggregationActivity に分類しません。
      why_valid_or_invalid:
        zh: 该对象缺少 AggregationActivity 的身份条件，关系共现不能替代下位类型种差。
        en: The object lacks AggregationActivity identity conditions; relation co-occurrence cannot replace subtype differentia.
        ja: object は AggregationActivity identity conditions を欠き relation co-occurrence は subtype differentia を代替しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-aggregation-activity-001
        - claim-aggregation-activity-003
  source_claims:
    - claim-aggregation-activity-001
    - claim-aggregation-activity-003
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
