    supports: Voting tally is aggregation activity over ballots.
    locator: Voting pattern
    evidence_kind: design-inference
    confidence: high
  - id: claim-aggregation-activity-design
    source: composition-design
    supports: AggregationActivity applies versioned aggregation rules.
    locator: AggregationActivity boundary
    evidence_kind: design-inference
    confidence: high
