schema: moonweave.ai/ontology-node/v1
id: CompositionActivity
kind: concept
labels:
  zh: 组合活动
  en: composition activity
  ja: composition activity
semantics:
  short_definition:
    zh: 在具体时间按组合拓扑协调部件并消费或产生工件的运行活动。
    en: A runtime activity that coordinates parts under a composition topology and consumes or produces artifacts at concrete times.
    ja: composition topology に従い parts を coordinate し concrete time に artifact を consume/produce する runtime activity。
  definition:
    zh: 组合活动是一种活动，以活动标识、拓扑引用、开始与结束时间和状态为身份，作为 AggregationActivity 的上位概念。它实现 CompositionPattern 并使用 OrchestrationTopology；与规范不同，它确实发生并可消费或产生 CompositionArtifact。
    en: A CompositionActivity is an activity identified by activity ID, topology reference, start and end times, and status and is the genus of AggregationActivity. It realizes a CompositionPattern and uses an OrchestrationTopology; unlike a specification, it actually occurs and may consume or produce CompositionArtifact records.
    ja: CompositionActivity は activity ID・topology ref・start/end time・status で識別し AggregationActivity の genus です。Pattern を realize し Topology を use し、specification と異なり actual occurrence として Artifact を consume/produce します。
  why_needed:
    zh: 运行活动独立建模后，静态图不会被误读为已经执行，且每次运行可保留独立输入、输出与时间。
    en: Modeling runtime activity separately prevents a static graph from being read as executed and preserves inputs, outputs, and time per run.
    ja: runtime activity を別にし static graph を executed と誤読せず run ごとの input/output/time を保持します。
  includes:
    - zh: 按链式、并行、投票或综合模式发生的一次协调、汇合或聚合运行。
      en: One coordination, fan-in, voting, or synthesis run under chain, parallel, voting, or synthesis patterns.
      ja: chain・parallel・voting・synthesis pattern に従う one coordination/fan-in/aggregation run。
  excludes:
    - zh: 拓扑定义、模式模板、计划、输入工件、最终输出和仅记录候选路径的路由决定。
      en: Topology definitions, pattern templates, plans, input artifacts, final outputs, and routing decisions that only record candidate-path selection.
      ja: topology definition・pattern template・plan・input artifact・final output・routing decision。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 一次 LangGraph invoke、CrewAI kickoff 或 Send 派发映射为 CompositionActivity；须记录 topology_ref、realized_pattern_ref 与起止时间。
    en: One LangGraph invoke, CrewAI kickoff, or Send dispatch maps to CompositionActivity recording topology_ref, realized_pattern_ref, and start/end times.
    ja: 一回 LangGraph invoke・CrewAI kickoff・Send 派发を topology_ref/realized_pattern_ref/start-end 付き CompositionActivity へ写像します。
  typical_input:
    - description: Composition run occurrence.
      format: 'result = graph.invoke({"items": [...]})  # composition-run-204'
      source_claims:
        - claim-composition-activity-design
  typical_output:
    - description: Moonweave CompositionActivity.
      format: '{"composition_activity_id": "composition-run-204", "topology_ref": "report-topology@11", "started_at": "2026-07-16T04:20:00Z"}'
      source_claims:
        - claim-composition-activity-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys:
    - composition_activity_id
  fields:
    - id: composition_activity_id
      labels:
        zh: 组合活动标识
        en: composition-activity ID
        ja: composition activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次具体组合运行。
        en: Stably identifies one concrete composition run.
        ja: one concrete composition run を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: composition-run-884
      source_claims:
        - claim-composition-activity-design
    - id: topology_ref
      labels:
        zh: 拓扑引用
        en: topology reference
        ja: topology reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动实际使用的 OrchestrationTopology 版本。
        en: References the OrchestrationTopology revision actually used by this activity.
        ja: activity が actual use した OrchestrationTopology revision を参照します。
      allowed_values: []
      pattern: null
      example_value: report-topology@4
      source_claims:
        - claim-composition-activity-design
        - claim-composition-activity-design
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录组合活动取得控制权的时间。
        en: Records when the composition activity received control.
        ja: composition activity が control を受けた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-composition-activity-design
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: ended at
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录活动完成、失败或取消的时间。
        en: Records when the activity completed, failed, or was cancelled.
        ja: activity complete/fail/cancel time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:22:00Z
      source_claims:
        - claim-composition-activity-design
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: activity status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 cancelled。
        en: Records queued, running, completed, failed, or cancelled.
        ja: queued・running・completed・failed・cancelled を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-composition-activity-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionActivity-langgraph-run
    labels:
      zh: LangGraph 组合运行
      en: LangGraph composition run
      ja: LangGraph 構成 run
    descriptions:
      zh: composition-run-204 04:20 开始，锁定 report-topology@11 与 parallelization@2。
      en: composition-run-204 starts 04:20 locking report-topology@11 and parallelization@2.
      ja: composition-run-204 が 04:20 開始し report-topology@11 と parallelization@2 を固定。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: graph invoke
    field_values:
      composition_activity_id: composition-run-204
      topology_ref: report-topology@11
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
    source_claims:
      - claim-composition-activity-langgraph
      - claim-composition-activity-design
  - id: CompositionActivity-crewai-kickoff
    labels:
      zh: CrewAI crew 运行
      en: CrewAI crew run
      ja: CrewAI crew run
    descriptions:
      zh: composition-crew-31 kickoff 实现 parallelization@1 的两分支并行。
      en: composition-crew-31 kickoff realizes parallelization@1 with two parallel branches.
      ja: composition-crew-31 kickoff が parallelization@1 の二 branch 並列を実現。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: crew.kickoff()
    field_values:
      composition_activity_id: composition-crew-31
    related_node_ids:
      - CompositionActivity
      - Parallelization
    related_relation_ids: []
    source_claims:
      - claim-composition-activity-crewai
      - claim-composition-activity-design
  - id: CompositionActivity-boundary-topology
    labels:
      zh: 拓扑不是活动
      en: Topology is not activity
      ja: topology は activity ではない
    descriptions:
      zh: report-topology@11 无开始时间，是 OrchestrationTopology 不是 CompositionActivity。
      en: report-topology@11 has no start time and is OrchestrationTopology not CompositionActivity.
      ja: report-topology@11 は start time なし OrchestrationTopology で CompositionActivity ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-composition-activity-design
parent_relation:
  id: CompositionActivity-uses_topology-OrchestrationTopology
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 使用编排拓扑
    en: uses orchestration topology
    ja: 編成 topology を使用する
  definitions:
    zh: 一次组合活动引用它实际执行的不可变编排拓扑版本，以确定部件、入口、出口和连接约束。
    en: A CompositionActivity uses the immutable OrchestrationTopology revision actually executed to determine parts, entry, exit, and connection constraints.
    ja: CompositionActivity は actual execution の immutable topology revision を参照し parts・entry・exit・connections を決めます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被组合活动使用
      en: is used by composition activity
      ja: composition activity に使用される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-composition-activity-design
    - claim-composition-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CompositionActivity-realizes-CompositionPattern
    predicate: realizes
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 实现组合模式
      en: realizes composition pattern
      ja: 構成パターンを実現する
    definitions:
      zh: 一次组合活动的运行轨迹满足某组合模式版本的控制形态、部件协调和完成语义时，该活动实现该模式。
      en: A CompositionActivity realizes a CompositionPattern revision when its run trace satisfies the pattern's control shape, part coordination, and completion semantics.
      ja: activity trace が pattern revision の control shape・part coordination・completion semantics を満たすとき realizes 関係が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: realized_by_activity
      labels:
        zh: 由组合活动实现
        en: is realized by composition activity
        ja: composition activity により実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-composition-activity-design
      - claim-composition-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CompositionPattern
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-composition-activity-langgraph
    source: langgraph
    supports: Graph invocation is time-bounded composition activity.
    locator: Runtime execution
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-activity-crewai
    source: crewai
    supports: Crew kickoff is composition activity occurrence.
    locator: crew.kickoff
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-activity-design
    source: composition-design
    supports: CompositionActivity realizes topology and pattern specs.
    locator: CompositionActivity boundary
    evidence_kind: design-inference
    confidence: high
