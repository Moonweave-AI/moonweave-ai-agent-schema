schema: moonweave.ai/ontology-node/v1
id: CompositionActivity
kind: concept
status: review
labels:
  zh: 组合活动
  en: composition activity
  ja: composition activity
semantics:
  short_definition:
    zh: 在具体时间按组合拓扑协调部件并消费或产生工件的运行活动。
    en: A runtime activity that coordinates parts under a composition topology and consumes or produces artifacts at concrete times.
    ja: composition topology に従い parts を coordinate し concrete time に artifact を consume/produce する runtime activity。
  definition:
    zh: 组合活动是一种活动，以活动标识、拓扑引用、开始与结束时间和状态为身份，作为 AggregationActivity 的上位概念。它实现 CompositionPattern 并使用 OrchestrationTopology；与规范不同，它确实发生并可消费或产生 CompositionArtifact。
    en: A CompositionActivity is an activity identified by activity ID, topology reference, start and end times, and status and is the genus of AggregationActivity. It realizes a CompositionPattern and uses an OrchestrationTopology; unlike a specification, it actually occurs and may consume or produce CompositionArtifact records.
    ja: CompositionActivity は activity ID・topology ref・start/end time・status で識別し AggregationActivity の genus です。Pattern を realize し Topology を use し、specification と異なり actual occurrence として Artifact を consume/produce します。
  why_needed:
    zh: 运行活动独立建模后，静态图不会被误读为已经执行，且每次运行可保留独立输入、输出与时间。
    en: Modeling runtime activity separately prevents a static graph from being read as executed and preserves inputs, outputs, and time per run.
    ja: runtime activity を別にし static graph を executed と誤読せず run ごとの input/output/time を保持します。
  includes:
    - zh: 按链式、并行、投票或综合模式发生的一次协调、汇合或聚合运行。
      en: One coordination, fan-in, voting, or synthesis run under chain, parallel, voting, or synthesis patterns.
      ja: chain・parallel・voting・synthesis pattern に従う one coordination/fan-in/aggregation run。
  excludes:
    - zh: 拓扑定义、模式模板、计划、输入工件、最终输出和仅记录候选路径的路由决定。
      en: Topology definitions, pattern templates, plans, input artifacts, final outputs, and routing decisions that only record candidate-path selection.
      ja: topology definition・pattern template・plan・input artifact・final output・routing decision。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - composition_activity_id
  fields:
    - id: composition_activity_id
      labels:
        zh: 组合活动标识
        en: composition-activity ID
        ja: composition activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次具体组合运行。
        en: Stably identifies one concrete composition run.
        ja: one concrete composition run を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: composition-run-884
      source_claims:
        - claim-composition-activity-003
    - id: topology_ref
      labels:
        zh: 拓扑引用
        en: topology reference
        ja: topology reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动实际使用的 OrchestrationTopology 版本。
        en: References the OrchestrationTopology revision actually used by this activity.
        ja: activity が actual use した OrchestrationTopology revision を参照します。
      allowed_values: []
      pattern: null
      example_value: report-topology@4
      source_claims:
        - claim-composition-activity-001
        - claim-composition-activity-002
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录组合活动取得控制权的时间。
        en: Records when the composition activity received control.
        ja: composition activity が control を受けた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:20:00Z
      source_claims:
        - claim-composition-activity-003
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: ended at
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录活动完成、失败或取消的时间。
        en: Records when the activity completed, failed, or was cancelled.
        ja: activity complete/fail/cancel time を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:22:00Z
      source_claims:
        - claim-composition-activity-003
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: activity status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 queued、running、completed、failed 或 cancelled。
        en: Records queued, running, completed, failed, or cancelled.
        ja: queued・running・completed・failed・cancelled を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-composition-activity-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 运行报告组合拓扑
      en: Run report composition topology
      ja: report composition topology run
    scenario_id: null
    descriptions:
      zh: composition-run-884 于 04:20 使用 report-topology@4，协调三个分区并在 04:22 完成。
      en: composition-run-884 uses report-topology@4 at 04:20, coordinates three sections, and completes at 04:22.
      ja: composition-run-884 は 04:20 report-topology@4 を use、three sections を coordinate し 04:22 complete します。
    field_values:
      composition_activity_id: composition-run-884
      topology_ref: report-topology@4
      started_at: 2026-07-16T04:20:00Z
      ended_at: 2026-07-16T04:22:00Z
      status: completed
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
    expected_result:
      zh: 建立一次有状态、时间和拓扑版本的组合活动。
      en: Create one composition activity with state, time, and topology revision.
      ja: state・time・topology revision を持つ composition activity を作成します。
    why_valid_or_invalid:
      zh: 活动标识、拓扑、开始结束时间和状态共同证明一次发生。
      en: Activity ID, topology, start/end times, and status jointly prove one occurrence.
      ja: activity ID・topology・start/end time・status が one occurrence を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-activity-001
      - claim-composition-activity-003
  - id: CompositionActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 尚未执行的拓扑模板
      en: Unexecuted topology template
      ja: unexecuted topology template
    scenario_id: composition-review-compositionactivity-boundary
    descriptions:
      zh: report-topology@4 声明节点、部件和模式，但没有活动标识、运行时间或状态。
      en: report-topology@4 declares nodes, parts, and a pattern but has no activity ID, runtime time, or state.
      ja: report-topology@4 は nodes/parts/pattern を宣言しますが activity ID/runtime time/state がありません。
    field_values: {}
    related_node_ids:
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    expected_result:
      zh: 只保留为组合规范，不创建 CompositionActivity。
      en: Keep it as a composition specification and do not create CompositionActivity.
      ja: composition specification のみとし CompositionActivity を作りません。
    why_valid_or_invalid:
      zh: 结构可执行不等于已经发生一次有时间的运行活动。
      en: Executable structure does not mean a time-bounded run occurred.
      ja: executable structure は time-bounded run occurrence を意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-activity-001
      - claim-composition-activity-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: CompositionActivity-uses_topology-OrchestrationTopology
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 使用编排拓扑
    en: uses orchestration topology
    ja: 編成 topology を使用する
  definitions:
    zh: 一次组合活动引用它实际执行的不可变编排拓扑版本，以确定部件、入口、出口和连接约束。
    en: A CompositionActivity uses the immutable OrchestrationTopology revision actually executed to determine parts, entry, exit, and connection constraints.
    ja: CompositionActivity は actual execution の immutable topology revision を参照し parts・entry・exit・connections を決めます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被组合活动使用
      en: is used by composition activity
      ja: composition activity に使用される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: CompositionActivity-uses_topology-OrchestrationTopology-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 使用编排拓扑正例
        en: Valid uses orchestration topology
        ja: 編成 topology を使用するの正例
      scenario_id: composition-relation-compositionactivity-uses_topology-orchestrationtopology-positive
      descriptions:
        zh: composition-run-884 的 topology_ref 精确为 report-topology@4，并按该版本入口与部件运行。
        en: composition-run-884 has topology_ref report-topology@4 and runs with that revision's entry and parts.
        ja: composition-run-884 は exact topology revision の entry/parts を使用します。
      field_values: {}
      related_node_ids:
        - CompositionActivity
        - OrchestrationTopology
      related_relation_ids:
        - CompositionActivity-uses_topology-OrchestrationTopology
      expected_result:
        zh: 返回活动到确切拓扑版本的运行事实。
        en: Return the activity-to-exact-topology-revision operational fact.
        ja: activity-to-exact-topology-revision fact を返します。
      why_valid_or_invalid:
        zh: 活动记录的不可变 topology_ref 直接证明实际使用版本。
        en: The immutable topology_ref on the activity directly proves the revision used.
        ja: activity の immutable topology_ref が used revision を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-composition-activity-001
        - claim-composition-activity-003
    - id: CompositionActivity-uses_topology-OrchestrationTopology-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 使用编排拓扑拒绝边界
        en: Boundary for uses orchestration topology
        ja: 編成 topology を使用するの境界
      scenario_id: composition-relation-compositionactivity-uses_topology-orchestrationtopology-boundary
      descriptions:
        zh: 同名 report-topology@5 已发布，但 composition-run-884 仍引用版本 4。
        en: A same-named report-topology@5 is published, but composition-run-884 still references revision four.
        ja: new topology revision があっても run は revision four を参照します。
      field_values: {}
      related_node_ids:
        - CompositionActivity
        - OrchestrationTopology
      related_relation_ids:
        - CompositionActivity-uses_topology-OrchestrationTopology
      expected_result:
        zh: 不得自动把历史活动重连到最新拓扑版本。
        en: Do not reconnect the historical activity to the latest topology revision.
        ja: historical activity を latest topology revision に再接続しません。
      why_valid_or_invalid:
        zh: 运行可重放性要求保留实际使用的不可变版本。
        en: Run reproducibility requires preserving the immutable revision actually used.
        ja: run reproducibility は actual immutable revision の保持を要求します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-composition-activity-001
        - claim-composition-activity-003
  source_claims:
    - claim-composition-activity-001
    - claim-composition-activity-003
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: CompositionActivity-realizes-CompositionPattern
    predicate: realizes
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 实现组合模式
      en: realizes composition pattern
      ja: 構成パターンを実現する
    definitions:
      zh: 一次组合活动的运行轨迹满足某组合模式版本的控制形态、部件协调和完成语义时，该活动实现该模式。
      en: A CompositionActivity realizes a CompositionPattern revision when its run trace satisfies the pattern's control shape, part coordination, and completion semantics.
      ja: activity trace が pattern revision の control shape・part coordination・completion semantics を満たすとき realizes 関係が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: realized_by_activity
      labels:
        zh: 由组合活动实现
        en: is realized by composition activity
        ja: composition activity により実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CompositionActivity-realizes-CompositionPattern-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 实现组合模式正例
          en: Valid realizes composition pattern
          ja: 構成パターンを実現するの正例
        scenario_id: composition-relation-compositionactivity-realizes-compositionpattern-positive
        descriptions:
          zh: composition-run-884 的 fan-out、section 汇合和 synthesis 完成条件符合 report-by-control-family@4（Sectioning）及其拓扑约束。
          en: composition-run-884's fan-out, section join, and synthesis completion satisfy report-by-control-family@4 (Sectioning) and its topology constraints.
          ja: run trace は pattern の fan-out・join・completion semantics を満たします。
        field_values: {}
        related_node_ids:
          - CompositionActivity
          - CompositionPattern
        related_relation_ids:
          - CompositionActivity-realizes-CompositionPattern
        expected_result:
          zh: 返回运行活动到实际实现模式版本的事实。
          en: Return the run-activity-to-realized-pattern fact.
          ja: activity-to-realized-pattern fact を返します。
        why_valid_or_invalid:
          zh: 轨迹证据覆盖该模式的启动、协调与完成条件。
          en: Trace evidence covers the pattern's launch, coordination, and completion conditions.
          ja: trace evidence が launch・coordination・completion を cover します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-composition-activity-002
          - claim-composition-activity-001
      - id: CompositionActivity-realizes-CompositionPattern-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 实现组合模式拒绝边界
          en: Boundary for realizes composition pattern
          ja: 構成パターンを実現するの境界
        scenario_id: composition-relation-compositionactivity-realizes-compositionpattern-boundary
        descriptions:
          zh: 活动只使用带并行外观的拓扑，但两个分支实际存在未声明的顺序依赖。
          en: The activity uses a parallel-looking topology, but its branches have an undeclared sequential dependency.
          ja: parallel-looking topology でも branches に sequential dependency があります。
        field_values: {}
        related_node_ids:
          - CompositionActivity
          - CompositionPattern
        related_relation_ids:
          - CompositionActivity-realizes-CompositionPattern
        expected_result:
          zh: 不得仅凭拓扑标签断言活动实现 Parallelization。
          en: Do not infer realization of Parallelization from the topology label alone.
          ja: topology label だけで Parallelization realization を主張しません。
        why_valid_or_invalid:
          zh: 实现关系要求运行轨迹满足模式语义，而不是名称相似。
          en: Realization requires the trace to satisfy pattern semantics, not name similarity.
          ja: realization は trace semantics を要求し name similarity ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-composition-activity-002
          - claim-composition-activity-001
    source_claims:
      - claim-composition-activity-002
      - claim-composition-activity-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:CompositionPattern
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 活动语义与 uses_topology/realizes 横向关系已对照 LangGraph 运行/图 API 与 PROV-O 核验通过；目录仍置于 OrchestrationTopology 下，但 parent_relation 为 uses_topology 而非 is_a，后续需目录迁移。
    en: Activity semantics and uses_topology/realizes cross-links were verified against LangGraph runtime/graph API and PROV-O; the directory still sits under OrchestrationTopology, but parent_relation is uses_topology not is_a, so a later directory move remains.
    ja: activity semantics と uses_topology/realizes cross-link は LangGraph runtime/graph API・PROV-O で確認済みです。ディレクトリは OrchestrationTopology 配下のままですが parent_relation は is_a ではなく uses_topology のため、後続の directory move が必要です。
  sections:
    semantics: accepted
    hierarchy: pending
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-composition-activity-001
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API defines workflows through state, executable nodes, and fixed or conditional edges, including fan-out and fan-in behavior. Moonweave uses that operational evidence to distinguish a reusable OrchestrationTopology from its parts and from a time-bounded CompositionActivity that realizes the topology.
    locator: "Graph API overview: Graphs, Nodes, Edges, normal edges, conditional edges, and parallel supersteps"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-composition-activity-002
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-composition-activity-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
