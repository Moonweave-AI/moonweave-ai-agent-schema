schema: moonweave.ai/ontology-node/v1
id: OrchestrationTopology
kind: concept
labels:
  zh: 编排拓扑
  en: orchestration topology
  ja: orchestration topology
semantics:
  short_definition:
    zh: 固定入口、出口、部件集合及其连接约束的组合规范。
    en: A composition specification fixing entry, exit, part set, and connection constraints.
    ja: entry・exit・part set・connection constraint を固定する composition specification。
  definition:
    zh: 编排拓扑是 CompositionSpecification 的子类，其种差是以拓扑标识、版本、入口部件、出口部件和连接约束描述一张可执行结构图。它使用 CompositionPattern 并包含 CompositionPart，但 uses_pattern 与 contains 是横向事实，不是继承关系。
    en: An OrchestrationTopology is a CompositionSpecification distinguished by topology ID, revision, entry parts, exit parts, and connection constraints describing an executable structural graph. It uses a CompositionPattern and contains CompositionPart records, but uses_pattern and contains are cross-links rather than inheritance.
    ja: OrchestrationTopology は topology ID・revision・entry/exit parts・connection constraints で executable structure graph を記述する subtype です。Pattern を use、Part を contain しますが cross-link で inheritance ではありません。
  why_needed:
    zh: 拓扑拥有具体结构身份，使模式可复用，同时防止包含关系被错误画成类型层级。
    en: Concrete topology identity allows pattern reuse while preventing containment from being drawn as a type hierarchy.
    ja: concrete topology identity により pattern reuse を可能にし containment を type hierarchy と誤描画しません。
  includes:
    - zh: 具有版本、入口、出口、部件清单和连接约束的工作流结构定义。
      en: Workflow-structure definitions with revision, entry, exit, part inventory, and connection constraints.
      ja: revision・entry・exit・part inventory・connection constraints を持つ workflow structure definition。
  excludes:
    - zh: 抽象模式、单个部件、运行时图状态、路由决定和框架导出的截图。
      en: Abstract patterns, individual parts, runtime graph state, routing decisions, and screenshots exported by a framework.
      ja: abstract pattern・individual part・runtime graph state・routing decision・framework screenshot。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph StateGraph 边与节点、CrewAI crew 结构映射为 OrchestrationTopology；通过 contains/uses_pattern 组织 Part 与 Pattern，CompositionActivity 锁定 topology@version。
    en: LangGraph StateGraph edges and nodes, CrewAI crew structure map to OrchestrationTopology organizing Parts and Patterns via contains/uses_pattern; CompositionActivity locks topology@version.
    ja: LangGraph StateGraph 辺/node・CrewAI crew 構造を OrchestrationTopology へ写像し contains/uses_pattern で Part/Pattern を編成、CompositionActivity が topology@version を固定します。
  typical_input:
    - description: Compiled graph topology.
      format: builder.add_node("plan", plan); builder.add_conditional_edges("plan", dispatch_workers)
      source_claims:
        - claim-orchestration-topology-design
  typical_output:
    - description: Moonweave OrchestrationTopology.
      format: '{"topology_id": "report-topology", "version": "11"}'
      source_claims:
        - claim-orchestration-topology-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: entry_part_refs
      labels:
        zh: 入口部件引用
        en: entry-part references
        ja: entry-part references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出取得初始控制权的 CompositionPart。
        en: Lists CompositionPart records receiving initial control.
        ja: initial control を受ける CompositionPart を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - plan-stage
      source_claims:
        - claim-orchestration-topology-design
    - id: exit_part_refs
      labels:
        zh: 出口部件引用
        en: exit-part references
        ja: exit-part references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出完成拓扑所需的终点部件。
        en: Lists terminal parts required to complete the topology.
        ja: topology completion に必要な terminal parts を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - synthesis-stage
      source_claims:
        - claim-orchestration-topology-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: OrchestrationTopology-langgraph
    labels:
      zh: LangGraph 图拓扑
      en: LangGraph graph topology
      ja: LangGraph graph topology
    descriptions:
      zh: report-topology@11 含 plan/worker/reduce 节点与 Send 边。
      en: report-topology@11 contains plan/worker/reduce nodes and Send edges.
      ja: report-topology@11 が plan/worker/reduce node と Send 辺を含む。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: StateGraph
    field_values:
      topology_id: report-topology
      version: "11"
    related_node_ids:
      - OrchestrationTopology
      - ParallelBranch
      - CompositionActivity
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
    source_claims:
      - claim-orchestration-topology-langgraph
      - claim-orchestration-topology-design
  - id: OrchestrationTopology-crewai
    labels:
      zh: CrewAI crew 拓扑
      en: CrewAI crew topology
      ja: CrewAI crew topology
    descriptions:
      zh: crew-parallel-topology@3 组织 researcher/analyst/writer 任务槽。
      en: crew-parallel-topology@3 organizes researcher/analyst/writer task slots.
      ja: crew-parallel-topology@3 が researcher/analyst/writer task slot を編成。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: crew structure
    field_values:
      topology_id: crew-parallel-topology
      version: "3"
    related_node_ids:
      - OrchestrationTopology
      - Parallelization
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
    source_claims:
      - claim-orchestration-topology-crewai
      - claim-orchestration-topology-design
  - id: OrchestrationTopology-boundary-run
    labels:
      zh: 运行不是拓扑
      en: Run is not topology
      ja: run は topology ではない
    descriptions:
      zh: composition-run-204 引用 report-topology@11 但自身是发生不是拓扑规范。
      en: composition-run-204 references report-topology@11 but is occurrence not topology spec.
      ja: composition-run-204 は report-topology@11 を参照するが occurrence で topology spec ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-orchestration-topology-design
parent_relation:
  id: OrchestrationTopology-is_a-CompositionSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 编排拓扑继承组合规范身份，并以具体入口、出口、部件集合和连接约束为种差。
    en: OrchestrationTopology inherits composition-specification identity and is distinguished by concrete entry, exit, part set, and connection constraints.
    ja: OrchestrationTopology は composition specification identity を継承し concrete entry・exit・part set・connection constraints を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-orchestration-topology-design
    - claim-orchestration-topology-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: OrchestrationTopology-contains-CompositionPart
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 包含组合部件
      en: contains composition part
      ja: 構成部品を含む
    definitions:
      zh: 一项编排拓扑的不可变版本把某组合部件列为其结构成员；该事实表达成员资格而非部件是一种拓扑。
      en: An immutable OrchestrationTopology revision contains a CompositionPart when the part is listed as a structural member; the fact expresses membership, not that the part is a topology subtype.
      ja: immutable topology revision が part を structural member として列挙する membership relation で subtype relation ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: part_of_topology
      labels:
        zh: 属于编排拓扑
        en: is part of topology
        ja: topology の部品である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-orchestration-topology-design
      - claim-orchestration-topology-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CompositionPart
  - id: OrchestrationTopology-uses_pattern-CompositionPattern
    predicate: uses_pattern
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 采用组合模式
      en: uses composition pattern
      ja: 構成パターンを使用する
    definitions:
      zh: 一项编排拓扑采用某一组合模式版本作为其总体控制形态，但拓扑仍由自己的部件、入口和出口确定身份。
      en: An OrchestrationTopology uses a CompositionPattern revision as its overall control shape while retaining identity through its own parts, entry, and exit.
      ja: OrchestrationTopology は CompositionPattern revision を overall control shape として使用し own parts・entry・exit で identity を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
      en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
      ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
    inverse_reading:
      predicate: pattern_used_by_topology
      labels:
        zh: 被拓扑采用
        en: is used by topology
        ja: topology に使用される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-orchestration-topology-design
      - claim-orchestration-topology-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CompositionPattern
