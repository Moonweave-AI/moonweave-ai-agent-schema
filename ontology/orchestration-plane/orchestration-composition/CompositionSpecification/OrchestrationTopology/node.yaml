schema: moonweave.ai/ontology-node/v1
id: OrchestrationTopology
kind: concept
labels:
  zh: 编排拓扑
  en: orchestration topology
  ja: orchestration topology
semantics:
  short_definition:
    zh: 固定入口、出口、部件集合及其连接约束的组合规范。
    en: A composition specification fixing entry, exit, part set, and connection constraints.
    ja: entry・exit・part set・connection constraint を固定する composition specification。
  definition:
    zh: 编排拓扑是 CompositionSpecification 的子类，其种差是以拓扑标识、版本、入口部件、出口部件和连接约束描述一张可执行结构图。它使用 CompositionPattern 并包含 CompositionPart，但 uses_pattern 与 contains 是横向事实，不是继承关系。
    en: An OrchestrationTopology is a CompositionSpecification distinguished by topology ID, revision, entry parts, exit parts, and connection constraints describing an executable structural graph. It uses a CompositionPattern and contains CompositionPart records, but uses_pattern and contains are cross-links rather than inheritance.
    ja: OrchestrationTopology は topology ID・revision・entry/exit parts・connection constraints で executable structure graph を記述する subtype です。Pattern を use、Part を contain しますが cross-link で inheritance ではありません。
  why_needed:
    zh: 拓扑拥有具体结构身份，使模式可复用，同时防止包含关系被错误画成类型层级。
    en: Concrete topology identity allows pattern reuse while preventing containment from being drawn as a type hierarchy.
    ja: concrete topology identity により pattern reuse を可能にし containment を type hierarchy と誤描画しません。
  includes:
    - zh: 具有版本、入口、出口、部件清单和连接约束的工作流结构定义。
      en: Workflow-structure definitions with revision, entry, exit, part inventory, and connection constraints.
      ja: revision・entry・exit・part inventory・connection constraints を持つ workflow structure definition。
  excludes:
    - zh: 抽象模式、单个部件、运行时图状态、路由决定和框架导出的截图。
      en: Abstract patterns, individual parts, runtime graph state, routing decisions, and screenshots exported by a framework.
      ja: abstract pattern・individual part・runtime graph state・routing decision・framework screenshot。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      OrchestrationTopology 把 entry_part_refs、exit_part_refs、part 集合与 pattern_ref 编译为 LangGraph
      StateGraph。CompositionActivity 引用 topology revision 记录实际执行，但不把节点运行态写回拓扑规范。
    en: >-
      OrchestrationTopology compiles entry_part_refs, exit_part_refs, part inventory, and pattern_ref into a
      LangGraph StateGraph. CompositionActivity references a topology revision for execution without writing node
      runtime state back into the topology specification.
    ja: >-
      OrchestrationTopology は entry/exit/part set/pattern_ref を LangGraph StateGraph にコンパイルする。
      CompositionActivity は topology revision を参照するが node runtime state を topology spec に書き戻さない。
  typical_input:
    - description:
        zh: 带入口、出口、部件清单与模式引用的拓扑规约 revision。
        en: Topology specification revision with entry, exit, part inventory, and pattern reference.
        ja: entry/exit/part inventory/pattern reference を持つ topology spec revision。
      format: |-
        {"topology_id":"report-topology","version":"4","entry_part_refs":["intake"],"exit_part_refs":["publish"],"pattern_ref":"parallel-review@3","part_refs":["section-finance","section-ops","synthesizer"]}
  typical_output:
    - description:
        zh: 图编译器生成的可 invoke 图绑定。
        en: Invokable graph binding produced by the graph compiler.
        ja: graph compiler が生成する invokable graph binding。
      format: |-
        {"topology_ref":"report-topology@4","compiled_graph_id":"graph-report-v4","nodes":["intake","section_finance","section_ops","synthesizer","publish"]}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents StateGraph compilation from nodes, edges, and entry points.
  source_claims:
    - claim-orchestration-topology-001
    - claim-orchestration-topology-002
structure:
  identity_keys: []
  fields:
    - id: entry_part_refs
      labels:
        zh: 入口部件引用
        en: entry-part references
        ja: entry-part references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出取得初始控制权的 CompositionPart。
        en: Lists CompositionPart records receiving initial control.
        ja: initial control を受ける CompositionPart を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - plan-stage
      source_claims:
        - claim-orchestration-topology-001
    - id: exit_part_refs
      labels:
        zh: 出口部件引用
        en: exit-part references
        ja: exit-part references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出完成拓扑所需的终点部件。
        en: Lists terminal parts required to complete the topology.
        ja: topology completion に必要な terminal parts を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - synthesis-stage
      source_claims:
        - claim-orchestration-topology-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: OrchestrationTopology-example-positive-manual-20260716
    labels:
      zh: OrchestrationTopology positive
      en: OrchestrationTopology positive
      ja: OrchestrationTopology positive
    descriptions:
      zh: Prefect 数据流编排映射 OrchestrationTopology：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps OrchestrationTopology: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect OrchestrationTopology: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {composition_specification_id: report-topology, version: 4, valid_from: 2026-07-16T00:00:00Z}

    related_node_ids:
      - OrchestrationTopology
      - CompositionPart
      - CompositionPattern
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-orchestration-topology-001
      - claim-orchestration-topology-002

  - id: OrchestrationTopology-example-boundary-manual-20260716
    labels:
      zh: OrchestrationTopology boundary
      en: OrchestrationTopology boundary
      ja: OrchestrationTopology boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 OrchestrationTopology 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not OrchestrationTopology delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で OrchestrationTopology delegation spec ではない。
    field_values: {}

    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-orchestration-topology-001
      - claim-orchestration-topology-003

  - id: OrchestrationTopology-example-counterexample-manual-20260719
    labels:
      zh: OrchestrationTopology counterexample
      en: OrchestrationTopology counterexample
      ja: OrchestrationTopology counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 OrchestrationTopology DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style OrchestrationTopology DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 OrchestrationTopology ではない。
    field_values: {composition_specification_id: absent, entry_part_refs: absent, exit_part_refs: absent, version: absent, native_impl: langgraph-compiled-graph, thread_id: thread-884}

    related_node_ids:
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-orchestration-topology-002
      - claim-orchestration-topology-003

  - id: OrchestrationTopology-example-instance-manual-20260719
    labels:
      zh: OrchestrationTopology instance
      en: OrchestrationTopology instance
      ja: OrchestrationTopology instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 OrchestrationTopology policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to OrchestrationTopology policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が OrchestrationTopology policy-prefect@1 に写像。
    field_values: {composition_specification_id: report-topology, version: 4, valid_from: 2026-07-16T00:00:00Z}

    related_node_ids:
      - OrchestrationTopology
      - CompositionPart
      - CompositionPattern
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-orchestration-topology-001
      - claim-orchestration-topology-002

sources:
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents StateGraph compilation from nodes, edges, and entry points.
source_claims:
  - id: claim-orchestration-topology-001
    source: langgraph-graph-api
    supports: Orchestration topology revisions bind concrete parts, entry, exit, and pattern references into a compilable graph structure.
    locator: Graph API, StateGraph compilation
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-topology-002
    source: langgraph-graph-api
    supports: A topology revision is identified by immutable structural parts rather than one run's dynamic node status.
    locator: Graph API invoke versus graph definition
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-topology-003
    source: langgraph-graph-api
    supports: Runtime activity state showing completed or failed nodes belongs to CompositionActivity, not a new topology revision.
    locator: Graph API execution trace
    evidence_kind: design-inference
    confidence: high
