        zh: 出口部件引用
        en: exit-part references
        ja: exit-part references
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出完成拓扑所需的终点部件。
        en: Lists terminal parts required to complete the topology.
        ja: topology completion に必要な terminal parts を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - synthesis-stage
      source_claims:
        - claim-orchestration-topology-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: OrchestrationTopology-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告生成拓扑
      en: Report-generation topology
      ja: report generation topology
    scenario_id: null
    descriptions:
      zh: report-topology@4 以 plan-stage 为入口、synthesis-stage 为出口，包含三个 section part，并通过 Sectioning 模式（report-by-control-family@4）实现 LangGraph/Anthropic 所称的 orchestrator-worker 静态分区结构。
      en: report-topology@4 enters at plan-stage, exits at synthesis-stage, contains three section parts, and implements the static partition structure of LangGraph/Anthropic orchestrator-worker through the Sectioning pattern report-by-control-family@4.
      ja: report-topology@4 は plan-stage entry、synthesis-stage exit、three section parts を contain し Sectioning pattern report-by-control-family@4 により LangGraph/Anthropic orchestrator-worker の static partition structure を実装します。
