      composition_specification_id: report-topology
      version: "4"
      valid_from: 2026-07-16T00:00:00Z
      entry_part_refs:
        - plan-stage
      exit_part_refs:
        - synthesis-stage
    related_node_ids:
      - OrchestrationTopology
      - CompositionPart
      - CompositionPattern
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
      - OrchestrationTopology-contains-CompositionPart
    expected_result:
      zh: 建立一张引用模式与部件的版本化拓扑。
      en: Create a versioned topology referencing its pattern and parts.
      ja: pattern/parts を参照する versioned topology を作成します。
    why_valid_or_invalid:
      zh: 入口、出口、部件清单、模式和版本共同确定拓扑身份。
      en: Entry, exit, part inventory, pattern, and revision jointly determine topology identity.
      ja: entry・exit・part inventory・pattern・revision が topology identity を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
