schema: moonweave.ai/ontology-node/v1
id: CompositionArtifact
kind: concept
labels:
  zh: 组合工件
  en: composition artifact
  ja: composition artifact
semantics:
  short_definition:
    zh: 被组合活动消费或产生、具有固定内容摘要和媒体类型的信息实体。
    en: An information entity with fixed content digest and media type consumed or produced by a composition activity.
    ja: composition activity が consume/produce し fixed digest/media type を持つ information entity。
  definition:
    zh: 组合工件是一种信息实体，以工件标识、媒体类型、内容摘要和产生时间为身份，作为 CompositionOutput、SynthesisInput 与 VoteBallot 的共同上位概念。它可作为 PROV 风格活动输入或输出，但不是处理这些内容的活动，也不是声明处理方法的规范。
    en: A CompositionArtifact is an information entity identified by artifact ID, media type, content digest, and production time and is the common genus of CompositionOutput, SynthesisInput, and VoteBallot. It may be used or generated by a PROV-style activity but is neither the activity processing it nor the specification declaring how to process it.
    ja: CompositionArtifact は artifact ID・media type・content digest・produced time で識別し CompositionOutput・SynthesisInput・VoteBallot の common genus です。Activity に used/generated されますが processing activity や method specification ではありません。
  why_needed:
    zh: 统一工件上位类使投票、综合输入和输出共享可追踪内容身份，而不把它们塞进活动或规范分支。
    en: A common artifact genus gives ballots, synthesis inputs, and outputs traceable content identity without placing them under activities or specifications.
    ja: common artifact genus により ballot・synthesis input・output が traceable content identity を共有し activity/spec branch に混入しません。
  includes:
    - zh: 投票票据、综合输入片段、通用组合输出和综合输出等不可变内容或证据。
      en: Immutable content or evidence such as ballots, synthesis inputs, general composition outputs, and synthesis outputs.
      ja: ballot・synthesis input・general composition output・synthesis output 等の immutable content/evidence。
  excludes:
    - zh: 运行活动、组合计划、模式、可变工作状态、来源文档登记行和框架社区节点。
      en: Runtime activities, composition plans, patterns, mutable work state, source-registry rows, and framework community nodes.
      ja: runtime activity・composition plan・pattern・mutable state・source registry row・framework community node。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 导入层将 LangGraph 节点输出、CrewAI task output 与投票候选映射为 CompositionArtifact，以 content_digest 固定不可变身份；活动引用 digest 而非可变别名。
    en: Ingestion maps LangGraph node outputs, CrewAI task outputs, and vote candidates to CompositionArtifact with content_digest as immutable identity; activities reference digests not mutable aliases.
    ja: 取込層は LangGraph ノード出力・CrewAI task output・投票候補を CompositionArtifact へ写像し content_digest で immutable identity を固定します。
  typical_input:
    - description: LangGraph node return value serialized to artifact.
      format: 'return {"section": markdown, "digest": "sha256:section-17"}'
      source_claims:
        - claim-composition-artifact-design
  typical_output:
    - description: Moonweave CompositionArtifact record.
      format: '{"composition_artifact_id": "artifact-section-17", "content_digest": "sha256:section-17"}'
      source_claims:
        - claim-composition-artifact-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys:
    - composition_artifact_id
  fields:
    - id: composition_artifact_id
      labels:
        zh: 组合工件标识
        en: composition-artifact ID
        ja: composition artifact ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个不可变组合工件。
        en: Stably identifies one immutable composition artifact.
        ja: one immutable composition artifact を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: artifact-section-17
      source_claims:
        - claim-composition-artifact-design
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明工件内容的序列化类型。
        en: Declares the serialization type of artifact content.
        ja: artifact content の serialization type を宣言します。
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-composition-artifact-design
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定工件字节或规范化内容的稳定摘要。
        en: Fixes a stable digest of artifact bytes or normalized content.
        ja: artifact bytes/normalized content の stable digest を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:section-17
      source_claims:
        - claim-composition-artifact-design
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变工件成为可引用实体的时间。
        en: Records when the immutable artifact became a referenceable entity.
        ja: immutable artifact が referenceable entity となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:21:00Z
      source_claims:
        - claim-composition-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionArtifact-langgraph-node-output
    labels:
      zh: LangGraph 节点输出
      en: LangGraph node output
      ja: LangGraph ノード出力
    descriptions:
      zh: artifact-section-17 是 reduce 节点生成的 text/markdown，digest 固定后可被 Synthesis 引用。
      en: artifact-section-17 is text/markdown from a reduce node with a fixed digest referenceable by Synthesis.
      ja: artifact-section-17 は reduce ノードの text/markdown で digest 固定後 Synthesis から参照可能。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: node output
    field_values:
      composition_artifact_id: artifact-section-17
      content_digest: sha256:section-17
    related_node_ids:
      - CompositionArtifact
      - SynthesisInput
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-langgraph
      - claim-composition-artifact-design
  - id: CompositionArtifact-vote-candidate
    labels:
      zh: 投票候选工件
      en: Vote candidate artifact
      ja: 投票候補 artifact
    descriptions:
      zh: ballot-a@1 封装并行分支生成的候选答案及 digest，供 VotingActivity 消费。
      en: ballot-a@1 wraps a parallel-branch candidate answer and digest for VotingActivity consumption.
      ja: ballot-a@1 は並列 branch 候補回答と digest を包み VotingActivity が consume。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N
    field_values:
      composition_artifact_id: ballot-a@1
      content_digest: sha256:candidate-a
    related_node_ids:
      - CompositionArtifact
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-anthropic
      - claim-composition-artifact-design
  - id: CompositionArtifact-boundary-activity
    labels:
      zh: 活动不是工件
      en: Activity is not artifact
      ja: activity は artifact ではない
    descriptions:
      zh: synthesis-884 有起止时间与 running 状态，应建模为 Synthesis 而非 CompositionArtifact。
      en: synthesis-884 has start/end and running status and belongs on Synthesis not CompositionArtifact.
      ja: synthesis-884 は start/end と running status を持ち Synthesis に属します。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus occurrence
    field_values: {}
    related_node_ids:
      - CompositionArtifact
      - Synthesis
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-design
parent_relation: null
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-composition-artifact-langgraph
    source: langgraph
    supports: LangGraph node outputs are immutable content entities consumable by downstream aggregation nodes.
    locator: Graph API — nodes and state updates
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-artifact-anthropic
    source: anthropic-workflows
    supports: Best-of-N parallel candidates are distinct immutable outputs before voting selection.
    locator: Parallelization and voting patterns
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-artifact-design
    source: composition-design
    supports: CompositionArtifact genus separates fixed content identity from composition activities.
    locator: CompositionArtifact boundary
    evidence_kind: design-inference
    confidence: high
