schema: moonweave.ai/ontology-node/v1
id: CompositionArtifact
kind: concept
status: review
labels:
  zh: 组合工件
  en: composition artifact
  ja: composition artifact
semantics:
  short_definition:
    zh: 被组合活动消费或产生、具有固定内容摘要和媒体类型的信息实体。
    en: An information entity with fixed content digest and media type consumed or produced by a composition activity.
    ja: composition activity が consume/produce し fixed digest/media type を持つ information entity。
  definition:
    zh: 组合工件是一种信息实体，以工件标识、媒体类型、内容摘要和产生时间为身份，作为 CompositionOutput、SynthesisInput 与 VoteBallot 的共同上位概念。它可作为 PROV 风格活动输入或输出，但不是处理这些内容的活动，也不是声明处理方法的规范。
    en: A CompositionArtifact is an information entity identified by artifact ID, media type, content digest, and production time and is the common genus of CompositionOutput, SynthesisInput, and VoteBallot. It may be used or generated by a PROV-style activity but is neither the activity processing it nor the specification declaring how to process it.
    ja: CompositionArtifact は artifact ID・media type・content digest・produced time で識別し CompositionOutput・SynthesisInput・VoteBallot の common genus です。Activity に used/generated されますが processing activity や method specification ではありません。
  why_needed:
    zh: 统一工件上位类使投票、综合输入和输出共享可追踪内容身份，而不把它们塞进活动或规范分支。
    en: A common artifact genus gives ballots, synthesis inputs, and outputs traceable content identity without placing them under activities or specifications.
    ja: common artifact genus により ballot・synthesis input・output が traceable content identity を共有し activity/spec branch に混入しません。
  includes:
    - zh: 投票票据、综合输入片段、通用组合输出和综合输出等不可变内容或证据。
      en: Immutable content or evidence such as ballots, synthesis inputs, general composition outputs, and synthesis outputs.
      ja: ballot・synthesis input・general composition output・synthesis output 等の immutable content/evidence。
  excludes:
    - zh: 运行活动、组合计划、模式、可变工作状态、来源文档登记行和框架社区节点。
      en: Runtime activities, composition plans, patterns, mutable work state, source-registry rows, and framework community nodes.
      ja: runtime activity・composition plan・pattern・mutable state・source registry row・framework community node。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - composition_artifact_id
  fields:
    - id: composition_artifact_id
      labels:
        zh: 组合工件标识
        en: composition-artifact ID
        ja: composition artifact ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个不可变组合工件。
        en: Stably identifies one immutable composition artifact.
        ja: one immutable composition artifact を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: artifact-section-17
      source_claims:
        - claim-composition-artifact-001
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明工件内容的序列化类型。
        en: Declares the serialization type of artifact content.
        ja: artifact content の serialization type を宣言します。
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-composition-artifact-001
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定工件字节或规范化内容的稳定摘要。
        en: Fixes a stable digest of artifact bytes or normalized content.
        ja: artifact bytes/normalized content の stable digest を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:section-17
      source_claims:
        - claim-composition-artifact-001
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变工件成为可引用实体的时间。
        en: Records when the immutable artifact became a referenceable entity.
        ja: immutable artifact が referenceable entity となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:21:00Z
      source_claims:
        - claim-composition-artifact-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 报告分区输出工件
      en: Report-section output artifact
      ja: report section output artifact
    scenario_id: null
    descriptions:
      zh: artifact-section-17 是 text/markdown，摘要为 sha256:section-17，于 04:21 由分区活动产生。
      en: artifact-section-17 is text/markdown with digest sha256:section-17 and is produced by a section activity at 04:21.
      ja: artifact-section-17 は text/markdown、digest=sha256:section-17 で 04:21 section activity により generated されます。
    field_values:
      composition_artifact_id: artifact-section-17
      media_type: text/markdown
      content_digest: sha256:section-17
      produced_at: 2026-07-16T04:21:00Z
    related_node_ids:
      - CompositionArtifact
      - CompositionActivity
    related_relation_ids: []
    expected_result:
      zh: 建立不可变内容身份并由活动关系引用。
      en: Create immutable content identity referenced by an activity relation.
      ja: immutable content identity を作り activity relation から参照します。
    why_valid_or_invalid:
      zh: 标识、类型、摘要和产生时间足以区分一个工件版本。
      en: ID, media type, digest, and production time distinguish one artifact revision.
      ja: ID・media type・digest・produced time が one artifact revision を識別します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-artifact-001
  - id: CompositionArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 正在合并章节的活动
      en: Activity merging sections
      ja: section merging activity
    scenario_id: composition-review-compositionartifact-boundary
    descriptions:
      zh: synthesis-884 在 04:21 到 04:22 消费三个章节并生成报告，具有运行状态而非固定内容摘要。
      en: synthesis-884 consumes three sections from 04:21 to 04:22 and generates a report, carrying runtime state rather than a fixed content digest.
      ja: synthesis-884 は 04:21–04:22 three sections を consume し report を generate、runtime state を持ち fixed content digest ではありません。
    field_values: {}
    related_node_ids:
      - Synthesis
      - CompositionArtifact
    related_relation_ids: []
    expected_result:
      zh: 分类为 CompositionActivity 子类，并把输入输出另建工件。
      en: Classify as a CompositionActivity subtype and model inputs and outputs as separate artifacts.
      ja: CompositionActivity subtype とし input/output は separate artifact にします。
    why_valid_or_invalid:
      zh: 时间跨度和处理行为证明它是活动，而不是固定信息实体。
      en: Duration and processing behavior establish an activity rather than a fixed information entity.
      ja: duration/processing behavior は activity を証明し fixed information entity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-artifact-001
      - claim-composition-artifact-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 选票/综合输入/输出角色语义已对照 PROV-O usage/generation 与 AutoGen 团队输出核验通过；目录层级待改为 Artifact 上下文角色关系，而非 is_a 子树。
    en: Ballot, synthesis-input, and output role semantics were verified against PROV-O usage/generation and AutoGen team outputs; directory hierarchy still awaits conversion to Artifact contextual roles rather than an is_a subtree.
    ja: ballot/synthesis-input/output role semantics は PROV-O usage/generation・AutoGen team output で確認済みです。directory hierarchy は is_a subtree ではなく Artifact contextual role への変換待ちです。
  sections:
    semantics: accepted
    hierarchy: pending
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-composition-artifact-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-composition-artifact-002
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
