schema: moonweave.ai/ontology-node/v1
id: CompositionArtifact
kind: concept
labels:
  zh: 组合工件
  en: composition artifact
  ja: composition artifact
semantics:
  short_definition:
    zh: 被组合活动消费或产生、具有固定内容摘要和媒体类型的信息实体。
    en: An information entity with fixed content digest and media type consumed or produced by a composition activity.
    ja: composition activity が consume/produce し fixed digest/media type を持つ information entity。
  definition:
    zh: 组合工件是一种信息实体，以工件标识、媒体类型、内容摘要和产生时间为身份，作为 CompositionOutput、SynthesisInput 与 VoteBallot 的共同上位概念。它可作为 PROV 风格活动输入或输出，但不是处理这些内容的活动，也不是声明处理方法的规范。
    en: A CompositionArtifact is an information entity identified by artifact ID, media type, content digest, and production time and is the common genus of CompositionOutput, SynthesisInput, and VoteBallot. It may be used or generated by a PROV-style activity but is neither the activity processing it nor the specification declaring how to process it.
    ja: CompositionArtifact は artifact ID・media type・content digest・produced time で識別し CompositionOutput・SynthesisInput・VoteBallot の common genus です。Activity に used/generated されますが processing activity や method specification ではありません。
  why_needed:
    zh: 统一工件上位类使投票、综合输入和输出共享可追踪内容身份，而不把它们塞进活动或规范分支。
    en: A common artifact genus gives ballots, synthesis inputs, and outputs traceable content identity without placing them under activities or specifications.
    ja: common artifact genus により ballot・synthesis input・output が traceable content identity を共有し activity/spec branch に混入しません。
  includes:
    - zh: 投票票据、综合输入片段、通用组合输出和综合输出等不可变内容或证据。
      en: Immutable content or evidence such as ballots, synthesis inputs, general composition outputs, and synthesis outputs.
      ja: ballot・synthesis input・general composition output・synthesis output 等の immutable content/evidence。
  excludes:
    - zh: 运行活动、组合计划、模式、可变工作状态、来源文档登记行和框架社区节点。
      en: Runtime activities, composition plans, patterns, mutable work state, source-registry rows, and framework community nodes.
      ja: runtime activity・composition plan・pattern・mutable state・source registry row・framework community node。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      CompositionArtifact 适配器把 LangGraph 节点输出、Agents SDK Runner 结果或 A2A Artifact 规范化为本地
      composition_artifact_id、media_type、content_digest 与 produced_at，而不把框架对象重命名为本体类型。
      PROV wasGeneratedBy 方向为 Activity→Artifact；digest 绑定不可变内容，不复制全文。
    en: >-
      A CompositionArtifact adapter normalizes LangGraph node outputs, Agents SDK Runner results, or A2A Artifacts
      into local composition_artifact_id, media_type, content_digest, and produced_at without renaming framework
      objects. PROV wasGeneratedBy runs Activity→Artifact; the digest binds immutable content without copying body text.
    ja: >-
      CompositionArtifact adapter は LangGraph node output、Agents SDK Runner result、A2A Artifact を
      composition_artifact_id/media_type/content_digest/produced_at に正規化し framework object を改名しません。
      PROV wasGeneratedBy は Activity→Artifact です。
  typical_input:
    - description:
        zh: 组合活动完成一个阶段后产生的结构化内容或文件字节。
        en: Structured content or file bytes emitted when a composition stage completes.
        ja: composition stage 完了時に emit される structured content または file bytes。
      format: |-
        {"stage_output":{"section_id":"finance","markdown":"## Finance\nRevenue up 12%."},"media_type":"text/markdown"}
  typical_output:
    - description:
        zh: 带稳定标识与摘要的不可变组合工件记录。
        en: Immutable composition artifact record with stable identity and digest.
        ja: stable identity/digest を持つ immutable composition artifact record。
      format: |-
        {"composition_artifact_id":"artifact-section-17","media_type":"text/markdown","content_digest":"sha256:section-17","produced_at":"2026-07-16T04:21:00Z"}
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Documents Entity identity and wasGeneratedBy from Activity to Entity.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents node outputs passed as state values between graph steps.
    - name: A2A Protocol Specification — Artifact
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol Artifact outputs that may be projected into local artifact records.
  source_claims:
    - claim-composition-artifact-001
    - claim-composition-artifact-002
structure:
  identity_keys:
    - composition_artifact_id
  fields:
    - id: composition_artifact_id
      labels:
        zh: 组合工件标识
        en: composition-artifact ID
        ja: composition artifact ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个不可变组合工件。
        en: Stably identifies one immutable composition artifact.
        ja: one immutable composition artifact を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: artifact-section-17
      source_claims:
        - claim-composition-artifact-001
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明工件内容的序列化类型。
        en: Declares the serialization type of artifact content.
        ja: artifact content の serialization type を宣言します。
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-composition-artifact-001
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定工件字节或规范化内容的稳定摘要。
        en: Fixes a stable digest of artifact bytes or normalized content.
        ja: artifact bytes/normalized content の stable digest を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:section-17
      source_claims:
        - claim-composition-artifact-001
    - id: produced_at
      labels:
        zh: 产生时间
        en: produced at
        ja: produced at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变工件成为可引用实体的时间。
        en: Records when the immutable artifact became a referenceable entity.
        ja: immutable artifact が referenceable entity となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:21:00Z
      source_claims:
        - claim-composition-artifact-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionArtifact-example-positive-manual-20260716
    labels:
      zh: CompositionArtifact positive
      en: CompositionArtifact positive
      ja: CompositionArtifact positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionArtifact 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionArtifact programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionArtifact: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_artifact_id: artifact-section-17, media_type: "text/markdown", content_digest: sha256:section-17, produced_at: 2026-07-16T04:21:00Z}

    related_node_ids:
      - CompositionArtifact
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-001

  - id: CompositionArtifact-example-boundary-manual-20260716
    labels:
      zh: CompositionArtifact boundary
      en: CompositionArtifact boundary
      ja: CompositionArtifact boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 CompositionArtifact 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not CompositionArtifact work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で CompositionArtifact work_specification ではない。
    field_values: {}

    related_node_ids:
      - Synthesis
      - CompositionArtifact
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-001
      - claim-composition-artifact-002

  - id: CompositionArtifact-counterexample-activity-log-misclassified
    labels:
      zh: CompositionArtifact counterexample
      en: CompositionArtifact counterexample
      ja: CompositionArtifact counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 CompositionArtifact PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style CompositionArtifact PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 CompositionArtifact ではない。
    field_values: {composition_artifact_id: absent, media_type: absent, content_digest: absent, produced_at: absent, runtime_status: running}

    related_node_ids:
      - CompositionArtifact
      - Synthesis
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-002

  - id: CompositionArtifact-instance-a2a-artifact-normalized
    labels:
      zh: CompositionArtifact instance
      en: CompositionArtifact instance
      ja: CompositionArtifact instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 CompositionArtifact。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to CompositionArtifact.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が CompositionArtifact に写像。
    field_values: {composition_artifact_id: artifact-section-17, media_type: "text/markdown", content_digest: sha256:section-17, produced_at: 2026-07-16T04:21:00Z, native_artifact_ref: a2a:artifact-7b2}

    related_node_ids:
      - CompositionArtifact
      - A2AArtifact
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-artifact-001

sources:
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity records generated by Activities with stable identity separate from the generating activity.
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Documents immutable state values passed between compiled graph nodes as artifact-like outputs.
  - id: a2a-v1-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    relevance: Documents Artifact data objects that may be normalized into local composition artifact records.
source_claims:
  - id: claim-composition-artifact-001
    source: w3c-prov-o
    supports: PROV-O Entity identity uses stable identifiers and attributes; CompositionArtifact records immutable content identity with digest and production time.
    locator: PROV-O Entity and wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-artifact-002
    source: w3c-prov-o
    supports: A time-bounded composition activity that processes content is not the same object as the immutable artifact it generates.
    locator: PROV-O Activity versus Entity boundary
    evidence_kind: design-inference
    confidence: high
