schema: moonweave.ai/ontology-node/v1
id: VoteBallot
kind: concept
labels:
  zh: 投票票据
  en: vote ballot
  ja: 投票票
semantics:
  short_definition:
    zh: 记录一名合格投票者对一个候选的选择、权重和理由的不可变组合工件。
    en: An immutable composition artifact recording one eligible voter's choice, weight, and rationale for one candidate.
    ja: one eligible voter の candidate choice・weight・rationale を記録する immutable composition artifact です。
  definition:
    zh: 投票票据是 CompositionArtifact 的子类，以票据标识、投票者引用、候选引用、选择值、权重、投票时间和内容摘要为种差。VotingActivity 消费它；票据本身不是投票者、投票制度、计票活动或最终决定。
    en: A VoteBallot is a CompositionArtifact distinguished by ballot ID, voter reference, candidate reference, choice, weight, cast time, and content digest. A VotingActivity consumes it; the ballot is neither voter, voting regime, counting activity, nor final decision.
    ja: VoteBallot は ballot ID・voter ref・candidate ref・choice・weight・cast time・digest で区別され、VotingActivity が consume します。voter/regime/count/final decision ではありません。
  why_needed:
    zh: 票据作为独立工件保留个体判断和理由，支持重算与审计，同时防止把“投票”模式直接连到消费关系。
    en: Ballots preserve individual judgment and rationale for recount and audit while preventing the Voting pattern from being the consumer.
    ja: ballot は individual judgment/rationale を保存し recount/audit を可能にして Voting pattern の consumer 誤用を防ぎます。
  includes:
    - zh: 赞成、反对、弃权、排序、评分或偏好票，只要投票者与候选可追踪且内容不可变。
      en: Approve, reject, abstain, ranked, scored, or preference ballots with traceable voter and candidate and immutable content.
      ja: approve・reject・abstain・ranked・scored・preference ballot with traceable voter/candidate。
  excludes:
    - zh: 聚合后的投票结果、投票活动、投票模式、投票者 Agent 和没有固定投票者的匿名统计。
      en: Aggregated vote results, voting activities, voting patterns, voter agents, and anonymous statistics without a fixed ballot identity.
      ja: aggregated result・voting activity・pattern・voter agent・fixed ballot identity のない statistic。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: best-of-N 并行采样候选、LLM-as-judge 评分输入映射为 VoteBallot；VotingActivity 须消费同一 occurrence 内 digest 固定的选票。
    en: Best-of-N parallel sample candidates and LLM-as-judge scoring inputs map to VoteBallot; VotingActivity must consume digest-fixed ballots from the same occurrence.
    ja: best-of-N 並列候補・LLM-as-judge 入力を VoteBallot へ写像し VotingActivity は同一 occurrence の digest 固定 ballot を consume します。
  typical_input:
    - description: Parallel candidate generation.
      format: candidates = await asyncio.gather(*[generate(prompt) for _ in range(3)])
      source_claims:
        - claim-vote-ballot-design
  typical_output:
    - description: Moonweave VoteBallot with voter and candidate refs.
      format: '{"composition_artifact_id": "ballot-a@1", "voter_ref": "branch-a", "candidate_ref": "candidate-x"}'
      source_claims:
        - claim-vote-ballot-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: voter_ref
      labels:
        zh: 投票者引用
        en: voter reference
        ja: voter ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在适用投票模式下有资格投票的主体。
        en: References the principal eligible under the applicable voting pattern.
        ja: applicable voting pattern 下で eligible な principal を参照します。
      allowed_values: []
      pattern: null
      example_value: reviewer-b
      source_claims:
        - claim-vote-ballot-design
    - id: choice
      labels:
        zh: 选择
        en: choice
        ja: 選択
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录符合选票契约的选择、排序或评分值。
        en: Records a choice, ranking, or score allowed by the ballot contract.
        ja: ballot contract が許す choice・ranking・score を記録します。
      allowed_values: []
      pattern: null
      example_value: approve
      source_claims:
        - claim-vote-ballot-design
    - id: candidate_ref
      labels:
        zh: 候选项引用
        en: candidate reference
        ja: candidate 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本票所评价的候选项、提案或选项；仅有 approve/reject 而没有候选身份无法重建投票含义。
        en: References the candidate, proposal, or option evaluated by this ballot. An approve or reject value without candidate identity cannot reconstruct the vote's meaning.
        ja: この ballot が評価する candidate・proposal・option を参照します。candidate identity のない approve/reject だけでは vote の意味を再構成できません。
      allowed_values: []
      pattern: null
      example_value: candidate-a
      source_claims:
        - claim-vote-ballot-design
    - id: weight
      labels:
        zh: 选票权重
        en: ballot weight
        ja: ballot weight
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录适用 VotingRule 在计票时使用的正权重；等权投票明确写为 1，不得把缺失权重默认为任意值。
        en: Records the positive weight used by the applicable VotingRule during tallying. Equal-weight voting is explicitly recorded as 1 rather than inferred from a missing value.
        ja: applicable VotingRule が tally で使う正の weight を記録します。equal-weight vote は欠落値から推測せず明示的に 1 とします。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-vote-ballot-design
    - id: cast_at
      labels:
        zh: 投票时间
        en: cast time
        ja: 投票時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录投票主体使该不可变选择生效的时间，用于判断是否早于关闭条件；它可与工件产生时间相同，但语义上是投票发生时间。
        en: Records when the voter made the immutable choice effective so closure eligibility can be checked. It may equal artifact production time but semantically denotes the vote occurrence.
        ja: voter が immutable choice を有効にした時刻を記録し、closure 前かを判定します。artifact production time と同じ場合もありますが、意味上は vote occurrence time です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:30:00Z
      source_claims:
        - claim-vote-ballot-design
    - id: rationale_digest
      labels:
        zh: 理由摘要
        en: rationale digest
        ja: rationale digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定与该选择一起提交的理由内容摘要，使计票可核验理由未被事后替换，同时不把完整理由文本塞入选票身份字段。
        en: Fixes a digest of the rationale submitted with the choice so review can detect later replacement without embedding the full rationale text in ballot identity fields.
        ja: choice と共に提出された rationale の digest を固定し、full rationale text を ballot identity field に埋めずに事後置換を検出できます。
      allowed_values: []
      pattern: null
      example_value: sha256:ballot-18-rationale
      source_claims:
        - claim-vote-ballot-design
  constraints:
    - id: vote-ballot-requires-positive-weight-and-cast-time
      severity: error
      expression_language: plain
      expression: weight > 0 and cast_at is not later than the closure time of the consuming VotingActivity
      explanations:
        zh: 选票权重必须为正，投票时间必须处于适用投票活动关闭前；否则不能把该记录计入票集合。
        en: Ballot weight is positive and cast_at falls no later than the consuming voting activity's closure; otherwise the record cannot enter that ballot set.
        ja: ballot weight は正で、cast_at は consuming VotingActivity の closure より後であってはなりません。満たさない記録は ballot set に入りません。
      source_claims:
        - claim-vote-ballot-design
  required_relation_constraints: []
examples:
  - id: VoteBallot-best-of-n
    labels:
      zh: best-of-N 选票
      en: best-of-N ballot
      ja: best-of-N ballot
    descriptions:
      zh: 三并行分支各生成 VoteBallot，digest 固定后进入 Borda 计票。
      en: Three parallel branches each produce VoteBallot with fixed digests before Borda tally.
      ja: 三並列 branch が各 VoteBallot を生成し digest 固定後 Borda 集計。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N voting
    field_values:
      composition_artifact_id: ballot-a@1
      content_digest: sha256:candidate-a
    related_node_ids:
      - VoteBallot
      - VotingActivity
      - Voting
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
    source_claims:
      - claim-vote-ballot-anthropic
      - claim-vote-ballot-design
  - id: VoteBallot-llm-judge
    labels:
      zh: LLM 评判选票
      en: LLM-as-judge ballot
      ja: LLM-as-judge ballot
    descriptions:
      zh: judge 模型对候选答案打分形成结构化 VoteBallot。
      en: Judge model scores candidate answers forming structured VoteBallot.
      ja: judge model が候補回答を score し structured VoteBallot を形成。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: LLM evaluation
    field_values:
      composition_artifact_id: ballot-judge-1@1
    related_node_ids:
      - VoteBallot
      - VotingRule
    related_relation_ids: []
    source_claims:
      - claim-vote-ballot-cookbook
      - claim-vote-ballot-design
  - id: VoteBallot-boundary-winner
    labels:
      zh: 获胜输出不是选票
      en: Winner output is not ballot
      ja: winner output は ballot ではない
    descriptions:
      zh: vote-result-18@1 是 VotingActivity 产物而非输入选票。
      en: vote-result-18@1 is VotingActivity output not an input ballot.
      ja: vote-result-18@1 は VotingActivity 产物で input ballot ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: input versus output
    field_values: {}
    related_node_ids:
      - VoteBallot
      - CompositionOutput
    related_relation_ids: []
    source_claims:
      - claim-vote-ballot-design
