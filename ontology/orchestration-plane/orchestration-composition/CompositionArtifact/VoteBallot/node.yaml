source_claims:
  - id: claim-vote-ballot-001
    source: eng-fw-autogen-agentchat
    supports: AutoGen's official AgentChat documentation describes teams whose participant order and termination are managed separately from participant messages. Moonweave uses this as supporting evidence that collaboration patterns and topology specifications are not the same objects as runtime activities or produced ballots and outputs.
    locator: "AgentChat user guide: Teams, SelectorGroupChat, RoundRobinGroupChat, and termination conditions"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-002
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-004
    source: eng-governance-crs-voting-quorum-2023
    supports: The CRS voting-procedure report distinguishes the question or proposition before the body from each member's vote and the resulting tally. Moonweave therefore records the candidate or proposition independently on each ballot.
    locator: CRS 98-988, voting procedure, question before the body and member votes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-005
    source: eng-governance-oasis-consensus-2026
    supports: Oasis consensus governance binds a vote to configured participation and decision parameters. Moonweave records ballot weight explicitly so a tally can be reproduced under the referenced rule revision.
    locator: Oasis consensus governance, Consensus Parameters and Voting Process
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-006
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Entity's identity from the Activity and time that generated it. Moonweave records cast_at as the ballot's effective voting time while retaining produced_at as artifact provenance.
    locator: PROV-O Recommendation Sections 3.1-3.2, Entity, Activity, and generation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-007
    source: eng-ont-prov-o
    supports: PROV-O supports independently identified entities and provenance links. Moonweave uses a rationale digest to bind the reason artifact revision to one ballot without conflating the two entities.
    locator: PROV-O Recommendation Sections 3.1-3.2, Entity identity and derivation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-vote-ballot-008
    source: eng-governance-oasis-consensus-2026
    supports: Oasis consensus governance evaluates submitted votes under configured participation and closure parameters. Moonweave makes positive weight and pre-closure timing explicit validation conditions.
    locator: Oasis consensus governance, Consensus Parameters and Voting Process
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
