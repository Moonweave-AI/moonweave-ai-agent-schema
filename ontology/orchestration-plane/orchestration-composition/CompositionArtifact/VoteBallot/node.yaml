  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 投票票据继承组合工件的不可变内容身份，并以投票者、候选、选择、权重和投票时间为种差。
    en: VoteBallot inherits immutable composition-artifact identity and is distinguished by voter, candidate, choice, weight, and cast time.
    ja: VoteBallot は immutable artifact identity を継承し voter・candidate・choice・weight・cast time を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
