schema: moonweave.ai/ontology-node/v1
id: SynthesisInput
kind: concept
labels:
  zh: 综合输入
  en: synthesis input
  ja: 統合入力
semantics:
  short_definition:
    zh: 被某次综合活动纳入输入集合、带有来源角色和序位的不可变组合工件。
    en: An immutable composition artifact admitted to one synthesis input set with a provenance role and ordinal.
    ja: one synthesis input set に provenance role/ordinal 付きで採用された immutable composition artifact です。
  definition:
    zh: 综合输入是 CompositionArtifact 的子类，以输入标识、内容摘要、来源工件引用、在综合集合中的角色与序位为种差。它表示综合活动读取的固定输入版本，不是来源文档登记项、检索结果指针或正在运行的综合活动。
    en: A SynthesisInput is a CompositionArtifact distinguished by input ID, content digest, source-artifact reference, role, and ordinal in a synthesis set. It denotes the fixed artifact revision read by synthesis, not a source-registry entry, retrieval pointer, or running synthesis activity.
    ja: SynthesisInput は input ID・digest・source artifact ref・role・ordinal で区別される CompositionArtifact で source registry/retrieval pointer/running activity ではありません。
  why_needed:
    zh: 显式输入节点使每个综合结论可追溯到实际版本和输入顺序，而不是仅指向模糊的来源或模块。
    en: Explicit input nodes trace synthesis conclusions to actual versions and order rather than vague sources or modules.
    ja: explicit input nodes で synthesis conclusion を actual versions/order へ trace し vague source/module を避けます。
  includes:
    - zh: 被固定版本纳入综合的章节草稿、证据包、候选方案和结构化评审结果。
      en: Version-fixed section drafts, evidence packets, candidates, and structured review results admitted to synthesis.
      ja: version-fixed section draft・evidence packet・candidate・structured review result。
  excludes:
    - zh: URL、来源注册行、未物化查询、综合计划、综合活动和综合完成后的输出。
      en: URLs, source-registry rows, unmaterialized queries, synthesis plans, synthesis activities, and post-synthesis outputs.
      ja: URL・source registry row・unmaterialized query・plan・activity・post-synthesis output。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangGraph Send 分支返回值、CrewAI 并行 task output 与 map 阶段文档块映射为 SynthesisInput；Synthesis 通过 digest 引用不可变输入。
    en: LangGraph Send branch returns, CrewAI parallel task outputs, and map-phase document chunks map to SynthesisInput; Synthesis references inputs by digest.
    ja: LangGraph Send branch 返却・CrewAI 並列 task output・map 段 document chunk を SynthesisInput へ写像し Synthesis は digest で参照します。
  typical_input:
    - description: Parallel branch deliverable consumed by synthesis.
      format: '{"branch_output": "sha256:section-17", "join_key": "evidence-set/official"}'
      source_claims:
        - claim-synthesis-input-design
  typical_output:
    - description: Moonweave SynthesisInput role record.
      format: '{"composition_artifact_id": "artifact-section-17", "role": "synthesis-input"}'
      source_claims:
        - claim-synthesis-input-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: source_artifact_ref
      labels:
        zh: 来源工件引用
        en: source-artifact reference
        ja: source artifact ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被纳入综合的原始不可变工件版本。
        en: References the original immutable artifact revision admitted to synthesis.
        ja: synthesis に採用した original immutable artifact revision を参照します。
      allowed_values: []
      pattern: null
      example_value: section-network-17@3
      source_claims:
        - claim-synthesis-input-design
    - id: input_ordinal
      labels:
        zh: 输入序位
        en: input ordinal
        ja: input ordinal
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在需要稳定顺序时固定该输入的集合位置。
        en: Fixes this member's set position when stable ordering is required.
        ja: stable ordering が必要な場合の set position を固定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-synthesis-input-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisInput-parallel-section
    labels:
      zh: 并行分区输入
      en: Parallel section input
      ja: 並列 section input
    descriptions:
      zh: draft-report@8 与 citation-pack@5 以固定 digest 被 Synthesis synthesis-run-31 消费。
      en: draft-report@8 and citation-pack@5 are consumed by Synthesis synthesis-run-31 with fixed digests.
      ja: draft-report@8 と citation-pack@5 が固定 digest で Synthesis synthesis-run-31 に consume。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Send fan-in inputs
    field_values:
      composition_artifact_id: draft-report@8
      content_digest: sha256:draft-report-8
    related_node_ids:
      - SynthesisInput
      - Synthesis
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
    source_claims:
      - claim-synthesis-input-langgraph
      - claim-synthesis-input-design
  - id: SynthesisInput-map-chunk
    labels:
      zh: Map 阶段块输入
      en: Map-phase chunk input
      ja: map 段 chunk input
    descriptions:
      zh: 三份文档 map 输出作为 reduce 阶段的 SynthesisInput。
      en: Three document map outputs serve as SynthesisInput for the reduce phase.
      ja: 三 document の map 出力が reduce 段の SynthesisInput。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: map-reduce
    field_values:
      composition_artifact_id: map-chunk-3@1
    related_node_ids:
      - SynthesisInput
      - SynthesisPattern
    related_relation_ids: []
    source_claims:
      - claim-synthesis-input-cookbook
      - claim-synthesis-input-design
  - id: SynthesisInput-boundary-topology
    labels:
      zh: 拓扑不是输入
      en: Topology is not input
      ja: topology は input ではない
    descriptions:
      zh: report-topology@11 是规范而非 Synthesis 消费的工件。
      en: report-topology@11 is a specification not an artifact consumed by Synthesis.
      ja: report-topology@11 は spec で Synthesis が consume する artifact ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus artifact
    field_values: {}
    related_node_ids:
      - SynthesisInput
      - OrchestrationTopology
    related_relation_ids: []
    source_claims:
      - claim-synthesis-input-design
parent_relation:
  id: SynthesisInput-is_a-CompositionArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 综合输入继承组合工件的不可变内容身份，并以被纳入某综合集合的来源角色和序位为种差。
    en: SynthesisInput inherits immutable composition-artifact identity and is distinguished by provenance role and ordinal in one synthesis set.
    ja: SynthesisInput は immutable artifact identity を継承し synthesis set の provenance role・ordinal を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-synthesis-input-design
    - claim-synthesis-input-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-synthesis-input-langgraph
    source: langgraph
    supports: Fan-in synthesis consumes immutable branch outputs referenced by digest.
    locator: Send API and parallel supersteps
    evidence_kind: design-inference
    confidence: high
  - id: claim-synthesis-input-cookbook
    source: openai-cookbook
    supports: Map phase outputs are synthesis inputs to reduce aggregation.
    locator: Map-reduce workflow patterns
    evidence_kind: design-inference
    confidence: high
  - id: claim-synthesis-input-design
    source: composition-design
    supports: SynthesisInput role marks artifacts consumed by synthesis activities.
    locator: SynthesisInput boundary
    evidence_kind: design-inference
    confidence: high
