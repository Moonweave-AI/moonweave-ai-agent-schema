schema: moonweave.ai/ontology-node/v1
id: SynthesisInput
kind: concept
labels:
  zh: 综合输入
  en: synthesis input
  ja: 統合入力
semantics:
  short_definition:
    zh: 被某次综合活动纳入输入集合、带有来源角色和序位的不可变组合工件。
    en: An immutable composition artifact admitted to one synthesis input set with a provenance role and ordinal.
    ja: one synthesis input set に provenance role/ordinal 付きで採用された immutable composition artifact です。
  definition:
    zh: 综合输入是 CompositionArtifact 的子类，以输入标识、内容摘要、来源工件引用、在综合集合中的角色与序位为种差。它表示综合活动读取的固定输入版本，不是来源文档登记项、检索结果指针或正在运行的综合活动。
    en: A SynthesisInput is a CompositionArtifact distinguished by input ID, content digest, source-artifact reference, role, and ordinal in a synthesis set. It denotes the fixed artifact revision read by synthesis, not a source-registry entry, retrieval pointer, or running synthesis activity.
    ja: SynthesisInput は input ID・digest・source artifact ref・role・ordinal で区別される CompositionArtifact で source registry/retrieval pointer/running activity ではありません。
  why_needed:
    zh: 显式输入节点使每个综合结论可追溯到实际版本和输入顺序，而不是仅指向模糊的来源或模块。
    en: Explicit input nodes trace synthesis conclusions to actual versions and order rather than vague sources or modules.
    ja: explicit input nodes で synthesis conclusion を actual versions/order へ trace し vague source/module を避けます。
  includes:
    - zh: 被固定版本纳入综合的章节草稿、证据包、候选方案和结构化评审结果。
      en: Version-fixed section drafts, evidence packets, candidates, and structured review results admitted to synthesis.
      ja: version-fixed section draft・evidence packet・candidate・structured review result。
  excludes:
    - zh: URL、来源注册行、未物化查询、综合计划、综合活动和综合完成后的输出。
      en: URLs, source-registry rows, unmaterialized queries, synthesis plans, synthesis activities, and post-synthesis outputs.
      ja: URL・source registry row・unmaterialized query・plan・activity・post-synthesis output。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      SynthesisInput 是 Synthesis 消费的输入工件，含 contributor_ref 与 section_scope。适配器把 branch 输出或
      reviewer 结果规范化为 PROV Entity，供 Synthesis 活动 used 引用。
    en: >-
      SynthesisInput is an input artifact consumed by Synthesis with contributor_ref and section_scope. Adapters
      normalize branch outputs or reviewer results as PROV Entities for Synthesis activity used references.
    ja: >-
      SynthesisInput は contributor_ref/section_scope を持ち Synthesis が consume する input artifact である。
  typical_input:
    - description:
        zh: 待综合的 section 或 contributor 输出摘要。
        en: Section or contributor output digest awaiting synthesis.
        ja: synthesis 待ち section/contributor output digest。
      format: |-
        {"contributor_ref":"reviewer-3","section_scope":"finance","body":"Revenue up 12% per audited statements.","media_type":"text/markdown"}
  typical_output:
    - description:
        zh: 带 contributor 与 section 元数据的 SynthesisInput 工件记录。
        en: SynthesisInput artifact record with contributor and section metadata.
        ja: contributor/section metadata 付き SynthesisInput artifact record。
      format: |-
        {"composition_artifact_id":"artifact-section-17","media_type":"text/markdown","content_digest":"sha256:section-17","produced_at":"2026-07-16T04:21:00Z","contributor_ref":"reviewer-3","section_scope":"finance"}
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Documents Entity used by Activity via prov:used.
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents specialist branch outputs fed to synthesizer stages.
  source_claims:
    - claim-synthesis-input-hierarchy
    - claim-synthesis-input-001
structure:
  identity_keys: []
  fields:
    - id: composition_artifact_id
      labels: { zh: 缁勫悎宸ヤ欢鏍囪瘑, en: composition-artifact ID, ja: composition artifact ID }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 绋冲畾鏍囪瘑涓€涓笉鍙彉缁勫悎宸ヤ欢銆? en: Stably identifies one immutable composition artifact., ja: immutable composition artifact 銈掑畨瀹氳瓨鍒ャ仐銇俱仚銆?}
      example_value: artifact-example-1
      source_claims: [claim-composition-artifact-hierarchy]
    - id: media_type
      labels: { zh: 濯掍綋绫诲瀷, en: media type, ja: media type }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 澹版槑宸ヤ欢鍐呭鐨勫簭鍒楀寲绫诲瀷銆? en: Declares artifact content serialization type., ja: artifact content serialization type 銈掑瑷€銇椼伨銇欍€?}
      example_value: text/markdown
      source_claims: [claim-composition-artifact-hierarchy]
    - id: content_digest
      labels: { zh: 鍐呭鎽樿, en: content digest, ja: content digest }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 鍥哄畾宸ヤ欢鍐呭鐨勭ǔ瀹氭憳瑕併€? en: Fixes stable digest of artifact content., ja: artifact content 銇?stable digest 銈掑浐瀹氥仐銇俱仚銆?}
      example_value: sha256:example
      source_claims: [claim-composition-artifact-hierarchy]
    - id: produced_at
      labels: { zh: 浜х敓鏃堕棿, en: produced at, ja: produced at }
      datatype: datetime
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 璁板綍宸ヤ欢鎴愪负鍙紩鐢ㄥ疄浣撶殑鏃堕棿銆? en: Records when artifact became referenceable., ja: artifact 銇?referenceable 銇仾銇ｃ仧鏅傚埢銈掕閷层仐銇俱仚銆?}
      example_value: 2026-07-16T04:21:00Z
      source_claims: [claim-composition-artifact-hierarchy]
    - id: source_artifact_ref
      labels:
        zh: 来源工件引用
        en: source-artifact reference
        ja: source artifact ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被纳入综合的原始不可变工件版本。
        en: References the original immutable artifact revision admitted to synthesis.
        ja: synthesis に採用した original immutable artifact revision を参照します。
      allowed_values: []
      pattern: null
      example_value: section-network-17@3
      source_claims:
        - claim-synthesis-input-001
    - id: input_ordinal
      labels:
        zh: 输入序位
        en: input ordinal
        ja: input ordinal
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在需要稳定顺序时固定该输入的集合位置。
        en: Fixes this member's set position when stable ordering is required.
        ja: stable ordering が必要な場合の set position を固定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-synthesis-input-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisInput-example-positive-manual-20260716
    labels:
      zh: SynthesisInput positive
      en: SynthesisInput positive
      ja: SynthesisInput positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 SynthesisInput 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes SynthesisInput programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy SynthesisInput: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_artifact_id: input-network-section-v3, media_type: "text/markdown", content_digest: sha256:section-network-17-v3, produced_at: 2026-07-16T04:21:00Z, source_artifact_ref: "section-network-17@3", input_ordinal: 2}

    related_node_ids:
      - SynthesisInput
      - Synthesis
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
    source_claims:
      - claim-synthesis-input-001
      - claim-synthesis-input-002

  - id: SynthesisInput-example-boundary-manual-20260716
    labels:
      zh: SynthesisInput boundary
      en: SynthesisInput boundary
      ja: SynthesisInput boundary
    descriptions:
      zh: CoT 中间推理 token 是运行时 LLM 输出，不是 SynthesisInput 规范字段；投影时区分 ReasoningStep 事件与规约身份。
      en: CoT intermediate reasoning tokens are runtime LLM output, not SynthesisInput specification fields; distinguish ReasoningStep events from spec identity in projection.
      ja: CoT 中間推論 token は runtime 出力で SynthesisInput spec ではない。
    field_values: {}

    related_node_ids:
      - SynthesisInput
    related_relation_ids: []
    source_claims:
      - claim-synthesis-input-001

  - id: SynthesisInput-example-instance-manual-20260719
    labels:
      zh: SynthesisInput instance
      en: SynthesisInput instance
      ja: SynthesisInput instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 SynthesisInput HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to SynthesisInput HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が SynthesisInput HandoffDecision に写像。
    field_values: {media_type: "text/markdown", content_digest: sha256:section-network-17, produced_at: 2026-07-16T04:21:00Z, source_artifact_ref: "section-network-17@3", input_ordinal: 2}

    related_node_ids:
      - SynthesisInput
      - CompositionArtifact
    related_relation_ids:
      - SynthesisInput-is_a-CompositionArtifact
    source_claims:
      - claim-synthesis-input-hierarchy

  - id: SynthesisInput-counterexample-synthesis-output
    labels:
      zh: SynthesisInput counterexample
      en: SynthesisInput counterexample
      ja: SynthesisInput counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 SynthesisInput PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style SynthesisInput PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 SynthesisInput ではない。
    field_values: {synthesis_input_id: absent, source_artifact_refs: absent, content_digest: sha256:report-md, produced_at: 2026-07-16T04:22:00Z}

    related_node_ids:
      - SynthesisInput
      - SynthesisOutput
      - CompositionArtifact
    related_relation_ids: []
    source_claims:
      - claim-synthesis-input-002

parent_relation:
  id: SynthesisInput-is_a-CompositionArtifact
  predicate: is_a
  target: concept:CompositionArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合工件
    en: is a composition artifact
    ja: composition artifact である
  definition:
    zh: SynthesisInput 继承 CompositionArtifact 的不可变工件角色，并特化为 Synthesis 消费的输入工件。
    en: SynthesisInput inherits CompositionArtifact immutable-artifact role and specializes it as input consumed by Synthesis.
    ja: SynthesisInput は CompositionArtifact の immutable artifact 役割を継承し Synthesis が consume する input として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_synthesis_input
    labels: { zh: 具有综合输入, en: has synthesis input, ja: synthesis input を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-synthesis-input-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；contributor 与 section scope 使用子类型字段表达。
    en: is_a only states type membership; contributor and section scope use subtype fields.
    ja: is_a は型従属のみを述べ、contributor/section scope は subtype field で表現します。
