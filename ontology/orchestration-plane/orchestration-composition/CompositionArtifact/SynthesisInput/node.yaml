schema: moonweave.ai/ontology-node/v1
id: SynthesisInput
kind: concept
status: review
labels:
  zh: 综合输入
  en: synthesis input
  ja: 統合入力
semantics:
  short_definition:
    zh: 被某次综合活动纳入输入集合、带有来源角色和序位的不可变组合工件。
    en: An immutable composition artifact admitted to one synthesis input set with a provenance role and ordinal.
    ja: one synthesis input set に provenance role/ordinal 付きで採用された immutable composition artifact です。
  definition:
    zh: 综合输入是 CompositionArtifact 的子类，以输入标识、内容摘要、来源工件引用、在综合集合中的角色与序位为种差。它表示综合活动读取的固定输入版本，不是来源文档登记项、检索结果指针或正在运行的综合活动。
    en: A SynthesisInput is a CompositionArtifact distinguished by input ID, content digest, source-artifact reference, role, and ordinal in a synthesis set. It denotes the fixed artifact revision read by synthesis, not a source-registry entry, retrieval pointer, or running synthesis activity.
    ja: SynthesisInput は input ID・digest・source artifact ref・role・ordinal で区別される CompositionArtifact で source registry/retrieval pointer/running activity ではありません。
  why_needed:
    zh: 显式输入节点使每个综合结论可追溯到实际版本和输入顺序，而不是仅指向模糊的来源或模块。
    en: Explicit input nodes trace synthesis conclusions to actual versions and order rather than vague sources or modules.
    ja: explicit input nodes で synthesis conclusion を actual versions/order へ trace し vague source/module を避けます。
  includes:
    - zh: 被固定版本纳入综合的章节草稿、证据包、候选方案和结构化评审结果。
      en: Version-fixed section drafts, evidence packets, candidates, and structured review results admitted to synthesis.
      ja: version-fixed section draft・evidence packet・candidate・structured review result。
  excludes:
    - zh: URL、来源注册行、未物化查询、综合计划、综合活动和综合完成后的输出。
      en: URLs, source-registry rows, unmaterialized queries, synthesis plans, synthesis activities, and post-synthesis outputs.
      ja: URL・source registry row・unmaterialized query・plan・activity・post-synthesis output。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_artifact_ref
      labels:
        zh: 来源工件引用
        en: source-artifact reference
        ja: source artifact ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被纳入综合的原始不可变工件版本。
        en: References the original immutable artifact revision admitted to synthesis.
        ja: synthesis に採用した original immutable artifact revision を参照します。
      allowed_values: []
      pattern: null
      example_value: section-network-17@3
      source_claims:
        - claim-synthesis-input-001
    - id: input_ordinal
      labels:
        zh: 输入序位
        en: input ordinal
        ja: input ordinal
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在需要稳定顺序时固定该输入的集合位置。
        en: Fixes this member's set position when stable ordering is required.
        ja: stable ordering が必要な場合の set position を固定します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-synthesis-input-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisInput-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 网络章节综合输入
      en: Network-section synthesis input
      ja: network-section synthesis input
    scenario_id: null
    descriptions:
      zh: input-network-section-v3 引用 section-network-17@3，摘要固定，在 synthesis-884 的输入集合中序位为 2。
      en: input-network-section-v3 references section-network-17@3 with fixed digest and ordinal two in synthesis-884's input set.
      ja: input-network-section-v3 は fixed digest の section artifact を参照し synthesis-884 input ordinal 2 です。
    field_values:
      composition_artifact_id: input-network-section-v3
      media_type: text/markdown
      content_digest: sha256:section-network-17-v3
      produced_at: 2026-07-16T04:21:00Z
      source_artifact_ref: section-network-17@3
      input_ordinal: 2
    related_node_ids:
      - SynthesisInput
      - Synthesis
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
    expected_result:
      zh: 作为综合活动实际消费的固定输入版本返回。
      en: Return it as a fixed input revision actually consumed by synthesis.
      ja: synthesis が actual consume した fixed input revision として返します。
    why_valid_or_invalid:
      zh: 来源版本、内容摘要和集合序位使输入成员资格可审计。
      en: Source revision, digest, and set ordinal make input membership auditable.
      ja: source revision・digest・ordinal により input membership が auditable です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-input-001
      - claim-synthesis-input-002
  - id: SynthesisInput-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 指向最新章节的查询
      en: Query for the latest section
      ja: latest section query
    scenario_id: composition-review-synthesisinput-boundary
    descriptions:
      zh: query-latest-network 运行时可能返回不同章节版本，没有固定摘要或被 synthesis-884 实际读取的版本。
      en: query-latest-network may return different section revisions at runtime and has no fixed digest or revision actually read by synthesis-884.
      ja: query-latest-network は runtime に異なる revisions を返し fixed digest/actual read revision がありません。
    field_values: {}
    related_node_ids:
      - SynthesisInput
    related_relation_ids: []
    expected_result:
      zh: 先解析并固化工件版本，再创建 SynthesisInput。
      en: Resolve and freeze an artifact revision before creating SynthesisInput.
      ja: artifact revision を resolve/freeze 後に SynthesisInput を作ります。
    why_valid_or_invalid:
      zh: 动态查询没有不可变内容身份，无法证明综合实际消费了什么。
      en: A dynamic query lacks immutable content identity and cannot prove what synthesis consumed.
      ja: dynamic query は immutable content identity を欠き actual consumed object を証明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-input-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SynthesisInput-is_a-CompositionArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 综合输入继承组合工件的不可变内容身份，并以被纳入某综合集合的来源角色和序位为种差。
    en: SynthesisInput inherits immutable composition-artifact identity and is distinguished by provenance role and ordinal in one synthesis set.
    ja: SynthesisInput は immutable artifact identity を継承し synthesis set の provenance role・ordinal を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SynthesisInput-is_a-CompositionArtifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: SynthesisInput 的有效分类
        en: Valid SynthesisInput classification
        ja: SynthesisInput の valid classification
      scenario_id: composition-relation-synthesisinput-is_a-compositionartifact-positive
      descriptions:
        zh: input-network-section-v3 固定章节版本、摘要及在 synthesis-884 输入集合中的序位二。
        en: input-network-section-v3 fixes a section revision, digest, and ordinal two in synthesis-884's input set.
        ja: input は fixed section revision・digest・ordinal two を持ちます。
      field_values: {}
      related_node_ids:
        - SynthesisInput
        - CompositionArtifact
      related_relation_ids:
        - SynthesisInput-is_a-CompositionArtifact
      expected_result:
        zh: 查询同时返回 CompositionArtifact 上位类型与 SynthesisInput 下位类型。
        en: The query returns the CompositionArtifact genus and the SynthesisInput subtype together.
        ja: query は CompositionArtifact genus と SynthesisInput subtype をともに返します。
      why_valid_or_invalid:
        zh: 该记录保留 CompositionArtifact 的共同身份并满足 SynthesisInput 的完整种差。
        en: The record retains CompositionArtifact identity and satisfies the complete SynthesisInput differentia.
        ja: record は CompositionArtifact identity を保持し SynthesisInput differentia を完全に満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-synthesis-input-001
        - claim-synthesis-input-002
    - id: SynthesisInput-is_a-CompositionArtifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: SynthesisInput 的近邻反例
        en: Near-boundary non-SynthesisInput
        ja: SynthesisInput near-boundary
      scenario_id: composition-relation-synthesisinput-is_a-compositionartifact-boundary
      descriptions:
        zh: query-latest-network 可能解析出不同版本，不能证明综合实际读取了哪一个工件。
        en: query-latest-network may resolve to changing revisions and cannot prove which artifact synthesis read.
        ja: dynamic query は actual consumed artifact revision を証明できません。
      field_values: {}
      related_node_ids:
        - SynthesisInput
        - CompositionArtifact
      related_relation_ids:
        - SynthesisInput-is_a-CompositionArtifact
      expected_result:
        zh: 不得仅凭相邻出现把该对象沿本关系归为 SynthesisInput。
        en: Do not classify the object as SynthesisInput through adjacency alone.
        ja: adjacency だけで object を SynthesisInput に分類しません。
      why_valid_or_invalid:
