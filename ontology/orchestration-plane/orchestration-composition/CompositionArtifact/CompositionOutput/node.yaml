schema: moonweave.ai/ontology-node/v1
id: CompositionOutput
kind: concept
labels:
  zh: 组合输出
  en: composition output
  ja: 構成出力
semantics:
  short_definition:
    zh: 由组合活动产生、符合声明输出契约并可独立引用的不可变组合工件。
    en: An immutable composition artifact produced by a composition activity, conforming to a declared output contract, and independently referenceable.
    ja: composition activity が生成し declared output contract に適合して独立参照できる immutable composition artifact です。
  definition:
    zh: 组合输出是 CompositionArtifact 的子类，以输出标识、内容摘要、输出契约引用、产生者活动和产生时间为种差，是 SynthesisOutput 的上位概念。它可以是投票决定、分支汇合结果或章节草稿，但不是产生它的活动或约束活动的计划。
    en: A CompositionOutput is a CompositionArtifact distinguished by output ID, content digest, output-contract reference, producing activity, and production time and is the genus of SynthesisOutput. It may be a voting decision, branch-join result, or section draft, but is neither its producing activity nor the plan constraining that activity.
    ja: CompositionOutput は output ID・content digest・contract ref・producing activity・production time で区別される CompositionArtifact で SynthesisOutput の genus です。activity/plan ではありません。
  why_needed:
    zh: 通用输出层让不同组合活动共享内容身份和产出关系，同时让综合输出保留更严格的来源追踪种差。
    en: A general output layer gives composition activities shared content identity and production semantics while allowing synthesis output to add stricter provenance differentia.
    ja: general output layer で shared content identity/production semantics を持ち synthesis output は stricter provenance differentia を追加できます。
  includes:
    - zh: 投票决定记录、并行汇合摘要、链式阶段输出和分区章节草稿。
      en: Voting-decision records, parallel-join summaries, chain-stage outputs, and section drafts.
      ja: voting decision record・parallel join summary・chain-stage output・section draft。
  excludes:
    - zh: 运行活动、模式、计划、未结算候选输入、运行日志和仅供可视化的社区摘要。
      en: Runtime activities, patterns, plans, unsettled candidate inputs, run logs, and visualization-only community summaries.
      ja: runtime activity・pattern・plan・unsettled input・run log・visualization community summary。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: CrewAI 最终 task expected_output、LangGraph END 节点 state 字段与 VotingActivity 计票结果映射为 CompositionOutput；须记录 producing_activity_ref。
    en: CrewAI final task expected_output, LangGraph END state fields, and VotingActivity tally results map to CompositionOutput with producing_activity_ref.
    ja: CrewAI expected_output・LangGraph END state・VotingActivity 集計結果を producing_activity_ref 付き CompositionOutput へ写像します。
  typical_input:
    - description: Aggregation activity produces final output.
      format: '{"output_ref": "final-report@9", "producing_activity": "synthesis-run-31"}'
      source_claims:
        - claim-composition-output-design
  typical_output:
    - description: Moonweave CompositionOutput.
      format: '{"composition_artifact_id": "final-report@9", "role": "composition-output"}'
      source_claims:
        - claim-composition-output-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: output_contract_ref
      labels:
        zh: 输出契约引用
        en: output-contract reference
        ja: output contract ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用输出声明符合的结构或语义契约版本。
        en: References the structural or semantic contract revision the output satisfies.
        ja: output が満たす structural/semantic contract revision を参照します。
      allowed_values: []
      pattern: null
      example_value: decision-schema@2
      source_claims:
        - claim-composition-output-design
    - id: producer_activity_ref
      labels:
        zh: 产生活动引用
        en: producer-activity reference
        ja: producer activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用生成该不可变内容的组合活动。
        en: References the composition activity that generated this immutable content.
        ja: immutable content を生成した composition activity を参照します。
      allowed_values: []
      pattern: null
      example_value: vote-run-52
      source_claims:
        - claim-composition-output-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionOutput-synthesis-result
    labels:
      zh: 综合输出
      en: Synthesis result output
      ja: 統合 output
    descriptions:
      zh: final-report@9 由 Synthesis synthesis-run-31 在应用 conflict-preserving@2 后产生。
      en: final-report@9 is produced by Synthesis synthesis-run-31 after applying conflict-preserving@2.
      ja: final-report@9 は Synthesis synthesis-run-31 が conflict-preserving@2 適用後に生成。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: fan-in reducer
    field_values:
      composition_artifact_id: final-report@9
    related_node_ids:
      - CompositionOutput
      - Synthesis
    related_relation_ids:
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-composition-output-langgraph
      - claim-composition-output-design
  - id: CompositionOutput-vote-result
    labels:
      zh: 投票结果输出
      en: Vote result output
      ja: 投票結果 output
    descriptions:
      zh: vote-result-18@1 含完整 score breakdown，由 VotingActivity vote-run-18 产生。
      en: vote-result-18@1 includes complete score breakdown produced by VotingActivity vote-run-18.
      ja: vote-result-18@1 は score breakdown を含み VotingActivity vote-run-18 が生成。
    example_source:
      product: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      version: best-of-N selection
    field_values:
      composition_artifact_id: vote-result-18@1
    related_node_ids:
      - CompositionOutput
      - VotingActivity
    related_relation_ids:
      - VotingActivity-produces-CompositionOutput
    source_claims:
      - claim-composition-output-anthropic
      - claim-composition-output-design
  - id: CompositionOutput-boundary-input
    labels:
      zh: 输入不是输出
      en: Input is not output
      ja: input は output ではない
    descriptions:
      zh: draft-report@8 作为 SynthesisInput 被消费，不是 CompositionOutput。
      en: draft-report@8 is consumed as SynthesisInput, not CompositionOutput.
      ja: draft-report@8 は SynthesisInput として consume され CompositionOutput ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: input versus output role
    field_values: {}
    related_node_ids:
      - CompositionOutput
      - SynthesisInput
    related_relation_ids: []
    source_claims:
      - claim-composition-output-design
parent_relation:
  id: CompositionOutput-is_a-CompositionArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 组合输出继承组合工件的不可变内容身份，并以产生活动和输出契约符合性为种差。
    en: CompositionOutput inherits immutable composition-artifact identity and is distinguished by a producing activity and output-contract conformance.
    ja: CompositionOutput は immutable artifact identity を継承し producing activity・output contract conformance を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-composition-output-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: StateGraph, Send API, sequential edges, parallel supersteps, reducers.
  - id: crewai
    title: CrewAI
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.sequential, Process.parallel, output consolidation.
  - id: anthropic-workflows
    title: Building effective agents (Anthropic)
    url: https://www.anthropic.com/engineering/building-effective-agents
    source_type: official-doc
    relevance: Prompt chaining, parallelization, orchestrator-worker, voting patterns.
  - id: openai-cookbook
    title: OpenAI Cookbook
    url: https://cookbook.openai.com/
    source_type: official-doc
    relevance: Multi-step agent workflows and evaluation patterns.
  - id: composition-design
    title: Moonweave composition boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CompositionSpecification versus CompositionActivity separation.
source_claims:
  - id: claim-composition-output-langgraph
    source: langgraph
    supports: Fan-in reducer output is a distinct composition result artifact.
    locator: Parallel supersteps and reducers
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-output-anthropic
    source: anthropic-workflows
    supports: Voting pattern produces a selected winner as composition output.
    locator: Voting workflow pattern
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-output-design
    source: composition-design
    supports: CompositionOutput role marks artifacts produced by composition activities.
    locator: CompositionOutput boundary
    evidence_kind: design-inference
    confidence: high
