schema: moonweave.ai/ontology-node/v1
id: CompositionOutput
kind: concept
status: review
labels:
  zh: 组合输出
  en: composition output
  ja: 構成出力
semantics:
  short_definition:
    zh: 由组合活动产生、符合声明输出契约并可独立引用的不可变组合工件。
    en: An immutable composition artifact produced by a composition activity, conforming to a declared output contract, and independently referenceable.
    ja: composition activity が生成し declared output contract に適合して独立参照できる immutable composition artifact です。
  definition:
    zh: 组合输出是 CompositionArtifact 的子类，以输出标识、内容摘要、输出契约引用、产生者活动和产生时间为种差，是 SynthesisOutput 的上位概念。它可以是投票决定、分支汇合结果或章节草稿，但不是产生它的活动或约束活动的计划。
    en: A CompositionOutput is a CompositionArtifact distinguished by output ID, content digest, output-contract reference, producing activity, and production time and is the genus of SynthesisOutput. It may be a voting decision, branch-join result, or section draft, but is neither its producing activity nor the plan constraining that activity.
    ja: CompositionOutput は output ID・content digest・contract ref・producing activity・production time で区別される CompositionArtifact で SynthesisOutput の genus です。activity/plan ではありません。
  why_needed:
    zh: 通用输出层让不同组合活动共享内容身份和产出关系，同时让综合输出保留更严格的来源追踪种差。
    en: A general output layer gives composition activities shared content identity and production semantics while allowing synthesis output to add stricter provenance differentia.
    ja: general output layer で shared content identity/production semantics を持ち synthesis output は stricter provenance differentia を追加できます。
  includes:
    - zh: 投票决定记录、并行汇合摘要、链式阶段输出和分区章节草稿。
      en: Voting-decision records, parallel-join summaries, chain-stage outputs, and section drafts.
      ja: voting decision record・parallel join summary・chain-stage output・section draft。
  excludes:
    - zh: 运行活动、模式、计划、未结算候选输入、运行日志和仅供可视化的社区摘要。
      en: Runtime activities, patterns, plans, unsettled candidate inputs, run logs, and visualization-only community summaries.
      ja: runtime activity・pattern・plan・unsettled input・run log・visualization community summary。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: output_contract_ref
      labels:
        zh: 输出契约引用
        en: output-contract reference
        ja: output contract ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用输出声明符合的结构或语义契约版本。
        en: References the structural or semantic contract revision the output satisfies.
        ja: output が満たす structural/semantic contract revision を参照します。
      allowed_values: []
      pattern: null
      example_value: decision-schema@2
      source_claims:
        - claim-composition-output-002
    - id: producer_activity_ref
      labels:
        zh: 产生活动引用
        en: producer-activity reference
        ja: producer activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用生成该不可变内容的组合活动。
        en: References the composition activity that generated this immutable content.
        ja: immutable content を生成した composition activity を参照します。
      allowed_values: []
      pattern: null
      example_value: vote-run-52
      source_claims:
        - claim-composition-output-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionOutput-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 投票批准结果
      en: Voting approval result
      ja: voting approval result
    scenario_id: null
    descriptions:
      zh: vote-result-52 符合 decision-schema@2，内容摘要固定，并记录 vote-run-52 及所用票集合。
      en: vote-result-52 conforms to decision-schema@2, has a fixed content digest, and records vote-run-52 and its ballot set.
      ja: vote-result-52 は decision-schema@2 に適合し fixed digest と vote-run-52/ballot set provenance を持ちます。
    field_values:
      composition_artifact_id: vote-result-52
      media_type: application/json
      content_digest: sha256:vote-result-52
      produced_at: 2026-07-16T10:31:00Z
      output_contract_ref: decision-schema@2
      producer_activity_ref: vote-run-52
    related_node_ids:
      - CompositionOutput
      - VotingActivity
    related_relation_ids:
      - VotingActivity-produces-CompositionOutput
    expected_result:
      zh: 作为可独立引用的投票活动输出保存。
      en: Store it as an independently referenceable voting-activity output.
      ja: independently referenceable voting output として保存します。
    why_valid_or_invalid:
      zh: 固定内容、契约和产生者共同确定输出身份。
      en: Fixed content, contract, and producer jointly determine output identity.
      ja: fixed content・contract・producer が output identity を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-output-001
      - claim-composition-output-002
  - id: CompositionOutput-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 尚未结算的候选答案
      en: Unsettled candidate answer
      ja: unsettled candidate answer
    scenario_id: composition-review-compositionoutput-boundary
    descriptions:
      zh: candidate-a 仍是投票输入，尚未有产生该集体结果的活动或符合 decision-schema@2 的结算内容。
      en: candidate-a remains a voting input and has no producing collective-decision activity or settled content conforming to decision-schema@2.
      ja: candidate-a は voting input のままで producing collective activity/settled contract content がありません。
    field_values: {}
    related_node_ids:
      - CompositionOutput
      - VoteBallot
    related_relation_ids: []
    expected_result:
      zh: 保留为候选输入，不把它提前声明为 CompositionOutput。
      en: Keep it as candidate input and do not assert CompositionOutput prematurely.
      ja: candidate input とし CompositionOutput を早期主張しません。
    why_valid_or_invalid:
      zh: 参与组合不等于已经由组合活动产生并通过输出契约。
      en: Participating in composition does not mean an output was produced and validated.
      ja: composition participation は produced/validated output を意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-composition-output-002
      - claim-composition-output-001
external_mappings: []
