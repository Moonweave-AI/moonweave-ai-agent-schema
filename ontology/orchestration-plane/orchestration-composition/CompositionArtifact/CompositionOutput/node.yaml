source_claims:
  - id: claim-composition-output-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-composition-output-002
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
