schema: moonweave.ai/ontology-node/v1
id: CompositionOutput
kind: concept
labels:
  zh: 组合输出
  en: composition output
  ja: 構成出力
semantics:
  short_definition:
    zh: 由组合活动产生、符合声明输出契约并可独立引用的不可变组合工件。
    en: An immutable composition artifact produced by a composition activity, conforming to a declared output contract, and independently referenceable.
    ja: composition activity が生成し declared output contract に適合して独立参照できる immutable composition artifact です。
  definition:
    zh: 组合输出是 CompositionArtifact 的子类，以输出标识、内容摘要、输出契约引用、产生者活动和产生时间为种差，是 SynthesisOutput 的上位概念。它可以是投票决定、分支汇合结果或章节草稿，但不是产生它的活动或约束活动的计划。
    en: A CompositionOutput is a CompositionArtifact distinguished by output ID, content digest, output-contract reference, producing activity, and production time and is the genus of SynthesisOutput. It may be a voting decision, branch-join result, or section draft, but is neither its producing activity nor the plan constraining that activity.
    ja: CompositionOutput は output ID・content digest・contract ref・producing activity・production time で区別される CompositionArtifact で SynthesisOutput の genus です。activity/plan ではありません。
  why_needed:
    zh: 通用输出层让不同组合活动共享内容身份和产出关系，同时让综合输出保留更严格的来源追踪种差。
    en: A general output layer gives composition activities shared content identity and production semantics while allowing synthesis output to add stricter provenance differentia.
    ja: general output layer で shared content identity/production semantics を持ち synthesis output は stricter provenance differentia を追加できます。
  includes:
    - zh: 投票决定记录、并行汇合摘要、链式阶段输出和分区章节草稿。
      en: Voting-decision records, parallel-join summaries, chain-stage outputs, and section drafts.
      ja: voting decision record・parallel join summary・chain-stage output・section draft。
  excludes:
    - zh: 运行活动、模式、计划、未结算候选输入、运行日志和仅供可视化的社区摘要。
      en: Runtime activities, patterns, plans, unsettled candidate inputs, run logs, and visualization-only community summaries.
      ja: runtime activity・pattern・plan・unsettled input・run log・visualization community summary。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      CompositionOutput 记录组合活动产生的一般输出工件，含 producer_activity_ref 与 disposition。
      PROV wasGeneratedBy 方向为 Activity→CompositionOutput；digest 绑定不可变内容。
    en: >-
      CompositionOutput records general output artifacts from composition activities with producer_activity_ref and
      disposition. PROV wasGeneratedBy runs Activity→CompositionOutput; digest binds immutable content.
    ja: >-
      CompositionOutput は composition activity が produce する general output artifact を producer_activity_ref/disposition
      付きで記録する。
  typical_input:
    - description:
        zh: 组合活动完成阶段后产生的结构化输出内容。
        en: Structured output content emitted when a composition stage completes.
        ja: composition stage 完了時に emit される structured output content。
      format: |-
        {"composition_activity_id":"synthesis-884","output_body":"## Report\nAll sections merged.","media_type":"text/markdown","disposition":"accepted"}
  typical_output:
    - description:
        zh: 不可变组合输出工件记录。
        en: Immutable composition output artifact record.
        ja: immutable composition output artifact record。
      format: |-
        {"composition_artifact_id":"artifact-report-1","media_type":"text/markdown","content_digest":"sha256:report-1","produced_at":"2026-07-16T04:22:00Z","producer_activity_ref":"synthesis-884","disposition":"accepted"}
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Documents wasGeneratedBy from Activity to Entity.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents node outputs passed as state values between graph steps.
  source_claims:
    - claim-composition-output-hierarchy
    - claim-composition-output-001
structure:
  identity_keys: []
  fields:
    - id: output_contract_ref
      labels:
        zh: 输出契约引用
        en: output-contract reference
        ja: output contract ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用输出声明符合的结构或语义契约版本。
        en: References the structural or semantic contract revision the output satisfies.
        ja: output が満たす structural/semantic contract revision を参照します。
      allowed_values: []
      pattern: null
      example_value: decision-schema@2
      source_claims:
        - claim-composition-output-002
    - id: producer_activity_ref
      labels:
        zh: 产生活动引用
        en: producer-activity reference
        ja: producer activity ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用生成该不可变内容的组合活动。
        en: References the composition activity that generated this immutable content.
        ja: immutable content を生成した composition activity を参照します。
      allowed_values: []
      pattern: null
      example_value: vote-run-52
      source_claims:
        - claim-composition-output-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: CompositionOutput-example-positive-manual-20260716
    labels:
      zh: CompositionOutput positive
      en: CompositionOutput positive
      ja: CompositionOutput positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 CompositionOutput 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes CompositionOutput programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy CompositionOutput: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_artifact_id: vote-result-52, media_type: "application/json", content_digest: sha256:vote-result-52, produced_at: 2026-07-16T10:31:00Z, output_contract_ref: "decision-schema@2", producer_activity_ref: vote-run-52}

    related_node_ids:
      - CompositionOutput
      - VotingActivity
    related_relation_ids:
      - VotingActivity-produces-CompositionOutput
    source_claims:
      - claim-composition-output-001
      - claim-composition-output-002

  - id: CompositionOutput-example-boundary-manual-20260716
    labels:
      zh: CompositionOutput boundary
      en: CompositionOutput boundary
      ja: CompositionOutput boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 CompositionOutput 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not CompositionOutput work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で CompositionOutput work_specification ではない。
    field_values: {}

    related_node_ids:
      - CompositionOutput
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-composition-output-002
      - claim-composition-output-001

  - id: CompositionOutput-example-instance-manual-20260719
    labels:
      zh: CompositionOutput instance
      en: CompositionOutput instance
      ja: CompositionOutput instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 CompositionOutput policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to CompositionOutput policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が CompositionOutput policy-prefect@1 に写像。
    field_values: {media_type: "application/json", content_digest: sha256:vote-result-52, produced_at: 2026-07-16T10:31:00Z, output_contract_ref: "decision-schema@2", producer_activity_ref: vote-run-52}

    related_node_ids:
      - CompositionOutput
      - CompositionArtifact
    related_relation_ids:
      - CompositionOutput-is_a-CompositionArtifact
    source_claims:
      - claim-composition-output-hierarchy

  - id: CompositionOutput-counterexample-synthesis-input
    labels:
      zh: CompositionOutput counterexample
      en: CompositionOutput counterexample
      ja: CompositionOutput counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 CompositionOutput PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style CompositionOutput PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 CompositionOutput ではない。
    field_values: {output_role: absent, content_digest: absent, produced_at: absent, input_refs: [research_task]}

    related_node_ids:
      - CompositionOutput
      - SynthesisInput
      - CompositionArtifact
    related_relation_ids: []
    source_claims:
      - claim-composition-output-002

parent_relation:
  id: CompositionOutput-is_a-CompositionArtifact
  predicate: is_a
  target: concept:CompositionArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合工件
    en: is a composition artifact
    ja: composition artifact である
  definition:
    zh: CompositionOutput 继承 CompositionArtifact 的不可变工件角色，并特化为活动输出契约绑定。
    en: CompositionOutput inherits CompositionArtifact immutable-artifact role and specializes it with output-contract bindings.
    ja: CompositionOutput は CompositionArtifact の immutable artifact 役割を継承し output contract binding として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_composition_output
    labels: { zh: 具有组合输出, en: has composition output, ja: composition output を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-composition-output-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；输出契约与产生活动引用使用子类型字段表达。
    en: is_a only states type membership; output contract and producer activity refs use subtype fields.
    ja: is_a は型従属のみを述べ、output contract/producer activity ref は subtype field で表現します。
sources:
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Documents reusable workflow composition patterns used as engineering references.
source_claims:
  - id: claim-composition-output-hierarchy
    source: langgraph-workflows-agents
    supports: CompositionOutput is modeled as an is_a specialization of CompositionArtifact in Moonweave composition semantics.
    locator: Workflows and agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-output-001
    source: langgraph-workflows-agents
    supports: Moonweave records CompositionOutput using claim claim-composition-output-001 to anchor composition output 001 semantics against the cited official source rather than renaming API wire objects as ontology types.
    locator: PROV-O Activity, Entity, Agent, and lineage model
    evidence_kind: design-inference
    confidence: high
  - id: claim-composition-output-002
    source: langgraph-workflows-agents
    supports: Moonweave records CompositionOutput using claim claim-composition-output-002 to anchor composition output 002 semantics against the cited official source rather than renaming API wire objects as ontology types.
    locator: PROV-O Activity, Entity, Agent, and lineage model
    evidence_kind: design-inference
    confidence: high
