schema: moonweave.ai/ontology-node/v1
id: SynthesisOutput
kind: concept
status: review
labels:
  zh: 综合输出
  en: synthesis output
  ja: 統合出力
semantics:
  short_definition:
    zh: 由综合活动生成、满足综合计划契约并携带输入到主张追踪清单的组合输出。
    en: A composition output generated by synthesis, satisfying its plan contract, and carrying an input-to-claim trace manifest.
    ja: synthesis が生成し plan contract を満たして input-to-claim trace manifest を持つ composition output です。
  definition:
    zh: 综合输出是 CompositionOutput 的子类，以综合输出标识、产生者 Synthesis、所用 SynthesisPlan、内容摘要和主张级追踪清单为种差。它是综合活动产生的新整体工件，不是输入集合、活动本身或仅把输入文件拼接后的归档。
    en: A SynthesisOutput is a CompositionOutput distinguished by synthesis-output ID, producing Synthesis, applied SynthesisPlan, content digest, and claim-level trace manifest. It is the new whole artifact generated by synthesis, not the input set, activity itself, or an archive that merely concatenates inputs.
    ja: SynthesisOutput は output ID・producing Synthesis・plan・digest・claim-level trace manifest で区別される CompositionOutput です。input set・activity・simple concatenation archive ではありません。
  why_needed:
    zh: 专门输出层保证综合结果必须证明其计划符合性和输入追踪，而普通组合输出无需承担同等强度的综合语义。
    en: The specialized output layer requires synthesis results to prove plan conformance and input traceability without imposing that strength on all composition outputs.
    ja: specialized output layer で synthesis result に plan conformance/input traceability を要求し全 outputs へ過剰適用しません。
  includes:
    - zh: 带主张级引用的综合报告、证据调和结论、多章节统一稿和候选方案综合说明。
      en: Synthesis reports with claim-level citations, reconciled evidence conclusions, unified multi-section drafts, and consolidated candidate explanations.
      ja: claim-level cited report・reconciled conclusion・unified multi-section draft・candidate consolidation explanation。
  excludes:
    - zh: 单个章节输入、投票结果、简单压缩包、综合活动、综合计划和未验证的草稿缓存。
      en: Individual section inputs, voting results, simple archives, synthesis activities, synthesis plans, and unvalidated draft caches.
      ja: single section input・voting result・simple archive・synthesis activity・plan・unvalidated draft cache。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: plan_ref
      labels:
        zh: 计划引用
        en: plan reference
        ja: plan ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该输出必须符合的 SynthesisPlan 版本。
        en: References the SynthesisPlan revision this output must satisfy.
        ja: output が適合すべき SynthesisPlan revision を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-report-synthesis@5
      source_claims:
        - claim-synthesis-output-001
    - id: trace_manifest_ref
      labels:
        zh: 追踪清单引用
        en: trace-manifest reference
        ja: trace manifest ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用从输出主张到 SynthesisInput 的可验证映射。
        en: References the verifiable mapping from output claims to SynthesisInputs.
        ja: output claims から SynthesisInputs への verifiable mapping を参照します。
      allowed_values: []
      pattern: null
      example_value: manifest-report-884
      source_claims:
        - claim-synthesis-output-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisOutput-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 可追溯审计报告
      en: Traceable audit report
      ja: traceable audit report
    scenario_id: null
    descriptions:
      zh: report-884 由 synthesis-884 产生，符合 audit-report-synthesis@5，并通过 manifest-report-884 将每条结论追踪到三份输入。
      en: report-884 is generated by synthesis-884, conforms to audit-report-synthesis@5, and traces every conclusion to three inputs through manifest-report-884.
      ja: report-884 は synthesis-884 が生成し plan に適合、manifest で every conclusion を three inputs へ trace します。
    field_values:
      composition_artifact_id: report-884
      media_type: text/markdown
      content_digest: sha256:report-884
      produced_at: 2026-07-16T04:22:00Z
      output_contract_ref: report-schema@2
      producer_activity_ref: synthesis-884
      plan_ref: audit-report-synthesis@5
      trace_manifest_ref: manifest-report-884
    related_node_ids:
      - SynthesisOutput
      - Synthesis
    related_relation_ids:
      - Synthesis-produces-SynthesisOutput
    expected_result:
      zh: 作为具有计划符合性和主张级来源的综合输出返回。
      en: Return it as a synthesis output with plan conformance and claim-level provenance.
      ja: plan conformance/claim-level provenance を持つ synthesis output として返します。
    why_valid_or_invalid:
      zh: 新整体内容、产生活动、计划和追踪清单完整满足综合输出种差。
      en: New whole content, producing activity, plan, and trace manifest satisfy the synthesis-output differentia.
      ja: new whole・producer・plan・trace manifest が synthesis-output differentia を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-output-001
      - claim-synthesis-output-002
  - id: SynthesisOutput-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 三份章节文件的压缩包
      en: Archive of three section files
      ja: three section files archive
    scenario_id: composition-review-synthesisoutput-boundary
    descriptions:
      zh: sections.zip 只原样打包三个输入，没有新主张、冲突调和或从结论到输入的追踪清单。
      en: sections.zip merely packages three inputs unchanged and has no new claims, conflict reconciliation, or conclusion-to-input trace manifest.
      ja: sections.zip は inputs を unchanged package するだけで new claim・conflict reconciliation・trace manifest はありません。
    field_values: {}
    related_node_ids:
      - SynthesisOutput
      - SynthesisInput
    related_relation_ids: []
    expected_result:
      zh: 保留为普通归档工件，不分类为 SynthesisOutput。
      en: Keep it as a general archive artifact, not SynthesisOutput.
      ja: general archive artifact とし SynthesisOutput に分類しません。
    why_valid_or_invalid:
      zh: 文件集合没有经过形成新整体表达的综合活动。
      en: A file bundle has not undergone synthesis forming a new whole expression.
      ja: file bundle は new whole expression を形成する synthesis を受けていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-synthesis-output-002
      - claim-synthesis-output-001
external_mappings: []
applicability:
  - core
