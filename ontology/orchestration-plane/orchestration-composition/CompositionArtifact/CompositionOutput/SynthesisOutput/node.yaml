schema: moonweave.ai/ontology-node/v1
id: SynthesisOutput
kind: concept
labels:
  zh: 综合输出
  en: synthesis output
  ja: 統合出力
semantics:
  short_definition:
    zh: 由综合活动生成、满足综合计划契约并携带输入到主张追踪清单的组合输出。
    en: A composition output generated by synthesis, satisfying its plan contract, and carrying an input-to-claim trace manifest.
    ja: synthesis が生成し plan contract を満たして input-to-claim trace manifest を持つ composition output です。
  definition:
    zh: 综合输出是 CompositionOutput 的子类，以综合输出标识、产生者 Synthesis、所用 SynthesisPlan、内容摘要和主张级追踪清单为种差。它是综合活动产生的新整体工件，不是输入集合、活动本身或仅把输入文件拼接后的归档。
    en: A SynthesisOutput is a CompositionOutput distinguished by synthesis-output ID, producing Synthesis, applied SynthesisPlan, content digest, and claim-level trace manifest. It is the new whole artifact generated by synthesis, not the input set, activity itself, or an archive that merely concatenates inputs.
    ja: SynthesisOutput は output ID・producing Synthesis・plan・digest・claim-level trace manifest で区別される CompositionOutput です。input set・activity・simple concatenation archive ではありません。
  why_needed:
    zh: 专门输出层保证综合结果必须证明其计划符合性和输入追踪，而普通组合输出无需承担同等强度的综合语义。
    en: The specialized output layer requires synthesis results to prove plan conformance and input traceability without imposing that strength on all composition outputs.
    ja: specialized output layer で synthesis result に plan conformance/input traceability を要求し全 outputs へ過剰適用しません。
  includes:
    - zh: 带主张级引用的综合报告、证据调和结论、多章节统一稿和候选方案综合说明。
      en: Synthesis reports with claim-level citations, reconciled evidence conclusions, unified multi-section drafts, and consolidated candidate explanations.
      ja: claim-level cited report・reconciled conclusion・unified multi-section draft・candidate consolidation explanation。
  excludes:
    - zh: 单个章节输入、投票结果、简单压缩包、综合活动、综合计划和未验证的草稿缓存。
      en: Individual section inputs, voting results, simple archives, synthesis activities, synthesis plans, and unvalidated draft caches.
      ja: single section input・voting result・simple archive・synthesis activity・plan・unvalidated draft cache。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      SynthesisOutput 记录 Synthesis 产生的新整体工件，含 synthesis_plan_ref 与 claim-level trace manifest。
      它是新生成的整体而非输入拼接存档；PROV wasGeneratedBy 绑定 producing Synthesis 活动。
    en: >-
      SynthesisOutput records the new whole artifact produced by Synthesis with synthesis_plan_ref and a claim-level
      trace manifest. It is a newly generated whole rather than a concatenation archive; PROV wasGeneratedBy binds the
      producing Synthesis activity.
    ja: >-
      SynthesisOutput は Synthesis が produce する new whole artifact を synthesis_plan_ref/claim-level trace manifest
      付きで記録する。
  typical_input:
    - description:
        zh: Synthesis 活动应用的计划 revision 与合格输入工件集合。
        en: Plan revision and eligible input artifact set applied by a Synthesis activity.
        ja: Synthesis activity が apply する plan revision/eligible input artifact set。
      format: |-
        {"synthesis_plan_ref":"report-synthesis@2","input_refs":["artifact-section-17","artifact-section-18"],"synthesis_activity_id":"synthesis-884"}
  typical_output:
    - description:
        zh: 带 plan 一致性与 claim trace 的综合输出工件记录。
        en: Synthesis output artifact record with plan conformance and claim trace.
        ja: plan conformance/claim trace 付き synthesis output artifact record。
      format: |-
        {"synthesis_output_id":"artifact-report-final@1","synthesis_plan_ref":"report-synthesis@2","content_digest":"sha256:report-final","produced_at":"2026-07-16T04:22:00Z","claim_trace_manifest_ref":"trace-report-1","producing_synthesis_ref":"synthesis-884"}
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Documents wasGeneratedBy and derivation lineage for synthesized entities.
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator synthesis producing consolidated outputs.
  source_claims:
    - claim-synthesis-output-hierarchy
    - claim-synthesis-output-001
structure:
  identity_keys: []
  fields:
    - id: output_contract_ref
      labels: { zh: 杈撳嚭濂戠害寮曠敤, en: output-contract reference, ja: output contract ref }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 寮曠敤杈撳嚭澹版槑绗﹀悎鐨勭粨鏋勬垨璇箟濂戠害鐗堟湰銆? en: References output structural or semantic contract revision., ja: output contract revision 銈掑弬鐓с仐銇俱仚銆?}
      example_value: decision-schema@2
      source_claims: [claim-composition-output-hierarchy]
    - id: producer_activity_ref
      labels: { zh: 浜х敓娲诲姩寮曠敤, en: producer-activity reference, ja: producer activity ref }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions: { zh: 寮曠敤鐢熸垚璇ヤ笉鍙彉鍐呭鐨勭粍鍚堟椿鍔ㄣ€? en: References composition activity that generated this content., ja: content 銈掔敓鎴愩仐銇?composition activity 銈掑弬鐓с仐銇俱仚銆?}
      example_value: activity-example-1
      source_claims: [claim-composition-output-hierarchy]
    - id: plan_ref
      labels:
        zh: 计划引用
        en: plan reference
        ja: plan ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该输出必须符合的 SynthesisPlan 版本。
        en: References the SynthesisPlan revision this output must satisfy.
        ja: output が適合すべき SynthesisPlan revision を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-report-synthesis@5
      source_claims:
        - claim-synthesis-output-001
    - id: trace_manifest_ref
      labels:
        zh: 追踪清单引用
        en: trace-manifest reference
        ja: trace manifest ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用从输出主张到 SynthesisInput 的可验证映射。
        en: References the verifiable mapping from output claims to SynthesisInputs.
        ja: output claims から SynthesisInputs への verifiable mapping を参照します。
      allowed_values: []
      pattern: null
      example_value: manifest-report-884
      source_claims:
        - claim-synthesis-output-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisOutput-example-positive-manual-20260716
    labels:
      zh: SynthesisOutput positive
      en: SynthesisOutput positive
      ja: SynthesisOutput positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 SynthesisOutput 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes SynthesisOutput programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy SynthesisOutput: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {composition_artifact_id: report-884, media_type: "text/markdown", content_digest: sha256:report-884, produced_at: 2026-07-16T04:22:00Z, output_contract_ref: "report-schema@2", producer_activity_ref: synthesis-884, plan_ref: "audit-report-synthesis@5", trace_manifest_ref: manifest-report-884}

    related_node_ids:
      - SynthesisOutput
      - Synthesis
    related_relation_ids:
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-synthesis-output-001
      - claim-synthesis-output-002

  - id: SynthesisOutput-example-boundary-manual-20260716
    labels:
      zh: SynthesisOutput boundary
      en: SynthesisOutput boundary
      ja: SynthesisOutput boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 SynthesisOutput 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not SynthesisOutput work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で SynthesisOutput work_specification ではない。
    field_values: {}

    related_node_ids:
      - SynthesisOutput
      - SynthesisInput
    related_relation_ids: []
    source_claims:
      - claim-synthesis-output-002
      - claim-synthesis-output-001

  - id: SynthesisOutput-example-instance-manual-20260719
    labels:
      zh: SynthesisOutput instance
      en: SynthesisOutput instance
      ja: SynthesisOutput instance
    descriptions:
      zh: ToT 实例：generate_thoughts(state, k=5) 返回 5 个候选 plan → evaluate 选 score 最高 → select(greedy) 写入 SynthesisOutput 实例。
      en: ToT instance: generate_thoughts(state, k=5) yields 5 plan candidates → evaluate picks highest score → select(greedy) writes SynthesisOutput instance.
      ja: ToT 实例 k=5 候補→evaluate→select が SynthesisOutput 实例。
    field_values: {producer_activity_ref: synthesis-run-884, plan_ref: "audit-report-synthesis@5", trace_manifest_ref: manifest-report-884}

    related_node_ids:
      - SynthesisOutput
      - CompositionOutput
    related_relation_ids:
      - SynthesisOutput-is_a-CompositionOutput
    source_claims:
      - claim-synthesis-output-hierarchy

  - id: SynthesisOutput-counterexample-merge-activity
    labels:
      zh: SynthesisOutput counterexample
      en: SynthesisOutput counterexample
      ja: SynthesisOutput counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 SynthesisOutput PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style SynthesisOutput PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 SynthesisOutput ではない。
    field_values: {synthesis_output_id: absent, final_content_digest: absent, activity_status: running}

    related_node_ids:
      - SynthesisOutput
      - Synthesis
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-synthesis-output-002

parent_relation:
  id: SynthesisOutput-is_a-CompositionOutput
  predicate: is_a
  target: concept:CompositionOutput
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合输出
    en: is a composition output
    ja: composition output である
  definition:
    zh: SynthesisOutput 继承 CompositionOutput 的输出契约角色，并特化为 Synthesis 计划与 trace manifest 绑定。
    en: SynthesisOutput inherits CompositionOutput output-contract role and specializes it with synthesis plan and trace manifest bindings.
    ja: SynthesisOutput は CompositionOutput の output contract 役割を継承し synthesis plan/trace manifest binding として特化します。
  cardinality:
    source: { min: 1, max: 1 }
    target: { min: 0, max: null }
  inverse_reading:
    predicate: has_synthesis_output
    labels: { zh: 具有综合输出, en: has synthesis output, ja: synthesis output を持つ }
  conditions: []
  temporal_scope: timeless
  boundary_context: Moonweave local taxonomy.
  constraints: []
  examples: []
  source_claims: [claim-synthesis-output-hierarchy]
  distinct_fact_rationale:
    zh: is_a 仅陈述类型从属；plan 与 trace manifest 引用使用子类型字段表达。
    en: is_a only states type membership; plan and trace manifest refs use subtype fields.
    ja: is_a は型従属のみを述べ、plan/trace manifest ref は subtype field で表現します。
sources:
