schema: moonweave.ai/ontology-node/v1
id: SynthesisOutput
kind: concept
labels:
  zh: 综合输出
  en: synthesis output
  ja: 統合出力
semantics:
  short_definition:
    zh: 由综合活动生成、满足综合计划契约并携带输入到主张追踪清单的组合输出。
    en: A composition output generated by synthesis, satisfying its plan contract, and carrying an input-to-claim trace manifest.
    ja: synthesis が生成し plan contract を満たして input-to-claim trace manifest を持つ composition output です。
  definition:
    zh: 综合输出是 CompositionOutput 的子类，以综合输出标识、产生者 Synthesis、所用 SynthesisPlan、内容摘要和主张级追踪清单为种差。它是综合活动产生的新整体工件，不是输入集合、活动本身或仅把输入文件拼接后的归档。
    en: A SynthesisOutput is a CompositionOutput distinguished by synthesis-output ID, producing Synthesis, applied SynthesisPlan, content digest, and claim-synthesis-output-design trace manifest. It is the new whole artifact generated by synthesis, not the input set, activity itself, or an archive that merely concatenates inputs.
    ja: SynthesisOutput は output ID・producing Synthesis・plan・digest・claim-synthesis-output-design trace manifest で区別される CompositionOutput です。input set・activity・simple concatenation archive ではありません。
  why_needed:
    zh: 专门输出层保证综合结果必须证明其计划符合性和输入追踪，而普通组合输出无需承担同等强度的综合语义。
    en: The specialized output layer requires synthesis results to prove plan conformance and input traceability without imposing that strength on all composition outputs.
    ja: specialized output layer で synthesis result に plan conformance/input traceability を要求し全 outputs へ過剰適用しません。
  includes:
    - zh: 带主张级引用的综合报告、证据调和结论、多章节统一稿和候选方案综合说明。
      en: Synthesis reports with claim-synthesis-output-design citations, reconciled evidence conclusions, unified multi-section drafts, and consolidated candidate explanations.
      ja: claim-synthesis-output-design cited report・reconciled conclusion・unified multi-section draft・candidate consolidation explanation。
  excludes:
    - zh: 单个章节输入、投票结果、简单压缩包、综合活动、综合计划和未验证的草稿缓存。
      en: Individual section inputs, voting results, simple archives, synthesis activities, synthesis plans, and unvalidated draft caches.
      ja: single section input・voting result・simple archive・synthesis activity・plan・unvalidated draft cache。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain MapReduce reduce 阶段、CrewAI 合并 task 与 LangGraph reduce 节点输出映射为 SynthesisOutput，须引用 applied MergeRule 版本。
    en: LangChain MapReduce reduce phase, CrewAI merge task, and LangGraph reduce node outputs map to SynthesisOutput with applied MergeRule revision.
    ja: LangChain MapReduce reduce・CrewAI merge task・LangGraph reduce 出力を applied MergeRule 版付き SynthesisOutput へ写像します。
  typical_input:
    - description: MapReduce reduce chain output.
      format: 'chain.invoke({"documents": [...]})  # => merged report'
      source_claims:
        - claim-synthesis-output-design
  typical_output:
    - description: Moonweave SynthesisOutput with merge rule ref.
      format: '{"composition_artifact_id": "final-report@9", "merge_rule_ref": "conflict-preserving@2"}'
      source_claims:
        - claim-synthesis-output-design
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Send API fan-out, sequential edges, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential/parallel crew composition.
    - name: Anthropic workflow patterns
      url: https://www.anthropic.com/engineering/building-effective-agents
      description: Prompt chaining, parallelization, orchestrator-worker.
    - name: OpenAI Cookbook
      url: https://cookbook.openai.com/
      description: Multi-step pipeline and best-of-N patterns.
structure:
  identity_keys: []
  fields:
    - id: plan_ref
      labels:
        zh: 计划引用
        en: plan reference
        ja: plan ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该输出必须符合的 SynthesisPlan 版本。
        en: References the SynthesisPlan revision this output must satisfy.
        ja: output が適合すべき SynthesisPlan revision を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-report-synthesis@5
      source_claims:
        - claim-synthesis-output-design
    - id: trace_manifest_ref
      labels:
        zh: 追踪清单引用
        en: trace-manifest reference
        ja: trace manifest ref
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用从输出主张到 SynthesisInput 的可验证映射。
        en: References the verifiable mapping from output claims to SynthesisInputs.
        ja: output claims から SynthesisInputs への verifiable mapping を参照します。
      allowed_values: []
      pattern: null
      example_value: manifest-report-884
      source_claims:
        - claim-synthesis-output-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SynthesisOutput-mapreduce
    labels:
      zh: MapReduce 综合输出
      en: MapReduce synthesis output
      ja: MapReduce 統合 output
    descriptions:
      zh: final-report@9 合并三份 map 结果并保留冲突标注。
      en: final-report@9 merges three map results preserving conflict annotations.
      ja: final-report@9 は三 map 結果を conflict 注釈付きで merge。
    example_source:
      product: OpenAI Cookbook
      url: https://cookbook.openai.com/
      version: map-reduce pipeline
    field_values:
      composition_artifact_id: final-report@9
    related_node_ids:
      - SynthesisOutput
      - Synthesis
      - MergeRule
    related_relation_ids:
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-synthesis-output-cookbook
      - claim-synthesis-output-design
  - id: SynthesisOutput-crewai-consolidation
    labels:
      zh: CrewAI 输出合并
      en: CrewAI output consolidation
      ja: CrewAI output 統合
    descriptions:
      zh: writer task 合并 research 与 analysis 分支输出为单一报告。
      en: Writer task consolidates research and analysis branch outputs into one report.
      ja: writer task が research/analysis branch 出力を一 report に統合。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.parallel + synthesis task
    field_values:
      composition_artifact_id: crew-report@5
    related_node_ids:
      - SynthesisOutput
      - SynthesisPattern
    related_relation_ids: []
    source_claims:
      - claim-synthesis-output-crewai
      - claim-synthesis-output-design
  - id: SynthesisOutput-boundary-ballot
    labels:
      zh: 选票不是综合输出
      en: Ballot is not synthesis output
      ja: ballot は synthesis output ではない
    descriptions:
      zh: ballot-a@1 是投票输入而非 merge 产物。
      en: ballot-a@1 is a vote input not a merge product.
      ja: ballot-a@1 は vote input で merge 产物ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: role boundary
    field_values: {}
    related_node_ids:
      - SynthesisOutput
      - VoteBallot
    related_relation_ids: []
    source_claims:
      - claim-synthesis-output-design
parent_relation:
  id: SynthesisOutput-is_a-CompositionOutput
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 综合输出继承组合输出的产生者和契约身份，并以综合计划符合性与主张级输入追踪为种差。
    en: SynthesisOutput inherits producer and contract identity from CompositionOutput and is distinguished by synthesis-plan conformance and claim-synthesis-output-design input tracing.
    ja: SynthesisOutput は CompositionOutput identity を継承し plan conformance・claim-synthesis-output-design input tracing を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述可验证的类型或运行事实；实例基数由具体拓扑、模式与活动约束决定。
    en: This relation states a verifiable type or operational fact; instance cardinality is governed by the concrete topology, pattern, and activity constraints.
    ja: この関係は検証可能な type/operational fact を表し instance cardinality は concrete topology・pattern・activity constraints で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-synthesis-output-design
    - claim-synthesis-output-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
