    en: SynthesisOutput inherits producer and contract identity from CompositionOutput and is distinguished by synthesis-plan conformance and claim-level input tracing.
    ja: SynthesisOutput は CompositionOutput identity を継承し plan conformance・claim-level input tracing を種差とします。
