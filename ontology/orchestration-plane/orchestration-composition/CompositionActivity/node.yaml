schema: moonweave.ai/ontology-node/v1
id: CompositionActivity
kind: concept
labels:
  zh: 组合活动
  en: Composition Activity
  ja: 構成活動
semantics:
  short_definition:
    zh: 按本地拓扑和模式实际发生的一次组合运行记录。
    en: One runtime record of composition occurring under a local topology and pattern.
    ja: ローカルトポロジーとパターンに従って実際に起きた一回の構成実行記録。
  definition:
    zh: >-
      CompositionActivity 是 Moonweave 对一次已发生组合执行的本地运行概念。它把具体的 topology_ref、pattern_ref、输入工件、任何新产生、更新或明确拒绝的输出工件、执行绑定和完成处置记录在一起，以说明某次运行怎样协调本地部件。失败、取消或其他未形成结果的处置仍可保留输入和执行证据而不产生输出工件。它不是 LangGraph Node、StateGraph、Edge 或 invoke 返回值，也不是 OpenAI Agents SDK Agent、Runner、handoff、A2A 类型或 MCP 消息；这些来源对象必须由 execution_binding_ref 和工件引用保留其原有身份。
    en: >-
      A CompositionActivity is Moonweave's local runtime concept for one composition execution that has occurred. It records the particular topology_ref, pattern_ref, input artifacts, any output artifacts newly produced, updated, or explicitly rejected, execution binding, and completion disposition together to explain how that run coordinated local parts. A failed, cancelled, or otherwise non-result disposition can retain inputs and execution evidence without an output artifact. It is not a LangGraph Node, StateGraph, Edge, or invoke result, nor an OpenAI Agents SDK Agent, Runner, handoff, A2A type, or MCP message; those source objects retain their identities through execution_binding_ref and artifact references.
    ja: >-
      CompositionActivity は、実際に発生した一回の構成実行を表す Moonweave のローカル実行時概念です。特定の topology_ref、pattern_ref、input artifact、生成・更新・明示的に却下された任意の output artifact、execution binding、完了処置をまとめ、その実行がローカル part をどう調整したかを説明します。失敗、取消、その他結果を得ない処置では、output artifact なしに input と実行証拠を保持できます。LangGraph の Node、StateGraph、Edge、invoke 結果でも、OpenAI Agents SDK の Agent、Runner、handoff、A2A 型、MCP message でもありません。これらの出所オブジェクトは execution_binding_ref と artifact 参照で固有の識別を保ちます。
  why_needed:
    zh: >-
      声明性拓扑只能说明可怎样运行，不能证明某次运行真的使用了哪些输入、采用何种模式或产生何个结果。独立活动记录让重放、事故分析和结果归因可以指向不可变的具体执行事实。
    en: >-
      A declarative topology says how execution may run, not which inputs, pattern, or results a particular run actually used. A separate activity record lets replay, incident analysis, and result attribution point to an immutable execution fact.
    ja: >-
      宣言的トポロジーは実行可能な形を示すだけで、特定の実行がどの入力、パターン、結果を用いたかを証明しません。独立した活動記録により、再生、障害分析、結果帰属を不変の実行事実に結び付けられます。
  includes:
    - zh: 有具体时间、输入、输出、拓扑和模式引用的单次链式、并行、投票或综合执行。
      en: One chain, parallel, voting, or synthesis execution with concrete time, inputs, outputs, topology, and pattern references.
      ja: 具体的な時刻、入力、出力、トポロジー、パターン参照を持つ一回の chain、parallel、voting、または synthesis 実行。
    - zh: 对实际 LangGraph 调用或应用控制的 Agents SDK 运行的有来源本地记录。
      en: A provenance-bearing local record of an actual LangGraph invocation or application-controlled Agents SDK run.
      ja: 実際の LangGraph 呼び出しまたはアプリケーション制御の Agents SDK 実行に対する出所付きローカル記録。
  excludes:
    - zh: 仅声明部件与依赖的 CompositionSpecification 或 OrchestrationTopology。
      en: A CompositionSpecification or OrchestrationTopology that only declares parts and dependencies.
      ja: part と依存関係だけを宣言する CompositionSpecification または OrchestrationTopology。
    - zh: 单个模型调用、框架运行对象、一次路由决定、单个工件或尚未开始的计划。
      en: One model call, a framework runtime object, one routing decision, one artifact, or a plan that has not started.
      ja: 一回のモデル呼び出し、フレームワーク実行時オブジェクト、一つの routing decision、一つの artifact、または未開始の plan。
  semantic_kind: activity
engineering:
  explanation:
    zh: >-
      LangGraph 以 State、Node 和 Edge 组织图，编译后应用可 invoke 该图；Agents SDK 的应用可用 Runner 调用 Agent，并由代码或模型决定后续编排。活动记录适配器从实际调用收集输入摘要、结果工件、拓扑绑定和模式绑定，写入本地字段；它不会把图节点、Runner 或 Agent 重命名成 CompositionActivity。
    en: >-
      LangGraph organizes a graph with State, Nodes, and Edges, and an application can invoke the compiled graph; an Agents SDK application can call an Agent with Runner and choose later orchestration through code or a model. An activity-record adapter collects input digests, result artifacts, topology binding, and pattern binding from the actual call into local fields; it does not rename graph nodes, Runner, or Agents as CompositionActivity.
    ja: >-
      LangGraph は State、Node、Edge でグラフを組織し、アプリケーションはコンパイル済みグラフを invoke できます。Agents SDK アプリケーションは Runner で Agent を呼び、後続の編成をコードまたはモデルで決定できます。活動記録アダプターは実際の呼び出しから input digest、result artifact、topology binding、pattern binding を集めてローカル field に書きますが、グラフ node、Runner、Agent を CompositionActivity と改名しません。
  typical_input:
    - description:
        zh: 应用调用已编译的 LangGraph 图并提供请求状态。
        en: An application invokes a compiled LangGraph graph with request state.
        ja: アプリケーションが要求 state を持つコンパイル済み LangGraph グラフを invoke する。
      format: |-
        final_state = compiled_graph.invoke({"request": "evaluate release candidate"})
    - description:
        zh: 应用使用 Agents SDK Runner 执行一个编排入口 Agent。
        en: An application runs an orchestration entry Agent through the Agents SDK Runner.
        ja: アプリケーションが Agents SDK Runner で編成入口 Agent を実行する。
      format: |-
        result = await Runner.run(orchestrator, "evaluate release candidate")
  typical_output:
    - description:
        zh: 与实际运行绑定的本地活动记录。
        en: A local activity record bound to the actual run.
        ja: 実際の実行に結び付いたローカル活動記録。
      format: |-
        {"composition_activity_id":"run-release-184","topology_ref":"topology-release-v3","pattern_ref":"chain-evaluate-v1","input_artifact_refs":["artifact:request-71"],"output_artifact_refs":["artifact:release-decision-184"],"execution_binding_ref":"langgraph:run:release-184","completion_disposition":"completed","local_profile":true}
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents State, Nodes, Edges, compilation, and graph execution.
    - name: OpenAI Agents SDK running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner execution, result handling, and agent run control flow.
structure:
  identity_keys:
    - composition_activity_id
  fields:
    - id: composition_activity_id
      labels:
        zh: 组合活动标识
        en: Composition-activity identifier
        ja: 構成活動識別子
      definitions:
        zh: 稳定标识一次已发生的本地组合执行。
        en: Stably identifies one local composition execution that has occurred.
        ja: 実際に発生した一回のローカル構成実行を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: run-release-184
    - id: topology_ref
      labels:
        zh: 实际拓扑引用
        en: Actual topology reference
        ja: 実際のトポロジー参照
      definitions:
        zh: 指向本次活动实际执行的不可变 OrchestrationTopology 版本。
        en: Points to the immutable OrchestrationTopology revision actually executed by this activity.
        ja: この活動が実際に実行した不変の OrchestrationTopology revision を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: topology-release-v3
    - id: pattern_ref
      labels:
        zh: 实际模式引用
        en: Actual pattern reference
        ja: 実際のパターン参照
      definitions:
        zh: 指向本次运行轨迹要满足的本地 CompositionPattern 版本。
        en: Points to the local CompositionPattern revision that this run trace must satisfy.
        ja: この実行 trace が満たすべきローカル CompositionPattern revision を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: chain-evaluate-v1
    - id: input_artifact_refs
      labels:
        zh: 输入工件引用
        en: Input artifact references
        ja: 入力 artifact 参照
      definitions:
        zh: 列出在活动开始时可审计地提供给组合的本地输入工件。
        en: Lists local input artifacts audibly supplied to the composition when the activity began.
        ja: 活動開始時に構成へ監査可能に供給されたローカル入力 artifact を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      example_value:
        - artifact:request-71
    - id: output_artifact_refs
      labels:
        zh: 输出工件引用
        en: Output artifact references
        ja: 出力 artifact 参照
      definitions:
        zh: 列出该活动新产生、更新或明确拒绝的本地结果工件。
        en: Lists local result artifacts newly produced, updated, or explicitly rejected by the activity.
        ja: この活動が新規生成、更新、または明示的に却下したローカル result artifact を列挙する。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      example_value:
        - artifact:release-decision-184
    - id: execution_binding_ref
      labels:
        zh: 执行绑定引用
        en: Execution binding reference
        ja: 実行バインディング参照
      definitions:
        zh: 指向实际 LangGraph 调用、Agents SDK 运行或应用运行记录而不改变其来源类型。
        en: Points to the actual LangGraph invocation, Agents SDK run, or application run record without changing its source type.
        ja: 出所型を変えずに実際の LangGraph invocation、Agents SDK run、またはアプリケーション run record を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: langgraph:run:release-184
    - id: completion_disposition
      labels:
        zh: 完成处置
        en: Completion disposition
        ja: 完了処置
      definitions:
        zh: 记录运行完成、失败、取消或升级，而不把运行处置误作拓扑定义。
        en: Records whether the run completed, failed, cancelled, or escalated without mistaking the disposition for a topology definition.
        ja: トポロジー定義と取り違えず、実行が完了、失敗、取消、またはエスカレーションしたかを記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: completed
  constraints:
    - id: composition-activity-binds-run-to-topology-pattern-and-evidence
      severity: error
      language: plain
      expression: A CompositionActivity must declare one topology_ref, one pattern_ref, at least one input_artifact_ref, one execution_binding_ref, and one completion_disposition; completed activities must list at least one output_artifact_ref.
      explanation:
        zh: 该约束让输入、执行形态、实际运行和结果能被一起检查，而非从名称或日志时间猜测。
        en: This lets inputs, execution shape, actual run, and result be inspected together rather than inferred from names or log timing.
        ja: これにより、入力、実行形、実際の run、結果を、名前や log 時刻から推測せず一緒に検査できる。
      source_claims:
        - claim-composition-activity-local
    - id: composition-activity-remains-local-runtime-record
      severity: error
      language: plain
      expression: execution_binding_ref may cite a LangGraph graph invocation or an Agents SDK Runner result, but CompositionActivity must remain a Moonweave local runtime record rather than a source-native graph, Agent, Runner, handoff, A2A, or MCP type.
      explanation:
        zh: 来源运行时对象和本地可审计活动是相邻层次，必须保留二者的不同身份。
        en: Source-runtime objects and the local auditable activity are adjacent layers and must retain distinct identities.
        ja: 出所 runtime object とローカルで監査可能な活動は隣接層であり、別々の識別を保たなければならない。
      source_claims:
        - claim-composition-activity-langgraph
        - claim-composition-activity-openai
        - claim-composition-activity-local
  required_relations:
    - id: composition-activity-requires-input-artifact
      direction: outgoing
      predicate: consumes
      target_concept_id: CompositionArtifact
      cardinality:
        min: 1
        max: null
      explanation:
        zh: 一次组合活动至少实际读取一个保留的组合工件；仅有拓扑或模式引用不能构成已发生的活动。
        en: An occurred composition activity must actually read at least one retained composition artifact; topology or pattern references alone do not establish an activity.
        ja: 発生した構成活動は少なくとも一つの保持済み構成アーティファクトを実際に読み取らなければならず、topology または pattern の参照だけでは活動を立証しない。
      source_claims:
        - claim-composition-activity-local
    - id: composition-activity-may-produce-artifact
      direction: outgoing
      predicate: produces
      target_concept_id: CompositionArtifact
      cardinality:
        min: 0
        max: null
      explanation:
        zh: 完成的活动产生至少一个工件；失败、取消或仅记录升级处置的活动可以不产生可交付工件。
        en: A completed activity produces at least one artifact; failed, cancelled, or escalation-only activities may produce no deliverable artifact.
        ja: 完了した活動は少なくとも一つのアーティファクトを生成するが、失敗、取消し、またはエスカレーションのみを記録する活動は配布可能なアーティファクトを生成しないことがある。
      source_claims:
        - claim-composition-activity-local
examples:
  - id: composition-activity-positive-release-evaluation
    labels:
      zh: CompositionActivity positive
      en: CompositionActivity positive
      ja: CompositionActivity positive
    descriptions:
      zh: Prefect 数据流编排映射 CompositionActivity：@flow def pipeline(): result = extract(); transformed = transform(result); load(transformed)；@task(retries=3, retry_delay_seconds=10) 声明重试策略；PipelineComposition 对应 flow/task DAG。
      en: Prefect data-flow orchestration maps CompositionActivity: @flow pipeline with extract/transform/load; @task(retries=3, retry_delay_seconds=10) declares retry policy; PipelineComposition corresponds to flow/task DAG.
      ja: Prefect CompositionActivity: @flow extract→transform→load、@task(retries=3, retry_delay_seconds=10)。
    field_values: {composition_activity_id: run-release-184, topology_ref: topology-release-v3, pattern_ref: chain-evaluate-v1}

    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
      - CompositionArtifact
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
      - CompositionActivity-consumes-CompositionArtifact
      - CompositionActivity-produces-CompositionArtifact
    source_claims:
      - claim-composition-activity-langgraph
      - claim-composition-activity-local

  - id: composition-activity-counterexample-topology-only
    labels:
      zh: CompositionActivity counterexample
      en: CompositionActivity counterexample
      ja: CompositionActivity counterexample
    descriptions:
      zh: 手写 prompt 字符串无 Signature/Module 抽象不能作为 DSPy 式 CompositionActivity PipelineComposition。
      en: Hand-written prompt strings without Signature/Module abstraction cannot serve as DSPy-style CompositionActivity PipelineComposition.
      ja: Signature/Module なし手写 prompt は DSPy 式 CompositionActivity ではない。
    field_values: {topology_ref: topology-release-v3, pattern_ref: chain-evaluate-v1, input_artifact_refs: [], output_artifact_refs: [], execution_binding_ref: null, completion_disposition: null}

    related_node_ids:
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-composition-activity-local

  - id: composition-activity-boundary-framework-run-object
    labels:
      zh: CompositionActivity boundary
      en: CompositionActivity boundary
      ja: CompositionActivity boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 CompositionActivity 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not CompositionActivity delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で CompositionActivity delegation spec ではない。
    field_values: {composition_activity_id: run-sdk-312, topology_ref: topology-support-v2, pattern_ref: parallel-triage-v1}

    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
    source_claims:
      - claim-composition-activity-openai
      - claim-composition-activity-local

  - id: composition-activity-instance-synthesis-escalation
    labels:
      zh: CompositionActivity instance
      en: CompositionActivity instance
      ja: CompositionActivity instance
    descriptions:
      zh: Prefect 实例：@task(retries=3) def extract(): ... → flow.run() → 映射 CompositionActivity policy-prefect@1。
      en: Prefect instance: @task(retries=3) extract → flow.run() → maps to CompositionActivity policy-prefect@1.
      ja: Prefect 实例 @task(retries=3)+flow.run が CompositionActivity policy-prefect@1 に写像。
    field_values: {composition_activity_id: run-brief-88, topology_ref: topology-brief-v2, pattern_ref: synthesis-brief-v2}

    related_node_ids:
      - CompositionActivity
      - CompositionPattern
      - SynthesisPattern
      - OrchestrationTopology
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
    source_claims:
      - claim-composition-activity-local

