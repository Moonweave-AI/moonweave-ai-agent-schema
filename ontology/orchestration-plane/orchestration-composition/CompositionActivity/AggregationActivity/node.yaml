schema: moonweave.ai/ontology-node/v1
id: AggregationActivity
kind: concept
labels:
  zh: 归并活动
  en: Aggregation Activity
  ja: 集約活動
semantics:
  short_definition:
    zh: 依据本地归并规则处理多个明确输入，并保留任何可归因结果或升级依据的组合活动。
    en: A composition activity that applies a local aggregation rule to multiple explicit inputs and retains any attributable result or escalation basis.
    ja: ローカル集約規則を複数の明示的入力へ適用し、任意の帰属可能な結果またはエスカレーション根拠を保持する構成活動。
  definition:
    zh: >-
      AggregationActivity 是 CompositionActivity 的一种 Moonweave 本地运行概念。它封存多个输入工件、实际应用的 AggregationRule、选择依据、任何新产生、更新或明确拒绝的输出工件和执行绑定，以解释某次运行怎样评估或归并并列材料及其处置。输入不足、失败、取消或升级的处置可保留这些证据而不产生输出工件。它不是 LangGraph reducer、Send、Node、super-step 或 Edge，也不是 OpenAI Agents SDK manager、Agent-as-tool、Runner、handoff、A2A 类型或 MCP 工具；这些可作为实现来源，但不定义本地活动字段或关系。
    en: >-
      An AggregationActivity is a kind of CompositionActivity and a Moonweave local runtime concept. It seals multiple input artifacts, the AggregationRule actually applied, a selection basis, any output artifacts newly produced, updated, or explicitly rejected, and execution binding to explain how one run evaluates or aggregates peer material and its disposition. An insufficient-input, failed, cancelled, or escalated disposition can retain that evidence without producing an output artifact. It is not a LangGraph reducer, Send, Node, super-step, or Edge, nor an OpenAI Agents SDK manager, agent-as-tool, Runner, handoff, A2A type, or MCP tool; these can be implementation sources but do not define local activity fields or relations.
    ja: >-
      AggregationActivity は CompositionActivity の一種であり、Moonweave のローカル実行時概念です。複数の input artifact、実際に適用した AggregationRule、選択根拠、生成・更新・明示的に却下された任意の output artifact、execution binding を固定し、一回の実行が並列の材料をどう評価・集約し、どの処置に至ったかを説明します。入力不足、失敗、取消、エスカレーションの処置では、output artifact を生成せずにこの証拠を保持できます。LangGraph reducer、Send、Node、super-step、Edge でも、OpenAI Agents SDK の manager、agent-as-tool、Runner、handoff、A2A 型、MCP tool でもありません。これらは実装出所になり得ますが、ローカル活動 field や関係を定義しません。
  why_needed:
    zh: >-
      多个输入存在并不表示它们已被合并，更不表示选择依据可以重建。把归并作为运行活动记录下来，能保留输入闭包、规则版本、冲突或阈值理由以及产生的结果。
    en: >-
      The presence of multiple inputs does not mean they were combined, let alone that the selection basis can be reconstructed. Recording aggregation as a runtime activity preserves input closure, rule revision, conflict or threshold rationale, and any result produced or disposition recorded without one.
    ja: >-
      複数入力の存在は、それらが結合されたことも、選択根拠を再構築できることも意味しません。集約を実行時活動として記録すれば、input closure、rule revision、競合またはしきい値の根拠、生成結果を保持できます。
  includes:
    - zh: 按合并、投票、综合或其他已声明 AggregationRule 处理两个及以上输入的一次运行。
      en: One run that processes two or more inputs under a declared merge, voting, synthesis, or other AggregationRule.
      ja: 宣言済み merge、voting、synthesis、または他の AggregationRule で二つ以上の入力を処理する一回の実行。
    - zh: 对实际并行分支汇合、代码计算或受控 Agent 结果归并的有来源本地活动记录。
      en: A provenance-bearing local activity record of an actual parallel-branch join, code calculation, or controlled Agent-result aggregation.
      ja: 実際の並列 branch join、コード計算、または制御された Agent result 集約に対する出所付きローカル活動記録。
  excludes:
    - zh: 只有一个输入的普通链式阶段、未运行的 AggregationRule、单张 VoteBallot 或结果工件本身。
      en: An ordinary chain stage with one input, an AggregationRule that has not run, one VoteBallot, or a result artifact itself.
      ja: 一つの入力だけを持つ通常の chain stage、未実行の AggregationRule、一つの VoteBallot、または result artifact 自体。
    - zh: 框架自动合并状态的实现细节，除非适配器同时记录输入、规则、选择依据和本地结果。
      en: Framework state-merging implementation detail unless an adapter also records inputs, rule, selection basis, and local result.
      ja: adapter が入力、rule、選択根拠、ローカル結果も記録しない限り、フレームワークの state-merge 実装詳細。
  semantic_kind: activity
engineering:
  explanation:
    zh: >-
      LangGraph 用 reducer 定义并发状态更新的合并方式，并可通过 Send 创建 map-reduce 工作流；Agents SDK 应用可在代码中运行多个 Agent 或把 Agent 暴露为工具后汇总结构化结果。本地适配器在归并边界封存输入摘要、规则引用、决策或冲突依据和输出引用；它不把 reducer、Send、manager 或 Agent 重新定义为 AggregationActivity。
    en: >-
      LangGraph uses reducers to define how concurrent state updates are merged and can create map-reduce workflows with Send; an Agents SDK application can run multiple Agents in code or expose Agents as tools and then aggregate structured results. A local adapter seals input digests, a rule reference, decision or conflict basis, and output references at the aggregation boundary; it does not redefine a reducer, Send, manager, or Agent as AggregationActivity.
    ja: >-
      LangGraph は reducer で同時 state update の結合方法を定義し、Send で map-reduce workflow を作れます。Agents SDK アプリケーションはコードで複数 Agent を実行し、または Agent を tool として公開して構造化結果を集約できます。ローカル adapter は集約境界で input digest、rule 参照、decision または conflict basis、output 参照を固定しますが、reducer、Send、manager、Agent を AggregationActivity と再定義しません。
  typical_input:
    - description:
        zh: LangGraph 在映射分支后把每个工作项的结果返回到同一汇合点。
        en: LangGraph returns each work-item result to one join point after mapped branches.
        ja: LangGraph が map された branch の各 work-item result を一つの join point へ返す。
      format: |-
        from operator import add
        from typing import Annotated
        from typing_extensions import TypedDict

        class State(TypedDict):
            drafts: Annotated[list[str], add]

        def collect_draft(state: State):
            return {"drafts": ["security: escalate privileged-access finding"]}
      source_claims: [claim-aggregation-activity-langgraph]
    - description:
        zh: 应用并行执行专员 Agent 并在代码中应用本地规则。
        en: An application runs specialist Agents in parallel and applies a local rule in code.
        ja: アプリケーションが specialist Agent を並列実行し、コードでローカル rule を適用する。
      format: |-
        import asyncio
        from agents import Runner

        runs = await asyncio.gather(
            Runner.run(legal_agent, request),
            Runner.run(security_agent, request),
        )
        drafts = [run.final_output for run in runs]
        # application code records its own aggregation rule and result
      source_claims: [claim-aggregation-activity-openai, claim-aggregation-activity-local]
  typical_output:
    - description:
        zh: 具有封存输入和选择依据的本地归并运行记录。
        en: A local aggregation-run record with sealed inputs and selection basis.
        ja: 固定された入力と選択根拠を持つローカル集約実行記録。
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"aggregation-activity","aggregation_activity_id":"aggregate-risk-57","input_artifact_refs":["artifact:legal-57","artifact:security-57"],"aggregation_rule_ref":"rule:merge-risk-v2","selection_basis":"prefer-supported-severity-and-preserve-conflict","output_artifact_refs":["artifact:risk-summary-57"],"execution_binding_ref":"application:risk:aggregate-57","completion_disposition":"completed"}
      source_claims: [claim-aggregation-activity-local]
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents reducers, nodes, edges, and concurrent updates.
    - name: LangGraph graph API usage
      url: https://docs.langchain.com/oss/python/langgraph/use-graph-api
      description: Documents Send for map-reduce style workflows.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents code-driven orchestration of multiple Agents and result flow.
structure:
  identity_keys:
    - composition_activity_id
    - aggregation_activity_id
  fields:
    - id: aggregation_activity_id
      labels:
        zh: 归并活动标识
        en: Aggregation-activity identifier
        ja: 集約活動識別子
      definitions:
        zh: 稳定标识一次已经发生的本地多输入归并运行。
        en: Stably identifies one local multi-input aggregation run that has occurred.
        ja: 実際に発生した一回のローカル多入力集約実行を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: aggregate-risk-57
    - id: input_artifact_refs
      labels:
        zh: 封存输入工件引用
        en: Sealed input artifact references
        ja: 固定入力 artifact 参照
      definitions:
        zh: 按归并时实际读取的集合列出所有可归因输入工件。
        en: Lists every attributable input artifact in the set actually read when aggregation occurred.
        ja: 集約時に実際に読まれた集合の、すべての帰属可能な input artifact を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 2
        max: null
      example_value:
        - artifact:legal-57
        - artifact:security-57
    - id: aggregation_rule_ref
      labels:
        zh: 实际归并规则引用
        en: Actual aggregation-rule reference
        ja: 実際の集約規則参照
      definitions:
        zh: 指向本次运行实际应用的版本化 AggregationRule。
        en: Points to the versioned AggregationRule actually applied by this run.
        ja: この実行が実際に適用した版管理された AggregationRule を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: rule:merge-risk-v2
    - id: selection_basis
      labels:
        zh: 选择依据
        en: Selection basis
        ja: 選択根拠
      definitions:
        zh: 记录规则如何处理输入、冲突、阈值或优先级，从而解释为何得到该结果。
        en: Records how the rule handled inputs, conflicts, thresholds, or priority so the resulting outcome can be explained.
        ja: 規則が入力、競合、しきい値、優先度をどう処理したかを記録し、結果を説明できるようにする。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: prefer-supported-severity-and-preserve-conflict
    - id: output_artifact_refs
      labels:
        zh: 结果工件引用
        en: Result artifact references
        ja: 結果 artifact 参照
      definitions:
        zh: 列出归并新产生、更新或明确拒绝的本地结果工件。
        en: Lists local result artifacts newly produced, updated, or explicitly rejected by the aggregation.
        ja: 集約が新規生成、更新、または明示的に却下したローカル result artifact を列挙する。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      example_value:
        - artifact:risk-summary-57
    - id: execution_binding_ref
      labels:
        zh: 执行绑定引用
        en: Execution binding reference
        ja: 実行バインディング参照
      definitions:
        zh: 指向实际 reducer、图调用、应用函数或 SDK 运行记录，而不赋予其本地活动类型。
        en: Points to the actual reducer, graph invocation, application function, or SDK run record without assigning it the local activity type.
        ja: ローカル活動型を与えず、実際の reducer、graph invocation、application function、または SDK run record を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: application:risk:aggregate-57
    - id: completion_disposition
      labels:
        zh: 完成处置
        en: Completion disposition
        ja: 完了処置
      definitions:
        zh: 记录归并完成、因输入不足而拒绝、失败、取消或升级的结果处置。
        en: Records whether aggregation completed, was rejected for insufficient input, failed, cancelled, or escalated.
        ja: 集約が完了、入力不足で却下、失敗、取消、またはエスカレーションしたかを記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: completed
    - id: composition_activity_id
      labels: { zh: 组合活动标识, en: Composition-activity identifier, ja: 構成活動識別子 }
      definitions: { zh: 稳定标识这次归并所实现的那一次本地组合执行。, en: Stably identifies the local composition execution realized by this aggregation., ja: この集約が実現するローカル構成実行を安定して識別する。 }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: aggregate-risk-57
    - id: topology_ref
      labels: { zh: 实际拓扑引用, en: Actual topology reference, ja: 実際のトポロジー参照 }
      definitions: { zh: 指向这次归并实际执行的不可变 OrchestrationTopology 版本。, en: Points to the immutable OrchestrationTopology revision actually executed for this aggregation., ja: この集約で実際に実行された不変の OrchestrationTopology revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: topology-risk-review-v2
    - id: pattern_ref
      labels: { zh: 实际模式引用, en: Actual pattern reference, ja: 実際のパターン参照 }
      definitions: { zh: 指向约束这次归并运行轨迹的本地 CompositionPattern 版本。, en: Points to the local CompositionPattern revision that constrains this aggregation run trace., ja: この集約実行 trace を制約するローカル CompositionPattern revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: pattern-risk-merge-v2
  constraints:
    - id: aggregation-activity-seals-input-rule-basis-and-result
      severity: error
      language: plain
      expression: An AggregationActivity must retain at least two input_artifact_refs, exactly one aggregation_rule_ref, one selection_basis, one execution_binding_ref, and one completion_disposition; a completed activity must retain at least one output_artifact_ref.
      explanation:
        zh: 该约束使输入闭包、实际规则、结果和选择依据可以重算或审计。
        en: This makes the input closure, actual rule, result, and selection basis recomputable or auditable.
        ja: これにより input closure、実際の rule、結果、選択根拠を再計算または監査できる。
      source_claims:
        - claim-aggregation-activity-local
    - id: aggregation-activity-is-not-framework-merge-primitive
      severity: error
      language: plain
      expression: execution_binding_ref may cite a LangGraph reducer or Send workflow, or an Agents SDK application arrangement, but AggregationActivity must remain a Moonweave local runtime record rather than a native framework primitive.
      explanation:
        zh: 来源 API 描述如何调度或合并状态；本地活动描述某次业务归并实际使用的输入、规则和选择理由。
        en: Source APIs describe how state is scheduled or merged; the local activity describes inputs, rule, and selection rationale actually used by one business aggregation.
        ja: 出所 API は state の schedule または merge を説明し、ローカル活動は一回の業務集約が実際に用いた入力、rule、選択根拠を説明する。
      source_claims:
        - claim-aggregation-activity-langgraph
        - claim-aggregation-activity-openai
        - claim-aggregation-activity-local
  required_relations: []
examples:
  - id: aggregation-activity-positive-risk-merge
    labels:
      zh: AggregationActivity positive
      en: AggregationActivity positive
      ja: AggregationActivity positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 AggregationActivity：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps AggregationActivity: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が AggregationActivity 多 agent 協調に写像。
    field_values: {aggregation_activity_id: aggregate-risk-57}

    related_node_ids:
      - AggregationActivity
      - CompositionActivity
      - AggregationRule
      - CompositionArtifact
    related_relation_ids:
      - AggregationActivity-is_a-CompositionActivity
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-activity-local

  - id: aggregation-activity-counterexample-one-input-stage
    labels:
      zh: AggregationActivity counterexample
      en: AggregationActivity counterexample
      ja: AggregationActivity counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 AggregationActivity；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style AggregationActivity; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 AggregationActivity として拒否。
    field_values: {aggregation_activity_id: stage-format-11}

    related_node_ids:
      - AggregationActivity
      - ChainStage
    related_relation_ids: []
    source_claims:
      - claim-aggregation-activity-local

  - id: aggregation-activity-boundary-langgraph-reducer
    labels:
      zh: AggregationActivity boundary
      en: AggregationActivity boundary
      ja: AggregationActivity boundary
    descriptions:
      zh: DSPy compiled prompt 是运行时优化结果，不是 AggregationActivity 静态 PipelineComposition 规约；PromptOptimization 活动与规约应分离。
      en: DSPy compiled prompts are runtime optimization results, not AggregationActivity static PipelineComposition spec; separate PromptOptimization activity from specification.
      ja: DSPy compiled prompt は runtime で AggregationActivity 静的 spec ではない。
    field_values: {aggregation_activity_id: aggregate-graph-21}

    related_node_ids:
      - AggregationActivity
      - AggregationRule
    related_relation_ids:
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-activity-langgraph
      - claim-aggregation-activity-local

  - id: aggregation-activity-instance-parallel-specialist-summary
    labels:
      zh: AggregationActivity instance
      en: AggregationActivity instance
      ja: AggregationActivity instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 AggregationActivity DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to AggregationActivity DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が AggregationActivity に写像。
    field_values: {aggregation_activity_id: aggregate-brief-103}

    related_node_ids:
      - AggregationActivity
      - CompositionActivity
      - AggregationRule
      - Parallelization
    related_relation_ids:
      - AggregationActivity-is_a-CompositionActivity
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-aggregation-activity-openai
      - claim-aggregation-activity-local

parent_relation:
  id: AggregationActivity-is_a-CompositionActivity
  predicate: is_a
  target: concept:CompositionActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是组合活动
    en: is a composition activity
    ja: 構成活動である
  definition:
    zh: AggregationActivity 继承 CompositionActivity 的已发生运行记录角色，并特化为在一个运行中以明确规则处理多个输入。
    en: AggregationActivity inherits CompositionActivity's role as a record of an occurred run and specializes it for rule-governed handling of multiple inputs in one run.
    ja: AggregationActivity は発生済み run record としての CompositionActivity の役割を継承し、一回の実行で複数入力を rule-governed に処理するために特化する。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_aggregation_activity
    labels:
      zh: 具有归并活动
      en: has aggregation activity
      ja: 集約活動を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy is a Moonweave local taxonomy and does not define a LangGraph or Agents SDK subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-aggregation-activity-local
  distinct_fact_rationale:
    zh: 层级说明多输入归并活动属于组合活动；它不说明某次运行实际应用了哪条规则。
    en: The hierarchy says a multi-input aggregation activity is a composition activity; it does not state which rule a particular run actually applied.
    ja: 階層は多入力集約活動が composition activity であることを示し、特定 run が実際に適用した rule は示さない。
relations:
  - id: AggregationActivity-applies-AggregationRule
    predicate: applies
    target: concept:AggregationRule
    endpoint_order: activity-to-rule
    direction: source-to-target
    relation_kind: cross-link
    labels:
      zh: 应用归并规则
      en: applies aggregation rule
      ja: 集約規則を適用する
    definition:
      zh: 一次 AggregationActivity 关联到其实际执行的版本化 AggregationRule，该规则解释输入如何被选择、合并、拒绝或升级。
      en: An AggregationActivity is associated with the versioned AggregationRule it actually executed, which explains how inputs were selected, merged, rejected, or escalated.
      ja: AggregationActivity は実際に実行した版管理された AggregationRule と関連し、その rule が入力を選択、結合、却下、またはエスカレーションした方法を説明する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_applied_by_aggregation_activity
      labels:
        zh: 被归并活动应用
        en: is applied by aggregation activity
        ja: 集約活動に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave occurrence-to-rule association, not a LangGraph reducer definition or SDK control-flow primitive.
    constraints: []
    examples: []
    source_claims:
      - claim-aggregation-activity-local
    distinct_fact_rationale:
      zh: 该关系记录规则在一次活动中的实际应用；它不等同于规则目录中“可用”的规则。
      en: This relation records a rule's actual application in one activity; it is not the same as a rule merely being available in a catalog.
      ja: この関係は一つの活動における rule の実際の適用を記録し、catalog で rule が利用可能なだけの状態とは異なる。
    layout_role: cross-link
