  predicate: is_a
  target: concept:AggregationActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是归并活动
    en: is an aggregation activity
    ja: 集約活動である
  definition:
    zh: VotingActivity 继承 AggregationActivity 的多输入归并角色，并特化为对可验证票据按规则选择、拒绝或升级候选。
    en: VotingActivity inherits AggregationActivity's multi-input aggregation role and specializes it for rule-governed selection, rejection, or escalation over verifiable ballots.
    ja: VotingActivity は AggregationActivity の多入力 aggregation 役割を継承し、検証可能な ballot に対して rule-governed に選択、却下、または escalation するために特化する。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_voting_activity
    labels:
      zh: 具有投票活动
      en: has voting activity
      ja: 投票活動を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy is a Moonweave local taxonomy and does not define a LangGraph, Agents SDK, A2A, MCP, or paper-method subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-voting-activity-local
  distinct_fact_rationale:
    zh: 层级说明投票活动属于多输入归并；它不说明某次运行实际消费了哪些票或采用了哪条规则。
    en: The hierarchy says voting activity is a multi-input aggregation; it does not state which ballots or rule a particular run actually consumed or applied.
    ja: 階層は voting activity が多入力 aggregation であることを示し、特定 run が実際に consume または apply した ballot や rule は示さない。
relations:
  - id: VotingActivity-consumes-VoteBallot
    predicate: consumes
    target: concept:VoteBallot
    endpoint_order: activity-to-ballot
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 消费投票票据
      en: consumes vote ballot
      ja: 投票票を消費する
    definition:
      zh: 一次 VotingActivity 消费在关闭输入集合中通过资格、格式和截止校验的具体 VoteBallot。
      en: A VotingActivity consumes a concrete VoteBallot that passed eligibility, format, and deadline checks in its closed input set.
      ja: VotingActivity は closed input set 内で eligibility、format、deadline check を通過した具体的 VoteBallot を consume する。
    cardinality:
      source:
        min: 1
        max: null
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_consumed_by_voting_activity
      labels:
        zh: 被投票活动消费
        en: is consumed by voting activity
        ja: 投票活動に消費される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave occurrence-to-ballot input association, not a generic message or SDK tool-input type.
    constraints: []
    examples: []
    source_claims:
      - claim-voting-activity-local
    distinct_fact_rationale:
      zh: 该关系证明特定票据进入本次关闭计票；票据存在于目录中并不自动建立该关系。
      en: This relation proves a specific ballot entered this closed tally; a ballot existing in a catalog does not establish it automatically.
      ja: この関係は特定 ballot がこの closed tally に入ったことを証明し、catalog 内の ballot 存在だけでは自動的に成立しない。
    layout_role: cross-link
  - id: VotingActivity-produces-CompositionOutput
    predicate: produces
    target: concept:CompositionOutput
    endpoint_order: activity-to-output
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生组合输出
      en: produces composition output
      ja: 構成出力を生成する
    definition:
      zh: 一次 VotingActivity 在计票完成或明确处置后产生新的 CompositionOutput，记录候选选择、票据摘要、规则和结果处置。
      en: A VotingActivity produces a new CompositionOutput after tally completion or explicit disposition, recording candidate selection, ballot digest, rule, and outcome disposition.
      ja: VotingActivity は tally 完了または明示的 disposition の後、candidate selection、ballot digest、rule、outcome disposition を記録する新しい CompositionOutput を produce する。
    cardinality:
      source:
        min: 0
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_produced_by_voting_activity
      labels:
        zh: 由投票活动产生
        en: is produced by voting activity
        ja: 投票活動によって生成される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This relation points to a newly created local result record, not to a pre-existing candidate merely selected by the vote.
    constraints: []
    examples: []
    source_claims:
      - claim-voting-activity-local
    distinct_fact_rationale:
      zh: 选择既有候选与产生记录该选择的新结果是两个事实，只有后者属于 produces。
      en: Selecting an existing candidate and producing a new record of that selection are different facts; only the latter is produces.
      ja: 既存 candidate の選択と、その選択を記録する新 result の production は別の fact であり、produces は後者だけを指す。
    layout_role: cross-link
  - id: VotingActivity-realizes-Voting
    predicate: realizes
    target: concept:Voting
    endpoint_order: activity-to-pattern
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 实现投票模式
      en: realizes voting pattern
      ja: 投票パターンを実現する
    definition:
      zh: 当一次 VotingActivity 的票据资格、候选处理、关闭条件、同票处置和输出行为满足某本地 Voting 修订时，该活动实现该模式。
      en: A VotingActivity realizes a local Voting revision when its ballot eligibility, candidate handling, closure, tie disposition, and output behavior satisfy that revision.
      ja: VotingActivity は ballot eligibility、candidate handling、closure、tie disposition、output behavior がローカル Voting revision を満たすとき、その pattern を実現する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_realized_by_voting_activity
      labels:
        zh: 由投票活动实现
        en: is realized by voting activity
        ja: 投票活動によって実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave conformance association, not a LangGraph conditional edge or an Agents SDK control-flow type.
    constraints: []
    examples: []
    source_claims:
      - claim-voting-activity-local
    distinct_fact_rationale:
      zh: 该关系验证运行符合本地投票模式，而不是仅说明它引用了某条投票规则。
      en: This relation verifies conformance to a local voting pattern rather than merely stating that a voting rule was referenced.
      ja: この関係はローカル voting pattern への conformance を検証し、voting rule を参照しただけとは異なる。
    layout_role: cross-link
  - id: VotingActivity-applies-VotingRule
    predicate: applies
    target: concept:VotingRule
    endpoint_order: activity-to-rule
    direction: source-to-target
    relation_kind: cross-link
    labels:
      zh: 应用投票规则
      en: applies voting rule
      ja: 投票規則を適用する
    definition:
      zh: 一次 VotingActivity 关联到它实际执行的一个版本化 VotingRule，该规则定义合格票、门槛、选择和同票结果。
      en: A VotingActivity is associated with one versioned VotingRule it actually executes, which defines eligible ballots, threshold, selection, and tie outcome.
      ja: VotingActivity は実際に実行する一つの版管理された VotingRule と関連し、その rule が eligible ballot、threshold、selection、tie outcome を定義する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_applied_by_voting_activity
      labels:
        zh: 被投票活动应用
        en: is applied by voting activity
        ja: 投票活動に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave occurrence-to-rule association, not a framework routing or handoff mechanism.
    constraints: []
    examples: []
    source_claims:
      - claim-voting-activity-local
    distinct_fact_rationale:
      zh: 该关系记录实际计票规则；它不同于 Voting 模式的符合性，也不同于规则在目录中可用。
      en: This relation records the actual tally rule; it differs from Voting-pattern conformance and from a rule merely being available in a catalog.
      ja: この関係は実際の tally rule を記録し、Voting pattern conformance とも catalog で rule が利用可能なだけの状態とも異なる。
    layout_role: cross-link
