schema: moonweave.ai/ontology-node/v1
id: VotingActivity
kind: concept
labels:
  zh: 投票活动
  en: Voting Activity
  ja: 投票活動
semantics:
  short_definition:
    zh: 依据本地投票规则处理明确票据，并在完成处置时形成有决策依据组合输出的归并活动。
    en: An aggregation activity that processes explicit ballots under a local voting rule and, when completed, records a composition output with decision basis.
    ja: ローカル投票規則に従って明示的 ballot を処理し、完了時に決定根拠を持つ composition output を記録する集約活動。
  definition:
    zh: >-
      VotingActivity 是 AggregationActivity 的一种 Moonweave 本地运行概念。它封存实际消费的 VoteBallot、实际应用的 VotingRule、候选域、法定人数或同票处理等决策依据和执行绑定；完成时还封存新产生的 CompositionOutput。被拒绝、失败、取消或升级的运行保留票据、规则和决策依据，但可以没有 CompositionOutput。它不是投票模式、投票规则、单张票、LangGraph 条件边或 reducer、OpenAI Agents SDK handoff、manager 或 Agent、A2A 类型、MCP 工具，也不是 Self-Consistency 论文中的原生运行类型；这些对象和方法必须保持来源身份。
    en: >-
      A VotingActivity is a kind of AggregationActivity and a Moonweave local runtime concept. It seals the VoteBallots actually consumed, VotingRule actually applied, candidate domain, decision basis such as quorum or tie handling, and execution binding; when completed, it also seals the newly produced CompositionOutput. Rejected, failed, cancelled, or escalated runs retain ballots, rule, and decision basis but may have no CompositionOutput. It is not a voting pattern, voting rule, one ballot, LangGraph conditional edge or reducer, OpenAI Agents SDK handoff, manager, or Agent, an A2A type, MCP tool, or a native runtime type from the Self-Consistency paper; those objects and methods retain their source identities.
    ja: >-
      VotingActivity は AggregationActivity の一種であり、Moonweave のローカル実行時概念です。実際に consume した VoteBallot、実際に適用した VotingRule、candidate domain、quorum や tie handling などの decision basis、execution binding を固定し、完了時には新たに生成した CompositionOutput も固定します。却下、失敗、取消、エスカレーションの実行は ballot、rule、decision basis を保持しますが、CompositionOutput を持たないことがあります。voting pattern、voting rule、一つの ballot、LangGraph conditional edge や reducer、OpenAI Agents SDK handoff、manager、Agent、A2A 型、MCP tool、Self-Consistency 論文の native runtime type ではありません。これらの object と method は出所 identity を保持します。
  why_needed:
    zh: >-
      “多数同意”若未保留谁投了什么、何时关闭、使用哪条规则及为何选中某候选，就不能重算或质疑。投票活动把输入、规则、阈值、同票处置、结果和来源绑定作为一次可检查发生记录下来。
    en: >-
      “Majority agreed” cannot be recomputed or challenged unless the ballots, closure, rule, and reason for selecting a candidate are retained. A voting activity records inputs, rule, threshold, tie disposition, result, and source binding as one inspectable occurrence.
    ja: >-
      「多数が同意した」は、ballot、closure、rule、候補を選んだ理由を保持しなければ再計算も異議申立てもできません。voting activity は入力、rule、threshold、tie disposition、結果、source binding を一つの検査可能な発生として記録します。
  includes:
    - zh: 对一个或多个有效 VoteBallot 应用版本化 VotingRule、记录决策依据并产生或明确拒绝一个 CompositionOutput 的运行。
      en: A run that applies a versioned VotingRule to one or more valid VoteBallots, records decision basis, and produces or explicitly rejects a CompositionOutput.
      ja: 一つ以上の有効 VoteBallot に版管理された VotingRule を適用し、decision basis を記録して CompositionOutput を生成または明示的に却下する実行。
    - zh: 对并行评审、采样结果或应用代码计算的有来源本地计票记录。
      en: A provenance-bearing local tally record for parallel reviews, sampled results, or application-code calculation.
      ja: 並列 review、sampled result、または application-code calculation に対する出所付きローカル tally record。
  excludes:
    - zh: 未运行的 VotingRule、单张 VoteBallot、仅表达偏好的文本、简单平均或没有候选选择的状态合并。
      en: An unexecuted VotingRule, one VoteBallot, text that merely expresses preference, a simple average, or state merging without candidate selection.
      ja: 未実行の VotingRule、一つの VoteBallot、単に好みを表す text、単純平均、候補選択のない state merge。
    - zh: 把 LangGraph 路由、Agents SDK handoff 或论文抽样方法自动改写为投票活动。
      en: Automatically rewriting LangGraph routing, an Agents SDK handoff, or a paper sampling method as a voting activity.
      ja: LangGraph routing、Agents SDK handoff、または論文の sampling method を自動的に voting activity と書き換えること。
  semantic_kind: activity
engineering:
  explanation:
    zh: >-
      LangGraph 可以通过条件边决定后续节点，并让多个出边目的节点并行执行；Agents SDK 应用可以并行运行评审 Agent，再由代码计算结构化结果。投票活动适配器把实际 ballot 集合和规则版本封存，计算 quorum、候选得票和 tie_policy，并生成本地 CompositionOutput。Self-Consistency 提供从多条采样路径选择一致答案的方法证据，但不提供 VoteBallot、VotingRule 或活动字段。
    en: >-
      LangGraph can use conditional edges to choose later nodes and execute destination nodes in parallel after multiple outgoing edges; an Agents SDK application can run reviewer Agents in parallel and calculate a structured result in code. A voting-activity adapter seals the actual ballot set and rule revision, computes quorum, candidate votes, and tie_policy, and generates a local CompositionOutput. Self-Consistency supplies method evidence for selecting a consistent answer from sampled paths, not VoteBallot, VotingRule, or activity fields.
    ja: >-
      LangGraph は conditional edge で後続 node を選び、複数 outgoing edge 後に destination node を並列実行できます。Agents SDK アプリケーションは reviewer Agent を並列実行し、コードで構造化結果を計算できます。voting-activity adapter は実際の ballot set と rule revision を固定し、quorum、candidate vote、tie_policy を計算してローカル CompositionOutput を生成します。Self-Consistency は sampled path から整合的回答を選ぶ手法証拠を提供するだけで、VoteBallot、VotingRule、活動 field を提供しません。
  typical_input:
    - description:
        zh: 应用并行运行三个评审者，并把结构化票据交给本地计票函数。
        en: An application runs three reviewers in parallel and passes structured ballots to a local tally function.
        ja: アプリケーションが三人の reviewer を並列実行し、構造化 ballot をローカル tally function へ渡す。
      format: |-
        import asyncio
        from agents import Runner

        runs = await asyncio.gather(
            Runner.run(legal_reviewer, candidate),
            Runner.run(security_reviewer, candidate),
            Runner.run(quality_reviewer, candidate),
        )
        ballots = [run.final_output for run in runs]
        # application code applies and records its versioned voting rule
      source_claims: [claim-voting-activity-openai, claim-voting-activity-local]
    - description:
        zh: LangGraph 并行执行两个评审节点，条件边根据本地计票结果选择下一步。
        en: LangGraph executes two review nodes in parallel, and a conditional edge chooses the next step from a local tally result.
        ja: LangGraph が二つの review node を並列実行し、conditional edge がローカル tally result から次段階を選ぶ。
      format: |-
        def choose_release_or_escalate(state):
            return "release" if state["yes_votes"] > state["no_votes"] else "escalate"

        builder.add_conditional_edges("tally", choose_release_or_escalate)
      source_claims: [claim-voting-activity-langgraph]
  typical_output:
    - description:
        zh: 封存票据、规则、决策依据和结果的本地投票活动记录。
        en: A local voting-activity record sealing ballots, rule, decision basis, and result.
        ja: ballot、rule、decision basis、結果を固定するローカル voting-activity record。
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"voting-activity","voting_activity_id":"vote-release-52","vote_ballot_refs":["ballot:legal-52","ballot:security-52","ballot:quality-52"],"voting_pattern_ref":"voting-release-v2","voting_rule_ref":"rule:release-majority-v3","candidate_domain":"release-decision","decision_basis":"quorum-3; strict-majority; tie-escalates","composition_output_ref":"output:release-52","execution_binding_ref":"application:release:tally-52","completion_disposition":"completed"}
      source_claims: [claim-voting-activity-local]
  reference_implementations:
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents parallel destination execution and conditional routing through edges.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents code-driven orchestration of multiple Agents and their results.
    - name: Self-Consistency paper
      url: https://arxiv.org/abs/2203.11171
      description: Describes sampling diverse reasoning paths and selecting the most consistent answer.
structure:
  identity_keys:
    - composition_activity_id
    - aggregation_activity_id
    - voting_activity_id
  fields:
    - id: voting_activity_id
      labels:
        zh: 投票活动标识
        en: Voting-activity identifier
        ja: 投票活動識別子
      definitions:
        zh: 稳定标识一次已经发生的本地计票或投票归并运行。
        en: Stably identifies one local tally or voting-aggregation run that has occurred.
        ja: 実際に発生した一回のローカル tally または voting-aggregation 実行を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: vote-release-52
    - id: vote_ballot_refs
      labels:
        zh: 实际票据引用
        en: Actual ballot references
        ja: 実際の ballot 参照
      definitions:
        zh: 列出本次活动在关闭输入集合中实际消费的可验证 VoteBallot。
        en: Lists the verifiable VoteBallots actually consumed in this activity's closed input set.
        ja: この活動の closed input set で実際に consume した検証可能な VoteBallot を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      example_value:
        - ballot:legal-52
        - ballot:security-52
        - ballot:quality-52
    - id: voting_pattern_ref
      labels:
        zh: 实际投票模式引用
        en: Actual voting-pattern reference
        ja: 実際の投票パターン参照
      definitions:
        zh: 指向本次活动要满足的本地 Voting 模式版本。
        en: Points to the local Voting pattern revision this activity must satisfy.
        ja: この活動が満たすべきローカル Voting pattern revision を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: voting-release-v2
    - id: voting_rule_ref
      labels:
        zh: 实际投票规则引用
        en: Actual voting-rule reference
        ja: 実際の投票規則参照
      definitions:
        zh: 指向本次运行实际执行的版本化 VotingRule，而不是规则目录中的可用候选。
        en: Points to the versioned VotingRule actually executed by this run rather than a rule merely available in a catalog.
        ja: catalog で利用可能なだけの rule ではなく、この実行が実際に実行した版管理された VotingRule を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: rule:release-majority-v3
    - id: candidate_domain
      labels:
        zh: 候选域
        en: Candidate domain
        ja: 候補領域
      definitions:
        zh: 声明可被本次计票选择、拒绝或升级的候选类型或集合。
        en: States the candidate type or set that this tally may select, reject, or escalate.
        ja: この tally が選択、却下、またはエスカレーションできる candidate type または set を示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: release-decision
    - id: decision_basis
      labels:
        zh: 决策依据
        en: Decision basis
        ja: 決定根拠
      definitions:
        zh: 记录资格、有效票集合、quorum、得票比较、同票或低置信度处置，从而解释选择、拒绝或升级。
        en: Records eligibility, valid ballot set, quorum, vote comparison, and tie or low-confidence disposition so selection, rejection, or escalation can be explained.
        ja: eligibility、有効 ballot set、quorum、vote comparison、tie または低信頼度 disposition を記録し、選択、却下、または escalation を説明できるようにする。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: quorum-3; strict-majority; tie-escalates
    - id: composition_output_ref
      labels:
        zh: 投票结果引用
        en: Voting-result reference
        ja: 投票結果参照
      definitions:
        zh: 指向本次投票活动新产生的 CompositionOutput，而非被选中的原始候选工件。
        en: Points to the CompositionOutput newly produced by this voting activity rather than the original candidate artifact selected.
        ja: 選択された元 candidate artifact ではなく、この voting activity が新規生成した CompositionOutput を指す。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      example_value: output:release-52
    - id: execution_binding_ref
      labels:
        zh: 执行绑定引用
        en: Execution binding reference
        ja: 実行バインディング参照
      definitions:
        zh: 指向实际图节点、应用计票函数或 SDK 运行记录，并保留其来源 API 身份。
        en: Points to the actual graph node, application tally function, or SDK run record while retaining its source-API identity.
        ja: 出所 API identity を保ったまま、実際の graph node、application tally function、または SDK run record を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: application:release:tally-52
    - id: completion_disposition
      labels:
        zh: 完成处置
        en: Completion disposition
        ja: 完了処置
      definitions:
        zh: 记录投票完成、票据不足而拒绝、同票升级、失败或取消的结果。
        en: Records whether voting completed, was rejected for insufficient ballots, escalated on a tie, failed, or cancelled.
        ja: voting が完了、ballot 不足で却下、tie で escalation、失敗、または取消したかを記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: completed
    - id: aggregation_activity_id
      labels: { zh: 归并活动标识, en: Aggregation-activity identifier, ja: 集約活動識別子 }
      definitions: { zh: 稳定标识该投票活动作为一次多输入归并运行的身份。, en: Stably identifies this voting activity in its role as a multi-input aggregation run., ja: この voting 活動を多入力集約実行として安定して識別する。 }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: vote-release-52
    - id: input_artifact_refs
      labels: { zh: 封存输入工件引用, en: Sealed input artifact references, ja: 固定入力 artifact 参照 }
      definitions: { zh: 列出产生选票或候选项的、此次投票实际读取的全部输入工件。, en: Lists every input artifact actually read to produce the ballots or candidates for this voting aggregation., ja: この投票集約の ballot または候補を作るために実際に読まれたすべての input artifact を列挙する。 }
      datatype: reference
      required: true
      cardinality: { min: 2, max: null }
      example_value: [artifact:legal-52, artifact:security-52, artifact:quality-52]
    - id: aggregation_rule_ref
      labels: { zh: 实际归并规则引用, en: Actual aggregation-rule reference, ja: 実際の集約規則参照 }
      definitions: { zh: 指向本次投票实际执行的版本化 AggregationRule。, en: Points to the versioned AggregationRule actually executed for this vote., ja: この投票で実際に実行された版管理済み AggregationRule を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: rule:release-majority-v3
    - id: selection_basis
      labels: { zh: 选择依据, en: Selection basis, ja: 選択根拠 }
      definitions:
        zh: 记录选票、法定人数和决策规则如何共同确定该投票结果。
        en: Records how ballots, quorum, and the decision rule jointly determined this voting result.
        ja: ballot、定足数、決定規則がこの投票結果をどのように決めたかを記録する。
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: quorum-3-strict-majority-no-tie
    - id: composition_activity_id
      labels: { zh: 组合活动标识, en: Composition-activity identifier, ja: 構成活動識別子 }
      definitions: { zh: 稳定标识该投票活动所实现的一次本地组合执行。, en: Stably identifies the local composition execution realized by this voting activity., ja: この voting 活動が実現するローカル構成実行を安定して識別する。 }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: vote-release-52
    - id: topology_ref
      labels: { zh: 实际拓扑引用, en: Actual topology reference, ja: 実際のトポロジー参照 }
      definitions: { zh: 指向本次投票实际执行的不可变 OrchestrationTopology 版本。, en: Points to the immutable OrchestrationTopology revision actually executed for this vote., ja: この投票で実際に実行された不変の OrchestrationTopology revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: topology-release-vote-v2
    - id: pattern_ref
      labels: { zh: 实际模式引用, en: Actual pattern reference, ja: 実際のパターン参照 }
      definitions: { zh: 指向约束本次投票运行轨迹的本地 CompositionPattern 版本。, en: Points to the local CompositionPattern revision that constrains this voting run trace., ja: この投票実行 trace を制約するローカル CompositionPattern revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: pattern-release-vote-v2
  constraints:
    - id: voting-activity-retains-ballots-rule-basis-and-result
      severity: error
      language: plain
      expression: A VotingActivity must retain at least one vote_ballot_ref, exactly one voting_pattern_ref, exactly one voting_rule_ref, one candidate_domain, one decision_basis, one execution_binding_ref, and one completion_disposition; a completed activity must retain one composition_output_ref.
      explanation:
        zh: 该约束使任何决策都能追溯到实际票据、规则版本和阈值或同票处理依据。
        en: This lets any decision be traced to actual ballots, rule revision, and threshold or tie-handling basis.
        ja: これにより、あらゆる決定を実際の ballot、rule revision、threshold または tie-handling basis へ追跡できる。
      source_claims:
        - claim-voting-activity-local
    - id: voting-activity-is-not-routing-handoff-or-paper-type
      severity: error
      language: plain
      expression: execution_binding_ref may cite LangGraph routing, an Agents SDK application, or a paper-informed sampling implementation, but VotingActivity must remain a Moonweave local activity rather than a native routing edge, handoff, SDK type, protocol type, or paper runtime type.
      explanation:
        zh: 路由与 handoff 决定控制权，论文说明方法；本地投票活动专门记录一次可验证的票据归并与决策。
        en: Routing and handoff determine control flow, and papers describe methods; the local voting activity specifically records one verifiable ballot aggregation and decision.
        ja: routing と handoff は control flow を決め、論文は method を説明する。ローカル voting activity は一回の検証可能な ballot aggregation と決定を特に記録する。
      source_claims:
        - claim-voting-activity-langgraph
        - claim-voting-activity-openai
        - claim-voting-activity-self-consistency
        - claim-voting-activity-local
  required_relations: []
examples:
  - id: voting-activity-positive-release-majority
    labels:
      zh: VotingActivity positive
      en: VotingActivity positive
      ja: VotingActivity positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 VotingActivity：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps VotingActivity: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が VotingActivity 多 agent 協調に写像。
    field_values: {voting_activity_id: vote-release-52}

    related_node_ids:
      - VotingActivity
      - AggregationActivity
      - VoteBallot
      - VotingRule
      - Voting
      - CompositionOutput
    related_relation_ids:
      - VotingActivity-is_a-AggregationActivity
      - VotingActivity-consumes-VoteBallot
      - VotingActivity-applies-VotingRule
      - VotingActivity-realizes-Voting
      - VotingActivity-produces-CompositionOutput
    source_claims:
      - claim-voting-activity-local

  - id: voting-activity-counterexample-unstructured-comments
    labels:
      zh: VotingActivity counterexample
      en: VotingActivity counterexample
      ja: VotingActivity counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 VotingActivity；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style VotingActivity; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 VotingActivity として拒否。
    field_values: {voting_activity_id: comments-72, vote_ballot_refs: [], voting_pattern_ref: null, voting_rule_ref: null, candidate_domain: unspecified, decision_basis: informal-comments, composition_output_ref: null, execution_binding_ref: chat:thread-72, completion_disposition: unspecified}

    related_node_ids:
      - VotingActivity
    related_relation_ids: []
    source_claims:
      - claim-voting-activity-local

  - id: voting-activity-boundary-self-consistency
    labels:
      zh: VotingActivity boundary
      en: VotingActivity boundary
      ja: VotingActivity boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 VotingActivity 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not VotingActivity work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で VotingActivity work_specification ではない。
    field_values: {voting_activity_id: vote-consistency-14}

    related_node_ids:
      - VotingActivity
      - VotingRule
