schema: moonweave.ai/ontology-node/v1
id: Synthesis
kind: concept
labels:
  zh: 综合活动
  en: Synthesis Activity
  ja: 統合活動
semantics:
  short_definition:
    zh: 依照本地综合计划处理多个来源输出，并在完成或升级处置时形成带归因和选择依据的新输出的归并活动。
    en: An aggregation activity that processes multiple source outputs under a local synthesis plan and, on a completed or escalated disposition, records a new attributed output with selection basis.
    ja: ローカル統合計画に従って複数の source output を処理し、完了またはエスカレーション処置時に帰属と選択根拠を持つ新出力を記録する集約活動。
  definition:
    zh: >-
      Synthesis 是 AggregationActivity 的一种 Moonweave 本地运行概念。它消费一个 SynthesisInput、读取其列出的来源输出，并按实际 SynthesisPlan 处理排序、归因和冲突。完成或升级处置时，它产生一个带可检查选择依据的 SynthesisOutput；失败、取消或因冲突被拒绝的处置可保留输入、计划和依据而不产生 SynthesisOutput。它不是 LangGraph Node、StateGraph、reducer 或工作流类，也不是 OpenAI Agents SDK manager、Agent、Runner、handoff、A2A 类型、MCP 工具或 Mixture-of-Agents 论文层；来源对象和论文方法只能通过实现绑定或证据被引用，不定义本地 schema。
    en: >-
      A Synthesis is a kind of AggregationActivity and a Moonweave local runtime concept. It consumes one SynthesisInput, reads the source outputs listed there, and applies ordering, attribution, and conflict handling from the actual SynthesisPlan. On a completed or escalated disposition, it produces one SynthesisOutput with an inspectable selection basis; a failed, cancelled, or conflict-rejected disposition can retain its input, plan, and basis without a SynthesisOutput. It is not a LangGraph Node, StateGraph, reducer, or workflow class, nor an OpenAI Agents SDK manager, Agent, Runner, handoff, A2A type, MCP tool, or a Mixture-of-Agents paper layer; source objects and paper methods may only be cited through implementation binding or evidence and do not define the local schema.
    ja: >-
      Synthesis は AggregationActivity の一種であり、Moonweave のローカル実行時概念です。一つの SynthesisInput を consume し、そこに列挙された source output を読み、実際の SynthesisPlan の順序、帰属、競合処理を適用します。完了またはエスカレーション処置時には、検査可能な選択根拠を持つ一つの SynthesisOutput を produce し、失敗、取消、競合による却下の処置では input、plan、basis を保持して SynthesisOutput を生成しないことがあります。LangGraph の Node、StateGraph、reducer、workflow class でも、OpenAI Agents SDK の manager、Agent、Runner、handoff、A2A 型、MCP tool、Mixture-of-Agents 論文 layer でもありません。出所 object と論文手法は implementation binding または evidence により参照できるだけで、ローカル schema を定義しません。
  why_needed:
    zh: >-
      “综合”常被用来掩盖来源遗漏、冲突被抹平或输出由谁选择的事实。将它建模为活动可固定输入闭包、计划版本、冲突处理、最终输出和选择理由，使读者能区分简单拼接、未执行的计划和已发生的受控综合。
    en: >-
      “Synthesis” is often used to hide omitted sources, flattened conflicts, or who selected the output. Modeling it as an activity fixes the input closure, plan revision, conflict handling, final output, and selection rationale, distinguishing simple concatenation, an unexecuted plan, and an occurred controlled synthesis.
    ja: >-
      「synthesis」は、欠落した source、平坦化された conflict、出力を誰が選んだかを隠すために使われがちです。活動として表現すれば、input closure、plan revision、conflict handling、最終出力、選択根拠を固定でき、単純な連結、未実行の plan、発生済みの制御された synthesis を区別できます。
  includes:
    - zh: 读取两个及以上来源输出，并按版本化计划形成具有来源归因和冲突处置的一个新结果的运行。
      en: A run that reads two or more source outputs and forms one new result with source attribution and conflict disposition under a versioned plan.
      ja: 二つ以上の source output を読み、版管理された plan の下で source attribution と conflict disposition を持つ一つの新結果を形成する実行。
    - zh: 对实际图中汇合节点或应用控制的多 Agent 结果组合的有来源本地活动记录。
      en: A provenance-bearing local activity record of an actual graph join node or application-controlled multi-Agent result combination.
      ja: 実際の graph join node またはアプリケーション制御の multi-Agent result combination に対する出所付きローカル活動記録。
  excludes:
    - zh: SynthesisPlan 本身、SynthesisInput 或 SynthesisOutput 本身、单个来源的改写、无来源归因的自由文本摘要。
      en: A SynthesisPlan itself, a SynthesisInput or SynthesisOutput itself, a rewrite of one source, or a free-text summary without source attribution.
      ja: SynthesisPlan 自体、SynthesisInput または SynthesisOutput 自体、一つの source の書き換え、source attribution のない自由文 summary。
    - zh: 把论文中的多层代理方法、模型内部推理或框架管理器直接当作该本地活动类型。
      en: Treating a paper's layered-agent method, model internal reasoning, or a framework manager directly as this local activity type.
      ja: 論文の layered-agent method、モデル内部 reasoning、またはフレームワーク manager をこのローカル活動型として直接扱うこと。
  semantic_kind: activity
engineering:
  explanation:
    zh: >-
      LangGraph 工作流可在多个节点产生材料后，由后续节点读取集合并返回新的状态更新；Agents SDK 应用可让 manager 调用专员作为工具，再由应用保存输出。综合适配器把实际输入集合绑定到 SynthesisInput，把处理政策绑定到 SynthesisPlan，并将新输出、来源归因与冲突选择依据写入本地记录。Mixture-of-Agents 论文说明一种利用前层输出的分层方法，但不提供本体字段或协议类型。
    en: >-
      A LangGraph workflow can have several nodes produce material, after which a later node reads the collection and returns a new state update; an Agents SDK application can let a manager call specialists as tools and then persist an output. A synthesis adapter binds the actual input set to SynthesisInput, the handling policy to SynthesisPlan, and writes the new output, source attribution, and conflict-selection basis into a local record. The Mixture-of-Agents paper describes a layered method that uses prior-layer outputs, not ontology fields or protocol types.
    ja: >-
      LangGraph workflow では複数 node が材料を生成し、後続 node が集合を読み新しい state update を返せます。Agents SDK アプリケーションでは manager が specialist を tool として呼び、出力を保存できます。synthesis adapter は実際の入力集合を SynthesisInput に、処理方針を SynthesisPlan に結び、新出力、source attribution、conflict-selection basis をローカル記録へ書きます。Mixture-of-Agents 論文は前 layer の出力を使う階層的手法を説明するもので、ontology field や protocol type を提供しません。
  typical_input:
    - description:
        zh: LangGraph 后续节点从并行分支收集报告并产生一个已更新状态。
        en: A later LangGraph node collects reports from parallel branches and returns updated state.
        ja: 後続 LangGraph node が並列 branch の report を集め、更新された state を返す。
      format: |-
        def synthesizer(completed_sections: list[str]) -> str:
            return "\n\n---\n\n".join(completed_sections)

        def synthesize(state):
            return {"brief": synthesizer(state["reports"])}
      source_claims: [claim-synthesis-langgraph]
    - description:
        zh: Agents SDK manager 调用专员工具并由应用记录最终综合。
        en: An Agents SDK manager calls specialist tools and the application records the final synthesis.
        ja: Agents SDK manager が specialist tool を呼び、アプリケーションが最終 synthesis を記録する。
      format: |-
        from agents import Agent, Runner

        manager = Agent(
            name="brief-manager",
            tools=[
                legal_agent.as_tool(tool_name="legal_review", tool_description="Review legal risks."),
                security_agent.as_tool(tool_name="security_review", tool_description="Review security risks."),
            ],
        )
        result = await Runner.run(manager, request)
        brief = result.final_output
      source_claims: [claim-synthesis-openai, claim-synthesis-local]
  typical_output:
    - description:
        zh: 带有输入、计划、结果、归因和冲突选择依据的本地综合活动记录。
        en: A local synthesis-activity record with input, plan, result, attribution, and conflict-selection basis.
        ja: 入力、plan、結果、attribution、conflict-selection basis を持つローカル synthesis-activity record。
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"synthesis-activity","synthesis_activity_id":"synthesize-brief-61","synthesis_input_ref":"synthesis-input:61","synthesis_plan_ref":"synthesis-plan:brief-v2","source_output_refs":["artifact:legal-61","artifact:security-61"],"synthesis_output_ref":"synthesis-output:61","selection_basis":"retain-citations-and-escalate-unresolved-conflict","execution_binding_ref":"application:brief:synthesize-61","completion_disposition":"escalated"}
      source_claims: [claim-synthesis-local]
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents workflow patterns that coordinate multiple steps and results.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents manager-style and code-driven multi-agent orchestration.
    - name: Mixture-of-Agents paper
      url: https://arxiv.org/abs/2406.04692
      description: Describes a layered method using outputs from prior agent layers as auxiliary information.
structure:
  identity_keys:
    - composition_activity_id
    - aggregation_activity_id
    - synthesis_activity_id
  fields:
    - id: synthesis_activity_id
      labels:
        zh: 综合活动标识
        en: Synthesis-activity identifier
        ja: 統合活動識別子
      definitions:
        zh: 稳定标识一次已经发生的本地综合运行。
        en: Stably identifies one local synthesis run that has occurred.
        ja: 実際に発生した一回のローカル synthesis 実行を安定して識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: synthesize-brief-61
    - id: synthesis_input_ref
      labels:
        zh: 综合输入引用
        en: Synthesis-input reference
        ja: 統合入力参照
      definitions:
        zh: 指向定义本次综合输入契约、范围和来源集合的 SynthesisInput。
        en: Points to the SynthesisInput defining this run's input contract, scope, and source set.
        ja: この実行の input contract、scope、source set を定義する SynthesisInput を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: synthesis-input:61
    - id: synthesis_plan_ref
      labels:
        zh: 实际综合计划引用
        en: Actual synthesis-plan reference
        ja: 実際の統合計画参照
      definitions:
        zh: 指向本次运行实际采用的版本化 SynthesisPlan。
        en: Points to the versioned SynthesisPlan actually used by this run.
        ja: この実行が実際に用いた版管理された SynthesisPlan を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: synthesis-plan:brief-v2
    - id: source_output_refs
      labels:
        zh: 来源输出引用
        en: Source-output references
        ja: source output 参照
      definitions:
        zh: 按该次综合实际读取的输入闭包列出两个及以上来源输出。
        en: Lists two or more source outputs in the input closure actually read by this synthesis.
        ja: この synthesis が実際に読んだ input closure 内の二つ以上の source output を列挙する。
      datatype: reference
      required: true
      cardinality:
        min: 2
        max: null
      example_value:
        - artifact:legal-61
        - artifact:security-61
    - id: synthesis_output_ref
      labels:
        zh: 综合输出引用
        en: Synthesis-output reference
        ja: 統合出力参照
      definitions:
        zh: 指向本次活动新产生的 SynthesisOutput，而非任一已存在的来源输出。
        en: Points to the SynthesisOutput newly produced by this activity rather than any pre-existing source output.
        ja: 既存の source output ではなく、この活動が新規生成した SynthesisOutput を指す。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      example_value: synthesis-output:61
    - id: selection_basis
      labels:
        zh: 选择与冲突依据
        en: Selection and conflict basis
        ja: 選択と競合の根拠
      definitions:
        zh: 记录计划如何排序来源、保留归因、处理冲突并决定产生、拒绝或升级输出。
        en: Records how the plan ordered sources, retained attribution, handled conflict, and decided to emit, reject, or escalate output.
        ja: plan が source をどう順序付け、attribution を保持し、conflict を処理し、出力を生成、却下、またはエスカレーションしたかを記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: retain-citations-and-escalate-unresolved-conflict
    - id: execution_binding_ref
      labels:
        zh: 执行绑定引用
        en: Execution binding reference
        ja: 実行バインディング参照
      definitions:
        zh: 指向实际图节点、应用函数或 SDK 运行，保留其来源 API 身份。
        en: Points to the actual graph node, application function, or SDK run while retaining its source-API identity.
        ja: 出所 API identity を保ったまま、実際の graph node、application function、または SDK run を指す。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: application:brief:synthesize-61
    - id: completion_disposition
      labels:
        zh: 完成处置
        en: Completion disposition
        ja: 完了処置
      definitions:
        zh: 记录综合已完成、因冲突拒绝、失败、取消或升级，而非隐藏不确定性。
        en: Records whether synthesis completed, was rejected for conflict, failed, cancelled, or escalated rather than hiding uncertainty.
        ja: 不確実性を隠さず、synthesis が完了、競合で却下、失敗、取消、またはエスカレーションしたかを記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      example_value: escalated
    - id: aggregation_activity_id
      labels: { zh: 归并活动标识, en: Aggregation-activity identifier, ja: 集約活動識別子 }
      definitions: { zh: 稳定标识该综合活动作为一次多输入归并运行的身份。, en: Stably identifies this synthesis activity in its role as a multi-input aggregation run., ja: この synthesis 活動を多入力集約実行として安定して識別する。 }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: synthesize-brief-61
    - id: input_artifact_refs
      labels: { zh: 封存输入工件引用, en: Sealed input artifact references, ja: 固定入力 artifact 参照 }
      definitions: { zh: 列出本次综合实际读取、可归因的全部输入工件。, en: Lists every attributable input artifact actually read by this synthesis aggregation., ja: この synthesis 集約で実際に読まれたすべての帰属可能な input artifact を列挙する。 }
      datatype: reference
      required: true
      cardinality: { min: 2, max: null }
      example_value: [artifact:legal-61, artifact:security-61]
    - id: aggregation_rule_ref
      labels: { zh: 实际归并规则引用, en: Actual aggregation-rule reference, ja: 実際の集約規則参照 }
      definitions: { zh: 指向本次综合实际应用的版本化 AggregationRule。, en: Points to the versioned AggregationRule actually applied by this synthesis run., ja: この synthesis 実行が実際に適用した版管理された AggregationRule を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: rule:synthesis-brief-v2
    - id: composition_activity_id
      labels: { zh: 组合活动标识, en: Composition-activity identifier, ja: 構成活動識別子 }
      definitions: { zh: 稳定标识该综合活动所实现的一次本地组合执行。, en: Stably identifies the local composition execution realized by this synthesis activity., ja: この synthesis 活動が実現するローカル構成実行を安定して識別する。 }
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: synthesize-brief-61
    - id: topology_ref
      labels: { zh: 实际拓扑引用, en: Actual topology reference, ja: 実際のトポロジー参照 }
      definitions: { zh: 指向本次综合实际执行的不可变 OrchestrationTopology 版本。, en: Points to the immutable OrchestrationTopology revision actually executed for this synthesis., ja: この synthesis で実際に実行された不変の OrchestrationTopology revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: topology-brief-synthesis-v2
    - id: pattern_ref
      labels: { zh: 实际模式引用, en: Actual pattern reference, ja: 実際のパターン参照 }
      definitions: { zh: 指向约束本次综合运行轨迹的本地 CompositionPattern 版本。, en: Points to the local CompositionPattern revision that constrains this synthesis run trace., ja: この synthesis 実行 trace を制約するローカル CompositionPattern revision を指す。 }
      datatype: reference
      required: true
      cardinality: { min: 1, max: 1 }
      example_value: pattern-synthesis-brief-v2
  constraints:
    - id: synthesis-activity-retains-input-plan-output-and-basis
      severity: error
      language: plain
      expression: A Synthesis activity must retain one synthesis_input_ref, one synthesis_plan_ref, at least two source_output_refs, one selection_basis, one execution_binding_ref, and one completion_disposition; completed or escalated synthesis must retain one synthesis_output_ref.
      explanation:
        zh: 该约束让每个综合结果都能说明使用了什么输入、按什么计划处理以及为何得出或升级该结果。
        en: This lets every synthesis result explain which inputs it used, which plan processed them, and why the result was produced or escalated.
        ja: これにより各 synthesis result が、使用入力、処理 plan、結果を生成またはエスカレーションした理由を説明できる。
      source_claims:
        - claim-synthesis-local
    - id: synthesis-activity-is-not-source-native-or-paper-layer
      severity: error
      language: plain
      expression: execution_binding_ref may cite a LangGraph node, Agents SDK manager run, or a paper-informed implementation, but Synthesis must remain a Moonweave local activity rather than a framework type, protocol type, or Mixture-of-Agents layer.
      explanation:
        zh: 框架 API 与论文方法提供实现或方法证据，不能替代本地输入、计划、归因和选择字段。
        en: Framework APIs and paper methods provide implementation or method evidence and cannot substitute for local input, plan, attribution, and selection fields.
        ja: フレームワーク API と論文手法は実装または手法の証拠を提供するだけで、ローカル input、plan、attribution、selection field を置き換えられない。
      source_claims:
        - claim-synthesis-langgraph
        - claim-synthesis-openai
        - claim-synthesis-moa
        - claim-synthesis-local
  required_relations: []
examples:
  - id: synthesis-positive-conflict-aware-brief
    labels:
      zh: Synthesis positive
      en: Synthesis positive
      ja: Synthesis positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 Synthesis 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes Synthesis programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy Synthesis: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {synthesis_activity_id: synthesize-brief-61, synthesis_input_ref: synthesis-input:61, synthesis_plan_ref: synthesis-plan:brief-v2}

    related_node_ids:
      - Synthesis
      - AggregationActivity
      - SynthesisInput
      - SynthesisPlan
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-is_a-AggregationActivity
      - Synthesis-consumes-SynthesisInput
      - Synthesis-governed_by-SynthesisPlan
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-synthesis-local

  - id: synthesis-counterexample-unattributed-summary
    labels:
      zh: Synthesis counterexample
      en: Synthesis counterexample
      ja: Synthesis counterexample
    descriptions:
      zh: 单路径线性推理（无多候选 generate_thoughts）不能作为 ToT 式 Synthesis；缺少 k>1 分支生成应拒绝。
      en: Single-path linear reasoning without multi-candidate generate_thoughts cannot classify as ToT-style Synthesis; missing k>1 branch generation should be rejected.
      ja: 単一路径のみは ToT 式 Synthesis として拒否。
    field_values: {synthesis_activity_id: summary-unknown, synthesis_input_ref: null, synthesis_plan_ref: null, source_output_refs: [], synthesis_output_ref: null, selection_basis: unspecified, execution_binding_ref: null, completion_disposition: unspecified}

    related_node_ids:
      - Synthesis
    related_relation_ids: []
    source_claims:
      - claim-synthesis-local

  - id: synthesis-boundary-moa-method
    labels:
      zh: Synthesis boundary
      en: Synthesis boundary
      ja: Synthesis boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 Synthesis 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not Synthesis work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で Synthesis work_specification ではない。
    field_values: {synthesis_activity_id: synthesize-layered-19, synthesis_input_ref: synthesis-input:19, synthesis_plan_ref: synthesis-plan:layered-v1}

    related_node_ids:
      - Synthesis
      - SynthesisPlan
      - SynthesisPattern
    related_relation_ids:
      - Synthesis-governed_by-SynthesisPlan
      - Synthesis-realizes-SynthesisPattern
    source_claims:
      - claim-synthesis-moa
      - claim-synthesis-local

  - id: synthesis-instance-manager-specialist-brief
    labels:
      zh: Synthesis instance
      en: Synthesis instance
      ja: Synthesis instance
    descriptions:
      zh: DSPy 实例：teleprompter = BootstrapFewShotWithRandomSearch(metric=answer_exact_match) → compiled_rag = teleprompter.compile(RAG()) → 映射 Synthesis。
      en: DSPy instance: BootstrapFewShotWithRandomSearch → teleprompter.compile(RAG()) → maps to Synthesis.
      ja: DSPy 实例 BootstrapFewShot→compile(RAG) が Synthesis に写像。
    field_values: {synthesis_activity_id: synthesize-release-90, synthesis_input_ref: synthesis-input:release-90, synthesis_plan_ref: synthesis-plan:release-brief-v3}

    related_node_ids:
      - Synthesis
      - SynthesisInput
      - SynthesisOutput
      - SynthesisPlan
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
      - Synthesis-governed_by-SynthesisPlan
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-synthesis-openai
      - claim-synthesis-local

parent_relation:
  id: Synthesis-is_a-AggregationActivity
  predicate: is_a
  target: concept:AggregationActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是归并活动
    en: is an aggregation activity
    ja: 集約活動である
  definition:
    zh: Synthesis 继承 AggregationActivity 的多输入归并角色，并特化为按计划保留归因和处理冲突以产生新综合输出。
    en: Synthesis inherits AggregationActivity's multi-input aggregation role and specializes it for plan-governed attribution retention and conflict handling that produces a new synthesis output.
    ja: Synthesis は AggregationActivity の多入力集約役割を継承し、plan-governed な attribution 保持と conflict handling で新しい synthesis output を生成するために特化する。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  inverse_reading:
    predicate: has_synthesis_activity
    labels:
      zh: 具有综合活动
      en: has synthesis activity
      ja: 統合活動を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy is a Moonweave local taxonomy and does not define a LangGraph, Agents SDK, A2A, MCP, or paper-method subtype.
  constraints: []
  examples: []
  source_claims:
    - claim-synthesis-local
  distinct_fact_rationale:
    zh: 层级说明综合是多输入归并的一种；它不说明某个输入、计划或输出是否已在具体运行中发生关联。
    en: The hierarchy says synthesis is one kind of multi-input aggregation; it does not state whether a particular input, plan, or output was linked in a concrete run.
    ja: 階層は synthesis が多入力 aggregation の一種であることを示し、特定の input、plan、output が具体的 run で結び付いたかは示さない。
relations:
  - id: Synthesis-consumes-SynthesisInput
    predicate: consumes
    target: concept:SynthesisInput
    endpoint_order: activity-to-input
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 消费综合输入
      en: consumes synthesis input
      ja: 統合入力を消費する
    definition:
      zh: 一次 Synthesis 消费其实际读取的 SynthesisInput，以固定输入契约、范围和来源集合。
      en: A Synthesis consumes the SynthesisInput it actually reads, fixing the input contract, scope, and source set.
      ja: Synthesis は実際に読む SynthesisInput を consume し、input contract、scope、source set を固定する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_consumed_by_synthesis
      labels:
        zh: 被综合活动消费
        en: is consumed by synthesis activity
        ja: 統合活動に消費される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave run-input association, not an SDK input object or framework message type.
    constraints: []
    examples: []
    source_claims:
      - claim-synthesis-local
    distinct_fact_rationale:
      zh: 该关系锁定本次运行的输入集合，而不说明输入如何被排序或冲突如何处理。
      en: This relation locks the run's input set without stating how inputs were ordered or conflicts handled.
      ja: この関係は run の input set を固定し、入力の順序付けや conflict handling は示さない。
    layout_role: cross-link
  - id: Synthesis-governed_by-SynthesisPlan
    predicate: governed_by
    target: concept:SynthesisPlan
    endpoint_order: activity-to-plan
    direction: source-to-target
    relation_kind: cross-link
    labels:
      zh: 受综合计划约束
      en: is governed by synthesis plan
      ja: 統合計画に統治される
    definition:
      zh: 一次 Synthesis 关联到实际应用的版本化 SynthesisPlan，该计划解释输入排序、归因、冲突和输出接受政策。
      en: A Synthesis is associated with the versioned SynthesisPlan actually applied, which explains input order, attribution, conflict handling, and output acceptance policy.
      ja: Synthesis は実際に適用した版管理された SynthesisPlan と関連し、その plan が input order、attribution、conflict handling、output acceptance policy を説明する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: governs_synthesis_activity
      labels:
        zh: 约束综合活动
        en: governs synthesis activity
        ja: 統合活動を統治する
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave occurrence-to-plan association, not a model prompt, graph node, or manager configuration type.
    constraints: []
    examples: []
    source_claims:
      - claim-synthesis-local
    distinct_fact_rationale:
      zh: 该关系说明本次运行采用何种综合政策，而不说明它消费了哪些具体来源或产生了什么输出。
      en: This relation states which synthesis policy the run used, not which concrete sources it consumed or output it produced.
      ja: この関係は run が用いた synthesis policy を示し、consume した具体 source や produce した output は示さない。
    layout_role: cross-link
  - id: Synthesis-produces-SynthesisOutput
    predicate: produces
    target: concept:SynthesisOutput
    endpoint_order: activity-to-output
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生综合输出
      en: produces synthesis output
      ja: 統合出力を生成する
    definition:
      zh: 一次 Synthesis 产生新的 SynthesisOutput，后者保留生成者、计划、来源归因和处置结果。
      en: A Synthesis produces a new SynthesisOutput that retains its producer, plan, source attribution, and disposition.
      ja: Synthesis は producer、plan、source attribution、disposition を保持する新しい SynthesisOutput を produce する。
    cardinality:
      source:
        min: 0
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_produced_by_synthesis
      labels:
        zh: 由综合活动产生
        en: is produced by synthesis activity
        ja: 統合活動によって生成される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This relation points to a new local result record, not to a pre-existing source output merely selected for reuse.
    constraints: []
    examples: []
    source_claims:
      - claim-synthesis-local
    distinct_fact_rationale:
      zh: 该关系记录新输出的产出；选择一个已有来源作为引用与产生新的综合记录是不同事实。
      en: This relation records production of a new output; selecting an existing source for citation is a different fact.
      ja: この関係は新 output の production を記録し、既存 source を citation 用に選ぶこととは別の fact である。
    layout_role: cross-link
  - id: Synthesis-realizes-SynthesisPattern
    predicate: realizes
    target: concept:SynthesisPattern
    endpoint_order: activity-to-pattern
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 实现综合模式
      en: realizes synthesis pattern
      ja: 統合パターンを実現する
    definition:
      zh: 当一次 Synthesis 的来源处理、归因、冲突处置和完成条件满足某本地 SynthesisPattern 修订时，该活动实现该模式。
      en: A Synthesis realizes a local SynthesisPattern revision when its source handling, attribution, conflict disposition, and completion condition satisfy that revision.
      ja: Synthesis は source handling、attribution、conflict disposition、完了条件がローカル SynthesisPattern revision を満たすとき、その pattern を実現する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_realized_by_synthesis
      labels:
        zh: 由综合活动实现
        en: is realized by synthesis activity
        ja: 統合活動によって実現される
    conditions: []
    temporal_scope: valid-time
    boundary_context: This is a Moonweave conformance association, not a source-native graph workflow or paper-layer classification.
    constraints: []
    examples: []
    source_claims:
      - claim-synthesis-local
      - claim-synthesis-moa
    distinct_fact_rationale:
      zh: 该关系验证运行符合本地模式，而“受计划约束”只记录采用的处理政策。
      en: This relation verifies conformance to a local pattern, whereas governed_by only records the processing policy applied.
      ja: この関係はローカル pattern への conformance を検証し、governed_by は適用した processing policy を記録するだけである。
    layout_role: cross-link
