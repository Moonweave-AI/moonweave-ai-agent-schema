    source: langgraph-workflows
    supports: LangGraph documents workflows that coordinate multiple steps and use later nodes to process prior results.
    locator: Workflows and agents overview
    evidence_kind: normative
    confidence: high
  - id: claim-synthesis-openai
    source: openai-agents-orchestration
    supports: The OpenAI Agents SDK documents manager-style and code-driven multi-agent orchestration.
    locator: Multi-agent orchestration overview
    evidence_kind: normative
    confidence: high
  - id: claim-synthesis-moa
    source: mixture-of-agents-paper
    supports: Mixture-of-Agents describes using outputs from earlier agent layers as auxiliary information for later layers.
    locator: Abstract
    evidence_kind: empirical
    confidence: high
  - id: claim-synthesis-local
    source: mixture-of-agents-paper
    supports: Synthesis fields, hierarchy, plans, and relationships are Moonweave local composition semantics; neither the paper nor framework documentation defines this local schema.
    locator: Abstract
    evidence_kind: design-inference
    confidence: high
