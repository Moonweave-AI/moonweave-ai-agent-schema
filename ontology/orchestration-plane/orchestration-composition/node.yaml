schema: moonweave.ai/ontology-node/v1
id: orchestration-composition
kind: module
labels:
  zh: 组合结构与汇聚活动
  en: Composition structures and aggregation activities
  ja: 構成構造と集約活動
semantics:
  short_definition:
    zh: 组合结构描述多个步骤如何按可复用拓扑协同，以及一次运行怎样把多个输入汇聚成结果。
    en: Composition structure describes how multiple steps cooperate through reusable topology and how one run aggregates multiple inputs into a result.
    ja: 構成構造は、複数段階が再利用可能な topology で協働する方法と、一回の実行が複数入力を結果へ集約する方法を表します。
  definition:
    zh: 本模块区分“结构规定”与“活动发生”：CompositionSpecification（OrchestrationTopology、CompositionPattern、CompositionPart、AggregationRule）是可版本化规范；CompositionActivity（Parallelization、VotingActivity、Synthesis 等）是有起止时间的发生，二者通过 uses_topology/realizes 连接，不能 is_a 混类。SynthesisInput、VoteBallot、CompositionOutput 描述产物在一次组合中的角色；持久 Artifact 身份仍由 runtime-artifacts 拥有。LangGraph Send 并行分支、CrewAI Process.sequential/parallel、LangChain MapReduce 与 best-of-N 是常见工程映射。
    en: "This module separates structural prescription from occurring activity: CompositionSpecification (OrchestrationTopology, CompositionPattern, CompositionPart, AggregationRule) is versioned specification; CompositionActivity (Parallelization, VotingActivity, Synthesis, etc.) is time-bounded occurrence, connected via uses_topology/realizes, never is_a conflation. SynthesisInput, VoteBallot, and CompositionOutput describe artifact roles in one composition; persistent Artifact identity remains runtime-artifacts owned. LangGraph Send parallel branches, CrewAI Process.sequential/parallel, LangChain MapReduce, and best-of-N are common engineering mappings."
    ja: 本モジュールは構造規定と活動発生を分離します。CompositionSpecification は版管理仕様、CompositionActivity は時間境界付き発生で uses_topology/realizes で接続し is_a 混同不可です。SynthesisInput・VoteBallot・CompositionOutput は一回の構成での成果物役割を表し、永続 Artifact identity は runtime-artifacts が所有します。LangGraph Send 並列 branch、CrewAI Process、LangChain MapReduce、best-of-N が一般的な写像です。
  why_needed:
    zh: 团队需要既能在运行前画出“链式、并行、投票、合并”结构，又能在事后证明某次运行实际用了哪版拓扑、哪些输入、哪条聚合规则。
    en: Teams need to draw chain, parallel, voting, and merge structures before runtime and later prove which topology revision, inputs, and aggregation rule one run actually used.
    ja: チームは実行前に chain・parallel・voting・merge 構造を描き、事後にどの topology 版・入力・aggregation rule を実際に使ったか証明する必要があります。
  includes:
    - zh: 可复用 CompositionSpecification：CompositionPattern、OrchestrationTopology、CompositionPart（ChainStage、ParallelBranch、SectionAssignment）、AggregationRule（VotingRule、MergeRule）、SynthesisPlan。
      en: "Reusable CompositionSpecification: CompositionPattern, OrchestrationTopology, CompositionPart (ChainStage, ParallelBranch, SectionAssignment), AggregationRule (VotingRule, MergeRule), SynthesisPlan."
      ja: 再利用 CompositionSpecification：CompositionPattern、OrchestrationTopology、CompositionPart、AggregationRule、SynthesisPlan。
    - zh: 实际 CompositionActivity 及并行、投票、合并、综合专门类型；活动引用所执行的确切拓扑与规则版本。
      en: Occurring CompositionActivities and parallel, voting, merging, and synthesis specializations; each activity references the exact topology and rule revisions it executes.
      ja: 実際の CompositionActivity と並列・投票・併合・統合特殊型。各活動は実行する正確な topology と rule 版を参照します。
    - zh: 运行产物在组合活动中的 SynthesisInput、VoteBallot、CompositionOutput 角色及 consumes/produces 关系。
      en: SynthesisInput, VoteBallot, and CompositionOutput roles played by runtime artifacts in a composition activity with consumes/produces relations.
      ja: 構成活動での SynthesisInput・VoteBallot・CompositionOutput 役割と consumes/produces 関係。
  excludes:
    - zh: "Artifact 持久身份、版本、摘要与存储（owner: runtime-artifacts）；本模块只声明一次组合中的角色。"
      en: "Persistent Artifact identity, revision, digest, and storage (owner: runtime-artifacts); this module states only roles in one composition."
      ja: "Artifact 永続 identity・版・digest・保存（owner: runtime-artifacts）。本モジュールは一回の構成での役割のみ示します。"
    - zh: "RoutingDecision、Route 与运行时分支选择（owner: orchestration-routing-control）；拓扑边是结构，路由是状态代入后的选择。"
      en: "RoutingDecision, Route, and runtime branch selection (owner: orchestration-routing-control); topology edges are structure, routing is selection after state substitution."
      ja: "RoutingDecision・Route・runtime 分岐選択（owner: orchestration-routing-control）。topology 辺は構造、routing は状態代入後の選択です。"
    - zh: "TaskPlan 目标与步骤（owner: orchestration-task-planning）；拓扑实现工作结构，不拥有任务规格。"
      en: "TaskPlan goals and steps (owner: orchestration-task-planning); topology realizes work structure without owning task specifications."
      ja: "TaskPlan goal と step（owner: orchestration-task-planning）。topology は作業構造を実現し task 仕様を所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 LangGraph StateGraph 的 Send API 动态并行分支与 fan-in、CrewAI Process.sequential/Process.parallel 的顺序与并行 crew 执行、LangChain MapReduceDocumentsChain 的 map-reduce 综合、以及 best-of-N 并行采样后选优。compiled graph 边与 OrchestrationTopology 是规范；一次 CompositionActivity、Send 派发或 MapReduce invoke 是发生事实。parallel superstep 完成后的 reducer 对应 AggregationRule 应用，但不把 static edge 误报为已执行并行。
    en: "Integrations should map LangGraph StateGraph Send API dynamic parallel branches and fan-in, CrewAI Process.sequential/Process.parallel sequential and parallel crew execution, LangChain MapReduceDocumentsChain map-reduce synthesis, and best-of-N parallel sampling with selection separately. Compiled graph edges and OrchestrationTopology are specifications; one CompositionActivity, Send dispatch, or MapReduce invoke is an occurrence. Post-superstep reducers correspond to AggregationRule application, but static edges must not be misreported as executed parallelism."
    ja: 統合では LangGraph Send 動的並列 branch と fan-in、CrewAI Process.sequential/parallel、LangChain MapReduce、best-of-N を個別に写像します。compiled graph edge と OrchestrationTopology は仕様、CompositionActivity・Send dispatch・MapReduce invoke は発生事実です。superstep 後 reducer は AggregationRule 適用に対応しますが static edge を実行済み parallel と誤報しません。
  typical_input:
    - description: LangGraph Send API fan-out to parallel worker nodes with fan-in reducer.
      format: |
        from langgraph.types import Send

        def dispatch_workers(state):
            return [Send("worker", {"item": item}) for item in state["items"]]

        def reduce_results(state):
            return {"merged": combine(state["worker_outputs"])}

        builder.add_conditional_edges("plan", dispatch_workers)
        builder.add_node("worker", worker_node)
        builder.add_node("reduce", reduce_results)
      source_claims: [claim-orchestration-composition-langgraph]
    - description: CrewAI Process.sequential and Process.parallel crew execution.
      format: |
        from crewai import Crew, Process

        crew = Crew(
            agents=[researcher, writer],
            tasks=[research_task, write_task],
            process=Process.sequential,  # or Process.parallel
        )
        crew.kickoff()
      source_claims: [claim-orchestration-composition-crewai]
    - description: LangChain MapReduceDocumentsChain for map-then-reduce document synthesis.
      format: |
        from langchain.chains import MapReduceDocumentsChain, LLMChain, StuffDocumentsChain

        map_chain = LLMChain(llm=llm, prompt=map_prompt)
        reduce_chain = LLMChain(llm=llm, prompt=reduce_prompt)
        combine_chain = StuffDocumentsChain(llm_chain=reduce_chain)
        chain = MapReduceDocumentsChain(
            llm_chain=map_chain,
            reduce_documents_chain=combine_chain,
        )
      source_claims: [claim-orchestration-composition-langchain]
    - description: Best-of-N parallel attempts with selection by score or vote.
      format: |
        import asyncio

        async def best_of_n(prompt, n=3):
            candidates = await asyncio.gather(*[generate(prompt) for _ in range(n)])
            return max(candidates, key=score)
      source_claims: [claim-orchestration-composition-design]
  typical_output:
    - description: Moonweave-local composition activity with frozen topology, pattern, inputs, rule, and output.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "composition_activity_id": "composition-run-204",
          "topology_ref": "report-topology@11",
          "realized_pattern_ref": "prompt-chain@4",
          "aggregation_rule_ref": "evidence-priority@2",
          "input_digests": ["sha256:draft-report-8", "sha256:citation-pack-5"],
          "output_ref": "final-report@9"
        }
      source_claims: [claim-orchestration-composition-design]
  reference_implementations:
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: StateGraph, Send API, parallel supersteps, fan-in reducers.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Process.sequential, Process.parallel crew composition.
    - name: LangChain
      url: https://python.langchain.com/docs/
      description: MapReduceDocumentsChain and map-reduce synthesis patterns.
    - name: Anthropic workflow patterns
      url: https://docs.anthropic.com/en/docs/build-with-claude/workflow-patterns
      description: Prompt chaining, parallelization, orchestrator-worker, best-of-N.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 组合结构模块的稳定标识，不是某次 CompositionActivity 的标识。
        en: Stable identifier of the composition module, not a CompositionActivity identifier.
        ja: 構成モジュールの安定識別子であり、CompositionActivity の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-composition$'
      example_value: orchestration-composition
      allowed_values: []
      source_claims: [claim-orchestration-composition-design]
    - id: specification_occurrence_boundary
      labels: {zh: 规范/发生边界, en: Specification/occurrence boundary, ja: 仕様／発生境界}
      definitions:
        zh: 声明 OrchestrationTopology/CompositionPattern 为可复用规范，CompositionActivity 为一次运行发生事实。
        en: States that OrchestrationTopology and CompositionPattern are reusable specifications while CompositionActivity is a run occurrence.
        ja: OrchestrationTopology・CompositionPattern は再利用仕様、CompositionActivity は一回の実行発生事実であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: spec-vs-activity
      allowed_values: [spec-vs-activity]
      source_claims: [claim-orchestration-composition-design]
  constraints:
    - id: composition-activity-requires-topology-ref
      severity: error
      expression_language: plain
      expression: CompositionActivity must record an immutable topology_ref via CompositionActivity-uses_topology-OrchestrationTopology; latest aliases or pattern name strings alone are insufficient.
      explanation:
        zh: 可变别名不能充当不可变运行引用。
        en: A mutable alias cannot serve as an immutable run reference.
        ja: 可変 alias は immutable run reference になれません。
      source_claims: [claim-orchestration-composition-langgraph, claim-orchestration-composition-design]
    - id: topology-membership-via-explicit-facts
      severity: error
      expression_language: plain
      expression: ChainStage, ParallelBranch, and SectionAssignment membership must be reached through explicit contains/specifies facts with matching topology revision; visual community proximity is insufficient.
      explanation:
        zh: 图布局不能证明拓扑成员身份。
        en: Graph layout does not prove topology membership.
        ja: グラフ配置は topology membership を証明しません。
      source_claims: [claim-orchestration-composition-design]
    - id: voting-inputs-same-occurrence-recomputable
      severity: warning
      expression_language: plain
      expression: VotingActivity must consume VoteBallots from the same occurrence with fixed digests and a versioned AggregationRule such that CompositionOutput is recomputable from inputs.
      explanation:
        zh: 跨轮选票或无版本规则破坏可审计计票。
        en: Cross-round ballots or unversioned rules corrupt auditable tallying.
        ja: cross-round ballot や version 未指定 rule は監査可能集計を壊します。
      source_claims: [claim-orchestration-composition-design]
  required_relations:
    - id: composition-module-organizes-composition-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: CompositionSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 CompositionSpecification 规范链（Topology→Pattern→Part）。
        en: The module organizes at least one CompositionSpecification chain (Topology→Pattern→Part).
        ja: モジュールは少なくとも一つの CompositionSpecification 連鎖（Topology→Pattern→Part）を組織します。
      source_claims: [claim-orchestration-composition-design]
    - id: composition-module-records-composition-activity
      direction: outgoing
      predicate: records
      target_concept_id: CompositionActivity
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块通过 CompositionActivity 记录实际组合/聚合发生，而不把 Topology 本身当作活动。
        en: The module records actual composition or aggregation occurrences through CompositionActivity rather than treating Topology itself as an activity.
        ja: モジュールは Topology 自体を activity とせず、CompositionActivity を通じ実際の構成・集約発生を記録します。
      source_claims: [claim-orchestration-composition-design]
examples:
  - id: orchestration-composition-example-langgraph-send-parallel
    labels:
      zh: LangGraph Send 并行分支与 fan-in
      en: LangGraph Send parallel branches and fan-in
      ja: LangGraph Send 並列 branch と fan-in
    descriptions:
      zh: "plan 节点通过 Send(\"worker\", {\"item\": item}) 向三个 worker 分支 fan-out；CompositionActivity composition-run-204 锁定 report-topology@11（含 Parallelization 与两 ParallelBranch），reduce 节点应用 evidence-priority@2 后产生 final-report@9。"
      en: "The plan node fan-outs via Send(\"worker\", {\"item\": item}) to three worker branches; CompositionActivity composition-run-204 locks report-topology@11 (with Parallelization and two ParallelBranches), and the reduce node applies evidence-priority@2 to produce final-report@9."
      ja: plan ノードが Send で三 worker branch に fan-out し、CompositionActivity composition-run-204 は report-topology@11 を固定し、reduce ノードが evidence-priority@2 を適用して final-report@9 を生成します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 — Send API and parallel supersteps
    field_values:
      framework: langgraph
      dispatch_node: plan
      send_targets:
        - worker
      parallel_branch_count: 3
      composition_activity_id: composition-run-204
      topology_ref: report-topology@11
      realized_pattern_ref: parallelization@2
      aggregation_rule_ref: evidence-priority@2
      output_ref: final-report@9
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - Parallelization
      - ParallelBranch
      - AggregationRule
      - SynthesisOutput
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-orchestration-composition-langgraph
      - claim-orchestration-composition-design
  - id: orchestration-composition-example-crewai-parallel-process
    labels:
      zh: CrewAI Process.parallel 并行任务
      en: CrewAI Process.parallel parallel tasks
      ja: CrewAI Process.parallel 並列タスク
    descriptions:
      zh: Crew 使用 Process.parallel 同时执行 research_task 与 analysis_task；CompositionActivity composition-crew-31 实现 parallelization@1，两 ParallelBranch 分别引用 researcher 与 analyst 节点，汇合后由 writer 综合。
      en: A crew with Process.parallel runs research_task and analysis_task concurrently; CompositionActivity composition-crew-31 realizes parallelization@1 with two ParallelBranches referencing researcher and analyst nodes, then writer synthesizes after join.
      ja: Process.parallel crew が research_task と analysis_task を同時実行し、CompositionActivity composition-crew-31 は parallelization@1 を実現し二 ParallelBranch が researcher と analyst を参照、join 後 writer が統合します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: v1.15 — Process.parallel
    field_values:
      framework: crewai
      process: parallel
      parallel_tasks:
        - research_task
        - analysis_task
      synthesis_task: write_task
      composition_activity_id: composition-crew-31
      topology_ref: crew-parallel-topology@3
      parallel_branch_refs:
        - branch-research@1
        - branch-analysis@1
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - Parallelization
      - ParallelBranch
      - PromptChain
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - OrchestrationTopology-contains-CompositionPart
    source_claims:
      - claim-orchestration-composition-crewai
      - claim-orchestration-composition-design
  - id: orchestration-composition-example-langchain-mapreduce
    labels:
      zh: LangChain MapReduce 文档综合
      en: LangChain MapReduce document synthesis
      ja: LangChain MapReduce 文書統合
    descriptions:
      zh: MapReduceDocumentsChain 对三份文档 map 后 reduce；Synthesis synthesis-run-31 实现 evidence-merge@3，消费 draft-report@8 与 citation-pack@5 固定 digest，应用 conflict-preserving@2 产生 final-report@9。
      en: MapReduceDocumentsChain maps three documents then reduces; Synthesis synthesis-run-31 realizes evidence-merge@3, consumes fixed digests of draft-report@8 and citation-pack@5, applies conflict-preserving@2, and produces final-report@9.
      ja: MapReduceDocumentsChain が三文書を map 後 reduce し、Synthesis synthesis-run-31 は evidence-merge@3 を実現、draft-report@8 と citation-pack@5 の固定 digest を消費し conflict-preserving@2 を適用して final-report@9 を生成します。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/
      version: MapReduceDocumentsChain — map then reduce
    field_values:
      framework: langchain
      map_document_count: 3
      composition_activity_id: synthesis-run-31
      synthesis_pattern_ref: evidence-merge@3
      input_refs:
        - draft-report@8
        - citation-pack@5
      input_digests:
        - sha256:draft-report-8
        - sha256:citation-pack-5
      aggregation_rule_ref: conflict-preserving@2
      output_ref: final-report@9
    related_node_ids:
      - Synthesis
      - SynthesisPattern
      - SynthesisInput
      - AggregationRule
      - SynthesisOutput
    related_relation_ids:
      - Synthesis-realizes-SynthesisPattern
      - Synthesis-consumes-SynthesisInput
      - AggregationActivity-applies-AggregationRule
      - Synthesis-produces-SynthesisOutput
    source_claims:
      - claim-orchestration-composition-langchain
      - claim-orchestration-composition-design
  - id: orchestration-composition-example-best-of-n-voting
    labels:
      zh: best-of-N 并行采样与 Borda 投票
      en: best-of-N parallel sampling with Borda voting
      ja: best-of-N 並列サンプリングと Borda 投票
    descriptions:
      zh: 三并行分支各生成一候选答案形成 VoteBallot；VotingActivity vote-run-18 实现 regime-borda@2，消费三张 digest 固定选票，应用 borda-count@4，产生 vote-result-18 与完整 score breakdown。
      en: Three parallel branches each produce a candidate answer forming VoteBallot; VotingActivity vote-run-18 realizes regime-borda@2, consumes three digest-fixed ballots, applies borda-count@4, and produces vote-result-18 with a complete score breakdown.
      ja: 三並列 branch が各候補回答を生成し VoteBallot を形成。VotingActivity vote-run-18 は regime-borda@2 を実現し三票の固定 digest を消費、borda-count@4 を適用し vote-result-18 と score breakdown を生成します。
    example_source:
      product: Anthropic workflow patterns
      url: https://docs.anthropic.com/en/docs/build-with-claude/workflow-patterns
      version: Parallelization and best-of-N selection
    field_values:
      framework: best-of-n
      parallel_attempt_count: 3
      composition_activity_id: vote-run-18
      voting_regime_ref: regime-borda@2
      ballot_refs:
        - ballot-a@1
        - ballot-b@1
        - ballot-c@1
      aggregation_rule_ref: borda-count@4
      composition_output_ref: vote-result-18@1
      score_breakdown:
        candidate-x: 7
        candidate-y: 5
        candidate-z: 3
    related_node_ids:
      - VotingActivity
      - Voting
      - VoteBallot
      - AggregationRule
      - CompositionOutput
    related_relation_ids:
      - VotingActivity-realizes-Voting
      - VotingActivity-consumes-VoteBallot
      - AggregationActivity-applies-AggregationRule
      - VotingActivity-produces-CompositionOutput
    source_claims:
      - claim-orchestration-composition-design
  - id: orchestration-composition-example-topology-version-counter
    labels:
      zh: latest 别名不得证明实际执行版本
      en: latest alias must not prove executed revision
      ja: latest alias で実行 revision を証明してはならない
    descriptions:
      zh: composition-run-205 只保存 topology=latest 与 pattern=prompt-chain 字符串；开始后 latest 从 report-topology@11 漂移到 @12，且无 realizes/applies 事实；不得断言使用了 revision 11 或 12。
      en: composition-run-205 stores only topology=latest and pattern=prompt-chain strings; after start latest drifts from report-topology@11 to @12 with no realizes/applies facts; neither revision 11 nor 12 may be asserted.
      ja: composition-run-205 は topology=latest と pattern 文字列のみ保存し、開始後 latest が @11 から @12 に drift、realizes/applies 事実なし。revision 11/12 を断言できません。
    example_source:
      product: Moonweave composition boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: topology version evidence contract
    field_values:
      composition_activity_id: composition-run-205
      topology_ref: latest
      topology_at_start: report-topology@11
      topology_at_query: report-topology@12
      pattern_value: prompt-chain
      realizes_fact_present: false
      applies_fact_present: false
      revision_assertion_valid: false
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
      - AggregationRule
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-orchestration-composition-design
