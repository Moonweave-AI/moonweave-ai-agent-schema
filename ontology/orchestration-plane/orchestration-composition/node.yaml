schema: moonweave.ai/ontology-node/v1
id: orchestration-composition
kind: module
labels:
  zh: 组合结构与汇聚活动
  en: Composition structures and aggregation activities
  ja: 構成構造と集約活動
semantics:
  short_definition:
    zh: 规定可复用的组合结构（模式、拓扑、部件、聚合规则），并记录一次运行中实际发生的并行、投票、合并或综合活动。
    en: Prescribes reusable composition structures (patterns, topologies, parts, aggregation rules) and records occurring parallel, voting, merge, or synthesis activities in one run.
    ja: 再利用可能な構成構造（pattern、topology、part、aggregation rule）を規定し、一回の実行で実際に起きた並列・投票・併合・統合活動を記録します。
  definition:
    zh: orchestration-composition 区分规范与发生两层。CompositionSpecification 及其子类（CompositionPattern、OrchestrationTopology、CompositionPart、AggregationRule、SynthesisPlan、CompositionConfiguration）描述运行前可版本化的结构；CompositionActivity 及其 AggregationActivity、Synthesis、VotingActivity 描述已发生的组合执行。规范与活动只能通过 uses_topology、realizes、applies、consumes、produces 等关系连接，不能互作 is_a。VoteBallot 是独立输入实体；CompositionArtifact 及其子类描述组合上下文中的工件角色，持久 artifact 身份仍由 runtime-artifacts 拥有。
    en: orchestration-composition separates specification from occurrence. CompositionSpecification and its subtypes describe versioned pre-runtime structure; CompositionActivity and its specializations describe composition executions that occurred. Specifications and activities connect only through uses_topology, realizes, applies, consumes, and produces—not is_a. VoteBallot is an independent input entity; CompositionArtifact subtypes describe artifact roles in one composition while persistent artifact identity remains runtime-artifact owned.
    ja: orchestration-composition は specification と occurrence を分離します。CompositionSpecification とその subtype は実行前の版管理構造、CompositionActivity とその特殊型は発生した構成実行を表します。仕様と活動は uses_topology、realizes、applies、consumes、produces のみで接続し is_a では接続しません。VoteBallot は独立入力 entity、CompositionArtifact subtype は一回の構成での artifact 役割を表します。
  why_needed:
    zh: 没有这层，系统会把 LangGraph 图结构、一次 map-reduce 运行和最终 artifact 混为同一对象，无法审计某次聚合实际用了哪版拓扑与规则。
    en: Without this layer, LangGraph graph structure, one map-reduce run, and a final artifact collapse into one object, making it impossible to audit which topology and rule revision one aggregation actually used.
    ja: この層がないと LangGraph 構造、一回の map-reduce 実行、最終 artifact が同一オブジェクトに混ざり、どの topology/rule revision が使われたか監査できません。
  includes:
    - zh: 可版本化的 CompositionSpecification、OrchestrationTopology、CompositionPattern、CompositionPart、AggregationRule、SynthesisPlan 与 CompositionConfiguration。
      en: Versioned CompositionSpecification, OrchestrationTopology, CompositionPattern, CompositionPart, AggregationRule, SynthesisPlan, and CompositionConfiguration.
      ja: 版管理可能な CompositionSpecification、OrchestrationTopology、CompositionPattern、CompositionPart、AggregationRule、SynthesisPlan、CompositionConfiguration。
    - zh: 已发生的 CompositionActivity 及并行、投票、合并、综合专门类型，并引用实际 topology_ref 与 rule revision。
      en: Occurred CompositionActivity and parallel, voting, merge, and synthesis specializations referencing actual topology_ref and rule revisions.
      ja: 発生済み CompositionActivity と並列・投票・併合・統合の特殊型、実際の topology_ref と rule revision を参照。
    - zh: VoteBallot、SynthesisInput、CompositionOutput、SynthesisOutput 等组合上下文角色及 consumes/produces 关系。
      en: VoteBallot, SynthesisInput, CompositionOutput, SynthesisOutput roles and consumes/produces relations.
      ja: VoteBallot、SynthesisInput、CompositionOutput、SynthesisOutput 役割と consumes/produces 関係。
  excludes:
    - zh: 路由决定、任务目标、RunAttempt、通用日志，以及把 LangGraph Node/Reducer 直接当作 Moonweave 类型。
      en: Routing decisions, task goals, RunAttempt, generic logs, and treating LangGraph Node/Reducer directly as Moonweave types.
      ja: routing decision、task goal、RunAttempt、generic log、LangGraph Node/Reducer を Moonweave 型として直接扱うこと。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 实现时先发布 CompositionSpecification 族（LangGraph 工作流模式对应 prompt chaining、parallelization、orchestrator-worker sectioning、voting、synthesis），再在运行边界创建 CompositionActivity 本地记录，封存 topology_ref、pattern_ref、input/output artifact refs 与 execution_binding_ref。LangGraph Send/map-reduce 与 OpenAI Agents SDK 并行 Agent 结果只作为 binding 来源，不重命名为 CompositionActivity。
    en: Publish CompositionSpecification families first (LangGraph workflow patterns for prompt chaining, parallelization, orchestrator-worker sectioning, voting, synthesis), then create local CompositionActivity records at run boundaries sealing topology_ref, pattern_ref, input/output artifact refs, and execution_binding_ref. LangGraph Send/map-reduce and OpenAI Agents SDK parallel Agent results remain binding sources and are not renamed as CompositionActivity.
    ja: 先に CompositionSpecification 族を公開し（LangGraph workflow pattern に対応）、実行境界で CompositionActivity ローカル記録を作成して topology_ref、pattern_ref、input/output artifact refs、execution_binding_ref を固定します。LangGraph Send/map-reduce と OpenAI Agents SDK の並列 Agent 結果は binding 出所のままにします。
  typical_input:
    - description: LangGraph compiled graph invocation with parallel branches
      format: |-
        final_state = graph.invoke({"request_id": "req-42"})
        # adapter records CompositionActivity with topology_ref and branch digests
    - description: Agents SDK parallel specialist runs aggregated locally
      format: |-
        runs = await asyncio.gather(Runner.run(a, req), Runner.run(b, req))
        # adapter creates AggregationActivity with rule_ref and ballot/input refs
  typical_output:
    - description: Local composition activity record bound to one run
      format: |-
        {"composition_activity_id":"run-204","topology_ref":"topology-report@11","pattern_ref":"prompt-chain@4","execution_binding_ref":"langgraph:run:204","completion_disposition":"completed"}
  reference_implementations:
    - name: LangGraph workflow patterns
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents prompt chaining, parallelization, orchestrator-worker, and aggregation patterns.
    - name: LangGraph Graph API
      url: https://docs.langchain.com/oss/python/langgraph/graph-api
      description: Documents StateGraph nodes, edges, reducers, Send, and invocation.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates Plans/Entities from Activities and usage/generation provenance.
  source_claims:
    - claim-orchestration-composition-module
    - claim-orchestration-composition-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识组合结构与汇聚活动模块。
        en: Stably identifies the composition structures and aggregation activities module.
        ja: 構成構造と集約活動モジュールを安定して識別します。
      allowed_values: [orchestration-composition]
      example_value: orchestration-composition
      source_claims: [claim-orchestration-composition-module]
    - id: specification_roots
      labels:
        zh: 规范根概念
        en: specification root concepts
        ja: 仕様根概念
      datatype: array[string]
      required: true
      cardinality: {min: 2, max: null}
      definitions:
        zh: 列出可独立发布的规范根，不得与活动根混为 is_a。
        en: Lists independently publishable specification roots that must not is_a-merge with activity roots.
        ja: 独立公開可能な仕様根を列挙し、活動根と is_a 混同しない。
      example_value: '["CompositionSpecification","CompositionConfiguration"]'
      source_claims: [claim-orchestration-composition-boundary]
    - id: activity_roots
      labels:
        zh: 活动根概念
        en: activity root concepts
        ja: 活動根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出记录已发生组合执行的根概念。
        en: Lists roots that record occurred composition executions.
        ja: 発生した構成実行を記録する根概念を列挙します。
      example_value: '["CompositionActivity"]'
      source_claims: [claim-orchestration-composition-module]
  constraints:
    - id: orchestration-composition-spec-activity-separation
      expression: "CompositionSpecification and CompositionActivity connect only through cross-links such as uses_topology, realizes, applies, consumes, and produces; never through is_a between specification and activity families."
      explanation:
        zh: 规范描述可怎样运行；活动证明某次运行实际用了什么。混为 is_a 会把设计稿误报为已执行事实。
        en: Specifications describe how work may run; activities prove what one run actually used. is_a between them would misreport design as executed fact.
        ja: 仕様はどう実行し得るかを示し、活動は一回の実行が実際に何を使ったかを証明します。is_a 混同は設計を実行済み事実と誤報します。
      source_claims: [claim-orchestration-composition-boundary]
  required_relations: []
examples:
  - id: orchestration-composition-example-positive-topology-activity
    labels:
      zh: orchestration-composition positive
      en: orchestration-composition positive
      ja: orchestration-composition positive
    descriptions:
      zh: DSPy (Stanford NLP) 以编程式 orchestration-composition 组合：Signature("question -> answer")、ChainOfThought、Retrieve(k=5)；class RAG(dspy.Module): self.retrieve = dspy.Retrieve(k=5); self.generate = dspy.ChainOfThought("context, question -> answer")；BootstrapFewShotWithRandomSearch 优化 prompt。
      en: DSPy (Stanford NLP) composes orchestration-composition programmatically: Signature("question -> answer"), ChainOfThought, Retrieve(k=5); RAG module with Retrieve + ChainOfThought; BootstrapFewShotWithRandomSearch optimizes prompts.
      ja: DSPy orchestration-composition: Signature、ChainOfThought、Retrieve(k=5)、BootstrapFewShotWithRandomSearch。
    field_values: {module_id: orchestration-composition, composition_activity_id: composition-run-204, topology_ref: "report-topology@11", pattern_ref: "prompt-chain@4"}

    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
    source_claims:
      - claim-orchestration-composition-module

  - id: orchestration-composition-example-counterexample-spec-as-run
    labels:
      zh: orchestration-composition counterexample
      en: orchestration-composition counterexample
      ja: orchestration-composition counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 orchestration-composition PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style orchestration-composition PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 orchestration-composition ではない。
    field_values: {module_id: orchestration-composition, topology_ref: "report-topology@11", composition_activity_id: null}

    related_node_ids:
      - OrchestrationTopology
      - CompositionActivity
    related_relation_ids: []
    source_claims:
      - claim-orchestration-composition-boundary

  - id: orchestration-composition-example-boundary-vote-ballot
    labels:
      zh: orchestration-composition boundary
      en: orchestration-composition boundary
      ja: orchestration-composition boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 orchestration-composition 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not orchestration-composition delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で orchestration-composition delegation spec ではない。
    field_values: {module_id: orchestration-composition, ballot_ref: "ballot-a@1", voting_activity_ref: vote-run-18}

    related_node_ids:
      - VoteBallot
      - VotingActivity
      - CompositionArtifact
    related_relation_ids:
      - VotingActivity-consumes-VoteBallot
    source_claims:
      - claim-orchestration-composition-boundary

  - id: orchestration-composition-example-instance-synthesis-run
    labels:
      zh: orchestration-composition instance
      en: orchestration-composition instance
      ja: orchestration-composition instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 orchestration-composition HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to orchestration-composition HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が orchestration-composition HandoffDecision に写像。
    field_values: {module_id: orchestration-composition, composition_activity_id: synthesis-run-31, aggregation_rule_ref: "conflict-preserving@2", output_ref: "final-report@9"}

    related_node_ids:
      - Synthesis
      - SynthesisInput
      - SynthesisOutput
      - AggregationRule
    related_relation_ids:
      - Synthesis-consumes-SynthesisInput
      - Synthesis-produces-SynthesisOutput
      - AggregationActivity-applies-AggregationRule
    source_claims:
      - claim-orchestration-composition-module

sources:
  - id: langgraph-workflows-agents
    title: LangGraph workflows and agents
    url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
    source_type: official-doc
    relevance: Defines prompt chaining, parallelization, orchestrator-worker, and synthesis workflow patterns.
  - id: langgraph-graph-api
    title: LangGraph Graph API
    url: https://docs.langchain.com/oss/python/langgraph/graph-api
    source_type: official-doc
    relevance: Defines StateGraph structure, reducers, Send, and invocation used as engineering references.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Separates plans/entities from activities and usage/generation provenance.
source_claims:
  - id: claim-orchestration-composition-module
    source: langgraph-workflows-agents
    supports: LangGraph documents reusable workflow patterns distinct from one graph invocation. Moonweave maps patterns/topologies/parts/rules to CompositionSpecification and records each invocation as CompositionActivity.
    locator: Workflows and agents — workflow patterns versus agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-composition-boundary
    source: w3c-prov-o
    supports: PROV-O separates Plan-like specifications from time-bounded Activities and links them with usage/generation rather than subclassing specifications as occurrences.
    locator: PROV-O Entity, Activity, Plan, usage, generation
    evidence_kind: design-inference
    confidence: high
