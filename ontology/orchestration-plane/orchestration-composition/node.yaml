examples:
  - id: orchestration-composition-cq-topology-v4-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 客服拓扑的链、并行与分区部件齐备
      en: Support topology with complete chain, parallel, and section parts
      ja: 連鎖・並列・分区部品が揃ったサポート用トポロジー
    scenario_id: orchestration-composition-cq-topology-v4-positive-scenario
    descriptions:
      zh: support-intake@7 明确采用 triage-hybrid@3，并逐一包含提示链阶段、两个并行核验分支和三个报告分区分派；每个成员都以固定版本和所属拓扑标识记录。
      en: support-intake@7 explicitly uses triage-hybrid@3 and contains the prompt-chain stages, two parallel verification branches, and three report-section assignments, each with a fixed revision and topology owner.
      ja: support-intake@7 は triage-hybrid@3 を明示的に採用し、prompt-chain の段階、二つの並列検証 branch、三つの report section assignment を固定 revision と所属 topology 付きで保持します。
    field_values:
      topology_ref: support-intake@7
      pattern_ref: triage-hybrid@3
      chain_stage_refs:
        - normalize@2
        - classify@4
        - draft@6
      parallel_branch_refs:
        - policy-check@5
        - account-check@3
      section_assignment_refs:
        - summary->writer-a@2
        - evidence->writer-b@2
        - actions->writer-c@1
      topology_digest: sha256:topology-support-intake-7
      member_revision_policy: exact
      frozen_at: 2026-07-16T08:00:00Z
      membership_fact_count: 9
    related_node_ids:
      - OrchestrationTopology
      - CompositionPattern
      - CompositionPart
      - PromptChain
      - ChainStage
      - Parallelization
      - ParallelBranch
      - Sectioning
      - SectionAssignment
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
      - OrchestrationTopology-contains-CompositionPart
      - PromptChain-contains_stage-ChainStage
      - Parallelization-contains_branch-ParallelBranch
      - Sectioning-specifies-SectionAssignment
    expected_result:
      zh: 返回 topology、pattern、三类部件及其固定版本，并逐条给出 uses_pattern、contains 与各类成员关系。
      en: Return the topology, pattern, all three part families and fixed revisions, with explicit uses-pattern, containment, and family-membership facts.
      ja: topology、pattern、三種類の部品と固定 revision を返し、uses-pattern、containment、各 family membership の事実を個別に示します。
    why_valid_or_invalid:
      zh: LangGraph 将链、并行和 orchestrator-worker 分解为不同工作流结构；本例也以显式成员事实保留这些区别，而非依赖图上的邻近位置。
      en: LangGraph distinguishes chaining, parallelization, and orchestrator-worker structure; this case preserves those distinctions through explicit membership facts rather than visual proximity.
      ja: LangGraph が chaining、parallelization、orchestrator-worker 構造を区別するのと同様、本例も可視的な近接ではなく明示的 membership fact で差異を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-composition-001
      - claim-orchestration-composition-002
  - id: orchestration-composition-cq-topology-v4-example-counterexample-manual-20260716
    kind: counterexample
    labels:
      zh: 旧版分区被误并入新版客服拓扑
      en: Old section assignment incorrectly merged into the new support topology
      ja: 旧版 section assignment を新版サポート topology に誤結合
    scenario_id: orchestration-composition-cq-topology-v4-counterexample-scenario
    descriptions:
      zh: 候选视图把 support-intake@7 与 actions->writer-c@1 画在同一社区，但该分派的 topology_ref 仍是 support-intake@6，且新版拓扑没有 specifies 成员事实。
      en: The view places support-intake@7 beside actions->writer-c@1, but that assignment still names support-intake@6 as its topology and no specifies-membership fact exists for revision 7.
      ja: 表示上は support-intake@7 と actions->writer-c@1 が同じ community にありますが、assignment の topology_ref は support-intake@6 のままで revision 7 の specifies membership fact がありません。
    field_values:
      queried_topology_ref: support-intake@7
      candidate_assignment_ref: actions->writer-c@1
      assignment_topology_ref: support-intake@6
      candidate_pattern_ref: triage-hybrid@3
      required_relation_id: Sectioning-specifies-SectionAssignment
      required_relation_present: false
      same_visual_community: true
      revision_match: false
    related_node_ids:
      - OrchestrationTopology
      - CompositionPattern
      - CompositionPart
      - PromptChain
      - ChainStage
      - Parallelization
      - ParallelBranch
      - Sectioning
      - SectionAssignment
    related_relation_ids:
      - OrchestrationTopology-uses_pattern-CompositionPattern
      - OrchestrationTopology-contains-CompositionPart
      - PromptChain-contains_stage-ChainStage
      - Parallelization-contains_branch-ParallelBranch
      - Sectioning-specifies-SectionAssignment
    expected_result:
      zh: 拒绝把旧分派计入 support-intake@7，并报告 topology_ref 版本不一致及 specifies 事实缺失。
      en: Exclude the old assignment from support-intake@7 and report both the topology revision mismatch and the missing specifies fact.
      ja: 旧 assignment を support-intake@7 から除外し、topology revision の不一致と specifies fact の欠落を報告します。
    why_valid_or_invalid:
      zh: 拓扑成员身份取决于有向成员事实及一致版本；社区颜色只表达布局聚类，不能把 revision 6 的部件提升为 revision 7 的成员。
      en: Topology membership depends on a directed membership fact and matching revision; community color cannot promote a revision-6 part into revision 7.
      ja: topology membership は有向 membership fact と一致する revision に依存し、community color で revision 6 の部品を revision 7 の member にはできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-composition-001
      - claim-orchestration-composition-002
  - id: orchestration-composition-cq-realization-v4-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 一次报告组合运行固定了拓扑、模式与聚合规则
      en: Report composition run fixes topology, pattern, and aggregation rule
      ja: 報告構成 run が topology・pattern・aggregation rule を固定
    scenario_id: orchestration-composition-cq-realization-v4-positive-scenario
    descriptions:
      zh: composition-run-204 在启动前锁定 report-topology@11，运行记录明确实现 prompt-chain@4；其聚合子活动 aggregate-204 实际应用 evidence-priority@2。
      en: composition-run-204 locks report-topology@11 before start and records realization of prompt-chain@4; its aggregate-204 subactivity actually applies evidence-priority@2.
      ja: composition-run-204 は開始前に report-topology@11 を固定し prompt-chain@4 の実現を記録し、その aggregate-204 subactivity は evidence-priority@2 を実際に適用します。
    field_values:
      composition_activity_id: composition-run-204
      topology_ref: report-topology@11
      realized_pattern_ref: prompt-chain@4
      aggregation_activity_ref: aggregate-204
      aggregation_rule_ref: evidence-priority@2
      topology_digest: sha256:report-topology-11
      started_at: 2026-07-16T09:10:00Z
      ended_at: 2026-07-16T09:12:41Z
      status: succeeded
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
      - AggregationActivity
      - AggregationRule
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
      - AggregationActivity-applies-AggregationRule
    expected_result:
      zh: 返回该活动使用的确切拓扑版本、实际实现的模式和聚合子活动应用的规则，而不把规范当成运行发生。
      en: Return the exact topology revision used, the pattern actually realized, and the rule applied by the aggregation subactivity without treating specifications as occurrences.
      ja: 使用した正確な topology revision、実現した pattern、aggregation subactivity が適用した rule を返し、specification を occurrence と混同しません。
    why_valid_or_invalid:
      zh: PROV-O 区分计划实体与有起止时间的活动；三个有向事实和固定引用使规范身份与本次发生保持可审计分离。
      en: PROV-O separates plan-like entities from time-bounded activities; the three directed facts and fixed references keep specification identity distinct from this occurrence.
      ja: PROV-O は plan-like entity と時間境界を持つ activity を区別し、三つの有向 fact と固定 reference が specification identity と今回の occurrence を分離します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-composition-001
      - claim-orchestration-composition-002
      - claim-orchestration-composition-004
  - id: orchestration-composition-cq-realization-v4-example-counterexample-manual-20260716
    kind: counterexample
    labels:
      zh: 运行只记录 latest 别名而未证明实际版本
      en: Run records only latest aliases and proves no executed revision
      ja: run が latest alias だけを記録し実行 revision を証明しない
    scenario_id: orchestration-composition-cq-realization-v4-counterexample-scenario
    descriptions:
      zh: composition-run-205 只保存 topology=latest 和 pattern=prompt-chain 的字符串，聚合日志也只有 rule_name=evidence-priority；开始后 latest 已从 11 漂移到 12。
      en: composition-run-205 stores only topology=latest and pattern=prompt-chain strings, while the aggregation log has only rule_name=evidence-priority; latest moved from 11 to 12 after start.
      ja: composition-run-205 は topology=latest と pattern=prompt-chain の文字列だけを保存し、aggregation log も rule_name のみです。開始後 latest は 11 から 12 に移動しました。
    field_values:
      composition_activity_id: composition-run-205
      topology_ref: latest
      topology_at_start: report-topology@11
      topology_at_query: report-topology@12
      pattern_value: prompt-chain
      aggregation_rule_value: evidence-priority
      realizes_fact_present: false
      applies_fact_present: false
      started_at: 2026-07-16T09:15:00Z
    related_node_ids:
      - CompositionActivity
      - OrchestrationTopology
      - CompositionPattern
      - AggregationActivity
      - AggregationRule
    related_relation_ids:
      - CompositionActivity-uses_topology-OrchestrationTopology
      - CompositionActivity-realizes-CompositionPattern
      - AggregationActivity-applies-AggregationRule
    expected_result:
      zh: 不得断言该运行使用 revision 11 或 12，也不得从名称推导 realizes 与 applies；应标记三项证据不完整。
      en: Assert neither revision 11 nor 12 and infer neither realizes nor applies from names; flag all three evidence gaps.
      ja: revision 11/12 のどちらも断言せず、名称から realizes や applies を推論せず、三つの証拠欠落を記録します。
    why_valid_or_invalid:
      zh: 可变别名不能充当不可变运行引用，普通名称也不能证明某个活动真正实现模式或应用规则，否则无法重放当时的组合语义。
      en: A mutable alias cannot serve as an immutable run reference, and plain names do not prove realization or rule application, so the executed composition cannot be replayed.
      ja: 可変 alias は immutable run reference にならず、単なる名称は pattern realization や rule application を証明しないため、実行時の構成を再現できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-composition-001
      - claim-orchestration-composition-002
      - claim-orchestration-composition-004
