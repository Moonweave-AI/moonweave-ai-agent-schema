source_claims:
  - id: claim-orchestration-composition-001
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure from runtime execution and documents prompt chaining, parallel independent subtasks, orchestrator-worker section assignment, shared-state reduction, and synthesis. Moonweave uses these distinctions for composition specifications, parts, activities, and artifacts without turning LangGraph itself into a graph node.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-002
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API defines workflows through state, executable nodes, and fixed or conditional edges, including fan-out and fan-in behavior. Moonweave uses that operational evidence to distinguish a reusable OrchestrationTopology from its parts and from a time-bounded CompositionActivity that realizes the topology.
    locator: "Graph API overview: Graphs, Nodes, Edges, normal edges, conditional edges, and parallel supersteps"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-003
    source: eng-fw-autogen-agentchat
    supports: AutoGen's official AgentChat documentation describes teams whose participant order and termination are managed separately from participant messages. Moonweave uses this as supporting evidence that collaboration patterns and topology specifications are not the same objects as runtime activities or produced ballots and outputs.
    locator: "AgentChat user guide: Teams, SelectorGroupChat, RoundRobinGroupChat, and termination conditions"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-004
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Plans and other Entities from time-bounded Activities that use and generate Entities, and models collections as structured entities. Moonweave therefore separates CompositionSpecification, CompositionActivity, and CompositionArtifact and connects activities to consumed and produced artifacts with explicit provenance relations.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, Plan, Collection, usage, and generation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-005
    source: eng-fw-maf-workflows
    supports: Microsoft Agent Framework defines workflows as graph-based multi-step processes whose executors are connected by edges. Moonweave therefore keeps the versioned TaskPlan distinct from the reusable OrchestrationTopology and records adoption through the directed TaskPlan-to-OrchestrationTopology relation has_control_topology.
    locator: Microsoft Agent Framework > Workflows overview > graph-based multi-step tasks, executors, and edges
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-orchestration-composition-006
    source: eng-fw-maf-workflows
    supports: Microsoft Agent Framework treats a workflow as a graph of executors connected by edges for multi-step work. Moonweave preserves TaskPlan as the planning-owned specification while allowing composition to reference the topology selected by that plan.
    locator: Microsoft Agent Framework > Workflows overview > graph-based multi-step tasks, executors, and edges
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-orchestration-composition-007
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's official workflow-pattern guide separates predetermined workflow structure, including parallel branches, from conditional runtime control. Moonweave uses that distinction to keep OrchestrationTopology and ParallelBranch in composition while routing owns routes and decisions.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-008
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph documents conditional routing separately from predetermined parallel and workflow structure. Moonweave therefore assigns Route and RoutingDecision to routing control rather than to composition topology.
    locator: "Workflows and agents: Workflows versus agents, Prompt chaining, Parallelization, and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-009
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph's workflow guide documents prompt-chain stages and orchestrator-worker sections as structural workflow elements. Moonweave uses that evidence to separate CompositionPart and ChainStage from normative TaskPlan and TaskCompletionCriterion objects.
    locator: "Workflows and agents: Prompt chaining and Orchestrator-worker sections"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-010
    source: eng-fw-langgraph-workflows-agents
    supports: LangGraph distinguishes workflow structure from the work objectives and criteria supplied to that workflow. Moonweave uses this as design evidence that TaskPlan and TaskCompletionCriterion remain task-planning objects even when a composition topology realizes them.
    locator: "Workflows and agents: Workflows versus agents and workflow patterns"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-011
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes activities from entities generated by those activities and records usage and generation provenance. Moonweave uses those distinctions to identify CompositionArtifact and SynthesisOutput by their composition-producing context.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, usage, generation, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-orchestration-composition-012
    source: eng-ont-prov-o
    supports: W3C PROV-O supports identifying generated entities independently from any particular workflow pattern while retaining provenance to producing activities. Moonweave therefore keeps SchemaArtifact and ReportArtifact in runtime artifacts even when a composition consumes or produces them.
    locator: "PROV-O Recommendation Sections 3.1 and 3.2: Entity, Activity, usage, generation, and derivation"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
