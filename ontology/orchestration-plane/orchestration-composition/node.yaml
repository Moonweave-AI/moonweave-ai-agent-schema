schema: moonweave.ai/ontology-node/v1
id: orchestration-composition
kind: module
status: review
labels:
  zh: 组合结构与汇聚活动
  en: Composition structures and aggregation activities
  ja: 構成構造と集約活動
semantics:
  short_definition:
    zh: 描述多个步骤或参与者如何按可复用结构协同，以及一次运行怎样把多个输入汇聚成结果。CompositionSpecification 定义模式、拓扑、部件和聚合规则；CompositionActivity 记录实际发生的并行、投票、合并或综合。输入与输出首先是运行产物，只在本模块中承担“选票、综合输入、组合输出”等上下文角色。
    en: Describes how multiple steps or participants cooperate through reusable structures and how one run aggregates multiple inputs into a result. CompositionSpecification defines patterns, topologies, parts, and aggregation rules; CompositionActivity records an occurring parallel, voting, merging, or synthesis action. Inputs and outputs are runtime artifacts first and play contextual roles here such as ballot, synthesis input, or composition output.
    ja: 複数の段階または参加者が再利用可能な構造で協働する方法と、一回の実行が複数入力を結果へ集約する方法を表します。CompositionSpecification は pattern・topology・part・aggregation rule を定義し、CompositionActivity は実際に発生した並列・投票・併合・統合を記録します。入出力は第一に実行成果物であり、本モジュールでは ballot・synthesis input・composition output などの文脈的役割を担います。
  definition:
    zh: 本模块必须区分“结构规定”和“活动发生”：OrchestrationTopology 是可版本化的规范实体，CompositionActivity 是有起止时间的发生，二者只能通过 uses_topology/realizes 等关系连接，不能形成 is_a 上下位。类似地，SynthesisInput、VoteBallot 和 CompositionOutput 描述产物在某次组合中的角色；产物的持久身份、版本与摘要仍由 runtime-artifacts 拥有。当前目录把 CompositionActivity 放在 OrchestrationTopology 下、把角色型输入输出放在 CompositionArtifact 下，概念层级尚需后续移动或改造成显式角色关系。
    en: This module must separate structural prescription from occurring activity. OrchestrationTopology is a versioned specification entity, while CompositionActivity is time-bounded; they may be connected only through relations such as uses_topology or realizes, never through is_a. Likewise, SynthesisInput, VoteBallot, and CompositionOutput describe roles played by artifacts in one composition; persistent artifact identity, revision, and digest remain runtime-artifact owned. The current directory places CompositionActivity beneath OrchestrationTopology and role-like inputs and outputs beneath CompositionArtifact, so the concept hierarchy still requires a later move or conversion to explicit role relations.
    ja: 本モジュールは「構造規定」と「活動発生」を分離しなければなりません。OrchestrationTopology は版管理された仕様実体、CompositionActivity は時間範囲を持つ発生であり、uses_topology・realizes などの関係でのみ接続し、is_a 上下位にできません。同様に SynthesisInput・VoteBallot・CompositionOutput は一回の構成で成果物が担う役割で、永続的な成果物同一性・版・digest は runtime-artifacts が所有します。現ディレクトリは CompositionActivity を OrchestrationTopology 配下、役割型入出力を CompositionArtifact 配下に置いているため、概念階層は後続の移動または明示的役割関係への変換が必要です。
  why_needed:
    zh: 让系统既能复用组合设计，又能追溯某次聚合实际采用的拓扑、规则、输入和输出，同时避免把规范、活动和产物角色混成一棵伪分类树。
    en: Lets the system reuse composition designs and trace the topology, rule, inputs, and outputs used by one aggregation occurrence without collapsing specifications, activities, and artifact roles into a false taxonomy.
    ja: 構成設計を再利用しつつ、一回の集約で実際に用いた topology・rule・input・output を追跡し、仕様・活動・成果物役割を偽の分類木へ混在させないために必要です。
  includes:
    - zh: "可复用的 CompositionSpecification：组合模式、版本化拓扑、拓扑部件、综合计划，以及 AggregationRule 下的 VotingRule 与 MergeRule。"
      en: "Reusable CompositionSpecifications: composition patterns, versioned topologies, topology parts, synthesis plans, and VotingRule and MergeRule beneath AggregationRule."
      ja: "再利用可能な CompositionSpecification：構成 pattern・版管理 topology・topology part・synthesis plan、および AggregationRule 配下の VotingRule と MergeRule。"
    - zh: 实际发生的 CompositionActivity，以及其并行、投票、合并和综合专门类型；活动引用所执行的确切拓扑与规则版本。
      en: Occurring CompositionActivities and their parallel, voting, merging, and synthesis specializations; each activity references the exact topology and rule revisions it executes.
      ja: 実際に発生する CompositionActivity と並列・投票・併合・統合の特殊型。各活動は実行する正確な topology と rule の版を参照します。
    - zh: 运行产物在组合活动中的输入、选票和输出角色，以及活动对这些产物的使用与生成关系。
      en: Input, ballot, and output roles played by runtime artifacts in a composition activity, together with the activity's usage and generation relations.
      ja: 実行成果物が構成活動で担う input・ballot・output 役割と、活動による使用・生成関係。
  excludes:
    - zh: Artifact 的持久身份、版本、摘要和存储位置；这些属于 runtime-artifacts，本模块只声明其在一次组合中的角色。
      en: Persistent Artifact identity, revision, digest, and storage location; these belong to runtime-artifacts, while this module states only their role in one composition.
      ja: Artifact の永続同一性・版・digest・保存場所。これらは runtime-artifacts に属し、本モジュールは一回の構成での役割だけを示します。
    - zh: 路由选择、任务目标、参与者身份、通用运行日志，以及框架类名、论文、来源或展示社区节点。
      en: Routing selections, task goals, participant identity, generic runtime logs, framework class names, papers, sources, and visualization community nodes.
      ja: routing selection・task goal・participant identity・generic runtime log・framework class name・paper・source・可視化 community node。
  semantic_kind: null
  aliases: []
purpose:
  zh: 让系统既能复用组合设计，又能追溯某次聚合实际采用的拓扑、规则、输入和输出，同时避免把规范、活动和产物角色混成一棵伪分类树。
  en: Lets the system reuse composition designs and trace the topology, rule, inputs, and outputs used by one aggregation occurrence without collapsing specifications, activities, and artifact roles into a false taxonomy.
  ja: 構成設計を再利用しつつ、一回の集約で実際に用いた topology・rule・input・output を追跡し、仕様・活動・成果物役割を偽の分類木へ混在させないために必要です。
