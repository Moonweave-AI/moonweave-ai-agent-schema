schema: moonweave.ai/ontology-node/v1
id: A2ASendMessageRequest
kind: concept
labels:
  zh: A2A 发送消息请求
  en: A2A send-message request
  ja: A2A メッセージ送信リクエスト
semantics:
  short_definition:
    zh: 请求 A2A 服务器处理一条消息的协议记录。
    en: A protocol record that asks an A2A server to process one message.
    ja: A2A サーバーに一つのメッセージ処理を依頼するプロトコル記録。
  definition:
    zh: A2A SendMessageRequest 是 A2A 协议中 message/send 操作的请求数据模型。它必须携带一条 Message，并可携带租户、SendMessageConfiguration 和元数据；服务器据此返回 Message 或 Task。它不定义哪个工作者应被选择，也不定义 Moonweave 的委派授权。
    en: An A2A SendMessageRequest is the request data model for the A2A message/send operation. It must carry one Message and may carry tenant, SendMessageConfiguration, and metadata; the server responds with a Message or Task. It does not choose a worker or define Moonweave delegation authority.
    ja: A2A SendMessageRequest は、A2A の message/send 操作のリクエストデータモデルである。一つの Message が必須で、tenant、SendMessageConfiguration、metadata を任意に持て、サーバーは Message または Task を返す。これはワーカー選択や Moonweave の委任権限を定義しない。
  why_needed:
    zh: 远程智能体服务需要稳定的入口记录，才能在不依赖调用方内部编排模型的情况下接收用户或智能体消息、协商输出形式并关联后续任务。
    en: Remote agent services need a stable entry record so they can accept user or agent messages, negotiate response behavior, and associate follow-on work without depending on a caller's internal orchestration model.
    ja: リモートエージェントサービスには、呼出側の内部オーケストレーションモデルに依存せず、ユーザーまたはエージェントのメッセージを受け取り、応答動作を調整し、後続作業を関連付ける安定した入口記録が必要である。
  includes:
    - zh: message/send 的必需 Message 参数。
      en: The required Message parameter of message/send.
      ja: message/send の必須 Message パラメーター。
    - zh: 可选的租户、输出配置和应用元数据。
      en: Optional tenant, output configuration, and application metadata.
      ja: 任意の tenant、出力構成、アプリケーションメタデータ。
  excludes:
    - zh: 服务器返回的 Task 或 Message；它们是响应记录。
      en: The Task or Message returned by the server; those are response records.
      ja: サーバーが返す Task または Message。それらは応答記録である。
    - zh: 对工作者能力、成本或所有权的本地选择决定。
      en: A local decision about worker capability, cost, or ownership.
      ja: ワーカーの能力、コスト、所有権に関するローカルな選択決定。
  semantic_kind: information
  aliases:
    - language: en
      value: SendMessageRequest
      alias_kind: protocol-term
    - language: en
      value: message/send request
      alias_kind: protocol-operation-name
engineering:
  explanation:
    zh: 客户端先构造符合 A2A Message 结构的输入，再经受支持的绑定调用 message/send。实现应把协议配置与本地路由策略分开保存：配置只表达已接受的输出模式、推送更新或等待行为，不能被解释为服务器选择某个内部工作者的指令。
    en: "A client first constructs an A2A Message and invokes message/send through a supported binding. Implementations keep protocol configuration separate from local routing policy: configuration expresses accepted output modes, push updates, or wait behavior, not an instruction to select an internal worker."
    ja: クライアントはまず A2A Message を構成し、対応バインディングで message/send を呼び出す。実装はプロトコル構成をローカルルーティング方針と分離する。構成が表すのは受理可能な出力形式、push 更新、待機動作であり、内部ワーカーを選べという指示ではない。
  typical_input:
    - description: A client sends a user message and requests text output while waiting for the normal response.
      format: |
        {
          "message": {
            "messageId": "msg-20260718-001",
            "role": "ROLE_USER",
            "parts": [{"text": "Summarize the incident report."}]
          },
          "configuration": {
            "acceptedOutputModes": ["text/plain"],
            "returnImmediately": false
          }
        }
      source_claims: [a2a-send-message-request-shape]
  typical_output:
    - description: The server may return a Task when the message creates or advances asynchronous work.
      format: |
        {
          "id": "task-20260718-001",
          "status": {"state": "TASK_STATE_WORKING"}
        }
      source_claims: [a2a-send-message-request-response]
  reference_implementations:
    - name: A2A Protocol Specification — SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the message/send request model, its required Message, optional configuration and metadata, and its response behavior.
structure:
  identity_keys: [message]
  fields:
    - id: message
      labels: {zh: 消息, en: Message, ja: メッセージ}
      definitions: {zh: 必须由服务器处理的 A2A Message。, en: The A2A Message that the server must process., ja: サーバーが処理しなければならない A2A Message。}
      datatype: A2AMessage
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"messageId":"msg-20260718-001","role":"ROLE_USER","parts":[{"text":"Summarize the incident report."}]}'
      allowed_values: []
      source_claims: [a2a-send-message-request-shape]
    - id: configuration
      labels: {zh: 发送配置, en: Send configuration, ja: 送信構成}
      definitions:
        zh: 可选的输出模式、推送更新和返回时机偏好。
        en: Optional preferences for output modes, push updates, and return timing.
        ja: 出力形式、push 更新、返却タイミングに関する任意の設定。
      datatype: A2ASendMessageConfiguration
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"acceptedOutputModes":["text/plain"],"returnImmediately":false}'
      allowed_values: []
      source_claims: [a2a-send-message-request-shape]
    - id: tenant
      labels: {zh: 租户, en: Tenant, ja: テナント}
      definitions: {zh: 可选的多租户服务范围标识。, en: An optional service tenancy scope identifier., ja: 任意のマルチテナントサービス範囲識別子。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: customer-acme
      allowed_values: []
      source_claims: [a2a-send-message-request-shape]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions: {zh: 可选的实现扩展数据，不改变 Message 的协议语义。, en: Optional implementation extension data that does not replace Message protocol semantics., ja: Message のプロトコル意味論を置き換えない任意の実装拡張データ。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"trace_id":"trace-41"}'
      allowed_values: []
      source_claims: [a2a-send-message-request-shape]
  constraints:
    - id: a2a-send-message-request-requires-message
      severity: error
      expression_language: plain
      expression: A SendMessageRequest must include exactly one Message.
      explanation:
        zh: 没有 Message 的请求不能表示服务器要处理的输入。
        en: Without a Message, the request cannot express the input the server is to process.
        ja: Message がなければ、サーバーが処理すべき入力をリクエストは表現できない。
      source_claims: [a2a-send-message-request-shape]
    - id: a2a-send-message-request-response-union
      severity: error
      expression_language: plain
      expression: A successful SendMessage operation returns one Message or one Task, not a local delegation-decision object.
      explanation:
        zh: 协议响应联合类型限定为 Message 或 Task；本地路由决定必须在协议边界之外建模。
        en: The protocol response union is Message or Task; local routing decisions must be modeled outside this protocol boundary.
        ja: プロトコル応答のユニオンは Message または Task であり、ローカルルーティング決定はこのプロトコル境界の外でモデル化する。
      source_claims: [a2a-send-message-request-response]
  required_relations: []
examples:
  - id: a2a-send-message-request-positive-001
    labels:
      zh: A2ASendMessageRequest positive
      en: A2ASendMessageRequest positive
      ja: A2ASendMessageRequest positive
    descriptions:
      zh: "A2A Protocol 映射 A2ASendMessageRequest：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2ASendMessageRequest: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2ASendMessageRequest: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {message: "'{\\"messageId\\":\\"msg-20260718-001", "role": ROLE_USER, "parts":[{"text": "Summarize the incident report.\\"}]}'", configuration: "'{\\"acceptedOutputModes\\":[\\"text/plain\\"]", "returnImmediately": "false}'"}

    related_node_ids:
      - A2ASendMessageRequest
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-send-message-request-shape
      - a2a-send-message-request-response

  - id: a2a-send-message-request-counterexample-missing-message
    labels:
      zh: A2ASendMessageRequest counterexample
      en: A2ASendMessageRequest counterexample
      ja: A2ASendMessageRequest counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 A2ASendMessageRequest TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style A2ASendMessageRequest TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 A2ASendMessageRequest ではない。
    field_values: {configuration: "'{\\"returnImmediately\\":true}'"}

    related_node_ids:
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-send-message-request-shape

  - id: a2a-send-message-request-boundary-return-immediately
    labels:
      zh: A2ASendMessageRequest boundary
      en: A2ASendMessageRequest boundary
      ja: A2ASendMessageRequest boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 A2ASendMessageRequest 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not A2ASendMessageRequest delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で A2ASendMessageRequest delegation spec ではない。
    field_values: {message: "'{\\"messageId\\":\\"msg-20260718-002", "role": ROLE_USER, "parts":[{"text": "Generate the quarterly report.\\"}]}'", configuration: "'{\\"returnImmediately\\":true}'"}

    related_node_ids:
      - A2ASendMessageRequest
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-send-message-request-shape
      - a2a-send-message-request-response

  - id: a2a-send-message-request-instance-incident-summary
    labels:
      zh: A2ASendMessageRequest instance
      en: A2ASendMessageRequest instance
      ja: A2ASendMessageRequest instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ASendMessageRequest A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ASendMessageRequest A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ASendMessageRequest A2ATask に写像。
    field_values: {message: "'{\\"messageId\\":\\"msg-20260718-001", "role": ROLE_USER, "parts":[{"text": "Summarize the incident report.\\"}]}'", tenant: customer-acme, metadata: "'{\\"trace_id\\":\\"trace-41\\"}'"}

    related_node_ids:
      - A2ASendMessageRequest
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-send-message-request-shape

