schema: moonweave.ai/ontology-node/v1
id: CollaborationProcess
kind: concept
labels:
  zh: 协作过程
  en: collaboration process
  ja: 協働プロセス
semantics:
  short_definition:
    zh: 两个以上责任参与方围绕共同工作目标交换工作、控制或结果的协调活动。
    en: Coordination activity where two or more accountable parties exchange work, control, or results for a shared objective.
    ja: 二者以上の責任主体が共通作業目標のために work/control/result を交換する coordination activity。
  definition:
    zh: CollaborationProcess 以 collaboration_process_id、started_at 与 ended_at 标识可追踪的多方协作进程；OpenAI 多 agent 会话、A2A 远程任务协作、CrewAI crew 运行与 Cursor 父代理—子代理并行均可能产生该进程。它只规定存在可追踪协作，不区分委派与移交——后者是带额外种差的下位过程。单次工具调用或内部推理链不构成协作过程。
    en: CollaborationProcess is identified by collaboration_process_id, started_at, and ended_at as a traceable multi-party cooperation course. OpenAI multi-agent sessions, A2A remote task collaboration, CrewAI crew runs, and Cursor parent–subagent parallelism may all produce it. It establishes traceable cooperation only; delegation and handoff are narrower subtypes with additional differentia. A single tool call or internal reasoning chain is not a collaboration process.
    ja: CollaborationProcess は collaboration_process_id/started_at/ended_at で traceable な multi-party cooperation を識別します。OpenAI multi-agent session、A2A remote task、CrewAI crew run、Cursor parent-subagent parallelism が該当し得ます。委任・引き継ぎは追加種差を持つ下位過程です。
  why_needed:
    zh: 委派与移交需要共享的上位协作语义，同时避免把所有多 agent 消息都误判为委派。
    en: Delegation and handoff need a shared collaboration genus without classifying every multi-agent message as delegation.
    ja: 委任と引き継ぎは共通協働 genus を必要とし、すべての multi-agent message を委任と誤分類しません。
  includes:
    - zh: 纳入有共同工作目标、至少两个可识别责任方且过程进展可追踪的协作。
      en: Includes cooperation with a shared work objective, at least two identifiable accountable parties, and traceable progress.
      ja: 共通作業目標、二者以上の識別可能な責任主体、追跡可能な進行を備える協働を含みます。
  excludes:
    - zh: 排除单一智能体的内部推理以及没有工作或控制交换的消息广播。
      en: Excludes one agent's internal reasoning and message broadcasts that exchange neither work nor control.
      ja: 単一エージェントの内部推論、および作業も制御も交換しないメッセージ配信を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成时将 OpenAI session 中多个 agent 的往返、A2A 客户端—远程 agent 的任务协作、CrewAI Process.sequential/hierarchical 的 agent 间任务传递、Cursor 父代理等待子代理结果，均映射为 CollaborationProcess 发生事实。规范层（handoffs 列表、DelegationContract）不是协作过程本身。
    en: Map OpenAI session multi-agent turns, A2A client–remote-agent task cooperation, CrewAI Process sequential/hierarchical agent exchanges, and Cursor parent waiting for subagent results to CollaborationProcess occurrences. Specification layers (handoffs lists, DelegationContract) are not the process itself.
    ja: OpenAI session multi-agent turn、A2A client-remote agent task cooperation、CrewAI Process agent 間 exchange、Cursor parent が subagent 結果を待つ run を CollaborationProcess occurrence に写像します。
  typical_input:
    - description: CrewAI hierarchical crew with manager and workers.
      format: Crew(agents=[manager, researcher], process=Process.hierarchical)
      source_claims:
        - claim-collaboration-process-design
    - description: OpenAI Agents SDK multi-agent session.
      format: Runner.run(triage_agent) with handoffs to billing_agent
      source_claims:
        - claim-collaboration-process-design
  typical_output:
    - description: Moonweave CollaborationProcess record.
      format: '{"collaboration_process_id":"collaboration-process-31","started_at":"2026-07-16T01:00:00Z"}'
      source_claims:
        - claim-collaboration-process-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - collaboration_process_id
  fields:
    - id: collaboration_process_id
      labels:
        zh: 协作过程 ID
        en: collaboration-process ID
        ja: 協働プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识该协作进程。
        en: Uniquely identifies the collaboration process.
        ja: 協働プロセスを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: collaboration-process-31
      source_claims:
        - claim-collaboration-process-design
    - id: status
      labels:
        zh: 过程状态
        en: process status
        ja: プロセス状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录协作进程是否已计划、活动、暂停或结束。
        en: Records whether the collaboration process is planned, active, paused, or ended.
        ja: 協働プロセスが計画中、活動中、停止中、終了済みかを記録します。
      allowed_values:
        - id: CollaborationProcess-status-planned
          value: planned
          labels:
            zh: 已计划
            en: planned
            ja: 計画済み
          definitions:
            zh: 协作范围和参与方已经确定，但任何参与方尚未开始交换工作、控制或结果。
            en: The collaboration scope and participants are fixed, but no participant has begun exchanging work, control, or results.
            ja: 協働範囲と参加主体は確定していますが、作業・制御・結果の交換はまだ開始されていません。
          source_claims:
            - claim-collaboration-process-design
        - id: CollaborationProcess-status-active
          value: active
          labels:
            zh: 进行中
            en: active
            ja: 活動中
          definitions:
            zh: 至少两个责任参与方正在为共同目标交换工作、控制或结果，且协作过程尚未结束。
            en: At least two accountable participants are exchanging work, control, or results for the shared objective, and the collaboration has not ended.
            ja: 少なくとも二つの責任主体が共通目標のために作業・制御・結果を交換しており、協働は終了していません。
          source_claims:
            - claim-collaboration-process-design
        - id: CollaborationProcess-status-paused
          value: paused
          labels:
            zh: 已暂停
            en: paused
            ja: 一時停止
          definitions:
            zh: 协作过程仍保留原有身份和恢复意图，但参与方之间的工作、控制或结果交换已暂时停止。
            en: The collaboration retains its identity and an intention to resume, but exchanges of work, control, or results are temporarily suspended.
            ja: 協働の同一性と再開意図は保持されていますが、参加主体間の作業・制御・結果の交換は一時停止しています。
          source_claims:
            - claim-collaboration-process-design
        - id: CollaborationProcess-status-ended
          value: ended
          labels:
            zh: 已结束
            en: ended
            ja: 終了済み
          definitions:
            zh: 协作过程已经达到完成、取消或其他终止条件，不再接收属于该进程的新协作动作。
            en: The collaboration has met a completion, cancellation, or other termination condition and accepts no new collaborative action in that process.
            ja: 協働は完了・取消・その他の終了条件に達しており、そのプロセスに属する新たな協働行為を受け付けません。
          source_claims:
            - claim-collaboration-process-design
      pattern: null
      example_value: active
      source_claims:
        - claim-collaboration-process-design
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录参与方开始共同工作进程的时间。
        en: Records when the participants began the shared course of work.
        ja: 参加主体が共同作業を開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:00Z
      source_claims:
        - claim-collaboration-process-design
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录协作进程正式结束的时间；活动进程可为空。
        en: Records formal end time; it is absent while the process remains active.
        ja: 正式終了時刻を記録し、活動中は未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-collaboration-process-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CollaborationProcess-example-crewai-hierarchical
    labels:
      zh: CrewAI 层级协作
      en: CrewAI hierarchical collaboration
      ja: CrewAI hierarchical 協働
    descriptions:
      zh: Manager 向 researcher 分派 @task 并等待结果，形成可追踪协作进程。
      en: Manager assigns a @task to researcher and awaits a result, forming a traceable collaboration process.
      ja: Manager が researcher に @task を割当て結果を待ち traceable collaboration process が成立。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      collaboration_process_id: collaboration-process-31
      started_at: 2026-07-16T01:00:00Z
    related_node_ids:
      - CollaborationProcess
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-design
  - id: CollaborationProcess-example-openai-session
    labels:
      zh: OpenAI 多 agent 会话
      en: OpenAI multi-agent session
      ja: OpenAI multi-agent session
    descriptions:
      zh: Triage agent 通过 handoff 将会话交给 billing agent，双方围绕退款问题交换控制与结果。
      en: Triage agent hands the session to billing agent via handoff; both exchange control and results around a refund issue.
      ja: Triage agent が handoff で billing agent に session を渡し refund 問題で control/result を交換。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs
    field_values:
      collaboration_process_id: collaboration-handoff-8
      started_at: 2026-07-16T02:00:00Z
    related_node_ids:
      - CollaborationProcess
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-design
  - id: CollaborationProcess-example-a2a-remote
    labels:
      zh: A2A 远程协作
      en: A2A remote collaboration
      ja: A2A remote 協働
    descriptions:
      zh: 客户端 agent 向远程 billing agent 发送 tasks/send 并接收 artifact，构成跨 agent 协作。
      en: Client agent sends tasks/send to remote billing agent and receives artifacts, forming cross-agent collaboration.
      ja: Client agent が remote billing agent へ tasks/send し artifact を受け取り cross-agent collaboration が成立。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: tasks/send
    field_values:
      collaboration_process_id: collaboration-a2a-12
      started_at: 2026-07-16T03:00:00Z
    related_node_ids:
      - CollaborationProcess
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-design
  - id: CollaborationProcess-example-boundary-announcement
    labels:
      zh: 公告订阅不是协作
      en: Announcement subscription is not collaboration
      ja: announcement 購読は協働ではない
    descriptions:
      zh: 两个代理仅订阅同一公告主题，无共同工作目标与责任交换，不构成 CollaborationProcess。
      en: Two agents merely subscribe to the same announcement topic with no shared work objective or responsibility exchange.
      ja: 二 agent が同一 announcement topic を購読するだけでは CollaborationProcess になりません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-design
parent_relation: null
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-collaboration-process-design
    source: delegation-handoff-design
    supports: CollaborationProcess is the activity genus for delegation and handoff subtypes.
    locator: CollaborationProcess boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-collaboration-process-design
    source: crewai
    supports: CrewAI hierarchical and sequential processes involve accountable agent cooperation.
    locator: Processes documentation
    evidence_kind: design-inference
    confidence: high
  - id: claim-collaboration-process-design
    source: openai-agents-sdk
    supports: OpenAI multi-agent sessions with handoffs exchange control among accountable agents.
    locator: Handoffs documentation
    evidence_kind: design-inference
    confidence: high
  - id: claim-collaboration-process-design
    source: a2a-protocol
    supports: A2A tasks/send enables cross-agent collaboration with traceable task identity.
    locator: Task protocol
    evidence_kind: design-inference
    confidence: high
