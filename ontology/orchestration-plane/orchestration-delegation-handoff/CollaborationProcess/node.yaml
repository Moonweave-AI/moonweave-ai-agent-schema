schema: moonweave.ai/ontology-node/v1
id: CollaborationProcess
kind: concept
labels:
  zh: 协作过程
  en: collaboration process
  ja: 協働プロセス
semantics:
  short_definition:
    zh: 多责任参与方围绕共同工作目标进行可追踪协作的上位过程。
    en: Traceable multi-party cooperation toward a shared work objective.
    ja: 共通作業目標に向けた、追跡可能な複数主体協働の上位プロセス。
  definition:
    zh: 协作过程是两个或多个责任参与方为共同工作目标交换工作、控制或结果的协调活动。 它只规定参与方之间存在可追踪的协作进程；委派与移交是其中具有更窄成立条件的两种过程。
    en: A collaboration process is a coordination activity in which two or more accountable participants exchange work, control, or results for a shared work objective. It establishes a traceable course of cooperation between participants; delegation and handoff are narrower process kinds with additional identity conditions.
    ja: 協働プロセスは、二者以上の責任主体が共通の作業目標に向けて作業、制御、または結果を交換する調整活動です。 参加主体間に追跡可能な協働の進行があることだけを定め、委任と引き継ぎはさらに限定された同一性条件を持つ下位過程です。
  why_needed:
    zh: 该上位概念让委派与移交共享协作语义，同时阻止所有多智能体消息都被误判为委派。
    en: This genus lets delegation and handoff share collaboration semantics without classifying every multi-agent message exchange as delegation.
    ja: この上位概念は委任と引き継ぎに協働意味を共有させつつ、すべてのマルチエージェント通信を委任と誤分類することを防ぎます。
  includes:
    - zh: 纳入有共同工作目标、至少两个可识别责任方且过程进展可追踪的协作。
      en: Includes cooperation with a shared work objective, at least two identifiable accountable parties, and traceable progress.
      ja: 共通作業目標、二者以上の識別可能な責任主体、追跡可能な進行を備える協働を含みます。
  excludes:
    - zh: 排除单一智能体的内部推理以及没有工作或控制交换的消息广播。
      en: Excludes one agent's internal reasoning and message broadcasts that exchange neither work nor control.
      ja: 単一エージェントの内部推論、および作業も制御も交換しないメッセージ配信を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      CollaborationProcess 由编排器实例化为 DelegationProcess 或 HandoffProcess：Agents SDK multi-agent 会话中
      transfer_to_agent 与 handoff 回调写入 collaboration_process_id 时间线；A2A 多轮 message/send 只在互操作层
      关联 contextId，本地过程记录责任交换而非复制 A2A history。
    en: >-
      CollaborationProcess is instantiated by an orchestrator as DelegationProcess or HandoffProcess: in Agents SDK
      multi-agent sessions, transfer_to_agent and handoff callbacks write a collaboration_process_id timeline; A2A
      multi-turn message/send correlates contextId only at the interoperability layer while local process records
      accountable exchange rather than copying A2A history.
    ja: >-
      CollaborationProcess は orchestrator により DelegationProcess または HandoffProcess として instantiate される。
      Agents SDK multi-agent session では transfer_to_agent と handoff callback が collaboration_process_id timeline を書く。
      A2A multi-turn message/send は相互運用層で contextId を correlate するだけで、local process は A2A history を複製せず
      accountable exchange を記録する。
  typical_input:
    - description:
        zh: 启动多参与者协作的过程声明与参与者引用。
        en: A multi-participant collaboration process declaration with participant references.
        ja: participant reference を持つ multi-participant collaboration process declaration。
      format: |-
        {"collaboration_process_id":"collab-884","participants":["binding-orchestrator-1","binding-agent-auditor-3"],"shared_objective_ref":"goal:release-2026-07","process_kind":"delegation"}
  typical_output:
    - description:
        zh: 可追踪的协作过程实例与时间线槽位。
        en: A traceable collaboration process instance and timeline slot.
        ja: traceable collaboration process instance と timeline slot。
      format: |-
        {"collaboration_process_id":"collab-884","specialized_as":"DelegationProcess","delegation_process_ref":"deleg-proc-884","started_at":"2026-07-16T09:00:00Z"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents multi-agent control exchange as collaboration, not mere messaging.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents orchestrated cooperation among named agents.
    - name: A2A Protocol Task
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol tasks correlated with but not replacing local collaboration processes.
  source_claims:
    - claim-collaboration-process-001
    - claim-collaboration-process-002
structure:
  identity_keys:
    - collaboration_process_id
  fields:
    - id: collaboration_process_id
      labels:
        zh: 协作过程 ID
        en: collaboration-process ID
        ja: 協働プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识该协作进程。
        en: Uniquely identifies the collaboration process.
        ja: 協働プロセスを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: collaboration-process-31
      source_claims:
        - claim-collaboration-process-002
    - id: status
      labels:
        zh: 过程状态
        en: process status
        ja: プロセス状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录协作进程是否已计划、活动、暂停或结束。
        en: Records whether the collaboration process is planned, active, paused, or ended.
        ja: 協働プロセスが計画中、活動中、停止中、終了済みかを記録します。
      allowed_values:
        - id: CollaborationProcess-status-planned
          value: planned
          labels:
            zh: 已计划
            en: planned
            ja: 計画済み
          definitions:
            zh: 协作范围和参与方已经确定，但任何参与方尚未开始交换工作、控制或结果。
            en: The collaboration scope and participants are fixed, but no participant has begun exchanging work, control, or results.
            ja: 協働範囲と参加主体は確定していますが、作業・制御・結果の交換はまだ開始されていません。
          status: accepted
          source_claims:
            - claim-collaboration-process-003
        - id: CollaborationProcess-status-active
          value: active
          labels:
            zh: 进行中
            en: active
            ja: 活動中
          definitions:
            zh: 至少两个责任参与方正在为共同目标交换工作、控制或结果，且协作过程尚未结束。
            en: At least two accountable participants are exchanging work, control, or results for the shared objective, and the collaboration has not ended.
            ja: 少なくとも二つの責任主体が共通目標のために作業・制御・結果を交換しており、協働は終了していません。
          status: accepted
          source_claims:
            - claim-collaboration-process-004
        - id: CollaborationProcess-status-paused
          value: paused
          labels:
            zh: 已暂停
            en: paused
            ja: 一時停止
          definitions:
            zh: 协作过程仍保留原有身份和恢复意图，但参与方之间的工作、控制或结果交换已暂时停止。
            en: The collaboration retains its identity and an intention to resume, but exchanges of work, control, or results are temporarily suspended.
            ja: 協働の同一性と再開意図は保持されていますが、参加主体間の作業・制御・結果の交換は一時停止しています。
          status: accepted
          source_claims:
            - claim-collaboration-process-005
        - id: CollaborationProcess-status-ended
          value: ended
          labels:
            zh: 已结束
            en: ended
            ja: 終了済み
          definitions:
            zh: 协作过程已经达到完成、取消或其他终止条件，不再接收属于该进程的新协作动作。
            en: The collaboration has met a completion, cancellation, or other termination condition and accepts no new collaborative action in that process.
            ja: 協働は完了・取消・その他の終了条件に達しており、そのプロセスに属する新たな協働行為を受け付けません。
          status: accepted
          source_claims:
            - claim-collaboration-process-006
      pattern: null
      example_value: active
      source_claims:
        - claim-collaboration-process-007
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录参与方开始共同工作进程的时间。
        en: Records when the participants began the shared course of work.
        ja: 参加主体が共同作業を開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:00Z
      source_claims:
        - claim-collaboration-process-008
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录协作进程正式结束的时间；活动进程可为空。
        en: Records formal end time; it is absent while the process remains active.
        ja: 正式終了時刻を記録し、活動中は未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-collaboration-process-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: CollaborationProcess-example-positive-manual-2026
    labels:
      zh: CollaborationProcess positive
      en: CollaborationProcess positive
      ja: CollaborationProcess positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 CollaborationProcess：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps CollaborationProcess: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が CollaborationProcess 多 agent 協調に写像。
    field_values: {collaboration_process_id: collaboration-process-31, status: active, started_at: 2026-07-16T01:00:00Z}

    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-010

  - id: CollaborationProcess-example-boundary-manual-2026
    labels:
      zh: CollaborationProcess boundary
      en: CollaborationProcess boundary
      ja: CollaborationProcess boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 CollaborationProcess 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not CollaborationProcess work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で CollaborationProcess work_specification ではない。
    field_values: {}

    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-011

  - id: CollaborationProcess-example-counterexample-confusable
    labels:
      zh: CollaborationProcess counterexample
      en: CollaborationProcess counterexample
      ja: CollaborationProcess counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 CollaborationProcess RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style CollaborationProcess RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 CollaborationProcess ではない。
    field_values: {collaboration_process_id: absent, delegator_binding_id: absent, shared_objective_ref: absent, a2a_task_id: task-20260718-001}

    related_node_ids:
      - CollaborationProcess
      - A2ATask
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-010

  - id: CollaborationProcess-example-instance-concrete
    labels:
      zh: CollaborationProcess instance
      en: CollaborationProcess instance
      ja: CollaborationProcess instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 CollaborationProcess DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to CollaborationProcess DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が CollaborationProcess に写像。
    field_values: {collaboration_process_id: collaboration-process-31, status: active, started_at: 2026-07-16T01:00:00Z}

    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-collaboration-process-010

