schema: moonweave.ai/ontology-node/v1
id: CollaborationProcess
kind: concept
status: review
labels:
  zh: 协作过程
  en: collaboration process
  ja: 協働プロセス
semantics:
  short_definition:
    zh: 协作过程是两个或多个责任参与方为共同工作目标交换工作、控制或结果的协调活动。
    en: A collaboration process is a coordination activity in which two or more accountable participants exchange work, control, or results for a shared work objective.
    ja: 協働プロセスは、二者以上の責任主体が共通の作業目標に向けて作業、制御、または結果を交換する調整活動です。
  definition:
    zh: 协作过程是两个或多个责任参与方为共同工作目标交换工作、控制或结果的协调活动。 它只规定参与方之间存在可追踪的协作进程；委派与移交是其中具有更窄成立条件的两种过程。
    en: A collaboration process is a coordination activity in which two or more accountable participants exchange work, control, or results for a shared work objective. It establishes a traceable course of cooperation between participants; delegation and handoff are narrower process kinds with additional identity conditions.
    ja: 協働プロセスは、二者以上の責任主体が共通の作業目標に向けて作業、制御、または結果を交換する調整活動です。 参加主体間に追跡可能な協働の進行があることだけを定め、委任と引き継ぎはさらに限定された同一性条件を持つ下位過程です。
  why_needed:
    zh: 该上位概念让委派与移交共享协作语义，同时阻止所有多智能体消息都被误判为委派。
    en: This genus lets delegation and handoff share collaboration semantics without classifying every multi-agent message exchange as delegation.
    ja: この上位概念は委任と引き継ぎに協働意味を共有させつつ、すべてのマルチエージェント通信を委任と誤分類することを防ぎます。
  includes:
    - zh: 纳入有共同工作目标、至少两个可识别责任方且过程进展可追踪的协作。
      en: Includes cooperation with a shared work objective, at least two identifiable accountable parties, and traceable progress.
      ja: 共通作業目標、二者以上の識別可能な責任主体、追跡可能な進行を備える協働を含みます。
  excludes:
    - zh: 排除单一智能体的内部推理以及没有工作或控制交换的消息广播。
      en: Excludes one agent's internal reasoning and message broadcasts that exchange neither work nor control.
      ja: 単一エージェントの内部推論、および作業も制御も交換しないメッセージ配信を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - collaboration_process_id
  fields:
    - id: collaboration_process_id
      labels:
        zh: 协作过程 ID
        en: collaboration-process ID
        ja: 協働プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识该协作进程。
        en: Uniquely identifies the collaboration process.
        ja: 協働プロセスを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: collaboration-process-31
      source_claims:
        - claim-collaboration-process-002
    - id: status
      labels:
        zh: 过程状态
        en: process status
        ja: プロセス状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录协作进程是否已计划、活动、暂停或结束。
        en: Records whether the collaboration process is planned, active, paused, or ended.
        ja: 協働プロセスが計画中、活動中、停止中、終了済みかを記録します。
      allowed_values:
        - id: CollaborationProcess-status-planned
          value: planned
          labels:
            zh: 已计划
            en: planned
            ja: 計画済み
          definitions:
            zh: 协作范围和参与方已经确定，但任何参与方尚未开始交换工作、控制或结果。
            en: The collaboration scope and participants are fixed, but no participant has begun exchanging work, control, or results.
            ja: 協働範囲と参加主体は確定していますが、作業・制御・結果の交換はまだ開始されていません。
          status: accepted
          source_claims:
            - claim-collaboration-process-003
        - id: CollaborationProcess-status-active
          value: active
          labels:
            zh: 进行中
            en: active
            ja: 活動中
          definitions:
            zh: 至少两个责任参与方正在为共同目标交换工作、控制或结果，且协作过程尚未结束。
            en: At least two accountable participants are exchanging work, control, or results for the shared objective, and the collaboration has not ended.
            ja: 少なくとも二つの責任主体が共通目標のために作業・制御・結果を交換しており、協働は終了していません。
          status: accepted
          source_claims:
            - claim-collaboration-process-004
        - id: CollaborationProcess-status-paused
          value: paused
          labels:
            zh: 已暂停
            en: paused
            ja: 一時停止
          definitions:
            zh: 协作过程仍保留原有身份和恢复意图，但参与方之间的工作、控制或结果交换已暂时停止。
            en: The collaboration retains its identity and an intention to resume, but exchanges of work, control, or results are temporarily suspended.
            ja: 協働の同一性と再開意図は保持されていますが、参加主体間の作業・制御・結果の交換は一時停止しています。
          status: accepted
          source_claims:
            - claim-collaboration-process-005
        - id: CollaborationProcess-status-ended
          value: ended
          labels:
            zh: 已结束
            en: ended
            ja: 終了済み
          definitions:
            zh: 协作过程已经达到完成、取消或其他终止条件，不再接收属于该进程的新协作动作。
            en: The collaboration has met a completion, cancellation, or other termination condition and accepts no new collaborative action in that process.
            ja: 協働は完了・取消・その他の終了条件に達しており、そのプロセスに属する新たな協働行為を受け付けません。
          status: accepted
          source_claims:
            - claim-collaboration-process-006
      pattern: null
      example_value: active
      source_claims:
        - claim-collaboration-process-007
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录参与方开始共同工作进程的时间。
        en: Records when the participants began the shared course of work.
        ja: 参加主体が共同作業を開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:00Z
      source_claims:
        - claim-collaboration-process-008
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录协作进程正式结束的时间；活动进程可为空。
        en: Records formal end time; it is absent while the process remains active.
        ja: 正式終了時刻を記録し、活動中は未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-collaboration-process-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: CollaborationProcess-example-positive-manual-2026
    kind: positive
    labels:
      zh: 协作过程正例
      en: Positive collaboration process case
      ja: 協働プロセスの正例
    scenario_id: null
    descriptions:
      zh: 协调器把退款调查分给专家，专家返回证据，协调器继续承担最终答复责任；这形成可追踪的协作进程。
      en: A coordinator assigns a refund investigation to a specialist, receives evidence, and retains final-answer accountability; this forms a traceable collaboration process.
      ja: 調整役が返金調査を専門家へ割り当て、証拠を受け取り、最終回答責任を保持するため、追跡可能な協働プロセスが成立します。
    field_values:
      collaboration_process_id: collaboration-process-31
      status: active
      started_at: 2026-07-16T01:00:00Z
    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    expected_result:
      zh: 该记录应被识别为 CollaborationProcess，并保留其字段、边界与上位关系。
      en: The record is accepted as CollaborationProcess with its fields, boundary, and parent relation preserved.
      ja: この記録を CollaborationProcess として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 协作过程是两个或多个责任参与方为共同工作目标交换工作、控制或结果的协调活动。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A collaboration process is a coordination activity in which two or more accountable participants exchange work, control, or results for a shared work objective."
      ja: この場面は次の同一性条件を満たします：協働プロセスは、二者以上の責任主体が共通の作業目標に向けて作業、制御、または結果を交換する調整活動です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-collaboration-process-010
  - id: CollaborationProcess-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 协作过程边界例
      en: Boundary collaboration process case
      ja: 協働プロセスの境界例
    scenario_id: null
    descriptions:
      zh: 两个代理仅订阅同一公告主题但没有共同工作目标、责任交换或结果回传，因此不是本概念实例。
      en: Two agents merely subscribe to the same announcement topic with no shared work objective, responsibility exchange, or returned result, so no collaboration process is identified.
      ja: 二つのエージェントが同じ告知トピックを購読するだけで、共通作業目標、責任交換、結果返却がない場合は本概念に該当しません。
    field_values: {}
    related_node_ids:
      - CollaborationProcess
    related_relation_ids: []
    expected_result:
      zh: 该对象不得被归为 CollaborationProcess，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as CollaborationProcess or acquire missing conditions from nearby facts.
      ja: この対象を CollaborationProcess に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除单一智能体的内部推理以及没有工作或控制交换的消息广播。
      en: "The case violates this reviewed exclusion boundary: Excludes one agent's internal reasoning and message broadcasts that exchange neither work nor control."
      ja: この例は審査済み除外境界に反します：単一エージェントの内部推論、および作業も制御も交換しないメッセージ配信を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-collaboration-process-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-orchestration-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Agents handoffs/multi-agent、A2A Task 与 Agent Card、CrewAI/AutoGen 协作、Contract Net 选择与 PROV-O 活动/委派语义逐项核验；委派与移交边界、过程→阶段→事件层级及来源主张（含 design-inference）均成立。
    en: Semantics, hierarchy, relations, structure, and examples were checked against OpenAI Agents handoffs/multi-agent orchestration, A2A tasks and Agent Cards, CrewAI/AutoGen collaboration, Contract Net selection, and PROV-O activity/delegation semantics; delegation versus handoff boundaries and the process-to-phase-to-event hierarchy hold, including design-inference source claims.
    ja: OpenAI Agents handoffs/multi-agent・A2A Task/Agent Card・CrewAI/AutoGen 協働・Contract Net 選択・PROV-O activity/delegation semantics に照らし semantics/hierarchy/relations/structure/examples を項目別確認しました。委任と引き継ぎの境界、process→phase→event 階層、design-inference source claim は成立します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
