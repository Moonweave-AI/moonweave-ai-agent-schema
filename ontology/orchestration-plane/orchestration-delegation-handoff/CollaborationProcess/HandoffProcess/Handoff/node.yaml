schema: moonweave.ai/ontology-node/v1
id: Handoff
kind: concept
status: review
labels:
  zh: 移交事件
  en: handoff event
  ja: 引き継ぎイベント
semantics:
  short_definition:
    zh: 移交事件是在一个移交过程中使下一步控制由来源方转向接收方的瞬时事件。
    en: A handoff event is the instantaneous event within a handoff process that makes next-step control pass from source to recipient.
    ja: 引き継ぎイベントは、引き継ぎプロセス内で次段階制御を移管元から受領者へ移す瞬時イベントです。
  definition:
    zh: Handoff 是 HandoffProcess 中使下一步控制权从来源参与者转移到接收者的可观测转移事件。它记录来源、接收者、责任范围、上下文引用与生效时间；过程可以包含准备与确认，而事件只标记转移真正生效的瞬间。
    en: A Handoff is the observable transfer event within a HandoffProcess that makes next-step control pass from a source participant to a recipient. It records source, recipient, responsibility scope, context reference, and effective time; the process may include preparation and confirmation, while the event marks the instant activation becomes effective.
    ja: Handoff は HandoffProcess 内で次 step の制御を source participant から recipient へ移す observable transfer event です。source、recipient、責任範囲、context reference、発効時刻を記録し、process が準備と確認を含み得る一方、この event は移転が実際に発効した瞬間を示します。
  why_needed:
    zh: 该节点让控制改变具备一个可审计时点，并与持续的 HandoffProcess 和信息型 ResponsibilityTransfer 分离。
    en: The node gives control change an auditable instant and separates it from the continuing HandoffProcess and informational ResponsibilityTransfer record.
    ja: 制御変更に監査可能な時点を与え、継続する HandoffProcess と情報記録 ResponsibilityTransfer から分離します。
  includes:
    - zh: 纳入接收方开始控制同一任务、会话或运行状态下一步的生效事件。
      en: Includes the effective event at which a recipient begins controlling the next step of the same task, conversation, or runtime state.
      ja: 受領者が同じタスク、会話、実行状態の次段階を制御し始める有効イベントを含みます。
  excludes:
    - zh: 排除给专家创建独立工作项的委派、只传输上下文的复制，以及尚未生效的移交提议。
      en: Excludes delegation that creates separate work, context copying without control transfer, and handoff proposals not yet effective.
      ja: 独立作業を作る委任、制御移転のないコンテキスト複製、未発効の引き継ぎ提案を除外します。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - handoff_event_id
  fields:
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次使移交控制实际生效的事件。
        en: Uniquely identifies one event that makes a transfer of control effective.
        ja: 制御移転を実際に発効させる一つのイベントを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: handoff-001
      source_claims:
        - claim-handoff-002
    - id: handoff_process_id
      labels:
        zh: 移交过程 ID
        en: handoff-process ID
        ja: 引継プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含准备、确认和生效步骤的移交过程。
        en: References the handoff process that contains preparation, confirmation, and effectiveness stages.
        ja: 準備、確認、発効段階を含む引継ぎプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: HandoffProcess:001
      source_claims:
        - claim-handoff-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录接收方取得下一步控制的 UTC 生效时刻。
        en: Records the UTC instant at which the recipient obtained next-step control.
        ja: 受取側が次手制御を得た UTC 発効時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-handoff-004
    - id: source_actor_id
      labels:
        zh: 移交方
        en: source actor
        ja: 引継元
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交前承担下一步控制的来源主体。
        en: References the source actor that held next-step control immediately before the handoff.
        ja: 引継ぎ直前に次手制御を保持していた移行元主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-handoff-005
    - id: target_actor_id
      labels:
        zh: 接收方
        en: target actor
        ja: 引継先
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后取得下一步控制的接收主体。
        en: References the recipient actor that obtains next-step control when the handoff becomes effective.
        ja: 引継ぎ発効時に次手制御を得る受取主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-handoff-006
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明随控制移交而进入责任裁定的进行中工作范围；它不暗示所有责任均已转移。
        en: Describes the ongoing-work scope whose responsibility is adjudicated with the control transfer; it does not imply all accountability moved.
        ja: 制御移転とともに責任を裁定する進行中作業範囲を示し、全責任の移転は意味しません。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-handoff-007
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用接收方继续该项工作所获得的有界委派上下文。
        en: References the bounded delegation context made available so the recipient can continue the work.
        ja: 受取側が作業を継続するために渡された範囲付き委任コンテキストを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContext:001
      source_claims:
        - claim-handoff-008
  constraints:
    - id: handoff-actors-distinct
      severity: error
      expression_language: plain
      expression: source_actor_id differs from target_actor_id
      explanations:
        zh: 移交方与接收方必须不同。
        en: The source and target actors of a handoff differ.
        ja: 引継元と引継先は異ならなければなりません。
      source_claims:
        - claim-handoff-009
  required_relation_constraints:
    - id: handoff-event-of-process
      direction: incoming
      predicate: has_handoff_event
      target_concept_id: HandoffProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_handoff_event 保持与 HandoffProcess 的实例级语义约束。
        en: Handoff must preserve its instance-level has_handoff_event constraint with HandoffProcess.
        ja: Handoff は HandoffProcess とのインスタンスレベル has_handoff_event 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-010
    - id: handoff-has-transfer-record
      direction: outgoing
      predicate: has_transfer_record
      target_concept_id: ResponsibilityTransfer
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_transfer_record 保持与 ResponsibilityTransfer 的实例级语义约束。
        en: Handoff must preserve its instance-level has_transfer_record constraint with ResponsibilityTransfer.
        ja: Handoff は ResponsibilityTransfer とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-011
examples:
  - id: Handoff-example-positive-manual-2026
    kind: positive
    labels:
      zh: 移交事件正例
      en: Positive handoff event case
      ja: 引き継ぎイベントの正例
    scenario_id: null
    descriptions:
      zh: support-agent 发出 transfer_to_refund，refund-agent 从该事件时点开始拥有同一会话的下一步控制。
      en: support-agent issues transfer_to_refund, and refund-agent obtains next-step control of the same conversation at that event time.
      ja: support-agent が transfer_to_refund を発行し、そのイベント時点から refund-agent が同じ会話の次段階制御を得ます。
    field_values:
      handoff_event_id: handoff-001
      handoff_process_id: HandoffProcess:001
      occurred_at: 2026-07-15T01:30:00Z
      source_actor_id: Actor:orchestrator-001
      target_actor_id: Actor:worker-007
      responsibility_scope: task control
    related_node_ids:
      - Handoff
      - HandoffProcess
    related_relation_ids:
      - HandoffProcess-has_event-Handoff
    expected_result:
      zh: 该记录应被识别为 Handoff，并保留其字段、边界与上位关系。
      en: The record is accepted as Handoff with its fields, boundary, and parent relation preserved.
      ja: この記録を Handoff として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 移交事件是在一个移交过程中使下一步控制由来源方转向接收方的瞬时事件。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A handoff event is the instantaneous event within a handoff process that makes next-step control pass from source to recipient."
      ja: この場面は次の同一性条件を満たします：引き継ぎイベントは、引き継ぎプロセス内で次段階制御を移管元から受領者へ移す瞬時イベントです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-handoff-012
  - id: Handoff-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 移交事件边界例
      en: Boundary handoff event case
      ja: 引き継ぎイベントの境界例
    scenario_id: null
    descriptions:
      zh: support-agent 向 refund-agent 发送一份摘要供咨询，但仍自行决定下一步；这不是移交事件。
      en: support-agent sends refund-agent a summary for consultation but continues deciding every next step; no handoff event occurs.
      ja: support-agent が相談用要約を送っても次段階を自ら決め続ける場合、引き継ぎイベントは発生しません。
    field_values: {}
    related_node_ids:
      - Handoff
      - HandoffProcess
    related_relation_ids:
      - HandoffProcess-has_event-Handoff
    expected_result:
      zh: 该对象不得被归为 Handoff，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as Handoff or acquire missing conditions from nearby facts.
      ja: この対象を Handoff に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除给专家创建独立工作项的委派、只传输上下文的复制，以及尚未生效的移交提议。
      en: "The case violates this reviewed exclusion boundary: Excludes delegation that creates separate work, context copying without control transfer, and handoff proposals not yet effective."
      ja: この例は審査済み除外境界に反します：独立作業を作る委任、制御移転のないコンテキスト複製、未発効の引き継ぎ提案を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-handoff-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: HandoffProcess-has_event-Handoff
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has handoff event
    en: has handoff event
    ja: has handoff event
  definitions:
    zh: 移交过程以组成关系拥有标记该过程控制转移生效时点的移交事件。
    en: A handoff process compositionally contains the handoff event marking when that process's control transfer becomes effective.
    ja: 引き継ぎプロセスは制御移転の有効時点を示す引き継ぎイベントを構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其移交事件
      en: handoff event of
      ja: 引き継ぎイベントである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: HandoffProcess-has_event-Handoff-example-positive-manual-2026
      kind: positive
      labels:
        zh: HandoffProcess-has_event-Handoff正例
        en: Positive case for HandoffProcess-has_event-Handoff
        ja: HandoffProcess-has_event-Handoff の正例
      scenario_id: null
      descriptions:
        zh: handoff-process-8 包含 handoff-event-8，事件时点 refund-agent-4 接管控制。
        en: handoff-process-8 contains handoff-event-8, when refund-agent-4 takes control.
        ja: handoff-process-8 が refund-agent-4 の制御取得時点 handoff-event-8 を含みます。
      field_values: {}
      related_node_ids:
        - HandoffProcess
        - Handoff
      related_relation_ids:
        - HandoffProcess-has_event-Handoff
      expected_result:
        zh: 应保存 HandoffProcess → Handoff 的 has_handoff_event 事实，并保留限定信息。
        en: Store the has_handoff_event fact from HandoffProcess to Handoff with its qualifiers.
        ja: HandoffProcess から Handoff への has_handoff_event 事実と限定情報を保存します。
      why_valid_or_invalid:
        zh: 场景直接满足关系定义：移交过程以组成关系拥有标记该过程控制转移生效时点的移交事件。
        en: "The case directly satisfies the relation definition: A handoff process compositionally contains the handoff event marking when that process's control transfer becomes effective."
        ja: この例は関係定義を直接満たします：引き継ぎプロセスは制御移転の有効時点を示す引き継ぎイベントを構成要素として持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-handoff-014
    - id: HandoffProcess-has_event-Handoff-example-boundary-manual-2026
      kind: boundary
      labels:
        zh: HandoffProcess-has_event-Handoff边界例
        en: Boundary case for HandoffProcess-has_event-Handoff
        ja: HandoffProcess-has_event-Handoff の境界例
      scenario_id: null
      descriptions:
        zh: 另一会话的 Handoff 事件虽目标相同，但不属于该移交过程，不能作为其组成。
        en: A Handoff event from another conversation has the same target but belongs to a different process and is not this component.
        ja: 別会話の Handoff は同じ対象でも別過程に属し、本プロセスの構成ではありません。
      field_values: {}
      related_node_ids:
        - HandoffProcess
        - Handoff
      related_relation_ids:
        - HandoffProcess-has_event-Handoff
      expected_result:
        zh: 不得建立 HandoffProcess-has_event-Handoff；场景缺少该关系定义要求的成立条件。
        en: Do not assert HandoffProcess-has_event-Handoff; the case lacks a condition required by the relation definition.
        ja: HandoffProcess-has_event-Handoff を主張せず、関係定義に必要な成立条件が不足しています。
      why_valid_or_invalid:
        zh: 该边界例刻意缺少 has_handoff_event 所表达的身份、顺序或治理条件。
        en: The boundary deliberately lacks the identity, ordering, or governance condition expressed by has_handoff_event.
        ja: この境界例は has_handoff_event が表す同一性、順序、統治条件を意図的に欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-handoff-015
  source_claims:
    - claim-handoff-016
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
