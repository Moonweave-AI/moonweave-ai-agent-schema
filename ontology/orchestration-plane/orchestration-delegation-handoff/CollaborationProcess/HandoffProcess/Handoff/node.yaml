schema: moonweave.ai/ontology-node/v1
id: Handoff
kind: concept
labels:
  zh: 移交事件
  en: handoff event
  ja: 引き継ぎイベント
semantics:
  short_definition:
    zh: 移交事件是在一个移交过程中使下一步控制由来源方转向接收方的瞬时事件。
    en: A handoff event is the instantaneous event within a handoff process that makes next-step control pass from source to recipient.
    ja: 引き継ぎイベントは、引き継ぎプロセス内で次段階制御を移管元から受領者へ移す瞬時イベントです。
  definition:
    zh: Handoff 是 HandoffProcess 中使下一步控制权从来源参与者转移到接收者的可观测转移事件。它记录来源、接收者、责任范围、上下文引用与生效时间；过程可以包含准备与确认，而事件只标记转移真正生效的瞬间。
    en: A Handoff is the observable transfer event within a HandoffProcess that makes next-step control pass from a source participant to a recipient. It records source, recipient, responsibility scope, context reference, and effective time; the process may include preparation and confirmation, while the event marks the instant activation becomes effective.
    ja: Handoff は HandoffProcess 内で次 step の制御を source participant から recipient へ移す observable transfer event です。source、recipient、責任範囲、context reference、発効時刻を記録し、process が準備と確認を含み得る一方、この event は移転が実際に発効した瞬間を示します。
  why_needed:
    zh: 该节点让控制改变具备一个可审计时点，并与持续的 HandoffProcess 和信息型 ResponsibilityTransfer 分离。
    en: The node gives control change an auditable instant and separates it from the continuing HandoffProcess and informational ResponsibilityTransfer record.
    ja: 制御変更に監査可能な時点を与え、継続する HandoffProcess と情報記録 ResponsibilityTransfer から分離します。
  includes:
    - zh: 纳入接收方开始控制同一任务、会话或运行状态下一步的生效事件。
      en: Includes the effective event at which a recipient begins controlling the next step of the same task, conversation, or runtime state.
      ja: 受領者が同じタスク、会話、実行状態の次段階を制御し始める有効イベントを含みます。
  excludes:
    - zh: 排除给专家创建独立工作项的委派、只传输上下文的复制，以及尚未生效的移交提议。
      en: Excludes delegation that creates separate work, context copying without control transfer, and handoff proposals not yet effective.
      ja: 独立作業を作る委任、制御移転のないコンテキスト複製、未発効の引き継ぎ提案を除外します。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: >-
      Handoff 事件在 transfer_to_agent 或 Agents SDK handoff 回调生效瞬间写入：记录 source、recipient、
      responsibility_scope 与 effective_at。它不是 HandoffProcess 全过程；A2A SendMessage alone 不构成 Handoff，
      除非本地适配器确认控制已转移。
    en: >-
      Handoff event writes at the instant transfer_to_agent or Agents SDK handoff callback becomes effective: records source,
      recipient, responsibility_scope, and effective_at. It is not the entire HandoffProcess; A2A SendMessage alone is not a
      Handoff unless a local adapter confirms control transferred.
    ja: >-
      Handoff event は transfer_to_agent または Agents SDK handoff callback 発効 instant に書き込む。source、recipient、
      responsibility_scope、effective_at を記録する。HandoffProcess 全体ではない。A2A SendMessage 単体は local adapter が
      control transfer を確認しない限り Handoff にならない。
  typical_input:
    - description:
        zh: 控制转移生效时的来源、接收者与责任范围。
        en: Source, recipient, and responsibility scope at control-transfer activation.
        ja: control transfer 発効時の source、recipient、responsibility scope。
      format: |-
        {"handoff_event_id":"handoff-event-771","source_binding_ref":"binding-triage-1","recipient_binding_ref":"binding-specialist-2","responsibility_scope":"next_user_turn","context_ref":"dctx-771","effective_at":"2026-07-16T09:20:00Z"}
  typical_output:
    - description:
        zh: 被 HandoffProcess 与 ResponsibilityTransfer 引用的生效移交事件记录。
        en: Effective handoff event record referenced by HandoffProcess and ResponsibilityTransfer.
        ja: HandoffProcess と ResponsibilityTransfer が参照する effective handoff event record。
      format: |-
        {"handoff_event_ref":"handoff-event-771","handoff_process_ref":"handoff-771","responsibility_transfer_ref":"rt-771","next_controller":"binding-specialist-2"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents instantaneous control transfer to another agent.
    - name: OpenAI Agents SDK multi-agent orchestration
      url: https://openai.github.io/openai-agents-python/multi_agent/
      description: Documents orchestrated handoffs within multi-agent sessions.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol messaging that may accompany but not define handoff events.
  source_claims:
    - claim-handoff-event-001
    - claim-handoff-event-002
structure:
  identity_keys:
    - handoff_event_id
  fields:
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次使移交控制实际生效的事件。
        en: Uniquely identifies one event that makes a transfer of control effective.
        ja: 制御移転を実際に発効させる一つのイベントを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: handoff-001
      source_claims:
        - claim-handoff-002
    - id: handoff_process_id
      labels:
        zh: 移交过程 ID
        en: handoff-process ID
        ja: 引継プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含准备、确认和生效步骤的移交过程。
        en: References the handoff process that contains preparation, confirmation, and effectiveness stages.
        ja: 準備、確認、発効段階を含む引継ぎプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: HandoffProcess:001
      source_claims:
        - claim-handoff-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录接收方取得下一步控制的 UTC 生效时刻。
        en: Records the UTC instant at which the recipient obtained next-step control.
        ja: 受取側が次手制御を得た UTC 発効時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-handoff-004
    - id: source_actor_id
      labels:
        zh: 移交方
        en: source actor
        ja: 引継元
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交前承担下一步控制的来源主体。
        en: References the source actor that held next-step control immediately before the handoff.
        ja: 引継ぎ直前に次手制御を保持していた移行元主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-handoff-005
    - id: target_actor_id
      labels:
        zh: 接收方
        en: target actor
        ja: 引継先
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后取得下一步控制的接收主体。
        en: References the recipient actor that obtains next-step control when the handoff becomes effective.
        ja: 引継ぎ発効時に次手制御を得る受取主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-handoff-006
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明随控制移交而进入责任裁定的进行中工作范围；它不暗示所有责任均已转移。
        en: Describes the ongoing-work scope whose responsibility is adjudicated with the control transfer; it does not imply all accountability moved.
        ja: 制御移転とともに責任を裁定する進行中作業範囲を示し、全責任の移転は意味しません。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-handoff-007
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用接收方继续该项工作所获得的有界委派上下文。
        en: References the bounded delegation context made available so the recipient can continue the work.
        ja: 受取側が作業を継続するために渡された範囲付き委任コンテキストを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContext:001
      source_claims:
        - claim-handoff-008
  constraints:
    - id: handoff-actors-distinct
      severity: error
      expression_language: plain
      expression: source_actor_id differs from target_actor_id
      explanations:
        zh: 移交方与接收方必须不同。
        en: The source and target actors of a handoff differ.
        ja: 引継元と引継先は異ならなければなりません。
      source_claims:
        - claim-handoff-009
  required_relation_constraints:
    - id: handoff-event-of-process
      direction: incoming
      predicate: has_handoff_event
      target_concept_id: HandoffProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_handoff_event 保持与 HandoffProcess 的实例级语义约束。
        en: Handoff must preserve its instance-level has_handoff_event constraint with HandoffProcess.
        ja: Handoff は HandoffProcess とのインスタンスレベル has_handoff_event 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-010
    - id: handoff-has-transfer-record
      direction: outgoing
      predicate: has_transfer_record
      target_concept_id: ResponsibilityTransfer
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_transfer_record 保持与 ResponsibilityTransfer 的实例级语义约束。
        en: Handoff must preserve its instance-level has_transfer_record constraint with ResponsibilityTransfer.
        ja: Handoff は ResponsibilityTransfer とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-011
examples:
  - id: Handoff-example-positive-manual-2026
    labels:
      zh: Handoff positive
      en: Handoff positive
      ja: Handoff positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 Handoff：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps Handoff: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が Handoff 多 agent 協調に写像。
    field_values: {handoff_event_id: handoff-001, handoff_process_id: HandoffProcess:001, occurred_at: 2026-07-15T01:30:00Z, source_actor_id: Actor:orchestrator-001, target_actor_id: Actor:worker-007, responsibility_scope: "task control"}

    related_node_ids:
      - Handoff
      - HandoffProcess
    related_relation_ids:
      - HandoffProcess-has_event-Handoff
    source_claims:
      - claim-handoff-012

  - id: Handoff-example-boundary-manual-2026
    labels:
      zh: Handoff boundary
      en: Handoff boundary
      ja: Handoff boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 Handoff 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not Handoff work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で Handoff work_specification ではない。
    field_values: {}

    related_node_ids:
      - Handoff
      - HandoffProcess
    related_relation_ids:
      - HandoffProcess-has_event-Handoff
    source_claims:
      - claim-handoff-013

  - id: Handoff-example-counterexample-confusable
    labels:
      zh: Handoff counterexample
      en: Handoff counterexample
      ja: Handoff counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 Handoff RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style Handoff RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 Handoff ではない。
    field_values: {handoff_id: absent, responsibility_transfer_ref: absent, scope_ref: absent}

    related_node_ids:
      - Handoff
      - ResponsibilityTransfer
      - A2AMessage
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-012

  - id: Handoff-example-instance-concrete
    labels:
      zh: Handoff instance
      en: Handoff instance
      ja: Handoff instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 Handoff DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to Handoff DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が Handoff に写像。
    field_values: {handoff_event_id: handoff-001, handoff_process_id: HandoffProcess:001, occurred_at: 2026-07-15T01:30:00Z, source_actor_id: Actor:orchestrator-001, target_actor_id: Actor:worker-007, responsibility_scope: "task control"}

    related_node_ids:
      - Handoff
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-012

