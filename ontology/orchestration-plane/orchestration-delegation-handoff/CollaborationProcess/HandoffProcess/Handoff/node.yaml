schema: moonweave.ai/ontology-node/v1
id: Handoff
kind: concept
labels:
  zh: 移交事件
  en: handoff event
  ja: 引き継ぎイベント
semantics:
  short_definition:
    zh: 使进行中工作的控制归属在特定时点从来源方转移到接收方的事件。
    en: Event that transfers control ownership of ongoing work from source to recipient at a specific instant.
    ja: 特定時点に ongoing work の control ownership を source から recipient へ移す event。
  definition:
    zh: Handoff 以 handoff_event_id、occurred_at、source_actor_id、target_actor_id 与 context_id 标识一次生效的控制转移事件。OpenAI transfer_to_* 工具调用返回、A2A task ownership 变更消息是 canonical 集成点；它是 HandoffProcess 内的生效事件，并应产生 ResponsibilityTransfer 记录。
    en: Handoff is identified by handoff_event_id, occurred_at, source_actor_id, target_actor_id, and context_id as one effective control-transfer event. OpenAI transfer_to_* tool call return and A2A task ownership change messages are canonical integration points; it is the effectiveness event within HandoffProcess and should produce ResponsibilityTransfer.
    ja: Handoff は OpenAI transfer_to_* / A2A ownership change の occurrence event。ResponsibilityTransfer を生成。
  why_needed:
    zh: 提供控制转移的精确时点证据，支持 HandoffProcess 状态重建。
    en: Provides precise-instant evidence for control transfer supporting HandoffProcess state reconstruction.
    ja: control transfer の precise instant evidence。
  includes:
    - zh: 纳入接收方开始控制同一任务、会话或运行状态下一步的生效事件。
      en: Includes the effective event at which a recipient begins controlling the next step of the same task, conversation, or runtime state.
      ja: 受領者が同じタスク、会話、実行状態の次段階を制御し始める有効イベントを含みます。
  excludes:
    - zh: 排除给专家创建独立工作项的委派、只传输上下文的复制，以及尚未生效的移交提议。
      en: Excludes delegation that creates separate work, context copying without control transfer, and handoff proposals not yet effective.
      ja: 独立作業を作る委任、制御移転のないコンテキスト複製、未発効の引き継ぎ提案を除外します。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 每次 transfer_to_* 成功返回 append Handoff event；context_id 引用 filtered 会话上下文；ResponsibilityTransfer 紧随其后写入。
    en: Each successful transfer_to_* return appends Handoff event; context_id references filtered conversation context; ResponsibilityTransfer follows.
    ja: transfer_to_* 成功ごとに Handoff event append。
  typical_input:
    - description: OpenAI transfer event.
      format: ToolCall(name="transfer_to_billing_agent", result="Transferred")
      source_claims:
        - claim-handoff-design
  typical_output:
    - description: Moonweave Handoff event.
      format: '{"handoff_event_id":"handoff-8","occurred_at":"2026-07-16T02:01:30Z"}'
      source_claims:
        - claim-handoff-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - handoff_event_id
  fields:
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次使移交控制实际生效的事件。
        en: Uniquely identifies one event that makes a transfer of control effective.
        ja: 制御移転を実際に発効させる一つのイベントを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: handoff-001
      source_claims:
        - claim-handoff-design
    - id: handoff_process_id
      labels:
        zh: 移交过程 ID
        en: handoff-process ID
        ja: 引継プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含准备、确认和生效步骤的移交过程。
        en: References the handoff process that contains preparation, confirmation, and effectiveness stages.
        ja: 準備、確認、発効段階を含む引継ぎプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: HandoffProcess:001
      source_claims:
        - claim-handoff-design
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录接收方取得下一步控制的 UTC 生效时刻。
        en: Records the UTC instant at which the recipient obtained next-step control.
        ja: 受取側が次手制御を得た UTC 発効時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-handoff-design
    - id: source_actor_id
      labels:
        zh: 移交方
        en: source actor
        ja: 引継元
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交前承担下一步控制的来源主体。
        en: References the source actor that held next-step control immediately before the handoff.
        ja: 引継ぎ直前に次手制御を保持していた移行元主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-handoff-design
    - id: target_actor_id
      labels:
        zh: 接收方
        en: target actor
        ja: 引継先
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后取得下一步控制的接收主体。
        en: References the recipient actor that obtains next-step control when the handoff becomes effective.
        ja: 引継ぎ発効時に次手制御を得る受取主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-handoff-design
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明随控制移交而进入责任裁定的进行中工作范围；它不暗示所有责任均已转移。
        en: Describes the ongoing-work scope whose responsibility is adjudicated with the control transfer; it does not imply all accountability moved.
        ja: 制御移転とともに責任を裁定する進行中作業範囲を示し、全責任の移転は意味しません。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-handoff-design
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用接收方继续该项工作所获得的有界委派上下文。
        en: References the bounded delegation context made available so the recipient can continue the work.
        ja: 受取側が作業を継続するために渡された範囲付き委任コンテキストを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContext:001
      source_claims:
        - claim-handoff-design
  constraints:
    - id: handoff-actors-distinct
      severity: error
      expression_language: plain
      expression: source_actor_id differs from target_actor_id
      explanations:
        zh: 移交方与接收方必须不同。
        en: The source and target actors of a handoff differ.
        ja: 引継元と引継先は異ならなければなりません。
      source_claims:
        - claim-handoff-design
  required_relation_constraints:
    - id: handoff-event-of-process
      direction: incoming
      predicate: has_handoff_event
      target_concept_id: HandoffProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_handoff_event 保持与 HandoffProcess 的实例级语义约束。
        en: Handoff must preserve its instance-level has_handoff_event constraint with HandoffProcess.
        ja: Handoff は HandoffProcess とのインスタンスレベル has_handoff_event 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-design
    - id: handoff-has-transfer-record
      direction: outgoing
      predicate: has_transfer_record
      target_concept_id: ResponsibilityTransfer
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: Handoff 必须通过 has_transfer_record 保持与 ResponsibilityTransfer 的实例级语义约束。
        en: Handoff must preserve its instance-level has_transfer_record constraint with ResponsibilityTransfer.
        ja: Handoff は ResponsibilityTransfer とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-handoff-design
examples:
  - id: Handoff-example-openai-transfer
    labels:
      zh: OpenAI transfer 事件
      en: OpenAI transfer event
      ja: OpenAI transfer event
    descriptions:
      zh: transfer_to_refund_agent 在 02:01:30Z 生效。
      en: transfer_to_refund_agent effective at 02:01:30Z.
      ja: transfer_to_refund_agent 02:01:30Z 発効。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: transfer_to_*
    field_values:
      handoff_event_id: handoff-8
      occurred_at: 2026-07-16T02:01:30Z
      source_actor_id: AgentActor:support-2
      target_actor_id: AgentActor:refund-4
    related_node_ids:
      - Handoff
      - HandoffProcess
      - ResponsibilityTransfer
    related_relation_ids: []
    source_claims:
      - claim-handoff-design
  - id: Handoff-example-a2a-ownership
    labels:
      zh: A2A ownership 事件
      en: A2A ownership event
      ja: A2A ownership event
    descriptions:
      zh: Task ownership 变更消息标记 handoff 生效。
      en: Task ownership change message marks handoff effective.
      ja: Task ownership 変更 message が handoff 発効。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: ownership transfer
    field_values:
      handoff_event_id: handoff-a2a-3
    related_node_ids:
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-handoff-design
  - id: Handoff-example-langgraph
    labels:
      zh: LangGraph 转移事件
      en: LangGraph transfer event
      ja: LangGraph transfer event
    descriptions:
      zh: Command(goto="billing_agent") 执行时刻记录 handoff。
      en: Command(goto="billing_agent") execution instant records handoff.
      ja: Command(goto="billing_agent") 実行時刻が handoff。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Command
    field_values:
      handoff_event_id: handoff-lg-1
    related_node_ids:
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-handoff-design
  - id: Handoff-example-boundary-delegation-event
    labels:
      zh: 委派事件不是 Handoff
      en: Delegation event is not Handoff
      ja: delegation event は Handoff ではない
    descriptions:
      zh: DelegationEvent initiated/accepted 不改变会话 next-step 控制者，不是 Handoff。
      en: DelegationEvent initiated/accepted does not change session next-step controller; not Handoff.
      ja: DelegationEvent は session next-step controller を変えない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Handoff
      - DelegationEvent
    related_relation_ids: []
    source_claims:
      - claim-handoff-design
parent_relation:
  id: HandoffProcess-has_event-Handoff
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has handoff event
    en: has handoff event
    ja: has handoff event
  definitions:
    zh: 移交过程以组成关系拥有标记该过程控制转移生效时点的移交事件。
    en: A handoff process compositionally contains the handoff event marking when that process's control transfer becomes effective.
    ja: 引き継ぎプロセスは制御移転の有効時点を示す引き継ぎイベントを構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其移交事件
      en: handoff event of
      ja: 引き継ぎイベントである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-handoff-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: Handoff-transfers_control_to-AgentActor
    predicate: transfers_control_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: transfers control to
      en: transfers control to
      ja: transfers control to
    definitions:
      zh: 移交事件把同一进行中工作的下一步控制转给一个可识别的智能体参与者。
      en: A handoff event transfers next-step control of the same ongoing work to an identifiable agent actor.
      ja: 引き継ぎイベントは同じ進行中作業の次段階制御を識別可能なエージェント主体へ移します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: receives_control_from
      labels:
        zh: 从其接收控制
        en: receives control from
        ja: 制御を受け取る
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Handoff 只转移契约范围内的下一步控制；AgentActor 身份继续由运行时本体拥有，任何敏感操作仍需适用授权决定。
        en: Handoff transfers only next-step control within contract scope; AgentActor identity remains runtime-owned and sensitive action still requires applicable authorization.
        ja: Handoff は契約範囲内の次段階制御だけを移し、AgentActor 同一性は実行時本体に残り、機微操作には適用権限が必要です。
      protocol_or_resource_context:
        zh: 跨域事实保留 handoff 事件 ID、接收 AgentActor ID、责任范围与生效时间，不把角色或授权定义复制进本模块。
        en: The cross-domain fact preserves handoff event ID, recipient AgentActor ID, responsibility scope, and effective time without copying role or authorization definitions into this module.
        ja: ドメイン横断事実は handoff イベント ID、受領 AgentActor ID、責任範囲、有効時刻を保持し、役割・権限定義を本モジュールへ複製しません。
    constraints: []
    source_claims:
      - claim-handoff-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AgentActor
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-handoff-design
    source: delegation-handoff-design
    supports: Handoff is effective control-transfer event within HandoffProcess.
    locator: Handoff boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-handoff-design
    source: openai-agents-sdk
    supports: OpenAI transfer_to_* maps to Handoff event.
    locator: transfer_to_*
    evidence_kind: design-inference
    confidence: high
  - id: claim-handoff-design
    source: a2a-protocol
    supports: A2A task ownership change maps to Handoff.
    locator: Task ownership
    evidence_kind: design-inference
    confidence: high
  - id: claim-handoff-design
    source: langgraph
    supports: LangGraph control goto maps to Handoff.
    locator: Command handoff
    evidence_kind: design-inference
    confidence: high
