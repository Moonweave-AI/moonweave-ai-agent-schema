schema: moonweave.ai/ontology-node/v1
id: ResponsibilityTransfer
kind: concept
status: review
labels:
  zh: 责任转移记录
  en: responsibility-transfer record
  ja: 責任移転記録
semantics:
  short_definition:
    zh: 责任转移记录说明一次移交后哪些责任从原承担者转由新承担者负责。
    en: A responsibility-transfer record states which responsibilities moved from a prior bearer to a new bearer after one handoff.
    ja: 責任移転記録は、一件の引き継ぎ後にどの責任が従前担当者から新担当者へ移ったかを示します。
  definition:
    zh: 责任转移记录说明一次移交后哪些责任从原承担者转由新承担者负责。 它记录移交事件、责任范围、前后所有者、生效时间以及保留与排除范围；它是转移事实的记录，不是引发转移的事件。
    en: A responsibility-transfer record states which responsibilities moved from a prior bearer to a new bearer after one handoff. It records handoff event, responsibility scope, prior and new owners, effective time, and retained or excluded scope; it describes the transfer rather than causing it.
    ja: 責任移転記録は、一件の引き継ぎ後にどの責任が従前担当者から新担当者へ移ったかを示します。 引き継ぎイベント、責任範囲、旧新所有者、有効時刻、保持・除外範囲を記録し、転移を起こすイベントではなく転移事実の記録です。
  why_needed:
    zh: 该节点支持回答控制、最终答复、审计或资源责任究竟转移了哪些，而不把 Handoff 事件本身当作责任清单。
    en: The node answers which control, final-answer, audit, or resource responsibilities moved without treating the Handoff event as the responsibility ledger.
    ja: 制御、最終回答、監査、資源責任の何が移ったかを回答し、Handoff イベントを責任台帳として扱いません。
  includes:
    - zh: 纳入可列明前后责任承担者、转移范围、生效时点和未转移责任的记录。
      en: Includes records that identify prior and new bearers, transferred scope, effective time, and responsibilities not transferred.
      ja: 旧新責任主体、移転範囲、有効時刻、非移転責任を特定する記録を含みます。
  excludes:
    - zh: 排除仅表示控制切换时点的 Handoff，也排除没有前后责任承担者的普通路由决定。
      en: Excludes Handoff as the activation event and ordinary routing decisions with no prior and new responsibility bearers.
      ja: 有効化イベント Handoff と、旧新責任主体を持たない通常のルーティング決定を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - responsibility_transfer_id
  fields:
    - id: responsibility_transfer_id
      labels:
        zh: 转移记录 ID
        en: transfer-record ID
        ja: 移転記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次移交之后形成的责任变化记录。
        en: Uniquely identifies one record of responsibility changes established by a handoff.
        ja: 一回の引継ぎで成立した責任変更記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: responsibility-transfer-001
      source_claims:
        - claim-responsibility-transfer-002
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用使该责任变化生效的唯一移交事件。
        en: References the single handoff event that made this responsibility change effective.
        ja: この責任変更を発効させた一つの引継ぎイベントを参照します。
      allowed_values: []
      pattern: null
      example_value: Handoff:001
      source_claims:
        - claim-responsibility-transfer-003
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明从原承担者转移到新承担者的具体职责或工作范围。
        en: States the specific duties or work scope transferred from the previous bearer to the new bearer.
        ja: 以前の保持者から新しい保持者へ移った具体的職務または作業範囲を示します。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-responsibility-transfer-004
    - id: previous_owner_id
      labels:
        zh: 原所有者
        en: previous owner
        ja: 旧所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效前承担该责任范围的主体。
        en: References the actor that bore the responsibility scope immediately before the handoff became effective.
        ja: 引継ぎ発効直前にその責任範囲を負っていた主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-responsibility-transfer-005
    - id: new_owner_id
      labels:
        zh: 新所有者
        en: new owner
        ja: 新所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后承担该责任范围的主体。
        en: References the actor that bears the responsibility scope after the handoff becomes effective.
        ja: 引継ぎ発効後にその責任範囲を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-responsibility-transfer-006
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录责任范围从原承担者转至新承担者的 UTC 时刻。
        en: Records the UTC instant at which the responsibility scope moved from the previous bearer to the new bearer.
        ja: 責任範囲が以前の保持者から新しい保持者へ移った UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-responsibility-transfer-007
    - id: retained_scope
      labels:
        zh: 保留范围
        en: retained scope
        ja: 保持範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明原承担者在移交后继续保留的责任，防止把部分移交解释为全面免责。
        en: Lists responsibilities retained by the previous bearer after handoff so a partial transfer is not read as full release.
        ja: 部分移転を全面免責と解釈しないよう、引継ぎ後も以前の保持者が保つ責任を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - final answer
      source_claims:
        - claim-responsibility-transfer-008
    - id: excluded_scope
      labels:
        zh: 排除范围
        en: excluded scope
        ja: 除外範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明明确不属于本次移交的职责或资源范围。
        en: Lists duties or resource scopes explicitly excluded from this transfer.
        ja: この移転から明示的に除外される職務または資源範囲を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - billing authority
      source_claims:
        - claim-responsibility-transfer-009
  constraints:
    - id: responsibility-transfer-owner-change
      severity: error
      expression_language: plain
      expression: previous_owner_id differs from new_owner_id
      explanations:
        zh: 原所有者与新所有者必须不同。
        en: A responsibility transfer changes the owner.
        ja: 責任移転では所有者が変わります。
      source_claims:
        - claim-responsibility-transfer-010
  required_relation_constraints:
    - id: transfer-record-of-handoff
      direction: incoming
      predicate: has_transfer_record
      target_concept_id: Handoff
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: ResponsibilityTransfer 必须通过 has_transfer_record 保持与 Handoff 的实例级语义约束。
        en: ResponsibilityTransfer must preserve its instance-level has_transfer_record constraint with Handoff.
        ja: ResponsibilityTransfer は Handoff とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-responsibility-transfer-011
examples:
  - id: ResponsibilityTransfer-example-positive-manual-2026
    kind: positive
    labels:
      zh: 责任转移记录正例
      en: Positive responsibility-transfer record case
      ja: 責任移転記録の正例
    scenario_id: null
    descriptions:
      zh: 移交记录表明退款代理接管下一步控制和审计日志责任，但最终退款授权仍由人工审批者保留。
      en: The transfer record says the refund agent receives next-step control and audit-log duty while final refund authorization remains with a human approver.
      ja: 移転記録は返金代理が次段階制御と監査ログ責任を受け、最終返金承認は人間承認者に残ると示します。
    field_values:
      responsibility_transfer_id: responsibility-transfer-001
      handoff_event_id: Handoff:001
      responsibility_scope: task control
      previous_owner_id: Actor:orchestrator-001
      new_owner_id: Actor:worker-007
      effective_at: 2026-07-15T01:30:00Z
    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids:
      - Handoff-has_transfer_record-ResponsibilityTransfer
    expected_result:
      zh: 该记录应被识别为 ResponsibilityTransfer，并保留其字段、边界与上位关系。
      en: The record is accepted as ResponsibilityTransfer with its fields, boundary, and parent relation preserved.
      ja: この記録を ResponsibilityTransfer として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 责任转移记录说明一次移交后哪些责任从原承担者转由新承担者负责。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A responsibility-transfer record states which responsibilities moved from a prior bearer to a new bearer after one handoff."
      ja: この場面は次の同一性条件を満たします：責任移転記録は、一件の引き継ぎ後にどの責任が従前担当者から新担当者へ移ったかを示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-responsibility-transfer-012
  - id: ResponsibilityTransfer-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 责任转移记录边界例
      en: Boundary responsibility-transfer record case
      ja: 責任移転記録の境界例
    scenario_id: null
    descriptions:
      zh: 路由器把消息送给退款队列但没有记录原责任方、新责任方或范围，因此没有责任转移记录。
      en: A router sends a message to a refund queue but records no prior bearer, new bearer, or scope, so no responsibility-transfer record exists.
      ja: ルータが返金キューへメッセージを送っても旧新責任主体や範囲を記録しない場合、責任移転記録はありません。
    field_values: {}
    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids:
      - Handoff-has_transfer_record-ResponsibilityTransfer
    expected_result:
      zh: 该对象不得被归为 ResponsibilityTransfer，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as ResponsibilityTransfer or acquire missing conditions from nearby facts.
      ja: この対象を ResponsibilityTransfer に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除仅表示控制切换时点的 Handoff，也排除没有前后责任承担者的普通路由决定。
      en: "The case violates this reviewed exclusion boundary: Excludes Handoff as the activation event and ordinary routing decisions with no prior and new responsibility bearers."
      ja: この例は審査済み除外境界に反します：有効化イベント Handoff と、旧新責任主体を持たない通常のルーティング決定を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-responsibility-transfer-013
