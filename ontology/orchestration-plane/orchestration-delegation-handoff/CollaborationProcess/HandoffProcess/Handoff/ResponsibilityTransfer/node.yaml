schema: moonweave.ai/ontology-node/v1
id: ResponsibilityTransfer
kind: concept
labels:
  zh: 责任转移记录
  en: responsibility-transfer record
  ja: 責任移転記録
semantics:
  short_definition:
    zh: Handoff 事件导致的责任范围从上一承担者转移到新承担者的记录。
    en: Record of responsibility scope moving from previous bearer to new bearer due to a Handoff event.
    ja: Handoff event により responsibility scope が previous bearer から new bearer へ移った record。
  definition:
    zh: ResponsibilityTransfer 绑定 handoff_event_id、responsibility_scope、previous_owner_id、new_owner_id、effective_at 与 retained/excluded_scope。OpenAI handoff 后 next-response 责任随 control 转移；A2A task ownership 变更同理。它是 Handoff 的结构化责任证据，不是 HandoffProcess 或 DelegationOwnership。
    en: ResponsibilityTransfer binds handoff_event_id, responsibility_scope, previous_owner_id, new_owner_id, effective_at, and retained/excluded_scope. After OpenAI handoff, next-response responsibility moves with control; A2A task ownership change is analogous. It is structured responsibility evidence for Handoff, not HandoffProcess or DelegationOwnership.
    ja: ResponsibilityTransfer は Handoff の structured responsibility evidence。next-response 責任の移転を記録。
  why_needed:
    zh: 精确记录 Handoff 后谁承担下一步响应责任以及保留/排除范围。
    en: Precisely records who bears next-step response responsibility after Handoff and retained/excluded scopes.
    ja: Handoff 後 next-step response 責任と retained/excluded scope を記録。
  includes:
    - zh: 纳入可列明前后责任承担者、转移范围、生效时点和未转移责任的记录。
      en: Includes records that identify prior and new bearers, transferred scope, effective time, and responsibilities not transferred.
      ja: 旧新責任主体、移転範囲、有効時刻、非移転責任を特定する記録を含みます。
  excludes:
    - zh: 排除仅表示控制切换时点的 Handoff，也排除没有前后责任承担者的普通路由决定。
      en: Excludes Handoff as the activation event and ordinary routing decisions with no prior and new responsibility bearers.
      ja: 有効化イベント Handoff と、旧新責任主体を持たない通常のルーティング決定を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 每条 Handoff 应产生至少一条 ResponsibilityTransfer；retained_scope 可记录来源方保留的监督/审计责任。
    en: Each Handoff should produce at least one ResponsibilityTransfer; retained_scope may record source-retained oversight/audit duty.
    ja: Handoff ごとに ResponsibilityTransfer 必須。
  typical_input:
    - description: Transfer record.
      format: '{"previous_owner_id":"support-2","new_owner_id":"refund-4","responsibility_scope":"next-response"}'
      source_claims:
        - claim-responsibility-transfer-design
  typical_output:
    - description: Moonweave ResponsibilityTransfer.
      format: '{"responsibility_transfer_id":"transfer-8"}'
      source_claims:
        - claim-responsibility-transfer-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - responsibility_transfer_id
  fields:
    - id: responsibility_transfer_id
      labels:
        zh: 转移记录 ID
        en: transfer-record ID
        ja: 移転記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次移交之后形成的责任变化记录。
        en: Uniquely identifies one record of responsibility changes established by a handoff.
        ja: 一回の引継ぎで成立した責任変更記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: responsibility-transfer-001
      source_claims:
        - claim-responsibility-transfer-design
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用使该责任变化生效的唯一移交事件。
        en: References the single handoff event that made this responsibility change effective.
        ja: この責任変更を発効させた一つの引継ぎイベントを参照します。
      allowed_values: []
      pattern: null
      example_value: Handoff:001
      source_claims:
        - claim-responsibility-transfer-design
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明从原承担者转移到新承担者的具体职责或工作范围。
        en: States the specific duties or work scope transferred from the previous bearer to the new bearer.
        ja: 以前の保持者から新しい保持者へ移った具体的職務または作業範囲を示します。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-responsibility-transfer-design
    - id: previous_owner_id
      labels:
        zh: 原所有者
        en: previous owner
        ja: 旧所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效前承担该责任范围的主体。
        en: References the actor that bore the responsibility scope immediately before the handoff became effective.
        ja: 引継ぎ発効直前にその責任範囲を負っていた主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-responsibility-transfer-design
    - id: new_owner_id
      labels:
        zh: 新所有者
        en: new owner
        ja: 新所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后承担该责任范围的主体。
        en: References the actor that bears the responsibility scope after the handoff becomes effective.
        ja: 引継ぎ発効後にその責任範囲を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-responsibility-transfer-design
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录责任范围从原承担者转至新承担者的 UTC 时刻。
        en: Records the UTC instant at which the responsibility scope moved from the previous bearer to the new bearer.
        ja: 責任範囲が以前の保持者から新しい保持者へ移った UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-responsibility-transfer-design
    - id: retained_scope
      labels:
        zh: 保留范围
        en: retained scope
        ja: 保持範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明原承担者在移交后继续保留的责任，防止把部分移交解释为全面免责。
        en: Lists responsibilities retained by the previous bearer after handoff so a partial transfer is not read as full release.
        ja: 部分移転を全面免責と解釈しないよう、引継ぎ後も以前の保持者が保つ責任を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - final answer
      source_claims:
        - claim-responsibility-transfer-design
    - id: excluded_scope
      labels:
        zh: 排除范围
        en: excluded scope
        ja: 除外範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明明确不属于本次移交的职责或资源范围。
        en: Lists duties or resource scopes explicitly excluded from this transfer.
        ja: この移転から明示的に除外される職務または資源範囲を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - billing authority
      source_claims:
        - claim-responsibility-transfer-design
  constraints:
    - id: responsibility-transfer-owner-change
      severity: error
      expression_language: plain
      expression: previous_owner_id differs from new_owner_id
      explanations:
        zh: 原所有者与新所有者必须不同。
        en: A responsibility transfer changes the owner.
        ja: 責任移転では所有者が変わります。
      source_claims:
        - claim-responsibility-transfer-design
  required_relation_constraints:
    - id: transfer-record-of-handoff
      direction: incoming
      predicate: has_transfer_record
      target_concept_id: Handoff
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: ResponsibilityTransfer 必须通过 has_transfer_record 保持与 Handoff 的实例级语义约束。
        en: ResponsibilityTransfer must preserve its instance-level has_transfer_record constraint with Handoff.
        ja: ResponsibilityTransfer は Handoff とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-responsibility-transfer-design
examples:
  - id: ResponsibilityTransfer-example-openai
    labels:
      zh: OpenAI 责任转移
      en: OpenAI responsibility transfer
      ja: OpenAI responsibility transfer
    descriptions:
      zh: Support→refund handoff 后 refund agent 承担 next-response 责任。
      en: After support→refund handoff, refund agent bears next-response responsibility.
      ja: support→refund 後 refund agent が next-response 責任。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoff
    field_values:
      responsibility_transfer_id: transfer-8
      previous_owner_id: AgentActor:support-2
      new_owner_id: AgentActor:refund-4
      responsibility_scope: next-response
    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-design
  - id: ResponsibilityTransfer-example-a2a
    labels:
      zh: A2A ownership 责任
      en: A2A ownership responsibility
      ja: A2A ownership responsibility
    descriptions:
      zh: Task ownership 转至 billing agent，next-response 责任同步转移。
      en: Task ownership moves to billing agent; next-response responsibility transfers accordingly.
      ja: Task ownership billing agent へ next-response 責任移転。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: ownership
    field_values:
      responsibility_transfer_id: transfer-a2a-3
    related_node_ids:
      - ResponsibilityTransfer
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-design
  - id: ResponsibilityTransfer-example-retained
    labels:
      zh: 保留监督责任
      en: Retained oversight
      ja: retained oversight
    descriptions:
      zh: Handoff 后来源方 retained_scope 含 escalation 监督。
      en: After handoff, source retained_scope includes escalation oversight.
      ja: Handoff 後 source retained_scope に escalation oversight。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: retained scope
    field_values:
      retained_scope:
        - escalation-oversight
    related_node_ids:
      - ResponsibilityTransfer
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-design
  - id: ResponsibilityTransfer-example-boundary-delegation
    labels:
      zh: 委派归属不是转移
      en: Delegation ownership is not transfer
      ja: delegation ownership は transfer ではない
    descriptions:
      zh: DelegationOwnership 记录委派分派责任，不表示 Handoff 控制转移。
      en: DelegationOwnership records delegation assignment responsibility, not Handoff control transfer.
      ja: DelegationOwnership は Handoff control transfer ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ResponsibilityTransfer
      - DelegationOwnership
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-design
parent_relation:
  id: Handoff-has_transfer_record-ResponsibilityTransfer
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has transfer record
    en: has transfer record
    ja: has transfer record
  definitions:
    zh: 移交事件以组成关系拥有说明该事件前后责任承担者、范围与保留项的责任转移记录。
    en: A handoff event compositionally contains the responsibility-transfer record describing prior and new bearers, scope, and retained duties.
    ja: 引き継ぎイベントは旧新責任主体、範囲、保持責任を示す責任移転記録を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其转移记录
      en: transfer record of
      ja: 移転記録である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-responsibility-transfer-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
