schema: moonweave.ai/ontology-node/v1
id: ResponsibilityTransfer
kind: concept
labels:
  zh: 责任转移记录
  en: responsibility-transfer record
  ja: 責任移転記録
semantics:
  short_definition:
    zh: 移交后责任从前承担者转给新承担者的记录。
    en: Record of responsibilities that moved between bearers after a handoff.
    ja: 引き継ぎ後に責任が旧新担当者間で移った記録。
  definition:
    zh: 责任转移记录说明一次移交后哪些责任从原承担者转由新承担者负责。 它记录移交事件、责任范围、前后所有者、生效时间以及保留与排除范围；它是转移事实的记录，不是引发转移的事件。
    en: A responsibility-transfer record states which responsibilities moved from a prior bearer to a new bearer after one handoff. It records handoff event, responsibility scope, prior and new owners, effective time, and retained or excluded scope; it describes the transfer rather than causing it.
    ja: 責任移転記録は、一件の引き継ぎ後にどの責任が従前担当者から新担当者へ移ったかを示します。 引き継ぎイベント、責任範囲、旧新所有者、有効時刻、保持・除外範囲を記録し、転移を起こすイベントではなく転移事実の記録です。
  why_needed:
    zh: 该节点支持回答控制、最终答复、审计或资源责任究竟转移了哪些，而不把 Handoff 事件本身当作责任清单。
    en: The node answers which control, final-answer, audit, or resource responsibilities moved without treating the Handoff event as the responsibility ledger.
    ja: 制御、最終回答、監査、資源責任の何が移ったかを回答し、Handoff イベントを責任台帳として扱いません。
  includes:
    - zh: 纳入可列明前后责任承担者、转移范围、生效时点和未转移责任的记录。
      en: Includes records that identify prior and new bearers, transferred scope, effective time, and responsibilities not transferred.
      ja: 旧新責任主体、移転範囲、有効時刻、非移転責任を特定する記録を含みます。
  excludes:
    - zh: 排除仅表示控制切换时点的 Handoff，也排除没有前后责任承担者的普通路由决定。
      en: Excludes Handoff as the activation event and ordinary routing decisions with no prior and new responsibility bearers.
      ja: 有効化イベント Handoff と、旧新責任主体を持たない通常のルーティング決定を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      ResponsibilityTransfer 在 Handoff 生效后写入：对比 prior_owner 与 new_owner 的责任范围快照。OpenAI Agents SDK
      handoff 元数据可填充 scope 字段；W3C PROV-O 关联 Agent 与 Activity 责任链。A2A Task metadata 不能替代该
      信息记录。
    en: >-
      ResponsibilityTransfer writes after Handoff becomes effective, contrasting prior_owner and new_owner responsibility-scope
      snapshots. OpenAI Agents SDK handoff metadata may populate scope fields; W3C PROV-O associates Agents with Activity
      accountability. A2A Task metadata cannot replace this informational record.
    ja: >-
      ResponsibilityTransfer は Handoff 発効後に書き込み prior_owner と new_owner の responsibility-scope snapshot を対比する。
      OpenAI Agents SDK handoff metadata が scope field を fill できる。W3C PROV-O は Agent と Activity accountability を
      関連付ける。A2A Task metadata はこの information record を置き換えられない。
  typical_input:
    - description:
        zh: Handoff 事件与前后责任承担者及范围。
        en: Handoff event with prior and new responsibility bearers and scopes.
        ja: prior/new responsibility bearer と scope を持つ Handoff event。
      format: |-
        {"responsibility_transfer_id":"rt-771","handoff_event_ref":"handoff-event-771","prior_owner_ref":"binding-triage-1","new_owner_ref":"binding-specialist-2","transferred_scope":"specialist_resolution","retained_scope":"audit_trail"}
  typical_output:
    - description:
        zh: 与 Handoff 对齐的可审计责任转移记录。
        en: Auditable responsibility-transfer record aligned with Handoff.
        ja: Handoff と aligned した auditable responsibility-transfer record。
      format: |-
        {"responsibility_transfer_ref":"rt-771","effective_at":"2026-07-16T09:20:00Z","accountable_binding_ref":"binding-specialist-2","handoff_event_ref":"handoff-event-771"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents responsibility metadata across agent handoffs.
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#Agent
      description: Documents accountable agents for transferred activities.
    - name: A2A Protocol Task
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol tasks separate from responsibility transfer records.
  source_claims:
    - claim-responsibility-transfer-001
    - claim-responsibility-transfer-002
structure:
  identity_keys:
    - responsibility_transfer_id
  fields:
    - id: responsibility_transfer_id
      labels:
        zh: 转移记录 ID
        en: transfer-record ID
        ja: 移転記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次移交之后形成的责任变化记录。
        en: Uniquely identifies one record of responsibility changes established by a handoff.
        ja: 一回の引継ぎで成立した責任変更記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: responsibility-transfer-001
      source_claims:
        - claim-responsibility-transfer-002
    - id: handoff_event_id
      labels:
        zh: 移交事件 ID
        en: handoff-event ID
        ja: 引継イベント ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用使该责任变化生效的唯一移交事件。
        en: References the single handoff event that made this responsibility change effective.
        ja: この責任変更を発効させた一つの引継ぎイベントを参照します。
      allowed_values: []
      pattern: null
      example_value: Handoff:001
      source_claims:
        - claim-responsibility-transfer-003
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列明从原承担者转移到新承担者的具体职责或工作范围。
        en: States the specific duties or work scope transferred from the previous bearer to the new bearer.
        ja: 以前の保持者から新しい保持者へ移った具体的職務または作業範囲を示します。
      allowed_values: []
      pattern: null
      example_value: task control
      source_claims:
        - claim-responsibility-transfer-004
    - id: previous_owner_id
      labels:
        zh: 原所有者
        en: previous owner
        ja: 旧所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效前承担该责任范围的主体。
        en: References the actor that bore the responsibility scope immediately before the handoff became effective.
        ja: 引継ぎ発効直前にその責任範囲を負っていた主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-responsibility-transfer-005
    - id: new_owner_id
      labels:
        zh: 新所有者
        en: new owner
        ja: 新所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用移交生效后承担该责任范围的主体。
        en: References the actor that bears the responsibility scope after the handoff becomes effective.
        ja: 引継ぎ発効後にその責任範囲を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-responsibility-transfer-006
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录责任范围从原承担者转至新承担者的 UTC 时刻。
        en: Records the UTC instant at which the responsibility scope moved from the previous bearer to the new bearer.
        ja: 責任範囲が以前の保持者から新しい保持者へ移った UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:30:00Z
      source_claims:
        - claim-responsibility-transfer-007
    - id: retained_scope
      labels:
        zh: 保留范围
        en: retained scope
        ja: 保持範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明原承担者在移交后继续保留的责任，防止把部分移交解释为全面免责。
        en: Lists responsibilities retained by the previous bearer after handoff so a partial transfer is not read as full release.
        ja: 部分移転を全面免責と解釈しないよう、引継ぎ後も以前の保持者が保つ責任を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - final answer
      source_claims:
        - claim-responsibility-transfer-008
    - id: excluded_scope
      labels:
        zh: 排除范围
        en: excluded scope
        ja: 除外範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列明明确不属于本次移交的职责或资源范围。
        en: Lists duties or resource scopes explicitly excluded from this transfer.
        ja: この移転から明示的に除外される職務または資源範囲を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - billing authority
      source_claims:
        - claim-responsibility-transfer-009
  constraints:
    - id: responsibility-transfer-owner-change
      severity: error
      expression_language: plain
      expression: previous_owner_id differs from new_owner_id
      explanations:
        zh: 原所有者与新所有者必须不同。
        en: A responsibility transfer changes the owner.
        ja: 責任移転では所有者が変わります。
      source_claims:
        - claim-responsibility-transfer-010
  required_relation_constraints:
    - id: transfer-record-of-handoff
      direction: incoming
      predicate: has_transfer_record
      target_concept_id: Handoff
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: ResponsibilityTransfer 必须通过 has_transfer_record 保持与 Handoff 的实例级语义约束。
        en: ResponsibilityTransfer must preserve its instance-level has_transfer_record constraint with Handoff.
        ja: ResponsibilityTransfer は Handoff とのインスタンスレベル has_transfer_record 制約を保持しなければなりません。
      source_claims:
        - claim-responsibility-transfer-011
examples:
  - id: ResponsibilityTransfer-example-positive-manual-2026
    labels:
      zh: ResponsibilityTransfer positive
      en: ResponsibilityTransfer positive
      ja: ResponsibilityTransfer positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 ResponsibilityTransfer：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps ResponsibilityTransfer: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が ResponsibilityTransfer 多 agent 協調に写像。
    field_values: {responsibility_transfer_id: responsibility-transfer-001, handoff_event_id: Handoff:001, responsibility_scope: "task control", previous_owner_id: Actor:orchestrator-001, new_owner_id: Actor:worker-007, effective_at: 2026-07-15T01:30:00Z}

    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids:
      - Handoff-has_transfer_record-ResponsibilityTransfer
    source_claims:
      - claim-responsibility-transfer-012

  - id: ResponsibilityTransfer-example-boundary-manual-2026
    labels:
      zh: ResponsibilityTransfer boundary
      en: ResponsibilityTransfer boundary
      ja: ResponsibilityTransfer boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 ResponsibilityTransfer 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not ResponsibilityTransfer work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で ResponsibilityTransfer work_specification ではない。
    field_values: {}

    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids:
      - Handoff-has_transfer_record-ResponsibilityTransfer
    source_claims:
      - claim-responsibility-transfer-013

  - id: ResponsibilityTransfer-example-counterexample-confusable
    labels:
      zh: ResponsibilityTransfer counterexample
      en: ResponsibilityTransfer counterexample
      ja: ResponsibilityTransfer counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 ResponsibilityTransfer RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style ResponsibilityTransfer RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 ResponsibilityTransfer ではない。
    field_values: {transfer_id: absent, from_binding_ref: absent, to_binding_ref: absent}

    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
      - ControlOwnership
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-012

  - id: ResponsibilityTransfer-example-instance-concrete
    labels:
      zh: ResponsibilityTransfer instance
      en: ResponsibilityTransfer instance
      ja: ResponsibilityTransfer instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 ResponsibilityTransfer DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to ResponsibilityTransfer DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が ResponsibilityTransfer に写像。
    field_values: {responsibility_transfer_id: responsibility-transfer-001, handoff_event_id: Handoff:001, responsibility_scope: "task control", previous_owner_id: Actor:orchestrator-001, new_owner_id: Actor:worker-007, effective_at: 2026-07-15T01:30:00Z}

    related_node_ids:
      - ResponsibilityTransfer
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-responsibility-transfer-012

