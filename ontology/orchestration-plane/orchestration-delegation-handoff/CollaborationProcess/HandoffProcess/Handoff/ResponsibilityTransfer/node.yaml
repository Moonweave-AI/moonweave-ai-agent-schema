    evidence_kind: design-inference
    confidence: high
  - id: claim-responsibility-transfer-design
    source: openai-agents-sdk
    supports: OpenAI handoff control transfer maps to ResponsibilityTransfer.
    locator: Handoffs
    evidence_kind: design-inference
    confidence: high
  - id: claim-responsibility-transfer-design
    source: a2a-protocol
    supports: A2A task ownership change maps to ResponsibilityTransfer.
    locator: Task ownership
