schema: moonweave.ai/ontology-node/v1
id: HandoffProcess
kind: concept
labels:
  zh: 移交过程
  en: handoff process
  ja: 引き継ぎプロセス
semantics:
  short_definition:
    zh: 进行中工作上把下一步控制与相应责任从当前承担者转给接收者的协作过程。
    en: Collaboration process transferring next-step control and corresponding responsibility for ongoing work from current bearer to recipient.
    ja: ongoing work の next-step control/responsibility を current bearer から recipient へ移す collaboration process。
  definition:
    zh: HandoffProcess 继承 CollaborationProcess，以 source_binding_id、target_binding_id、work_item_id、handoff_state 为移交种差。OpenAI handoff() / transfer_to_* 在会话中把控制交给另一 agent 是 canonical 映射；A2A 任务 ownership 转移若改变下一步控制者亦映射于此。Cursor Task 子代理委派（新工作项）属于 DelegationProcess 而非 HandoffProcess。
    en: HandoffProcess inherits CollaborationProcess with source_binding_id, target_binding_id, work_item_id, and handoff_state as handoff differentia. OpenAI handoff()/transfer_to_* transferring session control to another agent is the canonical mapping; A2A task ownership transfer that changes next-step controller also maps here. Cursor Task subagent delegation (new work item) belongs to DelegationProcess, not HandoffProcess.
    ja: HandoffProcess は OpenAI handoff()/transfer_to_* が canonical。同一 ongoing work の control 移転。
  why_needed:
    zh: 防止把持续控制移交流程与单个事件或新工作委派混淆。
    en: Prevents confusing sustained control transfer with one event or new work delegation.
    ja: control transfer workflow と single event/new delegation を分離。
  includes:
    - zh: 纳入对进行中任务、会话或运行状态具有明确来源方、接收方和生效条件的控制转交。
      en: Includes transfer of an ongoing task, conversation, or runtime state with identified source, recipient, and activation condition.
      ja: 進行中タスク、会話、実行状態について、移管元、受領者、有効化条件が特定された制御移転を含みます。
  excludes:
    - zh: 排除尚未开始的新工作分派，也排除只复制上下文而不改变下一步控制者的操作。
      en: Excludes assignment of new work that has not begun and context copying that does not change who controls the next step.
      ja: 未開始の新規作業割当と、次段階の制御者を変えないコンテキスト複製を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "OpenAI: transfer_to_billing_agent 生效 → HandoffProcess.handoff_state=effective + Handoff event。A2A: task ownership 变更 API → HandoffProcess。LangGraph Command(goto=agent) 若转移同一会话控制亦映射。input_filter 约束 Handoff 上下文但不构成 HandoffProcess 本身。"
    en: "OpenAI: transfer_to_billing_agent effective → HandoffProcess.handoff_state=effective + Handoff event. A2A: task ownership change → HandoffProcess. LangGraph Command(goto=agent) transferring same-session control also maps. input_filter constrains Handoff context but is not HandoffProcess itself."
    ja: OpenAI transfer_to_* → HandoffProcess + Handoff event。
  typical_input:
    - description: OpenAI handoff invocation.
      format: handoff(billing_agent) → transfer_to_billing_agent tool call
      source_claims:
        - claim-handoff-process-design
  typical_output:
    - description: Moonweave HandoffProcess.
      format: '{"collaboration_process_id":"collaboration-handoff-8","handoff_state":"effective"}'
      source_claims:
        - claim-handoff-process-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: source_binding_id
      labels:
        zh: 来源方角色绑定
        en: source role binding
        ja: 移管元役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向移交前控制下一步的责任绑定。
        en: References the accountable binding controlling the next step before handoff.
        ja: 引き継ぎ前に次段階を制御する責任バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:support-2
      source_claims:
        - claim-handoff-process-design
    - id: target_binding_id
      labels:
        zh: 接收方角色绑定
        en: recipient role binding
        ja: 受領者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向移交后接管下一步的责任绑定。
        en: References the accountable binding that takes next-step control.
        ja: 引き継ぎ後に次段階制御を得る責任バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:refund-4
      source_claims:
        - claim-handoff-process-design
    - id: work_item_id
      labels:
        zh: 进行中工作项
        en: ongoing work item
        ja: 進行中作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向控制被转交的同一进行中工作。
        en: References the same ongoing work whose control is transferred.
        ja: 制御が移転される同一の進行中作業を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:refund-42
      source_claims:
        - claim-handoff-process-design
    - id: handoff_state
      labels:
        zh: 移交专用状态
        en: handoff-specific state
        ja: 引き継ぎ固有状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录移交准备、等待确认、已生效或已取消。
        en: Records whether handoff is preparing, awaiting confirmation, effective, or canceled.
        ja: 引き継ぎが準備中、確認待ち、有効、取消かを記録します。
      allowed_values:
        - id: HandoffProcess-handoff_state-preparing
          value: preparing
          labels:
            zh: 准备中
            en: preparing
            ja: 準備中
          definitions:
            zh: 来源方正在确定接收方、移交工作和上下文包，下一步控制与相应责任尚未发生转移。
            en: The source is identifying the recipient, transferred work, and context package; next-step control and responsibility have not moved.
            ja: 移管元が受領者・移管作業・コンテキスト包を確定中で、次段階の制御と責任はまだ移転していません。
          source_claims:
            - claim-handoff-process-design
        - id: HandoffProcess-handoff_state-awaiting-confirmation
          value: awaiting-confirmation
          labels:
            zh: 等待确认
            en: awaiting confirmation
            ja: 確認待ち
          definitions:
            zh: 来源方已经发出移交提议，但接收方尚未确认接受；在确认前，下一步控制仍由来源方承担。
            en: The source has issued a handoff proposal, but the recipient has not accepted it; next-step control remains with the source until confirmation.
            ja: 移管元は引継ぎ提案を発行しましたが受領者は未受諾であり、確認までは次段階の制御を移管元が保持します。
          source_claims:
            - claim-handoff-process-design
        - id: HandoffProcess-handoff_state-effective
          value: effective
          labels:
            zh: 已生效
            en: effective
            ja: 発効済み
          definitions:
            zh: 接收方已经确认接受，下一步控制与相应责任已在记录的生效时点从来源方转移给接收方。
            en: The recipient has accepted, and next-step control with corresponding responsibility transferred from source to recipient at the recorded effective time.
            ja: 受領者が受諾し、記録された発効時点に次段階の制御と対応責任が移管元から受領者へ移転しています。
          source_claims:
            - claim-handoff-process-design
        - id: HandoffProcess-handoff_state-canceled
          value: canceled
          labels:
            zh: 已取消
            en: canceled
            ja: 取消済み
          definitions:
            zh: 待生效的移交在接收方取得控制前被撤回或失效，因此没有发生下一步控制与责任的转移。
            en: The pending handoff was withdrawn or invalidated before the recipient obtained control, so no next-step control or responsibility transferred.
            ja: 受領者が制御を得る前に保留中の引継ぎが撤回または失効し、次段階の制御と責任は移転していません。
          source_claims:
            - claim-handoff-process-design
      pattern: null
      example_value: effective
      source_claims:
        - claim-handoff-process-design
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 有効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录接收方实际取得下一步控制的时间。
        en: Records when the recipient actually obtains next-step control.
        ja: 受領者が実際に次段階制御を得た時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:01:30Z
      source_claims:
        - claim-handoff-process-design
  constraints:
    - id: handoff-specific-state-refines-process-status
      severity: error
      expression_language: plain
      expression: inherited process status is active when handoff_state is preparing or awaiting-confirmation, and ended when handoff_state is effective or canceled
      explanations:
        zh: 通用过程状态与移交专用状态必须一致：准备中或等待确认映射为 active，已生效或已取消映射为 ended。
        en: "Generic process status and handoff-specific state must agree: preparing or awaiting-confirmation maps to active, while effective or canceled maps to ended."
        ja: 汎用プロセス状態と引き継ぎ固有状態を一致させ、準備中・確認待ちは active、有効・取消は ended に対応させます。
      source_claims:
        - claim-handoff-process-design
    - id: handoff-effective-state-requires-transfer-event
      severity: error
      expression_language: plain
      expression: effective_at is present exactly when handoff_state is effective and the process has an associated Handoff event
      explanations:
        zh: 只有接收方实际取得下一步控制并留下 Handoff 生效事件时，移交专用状态才可为 effective 且记录 effective_at。
        en: The handoff-specific state may be effective, with effective_at recorded, only when the recipient actually takes next-step control and an effective Handoff event is associated with the process.
        ja: 受領者が実際に次段階制御を取得し Handoff 発効イベントが結び付く場合だけ、固有状態を effective とし effective_at を記録できます。
      source_claims:
        - claim-handoff-process-design
  required_relation_constraints: []
