schema: moonweave.ai/ontology-node/v1
id: HandoffProcess
kind: concept
labels:
  zh: 移交过程
  en: handoff process
  ja: 引き継ぎプロセス
semantics:
  short_definition:
    zh: 把进行中工作的下一步控制转给接收者的协作过程。
    en: Collaboration process transferring next-step control to a recipient.
    ja: 進行中作業の次段階制御を受領者へ移す協働プロセス。
  definition:
    zh: 移交过程是在进行中工作上把下一步控制和相应责任从当前承担者转给接收者的一种 CollaborationProcess。它继承唯一的 collaboration_process_id；原承担者、接收者、被移交工作和生效时点是移交种差与一致性约束，不构成额外身份。单个 Handoff 是使转移生效的事件。
    en: A handoff process is a CollaborationProcess that transfers next-step control and corresponding responsibility for ongoing work from a current bearer to a recipient. It inherits the sole collaboration_process_id; prior bearer, recipient, transferred work, and effective time are handoff differentia and consistency constraints, not an additional identity. One Handoff is the event that makes the transfer effective.
    ja: 引き継ぎプロセスは、進行中作業の次段階制御と責任を現在の担い手から受領者へ移す CollaborationProcess の一種です。唯一の collaboration_process_id を継承し、従前担当者、受領者、移管作業、有効時点は種差・整合制約であって追加同一性ではありません。一件の Handoff が移転を有効にします。
  why_needed:
    zh: 该节点防止把持续的控制移交流程与单个事件或新工作委派混为一谈。
    en: The node prevents a sustained control-transfer workflow from being confused with one event or a new work delegation.
    ja: このノードは継続的な制御移転の流れを、単発イベントや新規作業委任と混同することを防ぎます。
  includes:
    - zh: 纳入对进行中任务、会话或运行状态具有明确来源方、接收方和生效条件的控制转交。
      en: Includes transfer of an ongoing task, conversation, or runtime state with identified source, recipient, and activation condition.
      ja: 進行中タスク、会話、実行状態について、移管元、受領者、有効化条件が特定された制御移転を含みます。
  excludes:
    - zh: 排除尚未开始的新工作分派，也排除只复制上下文而不改变下一步控制者的操作。
      en: Excludes assignment of new work that has not begun and context copying that does not change who controls the next step.
      ja: 未開始の新規作業割当と、次段階の制御者を変えないコンテキスト複製を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      HandoffProcess 包装 OpenAI Agents SDK handoff 序列：准备 ResponsibilityTransfer、执行 Handoff 事件、确认接收方
      接管 Runner 控制。与 DelegationProcess 不同，不创建新 WorkItem；A2A contextId 可关联会话，但控制移交事实
      保存在本地 handoff_process_id 时间线。
    en: >-
      HandoffProcess wraps OpenAI Agents SDK handoff sequences: prepare ResponsibilityTransfer, emit Handoff event, confirm
      recipient assumes Runner control. Unlike DelegationProcess it creates no new WorkItem; A2A contextId may correlate
      conversation while control-transfer facts stay in local handoff_process_id timeline.
    ja: >-
      HandoffProcess は OpenAI Agents SDK handoff sequence を wrap する。ResponsibilityTransfer 準備、Handoff event、
      recipient の Runner control 引継ぎ確認を行う。DelegationProcess と異なり新 WorkItem は作らない。A2A contextId は
      会話 correlate できるが control-transfer fact は local handoff_process_id timeline に残る。
  typical_input:
    - description:
        zh: 进行中的协作过程与来源/接收参与者引用。
        en: An ongoing collaboration process with source and recipient participant references.
        ja: ongoing collaboration process と source/recipient participant reference。
      format: |-
        {"handoff_process_id":"handoff-771","collaboration_process_id":"collab-771","source_binding_ref":"binding-triage-1","recipient_binding_ref":"binding-specialist-2","transferred_work_ref":"execution-884"}
  typical_output:
    - description:
        zh: 含 Handoff 事件引用的移交过程时间线状态。
        en: Handoff process timeline state including Handoff event reference.
        ja: Handoff event reference を含む handoff process timeline state。
      format: |-
        {"handoff_process_ref":"handoff-771","handoff_event_ref":"handoff-event-771","effective_at":"2026-07-16T09:20:00Z","control_holder":"binding-specialist-2"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents sustained handoff workflows transferring conversational control.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner control moving between agents after handoff.
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Documents context correlation distinct from local handoff process records.
  source_claims:
    - claim-handoff-process-001
    - claim-handoff-process-002
structure:
  identity_keys: []
  fields:
    - id: source_binding_id
      labels:
        zh: 来源方角色绑定
        en: source role binding
        ja: 移管元役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向移交前控制下一步的责任绑定。
        en: References the accountable binding controlling the next step before handoff.
        ja: 引き継ぎ前に次段階を制御する責任バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:support-2
      source_claims:
        - claim-handoff-process-002
    - id: target_binding_id
      labels:
        zh: 接收方角色绑定
        en: recipient role binding
        ja: 受領者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向移交后接管下一步的责任绑定。
        en: References the accountable binding that takes next-step control.
        ja: 引き継ぎ後に次段階制御を得る責任バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:refund-4
      source_claims:
        - claim-handoff-process-003
    - id: work_item_id
      labels:
        zh: 进行中工作项
        en: ongoing work item
        ja: 進行中作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向控制被转交的同一进行中工作。
        en: References the same ongoing work whose control is transferred.
        ja: 制御が移転される同一の進行中作業を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:refund-42
      source_claims:
        - claim-handoff-process-004
    - id: handoff_state
      labels:
        zh: 移交专用状态
        en: handoff-specific state
        ja: 引き継ぎ固有状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录移交准备、等待确认、已生效或已取消。
        en: Records whether handoff is preparing, awaiting confirmation, effective, or canceled.
        ja: 引き継ぎが準備中、確認待ち、有効、取消かを記録します。
      allowed_values:
        - id: HandoffProcess-handoff_state-preparing
          value: preparing
          labels:
            zh: 准备中
            en: preparing
            ja: 準備中
          definitions:
            zh: 来源方正在确定接收方、移交工作和上下文包，下一步控制与相应责任尚未发生转移。
            en: The source is identifying the recipient, transferred work, and context package; next-step control and responsibility have not moved.
            ja: 移管元が受領者・移管作業・コンテキスト包を確定中で、次段階の制御と責任はまだ移転していません。
          status: accepted
          source_claims:
            - claim-handoff-process-005
        - id: HandoffProcess-handoff_state-awaiting-confirmation
          value: awaiting-confirmation
          labels:
            zh: 等待确认
            en: awaiting confirmation
            ja: 確認待ち
          definitions:
            zh: 来源方已经发出移交提议，但接收方尚未确认接受；在确认前，下一步控制仍由来源方承担。
            en: The source has issued a handoff proposal, but the recipient has not accepted it; next-step control remains with the source until confirmation.
            ja: 移管元は引継ぎ提案を発行しましたが受領者は未受諾であり、確認までは次段階の制御を移管元が保持します。
          status: accepted
          source_claims:
            - claim-handoff-process-006
        - id: HandoffProcess-handoff_state-effective
          value: effective
          labels:
            zh: 已生效
            en: effective
            ja: 発効済み
          definitions:
            zh: 接收方已经确认接受，下一步控制与相应责任已在记录的生效时点从来源方转移给接收方。
            en: The recipient has accepted, and next-step control with corresponding responsibility transferred from source to recipient at the recorded effective time.
            ja: 受領者が受諾し、記録された発効時点に次段階の制御と対応責任が移管元から受領者へ移転しています。
          status: accepted
          source_claims:
            - claim-handoff-process-007
        - id: HandoffProcess-handoff_state-canceled
          value: canceled
          labels:
            zh: 已取消
            en: canceled
            ja: 取消済み
          definitions:
            zh: 待生效的移交在接收方取得控制前被撤回或失效，因此没有发生下一步控制与责任的转移。
            en: The pending handoff was withdrawn or invalidated before the recipient obtained control, so no next-step control or responsibility transferred.
            ja: 受領者が制御を得る前に保留中の引継ぎが撤回または失効し、次段階の制御と責任は移転していません。
          status: accepted
          source_claims:
            - claim-handoff-process-008
      pattern: null
      example_value: effective
      source_claims:
        - claim-handoff-process-009
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 有効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录接收方实际取得下一步控制的时间。
        en: Records when the recipient actually obtains next-step control.
        ja: 受領者が実際に次段階制御を得た時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:01:30Z
      source_claims:
        - claim-handoff-process-010
  constraints:
    - id: handoff-specific-state-refines-process-status
      severity: error
      expression_language: plain
      expression: inherited process status is active when handoff_state is preparing or awaiting-confirmation, and ended when handoff_state is effective or canceled
      explanations:
        zh: 通用过程状态与移交专用状态必须一致：准备中或等待确认映射为 active，已生效或已取消映射为 ended。
        en: "Generic process status and handoff-specific state must agree: preparing or awaiting-confirmation maps to active, while effective or canceled maps to ended."
        ja: 汎用プロセス状態と引き継ぎ固有状態を一致させ、準備中・確認待ちは active、有効・取消は ended に対応させます。
      source_claims:
        - claim-handoff-process-011
    - id: handoff-effective-state-requires-transfer-event
      severity: error
      expression_language: plain
      expression: effective_at is present exactly when handoff_state is effective and the process has an associated Handoff event
      explanations:
        zh: 只有接收方实际取得下一步控制并留下 Handoff 生效事件时，移交专用状态才可为 effective 且记录 effective_at。
        en: The handoff-specific state may be effective, with effective_at recorded, only when the recipient actually takes next-step control and an effective Handoff event is associated with the process.
        ja: 受領者が実際に次段階制御を取得し Handoff 発効イベントが結び付く場合だけ、固有状態を effective とし effective_at を記録できます。
      source_claims:
        - claim-handoff-process-012
  required_relation_constraints: []
examples:
  - id: HandoffProcess-example-positive-manual-2026
    labels:
      zh: HandoffProcess positive
      en: HandoffProcess positive
      ja: HandoffProcess positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 HandoffProcess：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps HandoffProcess: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が HandoffProcess 多 agent 協調に写像。
    field_values: {collaboration_process_id: collaboration-handoff-process-8, source_binding_id: ActorRoleBinding:support-2, target_binding_id: ActorRoleBinding:refund-4, work_item_id: WorkItem:refund-42, status: ended, handoff_state: effective, started_at: 2026-07-16T02:00:00Z}

    related_node_ids:
      - HandoffProcess
      - CollaborationProcess
    related_relation_ids:
      - HandoffProcess-is_a-CollaborationProcess
    source_claims:
      - claim-handoff-process-013

  - id: HandoffProcess-example-boundary-manual-2026
    labels:
      zh: HandoffProcess boundary
      en: HandoffProcess boundary
      ja: HandoffProcess boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 HandoffProcess 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not HandoffProcess work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で HandoffProcess work_specification ではない。
    field_values: {}

    related_node_ids:
      - HandoffProcess
      - CollaborationProcess
    related_relation_ids:
      - HandoffProcess-is_a-CollaborationProcess
    source_claims:
      - claim-handoff-process-014

  - id: HandoffProcess-example-counterexample-confusable
    labels:
      zh: HandoffProcess counterexample
      en: HandoffProcess counterexample
      ja: HandoffProcess counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 HandoffProcess RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style HandoffProcess RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 HandoffProcess ではない。
    field_values: {handoff_process_id: absent, handoff_kind: absent, control_transfer_ref: absent, work_item_id: WorkItem:42}

    related_node_ids:
      - HandoffProcess
      - DelegationProcess
      - Handoff
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-process-013

  - id: HandoffProcess-example-instance-concrete
    labels:
      zh: HandoffProcess instance
      en: HandoffProcess instance
      ja: HandoffProcess instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 HandoffProcess DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to HandoffProcess DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が HandoffProcess に写像。
    field_values: {collaboration_process_id: collaboration-handoff-process-8, source_binding_id: ActorRoleBinding:support-2, target_binding_id: ActorRoleBinding:refund-4, work_item_id: WorkItem:refund-42, status: ended, handoff_state: effective, started_at: 2026-07-16T02:00:00Z}

    related_node_ids:
      - HandoffProcess
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-process-013

