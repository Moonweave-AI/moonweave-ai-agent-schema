      zh: OpenAI transfer 移交
      en: OpenAI transfer handoff
      ja: OpenAI transfer handoff
    descriptions:
      zh: Support agent transfer_to_refund_agent，同一会话控制转移。
      en: Support agent transfer_to_refund_agent; same conversation control transfers.
      ja: support transfer_to_refund_agent 同一 session control 移転。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: transfer_to_*
    field_values:
      collaboration_process_id: collaboration-handoff-8
      handoff_state: effective
      source_binding_id: ActorRoleBinding:support-2
      target_binding_id: ActorRoleBinding:refund-4
    related_node_ids:
      - HandoffProcess
      - Handoff
    related_relation_ids:
      - HandoffProcess-is_a-CollaborationProcess
    source_claims:
      - claim-handoff-process-design
  - id: HandoffProcess-example-a2a-ownership
    labels:
      zh: A2A 任务 ownership
      en: A2A task ownership
      ja: A2A task ownership
    descriptions:
      zh: 远程 task ownership 从 triage client 转给 billing agent。
      en: Remote task ownership transfers from triage client to billing agent.
      ja: remote task ownership triage client → billing agent。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: task ownership
    field_values:
      collaboration_process_id: collaboration-handoff-a2a-3
      handoff_state: effective
    related_node_ids:
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-process-design
  - id: HandoffProcess-example-langgraph-command
    labels:
      zh: LangGraph 控制转移
      en: LangGraph control transfer
      ja: LangGraph control transfer
    descriptions:
      zh: Command(goto="billing_agent") 转移同一会话状态控制。
      en: Command(goto="billing_agent") transfers same-session state control.
      ja: Command(goto="billing_agent") 同一 session control 移転。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: Command goto
    field_values:
      collaboration_process_id: collaboration-handoff-lg-1
      handoff_state: effective
    related_node_ids:
      - HandoffProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-process-design
  - id: HandoffProcess-example-boundary-delegation
    labels:
      zh: 新工作委派不是移交
      en: New work delegation is not handoff
      ja: 新 work delegation は handoff ではない
    descriptions:
      zh: 协调器创建独立调查工作项给专家但保留原会话控制，是 DelegationProcess。
      en: Coordinator creates separate investigation work item for specialist while retaining original conversation control; this is DelegationProcess.
      ja: 独立 investigation work item 委任は DelegationProcess。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - HandoffProcess
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-handoff-process-design
parent_relation:
  id: HandoffProcess-is_a-CollaborationProcess
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 每个移交过程都是协作过程，因为来源方与接收方协同改变同一进行中工作的控制归属。
    en: Every handoff process is a collaboration process because source and recipient coordinate a control change for the same ongoing work.
    ja: すべての引き継ぎプロセスは、移管元と受領者が同一進行中作業の制御変更を調整するため協働プロセスです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-handoff-process-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
