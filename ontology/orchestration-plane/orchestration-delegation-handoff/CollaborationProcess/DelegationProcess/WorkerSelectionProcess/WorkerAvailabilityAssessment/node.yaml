      zh: 工作者可用性评估边界例
      en: Boundary worker-availability assessment case
      ja: 作業者可用性評価の境界例
    scenario_id: null
    descriptions:
      zh: 技能目录标明代理懂 SQL，但没有检查当前负载或时间窗口；该声明不能充当可用性评估。
      en: A skill catalog says an agent knows SQL but checks neither current load nor time window; the declaration is not an availability assessment.
      ja: 技能カタログが SQL 能力を示しても現在負荷や時間窓を確認しない場合、可用性評価にはなりません。
    field_values: {}
    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess
    expected_result:
      zh: 该对象不得被归为 WorkerAvailabilityAssessment，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerAvailabilityAssessment or acquire missing conditions from nearby facts.
      ja: この対象を WorkerAvailabilityAssessment に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除对技能质量的评分，也排除没有时间参照的长期能力声明。
      en: "The case violates this reviewed exclusion boundary: Excludes scoring skill quality and long-lived capability declarations with no temporal reference."
      ja: この例は審査済み除外境界に反します：技能品質の採点と、時間参照を持たない長期能力宣言を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-availability-assessment-009
