        zh: 该边界例刻意缺少 phase_of 所表达的身份、顺序或治理条件。
        en: The boundary deliberately lacks the identity, ordering, or governance condition expressed by phase_of.
        ja: この境界例は phase_of が表す同一性、順序、統治条件を意図的に欠きます。
