      zh: 候选数据代理在线但并发额度已满，评估记录 unavailable 并给出额度耗尽理由。
      en: A candidate data agent is online but has exhausted its concurrency quota, so the assessment records unavailable with that reason.
      ja: 候補データ代理はオンラインでも並行割当量を使い切っているため、評価は理由付きで unavailable を記録します。
    field_values:
      availability_assessment_activity_id: availability-assessment-3
      selection_process_id: WorkerSelectionProcess:worker-selection-12
      candidate_role_id: WorkerRole:regulatory-7
      observed_at: 2026-07-16T01:00:15Z
    related_node_ids:
