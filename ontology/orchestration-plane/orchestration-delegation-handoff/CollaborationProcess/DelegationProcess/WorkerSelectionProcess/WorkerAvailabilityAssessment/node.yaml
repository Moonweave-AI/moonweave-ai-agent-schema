sibling_differentiation:
  - sibling_concept_id: WorkerSelectionDecisionActivity
    shared_parent_concept_id: WorkerSelectionProcess
    differentia:
      zh: 共享父节点对照：父节点 WorkerSelectionProcess：WorkerAvailabilityAssessment（semantic kind=activity，骨架 WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess）；WorkerSelectionDecisionActivity（semantic kind=activity，骨架 WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess）。双端条件：WorkerAvailabilityAssessment 条件：“工作者可用性评估是在选择时点判断候选角色能否及时承接工作的一次评估活动”；WorkerSelectionDecisionActivity 条件：“工作者选择决策是综合候选评估证据并确定一个受派角色的一次决策活动”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent WorkerSelectionProcess: WorkerAvailabilityAssessment (semantic kind=activity, backbone WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess); WorkerSelectionDecisionActivity (semantic kind=activity, backbone WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess). Endpoint conditions: WorkerAvailabilityAssessment condition: “A worker-availability assessment is an evaluation activity that determines whether a candidate role can accept the work at the selection time”; WorkerSelectionDecisionActivity condition: “A worker-selection decision activity is a decision activity that combines candidate evidence and chooses one delegate role”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 WorkerSelectionProcess：WorkerAvailabilityAssessment（semantic kind=activity、バックボーン WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess）；WorkerSelectionDecisionActivity（semantic kind=activity、バックボーン WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess）。両端条件：WorkerAvailabilityAssessment の条件：「作業者可用性評価は、選択時点で候補役割が作業を受けられるかを判定する評価活動です」；WorkerSelectionDecisionActivity の条件：「作業者選択決定活動は候補評価証拠を統合し、一つの受任役割を選ぶ決定活動です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-worker-availability-assessment-010
