    locator: Assessment boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-availability-assessment-design
    source: a2a-protocol
    supports: A2A remote agent probes inform availability assessment.
    locator: Remote agent availability
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-availability-assessment-design
    source: crewai
    supports: CrewAI agent load informs availability assessment.
    locator: Agent execution load
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-availability-assessment-design
    source: cursor-task-tool
    supports: Cursor parallel Task limits inform availability assessment.
    locator: Parallel Task slots
    evidence_kind: design-inference
    confidence: high
