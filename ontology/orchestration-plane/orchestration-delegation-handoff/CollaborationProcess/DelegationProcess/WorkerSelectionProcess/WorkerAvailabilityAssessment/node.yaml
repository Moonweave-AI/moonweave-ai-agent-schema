schema: moonweave.ai/ontology-node/v1
id: WorkerAvailabilityAssessment
kind: concept
labels:
  zh: 工作者可用性评估
  en: worker-availability assessment
  ja: 作業者可用性評価
semantics:
  short_definition:
    zh: 对单个候选工作者运行可用性信号采集与评估的活动。
    en: Activity that collects and evaluates availability signals for one candidate worker.
    ja: 単一 candidate worker について availability signal を収集・評価する activity。
  definition:
    zh: WorkerAvailabilityAssessment 针对 WorkerPool 中一名候选运行，采集 load、concurrency、health 等信号并产出 WorkerAvailability。A2A 对 remote agent 的 tasks/send 探测、CrewAI agent 当前 task 负载、Cursor 并行 Task 槽位占用，均可作为信号来源。仅检查 AgentCard 存在不构成可用性评估。
    en: WorkerAvailabilityAssessment runs for one WorkerPool candidate, collecting load, concurrency, health signals and producing WorkerAvailability. A2A tasks/send probe to remote agent, CrewAI agent current task load, and Cursor parallel Task slot usage may serve as signal sources. AgentCard existence alone is not availability assessment.
    ja: WorkerAvailabilityAssessment は WorkerPool 内 1 candidate 向け signal 収集→WorkerAvailability 生成。A2A probe/CrewAI load/Cursor slot が signal 源。
  why_needed:
    zh: 避免把离线或超载工作者选为受派方。
    en: Avoids selecting offline or overloaded workers as delegates.
    ja: offline/overloaded worker の delegate 選定を防ぐ。
  includes:
    - zh: 纳入基于当前负载、排期、健康状态或并发配额的候选可用性判断。
      en: Includes candidate-availability judgments based on current load, schedule, health, or concurrency quota.
      ja: 現在負荷、予定、稼働状態、並行割当量に基づく候補可用性判断を含みます。
  excludes:
    - zh: 排除对技能质量的评分，也排除没有时间参照的长期能力声明。
      en: Excludes scoring skill quality and long-lived capability declarations with no temporal reference.
      ja: 技能品質の採点と、時間参照を持たない長期能力宣言を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "A2A: 对 AgentCard url 发送轻量 probe 或读取 last-known Task 状态 → WorkerAvailability。CrewAI: agent.current_task 计数。Cursor: 并行 subagent Task 数 vs 限制。评估先于 WorkerCapabilityMatching 或并行但必须在 WorkerSelection 前完成。"
    en: "A2A: lightweight probe to AgentCard url or last-known Task state → WorkerAvailability. CrewAI: agent.current_task count. Cursor: parallel subagent Task count vs limit. Assessment precedes or runs parallel to WorkerCapabilityMatching but must complete before WorkerSelection."
    ja: A2A probe/CrewAI current_task/Cursor parallel count → WorkerAvailability。WorkerSelection 前に完了必須。
  typical_input:
    - description: Availability probe signals.
      format: '{"candidate":"billing-agent","load_ratio":0.2,"availability_status":"available"}'
      source_claims:
        - claim-worker-availability-assessment-design
  typical_output:
    - description: Moonweave assessment activity.
      format: '{"availability_assessment_activity_id":"avail-assess-9"}'
      source_claims:
        - claim-worker-availability-assessment-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - availability_assessment_activity_id
  fields:
    - id: availability_assessment_activity_id
      labels:
        zh: 可用性评估活动 ID
        en: availability-assessment activity ID
        ja: 可用性評価活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选可用性评估活动。
        en: Uniquely identifies one candidate-availability assessment activity.
        ja: 一件の候補可用性評価活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: availability-assessment-3
      source_claims:
        - claim-worker-availability-assessment-design
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该评估的选择过程。
        en: References the selection process containing the assessment.
        ja: この評価を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-availability-assessment-design
    - id: candidate_role_id
      labels:
        zh: 候选角色
        en: candidate role
        ja: 候補役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被检查当前承接能力的候选角色。
        en: References the candidate role whose current capacity is checked.
        ja: 現在の受入可能性を確認する候補役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-availability-assessment-design
    - id: observed_at
      labels:
        zh: 观察时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可用性信号被观察的时间。
        en: Records when availability signals were observed.
        ja: 可用性信号を観測した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:15Z
      source_claims:
        - claim-worker-availability-assessment-design
    - id: signal_refs
      labels:
        zh: 可用性信号引用
        en: availability signal references
        ja: 可用性信号参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用在线、负载、排期或并发限制证据。
        en: References presence, load, schedule, or concurrency evidence.
        ja: 稼働、負荷、予定、並行制限の証拠を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - Presence:7
        - LoadSnapshot:7
      source_claims:
        - claim-worker-availability-assessment-design
  constraints: []
  required_relation_constraints:
    - id: availability-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAvailabilityAssessment 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerAvailabilityAssessment must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerAvailabilityAssessment は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-availability-assessment-design
examples:
  - id: WorkerAvailabilityAssessment-example-a2a-probe
    labels:
      zh: A2A 可用性探测
      en: A2A availability probe
      ja: A2A availability probe
    descriptions:
      zh: 对 billing AgentCard endpoint 探测返回 available。
      en: Probe to billing AgentCard endpoint returns available.
      ja: billing AgentCard endpoint probe → available。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Agent probe
    field_values:
      availability_assessment_activity_id: avail-assess-9
      candidate_role_id: WorkerRole:billing-agent
    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerAvailability
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-design
  - id: WorkerAvailabilityAssessment-example-crewai-load
    labels:
      zh: CrewAI 负载评估
      en: CrewAI load assessment
      ja: CrewAI load assessment
    descriptions:
      zh: Researcher 当前执行 2 个 task，load_ratio=0.8。
      en: Researcher currently executing 2 tasks, load_ratio=0.8.
      ja: Researcher 2 task 実行中 load_ratio=0.8。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: agent load
    field_values:
      availability_assessment_activity_id: avail-assess-crew-2
    related_node_ids:
      - WorkerAvailabilityAssessment
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-design
  - id: WorkerAvailabilityAssessment-example-cursor-slots
    labels:
      zh: Cursor 槽位评估
      en: Cursor slot assessment
      ja: Cursor slot assessment
    descriptions:
      zh: 并行 explore Task 已达上限，availability_status=busy。
      en: Parallel explore Tasks at limit, availability_status=busy.
      ja: parallel explore Task 上限で availability_status=busy。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: parallel limits
    field_values:
      availability_assessment_activity_id: avail-assess-cursor-1
    related_node_ids:
      - WorkerAvailabilityAssessment
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-design
  - id: WorkerAvailabilityAssessment-example-boundary-card-only
    labels:
      zh: 仅有 AgentCard 不够
      en: AgentCard alone insufficient
      ja: AgentCard のみ不十分
    descriptions:
      zh: 仅确认 AgentCard 存在而无负载/健康信号，不构成 WorkerAvailabilityAssessment。
      en: Confirming AgentCard existence without load/health signals is not WorkerAvailabilityAssessment.
      ja: AgentCard 存在確認のみでは WorkerAvailabilityAssessment にならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerAvailabilityAssessment
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-design
parent_relation:
  id: WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 工作者可用性评估是选择过程的第一组成阶段，它产生带时效的可用性证据，供后续阶段判断是否继续比较候选。
    en: Worker-availability assessment is the first constituent selection phase and produces expiring availability evidence used by later phases to decide whether candidate comparison should continue.
    ja: 作業者可用性評価は選択プロセスの最初の構成段階で、後続段階が候補比較を続けるか判断する期限付き証拠を生成します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有阶段
      en: has phase
      ja: 段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-availability-assessment-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: WorkerAvailabilityAssessment-precedes-WorkerCapabilityMatching
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: precedes
      en: precedes
      ja: precedes
    definitions:
      zh: 在同一选择过程中，可用性评估先于能力匹配，以免对当前不可用候选继续消耗匹配资源。
      en: Within one selection process, availability assessment precedes capability matching so unavailable candidates are not needlessly matched.
      ja: 同一選択内で可用性評価は能力照合に先行し、利用不能候補への不要な照合を避けます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: follows
      labels:
        zh: 后继于
        en: follows
        ja: 後続する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-availability-assessment-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerCapabilityMatching
