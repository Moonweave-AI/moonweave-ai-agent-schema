      zh: 该记录应被识别为 WorkerAvailabilityAssessment，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerAvailabilityAssessment with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerAvailabilityAssessment として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者可用性评估是在选择时点判断候选角色能否及时承接工作的一次评估活动。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A worker-availability assessment is an evaluation activity that determines whether a candidate role can accept the work at the selection time."
      ja: この場面は次の同一性条件を満たします：作業者可用性評価は、選択時点で候補役割が作業を受けられるかを判定する評価活動です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-availability-assessment-008
  - id: WorkerAvailabilityAssessment-example-boundary-manual-2026
    kind: boundary
