schema: moonweave.ai/ontology-node/v1
id: WorkerAvailabilityAssessment
kind: concept
labels:
  zh: 工作者可用性评估
  en: worker-availability assessment
  ja: 作業者可用性評価
semantics:
  short_definition:
    zh: 在选择时点判断候选能否承接工作的一次评估活动。
    en: Evaluation activity testing whether a candidate can accept work now.
    ja: 選択時点で候補が作業を受けられるか判定する評価活動。
  definition:
    zh: 工作者可用性评估是在选择时点判断候选角色能否及时承接工作的一次评估活动。 评估使用在线状态、负载、时间窗口和并发限制，产出有时效的 WorkerAvailability 状态。
    en: A worker-availability assessment is an evaluation activity that determines whether a candidate role can accept the work at the selection time. It evaluates presence, load, time window, and concurrency limits and produces a time-bounded WorkerAvailability state.
    ja: 作業者可用性評価は、選択時点で候補役割が作業を受けられるかを判定する評価活動です。 稼働状態、負荷、時間窓、並行制限を評価し、有効期間付き WorkerAvailability 状態を生成します。
  why_needed:
    zh: 能力合适不等于当前可接单，因此可用性必须在能力匹配之前单独记录。
    en: Capability fit does not imply current capacity, so availability must be recorded separately before capability matching.
    ja: 能力適合は現在の受入可能性を意味しないため、可用性は能力照合前に別途記録する必要があります。
  includes:
    - zh: 纳入基于当前负载、排期、健康状态或并发配额的候选可用性判断。
      en: Includes candidate-availability judgments based on current load, schedule, health, or concurrency quota.
      ja: 現在負荷、予定、稼働状態、並行割当量に基づく候補可用性判断を含みます。
  excludes:
    - zh: 排除对技能质量的评分，也排除没有时间参照的长期能力声明。
      en: Excludes scoring skill quality and long-lived capability declarations with no temporal reference.
      ja: 技能品質の採点と、時間参照を持たない長期能力宣言を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerAvailabilityAssessment 读取 WorkerPool 成员的运行时信号（队列深度、schedule、health）产出
      有时效的 WorkerAvailability。Agents SDK Runner 并发槽与 A2A Agent 在线状态是输入 telemetry，不是
      Availability 规范；评估在活动层执行，结果供 WorkerSelectionDecisionActivity 引用。
    en: >-
      WorkerAvailabilityAssessment reads runtime signals for WorkerPool members (queue depth, schedule, health) and emits
      time-bounded WorkerAvailability. Agents SDK Runner concurrency slots and A2A agent online status are input telemetry,
      not Availability specifications; assessment runs at activity layer for WorkerSelectionDecisionActivity reference.
    ja: >-
      WorkerAvailabilityAssessment は WorkerPool member の runtime signal（queue depth、schedule、health）を読み time-bounded
      WorkerAvailability を生成する。Agents SDK Runner concurrency slot と A2A agent online status は input telemetry で
      Availability specification ではない。activity 層で実行し WorkerSelectionDecisionActivity が参照する。
  typical_input:
    - description:
        zh: 候选池成员与选择时点的调度/负载 telemetry。
        en: Candidate pool members and scheduling/load telemetry at selection time.
        ja: selection 時点の candidate pool member と scheduling/load telemetry。
      format: |-
        {"worker_pool_ref":"pool:audit-884","assessment_at":"2026-07-16T09:03:00Z","candidates":[{"binding_ref":"binding-agent-auditor-3","queue_depth":1,"scheduled_until":null},{"binding_ref":"binding-agent-auditor-5","queue_depth":4,"scheduled_until":"2026-07-16T12:00:00Z"}]}
  typical_output:
    - description:
        zh: 每个候选的 WorkerAvailability 评估结果引用。
        en: WorkerAvailability assessment result references per candidate.
        ja: candidate ごとの WorkerAvailability assessment result reference。
      format: |-
        {"assessment_id":"avail-assess-884","availability_refs":["avail:auditor-3","avail:auditor-5"],"available_count":1}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents runner concurrency and scheduling signals for availability checks.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote agent endpoint metadata used in availability assessment.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents assessment activities producing time-bounded availability facts.
  source_claims:
    - claim-worker-availability-assessment-001
    - claim-worker-availability-assessment-002
structure:
  identity_keys:
    - availability_assessment_activity_id
  fields:
    - id: availability_assessment_activity_id
      labels:
        zh: 可用性评估活动 ID
        en: availability-assessment activity ID
        ja: 可用性評価活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选可用性评估活动。
        en: Uniquely identifies one candidate-availability assessment activity.
        ja: 一件の候補可用性評価活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: availability-assessment-3
      source_claims:
        - claim-worker-availability-assessment-002
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该评估的选择过程。
        en: References the selection process containing the assessment.
        ja: この評価を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-availability-assessment-003
    - id: candidate_role_id
      labels:
        zh: 候选角色
        en: candidate role
        ja: 候補役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被检查当前承接能力的候选角色。
        en: References the candidate role whose current capacity is checked.
        ja: 現在の受入可能性を確認する候補役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-availability-assessment-004
    - id: observed_at
      labels:
        zh: 观察时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可用性信号被观察的时间。
        en: Records when availability signals were observed.
        ja: 可用性信号を観測した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:15Z
      source_claims:
        - claim-worker-availability-assessment-005
    - id: signal_refs
      labels:
        zh: 可用性信号引用
        en: availability signal references
        ja: 可用性信号参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用在线、负载、排期或并发限制证据。
        en: References presence, load, schedule, or concurrency evidence.
        ja: 稼働、負荷、予定、並行制限の証拠を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - Presence:7
        - LoadSnapshot:7
      source_claims:
        - claim-worker-availability-assessment-006
  constraints: []
  required_relation_constraints:
    - id: availability-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAvailabilityAssessment 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerAvailabilityAssessment must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerAvailabilityAssessment は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-availability-assessment-007
examples:
  - id: WorkerAvailabilityAssessment-example-positive-manual-2026
    labels:
      zh: WorkerAvailabilityAssessment positive
      en: WorkerAvailabilityAssessment positive
      ja: WorkerAvailabilityAssessment positive
    descriptions:
      zh: LiteLLM 映射 WorkerAvailabilityAssessment LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps WorkerAvailabilityAssessment LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM WorkerAvailabilityAssessment: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {availability_assessment_activity_id: availability-assessment-3, selection_process_id: WorkerSelectionProcess:worker-selection-12, candidate_role_id: WorkerRole:regulatory-7, observed_at: 2026-07-16T01:00:15Z}

    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-availability-assessment-008

  - id: WorkerAvailabilityAssessment-example-boundary-manual-2026
    labels:
      zh: WorkerAvailabilityAssessment boundary
      en: WorkerAvailabilityAssessment boundary
      ja: WorkerAvailabilityAssessment boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 WorkerAvailabilityAssessment WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not WorkerAvailabilityAssessment WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で WorkerAvailabilityAssessment WorkflowStep spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerAvailabilityAssessment-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-availability-assessment-009

  - id: WorkerAvailabilityAssessment-example-counterexample-confusable
    labels:
      zh: WorkerAvailabilityAssessment counterexample
      en: WorkerAvailabilityAssessment counterexample
      ja: WorkerAvailabilityAssessment counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 WorkerAvailabilityAssessment PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style WorkerAvailabilityAssessment PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 WorkerAvailabilityAssessment ではない。
    field_values: {assessment_id: absent, assessed_at: absent, worker_availability_refs: absent}

    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerAvailability
      - A2AAgentCard
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-008

  - id: WorkerAvailabilityAssessment-example-instance-concrete
    labels:
      zh: WorkerAvailabilityAssessment instance
      en: WorkerAvailabilityAssessment instance
      ja: WorkerAvailabilityAssessment instance
    descriptions:
      zh: LiteLLM 实例：Router(model_list=[{"model_name":"gpt-4","litellm_params":{...}}], routing_strategy="least-busy").completion(messages) → 映射 WorkerAvailabilityAssessment。
      en: LiteLLM instance: Router(model_list, routing_strategy="least-busy").completion(messages) → maps to WorkerAvailabilityAssessment.
      ja: LiteLLM 实例 Router least-busy+completion が WorkerAvailabilityAssessment に写像。
    field_values: {availability_assessment_activity_id: availability-assessment-3, selection_process_id: WorkerSelectionProcess:worker-selection-12, candidate_role_id: WorkerRole:regulatory-7, observed_at: 2026-07-16T01:00:15Z}

    related_node_ids:
      - WorkerAvailabilityAssessment
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-assessment-008

