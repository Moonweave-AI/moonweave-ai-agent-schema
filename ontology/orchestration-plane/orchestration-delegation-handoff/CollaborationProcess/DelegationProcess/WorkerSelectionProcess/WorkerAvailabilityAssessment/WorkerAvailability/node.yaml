    source: delegation-handoff-design
    supports: WorkerAvailability is assessment result with validity interval.
    locator: WorkerAvailability boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-availability-design
    source: a2a-protocol
    supports: A2A probe outcomes map to WorkerAvailability fields.
    locator: Agent probe
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-availability-design
    source: crewai
    supports: CrewAI load maps to WorkerAvailability.
    locator: Agent load
    evidence_kind: design-inference
    confidence: high
