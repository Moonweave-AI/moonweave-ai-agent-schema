schema: moonweave.ai/ontology-node/v1
id: WorkerAvailability
kind: concept
labels:
  zh: 工作者可用性状态
  en: worker-availability state
  ja: 作業者可用性状態
semantics:
  short_definition:
    zh: 候选角色在评估窗口内能否承接工作的有时效状态。
    en: Time-bounded state of whether a candidate role can accept work.
    ja: 評価期間内に候補役割が作業を受けられるかを示す有効期間付き状態。
  definition:
    zh: 工作者可用性状态是在给定评估时点和有效窗口内候选角色能否承接工作的状态。 它包含候选角色、可用状态、负载比例、评估时间、有效期和理由；过期状态不可用于新选择。
    en: Worker-availability state records whether a candidate role can accept work at an assessment time and during a validity window. It contains candidate role, availability status, load ratio, assessment time, validity end, and reason; expired state cannot support a new selection.
    ja: 作業者可用性状態は、評価時点と有効期間内に候補役割が作業を受けられるかを示す状態です。 候補役割、可用状態、負荷率、評価時刻、有効期限、理由を含み、期限切れ状態は新規選択に使えません。
  why_needed:
    zh: 该节点保存评估活动的时间化输出，避免把瞬时可用性误作长期能力属性。
    en: The node stores the time-bounded output of assessment so transient availability is not treated as a permanent capability.
    ja: 評価活動の時間限定出力を保存し、一時的可用性を恒久能力として扱うことを防ぎます。
  includes:
    - zh: 纳入带评估时间、有效窗口和可解释理由的 available、busy 或 unavailable 状态。
      en: Includes available, busy, or unavailable states with assessment time, validity window, and explanatory reason.
      ja: 評価時刻、有効期間、説明理由を持つ available、busy、unavailable 状態を含みます。
  excludes:
    - zh: 排除代理技能、健康检查原始指标和没有候选角色引用的通用负载统计。
      en: Excludes agent skills, raw health metrics, and aggregate load statistics with no candidate-role reference.
      ja: 代理技能、生の稼働指標、候補役割参照を持たない集計負荷統計を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerAvailability 是 WorkerAvailabilityAssessment 产出的有时效状态：available/busy/degraded 等，含
      valid_until。不是 AgentCard 静态能力；选择决策须在 valid_until 前消费，过期需重新评估。
    en: >-
      WorkerAvailability is a time-bounded state from WorkerAvailabilityAssessment: available, busy, degraded, etc., with
      valid_until. Not static AgentCard capability; selection must consume before valid_until or re-assess when expired.
    ja: >-
      WorkerAvailability は WorkerAvailabilityAssessment が生成する time-bounded state（available/busy/degraded 等、
      valid_until 付き）。static AgentCard capability ではない。selection は valid_until 前に consume するか expired 時
      再評価が必要。
  typical_input:
    - description:
        zh: 单个候选在选择时点的可用性评估输入。
        en: Single-candidate availability assessment input at selection time.
        ja: selection 時点の single-candidate availability assessment input。
      format: |-
        {"candidate_binding_ref":"binding-agent-auditor-3","assessment_at":"2026-07-16T09:03:00Z","signals":{"queue_depth":1,"health":"ok","concurrency_available":true}}
  typical_output:
    - description:
        zh: 带 valid_until 的 WorkerAvailability 状态记录。
        en: WorkerAvailability state record with valid_until.
        ja: valid_until 付き WorkerAvailability state record。
      format: |-
        {"availability_id":"avail:auditor-3","status":"available","valid_until":"2026-07-16T09:10:00Z","assessment_ref":"avail-assess-884"}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents runtime capacity signals feeding availability states.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents endpoint presence distinct from time-bounded availability records.
    - name: W3C PROV-O Entity
      url: https://www.w3.org/TR/prov-o/#Entity
      description: Documents time-bounded state entities separate from capability specifications.
  source_claims:
    - claim-worker-availability-001
    - claim-worker-availability-002
structure:
  identity_keys:
    - availability_assessment_id
    - worker_role_id
  fields:
    - id: availability_assessment_id
      labels:
        zh: 可用性评估 ID
        en: availability-assessment ID
        ja: 可用性評価 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该可用性状态的评估活动，使状态不被误当作工作者静态属性。
        en: References the assessment activity that produced this availability state so it is not mistaken for a static worker property.
        ja: この可用性状態を生成した評価活動を参照し、作業者の静的属性との混同を防ぎます。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerAvailabilityAssessment:001
      source_claims:
        - claim-worker-availability-002
    - id: worker_role_id
      labels:
        zh: 工作者角色 ID
        en: worker-role ID
        ja: ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该时点和窗口内被评估能否接收工作的候选角色。
        en: References the candidate role assessed for ability to accept work at the stated time and window.
        ja: 指定時点と時間窓で作業受入れ可否を評価した候補ロールを参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-availability-003
    - id: availability_status
      labels:
        zh: 可用状态
        en: availability status
        ja: 可用状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选角色在评估时是 available、unavailable 还是 unknown。
        en: Records whether the candidate role is available, unavailable, or unknown at assessment time.
        ja: 評価時点の候補ロールが available、unavailable、unknown のいずれかを記録します。
      allowed_values: []
      pattern: null
      example_value: available
      source_claims:
        - claim-worker-availability-004
    - id: load_ratio
      labels:
        zh: 负载比率
        en: load ratio
        ja: 負荷率
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 0 到 1 的比率记录评估时已占用容量；它是选择证据而不是能力分数。
        en: Records occupied capacity as a ratio from 0 to 1 at assessment time; it is selection evidence, not a capability score.
        ja: 評価時点の使用済み容量を 0 から 1 の比率で記録し、能力点数とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.35
      source_claims:
        - claim-worker-availability-005
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可用性信号被评估的 UTC 时刻。
        en: Records the UTC instant at which availability signals were assessed.
        ja: 可用性信号を評価した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:10:00Z
      source_claims:
        - claim-worker-availability-006
    - id: valid_until
      labels:
        zh: 有效期至
        en: valid until
        ja: 有効期限
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该易变可用性结论最迟可用于新选择决策的时刻。
        en: Records the latest instant at which this volatile availability conclusion may support a new selection decision.
        ja: この変動する可用性結論を新しい選択判断に利用できる最終時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:20:00Z
      source_claims:
        - claim-worker-availability-007
    - id: reason
      labels:
        zh: 判断理由
        en: reason
        ja: 判断理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明状态结论所依据的在线性、容量、并发或时间窗口信号。
        en: Explains the presence, capacity, concurrency, or time-window signals supporting the availability conclusion.
        ja: 可用性結論を支える接続、容量、並行数、時間窓の信号を説明します。
      allowed_values: []
      pattern: null
      example_value: capacity and concurrency are available
      source_claims:
        - claim-worker-availability-008
  constraints:
    - id: worker-availability-ratio
      severity: error
      expression_language: plain
      expression: load_ratio is between 0 and 1
      explanations:
        zh: 负载比率必须在 0 到 1 之间。
        en: Worker load ratio is normalized to [0,1].
        ja: ワーカー負荷率は 0 から 1 の範囲です。
      source_claims:
        - claim-worker-availability-009
  required_relation_constraints:
    - id: availability-result-of-assessment
      direction: incoming
      predicate: has_result
      target_concept_id: WorkerAvailabilityAssessment
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAvailability 必须通过 has_result 保持与 WorkerAvailabilityAssessment 的实例级语义约束。
        en: WorkerAvailability must preserve its instance-level has_result constraint with WorkerAvailabilityAssessment.
        ja: WorkerAvailability は WorkerAvailabilityAssessment とのインスタンスレベル has_result 制約を保持しなければなりません。
      source_claims:
        - claim-worker-availability-010
examples:
  - id: WorkerAvailability-example-positive-manual-2026
    labels:
      zh: WorkerAvailability positive
      en: WorkerAvailability positive
      ja: WorkerAvailability positive
    descriptions:
      zh: LiteLLM 映射 WorkerAvailability LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps WorkerAvailability LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM WorkerAvailability: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {availability_assessment_id: WorkerAvailabilityAssessment:001, worker_role_id: WorkerRole:007, availability_status: available, load_ratio: 0.35, assessed_at: 2026-07-15T01:10:00Z, reason: "capacity and concurrency are available"}

    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
    related_relation_ids:
      - WorkerAvailabilityAssessment-has_result-WorkerAvailability
    source_claims:
      - claim-worker-availability-011

  - id: WorkerAvailability-example-boundary-manual-2026
    labels:
      zh: WorkerAvailability boundary
      en: WorkerAvailability boundary
      ja: WorkerAvailability boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 WorkerAvailability WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not WorkerAvailability WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で WorkerAvailability WorkflowStep spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
    related_relation_ids:
      - WorkerAvailabilityAssessment-has_result-WorkerAvailability
    source_claims:
      - claim-worker-availability-012

  - id: WorkerAvailability-example-counterexample-confusable
    labels:
      zh: WorkerAvailability counterexample
      en: WorkerAvailability counterexample
      ja: WorkerAvailability counterexample
    descriptions:
      zh: 普通 Python 函数调用链无 @flow/@task 装饰不能作为 Prefect 式 WorkerAvailability PipelineComposition。
      en: Plain Python function chains without @flow/@task decorators cannot serve as Prefect-style WorkerAvailability PipelineComposition.
      ja: @flow/@task なし Python 链は Prefect 式 WorkerAvailability ではない。
    field_values: {availability_id: absent, capacity_state: absent, eligible_for_assignment: absent}

    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
      - A2AAgentCapabilities
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-011

  - id: WorkerAvailability-example-instance-concrete
    labels:
      zh: WorkerAvailability instance
      en: WorkerAvailability instance
      ja: WorkerAvailability instance
    descriptions:
      zh: "LiteLLM 实例：Router(model_list=[{\"model_name\":\"gpt-4\",\"litellm_params\":{...}}], routing_strategy=\"least-busy\").completion(messages) → 映射 WorkerAvailability。"
      en: LiteLLM instance: Router(model_list, routing_strategy="least-busy").completion(messages) → maps to WorkerAvailability.
      ja: LiteLLM 实例 Router least-busy+completion が WorkerAvailability に写像。
    field_values: {availability_assessment_id: WorkerAvailabilityAssessment:001, worker_role_id: WorkerRole:007, availability_status: available, load_ratio: 0.35, assessed_at: 2026-07-15T01:10:00Z, reason: "capacity and concurrency are available"}

    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-011

