    expected_result:
      zh: 该记录应被识别为 WorkerAvailability，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerAvailability with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerAvailability として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者可用性状态是在给定评估时点和有效窗口内候选角色能否承接工作的状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Worker-availability state records whether a candidate role can accept work at an assessment time and during a validity window."
      ja: この場面は次の同一性条件を満たします：作業者可用性状態は、評価時点と有効期間内に候補役割が作業を受けられるかを示す状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-availability-011
  - id: WorkerAvailability-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者可用性状态边界例
      en: Boundary worker-availability state case
      ja: 作業者可用性状態の境界例
    scenario_id: null
    descriptions:
      zh: 上周的 available 状态已经过期，即便字段仍可查询，也不能表示当前 WorkerAvailability。
      en: Last week's available record has expired; although queryable, it does not represent current WorkerAvailability.
      ja: 先週の available 記録は期限切れで、照会可能でも現在の WorkerAvailability を表しません。
    field_values: {}
    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
    related_relation_ids:
      - WorkerAvailabilityAssessment-has_result-WorkerAvailability
    expected_result:
      zh: 该对象不得被归为 WorkerAvailability，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerAvailability or acquire missing conditions from nearby facts.
      ja: この対象を WorkerAvailability に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除代理技能、健康检查原始指标和没有候选角色引用的通用负载统计。
      en: "The case violates this reviewed exclusion boundary: Excludes agent skills, raw health metrics, and aggregate load statistics with no candidate-role reference."
      ja: この例は審査済み除外境界に反します：代理技能、生の稼働指標、候補役割参照を持たない集計負荷統計を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-availability-012
