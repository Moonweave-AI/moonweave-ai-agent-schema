schema: moonweave.ai/ontology-node/v1
id: WorkerAvailability
kind: concept
labels:
  zh: 工作者可用性状态
  en: worker-availability state
  ja: 作業者可用性状態
semantics:
  short_definition:
    zh: 一次可用性评估对单个候选工作者得出的状态化结论。
    en: Status-bearing conclusion about one candidate worker from one availability assessment.
    ja: 一回の availability assessment が単一 candidate worker について出す status 付き結論。
  definition:
    zh: WorkerAvailability 记录 availability_status、load_ratio、assessed_at 与 valid_until。它是 WorkerAvailabilityAssessment 的结果记录，不是评估活动本身。A2A agent 健康探测、CrewAI 并发 task 计数与 Cursor 槽位状态均投影为此记录的字段值。
    en: WorkerAvailability records availability_status, load_ratio, assessed_at, and valid_until. It is the result record of WorkerAvailabilityAssessment, not the assessment activity. A2A agent health probes, CrewAI concurrent task counts, and Cursor slot state project to field values here.
    ja: WorkerAvailability は availability_status/load_ratio/assessed_at/valid_until を記録。Assessment の result record。
  why_needed:
    zh: 为工作者选择提供时间_bounded 的可用性证据。
    en: Provides time-bounded availability evidence for worker selection.
    ja: worker selection 向け time-bounded availability evidence。
  includes:
    - zh: 纳入带评估时间、有效窗口和可解释理由的 available、busy 或 unavailable 状态。
      en: Includes available, busy, or unavailable states with assessment time, validity window, and explanatory reason.
      ja: 評価時刻、有効期間、説明理由を持つ available、busy、unavailable 状態を含みます。
  excludes:
    - zh: 排除代理技能、健康检查原始指标和没有候选角色引用的通用负载统计。
      en: Excludes agent skills, raw health metrics, and aggregate load statistics with no candidate-role reference.
      ja: 代理技能、生の稼働指標、候補役割参照を持たない集計負荷統計を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: 每条 WorkerAvailability 绑定 availability_assessment_id 与 worker_role_id；valid_until 过期后不得用于 WorkerSelection 除非重新评估。
    en: Each WorkerAvailability binds availability_assessment_id and worker_role_id; expired valid_until must not feed WorkerSelection without reassessment.
    ja: valid_until 失効後は reassessment 無しで WorkerSelection に使用不可。
  typical_input:
    - description: Availability result.
      format: '{"availability_status":"available","load_ratio":0.2,"assessed_at":"..."}'
      source_claims:
        - claim-worker-availability-design
  typical_output:
    - description: Moonweave WorkerAvailability.
      format: '{"availability_assessment_id":"avail-assess-9","worker_role_id":"WorkerRole:billing"}'
      source_claims:
        - claim-worker-availability-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - availability_assessment_id
    - worker_role_id
  fields:
    - id: availability_assessment_id
      labels:
        zh: 可用性评估 ID
        en: availability-assessment ID
        ja: 可用性評価 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该可用性状态的评估活动，使状态不被误当作工作者静态属性。
        en: References the assessment activity that produced this availability state so it is not mistaken for a static worker property.
        ja: この可用性状態を生成した評価活動を参照し、作業者の静的属性との混同を防ぎます。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerAvailabilityAssessment:001
      source_claims:
        - claim-worker-availability-design
    - id: worker_role_id
      labels:
        zh: 工作者角色 ID
        en: worker-role ID
        ja: ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该时点和窗口内被评估能否接收工作的候选角色。
        en: References the candidate role assessed for ability to accept work at the stated time and window.
        ja: 指定時点と時間窓で作業受入れ可否を評価した候補ロールを参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-availability-design
    - id: availability_status
      labels:
        zh: 可用状态
        en: availability status
        ja: 可用状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选角色在评估时是 available、unavailable 还是 unknown。
        en: Records whether the candidate role is available, unavailable, or unknown at assessment time.
        ja: 評価時点の候補ロールが available、unavailable、unknown のいずれかを記録します。
      allowed_values: []
      pattern: null
      example_value: available
      source_claims:
        - claim-worker-availability-design
    - id: load_ratio
      labels:
        zh: 负载比率
        en: load ratio
        ja: 負荷率
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 0 到 1 的比率记录评估时已占用容量；它是选择证据而不是能力分数。
        en: Records occupied capacity as a ratio from 0 to 1 at assessment time; it is selection evidence, not a capability score.
        ja: 評価時点の使用済み容量を 0 から 1 の比率で記録し、能力点数とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.35
      source_claims:
        - claim-worker-availability-design
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可用性信号被评估的 UTC 时刻。
        en: Records the UTC instant at which availability signals were assessed.
        ja: 可用性信号を評価した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:10:00Z
      source_claims:
        - claim-worker-availability-design
    - id: valid_until
      labels:
        zh: 有效期至
        en: valid until
        ja: 有効期限
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该易变可用性结论最迟可用于新选择决策的时刻。
        en: Records the latest instant at which this volatile availability conclusion may support a new selection decision.
        ja: この変動する可用性結論を新しい選択判断に利用できる最終時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:20:00Z
      source_claims:
        - claim-worker-availability-design
    - id: reason
      labels:
        zh: 判断理由
        en: reason
        ja: 判断理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明状态结论所依据的在线性、容量、并发或时间窗口信号。
        en: Explains the presence, capacity, concurrency, or time-window signals supporting the availability conclusion.
        ja: 可用性結論を支える接続、容量、並行数、時間窓の信号を説明します。
      allowed_values: []
      pattern: null
      example_value: capacity and concurrency are available
      source_claims:
        - claim-worker-availability-design
  constraints:
    - id: worker-availability-ratio
      severity: error
      expression_language: plain
      expression: load_ratio is between 0 and 1
      explanations:
        zh: 负载比率必须在 0 到 1 之间。
        en: Worker load ratio is normalized to [0,1].
        ja: ワーカー負荷率は 0 から 1 の範囲です。
      source_claims:
        - claim-worker-availability-design
  required_relation_constraints:
    - id: availability-result-of-assessment
      direction: incoming
      predicate: has_result
      target_concept_id: WorkerAvailabilityAssessment
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAvailability 必须通过 has_result 保持与 WorkerAvailabilityAssessment 的实例级语义约束。
        en: WorkerAvailability must preserve its instance-level has_result constraint with WorkerAvailabilityAssessment.
        ja: WorkerAvailability は WorkerAvailabilityAssessment とのインスタンスレベル has_result 制約を保持しなければなりません。
      source_claims:
        - claim-worker-availability-design
examples:
  - id: WorkerAvailability-example-available
    labels:
      zh: 可用候选
      en: Available candidate
      ja: available candidate
    descriptions:
      zh: billing agent load_ratio=0.2，availability_status=available。
      en: Billing agent load_ratio=0.2, availability_status=available.
      ja: billing agent load_ratio=0.2 available。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: probe result
    field_values:
      availability_status: available
      load_ratio: 0.2
    related_node_ids:
      - WorkerAvailability
      - WorkerAvailabilityAssessment
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-design
  - id: WorkerAvailability-example-busy
    labels:
      zh: 繁忙候选
      en: Busy candidate
      ja: busy candidate
    descriptions:
      zh: technical agent 三个并行 task，status=busy。
      en: Technical agent with three parallel tasks, status=busy.
      ja: technical agent 3 parallel task → busy。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: load
    field_values:
      availability_status: busy
      load_ratio: 0.95
    related_node_ids:
      - WorkerAvailability
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-design
  - id: WorkerAvailability-example-offline
    labels:
      zh: 离线候选
      en: Offline candidate
      ja: offline candidate
    descriptions:
      zh: A2A endpoint 探测失败，status=offline。
      en: A2A endpoint probe fails, status=offline.
      ja: A2A endpoint probe 失敗 → offline。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: probe fail
    field_values:
      availability_status: offline
      load_ratio: null
    related_node_ids:
      - WorkerAvailability
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-design
  - id: WorkerAvailability-example-boundary-activity
    labels:
      zh: 活动不是结果
      en: Activity is not result
      ja: activity は result ではない
    descriptions:
      zh: WorkerAvailabilityAssessment 活动记录本身不是 WorkerAvailability。
      en: WorkerAvailabilityAssessment activity record itself is not WorkerAvailability.
      ja: WorkerAvailabilityAssessment 自体は WorkerAvailability ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerAvailability
    related_relation_ids: []
    source_claims:
      - claim-worker-availability-design
parent_relation:
  id: WorkerAvailabilityAssessment-has_result-WorkerAvailability
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has result
    en: has result
    ja: has result
  definitions:
    zh: 一次可用性评估以组成关系拥有它为候选产生的时间化可用性状态结果。
    en: An availability assessment compositionally contains the time-bounded availability-state result it creates for a candidate.
    ja: 一件の可用性評価は候補向けに作る時間限定可用性状態結果を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其结果
      en: result of
      ja: 結果である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-availability-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
