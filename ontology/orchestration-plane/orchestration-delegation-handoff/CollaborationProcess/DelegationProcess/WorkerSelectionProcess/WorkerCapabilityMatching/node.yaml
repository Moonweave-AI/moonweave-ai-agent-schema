    expected_result:
      zh: 该对象不得被归为 WorkerCapabilityMatching，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerCapabilityMatching or acquire missing conditions from nearby facts.
      ja: この対象を WorkerCapabilityMatching に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除只检查在线状态的评估，以及未经证据支持的主观偏好排序。
      en: "The case violates this reviewed exclusion boundary: Excludes availability-only checks and preference rankings unsupported by capability evidence."
      ja: この例は審査済み除外境界に反します：稼働状態だけの確認と、能力証拠に裏付けられない主観的順位付けを除外します。
