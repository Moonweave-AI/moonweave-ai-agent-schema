schema: moonweave.ai/ontology-node/v1
id: WorkerCapabilityMatching
kind: concept
labels:
  zh: 工作者能力匹配
  en: worker-capability matching
  ja: 作業者能力照合
semantics:
  short_definition:
    zh: 比较工作要求与候选能力证据的评估活动。
    en: Evaluation activity comparing work requirements to candidate capabilities.
    ja: 作業要件と候補能力証拠を比較する評価活動。
  definition:
    zh: 工作者能力匹配是把工作要求与可用候选的能力证据逐项比较的评估活动。 它针对明确要求和候选角色运行，产出包含分数、命中项、缺口和证据引用的 WorkerCapabilityMatch。
    en: Worker-capability matching is an evaluation activity that compares work requirements with the capability evidence of available candidates. It operates on explicit requirements and candidate roles and produces a WorkerCapabilityMatch containing scores, satisfied items, gaps, and evidence references.
    ja: 作業者能力照合は、作業要件と利用可能候補の能力証拠を項目別に比較する評価活動です。 明示要件と候補役割を対象に、得点、充足項目、欠落、証拠参照を持つ WorkerCapabilityMatch を生成します。
  why_needed:
    zh: 该活动把“为什么选这个工作者”从名称猜测转为可复核的要求—证据比较。
    en: The activity turns why a worker was chosen from a label guess into a reviewable requirement-to-evidence comparison.
    ja: 作業者選択理由を名称推測から、再検証可能な要件—証拠比較へ変えます。
  includes:
    - zh: 纳入技能、输入输出模态、工具许可或领域资格与工作要求之间的比较。
      en: Includes comparison of skills, input/output modes, tool permissions, or domain qualifications against work requirements.
      ja: 技能、入出力モード、ツール許可、領域資格と作業要件との比較を含みます。
  excludes:
    - zh: 排除只检查在线状态的评估，以及未经证据支持的主观偏好排序。
      en: Excludes availability-only checks and preference rankings unsupported by capability evidence.
      ja: 稼働状態だけの確認と、能力証拠に裏付けられない主観的順位付けを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerCapabilityMatching 将 WorkItem 所需技能与 A2A AgentCard skills 或本地 Agent 能力声明比对，
      产出 WorkerCapabilityMatch 分数与证据。可用性评估之后再执行；匹配活动不启动 Runner 或 SendMessage。
    en: >-
      WorkerCapabilityMatching compares WorkItem required skills against A2A AgentCard skills or local Agent capability
      declarations, producing WorkerCapabilityMatch scores and evidence. Runs after availability assessment; matching activity
      does not start Runner or SendMessage.
    ja: >-
      WorkerCapabilityMatching は WorkItem 必要 skill を A2A AgentCard skills または local Agent capability declaration と
      照合し WorkerCapabilityMatch score と evidence を生成する。availability assessment 後に実行する。matching activity は
      Runner や SendMessage を開始しない。
  typical_input:
    - description:
        zh: 工作项技能要求与候选 AgentCard/Agent 能力输入。
        en: Work item skill requirements and candidate AgentCard/Agent capability inputs.
        ja: work item skill requirement と candidate AgentCard/Agent capability input。
      format: |-
        {"work_item_ref":"work-item-71@2","worker_pool_ref":"pool:audit-884","required_skills":["ledger.reconcile"],"candidates":[{"binding_ref":"binding-agent-auditor-3","agent_card_ref":"card:auditor-3"},{"binding_ref":"binding-agent-auditor-5","agent_card_ref":"card:auditor-5"}]}
  typical_output:
    - description:
        zh: 每个候选的 WorkerCapabilityMatch 结果引用。
        en: WorkerCapabilityMatch result references per candidate.
        ja: candidate ごとの WorkerCapabilityMatch result reference。
      format: |-
        {"matching_id":"cap-match-884","capability_match_refs":["match:auditor-3","match:auditor-5"],"qualified_count":2}
  reference_implementations:
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents skills metadata for capability matching against work requirements.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents local agent tool/instruction capabilities for matching.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents matching activities producing scored capability evidence.
  source_claims:
    - claim-worker-capability-matching-001
    - claim-worker-capability-matching-002
structure:
  identity_keys:
    - matching_activity_id
  fields:
    - id: matching_activity_id
      labels:
        zh: 匹配活动 ID
        en: matching-activity ID
        ja: 照合活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次要求与候选能力比较活动。
        en: Uniquely identifies one requirement-to-candidate comparison activity.
        ja: 一件の要件—候補比較活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: capability-matching-9
      source_claims:
        - claim-worker-capability-matching-002
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该匹配活动的选择过程。
        en: References the selection process containing this matching activity.
        ja: この照合活動を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-capability-matching-003
    - id: candidate_role_id
      labels:
        zh: 候选角色
        en: candidate role
        ja: 候補役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向能力证据被比较的候选角色。
        en: References the candidate role whose capability evidence is compared.
        ja: 能力証拠を比較する候補役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-capability-matching-004
    - id: requirement_ref
      labels:
        zh: 工作要求引用
        en: work-requirement reference
        ja: 作業要件参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次匹配使用的版本化工作要求。
        en: References the versioned work requirements used for matching.
        ja: 照合に使う版管理作業要件を参照します。
      allowed_values: []
      pattern: null
      example_value: RequirementSet:regulatory-ja-v2
      source_claims:
        - claim-worker-capability-matching-005
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录能力比较完成的时间。
        en: Records when the capability comparison completed.
        ja: 能力比較が完了した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:25Z
      source_claims:
        - claim-worker-capability-matching-006
  constraints: []
  required_relation_constraints:
    - id: matching-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerCapabilityMatching 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerCapabilityMatching must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerCapabilityMatching は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-capability-matching-007
examples:
  - id: WorkerCapabilityMatching-example-positive-manual-2026
    labels:
      zh: WorkerCapabilityMatching positive
      en: WorkerCapabilityMatching positive
      ja: WorkerCapabilityMatching positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 WorkerCapabilityMatching 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as WorkerCapabilityMatching router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が WorkerCapabilityMatching から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {matching_activity_id: capability-matching-9, selection_process_id: WorkerSelectionProcess:worker-selection-12, candidate_role_id: WorkerRole:regulatory-7, requirement_ref: RequirementSet:regulatory-ja-v2, assessed_at: 2026-07-16T01:00:25Z}

    related_node_ids:
      - WorkerCapabilityMatching
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerCapabilityMatching-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-capability-matching-008

  - id: WorkerCapabilityMatching-example-boundary-manual-2026
    labels:
      zh: WorkerCapabilityMatching boundary
      en: WorkerCapabilityMatching boundary
      ja: WorkerCapabilityMatching boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 WorkerCapabilityMatching 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not WorkerCapabilityMatching internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で WorkerCapabilityMatching 内部 spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerCapabilityMatching
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerCapabilityMatching-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-capability-matching-009

  - id: WorkerCapabilityMatching-example-counterexample-confusable
    labels:
      zh: WorkerCapabilityMatching counterexample
      en: WorkerCapabilityMatching counterexample
      ja: WorkerCapabilityMatching counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 WorkerCapabilityMatching ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style WorkerCapabilityMatching ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 WorkerCapabilityMatching ではない。
    field_values: {matching_id: absent, required_capability_refs: absent, match_refs: absent}

    related_node_ids:
      - WorkerCapabilityMatching
      - WorkerCapabilityMatch
      - A2AAgentSkill
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-008

  - id: WorkerCapabilityMatching-example-instance-concrete
    labels:
      zh: WorkerCapabilityMatching instance
      en: WorkerCapabilityMatching instance
      ja: WorkerCapabilityMatching instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 WorkerCapabilityMatching 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to WorkerCapabilityMatching routing decision.
      ja: MRKL 实例 router→calculator→127.05 が WorkerCapabilityMatching routing decision に写像。
    field_values: {matching_activity_id: capability-matching-9, selection_process_id: WorkerSelectionProcess:worker-selection-12, candidate_role_id: WorkerRole:regulatory-7, requirement_ref: RequirementSet:regulatory-ja-v2, assessed_at: 2026-07-16T01:00:25Z}

    related_node_ids:
      - WorkerCapabilityMatching
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-008

