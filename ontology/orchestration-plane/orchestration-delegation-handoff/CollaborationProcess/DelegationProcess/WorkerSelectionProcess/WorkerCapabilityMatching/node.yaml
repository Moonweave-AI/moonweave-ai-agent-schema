schema: moonweave.ai/ontology-node/v1
id: WorkerCapabilityMatching
kind: concept
labels:
  zh: 工作者能力匹配
  en: worker-capability matching
  ja: 作業者能力照合
semantics:
  short_definition:
    zh: 将工作要求与候选能力证据逐项比较的评估活动。
    en: Evaluation activity comparing work requirements with candidate capability evidence item by item.
    ja: work requirements と candidate capability evidence を item 別比較する evaluation activity。
  definition:
    zh: WorkerCapabilityMatching 对 explicit requirements 与 WorkerPool 候选运行，产出 WorkerCapabilityMatch（分数、命中项、缺口、证据引用）。A2A AgentCard.skills[] 与 task 所需 skills 的匹配是 canonical 映射；CrewAI agent role/goal/tools 与 task description 匹配、Cursor subagent_type 能力标签匹配同理。
    en: WorkerCapabilityMatching runs against explicit requirements and WorkerPool candidates, producing WorkerCapabilityMatch (score, satisfied items, gaps, evidence refs). A2A AgentCard.skills[] matched to task-required skills is the canonical mapping; CrewAI agent role/goal/tools vs task description and Cursor subagent_type capability tags are analogous.
    ja: WorkerCapabilityMatching → WorkerCapabilityMatch。A2A AgentCard.skills[] matching が canonical mapping。
  why_needed:
    zh: 把选工作者从名称猜测变为可复核的要求—证据比较。
    en: Turns worker choice from name guessing into reviewable requirement-to-evidence comparison.
    ja: worker 選択を name guess から requirement-evidence 比較へ。
  includes:
    - zh: 纳入技能、输入输出模态、工具许可或领域资格与工作要求之间的比较。
      en: Includes comparison of skills, input/output modes, tool permissions, or domain qualifications against work requirements.
      ja: 技能、入出力モード、ツール許可、領域資格と作業要件との比較を含みます。
  excludes:
    - zh: 排除只检查在线状态的评估，以及未经证据支持的主观偏好排序。
      en: Excludes availability-only checks and preference rankings unsupported by capability evidence.
      ja: 稼働状態だけの確認と、能力証拠に裏付けられない主観的順位付けを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "A2A: compare Task required skills/modalities vs AgentCard.skills and defaultInputModes/defaultOutputModes → WorkerCapabilityMatch。CrewAI: task.description vs agent.backstory/tools。Cursor: task needs vs subagent_type catalog。匹配活动产出持久化 Match 记录供 WorkerSelection 引用。"
    en: "A2A: compare Task required skills/modalities vs AgentCard.skills and defaultInputModes/defaultOutputModes → WorkerCapabilityMatch. CrewAI: task.description vs agent.backstory/tools. Cursor: task needs vs subagent_type catalog. Matching activity persists Match record for WorkerSelection."
    ja: A2A AgentCard.skills vs task requirements → WorkerCapabilityMatch。
  typical_input:
    - description: A2A skills matching.
      format: required:["refund"] vs AgentCard.skills:["refund","billing"]
      source_claims:
        - claim-worker-capability-matching-design
  typical_output:
    - description: Moonweave matching activity.
      format: '{"matching_activity_id":"capability-matching-9"}'
      source_claims:
        - claim-worker-capability-matching-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - matching_activity_id
  fields:
    - id: matching_activity_id
      labels:
        zh: 匹配活动 ID
        en: matching-activity ID
        ja: 照合活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次要求与候选能力比较活动。
        en: Uniquely identifies one requirement-to-candidate comparison activity.
        ja: 一件の要件—候補比較活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: capability-matching-9
      source_claims:
        - claim-worker-capability-matching-design
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该匹配活动的选择过程。
        en: References the selection process containing this matching activity.
        ja: この照合活動を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-capability-matching-design
    - id: candidate_role_id
      labels:
        zh: 候选角色
        en: candidate role
        ja: 候補役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向能力证据被比较的候选角色。
        en: References the candidate role whose capability evidence is compared.
        ja: 能力証拠を比較する候補役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-capability-matching-design
    - id: requirement_ref
      labels:
        zh: 工作要求引用
        en: work-requirement reference
        ja: 作業要件参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次匹配使用的版本化工作要求。
        en: References the versioned work requirements used for matching.
        ja: 照合に使う版管理作業要件を参照します。
      allowed_values: []
      pattern: null
      example_value: RequirementSet:regulatory-ja-v2
      source_claims:
        - claim-worker-capability-matching-design
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录能力比较完成的时间。
        en: Records when the capability comparison completed.
        ja: 能力比較が完了した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:25Z
      source_claims:
        - claim-worker-capability-matching-design
  constraints: []
  required_relation_constraints:
    - id: matching-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerCapabilityMatching 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerCapabilityMatching must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerCapabilityMatching は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-capability-matching-design
examples:
  - id: WorkerCapabilityMatching-example-a2a-skills
    labels:
      zh: A2A skills 匹配
      en: A2A skills matching
      ja: A2A skills matching
    descriptions:
      zh: Task 需要 refund skill；billing AgentCard.skills 命中。
      en: Task requires refund skill; billing AgentCard.skills satisfies.
      ja: Task refund skill ← billing AgentCard.skills 命中。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard.skills
    field_values:
      matching_activity_id: capability-matching-9
      candidate_role_id: WorkerRole:billing-agent
    related_node_ids:
      - WorkerCapabilityMatching
      - WorkerCapabilityMatch
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-design
  - id: WorkerCapabilityMatching-example-crewai-tools
    labels:
      zh: CrewAI 工具匹配
      en: CrewAI tool matching
      ja: CrewAI tool matching
    descriptions:
      zh: Task 需要 search_tool；researcher agent tools 命中。
      en: Task needs search_tool; researcher agent tools satisfy.
      ja: Task search_tool ← researcher tools 命中。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: agent tools
    field_values:
      matching_activity_id: capability-matching-crew-3
    related_node_ids:
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-design
  - id: WorkerCapabilityMatching-example-cursor-explore
    labels:
      zh: Cursor explore 匹配
      en: Cursor explore matching
      ja: Cursor explore matching
    descriptions:
      zh: 代码库调查任务匹配 explore subagent_type。
      en: Codebase investigation task matches explore subagent_type.
      ja: codebase investigation → explore subagent_type。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent_type
    field_values:
      matching_activity_id: capability-matching-cursor-2
    related_node_ids:
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-design
  - id: WorkerCapabilityMatching-example-boundary-availability-only
    labels:
      zh: 仅可用性不够
      en: Availability-only insufficient
      ja: availability のみ不十分
    descriptions:
      zh: 只检查 online 状态而无 skills/requirements 比较，不是 WorkerCapabilityMatching。
      en: Checking online status only without skills/requirements comparison is not WorkerCapabilityMatching.
      ja: online 確認のみでは WorkerCapabilityMatching にならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-matching-design
parent_relation:
  id: WorkerCapabilityMatching-phase_of-WorkerSelectionProcess
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 工作者能力匹配是选择过程中比较可用候选与工作要求的组成阶段。
    en: Worker-capability matching is the constituent selection phase that compares available candidates with work requirements.
    ja: 作業者能力照合は利用可能候補と作業要件を比較する選択の構成段階です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有阶段
      en: has phase
      ja: 段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-capability-matching-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: WorkerCapabilityMatching-precedes-WorkerSelectionDecisionActivity
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: precedes
      en: precedes
      ja: precedes
    definitions:
      zh: 同一选择中的能力匹配先于选择决策，使决定只能引用已经形成的匹配证据。
      en: Capability matching precedes the selection decision in one selection so the decision cites completed match evidence.
      ja: 同一選択で能力照合は選択決定に先行し、決定は完成済み照合証拠を参照します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: follows
      labels:
        zh: 后继于
        en: follows
        ja: 後続する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-capability-matching-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerSelectionDecisionActivity
