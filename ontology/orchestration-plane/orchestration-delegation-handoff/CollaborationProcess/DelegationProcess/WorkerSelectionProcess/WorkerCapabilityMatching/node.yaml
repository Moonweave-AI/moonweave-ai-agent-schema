      en: The record is accepted as WorkerCapabilityMatching with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerCapabilityMatching として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者能力匹配是把工作要求与可用候选的能力证据逐项比较的评估活动。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Worker-capability matching is an evaluation activity that compares work requirements with the capability evidence of available candidates."
      ja: この場面は次の同一性条件を満たします：作業者能力照合は、作業要件と利用可能候補の能力証拠を項目別に比較する評価活動です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-capability-matching-008
  - id: WorkerCapabilityMatching-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者能力匹配边界例
      en: Boundary worker-capability matching case
      ja: 作業者能力照合の境界例
    scenario_id: null
    descriptions:
      zh: 负载均衡器因为候选当前空闲而选中它，却没有比较任务技能要求；这不是能力匹配。
      en: A load balancer picks a currently idle candidate without comparing task-skill requirements; that is not capability matching.
      ja: 負荷分散器が空いている候補を選ぶだけで作業技能要件を比較しない場合、能力照合ではありません。
    field_values: {}
