schema: moonweave.ai/ontology-node/v1
id: WorkerCapabilityMatch
kind: concept
labels:
  zh: 工作者能力匹配证据
  en: worker-capability match evidence
  ja: 作業者能力照合証拠
semantics:
  short_definition:
    zh: 一次能力匹配活动对单个候选得出的评分与缺口记录。
    en: Score and gap record for one candidate from one capability-matching activity.
    ja: 一回の capability matching が単一 candidate について出す score/gap record。
  definition:
    zh: WorkerCapabilityMatch 绑定 matching_activity_id、candidate_role_id、match_score、satisfied_requirements、gap_requirements 与 evidence_refs。它是 WorkerCapabilityMatching 的持久化结果，供 WorkerSelectionDecisionActivity 引用；不是匹配活动本身。
    en: WorkerCapabilityMatch binds matching_activity_id, candidate_role_id, match_score, satisfied_requirements, gap_requirements, and evidence_refs. It is the persisted result of WorkerCapabilityMatching for WorkerSelectionDecisionActivity; not the matching activity itself.
    ja: WorkerCapabilityMatch は matching result を persist。WorkerSelectionDecisionActivity が参照。
  why_needed:
    zh: 保留每个候选的能力命中与缺口证据供审计。
    en: Preserves capability hit and gap evidence per candidate for audit.
    ja: candidate ごとの capability hit/gap evidence を audit 用に保持。
  includes:
    - zh: 纳入绑定一个匹配活动、一个候选角色和一个要求集合的评分与理由记录。
      en: Includes score-and-rationale records tied to one matching activity, one candidate role, and one requirement set.
      ja: 一件の照合活動、一候補役割、一要件集合に結び付く得点・理由記録を含みます。
  excludes:
    - zh: 排除候选角色的长期能力档案、可用性状态和没有要求引用的主观评价。
      en: Excludes long-lived capability profiles, availability state, and subjective ratings with no requirement reference.
      ja: 候補役割の長期能力プロファイル、可用性状態、要件参照のない主観評価を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A skills 命中写入 satisfied_requirements；缺失 modality 写入 gap_requirements；AgentCard 引用写入 evidence_refs。
    en: A2A skill hits go to satisfied_requirements; missing modalities to gap_requirements; AgentCard refs to evidence_refs.
    ja: A2A skill hit → satisfied_requirements、modality gap → gap_requirements。
  typical_input:
    - description: Match record.
      format: '{"match_score":0.92,"satisfied_requirements":["refund"],"gap_requirements":[]}'
      source_claims:
        - claim-worker-capability-match-design
  typical_output:
    - description: Moonweave WorkerCapabilityMatch.
      format: '{"matching_activity_id":"capability-matching-9"}'
      source_claims:
        - claim-worker-capability-match-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - matching_activity_id
    - worker_role_id
  fields:
    - id: matching_activity_id
      labels:
        zh: 匹配活动 ID
        en: matching-activity ID
        ja: 照合活動 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行该需求比较并产生本匹配证据的能力匹配活动。
        en: References the capability-matching activity that performed the requirement comparison and produced this evidence.
        ja: 要求比較を実行し、この一致証拠を生成した能力照合活動を参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerCapabilityMatching:001
      source_claims:
        - claim-worker-capability-match-design
    - id: worker_role_id
      labels:
        zh: 工作者角色 ID
        en: worker-role ID
        ja: ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本匹配结论所评价的唯一候选工作者角色。
        en: References the single candidate worker role evaluated by this match record.
        ja: この一致記録で評価した一つの候補作業者ロールを参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-capability-match-design
    - id: requirement_ref
      labels:
        zh: 需求引用
        en: requirement reference
        ja: 要件参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用评分和匹配判断所针对的版本化工作需求。
        en: References the versioned work requirement against which score and match were determined.
        ja: 点数と一致判断の基準となった版付き作業要求を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:audit
      source_claims:
        - claim-worker-capability-match-design
    - id: score
      labels:
        zh: 匹配分数
        en: match score
        ja: 照合スコア
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 0 到 1 的归一化值表示候选证据覆盖该需求的程度；它不是选择决定。
        en: Expresses normalized evidence coverage of the requirement from 0 to 1; it is not a selection decision.
        ja: 要求に対する候補証拠の被覆度を 0 から 1 で示し、選択判断とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.92
      source_claims:
        - claim-worker-capability-match-design
    - id: matched
      labels:
        zh: 是否匹配
        en: matched
        ja: 照合成立
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选角色是否满足该需求版本规定的最低匹配判据。
        en: Records whether the candidate role satisfies the minimum match criterion defined by that requirement version.
        ja: 候補ロールがその要求版の最低一致基準を満たすかを記録します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-worker-capability-match-design
    - id: reason
      labels:
        zh: 匹配理由
        en: match reason
        ja: 照合理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释匹配或不匹配结论，包括满足项、缺口和适用判据。
        en: Explains the match or non-match conclusion, including satisfied items, gaps, and the applied criterion.
        ja: 充足項目、不足、適用基準を含め、一致または不一致の理由を説明します。
      allowed_values: []
      pattern: null
      example_value: capability and authority satisfy the work requirement
      source_claims:
        - claim-worker-capability-match-design
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: 証拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用用于比较的能力声明、资质、工具权限或已验证表现记录。
        en: References capability declarations, credentials, tool permissions, or validated performance records used in comparison.
        ja: 比較に用いた能力宣言、資格、ツール権限、検証済み実績記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - CapabilityDescriptor:code-review
      source_claims:
        - claim-worker-capability-match-design
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录针对该需求版本完成匹配评估的 UTC 时刻。
        en: Records the UTC instant at which matching against this requirement version completed.
        ja: この要求版に対する一致評価が完了した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:12:00Z
      source_claims:
        - claim-worker-capability-match-design
  constraints:
    - id: worker-capability-match-score
      severity: error
      expression_language: plain
      expression: score is between 0 and 1
      explanations:
        zh: 匹配分数必须在 0 到 1 之间。
        en: Capability-match score is normalized to [0,1].
        ja: 能力照合スコアは 0 から 1 の範囲です。
      source_claims:
        - claim-worker-capability-match-design
  required_relation_constraints:
    - id: match-evidence-of-matching
      direction: incoming
      predicate: has_evidence
      target_concept_id: WorkerCapabilityMatching
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerCapabilityMatch 必须通过 has_evidence 保持与 WorkerCapabilityMatching 的实例级语义约束。
        en: WorkerCapabilityMatch must preserve its instance-level has_evidence constraint with WorkerCapabilityMatching.
        ja: WorkerCapabilityMatch は WorkerCapabilityMatching とのインスタンスレベル has_evidence 制約を保持しなければなりません。
      source_claims:
        - claim-worker-capability-match-design
examples:
  - id: WorkerCapabilityMatch-example-high-score
    labels:
      zh: 高分匹配
      en: High-score match
      ja: high-score match
    descriptions:
      zh: billing agent match_score=0.95，satisfied refund+billing。
      en: Billing agent match_score=0.95, satisfied refund+billing.
      ja: billing agent match_score=0.95。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: skills match
    field_values:
      match_score: 0.95
      satisfied_requirements:
        - refund
        - billing
    related_node_ids:
      - WorkerCapabilityMatch
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-design
  - id: WorkerCapabilityMatch-example-gap
    labels:
      zh: 有缺口匹配
      en: Match with gaps
      ja: gap あり match
    descriptions:
      zh: technical agent 缺 refund skill，gap_requirements 含 refund。
      en: Technical agent lacks refund skill; gap_requirements includes refund.
      ja: technical agent refund skill 欠如 → gap。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: skill gap
    field_values:
      match_score: 0.4
      gap_requirements:
        - refund
    related_node_ids:
      - WorkerCapabilityMatch
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-design
  - id: WorkerCapabilityMatch-example-crewai
    labels:
      zh: CrewAI 匹配分
      en: CrewAI match score
      ja: CrewAI match score
    descriptions:
      zh: Researcher tools 命中 search 要求，score=0.88。
      en: Researcher tools satisfy search requirement, score=0.88.
      ja: researcher search 命中 score=0.88。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: tool match
    field_values:
      match_score: 0.88
    related_node_ids:
      - WorkerCapabilityMatch
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-design
  - id: WorkerCapabilityMatch-example-boundary-activity
    labels:
      zh: 活动不是匹配记录
      en: Activity is not match record
      ja: activity は match record ではない
    descriptions:
      zh: WorkerCapabilityMatching 活动身份不能代替 WorkerCapabilityMatch 结果。
      en: WorkerCapabilityMatching activity identity cannot substitute WorkerCapabilityMatch result.
      ja: WorkerCapabilityMatching activity は WorkerCapabilityMatch の代替にならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerCapabilityMatch
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-design
parent_relation:
  id: WorkerCapabilityMatching-has_evidence-WorkerCapabilityMatch
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has evidence
    en: has evidence
    ja: has evidence
  definitions:
    zh: 一次能力匹配以组成关系拥有为候选与要求集合生成的匹配证据记录。
    en: A capability-matching activity compositionally contains the match-evidence record for its candidate and requirement set.
    ja: 一件の能力照合活動は候補と要件集合に対する照合証拠記録を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其证据
      en: evidence of
      ja: 証拠である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-capability-match-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
