      en: justifies
      ja: justifies
    definitions:
      zh: 工作者能力匹配证据通过要求覆盖、缺口和来源引用为工作者选择记录提供理由。
      en: Worker-capability match evidence justifies a worker-selection record through requirement coverage, gaps, and source references.
      ja: 作業者能力照合証拠は要件充足、欠落、出典参照により作業者選択記録を正当化します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: justified_by
      labels:
        zh: 由其论证
        en: justified by
        ja: 根拠付けられる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-capability-match-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerSelection
