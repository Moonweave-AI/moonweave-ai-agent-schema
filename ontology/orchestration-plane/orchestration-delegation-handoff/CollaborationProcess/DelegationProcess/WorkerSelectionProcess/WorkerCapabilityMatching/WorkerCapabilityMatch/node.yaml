    why_valid_or_invalid:
      zh: 场景满足 工作者能力匹配证据是一个候选角色相对于明确工作要求的评估结果记录。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Worker-capability match evidence is the recorded evaluation result for one candidate role against explicit work requirements."
      ja: この場面は次の同一性条件を満たします：作業者能力照合証拠は、一つの候補役割を明示作業要件に対して評価した結果記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-capability-match-012
  - id: WorkerCapabilityMatch-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者能力匹配证据边界例
      en: Boundary worker-capability match evidence case
      ja: 作業者能力照合証拠の境界例
    scenario_id: null
