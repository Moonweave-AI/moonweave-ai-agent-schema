schema: moonweave.ai/ontology-node/v1
id: WorkerCapabilityMatch
kind: concept
labels:
  zh: 工作者能力匹配证据
  en: worker-capability match evidence
  ja: 作業者能力照合証拠
semantics:
  short_definition:
    zh: 单个候选相对明确工作要求的匹配评估记录。
    en: Recorded capability-fit evidence for one candidate against requirements.
    ja: 一候補を明示要件に対して評価した能力適合記録。
  definition:
    zh: 工作者能力匹配证据是一个候选角色相对于明确工作要求的评估结果记录。 它记录要求引用、分数、是否匹配、理由、证据引用和评估时间，并可用于说明后续选择决定。
    en: Worker-capability match evidence is the recorded evaluation result for one candidate role against explicit work requirements. It records requirement reference, score, match flag, rationale, evidence references, and assessment time and can justify a later selection.
    ja: 作業者能力照合証拠は、一つの候補役割を明示作業要件に対して評価した結果記録です。 要件参照、得点、適合フラグ、理由、証拠参照、評価時刻を記録し、後続選択を説明できます。
  why_needed:
    zh: 该节点把匹配活动的输出固定为可复核证据，并与活动本身及最终选择记录分开。
    en: The node fixes the output of matching as reviewable evidence distinct from both the activity and the final selection record.
    ja: 照合活動の出力を再検証可能な証拠として固定し、活動自体と最終選択記録から分離します。
  includes:
    - zh: 纳入绑定一个匹配活动、一个候选角色和一个要求集合的评分与理由记录。
      en: Includes score-and-rationale records tied to one matching activity, one candidate role, and one requirement set.
      ja: 一件の照合活動、一候補役割、一要件集合に結び付く得点・理由記録を含みます。
  excludes:
    - zh: 排除候选角色的长期能力档案、可用性状态和没有要求引用的主观评价。
      en: Excludes long-lived capability profiles, availability state, and subjective ratings with no requirement reference.
      ja: 候補役割の長期能力プロファイル、可用性状態、要件参照のない主観評価を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerCapabilityMatch 保存一次匹配活动的 scored 结果与 evidence_refs，供 WorkerSelectionDecisionActivity
      排序候选。不是 AgentCard 本身；分数过期需重新匹配当 WorkItem revision 或 AgentCard 变更。
    en: >-
      WorkerCapabilityMatch stores scored results and evidence_refs from one matching activity for
      WorkerSelectionDecisionActivity candidate ordering. Not the AgentCard itself; scores stale when WorkItem revision or
      AgentCard changes require re-match.
    ja: >-
      WorkerCapabilityMatch は一回 matching activity の scored result と evidence_refs を保存し
      WorkerSelectionDecisionActivity の candidate ordering に供する。AgentCard 自体ではない。WorkItem revision または
      AgentCard 変更時は re-match が必要で score は stale になる。
  typical_input:
    - description:
        zh: 单个候选相对工作项的能力匹配评估输入。
        en: Single-candidate capability match evaluation input against work item.
        ja: work item に対する single-candidate capability match evaluation input。
      format: |-
        {"candidate_binding_ref":"binding-agent-auditor-3","work_item_ref":"work-item-71@2","required_skills":["ledger.reconcile"],"agent_card_ref":"card:auditor-3"}
  typical_output:
    - description:
        zh: 带分数与证据引用的 WorkerCapabilityMatch 记录。
        en: WorkerCapabilityMatch record with score and evidence references.
        ja: score と evidence reference を持つ WorkerCapabilityMatch record。
      format: |-
        {"capability_match_id":"match:auditor-3","score":0.92,"evidence_refs":["card:auditor-3#skill:ledger.reconcile"],"matching_ref":"cap-match-884"}
  reference_implementations:
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents skill evidence used in capability match scoring.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents local agent capabilities compared to work requirements.
    - name: W3C PROV-O Entity
      url: https://www.w3.org/TR/prov-o/#Entity
      description: Documents scored match records as entities derived from matching activities.
  source_claims:
    - claim-worker-capability-match-001
    - claim-worker-capability-match-002
structure:
  identity_keys:
    - matching_activity_id
    - worker_role_id
  fields:
    - id: matching_activity_id
      labels:
        zh: 匹配活动 ID
        en: matching-activity ID
        ja: 照合活動 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行该需求比较并产生本匹配证据的能力匹配活动。
        en: References the capability-matching activity that performed the requirement comparison and produced this evidence.
        ja: 要求比較を実行し、この一致証拠を生成した能力照合活動を参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerCapabilityMatching:001
      source_claims:
        - claim-worker-capability-match-002
    - id: worker_role_id
      labels:
        zh: 工作者角色 ID
        en: worker-role ID
        ja: ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本匹配结论所评价的唯一候选工作者角色。
        en: References the single candidate worker role evaluated by this match record.
        ja: この一致記録で評価した一つの候補作業者ロールを参照します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-capability-match-003
    - id: requirement_ref
      labels:
        zh: 需求引用
        en: requirement reference
        ja: 要件参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用评分和匹配判断所针对的版本化工作需求。
        en: References the versioned work requirement against which score and match were determined.
        ja: 点数と一致判断の基準となった版付き作業要求を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:audit
      source_claims:
        - claim-worker-capability-match-004
    - id: score
      labels:
        zh: 匹配分数
        en: match score
        ja: 照合スコア
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 0 到 1 的归一化值表示候选证据覆盖该需求的程度；它不是选择决定。
        en: Expresses normalized evidence coverage of the requirement from 0 to 1; it is not a selection decision.
        ja: 要求に対する候補証拠の被覆度を 0 から 1 で示し、選択判断とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.92
      source_claims:
        - claim-worker-capability-match-005
    - id: matched
      labels:
        zh: 是否匹配
        en: matched
        ja: 照合成立
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选角色是否满足该需求版本规定的最低匹配判据。
        en: Records whether the candidate role satisfies the minimum match criterion defined by that requirement version.
        ja: 候補ロールがその要求版の最低一致基準を満たすかを記録します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-worker-capability-match-006
    - id: reason
      labels:
        zh: 匹配理由
        en: match reason
        ja: 照合理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释匹配或不匹配结论，包括满足项、缺口和适用判据。
        en: Explains the match or non-match conclusion, including satisfied items, gaps, and the applied criterion.
        ja: 充足項目、不足、適用基準を含め、一致または不一致の理由を説明します。
      allowed_values: []
      pattern: null
      example_value: capability and authority satisfy the work requirement
      source_claims:
        - claim-worker-capability-match-007
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: 証拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用用于比较的能力声明、资质、工具权限或已验证表现记录。
        en: References capability declarations, credentials, tool permissions, or validated performance records used in comparison.
        ja: 比較に用いた能力宣言、資格、ツール権限、検証済み実績記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - CapabilityDescriptor:code-review
      source_claims:
        - claim-worker-capability-match-008
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录针对该需求版本完成匹配评估的 UTC 时刻。
        en: Records the UTC instant at which matching against this requirement version completed.
        ja: この要求版に対する一致評価が完了した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:12:00Z
      source_claims:
        - claim-worker-capability-match-009
  constraints:
    - id: worker-capability-match-score
      severity: error
      expression_language: plain
      expression: score is between 0 and 1
      explanations:
        zh: 匹配分数必须在 0 到 1 之间。
        en: Capability-match score is normalized to [0,1].
        ja: 能力照合スコアは 0 から 1 の範囲です。
      source_claims:
        - claim-worker-capability-match-010
  required_relation_constraints:
    - id: match-evidence-of-matching
      direction: incoming
      predicate: has_evidence
      target_concept_id: WorkerCapabilityMatching
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerCapabilityMatch 必须通过 has_evidence 保持与 WorkerCapabilityMatching 的实例级语义约束。
        en: WorkerCapabilityMatch must preserve its instance-level has_evidence constraint with WorkerCapabilityMatching.
        ja: WorkerCapabilityMatch は WorkerCapabilityMatching とのインスタンスレベル has_evidence 制約を保持しなければなりません。
      source_claims:
        - claim-worker-capability-match-011
examples:
  - id: WorkerCapabilityMatch-example-positive-manual-2026
    labels:
      zh: WorkerCapabilityMatch positive
      en: WorkerCapabilityMatch positive
      ja: WorkerCapabilityMatch positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 WorkerCapabilityMatch 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as WorkerCapabilityMatch router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が WorkerCapabilityMatch から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {matching_activity_id: WorkerCapabilityMatching:001, worker_role_id: WorkerRole:007, requirement_ref: WorkItem:audit, score: 0.92, matched: true, reason: "capability and authority satisfy the work requirement"}

    related_node_ids:
      - WorkerCapabilityMatch
      - WorkerCapabilityMatching
    related_relation_ids:
      - WorkerCapabilityMatching-has_evidence-WorkerCapabilityMatch
    source_claims:
      - claim-worker-capability-match-012

  - id: WorkerCapabilityMatch-example-boundary-manual-2026
    labels:
      zh: WorkerCapabilityMatch boundary
      en: WorkerCapabilityMatch boundary
      ja: WorkerCapabilityMatch boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 WorkerCapabilityMatch 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not WorkerCapabilityMatch internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で WorkerCapabilityMatch 内部 spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerCapabilityMatch
      - WorkerCapabilityMatching
    related_relation_ids:
      - WorkerCapabilityMatching-has_evidence-WorkerCapabilityMatch
    source_claims:
      - claim-worker-capability-match-013

  - id: WorkerCapabilityMatch-example-counterexample-confusable
    labels:
      zh: WorkerCapabilityMatch counterexample
      en: WorkerCapabilityMatch counterexample
      ja: WorkerCapabilityMatch counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 WorkerCapabilityMatch ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style WorkerCapabilityMatch ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 WorkerCapabilityMatch ではない。
    field_values: {match_id: absent, matched_capability_ref: absent, gap_summary: absent}

    related_node_ids:
      - WorkerCapabilityMatch
      - WorkerCapabilityMatching
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-012

  - id: WorkerCapabilityMatch-example-instance-concrete
    labels:
      zh: WorkerCapabilityMatch instance
      en: WorkerCapabilityMatch instance
      ja: WorkerCapabilityMatch instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 WorkerCapabilityMatch 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to WorkerCapabilityMatch routing decision.
      ja: MRKL 实例 router→calculator→127.05 が WorkerCapabilityMatch routing decision に写像。
    field_values: {matching_activity_id: WorkerCapabilityMatching:001, worker_role_id: WorkerRole:007, requirement_ref: WorkItem:audit, score: 0.92, matched: true, reason: "capability and authority satisfy the work requirement"}

    related_node_ids:
      - WorkerCapabilityMatch
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-capability-match-012

