schema: moonweave.ai/ontology-node/v1
id: WorkerSelectionDecisionActivity
kind: concept
labels:
  zh: 工作者选择决策
  en: worker-selection decision activity
  ja: 作業者選択決定活動
semantics:
  short_definition:
    zh: 综合证据并选定一个受派角色的一次决策活动。
    en: Decision activity that picks one delegate role from evidence.
    ja: 証拠を統合して一つの受任役割を選ぶ決定活動。
  definition:
    zh: 工作者选择决策是综合候选评估证据并确定一个受派角色的一次决策活动。 它读取候选池、可用性和能力匹配，记录选择理由与落选理由，并产出 WorkerSelection 决策记录。
    en: A worker-selection decision activity is a decision activity that combines candidate evidence and chooses one delegate role. It reads the candidate pool, availability, and capability matches, records selection and rejection reasons, and produces a WorkerSelection decision record.
    ja: 作業者選択決定活動は候補評価証拠を統合し、一つの受任役割を選ぶ決定活動です。 候補プール、可用性、能力照合を読み、選択理由と不採用理由を記録し、WorkerSelection 決定記録を生成します。
  why_needed:
    zh: 该节点把“做出决定的活动”与“决定记录”分开，使决策时间、执行者和依据均可追踪。
    en: The node separates the act of deciding from the decision record so decision time, decision maker, and rationale remain traceable.
    ja: 決定する行為と決定記録を分け、決定時刻、決定者、根拠を追跡可能にします。
  includes:
    - zh: 纳入基于一组已评估候选形成唯一受派方或明确无合格候选结论的活动。
      en: Includes activities that choose one delegate from assessed candidates or explicitly conclude that none qualifies.
      ja: 評価済み候補から一名を選ぶ、または適格候補なしと明示する活動を含みます。
  excludes:
    - zh: 排除候选发现、单项评分，以及已经生成并供查询的 WorkerSelection 记录本身。
      en: Excludes candidate discovery, one assessment score, and the persisted WorkerSelection record itself.
      ja: 候補発見、単一評価得点、保存済み WorkerSelection 記録そのものを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerSelectionDecisionActivity 综合 WorkerAvailability 与 WorkerCapabilityMatch 证据，产出
      WorkerSelection 记录（含落选理由）。Orchestrator 或 policy 服务执行；A2A AgentCard 只提供输入元数据，
      不是决策本身。决策完成后触发 WorkerAssignment，不在此活动内启动 Runner。
    en: >-
      WorkerSelectionDecisionActivity combines WorkerAvailability and WorkerCapabilityMatch evidence to produce WorkerSelection
      records with rejection reasons. Executed by orchestrator or policy service; A2A AgentCard supplies input metadata only,
      not the decision. Triggers WorkerAssignment after completion without starting Runner in this activity.
    ja: >-
      WorkerSelectionDecisionActivity は WorkerAvailability と WorkerCapabilityMatch evidence を統合し rejection reason 付き
      WorkerSelection record を生成する。orchestrator または policy service が実行する。A2A AgentCard は input metadata のみ供給し
      decision 自体ではない。完了後 WorkerAssignment を trigger しこの activity 内で Runner は開始しない。
  typical_input:
    - description:
        zh: 候选池评估证据与选择策略引用。
        en: Candidate pool assessment evidence and selection policy reference.
        ja: candidate pool assessment evidence と selection policy reference。
      format: |-
        {"worker_selection_process_ref":"wsel-884","worker_pool_ref":"pool:audit-884","availability_refs":["avail:auditor-3","avail:auditor-5"],"capability_match_refs":["match:auditor-3","match:auditor-5"],"selection_policy_ref":"policy:audit-delegate@1"}
  typical_output:
    - description:
        zh: WorkerSelection 决策记录与选择/落选理由。
        en: WorkerSelection decision record with selection and rejection rationale.
        ja: selection/rejection rationale を持つ WorkerSelection decision record。
      format: |-
        {"worker_selection_id":"wsel-decision-884","selected_binding_ref":"binding-agent-auditor-3","rejected_bindings":[{"ref":"binding-agent-auditor-5","reason":"lower_capability_score"}],"decided_at":"2026-07-16T09:05:30Z"}
  reference_implementations:
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents policy-driven selection over structured candidate evidence.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents agent capability inputs to selection decisions.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents decision activities distinct from decision records they produce.
  source_claims:
    - claim-worker-selection-decision-001
    - claim-worker-selection-decision-002
structure:
  identity_keys:
    - decision_activity_id
  fields:
    - id: decision_activity_id
      labels:
        zh: 选择决策活动 ID
        en: selection-decision activity ID
        ja: 選択決定活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选选择决策。
        en: Uniquely identifies one candidate-selection decision activity.
        ja: 一件の候補選択決定活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: selection-decision-3
      source_claims:
        - claim-worker-selection-decision-activity-002
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该决定的选择过程。
        en: References the selection process containing the decision.
        ja: この決定を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-selection-decision-activity-003
    - id: selected_role_id
      labels:
        zh: 选中角色
        en: selected role
        ja: 選択役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向决定选中的受派角色。
        en: References the delegate role chosen by the decision.
        ja: 決定で選ばれた受任役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-selection-decision-activity-004
    - id: decision_basis_refs
      labels:
        zh: 决定依据引用
        en: decision-basis references
        ja: 決定根拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持选择和落选理由的评估记录。
        en: References assessment records supporting selection and rejection reasons.
        ja: 選択・不採用理由を支える評価記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - WorkerAvailability:7
        - WorkerCapabilityMatch:9
      source_claims:
        - claim-worker-selection-decision-activity-005
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 決定時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录选择决定形成的时间。
        en: Records when the selection decision was made.
        ja: 選択決定が形成された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-decision-activity-006
  constraints: []
  required_relation_constraints:
    - id: decision-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionDecisionActivity 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerSelectionDecisionActivity must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerSelectionDecisionActivity は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-decision-activity-007
examples:
  - id: WorkerSelectionDecisionActivity-example-positive-manual-2026
    labels:
      zh: WorkerSelectionDecisionActivity positive
      en: WorkerSelectionDecisionActivity positive
      ja: WorkerSelectionDecisionActivity positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 WorkerSelectionDecisionActivity 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as WorkerSelectionDecisionActivity router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が WorkerSelectionDecisionActivity から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {decision_activity_id: selection-decision-3, selection_process_id: WorkerSelectionProcess:worker-selection-12, selected_role_id: WorkerRole:regulatory-7}

    related_node_ids:
      - WorkerSelectionDecisionActivity
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-selection-decision-activity-008

  - id: WorkerSelectionDecisionActivity-example-boundary-manual-2026
    labels:
      zh: WorkerSelectionDecisionActivity boundary
      en: WorkerSelectionDecisionActivity boundary
      ja: WorkerSelectionDecisionActivity boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 WorkerSelectionDecisionActivity 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not WorkerSelectionDecisionActivity delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で WorkerSelectionDecisionActivity delegation spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerSelectionDecisionActivity
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess
    source_claims:
      - claim-worker-selection-decision-activity-009

  - id: WorkerSelectionDecisionActivity-example-counterexample-confusable
    labels:
      zh: WorkerSelectionDecisionActivity counterexample
      en: WorkerSelectionDecisionActivity counterexample
      ja: WorkerSelectionDecisionActivity counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 WorkerSelectionDecisionActivity ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style WorkerSelectionDecisionActivity ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 WorkerSelectionDecisionActivity ではない。
    field_values: {decision_activity_id: absent, selection_basis_digest: absent, selected_worker_ref: absent}

    related_node_ids:
      - WorkerSelectionDecisionActivity
      - WorkerSelection
      - WorkerCapabilityMatching
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-activity-008

  - id: WorkerSelectionDecisionActivity-example-instance-concrete
    labels:
      zh: WorkerSelectionDecisionActivity instance
      en: WorkerSelectionDecisionActivity instance
      ja: WorkerSelectionDecisionActivity instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 WorkerSelectionDecisionActivity 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to WorkerSelectionDecisionActivity routing decision.
      ja: MRKL 实例 router→calculator→127.05 が WorkerSelectionDecisionActivity routing decision に写像。
    field_values: {decision_activity_id: selection-decision-3, selection_process_id: WorkerSelectionProcess:worker-selection-12, selected_role_id: WorkerRole:regulatory-7}

    related_node_ids:
      - WorkerSelectionDecisionActivity
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-activity-008

