      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选选择决策。
        en: Uniquely identifies one candidate-selection decision activity.
        ja: 一件の候補選択決定活動を一意に識別します。
      allowed_values: []
      pattern: null
