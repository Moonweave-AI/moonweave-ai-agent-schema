schema: moonweave.ai/ontology-node/v1
id: WorkerSelectionDecisionActivity
kind: concept
labels:
  zh: 工作者选择决策
  en: worker-selection decision activity
  ja: 作業者選択決定活動
semantics:
  short_definition:
    zh: 综合可用性与能力证据并作出工作者选择决定的活动。
    en: Activity that synthesizes availability and capability evidence and decides worker selection.
    ja: availability/capability evidence を統合し worker selection を決定する activity。
  definition:
    zh: WorkerSelectionDecisionActivity 读取 WorkerAvailability 与 WorkerCapabilityMatch，产出 WorkerSelection 记录。OpenAI handoff 列表中 model 选择 transfer_to_* 目标、A2A 客户端在匹配后选定 AgentCard url、CrewAI manager 选定 worker agent，均映射为一次 decision activity；即时 route 无 decision_basis_refs 则不是本概念。
    en: WorkerSelectionDecisionActivity reads WorkerAvailability and WorkerCapabilityMatch to produce WorkerSelection. OpenAI model choosing among handoff transfer_to_* destinations, A2A client selecting AgentCard url after matching, and CrewAI manager picking worker agent map to one decision activity; immediate route without decision_basis_refs is not this concept.
    ja: WorkerAvailability + WorkerCapabilityMatch → WorkerSelection。OpenAI handoff 先/A2A AgentCard 選択/CrewAI manager 選定が occurrence。
  why_needed:
    zh: 把选择动作与选择结果、候选池分离以便审计。
    en: Separates deciding act from selection result and candidate pool for audit.
    ja: deciding act/selection result/candidate pool を audit 用に分離。
  includes:
    - zh: 纳入基于一组已评估候选形成唯一受派方或明确无合格候选结论的活动。
      en: Includes activities that choose one delegate from assessed candidates or explicitly conclude that none qualifies.
      ja: 評価済み候補から一名を選ぶ、または適格候補なしと明示する活動を含みます。
  excludes:
    - zh: 排除候选发现、单项评分，以及已经生成并供查询的 WorkerSelection 记录本身。
      en: Excludes candidate discovery, one assessment score, and the persisted WorkerSelection record itself.
      ja: 候補発見、単一評価得点、保存済み WorkerSelection 記録そのものを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: decision_basis_refs 必须引用 WorkerCapabilityMatch 与/或 WorkerAvailability；selected_role_id 写入 WorkerSelection；随后触发 WorkerAssignment。
    en: decision_basis_refs must reference WorkerCapabilityMatch and/or WorkerAvailability; selected_role_id feeds WorkerSelection; then WorkerAssignment.
    ja: decision_basis_refs に Match/Availability 必須。
  typical_input:
    - description: Selection decision.
      format: '{"decision_activity_id":"decision-884","selected_role_id":"WorkerRole:billing","decision_basis_refs":["cap-match-9","avail-9"]}'
      source_claims:
        - claim-worker-selection-decision-design
  typical_output:
    - description: Moonweave decision activity.
      format: '{"decision_activity_id":"decision-884"}'
      source_claims:
        - claim-worker-selection-decision-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - decision_activity_id
  fields:
    - id: decision_activity_id
      labels:
        zh: 选择决策活动 ID
        en: selection-decision activity ID
        ja: 選択決定活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选选择决策。
        en: Uniquely identifies one candidate-selection decision activity.
        ja: 一件の候補選択決定活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: selection-decision-3
      source_claims:
        - claim-worker-selection-decision-design
    - id: selection_process_id
      labels:
        zh: 选择过程
        en: selection process
        ja: 選択プロセス
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该决定的选择过程。
        en: References the selection process containing the decision.
        ja: この決定を含む選択プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionProcess:worker-selection-12
      source_claims:
        - claim-worker-selection-decision-design
    - id: selected_role_id
      labels:
        zh: 选中角色
        en: selected role
        ja: 選択役割
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向决定选中的受派角色。
        en: References the delegate role chosen by the decision.
        ja: 決定で選ばれた受任役割を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:regulatory-7
      source_claims:
        - claim-worker-selection-decision-design
    - id: decision_basis_refs
      labels:
        zh: 决定依据引用
        en: decision-basis references
        ja: 決定根拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持选择和落选理由的评估记录。
        en: References assessment records supporting selection and rejection reasons.
        ja: 選択・不採用理由を支える評価記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - WorkerAvailability:7
        - WorkerCapabilityMatch:9
      source_claims:
        - claim-worker-selection-decision-design
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 決定時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录选择决定形成的时间。
        en: Records when the selection decision was made.
        ja: 選択決定が形成された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-decision-design
  constraints: []
  required_relation_constraints:
    - id: decision-phase-of-selection
      direction: outgoing
      predicate: phase_of
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionDecisionActivity 必须通过 phase_of 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerSelectionDecisionActivity must preserve its instance-level phase_of constraint with WorkerSelectionProcess.
        ja: WorkerSelectionDecisionActivity は WorkerSelectionProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-decision-design
examples:
  - id: WorkerSelectionDecisionActivity-example-a2a
    labels:
      zh: A2A 选择决定
      en: A2A selection decision
      ja: A2A selection decision
    descriptions:
      zh: 客户端综合 skills 匹配与可用性后选定 billing agent。
      en: Client selects billing agent after synthesizing skills match and availability.
      ja: skills match + availability 後 billing agent 選択。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: agent selection
    field_values:
      decision_activity_id: decision-884
      selected_role_id: WorkerRole:billing-agent
    related_node_ids:
      - WorkerSelectionDecisionActivity
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-design
  - id: WorkerSelectionDecisionActivity-example-openai-handoff
    labels:
      zh: OpenAI handoff 选择
      en: OpenAI handoff selection
      ja: OpenAI handoff selection
    descriptions:
      zh: Triage model 调用 transfer_to_billing_agent。
      en: Triage model invokes transfer_to_billing_agent.
      ja: Triage model transfer_to_billing_agent 呼出。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: transfer_to_*
    field_values:
      decision_activity_id: decision-openai-12
      selected_role_id: WorkerRole:billing-agent
    related_node_ids:
      - WorkerSelectionDecisionActivity
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-design
  - id: WorkerSelectionDecisionActivity-example-cursor
    labels:
      zh: Cursor subagent 决定
      en: Cursor subagent decision
      ja: Cursor subagent decision
    descriptions:
      zh: 父代理选择 explore 执行调查，basis 引用 capability match。
      en: Parent chooses explore for investigation with capability match basis.
      ja: Parent explore 選択 basis=capability match。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent_type choice
    field_values:
      decision_activity_id: decision-cursor-3
    related_node_ids:
      - WorkerSelectionDecisionActivity
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-design
  - id: WorkerSelectionDecisionActivity-example-boundary-route
    labels:
      zh: 路由不是决定活动
      en: Routing is not decision activity
      ja: routing は decision activity ではない
    descriptions:
      zh: LangGraph route 无 decision_basis_refs 与 WorkerSelection 产出。
      en: LangGraph route lacks decision_basis_refs and WorkerSelection output.
      ja: LangGraph route は decision_basis_refs/WorkerSelection 無し。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerSelectionDecisionActivity
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-decision-design
parent_relation:
  id: WorkerSelectionDecisionActivity-phase_of-WorkerSelectionProcess
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 工作者选择决策是选择过程中综合评估证据并确定受派方的组成阶段。
    en: Worker-selection decision is the constituent phase that combines assessment evidence and determines the delegate.
    ja: 作業者選択決定は評価証拠を統合して受任者を決める選択の構成段階です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有阶段
      en: has phase
      ja: 段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-selection-decision-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: WorkerSelectionDecisionActivity-precedes-WorkerAssignment
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: precedes
      en: precedes
      ja: precedes
    definitions:
      zh: 同一委派中的选择决策先于工作分派，分派必须引用已完成的选择决定。
      en: The selection decision precedes worker assignment within one delegation, and assignment must cite the completed decision.
      ja: 同一委任で選択決定は作業割当に先行し、割当は完成済み決定を参照します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: follows
      labels:
        zh: 后继于
        en: follows
        ja: 後続する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-selection-decision-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerAssignment
  - id: WorkerSelectionDecisionActivity-selects_from-WorkerPool
    predicate: selects_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: selects from
      en: selects from
      ja: selects from
    definitions:
      zh: 选择决策活动只从所属选择过程使用的冻结候选池中选择受派角色。
      en: A selection-decision activity selects a delegate only from the frozen pool used by its selection process.
      ja: 選択決定活動は所属選択プロセスが使用する確定候補プールからだけ受任役割を選びます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: selection_pool_for
      labels:
        zh: 是其选择池
        en: selection pool for
        ja: 選択プールである
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-selection-decision-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerPool
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-worker-selection-decision-design
    source: delegation-handoff-design
    supports: WorkerSelectionDecisionActivity produces WorkerSelection with evidence refs.
    locator: Decision activity boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-decision-design
    source: a2a-protocol
    supports: A2A agent selection after matching maps to WorkerSelectionDecisionActivity.
    locator: Agent selection
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-decision-design
    source: openai-agents-sdk
    supports: OpenAI transfer_to_* choice maps to WorkerSelectionDecisionActivity.
    locator: Handoff selection
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-decision-design
    source: cursor-task-tool
    supports: Cursor subagent_type choice maps to WorkerSelectionDecisionActivity.
    locator: subagent selection
    evidence_kind: design-inference
    confidence: high
