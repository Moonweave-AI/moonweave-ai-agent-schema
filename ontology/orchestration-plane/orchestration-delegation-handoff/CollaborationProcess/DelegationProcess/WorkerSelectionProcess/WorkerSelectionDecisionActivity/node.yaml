        zh: 记录选择决定形成的时间。
        en: Records when the selection decision was made.
        ja: 選択決定が形成された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-decision-activity-006
  constraints: []
  required_relation_constraints:
