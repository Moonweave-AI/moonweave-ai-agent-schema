schema: moonweave.ai/ontology-node/v1
id: WorkerSelection
kind: concept
labels:
  zh: 工作者选择记录
  en: worker-selection record
  ja: 作業者選択記録
semantics:
  short_definition:
    zh: 一次选择决策活动产出的、确定受派角色并保留理由的信息记录。
    en: Information output of one selection-decision activity identifying delegate role and preserving rationale.
    ja: 一回の selection decision activity が生成する delegate role 確定 + rationale 保持 record。
  definition:
    zh: WorkerSelection 绑定 decision_activity_id、worker_pool_id、selected_role_id、decided_at 与 selection_rationale。它是 WorkerSelectionDecisionActivity 的持久化结果，不是决定动作或 WorkerPool 本身。A2A 选定的 AgentCard agent、Cursor 选定的 subagent_type、CrewAI 选定的 worker agent 均应在此记录。
    en: WorkerSelection binds decision_activity_id, worker_pool_id, selected_role_id, decided_at, and selection_rationale. It is the persisted result of WorkerSelectionDecisionActivity, not the deciding act or WorkerPool. A2A chosen AgentCard agent, Cursor chosen subagent_type, and CrewAI chosen worker agent should be recorded here.
    ja: WorkerSelection は decision result record。selected_role_id + rationale を保持。
  why_needed:
    zh: 为 WorkerAssignment 提供稳定依据并使落选原因可查询。
    en: Provides stable basis for WorkerAssignment and queryable rejection reasons.
    ja: WorkerAssignment 根拠と rejection reason 照会を提供。
  includes:
    - zh: 纳入从一个已冻结候选池产生、具有唯一选中角色或无合格候选结论的决策记录。
      en: Includes decision records produced from one frozen pool with one selected role or an explicit no-qualified-candidate outcome.
      ja: 一つの確定候補プールから生成され、一選択役割または適格候補なしを示す決定記録を含みます。
  excludes:
    - zh: 排除选择活动、候选池、单个匹配分数和真正使工作绑定生效的分派活动。
      en: Excludes the decision activity, candidate pool, one match score, and the assignment activity that makes the work binding effective.
      ja: 決定活動、候補プール、単一照合得点、作業バインディングを有効化する割当活動を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: WorkerSelection 创建后 immutable；变更选择需新 WorkerSelectionDecisionActivity。rejected_candidates 可选附在 rationale 结构化字段。
    en: WorkerSelection is immutable after creation; selection change requires new WorkerSelectionDecisionActivity. rejected_candidates may attach in structured rationale.
    ja: WorkerSelection は immutable。変更は新 decision activity。
  typical_input:
    - description: Selection record.
      format: '{"selection_id":"worker-selection-001","selected_role_id":"WorkerRole:billing"}'
      source_claims:
        - claim-worker-selection-design
  typical_output:
    - description: Moonweave WorkerSelection.
      format: '{"selection_id":"worker-selection-001"}'
      source_claims:
        - claim-worker-selection-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - selection_id
  fields:
    - id: selection_id
      labels:
        zh: 选择 ID
        en: selection ID
        ja: 選択 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作者选择决定的持久化结果记录。
        en: Uniquely identifies the persisted result record of one worker-selection decision.
        ja: 一回の作業者選択判断の永続化結果記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-001
      source_claims:
        - claim-worker-selection-design
    - id: decision_activity_id
      labels:
        zh: 决定活动 ID
        en: decision-activity ID
        ja: 判断活動 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用作出本选择并评价候选证据的唯一决策活动。
        en: References the single decision activity that made this selection and evaluated candidate evidence.
        ja: この選択を行い候補証拠を評価した一つの判断活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:001
      source_claims:
        - claim-worker-selection-design
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用选择时实际采用的候选池版本。
        en: References the exact candidate-pool version used when the selection was made.
        ja: 選択時に実際に用いた候補プール版を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerPool:001
      source_claims:
        - claim-worker-selection-design
    - id: selected_worker_role_id
      labels:
        zh: 被选工作者角色 ID
        en: selected worker-role ID
        ja: 選択ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被决定承担委派工作的候选角色；正式生效仍需后续 WorkerAssignment。
        en: References the candidate role chosen to perform delegated work; a later WorkerAssignment is still required for effectiveness.
        ja: 委任作業の実行者として選んだ候補ロールを参照し、発効には後続の WorkerAssignment を必要とします。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-selection-design
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录选择决定形成的 UTC 时刻，而不是后续分派生效时间。
        en: Records the UTC instant at which the selection decision was made, not the later assignment-effective time.
        ja: 後続割当の発効時刻ではなく、選択判断が成立した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:15:00Z
      source_claims:
        - claim-worker-selection-design
    - id: reason
      labels:
        zh: 选择理由
        en: selection reason
        ja: 選択理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明所选角色相对于判据和证据为何优于或适合其他候选。
        en: Explains why the selected role was preferable or suitable relative to the criteria and evidence.
        ja: 基準と証拠に照らして、選択ロールが他候補より適切だった理由を説明します。
      allowed_values: []
      pattern: null
      example_value: best available capability match within delegation bounds
      source_claims:
        - claim-worker-selection-design
    - id: rejected_candidate_reasons
      labels:
        zh: 落选理由
        en: rejected-candidate reasons
        ja: 不選択理由
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 按候选角色保存未被选择的理由，避免只保留胜者而丢失可审计比较。
        en: Preserves non-selection reasons per candidate so the auditable comparison is not reduced to the winner alone.
        ja: 勝者だけでなく監査可能な比較を残すため、候補ごとの非選択理由を保持します。
      allowed_values: []
      pattern: null
      example_value:
        - WorkerRole:008 unavailable
      source_claims:
        - claim-worker-selection-design
  constraints:
    - id: worker-selection-evidenced-membership
      severity: error
      expression_language: plain
      expression: selected_worker_role_id belongs to worker_pool_id and has accepted availability and capability evidence
      explanations:
        zh: 被选角色必须属于候选池并有可用性与能力证据。
        en: A selected worker belongs to the pool and has availability and capability evidence.
        ja: 選択ワーカーは候補プールに属し可用性・能力証拠を持ちます。
      source_claims:
        - claim-worker-selection-design
  required_relation_constraints:
    - id: selection-record-of-decision
      direction: incoming
      predicate: has_record
      target_concept_id: WorkerSelectionDecisionActivity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelection 必须通过 has_record 保持与 WorkerSelectionDecisionActivity 的实例级语义约束。
        en: WorkerSelection must preserve its instance-level has_record constraint with WorkerSelectionDecisionActivity.
        ja: WorkerSelection は WorkerSelectionDecisionActivity とのインスタンスレベル has_record 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-design
examples:
  - id: WorkerSelection-example-a2a-billing
    labels:
      zh: A2A 选中 billing
      en: A2A selected billing
      ja: A2A selected billing
    descriptions:
      zh: selection-001 从 pool@1 选中 billing agent，technical 因 skill gap 落选。
      en: selection-001 selects billing agent from pool@1; technical rejected for skill gap.
      ja: selection-001 billing 選択 technical skill gap 落选。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: selection record
    field_values:
      selection_id: worker-selection-001
      selected_role_id: WorkerRole:billing-agent
    related_node_ids:
      - WorkerSelection
      - WorkerAssignment
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-design
  - id: WorkerSelection-example-cursor-explore
    labels:
      zh: Cursor 选中 explore
      en: Cursor selected explore
      ja: Cursor selected explore
    descriptions:
      zh: 调查任务选中 explore subagent_type。
      en: Investigation task selects explore subagent_type.
      ja: investigation → explore 選択。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent selection
    field_values:
      selection_id: worker-selection-cursor-2
      selected_role_id: SubagentRole:explore
    related_node_ids:
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-design
  - id: WorkerSelection-example-crewai-researcher
    labels:
      zh: CrewAI 选中 researcher
      en: CrewAI selected researcher
      ja: CrewAI selected researcher
    descriptions:
      zh: Manager 选中 researcher 执行 benchmark task。
      en: Manager selects researcher for benchmark task.
      ja: manager researcher 選択 benchmark task。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: manager selection
    field_values:
      selection_id: worker-selection-crew-4
      selected_role_id: WorkerRole:researcher
    related_node_ids:
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-design
  - id: WorkerSelection-example-boundary-pool
    labels:
      zh: 候选池不是选择
      en: Pool is not selection
      ja: pool は selection ではない
    descriptions:
      zh: WorkerPool 冻结候选但不包含 selected_role_id 与 rationale。
      en: WorkerPool freezes candidates but lacks selected_role_id and rationale.
      ja: WorkerPool は selected_role_id/rationale を含まない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerSelection
      - WorkerPool
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-design
parent_relation:
  id: WorkerSelectionDecisionActivity-has_record-WorkerSelection
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has record
    en: has record
    ja: has record
  definitions:
    zh: 一次选择决策活动以组成关系拥有它形成的稳定工作者选择记录。
    en: A worker-selection decision activity compositionally contains the stable worker-selection record it creates.
    ja: 一件の作業者選択決定活動は自身が形成する安定作業者選択記録を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其记录
      en: record of
      ja: 記録である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-selection-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
