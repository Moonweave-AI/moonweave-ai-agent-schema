schema: moonweave.ai/ontology-node/v1
id: WorkerSelection
kind: concept
status: review
labels:
  zh: 工作者选择记录
  en: worker-selection record
  ja: 作業者選択記録
semantics:
  short_definition:
    zh: 工作者选择记录是一次选择决策活动产生的、确定受派角色并保留选择与落选理由的信息记录。
    en: A worker-selection record is the information output of one selection-decision activity that identifies the delegate role and preserves selection and rejection reasons.
    ja: 作業者選択記録は、一件の選択決定活動が生成し、受任役割と選択・不採用理由を保持する情報記録です。
  definition:
    zh: 工作者选择记录是一次选择决策活动产生的、确定受派角色并保留选择与落选理由的信息记录。 它绑定选择活动、候选池、选中角色、决定时间和理由；它不是选择动作，也不是角色本身。
    en: A worker-selection record is the information output of one selection-decision activity that identifies the delegate role and preserves selection and rejection reasons. It binds decision activity, candidate pool, selected role, decision time, and rationale; it is neither the deciding act nor the role itself.
    ja: 作業者選択記録は、一件の選択決定活動が生成し、受任役割と選択・不採用理由を保持する情報記録です。 決定活動、候補プール、選択役割、決定時刻、理由を結び、決定行為でも役割自体でもありません。
  why_needed:
    zh: 该节点为后续分派提供稳定依据，并让每名落选候选的原因可查询。
    en: The node provides a stable basis for assignment and makes each rejected candidate's reason queryable.
    ja: 後続割当の安定根拠を提供し、各不採用候補の理由を照会可能にします。
  includes:
    - zh: 纳入从一个已冻结候选池产生、具有唯一选中角色或无合格候选结论的决策记录。
      en: Includes decision records produced from one frozen pool with one selected role or an explicit no-qualified-candidate outcome.
      ja: 一つの確定候補プールから生成され、一選択役割または適格候補なしを示す決定記録を含みます。
  excludes:
    - zh: 排除选择活动、候选池、单个匹配分数和真正使工作绑定生效的分派活动。
      en: Excludes the decision activity, candidate pool, one match score, and the assignment activity that makes the work binding effective.
      ja: 決定活動、候補プール、単一照合得点、作業バインディングを有効化する割当活動を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - selection_id
  fields:
    - id: selection_id
      labels:
        zh: 选择 ID
        en: selection ID
        ja: 選択 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作者选择决定的持久化结果记录。
        en: Uniquely identifies the persisted result record of one worker-selection decision.
        ja: 一回の作業者選択判断の永続化結果記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-001
      source_claims:
        - claim-worker-selection-002
    - id: decision_activity_id
      labels:
        zh: 决定活动 ID
        en: decision-activity ID
        ja: 判断活動 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用作出本选择并评价候选证据的唯一决策活动。
        en: References the single decision activity that made this selection and evaluated candidate evidence.
        ja: この選択を行い候補証拠を評価した一つの判断活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:001
      source_claims:
        - claim-worker-selection-003
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用选择时实际采用的候选池版本。
        en: References the exact candidate-pool version used when the selection was made.
        ja: 選択時に実際に用いた候補プール版を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerPool:001
      source_claims:
        - claim-worker-selection-004
    - id: selected_worker_role_id
      labels:
        zh: 被选工作者角色 ID
        en: selected worker-role ID
        ja: 選択ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被决定承担委派工作的候选角色；正式生效仍需后续 WorkerAssignment。
        en: References the candidate role chosen to perform delegated work; a later WorkerAssignment is still required for effectiveness.
        ja: 委任作業の実行者として選んだ候補ロールを参照し、発効には後続の WorkerAssignment を必要とします。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-selection-005
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录选择决定形成的 UTC 时刻，而不是后续分派生效时间。
        en: Records the UTC instant at which the selection decision was made, not the later assignment-effective time.
        ja: 後続割当の発効時刻ではなく、選択判断が成立した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:15:00Z
      source_claims:
        - claim-worker-selection-006
    - id: reason
      labels:
        zh: 选择理由
        en: selection reason
        ja: 選択理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明所选角色相对于判据和证据为何优于或适合其他候选。
        en: Explains why the selected role was preferable or suitable relative to the criteria and evidence.
        ja: 基準と証拠に照らして、選択ロールが他候補より適切だった理由を説明します。
      allowed_values: []
      pattern: null
      example_value: best available capability match within delegation bounds
      source_claims:
        - claim-worker-selection-007
    - id: rejected_candidate_reasons
      labels:
        zh: 落选理由
        en: rejected-candidate reasons
        ja: 不選択理由
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 按候选角色保存未被选择的理由，避免只保留胜者而丢失可审计比较。
        en: Preserves non-selection reasons per candidate so the auditable comparison is not reduced to the winner alone.
        ja: 勝者だけでなく監査可能な比較を残すため、候補ごとの非選択理由を保持します。
      allowed_values: []
      pattern: null
      example_value:
        - WorkerRole:008 unavailable
      source_claims:
        - claim-worker-selection-008
  constraints:
    - id: worker-selection-evidenced-membership
      severity: error
      expression_language: plain
      expression: selected_worker_role_id belongs to worker_pool_id and has accepted availability and capability evidence
      explanations:
        zh: 被选角色必须属于候选池并有可用性与能力证据。
        en: A selected worker belongs to the pool and has availability and capability evidence.
        ja: 選択ワーカーは候補プールに属し可用性・能力証拠を持ちます。
      source_claims:
        - claim-worker-selection-009
  required_relation_constraints:
    - id: selection-record-of-decision
      direction: incoming
      predicate: has_record
      target_concept_id: WorkerSelectionDecisionActivity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelection 必须通过 has_record 保持与 WorkerSelectionDecisionActivity 的实例级语义约束。
        en: WorkerSelection must preserve its instance-level has_record constraint with WorkerSelectionDecisionActivity.
        ja: WorkerSelection は WorkerSelectionDecisionActivity とのインスタンスレベル has_record 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-010
examples:
  - id: WorkerSelection-example-positive-manual-2026
    kind: positive
    labels:
      zh: 工作者选择记录正例
      en: Positive worker-selection record case
      ja: 作業者選択記録の正例
    scenario_id: null
    descriptions:
      zh: selection-4 选择 role-7，引用 pool-v4 和 decision-3，并保存另外两名候选的落选理由。
      en: selection-4 chooses role-7, cites pool-v4 and decision-3, and stores rejection reasons for the other two candidates.
      ja: selection-4 が role-7 を選び、pool-v4 と decision-3 を参照し、他二候補の不採用理由を保存します。
    field_values:
      selection_id: worker-selection-001
      decision_activity_id: WorkerSelectionDecisionActivity:001
      worker_pool_id: WorkerPool:001
      selected_worker_role_id: WorkerRole:007
      decided_at: 2026-07-15T01:15:00Z
      reason: best available capability match within delegation bounds
    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
    related_relation_ids:
      - WorkerSelectionDecisionActivity-has_record-WorkerSelection
    expected_result:
      zh: 该记录应被识别为 WorkerSelection，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerSelection with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerSelection として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者选择记录是一次选择决策活动产生的、确定受派角色并保留选择与落选理由的信息记录。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A worker-selection record is the information output of one selection-decision activity that identifies the delegate role and preserves selection and rejection reasons."
      ja: この場面は次の同一性条件を満たします：作業者選択記録は、一件の選択決定活動が生成し、受任役割と選択・不採用理由を保持する情報記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-selection-011
  - id: WorkerSelection-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者选择记录边界例
      en: Boundary worker-selection record case
      ja: 作業者選択記録の境界例
    scenario_id: null
    descriptions:
      zh: 匹配证据显示 role-7 得分最高，但系统尚未作出决定；高分记录本身不是 WorkerSelection。
      en: Match evidence ranks role-7 highest, but no decision has been made; the high score alone is not WorkerSelection.
      ja: 照合証拠で role-7 が最高得点でも決定前なら、高得点記録だけでは WorkerSelection になりません。
    field_values: {}
    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
    related_relation_ids:
      - WorkerSelectionDecisionActivity-has_record-WorkerSelection
    expected_result:
      zh: 该对象不得被归为 WorkerSelection，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerSelection or acquire missing conditions from nearby facts.
      ja: この対象を WorkerSelection に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除选择活动、候选池、单个匹配分数和真正使工作绑定生效的分派活动。
      en: "The case violates this reviewed exclusion boundary: Excludes the decision activity, candidate pool, one match score, and the assignment activity that makes the work binding effective."
      ja: この例は審査済み除外境界に反します：決定活動、候補プール、単一照合得点、作業バインディングを有効化する割当活動を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-selection-012
