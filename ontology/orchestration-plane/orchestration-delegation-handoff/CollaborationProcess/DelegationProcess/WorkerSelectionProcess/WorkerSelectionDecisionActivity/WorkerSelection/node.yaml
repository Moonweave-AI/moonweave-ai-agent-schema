    source: delegation-handoff-design
    supports: WorkerSelection is immutable decision result.
    locator: WorkerSelection boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-design
    source: a2a-protocol
    supports: A2A chosen agent maps to WorkerSelection.selected_role_id.
    locator: Agent selection
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-design
    source: cursor-task-tool
    supports: Cursor chosen subagent maps to WorkerSelection.
    locator: subagent selection
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-design
    source: crewai
    supports: CrewAI manager worker pick maps to WorkerSelection.
    locator: Manager selection
    evidence_kind: design-inference
    confidence: high
