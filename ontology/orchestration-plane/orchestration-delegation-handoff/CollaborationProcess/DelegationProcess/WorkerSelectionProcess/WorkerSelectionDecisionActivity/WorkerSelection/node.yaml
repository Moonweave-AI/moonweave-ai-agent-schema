schema: moonweave.ai/ontology-node/v1
id: WorkerSelection
kind: concept
labels:
  zh: 工作者选择记录
  en: worker-selection record
  ja: 作業者選択記録
semantics:
  short_definition:
    zh: 确定受派角色并保留选择与落选理由的决策记录。
    en: Decision record identifying the chosen delegate and rationale.
    ja: 受任役割と選択・不採用理由を保持する決定記録。
  definition:
    zh: 工作者选择记录是一次选择决策活动产生的、确定受派角色并保留选择与落选理由的信息记录。 它绑定选择活动、候选池、选中角色、决定时间和理由；它不是选择动作，也不是角色本身。
    en: A worker-selection record is the information output of one selection-decision activity that identifies the delegate role and preserves selection and rejection reasons. It binds decision activity, candidate pool, selected role, decision time, and rationale; it is neither the deciding act nor the role itself.
    ja: 作業者選択記録は、一件の選択決定活動が生成し、受任役割と選択・不採用理由を保持する情報記録です。 決定活動、候補プール、選択役割、決定時刻、理由を結び、決定行為でも役割自体でもありません。
  why_needed:
    zh: 该节点为后续分派提供稳定依据，并让每名落选候选的原因可查询。
    en: The node provides a stable basis for assignment and makes each rejected candidate's reason queryable.
    ja: 後続割当の安定根拠を提供し、各不採用候補の理由を照会可能にします。
  includes:
    - zh: 纳入从一个已冻结候选池产生、具有唯一选中角色或无合格候选结论的决策记录。
      en: Includes decision records produced from one frozen pool with one selected role or an explicit no-qualified-candidate outcome.
      ja: 一つの確定候補プールから生成され、一選択役割または適格候補なしを示す決定記録を含みます。
  excludes:
    - zh: 排除选择活动、候选池、单个匹配分数和真正使工作绑定生效的分派活动。
      en: Excludes the decision activity, candidate pool, one match score, and the assignment activity that makes the work binding effective.
      ja: 決定活動、候補プール、単一照合得点、作業バインディングを有効化する割当活動を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerSelection 是 WorkerSelectionDecisionActivity 产出的持久决策记录：selected_binding_ref、
      rejection 理由与 decided_at。Orchestrator 据此触发 WorkerAssignment；A2A SendMessage 仅在 Assignment
      后发生，选择记录本身不发送协议消息。
    en: >-
      WorkerSelection is the persisted decision record from WorkerSelectionDecisionActivity: selected_binding_ref, rejection
      reasons, and decided_at. Orchestrator triggers WorkerAssignment from it; A2A SendMessage occurs only after Assignment,
      not from the selection record itself.
    ja: >-
      WorkerSelection は WorkerSelectionDecisionActivity が生成する persisted decision record（selected_binding_ref、
      rejection reason、decided_at）。orchestrator がこれに基づき WorkerAssignment を trigger する。A2A SendMessage は Assignment
      後のみ発生し selection record 自体からは送られない。
  typical_input:
    - description:
        zh: 决策活动输出的选择结果载荷。
        en: Selection result payload from decision activity.
        ja: decision activity 出力の selection result payload。
      format: |-
        {"worker_selection_process_ref":"wsel-884","selected_binding_ref":"binding-agent-auditor-3","rejected_bindings":[{"ref":"binding-agent-auditor-5","reason":"lower_capability_score"}],"decision_basis_refs":["avail:auditor-3","match:auditor-3"]}
  typical_output:
    - description:
        zh: 被 WorkerAssignment 引用的 WorkerSelection 记录。
        en: WorkerSelection record referenced by WorkerAssignment.
        ja: WorkerAssignment が参照する WorkerSelection record。
      format: |-
        {"worker_selection_id":"wsel-decision-884","selected_binding_ref":"binding-agent-auditor-3","decided_at":"2026-07-16T09:05:30Z","worker_assignment_ref":"wassign-884"}
  reference_implementations:
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/management-decision-logs/
      description: Documents persisted decision records with rationale metadata.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol dispatch occurring after selection and assignment, not during selection storage.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Separates decision activities from decision entity records they generate.
  source_claims:
    - claim-worker-selection-001
    - claim-worker-selection-002
structure:
  identity_keys:
    - selection_id
  fields:
    - id: selection_id
      labels:
        zh: 选择 ID
        en: selection ID
        ja: 選択 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作者选择决定的持久化结果记录。
        en: Uniquely identifies the persisted result record of one worker-selection decision.
        ja: 一回の作業者選択判断の永続化結果記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-001
      source_claims:
        - claim-worker-selection-002
    - id: decision_activity_id
      labels:
        zh: 决定活动 ID
        en: decision-activity ID
        ja: 判断活動 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用作出本选择并评价候选证据的唯一决策活动。
        en: References the single decision activity that made this selection and evaluated candidate evidence.
        ja: この選択を行い候補証拠を評価した一つの判断活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:001
      source_claims:
        - claim-worker-selection-003
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用选择时实际采用的候选池版本。
        en: References the exact candidate-pool version used when the selection was made.
        ja: 選択時に実際に用いた候補プール版を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerPool:001
      source_claims:
        - claim-worker-selection-004
    - id: selected_worker_role_id
      labels:
        zh: 被选工作者角色 ID
        en: selected worker-role ID
        ja: 選択ワーカーロール ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被决定承担委派工作的候选角色；正式生效仍需后续 WorkerAssignment。
        en: References the candidate role chosen to perform delegated work; a later WorkerAssignment is still required for effectiveness.
        ja: 委任作業の実行者として選んだ候補ロールを参照し、発効には後続の WorkerAssignment を必要とします。
      allowed_values: []
      pattern: null
      example_value: WorkerRole:007
      source_claims:
        - claim-worker-selection-005
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录选择决定形成的 UTC 时刻，而不是后续分派生效时间。
        en: Records the UTC instant at which the selection decision was made, not the later assignment-effective time.
        ja: 後続割当の発効時刻ではなく、選択判断が成立した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:15:00Z
      source_claims:
        - claim-worker-selection-006
    - id: reason
      labels:
        zh: 选择理由
        en: selection reason
        ja: 選択理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明所选角色相对于判据和证据为何优于或适合其他候选。
        en: Explains why the selected role was preferable or suitable relative to the criteria and evidence.
        ja: 基準と証拠に照らして、選択ロールが他候補より適切だった理由を説明します。
      allowed_values: []
      pattern: null
      example_value: best available capability match within delegation bounds
      source_claims:
        - claim-worker-selection-007
    - id: rejected_candidate_reasons
      labels:
        zh: 落选理由
        en: rejected-candidate reasons
        ja: 不選択理由
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 按候选角色保存未被选择的理由，避免只保留胜者而丢失可审计比较。
        en: Preserves non-selection reasons per candidate so the auditable comparison is not reduced to the winner alone.
        ja: 勝者だけでなく監査可能な比較を残すため、候補ごとの非選択理由を保持します。
      allowed_values: []
      pattern: null
      example_value:
        - WorkerRole:008 unavailable
      source_claims:
        - claim-worker-selection-008
  constraints:
    - id: worker-selection-evidenced-membership
      severity: error
      expression_language: plain
      expression: selected_worker_role_id belongs to worker_pool_id and has accepted availability and capability evidence
      explanations:
        zh: 被选角色必须属于候选池并有可用性与能力证据。
        en: A selected worker belongs to the pool and has availability and capability evidence.
        ja: 選択ワーカーは候補プールに属し可用性・能力証拠を持ちます。
      source_claims:
        - claim-worker-selection-009
  required_relation_constraints:
    - id: selection-record-of-decision
      direction: incoming
      predicate: has_record
      target_concept_id: WorkerSelectionDecisionActivity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelection 必须通过 has_record 保持与 WorkerSelectionDecisionActivity 的实例级语义约束。
        en: WorkerSelection must preserve its instance-level has_record constraint with WorkerSelectionDecisionActivity.
        ja: WorkerSelection は WorkerSelectionDecisionActivity とのインスタンスレベル has_record 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-010
examples:
  - id: WorkerSelection-example-positive-manual-2026
    labels:
      zh: WorkerSelection positive
      en: WorkerSelection positive
      ja: WorkerSelection positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 WorkerSelection 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as WorkerSelection router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が WorkerSelection から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {selection_id: worker-selection-001, decision_activity_id: WorkerSelectionDecisionActivity:001, worker_pool_id: WorkerPool:001, selected_worker_role_id: WorkerRole:007, decided_at: 2026-07-15T01:15:00Z, reason: "best available capability match within delegation bounds"}

    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
    related_relation_ids:
      - WorkerSelectionDecisionActivity-has_record-WorkerSelection
    source_claims:
      - claim-worker-selection-011

  - id: WorkerSelection-example-boundary-manual-2026
    labels:
      zh: WorkerSelection boundary
      en: WorkerSelection boundary
      ja: WorkerSelection boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 WorkerSelection 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not WorkerSelection delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で WorkerSelection delegation spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
    related_relation_ids:
      - WorkerSelectionDecisionActivity-has_record-WorkerSelection
    source_claims:
      - claim-worker-selection-012

  - id: WorkerSelection-example-counterexample-confusable
    labels:
      zh: WorkerSelection counterexample
      en: WorkerSelection counterexample
      ja: WorkerSelection counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 WorkerSelection ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style WorkerSelection ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 WorkerSelection ではない。
    field_values: {selection_id: absent, selected_binding_ref: absent, policy_kind: round_robin}

    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
      - RoutingPolicy
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-011

  - id: WorkerSelection-example-instance-concrete
    labels:
      zh: WorkerSelection instance
      en: WorkerSelection instance
      ja: WorkerSelection instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 WorkerSelection 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to WorkerSelection routing decision.
      ja: MRKL 实例 router→calculator→127.05 が WorkerSelection routing decision に写像。
    field_values: {selection_id: worker-selection-001, decision_activity_id: WorkerSelectionDecisionActivity:001, worker_pool_id: WorkerPool:001, selected_worker_role_id: WorkerRole:007, decided_at: 2026-07-15T01:15:00Z, reason: "best available capability match within delegation bounds"}

    related_node_ids:
      - WorkerSelection
      - WorkerSelectionDecisionActivity
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-011

