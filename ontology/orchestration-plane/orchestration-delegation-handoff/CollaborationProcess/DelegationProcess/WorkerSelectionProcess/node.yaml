schema: moonweave.ai/ontology-node/v1
id: WorkerSelectionProcess
kind: concept
status: review
labels:
  zh: 工作者选择过程
  en: worker-selection process
  ja: 作業者選択プロセス
semantics:
  short_definition:
    zh: 工作者选择过程是委派过程中从候选池形成一个可说明受派方决定的有序子过程。
    en: A worker-selection process is an ordered subprocess of delegation that turns a candidate pool into one explainable delegate decision.
    ja: 作業者選択プロセスは、候補プールから説明可能な一件の受任者決定を形成する委任内の順序付き下位過程です。
  definition:
    zh: 工作者选择过程是委派过程中从候选池形成一个可说明受派方决定的有序子过程。 它依次组织可用性评估、能力匹配和选择决定；这些活动是组成阶段而不是它的种类，后续工作分派属于更上层的委派过程。
    en: A worker-selection process is an ordered subprocess of delegation that turns a candidate pool into one explainable delegate decision. It orders availability assessment, capability matching, and the selection decision; these activities are constituent phases rather than subtypes, while the subsequent assignment belongs to the enclosing delegation process.
    ja: 作業者選択プロセスは、候補プールから説明可能な一件の受任者決定を形成する委任内の順序付き下位過程です。 可用性評価、能力照合、選択決定を順序付け、これらは下位型でなく構成段階です。後続の作業割当は上位の委任プロセスに属します。
  why_needed:
    zh: 该节点把候选发现、评估证据和选择决策串成可审计链，并为后续分派提供明确输入，避免把选择与分派混成一个概念。
    en: The node connects candidate discovery, assessment evidence, and selection decision into an auditable chain and supplies an explicit input to later assignment without conflating the two.
    ja: 候補発見、評価証拠、選択決定を監査可能な連鎖にし、後続割当へ明示入力を渡して選択と割当の混同を防ぎます。
  includes:
    - zh: 纳入针对一个委派工作项和一个冻结候选池执行的完整筛选、评估与选择决定序列。
      en: Includes the complete filtering, assessment, and selection-decision sequence for one delegation work item and one frozen candidate pool.
      ja: 一件の委任作業項目と一つの確定候補プールに対する選別、評価、選択決定系列を含みます。
  excludes:
    - zh: 排除单次能力评分、静态角色目录，以及没有形成受派方决定的搜索结果。
      en: Excludes one capability score, a static role catalog, and search results that never produce a delegate decision.
      ja: 単一能力スコア、静的役割カタログ、受任者決定に至らない検索結果を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - selection_process_id
  fields:
    - id: selection_process_id
      labels:
        zh: 选择过程 ID
        en: selection-process ID
        ja: 選択プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选评估与选择决定序列。
        en: Uniquely identifies one candidate-assessment and selection-decision sequence.
        ja: 一件の候補評価・選択決定系列を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-12
      source_claims:
        - claim-worker-selection-process-002
    - id: delegation_process_id
      labels:
        zh: 所属委派
        en: delegation process
        ja: 所属委任
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该选择子过程的委派。
        en: References the delegation containing this selection subprocess.
        ja: この選択下位過程を含む委任を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:delegation-17
      source_claims:
        - claim-worker-selection-process-003
    - id: selection_criteria_ref
      labels:
        zh: 选择准则引用
        en: selection-criteria reference
        ja: 選択基準参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向用于比较候选的版本化要求。
        en: References the versioned requirements used to compare candidates.
        ja: 候補比較に用いる版管理要件を参照します。
      allowed_values: []
      pattern: null
      example_value: SelectionCriteria:regulatory-ja-v2
      source_claims:
        - claim-worker-selection-process-004
    - id: started_at
      labels:
        zh: 选择开始时间
        en: selection started at
        ja: 選択開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选池冻结和评估开始的时间。
        en: Records when the pool is frozen and evaluation begins.
        ja: 候補プール確定と評価開始の時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:10Z
      source_claims:
        - claim-worker-selection-process-005
    - id: completed_at
      labels:
        zh: 选择完成时间
        en: selection completed at
        ja: 選択完了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录选择决定完成并可供后续分派引用的时间。
        en: Records when the selection decision completes and becomes available to a later assignment.
        ja: 選択決定が完了し後続割当から参照可能になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-process-006
  constraints: []
  required_relation_constraints:
    - id: selection-belongs-to-delegation
      direction: incoming
      predicate: includes_selection
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 includes_selection 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level includes_selection constraint with DelegationProcess.
        ja: WorkerSelectionProcess は DelegationProcess とのインスタンスレベル includes_selection 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-007
    - id: selection-has-pool
      direction: outgoing
      predicate: has_candidate_pool
      target_concept_id: WorkerPool
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 has_candidate_pool 保持与 WorkerPool 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level has_candidate_pool constraint with WorkerPool.
        ja: WorkerSelectionProcess は WorkerPool とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-008
examples:
  - id: WorkerSelectionProcess-example-positive-manual-2026
    kind: positive
    labels:
      zh: 工作者选择过程正例
      en: Positive worker-selection process case
      ja: 作業者選択プロセスの正例
    scenario_id: null
    descriptions:
      zh: 系统从三名专家中先排除离线者，再核对技能证据并形成选中一名专家的决定记录；工作项绑定由后续 WorkerAssignment 生效。
      en: From three specialists, the system removes an unavailable candidate, checks capability evidence, and records the decision selecting one specialist; a later WorkerAssignment activates the work-item binding.
      ja: 三名の専門家から利用不能候補を除外し、能力証拠を照合して一名を選ぶ決定を記録し、後続 WorkerAssignment が作業項目バインディングを有効化します。
    field_values:
      selection_process_id: worker-selection-12
      delegation_process_id: DelegationProcess:delegation-17
      selection_criteria_ref: SelectionCriteria:regulatory-ja-v2
      started_at: 2026-07-16T01:00:10Z
    related_node_ids:
      - WorkerSelectionProcess
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-includes_selection-WorkerSelectionProcess
    expected_result:
      zh: 该记录应被识别为 WorkerSelectionProcess，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerSelectionProcess with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerSelectionProcess として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者选择过程是委派过程中从候选池形成一个可说明受派方决定的有序子过程。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A worker-selection process is an ordered subprocess of delegation that turns a candidate pool into one explainable delegate decision."
      ja: この場面は次の同一性条件を満たします：作業者選択プロセスは、候補プールから説明可能な一件の受任者決定を形成する委任内の順序付き下位過程です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-selection-process-009
  - id: WorkerSelectionProcess-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者选择过程边界例
      en: Boundary worker-selection process case
      ja: 作業者選択プロセスの境界例
    scenario_id: null
    descriptions:
      zh: 目录服务返回所有带“法律”标签的代理，但没有可用性评估或比较决定；这只是候选发现。
      en: A directory returns every agent tagged legal but performs no availability assessment or comparative decision; this is candidate discovery only.
      ja: ディレクトリが legal タグの代理を返すだけで可用性評価や比較決定を行わない場合は候補発見にすぎません。
    field_values: {}
    related_node_ids:
      - WorkerSelectionProcess
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-includes_selection-WorkerSelectionProcess
    expected_result:
      zh: 该对象不得被归为 WorkerSelectionProcess，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerSelectionProcess or acquire missing conditions from nearby facts.
      ja: この対象を WorkerSelectionProcess に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除单次能力评分、静态角色目录，以及没有形成受派方决定的搜索结果。
      en: "The case violates this reviewed exclusion boundary: Excludes one capability score, a static role catalog, and search results that never produce a delegate decision."
      ja: この例は審査済み除外境界に反します：単一能力スコア、静的役割カタログ、受任者決定に至らない検索結果を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-selection-process-010
