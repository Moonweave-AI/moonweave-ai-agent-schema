schema: moonweave.ai/ontology-node/v1
id: WorkerSelectionProcess
kind: concept
labels:
  zh: 工作者选择过程
  en: worker-selection process
  ja: 作業者選択プロセス
semantics:
  short_definition:
    zh: 为一次委派冻结候选池、评估可用性与能力并作出工作者选择决定的过程。
    en: Process that freezes a candidate pool, assesses availability and capability, and decides worker selection for one delegation.
    ja: 一件の delegation について candidate pool 凍結・availability/capability 評価・worker selection 決定を行う process。
  definition:
    zh: WorkerSelectionProcess 包含 WorkerPool、WorkerAvailabilityAssessment、WorkerCapabilityMatching 与 WorkerSelectionDecisionActivity 阶段。A2A AgentCard 发现 + skills 匹配、CrewAI manager 从 agents 列表选人、Cursor 从 available subagent types 选择，均映射为此过程；一次 LangGraph route 无候选池冻结则不是 WorkerSelectionProcess。
    en: WorkerSelectionProcess comprises WorkerPool, WorkerAvailabilityAssessment, WorkerCapabilityMatching, and WorkerSelectionDecisionActivity phases. A2A AgentCard discovery + skills matching, CrewAI manager picking from agents list, and Cursor choosing among available subagent types map here; a LangGraph route without frozen candidate pool is not WorkerSelectionProcess.
    ja: WorkerSelectionProcess は WorkerPool/availability/capability/decision 段階を含む。A2A AgentCard discovery + skills matching が典型。
  why_needed:
    zh: 使“选了谁、为何选、为何未选”可重放与审计。
    en: Makes who was chosen, why chosen, and why others rejected replayable and auditable.
    ja: 誰を選びなぜ選ばずを replay/audit 可能に。
  includes:
    - zh: 纳入针对一个委派工作项和一个冻结候选池执行的完整筛选、评估与选择决定序列。
      en: Includes the complete filtering, assessment, and selection-decision sequence for one delegation work item and one frozen candidate pool.
      ja: 一件の委任作業項目と一つの確定候補プールに対する選別、評価、選択決定系列を含みます。
  excludes:
    - zh: 排除单次能力评分、静态角色目录，以及没有形成受派方决定的搜索结果。
      en: Excludes one capability score, a static role catalog, and search results that never produce a delegate decision.
      ja: 単一能力スコア、静的役割カタログ、受任者決定に至らない検索結果を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "A2A: AgentCard 列表 → WorkerPool；skills[] 与 task 要求 → WorkerCapabilityMatching；availability 探测 → WorkerAvailabilityAssessment；最终 target agent → WorkerSelection。CrewAI: crew.agents → WorkerPool。Cursor: subagent_type 枚举 → WorkerPool。"
    en: "A2A: AgentCard list → WorkerPool; skills[] vs task requirements → WorkerCapabilityMatching; availability probe → WorkerAvailabilityAssessment; final target agent → WorkerSelection. CrewAI: crew.agents → WorkerPool. Cursor: subagent_type enum → WorkerPool."
    ja: A2A AgentCard→WorkerPool、skills→WorkerCapabilityMatching、availability→WorkerAvailabilityAssessment。
  typical_input:
    - description: A2A AgentCard discovery.
      format: GET /.well-known/agent-card.json → skills[], url
      source_claims:
        - claim-worker-selection-process-design
  typical_output:
    - description: Moonweave WorkerSelectionProcess.
      format: '{"selection_process_id":"worker-selection-12","delegation_process_id":"delegation-17"}'
      source_claims:
        - claim-worker-selection-process-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - selection_process_id
  fields:
    - id: selection_process_id
      labels:
        zh: 选择过程 ID
        en: selection-process ID
        ja: 選択プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选评估与选择决定序列。
        en: Uniquely identifies one candidate-assessment and selection-decision sequence.
        ja: 一件の候補評価・選択決定系列を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-12
      source_claims:
        - claim-worker-selection-process-design
    - id: delegation_process_id
      labels:
        zh: 所属委派
        en: delegation process
        ja: 所属委任
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该选择子过程的委派。
        en: References the delegation containing this selection subprocess.
        ja: この選択下位過程を含む委任を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:delegation-17
      source_claims:
        - claim-worker-selection-process-design
    - id: selection_criteria_ref
      labels:
        zh: 选择准则引用
        en: selection-criteria reference
        ja: 選択基準参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向用于比较候选的版本化要求。
        en: References the versioned requirements used to compare candidates.
        ja: 候補比較に用いる版管理要件を参照します。
      allowed_values: []
      pattern: null
      example_value: SelectionCriteria:regulatory-ja-v2
      source_claims:
        - claim-worker-selection-process-design
    - id: started_at
      labels:
        zh: 选择开始时间
        en: selection started at
        ja: 選択開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选池冻结和评估开始的时间。
        en: Records when the pool is frozen and evaluation begins.
        ja: 候補プール確定と評価開始の時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:10Z
      source_claims:
        - claim-worker-selection-process-design
    - id: completed_at
      labels:
        zh: 选择完成时间
        en: selection completed at
        ja: 選択完了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录选择决定完成并可供后续分派引用的时间。
        en: Records when the selection decision completes and becomes available to a later assignment.
        ja: 選択決定が完了し後続割当から参照可能になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-process-design
  constraints: []
  required_relation_constraints:
    - id: selection-belongs-to-delegation
      direction: incoming
      predicate: includes_selection
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 includes_selection 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level includes_selection constraint with DelegationProcess.
        ja: WorkerSelectionProcess は DelegationProcess とのインスタンスレベル includes_selection 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-design
    - id: selection-has-pool
      direction: outgoing
      predicate: has_candidate_pool
      target_concept_id: WorkerPool
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 has_candidate_pool 保持与 WorkerPool 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level has_candidate_pool constraint with WorkerPool.
        ja: WorkerSelectionProcess は WorkerPool とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-design
examples:
  - id: WorkerSelectionProcess-example-a2a-discovery
    labels:
      zh: A2A AgentCard 选择
      en: A2A AgentCard selection
      ja: A2A AgentCard selection
    descriptions:
      zh: 从 billing/technical AgentCard 发现构建 WorkerPool，skills 匹配后选 billing agent。
      en: Build WorkerPool from billing/technical AgentCard discovery; select billing agent after skills match.
      ja: billing/technical AgentCard から WorkerPool 構築し skills match 後 billing agent 選択。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard
    field_values:
      selection_process_id: worker-selection-12
      delegation_process_id: DelegationProcess:delegation-17
    related_node_ids:
      - WorkerSelectionProcess
      - WorkerPool
      - WorkerCapabilityMatching
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-design
  - id: WorkerSelectionProcess-example-crewai-manager
    labels:
      zh: CrewAI manager 选择
      en: CrewAI manager selection
      ja: CrewAI manager selection
    descriptions:
      zh: Hierarchical manager 从 crew agents 选 researcher 执行 task。
      en: Hierarchical manager selects researcher from crew agents for task.
      ja: Hierarchical manager が crew agents から researcher 選択。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      selection_process_id: worker-selection-crew-2
    related_node_ids:
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-design
  - id: WorkerSelectionProcess-example-cursor-subagent
    labels:
      zh: Cursor subagent 类型选择
      en: Cursor subagent type selection
      ja: Cursor subagent type selection
    descriptions:
      zh: 父代理在 generalPurpose/explore 间选择 explore 执行调查。
      en: Parent chooses explore among generalPurpose/explore for investigation.
      ja: Parent が generalPurpose/explore から explore を investigation に選択。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent_type
    field_values:
      selection_process_id: worker-selection-cursor-5
    related_node_ids:
      - WorkerSelectionProcess
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-design
  - id: WorkerSelectionProcess-example-boundary-route
    labels:
      zh: 路由不是选择过程
      en: Routing is not selection process
      ja: routing は selection process ではない
    descriptions:
      zh: LangGraph conditional_edges 即时路由无冻结 WorkerPool，不是 WorkerSelectionProcess。
      en: LangGraph conditional_edges immediate routing without frozen WorkerPool is not WorkerSelectionProcess.
      ja: LangGraph conditional_edges 即時 routing は WorkerSelectionProcess ではない。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges
    field_values: {}
    related_node_ids:
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-design
parent_relation:
  id: DelegationProcess-includes_selection-WorkerSelectionProcess
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: includes selection
    en: includes selection
    ja: includes selection
  definitions:
    zh: 一次委派过程可包含一个工作者选择子过程，用于从候选池形成可说明的受派方决定，之后再由委派过程执行工作分派。
    en: A delegation process may include a worker-selection subprocess that turns a candidate pool into an explainable delegate decision before the delegation performs assignment.
    ja: 委任プロセスは候補プールから説明可能な受任者決定を形成する作業者選択下位過程を含み、その後に委任プロセスが作業割当を実行します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是选择子过程
      en: selection subprocess of
      ja: 選択下位過程である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-selection-process-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-worker-selection-process-design
    source: delegation-handoff-design
    supports: WorkerSelectionProcess requires frozen pool and evidence chain.
    locator: WorkerSelectionProcess boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-process-design
    source: a2a-protocol
    supports: A2A AgentCard discovery and skills matching map to WorkerSelectionProcess.
    locator: AgentCard skills
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-process-design
    source: crewai
    supports: CrewAI manager agent selection maps to WorkerSelectionProcess.
    locator: Hierarchical selection
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-selection-process-design
    source: cursor-task-tool
    supports: Cursor subagent_type choice maps to WorkerSelectionProcess.
    locator: subagent_type
    evidence_kind: design-inference
    confidence: high
