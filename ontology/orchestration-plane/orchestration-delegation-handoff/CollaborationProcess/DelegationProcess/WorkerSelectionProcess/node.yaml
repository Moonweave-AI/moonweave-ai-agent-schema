schema: moonweave.ai/ontology-node/v1
id: WorkerSelectionProcess
kind: concept
labels:
  zh: 工作者选择过程
  en: worker-selection process
  ja: 作業者選択プロセス
semantics:
  short_definition:
    zh: 从候选池形成可说明受派方决定的有序子过程。
    en: Ordered subprocess that turns a candidate pool into one delegate choice.
    ja: 候補プールから説明可能な受任者決定を形成する順序付き下位過程。
  definition:
    zh: 工作者选择过程是委派过程中从候选池形成一个可说明受派方决定的有序子过程。 它依次组织可用性评估、能力匹配和选择决定；这些活动是组成阶段而不是它的种类，后续工作分派属于更上层的委派过程。
    en: A worker-selection process is an ordered subprocess of delegation that turns a candidate pool into one explainable delegate decision. It orders availability assessment, capability matching, and the selection decision; these activities are constituent phases rather than subtypes, while the subsequent assignment belongs to the enclosing delegation process.
    ja: 作業者選択プロセスは、候補プールから説明可能な一件の受任者決定を形成する委任内の順序付き下位過程です。 可用性評価、能力照合、選択決定を順序付け、これらは下位型でなく構成段階です。後続の作業割当は上位の委任プロセスに属します。
  why_needed:
    zh: 该节点把候选发现、评估证据和选择决策串成可审计链，并为后续分派提供明确输入，避免把选择与分派混成一个概念。
    en: The node connects candidate discovery, assessment evidence, and selection decision into an auditable chain and supplies an explicit input to later assignment without conflating the two.
    ja: 候補発見、評価証拠、選択決定を監査可能な連鎖にし、後続割当へ明示入力を渡して選択と割当の混同を防ぎます。
  includes:
    - zh: 纳入针对一个委派工作项和一个冻结候选池执行的完整筛选、评估与选择决定序列。
      en: Includes the complete filtering, assessment, and selection-decision sequence for one delegation work item and one frozen candidate pool.
      ja: 一件の委任作業項目と一つの確定候補プールに対する選別、評価、選択決定系列を含みます。
  excludes:
    - zh: 排除单次能力评分、静态角色目录，以及没有形成受派方决定的搜索结果。
      en: Excludes one capability score, a static role catalog, and search results that never produce a delegate decision.
      ja: 単一能力スコア、静的役割カタログ、受任者決定に至らない検索結果を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerSelectionProcess 编排 WorkerPool 冻结、WorkerAvailabilityAssessment、WorkerCapabilityMatching
      与 WorkerSelectionDecisionActivity 的顺序子流程。A2A AgentCard 提供候选能力元数据；选定后输出
      WorkerSelection 供 WorkerAssignment 消费，不在此过程内分派 Execution。
    en: >-
      WorkerSelectionProcess orchestrates WorkerPool freeze, WorkerAvailabilityAssessment, WorkerCapabilityMatching, and
      WorkerSelectionDecisionActivity in order. A2A AgentCard supplies candidate capability metadata; outputs WorkerSelection
      for WorkerAssignment without dispatching Execution within this process.
    ja: >-
      WorkerSelectionProcess は WorkerPool freeze、WorkerAvailabilityAssessment、WorkerCapabilityMatching、
      WorkerSelectionDecisionActivity を順序 subflow として orchestrate する。A2A AgentCard が candidate capability metadata
      を供給する。WorkerSelection を出力し WorkerAssignment が consume する。この process 内で Execution は dispatch しない。
  typical_input:
    - description:
        zh: 委派过程与工作项引用的选择过程启动输入。
        en: Worker-selection process start input with delegation process and work item references.
        ja: delegation process と work item reference を持つ worker-selection process start input。
      format: |-
        {"worker_selection_process_id":"wsel-884","delegation_process_ref":"deleg-proc-884","work_item_ref":"work-item-71@2","selection_scope":"release-audit","started_at":"2026-07-16T09:01:00Z"}
  typical_output:
    - description:
        zh: 含 WorkerSelection 决策引用的完成选择过程状态。
        en: Completed selection process state including WorkerSelection decision reference.
        ja: WorkerSelection decision reference を含む completed selection process state。
      format: |-
        {"worker_selection_process_ref":"wsel-884","worker_pool_ref":"pool:audit-884","worker_selection_ref":"wsel-decision-884","selected_binding_ref":"binding-agent-auditor-3"}
  reference_implementations:
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents capability metadata for candidate discovery and matching.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents local agent candidates in selection processes.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents selection subprocess as ordered activities with auditable outputs.
  source_claims:
    - claim-worker-selection-process-001
    - claim-worker-selection-process-002
structure:
  identity_keys:
    - selection_process_id
  fields:
    - id: selection_process_id
      labels:
        zh: 选择过程 ID
        en: selection-process ID
        ja: 選択プロセス ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选评估与选择决定序列。
        en: Uniquely identifies one candidate-assessment and selection-decision sequence.
        ja: 一件の候補評価・選択決定系列を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-selection-12
      source_claims:
        - claim-worker-selection-process-002
    - id: delegation_process_id
      labels:
        zh: 所属委派
        en: delegation process
        ja: 所属委任
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含该选择子过程的委派。
        en: References the delegation containing this selection subprocess.
        ja: この選択下位過程を含む委任を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:delegation-17
      source_claims:
        - claim-worker-selection-process-003
    - id: selection_criteria_ref
      labels:
        zh: 选择准则引用
        en: selection-criteria reference
        ja: 選択基準参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向用于比较候选的版本化要求。
        en: References the versioned requirements used to compare candidates.
        ja: 候補比較に用いる版管理要件を参照します。
      allowed_values: []
      pattern: null
      example_value: SelectionCriteria:regulatory-ja-v2
      source_claims:
        - claim-worker-selection-process-004
    - id: started_at
      labels:
        zh: 选择开始时间
        en: selection started at
        ja: 選択開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选池冻结和评估开始的时间。
        en: Records when the pool is frozen and evaluation begins.
        ja: 候補プール確定と評価開始の時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:10Z
      source_claims:
        - claim-worker-selection-process-005
    - id: completed_at
      labels:
        zh: 选择完成时间
        en: selection completed at
        ja: 選択完了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录选择决定完成并可供后续分派引用的时间。
        en: Records when the selection decision completes and becomes available to a later assignment.
        ja: 選択決定が完了し後続割当から参照可能になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:35Z
      source_claims:
        - claim-worker-selection-process-006
  constraints: []
  required_relation_constraints:
    - id: selection-belongs-to-delegation
      direction: incoming
      predicate: includes_selection
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 includes_selection 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level includes_selection constraint with DelegationProcess.
        ja: WorkerSelectionProcess は DelegationProcess とのインスタンスレベル includes_selection 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-007
    - id: selection-has-pool
      direction: outgoing
      predicate: has_candidate_pool
      target_concept_id: WorkerPool
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerSelectionProcess 必须通过 has_candidate_pool 保持与 WorkerPool 的实例级语义约束。
        en: WorkerSelectionProcess must preserve its instance-level has_candidate_pool constraint with WorkerPool.
        ja: WorkerSelectionProcess は WorkerPool とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-selection-process-008
examples:
  - id: WorkerSelectionProcess-example-positive-manual-2026
    labels:
      zh: WorkerSelectionProcess positive
      en: WorkerSelectionProcess positive
      ja: WorkerSelectionProcess positive
    descriptions:
      zh: MRKL Systems (Karpas et al., 2022) 将 LLM 作为 WorkerSelectionProcess 路由器分派到专家模块：router LLM 解析 query → dispatch 到 calculator/wiki/search 等 neuro-symbolic 模块 → 汇总模块输出；模块化架构解耦推理与外部知识。
      en: MRKL Systems (Karpas et al., 2022) uses LLM as WorkerSelectionProcess router dispatching to expert modules: router parses query → dispatch to calculator/wiki/search neuro-symbolic modules → aggregate outputs; modular architecture decouples reasoning from external knowledge.
      ja: MRKL (Karpas et al., 2022) LLM router が WorkerSelectionProcess から calculator/wiki/search 等 expert module へ dispatch。
    field_values: {selection_process_id: worker-selection-12, delegation_process_id: DelegationProcess:delegation-17, selection_criteria_ref: SelectionCriteria:regulatory-ja-v2, started_at: 2026-07-16T01:00:10Z}

    related_node_ids:
      - WorkerSelectionProcess
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-includes_selection-WorkerSelectionProcess
    source_claims:
      - claim-worker-selection-process-009

  - id: WorkerSelectionProcess-example-boundary-manual-2026
    labels:
      zh: WorkerSelectionProcess boundary
      en: WorkerSelectionProcess boundary
      ja: WorkerSelectionProcess boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 WorkerSelectionProcess 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not WorkerSelectionProcess delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で WorkerSelectionProcess delegation spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerSelectionProcess
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-includes_selection-WorkerSelectionProcess
    source_claims:
      - claim-worker-selection-process-010

  - id: WorkerSelectionProcess-example-counterexample-confusable
    labels:
      zh: WorkerSelectionProcess counterexample
      en: WorkerSelectionProcess counterexample
      ja: WorkerSelectionProcess counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 WorkerSelectionProcess ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style WorkerSelectionProcess ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 WorkerSelectionProcess ではない。
    field_values: {selection_process_id: absent, worker_pool_ref: absent, selection_activity_ref: absent}

    related_node_ids:
      - WorkerSelectionProcess
      - WorkerPool
      - WorkerSelectionDecisionActivity
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-009

  - id: WorkerSelectionProcess-example-instance-concrete
    labels:
      zh: WorkerSelectionProcess instance
      en: WorkerSelectionProcess instance
      ja: WorkerSelectionProcess instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 WorkerSelectionProcess 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to WorkerSelectionProcess routing decision.
      ja: MRKL 实例 router→calculator→127.05 が WorkerSelectionProcess routing decision に写像。
    field_values: {selection_process_id: worker-selection-12, delegation_process_id: DelegationProcess:delegation-17, selection_criteria_ref: SelectionCriteria:regulatory-ja-v2, started_at: 2026-07-16T01:00:10Z}

    related_node_ids:
      - WorkerSelectionProcess
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-selection-process-009

