schema: moonweave.ai/ontology-node/v1
id: WorkerPool
kind: concept
labels:
  zh: 工作者候选池
  en: worker candidate pool
  ja: 作業者候補プール
semantics:
  short_definition:
    zh: 为一次选择过程冻结的候选角色集合。
    en: Frozen candidate-role set for one worker-selection process.
    ja: 一件の作業者選択向けに確定された候補役割集合。
  definition:
    zh: 工作者候选池是为一次选择过程冻结的候选角色集合。 它记录委派、选择范围、版本和创建时间，并通过成员关系指向 WorkerRole；动态目录本身不是候选池实例。
    en: A worker candidate pool is the collection of candidate roles frozen for one worker-selection process. It records delegation, selection scope, version, and creation time and contains WorkerRole members; a dynamic directory itself is not the pool instance.
    ja: 作業者候補プールは、一件の作業者選択プロセス向けに確定された候補役割の集合です。 委任、選択範囲、版、作成時刻を記録し WorkerRole メンバーを含み、動的ディレクトリ自体は候補プールではありません。
  why_needed:
    zh: 固定候选集合使一次选择决定可以重放并解释为什么某个工作者未被考虑。
    en: A frozen candidate set makes one selection decision reproducible and explains why a worker was not considered.
    ja: 確定候補集合により選択決定を再現し、ある作業者が考慮されなかった理由を説明できます。
  includes:
    - zh: 纳入针对明确工作与时间创建、包含可识别 WorkerRole 成员的版本化候选集合。
      en: Includes versioned candidate collections created for defined work and time and containing identifiable WorkerRole members.
      ja: 明確な作業と時点向けに作成され、識別可能な WorkerRole メンバーを含む版管理候補集合を含みます。
  excludes:
    - zh: 排除全局代理注册表、已经选出的单个工作者和仅列出技能名称的搜索查询。
      en: Excludes a global agent registry, the one selected worker, and search queries that list only skill names.
      ja: 全体代理レジストリ、選択済み単一作業者、技能名だけの検索クエリを除外します。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerPool 在 WorkerSelectionProcess 开始时冻结：从 AgentCard 目录或本地注册表快照 member
      WorkerRole 引用。A2A AgentCard 提供远程能力发现，但 pool revision 记录本次选择范围；动态注册表
      变更不影响已冻结 pool。
    en: >-
      WorkerPool freezes at WorkerSelectionProcess start: snapshots member WorkerRole references from AgentCard catalog or
      local registry. A2A AgentCard enables remote capability discovery but pool revision records this selection scope;
      dynamic registry changes do not affect a frozen pool.
    ja: >-
      WorkerPool は WorkerSelectionProcess 開始時に freeze する。AgentCard catalog または local registry から member
      WorkerRole reference を snapshot する。A2A AgentCard は remote capability discovery を可能にするが pool revision は
      今回 selection scope を記録する。dynamic registry 変更は frozen pool に影響しない。
  typical_input:
    - description:
        zh: 为一次工作者选择冻结的候选角色集合声明。
        en: Candidate role collection declaration frozen for one worker selection.
        ja: 一回 worker selection のため freeze された candidate role collection declaration。
      format: |-
        {"worker_pool_id":"pool:audit-884","delegation_process_ref":"deleg-proc-884","selection_scope":"release-audit","member_refs":["binding-agent-auditor-3","binding-agent-auditor-5"],"frozen_at":"2026-07-16T09:01:00Z"}
  typical_output:
    - description:
        zh: 供 WorkerAvailabilityAssessment 与 WorkerCapabilityMatching 使用的冻结候选池引用。
        en: Frozen candidate pool reference for WorkerAvailabilityAssessment and WorkerCapabilityMatching.
        ja: WorkerAvailabilityAssessment と WorkerCapabilityMatching 用 frozen candidate pool reference。
      format: |-
        {"worker_pool_ref":"pool:audit-884","member_count":2,"assessment_input":{"pool_ref":"pool:audit-884","work_item_ref":"work-item-71@2"}}
  reference_implementations:
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents agent capability discovery feeding candidate pool construction.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents named local agents as pool members alongside remote cards.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents dispatch only after selection from a frozen pool.
  source_claims:
    - claim-worker-pool-001
    - claim-worker-pool-002
structure:
  identity_keys:
    - worker_pool_id
    - version
  fields:
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识为一次选择过程冻结的候选角色集合。
        en: Stably identifies the candidate-role collection frozen for one selection process.
        ja: 一つの選択プロセス向けに凍結した候補ロール集合を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-pool-001
      source_claims:
        - claim-worker-pool-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识候选集合的不可变成员版本；增删候选必须产生新版本。
        en: Identifies an immutable membership version; adding or removing a candidate requires a new version.
        ja: 候補集合の不変構成版を識別し、候補の追加・削除には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-worker-pool-003
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该候选集合服务的委派契约或过程。
        en: References the delegation contract or process for which the candidate collection was frozen.
        ja: 候補集合を凍結した対象の委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-worker-pool-004
    - id: selection_scope
      labels:
        zh: 选择范围
        en: selection scope
        ja: 選択範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明候选成员共同被考虑的工作范围、地域、租户或其他选择边界。
        en: Defines the work, region, tenant, or other selection boundary within which all members are candidates.
        ja: 全構成員を候補として扱う作業、地域、テナントなどの選択境界を定めます。
      allowed_values: []
      pattern: null
      example_value: repository audit
      source_claims:
        - claim-worker-pool-005
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选成员集合被固定并可供评估的 UTC 时刻。
        en: Records the UTC instant at which candidate membership was fixed and became available for assessment.
        ja: 候補構成を固定し、評価に利用可能となった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:05:00Z
      source_claims:
        - claim-worker-pool-006
  constraints: []
  required_relation_constraints:
    - id: pool-part-of-selection
      direction: incoming
      predicate: has_candidate_pool
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerPool 必须通过 has_candidate_pool 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerPool must preserve its instance-level has_candidate_pool constraint with WorkerSelectionProcess.
        ja: WorkerPool は WorkerSelectionProcess とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-pool-007
examples:
  - id: WorkerPool-example-positive-manual-2026
    labels:
      zh: WorkerPool positive
      en: WorkerPool positive
      ja: WorkerPool positive
    descriptions:
      zh: LiteLLM 映射 WorkerPool LLM 路由：completion(model="gpt-4", messages=[...]) 统一接口；Router(model_list=[...], routing_strategy="least-busy") 负载均衡；ModelRouting 在多 provider 间选择 endpoint。
      en: LiteLLM maps WorkerPool LLM routing: completion(model="gpt-4", messages) unified interface; Router(model_list, routing_strategy="least-busy") load balancing; ModelRouting selects endpoints across providers.
      ja: LiteLLM WorkerPool: completion(model="gpt-4")+Router(routing_strategy="least-busy") ModelRouting。
    field_values: {worker_pool_id: worker-pool-001, version: 1, delegation_id: DelegationContract:delegation-001, selection_scope: "repository audit", created_at: 2026-07-15T01:05:00Z}

    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionProcess-has_candidate_pool-WorkerPool
    source_claims:
      - claim-worker-pool-008

  - id: WorkerPool-example-boundary-manual-2026
    labels:
      zh: WorkerPool boundary
      en: WorkerPool boundary
      ja: WorkerPool boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 WorkerPool 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not WorkerPool routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で WorkerPool routing spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionProcess-has_candidate_pool-WorkerPool
    source_claims:
      - claim-worker-pool-009

  - id: WorkerPool-example-counterexample-confusable
    labels:
      zh: WorkerPool counterexample
      en: WorkerPool counterexample
      ja: WorkerPool counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 WorkerPool TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style WorkerPool TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 WorkerPool ではない。
    field_values: {pool_id: absent, eligibility_filter_ref: absent, member_binding_refs: absent}

    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-008

  - id: WorkerPool-example-instance-concrete
    labels:
      zh: WorkerPool instance
      en: WorkerPool instance
      ja: WorkerPool instance
    descriptions:
      zh: LiteLLM 实例：Router(model_list=[{"model_name":"gpt-4","litellm_params":{...}}], routing_strategy="least-busy").completion(messages) → 映射 WorkerPool。
      en: LiteLLM instance: Router(model_list, routing_strategy="least-busy").completion(messages) → maps to WorkerPool.
      ja: LiteLLM 实例 Router least-busy+completion が WorkerPool に写像。
    field_values: {worker_pool_id: worker-pool-001, version: 1, delegation_id: DelegationContract:delegation-001, selection_scope: "repository audit", created_at: 2026-07-15T01:05:00Z}

    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-008

