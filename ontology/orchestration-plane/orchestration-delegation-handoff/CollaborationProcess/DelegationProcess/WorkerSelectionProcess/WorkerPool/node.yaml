schema: moonweave.ai/ontology-node/v1
id: WorkerPool
kind: concept
labels:
  zh: 工作者候选池
  en: worker candidate pool
  ja: 作業者候補プール
semantics:
  short_definition:
    zh: 为一次选择过程冻结的候选工作者角色集合。
    en: Collection of candidate worker roles frozen for one selection process.
    ja: 一件の selection process 向けに freeze された candidate worker role 集合。
  definition:
    zh: WorkerPool 以 worker_pool_id、version 与成员 WorkerRole 引用标识一次选择时可考虑的候选集合。A2A agent 发现返回的 AgentCard 列表、CrewAI crew.agents、Cursor 可用 subagent_type 列表，均应在选择开始时冻结为 WorkerPool；动态注册表本身不是 pool 实例。
    en: WorkerPool is identified by worker_pool_id, version, and WorkerRole member references as the candidate set considered for one selection. A2A agent discovery AgentCard list, CrewAI crew.agents, and Cursor available subagent_type list should freeze into WorkerPool at selection start; the dynamic registry itself is not the pool instance.
    ja: WorkerPool は worker_pool_id/version/member WorkerRole で candidate 集合を識別。A2A AgentCard list/CrewAI crew.agents/Cursor subagent_type list が freeze 対象。
  why_needed:
    zh: 固定候选集合使选择决定可重放并解释未考虑的工作者。
    en: Frozen candidate set makes selection reproducible and explains workers not considered.
    ja: freeze candidate 集合で selection replay と未考慮 worker 説明を可能に。
  includes:
    - zh: 纳入针对明确工作与时间创建、包含可识别 WorkerRole 成员的版本化候选集合。
      en: Includes versioned candidate collections created for defined work and time and containing identifiable WorkerRole members.
      ja: 明確な作業と時点向けに作成され、識別可能な WorkerRole メンバーを含む版管理候補集合を含みます。
  excludes:
    - zh: 排除全局代理注册表、已经选出的单个工作者和仅列出技能名称的搜索查询。
      en: Excludes a global agent registry, the one selected worker, and search queries that list only skill names.
      ja: 全体代理レジストリ、選択済み単一作業者、技能名だけの検索クエリを除外します。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: 集成时在 WorkerSelectionProcess.started_at 快照 AgentCard[]、crew.agents 或 Cursor subagent catalog → WorkerPool@version。后续 AgentCard 变更不影响已冻结 pool，需新 selection_process。
    en: At WorkerSelectionProcess.started_at snapshot AgentCard[], crew.agents, or Cursor subagent catalog → WorkerPool@version. Later AgentCard changes do not affect frozen pool; new selection_process required.
    ja: WorkerSelectionProcess.started_at で AgentCard[]/crew.agents/Cursor catalog を WorkerPool@version に snapshot。
  typical_input:
    - description: A2A discovered agents.
      format: '[{"name":"billing-agent","skills":["refund"]},{"name":"tech-agent","skills":["debug"]}]'
      source_claims:
        - claim-worker-pool-design
  typical_output:
    - description: Moonweave WorkerPool.
      format: '{"worker_pool_id":"worker-pool-001","version":"1"}'
      source_claims:
        - claim-worker-pool-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - worker_pool_id
    - version
  fields:
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识为一次选择过程冻结的候选角色集合。
        en: Stably identifies the candidate-role collection frozen for one selection process.
        ja: 一つの選択プロセス向けに凍結した候補ロール集合を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-pool-001
      source_claims:
        - claim-worker-pool-design
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识候选集合的不可变成员版本；增删候选必须产生新版本。
        en: Identifies an immutable membership version; adding or removing a candidate requires a new version.
        ja: 候補集合の不変構成版を識別し、候補の追加・削除には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-worker-pool-design
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该候选集合服务的委派契约或过程。
        en: References the delegation contract or process for which the candidate collection was frozen.
        ja: 候補集合を凍結した対象の委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-worker-pool-design
    - id: selection_scope
      labels:
        zh: 选择范围
        en: selection scope
        ja: 選択範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明候选成员共同被考虑的工作范围、地域、租户或其他选择边界。
        en: Defines the work, region, tenant, or other selection boundary within which all members are candidates.
        ja: 全構成員を候補として扱う作業、地域、テナントなどの選択境界を定めます。
      allowed_values: []
      pattern: null
      example_value: repository audit
      source_claims:
        - claim-worker-pool-design
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选成员集合被固定并可供评估的 UTC 时刻。
        en: Records the UTC instant at which candidate membership was fixed and became available for assessment.
        ja: 候補構成を固定し、評価に利用可能となった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:05:00Z
      source_claims:
        - claim-worker-pool-design
  constraints: []
  required_relation_constraints:
    - id: pool-part-of-selection
      direction: incoming
      predicate: has_candidate_pool
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerPool 必须通过 has_candidate_pool 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerPool must preserve its instance-level has_candidate_pool constraint with WorkerSelectionProcess.
        ja: WorkerPool は WorkerSelectionProcess とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-pool-design
examples:
  - id: WorkerPool-example-a2a-agents
    labels:
      zh: A2A 发现候选池
      en: A2A discovery pool
      ja: A2A discovery pool
    descriptions:
      zh: AgentCard 发现 billing/technical 两个 remote agent 构成 pool@1。
      en: AgentCard discovery of billing/technical remote agents forms pool@1.
      ja: AgentCard discovery billing/technical → pool@1。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Agent discovery
    field_values:
      worker_pool_id: worker-pool-001
      version: "1"
    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-design
  - id: WorkerPool-example-crewai-agents
    labels:
      zh: CrewAI agents 池
      en: CrewAI agents pool
      ja: CrewAI agents pool
    descriptions:
      zh: Crew 中 manager/researcher/writer 三 agent 冻结为 pool。
      en: Manager/researcher/writer three agents in crew frozen as pool.
      ja: Crew manager/researcher/writer 3 agent → pool freeze。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: crew.agents
    field_values:
      worker_pool_id: worker-pool-crew-1
      version: "1"
    related_node_ids:
      - WorkerPool
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-design
  - id: WorkerPool-example-cursor-types
    labels:
      zh: Cursor subagent 池
      en: Cursor subagent pool
      ja: Cursor subagent pool
    descriptions:
      zh: generalPurpose、explore、shell 三种 subagent_type 冻结为 pool。
      en: generalPurpose, explore, shell subagent_types frozen as pool.
      ja: generalPurpose/explore/shell subagent_type → pool。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent types
    field_values:
      worker_pool_id: worker-pool-cursor-1
      version: "1"
    related_node_ids:
      - WorkerPool
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-design
  - id: WorkerPool-example-boundary-registry
    labels:
      zh: 注册表不是池
      en: Registry is not pool
      ja: registry は pool ではない
    descriptions:
      zh: 全局 agent 注册表无 delegation 绑定与 version 冻结，不是 WorkerPool。
      en: Global agent registry without delegation binding and version freeze is not WorkerPool.
      ja: global registry は WorkerPool ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerPool
    related_relation_ids: []
    source_claims:
      - claim-worker-pool-design
parent_relation:
  id: WorkerSelectionProcess-has_candidate_pool-WorkerPool
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has candidate pool
    en: has candidate pool
    ja: has candidate pool
  definitions:
    zh: 工作者选择过程以组成关系拥有开始时冻结并供该次选择使用的候选池。
    en: A worker-selection process compositionally contains the candidate pool frozen for that selection.
    ja: 作業者選択プロセスは当該選択向けに確定された候補プールを構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其候选池
      en: candidate pool of
      ja: 候補プールである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-pool-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: WorkerPool-contains-WorkerRole
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: contains
      en: contains
      ja: contains
    definitions:
      zh: 工作者候选池以成员关系包含本次选择允许评估的工作者角色。
      en: A worker candidate pool contains the worker roles eligible for evaluation in that selection.
      ja: 作業者候補プールは当該選択で評価可能な作業者役割をメンバーとして含みます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: member_of
      labels:
        zh: 是其成员
        en: member of
        ja: メンバーである
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-worker-pool-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkerRole
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-worker-pool-design
    source: delegation-handoff-design
    supports: WorkerPool is versioned frozen candidate set for one selection.
    locator: WorkerPool boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-pool-design
    source: a2a-protocol
    supports: A2A AgentCard discovery list maps to WorkerPool members.
    locator: Agent discovery
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-pool-design
    source: crewai
    supports: CrewAI crew.agents snapshot maps to WorkerPool.
    locator: crew.agents
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-pool-design
    source: cursor-task-tool
    supports: Cursor available subagent types map to WorkerPool.
    locator: subagent types
    evidence_kind: design-inference
    confidence: high
