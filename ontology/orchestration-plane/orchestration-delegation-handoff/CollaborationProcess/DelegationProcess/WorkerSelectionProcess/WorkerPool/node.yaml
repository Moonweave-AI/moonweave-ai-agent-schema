schema: moonweave.ai/ontology-node/v1
id: WorkerPool
kind: concept
status: review
labels:
  zh: 工作者候选池
  en: worker candidate pool
  ja: 作業者候補プール
semantics:
  short_definition:
    zh: 工作者候选池是为一次选择过程冻结的候选角色集合。
    en: A worker candidate pool is the collection of candidate roles frozen for one worker-selection process.
    ja: 作業者候補プールは、一件の作業者選択プロセス向けに確定された候補役割の集合です。
  definition:
    zh: 工作者候选池是为一次选择过程冻结的候选角色集合。 它记录委派、选择范围、版本和创建时间，并通过成员关系指向 WorkerRole；动态目录本身不是候选池实例。
    en: A worker candidate pool is the collection of candidate roles frozen for one worker-selection process. It records delegation, selection scope, version, and creation time and contains WorkerRole members; a dynamic directory itself is not the pool instance.
    ja: 作業者候補プールは、一件の作業者選択プロセス向けに確定された候補役割の集合です。 委任、選択範囲、版、作成時刻を記録し WorkerRole メンバーを含み、動的ディレクトリ自体は候補プールではありません。
  why_needed:
    zh: 固定候选集合使一次选择决定可以重放并解释为什么某个工作者未被考虑。
    en: A frozen candidate set makes one selection decision reproducible and explains why a worker was not considered.
    ja: 確定候補集合により選択決定を再現し、ある作業者が考慮されなかった理由を説明できます。
  includes:
    - zh: 纳入针对明确工作与时间创建、包含可识别 WorkerRole 成员的版本化候选集合。
      en: Includes versioned candidate collections created for defined work and time and containing identifiable WorkerRole members.
      ja: 明確な作業と時点向けに作成され、識別可能な WorkerRole メンバーを含む版管理候補集合を含みます。
  excludes:
    - zh: 排除全局代理注册表、已经选出的单个工作者和仅列出技能名称的搜索查询。
      en: Excludes a global agent registry, the one selected worker, and search queries that list only skill names.
      ja: 全体代理レジストリ、選択済み単一作業者、技能名だけの検索クエリを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - worker_pool_id
    - version
  fields:
    - id: worker_pool_id
      labels:
        zh: 候选池 ID
        en: worker-pool ID
        ja: 候補プール ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识为一次选择过程冻结的候选角色集合。
        en: Stably identifies the candidate-role collection frozen for one selection process.
        ja: 一つの選択プロセス向けに凍結した候補ロール集合を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: worker-pool-001
      source_claims:
        - claim-worker-pool-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识候选集合的不可变成员版本；增删候选必须产生新版本。
        en: Identifies an immutable membership version; adding or removing a candidate requires a new version.
        ja: 候補集合の不変構成版を識別し、候補の追加・削除には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-worker-pool-003
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该候选集合服务的委派契约或过程。
        en: References the delegation contract or process for which the candidate collection was frozen.
        ja: 候補集合を凍結した対象の委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-worker-pool-004
    - id: selection_scope
      labels:
        zh: 选择范围
        en: selection scope
        ja: 選択範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明候选成员共同被考虑的工作范围、地域、租户或其他选择边界。
        en: Defines the work, region, tenant, or other selection boundary within which all members are candidates.
        ja: 全構成員を候補として扱う作業、地域、テナントなどの選択境界を定めます。
      allowed_values: []
      pattern: null
      example_value: repository audit
      source_claims:
        - claim-worker-pool-005
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选成员集合被固定并可供评估的 UTC 时刻。
        en: Records the UTC instant at which candidate membership was fixed and became available for assessment.
        ja: 候補構成を固定し、評価に利用可能となった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:05:00Z
      source_claims:
        - claim-worker-pool-006
  constraints: []
  required_relation_constraints:
    - id: pool-part-of-selection
      direction: incoming
      predicate: has_candidate_pool
      target_concept_id: WorkerSelectionProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerPool 必须通过 has_candidate_pool 保持与 WorkerSelectionProcess 的实例级语义约束。
        en: WorkerPool must preserve its instance-level has_candidate_pool constraint with WorkerSelectionProcess.
        ja: WorkerPool は WorkerSelectionProcess とのインスタンスレベル has_candidate_pool 制約を保持しなければなりません。
      source_claims:
        - claim-worker-pool-007
examples:
  - id: WorkerPool-example-positive-manual-2026
    kind: positive
    labels:
      zh: 工作者候选池正例
      en: Positive worker candidate pool case
      ja: 作業者候補プールの正例
    scenario_id: null
    descriptions:
      zh: 系统依据需要日文和法规技能的工作项冻结三名候选角色，保存 pool-v4 供后续评估。
      en: For work requiring Japanese and regulatory skill, the system freezes three candidate roles as pool-v4 for later assessment.
      ja: 日本語と規制技能を要する作業向けに三候補役割を pool-v4 として確定し、後続評価に使用します。
    field_values:
      worker_pool_id: worker-pool-001
      version: "1"
      delegation_id: DelegationContract:delegation-001
      selection_scope: repository audit
      created_at: 2026-07-15T01:05:00Z
    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionProcess-has_candidate_pool-WorkerPool
    expected_result:
      zh: 该记录应被识别为 WorkerPool，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerPool with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerPool として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作者候选池是为一次选择过程冻结的候选角色集合。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A worker candidate pool is the collection of candidate roles frozen for one worker-selection process."
      ja: この場面は次の同一性条件を満たします：作業者候補プールは、一件の作業者選択プロセス向けに確定された候補役割の集合です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-pool-008
  - id: WorkerPool-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作者候选池边界例
      en: Boundary worker candidate pool case
      ja: 作業者候補プールの境界例
    scenario_id: null
    descriptions:
      zh: Agent Card 注册表包含数百名代理且持续变化，没有特定委派范围，因此不是 WorkerPool。
      en: An Agent Card registry contains hundreds of changing agents with no specific delegation scope, so it is not a WorkerPool.
      ja: Agent Card レジストリが多数の変動代理を含んでも特定委任範囲がなければ WorkerPool ではありません。
    field_values: {}
    related_node_ids:
      - WorkerPool
      - WorkerSelectionProcess
    related_relation_ids:
      - WorkerSelectionProcess-has_candidate_pool-WorkerPool
    expected_result:
      zh: 该对象不得被归为 WorkerPool，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerPool or acquire missing conditions from nearby facts.
      ja: この対象を WorkerPool に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除全局代理注册表、已经选出的单个工作者和仅列出技能名称的搜索查询。
      en: "The case violates this reviewed exclusion boundary: Excludes a global agent registry, the one selected worker, and search queries that list only skill names."
      ja: この例は審査済み除外境界に反します：全体代理レジストリ、選択済み単一作業者、技能名だけの検索クエリを除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-pool-009
