schema: moonweave.ai/ontology-node/v1
id: DelegationProcess
kind: concept
labels:
  zh: 委派过程
  en: delegation process
  ja: 委任プロセス
semantics:
  short_definition:
    zh: 委派过程是委派者把有界工作交由受派方执行并保留可核责任链的协作过程。
    en: A delegation process is a collaboration process in which a delegator assigns bounded work to a delegate while preserving an auditable chain of responsibility.
    ja: 委任プロセスは、委任者が範囲付き作業を受任者へ割り当て、監査可能な責任連鎖を保つ協働プロセスです。
  definition:
    zh: 委派过程是委派者把有界工作交由受派方执行并保留可核责任链的一种 CollaborationProcess。它继承唯一的 collaboration_process_id；委派者、受派方、工作项和生效契约是判定该过程是否属于委派的必要种差与约束，而不是另一套过程身份。其生命周期涵盖选择、接受、执行、撤销或完成。
    en: A delegation process is a CollaborationProcess in which a delegator assigns bounded work to a delegate while preserving an auditable responsibility chain. It inherits the sole collaboration_process_id; delegator, delegate, work item, and effective contract are necessary differentia and constraints for classifying that same process as delegation, not a second process identity. Its lifecycle covers selection, acceptance, execution, revocation, or completion.
    ja: 委任プロセスは、委任者が範囲付き作業を受任者へ割り当て、監査可能な責任連鎖を保つ CollaborationProcess の一種です。唯一の collaboration_process_id を継承し、委任者、受任者、作業項目、有効契約は委任として分類するための種差・制約であって別同一性ではありません。選択、受諾、実行、取消、完了を含みます。
  why_needed:
    zh: 该节点把一次有边界的工作委托与普通路由、工具调用和控制移交区分开。
    en: The node distinguishes one bounded work delegation from ordinary routing, tool invocation, and control handoff.
    ja: このノードは一件の範囲付き作業委任を、通常のルーティング、ツール呼出し、制御引き継ぎから区別します。
  includes:
    - zh: 纳入具有明确受派方、工作范围、授权界限、上下文界限和返回条件的委派。
      en: Includes delegations with an identified delegate, work scope, authority boundary, context boundary, and return condition.
      ja: 受任者、作業範囲、権限境界、コンテキスト境界、返却条件が特定された委任を含みます。
  excludes:
    - zh: 排除仅选择下一路由、仅调用无责任主体的工具，或只把当前会话控制权交给另一代理的行为。
      en: Excludes choosing only the next route, invoking a tool with no accountable delegate, or merely transferring current conversational control.
      ja: 次経路の選択だけ、責任主体を持たないツール呼出しだけ、または会話制御の単純な移転を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationProcess 在 contract 生效后启动 WorkerSelectionProcess，选定 WorkerAssignment 后由 delegate 执行
      WorkItem；Agents SDK transfer_to_agent 映射为 Initiation→Acceptance→Execution 阶段事件。A2A Task 生命周期
      (submitted→working→completed) 由 Execution 适配器投影，不替代 DelegationPhase 本地记录。
    en: >-
      DelegationProcess starts WorkerSelectionProcess after contract becomes effective, executes WorkItem after
      WorkerAssignment selection; Agents SDK transfer_to_agent maps to Initiation→Acceptance→Execution phase events. A2A Task
      lifecycle (submitted→working→completed) is projected by an Execution adapter and does not replace local DelegationPhase
      records.
    ja: >-
      DelegationProcess は contract 発効後 WorkerSelectionProcess を開始し WorkerAssignment 選択後 delegate が WorkItem を
      実行する。Agents SDK transfer_to_agent は Initiation→Acceptance→Execution phase event に map される。A2A Task lifecycle
      (submitted→working→completed) は Execution adapter が投影し local DelegationPhase record を置き換えない。
  typical_input:
    - description:
        zh: 有效委派契约与待分配 WorkItem 引用。
        en: An effective delegation contract and WorkItem reference to assign.
        ja: effective delegation contract と assign 対象 WorkItem reference。
      format: |-
        {"delegation_process_id":"deleg-proc-884","collaboration_process_id":"collab-884","contract_ref":"contract:audit-7@2","work_item_ref":"work-item-71@2","delegator_binding_ref":"binding-orchestrator-1"}
  typical_output:
    - description:
        zh: 进入 WorkerSelection 或 Execution 阶段的委派过程状态。
        en: Delegation process state entering WorkerSelection or Execution phase.
        ja: WorkerSelection または Execution phase に入る delegation process state。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","current_phase":"WorkerSelection","worker_selection_process_ref":"wsel-884","delegation_events":["deleg-event-init-884"]}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents transferring bounded work to another agent with auditable phases.
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents protocol task states mapped separately from delegation phase records.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote delegation entry that still requires local process tracking.
  source_claims:
    - claim-delegation-process-001
    - claim-delegation-process-002
structure:
  identity_keys: []
  fields:
    - id: delegator_binding_id
      labels:
        zh: 委派者角色绑定
        en: delegator role binding
        ja: 委任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向在该委派中承担委派者角色的绑定。
        en: References the role binding that bears the delegator role in this delegation.
        ja: 当該委任で委任者役割を担うバインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:coordinator-1
      source_claims:
        - claim-delegation-process-002
    - id: delegatee_binding_id
      labels:
        zh: 受派方角色绑定
        en: delegate role binding
        ja: 受任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向接受有界工作的角色绑定。
        en: References the role binding that accepts the bounded work.
        ja: 範囲付き作業を受ける役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-delegation-process-003
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次委派实际分配的工作项。
        en: References the work item allocated by this delegation.
        ja: この委任で割り当てられる作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-delegation-process-004
    - id: contract_id
      labels:
        zh: 生效契约
        en: effective contract
        ja: 有効契約
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向治理该委派过程的生效契约版本。
        en: References the effective contract version governing the process.
        ja: 委任プロセスを統治する有効契約版を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:contract-v3
      source_claims:
        - claim-delegation-process-005
  constraints:
    - id: delegation-process-terminal-time
      severity: error
      expression_language: plain
      expression: ended_at is present exactly when the inherited process status is ended
      explanations:
        zh: 委派过程只在继承的通用过程状态为 ended 时具有终止时间；撤销或完成原因由委派阶段与事件链表达。
        en: A delegation process has an end time exactly when its inherited generic process status is ended; the revocation or completion reason is expressed by the delegation phase and event chain.
        ja: 委任プロセスは継承した汎用プロセス状態が ended のときだけ終了時刻を持ち、取消または完了の理由は委任フェーズとイベント連鎖で表します。
      source_claims:
        - claim-delegation-process-006
  required_relation_constraints:
    - id: delegation-process-contract
      direction: outgoing
      predicate: governed_by
      target_concept_id: DelegationContract
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationProcess 必须通过 governed_by 保持与 DelegationContract 的实例级语义约束。
        en: DelegationProcess must preserve its instance-level governed_by constraint with DelegationContract.
        ja: DelegationProcess は DelegationContract とのインスタンスレベル governed_by 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-process-007
examples:
  - id: DelegationProcess-example-positive-manual-2026
    labels:
      zh: DelegationProcess positive
      en: DelegationProcess positive
      ja: DelegationProcess positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 DelegationProcess：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps DelegationProcess: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が DelegationProcess 多 agent 協調に写像。
    field_values: {collaboration_process_id: collaboration-delegation-17, delegator_binding_id: ActorRoleBinding:coordinator-1, delegatee_binding_id: ActorRoleBinding:regulatory-7, work_item_id: WorkItem:42, contract_id: DelegationContract:contract-v3, status: active, started_at: 2026-07-13T03:05:00Z}

    related_node_ids:
      - DelegationProcess
      - CollaborationProcess
    related_relation_ids:
      - DelegationProcess-is_a-CollaborationProcess
    source_claims:
      - claim-delegation-process-008

  - id: DelegationProcess-example-boundary-manual-2026
    labels:
      zh: DelegationProcess boundary
      en: DelegationProcess boundary
      ja: DelegationProcess boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 DelegationProcess 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not DelegationProcess routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で DelegationProcess routing spec ではない。
    field_values: {}

    related_node_ids:
      - DelegationProcess
      - CollaborationProcess
    related_relation_ids:
      - DelegationProcess-is_a-CollaborationProcess
    source_claims:
      - claim-delegation-process-009

  - id: DelegationProcess-example-counterexample-confusable
    labels:
      zh: DelegationProcess counterexample
      en: DelegationProcess counterexample
      ja: DelegationProcess counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 DelegationProcess TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style DelegationProcess TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 DelegationProcess ではない。
    field_values: {work_item_id: absent, contract_id: absent, delegatee_binding_id: absent, routing_target: specialist-intent}

    related_node_ids:
      - DelegationProcess
      - RoutingDecision
      - HandoffProcess
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-process-008

  - id: DelegationProcess-example-instance-concrete
    labels:
      zh: DelegationProcess instance
      en: DelegationProcess instance
      ja: DelegationProcess instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 DelegationProcess DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to DelegationProcess DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が DelegationProcess に写像。
    field_values: {collaboration_process_id: collaboration-delegation-17, delegator_binding_id: ActorRoleBinding:coordinator-1, delegatee_binding_id: ActorRoleBinding:regulatory-7, work_item_id: WorkItem:42, contract_id: DelegationContract:contract-v3, status: active, started_at: 2026-07-13T03:05:00Z}

    related_node_ids:
      - DelegationProcess
      - CollaborationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-process-008

