    expected_result:
      zh: 该对象不得被归为 DelegationProcess，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationProcess or acquire missing conditions from nearby facts.
      ja: この対象を DelegationProcess に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除仅选择下一路由、仅调用无责任主体的工具，或只把当前会话控制权交给另一代理的行为。
      en: "The case violates this reviewed exclusion boundary: Excludes choosing only the next route, invoking a tool with no accountable delegate, or merely transferring current conversational control."
      ja: この例は審査済み除外境界に反します：次経路の選択だけ、責任主体を持たないツール呼出しだけ、または会話制御の単純な移転を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-process-009
