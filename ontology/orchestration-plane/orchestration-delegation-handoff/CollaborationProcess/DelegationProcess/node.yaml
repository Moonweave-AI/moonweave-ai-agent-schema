schema: moonweave.ai/ontology-node/v1
id: DelegationProcess
kind: concept
status: review
labels:
  zh: 委派过程
  en: delegation process
  ja: 委任プロセス
semantics:
  short_definition:
    zh: 委派过程是委派者把有界工作交由受派方执行并保留可核责任链的协作过程。
    en: A delegation process is a collaboration process in which a delegator assigns bounded work to a delegate while preserving an auditable chain of responsibility.
    ja: 委任プロセスは、委任者が範囲付き作業を受任者へ割り当て、監査可能な責任連鎖を保つ協働プロセスです。
  definition:
    zh: 委派过程是委派者把有界工作交由受派方执行并保留可核责任链的一种 CollaborationProcess。它继承唯一的 collaboration_process_id；委派者、受派方、工作项和生效契约是判定该过程是否属于委派的必要种差与约束，而不是另一套过程身份。其生命周期涵盖选择、接受、执行、撤销或完成。
    en: A delegation process is a CollaborationProcess in which a delegator assigns bounded work to a delegate while preserving an auditable responsibility chain. It inherits the sole collaboration_process_id; delegator, delegate, work item, and effective contract are necessary differentia and constraints for classifying that same process as delegation, not a second process identity. Its lifecycle covers selection, acceptance, execution, revocation, or completion.
    ja: 委任プロセスは、委任者が範囲付き作業を受任者へ割り当て、監査可能な責任連鎖を保つ CollaborationProcess の一種です。唯一の collaboration_process_id を継承し、委任者、受任者、作業項目、有効契約は委任として分類するための種差・制約であって別同一性ではありません。選択、受諾、実行、取消、完了を含みます。
  why_needed:
    zh: 该节点把一次有边界的工作委托与普通路由、工具调用和控制移交区分开。
    en: The node distinguishes one bounded work delegation from ordinary routing, tool invocation, and control handoff.
    ja: このノードは一件の範囲付き作業委任を、通常のルーティング、ツール呼出し、制御引き継ぎから区別します。
  includes:
    - zh: 纳入具有明确受派方、工作范围、授权界限、上下文界限和返回条件的委派。
      en: Includes delegations with an identified delegate, work scope, authority boundary, context boundary, and return condition.
      ja: 受任者、作業範囲、権限境界、コンテキスト境界、返却条件が特定された委任を含みます。
  excludes:
    - zh: 排除仅选择下一路由、仅调用无责任主体的工具，或只把当前会话控制权交给另一代理的行为。
      en: Excludes choosing only the next route, invoking a tool with no accountable delegate, or merely transferring current conversational control.
      ja: 次経路の選択だけ、責任主体を持たないツール呼出しだけ、または会話制御の単純な移転を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: delegator_binding_id
      labels:
        zh: 委派者角色绑定
        en: delegator role binding
        ja: 委任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向在该委派中承担委派者角色的绑定。
        en: References the role binding that bears the delegator role in this delegation.
        ja: 当該委任で委任者役割を担うバインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:coordinator-1
      source_claims:
        - claim-delegation-process-002
    - id: delegatee_binding_id
      labels:
        zh: 受派方角色绑定
        en: delegate role binding
        ja: 受任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向接受有界工作的角色绑定。
        en: References the role binding that accepts the bounded work.
        ja: 範囲付き作業を受ける役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-delegation-process-003
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次委派实际分配的工作项。
        en: References the work item allocated by this delegation.
        ja: この委任で割り当てられる作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-delegation-process-004
    - id: contract_id
      labels:
        zh: 生效契约
        en: effective contract
        ja: 有効契約
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向治理该委派过程的生效契约版本。
        en: References the effective contract version governing the process.
        ja: 委任プロセスを統治する有効契約版を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:contract-v3
      source_claims:
        - claim-delegation-process-005
  constraints:
    - id: delegation-process-terminal-time
      severity: error
      expression_language: plain
      expression: ended_at is present exactly when the inherited process status is ended
      explanations:
        zh: 委派过程只在继承的通用过程状态为 ended 时具有终止时间；撤销或完成原因由委派阶段与事件链表达。
        en: A delegation process has an end time exactly when its inherited generic process status is ended; the revocation or completion reason is expressed by the delegation phase and event chain.
        ja: 委任プロセスは継承した汎用プロセス状態が ended のときだけ終了時刻を持ち、取消または完了の理由は委任フェーズとイベント連鎖で表します。
      source_claims:
        - claim-delegation-process-006
  required_relation_constraints:
    - id: delegation-process-contract
      direction: outgoing
      predicate: governed_by
      target_concept_id: DelegationContract
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationProcess 必须通过 governed_by 保持与 DelegationContract 的实例级语义约束。
        en: DelegationProcess must preserve its instance-level governed_by constraint with DelegationContract.
        ja: DelegationProcess は DelegationContract とのインスタンスレベル governed_by 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-process-007
