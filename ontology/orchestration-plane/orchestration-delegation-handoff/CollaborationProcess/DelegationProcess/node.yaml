      en: A coordinator assigns one research work item to a regulatory specialist under a contract that limits data scope, tool authority, and deadline.
      ja: 調整役がデータ範囲、ツール権限、期限を制限する契約に基づき、一件の調査作業項目を規制専門家へ割り当てます。
    field_values:
      collaboration_process_id: collaboration-delegation-17
      delegator_binding_id: ActorRoleBinding:coordinator-1
      delegatee_binding_id: ActorRoleBinding:regulatory-7
      work_item_id: WorkItem:42
      contract_id: DelegationContract:contract-v3
      status: active
      started_at: 2026-07-13T03:05:00Z
    related_node_ids:
      - DelegationProcess
      - CollaborationProcess
    related_relation_ids:
      - DelegationProcess-is_a-CollaborationProcess
    expected_result:
      zh: 该记录应被识别为 DelegationProcess，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationProcess with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationProcess として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派过程是委派者把有界工作交由受派方执行并保留可核责任链的协作过程。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation process is a collaboration process in which a delegator assigns bounded work to a delegate while preserving an auditable chain of responsibility."
      ja: この場面は次の同一性条件を満たします：委任プロセスは、委任者が範囲付き作業を受任者へ割り当て、監査可能な責任連鎖を保つ協働プロセスです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-process-008
  - id: DelegationProcess-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派过程边界例
      en: Boundary delegation process case
      ja: 委任プロセスの境界例
    scenario_id: null
    descriptions:
      zh: 路由器根据意图把下一条消息送往专家，但没有工作项、受派责任或返回条件；这是路由而不是委派过程。
      en: A router sends the next message to a specialist based on intent but creates no work item, delegate accountability, or return condition; this is routing rather than delegation.
      ja: ルータが意図に応じて次のメッセージを専門家へ送るだけで、作業項目、受任責任、返却条件を作らない場合は委任ではなくルーティングです。
    field_values: {}
    related_node_ids:
