schema: moonweave.ai/ontology-node/v1
id: DelegationProcess
kind: concept
labels:
  zh: 委派过程
  en: delegation process
  ja: 委任プロセス
semantics:
  short_definition:
    zh: 委派者把有界工作交给受派方执行并保留可审计责任链的协作过程。
    en: Collaboration process where a delegator assigns bounded work to a delegate while preserving an auditable responsibility chain.
    ja: delegator が bounded work を delegate へ割当て auditable responsibility chain を保つ collaboration process。
  definition:
    zh: DelegationProcess 继承 CollaborationProcess 身份，以 delegator_binding_id、delegatee_binding_id、work_item_id 与 contract_id 为委派种差。Cursor Task 工具启动子代理、A2A tasks/send 远程任务提交、CrewAI manager 向 worker 分派 @task 均映射为 DelegationProcess 发生事实；OpenAI transfer_to_* 若只转移会话控制而无独立工作项则属于 HandoffProcess。生命周期由 DelegationPhase 与 DelegationEvent 链重建，不由单一 status 字段覆盖。
    en: DelegationProcess inherits CollaborationProcess identity with delegator_binding_id, delegatee_binding_id, work_item_id, and contract_id as delegation differentia. Cursor Task tool subagent launch, A2A tasks/send remote submission, and CrewAI manager @task assignment map to DelegationProcess occurrences; OpenAI transfer_to_* that moves conversational control without a distinct work item belongs to HandoffProcess. Lifecycle is reconstructed from DelegationPhase and DelegationEvent chains, not a single status field.
    ja: DelegationProcess は CollaborationProcess を継承し delegator/delegatee/work_item/contract を種差とします。Cursor Task subagent launch、A2A tasks/send、CrewAI manager @task が occurrence に写像されます。OpenAI transfer_to_* で独立 work item が無い場合は HandoffProcess です。
  why_needed:
    zh: 区分有边界的工作委托与普通路由、工具调用和控制移交。
    en: Distinguishes bounded work delegation from ordinary routing, tool invocation, and control handoff.
    ja: bounded work 委任を routing/tool invocation/control handoff と区別します。
  includes:
    - zh: 纳入具有明确受派方、工作范围、授权界限、上下文界限和返回条件的委派。
      en: Includes delegations with an identified delegate, work scope, authority boundary, context boundary, and return condition.
      ja: 受任者、作業範囲、権限境界、コンテキスト境界、返却条件が特定された委任を含みます。
  excludes:
    - zh: 排除仅选择下一路由、仅调用无责任主体的工具，或只把当前会话控制权交给另一代理的行为。
      en: Excludes choosing only the next route, invoking a tool with no accountable delegate, or merely transferring current conversational control.
      ja: 次経路の選択だけ、責任主体を持たないツール呼出しだけ、または会話制御の単純な移転を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Cursor Task({prompt, subagent_type}) → DelegationProcess + SubagentContext；A2A POST tasks/send TaskSendParams → DelegationProcess + A2A Task 状态事件；CrewAI Task(agent=worker) under Process.hierarchical → DelegationProcess。contract_id 引用 DelegationContract 规范版本；WorkerSelectionProcess 与 WorkerAssignment 是过程内的选择与分派阶段。
    en: Cursor Task({prompt, subagent_type}) → DelegationProcess + SubagentContext; A2A POST tasks/send TaskSendParams → DelegationProcess + A2A Task status events; CrewAI Task(agent=worker) under Process.hierarchical → DelegationProcess. contract_id references DelegationContract version; WorkerSelectionProcess and WorkerAssignment are in-process selection and assignment phases.
    ja: Cursor Task → DelegationProcess + SubagentContext、A2A tasks/send → DelegationProcess + Task status event、CrewAI hierarchical Task → DelegationProcess。
  typical_input:
    - description: Cursor Task tool subagent launch.
      format: Task(subagent_type="explore", prompt="Investigate refund policy for order 884")
      source_claims:
        - claim-delegation-process-design
    - description: A2A tasks/send delegation.
      format: 'POST /a2a/v1/tasks/send { "message": {...}, "configuration": {...} }'
      source_claims:
        - claim-delegation-process-design
  typical_output:
    - description: Moonweave DelegationProcess occurrence.
      format: '{"collaboration_process_id":"delegation-17","contract_id":"DelegationContract:contract-v3","work_item_id":"WorkItem:42"}'
      source_claims:
        - claim-delegation-process-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: delegator_binding_id
      labels:
        zh: 委派者角色绑定
        en: delegator role binding
        ja: 委任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向在该委派中承担委派者角色的绑定。
        en: References the role binding that bears the delegator role in this delegation.
        ja: 当該委任で委任者役割を担うバインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:coordinator-1
      source_claims:
        - claim-delegation-process-design
    - id: delegatee_binding_id
      labels:
        zh: 受派方角色绑定
        en: delegate role binding
        ja: 受任者役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向接受有界工作的角色绑定。
        en: References the role binding that accepts the bounded work.
        ja: 範囲付き作業を受ける役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-delegation-process-design
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次委派实际分配的工作项。
        en: References the work item allocated by this delegation.
        ja: この委任で割り当てられる作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-delegation-process-design
    - id: contract_id
      labels:
        zh: 生效契约
        en: effective contract
        ja: 有効契約
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向治理该委派过程的生效契约版本。
        en: References the effective contract version governing the process.
        ja: 委任プロセスを統治する有効契約版を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:contract-v3
      source_claims:
        - claim-delegation-process-design
  constraints:
    - id: delegation-process-terminal-time
      severity: error
      expression_language: plain
      expression: ended_at is present exactly when the inherited process status is ended
      explanations:
        zh: 委派过程只在继承的通用过程状态为 ended 时具有终止时间；撤销或完成原因由委派阶段与事件链表达。
        en: A delegation process has an end time exactly when its inherited generic process status is ended; the revocation or completion reason is expressed by the delegation phase and event chain.
        ja: 委任プロセスは継承した汎用プロセス状態が ended のときだけ終了時刻を持ち、取消または完了の理由は委任フェーズとイベント連鎖で表します。
      source_claims:
        - claim-delegation-process-design
  required_relation_constraints:
    - id: delegation-process-contract
      direction: outgoing
      predicate: governed_by
      target_concept_id: DelegationContract
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationProcess 必须通过 governed_by 保持与 DelegationContract 的实例级语义约束。
        en: DelegationProcess must preserve its instance-level governed_by constraint with DelegationContract.
        ja: DelegationProcess は DelegationContract とのインスタンスレベル governed_by 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-process-design
examples:
  - id: DelegationProcess-example-cursor-task
    labels:
      zh: Cursor Task 委派
      en: Cursor Task delegation
      ja: Cursor Task 委任
    descriptions:
      zh: 协调器通过 Task 工具把法规调查交给 explore 子代理，附带 prompt 与 DelegationContract 约束。
      en: Coordinator delegates regulatory investigation to explore subagent via Task tool with prompt and DelegationContract constraints.
      ja: Coordinator が Task tool で explore subagent に regulation 調査を prompt と DelegationContract 制約付きで委任。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task tool
    field_values:
      collaboration_process_id: delegation-17
      delegator_binding_id: ActorRoleBinding:coordinator-1
      delegatee_binding_id: ActorRoleBinding:regulatory-7
      work_item_id: WorkItem:42
      contract_id: DelegationContract:contract-v3
    related_node_ids:
      - DelegationProcess
      - SubagentContext
    related_relation_ids:
      - DelegationProcess-is_a-CollaborationProcess
    source_claims:
      - claim-delegation-process-design
  - id: DelegationProcess-example-a2a-send
    labels:
      zh: A2A tasks/send 委派
      en: A2A tasks/send delegation
      ja: A2A tasks/send 委任
    descriptions:
      zh: 客户端向远程 billing agent 发送 TaskSendParams，任务状态 submitted→working→completed 提供生命周期证据。
      en: Client sends TaskSendParams to remote billing agent; task states submitted→working→completed provide lifecycle evidence.
      ja: Client が remote billing agent へ TaskSendParams を送信し submitted→working→completed が lifecycle 証拠。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: tasks/send
    field_values:
      collaboration_process_id: delegation-a2a-884
      work_item_id: WorkItem:refund-884
      contract_id: DelegationContract:a2a-v1
    related_node_ids:
      - DelegationProcess
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-process-design
  - id: DelegationProcess-example-crewai-task
    labels:
      zh: CrewAI manager 委派
      en: CrewAI manager delegation
      ja: CrewAI manager 委任
    descriptions:
      zh: Hierarchical crew 中 manager 向 researcher 分派 Task，保留最终答复责任。
      en: In hierarchical crew, manager assigns Task to researcher while retaining final-answer accountability.
      ja: Hierarchical crew で manager が researcher に Task を割当て final answer 責任を保持。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Process.hierarchical
    field_values:
      collaboration_process_id: delegation-crew-3
      work_item_id: WorkItem:research-3
      contract_id: DelegationContract:crew-v2
    related_node_ids:
      - DelegationProcess
      - WorkerAssignment
    related_relation_ids: []
    source_claims:
      - claim-delegation-process-design
  - id: DelegationProcess-example-boundary-routing
    labels:
      zh: 路由不是委派
      en: Routing is not delegation
      ja: routing は委任ではない
    descriptions:
      zh: 路由器按意图把消息送往专家，无工作项、受派责任或返回条件，属于路由而非 DelegationProcess。
      en: Router sends message to specialist by intent with no work item, delegate accountability, or return condition; this is routing, not DelegationProcess.
      ja: Router が intent で specialist へ message を送るだけでは DelegationProcess ではありません。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: conditional_edges
    field_values: {}
    related_node_ids:
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-process-design
parent_relation:
  id: DelegationProcess-is_a-CollaborationProcess
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 每个委派过程都是协作过程，因为其至少包含委派者与受派方围绕共同工作交换责任。
    en: Every delegation process is a collaboration process because a delegator and delegate exchange responsibility around shared work.
    ja: すべての委任プロセスは、共通作業を巡り委任者と受任者が責任を交換するため協働プロセスです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-process-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DelegationProcess-governed_by-DelegationContract
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: governed by
      en: governed by
      ja: governed by
    definitions:
      zh: 委派过程由一个生效契约治理，该契约确定双方、工作范围、完成条件及引用约束。
      en: A delegation process is governed by an effective contract that identifies parties, work scope, completion terms, and referenced constraints.
      ja: 委任プロセスは双方、作業範囲、完了条件、参照制約を定める有効契約に統治されます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: governs
      labels:
        zh: 治理
        en: governs
        ja: 統治する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-process-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DelegationContract
