schema: moonweave.ai/ontology-node/v1
id: SubagentContext
kind: concept
labels:
  zh: 子智能体上下文
  en: subagent context
  ja: サブエージェントコンテキスト
semantics:
  short_definition:
    zh: 受派方为本地子智能体时的委派上下文特化。
    en: Delegation context scoped to a locally invoked subagent.
    ja: 受任者がローカル subagent の場合に用いる委任コンテキスト。
  definition:
    zh: 子智能体上下文是目标受派方为本地子智能体时使用的委派上下文。 它继承委派上下文的边界和引用规则，并可仅包含父代理选出的消息、摘要和工作说明。
    en: Subagent context is delegation context whose receiving delegate is a locally invoked subagent. It inherits delegation-context boundaries and references and may contain only messages, summaries, and work instructions selected by the parent agent.
    ja: サブエージェントコンテキストは、受任者がローカルに呼び出されるサブエージェントである委任コンテキストです。 委任コンテキストの境界と参照規則を継承し、親代理が選んだメッセージ、要約、作業指示だけを含められます。
  why_needed:
    zh: 该下位概念说明子智能体调用仍需上下文隔离，且不等于复制父代理全部会话。
    en: The subtype makes clear that subagent invocation still requires context isolation and does not imply copying the parent's full conversation.
    ja: サブエージェント呼出しにもコンテキスト隔離が必要で、親代理の全会話複製を意味しないことを示します。
  includes:
    - zh: 纳入为一个本地子智能体委派构造、遵循允许和排除引用集合的上下文。
      en: Includes context assembled for one local subagent delegation under allowed and excluded reference sets.
      ja: 一件のローカルサブエージェント委任向けに許可・除外参照集合に従って構成されたコンテキストを含みます。
  excludes:
    - zh: 排除远程 A2A 受派方上下文、父代理完整隐藏状态和仅供工具调用的参数对象。
      en: Excludes remote A2A delegate context, the parent's full hidden state, and parameter objects used only for tool invocation.
      ja: 遠隔 A2A 受任者コンテキスト、親代理の完全な隠れ状態、ツール呼出し専用パラメータを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      SubagentContext 在 OpenAI Agents SDK transfer_to_agent 到本地子 Agent 前由父 Runner 构建：仅包含
      ContextIsolation 允许的 message 摘要与 work instructions。不同于 A2A 远程 DelegationContext；子 Agent
      Runner 输入引用 subagent_context_id，不复制父会话全文。
    en: >-
      SubagentContext is built by parent Runner before OpenAI Agents SDK transfer_to_agent to a local sub-agent: only
      message digests and work instructions allowed by ContextIsolation. Unlike remote A2A DelegationContext; sub-agent Runner
      input references subagent_context_id without copying full parent conversation.
    ja: >-
      SubagentContext は local sub-agent への OpenAI Agents SDK transfer_to_agent 前に parent Runner が構築する。
      ContextIsolation が許可する message digest と work instructions のみ含む。remote A2A DelegationContext とは異なる。
      sub-agent Runner input は subagent_context_id を参照し parent 会話全文を複製しない。
  typical_input:
    - description:
        zh: 父代理为本地子智能体组装的裁剪上下文。
        en: Trimmed context assembled by parent agent for local subagent.
        ja: parent agent が local subagent 向けに assemble した trimmed context。
      format: |-
        {"subagent_context_id":"sctx-884","parent_binding_ref":"binding-orchestrator-1","delegate_binding_ref":"binding-sub-researcher-1","allowed_refs":["task-spec-research@1","summary:requirements@1"],"excluded_refs":["user_pii"]}
  typical_output:
    - description:
        zh: 子 Agent Runner 启动时引用的 SubagentContext 包络。
        en: SubagentContext envelope referenced when sub-agent Runner starts.
        ja: sub-agent Runner 起動時に参照される SubagentContext envelope。
      format: |-
        {"subagent_context_ref":"sctx-884","runner_input_refs":["task-spec-research@1","summary:requirements@1"],"isolation_ref":"iso:subagent@1"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents bounded context for local sub-agent handoffs.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-python/agents/
      description: Documents sub-agents invoked with isolated instructions and context.
    - name: A2A Message
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote messaging distinct from local subagent context records.
  source_claims:
    - claim-subagent-context-001
    - claim-subagent-context-002
structure:
  identity_keys: []
  fields:
    - id: target_subagent_binding_ref
      labels:
        zh: 目标子智能体绑定引用
        en: target subagent-binding reference
        ja: 対象サブエージェント binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收该上下文的 SubagentRole 有效绑定，而不是只写代理名称或角色类别。
        en: References the effective SubagentRole binding that actually receives the context rather than a bare agent name or role class.
        ja: context を実際に受け取る SubagentRole の有効 binding を参照し、agent 名や role class だけでは表しません。
      allowed_values: []
      pattern: null
      example_value: actor-role-binding-legal-review-9
      source_claims:
        - claim-subagent-context-002
    - id: parent_context_ref
      labels:
        zh: 父上下文引用
        en: parent-context reference
        ja: 親 context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生本投影视图的上级 DelegationContext 修订，以便核验哪些信息被保留、变换或排除。
        en: References the parent DelegationContext revision from which this projection was derived so retained, transformed, and excluded information can be audited.
        ja: この projection の元となる上位 DelegationContext revision を参照し、保持・変換・除外情報を監査可能にします。
      allowed_values: []
      pattern: null
      example_value: delegation-context-license-review@4
      source_claims:
        - claim-subagent-context-003
    - id: projection_policy_ref
      labels:
        zh: 投影策略引用
        en: projection-policy reference
        ja: 投影方針参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用决定父上下文中哪些消息、来源、工具和敏感字段可进入子智能体视图的版本化策略。
        en: References the versioned policy deciding which parent messages, sources, tools, and sensitive fields enter the subagent view.
        ja: 親 context の message・source・tool・sensitive field のどれを subagent view に含めるか決める版付き方針を参照します。
      allowed_values: []
      pattern: null
      example_value: subagent-context-projection-legal-readonly@3
      source_claims:
        - claim-subagent-context-004
    - id: return_channel_ref
      labels:
        zh: 返回通道引用
        en: return-channel reference
        ja: 返却チャネル参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须用于返回结果、证据、警告或阻塞状态的受控通道。
        en: References the controlled channel through which the subagent must return results, evidence, warnings, or blocked status.
        ja: subagent が結果・証拠・警告・blocked 状態を返すための制御済み channel を参照します。
      allowed_values: []
      pattern: null
      example_value: return-channel-supervisor-legal-review-9
      source_claims:
        - claim-subagent-context-005
    - id: context_expiry_at
      labels:
        zh: 上下文失效时刻
        en: context expires at
        ja: context 失効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定子智能体不得再读取或使用该投影视图的最晚时刻，避免委派结束后继续暴露上下文。
        en: Specifies the latest time the subagent may read or use the projected view so context does not remain exposed after the delegation boundary.
        ja: 委任境界後も context が露出し続けないよう、subagent が投影视図を読取・使用できる最終時刻を規定します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:30:00Z
      source_claims:
        - claim-subagent-context-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: SubagentContext-example-positive-manual-2026
    labels:
      zh: SubagentContext positive
      en: SubagentContext positive
      ja: SubagentContext positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 SubagentContext：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps SubagentContext: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が SubagentContext 多 agent 協調に写像。
    field_values: {context_id: subagent-context-license-review-9, version: 4, delegation_id: delegation-license-review-9, content_digest: sha256:3bc51062973c458d5a6f2d8d64a023246354ad7e064b1e4e009ec8a0699a3043}

    related_node_ids:
      - SubagentContext
      - DelegationContext
    related_relation_ids:
      - SubagentContext-is_a-DelegationContext
    source_claims:
      - claim-subagent-context-007

  - id: SubagentContext-example-boundary-manual-2026
    labels:
      zh: SubagentContext boundary
      en: SubagentContext boundary
      ja: SubagentContext boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 SubagentContext 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not SubagentContext static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで SubagentContext 静的 TaskPlan ではない。
    field_values: {}

    related_node_ids:
      - SubagentContext
      - DelegationContext
    related_relation_ids:
      - SubagentContext-is_a-DelegationContext
    source_claims:
      - claim-subagent-context-008

  - id: SubagentContext-example-counterexample-confusable
    labels:
      zh: SubagentContext counterexample
      en: SubagentContext counterexample
      ja: SubagentContext counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 SubagentContext RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style SubagentContext RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 SubagentContext ではない。
    field_values: {subagent_context_id: absent, subagent_scope_ref: absent, redaction_digest: absent}

    related_node_ids:
      - SubagentContext
      - DelegationContext
      - ContextIsolation
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-007

  - id: SubagentContext-example-instance-concrete
    labels:
      zh: SubagentContext instance
      en: SubagentContext instance
      ja: SubagentContext instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 SubagentContext DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to SubagentContext DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が SubagentContext に写像。
    field_values: {context_id: subagent-context-license-review-9, version: 4, delegation_id: delegation-license-review-9, content_digest: sha256:3bc51062973c458d5a6f2d8d64a023246354ad7e064b1e4e009ec8a0699a3043}

    related_node_ids:
      - SubagentContext
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-007

