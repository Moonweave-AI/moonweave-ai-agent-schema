schema: moonweave.ai/ontology-node/v1
id: SubagentContext
kind: concept
labels:
  zh: 子智能体上下文
  en: subagent context
  ja: サブエージェントコンテキスト
semantics:
  short_definition:
    zh: 目标受派方为本地子智能体时使用的委派上下文投影。
    en: Delegation-context projection when the receiving delegate is a locally invoked subagent.
    ja: 受任者が locally invoked subagent のときの delegation context projection。
  definition:
    zh: SubagentContext 是 DelegationContext 的下位类型，额外绑定 target_subagent_binding_ref、parent_context_ref 与 projection_policy_ref。Cursor Task 工具的 prompt 字段与 subagent_type 选择构成典型 SubagentContext：父代理从全会话中投影最小必要信息，不等于复制隐藏状态。远程 A2A 受派方使用 DelegationContext 而非本子类。
    en: "SubagentContext is a DelegationContext subtype additionally binding target_subagent_binding_ref, parent_context_ref, and projection_policy_ref. Cursor Task tool prompt field and subagent_type selection form typical SubagentContext: parent projects minimal necessary information from full conversation, not full hidden state. Remote A2A delegates use DelegationContext, not this subtype."
    ja: SubagentContext は DelegationContext 下位型で target_subagent_binding_ref/parent_context_ref/projection_policy_ref を追加束縛します。Cursor Task prompt + subagent_type が典型例です。
  why_needed:
    zh: 说明子智能体调用仍需上下文隔离，且不等于复制父代理全部会话。
    en: Clarifies subagent invocation still requires context isolation and does not copy the parent full conversation.
    ja: subagent invocation にも context isolation が必要で parent full conversation 複製ではないことを示します。
  includes:
    - zh: 纳入为一个本地子智能体委派构造、遵循允许和排除引用集合的上下文。
      en: Includes context assembled for one local subagent delegation under allowed and excluded reference sets.
      ja: 一件のローカルサブエージェント委任向けに許可・除外参照集合に従って構成されたコンテキストを含みます。
  excludes:
    - zh: 排除远程 A2A 受派方上下文、父代理完整隐藏状态和仅供工具调用的参数对象。
      en: Excludes remote A2A delegate context, the parent's full hidden state, and parameter objects used only for tool invocation.
      ja: 遠隔 A2A 受任者コンテキスト、親代理の完全な隠れ状態、ツール呼出し専用パラメータを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor Task({subagent_type, prompt}) 是 SubagentContext 的主要集成点：prompt 即投影后的 bounded context，parent_context_ref 指向父会话 DelegationContext revision。LangGraph 本地 subgraph 调用同理。fresh context per subagent 由 ContextIsolation + projection_policy_ref 强制。
    en: "Cursor Task({subagent_type, prompt}) is the primary integration point: prompt is the projected bounded context, parent_context_ref points to parent conversation DelegationContext revision. LangGraph local subgraph invocation is analogous. Fresh context per subagent is enforced by ContextIsolation + projection_policy_ref."
    ja: Cursor Task({subagent_type, prompt}) が primary integration point。fresh context per subagent は ContextIsolation + projection_policy_ref で強制。
  typical_input:
    - description: Cursor Task with isolated prompt.
      format: Task(subagent_type="generalPurpose", prompt="Review license terms for SKU-991 only.")
      source_claims:
        - claim-subagent-context-design
  typical_output:
    - description: Moonweave SubagentContext record.
      format: '{"target_subagent_binding_ref":"SubagentRole:explore-9","parent_context_ref":"delegation-context-parent@2"}'
      source_claims:
        - claim-subagent-context-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: target_subagent_binding_ref
      labels:
        zh: 目标子智能体绑定引用
        en: target subagent-binding reference
        ja: 対象サブエージェント binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收该上下文的 SubagentRole 有效绑定，而不是只写代理名称或角色类别。
        en: References the effective SubagentRole binding that actually receives the context rather than a bare agent name or role class.
        ja: context を実際に受け取る SubagentRole の有効 binding を参照し、agent 名や role class だけでは表しません。
      allowed_values: []
      pattern: null
      example_value: actor-role-binding-legal-review-9
      source_claims:
        - claim-subagent-context-design
    - id: parent_context_ref
      labels:
        zh: 父上下文引用
        en: parent-context reference
        ja: 親 context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生本投影视图的上级 DelegationContext 修订，以便核验哪些信息被保留、变换或排除。
        en: References the parent DelegationContext revision from which this projection was derived so retained, transformed, and excluded information can be audited.
        ja: この projection の元となる上位 DelegationContext revision を参照し、保持・変換・除外情報を監査可能にします。
      allowed_values: []
      pattern: null
      example_value: delegation-context-license-review@4
      source_claims:
        - claim-subagent-context-design
    - id: projection_policy_ref
      labels:
        zh: 投影策略引用
        en: projection-policy reference
        ja: 投影方針参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用决定父上下文中哪些消息、来源、工具和敏感字段可进入子智能体视图的版本化策略。
        en: References the versioned policy deciding which parent messages, sources, tools, and sensitive fields enter the subagent view.
        ja: 親 context の message・source・tool・sensitive field のどれを subagent view に含めるか決める版付き方針を参照します。
      allowed_values: []
      pattern: null
      example_value: subagent-context-projection-legal-readonly@3
      source_claims:
        - claim-subagent-context-design
    - id: return_channel_ref
      labels:
        zh: 返回通道引用
        en: return-channel reference
        ja: 返却チャネル参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须用于返回结果、证据、警告或阻塞状态的受控通道。
        en: References the controlled channel through which the subagent must return results, evidence, warnings, or blocked status.
        ja: subagent が結果・証拠・警告・blocked 状態を返すための制御済み channel を参照します。
      allowed_values: []
      pattern: null
      example_value: return-channel-supervisor-legal-review-9
      source_claims:
        - claim-subagent-context-design
    - id: context_expiry_at
      labels:
        zh: 上下文失效时刻
        en: context expires at
        ja: context 失効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定子智能体不得再读取或使用该投影视图的最晚时刻，避免委派结束后继续暴露上下文。
        en: Specifies the latest time the subagent may read or use the projected view so context does not remain exposed after the delegation boundary.
        ja: 委任境界後も context が露出し続けないよう、subagent が投影视図を読取・使用できる最終時刻を規定します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:30:00Z
      source_claims:
        - claim-subagent-context-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SubagentContext-example-cursor-explore
    labels:
      zh: Cursor explore 子代理
      en: Cursor explore subagent
      ja: Cursor explore subagent
    descriptions:
      zh: 父代理向 explore 子代理传递 SKU-991 许可审查 prompt，排除完整客户档案。
      en: Parent passes SKU-991 license review prompt to explore subagent, excluding full customer profile.
      ja: Parent が explore subagent へ SKU-991 license review prompt を渡し full customer profile を除外。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task tool
    field_values:
      target_subagent_binding_ref: SubagentRole:explore-9
      parent_context_ref: delegation-context-parent@2
    related_node_ids:
      - SubagentContext
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-design
  - id: SubagentContext-example-langgraph-subgraph
    labels:
      zh: LangGraph 子图隔离
      en: LangGraph subgraph isolation
      ja: LangGraph subgraph isolation
    descriptions:
      zh: LangGraph 向 billing subgraph 传递 state slice，不含 triage 内部 tool 调用历史。
      en: LangGraph passes state slice to billing subgraph without triage internal tool-call history.
      ja: LangGraph が billing subgraph へ state slice を渡し triage internal tool history を含まない。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: subgraph isolation
    field_values:
      target_subagent_binding_ref: SubagentRole:billing-subgraph
      parent_context_ref: delegation-context-triage@1
    related_node_ids:
      - SubagentContext
      - ContextIsolation
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-design
  - id: SubagentContext-example-crewai-local
    labels:
      zh: CrewAI 本地 worker 上下文
      en: CrewAI local worker context
      ja: CrewAI local worker context
    descriptions:
      zh: Manager 向 researcher 传递 task.context，仅含 research brief。
      en: Manager passes task.context to researcher containing research brief only.
      ja: Manager が researcher へ research brief のみの task.context を渡す。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: task.context
    field_values:
      target_subagent_binding_ref: WorkerRole:researcher-1
      parent_context_ref: delegation-context-manager@1
    related_node_ids:
      - SubagentContext
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-design
  - id: SubagentContext-example-boundary-a2a
    labels:
      zh: A2A 远程不是 SubagentContext
      en: A2A remote is not SubagentContext
      ja: A2A remote は SubagentContext ではない
    descriptions:
      zh: A2A 远程 billing agent 接收 TaskSendParams，属于 DelegationContext 而非本地 SubagentContext。
      en: Remote A2A billing agent receiving TaskSendParams is DelegationContext, not local SubagentContext.
      ja: Remote A2A billing agent の TaskSendParams は DelegationContext で SubagentContext ではありません。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: boundary
    field_values: {}
    related_node_ids:
      - SubagentContext
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-subagent-context-design
parent_relation:
  id: SubagentContext-is_a-DelegationContext
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 子智能体上下文是接收方为本地子智能体的委派上下文，并继承其引用与排除边界。
    en: Subagent context is delegation context whose recipient is a local subagent and which inherits its reference and exclusion boundary.
    ja: サブエージェントコンテキストは受領者がローカルサブエージェントであり、参照・除外境界を継承する委任コンテキストです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-subagent-context-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-subagent-context-design
    source: delegation-handoff-design
    supports: SubagentContext is local subagent projection of DelegationContext.
    locator: SubagentContext boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-subagent-context-design
    source: cursor-task-tool
    supports: Cursor Task prompt and subagent_type map to SubagentContext.
    locator: Task tool
    evidence_kind: design-inference
    confidence: high
  - id: claim-subagent-context-design
    source: langgraph
    supports: LangGraph subgraph isolation maps to SubagentContext with fresh context.
    locator: Subgraph handoffs
    evidence_kind: design-inference
    confidence: high
  - id: claim-subagent-context-design
    source: crewai
    supports: CrewAI task.context to local worker maps to SubagentContext.
    locator: Task.context
    evidence_kind: design-inference
    confidence: high
