      zh: 该对象不得被归为 SubagentContext，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as SubagentContext or acquire missing conditions from nearby facts.
      ja: この対象を SubagentContext に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除远程 A2A 受派方上下文、父代理完整隐藏状态和仅供工具调用的参数对象。
      en: "The case violates this reviewed exclusion boundary: Excludes remote A2A delegate context, the parent's full hidden state, and parameter objects used only for tool invocation."
      ja: この例は審査済み除外境界に反します：遠隔 A2A 受任者コンテキスト、親代理の完全な隠れ状態、ツール呼出し専用パラメータを除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-subagent-context-008
