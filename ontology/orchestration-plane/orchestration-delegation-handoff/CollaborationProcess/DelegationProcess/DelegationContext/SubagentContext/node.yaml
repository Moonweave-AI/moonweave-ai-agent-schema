schema: moonweave.ai/ontology-node/v1
id: SubagentContext
kind: concept
status: review
labels:
  zh: 子智能体上下文
  en: subagent context
  ja: サブエージェントコンテキスト
semantics:
  short_definition:
    zh: 子智能体上下文是目标受派方为本地子智能体时使用的委派上下文。
    en: Subagent context is delegation context whose receiving delegate is a locally invoked subagent.
    ja: サブエージェントコンテキストは、受任者がローカルに呼び出されるサブエージェントである委任コンテキストです。
  definition:
    zh: 子智能体上下文是目标受派方为本地子智能体时使用的委派上下文。 它继承委派上下文的边界和引用规则，并可仅包含父代理选出的消息、摘要和工作说明。
    en: Subagent context is delegation context whose receiving delegate is a locally invoked subagent. It inherits delegation-context boundaries and references and may contain only messages, summaries, and work instructions selected by the parent agent.
    ja: サブエージェントコンテキストは、受任者がローカルに呼び出されるサブエージェントである委任コンテキストです。 委任コンテキストの境界と参照規則を継承し、親代理が選んだメッセージ、要約、作業指示だけを含められます。
  why_needed:
    zh: 该下位概念说明子智能体调用仍需上下文隔离，且不等于复制父代理全部会话。
    en: The subtype makes clear that subagent invocation still requires context isolation and does not imply copying the parent's full conversation.
    ja: サブエージェント呼出しにもコンテキスト隔離が必要で、親代理の全会話複製を意味しないことを示します。
  includes:
    - zh: 纳入为一个本地子智能体委派构造、遵循允许和排除引用集合的上下文。
      en: Includes context assembled for one local subagent delegation under allowed and excluded reference sets.
      ja: 一件のローカルサブエージェント委任向けに許可・除外参照集合に従って構成されたコンテキストを含みます。
  excludes:
    - zh: 排除远程 A2A 受派方上下文、父代理完整隐藏状态和仅供工具调用的参数对象。
      en: Excludes remote A2A delegate context, the parent's full hidden state, and parameter objects used only for tool invocation.
      ja: 遠隔 A2A 受任者コンテキスト、親代理の完全な隠れ状態、ツール呼出し専用パラメータを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: target_subagent_binding_ref
      labels:
        zh: 目标子智能体绑定引用
        en: target subagent-binding reference
        ja: 対象サブエージェント binding 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收该上下文的 SubagentRole 有效绑定，而不是只写代理名称或角色类别。
        en: References the effective SubagentRole binding that actually receives the context rather than a bare agent name or role class.
        ja: context を実際に受け取る SubagentRole の有効 binding を参照し、agent 名や role class だけでは表しません。
      allowed_values: []
      pattern: null
      example_value: actor-role-binding-legal-review-9
      source_claims:
        - claim-subagent-context-002
    - id: parent_context_ref
      labels:
        zh: 父上下文引用
        en: parent-context reference
        ja: 親 context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生本投影视图的上级 DelegationContext 修订，以便核验哪些信息被保留、变换或排除。
        en: References the parent DelegationContext revision from which this projection was derived so retained, transformed, and excluded information can be audited.
        ja: この projection の元となる上位 DelegationContext revision を参照し、保持・変換・除外情報を監査可能にします。
      allowed_values: []
      pattern: null
      example_value: delegation-context-license-review@4
      source_claims:
        - claim-subagent-context-003
    - id: projection_policy_ref
      labels:
        zh: 投影策略引用
        en: projection-policy reference
        ja: 投影方針参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用决定父上下文中哪些消息、来源、工具和敏感字段可进入子智能体视图的版本化策略。
        en: References the versioned policy deciding which parent messages, sources, tools, and sensitive fields enter the subagent view.
        ja: 親 context の message・source・tool・sensitive field のどれを subagent view に含めるか決める版付き方針を参照します。
      allowed_values: []
      pattern: null
      example_value: subagent-context-projection-legal-readonly@3
      source_claims:
        - claim-subagent-context-004
    - id: return_channel_ref
      labels:
        zh: 返回通道引用
        en: return-channel reference
        ja: 返却チャネル参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用子智能体必须用于返回结果、证据、警告或阻塞状态的受控通道。
        en: References the controlled channel through which the subagent must return results, evidence, warnings, or blocked status.
        ja: subagent が結果・証拠・警告・blocked 状態を返すための制御済み channel を参照します。
      allowed_values: []
      pattern: null
      example_value: return-channel-supervisor-legal-review-9
      source_claims:
        - claim-subagent-context-005
    - id: context_expiry_at
      labels:
        zh: 上下文失效时刻
        en: context expires at
        ja: context 失効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定子智能体不得再读取或使用该投影视图的最晚时刻，避免委派结束后继续暴露上下文。
        en: Specifies the latest time the subagent may read or use the projected view so context does not remain exposed after the delegation boundary.
        ja: 委任境界後も context が露出し続けないよう、subagent が投影视図を読取・使用できる最終時刻を規定します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:30:00Z
      source_claims:
        - claim-subagent-context-006
  constraints: []
  required_relation_constraints: []
