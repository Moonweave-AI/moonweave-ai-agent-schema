  - id: SubagentContext-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 子智能体上下文边界例
      en: Boundary subagent context case
      ja: サブエージェントコンテキストの境界例
    scenario_id: null
    descriptions:
      zh: 父代理把同一结构化参数传给一个数据库工具；目标是工具而非子智能体，因此不是 SubagentContext。
      en: A parent passes the same structured parameters to a database tool; because the receiver is a tool rather than a subagent, this is not SubagentContext.
      ja: 同じ構造化パラメータをデータベースツールへ渡す場合、受信者がサブエージェントでないため SubagentContext ではありません。
    field_values: {}
    related_node_ids:
