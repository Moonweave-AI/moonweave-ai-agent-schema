schema: moonweave.ai/ontology-node/v1
id: DelegationContext
kind: concept
labels:
  zh: 委派上下文
  en: delegation context
  ja: 委任コンテキスト
semantics:
  short_definition:
    zh: 依据隔离规范实际交付给受派方的有界信息集合记录。
    en: Record of the bounded information set actually delivered to a delegate under an isolation specification.
    ja: isolation specification に基づき delegate へ実際に渡された bounded information set の record。
  definition:
    zh: DelegationContext 以 context_id、version、content_digest 与 allowed/excluded_reference_ids 标识一次实际交付的上下文快照。Cursor Task 的 prompt 字段、A2A TaskSendParams.message、CrewAI task.context 与 LangGraph 传入子图的 state slice 均投影为此记录；ContextIsolation 规范声明允许范围，DelegationContext 证明实际交付集合。它不是消息仓库本身，也不是 DelegationResult。
    en: DelegationContext is identified by context_id, version, content_digest, and allowed/excluded_reference_ids as a snapshot of information actually delivered. Cursor Task prompt field, A2A TaskSendParams.message, CrewAI task.context, and LangGraph state slices passed to subgraphs project here; ContextIsolation specifies permitted scope while DelegationContext proves the delivered set. It is neither the message store nor DelegationResult.
    ja: DelegationContext は context_id/version/content_digest/allowed/excluded_reference_ids で実際 delivery snapshot を識別します。Cursor Task prompt、A2A TaskSendParams.message、CrewAI task.context、LangGraph subgraph state slice が写像されます。
  why_needed:
    zh: 证明受派方在某次委派中实际获得了哪些上下文，而不只是政策允许什么。
    en: Proves what context a delegate actually received in one delegation, not merely what policy allowed.
    ja: 一件の委任で delegate が実際に受け取った context を policy 許可範囲と分離して証明します。
  includes:
    - zh: 纳入与一个委派 ID 和隔离规范一致、可由摘要和引用集合重建的上下文记录。
      en: Includes context records tied to one delegation ID and isolation specification and reconstructable from digest and reference sets.
      ja: 一件の委任 ID と隔離仕様に結び付き、ダイジェストと参照集合から再構成できるコンテキスト記録を含みます。
  excludes:
    - zh: 排除原始消息仓库、允许/拒绝规则本身和没有受派方范围的全局会话状态。
      en: Excludes the source message store, allow/deny rules themselves, and global conversation state with no delegate boundary.
      ja: 元メッセージストア、許可・拒否規則そのもの、受任境界を持たない全体会話状態を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成时从 Cursor Task prompt、A2A message parts、CrewAI Task.context dict、LangGraph Command update payload 构造 DelegationContext，并对 allowed_reference_ids 做 digest。OpenAI handoff input_filter 输出也应投影为受控引用集合。变更成员必须 bump version。
    en: Construct DelegationContext from Cursor Task prompt, A2A message parts, CrewAI Task.context dict, and LangGraph Command update payload with digest over allowed_reference_ids. OpenAI handoff input_filter output should also project to a controlled reference set. Membership changes require version bump.
    ja: Cursor Task prompt、A2A message parts、CrewAI Task.context、LangGraph Command update から DelegationContext を構成し version bump 規則を適用します。
  typical_input:
    - description: Cursor Task prompt as delegation context.
      format: Task(prompt="Investigate order 884 refund policy; exclude full card numbers.")
      source_claims:
        - claim-delegation-context-design
    - description: A2A TaskSendParams message.
      format: '{ "message": { "role": "user", "parts": [{"kind":"text","text":"..."}] } }'
      source_claims:
        - claim-delegation-context-design
  typical_output:
    - description: Moonweave DelegationContext record.
      format: '{"context_id":"delegation-context-001","version":"1","content_digest":"sha256:..."}'
      source_claims:
        - claim-delegation-context-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - context_id
    - version
  fields:
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份实际交付给受派方的有界上下文记录。
        en: Stably identifies one bounded context record actually delivered to a delegate.
        ja: 受任者へ実際に渡された一つの範囲付きコンテキスト記録を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-context-001
      source_claims:
        - claim-delegation-context-design
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一上下文记录的不可变内容版本；成员变化必须产生新版本。
        en: Identifies an immutable content version of the context record; changing membership requires a new version.
        ja: 同じコンテキスト記録の不変内容版を識別し、構成変更には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-delegation-context-design
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用接收该有界信息集合的委派契约或过程。
        en: References the delegation contract or process that receives this bounded information set.
        ja: この範囲付き情報集合を受け取る委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-delegation-context-design
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存规范化上下文内容与成员顺序的加密摘要，用于核验实际交付集合未被替换。
        en: Stores a cryptographic digest of normalized context content and membership order so the delivered set can be verified unchanged.
        ja: 正規化した内容と構成順序の暗号学的ダイジェストを保持し、渡した集合の不変性を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:delegation-context-001
      source_claims:
        - claim-delegation-context-design
    - id: allowed_reference_ids
      labels:
        zh: 允许引用
        en: allowed references
        ja: 許可参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本版本上下文实际纳入并允许受派方解析的信息节点引用。
        en: Lists information-node references actually included in this version and permitted for delegate resolution.
        ja: この版に実際に含め、受任者が解決してよい情報ノード参照を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:spec
      source_claims:
        - claim-delegation-context-design
    - id: excluded_reference_ids
      labels:
        zh: 排除引用
        en: excluded references
        ja: 除外参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 记录经候选上下文审查后被明确排除的引用，以证明披露边界。
        en: Records references explicitly excluded after candidate-context review so the disclosure boundary is auditable.
        ja: 候補コンテキスト審査後に明示的に除外した参照を記録し、開示境界を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:secret
      source_claims:
        - claim-delegation-context-design
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变上下文版本完成组装并可交付的 UTC 时刻。
        en: Records the UTC instant at which this immutable context version finished assembly and became deliverable.
        ja: この不変コンテキスト版の組立が完了し、引渡し可能になった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:00:00Z
      source_claims:
        - claim-delegation-context-design
  constraints:
    - id: delegation-context-immutable-version
      severity: error
      expression_language: plain
      expression: context_id + version identifies immutable content_digest and reference membership
      explanations:
        zh: 同一上下文版本的摘要和成员不可原地改变。
        en: A delegation-context version is immutable.
        ja: 同一委任コンテキスト版は不変です。
      source_claims:
        - claim-delegation-context-design
  required_relation_constraints:
    - id: context-part-of-process
      direction: incoming
      predicate: has_context
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationContext 必须通过 has_context 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationContext must preserve its instance-level has_context constraint with DelegationProcess.
        ja: DelegationContext は DelegationProcess とのインスタンスレベル has_context 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-context-design
examples:
  - id: DelegationContext-example-cursor-prompt
    labels:
      zh: Cursor Task prompt 上下文
      en: Cursor Task prompt context
      ja: Cursor Task prompt context
    descriptions:
      zh: delegation-17 的 context 引用订单 42 与客户同意，排除完整卡号。
      en: Context for delegation-17 references order 42 and customer consent, excluding full card number.
      ja: delegation-17 context が order 42 と customer consent を参照し full card number を除外。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task prompt
    field_values:
      context_id: delegation-context-001
      version: "1"
      delegation_id: DelegationProcess:delegation-17
      content_digest: sha256:ctx-001
      allowed_reference_ids:
        - SourceReference:order-42
    related_node_ids:
      - DelegationContext
      - SubagentContext
    related_relation_ids:
      - DelegationProcess-has_context-DelegationContext
    source_claims:
      - claim-delegation-context-design
  - id: DelegationContext-example-a2a-message
    labels:
      zh: A2A TaskSendParams 上下文
      en: A2A TaskSendParams context
      ja: A2A TaskSendParams context
    descriptions:
      zh: TaskSendParams.message parts 构成远程委派上下文，digest 覆盖规范化 parts 顺序。
      en: TaskSendParams.message parts form remote delegation context; digest covers normalized parts order.
      ja: TaskSendParams.message parts が remote delegation context を構成。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskSendParams
    field_values:
      context_id: delegation-context-a2a-8
      version: "1"
      delegation_id: DelegationProcess:delegation-a2a-8
    related_node_ids:
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-delegation-context-design
  - id: DelegationContext-example-crewai-context
    labels:
      zh: CrewAI task.context
      en: CrewAI task.context
      ja: CrewAI task.context
    descriptions:
      zh: CrewAI Task.context 传递 research brief 给 worker，不含 manager 私有推理。
      en: CrewAI Task.context passes research brief to worker without manager private reasoning.
      ja: CrewAI Task.context が research brief を worker へ渡し manager private reasoning を含まない。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Task.context
    field_values:
      context_id: delegation-context-crew-2
      version: "1"
    related_node_ids:
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-delegation-context-design
  - id: DelegationContext-example-boundary-transcript
    labels:
      zh: 全量会话不是上下文
      en: Full transcript is not context
      ja: full transcript は context ではない
    descriptions:
      zh: 支持会话全量历史在消息库中，但未建立受派方边界与 digest，不是 DelegationContext。
      en: Full support transcript in message store without delegate boundary or digest is not DelegationContext.
      ja: full support transcript に delegate boundary/digest が無ければ DelegationContext ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-delegation-context-design
parent_relation:
  id: DelegationProcess-has_context-DelegationContext
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has context
    en: has context
    ja: has context
  definitions:
    zh: 委派过程以组成关系拥有为该次委派实际构造的委派上下文记录。
    en: A delegation process compositionally contains the delegation-context record assembled for that delegation.
    ja: 委任プロセスは当該委任向けに構成された委任コンテキスト記録を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其上下文
      en: context of
      ja: コンテキストである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-context-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-delegation-context-design
    source: delegation-handoff-design
    supports: DelegationContext records actual delivered bounded information separate from isolation policy.
    locator: DelegationContext boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-context-design
    source: cursor-task-tool
    supports: Cursor Task prompt field maps to DelegationContext for subagent delegation.
    locator: Task tool prompt
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-context-design
    source: a2a-protocol
    supports: A2A TaskSendParams message maps to DelegationContext.
    locator: TaskSendParams
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-context-design
    source: crewai
    supports: CrewAI Task.context maps to DelegationContext.
    locator: Task.context
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-context-design
    source: langgraph
    supports: LangGraph context engineering for handoffs maps to DelegationContext.
    locator: Handoffs context engineering
    evidence_kind: design-inference
    confidence: high
