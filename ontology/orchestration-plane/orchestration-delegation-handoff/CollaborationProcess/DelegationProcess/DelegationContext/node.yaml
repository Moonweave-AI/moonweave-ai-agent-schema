schema: moonweave.ai/ontology-node/v1
id: DelegationContext
kind: concept
labels:
  zh: 委派上下文
  en: delegation context
  ja: 委任コンテキスト
semantics:
  short_definition:
    zh: 依据隔离规范实际交付给受派方的有界上下文记录。
    en: Record of bounded context actually delivered to a delegate.
    ja: 隔離仕様に基づき受任者へ実際に渡された範囲付きコンテキスト記録。
  definition:
    zh: 委派上下文是依据隔离规范实际提供给受派方的有界信息集合记录。 它记录所属委派、内容摘要、允许引用、排除引用和创建时间；正文内容仍驻留在原信息节点中。
    en: Delegation context is a record of the bounded information set actually made available to a delegate under an isolation specification. It records delegation identity, content digest, allowed references, excluded references, and creation time; source content remains in its original information nodes.
    ja: 委任コンテキストは、隔離仕様に基づき受任者へ実際に提供される範囲付き情報集合の記録です。 委任 ID、内容ダイジェスト、許可参照、除外参照、作成時刻を記録し、本文は元の情報ノードに残ります。
  why_needed:
    zh: 该节点证明受派方在某次委派中实际获得了哪些上下文，而不是只知道政策允许什么。
    en: The node proves what context a delegate actually received in one delegation rather than merely what policy allowed.
    ja: 方針上許可された範囲だけでなく、一件の委任で受任者が実際に得たコンテキストを証明します。
  includes:
    - zh: 纳入与一个委派 ID 和隔离规范一致、可由摘要和引用集合重建的上下文记录。
      en: Includes context records tied to one delegation ID and isolation specification and reconstructable from digest and reference sets.
      ja: 一件の委任 ID と隔離仕様に結び付き、ダイジェストと参照集合から再構成できるコンテキスト記録を含みます。
  excludes:
    - zh: 排除原始消息仓库、允许/拒绝规则本身和没有受派方范围的全局会话状态。
      en: Excludes the source message store, allow/deny rules themselves, and global conversation state with no delegate boundary.
      ja: 元メッセージストア、許可・拒否規則そのもの、受任境界を持たない全体会話状態を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationContext 由 ContextIsolation 规约驱动的 redaction pipeline 物化：allowed_refs 与 excluded_refs
      证明 delegate 实际收到的有界集合。OpenAI Agents SDK transfer_to_agent context 应引用 dctx 记录；
      A2A Message 只是传输载体，不是 DelegationContext 存储。
    en: >-
      DelegationContext materializes via a ContextIsolation-driven redaction pipeline: allowed_refs and excluded_refs prove
      the bounded set a delegate actually received. OpenAI Agents SDK transfer_to_agent context should reference dctx records;
      A2A Message is transport only, not DelegationContext storage.
    ja: >-
      DelegationContext は ContextIsolation 駆動 redaction pipeline で materialize される。allowed_refs と excluded_refs が
      delegate が実際に受け取った bounded set を証明する。OpenAI Agents SDK transfer_to_agent context は dctx record を参照すべき。
      A2A Message は transport のみで DelegationContext storage ではない。
  typical_input:
    - description:
        zh: 经隔离规约裁剪后的上下文引用集合。
        en: Context reference set trimmed by isolation specification.
        ja: isolation spec で trim された context reference set。
      format: |-
        {"delegation_context_id":"dctx-884","delegation_process_ref":"deleg-proc-884","isolation_ref":"iso:audit-7@1","allowed_refs":["task-spec-reconcile-7@4","ledger-snapshot@2"],"excluded_refs":["user_pii"],"content_digest":"sha256:abc..."}
  typical_output:
    - description:
        zh: 传递给受派方 Runner 或 A2A 适配器的 DelegationContext 引用包络。
        en: DelegationContext reference envelope passed to delegate Runner or A2A adapter.
        ja: delegate Runner または A2A adapter へ渡す DelegationContext reference envelope。
      format: |-
        {"delegation_context_ref":"dctx-884","handoff_payload_refs":["task-spec-reconcile-7@4","ledger-snapshot@2"],"redaction_applied":true}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents bounded context passed to delegated agents.
    - name: A2A Message
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol message transport separate from delegation context records.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents client requests filtered through local context isolation.
  source_claims:
    - claim-delegation-context-001
    - claim-delegation-context-002
structure:
  identity_keys:
    - context_id
    - version
  fields:
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份实际交付给受派方的有界上下文记录。
        en: Stably identifies one bounded context record actually delivered to a delegate.
        ja: 受任者へ実際に渡された一つの範囲付きコンテキスト記録を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-context-001
      source_claims:
        - claim-delegation-context-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一上下文记录的不可变内容版本；成员变化必须产生新版本。
        en: Identifies an immutable content version of the context record; changing membership requires a new version.
        ja: 同じコンテキスト記録の不変内容版を識別し、構成変更には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-delegation-context-003
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用接收该有界信息集合的委派契约或过程。
        en: References the delegation contract or process that receives this bounded information set.
        ja: この範囲付き情報集合を受け取る委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-delegation-context-004
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存规范化上下文内容与成员顺序的加密摘要，用于核验实际交付集合未被替换。
        en: Stores a cryptographic digest of normalized context content and membership order so the delivered set can be verified unchanged.
        ja: 正規化した内容と構成順序の暗号学的ダイジェストを保持し、渡した集合の不変性を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:delegation-context-001
      source_claims:
        - claim-delegation-context-005
    - id: allowed_reference_ids
      labels:
        zh: 允许引用
        en: allowed references
        ja: 許可参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本版本上下文实际纳入并允许受派方解析的信息节点引用。
        en: Lists information-node references actually included in this version and permitted for delegate resolution.
        ja: この版に実際に含め、受任者が解決してよい情報ノード参照を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:spec
      source_claims:
        - claim-delegation-context-006
    - id: excluded_reference_ids
      labels:
        zh: 排除引用
        en: excluded references
        ja: 除外参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 记录经候选上下文审查后被明确排除的引用，以证明披露边界。
        en: Records references explicitly excluded after candidate-context review so the disclosure boundary is auditable.
        ja: 候補コンテキスト審査後に明示的に除外した参照を記録し、開示境界を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:secret
      source_claims:
        - claim-delegation-context-007
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变上下文版本完成组装并可交付的 UTC 时刻。
        en: Records the UTC instant at which this immutable context version finished assembly and became deliverable.
        ja: この不変コンテキスト版の組立が完了し、引渡し可能になった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:00:00Z
      source_claims:
        - claim-delegation-context-008
  constraints:
    - id: delegation-context-immutable-version
      severity: error
      expression_language: plain
      expression: context_id + version identifies immutable content_digest and reference membership
      explanations:
        zh: 同一上下文版本的摘要和成员不可原地改变。
        en: A delegation-context version is immutable.
        ja: 同一委任コンテキスト版は不変です。
      source_claims:
        - claim-delegation-context-009
  required_relation_constraints:
    - id: context-part-of-process
      direction: incoming
      predicate: has_context
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationContext 必须通过 has_context 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationContext must preserve its instance-level has_context constraint with DelegationProcess.
        ja: DelegationContext は DelegationProcess とのインスタンスレベル has_context 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-context-010
examples:
  - id: DelegationContext-example-positive-manual-2026
    labels:
      zh: DelegationContext positive
      en: DelegationContext positive
      ja: DelegationContext positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 DelegationContext：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps DelegationContext: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が DelegationContext 多 agent 協調に写像。
    field_values: {context_id: delegation-context-001, version: 1, delegation_id: DelegationContract:delegation-001, content_digest: sha256:delegation-context-001}

    related_node_ids:
      - DelegationContext
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_context-DelegationContext
    source_claims:
      - claim-delegation-context-011

  - id: DelegationContext-example-boundary-manual-2026
    labels:
      zh: DelegationContext boundary
      en: DelegationContext boundary
      ja: DelegationContext boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 DelegationContext 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not DelegationContext internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で DelegationContext 内部 spec ではない。
    field_values: {}

    related_node_ids:
      - DelegationContext
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_context-DelegationContext
    source_claims:
      - claim-delegation-context-012

  - id: DelegationContext-example-counterexample-confusable
    labels:
      zh: DelegationContext counterexample
      en: DelegationContext counterexample
      ja: DelegationContext counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 DelegationContext TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style DelegationContext TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 DelegationContext ではない。
    field_values: {delegation_context_id: absent, isolation_policy_ref: absent, scoped_memory_refs: absent}

    related_node_ids:
      - DelegationContext
      - SubagentContext
      - A2AMessage
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-context-011

  - id: DelegationContext-example-instance-concrete
    labels:
      zh: DelegationContext instance
      en: DelegationContext instance
      ja: DelegationContext instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 DelegationContext DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to DelegationContext DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が DelegationContext に写像。
    field_values: {context_id: delegation-context-001, version: 1, delegation_id: DelegationContract:delegation-001, content_digest: sha256:delegation-context-001}

    related_node_ids:
      - DelegationContext
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-context-011

