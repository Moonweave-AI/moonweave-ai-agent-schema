schema: moonweave.ai/ontology-node/v1
id: DelegationContext
kind: concept
status: review
labels:
  zh: 委派上下文
  en: delegation context
  ja: 委任コンテキスト
semantics:
  short_definition:
    zh: 委派上下文是依据隔离规范实际提供给受派方的有界信息集合记录。
    en: Delegation context is a record of the bounded information set actually made available to a delegate under an isolation specification.
    ja: 委任コンテキストは、隔離仕様に基づき受任者へ実際に提供される範囲付き情報集合の記録です。
  definition:
    zh: 委派上下文是依据隔离规范实际提供给受派方的有界信息集合记录。 它记录所属委派、内容摘要、允许引用、排除引用和创建时间；正文内容仍驻留在原信息节点中。
    en: Delegation context is a record of the bounded information set actually made available to a delegate under an isolation specification. It records delegation identity, content digest, allowed references, excluded references, and creation time; source content remains in its original information nodes.
    ja: 委任コンテキストは、隔離仕様に基づき受任者へ実際に提供される範囲付き情報集合の記録です。 委任 ID、内容ダイジェスト、許可参照、除外参照、作成時刻を記録し、本文は元の情報ノードに残ります。
  why_needed:
    zh: 该节点证明受派方在某次委派中实际获得了哪些上下文，而不是只知道政策允许什么。
    en: The node proves what context a delegate actually received in one delegation rather than merely what policy allowed.
    ja: 方針上許可された範囲だけでなく、一件の委任で受任者が実際に得たコンテキストを証明します。
  includes:
    - zh: 纳入与一个委派 ID 和隔离规范一致、可由摘要和引用集合重建的上下文记录。
      en: Includes context records tied to one delegation ID and isolation specification and reconstructable from digest and reference sets.
      ja: 一件の委任 ID と隔離仕様に結び付き、ダイジェストと参照集合から再構成できるコンテキスト記録を含みます。
  excludes:
    - zh: 排除原始消息仓库、允许/拒绝规则本身和没有受派方范围的全局会话状态。
      en: Excludes the source message store, allow/deny rules themselves, and global conversation state with no delegate boundary.
      ja: 元メッセージストア、許可・拒否規則そのもの、受任境界を持たない全体会話状態を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - context_id
    - version
  fields:
    - id: context_id
      labels:
        zh: 上下文 ID
        en: context ID
        ja: コンテキスト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份实际交付给受派方的有界上下文记录。
        en: Stably identifies one bounded context record actually delivered to a delegate.
        ja: 受任者へ実際に渡された一つの範囲付きコンテキスト記録を安定して識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-context-001
      source_claims:
        - claim-delegation-context-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一上下文记录的不可变内容版本；成员变化必须产生新版本。
        en: Identifies an immutable content version of the context record; changing membership requires a new version.
        ja: 同じコンテキスト記録の不変内容版を識別し、構成変更には新しい版を必要とします。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: "1"
      source_claims:
        - claim-delegation-context-003
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用接收该有界信息集合的委派契约或过程。
        en: References the delegation contract or process that receives this bounded information set.
        ja: この範囲付き情報集合を受け取る委任契約またはプロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-delegation-context-004
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存规范化上下文内容与成员顺序的加密摘要，用于核验实际交付集合未被替换。
        en: Stores a cryptographic digest of normalized context content and membership order so the delivered set can be verified unchanged.
        ja: 正規化した内容と構成順序の暗号学的ダイジェストを保持し、渡した集合の不変性を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:delegation-context-001
      source_claims:
        - claim-delegation-context-005
    - id: allowed_reference_ids
      labels:
        zh: 允许引用
        en: allowed references
        ja: 許可参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本版本上下文实际纳入并允许受派方解析的信息节点引用。
        en: Lists information-node references actually included in this version and permitted for delegate resolution.
        ja: この版に実際に含め、受任者が解決してよい情報ノード参照を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:spec
      source_claims:
        - claim-delegation-context-006
    - id: excluded_reference_ids
      labels:
        zh: 排除引用
        en: excluded references
        ja: 除外参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 记录经候选上下文审查后被明确排除的引用，以证明披露边界。
        en: Records references explicitly excluded after candidate-context review so the disclosure boundary is auditable.
        ja: 候補コンテキスト審査後に明示的に除外した参照を記録し、開示境界を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        - SourceReference:secret
      source_claims:
        - claim-delegation-context-007
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变上下文版本完成组装并可交付的 UTC 时刻。
        en: Records the UTC instant at which this immutable context version finished assembly and became deliverable.
        ja: この不変コンテキスト版の組立が完了し、引渡し可能になった UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:00:00Z
      source_claims:
        - claim-delegation-context-008
  constraints:
    - id: delegation-context-immutable-version
      severity: error
      expression_language: plain
      expression: context_id + version identifies immutable content_digest and reference membership
      explanations:
        zh: 同一上下文版本的摘要和成员不可原地改变。
        en: A delegation-context version is immutable.
        ja: 同一委任コンテキスト版は不変です。
      source_claims:
        - claim-delegation-context-009
  required_relation_constraints:
    - id: context-part-of-process
      direction: incoming
      predicate: has_context
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationContext 必须通过 has_context 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationContext must preserve its instance-level has_context constraint with DelegationProcess.
        ja: DelegationContext は DelegationProcess とのインスタンスレベル has_context 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-context-010
examples:
  - id: DelegationContext-example-positive-manual-2026
    kind: positive
    labels:
      zh: 委派上下文正例
      en: Positive delegation context case
      ja: 委任コンテキストの正例
    scenario_id: null
    descriptions:
      zh: delegation-17 的上下文记录引用订单 42、客户同意和付款状态，并明确排除完整卡号。
      en: The context record for delegation-17 references order 42, customer consent, and payment status and explicitly excludes the full card number.
      ja: delegation-17 のコンテキスト記録が注文 42、顧客同意、支払状態を参照し、完全なカード番号を明示的に除外します。
    field_values:
      context_id: delegation-context-001
      version: "1"
      delegation_id: DelegationContract:delegation-001
      content_digest: sha256:delegation-context-001
      allowed_reference_ids:
        - SourceReference:spec
      created_at: 2026-07-15T01:00:00Z
    related_node_ids:
      - DelegationContext
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_context-DelegationContext
    expected_result:
      zh: 该记录应被识别为 DelegationContext，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationContext with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationContext として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派上下文是依据隔离规范实际提供给受派方的有界信息集合记录。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Delegation context is a record of the bounded information set actually made available to a delegate under an isolation specification."
      ja: この場面は次の同一性条件を満たします：委任コンテキストは、隔離仕様に基づき受任者へ実際に提供される範囲付き情報集合の記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-context-011
  - id: DelegationContext-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派上下文边界例
      en: Boundary delegation context case
      ja: 委任コンテキストの境界例
    scenario_id: null
    descriptions:
      zh: 整个支持会话历史保存在消息库中，但没有为受派方建立边界或摘要；它不是 DelegationContext。
      en: The full support transcript exists in a message store but no delegate boundary or digest is created; it is not DelegationContext.
      ja: 全サポート履歴がメッセージストアにあっても受任境界やダイジェストがなければ DelegationContext ではありません。
    field_values: {}
    related_node_ids:
      - DelegationContext
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_context-DelegationContext
    expected_result:
      zh: 该对象不得被归为 DelegationContext，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationContext or acquire missing conditions from nearby facts.
      ja: この対象を DelegationContext に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除原始消息仓库、允许/拒绝规则本身和没有受派方范围的全局会话状态。
      en: "The case violates this reviewed exclusion boundary: Excludes the source message store, allow/deny rules themselves, and global conversation state with no delegate boundary."
      ja: この例は審査済み除外境界に反します：元メッセージストア、許可・拒否規則そのもの、受任境界を持たない全体会話状態を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-context-012
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DelegationResult
    shared_parent_concept_id: DelegationProcess
    differentia:
      zh: 正向身份比较：父节点 DelegationProcess：DelegationContext（semantic kind=information，骨架 DelegationProcess-has_context-DelegationContext）；DelegationResult（semantic kind=information，骨架 DelegationProcess-has_result_record-DelegationResult）。双端条件：DelegationContext 条件：“委派上下文是依据隔离规范实际提供给受派方的有界信息集合记录”；DelegationResult 条件：“委派结果记录是受派方针对一个委派过程返回的状态化输出说明”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent DelegationProcess: DelegationContext (semantic kind=information, backbone DelegationProcess-has_context-DelegationContext); DelegationResult (semantic kind=information, backbone DelegationProcess-has_result_record-DelegationResult). Endpoint conditions: DelegationContext condition: “Delegation context is a record of the bounded information set actually made available to a delegate under an isolation specification”; DelegationResult condition: “A delegation result record is a status-bearing account of output returned by the delegate for one delegation process”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 DelegationProcess：DelegationContext（semantic kind=information、バックボーン DelegationProcess-has_context-DelegationContext）；DelegationResult（semantic kind=information、バックボーン DelegationProcess-has_result_record-DelegationResult）。両端条件：DelegationContext の条件：「委任コンテキストは、隔離仕様に基づき受任者へ実際に提供される範囲付き情報集合の記録です」；DelegationResult の条件：「委任結果記録は、一件の委任プロセスについて受任者が返す出力を状態付きで記述する情報記録です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-delegation-context-013
      - claim-delegation-context-014
