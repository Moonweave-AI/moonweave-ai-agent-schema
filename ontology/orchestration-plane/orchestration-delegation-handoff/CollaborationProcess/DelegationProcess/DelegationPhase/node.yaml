schema: moonweave.ai/ontology-node/v1
id: DelegationPhase
kind: concept
labels:
  zh: 委派生命周期状态
  en: delegation lifecycle state
  ja: 委任ライフサイクル状態
semantics:
  short_definition:
    zh: 委派过程在某一时刻的有效生命周期状态类型。
    en: Effective delegation lifecycle state type at a point in the delegation process.
    ja: delegation process 上の一点における effective lifecycle state type。
  definition:
    zh: DelegationPhase 以 phase_code、terminal 与 effective_event_kind 描述委派生命周期状态族。A2A Task 状态 submitted→working→completed/canceled 映射到此族；InitiationPhase、AcceptancePhase、CompletionPhase、RevocationPhase 是固定种差。它是状态类型与约束，不是 DelegationEvent 或 DelegationProcess 本身。
    en: DelegationPhase describes the delegation lifecycle state family via phase_code, terminal, and effective_event_kind. A2A Task states submitted→working→completed/canceled map to this family; InitiationPhase, AcceptancePhase, CompletionPhase, and RevocationPhase are fixed differentia. It is a state type and constraints, not DelegationEvent or DelegationProcess itself.
    ja: DelegationPhase は phase_code/terminal/effective_event_kind で lifecycle state 族を記述します。A2A Task submitted→working→completed/canceled が写像されます。
  why_needed:
    zh: 统一委派生命周期语义，并与 A2A Task 状态、Cursor Task 边界对齐。
    en: Unifies delegation lifecycle semantics and aligns with A2A Task states and Cursor Task boundaries.
    ja: delegation lifecycle semantics を統一し A2A Task state/Cursor Task boundary と整合します。
  includes:
    - zh: 纳入由有效事件建立、对一个委派过程生效且能区分终止与非终止的状态。
      en: Includes states established by an effective event for one delegation process and distinguishable as terminal or non-terminal.
      ja: 一件の委任プロセスについて有効イベントにより成立し、終端か非終端かを区別できる状態を含みます。
  excludes:
    - zh: 排除表示动作的委派事件、表示输出的委派结果，以及用于约束行为的委派契约。
      en: Excludes delegation events as occurrences, delegation results as outputs, and delegation contracts as behavioral specifications.
      ja: 発生事象である委任イベント、出力である委任結果、行動を制約する委任契約を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: DelegationPhase 由 DelegationEvent 链建立，A2A Task 状态 submitted, working, completed, canceled 提供外部对齐证据。禁止无事件原地修改 phase。
    en: DelegationPhase is established by DelegationEvent chains; A2A Task states submitted, working, completed, canceled provide external alignment evidence. Do not mutate phase in place without events.
    ja: DelegationPhase は DelegationEvent chain で成立し A2A Task state submitted, working, completed, canceled が外部整合証拠。
  typical_input:
    - description: A2A Task state alignment.
      format: '{ "status": { "state": "submitted" } }'
      source_claims:
        - claim-delegation-phase-design
  typical_output:
    - description: Moonweave phase record.
      format: '{ "phase_code": "delegation" }'
      source_claims:
        - claim-delegation-phase-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - phase_code
  fields:
    - id: phase_code
      labels:
        zh: 状态代码
        en: state code
        ja: 状態コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识委派生命周期状态的稳定代码。
        en: Identifies the stable code of a delegation lifecycle state.
        ja: 委任ライフサイクル状態の安定コードを識別します。
      allowed_values:
        - id: DelegationPhase-phase_code-initiated
          value: initiated
          labels:
            zh: 已发起
            en: initiated
            ja: 開始済み
          definitions:
            zh: 委派者已经提出有界工作、受派方和适用契约，但受派方尚未确认接受该委派。
            en: The delegator has identified the bounded work, delegate, and applicable contract, but the delegate has not yet accepted the delegation.
            ja: 委任者が範囲付き作業・受任者・適用契約を特定しましたが、受任者はまだ委任を受諾していません。
          source_claims:
            - claim-delegation-phase-design
        - id: DelegationPhase-phase_code-accepted
          value: accepted
          labels:
            zh: 已接受
            en: accepted
            ja: 受諾済み
          definitions:
            zh: 受派方已经在适用契约和权限范围内接受有界工作，委派可以进入实际执行。
            en: The delegate has accepted the bounded work under the applicable contract and authority scope, so delegated execution may proceed.
            ja: 受任者が適用契約と権限範囲の下で範囲付き作業を受諾し、委任された実行へ進める状態です。
          source_claims:
            - claim-delegation-phase-design
        - id: DelegationPhase-phase_code-revoked
          value: revoked
          labels:
            zh: 已撤销
            en: revoked
            ja: 取消済み
          definitions:
            zh: 委派权限在正常完成前被有效撤回，受派方不得再以该委派为依据继续执行工作。
            en: Delegated authority was validly withdrawn before normal completion, and the delegate may no longer continue work under that delegation.
            ja: 通常完了前に委任権限が有効に撤回され、受任者はその委任を根拠に作業を継続できません。
          source_claims:
            - claim-delegation-phase-design
        - id: DelegationPhase-phase_code-completed
          value: completed
          labels:
            zh: 已完成
            en: completed
            ja: 完了済み
          definitions:
            zh: 受派方已经完成约定的有界工作，并记录可核验的结果、完成状态或交付证据。
            en: The delegate has finished the agreed bounded work and recorded a verifiable result, completion state, or delivery evidence.
            ja: 受任者が合意された範囲付き作業を終え、検証可能な結果・完了状態・引渡し証拠を記録しています。
          source_claims:
            - claim-delegation-phase-design
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-phase-design
    - id: terminal
      labels:
        zh: 是否终止
        en: terminal
        ja: 終端
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该状态是否结束委派生命周期。
        en: States whether the lifecycle ends in this state.
        ja: この状態でライフサイクルが終了するかを示します。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-delegation-phase-design
    - id: effective_event_kind
      labels:
        zh: 生效事件种类
        en: effective event kind
        ja: 有効化イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定能够建立该状态的委派事件种类。
        en: States the delegation event kind that can establish the state.
        ja: 当該状態を成立させる委任イベント種別を示します。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-phase-design
  constraints: []
  required_relation_constraints:
    - id: state-belongs-to-process
      direction: outgoing
      predicate: phase_of
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationPhase 必须通过 phase_of 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationPhase must preserve its instance-level phase_of constraint with DelegationProcess.
        ja: DelegationPhase は DelegationProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-phase-design
examples:
  - id: DelegationPhase-example-a2a-lifecycle
    labels:
      zh: A2A 生命周期对齐
      en: A2A lifecycle alignment
      ja: A2A lifecycle 整合
    descriptions:
      zh: A2A Task submitted→working→completed 分别对应 Initiation、Acceptance、Completion 阶段证据。
      en: A2A Task submitted→working→completed align to Initiation, Acceptance, Completion phase evidence.
      ja: A2A submitted→working→completed が各 phase evidence に対応。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskState
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - DelegationPhase
      - AcceptancePhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-phase-design
  - id: DelegationPhase-example-cursor-task
    labels:
      zh: Cursor Task 阶段
      en: Cursor Task phases
      ja: Cursor Task phase
    descriptions:
      zh: Task 启动→执行→返回映射 initiation→acceptance→completion 事件链。
      en: Task launch→execute→return maps initiation→acceptance→completion event chain.
      ja: Task launch→execute→return が event chain に写像。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task lifecycle
    field_values:
      phase_code: initiated
      terminal: false
      effective_event_kind: initiated
    related_node_ids:
      - DelegationPhase
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-phase-design
  - id: DelegationPhase-example-revocation
    labels:
      zh: 撤销阶段
      en: Revocation phase
      ja: revocation phase
    descriptions:
      zh: A2A canceled 或父代理中止 Cursor Task 产生 RevocationPhase 终端状态。
      en: A2A canceled or parent aborting Cursor Task produces RevocationPhase terminal state.
      ja: A2A canceled または Cursor Task abort が RevocationPhase terminal state。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: canceled
    field_values:
      phase_code: revoked
      terminal: true
      effective_event_kind: revoked
    related_node_ids:
      - DelegationPhase
      - RevocationPhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-phase-design
  - id: DelegationPhase-example-boundary-process
    labels:
      zh: 过程不是阶段
      en: Process is not phase
      ja: process は phase ではない
    descriptions:
      zh: DelegationProcess 记录整体协作身份，不能代替 DelegationPhase 状态类型。
      en: DelegationProcess records overall collaboration identity and cannot substitute DelegationPhase state type.
      ja: DelegationProcess は DelegationPhase state type の代替になりません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationPhase
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-phase-design
parent_relation:
  id: DelegationPhase-phase_of-DelegationProcess
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 委派生命周期状态只能作为一个委派过程的状态层存在，并由该过程的事件序列确定。
    en: A delegation lifecycle state exists as the state layer of one delegation process and is determined by that process's ordered events.
    ja: 委任ライフサイクル状態は一件の委任プロセスの状態層として存在し、そのイベント順序で決まります。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有阶段
      en: has phase
      ja: 段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-phase-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-delegation-phase-design
    source: delegation-handoff-design
    supports: DelegationPhase is lifecycle state genus for delegation.
    locator: DelegationPhase boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-phase-design
    source: a2a-protocol
    supports: A2A Task states map to DelegationPhase family.
    locator: TaskState
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-phase-design
    source: cursor-task-tool
    supports: Cursor Task boundaries map to DelegationPhase transitions.
    locator: Task tool
    evidence_kind: design-inference
    confidence: high
