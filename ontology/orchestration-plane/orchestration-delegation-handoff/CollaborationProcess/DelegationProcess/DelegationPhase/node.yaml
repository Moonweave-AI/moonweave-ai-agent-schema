schema: moonweave.ai/ontology-node/v1
id: DelegationPhase
kind: concept
status: review
labels:
  zh: 委派生命周期状态
  en: delegation lifecycle state
  ja: 委任ライフサイクル状態
semantics:
  short_definition:
    zh: 委派生命周期状态是某一委派过程当前所处的可判定业务状态。
    en: A delegation lifecycle state is a decidable business state currently occupied by one delegation process.
    ja: 委任ライフサイクル状態は、一件の委任プロセスが現在占める判定可能な業務状態です。
  definition:
    zh: 委派生命周期状态是某一委派过程当前所处的可判定业务状态。 它由委派事件按顺序建立，可取发起、接受、撤销或完成等状态；它不是持续活动，也不是事件本身。
    en: A delegation lifecycle state is a decidable business state currently occupied by one delegation process. It is established by ordered delegation events and may be initiation, acceptance, revocation, or completion; it is neither an activity nor the event itself.
    ja: 委任ライフサイクル状態は、一件の委任プロセスが現在占める判定可能な業務状態です。 順序付き委任イベントにより成立し、開始、受諾、取消、完了などを取り得ますが、活動でもイベント自体でもありません。
  why_needed:
    zh: 状态层让查询可以回答“现在处于哪里”，而不把 Initiation、Acceptance 等词直接堆在过程节点旁。
    en: The state layer answers where a delegation is now without flattening initiation, acceptance, and related terms beside the process node.
    ja: 状態層は開始や受諾などをプロセス横へ平置きせず、委任が現在どこにあるかを回答可能にします。
  includes:
    - zh: 纳入由有效事件建立、对一个委派过程生效且能区分终止与非终止的状态。
      en: Includes states established by an effective event for one delegation process and distinguishable as terminal or non-terminal.
      ja: 一件の委任プロセスについて有効イベントにより成立し、終端か非終端かを区別できる状態を含みます。
  excludes:
    - zh: 排除表示动作的委派事件、表示输出的委派结果，以及用于约束行为的委派契约。
      en: Excludes delegation events as occurrences, delegation results as outputs, and delegation contracts as behavioral specifications.
      ja: 発生事象である委任イベント、出力である委任結果、行動を制約する委任契約を除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys:
    - phase_code
  fields:
    - id: phase_code
      labels:
        zh: 状态代码
        en: state code
        ja: 状態コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识委派生命周期状态的稳定代码。
        en: Identifies the stable code of a delegation lifecycle state.
        ja: 委任ライフサイクル状態の安定コードを識別します。
      allowed_values:
        - id: DelegationPhase-phase_code-initiated
          value: initiated
          labels:
            zh: 已发起
            en: initiated
            ja: 開始済み
          definitions:
            zh: 委派者已经提出有界工作、受派方和适用契约，但受派方尚未确认接受该委派。
            en: The delegator has identified the bounded work, delegate, and applicable contract, but the delegate has not yet accepted the delegation.
            ja: 委任者が範囲付き作業・受任者・適用契約を特定しましたが、受任者はまだ委任を受諾していません。
          status: accepted
          source_claims:
            - claim-delegation-phase-002
        - id: DelegationPhase-phase_code-accepted
          value: accepted
          labels:
            zh: 已接受
            en: accepted
            ja: 受諾済み
          definitions:
            zh: 受派方已经在适用契约和权限范围内接受有界工作，委派可以进入实际执行。
            en: The delegate has accepted the bounded work under the applicable contract and authority scope, so delegated execution may proceed.
            ja: 受任者が適用契約と権限範囲の下で範囲付き作業を受諾し、委任された実行へ進める状態です。
          status: accepted
          source_claims:
            - claim-delegation-phase-003
        - id: DelegationPhase-phase_code-revoked
          value: revoked
          labels:
            zh: 已撤销
            en: revoked
            ja: 取消済み
          definitions:
            zh: 委派权限在正常完成前被有效撤回，受派方不得再以该委派为依据继续执行工作。
            en: Delegated authority was validly withdrawn before normal completion, and the delegate may no longer continue work under that delegation.
            ja: 通常完了前に委任権限が有効に撤回され、受任者はその委任を根拠に作業を継続できません。
          status: accepted
          source_claims:
            - claim-delegation-phase-004
        - id: DelegationPhase-phase_code-completed
          value: completed
          labels:
            zh: 已完成
            en: completed
            ja: 完了済み
          definitions:
            zh: 受派方已经完成约定的有界工作，并记录可核验的结果、完成状态或交付证据。
            en: The delegate has finished the agreed bounded work and recorded a verifiable result, completion state, or delivery evidence.
            ja: 受任者が合意された範囲付き作業を終え、検証可能な結果・完了状態・引渡し証拠を記録しています。
          status: accepted
          source_claims:
            - claim-delegation-phase-005
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-phase-006
    - id: terminal
      labels:
        zh: 是否终止
        en: terminal
        ja: 終端
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该状态是否结束委派生命周期。
        en: States whether the lifecycle ends in this state.
        ja: この状態でライフサイクルが終了するかを示します。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-delegation-phase-007
    - id: effective_event_kind
      labels:
        zh: 生效事件种类
        en: effective event kind
        ja: 有効化イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定能够建立该状态的委派事件种类。
        en: States the delegation event kind that can establish the state.
        ja: 当該状態を成立させる委任イベント種別を示します。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-phase-008
  constraints: []
  required_relation_constraints:
    - id: state-belongs-to-process
      direction: outgoing
      predicate: phase_of
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationPhase 必须通过 phase_of 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationPhase must preserve its instance-level phase_of constraint with DelegationProcess.
        ja: DelegationPhase は DelegationProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-phase-009
examples:
  - id: DelegationPhase-example-positive-manual-2026
    kind: positive
    labels:
      zh: 委派生命周期状态正例
      en: Positive delegation lifecycle state case
      ja: 委任ライフサイクル状態の正例
    scenario_id: null
    descriptions:
      zh: accepted 事件在序号 2 生效后，委派过程当前状态被判定为 AcceptancePhase。
      en: After an accepted event becomes effective at sequence 2, the delegation process has AcceptancePhase as its current state.
      ja: sequence 2 の accepted イベントが有効になった後、委任プロセスの現在状態は AcceptancePhase と判定されます。
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - DelegationPhase
      - DelegationProcess
    related_relation_ids:
      - DelegationPhase-phase_of-DelegationProcess
    expected_result:
      zh: 该记录应被识别为 DelegationPhase，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationPhase with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationPhase として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派生命周期状态是某一委派过程当前所处的可判定业务状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation lifecycle state is a decidable business state currently occupied by one delegation process."
      ja: この場面は次の同一性条件を満たします：委任ライフサイクル状態は、一件の委任プロセスが現在占める判定可能な業務状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-phase-010
  - id: DelegationPhase-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派生命周期状态边界例
      en: Boundary delegation lifecycle state case
      ja: 委任ライフサイクル状態の境界例
    scenario_id: null
    descriptions:
      zh: 事件日志包含“accepted”文本但缺少过程 ID、序号和生效时间，不能据此建立委派生命周期状态。
      en: A log line contains the word accepted but lacks process ID, sequence, and effective time, so it cannot establish a delegation lifecycle state.
      ja: ログ行に accepted とあってもプロセス ID、順序、有効時刻がない場合、委任ライフサイクル状態を成立させられません。
    field_values: {}
    related_node_ids:
      - DelegationPhase
      - DelegationProcess
    related_relation_ids:
      - DelegationPhase-phase_of-DelegationProcess
    expected_result:
      zh: 该对象不得被归为 DelegationPhase，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationPhase or acquire missing conditions from nearby facts.
      ja: この対象を DelegationPhase に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除表示动作的委派事件、表示输出的委派结果，以及用于约束行为的委派契约。
      en: "The case violates this reviewed exclusion boundary: Excludes delegation events as occurrences, delegation results as outputs, and delegation contracts as behavioral specifications."
      ja: この例は審査済み除外境界に反します：発生事象である委任イベント、出力である委任結果、行動を制約する委任契約を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-phase-011
