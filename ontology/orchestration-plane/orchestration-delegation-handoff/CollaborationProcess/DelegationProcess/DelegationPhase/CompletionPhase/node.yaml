schema: moonweave.ai/ontology-node/v1
id: CompletionPhase
kind: concept
labels:
  zh: 完成状态
  en: completion state
  ja: 完了状態
semantics:
  short_definition:
    zh: 受派方已完成委派工作并返回结果的生命周期终端状态。
    en: Terminal lifecycle state where the delegate completed delegated work and returned a result.
    ja: delegate が delegated work を完了し result を返した terminal lifecycle state。
  definition:
    zh: CompletionPhase 固定 phase_code=completed、terminal=true、effective_event_kind=completed。A2A Task completed 与 artifact、Cursor Task 成功返回、CrewAI task 完成并 output 回传，均映射为 CompletionPhase，并应关联 DelegationResult。
    en: CompletionPhase fixes phase_code=completed, terminal=true, effective_event_kind=completed. A2A Task completed with artifact, Cursor Task successful return, and CrewAI task completion with output map to CompletionPhase and should link DelegationResult.
    ja: CompletionPhase は terminal completed。A2A completed+artifact/Cursor Task 成功/CrewAI task output が写像。
  why_needed:
    zh: 明确委派工作已结束且结果可审计。
    en: Clarifies delegated work ended with auditable result.
    ja: delegated work 終了と auditable result を明確化。
  includes:
    - zh: 纳入完成条件已满足、结果已返回且责任归属已按契约处理的委派。
      en: Includes delegations whose completion criteria are met, result returned, and responsibility disposition handled by contract.
      ja: 完了条件が満たされ、結果が返却され、責任帰属が契約どおり処理された委任を含みます。
  excludes:
    - zh: 排除仍等待验收的输出、被撤销的委派和因失败停止但未满足完成条件的运行。
      en: Excludes outputs awaiting acceptance, revoked delegations, and failed runs that stopped without meeting completion conditions.
      ja: 受入れ待ち出力、取消済み委任、完了条件未達のまま停止した失敗実行を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: CompletionPhase 由 DelegationEvent 链建立，A2A Task 状态 completed 提供外部对齐证据。禁止无事件原地修改 phase。
    en: CompletionPhase is established by DelegationEvent chains; A2A Task states completed provide external alignment evidence. Do not mutate phase in place without events.
    ja: CompletionPhase は DelegationEvent chain で成立し A2A Task state completed が外部整合証拠。
  typical_input:
    - description: A2A Task state alignment.
      format: '{ "status": { "state": "completed" } }'
      source_claims:
        - claim-completion-phase-design
  typical_output:
    - description: Moonweave phase record.
      format: '{ "phase_code": "completion" }'
      source_claims:
        - claim-completion-phase-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: completion-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "completed" and terminal == true and effective_event_kind == "completed"
      explanations:
        zh: 完成状态只能由带有可核验结果或交付证据的完成事件建立，并终止该委派生命周期。
        en: CompletionPhase is established only by a completion event carrying verifiable result or delivery evidence and terminates the delegation lifecycle.
        ja: CompletionPhase は検証可能な結果または引渡し証拠を持つ completion event のみで成立し、委任ライフサイクルを終了します。
      source_claims:
        - claim-completion-phase-design
  required_relation_constraints: []
examples:
  - id: CompletionPhase-example-a2a-completed
    labels:
      zh: A2A completed
      en: A2A completed
      ja: A2A completed
    descriptions:
      zh: 远程 agent 返回 completed 与 refund 决策 artifact。
      en: Remote agent returns completed with refund decision artifact.
      ja: Remote agent completed + refund artifact。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: completed
    field_values:
      phase_code: completed
      terminal: true
      effective_event_kind: completed
    related_node_ids:
      - CompletionPhase
      - DelegationResult
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-design
  - id: CompletionPhase-example-cursor-done
    labels:
      zh: Cursor Task 完成
      en: Cursor Task done
      ja: Cursor Task 完了
    descriptions:
      zh: 子代理返回最终调查报告，父代理记录 completed。
      en: Subagent returns final investigation report; parent records completed.
      ja: Subagent 最終報告返却で completed 記録。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task completion
    field_values:
      phase_code: completed
      terminal: true
      effective_event_kind: completed
    related_node_ids:
      - CompletionPhase
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-design
  - id: CompletionPhase-example-crewai-output
    labels:
      zh: CrewAI task 输出
      en: CrewAI task output
      ja: CrewAI task output
    descriptions:
      zh: Researcher 完成 task 并返回 expected_output。
      en: Researcher completes task and returns expected_output.
      ja: Researcher task 完了で expected_output 返却。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: task output
    field_values:
      phase_code: completed
      terminal: true
      effective_event_kind: completed
    related_node_ids:
      - CompletionPhase
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-design
  - id: CompletionPhase-example-boundary-still-working
    labels:
      zh: working 不是 completed
      en: working is not completed
      ja: working は completed ではない
    descriptions:
      zh: 任务仍在 working 时不能断言 CompletionPhase。
      en: Cannot assert CompletionPhase while task remains working.
      ja: task が working の間 CompletionPhase 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - CompletionPhase
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-design
parent_relation:
  id: CompletionPhase-is_a-DelegationPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 完成状态是契约完成条件已满足且责任已返还或确认的终止型委派生命周期状态。
    en: Completion state is the terminal delegation lifecycle state after contract completion terms are satisfied and responsibility is returned or acknowledged.
    ja: 完了状態は契約完了条件が満たされ責任が返却または確認された終端型委任ライフサイクル状態です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-completion-phase-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
