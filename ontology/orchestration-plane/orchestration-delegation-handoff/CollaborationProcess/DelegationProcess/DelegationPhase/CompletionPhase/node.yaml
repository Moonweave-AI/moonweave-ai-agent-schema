schema: moonweave.ai/ontology-node/v1
id: CompletionPhase
kind: concept
labels:
  zh: 完成状态
  en: completion state
  ja: 完了状態
semantics:
  short_definition:
    zh: 契约完成条件满足且责任已回收或确认的终止生命周期状态。
    en: Terminal lifecycle state after contracted work is finished and acknowledged.
    ja: 契約完了条件が満たされ責任が返却または確認された終端ライフサイクル状態。
  definition:
    zh: 完成状态是委派工作已满足契约完成条件并完成责任回收或确认的终止型生命周期状态。 它要求完成事件引用委派结果和验收依据；仅生成中间输出不足以结束委派。
    en: Completion state is a terminal delegation lifecycle state in which contracted completion conditions are satisfied and responsibility has been returned or acknowledged. It requires a completion event that cites the delegation result and acceptance basis; producing an intermediate output alone does not end delegation.
    ja: 完了状態は、契約の完了条件が満たされ、責任が返却または確認された終端型委任ライフサイクル状態です。 委任結果と受入根拠を参照する完了イベントを必要とし、中間出力の生成だけでは委任を終了しません。
  why_needed:
    zh: 该状态把结果产生、结果验收和委派生命周期终止明确串联。
    en: The state explicitly connects result production, result acceptance, and termination of the delegation lifecycle.
    ja: 結果生成、結果受入れ、委任ライフサイクル終了を明示的に結び付けます。
  includes:
    - zh: 纳入完成条件已满足、结果已返回且责任归属已按契约处理的委派。
      en: Includes delegations whose completion criteria are met, result returned, and responsibility disposition handled by contract.
      ja: 完了条件が満たされ、結果が返却され、責任帰属が契約どおり処理された委任を含みます。
  excludes:
    - zh: 排除仍等待验收的输出、被撤销的委派和因失败停止但未满足完成条件的运行。
      en: Excludes outputs awaiting acceptance, revoked delegations, and failed runs that stopped without meeting completion conditions.
      ja: 受入れ待ち出力、取消済み委任、完了条件未達のまま停止した失敗実行を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      CompletionPhase 在 DelegationEvent(event_kind=completion) 与 DelegationResult 对齐后成立：委派过程
      达到终止成功态。A2A TASK_STATE_COMPLETED 经适配器映射；CompletionPhase 由本地事件 fold 得到，
      不是 Task status 字段的直接别名。
    en: >-
      CompletionPhase holds when DelegationEvent(event_kind=completion) aligns with DelegationResult: delegation process
      reaches terminal success. A2A TASK_STATE_COMPLETED maps via adapter; CompletionPhase is folded from local events, not a
      direct alias of Task status field.
    ja: >-
      CompletionPhase は DelegationEvent(event_kind=completion) が DelegationResult と aligned した後に成立する。
      delegation process が terminal success に達する。A2A TASK_STATE_COMPLETED は adapter 経由で map される。
      CompletionPhase は local event から fold され Task status field の direct alias ではない。
  typical_input:
    - description:
        zh: 完成事件与委派结果记录引用。
        en: Completion event and delegation result record reference.
        ja: completion event と delegation result record reference。
      format: |-
        {"delegation_event_ref":"deleg-event-complete-884","delegation_result_ref":"dresult-884","delegation_process_ref":"deleg-proc-884","result_status":"succeeded","effective_at":"2026-07-16T10:00:00Z"}
  typical_output:
    - description:
        zh: 终止性 CompletionPhase 状态视图。
        en: Terminal CompletionPhase state view.
        ja: terminal CompletionPhase state view。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","current_phase":"CompletionPhase","terminal":true,"since":"2026-07-16T10:00:00Z"}
  reference_implementations:
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents TASK_STATE_COMPLETED as protocol terminal success mappable to completion phase.
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents delegate run completion feeding delegation result records.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents terminal activity states established by completion events.
  source_claims:
    - claim-completion-phase-001
    - claim-completion-phase-002
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: completion-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "completed" and terminal == true and effective_event_kind == "completed"
      explanations:
        zh: 完成状态只能由带有可核验结果或交付证据的完成事件建立，并终止该委派生命周期。
        en: CompletionPhase is established only by a completion event carrying verifiable result or delivery evidence and terminates the delegation lifecycle.
        ja: CompletionPhase は検証可能な結果または引渡し証拠を持つ completion event のみで成立し、委任ライフサイクルを終了します。
      source_claims:
        - claim-completion-phase-002
  required_relation_constraints: []
examples:
  - id: CompletionPhase-example-positive-manual-2026
    labels:
      zh: CompletionPhase positive
      en: CompletionPhase positive
      ja: CompletionPhase positive
    descriptions:
      zh: "A2A Protocol 映射 CompletionPhase：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps CompletionPhase: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol CompletionPhase: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {phase_code: completed, terminal: true, effective_event_kind: completed}

    related_node_ids:
      - CompletionPhase
      - DelegationPhase
    related_relation_ids:
      - CompletionPhase-is_a-DelegationPhase
    source_claims:
      - claim-completion-phase-003

  - id: CompletionPhase-example-boundary-manual-2026
    labels:
      zh: CompletionPhase boundary
      en: CompletionPhase boundary
      ja: CompletionPhase boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 CompletionPhase WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not CompletionPhase WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で CompletionPhase WorkflowStep spec ではない。
    field_values: {}

    related_node_ids:
      - CompletionPhase
      - DelegationPhase
    related_relation_ids:
      - CompletionPhase-is_a-DelegationPhase
    source_claims:
      - claim-completion-phase-004

  - id: CompletionPhase-example-counterexample-confusable
    labels:
      zh: CompletionPhase counterexample
      en: CompletionPhase counterexample
      ja: CompletionPhase counterexample
    descriptions:
      zh: 失败后直接重试而无 reflect(trajectory) 生成 verbal feedback 的路径不是 Reflexion 式 CompletionPhase。
      en: Retry after failure without reflect(trajectory) verbal feedback is not Reflexion-style CompletionPhase.
      ja: reflect なし retry は Reflexion 式 CompletionPhase ではない。
    field_values: {phase_kind: absent, completion_event_ref: absent, a2a_state: TASK_STATE_COMPLETED}

    related_node_ids:
      - CompletionPhase
      - A2ATask
      - DelegationResult
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-003

  - id: CompletionPhase-example-instance-concrete
    labels:
      zh: CompletionPhase instance
      en: CompletionPhase instance
      ja: CompletionPhase instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 CompletionPhase A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to CompletionPhase A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が CompletionPhase A2ATask に写像。
    field_values: {phase_code: completed, terminal: true, effective_event_kind: completed}

    related_node_ids:
      - CompletionPhase
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-completion-phase-003

sources:
  - id: a2a-protocol-specification
    title: Agent2Agent (A2A) Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines agent-to-agent Task lifecycle, messaging, and inter-agent work exchange.
  - id: openai-agents-handoffs
    title: OpenAI Agents SDK - Handoffs and multi-agent orchestration
    url: https://platform.openai.com/docs/guides/agents
    source_type: official-doc
    relevance: Documents handoffs, control transfer, subagent invocation, and multi-agent delegation patterns.
  - id: langgraph-multi-agent
    title: LangGraph multi-agent and subgraph patterns
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Documents subgraph delegation, worker routing, and state isolation in graph workflows.
source_claims:
  - id: claim-completion-phase-001
    source: a2a-protocol-specification
    supports: CompletionPhase core identity and classification criteria align with Agent2Agent (A2A) Protocol Specification definitions for orchestration control structures.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: normative
    confidence: high
  - id: claim-completion-phase-002
    source: openai-agents-handoffs
    supports: CompletionPhase boundary from adjacent orchestration concepts is supported by OpenAI Agents SDK - Handoffs and multi-agent orchestration separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-completion-phase-003
    source: langgraph-multi-agent
    supports: CompletionPhase field or status vocabulary is a Moonweave audit projection informed by LangGraph multi-agent and subgraph patterns.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-completion-phase-004
    source: a2a-protocol-specification
    supports: Moonweave CompletionPhase constraints, examples, or local audit fields for claim claim-completion-phase-004 are design projections informed by Agent2Agent (A2A) Protocol Specification.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: design-inference
    confidence: high