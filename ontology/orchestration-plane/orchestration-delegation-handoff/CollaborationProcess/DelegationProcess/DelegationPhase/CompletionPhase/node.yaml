schema: moonweave.ai/ontology-node/v1
id: CompletionPhase
kind: concept
status: review
labels:
  zh: 完成状态
  en: completion state
  ja: 完了状態
semantics:
  short_definition:
    zh: 完成状态是委派工作已满足契约完成条件并完成责任回收或确认的终止型生命周期状态。
    en: Completion state is a terminal delegation lifecycle state in which contracted completion conditions are satisfied and responsibility has been returned or acknowledged.
    ja: 完了状態は、契約の完了条件が満たされ、責任が返却または確認された終端型委任ライフサイクル状態です。
  definition:
    zh: 完成状态是委派工作已满足契约完成条件并完成责任回收或确认的终止型生命周期状态。 它要求完成事件引用委派结果和验收依据；仅生成中间输出不足以结束委派。
    en: Completion state is a terminal delegation lifecycle state in which contracted completion conditions are satisfied and responsibility has been returned or acknowledged. It requires a completion event that cites the delegation result and acceptance basis; producing an intermediate output alone does not end delegation.
    ja: 完了状態は、契約の完了条件が満たされ、責任が返却または確認された終端型委任ライフサイクル状態です。 委任結果と受入根拠を参照する完了イベントを必要とし、中間出力の生成だけでは委任を終了しません。
  why_needed:
    zh: 该状态把结果产生、结果验收和委派生命周期终止明确串联。
    en: The state explicitly connects result production, result acceptance, and termination of the delegation lifecycle.
    ja: 結果生成、結果受入れ、委任ライフサイクル終了を明示的に結び付けます。
  includes:
    - zh: 纳入完成条件已满足、结果已返回且责任归属已按契约处理的委派。
      en: Includes delegations whose completion criteria are met, result returned, and responsibility disposition handled by contract.
      ja: 完了条件が満たされ、結果が返却され、責任帰属が契約どおり処理された委任を含みます。
  excludes:
    - zh: 排除仍等待验收的输出、被撤销的委派和因失败停止但未满足完成条件的运行。
      en: Excludes outputs awaiting acceptance, revoked delegations, and failed runs that stopped without meeting completion conditions.
      ja: 受入れ待ち出力、取消済み委任、完了条件未達のまま停止した失敗実行を除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: completion-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "completed" and terminal == true and effective_event_kind == "completed"
      explanations:
        zh: 完成状态只能由带有可核验结果或交付证据的完成事件建立，并终止该委派生命周期。
        en: CompletionPhase is established only by a completion event carrying verifiable result or delivery evidence and terminates the delegation lifecycle.
        ja: CompletionPhase は検証可能な結果または引渡し証拠を持つ completion event のみで成立し、委任ライフサイクルを終了します。
      source_claims:
        - claim-completion-phase-002
  required_relation_constraints: []
examples:
  - id: CompletionPhase-example-positive-manual-2026
    kind: positive
    labels:
      zh: 完成状态正例
      en: Positive completion state case
      ja: 完了状態の正例
    scenario_id: null
    descriptions:
      zh: 法规专家返回带证据的报告，协调器验证完成标准并记录 completed 事件和责任回收。
      en: A regulatory specialist returns an evidenced report; the coordinator validates completion criteria and records a completed event and responsibility return.
      ja: 規制専門家が証拠付き報告を返し、調整役が完了基準を検証して completed イベントと責任返却を記録します。
    field_values:
      phase_code: completed
      terminal: true
      effective_event_kind: completed
    related_node_ids:
      - CompletionPhase
      - DelegationPhase
    related_relation_ids:
      - CompletionPhase-is_a-DelegationPhase
    expected_result:
      zh: 该记录应被识别为 CompletionPhase，并保留其字段、边界与上位关系。
      en: The record is accepted as CompletionPhase with its fields, boundary, and parent relation preserved.
      ja: この記録を CompletionPhase として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 完成状态是委派工作已满足契约完成条件并完成责任回收或确认的终止型生命周期状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Completion state is a terminal delegation lifecycle state in which contracted completion conditions are satisfied and responsibility has been returned or acknowledged."
      ja: この場面は次の同一性条件を満たします：完了状態は、契約の完了条件が満たされ、責任が返却または確認された終端型委任ライフサイクル状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-completion-phase-003
  - id: CompletionPhase-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 完成状态边界例
      en: Boundary completion state case
      ja: 完了状態の境界例
    scenario_id: null
    descriptions:
      zh: 专家上传了报告草稿但验收检查失败，委派仍处于接受状态而不是完成状态。
      en: A specialist uploads a draft report but acceptance checks fail; the delegation remains accepted rather than completed.
      ja: 専門家が報告草案をアップロードしても受入検査に失敗した場合、委任は完了ではなく受諾状態のままです。
    field_values: {}
    related_node_ids:
      - CompletionPhase
      - DelegationPhase
    related_relation_ids:
      - CompletionPhase-is_a-DelegationPhase
    expected_result:
      zh: 该对象不得被归为 CompletionPhase，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as CompletionPhase or acquire missing conditions from nearby facts.
      ja: この対象を CompletionPhase に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除仍等待验收的输出、被撤销的委派和因失败停止但未满足完成条件的运行。
      en: "The case violates this reviewed exclusion boundary: Excludes outputs awaiting acceptance, revoked delegations, and failed runs that stopped without meeting completion conditions."
      ja: この例は審査済み除外境界に反します：受入れ待ち出力、取消済み委任、完了条件未達のまま停止した失敗実行を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-completion-phase-004
