schema: moonweave.ai/ontology-node/v1
id: InitiationPhase
kind: concept
labels:
  zh: 发起状态
  en: initiation state
  ja: 開始状態
semantics:
  short_definition:
    zh: 委派请求已送达候选受派方但尚未被接受的生命周期状态。
    en: Lifecycle state after a delegation request reaches a candidate delegate.
    ja: 委任要求が候補受任者へ到達したが未受諾のライフサイクル状態。
  definition:
    zh: 发起状态是委派请求已创建并送达候选受派方、但尚未被接受的委派生命周期状态。 它要求可识别的委派过程、拟议契约和发起事件；仅在内部生成草稿不构成已发起。
    en: Initiation state is the delegation lifecycle state in which a delegation request exists and has reached a candidate delegate but is not yet accepted. It requires an identifiable delegation process, proposed contract, and initiation event; an internal draft alone is not initiated.
    ja: 開始状態は、委任要求が作成され候補受任者へ到達したが、まだ受諾されていない委任ライフサイクル状態です。 識別可能な委任プロセス、提案契約、開始イベントを必要とし、内部草案だけでは開始済みになりません。
  why_needed:
    zh: 该状态区分尚在提议的委派与已经由受派方承担的委派。
    en: The state distinguishes a proposed delegation from one already undertaken by the delegate.
    ja: 提案中の委任と、受任者がすでに引き受けた委任を区別します。
  includes:
    - zh: 纳入委派请求已发送且等待受派方接受、拒绝或超时的状态。
      en: Includes a sent delegation request awaiting acceptance, rejection, or timeout by the delegate.
      ja: 送信済み委任要求が受任者の受諾、拒否、期限切れを待つ状態を含みます。
  excludes:
    - zh: 排除只保存本地草稿的计划状态，也排除已经记录接受事件的委派。
      en: Excludes locally drafted plans and delegations for which an acceptance event is already effective.
      ja: ローカル草案だけの計画状態と、受諾イベントがすでに有効な委任を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      InitiationPhase 在 DelegationEvent(event_kind=initiation) 生效后成立：表示 contract 已送达候选 delegate
      等待 accept/reject。OpenAI Agents SDK handoff 提议对应 initiation；A2A Task submitted 状态可经适配器
      投影，但不替代本地 initiation 事件序列。
    en: >-
      InitiationPhase holds after DelegationEvent(event_kind=initiation) becomes effective: contract reached candidate delegate
      awaiting accept/reject. OpenAI Agents SDK handoff proposal corresponds to initiation; A2A Task submitted may project via
      adapter without replacing local initiation event sequence.
    ja: >-
      InitiationPhase は DelegationEvent(event_kind=initiation) 発効後に成立する。contract が candidate delegate に到達し
      accept/reject を待つ状態。OpenAI Agents SDK handoff proposal が initiation に対応する。A2A Task submitted は adapter
      projection 可能だが local initiation event sequence を置き換えない。
  typical_input:
    - description:
        zh: 发起委派的事件与拟议契约引用。
        en: Delegation initiation event and proposed contract reference.
        ja: delegation initiation event と proposed contract reference。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","delegation_event_ref":"deleg-event-init-884","proposed_contract_ref":"contract:audit-7@2","candidate_delegate_ref":"binding-agent-auditor-3"}
  typical_output:
    - description:
        zh: 处于 InitiationPhase 的委派过程当前状态视图。
        en: Delegation process current-state view in InitiationPhase.
        ja: InitiationPhase にある delegation process current-state view。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","current_phase":"InitiationPhase","awaiting":"acceptance","since":"2026-07-16T09:02:00Z"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents handoff proposals awaiting delegate acceptance.
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents submitted state mappable to initiation phase via adapter.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents lifecycle states inferred from ordered initiation events.
  source_claims:
    - claim-initiation-phase-001
    - claim-initiation-phase-002
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: initiation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "initiated" and terminal == false and effective_event_kind == "initiated"
      explanations:
        zh: 发起状态只能由已发起事件建立，且在接受、撤销或完成前不是终止状态。
        en: InitiationPhase is established only by an initiated event and remains non-terminal until acceptance, revocation, or completion.
        ja: InitiationPhase は initiated event のみで成立し、acceptance・revocation・completion までは非終端です。
      source_claims:
        - claim-initiation-phase-002
  required_relation_constraints: []
examples:
  - id: InitiationPhase-example-positive-manual-2026
    labels:
      zh: InitiationPhase positive
      en: InitiationPhase positive
      ja: InitiationPhase positive
    descriptions:
      zh: A2A Protocol 映射 InitiationPhase：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps InitiationPhase: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol InitiationPhase: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {phase_code: initiated, terminal: false, effective_event_kind: initiated}

    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids:
      - InitiationPhase-is_a-DelegationPhase
    source_claims:
      - claim-initiation-phase-003

  - id: InitiationPhase-example-boundary-manual-2026
    labels:
      zh: InitiationPhase boundary
      en: InitiationPhase boundary
      ja: InitiationPhase boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 InitiationPhase 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not InitiationPhase work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で InitiationPhase work_specification ではない。
    field_values: {}

    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids:
      - InitiationPhase-is_a-DelegationPhase
    source_claims:
      - claim-initiation-phase-004

  - id: InitiationPhase-example-counterexample-confusable
    labels:
      zh: InitiationPhase counterexample
      en: InitiationPhase counterexample
      ja: InitiationPhase counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 InitiationPhase 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style InitiationPhase group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 InitiationPhase ではない。
    field_values: {phase_kind: absent, phase_started_at: absent, contract_status: draft}

    related_node_ids:
      - InitiationPhase
      - DelegationContract
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-003

  - id: InitiationPhase-example-instance-concrete
    labels:
      zh: InitiationPhase instance
      en: InitiationPhase instance
      ja: InitiationPhase instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 InitiationPhase A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to InitiationPhase A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が InitiationPhase A2ATask に写像。
    field_values: {phase_code: initiated, terminal: false, effective_event_kind: initiated}

    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-003

sources:
  - id: a2a-protocol-specification
    title: Agent2Agent (A2A) Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines agent-to-agent Task lifecycle, messaging, and inter-agent work exchange.
  - id: openai-agents-handoffs
    title: OpenAI Agents SDK - Handoffs and multi-agent orchestration
    url: https://platform.openai.com/docs/guides/agents
    source_type: official-doc
    relevance: Documents handoffs, control transfer, subagent invocation, and multi-agent delegation patterns.
  - id: langgraph-multi-agent
    title: LangGraph multi-agent and subgraph patterns
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Documents subgraph delegation, worker routing, and state isolation in graph workflows.
source_claims:
  - id: claim-initiation-phase-001
    source: a2a-protocol-specification
    supports: InitiationPhase core identity and classification criteria align with Agent2Agent (A2A) Protocol Specification definitions for orchestration control structures.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: normative
    confidence: high
  - id: claim-initiation-phase-002
    source: openai-agents-handoffs
    supports: InitiationPhase boundary from adjacent orchestration concepts is supported by OpenAI Agents SDK - Handoffs and multi-agent orchestration separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-initiation-phase-003
    source: langgraph-multi-agent
    supports: InitiationPhase field or status vocabulary is a Moonweave audit projection informed by LangGraph multi-agent and subgraph patterns.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-initiation-phase-004
    source: a2a-protocol-specification
    supports: Moonweave InitiationPhase constraints, examples, or local audit fields for claim claim-initiation-phase-004 are design projections informed by Agent2Agent (A2A) Protocol Specification.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: design-inference
    confidence: high
