schema: moonweave.ai/ontology-node/v1
id: InitiationPhase
kind: concept
labels:
  zh: 发起状态
  en: initiation state
  ja: 開始状態
semantics:
  short_definition:
    zh: 委派请求已送达候选受派方但尚未被接受的生命周期状态。
    en: Lifecycle state where a delegation request reached a candidate delegate but is not yet accepted.
    ja: delegation request が candidate delegate に到達したが未 accept の lifecycle state。
  definition:
    zh: InitiationPhase 固定 phase_code=initiated、terminal=false、effective_event_kind=initiated。A2A Task submitted、Cursor Task 已启动但子代理尚未确认承担、CrewAI task 已分配但未执行，均可能处于 InitiationPhase。仅内部草稿不构成已发起。
    en: InitiationPhase fixes phase_code=initiated, terminal=false, effective_event_kind=initiated. A2A Task submitted, Cursor Task launched but subagent not yet undertaking, and CrewAI task assigned but not executing may be in InitiationPhase. Internal drafts alone are not initiated.
    ja: InitiationPhase は phase_code=initiated/terminal=false/effective_event_kind=initiated を固定。A2A submitted/Cursor Task launched が典型。
  why_needed:
    zh: 区分提议中的委派与受派方已承担的委派。
    en: Distinguishes proposed delegation from delegation already undertaken by the delegate.
    ja: 提案中委任と delegate が引き受けた委任を区別。
  includes:
    - zh: 纳入委派请求已发送且等待受派方接受、拒绝或超时的状态。
      en: Includes a sent delegation request awaiting acceptance, rejection, or timeout by the delegate.
      ja: 送信済み委任要求が受任者の受諾、拒否、期限切れを待つ状態を含みます。
  excludes:
    - zh: 排除只保存本地草稿的计划状态，也排除已经记录接受事件的委派。
      en: Excludes locally drafted plans and delegations for which an acceptance event is already effective.
      ja: ローカル草案だけの計画状態と、受諾イベントがすでに有効な委任を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: InitiationPhase 由 DelegationEvent 链建立，A2A Task 状态 submitted 提供外部对齐证据。禁止无事件原地修改 phase。
    en: InitiationPhase is established by DelegationEvent chains; A2A Task states submitted provide external alignment evidence. Do not mutate phase in place without events.
    ja: InitiationPhase は DelegationEvent chain で成立し A2A Task state submitted が外部整合証拠。
  typical_input:
    - description: A2A Task state alignment.
      format: '{ "status": { "state": "submitted" } }'
      source_claims:
        - claim-initiation-phase-design
  typical_output:
    - description: Moonweave phase record.
      format: '{ "phase_code": "initiated" }'
      source_claims:
        - claim-initiation-phase-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: initiation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "initiated" and terminal == false and effective_event_kind == "initiated"
      explanations:
        zh: 发起状态只能由已发起事件建立，且在接受、撤销或完成前不是终止状态。
        en: InitiationPhase is established only by an initiated event and remains non-terminal until acceptance, revocation, or completion.
        ja: InitiationPhase は initiated event のみで成立し、acceptance・revocation・completion までは非終端です。
      source_claims:
        - claim-initiation-phase-design
  required_relation_constraints: []
examples:
  - id: InitiationPhase-example-a2a-submitted
    labels:
      zh: A2A submitted
      en: A2A submitted
      ja: A2A submitted
    descriptions:
      zh: tasks/send 返回 submitted，等待远程 agent working。
      en: tasks/send returns submitted, awaiting remote agent working.
      ja: tasks/send submitted が remote agent working を待つ。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: submitted
    field_values:
      phase_code: initiated
      terminal: false
      effective_event_kind: initiated
    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-design
  - id: InitiationPhase-example-cursor-launched
    labels:
      zh: Cursor Task 已启动
      en: Cursor Task launched
      ja: Cursor Task launched
    descriptions:
      zh: Task 工具已调用，子代理尚未返回首批结果。
      en: Task tool invoked; subagent has not returned first results.
      ja: Task tool 呼出し済みで subagent 初回結果未返却。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task launch
    field_values:
      phase_code: initiated
      terminal: false
      effective_event_kind: initiated
    related_node_ids:
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-design
  - id: InitiationPhase-example-crewai-assigned
    labels:
      zh: CrewAI 已分配
      en: CrewAI assigned
      ja: CrewAI assigned
    descriptions:
      zh: Manager 已分配 task 给 researcher，kickoff 尚未执行。
      en: Manager assigned task to researcher; kickoff not yet executed.
      ja: Manager が researcher に task 割当済みで kickoff 未実行。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Task assignment
    field_values:
      phase_code: initiated
      terminal: false
      effective_event_kind: initiated
    related_node_ids:
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-design
  - id: InitiationPhase-example-boundary-draft
    labels:
      zh: 草稿不是发起
      en: Draft is not initiation
      ja: draft は initiation ではない
    descriptions:
      zh: 仅本地保存委派计划而无 initiated 事件，不构成 InitiationPhase。
      en: Locally saved delegation plan without initiated event is not InitiationPhase.
      ja: initiated event 無しの local plan は InitiationPhase ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-initiation-phase-design
parent_relation:
  id: InitiationPhase-is_a-DelegationPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 发起状态是委派请求已送达但尚未被接受的委派生命周期状态。
    en: Initiation state is the delegation lifecycle state after a request is delivered and before it is accepted.
    ja: 開始状態は委任要求の到達後、受諾前に成立する委任ライフサイクル状態です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-initiation-phase-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
