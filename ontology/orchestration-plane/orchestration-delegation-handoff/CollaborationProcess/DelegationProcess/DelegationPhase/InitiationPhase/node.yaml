schema: moonweave.ai/ontology-node/v1
id: InitiationPhase
kind: concept
status: review
labels:
  zh: 发起状态
  en: initiation state
  ja: 開始状態
semantics:
  short_definition:
    zh: 发起状态是委派请求已创建并送达候选受派方、但尚未被接受的委派生命周期状态。
    en: Initiation state is the delegation lifecycle state in which a delegation request exists and has reached a candidate delegate but is not yet accepted.
    ja: 開始状態は、委任要求が作成され候補受任者へ到達したが、まだ受諾されていない委任ライフサイクル状態です。
  definition:
    zh: 发起状态是委派请求已创建并送达候选受派方、但尚未被接受的委派生命周期状态。 它要求可识别的委派过程、拟议契约和发起事件；仅在内部生成草稿不构成已发起。
    en: Initiation state is the delegation lifecycle state in which a delegation request exists and has reached a candidate delegate but is not yet accepted. It requires an identifiable delegation process, proposed contract, and initiation event; an internal draft alone is not initiated.
    ja: 開始状態は、委任要求が作成され候補受任者へ到達したが、まだ受諾されていない委任ライフサイクル状態です。 識別可能な委任プロセス、提案契約、開始イベントを必要とし、内部草案だけでは開始済みになりません。
  why_needed:
    zh: 该状态区分尚在提议的委派与已经由受派方承担的委派。
    en: The state distinguishes a proposed delegation from one already undertaken by the delegate.
    ja: 提案中の委任と、受任者がすでに引き受けた委任を区別します。
  includes:
    - zh: 纳入委派请求已发送且等待受派方接受、拒绝或超时的状态。
      en: Includes a sent delegation request awaiting acceptance, rejection, or timeout by the delegate.
      ja: 送信済み委任要求が受任者の受諾、拒否、期限切れを待つ状態を含みます。
  excludes:
    - zh: 排除只保存本地草稿的计划状态，也排除已经记录接受事件的委派。
      en: Excludes locally drafted plans and delegations for which an acceptance event is already effective.
      ja: ローカル草案だけの計画状態と、受諾イベントがすでに有効な委任を除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: initiation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "initiated" and terminal == false and effective_event_kind == "initiated"
      explanations:
        zh: 发起状态只能由已发起事件建立，且在接受、撤销或完成前不是终止状态。
        en: InitiationPhase is established only by an initiated event and remains non-terminal until acceptance, revocation, or completion.
        ja: InitiationPhase は initiated event のみで成立し、acceptance・revocation・completion までは非終端です。
      source_claims:
        - claim-initiation-phase-002
  required_relation_constraints: []
examples:
  - id: InitiationPhase-example-positive-manual-2026
    kind: positive
    labels:
      zh: 发起状态正例
      en: Positive initiation state case
      ja: 開始状態の正例
    scenario_id: null
    descriptions:
      zh: 协调器发送带工作项和权限范围的委派请求，系统记录 initiated 事件并等待专家响应。
      en: A coordinator sends a delegation request with work item and authority scope, records an initiated event, and waits for the specialist's response.
      ja: 調整役が作業項目と権限範囲を含む委任要求を送り、initiated イベントを記録して専門家の応答を待ちます。
    field_values:
      phase_code: initiated
      terminal: false
      effective_event_kind: initiated
    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids:
      - InitiationPhase-is_a-DelegationPhase
    expected_result:
      zh: 该记录应被识别为 InitiationPhase，并保留其字段、边界与上位关系。
      en: The record is accepted as InitiationPhase with its fields, boundary, and parent relation preserved.
      ja: この記録を InitiationPhase として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 发起状态是委派请求已创建并送达候选受派方、但尚未被接受的委派生命周期状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Initiation state is the delegation lifecycle state in which a delegation request exists and has reached a candidate delegate but is not yet accepted."
      ja: この場面は次の同一性条件を満たします：開始状態は、委任要求が作成され候補受任者へ到達したが、まだ受諾されていない委任ライフサイクル状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-initiation-phase-003
  - id: InitiationPhase-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 发起状态边界例
      en: Boundary initiation state case
      ja: 開始状態の境界例
    scenario_id: null
    descriptions:
      zh: 协调器只在私有草稿中列出专家名字，没有发送请求或建立事件，因此仍不是发起状态。
      en: A coordinator only writes a specialist's name in a private draft and sends no request or event, so initiation state is not established.
      ja: 調整役が私的草案に専門家名を書くだけで要求もイベントも送らない場合、開始状態は成立しません。
    field_values: {}
    related_node_ids:
      - InitiationPhase
      - DelegationPhase
    related_relation_ids:
      - InitiationPhase-is_a-DelegationPhase
    expected_result:
      zh: 该对象不得被归为 InitiationPhase，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as InitiationPhase or acquire missing conditions from nearby facts.
      ja: この対象を InitiationPhase に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除只保存本地草稿的计划状态，也排除已经记录接受事件的委派。
      en: "The case violates this reviewed exclusion boundary: Excludes locally drafted plans and delegations for which an acceptance event is already effective."
      ja: この例は審査済み除外境界に反します：ローカル草案だけの計画状態と、受諾イベントがすでに有効な委任を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-initiation-phase-004
