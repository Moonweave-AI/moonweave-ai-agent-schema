schema: moonweave.ai/ontology-node/v1
id: RevocationPhase
kind: concept
labels:
  zh: 撤销状态
  en: revocation state
  ja: 取消状態
semantics:
  short_definition:
    zh: 委派在完成前被撤销或取消的终端生命周期状态。
    en: Terminal lifecycle state where delegation was revoked or canceled before completion.
    ja: completion 前に delegation が revoked/canceled された terminal lifecycle state。
  definition:
    zh: RevocationPhase 固定 phase_code=revoked、terminal=true、effective_event_kind=revoked。A2A Task canceled、Cursor Task 被父代理中止、DelegationBudget 超限触发的撤销，均映射为 RevocationPhase；必须有关联 revoked 类 DelegationEvent。
    en: RevocationPhase fixes phase_code=revoked, terminal=true, effective_event_kind=revoked. A2A Task canceled, Cursor Task aborted by parent, and revocation triggered by DelegationBudget overrun map to RevocationPhase; requires associated revoked-class DelegationEvent.
    ja: RevocationPhase は terminal revoked。A2A canceled/Cursor abort/budget overrun が写像。
  why_needed:
    zh: 记录未完成委派的终止原因与时点。
    en: Records termination reason and time for incomplete delegations.
    ja: 未完了 delegation の終了理由と時点を記録。
  includes:
    - zh: 纳入由有权委派者明确终止尚未完成委派并收回授权的状态。
      en: Includes an authorized delegator's explicit termination of an incomplete delegation with withdrawal of authority.
      ja: 権限を持つ委任者が未完了委任を明示的に終了し権限を回収する状態を含みます。
  excludes:
    - zh: 排除运行失败、临时暂停、自然到期和已经按契约完成的委派。
      en: Excludes runtime failure, temporary pause, natural expiration, and delegation completed under its contract.
      ja: 実行失敗、一時停止、自然失効、契約どおり完了した委任を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: RevocationPhase 由 DelegationEvent 链建立，A2A Task 状态 canceled 提供外部对齐证据。禁止无事件原地修改 phase。
    en: RevocationPhase is established by DelegationEvent chains; A2A Task states canceled provide external alignment evidence. Do not mutate phase in place without events.
    ja: RevocationPhase は DelegationEvent chain で成立し A2A Task state canceled が外部整合証拠。
  typical_input:
    - description: A2A Task state alignment.
      format: '{ "status": { "state": "canceled" } }'
      source_claims:
        - claim-revocation-phase-design
  typical_output:
    - description: Moonweave phase record.
      format: '{ "phase_code": "revocation" }'
      source_claims:
        - claim-revocation-phase-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: revocation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "revoked" and terminal == true and effective_event_kind == "revoked"
      explanations:
        zh: 撤销状态只能由有权主体发出的有效撤销事件建立，并终止依赖原授权继续工作的权利。
        en: RevocationPhase is established only by a valid revocation event from an authorized party and terminates the right to continue under the delegated authority.
        ja: RevocationPhase は権限主体の有効な revocation event のみで成立し、委任権限に基づく継続権を終了します。
      source_claims:
        - claim-revocation-phase-design
  required_relation_constraints: []
examples:
  - id: RevocationPhase-example-a2a-canceled
    labels:
      zh: A2A canceled
      en: A2A canceled
      ja: A2A canceled
    descriptions:
      zh: 客户端取消远程 task，记录 revoked 事件。
      en: Client cancels remote task; records revoked event.
      ja: Client が remote task cancel で revoked event。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: canceled
    field_values:
      phase_code: revoked
      terminal: true
      effective_event_kind: revoked
    related_node_ids:
      - RevocationPhase
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-design
  - id: RevocationPhase-example-cursor-abort
    labels:
      zh: Cursor Task 中止
      en: Cursor Task abort
      ja: Cursor Task abort
    descriptions:
      zh: 父代理在子代理完成前中止 Task，进入 RevocationPhase。
      en: Parent aborts Task before subagent completes; enters RevocationPhase.
      ja: Parent が subagent 完了前に Task abort。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task abort
    field_values:
      phase_code: revoked
      terminal: true
      effective_event_kind: revoked
    related_node_ids:
      - RevocationPhase
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-design
  - id: RevocationPhase-example-budget-revoke
    labels:
      zh: 预算撤销
      en: Budget revocation
      ja: budget revocation
    descriptions:
      zh: DelegationBudget token_limit 耗尽触发撤销事件。
      en: DelegationBudget token_limit exhaustion triggers revocation event.
      ja: DelegationBudget token_limit 耗尽で revocation event。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: DelegationBudget
    field_values:
      phase_code: revoked
      terminal: true
      effective_event_kind: revoked
    related_node_ids:
      - RevocationPhase
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-design
  - id: RevocationPhase-example-boundary-completed
    labels:
      zh: completed 不是 revoked
      en: completed is not revoked
      ja: completed は revoked ではない
    descriptions:
      zh: 已成功 completed 的委派不能回溯为 RevocationPhase。
      en: Successfully completed delegation cannot be reclassified as RevocationPhase.
      ja: completed 済み delegation を RevocationPhase に再分類不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RevocationPhase
      - CompletionPhase
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-design
parent_relation:
  id: RevocationPhase-is_a-DelegationPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 撤销状态是授权主体已收回委派权限与继续执行权的终止型委派生命周期状态。
    en: Revocation state is the terminal delegation lifecycle state after an authorized party withdraws delegated authority and permission to continue.
    ja: 取消状態は権限主体が委任権限と継続許可を撤回した終端型委任ライフサイクル状態です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
