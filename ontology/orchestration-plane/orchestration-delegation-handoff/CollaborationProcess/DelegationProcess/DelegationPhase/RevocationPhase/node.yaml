schema: moonweave.ai/ontology-node/v1
id: RevocationPhase
kind: concept
labels:
  zh: 撤销状态
  en: revocation state
  ja: 取消状態
semantics:
  short_definition:
    zh: 委派授权与继续执行权已被有效收回的终止生命周期状态。
    en: Terminal lifecycle state after delegated authority is withdrawn.
    ja: 委任権限と継続実行許可が撤回された終端ライフサイクル状態。
  definition:
    zh: 撤销状态是原委派授权和继续执行权已经被有效收回的终止型生命周期状态。 它由获授权主体发出的撤销事件建立，并要求说明撤销范围、时间以及需返还或保留的上下文。
    en: Revocation state is a terminal delegation lifecycle state in which the prior delegated authority and permission to continue have been withdrawn. It is established by a revocation event from an authorized party and records scope, effective time, and context to return or retain.
    ja: 取消状態は、従前の委任権限と継続実行許可が有効に撤回された終端型ライフサイクル状態です。 権限主体の取消イベントにより成立し、取消範囲、有効時刻、返却または保持するコンテキストを記録します。
  why_needed:
    zh: 该状态使权限收回与普通失败、暂停或超时分开，并为后续审计保留依据。
    en: The state separates withdrawal of authority from failure, pause, or timeout and preserves its audit basis.
    ja: 権限撤回を失敗、停止、期限切れから分け、監査根拠を保持します。
  includes:
    - zh: 纳入由有权委派者明确终止尚未完成委派并收回授权的状态。
      en: Includes an authorized delegator's explicit termination of an incomplete delegation with withdrawal of authority.
      ja: 権限を持つ委任者が未完了委任を明示的に終了し権限を回収する状態を含みます。
  excludes:
    - zh: 排除运行失败、临时暂停、自然到期和已经按契约完成的委派。
      en: Excludes runtime failure, temporary pause, natural expiration, and delegation completed under its contract.
      ja: 実行失敗、一時停止、自然失効、契約どおり完了した委任を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      RevocationPhase 在 DelegationEvent(event_kind=revocation) 生效后成立：contract 被撤销，delegate 不得
      启动新 Execution。Orchestrator 或 delegator 触发；A2A canceled 状态可投影但需保留 revocation 事件与
      actor_binding_ref 审计链。
    en: >-
      RevocationPhase holds after DelegationEvent(event_kind=revocation) becomes effective: contract revoked, delegate must
      not start new Execution. Triggered by orchestrator or delegator; A2A canceled may project but requires revocation event
      and actor_binding_ref audit chain retention.
    ja: >-
      RevocationPhase は DelegationEvent(event_kind=revocation) 発効後に成立する。contract が revoked され delegate は新
      Execution を開始してはならない。orchestrator または delegator が trigger する。A2A canceled は project 可能だが
      revocation event と actor_binding_ref audit chain 保持が必要。
  typical_input:
    - description:
        zh: 撤销委派的事件与理由引用。
        en: Delegation revocation event and reason reference.
        ja: delegation revocation event と reason reference。
      format: |-
        {"delegation_event_ref":"deleg-event-revoke-884","delegation_process_ref":"deleg-proc-884","revocation_basis_ref":"policy:contract-breach@1","actor_binding_ref":"binding-orchestrator-1","effective_at":"2026-07-16T09:30:00Z"}
  typical_output:
    - description:
        zh: 终止性 RevocationPhase 状态与阻断新派发标志。
        en: Terminal RevocationPhase state with block-new-dispatch flag.
        ja: block-new-dispatch flag 付き terminal RevocationPhase state。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","current_phase":"RevocationPhase","terminal":true,"new_dispatch_allowed":false,"since":"2026-07-16T09:30:00Z"}
  reference_implementations:
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents canceled terminal state mappable to revocation phase.
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents revoking pending or active handoffs before new runs.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents invalidation of ongoing delegation activities via revocation events.
  source_claims:
    - claim-revocation-phase-001
    - claim-revocation-phase-002
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: revocation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "revoked" and terminal == true and effective_event_kind == "revoked"
      explanations:
        zh: 撤销状态只能由有权主体发出的有效撤销事件建立，并终止依赖原授权继续工作的权利。
        en: RevocationPhase is established only by a valid revocation event from an authorized party and terminates the right to continue under the delegated authority.
        ja: RevocationPhase は権限主体の有効な revocation event のみで成立し、委任権限に基づく継続権を終了します。
      source_claims:
        - claim-revocation-phase-002
  required_relation_constraints: []
examples:
  - id: RevocationPhase-example-positive-manual-2026
    labels:
      zh: RevocationPhase positive
      en: RevocationPhase positive
      ja: RevocationPhase positive
    descriptions:
      zh: "A2A Protocol 映射 RevocationPhase：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps RevocationPhase: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol RevocationPhase: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {phase_code: revoked, terminal: true, effective_event_kind: revoked}

    related_node_ids:
      - RevocationPhase
      - DelegationPhase
    related_relation_ids:
      - RevocationPhase-is_a-DelegationPhase
    source_claims:
      - claim-revocation-phase-003

  - id: RevocationPhase-example-boundary-manual-2026
    labels:
      zh: RevocationPhase boundary
      en: RevocationPhase boundary
      ja: RevocationPhase boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 RevocationPhase WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not RevocationPhase WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で RevocationPhase WorkflowStep spec ではない。
    field_values: {}

    related_node_ids:
      - RevocationPhase
      - DelegationPhase
    related_relation_ids:
      - RevocationPhase-is_a-DelegationPhase
    source_claims:
      - claim-revocation-phase-004

  - id: RevocationPhase-example-counterexample-confusable
    labels:
      zh: RevocationPhase counterexample
      en: RevocationPhase counterexample
      ja: RevocationPhase counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 RevocationPhase TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style RevocationPhase TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 RevocationPhase ではない。
    field_values: {phase_kind: absent, revocation_basis: absent, revoked_authority_digest: absent}

    related_node_ids:
      - RevocationPhase
      - DelegationPhase
      - DelegatedAuthority
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-003

  - id: RevocationPhase-example-instance-concrete
    labels:
      zh: RevocationPhase instance
      en: RevocationPhase instance
      ja: RevocationPhase instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 RevocationPhase A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to RevocationPhase A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が RevocationPhase A2ATask に写像。
    field_values: {phase_code: revoked, terminal: true, effective_event_kind: revoked}

    related_node_ids:
      - RevocationPhase
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-revocation-phase-003

