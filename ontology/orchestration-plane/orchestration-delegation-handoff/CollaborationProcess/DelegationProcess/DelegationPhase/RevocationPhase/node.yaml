        en: Do not assert RevocationPhase-is_a-DelegationPhase; the case lacks a condition required by the relation definition.
        ja: RevocationPhase-is_a-DelegationPhase を主張せず、関係定義に必要な成立条件が不足しています。
      why_valid_or_invalid:
        zh: 该边界例刻意缺少 is_a 所表达的身份、顺序或治理条件。
        en: The boundary deliberately lacks the identity, ordering, or governance condition expressed by is_a.
        ja: この境界例は is_a が表す同一性、順序、統治条件を意図的に欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
