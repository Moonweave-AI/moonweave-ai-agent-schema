        zh: 委派者签发范围明确的 revoked 事件并立即撤回工具许可，状态归入 RevocationPhase。
        en: The delegator issues a scoped revoked event and withdraws tool permission, establishing RevocationPhase.
        ja: 委任者が範囲付き revoked イベントを発行しツール許可を回収するため RevocationPhase が成立します。
