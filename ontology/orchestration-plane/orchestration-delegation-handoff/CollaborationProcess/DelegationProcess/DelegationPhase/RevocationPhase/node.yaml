schema: moonweave.ai/ontology-node/v1
id: RevocationPhase
kind: concept
status: review
labels:
  zh: 撤销状态
  en: revocation state
  ja: 取消状態
semantics:
  short_definition:
    zh: 撤销状态是原委派授权和继续执行权已经被有效收回的终止型生命周期状态。
    en: Revocation state is a terminal delegation lifecycle state in which the prior delegated authority and permission to continue have been withdrawn.
    ja: 取消状態は、従前の委任権限と継続実行許可が有効に撤回された終端型ライフサイクル状態です。
  definition:
    zh: 撤销状态是原委派授权和继续执行权已经被有效收回的终止型生命周期状态。 它由获授权主体发出的撤销事件建立，并要求说明撤销范围、时间以及需返还或保留的上下文。
    en: Revocation state is a terminal delegation lifecycle state in which the prior delegated authority and permission to continue have been withdrawn. It is established by a revocation event from an authorized party and records scope, effective time, and context to return or retain.
    ja: 取消状態は、従前の委任権限と継続実行許可が有効に撤回された終端型ライフサイクル状態です。 権限主体の取消イベントにより成立し、取消範囲、有効時刻、返却または保持するコンテキストを記録します。
  why_needed:
    zh: 该状态使权限收回与普通失败、暂停或超时分开，并为后续审计保留依据。
    en: The state separates withdrawal of authority from failure, pause, or timeout and preserves its audit basis.
    ja: 権限撤回を失敗、停止、期限切れから分け、監査根拠を保持します。
  includes:
    - zh: 纳入由有权委派者明确终止尚未完成委派并收回授权的状态。
      en: Includes an authorized delegator's explicit termination of an incomplete delegation with withdrawal of authority.
      ja: 権限を持つ委任者が未完了委任を明示的に終了し権限を回収する状態を含みます。
  excludes:
    - zh: 排除运行失败、临时暂停、自然到期和已经按契约完成的委派。
      en: Excludes runtime failure, temporary pause, natural expiration, and delegation completed under its contract.
      ja: 実行失敗、一時停止、自然失効、契約どおり完了した委任を除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: revocation-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "revoked" and terminal == true and effective_event_kind == "revoked"
      explanations:
        zh: 撤销状态只能由有权主体发出的有效撤销事件建立，并终止依赖原授权继续工作的权利。
        en: RevocationPhase is established only by a valid revocation event from an authorized party and terminates the right to continue under the delegated authority.
        ja: RevocationPhase は権限主体の有効な revocation event のみで成立し、委任権限に基づく継続権を終了します。
      source_claims:
        - claim-revocation-phase-002
  required_relation_constraints: []
examples:
  - id: RevocationPhase-example-positive-manual-2026
    kind: positive
    labels:
      zh: 撤销状态正例
      en: Positive revocation state case
      ja: 取消状態の正例
    scenario_id: null
    descriptions:
      zh: 发现权限范围错误后，委派者签发撤销事件，立即收回数据库访问并要求返回已有证据。
      en: After detecting an authority-scope error, the delegator issues a revocation event, withdraws database access, and requests return of existing evidence.
      ja: 権限範囲の誤り発見後、委任者が取消イベントを発行し、データベース権限を回収して既存証拠の返却を求めます。
    field_values:
      phase_code: revoked
      terminal: true
      effective_event_kind: revoked
    related_node_ids:
      - RevocationPhase
      - DelegationPhase
    related_relation_ids:
      - RevocationPhase-is_a-DelegationPhase
    expected_result:
      zh: 该记录应被识别为 RevocationPhase，并保留其字段、边界与上位关系。
      en: The record is accepted as RevocationPhase with its fields, boundary, and parent relation preserved.
      ja: この記録を RevocationPhase として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 撤销状态是原委派授权和继续执行权已经被有效收回的终止型生命周期状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Revocation state is a terminal delegation lifecycle state in which the prior delegated authority and permission to continue have been withdrawn."
      ja: この場面は次の同一性条件を満たします：取消状態は、従前の委任権限と継続実行許可が有効に撤回された終端型ライフサイクル状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revocation-phase-003
  - id: RevocationPhase-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 撤销状态边界例
      en: Boundary revocation state case
      ja: 取消状態の境界例
    scenario_id: null
    descriptions:
      zh: 受派方一次工具调用失败但契约和权限仍有效；这是运行失败，不是撤销状态。
      en: One tool call by the delegate fails while the contract and authority remain effective; this is a runtime failure, not revocation state.
      ja: 受任者のツール呼出しが一度失敗しても契約と権限が有効なら、実行失敗であって取消状態ではありません。
    field_values: {}
    related_node_ids:
      - RevocationPhase
      - DelegationPhase
    related_relation_ids:
      - RevocationPhase-is_a-DelegationPhase
    expected_result:
      zh: 该对象不得被归为 RevocationPhase，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as RevocationPhase or acquire missing conditions from nearby facts.
      ja: この対象を RevocationPhase に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除运行失败、临时暂停、自然到期和已经按契约完成的委派。
      en: "The case violates this reviewed exclusion boundary: Excludes runtime failure, temporary pause, natural expiration, and delegation completed under its contract."
      ja: この例は審査済み除外境界に反します：実行失敗、一時停止、自然失効、契約どおり完了した委任を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revocation-phase-004
