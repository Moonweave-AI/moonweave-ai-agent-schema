    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: normative
    confidence: high
  - id: claim-revocation-phase-002
    source: openai-agents-handoffs
    supports: RevocationPhase boundary from adjacent orchestration concepts is supported by OpenAI Agents SDK - Handoffs and multi-agent orchestration separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-revocation-phase-003
    source: langgraph-multi-agent
    supports: RevocationPhase field or status vocabulary is a Moonweave audit projection informed by LangGraph multi-agent and subgraph patterns.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-revocation-phase-004
    source: a2a-protocol-specification
    supports: Moonweave RevocationPhase constraints, examples, or local audit fields for claim claim-revocation-phase-004 are design projections informed by Agent2Agent (A2A) Protocol Specification.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: design-inference
    confidence: high