schema: moonweave.ai/ontology-node/v1
id: AcceptancePhase
kind: concept
labels:
  zh: 接受状态
  en: acceptance state
  ja: 受諾状態
semantics:
  short_definition:
    zh: 受派方已接受委派并开始执行工作的生命周期状态。
    en: Lifecycle state where the delegate accepted the delegation and began executing work.
    ja: delegate が delegation を accept し work 実行を開始した lifecycle state。
  definition:
    zh: AcceptancePhase 固定 phase_code=accepted、terminal=false、effective_event_kind=accepted。A2A Task working、Cursor 子代理开始产出、CrewAI worker 开始 task 执行，均映射为 AcceptancePhase。必须有 accepted 类 DelegationEvent，不能由路由推断。
    en: AcceptancePhase fixes phase_code=accepted, terminal=false, effective_event_kind=accepted. A2A Task working, Cursor subagent producing output, and CrewAI worker starting task execution map to AcceptancePhase. Requires accepted-class DelegationEvent; routing inference is insufficient.
    ja: AcceptancePhase は phase_code=accepted を固定。A2A working/Cursor subagent 実行開始/CrewAI worker kickoff が写像。
  why_needed:
    zh: 标记责任已从提议转为实际承担。
    en: Marks responsibility shift from proposal to actual undertaking.
    ja: proposal から actual undertaking への責任移行を标记。
  includes:
    - zh: 纳入受派方对明确契约版本作出可归属接受并开始承担工作的状态。
      en: Includes a delegate's attributable acceptance of a specified contract version and undertaking of the work.
      ja: 受任者が特定契約版を帰属可能な形で受諾し、作業を引き受けた状態を含みます。
  excludes:
    - zh: 排除消息送达回执、候选可用性确认和尚未绑定契约的口头意向。
      en: Excludes delivery receipts, candidate availability confirmations, and informal intent not bound to a contract.
      ja: 配信確認、候補可用性確認、契約に結び付かない非公式な意向を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: AcceptancePhase 由 DelegationEvent 链建立，A2A Task 状态 working 提供外部对齐证据。禁止无事件原地修改 phase。
    en: AcceptancePhase is established by DelegationEvent chains; A2A Task states working provide external alignment evidence. Do not mutate phase in place without events.
    ja: AcceptancePhase は DelegationEvent chain で成立し A2A Task state working が外部整合証拠。
  typical_input:
    - description: A2A Task state alignment.
      format: '{ "status": { "state": "working" } }'
      source_claims:
        - claim-acceptance-phase-design
  typical_output:
    - description: Moonweave phase record.
      format: '{ "phase_code": "acceptance" }'
      source_claims:
        - claim-acceptance-phase-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: acceptance-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "accepted" and terminal == false and effective_event_kind == "accepted"
      explanations:
        zh: 接受状态只能由受派方的有效接受事件建立，且在撤销或完成前不是终止状态。
        en: AcceptancePhase is established only by a valid delegate-acceptance event and remains non-terminal until revocation or completion.
        ja: AcceptancePhase は受任者の有効な acceptance event のみで成立し、revocation または completion までは非終端です。
      source_claims:
        - claim-acceptance-phase-design
  required_relation_constraints: []
examples:
  - id: AcceptancePhase-example-a2a-working
    labels:
      zh: A2A working
      en: A2A working
      ja: A2A working
    descriptions:
      zh: 远程 agent 进入 working 并处理 TaskSendParams。
      en: Remote agent enters working and processes TaskSendParams.
      ja: Remote agent が working に入り TaskSendParams を処理。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: working
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - AcceptancePhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-design
  - id: AcceptancePhase-example-cursor-running
    labels:
      zh: Cursor 子代理执行
      en: Cursor subagent executing
      ja: Cursor subagent 実行
    descriptions:
      zh: explore 子代理返回中间发现，父代理记录 accepted 事件。
      en: Explore subagent returns interim findings; parent records accepted event.
      ja: Explore subagent 中間結果返却で parent が accepted event 記録。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task execution
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - AcceptancePhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-design
  - id: AcceptancePhase-example-crewai-kickoff
    labels:
      zh: CrewAI kickoff
      en: CrewAI kickoff
      ja: CrewAI kickoff
    descriptions:
      zh: Researcher 开始执行被 manager 分配的 task。
      en: Researcher begins executing manager-assigned task.
      ja: Researcher が manager 割当 task 実行開始。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: kickoff
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - AcceptancePhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-design
  - id: AcceptancePhase-example-boundary-initiated-only
    labels:
      zh: 仅 submitted 不是 accepted
      en: Submitted alone is not accepted
      ja: submitted のみは accepted ではない
    descriptions:
      zh: A2A 仍为 submitted 时不能断言 AcceptancePhase。
      en: Cannot assert AcceptancePhase while A2A remains submitted.
      ja: A2A が submitted のままでは AcceptancePhase を断言不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - AcceptancePhase
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-design
parent_relation:
  id: AcceptancePhase-is_a-DelegationPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 接受状态是受派方已对明确契约承担工作责任的委派生命周期状态。
    en: Acceptance state is the delegation lifecycle state in which the delegate has undertaken work responsibility under an identified contract.
    ja: 受諾状態は受任者が特定契約の下で作業責任を引き受けた委任ライフサイクル状態です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-acceptance-phase-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
