schema: moonweave.ai/ontology-node/v1
id: AcceptancePhase
kind: concept
labels:
  zh: 接受状态
  en: acceptance state
  ja: 受諾状態
semantics:
  short_definition:
    zh: 受派方已明确承担契约工作后所处的生命周期状态。
    en: Lifecycle state after the delegate explicitly accepts the contract.
    ja: 受任者が契約上の作業を明示的に引き受けた後のライフサイクル状態。
  definition:
    zh: 接受状态是受派方已明确承担契约所述工作和责任的委派生命周期状态。 它由可追踪的接受事件建立，并在撤销、拒绝、完成或失效事件出现前保持有效。
    en: Acceptance state is the delegation lifecycle state in which the delegate has explicitly undertaken the work and responsibility stated by the contract. It is established by a traceable acceptance event and remains effective until revocation, rejection, completion, or expiration becomes effective.
    ja: 受諾状態は、受任者が契約に記載された作業と責任を明示的に引き受けた委任ライフサイクル状態です。 追跡可能な受諾イベントにより成立し、取消、拒否、完了、失効が有効になるまで継続します。
  why_needed:
    zh: 该状态证明责任已经由提议转为承担，不能仅从消息已送达推断。
    en: The state proves that responsibility moved from proposal to undertaking and cannot be inferred from message delivery alone.
    ja: 責任が提案から引受けへ移ったことを示し、メッセージ到達だけから推定できません。
  includes:
    - zh: 纳入受派方对明确契约版本作出可归属接受并开始承担工作的状态。
      en: Includes a delegate's attributable acceptance of a specified contract version and undertaking of the work.
      ja: 受任者が特定契約版を帰属可能な形で受諾し、作業を引き受けた状態を含みます。
  excludes:
    - zh: 排除消息送达回执、候选可用性确认和尚未绑定契约的口头意向。
      en: Excludes delivery receipts, candidate availability confirmations, and informal intent not bound to a contract.
      ja: 配信確認、候補可用性確認、契約に結び付かない非公式な意向を除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: >-
      AcceptancePhase 在 DelegationEvent(event_kind=acceptance) 后成立：delegate 已承诺按 contract 执行。
      Agents SDK handoff 被接受或 Runner 由 delegate 接管时进入此状态；A2A working 状态是协议投影，
      不能跳过 acceptance 事件直接推断。
    en: >-
      AcceptancePhase holds after DelegationEvent(event_kind=acceptance): delegate committed to execute under contract. Enters
      when Agents SDK handoff is accepted or delegate assumes Runner; A2A working is protocol projection and cannot be
      inferred without acceptance event.
    ja: >-
      AcceptancePhase は DelegationEvent(event_kind=acceptance) 後に成立する。delegate が contract 下で execute すると約束した状態。
      Agents SDK handoff 受理または delegate が Runner を引き継ぐと入る。A2A working は protocol projection で acceptance event
      なしに推論できない。
  typical_input:
    - description:
        zh: 受派方接受委派的事件载荷。
        en: Delegate acceptance event payload.
        ja: delegate acceptance event payload。
      format: |-
        {"delegation_event_ref":"deleg-event-accept-884","delegation_process_ref":"deleg-proc-884","actor_binding_ref":"binding-agent-auditor-3","accepted_contract_ref":"contract:audit-7@2","effective_at":"2026-07-16T09:05:00Z"}
  typical_output:
    - description:
        zh: AcceptancePhase 当前状态与可启动 WorkerSelection/Execution 标志。
        en: AcceptancePhase current state and flag permitting WorkerSelection/Execution start.
        ja: AcceptancePhase current state と WorkerSelection/Execution 開始許可 flag。
      format: |-
        {"delegation_process_ref":"deleg-proc-884","current_phase":"AcceptancePhase","execution_allowed":true,"since":"2026-07-16T09:05:00Z"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents accepted handoffs enabling delegate execution.
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents working state after task acceptance at protocol layer.
    - name: W3C PROV-O Agent
      url: https://www.w3.org/TR/prov-o/#Agent
      description: Documents accountable delegate association after acceptance.
  source_claims:
    - claim-acceptance-phase-001
    - claim-acceptance-phase-002
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: acceptance-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "accepted" and terminal == false and effective_event_kind == "accepted"
      explanations:
        zh: 接受状态只能由受派方的有效接受事件建立，且在撤销或完成前不是终止状态。
        en: AcceptancePhase is established only by a valid delegate-acceptance event and remains non-terminal until revocation or completion.
        ja: AcceptancePhase は受任者の有効な acceptance event のみで成立し、revocation または completion までは非終端です。
      source_claims:
        - claim-acceptance-phase-002
  required_relation_constraints: []
examples:
  - id: AcceptancePhase-example-positive-manual-2026
    labels:
      zh: AcceptancePhase positive
      en: AcceptancePhase positive
      ja: AcceptancePhase positive
    descriptions:
      zh: A2A Protocol 映射 AcceptancePhase：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps AcceptancePhase: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol AcceptancePhase: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {phase_code: accepted, terminal: false, effective_event_kind: accepted}

    related_node_ids:
      - AcceptancePhase
      - DelegationPhase
    related_relation_ids:
      - AcceptancePhase-is_a-DelegationPhase
    source_claims:
      - claim-acceptance-phase-003

  - id: AcceptancePhase-example-boundary-manual-2026
    labels:
      zh: AcceptancePhase boundary
      en: AcceptancePhase boundary
      ja: AcceptancePhase boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 AcceptancePhase 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not AcceptancePhase work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で AcceptancePhase work_specification ではない。
    field_values: {}

    related_node_ids:
      - AcceptancePhase
      - DelegationPhase
    related_relation_ids:
      - AcceptancePhase-is_a-DelegationPhase
    source_claims:
      - claim-acceptance-phase-004

  - id: AcceptancePhase-example-counterexample-confusable
    labels:
      zh: AcceptancePhase counterexample
      en: AcceptancePhase counterexample
      ja: AcceptancePhase counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 AcceptancePhase 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style AcceptancePhase group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 AcceptancePhase ではない。
    field_values: {phase_kind: absent, acceptance_event_ref: absent, delegatee_ack_at: absent}

    related_node_ids:
      - AcceptancePhase
      - DelegationEvent
      - WorkerAssignment
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-003

  - id: AcceptancePhase-example-instance-concrete
    labels:
      zh: AcceptancePhase instance
      en: AcceptancePhase instance
      ja: AcceptancePhase instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 AcceptancePhase A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to AcceptancePhase A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が AcceptancePhase A2ATask に写像。
    field_values: {phase_code: accepted, terminal: false, effective_event_kind: accepted}

    related_node_ids:
      - AcceptancePhase
      - DelegationPhase
    related_relation_ids: []
    source_claims:
      - claim-acceptance-phase-003

sources:
  - id: a2a-protocol-specification
    title: Agent2Agent (A2A) Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines agent-to-agent Task lifecycle, messaging, and inter-agent work exchange.
  - id: openai-agents-handoffs
    title: OpenAI Agents SDK - Handoffs and multi-agent orchestration
    url: https://platform.openai.com/docs/guides/agents
    source_type: official-doc
    relevance: Documents handoffs, control transfer, subagent invocation, and multi-agent delegation patterns.
  - id: langgraph-multi-agent
    title: LangGraph multi-agent and subgraph patterns
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Documents subgraph delegation, worker routing, and state isolation in graph workflows.
source_claims:
  - id: claim-acceptance-phase-001
    source: a2a-protocol-specification
    supports: AcceptancePhase core identity and classification criteria align with Agent2Agent (A2A) Protocol Specification definitions for orchestration control structures.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: normative
    confidence: high
  - id: claim-acceptance-phase-002
    source: openai-agents-handoffs
    supports: AcceptancePhase boundary from adjacent orchestration concepts is supported by OpenAI Agents SDK - Handoffs and multi-agent orchestration separation of control transfer, routing, and ordinary tool or message exchange.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-acceptance-phase-003
    source: langgraph-multi-agent
    supports: AcceptancePhase field or status vocabulary is a Moonweave audit projection informed by LangGraph multi-agent and subgraph patterns.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: official
    confidence: high
  - id: claim-acceptance-phase-004
    source: a2a-protocol-specification
    supports: Moonweave AcceptancePhase constraints, examples, or local audit fields for claim claim-acceptance-phase-004 are design projections informed by Agent2Agent (A2A) Protocol Specification.
    locator: Delegation/handoff control structures; Task lifecycle; multi-agent orchestration
    evidence_kind: design-inference
    confidence: high
