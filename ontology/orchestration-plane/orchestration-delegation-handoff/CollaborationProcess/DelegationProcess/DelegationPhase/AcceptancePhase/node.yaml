schema: moonweave.ai/ontology-node/v1
id: AcceptancePhase
kind: concept
status: review
labels:
  zh: 接受状态
  en: acceptance state
  ja: 受諾状態
semantics:
  short_definition:
    zh: 接受状态是受派方已明确承担契约所述工作和责任的委派生命周期状态。
    en: Acceptance state is the delegation lifecycle state in which the delegate has explicitly undertaken the work and responsibility stated by the contract.
    ja: 受諾状態は、受任者が契約に記載された作業と責任を明示的に引き受けた委任ライフサイクル状態です。
  definition:
    zh: 接受状态是受派方已明确承担契约所述工作和责任的委派生命周期状态。 它由可追踪的接受事件建立，并在撤销、拒绝、完成或失效事件出现前保持有效。
    en: Acceptance state is the delegation lifecycle state in which the delegate has explicitly undertaken the work and responsibility stated by the contract. It is established by a traceable acceptance event and remains effective until revocation, rejection, completion, or expiration becomes effective.
    ja: 受諾状態は、受任者が契約に記載された作業と責任を明示的に引き受けた委任ライフサイクル状態です。 追跡可能な受諾イベントにより成立し、取消、拒否、完了、失効が有効になるまで継続します。
  why_needed:
    zh: 该状态证明责任已经由提议转为承担，不能仅从消息已送达推断。
    en: The state proves that responsibility moved from proposal to undertaking and cannot be inferred from message delivery alone.
    ja: 責任が提案から引受けへ移ったことを示し、メッセージ到達だけから推定できません。
  includes:
    - zh: 纳入受派方对明确契约版本作出可归属接受并开始承担工作的状态。
      en: Includes a delegate's attributable acceptance of a specified contract version and undertaking of the work.
      ja: 受任者が特定契約版を帰属可能な形で受諾し、作業を引き受けた状態を含みます。
  excludes:
    - zh: 排除消息送达回执、候选可用性确认和尚未绑定契约的口头意向。
      en: Excludes delivery receipts, candidate availability confirmations, and informal intent not bound to a contract.
      ja: 配信確認、候補可用性確認、契約に結び付かない非公式な意向を除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: acceptance-phase-fixed-differentia
      severity: error
      expression_language: plain
      expression: phase_code == "accepted" and terminal == false and effective_event_kind == "accepted"
      explanations:
        zh: 接受状态只能由受派方的有效接受事件建立，且在撤销或完成前不是终止状态。
        en: AcceptancePhase is established only by a valid delegate-acceptance event and remains non-terminal until revocation or completion.
        ja: AcceptancePhase は受任者の有効な acceptance event のみで成立し、revocation または completion までは非終端です。
      source_claims:
        - claim-acceptance-phase-002
  required_relation_constraints: []
examples:
  - id: AcceptancePhase-example-positive-manual-2026
    kind: positive
    labels:
      zh: 接受状态正例
      en: Positive acceptance state case
      ja: 受諾状態の正例
    scenario_id: null
    descriptions:
      zh: 专家针对 delegation-17 的 contract-v3 返回接受，事件带有专家身份、时间和契约版本。
      en: The specialist accepts contract-v3 for delegation-17, and the event carries specialist identity, time, and contract version.
      ja: 専門家が delegation-17 の contract-v3 を受諾し、イベントに専門家 ID、時刻、契約版が記録されます。
    field_values:
      phase_code: accepted
      terminal: false
      effective_event_kind: accepted
    related_node_ids:
      - AcceptancePhase
      - DelegationPhase
    related_relation_ids:
      - AcceptancePhase-is_a-DelegationPhase
    expected_result:
      zh: 该记录应被识别为 AcceptancePhase，并保留其字段、边界与上位关系。
      en: The record is accepted as AcceptancePhase with its fields, boundary, and parent relation preserved.
      ja: この記録を AcceptancePhase として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 接受状态是受派方已明确承担契约所述工作和责任的委派生命周期状态。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: Acceptance state is the delegation lifecycle state in which the delegate has explicitly undertaken the work and responsibility stated by the contract."
      ja: この場面は次の同一性条件を満たします：受諾状態は、受任者が契約に記載された作業と責任を明示的に引き受けた委任ライフサイクル状態です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-acceptance-phase-003
  - id: AcceptancePhase-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 接受状态边界例
      en: Boundary acceptance state case
      ja: 受諾状態の境界例
    scenario_id: null
    descriptions:
      zh: 传输层返回 HTTP 200 只证明请求已收到，不证明受派方承担工作，因此不能建立接受状态。
      en: An HTTP 200 transport response proves receipt but not undertaking of work, so it does not establish acceptance state.
      ja: HTTP 200 は要求受信を示すだけで作業引受けを示さないため、受諾状態を成立させません。
    field_values: {}
    related_node_ids:
      - AcceptancePhase
      - DelegationPhase
    related_relation_ids:
      - AcceptancePhase-is_a-DelegationPhase
    expected_result:
      zh: 该对象不得被归为 AcceptancePhase，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as AcceptancePhase or acquire missing conditions from nearby facts.
      ja: この対象を AcceptancePhase に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除消息送达回执、候选可用性确认和尚未绑定契约的口头意向。
      en: "The case violates this reviewed exclusion boundary: Excludes delivery receipts, candidate availability confirmations, and informal intent not bound to a contract."
      ja: この例は審査済み除外境界に反します：配信確認、候補可用性確認、契約に結び付かない非公式な意向を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-acceptance-phase-004
