schema: moonweave.ai/ontology-node/v1
id: DelegationResult
kind: concept
status: review
labels:
  zh: 委派结果记录
  en: delegation result record
  ja: 委任結果記録
semantics:
  short_definition:
    zh: 委派结果记录是受派方针对一个委派过程返回的状态化输出说明。
    en: A delegation result record is a status-bearing account of output returned by the delegate for one delegation process.
    ja: 委任結果記録は、一件の委任プロセスについて受任者が返す出力を状態付きで記述する情報記録です。
  definition:
    zh: 委派结果记录是受派方针对一个委派过程返回的状态化输出说明。 它包含结果状态、返回时间、产物引用、警告和来源链；实际产物仍属于 Artifact，而该记录说明委派返回了什么。
    en: A delegation result record is a status-bearing account of output returned by the delegate for one delegation process. It contains result status, return time, artifact references, warnings, and provenance; artifacts remain Artifact objects, while this record describes the delegation return.
    ja: 委任結果記録は、一件の委任プロセスについて受任者が返す出力を状態付きで記述する情報記録です。 結果状態、返却時刻、成果物参照、警告、来歴を含み、実成果物は Artifact のまま、本記録は委任返却内容を説明します。
  why_needed:
    zh: 该节点区分委派过程的返回记录、实际产物和完成状态，避免用一个“结果”节点承担三种语义。
    en: The node separates the delegation return record, actual artifacts, and completion state so one result term does not carry three meanings.
    ja: 委任返却記録、実成果物、完了状態を分け、一つの結果語に三つの意味を負わせません。
  includes:
    - zh: 纳入与一个委派过程关联、说明成功、部分、失败或取消返回并引用证据的记录。
      en: Includes records tied to one delegation process that describe successful, partial, failed, or canceled return with evidence references.
      ja: 一件の委任プロセスに結び付き、成功、部分、失敗、取消の返却と証拠参照を示す記録を含みます。
  excludes:
    - zh: 排除实际报告文件、运行日志和表示委派生命周期已完成的 CompletionPhase。
      en: Excludes the report artifact itself, runtime logs, and CompletionPhase as lifecycle state.
      ja: 報告成果物そのもの、実行ログ、ライフサイクル状態 CompletionPhase を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - delegation_result_id
  fields:
    - id: delegation_result_id
      labels:
        zh: 结果 ID
        en: result ID
        ja: 結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次受派方对委派过程的返回结果记录，而不是结果产物本身。
        en: Uniquely identifies one delegate return record for a delegation process, not the returned artifact itself.
        ja: 返却成果物そのものではなく、委任プロセスに対する一つの受任者返却記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-result-001
      source_claims:
        - claim-delegation-result-002
    - id: delegation_process_id
      labels:
        zh: 委派过程 ID
        en: delegation-process ID
        ja: 委任プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该返回记录的唯一委派过程。
        en: References the single delegation process that produced this return record.
        ja: この返却記録を生じさせた一つの委任プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:001
      source_claims:
        - claim-delegation-result-003
    - id: status
      labels:
        zh: 结果状态
        en: result status
        ja: 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该次返回是成功、部分完成、失败还是取消，且不得替代委派过程的当前生命周期状态。
        en: States whether this return succeeded, was partial, failed, or was canceled without replacing the delegation process's current lifecycle state.
        ja: この返却が成功、部分完了、失敗、取消のいずれかを示し、委任プロセスの現状態を置換しません。
      allowed_values: []
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-delegation-result-004
    - id: returned_at
      labels:
        zh: 返回时间
        en: returned at
        ja: 返却時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录受派方使该结果记录对委派方可用的 UTC 时刻。
        en: Records the UTC instant at which the delegate made this result record available to the delegator.
        ja: 受任者がこの結果記録を委任者に利用可能とした UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T02:00:00Z
      source_claims:
        - claim-delegation-result-005
    - id: artifact_refs
      labels:
        zh: 产物引用
        en: artifact references
        ja: 成果物参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用本次返回所交付的产物；产物内容与身份仍由 Artifact 节点承载。
        en: References artifacts delivered by this return; artifact content and identity remain on the Artifact nodes.
        ja: この返却で渡した成果物を参照し、内容と識別は Artifact ノード側に保持します。
      allowed_values: []
      pattern: null
      example_value:
        - Artifact:report
      source_claims:
        - claim-delegation-result-006
    - id: warning_refs
      labels:
        zh: 警告引用
        en: warning references
        ja: 警告参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用限制结果使用、完整性或可信度的警告记录。
        en: References warning records that qualify the result's use, completeness, or reliability.
        ja: 結果の利用、完全性、信頼性に条件を付ける警告記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - WarningEvent:001
      source_claims:
        - claim-delegation-result-007
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: 来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用能够追溯该结果由哪些执行、工具和输入生成的来源记录。
        en: References provenance that traces the executions, tools, and inputs from which the returned result was produced.
        ja: 返却結果を生成した実行、ツール、入力を追跡できる来歴記録を参照します。
      allowed_values: []
      pattern: null
      example_value: TraceRecord:delegation-001
      source_claims:
        - claim-delegation-result-008
  constraints: []
  required_relation_constraints:
    - id: result-part-of-process
      direction: incoming
      predicate: has_result_record
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationResult 必须通过 has_result_record 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationResult must preserve its instance-level has_result_record constraint with DelegationProcess.
        ja: DelegationResult は DelegationProcess とのインスタンスレベル has_result_record 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-result-009
examples:
  - id: DelegationResult-example-positive-manual-2026
    kind: positive
    labels:
      zh: 委派结果记录正例
      en: Positive delegation result record case
      ja: 委任結果記録の正例
    scenario_id: null
    descriptions:
      zh: 法规专家返回 partial 状态，引用报告草稿、两条警告和完整来源链；系统创建一个委派结果记录。
      en: A regulatory specialist returns partial status with a draft-report reference, two warnings, and provenance, producing one delegation result record.
      ja: 規制専門家が partial 状態、報告草案参照、二件の警告、来歴を返し、一件の委任結果記録が作られます。
    field_values:
      delegation_result_id: delegation-result-001
      delegation_process_id: DelegationProcess:001
      status: succeeded
      returned_at: 2026-07-15T02:00:00Z
      provenance_ref: TraceRecord:delegation-001
    related_node_ids:
      - DelegationResult
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_result_record-DelegationResult
    expected_result:
      zh: 该记录应被识别为 DelegationResult，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationResult with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationResult として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派结果记录是受派方针对一个委派过程返回的状态化输出说明。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation result record is a status-bearing account of output returned by the delegate for one delegation process."
      ja: この場面は次の同一性条件を満たします：委任結果記録は、一件の委任プロセスについて受任者が返す出力を状態付きで記述する情報記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-result-010
  - id: DelegationResult-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派结果记录边界例
      en: Boundary delegation result record case
      ja: 委任結果記録の境界例
    scenario_id: null
    descriptions:
      zh: report.pdf 是委派产物，但文件本身没有委派状态、返回时点或来源链，因此不是 DelegationResult。
      en: report.pdf is an artifact of delegated work but has no delegation status, return time, or provenance account, so it is not a DelegationResult.
      ja: report.pdf は委任成果物でも委任状態、返却時刻、来歴説明を持たないため DelegationResult ではありません。
    field_values: {}
    related_node_ids:
      - DelegationResult
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_result_record-DelegationResult
    expected_result:
      zh: 该对象不得被归为 DelegationResult，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationResult or acquire missing conditions from nearby facts.
      ja: この対象を DelegationResult に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除实际报告文件、运行日志和表示委派生命周期已完成的 CompletionPhase。
      en: "The case violates this reviewed exclusion boundary: Excludes the report artifact itself, runtime logs, and CompletionPhase as lifecycle state."
      ja: この例は審査済み除外境界に反します：報告成果物そのもの、実行ログ、ライフサイクル状態 CompletionPhase を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-result-011
