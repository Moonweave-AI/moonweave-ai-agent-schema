schema: moonweave.ai/ontology-node/v1
id: DelegationResult
kind: concept
labels:
  zh: 委派结果记录
  en: delegation result record
  ja: 委任結果記録
semantics:
  short_definition:
    zh: 受派方针对一次委派过程返回的状态化输出记录。
    en: Status-bearing output record returned by the delegate for one delegation process.
    ja: 一件の delegation process について delegate が返す status 付き output record。
  definition:
    zh: DelegationResult 以 delegation_result_id、status、artifact_refs 与 returned_at 记录受派方输出。A2A Task artifact、Cursor Task 最终返回文本、CrewAI task output 均投影为此记录；DelegationContext 是输入侧，DelegationResult 是输出侧。它不是 DelegationEvent。
    en: DelegationResult records delegate output via delegation_result_id, status, artifact_refs, and returned_at. A2A Task artifacts, Cursor Task final text, and CrewAI task output project here; DelegationContext is input-side, DelegationResult is output-side. It is not DelegationEvent.
    ja: DelegationResult は delegate output を記録。A2A artifact/Cursor 最終返却/CrewAI output が写像。入力 DelegationContext と出力 DelegationResult を分離。
  why_needed:
    zh: 为委派过程提供可审计的返回物与状态，供发起方继续或验收。
    en: Provides auditable return payload and status for initiator continuation or acceptance.
    ja: initiator の継続/acceptance のため auditable return を提供。
  includes:
    - zh: 纳入与一个委派过程关联、说明成功、部分、失败或取消返回并引用证据的记录。
      en: Includes records tied to one delegation process that describe successful, partial, failed, or canceled return with evidence references.
      ja: 一件の委任プロセスに結び付き、成功、部分、失敗、取消の返却と証拠参照を示す記録を含みます。
  excludes:
    - zh: 排除实际报告文件、运行日志和表示委派生命周期已完成的 CompletionPhase。
      en: Excludes the report artifact itself, runtime logs, and CompletionPhase as lifecycle state.
      ja: 報告成果物そのもの、実行ログ、ライフサイクル状態 CompletionPhase を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A Task history 中 artifact parts → DelegationResult.artifact_refs；Cursor Task 最终 message → DelegationResult；CrewAI Task.output → DelegationResult。与 CompletionPhase 事件成对出现。
    en: A2A Task history artifact parts → DelegationResult.artifact_refs; Cursor Task final message → DelegationResult; CrewAI Task.output → DelegationResult. Pairs with CompletionPhase event.
    ja: A2A artifact/Cursor 最終 message/CrewAI output → DelegationResult。CompletionPhase event と対に。
  typical_input:
    - description: A2A Task artifact.
      format: '{ "artifacts": [{ "parts": [{"kind":"text","text":"..."}] }] }'
      source_claims:
        - claim-delegation-result-design
  typical_output:
    - description: Moonweave DelegationResult.
      format: '{"delegation_result_id":"result-17","status":"succeeded","returned_at":"..."}'
      source_claims:
        - claim-delegation-result-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - delegation_result_id
  fields:
    - id: delegation_result_id
      labels:
        zh: 结果 ID
        en: result ID
        ja: 結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次受派方对委派过程的返回结果记录，而不是结果产物本身。
        en: Uniquely identifies one delegate return record for a delegation process, not the returned artifact itself.
        ja: 返却成果物そのものではなく、委任プロセスに対する一つの受任者返却記録を一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-result-001
      source_claims:
        - claim-delegation-result-design
    - id: delegation_process_id
      labels:
        zh: 委派过程 ID
        en: delegation-process ID
        ja: 委任プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该返回记录的唯一委派过程。
        en: References the single delegation process that produced this return record.
        ja: この返却記録を生じさせた一つの委任プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:001
      source_claims:
        - claim-delegation-result-design
    - id: status
      labels:
        zh: 结果状态
        en: result status
        ja: 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该次返回是成功、部分完成、失败还是取消，且不得替代委派过程的当前生命周期状态。
        en: States whether this return succeeded, was partial, failed, or was canceled without replacing the delegation process's current lifecycle state.
        ja: この返却が成功、部分完了、失敗、取消のいずれかを示し、委任プロセスの現状態を置換しません。
      allowed_values: []
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-delegation-result-design
    - id: returned_at
      labels:
        zh: 返回时间
        en: returned at
        ja: 返却時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录受派方使该结果记录对委派方可用的 UTC 时刻。
        en: Records the UTC instant at which the delegate made this result record available to the delegator.
        ja: 受任者がこの結果記録を委任者に利用可能とした UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T02:00:00Z
      source_claims:
        - claim-delegation-result-design
    - id: artifact_refs
      labels:
        zh: 产物引用
        en: artifact references
        ja: 成果物参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用本次返回所交付的产物；产物内容与身份仍由 Artifact 节点承载。
        en: References artifacts delivered by this return; artifact content and identity remain on the Artifact nodes.
        ja: この返却で渡した成果物を参照し、内容と識別は Artifact ノード側に保持します。
      allowed_values: []
      pattern: null
      example_value:
        - Artifact:report
      source_claims:
        - claim-delegation-result-design
    - id: warning_refs
      labels:
        zh: 警告引用
        en: warning references
        ja: 警告参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 引用限制结果使用、完整性或可信度的警告记录。
        en: References warning records that qualify the result's use, completeness, or reliability.
        ja: 結果の利用、完全性、信頼性に条件を付ける警告記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - WarningEvent:001
      source_claims:
        - claim-delegation-result-design
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: 来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用能够追溯该结果由哪些执行、工具和输入生成的来源记录。
        en: References provenance that traces the executions, tools, and inputs from which the returned result was produced.
        ja: 返却結果を生成した実行、ツール、入力を追跡できる来歴記録を参照します。
      allowed_values: []
      pattern: null
      example_value: TraceRecord:delegation-001
      source_claims:
        - claim-delegation-result-design
  constraints: []
  required_relation_constraints:
    - id: result-part-of-process
      direction: incoming
      predicate: has_result_record
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationResult 必须通过 has_result_record 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationResult must preserve its instance-level has_result_record constraint with DelegationProcess.
        ja: DelegationResult は DelegationProcess とのインスタンスレベル has_result_record 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-result-design
examples:
  - id: DelegationResult-example-a2a-artifact
    labels:
      zh: A2A artifact 结果
      en: A2A artifact result
      ja: A2A artifact result
    descriptions:
      zh: 远程 billing agent 返回 refund-approved artifact。
      en: Remote billing agent returns refund-approved artifact.
      ja: Remote billing agent refund-approved artifact。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Artifact
    field_values:
      delegation_result_id: result-a2a-884
      status: succeeded
    related_node_ids:
      - DelegationResult
      - CompletionPhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-result-design
  - id: DelegationResult-example-cursor-final
    labels:
      zh: Cursor Task 最终结果
      en: Cursor Task final result
      ja: Cursor Task final result
    descriptions:
      zh: explore 子代理返回法规审查报告。
      en: Explore subagent returns regulatory review report.
      ja: Explore subagent regulation review report。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task result
    field_values:
      delegation_result_id: result-cursor-9
      status: succeeded
    related_node_ids:
      - DelegationResult
    related_relation_ids: []
    source_claims:
      - claim-delegation-result-design
  - id: DelegationResult-example-crewai-output
    labels:
      zh: CrewAI 输出
      en: CrewAI output
      ja: CrewAI output
    descriptions:
      zh: Researcher 返回 benchmark 数据作为 task output。
      en: Researcher returns benchmark data as task output.
      ja: Researcher benchmark data task output。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Task.output
    field_values:
      delegation_result_id: result-crew-3
      status: succeeded
    related_node_ids:
      - DelegationResult
    related_relation_ids: []
    source_claims:
      - claim-delegation-result-design
  - id: DelegationResult-example-boundary-context
    labels:
      zh: 上下文不是结果
      en: Context is not result
      ja: context は result ではない
    descriptions:
      zh: DelegationContext 记录输入引用集合，不能当作 DelegationResult。
      en: DelegationContext records input reference set and is not DelegationResult.
      ja: DelegationContext は input で DelegationResult ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationResult
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-delegation-result-design
parent_relation:
  id: DelegationProcess-has_result_record-DelegationResult
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has result record
    en: has result record
    ja: has result record
  definitions:
    zh: 委派过程以组成关系拥有描述受派方返回状态、产物和来源的结果记录。
    en: A delegation process compositionally contains result records describing delegate return status, artifacts, and provenance.
    ja: 委任プロセスは受任者の返却状態、成果物、来歴を示す結果記録を構成要素として持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其结果记录
      en: result record of
      ja: 結果記録である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-result-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-delegation-result-design
    source: delegation-handoff-design
    supports: DelegationResult is output-side record separate from DelegationContext.
    locator: DelegationResult boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-result-design
    source: a2a-protocol
    supports: A2A Task artifacts map to DelegationResult.
    locator: Artifact model
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-result-design
    source: cursor-task-tool
    supports: Cursor Task final return maps to DelegationResult.
    locator: Task result
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-result-design
    source: crewai
    supports: CrewAI task output maps to DelegationResult.
    locator: Task output
    evidence_kind: design-inference
    confidence: high
