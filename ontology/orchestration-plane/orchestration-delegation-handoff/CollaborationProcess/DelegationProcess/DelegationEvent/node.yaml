schema: moonweave.ai/ontology-node/v1
id: DelegationEvent
kind: concept
labels:
  zh: 委派状态事件
  en: delegation state event
  ja: 委任状態イベント
semantics:
  short_definition:
    zh: 使委派生命周期状态在特定时点生效的可追踪事件。
    en: Traceable event that makes one delegation lifecycle state effective at a particular time.
    ja: 特定時点で delegation lifecycle state を有効にする traceable event。
  definition:
    zh: DelegationEvent 记录 delegation_event_id、event_kind、sequence、actor 与 effective_at，是 DelegationPhase 的生效证据。A2A Task 状态转换（submitted、working、completed、canceled）、Cursor Task 完成回调与 CrewAI task 执行边界均应投影为 DelegationEvent，而不是覆盖 DelegationProcess 上的单一 status。事件不是过程、阶段或结果本身。
    en: DelegationEvent records delegation_event_id, event_kind, sequence, actor, and effective_at as effectiveness evidence for DelegationPhase. A2A Task state transitions (submitted, working, completed, canceled), Cursor Task completion callbacks, and CrewAI task execution boundaries should project to DelegationEvent rather than overwriting a single status on DelegationProcess. An event is not the process, phase, or result itself.
    ja: DelegationEvent は event_kind/sequence/actor/effective_at で DelegationPhase 発効証拠を記録します。A2A Task state transition が典型例です。
  why_needed:
    zh: 提供状态变化的证据与排序，使当前状态可由事件链重建。
    en: Supplies evidence and ordering for state changes so current state can be reconstructed from an event chain.
    ja: state change の evidence/order を提供し event chain から current state を再構成可能にします。
  includes:
    - zh: 纳入明确对应一个委派过程、一个生命周期状态和一个生效时点的发起、接受、撤销或完成事件。
      en: Includes initiation, acceptance, revocation, or completion events tied to one delegation process, one lifecycle state, and an effective time.
      ja: 一件の委任プロセス、一つのライフサイクル状態、有効時刻に結び付く開始、受諾、取消、完了イベントを含みます。
  excludes:
    - zh: 排除一般日志行、工作者选择事件、Handoff 控制移交事件以及没有生命周期效力的消息。
      en: Excludes generic log lines, worker-selection records, Handoff control-transfer events, and messages with no lifecycle effect.
      ja: 一般ログ行、作業者選択記録、Handoff 制御移転イベント、ライフサイクル効力を持たないメッセージを除外します。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: A2A Task.status.state 每次变更 append 一条 DelegationEvent；Cursor Task 启动/完成/失败映射 initiated/completed/revocation 类事件；禁止原地修改 phase 而无事件。WorkerSelection 与 Handoff 事件使用各自概念，不混入 DelegationEvent。
    en: Each A2A Task.status.state change appends one DelegationEvent; Cursor Task start/complete/fail map to initiated/completed/revocation-like events; do not mutate phase in place without events. WorkerSelection and Handoff events use their own concepts, not DelegationEvent.
    ja: A2A Task.status.state 変更ごとに DelegationEvent を append。WorkerSelection/Handoff event は別 concept。
  typical_input:
    - description: A2A Task state transition.
      format: '{"taskId":"task-884","status":{"state":"working","timestamp":"..."}}'
      source_claims:
        - claim-delegation-event-design
  typical_output:
    - description: Moonweave DelegationEvent record.
      format: '{"delegation_event_id":"delegation-event-004","event_kind":"accepted","sequence":2}'
      source_claims:
        - claim-delegation-event-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - delegation_event_id
  fields:
    - id: delegation_event_id
      labels:
        zh: 事件 ID
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次使委派生命周期状态生效的事件。
        en: Uniquely identifies one event that makes a delegation lifecycle state effective.
        ja: 委任ライフサイクル状態を発効させる一つのイベントを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-event-004
      source_claims:
        - claim-delegation-event-design
    - id: delegation_process_id
      labels:
        zh: 委派过程 ID
        en: delegation-process ID
        ja: 委任プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用状态被该事件改变的唯一委派过程。
        en: References the single delegation process whose lifecycle state is changed by this event.
        ja: このイベントでライフサイクル状態が変わる一つの委任プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:001
      source_claims:
        - claim-delegation-event-design
    - id: event_kind
      labels:
        zh: 事件种类
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明事件使 initiated、accepted、revoked 或 completed 中哪一种委派状态生效。
        en: Identifies which delegation transition—initiated, accepted, revoked, or completed—the event makes effective.
        ja: イベントが initiated、accepted、revoked、completed のどの委任遷移を発効させるかを示します。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-event-design
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该生命周期变化生效的 UTC 时刻，而不是稍后的日志写入时间。
        en: Records the UTC instant at which the lifecycle change became effective, not a later log-ingestion time.
        ja: 後続のログ取込時刻ではなく、ライフサイクル変更が発効した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:15:00Z
      source_claims:
        - claim-delegation-event-design
    - id: sequence_index
      labels:
        zh: 序号
        en: sequence index
        ja: 順序番号
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出该事件在同一委派过程事件链中的单调递增序号。
        en: Gives the event's monotonically increasing position within the event chain of the same delegation process.
        ja: 同一委任プロセスのイベント列における単調増加の順序位置を示します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-delegation-event-design
    - id: actor_id
      labels:
        zh: 行动者 ID
        en: actor ID
        ja: 実行者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用作出或授权该状态变化的主体，而不是仅记录事件的观察者。
        en: References the actor that issued or authorized the state change, rather than an observer that merely logged it.
        ja: イベントを記録した観測者ではなく、状態変更を発行または認可した主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-event-design
    - id: supersedes_event_id
      labels:
        zh: 取代事件 ID
        en: superseded event ID
        ja: 置換イベント ID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在纠正或替代先前生命周期事件时引用被取代事件；普通后继事件不使用该字段。
        en: References a prior lifecycle event only when this event corrects or replaces it; ordinary succession does not use this field.
        ja: 先行ライフサイクルイベントを訂正または置換する場合だけ参照し、通常の後続には用いません。
      allowed_values: []
      pattern: null
      example_value: DelegationEvent:003
      source_claims:
        - claim-delegation-event-design
  constraints:
    - id: delegation-event-ordered-transition
      severity: error
      expression_language: plain
      expression: sequence_index is non-negative and event_kind follows an allowed delegation transition
      explanations:
        zh: 序号非负且事件种类必须形成合法委派转换。
        en: Delegation events use a non-negative sequence and an allowed transition.
        ja: 委任イベントは非負の順序と許可済み遷移に従います。
      source_claims:
        - claim-delegation-event-design
  required_relation_constraints:
    - id: event-belongs-to-process
      direction: incoming
      predicate: has_event
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationEvent 必须通过 has_event 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationEvent must preserve its instance-level has_event constraint with DelegationProcess.
        ja: DelegationEvent は DelegationProcess とのインスタンスレベル has_event 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-event-design
    - id: event-establishes-state
      direction: outgoing
      predicate: records_phase
      target_concept_id: DelegationPhase
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationEvent 必须通过 records_phase 保持与 DelegationPhase 的实例级语义约束。
        en: DelegationEvent must preserve its instance-level records_phase constraint with DelegationPhase.
        ja: DelegationEvent は DelegationPhase とのインスタンスレベル records_phase 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-event-design
examples:
  - id: DelegationEvent-example-a2a-submitted
    labels:
      zh: A2A submitted 事件
      en: A2A submitted event
      ja: A2A submitted event
    descriptions:
      zh: tasks/send 返回 submitted 状态，记录 InitiationPhase 生效事件。
      en: tasks/send returns submitted state, recording InitiationPhase effectiveness event.
      ja: tasks/send submitted が InitiationPhase 発効 event を記録。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskState submitted
    field_values:
      delegation_event_id: delegation-event-001
      event_kind: initiated
      sequence: 1
    related_node_ids:
      - DelegationEvent
      - InitiationPhase
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-design
  - id: DelegationEvent-example-a2a-completed
    labels:
      zh: A2A completed 事件
      en: A2A completed event
      ja: A2A completed event
    descriptions:
      zh: 远程 agent 返回 completed 与 artifact，记录 CompletionPhase 事件。
      en: Remote agent returns completed with artifact, recording CompletionPhase event.
      ja: Remote agent completed + artifact が CompletionPhase event。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskState completed
    field_values:
      delegation_event_id: delegation-event-004
      event_kind: completed
      sequence: 4
    related_node_ids:
      - DelegationEvent
      - CompletionPhase
      - DelegationResult
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-design
  - id: DelegationEvent-example-cursor-complete
    labels:
      zh: Cursor Task 完成事件
      en: Cursor Task completion event
      ja: Cursor Task completion event
    descriptions:
      zh: 子代理 Task 返回结果，父代理记录 completed 事件并关联 DelegationResult。
      en: Subagent Task returns result; parent records completed event linked to DelegationResult.
      ja: Subagent Task 結果返却で completed event が DelegationResult にリンク。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task completion
    field_values:
      delegation_event_id: delegation-event-cursor-9
      event_kind: completed
      sequence: 3
    related_node_ids:
      - DelegationEvent
      - DelegationResult
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-design
  - id: DelegationEvent-example-boundary-log
    labels:
      zh: 普通日志不是事件
      en: Generic log is not event
      ja: generic log は event ではない
    descriptions:
      zh: 无 lifecycle 效力的一般日志行或 Handoff 控制转移不构成 DelegationEvent。
      en: Generic log lines or Handoff control transfers without lifecycle effect are not DelegationEvent.
      ja: lifecycle 効力のない generic log や Handoff transfer は DelegationEvent ではありません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationEvent
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-design
parent_relation:
  id: DelegationProcess-has_event-DelegationEvent
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: has event
    en: has event
    ja: has event
  definitions:
    zh: 委派过程拥有记录其生命周期状态生效的有序委派事件。
    en: A delegation process has ordered delegation events that establish the effective states of its lifecycle.
    ja: 委任プロセスはライフサイクル状態を有効化する順序付き委任イベントを持ちます。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是委派事件
      en: event of delegation
      ja: 委任イベントである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: DelegationEvent-records_phase-DelegationPhase
    predicate: records_phase
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records phase
      en: records phase
      ja: records phase
    definitions:
      zh: 每个委派状态事件记录它使之生效的唯一委派生命周期状态。
      en: Each delegation state event records the one delegation lifecycle state that it makes effective.
      ja: 各委任状態イベントは自身が有効化する一つの委任ライフサイクル状態を記録します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: recorded_by_event
      labels:
        zh: 由事件记录
        en: recorded by event
        ja: イベントに記録される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DelegationPhase
