    locator: DelegationEvent boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-event-design
    source: a2a-protocol
    supports: A2A Task state transitions map to DelegationEvent sequence.
    locator: TaskState lifecycle
    evidence_kind: design-inference
    confidence: high
  - id: claim-delegation-event-design
    source: cursor-task-tool
    supports: Cursor Task lifecycle boundaries map to DelegationEvent.
    locator: Task tool lifecycle
    evidence_kind: design-inference
    confidence: high
