schema: moonweave.ai/ontology-node/v1
id: DelegationEvent
kind: concept
labels:
  zh: 委派状态事件
  en: delegation state event
  ja: 委任状態イベント
semantics:
  short_definition:
    zh: 在特定时点使委派生命周期状态生效的可追踪事件。
    en: Event that activates a delegation lifecycle state at a point in time.
    ja: 特定時点で委任ライフサイクル状態を有効化する追跡可能イベント。
  definition:
    zh: 委派状态事件是使一个委派生命周期状态在特定时点生效的可追踪事件。 事件记录过程标识、事件种类、顺序、行动者和生效时间；事件不是过程、状态或结果的别名。
    en: A delegation state event is a traceable event that makes one delegation lifecycle state effective at a particular time. The event records process identity, event kind, sequence, actor, and effective time; it is not an alias for the process, state, or result.
    ja: 委任状態イベントは、特定時点で一つの委任ライフサイクル状態を有効にする追跡可能なイベントです。 プロセス ID、イベント種別、順序、実行者、有効時刻を記録し、プロセス、状態、結果の別名ではありません。
  why_needed:
    zh: 该节点提供状态变化的证据和排序依据，使当前状态可以重建而不靠覆盖字段。
    en: The node supplies evidence and ordering for state change, allowing current state to be reconstructed without overwriting history.
    ja: 状態変化の証拠と順序を提供し、履歴を上書きせず現在状態を再構成できます。
  includes:
    - zh: 纳入明确对应一个委派过程、一个生命周期状态和一个生效时点的发起、接受、撤销或完成事件。
      en: Includes initiation, acceptance, revocation, or completion events tied to one delegation process, one lifecycle state, and an effective time.
      ja: 一件の委任プロセス、一つのライフサイクル状態、有効時刻に結び付く開始、受諾、取消、完了イベントを含みます。
  excludes:
    - zh: 排除一般日志行、工作者选择事件、Handoff 控制移交事件以及没有生命周期效力的消息。
      en: Excludes generic log lines, worker-selection records, Handoff control-transfer events, and messages with no lifecycle effect.
      ja: 一般ログ行、作業者選択記録、Handoff 制御移転イベント、ライフサイクル効力を持たないメッセージを除外します。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationEvent append-only 写入 delegation_process_id 时间线；Orchestrator 或 delegate 回调在
      Initiation/Acceptance/Revocation/Completion 时点产生。A2A TaskStatusUpdateEvent 可经适配器投影为
      event_kind，但不覆盖本地 sequence 与 actor_binding_ref。
    en: >-
      DelegationEvent append-only writes to delegation_process_id timeline; orchestrator or delegate callbacks emit at
      Initiation, Acceptance, Revocation, or Completion. A2A TaskStatusUpdateEvent may project as event_kind via adapter
      without overwriting local sequence and actor_binding_ref.
    ja: >-
      DelegationEvent は delegation_process_id timeline に append-only で書き込む。orchestrator または delegate callback が
      Initiation/Acceptance/Revocation/Completion 時点で emit する。A2A TaskStatusUpdateEvent は adapter 経由で event_kind に
      project できるが local sequence と actor_binding_ref を上書きしない。
  typical_input:
    - description:
        zh: 使委派生命周期状态生效的事件载荷。
        en: Event payload making one delegation lifecycle state effective.
        ja: delegation lifecycle state を effective にする event payload。
      format: |-
        {"delegation_event_id":"deleg-event-accept-884","delegation_process_ref":"deleg-proc-884","event_kind":"acceptance","sequence":2,"actor_binding_ref":"binding-agent-auditor-3","effective_at":"2026-07-16T09:05:00Z"}
  typical_output:
    - description:
        zh: 更新 DelegationPhase 的 append-only 事件记录。
        en: Append-only event record updating DelegationPhase.
        ja: DelegationPhase を更新する append-only event record。
      format: |-
        {"delegation_event_ref":"deleg-event-accept-884","new_phase":"AcceptancePhase","delegation_process_ref":"deleg-proc-884"}
  reference_implementations:
    - name: A2A Task status updates
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol status events mappable to delegation lifecycle events.
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents acceptance and completion in delegated workflows.
    - name: A2A life of a task
      url: https://a2a-protocol.org/latest/topics/life-of-a-task/
      description: Documents task lifecycle transitions distinct from local delegation events.
  source_claims:
    - claim-delegation-event-001
    - claim-delegation-event-002
structure:
  identity_keys:
    - delegation_event_id
  fields:
    - id: delegation_event_id
      labels:
        zh: 事件 ID
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次使委派生命周期状态生效的事件。
        en: Uniquely identifies one event that makes a delegation lifecycle state effective.
        ja: 委任ライフサイクル状態を発効させる一つのイベントを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-event-004
      source_claims:
        - claim-delegation-event-002
    - id: delegation_process_id
      labels:
        zh: 委派过程 ID
        en: delegation-process ID
        ja: 委任プロセス ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用状态被该事件改变的唯一委派过程。
        en: References the single delegation process whose lifecycle state is changed by this event.
        ja: このイベントでライフサイクル状態が変わる一つの委任プロセスを参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationProcess:001
      source_claims:
        - claim-delegation-event-003
    - id: event_kind
      labels:
        zh: 事件种类
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明事件使 initiated、accepted、revoked 或 completed 中哪一种委派状态生效。
        en: Identifies which delegation transition—initiated, accepted, revoked, or completed—the event makes effective.
        ja: イベントが initiated、accepted、revoked、completed のどの委任遷移を発効させるかを示します。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-delegation-event-004
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该生命周期变化生效的 UTC 时刻，而不是稍后的日志写入时间。
        en: Records the UTC instant at which the lifecycle change became effective, not a later log-ingestion time.
        ja: 後続のログ取込時刻ではなく、ライフサイクル変更が発効した UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:15:00Z
      source_claims:
        - claim-delegation-event-005
    - id: sequence_index
      labels:
        zh: 序号
        en: sequence index
        ja: 順序番号
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出该事件在同一委派过程事件链中的单调递增序号。
        en: Gives the event's monotonically increasing position within the event chain of the same delegation process.
        ja: 同一委任プロセスのイベント列における単調増加の順序位置を示します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-delegation-event-006
    - id: actor_id
      labels:
        zh: 行动者 ID
        en: actor ID
        ja: 実行者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用作出或授权该状态变化的主体，而不是仅记录事件的观察者。
        en: References the actor that issued or authorized the state change, rather than an observer that merely logged it.
        ja: イベントを記録した観測者ではなく、状態変更を発行または認可した主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-event-007
    - id: supersedes_event_id
      labels:
        zh: 取代事件 ID
        en: superseded event ID
        ja: 置換イベント ID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在纠正或替代先前生命周期事件时引用被取代事件；普通后继事件不使用该字段。
        en: References a prior lifecycle event only when this event corrects or replaces it; ordinary succession does not use this field.
        ja: 先行ライフサイクルイベントを訂正または置換する場合だけ参照し、通常の後続には用いません。
      allowed_values: []
      pattern: null
      example_value: DelegationEvent:003
      source_claims:
        - claim-delegation-event-008
  constraints:
    - id: delegation-event-ordered-transition
      severity: error
      expression_language: plain
      expression: sequence_index is non-negative and event_kind follows an allowed delegation transition
      explanations:
        zh: 序号非负且事件种类必须形成合法委派转换。
        en: Delegation events use a non-negative sequence and an allowed transition.
        ja: 委任イベントは非負の順序と許可済み遷移に従います。
      source_claims:
        - claim-delegation-event-009
  required_relation_constraints:
    - id: event-belongs-to-process
      direction: incoming
      predicate: has_event
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationEvent 必须通过 has_event 保持与 DelegationProcess 的实例级语义约束。
        en: DelegationEvent must preserve its instance-level has_event constraint with DelegationProcess.
        ja: DelegationEvent は DelegationProcess とのインスタンスレベル has_event 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-event-010
    - id: event-establishes-state
      direction: outgoing
      predicate: records_phase
      target_concept_id: DelegationPhase
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: DelegationEvent 必须通过 records_phase 保持与 DelegationPhase 的实例级语义约束。
        en: DelegationEvent must preserve its instance-level records_phase constraint with DelegationPhase.
        ja: DelegationEvent は DelegationPhase とのインスタンスレベル records_phase 制約を保持しなければなりません。
      source_claims:
        - claim-delegation-event-011
examples:
  - id: DelegationEvent-example-positive-manual-2026
    labels:
      zh: DelegationEvent positive
      en: DelegationEvent positive
      ja: DelegationEvent positive
    descriptions:
      zh: A2A Protocol 映射 DelegationEvent：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps DelegationEvent: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol DelegationEvent: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {delegation_event_id: delegation-event-004, delegation_process_id: DelegationProcess:001, event_kind: accepted, occurred_at: 2026-07-15T01:15:00Z, sequence_index: 2, actor_id: Actor:worker-007}

    related_node_ids:
      - DelegationEvent
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_event-DelegationEvent
    source_claims:
      - claim-delegation-event-012

  - id: DelegationEvent-example-boundary-manual-2026
    labels:
      zh: DelegationEvent boundary
      en: DelegationEvent boundary
      ja: DelegationEvent boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 DelegationEvent 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not DelegationEvent delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で DelegationEvent delegation spec ではない。
    field_values: {}

    related_node_ids:
      - DelegationEvent
      - DelegationProcess
    related_relation_ids:
      - DelegationProcess-has_event-DelegationEvent
    source_claims:
      - claim-delegation-event-013

  - id: DelegationEvent-example-counterexample-confusable
    labels:
      zh: DelegationEvent counterexample
      en: DelegationEvent counterexample
      ja: DelegationEvent counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 DelegationEvent TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style DelegationEvent TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 DelegationEvent ではない。
    field_values: {delegation_event_id: absent, delegation_process_ref: absent, phase_kind: absent}

    related_node_ids:
      - DelegationEvent
      - A2ATaskStatusUpdateEvent
      - DelegationPhase
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-012

  - id: DelegationEvent-example-instance-concrete
    labels:
      zh: DelegationEvent instance
      en: DelegationEvent instance
      ja: DelegationEvent instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 DelegationEvent A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to DelegationEvent A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が DelegationEvent A2ATask に写像。
    field_values: {delegation_event_id: delegation-event-004, delegation_process_id: DelegationProcess:001, event_kind: accepted, occurred_at: 2026-07-15T01:15:00Z, sequence_index: 2, actor_id: Actor:worker-007}

    related_node_ids:
      - DelegationEvent
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-event-012

