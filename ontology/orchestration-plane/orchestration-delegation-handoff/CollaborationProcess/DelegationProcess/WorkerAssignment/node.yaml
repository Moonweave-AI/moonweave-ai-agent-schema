schema: moonweave.ai/ontology-node/v1
id: WorkerAssignment
kind: concept
status: review
labels:
  zh: 工作分派活动
  en: worker-assignment activity
  ja: 作業割当活動
semantics:
  short_definition:
    zh: 工作分派活动是把已选角色绑定为特定工作项执行者并使该绑定生效的活动。
    en: A worker-assignment activity makes the selected role binding effective as the performer of a specific work item.
    ja: 作業割当活動は、選択済み役割バインディングを特定作業項目の実行者として有効化する活動です。
  definition:
    zh: 工作分派活动是把已选角色绑定为特定工作项执行者并使该绑定生效的活动。 它发生在选择决定之后，写入工作项—角色绑定和委派归属记录，但不重新评估候选能力。
    en: A worker-assignment activity makes the selected role binding effective as the performer of a specific work item. It occurs after the selection decision, records the work-item-to-role binding and delegation ownership, and does not re-evaluate candidates.
    ja: 作業割当活動は、選択済み役割バインディングを特定作業項目の実行者として有効化する活動です。 選択決定後に作業項目—役割バインディングと委任帰属を記録し、候補能力を再評価しません。
  why_needed:
    zh: 选择谁与真正把工作交给谁是两个不同事实；该节点记录后者的生效动作。
    en: Choosing a worker and making that worker's assignment effective are different facts; this node records the latter action.
    ja: 誰を選ぶかと、実際に誰へ作業を割り当てるかは別事実であり、このノードは後者の有効化を記録します。
  includes:
    - zh: 纳入将一个 WorkItem 与一个 ActorRoleBinding 关联并写入生效时间的分派动作。
      en: Includes an assignment action that binds one WorkItem to one ActorRoleBinding with an effective time.
      ja: 一件の WorkItem を一つの ActorRoleBinding へ有効時刻付きで結び付ける割当動作を含みます。
  excludes:
    - zh: 排除仅推荐候选、仅创建未指派工作项，或把同一工作复制给所有候选的广播。
      en: Excludes candidate recommendations, unassigned work-item creation, and broadcasting the same work to every candidate.
      ja: 候補推薦、未割当作業項目の作成、同一作業を全候補へ配信する行為を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - assignment_activity_id
  fields:
    - id: assignment_activity_id
      labels:
        zh: 分派活动 ID
        en: assignment-activity ID
        ja: 割当活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作绑定生效活动。
        en: Uniquely identifies one work-binding activation activity.
        ja: 一件の作業バインディング有効化活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: worker-assignment-5
      source_claims:
        - claim-worker-assignment-002
    - id: decision_activity_id
      labels:
        zh: 选择决定
        en: selection decision
        ja: 選択決定
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向授权本次分派的选择决定活动。
        en: References the selection-decision activity authorizing the assignment.
        ja: この割当を承認する選択決定活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:selection-decision-3
      source_claims:
        - claim-worker-assignment-003
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被分派的单一工作项。
        en: References the single work item being assigned.
        ja: 割り当てられる一件の作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-worker-assignment-004
    - id: assignee_binding_id
      labels:
        zh: 受派角色绑定
        en: assignee role binding
        ja: 割当先役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向开始承担工作项的角色绑定。
        en: References the role binding that begins bearing the work item.
        ja: 作業項目を担い始める役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-worker-assignment-005
    - id: assigned_at
      labels:
        zh: 分派生效时间
        en: assigned at
        ja: 割当有効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录工作项绑定生效的时间。
        en: Records when the work-item binding became effective.
        ja: 作業項目バインディングが有効になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:40Z
      source_claims:
        - claim-worker-assignment-006
  constraints: []
  required_relation_constraints:
    - id: assignment-phase-of-delegation
      direction: outgoing
      predicate: phase_of
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 phase_of 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level phase_of constraint with DelegationProcess.
        ja: WorkerAssignment は DelegationProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-007
    - id: assignment-produces-ownership
      direction: outgoing
      predicate: produces
      target_concept_id: DelegationOwnership
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 produces 保持与 DelegationOwnership 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level produces constraint with DelegationOwnership.
        ja: WorkerAssignment は DelegationOwnership とのインスタンスレベル produces 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-008
examples:
  - id: WorkerAssignment-example-positive-manual-2026
    kind: positive
    labels:
      zh: 工作分派活动正例
      en: Positive worker-assignment activity case
      ja: 作業割当活動の正例
    scenario_id: null
    descriptions:
      zh: 选择决定完成后，系统把 work-item-42 绑定到已选法规专家的角色绑定并记录生效时间。
      en: After selection, the system binds work-item-42 to the chosen regulatory specialist's role binding and records the effective time.
      ja: 選択後、システムが work-item-42 を選択済み規制専門家の役割バインディングへ結び付け、有効時刻を記録します。
    field_values:
      assignment_activity_id: worker-assignment-5
      decision_activity_id: WorkerSelectionDecisionActivity:selection-decision-3
      work_item_id: WorkItem:42
      assignee_binding_id: ActorRoleBinding:regulatory-7
      assigned_at: 2026-07-16T01:00:40Z
    related_node_ids:
      - WorkerAssignment
      - DelegationProcess
    related_relation_ids:
      - WorkerAssignment-phase_of-DelegationProcess
    expected_result:
      zh: 该记录应被识别为 WorkerAssignment，并保留其字段、边界与上位关系。
      en: The record is accepted as WorkerAssignment with its fields, boundary, and parent relation preserved.
      ja: この記録を WorkerAssignment として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 工作分派活动是把已选角色绑定为特定工作项执行者并使该绑定生效的活动。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A worker-assignment activity makes the selected role binding effective as the performer of a specific work item."
      ja: この場面は次の同一性条件を満たします：作業割当活動は、選択済み役割バインディングを特定作業項目の実行者として有効化する活動です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-assignment-009
  - id: WorkerAssignment-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 工作分派活动边界例
      en: Boundary worker-assignment activity case
      ja: 作業割当活動の境界例
    scenario_id: null
    descriptions:
      zh: 排名服务把专家列为第一名但没有写入工作项绑定；存在选择建议，不存在工作分派。
      en: A ranking service lists a specialist first but writes no work-item binding; a recommendation exists, but no assignment does.
      ja: 順位サービスが専門家を首位にしても作業項目バインディングを書かない場合、推薦はあっても割当はありません。
    field_values: {}
    related_node_ids:
      - WorkerAssignment
      - DelegationProcess
    related_relation_ids:
      - WorkerAssignment-phase_of-DelegationProcess
    expected_result:
      zh: 该对象不得被归为 WorkerAssignment，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as WorkerAssignment or acquire missing conditions from nearby facts.
      ja: この対象を WorkerAssignment に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除仅推荐候选、仅创建未指派工作项，或把同一工作复制给所有候选的广播。
      en: "The case violates this reviewed exclusion boundary: Excludes candidate recommendations, unassigned work-item creation, and broadcasting the same work to every candidate."
      ja: この例は審査済み除外境界に反します：候補推薦、未割当作業項目の作成、同一作業を全候補へ配信する行為を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-worker-assignment-010
