        ja: WorkerAssignment から DelegationProcess への phase_of 事実と限定情報を保存します。
      why_valid_or_invalid:
        zh: 场景直接满足关系定义：工作分派是委派过程的组成阶段，在选择决定之后使工作项与受派角色绑定正式生效；它不是工作者选择过程的一部分。
        en: "The case directly satisfies the relation definition: Worker assignment is a constituent phase of the delegation process that activates the work-item-to-delegate binding after selection; it is not part of the worker-selection process."
        ja: この例は関係定義を直接満たします：作業割当は選択決定後に作業項目と受任役割のバインディングを有効化する委任プロセスの構成段階で、作業者選択プロセスの一部ではありません。
