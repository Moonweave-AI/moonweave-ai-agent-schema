schema: moonweave.ai/ontology-node/v1
id: WorkerAssignment
kind: concept
labels:
  zh: 工作分派活动
  en: worker-assignment activity
  ja: 作業割当活動
semantics:
  short_definition:
    zh: 将已选工作者与具体工作项绑定并生效委派分派的活动。
    en: Activity that binds the selected worker to a concrete work item and makes delegation assignment effective.
    ja: selected worker を concrete work item に bind し delegation assignment を effective にする activity。
  definition:
    zh: WorkerAssignment 引用 WorkerSelectionDecisionActivity 产出，设置 assignee_binding_id 与 work_item_id，并产生 DelegationOwnership。Cursor Task 启动、A2A tasks/send 提交、CrewAI Task(agent=selected_worker) 均是 WorkerAssignment 的集成点；仅有 WorkerSelection 而无 binding 生效则未完成分派。
    en: WorkerAssignment references WorkerSelectionDecisionActivity output, sets assignee_binding_id and work_item_id, and produces DelegationOwnership. Cursor Task launch, A2A tasks/send submission, and CrewAI Task(agent=selected_worker) are integration points; WorkerSelection alone without effective binding is incomplete assignment.
    ja: WorkerAssignment → DelegationOwnership。Cursor Task launch/A2A tasks/send/CrewAI Task(agent=worker) が integration point。
  why_needed:
    zh: 把“选了谁”与“工作已绑定给谁”分开，使分派生效可审计。
    en: Separates who was chosen from whom work is bound for auditable effective assignment.
    ja: 選択と binding effective を分離し audit 可能に。
  includes:
    - zh: 纳入将一个 WorkItem 与一个 ActorRoleBinding 关联并写入生效时间的分派动作。
      en: Includes an assignment action that binds one WorkItem to one ActorRoleBinding with an effective time.
      ja: 一件の WorkItem を一つの ActorRoleBinding へ有効時刻付きで結び付ける割当動作を含みます。
  excludes:
    - zh: 排除仅推荐候选、仅创建未指派工作项，或把同一工作复制给所有候选的广播。
      en: Excludes candidate recommendations, unassigned work-item creation, and broadcasting the same work to every candidate.
      ja: 候補推薦、未割当作業項目の作成、同一作業を全候補へ配信する行為を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: WorkerAssignment.assigned_at 标记 binding 生效；随后 DelegationOwnership 记录 control/answer/result 责任分割。
    en: WorkerAssignment.assigned_at marks binding effective; DelegationOwnership then records control/answer/result responsibility split.
    ja: assigned_at で binding effective → DelegationOwnership。
  typical_input:
    - description: Assignment activity.
      format: '{"assignment_activity_id":"assign-884","assignee_binding_id":"ActorRoleBinding:billing-2","work_item_id":"WorkItem:42"}'
      source_claims:
        - claim-worker-assignment-design
  typical_output:
    - description: Moonweave WorkerAssignment.
      format: '{"assignment_activity_id":"assign-884"}'
      source_claims:
        - claim-worker-assignment-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - assignment_activity_id
  fields:
    - id: assignment_activity_id
      labels:
        zh: 分派活动 ID
        en: assignment-activity ID
        ja: 割当活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作绑定生效活动。
        en: Uniquely identifies one work-binding activation activity.
        ja: 一件の作業バインディング有効化活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: worker-assignment-5
      source_claims:
        - claim-worker-assignment-design
    - id: decision_activity_id
      labels:
        zh: 选择决定
        en: selection decision
        ja: 選択決定
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向授权本次分派的选择决定活动。
        en: References the selection-decision activity authorizing the assignment.
        ja: この割当を承認する選択決定活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:selection-decision-3
      source_claims:
        - claim-worker-assignment-design
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被分派的单一工作项。
        en: References the single work item being assigned.
        ja: 割り当てられる一件の作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-worker-assignment-design
    - id: assignee_binding_id
      labels:
        zh: 受派角色绑定
        en: assignee role binding
        ja: 割当先役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向开始承担工作项的角色绑定。
        en: References the role binding that begins bearing the work item.
        ja: 作業項目を担い始める役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-worker-assignment-design
    - id: assigned_at
      labels:
        zh: 分派生效时间
        en: assigned at
        ja: 割当有効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录工作项绑定生效的时间。
        en: Records when the work-item binding became effective.
        ja: 作業項目バインディングが有効になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:40Z
      source_claims:
        - claim-worker-assignment-design
  constraints: []
  required_relation_constraints:
    - id: assignment-phase-of-delegation
      direction: outgoing
      predicate: phase_of
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 phase_of 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level phase_of constraint with DelegationProcess.
        ja: WorkerAssignment は DelegationProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-design
    - id: assignment-produces-ownership
      direction: outgoing
      predicate: produces
      target_concept_id: DelegationOwnership
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 produces 保持与 DelegationOwnership 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level produces constraint with DelegationOwnership.
        ja: WorkerAssignment は DelegationOwnership とのインスタンスレベル produces 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-design
examples:
  - id: WorkerAssignment-example-cursor-task
    labels:
      zh: Cursor Task 分派
      en: Cursor Task assignment
      ja: Cursor Task assignment
    descriptions:
      zh: selection-001 后启动 explore Task 绑定 WorkItem:42。
      en: After selection-001, launch explore Task bound to WorkItem:42.
      ja: selection-001 後 explore Task → WorkItem:42。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task launch
    field_values:
      assignment_activity_id: assign-cursor-9
      work_item_id: WorkItem:42
    related_node_ids:
      - WorkerAssignment
      - DelegationOwnership
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-design
  - id: WorkerAssignment-example-a2a-send
    labels:
      zh: A2A tasks/send 分派
      en: A2A tasks/send assignment
      ja: A2A tasks/send assignment
    descriptions:
      zh: 选定 billing agent 后 POST tasks/send 绑定 refund work item。
      en: After selecting billing agent, POST tasks/send binds refund work item.
      ja: billing agent 選択後 tasks/send → refund work item。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: tasks/send
    field_values:
      assignment_activity_id: assign-a2a-884
    related_node_ids:
      - WorkerAssignment
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-design
  - id: WorkerAssignment-example-crewai
    labels:
      zh: CrewAI task 分派
      en: CrewAI task assignment
      ja: CrewAI task assignment
    descriptions:
      zh: Manager 将 Task 绑定 researcher agent。
      en: Manager binds Task to researcher agent.
      ja: manager Task → researcher agent。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: Task(agent=...)
    field_values:
      assignment_activity_id: assign-crew-3
    related_node_ids:
      - WorkerAssignment
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-design
  - id: WorkerAssignment-example-boundary-selection-only
    labels:
      zh: 仅选择未分派
      en: Selection only not assignment
      ja: selection のみは assignment ではない
    descriptions:
      zh: WorkerSelection 记录决定但无 work_item binding，不是 WorkerAssignment。
      en: WorkerSelection records decision but no work_item binding is not WorkerAssignment.
      ja: WorkerSelection のみで work_item binding 無しは WorkerAssignment ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkerAssignment
      - WorkerSelection
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-design
parent_relation:
  id: WorkerAssignment-phase_of-DelegationProcess
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 工作分派是委派过程的组成阶段，在选择决定之后使工作项与受派角色绑定正式生效；它不是工作者选择过程的一部分。
    en: Worker assignment is a constituent phase of the delegation process that activates the work-item-to-delegate binding after selection; it is not part of the worker-selection process.
    ja: 作業割当は選択決定後に作業項目と受任役割のバインディングを有効化する委任プロセスの構成段階で、作業者選択プロセスの一部ではありません。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有阶段
      en: has phase
      ja: 段階を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-worker-assignment-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: openai-agents-sdk
    title: OpenAI Agents SDK
    url: https://openai.github.io/openai-agents-python/
    source_type: official-doc
    relevance: handoff(), transfer_to_* tools, session-scoped control transfer.
  - id: a2a-protocol
    title: A2A Protocol specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: tasks/send, TaskSendParams, Task states, AgentCard discovery.
  - id: langgraph
    title: LangGraph
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Command(goto=...), subgraph isolation, context engineering for handoffs.
  - id: crewai
    title: CrewAI documentation
    url: https://docs.crewai.com
    source_type: official-doc
    relevance: Process.hierarchical, Task delegation, task.context, agent tools.
  - id: cursor-task-tool
    title: Cursor Task tool documentation
    url: https://docs.cursor.com/agent/tools
    source_type: official-doc
    relevance: Task tool launch with prompt field for subagent delegation.
  - id: delegation-handoff-design
    title: Moonweave delegation and handoff design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Delegation versus handoff boundaries and specification-occurrence separation.
source_claims:
  - id: claim-worker-assignment-design
    source: delegation-handoff-design
    supports: WorkerAssignment makes selection binding effective and produces DelegationOwnership.
    locator: WorkerAssignment boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-assignment-design
    source: cursor-task-tool
    supports: Cursor Task launch after selection maps to WorkerAssignment.
    locator: Task launch
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-assignment-design
    source: a2a-protocol
    supports: A2A tasks/send after selection maps to WorkerAssignment.
    locator: tasks/send
    evidence_kind: design-inference
    confidence: high
  - id: claim-worker-assignment-design
    source: crewai
    supports: CrewAI Task binding maps to WorkerAssignment.
    locator: Task assignment
    evidence_kind: design-inference
    confidence: high
