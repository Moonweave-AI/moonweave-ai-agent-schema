applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: WorkerSelectionProcess
    shared_parent_concept_id: DelegationProcess
    differentia:
      zh: 共享父节点对照：父节点 DelegationProcess：WorkerAssignment（semantic kind=activity，骨架 WorkerAssignment-phase_of-DelegationProcess）；WorkerSelectionProcess（semantic kind=activity，骨架 DelegationProcess-includes_selection-WorkerSelectionProcess）。双端条件：WorkerAssignment 条件：“工作分派活动是把已选角色绑定为特定工作项执行者并使该绑定生效的活动”；WorkerSelectionProcess 条件：“工作者选择过程是委派过程中从候选池形成一个可说明受派方决定的有序子过程”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent DelegationProcess: WorkerAssignment (semantic kind=activity, backbone WorkerAssignment-phase_of-DelegationProcess); WorkerSelectionProcess (semantic kind=activity, backbone DelegationProcess-includes_selection-WorkerSelectionProcess). Endpoint conditions: WorkerAssignment condition: “A worker-assignment activity makes the selected role binding effective as the performer of a specific work item”; WorkerSelectionProcess condition: “A worker-selection process is an ordered subprocess of delegation that turns a candidate pool into one explainable delegate decision”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 DelegationProcess：WorkerAssignment（semantic kind=activity、バックボーン WorkerAssignment-phase_of-DelegationProcess）；WorkerSelectionProcess（semantic kind=activity、バックボーン DelegationProcess-includes_selection-WorkerSelectionProcess）。両端条件：WorkerAssignment の条件：「作業割当活動は、選択済み役割バインディングを特定作業項目の実行者として有効化する活動です」；WorkerSelectionProcess の条件：「作業者選択プロセスは、候補プールから説明可能な一件の受任者決定を形成する委任内の順序付き下位過程です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-worker-assignment-011
      - claim-worker-assignment-012
parent_relation:
  id: WorkerAssignment-phase_of-DelegationProcess
  predicate: part_of
  relation_kind: composition
  direction: target-to-source
  labels:
    zh: phase of
    en: phase of
    ja: phase of
  definitions:
    zh: 工作分派是委派过程的组成阶段，在选择决定之后使工作项与受派角色绑定正式生效；它不是工作者选择过程的一部分。
    en: Worker assignment is a constituent phase of the delegation process that activates the work-item-to-delegate binding after selection; it is not part of the worker-selection process.
    ja: 作業割当は選択決定後に作業項目と受任役割のバインディングを有効化する委任プロセスの構成段階で、作業者選択プロセスの一部ではありません。
