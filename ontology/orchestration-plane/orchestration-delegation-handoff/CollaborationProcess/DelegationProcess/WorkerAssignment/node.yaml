      kind: boundary
      labels:
        zh: WorkerAssignment-phase_of-DelegationProcess边界例
        en: Boundary case for WorkerAssignment-phase_of-DelegationProcess
        ja: WorkerAssignment-phase_of-DelegationProcess の境界例
