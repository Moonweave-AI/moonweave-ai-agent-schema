        en: Candidate ranking that only recommends a role without establishing the work-item binding remains selection and is not the delegation's assignment phase.
        ja: 候補順位が役割を推薦するだけで作業項目バインディングを成立させない場合は選択に留まり、委任の割当段階ではありません。
      field_values: {}
