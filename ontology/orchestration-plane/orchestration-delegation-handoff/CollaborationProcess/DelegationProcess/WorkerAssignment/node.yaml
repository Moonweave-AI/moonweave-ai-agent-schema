schema: moonweave.ai/ontology-node/v1
id: WorkerAssignment
kind: concept
labels:
  zh: 工作分派活动
  en: worker-assignment activity
  ja: 作業割当活動
semantics:
  short_definition:
    zh: 使已选角色成为特定工作项执行者的生效活动。
    en: Activity that activates the selected role as performer of a work item.
    ja: 選択済み役割を特定作業項目の実行者として有効化する活動。
  definition:
    zh: 工作分派活动是把已选角色绑定为特定工作项执行者并使该绑定生效的活动。 它发生在选择决定之后，写入工作项—角色绑定和委派归属记录，但不重新评估候选能力。
    en: A worker-assignment activity makes the selected role binding effective as the performer of a specific work item. It occurs after the selection decision, records the work-item-to-role binding and delegation ownership, and does not re-evaluate candidates.
    ja: 作業割当活動は、選択済み役割バインディングを特定作業項目の実行者として有効化する活動です。 選択決定後に作業項目—役割バインディングと委任帰属を記録し、候補能力を再評価しません。
  why_needed:
    zh: 选择谁与真正把工作交给谁是两个不同事实；该节点记录后者的生效动作。
    en: Choosing a worker and making that worker's assignment effective are different facts; this node records the latter action.
    ja: 誰を選ぶかと、実際に誰へ作業を割り当てるかは別事実であり、このノードは後者の有効化を記録します。
  includes:
    - zh: 纳入将一个 WorkItem 与一个 ActorRoleBinding 关联并写入生效时间的分派动作。
      en: Includes an assignment action that binds one WorkItem to one ActorRoleBinding with an effective time.
      ja: 一件の WorkItem を一つの ActorRoleBinding へ有効時刻付きで結び付ける割当動作を含みます。
  excludes:
    - zh: 排除仅推荐候选、仅创建未指派工作项，或把同一工作复制给所有候选的广播。
      en: Excludes candidate recommendations, unassigned work-item creation, and broadcasting the same work to every candidate.
      ja: 候補推薦、未割当作業項目の作成、同一作業を全候補へ配信する行為を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: >-
      WorkerAssignment 在 WorkerSelection 完成后执行：写入 WorkItem—ActorRoleBinding 生效绑定与
      DelegationOwnership 记录，然后启动 delegate Runner 或 A2A SendMessageRequest。不重新运行
      WorkerCapabilityMatching；Assignment 是一次 PROV-O Activity，不是 WorkItem 规范本身。
    en: >-
      WorkerAssignment executes after WorkerSelection completes: writes effective WorkItem—ActorRoleBinding binding and
      DelegationOwnership, then starts delegate Runner or A2A SendMessageRequest. It does not re-run WorkerCapabilityMatching;
      Assignment is a PROV-O Activity, not the WorkItem specification itself.
    ja: >-
      WorkerAssignment は WorkerSelection 完了後に実行する。WorkItem—ActorRoleBinding effective binding と
      DelegationOwnership を書き、delegate Runner または A2A SendMessageRequest を開始する。WorkerCapabilityMatching を
      再実行しない。Assignment は PROV-O Activity で WorkItem specification 自体ではない。
  typical_input:
    - description:
        zh: 已选角色绑定与待分派 WorkItem 引用。
        en: Selected role binding and WorkItem reference to assign.
        ja: selected role binding と assign 対象 WorkItem reference。
      format: |-
        {"worker_selection_ref":"wsel-decision-884","work_item_ref":"work-item-71@2","assignee_binding_ref":"binding-agent-auditor-3","delegation_process_ref":"deleg-proc-884","effective_at":"2026-07-16T09:06:00Z"}
  typical_output:
    - description:
        zh: 生效的工作分派活动记录与 DelegationOwnership 引用。
        en: Effective worker-assignment activity record with DelegationOwnership reference.
        ja: effective worker-assignment activity record と DelegationOwnership reference。
      format: |-
        {"worker_assignment_id":"wassign-884","work_item_ref":"work-item-71@2","assignee_binding_ref":"binding-agent-auditor-3","delegation_ownership_ref":"down-884","execution_ref":"execution-884"}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents starting delegate Runner after assignment becomes effective.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote delegation dispatch after local assignment.
    - name: W3C PROV-O Activity
      url: https://www.w3.org/TR/prov-o/#Activity
      description: Documents assignment as an executed activity binding agents to work.
  source_claims:
    - claim-worker-assignment-001
    - claim-worker-assignment-002
structure:
  identity_keys:
    - assignment_activity_id
  fields:
    - id: assignment_activity_id
      labels:
        zh: 分派活动 ID
        en: assignment-activity ID
        ja: 割当活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次工作绑定生效活动。
        en: Uniquely identifies one work-binding activation activity.
        ja: 一件の作業バインディング有効化活動を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: worker-assignment-5
      source_claims:
        - claim-worker-assignment-002
    - id: decision_activity_id
      labels:
        zh: 选择决定
        en: selection decision
        ja: 選択決定
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向授权本次分派的选择决定活动。
        en: References the selection-decision activity authorizing the assignment.
        ja: この割当を承認する選択決定活動を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkerSelectionDecisionActivity:selection-decision-3
      source_claims:
        - claim-worker-assignment-003
    - id: work_item_id
      labels:
        zh: 工作项
        en: work item
        ja: 作業項目
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被分派的单一工作项。
        en: References the single work item being assigned.
        ja: 割り当てられる一件の作業項目を参照します。
      allowed_values: []
      pattern: null
      example_value: WorkItem:42
      source_claims:
        - claim-worker-assignment-004
    - id: assignee_binding_id
      labels:
        zh: 受派角色绑定
        en: assignee role binding
        ja: 割当先役割バインディング
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向开始承担工作项的角色绑定。
        en: References the role binding that begins bearing the work item.
        ja: 作業項目を担い始める役割バインディングを参照します。
      allowed_values: []
      pattern: null
      example_value: ActorRoleBinding:regulatory-7
      source_claims:
        - claim-worker-assignment-005
    - id: assigned_at
      labels:
        zh: 分派生效时间
        en: assigned at
        ja: 割当有効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录工作项绑定生效的时间。
        en: Records when the work-item binding became effective.
        ja: 作業項目バインディングが有効になった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:40Z
      source_claims:
        - claim-worker-assignment-006
  constraints: []
  required_relation_constraints:
    - id: assignment-phase-of-delegation
      direction: outgoing
      predicate: phase_of
      target_concept_id: DelegationProcess
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 phase_of 保持与 DelegationProcess 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level phase_of constraint with DelegationProcess.
        ja: WorkerAssignment は DelegationProcess とのインスタンスレベル phase_of 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-007
    - id: assignment-produces-ownership
      direction: outgoing
      predicate: produces
      target_concept_id: DelegationOwnership
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: WorkerAssignment 必须通过 produces 保持与 DelegationOwnership 的实例级语义约束。
        en: WorkerAssignment must preserve its instance-level produces constraint with DelegationOwnership.
        ja: WorkerAssignment は DelegationOwnership とのインスタンスレベル produces 制約を保持しなければなりません。
      source_claims:
        - claim-worker-assignment-008
examples:
  - id: WorkerAssignment-example-positive-manual-2026
    labels:
      zh: WorkerAssignment positive
      en: WorkerAssignment positive
      ja: WorkerAssignment positive
    descriptions:
      zh: CrewAI 映射 WorkerAssignment：Task(description="...", agent=researcher, expected_output="...") + Crew(agents=[...], tasks=[...], process=Process.sequential)；crew.kickoff() 返回 CrewOutput；allow_delegation=True 允许 agent 间委派。
      en: CrewAI maps WorkerAssignment: Task(description, agent=researcher, expected_output) + Crew(agents, tasks, process=Process.sequential); crew.kickoff() returns CrewOutput; allow_delegation=True enables inter-agent delegation.
      ja: CrewAI WorkerAssignment: Task+Crew(process=sequential)+kickoff()+allow_delegation=True。
    field_values: {assignment_activity_id: worker-assignment-5, decision_activity_id: WorkerSelectionDecisionActivity:selection-decision-3, work_item_id: WorkItem:42, assignee_binding_id: ActorRoleBinding:regulatory-7, assigned_at: 2026-07-16T01:00:40Z}

    related_node_ids:
      - WorkerAssignment
      - DelegationProcess
    related_relation_ids:
      - WorkerAssignment-phase_of-DelegationProcess
    source_claims:
      - claim-worker-assignment-009

  - id: WorkerAssignment-example-boundary-manual-2026
    labels:
      zh: WorkerAssignment boundary
      en: WorkerAssignment boundary
      ja: WorkerAssignment boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 WorkerAssignment 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not WorkerAssignment delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で WorkerAssignment delegation spec ではない。
    field_values: {}

    related_node_ids:
      - WorkerAssignment
      - DelegationProcess
    related_relation_ids:
      - WorkerAssignment-phase_of-DelegationProcess
    source_claims:
      - claim-worker-assignment-010

  - id: WorkerAssignment-example-counterexample-confusable
    labels:
      zh: WorkerAssignment counterexample
      en: WorkerAssignment counterexample
      ja: WorkerAssignment counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 WorkerAssignment RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style WorkerAssignment RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 WorkerAssignment ではない。
    field_values: {assignment_id: absent, worker_binding_ref: absent, assigned_work_item_ref: absent}

    related_node_ids:
      - WorkerAssignment
      - RoutingDecision
      - WorkerSelection
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-009

  - id: WorkerAssignment-example-instance-concrete
    labels:
      zh: WorkerAssignment instance
      en: WorkerAssignment instance
      ja: WorkerAssignment instance
    descriptions:
      zh: CrewAI 实例：research_task=Task(description="Research AI trends", agent=researcher) → crew.kickoff() → 映射 WorkerAssignment HandoffDecision。
      en: CrewAI instance: research_task Task + crew.kickoff() → maps to WorkerAssignment HandoffDecision.
      ja: CrewAI 实例 Task+kickoff が WorkerAssignment HandoffDecision に写像。
    field_values: {assignment_activity_id: worker-assignment-5, decision_activity_id: WorkerSelectionDecisionActivity:selection-decision-3, work_item_id: WorkItem:42, assignee_binding_id: ActorRoleBinding:regulatory-7, assigned_at: 2026-07-16T01:00:40Z}

    related_node_ids:
      - WorkerAssignment
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-worker-assignment-009

