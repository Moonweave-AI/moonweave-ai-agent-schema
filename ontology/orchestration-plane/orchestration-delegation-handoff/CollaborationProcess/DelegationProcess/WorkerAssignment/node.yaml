      expected_result:
        zh: 不得建立 WorkerAssignment-phase_of-DelegationProcess；场景缺少该关系定义要求的成立条件。
        en: Do not assert WorkerAssignment-phase_of-DelegationProcess; the case lacks a condition required by the relation definition.
        ja: WorkerAssignment-phase_of-DelegationProcess を主張せず、関係定義に必要な成立条件が不足しています。
      why_valid_or_invalid:
        zh: 该边界例刻意缺少 phase_of 所表达的身份、顺序或治理条件。
        en: The boundary deliberately lacks the identity, ordering, or governance condition expressed by phase_of.
        ja: この境界例は phase_of が表す同一性、順序、統治条件を意図的に欠きます。
