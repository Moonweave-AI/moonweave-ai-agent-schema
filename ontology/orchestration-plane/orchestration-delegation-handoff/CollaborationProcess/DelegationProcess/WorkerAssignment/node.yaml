        ja: worker-selection-12 が selection-4 を記録した後、delegation-17 が worker-assignment-5 を実行して WorkItem:42 と regulatory-7 のバインディングを有効化します。
      field_values: {}
      related_node_ids:
        - WorkerAssignment
        - DelegationProcess
      related_relation_ids:
        - WorkerAssignment-phase_of-DelegationProcess
      expected_result:
