    en: produces
    ja: produces
  definitions:
    zh: 工作者分派活动在工作项到受派角色的绑定生效时产生一份委派归属快照，分别记录下一步控制、最终答复与结果责任。
    en: A worker-assignment activity produces a delegation-ownership snapshot when the work-item-to-delegate binding becomes effective, recording next-step control, final-answer accountability, and result accountability separately.
    ja: 作業者割当活動は作業項目と受任ロールの束縛が発効した時に委任帰属スナップショットを生成し、次手制御、最終回答責任、結果責任を別々に記録します。
  cardinality:
