schema: moonweave.ai/ontology-node/v1
id: DelegationOwnership
kind: concept
status: review
labels:
  zh: 委派归属记录
  en: delegation ownership record
  ja: 委任帰属記録
semantics:
  short_definition:
    zh: 由一次工作者分派产生，同时固定控制、最终答复与结果责任承担者的委派范围快照。
    en: A delegation-scoped snapshot produced by one worker assignment that fixes control, final-answer, and result-accountability bearers together.
    ja: 一回の worker assignment が生成し、control・final answer・result accountability の担い手を同時に固定する delegation-scoped snapshot です。
  definition:
    zh: 委派归属记录是 WorkerAssignment 生效时产生的一份委派范围多责任快照。它以 ownership_record_id 标识，绑定委派双方，并分别固定控制所有者、最终答复所有者、结果责任方、责任范围、生效时间与可选交还条件。它不是 CoordinationOwnershipRecord 的子类：后者只记录一种 responsibility_type 与一个 holder，而本记录同时汇总三种可由不同主体承担的责任。
    en: "A delegation ownership record is a delegation-scoped multi-responsibility snapshot produced when a WorkerAssignment becomes effective. Identified by ownership_record_id, it binds the delegation parties and separately fixes the control owner, final-answer owner, result-accountable actor, responsibility scope, effective time, and optional return condition. It is not a CoordinationOwnershipRecord subtype: that record captures one responsibility_type and one holder, whereas this snapshot combines three responsibilities that different actors may bear."
    ja: 委任帰属記録は WorkerAssignment の発効時に生成される delegation-scoped multi-responsibility snapshot です。ownership_record_id で識別し、委任当事者を結び、control owner・final-answer owner・result-accountable actor・responsibility scope・effective time・任意 return condition を個別に固定します。単一 responsibility_type と一 holder を記録する CoordinationOwnershipRecord の下位型ではなく、異なる主体が担い得る三責任を同時に集約します。
  why_needed:
    zh: 该节点防止“受派方执行工作”被误读为“受派方自动拥有最终答复和全部责任”。
    en: The node prevents delegate execution from being read as automatic ownership of the final answer and every responsibility.
    ja: 受任者が作業を実行することを、最終回答と全責任の自動所有と誤読することを防ぎます。
  includes:
    - zh: 纳入绑定一个委派 ID、明确多种归属维度、范围和有效时点的归属记录。
      en: Includes ownership records tied to one delegation ID with explicit ownership dimensions, scope, and effective time.
      ja: 一件の委任 ID に結び付き、複数の帰属次元、範囲、有効時刻を明示する記録を含みます。
  excludes:
    - zh: 排除长期角色绑定、责任转移事件，以及没有委派范围的通用资源所有权。
      en: Excludes long-lived role bindings, responsibility-transfer events, and general resource ownership with no delegation scope.
      ja: 長期役割バインディング、責任移転イベント、委任範囲を持たない一般資源所有権を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - ownership_record_id
  fields:
    - id: ownership_record_id
      labels:
        zh: 归属记录 ID
        en: ownership-record ID
        ja: 帰属記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一个在特定委派范围和生效时点成立的责任归属快照。
        en: Uniquely identifies an ownership snapshot effective for one delegation scope and instant.
        ja: 一つの委任範囲と発効時点に有効な責任帰属スナップショットを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-ownership-001
      source_claims:
        - claim-delegation-ownership-002
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该控制、答复与结果责任归属所适用的委派。
        en: References the delegation to which the control, answer, and result-accountability assignments apply.
        ja: 制御、回答、結果責任の割当が適用される委任を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-delegation-ownership-003
    - id: delegator_id
      labels:
        zh: 委托方 ID
        en: delegator ID
        ja: 委任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用发出委派并保留未转移责任的委派方。
        en: References the delegator that issued the delegation and retains responsibilities not transferred by it.
        ja: 委任を発行し、移転されなかった責任を保持する委任者を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-004
    - id: delegatee_id
      labels:
        zh: 受托方 ID
        en: delegatee ID
        ja: 受任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用接受该委派并承担已转移工作责任的受派方。
        en: References the delegate that accepted the delegation and bears the transferred work responsibility.
        ja: 委任を受諾し、移転された作業責任を負う受任者を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-ownership-005
    - id: control_owner_id
      labels:
        zh: 控制权所有者
        en: control owner
        ja: 制御所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用当前决定委派范围内下一执行步骤的主体。
        en: References the actor currently entitled to choose the next execution step within the delegated scope.
        ja: 委任範囲内の次の実行手順を現在決定できる主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-ownership-006
    - id: answer_owner_id
      labels:
        zh: 答案所有者
        en: answer owner
        ja: 回答所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对面向调用方的最终答复或合成产物承担责任的主体。
        en: References the actor accountable for the final caller-facing answer or synthesized artifact.
        ja: 呼出し側に返す最終回答または統合成果物に責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-007
    - id: result_accountable_actor_id
      labels:
        zh: 结果责任方
        en: result-accountable actor
        ja: 結果責任者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对委派结果正确性和可追溯性最终负责的主体。
        en: References the actor ultimately accountable for correctness and traceability of the delegated result.
        ja: 委任結果の正確性と追跡可能性に最終責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-008
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 明确上述责任归属覆盖的工作、决策或产物范围，避免把局部委派解释为全面转移。
        en: Defines the work, decisions, or artifacts covered by the assignments so a partial delegation is not read as a total transfer.
        ja: 上記割当が覆う作業、判断、成果物の範囲を定め、部分委任を全面移転と解釈させません。
      allowed_values: []
      pattern: null
      example_value: task execution
      source_claims:
        - claim-delegation-ownership-009
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该责任归属快照开始有效的 UTC 时刻。
        en: Records the UTC instant at which this ownership snapshot becomes effective.
        ja: この責任帰属スナップショットが発効する UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:20:00Z
      source_claims:
        - claim-delegation-ownership-010
    - id: return_condition
      labels:
        zh: 交还条件
        en: return condition
        ja: 返還条件
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明控制或责任应返还委派方的可判定条件；为空表示由其他契约条款决定。
        en: States the decidable condition under which control or responsibility returns to the delegator; absence defers to another contract term.
        ja: 制御または責任を委任者へ戻す判定可能な条件を示し、空値なら別の契約条項に従います。
      allowed_values: []
      pattern: null
      example_value: result accepted
      source_claims:
        - claim-delegation-ownership-011
  constraints: []
  required_relation_constraints: []
examples:
  - id: DelegationOwnership-example-positive-manual-2026
    kind: positive
    labels:
      zh: 委派归属记录正例
      en: Positive delegation ownership record case
      ja: 委任帰属記録の正例
    scenario_id: null
    descriptions:
      zh: 记录表明专家拥有下一步控制，协调器保留最终答复，双方共同承担来源完整性责任。
      en: The record states that the specialist owns next-step control, the coordinator retains the final answer, and both share provenance-integrity accountability.
      ja: 専門家が次段階制御を持ち、調整役が最終回答を保持し、双方が来歴完全性責任を共有すると記録します。
    field_values:
      ownership_record_id: delegation-ownership-001
      effective_at: 2026-07-13T03:10:00Z
      delegation_id: DelegationContract:delegation-001
      delegator_id: Actor:orchestrator-001
      delegatee_id: Actor:worker-007
      control_owner_id: Actor:worker-007
      answer_owner_id: Actor:orchestrator-001
      result_accountable_actor_id: Actor:orchestrator-001
      responsibility_scope: task execution; control=delegatee; final answer=delegator; source integrity=shared
      return_condition: result accepted or delegation revoked
    related_node_ids:
      - WorkerAssignment
      - DelegationOwnership
    related_relation_ids:
      - WorkerAssignment-produces-DelegationOwnership
    expected_result:
      zh: 该快照应被识别为 DelegationOwnership，并通过 WorkerAssignment-produces-DelegationOwnership 接入委派流程；不得推断旧的 CoordinationOwnershipRecord 子类关系。
      en: Accept the snapshot as DelegationOwnership and attach it to the delegation flow through WorkerAssignment-produces-DelegationOwnership; do not infer the retired CoordinationOwnershipRecord subtype relation.
      ja: この snapshot を DelegationOwnership として受理し、WorkerAssignment-produces-DelegationOwnership で delegation flow に接続します。廃止済み CoordinationOwnershipRecord subtype relation は推論しません。
    why_valid_or_invalid:
      zh: 场景提供唯一 ownership_record_id、一个已生效委派，以及分别可核验的控制、最终答复和结果责任承担者；三种责任可由不同主体承担，符合多责任快照而非单责任记录。
      en: The case supplies a unique ownership_record_id, one effective delegation, and separately verifiable bearers for control, final-answer, and result accountability. The responsibilities may belong to different actors, matching a multi-responsibility snapshot rather than a single-responsibility record.
      ja: 一意な ownership_record_id、一件の有効 delegation、個別検証可能な control・final-answer・result-accountability bearer を備えます。責任は異なる主体が担い得るため single-responsibility record ではなく multi-responsibility snapshot に一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-ownership-012
  - id: DelegationOwnership-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派归属记录边界例
      en: Boundary delegation ownership record case
      ja: 委任帰属記録の境界例
    scenario_id: null
    descriptions:
      zh: WorkerRole 描述长期职责但不说明 delegation-17 中的控制或答复归属，因此不是 DelegationOwnership。
      en: WorkerRole describes a long-lived duty but says nothing about control or answer ownership in delegation-17, so it is not DelegationOwnership.
      ja: WorkerRole が長期責務を記述しても delegation-17 の制御・回答帰属を示さなければ DelegationOwnership ではありません。
    field_values: {}
    related_node_ids:
      - WorkerAssignment
      - DelegationOwnership
    related_relation_ids:
      - WorkerAssignment-produces-DelegationOwnership
    expected_result:
      zh: 该对象不得被归为 DelegationOwnership，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationOwnership or acquire missing conditions from nearby facts.
      ja: この対象を DelegationOwnership に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除长期角色绑定、责任转移事件，以及没有委派范围的通用资源所有权。
      en: "The case violates this reviewed exclusion boundary: Excludes long-lived role bindings, responsibility-transfer events, and general resource ownership with no delegation scope."
      ja: この例は審査済み除外境界に反します：長期役割バインディング、責任移転イベント、委任範囲を持たない一般資源所有権を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-ownership-013
external_mappings: []
