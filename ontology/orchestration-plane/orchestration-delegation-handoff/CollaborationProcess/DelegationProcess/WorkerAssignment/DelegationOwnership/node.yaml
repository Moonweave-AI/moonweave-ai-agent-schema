schema: moonweave.ai/ontology-node/v1
id: DelegationOwnership
kind: concept
labels:
  zh: 委派归属记录
  en: delegation ownership record
  ja: 委任帰属記録
semantics:
  short_definition:
    zh: 一次工作者分派生效后的控制、答复与结果责任归属记录。
    en: Record of control, answer, and result responsibility after one worker assignment becomes effective.
    ja: worker assignment effective 後の control/answer/result responsibility 帰属 record。
  definition:
    zh: DelegationOwnership 记录 delegator/delegatee、control_owner_id、answer_owner_id、result_accountable_actor_id 与 responsibility_scope。委派场景下 delegator 常保留最终 answer 责任而 delegate 承担 execution control；A2A 远程委派与 Cursor 子代理委派均应产生此记录以审计责任链。
    en: DelegationOwnership records delegator/delegatee, control_owner_id, answer_owner_id, result_accountable_actor_id, and responsibility_scope. In delegation, delegator often retains final answer accountability while delegate bears execution control; A2A remote and Cursor subagent delegations should both produce this record for responsibility-chain audit.
    ja: DelegationOwnership は control/answer/result 責任分割を記録。delegator final answer + delegate execution が典型。
  why_needed:
    zh: 使委派责任链可验证，避免“谁负责最终答复”模糊。
    en: Makes delegation responsibility chain verifiable and clarifies final-answer ownership.
    ja: delegation responsibility chain と final answer ownership を明確化。
  includes:
    - zh: 纳入绑定一个委派 ID、明确多种归属维度、范围和有效时点的归属记录。
      en: Includes ownership records tied to one delegation ID with explicit ownership dimensions, scope, and effective time.
      ja: 一件の委任 ID に結び付き、複数の帰属次元、範囲、有効時刻を明示する記録を含みます。
  excludes:
    - zh: 排除长期角色绑定、责任转移事件，以及没有委派范围的通用资源所有权。
      en: Excludes long-lived role bindings, responsibility-transfer events, and general resource ownership with no delegation scope.
      ja: 長期役割バインディング、責任移転イベント、委任範囲を持たない一般資源所有権を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: WorkerAssignment 完成后写入 DelegationOwnership；Handoff 使用 ResponsibilityTransfer 而非本概念。return_condition 引用 DelegationContract 完成条款。
    en: Write DelegationOwnership after WorkerAssignment; Handoff uses ResponsibilityTransfer instead. return_condition references DelegationContract completion terms.
    ja: WorkerAssignment 後に DelegationOwnership。Handoff は ResponsibilityTransfer。
  typical_input:
    - description: Ownership record.
      format: '{"control_owner_id":"delegatee","answer_owner_id":"delegator","result_accountable_actor_id":"delegator"}'
      source_claims:
        - claim-delegation-ownership-design
  typical_output:
    - description: Moonweave DelegationOwnership.
      format: '{"ownership_record_id":"ownership-17"}'
      source_claims:
        - claim-delegation-ownership-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - ownership_record_id
  fields:
    - id: ownership_record_id
      labels:
        zh: 归属记录 ID
        en: ownership-record ID
        ja: 帰属記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一个在特定委派范围和生效时点成立的责任归属快照。
        en: Uniquely identifies an ownership snapshot effective for one delegation scope and instant.
        ja: 一つの委任範囲と発効時点に有効な責任帰属スナップショットを一意に識別します。
      allowed_values: []
      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
      example_value: delegation-ownership-001
      source_claims:
        - claim-delegation-ownership-design
    - id: delegation_id
      labels:
        zh: 委派 ID
        en: delegation ID
        ja: 委任 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该控制、答复与结果责任归属所适用的委派。
        en: References the delegation to which the control, answer, and result-accountability assignments apply.
        ja: 制御、回答、結果責任の割当が適用される委任を参照します。
      allowed_values: []
      pattern: null
      example_value: DelegationContract:delegation-001
      source_claims:
        - claim-delegation-ownership-design
    - id: delegator_id
      labels:
        zh: 委托方 ID
        en: delegator ID
        ja: 委任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用发出委派并保留未转移责任的委派方。
        en: References the delegator that issued the delegation and retains responsibilities not transferred by it.
        ja: 委任を発行し、移転されなかった責任を保持する委任者を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-design
    - id: delegatee_id
      labels:
        zh: 受托方 ID
        en: delegatee ID
        ja: 受任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用接受该委派并承担已转移工作责任的受派方。
        en: References the delegate that accepted the delegation and bears the transferred work responsibility.
        ja: 委任を受諾し、移転された作業責任を負う受任者を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-ownership-design
    - id: control_owner_id
      labels:
        zh: 控制权所有者
        en: control owner
        ja: 制御所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用当前决定委派范围内下一执行步骤的主体。
        en: References the actor currently entitled to choose the next execution step within the delegated scope.
        ja: 委任範囲内の次の実行手順を現在決定できる主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegation-ownership-design
    - id: answer_owner_id
      labels:
        zh: 答案所有者
        en: answer owner
        ja: 回答所有者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对面向调用方的最终答复或合成产物承担责任的主体。
        en: References the actor accountable for the final caller-facing answer or synthesized artifact.
        ja: 呼出し側に返す最終回答または統合成果物に責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-design
    - id: result_accountable_actor_id
      labels:
        zh: 结果责任方
        en: result-accountable actor
        ja: 結果責任者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对委派结果正确性和可追溯性最终负责的主体。
        en: References the actor ultimately accountable for correctness and traceability of the delegated result.
        ja: 委任結果の正確性と追跡可能性に最終責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-ownership-design
    - id: responsibility_scope
      labels:
        zh: 责任范围
        en: responsibility scope
        ja: 責任範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 明确上述责任归属覆盖的工作、决策或产物范围，避免把局部委派解释为全面转移。
        en: Defines the work, decisions, or artifacts covered by the assignments so a partial delegation is not read as a total transfer.
        ja: 上記割当が覆う作業、判断、成果物の範囲を定め、部分委任を全面移転と解釈させません。
      allowed_values: []
      pattern: null
      example_value: task execution
      source_claims:
        - claim-delegation-ownership-design
    - id: effective_at
      labels:
        zh: 生效时间
        en: effective at
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该责任归属快照开始有效的 UTC 时刻。
        en: Records the UTC instant at which this ownership snapshot becomes effective.
        ja: この責任帰属スナップショットが発効する UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T01:20:00Z
      source_claims:
        - claim-delegation-ownership-design
    - id: return_condition
      labels:
        zh: 交还条件
        en: return condition
        ja: 返還条件
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明控制或责任应返还委派方的可判定条件；为空表示由其他契约条款决定。
        en: States the decidable condition under which control or responsibility returns to the delegator; absence defers to another contract term.
        ja: 制御または責任を委任者へ戻す判定可能な条件を示し、空値なら別の契約条項に従います。
      allowed_values: []
      pattern: null
      example_value: result accepted
      source_claims:
        - claim-delegation-ownership-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: DelegationOwnership-example-cursor-subagent
    labels:
      zh: Cursor 子代理责任
      en: Cursor subagent ownership
      ja: Cursor subagent ownership
    descriptions:
      zh: 父代理保留 answer_owner，explore 子代理为 control_owner。
      en: Parent retains answer_owner; explore subagent is control_owner.
      ja: parent answer_owner、explore control_owner。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task delegation
    field_values:
      control_owner_id: ActorRoleBinding:explore-9
      answer_owner_id: ActorRoleBinding:coordinator-1
    related_node_ids:
      - DelegationOwnership
      - WorkerAssignment
    related_relation_ids: []
    source_claims:
      - claim-delegation-ownership-design
  - id: DelegationOwnership-example-a2a-remote
    labels:
      zh: A2A 远程责任
      en: A2A remote ownership
      ja: A2A remote ownership
    descriptions:
      zh: 客户端 delegator 保留 result_accountable_actor，远程 agent 为 control_owner。
      en: Client delegator retains result_accountable_actor; remote agent is control_owner.
      ja: client result 責任、remote agent control。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: remote delegation
    field_values:
      control_owner_id: ActorRoleBinding:billing-remote
      answer_owner_id: ActorRoleBinding:client-coordinator
    related_node_ids:
      - DelegationOwnership
    related_relation_ids: []
    source_claims:
      - claim-delegation-ownership-design
  - id: DelegationOwnership-example-crewai
    labels:
      zh: CrewAI manager 责任
      en: CrewAI manager ownership
      ja: CrewAI manager ownership
    descriptions:
      zh: Manager 保留 answer_owner，researcher 为 control_owner。
      en: Manager retains answer_owner; researcher is control_owner.
      ja: manager answer_owner、researcher control_owner。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: hierarchical
    field_values:
      control_owner_id: ActorRoleBinding:researcher
      answer_owner_id: ActorRoleBinding:manager
    related_node_ids:
      - DelegationOwnership
    related_relation_ids: []
    source_claims:
      - claim-delegation-ownership-design
  - id: DelegationOwnership-example-boundary-handoff
    labels:
      zh: 移交不是委派归属
      en: Handoff is not delegation ownership
      ja: handoff は delegation ownership ではない
    descriptions:
      zh: Handoff 控制转移使用 ResponsibilityTransfer，不是 DelegationOwnership。
      en: Handoff control transfer uses ResponsibilityTransfer, not DelegationOwnership.
      ja: Handoff は ResponsibilityTransfer を使用。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoff
    field_values: {}
    related_node_ids:
      - DelegationOwnership
      - ResponsibilityTransfer
    related_relation_ids: []
    source_claims:
      - claim-delegation-ownership-design
parent_relation:
