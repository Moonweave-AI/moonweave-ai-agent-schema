source_claims:
  - id: claim-delegation-ownership-001
    source: eng-ont-prov-o
    supports: "Direct source premise: W3C PROV delegation assigns authority and responsibility to a delegate while the agent on whose behalf it acts retains some responsibility for the outcome. Moonweave design inference: DelegationOwnership records the independently adjudicated control owner, answer owner, and result-accountable actor for one scope and interval; PROV does not split those ownership dimensions or define a return condition."
    locator: Section 3.3 Expanded Terms > Delegation, Association, Plan, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-delegation-ownership-002
    source: eng-ont-prov-o
    supports: "Direct source premise: W3C PROV says a delegate receives authority and responsibility while the responsible agent retains some outcome responsibility. Moonweave design inference: DelegationOwnership.ownership_record_id is defined as follows: Uniquely identifies an ownership snapshot effective for one delegation scope and instant. The source does not define this Moonweave field, value, constraint, or synthetic case."
    locator: PROV Namespace > Delegation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-delegation-ownership-003
    source: eng-ont-prov-o
    supports: "Direct source premise: W3C PROV says a delegate receives authority and responsibility while the responsible agent retains some outcome responsibility. Moonweave design inference: DelegationOwnership.delegation_id is defined as follows: References the delegation to which the control, answer, and result-accountability assignments apply. The source does not define this Moonweave field, value, constraint, or synthetic case."
    locator: PROV Namespace > Delegation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
