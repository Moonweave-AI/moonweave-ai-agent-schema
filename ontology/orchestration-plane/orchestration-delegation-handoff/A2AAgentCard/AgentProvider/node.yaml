    publisher: A2A Protocol Working Group
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines AgentCard and its optional provider property in A2A v1.
  - id: a2a-v1-protobuf
    title: A2A v1 Protocol Buffer definition
    publisher: A2A Project
    url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Declares the current AgentProvider message fields.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local composition treatment for retained ontology concepts.
source_claims:
  - id: a2a-v1-agent-provider-fields
    source: a2a-v1-protobuf
    supports: The current A2A v1 AgentProvider message has required organization and url fields.
    locator: "AgentProvider message"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-agent-card-provider-field
    source: a2a-v1-specification
    supports: A2A v1 AgentCard may carry an optional provider object of type AgentProvider.
    locator: "AgentCard data model"
    evidence_kind: normative
    confidence: high
  - id: moonweave-a2a-agent-provider-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave places AgentProvider as an optional composition component of A2AAgentCard.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
