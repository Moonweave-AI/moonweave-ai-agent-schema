schema: moonweave.ai/ontology-node/v1
id: AgentProvider
kind: concept
labels:
  zh: A2A 智能体提供方
  en: A2A Agent Provider
  ja: A2A エージェント提供者
semantics:
  short_definition:
    zh: AgentCard 中说明发布该智能体的组织及其 URL 的 A2A v1 提供方对象。
    en: The A2A v1 AgentCard object that identifies the organization publishing an agent and its URL.
    ja: agent を公開する組織とその URL を示す A2A v1 AgentCard の提供者オブジェクト。
  definition:
    zh: >
      AgentProvider 是当前 A2A v1 AgentCard 的可选 provider 属性所使用的规范对象。它包含必填的
      organization 和 url，用于说明谁提供该 AgentCard 及可引用的提供方地址。它是声明性元数据，不是
      身份验证结果、授权决定或对 URL 所指资源安全性的保证。
    en: >
      AgentProvider is the canonical object used by the optional provider property of a current A2A
      v1 AgentCard. It carries required organization and url values to state who provides the
      AgentCard and where that provider can be referenced. It is declarative metadata, not an
      authentication result, authorization decision, or assurance that the referenced URL is safe.
    ja: >
      AgentProvider は current A2A v1 AgentCard の任意の provider property で使用される canonical
      object である。必須の organization と url により AgentCard の提供者と参照先を示す。
      これは宣言的な metadata であり、authentication result、authorization decision、または参照 URL
      の安全性の保証ではない。
  why_needed:
    zh: 客户端可在发现阶段保留提供方的归属和引用位置，而不将该元数据误作凭据或访问许可。
    en: Clients can retain provider provenance and a reference location during discovery without mistaking that metadata for credentials or access permission.
    ja: client は discovery 中に provider の来歴と参照先を保持しつつ、その metadata を credential や access permission と取り違えない。
  includes:
    - zh: 提供组织的名称和提供方 URL。
      en: The providing organization's name and provider URL.
      ja: 提供組織の名称と provider URL。
    - zh: AgentCard.provider 中的可选声明性对象。
      en: The optional declarative object at AgentCard.provider.
      ja: AgentCard.provider にある任意の宣言的 object。
  excludes:
    - zh: AgentCard 的签名、调用者认证凭据或安全方案。
      en: An AgentCard signature, caller authentication credential, or security scheme.
      ja: AgentCard signature、caller authentication credential、または security scheme。
    - zh: 对组织身份或 URL 内容已被验证的断言。
      en: An assertion that the organization identity or URL content has already been verified.
      ja: organization identity または URL content が検証済みであるという主張。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: AgentCard provider
      alias_kind: protocol-term
engineering:
  explanation:
    zh: >
      AgentCard 可以省略 provider；提供时，解析器应将 organization 作为人可读归属，将 url 作为 URI，
      并在需要信任判断时使用独立的验证和安全策略。该对象不承载 API 密钥、令牌或可执行的授权规则。
    en: >
      An AgentCard may omit provider. When present, a parser treats organization as human-readable
      attribution and url as a URI, then applies separate verification and security policy for any
      trust decision. This object carries no API key, token, or executable authorization rule.
    ja: >
      AgentCard は provider を省略できる。存在する場合、parser は organization を人間が読める帰属、url を
      URI として扱い、trust decision には別の verification と security policy を適用する。この object は
      API key、token、または実行可能な authorization rule を保持しない。
  typical_input:
    - description:
        zh: 客户端获取含有提供方声明的 AgentCard。
        en: A client retrieves an AgentCard with a provider declaration.
        ja: client が provider declaration を含む AgentCard を取得する。
      format: |
        {
          "name": "Research assistant",
          "capabilities": {},
          "provider": {
            "organization": "Example Research Cooperative",
            "url": "https://provider.example"
          }
        }
      source_claims: [a2a-v1-agent-provider-fields, a2a-v1-agent-card-provider-field]
  typical_output:
    - description:
        zh: 客户端保存提供方归属供展示或后续独立验证使用。
        en: The client retains provider attribution for display or later independent verification.
        ja: client は表示または後続の独立 verification のために provider attribution を保持する。
      format: |
        {
          "providerOrganization": "Example Research Cooperative",
          "providerUrl": "https://provider.example",
          "authenticationEstablished": false
        }
      source_claims: [a2a-v1-agent-provider-fields]
  reference_implementations:
    - name: A2A Protocol v1 AgentCard
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentCard.provider and the AgentProvider organization and URL fields.
    - name: A2A v1 Protocol Buffer definition
      url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
      description: Declares the current AgentProvider message used by AgentCard.
structure:
  identity_keys: [organization, url]
  fields:
    - id: organization
      labels:
        zh: 提供组织
        en: Provider organization
        ja: provider organization
      definitions:
        zh: 发布此智能体及其 AgentCard 的组织名称。
        en: The name of the organization that publishes this agent and its AgentCard.
        ja: この agent と AgentCard を公開する組織の名称。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Example Research Cooperative
      allowed_values: []
      source_claims: [a2a-v1-agent-provider-fields]
    - id: url
      labels:
        zh: 提供方 URL
        en: Provider URL
        ja: provider URL
      definitions:
        zh: 指向提供方的必填 URI；解析或信任该 URI 需采用独立安全策略。
        en: The required URI for the provider; resolving or trusting it requires separate security policy.
        ja: provider の必須 URI。解決または信頼には別の security policy が必要である。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://provider.example
      allowed_values: []
      source_claims: [a2a-v1-agent-provider-fields]
  constraints:
    - id: agent-provider-requires-organization-and-url
      severity: error
      expression_language: plain
      expression: A present AgentProvider must contain both organization and a URI-valued url; the object is provider metadata and does not authenticate a caller or authorize a request.
      explanation:
        zh: 提供方对象必须同时给出组织和 URL；它描述归属，不能替代身份验证或授权。
        en: A provider object must supply both organization and URL; it describes attribution and cannot replace authentication or authorization.
        ja: provider object は organization と URL の両方を与えなければならない。これは attribution を示し、authentication や authorization を置き換えない。
      source_claims: [a2a-v1-agent-provider-fields]
  required_relations: []
examples:
  - id: agent-provider-positive-card-declaration
    labels:
      zh: AgentProvider positive
      en: AgentProvider positive
      ja: AgentProvider positive
    descriptions:
      zh: A2A Protocol 映射 AgentProvider：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps AgentProvider: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol AgentProvider: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {organization: "Example Research Cooperative", url: "https://provider.example"}

    related_node_ids:
      - AgentProvider
      - A2AAgentCard
    related_relation_ids:
      - AgentProvider-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-provider-fields
      - a2a-v1-agent-card-provider-field

  - id: agent-provider-counterexample-missing-url
    labels:
      zh: AgentProvider counterexample
      en: AgentProvider counterexample
      ja: AgentProvider counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 AgentProvider。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style AgentProvider.
      ja: module dispatch なし直接回答は MRKL 式 AgentProvider にならない。
    field_values: {organization: "Example Research Cooperative"}

    related_node_ids:
      - AgentProvider
      - A2AAgentCard
    related_relation_ids:
      - AgentProvider-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-provider-fields

  - id: agent-provider-boundary-not-security-proof
    labels:
      zh: AgentProvider boundary
      en: AgentProvider boundary
      ja: AgentProvider boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 AgentProvider 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not AgentProvider work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で AgentProvider work_specification ではない。
    field_values: {organization: "Example Research Cooperative", url: "https://provider.example"}

    related_node_ids:
      - AgentProvider
      - A2AAgentCard
    related_relation_ids:
      - AgentProvider-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-provider-fields

  - id: agent-provider-instance-published-agent
    labels:
      zh: AgentProvider instance
      en: AgentProvider instance
      ja: AgentProvider instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 AgentProvider A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to AgentProvider A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が AgentProvider A2ATask に写像。
    field_values: {organization: "Example Research Cooperative", url: "https://provider.example"}

    related_node_ids:
      - AgentProvider
      - A2AAgentCard
    related_relation_ids:
      - AgentProvider-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-provider-fields

parent_relation:
  id: AgentProvider-part_of-A2AAgentCard
  predicate: part_of
  target: concept:A2AAgentCard
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是 A2A AgentCard 的提供方组成部分
    en: is a provider component of an A2A AgentCard
    ja: A2A AgentCard の provider component である
  definition:
    zh: Moonweave 将 AgentProvider 组织为 A2AAgentCard 的可选提供方组成部分。
    en: Moonweave organizes AgentProvider as an optional provider component of A2AAgentCard.
    ja: Moonweave は AgentProvider を A2AAgentCard の任意の provider component として整理する。
  cardinality:
    source:
      min: 0
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 可包含提供方
      en: may have provider
      ja: provider を持ちうる
  conditions: []
  temporal_scope: card-lifetime
  boundary_context: This is a Moonweave composition for AgentCard containment and does not make provider metadata a trust assertion.
  constraints:
    - id: agent-provider-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The composition edge organizes AgentCard containment in Moonweave and must not be interpreted as an authentication or authorization relationship.
      explanation:
        zh: 该组成边只组织 Moonweave 中的卡片包含关系，不能解释为认证或授权关系。
        en: This composition edge organizes card containment in Moonweave and cannot be interpreted as authentication or authorization.
        ja: この composition edge は Moonweave における card containment を整理するもので、authentication や authorization と解釈できない。
      source_claims: [moonweave-a2a-agent-provider-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-agent-provider-taxonomy]
  distinct_fact_rationale:
    zh: 该关系表达本体中的包含结构，不重定义 A2A 提供方字段。
    en: This relation expresses ontology containment and does not redefine A2A provider fields.
    ja: この relation は ontology containment を表し、A2A provider field を再定義しない。
relations: []
sources:
