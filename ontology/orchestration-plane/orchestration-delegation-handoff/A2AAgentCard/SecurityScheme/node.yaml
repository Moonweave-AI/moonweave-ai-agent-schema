schema: moonweave.ai/ontology-node/v1
id: SecurityScheme
kind: concept
labels:
  zh: A2A 安全方案
  en: A2A Security Scheme
  ja: A2A セキュリティスキーム
semantics:
  short_definition:
    zh: A2A v1 AgentCard 中声明认证方案形状的、基于 OpenAPI 的互斥联合对象。
    en: The OpenAPI-based mutually exclusive union that declares an authentication-scheme shape in an A2A v1 AgentCard.
    ja: A2A v1 AgentCard において authentication-scheme shape を宣言する、OpenAPI-based の mutually exclusive union。
  definition:
    zh: >
      SecurityScheme 是当前 A2A v1 AgentCard.securitySchemes 映射中的值对象。它必须且只能选择
      apiKeySecurityScheme、httpAuthSecurityScheme、oauth2SecurityScheme、openIdConnectSecurityScheme 或
      mtlsSecurityScheme 之一。该联合基于 OpenAPI 3.2 安全方案；它声明认证机制的形状，既不存放实际
      凭据，也不表示请求已认证、已授权或可被接受。
    en: >
      SecurityScheme is the canonical value object in a current A2A v1 AgentCard.securitySchemes
      map. It must select exactly one of apiKeySecurityScheme, httpAuthSecurityScheme,
      oauth2SecurityScheme, openIdConnectSecurityScheme, or mtlsSecurityScheme. This union is based
      on OpenAPI 3.2 security schemes; it declares the shape of an authentication mechanism, stores
      no actual credential, and does not mean a request is authenticated, authorized, or accepted.
    ja: >
      SecurityScheme は current A2A v1 AgentCard.securitySchemes map の canonical value object である。
      apiKeySecurityScheme、httpAuthSecurityScheme、oauth2SecurityScheme、openIdConnectSecurityScheme、
      mtlsSecurityScheme の正確に一つを選ばなければならない。この union は OpenAPI 3.2 security scheme に
      基づき、authentication mechanism の shape を宣言する。actual credential を保存せず、request が
      authenticated、authorized、accepted であることを意味しない。
  why_needed:
    zh: 客户端需要在发现阶段了解 AgentCard 支持的认证机制，而无需暴露秘密或预判一次调用的授权结果。
    en: Clients need to discover authentication mechanisms supported by an AgentCard without exposing secrets or pre-judging the authorization outcome of an invocation.
    ja: client は secret を露出せず、invocation の authorization outcome を事前判断せずに、AgentCard が支援する authentication mechanism を discovery する必要がある。
  includes:
    - zh: API key、HTTP 认证、OAuth 2、OpenID Connect 或 mTLS 的其中一种声明。
      en: Exactly one declaration for API key, HTTP authentication, OAuth 2, OpenID Connect, or mTLS.
      ja: API key、HTTP authentication、OAuth 2、OpenID Connect、mTLS のうち正確に一つの declaration。
    - zh: AgentCard.securitySchemes 映射中由方案名称键控的值。
      en: A value keyed by scheme name in the AgentCard.securitySchemes map.
      ja: AgentCard.securitySchemes map で scheme name により key 付けされる value。
  excludes:
    - zh: 访问令牌、API 密钥、客户端证书私钥或密码。
      en: An access token, API key value, client-certificate private key, or password.
      ja: access token、API key value、client-certificate private key、または password。
    - zh: 同时选择多个联合分支，或表示调用已获授权的结果对象。
      en: Selection of multiple union branches at once, or an outcome object saying an invocation is authorized.
      ja: 複数の union branch を同時に選ぶこと、または invocation が authorized だと示す outcome object。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: AgentCard security scheme
      alias_kind: protocol-term
engineering:
  explanation:
    zh: >
      AgentCard 将 securitySchemes 表示为从方案名称到 SecurityScheme 的映射。客户端先读取所选联合分支，
      再按该机制和 AgentCard 的安全要求获取或协商凭据；任何凭据值必须在受控秘密管理中处理，不能写入
      本体节点或示例。联合约束防止把两种不兼容认证形状合并成同一个方案对象。
    en: >
      An AgentCard represents securitySchemes as a map from scheme name to SecurityScheme. A client
      reads the selected union branch and then obtains or negotiates credentials under that mechanism
      and the AgentCard's security requirements; credential values must stay in controlled secret
      handling and never appear in ontology nodes or examples. The union constraint prevents merging
      two incompatible authentication shapes into one scheme object.
    ja: >
      AgentCard は securitySchemes を scheme name から SecurityScheme への map として表す。client は選ばれた
      union branch を読み、その mechanism と AgentCard の security requirement に従って credential を取得または
      negotiation する。credential value は制御された secret handling に留め、ontology node や example に
      現れてはならない。union constraint は二つの互換性のない authentication shape を一つの scheme object に
      結合することを防ぐ。
  typical_input:
    - description:
        zh: 客户端发现一个名为 bearerAuth 的 HTTP Bearer 认证方案。
        en: A client discovers an HTTP Bearer authentication scheme named bearerAuth.
        ja: client が bearerAuth という名前の HTTP Bearer authentication scheme を発見する。
      format: |
        {
          "securitySchemes": {
            "bearerAuth": {
              "httpAuthSecurityScheme": {
                "scheme": "Bearer",
                "bearerFormat": "JWT"
              }
            }
          }
        }
      source_claims: [a2a-v1-security-scheme-union, a2a-v1-agent-card-security-schemes]
  typical_output:
    - description:
        zh: 客户端选择相应认证流程，但不在发现记录中写入令牌。
        en: The client selects the corresponding authentication flow without writing a token into the discovery record.
        ja: client は discovery record に token を書かず、対応する authentication flow を選ぶ。
      format: |
        {"selectedScheme":"bearerAuth","credentialStoredInOntology":false}
      source_claims: [a2a-v1-security-scheme-union]
  reference_implementations:
    - name: A2A Protocol v1 SecurityScheme
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentCard securitySchemes and the supported OpenAPI-based security-scheme alternatives.
    - name: A2A v1 Protocol Buffer definition
      url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
      description: Declares the current SecurityScheme oneof alternatives.
structure:
  identity_keys: []
  fields:
    - id: apiKeySecurityScheme
      labels:
        zh: API 密钥安全方案
        en: API key security scheme
        ja: API key security scheme
      definitions:
        zh: 可选的 API key 方案分支；它描述密钥的位置和名称，不包含密钥值。
        en: The optional API-key scheme branch; it describes key location and name and contains no key value.
        ja: 任意の API-key scheme branch。key location と name を記述し、key value を含まない。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"name":"X-API-Key","location":"header"}'
      allowed_values: []
      source_claims: [a2a-v1-security-scheme-union]
    - id: httpAuthSecurityScheme
      labels:
        zh: HTTP 认证安全方案
        en: HTTP authentication security scheme
        ja: HTTP authentication security scheme
      definitions:
        zh: 可选的 HTTP 认证方案分支，例如 HTTP Bearer 认证的声明。
        en: The optional HTTP-authentication scheme branch, such as a declaration for HTTP Bearer authentication.
        ja: HTTP Bearer authentication の declaration などの任意の HTTP-authentication scheme branch。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"scheme":"Bearer","bearerFormat":"JWT"}'
      allowed_values: []
      source_claims: [a2a-v1-security-scheme-union]
    - id: oauth2SecurityScheme
      labels:
        zh: OAuth 2 安全方案
        en: OAuth 2 security scheme
        ja: OAuth 2 security scheme
      definitions:
        zh: 可选的 OAuth 2 方案分支，其流程对象描述 OAuth 2 机制而非令牌值。
        en: The optional OAuth 2 scheme branch whose flows object describes an OAuth 2 mechanism rather than a token value.
        ja: flow object が token value ではなく OAuth 2 mechanism を記述する任意の OAuth 2 scheme branch。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"flows":{}}'
      allowed_values: []
      source_claims: [a2a-v1-security-scheme-union]
    - id: openIdConnectSecurityScheme
      labels:
        zh: OpenID Connect 安全方案
        en: OpenID Connect security scheme
        ja: OpenID Connect security scheme
      definitions:
        zh: 可选的 OpenID Connect 方案分支，声明发现配置 URL 而非用户身份或令牌。
        en: The optional OpenID Connect scheme branch that declares a discovery configuration URL, not an end-user identity or token.
        ja: end-user identity や token ではなく discovery configuration URL を宣言する任意の OpenID Connect scheme branch。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"openIdConnectUrl":"https://issuer.example/.well-known/openid-configuration"}'
      allowed_values: []
      source_claims: [a2a-v1-security-scheme-union]
    - id: mtlsSecurityScheme
      labels:
        zh: mTLS 安全方案
        en: mTLS security scheme
        ja: mTLS security scheme
      definitions:
        zh: 可选的双向 TLS 认证方案分支；它声明 mTLS 机制但不携带证书或私钥。
        en: The optional mutual-TLS authentication scheme branch; it declares mTLS but carries no certificate or private key.
        ja: 任意の mutual-TLS authentication scheme branch。mTLS を宣言するが、certificate や private key を保持しない。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{}'
      allowed_values: []
      source_claims: [a2a-v1-security-scheme-union]
  constraints:
    - id: security-scheme-selects-exactly-one-branch
      severity: error
      expression_language: plain
      expression: Exactly one of apiKeySecurityScheme, httpAuthSecurityScheme, oauth2SecurityScheme, openIdConnectSecurityScheme, and mtlsSecurityScheme must be present in a SecurityScheme.
      explanation:
        zh: SecurityScheme 是互斥联合；一个对象只能表示一种认证方案形状。
        en: SecurityScheme is a mutually exclusive union; one object can represent only one authentication-scheme shape.
        ja: SecurityScheme は mutually exclusive union であり、一つの object は一つの authentication-scheme shape だけを表せる。
      source_claims: [a2a-v1-security-scheme-union]
    - id: security-scheme-no-credentials-in-catalog
      severity: error
      expression_language: plain
      expression: SecurityScheme declares authentication mechanism shape only; actual API keys, tokens, passwords, certificates, and private keys must not appear in ontology records or examples.
      explanation:
        zh: 安全方案声明认证方式，不承载真实凭据；秘密必须留在受控秘密管理中。
        en: A security scheme declares an authentication method and carries no real credential; secrets must remain in controlled secret handling.
        ja: security scheme は authentication method を宣言し real credential を保持しない。secret は制御された secret handling に留めなければならない。
      source_claims: [moonweave-a2a-security-scheme-secret-boundary]
  required_relations: []
examples:
  - id: security-scheme-positive-http-bearer
    labels:
      zh: SecurityScheme positive
      en: SecurityScheme positive
      ja: SecurityScheme positive
    descriptions:
      zh: "A2A Protocol 映射 SecurityScheme：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps SecurityScheme: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol SecurityScheme: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {httpAuthSecurityScheme: "'{\\"scheme\\":\\"Bearer\", \"bearerFormat\": "\\"JWT\\"}'"}

    related_node_ids:
      - SecurityScheme
      - A2AAgentCard
    related_relation_ids:
      - SecurityScheme-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-security-scheme-union
      - a2a-v1-agent-card-security-schemes

  - id: security-scheme-counterexample-two-branches
    labels:
      zh: SecurityScheme counterexample
      en: SecurityScheme counterexample
      ja: SecurityScheme counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 SecurityScheme ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style SecurityScheme ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 SecurityScheme ではない。
    field_values: {httpAuthSecurityScheme: "'{\\"scheme\\":\\"Bearer\\"}'", apiKeySecurityScheme: "'{\\"name\\":\\"X-API-Key\", \"location\": "\\"header\\"}'"}

    related_node_ids:
      - SecurityScheme
      - A2AAgentCard
    related_relation_ids:
      - SecurityScheme-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-security-scheme-union

  - id: security-scheme-boundary-declaration-not-authorization
    labels:
      zh: SecurityScheme boundary
      en: SecurityScheme boundary
      ja: SecurityScheme boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 SecurityScheme WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not SecurityScheme WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で SecurityScheme WorkflowStep spec ではない。
    field_values: {mtlsSecurityScheme: "'{}'"}

    related_node_ids:
      - SecurityScheme
      - A2AAgentCard
    related_relation_ids:
      - SecurityScheme-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-security-scheme-union

  - id: security-scheme-instance-openid-connect
    labels:
      zh: SecurityScheme instance
      en: SecurityScheme instance
      ja: SecurityScheme instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 SecurityScheme A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to SecurityScheme A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が SecurityScheme A2ATask に写像。
    field_values: {openIdConnectSecurityScheme: "'{\\"openIdConnectUrl\\":\\"https://issuer.example/.well-known/openid-configuration\\"}'"}

    related_node_ids:
      - SecurityScheme
      - A2AAgentCard
    related_relation_ids:
      - SecurityScheme-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-security-scheme-union
      - a2a-v1-agent-card-security-schemes

parent_relation:
  id: SecurityScheme-part_of-A2AAgentCard
  predicate: part_of
  target: concept:A2AAgentCard
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是 A2A AgentCard 的安全方案组成部分
    en: is a security-scheme component of an A2A AgentCard
    ja: A2A AgentCard の security-scheme component である
  definition:
    zh: Moonweave 将 SecurityScheme 组织为 A2AAgentCard 中按名称键控的安全方案组成部分。
    en: Moonweave organizes SecurityScheme as a name-keyed security-scheme component of A2AAgentCard.
    ja: Moonweave は SecurityScheme を A2AAgentCard の name-keyed security-scheme component として整理する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 可包含安全方案
      en: may have security scheme
      ja: security scheme を持ちうる
  conditions: []
  temporal_scope: card-lifetime
  boundary_context: This Moonweave composition organizes AgentCard security-scheme containment and does not expose credentials or grant authorization.
  constraints:
    - id: security-scheme-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The composition edge organizes AgentCard security-scheme containment in Moonweave and must not be interpreted as credential disclosure or an authorization decision.
      explanation:
        zh: 该组成边只组织卡片中的安全方案，不能解释为凭据披露或授权决定。
        en: This composition edge organizes security schemes in a card and cannot be interpreted as credential disclosure or authorization.
        ja: この composition edge は card 内の security scheme を整理するもので、credential disclosure や authorization と解釈できない。
      source_claims: [moonweave-a2a-security-scheme-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-security-scheme-taxonomy]
  distinct_fact_rationale:
    zh: 该关系表达本体中的卡片包含和命名映射上下文，不改变协议的认证语义。
    en: This relation expresses card containment and named-map context in the ontology and does not alter protocol authentication semantics.
    ja: この relation は ontology の card containment と named-map context を表し、protocol authentication semantics を変更しない。
relations: []
