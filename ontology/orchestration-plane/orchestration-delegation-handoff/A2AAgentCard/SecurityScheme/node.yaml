source_claims:
  - id: a2a-v1-security-scheme-union
    source: a2a-v1-protobuf
    supports: The current A2A v1 SecurityScheme is a oneof that selects exactly one apiKeySecurityScheme, httpAuthSecurityScheme, oauth2SecurityScheme, openIdConnectSecurityScheme, or mtlsSecurityScheme alternative.
    locator: "SecurityScheme message"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-agent-card-security-schemes
    source: a2a-v1-specification
    supports: A2A v1 AgentCard may expose securitySchemes as a map from names to SecurityScheme values.
    locator: "AgentCard data model"
    evidence_kind: normative
    confidence: high
  - id: moonweave-a2a-security-scheme-secret-boundary
    source: moonweave-ontology-design
    supports: Moonweave records security-scheme contracts and redacted examples only; it does not store secret credential material in ontology records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
