schema: moonweave.ai/ontology-node/v1
id: A2AAgentCard
kind: concept
labels:
  zh: A2A 智能体卡片
  en: A2A Agent Card
  ja: A2A エージェントカード
semantics:
  short_definition:
    zh: 用于发现 A2A 智能体身份、接口、能力、模式和技能的协议描述文档。
    en: A protocol document that describes an A2A agent's identity, interfaces, capabilities, modes, and skills for discovery.
    ja: 発見のために A2A エージェントの識別情報、インターフェース、能力、モード、技能を記述するプロトコル文書。
  definition:
    zh: A2A AgentCard 是服务端公开的发现描述。它必须给出名称、描述、受支持接口、版本、能力、默认输入模式、默认输出模式和技能，并可附带提供方、文档、安全方案、安全要求、图标和签名。它描述可互操作的服务端能力，不是对某个任务自动选择工作者、授予委派权限或完成任务的保证。
    en: An A2A AgentCard is a server-published discovery description. It must provide name, description, supported interfaces, version, capabilities, default input modes, default output modes, and skills, and it may include provider, documentation, security schemes, security requirements, icons, and signatures. It describes interoperable server capabilities; it is not an automatic selection of a worker for a task, a delegation grant, or a guarantee that work completes.
    ja: A2A AgentCard はサーバーが公開する発見用の記述である。名前、説明、サポートするインターフェース、バージョン、能力、既定の入力モード、既定の出力モード、技能を必ず提供し、提供者、文書、安全方式、安全要件、アイコン、署名を任意で含められる。これは相互運用可能なサーバー能力を説明するものであり、タスクに対するワーカーの自動選択、委任権限の付与、または作業完了の保証ではない。
  why_needed:
    zh: 调用方在建立连接前需要可靠地发现端点、协议绑定、可接受的内容模式和声明的功能。
    en: A caller needs to discover endpoints, protocol bindings, accepted content modes, and declared functionality before establishing an interaction.
    ja: 呼び出し側は対話を開始する前に、エンドポイント、プロトコルバインディング、受け入れ可能なコンテンツモード、宣言された機能を発見する必要がある。
  includes:
    - zh: 智能体的名称、描述、版本以及发现接口。
      en: The agent's name, description, version, and discovery interfaces.
      ja: エージェントの名前、説明、バージョン、発見インターフェース。
    - zh: 声明的能力、默认内容模式和技能清单。
      en: Declared capabilities, default content modes, and a skill list.
      ja: 宣言された能力、既定のコンテンツモード、技能一覧。
  excludes:
    - zh: 用于将具体任务分配给工作者的本地选择决定。
      en: A local selection decision that assigns a concrete task to a worker.
      ja: 具体的なタスクをワーカーへ割り当てるローカル選択決定。
    - zh: 对远端智能体必定接受、执行或成功完成请求的承诺。
      en: A promise that the remote agent will accept, execute, or successfully complete a request.
      ja: リモートエージェントが要求を受け入れ、実行し、成功裏に完了するという約束。
  semantic_kind: information
  aliases:
    - language: en
      value: AgentCard
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务端将 AgentCard 发布在发现位置。客户端读取 required 的接口、模式和技能后选择兼容的交互方式；若卡片声明了安全要求，客户端还应满足相应方案。卡片可帮助本地工作者选择过程取得证据，但 A2A 不定义该本地选择或移交决策。
    en: A server publishes an AgentCard at a discovery location. After reading required interfaces, modes, and skills, a client selects a compatible interaction method; when the card declares security requirements, the client must also meet the relevant schemes. The card can provide evidence to a local worker-selection process, but A2A does not define that local selection or handoff decision.
    ja: サーバーは AgentCard を発見場所に公開する。クライアントは必須のインターフェース、モード、技能を読んだ後、互換性のある対話方法を選ぶ。カードが安全要件を宣言する場合、クライアントは該当する方式も満たさなければならない。カードはローカルのワーカー選択プロセスへの証拠を提供できるが、A2A はそのローカル選択またはハンドオフ決定を定義しない。
  typical_input:
    - description: A client retrieves a discovery card before choosing an A2A endpoint and input mode.
      format: |
        {
          "name": "Research Agent",
          "supportedInterfaces": [{"url": "https://agent.example.com/a2a", "protocolBinding": "JSONRPC", "protocolVersion": "1.0"}],
          "defaultInputModes": ["text/plain"],
          "defaultOutputModes": ["text/plain"]
        }
      source_claims: [a2a-agent-card-data-model]
  typical_output:
    - description: The client retains a compatible interface and skill identifier for its next protocol request.
      format: |
        {
          "selectedInterface": "https://agent.example.com/a2a",
          "protocolBinding": "JSONRPC",
          "requestedSkill": "research"
        }
      source_claims: [a2a-agent-card-data-model]
  reference_implementations:
    - name: A2A Protocol Specification — AgentCard
      url: https://a2a-protocol.org/latest/specification/
      description: Defines required and optional AgentCard fields for agent discovery.
structure:
  identity_keys: [name, version]
  fields:
    - id: name
      labels:
        zh: 名称
        en: Name
        ja: 名前
      definitions:
        zh: 智能体的人类可读名称。
        en: The human-readable name of the agent.
        ja: エージェントの人間可読な名前。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Research Agent
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: description
      labels:
        zh: 描述
        en: Description
        ja: 説明
      definitions:
        zh: 智能体面向发现者的能力描述。
        en: A discovery-facing description of the agent's capabilities.
        ja: エージェント能力の発見者向け説明。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Answers research questions with cited summaries.
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: supportedInterfaces
      labels:
        zh: 受支持接口
        en: Supported interfaces
        ja: サポートするインターフェース
      definitions:
        zh: 该智能体提供的 A2A AgentInterface 列表。
        en: The list of A2A AgentInterface records offered by this agent.
        ja: このエージェントが提供する A2A AgentInterface レコードの一覧。
      datatype: A2AAgentInterface[]
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: '[{"url":"https://agent.example.com/a2a","protocolBinding":"JSONRPC","protocolVersion":"1.0"}]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: provider
      labels:
        zh: 提供方
        en: Provider
        ja: 提供者
      definitions:
        zh: 可选的智能体提供组织或主体信息。
        en: Optional information about the organization or subject providing the agent.
        ja: エージェントを提供する組織または主体に関する任意情報。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"organization":"Example Labs"}'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: version
      labels:
        zh: 版本
        en: Version
        ja: バージョン
      definitions:
        zh: 智能体卡片所描述服务的版本标识。
        en: The version identifier for the service described by the AgentCard.
        ja: AgentCard が記述するサービスのバージョン識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1.0.0
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: documentationUrl
      labels:
        zh: 文档地址
        en: Documentation URL
        ja: 文書 URL
      definitions:
        zh: 可选的智能体文档地址。
        en: An optional URL for agent documentation.
        ja: エージェント文書の任意 URL。
      datatype: uri
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: https://agent.example.com/docs
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: capabilities
      labels:
        zh: 能力
        en: Capabilities
        ja: 能力
      definitions:
        zh: 智能体支持的可选 A2A 协议能力。
        en: The optional A2A protocol capabilities supported by the agent.
        ja: エージェントがサポートする任意の A2A プロトコル能力。
      datatype: A2AAgentCapabilities
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"streaming":true,"pushNotifications":false}'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: securitySchemes
      labels:
        zh: 安全方案
        en: Security schemes
        ja: セキュリティ方式
      definitions:
        zh: 可选的、按名称声明的安全方案集合。
        en: An optional named collection of declared security schemes.
        ja: 宣言されたセキュリティ方式の任意の名前付き集合。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"bearerAuth":{"type":"http","scheme":"bearer"}}'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: securityRequirements
      labels:
        zh: 安全要求
        en: Security requirements
        ja: セキュリティ要件
      definitions:
        zh: 访问智能体时适用的可选安全要求。
        en: Optional security requirements that apply when accessing the agent.
        ja: エージェントへアクセスするときに適用される任意のセキュリティ要件。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"bearerAuth":[]}]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: defaultInputModes
      labels:
        zh: 默认输入模式
        en: Default input modes
        ja: 既定の入力モード
      definitions:
        zh: 智能体默认接受的内容模式列表。
        en: The list of content modes accepted by default by the agent.
        ja: エージェントが既定で受け入れるコンテンツモードの一覧。
      datatype: string[]
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: '["text/plain"]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: defaultOutputModes
      labels:
        zh: 默认输出模式
        en: Default output modes
        ja: 既定の出力モード
      definitions:
        zh: 智能体默认生成的内容模式列表。
        en: The list of content modes produced by default by the agent.
        ja: エージェントが既定で生成するコンテンツモードの一覧。
      datatype: string[]
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: '["text/plain"]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: skills
      labels:
        zh: 技能
        en: Skills
        ja: スキル
      definitions:
        zh: 智能体对外声明的 A2A AgentSkill 列表。
        en: The list of A2A AgentSkill records declared by the agent.
        ja: エージェントが宣言する A2A AgentSkill レコードの一覧。
      datatype: A2AAgentSkill[]
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: '[{"id":"research","name":"Research","description":"Answers research questions","tags":["research"]}]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: iconUrl
      labels:
        zh: 图标地址
        en: Icon URL
        ja: アイコン URL
      definitions:
        zh: 可选的智能体图标地址。
        en: An optional URL for an agent icon.
        ja: エージェントアイコンの任意 URL。
      datatype: uri
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: https://agent.example.com/icon.svg
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
    - id: signatures
      labels:
        zh: 签名
        en: Signatures
        ja: 署名
      definitions:
        zh: 可选的 AgentCard 签名集合。
        en: An optional collection of AgentCard signatures.
        ja: AgentCard 署名の任意の集合。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"protected":"...","signature":"..."}]'
      allowed_values: []
      source_claims: [a2a-agent-card-data-model]
  constraints:
    - id: a2a-agent-card-required-discovery-fields
      severity: error
      expression_language: plain
      expression: An AgentCard must provide name, description, supportedInterfaces, version, capabilities, defaultInputModes, defaultOutputModes, and skills.
      explanation:
        zh: 缺少任一必填发现字段会使客户端无法可靠识别服务或协商兼容交互。
        en: Omitting any required discovery field prevents a client from reliably identifying the service or negotiating compatible interaction.
        ja: 必須の発見フィールドを一つでも省略すると、クライアントはサービスを確実に識別したり互換性のある対話を交渉したりできない。
      source_claims: [a2a-agent-card-data-model]
    - id: a2a-agent-card-is-not-worker-selection
      severity: warning
      expression_language: plain
      expression: An AgentCard describes a published agent and does not itself assign a local task, transfer responsibility, or prove task completion.
      explanation:
        zh: Moonweave 可将卡片作为选择过程的输入证据，但选择、委派和移交仍是本地治理或编排决定。
        en: Moonweave may use a card as input evidence to a selection process, but selection, delegation, and handoff remain local governance or orchestration decisions.
        ja: Moonweave はカードを選択プロセスへの入力証拠として使えるが、選択、委任、ハンドオフはローカルのガバナンスまたはオーケストレーション決定のままである。
      source_claims: [moonweave-agent-card-discovery-boundary]
  required_relations: []
examples:
  - id: a2a-agent-card-positive-discovery
    labels:
      zh: A2AAgentCard positive
      en: A2AAgentCard positive
      ja: A2AAgentCard positive
    descriptions:
      zh: A2A Protocol 映射 A2AAgentCard：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2AAgentCard: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2AAgentCard: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {name: "Research Agent", description: "Answers research questions with cited summaries.", supportedInterfaces: "'[{\\"url\\":\\"https://agent.example.com/a2a\", \"protocolBinding\": "\\"JSONRPC\", \"protocolVersion\": "\\"1.0\\"}]'", version: 1.0.0, capabilities: "'{\\"streaming\\":true", \"pushNotifications\": "false}'", defaultInputModes: "'[\\"text/plain\\"]'", defaultOutputModes: "'[\\"text/plain\\"]'", skills: "'[{\\"id\\":\\"research\", \"name\": "\\"Research\", \"description\": "\\"Answers research questions\", \"tags\": [\"research\"]}]'}

    related_node_ids:
      - A2AAgentCard
      - A2AAgentInterface
      - A2AAgentCapabilities
      - A2AAgentSkill
    related_relation_ids: []
    source_claims:
      - a2a-agent-card-data-model

  - id: a2a-agent-card-counterexample-missing-interface
    labels:
      zh: A2AAgentCard counterexample
      en: A2AAgentCard counterexample
      ja: A2AAgentCard counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 A2AAgentCard。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style A2AAgentCard.
      ja: module dispatch なし直接回答は MRKL 式 A2AAgentCard にならない。
    field_values: {name: "Research Agent", description: "Answers research questions with cited summaries.", version: 1.0.0, capabilities: "'{\\"streaming\\":true}'", defaultInputModes: "'[\\"text/plain\\"]'", defaultOutputModes: "'[\\"text/plain\\"]'", skills: "'[{\\"id\\":\\"research\", \"name\": "\\"Research\", \"description\": "\\"Answers research questions\", \"tags\": [\"research\"]}]'}

    related_node_ids:
      - A2AAgentCard
      - A2AAgentInterface
    related_relation_ids: []
    source_claims:
      - a2a-agent-card-data-model

  - id: a2a-agent-card-boundary-security-declarations
    labels:
      zh: A2AAgentCard boundary
      en: A2AAgentCard boundary
      ja: A2AAgentCard boundary
    descriptions:
      zh: LiteLLM Router 选中 model 是运行时路由结果，不是 A2AAgentCard 静态 RoutingPolicy 规约；LoadBalancing 决策与规约应分离。
      en: LiteLLM Router selected model is runtime routing result, not A2AAgentCard static RoutingPolicy spec; separate LoadBalancing decisions from specification.
      ja: LiteLLM Router 選択 model は runtime で A2AAgentCard 静的 RoutingPolicy ではない。
    field_values: {name: "Research Agent", description: "Answers research questions with cited summaries.", supportedInterfaces: "'[{\\"url\\":\\"https://agent.example.com/a2a\", \"protocolBinding\": "\\"HTTP+JSON\", \"protocolVersion\": "\\"1.0\\"}]'", version: 1.0.0, documentationUrl: "https://agent.example.com/docs", capabilities: "'{\\"streaming\\":false", \"pushNotifications\": "false}'", securitySchemes: "'{\\"bearerAuth\\":{\\"type\\":\\"http\", \"scheme\": "\\"bearer\\"}}'", securityRequirements: "'[{\\"bearerAuth\\":[]}]'", defaultInputModes: "'[\\"text/plain\\"]'", defaultOutputModes: "'[\\"text/plain\\"]'", skills: "'[{\\"id\\":\\"research\", \"name\": "\\"Research\", \"description\": "\\"Answers research questions\", \"tags\": [\"research\"]}]'}

    related_node_ids:
      - A2AAgentCard
      - A2AAgentInterface
    related_relation_ids: []
    source_claims:
      - a2a-agent-card-data-model

  - id: a2a-agent-card-instance-signed-card
    labels:
      zh: A2AAgentCard instance
      en: A2AAgentCard instance
      ja: A2AAgentCard instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AAgentCard A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AAgentCard A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AAgentCard A2ATask に写像。
    field_values: {name: "Research Agent", description: "Answers research questions with cited summaries.", supportedInterfaces: "'[{\\"url\\":\\"https://agent.example.com/a2a\", \"protocolBinding\": "\\"JSONRPC\", \"protocolVersion\": "\\"1.0\\"}]'", version: 1.0.0, capabilities: "'{\\"streaming\\":true", \"extendedAgentCard\": "false}'", defaultInputModes: "'[\\"text/plain\\"]'", defaultOutputModes: "'[\\"text/plain\\"]'", skills: "'[{\\"id\\":\\"research\", \"name\": "\\"Research\", \"description\": "\\"Answers research questions\", \"tags\": [\"research\"]}]', iconUrl: "https://agent.example.com/icon.svg", signatures: "'[{\\"protected\\":\\"example\", \"signature\": "\\"example\\"}]'"}

    related_node_ids:
      - A2AAgentCard
      - A2AAgentCapabilities
      - A2AAgentSkill
    related_relation_ids: []
    source_claims:
      - a2a-agent-card-data-model
      - moonweave-agent-card-discovery-boundary

