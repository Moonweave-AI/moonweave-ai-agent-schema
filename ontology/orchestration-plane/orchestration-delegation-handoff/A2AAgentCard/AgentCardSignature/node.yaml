schema: moonweave.ai/ontology-node/v1
id: AgentCardSignature
kind: concept
labels:
  zh: A2A 智能体卡片签名
  en: A2A Agent Card Signature
  ja: A2A エージェントカード署名
semantics:
  short_definition:
    zh: 用 JWS 表示、用于保护 A2A v1 AgentCard 完整性的规范签名对象。
    en: The canonical JWS-based object used to protect integrity of an A2A v1 AgentCard.
    ja: A2A v1 AgentCard の integrity を保護するための canonical な JWS-based object。
  definition:
    zh: >
      AgentCardSignature 是当前 A2A v1 AgentCard.signatures 数组中的签名对象。它要求 protected 和 signature，
      并可选携带未保护的 header。protected 是 base64url 编码的 JWS 受保护头，signature 是 base64url 编码的
      JWS 签名。签名前，AgentCard 必须按 JCS 规范化，排除 signatures 字段并省略具有默认值的字段属性。
      该对象提供完整性验证材料，但不单独替代密钥发现、信任锚、签名算法策略或调用授权。
    en: >
      AgentCardSignature is the canonical signature object in a current A2A v1 AgentCard.signatures
      array. It requires protected and signature and may carry an unprotected header. protected is a
      base64url-encoded JWS protected header and signature is a base64url-encoded JWS signature.
      Before signing, the AgentCard is canonicalized with JCS, excludes the signatures field, and
      omits field properties having default values. This object supplies integrity-verification
      material, but does not alone replace key discovery, trust anchors, signature-algorithm policy,
      or caller authorization.
    ja: >
      AgentCardSignature は current A2A v1 AgentCard.signatures array の canonical signature object
      である。protected と signature が必須で、unprotected header を任意で持てる。protected は
      base64url-encoded JWS protected header、signature は base64url-encoded JWS signature である。
      signing 前に AgentCard は JCS で canonicalize され、signatures field を除外し、default value を持つ
      field property を省略する。この object は integrity-verification material を提供するが、key discovery、
      trust anchor、signature-algorithm policy、caller authorization を単独では置き換えない。
  why_needed:
    zh: 客户端需要可验证的卡片完整性材料，以便区分已签名的发布声明与未经保护的发现元数据。
    en: Clients need verifiable card-integrity material to distinguish a signed publication statement from unprotected discovery metadata.
    ja: client は signed publication statement と unprotected discovery metadata を区別するために、検証可能な card-integrity material を必要とする。
  includes:
    - zh: 受保护 JWS 头、JWS 签名和可选的未保护头。
      en: A protected JWS header, JWS signature, and optional unprotected header.
      ja: protected JWS header、JWS signature、任意の unprotected header。
    - zh: 对无 signatures、已规范化 AgentCard 表示的签名材料。
      en: Signature material over a canonicalized AgentCard representation without signatures.
      ja: signatures を含まない canonicalized AgentCard representation に対する signature material。
  excludes:
    - zh: 私钥、信任锚本身、调用者凭据或授权结果。
      en: A private key, trust anchor itself, caller credential, or authorization result.
      ja: private key、trust anchor 自体、caller credential、または authorization result。
    - zh: 将未保护 header 中的声明视为与 protected 头同样受签名完整性保护的解释。
      en: An interpretation that claims in the unprotected header have the same signed-integrity protection as the protected header.
      ja: unprotected header の claim が protected header と同じ signed-integrity protection を持つという解釈。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: AgentCard JWS signature
      alias_kind: protocol-term
engineering:
  explanation:
    zh: >
      签名方先从待签 AgentCard 中移除 signatures，并按 JCS 生成规范字节；验证方以同一规则重建载荷，
      读取 protected 头中的算法和密钥标识并执行 JWS 验证。受保护头需要 alg 和 kid，typ 应为 JOSE；
      header 是未保护元数据，不能成为完整性关键决策的唯一依据。示例只展示格式，不提供可用密钥或可通过
      验证的真实签名。
    en: >
      A signer removes signatures from the AgentCard to be signed and produces canonical bytes with
      JCS; a verifier rebuilds the payload under the same rules, reads algorithm and key identity
      from the protected header, and performs JWS verification. The protected header requires alg
      and kid and should use typ JOSE; header is unprotected metadata and cannot be the sole basis
      for an integrity-critical decision. Examples show format only and provide neither usable keys
      nor real signatures that claim to verify.
    ja: >
      signer は署名対象の AgentCard から signatures を除き、JCS で canonical byte を生成する。verifier は
      同じ rule で payload を再構築し、protected header から algorithm と key identity を読み、JWS verification
      を行う。protected header は alg と kid を要求し typ には JOSE を使うべきである。header は unprotected
      metadata であり、integrity-critical decision の唯一の根拠にできない。example は format のみを示し、使用可能な
      key も検証できると主張する real signature も提供しない。
  typical_input:
    - description:
        zh: 客户端接收一个带有受保护 JWS 头和签名值的 AgentCard。
        en: A client receives an AgentCard with a protected JWS header and signature value.
        ja: client が protected JWS header と signature value を持つ AgentCard を受け取る。
      format: |
        {
          "name": "Research assistant",
          "capabilities": {},
          "signatures": [
            {
              "protected": "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpPU0UiLCJraWQiOiJrZXktMSJ9",
              "signature": "dGVzdC1zaWduYXR1cmU"
            }
          ]
        }
      source_claims: [a2a-v1-agent-card-signature-fields]
  typical_output:
    - description:
        zh: 验证器在独立解析密钥与算法策略后报告签名验证结果。
        en: A verifier reports the signature-verification result after independently resolving keys and algorithm policy.
        ja: verifier は key と algorithm policy を独立に解決した後、signature-verification result を報告する。
      format: |
        {"signaturePresent":true,"cryptographicallyVerified":"depends-on-key-resolution-and-verification"}
      source_claims: [a2a-v1-agent-card-signature-fields, a2a-v1-agent-card-signature-canonicalization]
  reference_implementations:
    - name: A2A Protocol v1 AgentCard signatures
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentCard signatures, JWS protection, and canonicalization requirements.
    - name: A2A v1 Protocol Buffer definition
      url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
      description: Declares AgentCardSignature protected, signature, and header fields.
structure:
  identity_keys: [protected, signature]
  fields:
    - id: protected
      labels:
        zh: 受保护 JWS 头
        en: Protected JWS header
        ja: protected JWS header
      definitions:
        zh: 必填的 base64url 编码 JWS 受保护头；其 JSON 内容包含签名算法和密钥标识。
        en: The required base64url-encoded JWS protected header whose JSON content carries signing algorithm and key identity.
        ja: signing algorithm と key identity を持つ JSON content の、必須 base64url-encoded JWS protected header。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[A-Za-z0-9_-]+$'
      example_value: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpPU0UiLCJraWQiOiJrZXktMSJ9
      allowed_values: []
      source_claims: [a2a-v1-agent-card-signature-fields, a2a-v1-agent-card-signature-canonicalization]
    - id: signature
      labels:
        zh: JWS 签名
        en: JWS signature
        ja: JWS signature
      definitions:
        zh: 必填的 base64url 编码 JWS 签名值；格式存在不代表其可通过密码学验证。
        en: The required base64url-encoded JWS signature value; format presence does not imply successful cryptographic verification.
        ja: 必須の base64url-encoded JWS signature value。format が存在しても cryptographic verification の成功を意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[A-Za-z0-9_-]+$'
      example_value: dGVzdC1zaWduYXR1cmU
      allowed_values: []
      source_claims: [a2a-v1-agent-card-signature-fields]
    - id: header
      labels:
        zh: 未保护 JWS 头
        en: Unprotected JWS header
        ja: unprotected JWS header
      definitions:
        zh: 可选的未保护 JWS 头对象；不得把其中的声明当作与受保护头同等的签名完整性证明。
        en: An optional unprotected JWS header object; its claims must not be treated as having the protected header's signed-integrity assurance.
        ja: 任意の unprotected JWS header object。その claim を protected header と同じ signed-integrity assurance を持つものとして扱ってはならない。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"x-display":"key rotation candidate"}'
      allowed_values: []
      source_claims: [a2a-v1-agent-card-signature-fields]
  constraints:
    - id: agent-card-signature-canonical-jws-input
      severity: error
      expression_language: plain
      expression: A signature is validated over the JCS-canonicalized AgentCard with signatures excluded and default-valued field properties omitted; protected and signature are required, and unprotected header claims cannot replace protected-header integrity.
      explanation:
        zh: 签名验证必须重建同一规范化载荷；必填签名字段和受保护头不能由未保护元数据替代。
        en: Signature validation must rebuild the same canonical payload; required signature fields and protected-header integrity cannot be replaced by unprotected metadata.
        ja: signature validation は同じ canonical payload を再構築しなければならない。必須 signature field と protected-header integrity は unprotected metadata で置き換えられない。
      source_claims: [a2a-v1-agent-card-signature-fields, a2a-v1-agent-card-signature-canonicalization]
  required_relations: []
examples:
  - id: agent-card-signature-positive-jws-shape
    labels:
      zh: AgentCardSignature positive
      en: AgentCardSignature positive
      ja: AgentCardSignature positive
    descriptions:
      zh: "A2A Protocol 映射 AgentCardSignature：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps AgentCardSignature: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol AgentCardSignature: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {protected: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpPU0UiLCJraWQiOiJrZXktMSJ9, signature: dGVzdC1zaWduYXR1cmU}

    related_node_ids:
      - AgentCardSignature
      - A2AAgentCard
    related_relation_ids:
      - AgentCardSignature-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-card-signature-fields

  - id: agent-card-signature-counterexample-signs-self
    labels:
      zh: AgentCardSignature counterexample
      en: AgentCardSignature counterexample
      ja: AgentCardSignature counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 AgentCardSignature ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style AgentCardSignature ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 AgentCardSignature ではない。
    field_values: {protected: eyJhbGciOiJFUzI1NiIsImtpZCI6ImtleS0xIn0, signature: dGVzdC1zaWduYXR1cmU}

    related_node_ids:
      - AgentCardSignature
      - A2AAgentCard
    related_relation_ids:
      - AgentCardSignature-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-card-signature-canonicalization

  - id: agent-card-signature-boundary-unprotected-header
    labels:
      zh: AgentCardSignature boundary
      en: AgentCardSignature boundary
      ja: AgentCardSignature boundary
    descriptions:
      zh: Temporal workflow history 是运行时事件溯源，不是 AgentCardSignature WorkflowStep 规范；DurableExecution 实例与规约应区分。
      en: Temporal workflow history is runtime event sourcing, not AgentCardSignature WorkflowStep spec; separate DurableExecution instances from specification.
      ja: Temporal workflow history は runtime で AgentCardSignature WorkflowStep spec ではない。
    field_values: {protected: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpPU0UiLCJraWQiOiJrZXktMSJ9, signature: dGVzdC1zaWduYXR1cmU, header: "'{\\"x-display\\":\\"key rotation candidate\\"}'"}

    related_node_ids:
      - AgentCardSignature
      - A2AAgentCard
    related_relation_ids:
      - AgentCardSignature-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-card-signature-fields

  - id: agent-card-signature-instance-key-rotation
    labels:
      zh: AgentCardSignature instance
      en: AgentCardSignature instance
      ja: AgentCardSignature instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 AgentCardSignature A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to AgentCardSignature A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が AgentCardSignature A2ATask に写像。
    field_values: {protected: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpPU0UiLCJraWQiOiJyb3RhdGluZy1rZXktMjAyNi0wNyJ9, signature: dGVzdC1zaWduYXR1cmU}

    related_node_ids:
      - AgentCardSignature
      - A2AAgentCard
    related_relation_ids:
      - AgentCardSignature-part_of-A2AAgentCard
    source_claims:
      - a2a-v1-agent-card-signature-canonicalization

parent_relation:
  id: AgentCardSignature-part_of-A2AAgentCard
  predicate: part_of
  target: concept:A2AAgentCard
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是 A2A AgentCard 的签名组成部分
    en: is a signature component of an A2A AgentCard
    ja: A2A AgentCard の signature component である
  definition:
    zh: Moonweave 将 AgentCardSignature 组织为 A2AAgentCard 的签名组成部分。
    en: Moonweave organizes AgentCardSignature as a signature component of A2AAgentCard.
    ja: Moonweave は AgentCardSignature を A2AAgentCard の signature component として整理する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 可包含签名
      en: may have signature
      ja: signature を持ちうる
  conditions: []
  temporal_scope: card-lifetime
  boundary_context: This Moonweave composition organizes AgentCard signatures without asserting trust, key validity, or authorization.
  constraints:
    - id: agent-card-signature-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The composition edge organizes a card signature in Moonweave and must not be interpreted as a cryptographic verification or authorization result.
      explanation:
        zh: 该组成边仅组织卡片签名，不能解释为密码学验证或授权结果。
        en: This composition edge organizes a card signature and cannot be interpreted as cryptographic verification or authorization.
        ja: この composition edge は card signature を整理するもので、cryptographic verification や authorization と解釈できない。
      source_claims: [moonweave-a2a-agent-card-signature-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-agent-card-signature-taxonomy]
  distinct_fact_rationale:
    zh: 该关系表达本体包含关系，不对签名的密码学结果作结论。
    en: This relation expresses ontology containment and makes no conclusion about cryptographic results.
    ja: この relation は ontology containment を表し、cryptographic result について結論を出さない。
relations: []
