schema: moonweave.ai/ontology-node/v1
id: A2ASendMessageConfiguration
kind: concept
labels:
  zh: A2A 发送消息配置
  en: A2A send-message configuration
  ja: A2A メッセージ送信構成
semantics:
  short_definition:
    zh: 为 A2A SendMessageRequest 指定响应和更新偏好的可选配置记录。
    en: An optional configuration record specifying response and update preferences for A2A SendMessageRequest.
    ja: A2A SendMessageRequest の応答と更新の選好を指定する任意の構成記録。
  definition:
    zh: A2A SendMessageConfiguration 是随 A2A SendMessageRequest 提供的可选协议数据对象。它可声明 acceptedOutputModes、任务推送配置、historyLength 和 returnImmediately 等响应行为偏好。它不定义服务器内部执行预算、工作者能力选择、授权范围或本地委派合同。
    en: An A2A SendMessageConfiguration is an optional protocol data object supplied with an A2A SendMessageRequest. It can declare response behavior preferences such as acceptedOutputModes, task push configuration, historyLength, and returnImmediately. It does not define a server-internal execution budget, worker-capability selection, authorization scope, or local delegation contract.
    ja: A2A SendMessageConfiguration は A2A SendMessageRequest とともに提供される任意のプロトコルデータオブジェクトである。acceptedOutputModes、タスク push 構成、historyLength、returnImmediately などの応答動作選好を宣言できる。サーバー内部実行予算、ワーカー能力選択、認可範囲、ローカル委任契約を定義するものではない。
  why_needed:
    zh: 不同客户端可能接受不同输出形式、等待方式和更新渠道。显式配置让服务端在同一消息操作中了解客户端的协议偏好，而不要求它知道调用方的内部编排或治理规则。
    en: Different clients can accept different output forms, waiting behavior, and update channels. Explicit configuration lets a service understand client protocol preferences in the same message operation without requiring knowledge of caller-internal orchestration or governance rules.
    ja: クライアントごとに受理できる出力形式、待機動作、更新チャネルは異なり得る。明示的構成により、サービスは呼出側内部のオーケストレーションやガバナンス規則を知ることなく、同じメッセージ操作でクライアントのプロトコル選好を理解できる。
  includes:
    - zh: 可接受输出模式、任务推送更新、历史长度和立即返回偏好。
      en: Accepted output modes, task push updates, history length, and return-immediately preference.
      ja: 受理可能な出力形式、タスク push 更新、履歴長、即時返却選好。
  excludes:
    - zh: 服务器已实际选择的输出、任务状态或 Artifact。
      en: The output actually chosen by the server, task status, or an Artifact.
      ja: サーバーが実際に選んだ出力、task status、Artifact。
    - zh: Moonweave 的 DelegationBudget 或 DelegatedAuthority 本地策略。
      en: Moonweave DelegationBudget or DelegatedAuthority local policy.
      ja: Moonweave の DelegationBudget または DelegatedAuthority ローカル方針。
  semantic_kind: information
  aliases:
    - language: en
      value: SendMessageConfiguration
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 客户端将配置作为 SendMessageRequest 的可选字段发送。服务端检查可接受输出模式和支持能力，再按请求选择阻塞或立即返回行为并可能注册推送更新；本地配额、工作者池或授权决定应在服务端实现中单独保存，不能借配置字段伪装为 A2A 语义。
    en: A client sends configuration as an optional SendMessageRequest field. A server checks accepted output modes and supported capabilities, then follows requested blocking or immediate-return behavior and may register push updates. Local quotas, worker pools, and authorization decisions remain separate server implementation data rather than being disguised as A2A configuration semantics.
    ja: クライアントは configuration を任意の SendMessageRequest フィールドとして送る。サーバーは受理可能出力形式と対応能力を確認し、要求されたブロッキングまたは即時返却動作に従い、push 更新を登録し得る。ローカルクォータ、ワーカープール、認可決定は A2A 構成意味論に偽装せず、別のサーバー実装データとして保持する。
  typical_input:
    - description: A client accepts text output, asks for immediate return, and limits returned history.
      format: |
        {
          "acceptedOutputModes": ["text/plain"],
          "historyLength": 3,
          "returnImmediately": true
        }
      source_claims: [a2a-send-message-configuration-data-model]
  typical_output:
    - description: The server can return a current Task representation while later updates use the configured channel.
      format: |
        {
          "id": "task-20260718-001",
          "status": {"state": "TASK_STATE_WORKING"}
        }
      source_claims: [a2a-send-message-configuration-return-behavior]
  reference_implementations:
    - name: A2A Protocol Specification — SendMessageConfiguration
      url: https://a2a-protocol.org/latest/specification/
      description: Defines accepted output modes, task push configuration, history length, and return-immediately response behavior.
structure:
  identity_keys: [acceptedOutputModes, returnImmediately]
  fields:
    - id: acceptedOutputModes
      labels: {zh: 可接受输出模式, en: Accepted output modes, ja: 受理可能出力形式}
      definitions: {zh: 客户端可选声明的、可接受的响应输出模式集合。, en: An optional client-declared collection of acceptable response output modes., ja: クライアントが任意に宣言する受理可能な応答出力形式の集合。}
      datatype: string[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["text/plain"]'
      allowed_values: []
      source_claims: [a2a-send-message-configuration-data-model]
    - id: taskPushNotificationConfig
      labels: {zh: 任务推送配置, en: Task push configuration, ja: タスク push 構成}
      definitions: {zh: 可选的任务推送更新配置。, en: Optional configuration for task push updates., ja: タスク push 更新の任意構成。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"url":"https://client.example.test/a2a-updates"}'
      allowed_values: []
      source_claims: [a2a-send-message-configuration-data-model]
    - id: historyLength
      labels: {zh: 历史长度, en: History length, ja: 履歴長}
      definitions: {zh: 可选的、请求返回的任务消息历史长度偏好。, en: An optional preference for the length of returned task message history., ja: 返却される task メッセージ履歴の長さに関する任意の選好。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[0-9]+$'
      example_value: 3
      allowed_values: []
      source_claims: [a2a-send-message-configuration-data-model]
    - id: returnImmediately
      labels: {zh: 立即返回, en: Return immediately, ja: 即時返却}
      definitions: {zh: 可选的请求响应时机偏好。, en: An optional preference for response timing., ja: 応答タイミングに関する任意の選好。}
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [a2a-send-message-configuration-return-behavior]
  constraints:
    - id: a2a-send-message-configuration-is-optional-preference
      severity: warning
      expression_language: plain
      expression: SendMessageConfiguration modifies response and update preferences for its SendMessageRequest and is not a worker-selection or authorization instruction.
      explanation:
        zh: 配置表达客户端协议偏好，不能取代本地调度、授权或预算控制。
        en: Configuration expresses client protocol preference and cannot replace local scheduling, authorization, or budget control.
        ja: 構成はクライアントのプロトコル選好を表し、ローカルスケジューリング、認可、予算制御を置き換えられない。
      source_claims: [a2a-send-message-configuration-data-model, moonweave-a2a-send-message-configuration-module-composition]
    - id: a2a-send-message-configuration-history-length-nonnegative
      severity: error
      expression_language: plain
      expression: When historyLength is supplied, it is a nonnegative integer.
      explanation:
        zh: 负数不能表示返回历史中的消息数量。
        en: A negative number cannot express a count of messages in returned history.
        ja: 負数は返却履歴内のメッセージ数を表現できない。
      source_claims: [a2a-send-message-configuration-data-model]
  required_relations: []
examples:
  - id: a2a-send-message-configuration-positive-text-immediate
    labels:
      zh: A2ASendMessageConfiguration positive
      en: A2ASendMessageConfiguration positive
      ja: A2ASendMessageConfiguration positive
    descriptions:
      zh: "A2A Protocol 映射 A2ASendMessageConfiguration：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2ASendMessageConfiguration: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2ASendMessageConfiguration: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {acceptedOutputModes: "'[\\"text/plain\\"]'", historyLength: 3, returnImmediately: true}

    related_node_ids:
      - A2ASendMessageConfiguration
      - A2ASendMessageRequest
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-send-message-configuration-data-model
      - a2a-send-message-configuration-return-behavior

  - id: a2a-send-message-configuration-counterexample-worker-pool
    labels:
      zh: A2ASendMessageConfiguration counterexample
      en: A2ASendMessageConfiguration counterexample
      ja: A2ASendMessageConfiguration counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ASendMessageConfiguration DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ASendMessageConfiguration DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ASendMessageConfiguration ではない。
    field_values: {workerPool: "'[\\"researcher", maxSubagents: 2}

    related_node_ids:
      - A2ASendMessageConfiguration
      - WorkerPool
    related_relation_ids: []
    source_claims:
      - a2a-send-message-configuration-data-model
      - moonweave-a2a-send-message-configuration-module-composition

  - id: a2a-send-message-configuration-boundary-history-only
    labels:
      zh: A2ASendMessageConfiguration boundary
      en: A2ASendMessageConfiguration boundary
      ja: A2ASendMessageConfiguration boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2ASendMessageConfiguration 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2ASendMessageConfiguration work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2ASendMessageConfiguration work_specification ではない。
    field_values: {historyLength: 1}

    related_node_ids:
      - A2ASendMessageConfiguration
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-send-message-configuration-data-model

  - id: a2a-send-message-configuration-instance-push
    labels:
      zh: A2ASendMessageConfiguration instance
      en: A2ASendMessageConfiguration instance
      ja: A2ASendMessageConfiguration instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ASendMessageConfiguration A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ASendMessageConfiguration A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ASendMessageConfiguration A2ATask に写像。
    field_values: {acceptedOutputModes: "'[\\"application/json\\"]'", taskPushNotificationConfig: "'{\\"url\\":\\"https://client.example.test/a2a-updates\\"}'"}

    related_node_ids:
      - A2ASendMessageConfiguration
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-send-message-configuration-data-model

