schema: moonweave.ai/ontology-node/v1
id: A2AContextId
kind: concept
labels:
  zh: A2A 上下文标识
  en: A2A context identifier
  ja: A2A コンテキスト識別子
semantics:
  short_definition:
    zh: 逻辑分组相关 A2A Task 和 Message 的不透明标识。
    en: An opaque identifier that logically groups related A2A Tasks and Messages.
    ja: 関連する A2A Task と Message を論理的にまとめる不透明な識別子。
  definition:
    zh: A2A contextId 是用于在多轮交互中逻辑分组相关 Task 与 Message 的协议标识。智能体可在处理未带 contextId 的 Message 时生成它，并在响应中返回；也可接受并保留调用方提供的值。它不是消息正文、任务标识、凭据、上下文隔离实现或私有提示历史。
    en: An A2A contextId is a protocol identifier that logically groups related Tasks and Messages across multi-turn interaction. An agent may generate it while handling a Message without contextId and return it in the response, or may accept and preserve a caller-provided value. It is not message content, a task identifier, a credential, a context-isolation implementation, or private prompt history.
    ja: A2A contextId は、複数ターン相互作用で関連する Task と Message を論理的にまとめるプロトコル識別子である。エージェントは contextId を持たない Message の処理中にこれを生成して応答に返せ、呼出側提供値を受理・保持することもできる。これはメッセージ内容、task 識別子、資格情報、コンテキスト隔離実装、非公開プロンプト履歴ではない。
  why_needed:
    zh: 多轮对话可能包含多个任务和消息。contextId 使客户端和服务端能在不把整个会话状态或私有历史跨边界传输的情况下表示连续性，并能在继续任务时验证相关标识是否一致。
    en: A multi-turn conversation can contain multiple tasks and messages. contextId lets clients and servers express continuity without transmitting entire session state or private history across the boundary, and lets them validate related identifiers when continuing work.
    ja: 複数ターン会話には複数の task と message が含まれ得る。contextId により、クライアントとサーバーはセッション状態全体や非公開履歴を境界越しに送らずに連続性を表し、作業継続時に関連識別子を検証できる。
  includes:
    - zh: 服务器生成并在响应中返回的上下文标识。
      en: A server-generated context identifier returned in a response.
      ja: サーバー生成で応答に返るコンテキスト識別子。
    - zh: 服务端接受并保留的调用方提供标识。
      en: A caller-provided identifier that a server accepts and preserves.
      ja: サーバーが受理・保持する呼出側提供識別子。
  excludes:
    - zh: A2A taskId、Message 内容或访问令牌。
      en: An A2A taskId, Message content, or access token.
      ja: A2A taskId、Message 内容、アクセス トークン。
    - zh: Moonweave ContextIsolation 的本地最小上下文规则。
      en: Moonweave ContextIsolation local minimum-context rule.
      ja: Moonweave ContextIsolation のローカル最小コンテキスト規則。
  semantic_kind: information
  aliases:
    - language: en
      value: contextId
      alias_kind: protocol-field-name
engineering:
  explanation:
    zh: 客户端可在后续 Message 中携带 contextId 以表示继续同一交互。服务器维护该标识与其 Task 和 Message 的关联，并在仅有 taskId 时从任务推断 contextId；若二者同时存在但不匹配，服务器必须拒绝请求。实现把标识作为不透明关联键，而不是将其解析为权限或提示内容。
    en: A client can include contextId in a later Message to signal continuation of one interaction. The server maintains its association with Tasks and Messages and infers contextId from a task when only taskId is present. If both are supplied and mismatch, the server must reject the request. Implementations treat the identifier as an opaque association key rather than parsing it as authorization or prompt content.
    ja: クライアントは後続 Message に contextId を含めて一つの相互作用の継続を示せる。サーバーは Task と Message との関連を維持し、taskId のみがあるとき task から contextId を推論する。両方が提供され不一致なら、サーバーはリクエストを拒否しなければならない。実装は識別子を認可やプロンプト内容として解析せず、不透明な関連キーとして扱う。
  typical_input:
    - description: A follow-up Message continues an existing task and context.
      format: |
        {
          "messageId": "msg-20260718-follow-up",
          "contextId": "ctx-quarterly-report",
          "taskId": "task-20260718-001",
          "role": "ROLE_USER",
          "parts": [{"text": "Use the latest completed quarter."}]
        }
      source_claims: [a2a-context-id-semantics]
  typical_output:
    - description: A new Task response returns the server-generated context identifier.
      format: |
        {
          "id": "task-20260718-001",
          "contextId": "ctx-quarterly-report",
          "status": {"state": "TASK_STATE_WORKING"}
        }
      source_claims: [a2a-context-id-semantics]
  reference_implementations:
    - name: A2A Protocol Specification — Context Identifier Semantics
      url: https://a2a-protocol.org/latest/specification/
      description: Defines contextId grouping, generation, response inclusion, client-provided values, and consistency rules with taskId.
structure:
  identity_keys: [value]
  fields:
    - id: value
      labels: {zh: 标识值, en: Identifier value, ja: 識別子値}
      definitions:
        zh: 将相关 A2A Task 和 Message 逻辑分组的上下文标识值。
        en: The context identifier value that logically groups related A2A Tasks and Messages.
        ja: 関連する A2A Task と Message を論理的にまとめるコンテキスト識別子値。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ctx-quarterly-report
      allowed_values: []
      source_claims: [a2a-context-id-semantics]
  constraints:
    - id: a2a-context-id-groups-related-objects
      severity: error
      expression_language: plain
      expression: A contextId logically groups related A2A Tasks and Messages in one conversational context.
      explanation:
        zh: 标识表达关联和连续性，不携带完整会话内容。
        en: The identifier expresses association and continuity rather than carrying complete session content.
        ja: 識別子は完全なセッション内容を運ぶのではなく、関連と連続性を表す。
      source_claims: [a2a-context-id-semantics]
    - id: a2a-context-id-must-match-task
      severity: error
      expression_language: plain
      expression: When a Message provides both contextId and taskId, contextId must match the context of the referenced Task.
      explanation:
        zh: 不匹配的标识会错误地跨越两个会话上下文，服务器必须拒绝该请求。
        en: Mismatched identifiers would cross two conversational contexts, so the server must reject the request.
        ja: 不一致の識別子は二つの会話コンテキストをまたぐため、サーバーはリクエストを拒否しなければならない。
      source_claims: [a2a-context-id-consistency]
  required_relations: []
examples:
  - id: a2a-context-id-positive-follow-up
    labels:
      zh: A2AContextId positive
      en: A2AContextId positive
      ja: A2AContextId positive
    descriptions:
      zh: A2A Protocol 映射 A2AContextId：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2AContextId: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2AContextId: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {value: ctx-quarterly-report}

    related_node_ids:
      - A2AContextId
      - A2AMessage
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-context-id-semantics
      - a2a-context-id-consistency

  - id: a2a-context-id-counterexample-mismatch
    labels:
      zh: A2AContextId counterexample
      en: A2AContextId counterexample
      ja: A2AContextId counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2AContextId DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2AContextId DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2AContextId ではない。
    field_values: {value: ctx-other, taskId: task-20260718-001}

    related_node_ids:
      - A2AContextId
      - A2AMessage
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-context-id-consistency

  - id: a2a-context-id-boundary-client-provided
    labels:
      zh: A2AContextId boundary
      en: A2AContextId boundary
      ja: A2AContextId boundary
    descriptions:
      zh: AutoGen GroupChat messages 是运行时对话历史，不是 A2AContextId 委派规范；Handoff 规约与 ConversableAgent 消息流应区分。
      en: AutoGen GroupChat messages are runtime conversation history, not A2AContextId delegation spec; separate Handoff specification from ConversableAgent message flow.
      ja: AutoGen messages は runtime で A2AContextId delegation spec ではない。
    field_values: {value: ctx-client-7}

    related_node_ids:
      - A2AContextId
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-context-id-semantics

  - id: a2a-context-id-instance-server-generated
    labels:
      zh: A2AContextId instance
      en: A2AContextId instance
      ja: A2AContextId instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AContextId A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AContextId A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AContextId A2ATask に写像。
    field_values: {value: ctx-quarterly-report}

    related_node_ids:
      - A2AContextId
      - A2ATask
      - A2ASendMessageResponse
    related_relation_ids: []
    source_claims:
      - a2a-context-id-semantics

