schema: moonweave.ai/ontology-node/v1
id: A2APart
kind: concept
labels:
  zh: A2A 内容片段
  en: A2A part
  ja: A2A Part
semantics:
  short_definition:
    zh: A2A Message 或 Artifact 中携带一种内容形式的片段。
    en: A content fragment carrying one supported form inside an A2A Message or Artifact.
    ja: A2A Message または Artifact 内で一つの対応内容形式を運ぶ断片。
  definition:
    zh: A2A Part 是 A2A Message 和 Artifact 的内容单元。它在 text、raw、url 或 data 中恰好选择一种内容形式，并可附带 metadata、filename 和 mediaType。它不是完整 Message、完整 Artifact 或任意多格式容器。
    en: An A2A Part is a content unit of an A2A Message or Artifact. It selects exactly one content form from text, raw, url, or data and may carry metadata, filename, and mediaType. It is not a complete Message, complete Artifact, or arbitrary multi-format container.
    ja: A2A Part は A2A Message と Artifact の内容単位である。text、raw、url、data からちょうど一つの内容形式を選び、metadata、filename、mediaType を任意に持てる。完全な Message、完全な Artifact、または任意の複数形式コンテナではない。
  why_needed:
    zh: 智能体间交互既可能传文本，也可能传结构化数据、二进制内容或 URL。互斥的内容联合可让接收方依据明确类型处理每个片段，并避免把多个冲突载荷解释为同一语义内容。
    en: Agent interaction can carry text, structured data, binary content, or URLs. A mutually exclusive content union lets a receiver process each fragment by an explicit type and prevents multiple conflicting payloads from being interpreted as one semantic content item.
    ja: エージェント相互作用はテキスト、構造化データ、バイナリ内容、URL を運び得る。相互排他的な内容ユニオンにより、受信側は各断片を明示型で処理でき、複数の競合ペイロードを一つの意味内容として解釈することを防げる。
  includes:
    - zh: text、raw、url 或 data 之一。
      en: Exactly one of text, raw, url, or data.
      ja: text、raw、url、data のいずれか一つ。
    - zh: 可选的内容元数据、文件名和媒体类型。
      en: Optional content metadata, filename, and media type.
      ja: 任意の内容 metadata、ファイル名、メディア型。
  excludes:
    - zh: 同时携带多个内容联合成员的复合对象。
      en: A compound object carrying multiple content-union members at once.
      ja: 複数の内容ユニオンメンバーを同時に持つ複合オブジェクト。
    - zh: 单独作为协议消息或任务输出生命周期记录的对象。
      en: An object acting alone as a protocol message or task-output lifecycle record.
      ja: 単独でプロトコル Message またはタスク出力ライフサイクル記録として振る舞うオブジェクト。
  semantic_kind: information
  aliases:
    - language: en
      value: Part
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 发送方在构造 Message 或 Artifact 时为每个内容项选择一个 Part 联合成员，并将文件名、媒体类型或元数据作为辅助描述保存。接收方先验证互斥联合，再对 text 渲染、对 url 获取或对 data 解码；它不能因为同时有多个字段就自行选择一个忽略另一个。
    en: A sender selects one Part union member for each content item while constructing a Message or Artifact and stores filename, media type, or metadata as supporting description. A receiver validates the exclusive union before rendering text, fetching a URL, or decoding data. It cannot choose one field and silently ignore another when several are present.
    ja: 送信側は Message または Artifact を構成するとき、各内容項目に一つの Part ユニオンメンバーを選び、filename、media type、metadata を補助記述として保存する。受信側は text の描画、URL の取得、data の復号前に排他的ユニオンを検証する。複数フィールドがある場合に一つを選んで他を黙って無視してはならない。
  typical_input:
    - description: A Part using the text branch carries one user-visible request.
      format: |
        {
          "text": "Summarize the incident report."
        }
      source_claims: [a2a-part-content-union]
  typical_output:
    - description: A Part using the data branch can carry a file description with media information.
      format: |
        {
          "data": {"report": "quarterly"},
          "filename": "report.json",
          "mediaType": "application/json"
        }
      source_claims: [a2a-part-content-union]
  reference_implementations:
    - name: A2A Protocol Specification — Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the Part content union and its optional metadata, filename, and mediaType fields.
structure:
  identity_keys: [content_form, content_digest]
  fields:
    - id: text
      labels: {zh: 文本, en: Text, ja: テキスト}
      definitions: {zh: Part 的可选文本内容联合成员。, en: The optional text content-union member of the Part., ja: Part の任意 text 内容ユニオンメンバー。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Summarize the incident report.
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: raw
      labels: {zh: 原始内容, en: Raw content, ja: 生コンテンツ}
      definitions: {zh: Part 的可选原始内容联合成员。, en: The optional raw content-union member of the Part., ja: Part の任意 raw 内容ユニオンメンバー。}
      datatype: unknown
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"severity":"high","service":"billing"}'
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: url
      labels: {zh: URL 内容, en: URL content, ja: URL コンテンツ}
      definitions: {zh: Part 的可选 URL 内容联合成员。, en: The optional URL content-union member of the Part., ja: Part の任意 URL 内容ユニオンメンバー。}
      datatype: URI
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: https://example.test/reports/q2.pdf
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: data
      labels: {zh: 数据内容, en: Data content, ja: データコンテンツ}
      definitions: {zh: Part 的可选数据内容联合成员。, en: The optional data content-union member of the Part., ja: Part の任意 data 内容ユニオンメンバー。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"report":"quarterly"}'
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions: {zh: Part 的可选实现扩展数据。, en: Optional implementation extension data for the Part., ja: Part の任意実装拡張データ。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"checksum":"sha256-example"}'
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: filename
      labels: {zh: 文件名, en: Filename, ja: ファイル名}
      definitions: {zh: 可选的内容文件名提示。, en: An optional filename hint for the content., ja: 内容に対する任意のファイル名ヒント。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: report.json
      allowed_values: []
      source_claims: [a2a-part-content-union]
    - id: mediaType
      labels: {zh: 媒体类型, en: Media type, ja: メディア型}
      definitions: {zh: 可选的内容媒体类型提示。, en: An optional media-type hint for the content., ja: 内容に対する任意のメディア型ヒント。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: application/json
      allowed_values: []
      source_claims: [a2a-part-content-union]
  constraints:
    - id: a2a-part-exactly-one-content-form
      severity: error
      expression_language: plain
      expression: Exactly one of text, raw, url, and data is present in a Part.
      explanation:
        zh: 每个 Part 只表达一种内容形式，接收方不需要猜测冲突字段的优先级。
        en: Each Part expresses one content form, so a receiver does not have to guess precedence among conflicting fields.
        ja: 各 Part は一つの内容形式を表し、受信側が競合フィールド間の優先順位を推測する必要はない。
      source_claims: [a2a-part-content-union]
    - id: a2a-part-descriptors-do-not-add-content-form
      severity: warning
      expression_language: plain
      expression: Metadata, filename, and mediaType may describe a Part but do not satisfy the required content form by themselves.
      explanation:
        zh: 辅助描述有助于处理内容，但不能替代 text、raw、url 或 data。
        en: Supporting descriptors help process content but cannot replace text, raw, url, or data.
        ja: 補助記述は内容処理に役立つが、text、raw、url、data の代わりにはならない。
      source_claims: [a2a-part-content-union]
  required_relations: []
examples:
  - id: a2a-part-positive-text
    labels:
      zh: A2APart positive
      en: A2APart positive
      ja: A2APart positive
    descriptions:
      zh: "A2A Protocol 映射 A2APart：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2APart: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2APart: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {text: "Summarize the incident report."}

    related_node_ids:
      - A2APart
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-part-content-union

  - id: a2a-part-counterexample-two-content-forms
    labels:
      zh: A2APart counterexample
      en: A2APart counterexample
      ja: A2APart counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 A2APart 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style A2APart group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 A2APart ではない。
    field_values: {text: "Read this report.", url: "https://example.test/reports/q2.pdf"}

    related_node_ids:
      - A2APart
    related_relation_ids: []
    source_claims:
      - a2a-part-content-union

  - id: a2a-part-boundary-data-file-descriptor
    labels:
      zh: A2APart boundary
      en: A2APart boundary
      ja: A2APart boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2APart 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2APart work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2APart work_specification ではない。
    field_values: {data: "'{\\"report\\":\\"quarterly\\"}'", filename: report.json, mediaType: "application/json"}

    related_node_ids:
      - A2APart
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-part-content-union

  - id: a2a-part-instance-raw-alert
    labels:
      zh: A2APart instance
      en: A2APart instance
      ja: A2APart instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2APart A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2APart A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2APart A2ATask に写像。
    field_values: {raw: "'{\\"severity\\":\\"high", "service": "billing\\"}'", metadata: "'{\\"source\\":\\"monitor\\"}'"}

    related_node_ids:
      - A2APart
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-part-content-union

