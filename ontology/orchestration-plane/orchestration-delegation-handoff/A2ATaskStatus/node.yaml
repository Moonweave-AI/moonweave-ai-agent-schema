schema: moonweave.ai/ontology-node/v1
id: A2ATaskStatus
kind: concept
labels:
  zh: A2A 任务状态
  en: A2A task status
  ja: A2A タスク状態
semantics:
  short_definition:
    zh: 描述一个 A2A Task 当前生命周期位置的状态记录。
    en: A status record describing an A2A Task's current lifecycle position.
    ja: A2A Task の現在のライフサイクル位置を記述する状態記録。
  definition:
    zh: A2A TaskStatus 是嵌入 A2A Task 或状态更新事件中的协议数据对象。它必须含有 TaskState，并可含与该状态相关的 Message 和时间戳。它描述任务在协议生命周期中的位置，而不是任务产物、调用方本地运行状态或工作者选择结论。
    en: An A2A TaskStatus is a protocol data object embedded in an A2A Task or status-update event. It must contain a TaskState and may contain a Message and timestamp associated with that state. It describes where a task is in the protocol lifecycle, not a task artifact, caller-local runtime state, or worker-selection conclusion.
    ja: A2A TaskStatus は、A2A Task または状態更新イベントに埋め込まれるプロトコルデータオブジェクトである。TaskState が必須で、その状態に関連する Message と timestamp を任意に持てる。これはプロトコルライフサイクルにおけるタスクの位置を表し、タスク Artifact、呼出側ローカル実行状態、ワーカー選択の結論ではない。
  why_needed:
    zh: 长时间运行的跨服务工作需要让客户端区分进行中、等待输入和终态。单独的结构化状态记录允许服务器在不泄漏内部执行细节的情况下发送可处理的生命周期进展。
    en: Long-running cross-service work needs clients to distinguish in-progress, input-waiting, and terminal conditions. A separate structured status record lets a server communicate actionable lifecycle progress without leaking internal execution detail.
    ja: 長時間のサービス間作業では、クライアントが進行中、入力待ち、終端状態を区別する必要がある。独立した構造化 status 記録により、サーバーは内部実行詳細を漏らさずに処理可能なライフサイクル進行を通知できる。
  includes:
    - zh: 必需的 A2A TaskState。
      en: The required A2A TaskState.
      ja: 必須の A2A TaskState。
    - zh: 可选的状态关联消息和时间戳。
      en: An optional state-associated message and timestamp.
      ja: 任意の状態関連メッセージとタイムスタンプ。
  excludes:
    - zh: 整个 A2A Task 记录。
      en: The entire A2A Task record.
      ja: A2A Task 記録全体。
    - zh: 传输状态变化的 A2A TaskStatusUpdateEvent 外层事件。
      en: The outer A2A TaskStatusUpdateEvent that transports a status change.
      ja: 状態変化を伝送する外側の A2A TaskStatusUpdateEvent。
  semantic_kind: information
  aliases:
    - language: en
      value: TaskStatus
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务器更新 Task 时应替换或发送其当前 TaskStatus；客户端依据 state 驱动等待、提问、完成或失败处理。可选 Message 只解释当前状态或携带下一步可见内容，不能被当作历史的完整替代，也不能把内部堆栈或私有推理当作状态字段。
    en: When a server updates a Task, it replaces or emits its current TaskStatus; clients drive waiting, prompting, completion, or failure handling from state. The optional Message explains the current state or carries visible next-step content, rather than replacing full history or exposing internal stacks or private reasoning.
    ja: サーバーは Task を更新するとき、現在の TaskStatus を置換または送信する。クライアントは state に基づいて待機、質問、完了、失敗処理を行う。任意の Message は現在状態を説明するか可視の次ステップ内容を運び、完全な履歴の代替や内部スタック・非公開推論の公開にはならない。
  typical_input:
    - description: A Task currently reports that the server is processing it.
      format: |
        {
          "id": "task-20260718-001",
          "status": {
            "state": "TASK_STATE_WORKING",
            "timestamp": "2026-07-18T08:10:00Z"
          }
        }
      source_claims: [a2a-task-status-data-model]
  typical_output:
    - description: A status update can explain that user input is needed to continue.
      format: |
        {
          "state": "TASK_STATE_INPUT_REQUIRED",
          "message": {
            "messageId": "msg-question-001",
            "role": "ROLE_AGENT",
            "parts": [{"text": "Which reporting period should I use?"}]
          },
          "timestamp": "2026-07-18T08:12:00Z"
        }
      source_claims: [a2a-task-status-data-model]
  reference_implementations:
    - name: A2A Protocol Specification — TaskStatus
      url: https://a2a-protocol.org/latest/specification/
      description: Defines TaskStatus with required state and optional message and timestamp fields.
structure:
  identity_keys: [state, timestamp]
  fields:
    - id: state
      labels: {zh: 状态, en: State, ja: 状態}
      definitions: {zh: 必须说明任务当前生命周期位置的 A2A TaskState。, en: The required A2A TaskState stating the task's current lifecycle position., ja: タスクの現在ライフサイクル位置を示す必須 A2A TaskState。}
      datatype: A2ATaskState
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: TASK_STATE_WORKING
      allowed_values: []
      source_claims: [a2a-task-status-data-model]
    - id: message
      labels: {zh: 状态消息, en: Status message, ja: 状態メッセージ}
      definitions: {zh: 可选的、与当前状态有关的 A2A Message。, en: An optional A2A Message associated with the current state., ja: 現在状態に関連する任意の A2A Message。}
      datatype: A2AMessage
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"messageId":"msg-question-001","role":"ROLE_AGENT","parts":[{"text":"Which reporting period should I use?"}]}'
      allowed_values: []
      source_claims: [a2a-task-status-data-model]
    - id: timestamp
      labels: {zh: 时间戳, en: Timestamp, ja: タイムスタンプ}
      definitions: {zh: 可选的状态产生或报告时间。, en: An optional time at which the status was produced or reported., ja: 状態が生成または報告された任意の時刻。}
      datatype: RFC3339-date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 2026-07-18T08:10:00Z
      allowed_values: []
      source_claims: [a2a-task-status-data-model]
  constraints:
    - id: a2a-task-status-requires-state
      severity: error
      expression_language: plain
      expression: A TaskStatus must contain exactly one TaskState.
      explanation:
        zh: 状态记录若没有 state，客户端就无法确定协议生命周期位置。
        en: Without state, a client cannot determine the protocol lifecycle position.
        ja: state がなければ、クライアントはプロトコルライフサイクル位置を判定できない。
      source_claims: [a2a-task-status-data-model]
    - id: a2a-task-status-message-is-contextual
      severity: warning
      expression_language: plain
      expression: When present, the Message is associated with the current status and does not replace the Task history collection.
      explanation:
        zh: 状态消息解释当前进展；完整交互历史仍属于 Task 的 history 字段。
        en: A status message explains current progress; complete interaction history remains in the Task history field.
        ja: status メッセージは現在の進行を説明し、完全な相互作用履歴は Task の history フィールドに残る。
      source_claims: [a2a-task-status-data-model]
  required_relations: []
examples:
  - id: a2a-task-status-positive-working
    labels:
      zh: A2ATaskStatus positive
      en: A2ATaskStatus positive
      ja: A2ATaskStatus positive
    descriptions:
      zh: A2A Protocol 映射 A2ATaskStatus：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2ATaskStatus: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2ATaskStatus: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {state: TASK_STATE_WORKING, timestamp: 2026-07-18T08:10:00Z}

    related_node_ids:
      - A2ATaskStatus
      - A2ATask
      - A2ATaskState
    related_relation_ids: []
    source_claims:
      - a2a-task-status-data-model

  - id: a2a-task-status-counterexample-missing-state
    labels:
      zh: A2ATaskStatus counterexample
      en: A2ATaskStatus counterexample
      ja: A2ATaskStatus counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATaskStatus DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATaskStatus DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATaskStatus ではない。
    field_values: {timestamp: 2026-07-18T08:11:00Z}

    related_node_ids:
      - A2ATaskStatus
    related_relation_ids: []
    source_claims:
      - a2a-task-status-data-model

  - id: a2a-task-status-boundary-input-required-message
    labels:
      zh: A2ATaskStatus boundary
      en: A2ATaskStatus boundary
      ja: A2ATaskStatus boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 A2ATaskStatus 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not A2ATaskStatus static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で A2ATaskStatus 静的 RetryPolicy ではない。
    field_values: {state: TASK_STATE_INPUT_REQUIRED, message: "'{\\"messageId\\":\\"msg-question-001", "role": ROLE_AGENT, "parts":[{"text": "Which reporting period should I use?\\"}]}'"}

    related_node_ids:
      - A2ATaskStatus
      - A2ATaskState
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-task-status-data-model

  - id: a2a-task-status-instance-completed
    labels:
      zh: A2ATaskStatus instance
      en: A2ATaskStatus instance
      ja: A2ATaskStatus instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATaskStatus A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATaskStatus A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATaskStatus A2ATask に写像。
    field_values: {state: TASK_STATE_COMPLETED, timestamp: 2026-07-18T08:20:00Z}

    related_node_ids:
      - A2ATaskStatus
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-status-data-model

