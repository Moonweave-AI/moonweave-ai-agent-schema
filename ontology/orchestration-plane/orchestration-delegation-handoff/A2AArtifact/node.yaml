schema: moonweave.ai/ontology-node/v1
id: A2AArtifact
kind: concept
labels:
  zh: A2A 产物
  en: A2A artifact
  ja: A2A Artifact
semantics:
  short_definition:
    zh: A2A Task 输出的、由 Part 组成的核心 Artifact 记录。
    en: A Part-based core Artifact record output by an A2A Task.
    ja: A2A Task が出力する Part ベースの中核 Artifact 記録。
  definition:
    zh: A2A Artifact 是 A2A Task 的输出数据对象。它具有在所属 Task 内唯一的 artifactId，包含至少一个 Part，并可带名称、描述、元数据和声明已出现或贡献给该 Artifact 的扩展 URI。这里建模的是核心 Artifact 字段；扩展自身的私有字段不因该核心记录而被推断。它记录任务已产生的可交付内容，不是 TaskStatus、Message 或服务器内部文件系统对象。
    en: An A2A Artifact is an output data object of an A2A Task. It has an artifactId unique within its owning Task, contains at least one Part, and may carry name, description, metadata, and extension URIs present in or contributing to the Artifact. This node models core Artifact fields only; it does not infer private fields of an extension. It records produced deliverable content, not TaskStatus, Message, or a server-internal filesystem object.
    ja: A2A Artifact は A2A Task の出力データオブジェクトである。所属 Task 内で一意な artifactId を持ち、少なくとも一つの Part を含み、name、description、metadata、および Artifact に存在または寄与する拡張 URI を任意に持てる。このノードは中核 Artifact フィールドだけを扱い、拡張固有の私有フィールドを推論しない。生成済みの提供可能内容を記録し、TaskStatus、Message、サーバー内部ファイルシステムオブジェクトではない。
  why_needed:
    zh: 客户端需要把任务状态与已产出的内容分开处理。Artifact 提供可检索的输出内容，使服务器能够以 Part 形式表达文本、数据或外部引用，而不暴露内部执行存储；增量交付语义属于 TaskArtifactUpdateEvent，而不是 Artifact 本体。
    en: Clients need to handle task state separately from produced content. Artifact provides retrievable output content while allowing a server to express text, data, or external references through Parts without exposing execution storage; incremental-delivery semantics belong to TaskArtifactUpdateEvent, not Artifact itself.
    ja: クライアントはタスク状態を生成済み内容と分けて扱う必要がある。Artifact は取得可能な出力内容を提供し、サーバーは実行ストレージを公開せずに Part を通してテキスト、データ、外部参照を表せる。増分配信の意味論は Artifact 自体ではなく TaskArtifactUpdateEvent に属する。
  includes:
    - zh: 在一个 Task 内唯一的 artifactId。
      en: An artifactId unique within one Task.
      ja: 一つの Task 内で一意な artifactId。
    - zh: 至少一个内容 Part 和可选描述性字段。
      en: At least one content Part and optional descriptive fields.
      ja: 少なくとも一つの内容 Part と任意の記述フィールド。
    - zh: 可选 extensions URI 数组，声明出现于或贡献给 Artifact 的扩展。
      en: An optional extensions-URI array declaring extensions present in or contributing to the Artifact.
      ja: Artifact に存在または寄与する拡張を宣言する任意の extensions URI 配列。
  excludes:
    - zh: 任务当前生命周期状态。
      en: The task's current lifecycle state.
      ja: タスクの現在ライフサイクル状態。
    - zh: 未附属于 A2A Task 的任意本地文件或缓存对象。
      en: An arbitrary local file or cache object not attached to an A2A Task.
      ja: A2A Task に付随しない任意のローカルファイルまたはキャッシュオブジェクト。
    - zh: 未在 extensions 中声明的扩展私有字段。
      en: Extension-private fields that are not declared through extensions.
      ja: extensions で宣言されない拡張固有フィールド。
  semantic_kind: information
  aliases:
    - language: en
      value: Artifact
      alias_kind: protocol-term
engineering:
  explanation:
    zh: "Artifact 记录当前输出内容，并在所属 Task 范围内保持 artifactId 稳定。流式增量和合并由 TaskArtifactUpdateEvent 包装器定义：它携带 taskId、contextId、artifact，并可用 append 与 lastChunk 描述增量及最终分块。客户端按该事件包装器处理合并，同时用 TaskStatus 判断是否仍会出现更多输出。实现不应把工作目录路径或未授权内部文件名直接当作 Artifact。"
    en: "Artifact records current output content and keeps artifactId stable within its owning Task. Streaming increments and merging are defined by the TaskArtifactUpdateEvent wrapper: it carries taskId, contextId, and artifact, and can use append and lastChunk to describe an increment and final chunk. Clients process merging through that event wrapper while retaining TaskStatus to decide whether more output may follow. Implementations must not expose working-directory paths or unauthorized internal filenames as Artifacts."
    ja: "Artifact は現在の出力内容を記録し、所属 Task 内で artifactId を安定させる。ストリーミングの増分と統合は TaskArtifactUpdateEvent ラッパーが定義し、taskId、contextId、artifact を運び、append と lastChunk で増分と最終チャンクを表せる。クライアントはそのイベントラッパーで統合を扱い、追加出力の有無には TaskStatus を使う。実装は作業ディレクトリパスや認可されない内部ファイル名を Artifact として公開してはならない。"
  typical_input:
    - description: One core Artifact record contains a text Part.
      format: |
        {
          "artifactId": "artifact-report",
          "name": "Quarterly report",
          "parts": [{"text": "Quarterly report summary"}]
        }
      source_claims: [a2a-artifact-data-model]
  typical_output:
    - description: A client receives an Artifact record whose Parts can be rendered or processed.
      format: |
        {
          "artifactId": "artifact-report",
          "parts": [{"text": "Quarterly report summary"}]
        }
      source_claims: [a2a-artifact-data-model]
  reference_implementations:
    - name: A2A Protocol Specification — Artifact
      url: https://a2a-protocol.org/latest/specification/
      description: Defines Task output Artifacts, Task-scoped artifact identifiers, and the requirement for at least one Part.
structure:
  identity_keys: [artifactId]
  fields:
    - id: artifactId
      labels: {zh: 产物标识, en: Artifact ID, ja: Artifact ID}
      definitions: {zh: 在所属 A2A Task 范围内唯一的产物标识。, en: The artifact identifier unique within the owning A2A Task., ja: 所属 A2A Task 内で一意な Artifact 識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: artifact-report
      allowed_values: []
      source_claims: [a2a-artifact-data-model]
    - id: parts
      labels: {zh: 内容片段, en: Parts, ja: Part}
      definitions: {zh: 组成产物可交付内容的非空 A2A Part 集合。, en: The non-empty collection of A2A Parts forming the artifact deliverable., ja: Artifact の提供可能内容を構成する空でない A2A Part 集合。}
      datatype: A2APart[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '[{"text":"Quarterly report summary"}]'
      allowed_values: []
      source_claims: [a2a-artifact-data-model]
    - id: name
      labels: {zh: 名称, en: Name, ja: 名前}
      definitions: {zh: 可选的产物人类可读名称。, en: An optional human-readable artifact name., ja: 任意の人間可読 Artifact 名。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Quarterly report
      allowed_values: []
      source_claims: [a2a-artifact-data-model]
    - id: description
      labels: {zh: 描述, en: Description, ja: 説明}
      definitions: {zh: 可选的产物用途或内容描述。, en: An optional description of artifact purpose or content., ja: Artifact の用途または内容に関する任意の説明。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Summary of the requested quarterly report.
      allowed_values: []
      source_claims: [a2a-artifact-data-model]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions: {zh: 不替代产物规范字段的可选实现数据。, en: Optional implementation data that does not replace normative artifact fields., ja: 規範 Artifact フィールドを置き換えない任意の実装データ。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"format_version":"1"}'
      allowed_values: []
      source_claims: [a2a-artifact-data-model]
    - id: extensions
      labels: {zh: 扩展 URI, en: Extension URIs, ja: 拡張 URI}
      definitions:
        zh: 可选的 Artifact 扩展 URI 数组，声明哪些扩展已出现在该 Artifact 中或对其作出贡献；不把扩展私有字段伪装为核心字段。
        en: The optional Artifact extension-URI array declaring extensions present in or contributing to the Artifact; it does not present extension-private fields as core fields.
        ja: Artifact に存在または寄与する拡張を宣言する任意の拡張 URI 配列。拡張固有フィールドを中核フィールドとして扱わない。
      datatype: array
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["https://example.com/a2a/extensions/report-v1"]'
      allowed_values: []
      source_claims: [a2a-artifact-extensions]
  constraints:
    - id: a2a-artifact-id-is-task-scoped
      severity: error
      expression_language: plain
      expression: artifactId is unique within the Task that owns the Artifact.
      explanation:
        zh: 产物标识的唯一性由所属任务范围限定，不能假设它在所有服务器或所有任务中全局唯一。
        en: Artifact identifier uniqueness is scoped to its owning task and must not be assumed globally unique across servers or tasks.
        ja: Artifact 識別子の一意性は所属 task に限定され、すべてのサーバーや task でグローバル一意と仮定してはならない。
      source_claims: [a2a-artifact-data-model]
    - id: a2a-artifact-requires-part
      severity: error
      expression_language: plain
      expression: An Artifact must include at least one Part.
      explanation:
        zh: 没有 Part 的产物没有协议层可交付内容。
        en: An Artifact without a Part has no protocol-level deliverable content.
        ja: Part を持たない Artifact にはプロトコルレベルの提供可能内容がない。
      source_claims: [a2a-artifact-data-model]
    - id: a2a-artifact-extension-boundary
      severity: error
      expression_language: plain
      expression: An Artifact extensions array identifies contributed extension URIs, but core Artifact validation does not infer undeclared extension-private fields.
      explanation:
        zh: Artifact 的 extensions 数组只标识贡献的扩展 URI；核心 Artifact 验证不得推断未声明的扩展私有字段。
        en: An Artifact extensions array identifies contributed extension URIs, but core Artifact validation does not infer undeclared extension-private fields.
        ja: Artifact の extensions 配列は寄与する拡張 URI だけを識別し、中核 Artifact 検証は未宣言の拡張固有フィールドを推論しない。
      source_claims: [a2a-artifact-extensions]
    - id: a2a-artifact-update-wrapper-boundary
      severity: error
      expression_language: plain
      expression: append and lastChunk are TaskArtifactUpdateEvent wrapper fields, not core Artifact fields.
      explanation:
        zh: append 与 lastChunk 是 TaskArtifactUpdateEvent 包装器字段，不是核心 Artifact 字段。
        en: append and lastChunk are TaskArtifactUpdateEvent wrapper fields, not core Artifact fields.
        ja: append と lastChunk は TaskArtifactUpdateEvent ラッパーのフィールドであり、中核 Artifact フィールドではない。
      source_claims: [a2a-task-artifact-update-event]
  required_relations: []
examples:
  - id: a2a-artifact-positive-report
    labels:
      zh: A2AArtifact positive
      en: A2AArtifact positive
      ja: A2AArtifact positive
    descriptions:
      zh: "A2A Protocol 映射 A2AArtifact：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2AArtifact: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2AArtifact: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {artifactId: artifact-report, parts: "'[{\\"text\\":\\"Quarterly report summary\\"}]'", name: "Quarterly report"}

    related_node_ids:
      - A2AArtifact
      - A2ATask
      - A2APart
    related_relation_ids: []
    source_claims:
      - a2a-artifact-data-model

  - id: a2a-artifact-counterexample-empty-parts
    labels:
      zh: A2AArtifact counterexample
      en: A2AArtifact counterexample
      ja: A2AArtifact counterexample
    descriptions:
      zh: 一次性脚本无 skill_library.add 持久化不能作为 Voyager 式 A2AArtifact 技能组合。
      en: One-off script without skill_library.add persistence cannot classify as Voyager-style A2AArtifact skill composition.
      ja: skill_library.add なし一回脚本は Voyager 式 A2AArtifact ではない。
    field_values: {artifactId: artifact-empty, parts: "'[]'"}

    related_node_ids:
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-artifact-data-model

  - id: a2a-artifact-boundary-status-versus-output
    labels:
      zh: A2AArtifact boundary
      en: A2AArtifact boundary
      ja: A2AArtifact boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2AArtifact 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2AArtifact work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2AArtifact work_specification ではない。
    field_values: {artifactId: artifact-report, parts: "'[{\\"text\\":\\"Quarterly report summary\\"}]'"}

    related_node_ids:
      - A2AArtifact
      - A2ATask
      - A2ATaskStatus
    related_relation_ids: []
    source_claims:
      - a2a-artifact-data-model
      - a2a-task-status-data-model

  - id: a2a-artifact-instance-json-report
    labels:
      zh: A2AArtifact instance
      en: A2AArtifact instance
      ja: A2AArtifact instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AArtifact A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AArtifact A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AArtifact A2ATask に写像。
    field_values: {artifactId: artifact-report-json, parts: "'[{\\"data\\":{\\"report\\":\\"quarterly\\"}", "filename": report.json, "mediaType": "application/json\\"}]'", metadata: "'{\\"format_version\\":\\"1\\"}'", extensions: "'[\\"https://example.com/a2a/extensions/report-v1\\"]'"}

    related_node_ids:
      - A2AArtifact
      - A2APart
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-artifact-data-model
      - a2a-part-content-union
      - a2a-artifact-extensions

