      en: The record is accepted as DelegatedAuthority with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegatedAuthority として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派授权规范规定受派方在一次委派中可以代表委派者执行的权限和资源范围。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegated-authority specification states the permissions and resource scope a delegate may exercise on behalf of a delegator in one delegation."
      ja: この場面は次の同一性条件を満たします：委任権限仕様は、一件の委任で受任者が委任者に代わって行使できる許可と資源範囲を定めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegated-authority-007
  - id: DelegatedAuthority-example-boundary-manual-2026
