  - sibling_concept_id: DelegationBudget
    shared_parent_concept_id: DelegationSpecification
    differentia:
      zh: 已审查兄弟区分：父节点 DelegationSpecification：DelegatedAuthority（semantic kind=specification，骨架 DelegatedAuthority-is_a-DelegationSpecification）；DelegationBudget（semantic kind=specification，骨架 DelegationBudget-is_a-DelegationSpecification）。双端条件：DelegatedAuthority 条件：“委派授权规范规定受派方在一次委派中可以代表委派者执行的权限和资源范围”；DelegationBudget 条件：“委派预算规范是为一次委派规定可消耗令牌、时间、费用、重试或工具调用上限的委派规范”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent DelegationSpecification: DelegatedAuthority (semantic kind=specification, backbone DelegatedAuthority-is_a-DelegationSpecification); DelegationBudget (semantic kind=specification, backbone DelegationBudget-is_a-DelegationSpecification). Endpoint conditions: DelegatedAuthority condition: “A delegated-authority specification states the permissions and resource scope a delegate may exercise on behalf of a delegator in one delegation”; DelegationBudget condition: “A delegation budget specification is a delegation specification that limits tokens, time, cost, retries, or tool calls consumable by one delegation”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 DelegationSpecification：DelegatedAuthority（semantic kind=specification、バックボーン DelegatedAuthority-is_a-DelegationSpecification）；DelegationBudget（semantic kind=specification、バックボーン DelegationBudget-is_a-DelegationSpecification）。両端条件：DelegatedAuthority の条件：「委任権限仕様は、一件の委任で受任者が委任者に代わって行使できる許可と資源範囲を定めます」；DelegationBudget の条件：「委任予算仕様は、一件の委任が消費できるトークン、時間、費用、再試行、ツール呼出しを制限する委任仕様です」。一方の成立は他方を証明しません。
    source_claims:
      - claim-delegated-authority-009
      - claim-delegated-authority-010
