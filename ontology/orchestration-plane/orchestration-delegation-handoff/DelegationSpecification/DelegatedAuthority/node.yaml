schema: moonweave.ai/ontology-node/v1
id: DelegatedAuthority
kind: concept
labels:
  zh: 委派授权规范
  en: delegated-authority specification
  ja: 委任権限仕様
semantics:
  short_definition:
    zh: 规定受派方可代表委派者行使的权限与资源范围的委派规范。
    en: Delegation specification defining permissions and resource scope a delegate may exercise on behalf of a delegator.
    ja: delegate が delegator に代わって exercise できる permission/resource scope を定める delegation specification。
  definition:
    zh: DelegatedAuthority 以 permission_refs、resource_scope_refs 与 approved_by 声明受派方可执行的操作边界。CrewAI agent tools 子集、Cursor Task 可用工具列表、A2A TaskSendParams 隐含 capability 约束，均可投影为此规范；它与 ContextIsolation（信息可见性）正交。
    en: DelegatedAuthority declares delegate operational boundary via permission_refs, resource_scope_refs, and approved_by. CrewAI agent tools subset, Cursor Task allowed tools list, and A2A TaskSendParams implied capability constraints may project here; it is orthogonal to ContextIsolation (information visibility).
    ja: DelegatedAuthority は permission/resource scope。ContextIsolation（情報可視性）と直交。
  why_needed:
    zh: 防止受派方越权执行工具或访问资源。
    en: Prevents delegate from executing tools or accessing resources beyond granted authority.
    ja: delegate の tool/resource 越権を防ぐ。
  includes:
    - zh: 纳入明确受派方、允许动作、资源范围、批准者和有效期的授权规范。
      en: Includes authorization specifications with identified delegate, allowed actions, resource scope, approver, and validity interval.
      ja: 受任者、許可動作、資源範囲、承認者、有効期間を特定する権限仕様を含みます。
  excludes:
    - zh: 排除长期角色职责、未批准的能力声明和实际执行动作产生的审计日志。
      en: Excludes long-lived role duties, unapproved capability claims, and audit logs produced by actual actions.
      ja: 長期役割責務、未承認能力宣言、実行動作から生じた監査ログを除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: DelegationContract.grants → DelegatedAuthority；运行时 tool allowlist 必须 ⊆ permission_refs。Cursor Task 仅继承 subagent 允许工具；CrewAI Task tools 覆盖 agent 默认。
    en: DelegationContract.grants → DelegatedAuthority; runtime tool allowlist must be ⊆ permission_refs. Cursor Task inherits subagent allowed tools only; CrewAI Task tools override agent defaults.
    ja: runtime tool allowlist ⊆ permission_refs。
  typical_input:
    - description: Authority spec.
      format: '{"permission_refs":["ToolPermission:refund-api"],"resource_scope_refs":["ResourceScope:order-884"]}'
      source_claims:
        - claim-delegated-authority-design
  typical_output:
    - description: Moonweave DelegatedAuthority.
      format: '{"delegatee_id":"AgentActor:billing-2"}'
      source_claims:
        - claim-delegated-authority-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: delegatee_id
      labels:
        zh: 受托方 ID
        en: delegatee ID
        ja: 受任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该权限规范所授权的受派方角色绑定，而不是泛指具备能力的任意工作者。
        en: References the delegate role binding authorized by this authority specification, not any worker that merely advertises the capability.
        ja: 単に能力を掲示する作業者ではなく、この権限仕様で認可される受任者ロール束縛を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegated-authority-design
    - id: permission_refs
      labels:
        zh: 权限引用
        en: permission references
        ja: 権限参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用受派方可代表委派方行使的具体权限；未引用的权限不由该规范授予。
        en: References the specific permissions the delegate may exercise on the delegator's behalf; unreferenced permissions are not granted by this specification.
        ja: 受任者が委任者を代理して行使できる具体的権限を参照し、未参照の権限は付与しません。
      allowed_values: []
      pattern: null
      example_value:
        - Permission:read-repo
      source_claims:
        - claim-delegated-authority-design
    - id: resource_scope_refs
      labels:
        zh: 资源范围引用
        en: resource-scope references
        ja: 資源範囲参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 把所授权限限制到明确资源、租户、数据集或对象范围；为空不表示全局授权。
        en: Restricts the granted permissions to named resources, tenants, datasets, or object scopes; absence does not imply global authority.
        ja: 付与権限を指定資源、テナント、データ集合または対象範囲に限定し、空値を全域権限とは解釈しません。
      allowed_values: []
      pattern: null
      example_value:
        - Repository:moonweave
      source_claims:
        - claim-delegated-authority-design
    - id: approved_by
      labels:
        zh: 批准者
        en: approved by
        ja: 承認者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对该受派权限条款承担批准责任的授权主体。
        en: References the authorizing principal accountable for approving this delegated-authority clause.
        ja: この委任権限条項の承認責任を負う認可主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegated-authority-design
  constraints:
    - id: delegated-authority-bounded
      severity: error
      expression_language: plain
      expression: granted permissions and resource scopes do not exceed the delegator authority or delegated task scope
      explanations:
        zh: 权限不得超出委托方权限或任务范围。
        en: Delegated authority must remain within delegator authority and task scope.
        ja: 委任権限は委任者権限とタスク範囲を超えてはなりません。
      source_claims:
        - claim-delegated-authority-design
  required_relation_constraints: []
examples:
  - id: DelegatedAuthority-example-crewai-tools
    labels:
      zh: CrewAI 工具权限
      en: CrewAI tool authority
      ja: CrewAI tool authority
    descriptions:
      zh: Researcher 仅获 search_tool 与 read_file，无 write 权限。
      en: Researcher granted search_tool and read_file only, no write permission.
      ja: researcher search_tool/read_file のみ write 無し。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: agent tools
    field_values:
      permission_refs:
        - ToolPermission:search
        - ToolPermission:read_file
    related_node_ids:
      - DelegatedAuthority
      - DelegationContract
    related_relation_ids: []
    source_claims:
      - claim-delegated-authority-design
  - id: DelegatedAuthority-example-cursor-tools
    labels:
      zh: Cursor 工具权限
      en: Cursor tool authority
      ja: Cursor tool authority
    descriptions:
      zh: explore subagent 仅获 codebase_search 与 read 工具。
      en: Explore subagent granted codebase_search and read tools only.
      ja: explore codebase_search/read のみ。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: subagent tools
    field_values:
      permission_refs:
        - ToolPermission:codebase_search
        - ToolPermission:read
    related_node_ids:
      - DelegatedAuthority
    related_relation_ids: []
    source_claims:
      - claim-delegated-authority-design
  - id: DelegatedAuthority-example-a2a-capability
    labels:
      zh: A2A 能力边界
      en: A2A capability boundary
      ja: A2A capability boundary
    descriptions:
      zh: Remote billing agent 权限含 refund-api，不含 admin-api。
      en: Remote billing agent authority includes refund-api, excludes admin-api.
      ja: billing agent refund-api 可/admin-api 不可。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: AgentCard capabilities
    field_values:
      permission_refs:
        - ToolPermission:refund-api
    related_node_ids:
      - DelegatedAuthority
    related_relation_ids: []
    source_claims:
      - claim-delegated-authority-design
  - id: DelegatedAuthority-example-boundary-isolation
    labels:
      zh: 隔离不是授权
      en: Isolation is not authority
      ja: isolation は authority ではない
    descriptions:
      zh: ContextIsolation 控制可见信息面，不声明可执行工具权限。
      en: ContextIsolation controls visible surfaces, does not declare executable tool permissions.
      ja: ContextIsolation は visible surface のみ tool permission ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegatedAuthority
      - ContextIsolation
    related_relation_ids: []
    source_claims:
      - claim-delegated-authority-design
parent_relation:
  id: DelegatedAuthority-is_a-DelegationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 委派授权以受派方可代表委派者行使的权限、资源范围和有效期为种差，属于委派规范。
    en: Delegated authority is a delegation specification differentiated by permissions, resource scope, and validity the delegate may exercise on behalf of the delegator.
    ja: 委任権限は受任者が委任者に代わり行使できる許可、資源範囲、有効期間を種差とする委任仕様です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegated-authority-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
