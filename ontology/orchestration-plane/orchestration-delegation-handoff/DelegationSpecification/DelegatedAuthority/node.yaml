      en: The authority specification grants a regulatory specialist read-only case access and report generation while denying payment, deletion, and data export.
      ja: 権限仕様が規制専門家に案件の読取りと報告生成を許可し、支払、削除、データ外部送信を禁止します。
    field_values:
      specification_id: delegation-spec-authority-001
      effective_from: 2026-07-15T01:00:00Z
      version: "1"
      delegatee_id: Actor:worker-007
      permission_refs:
        - Permission:read-repo
      approved_by: Actor:orchestrator-001
