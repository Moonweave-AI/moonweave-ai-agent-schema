schema: moonweave.ai/ontology-node/v1
id: DelegatedAuthority
kind: concept
status: review
labels:
  zh: 委派授权规范
  en: delegated-authority specification
  ja: 委任権限仕様
semantics:
  short_definition:
    zh: 委派授权规范规定受派方在一次委派中可以代表委派者执行的权限和资源范围。
    en: A delegated-authority specification states the permissions and resource scope a delegate may exercise on behalf of a delegator in one delegation.
    ja: 委任権限仕様は、一件の委任で受任者が委任者に代わって行使できる許可と資源範囲を定めます。
  definition:
    zh: 委派授权规范规定受派方在一次委派中可以代表委派者执行的权限和资源范围。 它绑定受派方、权限引用、资源范围、批准者和有效期；它是授权条款，不是承担授权的代理角色。
    en: A delegated-authority specification states the permissions and resource scope a delegate may exercise on behalf of a delegator in one delegation. It binds delegate, permission references, resource scope, approver, and validity interval; it is an authorization term, not the delegate role itself.
    ja: 委任権限仕様は、一件の委任で受任者が委任者に代わって行使できる許可と資源範囲を定めます。 受任者、許可参照、資源範囲、承認者、有効期間を結び、権限条項であって受任役割そのものではありません。
  why_needed:
    zh: 该节点确保委派工作不会自动隐含无限权限，并支持最小权限与撤销检查。
    en: The node prevents delegated work from implying unlimited authority and supports least-privilege and revocation checks.
    ja: 委任作業が無制限権限を暗黙化することを防ぎ、最小権限と取消確認を支えます。
  includes:
    - zh: 纳入明确受派方、允许动作、资源范围、批准者和有效期的授权规范。
      en: Includes authorization specifications with identified delegate, allowed actions, resource scope, approver, and validity interval.
      ja: 受任者、許可動作、資源範囲、承認者、有効期間を特定する権限仕様を含みます。
  excludes:
    - zh: 排除长期角色职责、未批准的能力声明和实际执行动作产生的审计日志。
      en: Excludes long-lived role duties, unapproved capability claims, and audit logs produced by actual actions.
      ja: 長期役割責務、未承認能力宣言、実行動作から生じた監査ログを除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: delegatee_id
      labels:
        zh: 受托方 ID
        en: delegatee ID
        ja: 受任者 ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该权限规范所授权的受派方角色绑定，而不是泛指具备能力的任意工作者。
        en: References the delegate role binding authorized by this authority specification, not any worker that merely advertises the capability.
        ja: 単に能力を掲示する作業者ではなく、この権限仕様で認可される受任者ロール束縛を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:worker-007
      source_claims:
        - claim-delegated-authority-002
    - id: permission_refs
      labels:
        zh: 权限引用
        en: permission references
        ja: 権限参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用受派方可代表委派方行使的具体权限；未引用的权限不由该规范授予。
        en: References the specific permissions the delegate may exercise on the delegator's behalf; unreferenced permissions are not granted by this specification.
        ja: 受任者が委任者を代理して行使できる具体的権限を参照し、未参照の権限は付与しません。
      allowed_values: []
      pattern: null
      example_value:
        - Permission:read-repo
      source_claims:
        - claim-delegated-authority-003
    - id: resource_scope_refs
      labels:
        zh: 资源范围引用
        en: resource-scope references
        ja: 資源範囲参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 把所授权限限制到明确资源、租户、数据集或对象范围；为空不表示全局授权。
        en: Restricts the granted permissions to named resources, tenants, datasets, or object scopes; absence does not imply global authority.
        ja: 付与権限を指定資源、テナント、データ集合または対象範囲に限定し、空値を全域権限とは解釈しません。
      allowed_values: []
      pattern: null
      example_value:
        - Repository:moonweave
      source_claims:
        - claim-delegated-authority-004
    - id: approved_by
      labels:
        zh: 批准者
        en: approved by
        ja: 承認者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对该受派权限条款承担批准责任的授权主体。
        en: References the authorizing principal accountable for approving this delegated-authority clause.
        ja: この委任権限条項の承認責任を負う認可主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegated-authority-005
  constraints:
    - id: delegated-authority-bounded
      severity: error
      expression_language: plain
      expression: granted permissions and resource scopes do not exceed the delegator authority or delegated task scope
      explanations:
        zh: 权限不得超出委托方权限或任务范围。
        en: Delegated authority must remain within delegator authority and task scope.
        ja: 委任権限は委任者権限とタスク範囲を超えてはなりません。
      source_claims:
        - claim-delegated-authority-006
  required_relation_constraints: []
examples:
  - id: DelegatedAuthority-example-positive-manual-2026
    kind: positive
    labels:
      zh: 委派授权规范正例
      en: Positive delegated-authority specification case
      ja: 委任権限仕様の正例
    scenario_id: null
    descriptions:
