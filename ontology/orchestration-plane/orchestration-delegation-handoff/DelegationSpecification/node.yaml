schema: moonweave.ai/ontology-node/v1
id: DelegationSpecification
kind: concept
labels:
  zh: 委派规范
  en: delegation specification
  ja: 委任仕様
semantics:
  short_definition:
    zh: 规定一次委派可做什么、必须做什么的规范信息。
    en: Normative terms governing what one delegation may and must do.
    ja: 一件の委任ができること・行うべきことを定める規範情報。
  definition:
    zh: 委派规范是规定一次委派可做什么、必须做什么以及何时生效的信息规范。 该上位类统合契约、预算、上下文隔离和授权范围；这些子类分别约束不同维度，不是同一规则的重复页面。
    en: A delegation specification is an information specification that states what one delegation may do, must do, and when its terms are effective. This genus groups contract, budget, context-isolation, and authority specifications; each constrains a different dimension rather than duplicating one rule.
    ja: 委任仕様は、一件の委任ができること、行うべきこと、条件の有効期間を定める情報仕様です。 契約、予算、コンテキスト隔離、権限範囲をまとめ、各下位仕様は異なる次元を制約し同一規則を重複しません。
  why_needed:
    zh: 该层级为所有委派约束提供诚实上位概念，同时保留每种规范的独立身份和字段。
    en: The hierarchy supplies an honest genus for delegation constraints while preserving the independent identity and fields of each specification kind.
    ja: 委任制約の誠実な上位概念を与えつつ、各仕様種の独立した同一性と項目を保持します。
  includes:
    - zh: 纳入具有版本、生效范围和可验证条款、直接约束一次委派的规范对象。
      en: Includes versioned, effective, verifiable specifications that directly constrain one delegation.
      ja: 版、有効範囲、検証可能条項を持ち、一件の委任を直接制約する仕様を含みます。
  excludes:
    - zh: 排除运行事件、选择结果、框架说明文档和仅提供背景知识的来源材料。
      en: Excludes runtime events, selection results, framework documentation, and source material that only provides background evidence.
      ja: 実行イベント、選択結果、フレームワーク文書、背景証拠だけを提供する資料を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationSpecification 在派发前由编排服务物化为可校验包：OpenAI Agents SDK handoff 读取 contract_ref、
      budget_ref 与 authority_ref 作为 transfer_to_agent 的前置校验；A2A 互操作边界用 SendMessageRequest 携带
      Message，但 Moonweave 委派约束保存在本地 specification revision，不写入 A2A Task metadata 替代契约。
    en: >-
      DelegationSpecification materializes as a verifiable bundle before dispatch: OpenAI Agents SDK handoff reads
      contract_ref, budget_ref, and authority_ref as pre-checks for transfer_to_agent; at the A2A boundary
      SendMessageRequest carries Message while Moonweave delegation constraints stay in local specification revision, not
      rewritten into A2A Task metadata as contract substitutes.
    ja: >-
      DelegationSpecification は dispatch 前に orchestration service により verifiable bundle として materialize される。
      OpenAI Agents SDK handoff は contract_ref、budget_ref、authority_ref を transfer_to_agent 前チェックとして読む。A2A
      境界では SendMessageRequest が Message を carry するが Moonweave 委任制約は local specification revision に残し、
      A2A Task metadata で契約 substitute として書き換えない。
  typical_input:
    - description:
        zh: 版本化委派约束规范声明。
        en: A versioned delegation-constraint specification declaration.
        ja: versioned delegation-constraint specification declaration。
      format: |-
        {"specification_id":"deleg-spec:audit-7","version":"2","effective_from":"2026-07-16T09:00:00Z","contract_ref":"contract:audit-7@2","budget_ref":"budget:audit-7@1","authority_ref":"authority:auditor@1"}
  typical_output:
    - description:
        zh: 被 DelegationProcess 引用的有效委派规范包络。
        en: An effective delegation-specification envelope referenced by DelegationProcess.
        ja: DelegationProcess が参照する effective delegation-specification envelope。
      format: |-
        {"delegation_spec_ref":"deleg-spec:audit-7@2","validation":"passed","delegation_process_ref":"deleg-proc-884"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents transferring control to another agent under configured constraints.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol message entry distinct from local delegation specifications.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents remote capability discovery separate from delegation contract terms.
  source_claims:
    - claim-delegation-specification-001
    - claim-delegation-specification-002
structure:
  identity_keys:
    - specification_id
    - version
  fields:
    - id: specification_id
      labels:
        zh: 规范 ID
        en: specification ID
        ja: 仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识跨版本稳定的委派规范。
        en: Identifies a delegation specification across versions.
        ja: 版をまたいで委任仕様を識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-spec-17
      source_claims:
        - claim-delegation-specification-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识规范内容的不可变版本。
        en: Identifies the immutable version of specification content.
        ja: 仕様内容の不変版を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-delegation-specification-003
    - id: effective_from
      labels:
        zh: 生效起点
        en: effective from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录规范开始约束委派的时间。
        en: Records when the specification begins constraining delegation.
        ja: 仕様が委任を制約し始める時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-delegation-specification-004
    - id: effective_until
      labels:
        zh: 生效终点
        en: effective until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录规范停止生效的时间；持续有效时可为空。
        en: Records when the specification ceases to be effective; it may be absent for continuing validity.
        ja: 仕様の有効終了時刻を記録し、継続有効なら未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T00:00:00Z
      source_claims:
        - claim-delegation-specification-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: DelegationSpecification-example-positive-manual-2026
    labels:
      zh: DelegationSpecification positive
      en: DelegationSpecification positive
      ja: DelegationSpecification positive
    descriptions:
      zh: A2A Protocol 映射 DelegationSpecification：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps DelegationSpecification: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol DelegationSpecification: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {specification_id: delegation-spec-17, version: 3, effective_from: 2026-07-16T00:00:00Z}

    related_node_ids:
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-006

  - id: DelegationSpecification-example-boundary-manual-2026
    labels:
      zh: DelegationSpecification boundary
      en: DelegationSpecification boundary
      ja: DelegationSpecification boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 DelegationSpecification 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not DelegationSpecification work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で DelegationSpecification work_specification ではない。
    field_values: {}

    related_node_ids:
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-007

  - id: DelegationSpecification-example-counterexample-confusable
    labels:
      zh: DelegationSpecification counterexample
      en: DelegationSpecification counterexample
      ja: DelegationSpecification counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 DelegationSpecification 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style DelegationSpecification group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 DelegationSpecification ではない。
    field_values: {specification_id: absent, version: absent, runtime_status: active}

    related_node_ids:
      - DelegationSpecification
      - DelegationProcess
      - DelegationContract
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-006

  - id: DelegationSpecification-example-instance-concrete
    labels:
      zh: DelegationSpecification instance
      en: DelegationSpecification instance
      ja: DelegationSpecification instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 DelegationSpecification A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to DelegationSpecification A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が DelegationSpecification A2ATask に写像。
    field_values: {specification_id: delegation-spec-17, version: 3, effective_from: 2026-07-16T00:00:00Z}

    related_node_ids:
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-006

