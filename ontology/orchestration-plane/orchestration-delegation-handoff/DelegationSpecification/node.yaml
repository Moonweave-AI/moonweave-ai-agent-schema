schema: moonweave.ai/ontology-node/v1
id: DelegationSpecification
kind: concept
labels:
  zh: 委派规范
  en: delegation specification
  ja: 委任仕様
semantics:
  short_definition:
    zh: 声明一次委派可做什么、必须做什么及何时生效的版本化规范族。
    en: Versioned specification family stating what one delegation may do, must do, and when terms are effective.
    ja: 一件の delegation が may/must do ことと effective 期間を宣言する versioned specification 族。
  definition:
    zh: DelegationSpecification 以 specification_id、version、effective_from/effective_until 标识可复用委派约束族，统合 DelegationContract、DelegationBudget、ContextIsolation 与 DelegatedAuthority 子规范。OpenAI handoffs 列表、Cursor Task 默认权限、A2A TaskSendParams.configuration 的规范投影属于此族；一次 tasks/send 或 Task 调用是发生事实而非规范。
    en: DelegationSpecification is identified by specification_id, version, effective_from/effective_until as reusable delegation constraint family, grouping DelegationContract, DelegationBudget, ContextIsolation, and DelegatedAuthority. OpenAI handoffs list, Cursor Task default permissions, and A2A TaskSendParams.configuration spec projections belong here; one tasks/send or Task invocation is occurrence, not specification.
    ja: DelegationSpecification は DelegationContract/Budget/ContextIsolation/DelegatedAuthority の genus。handoffs リスト/Task 默认权限/A2A configuration は spec。
  why_needed:
    zh: 为委派约束提供诚实上位概念，同时保留各子规范的独立身份。
    en: Provides honest genus for delegation constraints while preserving independent identity of each subtype.
    ja: delegation constraint genus として各 subtype identity を保持。
  includes:
    - zh: 纳入具有版本、生效范围和可验证条款、直接约束一次委派的规范对象。
      en: Includes versioned, effective, verifiable specifications that directly constrain one delegation.
      ja: 版、有効範囲、検証可能条項を持ち、一件の委任を直接制約する仕様を含みます。
  excludes:
    - zh: 排除运行事件、选择结果、框架说明文档和仅提供背景知识的来源材料。
      en: Excludes runtime events, selection results, framework documentation, and source material that only provides background evidence.
      ja: 実行イベント、選択結果、フレームワーク文書、背景証拠だけを提供する資料を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 规范 version 不可变；DelegationProcess 通过 contract_id 引用 DelegationContract@version。集成时分离 handoffs[] 配置（规范）与 transfer_to_* 调用（发生）。
    en: Specification versions immutable; DelegationProcess references DelegationContract@version via contract_id. Separate handoffs[] config (spec) from transfer_to_* call (occurrence) in integrations.
    ja: spec version immutable。handoffs[]=spec、transfer_to_*=occurrence。
  typical_input:
    - description: Delegation spec manifest.
      format: '{"specification_id":"delegation-spec-17","version":"3","effective_from":"2026-07-16T00:00:00Z"}'
      source_claims:
        - claim-delegation-specification-design
  typical_output:
    - description: Moonweave DelegationSpecification.
      format: '{"specification_id":"delegation-spec-17","version":"3"}'
      source_claims:
        - claim-delegation-specification-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys:
    - specification_id
    - version
  fields:
    - id: specification_id
      labels:
        zh: 规范 ID
        en: specification ID
        ja: 仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识跨版本稳定的委派规范。
        en: Identifies a delegation specification across versions.
        ja: 版をまたいで委任仕様を識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-spec-17
      source_claims:
        - claim-delegation-specification-design
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识规范内容的不可变版本。
        en: Identifies the immutable version of specification content.
        ja: 仕様内容の不変版を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-delegation-specification-design
    - id: effective_from
      labels:
        zh: 生效起点
        en: effective from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录规范开始约束委派的时间。
        en: Records when the specification begins constraining delegation.
        ja: 仕様が委任を制約し始める時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-delegation-specification-design
    - id: effective_until
      labels:
        zh: 生效终点
        en: effective until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录规范停止生效的时间；持续有效时可为空。
        en: Records when the specification ceases to be effective; it may be absent for continuing validity.
        ja: 仕様の有効終了時刻を記録し、継続有効なら未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T00:00:00Z
      source_claims:
        - claim-delegation-specification-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: DelegationSpecification-example-contract-bundle
    labels:
      zh: 委派规范包
      en: Delegation spec bundle
      ja: delegation spec bundle
    descriptions:
      zh: delegation-spec-17@3 统合 contract、budget、isolation、authority 子规范。
      en: delegation-spec-17@3 groups contract, budget, isolation, authority sub-specs.
      ja: delegation-spec-17@3 が contract/budget/isolation/authority を統合。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec bundle
    field_values:
      specification_id: delegation-spec-17
      version: "3"
      effective_from: 2026-07-16T00:00:00Z
    related_node_ids:
      - DelegationSpecification
      - DelegationContract
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-design
  - id: DelegationSpecification-example-openai-handoffs-list
    labels:
      zh: OpenAI handoffs 列表
      en: OpenAI handoffs list
      ja: OpenAI handoffs list
    descriptions:
      zh: Agent handoffs=[...] 注册可移交目标是规范输入，不是一次 Handoff。
      en: Agent handoffs=[...] registering transferable targets is specification input, not one Handoff.
      ja: Agent handoffs=[...] は spec input で Handoff occurrence ではない。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs list
    field_values:
      specification_id: delegation-spec-openai-1
      version: "1"
    related_node_ids:
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-design
  - id: DelegationSpecification-example-a2a-config
    labels:
      zh: A2A configuration 规范
      en: A2A configuration spec
      ja: A2A configuration spec
    descriptions:
      zh: TaskSendParams.configuration 声明 blocking、outputModes 等委派约束。
      en: TaskSendParams.configuration declares blocking, outputModes delegation constraints.
      ja: TaskSendParams.configuration が blocking/outputModes 制約。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskSendParams.configuration
    field_values:
      specification_id: delegation-spec-a2a-1
      version: "1"
    related_node_ids:
      - DelegationSpecification
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-design
  - id: DelegationSpecification-example-boundary-docs
    labels:
      zh: 文档不是规范
      en: Documentation is not specification
      ja: documentation は spec ではない
    descriptions:
      zh: OpenAI handoff 文档解释用法，不是可执行 DelegationSpecification 实例。
      en: OpenAI handoff documentation explains usage but is not executable DelegationSpecification instance.
      ja: OpenAI handoff 文書は executable DelegationSpecification ではない。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-specification-design
parent_relation: null
relations: []
