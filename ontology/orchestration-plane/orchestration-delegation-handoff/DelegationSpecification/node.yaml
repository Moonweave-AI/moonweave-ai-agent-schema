schema: moonweave.ai/ontology-node/v1
id: DelegationSpecification
kind: concept
status: review
labels:
  zh: 委派规范
  en: delegation specification
  ja: 委任仕様
semantics:
  short_definition:
    zh: 委派规范是规定一次委派可做什么、必须做什么以及何时生效的信息规范。
    en: A delegation specification is an information specification that states what one delegation may do, must do, and when its terms are effective.
    ja: 委任仕様は、一件の委任ができること、行うべきこと、条件の有効期間を定める情報仕様です。
  definition:
    zh: 委派规范是规定一次委派可做什么、必须做什么以及何时生效的信息规范。 该上位类统合契约、预算、上下文隔离和授权范围；这些子类分别约束不同维度，不是同一规则的重复页面。
    en: A delegation specification is an information specification that states what one delegation may do, must do, and when its terms are effective. This genus groups contract, budget, context-isolation, and authority specifications; each constrains a different dimension rather than duplicating one rule.
    ja: 委任仕様は、一件の委任ができること、行うべきこと、条件の有効期間を定める情報仕様です。 契約、予算、コンテキスト隔離、権限範囲をまとめ、各下位仕様は異なる次元を制約し同一規則を重複しません。
  why_needed:
    zh: 该层级为所有委派约束提供诚实上位概念，同时保留每种规范的独立身份和字段。
    en: The hierarchy supplies an honest genus for delegation constraints while preserving the independent identity and fields of each specification kind.
    ja: 委任制約の誠実な上位概念を与えつつ、各仕様種の独立した同一性と項目を保持します。
  includes:
    - zh: 纳入具有版本、生效范围和可验证条款、直接约束一次委派的规范对象。
      en: Includes versioned, effective, verifiable specifications that directly constrain one delegation.
      ja: 版、有効範囲、検証可能条項を持ち、一件の委任を直接制約する仕様を含みます。
  excludes:
    - zh: 排除运行事件、选择结果、框架说明文档和仅提供背景知识的来源材料。
      en: Excludes runtime events, selection results, framework documentation, and source material that only provides background evidence.
      ja: 実行イベント、選択結果、フレームワーク文書、背景証拠だけを提供する資料を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - specification_id
    - version
  fields:
    - id: specification_id
      labels:
        zh: 规范 ID
        en: specification ID
        ja: 仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识跨版本稳定的委派规范。
        en: Identifies a delegation specification across versions.
        ja: 版をまたいで委任仕様を識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-spec-17
      source_claims:
        - claim-delegation-specification-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识规范内容的不可变版本。
        en: Identifies the immutable version of specification content.
        ja: 仕様内容の不変版を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-delegation-specification-003
    - id: effective_from
      labels:
        zh: 生效起点
        en: effective from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录规范开始约束委派的时间。
        en: Records when the specification begins constraining delegation.
        ja: 仕様が委任を制約し始める時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-delegation-specification-004
    - id: effective_until
      labels:
        zh: 生效终点
        en: effective until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录规范停止生效的时间；持续有效时可为空。
        en: Records when the specification ceases to be effective; it may be absent for continuing validity.
        ja: 仕様の有効終了時刻を記録し、継続有効なら未設定にできます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T00:00:00Z
      source_claims:
        - claim-delegation-specification-005
  constraints: []
  required_relation_constraints: []
