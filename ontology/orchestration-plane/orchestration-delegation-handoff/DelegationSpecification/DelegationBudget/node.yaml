schema: moonweave.ai/ontology-node/v1
id: DelegationBudget
kind: concept
labels:
  zh: 委派预算规范
  en: delegation budget specification
  ja: 委任予算仕様
semantics:
  short_definition:
    zh: 为一次委派规定可消耗令牌、时间、费用、重试或工具调用上限的规范。
    en: Specification limiting tokens, time, cost, retries, or tool calls consumable by one delegation.
    ja: 一件の delegation が consume できる token/time/cost/retry/tool call 上限を定める specification。
  definition:
    zh: DelegationBudget 以 token_limit、time_limit_ms、cost_limit、retry_limit 与 tool_call_limit 约束委派消耗。Cursor Task 隐含时间与 token 边界、A2A TaskSendParams.configuration 阻塞/超时、CrewAI max_iter/max_execution_time 均映射为此规范；超限时触发 RevocationPhase 或失败 DelegationResult。
    en: DelegationBudget constrains delegation consumption via token_limit, time_limit_ms, cost_limit, retry_limit, and tool_call_limit. Cursor Task implicit time/token bounds, A2A TaskSendParams.configuration blocking/timeout, and CrewAI max_iter/max_execution_time map here; overrun triggers RevocationPhase or failed DelegationResult.
    ja: DelegationBudget は token/time/cost/retry/tool_call 上限。超過で RevocationPhase/failed DelegationResult。
  why_needed:
    zh: 防止委派耗尽资源或无限重试。
    en: Prevents delegation from exhausting resources or retrying indefinitely.
    ja: delegation の resource 耗尽/無限 retry を防ぐ。
  includes:
    - zh: 纳入带至少一项数值或次数限制、批准信息和有效期的委派资源规范。
      en: Includes delegation resource specifications with at least one numeric or count limit, approval information, and validity interval.
      ja: 少なくとも一つの数値・回数上限、承認情報、有効期間を持つ委任資源仕様を含みます。
  excludes:
    - zh: 排除实际令牌使用记录、系统级总预算和没有关联委派的成本报表。
      en: Excludes actual token-usage records, system-wide budgets, and cost reports not tied to a delegation.
      ja: 実トークン使用記録、システム全体予算、委任に結び付かない費用報告を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: DelegationContract.specifies → DelegationBudget；运行时 meter 接近 limit 时 emit warning；耗尽 emit revoked DelegationEvent。A2A blocking=false 常配合 time_limit。
    en: DelegationContract.specifies → DelegationBudget; runtime meter near limit emits warning; exhaustion emits revoked DelegationEvent. A2A blocking=false often pairs with time_limit.
    ja: Contract.specifies Budget；meter 接近 limit で warning、耗尽で revoked event。
  typical_input:
    - description: Budget spec.
      format: '{"token_limit":50000,"time_limit_ms":120000,"tool_call_limit":20}'
      source_claims:
        - claim-delegation-budget-design
  typical_output:
    - description: Moonweave DelegationBudget.
      format: '{"token_limit":50000,"time_limit_ms":120000}'
      source_claims:
        - claim-delegation-budget-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: token_limit
      labels:
        zh: 令牌上限
        en: token limit
        ja: トークン上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派在预算有效期内允许累计消耗的模型输入与输出令牌总数上限；它不是实际用量。
        en: Caps aggregate model input plus output tokens consumable by one delegation while the budget is effective; it is not observed usage.
        ja: 予算有効期間中に一件の委任が消費できるモデル入力・出力トークン合計の上限であり、実測使用量ではありません。
      allowed_values: []
      pattern: null
      example_value: 8192
      source_claims:
        - claim-delegation-budget-design
    - id: time_limit_ms
      labels:
        zh: 时间上限（毫秒）
        en: time limit in milliseconds
        ja: 時間上限（ミリ秒）
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派从开始到终止可占用的累计执行时长上限，单位为毫秒。
        en: Caps cumulative execution time from delegation start to termination, measured in milliseconds.
        ja: 委任開始から終了までに使用できる累積実行時間をミリ秒単位で制限します。
      allowed_values: []
      pattern: null
      example_value: 120000
      source_claims:
        - claim-delegation-budget-design
    - id: cost_limit
      labels:
        zh: 成本上限
        en: cost limit
        ja: 費用上限
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派按 cost_currency 计价可产生的货币成本上限；它必须与币种同时出现。
        en: Caps monetary cost attributable to one delegation in cost_currency and must be paired with that currency code.
        ja: 一件の委任に帰属する金銭費用を cost_currency で制限し、通貨コードと必ず対にします。
      allowed_values: []
      pattern: null
      example_value: 5
      source_claims:
        - claim-delegation-budget-design
    - id: cost_currency
      labels:
        zh: 成本币种
        en: cost currency
        ja: 費用通貨
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 以大写 ISO 4217 三字母代码声明 cost_limit 的计价币种。
        en: Declares the currency of cost_limit as an uppercase three-letter ISO 4217 code.
        ja: cost_limit の通貨を大文字三文字の ISO 4217 コードで宣言します。
      allowed_values: []
      pattern: ^[A-Z]{3}$
      example_value: USD
      source_claims:
        - claim-delegation-budget-design
    - id: retry_limit
      labels:
        zh: 重试上限
        en: retry limit
        ja: 再試行上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派在符合重试条件的失败之后最多可重新尝试的次数；普通代理回合不计为重试。
        en: Caps reattempts after failures that satisfy the retry policy; ordinary agent turns are not retries.
        ja: 再試行方針を満たす失敗後の再実行回数を制限し、通常のエージェントターンは再試行に数えません。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-delegation-budget-design
    - id: tool_call_limit
      labels:
        zh: 工具调用上限
        en: tool-call limit
        ja: ツール呼出上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派内所有工具调用事件的累计次数上限，与模型请求次数分别计量。
        en: Caps the aggregate count of tool-call events within one delegation, measured separately from model-request count.
        ja: 一件の委任内のツール呼出しイベント総数を、モデル要求数とは別に制限します。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-delegation-budget-design
    - id: approved_by
      labels:
        zh: 批准者
        en: approved by
        ja: 承認者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用批准这些委派资源上限并对其变更承担责任的主体。
        en: References the principal that approved these delegation resource ceilings and is accountable for their change.
        ja: これらの委任資源上限を承認し、その変更に責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-budget-design
  constraints:
    - id: delegation-budget-has-limit
      severity: error
      expression_language: plain
      expression: at least one of token_limit, time_limit_ms, cost_limit, retry_limit, or tool_call_limit is present and non-negative
      explanations:
        zh: 令牌、执行时间、成本、重试或工具调用上限至少存在一项，且所有已给上限均非负。
        en: At least one token, execution-time, cost, retry, or tool-call limit is present and every supplied limit is non-negative.
        ja: トークン、実行時間、費用、再試行、ツール呼出し上限の少なくとも一つが存在し、指定値はすべて非負でなければなりません。
      source_claims:
        - claim-delegation-budget-design
    - id: delegation-budget-cost-currency-pair
      severity: error
      expression_language: plain
      expression: cost_limit is present exactly when cost_currency is present
      explanations:
        zh: cost_limit 与 cost_currency 必须同时存在或同时缺省，避免无币种成本上限。
        en: cost_limit and cost_currency must either both be present or both be absent so a monetary ceiling is never currencyless.
        ja: 通貨のない金額上限を防ぐため、cost_limit と cost_currency は同時に存在するか同時に省略します。
      source_claims:
        - claim-delegation-budget-design
  required_relation_constraints: []
examples:
