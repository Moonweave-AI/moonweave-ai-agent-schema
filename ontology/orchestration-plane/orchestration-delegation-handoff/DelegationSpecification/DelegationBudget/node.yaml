  - id: DelegationBudget-example-crewai-iter
    labels:
      zh: CrewAI 迭代预算
      en: CrewAI iteration budget
      ja: CrewAI iteration budget
    descriptions:
      zh: Task max_iter=10、max_execution_time=300 约束 researcher 委派。
      en: Task max_iter=10 and max_execution_time=300 constrain researcher delegation.
      ja: Task max_iter=10 max_execution_time=300。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: max_iter
    field_values:
      retry_limit: 10
      time_limit_ms: 300000
    related_node_ids:
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-delegation-budget-design
  - id: DelegationBudget-example-boundary-unlimited
    labels:
      zh: 无上限不是规范
      en: No limit is not budget spec
      ja: limit 無しは budget spec ではない
    descriptions:
      zh: 团队默认“尽量完成”口号无 numeric limit，不是 DelegationBudget。
      en: Team default do-your-best slogan without numeric limit is not DelegationBudget.
      ja: numeric limit 無し slogan は DelegationBudget ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-delegation-budget-design
parent_relation:
  id: DelegationBudget-is_a-DelegationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 委派预算是以至少一种资源消耗上限及其批准者为区别条件的委派规范；稳定身份和有效期继承自委派规范。
    en: A delegation budget is a delegation specification differentiated by at least one resource-consumption ceiling and its approver; stable identity and effectiveness are inherited from DelegationSpecification.
    ja: 委任予算は少なくとも一つの資源消費上限と承認者で区別される委任仕様で、安定識別と有効期間は DelegationSpecification から継承します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-budget-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
