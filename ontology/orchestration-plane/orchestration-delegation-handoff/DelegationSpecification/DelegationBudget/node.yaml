      zh: budget-v2 为 delegation-17 规定最多 20,000 令牌、三次工具调用和十分钟执行时间。
      en: budget-v2 limits delegation-17 to 20,000 tokens, three tool calls, and ten minutes of execution.
      ja: budget-v2 が delegation-17 を 20,000 トークン、三回のツール呼出し、十分間の実行に制限します。
    field_values:
      specification_id: delegation-spec-budget-001
      effective_from: 2026-07-15T01:00:00Z
      version: "1"
      approved_by: Actor:orchestrator-001
      token_limit: 20000
      time_limit_ms: 600000
      tool_call_limit: 3
    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
    related_relation_ids:
      - DelegationBudget-is_a-DelegationSpecification
    expected_result:
      zh: 该记录应被识别为 DelegationBudget，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationBudget with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationBudget として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派预算规范是为一次委派规定可消耗令牌、时间、费用、重试或工具调用上限的委派规范。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation budget specification is a delegation specification that limits tokens, time, cost, retries, or tool calls consumable by one delegation."
      ja: この場面は次の同一性条件を満たします：委任予算仕様は、一件の委任が消費できるトークン、時間、費用、再試行、ツール呼出しを制限する委任仕様です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-budget-011
  - id: DelegationBudget-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派预算规范边界例
      en: Boundary delegation budget specification case
      ja: 委任予算仕様の境界例
    scenario_id: null
    descriptions:
      zh: 遥测记录显示本次运行消耗 8,000 令牌；这是消耗事实，不是规定上限的预算规范。
      en: Telemetry says the run consumed 8,000 tokens; that is a consumption fact, not a budget specification that sets a limit.
      ja: テレメトリが 8,000 トークン消費を示しても、それは消費事実であり上限を定める予算仕様ではありません。
    field_values: {}
    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
    related_relation_ids:
      - DelegationBudget-is_a-DelegationSpecification
    expected_result:
      zh: 该对象不得被归为 DelegationBudget，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationBudget or acquire missing conditions from nearby facts.
      ja: この対象を DelegationBudget に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除实际令牌使用记录、系统级总预算和没有关联委派的成本报表。
      en: "The case violates this reviewed exclusion boundary: Excludes actual token-usage records, system-wide budgets, and cost reports not tied to a delegation."
      ja: この例は審査済み除外境界に反します：実トークン使用記録、システム全体予算、委任に結び付かない費用報告を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-delegation-budget-012
external_mappings: []
