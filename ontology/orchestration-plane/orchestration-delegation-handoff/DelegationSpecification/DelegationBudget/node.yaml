schema: moonweave.ai/ontology-node/v1
id: DelegationBudget
kind: concept
labels:
  zh: 委派预算规范
  en: delegation budget specification
  ja: 委任予算仕様
semantics:
  short_definition:
    zh: 限制一次委派可消耗令牌、时间、费用或工具用量的规范。
    en: Specification capping consumable tokens, time, cost, or tool use.
    ja: 一件の委任が消費できるトークン・時間・費用・ツール使用量を制限する仕様。
  definition:
    zh: 委派预算规范是为一次委派规定可消耗令牌、时间、费用、重试或工具调用上限的委派规范。 至少一个限制项必须存在，并记录批准者、生效时间和失效时间；实际消耗属于运行遥测，不属于预算本身。
    en: A delegation budget specification is a delegation specification that limits tokens, time, cost, retries, or tool calls consumable by one delegation. At least one limit must be present together with approver and validity interval; actual consumption belongs to runtime telemetry, not the budget.
    ja: 委任予算仕様は、一件の委任が消費できるトークン、時間、費用、再試行、ツール呼出しを制限する委任仕様です。 少なくとも一つの上限と承認者・有効期間を持ち、実消費量は予算ではなく実行テレメトリに属します。
  why_needed:
    zh: 预算作为独立规范使同一契约能够替换或收紧资源上限，并把授权与资源控制分开。
    en: A separate budget lets a contract replace or tighten resource limits independently of delegated authority.
    ja: 独立予算により契約は委任権限と分けて資源上限を交換・強化できます。
  includes:
    - zh: 纳入带至少一项数值或次数限制、批准信息和有效期的委派资源规范。
      en: Includes delegation resource specifications with at least one numeric or count limit, approval information, and validity interval.
      ja: 少なくとも一つの数値・回数上限、承認情報、有効期間を持つ委任資源仕様を含みます。
  excludes:
    - zh: 排除实际令牌使用记录、系统级总预算和没有关联委派的成本报表。
      en: Excludes actual token-usage records, system-wide budgets, and cost reports not tied to a delegation.
      ja: 実トークン使用記録、システム全体予算、委任に結び付かない費用報告を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationBudget 在 Agents SDK Runner 每次 tool/LLM 调用前由 budget enforcer 读取 max_tokens、max_cost_usd
      等上限；超限时阻断 transfer_to_agent 或终止 A2A 适配器调用。实际消耗写入 telemetry，不回写 budget version；
      SendMessageConfiguration 只协商输出模式，不表达委派预算。
    en: >-
      DelegationBudget is read by a budget enforcer before each Agents SDK Runner tool/LLM call against caps such as
      max_tokens and max_cost_usd; exceeding limits blocks transfer_to_agent or stops A2A adapter calls. Actual consumption
      writes to telemetry without rewriting budget version; SendMessageConfiguration negotiates output mode only, not
      delegation budget.
    ja: >-
      DelegationBudget は Agents SDK Runner の各 tool/LLM call 前に budget enforcer が max_tokens、max_cost_usd 等を読む。
      上限超過で transfer_to_agent または A2A adapter call を停止する。実消費は telemetry に書き budget version は変更しない。
      SendMessageConfiguration は output mode のみ協調し delegation budget ではない。
  typical_input:
    - description:
        zh: 带批准者与有效期的委派资源上限规约。
        en: A delegation resource cap specification with approver and validity.
        ja: approver と validity を持つ delegation resource cap specification。
      format: |-
        {"budget_id":"budget:audit-7@1","max_cost_usd":25,"max_tool_calls":12,"approver_ref":"binding-orchestrator-1","valid_until":"2026-07-16T18:00:00Z"}
  typical_output:
    - description:
        zh: 运行时预算校验结果与剩余额度快照引用。
        en: A runtime budget check result and remaining-quota snapshot reference.
        ja: runtime budget check result と remaining-quota snapshot reference。
      format: |-
        {"budget_ref":"budget:audit-7@1","check":"allow","remaining_cost_usd":18.4,"delegation_process_ref":"deleg-proc-884"}
  reference_implementations:
    - name: OpenAI Agents SDK Running agents
      url: https://openai.github.io/openai-agents-python/running_agents/
      description: Documents Runner invocations whose cost and tool usage can be capped pre-call.
    - name: A2A SendMessageConfiguration
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol output negotiation distinct from delegation budget specs.
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents handoff gating before delegated work consumes budget.
  source_claims:
    - claim-delegation-budget-001
    - claim-delegation-budget-002
structure:
  identity_keys: []
  fields:
    - id: token_limit
      labels:
        zh: 令牌上限
        en: token limit
        ja: トークン上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派在预算有效期内允许累计消耗的模型输入与输出令牌总数上限；它不是实际用量。
        en: Caps aggregate model input plus output tokens consumable by one delegation while the budget is effective; it is not observed usage.
        ja: 予算有効期間中に一件の委任が消費できるモデル入力・出力トークン合計の上限であり、実測使用量ではありません。
      allowed_values: []
      pattern: null
      example_value: 8192
      source_claims:
        - claim-delegation-budget-002
    - id: time_limit_ms
      labels:
        zh: 时间上限（毫秒）
        en: time limit in milliseconds
        ja: 時間上限（ミリ秒）
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派从开始到终止可占用的累计执行时长上限，单位为毫秒。
        en: Caps cumulative execution time from delegation start to termination, measured in milliseconds.
        ja: 委任開始から終了までに使用できる累積実行時間をミリ秒単位で制限します。
      allowed_values: []
      pattern: null
      example_value: 120000
      source_claims:
        - claim-delegation-budget-003
    - id: cost_limit
      labels:
        zh: 成本上限
        en: cost limit
        ja: 費用上限
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派按 cost_currency 计价可产生的货币成本上限；它必须与币种同时出现。
        en: Caps monetary cost attributable to one delegation in cost_currency and must be paired with that currency code.
        ja: 一件の委任に帰属する金銭費用を cost_currency で制限し、通貨コードと必ず対にします。
      allowed_values: []
      pattern: null
      example_value: 5
      source_claims:
        - claim-delegation-budget-004
    - id: cost_currency
      labels:
        zh: 成本币种
        en: cost currency
        ja: 費用通貨
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 以大写 ISO 4217 三字母代码声明 cost_limit 的计价币种。
        en: Declares the currency of cost_limit as an uppercase three-letter ISO 4217 code.
        ja: cost_limit の通貨を大文字三文字の ISO 4217 コードで宣言します。
      allowed_values: []
      pattern: ^[A-Z]{3}$
      example_value: USD
      source_claims:
        - claim-delegation-budget-005
    - id: retry_limit
      labels:
        zh: 重试上限
        en: retry limit
        ja: 再試行上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派在符合重试条件的失败之后最多可重新尝试的次数；普通代理回合不计为重试。
        en: Caps reattempts after failures that satisfy the retry policy; ordinary agent turns are not retries.
        ja: 再試行方針を満たす失敗後の再実行回数を制限し、通常のエージェントターンは再試行に数えません。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-delegation-budget-006
    - id: tool_call_limit
      labels:
        zh: 工具调用上限
        en: tool-call limit
        ja: ツール呼出上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定一次委派内所有工具调用事件的累计次数上限，与模型请求次数分别计量。
        en: Caps the aggregate count of tool-call events within one delegation, measured separately from model-request count.
        ja: 一件の委任内のツール呼出しイベント総数を、モデル要求数とは別に制限します。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-delegation-budget-007
    - id: approved_by
      labels:
        zh: 批准者
        en: approved by
        ja: 承認者
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用批准这些委派资源上限并对其变更承担责任的主体。
        en: References the principal that approved these delegation resource ceilings and is accountable for their change.
        ja: これらの委任資源上限を承認し、その変更に責任を負う主体を参照します。
      allowed_values: []
      pattern: null
      example_value: Actor:orchestrator-001
      source_claims:
        - claim-delegation-budget-008
  constraints:
    - id: delegation-budget-has-limit
      severity: error
      expression_language: plain
      expression: at least one of token_limit, time_limit_ms, cost_limit, retry_limit, or tool_call_limit is present and non-negative
      explanations:
        zh: 令牌、执行时间、成本、重试或工具调用上限至少存在一项，且所有已给上限均非负。
        en: At least one token, execution-time, cost, retry, or tool-call limit is present and every supplied limit is non-negative.
        ja: トークン、実行時間、費用、再試行、ツール呼出し上限の少なくとも一つが存在し、指定値はすべて非負でなければなりません。
      source_claims:
        - claim-delegation-budget-009
    - id: delegation-budget-cost-currency-pair
      severity: error
      expression_language: plain
      expression: cost_limit is present exactly when cost_currency is present
      explanations:
        zh: cost_limit 与 cost_currency 必须同时存在或同时缺省，避免无币种成本上限。
        en: cost_limit and cost_currency must either both be present or both be absent so a monetary ceiling is never currencyless.
        ja: 通貨のない金額上限を防ぐため、cost_limit と cost_currency は同時に存在するか同時に省略します。
      source_claims:
        - claim-delegation-budget-010
  required_relation_constraints: []
examples:
  - id: DelegationBudget-example-positive-manual-2026
    labels:
      zh: DelegationBudget positive
      en: DelegationBudget positive
      ja: DelegationBudget positive
    descriptions:
      zh: Temporal 持久化工作流映射 DelegationBudget：@workflow.defn class OrderWorkflow: @workflow.run async def run(self, order): await workflow.execute_activity(process_payment, order)；@activity.defn async def process_payment(order): ...；DurableExecution 支持 crash 后 resume。
      en: Temporal durable workflow maps DelegationBudget: @workflow.defn OrderWorkflow with @workflow.run executing process_payment activity; @activity.defn process_payment; DurableExecution supports resume after crash.
      ja: Temporal DelegationBudget: @workflow.defn+execute_activity(process_payment)+@activity.defn；DurableExecution resume。
    field_values: {specification_id: delegation-spec-budget-001, effective_from: 2026-07-15T01:00:00Z, version: 1, approved_by: Actor:orchestrator-001, token_limit: 20000, time_limit_ms: 600000, tool_call_limit: 3}

    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
    related_relation_ids:
      - DelegationBudget-is_a-DelegationSpecification
    source_claims:
      - claim-delegation-budget-011

  - id: DelegationBudget-example-boundary-manual-2026
    labels:
      zh: DelegationBudget boundary
      en: DelegationBudget boundary
      ja: DelegationBudget boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 DelegationBudget 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not DelegationBudget work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で DelegationBudget work_specification ではない。
    field_values: {}

    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
    related_relation_ids:
      - DelegationBudget-is_a-DelegationSpecification
    source_claims:
      - claim-delegation-budget-012

  - id: DelegationBudget-example-counterexample-confusable
    labels:
      zh: DelegationBudget counterexample
      en: DelegationBudget counterexample
      ja: DelegationBudget counterexample
    descriptions:
      zh: 缺少 AgentCard 或 TaskState enum 的 ad-hoc HTTP 调用不能作为 A2A 式 DelegationBudget RemoteDelegation。
      en: Ad-hoc HTTP calls without AgentCard or TaskState enum cannot serve as A2A-style DelegationBudget RemoteDelegation.
      ja: AgentCard/TaskState 欠落 HTTP は A2A 式 DelegationBudget ではない。
    field_values: {budget_id: absent, delegation_specification_ref: absent, scope: organization}

    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
      - DelegationContract
    related_relation_ids: []
    source_claims:
      - claim-delegation-budget-011

  - id: DelegationBudget-example-instance-concrete
    labels:
      zh: DelegationBudget instance
      en: DelegationBudget instance
      ja: DelegationBudget instance
    descriptions:
      zh: Temporal 实例：workflow.execute_activity(process_payment, order, retry_policy=RetryPolicy(maximum_attempts=5)) → 映射 DelegationBudget WorkflowStep。
      en: Temporal instance: workflow.execute_activity(process_payment, order, retry_policy=RetryPolicy(maximum_attempts=5)) → maps to DelegationBudget WorkflowStep.
      ja: Temporal 实例 execute_activity+RetryPolicy が DelegationBudget WorkflowStep に写像。
    field_values: {specification_id: delegation-spec-budget-001, effective_from: 2026-07-15T01:00:00Z, version: 1, approved_by: Actor:orchestrator-001, token_limit: 20000, time_limit_ms: 600000, tool_call_limit: 3}

    related_node_ids:
      - DelegationBudget
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-budget-011

