      en: constrains
      ja: constrains
    definitions:
      zh: 生效委派预算在运行期间约束委派过程可消耗的资源，超限必须阻止、暂停或升级。
      en: An effective delegation budget constrains resources consumable by the delegation process and requires blocking, pausing, or escalation on breach.
      ja: 有効委任予算は委任プロセスの消費資源を制約し、超過時に停止、一時停止、上申を要求します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: constrained_by
      labels:
        zh: 受其约束
        en: constrained by
        ja: 制約元
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
