    source_claims:
      - claim-delegation-contract-010
  - id: DelegationContract-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派契约边界例
      en: Boundary delegation contract case
      ja: 委任契約の境界例
    scenario_id: null
    descriptions:
      zh: 团队手册写着“专家应快速回复”，但没有委派 ID、双方、工作项或版本，因此不是委派契约。
      en: A team handbook says specialists should respond quickly but has no delegation ID, parties, work item, or version, so it is not a delegation contract.
      ja: チーム手引きに迅速応答とあっても委任 ID、双方、作業項目、版がなければ委任契約ではありません。
