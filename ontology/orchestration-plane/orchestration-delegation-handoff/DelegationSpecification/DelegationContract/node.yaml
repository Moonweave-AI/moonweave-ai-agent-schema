    expected_result:
      zh: 该记录应被识别为 DelegationContract，并保留其字段、边界与上位关系。
      en: The record is accepted as DelegationContract with its fields, boundary, and parent relation preserved.
      ja: この記録を DelegationContract として認識し、項目、境界、上位関係を保持します。
    why_valid_or_invalid:
      zh: 场景满足 委派契约是把委派者、受派方、工作项、完成条件和配套约束绑定为一个版本化承诺的委派规范。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation contract is a delegation specification that binds delegator, delegate, work item, completion terms, and supporting constraints into one versioned commitment."
      ja: この場面は次の同一性条件を満たします：委任契約は、委任者、受任者、作業項目、完了条件、付随制約を一つの版管理された約束へ結ぶ委任仕様です。
    synthetic: true
