schema: moonweave.ai/ontology-node/v1
id: DelegationContract
kind: concept
labels:
  zh: 委派契约
  en: delegation contract
  ja: 委任契約
semantics:
  short_definition:
    zh: 绑定双方、工作项与子规范并治理一次委派过程的生效契约。
    en: Effective contract binding parties, work item, and sub-specifications governing one delegation process.
    ja: parties/work item/sub-specifications を bind し一件の delegation process を govern する effective contract。
  definition:
    zh: DelegationContract 以 delegation_id、delegator_id、delegatee_id、task_id 引用并聚合 DelegatedAuthority、ContextIsolation、DelegationBudget 与 WorkItem。A2A TaskSendParams + AgentCard 选择、Cursor Task prompt+subagent_type+limits、CrewAI Task+agent+Process 组合，均应引用一个 DelegationContract@version 作为 DelegationProcess.contract_id。它是规范发生点，不是 DelegationProcess 本身。
    en: DelegationContract binds delegation_id, delegator_id, delegatee_id, task_id and aggregates DelegatedAuthority, ContextIsolation, DelegationBudget, and WorkItem. A2A TaskSendParams + AgentCard selection, Cursor Task prompt+subagent_type+limits, and CrewAI Task+agent+Process combo should reference one DelegationContract@version as DelegationProcess.contract_id. It is the specification anchor, not DelegationProcess itself.
    ja: DelegationContract は DelegatedAuthority/ContextIsolation/DelegationBudget/WorkItem を aggregate。DelegationProcess.contract_id が参照。
  why_needed:
    zh: 为一次委派提供单一可版本化的治理锚点。
    en: Provides single versioned governance anchor for one delegation.
    ja: 一件の delegation 向け single versioned governance anchor。
  includes:
    - zh: 纳入唯一标识委派双方、工作项、契约状态和引用约束版本的承诺记录。
      en: Includes commitments that identify both parties, work item, contract status, and referenced constraint versions.
      ja: 双方、作業項目、契約状態、参照制約版を特定する約束記録を含みます。
  excludes:
    - zh: 排除通用服务条款、只描述能力的 Agent Card，以及未被双方用于该委派的提示文本。
      en: Excludes general terms of service, capability-only Agent Cards, and prompt text not adopted for the delegation.
      ja: 一般利用規約、能力だけの Agent Card、当該委任に採用されていないプロンプト文を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 创建 DelegationProcess 前 materialize DelegationContract@version；governed_by 边连接 process→contract。子规范通过 specifies/grants 边挂载。
    en: Materialize DelegationContract@version before creating DelegationProcess; governed_by links process→contract. Sub-specs attach via specifies/grants edges.
    ja: DelegationContract@version を process 前に materialize。governed_by process→contract。
  typical_input:
    - description: Contract manifest.
      format: '{"delegation_id":"delegation-17","budget_id":"DelegationBudget:budget-v3","delegator_id":"coordinator-1","delegatee_id":"billing-2"}'
      source_claims:
        - claim-delegation-contract-design
  typical_output:
    - description: Moonweave DelegationContract.
      format: '{"delegation_id":"delegation-17","contract_id":"DelegationContract:contract-v3"}'
      source_claims:
        - claim-delegation-contract-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: delegation_id
      labels:
        zh: 委托标识
        en: delegation ID
        ja: 委譲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识委托方、受托方与工作范围之间的一次委托合同。
        en: Stable identifier for one delegation contract among delegator, delegatee, and work scope.
        ja: 委譲者、受任者、作業範囲の間の一つの委譲契約を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-001
      source_claims:
        - claim-delegation-contract-design
    - id: status
      labels:
        zh: 委托状态
        en: delegation status
        ja: 委譲状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 委托合同在提议、接受、活动、完成或撤销生命周期中的状态。
        en: State in the proposed, accepted, active, completed, or revoked delegation lifecycle.
        ja: proposed、accepted、active、completed、revoked の委譲ライフサイクル状態です。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-delegation-contract-design
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 委托合同形成的 UTC 时间。
        en: UTC instant at which the delegation contract was formed.
        ja: 委譲契約が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T03:05:00.000Z
      source_claims:
        - claim-delegation-contract-design
    - id: delegator_id
      labels:
        zh: 委托方标识
        en: delegator ID
        ja: 委譲者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识发出委托并承担授权责任的主体。
        en: Identifies the actor issuing the delegation and bearing authorization responsibility.
        ja: 委譲を発行し認可責任を負うアクターを識別します。
      allowed_values: []
      pattern: null
      example_value: actor-orchestrator-001
      source_claims:
        - claim-delegation-contract-design
    - id: delegatee_id
      labels:
        zh: 受托方标识
        en: delegatee ID
        ja: 受任者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识接受委托并负责执行的主体。
        en: Identifies the actor accepting the delegation and responsible for performance.
        ja: 委譲を受け入れ実行責任を負うアクターを識別します。
      allowed_values: []
      pattern: null
      example_value: actor-worker-007
      source_claims:
        - claim-delegation-contract-design
    - id: task_id
      labels:
        zh: 任务标识
        en: task ID
        ja: タスク ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次委托所覆盖的任务。
        en: Pins the task covered by this delegation.
        ja: この委譲が対象とするタスクを固定します。
      allowed_values: []
      pattern: null
      example_value: task-audit-001
      source_claims:
        - claim-delegation-contract-design
    - id: budget_id
      labels:
        zh: 预算标识
        en: budget ID
        ja: 予算 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识限制受托执行的时间、成本或工具预算。
        en: Identifies the time, cost, or tool budget limiting delegated performance.
        ja: 委譲実行を制限する時間、コスト、ツール予算を識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-budget-001
      source_claims:
        - claim-delegation-contract-design
  constraints:
    - id: delegation-contract-bounded-authority
      severity: error
      expression_language: plain
      expression: delegated authority is no broader than the delegator's authority and the stated task scope
      explanations:
        zh: 被委托权限不得超出委托方权限或约定任务范围。
        en: Delegated authority is no broader than the delegator's authority or the stated task scope.
        ja: 委譲権限は委譲者の権限または明示されたタスク範囲を超えてはなりません。
      source_claims:
        - claim-delegation-contract-design
  required_relation_constraints: []
examples:
  - id: DelegationContract-example-a2a-bundle
    labels:
      zh: A2A 委派契约
      en: A2A delegation contract
      ja: A2A delegation contract
    descriptions:
      zh: contract-v3 绑定 billing agent、refund work item、budget 与 isolation 子规范。
      en: contract-v3 binds billing agent, refund work item, budget and isolation sub-specs.
      ja: contract-v3 billing agent/refund work/budget/isolation bind。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: TaskSendParams
    field_values:
      delegation_id: delegation-17
      delegator_id: AgentActor:coordinator-1
      delegatee_id: AgentActor:billing-2
      task_id: WorkItem:42
    related_node_ids:
      - DelegationContract
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-design
  - id: DelegationContract-example-cursor-task
    labels:
      zh: Cursor Task 契约
      en: Cursor Task contract
      ja: Cursor Task contract
    descriptions:
      zh: contract 聚合 explore subagent、prompt isolation 与 token budget。
      en: Contract aggregates explore subagent, prompt isolation, and token budget.
      ja: contract explore subagent/prompt isolation/token budget aggregate。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: Task delegation
    field_values:
      delegation_id: delegation-cursor-9
      budget_id: DelegationBudget:cursor-v1
    related_node_ids:
      - DelegationContract
      - ContextIsolation
      - DelegationBudget
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-design
  - id: DelegationContract-example-crewai-hierarchical
    labels:
      zh: CrewAI 层级契约
      en: CrewAI hierarchical contract
      ja: CrewAI hierarchical contract
    descriptions:
      zh: Manager→researcher 委派 contract 引用 task、authority 与 budget。
      en: Manager→researcher delegation contract references task, authority, and budget.
      ja: manager→researcher contract task/authority/budget 参照。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: hierarchical
    field_values:
      delegation_id: delegation-crew-3
      delegator_id: AgentActor:manager
      delegatee_id: AgentActor:researcher
    related_node_ids:
      - DelegationContract
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-design
  - id: DelegationContract-example-boundary-process
    labels:
      zh: 过程不是契约
      en: Process is not contract
      ja: process は contract ではない
    descriptions:
      zh: DelegationProcess 发生事实引用 contract_id，不能反向把 process 当作 contract。
      en: DelegationProcess occurrence references contract_id; process cannot substitute for contract.
      ja: DelegationProcess は contract_id 参照し contract 代替不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DelegationContract
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-design
parent_relation:
  id: DelegationContract-is_a-DelegationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 委派契约是把双方、工作与约束绑定为版本化承诺的委派规范。
    en: A delegation contract is a delegation specification that binds parties, work, and constraints as a versioned commitment.
    ja: 委任契約は双方、作業、制約を版管理された約束へ結ぶ委任仕様です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-delegation-contract-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DelegationContract-grants-DelegatedAuthority
    predicate: grants
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: grants
      en: grants
      ja: grants
    definitions:
      zh: 委派契约通过纳入一份受派权限规范来授予权限，该规范把受派方代表委派方的行动限制在声明的权限、资源和有效期内。
      en: A delegation contract grants authority by incorporating a delegated-authority specification that limits action on the delegator's behalf to stated permissions, resources, and validity.
      ja: 委任契約は委任権限仕様を組み込むことで権限を付与し、受任者の代理行為を指定権限、資源、有効期間に限定します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: granted_by
      labels:
        zh: 由其授予
        en: granted by
        ja: 授与元
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-contract-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DelegatedAuthority
  - id: DelegationContract-specifies-ContextIsolation
    predicate: specifies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: specifies
      en: specifies
      ja: specifies
    definitions:
      zh: 委派契约采用一个上下文隔离规范，决定受派方可见与不可见的信息表面。
      en: A delegation contract specifies a context-isolation specification that determines information surfaces visible and hidden from the delegate.
      ja: 委任契約は受任者に見える・見えない情報面を定めるコンテキスト隔離仕様を指定します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: specified_by
      labels:
        zh: 由其规定
        en: specified by
        ja: 指定元
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-contract-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ContextIsolation
  - id: DelegationContract-specifies-WorkItem
    predicate: specifies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: specifies
      en: specifies
      ja: specifies
    definitions:
      zh: 委派契约明确指出本次委派分配的工作项及其版本，不以自然语言主题替代工作身份。
      en: A delegation contract specifies the work item and version allocated by the delegation rather than only a natural-language topic.
      ja: 委任契約は自然言語の話題だけでなく、委任で割り当てる作業項目と版を明示します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: specified_by
      labels:
        zh: 由其规定
        en: specified by
        ja: 指定元
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-contract-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:WorkItem
  - id: DelegationContract-specifies-DelegationBudget
    predicate: specifies
    relation_kind: governance
    direction: source-to-target
    labels:
      zh: specifies
      en: specifies
      ja: specifies
    definitions:
      zh: 委派契约引用并采用一个委派预算版本作为该委派的资源上限。
      en: A delegation contract specifies and adopts one delegation-budget version as the resource limit for the delegation.
      ja: 委任契約は一つの委任予算版を参照・採用し、当該委任の資源上限とします。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: specified_by
      labels:
        zh: 由其规定
        en: specified by
        ja: 指定元
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-delegation-contract-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DelegationBudget
