    expected_result:
      zh: 该对象不得被归为 DelegationContract，也不得借邻近关系补造缺失条件。
      en: The object must not be classified as DelegationContract or acquire missing conditions from nearby facts.
      ja: この対象を DelegationContract に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除通用服务条款、只描述能力的 Agent Card，以及未被双方用于该委派的提示文本。
      en: "The case violates this reviewed exclusion boundary: Excludes general terms of service, capability-only Agent Cards, and prompt text not adopted for the delegation."
      ja: この例は審査済み除外境界に反します：一般利用規約、能力だけの Agent Card、当該委任に採用されていないプロンプト文を除外します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
