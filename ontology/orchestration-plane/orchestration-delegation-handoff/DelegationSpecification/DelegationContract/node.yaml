      en: contract-v3 binds the coordinator, regulatory specialist, and work-item-42 and references budget, authority, context-isolation, and acceptance terms.
      ja: contract-v3 が調整役、規制専門家、work-item-42 を結び、予算、権限、コンテキスト隔離、受入条件を参照します。
