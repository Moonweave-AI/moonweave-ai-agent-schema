schema: moonweave.ai/ontology-node/v1
id: DelegationContract
kind: concept
labels:
  zh: 委派契约
  en: delegation contract
  ja: 委任契約
semantics:
  short_definition:
    zh: 绑定委派者、受派方、工作项与约束的版本化承诺规范。
    en: Versioned commitment binding delegator, delegate, work, and constraints.
    ja: 委任者・受任者・作業項目・制約を結ぶ版管理された約束仕様。
  definition:
    zh: 委派契约是把委派者、受派方、工作项、完成条件和配套约束绑定为一个版本化承诺的委派规范。 它引用预算、授权和上下文隔离规范，并通过状态与生效时间区分提议、有效、撤销和完成契约。
    en: A delegation contract is a delegation specification that binds delegator, delegate, work item, completion terms, and supporting constraints into one versioned commitment. It references budget, authority, and context-isolation specifications and distinguishes proposed, effective, revoked, and completed contracts by status and time.
    ja: 委任契約は、委任者、受任者、作業項目、完了条件、付随制約を一つの版管理された約束へ結ぶ委任仕様です。 予算、権限、コンテキスト隔離仕様を参照し、状態と時刻により提案、有効、取消、完了の契約を区別します。
  why_needed:
    zh: 该节点集中记录一次委派双方同意的工作边界，避免把预算、权限或上下文约束散落为无法归属的规则节点。
    en: The node centralizes the agreed work boundary of one delegation instead of scattering budget, authority, and context constraints as ownerless rule nodes.
    ja: 一件の委任で合意された作業境界を集中記録し、予算、権限、コンテキスト制約を帰属不明の規則ノードへ分散させません。
  includes:
    - zh: 纳入唯一标识委派双方、工作项、契约状态和引用约束版本的承诺记录。
      en: Includes commitments that identify both parties, work item, contract status, and referenced constraint versions.
      ja: 双方、作業項目、契約状態、参照制約版を特定する約束記録を含みます。
  excludes:
    - zh: 排除通用服务条款、只描述能力的 Agent Card，以及未被双方用于该委派的提示文本。
      en: Excludes general terms of service, capability-only Agent Cards, and prompt text not adopted for the delegation.
      ja: 一般利用規約、能力だけの Agent Card、当該委任に採用されていないプロンプト文を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      DelegationContract 在 transfer_to_agent 或 A2A Task 创建前绑定 delegator、delegate 与 work_item_ref；
      编排网关校验 contract_status=effective 后才启动 DelegationProcess。AgentCard 描述远程能力，不是双方承诺；
      契约 revision 不因 Execution 状态变化而改写。
    en: >-
      DelegationContract binds delegator, delegate, and work_item_ref before transfer_to_agent or A2A Task creation; an
      orchestration gateway starts DelegationProcess only after contract_status=effective validation. AgentCard describes
      remote capability, not bilateral commitment; contract revision does not rewrite from Execution state changes.
    ja: >-
      DelegationContract は transfer_to_agent または A2A Task 作成前に delegator、delegate、work_item_ref を bind する。
      orchestration gateway は contract_status=effective 検証後にのみ DelegationProcess を開始する。AgentCard は remote
      capability を記述し bilateral commitment ではない。contract revision は Execution state 変化で書き換わらない。
  typical_input:
    - description:
        zh: 双方确认的委派契约规约。
        en: A bilateral delegation contract specification.
        ja: bilateral delegation contract specification。
      format: |-
        {"contract_id":"contract:audit-7@2","delegator_binding_ref":"binding-orchestrator-1","delegate_binding_ref":"binding-agent-auditor-3","work_item_ref":"work-item-71@2","contract_status":"effective","completion_terms_ref":"criterion:zero-unexplained-differences@4"}
  typical_output:
    - description:
        zh: 通过校验、可被 DelegationProcess 引用的有效契约引用。
        en: An effective contract reference passing validation and referenced by DelegationProcess.
        ja: validation を pass し DelegationProcess が参照する effective contract reference。
      format: |-
        {"contract_ref":"contract:audit-7@2","delegation_process_ref":"deleg-proc-884","handoff_allowed":true}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents agent-to-agent transfer requiring explicit delegated work boundaries.
    - name: A2A Protocol Task
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol Task creation separate from local delegation contracts.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Documents capability advertisement not equivalent to delegation commitment.
  source_claims:
    - claim-delegation-contract-001
    - claim-delegation-contract-002
structure:
  identity_keys: []
  fields:
    - id: delegation_id
      labels:
        zh: 委托标识
        en: delegation ID
        ja: 委譲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识委托方、受托方与工作范围之间的一次委托合同。
        en: Stable identifier for one delegation contract among delegator, delegatee, and work scope.
        ja: 委譲者、受任者、作業範囲の間の一つの委譲契約を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-001
      source_claims:
        - claim-delegation-contract-002
    - id: status
      labels:
        zh: 委托状态
        en: delegation status
        ja: 委譲状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 委托合同在提议、接受、活动、完成或撤销生命周期中的状态。
        en: State in the proposed, accepted, active, completed, or revoked delegation lifecycle.
        ja: proposed、accepted、active、completed、revoked の委譲ライフサイクル状態です。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-delegation-contract-003
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 委托合同形成的 UTC 时间。
        en: UTC instant at which the delegation contract was formed.
        ja: 委譲契約が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T03:05:00.000Z
      source_claims:
        - claim-delegation-contract-004
    - id: delegator_id
      labels:
        zh: 委托方标识
        en: delegator ID
        ja: 委譲者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识发出委托并承担授权责任的主体。
        en: Identifies the actor issuing the delegation and bearing authorization responsibility.
        ja: 委譲を発行し認可責任を負うアクターを識別します。
      allowed_values: []
      pattern: null
      example_value: actor-orchestrator-001
      source_claims:
        - claim-delegation-contract-005
    - id: delegatee_id
      labels:
        zh: 受托方标识
        en: delegatee ID
        ja: 受任者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识接受委托并负责执行的主体。
        en: Identifies the actor accepting the delegation and responsible for performance.
        ja: 委譲を受け入れ実行責任を負うアクターを識別します。
      allowed_values: []
      pattern: null
      example_value: actor-worker-007
      source_claims:
        - claim-delegation-contract-006
    - id: task_id
      labels:
        zh: 任务标识
        en: task ID
        ja: タスク ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次委托所覆盖的任务。
        en: Pins the task covered by this delegation.
        ja: この委譲が対象とするタスクを固定します。
      allowed_values: []
      pattern: null
      example_value: task-audit-001
      source_claims:
        - claim-delegation-contract-007
    - id: budget_id
      labels:
        zh: 预算标识
        en: budget ID
        ja: 予算 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识限制受托执行的时间、成本或工具预算。
        en: Identifies the time, cost, or tool budget limiting delegated performance.
        ja: 委譲実行を制限する時間、コスト、ツール予算を識別します。
      allowed_values: []
      pattern: null
      example_value: delegation-budget-001
      source_claims:
        - claim-delegation-contract-008
  constraints:
    - id: delegation-contract-bounded-authority
      severity: error
      expression_language: plain
      expression: delegated authority is no broader than the delegator's authority and the stated task scope
      explanations:
        zh: 被委托权限不得超出委托方权限或约定任务范围。
        en: Delegated authority is no broader than the delegator's authority or the stated task scope.
        ja: 委譲権限は委譲者の権限または明示されたタスク範囲を超えてはなりません。
      source_claims:
        - claim-delegation-contract-009
  required_relation_constraints: []
examples:
  - id: DelegationContract-example-positive-manual-2026
    labels:
      zh: DelegationContract positive
      en: DelegationContract positive
      ja: DelegationContract positive
    descriptions:
      zh: "A2A Protocol 映射 DelegationContract：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps DelegationContract: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol DelegationContract: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {specification_id: delegation-spec-contract-001, version: 1, effective_from: 2026-07-15T01:00:00Z, delegation_id: delegation-001, status: active, created_at: 2026-07-13T03:05:00.000Z, delegator_id: actor-orchestrator-001, delegatee_id: actor-worker-007, task_id: task-audit-001, budget_id: delegation-spec-budget-001}

    related_node_ids:
      - DelegationContract
      - DelegationSpecification
    related_relation_ids:
      - DelegationContract-is_a-DelegationSpecification
    source_claims:
      - claim-delegation-contract-010

  - id: DelegationContract-example-boundary-manual-2026
    labels:
      zh: DelegationContract boundary
      en: DelegationContract boundary
      ja: DelegationContract boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 DelegationContract 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not DelegationContract work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で DelegationContract work_specification ではない。
    field_values: {}

    related_node_ids:
      - DelegationContract
      - DelegationSpecification
    related_relation_ids:
      - DelegationContract-is_a-DelegationSpecification
    source_claims:
      - claim-delegation-contract-011

  - id: DelegationContract-example-counterexample-confusable
    labels:
      zh: DelegationContract counterexample
      en: DelegationContract counterexample
      ja: DelegationContract counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 DelegationContract DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style DelegationContract DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 DelegationContract ではない。
    field_values: {contract_id: absent, effective_from: absent, authority_refs: absent}

    related_node_ids:
      - DelegationContract
      - DelegationSpecification
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-010

  - id: DelegationContract-example-instance-concrete
    labels:
      zh: DelegationContract instance
      en: DelegationContract instance
      ja: DelegationContract instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 DelegationContract A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to DelegationContract A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が DelegationContract A2ATask に写像。
    field_values: {specification_id: delegation-spec-contract-001, version: 1, effective_from: 2026-07-15T01:00:00Z, delegation_id: delegation-001, status: active, created_at: 2026-07-13T03:05:00.000Z, delegator_id: actor-orchestrator-001, delegatee_id: actor-worker-007, task_id: task-audit-001, budget_id: delegation-spec-budget-001}

    related_node_ids:
      - DelegationContract
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-delegation-contract-010

