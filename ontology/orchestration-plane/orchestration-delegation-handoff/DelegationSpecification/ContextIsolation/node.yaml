schema: moonweave.ai/ontology-node/v1
id: ContextIsolation
kind: concept
labels:
  zh: 委派上下文隔离规范
  en: delegation context-isolation specification
  ja: 委任コンテキスト隔離仕様
semantics:
  short_definition:
    zh: 规定受派方可见与不可见上下文表面的隔离规范。
    en: Specification of what context surfaces a delegate may or may not see.
    ja: 受任者が閲覧できる・できないコンテキスト面を定める隔離仕様。
  definition:
    zh: 委派上下文隔离规范规定受派方可见与不可见的信息表面及其默认披露决定。 它以允许表面、拒绝表面、生效时间和默认决定约束 DelegationContext；它不等于被传递的上下文内容。
    en: A delegation context-isolation specification states which information surfaces a delegate may or may not see and the default disclosure decision. It constrains DelegationContext through allowed surfaces, denied surfaces, effective time, and default decision; it is not the transmitted context content.
    ja: 委任コンテキスト隔離仕様は、受任者が閲覧できる情報面・できない情報面と既定開示判断を定めます。 許可面、拒否面、有効時刻、既定判断により DelegationContext を制約し、伝達されるコンテキスト内容そのものではありません。
  why_needed:
    zh: 该节点把“可披露范围”与“实际上下文”分开，使最小披露和敏感信息排除可以验证。
    en: The node separates permitted disclosure from actual context so least disclosure and sensitive-data exclusion can be validated.
    ja: 許可された開示範囲と実コンテキストを分け、最小開示と機微情報除外を検証可能にします。
  includes:
    - zh: 纳入针对一个委派定义允许、拒绝、默认处理和有效期的上下文边界规范。
      en: Includes context-boundary specifications for one delegation with allow, deny, default, and validity terms.
      ja: 一件の委任について許可、拒否、既定処理、有効期間を定めるコンテキスト境界仕様を含みます。
  excludes:
    - zh: 排除消息历史本身、上下文摘要、通用数据分类规则和没有受派方范围的隐私政策。
      en: Excludes message history, context summaries, general data-classification rules, and privacy policies with no delegate scope.
      ja: メッセージ履歴、コンテキスト要約、一般データ分類規則、受任範囲を持たないプライバシーポリシーを除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: >-
      ContextIsolation 在构建 DelegationContext 时过滤 memory、message 与 tool transcript 表面：allowed_surfaces
      与 denied_surfaces 驱动 redaction pipeline。OpenAI Agents SDK handoff 传入的 context 应经隔离规约裁剪；
      A2A Message parts 只携带协议允许字段，不能替代隔离规约本身。
    en: >-
      ContextIsolation filters memory, message, and tool-transcript surfaces when building DelegationContext: allowed_surfaces
      and denied_surfaces drive a redaction pipeline. Context passed through OpenAI Agents SDK handoff should be trimmed by
      isolation specs; A2A Message parts carry only protocol-permitted fields and cannot substitute for isolation
      specification.
    ja: >-
      ContextIsolation は DelegationContext 構築時に memory、message、tool transcript surface を filter する。
      allowed_surfaces と denied_surfaces が redaction pipeline を駆動する。OpenAI Agents SDK handoff context は isolation spec
      で trim すべき。A2A Message parts は protocol 許可 field のみで isolation specification の substitute になれない。
  typical_input:
    - description:
        zh: 定义允许与拒绝信息表面的上下文隔离规约。
        en: A context-isolation specification defining allowed and denied information surfaces.
        ja: allowed/denied information surface を定義する context-isolation specification。
      format: |-
        {"isolation_id":"iso:audit-7@1","allowed_surfaces":["task_spec","ledger_snapshot"],"denied_surfaces":["user_pii","unrelated_threads"],"default_decision":"deny"}
  typical_output:
    - description:
        zh: 经隔离规约裁剪后可传递给受派方的 DelegationContext 包络。
        en: A DelegationContext envelope trimmed by isolation specification for delegate transfer.
        ja: isolation spec で trim され delegate へ渡せる DelegationContext envelope。
      format: |-
        {"delegation_context_ref":"dctx-884","isolation_ref":"iso:audit-7@1","redacted_surfaces":["user_pii"],"permitted_payload_refs":["task-spec-reconcile-7@4","ledger-snapshot@2"]}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents context passed to delegated agents that should respect isolation bounds.
    - name: A2A Message
      url: https://a2a-protocol.org/latest/specification/
      description: Documents protocol message parts as transport, not isolation policy storage.
    - name: A2A SendMessageRequest
      url: https://a2a-protocol.org/latest/specification/
      description: Documents client requests whose payload must be filtered by local isolation specs.
  source_claims:
    - claim-context-isolation-001
    - claim-context-isolation-002
structure:
  identity_keys: []
  fields:
    - id: allowed_surface_refs
      labels:
        zh: 允许接口引用
        en: allowed-surface references
        ja: 許可面参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出受派方在该隔离规范生效期间可以接收的信息表面或数据范围引用。
        en: References the information surfaces or data scopes that the delegate may receive while this isolation specification is effective.
        ja: この分離仕様の有効期間中に受任者へ渡してよい情報面またはデータ範囲を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - MemorySurface:task
      source_claims:
        - claim-context-isolation-002
    - id: denied_surface_refs
      labels:
        zh: 拒绝接口引用
        en: denied-surface references
        ja: 拒否面参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出即使邻近上下文可用也必须从受派方输入中排除的信息表面引用。
        en: References information surfaces that must be excluded from delegate input even when adjacent context is otherwise available.
        ja: 周辺コンテキストが利用可能でも受任者入力から除外すべき情報面を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - MemorySurface:private
      source_claims:
        - claim-context-isolation-003
    - id: default_decision
      labels:
        zh: 默认决定
        en: default decision
        ja: 既定判断
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定某信息表面未被允许或拒绝条款明确覆盖时采用允许还是拒绝。
        en: States whether an information surface is allowed or denied when no explicit allow or deny clause covers it.
        ja: 情報面が明示的な許可・拒否条項に該当しない場合の既定判断を示します。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-context-isolation-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextIsolation-example-positive-manual-2026
    labels:
      zh: ContextIsolation positive
      en: ContextIsolation positive
      ja: ContextIsolation positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 ContextIsolation：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps ContextIsolation: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が ContextIsolation 多 agent 協調に写像。
    field_values: {specification_id: delegation-spec-isolation-001, effective_from: 2026-07-15T01:00:00Z, version: 1}

    related_node_ids:
      - ContextIsolation
      - DelegationSpecification
    related_relation_ids:
      - ContextIsolation-is_a-DelegationSpecification
    source_claims:
      - claim-context-isolation-005

  - id: ContextIsolation-example-boundary-manual-2026
    labels:
      zh: ContextIsolation boundary
      en: ContextIsolation boundary
      ja: ContextIsolation boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 ContextIsolation 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not ContextIsolation internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で ContextIsolation 内部 spec ではない。
    field_values: {}

    related_node_ids:
      - ContextIsolation
      - DelegationSpecification
    related_relation_ids:
      - ContextIsolation-is_a-DelegationSpecification
    source_claims:
      - claim-context-isolation-006

  - id: ContextIsolation-example-counterexample-confusable
    labels:
      zh: ContextIsolation counterexample
      en: ContextIsolation counterexample
      ja: ContextIsolation counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 ContextIsolation TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style ContextIsolation TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 ContextIsolation ではない。
    field_values: {isolation_id: absent, permitted_memory_scope_ref: absent, policy_kind: encryption_at_rest}

    related_node_ids:
      - ContextIsolation
      - DelegationContext
      - SubagentContext
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-005

  - id: ContextIsolation-example-instance-concrete
    labels:
      zh: ContextIsolation instance
      en: ContextIsolation instance
      ja: ContextIsolation instance
    descriptions:
      zh: AutoGen 实例：AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → 映射 ContextIsolation DelegationTarget。
      en: AutoGen instance: AssistantAgent + UserProxyAgent + GroupChatManager speaker_selection_method="auto" → maps to ContextIsolation DelegationTarget.
      ja: AutoGen 实例 AssistantAgent+UserProxyAgent+Manager が ContextIsolation に写像。
    field_values: {specification_id: delegation-spec-isolation-001, effective_from: 2026-07-15T01:00:00Z, version: 1}

    related_node_ids:
      - ContextIsolation
      - DelegationSpecification
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-005

