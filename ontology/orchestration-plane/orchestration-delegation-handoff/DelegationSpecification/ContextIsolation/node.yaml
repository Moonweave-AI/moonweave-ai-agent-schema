  - id: ContextIsolation-example-boundary-manual-2026
    kind: boundary
    labels:
      zh: 委派上下文隔离规范边界例
      en: Boundary delegation context-isolation specification case
      ja: 委任コンテキスト隔離仕様の境界例
    scenario_id: null
    descriptions:
      zh: 一段摘要实际只包含订单号，但没有规定哪些信息必须排除；它是上下文内容，不是隔离规范。
      en: A summary happens to contain only an order ID but states no required exclusions; it is context content, not an isolation specification.
      ja: 要約が注文 ID だけを含んでも必須除外範囲を定めない場合、コンテキスト内容であって隔離仕様ではありません。
    field_values: {}
