      en: The isolation specification lets a refund agent see order ID and payment status while denying full card numbers and the support agent's internal reasoning.
      ja: 隔離仕様が返金代理に注文 ID と支払状態を許可し、完全なカード番号とサポート代理の内部推論を拒否します。
    field_values:
      specification_id: delegation-spec-isolation-001
      effective_from: 2026-07-15T01:00:00Z
      version: "1"
      allowed_surface_refs:
        - MemorySurface:task
      default_decision: deny
