schema: moonweave.ai/ontology-node/v1
id: ContextIsolation
kind: concept
labels:
  zh: 委派上下文隔离规范
  en: delegation context-isolation specification
  ja: 委任コンテキスト隔離仕様
semantics:
  short_definition:
    zh: 规定受派方可见与不可见信息面及默认披露决定的委派规范。
    en: Delegation specification defining visible/denied information surfaces and default disclosure for a delegate.
    ja: delegate の visible/denied information surface と default disclosure を定める delegation specification。
  definition:
    zh: ContextIsolation 以 allowed_surface_refs、denied_surface_refs 与 default_decision 约束 DelegationContext 可包含的引用。Cursor fresh context per subagent、LangGraph subgraph 隔离、OpenAI handoff input_filter 均投影为此规范；它是披露政策，不是实际上下文内容。
    en: ContextIsolation constrains DelegationContext references via allowed_surface_refs, denied_surface_refs, and default_decision. Cursor fresh context per subagent, LangGraph subgraph isolation, and OpenAI handoff input_filter project here; it is disclosure policy, not actual context content.
    ja: ContextIsolation は DelegationContext 引用を制約。Cursor fresh context/LangGraph subgraph/OpenAI input_filter が写像。
  why_needed:
    zh: 分离“可披露范围”与“实际上下文”，使最小披露可验证。
    en: Separates permitted disclosure from actual context so least disclosure is verifiable.
    ja: permitted disclosure と actual context を分離。
  includes:
    - zh: 纳入针对一个委派定义允许、拒绝、默认处理和有效期的上下文边界规范。
      en: Includes context-boundary specifications for one delegation with allow, deny, default, and validity terms.
      ja: 一件の委任について許可、拒否、既定処理、有効期間を定めるコンテキスト境界仕様を含みます。
  excludes:
    - zh: 排除消息历史本身、上下文摘要、通用数据分类规则和没有受派方范围的隐私政策。
      en: Excludes message history, context summaries, general data-classification rules, and privacy policies with no delegate scope.
      ja: メッセージ履歴、コンテキスト要約、一般データ分類規則、受任範囲を持たないプライバシーポリシーを除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: OpenAI input_filter → allowed/denied surfaces；Cursor 每 subagent 独立 prompt → default_decision=deny + explicit allows；LangGraph subgraph state schema → denied parent fields。bounds 关系连接 ContextIsolation → DelegationContext。
    en: OpenAI input_filter → allowed/denied surfaces; Cursor isolated prompt per subagent → default_decision=deny + explicit allows; LangGraph subgraph state schema → denied parent fields. bounds relation links ContextIsolation → DelegationContext.
    ja: input_filter/subgraph isolation → ContextIsolation.bounds → DelegationContext。
  typical_input:
    - description: Isolation spec.
      format: '{"allowed_surface_refs":["MemorySurface:order"],"denied_surface_refs":["MemorySurface:card"],"default_decision":"deny"}'
      source_claims:
        - claim-context-isolation-design
  typical_output:
    - description: Moonweave ContextIsolation.
      format: '{"specification_id":"delegation-spec-isolation-001","version":"1"}'
      source_claims:
        - claim-context-isolation-design
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff() and transfer_to_* for control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send lifecycle and AgentCard skills matching.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command routing and subgraph context isolation.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Hierarchical manager delegation and task.context.
    - name: Cursor Task tool
      url: https://docs.cursor.com/agent/tools
      description: Subagent Task launch with isolated prompt context.
structure:
  identity_keys: []
  fields:
    - id: allowed_surface_refs
      labels:
        zh: 允许接口引用
        en: allowed-surface references
        ja: 許可面参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出受派方在该隔离规范生效期间可以接收的信息表面或数据范围引用。
        en: References the information surfaces or data scopes that the delegate may receive while this isolation specification is effective.
        ja: この分離仕様の有効期間中に受任者へ渡してよい情報面またはデータ範囲を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - MemorySurface:task
      source_claims:
        - claim-context-isolation-design
    - id: denied_surface_refs
      labels:
        zh: 拒绝接口引用
        en: denied-surface references
        ja: 拒否面参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出即使邻近上下文可用也必须从受派方输入中排除的信息表面引用。
        en: References information surfaces that must be excluded from delegate input even when adjacent context is otherwise available.
        ja: 周辺コンテキストが利用可能でも受任者入力から除外すべき情報面を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - MemorySurface:private
      source_claims:
        - claim-context-isolation-design
    - id: default_decision
      labels:
        zh: 默认决定
        en: default decision
        ja: 既定判断
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定某信息表面未被允许或拒绝条款明确覆盖时采用允许还是拒绝。
        en: States whether an information surface is allowed or denied when no explicit allow or deny clause covers it.
        ja: 情報面が明示的な許可・拒否条項に該当しない場合の既定判断を示します。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-context-isolation-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextIsolation-example-openai-filter
    labels:
      zh: OpenAI input_filter
      en: OpenAI input_filter
      ja: OpenAI input_filter
    descriptions:
      zh: Handoff input_filter 移除 tool-call 历史，denied_surface_refs 含 internal-tools。
      en: Handoff input_filter removes tool-call history; denied_surface_refs includes internal-tools.
      ja: input_filter が tool-call history 除去 internal-tools denied。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: input_filter
    field_values:
      allowed_surface_refs:
        - MemorySurface:conversation
      denied_surface_refs:
        - MemorySurface:internal-tools
      default_decision: deny
    related_node_ids:
      - ContextIsolation
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-design
  - id: ContextIsolation-example-cursor-fresh
    labels:
      zh: Cursor 独立上下文
      en: Cursor fresh context
      ja: Cursor fresh context
    descriptions:
      zh: 每 subagent Task 默认 deny 全会话，仅 prompt 允许面显式纳入。
      en: Each subagent Task defaults deny full conversation; only prompt allowed surfaces explicitly included.
      ja: subagent Task 默认 deny full conversation、prompt allow のみ。
    example_source:
      product: Cursor
      url: https://docs.cursor.com/agent/tools
      version: fresh context
    field_values:
      default_decision: deny
      allowed_surface_refs:
        - MemorySurface:task-prompt
    related_node_ids:
      - ContextIsolation
      - SubagentContext
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-design
  - id: ContextIsolation-example-langgraph-subgraph
    labels:
      zh: LangGraph 子图隔离
      en: LangGraph subgraph isolation
      ja: LangGraph subgraph isolation
    descriptions:
      zh: Billing subgraph denied_surface_refs 含 triage 内部 tool 状态。
      en: Billing subgraph denied_surface_refs includes triage internal tool state.
      ja: billing subgraph denied に triage internal tool state。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: subgraph isolation
    field_values:
      denied_surface_refs:
        - MemorySurface:triage-tools
    related_node_ids:
      - ContextIsolation
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-design
  - id: ContextIsolation-example-boundary-summary
    labels:
      zh: 摘要不是隔离规范
      en: Summary is not isolation spec
      ja: summary は isolation spec ではない
    descriptions:
      zh: 仅含订单号的摘要未声明允许/拒绝条款，是内容不是 ContextIsolation。
      en: Summary containing only order ID without allow/deny terms is content, not ContextIsolation.
      ja: allow/deny 条項無し summary は ContextIsolation ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextIsolation
      - DelegationContext
    related_relation_ids: []
    source_claims:
      - claim-context-isolation-design
parent_relation:
  id: ContextIsolation-is_a-DelegationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: 委派上下文隔离以允许表面、拒绝表面和默认披露决定为种差，属于委派规范。
    en: Delegation context isolation is a delegation specification differentiated by allowed surfaces, denied surfaces, and default disclosure decision.
    ja: 委任コンテキスト隔離は許可面、拒否面、既定開示判断を種差とする委任仕様です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系描述类层级，不对运行实例数量施加基数。
    en: Subtype relations describe class hierarchy and impose no runtime-instance cardinality.
    ja: 下位型関係はクラス階層を記述し、実行インスタンス数の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-context-isolation-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ContextIsolation-bounds-DelegationContext
    predicate: bounds
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: bounds
      en: bounds
      ja: bounds
    definitions:
      zh: 上下文隔离规范限定委派上下文可包含的引用集合、必须排除的引用和默认处理。
      en: A context-isolation specification bounds the references delegation context may include, must exclude, and handles by default.
      ja: コンテキスト隔離仕様は委任コンテキストの許可参照、必須除外参照、既定処理を限定します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: bounded_by
      labels:
        zh: 受其界定
        en: bounded by
        ja: 境界付けられる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-context-isolation-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DelegationContext
