      en: "Reviewed sibling distinction: parent DelegationSpecification: ContextIsolation (semantic kind=specification, backbone ContextIsolation-is_a-DelegationSpecification); DelegatedAuthority (semantic kind=specification, backbone DelegatedAuthority-is_a-DelegationSpecification). Endpoint conditions: ContextIsolation condition: “A delegation context-isolation specification states which information surfaces a delegate may or may not see and the default disclosure decision”; DelegatedAuthority condition: “A delegated-authority specification states the permissions and resource scope a delegate may exercise on behalf of a delegator in one delegation”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 DelegationSpecification：ContextIsolation（semantic kind=specification、バックボーン ContextIsolation-is_a-DelegationSpecification）；DelegatedAuthority（semantic kind=specification、バックボーン DelegatedAuthority-is_a-DelegationSpecification）。両端条件：ContextIsolation の条件：「委任コンテキスト隔離仕様は、受任者が閲覧できる情報面・できない情報面と既定開示判断を定めます」；DelegatedAuthority の条件：「委任権限仕様は、一件の委任で受任者が委任者に代わって行使できる許可と資源範囲を定めます」。一方の成立は他方を証明しません。
    source_claims:
      - claim-context-isolation-007
      - claim-context-isolation-008
  - sibling_concept_id: DelegationBudget
    shared_parent_concept_id: DelegationSpecification
    differentia:
      zh: 共享父节点对照：父节点 DelegationSpecification：ContextIsolation（semantic kind=specification，骨架 ContextIsolation-is_a-DelegationSpecification）；DelegationBudget（semantic kind=specification，骨架 DelegationBudget-is_a-DelegationSpecification）。双端条件：ContextIsolation 条件：“委派上下文隔离规范规定受派方可见与不可见的信息表面及其默认披露决定”；DelegationBudget 条件：“委派预算规范是为一次委派规定可消耗令牌、时间、费用、重试或工具调用上限的委派规范”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent DelegationSpecification: ContextIsolation (semantic kind=specification, backbone ContextIsolation-is_a-DelegationSpecification); DelegationBudget (semantic kind=specification, backbone DelegationBudget-is_a-DelegationSpecification). Endpoint conditions: ContextIsolation condition: “A delegation context-isolation specification states which information surfaces a delegate may or may not see and the default disclosure decision”; DelegationBudget condition: “A delegation budget specification is a delegation specification that limits tokens, time, cost, retries, or tool calls consumable by one delegation”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 DelegationSpecification：ContextIsolation（semantic kind=specification、バックボーン ContextIsolation-is_a-DelegationSpecification）；DelegationBudget（semantic kind=specification、バックボーン DelegationBudget-is_a-DelegationSpecification）。両端条件：ContextIsolation の条件：「委任コンテキスト隔離仕様は、受任者が閲覧できる情報面・できない情報面と既定開示判断を定めます」；DelegationBudget の条件：「委任予算仕様は、一件の委任が消費できるトークン、時間、費用、再試行、ツール呼出しを制限する委任仕様です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-context-isolation-009
      - claim-context-isolation-010
