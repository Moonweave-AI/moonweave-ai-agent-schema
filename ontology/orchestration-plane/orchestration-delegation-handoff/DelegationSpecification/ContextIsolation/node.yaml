      zh: 场景满足 委派上下文隔离规范规定受派方可见与不可见的信息表面及其默认披露决定。，并提供可核验的身份与成立条件。
      en: "The scenario satisfies this identity condition: A delegation context-isolation specification states which information surfaces a delegate may or may not see and the default disclosure decision."
      ja: この場面は次の同一性条件を満たします：委任コンテキスト隔離仕様は、受任者が閲覧できる情報面・できない情報面と既定開示判断を定めます。
