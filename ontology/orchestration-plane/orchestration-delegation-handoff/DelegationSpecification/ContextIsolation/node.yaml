      en: The object must not be classified as ContextIsolation or acquire missing conditions from nearby facts.
      ja: この対象を ContextIsolation に分類せず、近接事実から不足条件を補ってはいけません。
    why_valid_or_invalid:
      zh: 场景违反该节点的排除边界：排除消息历史本身、上下文摘要、通用数据分类规则和没有受派方范围的隐私政策。
      en: "The case violates this reviewed exclusion boundary: Excludes message history, context summaries, general data-classification rules, and privacy policies with no delegate scope."
      ja: この例は審査済み除外境界に反します：メッセージ履歴、コンテキスト要約、一般データ分類規則、受任範囲を持たないプライバシーポリシーを除外します。
