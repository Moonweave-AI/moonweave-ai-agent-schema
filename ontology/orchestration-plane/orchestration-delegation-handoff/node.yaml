schema: moonweave.ai/ontology-node/v1
id: orchestration-delegation-handoff
kind: module
status: review
labels:
  zh: 委派与移交
  en: Delegation and handoff
  ja: 委任と引き継ぎ
semantics:
  short_definition:
    zh: 描述两种不同的协作变化：委派把有界工作交给受派方执行，但发起方可以继续监督并保留整体控制；移交则在明确时点把进行中工作的控制权、上下文和后续响应责任转给接收方。工作者选择、契约、生命周期事件和结果都围绕一次具体委派或移交组织。
    en: Describes two distinct collaboration changes. Delegation entrusts bounded work to a delegate while the initiator may continue supervising and retain overall control; handoff transfers control, context, and responsibility for the next response on ongoing work to a recipient at an explicit instant. Worker selection, contracts, lifecycle events, and results are organized around a concrete delegation or handoff occurrence.
    ja: 二つの異なる協働変化を表します。委任は範囲付き作業を受任者へ託し、開始者は監督と全体制御を保持できます。引き継ぎは明示時点に進行中作業の制御・文脈・次応答責任を受領者へ移します。作業者選択・契約・ライフサイクル事象・結果は具体的な委任または引き継ぎの発生を中心に整理します。
  definition:
    zh: 本模块以 CollaborationProcess 和 DelegationSpecification 为两个互不混淆的根。前者承载实际发生的 DelegationProcess、HandoffProcess、选择与分派活动、状态事件和责任转移；后者承载可复用的契约、预算、上下文隔离和委派约束。一次代理工具调用只有在同时出现明确的工作委托或控制转移事实时才引用本模块，不能仅因“调用了另一个 agent”就推导出委派或移交。
    en: "This module has two non-confounded roots: CollaborationProcess carries occurring DelegationProcesses, HandoffProcesses, selection and assignment activities, state events, and responsibility transfers; DelegationSpecification carries reusable contracts, budgets, context-isolation rules, and delegation constraints. An agent-as-tool invocation references this module only when an explicit work-entrustment or control-transfer fact also exists; calling another agent alone does not entail delegation or handoff."
    ja: 本モジュールには混同しない二つの根があります。CollaborationProcess は実際に発生した DelegationProcess・HandoffProcess・選択と割当活動・状態事象・責任移転を担い、DelegationSpecification は再利用可能な契約・予算・文脈隔離・委任制約を担います。agent-as-tool 呼出しは明示的な作業委託または制御移転の事実が同時にある場合だけ本モジュールを参照し、別 agent を呼んだ事実だけでは委任・引き継ぎを導出できません。
  why_needed:
    zh: 使系统能够区分“交付一项子工作”与“把当前控制权交出去”，并完整追溯发起者、接收者、工作范围、约束、选择依据、状态变化和责任转移。
    en: Lets the system distinguish assigning a bounded subtask from transferring current control, while tracing initiator, recipient, work scope, constraints, selection evidence, lifecycle changes, and responsibility transfer.
    ja: 「範囲付き子作業を任せること」と「現在の制御を渡すこと」を区別し、開始者・受領者・作業範囲・制約・選択根拠・状態変化・責任移転を完全に追跡します。
  includes:
    - zh: 协作过程、委派过程、移交过程及其真实组成关系。
      en: Collaboration, delegation, and handoff processes and their genuine composition relations.
      ja: 協働、委任、引き継ぎプロセスと実際の構成関係。
    - zh: 委派规范、契约、预算、授权与上下文隔离，以及实际委派上下文。
      en: Delegation specifications, contracts, budgets, authority, context isolation, and actual delegation context.
      ja: 委任仕様、契約、予算、権限、コンテキスト隔離、実委任コンテキスト。
    - zh: 工作者候选池、可用性评估、能力匹配、选择决定、分派活动及其证据记录。
      en: Worker pool, availability assessment, capability matching, selection decision, assignment activity, and their evidence records.
      ja: 作業者候補プール、可用性評価、能力照合、選択決定、割当活動と証拠記録。
    - zh: 委派状态事件、生命周期状态、委派结果、移交事件、责任转移与委派归属。
      en: Delegation state events, lifecycle states, delegation results, handoff events, responsibility transfer, and delegation ownership.
      ja: 委任状態イベント、ライフサイクル状態、委任結果、引き継ぎイベント、責任移転、委任帰属。
  excludes:
    - zh: 角色类型与长期角色绑定由协同角色本体拥有；本体只引用一次委派中的承担者。
      en: Role types and long-lived role bindings belong to coordination roles; this ontology references their bearers in one delegation.
      ja: 役割型と長期役割バインディングは協調役割本体が所有し、本体は一件の委任での担い手を参照します。
    - zh: 任务与 WorkItem 的规格、分解和分配包由任务规划本体拥有；本体不再创建重复 TaskDistribution 活动。
      en: Task and WorkItem specification, decomposition, and allocation packages belong to task planning; this ontology no longer creates a duplicate TaskDistribution activity.
      ja: Task と WorkItem の仕様、分解、割当パッケージはタスク計画が所有し、本体は重複 TaskDistribution 活動を作りません。
    - zh: 工具选择与工具调用属于工具本体；调用一个代理包装工具不自动构成委派或移交。
      en: Tool selection and invocation belong to the tool ontology; invoking an agent-wrapped tool does not automatically create delegation or handoff.
      ja: ツール選択・呼出しはツール本体に属し、代理ラップツール呼出しは自動的に委任・引き継ぎになりません。
    - zh: 框架、来源、规则文档和字段约束作为节点内说明与证据，不作为业务概念平级节点。
      en: Frameworks, sources, rule documents, and field constraints remain node information and evidence rather than peer business concepts.
      ja: フレームワーク、出典、規則文書、項目制約はノード内情報・証拠であり、業務概念の同列ノードではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 使系统能够区分“交付一项子工作”与“把当前控制权交出去”，并完整追溯发起者、接收者、工作范围、约束、选择依据、状态变化和责任转移。
  en: Lets the system distinguish assigning a bounded subtask from transferring current control, while tracing initiator, recipient, work scope, constraints, selection evidence, lifecycle changes, and responsibility transfer.
  ja: 「範囲付き子作業を任せること」と「現在の制御を渡すこと」を区別し、開始者・受領者・作業範囲・制約・選択根拠・状態変化・責任移転を完全に追跡します。
