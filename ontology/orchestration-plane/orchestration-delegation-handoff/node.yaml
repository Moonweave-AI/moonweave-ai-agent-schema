      overlap_reason:
        zh: WorkerRole 是可复用角色类型；CoordinationOwnershipRecord 在一种 responsibility_type、一个有效 ActorRoleBinding、scope 与有效期下记录单项责任。WorkerAssignment 是一次工作项—承担者绑定活动；DelegationOwnership 是其在一次委派中产生、同时固定控制、最终答复和结果责任承担者的多责任快照。四者不是同一层的前缀变体，DelegationOwnership 也不是 CoordinationOwnershipRecord 的子类。
        en: WorkerRole is a reusable role type. CoordinationOwnershipRecord records one responsibility under one responsibility_type, one effective ActorRoleBinding, scope, and validity interval. WorkerAssignment is one work-item-to-assignee binding activity, while DelegationOwnership is the multi-responsibility snapshot it produces for one delegation, separately fixing control, final-answer, and result-accountability bearers. These are not same-level prefix variants, and DelegationOwnership is not a CoordinationOwnershipRecord subtype.
        ja: WorkerRole は再利用可能な role type です。CoordinationOwnershipRecord は一 responsibility_type・一つの有効 ActorRoleBinding・scope・validity の下で単一責任を記録します。WorkerAssignment は一 work-item-to-assignee binding activity、DelegationOwnership は一 delegation でそれが生成し control・final-answer・result-accountability の担い手を個別に固定する multi-responsibility snapshot です。四者は同一階層の prefix variant ではなく、DelegationOwnership は CoordinationOwnershipRecord の下位型でもありません。
