schema: moonweave.ai/ontology-node/v1
id: orchestration-delegation-handoff
kind: module
labels:
  zh: 委派与移交
  en: Delegation and handoff
  ja: 委任と引き継ぎ
semantics:
  short_definition:
    zh: 区分“交付有界子工作”与“移交进行中控制权”，并记录 OpenAI Agents SDK handoff 与 A2A agent-to-agent 交换中的契约、选择、状态与责任转移。
    en: Distinguishes entrusting bounded subwork from transferring ongoing control, and records contracts, selection, state, and responsibility transfer in OpenAI Agents SDK handoffs and A2A agent-to-agent exchanges.
    ja: 範囲付き子作業の委託と進行中制御の移転を区別し、OpenAI Agents SDK handoff と A2A agent-to-agent 交換における契約・選択・状態・責任移転を記録します。
  definition:
    zh: orchestration-delegation-handoff 以 CollaborationProcess 与 DelegationSpecification 为两个互不混淆的根。CollaborationProcess 承载已发生的 DelegationProcess、HandoffProcess、工作者选择、分派活动、状态事件与责任转移；DelegationSpecification 承载可复用的契约、预算、上下文隔离与委派约束。A2A 原生类型（AgentCard、SendMessageRequest、Task、TaskStatus、TaskState、Message、Part、Artifact）仅在实际 A2A JSON-RPC 载荷存在时使用；OpenAI handoff 在接收 Agent 接管会话处理时属于本模块，而不是普通 ToolCall。一次 agent-as-tool 调用只有在同时出现明确工作委托或控制转移事实时才引用本模块。
    en: orchestration-delegation-handoff has two non-confounded roots. CollaborationProcess carries occurred DelegationProcesses, HandoffProcesses, worker selection, assignment activities, state events, and responsibility transfers; DelegationSpecification carries reusable contracts, budgets, context isolation, and delegation constraints. A2A-native types (AgentCard, SendMessageRequest, Task, TaskStatus, TaskState, Message, Part, Artifact) are used only when a real A2A JSON-RPC payload exists; an OpenAI handoff belongs here when the receiving Agent takes over conversation handling, not as an ordinary ToolCall. An agent-as-tool invocation references this module only when an explicit work-entrustment or control-transfer fact also exists.
    ja: orchestration-delegation-handoff には混同しない二つの根があります。CollaborationProcess は発生した DelegationProcess・HandoffProcess・worker selection・assignment activity・状態 event・責任移転を担い、DelegationSpecification は再利用可能な契約・予算・context isolation・委任制約を担います。A2A ネイティブ型は実際の A2A JSON-RPC payload がある場合のみ使用し、OpenAI handoff は受信 Agent が会話処理を引き継ぐ場合に本モジュールに属します。
  why_needed:
    zh: 多智能体系统必须区分监督式委派与会话/任务控制移交，并能追溯 A2A Task 生命周期（submitted→working→input-required→completed/failed/canceled）与 handoff 接收者、输入范围和责任边界。
    en: Multi-agent systems must distinguish supervised delegation from conversation or task control handoff, and trace A2A Task lifecycle (submitted→working→input-required→completed/failed/canceled) together with handoff recipients, input scope, and responsibility boundaries.
    ja: マルチエージェントシステムは監督付き委任と会話／task 制御 handoff を区別し、A2A Task lifecycle と handoff recipient・入力範囲・責任境界を追跡できなければなりません。
  includes:
    - zh: CollaborationProcess、DelegationProcess、HandoffProcess、Handoff、ResponsibilityTransfer 及工作者选择链。
      en: CollaborationProcess, DelegationProcess, HandoffProcess, Handoff, ResponsibilityTransfer, and the worker-selection chain.
      ja: CollaborationProcess、DelegationProcess、HandoffProcess、Handoff、ResponsibilityTransfer、worker selection chain。
    - zh: DelegationSpecification、DelegationContract、DelegatedAuthority、DelegationBudget、ContextIsolation。
      en: DelegationSpecification, DelegationContract, DelegatedAuthority, DelegationBudget, and ContextIsolation.
      ja: DelegationSpecification、DelegationContract、DelegatedAuthority、DelegationBudget、ContextIsolation。
    - zh: A2A AgentCard、AgentCapabilities、SendMessageRequest/Response、Task、TaskStatus、TaskState、Message、Part、Artifact 及推送/流式事件。
      en: A2A AgentCard, AgentCapabilities, SendMessageRequest/Response, Task, TaskStatus, TaskState, Message, Part, Artifact, and push/stream events.
      ja: A2A AgentCard、AgentCapabilities、SendMessageRequest/Response、Task、TaskStatus、TaskState、Message、Part、Artifact、push/stream event。
  excludes:
    - zh: 协调角色类型与 ActorRoleBinding（actors-delegation）；TaskPlan/WorkItem 分解（task-planning）；工具调用与副作用（tool 域）。
      en: Coordination role types and ActorRoleBindings (actors-delegation); TaskPlan/WorkItem decomposition (task-planning); tool invocations and side effects (tool domain).
      ja: 協調 role 型と ActorRoleBinding、TaskPlan/WorkItem 分解、tool invocation と副作用。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: OpenAI Agents SDK 通过 handoffs 或 handoff() 指定接收 Agent、输入 filter 与控制转移；A2A 通过 JSON-RPC SendMessage 携带 SendMessageRequest 并返回 Task 或 Message，TaskStatus.state 遵循 submitted/working/input-required/completed/failed/canceled。适配器在 handoff 或 A2A 边界创建本地 CollaborationProcess 记录，封存 initiator、recipient、scope_ref、contract_ref、task_id 或 handoff_id，而不把 SDK Agent 或 A2A Task 重命名为 Moonweave 过程类型。
    en: The OpenAI Agents SDK specifies receiving Agent, input filter, and control transfer through handoffs or handoff(); A2A carries SendMessageRequest via JSON-RPC SendMessage and returns Task or Message, with TaskStatus.state following submitted/working/input-required/completed/failed/canceled. Adapters create local CollaborationProcess records at handoff or A2A boundaries, sealing initiator, recipient, scope_ref, contract_ref, task_id, or handoff_id without renaming SDK Agents or A2A Tasks as Moonweave process types.
    ja: OpenAI Agents SDK は handoffs/handoff() で受信 Agent・入力 filter・制御移転を指定し、A2A は JSON-RPC SendMessage で SendMessageRequest を送り Task/Message を返します。adapter は handoff/A2A 境界で initiator、recipient、scope_ref、contract_ref、task_id/handoff_id を固定したローカル CollaborationProcess 記録を作成します。
  typical_input:
    - description: OpenAI Agents SDK handoff to specialist Agent
      format: |-
        triage_agent = Agent(name="Triage", handoffs=[billing_agent, refund_agent])
        result = await Runner.run(triage_agent, "I need a refund for order 8821")
    - description: A2A SendMessage creating a remote Task
      format: |-
        {"jsonrpc":"2.0","method":"SendMessage","params":{"message":{"role":"ROLE_USER","parts":[{"text":"Analyze PR #42"}]}}}
  typical_output:
    - description: Local delegation or handoff occurrence with A2A Task binding
      format: |-
        {"handoff_id":"ho-91","recipient_agent_ref":"agent:billing@v3","scope_ref":"session:8821","a2a_task_id":"task-7f2a","task_state":"working","control_transfer":"conversation"}
  reference_implementations:
    - name: OpenAI Agents SDK handoffs
      url: https://openai.github.io/openai-agents-python/handoffs/
      description: Documents handoff configuration, input filters, and control transfer to receiving Agents.
    - name: A2A Protocol specification
      url: https://google.github.io/A2A/specification/
      description: Documents AgentCard, SendMessage, Task lifecycle, TaskStatus, Message, Part, and Artifact.
  source_claims:
    - claim-orchestration-delegation-handoff-module
    - claim-orchestration-delegation-handoff-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识委派与移交模块。
        en: Stably identifies the delegation and handoff module.
        ja: 委任と引き継ぎモジュールを安定して識別します。
      allowed_values: [orchestration-delegation-handoff]
      example_value: orchestration-delegation-handoff
      source_claims: [claim-orchestration-delegation-handoff-module]
    - id: process_roots
      labels:
        zh: 过程根概念
        en: process root concepts
        ja: プロセス根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出记录已发生委派或移交的过程根。
        en: Lists roots that record occurred delegation or handoff.
        ja: 発生した委任または handoff を記録する根を列挙します。
      example_value: '["CollaborationProcess","DelegationProcess","HandoffProcess"]'
      source_claims: [claim-orchestration-delegation-handoff-module]
    - id: specification_roots
      labels:
        zh: 规范根概念
        en: specification root concepts
        ja: 仕様根概念
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出可复用委派规范根，不得与过程根混为 is_a。
        en: Lists reusable delegation specification roots that must not is_a-merge with process roots.
        ja: 再利用可能な委任仕様根を列挙し、プロセス根と is_a 混同しない。
      example_value: '["DelegationSpecification"]'
      source_claims: [claim-orchestration-delegation-handoff-boundary]
  constraints:
    - id: orchestration-delegation-handoff-spec-process-separation
      expression: DelegationSpecification and CollaborationProcess connect only through applies, governs, or realizes relations; never through is_a between specification and process families.
      explanation:
        zh: 契约描述可怎样委派；过程证明某次委派或移交实际发生。混为 is_a 会把设计稿误报为已执行事实。
        en: Contracts describe how delegation may occur; processes prove a delegation or handoff actually happened. is_a between them would misreport design as executed fact.
        ja: 契約は委任の可能形を示し、プロセスは実際の発生を証明します。is_a 混同は設計を実行済み事実と誤報します。
      source_claims: [claim-orchestration-delegation-handoff-boundary]
  required_relations: []
examples:
  - id: orchestration-delegation-handoff-example-positive-a2a-task
    labels:
      zh: orchestration-delegation-handoff positive
      en: orchestration-delegation-handoff positive
      ja: orchestration-delegation-handoff positive
    descriptions:
      zh: AutoGen (Wu et al., 2023, Microsoft) GroupChat 映射 orchestration-delegation-handoff：GroupChat(agents=[assistant, coder, critic], messages=[], max_round=12) + GroupChatManager(groupchat=groupchat, llm_config=llm_config) 多 agent 协作对话编排。
      en: AutoGen (Wu et al., 2023, Microsoft) GroupChat maps orchestration-delegation-handoff: GroupChat(agents=[assistant, coder, critic], max_round=12) + GroupChatManager(groupchat, llm_config) for multi-agent conversational orchestration.
      ja: AutoGen (Wu et al., 2023) GroupChat+GroupChatManager が orchestration-delegation-handoff 多 agent 協調に写像。
    field_values: {module_id: orchestration-delegation-handoff, delegation_process_id: deleg-pr-42, a2a_task_id: task-7f2a, task_state: working, contract_ref: "review-delegation@2"}

    related_node_ids:
      - DelegationProcess
      - A2ATask
      - DelegationContract
    related_relation_ids:
      - DelegationProcess-governs-DelegationContract
    source_claims:
      - claim-orchestration-delegation-handoff-module

  - id: orchestration-delegation-handoff-example-counterexample-tool-only
    labels:
      zh: orchestration-delegation-handoff counterexample
      en: orchestration-delegation-handoff counterexample
      ja: orchestration-delegation-handoff counterexample
    descriptions:
      zh: 无 expected_output 与 agent 绑定的 ad-hoc 脚本不能作为 CrewAI 式 orchestration-delegation-handoff TaskAssignment。
      en: Ad-hoc scripts without expected_output and agent binding cannot serve as CrewAI-style orchestration-delegation-handoff TaskAssignment.
      ja: expected_output/agent 欠落 ad-hoc は CrewAI 式 orchestration-delegation-handoff ではない。
    field_values: {module_id: orchestration-delegation-handoff, handoff_id: null, control_transfer: null}

    related_node_ids:
      - Handoff
    related_relation_ids: []
    source_claims:
      - claim-orchestration-delegation-handoff-boundary

  - id: orchestration-delegation-handoff-example-boundary-handoff-vs-delegation
    labels:
      zh: orchestration-delegation-handoff boundary
      en: orchestration-delegation-handoff boundary
      ja: orchestration-delegation-handoff boundary
    descriptions:
      zh: A2A wire Task.status.state 是协议运行时状态，不是 orchestration-delegation-handoff 内部规划规约；RemoteDelegation 事件与 DelegationContract 应区分。
      en: A2A wire Task.status.state is protocol runtime status, not orchestration-delegation-handoff internal planning spec; separate RemoteDelegation events from DelegationContract.
      ja: A2A Task.status.state は runtime protocol status で orchestration-delegation-handoff 内部 spec ではない。
    field_values: {module_id: orchestration-delegation-handoff, handoff_id: ho-billing-12, delegation_process_id: deleg-research-8, control_transfer: conversation}

    related_node_ids:
      - Handoff
      - DelegationProcess
    related_relation_ids: []
    source_claims:
      - claim-orchestration-delegation-handoff-module

  - id: orchestration-delegation-handoff-example-instance-openai-handoff
    labels:
      zh: orchestration-delegation-handoff instance
      en: orchestration-delegation-handoff instance
      ja: orchestration-delegation-handoff instance
    descriptions:
      zh: MRKL 实例：query "What is 15% of 847?" → router→calculator module→847*0.15=127.05 → 映射 orchestration-delegation-handoff 路由决策。
      en: MRKL instance: query "What is 15% of 847?" → router→calculator→847*0.15=127.05 → maps to orchestration-delegation-handoff routing decision.
      ja: MRKL 实例 router→calculator→127.05 が orchestration-delegation-handoff routing decision に写像。
    field_values: {module_id: orchestration-delegation-handoff, handoff_id: ho-refund-8821, recipient_agent_ref: "agent:refund@v1", control_transfer: conversation}

    related_node_ids:
      - HandoffProcess
      - Handoff
    related_relation_ids:
      - HandoffProcess-includes-Handoff
    source_claims:
      - claim-orchestration-delegation-handoff-module

