    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-orchestration-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐根反例复核：CollaborationProcess 以参与者、共享工作目标和责任交换识别；一次仅转移同一会话下一步控制的 HandoffProcess 可以形成协作过程，却不等于存在一份 DelegationSpecification。DelegationSpecification 则可在任何运行前独立发布版本化契约、预算、隔离或权限条款，即使尚无 CollaborationProcess。
            en: "Root-by-root counterexample review: CollaborationProcess is identified by participants, a shared work objective, and exchanged responsibility; a HandoffProcess that only transfers next-step control in the same conversation can be a collaboration process without constituting a DelegationSpecification. Conversely, a versioned contract, budget, isolation rule, or authority term can exist as DelegationSpecification before any CollaborationProcess runs."
            ja: 根ごとの反証確認：CollaborationProcess は participant・shared work objective・responsibility exchange で識別します。同じ会話の next-step control だけを移す HandoffProcess は collaboration process になり得ますが DelegationSpecification の存在を意味しません。逆に versioned contract・budget・isolation・authority term は CollaborationProcess 実行前から DelegationSpecification として存在できます。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体反例确认只保留 CollaborationProcess 与 DelegationSpecification 两个独立根：前者是有开始、参与者与状态变化的 activity，后者是可复用、可未被采用的 specification。DelegationProcess-governed_by-DelegationContract 只连接 DelegationSpecification 的一个子类，不能把所有协作过程或所有规格误挂到对方；其余节点沿已核实的 is_a、phase_of、has_event、has_context、has_result_record 等唯一主父连接。
            en: "Ontology counterexamples retain only CollaborationProcess and DelegationSpecification as independent roots: the former is an activity with start, participants, and state change, whereas the latter is a reusable specification that may never be adopted. DelegationProcess-governed_by-DelegationContract reaches only one DelegationSpecification subtype and cannot place every collaboration process or every specification under the other root; all remaining nodes use their reviewed single parent through is_a, phase_of, has_event, has_context, has_result_record, and related facts."
            ja: ontology の反証により独立根は CollaborationProcess と DelegationSpecification だけです。前者は start・participant・state change を持つ activity、後者は採用されない場合もある再利用可能 specification です。DelegationProcess-governed_by-DelegationContract は DelegationSpecification の一 subtype だけを結ぶため、全 collaboration process または全 specification を相手の root 配下に置けません。残りは確認済み is_a・phase_of・has_event・has_context・has_result_record 等の単一主親へ接続します。
        - reviewer_id: moonweave-trilingual-terminology-reviewer
          reviewer_role: schema
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 三语复核保持 CollaborationProcess 的“发生过程”与 DelegationSpecification 的“可复用条款”差异，并保留“同一公告主题订阅不构成协作过程”和“框架文档不是一次委派规格”两组边界反例；不以相似名称制造 is_a。
            en: Trilingual review preserves the difference between an occurring CollaborationProcess and reusable DelegationSpecification terms, together with the counterexamples “subscribing to one announcement topic is not a collaboration process” and “framework documentation is not a delegation specification for one delegation”; similar wording never creates is_a.
            ja: 三言語審査は occurring CollaborationProcess と reusable DelegationSpecification term の差を保ち、「同じ announcement topic の購読は collaboration process ではない」「framework documentation は一件の delegation specification ではない」という境界反証を保持します。名称類似から is_a を作りません。
