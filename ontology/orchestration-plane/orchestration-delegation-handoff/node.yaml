      overlap_reason:
        zh: 本体拥有责任承担与控制移转；工具调用本体拥有一次可调用能力执行。将代理包装为工具不会自动产生受派责任或控制移交。
        en: This ontology owns responsibility undertaking and control transfer; tool invocation owns execution of a callable capability. Wrapping an agent as a tool does not automatically create delegated responsibility or handoff.
        ja: 本体は責任引受けと制御移転を所有し、ツール呼出しは呼出可能能力実行を所有します。代理をツール化しても委任責任や引き継ぎは自動発生しません。
