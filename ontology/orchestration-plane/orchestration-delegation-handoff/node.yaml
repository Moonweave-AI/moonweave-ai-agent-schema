    relevance: Documents handoff configuration and control transfer to receiving Agents.
  - id: a2a-protocol-spec
    title: A2A Protocol specification
    url: https://google.github.io/A2A/specification/
    source_type: standard
    relevance: Documents AgentCard, SendMessage, Task lifecycle, TaskStatus, Message, Part, and Artifact.
source_claims:
  - id: claim-orchestration-delegation-handoff-module
    source: openai-agents-handoffs
    supports: OpenAI Agents SDK handoffs transfer conversation handling to a receiving Agent through an explicit handoff interface distinct from ordinary tool results.
    locator: Handoffs documentation
    evidence_kind: design-inference
    confidence: high
  - id: claim-orchestration-delegation-handoff-boundary
    source: a2a-protocol-spec
    supports: A2A defines Task lifecycle states and agent-to-agent messaging as protocol facts separate from reusable delegation contracts.
    locator: Task, TaskStatus, SendMessage
    evidence_kind: design-inference
    confidence: high
