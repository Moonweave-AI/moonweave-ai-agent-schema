examples:
  - id: orchestration-delegation-handoff-cq-process-state-v3-example-positive
    kind: positive
    labels:
      zh: 第二个已接受事件使委派进入接受状态
      en: Second accepted event makes the delegation accepted
      ja: 二番目の accepted event が委任を受理状態にする
    scenario_id: null
    descriptions:
      zh: delegation-17 依次记录 sequence 1 的 initiated 与 sequence 2 的 accepted；两条事件均属于同一过程，未被撤销或替代，因此查询时的有效状态是 AcceptancePhase。
      en: delegation-17 records initiated at sequence 1 and accepted at sequence 2; both events belong to the same process and neither is revoked or superseded, so AcceptancePhase is effective at query time.
      ja: delegation-17 は sequence 1 の initiated と sequence 2 の accepted を同一 process に記録し、取消しや supersede がないため、照会時の有効状態は AcceptancePhase です。
    field_values:
      delegation_process_id: delegation-17
      event_refs:
        - delegation-17:event-1
        - delegation-17:event-2
      sequence_indices:
        - 1
        - 2
      phase_refs:
        - InitiationPhase
        - AcceptancePhase
      effective_times:
        - 2026-07-16T08:02:00Z
        - 2026-07-16T08:02:14Z
      superseded_flags:
        - true
        - false
      query_time: 2026-07-16T08:03:00Z
      effective_phase_ref: AcceptancePhase
    related_node_ids:
      - DelegationProcess
      - DelegationEvent
      - DelegationPhase
    related_relation_ids:
      - DelegationProcess-has_event-DelegationEvent
      - DelegationEvent-records_phase-DelegationPhase
      - DelegationPhase-phase_of-DelegationProcess
    expected_result:
      zh: 按 sequence_index 返回 event-2 及 AcceptancePhase，并同时保留 event-1 作为已被后续状态取代的历史事件。
      en: Return event-2 and AcceptancePhase by sequence_index while retaining event-1 as the historical event superseded by the later state.
      ja: sequence_index により event-2 と AcceptancePhase を返し、event-1 は後続状態に置換された履歴 event として保持します。
    why_valid_or_invalid:
      zh: A2A 将 task status、state、timestamp 和状态更新事件分开记录；本例也由过程归属、顺序、阶段映射与生效时间共同确定当前状态。
      en: A2A separates task status, state, timestamp, and status-update events; here process ownership, order, phase mapping, and effective time jointly determine current state.
      ja: A2A が task status、state、timestamp、status-update event を分けるのと同様、process 所属、順序、phase mapping、有効時刻で現在状態を決定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-delegation-handoff-002
  - id: orchestration-delegation-handoff-cq-process-state-v3-example-counter
    kind: counterexample
    labels:
      zh: 邻近运行的同序号事件造成伪接受状态
      en: Same-sequence event from a neighboring run creates a false accepted state
      ja: 近接 run の同 sequence event が偽の受理状態を作る
    scenario_id: null
    descriptions:
      zh: 查询把 delegation-16:event-2 的 accepted 与 delegation-17:event-1 的 initiated 按时间邻近合并；accepted 事件的 process_ref 明确不是 delegation-17。
      en: The candidate merges delegation-16:event-2 accepted with delegation-17:event-1 initiated because timestamps are close, even though the accepted event explicitly names delegation-16 as its process_ref.
      ja: 候補は時刻が近いという理由で delegation-16:event-2 accepted を delegation-17:event-1 initiated と結合しますが、accepted event の process_ref は delegation-16 です。
    field_values:
      queried_process_id: delegation-17
      local_event_ref: delegation-17:event-1
      local_event_sequence: 1
      foreign_event_ref: delegation-16:event-2
      foreign_event_process_ref: delegation-16
      foreign_event_phase_ref: AcceptancePhase
      timestamp_gap_ms: 180
      same_process: false
      candidate_effective_phase_ref: AcceptancePhase
    related_node_ids:
      - DelegationProcess
      - DelegationEvent
      - DelegationPhase
    related_relation_ids:
      - DelegationProcess-has_event-DelegationEvent
      - DelegationEvent-records_phase-DelegationPhase
      - DelegationPhase-phase_of-DelegationProcess
    expected_result:
      zh: 排除 delegation-16:event-2，只返回 delegation-17 的 InitiationPhase；若没有后续本过程事件，不得宣称已接受。
      en: Exclude delegation-16:event-2 and return only InitiationPhase for delegation-17; without a later event owned by that process, accepted must not be asserted.
      ja: delegation-16:event-2 を除外し delegation-17 の InitiationPhase のみを返し、同 process の後続 event がなければ accepted を断言しません。
    why_valid_or_invalid:
      zh: A2A 状态更新携带 taskId/contextId，说明时间邻近不等于同一生命周期；跨过程拼接事件会破坏状态归属和顺序。
      en: A2A status updates carry task and context identifiers, so temporal proximity is not lifecycle identity; joining events across processes corrupts both ownership and order.
      ja: A2A status update は taskId/contextId を持つため、時刻の近さは lifecycle identity ではなく、process を跨ぐ結合は所属と順序を壊します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-orchestration-delegation-handoff-003
