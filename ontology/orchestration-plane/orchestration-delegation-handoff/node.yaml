        zh: 先判断对象是角色定义、单责任记录、分派活动还是多责任快照：role identity 识别 WorkerRole；responsibility_type、holder binding、scope 与有效期识别 CoordinationOwnershipRecord；work item、受派者与生效发生识别 WorkerAssignment；ownership_record_id 及三类责任承担者识别 DelegationOwnership。
        en: "First determine whether the object is a role definition, single-responsibility record, assignment activity, or multi-responsibility snapshot: role identity identifies WorkerRole; responsibility_type, holder binding, scope, and validity identify CoordinationOwnershipRecord; work item, assignee, and effective occurrence identify WorkerAssignment; ownership_record_id and the three responsibility bearers identify DelegationOwnership."
        ja: 対象が role definition・single-responsibility record・assignment activity・multi-responsibility snapshot のどれかを先に判定します。role identity は WorkerRole、responsibility_type・holder binding・scope・validity は CoordinationOwnershipRecord、work item・assignee・effective occurrence は WorkerAssignment、ownership_record_id と三責任の担い手は DelegationOwnership を識別します。
