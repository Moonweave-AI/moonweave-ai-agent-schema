schema: moonweave.ai/ontology-node/v1
id: orchestration-delegation-handoff
kind: module
labels:
  zh: 委派与移交
  en: Delegation and handoff
  ja: 委任と引き継ぎ
semantics:
  short_definition:
    zh: 委派与移交描述一次协作中工作或控制如何从一方转给另一方。
    en: Delegation and handoff describe how work or control moves from one party to another during collaboration.
    ja: 委任と引き継ぎは、協働の中で作業または制御が一方から他方へ移ることを表します。
  definition:
    zh: 本模块以 DelegationSpecification 与 CollaborationProcess 为两个根：前者承载可复用的 DelegationContract、DelegationBudget、ContextIsolation 与 DelegatedAuthority；后者承载实际发生的 DelegationProcess、HandoffProcess、WorkerSelectionProcess、WorkerAssignment、DelegationEvent 与 ResponsibilityTransfer。委派保留发起方监督权并交付有界子工作；移交在明确时点把进行中工作的控制权、上下文与后续响应责任转给接收方。一次 agent-as-tool 调用只有在同时存在明确的工作委托或控制转移事实时才引用本模块。
    en: "This module has two roots: DelegationSpecification carries reusable DelegationContract, DelegationBudget, ContextIsolation, and DelegatedAuthority; CollaborationProcess carries occurring DelegationProcess, HandoffProcess, WorkerSelectionProcess, WorkerAssignment, DelegationEvent, and ResponsibilityTransfer. Delegation entrusts bounded sub-work while the initiator may retain supervision; handoff transfers control, context, and next-response responsibility at an explicit instant. An agent-as-tool invocation references this module only when an explicit work-entrustment or control-transfer fact also exists."
    ja: 本モジュールは DelegationSpecification と CollaborationProcess の二根を持ちます。前者は再利用 DelegationContract・DelegationBudget・ContextIsolation・DelegatedAuthority、後者は DelegationProcess・HandoffProcess・WorkerSelectionProcess・WorkerAssignment・DelegationEvent・ResponsibilityTransfer の発生を担います。委任は範囲付き子作業を託し開始者は監督を保持でき、引き継ぎは明示時点に制御・文脈・次応答責任を移します。agent-as-tool 呼出しは明示的委託または制御移転事実がある場合のみ本モジュールを参照します。
  why_needed:
    zh: 团队需要区分“把子任务交给别人做”和“把当前对话控制权交出去”，并能追溯选了谁、依据什么、何时接受或完成。
    en: Teams need to distinguish assigning a subtask from transferring current control, and to trace who was chosen, on what evidence, and when acceptance or completion occurred.
    ja: チームは子タスク委任と現在の制御移転を区別し、誰を選び、どの根拠で、いつ受理または完了したかを追跡する必要があります。
  includes:
    - zh: 可复用委派规范：DelegationContract、DelegationBudget、ContextIsolation、DelegatedAuthority 及其版本引用。
      en: "Reusable delegation specifications: DelegationContract, DelegationBudget, ContextIsolation, DelegatedAuthority, and their version references."
      ja: 再利用委任仕様：DelegationContract、DelegationBudget、ContextIsolation、DelegatedAuthority と版参照。
    - zh: 实际协作过程：DelegationProcess、HandoffProcess、工作者选择、分派、状态事件、责任转移与委派结果。
      en: "Operational collaboration processes: DelegationProcess, HandoffProcess, worker selection, assignment, state events, responsibility transfer, and delegation results."
      ja: 実行協働プロセス：DelegationProcess、HandoffProcess、作業者選択、割当、状態イベント、責任移転、委任結果。
  excludes:
    - zh: "CoordinationRole 与 ActorRoleBinding（owner: orchestration-actors-delegation）；本模块只引用一次委派中的承担者。"
      en: "CoordinationRole and ActorRoleBinding (owner: orchestration-actors-delegation); this module references bearers in one delegation only."
      ja: "CoordinationRole と ActorRoleBinding（owner: orchestration-actors-delegation）。本モジュールは一回の委任の担い手のみ参照します。"
    - zh: "TaskPlan、TaskStep 与 WorkItem 分解（owner: orchestration-task-planning）；委派引用工作范围，不复制任务规格。"
      en: "TaskPlan, TaskStep, and WorkItem decomposition (owner: orchestration-task-planning); delegation references work scope without copying task specifications."
      ja: "TaskPlan・TaskStep・WorkItem 分解（owner: orchestration-task-planning）。委任は作業範囲を参照し task 仕様を複製しません。"
    - zh: "工具选择与 AgentAsToolInvocation（owner: tool-invocation-execution）；调用代理包装工具不自动构成委派或移交。"
      en: "Tool selection and AgentAsToolInvocation (owner: tool-invocation-execution); invoking an agent-wrapped tool does not automatically create delegation or handoff."
      ja: "ツール選択と AgentAsToolInvocation（owner: tool-invocation-execution）。代理ラップツール呼出しは自動的に委任・引き継ぎになりません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI Agents SDK 的 handoff() 与 transfer_to_* 工具、A2A tasks/send 的 TaskSendParams 远程委派、LangGraph Command(goto="agent") 的图内控制转移，以及 CrewAI @task 与 Process.hierarchical 的 manager 委派。handoffs 列表与 DelegationContract 是规范；一次 transfer_to_*、tasks/send、Command(goto=...) 或 manager 分派是发生事实。A2A Task 状态事件提供委派生命周期证据，但不替代 WorkerSelectionDecisionActivity 的选择依据记录。
    en: "Integrations should map OpenAI Agents SDK handoff() and transfer_to_* tools, A2A tasks/send TaskSendParams for remote delegation, LangGraph Command(goto=\"agent\") for in-graph control transfer, and CrewAI @task plus Process.hierarchical manager delegation separately. A handoffs list and DelegationContract are specifications; one transfer_to_* call, tasks/send, Command(goto=...), or manager assignment is an occurrence. A2A Task status events provide delegation lifecycle evidence but do not replace WorkerSelectionDecisionActivity selection evidence."
    ja: 統合では OpenAI Agents SDK handoff() と transfer_to_*、A2A tasks/send TaskSendParams による remote 委任、LangGraph Command(goto=\"agent\") による graph 内制御移転、CrewAI @task と Process.hierarchical manager 委任を個別に写像します。handoffs リストと DelegationContract は仕様、一回の transfer_to_*・tasks/send・Command(goto=...)・manager 割当は発生事実です。A2A Task 状態イベントは lifecycle 証拠を提供しますが WorkerSelectionDecisionActivity の選択根拠記録を代替しません。
  typical_input:
    - description: OpenAI Agents SDK handoff() registering a target agent and transfer tool.
      format: |
        from agents import Agent, handoff

        billing_agent = Agent(name="Billing", instructions="Handle billing questions.")
        triage_agent = Agent(
            name="Triage",
            handoffs=[handoff(billing_agent)],
        )
        # Runtime: transfer_to_billing_agent invoked in session loop
      source_claims: [claim-orchestration-delegation-handoff-openai]
    - description: A2A tasks/send with TaskSendParams delegating work to a remote agent.
      format: |
        POST /a2a/v1/tasks/send
        {
          "message": {"role": "user", "parts": [{"kind": "text", "text": "Process refund for order 884"}]},
          "configuration": {"blocking": false, "acceptedOutputModes": ["text/plain"]}
        }
      source_claims: [claim-orchestration-delegation-handoff-a2a]
    - description: LangGraph Command routing control to another agent node.
      format: |
        from langgraph.types import Command

        def route_to_specialist(state):
            return Command(goto="billing_agent", update={"handoff_reason": "billing_intent"})

        builder.add_conditional_edges("triage", route_to_specialist)
      source_claims: [claim-orchestration-delegation-handoff-langgraph]
    - description: CrewAI hierarchical Process with manager delegating a @task to a worker agent.
      format: |
        from crewai import Agent, Crew, Process, Task

        researcher = Agent(role="Researcher", goal="Gather sources", tools=[search_tool])
        manager = Agent(role="Manager", goal="Coordinate research", allow_delegation=True)
        research_task = Task(description="Find benchmark data", agent=researcher)
        crew = Crew(agents=[manager, researcher], tasks=[research_task], process=Process.hierarchical)
      source_claims: [claim-orchestration-delegation-handoff-crewai]
  typical_output:
    - description: Moonweave-local delegation occurrence separating contract, process, assignment, and lifecycle events.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "delegation_contract_ref": "contract-refund@3",
          "delegation_process_id": "delegation-884",
          "initiator_ref": "agent-triage-7",
          "assignee_ref": "agent-billing-2",
          "worker_selection_decision_id": "selection-884",
          "effective_phase_ref": "AcceptancePhase",
          "handoff_id": null
        }
      source_claims: [claim-orchestration-delegation-handoff-design]
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      description: handoff(), transfer_to_* tools, session-scoped control transfer.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: tasks/send, TaskSendParams, Task status lifecycle for remote delegation.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Command(goto=...), conditional_edges for in-graph agent handoff.
    - name: CrewAI
      url: https://docs.crewai.com
      description: Agent, Task, Process.hierarchical manager delegation via @task.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 委派与移交模块的稳定标识，不是某次 DelegationProcess 或 Handoff 的标识。
        en: Stable identifier of the delegation-and-handoff module, not a DelegationProcess or Handoff identifier.
        ja: 委任と引き継ぎモジュールの安定識別子であり、DelegationProcess や Handoff の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^orchestration-delegation-handoff$'
      example_value: orchestration-delegation-handoff
      allowed_values: []
      source_claims: [claim-orchestration-delegation-handoff-design]
    - id: specification_occurrence_boundary
      labels: {zh: 规范/发生边界, en: Specification/occurrence boundary, ja: 仕様／発生境界}
      definitions:
        zh: 声明 DelegationContract/DelegationBudget 为可复用规范，DelegationProcess/HandoffProcess 为一次运行发生事实。
        en: States that DelegationContract and DelegationBudget are reusable specifications while DelegationProcess and HandoffProcess are run occurrences.
        ja: DelegationContract／DelegationBudget は再利用仕様、DelegationProcess／HandoffProcess は一回の実行発生事実であることを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: spec-vs-process
      allowed_values: [spec-vs-process]
      source_claims: [claim-orchestration-delegation-handoff-design]
  constraints:
    - id: delegation-requires-bounded-work-or-control-transfer
      severity: error
      expression_language: plain
      expression: A DelegationProcess must record bounded work scope or an explicit ResponsibilityTransfer; an agent-as-tool call alone is insufficient.
      explanation:
        zh: 调用另一个 agent 不等于委派或移交。
        en: Calling another agent is not delegation or handoff by itself.
        ja: 別 agent の呼出しだけでは委任・引き継ぎになりません。
      source_claims: [claim-orchestration-delegation-handoff-openai, claim-orchestration-delegation-handoff-design]
    - id: handoff-transfers-control-not-subtask-only
      severity: error
      expression_language: plain
      expression: A HandoffProcess must record ResponsibilityTransfer with control, context, and next-response ownership; WorkerAssignment alone does not satisfy handoff semantics.
      explanation:
        zh: 分派子任务与移交控制权是不同发生类型。
        en: Assigning a subtask and transferring control are different occurrence types.
        ja: 子タスク割当と制御移転は異なる発生型です。
      source_claims: [claim-orchestration-delegation-handoff-design]
    - id: lifecycle-events-belong-to-process
      severity: warning
      expression_language: plain
      expression: DelegationEvent must reference the owning DelegationProcess via process_ref; events from neighboring runs must not determine effective phase.
      explanation:
        zh: 状态归属取决于过程引用，不是时间邻近。
        en: State ownership depends on process reference, not temporal proximity.
        ja: 状態所属は process 参照に依存し、時間的近接ではありません。
      source_claims: [claim-orchestration-delegation-handoff-a2a]
  required_relations:
    - id: delegation-module-organizes-delegation-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: DelegationSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条可复用 DelegationSpecification 规范链。
        en: The module organizes at least one reusable DelegationSpecification chain.
        ja: モジュールは少なくとも一つの再利用 DelegationSpecification 連鎖を組織します。
      source_claims: [claim-orchestration-delegation-handoff-design]
    - id: delegation-module-records-collaboration-process
      direction: outgoing
      predicate: records
      target_concept_id: CollaborationProcess
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块通过 CollaborationProcess 记录实际委派或移交发生，而不把 Contract 本身当作过程。
        en: The module records actual delegation or handoff occurrences through CollaborationProcess rather than treating Contract itself as a process.
        ja: モジュールは Contract 自体を process とせず、CollaborationProcess を通じ実際の委任・引き継ぎ発生を記録します。
      source_claims: [claim-orchestration-delegation-handoff-design]
examples:
  - id: orchestration-delegation-handoff-example-openai-handoff
    labels:
      zh: OpenAI Agents SDK handoff 移交
      en: OpenAI Agents SDK handoff transfer
      ja: OpenAI Agents SDK handoff 引き継ぎ
    descriptions:
      zh: triage_agent 在 session-support-042 调用 transfer_to_billing_agent；HandoffProcess handoff-042 记录 ResponsibilityTransfer，接收方 billing_agent 获得后续响应责任，发起方不再持有当前会话控制权。
      en: triage_agent invokes transfer_to_billing_agent in session-support-042; HandoffProcess handoff-042 records ResponsibilityTransfer so billing_agent bears next-response responsibility and the initiator no longer holds current session control.
      ja: triage_agent が session-support-042 で transfer_to_billing_agent を呼び、HandoffProcess handoff-042 は ResponsibilityTransfer を記録し billing_agent が次応答責任を担い、開始者は現在セッション制御を失います。
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/
      version: handoffs — handoff() and transfer_to_* tools
    field_values:
      framework: openai-agents-sdk
      session_id: session-support-042
      source_agent: triage_agent
      target_agent: billing_agent
      handoff_tool: transfer_to_billing_agent
      handoff_process_id: handoff-042
      responsibility_transfer_id: transfer-042
      control_transferred: true
      context_bundle_ref: ctx-support-042@1
    related_node_ids:
      - HandoffProcess
      - Handoff
      - ResponsibilityTransfer
      - DelegationContract
    related_relation_ids:
      - HandoffProcess-contains-Handoff
      - Handoff-records-ResponsibilityTransfer
    source_claims:
      - claim-orchestration-delegation-handoff-openai
      - claim-orchestration-delegation-handoff-design
  - id: orchestration-delegation-handoff-example-a2a-task-send
    labels:
      zh: A2A tasks/send 远程委派
      en: A2A tasks/send remote delegation
      ja: A2A tasks/send リモート委任
    descriptions:
      zh: 协调 agent 通过 AgentCard 发现 refund_agent 后调用 tasks/send；DelegationProcess delegation-a2a-551 记录 TaskSendParams 与 task-a2a-551，后续 status-update 事件 sequence 2 的 accepted 使有效阶段为 AcceptancePhase。
      en: After discovering refund_agent via AgentCard, the coordinator calls tasks/send; DelegationProcess delegation-a2a-551 records TaskSendParams and task-a2a-551, and status-update event sequence 2 accepted makes AcceptancePhase effective.
      ja: 調整 agent が AgentCard で refund_agent を発見し tasks/send を呼ぶと、DelegationProcess delegation-a2a-551 は TaskSendParams と task-a2a-551 を記録し、status-update event sequence 2 accepted により AcceptancePhase が有効になります。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: v1.0 — tasks/send, TaskSendParams, status lifecycle
    field_values:
      framework: a2a
      rpc: tasks/send
      task_id: task-a2a-551
      delegation_process_id: delegation-a2a-551
      initiator_ref: agent-coordinator-3
      assignee_ref: agent-refund-remote
      agent_card_url: https://refund.example.com/.well-known/agent-card.json
      event_sequence: 2
      effective_phase_ref: AcceptancePhase
    related_node_ids:
      - DelegationProcess
      - DelegationEvent
      - DelegationPhase
      - WorkerAssignment
    related_relation_ids:
      - DelegationProcess-has_event-DelegationEvent
      - DelegationEvent-records_phase-DelegationPhase
      - DelegationProcess-results_in-WorkerAssignment
    source_claims:
      - claim-orchestration-delegation-handoff-a2a
      - claim-orchestration-delegation-handoff-design
  - id: orchestration-delegation-handoff-example-langgraph-command
    labels:
      zh: LangGraph Command 图内委派
      en: LangGraph Command in-graph delegation
      ja: LangGraph Command グラフ内委任
    descriptions:
      zh: triage 节点写入 billing_intent 后返回 Command(goto="billing_agent")；DelegationProcess delegation-lg-884 引用 contract-bounded@2 并把 WorkerAssignment assignment-884 指向 billing_agent 节点函数，发起方仍可通过 supervisor 边监督。
      en: After triage writes billing_intent, it returns Command(goto="billing_agent"); DelegationProcess delegation-lg-884 references contract-bounded@2 and WorkerAssignment assignment-884 targets the billing_agent node function while the initiator may still supervise via a supervisor edge.
      ja: triage が billing_intent を書き込んだ後 Command(goto="billing_agent") を返すと、DelegationProcess delegation-lg-884 は contract-bounded@2 を参照し WorkerAssignment assignment-884 が billing_agent ノード関数を指し、開始者は supervisor 辺で監督できます。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      version: v1.2 — Command(goto=...) and conditional_edges
    field_values:
      framework: langgraph
      command_return:
        goto: billing_agent
        update:
          handoff_reason: billing_intent
      delegation_process_id: delegation-lg-884
      delegation_contract_ref: contract-bounded@2
      worker_assignment_id: assignment-884
      assignee_node: billing_agent
      initiator_node: triage
      supervision_retained: true
    related_node_ids:
      - DelegationProcess
      - DelegationContract
      - WorkerAssignment
      - DelegationContext
    related_relation_ids:
      - DelegationProcess-uses_contract-DelegationContract
      - DelegationProcess-results_in-WorkerAssignment
    source_claims:
      - claim-orchestration-delegation-handoff-langgraph
      - claim-orchestration-delegation-handoff-design
  - id: orchestration-delegation-handoff-example-crewai-hierarchical
    labels:
      zh: CrewAI 层级 Process 任务委派
      en: CrewAI hierarchical Process task delegation
      ja: CrewAI 階層 Process タスク委任
    descriptions:
      zh: Process.hierarchical crew 中 manager_agent 读取 research_task 输出并委派给 researcher；WorkerSelectionDecisionActivity selection-crew-31 记录 capability match 证据，DelegationProcess delegation-crew-31 在 AcceptancePhase 后产生 WorkerAssignment assignment-crew-31。
      en: In a Process.hierarchical crew, manager_agent reads research_task output and delegates to researcher; WorkerSelectionDecisionActivity selection-crew-31 records capability-match evidence, and DelegationProcess delegation-crew-31 produces WorkerAssignment assignment-crew-31 after AcceptancePhase.
      ja: Process.hierarchical crew では manager_agent が research_task 出力を読み researcher に委任し、WorkerSelectionDecisionActivity selection-crew-31 が capability match 証拠を記録し、DelegationProcess delegation-crew-31 は AcceptancePhase 後に WorkerAssignment assignment-crew-31 を生成します。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com
      version: v1.15 — Process.hierarchical, @task, allow_delegation
    field_values:
      framework: crewai
      process: hierarchical
      manager_agent: research_manager
      delegate_agent: researcher
      task_description: Find benchmark data for topic X
      worker_selection_decision_id: selection-crew-31
      delegation_process_id: delegation-crew-31
      worker_assignment_id: assignment-crew-31
      effective_phase_ref: AcceptancePhase
      capability_match_score: 0.91
    related_node_ids:
      - DelegationProcess
      - WorkerSelectionProcess
      - WorkerSelectionDecisionActivity
      - WorkerAssignment
      - DelegationPhase
    related_relation_ids:
      - DelegationProcess-contains-WorkerSelectionProcess
      - WorkerSelectionProcess-produces-WorkerSelectionDecisionActivity
      - DelegationProcess-results_in-WorkerAssignment
    source_claims:
      - claim-orchestration-delegation-handoff-crewai
      - claim-orchestration-delegation-handoff-design
  - id: orchestration-delegation-handoff-example-worker-selection-evidence
    labels:
      zh: 工作者选择需有可用性与能力证据
      en: Worker selection requires availability and capability evidence
      ja: 作業者選択には可用性と能力証拠が必要
    descriptions:
      zh: WorkerSelectionProcess selection-run-18 评估 pool 中三名候选：agent-reviewer-9 通过 availability 与 capability match，DelegationProcess delegation-18 据此产生 assignment-18；仅列在 handoffs 配置中而无评估事实的 agent 不得被记为已分派。
      en: WorkerSelectionProcess selection-run-18 evaluates three pool candidates; agent-reviewer-9 passes availability and capability match, so DelegationProcess delegation-18 produces assignment-18; an agent listed only in handoffs config without evaluation facts must not be recorded as assigned.
      ja: WorkerSelectionProcess selection-run-18 は pool 内三候補を評価し、agent-reviewer-9 が availability と capability match を通過して DelegationProcess delegation-18 が assignment-18 を生成します。handoffs 設定に載るだけで評価事実のない agent は割当済みと記録できません。
    example_source:
      product: Moonweave delegation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: worker selection evidence contract
    field_values:
      worker_selection_process_id: selection-run-18
      candidate_pool:
        - agent-reviewer-7
        - agent-reviewer-9
        - agent-reviewer-12
      selected_agent: agent-reviewer-9
      availability_assessment_ref: avail-9@1
      capability_match_ref: match-9@2
      delegation_process_id: delegation-18
      worker_assignment_id: assignment-18
      config_only_candidate: agent-reviewer-12
      config_only_assigned: false
    related_node_ids:
      - WorkerSelectionProcess
      - WorkerPool
      - WorkerAvailabilityAssessment
      - WorkerCapabilityMatching
      - WorkerAssignment
    related_relation_ids:
      - WorkerSelectionProcess-evaluates-WorkerPool
      - WorkerSelectionProcess-produces-WorkerSelectionDecisionActivity
      - DelegationProcess-results_in-WorkerAssignment
    source_claims:
      - claim-orchestration-delegation-handoff-design
      - claim-orchestration-delegation-handoff-openai
parent_relation: null
relations: []
