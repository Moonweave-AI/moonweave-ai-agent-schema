schema: moonweave.ai/ontology-node/v1
id: A2AMessage
kind: concept
labels:
  zh: A2A 消息
  en: A2A message
  ja: A2A メッセージ
semantics:
  short_definition:
    zh: A2A 协议交换的、带角色和内容片段的消息记录。
    en: A role-bearing protocol message record exchanged through A2A.
    ja: A2A で交換される、role と内容 Part を持つプロトコルメッセージ記録。
  definition:
    zh: A2A Message 是携带一个 messageId、必需 Role 和非空 Part 集合的协议数据对象。它可关联 contextId、taskId、扩展、引用任务和元数据。它表示一次协议消息，而不是 A2A Task、TaskStatus、HTTP 请求或 Moonweave 的本地交接控制转移。
    en: An A2A Message is a protocol data object carrying one messageId, a required Role, and a non-empty collection of Parts. It may associate contextId, taskId, extensions, referenced tasks, and metadata. It represents one protocol message, not an A2A Task, TaskStatus, HTTP request, or Moonweave local handoff control transfer.
    ja: A2A Message は、一つの messageId、必須 Role、空でない Part 集合を持つプロトコルデータオブジェクトである。contextId、taskId、extensions、参照 Task、metadata を関連付けられる。これは一つのプロトコルメッセージであり、A2A Task、TaskStatus、HTTP リクエスト、Moonweave のローカルハンドオフ制御移転ではない。
  why_needed:
    zh: 跨服务智能体必须能表达谁说了什么，以及这些内容与哪个任务或上下文相关。显式角色和 Part 边界使消费者能按照协议解释内容，而不把调用方内部提示、工具调用或私有推理伪装成消息。
    en: Cross-service agents must express who said what and which task or context the content relates to. Explicit role and Part boundaries let consumers interpret content under the protocol without passing caller-internal prompts, tool calls, or private reasoning off as messages.
    ja: サービス間エージェントは、誰が何を言い、内容がどのタスクまたはコンテキストに関連するかを表す必要がある。明示的な role と Part の境界により、呼出側内部プロンプト、ツール呼出し、非公開推論をメッセージとして渡すことなく、消費者はプロトコルに従って内容を解釈できる。
  includes:
    - zh: 必需的 messageId、Role 和至少一个 Part。
      en: Required messageId, Role, and at least one Part.
      ja: 必須の messageId、Role、少なくとも一つの Part。
    - zh: 可选的任务、上下文、引用和扩展关联。
      en: Optional task, context, reference, and extension associations.
      ja: 任意のタスク、コンテキスト、参照、拡張の関連付け。
  excludes:
    - zh: Task 的生命周期状态或 Artifact 输出记录。
      en: A Task lifecycle status or Artifact output record.
      ja: Task のライフサイクル状態または Artifact 出力記録。
    - zh: 未构成 A2A Message 的任意字符串或 HTTP 负载。
      en: An arbitrary string or HTTP payload that is not shaped as an A2A Message.
      ja: A2A Message の形を持たない任意の文字列または HTTP ペイロード。
  semantic_kind: information
  aliases:
    - language: en
      value: Message
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 实现以 messageId、role 和 Part 数组构造消息，并可将任务或上下文关联作为显式字段保存。接收方先验证消息的必需形状，再按 role 和 Part 类型处理内容；它不应从自由文本猜测角色，也不应把原始 HTTP 头、认证材料或内部提示放进消息语义中。
    en: Implementations construct messages from messageId, role, and a Part array, then persist task or context links as explicit fields when present. A receiver validates the required shape before processing content by role and Part type. It must not infer role from free text or place raw HTTP headers, credentials, or internal prompts in message semantics.
    ja: 実装は messageId、role、Part 配列からメッセージを構成し、存在する task または context のリンクを明示フィールドとして保存する。受信側は role と Part 型で内容を処理する前に必須形状を検証する。自由文から role を推測したり、生の HTTP ヘッダー、資格情報、内部プロンプトをメッセージ意味論へ入れたりしてはならない。
  typical_input:
    - description: A user message contains one Part using the text branch and starts a report-oriented interaction.
      format: |
        {
          "messageId": "msg-20260718-001",
          "role": "ROLE_USER",
          "parts": [{"text": "Summarize the incident report."}]
        }
      source_claims: [a2a-message-data-model, a2a-message-role-and-parts]
  typical_output:
    - description: An agent message requests missing input while remaining associated with a Task.
      format: |
        {
          "messageId": "msg-question-001",
          "taskId": "task-20260718-001",
          "role": "ROLE_AGENT",
          "parts": [{"text": "Which reporting period should I use?"}]
        }
      source_claims: [a2a-message-data-model, a2a-message-role-and-parts]
  reference_implementations:
    - name: A2A Protocol Specification — Message, Role, and Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines Message fields, the ROLE_UNSPECIFIED, ROLE_USER, and ROLE_AGENT values, and the Part content union.
structure:
  identity_keys: [messageId]
  fields:
    - id: messageId
      labels: {zh: 消息标识, en: Message ID, ja: メッセージ ID}
      definitions: {zh: 标识该 A2A Message 的消息标识。, en: The identifier for this A2A Message., ja: この A2A Message の識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: msg-20260718-001
      allowed_values: []
      source_claims: [a2a-message-data-model]
    - id: role
      labels: {zh: 角色, en: Role, ja: ロール}
      definitions: {zh: 必须表明消息由用户还是智能体发出的协议角色。, en: The required protocol role indicating whether the message is from a user or agent., ja: メッセージがユーザーまたはエージェントのどちらからのものかを示す必須プロトコル role。}
      datatype: A2ARole
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^(ROLE_UNSPECIFIED|ROLE_USER|ROLE_AGENT)$'
      example_value: ROLE_USER
      allowed_values:
        - id: role-unspecified
          value: ROLE_UNSPECIFIED
          labels: {zh: 未指定角色, en: Unspecified role, ja: 未指定ロール}
          definitions: {zh: 未指定的协议消息角色值。, en: The unspecified protocol message role value., ja: 未指定のプロトコルメッセージ role 値。}
          source_claims: [a2a-message-role-and-parts]
        - id: role-user
          value: ROLE_USER
          labels: {zh: 用户角色, en: User role, ja: ユーザーロール}
          definitions: {zh: 由用户发出的消息角色。, en: Role for a message sent by a user., ja: ユーザーが送ったメッセージの role。}
          source_claims: [a2a-message-role-and-parts]
        - id: role-agent
          value: ROLE_AGENT
          labels: {zh: 智能体角色, en: Agent role, ja: エージェントロール}
          definitions: {zh: 由智能体发出的消息角色。, en: Role for a message sent by an agent., ja: エージェントが送ったメッセージの role。}
          source_claims: [a2a-message-role-and-parts]
      source_claims: [a2a-message-role-and-parts]
    - id: parts
      labels: {zh: 内容片段, en: Parts, ja: Part}
      definitions: {zh: 组成消息内容的非空 A2A Part 集合。, en: The non-empty collection of A2A Parts that makes up message content., ja: メッセージ内容を構成する空でない A2A Part の集合。}
      datatype: A2APart[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '[{"text":"Summarize the incident report."}]'
      allowed_values: []
      source_claims: [a2a-message-data-model, a2a-message-role-and-parts]
    - id: contextId
      labels: {zh: 上下文标识, en: Context ID, ja: コンテキスト ID}
      definitions: {zh: 可选的消息交互上下文标识。, en: An optional identifier for the message interaction context., ja: メッセージ相互作用コンテキストの任意識別子。}
      datatype: A2AContextId
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: ctx-quarterly-report
      allowed_values: []
      source_claims: [a2a-message-data-model]
    - id: taskId
      labels: {zh: 任务标识, en: Task ID, ja: タスク ID}
      definitions: {zh: 可选的、消息关联的 A2A Task 标识。, en: An optional identifier for the A2A Task associated with the message., ja: メッセージに関連する A2A Task の任意識別子。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: task-20260718-001
      allowed_values: []
      source_claims: [a2a-message-data-model]
    - id: referenceTaskIds
      labels: {zh: 引用任务标识, en: Referenced task IDs, ja: 参照タスク ID}
      definitions: {zh: 消息可选引用的任务标识集合。, en: An optional collection of task identifiers referenced by the message., ja: メッセージが参照する任意のタスク識別子集合。}
      datatype: string[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["task-20260718-001"]'
      allowed_values: []
      source_claims: [a2a-message-data-model]
    - id: extensions
      labels: {zh: 扩展, en: Extensions, ja: 拡張}
      definitions: {zh: 可选的协议扩展声明集合。, en: An optional collection of protocol extension declarations., ja: 任意のプロトコル拡張宣言集合。}
      datatype: object[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '[]'
      allowed_values: []
      source_claims: [a2a-message-data-model]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions: {zh: 不取代消息规范字段的可选实现数据。, en: Optional implementation data that does not replace normative message fields., ja: 規範メッセージフィールドを置き換えない任意の実装データ。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"trace_id":"trace-41"}'
      allowed_values: []
      source_claims: [a2a-message-data-model]
  constraints:
    - id: a2a-message-requires-role-and-part
      severity: error
      expression_language: plain
      expression: A Message must carry one Role and at least one Part.
      explanation:
        zh: 消息若没有角色或内容片段，接收方无法按 A2A 数据模型解释来源和内容。
        en: Without role or content parts, a receiver cannot interpret source and content under the A2A data model.
        ja: role または内容 Part がなければ、受信側は A2A データモデルに従って送信元と内容を解釈できない。
      source_claims: [a2a-message-data-model, a2a-message-role-and-parts]
    - id: a2a-message-role-is-enumerated
      severity: error
      expression_language: plain
      expression: A Message role is ROLE_UNSPECIFIED, ROLE_USER, or ROLE_AGENT.
      explanation:
        zh: 协议角色是固定枚举，不能从消息文本或调用方内部身份猜测。
        en: The protocol role is an enumerated value and cannot be inferred from message text or caller-internal identity.
        ja: プロトコル role は列挙値であり、メッセージ本文や呼出側内部識別から推測できない。
      source_claims: [a2a-message-role-and-parts]
  required_relations: []
examples:
  - id: a2a-message-positive-user-text
    labels:
      zh: A2AMessage positive
      en: A2AMessage positive
      ja: A2AMessage positive
    descriptions:
      zh: A2A Protocol 映射 A2AMessage：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2AMessage: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2AMessage: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {messageId: msg-20260718-001, role: ROLE_USER, parts: "'[{\\"text\\":\\"Summarize the incident report.\\"}]'"}

    related_node_ids:
      - A2AMessage
      - A2APart
    related_relation_ids: []
    source_claims:
      - a2a-message-data-model
      - a2a-message-role-and-parts

  - id: a2a-message-counterexample-no-parts
    labels:
      zh: A2AMessage counterexample
      en: A2AMessage counterexample
      ja: A2AMessage counterexample
    descriptions:
      zh: 单 Agent 无 GroupChat/GroupChatManager 的多轮对话不能作为 AutoGen 式 A2AMessage 群组编排。
      en: Single-agent multi-turn chat without GroupChat/GroupChatManager cannot classify as AutoGen-style A2AMessage group orchestration.
      ja: GroupChat なし単 agent は AutoGen 式 A2AMessage ではない。
    field_values: {messageId: msg-20260718-empty, role: ROLE_USER, parts: "'[]'"}

    related_node_ids:
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-message-data-model
      - a2a-message-role-and-parts

  - id: a2a-message-boundary-task-association
    labels:
      zh: A2AMessage boundary
      en: A2AMessage boundary
      ja: A2AMessage boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2AMessage 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2AMessage work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2AMessage work_specification ではない。
    field_values: {messageId: msg-question-001, taskId: task-20260718-001, role: ROLE_AGENT, parts: "'[{\\"text\\":\\"Which reporting period should I use?\\"}]'"}

    related_node_ids:
      - A2AMessage
      - A2ATask
      - A2ATaskStatus
    related_relation_ids: []
    source_claims:
      - a2a-message-data-model
      - a2a-task-status-data-model

  - id: a2a-message-instance-report-question
    labels:
      zh: A2AMessage instance
      en: A2AMessage instance
      ja: A2AMessage instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AMessage A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AMessage A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AMessage A2ATask に写像。
    field_values: {messageId: msg-question-001, taskId: task-20260718-001, role: ROLE_AGENT, parts: "'[{\\"text\\":\\"Which reporting period should I use?\\"}]'", metadata: "'{\\"trace_id\\":\\"trace-41\\"}'"}

    related_node_ids:
      - A2AMessage
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-message-data-model
      - a2a-message-role-and-parts

