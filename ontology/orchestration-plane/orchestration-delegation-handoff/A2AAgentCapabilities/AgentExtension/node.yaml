schema: moonweave.ai/ontology-node/v1
id: AgentExtension
kind: concept
labels:
  zh: A2A 智能体扩展
  en: A2A Agent Extension
  ja: A2A エージェント拡張
semantics:
  short_definition:
    zh: AgentCard.capabilities.extensions 中描述可选或必需扩展协商的 A2A v1 规范对象。
    en: The A2A v1 canonical object that describes optional or required extension negotiation in AgentCard.capabilities.extensions.
    ja: AgentCard.capabilities.extensions における任意または必須 extension negotiation を記述する A2A v1 canonical object。
  definition:
    zh: >
      AgentExtension 是当前 A2A v1 AgentCapabilities.extensions 数组中的对象，具有 uri、description、required
      和 params 四个可选字段。uri 用于唯一标识扩展；required 为 true 时，客户端必须理解并遵从该扩展，
      否则不得继续使用该扩展路径。它不是对扩展内容安全、实现质量或服务端授权的保证。
    en: >
      AgentExtension is the canonical object in the current A2A v1 AgentCapabilities.extensions
      array, with optional uri, description, required, and params fields. uri identifies an
      extension uniquely; when required is true, a client must understand and comply with that
      extension or cannot proceed on that extension path. It does not guarantee extension safety,
      implementation quality, or server authorization.
    ja: >
      AgentExtension は current A2A v1 AgentCapabilities.extensions array の canonical object で、
      任意の uri、description、required、params field を持つ。uri は extension を一意に示す。required が true
      の場合、client はその extension を理解して従わなければその extension path を進めない。これは extension
      の安全性、implementation quality、または server authorization を保証しない。
  why_needed:
    zh: 客户端需要在调用前发现扩展标识、参数和强制性，避免把仅可选或无法理解的扩展当作基础协议功能。
    en: Clients need to discover extension identifiers, parameters, and mandatory status before use, without treating optional or unknown extensions as base-protocol features.
    ja: client は使用前に extension identifier、parameter、mandatory status を発見し、任意または未知の extension を base protocol feature として扱わない必要がある。
  includes:
    - zh: 唯一扩展 URI、说明、required 标志和扩展参数对象。
      en: A unique extension URI, description, required flag, and extension parameter object.
      ja: 一意の extension URI、description、required flag、extension parameter object。
    - zh: 作为 AgentCapabilities.extensions 条目的协商信息。
      en: Negotiation information as an AgentCapabilities.extensions entry.
      ja: AgentCapabilities.extensions entry としての negotiation information。
  excludes:
    - zh: 基础 A2A 协议字段、调用者凭据或已获授权的声明。
      en: A base A2A protocol field, caller credential, or declaration that access is authorized.
      ja: base A2A protocol field、caller credential、または access が許可済みであるという宣言。
    - zh: 客户端能忽略 required=true 扩展后继续交互的许可。
      en: Permission for a client to ignore a required=true extension and continue interacting.
      ja: client が required=true extension を無視して interaction を続ける許可。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: AgentCapabilities extension
      alias_kind: protocol-term
engineering:
  explanation:
    zh: >
      客户端在使用扩展前读取 AgentCard.capabilities.extensions。若扩展被标为 required 且客户端无法理解其 uri、
      params 或规则，客户端必须停止该扩展协商；若未标为 required，客户端可不使用它。params 是扩展自定义对象，
      并不改变基础 A2A 消息的字段契约。
    en: >
      A client reads AgentCard.capabilities.extensions before using an extension. If an extension is
      marked required and the client cannot understand its uri, params, or rules, the client must
      stop that extension negotiation; when it is not required, the client may decline to use it.
      params is an extension-defined object and does not change base A2A message field contracts.
    ja: >
      client は extension を使う前に AgentCard.capabilities.extensions を読む。extension が required とされ、
      client が uri、params、rule を理解できない場合、その extension negotiation を停止しなければならない。
      required でない場合、client は使用を拒否できる。params は extension-defined object であり、base A2A
      message field contract を変更しない。
  typical_input:
    - description:
        zh: 客户端发现一个带有可选参数的引用扩展。
        en: A client discovers a citations extension with an optional parameter object.
        ja: client が任意の parameter object を持つ citations extension を発見する。
      format: |
        {
          "capabilities": {
            "extensions": [
              {
                "uri": "https://example.com/a2a/extensions/citations/v1",
                "description": "Adds source citation conventions.",
                "required": false,
                "params": {"style": "compact"}
              }
            ]
          }
        }
      source_claims: [a2a-v1-agent-extension-fields, a2a-v1-agent-capabilities-extensions]
  typical_output:
    - description:
        zh: 客户端仅在理解该 URI 和参数时选择使用扩展。
        en: The client opts into the extension only when it understands the URI and parameters.
        ja: client は URI と parameter を理解するときだけ extension を選択する。
      format: |
        {"extensionUri":"https://example.com/a2a/extensions/citations/v1","useExtension":true}
      source_claims: [a2a-v1-agent-extension-required]
  reference_implementations:
    - name: A2A Protocol v1 AgentExtension
      url: https://a2a-protocol.org/latest/specification/
      description: Defines extension declarations in AgentCapabilities and required-extension behavior.
    - name: A2A v1 Protocol Buffer definition
      url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
      description: Declares AgentExtension URI, description, required, and params fields.
structure:
  identity_keys: []
  fields:
    - id: uri
      labels:
        zh: 扩展 URI
        en: Extension URI
        ja: extension URI
      definitions:
        zh: 可选的唯一扩展标识 URI；声明扩展时应使用稳定且可区分的值。
        en: An optional unique URI identifying the extension; an advertised extension should use a stable, distinguishable value.
        ja: extension を示す任意の一意 URI。advertise された extension は安定して区別可能な値を使うべきである。
      datatype: uri
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: https://example.com/a2a/extensions/citations/v1
      allowed_values: []
      source_claims: [a2a-v1-agent-extension-fields]
    - id: description
      labels:
        zh: 扩展说明
        en: Extension description
        ja: extension description
      definitions:
        zh: 可选的人类可读扩展说明。
        en: An optional human-readable description of the extension.
        ja: 任意の人間が読める extension の説明。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Adds source citation conventions.
      allowed_values: []
      source_claims: [a2a-v1-agent-extension-fields]
    - id: required
      labels:
        zh: 是否必须理解
        en: Required to understand
        ja: 理解が必須
      definitions:
        zh: 可选布尔值；为 true 时，客户端必须理解并遵从扩展才能沿该扩展路径继续交互。
        en: An optional Boolean; when true, the client must understand and comply with the extension to continue on that extension path.
        ja: 任意の Boolean。true の場合、client はその extension path を続けるために extension を理解し従わなければならない。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: false
      allowed_values: []
      source_claims: [a2a-v1-agent-extension-fields, a2a-v1-agent-extension-required]
    - id: params
      labels:
        zh: 扩展参数
        en: Extension parameters
        ja: extension parameters
      definitions:
        zh: 可选的扩展自定义对象；其内部模式由该扩展定义，而非由基础 A2A 协议定义。
        en: An optional extension-defined object whose inner schema is defined by that extension, not by the base A2A protocol.
        ja: 任意の extension-defined object。内部 schema は base A2A protocol ではなくその extension が定義する。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"style":"compact"}'
      allowed_values: []
      source_claims: [a2a-v1-agent-extension-fields]
  constraints:
    - id: agent-extension-required-negotiation
      severity: error
      expression_language: plain
      expression: If required is true, a client that cannot understand and comply with the extension must not continue on that extension path; params remains extension-defined and cannot redefine base A2A fields.
      explanation:
        zh: required=true 表示理解与遵从是该扩展路径的前提；params 不能改写基础 A2A 字段。
        en: required=true makes understanding and compliance a precondition for that extension path; params cannot rewrite base A2A fields.
        ja: required=true は理解と遵守をその extension path の前提にし、params は base A2A field を書き換えられない。
      source_claims: [a2a-v1-agent-extension-required, a2a-v1-agent-extension-fields]
  required_relations: []
examples:
  - id: agent-extension-positive-optional-citations
    labels:
      zh: AgentExtension positive
      en: AgentExtension positive
      ja: AgentExtension positive
    descriptions:
      zh: A2A Protocol 映射 AgentExtension：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps AgentExtension: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol AgentExtension: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {uri: "https://example.com/a2a/extensions/citations/v1", description: "Adds source citation conventions.", required: false, params: "'{\\"style\\":\\"compact\\"}'"}

    related_node_ids:
      - AgentExtension
      - A2AAgentCapabilities
    related_relation_ids:
      - AgentExtension-part_of-A2AAgentCapabilities
    source_claims:
      - a2a-v1-agent-extension-fields
      - a2a-v1-agent-capabilities-extensions

  - id: agent-extension-counterexample-ignore-required
    labels:
      zh: AgentExtension counterexample
      en: AgentExtension counterexample
      ja: AgentExtension counterexample
    descriptions:
      zh: 一次性脚本无 skill_library.add 持久化不能作为 Voyager 式 AgentExtension 技能组合。
      en: One-off script without skill_library.add persistence cannot classify as Voyager-style AgentExtension skill composition.
      ja: skill_library.add なし一回脚本は Voyager 式 AgentExtension ではない。
    field_values: {uri: "https://example.com/a2a/extensions/regulated-output/v1", required: true}

    related_node_ids:
      - AgentExtension
      - A2AAgentCapabilities
    related_relation_ids:
      - AgentExtension-part_of-A2AAgentCapabilities
    source_claims:
      - a2a-v1-agent-extension-required

  - id: agent-extension-boundary-params-not-base-schema
    labels:
      zh: AgentExtension boundary
      en: AgentExtension boundary
      ja: AgentExtension boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 AgentExtension 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not AgentExtension routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で AgentExtension routing spec ではない。
    field_values: {uri: "https://example.com/a2a/extensions/citations/v1", params: "'{\\"style\\":\\"compact\\"}'"}

    related_node_ids:
      - AgentExtension
      - A2AAgentCapabilities
    related_relation_ids:
      - AgentExtension-part_of-A2AAgentCapabilities
    source_claims:
      - a2a-v1-agent-extension-fields

  - id: agent-extension-instance-required-output-policy
    labels:
      zh: AgentExtension instance
      en: AgentExtension instance
      ja: AgentExtension instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 AgentExtension A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to AgentExtension A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が AgentExtension A2ATask に写像。
    field_values: {uri: "https://example.com/a2a/extensions/regulated-output/v1", description: "Defines additional output handling rules.", required: true}

    related_node_ids:
      - AgentExtension
      - A2AAgentCapabilities
    related_relation_ids:
      - AgentExtension-part_of-A2AAgentCapabilities
    source_claims:
      - a2a-v1-agent-extension-fields
      - a2a-v1-agent-extension-required

parent_relation:
  id: AgentExtension-part_of-A2AAgentCapabilities
  predicate: part_of
  target: concept:A2AAgentCapabilities
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是 A2A 智能体能力的扩展组成部分
    en: is an extension component of A2A agent capabilities
    ja: A2A agent capabilities の extension component である
  definition:
    zh: Moonweave 将 AgentExtension 组织为 A2AAgentCapabilities 的扩展组成部分。
    en: Moonweave organizes AgentExtension as an extension component of A2AAgentCapabilities.
    ja: Moonweave は AgentExtension を A2AAgentCapabilities の extension component として整理する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 可包含扩展
      en: may have extension
      ja: extension を持ちうる
  conditions: []
  temporal_scope: card-lifetime
  boundary_context: This Moonweave composition organizes capability containment and does not turn an extension declaration into authorization.
  constraints:
    - id: agent-extension-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The composition edge organizes a capability extension in Moonweave and must not be interpreted as a security or authorization relationship.
      explanation:
        zh: 该组成边仅组织能力中的扩展，不能解释为安全或授权关系。
        en: This composition edge organizes an extension within capabilities and cannot be interpreted as security or authorization.
        ja: この composition edge は capabilities 内の extension を整理するもので、security や authorization と解釈できない。
      source_claims: [moonweave-a2a-agent-extension-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-agent-extension-taxonomy]
  distinct_fact_rationale:
    zh: 该关系表达本体中的能力包含结构，不改变扩展协商规则。
    en: This relation expresses capability containment in the ontology and does not alter extension-negotiation rules.
    ja: この relation は ontology 内の capability containment を表し、extension-negotiation rule を変更しない。
relations: []
sources:
