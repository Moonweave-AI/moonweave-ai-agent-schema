    publisher: A2A Protocol Working Group
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines AgentCapabilities extensions and required-extension client behavior in A2A v1.
  - id: a2a-v1-protobuf
    title: A2A v1 Protocol Buffer definition
    publisher: A2A Project
    url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Declares the current AgentExtension URI, description, required, and params fields.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local composition treatment for retained ontology concepts.
source_claims:
  - id: a2a-v1-agent-extension-fields
    source: a2a-v1-protobuf
    supports: The current A2A v1 AgentExtension message has optional uri, description, required, and params fields.
    locator: "AgentExtension message"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-agent-capabilities-extensions
    source: a2a-v1-specification
    supports: A2A v1 AgentCapabilities exposes extensions as an optional array of AgentExtension objects.
    locator: "AgentCapabilities data model"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-agent-extension-required
    source: a2a-v1-specification
    supports: When an advertised A2A extension is required, clients must understand and comply with it to proceed using that extension.
    locator: "Extensions negotiation"
    evidence_kind: normative
    confidence: high
  - id: moonweave-a2a-agent-extension-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave places AgentExtension as an extension composition component of A2AAgentCapabilities.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
