schema: moonweave.ai/ontology-node/v1
id: A2AAgentCapabilities
kind: concept
labels:
  zh: A2A 智能体能力
  en: A2A agent capabilities
  ja: A2A エージェント能力
semantics:
  short_definition:
    zh: AgentCard 中声明可选 A2A 协议功能的能力描述。
    en: A capability description in an AgentCard that declares optional A2A protocol features.
    ja: AgentCard 内で任意の A2A プロトコル機能を宣言する能力記述。
  definition:
    zh: A2A AgentCapabilities 是 AgentCard 的能力字段。它可声明 streaming、pushNotifications、extensions 和 extendedAgentCard；这些字段均为可选。声明能力让客户端知道哪些可选协议路径可能可用，但不替代安全要求、接口协商或每个请求的服务端验证。
    en: A2A AgentCapabilities is the capability field of an AgentCard. It may declare streaming, pushNotifications, extensions, and extendedAgentCard; all of these fields are optional. Advertising a capability tells a client which optional protocol paths may be available, but it does not replace security requirements, interface negotiation, or server-side validation of each request.
    ja: A2A AgentCapabilities は AgentCard の能力フィールドである。streaming、pushNotifications、extensions、extendedAgentCard を宣言でき、これらのフィールドはすべて任意である。能力の広告は任意プロトコル経路が利用可能かもしれないことをクライアントへ知らせるが、安全要件、インターフェース交渉、各要求に対するサーバー側検証を置き換えない。
  why_needed:
    zh: 客户端需要在尝试流、推送通知、扩展或扩展卡片前发现服务端是否声明支持。
    en: A client needs to discover whether a server declares support before attempting streaming, push notifications, extensions, or an extended card.
    ja: クライアントはストリーミング、プッシュ通知、拡張、または拡張カードを試す前に、サーバーがサポートを宣言しているかを発見する必要がある。
  includes:
    - zh: 是否支持流式响应的声明。
      en: A declaration of streaming-response support.
      ja: ストリーミング応答サポートの宣言。
    - zh: 推送通知、扩展标识符和扩展卡片支持的可选声明。
      en: Optional declarations for push notifications, extension identifiers, and extended-card support.
      ja: プッシュ通知、拡張識別子、拡張カードサポートの任意宣言。
  excludes:
    - zh: 对任何客户端均已授权使用某个功能的授权凭据。
      en: An authorization credential that grants every client use of a feature.
      ja: すべてのクライアントに機能使用を許可する認可資格情報。
    - zh: 本地工作者能力匹配或任务分配决定。
      en: A local worker-capability match or task-assignment decision.
      ja: ローカルのワーカー能力一致またはタスク割り当て決定。
  semantic_kind: information
  aliases:
    - language: en
      value: AgentCapabilities
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 客户端先读取 AgentCard.capabilities，再决定是否请求流式结果、配置推送通知或使用特定扩展。能力值为 false 或未声明时，客户端不应假定相应可选路径可用；即使声明为 true，服务端仍会按接口和安全要求验证请求。
    en: A client reads AgentCard.capabilities before deciding whether to request streamed results, configure push notifications, or use a specific extension. When a capability is false or absent, the client must not assume the corresponding optional path is available; even when true is advertised, the server still validates requests against its interface and security requirements.
    ja: クライアントはストリーミング結果を要求するか、プッシュ通知を設定するか、特定拡張を使うかを決める前に AgentCard.capabilities を読む。能力が false または不在の場合、クライアントは対応する任意経路が利用可能だと仮定してはならない。true が広告されても、サーバーはインターフェースと安全要件に照らして要求を検証する。
  typical_input:
    - description: A client reads an AgentCard that advertises streaming and a named extension.
      format: |
        {
          "capabilities": {
            "streaming": true,
            "extensions": ["https://example.com/extensions/reporting"]
          }
        }
      source_claims: [a2a-agent-capabilities-data-model]
  typical_output:
    - description: The client enables its streaming request path and considers only the advertised extension.
      format: |
        {
          "mayRequestStreaming": true,
          "consideredExtensions": ["https://example.com/extensions/reporting"]
        }
      source_claims: [a2a-agent-capabilities-data-model, a2a-optional-capability-negotiation]
  reference_implementations:
    - name: A2A Protocol Specification — AgentCapabilities
      url: https://a2a-protocol.org/latest/specification/
      description: Defines optional streaming, push-notification, extension, and extended-card capability properties.
structure:
  identity_keys: []
  fields:
    - id: streaming
      labels:
        zh: 流式支持
        en: Streaming support
        ja: ストリーミングサポート
      definitions:
        zh: 智能体是否声明支持流式响应。
        en: Whether the agent declares support for streaming responses.
        ja: エージェントがストリーミング応答のサポートを宣言するかどうか。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [a2a-agent-capabilities-data-model]
    - id: pushNotifications
      labels:
        zh: 推送通知支持
        en: Push-notification support
        ja: プッシュ通知サポート
      definitions:
        zh: 智能体是否声明支持任务推送通知。
        en: Whether the agent declares support for task push notifications.
        ja: エージェントがタスクプッシュ通知のサポートを宣言するかどうか。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: false
      allowed_values: []
      source_claims: [a2a-agent-capabilities-data-model]
    - id: extensions
      labels:
        zh: 扩展
        en: Extensions
        ja: 拡張
      definitions:
        zh: 智能体声明支持的扩展标识符列表。
        en: The list of extension identifiers the agent declares as supported.
        ja: エージェントがサポートすると宣言する拡張識別子の一覧。
      datatype: string[]
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["https://example.com/extensions/reporting"]'
      allowed_values: []
      source_claims: [a2a-agent-capabilities-data-model]
    - id: extendedAgentCard
      labels:
        zh: 扩展智能体卡片
        en: Extended Agent Card
        ja: 拡張 AgentCard
      definitions:
        zh: 智能体是否声明支持扩展 AgentCard。
        en: Whether the agent declares support for an extended AgentCard.
        ja: エージェントが拡張 AgentCard のサポートを宣言するかどうか。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [a2a-agent-capabilities-data-model]
  constraints:
    - id: a2a-agent-capabilities-optional-properties
      severity: error
      expression_language: plain
      expression: streaming, pushNotifications, extensions, and extendedAgentCard are optional AgentCapabilities properties when present with their declared data types.
      explanation:
        zh: 空能力描述可以有效；一旦提供字段，则必须使用相应的布尔值或扩展标识符列表。
        en: An empty capability description can be valid; once a property is supplied, it must use the corresponding Boolean value or extension-identifier list.
        ja: 空の能力記述は有効になり得る。プロパティが提供される場合は、対応する Boolean 値または拡張識別子一覧を使わなければならない。
      source_claims: [a2a-agent-capabilities-data-model]
    - id: a2a-agent-capabilities-advertisement-boundary
      severity: warning
      expression_language: plain
      expression: An advertised capability guides optional protocol use but does not by itself grant access or bypass request validation.
      explanation:
        zh: 能力广告用于发现和客户端分支；授权与请求接受仍由安全方案和服务端处理决定。
        en: Capability advertisement supports discovery and client branching; authorization and request acceptance remain determined by security schemes and server handling.
        ja: 能力広告は発見とクライアント分岐を支援する。認可と要求受理は安全方式とサーバー処理によって決まる。
      source_claims: [a2a-optional-capability-negotiation]
  required_relations: []
examples:
  - id: a2a-agent-capabilities-positive-streaming
    labels:
      zh: A2AAgentCapabilities positive
      en: A2AAgentCapabilities positive
      ja: A2AAgentCapabilities positive
    descriptions:
      zh: "A2A Protocol 映射 A2AAgentCapabilities：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2AAgentCapabilities: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2AAgentCapabilities: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {streaming: true, pushNotifications: false}

    related_node_ids:
      - A2AAgentCapabilities
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-capabilities-data-model

  - id: a2a-agent-capabilities-counterexample-string-boolean
    labels:
      zh: A2AAgentCapabilities counterexample
      en: A2AAgentCapabilities counterexample
      ja: A2AAgentCapabilities counterexample
    descriptions:
      zh: LLM 直接回答而无 module dispatch 轨迹不能作为 MRKL 式 A2AAgentCapabilities。
      en: Direct LLM answer without module dispatch trace cannot serve as MRKL-style A2AAgentCapabilities.
      ja: module dispatch なし直接回答は MRKL 式 A2AAgentCapabilities にならない。
    field_values: {streaming: yes}

    related_node_ids:
      - A2AAgentCapabilities
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-capabilities-data-model

  - id: a2a-agent-capabilities-boundary-empty
    labels:
      zh: A2AAgentCapabilities boundary
      en: A2AAgentCapabilities boundary
      ja: A2AAgentCapabilities boundary
    descriptions:
      zh: Voyager skill_library 条目是运行时累积代码，不是 A2AAgentCapabilities 静态 TaskPlan；DelegationTarget 规约与 skill 实例应区分。
      en: Voyager skill_library entries are runtime accumulated code, not A2AAgentCapabilities static TaskPlan; separate DelegationTarget spec from skill instances.
      ja: Voyager skill_library は runtime コードで A2AAgentCapabilities 静的 TaskPlan ではない。
    field_values: {capabilities: {}

    related_node_ids:
      - A2AAgentCapabilities
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-capabilities-data-model

  - id: a2a-agent-capabilities-instance-extension-card
    labels:
      zh: A2AAgentCapabilities instance
      en: A2AAgentCapabilities instance
      ja: A2AAgentCapabilities instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AAgentCapabilities A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AAgentCapabilities A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AAgentCapabilities A2ATask に写像。
    field_values: {extensions: "'[\\"https://example.com/extensions/reporting\\"]'", extendedAgentCard: true}

    related_node_ids:
      - A2AAgentCapabilities
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-capabilities-data-model
      - a2a-optional-capability-negotiation

