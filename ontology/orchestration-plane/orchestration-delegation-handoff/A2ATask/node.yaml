schema: moonweave.ai/ontology-node/v1
id: A2ATask
kind: concept
labels:
  zh: A2A 任务
  en: A2A task
  ja: A2A タスク
semantics:
  short_definition:
    zh: A2A 服务器管理的可追踪工作状态记录。
    en: A server-managed, trackable A2A work-state record.
    ja: A2A サーバーが管理する追跡可能な作業状態記録。
  definition:
    zh: A2A Task 是服务器创建并维护的协议数据对象，用于表示由 A2A 交互产生或推进的工作。它必须具有服务器生成的 id 和 TaskStatus，并可保留 contextId、Artifact、消息历史和元数据。它不是通用任务计划、工作者分配或私有执行过程。
    en: An A2A Task is a server-created and server-maintained protocol data object representing work created or advanced by an A2A interaction. It has a server-generated id and required TaskStatus, and may retain contextId, Artifacts, message history, and metadata. It is not a generic task plan, worker assignment, or private execution process.
    ja: A2A Task は、A2A 相互作用によって作成または進行した作業を表す、サーバー作成・管理のプロトコルデータオブジェクトである。サーバー生成 id と必須の TaskStatus を持ち、contextId、Artifact、メッセージ履歴、metadata を保持できる。汎用タスク計画、ワーカー割当、非公開実行過程ではない。
  why_needed:
    zh: 请求可能需要异步或多轮处理；Task 使客户端能以稳定标识观察状态、取得产物并在关联上下文内继续交互，而不是把服务器内部实现当作共享协议状态。
    en: A request may need asynchronous or multi-turn processing. Task gives clients a stable identifier for observing status, receiving artifacts, and continuing in context without treating server internals as shared protocol state.
    ja: リクエストは非同期または複数ターンの処理を必要とすることがある。Task は、サーバー内部を共有プロトコル状態とみなすことなく、状態監視、Artifact 受領、文脈内の継続に使える安定識別子をクライアントに与える。
  includes:
    - zh: 服务器生成的任务标识和必需 TaskStatus。
      en: A server-generated task identifier and required TaskStatus.
      ja: サーバー生成のタスク識別子と必須 TaskStatus。
    - zh: 可选的上下文、产物、历史消息和元数据。
      en: Optional context, artifacts, message history, and metadata.
      ja: 任意のコンテキスト、Artifact、メッセージ履歴、metadata。
  excludes:
    - zh: 调用方在本地计划器中定义的任意工作项目。
      en: An arbitrary work item defined in a caller's local planner.
      ja: 呼出側のローカルプランナーで定義された任意の作業項目。
    - zh: 每一条 A2A Message；消息可以关联任务但不是任务本身。
      en: Every A2A Message; a message can relate to a task but is not itself the task.
      ja: すべての A2A Message。メッセージはタスクに関連できるが、タスク自体ではない。
  semantic_kind: information
  aliases:
    - language: en
      value: Task
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务器在处理发送消息或恢复任务的操作中创建或更新 Task，并将客户端可见状态放在 TaskStatus 中。实现应把实际执行器、队列作业和内部推理日志保留为本地实现细节；只有规范数据模型所允许的状态、历史、产物和元数据才跨 A2A 边界暴露。
    en: A server creates or updates a Task while handling send-message or task-resumption operations and places client-visible state in TaskStatus. Implementations keep concrete executors, queue jobs, and internal reasoning logs local; only status, history, artifacts, and metadata allowed by the data model cross the A2A boundary.
    ja: サーバーは message 送信またはタスク再開の操作中に Task を作成・更新し、クライアント可視の状態を TaskStatus に置く。具体的な実行器、キュージョブ、内部推論ログはローカル実装詳細として保持し、データモデルで許可された状態、履歴、Artifact、metadata だけを A2A 境界の外へ出す。
  typical_input:
    - description: A SendMessageRequest asks a server to begin report generation.
      format: |
        {
          "message": {
            "messageId": "msg-20260718-002",
            "role": "ROLE_USER",
            "parts": [{"text": "Generate the quarterly report."}]
          }
        }
      source_claims: [a2a-task-send-message-context]
  typical_output:
    - description: The server returns a Task whose required status says that work is in progress.
      format: |
        {
          "id": "task-20260718-001",
          "contextId": "ctx-quarterly-report",
          "status": {"state": "TASK_STATE_WORKING"},
          "artifacts": []
        }
      source_claims: [a2a-task-data-model]
  reference_implementations:
    - name: A2A Protocol Specification — Task
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the Task data model, server-generated identifier, required status, optional context, artifacts, history, and metadata.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 任务标识, en: Task ID, ja: タスク ID}
      definitions: {zh: 由 A2A 服务器生成的任务标识。, en: The task identifier generated by the A2A server., ja: A2A サーバーが生成するタスク識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task-20260718-001
      allowed_values: []
      source_claims: [a2a-task-data-model]
    - id: contextId
      labels: {zh: 上下文标识, en: Context ID, ja: コンテキスト ID}
      definitions: {zh: 可选的 A2A 上下文关联标识。, en: An optional association to an A2A context., ja: 任意の A2A コンテキストへの関連識別子。}
      datatype: A2AContextId
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: ctx-quarterly-report
      allowed_values: []
      source_claims: [a2a-task-data-model]
    - id: status
      labels: {zh: 任务状态, en: Task status, ja: タスク状態}
      definitions: {zh: 描述任务当前生命周期状态的必需 TaskStatus 记录。, en: The required TaskStatus record describing the task's current lifecycle state., ja: タスクの現在のライフサイクル状態を記述する必須 TaskStatus 記録。}
      datatype: A2ATaskStatus
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"state":"TASK_STATE_WORKING"}'
      allowed_values: []
      source_claims: [a2a-task-data-model]
    - id: artifacts
      labels: {zh: 产物, en: Artifacts, ja: Artifact}
      definitions: {zh: 任务产生的可选输出 Artifact 集合。, en: An optional collection of output Artifacts produced by the task., ja: タスクが生成した任意の出力 Artifact の集合。}
      datatype: A2AArtifact[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '[{"artifactId":"artifact-report","parts":[{"text":"Quarterly report"}]}]'
      allowed_values: []
      source_claims: [a2a-task-data-model]
    - id: history
      labels: {zh: 消息历史, en: Message history, ja: メッセージ履歴}
      definitions: {zh: 可选的与任务相关的 Message 历史。, en: Optional Message history associated with the task., ja: タスクに関連する任意の Message 履歴。}
      datatype: A2AMessage[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '[{"messageId":"msg-20260718-002","role":"ROLE_USER","parts":[{"text":"Generate the quarterly report."}]}]'
      allowed_values: []
      source_claims: [a2a-task-data-model]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions: {zh: 不取代任务规范字段的可选实现扩展数据。, en: Optional implementation extension data that does not replace normative task fields., ja: 規範タスクフィールドを置き換えない任意の実装拡張データ。}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"trace_id":"trace-41"}'
      allowed_values: []
      source_claims: [a2a-task-data-model]
  constraints:
    - id: a2a-task-server-generated-id
      severity: error
      expression_language: plain
      expression: A Task id is generated by the server rather than supplied as a local planner identifier.
      explanation:
        zh: 服务器生成标识可使客户端引用同一协议任务，而不会把本地计划对象误称为 A2A Task。
        en: A server-generated identifier lets clients refer to the same protocol task without relabeling a local plan object as an A2A Task.
        ja: サーバー生成識別子により、ローカル計画オブジェクトを A2A Task と誤称せずに、クライアントは同一プロトコルタスクを参照できる。
      source_claims: [a2a-task-data-model]
    - id: a2a-task-requires-status
      severity: error
      expression_language: plain
      expression: Every Task must contain one TaskStatus.
      explanation:
        zh: 没有状态，客户端无法根据协议模型判断任务当前生命周期位置。
        en: Without status, a client cannot determine the task's current lifecycle position from the protocol model.
        ja: status がなければ、クライアントはプロトコルモデルからタスクの現在のライフサイクル位置を判定できない。
      source_claims: [a2a-task-data-model]
  required_relations: []
examples:
  - id: a2a-task-positive-working-report
    labels:
      zh: A2ATask positive
      en: A2ATask positive
      ja: A2ATask positive
    descriptions:
      zh: "A2A Protocol 映射 A2ATask：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2ATask: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2ATask: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {id: task-20260718-001, contextId: ctx-quarterly-report, status: "'{\\"state\\":\\"TASK_STATE_WORKING\\"}'", artifacts: "'[]'"}

    related_node_ids:
      - A2ATask
      - A2ATaskStatus
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-task-data-model

  - id: a2a-task-counterexample-missing-status
    labels:
      zh: A2ATask counterexample
      en: A2ATask counterexample
      ja: A2ATask counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATask DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATask DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATask ではない。
    field_values: {id: task-20260718-002}

    related_node_ids:
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-data-model

  - id: a2a-task-boundary-local-plan
    labels:
      zh: A2ATask boundary
      en: A2ATask boundary
      ja: A2ATask boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2ATask 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2ATask work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2ATask work_specification ではない。
    field_values: {id: plan-step-7, status: local-planned}

    related_node_ids:
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-data-model
      - moonweave-a2a-task-module-composition

  - id: a2a-task-instance-completed-report
    labels:
      zh: A2ATask instance
      en: A2ATask instance
      ja: A2ATask instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATask A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATask A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATask A2ATask に写像。
    field_values: {id: task-20260718-001, contextId: ctx-quarterly-report, status: "'{\\"state\\":\\"TASK_STATE_COMPLETED\\"}'", artifacts: "'[{\\"artifactId\\":\\"artifact-report", "parts":[{"text": "Quarterly report\\"}]}]'"}

    related_node_ids:
      - A2ATask
      - A2ATaskStatus
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-task-data-model

