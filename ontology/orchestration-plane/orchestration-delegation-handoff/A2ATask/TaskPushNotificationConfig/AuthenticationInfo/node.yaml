schema: moonweave.ai/ontology-node/v1
id: AuthenticationInfo
kind: concept
labels:
  zh: A2A 推送通知认证信息
  en: A2A Push Notification Authentication Information
  ja: A2A プッシュ通知認証情報
semantics:
  short_definition:
    zh: A2A v1 TaskPushNotificationConfig 中用于 HTTP webhook 认证的 scheme 与可选 credentials 对象。
    en: The A2A v1 scheme-and-optional-credentials object used for HTTP webhook authentication in TaskPushNotificationConfig.
    ja: TaskPushNotificationConfig 内の HTTP webhook authentication に使う A2A v1 scheme-and-optional-credentials object。
  definition:
    zh: >
      AuthenticationInfo 是 A2A v1 的规范对象，用于推送通知。scheme 必须是 IANA HTTP Authentication
      Scheme Registry 中的 HTTP 认证方案名称，且大小写不敏感；credentials 为可选字符串，其格式取决于
      scheme，例如 Bearer token。该对象描述 HTTP 请求认证材料，不是 AgentCard SecurityScheme，
      也不是可在本体、日志或示例中保存的实际凭据。
    en: >
      AuthenticationInfo is an A2A v1 canonical object for push notifications. scheme must name an
      HTTP authentication scheme from the IANA HTTP Authentication Scheme Registry and is
      case-insensitive; credentials is an optional string whose format depends on scheme, such as a
      Bearer token. The object describes HTTP request authentication material, not an AgentCard
      SecurityScheme and not actual credentials that may be stored in ontology, logs, or examples.
    ja: >
      AuthenticationInfo は push notification のための A2A v1 canonical object である。scheme は
      IANA HTTP Authentication Scheme Registry の HTTP authentication scheme を名付ける必要があり、
      case-insensitive である。credentials は任意 string で、その format は Bearer token など scheme
      に依存する。この object は HTTP request authentication material を記述するものであり、
      AgentCard SecurityScheme でも ontology、log、example に保存できる実際の credential でもない。
  why_needed:
    zh: webhook 接收方和发送方可协商标准 HTTP 认证形式，同时将秘密值与架构描述分离。
    en: Webhook receivers and senders can use standard HTTP authentication forms while keeping secret values separate from schema description.
    ja: webhook receiver と sender は standard HTTP authentication form を使い、secret value を schema description から分離できる。
  includes:
    - zh: 必需 scheme 和可选 credentials 字段。
      en: Required scheme and optional credentials fields.
      ja: 必須 scheme と任意 credentials field。
    - zh: 发送推送通知时形成 Authorization 请求头所需的认证描述。
      en: Authentication description used to form an Authorization request header when sending push notifications.
      ja: push notification 送信時に Authorization request header を形成する authentication description。
  excludes:
    - zh: AgentCard securitySchemes 映射、OAuth 流程声明或持久化的明文秘密。
      en: An AgentCard securitySchemes map, OAuth flow declaration, or persisted plaintext secret.
      ja: AgentCard securitySchemes map、OAuth flow declaration、または永続化された plaintext secret。
    - zh: 对 webhook 来源已被验证或对任务操作已被授权的结论。
      en: A conclusion that webhook origin has been verified or task operations have been authorized.
      ja: webhook origin が検証済み、または task operation が authorized であるという結論。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: webhook authentication details
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      scheme 是协议字段，credentials 是敏感可选值。发送方根据 TaskPushNotificationConfig.authentication
      形成 HTTP Authorization 头；本体设计只允许用 <redacted> 表示值。接收方仍必须验证请求来源、
      任务标识和自身安全策略，不能仅因出现 AuthenticationInfo 就信任请求。
    en: >
      scheme is a protocol field and credentials is a sensitive optional value. A sender forms an
      HTTP Authorization header from TaskPushNotificationConfig.authentication; ontology design allows
      only <redacted> representation for the value. A receiver must still validate request origin,
      task identity, and its own security policy rather than trust a request merely because
      AuthenticationInfo is present.
    ja: >
      scheme は protocol field、credentials は sensitive optional value である。sender は
      TaskPushNotificationConfig.authentication から HTTP Authorization header を形成する。ontology design
      は value を <redacted> としてだけ表せる。receiver は AuthenticationInfo があるだけで request を
      trust せず、request origin、task identity、自身の security policy を検証しなければならない。
  typical_input:
    - description:
        zh: 使用 Bearer 方案的 webhook 认证配置，凭据值不公开。
        en: Webhook authentication configuration using Bearer scheme with undisclosed credential value.
        ja: credential value を公開しない Bearer scheme の webhook authentication configuration。
      format: |
        {"scheme":"Bearer","credentials":"<redacted>"}
      source_claims: [a2a-v1-authentication-info-fields, moonweave-a2a-authentication-secret-boundary]
  typical_output:
    - description:
        zh: 用于 webhook HTTP 请求的认证头形状，不含真实 token。
        en: Authentication-header shape for a webhook HTTP request without a real token.
        ja: 実際の token を含まない webhook HTTP request の authentication-header shape。
      format: |
        Authorization: Bearer <redacted>
      source_claims: [a2a-v1-push-authentication-header, moonweave-a2a-authentication-secret-boundary]
  reference_implementations:
    - name: A2A Protocol v1 AuthenticationInfo
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AuthenticationInfo fields and their use for push-notification HTTP authentication.
structure:
  identity_keys: [scheme]
  fields:
    - id: scheme
      labels:
        zh: HTTP 认证方案
        en: HTTP authentication scheme
        ja: HTTP authentication scheme
      definitions:
        zh: IANA 注册的 HTTP 认证方案名称，例如 Bearer、Basic 或 Digest；名称大小写不敏感。
        en: The name of an IANA-registered HTTP authentication scheme, such as Bearer, Basic, or Digest; names are case-insensitive.
        ja: Bearer、Basic、Digest など IANA-registered HTTP authentication scheme の名称。name は case-insensitive である。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Bearer
      allowed_values: []
      source_claims: [a2a-v1-authentication-info-fields]
    - id: credentials
      labels:
        zh: 认证凭据
        en: Authentication credentials
        ja: authentication credentials
      definitions:
        zh: 可选的推送通知凭据字符串，格式由 scheme 决定；真实值是秘密。
        en: An optional push-notification credential string whose format is determined by scheme; the real value is secret.
        ja: scheme が format を決める任意の push-notification credential string。実際の value は secret である。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: <redacted>
      allowed_values: []
      source_claims: [a2a-v1-authentication-info-fields, moonweave-a2a-authentication-secret-boundary]
  constraints:
    - id: authentication-info-scheme-and-secret-boundary
      severity: error
      expression_language: plain
      expression: AuthenticationInfo must provide an IANA HTTP authentication scheme and may provide scheme-formatted credentials, but ontology records and examples must never contain actual credential values or imply authorization success.
      explanation:
        zh: 认证对象描述头格式；它不代替来源验证、任务授权或秘密管理。
        en: The authentication object describes header format; it does not replace source verification, task authorization, or secret management.
        ja: authentication object は header format を記述する。source verification、task authorization、secret management を置き換えない。
      source_claims: [a2a-v1-authentication-info-fields, moonweave-a2a-authentication-secret-boundary]
  required_relations: []
examples:
  - id: authentication-info-positive-bearer
    labels:
      zh: AuthenticationInfo positive
      en: AuthenticationInfo positive
      ja: AuthenticationInfo positive
    descriptions:
      zh: A2A Protocol 映射 AuthenticationInfo：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps AuthenticationInfo: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol AuthenticationInfo: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {scheme: Bearer, credentials: "<redacted>"}

    related_node_ids:
      - AuthenticationInfo
      - TaskPushNotificationConfig
    related_relation_ids:
      - AuthenticationInfo-part_of-TaskPushNotificationConfig
    source_claims:
      - a2a-v1-authentication-info-fields
      - moonweave-a2a-authentication-secret-boundary

  - id: authentication-info-counterexample-plaintext-catalog
    labels:
      zh: AuthenticationInfo counterexample
      en: AuthenticationInfo counterexample
      ja: AuthenticationInfo counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 AuthenticationInfo DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style AuthenticationInfo DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 AuthenticationInfo ではない。
    field_values: {scheme: Bearer, credentials: "<redacted>"}

    related_node_ids:
      - AuthenticationInfo
      - TaskPushNotificationConfig
    related_relation_ids:
      - AuthenticationInfo-part_of-TaskPushNotificationConfig
    source_claims:
      - moonweave-a2a-authentication-secret-boundary

  - id: authentication-info-boundary-scheme-and-security-scheme
    labels:
      zh: AuthenticationInfo boundary
      en: AuthenticationInfo boundary
      ja: AuthenticationInfo boundary
    descriptions:
      zh: LiteLLM Router 选中 model 是运行时路由结果，不是 AuthenticationInfo 静态 RoutingPolicy 规约；LoadBalancing 决策与规约应分离。
      en: LiteLLM Router selected model is runtime routing result, not AuthenticationInfo static RoutingPolicy spec; separate LoadBalancing decisions from specification.
      ja: LiteLLM Router 選択 model は runtime で AuthenticationInfo 静的 RoutingPolicy ではない。
    field_values: {scheme: Bearer}

    related_node_ids:
      - AuthenticationInfo
      - TaskPushNotificationConfig
    related_relation_ids:
      - AuthenticationInfo-part_of-TaskPushNotificationConfig
    source_claims:
      - a2a-v1-authentication-info-fields
      - a2a-v1-push-authentication-header

  - id: authentication-info-instance-basic
    labels:
      zh: AuthenticationInfo instance
      en: AuthenticationInfo instance
      ja: AuthenticationInfo instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 AuthenticationInfo A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to AuthenticationInfo A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が AuthenticationInfo A2ATask に写像。
    field_values: {scheme: Basic, credentials: "<redacted>"}

    related_node_ids:
      - AuthenticationInfo
      - TaskPushNotificationConfig
    related_relation_ids:
      - AuthenticationInfo-part_of-TaskPushNotificationConfig
    source_claims:
      - a2a-v1-authentication-info-fields
      - moonweave-a2a-authentication-secret-boundary

parent_relation:
  id: AuthenticationInfo-part_of-TaskPushNotificationConfig
  predicate: part_of
  target: concept:TaskPushNotificationConfig
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是任务推送通知配置的认证组成部分
    en: is an authentication component of task push-notification configuration
    ja: task push-notification configuration の authentication component である
  definition:
    zh: Moonweave 将用于 webhook 通知的 AuthenticationInfo 组织为 TaskPushNotificationConfig 的可选组成部分。
    en: Moonweave organizes AuthenticationInfo used for webhook notification as an optional component of TaskPushNotificationConfig.
    ja: Moonweave は webhook notification に使う AuthenticationInfo を TaskPushNotificationConfig の任意 component として整理する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 可包含认证信息
      en: may have authentication information
      ja: authentication information を任意で持つ
  conditions: []
  temporal_scope: configuration-lifetime
  boundary_context: This composition is a Moonweave taxonomy relation and does not authorize any notification delivery.
  constraints:
    - id: authentication-info-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The composition edge organizes optional authentication description and cannot be interpreted as credential disclosure or successful webhook authorization.
      explanation:
        zh: 认证字段的本体归属不等于秘密泄露或授权成功。
        en: Ontology containment of authentication fields does not mean secret disclosure or authorization success.
        ja: authentication field の ontology containment は secret disclosure や authorization success を意味しない。
      source_claims: [moonweave-a2a-authentication-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-authentication-taxonomy]
  distinct_fact_rationale:
    zh: 关系表达可选配置组成，保留对实际安全操作的边界。
    en: The relation expresses optional configuration composition while retaining the boundary around actual security operations.
    ja: この relation は optional configuration composition を表し、実際の security operation の boundary を保持する。
relations: []
