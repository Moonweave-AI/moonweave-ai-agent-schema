    publisher: A2A Protocol Working Group
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines v1 AuthenticationInfo and its push-notification delivery use.
  - id: a2a-v1-protobuf
    title: A2A v1 Protocol Buffer definition
    publisher: A2A Project
    url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Declares AuthenticationInfo scheme and credentials fields and the TaskPushNotificationConfig authentication field.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines secret-safe ontology representation and A2A taxonomy mapping.
source_claims:
  - id: a2a-v1-authentication-info-fields
    source: a2a-v1-protobuf
    supports: A2A v1 AuthenticationInfo requires scheme and has optional credentials whose format depends on the selected HTTP authentication scheme.
    locator: "AuthenticationInfo message"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-push-authentication-header
    source: a2a-v1-specification
    supports: A2A v1 agents include notification authentication credentials in HTTP request headers according to TaskPushNotificationConfig authentication information.
    locator: "§4.3.3 Push Notification Payload"
    evidence_kind: normative
    confidence: high
  - id: moonweave-a2a-authentication-secret-boundary
    source: moonweave-ontology-design
    supports: Moonweave represents AuthenticationInfo credentials as redacted contract fields and never stores real secret values in ontology nodes or examples.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-a2a-authentication-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave places AuthenticationInfo as an optional authentication component of TaskPushNotificationConfig.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
