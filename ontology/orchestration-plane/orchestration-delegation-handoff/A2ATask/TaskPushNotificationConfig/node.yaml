schema: moonweave.ai/ontology-node/v1
id: TaskPushNotificationConfig
kind: concept
labels:
  zh: A2A 任务推送通知配置
  en: A2A Task Push Notification Configuration
  ja: A2A タスクプッシュ通知設定
semantics:
  short_definition:
    zh: A2A v1 中将任务关联到 webhook 交付端点的规范配置对象。
    en: The A2A v1 canonical configuration object that associates a task with a webhook delivery endpoint.
    ja: task を webhook delivery endpoint に関連付ける A2A v1 canonical configuration object。
  definition:
    zh: >
      TaskPushNotificationConfig 是当前 A2A v1 protobuf/API 的规范类型，用于为任务创建、获取、列出
      或删除推送通知配置。其当前字段为 tenant、id、taskId、url、token 和 authentication，其中 url
      是必填的 webhook URL。规范第 4.3.1 节标题仍写作 PushNotificationConfig，但当前生成表明确找不到
      独立的同名 message；本节点因此只记录 TaskPushNotificationConfig，而不把 v0.3 的嵌套
      pushNotificationConfig 形状宣称为当前 v1 类型。
    en: >
      TaskPushNotificationConfig is the canonical current A2A v1 protobuf/API type for creating,
      getting, listing, or deleting push-notification configuration for a task. Its current fields
      are tenant, id, taskId, url, token, and authentication, with url as the required webhook URL.
      Section 4.3.1 retains the heading PushNotificationConfig, but its generated table reports no
      separate message with that name; this node therefore records TaskPushNotificationConfig only
      and does not claim the v0.3 nested pushNotificationConfig shape is a current v1 type.
    ja: >
      TaskPushNotificationConfig は task の push-notification configuration を create、get、list、
      delete する current A2A v1 protobuf/API の canonical type である。current field は tenant、id、
      taskId、url、token、authentication であり、url は必須 webhook URL である。Section 4.3.1 は
      PushNotificationConfig という heading を保持するが、generated table はその名の独立 message を
      見つけられないと示す。この node はしたがって TaskPushNotificationConfig のみを記録し、v0.3 の
      nested pushNotificationConfig shape を current v1 type だと主張しない。
  why_needed:
    zh: 客户端可为长时间运行的任务配置异步更新交付，同时保留 A2A v1 的当前资源形状和安全边界。
    en: Clients can configure asynchronous update delivery for long-running tasks while retaining A2A v1's current resource shape and security boundary.
    ja: client は A2A v1 の current resource shape と security boundary を保ちながら long-running task の asynchronous update delivery を設定できる。
  includes:
    - zh: 必需 webhook url，以及可选的 taskId、id、tenant、token 和 AuthenticationInfo。
      en: A required webhook url and optional taskId, id, tenant, token, and AuthenticationInfo.
      ja: 必須 webhook url と、任意の taskId、id、tenant、token、AuthenticationInfo。
    - zh: Create、Get、List 和 Delete Task Push Notification Config 操作使用的资源表示。
      en: The resource representation used by Create, Get, List, and Delete Task Push Notification Config operations.
      ja: Create、Get、List、Delete Task Push Notification Config operation が使う resource representation。
  excludes:
    - zh: v0.3 的嵌套 pushNotificationConfig 对象形状或独立 current PushNotificationConfig protobuf message。
      en: The v0.3 nested pushNotificationConfig object shape or a separate current PushNotificationConfig protobuf message.
      ja: v0.3 の nested pushNotificationConfig object shape または独立した current PushNotificationConfig protobuf message。
    - zh: 一次 webhook POST 的 StreamResponse 负载、实际凭据值或投递确认。
      en: One webhook POST StreamResponse payload, actual credential values, or a delivery acknowledgement.
      ja: 一回の webhook POST StreamResponse payload、実際の credential value、または delivery acknowledgement。
  semantic_kind: official-protocol-object
  aliases:
    - language: en
      value: task webhook configuration
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      A2A v1 的 HTTP+JSON 绑定使用 POST /tasks/{taskId}/pushNotificationConfigs 创建配置，并在
      /tasks/{taskId}/pushNotificationConfigs/{configId} 读取或删除它。token 和 authentication
      是敏感材料或其配置位置；本体节点只描述字段契约，不能携带真实秘密。任务更新的实际请求体是
      StreamResponse，由 PushNotificationPayload 节点单独表示。
    en: >
      A2A v1 HTTP+JSON uses POST /tasks/{taskId}/pushNotificationConfigs to create a configuration
      and /tasks/{taskId}/pushNotificationConfigs/{configId} to read or delete it. When sent as
      part of SendMessageConfiguration, taskId should be empty. token and authentication are
      sensitive material or their configuration location; this ontology node
      describes the field contract only and cannot carry real secrets. The actual task-update body
      is StreamResponse and is represented separately by PushNotificationPayload.
    ja: >
      A2A v1 HTTP+JSON は POST /tasks/{taskId}/pushNotificationConfigs で configuration を create し、
      /tasks/{taskId}/pushNotificationConfigs/{configId} で read または delete する。token と
      authentication は sensitive material またはその configuration location である。この ontology
      node は field contract だけを記述し real secret を保持できない。実際の task-update body は
      StreamResponse であり PushNotificationPayload が別に表す。
  typical_input:
    - description:
        zh: 为 task-123 创建带 HTTPS webhook 的任务推送通知配置。
        en: Create a task push-notification configuration with an HTTPS webhook for task-123.
        ja: task-123 のために HTTPS webhook を持つ task push-notification configuration を作成する。
      format: |
        POST /tasks/task-123/pushNotificationConfigs
        Content-Type: application/a2a+json
        {"taskId":"task-123","url":"https://client.example/a2a/webhooks/task-updates","authentication":{"scheme":"Bearer"}}
      source_claims: [a2a-v1-task-push-config-api, a2a-v1-task-push-config-fields]
  typical_output:
    - description:
        zh: 包含服务器分配配置 id 的任务推送通知配置。
        en: A task push-notification configuration carrying a server-assigned configuration id.
        ja: server-assigned configuration id を持つ task push-notification configuration。
      format: |
        {"id":"config-456","taskId":"task-123","url":"https://client.example/a2a/webhooks/task-updates","authentication":{"scheme":"Bearer"}}
      source_claims: [a2a-v1-task-push-config-fields]
  reference_implementations:
    - name: A2A Protocol v1 TaskPushNotificationConfig
      url: https://a2a-protocol.org/latest/specification/
      description: Defines A2A v1 push-notification configuration operations, the current canonical task-scoped configuration shape, and HTTP+JSON bindings.
    - name: A2A v1 Protocol Buffer definition
      url: https://github.com/a2aproject/A2A/blob/main/specification/a2a.proto
      description: Declares the current TaskPushNotificationConfig message fields and task-scoped RPC operations.
structure:
  identity_keys: [taskId, id]
  fields:
    - id: tenant
      labels:
        zh: 租户路由标识
        en: Tenant routing identifier
        ja: tenant routing identifier
      definitions:
        zh: 可选的不透明路由标识；设置时必须匹配所选 AgentInterface 的 tenant。
        en: An optional opaque routing identifier that must match the selected AgentInterface tenant when one is set.
        ja: 任意の opaque routing identifier。設定時は selected AgentInterface tenant と一致しなければならない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: tenant-a
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields]
    - id: id
      labels:
        zh: 配置标识符
        en: Configuration identifier
        ja: configuration identifier
      definitions:
        zh: 任务推送通知配置的唯一标识符，通常由服务器在创建后提供。
        en: The unique identifier of a task push-notification configuration, normally provided by the server after creation.
        ja: task push-notification configuration の unique identifier。通常は create 後に server が提供する。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: config-456
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields]
    - id: taskId
      labels:
        zh: 任务标识符
        en: Task identifier
        ja: task identifier
      definitions:
        zh: 可选的 A2A 任务标识符；在任务范围资源操作中用于关联任务，而作为 SendMessageConfiguration 发送时应为空。
        en: An optional A2A task identifier used to associate a task in task-scoped resource operations; it should be empty when sent in SendMessageConfiguration.
        ja: task-scoped resource operation で task を関連付ける任意の A2A task identifier。SendMessageConfiguration で送る場合は空であるべきである。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: task-123
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields, a2a-v1-task-push-config-api]
    - id: url
      labels:
        zh: Webhook URL
        en: Webhook URL
        ja: webhook URL
      definitions:
        zh: 代理向其发送任务更新通知的必需 URL；生产部署应使用 HTTPS。
        en: The required URL to which the agent sends task-update notifications; production deployments should use HTTPS.
        ja: agent が task-update notification を送る必須 URL。production deployment では HTTPS を使うべきである。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://client.example/a2a/webhooks/task-updates
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields, a2a-v1-push-security]
    - id: token
      labels:
        zh: 任务或会话令牌
        en: Task or session token
        ja: task or session token
      definitions:
        zh: 可选的、对任务或会话唯一的令牌；其值是秘密，不应写入本体节点或示例。
        en: An optional token unique to a task or session; its value is secret and must not be written into ontology nodes or examples.
        ja: task または session に一意な任意 token。その value は secret で ontology node や example に書いてはならない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: <redacted-task-token>
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields, moonweave-a2a-v1-secret-boundary]
    - id: authentication
      labels:
        zh: 通知认证信息
        en: Notification authentication information
        ja: notification authentication information
      definitions:
        zh: 可选的 AuthenticationInfo，用于发送 webhook 通知时形成 HTTP 认证头。
        en: Optional AuthenticationInfo used to form HTTP authentication headers when sending webhook notifications.
        ja: webhook notification 送信時に HTTP authentication header を形成する任意の AuthenticationInfo。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"scheme":"Bearer"}'
      allowed_values: []
      source_claims: [a2a-v1-task-push-config-fields, a2a-v1-push-payload-delivery]
  constraints:
    - id: task-push-config-requires-task-and-url
      severity: error
      expression_language: plain
      expression: A TaskPushNotificationConfig must include url and use the current flat v1 shape; taskId is conditionally populated by its operation context, and ontology records must not embed actual token or credential values.
      explanation:
        zh: v1 配置要求 url；taskId 的填充取决于操作上下文，旧嵌套形状和明文秘密都不能替代当前契约。
        en: The v1 configuration requires url; taskId population depends on operation context, and neither a legacy nested shape nor plaintext secrets can replace the current contract.
        ja: v1 configuration は url を要求する。taskId の設定は operation context に依存し、legacy nested shape も plaintext secret も current contract を置き換えられない。
      source_claims: [a2a-v1-task-push-config-fields, a2a-v1-task-push-config-send-message-boundary, moonweave-a2a-v1-secret-boundary]
  required_relations: []
examples:
  - id: task-push-config-positive-create
    labels:
      zh: TaskPushNotificationConfig positive
      en: TaskPushNotificationConfig positive
      ja: TaskPushNotificationConfig positive
    descriptions:
      zh: "A2A Protocol 映射 TaskPushNotificationConfig：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps TaskPushNotificationConfig: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol TaskPushNotificationConfig: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {taskId: task-123, url: "https://client.example/a2a/webhooks/task-updates", authentication: "'{\\"scheme\\":\\"Bearer\\"}'"}

    related_node_ids:
      - TaskPushNotificationConfig
      - A2ATask
    related_relation_ids:
      - TaskPushNotificationConfig-part_of-A2ATask
    source_claims:
      - a2a-v1-task-push-config-api
      - a2a-v1-task-push-config-fields

  - id: task-push-config-counterexample-v03-nested
    labels:
      zh: TaskPushNotificationConfig counterexample
      en: TaskPushNotificationConfig counterexample
      ja: TaskPushNotificationConfig counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 TaskPushNotificationConfig DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style TaskPushNotificationConfig DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 TaskPushNotificationConfig ではない。
    field_values: {taskId: task-123, url: "https://client.example/a2a/webhooks/task-updates"}

    related_node_ids:
      - TaskPushNotificationConfig
      - A2ATask
    related_relation_ids:
      - TaskPushNotificationConfig-part_of-A2ATask
    source_claims:
      - a2a-v1-task-push-config-fields

  - id: task-push-config-boundary-config-and-payload
    labels:
      zh: TaskPushNotificationConfig boundary
      en: TaskPushNotificationConfig boundary
      ja: TaskPushNotificationConfig boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 TaskPushNotificationConfig 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not TaskPushNotificationConfig static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で TaskPushNotificationConfig 静的 RetryPolicy ではない。
    field_values: {taskId: task-123, url: "https://client.example/a2a/webhooks/task-updates"}

    related_node_ids:
      - TaskPushNotificationConfig
      - A2ATask
    related_relation_ids:
      - TaskPushNotificationConfig-part_of-A2ATask
    source_claims:
      - a2a-v1-push-payload-delivery

  - id: task-push-config-instance-rest-resource
    labels:
      zh: TaskPushNotificationConfig instance
      en: TaskPushNotificationConfig instance
      ja: TaskPushNotificationConfig instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 TaskPushNotificationConfig A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to TaskPushNotificationConfig A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が TaskPushNotificationConfig A2ATask に写像。
    field_values: {id: config-456, taskId: task-123, url: "https://client.example/a2a/webhooks/task-updates"}

    related_node_ids:
      - TaskPushNotificationConfig
      - A2ATask
    related_relation_ids:
      - TaskPushNotificationConfig-part_of-A2ATask
    source_claims:
      - a2a-v1-task-push-config-api

