      severity: error
      expression_language: plain
      expression: The composition edge is a Moonweave ontology organization of task-scoped configuration and must not be read as a replacement for A2A Create, Get, List, or Delete operation semantics.
      explanation:
        zh: 本地分类边不能替代 A2A 资源创建、读取、列出或删除操作。
        en: A local taxonomy edge cannot replace A2A resource creation, retrieval, listing, or deletion operations.
        ja: ローカル taxonomy edge は A2A resource の creation、retrieval、listing、deletion operation を置き換えられない。
      source_claims: [moonweave-a2a-task-push-config-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-task-push-config-taxonomy]
  distinct_fact_rationale:
    zh: 关系仅表达本体中的任务范围归属，不重新定义 A2A 资源生命周期。
    en: The relation expresses task-scoped ontology containment only and does not redefine A2A resource lifecycle.
    ja: この relation は task-scoped ontology containment のみを表し、A2A resource lifecycle を再定義しない。
