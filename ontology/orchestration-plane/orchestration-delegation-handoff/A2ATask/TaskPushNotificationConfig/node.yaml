    locator: "TaskPushNotificationConfig message"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-task-push-config-api
    source: a2a-v1-protobuf
    supports: A2A v1 exposes Create, Get, List, and Delete TaskPushNotificationConfig operations with task-scoped HTTP+JSON paths.
    locator: "A2AService push notification configuration RPCs"
