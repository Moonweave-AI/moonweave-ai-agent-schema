schema: moonweave.ai/ontology-node/v1
id: A2AAgentInterface
kind: concept
labels:
  zh: A2A 智能体接口
  en: A2A agent interface
  ja: A2A エージェントインターフェース
semantics:
  short_definition:
    zh: AgentCard 中声明某个可访问端点、协议绑定、版本以及可选租户范围的接口记录。
    en: An interface record in an AgentCard that declares an accessible endpoint, protocol binding, version, and optional tenant scope.
    ja: AgentCard 内でアクセス可能なエンドポイント、プロトコルバインディング、バージョン、任意のテナント範囲を宣言するインターフェース記録。
  definition:
    zh: A2A AgentInterface 指定客户端可用来访问智能体的 url、protocolBinding 和 protocolVersion，并可选地指定 tenant。规范定义 JSONRPC、GRPC 和 HTTP+JSON 为核心绑定；生产接口 URL 应使用 HTTPS。若接口声明 tenant，则请求中的 tenant 必须与之匹配。该记录描述访问方法，而不是网络连通性保证、认证凭据或本地任务移交。
    en: An A2A AgentInterface specifies the url, protocolBinding, and protocolVersion that a client can use to access an agent, and it may specify tenant. The specification defines JSONRPC, GRPC, and HTTP+JSON as core bindings; production interface URLs should use HTTPS. When an interface declares tenant, the tenant in a request must match it. This record describes an access method, not a guarantee of network reachability, an authentication credential, or a local task handoff.
    ja: A2A AgentInterface は、クライアントがエージェントへアクセスするために使える url、protocolBinding、protocolVersion を指定し、tenant を任意で指定できる。仕様は JSONRPC、GRPC、HTTP+JSON をコアバインディングとして定義し、本番インターフェース URL は HTTPS を使うべきである。インターフェースが tenant を宣言する場合、要求内の tenant はそれと一致しなければならない。この記録はアクセス方法を記述するものであり、ネットワーク到達可能性の保証、認証資格情報、ローカルタスクハンドオフではない。
  why_needed:
    zh: 发现客户端需要明确的端点和协议版本，才能选择兼容传输方式并避免把请求发送到错误的租户范围。
    en: A discovery client needs an explicit endpoint and protocol version to choose a compatible transport and avoid sending a request to the wrong tenant scope.
    ja: 発見クライアントには、互換性のある転送を選び、誤ったテナント範囲へ要求を送らないために、明示的なエンドポイントとプロトコルバージョンが必要である。
  includes:
    - zh: URL、协议绑定和协议版本。
      en: A URL, protocol binding, and protocol version.
      ja: URL、プロトコルバインディング、プロトコルバージョン。
    - zh: 可选的租户标识。
      en: An optional tenant identifier.
      ja: 任意のテナント識別子。
  excludes:
    - zh: Bearer 令牌、私钥或其他认证秘密。
      en: A bearer token, private key, or other authentication secret.
      ja: bearer トークン、秘密鍵、その他の認証シークレット。
    - zh: 将任务职责从一个本地工作者转给另一个工作者的记录。
      en: A record that transfers task responsibility from one local worker to another.
      ja: タスク責任を一つのローカルワーカーから別のワーカーへ移す記録。
  semantic_kind: information
  aliases:
    - language: en
      value: AgentInterface
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 客户端从 AgentCard.supportedInterfaces 选择一条接口记录，并使用其 URL、绑定和版本构造请求。生产部署使用 HTTPS URL；若接口带 tenant，客户端在请求中传入相同值。接口声明并不消除安全方案、网络错误处理或本地移交治理的需要。
    en: A client selects one record from AgentCard.supportedInterfaces and uses its URL, binding, and version to construct a request. Production deployments use an HTTPS URL; if the interface carries tenant, the client sends the same value in the request. Declaring an interface does not remove the need for security schemes, network error handling, or local handoff governance.
    ja: クライアントは AgentCard.supportedInterfaces から一つの記録を選び、その URL、バインディング、バージョンを使って要求を構成する。本番配備では HTTPS URL を使い、インターフェースが tenant を持つ場合、クライアントは要求に同じ値を送る。インターフェースの宣言は、安全方式、ネットワークエラー処理、ローカルハンドオフガバナンスの必要性をなくさない。
  typical_input:
    - description: A card exposes a tenant-scoped JSONRPC interface over HTTPS.
      format: |
        {
          "url": "https://agent.example.com/a2a",
          "protocolBinding": "JSONRPC",
          "protocolVersion": "1.0",
          "tenant": "tenant-research"
        }
      source_claims: [a2a-agent-interface-data-model]
  typical_output:
    - description: The client selects the endpoint and sends a request with the matching tenant.
      format: |
        {
          "endpoint": "https://agent.example.com/a2a",
          "protocolBinding": "JSONRPC",
          "protocolVersion": "1.0",
          "tenant": "tenant-research"
        }
      source_claims: [a2a-agent-interface-data-model, a2a-agent-interface-tenant-match]
  reference_implementations:
    - name: A2A Protocol Specification — AgentInterface
      url: https://a2a-protocol.org/latest/specification/
      description: Defines required endpoint, binding, version, and optional tenant fields, including core bindings and production HTTPS guidance.
structure:
  identity_keys: [url, protocolBinding, protocolVersion]
  fields:
    - id: url
      labels:
        zh: 地址
        en: URL
        ja: URL
      definitions:
        zh: 智能体接口的可访问地址。
        en: The accessible address for the agent interface.
        ja: エージェントインターフェースのアクセス可能なアドレス。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://agent.example.com/a2a
      allowed_values: []
      source_claims: [a2a-agent-interface-data-model, a2a-agent-interface-https-guidance]
    - id: protocolBinding
      labels:
        zh: 协议绑定
        en: Protocol binding
        ja: プロトコルバインディング
      definitions:
        zh: 用于访问该 URL 的 A2A 协议绑定。
        en: The A2A protocol binding used to access the URL.
        ja: URL へアクセスするために使う A2A プロトコルバインディング。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: JSONRPC
      allowed_values: [JSONRPC, GRPC, HTTP+JSON]
      source_claims: [a2a-agent-interface-data-model, a2a-agent-interface-core-bindings]
    - id: protocolVersion
      labels:
        zh: 协议版本
        en: Protocol version
        ja: プロトコルバージョン
      definitions:
        zh: 所声明协议绑定的版本标识。
        en: The version identifier for the declared protocol binding.
        ja: 宣言されたプロトコルバインディングのバージョン識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1.0
      allowed_values: []
      source_claims: [a2a-agent-interface-data-model]
    - id: tenant
      labels:
        zh: 租户
        en: Tenant
        ja: テナント
      definitions:
        zh: 可选的接口租户范围标识。
        en: An optional tenant-scope identifier for the interface.
        ja: インターフェースの任意テナント範囲識別子。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: tenant-research
      allowed_values: []
      source_claims: [a2a-agent-interface-data-model, a2a-agent-interface-tenant-match]
  constraints:
    - id: a2a-agent-interface-required-connection-fields
      severity: error
      expression_language: plain
      expression: An AgentInterface must provide url, protocolBinding, and protocolVersion.
      explanation:
        zh: 缺少任一必填字段会使客户端无法确定应向何处、使用何种绑定和版本发送请求。
        en: Omitting any required field prevents a client from determining where and with which binding and version to send a request.
        ja: 必須フィールドを一つでも省略すると、クライアントはどこへ、どのバインディングとバージョンで要求を送るかを決められない。
      source_claims: [a2a-agent-interface-data-model]
    - id: a2a-agent-interface-tenant-must-match
      severity: error
      expression_language: plain
      expression: When an interface declares tenant, the tenant in a request must match the declared tenant.
      explanation:
        zh: 租户范围不匹配时，请求不得被视为对该接口记录的有效使用。
        en: When tenant scope differs, the request must not be treated as valid use of that interface record.
        ja: テナント範囲が異なる場合、要求をそのインターフェース記録の有効な使用として扱ってはならない。
      source_claims: [a2a-agent-interface-tenant-match]
    - id: a2a-agent-interface-production-https
      severity: warning
      expression_language: plain
      expression: A production AgentInterface URL should use HTTPS.
      explanation:
        zh: HTTPS 是规范给出的生产接口 URL 指导；本地测试环境的 URL 需要在部署治理中明确处理。
        en: HTTPS is the specification's production URL guidance; URLs for local test environments need explicit deployment governance.
        ja: HTTPS は仕様が示す本番 URL ガイダンスである。ローカルテスト環境の URL は明示的な配備ガバナンスで扱う必要がある。
      source_claims: [a2a-agent-interface-https-guidance]
  required_relations: []
examples:
  - id: a2a-agent-interface-positive-jsonrpc
    labels:
      zh: A2AAgentInterface positive
      en: A2AAgentInterface positive
      ja: A2AAgentInterface positive
    descriptions:
      zh: "A2A Protocol 映射 A2AAgentInterface：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2AAgentInterface: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2AAgentInterface: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {url: "https://agent.example.com/a2a", protocolBinding: JSONRPC, protocolVersion: 1.0}

    related_node_ids:
      - A2AAgentInterface
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-interface-data-model
      - a2a-agent-interface-core-bindings
      - a2a-agent-interface-https-guidance

  - id: a2a-agent-interface-counterexample-missing-version
    labels:
      zh: A2AAgentInterface counterexample
      en: A2AAgentInterface counterexample
      ja: A2AAgentInterface counterexample
    descriptions:
      zh: 硬编码单一 model 无 Router/routing_strategy 不能作为 LiteLLM 式 A2AAgentInterface ModelRouting。
      en: Hard-coded single model without Router/routing_strategy cannot serve as LiteLLM-style A2AAgentInterface ModelRouting.
      ja: Router なし単一 model は LiteLLM 式 A2AAgentInterface ではない。
    field_values: {url: "https://agent.example.com/a2a", protocolBinding: JSONRPC}

    related_node_ids:
      - A2AAgentInterface
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-interface-data-model

  - id: a2a-agent-interface-boundary-tenant-match
    labels:
      zh: A2AAgentInterface boundary
      en: A2AAgentInterface boundary
      ja: A2AAgentInterface boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 A2AAgentInterface 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not A2AAgentInterface routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で A2AAgentInterface routing spec ではない。
    field_values: {url: "https://agent.example.com/a2a", protocolBinding: "HTTP+JSON", protocolVersion: 1.0, tenant: tenant-research, requestTenant: tenant-research}

    related_node_ids:
      - A2AAgentInterface
      - A2AAgentCard
      - A2ASendMessageRequest
    related_relation_ids: []
    source_claims:
      - a2a-agent-interface-data-model
      - a2a-agent-interface-tenant-match

  - id: a2a-agent-interface-instance-grpc
    labels:
      zh: A2AAgentInterface instance
      en: A2AAgentInterface instance
      ja: A2AAgentInterface instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AAgentInterface A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AAgentInterface A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AAgentInterface A2ATask に写像。
    field_values: {url: "https://agent.example.com/grpc", protocolBinding: GRPC, protocolVersion: 1.0}

    related_node_ids:
      - A2AAgentInterface
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-interface-data-model
      - a2a-agent-interface-core-bindings

