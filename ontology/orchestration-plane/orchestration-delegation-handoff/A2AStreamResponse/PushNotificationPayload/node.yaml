schema: moonweave.ai/ontology-node/v1
id: PushNotificationPayload
kind: concept
labels:
  zh: A2A 推送通知负载
  en: A2A Push Notification Payload
  ja: A2A プッシュ通知ペイロード
semantics:
  short_definition:
    zh: A2A v1 代理向配置的 webhook 发送的 StreamResponse HTTP POST 负载。
    en: The A2A v1 StreamResponse HTTP POST payload an agent sends to a configured webhook.
    ja: agent が configured webhook に送る A2A v1 StreamResponse HTTP POST payload。
  definition:
    zh: >
      PushNotificationPayload 是 A2A v1 规范定义的 webhook 交付形状，而不是独立 protobuf message。
      当任务更新发生时，代理向配置的 webhook URL 发送 Content-Type 为 application/a2a+json 的 HTTP POST；
      请求体采用 StreamResponse 格式，并且恰好包含 task、message、statusUpdate 或 artifactUpdate 中的一项。
      它不是 TaskPushNotificationConfig 本身，也不能携带多个并列事件或将 v0.3 Part 分型当作当前负载模型。
    en: >
      PushNotificationPayload is the A2A v1 specification-defined webhook delivery shape rather than
      a separate protobuf message. When a task update occurs, an agent sends HTTP POST with
      Content-Type application/a2a+json to the configured webhook URL; its body uses StreamResponse
      format and contains exactly one of task, message, statusUpdate, or artifactUpdate. It is not
      TaskPushNotificationConfig itself and cannot carry multiple peer events or treat v0.3 Part
      typing as the current payload model.
    ja: >
      PushNotificationPayload は独立した protobuf message ではなく、A2A v1 specification が定義する
      webhook delivery shape である。task update が起きると agent は configured webhook URL に
      Content-Type application/a2a+json の HTTP POST を送る。body は StreamResponse format を使い、
      task、message、statusUpdate、artifactUpdate のちょうど一つを含む。これは
      TaskPushNotificationConfig 自体ではなく、複数の peer event を持てず、v0.3 Part typing を current
      payload model として扱えない。
  why_needed:
    zh: webhook 接收方可用与流式操作相同的事件契约处理异步任务更新，并验证正确任务和来源。
    en: A webhook receiver can handle asynchronous task updates with the same event contract as streaming operations and validate the expected task and source.
    ja: webhook receiver は streaming operation と同じ event contract で asynchronous task update を処理し、期待する task と source を検証できる。
  includes:
    - zh: POST 请求、application/a2a+json 内容类型、认证头和 StreamResponse one-of body。
      en: A POST request, application/a2a+json content type, authentication header, and StreamResponse one-of body.
      ja: POST request、application/a2a+json content type、authentication header、StreamResponse one-of body。
    - zh: task、message、statusUpdate 或 artifactUpdate 的单一任务更新事件。
      en: One task-update event of task, message, statusUpdate, or artifactUpdate.
      ja: task、message、statusUpdate、artifactUpdate の一つの task-update event。
  excludes:
    - zh: webhook 配置资源、多个 StreamResponse 事件的批量数组或客户端发起的 A2A 请求。
      en: A webhook configuration resource, a batch array of multiple StreamResponse events, or a client-originated A2A request.
      ja: webhook configuration resource、複数 StreamResponse event の batch array、または client-originated A2A request。
    - zh: v0.3 Part kind 判别器作为当前 A2A v1 请求体要求。
      en: A v0.3 Part kind discriminator as a current A2A v1 request-body requirement.
      ja: current A2A v1 request-body requirement としての v0.3 Part kind discriminator。
  semantic_kind: official-protocol-delivery-shape
  aliases:
    - language: en
      value: webhook StreamResponse delivery
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      webhook_url 来自 TaskPushNotificationConfig，认证头按其 AuthenticationInfo 形成。body 不是新包装对象，
      而是 StreamResponse one-of：task、message、statusUpdate 或 artifactUpdate。接收方必须以 HTTP 2xx
      确认成功、验证 taskId 符合预期，并应以幂等方式处理可能重复的通知。
    en: >
      webhook_url comes from TaskPushNotificationConfig and the authentication header is formed from
      its AuthenticationInfo. The body is not a new wrapper object but a StreamResponse one-of:
      task, message, statusUpdate, or artifactUpdate. A receiver must acknowledge success with HTTP
      2xx, validate expected taskId, and should handle possible duplicate notifications idempotently.
    ja: >
      webhook_url は TaskPushNotificationConfig から来て、authentication header はその
      AuthenticationInfo から形成される。body は新しい wrapper object ではなく、task、message、
      statusUpdate、artifactUpdate の StreamResponse one-of である。receiver は HTTP 2xx で成功を
      acknowledge し、期待する taskId を検証し、重複通知を idempotent に処理すべきである。
  typical_input:
    - description:
        zh: 代理向 webhook 发送的状态更新 StreamResponse。
        en: A status-update StreamResponse sent by an agent to a webhook.
        ja: agent が webhook に送る status-update StreamResponse。
      format: |
        POST https://client.example/a2a/webhooks/task-updates
        Content-Type: application/a2a+json
        {"statusUpdate":{"taskId":"task-123","contextId":"context-42","status":{"state":"TASK_STATE_WORKING"}}}
      source_claims: [a2a-v1-push-payload-shape, a2a-v1-push-payload-delivery]
  typical_output:
    - description:
        zh: 接收方成功处理通知后的 HTTP 确认。
        en: HTTP acknowledgement after a receiver successfully handles a notification.
        ja: receiver が notification を正常に処理した後の HTTP acknowledgement。
      format: |
        HTTP/1.1 204 No Content
      source_claims: [a2a-v1-push-payload-delivery]
  reference_implementations:
    - name: A2A Protocol v1 Push Notification Payload
      url: https://a2a-protocol.org/latest/specification/
      description: Defines webhook POST delivery as a StreamResponse one-of payload and receiver acknowledgement responsibilities.
structure:
  identity_keys: [webhook_url, selected_event]
  fields:
    - id: webhook_url
      labels:
        zh: Webhook URL
        en: Webhook URL
        ja: webhook URL
      definitions:
        zh: 从关联 TaskPushNotificationConfig 取得的目标 webhook URL。
        en: The target webhook URL obtained from associated TaskPushNotificationConfig.
        ja: 関連する TaskPushNotificationConfig から得る target webhook URL。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://client.example/a2a/webhooks/task-updates
      allowed_values: []
      source_claims: [a2a-v1-push-payload-delivery]
    - id: content_type
      labels:
        zh: 内容类型
        en: Content type
        ja: content type
      definitions:
        zh: webhook POST 请求必须使用的 A2A JSON 媒体类型。
        en: The A2A JSON media type required for the webhook POST request.
        ja: webhook POST request に必要な A2A JSON media type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: application/a2a+json
      allowed_values: [application/a2a+json]
      source_claims: [a2a-v1-push-payload-shape]
    - id: task
      labels:
        zh: 任务负载
        en: Task payload
        ja: task payload
      definitions:
        zh: StreamResponse one-of 中可选的当前 Task 对象。
        en: The optional current Task object in the StreamResponse one-of.
        ja: StreamResponse one-of 内の任意の current Task object。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"id":"task-123"}'
      allowed_values: []
      source_claims: [a2a-v1-push-payload-shape]
    - id: message
      labels:
        zh: 消息负载
        en: Message payload
        ja: message payload
      definitions:
        zh: StreamResponse one-of 中可选的代理 Message 对象。
        en: The optional agent Message object in the StreamResponse one-of.
        ja: StreamResponse one-of 内の任意の agent Message object。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"messageId":"message-1","role":"ROLE_AGENT"}'
      allowed_values: []
      source_claims: [a2a-v1-push-payload-shape]
    - id: statusUpdate
      labels:
        zh: 状态更新负载
        en: Status-update payload
        ja: status-update payload
      definitions:
        zh: StreamResponse one-of 中可选的 TaskStatusUpdateEvent 对象。
        en: The optional TaskStatusUpdateEvent object in the StreamResponse one-of.
        ja: StreamResponse one-of 内の任意の TaskStatusUpdateEvent object。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"taskId":"task-123","contextId":"context-42"}'
      allowed_values: []
      source_claims: [a2a-v1-push-payload-shape]
    - id: artifactUpdate
      labels:
        zh: 产物更新负载
        en: Artifact-update payload
        ja: artifact-update payload
      definitions:
        zh: StreamResponse one-of 中可选的 TaskArtifactUpdateEvent 对象。
        en: The optional TaskArtifactUpdateEvent object in the StreamResponse one-of.
        ja: StreamResponse one-of 内の任意の TaskArtifactUpdateEvent object。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"taskId":"task-123","contextId":"context-42","artifact":{"artifactId":"artifact-1"}}'
      allowed_values: []
      source_claims: [a2a-v1-push-payload-shape]
    - id: selected_event
      labels:
        zh: 已选事件种类
        en: Selected event kind
        ja: selected event kind
      definitions:
        zh: 用于本体校验的本地标签，指明四个 StreamResponse one-of 字段中实际存在的一个。
        en: A local validation label identifying the one actual field among the four StreamResponse one-of alternatives.
        ja: 四つの StreamResponse one-of alternative のうち実際に存在する一 field を識別するローカル validation label。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: statusUpdate
      allowed_values: [task, message, statusUpdate, artifactUpdate]
      source_claims: [moonweave-a2a-push-payload-profile]
  constraints:
    - id: push-payload-is-single-stream-response-event
      severity: error
      expression_language: plain
      expression: PushNotificationPayload must use HTTP POST with application/a2a+json and contain exactly one of task, message, statusUpdate, or artifactUpdate; a receiver must acknowledge success with HTTP 2xx and validate expected task identity.
      explanation:
        zh: A2A v1 webhook 负载复用 StreamResponse 的单一事件契约，不能批量或混合 one-of 字段。
        en: A2A v1 webhook payload reuses the single-event StreamResponse contract and cannot batch or mix one-of fields.
        ja: A2A v1 webhook payload は single-event StreamResponse contract を再利用し、one-of field を batch または mix できない。
      source_claims: [a2a-v1-push-payload-shape, a2a-v1-push-payload-delivery]
  required_relations: []
examples:
  - id: push-payload-positive-status-update
    labels:
      zh: PushNotificationPayload positive
      en: PushNotificationPayload positive
      ja: PushNotificationPayload positive
    descriptions:
      zh: "A2A Protocol 映射 PushNotificationPayload：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps PushNotificationPayload: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol PushNotificationPayload: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {webhook_url: "https://client.example/a2a/webhooks/task-updates", content_type: "application/a2a+json", statusUpdate: "'{\\"taskId\\":\\"task-123\", \"contextId\": "\\"context-42\\"}'", selected_event: statusUpdate}

    related_node_ids:
      - PushNotificationPayload
      - A2AStreamResponse
    related_relation_ids:
      - PushNotificationPayload-is_a-A2AStreamResponse
    source_claims:
      - a2a-v1-push-payload-shape
      - a2a-v1-push-payload-delivery

  - id: push-payload-counterexample-multiple-events
    labels:
      zh: PushNotificationPayload counterexample
      en: PushNotificationPayload counterexample
      ja: PushNotificationPayload counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 PushNotificationPayload DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style PushNotificationPayload DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 PushNotificationPayload ではない。
    field_values: {statusUpdate: "'{\\"taskId\\":\\"task-123\\"}'", artifactUpdate: "'{\\"taskId\\":\\"task-123\\"}'", selected_event: statusUpdate}

    related_node_ids:
      - PushNotificationPayload
      - A2AStreamResponse
    related_relation_ids:
      - PushNotificationPayload-is_a-A2AStreamResponse
    source_claims:
      - a2a-v1-push-payload-shape

  - id: push-payload-boundary-config-and-delivery
    labels:
      zh: PushNotificationPayload boundary
      en: PushNotificationPayload boundary
      ja: PushNotificationPayload boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 PushNotificationPayload 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not PushNotificationPayload static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で PushNotificationPayload 静的 RetryPolicy ではない。
    field_values: {webhook_url: "https://client.example/a2a/webhooks/task-updates", selected_event: task, task: "'{\\"id\\":\\"task-123\\"}'"}

    related_node_ids:
      - PushNotificationPayload
      - A2AStreamResponse
    related_relation_ids:
      - PushNotificationPayload-is_a-A2AStreamResponse
    source_claims:
      - a2a-v1-push-payload-delivery

  - id: push-payload-instance-artifact-update
    labels:
      zh: PushNotificationPayload instance
      en: PushNotificationPayload instance
      ja: PushNotificationPayload instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 PushNotificationPayload A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to PushNotificationPayload A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が PushNotificationPayload A2ATask に写像。
    field_values: {webhook_url: "https://client.example/a2a/webhooks/task-updates", artifactUpdate: "'{\\"taskId\\":\\"task-123\", \"contextId\": "\\"context-42\", \"artifact\":{\"artifactId\": "\\"artifact-1\\"}}'", selected_event: artifactUpdate}

    related_node_ids:
      - PushNotificationPayload
      - A2AStreamResponse
    related_relation_ids:
      - PushNotificationPayload-is_a-A2AStreamResponse
    source_claims:
      - a2a-v1-push-payload-shape

parent_relation:
  id: PushNotificationPayload-is_a-A2AStreamResponse
  predicate: is_a
  target: concept:A2AStreamResponse
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是以 webhook 交付的 A2A StreamResponse 本地视图
    en: is a webhook-delivered local view of A2A StreamResponse
    ja: webhook で delivery される A2A StreamResponse のローカル view である
  definition:
    zh: Moonweave 将 PushNotificationPayload 组织为 A2AStreamResponse 在 webhook 交付上下文中的本地视图。
    en: Moonweave organizes PushNotificationPayload as the webhook-delivery local view of A2AStreamResponse.
    ja: Moonweave は PushNotificationPayload を A2AStreamResponse の webhook-delivery ローカル view として整理する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有 webhook 交付视图
      en: has webhook-delivery view
      ja: webhook-delivery view を持つ
  conditions: []
  temporal_scope: per-delivery
  boundary_context: This local hierarchy reflects the v1 delivery use of StreamResponse and does not declare a separate PushNotificationPayload protobuf message.
  constraints:
    - id: push-payload-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: The is_a edge records webhook-delivery organization only and cannot be interpreted as a new standalone A2A v1 protobuf type.
      explanation:
        zh: 本地视图不会创造一个规范未声明的独立消息类型。
        en: A local view does not create a standalone message type that the specification has not declared.
        ja: ローカル view は specification が宣言していない standalone message type を作らない。
      source_claims: [moonweave-a2a-push-payload-taxonomy]
  examples: []
  source_claims: [moonweave-a2a-push-payload-taxonomy]
  distinct_fact_rationale:
    zh: 关系保留 StreamResponse 的规范语义，同时标明其 webhook 交付上下文。
    en: The relation retains StreamResponse normative semantics while marking its webhook delivery context.
    ja: この relation は StreamResponse normative semantics を保持しつつ webhook delivery context を示す。
relations: []
sources:
  - id: a2a-v1-specification
    title: Agent2Agent Protocol Specification
    publisher: A2A Protocol Working Group
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines v1 push-notification HTTP delivery, StreamResponse payload variants, acknowledgement, validation, and retry expectations.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines the local delivery-view taxonomy for a specification-defined StreamResponse payload.
source_claims:
  - id: a2a-v1-push-payload-shape
    source: a2a-v1-specification
    supports: A2A v1 webhook notification payloads use StreamResponse format and contain exactly one of task, message, statusUpdate, or artifactUpdate.
    locator: "§4.3.3 Push Notification Payload"
    evidence_kind: normative
    confidence: high
  - id: a2a-v1-push-payload-delivery
    source: a2a-v1-specification
    supports: A2A v1 agents send task updates by HTTP POST to configured webhook URLs with application/a2a+json, clients acknowledge success with HTTP 2xx, validate expected task ID, and should process duplicates idempotently.
    locator: "§4.3.3 Push Notification Payload"
    evidence_kind: normative
    confidence: high
  - id: moonweave-a2a-push-payload-profile
    source: moonweave-ontology-design
    supports: Moonweave uses selected_event as a local validation label for the one actual StreamResponse alternative and not as an A2A wire field.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-a2a-push-payload-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave organizes PushNotificationPayload as a webhook-delivery local view of A2AStreamResponse without inventing a standalone A2A protobuf message.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high