schema: moonweave.ai/ontology-node/v1
id: A2AStreamResponse
kind: concept
labels:
  zh: A2A 流式响应
  en: A2A stream response
  ja: A2A ストリーム応答
semantics:
  short_definition:
    zh: 在 A2A 流式调用中承载恰好一种任务、消息、状态更新或产物更新的响应联合体。
    en: A response union that carries exactly one Task, Message, status update, or Artifact update during an A2A streaming call.
    ja: A2A ストリーミング呼び出しで、Task、Message、状態更新、または Artifact 更新のいずれか一つだけを運ぶ応答ユニオン。
  definition:
    zh: A2A StreamResponse 是流式发送消息操作的响应记录。它可以包含 task、message、statusUpdate 或 artifactUpdate，但四个成员中必须且只能设置一个。它不是一次响应中同时打包多个事件的批处理容器，也不是本地流框架的任意数据块。
    en: An A2A StreamResponse is a response record for a streaming send-message operation. It can contain task, message, statusUpdate, or artifactUpdate, but exactly one of the four members must be set. It is not a batch container that packs multiple events into one response or an arbitrary chunk from a local streaming framework.
    ja: A2A StreamResponse は、ストリーミング送信メッセージ操作の応答レコードである。task、message、statusUpdate、artifactUpdate のいずれかを含められるが、四つのメンバーのうち設定できるのは必ず一つだけである。一つの応答に複数イベントを詰め込むバッチ容器や、ローカルストリーム基盤の任意チャンクではない。
  why_needed:
    zh: 流式客户端需要以统一包络接收不同类别的协议事件，同时仍能从单个已选成员确定如何处理该响应。
    en: A streaming client needs one uniform envelope for several protocol event types while still being able to determine handling from one selected member.
    ja: ストリーミングクライアントには複数のプロトコルイベント種別のための統一エンベロープが必要であり、同時に選択された一つのメンバーから処理方法を確定できなければならない。
  includes:
    - zh: 一个完整的 Task 响应。
      en: One complete Task response.
      ja: 一つの完全な Task 応答。
    - zh: 一条 Message、TaskStatusUpdateEvent 或 TaskArtifactUpdateEvent。
      en: One Message, TaskStatusUpdateEvent, or TaskArtifactUpdateEvent.
      ja: 一つの Message、TaskStatusUpdateEvent、または TaskArtifactUpdateEvent。
  excludes:
    - zh: 同时包含 task 和 message 等两个或更多成员的响应。
      en: A response containing two or more members such as both task and message.
      ja: task と message など二つ以上のメンバーを同時に含む応答。
    - zh: 没有任何联合体成员的空响应。
      en: An empty response with no union member.
      ja: ユニオンメンバーを一つも持たない空の応答。
  semantic_kind: information
  aliases:
    - language: en
      value: StreamResponse
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务端在流式发送消息期间，每次发送一个 StreamResponse。客户端先验证四个成员恰有一个存在，再按该成员的模型处理，例如渲染 message、合并 artifactUpdate，或更新任务状态。不要把多个成员填入同一对象以减少网络调用。
    en: During streaming send-message, the server sends one StreamResponse at a time. The client first verifies that exactly one of the four members exists, then handles that member's model, for example by rendering a message, merging an artifactUpdate, or updating Task state. Multiple members must not be filled into one object to reduce network calls.
    ja: ストリーミング送信メッセージ中、サーバーは一度に一つの StreamResponse を送る。クライアントはまず四つのメンバーのうち一つだけが存在することを検証し、そのモデルを処理する。たとえば message を描画し、artifactUpdate を統合し、または Task 状態を更新する。ネットワーク呼び出しを減らすために複数メンバーを一つのオブジェクトへ入れてはならない。
  typical_input:
    - description: The server has a task-status delta to send on an active streaming call.
      format: |
        {
          "statusUpdate": {
            "taskId": "task-20260718-001",
            "contextId": "ctx-quarterly-report",
            "status": {"state": "TASK_STATE_WORKING"}
          }
        }
      source_claims: [a2a-stream-response-union]
  typical_output:
    - description: The client dispatches the single statusUpdate member to its Task-status handler.
      format: |
        {
          "selectedMember": "statusUpdate",
          "taskId": "task-20260718-001",
          "state": "TASK_STATE_WORKING"
        }
      source_claims: [a2a-stream-response-union]
  reference_implementations:
    - name: A2A Protocol Specification — Stream Response
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the one-of response union for streaming send-message operations.
structure:
  identity_keys: []
  fields:
    - id: task
      labels:
        zh: 任务响应
        en: Task response
        ja: Task 応答
      definitions:
        zh: 流中返回的完整 A2A Task。
        en: The complete A2A Task returned in the stream.
        ja: ストリームで返される完全な A2A Task。
      datatype: A2ATask
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"id":"task-20260718-001","contextId":"ctx-quarterly-report","status":{"state":"TASK_STATE_WORKING"}}'
      allowed_values: []
      source_claims: [a2a-stream-response-union]
    - id: message
      labels:
        zh: 消息响应
        en: Message response
        ja: Message 応答
      definitions:
        zh: 流中返回的 A2A Message。
        en: The A2A Message returned in the stream.
        ja: ストリームで返される A2A Message。
      datatype: A2AMessage
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"messageId":"msg-20260718-001","role":"ROLE_AGENT","parts":[{"text":"Accepted"}]}'
      allowed_values: []
      source_claims: [a2a-stream-response-union]
    - id: statusUpdate
      labels:
        zh: 状态更新响应
        en: Status-update response
        ja: 状態更新応答
      definitions:
        zh: 流中返回的 A2A TaskStatusUpdateEvent。
        en: The A2A TaskStatusUpdateEvent returned in the stream.
        ja: ストリームで返される A2A TaskStatusUpdateEvent。
      datatype: A2ATaskStatusUpdateEvent
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"taskId":"task-20260718-001","contextId":"ctx-quarterly-report","status":{"state":"TASK_STATE_WORKING"}}'
      allowed_values: []
      source_claims: [a2a-stream-response-union]
    - id: artifactUpdate
      labels:
        zh: 产物更新响应
        en: Artifact-update response
        ja: Artifact 更新応答
      definitions:
        zh: 流中返回的 A2A TaskArtifactUpdateEvent。
        en: The A2A TaskArtifactUpdateEvent returned in the stream.
        ja: ストリームで返される A2A TaskArtifactUpdateEvent。
      datatype: A2ATaskArtifactUpdateEvent
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: '{"taskId":"task-20260718-001","contextId":"ctx-quarterly-report","artifact":{"artifactId":"artifact-report","parts":[{"text":"Summary"}]}}'
      allowed_values: []
      source_claims: [a2a-stream-response-union]
  constraints:
    - id: a2a-stream-response-exactly-one-member
      severity: error
      expression_language: plain
      expression: Exactly one of task, message, statusUpdate, and artifactUpdate must be present.
      explanation:
        zh: 该响应是互斥联合体。缺少成员或设置多个成员都会使客户端无法按协议确定单一事件类型。
        en: This response is an exclusive union. Omitting every member or setting multiple members prevents a client from determining one protocol event type.
        ja: この応答は排他的ユニオンである。すべてのメンバーを省略する、または複数メンバーを設定すると、クライアントは一つのプロトコルイベント種別を確定できない。
      source_claims: [a2a-stream-response-union]
  required_relations: []
examples:
  - id: a2a-stream-response-positive-task
    labels:
      zh: A2AStreamResponse positive
      en: A2AStreamResponse positive
      ja: A2AStreamResponse positive
    descriptions:
      zh: "A2A Protocol 映射 A2AStreamResponse：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2AStreamResponse: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2AStreamResponse: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {task: "'{\\"id\\":\\"task-20260718-001\", \"contextId\": "\\"ctx-quarterly-report\", \"status\":{\"state\": "\\"TASK_STATE_WORKING\\"}}'"}

    related_node_ids:
      - A2AStreamResponse
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-stream-response-union

  - id: a2a-stream-response-counterexample-two-members
    labels:
      zh: A2AStreamResponse counterexample
      en: A2AStreamResponse counterexample
      ja: A2AStreamResponse counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2AStreamResponse DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2AStreamResponse DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2AStreamResponse ではない。
    field_values: {task: "'{\\"id\\":\\"task-20260718-001\", \"contextId\": "\\"ctx-quarterly-report\", \"status\":{\"state\": "\\"TASK_STATE_WORKING\\"}}'", message: "'{\\"messageId\\":\\"msg-20260718-001\", \"role\": "\\"ROLE_AGENT\", \"parts\":[{\"text\": "\\"Accepted\\"}]}'"}

    related_node_ids:
      - A2AStreamResponse
      - A2ATask
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-stream-response-union

  - id: a2a-stream-response-boundary-artifact-update
    labels:
      zh: A2AStreamResponse boundary
      en: A2AStreamResponse boundary
      ja: A2AStreamResponse boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 A2AStreamResponse 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not A2AStreamResponse static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で A2AStreamResponse 静的 RetryPolicy ではない。
    field_values: {artifactUpdate: "'{\\"taskId\\":\\"task-20260718-001\", \"contextId\": "\\"ctx-quarterly-report\", \"artifact\":{\"artifactId\": "\\"artifact-report\", \"parts\":[{\"text\": "\\"End\\"}]}", \"lastChunk\": "true}'"}

    related_node_ids:
      - A2AStreamResponse
      - A2ATaskArtifactUpdateEvent
    related_relation_ids: []
    source_claims:
      - a2a-stream-response-union

  - id: a2a-stream-response-instance-status-update
    labels:
      zh: A2AStreamResponse instance
      en: A2AStreamResponse instance
      ja: A2AStreamResponse instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AStreamResponse A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AStreamResponse A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AStreamResponse A2ATask に写像。
    field_values: {statusUpdate: "'{\\"taskId\\":\\"task-20260718-001\", \"contextId\": "\\"ctx-quarterly-report\", \"status\":{\"state\": "\\"TASK_STATE_WORKING\\"}}'"}

    related_node_ids:
      - A2AStreamResponse
      - A2ATaskStatusUpdateEvent
      - A2ATaskStatus
    related_relation_ids: []
    source_claims:
      - a2a-stream-response-union

