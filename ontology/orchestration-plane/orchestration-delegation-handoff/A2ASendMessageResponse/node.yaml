schema: moonweave.ai/ontology-node/v1
id: A2ASendMessageResponse
kind: concept
labels:
  zh: A2A 发送消息响应
  en: A2A send-message response
  ja: A2A メッセージ送信応答
semantics:
  short_definition:
    zh: SendMessage 操作返回的一条 A2A Message 或 A2A Task。
    en: One A2A Message or A2A Task returned by the SendMessage operation.
    ja: SendMessage 操作が返す一つの A2A Message または A2A Task。
  definition:
    zh: A2A SendMessageResponse 是 SendMessage 操作的协议响应形状，而不是另一个独立服务器资源。成功响应必须是一个 Message 或一个 Task：Message 可直接回应调用方，Task 则表示服务器创建或推进的可追踪工作。它不包含本地委派选择、工作者分配或任意多结果集合。
    en: An A2A SendMessageResponse is the protocol response shape of the SendMessage operation rather than another independent server resource. A successful response is one Message or one Task. A Message can answer the caller directly, while a Task represents server-created or advanced trackable work. It does not contain local delegation selection, worker assignment, or an arbitrary multi-result collection.
    ja: A2A SendMessageResponse は、別の独立サーバーリソースではなく SendMessage 操作のプロトコル応答形状である。成功応答は一つの Message または一つの Task である。Message は呼出側へ直接応答でき、Task はサーバー作成または進行した追跡可能作業を表す。ローカル委任選択、ワーカー割当、任意の複数結果集合を含まない。
  why_needed:
    zh: 客户端需要知道一次消息操作是立即得到消息还是得到可继续跟踪的任务。明确联合响应避免客户端把暂时性消息误当任务，或把 TaskStatus、Artifact 和本地路由结果混入一个响应类型。
    en: A client needs to know whether one message operation immediately yields a message or a task it can continue to track. An explicit response union prevents temporary messages from being mistaken for tasks and keeps TaskStatus, Artifact, and local routing results out of the response type.
    ja: クライアントは、一つのメッセージ操作が即時メッセージを返すか、継続追跡可能な task を返すかを知る必要がある。明示的な応答ユニオンにより、一時的な message を task と誤認することを防ぎ、TaskStatus、Artifact、ローカルルーティング結果を応答型から除外できる。
  includes:
    - zh: 一条直接的 A2A Message 响应。
      en: One direct A2A Message response.
      ja: 一つの直接 A2A Message 応答。
    - zh: 一条可跟踪的 A2A Task 响应。
      en: One trackable A2A Task response.
      ja: 一つの追跡可能な A2A Task 応答。
  excludes:
    - zh: 同时返回 Message 和 Task 的复合成功响应。
      en: A compound successful response that returns Message and Task together.
      ja: Message と Task を同時に返す複合成功応答。
    - zh: 流式 StreamResponse 更新或推送事件包装。
      en: A streamed StreamResponse update or push-event wrapper.
      ja: ストリーミング StreamResponse 更新または push イベントラッパー。
  semantic_kind: information
  aliases:
    - language: en
      value: SendMessageResponse
      alias_kind: protocol-term
    - language: en
      value: SendMessage result
      alias_kind: operation-result
engineering:
  explanation:
    zh: 客户端发送 SendMessageRequest 后，绑定层将成功的结果反序列化为一个 Message 或 Task。收到 Message 时客户端可处理直接回复；收到 Task 时客户端可读取当前状态、获取产物并选择轮询、流式订阅或推送更新。调用方的内部工作者决策不属于此响应负载。
    en: After sending SendMessageRequest, a client binding deserializes the successful result as one Message or Task. On Message it can handle a direct reply. On Task it can read current status, retrieve artifacts, and choose polling, streaming, or push updates. Caller-internal worker decisions are not response payload.
    ja: SendMessageRequest の送信後、クライアントバインディングは成功結果を一つの Message または Task として逆シリアル化する。Message なら直接応答を処理でき、Task なら現在 status の読取、Artifact の取得、ポーリング・ストリーミング・push 更新の選択ができる。呼出側内部のワーカー決定は応答ペイロードではない。
  typical_input:
    - description: A client sends a request whose Message asks the agent to generate a report.
      format: |
        {
          "message": {
            "messageId": "msg-20260718-002",
            "role": "ROLE_USER",
            "parts": [{"text": "Generate the quarterly report."}]
          }
        }
      source_claims: [a2a-send-message-response-union]
  typical_output:
    - description: The operation returns a Task when report generation needs trackable work.
      format: |
        {
          "id": "task-20260718-001",
          "status": {"state": "TASK_STATE_WORKING"}
        }
      source_claims: [a2a-send-message-response-union]
  reference_implementations:
    - name: A2A Protocol Specification — SendMessage
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the successful SendMessage response as exactly one Message or Task.
structure:
  identity_keys: [result]
  fields:
    - id: result
      labels: {zh: 操作结果, en: Operation result, ja: 操作結果}
      definitions:
        zh: SendMessage 操作返回的一个 A2A Message 或 A2A Task。
        en: The one A2A Message or A2A Task returned by SendMessage.
        ja: SendMessage が返す一つの A2A Message または A2A Task。
      datatype: A2AMessage|A2ATask
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"id":"task-20260718-001","status":{"state":"TASK_STATE_WORKING"}}'
      allowed_values: []
      source_claims: [a2a-send-message-response-union]
  constraints:
    - id: a2a-send-message-response-is-exclusive
      severity: error
      expression_language: plain
      expression: A successful SendMessage response contains exactly one Message or one Task.
      explanation:
        zh: 响应联合保持调用方的分支处理明确，不能在单一成功结果中同时放入两种对象。
        en: The response union keeps caller branching explicit and cannot place both object kinds in one successful result.
        ja: 応答ユニオンは呼出側分岐を明示的に保ち、一つの成功結果に両オブジェクト種別を置けない。
      source_claims: [a2a-send-message-response-union]
    - id: a2a-send-message-response-is-not-stream-wrapper
      severity: error
      expression_language: plain
      expression: A SendMessage response is not a StreamResponse wrapper with task, message, statusUpdate, or artifactUpdate alternatives.
      explanation:
        zh: 普通发送操作的单结果联合与流式更新包装具有不同的协议形状。
        en: The normal send operation single-result union has a different protocol shape from a streaming update wrapper.
        ja: 通常の送信操作の単一結果ユニオンは、ストリーミング更新ラッパーと異なるプロトコル形状を持つ。
      source_claims: [a2a-send-message-response-union]
  required_relations: []
examples:
  - id: a2a-send-message-response-positive-task
    labels:
      zh: A2ASendMessageResponse positive
      en: A2ASendMessageResponse positive
      ja: A2ASendMessageResponse positive
    descriptions:
      zh: A2A Protocol 映射 A2ASendMessageResponse：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2ASendMessageResponse: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2ASendMessageResponse: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {result: "'{\\"id\\":\\"task-20260718-001", "status":{"state": "TASK_STATE_WORKING\\"}}'"}

    related_node_ids:
      - A2ASendMessageResponse
      - A2ASendMessageRequest
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-send-message-response-union

  - id: a2a-send-message-response-counterexample-two-results
    labels:
      zh: A2ASendMessageResponse counterexample
      en: A2ASendMessageResponse counterexample
      ja: A2ASendMessageResponse counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ASendMessageResponse DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ASendMessageResponse DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ASendMessageResponse ではない。
    field_values: {message: "'{\\"messageId\\":\\"msg-ack", "role": ROLE_AGENT, "parts":[{"text": "Accepted\\"}]}'", task: "'{\\"id\\":\\"task-20260718-001", "status":{"state": "TASK_STATE_WORKING\\"}}'"}

    related_node_ids:
      - A2ASendMessageResponse
      - A2AMessage
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-send-message-response-union

  - id: a2a-send-message-response-boundary-direct-message
    labels:
      zh: A2ASendMessageResponse boundary
      en: A2ASendMessageResponse boundary
      ja: A2ASendMessageResponse boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2ASendMessageResponse 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2ASendMessageResponse work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2ASendMessageResponse work_specification ではない。
    field_values: {result: "'{\\"messageId\\":\\"msg-ack", "role": ROLE_AGENT, "parts":[{"text": "I can answer directly.\\"}]}'"}

    related_node_ids:
      - A2ASendMessageResponse
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-send-message-response-union

  - id: a2a-send-message-response-instance-report-task
    labels:
      zh: A2ASendMessageResponse instance
      en: A2ASendMessageResponse instance
      ja: A2ASendMessageResponse instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ASendMessageResponse A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ASendMessageResponse A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ASendMessageResponse A2ATask に写像。
    field_values: {result: "'{\\"id\\":\\"task-20260718-001", "contextId": ctx-quarterly-report, "status":{"state": "TASK_STATE_WORKING\\"}}'"}

    related_node_ids:
      - A2ASendMessageResponse
      - A2ATask
      - A2ATaskStatus
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-send-message-response-union

