schema: moonweave.ai/ontology-node/v1
id: A2ATaskArtifactUpdateEvent
kind: concept
labels:
  zh: A2A 任务产物更新事件
  en: A2A task artifact update event
  ja: A2A タスク Artifact 更新イベント
semantics:
  short_definition:
    zh: 通知客户端某个 A2A Task 已生成或更新 Artifact 的增量事件。
    en: A delta event notifying a client that an A2A Task generated or updated an Artifact.
    ja: A2A Task が Artifact を生成または更新したことをクライアントへ通知する増分イベント。
  definition:
    zh: A2A TaskArtifactUpdateEvent 是任务生成或更新 Artifact 时发送的协议事件。它必须带 taskId、contextId 和 Artifact，并可带 append、lastChunk 与 metadata。append 表示内容追加到同 artifactId 的先前 Artifact，lastChunk 表示该产物的最终分块。它不是 TaskStatusUpdateEvent、完整 Task 或本地文件写入事件。
    en: An A2A TaskArtifactUpdateEvent is a protocol event sent when a Task generates or updates an Artifact. It must carry taskId, contextId, and Artifact and may carry append, lastChunk, and metadata. append adds content to a previous Artifact with the same artifactId, and lastChunk marks the final Artifact chunk. It is not TaskStatusUpdateEvent, a complete Task, or a local file-write event.
    ja: A2A TaskArtifactUpdateEvent は、Task が Artifact を生成または更新したときに送られるプロトコルイベントである。taskId、contextId、Artifact が必須で、append、lastChunk、metadata を任意に持てる。append は同じ artifactId の先行 Artifact に内容を追加し、lastChunk は最終 Artifact チャンクを示す。TaskStatusUpdateEvent、完全な Task、ローカルファイル書込みイベントではない。
  why_needed:
    zh: 长结果常分段产生。该事件使客户端接收并组合内容增量，无需反复传输完整 Task，也无需把输出误建模为生命周期状态消息。
    en: Long results are often produced in pieces. This event lets a client receive and combine content deltas without retransmitting a complete Task or modeling output as a lifecycle status message.
    ja: 長い結果はしばしば断片的に生成される。このイベントにより、クライアントは完全な Task を再送せず、出力をライフサイクル status message としてモデル化せずに内容増分を受け取り結合できる。
  includes:
    - zh: 任务、上下文和生成或更新的 Artifact。
      en: Task, context, and the generated or updated Artifact.
      ja: Task、context、生成または更新された Artifact。
    - zh: 可选的追加、最后分块和元数据提示。
      en: Optional append, final-chunk, and metadata hints.
      ja: 任意の追加、最終チャンク、metadata ヒント。
  excludes:
    - zh: 只传递任务生命周期状态的更新。
      en: An update that only communicates Task lifecycle status.
      ja: Task ライフサイクル status だけを伝える更新。
    - zh: 任意本地文件或对象存储变更。
      en: An arbitrary local file or object-store change.
      ja: 任意のローカルファイルまたはオブジェクトストア変更。
  semantic_kind: information
  aliases:
    - language: en
      value: TaskArtifactUpdateEvent
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务器在 Artifact 生成或变更时发出事件。客户端按 taskId、contextId 和 artifactId 关联增量；append 为 true 时追加内容，lastChunk 为 true 时关闭该产物的流式呈现。Task 是否完成仍由 TaskStatus 或状态更新事件决定。
    en: A server emits the event when an Artifact is generated or changed. A client associates the delta by taskId, contextId, and artifactId, appends content when append is true, and closes that Artifact stream when lastChunk is true. Task completion remains determined by TaskStatus or status-update events.
    ja: サーバーは Artifact が生成または変更されたときイベントを発行する。クライアントは taskId、contextId、artifactId で増分を関連付け、append が true なら内容を追加し、lastChunk が true ならその Artifact ストリームを閉じる。Task 完了は引き続き TaskStatus または status 更新イベントで判断する。
  typical_input:
    - description: A Task sends the first text chunk of its report Artifact.
      format: |
        {
          "taskId": "task-20260718-001",
          "contextId": "ctx-quarterly-report",
          "artifact": {
            "artifactId": "artifact-report",
            "parts": [{"text": "Quarterly Report opening"}]
          },
          "append": false,
          "lastChunk": false
        }
      source_claims: [a2a-task-artifact-update-event-data-model]
  typical_output:
    - description: A StreamResponse can transport the Artifact delta through artifactUpdate.
      format: |
        {
          "artifactUpdate": {
            "taskId": "task-20260718-001",
            "contextId": "ctx-quarterly-report",
            "artifact": {"artifactId": "artifact-report", "parts": [{"text": "Executive summary"}]},
            "append": true,
            "lastChunk": true
          }
        }
      source_claims: [a2a-task-artifact-update-event-data-model, a2a-stream-response-union]
  reference_implementations:
    - name: A2A Protocol Specification — TaskArtifactUpdateEvent
      url: https://a2a-protocol.org/latest/specification/
      description: Defines task Artifact delta events and required task, context, Artifact, append, lastChunk, and metadata fields.
structure:
  identity_keys: [taskId, contextId, artifact]
  fields:
    - id: taskId
      labels: {zh: 任务标识, en: Task ID, ja: タスク ID}
      definitions:
        zh: 此 Artifact 所属 A2A Task 的标识。
        en: The identifier of the A2A Task for this Artifact.
        ja: この Artifact に対応する A2A Task の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task-20260718-001
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: contextId
      labels: {zh: 上下文标识, en: Context ID, ja: コンテキスト ID}
      definitions:
        zh: 该 Task 所属 A2A 上下文的标识。
        en: The identifier of the A2A context to which the Task belongs.
        ja: Task が属する A2A context の識別子。
      datatype: A2AContextId
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ctx-quarterly-report
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: artifact
      labels: {zh: 产物, en: Artifact, ja: Artifact}
      definitions:
        zh: 已生成或更新的 A2A Artifact。
        en: The A2A Artifact that was generated or updated.
        ja: 生成または更新された A2A Artifact。
      datatype: A2AArtifact
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"artifactId":"artifact-report","parts":[{"text":"Executive summary"}]}'
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: append
      labels: {zh: 追加模式, en: Append mode, ja: 追加モード}
      definitions:
        zh: 若为 true，内容应追加到同 artifactId 的先前 Artifact。
        en: When true, content should be appended to a previously sent Artifact with the same artifactId.
        ja: true の場合、内容は同じ artifactId の先行送信 Artifact に追加されるべきである。
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: lastChunk
      labels: {zh: 最后分块, en: Last chunk, ja: 最終チャンク}
      definitions:
        zh: 若为 true，该更新是此 Artifact 的最终分块。
        en: When true, the update is the final chunk of this Artifact.
        ja: true の場合、この更新はこの Artifact の最終チャンクである。
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions:
        zh: 可选的 Artifact 更新关联元数据。
        en: Optional metadata associated with the Artifact update.
        ja: Artifact 更新に関連する任意 metadata。
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"delivery":"stream"}'
      allowed_values: []
      source_claims: [a2a-task-artifact-update-event-data-model]
  constraints:
    - id: a2a-task-artifact-update-requires-task-context-artifact
      severity: error
      expression_language: plain
      expression: A TaskArtifactUpdateEvent must carry taskId, contextId, and Artifact.
      explanation:
        zh: 缺少任一字段时，客户端不能可靠关联内容增量的任务和上下文。
        en: Without any one of these fields, a client cannot reliably associate the content delta with its task and context.
        ja: これらのフィールドのいずれかがなければ、クライアントは内容増分を task と context に信頼して関連付けられない。
      source_claims: [a2a-task-artifact-update-event-data-model]
    - id: a2a-task-artifact-update-append-same-id
      severity: error
      expression_language: plain
      expression: When append is true, content is appended to a previously sent Artifact with the same artifactId.
      explanation:
        zh: 追加语义通过 artifactId 关联，不能追加到任意不同产物。
        en: Append semantics use artifactId association and cannot append to an arbitrary different Artifact.
        ja: 追加意味論は artifactId 関連を使い、任意の別 Artifact へ追加できない。
      source_claims: [a2a-task-artifact-update-event-data-model]
  required_relations: []
examples:
  - id: a2a-task-artifact-update-positive-first-chunk
    labels:
      zh: A2ATaskArtifactUpdateEvent positive
      en: A2ATaskArtifactUpdateEvent positive
      ja: A2ATaskArtifactUpdateEvent positive
    descriptions:
      zh: "A2A Protocol 映射 A2ATaskArtifactUpdateEvent：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2ATaskArtifactUpdateEvent: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2ATaskArtifactUpdateEvent: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, artifact: "'{\\"artifactId\\":\\"artifact-report", "parts":[{"text": "Quarterly Report opening\\"}]}'", append: false, lastChunk: false}

    related_node_ids:
      - A2ATaskArtifactUpdateEvent
      - A2ATask
      - A2AArtifact
      - A2APart
    related_relation_ids: []
    source_claims:
      - a2a-task-artifact-update-event-data-model

  - id: a2a-task-artifact-update-counterexample-missing-artifact
    labels:
      zh: A2ATaskArtifactUpdateEvent counterexample
      en: A2ATaskArtifactUpdateEvent counterexample
      ja: A2ATaskArtifactUpdateEvent counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATaskArtifactUpdateEvent DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATaskArtifactUpdateEvent DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATaskArtifactUpdateEvent ではない。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report}

    related_node_ids:
      - A2ATaskArtifactUpdateEvent
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-artifact-update-event-data-model

  - id: a2a-task-artifact-update-boundary-append
    labels:
      zh: A2ATaskArtifactUpdateEvent boundary
      en: A2ATaskArtifactUpdateEvent boundary
      ja: A2ATaskArtifactUpdateEvent boundary
    descriptions:
      zh: CrewAI CrewOutput.raw 是运行时 kickoff 产物，不是 A2ATaskArtifactUpdateEvent 规范 work_specification；TaskAssignment 事件与 Task 规约应区分。
      en: CrewAI CrewOutput.raw is runtime kickoff artifact, not A2ATaskArtifactUpdateEvent work_specification; separate TaskAssignment events from Task specification.
      ja: CrewAI CrewOutput は runtime で A2ATaskArtifactUpdateEvent work_specification ではない。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, artifact: "'{\\"artifactId\\":\\"artifact-report", "parts":[{"text": "Executive summary\\"}]}'", append: true}

    related_node_ids:
      - A2ATaskArtifactUpdateEvent
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-task-artifact-update-event-data-model

  - id: a2a-task-artifact-update-instance-final-chunk
    labels:
      zh: A2ATaskArtifactUpdateEvent instance
      en: A2ATaskArtifactUpdateEvent instance
      ja: A2ATaskArtifactUpdateEvent instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATaskArtifactUpdateEvent A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATaskArtifactUpdateEvent A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATaskArtifactUpdateEvent A2ATask に写像。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, artifact: "'{\\"artifactId\\":\\"artifact-report", "parts":[{"text": "End of report\\"}]}'", append: true, lastChunk: true, metadata: "'{\\"delivery\\":\\"stream\\"}'"}

    related_node_ids:
      - A2ATaskArtifactUpdateEvent
      - A2AArtifact
      - A2AStreamResponse
    related_relation_ids: []
    source_claims:
      - a2a-task-artifact-update-event-data-model

