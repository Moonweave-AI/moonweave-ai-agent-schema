schema: moonweave.ai/ontology-node/v1
id: A2ATaskStatusUpdateEvent
kind: concept
labels:
  zh: A2A 任务状态更新事件
  en: A2A task status update event
  ja: A2A タスク状態更新イベント
semantics:
  short_definition:
    zh: 智能体发送给客户端的 A2A Task 状态变化事件。
    en: An A2A event sent by an agent to notify a client of a Task status change.
    ja: Task status の変化をクライアントへ通知するためエージェントが送る A2A イベント。
  definition:
    zh: A2A TaskStatusUpdateEvent 是智能体为通知客户端某个 Task 状态变化而发送的协议事件。它必须包含 taskId、contextId 和新的 TaskStatus，并可附带元数据。它不是 Task 的完整快照、Artifact 更新、任意日志行或 Moonweave DelegationEvent。
    en: An A2A TaskStatusUpdateEvent is a protocol event sent by an agent to notify a client that a Task status changed. It must contain taskId, contextId, and the new TaskStatus and may carry metadata. It is not a complete Task snapshot, Artifact update, arbitrary log line, or Moonweave DelegationEvent.
    ja: A2A TaskStatusUpdateEvent は、Task status が変わったことをクライアントへ通知するためエージェントが送るプロトコルイベントである。taskId、contextId、新しい TaskStatus が必須で、metadata を任意に持てる。完全な Task スナップショット、Artifact 更新、任意ログ行、Moonweave DelegationEvent ではない。
  why_needed:
    zh: 流式和推送通道需要在不重复整个 Task 的情况下传递可处理的生命周期进展。该事件让客户端根据新的 TaskStatus 更新界面、收集输入或结束等待，同时保留 Task 和 Artifact 的不同边界。
    en: Streaming and push channels need to carry actionable lifecycle progress without repeating a whole Task. This event lets a client update its view, collect input, or stop waiting from the new TaskStatus while retaining separate boundaries for Task and Artifact.
    ja: ストリーミングと push チャネルには、Task 全体を繰り返さずに処理可能なライフサイクル進行を運ぶ必要がある。このイベントにより、クライアントは新しい TaskStatus から表示更新、入力収集、待機停止を行い、Task と Artifact の境界を分けて保てる。
  includes:
    - zh: 已变化的任务标识、所属上下文标识和新的 TaskStatus。
      en: The changed task identifier, its context identifier, and new TaskStatus.
      ja: 変更済み task 識別子、その context 識別子、新しい TaskStatus。
  excludes:
    - zh: 任务已产生 Artifact 的增量内容事件。
      en: A delta event for a Task Artifact that was generated.
      ja: Task Artifact が生成されたことの増分イベント。
    - zh: 本地委派事件或运行时日志事件。
      en: A local delegation event or runtime log event.
      ja: ローカル委任イベントまたはランタイムログイベント。
  semantic_kind: information
  aliases:
    - language: en
      value: TaskStatusUpdateEvent
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务器在状态改变时构造该事件，并在流式或推送 StreamResponse 中发送。客户端先验证 taskId 和 contextId 是否属于预期任务，再根据 TaskStatus state 处理继续、输入请求或终态。实现不得把仅用于本地调度的事件名称当作 A2A 状态更新。
    en: A server constructs this event when status changes and emits it in a streaming or push StreamResponse. The client first validates that taskId and contextId belong to an expected task, then handles continuation, input requests, or terminal state from TaskStatus state. Implementations must not present local scheduling event names as A2A status updates.
    ja: サーバーは status が変化したときこのイベントを構成し、ストリーミングまたは push StreamResponse で送信する。クライアントはまず taskId と contextId が期待 task に属することを検証し、次に TaskStatus state から継続、入力要求、終端状態を処理する。実装はローカルスケジューリングイベント名を A2A status 更新として提示してはならない。
  typical_input:
    - description: A task changes to working while its report is being prepared.
      format: |
        {
          "taskId": "task-20260718-001",
          "contextId": "ctx-quarterly-report",
          "status": {
            "state": "TASK_STATE_WORKING",
            "timestamp": "2026-07-18T08:10:00Z"
          }
        }
      source_claims: [a2a-task-status-update-event-data-model]
  typical_output:
    - description: A stream transports the event through its statusUpdate member.
      format: |
        {
          "statusUpdate": {
            "taskId": "task-20260718-001",
            "contextId": "ctx-quarterly-report",
            "status": {"state": "TASK_STATE_WORKING"}
          }
        }
      source_claims: [a2a-task-status-update-event-data-model, a2a-stream-response-union]
  reference_implementations:
    - name: A2A Protocol Specification — TaskStatusUpdateEvent
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the event sent to notify a client of a Task status change and its required task, context, and status fields.
structure:
  identity_keys: [taskId, contextId, status]
  fields:
    - id: taskId
      labels: {zh: 任务标识, en: Task ID, ja: タスク ID}
      definitions:
        zh: 状态已变化的 A2A Task 标识。
        en: The identifier of the A2A Task whose status changed.
        ja: status が変化した A2A Task の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task-20260718-001
      allowed_values: []
      source_claims: [a2a-task-status-update-event-data-model]
    - id: contextId
      labels: {zh: 上下文标识, en: Context ID, ja: コンテキスト ID}
      definitions:
        zh: 该 Task 所属的 A2A 上下文标识。
        en: The A2A context identifier to which the Task belongs.
        ja: その Task が属する A2A context 識別子。
      datatype: A2AContextId
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ctx-quarterly-report
      allowed_values: []
      source_claims: [a2a-task-status-update-event-data-model]
    - id: status
      labels: {zh: 新状态, en: New status, ja: 新しい status}
      definitions:
        zh: Task 已变化后的 A2A TaskStatus。
        en: The A2A TaskStatus after the Task change.
        ja: Task 変更後の A2A TaskStatus。
      datatype: A2ATaskStatus
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"state":"TASK_STATE_WORKING"}'
      allowed_values: []
      source_claims: [a2a-task-status-update-event-data-model]
    - id: metadata
      labels: {zh: 元数据, en: Metadata, ja: メタデータ}
      definitions:
        zh: 可选的状态更新关联元数据。
        en: Optional metadata associated with the status update.
        ja: status 更新に関連する任意 metadata。
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '{"delivery":"stream"}'
      allowed_values: []
      source_claims: [a2a-task-status-update-event-data-model]
  constraints:
    - id: a2a-task-status-update-requires-task-context-status
      severity: error
      expression_language: plain
      expression: A TaskStatusUpdateEvent must carry taskId, contextId, and the new TaskStatus.
      explanation:
        zh: 缺少任一字段时，客户端无法可靠归属或解释状态变化。
        en: Without any one of these fields, a client cannot reliably attribute or interpret the status change.
        ja: これらのフィールドのいずれかがなければ、クライアントは status 変更を信頼して帰属または解釈できない。
      source_claims: [a2a-task-status-update-event-data-model]
    - id: a2a-task-status-update-is-not-artifact-delta
      severity: error
      expression_language: plain
      expression: A status update communicates TaskStatus and must not be used as the Artifact delta event.
      explanation:
        zh: 输出内容变化使用 TaskArtifactUpdateEvent，生命周期变化使用本事件。
        en: Output content changes use TaskArtifactUpdateEvent, while lifecycle changes use this event.
        ja: 出力内容の変更は TaskArtifactUpdateEvent を使い、ライフサイクル変更はこのイベントを使う。
      source_claims: [a2a-task-status-update-event-data-model]
  required_relations: []
examples:
  - id: a2a-task-status-update-positive-working
    labels:
      zh: A2ATaskStatusUpdateEvent positive
      en: A2ATaskStatusUpdateEvent positive
      ja: A2ATaskStatusUpdateEvent positive
    descriptions:
      zh: A2A Protocol 映射 A2ATaskStatusUpdateEvent：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2ATaskStatusUpdateEvent: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2ATaskStatusUpdateEvent: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, status: "'{\\"state\\":\\"TASK_STATE_WORKING\\"}'"}

    related_node_ids:
      - A2ATaskStatusUpdateEvent
      - A2ATask
      - A2ATaskStatus
      - A2AContextId
    related_relation_ids: []
    source_claims:
      - a2a-task-status-update-event-data-model

  - id: a2a-task-status-update-counterexample-missing-context
    labels:
      zh: A2ATaskStatusUpdateEvent counterexample
      en: A2ATaskStatusUpdateEvent counterexample
      ja: A2ATaskStatusUpdateEvent counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATaskStatusUpdateEvent DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATaskStatusUpdateEvent DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATaskStatusUpdateEvent ではない。
    field_values: {taskId: task-20260718-001, status: "'{\\"state\\":\\"TASK_STATE_WORKING\\"}'"}

    related_node_ids:
      - A2ATaskStatusUpdateEvent
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-status-update-event-data-model

  - id: a2a-task-status-update-boundary-input-required
    labels:
      zh: A2ATaskStatusUpdateEvent boundary
      en: A2ATaskStatusUpdateEvent boundary
      ja: A2ATaskStatusUpdateEvent boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 A2ATaskStatusUpdateEvent 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not A2ATaskStatusUpdateEvent static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で A2ATaskStatusUpdateEvent 静的 RetryPolicy ではない。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, status: "'{\\"state\\":\\"TASK_STATE_INPUT_REQUIRED", "message":{"messageId": msg-question-001, "role": ROLE_AGENT, "parts":[{"text": "Which reporting period should I use?\\"}]}}'"}

    related_node_ids:
      - A2ATaskStatusUpdateEvent
      - A2ATaskStatus
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-task-status-update-event-data-model

  - id: a2a-task-status-update-instance-completed
    labels:
      zh: A2ATaskStatusUpdateEvent instance
      en: A2ATaskStatusUpdateEvent instance
      ja: A2ATaskStatusUpdateEvent instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATaskStatusUpdateEvent A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATaskStatusUpdateEvent A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATaskStatusUpdateEvent A2ATask に写像。
    field_values: {taskId: task-20260718-001, contextId: ctx-quarterly-report, status: "'{\\"state\\":\\"TASK_STATE_COMPLETED\\"}'", metadata: "'{\\"delivery\\":\\"push\\"}'"}

    related_node_ids:
      - A2ATaskStatusUpdateEvent
      - A2ATask
      - A2AStreamResponse
    related_relation_ids: []
    source_claims:
      - a2a-task-status-update-event-data-model

