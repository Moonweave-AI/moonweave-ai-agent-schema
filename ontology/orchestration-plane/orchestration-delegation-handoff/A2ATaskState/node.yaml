schema: moonweave.ai/ontology-node/v1
id: A2ATaskState
kind: concept
labels:
  zh: A2A 任务状态值
  en: A2A task state
  ja: A2A タスク状態値
semantics:
  short_definition:
    zh: A2A TaskStatus 使用的受限生命周期状态枚举值。
    en: A constrained lifecycle-state enumeration value used by A2A TaskStatus.
    ja: A2A TaskStatus が使用する制約付きライフサイクル状態列挙値。
  definition:
    zh: A2A TaskState 是 A2A TaskStatus 的 state 字段使用的协议枚举。标准值包括 TASK_STATE_SUBMITTED、TASK_STATE_WORKING、TASK_STATE_COMPLETED、TASK_STATE_FAILED、TASK_STATE_CANCELED、TASK_STATE_INPUT_REQUIRED、TASK_STATE_REJECTED、TASK_STATE_AUTH_REQUIRED 和 TASK_STATE_UNSPECIFIED。它不是 Moonweave 的委派阶段、运行时进程状态或任意应用字符串。
    en: An A2A TaskState is the protocol enumeration used by the state field of A2A TaskStatus. Standard values include TASK_STATE_SUBMITTED, TASK_STATE_WORKING, TASK_STATE_COMPLETED, TASK_STATE_FAILED, TASK_STATE_CANCELED, TASK_STATE_INPUT_REQUIRED, TASK_STATE_REJECTED, TASK_STATE_AUTH_REQUIRED, and TASK_STATE_UNSPECIFIED. It is not a Moonweave delegation phase, runtime-process state, or arbitrary application string.
    ja: A2A TaskState は A2A TaskStatus の state フィールドが使うプロトコル列挙である。標準値には TASK_STATE_SUBMITTED、TASK_STATE_WORKING、TASK_STATE_COMPLETED、TASK_STATE_FAILED、TASK_STATE_CANCELED、TASK_STATE_INPUT_REQUIRED、TASK_STATE_REJECTED、TASK_STATE_AUTH_REQUIRED、TASK_STATE_UNSPECIFIED が含まれる。Moonweave の委任段階、ランタイムプロセス状態、任意のアプリケーション文字列ではない。
  why_needed:
    zh: 客户端必须能以有限、可互操作的值驱动任务等待、输入收集和终止处理。明确枚举防止服务把本地状态机名称或未解释字符串传给不了解其内部实现的调用方。
    en: Clients need finite interoperable values to drive task waiting, input collection, and terminal handling. An explicit enumeration prevents services from sending local state-machine names or unexplained strings to callers that do not know their implementation.
    ja: クライアントには、タスク待機、入力収集、終端処理を行うための有限で相互運用可能な値が必要である。明示的な列挙により、サービスが内部実装を知らない呼出側へローカル状態機械名や説明のない文字列を送ることを防げる。
  includes:
    - zh: A2A 规范列出的任务生命周期状态值。
      en: Task lifecycle state values enumerated by the A2A specification.
      ja: A2A 仕様が列挙するタスクライフサイクル状態値。
  excludes:
    - zh: DelegationPhase、HandoffProcess 或本地工作者可用性状态。
      en: DelegationPhase, HandoffProcess, or local worker-availability state.
      ja: DelegationPhase、HandoffProcess、ローカルワーカー可用性状態。
    - zh: 除规范枚举外的自定义自由文本状态。
      en: Custom free-text state outside the protocol enumeration.
      ja: プロトコル列挙外のカスタム自由文状態。
  semantic_kind: information
  aliases:
    - language: en
      value: TaskState
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务器在 TaskStatus 或状态更新事件中发出一个 TaskState 值，客户端使用该值选择协议级后续动作。实现可维护更细的内部队列状态，但必须在协议边界映射为标准枚举，而不能把内部状态名称直接泄漏给客户端。
    en: A server emits one TaskState value in TaskStatus or a status-update event, and a client uses it to choose protocol-level next actions. An implementation may keep finer internal queue states, but it must map them to the standard enumeration at the protocol boundary rather than leaking internal state names.
    ja: サーバーは TaskStatus または状態更新イベントで一つの TaskState 値を送信し、クライアントはそれをプロトコルレベルの次アクション選択に使う。実装はより細かな内部キュー状態を持てるが、内部状態名を漏らす代わりにプロトコル境界で標準列挙へマップしなければならない。
  typical_input:
    - description: A TaskStatus marks a task as waiting for user input.
      format: |
        {
          "state": "TASK_STATE_INPUT_REQUIRED",
          "message": {
            "messageId": "msg-question-001",
            "role": "ROLE_AGENT",
            "parts": [{"text": "Which reporting period should I use?"}]
          }
        }
      source_claims: [a2a-task-state-enumeration]
  typical_output:
    - description: A client recognizes a standard state value and can ask the user for the missing input.
      format: |
        {
          "action": "collect-user-input",
          "taskState": "TASK_STATE_INPUT_REQUIRED"
        }
      source_claims: [a2a-task-state-enumeration]
  reference_implementations:
    - name: A2A Protocol Specification — TaskState
      url: https://a2a-protocol.org/latest/specification/
      description: Enumerates the standard TaskState values used by TaskStatus.
structure:
  identity_keys: [value]
  fields:
    - id: value
      labels: {zh: 状态值, en: State value, ja: 状態値}
      definitions: {zh: 一个规范定义的 A2A TaskState 枚举值。, en: One normatively defined A2A TaskState enumeration value., ja: 一つの規範定義済み A2A TaskState 列挙値。}
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^(TASK_STATE_SUBMITTED|TASK_STATE_WORKING|TASK_STATE_COMPLETED|TASK_STATE_FAILED|TASK_STATE_CANCELED|TASK_STATE_INPUT_REQUIRED|TASK_STATE_REJECTED|TASK_STATE_AUTH_REQUIRED|TASK_STATE_UNSPECIFIED)$'
      example_value: TASK_STATE_WORKING
      allowed_values:
        - id: submitted
          value: TASK_STATE_SUBMITTED
          labels: {zh: 已提交, en: Submitted, ja: 送信済み}
          definitions: {zh: 任务已提交给服务端。, en: The task has been submitted to the service., ja: タスクがサービスへ送信された。}
          source_claims: [a2a-task-state-enumeration]
        - id: working
          value: TASK_STATE_WORKING
          labels: {zh: 正在处理, en: Working, ja: 処理中}
          definitions: {zh: 服务端正在处理任务。, en: The service is processing the task., ja: サービスがタスクを処理している。}
          source_claims: [a2a-task-state-enumeration]
        - id: completed
          value: TASK_STATE_COMPLETED
          labels: {zh: 已完成, en: Completed, ja: 完了}
          definitions: {zh: 任务已完成。, en: The task has completed., ja: タスクが完了した。}
          source_claims: [a2a-task-state-enumeration]
        - id: failed
          value: TASK_STATE_FAILED
          labels: {zh: 已失败, en: Failed, ja: 失敗}
          definitions: {zh: 任务处理失败。, en: Task processing has failed., ja: タスク処理が失敗した。}
          source_claims: [a2a-task-state-enumeration]
        - id: canceled
          value: TASK_STATE_CANCELED
          labels: {zh: 已取消, en: Canceled, ja: キャンセル済み}
          definitions: {zh: 任务已被取消。, en: The task has been canceled., ja: タスクがキャンセルされた。}
          source_claims: [a2a-task-state-enumeration]
        - id: input-required
          value: TASK_STATE_INPUT_REQUIRED
          labels: {zh: 需要输入, en: Input required, ja: 入力要求}
          definitions: {zh: 任务继续前需要输入。, en: Input is needed before the task can continue., ja: タスク継続前に入力が必要である。}
          source_claims: [a2a-task-state-enumeration]
        - id: rejected
          value: TASK_STATE_REJECTED
          labels: {zh: 已拒绝, en: Rejected, ja: 拒否}
          definitions: {zh: 服务端已拒绝该任务。, en: The service has rejected the task., ja: サービスがタスクを拒否した。}
          source_claims: [a2a-task-state-enumeration]
        - id: auth-required
          value: TASK_STATE_AUTH_REQUIRED
          labels: {zh: 需要认证, en: Authentication required, ja: 認証要求}
          definitions: {zh: 任务继续前需要认证。, en: Authentication is needed before the task can continue., ja: タスク継続前に認証が必要である。}
          source_claims: [a2a-task-state-enumeration]
        - id: unspecified
          value: TASK_STATE_UNSPECIFIED
          labels: {zh: 未指定, en: Unspecified, ja: 未指定}
          definitions: {zh: 未指定的协议状态值。, en: The unspecified protocol state value., ja: 未指定のプロトコル状態値。}
          source_claims: [a2a-task-state-enumeration]
      source_claims: [a2a-task-state-enumeration]
  constraints:
    - id: a2a-task-state-is-enumerated
      severity: error
      expression_language: plain
      expression: TaskState value must be one of the values defined by the A2A TaskState enumeration.
      explanation:
        zh: 服务端不得以任意内部字符串替代协议枚举。
        en: A service must not substitute arbitrary internal strings for the protocol enumeration.
        ja: サービスはプロトコル列挙を任意の内部文字列で置き換えてはならない。
      source_claims: [a2a-task-state-enumeration]
    - id: a2a-task-state-is-not-local-phase
      severity: error
      expression_language: plain
      expression: A Moonweave local delegation phase must not be serialized as an A2A TaskState unless it maps to one defined enumeration value.
      explanation:
        zh: 本地编排阶段可以存在，但跨 A2A 边界时必须映射为协议状态或保留在本地。
        en: A local orchestration phase may exist, but at the A2A boundary it must map to a protocol state or remain local.
        ja: ローカルオーケストレーション段階は存在し得るが、A2A 境界ではプロトコル状態へマップするかローカルに留めなければならない。
      source_claims: [moonweave-a2a-task-state-module-composition]
  required_relations: []
examples:
  - id: a2a-task-state-positive-working
    labels:
      zh: A2ATaskState positive
      en: A2ATaskState positive
      ja: A2ATaskState positive
    descriptions:
      zh: "A2A Protocol 映射 A2ATaskState：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。"
      en: "A2A Protocol maps A2ATaskState: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle."
      ja: "A2A Protocol A2ATaskState: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。"
    field_values: {value: TASK_STATE_WORKING}

    related_node_ids:
      - A2ATaskState
      - A2ATaskStatus
    related_relation_ids: []
    source_claims:
      - a2a-task-state-enumeration

  - id: a2a-task-state-counterexample-local-phase
    labels:
      zh: A2ATaskState counterexample
      en: A2ATaskState counterexample
      ja: A2ATaskState counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATaskState DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATaskState DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATaskState ではない。
    field_values: {value: ACCEPTANCE_PHASE}

    related_node_ids:
      - A2ATaskState
      - AcceptancePhase
    related_relation_ids: []
    source_claims:
      - a2a-task-state-enumeration
      - moonweave-a2a-task-state-module-composition

  - id: a2a-task-state-boundary-input-required
    labels:
      zh: A2ATaskState boundary
      en: A2ATaskState boundary
      ja: A2ATaskState boundary
    descriptions:
      zh: Prefect flow run state 是运行时 orchestration 状态，不是 A2ATaskState 静态 RetryPolicy 规约；FlowControl 事件与规约应分离。
      en: Prefect flow run state is runtime orchestration state, not A2ATaskState static RetryPolicy spec; separate FlowControl events from specification.
      ja: Prefect flow run state は runtime で A2ATaskState 静的 RetryPolicy ではない。
    field_values: {value: TASK_STATE_INPUT_REQUIRED}

    related_node_ids:
      - A2ATaskState
      - A2ATaskStatus
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-task-state-enumeration
      - a2a-task-status-data-model

  - id: a2a-task-state-instance-completed
    labels:
      zh: A2ATaskState instance
      en: A2ATaskState instance
      ja: A2ATaskState instance
    descriptions:
      zh: "A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATaskState A2ATask。"
      en: "A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATaskState A2ATask."
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATaskState A2ATask に写像。
    field_values: {value: TASK_STATE_COMPLETED}

    related_node_ids:
      - A2ATaskState
      - A2ATask
      - A2AArtifact
    related_relation_ids: []
    source_claims:
      - a2a-task-state-enumeration

