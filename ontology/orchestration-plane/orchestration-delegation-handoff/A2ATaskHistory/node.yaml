schema: moonweave.ai/ontology-node/v1
id: A2ATaskHistory
kind: concept
labels:
  zh: A2A 任务历史
  en: A2A task history
  ja: A2A タスク履歴
semantics:
  short_definition:
    zh: A2A Task 可选的相关 Message 历史集合。
    en: An optional collection of related Messages in an A2A Task.
    ja: A2A Task にある任意の関連 Message 履歴集合。
  definition:
    zh: A2A Task history 是 Task 的可选 Message 数组字段，用于记录任务执行期间的交互。规范说明并非所有 Message 都保证持久化，任务创建前的消息或暂时信息消息也可能不在历史中。它不是完整审计日志、私有推理记录、TaskStatus 的单条 Message 或调用方本地会话存储。
    en: A2A Task history is the optional Message-array field of a Task that records interactions during task execution. The specification does not guarantee that every Message is persisted, and messages before task creation or transient informational messages may be absent. It is not a complete audit log, private reasoning record, TaskStatus single Message, or caller-local session store.
    ja: A2A Task history は、task 実行中の相互作用を記録する Task の任意 Message 配列フィールドである。仕様はすべての Message の永続化を保証せず、task 作成前の message や一時的情報 message は存在しない場合がある。完全な監査ログ、非公開推論記録、TaskStatus の単一 Message、呼出側ローカルセッションストアではない。
  why_needed:
    zh: 客户端在恢复、检查或继续任务时需要可用的交互上下文。可选历史字段可传递服务器选择保留的消息，同时不虚假承诺每个暂时更新或私有状态都能从协议中重新取得。
    en: Clients need available interaction context when resuming, inspecting, or continuing a task. The optional history field can carry messages the server chose to retain without falsely promising that every transient update or private state is retrievable through the protocol.
    ja: クライアントには、task の再開、検査、継続時に利用可能な相互作用コンテキストが必要である。任意 history フィールドは、サーバーが保持を選んだ message を運べる一方、すべての一時更新や非公開状態がプロトコルで取得可能だと誤って約束しない。
  includes:
    - zh: Task 执行期间由服务器保留的 A2A Message。
      en: A2A Messages retained by the server during Task execution.
      ja: Task 実行中にサーバーが保持した A2A Message。
  excludes:
    - zh: 必然完整的对话抄本或不可变审计日志。
      en: A necessarily complete conversation transcript or immutable audit log.
      ja: 必ず完全な会話書き起こしまたは不変監査ログ。
    - zh: 当前 TaskStatus 附带的单条状态消息。
      en: The single status-associated Message attached to current TaskStatus.
      ja: 現在の TaskStatus に付く一つの状態関連 Message。
  semantic_kind: information
  aliases:
    - language: en
      value: Task.history
      alias_kind: protocol-field-name
engineering:
  explanation:
    zh: 服务器决定哪些交互 Message 持久化到 Task history，并可在请求配置的 historyLength 范围内返回最近项目。客户端将历史视为可用上下文而非完整事实来源，并在需要可靠审计或长期存储时使用专门的本地记录机制。
    en: A server decides which interaction Messages to persist in Task history and can return recent items within requested historyLength. A client treats history as available context rather than a complete factual source and uses dedicated local records when reliable audit or long-term storage is required.
    ja: サーバーは、どの相互作用 Message を Task history に永続化するかを決め、要求された historyLength の範囲で最近項目を返せる。クライアントは history を完全な事実源ではなく利用可能コンテキストとして扱い、信頼できる監査や長期保存が必要なら専用ローカル記録を使う。
  typical_input:
    - description: A Task response includes two retained messages from a continuing report interaction.
      format: |
        {
          "id": "task-20260718-001",
          "history": [
            {"messageId": "msg-20260718-002", "role": "ROLE_USER", "parts": [{"text": "Generate the quarterly report."}]},
            {"messageId": "msg-question-001", "role": "ROLE_AGENT", "parts": [{"text": "Which reporting period should I use?"}]}
          ]
        }
      source_claims: [a2a-task-history-data-model]
  typical_output:
    - description: A request setting historyLength to zero receives no history field.
      format: |
        {
          "id": "task-20260718-001",
          "status": {"state": "TASK_STATE_WORKING"}
        }
      source_claims: [a2a-task-history-length-semantics]
  reference_implementations:
    - name: A2A Protocol Specification — Task history
      url: https://a2a-protocol.org/latest/specification/
      description: Defines Task history as optional Messages and describes persistence and historyLength retrieval limits.
structure:
  identity_keys: [history]
  fields:
    - id: history
      labels: {zh: 消息历史, en: Message history, ja: メッセージ履歴}
      definitions:
        zh: Task 中由服务器保留的可选 A2A Message 数组。
        en: The optional array of A2A Messages retained by the server in a Task.
        ja: Task 内でサーバーが保持する任意の A2A Message 配列。
      datatype: A2AMessage[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '[{"messageId":"msg-20260718-002","role":"ROLE_USER","parts":[{"text":"Generate the quarterly report."}]}]'
      allowed_values: []
      source_claims: [a2a-task-history-data-model]
  constraints:
    - id: a2a-task-history-is-optional
      severity: warning
      expression_language: plain
      expression: Task history may be omitted, and clients must not infer that omitted Messages never existed.
      explanation:
        zh: 协议允许缺少历史，缺少不证明交互未发生。
        en: The protocol permits absent history, and absence does not prove an interaction never occurred.
        ja: プロトコルは history の欠如を許可し、欠如は相互作用が起きなかったことを証明しない。
      source_claims: [a2a-task-history-data-model]
    - id: a2a-task-history-length-limits-return
      severity: error
      expression_language: plain
      expression: When historyLength is supplied, the server must not return more Messages than the requested value and zero requests no history.
      explanation:
        zh: historyLength 限制返回量，零值请求不包含消息历史。
        en: historyLength limits returned quantity, and zero requests no message history.
        ja: historyLength は返却量を制限し、ゼロはメッセージ履歴なしを要求する。
      source_claims: [a2a-task-history-length-semantics]
  required_relations: []
examples:
  - id: a2a-task-history-positive-retained-messages
    labels:
      zh: A2ATaskHistory positive
      en: A2ATaskHistory positive
      ja: A2ATaskHistory positive
    descriptions:
      zh: A2A Protocol 映射 A2ATaskHistory：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2ATaskHistory: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2ATaskHistory: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {history: "'[{\\"messageId\\":\\"msg-20260718-002", "role": ROLE_AGENT, "parts":[{"text": "Which reporting period should I use?\\"}]}]'", {"messageId": msg-question-001}

    related_node_ids:
      - A2ATaskHistory
      - A2ATask
      - A2AMessage
    related_relation_ids: []
    source_claims:
      - a2a-task-history-data-model

  - id: a2a-task-history-counterexample-complete-audit-claim
    labels:
      zh: A2ATaskHistory counterexample
      en: A2ATaskHistory counterexample
      ja: A2ATaskHistory counterexample
    descriptions:
      zh: 无 @workflow.defn/@activity.defn 的普通 async 函数不能作为 Temporal 式 A2ATaskHistory DurableExecution。
      en: Plain async functions without @workflow.defn/@activity.defn cannot serve as Temporal-style A2ATaskHistory DurableExecution.
      ja: @workflow.defn なし async は Temporal 式 A2ATaskHistory ではない。
    field_values: {history: "'[\\"all messages ever exchanged\\"]'"}

    related_node_ids:
      - A2ATaskHistory
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-history-data-model

  - id: a2a-task-history-boundary-zero-length
    labels:
      zh: A2ATaskHistory boundary
      en: A2ATaskHistory boundary
      ja: A2ATaskHistory boundary
    descriptions:
      zh: Reflexion verbal feedback 是运行时反思文本，不是 A2ATaskHistory 规范 revision_plan；EvaluationLoop 事件与 RetryPolicy 规约应区分。
      en: Reflexion verbal feedback is runtime reflection text, not A2ATaskHistory revision_plan spec; separate EvaluationLoop events from RetryPolicy specification.
      ja: Reflexion verbal feedback は runtime で A2ATaskHistory revision_plan spec ではない。
    field_values: {historyLength: 0}

    related_node_ids:
      - A2ATaskHistory
      - A2ASendMessageConfiguration
      - A2ATask
    related_relation_ids: []
    source_claims:
      - a2a-task-history-length-semantics

  - id: a2a-task-history-instance-report-conversation
    labels:
      zh: A2ATaskHistory instance
      en: A2ATaskHistory instance
      ja: A2ATaskHistory instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2ATaskHistory A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2ATaskHistory A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2ATaskHistory A2ATask に写像。
    field_values: {history: "'[{\\"messageId\\":\\"msg-20260718-002", "role": ROLE_AGENT, "parts":[{"text": "Which reporting period should I use?\\"}]}]'", {"messageId": msg-question-001}

    related_node_ids:
      - A2ATaskHistory
      - A2ATask
      - A2AMessage
      - A2AContextId
    related_relation_ids: []
    source_claims:
      - a2a-task-history-data-model

