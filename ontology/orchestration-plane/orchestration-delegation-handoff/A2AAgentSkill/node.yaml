schema: moonweave.ai/ontology-node/v1
id: A2AAgentSkill
kind: concept
labels:
  zh: A2A 智能体技能
  en: A2A agent skill
  ja: A2A エージェントスキル
semantics:
  short_definition:
    zh: AgentCard 中声明某项智能体功能及其适用输入、输出和安全要求的技能记录。
    en: A skill record in an AgentCard that declares an agent function and its applicable inputs, outputs, and security requirements.
    ja: AgentCard 内でエージェント機能と適用可能な入力、出力、安全要件を宣言するスキル記録。
  definition:
    zh: A2A AgentSkill 是 AgentCard 的技能项。它必须包含 id、name、description 和 tags，并可包含 examples、inputModes、outputModes 和 securityRequirements。它面向发现者描述智能体声称可提供的功能；它不是将实时任务与本地工作者做能力评分后的匹配结果，也不保证智能体会接受请求。
    en: An A2A AgentSkill is a skill item in an AgentCard. It must contain id, name, description, and tags, and it may contain examples, inputModes, outputModes, and securityRequirements. It describes functionality that an agent claims to provide to discovery clients; it is not the result of scoring a live task against a local worker, nor a guarantee that the agent will accept a request.
    ja: A2A AgentSkill は AgentCard のスキル項目である。id、name、description、tags を必ず含み、examples、inputModes、outputModes、securityRequirements を任意で含められる。発見クライアントに対してエージェントが提供すると主張する機能を記述するものであり、実行中タスクをローカルワーカーと採点して照合した結果でも、エージェントが要求を受け入れる保証でもない。
  why_needed:
    zh: 客户端需要以稳定的技能标识和描述发现智能体可提供的功能，并据此构造兼容请求。
    en: A client needs stable skill identifiers and descriptions to discover functionality an agent may provide and construct compatible requests.
    ja: クライアントはエージェントが提供し得る機能を発見し互換性のある要求を構成するために、安定したスキル識別子と説明を必要とする。
  includes:
    - zh: 技能标识、名称、描述和标签。
      en: A skill identifier, name, description, and tags.
      ja: スキル識別子、名前、説明、タグ。
    - zh: 可选的示例、内容模式和安全要求。
      en: Optional examples, content modes, and security requirements.
      ja: 任意の例、コンテンツモード、安全要件。
  excludes:
    - zh: 为某个本地工作者计算的即时匹配分数。
      en: A live match score computed for a particular local worker.
      ja: 特定のローカルワーカーのために計算されたリアルタイム一致スコア。
    - zh: 对给定任务交付结果的服务等级承诺。
      en: A service-level commitment to deliver a result for a given task.
      ja: 所与のタスクに結果を提供するサービスレベルの約束。
  semantic_kind: information
  aliases:
    - language: en
      value: AgentSkill
      alias_kind: protocol-term
engineering:
  explanation:
    zh: 服务端在 AgentCard.skills 中发布每个技能。客户端使用 id 识别技能，用 tags 和 description 帮助用户选择，并在提供时检查输入、输出和安全要求。编排器可以把这些声明作为本地匹配证据，但必须独立地作出分配或委派决定。
    en: A server publishes each skill in AgentCard.skills. A client uses id to identify the skill, uses tags and description to help users choose, and checks input, output, and security requirements when they are provided. An orchestrator can use these declarations as local matching evidence, but it must make assignment or delegation decisions independently.
    ja: サーバーは各スキルを AgentCard.skills で公開する。クライアントは id でスキルを識別し、tags と description でユーザーの選択を支援し、提供されている場合は入力、出力、安全要件を確認する。オーケストレーターはこれらの宣言をローカル一致の証拠として使えるが、割り当てまたは委任の決定は独立して行わなければならない。
  typical_input:
    - description: An AgentCard exposes a research skill with text modes and a bearer-security requirement.
      format: |
        {
          "id": "research",
          "name": "Research",
          "description": "Answers research questions with cited summaries.",
          "tags": ["research", "citations"],
          "inputModes": ["text/plain"],
          "outputModes": ["text/plain"],
          "securityRequirements": [{"bearerAuth": []}]
        }
      source_claims: [a2a-agent-skill-data-model]
  typical_output:
    - description: A client presents the skill as compatible with text input after satisfying its declared security requirement.
      format: |
        {
          "skillId": "research",
          "acceptedInputMode": "text/plain",
          "securityRequirement": "bearerAuth"
        }
      source_claims: [a2a-agent-skill-data-model]
  reference_implementations:
    - name: A2A Protocol Specification — AgentSkill
      url: https://a2a-protocol.org/latest/specification/
      description: Defines required skill identity and discovery fields plus optional examples, modes, and security requirements.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels:
        zh: 技能标识
        en: Skill ID
        ja: スキル ID
      definitions:
        zh: 在该智能体卡片中标识技能的稳定标识符。
        en: The stable identifier that identifies the skill within the agent card.
        ja: エージェントカード内でスキルを識別する安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: research
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: name
      labels:
        zh: 名称
        en: Name
        ja: 名前
      definitions:
        zh: 面向发现者的技能人类可读名称。
        en: The human-readable skill name for discovery clients.
        ja: 発見クライアント向けの人間可読なスキル名。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Research
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: description
      labels:
        zh: 描述
        en: Description
        ja: 説明
      definitions:
        zh: 说明技能功能的发现描述。
        en: A discovery description that explains the skill's function.
        ja: スキル機能を説明する発見用の説明。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Answers research questions with cited summaries.
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: tags
      labels:
        zh: 标签
        en: Tags
        ja: タグ
      definitions:
        zh: 用于发现和分类技能的标签列表。
        en: The list of tags used to discover and categorize the skill.
        ja: スキルの発見と分類に使うタグの一覧。
      datatype: string[]
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: '["research","citations"]'
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: examples
      labels:
        zh: 示例
        en: Examples
        ja: 例
      definitions:
        zh: 可选的、展示技能使用方式的示例列表。
        en: An optional list of examples that demonstrates how to use the skill.
        ja: スキルの使い方を示す任意の例の一覧。
      datatype: string[]
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["Summarize this paper with citations."]'
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: inputModes
      labels:
        zh: 输入模式
        en: Input modes
        ja: 入力モード
      definitions:
        zh: 此技能可选声明的可接受内容模式列表。
        en: The optionally declared list of content modes accepted by this skill.
        ja: このスキルが任意で宣言する受け入れ可能なコンテンツモードの一覧。
      datatype: string[]
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["text/plain"]'
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: outputModes
      labels:
        zh: 输出模式
        en: Output modes
        ja: 出力モード
      definitions:
        zh: 此技能可选声明的可生成内容模式列表。
        en: The optionally declared list of content modes this skill can produce.
        ja: このスキルが任意で宣言する生成可能なコンテンツモードの一覧。
      datatype: string[]
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["text/plain"]'
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
    - id: securityRequirements
      labels:
        zh: 安全要求
        en: Security requirements
        ja: セキュリティ要件
      definitions:
        zh: 使用此技能时适用的可选安全要求。
        en: Optional security requirements that apply when using this skill.
        ja: このスキルを使用するときに適用される任意のセキュリティ要件。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"bearerAuth":[]}]'
      allowed_values: []
      source_claims: [a2a-agent-skill-data-model]
  constraints:
    - id: a2a-agent-skill-required-discovery-fields
      severity: error
      expression_language: plain
      expression: An AgentSkill must provide id, name, description, and tags.
      explanation:
        zh: 缺少任一必填技能字段会使客户端无法稳定地发现、标识或解释该技能。
        en: Omitting any required skill field prevents a client from reliably discovering, identifying, or interpreting the skill.
        ja: 必須スキルフィールドを一つでも省略すると、クライアントはそのスキルを確実に発見、識別、解釈できない。
      source_claims: [a2a-agent-skill-data-model]
    - id: a2a-agent-skill-local-selection-boundary
      severity: warning
      expression_language: plain
      expression: An AgentSkill declaration is discovery metadata and does not itself calculate a local worker-capability match or assign work.
      explanation:
        zh: Moonweave 可使用技能声明作为选择输入，但匹配分数、分配和委派属于本地过程。
        en: Moonweave may use the skill declaration as selection input, but match scores, assignment, and delegation are local processes.
        ja: Moonweave はスキル宣言を選択入力として使えるが、一致スコア、割り当て、委任はローカルプロセスである。
      source_claims: [moonweave-agent-skill-selection-boundary]
  required_relations: []
examples:
  - id: a2a-agent-skill-positive-research
    labels:
      zh: A2AAgentSkill positive
      en: A2AAgentSkill positive
      ja: A2AAgentSkill positive
    descriptions:
      zh: A2A Protocol 映射 A2AAgentSkill：POST /tasks/send 发送任务、GET /tasks/{id} 查询状态；AgentCard 描述 agent 能力；TaskState: submitted→working→input-required→completed→failed 生命周期。
      en: A2A Protocol maps A2AAgentSkill: POST /tasks/send sends task, GET /tasks/{id} queries status; AgentCard describes capabilities; TaskState submitted→working→input-required→completed→failed lifecycle.
      ja: A2A Protocol A2AAgentSkill: POST /tasks/send、GET /tasks/{id}、AgentCard、TaskState submitted→working→completed→failed。
    field_values: {id: research, name: Research, description: "Answers research questions with cited summaries.", tags: "'[\\"research\", inputModes: "'[\\"text/plain\\"]'", outputModes: "'[\\"text/plain\\"]'"}

    related_node_ids:
      - A2AAgentSkill
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-skill-data-model

  - id: a2a-agent-skill-counterexample-missing-description
    labels:
      zh: A2AAgentSkill counterexample
      en: A2AAgentSkill counterexample
      ja: A2AAgentSkill counterexample
    descriptions:
      zh: 一次性脚本无 skill_library.add 持久化不能作为 Voyager 式 A2AAgentSkill 技能组合。
      en: One-off script without skill_library.add persistence cannot classify as Voyager-style A2AAgentSkill skill composition.
      ja: skill_library.add なし一回脚本は Voyager 式 A2AAgentSkill ではない。
    field_values: {id: research, name: Research, tags: "'[\\"research\\"]'"}

    related_node_ids:
      - A2AAgentSkill
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-skill-data-model

  - id: a2a-agent-skill-boundary-optional-details
    labels:
      zh: A2AAgentSkill boundary
      en: A2AAgentSkill boundary
      ja: A2AAgentSkill boundary
    descriptions:
      zh: MRKL 模块 wire 响应是运行时专家输出，不是 A2AAgentSkill 路由规范；RoutingDecision 事件与 Route 规约应分离。
      en: MRKL module wire responses are runtime expert output, not A2AAgentSkill routing spec; separate RoutingDecision events from Route specification.
      ja: MRKL module 応答は runtime で A2AAgentSkill routing spec ではない。
    field_values: {id: research, name: Research, description: "Answers research questions with cited summaries.", tags: "'[\\"research\\"]'"}

    related_node_ids:
      - A2AAgentSkill
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-skill-data-model

  - id: a2a-agent-skill-instance-secure-analysis
    labels:
      zh: A2AAgentSkill instance
      en: A2AAgentSkill instance
      ja: A2AAgentSkill instance
    descriptions:
      zh: A2A 实例：POST /tasks/send {message, configuration} → TaskState WORKING → GET /tasks/{id} → COMPLETED → 映射 A2AAgentSkill A2ATask。
      en: A2A instance: POST /tasks/send → TaskState WORKING → GET /tasks/{id} → COMPLETED → maps to A2AAgentSkill A2ATask.
      ja: A2A 实例 tasks/send→WORKING→COMPLETED が A2AAgentSkill A2ATask に写像。
    field_values: {id: secure-analysis, name: "Secure Analysis", description: "Analyzes text after bearer authentication.", tags: "'[\\"analysis\", examples: "'[\\"Analyze this document.\\"]'", inputModes: "'[\\"text/plain\\"]'", outputModes: "'[\\"text/plain\\"]'", securityRequirements: "'[{\\"bearerAuth\\":[]}]'"}

    related_node_ids:
      - A2AAgentSkill
      - A2AAgentCard
    related_relation_ids: []
    source_claims:
      - a2a-agent-skill-data-model

