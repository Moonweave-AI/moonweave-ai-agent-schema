schema: moonweave.ai/ontology-node/v1
id: runtime-plane
kind: domain
status: accepted
labels:
  en: Runtime State & Trace Domain
  zh: 运行状态与轨迹域
  ja: 実行状態とトレースドメイン
semantics:
  short_definition:
    en: Runtime State & Trace Domain is the operational concern domain for bounded execution episodes and raw runtime evidence. It models sessions, attempts, outcomes, actors, environments, budgets, trace records, spans, events, checkpoints, snapshots, state diffs, replay evidence, transcripts, retention policy, and artifact provenance so agent activity can be audited, recovered, replayed, and exported without storing hidden reasoning text.
    zh: 运行状态与轨迹域是面向有边界执行片段与原始运行证据的运行关注域。它刻画运行会话、执行尝试、执行结果、参与者、环境、预算、可观测追踪记录、跨度、事件、检查点、快照、状态差异、回放证据、转录、保留策略与产物溯源，使智能体活动能够被审计、恢复、回放和导出，同时不要求保存隐藏推理文本。
    ja: 実行状態とトレースドメインは、境界付けられた実行エピソードと生の実行証拠を扱う運用関心ドメインです。実行セッション、試行、結果、アクター、環境、予算、観測可能なトレース記録、スパン、イベント、チェックポイント、スナップショット、状態差分、再生証拠、転写、保持ポリシー、成果物来歴を表し、隠れた推論テキストを保存せずに監査、復元、再生、エクスポートできるようにします。
  definition:
    en: Runtime State & Trace Domain is the operational concern domain for bounded execution episodes and raw runtime evidence. It models sessions, attempts, outcomes, actors, environments, budgets, trace records, spans, events, checkpoints, snapshots, state diffs, replay evidence, transcripts, retention policy, and artifact provenance so agent activity can be audited, recovered, replayed, and exported without storing hidden reasoning text.
    zh: 运行状态与轨迹域是面向有边界执行片段与原始运行证据的运行关注域。它刻画运行会话、执行尝试、执行结果、参与者、环境、预算、可观测追踪记录、跨度、事件、检查点、快照、状态差异、回放证据、转录、保留策略与产物溯源，使智能体活动能够被审计、恢复、回放和导出，同时不要求保存隐藏推理文本。
    ja: 実行状態とトレースドメインは、境界付けられた実行エピソードと生の実行証拠を扱う運用関心ドメインです。実行セッション、試行、結果、アクター、環境、予算、観測可能なトレース記録、スパン、イベント、チェックポイント、スナップショット、状態差分、再生証拠、転写、保持ポリシー、成果物来歴を表し、隠れた推論テキストを保存せずに監査、復元、再生、エクスポートできるようにします。
  why_needed:
    zh: 记录参与者、环境、会话、执行尝试、轨迹和有版本的运行产物。
    en: Records participants, environments, sessions, execution attempts, traces, and versioned runtime artifacts.
    ja: 参加者、環境、セッション、実行試行、軌跡、版管理された実行成果物を記録します。
  includes:
    - zh: "运行域负责运行环境与会话（owner: runtime-system）以及执行尝试与结果（owner: runtime-execution-attempts），明确一次执行发生在哪里、以何种会话边界启动并形成何种结果。"
      en: "Runtime owns Runtime environments and sessions (owner: runtime-system) and Execution attempts and outcomes (owner: runtime-execution-attempts), identifying where an execution occurs, within which session boundary it starts, and which outcome it produces."
      ja: "実行ドメインは実行環境とセッション（owner: runtime-system）および実行試行と結果（owner: runtime-execution-attempts）を所有し、実行場所・開始セッション境界・生成結果を特定します。"
    - zh: "运行域还负责运行产物（owner: runtime-artifacts），为执行期间产生且可按标识与版本继续引用的文件、补丁、构建物和其他成果赋予持久运行身份。"
      en: "Runtime also owns Runtime artifacts (owner: runtime-artifacts), assigning persistent runtime identity to files, patches, builds, and other products created during execution and subsequently referable by identifier and version."
      ja: "実行ドメインは実行成果物（owner: runtime-artifacts）も所有し、実行中に生成され識別子と版で継続参照できるファイル・パッチ・ビルド等へ永続的な実行同一性を与えます。"
  excludes:
    - zh: "目标与任务规划（owner: orchestration-task-planning）属于编排域，因为它定义执行前的目标分解和工作意图；运行域只实例化计划并记录实际发生的尝试与状态。"
      en: "Goals and task planning (owner: orchestration-task-planning) belongs to Orchestration because it defines pre-execution goal decomposition and work intent; Runtime instantiates the plan and records attempts and states that actually occur."
      ja: "目標とタスク計画（owner: orchestration-task-planning）は実行前の目標分解と作業意図を定義するため編成ドメインに属します。実行ドメインは計画を具体化し、実際の試行と状態を記録します。"
    - zh: "审查与纠正（owner: feedback-review-optimization）属于反馈域，因为它判断既有结果是否需要修订并记录纠正理由；运行域保留被审查的执行事实，不拥有改进判定。"
      en: "Review and correction (owner: feedback-review-optimization) belongs to Feedback because it judges whether an existing result needs revision and records the correction rationale; Runtime preserves the reviewed execution facts without owning improvement judgment."
      ja: "審査と修正（owner: feedback-review-optimization）は既存結果の修訂要否と修正理由を扱うためフィードバックドメインに属します。実行ドメインは審査対象の実行事実を保持しますが改善判断を所有しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 记录参与者、环境、会话、执行尝试、轨迹和有版本的运行产物。
  en: Records participants, environments, sessions, execution attempts, traces, and versioned runtime artifacts.
  ja: 参加者、環境、セッション、実行試行、軌跡、版管理された実行成果物を記録します。
structure: null
examples:
  - id: runtime-plane-example-positive-001
    kind: positive
    labels:
      zh: 可检查点恢复的执行会话
      en: A checkpoint-recoverable execution session
      ja: チェックポイント復元可能な実行セッション
    scenario_id: null
    descriptions:
      zh: session-330 中的 execution-330 由 agent-actor-7 以 reviewer-role-binding-7 执行。attempt-1 在 trace-span-61 内生成 artifact-draft-44 后因网络中断暂停；checkpoint-330-1 固定 state-snapshot-330-1 与预算余量。恢复活动从该检查点创建 attempt-2，并在 trace-span-62 中产生 result-330，而不覆盖第一次尝试。
      en: In session-330, execution-330 is performed by agent-actor-7 through reviewer-role-binding-7. attempt-1 produces artifact-draft-44 in trace-span-61 and pauses on a network interruption; checkpoint-330-1 fixes state-snapshot-330-1 and the remaining budget. A restore activity creates attempt-2 from that checkpoint and produces result-330 in trace-span-62 without overwriting the first attempt.
      ja: session-330 の execution-330 を agent-actor-7 が reviewer-role-binding-7 で実行します。attempt-1 は trace-span-61 で artifact-draft-44 を生成後 network interruption で停止し、checkpoint-330-1 が state-snapshot-330-1 と残予算を固定します。restore activity はそこから attempt-2 を作り trace-span-62 で result-330 を生成し、初回 attempt を上書きしません。
    field_values:
      session_id: session-330
      execution_id: execution-330
      actor_role_binding_id: reviewer-role-binding-7
      attempt_ids:
        - attempt-1
        - attempt-2
      trace_span_ids:
        - trace-span-61
        - trace-span-62
      checkpoint_id: checkpoint-330-1
      state_snapshot_id: state-snapshot-330-1
      run_result_id: result-330
    related_node_ids:
      - runtime-plane
    related_relation_ids: []
    expected_result:
      zh: 查询能重建两个尝试、各自参与者与产物、暂停原因、恢复依据和最终结果，并保留 attempt-1 作为不可变运行证据。
      en: A query reconstructs both attempts, their participants and artifacts, the pause cause, restore basis, and final result while retaining attempt-1 as immutable runtime evidence.
      ja: 二つの attempt・各 participant/artifact・停止原因・復元根拠・最終結果を再構成し、attempt-1 を不変の runtime evidence として保持します。
    why_valid_or_invalid:
      zh: 会话、实际尝试、主体绑定、原始跨度、状态快照、检查点、恢复活动与结果都属于已经发生的可观察运行事实，而不是应当如何执行的计划规范。
      en: Session, actual attempts, actor binding, raw spans, snapshot, checkpoint, restore activity, and result are observable occurrence facts, not a specification of how execution ought to proceed.
      ja: session・actual attempt・actor binding・raw span・snapshot・checkpoint・restore activity・result は発生済みの観測事実で、実行方法の specification ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-plane-003
  - id: runtime-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 尚未执行的任务计划不是运行状态
      en: An unexecuted task plan is not runtime state
      ja: 未実行のタスク計画は実行状態ではない
    scenario_id: null
    descriptions:
      zh: plan-audit-18@2 已定义 Task、TaskStep、WorkItem 和受派角色，但尚未创建 Session、Execution、RunAttempt、TraceSpan 或 Checkpoint；计划的 ready 状态只是治理批准，不是运行发生。
      en: plan-audit-18@2 defines Tasks, TaskSteps, WorkItems, and assignee roles but has created no Session, Execution, RunAttempt, TraceSpan, or Checkpoint. Its ready status is governance approval, not an execution occurrence.
      ja: plan-audit-18@2 は Task・TaskStep・WorkItem・assignee role を定義しますが Session・Execution・RunAttempt・TraceSpan・Checkpoint は未作成です。ready は governance approval で実行発生ではありません。
    field_values:
      task_plan_ref: plan-audit-18@2
      plan_status: ready
      session_id: null
      execution_id: null
      run_attempt_count: 0
      trace_record_present: false
    related_node_ids:
      - runtime-plane
      - orchestration-plane
    related_relation_ids: []
    expected_result:
      zh: 把计划、步骤与分配留在编排域；只有出现明确 Execution 及其运行证据后，才在运行时域创建对应事实。
      en: Keep the plan, steps, and allocation in Orchestration; create Runtime facts only when an explicit Execution and its occurrence evidence exist.
      ja: plan・step・allocation は Orchestration に置き、明示的 Execution と occurrence evidence が存在して初めて Runtime fact を作ります。
    why_valid_or_invalid:
      zh: 规范批准不能证明某次尝试已经开始；把计划状态当运行状态会伪造参与者、时间、结果和恢复谱系。
      en: Specification approval does not prove an attempt started. Treating plan state as runtime state would fabricate participants, time, result, and recovery lineage.
      ja: specification approval は attempt 開始を証明せず、plan state を runtime state とすると participant・time・result・recovery lineage を捏造します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-plane-004
