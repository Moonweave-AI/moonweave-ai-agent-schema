schema: moonweave.ai/ontology-node/v1
id: runtime-plane
kind: domain
status: accepted
labels: {zh: 运行时平面, en: Runtime plane, ja: ランタイムプレーン}
semantics:
  short_definition: {zh: 已观测的智能体执行、其负责智能体、产生实体与遥测所构成的领域。, en: "The domain of observed agent execution, its responsible agents, produced entities, and telemetry.", ja: 観測されたエージェント実行、その責任を持つエージェント、生成されたエンティティ、テレメトリーの領域。}
  definition: {zh: Runtime 平面记录因系统实际运行而存在的事实。它区分承担责任的 PROV-O Agent、随时间发生的 Activity，以及作为状态、工件或记录而持续存在的 Entity；OpenTelemetry 追踪、span、日志、指标和事件仍是可观测性证据，而不是执行本身。, en: "The Runtime plane records facts that exist because a system ran. It separates PROV-O Agents that bear responsibility, Activities that occur over time, and Entities that persist as state, artifacts, or records; OpenTelemetry traces, spans, logs, metrics, and events remain observability evidence rather than the execution itself.", ja: Runtime プレーンは、システムが実行されたために存在する事実を記録する。責任を負う PROV-O Agent、時間とともに生じる Activity、状態・成果物・記録として存続する Entity を区別する。OpenTelemetry のトレース、Span、ログ、メトリック、イベントは実行そのものではなく可観測性の証拠である。}
  why_needed: {zh: 生产智能体必须能在中断或失败后被解释。本领域使具体运行、其状态转换、证据和输出可寻址，而不会把建议计划、持久记忆或质量判断误当作运行时事实。, en: "A production agent must be explainable after an interruption or failure. This domain makes a concrete run, its state transitions, evidence, and outputs addressable without mistaking a proposed plan, durable memory, or quality judgement for a runtime fact.", ja: 本番エージェントは中断や失敗後に説明可能でなければならない。この領域は、提案された計画、永続メモリ、品質判断をランタイム事実と取り違えずに、具体的な実行、状態遷移、証拠、出力を参照可能にする。}
  includes:
    - {zh: 会话、执行尝试、重试和检查点活动、运行时环境、负责参与者以及生成工件。, en: "Sessions, execution attempts, retry and checkpoint activities, runtime environments, responsible actors, and generated artifacts.", ja: セッション、実行試行、再試行とチェックポイント活動、ランタイム環境、責任を持つアクター、生成成果物。}
    - {zh: 描述一次执行的追踪与 span 数据、类日志记录、指标摘要和生命周期事件。, en: "Trace and span data, log-like records, metric summaries, and lifecycle events that describe an execution.", ja: 実行を記述するトレースと Span データ、ログ風記録、メトリック要約、ライフサイクルイベント。}
  excludes:
    - {zh: 开始前的任务计划；它是编排中的预期 Entity，而不是 Runtime Activity。, en: "A task plan before it begins; that is an intended Entity in orchestration, not a Runtime Activity.", ja: 開始前のタスク計画。それはオーケストレーションにおける意図された Entity であり、Runtime Activity ではない。}
    - {zh: 为复用而保留的跨会话知识和运行后评估判断；它们属于 Memory 与 Feedback。, en: "Cross-session knowledge retained for reuse and post-run evaluation judgements; those belong to Memory and Feedback.", ja: 再利用のために保持されるセッション横断知識や実行後評価判断。それらは Memory と Feedback に属する。}
  semantic_kind: null
  aliases: [runtime, execution evidence]
engineering:
  explanation: {zh: 运行时服务在活动开始时接收关联信封，记录活动转换和生成实体，并把遥测作为并行信号发出。查询通过稳定 ID 连接这些记录；不会仅凭计划或指标推断活动已经完成。, en: "A runtime service accepts a correlation envelope at activity start, records activity transitions and generated entities, and emits telemetry as a parallel signal. A query joins those records by stable IDs; it does not infer a completed activity merely from a plan or a metric.", ja: ランタイムサービスは Activity 開始時に相関エンベロープを受け取り、Activity 遷移と生成 Entity を記録し、並行シグナルとしてテレメトリーを発行する。クエリは安定 ID により記録を結合し、計画やメトリックだけから完了 Activity を推論しない。}
  typical_input:
    - description: {zh: 运行关联信封, en: Run correlation envelope, ja: 実行相関エンベロープ}
      format: |-
        {"execution_id":"exec-842","session_id":"sess-77","actor_id":"agent-reviewer-2","started_at":"2026-07-18T09:00:00Z"}
  typical_output:
    - description: {zh: 运行时证据包, en: Runtime evidence bundle, ja: ランタイム証拠バンドル}
      format: |-
        {"execution_id":"exec-842","attempt_id":"attempt-1","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","artifact_ids":["patch-17"],"terminal_state":"succeeded"}
  reference_implementations:
    - {name: OpenAI Agents SDK, url: https://openai.github.io/openai-agents-python/running_agents/, description: Runner-managed turns, tool execution, and results.}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Thread-scoped checkpoints and state history.}
    - {name: W3C PROV-O, url: https://www.w3.org/TR/prov-o/, description: Agent, Activity, and Entity distinctions for runtime provenance.}
structure:
  identity_keys: [runtime_scope_id]
  fields:
    - id: runtime_scope_id
      labels: {zh: 运行范围 ID, en: Runtime scope ID, ja: ランタイムスコープ ID}
      definitions: {zh: 将运行时证据归入一个可查询运行范围的稳定标识符。, en: Stable identifier that groups runtime evidence into one queryable scope., ja: ランタイム証拠を 1 つの照会可能なスコープへまとめる安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: runtime-scope-842
      source_claims: [claim-runtime-plane-boundary]
    - id: observed_at
      labels: {zh: 观测时间, en: Observation time, ja: 観測時刻}
      definitions: {zh: 运行时事实被记录或关联到该范围的时间戳。, en: Timestamp at which a runtime fact is recorded or correlated to this scope., ja: ランタイム事実が記録されるか、このスコープへ相関付けられた時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:00:00Z'
      source_claims: [claim-runtime-plane-boundary]
  constraints:
    - id: runtime-plane-observed-evidence
      severity: error
      language: plain
      expression: A runtime scope must identify observed execution evidence with a stable scope ID and timestamp; a plan alone cannot satisfy this record.
      explanation: {zh: 运行时范围只表示已观测事实，不能由尚未发生的计划推断出来。, en: A runtime scope represents observed facts and cannot be inferred from a plan that has not occurred., ja: ランタイムスコープは観測済み事実を表し、まだ発生していない計画から推論してはならない。}
      source_claims: [claim-runtime-plane-boundary]
  required_relations: []
examples:
  - id: runtime-plane-positive
    labels: {zh: "OpenAI Assistants Run 完整运行时证据", en: "OpenAI Assistants Run full runtime evidence", ja: "OpenAI Assistants Run 完全ランタイム証拠"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; runtime-plane maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; runtime-plane maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; runtime-plane provenance graph."}
    field_values: {execution_id: run-qvy-swok6, thread_id: thread-abc}
    related_node_ids: [Execution, RunAttempt, TraceSpan, ReportArtifact, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-runtime-plane-boundary]
  - id: runtime-plane-counterexample
    labels: {zh: "Temporal 已批准但未启动的 Workflow", en: "Temporal approved but not started Workflow", ja: "Temporal 承認済み未開始 Workflow"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-plane.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-plane.", ja: "Missing parent_run_id rejects LangSmith-style runtime-plane."}
    field_values: {plan_id: plan-42}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-runtime-plane-boundary]
  - id: runtime-plane-boundary
    labels: {zh: "Cursor 跨会话 rules 与 Runtime 边界", en: "Cursor cross-session rules versus Runtime", ja: "Cursor セッション横断 rules と Runtime 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-plane preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-plane preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {memory_key: preferences/code-style}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-runtime-plane-boundary]
  - id: runtime-plane-instance-exec-842
    labels: {zh: "LangGraph thread-1 图执行实例", en: "LangGraph thread-1 graph execution instance", ja: "LangGraph thread-1 グラフ実行事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->runtime-plane.", en: "Langfuse instance: trace+span+score->runtime-plane.", ja: "Langfuse instance maps to runtime-plane."}
    field_values: {execution_id: langgraph-thread-1-run, thread_id: thread-1}
    related_node_ids: [Execution, RunAttempt, TraceRecord, Checkpoint, StateSnapshot]
    related_relation_ids: []
    source_claims: [claim-runtime-plane-boundary]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines the Agent, Activity, and Entity distinctions and their core provenance relations.
  - id: otel-spec-overview
    title: OpenTelemetry Specification
    url: https://opentelemetry.io/docs/specs/otel/
    source_type: standard
    relevance: Separates tracing, metrics, logs, context, and resource specifications.
source_claims:
  - id: claim-runtime-plane-boundary
    source: prov-o-core
    supports: PROV-O defines Activity as time-bounded work on or with Entities and distinguishes it from responsible Agents and resulting Entities.
    locator: Section 3.1, starting point terms
    evidence_kind: standard
    confidence: high


