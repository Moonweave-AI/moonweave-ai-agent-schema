source_claims:
  - id: claim-runtime-plane-001
    source: eng-fw-langgraph-docs
    supports: LangGraph distinguishes a graph's state, nodes, and edges from durable execution that checkpoints workflow progress and can resume after interruption or human review. This supports treating persisted execution state and recovery evidence as runtime facts rather than as planning concepts. The overview does not define Moonweave's Session, ExecutionAttempt, Budget, TraceSpan, Transcript, RetentionPolicy, or ArtifactProvenance schema, so the complete runtime-plane boundary remains a reviewed design inference.
    locator: Overview > Graphs, state, nodes, and edges; Core benefits > Durable execution and human-in-the-loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-plane-002
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK defines Runner invocations and results, persistent Sessions across runs, live sandbox sessions and manifests, and a Trace composed of Spans. These interfaces directly support separating one execution episode, its continuing session context, its actual environment, and its observable trace. Moonweave's complete runtime-plane—including budgets, checkpoints, state diffs, replay evidence, retention, transcripts, and artifact provenance—is a broader ontology design and is not claimed as an SDK schema.
    locator: Running agents > Runner lifecycle and configuration > The agent loop; Sessions > Core session behavior; Sandbox agents > Concepts > Execution boundary; Tracing > Traces and spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-plane-003
    source: eng-fw-langgraph-docs
    supports: LangGraph documents durable execution, persistence, human interruption, and resumable state. Moonweave records immutable attempts, checkpoints, snapshots, and restore provenance as separate runtime facts.
    locator: Overview > Durable execution, persistence, human-in-the-loop, and time travel
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-plane-004
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK running and session documentation distinguishes configured agents and orchestration from concrete runner lifecycle and persisted session interactions.
    locator: Running agents > Runner lifecycle and configuration; Sessions > Core session behavior
    evidence_kind: design-inference
    confidence: high
    review_status: pending
