schema: moonweave.ai/ontology-node/v1
id: runtime-plane
kind: domain
labels:
  en: Runtime State & Trace Domain
  zh: 运行状态与轨迹域
  ja: 実行状態とトレースドメイン
semantics:
  short_definition:
    zh: 运行域记录有边界的执行片段、会话、尝试、环境与可观测轨迹，使智能体活动可被审计、恢复与导出。
    en: The runtime domain records bounded execution episodes, sessions, attempts, environments, and observable traces so agent activity can be audited, recovered, and exported.
    ja: 実行ドメインは、境界付けられた実行エピソード、セッション、試行、環境、観測可能トレースを記録し、エージェント活動を監査・復元・エクスポート可能にします。
  definition:
    zh: 运行状态与轨迹域是智能体系统中负责“实际发生了什么”的运行域。它把一次或多次执行尝试、运行会话、参与者绑定、执行环境、预算消耗、trace/span/event、检查点、状态快照、运行产物与导出证据组织成可查询、可回放、可关联的 occurrence 事实。该域覆盖模型/API 流式事件、LangGraph 持久化 run、沙箱或终端执行边界，以及 OpenTelemetry 级别的可观测导出；但不拥有任务规划规范、评估指标语义、消息内容表示或安全授权判定本身。边界上，尚未实例化为 Execution 的计划批准属于编排域，而已经发生的 RunAttempt、TraceSpan 与 Artifact 版本才属于本域。
    en: Runtime State & Trace Domain is the operational domain for what actually happened in agentic systems. It organizes one or more execution attempts, runtime sessions, actor bindings, execution environments, budget consumption, trace/span/event records, checkpoints, state snapshots, runtime artifacts, and export evidence into queryable, replayable, linkable occurrence facts. The domain spans model/API streaming events, LangGraph persisted runs, sandbox or terminal execution boundaries, and OpenTelemetry-grade observability export. It does not own task-plan specifications, evaluation metric semantics, message content representation, or security-authorization adjudication. Governance-approved plans not yet instantiated as an Execution belong to orchestration; RunAttempt, TraceSpan, and Artifact versions that actually occurred belong here.
    ja: 実行状態とトレースドメインは、エージェント系において「実際に何が起きたか」を担う運用ドメインです。一回または複数の実行試行、実行セッション、アクター束縛、実行環境、予算消費、trace/span/event、チェックポイント、状態スナップショット、実行成果物、エクスポート証拠を、照会・再生・関連付け可能な occurrence 事実へ整理します。モデル/API ストリーミングイベント、LangGraph 永続 run、サンドボックス/端末実行境界、OpenTelemetry 級可観測エクスポートを包含しますが、タスク計画仕様、評価指標意味、メッセージ内容表現、安全認可判定そのものは所有しません。Execution として具体化されていない計画承認は編成ドメイン、実際に発生した RunAttempt・TraceSpan・Artifact 版は本ドメインに属します。
  why_needed:
    zh: 没有这一域，团队只能看到离散的 API 响应，无法回答某次任务何时开始、谁在什么环境执行、流式输出对应哪条 trace、失败后从哪个 checkpoint 恢复，或某份补丁是哪个 run 产生的。计划状态会被误当成运行事实，导致审计链断裂且无法安全回放。
    en: Without this domain, teams only see discrete API responses and cannot answer when a task started, who executed in which environment, which trace owns a streaming output, which checkpoint to restore after failure, or which run produced a patch. Plan state gets mistaken for runtime facts, breaking audit chains and safe replay.
    ja: このドメインがなければ、離散 API 応答しか見えず、タスク開始時刻、実行環境、アクター、ストリーム出力の trace、失敗後 checkpoint、パッチ生成 run を答えられません。plan state が runtime fact と誤認され、監査連鎖と安全再生が失われます。
  includes:
    - zh: "运行环境与会话（owner: runtime-system）以及执行尝试与结果（owner: runtime-execution-attempts），记录一次执行在哪里发生、以何种会话边界启动并形成何种结果。"
      en: "Runtime environments and sessions (owner: runtime-system) and execution attempts and outcomes (owner: runtime-execution-attempts), recording where an execution occurs, within which session boundary it starts, and which outcome it produces."
      ja: "実行環境とセッション（owner: runtime-system）および実行試行と結果（owner: runtime-execution-attempts）。実行場所、開始セッション境界、生成結果を記録します。"
    - zh: "可观测记录与事件（owner: runtime-observability），包括 trace、span、流式 SSE 事件、检查点、快照、转录与保留策略。"
      en: "Observability records and events (owner: runtime-observability), including traces, spans, streaming SSE events, checkpoints, snapshots, transcripts, and retention policies."
      ja: "可観測記録とイベント（owner: runtime-observability）。trace、span、ストリーミング SSE イベント、チェックポイント、スナップショット、転写、保持方針を含みます。"
    - zh: "运行产物（owner: runtime-artifacts），为执行期间产生且可按标识与版本继续引用的文件、补丁、构建物和其他成果赋予持久运行身份。"
      en: "Runtime artifacts (owner: runtime-artifacts), assigning persistent runtime identity to files, patches, builds, and other products created during execution and subsequently referable by identifier and version."
      ja: "実行成果物（owner: runtime-artifacts）。実行中に生成され識別子/版で継続参照できるファイル、パッチ、ビルド等へ永続実行同一性を与えます。"
  excludes:
    - zh: "目标分解、路由规范与尚未实例化的 TaskPlan（owner: orchestration-plane）；运行域只记录实际发生的 Execution 与 RunAttempt，不冒充计划本身。"
      en: "Goal decomposition, routing specifications, and uninstantiated TaskPlans (owner: orchestration-plane); runtime records actual Executions and RunAttempts and does not impersonate the plan itself."
      ja: "目標分解、ルーティング仕様、未具体化 TaskPlan（owner: orchestration-plane）。runtime は実際の Execution/RunAttempt を記録し、plan 自体になりすましません。"
    - zh: "消息内容块、来源引用与输出披露结构（owner: info-plane）；运行域可引用其 hash 或 artifact 链接，但不重新定义内容语义。"
      en: "Message content blocks, source references, and output-disclosure structures (owner: info-plane); runtime may reference hashes or artifact links but does not redefine content semantics."
      ja: "メッセージ内容块、出典参照、出力開示構造（owner: info-plane）。hash や artifact リンクは参照できますが、内容意味を再定義しません。"
    - zh: "评估分数、量规与改进判定（owner: feedback-plane）；运行域保留被评估的执行事实，不拥有 metric 或 verdict 语义。"
      en: "Evaluation scores, rubrics, and improvement judgments (owner: feedback-plane); runtime preserves evaluated execution facts without owning metric or verdict semantics."
      ja: "評価スコア、ルーブリック、改善判断（owner: feedback-plane）。評価対象の実行事実は保持しますが metric/verdict 意味は所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 新集成应把 OpenAI Responses 流式 SSE、Anthropic message 流事件、LangGraph Server run/stream、OpenTelemetry trace/span/metric 导出视为可映射的运行 API 形状，再用 Moonweave 本地对象记录 session、attempt、span 与 artifact 发生事实。静态 agent 配置属于其他域；response.created、message_start、run 状态迁移与 span export 属于本域 occurrence。
    en: New integrations should treat OpenAI Responses streaming SSE, Anthropic message stream events, LangGraph Server run/stream, and OpenTelemetry trace/span/metric export as mappable runtime API shapes, then persist Moonweave-local session, attempt, span, and artifact occurrence facts. Static agent configuration belongs elsewhere; response.created, message_start, run state transitions, and span export belong to runtime occurrences here.
    ja: 新統合では OpenAI Responses ストリーミング SSE、Anthropic message ストリームイベント、LangGraph Server run/stream、OpenTelemetry trace/span/metric エクスポートを写像可能な runtime API 形状として扱い、Moonweave ローカルで session、attempt、span、artifact の occurrence を保存します。静的 agent 設定は他ドメイン、response.created、message_start、run 状態遷移、span export は本ドメイン occurrence です。
  typical_input:
    - description: OpenAI Responses API streaming — SSE events from response.created through response.completed.
      format: |
        POST https://api.openai.com/v1/responses
        {"model": "gpt-4.1", "input": "Summarize the log", "stream": true}

        event: response.created
        data: {"type":"response.created","response":{"id":"resp_abc","status":"in_progress"}}

        event: response.output_item.added
        data: {"type":"response.output_item.added","output_index":0,"item":{"type":"message","role":"assistant"}}

        event: response.completed
        data: {"type":"response.completed","response":{"id":"resp_abc","status":"completed"}}
      source_claims: [claim-runtime-plane-openai-streaming]
    - description: Anthropic Messages streaming — message_start through message_stop with content_block deltas.
      format: |
        POST https://api.anthropic.com/v1/messages
        {"model":"claude-sonnet-4-20250514","max_tokens":1024,"stream":true,"messages":[...]}

        event: message_start
        data: {"type":"message_start","message":{"id":"msg_01XYZ","role":"assistant"}}

        event: content_block_start
        data: {"type":"content_block_start","index":0,"content_block":{"type":"text"}}

        event: content_block_delta
        data: {"type":"content_block_delta","index":0,"delta":{"type":"text_delta","text":"Hello"}}

        event: message_stop
        data: {"type":"message_stop"}
      source_claims: [claim-runtime-plane-anthropic-streaming]
    - description: LangGraph Server — create a persisted run on a thread and stream state updates.
      format: |
        POST https://langgraph.example.com/threads/thread-42/runs
        {
          "assistant_id": "support-agent",
          "input": {"messages": [{"role": "user", "content": "Reset my password"}]},
          "stream_mode": ["values", "messages"]
        }
        =>
        {"run_id": "run-884", "thread_id": "thread-42", "status": "pending"}
      source_claims: [claim-runtime-plane-langgraph-run]
    - description: OpenTelemetry OTLP trace export — trace and span records with parent links.
      format: |
        POST https://otel-collector.example.com/v1/traces
        {
          "resourceSpans": [{
            "resource": {"attributes": [{"key":"service.name","value":{"stringValue":"agent-runtime"}}]},
            "scopeSpans": [{
              "spans": [{
                "traceId": "4bf92f3577b34da6a3ce929d0e0e4736",
                "spanId": "00f067aa0ba902b7",
                "name": "langgraph.run",
                "startTimeUnixNano": "1720000000000000000",
                "endTimeUnixNano": "1720000005000000000",
                "status": {"code": "STATUS_CODE_OK"}
              }]
            }]
          }]
        }
      source_claims: [claim-runtime-plane-otel-export]
  typical_output:
    - description: Moonweave-local runtime projection linking session, attempt, span, and artifact without collapsing streaming events into plan state.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "session_id": "session-330",
          "execution_id": "execution-330",
          "run_attempt_id": "attempt-2",
          "trace_span_ids": ["trace-span-61", "trace-span-62"],
          "checkpoint_id": "checkpoint-330-1",
          "artifact_id": "artifact-draft-44"
        }
      source_claims: [claim-runtime-plane-domain-design]
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses-streaming
      description: SSE streaming events response.created, response.output_item.added, response.completed.
    - name: Anthropic Messages Streaming
      url: https://docs.anthropic.com/en/api/messages-streaming
      description: message_start, content_block_start, content_block_delta, message_stop event sequence.
    - name: LangGraph Server API
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
      description: POST /threads/{thread_id}/runs, run status, and stream_mode state updates.
    - name: OpenTelemetry Protocol
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: OTLP trace, span, and metric export for runtime observability.
    - name: E2B Code Interpreter
      url: https://e2b.dev/docs
      description: Sandbox session lifecycle, command execution, and filesystem artifacts.
structure:
  identity_keys: [execution_ref, run_attempt_ref]
  fields:
    - id: execution_ref
      labels: {zh: 执行引用, en: Execution reference, ja: 実行参照}
      definitions:
        zh: 标识一次有边界执行 episode 的稳定引用，通常对应 LangGraph run、OpenAI response 会话或 E2B sandbox session；不得用 TaskPlan ID 代替。
        en: Stable reference identifying one bounded execution episode, typically a LangGraph run, OpenAI response session, or E2B sandbox session; it must not be replaced by a TaskPlan ID.
        ja: LangGraph run、OpenAI response セッション、E2B sandbox session 等、境界付け実行エピソードを識別する安定参照。TaskPlan ID で代用してはなりません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: execution-330
      allowed_values: []
      source_claims: [claim-runtime-plane-langgraph-run, claim-runtime-plane-domain-design]
    - id: run_attempt_ref
      labels: {zh: 运行尝试引用, en: Run attempt reference, ja: 実行試行参照}
      definitions:
        zh: 在同一 Execution 内标识一次具体尝试的稳定引用；重试、恢复或人工介入应创建新 attempt 而非覆盖旧记录。
        en: Stable reference identifying one concrete attempt within the same Execution; retries, restores, or human interventions should create a new attempt rather than overwrite prior records.
        ja: 同一 Execution 内の一回の具体試行を識別する安定参照。再試行、復元、human intervention は上書きせず新 attempt を作成します。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-2
      allowed_values: []
      source_claims: [claim-runtime-plane-domain-design]
    - id: session_ref
      labels: {zh: 会话引用, en: Session reference, ja: セッション参照}
      definitions:
        zh: 把多次 Execution 或 RunAttempt 归入同一交互边界的会话标识，例如 LangGraph thread_id 或 Cursor agent session。
        en: Session identifier grouping multiple Executions or RunAttempts within one interaction boundary, such as a LangGraph thread_id or Cursor agent session.
        ja: LangGraph thread_id や Cursor agent session など、複数 Execution/RunAttempt を同一対話境界にまとめるセッション識別子。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session-330
      allowed_values: []
      source_claims: [claim-runtime-plane-langgraph-run, claim-runtime-plane-cursor-terminal]
    - id: stream_event_type
      labels: {zh: 流式事件类型, en: Stream event type, ja: ストリームイベント種別}
      definitions:
        zh: 厂商 SSE 或 WebSocket 流中的事件类型名，例如 response.created、content_block_delta、run.status。
        en: Vendor SSE or WebSocket stream event type name, such as response.created, content_block_delta, or run.status.
        ja: response.created、content_block_delta、run.status など、ベンダー SSE/WebSocket ストリームのイベント型名。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: response.output_item.added
      allowed_values: [response.created, response.output_item.added, response.completed, message_start, content_block_start, content_block_delta, message_stop]
      source_claims: [claim-runtime-plane-openai-streaming, claim-runtime-plane-anthropic-streaming]
    - id: trace_id
      labels: {zh: 追踪 ID, en: Trace identifier, ja: トレース ID}
      definitions:
        zh: OpenTelemetry 或兼容系统中的 traceId，用于关联 span、metric 与外部导出记录。
        en: traceId in OpenTelemetry or compatible systems, linking spans, metrics, and external export records.
        ja: OpenTelemetry 等における traceId。span、metric、外部エクスポート記録を関連付けます。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[0-9a-f]{32}$'
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      allowed_values: []
      source_claims: [claim-runtime-plane-otel-export]
    - id: span_id
      labels: {zh: 跨度 ID, en: Span identifier, ja: スパン ID}
      definitions:
        zh: 某次可观测操作在 trace 内的 spanId；必须与 trace_id 联用才能唯一定位一段运行证据。
        en: spanId of one observable operation within a trace; it must be paired with trace_id to uniquely locate a runtime evidence segment.
        ja: trace 内の一観測操作 spanId。trace_id と組み合わせて初めて実行証拠区間を一意特定できます。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[0-9a-f]{16}$'
      example_value: 00f067aa0ba902b7
      allowed_values: []
      source_claims: [claim-runtime-plane-otel-export]
  constraints:
    - id: runtime-requires-occurrence-not-plan
      severity: error
      expression_language: plain
      expression: A TaskPlan, RoutingPolicy, or governance-ready specification must not be asserted as an Execution or RunAttempt without a separate runtime occurrence record and observable start evidence.
      explanation:
        zh: 计划批准不能证明某次尝试已经开始；把计划状态当运行状态会伪造参与者、时间与恢复谱系。
        en: Plan approval does not prove an attempt started; treating plan state as runtime state fabricates participants, time, and recovery lineage.
        ja: plan 承認は attempt 開始を証明せず、plan state を runtime state とすると participant・時間・復元 lineage を捏造します。
      source_claims: [claim-runtime-plane-domain-design]
    - id: runtime-retry-creates-new-attempt
      severity: error
      expression_language: plain
      expression: A retry or restore after pause must create a new run_attempt_ref and link it to the prior attempt through explicit lineage rather than overwriting the first attempt record.
      explanation:
        zh: 覆盖第一次尝试会破坏审计与回放；恢复应保留不可变运行证据。
        en: Overwriting the first attempt breaks audit and replay; restore must preserve immutable runtime evidence.
        ja: 初回 attempt 上書きは監査/再生を壊します。復元は不変 runtime evidence を保持する必要があります。
      source_claims: [claim-runtime-plane-langgraph-run, claim-runtime-plane-domain-design]
    - id: runtime-stream-events-bind-to-execution
      severity: warning
      expression_language: plain
      expression: Streaming SSE events such as response.created or message_start must resolve to an execution_ref or run_attempt_ref; orphan stream fragments must not be promoted to completed outcomes.
      explanation:
        zh: 没有 execution 绑定的流式片段无法解释属于哪次运行，也不能当作最终结果。
        en: Stream fragments without an execution binding cannot explain which run they belong to and must not be promoted to completed outcomes.
        ja: execution 束縛のないストリーム断片はどの run に属するか説明できず、完了結果に昇格させてはなりません。
      source_claims: [claim-runtime-plane-openai-streaming, claim-runtime-plane-anthropic-streaming]
  required_relations: []
examples:
  - id: runtime-plane-example-openai-responses-streaming
    labels:
      zh: OpenAI Responses 流式会话
      en: OpenAI Responses streaming session
      ja: OpenAI Responses ストリーミングセッション
    descriptions:
      zh: 客户端以 stream=true 调用 Responses API，SSE 依次收到 response.created（resp_abc, in_progress）、response.output_item.added（output_index=0, message assistant）与 response.completed（status=completed）。系统将 resp_abc 映射为 execution_ref=execution-openai-abc，每个 SSE 事件写入 trace-span，最终 RunAttempt attempt-1 标记 completed 而不丢失中间事件顺序。
      en: The client calls the Responses API with stream=true and receives SSE response.created (resp_abc, in_progress), response.output_item.added (output_index=0, assistant message), and response.completed (status=completed). The system maps resp_abc to execution_ref=execution-openai-abc, records each SSE event as a trace-span, and marks RunAttempt attempt-1 completed without losing intermediate event order.
      ja: クライアントが stream=true で Responses API を呼び、SSE で response.created（resp_abc, in_progress）、response.output_item.added（output_index=0, assistant message）、response.completed（status=completed）を受信します。resp_abc を execution_ref=execution-openai-abc に写像し、各 SSE イベントを trace-span として記録、RunAttempt attempt-1 を completed とし中間イベント順序を失いません。
    example_source:
      product: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses-streaming
    field_values:
      api_endpoint: POST /v1/responses
      response_id: resp_abc
      stream: true
      sse_events:
        - response.created
        - response.output_item.added
        - response.completed
      execution_ref: execution-openai-abc
      run_attempt_ref: attempt-1
      final_status: completed
    related_node_ids:
      - runtime-plane
      - runtime-observability
      - runtime-execution-attempts
    related_relation_ids: []
    source_claims:
      - claim-runtime-plane-openai-streaming
  - id: runtime-plane-example-langgraph-persistent-run
    labels:
      zh: LangGraph 持久化 thread run
      en: LangGraph persistent thread run
      ja: LangGraph 永続 thread run
    descriptions:
      zh: 应用向 LangGraph Server 发送 POST /threads/thread-42/runs，assistant_id=support-agent，stream_mode=[values, messages]。返回 run_id=run-884、status=pending；checkpoint 在 graph 步骤间持久化 state，网络中断后从 checkpoint-330-1 创建 attempt-2 恢复，attempt-1 仍保留为不可变证据。
      en: The app sends POST /threads/thread-42/runs to LangGraph Server with assistant_id=support-agent and stream_mode=[values, messages]. The response returns run_id=run-884, status=pending; checkpoints persist state between graph steps. After a network interruption, attempt-2 restores from checkpoint-330-1 while attempt-1 remains immutable evidence.
      ja: アプリが LangGraph Server へ POST /threads/thread-42/runs（assistant_id=support-agent, stream_mode=[values, messages]）を送信します。run_id=run-884, status=pending が返り、graph ステップ間で checkpoint が state を永続化します。network interruption 後、checkpoint-330-1 から attempt-2 を復元し、attempt-1 は不変証拠として保持します。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
    field_values:
      thread_id: thread-42
      run_id: run-884
      assistant_id: support-agent
      stream_mode:
        - values
        - messages
      checkpoint_id: checkpoint-330-1
      run_attempt_refs:
        - attempt-1
        - attempt-2
      session_ref: session-330
    related_node_ids:
      - runtime-plane
      - runtime-system
      - runtime-execution-attempts
      - runtime-observability
    related_relation_ids: []
    source_claims:
      - claim-runtime-plane-langgraph-run
  - id: runtime-plane-example-e2b-sandbox-execution
    labels:
      zh: E2B 沙箱代码执行
      en: E2B sandbox code execution
      ja: E2B サンドボックスコード実行
    descriptions:
      zh: 智能体通过 E2B Sandbox.create() 启动隔离环境 sandbox-7，在 trace-span-61 内执行 Python 生成 artifact-draft-44（CSV 报告）。Execution execution-e2b-7 绑定 sandbox_id、working directory 与 exit code；沙箱销毁后 artifact 仍可通过 artifact_id 与 provenance 引用，而环境句柄不再可用。
      en: An agent starts isolated environment sandbox-7 via E2B Sandbox.create(), executes Python inside trace-span-61, and produces artifact-draft-44 (CSV report). Execution execution-e2b-7 binds sandbox_id, working directory, and exit code; after sandbox teardown the artifact remains referable by artifact_id and provenance while the environment handle is no longer usable.
      ja: エージェントが E2B Sandbox.create() で隔離環境 sandbox-7 を起動し、trace-span-61 内で Python を実行して artifact-draft-44（CSV レポート）を生成します。Execution execution-e2b-7 は sandbox_id、working directory、exit code を束縛します。サンドボックス破棄後も artifact は artifact_id/provenance で参照可能ですが、環境ハンドルは使用不可です。
    example_source:
      product: E2B Code Interpreter
      url: https://e2b.dev/docs
    field_values:
      sandbox_id: sandbox-7
      execution_ref: execution-e2b-7
      runtime_environment: e2b-code-interpreter
      trace_span_id: trace-span-61
      exit_code: 0
      artifact_id: artifact-draft-44
      artifact_mime_type: text/csv
      environment_teardown: true
    related_node_ids:
      - runtime-plane
      - runtime-system
      - runtime-artifacts
      - runtime-observability
    related_relation_ids: []
    source_claims:
      - claim-runtime-plane-e2b-sandbox
  - id: runtime-plane-example-cursor-terminal-session
    labels:
      zh: Cursor 终端会话执行
      en: Cursor terminal session execution
      ja: Cursor 端末セッション実行
    descriptions:
      zh: Cursor Agent 在 session-cursor-042 中通过 Shell 工具启动 PowerShell 命令 npm test ontology/runtime-plane，stdout/stderr 被 capture 为 AgentTranscript 片段并绑定 trace-span-62。Execution execution-cursor-042 记录 cwd、shell PID 与 exit_code=0；该次终端运行与后续文件编辑 run 共享 session_ref 但各自拥有独立 RunAttempt。
      en: In session-cursor-042, Cursor Agent runs PowerShell command npm test ontology/runtime-plane via the Shell tool; stdout/stderr are captured as AgentTranscript segments bound to trace-span-62. Execution execution-cursor-042 records cwd, shell PID, and exit_code=0; this terminal run shares session_ref with later file-edit runs but owns a separate RunAttempt.
      ja: session-cursor-042 で Cursor Agent が Shell ツール経由で PowerShell コマンド npm test ontology/runtime-plane を実行し、stdout/stderr を trace-span-62 に束縛した AgentTranscript 断片として capture します。Execution execution-cursor-042 は cwd、shell PID、exit_code=0 を記録します。この端末 run は後続ファイル編集 run と session_ref を共有しますが、別 RunAttempt を所有します。
    example_source:
      product: Cursor Agent Shell
      url: https://docs.cursor.com/agent
    field_values:
      session_ref: session-cursor-042
      execution_ref: execution-cursor-042
      run_attempt_ref: attempt-terminal-1
      shell: powershell
      command: npm test ontology/runtime-plane
      cwd: D:/moonweave-ai/moonweave-ai-agent-schema
      exit_code: 0
      trace_span_id: trace-span-62
      transcript_capture: stdout_stderr
    related_node_ids:
      - runtime-plane
      - runtime-system
      - runtime-observability
      - runtime-execution-attempts
    related_relation_ids: []
    source_claims:
      - claim-runtime-plane-cursor-terminal
  - id: runtime-plane-example-boundary-unexecuted-plan
    labels:
      zh: 尚未执行的任务计划不是运行状态
      en: Unexecuted task plan is not runtime state
      ja: 未実行タスク計画は実行状態ではない
    descriptions:
      zh: plan-audit-18@2 已定义 Task、TaskStep 与 assignee roles，plan_status=ready，但尚未创建 Session、Execution、RunAttempt 或 TraceSpan。治理批准只表示计划可启动，不能写入 runtime-plane occurrence；只有 POST /threads/.../runs 或等效执行入口触发后才创建运行事实。
      en: plan-audit-18@2 defines Tasks, TaskSteps, and assignee roles with plan_status=ready, but no Session, Execution, RunAttempt, or TraceSpan exists yet. Governance approval only means the plan may start and must not be written as a runtime-plane occurrence; runtime facts are created only after POST /threads/.../runs or an equivalent execution entrypoint fires.
      ja: plan-audit-18@2 は Task、TaskStep、assignee role を定義し plan_status=ready ですが、Session、Execution、RunAttempt、TraceSpan は未作成です。governance approval は計画開始可能を意味するだけで runtime-plane occurrence として書き込んではならず、POST /threads/.../runs 等の実行入口後にのみ runtime fact を作成します。
    example_source:
      product: Moonweave domain boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      task_plan_ref: plan-audit-18@2
      plan_status: ready
      session_ref: null
      execution_ref: null
      run_attempt_count: 0
      trace_record_present: false
    related_node_ids:
      - runtime-plane
      - orchestration-plane
    related_relation_ids: []
    source_claims:
      - claim-runtime-plane-domain-design
