schema: moonweave.ai/ontology-node/v1
id: TraceRetentionPolicy
kind: concept
status: accepted
labels:
  en: trace retention policy
  zh: 追踪保留策略
  ja: トレース保持ポリシー
semantics:
  short_definition:
    zh: 决定追踪采样、脱敏、可见性、存期与删除的策略。
    en: A policy for trace sampling, redaction, visibility, retention, and deletion.
    ja: トレースのサンプリング、秘匿、可視性、保持、削除を決める方針。
  definition:
    zh: 追踪保留策略是一种 specification，按数据分类、环境或租户规定 TraceRecord 及其跨度在采集前后的采样、字段脱敏、访问范围、导出目的地、保留时长与删除条件。它是治理规则，不是某条追踪的当前存储状态，也不能代替授权决定。
    en: TraceRetentionPolicy is a specification governing pre- and post-collection sampling, field redaction, visibility, export destinations, retention duration, and deletion conditions for TraceRecord and span data by classification, environment, or tenant. It is a rule, not the storage state of one trace and not an authorization decision.
    ja: TraceRetentionPolicy は、分類、環境、テナントに応じて TraceRecord とスパンデータの採集前後サンプリング、項目秘匿、可視範囲、出力先、保持期間、削除条件を定める仕様です。個別トレースの保存状態でも認可判断でもありません。
  why_needed:
    zh: 追踪可能包含提示、工具参数和用户标识；显式保留策略使成本、隐私与审计义务能够在采样、导出和删除阶段一致执行，而不是依赖每个导出器的隐含默认值。
    en: Traces may contain prompts, tool arguments, and user identifiers. An explicit retention policy applies cost, privacy, and audit obligations consistently at sampling, export, and deletion instead of relying on exporter defaults.
    ja: トレースにはプロンプト、ツール引数、利用者識別が含まれ得ます。明示方針により費用、プライバシー、監査義務を採集・出力・削除で一貫適用し、出力器既定に依存しません。
  includes:
    - zh: 包括“生产环境错误追踪保留 30 天、普通成功追踪按 1% 采样、提示正文导出前脱敏、欧盟租户仅导出到区域内后端”等规则。
      en: Includes rules such as retaining production error traces for 30 days, sampling ordinary successes at 1%, redacting prompt bodies before export, and keeping EU-tenant exports in-region.
      ja: 本番エラートレース30日保持、通常成功1%採取、出力前プロンプト本文秘匿、EU テナントの域内出力などの規則を含みます。
  excludes:
    - zh: 不包括实际 TraceRecord、当前数据库 TTL 值、某用户的一次访问授权决定，以及不涉及追踪数据生命周期的通用安全策略。
      en: Excludes the TraceRecord itself, a current database TTL value, one user's access decision, and general security policies unrelated to trace-data lifecycle.
      ja: TraceRecord 自体、現在のデータベース TTL、個別利用者のアクセス判断、追跡データライフサイクルに無関係な一般安全方針は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - retention_policy_id
    - version
  fields:
    - id: retention_policy_id
      labels:
        zh: 保留策略标识
        en: retention-policy ID
        ja: 保持 policy ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份可跨多条追踪复用的追踪数据治理规范。
        en: Stably identifies one trace-data governance specification reusable across many traces.
        ja: 多数 trace に再利用できる trace-data governance 仕様を安定識別します。
      allowed_values: []
      pattern: null
      example_value: trace-retention/prod-payments-cn
      source_claims:
        - claim-trace-retention-policy-002
    - id: version
      labels:
        zh: 策略版本
        en: policy version
        ja: policy 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定选择、采样、脱敏、导出、期限与到期动作的一致版本。
        en: Pins one coherent version of selection, sampling, redaction, export, duration, and expiry behavior.
        ja: selection・sampling・redaction・export・duration・expiry behavior の一貫した版を固定します。
      allowed_values: []
      pattern: null
      example_value: "5"
      source_claims:
        - claim-trace-retention-policy-003
    - id: trace_selector
      labels:
        zh: 追踪选择器
        en: trace selector
        ja: trace selector
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按环境、租户、服务、操作或数据分类判断策略适用于哪些追踪。
        en: Selects governed traces by environment, tenant, service, operation, or data classification.
        ja: environment・tenant・service・operation・data classification により統治対象 trace を選択します。
      allowed_values: []
      pattern: null
      example_value: environment = production and service = payments and region = CN
      source_claims:
        - claim-trace-retention-policy-004
    - id: sampling_rule
      labels:
        zh: 采样规则
        en: sampling rule
        ja: sampling rule
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定符合选择器的跨度是丢弃、仅记录还是记录并导出，以及不同条件的采样比例。
        en: States whether matching spans are dropped, record-only, or recorded and exported, including condition-specific rates.
        ja: 一致 span を drop・record-only・record-and-export のどれにするか、および条件別 sampling rate を定めます。
      allowed_values: []
      pattern: null
      example_value: sample errors at 100%; successful traces at 5%
      source_claims:
        - claim-trace-retention-policy-005
    - id: redaction_rule_refs
      labels:
        zh: 脱敏规则引用
        en: redaction-rule references
        ja: redaction rule 参照
      datatype: reference-list
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出采集或导出前必须删除、散列、截断或替换敏感属性的规则。
        en: Lists rules that delete, hash, truncate, or replace sensitive attributes before collection or export.
        ja: collection または export 前に sensitive attribute を削除・hash・truncate・replace する rule を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - redaction/payment-identifiers-v2
      source_claims:
        - claim-trace-retention-policy-006
    - id: export_destination_policy
      labels:
        zh: 导出目的地策略
        en: export-destination policy
        ja: export destination policy
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限制经过处理的追踪可发送到哪些区域、租户或后端，并非某次导出的实际 URI。
        en: Restricts the regions, tenants, or backends to which processed traces may be sent; it is not one export's actual URI.
        ja: 処理済み trace を送れる region・tenant・backend を制限し、一回の export の実 URI とは区別します。
      allowed_values: []
      pattern: null
      example_value: "regional-backends-only: CN"
      source_claims:
        - claim-trace-retention-policy-007
    - id: retention_period
      labels:
        zh: 保留期限
        en: retention period
        ja: 保持期間
      datatype: duration
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出从摄入或策略定义的起点到到期之间的持续时间。
        en: Gives the duration from ingestion or another policy-defined starting point until expiry.
        ja: ingestion または policy 定義起点から expiry までの duration を示します。
      allowed_values: []
      pattern: null
      example_value: P30D
      source_claims:
        - claim-trace-retention-policy-008
    - id: expiry_action
      labels:
        zh: 到期动作
        en: expiry action
        ja: 期限切れ action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定到期后永久删除、归档、匿名化或保留有限使用元数据。
        en: States whether expiry permanently deletes, archives, anonymizes, or retains limited usage metadata.
        ja: expiry 後に永久削除・archive・anonymize・限定 usage metadata 保持のどれを行うか定めます。
      allowed_values: []
      pattern: null
      example_value: permanently-delete-content-retain-usage-counts
      source_claims:
        - claim-trace-retention-policy-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: TraceRetentionPolicy-example-positive-001
    kind: positive
    labels:
      zh: 按环境和数据分类治理追踪生命周期
      en: Govern trace lifecycle by environment and data class
      ja: 環境・データ分類別にトレース寿命を統制
    scenario_id: null
    descriptions:
      zh: 生产环境策略要求含支付标识的 generation/tool spans 在采集前脱敏、错误追踪全采样、成功追踪采样 5%、只导出到区域内存储，并在 30 天后删除；开发环境采用另一组期限。
      en: A production policy redacts payment identifiers from generation/tool spans before collection, samples all error traces and 5% of successful traces, exports only to regional storage, and deletes after 30 days; development has a different schedule.
      ja: 本番方針はgeneration/toolスパンの決済識別子を収集前に秘匿し、エラートレース100%、成功5%を採取し、地域内保存先だけへ出力し30日後削除する。開発環境は別期限を使う。
    field_values:
      retention_policy_id: trace-retention/prod-payments-cn
      version: "5"
      trace_selector: environment = production and service = payments and region = CN
      sampling_rule: sample errors at 100%; successful traces at 5%
      redaction_rule_refs:
        - redaction/payment-identifiers-v2
      export_destination_policy: "regional-backends-only: CN"
      retention_period: P30D
      expiry_action: permanently-delete-content-retain-usage-counts
    related_node_ids:
      - TraceRetentionPolicy
      - TraceRecord
    related_relation_ids:
      - TraceRetentionPolicy-governs-TraceRecord
    expected_result:
      zh: 每条 TraceRecord 可依据环境、租户和分类得到确定的采样、脱敏、导出与删除处理。
      en: Each TraceRecord receives deterministic sampling, redaction, export, and deletion treatment from environment, tenant, and classification.
      ja: 各TraceRecordは環境・テナント・分類により採取、秘匿、出力、削除処理を決定できる。
    why_valid_or_invalid:
      zh: 该对象是适用于一类追踪的规则集合，而不是某条追踪当前存储位置的快照。
      en: The object is a reusable rule set for a class of traces, not a snapshot of where one trace is currently stored.
      ja: 対象はトレース群へ再利用する規則集合であり、あるトレースの現在保存場所を示す状態ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-retention-policy-001
  - id: TraceRetentionPolicy-example-boundary-001
    kind: boundary
    labels:
      zh: 单条追踪的存储状态不是保留策略
      en: One trace's storage state is not retention policy
      ja: 一件の保存状態は保持方針ではない
    scenario_id: null
    descriptions:
      zh: 记录“trace-8f2c1 已于 14:05 写入 bucket-cn-3，预计 8 月 14 日删除”。这描述一个实例的存储状态和计划日期，不含可复用于其他追踪的条件或规则。
      en: A record states “trace-8f2c1 was written to bucket-cn-3 at 14:05 and is scheduled for deletion on August 14.” It describes one instance's storage state, not reusable conditions or rules for other traces.
      ja: 「trace-8f2c1は14:05にbucket-cn-3へ保存され8月14日に削除予定」と記録する。これは一件の保存状態であり、他トレースへ再利用する条件・規則ではない。
    field_values: {}
    related_node_ids:
      - TraceRetentionPolicy
      - TraceRecord
    related_relation_ids:
      - TraceRetentionPolicy-governs-TraceRecord
    expected_result:
      zh: 该对象作为追踪存储/生命周期记录处理，不被归入 TraceRetentionPolicy。
      en: The object is handled as trace storage/lifecycle state and is not classified as TraceRetentionPolicy.
      ja: 対象はトレース保存・ライフサイクル状態として扱い、TraceRetentionPolicyには分類しない。
    why_valid_or_invalid:
      zh: 策略规定应如何处理一类对象；实例状态陈述某个对象已发生或计划发生什么。
      en: A policy prescribes treatment for a class of objects; instance state reports what happened or is scheduled for one object.
      ja: 方針は対象群の処理を規定し、インスタンス状態は一対象の実績・予定を報告する。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-retention-policy-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: TraceRetentionPolicy-governs-TraceRecord
    predicate: governs
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: governs
      en: governs
      ja: governs
    definitions:
      zh: TraceRetentionPolicy 通过 governs 指向其采样、敏感字段处理、可见性、保留期限与删除条件所约束的 TraceRecord 集合。
      en: TraceRetentionPolicy governs the TraceRecord set constrained by its sampling, sensitive-field handling, visibility, retention duration, and deletion conditions.
      ja: TraceRetentionPolicy は sampling・sensitive field 処理・visibility・retention duration・deletion 条件で制約する TraceRecord 集合を governs します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: governed_by
      labels:
        zh: 反向：governs
        en: governed by
        ja: 逆方向：governs
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: TraceRetentionPolicy-governs-TraceRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 逐项核实正例
          en: Point-reviewed positive case
          ja: 項目別審査の正例
        scenario_id: null
        descriptions:
          zh: policy trace-prod-v4 规定生产追踪保留 30 天、generation 输入脱敏，trace-44 标记该策略版本。
          en: Policy trace-prod-v4 retains production traces for 30 days and redacts generation input; trace-44 records that policy revision.
          ja: policy trace-prod-v4 は production trace を30日保持し generation input を redact、trace-44 は当該 policy revision を記録します。
        field_values: {}
        related_node_ids:
          - TraceRetentionPolicy
          - TraceRecord
        related_relation_ids:
          - TraceRetentionPolicy-governs-TraceRecord
