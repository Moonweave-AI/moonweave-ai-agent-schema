          zh: trace-45 在某存储中存在 12 天，但没有策略版本、分类或租户关联。
          en: trace-45 happens to remain in storage for 12 days but has no policy revision, classification, or tenant association.
          ja: trace-45 は storage に12日存在しますが policy revision・classification・tenant association を持ちません。
        field_values: {}
        related_node_ids:
          - TraceRetentionPolicy
          - TraceRecord
        related_relation_ids:
          - TraceRetentionPolicy-governs-TraceRecord
        expected_result:
