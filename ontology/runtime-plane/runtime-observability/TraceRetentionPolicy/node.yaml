source_claims:
  - id: claim-trace-retention-policy-001
    source: eng-fw-langsmith-observability-concepts
    supports: LangSmith documents trace-data retention periods, permanent deletion after expiry, and early trace deletion; Moonweave represents the reusable retention rule separately from any stored trace record.
    locator: Observability concepts > traces, runs, threads, trace enrichment, and data retention
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-002
    source: eng-fw-langsmith-observability-concepts
    supports: LangSmith applies a documented retention and deletion regime to many traces rather than turning each trace into a policy. Moonweave gives such reusable governance its own stable identity.
    locator: LangSmith Observability concepts 2026 > Data retention and early trace deletion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-003
    source: eng-std-opentelemetry-trace-sdk
    supports: OpenTelemetry tracer-provider sampling and processing configuration can change trace recording and export behavior. Versioning the combined Moonweave policy is a reproducibility inference, not an SDK field.
    locator: OpenTelemetry Trace SDK 1.59.0 > TracerProvider configuration, Sampling, and Span Processors
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-retention-policy-004
    source: eng-std-opentelemetry-trace-sdk
    supports: Sampler decisions can inspect span name, kind, attributes, links, and parent context, while remote sampling may vary by endpoint. Moonweave broadens that input into a policy applicability selector.
    locator: OpenTelemetry Trace SDK 1.59.0 > Sampling > Sampler > ShouldSample inputs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-005
    source: eng-std-opentelemetry-trace-sdk
    supports: The Trace SDK normatively defines DROP, RECORD_ONLY, and RECORD_AND_SAMPLE decisions and distinguishes recording from exporter eligibility. This directly supports an explicit sampling rule.
    locator: OpenTelemetry Trace SDK 1.59.0 > Sampling > ShouldSample > SamplingResult decisions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-006
    source: eng-std-opentelemetry-sensitive-data
    supports: OpenTelemetry assigns implementers responsibility for sensitive telemetry and documents attribute, filter, redaction, and transform processors for removing or changing data. Moonweave references reviewed rule objects rather than embedding undocumented regexes.
    locator: OpenTelemetry Handling sensitive data 2026 > Data minimization and Protecting sensitive data
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-007
    source: eng-std-opentelemetry-sensitive-data
    supports: OpenTelemetry guidance makes implementers responsible for appropriate telemetry handling and storage practices. Moonweave expresses the allowed backend boundary as policy rather than claiming OpenTelemetry defines destination governance.
    locator: OpenTelemetry Handling sensitive data 2026 > Your responsibility and Protecting sensitive data
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-retention-policy-008
    source: eng-fw-langsmith-observability-concepts
    supports: LangSmith states a concrete trace-data retention period measured from ingestion and distinguishes datasets that persist after source traces are deleted. This directly supports an explicit duration with a stated start event.
    locator: LangSmith Observability concepts 2026 > Data retention
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-009
    source: eng-fw-langsmith-observability-concepts
    supports: LangSmith documents permanent trace deletion after the retention period with limited metadata retained for usage statistics and supports earlier deletion. Moonweave generalizes those alternatives into an explicit expiry action.
    locator: LangSmith Observability concepts 2026 > Data retention and Manage a trace deletion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-retention-policy-010
    source: eng-fw-langsmith-observability-concepts
    supports: TraceRetentionPolicy governs the TraceRecord set constrained by its sampling, sensitive-field handling, visibility, retention duration, and deletion conditions. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Observability concepts > traces, runs, threads, trace enrichment, and data retention
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

