  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-trace-retention-policy-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports TraceRetentionPolicy identity and boundary mapping.
    locator: TraceRetentionPolicy integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-retention-policy-design
    source: src-runtime-observability-design
    supports: Moonweave TraceRetentionPolicy concept boundary within runtime-observability.
    locator: TraceRetentionPolicy boundary
    evidence_kind: design-inference
    confidence: high
