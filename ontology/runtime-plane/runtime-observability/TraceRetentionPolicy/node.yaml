schema: moonweave.ai/ontology-node/v1
id: TraceRetentionPolicy
kind: concept
status: accepted
labels: {zh: 追踪保留策略, en: Trace retention policy, ja: トレース保持ポリシー}
semantics:
  short_definition: {zh: 一个自定义策略 Entity，规定指定的持久化可观测性记录可保留多久以及随后采取何种处置。, en: A custom policy Entity that governs how long specified persisted observability records may be retained and what disposition follows., ja: 指定された永続可観測性記録をどれだけ保持できるか、およびその後の処置を規定するカスタムポリシー Entity。}
  definition: {zh: TraceRetentionPolicy 是一个带版本的 Moonweave 策略记录，为追踪相关或其他可观测性记录定义保留与处置范围。它不是 OpenTelemetry Trace、Span、Log Record、OpenTelemetry Metric、导出器配置，也不是最终归档或删除数据的清理 Activity。, en: "A TraceRetentionPolicy is a versioned Moonweave policy record that scopes retention and disposition for trace-related or other observability records. It is not an OpenTelemetry Trace, Span, Log Record, OpenTelemetry Metric, exporter configuration, or the cleanup Activity that eventually archives or deletes data.", ja: TraceRetentionPolicy は、トレース関連またはその他の可観測性記録の保持と処置の範囲を定めるバージョン付き Moonweave ポリシー記録である。OpenTelemetry Trace、Span、Log Record、OpenTelemetry Metric、エクスポーター設定、最終的にデータをアーカイブまたは削除するクリーンアップ Activity ではない。}
  why_needed: {zh: 可观测性证据包含敏感且运维成本高的数据，因此存储决策需要明确的策略标识、范围、期限以及法律或运维覆盖语义。, en: "Observability evidence contains sensitive and operationally costly data, so storage decisions need explicit policy identity, scope, duration, and legal or operational override semantics.", ja: 可観測性証拠には機微で運用コストの高いデータが含まれるため、ストレージ決定には明示的なポリシー識別子、範囲、期間、法的または運用上の上書き意味が必要である。}
  includes:
    - {zh: 策略 ID、受管记录类别、保留期限、处置以及保留令或覆盖行为。, en: "Policy ID, scoped record category, retention duration, disposition, and hold or override behavior.", ja: ポリシー ID、対象記録カテゴリ、保持期間、処置、ホールドまたは上書き動作。}
    - {zh: 适用于持久化 TraceRecord、TraceSpan、TraceEvent 和自定义记录投影的规则。, en: "Rules applying to persisted TraceRecord, TraceSpan, TraceEvent, and custom record projections.", ja: 永続化された TraceRecord、TraceSpan、TraceEvent、カスタム記録投影に適用される規則。}
  excludes:
    - {zh: 遥测信号对象本身、自动删除作业或通用仪表板查询。, en: "The telemetry signal objects themselves, an automatic deletion job, or a generic dashboard query.", ja: テレメトリーシグナルオブジェクト自体、自動削除ジョブ、一般的なダッシュボードクエリ。}
    - {zh: 声称 OpenTelemetry 定义了本组织的存储保留期限。, en: Claims that OpenTelemetry defines this organization's storage retention duration., ja: OpenTelemetry がこの組織のストレージ保持期間を定義すると主張すること。}
  semantic_kind: policy
  aliases: [telemetry retention rule, trace data lifecycle policy]
engineering:
  explanation: {zh: 治理方发布针对记录类别和期限的带版本策略。存储服务针对记录评估该策略，并通过独立执行进行归档、聚合或删除；即使记录数据日后被移除，策略本身仍是可审计的稳定 Entity。, en: "Governance publishes a versioned policy that targets record categories and duration. Storage services evaluate the policy against records and perform archive, aggregation, or deletion through separate executions; the policy itself remains a stable Entity that can be audited even when record data is later removed.", ja: ガバナンスは記録カテゴリと期間を対象とするバージョン付きポリシーを公開する。ストレージサービスは記録に対してポリシーを評価し、別個の実行によりアーカイブ、集約、削除を行う。記録データが後で削除されても、ポリシー自体は監査可能な安定した Entity として残る。}
  typical_input:
    - description: {zh: 保留规则定义, en: Retention rule definition, ja: 保持規則定義}
      format: |-
        {"policy_id":"retention-90","scope_kind":"trace_record","retention_days":30,"disposition":"archive_then_delete"}
  typical_output:
    - description: {zh: 已发布的保留策略, en: Published retention policy, ja: 公開済み保持ポリシー}
      format: |-
        {"policy_id":"retention-90","scope_kind":"trace_record","retention_days":30,"disposition":"archive_then_delete","version":"2026-07"}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Documents Span data classes that a custom storage policy may scope."}
    - {name: PROV-O Entity, url: https://www.w3.org/TR/prov-o/, description: "Documents durable Entity semantics distinct from cleanup activity."}
structure:
  identity_keys: [policy_id, version]
  fields:
    - id: policy_id
      labels: {zh: 保留策略 ID, en: Retention policy ID, ja: 保持ポリシー ID}
      definitions: {zh: 一项已发布可观测性保留策略的稳定标识符。, en: Stable identifier of one published observability-retention policy., ja: 1つの公開済み可観測性保持ポリシーの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: retention-90
      source_claims: [claim-trace-retention-policy-boundary]
    - id: scope_kind
      labels: {zh: 受管记录类型, en: Scoped record kind, ja: 対象記録種別}
      definitions: {zh: 由此策略版本治理的持久化可观测性记录类别。, en: Category of persisted observability record governed by this policy version., ja: このポリシーバージョンが統治する永続可観測性記録のカテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      allowed_values: [trace_record, trace_span, trace_event, log_projection, custom_observability_record]
      example_value: trace_record
      source_claims: [claim-trace-retention-policy-boundary]
    - id: retention_days
      labels: {zh: 保留天数, en: Retention days, ja: 保持日数}
      definitions: {zh: 在处置前受管记录可保留的天数，受保留令覆盖约束。, en: "Number of days a scoped record may be retained before disposition, subject to hold override.", ja: ホールド上書きに従い、処置前に対象記録を保持できる日数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      minimum: 0
      example_value: 30
      source_claims: [claim-trace-retention-policy-boundary]
    - id: disposition
      labels: {zh: 处置, en: Disposition, ja: 処置}
      definitions: {zh: 除非存在保留令，保留期限后必须采取的动作。, en: Required action after the retention interval unless a hold applies., ja: ホールドが適用されない限り、保持期間後に必要な操作。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [delete, archive, archive_then_delete, aggregate_only]
      example_value: archive_then_delete
      source_claims: [claim-trace-retention-policy-boundary]
  constraints:
    - id: trace-retention-policy-scope-and-hold
      severity: error
      language: plain
      expression: A policy must declare versioned scope, non-negative duration, disposition, and hold-override behavior; a cleanup execution must check applicable holds before deleting or archiving records.
      explanation: {zh: 保留策略是治理意图，而数据处置是独立且可问责的操作。, en: "Retention policy is governance intent, while data disposition is a separate accountable operation.", ja: 保持ポリシーはガバナンス上の意図であり、データ処置は別個の説明責任を負う操作である。}
      source_claims: [claim-trace-retention-policy-boundary]
  required_relations: []
examples:
  - id: trace-retention-policy-positive
    labels: {zh: "LangSmith 项目 trace 保留", en: "LangSmith project trace retention", ja: "LangSmith プロジェクト trace 保持"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceRetentionPolicy maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceRetentionPolicy maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TraceRetentionPolicy TraceSpan/Record."}
    field_values: {policy_id: retention-90, scope_kind: trace_record, retention_days: 30, disposition: archive_then_delete}
    related_node_ids: [TraceRetentionPolicy, TraceRecord]
    related_relation_ids: [TraceRetentionPolicy-governs-ObservabilityRecord]
    source_claims: [claim-trace-retention-policy-boundary]
  - id: trace-retention-policy-counterexample
    labels: {zh: "Execution 超时非 RetentionPolicy", en: "Execution timeout not RetentionPolicy", ja: "Execution timeout は RetentionPolicy ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style TraceRetentionPolicy TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style TraceRetentionPolicy TraceRecord.", ja: "Missing trace rejects Langfuse-style TraceRetentionPolicy."}
    field_values: {span_record_id: span-restore-1}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-trace-retention-policy-boundary]
  - id: trace-retention-policy-boundary
    labels: {zh: "Retention 与 RuntimeBudget 边界", en: "Retention versus RuntimeBudget boundary", ja: "Retention と RuntimeBudget 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; TraceRetentionPolicy must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; TraceRetentionPolicy must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {policy_id: retention-90}
    related_node_ids: [TraceRetentionPolicy, Execution, TraceRecord]
    related_relation_ids: [TraceRetentionPolicy-governs-ObservabilityRecord]
    source_claims: [claim-trace-retention-policy-boundary]
  - id: trace-retention-policy-instance-90
    labels: {zh: "7 天保留策略实例", en: "7-day retention policy instance", ja: "7 日保持ポリシー事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->TraceRetentionPolicy ObservabilityEvent.", en: "Phoenix instance: drift+quality->TraceRetentionPolicy ObservabilityEvent.", ja: "Phoenix instance maps to TraceRetentionPolicy Event."}
    field_values: {policy_id: retention-90, scope_kind: trace_record, retention_days: 30, disposition: archive_then_delete}
    related_node_ids: [TraceRetentionPolicy, TraceRecord, TraceSpan]
    related_relation_ids: [TraceRetentionPolicy-governs-ObservabilityRecord]
    source_claims: [claim-trace-retention-policy-boundary]
parent_relation: null
relations:
  - id: TraceRetentionPolicy-governs-ObservabilityRecord
    predicate: governs
    target: concept:ObservabilityRecord
    direction: source-to-target
    relation_kind: policy
    labels: {zh: 管理可观测性记录保留, en: governs observability record retention, ja: 可観測性記録の保持を統治する}
    definitions: {zh: 当记录类型和存储范围与策略声明的保留类别匹配时，TraceRetentionPolicy 管理 ObservabilityRecord。, en: TraceRetentionPolicy governs ObservabilityRecord when the record kind and storage scope match the policy's declared retention category., ja: 記録種別とストレージ範囲がポリシーの宣言した保持カテゴリと一致するとき、TraceRetentionPolicy は ObservabilityRecord を統治する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_governed_by, labels: {zh: 受保留策略管理, en: is governed by retention policy, ja: 保持ポリシーに統治される}}
    conditions:
      - id: trace-retention-governance-condition
        severity: error
        expression: Apply the policy only when the target record kind matches scope_kind and no higher-priority hold or policy version supersedes it.
        explanations: {zh: 记录类别和策略版本决定治理关系是否适用。, en: Record category and policy version determine whether the governance relation is applicable., ja: 記録カテゴリとポリシーバージョンが統治関係の適用可否を決定する。}
        source_claims: [claim-trace-retention-policy-boundary]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-trace-retention-policy-boundary]
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines the Span and Span Event data classes that a custom storage policy may scope without making retention an OTel signal type.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes durable policy entities from Activities that later act on retained records.
source_claims:
  - id: claim-trace-retention-policy-boundary
    source: otel-trace-api
    supports: OpenTelemetry defines trace data through Spans, SpanContexts, events, links, timestamps, and status, while this node intentionally defines a separate custom storage-governance policy over persisted projections.
    locator: SpanContext and Span
    evidence_kind: standard
    confidence: high

