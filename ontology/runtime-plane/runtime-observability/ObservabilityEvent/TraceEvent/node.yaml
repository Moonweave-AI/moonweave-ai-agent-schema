    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-event-003
    source: eng-std-opentelemetry-trace-api
    supports: Every TraceEvent is an ObservabilityEvent distinguished by being recorded on one TraceSpan as an instantaneous annotation with name, timestamp, and optional attributes. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
