schema: moonweave.ai/ontology-node/v1
id: TraceEvent
kind: concept
labels:
  en: trace event
  zh: 追踪事件
  ja: トレースイベント
semantics:
  short_definition:
    zh: 附着于某个追踪跨度的带时间注释事件。
    en: A timestamped annotation event attached to one trace span.
    ja: 一つのトレーススパンに付随する時刻付き注釈イベント。
  definition:
    zh: 追踪事件是一种 ObservabilityEvent，继承 event_id 作为唯一事件身份；发生时间、事件名称、所属 TraceSpan 与属性描述该瞬时发生项，而不组成第二套身份。它可表示重试、异常或缓存未命中；需要独立持续时间的操作应建模为子跨度。
    en: A TraceEvent is an ObservabilityEvent and inherits event_id as its sole event identity. Occurrence time, event name, owning TraceSpan, and attributes describe that instant rather than forming a second identity. It may mark a retry, exception, or cache miss; an operation requiring its own duration should be a child span.
    ja: TraceEvent は ObservabilityEvent の一種で、唯一のイベント同一性として event_id を継承します。発生時刻、イベント名、所属 TraceSpan、属性は瞬間的出来事を記述する種差で、別同一性ではありません。独自の所要時間を持つ操作は子スパンとして表します。
  why_needed:
    zh: 跨度只给出操作区间，追踪事件则保存区间内部的关键瞬间，从而无需为每个异常、重试或状态标记创建子跨度；其跨度归属同时保留了发生项所在的因果上下文。
    en: A span gives an operation interval, while trace events preserve important instants within that interval without creating a child span for every exception, retry, or state marker. Their span attachment retains the causal context of each occurrence.
    ja: スパンは操作区間を示し、トレースイベントはその内部の重要な瞬間を、例外や再試行ごとに子スパンを作らず保存します。スパンへの付属により発生項の因果文脈も保たれます。
  includes:
    - zh: 包括明确附着于跨度的异常记录、重试标记、缓存命中或未命中、模型流式输出首 token 到达等瞬时事件。
      en: Includes span-attached exception records, retry markers, cache hits or misses, and instantaneous markers such as arrival of the first streamed model token.
      ja: スパンに付随する例外記録、再試行印、キャッシュヒット／ミス、モデルの最初のストリームトークン到着などの瞬間イベントを含みます。
  excludes:
    - zh: 不包括具有开始与结束时间的 TraceSpan，也不包括未绑定到跨度、仅作为独立日志流记录存在的 LogRecord。
      en: Excludes a TraceSpan with start and end times, and a standalone LogRecord that is not attached to a span.
      ja: 開始・終了時刻を持つ TraceSpan、およびスパンに付属せず独立ログとしてだけ存在する LogRecord は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 TraceEvent 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating TraceEvent, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: TraceEvent 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to TraceEvent.
      format: |-
        # Example TraceEvent ingest
        { "trace-event_ref": "example-1" }
      source_claims:
        - claim-trace-event-design
  typical_output:
    - description: Moonweave-local TraceEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "trace-event_id": "example-1" }'
      source_claims:
        - claim-trace-event-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: TraceEvent-example-positive-001
    labels:
      zh: OTel Span.add_event tool.output
      en: OTel Span.add_event tool.output
      ja: OTel Span.add_event tool.output
    descriptions:
      zh: OpenTelemetry span.add_event("tool.output", attributes={"tool.name":"read_file","bytes":4096}) 在 TraceSpan 上产生 TraceEvent，含 event timestamp 与 attributes。
      en: OpenTelemetry span.add_event("tool.output", attributes={"tool.name":"read_file","bytes":4096}) produces TraceEvent on TraceSpan with event timestamp and attributes.
      ja: Span.add_event tool.output が TraceSpan 上の TraceEvent を生成する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      event_id: trace-event-exception-retrieval-1
      event_kind: trace
      event_name: exception
      timestamp: 2026-07-15T10:43:12.418Z
      attributes:
        exception.type: TimeoutError
        retry.ordinal: 1
        exception.message: "[redacted]"
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
    related_node_ids:
      - TraceEvent
      - TraceSpan
      - ObservabilityEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
      - TraceSpan-records_event-TraceEvent
    source_claims:
      - claim-trace-event-design
  - id: TraceEvent-example-boundary-001
    labels:
      zh: OpenAI Run step 非 TraceEvent
      en: OpenAI Run step not TraceEvent
      ja: OpenAI Run step は TraceEvent ではない
    descriptions:
      zh: OpenAI runs.steps.list step.type=tool_calls 是 Assistants Run Step 领域对象，不是 OTel Span.add_event TraceEvent。
      en: OpenAI runs.steps.list step.type=tool_calls is Assistants Run Step domain object, not OTel Span.add_event TraceEvent.
      ja: OpenAI Run Step は OTel TraceEvent ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceEvent
      - TraceSpan
    related_relation_ids:
      - TraceSpan-records_event-TraceEvent
    source_claims:
      - claim-trace-event-design
  - id: TraceEvent-example-3
    labels:
      zh: TraceEvent 与 TraceSpan 边界
      en: TraceEvent versus TraceSpan
      ja: TraceEvent と TraceSpan 境界
    descriptions:
      zh: TraceEvent 附着宿主 TraceSpan；无 span_id 的独立日志行不是 TraceEvent。
      en: TraceEvent attaches to host TraceSpan; standalone log line without span_id is not TraceEvent.
      ja: TraceEvent は宿主 TraceSpan に付着する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceEvent
    related_relation_ids: []
    source_claims:
      - claim-trace-event-vendor
      - claim-trace-event-design
  - id: TraceEvent-example-4
    labels:
      zh: checkpoint_saved 事件实例
      en: checkpoint_saved event instance
      ja: checkpoint_saved イベント事例
    descriptions:
      zh: LangGraph checkpointer.put 后 OTel span.add_event("checkpoint_saved", attributes={checkpoint_id:"1f070a87..."}) 记录 checkpoint_saved TraceEvent。
      en: After LangGraph checkpointer.put, OTel span.add_event("checkpoint_saved", attributes={checkpoint_id:"1f070a87..."}) records checkpoint_saved TraceEvent.
      ja: checkpointer.put 後 checkpoint_saved TraceEvent を記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceEvent
    related_relation_ids: []
    source_claims:
      - claim-trace-event-vendor
      - claim-trace-event-design
parent_relation:
  id: TraceEvent-is_a-ObservabilityEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 TraceEvent 都是 ObservabilityEvent，其种差是作为名称、时间戳和可选属性组成的瞬时注记被记录到一个 TraceSpan。
    en: Every TraceEvent is an ObservabilityEvent distinguished by being recorded on one TraceSpan as an instantaneous annotation with name, timestamp, and optional attributes.
    ja: すべての TraceEvent は ObservabilityEvent で、name・timestamp・任意 attributes を持つ瞬時 annotation として一つの TraceSpan に記録される点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trace-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TraceEvent-records-BoundaryCrossing
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录边界跨越
      en: records boundary crossing
      ja: boundary crossing を records
    definitions:
      zh: TraceEvent records 一个 BoundaryCrossing 时，事件时间、crossing_id、对象摘要、主体、决定和结果必须与跨越一致；方向从观测记录指向被记录发生，BoundaryCrossing 本身不因此成为 TraceEvent。
      en: TraceEvent records a BoundaryCrossing when event time, crossing ID, object digest, actors, decision, and outcome agree with the crossing. Direction runs from observation record to the recorded occurrence, and BoundaryCrossing does not thereby become a TraceEvent.
      ja: TraceEvent records BoundaryCrossing は event time・crossing ID・object digest・actor・decision・outcome が一致する場合に成立し direction は observation record→occurrence、BoundaryCrossing は TraceEvent になりません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_records_of
      labels:
        zh: 反向 records
        en: is records of
        ja: records inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: TraceEvent 只是对 BoundaryCrossing 的观测记录，不授予跨越权限；只有事件时间、crossing_id、对象摘要、参与者、决定和结果一致时才建立 records。
        en: A TraceEvent is an observation record of a BoundaryCrossing and grants no crossing authority; records is asserted only when event time, crossing_id, object digest, actors, decision, and outcome agree.
        ja: TraceEvent は BoundaryCrossing の observation record で crossing authority を与えません。event time・crossing_id・object digest・actor・decision・outcome が一致する場合だけ records を表明します。
      protocol_or_resource_context:
        zh: trace_id、span_id、event_id、crossing_id、对象摘要与 occurred_at 必须可验证地相关，单纯共处同一 trace 不足以建立记录关系。
        en: trace_id, span_id, event_id, crossing_id, object digest, and occurred_at must be verifiably correlated; mere co-membership in one trace is insufficient.
        ja: trace_id・span_id・event_id・crossing_id・object digest・occurred_at を検証可能に関連付け、同一traceでの共起だけでは不十分です。
    constraints: []
    source_claims:
      - claim-trace-event-design
      - claim-trace-event-design
    distinct_fact_rationale:
      zh: 该方向体现追踪记录描述发生，而不是发生生成追踪。
      en: The direction states that a trace record describes an occurrence rather than the occurrence producing the trace.
      ja: trace record が occurrence を describe し occurrence が trace を produce する意味ではありません。
    layout_role: cross-link
    target: concept:BoundaryCrossing
  - id: TraceEvent-records_generated_artifact-Artifact
    predicate: records_generated_artifact
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录已生成产物
      en: records generated artifact
      ja: 生成済み成果物を記録
    definitions:
      zh: TraceEvent 通过此关系记录某 Artifact 版本已经由其它执行活动生成；事件必须携带产物标识、版本和摘要，但事件本身不是生产活动。
      en: TraceEvent records that an Artifact revision was generated by another execution activity; the event carries artifact ID, version, and digest but is not itself the producing activity.
      ja: TraceEvent は別実行 activity が Artifact revision を生成した事実を記録し、artifact ID・version・digest を持ちますが event 自体は生産 activity ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 事件可以不记录产物，也可以记录一个批次中的多个产物。
      en: An event may record no artifact or several artifacts in one batch.
      ja: event は成果物を記録しない場合も batch の複数成果物を記録する場合もあります。
    inverse_reading:
      predicate: recorded_as_generated_by_event
      labels:
        zh: 生成被事件记录
        en: generation recorded by event
        ja: 生成が event に記録される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-event-design
    distinct_fact_rationale:
      zh: records_generated_artifact 是观测记录；Artifact-generated_by-RunAttempt 是真实生成溯源，二者职责不同。
      en: records_generated_artifact is an observation record; Artifact-generated_by-RunAttempt is actual generation provenance.
      ja: records_generated_artifact は観測記録、Artifact-generated_by-RunAttempt は実生成 provenance です。
    layout_role: cross-link
    target: concept:Artifact
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-trace-event-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports TraceEvent identity and boundary mapping.
    locator: TraceEvent integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-event-design
    source: src-runtime-observability-design
    supports: Moonweave TraceEvent concept boundary within runtime-observability.
    locator: TraceEvent boundary
    evidence_kind: design-inference
    confidence: high
