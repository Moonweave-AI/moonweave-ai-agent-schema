          en: trace-event-601 records completion of attempt-601-1 and carries report-7@2 ID, version, and digest; the RunAttempt remains the generator.
          ja: trace-event-601 は attempt-601-1 完了と report-7@2 の ID・version・digest を記録し、generator は RunAttempt のままです。
        field_values: {}
        related_node_ids:
