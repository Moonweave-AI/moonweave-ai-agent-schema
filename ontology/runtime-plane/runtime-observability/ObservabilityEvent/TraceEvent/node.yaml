    source: eng-std-opentelemetry-trace-api
    supports: The OpenTelemetry Tracing API defines a span Event by name, timestamp, and zero or more attributes and records it on one Span. Moonweave uses TraceEvent for that instantaneous span-scoped occurrence and reserves TraceSpan for duration-bearing operations.
    locator: Tracing API > Span operations > Add events; Event name, timestamp, and attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-event-002
