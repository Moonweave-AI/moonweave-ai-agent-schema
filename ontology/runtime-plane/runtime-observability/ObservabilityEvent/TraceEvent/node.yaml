          - Artifact
          - RunAttempt
        related_relation_ids:
          - TraceEvent-records_generated_artifact-Artifact
        expected_result:
          zh: 建立 records_generated_artifact，并另保留 generated_by。
          en: Assert records_generated_artifact and separately retain generated_by.
          ja: records_generated_artifact を主張し generated_by を別に保持します。
        why_valid_or_invalid:
          zh: 事件拥有充分相关键用于记录，但没有物化内容的活动身份。
          en: The event has sufficient correlation keys to record generation but no activity identity that materialized content.
          ja: event は生成記録に十分な correlation key を持ちますが内容を物化した activity 同一性はありません。
