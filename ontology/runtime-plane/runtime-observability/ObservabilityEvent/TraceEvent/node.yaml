schema: moonweave.ai/ontology-node/v1
id: TraceEvent
kind: concept
status: accepted
labels: {zh: OpenTelemetry Span Event, en: OpenTelemetry Span Event, ja: OpenTelemetry Span Event}
semantics:
  short_definition: {zh: 附着于一个 TraceSpan 的具名、带时间戳和属性发生的 OpenTelemetry Span Event 持久化投影。, en: "A persisted projection of an OpenTelemetry Span Event: a named, timestamped, attributed occurrence attached to one TraceSpan.", ja: 1つの TraceSpan に付着した名前付き、時刻付き、属性付きの発生である OpenTelemetry Span Event の永続投影。}
  definition: {zh: TraceEvent 表示记录在特定 OTel Span 上的 OTel Span Event，具有事件名称、时间戳、属性和所引用 span 身份。它不是全局追踪事件、独立 OTel Log Record、没有 span 附着的通用 ObservabilityEvent，也不是完整 TraceSpan。, en: "A TraceEvent represents an OTel Span Event recorded on a specific OTel Span, with event name, timestamp, attributes, and the referenced span identity. It is not a global trace event, a standalone OTel Log Record, a generic ObservabilityEvent without span attachment, or a whole TraceSpan.", ja: TraceEvent は、イベント名、タイムスタンプ、属性、参照 span 識別性を持つ特定 OTel Span 上に記録された OTel Span Event を表す。グローバルトレースイベント、独立 OTel Log Record、span 付着なしの一般 ObservabilityEvent、全体の TraceSpan ではない。}
  why_needed: {zh: 细粒度操作里程碑和异常需要标准 span 局部事件语义，同时保持与周围操作及自定义运行时领域通知的区别。, en: "Fine-grained operational milestones and exceptions need standard span-local event semantics while remaining distinct from the surrounding operation and from custom runtime domain notifications.", ja: 細粒度の運用マイルストーンと例外には、周囲の操作およびカスタムランタイム領域通知と区別された標準 span ローカルイベント意味が必要である。}
  includes:
    - {zh: Span Event 名称、时间戳、零个或多个属性和恰好一个附着 TraceSpan 引用。, en: "Span Event name, timestamp, zero or more attributes, and exactly one attached TraceSpan reference.", ja: Span Event 名、タイムスタンプ、0個以上の属性、ちょうど1つの付着 TraceSpan 参照。}
    - {zh: 在 span 生命周期中添加的 OTel 异常事件及其他插桩事件。, en: "OTel exception events and other instrumentation events added during a span lifetime.", ja: span の存続期間中に追加される OTel 例外イベントおよび他の計装イベント。}
  excludes:
    - {zh: 没有 span 的运行时检查点/重放通知、普通 Log Record 和指标数据点。, en: "Runtime checkpoint/replay notifications without a span, ordinary Log Records, and metric data points.", ja: span を持たないランタイムチェックポイント／再生通知、通常の Log Record、メトリックデータポイント。}
    - {zh: 追踪范围状态或对 span 开始和结束时间戳的替代品。, en: "A trace-wide status or a replacement for the span's start and end timestamps.", ja: トレース全体の状態、または span の開始・終了タイムスタンプの代替。}
  semantic_kind: event
  aliases: [span event, OTel event]
engineering:
  explanation: {zh: 插桩在 span 记录工作时调用 OTel Span AddEvent 操作。导出处理以 span 身份和事件时间戳持久化 TraceEvent 投影；自定义领域事件可以单独关联，但仅凭名称绝不满足附着要求。, en: "Instrumentation calls an OTel Span AddEvent operation while a span records work. Export processing persists a TraceEvent projection with the span identity and event timestamp; custom domain events can be correlated separately but never satisfy the attachment requirement by name alone.", ja: 計装は span が作業を記録する間に OTel Span AddEvent 操作を呼び出す。エクスポート処理は span 識別性とイベントタイムスタンプを持つ TraceEvent 投影を永続化し、カスタム領域イベントは別に相関できるが、名前だけで付着要件を満たすことはない。}
  typical_input:
    - description: {zh: Span 事件发出, en: Span event emission, ja: Span イベント発行}
      format: |-
        {"span_id":"8f2d8a3c5b6e7f90","event_name":"checkpoint.capture.completed","event_timestamp":"2026-07-18T09:15:55Z","attributes":{"checkpoint.id":"checkpoint-4"}}
  typical_output:
    - description: {zh: 持久化 Span Event 投影, en: Persisted Span Event projection, ja: 永続化 Span Event 投影}
      format: |-
        {"trace_event_id":"trace-event-19","span_id":"8f2d8a3c5b6e7f90","event_name":"checkpoint.capture.completed","attribute_count":1}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: Defines events as named, timestamped, attributed data added to a particular Span.}
structure:
  identity_keys: [event_id, trace_event_id, span_id]
  fields:
    - id: event_id
      labels: {zh: 运行时事件 ID, en: Runtime event ID, ja: ランタイムイベント ID}
      definitions: {zh: 从 ObservabilityEvent 继承并与该 Span Event 投影属于同一记录的稳定事件标识符。, en: Stable event identifier inherited from ObservabilityEvent for the same record as this Span Event projection., ja: この Span Event 投影と同じ記録に属する ObservabilityEvent から継承した安定イベント識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: obs-event-19
      source_claims: [claim-otel-span-event]
    - id: trace_event_id
      labels: {zh: 追踪事件 ID, en: Trace event ID, ja: トレースイベント ID}
      definitions: {zh: 一条导出 Span Event 投影的稳定存储标识符。, en: Stable storage identifier for one exported Span Event projection., ja: 1件のエクスポート済み Span Event 投影の安定ストレージ識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: trace-event-19
      source_claims: [claim-otel-span-event]
    - id: event_name
      labels: {zh: Span Event 名称, en: Span Event name, ja: Span Event 名}
      definitions: {zh: 对 OTel Span Event 分类的名称。, en: Name that classifies the OTel Span Event., ja: OTel Span Event を分類する名前。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: checkpoint.capture.completed
      source_claims: [claim-otel-span-event]
    - id: event_timestamp
      labels: {zh: Span Event 时间戳, en: Span Event timestamp, ja: Span Event タイムスタンプ}
      definitions: {zh: 事件被记录的时间或提供的事件发生时间。, en: Time at which the event was recorded or a supplied event occurrence time., ja: イベントが記録された時刻または指定されたイベント発生時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-otel-span-event]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions: {zh: 从 ObservabilityEvent 继承的领域发生时间；它保留在同一记录中，不替代 OTel 事件时间戳。, en: Domain occurrence time inherited from ObservabilityEvent on the same record; it does not replace the OTel event timestamp., ja: 同じ記録で ObservabilityEvent から継承する領域発生時刻。OTel イベントタイムスタンプを置き換えない。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-otel-span-event]
    - id: subject_ref
      labels: {zh: 主体引用, en: Subject reference, ja: 主体参照}
      definitions: {zh: 从 ObservabilityEvent 继承的受影响运行时主体引用；TraceEvent 将其限定为附着的 TraceSpan。, en: Runtime subject reference inherited from ObservabilityEvent and narrowed by TraceEvent to the attached TraceSpan., ja: ObservabilityEvent から継承し、TraceEvent では付着した TraceSpan に限定されるランタイム主体参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: span-restore-1
      source_claims: [claim-otel-span-event]
  constraints:
    - id: trace-event-span-attachment
      severity: error
      language: plain
      expression: A TraceEvent must be recorded on exactly one TraceSpan and include event name and timestamp; a standalone runtime event or log record may not use this type without span attachment.
      explanation: {zh: Span 附着是定义 OTel Event 的边界。, en: Span attachment is the defining OTel Event boundary., ja: Span 付着は OTel Event を定義する境界である。}
      source_claims: [claim-otel-span-event]
  required_relations: [TraceEvent-specializes-ObservabilityEvent, TraceEvent-recorded_on-TraceSpan]
examples:
  - id: trace-event-positive
    labels: {zh: "OTel Span.add_event tool.output", en: "OTel Span.add_event tool.output", ja: "OTel Span.add_event tool.output"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TraceEvent TraceSpan/Record."}
    field_values: {event_id: obs-event-19, trace_event_id: trace-event-19, event_name: checkpoint.capture.completed, event_timestamp: '2026-07-18T09:15:55Z', occurred_at: '2026-07-18T09:15:55Z', subject_ref: span-restore-1}
    related_node_ids: [TraceEvent, TraceSpan]
    related_relation_ids: [TraceEvent-recorded_on-TraceSpan]
    source_claims: [claim-otel-span-event]
  - id: trace-event-counterexample
    labels: {zh: "OpenAI Run step 非 TraceEvent", en: "OpenAI Run step not TraceEvent", ja: "OpenAI Run step は TraceEvent ではない"}
    descriptions: {zh: "Latency without embedding_version cannot serve as Phoenix-style TraceEvent drift event.", en: "Latency without embedding_version cannot serve as Phoenix-style TraceEvent drift event.", ja: "Missing embedding_version rejects Phoenix-style TraceEvent."}
    field_values: {event_id: obs-event-61}
    related_node_ids: [CheckpointRestoreEvent]
    related_relation_ids: []
    source_claims: [claim-otel-span-event]
  - id: trace-event-boundary
    labels: {zh: "TraceEvent 与 TraceSpan 边界", en: "TraceEvent versus TraceSpan", ja: "TraceEvent と TraceSpan 境界"}
    descriptions: {zh: "Langfuse score is eval signal not Execution; TraceEvent preserves trace/span/score distinction.", en: "Langfuse score is eval signal not Execution; TraceEvent preserves trace/span/score distinction.", ja: "score not Execution."}
    field_values: {event_name: checkpoint.capture.completed}
    related_node_ids: [TraceEvent, ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-otel-span-event]
  - id: trace-event-instance-19
    labels: {zh: "checkpoint_saved 事件实例", en: "checkpoint_saved event instance", ja: "checkpoint_saved イベント事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->TraceEvent ObservabilityEvent.", en: "Phoenix instance: drift+quality->TraceEvent ObservabilityEvent.", ja: "Phoenix instance maps to TraceEvent Event."}
    field_values: {event_id: obs-event-19, trace_event_id: trace-event-19, event_name: checkpoint.capture.completed, event_timestamp: '2026-07-18T09:15:55Z', occurred_at: '2026-07-18T09:15:55Z', subject_ref: span-restore-1}
    related_node_ids: [TraceEvent, TraceSpan, CheckpointCaptureActivity]
    related_relation_ids: [TraceEvent-recorded_on-TraceSpan]
    source_claims: [claim-otel-span-event]
parent_relation:
  id: TraceEvent-specializes-ObservabilityEvent
  predicate: is_a
  target: concept:ObservabilityEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 OpenTelemetry Span Event, en: is an OpenTelemetry Span Event, ja: OpenTelemetry Span Event である}
  definitions: {zh: 每个 TraceEvent 都是具有附着于特定 TraceSpan 的更严格 OTel 要求的 ObservabilityEvent。, en: Every TraceEvent is an ObservabilityEvent with the stricter OTel requirement of attachment to a specific TraceSpan., ja: すべての TraceEvent は特定 TraceSpan への付着というより厳しい OTel 要件を持つ ObservabilityEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_span_event, labels: {zh: 具有 Span Event, en: has Span Event, ja: Span Event を持つ}}
  conditions:
    - id: trace-event-parent-condition
      severity: error
      expression: Require an OTel Span Event name, timestamp, and attached TraceSpan; do not classify generic runtime events as TraceEvent.
      explanations: {zh: 父级领域事件契约是必要条件，但不足以满足 OTel Event 身份。, en: "The parent domain event contract is necessary but not sufficient for OTel Event identity.", ja: 親領域イベント契約は必要だが OTel Event 識別性には十分ではない。}
      source_claims: [claim-otel-span-event]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-otel-span-event]
relations:
  - id: TraceEvent-recorded_on-TraceSpan
    predicate: recorded_on
    target: concept:TraceSpan
    direction: source-to-target
    relation_kind: attachment
    labels: {zh: 记录在 TraceSpan 上, en: recorded on TraceSpan, ja: TraceSpan 上に記録される}
    definitions: {zh: 插桩将事件添加到该 OTel Span 时，TraceEvent recorded_on TraceSpan。, en: TraceEvent is recorded_on TraceSpan when instrumentation adds the event to that OTel Span., ja: 計装がイベントをその OTel Span に追加するとき、TraceEvent は TraceSpan に recorded_on される。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: has_event, labels: {zh: 具有 Span Event, en: has Span Event, ja: Span Event を持つ}}
    conditions:
      - id: trace-event-attachment-condition
        severity: error
        expression: The event span ID and trace context must match the target TraceSpan identity in the exported telemetry record.
        explanations: {zh: 另一个 span 上名称相似的事件是不同 OTel Event。, en: A similarly named event on another span is a different OTel Event., ja: 別の span 上の類似名イベントは異なる OTel Event である。}
        source_claims: [claim-otel-span-event]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-otel-span-event]
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines Span Events as named, timestamped, attributed data added to a specific Span.
source_claims:
  - id: claim-otel-span-event
    source: otel-trace-api
    supports: OpenTelemetry Span Events have a name, timestamp, and optional attributes and are added to a particular Span through its event API.
    locator: Span operations, Add Events
    evidence_kind: standard
    confidence: high

