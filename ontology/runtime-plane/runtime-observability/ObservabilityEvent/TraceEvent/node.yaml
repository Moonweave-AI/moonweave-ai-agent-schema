      kind: positive
      labels:
        zh: 逐项核实正例
        en: Point-reviewed positive case
        ja: 項目別審査の正例
      scenario_id: null
      descriptions:
        zh: span-17 在 10:14:03 记录 cache.miss 事件，并附上 cache.key_hash 与 retryable=true。
        en: span-17 records cache.miss at 10:14:03 with cache.key_hash and retryable=true attributes.
        ja: span-17 が 10:14:03 に cache.miss を記録し cache.key_hash と retryable=true を付けます。
      field_values: {}
      related_node_ids:
        - TraceEvent
        - ObservabilityEvent
      related_relation_ids:
        - TraceEvent-is_a-ObservabilityEvent
      expected_result:
        zh: 仅在所述证据存在时返回这条有向事实。
        en: Return this directed fact only when the described evidence exists.
        ja: 記載された証拠が存在する場合だけ、この有向事実を返します。
      why_valid_or_invalid:
        zh: 每个 TraceEvent 都是 ObservabilityEvent，其种差是作为名称、时间戳和可选属性组成的瞬时注记被记录到一个 TraceSpan。
        en: Every TraceEvent is an ObservabilityEvent distinguished by being recorded on one TraceSpan as an instantaneous annotation with name, timestamp, and optional attributes.
        ja: すべての TraceEvent は ObservabilityEvent で、name・timestamp・任意 attributes を持つ瞬時 annotation として一つの TraceSpan に記録される点が種差です。
      synthetic: true
