relations:
  - id: TraceEvent-records-BoundaryCrossing
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录边界跨越
      en: records boundary crossing
      ja: boundary crossing を records
    definitions:
      zh: TraceEvent records 一个 BoundaryCrossing 时，事件时间、crossing_id、对象摘要、主体、决定和结果必须与跨越一致；方向从观测记录指向被记录发生，BoundaryCrossing 本身不因此成为 TraceEvent。
      en: TraceEvent records a BoundaryCrossing when event time, crossing ID, object digest, actors, decision, and outcome agree with the crossing. Direction runs from observation record to the recorded occurrence, and BoundaryCrossing does not thereby become a TraceEvent.
      ja: TraceEvent records BoundaryCrossing は event time・crossing ID・object digest・actor・decision・outcome が一致する場合に成立し direction は observation record→occurrence、BoundaryCrossing は TraceEvent になりません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_records_of
      labels:
        zh: 反向 records
        en: is records of
        ja: records inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: TraceEvent 只是对 BoundaryCrossing 的观测记录，不授予跨越权限；只有事件时间、crossing_id、对象摘要、参与者、决定和结果一致时才建立 records。
        en: A TraceEvent is an observation record of a BoundaryCrossing and grants no crossing authority; records is asserted only when event time, crossing_id, object digest, actors, decision, and outcome agree.
        ja: TraceEvent は BoundaryCrossing の observation record で crossing authority を与えません。event time・crossing_id・object digest・actor・decision・outcome が一致する場合だけ records を表明します。
      protocol_or_resource_context:
        zh: trace_id、span_id、event_id、crossing_id、对象摘要与 occurred_at 必须可验证地相关，单纯共处同一 trace 不足以建立记录关系。
        en: trace_id, span_id, event_id, crossing_id, object digest, and occurred_at must be verifiably correlated; mere co-membership in one trace is insufficient.
        ja: trace_id・span_id・event_id・crossing_id・object digest・occurred_at を検証可能に関連付け、同一traceでの共起だけでは不十分です。
    constraints: []
    examples:
      - id: TraceEvent-records-BoundaryCrossing-example-positive-manual-20260716
        kind: positive
        labels:
          zh: PEP 追踪记录跨越
          en: PEP trace records crossing
          ja: PEP trace が crossing を record
        scenario_id: trust-relation-traceevent-records-boundarycrossing-positive
        descriptions:
          zh: trace-event-884 保存 crossing-884、03:02:17、相同摘要、decision-884 与 redacted 结果。
          en: trace-event-884 stores crossing-884, 03:02:17, the same digest, decision-884, and redacted outcome.
          ja: trace-event-884 は crossing-884・03:02:17・same digest・decision-884・redacted outcome を保存します。
        field_values: {}
        related_node_ids:
          - TraceEvent
          - BoundaryCrossing
        related_relation_ids:
          - TraceEvent-records-BoundaryCrossing
        expected_result:
          zh: 建立 trace-event-884 records crossing-884。
          en: Assert trace-event-884 records crossing-884.
          ja: trace-event-884 records crossing-884 を主張します。
        why_valid_or_invalid:
          zh: 追踪事件中的跨越标识、时间与参与者字段共同指向同一次边界跨越。
          en: Trace fields correlate completely with crossing identity.
          ja: trace field が crossing identity と完全 correlate します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-event-004
          - claim-trace-event-005
      - id: TraceEvent-records-BoundaryCrossing-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 仅同一时间的无关追踪
          en: Unrelated trace at same time
          ja: same time unrelated trace
        scenario_id: trust-relation-traceevent-records-boundarycrossing-boundary
        descriptions:
          zh: trace-event-885 时间接近，但记录不同对象摘要和 policy refresh，没有 crossing_id。
          en: trace-event-885 is close in time but records another object digest and a policy refresh with no crossing ID.
          ja: trace-event-885 は time close でも other digest/policy refresh で crossing ID がありません。
        field_values: {}
        related_node_ids:
          - TraceEvent
          - BoundaryCrossing
        related_relation_ids:
          - TraceEvent-records-BoundaryCrossing
        expected_result:
          zh: 不得仅按时间接近建立 records。
          en: Do not assert records from temporal proximity alone.
          ja: time proximity のみで records を主張しません。
        why_valid_or_invalid:
          zh: 观测关联需要跨越身份和载荷一致。
          en: Observation correlation requires crossing identity and payload agreement.
          ja: observation correlation は crossing identity/payload agreement を要します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-event-004
    source_claims:
      - claim-trace-event-006
      - claim-trace-event-007
    distinct_fact_rationale:
      zh: 该方向体现追踪记录描述发生，而不是发生生成追踪。
      en: The direction states that a trace record describes an occurrence rather than the occurrence producing the trace.
      ja: trace record が occurrence を describe し occurrence が trace を produce する意味ではありません。
    layout_role: cross-link
    review_status: accepted
    target: concept:BoundaryCrossing
  - id: TraceEvent-records_generated_artifact-Artifact
    predicate: records_generated_artifact
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录已生成产物
      en: records generated artifact
      ja: 生成済み成果物を記録
    definitions:
      zh: TraceEvent 通过此关系记录某 Artifact 版本已经由其它执行活动生成；事件必须携带产物标识、版本和摘要，但事件本身不是生产活动。
      en: TraceEvent records that an Artifact revision was generated by another execution activity; the event carries artifact ID, version, and digest but is not itself the producing activity.
      ja: TraceEvent は別実行 activity が Artifact revision を生成した事実を記録し、artifact ID・version・digest を持ちますが event 自体は生産 activity ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 事件可以不记录产物，也可以记录一个批次中的多个产物。
      en: An event may record no artifact or several artifacts in one batch.
      ja: event は成果物を記録しない場合も batch の複数成果物を記録する場合もあります。
    inverse_reading:
      predicate: recorded_as_generated_by_event
      labels:
        zh: 生成被事件记录
        en: generation recorded by event
        ja: 生成が event に記録される
