schema: moonweave.ai/ontology-node/v1
id: TraceEvent
kind: concept
status: accepted
labels:
  en: trace event
  zh: 追踪事件
  ja: トレースイベント
semantics:
  short_definition:
    zh: 附着于某个追踪跨度的带时间注释事件。
    en: A timestamped annotation event attached to one trace span.
    ja: 一つのトレーススパンに付随する時刻付き注釈イベント。
  definition:
    zh: 追踪事件是一种 ObservabilityEvent，继承 event_id 作为唯一事件身份；发生时间、事件名称、所属 TraceSpan 与属性描述该瞬时发生项，而不组成第二套身份。它可表示重试、异常或缓存未命中；需要独立持续时间的操作应建模为子跨度。
    en: A TraceEvent is an ObservabilityEvent and inherits event_id as its sole event identity. Occurrence time, event name, owning TraceSpan, and attributes describe that instant rather than forming a second identity. It may mark a retry, exception, or cache miss; an operation requiring its own duration should be a child span.
    ja: TraceEvent は ObservabilityEvent の一種で、唯一のイベント同一性として event_id を継承します。発生時刻、イベント名、所属 TraceSpan、属性は瞬間的出来事を記述する種差で、別同一性ではありません。独自の所要時間を持つ操作は子スパンとして表します。
  why_needed:
    zh: 跨度只给出操作区间，追踪事件则保存区间内部的关键瞬间，从而无需为每个异常、重试或状态标记创建子跨度；其跨度归属同时保留了发生项所在的因果上下文。
    en: A span gives an operation interval, while trace events preserve important instants within that interval without creating a child span for every exception, retry, or state marker. Their span attachment retains the causal context of each occurrence.
    ja: スパンは操作区間を示し、トレースイベントはその内部の重要な瞬間を、例外や再試行ごとに子スパンを作らず保存します。スパンへの付属により発生項の因果文脈も保たれます。
  includes:
    - zh: 包括明确附着于跨度的异常记录、重试标记、缓存命中或未命中、模型流式输出首 token 到达等瞬时事件。
      en: Includes span-attached exception records, retry markers, cache hits or misses, and instantaneous markers such as arrival of the first streamed model token.
      ja: スパンに付随する例外記録、再試行印、キャッシュヒット／ミス、モデルの最初のストリームトークン到着などの瞬間イベントを含みます。
  excludes:
    - zh: 不包括具有开始与结束时间的 TraceSpan，也不包括未绑定到跨度、仅作为独立日志流记录存在的 LogRecord。
      en: Excludes a TraceSpan with start and end times, and a standalone LogRecord that is not attached to a span.
      ja: 開始・終了時刻を持つ TraceSpan、およびスパンに付属せず独立ログとしてだけ存在する LogRecord は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: TraceEvent-example-positive-001
    kind: positive
    labels:
      zh: 跨度内带时间戳的异常标记
      en: Timestamped exception marker within a span
      ja: スパン内の時刻付き例外マーカー
    scenario_id: null
    descriptions:
      zh: 检索工具跨度在 2026-07-15T10:43:12.418Z 记录名为 exception 的事件，属性包含 exception.type=TimeoutError、retry.ordinal=1 和经过脱敏的 message。
      en: A retrieval-tool span records an event named exception at 2026-07-15T10:43:12.418Z with exception.type=TimeoutError, retry.ordinal=1, and a redacted message.
      ja: 検索ツールスパンが2026-07-15T10:43:12.418Zにexceptionというイベントを記録し、exception.type=TimeoutError、retry.ordinal=1、秘匿済みmessageを属性に持つ。
    field_values:
      event_id: trace-event-exception-retrieval-1
      event_kind: trace
      event_name: exception
      timestamp: 2026-07-15T10:43:12.418Z
      attributes:
        exception.type: TimeoutError
        retry.ordinal: 1
        exception.message: "[redacted]"
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
    related_node_ids:
      - TraceEvent
      - TraceSpan
      - ObservabilityEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
      - TraceSpan-records_event-TraceEvent
    expected_result:
      zh: 该发生被识别为 TraceEvent，并通过所在跨度保留完整因果上下文。
      en: The occurrence is classified as TraceEvent and retains causal context through its containing span.
      ja: 発生はTraceEventに分類され、所属スパンを通じて因果文脈を保持する。
    why_valid_or_invalid:
      zh: 它以名称和发生时点标识跨度区间内的一次瞬时事实，没有独立操作时长。
      en: It identifies one instantaneous fact inside the span interval by name and occurrence time and has no independent operation duration.
      ja: スパン区間内の一回の瞬時事実を名前と発生時刻で識別し、独立した操作時間を持たない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-event-002
  - id: TraceEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 有独立时长的工具调用应建为子跨度
      en: A duration-bearing tool call should be a child span
      ja: 独立時間を持つツール呼出しは子スパン
    scenario_id: null
    descriptions:
      zh: 模型跨度内启动一次检索调用，调用有自己的开始、结束、状态、属性和两个内部重试事件。它是一项可测量操作，应建立 TraceSpan，而不是压成父跨度上的单个 TraceEvent。
      en: Within a model span, a retrieval call has its own start, end, status, attributes, and two internal retry events. It is a measurable operation and should be a child TraceSpan rather than one event on the parent span.
      ja: モデルスパン内の検索呼出しが独自の開始・終了・状態・属性と2つの再試行イベントを持つ。測定可能な操作なので、親スパン上の単一TraceEventではなく子TraceSpanにする。
    field_values: {}
    related_node_ids:
      - TraceEvent
      - TraceSpan
    related_relation_ids:
      - TraceSpan-records_event-TraceEvent
    expected_result:
      zh: 检索调用被建模为子 TraceSpan，其内部重试才作为 TraceEvent。
      en: The retrieval call is modeled as a child TraceSpan, and only its internal retries become TraceEvents.
      ja: 検索呼出しは子TraceSpanにし、内部再試行だけをTraceEventにする。
    why_valid_or_invalid:
      zh: 事件没有持续区间；能够单独计时和给出结果的工作具有跨度身份。
      en: An event has no duration interval; independently timed work with an outcome has span identity.
      ja: イベントは継続区間を持たず、独立計時と結果を持つ作業はスパンの同一性を持つ。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-event-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: CheckpointRestoreEvent
    shared_parent_concept_id: ObservabilityEvent
    differentia:
      zh: 已审查兄弟区分：父节点 ObservabilityEvent：TraceEvent（semantic kind=event，骨架 TraceEvent-is_a-ObservabilityEvent）；CheckpointRestoreEvent（semantic kind=event，骨架 CheckpointRestoreEvent-is_a-ObservabilityEvent）。双端条件：TraceEvent 条件：“作为可观测运行事件，追踪事件由这一事实区分：它是可观测的运行发生项，例如消息、动作、工具调用、状态更新、警告、策略决策、产物更新或检查点事件”；CheckpointRestoreEvent 条件：“检查点恢复事件属于可观测运行事件，区别于其他同类对象的条件是：它记录从已保存检查点恢复运行会话、参与者、图或工作流的可观测事件，并保存恢复溯源”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ObservabilityEvent: TraceEvent (semantic kind=event, backbone TraceEvent-is_a-ObservabilityEvent); CheckpointRestoreEvent (semantic kind=event, backbone CheckpointRestoreEvent-is_a-ObservabilityEvent). Endpoint conditions: TraceEvent condition: “Trace event belongs to the observability event category and differs from broader members in that it is an observable runtime occurrence such as a message, action, tool call, state update, warning, policy decision, artifact update, or checkpoint event”; CheckpointRestoreEvent condition: “Checkpoint restore event is an observability event whose defining condition is that it is an observable event that restores a runtime session, actor, graph, or workflow from a saved checkpoint and records restore provenance”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ObservabilityEvent：TraceEvent（semantic kind=event、バックボーン TraceEvent-is_a-ObservabilityEvent）；CheckpointRestoreEvent（semantic kind=event、バックボーン CheckpointRestoreEvent-is_a-ObservabilityEvent）。両端条件：TraceEvent の条件：「トレースイベントは観測可能実行イベントとして、次の条件により他の対象と区別されます：それは、メッセージ、行動、ツール呼び出し、状態更新、警告、ポリシー判断、成果物更新、チェックポイントイベントなどの観測可能な実行上の出来事です」；CheckpointRestoreEvent の条件：「チェックポイント復元イベントは観測可能実行イベントのうち、次の事実を定義条件とする対象です：それは、保存済みチェックポイントから実行セッション、アクター、グラフ、ワークフローを復元する観測可能イベントを記録し、復元来歴を残します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-trace-event-002
parent_relation:
  id: TraceEvent-is_a-ObservabilityEvent
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 TraceEvent 都是 ObservabilityEvent，其种差是作为名称、时间戳和可选属性组成的瞬时注记被记录到一个 TraceSpan。
    en: Every TraceEvent is an ObservabilityEvent distinguished by being recorded on one TraceSpan as an instantaneous annotation with name, timestamp, and optional attributes.
    ja: すべての TraceEvent は ObservabilityEvent で、name・timestamp・任意 attributes を持つ瞬時 annotation として一つの TraceSpan に記録される点が種差です。
  cardinality: null
