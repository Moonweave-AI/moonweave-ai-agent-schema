schema: moonweave.ai/ontology-node/v1
id: ReplayEvent
kind: concept
labels:
  en: replay event
  zh: 回放事件
  ja: 再生イベント
semantics:
  short_definition:
    zh: 请求从指定检查点重新执行后续步骤的运行事件。
    en: A runtime event requesting re-execution after a selected checkpoint.
    ja: 指定チェックポイント後の再実行を要求する実行イベント。
  definition:
    zh: 回放事件是一种 ObservabilityEvent，记录某主体在特定时刻请求从指定检查点或轨迹位置开始重新执行后续步骤。它携带回放目的、输入复用策略与允许分支范围，并可触发 ReplayActivity；实际步骤重演属于活动，事件只表示触发。
    en: A ReplayEvent is an ObservabilityEvent recording that an actor requested re-execution of subsequent steps from a named checkpoint or trace position at a particular time. It carries replay purpose, input-reuse policy, and allowed branching scope and may trigger ReplayActivity; the step re-execution is the activity, while this event is its trigger.
    ja: ReplayEvent は、主体が指定チェックポイントまたはトレース位置から後続ステップの再実行を特定時刻に要求したことを記録する ObservabilityEvent です。目的、入力再利用方針、分岐許容範囲を持ち ReplayActivity を起動できます。再実行は活動で、イベントは起動事実です。
  why_needed:
    zh: 独立的回放触发记录解释是谁为何启动调试、复现或时间旅行，以及要求复用哪些输入；这使回放结果能与普通故障恢复和正常重试区分。
    en: A separate replay trigger records who initiated debugging, reproduction, or time travel, why, and which inputs should be reused, distinguishing replay outcomes from ordinary recovery and normal retries.
    ja: 独立した再生トリガーは、誰がなぜデバッグ・再現・時間移動を開始し、どの入力を再利用したかを残し、通常復旧や通常再試行と区別します。
  includes:
    - zh: 包括开发者选择失败前检查点并要求复用原始输入重演工具调用，以及评估器从同一点注入替代输入形成比较分支的事件。
      en: Includes a developer selecting the checkpoint before a failure to replay a tool call with original inputs, and an evaluator requesting a comparison branch with substituted inputs.
      ja: 開発者が障害前チェックポイントを選び元入力でツール呼出しを再生する要求、評価器が代替入力の比較分岐を要求する事象を含みます。
  excludes:
    - zh: 不包括只要求装载状态而不重演步骤的 CheckpointRestoreEvent、实际重演过程 ReplayActivity，以及运行策略自动执行的普通 RetryAttempt。
      en: Excludes CheckpointRestoreEvent requests that only load state, the ReplayActivity performing re-execution, and an ordinary RetryAttempt automatically scheduled by runtime policy.
      ja: 状態読込だけを求める CheckpointRestoreEvent、再実行処理の ReplayActivity、方針で自動実行される通常 RetryAttempt は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 ReplayEvent 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ReplayEvent, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ReplayEvent 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ReplayEvent.
      format: |-
        # Example ReplayEvent ingest
        { "replay-event_ref": "example-1" }
      source_claims:
        - claim-replay-event-design
  typical_output:
    - description: Moonweave-local ReplayEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "replay-event_id": "example-1" }'
      source_claims:
        - claim-replay-event-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReplayEvent-example-positive-001
    labels:
      zh: LangGraph time-travel replay
      en: LangGraph time-travel replay
      ja: LangGraph time-travel replay
    descriptions:
      zh: LangGraph graph.invoke(None, config={"configurable":{"thread_id":"thread-1","checkpoint_id":"1f070a87..."}}) time-travel 产生 ReplayEvent，重放历史 super-step 状态。
      en: LangGraph graph.invoke(None, config={"configurable":{"thread_id":"thread-1","checkpoint_id":"1f070a87..."}}) time-travel produces ReplayEvent replaying historical super-step state.
      ja: LangGraph time-travel invoke が ReplayEvent を生成する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      event_id: replay-request-cp17
      event_kind: replay
      event_name: checkpoint.replay.requested
      timestamp: 2026-07-16T11:08:04.000Z
      attributes:
        initiator: investigator-5
        policy: reuse-recorded-inputs
        reason: reproduce-third-tool-divergence
    related_node_ids:
      - ReplayEvent
      - ReplayActivity
      - ObservabilityEvent
    related_relation_ids:
      - ReplayEvent-is_a-ObservabilityEvent
      - ReplayEvent-triggers-ReplayActivity
    source_claims:
      - claim-replay-event-design
  - id: ReplayEvent-example-boundary-001
    labels:
      zh: LangSmith playground 非 ReplayEvent
      en: LangSmith playground not ReplayEvent
      ja: LangSmith playground は ReplayEvent ではない
    descriptions:
      zh: LangSmith playground 重跑 prompt 无 checkpoint_id/thread 证据，不是 LangGraph ReplayEvent。
      en: LangSmith playground re-run prompt lacks checkpoint_id/thread evidence, not LangGraph ReplayEvent.
      ja: LangSmith playground は ReplayEvent ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayEvent
      - ReplayActivity
    related_relation_ids:
      - ReplayEvent-triggers-ReplayActivity
    source_claims:
      - claim-replay-event-design
  - id: ReplayEvent-example-3
    labels:
      zh: ReplayEvent 与 ReplayActivity 边界
      en: ReplayEvent versus ReplayActivity
      ja: ReplayEvent と ReplayActivity 境界
    descriptions:
      zh: ReplayEvent 是观测到的 replay 发生事件；ReplayActivity 是 PROV Activity 执行 replay 操作；事件记录 occurrence，Activity 记录 work。
      en: ReplayEvent is observed replay occurrence event; ReplayActivity is PROV Activity performing replay; event records occurrence, Activity records work.
      ja: ReplayEvent は occurrence、ReplayActivity は Activity である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayEvent
    related_relation_ids: []
    source_claims:
      - claim-replay-event-vendor
      - claim-replay-event-design
  - id: ReplayEvent-example-4
    labels:
      zh: checkpoint 历史 replay 实例
      en: checkpoint history replay instance
      ja: checkpoint 履歴 replay 事例
    descriptions:
      zh: ReplayEvent event_id=replay-65、checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336、thread_id=thread-1、replayed_at=2026-01-15T11:00:00Z。
      en: ReplayEvent event_id=replay-65, checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336, thread_id=thread-1, replayed_at=2026-01-15T11:00:00Z.
      ja: ReplayEvent replay-65 を checkpoint 履歴 replay として記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayEvent
    related_relation_ids: []
    source_claims:
      - claim-replay-event-vendor
      - claim-replay-event-design
parent_relation:
  id: ReplayEvent-is_a-ObservabilityEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ReplayEvent 都是 ObservabilityEvent，其种差是在确定时刻记录从某检查点重演后续步骤的请求或启动。
    en: Every ReplayEvent is an ObservabilityEvent distinguished by recording, at a determinate time, a request or start to re-execute steps after a selected checkpoint.
    ja: すべての ReplayEvent は ObservabilityEvent で、選択 Checkpoint 後の step を再実行する要求または開始を確定時刻に記録する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-replay-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ReplayEvent-triggers-ReplayActivity
    predicate: triggers
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: triggers
      en: triggers
      ja: triggers
    definitions:
      zh: ReplayEvent 通过 triggers 指向由该回放请求实际启动的 ReplayActivity，从而区分请求时刻与后续重执行区间。
      en: ReplayEvent triggers the ReplayActivity actually started by that replay request, separating the request instant from the subsequent re-execution interval.
      ja: ReplayEvent は replay request が実際に開始した ReplayActivity を triggers し、要求時点と後続再実行区間を分離します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_triggers
      labels:
        zh: 反向 triggers
        en: inverse triggers
        ja: 逆 triggers
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-replay-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ReplayActivity
sources:
