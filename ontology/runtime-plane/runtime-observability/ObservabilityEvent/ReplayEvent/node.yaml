schema: moonweave.ai/ontology-node/v1
id: ReplayEvent
kind: concept
status: accepted
labels: {zh: 重放事件, en: Replay event, ja: 再生イベント}
semantics:
  short_definition: {zh: 报告 ReplayActivity 结果或状态的自定义 ObservabilityEvent。, en: "A custom ObservabilityEvent that reports the outcome or state of a ReplayActivity.", ja: ReplayActivity の結果または状態を報告するカスタム ObservabilityEvent。}
  definition: {zh: ReplayEvent 是关于基于检查点重新执行的领域通知，包含重放范围和结果。它不是 ReplayActivity 本身、历史 TraceRecord、未附着于 span 的 OTel Span Event，也不是缺少基于检查点重新执行证据的重试事件。, en: "A ReplayEvent is a domain notification about checkpoint-based re-execution, including replay scope and outcome. It is not the ReplayActivity itself, a historic TraceRecord, an OTel Span Event without attachment to a span, or a retry event that lacks checkpoint-based re-execution evidence.", ja: ReplayEvent は、再生範囲と結果を含むチェックポイントベースの再実行に関する領域通知である。ReplayActivity 自体、履歴 TraceRecord、span に付着しない OTel Span Event、チェックポイントベースの再実行証拠を欠く再試行イベントではない。}
  why_needed: {zh: 操作人员和用户界面需要紧凑的重放状态信号，同时为审计和调试保留底层状态边界与活动谱系。, en: "Operators and user interfaces need a compact replay status signal while preserving the underlying state boundary and activity lineage for audit and debugging.", ja: 運用者とユーザーインターフェースは、監査とデバッグのため基礎状態境界と Activity 系譜を保ちながら、コンパクトな再生状態シグナルを必要とする。}
  includes:
    - {zh: 事件 ID、重放活动 ID、源检查点 ID、重放范围、结果和分叉指示。, en: "Event ID, replay activity ID, source checkpoint ID, replay scope, outcome, and divergence indication.", ja: イベント ID、再生アクティビティ ID、ソースチェックポイント ID、再生範囲、結果、分岐指示。}
    - {zh: 正式重放操作的已开始、已完成、失败和分叉通知。, en: "Started, completed, failed, and divergence notifications for formal replay operations.", ja: 正式な再生操作の開始、完了、失敗、分岐通知。}
  excludes:
    - {zh: 追踪查看器的回放状态、缓存结果获取或通用重试通知。, en: "A trace viewer's playback state, a cached result fetch, or a generic retry notification.", ja: トレースビューアの再生状態、キャッシュ結果取得、一般的な再試行通知。}
    - {zh: 重放插桩期间发出的 OpenTelemetry Metric data point 或 Log Record。, en: "An OpenTelemetry Metric data point or Log Record emitted during replay instrumentation.", ja: 再生計装中に発行される OpenTelemetry Metric data point または Log Record。}
  semantic_kind: event
  aliases: [replay notification, time-travel outcome]
engineering:
  explanation: {zh: 重放控制在开始或完成基于检查点的重新执行后发出领域事件，并包含实际 ReplayActivity 引用。追踪和日志导出器可为诊断发出自身数据，但不定义重放成功或分叉。, en: "Replay control emits a domain event after beginning or completing checkpoint-based re-execution and includes the actual ReplayActivity reference. Trace and log exporters can emit their own data for diagnosis but do not define replay success or divergence.", ja: 再生制御はチェックポイントベースの再実行を開始または完了した後に実際の ReplayActivity 参照を含む領域イベントを発行する。トレースおよびログエクスポーターは診断用データを発行できるが、再生成功や分岐を定義しない。}
  typical_input:
    - description: {zh: 重放结果, en: Replay outcome, ja: 再生結果}
      format: |-
        {"replay_activity_id":"replay-op-45","checkpoint_id":"checkpoint-4","scope":"steps_after_checkpoint","outcome":"succeeded","diverged":false}
  typical_output:
    - description: {zh: 重放事件记录, en: Replay event record, ja: 再生イベント記録}
      format: |-
        {"event_id":"obs-event-65","event_name":"execution.replayed","replay_activity_id":"replay-op-45","outcome":"succeeded"}
  reference_implementations:
    - {name: LangGraph time travel, url: https://docs.langchain.com/oss/python/langgraph/use-time-travel, description: Documents replaying from checkpoints and re-executing downstream nodes.}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 重放事件 ID, en: Replay event ID, ja: 再生イベント ID}
      definitions: {zh: 一次重放状态通知的稳定标识符。, en: Stable identifier of one replay status notification., ja: 1件の再生状態通知の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: obs-event-65
      source_claims: [claim-replay-event]
    - id: event_name
      labels: {zh: 领域事件名称, en: Domain event name, ja: 領域イベント名}
      definitions: {zh: 从 ObservabilityEvent 继承并固定为检查点重放的命名空间事件名称。, en: Namespaced event name inherited from ObservabilityEvent and fixed to checkpoint replay., ja: ObservabilityEvent から継承しチェックポイント再生に固定される名前空間付きイベント名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [checkpoint.replayed]
      example_value: checkpoint.replayed
      source_claims: [claim-replay-event]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions: {zh: 从 ObservabilityEvent 继承的重放结果被运行时断言的时间。, en: Time inherited from ObservabilityEvent at which the runtime asserted the replay outcome., ja: ObservabilityEvent から継承する、ランタイムが再生結果を表明した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:21:00Z'
      source_claims: [claim-replay-event]
    - id: subject_ref
      labels: {zh: 主体引用, en: Subject reference, ja: 主体参照}
      definitions: {zh: 从 ObservabilityEvent 继承的受影响重放操作引用。, en: Reference inherited from ObservabilityEvent to the affected replay operation., ja: ObservabilityEvent から継承する、影響を受けた再生操作への参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: replay-op-45
      source_claims: [claim-replay-event]
    - id: replay_scope
      labels: {zh: 重放范围, en: Replay scope, ja: 再生範囲}
      definitions: {zh: 所引用 ReplayActivity 报告的下游工作范围。, en: Scope of downstream work reported by the referenced ReplayActivity., ja: 参照した ReplayActivity が報告する下流作業の範囲。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [steps_after_checkpoint, selected_branch]
      example_value: steps_after_checkpoint
      source_claims: [claim-replay-event]
    - id: diverged
      labels: {zh: 是否分叉, en: Diverged, ja: 分岐したか}
      definitions: {zh: 重放结果是否与记录的执行谱系有实质不同。, en: Whether the replayed result differs materially from recorded execution lineage., ja: 再生結果が記録済み実行系譜と実質的に異なるか。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: false
      source_claims: [claim-replay-event]
  constraints:
    - id: replay-event-activity-agreement
      severity: error
      language: plain
      expression: A ReplayEvent must name one ReplayActivity and agree with its checkpoint, replay scope, terminal outcome, and divergence evidence.
      explanation: {zh: 该事件总结现有重新执行操作，不能自行创建重放语义。, en: The event summarizes an existing re-execution operation and cannot create replay semantics by itself., ja: このイベントは既存の再実行操作を要約し、それ自体で再生意味を作れない。}
      source_claims: [claim-replay-event]
  required_relations: [ReplayEvent-specializes-ObservabilityEvent, ReplayEvent-describes-ReplayActivity]
examples:
  - id: replay-event-positive
    labels: {zh: "LangGraph time-travel replay", en: "LangGraph time-travel replay", ja: "LangGraph time-travel replay"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ReplayEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ReplayEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; ReplayEvent TraceSpan/Record."}
    field_values: {event_id: obs-event-65, event_name: checkpoint.replayed, occurred_at: '2026-07-18T09:21:00Z', subject_ref: replay-op-45, replay_scope: steps_after_checkpoint, diverged: false}
    related_node_ids: [ReplayEvent, ReplayActivity, Checkpoint]
    related_relation_ids: [ReplayEvent-describes-ReplayActivity]
    source_claims: [claim-replay-event]
  - id: replay-event-counterexample
    labels: {zh: "LangSmith playground 非 ReplayEvent", en: "LangSmith playground not ReplayEvent", ja: "LangSmith playground は ReplayEvent ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style ReplayEvent TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style ReplayEvent TraceRecord.", ja: "Missing trace rejects Langfuse-style ReplayEvent."}
    field_values: {trace_id: trace-900}
    related_node_ids: [TraceRecord]
    related_relation_ids: []
    source_claims: [claim-replay-event]
  - id: replay-event-boundary
    labels: {zh: "ReplayEvent 与 ReplayActivity 边界", en: "ReplayEvent versus ReplayActivity", ja: "ReplayEvent と ReplayActivity 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; ReplayEvent must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; ReplayEvent must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {event_id: obs-event-65}
    related_node_ids: [ReplayEvent, RetryActivity, ReplayActivity]
    related_relation_ids: [ReplayEvent-describes-ReplayActivity]
    source_claims: [claim-replay-event]
  - id: replay-event-instance-65
    labels: {zh: "checkpoint 历史 replay 实例", en: "checkpoint history replay instance", ja: "checkpoint 履歴 replay 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->ReplayEvent ObservabilityEvent.", en: "Phoenix instance: drift+quality->ReplayEvent ObservabilityEvent.", ja: "Phoenix instance maps to ReplayEvent Event."}
    field_values: {event_id: obs-event-65, event_name: checkpoint.replayed, occurred_at: '2026-07-18T09:21:00Z', subject_ref: replay-op-45, replay_scope: steps_after_checkpoint, diverged: false}
    related_node_ids: [ReplayEvent, ReplayActivity, Checkpoint, RunAttempt]
    related_relation_ids: [ReplayEvent-describes-ReplayActivity]
    source_claims: [claim-replay-event]
parent_relation:
  id: ReplayEvent-specializes-ObservabilityEvent
  predicate: is_a
  target: concept:ObservabilityEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是重放事件, en: is a replay event, ja: 再生イベントである}
  definitions: {zh: 每个 ReplayEvent 都是描述基于检查点 ReplayActivity 的 ObservabilityEvent。, en: Every ReplayEvent is an ObservabilityEvent describing a checkpoint-based ReplayActivity., ja: すべての ReplayEvent はチェックポイントベース ReplayActivity を記述する ObservabilityEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_replay_event, labels: {zh: 具有重放事件, en: has replay event, ja: 再生イベントを持つ}}
  conditions:
    - id: replay-event-parent-condition
      severity: error
      expression: Require event_name execution.replayed, a checkpoint-based replay activity reference, and outcome evidence.
      explanations: {zh: 通用重试或追踪检查事件不满足重放语义。, en: A generic retry or trace inspection event does not meet replay semantics., ja: 一般的な再試行またはトレース検査イベントは再生意味を満たさない。}
      source_claims: [claim-replay-event]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-replay-event]
relations:
  - id: ReplayEvent-describes-ReplayActivity
    predicate: describes
    target: concept:ReplayActivity
    direction: source-to-target
    relation_kind: observation
    labels: {zh: 描述重放活动, en: describes replay activity, ja: 再生アクティビティを記述する}
    definitions: {zh: ReplayEvent 报告该活动的检查点、范围、结果和分叉结果时描述 ReplayActivity。, en: "ReplayEvent describes ReplayActivity when it reports that activity's checkpoint, scope, outcome, and divergence result.", ja: ReplayEvent はその Activity のチェックポイント、範囲、結果、分岐結果を報告するとき ReplayActivity を記述する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_described_by, labels: {zh: 由重放事件描述, en: was described by replay event, ja: 再生イベントに記述された}}
    conditions:
      - id: replay-event-description-condition
        severity: error
        expression: The event must agree with the target activity's checkpoint provenance and replay result.
        explanations: {zh: 状态事件不能描述无关或仅计划的重放。, en: Status events cannot describe unrelated or merely planned replays., ja: 状態イベントは無関係または計画だけの再生を記述できない。}
        source_claims: [claim-replay-event]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-replay-event]
sources:
  - id: langgraph-time-travel
    title: "LangGraph time travel"
    url: https://docs.langchain.com/oss/python/langgraph/use-time-travel
    source_type: documentation
    relevance: Documents checkpoint-based replay and downstream node re-execution.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines OTel Span Events as distinct span-attached telemetry, not generic replay notifications.
source_claims:
  - id: claim-replay-event
    source: langgraph-time-travel
    supports: LangGraph replay resumes from a prior checkpoint and re-executes nodes after that checkpoint, which can yield different results.
    locator: Overview and Replay
    evidence_kind: documentation
    confidence: high

