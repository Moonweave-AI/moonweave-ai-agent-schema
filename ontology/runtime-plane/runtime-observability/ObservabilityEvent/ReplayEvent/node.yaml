    supports: runtime-observability vendor evidence supports ReplayEvent identity and boundary mapping.
    locator: ReplayEvent integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-replay-event-design
    source: src-runtime-observability-design
    supports: Moonweave ReplayEvent concept boundary within runtime-observability.
    locator: ReplayEvent boundary
    evidence_kind: design-inference
    confidence: high
