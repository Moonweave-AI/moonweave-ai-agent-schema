schema: moonweave.ai/ontology-node/v1
id: ReplayEvent
kind: concept
status: accepted
labels:
  en: replay event
  zh: 回放事件
  ja: 再生イベント
semantics:
  short_definition:
    zh: 请求从指定检查点重新执行后续步骤的运行事件。
    en: A runtime event requesting re-execution after a selected checkpoint.
    ja: 指定チェックポイント後の再実行を要求する実行イベント。
  definition:
    zh: 回放事件是一种 ObservabilityEvent，记录某主体在特定时刻请求从指定检查点或轨迹位置开始重新执行后续步骤。它携带回放目的、输入复用策略与允许分支范围，并可触发 ReplayActivity；实际步骤重演属于活动，事件只表示触发。
    en: A ReplayEvent is an ObservabilityEvent recording that an actor requested re-execution of subsequent steps from a named checkpoint or trace position at a particular time. It carries replay purpose, input-reuse policy, and allowed branching scope and may trigger ReplayActivity; the step re-execution is the activity, while this event is its trigger.
    ja: ReplayEvent は、主体が指定チェックポイントまたはトレース位置から後続ステップの再実行を特定時刻に要求したことを記録する ObservabilityEvent です。目的、入力再利用方針、分岐許容範囲を持ち ReplayActivity を起動できます。再実行は活動で、イベントは起動事実です。
  why_needed:
    zh: 独立的回放触发记录解释是谁为何启动调试、复现或时间旅行，以及要求复用哪些输入；这使回放结果能与普通故障恢复和正常重试区分。
    en: A separate replay trigger records who initiated debugging, reproduction, or time travel, why, and which inputs should be reused, distinguishing replay outcomes from ordinary recovery and normal retries.
    ja: 独立した再生トリガーは、誰がなぜデバッグ・再現・時間移動を開始し、どの入力を再利用したかを残し、通常復旧や通常再試行と区別します。
  includes:
    - zh: 包括开发者选择失败前检查点并要求复用原始输入重演工具调用，以及评估器从同一点注入替代输入形成比较分支的事件。
      en: Includes a developer selecting the checkpoint before a failure to replay a tool call with original inputs, and an evaluator requesting a comparison branch with substituted inputs.
      ja: 開発者が障害前チェックポイントを選び元入力でツール呼出しを再生する要求、評価器が代替入力の比較分岐を要求する事象を含みます。
  excludes:
    - zh: 不包括只要求装载状态而不重演步骤的 CheckpointRestoreEvent、实际重演过程 ReplayActivity，以及运行策略自动执行的普通 RetryAttempt。
      en: Excludes CheckpointRestoreEvent requests that only load state, the ReplayActivity performing re-execution, and an ordinary RetryAttempt automatically scheduled by runtime policy.
      ja: 状態読込だけを求める CheckpointRestoreEvent、再実行処理の ReplayActivity、方針で自動実行される通常 RetryAttempt は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReplayEvent-example-positive-001
    kind: positive
    labels:
      zh: 调查者发起指定位置重放
      en: Investigator initiates replay from a named position
      ja: 調査者が指定位置からリプレイを開始
    scenario_id: null
    descriptions:
      zh: 调查者在追踪查看器中选择 cp-17 和“复用已记录输入”策略，并注明目的是复现第三次工具调用的分歧；系统在 11:08:04 记录发起者、起点、策略和原因，然后启动重放活动。
      en: An investigator selects cp-17 in the trace viewer, chooses “reuse recorded inputs,” and states the purpose is to reproduce divergence at the third tool call. At 11:08:04 the system records initiator, starting point, policy, and reason, then starts replay work.
      ja: 調査者がトレース画面でcp-17を選び、「記録入力を再利用」を指定し、3回目のツール呼出しの差異再現を目的とする。11:08:04に開始者、起点、方針、理由を記録し、リプレイ活動を開始する。
    field_values:
      event_id: replay-request-cp17
      event_kind: replay
      event_name: checkpoint.replay.requested
      timestamp: 2026-07-16T11:08:04.000Z
      attributes:
        initiator: investigator-5
        policy: reuse-recorded-inputs
        reason: reproduce-third-tool-divergence
    related_node_ids:
      - ReplayEvent
      - ReplayActivity
      - ObservabilityEvent
    related_relation_ids:
      - ReplayEvent-is_a-ObservabilityEvent
      - ReplayEvent-triggers-ReplayActivity
    expected_result:
      zh: 发起事实被识别为重放事件；实际重执行由后续重放活动表示。
      en: The initiation fact is classified as ReplayEvent; actual re-execution is represented by the subsequent ReplayActivity.
      ja: 開始事実はReplayEventに分類され、実際の再実行は後続のReplayActivityで表される。
    why_valid_or_invalid:
      zh: 该对象具有单一发生时点并明确重放起点、目的和输入策略，而非一段持续执行。
      en: The object has one occurrence time and states replay origin, purpose, and input policy rather than representing duration-bearing execution.
      ja: 一つの発生時刻とリプレイ起点・目的・入力方針を持ち、継続する実行自体ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-replay-event-001
  - id: ReplayEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 普通自动重试不是重放请求
      en: An ordinary automatic retry is not a replay request
      ja: 通常の自動再試行はリプレイ要求ではない
    scenario_id: null
    descriptions:
      zh: 工具超时后，运行时按重试策略立即再次执行同一调用；没有选定历史检查点、复现目的、输入复用策略或独立发起者。该事实属于运行尝试控制，不是重放事件。
      en: After a tool timeout, runtime retry policy immediately executes the same call again. No historical checkpoint, reproduction purpose, input-reuse policy, or independent initiator is selected, so this is attempt control rather than ReplayEvent.
      ja: ツールタイムアウト後、実行時再試行方針が同じ呼出しを直ちに再実行する。過去チェックポイント、再現目的、入力再利用方針、独立した開始者がなく、これは試行制御であってReplayEventではない。
    field_values: {}
    related_node_ids:
      - ReplayEvent
      - ReplayActivity
    related_relation_ids:
      - ReplayEvent-triggers-ReplayActivity
    expected_result:
      zh: 自动重试保持运行尝试语义，不被图谱归入重放事件。
      en: The automatic retry retains run-attempt semantics and is not classified as ReplayEvent.
      ja: 自動再試行は実行試行の意味を保ち、ReplayEventに分類されない。
    why_valid_or_invalid:
      zh: 重放面向已记录历史路径的显式复现；失败后的同尝试重试不满足这一身份条件。
      en: Replay is explicit reproduction of a recorded historical path; an in-policy retry after failure does not satisfy that identity condition.
      ja: リプレイは記録済み過去経路の明示的再現であり、失敗後の通常再試行はその同一性条件を満たさない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-replay-event-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TraceEvent
    shared_parent_concept_id: ObservabilityEvent
    differentia:
      zh: 正向身份比较：父节点 ObservabilityEvent：ReplayEvent（semantic kind=event，骨架 ReplayEvent-is_a-ObservabilityEvent）；TraceEvent（semantic kind=event，骨架 TraceEvent-is_a-ObservabilityEvent）。双端条件：ReplayEvent 条件：“回放事件是以如下事实为区分特征的可观测运行事件：它记录为了调试、评估、复现或审查而回放追踪、跨度、会话片段、检查点或产物谱系的可观测事件”；TraceEvent 条件：“作为可观测运行事件，追踪事件由这一事实区分：它是可观测的运行发生项，例如消息、动作、工具调用、状态更新、警告、策略决策、产物更新或检查点事件”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent ObservabilityEvent: ReplayEvent (semantic kind=event, backbone ReplayEvent-is_a-ObservabilityEvent); TraceEvent (semantic kind=event, backbone TraceEvent-is_a-ObservabilityEvent). Endpoint conditions: ReplayEvent condition: “Replay event is an observability event; its differentiating condition is that it is an observable event that replays a trace, span, session segment, checkpoint, or artifact lineage for debugging, evaluation, reproduction, or review”; TraceEvent condition: “Trace event belongs to the observability event category and differs from broader members in that it is an observable runtime occurrence such as a message, action, tool call, state update, warning, policy decision, artifact update, or checkpoint event”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 ObservabilityEvent：ReplayEvent（semantic kind=event、バックボーン ReplayEvent-is_a-ObservabilityEvent）；TraceEvent（semantic kind=event、バックボーン TraceEvent-is_a-ObservabilityEvent）。両端条件：ReplayEvent の条件：「再生イベントは観測可能実行イベントの一種であり、次の条件で区別されます：それは、デバッグ、評価、再現、レビューのためにトレース、スパン、セッション区間、チェックポイント、成果物系譜を再生する観測可能イベントを記録します」；TraceEvent の条件：「トレースイベントは観測可能実行イベントとして、次の条件により他の対象と区別されます：それは、メッセージ、行動、ツール呼び出し、状態更新、警告、ポリシー判断、成果物更新、チェックポイントイベントなどの観測可能な実行上の出来事です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-replay-event-001
