schema: moonweave.ai/ontology-node/v1
id: CheckpointRestoreEvent
kind: concept
status: accepted
labels:
  en: checkpoint restore event
  zh: 检查点恢复事件
  ja: チェックポイント復元イベント
semantics:
  short_definition:
    zh: 请求或宣布从指定检查点开始恢复的运行事件。
    en: A runtime event requesting or announcing restoration from a named checkpoint.
    ja: 指定チェックポイントからの復元を要求または通知する実行イベント。
  definition:
    zh: 检查点恢复事件是一种 ObservabilityEvent，记录某个主体在某一时刻请求或启动从指定 Checkpoint 恢复运行。它携带检查点身份、目标会话、发起者与触发原因，并可触发 RestoreActivity；事件是瞬时触发事实，实际读取和重建状态的过程属于恢复活动。
    en: A CheckpointRestoreEvent is an ObservabilityEvent recording that an actor requested or initiated restoration from a specified Checkpoint at a particular time. It carries checkpoint identity, target session, initiator, and trigger reason and may trigger RestoreActivity; the event is instantaneous, while reading and reinstating state belongs to the activity.
    ja: CheckpointRestoreEvent は、主体が指定 Checkpoint からの復元を特定時刻に要求または開始したことを記録する ObservabilityEvent です。チェックポイント識別、対象セッション、開始者、理由を持ち RestoreActivity を起動できます。イベントは瞬間的事実で、状態読出しと再構築は活動です。
  why_needed:
    zh: 把恢复触发与恢复过程分开后，可以判断恢复是由崩溃检测、人工选择还是系统策略发起，并测量触发到状态可用之间的时间；单独的 RestoreActivity 无法完整说明触发来源。
    en: Separating the restore trigger from the restore process identifies whether recovery came from crash detection, a human choice, or policy and allows measurement from trigger to usable state. RestoreActivity alone does not fully explain the initiating cause.
    ja: 復元トリガーと復元処理を分けることで、障害検知、人手選択、方針のどれが開始したかを判定し、トリガーから状態利用可能までを計測できます。RestoreActivity だけでは開始原因を説明できません。
  includes:
    - zh: 包括故障监测器请求恢复最新完整检查点，以及人工操作员选择历史检查点并发出恢复命令的事件。
      en: Includes a fault monitor requesting the latest intact checkpoint and a human operator selecting a historical checkpoint and issuing a restore command.
      ja: 障害監視が最新の完全なチェックポイントを要求する事象、人手が履歴チェックポイントを選んで復元命令を出す事象を含みます。
  excludes:
    - zh: 不包括实际读取并重建状态的 RestoreActivity，也不包括要求重新执行历史步骤的 ReplayEvent。
      en: Excludes the RestoreActivity that reads and reinstates state and the ReplayEvent that requests re-execution of historical steps.
      ja: 状態を読み戻す RestoreActivity、および履歴ステップの再実行を求める ReplayEvent は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: CheckpointRestoreEvent-example-positive-001
    kind: positive
    labels:
      zh: 操作员发起检查点恢复
      en: Operator initiates checkpoint restoration
      ja: 操作者がチェックポイント復元を開始
    scenario_id: null
    descriptions:
      zh: 操作员在故障调查中选择 checkpoint_id=cp-42；系统立即记录发起者、目标会话、选定检查点、发生时间和“回到审批前”的原因，随后创建一个持续的恢复活动。
      en: During incident investigation, an operator selects checkpoint_id cp-42. The system records the initiator, target session, selected checkpoint, occurrence time, and “return before approval” reason, then starts a duration-bearing restore activity.
      ja: 障害調査で操作者がcheckpoint_id cp-42を選ぶ。システムは開始者、対象セッション、選択したチェックポイント、発生時刻、「承認前へ戻る」という理由を記録し、その後に継続時間を持つ復元活動を開始する。
    field_values:
      event_id: checkpoint-restore-request-cp42
      event_kind: checkpoint-restore
      event_name: checkpoint.restore.requested
      timestamp: 2026-07-16T10:04:59.910Z
      attributes:
        initiator: operator-incident-7
        reason: return-before-approval
        checkpoint_id: cp-42
    related_node_ids:
      - CheckpointRestoreEvent
      - Checkpoint
      - RestoreActivity
      - ObservabilityEvent
    related_relation_ids:
      - CheckpointRestoreEvent-is_a-ObservabilityEvent
      - CheckpointRestoreEvent-triggers-RestoreActivity
    expected_result:
      zh: 瞬时发起事实被识别为检查点恢复事件；读取和重建状态则归属于后续恢复活动。
      en: The instantaneous initiation fact is classified as a CheckpointRestoreEvent; reading and reinstating state belongs to the subsequent RestoreActivity.
      ja: 瞬時の開始事実はCheckpointRestoreEventと判定され、状態の読込みと再構成は後続のRestoreActivityに属する。
    why_valid_or_invalid:
      zh: 事件记录何时、由谁、针对哪个检查点发起恢复，但不冒充具有持续时间的恢复过程。
      en: The event states when, by whom, and from which checkpoint restoration was initiated without impersonating the duration-bearing restoration process.
      ja: イベントはいつ誰がどのチェックポイントから復元を始めたかを示し、継続時間を持つ復元過程とは区別される。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-restore-event-001
  - id: CheckpointRestoreEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 恢复过程不是瞬时事件
      en: Restoration work is not the initiating event
      ja: 復元作業は開始イベントではない
    scenario_id: null
    descriptions:
      zh: 恢复器用十二秒读取检查点、校验摘要、重建状态并写入新快照。这段有开始和结束、消耗检查点并产生状态的工作是恢复活动，不应被压成一个恢复事件。
      en: A restorer spends twelve seconds reading the checkpoint, validating its digest, rebuilding state, and writing a new snapshot. This start-to-finish work consumes and produces records, so it is a RestoreActivity rather than the initiating event.
      ja: 復元器が12秒かけてチェックポイントを読み、ダイジェストを検証し、状態を再構成して新しいスナップショットを書く。この開始から終了までの作業は記録を消費・生成するRestoreActivityであり、開始イベントではない。
    field_values: {}
    related_node_ids:
      - CheckpointRestoreEvent
      - RestoreActivity
      - Checkpoint
      - StateSnapshot
      - ObservabilityEvent
    related_relation_ids:
      - CheckpointRestoreEvent-is_a-ObservabilityEvent
      - CheckpointRestoreEvent-triggers-RestoreActivity
    expected_result:
      zh: 持续恢复工作归入 RestoreActivity；仅发起时点及其上下文归入 CheckpointRestoreEvent。
      en: The duration-bearing work is classified as RestoreActivity; only the initiation occurrence and its context belong to CheckpointRestoreEvent.
      ja: 継続する作業はRestoreActivityに分類され、開始時点とその文脈だけがCheckpointRestoreEventに属する。
    why_valid_or_invalid:
      zh: 事件和活动的同一性条件不同：前者是时点事实，后者是具有过程与产出的执行。
      en: "Event and activity have different identity conditions: one is a time-point fact, the other is a process with work and outputs."
      ja: イベントと活動は同一性条件が異なり、前者は時点の事実、後者は作業と出力を持つ過程である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-restore-event-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ReplayEvent
    shared_parent_concept_id: ObservabilityEvent
    differentia:
      zh: 端点特定对照：父节点 ObservabilityEvent：CheckpointRestoreEvent（semantic kind=event，骨架 CheckpointRestoreEvent-is_a-ObservabilityEvent）；ReplayEvent（semantic kind=event，骨架 ReplayEvent-is_a-ObservabilityEvent）。双端条件：CheckpointRestoreEvent 条件：“检查点恢复事件属于可观测运行事件，区别于其他同类对象的条件是：它记录从已保存检查点恢复运行会话、参与者、图或工作流的可观测事件，并保存恢复溯源”；ReplayEvent 条件：“回放事件是以如下事实为区分特征的可观测运行事件：它记录为了调试、评估、复现或审查而回放追踪、跨度、会话片段、检查点或产物谱系的可观测事件”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ObservabilityEvent: CheckpointRestoreEvent (semantic kind=event, backbone CheckpointRestoreEvent-is_a-ObservabilityEvent); ReplayEvent (semantic kind=event, backbone ReplayEvent-is_a-ObservabilityEvent). Endpoint conditions: CheckpointRestoreEvent condition: “Checkpoint restore event is an observability event whose defining condition is that it is an observable event that restores a runtime session, actor, graph, or workflow from a saved checkpoint and records restore provenance”; ReplayEvent condition: “Replay event is an observability event; its differentiating condition is that it is an observable event that replays a trace, span, session segment, checkpoint, or artifact lineage for debugging, evaluation, reproduction, or review”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ObservabilityEvent：CheckpointRestoreEvent（semantic kind=event、バックボーン CheckpointRestoreEvent-is_a-ObservabilityEvent）；ReplayEvent（semantic kind=event、バックボーン ReplayEvent-is_a-ObservabilityEvent）。両端条件：CheckpointRestoreEvent の条件：「チェックポイント復元イベントは観測可能実行イベントのうち、次の事実を定義条件とする対象です：それは、保存済みチェックポイントから実行セッション、アクター、グラフ、ワークフローを復元する観測可能イベントを記録し、復元来歴を残します」；ReplayEvent の条件：「再生イベントは観測可能実行イベントの一種であり、次の条件で区別されます：それは、デバッグ、評価、再現、レビューのためにトレース、スパン、セッション区間、チェックポイント、成果物系譜を再生する観測可能イベントを記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-checkpoint-restore-event-001
