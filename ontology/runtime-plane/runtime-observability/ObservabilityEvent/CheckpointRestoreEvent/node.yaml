schema: moonweave.ai/ontology-node/v1
id: CheckpointRestoreEvent
kind: concept
status: accepted
labels: {zh: 检查点恢复事件, en: Checkpoint restore event, ja: チェックポイント復元イベント}
semantics:
  short_definition: {zh: 为具名 Checkpoint 记录 RestoreActivity 报告结果的自定义 ObservabilityEvent。, en: "A custom ObservabilityEvent that records the reported outcome of a RestoreActivity for a named Checkpoint.", ja: 名前付き Checkpoint の RestoreActivity が報告した結果を記録するカスタム ObservabilityEvent。}
  definition: {zh: CheckpointRestoreEvent 是说明恢复结果、检查点标识符和恢复活动引用的领域通知。它不是 RestoreActivity 本身、Checkpoint 状态 Entity、除非另行在 span 上发出的 OTel Span Event，也不是 OTel Log Record。, en: "A CheckpointRestoreEvent is a domain notification that states a restore outcome, checkpoint identifier, and restore-activity reference. It is not the RestoreActivity itself, the Checkpoint state Entity, an OTel Span Event unless separately emitted on a span, or an OTel Log Record.", ja: CheckpointRestoreEvent は、復元結果、チェックポイント識別子、復元アクティビティ参照を示す領域通知である。RestoreActivity 自体、Checkpoint 状態 Entity、別途 span 上で発行された場合を除く OTel Span Event、OTel Log Record ではない。}
  why_needed: {zh: 控制平面使用者可能需要轻量且有序的恢复结果，而无需解析状态载荷或将插桩数据视为恢复权威。, en: "Control-plane consumers may need a lightweight, ordered restore outcome without parsing state payloads or treating instrumentation data as recovery authority.", ja: コントロールプレーンの利用者は、状態ペイロードを解析したり計装データを復旧権限として扱ったりせず、軽量で順序付けられた復元結果を必要とすることがある。}
  includes:
    - {zh: 事件 ID、检查点 ID、恢复活动 ID、发生时间和受控结果。, en: "Event ID, checkpoint ID, restore activity ID, occurrence time, and controlled outcome.", ja: イベント ID、チェックポイント ID、復元アクティビティ ID、発生時刻、制御された結果。}
    - {zh: 关于已完成、失败或已取消恢复工作的通知。, en: "Notifications about completed, failed, or cancelled restoration work.", ja: 完了、失敗、キャンセルされた復元作業に関する通知。}
  excludes:
    - {zh: 恢复工作、检查点字节、会话恢复决定或关于状态后端活动的通用日志。, en: "The restore work, checkpoint bytes, session resume decision, or generic logs about state backend activity.", ja: 復元作業、チェックポイントバイト、セッション再開決定、状態バックエンド活動に関する一般ログ。}
    - {zh: 没有显式 span 附着的 trace event。, en: "A trace event without an explicit span attachment.", ja: 明示的な span 付着を持たない trace event。}
  semantic_kind: event
  aliases: [restore notification, checkpoint restore outcome]
engineering:
  explanation: {zh: RestoreActivity 达到终止结果后，运行时控制发出一条紧凑领域记录，指明活动和检查点。会话管理器可独立决定是否恢复会话，而可观测性导出器可独立产生标准日志或 span event。, en: "After RestoreActivity reaches a terminal outcome, runtime control emits a compact domain record naming both the activity and checkpoint. A session manager can separately decide whether to resume a session, while observability exporters can independently produce standard logs or span events.", ja: RestoreActivity が終端結果に達した後、ランタイム制御はアクティビティとチェックポイントの両方を指名するコンパクトな領域記録を発行する。セッション管理者は別に再開を決められ、可観測性エクスポーターは標準ログや span event を独立して生成できる。}
  typical_input:
    - description: {zh: 恢复结果, en: Restore outcome, ja: 復元結果}
      format: |-
        {"restore_activity_id":"restore-op-44","checkpoint_id":"checkpoint-4","outcome":"succeeded","occurred_at":"2026-07-18T09:20:01Z"}
  typical_output:
    - description: {zh: 恢复事件记录, en: Restore event record, ja: 復元イベント記録}
      format: |-
        {"event_id":"obs-event-61","event_name":"checkpoint.restored","restore_activity_id":"restore-op-44","outcome":"succeeded"}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents checkpointed state used for continuation and recovery.}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 恢复事件 ID, en: Restore event ID, ja: 復元イベント ID}
      definitions: {zh: 一次报告恢复结果的稳定标识符。, en: Stable identifier of one reported restore outcome., ja: 1件の報告済み復元結果の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: obs-event-61
      source_claims: [claim-checkpoint-restore-event]
    - id: event_name
      labels: {zh: 领域事件名称, en: Domain event name, ja: 領域イベント名}
      definitions: {zh: 从 ObservabilityEvent 继承并固定为检查点恢复的命名空间事件名称。, en: Namespaced event name inherited from ObservabilityEvent and fixed to checkpoint restoration., ja: ObservabilityEvent から継承しチェックポイント復元に固定される名前空間付きイベント名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [checkpoint.restored]
      example_value: checkpoint.restored
      source_claims: [claim-checkpoint-restore-event]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions: {zh: 从 ObservabilityEvent 继承的恢复结果被运行时断言的时间。, en: Time inherited from ObservabilityEvent at which the runtime asserted the restore outcome., ja: ObservabilityEvent から継承する、ランタイムが復元結果を表明した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-checkpoint-restore-event]
    - id: subject_ref
      labels: {zh: 主体引用, en: Subject reference, ja: 主体参照}
      definitions: {zh: 从 ObservabilityEvent 继承的受影响恢复操作或状态对象引用。, en: Reference inherited from ObservabilityEvent to the affected restore operation or state subject., ja: ObservabilityEvent から継承する、影響を受けた復元操作または状態主体への参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: restore-op-44
      source_claims: [claim-checkpoint-restore-event]
    - id: checkpoint_id
      labels: {zh: 检查点 ID, en: Checkpoint ID, ja: チェックポイント ID}
      definitions: {zh: 所引用恢复操作消耗的 Checkpoint 标识符。, en: Identifier of the Checkpoint consumed by the referenced restore operation., ja: 参照した復元操作が消費した Checkpoint の識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: checkpoint-4
      source_claims: [claim-checkpoint-restore-event]
    - id: outcome
      labels: {zh: 恢复结果, en: Restore outcome, ja: 復元結果}
      definitions: {zh: 所引用 RestoreActivity 报告的终止结果。, en: Terminal result reported by the referenced RestoreActivity., ja: 参照した RestoreActivity が報告する終端結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, cancelled]
      example_value: succeeded
      source_claims: [claim-checkpoint-restore-event]
  constraints:
    - id: checkpoint-restore-event-activity-agreement
      severity: error
      language: plain
      expression: The event must name one RestoreActivity and checkpoint whose recorded terminal outcome agrees with the event outcome; no event may claim successful restore from an unverified or failed activity.
      explanation: {zh: 通知总结恢复工作，但不能取代其溯源证据。, en: The notification summarizes recovery work but cannot replace its provenance evidence., ja: 通知は復旧作業を要約するが、その来歴証拠を置き換えられない。}
      source_claims: [claim-checkpoint-restore-event]
  required_relations: [CheckpointRestoreEvent-specializes-ObservabilityEvent, CheckpointRestoreEvent-describes-RestoreActivity]
examples:
  - id: checkpoint-restore-event-positive
    labels: {zh: "LangGraph interrupt 后 resume", en: "LangGraph interrupt resume", ja: "LangGraph interrupt 後 resume"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointRestoreEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointRestoreEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; CheckpointRestoreEvent TraceSpan/Record."}
    field_values: {event_id: obs-event-61, event_name: checkpoint.restored, occurred_at: '2026-07-18T09:20:01Z', subject_ref: restore-op-44, checkpoint_id: checkpoint-4, outcome: succeeded}
    related_node_ids: [CheckpointRestoreEvent, RestoreActivity, Checkpoint]
    related_relation_ids: [CheckpointRestoreEvent-describes-RestoreActivity]
    source_claims: [claim-checkpoint-restore-event]
  - id: checkpoint-restore-event-counterexample
    labels: {zh: "Pod restart 非 CheckpointRestoreEvent", en: "Pod restart not CheckpointRestoreEvent", ja: "Pod restart は CheckpointRestoreEvent ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style CheckpointRestoreEvent TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style CheckpointRestoreEvent TraceRecord.", ja: "Missing trace rejects Langfuse-style CheckpointRestoreEvent."}
    field_values: {span_id: span-restore-1}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-checkpoint-restore-event]
  - id: checkpoint-restore-event-boundary
    labels: {zh: "RestoreEvent 与 RestoreActivity 边界", en: "RestoreEvent versus RestoreActivity", ja: "RestoreEvent と RestoreActivity 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; CheckpointRestoreEvent must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; CheckpointRestoreEvent must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {event_id: obs-event-61}
    related_node_ids: [CheckpointRestoreEvent, RestoreActivity, SessionResumeEvent]
    related_relation_ids: [CheckpointRestoreEvent-describes-RestoreActivity]
    source_claims: [claim-checkpoint-restore-event]
  - id: checkpoint-restore-event-instance-61
    labels: {zh: "HITL approve 后 restore 实例", en: "HITL approve restore instance", ja: "HITL approve 後 restore 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->CheckpointRestoreEvent ObservabilityEvent.", en: "Phoenix instance: drift+quality->CheckpointRestoreEvent ObservabilityEvent.", ja: "Phoenix instance maps to CheckpointRestoreEvent Event."}
    field_values: {event_id: obs-event-61, event_name: checkpoint.restored, occurred_at: '2026-07-18T09:20:01Z', subject_ref: restore-op-44, checkpoint_id: checkpoint-4, outcome: succeeded}
    related_node_ids: [CheckpointRestoreEvent, RestoreActivity, Checkpoint, SessionResumeEvent]
    related_relation_ids: [CheckpointRestoreEvent-describes-RestoreActivity]
    source_claims: [claim-checkpoint-restore-event]
parent_relation:
  id: CheckpointRestoreEvent-specializes-ObservabilityEvent
  predicate: is_a
  target: concept:ObservabilityEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是检查点恢复事件, en: is a checkpoint restore event, ja: チェックポイント復元イベントである}
  definitions: {zh: 每个 CheckpointRestoreEvent 都是描述检查点恢复结果的 ObservabilityEvent。, en: Every CheckpointRestoreEvent is an ObservabilityEvent describing an outcome of checkpoint restoration., ja: すべての CheckpointRestoreEvent はチェックポイント復元の結果を記述する ObservabilityEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_checkpoint_restore_event, labels: {zh: 具有检查点恢复事件, en: has checkpoint restore event, ja: チェックポイント復元イベントを持つ}}
  conditions:
    - id: checkpoint-restore-event-parent-condition
      severity: error
      expression: Require event_name checkpoint.restored, a checkpoint ID, and a terminal restore outcome.
      explanations: {zh: 通用检查点注释和进度通知不是恢复结果事件。, en: Generic checkpoint comments and progress notifications are not restore outcome events., ja: 一般的なチェックポイントコメントと進捗通知は復元結果イベントではない。}
      source_claims: [claim-checkpoint-restore-event]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-checkpoint-restore-event]
relations:
  - id: CheckpointRestoreEvent-describes-RestoreActivity
    predicate: describes
    target: concept:RestoreActivity
    direction: source-to-target
    relation_kind: observation
    labels: {zh: 描述恢复活动, en: describes restore activity, ja: 復元アクティビティを記述する}
    definitions: {zh: CheckpointRestoreEvent 报告该活动的检查点和终止结果时描述 RestoreActivity。, en: CheckpointRestoreEvent describes RestoreActivity when it reports that activity's checkpoint and terminal outcome., ja: CheckpointRestoreEvent はそのアクティビティのチェックポイントと終端結果を報告するとき RestoreActivity を記述する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_described_by, labels: {zh: 由恢复事件描述, en: was described by restore event, ja: 復元イベントに記述された}}
    conditions:
      - id: checkpoint-restore-event-description-condition
        severity: error
        expression: The event checkpoint ID and outcome must agree with the target RestoreActivity evidence.
        explanations: {zh: 通知不得描述不同或不完整的恢复操作。, en: A notification must not describe a different or incomplete restore operation., ja: 通知は異なる、または不完全な復元操作を記述してはならない。}
        source_claims: [claim-checkpoint-restore-event]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-checkpoint-restore-event]
sources:
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents checkpoints as persisted thread graph state used for recovery and continuation.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines OTel Span Events as span-attached telemetry, distinct from this custom recovery notification.
source_claims:
  - id: claim-checkpoint-restore-event
    source: langgraph-persistence
    supports: LangGraph checkpointers persist thread graph state as checkpoints used to continue conversations, resume interruptions, and recover failures.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

