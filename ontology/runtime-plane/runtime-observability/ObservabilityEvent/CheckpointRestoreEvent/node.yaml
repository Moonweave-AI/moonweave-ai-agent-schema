examples:
  - id: CheckpointRestoreEvent-example-positive-001
    labels:
      zh: LangGraph interrupt 后 resume
      en: LangGraph interrupt resume
      ja: LangGraph interrupt 後 resume
    descriptions:
      zh: LangGraph interrupt 后 graph.invoke(resume_command, config={configurable:{thread_id:thread-1}}) 从 checkpoint 恢复，产生 CheckpointRestoreEvent checkpoint_id=1f070a87...。
      en: After LangGraph interrupt, graph.invoke(resume_command, config={configurable:{thread_id:thread-1}}) restores from checkpoint producing CheckpointRestoreEvent checkpoint_id=1f070a87....
      ja: LangGraph resume が CheckpointRestoreEvent を生成する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      event_id: checkpoint-restore-request-cp42
      event_kind: checkpoint-restore
      event_name: checkpoint.restore.requested
      timestamp: 2026-07-16T10:04:59.910Z
      attributes:
        initiator: operator-incident-7
        reason: return-before-approval
        checkpoint_id: cp-42
    related_node_ids:
      - CheckpointRestoreEvent
      - Checkpoint
      - RestoreActivity
      - ObservabilityEvent
    related_relation_ids:
      - CheckpointRestoreEvent-is_a-ObservabilityEvent
      - CheckpointRestoreEvent-triggers-RestoreActivity
    source_claims:
      - claim-checkpoint-restore-event-design
  - id: CheckpointRestoreEvent-example-boundary-001
    labels:
      zh: Pod restart 非 CheckpointRestoreEvent
      en: Pod restart not CheckpointRestoreEvent
      ja: Pod restart は CheckpointRestoreEvent ではない
    descriptions:
      zh: Kubernetes Pod container restart 是 RuntimeEnvironment/Container 生命周期，不是 LangGraph CheckpointRestoreEvent。
      en: Kubernetes Pod container restart is RuntimeEnvironment/Container lifecycle, not LangGraph CheckpointRestoreEvent.
      ja: K8s Pod restart は CheckpointRestoreEvent ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointRestoreEvent
      - RestoreActivity
      - Checkpoint
      - StateSnapshot
      - ObservabilityEvent
    related_relation_ids:
      - CheckpointRestoreEvent-is_a-ObservabilityEvent
      - CheckpointRestoreEvent-triggers-RestoreActivity
    source_claims:
      - claim-checkpoint-restore-event-design
  - id: CheckpointRestoreEvent-example-3
    labels:
      zh: RestoreEvent 与 RestoreActivity 边界
      en: RestoreEvent versus RestoreActivity
      ja: RestoreEvent と RestoreActivity 境界
    descriptions:
      zh: CheckpointRestoreEvent 记录 restore 发生；RestoreActivity 是执行 restore 的 Activity；事件与 Activity 分开保存。
      en: CheckpointRestoreEvent records restore occurrence; RestoreActivity is Activity performing restore; save event and Activity separately.
      ja: RestoreEvent と RestoreActivity は分離保存する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointRestoreEvent
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-restore-event-vendor
      - claim-checkpoint-restore-event-design
  - id: CheckpointRestoreEvent-example-4
    labels:
      zh: HITL approve 后 restore 实例
      en: HITL approve restore instance
      ja: HITL approve 後 restore 事例
    descriptions:
      zh: HITL approve 后 CheckpointRestoreEvent event_id=restore-61、thread_id=thread-1、restored_checkpoint_id=1f070a87...、restored_at=2026-01-15T10:30:00Z。
      en: After HITL approve, CheckpointRestoreEvent event_id=restore-61, thread_id=thread-1, restored_checkpoint_id=1f070a87..., restored_at=2026-01-15T10:30:00Z.
      ja: HITL approve 後 restore-61 CheckpointRestoreEvent を記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointRestoreEvent
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-restore-event-vendor
      - claim-checkpoint-restore-event-design
parent_relation:
  id: CheckpointRestoreEvent-is_a-ObservabilityEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 CheckpointRestoreEvent 都是 ObservabilityEvent，其种差是在确定时刻记录针对特定检查点的恢复请求或启动，而不是执行状态重建。
    en: Every CheckpointRestoreEvent is an ObservabilityEvent distinguished by recording, at a determinate time, a restore request or start for one checkpoint rather than performing state reconstruction.
    ja: すべての CheckpointRestoreEvent は ObservabilityEvent で、特定時刻に一つの Checkpoint への復元要求または開始を記録し、状態再構成自体は行わない点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-checkpoint-restore-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CheckpointRestoreEvent-triggers-RestoreActivity
    predicate: triggers
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: triggers
      en: triggers
      ja: triggers
    definitions:
      zh: CheckpointRestoreEvent 通过 triggers 指向由该恢复请求实际启动的 RestoreActivity，并保留瞬时触发与持续重建两种身份。
      en: CheckpointRestoreEvent triggers the RestoreActivity actually started by that request, preserving separate identities for the instantaneous trigger and duration-bearing reconstruction.
      ja: CheckpointRestoreEvent は要求により実際に開始された RestoreActivity を triggers し、瞬時 trigger と継続 reconstruction の identity を分離します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_triggers
      labels:
        zh: 反向 triggers
        en: inverse triggers
        ja: 逆 triggers
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-restore-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RestoreActivity
