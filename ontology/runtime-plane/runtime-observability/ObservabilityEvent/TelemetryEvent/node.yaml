schema: moonweave.ai/ontology-node/v1
id: TelemetryEvent
kind: concept
labels:
  en: telemetry event
  zh: 遥测事件
  ja: テレメトリイベント
semantics:
  short_definition:
    zh: 由插桩发出并进入遥测处理管线的事件。
    en: An event emitted by instrumentation into a telemetry pipeline.
    ja: 計装からテレメトリ処理パイプラインへ送出されたイベント。
  definition:
    zh: 遥测事件是一种可观测事件，表示插桩把某个已观察发生项发入收集、处理或导出管线这一事实。其身份由发出时刻、插桩范围、资源与事件载荷共同确定；它可以承载对追踪事件的表示，但不等同于跨度内原始 TraceEvent，也不是 Metric、Measurement 或 LogRecord 的统称。
    en: A TelemetryEvent is an observability event representing instrumentation emitting an observed occurrence into a collection, processing, or export pipeline. Its identity is determined by emission time, instrumentation scope, resource, and event payload. It may represent a TraceEvent, but is not the original span-local event and is not an umbrella term for Metric, Measurement, or LogRecord.
    ja: TelemetryEvent は観測イベントであり、計装が観測した発生項を収集・処理・出力パイプラインへ送出した事実を表します。同一性は送出時刻、計装範囲、資源、イベント内容で決まり、TraceEvent を表現できますが、スパン内の元イベントそのものではなく Metric、Measurement、LogRecord の総称でもありません。
  why_needed:
    zh: 单独记录遥测发出事件，才能审计某个运行发生项是否被插桩捕获、何时进入管线，以及在采样、过滤或导出前是否仍然存在；原始追踪事件本身无法说明这些管线事实。
    en: Recording telemetry emission separately makes it possible to audit whether and when a runtime occurrence entered the pipeline and whether it survived before sampling, filtering, or export. The original trace event cannot by itself establish those pipeline facts.
    ja: テレメトリ送出を独立して記録すると、実行上の発生項が計装に取得されたか、いつパイプラインへ入ったか、サンプリング・フィルタ・出力前に存在したかを監査できます。元のトレースイベントだけではこれらを説明できません。
  includes:
    - zh: 包括由智能体运行插桩发出的异常、重试、策略拒绝或工具调用结果事件，前提是记录了发出时刻与插桩/资源上下文。
      en: Includes exception, retry, policy-denial, and tool-result events emitted by agent instrumentation when emission time and instrumentation or resource context are recorded.
      ja: 送出時刻と計装または資源文脈を記録した、エージェント計装由来の例外、再試行、ポリシー拒否、ツール結果イベントを含みます。
  excludes:
    - zh: 不包括尚未被发入遥测管线的跨度内 TraceEvent，也不包括指标定义、指标观测值或已编码的日志记录。
      en: Excludes a span-local TraceEvent not yet emitted into a telemetry pipeline, a metric definition, a metric observation, and an encoded LogRecord.
      ja: まだパイプラインへ送出されていないスパン内 TraceEvent、メトリック定義、メトリック観測値、符号化済み LogRecord は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: TelemetryEvent（StreamEvent 类）映射 OpenAI response.output_item.added、Anthropic content_block_delta 与 LangGraph stream_mode values；须绑定 execution_ref 或 run_attempt_ref。
    en: TelemetryEvent (StreamEvent class) maps OpenAI response.output_item.added, Anthropic content_block_delta, and LangGraph stream_mode values; must bind execution_ref or run_attempt_ref.
    ja: TelemetryEvent（StreamEvent）は SSE/stream 断片を execution/attempt に束縛して記録します。
  typical_input:
    - description: OTLP export or LangSmith run tree ingest.
      format: |-
        event: content_block_delta
        data: {"type":"content_block_delta",...}
      source_claims:
        - claim-otel-observability
        - claim-telemetry-event-design
  typical_output:
    - description: Moonweave observability record projection.
      format: '{"stream_event_type":"content_block_delta","run_attempt_ref":"attempt-1"}'
      source_claims:
        - claim-telemetry-event-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: TelemetryEvent-example-positive-001
    labels:
      zh: OTel metrics 导出批次
      en: OTel metrics export batch
      ja: OTel metrics エクスポートバッチ
    descriptions:
      zh: OpenTelemetry PeriodicExportingMetricReader 导出 OTLP metrics batch：metric agent_loop_turns、value=8、labels={service.name:"support-agent"}。
      en: 'OpenTelemetry PeriodicExportingMetricReader exports OTLP metrics batch: metric agent_loop_turns, value=8, labels={service.name:"support-agent"}.'
      ja: OTel metrics export batch が TelemetryEvent である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      event_id: telemetry-cache-miss-emission-103
      event_kind: telemetry
      event_name: telemetry.cache_miss.emitted
      timestamp: 2026-07-16T10:22:31.000Z
      attributes:
        instrumentation.scope: cache-client
        resource.service.name: catalog-agent
      trace_id: 61f1c37e8c074ce59cdd867f083245ab
      span_id: 3d1b81e65cc72105
    related_node_ids:
      - TelemetryEvent
      - TraceEvent
      - ObservabilityEvent
    related_relation_ids:
      - TelemetryEvent-is_a-ObservabilityEvent
      - telemetry_event_derived_from_trace_event
    source_claims:
      - claim-telemetry-event-design
  - id: TelemetryEvent-example-boundary-001
    labels:
      zh: LangSmith run latency 非 TelemetryEvent
      en: LangSmith run latency not TelemetryEvent
      ja: LangSmith run latency は TelemetryEvent ではない
    descriptions:
      zh: LangSmith run.latency_ms 是 TraceSpan/RunTree 属性，不是 OTel Metrics SDK TelemetryEvent 导出批次。
      en: LangSmith run.latency_ms is TraceSpan/RunTree attribute, not OTel Metrics SDK TelemetryEvent export batch.
      ja: LangSmith latency は Trace 属性であり TelemetryEvent ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TelemetryEvent
      - TraceEvent
      - ObservabilityEvent
    related_relation_ids:
      - TelemetryEvent-is_a-ObservabilityEvent
    source_claims:
      - claim-telemetry-event-design
  - id: TelemetryEvent-example-3
    labels:
      zh: TelemetryEvent 与 TraceEvent 边界
      en: TelemetryEvent versus TraceEvent
      ja: TelemetryEvent と TraceEvent 境界
    descriptions:
      zh: TelemetryEvent 承载 metrics 信号；TraceEvent 承载 span 内事件；同一运行可同时产生两者但 record_kind 不同。
      en: TelemetryEvent carries metrics signal; TraceEvent carries in-span events; same run can produce both with different record_kind.
      ja: TelemetryEvent と TraceEvent は record_kind が異なる。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TelemetryEvent
    related_relation_ids: []
    source_claims:
      - claim-telemetry-event-design
      - claim-telemetry-event-design
  - id: TelemetryEvent-example-4
    labels:
      zh: agent_loop_turns 指标事件
      en: agent_loop_turns metric event
      ja: agent_loop_turns メトリックイベント
    descriptions:
      zh: Datadog Agent OTLP intake 收到 gauge agent.token_usage_total=1500 在 2026-01-15T10:00:12Z 作为 TelemetryEvent 批次成员。
      en: Datadog Agent OTLP intake receives gauge agent.token_usage_total=1500 at 2026-01-15T10:00:12Z as TelemetryEvent batch member.
      ja: Datadog OTLP gauge を TelemetryEvent として記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TelemetryEvent
    related_relation_ids: []
    source_claims:
      - claim-telemetry-event-design
      - claim-telemetry-event-design
parent_relation:
  id: TelemetryEvent-is_a-ObservabilityEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 TelemetryEvent 都是 ObservabilityEvent，其种差是由插桩将一次已观察发生转换为可采集、处理或传输的遥测事件。
    en: Every TelemetryEvent is an ObservabilityEvent distinguished by instrumentation converting an observed occurrence into an event ready for telemetry collection, processing, or transport.
    ja: すべての TelemetryEvent は ObservabilityEvent で、計装が観測発生を収集・処理・転送可能な telemetry event に変換する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不规定实例基数。
    en: Taxonomic inheritance does not impose instance cardinality.
    ja: 分類継承は instance 基数を規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有遥测事件特化类
      en: has telemetry event specialization
      ja: telemetry event 特殊化を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-telemetry-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: telemetry_event_derived_from_trace_event
    predicate: telemetry_event_derived_from_trace_event
    direction: source-to-target
    relation_kind: information
    labels:
      zh: telemetry event derived from trace event
      en: telemetry event derived from trace event
      ja: telemetry event derived from trace event
    definitions:
      zh: TelemetryEvent 通过 derived_from 指向提供原始 span 内发生证据的 TraceEvent；转换可调整格式，但不得制造第二份运行真相。
      en: TelemetryEvent is derived_from the TraceEvent supplying original span-local occurrence evidence; transformation may change representation but must not create a second runtime truth.
      ja: TelemetryEvent は元の Span-local occurrence evidence を持つ TraceEvent から derived_from され、表現変換は可能でも第二 runtime truth を作りません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_telemetry_event_derived_from_trace_event
      labels:
        zh: 反向：telemetry event derived from trace event
        en: is target of telemetry event derived from trace event
        ja: 逆方向：telemetry event derived from trace event
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-telemetry-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceEvent
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-otel-observability
    source: src-otel-protocol
    supports: OpenTelemetry OTLP export provides traceId, spanId, and parent links for TraceSpan mapping.
    locator: OTLP > TracesData
    evidence_kind: design-inference
    confidence: high
  - id: claim-langsmith-observability
    source: src-langsmith
    supports: LangSmith run trees expose parent_run_id hierarchy mappable to TraceRecord.
    locator: Runs > run tree
    evidence_kind: design-inference
    confidence: high
  - id: claim-telemetry-event-design
    source: src-runtime-observability-design
    supports: TelemetryEvent records stream fragments bound to execution context.
    locator: TelemetryEvent boundary
    evidence_kind: design-inference
    confidence: high
