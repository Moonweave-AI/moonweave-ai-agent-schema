schema: moonweave.ai/ontology-node/v1
id: TelemetryEvent
kind: concept
status: review
labels:
  en: telemetry event
  zh: 遥测事件
  ja: テレメトリイベント
semantics:
  short_definition:
    zh: 由插桩发出并进入遥测处理管线的事件。
    en: An event emitted by instrumentation into a telemetry pipeline.
    ja: 計装からテレメトリ処理パイプラインへ送出されたイベント。
  definition:
    zh: 遥测事件是一种可观测事件，表示插桩把某个已观察发生项发入收集、处理或导出管线这一事实。其身份由发出时刻、插桩范围、资源与事件载荷共同确定；它可以承载对追踪事件的表示，但不等同于跨度内原始 TraceEvent，也不是 Metric、Measurement 或 LogRecord 的统称。
    en: A TelemetryEvent is an observability event representing instrumentation emitting an observed occurrence into a collection, processing, or export pipeline. Its identity is determined by emission time, instrumentation scope, resource, and event payload. It may represent a TraceEvent, but is not the original span-local event and is not an umbrella term for Metric, Measurement, or LogRecord.
    ja: TelemetryEvent は観測イベントであり、計装が観測した発生項を収集・処理・出力パイプラインへ送出した事実を表します。同一性は送出時刻、計装範囲、資源、イベント内容で決まり、TraceEvent を表現できますが、スパン内の元イベントそのものではなく Metric、Measurement、LogRecord の総称でもありません。
  why_needed:
    zh: 单独记录遥测发出事件，才能审计某个运行发生项是否被插桩捕获、何时进入管线，以及在采样、过滤或导出前是否仍然存在；原始追踪事件本身无法说明这些管线事实。
    en: Recording telemetry emission separately makes it possible to audit whether and when a runtime occurrence entered the pipeline and whether it survived before sampling, filtering, or export. The original trace event cannot by itself establish those pipeline facts.
    ja: テレメトリ送出を独立して記録すると、実行上の発生項が計装に取得されたか、いつパイプラインへ入ったか、サンプリング・フィルタ・出力前に存在したかを監査できます。元のトレースイベントだけではこれらを説明できません。
  includes:
    - zh: 包括由智能体运行插桩发出的异常、重试、策略拒绝或工具调用结果事件，前提是记录了发出时刻与插桩/资源上下文。
      en: Includes exception, retry, policy-denial, and tool-result events emitted by agent instrumentation when emission time and instrumentation or resource context are recorded.
      ja: 送出時刻と計装または資源文脈を記録した、エージェント計装由来の例外、再試行、ポリシー拒否、ツール結果イベントを含みます。
  excludes:
    - zh: 不包括尚未被发入遥测管线的跨度内 TraceEvent，也不包括指标定义、指标观测值或已编码的日志记录。
      en: Excludes a span-local TraceEvent not yet emitted into a telemetry pipeline, a metric definition, a metric observation, and an encoded LogRecord.
      ja: まだパイプラインへ送出されていないスパン内 TraceEvent、メトリック定義、メトリック観測値、符号化済み LogRecord は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: TelemetryEvent-example-positive-001
    kind: positive
    labels:
      zh: 追踪事件进入遥测管道
      en: Trace event enters the telemetry pipeline
      ja: トレースイベントがテレメトリ経路へ入る
    scenario_id: null
    descriptions:
      zh: 跨度内的 cache.miss 事件被 SDK 观测后，在 10:22:31 作为遥测发射进入批处理器；发射记录保存 instrumentation scope、resource、源事件引用和采集时点，之后写入日志流。
      en: After the SDK observes a cache.miss event on a span, it emits telemetry into a batch processor at 10:22:31. The emission record preserves instrumentation scope, resource, source-event reference, and collection time before entering a log stream.
      ja: スパン上のcache.missイベントをSDKが観測し、10:22:31にテレメトリとしてバッチ処理器へ送出する。送出記録はinstrumentation scope、resource、元イベント参照、収集時刻を保存し、その後ログストリームへ入る。
    field_values:
      event_id: telemetry-cache-miss-emission-103
      event_kind: telemetry
      event_name: telemetry.cache_miss.emitted
      timestamp: 2026-07-16T10:22:31.000Z
      attributes:
        instrumentation.scope: cache-client
        resource.service.name: catalog-agent
      trace_id: 61f1c37e8c074ce59cdd867f083245ab
      span_id: 3d1b81e65cc72105
    related_node_ids:
      - TelemetryEvent
      - TraceEvent
      - ObservabilityEvent
      - LogStream
    related_relation_ids:
      - TelemetryEvent-is_a-ObservabilityEvent
      - telemetry_event_derived_from_trace_event
      - telemetry_event_emitted_to_log_stream
    expected_result:
      zh: 管道发射事实被识别为 TelemetryEvent，并可追溯到原 TraceEvent。
      en: The pipeline-emission occurrence is classified as TelemetryEvent and remains traceable to the original TraceEvent.
      ja: パイプライン送出事実はTelemetryEventに分類され、元TraceEventへ追跡できる。
    why_valid_or_invalid:
      zh: 原事件表示运行中发生了什么；遥测事件表示采集系统何时、以何种作用域接收或发出了它。
      en: The source event states what occurred in the run; the telemetry event states when and under which scope instrumentation admitted it to the pipeline.
      ja: 元イベントは実行中の発生内容を、テレメトリイベントは計装がいつどのスコープで経路へ取り込んだかを示す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-event-002
  - id: TelemetryEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 度量定义与日志记录不是遥测发射事件
      en: Metric definitions and log records are not telemetry emissions
      ja: メトリック定義とログ記録は送出イベントではない
    scenario_id: null
    descriptions:
      zh: 系统声明 latency_ms 直方图并保存一条带 Timestamp、Body、Severity 的 LogRecord。前者是可复用度量定义，后者是持久信息记录；两者都不能仅因属于遥测体系就归入 TelemetryEvent。
      en: A system declares a latency_ms histogram and stores a LogRecord with Timestamp, Body, and Severity. The first is a reusable metric definition and the second is a persisted information record; neither is a TelemetryEvent merely because both belong to telemetry.
      ja: システムがlatency_msヒストグラムを定義し、Timestamp・Body・Severity付きLogRecordを保存する。前者は再利用可能な測定定義、後者は永続情報記録であり、テレメトリに属するだけでTelemetryEventにはならない。
    field_values: {}
    related_node_ids:
      - TelemetryEvent
      - TraceEvent
      - ObservabilityEvent
    related_relation_ids:
      - TelemetryEvent-is_a-ObservabilityEvent
    expected_result:
      zh: 图谱保持事件、度量定义和日志记录的不同语义种类，不使用 TelemetryEvent 作为总括类型。
      en: The graph preserves event, metric-definition, and log-record kinds instead of using TelemetryEvent as an umbrella.
      ja: イベント、メトリック定義、ログ記録の意味種別を保ち、TelemetryEventを総称型にしない。
    why_valid_or_invalid:
      zh: 遥测事件以一次管道发射时点为身份；规范定义和持久记录具有不同身份条件。
      en: TelemetryEvent identity is one pipeline-emission occurrence; a specification and a persisted record have different identity conditions.
      ja: TelemetryEventは一回の経路送出を同一性条件とし、仕様と永続記録は別条件を持つ。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-event-002
