schema: moonweave.ai/ontology-node/v1
id: TelemetryEvent
kind: concept
status: accepted
labels: {zh: 遥测通知事件, en: Telemetry notification event, ja: テレメトリー通知イベント}
semantics:
  short_definition: {zh: 通过引用宣布运行时遥测条件或采样观察的自定义 ObservabilityEvent。, en: "A custom ObservabilityEvent that announces a runtime telemetry condition or sampled observation by reference.", ja: 参照によりランタイムテレメトリー条件またはサンプリング観測を通知するカスタム ObservabilityEvent。}
  definition: {zh: TelemetryEvent 是关于观测到的运行时条件（例如阈值越界、健康变更或使用量更新）的 Moonweave 领域通知。它本身不是 OpenTelemetry Metric、OpenTelemetry Metric data point、Log Record 或 Span Event；任何引用的标准信号保留其自身 OTel 身份和数据模型。, en: "A TelemetryEvent is a Moonweave domain notification about an observed runtime condition such as threshold crossing, health change, or usage update. It is not itself an OpenTelemetry Metric, OpenTelemetry Metric data point, Log Record, or Span Event; any referenced standard signal keeps its own OTel identity and data model.", ja: TelemetryEvent は、しきい値超過、健全性変化、使用量更新など観測されたランタイム条件に関する Moonweave 領域通知である。それ自体は OpenTelemetry Metric、OpenTelemetry Metric data point、Log Record、Span Event ではなく、参照された標準シグナルは自身の OTel 識別性とデータモデルを保つ。}
  why_needed: {zh: 控制平面工作流需要从遥测派生的简洁可操作通知，而不能将策略事件重命名为提供信息的原始指标或日志数据。, en: "Control-plane workflows need concise actionable notifications derived from telemetry without relabeling a policy event as the raw metric or log data that informed it.", ja: コントロールプレーンのワークフローには、方針イベントを元のメトリックやログデータに改称せず、テレメトリーから導出された簡潔で実行可能な通知が必要である。}
  includes:
    - {zh: 事件 ID、条件类别、发生时间、测量引用和策略结果。, en: "Event ID, condition category, occurrence time, measurement reference, and policy outcome.", ja: イベント ID、条件カテゴリ、発生時刻、測定参照、ポリシー結果。}
    - {zh: 可引用独立遥测证据的阈值、容量、延迟、错误率和使用量通知。, en: "Threshold, capacity, latency, error-rate, and usage notifications that may cite separate telemetry evidence.", ja: 個別テレメトリー証拠を引用し得るしきい値、容量、レイテンシ、エラー率、使用量の通知。}
  excludes:
    - {zh: OTel 指标流及其数据点、完整日志记录、原始追踪 span 和通用状态快照。, en: "OTel metric streams and their data points, full log records, raw trace spans, and generic state snapshots.", ja: OTel メトリックストリームとそのデータポイント、完全なログ記録、生の trace span、一般的な状態スナップショット。}
    - {zh: 没有具名领域发生或源证据引用的仪表板聚合。, en: "A dashboard aggregation without a named domain occurrence or source evidence reference.", ja: 名前付き領域発生またはソース証拠参照を持たないダッシュボード集約。}
  semantic_kind: event
  aliases: [telemetry notification, operational alert event]
engineering:
  explanation: {zh: 运行时策略评估一个或多个遥测信号，并发出带底层测量记录或流的非机密引用的紧凑通知。使用者对通知采取行动，而可观测性系统在原生结构中保留标准 OpenTelemetry Metric、Log Record 和 Span 数据。, en: "A runtime policy evaluates one or more telemetry signals and emits a compact notification with a non-secret reference to the underlying measurement record or stream. Consumers act on the notification while observability systems retain standard OpenTelemetry Metric, Log Record, and Span data in their native structures.", ja: ランタイムポリシーは1つ以上のテレメトリーシグナルを評価し、基礎測定記録またはストリームへの非機密参照を持つコンパクトな通知を発行する。利用者は通知に基づいて行動し、可観測性システムは標準 OpenTelemetry Metric、Log Record、Span データをネイティブ構造で保持する。}
  typical_input:
    - description: {zh: 阈值评估, en: Threshold evaluation, ja: しきい値評価}
      format: |-
        {"measurement_ref":"metric-stream/runtime.latency.p95","condition_kind":"latency_threshold","observed_at":"2026-07-18T09:21:00Z","threshold":"1000ms"}
  typical_output:
    - description: {zh: 遥测通知, en: Telemetry notification, ja: テレメトリー通知}
      format: |-
        {"event_id":"telemetry-event-12","event_name":"runtime.latency.threshold","condition_kind":"latency_threshold","policy_outcome":"alerted"}
  reference_implementations:
    - {name: OpenTelemetry Metrics Data Model, url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/, description: Defines instruments, metric streams, and data points distinct from a custom notification.}
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: Defines OTel Log Record fields distinct from this policy event.}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 遥测事件 ID, en: Telemetry event ID, ja: テレメトリーイベント ID}
      definitions: {zh: 一次自定义遥测派生通知的稳定标识符。, en: Stable identifier of one custom telemetry-derived notification., ja: 1件のカスタムテレメトリー派生通知の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: telemetry-event-12
      source_claims: [claim-telemetry-notification-boundary]
    - id: event_name
      labels: {zh: 领域事件名称, en: Domain event name, ja: 領域イベント名}
      definitions: {zh: 从 ObservabilityEvent 继承的命名空间遥测领域事件名称。, en: Namespaced telemetry-domain event name inherited from ObservabilityEvent., ja: ObservabilityEvent から継承する名前空間付きテレメトリー領域イベント名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [runtime.telemetry.condition]
      example_value: runtime.telemetry.condition
      source_claims: [claim-telemetry-notification-boundary]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions: {zh: 从 ObservabilityEvent 继承的遥测条件被运行时断言的时间。, en: Time inherited from ObservabilityEvent at which the runtime asserted the telemetry condition., ja: ObservabilityEvent から継承する、ランタイムがテレメトリー条件を表明した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:21:00Z'
      source_claims: [claim-telemetry-notification-boundary]
    - id: subject_ref
      labels: {zh: 主体引用, en: Subject reference, ja: 主体参照}
      definitions: {zh: 从 ObservabilityEvent 继承的受遥测条件影响的运行时对象引用。, en: Reference inherited from ObservabilityEvent to the runtime subject affected by the telemetry condition., ja: ObservabilityEvent から継承する、テレメトリー条件の影響を受けたランタイム主体への参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: run-19
      source_claims: [claim-telemetry-notification-boundary]
    - id: condition_kind
      labels: {zh: 条件类型, en: Condition kind, ja: 条件種別}
      definitions: {zh: 触发此通知的遥测条件的领域类别。, en: Domain category of the telemetry condition that triggered this notification., ja: この通知をトリガーしたテレメトリー条件の領域カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [latency_threshold, error_rate_threshold, capacity_change, usage_update]
      example_value: latency_threshold
      source_claims: [claim-telemetry-notification-boundary]
    - id: measurement_ref
      labels: {zh: 测量引用, en: Measurement reference, ja: 測定参照}
      definitions: {zh: 对底层指标流、日志记录或派生摘要证据的非机密引用。, en: "Non-secret reference to the underlying metric stream, log record, or derived summary evidence.", ja: 基礎メトリックストリーム、ログ記録、派生要約証拠への非機密参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: metric-stream/runtime.latency.p95
      source_claims: [claim-telemetry-notification-boundary]
  constraints:
    - id: telemetry-event-signal-boundary
      severity: error
      language: plain
      expression: A notification must name its domain condition and evidence reference, but must not claim to be an OpenTelemetry Metric, OpenTelemetry Metric data point, Log Record, or Span Event without that signal's exact required structure.
      explanation: {zh: 派生策略事件与原始遥测信号具有不同的基数、保留和互操作语义。, en: "Derived policy events have different cardinality, retention, and interoperability semantics than raw telemetry signals.", ja: 派生ポリシーイベントは生のテレメトリーシグナルと異なるカーディナリティ、保持、相互運用意味を持つ。}
      source_claims: [claim-telemetry-notification-boundary]
  required_relations: [TelemetryEvent-specializes-ObservabilityEvent]
examples:
  - id: telemetry-event-positive
    labels: {zh: "OTel metrics 导出批次", en: "OTel metrics export batch", ja: "OTel metrics エクスポートバッチ"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TelemetryEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TelemetryEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TelemetryEvent TraceSpan/Record."}
    field_values: {event_id: telemetry-event-12, event_name: runtime.telemetry.condition, occurred_at: '2026-07-18T09:21:00Z', subject_ref: run-19, condition_kind: latency_threshold, measurement_ref: metric-stream/runtime.latency.p95}
    related_node_ids: [TelemetryEvent, ObservableSummary]
    related_relation_ids: [TelemetryEvent-specializes-ObservabilityEvent]
    source_claims: [claim-telemetry-notification-boundary]
  - id: telemetry-event-counterexample
    labels: {zh: "LangSmith run latency 非 TelemetryEvent", en: "LangSmith run latency not TelemetryEvent", ja: "LangSmith run latency は TelemetryEvent ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style TelemetryEvent TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style TelemetryEvent TraceRecord.", ja: "Missing trace rejects Langfuse-style TelemetryEvent."}
    field_values: {metric_name: runtime.latency}
    related_node_ids: [ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-telemetry-notification-boundary]
  - id: telemetry-event-boundary
    labels: {zh: "TelemetryEvent 与 TraceEvent 边界", en: "TelemetryEvent versus TraceEvent", ja: "TelemetryEvent と TraceEvent 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; TelemetryEvent must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; TelemetryEvent must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {event_id: telemetry-event-12}
    related_node_ids: [TelemetryEvent, ObservableSummary]
    related_relation_ids: []
    source_claims: [claim-telemetry-notification-boundary]
  - id: telemetry-event-instance-12
    labels: {zh: "agent_loop_turns 指标事件", en: "agent_loop_turns metric event", ja: "agent_loop_turns メトリックイベント"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->TelemetryEvent ObservabilityEvent.", en: "Phoenix instance: drift+quality->TelemetryEvent ObservabilityEvent.", ja: "Phoenix instance maps to TelemetryEvent Event."}
    field_values: {event_id: telemetry-event-12, event_name: runtime.telemetry.condition, occurred_at: '2026-07-18T09:21:00Z', subject_ref: run-19, condition_kind: latency_threshold, measurement_ref: metric-stream/runtime.latency.p95}
    related_node_ids: [TelemetryEvent, ObservableSummary, TraceRecord]
    related_relation_ids: [TelemetryEvent-specializes-ObservabilityEvent]
    source_claims: [claim-telemetry-notification-boundary]
parent_relation:
  id: TelemetryEvent-specializes-ObservabilityEvent
  predicate: is_a
  target: concept:ObservabilityEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是遥测通知事件, en: is a telemetry notification event, ja: テレメトリー通知イベントである}
  definitions: {zh: 每个 TelemetryEvent 都是其领域事实从具名遥测证据派生的 ObservabilityEvent。, en: Every TelemetryEvent is an ObservabilityEvent whose domain fact is derived from named telemetry evidence., ja: すべての TelemetryEvent は名前付きテレメトリー証拠から領域事実が導出される ObservabilityEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_telemetry_event, labels: {zh: 具有遥测通知事件, en: has telemetry notification event, ja: テレメトリー通知イベントを持つ}}
  conditions:
    - id: telemetry-event-parent-condition
      severity: error
      expression: Require a domain condition and measurement reference; do not substitute an OTel signal's field set for the custom event contract.
      explanations: {zh: 该子类型是面向策略的通知，而不是原始导出信号。, en: "The subtype is a policy-facing notification, not a raw exported signal.", ja: このサブタイプはポリシー向け通知であり、生のエクスポートシグナルではない。}
      source_claims: [claim-telemetry-notification-boundary]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-telemetry-notification-boundary]
relations: []
sources:
  - id: otel-metrics-data-model
    title: "OpenTelemetry Metrics Data Model"
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines metric instruments, event model, metric streams, and data points distinct from a custom notification.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines OTel Log Record fields distinct from policy-level runtime event data.
source_claims:
  - id: claim-telemetry-notification-boundary
    source: otel-metrics-data-model
    supports: OpenTelemetry metrics distinguish instrument-recorded events, OpenTelemetry Metric streams, and timestamped data points, so a policy notification derived from them is not itself an OpenTelemetry Metric or data point.
    locator: Model Details, Event Model, and Timeseries Model
    evidence_kind: standard
    confidence: high

