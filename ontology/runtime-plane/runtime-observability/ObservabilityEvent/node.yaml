schema: moonweave.ai/ontology-node/v1
id: ObservabilityEvent
kind: concept
status: accepted
labels: {zh: 运行时可观测性事件, en: Runtime observability event, ja: ランタイム可観測性イベント}
semantics:
  short_definition: {zh: 记录具名可观测发生及其主体引用的自定义运行时领域事件。, en: A custom runtime domain event that records a named observable occurrence and its subject reference., ja: 名前付きの観測可能な発生とその主体参照を記録するカスタムランタイム領域イベント。}
  definition: {zh: ObservabilityEvent 是 Moonweave 的运行时事件记录，用于记录检查点恢复、重放或项目命名的运行与阶段失败等发生。除非某个子类型明确说明，它不是 OpenTelemetry Log Record、OpenTelemetry Metric、OpenTelemetry Metric data point 或 OTel Span Event；它可以通过单独的证据与这些信号关联。, en: "An ObservabilityEvent is a Moonweave runtime event record for an occurrence such as checkpoint restoration, replay, or a project-named run or phase failure. It is deliberately not an OpenTelemetry Log Record, OpenTelemetry Metric, OpenTelemetry Metric data point, or OTel Span Event unless a subtype explicitly says so; it may be correlated with those signals by separate evidence.", ja: ObservabilityEvent は、チェックポイント復元、リプレイ、またはプロジェクト名付きの実行・フェーズ失敗などを記録する Moonweave のランタイムイベント記録である。サブタイプが明示しない限り、OpenTelemetry の Log Record、OpenTelemetry Metric、OpenTelemetry Metric data point、OTel Span Event ではなく、別個の証拠によってそれらのシグナルと相関できる。}
  why_needed: {zh: 运行时操作需要领域专属的生命周期证据，同时不能滥用具有严格结构和附着语义的 OpenTelemetry 术语。, en: Runtime operations need domain-specific lifecycle evidence without overloading OpenTelemetry terms that have exact structural and attachment semantics., ja: ランタイム操作には領域固有のライフサイクル証拠が必要であり、厳密な構造と付着意味を持つ OpenTelemetry 用語を過剰に流用してはならない。}
  includes:
    - {zh: 事件标识符、领域事件名称、发生时间、主体引用、源运行或阶段、结果代码和诊断证据引用。, en: "Event identifier, domain event name, occurrence timestamp, subject reference, source run or phase, result code, and diagnostic evidence reference.", ja: イベント識別子、領域イベント名、発生時刻、主体参照、発生元の実行またはフェーズ、結果コード、診断証拠参照。}
    - {zh: 描述操作事实的检查点恢复、重放以及项目命名的运行或阶段失败通知。, en: "Checkpoint restoration, replay, and project-named run or phase failure notifications that describe operational facts.", ja: 操作上の事実を記述するチェックポイント復元、リプレイ、プロジェクト名付きの実行またはフェーズ失敗通知。}
  excludes:
    - {zh: 具有 Timestamp、Body、Resource 和 InstrumentationScope 字段的 OTel Log Record。, en: "An OTel Log Record with Timestamp, Body, Resource, and InstrumentationScope fields.", ja: Timestamp、Body、Resource、InstrumentationScope フィールドを持つ OTel Log Record。}
    - {zh: OpenTelemetry Metric data point，或附着于某个 OTel Span 的 Span Event。, en: An OpenTelemetry Metric data point or a Span Event attached to a particular OTel Span., ja: OpenTelemetry Metric data point、または特定の OTel Span に付着した Span Event。}
  semantic_kind: event
  aliases: [runtime domain event, operational notification]
engineering:
  explanation: {zh: 运行时控制代码会在可观测领域转换后发出一条小型事件记录，并包含稳定的主体引用。遥测导出器可以独立发出日志、指标数据点、追踪或 span event；关联必须明确，且不会把该自定义记录变成标准 OTel 对象。, en: "Runtime control code emits a small event record after an observable domain transition and includes a stable subject reference. Telemetry exporters can independently emit logs, metric data points, traces, or span events; correlation is explicit and never makes this custom record a standard OTel object.", ja: ランタイム制御コードは観測可能な領域遷移後に安定した主体参照を含む小さなイベント記録を発行する。テレメトリーエクスポーターはログ、メトリックデータポイント、トレース、Span Event を独立して発行でき、相関は明示的であり、このカスタム記録を標準 OTel オブジェクトにすることはない。}
  typical_input:
    - description: {zh: 领域发生, en: Domain occurrence, ja: 領域上の発生}
      format: |-
        {"event_id":"obs-event-61","event_name":"checkpoint.restored","subject_ref":"checkpoint-4","occurred_at":"2026-07-18T09:20:01Z"}
  typical_output:
    - description: {zh: 运行时可观测性事件, en: Runtime observability event, ja: ランタイム可観測性イベント}
      format: |-
        {"event_id":"obs-event-61","event_name":"checkpoint.restored","outcome":"succeeded"}
  reference_implementations:
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: "Documents the standard Log Record fields from which this custom event is intentionally distinct."}
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Documents Span Events as data attached to a particular Span."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 运行时事件 ID, en: Runtime event ID, ja: ランタイムイベント ID}
      definitions: {zh: 一条自定义运行时领域事件记录的稳定标识符。, en: Stable identifier for one custom runtime domain event record., ja: 1 件のカスタムランタイム領域イベント記録の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: obs-event-61
      source_claims: [claim-custom-runtime-event-boundary]
    - id: event_name
      labels: {zh: 领域事件名称, en: Domain event name, ja: 領域イベント名}
      definitions: {zh: 由本体控制的事件分类体系下的命名空间运行时发生名称。, en: Namespaced runtime occurrence name under the ontology-controlled event taxonomy., ja: オントロジー管理のイベント分類下にある名前空間付きランタイム発生名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9_.-]{2,127}$'
      example_value: checkpoint.restored
      source_claims: [claim-custom-runtime-event-boundary]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions: {zh: 运行时断言该领域发生的时间。, en: Time at which the domain occurrence was asserted by the runtime., ja: ランタイムがその領域上の発生を表明した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-custom-runtime-event-boundary]
    - id: subject_ref
      labels: {zh: 主体引用, en: Subject reference, ja: 主体参照}
      definitions: {zh: 被该领域发生影响的运行时对象、运行、阶段或状态主体的稳定引用。, en: "Stable reference to the runtime object, run, phase, or state subject affected by the domain occurrence.", ja: 領域上の発生の影響を受けたランタイムオブジェクト、実行、フェーズ、状態主体への安定した参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: restore-op-44
      source_claims: [claim-custom-runtime-event-boundary]
    - id: source_run_ref
      labels: {zh: 源运行引用, en: Source run reference, ja: 発生元実行参照}
      definitions: {zh: 产生该事件证据的可选 RunAttempt 或 Execution 引用。, en: Optional RunAttempt or Execution reference that produced the event evidence., ja: イベント証拠を生成した任意の RunAttempt または Execution 参照。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: run-19
      source_claims: [claim-custom-runtime-event-boundary]
    - id: source_phase
      labels: {zh: 源阶段, en: Source phase, ja: 発生元フェーズ}
      definitions: {zh: 产生可观测发生的可选项目定义执行阶段。, en: Optional project-defined execution phase that produced the observable occurrence., ja: 観測可能な発生を生成した任意のプロジェクト定義実行フェーズ。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: memory.compaction.parse
      source_claims: [claim-custom-runtime-event-boundary]
    - id: result_code
      labels: {zh: 结果代码, en: Result code, ja: 結果コード}
      definitions: {zh: 可选的项目定义结果或诊断代码；项目命名的失败通知必须提供该值。, en: Optional project-defined result or diagnostic code; required for project-named failure notifications., ja: 任意のプロジェクト定義結果または診断コード。プロジェクト名付きの失敗通知では必須。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: PARSE_TIMEOUT
      source_claims: [claim-custom-runtime-event-boundary]
    - id: diagnostic_evidence_ref
      labels: {zh: 诊断证据引用, en: Diagnostic evidence reference, ja: 診断証拠参照}
      definitions: {zh: 支持该事件的已保留诊断或状态证据的可选非机密引用。, en: Optional non-secret reference to retained diagnostic or state evidence supporting the event., ja: イベントを裏付ける保持済み診断または状態証拠への任意の非機密参照。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: record-parse-timeout-19
      source_claims: [claim-custom-runtime-event-boundary]
  constraints:
    - id: observability-event-domain-boundary
      severity: error
      language: plain
      expression: Each record must declare a domain event name and subject reference. A project-named failure notification must also identify its source run or phase, result code, and diagnostic evidence reference; do not label any such record an OTel Log Record, OpenTelemetry Metric, OpenTelemetry Metric data point, or Span Event unless its node contract supplies that exact standard structure.
      explanation: {zh: 信号名称带有通用领域事件无法满足的互操作性承诺。, en: Signal names carry interoperability commitments that a generic domain event does not satisfy., ja: シグナル名には、一般的な領域イベントでは満たせない相互運用性の約束が伴う。}
      source_claims: [claim-custom-runtime-event-boundary]
  required_relations: []
examples:
  - id: observability-event-positive
    labels: {zh: "Langfuse observation 事件基类", en: "Langfuse observation event base", ja: "Langfuse observation イベント基底"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; ObservabilityEvent TraceSpan/Record."}
    field_values: {event_id: obs-event-61, event_name: checkpoint.restored, occurred_at: '2026-07-18T09:20:01Z', subject_ref: restore-op-44}
    related_node_ids: [ObservabilityEvent, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-custom-runtime-event-boundary]
  - id: observability-event-runtime-failure-positive
    labels: {zh: "项目命名解析超时失败", en: "Project-named parse timeout failure", ja: "プロジェクト名付き解析タイムアウト失敗"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityEvent maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; ObservabilityEvent TraceSpan/Record."}
    field_values: {event_id: obs-event-66, event_name: phase.parse.timeout, occurred_at: '2026-07-18T09:23:00Z', subject_ref: run-19, source_run_ref: run-19, source_phase: memory.compaction.parse, result_code: PARSE_TIMEOUT, diagnostic_evidence_ref: record-parse-timeout-19}
    related_node_ids: [ObservabilityEvent, RunAttempt, ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-custom-runtime-event-boundary]
  - id: observability-event-counterexample
    labels: {zh: "OTel Log Record 非 ObservabilityEvent", en: "OTel Log Record not ObservabilityEvent", ja: "OTel Log Record は ObservabilityEvent ではない"}
    descriptions: {zh: "Latency without embedding_version cannot serve as Phoenix-style ObservabilityEvent drift event.", en: "Latency without embedding_version cannot serve as Phoenix-style ObservabilityEvent drift event.", ja: "Missing embedding_version rejects Phoenix-style ObservabilityEvent."}
    field_values: {body: restore complete}
    related_node_ids: [ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-custom-runtime-event-boundary]
  - id: observability-event-boundary
    labels: {zh: "领域事件与 OTel Span Event 边界", en: "Domain event versus OTel Span Event boundary", ja: "領域イベントと OTel Span Event 境界"}
    descriptions: {zh: "Langfuse score is eval signal not Execution; ObservabilityEvent preserves trace/span/score distinction.", en: "Langfuse score is eval signal not Execution; ObservabilityEvent preserves trace/span/score distinction.", ja: "score not Execution."}
    field_values: {event_id: obs-event-61, subject_ref: restore-op-44}
    related_node_ids: [ObservabilityEvent, TraceEvent, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-custom-runtime-event-boundary]
  - id: observability-event-instance-61
    labels: {zh: "obs-event-61 checkpoint.restored 实例", en: "obs-event-61 checkpoint.restored instance", ja: "obs-event-61 checkpoint.restored 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ObservabilityEvent.", en: "Langfuse instance: trace+span+score->ObservabilityEvent.", ja: "Langfuse instance maps to ObservabilityEvent."}
    field_values: {event_id: obs-event-61, event_name: checkpoint.restored, occurred_at: '2026-07-18T09:20:01Z', subject_ref: restore-op-44}
    related_node_ids: [ObservabilityEvent, Checkpoint, RestoreActivity, TraceEvent]
    related_relation_ids: []
    source_claims: [claim-custom-runtime-event-boundary]
parent_relation: null
relations: []
sources:
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines OTel Log Record fields and supports distinguishing this custom domain event from a Log Record.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines OTel Span Events as events added to a specific Span.
source_claims:
  - id: claim-otel-span-event-attachment
    source: otel-trace-api
    supports: OpenTelemetry defines a Span Event as a named, timestamped, attributed item added to a Span.
    locator: Span operations, Add Events
    evidence_kind: standard
    confidence: high
  - id: claim-custom-runtime-event-boundary
    source: otel-trace-api
    supports: 'Design inference: Moonweave treats a runtime event without an attached OTel Span as a custom domain event rather than an OTel Span Event.'
    locator: Span operations, Add Events
    evidence_kind: design-inference
    confidence: high

