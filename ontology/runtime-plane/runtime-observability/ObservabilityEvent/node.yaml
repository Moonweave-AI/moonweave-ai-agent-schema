schema: moonweave.ai/ontology-node/v1
id: ObservabilityEvent
kind: concept
labels:
  zh: 可观测运行事件
  en: observability event
  ja: 観測可能実行イベント
semantics:
  short_definition:
    zh: 可关联到运行上下文的、具有确定发生时点的事件。
    en: An event at a determinate time correlated to runtime context.
    ja: 実行文脈へ関連付けられる確定時点のイベント。
  definition:
    zh: 可观测运行事件是运行平面的事件上位类：它在可确定时点发生，改变、触发或报告运行状态，并能关联到会话、执行尝试、跨度或资源。该类表示发生项本身；保存事件字段的 LogRecord 或 AuditRecord 是信息记录，不能因描述同一事实而与事件合并。
    en: ObservabilityEvent is the runtime-plane superclass for occurrences that happen at a determinate time, change, trigger, or report runtime state, and can be correlated to a session, attempt, span, or resource. It represents the occurrence itself; LogRecord and AuditRecord are information records and do not become events merely by describing the same fact.
    ja: ObservabilityEvent は、確定時点に発生し、実行状態を変更・起動・報告し、セッション、試行、スパン、資源へ関連付けられる実行面イベントの上位類です。発生項自体を表し、同じ事実を記述する LogRecord や AuditRecord は情報記録のままです。
  why_needed:
    zh: 这一共同上位类允许统一查询何时发生了恢复、回放、会话生命周期或插桩发出，同时保持事件与承载它的记录分离，避免把所有日志和状态对象都塞进事件层。
    en: This common superclass supports uniform queries over restore, replay, session-lifecycle, and instrumentation-emission occurrences while keeping events separate from their records, preventing every log and state object from being forced into the event layer.
    ja: この共通上位類により、復元、再生、セッションライフサイクル、計装送出を統一照会しつつ、イベントと記録を分離し、すべてのログや状態対象をイベント層へ押し込むことを防ぎます。
  includes:
    - zh: 包括检查点恢复触发、回放触发、会话开始或暂停、跨度内瞬时注释和遥测发出等具有发生时点的运行事件。
      en: Includes checkpoint-restore triggers, replay triggers, session start or pause, instantaneous span annotations, and telemetry emissions with an occurrence time.
      ja: チェックポイント復元起動、再生起動、セッション開始・停止、スパン内瞬間注釈、テレメトリ送出など発生時点を持つ実行イベントを含みます。
  excludes:
    - zh: 不包括 TraceRecord、LogRecord、StateSnapshot 等信息记录，也不包括持续一段时间并具有开始与结束边界的执行活动。
      en: Excludes information records such as TraceRecord, LogRecord, and StateSnapshot, and activities that persist through an interval with start and end boundaries.
      ja: TraceRecord、LogRecord、StateSnapshot などの情報記録、および開始・終了境界を持ち時間的に継続する活動は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 ObservabilityEvent 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ObservabilityEvent, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ObservabilityEvent 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ObservabilityEvent.
      format: |-
        # Example ObservabilityEvent ingest
        { "observability-event_ref": "example-1" }
      source_claims:
        - claim-observability-event-design
  typical_output:
    - description: Moonweave-local ObservabilityEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "observability-event_id": "example-1" }'
      source_claims:
        - claim-observability-event-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已发生且可被记录、传输和引用的运行事件。
        en: Stably identifies one occurred runtime event that can be recorded, transported, and referenced.
        ja: 記録、転送、参照できる一つの発生済み実行イベントを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: event-payment-timeout-418
      source_claims:
        - claim-observability-event-design
    - id: event_kind
      labels:
        zh: 事件类别
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分通用运行、遥测发射、检查点恢复、回放与追踪事件。
        en: Distinguishes generic runtime, telemetry emission, checkpoint restore, replay, and trace events.
        ja: 一般実行、テレメトリ送出、チェックポイント復元、再生、トレースイベントを区別します。
      allowed_values:
        - id: event-kind-runtime
          value: runtime
          labels:
            zh: 运行
            en: runtime
            ja: 実行
          definitions:
            zh: 表示运行事件。
            en: Identifies a runtime event.
            ja: 実行イベントを示します。
          source_claims:
            - claim-observability-event-design
        - id: event-kind-telemetry
          value: telemetry
          labels:
            zh: 遥测
            en: telemetry
            ja: テレメトリ
          definitions:
            zh: 表示遥测事件。
            en: Identifies a telemetry event.
            ja: テレメトリイベントを示します。
          source_claims:
            - claim-observability-event-design
        - id: event-kind-checkpoint-restore
          value: checkpoint-restore
          labels:
            zh: 检查点恢复
            en: checkpoint restore
            ja: チェックポイント復元
          definitions:
            zh: 表示检查点恢复事件。
            en: Identifies a checkpoint restore event.
            ja: チェックポイント復元イベントを示します。
          source_claims:
            - claim-observability-event-design
        - id: event-kind-replay
          value: replay
          labels:
            zh: 回放
            en: replay
            ja: 再生
          definitions:
            zh: 表示回放事件。
            en: Identifies a replay event.
            ja: 再生イベントを示します。
          source_claims:
            - claim-observability-event-design
        - id: event-kind-trace
          value: trace
          labels:
            zh: 追踪
            en: trace
            ja: トレース
          definitions:
            zh: 表示追踪事件。
            en: Identifies a trace event.
            ja: トレースイベントを示します。
          source_claims:
            - claim-observability-event-design
      pattern: null
      example_value: runtime
      source_claims:
        - claim-observability-event-design
    - id: event_name
      labels:
        zh: 事件名称
        en: event name
        ja: イベント名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存描述发生事实的稳定事件名称，而不是自由文本摘要。
        en: Stores the stable event name describing what occurred rather than a free-text summary.
        ja: 自由文要約ではなく発生事実を表す安定したイベント名を保持します。
      allowed_values: []
      pattern: null
      example_value: payment.timeout
      source_claims:
        - claim-observability-event-design
    - id: timestamp
      labels:
        zh: 发生时间
        en: timestamp
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录事件发生或被显式补记的时间。
        en: Records when the event occurred or was explicitly backdated.
        ja: イベントが発生した時刻、または明示的に補記された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:43:12.418Z
      source_claims:
        - claim-observability-event-design
    - id: attributes
      labels:
        zh: 事件属性
        en: event attributes
        ja: イベント属性
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存只描述本次发生的键值属性，不把共享实体压入事件节点。
        en: Stores key-value attributes local to this occurrence without collapsing shared entities into the event.
        ja: 共有実体をイベントへ押し込まず、この発生だけを説明するキー値属性を保持します。
      allowed_values: []
      pattern: null
      example_value:
        timeout.ms: 3000
      source_claims:
        - claim-observability-event-design
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: トレース ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在事件属于端到端追踪时引用其追踪标识。
        en: References the end-to-end trace when the event belongs to one.
        ja: イベントが属する end-to-end trace の識別子を参照します。
      allowed_values: []
      pattern: null
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-observability-event-design
    - id: span_id
      labels:
        zh: 跨度标识
        en: span ID
        ja: スパン ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在事件附着于具体跨度时引用该跨度标识。
        en: References the concrete span when the event is attached to one.
        ja: イベントが付属する具体的 span の識別子を参照します。
      allowed_values: []
      pattern: null
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-observability-event-design
  constraints:
    - id: observability-event-kind-and-trace-context-coherence
      severity: error
      expression_language: plain
      expression: event_kind must match the most specific ObservabilityEvent subtype; span_id requires trace_id; event_name and timestamp must identify the actual occurrence
      explanations:
        zh: 事件类别必须与最具体下位类型一致，跨度标识必须伴随追踪标识，名称与时间必须描述真实发生。
        en: event_kind matches the most specific subtype, span_id requires trace_id, and name plus time identify the occurrence.
        ja: イベント種別は最具体下位型と一致し、span ID には trace ID が必要で、名前と時刻は実際の発生を識別します。
      source_claims:
        - claim-observability-event-design
  required_relation_constraints: []
examples:
  - id: ObservabilityEvent-example-positive-001
    labels:
      zh: Langfuse observation 事件基类
      en: Langfuse observation event base
      ja: Langfuse observation イベント基底
    descriptions:
      zh: Langfuse observation.create(type=, name=) 产生 ObservabilityEvent 基类记录，可特化为 TraceEvent/TelemetryEvent 子类型。
      en: Langfuse observation.create(type=, name=) produces ObservabilityEvent base record specializing to TraceEvent/TelemetryEvent subtypes.
      ja: Langfuse observation.create が ObservabilityEvent 基底を生成する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      event_id: event-payment-timeout-418
      event_kind: runtime
      event_name: payment.timeout
      timestamp: 2026-07-16T10:43:12.418Z
      attributes:
        timeout.ms: 3000
        tool.name: payment
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
    related_node_ids:
      - ObservabilityEvent
      - TraceEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
    source_claims:
      - claim-observability-event-design
  - id: ObservabilityEvent-example-boundary-001
    labels:
      zh: 项目命名解析超时失败
      en: Project-named parse timeout failure
      ja: プロジェクト名付き解析タイムアウト失敗
    descriptions:
      zh: Moonweave 项目命名失败通知 phase.parse.timeout：ObservabilityEvent event_name=phase.parse.timeout、source_run_ref=run-19、result_code=PARSE_TIMEOUT、diagnostic_evidence_ref=record-parse-timeout-19。
      en: "Moonweave project-named failure notification phase.parse.timeout: ObservabilityEvent event_name=phase.parse.timeout, source_run_ref=run-19, result_code=PARSE_TIMEOUT, diagnostic_evidence_ref=record-parse-timeout-19."
      ja: phase.parse.timeout 失敗通知 ObservabilityEvent を記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservabilityEvent
      - ObservableSummary
      - TraceEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
    source_claims:
      - claim-observability-event-design
  - id: ObservabilityEvent-example-3
    labels:
      zh: OTel Log Record 非 ObservabilityEvent
      en: OTel Log Record not ObservabilityEvent
      ja: OTel Log Record は ObservabilityEvent ではない
    descriptions:
      zh: OpenTelemetry Logs Data Model Log Record 含 Resource/InstrumentationScope/Body/trace context，不是 Moonweave 自定义 ObservabilityEvent domain event。
      en: OpenTelemetry Logs Data Model Log Record with Resource/InstrumentationScope/Body/trace context is not Moonweave custom ObservabilityEvent domain event.
      ja: OTel Log Record は ObservabilityEvent ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservabilityEvent
    related_relation_ids: []
    source_claims:
      - claim-observability-event-vendor
      - claim-observability-event-design
  - id: ObservabilityEvent-example-4
    labels:
      zh: 领域事件与 OTel Span Event 边界
      en: Domain event versus OTel Span Event boundary
      ja: 領域イベントと OTel Span Event 境界
    descriptions:
      zh: ObservabilityEvent 自定义 replay.started 可与 TraceEvent 关联；仅 TraceEvent 是附着 TraceSpan 的 OTel Span Event。
      en: ObservabilityEvent custom replay.started may correlate with TraceEvent; only TraceEvent is OTel Span Event attached to TraceSpan.
      ja: replay.started ObservabilityEvent と TraceEvent は関連するが OTel Span Event は TraceEvent のみ。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservabilityEvent
    related_relation_ids: []
    source_claims:
      - claim-observability-event-vendor
      - claim-observability-event-design
  - id: ObservabilityEvent-example-5
    labels:
      zh: obs-event-61 checkpoint.restored 实例
      en: obs-event-61 checkpoint.restored instance
      ja: obs-event-61 checkpoint.restored 事例
    descriptions:
      zh: ObservabilityEvent event_id=obs-event-61、event_name=checkpoint.restored、occurred_at=2026-07-18T09:20:01Z、subject_ref=restore-op-44，关联 Checkpoint 与 RestoreActivity。
      en: ObservabilityEvent event_id=obs-event-61, event_name=checkpoint.restored, occurred_at=2026-07-18T09:20:01Z, subject_ref=restore-op-44, linked to Checkpoint and RestoreActivity.
      ja: obs-event-61 checkpoint.restored ObservabilityEvent を記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservabilityEvent
    related_relation_ids: []
    source_claims:
      - claim-observability-event-vendor
      - claim-observability-event-design
parent_relation: null
relations: []
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-observability-event-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports ObservabilityEvent identity and boundary mapping.
    locator: ObservabilityEvent integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-observability-event-design
    source: src-runtime-observability-design
    supports: Moonweave ObservabilityEvent concept boundary within runtime-observability.
    locator: ObservabilityEvent boundary
    evidence_kind: design-inference
    confidence: high
