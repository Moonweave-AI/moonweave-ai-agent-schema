source_claims:
  - id: claim-observability-event-001
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry span events have a determinate timestamp, name, and attributes; Moonweave generalizes the occurrence category while keeping information records such as logs and audits separate.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-observability-event-002
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry events are distinct named occurrences on a span. Moonweave assigns a stable event_id so records and recovery actions can reference one occurrence.
    locator: OpenTelemetry Trace API > SpanContext, Span operations, Add events, attributes, and timestamps
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-observability-event-003
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry permits application-defined event names and attributes; Moonweave uses runtime for an unspecialized occurred event.
    locator: OpenTelemetry Trace API > SpanContext, Span operations, Add events, attributes, and timestamps
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-observability-event-004
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry instrumentation emits telemetry observations; Moonweave distinguishes the emission occurrence.
    locator: OpenTelemetry Trace API > SpanContext, Span operations, Add events, attributes, and timestamps
