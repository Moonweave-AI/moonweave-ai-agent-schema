schema: moonweave.ai/ontology-node/v1
id: ObservabilityEvent
kind: concept
status: review
labels:
  zh: 可观测运行事件
  en: observability event
  ja: 観測可能実行イベント
semantics:
  short_definition:
    zh: 可关联到运行上下文的、具有确定发生时点的事件。
    en: An event at a determinate time correlated to runtime context.
    ja: 実行文脈へ関連付けられる確定時点のイベント。
  definition:
    zh: 可观测运行事件是运行平面的事件上位类：它在可确定时点发生，改变、触发或报告运行状态，并能关联到会话、执行尝试、跨度或资源。该类表示发生项本身；保存事件字段的 LogRecord 或 AuditRecord 是信息记录，不能因描述同一事实而与事件合并。
    en: ObservabilityEvent is the runtime-plane superclass for occurrences that happen at a determinate time, change, trigger, or report runtime state, and can be correlated to a session, attempt, span, or resource. It represents the occurrence itself; LogRecord and AuditRecord are information records and do not become events merely by describing the same fact.
    ja: ObservabilityEvent は、確定時点に発生し、実行状態を変更・起動・報告し、セッション、試行、スパン、資源へ関連付けられる実行面イベントの上位類です。発生項自体を表し、同じ事実を記述する LogRecord や AuditRecord は情報記録のままです。
  why_needed:
    zh: 这一共同上位类允许统一查询何时发生了恢复、回放、会话生命周期或插桩发出，同时保持事件与承载它的记录分离，避免把所有日志和状态对象都塞进事件层。
    en: This common superclass supports uniform queries over restore, replay, session-lifecycle, and instrumentation-emission occurrences while keeping events separate from their records, preventing every log and state object from being forced into the event layer.
    ja: この共通上位類により、復元、再生、セッションライフサイクル、計装送出を統一照会しつつ、イベントと記録を分離し、すべてのログや状態対象をイベント層へ押し込むことを防ぎます。
  includes:
    - zh: 包括检查点恢复触发、回放触发、会话开始或暂停、跨度内瞬时注释和遥测发出等具有发生时点的运行事件。
      en: Includes checkpoint-restore triggers, replay triggers, session start or pause, instantaneous span annotations, and telemetry emissions with an occurrence time.
      ja: チェックポイント復元起動、再生起動、セッション開始・停止、スパン内瞬間注釈、テレメトリ送出など発生時点を持つ実行イベントを含みます。
  excludes:
    - zh: 不包括 TraceRecord、LogRecord、StateSnapshot 等信息记录，也不包括持续一段时间并具有开始与结束边界的执行活动。
      en: Excludes information records such as TraceRecord, LogRecord, and StateSnapshot, and activities that persist through an interval with start and end boundaries.
      ja: TraceRecord、LogRecord、StateSnapshot などの情報記録、および開始・終了境界を持ち時間的に継続する活動は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已发生且可被记录、传输和引用的运行事件。
        en: Stably identifies one occurred runtime event that can be recorded, transported, and referenced.
        ja: 記録、転送、参照できる一つの発生済み実行イベントを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: event-payment-timeout-418
      source_claims:
        - claim-observability-event-002
    - id: event_kind
      labels:
        zh: 事件类别
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分通用运行、遥测发射、检查点恢复、回放与追踪事件。
        en: Distinguishes generic runtime, telemetry emission, checkpoint restore, replay, and trace events.
        ja: 一般実行、テレメトリ送出、チェックポイント復元、再生、トレースイベントを区別します。
      allowed_values:
        - id: event-kind-runtime
          value: runtime
          labels:
            zh: 运行
            en: runtime
            ja: 実行
          definitions:
            zh: 表示运行事件。
            en: Identifies a runtime event.
            ja: 実行イベントを示します。
          status: accepted
          source_claims:
            - claim-observability-event-003
        - id: event-kind-telemetry
          value: telemetry
          labels:
            zh: 遥测
            en: telemetry
            ja: テレメトリ
          definitions:
            zh: 表示遥测事件。
            en: Identifies a telemetry event.
            ja: テレメトリイベントを示します。
          status: accepted
          source_claims:
            - claim-observability-event-004
        - id: event-kind-checkpoint-restore
          value: checkpoint-restore
          labels:
            zh: 检查点恢复
            en: checkpoint restore
            ja: チェックポイント復元
          definitions:
            zh: 表示检查点恢复事件。
            en: Identifies a checkpoint restore event.
            ja: チェックポイント復元イベントを示します。
          status: accepted
          source_claims:
            - claim-observability-event-005
        - id: event-kind-replay
          value: replay
          labels:
            zh: 回放
            en: replay
            ja: 再生
          definitions:
            zh: 表示回放事件。
            en: Identifies a replay event.
            ja: 再生イベントを示します。
          status: accepted
          source_claims:
            - claim-observability-event-006
        - id: event-kind-trace
          value: trace
          labels:
            zh: 追踪
            en: trace
            ja: トレース
          definitions:
            zh: 表示追踪事件。
            en: Identifies a trace event.
            ja: トレースイベントを示します。
          status: accepted
          source_claims:
            - claim-observability-event-007
      pattern: null
      example_value: runtime
      source_claims:
        - claim-observability-event-008
    - id: event_name
      labels:
        zh: 事件名称
        en: event name
        ja: イベント名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存描述发生事实的稳定事件名称，而不是自由文本摘要。
        en: Stores the stable event name describing what occurred rather than a free-text summary.
        ja: 自由文要約ではなく発生事実を表す安定したイベント名を保持します。
      allowed_values: []
      pattern: null
      example_value: payment.timeout
      source_claims:
        - claim-observability-event-009
    - id: timestamp
      labels:
        zh: 发生时间
        en: timestamp
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录事件发生或被显式补记的时间。
        en: Records when the event occurred or was explicitly backdated.
        ja: イベントが発生した時刻、または明示的に補記された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:43:12.418Z
      source_claims:
        - claim-observability-event-010
    - id: attributes
      labels:
        zh: 事件属性
        en: event attributes
        ja: イベント属性
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存只描述本次发生的键值属性，不把共享实体压入事件节点。
        en: Stores key-value attributes local to this occurrence without collapsing shared entities into the event.
        ja: 共有実体をイベントへ押し込まず、この発生だけを説明するキー値属性を保持します。
      allowed_values: []
      pattern: null
      example_value:
        timeout.ms: 3000
      source_claims:
        - claim-observability-event-011
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: トレース ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在事件属于端到端追踪时引用其追踪标识。
        en: References the end-to-end trace when the event belongs to one.
        ja: イベントが属する end-to-end trace の識別子を参照します。
      allowed_values: []
      pattern: null
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-observability-event-012
    - id: span_id
      labels:
        zh: 跨度标识
        en: span ID
        ja: スパン ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在事件附着于具体跨度时引用该跨度标识。
        en: References the concrete span when the event is attached to one.
        ja: イベントが付属する具体的 span の識別子を参照します。
      allowed_values: []
      pattern: null
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-observability-event-013
  constraints:
    - id: observability-event-kind-and-trace-context-coherence
      severity: error
      expression_language: plain
      expression: event_kind must match the most specific ObservabilityEvent subtype; span_id requires trace_id; event_name and timestamp must identify the actual occurrence
      explanations:
        zh: 事件类别必须与最具体下位类型一致，跨度标识必须伴随追踪标识，名称与时间必须描述真实发生。
        en: event_kind matches the most specific subtype, span_id requires trace_id, and name plus time identify the occurrence.
        ja: イベント種別は最具体下位型と一致し、span ID には trace ID が必要で、名前と時刻は実際の発生を識別します。
      source_claims:
        - claim-observability-event-014
  required_relation_constraints: []
examples:
  - id: ObservabilityEvent-example-positive-001
    kind: positive
    labels:
      zh: 具有确定发生时点的运行事件
      en: Runtime event with a determinate occurrence time
      ja: 確定した発生時点を持つ実行イベント
    scenario_id: null
    descriptions:
      zh: 支付工具在 10:43:12.418 返回超时；事件保存该发生时点、事件名称、timeout 属性以及对应 trace_id 和 span_id，供随后诊断定位。
      en: At 10:43:12.418 a payment tool returns a timeout. The event preserves the occurrence time, event name, timeout attributes, and correlated trace_id and span_id for later diagnosis.
      ja: 10:43:12.418に決済ツールがタイムアウトを返す。イベントは発生時刻、イベント名、timeout属性、対応するtrace_idとspan_idを保存し、後続診断に利用する。
    field_values:
      event_id: event-payment-timeout-418
      event_kind: runtime
      event_name: payment.timeout
      timestamp: 2026-07-16T10:43:12.418Z
      attributes:
        timeout.ms: 3000
        tool.name: payment
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
    related_node_ids:
      - ObservabilityEvent
      - TraceEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
    expected_result:
      zh: 该对象被识别为可观测事件；其身份由一次有时间戳的发生事实决定。
      en: The object is classified as an ObservabilityEvent whose identity is one timestamped occurrence.
      ja: この対象は、一回の時刻付き発生事実を同一性条件とするObservabilityEventに分類される。
    why_valid_or_invalid:
      zh: 它报告单次运行状态变化并带有相关上下文，而不是汇总一段时间内的多条证据。
      en: It reports one runtime occurrence with correlation context rather than summarizing multiple pieces of evidence over an interval.
      ja: 一回の実行発生を相関文脈付きで報告し、一定期間の複数証拠を要約しない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observability-event-001
  - id: ObservabilityEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 跨区间摘要不是事件
      en: An interval summary is not an event
      ja: 区間要約はイベントではない
    scenario_id: null
    descriptions:
      zh: 值班报告汇总过去一小时的三次超时、两次重试和最终成功，并引用多个跨度。报告具有覆盖区间和来源集合，却没有一个能够决定其身份的单一发生时点。
      en: An operations report summarizes three timeouts, two retries, and final success over the past hour and references several spans. It has a covered interval and source set, but no single occurrence time that determines its identity.
      ja: 運用報告が過去1時間の3回のタイムアウト、2回の再試行、最終成功をまとめ、複数スパンを参照する。対象区間と資料集合はあるが、同一性を決める単一発生時点はない。
    field_values: {}
    related_node_ids:
      - ObservabilityEvent
      - ObservableSummary
      - TraceEvent
    related_relation_ids:
      - TraceEvent-is_a-ObservabilityEvent
    expected_result:
      zh: 该对象作为可观测摘要或记录处理，不被误标为可观测事件。
      en: The object is handled as an ObservableSummary or record and is not mislabeled as an ObservabilityEvent.
      ja: 対象はObservableSummaryまたは記録として扱われ、ObservabilityEventとは誤分類されない。
    why_valid_or_invalid:
      zh: 事件的核心是一次发生；多来源、跨区间的信息对象具有记录身份。
      en: An event is one occurrence; a multi-source object covering an interval has record identity.
      ja: イベントの中核は一回の発生であり、複数資料と区間を持つ対象は記録の同一性を持つ。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observability-event-001
external_mappings: []
