              ja: 銉堛儸銉笺偣銇ㄣ儊銈с儍銈儩銈ゃ兂銉堛仺銉偘銇ㄣ儐銉儭銉堛儶銇竴鎰忋伄鎵€鏈夎€呫仺鍒ゅ畾鍙兘銇晱銇勩仹鍒嗛洟銇曘倢銇俱仚銆?          - reviewer_id: moonweave-ontology-structure-reviewer
