      en: The query returns three distinct identities and their derivation, emission, and recording relations without treating any object as an alias.
      ja: 照会は三つの別 identity と derivation・emission・recording 関係を返し alias として扱いません。
    why_valid_or_invalid:
      zh: 运行发生、遥测发出与日志记录回答不同问题，显式血缘在不复制所有权的前提下关联它们。
      en: Runtime occurrence, telemetry emission, and log recording answer different questions; explicit lineage connects them without duplicating ownership.
      ja: runtime occurrence・telemetry emission・log recording は別問に答え、明示 lineage が owner を複製せず接続します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
