      en: span-tool-7's cache.miss TraceEvent derives TelemetryEvent ev-44, which is written to a LogStream; the occurrence is also recorded as LogRecord lr-88 with matching TraceId and SpanId.
      ja: span-tool-7 の cache.miss TraceEvent から TelemetryEvent ev-44 が派生して LogStream へ書かれ、同発生は同じ TraceId/SpanId の LogRecord lr-88 にも記録されます。
