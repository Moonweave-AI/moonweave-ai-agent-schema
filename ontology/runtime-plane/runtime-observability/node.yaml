source_claims:
  - id: claim-runtime-observability-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry supplies the normative trace, span, context, event, link, attribute, and status structure, while LangGraph supplies persisted state and replay semantics; Moonweave joins them only through explicit observation and recovery relations.
    locator: Overview > OpenTelemetry Client Architecture > signals and context propagation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-002
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model separates LogRecord identity and observed time from optional trace correlation fields; Moonweave therefore keeps streams, sinks, and exports in logging while referencing trace records explicitly.
    locator: Logs Data Model > Events and Log and Event Record Definition
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-003
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry assigns events, attributes, status, and causal context to spans. Moonweave uses these distinctions to own TraceSpan, TraceEvent, and TraceRecord as observation identities rather than execution, logging, or session identities.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-004
    source: eng-fw-openai-tracing
    supports: OpenAI Agents tracing wraps agent runs, generations, tool calls, handoffs, and guardrails in traces and spans; Moonweave therefore models observation of an execution without redefining the underlying run, attempt, or session as a span.
    locator: Tracing > Traces and spans, Default tracing, Sensitive data, and custom processors
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-005
    source: eng-fw-langgraph-persistence
    supports: LangGraph persists StateSnapshot checkpoints per thread, exposes state history, and replays or forks from a chosen checkpoint; Moonweave therefore distinguishes checkpoint-state evidence from the session lifecycle that references it.
    locator: Persistence > Checkpoints, StateSnapshot fields, state history, Replay, and fault tolerance
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-006
    source: eng-state-xstate-docs
    supports: XState distinguishes declared event types from concrete event objects received by actors. Moonweave uses this premise to separate adapter mapping metadata from runtime occurrence records.
    locator: XState v5 > Events and transitions > Event objects
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-observability-007
    source: eng-fw-openai-guardrails
    supports: OpenAI guardrails expose explicit approval, blocking, and output-check results. Moonweave keeps those control outcomes separate from the observation records that may evidence them.
    locator: Implementing a guardrail > GuardrailFunctionOutput.output_info; Tool guardrails > output checks
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-observability-008
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes access requests, policy decisions, enforcement points, monitoring, and termination. Moonweave uses that separation to keep network-call identity and access-control decisions outside observability while retaining their trace evidence here.
    locator: NIST SP 800-207 §§2.1-2.2 and 3.2
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-009
    source: eng-std-opentelemetry-trace-api
    supports: The OpenTelemetry Trace API defines parent SpanContext, span events, links, attributes, status, and trace identity; Moonweave's question follows those explicit relations from one RunAttempt-observing span.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-010
    source: eng-fw-langgraph-persistence
    supports: LangGraph defines checkpointed StateSnapshot history, replay from checkpoint_id, and immutable update_state forks; Moonweave's question follows capture, checkpoint, restore, successor snapshot, and diff evidence.
    locator: Persistence > Checkpoints, StateSnapshot fields, state history, Replay, and fault tolerance
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-011
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes a span Event from an Event-formatted LogRecord and gives LogRecords streamable fields and trace context; Moonweave's question checks explicit derivation and recording edges.
    locator: Logs Data Model > Events and Log and Event Record Definition
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-observability-012
    source: eng-std-opentelemetry-spec
    supports: Source eng-std-opentelemetry-spec at Overview > OpenTelemetry Client Architecture > signals and context propagation supports operational notions used to compare runtime-observability with runtime-artifacts, including TraceEvent. The source does not define Moonweave Modules runtime-observability or runtime-artifacts, their class or relation placement, or their ownership split. Under runtime-observability's owns_when "Own an object when its identity is determined by trace, span, or event identity and causal position, or by snapshot, checkpoint, replay, or restore identity; do not own objects identified only by stream position, export batch, execution number, or session lifecycle.", Moonweave applies the disambiguation test "Identity by trace_id, span_id, event_id, and correlation key belongs to observability; identity by artifact_id, version, digest, and generation, use, or derivation lineage belongs to runtime artifacts."; result=owns and owner=runtime-observability are a Moonweave design inference over the registered evidence.
