            zh: 棰嗗煙澶嶆牳纭杈撳叆闈㈡帴鏀惰璺ㄥ害瑙傚療鐨?RunAttempt 涓庢崟鑾锋椿鍔ㄨ鍙栫殑 StateSnapshot锛涜緭鍑洪潰鐢熸垚 TraceRecord銆丆heckpoint銆佹仮澶嶅悗鐨?StateSnapshot/StateDiff 浠ュ強甯﹀叧鑱旈敭鐨?TraceEvent 瑙傚療璁板綍锛涘け璐ラ潰鍙繚瀛?ErrorEvent 璇佹嵁閾炬帴锛屾仮澶嶉潰鍖哄垎鐬椂瑙﹀彂浜嬩欢鍜岄殢鍚庢椿鍔ㄣ€傛棩蹇楁祦涓庡鍑轰粛鐢?feedback-logging 鎷ユ湁銆?            en: Domain review confirms the input facet receives a RunAttempt observed by a span and a StateSnapshot read by capture. Outputs include TraceRecord, Checkpoint, restored StateSnapshot and StateDiff, and correlation-keyed TraceEvent observations. Failure retains only the ErrorEvent evidence link, while recovery separates instantaneous trigger events from ensuing activities. Log streams and export remain owned by feedback-logging.
