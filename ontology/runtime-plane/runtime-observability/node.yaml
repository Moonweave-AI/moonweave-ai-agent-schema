  key_notion:
    zh: 运行观测证据
    en: runtime observation evidence
    ja: 実行観測証拠
  owns_when:
    zh: 当对象必须依赖 trace/span/event 标识及因果位置，或依赖状态版本、checkpoint 身份及 capture/restore/replay 发生才能唯一识别时，由本模块定义。
    en: This module defines an object when unique identity depends on trace/span/event identity and causal position, or on a state revision, checkpoint identity, or capture/restore/replay occurrence.
    ja: trace/span/event の識別子と因果位置、または状態 revision・checkpoint identity・capture/restore/replay occurrence が一意識別に必須なら本モジュールで定義します。
  references_when:
    zh: 日志、诊断、评估、执行和会话模块在需要证据链或恢复起点时引用这里的记录；不得把流位置、严重级别、评估分数或会话状态写回为追踪层级。
    en: Logging, diagnosis, evaluation, execution, and session modules reference these records for evidence lineage or recovery points; stream position, severity, evaluation score, and session state must not be recast as trace hierarchy.
    ja: logging・diagnosis・evaluation・execution・session は証拠系譜または回復点が必要な時に本記録を参照し、stream position・severity・evaluation score・session state を trace 階層へ書き換えません。
  boundary_decisions:
    - other_module_id: runtime-artifacts
      subject_concept_ids:
        - TraceEvent
      decision: owns
      owner_module_id: runtime-observability
      rationale:
        zh: 运行追踪拥有 TraceEvent 及其对生成产物的有键记录事实；运行产物拥有精确 Artifact 版本与真实生成活动谱系。记录事件不是生产者。
        en: Runtime observability owns TraceEvent and its keyed recording fact about a generated artifact; runtime artifacts own the exact Artifact revision and true generating-activity lineage. The event is not the producer.
        ja: runtime observability は TraceEvent と keyed recording fact、runtime artifacts は正確な Artifact revision と generating-activity lineage を所有し、event は producer ではありません。
      relation_ids:
        - TraceEvent-records_generated_artifact-Artifact
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-observability-012
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: TraceEvent 及其源端点记录事实由运行追踪拥有。
              en: TraceEvent and its source-endpoint recording fact are owned by runtime observability.
              ja: TraceEvent と source-endpoint recording fact は runtime observability が所有します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 记录事件不是产物生成者。
              en: A recording event is not the artifact producer.
              ja: recording event は artifact producer ではありません。
    - other_module_id: runtime-artifacts
      subject_concept_ids:
        - Artifact
      decision: references
      owner_module_id: runtime-artifacts
      rationale:
        zh: 运行追踪引用运行产物拥有的精确 Artifact 版本；记录事实不转移 Artifact 身份、生成谱系或所有权。
        en: Runtime observability references the exact Artifact revision owned by runtime artifacts; recording transfers neither artifact identity, generation lineage, nor ownership.
        ja: runtime observability は runtime artifacts 所有の正確な Artifact revision を参照し、recording は identity・generation lineage・ownership を移しません。
      relation_ids:
        - TraceEvent-records_generated_artifact-Artifact
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-observability-013
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: Artifact 由运行产物拥有。
              en: Artifact is owned by runtime artifacts.
              ja: Artifact は runtime artifacts が所有します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行追踪只引用精确产物版本。
              en: Runtime observability only references the exact artifact revision.
              ja: runtime observability は正確な artifact revision だけを参照します。
    - other_module_id: safety-trust-boundary
      subject_concept_ids:
        - TraceEvent
      decision: owns
