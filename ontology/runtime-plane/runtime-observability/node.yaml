  - id: runtime-observability-cq-trace-versus-log-v3-example-counter
    kind: counterexample
    labels:
      zh: 一个对象是原始 TraceEvent、记录该事件的 LogRecord，还是将其导出的 TraceExport？：反例
      en: "Is an object an original TraceEvent, a LogRecord recording it, or a TraceExport exporting it?: counterexample"
      ja: 対象は元の TraceEvent、それを記録する LogRecord、それを出力する TraceExport のどれですか。：反例
