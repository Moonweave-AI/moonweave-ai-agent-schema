schema: moonweave.ai/ontology-node/v1
id: runtime-observability
kind: module
labels:
  zh: 运行追踪、状态与恢复
  en: Runtime tracing, state, and recovery
  ja: 実行トレース・状態・回復
semantics:
  short_definition:
    zh: 可观测性模块记录运行中被观测到的 trace、span、事件与状态快照，以及检查点如何被捕获、恢复或回放。
    en: The observability module records traces, spans, events, and state snapshots observed during runs, and how checkpoints are captured, restored, or replayed.
    ja: observability モジュールは実行中に観測された trace・span・event・状態 snapshot と、checkpoint の capture・restore・replay を記録します。
  definition:
    zh: 本模块拥有 ObservabilityRecord（TraceRecord、TraceSpan、TraceContext、TraceLink、StateRecord、StateSnapshot、StateDiff、Checkpoint、AuditRecord、ObservableSummary、AgentTranscript 等可查询观测信息）、ObservabilityEvent（TraceEvent、TelemetryEvent、ReplayEvent、CheckpointRestoreEvent 等时点发生）与 CheckpointLifecycleActivity（CheckpointCaptureActivity、RestoreActivity、ReplayActivity）。它记录“观察到了什么”，不替代被观察的 Execution、RunAttempt 或诊断结论。OpenTelemetry OTLP export、LangSmith run tree、Datadog APM span 与 Weights & Biases run 均可映射为本模块 occurrence 形状。
    en: "This module owns ObservabilityRecord (queryable observations including TraceRecord, TraceSpan, TraceContext, TraceLink, StateRecord, StateSnapshot, StateDiff, Checkpoint, AuditRecord, ObservableSummary, AgentTranscript), ObservabilityEvent (point-in-time occurrences such as TraceEvent, TelemetryEvent, ReplayEvent, CheckpointRestoreEvent), and CheckpointLifecycleActivity (CheckpointCaptureActivity, RestoreActivity, ReplayActivity). It records what was observed without replacing the observed Execution, RunAttempt, or diagnostic conclusion. OpenTelemetry OTLP export, LangSmith run trees, Datadog APM spans, and Weights & Biases runs are mappable observability shapes."
    ja: 本モジュールは ObservabilityRecord（TraceRecord・TraceSpan・StateSnapshot・Checkpoint 等）、ObservabilityEvent（TraceEvent・TelemetryEvent 等）、CheckpointLifecycleActivity を所有します。観測内容を記録し Execution/RunAttempt/診断結論を置き換えません。OpenTelemetry OTLP、LangSmith run tree、Datadog APM span、Weights & Biases run を写像可能です。
  why_needed:
    zh: 没有这一模块，工程师无法沿 trace 因果链定位一次运行如何展开，也无法沿 checkpoint 确认从哪份确切快照恢复，Streaming 片段与最终结果会被混为一谈。
    en: Without this module, engineers cannot follow trace causality to see how a run unfolded or identify the exact checkpoint snapshot for recovery, and streaming fragments get conflated with final outcomes.
    ja: このモジュールがなければ trace 因果で実行展開を追えず、どの checkpoint snapshot から復元するか特定できず、ストリーミング断片と最終結果が混同されます。
  includes:
    - zh: TraceRecord、TraceSpan、TraceContext、TraceLink 及其父链、时间戳与 correlation key。
      en: TraceRecord, TraceSpan, TraceContext, TraceLink, and their parentage, timestamps, and correlation keys.
      ja: TraceRecord・TraceSpan・TraceContext・TraceLink と親子関係・タイムスタンプ・correlation key。
    - zh: StateRecord、StateSnapshot、StateDiff、Checkpoint 及 CheckpointLifecycleActivity（capture、restore、replay）。
      en: StateRecord, StateSnapshot, StateDiff, Checkpoint, and CheckpointLifecycleActivity for capture, restore, and replay.
      ja: StateRecord・StateSnapshot・StateDiff・Checkpoint と capture/restore/replay の CheckpointLifecycleActivity。
    - zh: TraceRetentionPolicy 等仅直接决定采样或捕获范围的观测策略。
      en: TraceRetentionPolicy and other policies that directly determine sampling or capture scope.
      ja: サンプリング/capture scope を直接決める TraceRetentionPolicy 等。
  excludes:
    - zh: "RunAttempt、Execution、RuntimeSession（owner: runtime-execution-attempts、runtime-system）；它们是被观测事实，不是 TraceSpan 子类。"
      en: "RunAttempt, Execution, RuntimeSession (owner: runtime-execution-attempts, runtime-system); observed facts, not TraceSpan subtypes."
      ja: "RunAttempt・Execution・RuntimeSession（owner: runtime-execution-attempts・runtime-system）。観測対象 fact で TraceSpan subtype ではありません。"
    - zh: "LogRecord、LogStream、TelemetryExportActivity 运输层（owner: 日志/导出边界）；不重建 span 身份。"
      en: "LogRecord, LogStream, TelemetryExportActivity transport layers (owner: logging/export boundaries); they do not rebuild span identity."
      ja: "LogRecord・LogStream・TelemetryExportActivity 輸送層。span identity を再構築しません。"
    - zh: "ErrorEvent、ReviewFinding、EvaluationRun（owner: feedback-plane）；它们解释观测，不属于原始 trace。"
      en: "ErrorEvent, ReviewFinding, EvaluationRun (owner: feedback-plane); they interpret observations and are not raw traces."
      ja: "ErrorEvent・ReviewFinding・EvaluationRun（owner: feedback-plane）。観測の解釈であり raw trace ではありません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenTelemetry OTLP trace/span export（traceId、spanId、resourceSpans、parentSpanId、status code）、LangSmith run tree（parent_run_id、run_type、child_runs 层级与 metadata）、Datadog APM span（trace_id、span_id、service、resource.name、parent_id）与 Weights & Biases run（run.id、summary metrics、logged artifacts 作为 ObservableSummary）。静态 instrumentation 配置属于其他域；OTLP POST、LangSmith trace ingest、Datadog span ingest 与 W&B wandb.init/run.log 触发的 TraceSpan 与 TraceEvent occurrence 才属于本模块。
    en: "Integrations should map OpenTelemetry OTLP trace/span export (traceId, spanId, resourceSpans, parentSpanId, status code), LangSmith run trees (parent_run_id, run_type, child_runs hierarchy and metadata), Datadog APM spans (trace_id, span_id, service, resource.name, parent_id), and Weights & Biases runs (run.id, summary metrics, logged artifacts as ObservableSummary) separately. Static instrumentation config belongs elsewhere; TraceSpan and TraceEvent occurrences triggered by OTLP POST, LangSmith trace ingest, Datadog span ingest, and wandb.init/run.log belong here."
    ja: 統合では OpenTelemetry OTLP trace/span export、LangSmith run tree、Datadog APM span、Weights & Biases run を個別に写像します。静的 instrumentation 設定は他ドメイン、OTLP POST・LangSmith ingest・Datadog span ingest・wandb.init/run.log で触発される TraceSpan/TraceEvent occurrence が本モジュールです。
  typical_input:
    - description: OpenTelemetry OTLP trace export with parent-linked spans.
      format: |
        POST https://otel-collector.example.com/v1/traces
        {
          "resourceSpans": [{
            "resource": {"attributes": [{"key":"service.name","value":{"stringValue":"agent-runtime"}}]},
            "scopeSpans": [{
              "spans": [{
                "traceId": "4bf92f3577b34da6a3ce929d0e0e4736",
                "spanId": "00f067aa0ba902b7",
                "parentSpanId": "051581bf3cb55c13",
                "name": "langgraph.run",
                "startTimeUnixNano": "1720000000000000000",
                "endTimeUnixNano": "1720000005000000000",
                "status": {"code": "STATUS_CODE_OK"}
              }]
            }]
          }]
        }
      source_claims: [claim-runtime-observability-otel]
    - description: LangSmith run tree with nested child runs.
      format: |
        POST https://api.smith.langchain.com/runs
        {
          "id": "run-root-44",
          "name": "support-agent",
          "run_type": "chain",
          "parent_run_id": null,
          "child_runs": [
            {"id": "run-child-61", "name": "tool_call", "run_type": "tool", "parent_run_id": "run-root-44"}
          ]
        }
      source_claims: [claim-runtime-observability-langsmith]
    - description: Datadog APM span with service and resource metadata.
      format: |
        POST https://trace.agent.datadoghq.com/api/v0.2/traces
        [[{
          "trace_id": 123456789,
          "span_id": 987654321,
          "parent_id": 111222333,
          "name": "agent.invoke",
          "service": "moonweave-agent",
          "resource": "POST /threads/{id}/runs",
          "duration": 500000000,
          "meta": {"http.status_code": "200"}
        }]]
      source_claims: [claim-runtime-observability-datadog]
    - description: Weights & Biases run logging metrics and artifacts.
      format: |
        import wandb
        run = wandb.init(project="agent-eval", name="run-330")
        run.log({"latency_ms": 842, "tokens_out": 1204})
        run.log({"artifact": "report-release@2"})
        run.finish()
      source_claims: [claim-runtime-observability-wandb]
  typical_output:
    - description: Moonweave-local observability projection linking trace, span, checkpoint, and observed run attempt without replacing execution facts.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "trace_id": "4bf92f3577b34da6a3ce929d0e0e4736",
          "trace_span_id": "trace-span-61",
          "run_attempt_ref": "attempt-7",
          "checkpoint_id": "checkpoint-330-1",
          "trace_event_ids": ["event-artifact-44-1"]
        }
      source_claims: [claim-runtime-observability-design]
  reference_implementations:
    - name: OpenTelemetry Protocol
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: OTLP trace and span export with traceId, spanId, and parent links.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees with parent_run_id and nested child runs.
    - name: Datadog APM
      url: https://docs.datadoghq.com/tracing/
      description: Distributed trace spans with service, resource, and parent_id.
    - name: Weights & Biases
      url: https://docs.wandb.ai/
      description: Experiment runs with logged metrics and artifact references.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 运行可观测性模块的稳定标识，不是某个 traceId 或 spanId。
        en: Stable identifier of the runtime-observability module, not a traceId or spanId.
        ja: runtime-observability モジュールの安定識別子であり、traceId/spanId ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^runtime-observability$'
      example_value: runtime-observability
      allowed_values: []
      source_claims: [claim-runtime-observability-design]
    - id: trace_id
      labels: {zh: 追踪 ID, en: Trace identifier, ja: トレース ID}
      definitions:
        zh: OpenTelemetry 或兼容系统中的 traceId，用于关联 span、metric 与外部导出记录。
        en: traceId in OpenTelemetry or compatible systems linking spans, metrics, and external export records.
        ja: OpenTelemetry 等の traceId。span・metric・外部 export 記録を関連付けます。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[0-9a-f]{32}$'
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      allowed_values: []
      source_claims: [claim-runtime-observability-otel]
    - id: span_id
      labels: {zh: 跨度 ID, en: Span identifier, ja: スパン ID}
      definitions:
        zh: trace 内某次可观测操作的 spanId；必须与 trace_id 联用才能唯一定位一段运行证据。
        en: spanId of one observable operation within a trace; must pair with trace_id to uniquely locate a runtime evidence segment.
        ja: trace 内の観測操作 spanId。trace_id と組み合わせて初めて runtime 証拠区間を一意特定できます。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[0-9a-f]{16}$'
      example_value: 00f067aa0ba902b7
      allowed_values: []
      source_claims: [claim-runtime-observability-otel, claim-runtime-observability-datadog]
    - id: checkpoint_id
      labels: {zh: 检查点 ID, en: Checkpoint identifier, ja: チェックポイント ID}
      definitions:
        zh: 标识一份可恢复状态边界的 Checkpoint，通常来自 LangGraph checkpoint_id 或本地 StateSnapshot 键。
        en: Identifies a Checkpoint recoverable state boundary, typically from LangGraph checkpoint_id or a local StateSnapshot key.
        ja: LangGraph checkpoint_id や local StateSnapshot key 等、回復可能状態境界を識別する Checkpoint。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: checkpoint-330-1
      allowed_values: []
      source_claims: [claim-runtime-observability-design]
  constraints:
    - id: observability-observes-not-replaces-execution
      severity: error
      expression_language: plain
      expression: TraceSpan and TraceEvent must observe RunAttempt or Execution through explicit relations; they must not be promoted to Execution or RunAttempt subtypes or substitute terminal state adjudication.
      explanation:
        zh: 观测记录不能代替被观测的执行事实或终态判定。
        en: Observation records cannot replace observed execution facts or terminal adjudication.
        ja: 観測記録は観測対象の実行 fact や terminal 判定を代替できません。
      source_claims: [claim-runtime-observability-design]
    - id: trace-event-requires-correlation-keys
      severity: warning
      expression_language: plain
      expression: TraceEvent recording generated Artifact or BoundaryCrossing must include verifiable correlation keys such as artifact_id, version, content_digest, or crossing_id; filename mentions alone are insufficient.
      explanation:
        zh: 文件名不能替代带键的观测记录。
        en: Filenames cannot replace keyed observation records.
        ja: ファイル名だけでは keyed observation record を代替できません。
      source_claims: [claim-runtime-observability-design]
    - id: checkpoint-restore-links-prior-state
      severity: error
      expression_language: plain
      expression: RestoreActivity must reference the exact Checkpoint and create explicit lineage to the RunAttempt or Execution it resumes; ad-hoc state reload without checkpoint identity is insufficient.
      explanation:
        zh: 恢复必须指向确切 checkpoint，不能凭猜测加载状态。
        en: Recovery must point to an exact checkpoint, not ad-hoc state reload.
        ja: 復元は exact checkpoint を指し、推測による state reload では不十分です。
      source_claims: [claim-runtime-observability-design]
  required_relations:
    - id: observability-organizes-observability-record
      direction: outgoing
      predicate: organizes
      target_concept_id: ObservabilityRecord
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 ObservabilityRecord 层级（TraceRecord→TraceSpan 或 StateRecord→Checkpoint）。
        en: The module organizes at least one ObservabilityRecord hierarchy (TraceRecord→TraceSpan or StateRecord→Checkpoint).
        ja: モジュールは少なくとも一つの ObservabilityRecord 階層（TraceRecord→TraceSpan または StateRecord→Checkpoint）を組織します。
      source_claims: [claim-runtime-observability-design]
examples:
  - id: runtime-observability-example-otel-span-tree
    labels:
      zh: OpenTelemetry span 因果树
      en: OpenTelemetry span causality tree
      ja: OpenTelemetry span 因果ツリー
    descriptions:
      zh: OTLP export 中 traceId=4bf92f3577b34da6a3ce929d0e0e4736 含 span root（051581bf3cb55c13）与子 span langgraph.run（00f067aa0ba902b7，STATUS_CODE_OK）。TraceSpan trace-span-61 通过 observes 绑定 attempt-7，TraceContext 携带 W3C traceparent 等价键。
      en: OTLP export with traceId=4bf92f3577b34da6a3ce929d0e0e4736 contains root span 051581bf3cb55c13 and child span langgraph.run 00f067aa0ba902b7 with STATUS_CODE_OK. TraceSpan trace-span-61 observes attempt-7 via an observes relation and TraceContext carries W3C traceparent-equivalent keys.
      ja: traceId=4bf92f3577b34da6a3ce929d0e0e4736 の OTLP export に root span 051581bf3cb55c13 と child span langgraph.run 00f067aa0ba902b7（STATUS_CODE_OK）が含まれます。TraceSpan trace-span-61 が observes で attempt-7 を束縛し TraceContext が W3C traceparent 相当 key を保持します。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
    field_values:
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      root_span_id: 051581bf3cb55c13
      child_span_id: 00f067aa0ba902b7
      span_name: langgraph.run
      status_code: STATUS_CODE_OK
      run_attempt_ref: attempt-7
      trace_span_id: trace-span-61
    related_node_ids:
      - TraceRecord
      - TraceSpan
      - TraceContext
      - RunAttempt
    related_relation_ids:
      - TraceSpan-observes-RunAttempt
      - TraceRecord-contains_span-TraceSpan
      - TraceSpan-has_context-TraceContext
    source_claims:
      - claim-runtime-observability-otel
      - claim-runtime-observability-design
  - id: runtime-observability-example-langsmith-run-tree
    labels:
      zh: LangSmith run tree 嵌套
      en: LangSmith nested run tree
      ja: LangSmith ネスト run tree
    descriptions:
      zh: LangSmith ingest 创建 run-root-44（run_type=chain）与 child run-child-61（run_type=tool, parent_run_id=run-root-44）。映射为 TraceRecord trace-44 含 TraceSpan span-agent-7 与 span-tool-61；TraceEvent event-artifact-44-1 以 artifact_id/version/digest 键记录 report@2 生成观测。
      en: LangSmith ingest creates run-root-44 (run_type=chain) and child run-child-61 (run_type=tool, parent_run_id=run-root-44). Mapped to TraceRecord trace-44 containing TraceSpan span-agent-7 and span-tool-61; TraceEvent event-artifact-44-1 records report@2 generation observation with artifact_id, version, and digest keys.
      ja: LangSmith ingest が run-root-44（run_type=chain）と child run-child-61（run_type=tool, parent_run_id=run-root-44）を作成。TraceRecord trace-44 に TraceSpan span-agent-7/span-tool-61 を写像し TraceEvent event-artifact-44-1 が artifact_id/version/digest key で report@2 生成観測を記録します。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com/
    field_values:
      root_run_id: run-root-44
      child_run_id: run-child-61
      parent_run_id: run-root-44
      trace_id: trace-44
      artifact_id: report
      artifact_version: "2"
      content_digest: sha256:report-2
      trace_event_id: event-artifact-44-1
    related_node_ids:
      - TraceRecord
      - TraceSpan
      - TraceEvent
      - Artifact
    related_relation_ids:
      - TraceRecord-contains_span-TraceSpan
      - TraceSpan-has_parent-TraceSpan
      - TraceEvent-records_generated_artifact-Artifact
    source_claims:
      - claim-runtime-observability-langsmith
      - claim-runtime-observability-design
  - id: runtime-observability-example-datadog-apm-span
    labels:
      zh: Datadog APM 分布式 span
      en: Datadog APM distributed span
      ja: Datadog APM 分散 span
    descriptions:
      zh: Datadog agent 接收 trace_id=123456789、span_id=987654321、parent_id=111222333，service=moonweave-agent，resource=POST /threads/{id}/runs。TraceSpan trace-span-62 绑定 execution-cursor-042，meta.http.status_code=200 写入 ObservableSummary。
      en: Datadog agent receives trace_id=123456789, span_id=987654321, parent_id=111222333, service=moonweave-agent, resource=POST /threads/{id}/runs. TraceSpan trace-span-62 binds execution-cursor-042 and meta.http.status_code=200 is written to ObservableSummary.
      ja: Datadog agent が trace_id=123456789、span_id=987654321、parent_id=111222333、service=moonweave-agent、resource=POST /threads/{id}/runs を受信。TraceSpan trace-span-62 が execution-cursor-042 を束縛し meta.http.status_code=200 を ObservableSummary に記録します。
    example_source:
      product: Datadog APM
      url: https://docs.datadoghq.com/tracing/
    field_values:
      trace_id: "123456789"
      span_id: "987654321"
      parent_id: "111222333"
      service: moonweave-agent
      resource: POST /threads/{id}/runs
      http_status_code: 200
      execution_ref: execution-cursor-042
      trace_span_id: trace-span-62
    related_node_ids:
      - TraceSpan
      - ObservableSummary
      - Execution
    related_relation_ids:
      - TraceSpan-observes-RunAttempt
    source_claims:
      - claim-runtime-observability-datadog
      - claim-runtime-observability-design
  - id: runtime-observability-example-wandb-run-metrics
    labels:
      zh: Weights & Biases run 指标
      en: Weights & Biases run metrics
      ja: Weights & Biases run メトリクス
    descriptions:
      zh: wandb.init(project=agent-eval, name=run-330) 记录 latency_ms=842、tokens_out=1204，并 log artifact report-release@2。ObservableSummary obs-run-330 绑定 attempt-330-a；W&B run 不替代 RunAttempt 终态，只提供观测摘要。
      en: wandb.init(project=agent-eval, name=run-330) logs latency_ms=842, tokens_out=1204, and artifact report-release@2. ObservableSummary obs-run-330 binds attempt-330-a; the W&B run does not replace RunAttempt terminal state and supplies observation summary only.
      ja: wandb.init(project=agent-eval, name=run-330) が latency_ms=842、tokens_out=1204、artifact report-release@2 を記録。ObservableSummary obs-run-330 が attempt-330-a を束縛し、W&B run は RunAttempt terminal state を代替せず観測 summary のみ提供します。
    example_source:
      product: Weights & Biases
      url: https://docs.wandb.ai/
    field_values:
      wandb_project: agent-eval
      wandb_run_name: run-330
      latency_ms: 842
      tokens_out: 1204
      logged_artifact_ref: report-release@2
      observable_summary_id: obs-run-330
      run_attempt_ref: attempt-330-a
    related_node_ids:
      - ObservableSummary
      - RunAttempt
      - Artifact
    related_relation_ids: []
    source_claims:
      - claim-runtime-observability-wandb
      - claim-runtime-observability-design
  - id: runtime-observability-example-checkpoint-restore
    labels:
      zh: Checkpoint 捕获与恢复
      en: Checkpoint capture and restore
      ja: Checkpoint capture と restore
    descriptions:
      zh: LangGraph run 在 graph 步骤间持久化 checkpoint-330-1（StateSnapshot snap-330-1）。网络中断后 RestoreActivity restore-330-2 引用 checkpoint-330-1 并产生 CheckpointRestoreEvent；新 RunAttempt attempt-2 从该快照恢复，attempt-1 的 TraceSpan 证据保留不变。
      en: LangGraph run persists checkpoint-330-1 (StateSnapshot snap-330-1) between graph steps. After network interruption, RestoreActivity restore-330-2 references checkpoint-330-1 and emits CheckpointRestoreEvent; new RunAttempt attempt-2 resumes from that snapshot while attempt-1 TraceSpan evidence remains unchanged.
      ja: LangGraph run が graph ステップ間で checkpoint-330-1（StateSnapshot snap-330-1）を永続化。network interruption 後 RestoreActivity restore-330-2 が checkpoint-330-1 を参照し CheckpointRestoreEvent を発行。新 RunAttempt attempt-2 がその snapshot から復元され attempt-1 の TraceSpan 証拠は不変です。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
    field_values:
      checkpoint_id: checkpoint-330-1
      state_snapshot_id: snap-330-1
      restore_activity_id: restore-330-2
      prior_attempt_ref: attempt-1
      successor_attempt_ref: attempt-2
      checkpoint_restore_event_id: event-restore-330-2
    related_node_ids:
      - Checkpoint
      - StateSnapshot
      - RestoreActivity
      - CheckpointRestoreEvent
      - RunAttempt
    related_relation_ids:
      - CheckpointLifecycleActivity-restores_from-Checkpoint
    source_claims:
      - claim-runtime-observability-design
parent_relation: null
relations: []
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    publisher: OpenTelemetry
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    version: OTLP traces and spans checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    why_it_matters: traceId, spanId, resourceSpans, parent links, and status codes for TraceRecord and TraceSpan.
