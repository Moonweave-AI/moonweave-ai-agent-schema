            ja: 妲嬮€犲鏌汇伅 TraceSpan-observes-RunAttempt 銇?observer 銇?observed execution 銇犮亼銈掔祼銇躲仺纰鸿獚銇椼伨銇欍€侫rtifact generation銉籅oundaryCrossing 銇搞伄 TraceEvent recording edge 銇畬鍏ㄣ仾 correlation key 銈掕姹傘仐銇俱仚銇?production 銈?authorization 鎰忓懗銈掍笌銇堛伨銇涖倱銆侰heckpointRestoreEvent-triggers-RestoreActivity 銇?ReplayEvent-triggers-ReplayActivity 銇?event 銇?activity 銈掑尯鍒ャ仐銆乧apture銉籸estore銉籸eplay 銇?consumes/produces fact 銇?canonical 鏂瑰悜銈掍繚鎸併仐銇俱仚銆?  taxonomy_contract:
