        en: Which TraceSpan observes a RunAttempt, is the trace structure consistent, and which TraceEvents record a generated Artifact or BoundaryCrossing with verifiable keys?
        ja: RunAttempt をどの TraceSpan が観測し trace structure は整合し、どの TraceEvent が検証可能 key で generated Artifact または BoundaryCrossing を記録しますか。
      query: Start from TraceSpan-observes-RunAttempt, reach its containing TraceRecord, validate parent, event, SpanContext, and Link-to-SpanContext paths, then follow TraceEvent-records_generated_artifact-Artifact and TraceEvent-records-BoundaryCrossing only when their required correlation keys resolve exact target identities.
      expected_assertion: The run attempt is observed by a duration-bearing span; every event belongs to that span, parentage is single-valued, each Link resolves a SpanContext rather than a second parent, and recording edges identify an exact Artifact revision or BoundaryCrossing without treating the event as producer or authority.
