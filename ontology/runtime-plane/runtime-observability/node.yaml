schema: moonweave.ai/ontology-node/v1
id: runtime-observability
kind: module
status: accepted
labels: {zh: 运行时可观测性, en: Runtime observability, ja: ランタイム可観測性}
semantics:
  short_definition: {zh: 描述运行时行为而不取代该行为本身的遥测记录和恢复证据。, en: Telemetry records and recovery evidence describing runtime behavior without replacing the behavior itself., ja: ランタイム動作を記述するが、動作自体を置き換えないテレメトリー記録と復旧証拠。}
  definition: {zh: Runtime observability 包含使执行可检查的记录和事件，包括符合 OpenTelemetry 的追踪、span、span event、面向日志的记录、指标派生摘要、状态快照和检查点生命周期活动。遥测信号是有关 Activity 或 Entity 的证据，不会自动成为它所描述的 Activity 或 Entity。, en: "Runtime observability contains records and events that make an execution inspectable, including OpenTelemetry-aligned traces, spans, span events, log-oriented records, metric-derived summaries, state snapshots, and checkpoint lifecycle activities. A telemetry signal is evidence about an Activity or Entity, not automatically the Activity or Entity it describes.", ja: Runtime observability には、OpenTelemetry 準拠のトレース、Span、Span Event、ログ指向記録、メトリック由来要約、状態スナップショット、チェックポイントライフサイクル活動など、実行を検査可能にする記録とイベントが含まれる。テレメトリーシグナルは Activity または Entity に関する証拠であり、記述する Activity や Entity 自体になるわけではない。}
  why_needed: {zh: 仅凭文本日志或聚合仪表板无法可靠调查失败、延迟和状态转换。明确的信号边界保留因果关系，并防止把追踪或计数器误当作业务操作。, en: "Failures, latency, and state transitions cannot be investigated reliably from prose logs or aggregate dashboards alone. Explicit signal boundaries preserve causality and prevent a trace or counter from being mistaken for the business operation.", ja: 失敗、レイテンシー、状態遷移は、文章ログや集約ダッシュボードだけからは信頼して調査できない。明示的なシグナル境界は因果を保持し、トレースやカウンターを業務操作と誤認することを防ぐ。}
  includes:
    - {zh: 追踪记录、span、span context、链接、类日志审计记录、转录和摘要。, en: "Trace records, spans, span context, links, log-like audit records, transcripts, and summaries.", ja: トレース記録、Span、Span context、リンク、ログ風監査記録、転記、要約。}
    - {zh: 状态记录、检查点捕获、恢复、重放活动以及描述这些转换的事件。, en: "State records, checkpoint capture, restore, replay activities, and events describing those transitions.", ja: 状態記録、チェックポイントキャプチャ、復元、リプレイ Activity、およびそれらの遷移を記述するイベント。}
  excludes:
    - {zh: 主要执行 Activity、模型资产、工件字节或持久跨会话记忆对象。, en: "The primary execution Activity, model asset, artifact bytes, or durable cross-session memory object.", ja: 主たる実行 Activity、モデル資産、成果物バイト、耐久的なセッション横断メモリオブジェクト。}
    - {zh: 将每个应用事件都视为 OpenTelemetry Event，或将每个摘要都视为 OpenTelemetry Metric。, en: Treating every application event as an OpenTelemetry Event or every summary as an OpenTelemetry Metric., ja: すべてのアプリケーションイベントを OpenTelemetry Event、すべての要約を OpenTelemetry Metric として扱うこと。}
  semantic_kind: null
  aliases: [telemetry, traces, runtime evidence]
