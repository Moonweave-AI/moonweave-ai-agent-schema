module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入是被跨度观察的运行尝试，以及被捕获活动读取的当前状态快照。
          en: Inputs are a run attempt observed by a span and a current state snapshot read by checkpoint capture.
          ja: 入力は Span が観測する RunAttempt と checkpoint capture が読む現在 StateSnapshot です。
        family_concept_ids:
          - RunAttempt
          - StateSnapshot
        relation_ids:
          - TraceSpan-observes-RunAttempt
          - CheckpointCaptureActivity-captures-StateSnapshot
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出包括组成完整追踪的跨度集合、捕获活动创建的检查点、恢复后的新快照与前后差异，以及 TraceEvent 对精确 Artifact 生成和 BoundaryCrossing 的有键观测记录；记录事件既不是产物生产者，也不授权边界跨越。
          en: Outputs include the span set composing a trace, the checkpoint created by capture, the successor snapshot and before-after diff produced by restore, and keyed TraceEvent observations of exact Artifact generation and BoundaryCrossing; the recording event is neither the artifact producer nor boundary authority.
          ja: 出力は trace を構成する Span 集合、capture が作る Checkpoint、restore 後の successor snapshot と前後差分、および正確な Artifact generation と BoundaryCrossing に対する keyed TraceEvent observation です。recording event は artifact producer でも boundary authority でもありません。
        family_concept_ids:
          - TraceRecord
          - Artifact
          - BoundaryCrossing
          - Checkpoint
          - StateSnapshot
          - StateDiff
        relation_ids:
          - TraceRecord-contains_span-TraceSpan
          - TraceEvent-records_generated_artifact-Artifact
          - TraceEvent-records-BoundaryCrossing
          - CheckpointCaptureActivity-produces-Checkpoint
          - RestoreActivity-produces-StateSnapshot
          - RestoreActivity-produces-StateDiff
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 失败面保留 span 内 TraceEvent 对 ErrorEvent 的原始证据关联，不在此决定错误分类与处置。
          en: The failure facet retains the evidence link from a span TraceEvent to ErrorEvent without deciding error classification or remediation here.
          ja: failure 面は Span 内 TraceEvent から ErrorEvent への証拠関係を保持し、error 分類や remediation はここで決めません。
        family_concept_ids:
          - TraceEvent
          - ErrorEvent
        relation_ids:
          - trace_event_records_error_event
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 恢复面把瞬时恢复或回放触发与随后执行的 RestoreActivity、ReplayActivity 分开记录。
          en: The recovery facet records instantaneous restore or replay triggers separately from the ensuing RestoreActivity and ReplayActivity.
          ja: recovery 面は瞬時の restore/replay trigger と後続 RestoreActivity・ReplayActivity を分離して記録します。
        family_concept_ids:
          - CheckpointRestoreEvent
          - RestoreActivity
          - ReplayActivity
        relation_ids:
          - CheckpointRestoreEvent-triggers-RestoreActivity
          - ReplayEvent-triggers-ReplayActivity
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认输入面接收被跨度观察的 RunAttempt 与捕获活动读取的 StateSnapshot；输出面生成 TraceRecord、Checkpoint、恢复后的 StateSnapshot/StateDiff 以及带关联键的 TraceEvent 观察记录；失败面只保存 ErrorEvent 证据链接，恢复面区分瞬时触发事件和随后活动。日志流与导出仍由 feedback-logging 拥有。
            en: Domain review confirms the input facet receives a RunAttempt observed by a span and a StateSnapshot read by capture. Outputs include TraceRecord, Checkpoint, restored StateSnapshot and StateDiff, and correlation-keyed TraceEvent observations. Failure retains only the ErrorEvent evidence link, while recovery separates instantaneous trigger events from ensuing activities. Log streams and export remain owned by feedback-logging.
            ja: domain review は input facet が span に観測される RunAttempt と capture が読む StateSnapshot を受け、output が TraceRecord・Checkpoint・復元後 StateSnapshot/StateDiff・correlation key 付き TraceEvent observation を生成すると確認します。failure は ErrorEvent evidence link だけを保持し、recovery は瞬時 trigger event と後続 activity を分離します。log stream・export は feedback-logging が所有します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 结构复核确认 TraceSpan-observes-RunAttempt 只连接观测者与被观测执行；TraceEvent 对 Artifact 生成和 BoundaryCrossing 的记录边要求完整关联键，但不赋予生产或授权语义。CheckpointRestoreEvent-triggers-RestoreActivity 与 ReplayEvent-triggers-ReplayActivity 区分事件和活动，捕获、恢复、回放的 consumes/produces 事实保持 canonical 方向。
            en: Structural review confirms TraceSpan-observes-RunAttempt only links observer and observed execution. TraceEvent recording edges for Artifact generation and BoundaryCrossing require complete correlation keys but confer neither production nor authorization semantics. CheckpointRestoreEvent-triggers-RestoreActivity and ReplayEvent-triggers-ReplayActivity distinguish events from activities, while capture, restore, and replay consumes/produces facts retain canonical direction.
            ja: 構造審査は TraceSpan-observes-RunAttempt が observer と observed execution だけを結ぶと確認します。Artifact generation・BoundaryCrossing への TraceEvent recording edge は完全な correlation key を要求しますが production や authorization 意味を与えません。CheckpointRestoreEvent-triggers-RestoreActivity と ReplayEvent-triggers-ReplayActivity は event と activity を区別し、capture・restore・replay の consumes/produces fact は canonical 方向を保持します。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ObservabilityRecord
    allowed_backbone_predicates:
      - has_context
      - has_link
      - is_a
    flat_root_exception_concept_ids:
      - CheckpointLifecycleActivity
      - ObservabilityEvent
      - TraceRetentionPolicy
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认本模块拥有运行追踪、跨度上下文与链接、可观测事件、状态记录以及检查点捕获/恢复/回放活动；feedback-logging 拥有日志流、订阅、消费和导出。TraceRetentionPolicy 只规定已记录追踪的采样、脱敏、导出与保留边界，不等同于 TraceRecord，也不拥有日志传输。
            en: Domain review confirms this module owns runtime traces, span contexts and links, observability events, state records, and checkpoint capture, restore, and replay activities; feedback-logging owns log streams, subscriptions, consumption, and export. TraceRetentionPolicy governs sampling, redaction, export, and retention boundaries for recorded traces without becoming a TraceRecord or owning log transport.
            ja: domain review は本 module が runtime trace・span context/link・observability event・state record・checkpoint capture/restore/replay activity を所有し、feedback-logging が log stream・subscription・consumption・export を所有すると確認します。TraceRetentionPolicy は記録済み trace の sampling・redaction・export・retention 境界を規定しますが TraceRecord ではなく log transport も所有しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 结构复核把 ObservabilityRecord、ObservabilityEvent、CheckpointLifecycleActivity 与 TraceRetentionPolicy 分为记录、发生、活动和规范四条身份轴。各轴内部通过真实 is_a 展开；TraceSpan 通过 has_context 和 has_link 构成跨度内部拓扑。documents、manages 与 governs 均保持 cross-link，不能把事件、活动或规范塞入记录分类树。
            en: Structural review separates ObservabilityRecord, ObservabilityEvent, CheckpointLifecycleActivity, and TraceRetentionPolicy into record, occurrence, activity, and specification identity axes. Each axis expands through genuine is_a, while TraceSpan composes its internal topology through has_context and has_link. documents, manages, and governs remain cross-links and cannot insert an event, activity, or specification into the record taxonomy.
            ja: 構造審査は ObservabilityRecord・ObservabilityEvent・CheckpointLifecycleActivity・TraceRetentionPolicy を record・occurrence・activity・specification の identity axis に分離します。各 axis は真正な is_a で展開し、TraceSpan は has_context・has_link で内部 topology を構成します。documents・manages・governs は cross-link に留め、event・activity・specification を record taxonomy に混在させません。
