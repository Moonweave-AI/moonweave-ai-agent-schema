schema: moonweave.ai/ontology-node/v1
id: runtime-observability
kind: module
status: accepted
labels: {zh: 运行时可观测性, en: Runtime observability, ja: ランタイム可観測性}
semantics:
  short_definition: {zh: 描述运行时行为而不取代该行为本身的遥测记录和恢复证据。, en: Telemetry records and recovery evidence describing runtime behavior without replacing the behavior itself., ja: ランタイム動作を記述するが、動作自体を置き換えないテレメトリー記録と復旧証拠。}
  definition: {zh: Runtime observability 包含使执行可检查的记录和事件，包括符合 OpenTelemetry 的追踪、span、span event、面向日志的记录、指标派生摘要、状态快照和检查点生命周期活动。遥测信号是有关 Activity 或 Entity 的证据，不会自动成为它所描述的 Activity 或 Entity。, en: "Runtime observability contains records and events that make an execution inspectable, including OpenTelemetry-aligned traces, spans, span events, log-oriented records, metric-derived summaries, state snapshots, and checkpoint lifecycle activities. A telemetry signal is evidence about an Activity or Entity, not automatically the Activity or Entity it describes.", ja: Runtime observability には、OpenTelemetry 準拠のトレース、Span、Span Event、ログ指向記録、メトリック由来要約、状態スナップショット、チェックポイントライフサイクル活動など、実行を検査可能にする記録とイベントが含まれる。テレメトリーシグナルは Activity または Entity に関する証拠であり、記述する Activity や Entity 自体になるわけではない。}
  why_needed: {zh: 仅凭文本日志或聚合仪表板无法可靠调查失败、延迟和状态转换。明确的信号边界保留因果关系，并防止把追踪或计数器误当作业务操作。, en: "Failures, latency, and state transitions cannot be investigated reliably from prose logs or aggregate dashboards alone. Explicit signal boundaries preserve causality and prevent a trace or counter from being mistaken for the business operation.", ja: 失敗、レイテンシー、状態遷移は、文章ログや集約ダッシュボードだけからは信頼して調査できない。明示的なシグナル境界は因果を保持し、トレースやカウンターを業務操作と誤認することを防ぐ。}
  includes:
    - {zh: 追踪记录、span、span context、链接、类日志审计记录、转录和摘要。, en: "Trace records, spans, span context, links, log-like audit records, transcripts, and summaries.", ja: トレース記録、Span、Span context、リンク、ログ風監査記録、転記、要約。}
    - {zh: 状态记录、检查点捕获、恢复、重放活动以及描述这些转换的事件。, en: "State records, checkpoint capture, restore, replay activities, and events describing those transitions.", ja: 状態記録、チェックポイントキャプチャ、復元、リプレイ Activity、およびそれらの遷移を記述するイベント。}
  excludes:
    - {zh: 主要执行 Activity、模型资产、工件字节或持久跨会话记忆对象。, en: "The primary execution Activity, model asset, artifact bytes, or durable cross-session memory object.", ja: 主たる実行 Activity、モデル資産、成果物バイト、耐久的なセッション横断メモリオブジェクト。}
    - {zh: 将每个应用事件都视为 OpenTelemetry Event，或将每个摘要都视为 OpenTelemetry Metric。, en: Treating every application event as an OpenTelemetry Event or every summary as an OpenTelemetry Metric., ja: すべてのアプリケーションイベントを OpenTelemetry Event、すべての要約を OpenTelemetry Metric として扱うこと。}
  semantic_kind: null
  aliases: [telemetry, traces, runtime evidence]
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input: {applicable: true, description: {zh: 关联 ID、时间戳、操作数据、状态引用和已插桩的信号载荷。, en: "Correlation IDs, timestamps, operation data, state references, and instrumented signal payloads.", ja: 相関 ID、時刻、操作データ、状態参照、計装済みシグナルペイロード。}, family_concept_ids: [TraceSpan, StateRecord, ObservabilityEvent], relation_ids: []}
      output: {applicable: true, description: {zh: 带明确类型的可导出追踪、日志、指标、状态或恢复记录。, en: "Exportable trace, log, metric, state, or recovery records with explicit signal type.", ja: 明示的なシグナル型を持つ、エクスポート可能なトレース、ログ、メトリック、状態、復旧記録。}, family_concept_ids: [ObservabilityRecord, ObservabilityEvent], relation_ids: []}
      failure: {applicable: true, description: {zh: 采样、保留、脱敏或导出器失败可能限制证据，但不得重写执行结果。, en: "Sampling, retention, redaction, or exporter failure may limit evidence but must not rewrite an execution outcome.", ja: サンプリング、保持、マスキング、エクスポーター失敗は証拠を制限し得るが、実行結果を書き換えてはならない。}, family_concept_ids: [TraceRetentionPolicy, TraceRecord], relation_ids: []}
      recovery: {applicable: true, description: {zh: 通过检查点活动恢复执行状态；要区分重放证据与原始活动证据。, en: Recover execution state through a checkpoint activity; distinguish replay evidence from original activity evidence., ja: チェックポイント Activity を通じて実行状態を復旧し、リプレイ証拠と元の Activity 証拠を区別する。}, family_concept_ids: [Checkpoint, RestoreActivity, ReplayActivity], relation_ids: []}
  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids: [ObservabilityRecord, ObservabilityEvent, CheckpointLifecycleActivity, TraceRetentionPolicy]
    allowed_backbone_predicates: [is_a, part_of]
    flat_root_exception_concept_ids: [TraceRetentionPolicy]
    not_applicable_reason: null
  key_notion: A telemetry signal identifies a distinct kind of evidence and does not stand in for its subject.
  owns_when: {zh: 主要问题是一次运行如何被观测、关联、保留或恢复。, en: "The primary question is how a run was observed, correlated, retained, or recovered.", ja: 主な問いが、実行がどのように観測、相関、保持、復旧されたかである場合。}
  references_when: {zh: 主要问题是谁行动、发生了什么活动或哪个工件是权威的。, en: "The primary question is who acted, what activity occurred, or which artifact is authoritative.", ja: 主な問いが、誰が行動したか、どの Activity が発生したか、どの成果物が権威的かである場合。}
  boundary_decisions: []
  overlap_checks: []
engineering:
  explanation: {zh: 插桩创建信号专属载荷。tracer 创建 span，每个 span 携带其不可变上下文、事件、链接、状态和时间戳；日志记录和指标数据通过各自的数据模型导出。检查点 API 将执行状态与遥测分开持久化。, en: "Instrumentation creates signal-specific payloads. A tracer creates spans, each span carries its immutable context, events, links, status, and timestamps; log records and metric data are exported through their own data models. Checkpoint APIs persist execution state separately from telemetry.", ja: 計装はシグナル固有のペイロードを作成する。tracer は Span を作成し、各 Span は不変のコンテキスト、イベント、リンク、ステータス、時刻を持つ。ログ記録とメトリックデータはそれぞれのデータモデルでエクスポートされる。チェックポイント API は実行状態をテレメトリーとは別に永続化する。}
  typical_input:
    - description: {zh: Span 开始输入, en: Span start input, ja: Span 開始入力}
      format: |-
        {"name":"agent.tool_call","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","parent_span_id":"00f067aa0ba902b7","attributes":{"tool.name":"read_file"}}
  typical_output:
    - description: {zh: 已结束 span 记录, en: Ended span record, ja: 終了済み Span 記録}
      format: |-
        {"span_id":"b7ad6b7169203331","name":"agent.tool_call","start_time_unix_nano":1784365260000000000,"end_time_unix_nano":1784365260400000000,"status":"OK"}
  reference_implementations:
    - {name: OpenTelemetry Tracing API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Trace, span, context, event, link, and lifecycle data contracts."}
    - {name: OpenAI Agents SDK tracing, url: https://openai.github.io/openai-agents-python/tracing/, description: "Built-in traces and spans around agent flows."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Thread-scoped checkpoints and state history."}
structure:
  identity_keys: [observability_record_id]
  fields:
    - id: observability_record_id
      labels: {zh: 可观测性记录 ID, en: Observability record ID, ja: 可観測性記録 ID}
      definitions: {zh: 一条可观测性证据记录的稳定标识符。, en: Stable identifier for one observability evidence record., ja: 1 件の可観測性証拠記録の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: trace-842
      source_claims: [claim-runtime-observability-signals]
    - id: signal_kind
      labels: {zh: 信号类型, en: Signal kind, ja: シグナル種別}
      definitions: {zh: 区分追踪、状态或领域事件证据的受控类别。, en: Controlled category that distinguishes trace state and domain-event evidence., ja: トレース、状態、領域イベント証拠を区別する管理されたカテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [trace, span, state, event, summary]
      example_value: trace
      source_claims: [claim-runtime-observability-signals]
  constraints:
    - id: runtime-observability-signal-boundary
      severity: error
      language: plain
      expression: An observability record must identify its signal kind and must not claim to be the Activity or Entity it observes without an explicit provenance relation.
      explanation: {zh: 遥测是运行时事实的证据，不能因共享关联 ID 而取代被观测对象。, en: Telemetry is evidence about runtime facts and cannot replace its observed object merely by sharing a correlation ID., ja: テレメトリーはランタイム事実に関する証拠であり、相関 ID を共有するだけで観測対象を置き換えることはできない。}
      source_claims: [claim-runtime-observability-signals]
  required_relations: []
examples:
  - id: runtime-observability-positive
    labels: {zh: "LangGraph + OTel + LangSmith 关联", en: "LangGraph OTel LangSmith correlation", ja: "LangGraph + OTel + LangSmith 相関"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; runtime-observability maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; runtime-observability maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; runtime-observability TraceSpan/Record."}
    field_values: {trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, thread_id: thread-1}
    related_node_ids: [TraceRecord, TraceSpan, Checkpoint, StateSnapshot]
    related_relation_ids: []
    source_claims: [claim-runtime-observability-signals]
  - id: runtime-observability-counterexample
    labels: {zh: "Arize Phoenix p99 指标", en: "Arize Phoenix p99 metric", ja: "Arize Phoenix p99 メトリック"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style runtime-observability TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style runtime-observability TraceRecord.", ja: "Missing trace rejects Langfuse-style runtime-observability."}
    field_values: {metric_name: llm_latency_p99}
    related_node_ids: [ObservableSummary]
    related_relation_ids: []
    source_claims: [claim-runtime-observability-signals]
  - id: runtime-observability-boundary
    labels: {zh: "OTel Span.add_event 边界", en: "OTel Span.add_event boundary", ja: "OTel Span.add_event 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; runtime-observability must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; runtime-observability must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {event_name: checkpoint_saved}
    related_node_ids: [TraceEvent, TraceSpan, ObservabilityEvent]
    related_relation_ids: []
    source_claims: [claim-runtime-observability-signals]
  - id: runtime-observability-instance-trace-842
    labels: {zh: "Langfuse trace 导出实例", en: "Langfuse trace export instance", ja: "Langfuse trace エクスポート事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->runtime-observability ObservabilityEvent.", en: "Phoenix instance: drift+quality->runtime-observability ObservabilityEvent.", ja: "Phoenix instance maps to runtime-observability Event."}
    field_values: {trace_id: langfuse-trace-0192a3b4}
    related_node_ids: [TraceRecord, TraceSpan, AgentTranscript]
    related_relation_ids: []
    source_claims: [claim-runtime-observability-signals]
parent_relation: null
relations: []
sources:
  - id: otel-tracing-api
    title: OpenTelemetry Tracing API
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines tracers, spans, span context, links, events, attributes, and span lifetime.
  - id: otel-logs-data-model
    title: OpenTelemetry Logs Data Model
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines log records as a signal distinct from traces and metrics.
  - id: otel-metrics-data-model
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines metric data points and aggregation semantics.
source_claims:
  - id: claim-runtime-observability-signals
    source: otel-tracing-api
    supports: The OpenTelemetry tracing API defines a Span as one operation within a trace and specifies its context, timestamps, attributes, links, and events.
    locator: Span and SpanContext sections
    evidence_kind: standard
    confidence: high


