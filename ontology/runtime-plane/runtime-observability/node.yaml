    labels:
      zh: 一个对象是原始 TraceEvent、记录该事件的 LogRecord，还是将其导出的 TraceExport？：正例
      en: "Is an object an original TraceEvent, a LogRecord recording it, or a TraceExport exporting it?: positive case"
