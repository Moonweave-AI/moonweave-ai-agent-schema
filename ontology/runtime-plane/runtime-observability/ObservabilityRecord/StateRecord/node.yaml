schema: moonweave.ai/ontology-node/v1
id: StateRecord
kind: concept
status: accepted
labels: {zh: 运行时状态记录, en: Runtime state record, ja: ランタイム状態記録}
semantics:
  short_definition: {zh: 用于检查、比较或恢复的、包含固定版本化运行时状态表示的 ObservabilityRecord。, en: "An ObservabilityRecord containing a fixed, versioned representation of runtime state for inspection, comparison, or recovery.", ja: 検査、比較、復旧のために固定かつバージョン化されたランタイム状態表現を含む ObservabilityRecord。}
  definition: {zh: StateRecord 是一种持久化自定义 Entity，保存运行时上下文中的一个状态版本或状态转换表示。它不是可变的 RuntimeSession、Execution Activity、OTel Span、Log Record、OpenTelemetry Metric data point，也不是没有状态版本语义的通用工件。, en: "A StateRecord is a durable custom Entity that preserves one state version or state transition representation from a runtime context. It is not the mutable RuntimeSession, an Execution Activity, an OTel Span, Log Record, OpenTelemetry Metric data point, or a generic artifact without state-version semantics.", ja: StateRecord はランタイムコンテキストの一つの状態バージョンまたは状態遷移表現を保存する永続カスタム Entity である。可変の RuntimeSession、Execution Activity、OTel Span、Log Record、OpenTelemetry Metric data point、または状態バージョン意味を持たない汎用アーティファクトではない。}
  why_needed: {zh: 恢复、调试和溯源需要固定状态表示，以便独立于仍可能变化的实时会话或进程进行比较和验证。, en: "Recovery, debugging, and provenance need fixed state representations that can be compared and validated independently of a live session or process that may continue changing.", ja: 復旧、デバッグ、来歴には、変化し続けうるライブセッションやプロセスから独立して比較・検証できる固定状態表現が必要である。}
  includes:
    - {zh: 状态记录 ID、状态版本、捕获时间、完整性引用和来源上下文引用。, en: "State record ID, state version, capture time, integrity reference, and source context reference.", ja: 状態記録 ID、状態バージョン、取得時刻、完全性参照、ソースコンテキスト参照。}
    - {zh: 用于恢复的检查点、用于检查的快照，以及用于状态转换分析的差异。, en: "Checkpoints for recovery, snapshots for inspection, and diffs for state transition analysis.", ja: 復旧用チェックポイント、検査用スナップショット、状態遷移分析用差分。}
  excludes:
    - {zh: 实时内存会话状态、检查点生命周期 Activity，或仅观察状态操作的遥测数据。, en: "Live in-memory session state, a checkpoint lifecycle Activity, or telemetry that merely observes state operations.", ja: ライブのメモリ内セッション状態、チェックポイントのライフサイクル Activity、または状態操作を単に観測するテレメトリー。}
    - {zh: 未版本化的可变缓存条目，或没有结构化运行时状态语义的转录。, en: "An unversioned mutable cache entry or a transcript without structured runtime-state semantics.", ja: バージョン化されていない可変キャッシュ項目、または構造化ランタイム状態意味を持たない転記。}
  semantic_kind: entity
  aliases: [persisted state, runtime state evidence]
engineering:
  explanation: {zh: 运行时选择一致的状态版本，将其序列化或派生为表示，计算完整性证据，并作为 StateRecord 持久化。捕获和恢复仍是 Activity；会话生命周期事件和 OTel 插桩仍是独立证据层。, en: "A runtime selects a consistent state version, serializes or derives a representation, calculates integrity evidence, and persists it as a StateRecord. Capture and restore remain Activities; session lifecycle events and OTel instrumentation remain separate evidence layers.", ja: ランタイムは一貫した状態バージョンを選択し、表現を直列化または導出し、完全性証拠を計算して StateRecord として永続化する。取得と復元は Activity のままであり、セッションライフサイクルイベントと OTel 計装は別の証拠層に留まる。}
  typical_input:
    - description: {zh: 状态持久化输入, en: State persistence input, ja: 状態永続化入力}
      format: |-
        {"session_id":"session-73","state_version":"18","captured_at":"2026-07-18T09:15:55Z","record_kind":"checkpoint"}
  typical_output:
    - description: {zh: 状态记录, en: State record, ja: 状態記録}
      format: |-
        {"state_record_id":"state-18","state_version":"18","state_digest":"sha256:9c2a...","record_kind":"checkpoint"}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents checkpointers persisting thread graph state as checkpoints.}
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: Defines Log Record field semantics distinct from persisted runtime state.}
structure:
  identity_keys: [record_id, state_record_id, state_version]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与状态表示属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as this state representation., ja: この状態表現と同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: state-18
      source_claims: [claim-state-record-entity]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为状态的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to state., ja: ObservabilityRecord から継承し state に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [state]
      example_value: state
      source_claims: [claim-state-record-entity]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions:
        zh: "从 ObservabilityRecord 继承的状态记录完成持久化时间，并区别于状态选择语义。"
        en: "Persistence time inherited from ObservabilityRecord for the finalized state record, distinct from state-selection semantics."
        ja: "状態選択の意味とは区別される、確定状態記録の ObservabilityRecord から継承した永続化時刻。"
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-state-record-entity]
    - id: state_record_id
      labels: {zh: 状态记录 ID, en: State record ID, ja: 状態記録 ID}
      definitions: {zh: 一项持久状态表示的稳定标识符。, en: Stable identifier of one persisted state representation., ja: 一つの永続状態表現の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: state-18
      source_claims: [claim-state-record-entity]
    - id: state_version
      labels: {zh: 状态版本, en: State version, ja: 状態バージョン}
      definitions: {zh: 所表示运行时状态的版本令牌。, en: Version token of the represented runtime state., ja: 表現されたランタイム状態のバージョントークン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '18'
      source_claims: [claim-state-record-entity]
    - id: captured_at
      labels: {zh: 捕获时间, en: Capture time, ja: 取得時刻}
      definitions: {zh: 选择或最终确定所表示状态版本的时间。, en: Time at which the represented state version was selected or finalized., ja: 表現された状態バージョンが選択または確定された時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-state-record-entity]
  constraints:
    - id: state-record-fixed-version
      severity: error
      language: plain
      expression: A StateRecord must identify one fixed state version, capture time, and integrity reference; it must not silently change payload for the same record identity.
      explanation: {zh: 声称固定的记录若被原地修改，状态比较和恢复就会失败。, en: "State comparison and recovery fail when a purported fixed record mutates in place.", ja: 固定だとされる記録がインプレースで変化すると、状態比較と復旧は失敗する。}
      source_claims: [claim-state-record-entity]
  required_relations: [StateRecord-specializes-ObservabilityRecord]
examples:
  - id: state-record-positive
    labels: {zh: "LangGraph channel_values 持久化", en: "LangGraph channel_values persistence", ja: "LangGraph channel_values 永続化"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; StateRecord TraceSpan/Record."}
    field_values: {record_id: state-18, record_kind: state, recorded_at: '2026-07-18T09:15:55Z', state_record_id: state-18, state_version: '18', captured_at: '2026-07-18T09:15:55Z'}
    related_node_ids: [StateRecord, RuntimeSession, CheckpointCaptureActivity]
    related_relation_ids: [StateRecord-specializes-ObservabilityRecord]
    source_claims: [claim-state-record-entity]
  - id: state-record-counterexample
    labels: {zh: "Span attributes 非 StateRecord", en: "Span attributes not StateRecord", ja: "Span attributes は StateRecord ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style StateRecord TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style StateRecord TraceRecord.", ja: "Missing trace rejects Langfuse-style StateRecord."}
    field_values: {session_id: session-73}
    related_node_ids: [RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-state-record-entity]
  - id: state-record-boundary
    labels: {zh: "StateRecord 与 Checkpoint 边界", en: "StateRecord versus Checkpoint", ja: "StateRecord と Checkpoint 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; StateRecord must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; StateRecord must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {state_record_id: state-18}
    related_node_ids: [StateRecord, CheckpointCaptureActivity]
    related_relation_ids: [CheckpointCaptureActivity-generates-Checkpoint]
    source_claims: [claim-state-record-entity]
  - id: state-record-instance-18
    labels: {zh: "Postgres 通道值记录实例", en: "Postgres channel values record instance", ja: "Postgres チャネル値記録事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->StateRecord ObservabilityEvent.", en: "Phoenix instance: drift+quality->StateRecord ObservabilityEvent.", ja: "Phoenix instance maps to StateRecord Event."}
    field_values: {record_id: state-18, record_kind: state, recorded_at: '2026-07-18T09:15:55Z', state_record_id: state-18, state_version: '18', captured_at: '2026-07-18T09:15:55Z'}
    related_node_ids: [StateRecord, RuntimeSession, Checkpoint, TraceSpan]
    related_relation_ids: [StateRecord-specializes-ObservabilityRecord]
    source_claims: [claim-state-record-entity]
parent_relation:
  id: StateRecord-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是运行时状态记录, en: is a runtime state record, ja: ランタイム状態記録である}
  definitions: {zh: 每个 StateRecord 都是包含固定版本化运行时状态表示的 ObservabilityRecord。, en: Every StateRecord is an ObservabilityRecord containing a fixed versioned runtime-state representation., ja: すべての StateRecord は固定かつバージョン化されたランタイム状態表現を含む ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_state_record, labels: {zh: 具有状态记录, en: has state record, ja: 状態記録を持つ}}
  conditions:
    - id: state-record-parent-condition
      severity: error
      expression: Require state version, capture time, and integrity evidence for a fixed representation.
      explanations: {zh: 当前可变缓存状态和原始日志不满足持久状态契约。, en: Current mutable cache state and raw logs do not meet the durable state contract., ja: 現在の可変キャッシュ状態と生ログは永続状態契約を満たさない。}
      source_claims: [claim-state-record-entity]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-state-record-entity]
relations: []
sources:
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents persisting thread graph state as checkpoints for continuity and recovery.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines Log Record semantics separately from durable runtime-state Entities.
source_claims:
  - id: claim-state-record-entity
    source: langgraph-persistence
    supports: LangGraph checkpointers persist a thread's graph state as checkpoints for continuity, interruptions, time travel, and fault tolerance.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

