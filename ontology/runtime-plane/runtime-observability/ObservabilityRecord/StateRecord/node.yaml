schema: moonweave.ai/ontology-node/v1
id: StateRecord
kind: concept
labels:
  zh: 状态记录
  en: state record
  ja: 状態記録
semantics:
  short_definition:
    zh: 描述运行状态版本、状态差异或恢复边界的观测记录。
    en: An observation record of state version, state difference, or restore boundary.
    ja: 状態版、状態差分、復元境界を記述する観測記録。
  definition:
    zh: 状态记录是一种 ObservabilityRecord，其主要内容是某一逻辑时点的运行状态、两个状态版本间的差异，或可恢复的一致性边界。它必须指明状态所属对象和版本/时点；描述消息顺序、操作耗时或策略判断的记录不属于此类。
    en: A StateRecord is an ObservabilityRecord whose primary content is runtime state at one logical time, a difference between two state versions, or a recoverable consistency boundary. It identifies the state-bearing object and version or time; records about message order, operation duration, or policy judgment are not state records.
    ja: StateRecord は、一つの論理時点の実行状態、二状態版間の差分、または復元可能な整合性境界を主内容とする ObservabilityRecord です。状態対象と版／時点を識別し、メッセージ順、操作時間、方針判断の記録は含みません。
  why_needed:
    zh: 统一的状态记录层把快照、差异和检查点放在同一可查询家族中，同时仍区分“状态内容”“变化内容”和“恢复地址”，为恢复、回放和状态审计提供共同语义。
    en: The state-record layer makes snapshots, diffs, and checkpoints one queryable family while preserving state content, change content, and restore address as separate meanings for recovery, replay, and state audit.
    ja: 状態記録層は快照、差分、チェックポイントを同一照会族にしつつ、状態内容、変化内容、復元アドレスを分離し、復旧・再生・状態監査を支えます。
  includes:
    - zh: 包括 StateSnapshot、StateDiff 与 Checkpoint，只要其身份由特定运行对象及状态版本、快照对或恢复边界决定。
      en: Includes StateSnapshot, StateDiff, and Checkpoint when identity is determined by a runtime object and state version, snapshot pair, or restore boundary.
      ja: 実行対象と状態版、快照対、復元境界で同一性が決まる StateSnapshot、StateDiff、Checkpoint を含みます。
  excludes:
    - zh: 不包括按消息顺序组织的 AgentTranscript、按操作因果组织的 TraceRecord、状态转换活动本身或没有版本身份的临时内存对象。
      en: Excludes message-ordered AgentTranscript, operation-causal TraceRecord, state-transition activities, and transient memory objects without version identity.
      ja: メッセージ順の AgentTranscript、操作因果の TraceRecord、状態遷移活動、版識別のない一時メモリ対象は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 StateRecord 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating StateRecord, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: StateRecord 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to StateRecord.
      format: |-
        # Example StateRecord ingest
        { "state-record_ref": "example-1" }
      source_claims:
        - claim-state-record-design
  typical_output:
    - description: Moonweave-local StateRecord projection.
      format: '{ "schema_owner": "moonweave-local-design", "state-record_id": "example-1" }'
      source_claims:
        - claim-state-record-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateRecord-example-positive-001
    labels:
      zh: LangGraph channel_values 持久化
      en: LangGraph channel_values persistence
      ja: LangGraph channel_values 永続化
    descriptions:
      zh: LangGraph checkpointer 将 channel_values={messages, agent_state} 写入 StateRecord record_id=state-18，关联 checkpoint_id 与 thread_id=thread-1。
      en: LangGraph checkpointer writes channel_values={messages, agent_state} to StateRecord record_id=state-18 linked to checkpoint_id and thread_id=thread-1.
      ja: checkpointer が channel_values を StateRecord として永続化する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: state-record-session8-v27
      record_kind: state
      observed_at: 2026-07-16T11:30:27.000Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/logical-version-27
    related_node_ids:
      - StateRecord
      - ObservabilityRecord
      - StateSnapshot
      - StateDiff
      - Checkpoint
    related_relation_ids:
      - StateRecord-is_a-ObservabilityRecord
      - StateSnapshot-is_a-StateRecord
      - StateDiff-is_a-StateRecord
      - Checkpoint-is_a-StateRecord
    source_claims:
      - claim-state-record-design
  - id: StateRecord-example-boundary-001
    labels:
      zh: Span attributes 非 StateRecord
      en: Span attributes not StateRecord
      ja: Span attributes は StateRecord ではない
    descriptions:
      zh: OTel span attributes tool.output 是 TraceSpan 级属性，不是 LangGraph StateRecord channel_values 持久化。
      en: OTel span attributes tool.output are TraceSpan-level attributes, not LangGraph StateRecord channel_values persistence.
      ja: Span attributes は TraceSpan 级であり StateRecord ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateRecord
      - TraceSpan
      - ObservabilityRecord
    related_relation_ids:
      - StateRecord-is_a-ObservabilityRecord
    source_claims:
      - claim-state-record-design
  - id: StateRecord-example-3
    labels:
      zh: StateRecord 与 Checkpoint 边界
      en: StateRecord versus Checkpoint
      ja: StateRecord と Checkpoint 境界
    descriptions:
      zh: StateRecord 持久化通道值；Checkpoint 是版本化 tuple 含 metadata/new_versions；两者相关但 record_kind 不同。
      en: StateRecord persists channel values; Checkpoint is versioned tuple with metadata/new_versions; related but different record_kind.
      ja: StateRecord と Checkpoint は record_kind が異なる。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateRecord
    related_relation_ids: []
    source_claims:
      - claim-state-record-vendor
      - claim-state-record-design
  - id: StateRecord-example-4
    labels:
      zh: Postgres 通道值记录实例
      en: Postgres channel values record instance
      ja: Postgres チャネル値記録事例
    descriptions:
      zh: PostgresSaver 表 checkpoints 行 id=state-18 存 JSONB channel_values，供 get_state 与 replay 读取。
      en: PostgresSaver checkpoints table row id=state-18 stores JSONB channel_values for get_state and replay reads.
      ja: PostgresSaver JSONB channel_values 行を StateRecord として読む。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateRecord
    related_relation_ids: []
    source_claims:
      - claim-state-record-vendor
      - claim-state-record-design
parent_relation:
  id: StateRecord-is_a-ObservabilityRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 StateRecord 都是 ObservabilityRecord，其种差是主要内容由某运行对象在逻辑时点的状态版本、版本差异或可恢复边界构成。
    en: Every StateRecord is an ObservabilityRecord distinguished by primarily describing a runtime object's state version, a difference between versions, or a recoverable boundary at a logical time.
    ja: すべての StateRecord は ObservabilityRecord で、runtime 対象の論理時点の状態版・版差分・回復可能境界を主内容とする点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
