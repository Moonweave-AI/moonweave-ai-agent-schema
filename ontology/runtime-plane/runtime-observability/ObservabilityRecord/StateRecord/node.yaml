schema: moonweave.ai/ontology-node/v1
id: StateRecord
kind: concept
status: accepted
labels:
  zh: 状态记录
  en: state record
  ja: 状態記録
semantics:
  short_definition:
    zh: 描述运行状态版本、状态差异或恢复边界的观测记录。
    en: An observation record of state version, state difference, or restore boundary.
    ja: 状態版、状態差分、復元境界を記述する観測記録。
  definition:
    zh: 状态记录是一种 ObservabilityRecord，其主要内容是某一逻辑时点的运行状态、两个状态版本间的差异，或可恢复的一致性边界。它必须指明状态所属对象和版本/时点；描述消息顺序、操作耗时或策略判断的记录不属于此类。
    en: A StateRecord is an ObservabilityRecord whose primary content is runtime state at one logical time, a difference between two state versions, or a recoverable consistency boundary. It identifies the state-bearing object and version or time; records about message order, operation duration, or policy judgment are not state records.
    ja: StateRecord は、一つの論理時点の実行状態、二状態版間の差分、または復元可能な整合性境界を主内容とする ObservabilityRecord です。状態対象と版／時点を識別し、メッセージ順、操作時間、方針判断の記録は含みません。
  why_needed:
    zh: 统一的状态记录层把快照、差异和检查点放在同一可查询家族中，同时仍区分“状态内容”“变化内容”和“恢复地址”，为恢复、回放和状态审计提供共同语义。
    en: The state-record layer makes snapshots, diffs, and checkpoints one queryable family while preserving state content, change content, and restore address as separate meanings for recovery, replay, and state audit.
    ja: 状態記録層は快照、差分、チェックポイントを同一照会族にしつつ、状態内容、変化内容、復元アドレスを分離し、復旧・再生・状態監査を支えます。
  includes:
    - zh: 包括 StateSnapshot、StateDiff 与 Checkpoint，只要其身份由特定运行对象及状态版本、快照对或恢复边界决定。
      en: Includes StateSnapshot, StateDiff, and Checkpoint when identity is determined by a runtime object and state version, snapshot pair, or restore boundary.
      ja: 実行対象と状態版、快照対、復元境界で同一性が決まる StateSnapshot、StateDiff、Checkpoint を含みます。
  excludes:
    - zh: 不包括按消息顺序组织的 AgentTranscript、按操作因果组织的 TraceRecord、状态转换活动本身或没有版本身份的临时内存对象。
      en: Excludes message-ordered AgentTranscript, operation-causal TraceRecord, state-transition activities, and transient memory objects without version identity.
      ja: メッセージ順の AgentTranscript、操作因果の TraceRecord、状態遷移活動、版識別のない一時メモリ対象は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateRecord-example-positive-001
    kind: positive
    labels:
      zh: 带对象和版本的运行状态记录
      en: Runtime-state record with subject and version
      ja: 対象と版を持つ実行状態記録
    scenario_id: null
    descriptions:
      zh: 记录表明 session-8 在逻辑版本 27 的通道值、待处理任务和下一执行位置，并注明生成时间与状态所属会话；它可作为快照、差异或检查点家族的查询上位对象。
      en: A record identifies session-8 at logical version 27 with channel values, pending tasks, next execution position, generation time, and the state-owning session. It is queryable through the StateRecord family before specializing as snapshot, diff, or checkpoint.
      ja: 記録はsession-8の論理版27について、チャネル値、保留タスク、次の実行位置、生成時刻、状態所有セッションを示す。スナップショット、差分、チェックポイントへ特化する前にStateRecord族として照会できる。
    field_values:
      record_id: state-record-session8-v27
      record_kind: state
      observed_at: 2026-07-16T11:30:27.000Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/logical-version-27
    related_node_ids:
      - StateRecord
      - ObservabilityRecord
      - StateSnapshot
      - StateDiff
      - Checkpoint
    related_relation_ids:
      - StateRecord-is_a-ObservabilityRecord
      - StateSnapshot-is_a-StateRecord
      - StateDiff-is_a-StateRecord
      - Checkpoint-is_a-StateRecord
    expected_result:
      zh: 该对象可按状态承载对象和版本检索，并进一步依据内容识别具体子类。
      en: The object is retrievable by state-bearing subject and version and can then be specialized according to its content.
      ja: 状態を持つ対象と版で検索でき、内容に応じて具体的な下位型へ特化できる。
    why_valid_or_invalid:
      zh: 其主要内容是一个逻辑时点的运行状态或可恢复边界，而非操作持续时间或消息顺序。
      en: Its primary content is runtime state or a recoverable boundary at a logical time, not operation duration or message order.
      ja: 主要内容は論理時点の実行状態または復元境界であり、操作時間やメッセージ順序ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-record-001
  - id: StateRecord-example-boundary-001
    kind: boundary
    labels:
      zh: 操作时长记录不是状态记录
      en: An operation-duration record is not a state record
      ja: 操作時間記録は状態記録ではない
    scenario_id: null
    descriptions:
      zh: 跨度记录包含工具调用的开始、结束、耗时和错误状态，但没有任何状态承载对象、逻辑版本或状态内容。它是追踪跨度，不是 StateRecord。
      en: A span record contains tool-call start, end, duration, and error status but no state-bearing subject, logical version, or state content. It is a TraceSpan rather than a StateRecord.
      ja: スパン記録にはツール呼出しの開始・終了・所要時間・エラー状態があるが、状態対象、論理版、状態内容がない。これはTraceSpanでありStateRecordではない。
    field_values: {}
    related_node_ids:
      - StateRecord
      - TraceSpan
      - ObservabilityRecord
    related_relation_ids:
      - StateRecord-is_a-ObservabilityRecord
    expected_result:
      zh: 该记录保持 TraceSpan 身份，不因同属可观测记录而被归入状态记录。
      en: The record remains a TraceSpan and is not classified as StateRecord merely because both are observable records.
      ja: 同じ観測記録族であってもStateRecordにはせず、TraceSpanの同一性を保つ。
    why_valid_or_invalid:
      zh: 状态记录由状态对象及版本决定；跨度由一次操作及其时间区间决定。
      en: StateRecord identity comes from a state-bearing subject and version; span identity comes from an operation and its time interval.
      ja: StateRecordの同一性は状態対象と版、スパンの同一性は操作と時間区間で決まる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-record-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TraceRecord
    shared_parent_concept_id: ObservabilityRecord
    differentia:
      zh: 端点特定对照：父节点 ObservabilityRecord：StateRecord（semantic kind=information，骨架 StateRecord-is_a-ObservabilityRecord）；TraceRecord（semantic kind=information，骨架 TraceRecord-is_a-ObservabilityRecord）。双端条件：StateRecord 条件：“状态记录是一种以特定版本或时点的运行状态、版本间差异或可恢复一致性边界为主要内容的可观测记录”；TraceRecord 条件：“追踪记录属于可观测记录，区别于其他同类对象的条件是：它是一次运行工作流或会话片段的追踪容器，汇集跨度、追踪上下文、链接、有序事件、保留策略和根跨度身份”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ObservabilityRecord: StateRecord (semantic kind=information, backbone StateRecord-is_a-ObservabilityRecord); TraceRecord (semantic kind=information, backbone TraceRecord-is_a-ObservabilityRecord). Endpoint conditions: StateRecord condition: “As an observability record, State record is distinguished by the fact that it is an ObservabilityRecord whose primary content is runtime state at a version or time, a difference between versions, or a recoverable consistency boundary”; TraceRecord condition: “Trace record is an observability record whose defining condition is that it is a trace container for one runtime workflow or session segment, grouping spans, trace context, links, ordered events, retention policy, and root-span identity”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ObservabilityRecord：StateRecord（semantic kind=information、バックボーン StateRecord-is_a-ObservabilityRecord）；TraceRecord（semantic kind=information、バックボーン TraceRecord-is_a-ObservabilityRecord）。両端条件：StateRecord の条件：「観測記録に属する状態記録は、次の事実を種差とします：StateRecord は特定版・時点の実行状態、版間差分、復元可能な整合性境界を主内容とする ObservabilityRecord である」；TraceRecord の条件：「トレース記録は観測記録のうち、次の事実を定義条件とする対象です：それは、一つの実行ワークフローまたはセッション区間のトレースコンテナであり、スパン、トレース文脈、リンク、順序付きイベント、保持ポリシー、ルートスパン識別をまとめます」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-state-record-001
