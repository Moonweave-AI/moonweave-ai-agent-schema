sibling_differentiation:
  - sibling_concept_id: Checkpoint
    shared_parent_concept_id: StateRecord
    differentia:
      zh: 正向身份比较：父节点 StateRecord：StateSnapshot（semantic kind=information，骨架 StateSnapshot-is_a-StateRecord）；Checkpoint（semantic kind=information，骨架 Checkpoint-is_a-StateRecord）。双端条件：StateSnapshot 条件：“作为状态记录，状态快照由这一事实区分：它捕获会话、参与者、图、工具或状态图步骤的运行状态，用于检查、恢复、回放或生命周期转移”；Checkpoint 条件：“检查点是一种状态记录（StateRecord），保存会话、版本、创建活动、状态摘要和所引用的 StateSnapshot；捕获动作由 CheckpointActivity 执行，而该记录本身不修改或生成状态”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent StateRecord: StateSnapshot (semantic kind=information, backbone StateSnapshot-is_a-StateRecord); Checkpoint (semantic kind=information, backbone Checkpoint-is_a-StateRecord). Endpoint conditions: StateSnapshot condition: “State snapshot belongs to the state record category and differs from broader members in that it is a captured runtime state for a session, actor, graph, tool, or statechart step, used for inspection, recovery, replay, or lifecycle transition”; Checkpoint condition: “A Checkpoint is a StateRecord that stores session, version, creating activity, state digest, and referenced StateSnapshot; CheckpointActivity performs capture, while the record itself neither mutates nor generates state”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 StateRecord：StateSnapshot（semantic kind=information、バックボーン StateSnapshot-is_a-StateRecord）；Checkpoint（semantic kind=information、バックボーン Checkpoint-is_a-StateRecord）。両端条件：StateSnapshot の条件：「状態スナップショットは状態記録として、次の条件により他の対象と区別されます：それは、セッション、アクター、グラフ、ツール、状態図ステップの実行状態を捕捉し、検査、復旧、再生、ライフサイクル遷移に用います」；Checkpoint の条件：「状態記録に属するチェックポイントは、次の事実を種差とします：それはセッション、版、作成活動、状態要約、参照 StateSnapshot を記録します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-state-snapshot-001
