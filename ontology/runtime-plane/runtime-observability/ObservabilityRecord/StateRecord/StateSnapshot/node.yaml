schema: moonweave.ai/ontology-node/v1
id: StateSnapshot
kind: concept
labels:
  en: state snapshot
  zh: 状态快照
  ja: 状態スナップショット
semantics:
  short_definition:
    zh: 某运行对象在一个逻辑时点的状态值集合。
    en: The state-value set of one runtime object at one logical time.
    ja: 一つの実行対象の一論理時点における状態値集合。
  definition:
    zh: 状态快照是一种 StateRecord，捕获一个会话、图、参与者或工具在同一逻辑时点的一致状态值集合，并标识状态版本与所属对象。它描述“当时有哪些值”，不包含从上一版发生了什么变化，也不自动提供恢复所需的执行位置与待处理任务。
    en: A StateSnapshot is a StateRecord capturing a consistent set of state values for one session, graph, actor, or tool at one logical time, with state version and owning object. It describes which values existed then, not what changed from a prior version, and does not automatically provide execution position or pending work needed for restoration.
    ja: StateSnapshot は、一つのセッション、グラフ、主体、ツールについて同一論理時点の整合した状態値集合を捕捉し、状態版と対象を識別する StateRecord です。当時の値を記述し、前版からの変化や復元に必要な実行位置・保留作業は自動的に含みません。
  why_needed:
    zh: 快照提供可检查、可比较的状态基线，使回放、恢复验证和 StateDiff 计算具有明确输入；若只保留检查点摘要，就无法检查具体状态值是否被正确保存和重建。
    en: Snapshots provide inspectable and comparable state baselines for replay, restore verification, and StateDiff computation. A checkpoint digest alone cannot show whether individual state values were preserved and reinstated correctly.
    ja: 快照は再生、復元検証、StateDiff 計算の検査可能な基準を提供します。チェックポイント要約だけでは個々の状態値が正しく保存・復元されたか確認できません。
  includes:
    - zh: 包括图步骤结束时捕获的消息通道值、当前任务结果、待审批标志和共享变量，并绑定同一 state_version。
      en: Includes message-channel values, current task results, pending-approval flags, and shared variables captured at a graph-step boundary under one state_version.
      ja: グラフステップ境界で同一 state_version により取得したメッセージチャネル値、タスク結果、承認待ち印、共有変数を含みます。
  excludes:
    - zh: 不包括恢复寻址用 Checkpoint、两个快照间的 StateDiff、捕获动作本身，以及不同逻辑时点拼接而成的不一致值集合。
      en: Excludes a Checkpoint used for restore addressing, a StateDiff between snapshots, the capture action, and inconsistent value sets assembled from different logical times.
      ja: 復元指定用 Checkpoint、快照間 StateDiff、取得動作、異なる論理時点を混在させた不整合値集合は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 StateSnapshot 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating StateSnapshot, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: StateSnapshot 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to StateSnapshot.
      format: |-
        # Example StateSnapshot ingest
        { "state-snapshot_ref": "example-1" }
      source_claims:
        - claim-state-snapshot-design
  typical_output:
    - description: Moonweave-local StateSnapshot projection.
      format: '{ "schema_owner": "moonweave-local-design", "state-snapshot_id": "example-1" }'
      source_claims:
        - claim-state-snapshot-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateSnapshot-example-positive-001
    labels:
      zh: LangGraph graph.get_state
      en: LangGraph graph.get_state
      ja: LangGraph graph.get_state
    descriptions:
      zh: LangGraph graph.get_state(config={configurable:{thread_id:thread-1}}) 返回 StateSnapshot：values={messages:[...]}, next=("agent",), checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336。
      en: 'LangGraph graph.get_state(config={configurable:{thread_id:thread-1}}) returns StateSnapshot: values={messages:[...]}, next=("agent",), checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336.'
      ja: graph.get_state は values/next/checkpoint_id を返す StateSnapshot である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: state-snapshot-v19
      record_kind: state-snapshot
      observed_at: 2026-07-16T11:29:19.000Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/logical-version-19
    related_node_ids:
      - StateSnapshot
      - StateRecord
      - StateDiff
    related_relation_ids:
      - StateSnapshot-is_a-StateRecord
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    source_claims:
      - claim-state-snapshot-design
  - id: StateSnapshot-example-boundary-001
    labels:
      zh: Run.status 非 StateSnapshot
      en: Run.status not StateSnapshot
      ja: Run.status は StateSnapshot ではない
    descriptions:
      zh: OpenAI runs.retrieve 返回 Run.status=in_progress 是 Execution 生命周期字段，不是 LangGraph StateSnapshot values/next。
      en: OpenAI runs.retrieve returning Run.status=in_progress is Execution lifecycle field, not LangGraph StateSnapshot values/next.
      ja: Run.status は Execution ライフサイクルであり StateSnapshot ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateSnapshot
      - StateDiff
      - StateRecord
    related_relation_ids:
      - StateSnapshot-is_a-StateRecord
    source_claims:
      - claim-state-snapshot-design
  - id: StateSnapshot-example-3
    labels:
      zh: StateSnapshot 与 Checkpoint 边界
      en: StateSnapshot versus Checkpoint
      ja: StateSnapshot と Checkpoint 境界
    descriptions:
      zh: StateSnapshot 是查询投影；Checkpoint tuple 是持久化存储；同一 checkpoint_id 可对应 Snapshot 视图与存储记录。
      en: StateSnapshot is query projection; Checkpoint tuple is persistent storage; same checkpoint_id can have Snapshot view and storage record.
      ja: StateSnapshot はクエリ投影、Checkpoint は永続 tuple である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateSnapshot
    related_relation_ids: []
    source_claims:
      - claim-state-snapshot-vendor
      - claim-state-snapshot-design
  - id: StateSnapshot-example-4
    labels:
      zh: thread-1 StateSnapshot 实例
      en: thread-1 StateSnapshot instance
      ja: thread-1 StateSnapshot 事例
    descriptions:
      zh: LangGraph time-travel：get_state(config, checkpoint_id=1f070a87...) 读取历史 super-step 的 values 与 next 指针用于 replay。
      en: "LangGraph time-travel: get_state(config, checkpoint_id=1f070a87...) reads historical super-step values and next pointer for replay."
      ja: time-travel get_state で歴史 super-step の values/next を読む。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateSnapshot
    related_relation_ids: []
    source_claims:
      - claim-state-snapshot-vendor
      - claim-state-snapshot-design
parent_relation:
  id: StateSnapshot-is_a-StateRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 StateSnapshot 都是 StateRecord，其种差是在一个逻辑时点完整呈现目标对象的一致状态值集合。
    en: Every StateSnapshot is a StateRecord distinguished by presenting a consistent set of the target object's state values at one logical time.
    ja: すべての StateSnapshot は StateRecord で、一つの論理時点における対象の整合した状態値集合を示す点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
