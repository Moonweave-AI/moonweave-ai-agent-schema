schema: moonweave.ai/ontology-node/v1
id: StateSnapshot
kind: concept
status: accepted
labels: {zh: 状态快照, en: State snapshot, ja: 状態スナップショット}
semantics:
  short_definition: {zh: 捕获固定的完整或声明范围运行时状态视图、用于观察和比较的 StateRecord。, en: "A StateRecord that captures a fixed full or declared-scope view of runtime state for observation and comparison.", ja: 観測と比較のために、固定された完全または宣言スコープのランタイム状態ビューを取得する StateRecord。}
  definition: {zh: StateSnapshot 是在具名版本和时间点上的持久观察导向状态表示。它不一定是恢复安全的 Checkpoint、它所描绘的可变会话状态、StateDiff、捕获 Activity 或 OTel 遥测信号。, en: "A StateSnapshot is a durable observation-oriented representation of state at a named version and time. It is not necessarily a recovery-safe Checkpoint, the mutable session state it depicts, a StateDiff, a capture Activity, or an OTel telemetry signal.", ja: StateSnapshot は名前付きバージョンと時刻における状態の永続的で観測志向の表現である。必ずしも復旧安全な Checkpoint、それが描く可変セッション状態、StateDiff、取得 Activity、OTel テレメトリーシグナルではない。}
  why_needed: {zh: 调试和事件调查需要可检查的时间点状态视图，而不能假设每个捕获表示都具有恢复或重放所需的兼容性和生命周期保证。, en: "Debugging and incident investigation need inspectable point-in-time state views without assuming every captured representation has the compatibility and lifecycle guarantees required for restore or replay.", ja: デバッグとインシデント調査には、取得されたすべての表現が復元やリプレイに必要な互換性とライフサイクル保証を持つと仮定せずに検査できる時点状態ビューが必要である。}
  includes:
    - {zh: 快照 ID、状态版本、捕获时间、视图范围和完整性摘要。, en: "Snapshot ID, state version, capture time, view scope, and integrity digest.", ja: スナップショット ID、状態バージョン、取得時刻、ビュー範囲、完全性ダイジェスト。}
    - {zh: 为比较、诊断或视觉检查而保留的完整或范围化状态视图。, en: "Full or scoped state views retained for comparison, diagnostics, or visual inspection.", ja: 比較、診断、視覚検査のために保持される完全またはスコープ付き状態ビュー。}
  excludes:
    - {zh: 承诺恢复的 Checkpoint、状态增量、实时会话缓存和仪表盘指标汇总。, en: "A Checkpoint that promises restoration, a state delta, a live session cache, and a dashboard metric rollup.", ja: 復元を約束する Checkpoint、状態差分、ライブセッションキャッシュ、ダッシュボードメトリック集計。}
    - {zh: 状态捕获工作或该工作的追踪插桩。, en: State capture work or trace instrumentation of that work., ja: 状態取得作業またはその作業のトレース計装。}
  semantic_kind: entity
  aliases: [state view, inspection snapshot]
engineering:
  explanation: {zh: 记录器读取一致的状态版本，应用授权视图范围和脱敏策略，计算摘要并存储该表示。它可与另一快照比较或用于派生差异，但只有单独认定的 Checkpoint 才可传给恢复操作。, en: "A recorder reads a consistent state version, applies an authorized view scope and redaction policy, computes a digest, and stores the representation. It may be compared to another snapshot or used to derive a diff, but only a separately qualified Checkpoint may be passed to recovery operations.", ja: レコーダーは一貫した状態バージョンを読み、認可されたビュー範囲とマスキングポリシーを適用し、ダイジェストを計算して表現を保存する。別のスナップショットとの比較や差分の導出に利用できるが、復旧操作へ渡せるのは別途認定された Checkpoint のみである。}
  typical_input:
    - description: {zh: 观察快照请求, en: Observation snapshot request, ja: 観測スナップショットリクエスト}
      format: |-
        {"session_id":"session-73","state_version":"19","view_scope":"conversation-and-tools","captured_at":"2026-07-18T09:25:00Z"}
  typical_output:
    - description: {zh: 状态快照记录, en: State snapshot record, ja: 状態スナップショット記録}
      format: |-
        {"snapshot_id":"snapshot-7","state_version":"19","view_scope":"conversation-and-tools","state_digest":"sha256:77c1..."}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents persisted graph state used for inspection, history, and continuation.}
structure:
  identity_keys: [record_id, state_record_id, snapshot_id, state_version]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并与状态快照属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord through StateRecord for the same persisted record as this state snapshot., ja: この状態スナップショットと同じ永続記録に対して StateRecord 経由で ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: snapshot-7
      source_claims: [claim-state-snapshot]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并固定为状态的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord through StateRecord and fixed to state., ja: StateRecord 経由で ObservabilityRecord から継承し state に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [state]
      example_value: state
      source_claims: [claim-state-snapshot]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承的快照记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord through StateRecord for the finalized snapshot record., ja: 確定したスナップショット記録に対して StateRecord 経由で ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:16:30Z'
      source_claims: [claim-state-snapshot]
    - id: state_record_id
      labels: {zh: 状态记录 ID, en: State record ID, ja: 状態記録 ID}
      definitions: {zh: 从 StateRecord 继承并与快照属于同一状态表示的稳定标识符。, en: Stable state-representation identifier inherited from StateRecord for the same record as this snapshot., ja: このスナップショットと同じ状態表現に対して StateRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: snapshot-7
      source_claims: [claim-state-snapshot]
    - id: captured_at
      labels: {zh: 捕获时间, en: Capture time, ja: 取得時刻}
      definitions: {zh: 从 StateRecord 继承的快照状态版本被选择或最终确定的时间。, en: Time inherited from StateRecord at which the snapshot state version was selected or finalized., ja: スナップショット状態バージョンが選択または確定された StateRecord から継承した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:16:30Z'
      source_claims: [claim-state-snapshot]
    - id: snapshot_id
      labels: {zh: 快照 ID, en: Snapshot ID, ja: スナップショット ID}
      definitions: {zh: 一项面向检查状态视图的稳定标识符。, en: Stable identifier of one inspection-oriented state view., ja: 一つの検査志向状態ビューの安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: snapshot-7
      source_claims: [claim-state-snapshot]
    - id: state_version
      labels: {zh: 状态版本, en: State version, ja: 状態バージョン}
      definitions: {zh: 固定快照视图所表示的版本。, en: Version represented by the fixed snapshot view., ja: 固定スナップショットビューが表すバージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '19'
      source_claims: [claim-state-snapshot]
    - id: view_scope
      labels: {zh: 视图范围, en: View scope, ja: ビュー範囲}
      definitions: {zh: 此快照所表示的授权子集或完整范围。, en: Authorized subset or full scope represented by this snapshot., ja: このスナップショットが表す認可された部分集合または完全範囲。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: conversation-and-tools
      source_claims: [claim-state-snapshot]
  constraints:
    - id: state-snapshot-observation-boundary
      severity: error
      language: plain
      expression: A StateSnapshot must declare fixed state version, capture time, view scope, redaction decision, and integrity digest; it must not be used for restore unless separately qualified as a Checkpoint.
      explanation: {zh: 观察捕获和恢复就绪是不同的保证。, en: Observation capture and recovery readiness are different guarantees., ja: 観測取得と復旧準備は異なる保証である。}
      source_claims: [claim-state-snapshot]
  required_relations: [StateSnapshot-specializes-StateRecord]
examples:
  - id: state-snapshot-positive
    labels: {zh: "LangGraph graph.get_state", en: "LangGraph graph.get_state", ja: "LangGraph graph.get_state"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateSnapshot maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateSnapshot maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; StateSnapshot TraceSpan/Record."}
    field_values: {record_id: snapshot-7, record_kind: state, recorded_at: '2026-07-18T09:16:30Z', state_record_id: snapshot-7, captured_at: '2026-07-18T09:16:30Z', snapshot_id: snapshot-7, state_version: '19', view_scope: conversation-and-tools}
    related_node_ids: [StateSnapshot, RuntimeSession]
    related_relation_ids: [StateSnapshot-specializes-StateRecord]
    source_claims: [claim-state-snapshot]
  - id: state-snapshot-counterexample
    labels: {zh: "Run.status 非 StateSnapshot", en: "Run.status not StateSnapshot", ja: "Run.status は StateSnapshot ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style StateSnapshot TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style StateSnapshot TraceRecord.", ja: "Missing trace rejects Langfuse-style StateSnapshot."}
    field_values: {checkpoint_id: checkpoint-4}
    related_node_ids: [Checkpoint]
    related_relation_ids: []
    source_claims: [claim-state-snapshot]
  - id: state-snapshot-boundary
    labels: {zh: "StateSnapshot 与 Checkpoint 边界", en: "StateSnapshot versus Checkpoint", ja: "StateSnapshot と Checkpoint 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; StateSnapshot must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; StateSnapshot must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {snapshot_id: snapshot-7}
    related_node_ids: [StateSnapshot, StateDiff]
    related_relation_ids: []
    source_claims: [claim-state-snapshot]
  - id: state-snapshot-instance-7
    labels: {zh: "thread-1 StateSnapshot 实例", en: "thread-1 StateSnapshot instance", ja: "thread-1 StateSnapshot 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->StateSnapshot ObservabilityEvent.", en: "Phoenix instance: drift+quality->StateSnapshot ObservabilityEvent.", ja: "Phoenix instance maps to StateSnapshot Event."}
    field_values: {record_id: snapshot-7, record_kind: state, recorded_at: '2026-07-18T09:16:30Z', state_record_id: snapshot-7, captured_at: '2026-07-18T09:16:30Z', snapshot_id: snapshot-7, state_version: '19', view_scope: conversation-and-tools}
    related_node_ids: [StateSnapshot, RuntimeSession, StateDiff, TraceSpan]
    related_relation_ids: [StateSnapshot-specializes-StateRecord]
    source_claims: [claim-state-snapshot]
parent_relation:
  id: StateSnapshot-specializes-StateRecord
  predicate: is_a
  target: concept:StateRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是状态快照, en: is a state snapshot, ja: 状態スナップショットである}
  definitions: {zh: 每个 StateSnapshot 都是为固定观察而非恢复保证保留的 StateRecord。, en: Every StateSnapshot is a StateRecord retained for fixed observation rather than recovery guarantee., ja: すべての StateSnapshot は復旧保証ではなく固定観測のために保持される StateRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_state_snapshot, labels: {zh: 具有状态快照, en: has state snapshot, ja: 状態スナップショットを持つ}}
  conditions:
    - id: state-snapshot-parent-condition
      severity: error
      expression: Require a fixed version, authorized view scope, and observation capture evidence without implicitly claiming recovery compatibility.
      explanations: {zh: 快照和检查点有意设计为不同子类型。, en: Snapshot and checkpoint are intentionally distinct subtypes., ja: スナップショットとチェックポイントは意図的に異なるサブタイプである。}
      source_claims: [claim-state-snapshot]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-state-snapshot]
relations: []
sources:
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents persisted graph state as checkpoints used to inspect history and continue runtime work.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines OTel Log Record semantics distinct from custom state snapshot entities.
source_claims:
  - id: claim-state-snapshot
    source: langgraph-persistence
    supports: LangGraph persistence keeps graph state beyond one run through checkpointers, enabling continuity, interruption recovery, time travel, and state history inspection.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

