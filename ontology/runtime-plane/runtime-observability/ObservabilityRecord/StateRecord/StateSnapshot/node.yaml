schema: moonweave.ai/ontology-node/v1
id: StateSnapshot
kind: concept
status: accepted
labels:
  en: state snapshot
  zh: 状态快照
  ja: 状態スナップショット
semantics:
  short_definition:
    zh: 某运行对象在一个逻辑时点的状态值集合。
    en: The state-value set of one runtime object at one logical time.
    ja: 一つの実行対象の一論理時点における状態値集合。
  definition:
    zh: 状态快照是一种 StateRecord，捕获一个会话、图、参与者或工具在同一逻辑时点的一致状态值集合，并标识状态版本与所属对象。它描述“当时有哪些值”，不包含从上一版发生了什么变化，也不自动提供恢复所需的执行位置与待处理任务。
    en: A StateSnapshot is a StateRecord capturing a consistent set of state values for one session, graph, actor, or tool at one logical time, with state version and owning object. It describes which values existed then, not what changed from a prior version, and does not automatically provide execution position or pending work needed for restoration.
    ja: StateSnapshot は、一つのセッション、グラフ、主体、ツールについて同一論理時点の整合した状態値集合を捕捉し、状態版と対象を識別する StateRecord です。当時の値を記述し、前版からの変化や復元に必要な実行位置・保留作業は自動的に含みません。
  why_needed:
    zh: 快照提供可检查、可比较的状态基线，使回放、恢复验证和 StateDiff 计算具有明确输入；若只保留检查点摘要，就无法检查具体状态值是否被正确保存和重建。
    en: Snapshots provide inspectable and comparable state baselines for replay, restore verification, and StateDiff computation. A checkpoint digest alone cannot show whether individual state values were preserved and reinstated correctly.
    ja: 快照は再生、復元検証、StateDiff 計算の検査可能な基準を提供します。チェックポイント要約だけでは個々の状態値が正しく保存・復元されたか確認できません。
  includes:
    - zh: 包括图步骤结束时捕获的消息通道值、当前任务结果、待审批标志和共享变量，并绑定同一 state_version。
      en: Includes message-channel values, current task results, pending-approval flags, and shared variables captured at a graph-step boundary under one state_version.
      ja: グラフステップ境界で同一 state_version により取得したメッセージチャネル値、タスク結果、承認待ち印、共有変数を含みます。
  excludes:
    - zh: 不包括恢复寻址用 Checkpoint、两个快照间的 StateDiff、捕获动作本身，以及不同逻辑时点拼接而成的不一致值集合。
      en: Excludes a Checkpoint used for restore addressing, a StateDiff between snapshots, the capture action, and inconsistent value sets assembled from different logical times.
      ja: 復元指定用 Checkpoint、快照間 StateDiff、取得動作、異なる論理時点を混在させた不整合値集合は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateSnapshot-example-positive-001
    kind: positive
    labels:
      zh: 单一逻辑时点的一致状态集
      en: Consistent state set at one logical time
      ja: 一つの論理時点における一貫状態集合
    scenario_id: null
    descriptions:
      zh: 审批节点提交后，snapshot-v19 同时保存 session-8 的 messages、approval、artifacts、next_node 和逻辑版本；所有值来自同一提交边界，可与 snapshot-v18 比较。
      en: After the approval node commits, snapshot-v19 captures session-8 messages, approval, artifacts, next_node, and logical version from the same commit boundary, making it comparable with snapshot-v18.
      ja: 承認ノードのコミット後、snapshot-v19は同じコミット境界からsession-8のmessages、approval、artifacts、next_node、論理版を取得し、snapshot-v18と比較可能にする。
    field_values:
      record_id: state-snapshot-v19
      record_kind: state-snapshot
      observed_at: 2026-07-16T11:29:19.000Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/logical-version-19
    related_node_ids:
      - StateSnapshot
      - StateRecord
      - StateDiff
    related_relation_ids:
      - StateSnapshot-is_a-StateRecord
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    expected_result:
      zh: 该对象被识别为状态快照，并可作为状态差异的明确端点。
      en: The object is classified as StateSnapshot and can serve as an explicit endpoint of a StateDiff.
      ja: 対象はStateSnapshotに分類され、StateDiffの明示的端点として使用できる。
    why_valid_or_invalid:
      zh: 它完整描述一个对象在同一逻辑版本的状态值，不表达相邻版本发生了哪些变化。
      en: It describes the subject's state values at one consistent logical version without asserting which changes occurred from another version.
      ja: 一つの一貫した論理版の状態値を記述し、別版から何が変わったかは主張しない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-snapshot-001
  - id: StateSnapshot-example-boundary-001
    kind: boundary
    labels:
      zh: 变更列表不是完整状态快照
      en: A change list is not a complete state snapshot
      ja: 変更一覧は完全状態スナップショットではない
    scenario_id: null
    descriptions:
      zh: 记录仅写明 approval 从 pending 改为 granted、messages 新增一项，并引用 v18 与 v19；它没有给出 v19 的其他当前值，因此是 StateDiff 而非 StateSnapshot。
      en: A record only states that approval changed from pending to granted and one message was added, referencing v18 and v19. It omits all other current v19 values, so it is StateDiff rather than StateSnapshot.
      ja: 記録はapprovalがpendingからgrantedへ変わりmessagesが1件増えたこととv18・v19だけを示す。他のv19現在値を欠くためStateSnapshotではなくStateDiffである。
    field_values: {}
    related_node_ids:
      - StateSnapshot
      - StateDiff
      - StateRecord
    related_relation_ids:
      - StateSnapshot-is_a-StateRecord
    expected_result:
      zh: 该对象归入状态差异；不得用变化集合回答完整当前状态查询。
      en: The object is classified as StateDiff and cannot answer a complete-current-state query.
      ja: 対象はStateDiffに分類され、完全な現在状態照会には使えない。
    why_valid_or_invalid:
      zh: 快照保存某时点的一致状态集合，差异只保存两个版本之间的变化。
      en: A snapshot preserves a consistent state set at one time, whereas a diff preserves only changes between versions.
      ja: スナップショットは一時点の一貫状態集合、差分は版間の変更だけを保存する。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-snapshot-001
