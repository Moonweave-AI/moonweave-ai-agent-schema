schema: moonweave.ai/ontology-node/v1
id: Checkpoint
kind: concept
status: accepted
labels: {zh: 恢复检查点, en: Recovery checkpoint, ja: 復旧チェックポイント}
semantics:
  short_definition: {zh: 有意保留的 StateRecord，作为经验证的恢复边界，可从中恢复或重放运行时上下文。, en: "A StateRecord intentionally retained as a verified recovery boundary from which runtime context can be restored or replayed.", ja: ランタイムコンテキストを復元またはリプレイできる、検証済み復旧境界として意図的に保持される StateRecord。}
  definition: {zh: Checkpoint 是一个具有完整性和兼容性证据的持久版本化状态 Entity，可供 RestoreActivity 或 ReplayActivity 使用。它不是生成它的 CheckpointCaptureActivity、仅用于检查的通用 StateSnapshot、会话暂停事件、OTel Span 或 Log Record。, en: "A Checkpoint is a durable versioned state Entity with integrity and compatibility evidence that a RestoreActivity or ReplayActivity can consume. It is not the CheckpointCaptureActivity that generates it, a generic StateSnapshot retained only for inspection, a session pause event, or an OTel Span or Log Record.", ja: Checkpoint は RestoreActivity または ReplayActivity が利用できる完全性および互換性証拠を伴う永続的でバージョン化された状態 Entity である。それを生成する CheckpointCaptureActivity、検査だけのために保持される汎用 StateSnapshot、セッション停止イベント、OTel Span、Log Record ではない。}
  why_needed: {zh: 容错和时间旅行需要一个具名安全恢复边界，在恢复有状态工作前可验证其内容和溯源。, en: "Fault tolerance and time travel require a named safe recovery boundary whose contents and provenance can be verified before resuming stateful work.", ja: 耐障害性とタイムトラベルには、状態を持つ作業を再開する前に内容と来歴を検証できる名前付きの安全な復旧境界が必要である。}
  includes:
    - {zh: 检查点 ID、状态版本、完整性摘要、兼容性引用和恢复范围。, en: "Checkpoint ID, state version, integrity digest, compatibility reference, and recovery scope.", ja: チェックポイント ID、状態バージョン、完全性ダイジェスト、互換性参照、復旧スコープ。}
    - {zh: 为恢复、重放、中断处理或故障恢复而选择的持久线程或图状态。, en: "Persisted thread or graph state selected for restoration, replay, interruption handling, or failure recovery.", ja: 復元、リプレイ、中断処理、障害復旧のために選択された永続スレッドまたはグラフ状態。}
  excludes:
    - {zh: 没有恢复契约的任意历史快照、可变会话缓存和捕获操作。, en: "An arbitrary historical snapshot with no restore contract, a mutable session cache, and a capture operation.", ja: 復元契約のない任意の履歴スナップショット、可変セッションキャッシュ、取得操作。}
    - {zh: 声明检查点存在的遥测事件。, en: A telemetry event stating that a checkpoint exists., ja: チェックポイントの存在を示すテレメトリーイベント。}
  semantic_kind: entity
  aliases: [recovery state, restore point]
engineering:
  explanation: {zh: 捕获活动只有在持久提交和完整性检查之后才会生成检查点。随后恢复和重放操作选择其标识符、验证兼容性，并消费其固定状态，而不会原地修改检查点记录。, en: "A capture activity produces a checkpoint only after durable commit and integrity checks. Restore and replay operations then select its identifier, validate compatibility, and consume its fixed state without mutating the checkpoint record in place.", ja: 取得 Activity は耐久コミットと完全性検査の後にのみチェックポイントを生成する。復元およびリプレイ操作はその識別子を選び、互換性を検証し、チェックポイント記録をインプレースで変更せずに固定状態を消費する。}
  typical_input:
    - description: {zh: 已捕获状态, en: Captured state, ja: 取得済み状態}
      format: |-
        {"checkpoint_id":"checkpoint-4","state_version":"18","state_digest":"sha256:2d7a...","recovery_scope":"session-73"}
  typical_output:
    - description: {zh: 可恢复检查点, en: Recovery-ready checkpoint, ja: 復旧可能なチェックポイント}
      format: |-
        {"checkpoint_id":"checkpoint-4","state_version":"18","integrity_verified":true,"restore_compatible":true}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents checkpointers persisting graph state as checkpoints for thread-scoped continuity and recovery.}
structure:
  identity_keys: [record_id, state_record_id, checkpoint_id, state_version]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并与检查点属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord through StateRecord for the same persisted record as this checkpoint., ja: このチェックポイントと同じ永続記録に対して StateRecord 経由で ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: checkpoint-4
      source_claims: [claim-recovery-checkpoint]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并固定为状态的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord through StateRecord and fixed to state., ja: StateRecord 経由で ObservabilityRecord から継承し state に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [state]
      example_value: state
      source_claims: [claim-recovery-checkpoint]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承的检查点记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord through StateRecord for the finalized checkpoint record., ja: 確定したチェックポイント記録に対して StateRecord 経由で ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-recovery-checkpoint]
    - id: state_record_id
      labels: {zh: 状态记录 ID, en: State record ID, ja: 状態記録 ID}
      definitions: {zh: 从 StateRecord 继承并与检查点属于同一状态表示的稳定标识符。, en: Stable state-representation identifier inherited from StateRecord for the same record as this checkpoint., ja: このチェックポイントと同じ状態表現に対して StateRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: checkpoint-4
      source_claims: [claim-recovery-checkpoint]
    - id: captured_at
      labels: {zh: 捕获时间, en: Capture time, ja: 取得時刻}
      definitions: {zh: 从 StateRecord 继承的检查点状态版本被选择或最终确定的时间。, en: Time inherited from StateRecord at which the checkpoint state version was selected or finalized., ja: チェックポイント状態バージョンが選択または確定された StateRecord から継承した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-recovery-checkpoint]
    - id: checkpoint_id
      labels: {zh: 检查点 ID, en: Checkpoint ID, ja: チェックポイント ID}
      definitions: {zh: 一个恢复状态记录的稳定标识符。, en: Stable identifier of one recovery state record., ja: 一つの復旧状態記録の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: checkpoint-4
      source_claims: [claim-recovery-checkpoint]
    - id: state_version
      labels: {zh: 状态版本, en: State version, ja: 状態バージョン}
      definitions: {zh: 此检查点序列化的运行时状态版本。, en: Runtime-state version serialized by this checkpoint., ja: このチェックポイントにより直列化されたランタイム状態バージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '18'
      source_claims: [claim-recovery-checkpoint]
    - id: state_digest
      labels: {zh: 状态摘要, en: State digest, ja: 状態ダイジェスト}
      definitions: {zh: 检查点序列化状态表示的完整性摘要。, en: Integrity digest of the checkpoint's serialized state representation., ja: チェックポイントの直列化状態表現の完全性ダイジェスト。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:2d7a6347d3f0abc9dc4f713cac0392fced2fe3af03bc9246e4f2d5b8c5a3f991
      source_claims: [claim-recovery-checkpoint]
  constraints:
    - id: checkpoint-recovery-integrity
      severity: error
      language: plain
      expression: A recovery-ready checkpoint must have fixed state version, integrity digest, compatibility evidence, and capture provenance before RestoreActivity or ReplayActivity may use it.
      explanation: {zh: 没有恢复保证的便捷快照不得被视为安全恢复输入。, en: A convenience snapshot without recovery guarantees must not be treated as safe restore input., ja: 復旧保証のない便宜的スナップショットを安全な復元入力として扱ってはならない。}
      source_claims: [claim-recovery-checkpoint]
  required_relations: [Checkpoint-specializes-StateRecord]
examples:
  - id: checkpoint-positive
    labels: {zh: "LangGraph CheckpointSaver.put", en: "LangGraph CheckpointSaver.put", ja: "LangGraph CheckpointSaver.put"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; Checkpoint maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; Checkpoint maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; Checkpoint provenance graph."}
    field_values: {checkpoint_id: 1f070a87-33b3-6d36-8001-50c306580336, thread_id: thread-1}
    related_node_ids: [Checkpoint, StateSnapshot, StateRecord]
    related_relation_ids: []
    source_claims: [claim-langgraph-checkpoint]
  - id: checkpoint-counterexample
    labels: {zh: "OTel trace 非 Checkpoint", en: "OTel trace not Checkpoint", ja: "OTel trace は Checkpoint ではない"}
    descriptions: {zh: "Log without trace_id/span_id cannot serve as OTel-style Checkpoint TraceSpan.", en: "Log without trace_id/span_id cannot serve as OTel-style Checkpoint TraceSpan.", ja: "Missing trace_id rejects OTel-style Checkpoint."}
    field_values: {trace_id: 4bf92f3577b34da6a3ce929d0e0e4736}
    related_node_ids: [TraceRecord]
    related_relation_ids: []
    source_claims: [claim-langgraph-checkpoint]
  - id: checkpoint-boundary
    labels: {zh: "Checkpoint 与 StateSnapshot 边界", en: "Checkpoint versus StateSnapshot", ja: "Checkpoint と StateSnapshot 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; Checkpoint must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; Checkpoint must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {checkpoint_id: 1f070a87-33b3-6d36-8001-50c306580336}
    related_node_ids: [Checkpoint, StateSnapshot]
    related_relation_ids: []
    source_claims: [claim-langgraph-checkpoint]
  - id: checkpoint-instance-cp-18
    labels: {zh: "PostgresSaver checkpoint 实例", en: "PostgresSaver checkpoint instance", ja: "PostgresSaver checkpoint 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->Checkpoint.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->Checkpoint.", ja: "OTel instance maps to Checkpoint."}
    field_values: {checkpoint_id: 1f070a87-33b3-6d36-8001-50c306580336, thread_id: thread-1}
    related_node_ids: [Checkpoint, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-langgraph-checkpoint]
parent_relation:
  id: Checkpoint-specializes-StateRecord
  predicate: is_a
  target: concept:StateRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是恢复检查点, en: is a recovery checkpoint, ja: 復旧チェックポイントである}
  definitions: {zh: 每个 Checkpoint 都是具有已验证恢复和重放语义的 StateRecord。, en: Every Checkpoint is a StateRecord with verified recovery and replay semantics., ja: すべての Checkpoint は検証済みの復旧およびリプレイ意味を持つ StateRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_checkpoint, labels: {zh: 具有检查点, en: has checkpoint, ja: チェックポイントを持つ}}
  conditions:
    - id: checkpoint-parent-condition
      severity: error
      expression: Require a fixed state version, integrity evidence, and documented recovery compatibility.
      explanations: {zh: 通用快照和缓存不能被悄然升级为恢复检查点。, en: General snapshots and caches cannot be silently upgraded to recovery checkpoints., ja: 汎用スナップショットとキャッシュを復旧チェックポイントへ暗黙に昇格させることはできない。}
      source_claims: [claim-recovery-checkpoint]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-recovery-checkpoint]
relations: []
sources:
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents checkpointers persisting thread graph state as checkpoints for continuity, recovery, interruption, and time travel.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines tracing spans separately from durable checkpoint state Entities.
source_claims:
  - id: claim-recovery-checkpoint
    source: langgraph-persistence
    supports: LangGraph checkpointers persist thread graph state as checkpoints for short-term thread-scoped memory, conversation continuity, human-in-the-loop workflows, time travel, and fault tolerance.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

