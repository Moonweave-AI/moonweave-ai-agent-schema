schema: moonweave.ai/ontology-node/v1
id: Checkpoint
kind: concept
status: accepted
labels:
  en: checkpoint
  zh: 检查点
  ja: チェックポイント
semantics:
  short_definition:
    zh: 可供恢复或回放定位的持久化状态边界记录。
    en: A persisted state-boundary record addressable for restore or replay.
    ja: 復元または再生で指定できる永続化状態境界記録。
  definition:
    zh: 检查点是一种 StateRecord，标识一次运行在可恢复边界处持久化的状态版本。它关联所属会话、捕获步骤、StateSnapshot、待处理任务或下一执行位置及完整性摘要；CheckpointCaptureActivity 创建它，而检查点记录本身不是保存动作，也不是状态内容的全部副本。
    en: A Checkpoint is a StateRecord identifying the persisted state version of a run at a resumable boundary. It links the session, capture step, StateSnapshot, pending work or next execution position, and integrity digest. CheckpointCaptureActivity creates it; the record is neither the capture action nor necessarily a full copy of state.
    ja: Checkpoint は、再開可能境界で永続化された実行状態版を識別する StateRecord です。所属セッション、取得ステップ、StateSnapshot、保留作業または次実行位置、完全性要約を関連付けます。CheckpointCaptureActivity が作成し、記録自体は取得動作でも状態の完全コピーでもありません。
  why_needed:
    zh: 检查点为崩溃恢复、暂停后继续、人工介入和时间旅行提供稳定的寻址点，使系统能够明确选择哪一版状态继续；只有 StateSnapshot 而没有运行边界与下一位置，往往不足以安全恢复。
    en: Checkpoints provide stable addresses for crash recovery, pause-and-resume, human intervention, and time travel, allowing the system to select an exact state version. A StateSnapshot without the execution boundary and next position is often insufficient for safe resumption.
    ja: チェックポイントは障害復旧、停止再開、人手介入、時間移動の安定した指定点となり、再開する状態版を明確に選べます。実行境界と次位置を欠く StateSnapshot だけでは安全な再開に不足します。
  includes:
    - zh: 包括图执行每个 super-step 后保存的检查点，以及人工审批前保存的、带会话版本和下一节点位置的恢复点。
      en: Includes graph checkpoints saved after a super-step and approval-boundary restore points carrying session version and next-node position.
      ja: グラフの super-step 後に保存するチェックポイント、および承認前に保存しセッション版と次ノード位置を持つ復元点を含みます。
  excludes:
    - zh: 不包括实际执行持久化的 CheckpointCaptureActivity、仅保存值集合的 StateSnapshot，以及只描述两个状态变化量的 StateDiff。
      en: Excludes the CheckpointCaptureActivity that performs persistence, a StateSnapshot containing only state values, and a StateDiff describing changes between states.
      ja: 永続化を実行する CheckpointCaptureActivity、値集合だけの StateSnapshot、二状態間の変化だけを示す StateDiff は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: Checkpoint-example-positive-001
    kind: positive
    labels:
      zh: 可恢复图执行边界
      en: Resumable graph-execution boundary
      ja: 再開可能なグラフ実行境界
    scenario_id: null
    descriptions:
      zh: 审批节点完成后，检查点记录 thread_id、单调递增的 checkpoint_id、各通道值与版本、已完成写入、下一待执行节点以及状态摘要；恢复器可据此继续同一线程。
      en: After an approval node completes, a checkpoint records the thread identifier, monotonic checkpoint identifier, channel values and versions, completed writes, the next pending node, and a state digest so execution can resume in the same thread.
      ja: 承認ノード完了後、チェックポイントはスレッド識別子、単調増加する識別子、チャネル値と版、完了済み書込み、次の待機ノード、状態ダイジェストを記録し、同じスレッドを再開できる。
    field_values:
      record_id: checkpoint-record-cp-approval-27
      record_kind: checkpoint
      observed_at: 2026-07-16T11:30:27.040Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/checkpoint-cp-approval-27
    related_node_ids:
      - Checkpoint
      - StateRecord
      - StateSnapshot
      - RuntimeSession
    related_relation_ids:
      - Checkpoint-is_a-StateRecord
      - checkpoint_belongs_to_session
      - Checkpoint-references-StateSnapshot
    expected_result:
      zh: 该记录可唯一定位一个可恢复版本，并让恢复逻辑找到状态和值得继续的执行位置。
      en: The record uniquely identifies a resumable version and lets restoration locate both saved state and the next execution position.
      ja: 記録は再開可能な版を一意に示し、復元処理が保存状態と次の実行位置を特定できる。
    why_valid_or_invalid:
      zh: 它同时具备持久化状态版本、线程归属和恢复位置，符合检查点而不仅是普通快照。
      en: It combines a persisted state version, thread membership, and a resumption position, making it a checkpoint rather than a generic snapshot.
      ja: 永続化された状態版、スレッド所属、再開位置を併せ持つため、単なるスナップショットではなくチェックポイントである。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-001
  - id: Checkpoint-example-boundary-001
    kind: boundary
    labels:
      zh: 无恢复坐标的状态副本
      en: State copy without a resumption coordinate
      ja: 再開座標を持たない状態コピー
    scenario_id: null
    descriptions:
      zh: 调试面板导出当前变量的 JSON 副本，但未记录 thread_id、checkpoint_id、通道版本、待处理写入或下一节点。它是状态快照材料，却不能作为运行恢复坐标。
      en: A debug panel exports a JSON copy of current variables but records no thread identifier, checkpoint identifier, channel versions, pending writes, or next node. It is snapshot material, not a runtime resumption coordinate.
      ja: デバッグ画面が現在変数のJSONコピーを出力するが、スレッドID、チェックポイントID、チャネル版、保留書込み、次ノードを記録しない。これは状態資料であり実行再開座標ではない。
    field_values: {}
    related_node_ids:
      - Checkpoint
      - StateSnapshot
      - StateRecord
    related_relation_ids:
      - Checkpoint-is_a-StateRecord
      - Checkpoint-references-StateSnapshot
    expected_result:
      zh: 该对象归入状态快照而非检查点；不得据此声明可无歧义恢复执行。
      en: The object remains a StateSnapshot rather than a Checkpoint and cannot support an unambiguous resumption claim.
      ja: 対象はCheckpointではなくStateSnapshotに留まり、曖昧さなく実行再開できるとは主張できない。
    why_valid_or_invalid:
      zh: 保存值副本不等于保存执行版本、线程归属和继续位置。
      en: Copying values is not the same as preserving an execution version, thread identity, and continuation point.
      ja: 値の複製は、実行版、スレッド識別子、継続位置の保存とは異なる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-001
external_mappings: []
applicability:
