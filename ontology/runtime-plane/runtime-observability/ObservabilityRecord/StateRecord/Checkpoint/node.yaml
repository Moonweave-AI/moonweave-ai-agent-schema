    source: src-otel-protocol
    supports: OpenTelemetry OTLP export provides traceId, spanId, and parent links for TraceSpan mapping.
    locator: OTLP > TracesData
    evidence_kind: design-inference
    confidence: high
  - id: claim-langsmith-observability
    source: src-langsmith
    supports: LangSmith run trees expose parent_run_id hierarchy mappable to TraceRecord.
    locator: Runs > run tree
    evidence_kind: design-inference
    confidence: high
  - id: claim-checkpoint-design
    source: src-runtime-observability-design
    supports: Checkpoint is recoverable state boundary for replay and restore.
    locator: Checkpoint boundary
    evidence_kind: design-inference
    confidence: high
