schema: moonweave.ai/ontology-node/v1
id: Checkpoint
kind: concept
labels:
  en: checkpoint
  zh: 检查点
  ja: チェックポイント
semantics:
  short_definition:
    zh: 可供恢复或回放定位的持久化状态边界记录。
    en: A persisted state-boundary record addressable for restore or replay.
    ja: 復元または再生で指定できる永続化状態境界記録。
  definition:
    zh: 检查点是一种 StateRecord，标识一次运行在可恢复边界处持久化的状态版本。它关联所属会话、捕获步骤、StateSnapshot、待处理任务或下一执行位置及完整性摘要；CheckpointCaptureActivity 创建它，而检查点记录本身不是保存动作，也不是状态内容的全部副本。
    en: A Checkpoint is a StateRecord identifying the persisted state version of a run at a resumable boundary. It links the session, capture step, StateSnapshot, pending work or next execution position, and integrity digest. CheckpointCaptureActivity creates it; the record is neither the capture action nor necessarily a full copy of state.
    ja: Checkpoint は、再開可能境界で永続化された実行状態版を識別する StateRecord です。所属セッション、取得ステップ、StateSnapshot、保留作業または次実行位置、完全性要約を関連付けます。CheckpointCaptureActivity が作成し、記録自体は取得動作でも状態の完全コピーでもありません。
  why_needed:
    zh: 检查点为崩溃恢复、暂停后继续、人工介入和时间旅行提供稳定的寻址点，使系统能够明确选择哪一版状态继续；只有 StateSnapshot 而没有运行边界与下一位置，往往不足以安全恢复。
    en: Checkpoints provide stable addresses for crash recovery, pause-and-resume, human intervention, and time travel, allowing the system to select an exact state version. A StateSnapshot without the execution boundary and next position is often insufficient for safe resumption.
    ja: チェックポイントは障害復旧、停止再開、人手介入、時間移動の安定した指定点となり、再開する状態版を明確に選べます。実行境界と次位置を欠く StateSnapshot だけでは安全な再開に不足します。
  includes:
    - zh: 包括图执行每个 super-step 后保存的检查点，以及人工审批前保存的、带会话版本和下一节点位置的恢复点。
      en: Includes graph checkpoints saved after a super-step and approval-boundary restore points carrying session version and next-node position.
      ja: グラフの super-step 後に保存するチェックポイント、および承認前に保存しセッション版と次ノード位置を持つ復元点を含みます。
  excludes:
    - zh: 不包括实际执行持久化的 CheckpointCaptureActivity、仅保存值集合的 StateSnapshot，以及只描述两个状态变化量的 StateDiff。
      en: Excludes the CheckpointCaptureActivity that performs persistence, a StateSnapshot containing only state values, and a StateDiff describing changes between states.
      ja: 永続化を実行する CheckpointCaptureActivity、値集合だけの StateSnapshot、二状態間の変化だけを示す StateDiff は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Checkpoint 映射 LangGraph checkpoint_id、PostgresSaver 快照键与 StateSnapshot 引用；RestoreActivity 必须指向确切 checkpoint 身份。
    en: Checkpoint maps LangGraph checkpoint_id, PostgresSaver snapshot keys, and StateSnapshot references; RestoreActivity must reference exact checkpoint identity.
    ja: Checkpoint は LangGraph checkpoint_id/StateSnapshot を写像し exact identity が restore に必須です。
  typical_input:
    - description: OTLP export or LangSmith run tree ingest.
      format: '{"checkpoint_id":"1f070a87-33b3-6d36-8001-50c306580336","thread_id":"thread-42"}'
      source_claims:
        - claim-otel-observability
        - claim-checkpoint-design
  typical_output:
    - description: Moonweave observability record projection.
      format: '{"checkpoint_id":"checkpoint-330-1","state_snapshot_id":"snap-330-1"}'
      source_claims:
        - claim-checkpoint-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: Checkpoint-example-positive-001
    labels:
      zh: LangGraph CheckpointSaver.put
      en: LangGraph CheckpointSaver.put
      ja: LangGraph CheckpointSaver.put
    descriptions:
      zh: LangGraph checkpointer.put(config, checkpoint, metadata, new_versions) 持久化 checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336、channel_values 与 pending_writes（docs.langchain.com/langgraph/persistence）。
      en: LangGraph checkpointer.put(config, checkpoint, metadata, new_versions) persists checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336, channel_values, and pending_writes.
      ja: LangGraph checkpointer.put が checkpoint_id と channel_values を永続化する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: checkpoint-record-cp-approval-27
      record_kind: checkpoint
      observed_at: 2026-07-16T11:30:27.040Z
      provenance_ref: langgraph-checkpointer
      runtime_correlation_ref: session-8/checkpoint-cp-approval-27
    related_node_ids:
      - Checkpoint
      - StateRecord
      - StateSnapshot
      - RuntimeSession
    related_relation_ids:
      - Checkpoint-is_a-StateRecord
      - checkpoint_belongs_to_session
      - Checkpoint-references-StateSnapshot
    source_claims:
      - claim-checkpoint-design
  - id: Checkpoint-example-boundary-001
    labels:
      zh: OTel trace 非 Checkpoint
      en: OTel trace not Checkpoint
      ja: OTel trace は Checkpoint ではない
    descriptions:
      zh: OTel trace export JSON 含 trace_id/span 树但无 channel_values/next/checkpoint tuple，不是 LangGraph Checkpoint。
      en: OTel trace export JSON has trace_id/span tree but no channel_values/next/checkpoint tuple, not LangGraph Checkpoint.
      ja: OTel trace は LangGraph Checkpoint ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - Checkpoint
      - StateSnapshot
      - StateRecord
    related_relation_ids:
      - Checkpoint-is_a-StateRecord
      - Checkpoint-references-StateSnapshot
    source_claims:
      - claim-checkpoint-design
  - id: Checkpoint-example-3
    labels:
      zh: Checkpoint 与 StateSnapshot 边界
      en: Checkpoint versus StateSnapshot
      ja: Checkpoint と StateSnapshot 境界
    descriptions:
      zh: Checkpoint 是存储 tuple；graph.get_state 返回 StateSnapshot 查询视图；put tuple 与 get_state view 角色不同。
      en: Checkpoint is storage tuple; graph.get_state returns StateSnapshot query view; put tuple and get_state view have different roles.
      ja: Checkpoint tuple と StateSnapshot クエリ view は役割が異なる。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - Checkpoint
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-design
      - claim-checkpoint-design
  - id: Checkpoint-example-4
    labels:
      zh: PostgresSaver checkpoint 实例
      en: PostgresSaver checkpoint instance
      ja: PostgresSaver checkpoint 事例
    descriptions:
      zh: LangGraph PostgresSaver 在 thread_id=thread-1 super-step 后写入 checkpoint，含 pending_writes 支持 HITL interrupt 后 resume。
      en: LangGraph PostgresSaver writes checkpoint after super-step on thread_id=thread-1 with pending_writes supporting HITL interrupt resume.
      ja: PostgresSaver checkpoint は HITL resume を支持する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - Checkpoint
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-design
      - claim-checkpoint-design
parent_relation:
  id: Checkpoint-is_a-StateRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 Checkpoint 都是 StateRecord，其种差是用稳定标识固定一个可恢复执行边界，并引用相应状态快照、执行位置和恢复元数据。
    en: Every Checkpoint is a StateRecord distinguished by a stable identity that fixes a recoverable execution boundary and references its state snapshot, execution position, and recovery metadata.
    ja: すべての Checkpoint は StateRecord で、安定 ID により回復可能な実行境界を固定し、snapshot・実行位置・回復 metadata を参照する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-checkpoint-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: checkpoint_belongs_to_session
    predicate: checkpoint_belongs_to_session
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: checkpoint belongs to session
      en: checkpoint belongs to session
      ja: checkpoint belongs to session
    definitions:
      zh: Checkpoint 通过 checkpoint_belongs_to_session 指向其状态所属的 RuntimeSession；该关系固定线程或会话范围，不表示会话是检查点的分类父项。
      en: checkpoint_belongs_to_session links a Checkpoint to the RuntimeSession whose state it preserves, fixing thread or session scope without classifying the checkpoint as a session.
      ja: checkpoint_belongs_to_session は Checkpoint を保存対象の RuntimeSession に結び、thread/session scope を固定しますが Checkpoint を Session の下位概念にはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_checkpoint_belongs_to_session
      labels:
        zh: 反向：checkpoint belongs to session
        en: is target of checkpoint belongs to session
        ja: 逆方向：checkpoint belongs to session
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RuntimeSession
  - id: Checkpoint-references-StateSnapshot
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: references
      en: references
      ja: references
    definitions:
      zh: Checkpoint 通过 references 指向它所固定的 StateSnapshot 身份；关系保留快照与恢复边界的区别，不把引用对象复制进检查点类型。
      en: Checkpoint references the StateSnapshot identity fixed at its recovery boundary, preserving the distinction between the snapshot and the checkpoint instead of copying one type into the other.
      ja: Checkpoint は回復境界で固定した StateSnapshot identity を references し、snapshot と checkpoint の区別を保って一方を他方の type にしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_references
      labels:
        zh: 反向 references
        en: inverse references
        ja: 逆 references
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StateSnapshot
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
