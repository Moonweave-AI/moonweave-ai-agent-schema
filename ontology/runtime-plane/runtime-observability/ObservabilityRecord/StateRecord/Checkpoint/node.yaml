sibling_differentiation:
  - sibling_concept_id: StateDiff
    shared_parent_concept_id: StateRecord
    differentia:
      zh: 端点特定对照：父节点 StateRecord：Checkpoint（semantic kind=information，骨架 Checkpoint-is_a-StateRecord）；StateDiff（semantic kind=information，骨架 StateDiff-is_a-StateRecord）。双端条件：Checkpoint 条件：“检查点是一种状态记录（StateRecord），保存会话、版本、创建活动、状态摘要和所引用的 StateSnapshot；捕获动作由 CheckpointActivity 执行，而该记录本身不修改或生成状态”；StateDiff 条件：“状态差异属于状态记录，区别于其他同类对象的条件是：它记录从一个状态快照到另一个状态快照的差别，显示两个已捕获状态之间变化的值、通道、产物或生命周期位置”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent StateRecord: Checkpoint (semantic kind=information, backbone Checkpoint-is_a-StateRecord); StateDiff (semantic kind=information, backbone StateDiff-is_a-StateRecord). Endpoint conditions: Checkpoint condition: “A Checkpoint is a StateRecord that stores session, version, creating activity, state digest, and referenced StateSnapshot; CheckpointActivity performs capture, while the record itself neither mutates nor generates state”; StateDiff condition: “State diff is a state record whose defining condition is that it is a difference record from one state snapshot to another, showing changed values, channels, artifacts, or lifecycle positions between two captured states”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 StateRecord：Checkpoint（semantic kind=information、バックボーン Checkpoint-is_a-StateRecord）；StateDiff（semantic kind=information、バックボーン StateDiff-is_a-StateRecord）。両端条件：Checkpoint の条件：「状態記録に属するチェックポイントは、次の事実を種差とします：それはセッション、版、作成活動、状態要約、参照 StateSnapshot を記録します」；StateDiff の条件：「状態差分は状態記録のうち、次の事実を定義条件とする対象です：それは、ある状態スナップショットから別の状態スナップショットへの差を記録し、二つの捕捉済み状態の間で変化した値、チャネル、成果物、ライフサイクル位置を示します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-checkpoint-001
