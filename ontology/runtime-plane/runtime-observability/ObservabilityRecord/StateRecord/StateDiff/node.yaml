schema: moonweave.ai/ontology-node/v1
id: StateDiff
kind: concept
status: accepted
labels: {zh: 状态差异记录, en: State difference record, ja: 状態差分記録}
semantics:
  short_definition: {zh: 描述两个已标识运行时状态版本之间有界变更集合的 StateRecord。, en: "A StateRecord that describes a bounded set of changes between two identified runtime-state versions.", ja: 二つの識別済みランタイム状態バージョン間の限定された変更集合を記述する StateRecord。}
  definition: {zh: StateDiff 是一种持久自定义 Entity，描述从一个固定状态版本转换到另一个版本所需的添加、删除或修改。它不是完整状态负载、检查点恢复保证、状态变更 Activity，也不是状态变更时发生的 OTel event。, en: "A StateDiff is a durable custom Entity describing additions, removals, or modifications needed to transition from one fixed state version to another. It is not a complete state payload, a checkpoint recovery guarantee, a state mutation Activity, or an OTel event that happened while state changed.", ja: StateDiff は一つの固定状態バージョンから別の状態バージョンへ遷移するために必要な追加、削除、変更を記述する永続カスタム Entity である。完全な状態ペイロード、チェックポイントの復旧保証、状態変更 Activity、または状態変化中に発生した OTel event ではない。}
  why_needed: {zh: 增量检查和高存储效率分析需要显式变更表示，以在不修改任一存储状态记录的前提下保留源和目标版本身份。, en: "Incremental inspection and storage-efficient analysis need explicit change representations that preserve source and target version identity without mutating either stored state record.", ja: 増分検査とストレージ効率の高い分析には、いずれの保存済み状態記録も変更せずにソースと対象バージョンの識別性を保存する明示的な変更表現が必要である。}
  includes:
    - {zh: 差异 ID、基准状态版本、目标状态版本、变更路径计数和可选补丁内容摘要。, en: "Diff ID, base state version, target state version, changed-path count, and optional patch-content digest.", ja: 差分 ID、基準状態バージョン、対象状態バージョン、変更パス数、任意のパッチ内容ダイジェスト。}
    - {zh: 在已声明比较算法下从两条状态记录导出的结构化变更。, en: Structured changes derived from two state records under a declared comparison algorithm., ja: 宣言済み比較アルゴリズムのもとで二つの状態記録から導出された構造化変更。}
  excludes:
    - {zh: 完整 StateSnapshot、Checkpoint 恢复边界，或应用变更的实时操作。, en: "A full StateSnapshot, a Checkpoint recovery boundary, or the live operation that applies changes.", ja: 完全な StateSnapshot、Checkpoint の復旧境界、または変更を適用するライブ操作。}
    - {zh: 没有已标识状态版本的追踪 span 属性差异。, en: A trace span attribute delta without identified state versions., ja: 識別済み状態バージョンを持たないトレース span 属性差分。}
  semantic_kind: entity
  aliases: [state delta, state patch record]
engineering:
  explanation: {zh: 比较操作读取两个不可变状态表示，应用具名差异算法，写入变更集和完整性摘要，并保留对基准和目标版本的引用。之后应用差异是独立的运行时 Activity，可能独立失败。, en: "A comparison operation reads two immutable state representations, applies a named diff algorithm, writes the change set and integrity digest, and preserves references to base and target versions. Applying the diff later is a separate runtime Activity that may fail independently.", ja: 比較操作は二つの不変状態表現を読み、名前付き差分アルゴリズムを適用し、変更集合と完全性ダイジェストを書き込み、基準および対象バージョンへの参照を保持する。後で差分を適用することは独立したランタイム Activity であり、独立して失敗しうる。}
  typical_input:
    - description: {zh: 状态比较请求, en: State comparison request, ja: 状態比較リクエスト}
      format: |-
        {"base_state_version":"18","target_state_version":"19","comparison_algorithm":"json-patch","source_session_id":"session-73"}
  typical_output:
    - description: {zh: 状态差异记录, en: State difference record, ja: 状態差分記録}
      format: |-
        {"diff_id":"diff-19","base_state_version":"18","target_state_version":"19","changed_path_count":3}
  reference_implementations:
    - {name: PROV-O Entity, url: https://www.w3.org/TR/prov-o/, description: Supports representing fixed derived data separately from the Activity that computes or applies it.}
structure:
  identity_keys: [record_id, state_record_id, state_version, diff_id, base_state_version, target_state_version]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并与状态差异属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord through StateRecord for the same persisted record as this state diff., ja: この状態差分と同じ永続記録に対して StateRecord 経由で ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: diff-19
      source_claims: [claim-state-diff-entity]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承并固定为状态的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord through StateRecord and fixed to state., ja: StateRecord 経由で ObservabilityRecord から継承し state に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [state]
      example_value: state
      source_claims: [claim-state-diff-entity]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 经由 StateRecord 继承的状态差异记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord through StateRecord for the finalized state-diff record., ja: 確定した状態差分記録に対して StateRecord 経由で ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:16:00Z'
      source_claims: [claim-state-diff-entity]
    - id: state_record_id
      labels: {zh: 状态记录 ID, en: State record ID, ja: 状態記録 ID}
      definitions: {zh: 从 StateRecord 继承并与状态差异属于同一状态表示的稳定标识符。, en: Stable state-representation identifier inherited from StateRecord for the same record as this state diff., ja: この状態差分と同じ状態表現に対して StateRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: diff-19
      source_claims: [claim-state-diff-entity]
    - id: state_version
      labels: {zh: 状态版本, en: State version, ja: 状態バージョン}
      definitions: {zh: 从 StateRecord 继承的该差异所表示的目标状态版本。, en: State version inherited from StateRecord and represented by the diff's target state., ja: 差分の対象状態で表される StateRecord から継承した状態バージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '19'
      source_claims: [claim-state-diff-entity]
    - id: captured_at
      labels: {zh: 捕获时间, en: Capture time, ja: 取得時刻}
      definitions: {zh: 从 StateRecord 继承的差异状态版本被选择或最终确定的时间。, en: Time inherited from StateRecord at which the represented diff state was selected or finalized., ja: 表現された差分状態が選択または確定された StateRecord から継承した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:16:00Z'
      source_claims: [claim-state-diff-entity]
    - id: diff_id
      labels: {zh: 状态差异 ID, en: State diff ID, ja: 状態差分 ID}
      definitions: {zh: 一项派生状态变更表示的稳定标识符。, en: Stable identifier of one derived state change representation., ja: 一つの導出状態変更表現の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: diff-19
      source_claims: [claim-state-diff-entity]
    - id: base_state_version
      labels: {zh: 基准状态版本, en: Base state version, ja: 基準状態バージョン}
      definitions: {zh: 较早状态表示的版本标识符。, en: Version identifier of the earlier state representation., ja: 先行する状態表現のバージョン識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '18'
      source_claims: [claim-state-diff-entity]
    - id: target_state_version
      labels: {zh: 目标状态版本, en: Target state version, ja: 対象状態バージョン}
      definitions: {zh: 较晚状态表示的版本标识符。, en: Version identifier of the later state representation., ja: 後続する状態表現のバージョン識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '19'
      source_claims: [claim-state-diff-entity]
  constraints:
    - id: state-diff-version-pair
      severity: error
      language: plain
      expression: A StateDiff must identify distinct base and target fixed state versions, a declared comparison algorithm, and integrity evidence for the derived change set.
      explanation: {zh: 没有端点的变更列表无法被解释、复现或安全应用。, en: "A change list without endpoints cannot be interpreted, reproduced, or safely applied.", ja: 端点のない変更リストは解釈、再現、安全な適用ができない。}
      source_claims: [claim-state-diff-entity]
  required_relations: [StateDiff-specializes-StateRecord]
examples:
  - id: state-diff-positive
    labels: {zh: "LangGraph 通道增量更新", en: "LangGraph channel incremental update", ja: "LangGraph チャネル増分更新"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateDiff maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; StateDiff maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; StateDiff TraceSpan/Record."}
    field_values: {record_id: diff-19, record_kind: state, recorded_at: '2026-07-18T09:16:00Z', state_record_id: diff-19, state_version: '19', captured_at: '2026-07-18T09:16:00Z', diff_id: diff-19, base_state_version: '18', target_state_version: '19'}
    related_node_ids: [StateDiff, StateRecord]
    related_relation_ids: [StateDiff-specializes-StateRecord]
    source_claims: [claim-state-diff-entity]
  - id: state-diff-counterexample
    labels: {zh: "Git diff 非 StateDiff", en: "Git diff not StateDiff", ja: "Git diff は StateDiff ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style StateDiff TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style StateDiff TraceRecord.", ja: "Missing trace rejects Langfuse-style StateDiff."}
    field_values: {session_id: session-73}
    related_node_ids: [RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-state-diff-entity]
  - id: state-diff-boundary
    labels: {zh: "StateDiff 与 StateSnapshot 边界", en: "StateDiff versus StateSnapshot", ja: "StateDiff と StateSnapshot 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; StateDiff must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; StateDiff must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {diff_id: diff-19}
    related_node_ids: [StateDiff, Execution]
    related_relation_ids: []
    source_claims: [claim-state-diff-entity]
  - id: state-diff-instance-19
    labels: {zh: "messages 通道 diff 实例", en: "messages channel diff instance", ja: "messages チャネル diff 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->StateDiff ObservabilityEvent.", en: "Phoenix instance: drift+quality->StateDiff ObservabilityEvent.", ja: "Phoenix instance maps to StateDiff Event."}
    field_values: {record_id: diff-19, record_kind: state, recorded_at: '2026-07-18T09:16:00Z', state_record_id: diff-19, state_version: '19', captured_at: '2026-07-18T09:16:00Z', diff_id: diff-19, base_state_version: '18', target_state_version: '19'}
    related_node_ids: [StateDiff, StateSnapshot, RuntimeSession, TraceSpan]
    related_relation_ids: [StateDiff-specializes-StateRecord]
    source_claims: [claim-state-diff-entity]
parent_relation:
  id: StateDiff-specializes-StateRecord
  predicate: is_a
  target: concept:StateRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是状态差异记录, en: is a state difference record, ja: 状態差分記録である}
  definitions: {zh: 每个 StateDiff 都是内容表示两个固定状态版本之间比较的 StateRecord。, en: Every StateDiff is a StateRecord whose content represents a comparison between two fixed state versions., ja: すべての StateDiff は内容が二つの固定状態バージョン間の比較を表す StateRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_state_diff, labels: {zh: 具有状态差异记录, en: has state difference record, ja: 状態差分記録を持つ}}
  conditions:
    - id: state-diff-parent-condition
      severity: error
      expression: Require distinct base and target versions and a declared diff representation rather than an unbounded mutable object.
      explanations: {zh: 状态差异由其两个固定端点定义。, en: State difference is defined by its two fixed endpoints., ja: 状態差分は二つの固定端点によって定義される。}
      source_claims: [claim-state-diff-entity]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-state-diff-entity]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines fixed Entities separate from Activities that derive or apply their data.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines Log Record semantics distinct from fixed state-difference entities.
source_claims:
  - id: claim-state-diff-entity
    source: prov-o-core
    supports: PROV-O treats durable fixed-aspect data as Entities, distinct from the Activities that produce, use, or apply that data.
    locator: Section 3.1, prov:Entity; Section 3.2, prov:Activity
    evidence_kind: standard
    confidence: high

