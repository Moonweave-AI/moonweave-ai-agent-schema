schema: moonweave.ai/ontology-node/v1
id: StateDiff
kind: concept
labels:
  en: state diff
  zh: 状态差异
  ja: 状態差分
semantics:
  short_definition:
    zh: 从一个已标识状态快照到另一个快照的变化记录。
    en: A change record from one identified state snapshot to another.
    ja: 識別済み状態スナップショット間の変化記録。
  definition:
    zh: 状态差异是一种 StateRecord，以明确的 from_snapshot 和 to_snapshot 为边界，只保存两者之间新增、删除或改变的状态项以及必要的比较元数据。它不代表任一完整状态，也不等于执行了这些变化的活动；若没有一对可识别快照，就不能称为该差异。
    en: A StateDiff is a StateRecord bounded by identified from_snapshot and to_snapshot values, containing only added, removed, or changed state items and comparison metadata. It represents neither complete state nor the activity that caused the changes; without an identifiable snapshot pair, it is not this diff.
    ja: StateDiff は識別された from_snapshot と to_snapshot を境界とし、追加・削除・変更された状態項目と比較メタデータだけを持つ StateRecord です。完全状態でも変更活動でもなく、識別可能な快照対がなければ差分になりません。
  why_needed:
    zh: 差异记录让调试者快速定位某一步究竟改变了哪些通道、任务或产物，也能在恢复后核对状态漂移，而无需反复比较两个完整快照。
    en: Diffs let reviewers locate exactly which channels, tasks, or artifacts changed in a step and check drift after restoration without repeatedly comparing full snapshots.
    ja: 差分により、ステップが変更したチャネル、タスク、成果物を特定し、完全快照を毎回比較せず復元後のずれを確認できます。
  includes:
    - zh: 包括快照 `s17` 到 `s18` 之间新增待审批任务、更新工具结果并移除旧错误标记的逐项变化记录。
      en: Includes a change set from snapshot `s17` to `s18` that adds a pending approval, updates a tool result, and removes a stale error marker.
      ja: 快照 `s17` から `s18` で承認待ちを追加し、ツール結果を更新し、古いエラー印を削除する変化集合を含みます。
  excludes:
    - zh: 不包括完整 StateSnapshot、用于恢复寻址的 Checkpoint、没有 from/to 快照身份的普通更新日志，以及造成变化的执行活动。
      en: Excludes a full StateSnapshot, a Checkpoint used for restore addressing, ordinary update logs without from/to snapshot identities, and the activity that caused the change.
      ja: 完全な StateSnapshot、復元指定用 Checkpoint、from/to 快照識別のない更新ログ、変化を起こした活動は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 StateDiff 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating StateDiff, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: StateDiff 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to StateDiff.
      format: |-
        # Example StateDiff ingest
        { "state-diff_ref": "example-1" }
      source_claims:
        - claim-state-diff-design
  typical_output:
    - description: Moonweave-local StateDiff projection.
      format: '{ "schema_owner": "moonweave-local-design", "state-diff_id": "example-1" }'
      source_claims:
        - claim-state-diff-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateDiff-example-positive-001
    labels:
      zh: LangGraph 通道增量更新
      en: LangGraph channel incremental update
      ja: LangGraph チャネル増分更新
    descriptions:
      zh: LangGraph 节点更新 messages 通道：StateDiff channel=messages、before_len=3、after_len=5、added_message_ids=[msg-4,msg-5]。
      en: "LangGraph node updates messages channel: StateDiff channel=messages, before_len=3, after_len=5, added_message_ids=[msg-4,msg-5]."
      ja: LangGraph messages チャネル更新を StateDiff として記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: state-diff-v18-v19
      record_kind: state-diff
      observed_at: 2026-07-16T11:29:19.010Z
      provenance_ref: state-comparison-service
      runtime_correlation_ref: session-8/snapshot-v18/snapshot-v19
    related_node_ids:
      - StateDiff
      - StateSnapshot
      - StateRecord
    related_relation_ids:
      - StateDiff-is_a-StateRecord
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    source_claims:
      - claim-state-diff-design
  - id: StateDiff-example-boundary-001
    labels:
      zh: Git diff 非 StateDiff
      en: Git diff not StateDiff
      ja: Git diff は StateDiff ではない
    descriptions:
      zh: GitHub PR unified diff 是 PatchArtifact 文本差异，不是 LangGraph runtime StateDiff channel 更新。
      en: GitHub PR unified diff is PatchArtifact text diff, not LangGraph runtime StateDiff channel update.
      ja: Git PR diff は PatchArtifact であり StateDiff ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateDiff
      - StateSnapshot
    related_relation_ids:
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    source_claims:
      - claim-state-diff-design
  - id: StateDiff-example-3
    labels:
      zh: StateDiff 与 StateSnapshot 边界
      en: StateDiff versus StateSnapshot
      ja: StateDiff と StateSnapshot 境界
    descriptions:
      zh: StateDiff 记录通道级 delta；StateSnapshot 是完整 values/next 视图；diff 可重建 snapshot 但不替代 snapshot 记录。
      en: StateDiff records channel-level delta; StateSnapshot is full values/next view; diff can reconstruct snapshot but does not replace snapshot record.
      ja: StateDiff は delta、StateSnapshot は完全 view である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateDiff
    related_relation_ids: []
    source_claims:
      - claim-state-diff-vendor
      - claim-state-diff-design
  - id: StateDiff-example-4
    labels:
      zh: messages 通道 diff 实例
      en: messages channel diff instance
      ja: messages チャネル diff 事例
    descriptions:
      zh: super-step N→N+1：StateDiff checkpoint_id=1f070a87...、channel=agent_state、patch={approved:true}。
      en: "super-step N→N+1: StateDiff checkpoint_id=1f070a87..., channel=agent_state, patch={approved:true}."
      ja: super-step 間の agent_state パッチを StateDiff として記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - StateDiff
    related_relation_ids: []
    source_claims:
      - claim-state-diff-vendor
      - claim-state-diff-design
parent_relation:
  id: StateDiff-is_a-StateRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 StateDiff 都是 StateRecord，其种差是以明确的 from_snapshot 与 to_snapshot 为边界，仅记录新增、删除和改变的状态项。
    en: Every StateDiff is a StateRecord distinguished by explicit from_snapshot and to_snapshot boundaries and by containing only added, removed, and changed state items.
    ja: すべての StateDiff は StateRecord で、明示 from_snapshot と to_snapshot を境界とし追加・削除・変更項目だけを含む点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-state-diff-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: state_diff_from_snapshot
    predicate: state_diff_from_snapshot
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: state diff from snapshot
      en: state diff from snapshot
      ja: state diff from snapshot
    definitions:
      zh: StateDiff 通过 state_diff_from_snapshot 指向比较起点 StateSnapshot，使每个删除或旧值都能在来源状态中验证。
      en: state_diff_from_snapshot links a StateDiff to its starting StateSnapshot so every removal and old value can be verified against source state.
      ja: state_diff_from_snapshot は StateDiff を比較開始 StateSnapshot に結び、削除項目と旧値を source state で検証可能にします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_state_diff_from_snapshot
      labels:
        zh: 反向：state diff from snapshot
        en: is target of state diff from snapshot
        ja: 逆方向：state diff from snapshot
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-state-diff-design
    distinct_fact_rationale:
      zh: from_snapshot 指向差异计算的基线快照；to_snapshot 指向应用差异后的结果快照。
      en: from_snapshot identifies the baseline snapshot; to_snapshot identifies the resulting snapshot after the diff is applied.
      ja: from_snapshot は差分の基準 snapshot、to_snapshot は差分適用後の結果 snapshot を示します。
    layout_role: cross-link
    target: concept:StateSnapshot
  - id: state_diff_to_snapshot
    predicate: state_diff_to_snapshot
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: state diff to snapshot
      en: state diff to snapshot
      ja: state diff to snapshot
    definitions:
      zh: StateDiff 通过 state_diff_to_snapshot 指向比较终点 StateSnapshot，使新增或新值都能在结果状态中验证。
      en: state_diff_to_snapshot links a StateDiff to its ending StateSnapshot so every insertion and new value can be verified against resulting state.
      ja: state_diff_to_snapshot は StateDiff を比較終点 StateSnapshot に結び、追加項目と新値を result state で検証可能にします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_state_diff_to_snapshot
      labels:
        zh: 反向：state diff to snapshot
        en: is target of state diff to snapshot
        ja: 逆方向：state diff to snapshot
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-state-diff-design
    distinct_fact_rationale:
      zh: from_snapshot 指向差异计算的基线快照；to_snapshot 指向应用差异后的结果快照。
      en: from_snapshot identifies the baseline snapshot; to_snapshot identifies the resulting snapshot after the diff is applied.
      ja: from_snapshot は差分の基準 snapshot、to_snapshot は差分適用後の結果 snapshot を示します。
    layout_role: cross-link
    target: concept:StateSnapshot
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-state-diff-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports StateDiff identity and boundary mapping.
    locator: StateDiff integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-state-diff-design
    source: src-runtime-observability-design
    supports: Moonweave StateDiff concept boundary within runtime-observability.
    locator: StateDiff boundary
    evidence_kind: design-inference
    confidence: high
