sibling_differentiation:
  - sibling_concept_id: StateSnapshot
    shared_parent_concept_id: StateRecord
    differentia:
      zh: 共享父节点对照：父节点 StateRecord：StateDiff（semantic kind=information，骨架 StateDiff-is_a-StateRecord）；StateSnapshot（semantic kind=information，骨架 StateSnapshot-is_a-StateRecord）。双端条件：StateDiff 条件：“状态差异属于状态记录，区别于其他同类对象的条件是：它记录从一个状态快照到另一个状态快照的差别，显示两个已捕获状态之间变化的值、通道、产物或生命周期位置”；StateSnapshot 条件：“作为状态记录，状态快照由这一事实区分：它捕获会话、参与者、图、工具或状态图步骤的运行状态，用于检查、恢复、回放或生命周期转移”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent StateRecord: StateDiff (semantic kind=information, backbone StateDiff-is_a-StateRecord); StateSnapshot (semantic kind=information, backbone StateSnapshot-is_a-StateRecord). Endpoint conditions: StateDiff condition: “State diff is a state record whose defining condition is that it is a difference record from one state snapshot to another, showing changed values, channels, artifacts, or lifecycle positions between two captured states”; StateSnapshot condition: “State snapshot belongs to the state record category and differs from broader members in that it is a captured runtime state for a session, actor, graph, tool, or statechart step, used for inspection, recovery, replay, or lifecycle transition”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 StateRecord：StateDiff（semantic kind=information、バックボーン StateDiff-is_a-StateRecord）；StateSnapshot（semantic kind=information、バックボーン StateSnapshot-is_a-StateRecord）。両端条件：StateDiff の条件：「状態差分は状態記録のうち、次の事実を定義条件とする対象です：それは、ある状態スナップショットから別の状態スナップショットへの差を記録し、二つの捕捉済み状態の間で変化した値、チャネル、成果物、ライフサイクル位置を示します」；StateSnapshot の条件：「状態スナップショットは状態記録として、次の条件により他の対象と区別されます：それは、セッション、アクター、グラフ、ツール、状態図ステップの実行状態を捕捉し、検査、復旧、再生、ライフサイクル遷移に用います」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-state-diff-001
