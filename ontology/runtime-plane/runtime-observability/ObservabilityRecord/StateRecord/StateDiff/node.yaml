schema: moonweave.ai/ontology-node/v1
id: StateDiff
kind: concept
status: accepted
labels:
  en: state diff
  zh: 状态差异
  ja: 状態差分
semantics:
  short_definition:
    zh: 从一个已标识状态快照到另一个快照的变化记录。
    en: A change record from one identified state snapshot to another.
    ja: 識別済み状態スナップショット間の変化記録。
  definition:
    zh: 状态差异是一种 StateRecord，以明确的 from_snapshot 和 to_snapshot 为边界，只保存两者之间新增、删除或改变的状态项以及必要的比较元数据。它不代表任一完整状态，也不等于执行了这些变化的活动；若没有一对可识别快照，就不能称为该差异。
    en: A StateDiff is a StateRecord bounded by identified from_snapshot and to_snapshot values, containing only added, removed, or changed state items and comparison metadata. It represents neither complete state nor the activity that caused the changes; without an identifiable snapshot pair, it is not this diff.
    ja: StateDiff は識別された from_snapshot と to_snapshot を境界とし、追加・削除・変更された状態項目と比較メタデータだけを持つ StateRecord です。完全状態でも変更活動でもなく、識別可能な快照対がなければ差分になりません。
  why_needed:
    zh: 差异记录让调试者快速定位某一步究竟改变了哪些通道、任务或产物，也能在恢复后核对状态漂移，而无需反复比较两个完整快照。
    en: Diffs let reviewers locate exactly which channels, tasks, or artifacts changed in a step and check drift after restoration without repeatedly comparing full snapshots.
    ja: 差分により、ステップが変更したチャネル、タスク、成果物を特定し、完全快照を毎回比較せず復元後のずれを確認できます。
  includes:
    - zh: 包括快照 `s17` 到 `s18` 之间新增待审批任务、更新工具结果并移除旧错误标记的逐项变化记录。
      en: Includes a change set from snapshot `s17` to `s18` that adds a pending approval, updates a tool result, and removes a stale error marker.
      ja: 快照 `s17` から `s18` で承認待ちを追加し、ツール結果を更新し、古いエラー印を削除する変化集合を含みます。
  excludes:
    - zh: 不包括完整 StateSnapshot、用于恢复寻址的 Checkpoint、没有 from/to 快照身份的普通更新日志，以及造成变化的执行活动。
      en: Excludes a full StateSnapshot, a Checkpoint used for restore addressing, ordinary update logs without from/to snapshot identities, and the activity that caused the change.
      ja: 完全な StateSnapshot、復元指定用 Checkpoint、from/to 快照識別のない更新ログ、変化を起こした活動は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StateDiff-example-positive-001
    kind: positive
    labels:
      zh: 两个已标识快照之间的精确差异
      en: Exact difference between identified snapshots
      ja: 識別済みスナップショット間の正確な差分
    scenario_id: null
    descriptions:
      zh: 比较 snapshot-v18 与 snapshot-v19 后，差异记录列出 messages 新增一项、approval 状态由 pending 变为 granted、next_node 从 review 变为 execute，并保存两端快照 ID。
      en: Comparing snapshot-v18 with snapshot-v19 yields a record showing one added message, approval changing from pending to granted, and next_node changing from review to execute, while preserving both endpoint snapshot IDs.
      ja: snapshot-v18とsnapshot-v19を比較し、messagesの1件追加、approvalのpendingからgrantedへの変更、next_nodeのreviewからexecuteへの変更、両端スナップショットIDを記録する。
    field_values:
      record_id: state-diff-v18-v19
      record_kind: state-diff
      observed_at: 2026-07-16T11:29:19.010Z
      provenance_ref: state-comparison-service
      runtime_correlation_ref: session-8/snapshot-v18/snapshot-v19
    related_node_ids:
      - StateDiff
      - StateSnapshot
      - StateRecord
    related_relation_ids:
      - StateDiff-is_a-StateRecord
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    expected_result:
      zh: 该对象被识别为 StateDiff，且每项变化都能定位到明确的起止快照。
      en: The object is classified as StateDiff and every change is anchored to explicit from/to snapshots.
      ja: 対象はStateDiffに分類され、各変更が明示的な開始・終了スナップショットに結び付く。
    why_valid_or_invalid:
      zh: 它只表示两版本间新增、删除和修改项，并不复制完整状态。
      en: It represents only additions, removals, and changes between two versions rather than duplicating complete state.
      ja: 二つの版の追加・削除・変更だけを表し、完全状態を複製しない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-diff-001
  - id: StateDiff-example-boundary-001
    kind: boundary
    labels:
      zh: 无起止快照的补丁不是状态差异
      en: A patch without endpoints is not a state diff
      ja: 端点のないパッチは状態差分ではない
    scenario_id: null
    descriptions:
      zh: 操作请求写着“把 approval 改为 granted”，却没有 from_snapshot、to_snapshot，也未证明更改已发生。它是变更指令或补丁提议，不是观察到的 StateDiff。
      en: An operation request says “set approval to granted” but identifies no from_snapshot or to_snapshot and does not show that the change occurred. It is a change command or patch proposal, not an observed StateDiff.
      ja: 操作要求が「approvalをgrantedに変更」と述べるが、from_snapshotもto_snapshotもなく、変更発生も示さない。これは変更指示・パッチ提案であり、観測済みStateDiffではない。
    field_values: {}
    related_node_ids:
      - StateDiff
      - StateSnapshot
    related_relation_ids:
      - state_diff_from_snapshot
      - state_diff_to_snapshot
    expected_result:
      zh: 该对象不归入 StateDiff；只有比较两个已标识状态版本后才能生成差异记录。
      en: The object is not classified as StateDiff; a diff can be created only after comparing two identified state versions.
      ja: 対象はStateDiffに分類されず、二つの識別済み状態版を比較して初めて差分記録になる。
    why_valid_or_invalid:
      zh: 变更意图与已观察到的版本间差异具有不同的时间和证据语义。
      en: A change intention has different temporal and evidential semantics from an observed difference between versions.
      ja: 変更意図と、版間で観測された差分は時間・証拠意味が異なる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-state-diff-001
external_mappings: []
applicability:
