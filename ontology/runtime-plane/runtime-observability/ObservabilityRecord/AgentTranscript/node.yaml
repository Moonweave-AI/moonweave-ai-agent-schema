schema: moonweave.ai/ontology-node/v1
id: AgentTranscript
kind: concept
labels:
  en: agent transcript
  zh: 智能体转录记录
  ja: エージェント転写記録
semantics:
  short_definition:
    zh: 按参与者可见顺序保存智能体交互的转录记录。
    en: An ordered transcript of agent interactions visible to participants.
    ja: 参加者に見えた順序でエージェント対話を保存する転写記録。
  definition:
    zh: 智能体转录记录是一种可观测信息记录，按参与者实际接收或系统实际展示的顺序保存消息、工具调用摘要、模型输出、人工介入与产物引用。它回答“参与者看到了什么”，不试图表达完整跨度因果、隐藏思维过程或未经披露的内部状态。
    en: "An AgentTranscript is an observability information record ordered by what participants actually received or the system displayed: messages, tool-call summaries, model outputs, human interventions, and artifact references. It answers what participants saw, not the complete span causality, hidden reasoning, or undisclosed internal state."
    ja: AgentTranscript は、参加者が実際に受信した、またはシステムが表示した順序で、メッセージ、ツール呼出し要約、モデル出力、人手介入、成果物参照を保存する観測情報記録です。参加者が見た内容を示し、完全なスパン因果、非公開推論、未開示内部状態は表しません。
  why_needed:
    zh: 转录记录支持复核对话连续性、人工交接和面向用户的解释，并允许证明某条内容是否真的向参与者披露；跨度图或审计账目不能替代这种可见顺序。
    en: Transcripts support review of conversational continuity, human handoffs, and user-facing explanations, and establish whether content was actually disclosed to a participant. Span graphs and audit ledgers do not preserve this visible order.
    ja: 転写記録は対話継続性、人手引継ぎ、利用者向け説明の確認を支え、内容が実際に参加者へ開示されたかを示します。スパングラフや監査台帳はこの可視順序を代替できません。
  includes:
    - zh: 包括用户消息、助手可见回复、已展示的工具调用及结果、人工审批提示和向用户公开的产物链接。
      en: Includes user messages, visible assistant responses, displayed tool calls and results, human-approval prompts, and artifact links disclosed to participants.
      ja: ユーザーメッセージ、表示された応答、可視のツール呼出しと結果、人手承認表示、参加者へ開示した成果物リンクを含みます。
  excludes:
    - zh: 不包括未向参与者披露的内部提示、隐藏推理和原始凭据，也不包括以不可抵赖审计为目的的 AuditRecord 或以因果计时为目的的 TraceRecord。
      en: Excludes undisclosed internal prompts, hidden reasoning, and raw credentials, as well as AuditRecord evidence for non-repudiation and TraceRecord data for causal timing.
      ja: 参加者に未開示の内部プロンプト、隠れた推論、生の認証情報、否認防止用 AuditRecord、因果計時用 TraceRecord は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 AgentTranscript 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating AgentTranscript, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: AgentTranscript 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to AgentTranscript.
      format: |-
        # Example AgentTranscript ingest
        { "agent-transcript_ref": "example-1" }
      source_claims:
        - claim-agent-transcript-design
  typical_output:
    - description: Moonweave-local AgentTranscript projection.
      format: '{ "schema_owner": "moonweave-local-design", "agent-transcript_id": "example-1" }'
      source_claims:
        - claim-agent-transcript-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: AgentTranscript-example-positive-001
    labels:
      zh: OpenAI Thread Messages 列表
      en: OpenAI Thread Messages list
      ja: OpenAI Thread Messages 一覧
    descriptions:
      zh: OpenAI client.beta.threads.messages.list(thread_id=, order="asc") 返回 role=user/assistant 消息序列，AgentTranscript transcript_id=transcript-18、message_count=18。
      en: OpenAI client.beta.threads.messages.list(thread_id=, order="asc") returns role=user/assistant message sequence, AgentTranscript transcript_id=transcript-18, message_count=18.
      ja: OpenAI messages.list が AgentTranscript 対話転写である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: transcript-support-run-204
      record_kind: agent-transcript
      observed_at: 2026-07-16T10:45:00.000Z
      provenance_ref: support-transcript-recorder
      runtime_correlation_ref: runtime-session-support-204
    related_node_ids:
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - AgentTranscript-is_a-ObservabilityRecord
    source_claims:
      - claim-agent-transcript-design
  - id: AgentTranscript-example-boundary-001
    labels:
      zh: LangSmith run.inputs 非 Transcript
      en: LangSmith run.inputs not Transcript
      ja: LangSmith run.inputs は Transcript ではない
    descriptions:
      zh: LangSmith run.inputs={"query":"..."} 是 trace 输入预览，不是完整 Thread Messages AgentTranscript。
      en: LangSmith run.inputs={"query":"..."} is trace input preview, not full Thread Messages AgentTranscript.
      ja: LangSmith run.inputs は Transcript ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - AgentTranscript
      - TraceRecord
      - AuditRecord
      - ObservabilityRecord
    related_relation_ids:
      - AgentTranscript-is_a-ObservabilityRecord
    source_claims:
      - claim-agent-transcript-design
  - id: AgentTranscript-example-3
    labels:
      zh: Transcript 与 TraceSpan 边界
      en: Transcript versus TraceSpan boundary
      ja: Transcript と TraceSpan 境界
    descriptions:
      zh: AgentTranscript 持久化对话条目；TraceSpan 记录操作 timing；transcript 内容不等于 span attributes。
      en: AgentTranscript persists dialogue items; TraceSpan records operation timing; transcript content is not span attributes.
      ja: Transcript は対話、TraceSpan は操作 timing である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - AgentTranscript
    related_relation_ids: []
    source_claims:
      - claim-agent-transcript-vendor
      - claim-agent-transcript-design
  - id: AgentTranscript-example-4
    labels:
      zh: support thread 18 条消息实例
      en: support thread 18 messages instance
      ja: support thread 18 メッセージ事例
    descriptions:
      zh: AgentTranscript transcript_id=transcript-18、thread_id=thread_abc、message_count=18、last_message_at=2026-01-15T10:15:00Z。
      en: AgentTranscript transcript_id=transcript-18, thread_id=thread_abc, message_count=18, last_message_at=2026-01-15T10:15:00Z.
      ja: transcript-18 に 18 件メッセージを記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - AgentTranscript
    related_relation_ids: []
    source_claims:
      - claim-agent-transcript-vendor
      - claim-agent-transcript-design
