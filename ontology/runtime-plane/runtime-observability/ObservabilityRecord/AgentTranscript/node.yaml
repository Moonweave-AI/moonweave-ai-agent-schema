schema: moonweave.ai/ontology-node/v1
id: AgentTranscript
kind: concept
status: accepted
labels: {zh: 智能体转录, en: Agent transcript, ja: エージェント転記}
semantics:
  short_definition: {zh: 为一个智能体会话或执行范围保留有序、脱敏交互项目序列的 ObservabilityRecord。, en: "An ObservabilityRecord that preserves an ordered, redacted sequence of interaction items for one agent session or execution scope.", ja: 1つのエージェントセッションまたは実行範囲の順序付けられマスキングされた対話項目列を保持する ObservabilityRecord。}
  definition: {zh: AgentTranscript 是用户、助手、工具调用、工具结果和系统交互项目的有序持久自定义记录。它不是 OTel Log Record 流、完整 TraceRecord、当前 RuntimeSession 或原始未脱敏内存转储。, en: "An AgentTranscript is a durable custom record of ordered user, assistant, tool-call, tool-result, and system interaction items. It is not an OTel Log Record stream, a complete TraceRecord, a current RuntimeSession, or a raw unredacted memory dump.", ja: AgentTranscript はユーザー、アシスタント、ツール呼び出し、ツール結果、システム対話項目を順序付けて保持する永続カスタム記録である。OTel Log Record ストリーム、完全 TraceRecord、現在の RuntimeSession、生の未マスキングメモリダンプではない。}
  why_needed: {zh: 智能体行为的调试和审计需要可检查的交互序列，它保留顺序和内容引用，同时将对话数据与运行时追踪和会话状态管理分开。, en: "Debugging and audit of agent behavior require an inspectable interaction sequence that preserves order and content references while separating conversation data from runtime tracing and session state management.", ja: エージェント行動のデバッグと監査には、順序と内容参照を保持し、会話データをランタイムトレーシングとセッション状態管理から分離する検査可能な対話列が必要である。}
  includes:
    - {zh: 转录 ID、会话或执行范围、有序项目数量、脱敏策略引用和项目内容引用。, en: "Transcript ID, session or execution scope, ordered item count, redaction policy reference, and item-content references.", ja: 転記 ID、セッションまたは実行範囲、順序付き項目数、マスキングポリシー参照、項目内容参照。}
    - {zh: 在转录策略下保留的用户消息、助手输出、工具调用、工具结果和系统项目。, en: "User messages, assistant outputs, tool calls, tool results, and system items retained under transcript policy.", ja: 転記ポリシー下で保持されるユーザーメッセージ、アシスタント出力、ツール呼び出し、ツール結果、システム項目。}
  excludes:
    - {zh: 含机密的原始提示、任意进程输出或没有有序交互上下文的通用日志行。, en: "Secret-bearing raw prompts, arbitrary process output, or a generic log line with no ordered interaction context.", ja: 秘密を含む生プロンプト、任意プロセス出力、順序付き対話コンテキストのない一般ログ行。}
    - {zh: 可变会话存储本身或追踪的 spans 及时间树。, en: "The mutable session store itself or a trace's spans and timing tree.", ja: 可変セッションストア自体またはトレースの spans と時間ツリー。}
  semantic_kind: entity
  aliases: [conversation transcript, interaction log]
engineering:
  explanation: {zh: 记录器在脱敏后收集有序会话项目、分配序列位置、持久化内容引用或批准内容，并将转录绑定到会话或执行范围。会话仍是实时连续性上下文；OTel 追踪仍是时间和因果遥测。, en: "A recorder collects ordered session items after redaction, assigns sequence positions, persists content references or approved content, and binds the transcript to session or execution scope. The session remains the live continuity context; an OTel trace remains timing and causality telemetry.", ja: レコーダーはマスキング後に順序付きセッション項目を収集し、シーケンス位置を割り当て、内容参照または承認済み内容を永続化して、転記をセッションまたは実行範囲に結び付ける。セッションはライブ継続コンテキストのままであり、OTel トレースは時刻と因果のテレメトリーのままである。}
  typical_input:
    - description: {zh: 会话交互项目, en: Session interaction items, ja: セッション対話項目}
      format: |-
        {"session_id":"session-73","items":["user","assistant","tool_call","tool_result"],"redaction_policy":"policy-redact-v2"}
  typical_output:
    - description: {zh: 转录记录, en: Transcript record, ja: 転記記録}
      format: |-
        {"transcript_id":"transcript-18","session_id":"session-73","item_count":4,"redaction_policy":"policy-redact-v2"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: Documents session history that contains user input, assistant responses, and tool calls across agent runs.}
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: Defines native OTel Log Records separately from ordered conversation transcript records.}
structure:
  identity_keys: [record_id, transcript_id]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与转录内容属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as the transcript content., ja: トランスクリプト内容と同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: transcript-18
      source_claims: [claim-agent-transcript-history]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为转录的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to transcript., ja: ObservabilityRecord から継承し transcript に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [transcript]
      example_value: transcript
      source_claims: [claim-agent-transcript-history]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 继承的转录记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord for the finalized transcript record., ja: 確定したトランスクリプト記録に対する ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:00Z'
      source_claims: [claim-agent-transcript-history]
    - id: transcript_id
      labels: {zh: 转录 ID, en: Transcript ID, ja: 転記 ID}
      definitions: {zh: 一条保留交互序列的稳定标识符。, en: Stable identifier of one retained interaction sequence., ja: 1件の保持対話列の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: transcript-18
      source_claims: [claim-agent-transcript-history]
    - id: session_id
      labels: {zh: 会话 ID, en: Session ID, ja: セッション ID}
      definitions: {zh: 界定有序交互项目范围的 RuntimeSession 标识符。, en: RuntimeSession identifier that scopes the ordered interaction items., ja: 順序付き対話項目の範囲を定める RuntimeSession 識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-agent-transcript-history]
    - id: item_count
      labels: {zh: 项目数量, en: Item count, ja: 項目数}
      definitions: {zh: 此转录版本中保留的有序交互项目数量。, en: Number of retained ordered interaction items in this transcript version., ja: この転記バージョンに保持される順序付き対話項目数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      minimum: 0
      example_value: 4
      source_claims: [claim-agent-transcript-history]
  constraints:
    - id: agent-transcript-order-and-redaction
      severity: error
      language: plain
      expression: Retained items must have stable order and a redaction decision before persistence; transcript scope must resolve to one session or explicitly documented execution scope.
      explanation: {zh: 无序且含机密的块不是安全或可审计的智能体转录。, en: An unordered secret-bearing blob is not a safe or auditable agent transcript., ja: 順序のない秘密含有 blob は安全でも監査可能でもないエージェント転記である。}
      source_claims: [claim-agent-transcript-history]
  required_relations: [AgentTranscript-specializes-ObservabilityRecord]
examples:
  - id: agent-transcript-positive
    labels: {zh: "OpenAI Thread Messages 列表", en: "OpenAI Thread Messages list", ja: "OpenAI Thread Messages 一覧"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; AgentTranscript maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; AgentTranscript maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; AgentTranscript TraceSpan/Record."}
    field_values: {record_id: transcript-18, record_kind: transcript, recorded_at: '2026-07-18T09:20:00Z', transcript_id: transcript-18, session_id: session-73, item_count: 4}
    related_node_ids: [AgentTranscript, RuntimeSession]
    related_relation_ids: [AgentTranscript-specializes-ObservabilityRecord]
    source_claims: [claim-agent-transcript-history]
  - id: agent-transcript-counterexample
    labels: {zh: "LangSmith run.inputs 非 Transcript", en: "LangSmith run.inputs not Transcript", ja: "LangSmith run.inputs は Transcript ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style AgentTranscript TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style AgentTranscript TraceRecord.", ja: "Missing trace rejects Langfuse-style AgentTranscript."}
    field_values: {body: tool finished}
    related_node_ids: [ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-agent-transcript-history]
  - id: agent-transcript-boundary
    labels: {zh: "Transcript 与 TraceSpan 边界", en: "Transcript versus TraceSpan boundary", ja: "Transcript と TraceSpan 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; AgentTranscript must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; AgentTranscript must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {transcript_id: transcript-18, session_id: session-73}
    related_node_ids: [AgentTranscript, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-agent-transcript-history]
  - id: agent-transcript-instance-18
    labels: {zh: "support thread 18 条消息实例", en: "support thread 18 messages instance", ja: "support thread 18 メッセージ事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->AgentTranscript ObservabilityEvent.", en: "Phoenix instance: drift+quality->AgentTranscript ObservabilityEvent.", ja: "Phoenix instance maps to AgentTranscript Event."}
    field_values: {record_id: transcript-18, record_kind: transcript, recorded_at: '2026-07-18T09:20:00Z', transcript_id: transcript-18, session_id: session-73, item_count: 4}
    related_node_ids: [AgentTranscript, RuntimeSession, Execution, TraceRecord]
    related_relation_ids: [AgentTranscript-specializes-ObservabilityRecord]
    source_claims: [claim-agent-transcript-history]
parent_relation:
  id: AgentTranscript-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是智能体转录, en: is an agent transcript, ja: エージェント転記である}
  definitions: {zh: 每个 AgentTranscript 都是包含有序脱敏交互项目的 ObservabilityRecord。, en: "Every AgentTranscript is an ObservabilityRecord containing ordered, redacted interaction items.", ja: すべての AgentTranscript は順序付きマスキング済み対話項目を含む ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_agent_transcript, labels: {zh: 具有智能体转录, en: has agent transcript, ja: エージェント転記を持つ}}
  conditions:
    - id: agent-transcript-parent-condition
      severity: error
      expression: Require ordered interaction items and resolved session or execution scope after applying redaction policy.
      explanations: {zh: 通用日志和原始无范围内容不满足转录语义。, en: Generic logs and raw unscoped content do not satisfy transcript semantics., ja: 一般ログと生のスコープなし内容は転記意味を満たさない。}
      source_claims: [claim-agent-transcript-history]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-agent-transcript-history]
relations: []
sources:
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Documents session history containing user input, assistant responses, tool calls, and tool results across agent runs.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines native Log Record semantics that are distinct from transcript ordering and content scope.
source_claims:
  - id: claim-agent-transcript-history
    source: openai-agents-sessions
    supports: Agents SDK sessions retrieve stored conversation history before a run and store newly generated user input, assistant responses, and tool calls after it.
    locator: Core session behavior
    evidence_kind: documentation
    confidence: high

