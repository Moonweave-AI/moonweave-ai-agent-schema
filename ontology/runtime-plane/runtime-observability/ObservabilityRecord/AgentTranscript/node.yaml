  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 AgentTranscript 都是 ObservabilityRecord，其种差是按参与者实际接收或界面实际显示的顺序保存消息、工具摘要、输出与人工介入。
    en: Every AgentTranscript is an ObservabilityRecord distinguished by preserving messages, tool summaries, outputs, and human interventions in the order actually received or displayed to participants.
    ja: すべての AgentTranscript は ObservabilityRecord で、参加者が実際に受信または画面表示された順に message・tool 要約・output・human intervention を保存する点が種差です。
  cardinality: null
