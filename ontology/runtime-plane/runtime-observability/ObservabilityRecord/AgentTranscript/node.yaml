schema: moonweave.ai/ontology-node/v1
id: AgentTranscript
kind: concept
status: review
labels:
  en: agent transcript
  zh: 智能体转录记录
  ja: エージェント転写記録
semantics:
  short_definition:
    zh: 按参与者可见顺序保存智能体交互的转录记录。
    en: An ordered transcript of agent interactions visible to participants.
    ja: 参加者に見えた順序でエージェント対話を保存する転写記録。
  definition:
    zh: 智能体转录记录是一种可观测信息记录，按参与者实际接收或系统实际展示的顺序保存消息、工具调用摘要、模型输出、人工介入与产物引用。它回答“参与者看到了什么”，不试图表达完整跨度因果、隐藏思维过程或未经披露的内部状态。
    en: "An AgentTranscript is an observability information record ordered by what participants actually received or the system displayed: messages, tool-call summaries, model outputs, human interventions, and artifact references. It answers what participants saw, not the complete span causality, hidden reasoning, or undisclosed internal state."
    ja: AgentTranscript は、参加者が実際に受信した、またはシステムが表示した順序で、メッセージ、ツール呼出し要約、モデル出力、人手介入、成果物参照を保存する観測情報記録です。参加者が見た内容を示し、完全なスパン因果、非公開推論、未開示内部状態は表しません。
  why_needed:
    zh: 转录记录支持复核对话连续性、人工交接和面向用户的解释，并允许证明某条内容是否真的向参与者披露；跨度图或审计账目不能替代这种可见顺序。
    en: Transcripts support review of conversational continuity, human handoffs, and user-facing explanations, and establish whether content was actually disclosed to a participant. Span graphs and audit ledgers do not preserve this visible order.
    ja: 転写記録は対話継続性、人手引継ぎ、利用者向け説明の確認を支え、内容が実際に参加者へ開示されたかを示します。スパングラフや監査台帳はこの可視順序を代替できません。
  includes:
    - zh: 包括用户消息、助手可见回复、已展示的工具调用及结果、人工审批提示和向用户公开的产物链接。
      en: Includes user messages, visible assistant responses, displayed tool calls and results, human-approval prompts, and artifact links disclosed to participants.
      ja: ユーザーメッセージ、表示された応答、可視のツール呼出しと結果、人手承認表示、参加者へ開示した成果物リンクを含みます。
  excludes:
    - zh: 不包括未向参与者披露的内部提示、隐藏推理和原始凭据，也不包括以不可抵赖审计为目的的 AuditRecord 或以因果计时为目的的 TraceRecord。
      en: Excludes undisclosed internal prompts, hidden reasoning, and raw credentials, as well as AuditRecord evidence for non-repudiation and TraceRecord data for causal timing.
      ja: 参加者に未開示の内部プロンプト、隠れた推論、生の認証情報、否認防止用 AuditRecord、因果計時用 TraceRecord は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: AgentTranscript-example-positive-001
    kind: positive
    labels:
      zh: 面向参与者的交互顺序记录
      en: Participant-visible interaction sequence
      ja: 参加者に見えた対話順序の記録
    scenario_id: null
    descriptions:
      zh: 一次客服运行依次向参与者显示用户消息、智能体转交提示、退款工具调用摘要、工具结果和最终答复；转录记录按实际显示顺序保存这些条目，并以引用指向生成的退款凭证。
      en: A support run shows the user message, an agent-handoff notice, a refund-tool call summary, the tool result, and the final reply. The transcript preserves that displayed order and references the generated refund artifact.
      ja: サポート実行で、利用者メッセージ、エージェント引継ぎ通知、返金ツール呼出しの要約、結果、最終回答が順に表示される。転写記録はその表示順と返金成果物への参照を保存する。
    field_values:
      record_id: transcript-support-run-204
      record_kind: agent-transcript
      observed_at: 2026-07-16T10:45:00.000Z
      provenance_ref: support-transcript-recorder
      runtime_correlation_ref: runtime-session-support-204
    related_node_ids:
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - AgentTranscript-is_a-ObservabilityRecord
    expected_result:
      zh: 该对象被识别为智能体转录记录，并可据显示顺序重建参与者实际看到的交互。
      en: The object is classified as an AgentTranscript and reconstructs what participants actually saw in display order.
      ja: この対象はAgentTranscriptと判定され、参加者が実際に見たやり取りを表示順に再構成できる。
    why_valid_or_invalid:
      zh: 记录对象是已外显交互的有序视图；它没有声称覆盖未显示的内部状态或完整因果跨度。
      en: The record is an ordered view of externalized interaction; it does not claim to contain undisclosed internal state or the complete causal span graph.
      ja: 記録は外部化された対話の順序付きビューであり、非表示の内部状態や完全な因果スパングラフを含むとは主張しない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-transcript-001
  - id: AgentTranscript-example-boundary-001
    kind: boundary
    labels:
      zh: 隐藏遥测不属于参与者转录
      en: Hidden telemetry is not a participant transcript
      ja: 非表示テレメトリは参加者転写ではない
    scenario_id: null
    descriptions:
      zh: 同一运行还保存采样决策、内部跨度属性和未向用户披露的策略检查结果。这些数据可进入追踪或审计记录，但不能因为与会话相关就写入参与者转录。
      en: The same run stores a sampling decision, internal span attributes, and a policy-check result never disclosed to the user. Those facts may belong in trace or audit evidence, but correlation with the conversation does not put them in the participant transcript.
      ja: 同じ実行にはサンプリング判断、内部スパン属性、利用者に開示されないポリシー検査結果もある。これらは追跡・監査証拠になり得るが、会話と相関するだけでは参加者転写に入らない。
    field_values: {}
    related_node_ids:
      - AgentTranscript
      - TraceRecord
      - AuditRecord
      - ObservabilityRecord
    related_relation_ids:
      - AgentTranscript-is_a-ObservabilityRecord
    expected_result:
      zh: 未外显的遥测字段被排除；转录只保留实际可见或明确发出的条目。
      en: Undisclosed telemetry is excluded; the transcript retains only entries actually shown or explicitly emitted.
      ja: 非開示のテレメトリは除外され、実際に表示または明示的に送出された項目だけが転写に残る。
    why_valid_or_invalid:
      zh: 转录的判定依据是参与者可见顺序，而不是同一 trace_id 下所有可观测数据的并集。
      en: Transcript membership is determined by participant-visible order, not by the union of everything sharing a trace identifier.
      ja: 転写への所属は参加者に見えた順序で決まり、同じトレース識別子を持つ全データの集合では決まらない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-transcript-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AuditRecord
    shared_parent_concept_id: ObservabilityRecord
    differentia:
      zh: 共享父节点对照：父节点 ObservabilityRecord：AgentTranscript（semantic kind=information，骨架 AgentTranscript-is_a-ObservabilityRecord）；AuditRecord（semantic kind=information，骨架 AuditRecord-is_a-ObservabilityRecord）。双端条件：AgentTranscript 条件：“作为可观测记录，智能体转录记录由这一事实区分：它按顺序保存实际可见或已发出的消息、动作、工具调用、模型输出、策略决策、警告和产物引用”；AuditRecord 条件：“审计记录属于可观测记录，区别于其他同类对象的条件是：它是附着在运行会话或追踪上的原始审计证据，保存发生了什么以及关联了谁或什么，但不承担反馈解释职责”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ObservabilityRecord: AgentTranscript (semantic kind=information, backbone AgentTranscript-is_a-ObservabilityRecord); AuditRecord (semantic kind=information, backbone AuditRecord-is_a-ObservabilityRecord). Endpoint conditions: AgentTranscript condition: “Agent transcript belongs to the observability record category and differs from broader members in that it is an ordered runtime transcript of messages, actions, tool calls, model outputs, policy decisions, warnings, and artifact references that were actually visible or emitted”; AuditRecord condition: “Audit record is an observability record whose defining condition is that it is a raw audit evidence attached to a runtime session or trace, preserving what happened and who or what was associated without performing feedback interpretation”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ObservabilityRecord：AgentTranscript（semantic kind=information、バックボーン AgentTranscript-is_a-ObservabilityRecord）；AuditRecord（semantic kind=information、バックボーン AuditRecord-is_a-ObservabilityRecord）。両端条件：AgentTranscript の条件：「エージェント転写記録は観測記録として、次の条件により他の対象と区別されます：それは、実際に可視化または発行されたメッセージ、行動、ツール呼び出し、モデル出力、ポリシー判断、警告、成果物参照を順序付きで保存します」；AuditRecord の条件：「監査記録は観測記録のうち、次の事実を定義条件とする対象です：それは実行セッションまたはトレースに付く生の監査証拠であり、何が起き、誰または何が関連したかを保存しますが、フィードバック上の解釈は行いません」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-agent-transcript-001
