schema: moonweave.ai/ontology-node/v1
id: ObservabilityRecord
kind: concept
status: review
labels:
  zh: 可观测记录
  en: observability record
  ja: 観測記録
semantics:
  short_definition:
    zh: 带时间、来源与运行关联标识的观测信息记录。
    en: An observation record with time, provenance, and runtime correlation.
    ja: 時刻、来歴、実行相関識別を持つ観測情報記録。
  definition:
    zh: 可观测记录是信息类上位概念，保存从运行中实际观察或外化的行为、状态、消息或责任证据，并带有发生/观察时间、来源与至少一种会话、追踪、跨度或尝试关联。它描述可观察证据，不包括尚未外化的私有推理，也不表示发生项本身。
    en: ObservabilityRecord is an information superclass for behavior, state, messages, or accountability evidence actually observed or externalized from a run, with occurrence or observation time, provenance, and at least one session, trace, span, or attempt correlation. It describes observable evidence, not unexternalized private reasoning or the occurrence itself.
    ja: ObservabilityRecord は、実行から実際に観測または外化された行動、状態、メッセージ、責任証拠を保存し、発生／観測時刻、来歴、セッション・トレース・スパン・試行の相関を持つ情報上位類です。未外化の私的推論や発生項自体は表しません。
  why_needed:
    zh: 这一上位类使追踪、转录、审计和状态证据共享最小的时间、来源与关联要求，同时保留各自身份标准，便于跨信号查询而不把所有记录压成一个“日志”概念。
    en: This superclass gives traces, transcripts, audit evidence, and state evidence common minimum requirements for time, provenance, and correlation while preserving their different identities, enabling cross-signal queries without collapsing every record into a generic log.
    ja: この上位類はトレース、転写、監査、状態証拠に時刻・来歴・相関の最小要件を与えつつ固有同一性を保ち、すべてを一般ログへ潰さず横断照会を可能にします。
  includes:
    - zh: 包括具有运行关联的 TraceRecord、TraceSpan、AgentTranscript、AuditRecord、StateRecord 与 ObservableSummary。
      en: Includes runtime-correlated TraceRecord, TraceSpan, AgentTranscript, AuditRecord, StateRecord, and ObservableSummary instances.
      ja: 実行相関を持つ TraceRecord、TraceSpan、AgentTranscript、AuditRecord、StateRecord、ObservableSummary を含みます。
  excludes:
    - zh: 不包括 ObservabilityEvent 等发生项、执行活动本身、未外化思维内容，以及缺少来源和运行关联的任意文档。
      en: Excludes occurrences such as ObservabilityEvent, executed activities, unexternalized reasoning, and arbitrary documents lacking provenance and runtime correlation.
      ja: ObservabilityEvent などの発生項、実行活動、未外化推論、来歴と実行相関を欠く任意文書は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - record_id
  fields:
    - id: record_id
      labels:
        zh: 记录标识
        en: record ID
        ja: 記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可观测信息载体，使其与所描述的事件、活动或状态保持不同身份。
        en: Stably identifies one observability information carrier independently of the event, activity, or state it describes.
        ja: 記述対象のイベント、活動、状態とは別に、一つの可観測情報媒体を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: observation-tool-call-771
      source_claims:
        - claim-observability-record-003
    - id: record_kind
      labels:
        zh: 记录类别
        en: record kind
        ja: 記録種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分通用运行观察、转录、审计、摘要、状态、追踪、跨度、检查点、差异和快照记录。
        en: Distinguishes runtime observation, transcript, audit, summary, state, trace, span, checkpoint, diff, and snapshot records.
        ja: 実行観測、転写、監査、要約、状態、トレース、スパン、チェックポイント、差分、スナップショット記録を区別します。
      allowed_values:
        - id: record-kind-runtime-observation
          value: runtime-observation
          labels:
            zh: 运行观察
            en: runtime observation
            ja: 実行観測
          definitions:
            zh: 表示运行观察这一信息记录分支。
            en: Identifies the runtime observation information-record branch.
            ja: 実行観測という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-004
        - id: record-kind-agent-transcript
          value: agent-transcript
          labels:
            zh: 智能体转录
            en: agent transcript
            ja: エージェント転写
          definitions:
            zh: 表示智能体转录这一信息记录分支。
            en: Identifies the agent transcript information-record branch.
            ja: エージェント転写という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-005
        - id: record-kind-audit
          value: audit
          labels:
            zh: 审计
            en: audit
            ja: 監査
          definitions:
            zh: 表示审计这一信息记录分支。
            en: Identifies the audit information-record branch.
            ja: 監査という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-006
        - id: record-kind-summary
          value: summary
          labels:
            zh: 可观测摘要
            en: summary
            ja: 可観測要約
          definitions:
            zh: 表示可观测摘要这一信息记录分支。
            en: Identifies the summary information-record branch.
            ja: 可観測要約という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-007
        - id: record-kind-state
          value: state
          labels:
            zh: 状态记录
            en: state
            ja: 状態
          definitions:
            zh: 表示状态记录这一信息记录分支。
            en: Identifies the state information-record branch.
            ja: 状態という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-008
        - id: record-kind-trace
          value: trace
          labels:
            zh: 追踪记录
            en: trace
            ja: トレース
          definitions:
            zh: 表示追踪记录这一信息记录分支。
            en: Identifies the trace information-record branch.
            ja: トレースという情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-009
        - id: record-kind-span
          value: span
          labels:
            zh: 跨度记录
            en: span
            ja: スパン
          definitions:
            zh: 表示跨度记录这一信息记录分支。
            en: Identifies the span information-record branch.
            ja: スパンという情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-010
        - id: record-kind-checkpoint
          value: checkpoint
          labels:
            zh: 检查点
            en: checkpoint
            ja: チェックポイント
          definitions:
            zh: 表示检查点这一信息记录分支。
            en: Identifies the checkpoint information-record branch.
            ja: チェックポイントという情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-011
        - id: record-kind-state-diff
          value: state-diff
          labels:
            zh: 状态差异
            en: state diff
            ja: 状態差分
          definitions:
            zh: 表示状态差异这一信息记录分支。
            en: Identifies the state diff information-record branch.
            ja: 状態差分という情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-012
        - id: record-kind-state-snapshot
          value: state-snapshot
          labels:
            zh: 状态快照
            en: state snapshot
            ja: 状態スナップショット
          definitions:
            zh: 表示状态快照这一信息记录分支。
            en: Identifies the state snapshot information-record branch.
            ja: 状態スナップショットという情報記録分岐を示します。
          status: accepted
          source_claims:
            - claim-observability-record-013
      pattern: null
      example_value: runtime-observation
      source_claims:
        - claim-observability-record-014
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该信息被观测或导出的时间，并与底层事件发生时间分开。
        en: Records when the information was observed or exported, separately from the underlying occurrence time.
        ja: 基礎となる発生時刻とは別に、情報が観測または出力された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:43:12.500Z
      source_claims:
        - claim-observability-record-015
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: 来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用生成、采集、汇总或持久化本记录的来源组件或过程。
        en: References the component or process that generated, collected, summarized, or persisted the record.
        ja: 記録を生成、収集、要約、永続化した元コンポーネントまたは処理を参照します。
      allowed_values: []
      pattern: null
      example_value: otel-collector-runtime
      source_claims:
        - claim-observability-record-016
    - id: runtime_correlation_ref
      labels:
        zh: 运行关联引用
        en: runtime correlation reference
        ja: 実行相関参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本记录所属的运行、会话、追踪或跨度关联上下文。
        en: References the run, session, trace, or span correlation context to which the record belongs.
        ja: 記録が属する実行、セッション、トレース、スパンの相関コンテキストを参照します。
      allowed_values: []
      pattern: null
      example_value: trace-8f2c1/span-tool-payment
      source_claims:
        - claim-observability-record-017
  constraints:
    - id: observability-record-kind-provenance-and-correlation-coherence
      severity: error
      expression_language: plain
      expression: record_kind must match the most specific ObservabilityRecord subtype; provenance_ref and runtime_correlation_ref must resolve to the producer and runtime context of this record
      explanations:
        zh: 记录类别必须与最具体下位类型一致，来源与运行关联必须解析到本记录的真实生产者和上下文。
        en: record_kind matches the most specific subtype, and provenance plus runtime correlation resolve to this record's actual producer and context.
        ja: 記録種別は最具体下位型と一致し、来歴と実行相関は記録の実際の生成元とコンテキストへ解決されます。
      source_claims:
        - claim-observability-record-018
  required_relation_constraints: []
examples:
  - id: ObservabilityRecord-example-positive-001
    kind: positive
    labels:
      zh: 可关联且有来源的运行证据
      en: Correlated runtime evidence with provenance
      ja: 相関と来歴を持つ実行証拠
    scenario_id: null
    descriptions:
      zh: 一次工具调用导出的记录保存观察时间、运行会话、trace_id、span_id、发出组件、动作摘要和结果状态；后来可以从记录反查原运行与生成来源。
      en: An exported tool-call record preserves observation time, runtime session, trace_id, span_id, emitting component, action summary, and outcome state, allowing later navigation back to the originating run and producer.
      ja: ツール呼出しの出力記録は観測時刻、実行セッション、trace_id、span_id、送出コンポーネント、操作要約、結果状態を保存し、元の実行と生成元へ遡れる。
    field_values:
      record_id: observation-tool-call-771
      record_kind: runtime-observation
      observed_at: 2026-07-16T10:43:12.500Z
      provenance_ref: otel-collector-runtime
      runtime_correlation_ref: trace-8f2c1/span-tool-payment
    related_node_ids:
      - ObservabilityRecord
      - TraceSpan
    related_relation_ids:
      - TraceSpan-is_a-ObservabilityRecord
    expected_result:
      zh: 该对象被认定为可观测记录，并可按会话、追踪、跨度和来源检索。
      en: The object is classified as an ObservabilityRecord and can be retrieved by session, trace, span, and provenance.
      ja: 対象はObservabilityRecordに分類され、セッション、トレース、スパン、来歴で検索できる。
    why_valid_or_invalid:
      zh: 它保存已外显的运行证据、观察时间、相关标识和来源，而非仅保存业务结果。
      en: It preserves externalized runtime evidence with observation time, correlation identifiers, and provenance rather than only a business result.
      ja: 業務結果だけでなく、観測時刻、相関識別子、来歴を伴う外部化された実行証拠を保存する。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observability-record-001
  - id: ObservabilityRecord-example-boundary-001
    kind: boundary
    labels:
      zh: 裸业务载荷不是可观测记录
      en: A bare business payload is not an observability record
      ja: 裸の業務ペイロードは観測記録ではない
    scenario_id: null
    descriptions:
      zh: 工具返回 {"approved":true,"amount":50}，但该对象没有发生或观察时间、运行会话、trace/span 相关标识，也没有产生者来源。它是业务输出，尚不是可观测记录。
      en: A tool returns {"approved":true,"amount":50}, but the object has no occurrence or observation time, runtime session, trace/span correlation, or producer provenance. It is a business output, not yet an ObservabilityRecord.
      ja: ツールが {"approved":true,"amount":50} を返すが、発生・観測時刻、実行セッション、trace/span相関、生成元来歴がない。これは業務出力であり、まだObservabilityRecordではない。
    field_values: {}
    related_node_ids:
      - ObservabilityRecord
      - TraceRecord
    related_relation_ids:
      - TraceRecord-is_a-ObservabilityRecord
    expected_result:
      zh: 该载荷保持业务输出身份；只有封装可观测上下文后才形成可观测记录。
      en: The payload retains business-output identity until an observability envelope supplies correlation and provenance.
      ja: 相関と来歴を与える観測用包絡が付くまでは、業務出力の同一性を保つ。
    why_valid_or_invalid:
      zh: 内容可见不等于具备可观测记录所需的时间、关联和来源语义。
      en: Visible content alone does not provide the temporal, correlation, and provenance semantics required of an observability record.
      ja: 内容が見えるだけでは、観測記録に必要な時間、相関、来歴の意味を満たさない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observability-record-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ObservabilityRecord-documents-ObservabilityEvent
    predicate: documents
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录可观测事件
      en: documents observability event
      ja: 観測可能イベントを記録する
    definitions:
      zh: ObservabilityRecord-documents-ObservabilityEvent 表示某条可观测记录以明确的事件标识或发生时间、事件类型和追踪关联保存了一次已发生的运行事件。记录是信息载体，事件是发生项；即使二者描述相同事实，也不得合并身份。
      en: ObservabilityRecord-documents-ObservabilityEvent states that an observability record preserves an occurred runtime event through an explicit event identifier or occurrence time, event type, and trace association. The record is an information carrier and the event an occurrence; shared content does not merge their identities.
      ja: ObservabilityRecord-documents-ObservabilityEvent は、観測記録が明示 event ID または発生時刻・event type・trace 関連により発生済み実行 event を保存することを表します。record は情報媒体、event は発生項であり、同じ事実を記述しても同一化しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一条记录可记录多个事件，一个事件也可被追踪与审计记录分别保存；每条事实必须保持稳定事件关联，本体不强制统一基数。
      en: One record may document multiple events and one event may be preserved by trace and audit records; each fact requires a stable event association, while the ontology imposes no universal cardinality.
      ja: 一記録が複数 event を記録し、一 event が trace と audit record に別々に保存され得るため、一律基数を課さず各事実に安定 event 関連を要求します。
    inverse_reading:
      predicate: documented_by_observability_record
      labels:
        zh: 由可观测记录保存
        en: documented by observability record
        ja: 観測記録により保存される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ObservabilityRecord-documents-ObservabilityEvent-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 跨度记录保存异常事件
          en: Span record preserves an exception event
          ja: span 記録が例外 event を保存する
        scenario_id: null
        descriptions:
          zh: span-81 在 trace-8 中保存 event_id=evt-timeout-1、发生时间 10:04:12、类型 exception 与 timeout 属性；同一事件关联到 attempt-81。
          en: span-81 in trace-8 preserves event_id=evt-timeout-1, occurrence time 10:04:12, type exception, and timeout attributes; the same event is associated with attempt-81.
          ja: trace-8 の span-81 は event_id=evt-timeout-1、発生時刻10:04:12、type=exception、timeout 属性を保存し、同 event は attempt-81 に関連します。
        field_values: {}
        related_node_ids:
          - ObservabilityRecord
          - ObservabilityEvent
          - TraceSpan
          - TraceEvent
        related_relation_ids:
          - ObservabilityRecord-documents-ObservabilityEvent
          - TraceSpan-records_event-TraceEvent
        expected_result:
          zh: 记录与事件保持独立节点，并建立 documents 事实。
          en: Keep record and event as separate nodes and assert documents.
          ja: record と event を別 node として保ち documents を表明します。
        why_valid_or_invalid:
          zh: 稳定事件标识、发生时间、类型与追踪关联共同证明记录保存了该事件。
          en: Stable event identity, occurrence time, type, and trace association jointly prove that the record documents the event.
          ja: 安定 event identity・発生時刻・type・trace 関連が記録による保存を共同証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-observability-record-019
      - id: ObservabilityRecord-documents-ObservabilityEvent-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 只有聚合计数而无事件身份
          en: Aggregate count without event identity
          ja: event identity のない集計値
        scenario_id: null
        descriptions:
          zh: summary-9 只写“本小时发生 12 次超时”，没有事件标识、发生时间、跨度或尝试关联。
          en: summary-9 says only '12 timeouts occurred this hour' and has no event identifier, occurrence time, span, or attempt association.
          ja: summary-9 は「今時12回 timeout」とだけ記し、event ID・発生時刻・span・attempt 関連がありません。
        field_values: {}
        related_node_ids:
          - ObservabilityRecord
          - ObservableSummary
          - ObservabilityEvent
        related_relation_ids:
          - ObservabilityRecord-documents-ObservabilityEvent
        expected_result:
          zh: 不得从聚合计数构造十二个事件或 documents 边。
          en: Do not construct twelve events or documents edges from the aggregate count.
          ja: 集計値から12個の event や documents edge を作成しません。
        why_valid_or_invalid:
          zh: 统计聚合不能恢复事件身份与发生边界。
          en: A statistical aggregate cannot recover event identity or occurrence boundaries.
          ja: 統計集計から event identity・発生境界は復元できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-observability-record-020
    source_claims:
      - claim-observability-record-021
      - claim-observability-record-022
    distinct_fact_rationale:
      zh: TraceSpan-records_event-TraceEvent 是具体追踪关系；documents 是跨 TraceSpan、AuditRecord 等可观测记录的上位查询桥，保留具体边而不以其替代所有记录类型。
      en: TraceSpan-records_event-TraceEvent is the trace-specific fact; documents is the generic query bridge across TraceSpan, AuditRecord, and other observability records and does not replace the specific edge.
      ja: TraceSpan-records_event-TraceEvent は trace 固有事実、documents は TraceSpan・AuditRecord 等を横断する上位 query bridge で、具体 edge を置換しません。
    layout_role: cross-link
    review_status: pending
    target: concept:ObservabilityEvent
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
