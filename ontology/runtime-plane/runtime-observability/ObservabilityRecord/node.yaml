schema: moonweave.ai/ontology-node/v1
id: ObservabilityRecord
kind: concept
status: accepted
labels: {zh: 可观测性记录, en: Observability record, ja: 可観測性記録}
semantics:
  short_definition: {zh: 为运行时检查、审计、状态恢复或追踪导出保留的持久自定义记录。, en: "A durable custom record retained for runtime inspection, audit, state recovery, or trace export.", ja: ランタイム検査、監査、状態復旧、トレースエクスポートのために保持される永続カスタム記録。}
  definition: {zh: ObservabilityRecord 是持久化可检查运行时证据表示的 Moonweave 存储层 Entity。它是通用记录封套，不会自动成为 OpenTelemetry Log Record、OpenTelemetry Metric、OpenTelemetry Metric data point、Span、Span Event 或实时运行时对象。, en: "An ObservabilityRecord is a Moonweave storage-level Entity that persists an inspectable representation of runtime evidence. It is a generic record envelope, not automatically an OpenTelemetry Log Record, OpenTelemetry Metric, OpenTelemetry Metric data point, Span, Span Event, or a live runtime object.", ja: ObservabilityRecord は検査可能なランタイム証拠表現を永続化する Moonweave ストレージレベル Entity である。一般的な記録エンベロープであり、OpenTelemetry Log Record、OpenTelemetry Metric、OpenTelemetry Metric data point、Span、Span Event、ライブランタイムオブジェクトに自動的になるものではない。}
  why_needed: {zh: 即使来源是转录、审计条目、状态捕获或追踪导出而非原生遥测对象，运行时证据仍需要稳定身份、保留策略和完整性边界。, en: "Runtime evidence needs stable identity, retention policy, and integrity boundaries even when the source is a transcript, audit entry, state capture, or trace export rather than a native telemetry object.", ja: ソースがネイティブテレメトリーオブジェクトではなく転記、監査項目、状態取得、トレースエクスポートであっても、ランタイム証拠には安定した識別性、保持ポリシー、完全性境界が必要である。}
  includes:
    - {zh: 记录标识符、记录类型、持久化时间、完整性引用和主体引用。, en: "Record identifier, record kind, persistence time, integrity reference, and subject references.", ja: 記録識別子、記録種別、永続化時刻、完全性参照、主体参照。}
    - {zh: 供后续使用存储的转录、审计、摘要、状态、追踪、span、上下文和链接投影。, en: "Transcript, audit, summary, state, trace, span, context, and link projections stored for later use.", ja: 後続利用のために保存される転記、監査、要約、状態、トレース、span、コンテキスト、リンクの投影。}
  excludes:
    - {zh: 实时 RuntimeSession、当前可变进程状态或未持久化遥测 SDK 对象。, en: "A live RuntimeSession, current mutable process state, or an unpersisted telemetry SDK object.", ja: ライブ RuntimeSession、現在の可変プロセス状態、未永続化テレメトリー SDK オブジェクト。}
    - {zh: 声称每条存储记录都是标准 OTel Log Record、OpenTelemetry Metric 或 Span 的说法。, en: "Claims that every stored record is a standard OTel Log Record, OpenTelemetry Metric, or Span.", ja: すべての保存記録が標準 OTel Log Record、OpenTelemetry Metric、Span だとする主張。}
  semantic_kind: entity
  aliases: [observability evidence record, retained runtime record]
engineering:
  explanation: {zh: 记录器接收运行时证据、应用脱敏和完整性控制、分配稳定记录 ID 并持久化自定义记录。当来源是 OTel 数据时，原生信号语义保留在相应子契约中，而非由每种记录类型继承。, en: "A recorder receives runtime evidence, applies redaction and integrity controls, assigns a stable record ID, and persists a custom record. When the source is OTel data, native signal semantics remain in the corresponding child contract rather than being inherited by every record type.", ja: レコーダーはランタイム証拠を受け取り、マスキングと完全性制御を適用し、安定記録 ID を割り当ててカスタム記録を永続化する。ソースが OTel データの場合、ネイティブシグナル意味は各記録型が継承するのでなく対応する子契約に残る。}
  typical_input:
    - description: {zh: 证据持久化请求, en: Evidence persistence request, ja: 証拠永続化要求}
      format: |-
        {"record_id":"record-501","record_kind":"audit","subject_ref":"exec-842","recorded_at":"2026-07-18T09:22:00Z"}
  typical_output:
    - description: {zh: 持久可观测性记录, en: Durable observability record, ja: 永続可観測性記録}
      format: |-
        {"record_id":"record-501","record_kind":"audit","integrity_digest":"sha256:1a2b...","retention_policy_id":"retention-90"}
  reference_implementations:
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: Defines the field model of a native OTel Log Record, distinct from this generic custom record envelope.}
structure:
  identity_keys: [record_id]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 一条持久可观测性记录的稳定标识符。, en: Stable identifier of one persisted observability record., ja: 1件の永続可観測性記録の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: record-501
      source_claims: [claim-observability-record-boundary]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 此记录所表示的保留证据的 Moonweave 类别。, en: Moonweave category of retained evidence represented by this record., ja: この記録が表す保持証拠の Moonweave カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [transcript, audit, summary, state, trace, span, context, link]
      example_value: audit
      source_claims: [claim-observability-record-boundary]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 保留系统持久化或完成该记录的时间。, en: Time at which this record was persisted or finalized by the retaining system., ja: 保持システムがこの記録を永続化または確定した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:22:00Z'
      source_claims: [claim-observability-record-boundary]
  constraints:
    - id: observability-record-kind-boundary
      severity: error
      language: plain
      expression: Each record must declare its custom record kind and stable identity; it must not claim native OTel signal identity unless its child structure supplies all required standard semantics.
      explanation: {zh: 存储封套与遥测信号类型具有不同契约和互操作预期。, en: Storage envelopes and telemetry signal types have different contracts and interoperability expectations., ja: ストレージエンベロープとテレメトリーシグナル型は異なる契約と相互運用期待を持つ。}
      source_claims: [claim-observability-record-boundary]
  required_relations: []
examples:
  - id: observability-record-positive
    labels: {zh: "LangSmith trace JSONL 导出", en: "LangSmith trace JSONL export", ja: "LangSmith trace JSONL エクスポート"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ObservabilityRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; ObservabilityRecord TraceSpan/Record."}
    field_values: {record_id: record-501, record_kind: audit, recorded_at: '2026-07-18T09:22:00Z'}
    related_node_ids: [ObservabilityRecord, AuditRecord, Execution]
    related_relation_ids: []
    source_claims: [claim-observability-record-boundary]
  - id: observability-record-counterexample
    labels: {zh: "单条 log line 非 ObservabilityRecord", en: "Single log line not ObservabilityRecord", ja: "単一 log line は ObservabilityRecord ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style ObservabilityRecord TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style ObservabilityRecord TraceRecord.", ja: "Missing trace rejects Langfuse-style ObservabilityRecord."}
    field_values: {span_name: agent.run}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-observability-record-boundary]
  - id: observability-record-boundary
    labels: {zh: "ObservabilityRecord 与 Execution 边界", en: "ObservabilityRecord versus Execution", ja: "ObservabilityRecord と Execution 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; ObservabilityRecord must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; ObservabilityRecord must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {record_id: record-501}
    related_node_ids: [ObservabilityRecord, AuditRecord]
    related_relation_ids: []
    source_claims: [claim-observability-record-boundary]
  - id: observability-record-instance-501
    labels: {zh: "LangSmith export run 501 实例", en: "LangSmith export run 501 instance", ja: "LangSmith export run 501 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->ObservabilityRecord ObservabilityEvent.", en: "Phoenix instance: drift+quality->ObservabilityRecord ObservabilityEvent.", ja: "Phoenix instance maps to ObservabilityRecord Event."}
    field_values: {record_id: record-501, record_kind: audit, recorded_at: '2026-07-18T09:22:00Z'}
    related_node_ids: [ObservabilityRecord, AuditRecord, Execution, TraceRecord]
    related_relation_ids: []
    source_claims: [claim-observability-record-boundary]
parent_relation: null
relations: []
sources:
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines the mandatory semantics of native Log Record fields, enabling a clear boundary for custom persisted evidence records.
source_claims:
  - id: claim-observability-record-boundary
    source: otel-logs-data-model
    supports: The OpenTelemetry Logs Data Model specifies a Log Record field structure including timestamps, body, resource, instrumentation scope, attributes, and optional trace context, which a generic custom record does not imply.
    locator: Log and Event Record Definition
    evidence_kind: standard
    confidence: high

