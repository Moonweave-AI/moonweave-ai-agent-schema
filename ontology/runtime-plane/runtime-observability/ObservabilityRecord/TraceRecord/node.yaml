schema: moonweave.ai/ontology-node/v1
id: TraceRecord
kind: concept
status: accepted
labels: {zh: 追踪记录, en: Trace record, ja: トレース記録}
semantics:
  short_definition: {zh: 一个持久化的 ObservabilityRecord，记录由共享 trace ID 标识的分布式追踪导出表示。, en: An ObservabilityRecord that persists an exported representation of one distributed trace identified by a shared trace ID., ja: 共有 trace ID で識別される 1 つの分散トレースのエクスポート表現を永続化する ObservabilityRecord。}
  definition: {zh: TraceRecord 是一个持久化导出或保留投影，表示由同一 trace ID 的相关 OTel Span 表示组成的分布式追踪。它不是正在执行的追踪、单个 TraceSpan、Log Record、OpenTelemetry Metric，或仅携带 trace ID 的自定义领域事件。, en: "A TraceRecord is a durable export or retained projection of a distributed trace composed of related OTel Span representations with one trace ID. It is not the live trace execution, an individual TraceSpan, a Log Record, an OpenTelemetry Metric, or a custom domain event that merely carries a trace ID.", ja: TraceRecord は、1 つの trace ID を共有する関連 OTel Span 表現から成る分散トレースの永続的なエクスポートまたは保持投影である。実行中のトレース、個別の TraceSpan、Log Record、OpenTelemetry Metric、または trace ID だけを持つカスタム領域イベントではない。}
  why_needed: {zh: 跨服务调查需要可寻址的追踪级证据对象，以便在实时插桩结束后保留追踪范围、导出时间、采样信息和组件 span 记录链接。, en: "Cross-service investigation needs an addressable trace-level evidence object that can retain trace scope, export time, sampling information, and links to component span records after live instrumentation ends.", ja: サービス横断の調査には、ライブ計装終了後もトレース範囲、エクスポート時刻、サンプリング情報、構成 Span 記録へのリンクを保持できる、参照可能なトレースレベル証拠オブジェクトが必要である。}
  includes:
    - {zh: Trace record ID、trace ID、导出范围、span 数量、采样或完整性元数据以及保留引用。, en: "Trace record ID, trace ID, export scope, span count, sampling or completeness metadata, and retention reference.", ja: Trace record ID、trace ID、エクスポート範囲、Span 数、サンプリングまたは完全性メタデータ、保持参照。}
    - {zh: 由共享 trace ID 的 OTel span 构成的完整或明确声明为部分的持久化追踪投影。, en: A complete or explicitly declared partial persisted trace projection made from OTel spans sharing a trace ID., ja: 共通の trace ID を共有する OTel Span から作られた、完全または明示的に部分と宣言された永続トレース投影。}
  excludes:
    - {zh: 单个 span、仪表板摘要、会话转录以及带可选追踪上下文的独立日志。, en: "A single span, a dashboard summary, a session transcript, and a standalone log with optional trace context.", ja: 単一の Span、ダッシュボード要約、セッション転記、任意のトレースコンテキストを持つ単独ログ。}
    - {zh: 声称每条带 trace ID 的记录都包含完整的追踪树。, en: Claiming that every record with a trace ID contains a complete trace tree., ja: trace ID を持つすべての記録が完全なトレースツリーを含むと主張すること。}
  semantic_kind: entity
  aliases: [trace export, distributed trace record]
engineering:
  explanation: {zh: 导出器按 trace ID 对已结束或已采样的 span 投影分组，声明保留集是完整还是部分，持久化追踪级元数据，并让各个 TraceSpan 记录指向结果 TraceRecord。插桩仍使用原生 OTel trace API，而不把此存储实体当作插桩对象。, en: "An exporter groups finished or sampled span projections by trace ID, declares whether the retained set is complete or partial, persists trace-level metadata, and lets individual TraceSpan records point to the resulting TraceRecord. Instrumentation continues to use native OTel trace APIs rather than this storage entity.", ja: エクスポーターは完了またはサンプリング済みの Span 投影を trace ID ごとにグループ化し、保持集合が完全か部分かを宣言してトレースレベルのメタデータを永続化し、各 TraceSpan 記録を結果の TraceRecord に向ける。計装はこのストレージエンティティではなくネイティブの OTel trace API を使い続ける。}
  typical_input:
    - description: {zh: 导出的 span 集合, en: Exported span set, ja: エクスポート済み Span 集合}
      format: |-
        {"trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_count":3,"export_scope":"sampled_complete","exported_at":"2026-07-18T09:30:00Z"}
  typical_output:
    - description: {zh: 追踪记录, en: Trace record, ja: トレース記録}
      format: |-
        {"trace_record_id":"trace-900","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_count":3,"export_scope":"sampled_complete"}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Documents traces as nested spans with shared trace identity."}
structure:
  identity_keys: [record_id, trace_record_id, trace_id]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与追踪导出属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as this trace export., ja: このトレースエクスポートと同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: trace-900
      source_claims: [claim-otel-trace-record]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为追踪的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to trace., ja: ObservabilityRecord から継承し trace に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [trace]
      example_value: trace
      source_claims: [claim-otel-trace-record]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 继承的追踪导出完成持久化时间。, en: Persistence time inherited from ObservabilityRecord for the finalized trace export., ja: 確定したトレースエクスポートに対する ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:22:00Z'
      source_claims: [claim-otel-trace-record]
    - id: trace_record_id
      labels: {zh: 追踪记录 ID, en: Trace record ID, ja: トレース記録 ID}
      definitions: {zh: 一条保留追踪导出记录的稳定标识符。, en: Stable identifier of one retained trace export record., ja: 1 件の保持トレースエクスポート記録の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: trace-900
      source_claims: [claim-otel-trace-record]
    - id: trace_id
      labels: {zh: OTel Trace ID, en: OTel Trace ID, ja: OTel Trace ID}
      definitions: {zh: 本追踪记录中的 Span 表示所共享的小写十六进制标识符。, en: Lowercase hexadecimal identifier shared by the Span representations in this trace record., ja: このトレース記録内の Span 表現が共有する小文字の16進識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{32}$'
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims: [claim-otel-trace-record]
    - id: span_count
      labels: {zh: 保留 span 数量, en: Retained span count, ja: 保持 Span 数}
      definitions: {zh: 声明导出范围内包含的 TraceSpan 投影数量。, en: Number of TraceSpan projections included in the declared export scope., ja: 宣言されたエクスポート範囲に含まれる TraceSpan 投影の数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      minimum: 1
      example_value: 3
      source_claims: [claim-otel-trace-record]
    - id: export_scope
      labels: {zh: 导出范围, en: Export scope, ja: エクスポート範囲}
      definitions: {zh: 对已保留 span 表示完整性的说明。, en: Completeness statement for retained span representations., ja: 保持された Span 表現の完全性に関する宣言。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [sampled_complete, partial_export, root_span_only]
      example_value: sampled_complete
      source_claims: [claim-otel-trace-record]
  constraints:
    - id: trace-record-shared-identity
      severity: error
      language: plain
      expression: All included TraceSpan projections must share this trace_id, and span_count plus export_scope must accurately state retained completeness; a partial export must not claim complete trace coverage.
      explanation: {zh: 追踪级调查依赖清晰的标识符和采样边界。, en: Trace-level investigation depends on clear identifier and sampling boundaries., ja: トレースレベルの調査は明確な識別子とサンプリング境界に依存する。}
      source_claims: [claim-otel-trace-record]
  required_relations: []
examples:
  - id: trace-record-positive
    labels: {zh: "LangSmith trace 树", en: "LangSmith trace tree", ja: "LangSmith trace ツリー"}
    descriptions: {zh: "LangSmith RunTree parent_run_id, run_type chain/llm/tool; tracing_v2_enabled(project_name) chain.invoke(); TraceRecord maps TraceRecord/TraceSpan/Execution.", en: "LangSmith RunTree parent_run_id, run_type chain/llm/tool; tracing_v2_enabled chain.invoke(); TraceRecord maps TraceRecord/TraceSpan/Execution.", ja: "LangSmith RunTree parent_run_id run_type; TraceRecord run tree."}
    field_values: {trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, record_id: langsmith-trace-root}
    related_node_ids: [TraceRecord, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-otel-trace-record]
  - id: trace-record-counterexample
    labels: {zh: "单个 span 无 trace 容器", en: "Single span without trace container", ja: "単一 span に trace 容器なし"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style TraceRecord.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style TraceRecord.", ja: "Gateway bypass rejects Helicone-style TraceRecord."}
    field_values: {span_id: 00f067aa0ba902b7}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-otel-trace-record]
  - id: trace-record-boundary
    labels: {zh: "TraceRecord 与 Execution 边界", en: "TraceRecord versus Execution", ja: "TraceRecord と Execution 境界"}
    descriptions: {zh: "Langfuse score is eval signal not Execution; TraceRecord preserves trace/span/score distinction.", en: "Langfuse score is eval signal not Execution; TraceRecord preserves trace/span/score distinction.", ja: "score not Execution."}
    field_values: {trace_id: 4bf92f3577b34da6a3ce929d0e0e4736}
    related_node_ids: [TraceRecord, Execution]
    related_relation_ids: []
    source_claims: [claim-otel-trace-record]
  - id: trace-record-instance-trace-900
    labels: {zh: "Langfuse trace 导出", en: "Langfuse trace export", ja: "Langfuse trace エクスポート"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->TraceRecord.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->TraceRecord.", ja: "OTel instance maps to TraceRecord."}
    field_values: {trace_id: langfuse-trace-0192a3b4, record_id: langfuse-trace-root}
    related_node_ids: [TraceRecord, TraceSpan, AgentTranscript]
    related_relation_ids: []
    source_claims: [claim-otel-trace-record]
parent_relation:
  id: TraceRecord-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是追踪记录, en: is a trace record, ja: トレース記録である}
  definitions: {zh: 每个 TraceRecord 都是保留相关 OTel span 的声明追踪级导出的 ObservabilityRecord。, en: Every TraceRecord is an ObservabilityRecord that retains a declared trace-level export of related OTel spans., ja: すべての TraceRecord は、関連 OTel Span の宣言済みトレースレベルエクスポートを保持する ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_trace_record, labels: {zh: 具有追踪记录, en: has trace record, ja: トレース記録を持つ}}
  conditions:
    - id: trace-record-parent-condition
      severity: error
      expression: Require one OTel trace ID, one or more retained span projections, and an explicit export completeness scope.
      explanations: {zh: 单个关联诊断记录不能提升为追踪导出。, en: A single correlated diagnostic record cannot be promoted to a trace export., ja: 単一の相関診断記録をトレースエクスポートに昇格させることはできない。}
      source_claims: [claim-otel-trace-record]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-otel-trace-record]
relations: []
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines a trace as nested spans and defines the span identities and operations represented by this persistent export.
source_claims:
  - id: claim-otel-trace-record
    source: otel-trace-api
    supports: OpenTelemetry defines a Span as one operation within a trace and allows spans to be nested to form a trace tree with shared trace identity.
    locator: Span and SpanContext
    evidence_kind: standard
    confidence: high

