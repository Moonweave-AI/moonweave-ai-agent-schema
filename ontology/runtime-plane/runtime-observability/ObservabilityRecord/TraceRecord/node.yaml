      en: TraceRecord contains_span each TraceSpan sharing its trace_id; a span is a component record of the trace, not a taxonomy subtype of TraceRecord.
      ja: TraceRecord は共有 trace_id の TraceSpan を contains_span で集約し、Span は Trace の構成 record であって TraceRecord の taxonomy subtype ではありません。
