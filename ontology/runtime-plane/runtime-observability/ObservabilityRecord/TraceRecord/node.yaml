source_claims:
  - id: claim-trace-record-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace through Spans correlated by one TraceId, with parent-child structure and Links. Moonweave therefore models TraceRecord as the information container for that correlated span graph, distinct from each TraceSpan and from a user-visible transcript.
    locator: Overview > OpenTelemetry Client Architecture > signals, traces, spans, and context propagation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
