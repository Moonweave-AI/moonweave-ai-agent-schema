schema: moonweave.ai/ontology-node/v1
id: TraceRecord
kind: concept
labels:
  en: trace record
  zh: 追踪记录
  ja: トレース記録
semantics:
  short_definition:
    zh: 由共享追踪标识关联的一组跨度记录。
    en: A set of span records correlated by a shared trace identifier.
    ja: 共通のトレース識別子で関連付けられたスパン記録の集合。
  definition:
    zh: 追踪记录是一种 ObservabilityRecord，继承 record_id 作为本体记录身份；trace_id 是连接外部遥测跨度的相关键，而不是附加身份键。该记录由相关跨度构成，用来表达一次请求、工作流或会话片段跨组件展开的因果路径。
    en: A TraceRecord is an ObservabilityRecord and inherits record_id as its ontology record identity. trace_id is the shared trace identifier used as a correlation key joining external telemetry spans, not an additional identity key. The correlated spans represent the causal path of one request, workflow, or session segment across components.
    ja: TraceRecord は ObservabilityRecord の一種で、本体上の記録同一性として record_id を継承します。trace_id は外部テレメトリのスパンを結ぶ相関キーで、追加同一性キーではありません。関連スパンは要求やワークフローの因果経路を表します。
  why_needed:
    zh: 追踪级身份使查询能够跨多个跨度还原端到端路径、采样决定和上下文传播；若只保留跨度或消息转录，就无法稳定回答哪些操作属于同一次分布式执行。
    en: Trace-level identity supports end-to-end path reconstruction, sampling decisions, and context propagation across multiple spans. Spans or transcripts alone cannot reliably identify which operations belong to the same distributed execution.
    ja: トレース単位の同一性により、複数スパンをまたぐ経路、サンプリング判断、文脈伝播を復元できます。スパンや転写だけでは、どの操作が同じ分散実行に属するかを安定して判断できません。
  includes:
    - zh: 包括具有同一 trace_id 的根跨度与后继跨度集合，以及跨异步边界或不同追踪建立的显式跨度链接。
      en: Includes root and descendant spans sharing one trace_id, together with explicit span links used across asynchronous boundaries or separate traces.
      ja: 同一 trace_id を共有するルートスパンと子孫スパン、および非同期境界や別トレースをまたぐ明示的スパンリンクを含みます。
  excludes:
    - zh: 不包括只按界面可见顺序排列消息和动作的 AgentTranscript，也不包括只描述一次操作的单个 TraceSpan。
      en: Excludes AgentTranscript records ordered only by user-visible messages and actions, and a single TraceSpan describing one operation.
      ja: 画面上のメッセージと操作だけを順に並べる AgentTranscript、および一つの操作だけを記録する単一 TraceSpan は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: TraceRecord（Trace/RunTree 根）映射 OpenTelemetry traceId 资源跨度与 LangSmith 根 run（parent_run_id=null）；不替代 Execution 终态。
    en: TraceRecord (Trace/RunTree root) maps OpenTelemetry traceId resource spans and LangSmith root run (parent_run_id=null); does not replace Execution terminal state.
    ja: TraceRecord（Trace/RunTree root）は OTLP traceId と LangSmith root run を写像し Execution 终态を代替しません。
  typical_input:
    - description: OTLP export or LangSmith run tree ingest.
      format: POST /v1/traces {"resourceSpans":[{"scopeSpans":[{"spans":[...]}]}]}
      source_claims:
        - claim-otel-observability
        - claim-trace-record-design
  typical_output:
    - description: Moonweave observability record projection.
      format: '{"trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","trace_record_id":"trace-44"}'
      source_claims:
        - claim-trace-record-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields:
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: トレース ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨全部组成跨度稳定标识同一次端到端追踪；根跨度生成后不得改变。
        en: Stably identifies one end-to-end trace across every component span and does not change after the root span creates it.
        ja: 構成する全 Span にまたがる一つの end-to-end trace を安定識別し、root span 生成後は変更しません。
      allowed_values: []
      pattern: null
      example_value: trace-8f2c1
      source_claims:
        - claim-trace-record-design
    - id: sampled
      labels:
        zh: 是否采样
        en: sampled
        ja: サンプリング済み
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当采样决定可知时，记录该追踪是否被选入导出；缺失不等于 false，也不等同于 Span 的 IsRecording。
        en: Records whether the trace was selected for export when the sampling decision is known; absence is not false and is distinct from a Span's IsRecording state.
        ja: sampling 判断が既知の場合に export 選択を記録し、欠落は false ではなく Span の IsRecording とも別です。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-trace-record-design
  constraints:
    - id: trace-record-id-stable
      severity: error
      expression_language: plain
      expression: trace_id is immutable after the first span is recorded
      explanations:
        zh: 首个跨度记录后，追踪标识不可改变。
        en: trace_id is immutable after the first span is recorded.
        ja: 最初のスパン記録後、trace_id は変更できません。
      source_claims:
        - claim-trace-record-design
  required_relation_constraints:
    - id: trace-record-contains-span
      direction: outgoing
      predicate: contains_span
      target_concept_id: TraceSpan
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 追踪记录至少包含一个跨度。
        en: A trace record contains at least one span.
        ja: トレース記録には少なくとも一つのスパンが含まれます。
      source_claims:
        - claim-trace-record-design
examples:
  - id: TraceRecord-example-positive-001
    labels:
      zh: LangSmith trace 树
      en: LangSmith trace tree
      ja: LangSmith trace ツリー
    descriptions:
      zh: LangSmith client.list_runs(project_name=, trace_id=4bf92f3577b34da6a3ce929d0e0e4736) 返回 root run agent.run 与 child runs retriever.search、llm.generate、tool.execute，共享 trace_id。
      en: LangSmith client.list_runs(project_name=, trace_id=4bf92f...) returns root run agent.run and child runs retriever.search, llm.generate, tool.execute sharing trace_id.
      ja: LangSmith list_runs は同一 trace_id 下の root/child runs を返す。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: trace-record-8f2c1
      record_kind: trace
      observed_at: 2026-07-16T12:00:01.000Z
      provenance_ref: otel-collector-traces
      runtime_correlation_ref: trace-8f2c1
      trace_id: trace-8f2c1
      sampled: true
    related_node_ids:
      - TraceRecord
      - TraceSpan
      - TraceLink
      - ObservabilityRecord
      - TraceContext
    related_relation_ids:
      - TraceRecord-is_a-ObservabilityRecord
      - TraceRecord-contains_span-TraceSpan
      - trace_has_context
    source_claims:
      - claim-trace-record-design
  - id: TraceRecord-example-boundary-001
    labels:
      zh: 单个 span 无 trace 容器
      en: Single span without trace container
      ja: 単一 span に trace 容器なし
    descriptions:
      zh: 仅导出单个 span_id=00f067aa0ba902b7 无 trace 级容器与 export scope，不能建模 TraceRecord，应保留 TraceSpan。
      en: Exporting only span_id=00f067aa0ba902b7 without trace-level container and export scope cannot model TraceRecord; keep TraceSpan.
      ja: 単一 span_id だけでは TraceRecord にならず TraceSpan を保持する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceRecord
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - TraceRecord-is_a-ObservabilityRecord
    source_claims:
      - claim-trace-record-design
  - id: TraceRecord-example-3
    labels:
      zh: TraceRecord 与 Execution 边界
      en: TraceRecord versus Execution
      ja: TraceRecord と Execution 境界
    descriptions:
      zh: LangSmith trace 报告 Execution timing 与 tool 调用，但不替代 PROV-O Activity；TraceRecord 是观测证据，Execution 是业务 Activity。
      en: LangSmith trace reports Execution timing and tool calls but does not replace PROV-O Activity; TraceRecord is observational evidence, Execution is business Activity.
      ja: trace は Execution を置換する観測証拠である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceRecord
    related_relation_ids: []
    source_claims:
      - claim-trace-record-design
      - claim-trace-record-design
  - id: TraceRecord-example-4
    labels:
      zh: Langfuse trace 导出
      en: Langfuse trace export
      ja: Langfuse trace エクスポート
    descriptions:
      zh: Langfuse traces.export(trace_id=langfuse-trace-0192a3b4) JSONL 含 session_id 与嵌套 observations，可重建完整 trace 树。
      en: Langfuse traces.export(trace_id=langfuse-trace-0192a3b4) JSONL includes session_id and nested observations reconstructing full trace tree.
      ja: Langfuse export JSONL で trace ツリーを再構築できる。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceRecord
    related_relation_ids: []
    source_claims:
      - claim-trace-record-design
      - claim-trace-record-design
parent_relation:
  id: TraceRecord-is_a-ObservabilityRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 TraceRecord 都是 ObservabilityRecord，其种差是用共享 trace_id 聚合一个端到端操作的跨度，并保留父子与链接因果结构。
    en: Every TraceRecord is an ObservabilityRecord distinguished by grouping the spans of one end-to-end operation under a shared trace_id while preserving parent-child and Link causality.
    ja: すべての TraceRecord は ObservabilityRecord で、共有 trace_id の下に end-to-end 操作の Span を集約し parent-child と Link 因果を保持する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trace-record-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TraceRecord-contains_span-TraceSpan
    predicate: contains_span
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: contains span
      en: contains span
      ja: contains span
    definitions:
      zh: TraceRecord 通过 contains_span 聚合共享其 trace_id 的 TraceSpan；跨度是追踪的组成记录，不是 TraceRecord 的分类子类。
      en: TraceRecord contains_span each TraceSpan sharing its trace_id; a span is a component record of the trace, not a taxonomy subtype of TraceRecord.
      ja: TraceRecord は共有 trace_id の TraceSpan を contains_span で集約し、Span は Trace の構成 record であって TraceRecord の taxonomy subtype ではありません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: span_of
      labels:
        zh: 反向：contains span
        en: span of
        ja: 逆方向：contains span
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-record-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceSpan
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-otel-observability
    source: src-otel-protocol
    supports: OpenTelemetry OTLP export provides traceId, spanId, and parent links for TraceSpan mapping.
    locator: OTLP > TracesData
    evidence_kind: design-inference
    confidence: high
  - id: claim-langsmith-observability
    source: src-langsmith
    supports: LangSmith run trees expose parent_run_id hierarchy mappable to TraceRecord.
    locator: Runs > run tree
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-record-design
    source: src-runtime-observability-design
    supports: TraceRecord groups spans without owning execution facts.
    locator: TraceRecord boundary
    evidence_kind: design-inference
    confidence: high
