schema: moonweave.ai/ontology-node/v1
id: AuditRecord
kind: concept
status: accepted
labels:
  en: audit record
  zh: 审计记录
  ja: 監査記録
semantics:
  short_definition:
    zh: 记录主体、动作、对象、时间与结果的原始审计证据。
    en: Raw audit evidence of actor, action, target, time, and outcome.
    ja: 主体、行為、対象、時刻、結果を残す生の監査証拠。
  definition:
    zh: 审计记录是一种可观测信息记录，对一次需要追责的运行事实保存主体、动作、对象、发生时间、授权或策略上下文及结果。它陈述可验证事实，不解释质量好坏，也不按对话可见顺序组织内容；后续 AuditLog 可以在保留来源的前提下对这些记录进行持久化与串联。
    en: An AuditRecord is an observability information record for one accountable runtime fact, preserving actor, action, target, occurrence time, authorization or policy context, and outcome. It states verifiable facts rather than judging quality or following conversational display order; an AuditLog may later persist and chain these records while retaining provenance.
    ja: AuditRecord は追跡責任が必要な一つの実行事実について、主体、行為、対象、発生時刻、認可または方針文脈、結果を保存する観測情報記録です。品質判断や対話表示順ではなく検証可能事実を述べ、AuditLog が後で来歴を保持して永続化・連鎖できます。
  why_needed:
    zh: 审计记录使权限变更、敏感工具调用和人工批准能够被逐项归责与复核，即使相关内容没有出现在用户转录中；没有这种原始事实层，后续审计日志只能证明存储过文本，不能证明动作由谁在何种授权下完成。
    en: Audit records make permission changes, sensitive tool calls, and human approvals attributable and reviewable even when they are absent from the user transcript. Without this raw fact layer, a later audit log can prove that text was stored but not who acted under which authority.
    ja: 監査記録により、権限変更、機微なツール呼出し、人手承認を、利用者転写に現れなくても個別に帰属・確認できます。この生事実層がなければ、後続ログは文字列保存しか証明できず、誰がどの権限で実行したかを示せません。
  includes:
    - zh: 包括记录某主体批准沙箱外网络访问、调用高风险工具、修改策略或拒绝请求的不可抵赖运行事实。
      en: Includes attributable facts that an actor approved out-of-sandbox network access, invoked a high-risk tool, changed a policy, or denied a request.
      ja: 主体がサンドボックス外通信を承認した、高危険ツールを呼んだ、方針を変更した、要求を拒否したという帰属可能な事実を含みます。
  excludes:
    - zh: 不包括仅供用户阅读的 AgentTranscript、对执行质量作判断的 Review，也不包括缺少主体或动作对象而无法归责的普通调试消息。
      en: Excludes participant-facing AgentTranscript content, quality judgments such as Review, and ordinary debug messages that omit the actor or acted-on target needed for attribution.
      ja: 参加者向け AgentTranscript、品質判断である Review、主体または対象がなく帰属できない通常デバッグメッセージは含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuditRecord-example-positive-001
    kind: positive
    labels:
      zh: 带责任上下文的工具决策事实
      en: Accountable tool-decision fact
      ja: 責任文脈を持つツール判断事実
    scenario_id: null
    descriptions:
      zh: 退款智能体尝试调用支付工具；记录保存智能体身份、订单目标、发生时间、适用授权策略、策略判定为拒绝以及工具未执行的结果，并关联该运行跨度。
      en: A refund agent attempts to invoke a payment tool. The record preserves the agent identity, order target, occurrence time, applicable authorization policy, the deny decision, the non-execution outcome, and the correlated run span.
      ja: 返金エージェントが決済ツールを呼び出そうとする。記録はエージェント識別子、注文対象、発生時刻、適用された認可方針、拒否判断、未実行結果、関連実行スパンを保存する。
    field_values:
      record_id: audit-payment-denial-772
      record_kind: audit
      observed_at: 2026-07-16T10:43:13.000Z
      provenance_ref: authorization-audit-writer
      runtime_correlation_ref: trace-8f2c1/span-payment-auth
    related_node_ids:
      - AuditRecord
      - ObservabilityRecord
    related_relation_ids:
      - AuditRecord-is_a-ObservabilityRecord
    expected_result:
      zh: 查询可以回答谁对什么采取了何种动作、依据何种策略以及结果为何。
      en: A query can answer who attempted which action on what target, under which policy, and with what outcome.
      ja: 誰が何を対象にどの操作を試み、どの方針が適用され、結果がどうなったかを照会できる。
    why_valid_or_invalid:
      zh: 该对象保存一个可追责事实及其授权和结果上下文，而不是对运行质量作出评价。
      en: The object preserves one accountable fact with authorization and outcome context rather than evaluating the quality of the run.
      ja: この対象は認可と結果の文脈を伴う一つの説明責任事実を保存し、実行品質を評価しない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audit-record-002
  - id: AuditRecord-example-boundary-001
    kind: boundary
    labels:
      zh: 对话流水不等于审计事实
      en: Conversation flow is not an audit fact
      ja: 会話の流れは監査事実ではない
    scenario_id: null
    descriptions:
      zh: 一段聊天历史只按顺序保存“请退款”和“正在处理”，没有执行者、目标资源、授权依据或动作结果。它可构成转录记录，但信息不足以形成审计记录。
      en: A chat history only preserves “refund this” and “processing” in sequence, without an acting identity, target resource, authorization basis, or action outcome. It may be a transcript, but it is insufficient as an audit record.
      ja: 会話履歴は「返金して」と「処理中」を順に残すだけで、実行主体、対象資源、認可根拠、操作結果がない。転写にはなり得るが監査記録としては不十分である。
    field_values: {}
    related_node_ids:
      - AuditRecord
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - AuditRecord-is_a-ObservabilityRecord
    expected_result:
      zh: 该对象不被判定为审计记录；只有补齐可追责动作语义后才可归入。
      en: The object is not classified as an AuditRecord until accountable action semantics are supplied.
      ja: 説明責任を持つ操作意味が補われるまではAuditRecordに分類されない。
    why_valid_or_invalid:
      zh: 有时间顺序并不等于能回答主体、动作、对象、依据和结果。
      en: Temporal order alone cannot answer actor, action, target, governing basis, and outcome.
      ja: 時系列だけでは主体、操作、対象、根拠、結果を答えられない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audit-record-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ObservableSummary
    shared_parent_concept_id: ObservabilityRecord
    differentia:
      zh: 共享父节点对照：父节点 ObservabilityRecord：AuditRecord（semantic kind=information，骨架 AuditRecord-is_a-ObservabilityRecord）；ObservableSummary（semantic kind=information，骨架 ObservableSummary-is_a-ObservabilityRecord）。双端条件：AuditRecord 条件：“审计记录属于可观测记录，区别于其他同类对象的条件是：它是附着在运行会话或追踪上的原始审计证据，保存发生了什么以及关联了谁或什么，但不承担反馈解释职责”；ObservableSummary 条件：“可观测摘要是以如下事实为区分特征的可观测记录：它把先前事件、状态、转录或产物证据压缩为运行期可见摘要，用于上下文预算、审查或移交，同时不保存私有推理转录”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ObservabilityRecord: AuditRecord (semantic kind=information, backbone AuditRecord-is_a-ObservabilityRecord); ObservableSummary (semantic kind=information, backbone ObservableSummary-is_a-ObservabilityRecord). Endpoint conditions: AuditRecord condition: “Audit record is an observability record whose defining condition is that it is a raw audit evidence attached to a runtime session or trace, preserving what happened and who or what was associated without performing feedback interpretation”; ObservableSummary condition: “Observable summary is an observability record; its differentiating condition is that it is an observable runtime summary that compresses prior events, state, transcript, or artifact evidence for context budget, review, or handoff without storing private reasoning transcripts”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ObservabilityRecord：AuditRecord（semantic kind=information、バックボーン AuditRecord-is_a-ObservabilityRecord）；ObservableSummary（semantic kind=information、バックボーン ObservableSummary-is_a-ObservabilityRecord）。両端条件：AuditRecord の条件：「監査記録は観測記録のうち、次の事実を定義条件とする対象です：それは実行セッションまたはトレースに付く生の監査証拠であり、何が起き、誰または何が関連したかを保存しますが、フィードバック上の解釈は行いません」；ObservableSummary の条件：「観測可能要約は観測記録の一種であり、次の条件で区別されます：それは、過去のイベント、状態、転写、成果物証拠を実行時に見える要約へ圧縮し、文脈予算、レビュー、引き継ぎに用いますが、私的な推論転写は保存しません」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-audit-record-001
