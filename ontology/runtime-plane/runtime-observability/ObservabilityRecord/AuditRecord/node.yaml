    descriptions:
      zh: OpenAI 组织 audit log export 含 event=api_key.created、actor=admin@corp.com、resource=sk-...、timestamp=2026-01-15T09:00:00Z。
      en: OpenAI organization audit log export includes event=api_key.created, actor=admin@corp.com, resource=sk-..., timestamp=2026-01-15T09:00:00Z.
      ja: OpenAI audit log export が AuditRecord である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: audit-payment-denial-772
      record_kind: audit
      observed_at: 2026-07-16T10:43:13.000Z
      provenance_ref: authorization-audit-writer
      runtime_correlation_ref: trace-8f2c1/span-payment-auth
    related_node_ids:
      - AuditRecord
      - ObservabilityRecord
    related_relation_ids:
      - AuditRecord-is_a-ObservabilityRecord
    source_claims:
      - claim-audit-record-design
  - id: AuditRecord-example-boundary-001
    labels:
      zh: TraceSpan 非 AuditRecord
      en: TraceSpan not AuditRecord
      ja: TraceSpan は AuditRecord ではない
    descriptions:
      zh: OTel TraceSpan name=agent.tool_call 是操作追踪，不是组织级 AuditRecord 合规日志。
      en: OTel TraceSpan name=agent.tool_call is operation trace, not organization-level AuditRecord compliance log.
      ja: TraceSpan は AuditRecord ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - AuditRecord
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - AuditRecord-is_a-ObservabilityRecord
    source_claims:
      - claim-audit-record-design
  - id: AuditRecord-example-3
    labels:
      zh: Audit 与 AgentTranscript 边界
      en: Audit versus AgentTranscript boundary
      ja: Audit と AgentTranscript 境界
    descriptions:
      zh: AuditRecord 记录管理/合规事件；AgentTranscript 记录对话内容；audit 不含完整 message body。
      en: AuditRecord records admin/compliance events; AgentTranscript records conversation content; audit excludes full message body.
      ja: Audit は管理イベント、Transcript は対話内容である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - AuditRecord
    related_relation_ids: []
    source_claims:
      - claim-audit-record-vendor
      - claim-audit-record-design
  - id: AuditRecord-example-4
    labels:
      zh: API key 轮换审计实例
      en: API key rotation audit instance
      ja: API key ローテーション監査事例
    descriptions:
      zh: AuditRecord audit_id=audit-301、event_type=api_key.rotated、actor_id=admin@corp.com、recorded_at=2026-01-15T09:30:00Z。
      en: AuditRecord audit_id=audit-301, event_type=api_key.rotated, actor_id=admin@corp.com, recorded_at=2026-01-15T09:30:00Z.
      ja: audit-301 API key ローテーション監査を記録する。
    example_source:
      product: OpenTelemetry
