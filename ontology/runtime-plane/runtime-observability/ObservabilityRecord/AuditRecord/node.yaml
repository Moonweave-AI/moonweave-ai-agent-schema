schema: moonweave.ai/ontology-node/v1
id: AuditRecord
kind: concept
status: accepted
labels: {zh: 审计记录, en: Audit record, ja: 監査記録}
semantics:
  short_definition: {zh: 保存受治理运行时操作或决策可问责证据的完整性保护 ObservabilityRecord。, en: "An integrity-protected ObservabilityRecord that preserves accountable evidence of a governed runtime action or decision.", ja: 統治されたランタイム操作または決定の説明責任ある証拠を保持する完全性保護済み ObservabilityRecord。}
  definition: {zh: AuditRecord 是用于安全、策略或合规相关运行时操作的持久自定义证据 Entity。它记录可问责主体、操作类别、时间、结果和完整性引用；它不会自动成为 OTel Log Record、执行追踪或未验证应用消息。, en: "An AuditRecord is a durable custom evidence Entity for a security, policy, or compliance-relevant runtime action. It records the accountable subject, action category, time, result, and integrity reference; it is not automatically an OTel Log Record, an execution trace, or an unverified application message.", ja: AuditRecord はセキュリティ、ポリシー、またはコンプライアンス関連ランタイム操作のための永続カスタム証拠 Entity である。説明責任主体、操作カテゴリ、時刻、結果、完全性参照を記録し、OTel Log Record、実行トレース、未検証アプリケーションメッセージに自動的になるものではない。}
  why_needed: {zh: 治理需要比普通诊断具有更强归属和完整性预期的持久证据，同时将审计语义与原生遥测信号格式分开。, en: "Governance requires durable evidence with stronger attribution and integrity expectations than ordinary diagnostics, while keeping audit semantics separate from native telemetry signal formats.", ja: ガバナンスには、通常の診断より強い帰属と完全性期待を持つ永続証拠が必要で、監査意味をネイティブテレメトリーシグナル形式と分ける必要がある。}
  includes:
    - {zh: 审计 ID、操作类别、可问责行动者或系统引用、发生时间、结果和完整性摘要。, en: "Audit ID, action category, accountable actor or system reference, occurrence time, outcome, and integrity digest.", ja: 監査 ID、操作カテゴリ、説明責任を負うアクターまたはシステム参照、発生時刻、結果、完全性ダイジェスト。}
    - {zh: 策略决策、访问相关操作、审批结果和受控配置变更。, en: "Policy decisions, access-relevant actions, approval outcomes, and controlled configuration changes.", ja: ポリシー決定、アクセス関連操作、承認結果、制御された構成変更。}
  excludes:
    - {zh: 高容量调试日志、原始提示、未验证用户声明和通用执行时间 spans。, en: "High-volume debug logs, raw prompts, unverified user claims, and generic execution timing spans.", ja: 大量のデバッグログ、生プロンプト、未検証ユーザー主張、一般的な実行時間 span。}
    - {zh: 没有具体受治理操作的保留策略或审查工作流记录。, en: "A retention policy or review workflow record without a concrete governed action.", ja: 具体的な統治操作を持たない保持ポリシーまたはレビュー ワークフロー記録。}
  semantic_kind: entity
  aliases: [accountability record, governed action evidence]
engineering:
  explanation: {zh: 治理边界在相关操作或决策后发出一条审计条目、脱敏敏感载荷细节、计算完整性摘要并持久化结果。关联 Log Record 或 TraceSpan 可帮助诊断，但不能取代审计证据。, en: "A governance boundary emits one audit entry after a relevant action or decision, redacts sensitive payload details, calculates an integrity digest, and persists the result. A correlated Log Record or TraceSpan may assist diagnosis but does not replace audit evidence.", ja: ガバナンス境界は関連操作または決定後に1件の監査項目を発行し、機微なペイロード詳細をマスキングし、完全性ダイジェストを計算して結果を永続化する。相関 Log Record または TraceSpan は診断を助け得るが、監査証拠を置き換えない。}
  typical_input:
    - description: {zh: 受治理操作结果, en: Governed action result, ja: 統治操作結果}
      format: |-
        {"action_category":"tool.approval","subject_ref":"exec-842","actor_ref":"operator-7","outcome":"approved","occurred_at":"2026-07-18T09:18:00Z"}
  typical_output:
    - description: {zh: 审计记录, en: Audit record, ja: 監査記録}
      format: |-
        {"audit_id":"audit-301","action_category":"tool.approval","outcome":"approved","integrity_digest":"sha256:5d8c..."}
  reference_implementations:
    - {name: PROV-O Entity, url: https://www.w3.org/TR/prov-o/, description: Provides Entity and provenance distinctions for accountable durable records.}
    - {name: OpenTelemetry Logs Data Model, url: https://opentelemetry.io/docs/specs/otel/logs/data-model/, description: Defines OTel Log Records separately from integrity-governed audit evidence.}
structure:
  identity_keys: [record_id, audit_id]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与审计内容属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as the audit content., ja: 監査内容と同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: audit-301
      source_claims: [claim-audit-record-entity]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为审计的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to audit., ja: ObservabilityRecord から継承し audit に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [audit]
      example_value: audit
      source_claims: [claim-audit-record-entity]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 继承的审计记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord for the finalized audit record., ja: 確定した監査記録に対する ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:22:00Z'
      source_claims: [claim-audit-record-entity]
    - id: audit_id
      labels: {zh: 审计 ID, en: Audit ID, ja: 監査 ID}
      definitions: {zh: 一条可问责操作证据记录的稳定标识符。, en: Stable identifier of one accountable action evidence record., ja: 1件の説明責任ある操作証拠記録の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: audit-301
      source_claims: [claim-audit-record-entity]
    - id: action_category
      labels: {zh: 操作类别, en: Action category, ja: 操作カテゴリ}
      definitions: {zh: 受治理操作或决策的受控类别。, en: Controlled category of governed action or decision., ja: 統治操作または決定の制御カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: tool.approval
      source_claims: [claim-audit-record-entity]
    - id: integrity_digest
      labels: {zh: 完整性摘要, en: Integrity digest, ja: 完全性ダイジェスト}
      definitions: {zh: 已完成审计载荷的加密摘要或不可变性引用。, en: Cryptographic digest or immutability reference for the finalized audit payload., ja: 確定済み監査ペイロードの暗号ダイジェストまたは不変性参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:5d8c6bc5421f7e9bbfc5e49293c4d5baf31a2d683bafd0170924e84d42d0109a
      source_claims: [claim-audit-record-entity]
  constraints:
    - id: audit-record-accountability
      severity: error
      language: plain
      expression: A finalized audit record must name a governed action category, accountable subject reference, time, controlled outcome, and integrity digest; raw secrets and unrestricted payload contents must be excluded.
      explanation: {zh: 审计证据必须可归属且防篡改，但不能变成机密数据转储。, en: Audit evidence must be attributable and tamper-evident without becoming a confidential data dump., ja: 監査証拠は機密データダンプにならずに帰属可能かつ改ざん検出可能でなければならない。}
      source_claims: [claim-audit-record-entity]
  required_relations: [AuditRecord-specializes-ObservabilityRecord]
examples:
  - id: audit-record-positive
    labels: {zh: "OpenAI 组织审计日志", en: "OpenAI organization audit log", ja: "OpenAI 組織監査ログ"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; AuditRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; AuditRecord maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; AuditRecord TraceSpan/Record."}
    field_values: {record_id: audit-301, record_kind: audit, recorded_at: '2026-07-18T09:22:00Z', audit_id: audit-301, action_category: tool.approval, integrity_digest: sha256:5d8c6bc5421f7e9bbfc5e49293c4d5baf31a2d683bafd0170924e84d42d0109a}
    related_node_ids: [AuditRecord, Execution, HumanOperatorRole]
    related_relation_ids: [AuditRecord-specializes-ObservabilityRecord]
    source_claims: [claim-audit-record-entity]
  - id: audit-record-counterexample
    labels: {zh: "TraceSpan 非 AuditRecord", en: "TraceSpan not AuditRecord", ja: "TraceSpan は AuditRecord ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style AuditRecord TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style AuditRecord TraceRecord.", ja: "Missing trace rejects Langfuse-style AuditRecord."}
    field_values: {body: approval succeeded}
    related_node_ids: [ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-audit-record-entity]
  - id: audit-record-boundary
    labels: {zh: "Audit 与 AgentTranscript 边界", en: "Audit versus AgentTranscript boundary", ja: "Audit と AgentTranscript 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; AuditRecord must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; AuditRecord must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {audit_id: audit-301}
    related_node_ids: [AuditRecord, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-audit-record-entity]
  - id: audit-record-instance-301
    labels: {zh: "API key 轮换审计实例", en: "API key rotation audit instance", ja: "API key ローテーション監査事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->AuditRecord ObservabilityEvent.", en: "Phoenix instance: drift+quality->AuditRecord ObservabilityEvent.", ja: "Phoenix instance maps to AuditRecord Event."}
    field_values: {record_id: audit-301, record_kind: audit, recorded_at: '2026-07-18T09:22:00Z', audit_id: audit-301, action_category: tool.approval, integrity_digest: sha256:5d8c6bc5421f7e9bbfc5e49293c4d5baf31a2d683bafd0170924e84d42d0109a}
    related_node_ids: [AuditRecord, Execution, Actor, TraceRecord]
    related_relation_ids: [AuditRecord-specializes-ObservabilityRecord]
    source_claims: [claim-audit-record-entity]
parent_relation:
  id: AuditRecord-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是审计记录, en: is an audit record, ja: 監査記録である}
  definitions: {zh: 每个 AuditRecord 都是具有可问责操作和完整性证据的 ObservabilityRecord。, en: Every AuditRecord is an ObservabilityRecord with accountable action and integrity evidence., ja: すべての AuditRecord は説明責任ある操作と完全性証拠を持つ ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_audit_record, labels: {zh: 具有审计记录, en: has audit record, ja: 監査記録を持つ}}
  conditions:
    - id: audit-record-parent-condition
      severity: error
      expression: Require a governed action, accountable subject, controlled outcome, and integrity evidence after redaction.
      explanations: {zh: 通用诊断不能事后升级为审计证据。, en: Generic diagnostics cannot be upgraded to audit evidence after the fact., ja: 一般診断は後から監査証拠へアップグレードできない。}
      source_claims: [claim-audit-record-entity]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-audit-record-entity]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines durable Entities and provenance distinctions needed for accountable records.
  - id: otel-logs-data-model
    title: "OpenTelemetry Logs Data Model"
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: standard
    relevance: Defines native Log Record semantics separate from custom audit evidence.
source_claims:
  - id: claim-audit-record-entity
    source: prov-o-core
    supports: PROV-O defines Entity as a thing with fixed aspects that can be attributed and linked to activity provenance, supporting durable accountable evidence records.
    locator: Section 3.1, prov:Entity
    evidence_kind: standard
    confidence: high

