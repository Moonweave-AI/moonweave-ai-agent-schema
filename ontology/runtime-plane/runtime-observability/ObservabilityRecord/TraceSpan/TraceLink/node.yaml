schema: moonweave.ai/ontology-node/v1
id: TraceLink
kind: concept
labels:
  en: trace link
  zh: 追踪链接
  ja: トレースリンク
semantics:
  short_definition:
    zh: 新跨度指向一个非父级 SpanContext 的关联元数据。
    en: Metadata linking a new span to a non-parent SpanContext.
    ja: 新スパンを親でない SpanContext へ関連付けるメタデータ。
  definition:
    zh: TraceLink 是附着于一个 TraceSpan 的非父关联记录；每条链接只引用一个 SpanContext，并可携带描述该关联的属性。它用于批处理、消息消费、扇入或显式因果等单一父子关系不足的场景；链接不会把被引用跨度变成父级，也不是任意图谱边。
    en: A TraceLink is a non-parent association record attached to one TraceSpan. Each link references exactly one SpanContext and may carry attributes describing that association. It is used for batch processing, message consumption, fan-in, or explicit causality where one parent is insufficient; a link does not make the referenced span a parent and is not an arbitrary graph edge.
    ja: TraceLink は一つの TraceSpan に付属する non-parent association record です。各 link は一つの SpanContext を参照し、association attributes を持てます。batch/message consumption/fan-in/explicit causality に使い、参照 span を parent にせず arbitrary graph edge でもありません。
  why_needed:
    zh: 链接使一个聚合或消费者跨度能够保留多个输入跨度的来源，而不伪造多个父节点；这对并行智能体结果汇合、队列消息和跨追踪批处理尤其重要。
    en: Links let an aggregator or consumer span retain provenance from multiple input spans without inventing multiple parents, which is essential for parallel-agent fan-in, queued messages, and cross-trace batches.
    ja: リンクにより集約・消費スパンは複数親を捏造せず複数入力の来歴を保て、並列エージェント合流、キュー、跨トレースバッチに重要です。
  includes:
    - zh: 包括汇总跨度链接三个并行子智能体结果跨度，以及消息消费者跨度链接消息生产者的远程 SpanContext。
      en: Includes a synthesis span linked to three parallel-agent result spans and a message-consumer span linked to the producer's remote SpanContext.
      ja: 三つの並列エージェント結果へリンクする統合スパン、生成者の遠隔 SpanContext へリンクするメッセージ消費スパンを含みます。
  excludes:
    - zh: 不包括普通父子关系、同一跨度的 SpanAttribute、任意产物引用或仅因两个节点相邻而添加的图谱关联。
      en: Excludes ordinary parent-child relationships, SpanAttribute values on one span, arbitrary artifact references, and graph associations inferred merely from adjacency.
      ja: 通常親子関係、一スパンの SpanAttribute、任意成果物参照、隣接だけから作るグラフ関連は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 TraceLink 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating TraceLink, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: TraceLink 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to TraceLink.
      format: |-
        # Example TraceLink ingest
        { "trace-link_ref": "example-1" }
      source_claims:
        - claim-trace-link-design
  typical_output:
    - description: Moonweave-local TraceLink projection.
      format: '{ "schema_owner": "moonweave-local-design", "trace-link_id": "example-1" }'
      source_claims:
        - claim-trace-link-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys:
    - owning_span_ref
    - link_index
  fields:
    - id: owning_span_ref
      labels:
        zh: 所属跨度引用
        en: owning-span reference
        ja: 所属 span 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用声明该非父关联的 TraceSpan。
        en: References the TraceSpan that declares this non-parent association.
        ja: この non-parent association を宣言する TraceSpan を参照します。
      allowed_values: []
      pattern: null
      example_value: trace-span:batch-consumer-7
      source_claims:
        - claim-trace-link-design
    - id: link_index
      labels:
        zh: 链接序位
        en: link index
        ja: link index
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该链接在所属跨度有序链接序列中的零基序位。
        en: The zero-based position of the link in its owning span's ordered link sequence.
        ja: owning span の ordered link sequence における zero-based position。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-trace-link-design
    - id: linked_context_ref
      labels:
        zh: 被链接上下文引用
        en: linked-context reference
        ja: linked context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被非父关联指向的一个 TraceContext。
        en: References the one TraceContext targeted by the non-parent association.
        ja: non-parent association が指す一つの TraceContext を参照します。
      allowed_values: []
      pattern: null
      example_value: trace-context:producer-a
      source_claims:
        - claim-trace-link-design
    - id: attributes
      labels:
        zh: 链接属性
        en: link attributes
        ja: link attributes
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 描述该关联而不修改被引用上下文的有限属性集合。
        en: A bounded attribute set describing the association without modifying the referenced context.
        ja: 参照 context を変更せず association を説明する bounded attribute set。
      allowed_values: []
      pattern: null
      example_value:
        messaging.source.name: orders
        messaging.batch.message_count: 3
      source_claims:
        - claim-trace-link-design
  constraints:
    - id: trace-link-does-not-create-parent
      severity: error
      expression_language: plain
      expression: linked_context_ref is not interpreted as the owning span's parent context
      explanations:
        zh: 链接保留额外因果来源，但不改变单一父级。
        en: A link preserves additional causal provenance without changing the single parent.
        ja: link は追加因果 provenance を保持するが single parent を変更しません。
      source_claims:
        - claim-trace-link-design
    - id: trace-link-index-unique-within-span
      severity: error
      expression_language: plain
      expression: no two TraceLinks with the same owning_span_ref share link_index
      explanations:
        zh: 所属跨度内的序位必须唯一。
        en: The sequence index is unique within the owning span.
        ja: owning span 内で sequence index は一意です。
      source_claims:
        - claim-trace-link-design
  required_relation_constraints:
    - id: trace-link-owned-by-one-span
      direction: incoming
      predicate: has_link
      target_concept_id: TraceSpan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个链接附着于一个声明它的跨度。
        en: Each link is attached to one declaring span.
        ja: 各 link は一つの declaring span に付属します。
      source_claims:
        - claim-trace-link-design
    - id: trace-link-references-one-context
      direction: outgoing
      predicate: references
      target_concept_id: TraceContext
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个 TraceLink 引用一个 SpanContext 对应节点。
        en: One TraceLink references one SpanContext node.
        ja: 一つの TraceLink は一つの SpanContext node を参照します。
      source_claims:
        - claim-trace-link-design
examples:
  - id: TraceLink-example-positive-001
    labels:
      zh: OTel Span Link 跨 trace
      en: OTel Span Link cross-trace
      ja: OTel Span Link トレース横断
    descriptions:
      zh: OpenTelemetry span.add_link(SpanContext(trace_id=aaa..., span_id=bbb...)) 将当前 span 链接到异步 retriever 子 trace，Link 含 trace_state 与 attributes。
      en: OpenTelemetry span.add_link(SpanContext(trace_id=aaa..., span_id=bbb...)) links current span to async retriever child trace with trace_state and attributes.
      ja: OTel add_link で非同期 retriever 子 trace を現在 span にリンクする。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      owning_span_ref: trace-span:batch-consumer-7
      link_index: 0
      linked_context_ref: trace-context:producer-a
      attributes:
        messaging.source.name: orders
        messaging.batch.message_count: 3
    related_node_ids:
      - TraceLink
      - TraceSpan
      - TraceContext
    related_relation_ids:
      - TraceSpan-has_link-TraceLink
      - TraceLink-references-TraceContext
    source_claims:
      - claim-trace-link-design
  - id: TraceLink-example-boundary-001
    labels:
      zh: parent_run_id 不是 Link
      en: parent_run_id is not Link
      ja: parent_run_id は Link ではない
    descriptions:
      zh: LangSmith parent_run_id 表示父子 run 嵌套，是 TraceSpan 层级不是 OTel Span Link；缺少 link context 时不建模 TraceLink。
      en: LangSmith parent_run_id denotes parent-child run nesting, TraceSpan hierarchy not OTel Span Link; without link context do not model TraceLink.
      ja: LangSmith parent_run_id はネストであり OTel Span Link ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceLink
      - TraceSpan
    related_relation_ids:
      - trace_link_source_span
      - trace_link_target_span
    source_claims:
      - claim-trace-link-design
  - id: TraceLink-example-3
    labels:
      zh: TraceLink 与 TraceSpan 边界
      en: TraceLink versus TraceSpan
      ja: TraceLink と TraceSpan 境界
    descriptions:
      zh: TraceLink 附着宿主 TraceSpan；单独 trace_id/span_id 对无宿主 span 时保留 TraceContext 而非 TraceLink。
      en: TraceLink attaches to host TraceSpan; standalone trace_id/span_id pair without host span keeps TraceContext not TraceLink.
      ja: TraceLink は宿主 TraceSpan に付着する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceLink
    related_relation_ids: []
    source_claims:
      - claim-trace-link-vendor
      - claim-trace-link-design
  - id: TraceLink-example-4
    labels:
      zh: 分布式 retriever 子 trace Link
      en: Distributed retriever child trace link
      ja: 分散 retriever 子 trace Link
    descriptions:
      zh: RAG 管道中 agent.run span 通过 add_link 关联后台 batch retriever trace（trace_id=c7d8...）；两 trace 异步合流分析 latency。
      en: In RAG pipeline, agent.run span add_link associates background batch retriever trace (trace_id=c7d8...); two traces merge asynchronously for latency analysis.
      ja: RAG で agent.run span が batch retriever trace に Link する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceLink
    related_relation_ids: []
    source_claims:
      - claim-trace-link-vendor
      - claim-trace-link-design
parent_relation:
  id: TraceSpan-has_link-TraceLink
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有追踪链接
    en: has trace link
    ja: トレースリンクを持つ
  definitions:
    zh: TraceSpan 通过 has_link 指向它在创建时或运行中记录的 TraceLink，用于表达父关系之外的因果或批处理关联。
    en: TraceSpan has_link each TraceLink recorded at creation or during execution to express causal or batch associations beyond parentage.
    ja: TraceSpan は作成時または実行中に記録した TraceLink を has_link し、parentage 以外の因果・batch 関連を表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由跨度声明的追踪链接
      en: is trace link declared by span
      ja: スパンが宣言するトレースリンクである
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trace-link-design
  distinct_fact_rationale:
    zh: source_span 是跨轨迹链接的发出端，target_span 是到达端；交换角色会改变因果读法。
    en: source_span is the emitting end of a cross-trace link and target_span is its receiving end; swapping them changes the causal reading.
    ja: source_span は trace link の発信端、target_span は到達端であり、役割交換は因果的読解を変えます。
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: TraceLink-references-TraceContext
    predicate: references
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 引用被链接上下文
      en: references linked context
      ja: リンク先 context を参照
    definitions:
      zh: TraceLink 通过 references 指向被关联跨度的 TraceContext；目标跨度记录可以缺失，但被引用上下文的 TraceId 与 SpanId 必须明确。
      en: TraceLink references the linked span's TraceContext; the target span record may be absent, but the referenced TraceId and SpanId must be explicit.
      ja: TraceLink は linked Span の TraceContext を references し、target Span record がなくても参照 TraceId と SpanId は明示必須です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_referenced_by_trace_link
      labels:
        zh: 被追踪链接引用
        en: is referenced by trace link
        ja: トレースリンクから参照される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-link-design
    distinct_fact_rationale:
      zh: 被链接上下文携带跨边界关联所需的 TraceId 与 SpanId；缺少可解析 SpanContext 时不能建立 references。
      en: The linked context carries the TraceId and SpanId required for cross-boundary association; references cannot be asserted without a resolvable SpanContext.
      ja: リンク先 context は境界横断関連に必要な TraceId と SpanId を運び、解決可能 SpanContext がなければ references を断言できません。
    layout_role: cross-link
    target: concept:TraceContext
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-trace-link-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports TraceLink identity and boundary mapping.
    locator: TraceLink integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-link-design
    source: src-runtime-observability-design
    supports: Moonweave TraceLink concept boundary within runtime-observability.
    locator: TraceLink boundary
    evidence_kind: design-inference
    confidence: high
