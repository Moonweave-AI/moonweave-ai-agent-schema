        why_valid_or_invalid:
          zh: 自然语言相似性不是 SpanContext 引用；缺少可解析身份就不能建立 references。
          en: Natural-language similarity is not a SpanContext reference; without resolvable identity references cannot be asserted.
          ja: 自然言語類似は SpanContext reference ではなく、解決可能 identity がなければ references を断言できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-link-004
    source_claims:
      - claim-trace-link-004
    distinct_fact_rationale:
      zh: 被链接上下文携带跨边界关联所需的 TraceId 与 SpanId；缺少可解析 SpanContext 时不能建立 references。
      en: The linked context carries the TraceId and SpanId required for cross-boundary association; references cannot be asserted without a resolvable SpanContext.
      ja: リンク先 context は境界横断関連に必要な TraceId と SpanId を運び、解決可能 SpanContext がなければ references を断言できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:TraceContext
