schema: moonweave.ai/ontology-node/v1
id: TraceLink
kind: concept
status: accepted
labels: {zh: OpenTelemetry Span Link 记录, en: OpenTelemetry Span Link record, ja: OpenTelemetry Span Link 記録}
semantics:
  short_definition: {zh: 一个持久化 OTel Span Link 值，附着于一个 TraceSpan 并在不具有父子语义的情况下引用另一个 TraceContext。, en: A persisted OTel Span Link value attached to one TraceSpan and referencing another TraceContext without parent-child semantics., ja: 1つの TraceSpan に付着し、親子意味を持たずに別の TraceContext を参照する永続化 OTel Span Link 値。}
  definition: {zh: TraceLink 是宿主 TraceSpan 上 OpenTelemetry Link 的持久化投影，标识相关目标 SpanContext 和可选链接属性。它不是子 span、父 span、TraceContext 本身、整条追踪关系或通用应用依赖边。, en: "A TraceLink is a durable projection of an OpenTelemetry Link on a host TraceSpan, identifying a related target SpanContext and optional link attributes. It is not a child span, parent span, TraceContext itself, whole trace relation, or a generic application dependency edge.", ja: TraceLink はホスト TraceSpan 上の OpenTelemetry Link の永続投影であり、関連する対象 SpanContext と任意のリンク属性を識別する。子 Span、親 Span、TraceContext 自体、トレース全体の関係、一般的なアプリケーション依存エッジではない。}
  why_needed: {zh: 扇入、批处理和异步因果关系需要一种标准方式来保留相关 span 上下文，因为强制使用父子关系会不准确。, en: "Fan-in, batch, and asynchronous causality need a standard way to retain related span contexts when forcing a parent-child relationship would be inaccurate.", ja: ファンイン、バッチ、非同期因果には、親子関係を強制すると不正確になる場合に関連 Span コンテキストを保持する標準的な方法が必要である。}
  includes:
    - {zh: Link ID、目标 trace ID、目标 span ID、可选属性以及一个宿主 TraceSpan 附着。, en: "Link ID, target trace ID, target span ID, optional attributes, and one host TraceSpan attachment.", ja: Link ID、対象 trace ID、対象 span ID、任意の属性、1つのホスト TraceSpan への付着。}
    - {zh: 指向同一或另一条追踪中 span 的 OTel 链接。, en: OTel links to spans in the same or another trace., ja: 同じまたは別のトレース内の Span への OTel リンク。}
  excludes:
    - {zh: 父子嵌套、没有 SpanContext 证据的任意图边和独立追踪上下文值。, en: "Parent-child nesting, an arbitrary graph edge without SpanContext evidence, and a standalone trace context value.", ja: 親子の入れ子、SpanContext 証拠のない任意のグラフエッジ、単独のトレースコンテキスト値。}
    - {zh: 追踪记录成员关系，或没有追踪关联的执行依赖。, en: A trace record membership relation or an execution dependency with no tracing correlation., ja: トレース記録の所属関係、またはトレーシング相関のない実行依存関係。}
  semantic_kind: entity
  aliases: [span link, trace causality link]
engineering:
  explanation: {zh: 当另一个 SpanContext 与因果有关但不是父级时，插桩会向 OTel Span 添加 Link。导出持久化会分别存储宿主附着与目标上下文，使追踪查看器和采样分析可以保留这种非层级关系。, en: "Instrumentation adds a Link to an OTel Span when another SpanContext is causally relevant but is not the parent. Export persistence stores the host attachment and target context separately, allowing trace viewers and sampling analysis to retain the non-hierarchical relationship.", ja: 別の SpanContext が因果的に関連するが親ではない場合、計装は OTel Span に Link を追加する。エクスポート永続化はホスト付着と対象コンテキストを別々に保存し、トレースビューアとサンプリング分析がこの非階層関係を保持できるようにする。}
  typical_input:
    - description: {zh: OTel 链接发出, en: OTel link emission, ja: OTel リンク発行}
      format: |-
        {"host_span_id":"8f2d8a3c5b6e7f90","target_trace_id":"0af7651916cd43dd8448eb211c80319c","target_span_id":"b7ad6b7169203331","attribute_count":1}
  typical_output:
    - description: {zh: 持久化 Span Link 投影, en: Persisted Span Link projection, ja: 永続化された Span Link 投影}
      format: |-
        {"link_id":"link-8","host_span_id":"8f2d8a3c5b6e7f90","target_trace_id":"0af7651916cd43dd8448eb211c80319c","target_span_id":"b7ad6b7169203331"}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Documents host Span Links to other spans, including across traces."}
structure:
  identity_keys: [link_id, target_trace_id, target_span_id]
  fields:
    - id: link_id
      labels: {zh: 追踪链接 ID, en: Trace link ID, ja: トレースリンク ID}
      definitions: {zh: 一个导出 OTel Span Link 投影的稳定存储标识符。, en: Stable storage identifier of one exported OTel Span Link projection., ja: 1件のエクスポート済み OTel Span Link 投影の安定したストレージ識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: link-8
      source_claims: [claim-otel-span-link]
    - id: target_trace_id
      labels: {zh: 目标 Trace ID, en: Target Trace ID, ja: 対象 Trace ID}
      definitions: {zh: 已链接目标 SpanContext 携带的 TraceId。, en: TraceId carried by the linked target SpanContext., ja: リンク対象 SpanContext が持つ TraceId。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{32}$'
      example_value: 0af7651916cd43dd8448eb211c80319c
      source_claims: [claim-otel-span-link]
    - id: target_span_id
      labels: {zh: 目标 Span ID, en: Target Span ID, ja: 対象 Span ID}
      definitions: {zh: 已链接目标 SpanContext 携带的 SpanId。, en: SpanId carried by the linked target SpanContext., ja: リンク対象 SpanContext が持つ SpanId。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{16}$'
      example_value: b7ad6b7169203331
      source_claims: [claim-otel-span-link]
    - id: attribute_count
      labels: {zh: 链接属性数量, en: Link attribute count, ja: リンク属性数}
      definitions: {zh: 附着于 OTel Link 投影的属性数量。, en: Number of attributes attached to the OTel Link projection., ja: OTel Link 投影に付着した属性の数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      minimum: 0
      example_value: 1
      source_claims: [claim-otel-span-link]
  constraints:
    - id: trace-link-nonhierarchical-context
      severity: error
      language: plain
      expression: A TraceLink must attach to one host TraceSpan and reference one valid target TraceContext; it must not assert a parent-child relation or link the host to its own identical SpanContext.
      explanation: {zh: OTel Link 语义在不施加层级关系的情况下保留因果关联。, en: OTel Link semantics preserve causal association without imposing hierarchy., ja: OTel Link の意味は階層を課さずに因果的関連を保持する。}
      source_claims: [claim-otel-span-link]
  required_relations: [TraceLink-part_of-TraceSpan, TraceLink-references-TraceContext]
examples:
  - id: trace-link-positive
    labels: {zh: "OTel Span Link 跨 trace", en: "OTel Span Link cross-trace", ja: "OTel Span Link トレース横断"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceLink maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceLink maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TraceLink TraceSpan/Record."}
    field_values: {link_id: link-8, target_trace_id: 0af7651916cd43dd8448eb211c80319c, target_span_id: b7ad6b7169203331, attribute_count: 1}
    related_node_ids: [TraceLink, TraceSpan, TraceContext]
    related_relation_ids: [TraceLink-part_of-TraceSpan, TraceLink-references-TraceContext]
    source_claims: [claim-otel-span-link]
  - id: trace-link-counterexample
    labels: {zh: "parent_run_id 不是 Link", en: "parent_run_id is not Link", ja: "parent_run_id は Link ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style TraceLink TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style TraceLink TraceRecord.", ja: "Missing trace rejects Langfuse-style TraceLink."}
    field_values: {relation: parent-child}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-otel-span-link]
  - id: trace-link-boundary
    labels: {zh: "TraceLink 与 TraceSpan 边界", en: "TraceLink versus TraceSpan", ja: "TraceLink と TraceSpan 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; TraceLink must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; TraceLink must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {link_id: link-8}
    related_node_ids: [TraceLink, TraceContext]
    related_relation_ids: [TraceLink-references-TraceContext]
    source_claims: [claim-otel-span-link]
  - id: trace-link-instance-8
    labels: {zh: "分布式 retriever 子 trace Link", en: "Distributed retriever child trace link", ja: "分散 retriever 子 trace Link"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->TraceLink ObservabilityEvent.", en: "Phoenix instance: drift+quality->TraceLink ObservabilityEvent.", ja: "Phoenix instance maps to TraceLink Event."}
    field_values: {link_id: link-8, target_trace_id: 0af7651916cd43dd8448eb211c80319c, target_span_id: b7ad6b7169203331, attribute_count: 1}
    related_node_ids: [TraceLink, TraceSpan, TraceContext, TraceRecord]
    related_relation_ids: [TraceLink-part_of-TraceSpan, TraceLink-references-TraceContext]
    source_claims: [claim-otel-span-link]
parent_relation:
  id: TraceLink-part_of-TraceSpan
  predicate: part_of
  target: concept:TraceSpan
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是 TraceSpan 的一部分, en: is part of TraceSpan, ja: TraceSpan の一部である}
  definitions: {zh: 当 TraceLink 被添加到该宿主 OTel Span 并持久化在其导出投影中时，它是 TraceSpan 的 part_of。, en: TraceLink is part_of TraceSpan when it was added to that host OTel Span and persisted in its export projection., ja: TraceLink がそのホスト OTel Span に追加され、そのエクスポート投影に永続化されたとき、TraceSpan の part_of である。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_link, labels: {zh: 具有 Span Link, en: has Span Link, ja: Span Link を持つ}}
  conditions:
    - id: trace-link-parent-condition
      severity: error
      expression: Require one host TraceSpan export identity before retaining a link projection.
      explanations: {zh: 目标上下文本身不是 Span Link。, en: A target context alone is not a Span Link., ja: 対象コンテキストだけでは Span Link ではない。}
      source_claims: [claim-otel-span-link]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-otel-span-link]
relations:
  - id: TraceLink-references-TraceContext
    predicate: references
    target: concept:TraceContext
    direction: source-to-target
    relation_kind: reference
    labels: {zh: 引用已链接的 TraceContext, en: references linked TraceContext, ja: リンク済み TraceContext を参照する}
    definitions: {zh: 当链接目标的 trace 和 span 标识符等于该持久化上下文表示时，TraceLink 引用 TraceContext。, en: TraceLink references TraceContext when the link target's trace and span identifiers equal that persisted context representation., ja: リンク対象の trace と Span 識別子がその永続コンテキスト表現と等しいとき、TraceLink は TraceContext を参照する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_referenced_by_link, labels: {zh: 被 Span Link 引用, en: is referenced by Span Link, ja: Span Link から参照される}}
    conditions:
      - id: trace-link-context-reference-condition
        severity: error
        expression: Target trace and span IDs in the link must exactly match the referenced TraceContext and must not equal the host span context.
        explanations: {zh: Link 目标必须是具体的外部或独立上下文，而不是任意标签。, en: "Link targets must be concrete external or independent contexts, not arbitrary labels.", ja: Link の対象は任意のラベルではなく、具体的な外部または独立したコンテキストでなければならない。}
        source_claims: [claim-otel-span-link]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-otel-span-link]
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines links between a host Span and other SpanContexts, including links across traces.
source_claims:
  - id: claim-otel-span-link
    source: otel-trace-api
    supports: OpenTelemetry allows a Span to record Links to other spans, including spans in the same or a different trace, without defining those links as parent-child relations.
    locator: Span, Specifying links; Span operations, Add Link
    evidence_kind: standard
    confidence: high

