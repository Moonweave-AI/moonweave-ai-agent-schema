schema: moonweave.ai/ontology-node/v1
id: TraceSpan
kind: concept
status: accepted
labels: {zh: OpenTelemetry Span 记录, en: OpenTelemetry Span record, ja: OpenTelemetry Span 記録}
semantics:
  short_definition: {zh: 一个持久化完成或导出的 OpenTelemetry Span 操作投影的 ObservabilityRecord。, en: An ObservabilityRecord that persists the completed or exported projection of one OpenTelemetry Span operation., ja: 完了またはエクスポートされた 1 つの OpenTelemetry Span 操作の投影を永続化する ObservabilityRecord。}
  definition: {zh: TraceSpan 是一个表示追踪中一个操作的 OTel Span 持久化投影。它作为导出证据携带 span 和 trace 标识、名称、时间、状态、属性、事件与链接；它不是实时 SDK Span 对象、完整 TraceRecord、Execution Activity 或自定义领域事件。, en: "A TraceSpan is a durable projection of an OTel Span representing one operation within a trace. It carries span and trace identity, name, timing, status, attributes, events, and links as export evidence; it is not the live SDK Span object, a whole TraceRecord, an Execution Activity, or a custom domain event.", ja: TraceSpan はトレース内の1つの操作を表す OTel Span の永続投影である。エクスポート証拠として Span と trace の識別子、名前、時刻、ステータス、属性、イベント、リンクを持つ。ライブ SDK Span オブジェクト、全体の TraceRecord、Execution Activity、カスタム領域イベントではない。}
  why_needed: {zh: 性能与因果分析需要在插桩结束后保留具有精确 OTel 字段的 span 级记录，同时保持运行时工作与追踪保留实体的区分。, en: "Performance and causality analysis require a span-level record with exact OTel fields after instrumentation has ended, while keeping runtime work and trace retention entities distinct.", ja: 性能と因果分析には、計装終了後に正確な OTel フィールドを持つ Span レベル記録が必要であり、ランタイム作業とトレース保持エンティティを区別し続ける必要がある。}
  includes:
    - {zh: OTel trace ID、span ID、名称、span kind、开始和结束时间、状态、属性、Span Event 与 Span Link。, en: "OTel trace ID, span ID, name, span kind, start/end time, status, attributes, Span Events, and Span Links.", ja: OTel trace ID、span ID、名前、span kind、開始・終了時刻、ステータス、属性、Span Event、Span Link。}
    - {zh: 用于追踪分析的一个操作的持久化采样或导出视图。, en: Persisted sampled or exported view of one operation used in trace analysis., ja: トレース分析に用いる1つの操作の永続化されたサンプリング済みまたはエクスポート済みビュー。}
  excludes:
    - {zh: 可变的实时 Span API 对象、完整追踪集合、通用 Log Record 和业务 Execution Activity。, en: "The live mutable Span API object, a full trace collection, a generic Log Record, and a business Execution Activity.", ja: ライブで可変な Span API オブジェクト、完全なトレース集合、一般的な Log Record、業務 Execution Activity。}
    - {zh: 单独的 TraceContext 值，或没有宿主 span 的 TraceLink 值。, en: A TraceContext value alone or a TraceLink value without its host span., ja: 単独の TraceContext 値、またはホスト Span のない TraceLink 値。}
  semantic_kind: entity
  aliases: [span export, OTel span projection]
engineering:
  explanation: {zh: 插桩会围绕一个操作创建并结束原生 OTel Span。导出处理以不可变标识和时间持久化 TraceSpan 投影，附加所有 Span Event 与 Link 记录，并把它放入 TraceRecord。原始运行时活动可以关联，但绝不会被其遥测替代。, en: "Instrumentation creates and ends a native OTel Span around an operation. Export processing persists a TraceSpan projection with immutable identity and timing, attaches any Span Event and Link records, and places it in a TraceRecord. The original runtime activity may be correlated but is never replaced by its telemetry.", ja: 計装は操作の周囲にネイティブ OTel Span を作成して終了する。エクスポート処理は不変の識別子と時刻を持つ TraceSpan 投影を永続化し、Span Event と Link 記録を付着させ、TraceRecord に格納する。元のランタイム活動は相関できるが、そのテレメトリーに置き換えられることはない。}
  typical_input:
    - description: {zh: OpenTelemetry Tracer.start_span 输入, en: OpenTelemetry Tracer.start_span input, ja: OpenTelemetry Tracer.start_span 入力}
      format: |-
        {"name":"agent.tool_call","context":{"trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_id":"00f067aa0ba902b7"},"attributes":{"tool.name":"read_file"}}
  typical_output:
    - description: {zh: 已结束并导出的 span 记录, en: Ended and exported span record, ja: 終了してエクスポートされた Span 記録}
      format: |-
        {"span_record_id":"span-restore-1","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_id":"8f2d8a3c5b6e7f90","name":"agent.tool_call","start_time_unix_nano":1784365260000000000,"end_time_unix_nano":1784365260400000000,"status_code":"OK"}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: Documents TracerProvider, Span start/end, SpanContext, attributes, links, events, and status.}
structure:
  identity_keys: [record_id, span_record_id, trace_id, span_id]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与 Span 投影属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as this Span projection., ja: この Span 投影と同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: span-restore-1
      source_claims: [claim-otel-span-record]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为 Span 的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to span., ja: ObservabilityRecord から継承し span に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [span]
      example_value: span
      source_claims: [claim-otel-span-record]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions:
        zh: "从 ObservabilityRecord 继承的 Span 投影完成持久化时间，并区别于操作结束时间。"
        en: "Persistence time inherited from ObservabilityRecord for the finalized Span projection, distinct from operation end time."
        ja: "操作終了時刻とは区別される、確定した Span 投影に対する ObservabilityRecord から継承した永続化時刻。"
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-otel-span-record]
    - id: span_record_id
      labels: {zh: Span 记录 ID, en: Span record ID, ja: Span 記録 ID}
      definitions: {zh: 一个导出 OTel Span 投影的稳定存储标识符。, en: Stable storage identifier of one exported OTel Span projection., ja: 1 件のエクスポート済み OTel Span 投影の安定したストレージ識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: span-restore-1
      source_claims: [claim-otel-span-record]
    - id: trace_id
      labels: {zh: OTel Trace ID, en: OTel Trace ID, ja: OTel Trace ID}
      definitions: {zh: 相关 span 共享的小写十六进制追踪标识符。, en: Lowercase hexadecimal trace identifier shared by related spans., ja: 関連 Span が共有する小文字の16進トレース識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{32}$'
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims: [claim-otel-span-record]
    - id: span_id
      labels: {zh: OTel Span ID, en: OTel Span ID, ja: OTel Span ID}
      definitions: {zh: 此单个 span 的小写十六进制标识符。, en: Lowercase hexadecimal identifier of this individual span., ja: この個別 Span の小文字16進識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{16}$'
      example_value: 8f2d8a3c5b6e7f90
      source_claims: [claim-otel-span-record]
    - id: span_name
      labels: {zh: Span 名称, en: Span name, ja: Span 名}
      definitions: {zh: 由该 span 表示的低基数操作名称。, en: Low-cardinality operation name represented by the span., ja: この Span が表す低カーディナリティの操作名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: checkpoint.restore
      source_claims: [claim-otel-span-record]
    - id: start_time
      labels: {zh: Span 开始时间, en: Span start time, ja: Span 開始時刻}
      definitions: {zh: 被插桩操作开始的时间。, en: Time at which the instrumented operation began., ja: 計装された操作が開始した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:00Z'
      source_claims: [claim-otel-span-record]
    - id: end_time
      labels: {zh: Span 结束时间, en: Span end time, ja: Span 終了時刻}
      definitions: {zh: 被插桩操作结束的时间。, en: Time at which the instrumented operation ended., ja: 計装された操作が終了した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-otel-span-record]
  constraints:
    - id: trace-span-otel-identity-and-time
      severity: error
      language: plain
      expression: A persisted TraceSpan must have valid non-zero OTel trace and span identifiers, a span name, start/end timing, and a final status; events and links remain attached records rather than replacing the span.
      explanation: {zh: Span 数据必须保留 OTel 操作模型，不能变成通用执行日志。, en: Span data must preserve the OTel operation model and not become a generic execution log., ja: Span データは OTel 操作モデルを保持し、一般的な実行ログになってはならない。}
      source_claims: [claim-otel-span-record]
  required_relations: [TraceSpan-specializes-ObservabilityRecord, TraceSpan-part_of-TraceRecord]
examples:
  - id: trace-span-positive
    labels: {zh: "LangSmith RAG agent span 树", en: "LangSmith RAG agent span tree", ja: "LangSmith RAG agent Span ツリー"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceSpan maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceSpan maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TraceSpan TraceSpan/Record."}
    field_values: {record_id: langsmith-rag-agent-run, record_kind: span, recorded_at: '2026-01-15T10:00:03Z', span_record_id: langsmith-rag-agent-run, trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, span_id: 00f067aa0ba902b7, span_name: agent.run, start_time: '2026-01-15T10:00:00Z', end_time: '2026-01-15T10:00:03Z'}
    related_node_ids: [TraceSpan, TraceRecord, Execution]
    related_relation_ids: [TraceSpan-part_of-TraceRecord]
    source_claims: [claim-otel-span-record]
  - id: trace-span-counterexample
    labels: {zh: "LangGraph StateSnapshot 非 Span", en: "LangGraph StateSnapshot not Span", ja: "LangGraph StateSnapshot は Span ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style TraceSpan TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style TraceSpan TraceRecord.", ja: "Missing trace rejects Langfuse-style TraceSpan."}
    field_values: {checkpoint_id: 1f070a87-33b3-6d36-8001-50c306580336, thread_id: thread-1}
    related_node_ids: [RestoreActivity, StateSnapshot]
    related_relation_ids: []
    source_claims: [claim-otel-span-record]
  - id: trace-span-boundary
    labels: {zh: "OTel SpanContext 与 Span 边界", en: "OTel SpanContext versus Span", ja: "OTel SpanContext と Span 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; TraceSpan must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; TraceSpan must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {span_record_id: langsmith-rag-agent-run, trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, span_id: 00f067aa0ba902b7}
    related_node_ids: [TraceSpan, TraceContext]
    related_relation_ids: [TraceContext-part_of-TraceSpan]
    source_claims: [claim-otel-span-record]
  - id: trace-span-instance-restore-1
    labels: {zh: "Langfuse llm-call generation span", en: "Langfuse llm-call generation span", ja: "Langfuse llm-call generation span"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->TraceSpan.", en: "Langfuse instance: trace+span+score->TraceSpan.", ja: "Langfuse instance maps to TraceSpan."}
    field_values: {record_id: langfuse-llm-call, record_kind: span, recorded_at: '2026-01-15T10:00:02Z', span_record_id: langfuse-llm-call, trace_id: a1b2c3d4e5f6789012345678abcdef01, span_id: 1234567890abcdef, span_name: llm-call, start_time: '2026-01-15T10:00:01Z', end_time: '2026-01-15T10:00:02Z'}
    related_node_ids: [TraceSpan, TraceRecord, TraceEvent, TraceContext]
    related_relation_ids: [TraceSpan-part_of-TraceRecord]
    source_claims: [claim-otel-span-record]
parent_relation:
  id: TraceSpan-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 OpenTelemetry Span 记录, en: is an OpenTelemetry Span record, ja: OpenTelemetry Span 記録である}
  definitions: {zh: 每个 TraceSpan 都是持久化 OTel Span 投影的 ObservabilityRecord。, en: Every TraceSpan is an ObservabilityRecord that persists an OTel Span projection., ja: すべての TraceSpan は OTel Span 投影を永続化する ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_trace_span, labels: {zh: 具有追踪 span, en: has trace span, ja: トレース Span を持つ}}
  conditions:
    - id: trace-span-parent-condition
      severity: error
      expression: Require OTel trace/span identifiers, operation timing, and span-level attributes or status in a persisted projection.
      explanations: {zh: 通用执行事件或日志记录不是 span。, en: A generic execution event or log record is not a span., ja: 一般的な実行イベントやログ記録は Span ではない。}
      source_claims: [claim-otel-span-record]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-otel-span-record]
relations:
  - id: TraceSpan-part_of-TraceRecord
    predicate: part_of
    target: concept:TraceRecord
    direction: source-to-target
    relation_kind: composition
    labels: {zh: 是追踪记录的一部分, en: is part of trace record, ja: トレース記録の一部である}
    definitions: {zh: 当持久化追踪导出在同一 trace ID 下包含该 span 投影时，TraceSpan 是 TraceRecord 的 part_of。, en: TraceSpan is part_of TraceRecord when the persisted trace export includes this span projection under the same trace ID., ja: 永続トレースエクスポートが同じ trace ID の下でこの Span 投影を含むとき、TraceSpan は TraceRecord の part_of である。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: contains_span, labels: {zh: 包含 span, en: contains span, ja: Span を含む}}
    conditions:
      - id: trace-span-trace-record-condition
        severity: error
        expression: The span trace_id must equal the target TraceRecord trace_id and fall within its declared export scope.
        explanations: {zh: 相似的 span 名称或关联日志不能将一个 span 放入无关追踪。, en: Similar span names or correlated logs cannot place a span in an unrelated trace., ja: 類似した Span 名や相関ログによって Span を無関係なトレースに入れることはできない。}
        source_claims: [claim-otel-span-record]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-otel-span-record]
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines Span identity, timing, attributes, events, links, status, and its place within a trace.
source_claims:
  - id: claim-otel-span-record
    source: otel-trace-api
    supports: OpenTelemetry defines a Span as a single operation within a trace with immutable SpanContext, name, timestamps, attributes, links, events, and status.
    locator: SpanContext and Span
    evidence_kind: standard
    confidence: high

