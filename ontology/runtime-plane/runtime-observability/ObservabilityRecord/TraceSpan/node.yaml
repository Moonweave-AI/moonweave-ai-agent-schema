schema: moonweave.ai/ontology-node/v1
id: TraceSpan
kind: concept
labels:
  en: trace span
  zh: 追踪跨度
  ja: トレーススパン
semantics:
  short_definition:
    zh: 追踪中一次操作的记录表示。
    en: The recorded representation of one operation in a trace.
    ja: トレース内の一つの操作を記録した表現。
  definition:
    zh: 追踪跨度是一种 ObservabilityRecord，是追踪中一次操作的记录表示，并继承 record_id 作为唯一记录身份。span_id 与 trace_id 是外部遥测相关键；父跨度或链接、开始与结束时间、属性、状态以及附着事件描述该记录。操作本身是运行活动，Span 是其观测记录。
    en: "A TraceSpan is an ObservabilityRecord: the recorded representation of one operation in a trace, inheriting record_id as its sole record identity. span_id and trace_id are external telemetry correlation keys; parent or links, start and end times, attributes, status, and attached events describe the record. The operation is a runtime activity, while the Span is its observation record."
    ja: TraceSpan はトレース内の一操作を表す ObservabilityRecord で、唯一の記録同一性として record_id を継承します。span_id と trace_id は外部テレメトリ相関キーです。親またはリンク、開始・終了時刻、属性、状態、付随イベントが記録を記述します。
  why_needed:
    zh: 跨度把端到端追踪拆成可计时、可归因的操作单元，使系统能够定位延迟、错误状态和跨组件因果；若把跨度当作实际执行活动，会混淆被观察的操作与它的遥测记录。
    en: Spans divide an end-to-end trace into timed, attributable operation records for locating latency, error status, and cross-component causality. Treating the span as the executed activity would conflate the observed operation with its telemetry record.
    ja: スパンはエンドツーエンドのトレースを時刻と帰属を持つ操作記録に分け、遅延、エラー状態、コンポーネント間因果を特定可能にします。スパンを実行活動そのものとすると、観測対象の操作とテレメトリ記録が混同されます。
  includes:
    - zh: 包括智能体运行中的模型调用、工具调用、路由决策或外部请求等操作的跨度记录，只要它具有明确的跨度身份和操作时间边界。
      en: Includes span records for model calls, tool calls, routing decisions, and external requests when they have explicit span identity and operation time boundaries.
      ja: 明示的なスパン同一性と操作時間境界を持つ、モデル呼出し、ツール呼出し、経路判断、外部要求のスパン記録を含みます。
  excludes:
    - zh: 不包括被跨度观察的 CommandExecution 等实际活动，也不包括由多个跨度组成的完整 TraceRecord。
      en: Excludes the executed activity observed by the span, such as CommandExecution, and the complete TraceRecord composed of multiple spans.
      ja: Span が観測する CommandExecution などの実活動、および複数スパンからなる完全な TraceRecord は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: TraceSpan（Span）映射 OTLP spanId/parentSpanId、Datadog span 与 LangSmith child run；通过 observes 绑定 RunAttempt 而非成为其子类。
    en: TraceSpan (Span) maps OTLP spanId/parentSpanId, Datadog spans, and LangSmith child runs; binds RunAttempt via observes without becoming its subtype.
    ja: TraceSpan（Span）は OTLP/LangSmith span を写像し observes で RunAttempt を束縛します。
  typical_input:
    - description: OTLP export or LangSmith run tree ingest.
      format: '{"traceId":"...","spanId":"00f067aa0ba902b7","name":"langgraph.run"}'
      source_claims:
        - claim-otel-observability
        - claim-trace-span-design
  typical_output:
    - description: Moonweave observability record projection.
      format: '{"trace_span_id":"trace-span-61","run_attempt_ref":"attempt-7"}'
      source_claims:
        - claim-trace-span-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields:
    - id: span_id
      labels:
        zh: 跨度标识
        en: span ID
        ja: span ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属追踪中唯一标识该跨度。
        en: Uniquely identifies the span within its trace.
        ja: 所属 trace 内で span を一意に識別します。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-trace-span-design
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: trace ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该跨度所属的端到端追踪。
        en: Identifies the end-to-end trace containing the span.
        ja: span を含む end-to-end trace を識別します。
      allowed_values: []
      pattern: ^[0-9a-f]{32}$
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-trace-span-design
    - id: parent_span_id
      labels:
        zh: 父跨度标识
        en: parent span ID
        ja: 親 span ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录同一追踪中的语义父跨度；根跨度不提供该值。
        en: Records the semantic parent span in the same trace; a root span omits it.
        ja: 同一 trace の semantic parent span を記録し、root span は省略します。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: b7ad6b7169203331
      source_claims:
        - claim-trace-span-design
    - id: start_time
      labels:
        zh: 开始时刻
        en: start time
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被观察操作开始的时间。
        en: Records when the observed operation started.
        ja: 観測対象 operation の開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T12:00:00.000Z
      source_claims:
        - claim-trace-span-design
    - id: end_time
      labels:
        zh: 结束时刻
        en: end time
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被观察操作结束的时间，并封闭该跨度的可变记录期。
        en: Records when the observed operation ended and closes the span's mutable recording period.
        ja: 観測対象 operation の終了時刻を記録し span の可変 recording period を閉じます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T12:00:00.420Z
      source_claims:
        - claim-trace-span-design
    - id: attributes
      labels:
        zh: 跨度属性
        en: span attributes
        ja: span attributes
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存解释被观察操作的键值属性集合；它是 TraceSpan 的数据字段，不是独立图节点。
        en: Stores the key-value attributes that describe the observed operation; it is TraceSpan data, not an independent graph node.
        ja: 観測対象 operation を説明する key-value attribute 集合で、独立 graph node ではなく TraceSpan の data field です。
      allowed_values: []
      pattern: null
      example_value:
        tool.name: search_catalog
        server.address: catalog.internal
      source_claims:
        - claim-trace-span-design
    - id: status
      labels:
        zh: 跨度状态
        en: span status
        ja: span status
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 UNSET、OK 或 ERROR 状态码，以及仅在 ERROR 时使用的可选描述；它是 TraceSpan 的数据字段，不是独立图节点。
        en: Stores an UNSET, OK, or ERROR status code and an optional description used only for ERROR; it is TraceSpan data, not an independent graph node.
        ja: UNSET・OK・ERROR status code と ERROR 時だけ用いる任意 description を保持する TraceSpan data field で、独立 graph node ではありません。
      allowed_values: []
      pattern: null
      example_value:
        code: ERROR
        description: catalog timeout
      source_claims:
        - claim-trace-span-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: TraceSpan-example-positive-001
    labels:
      zh: LangSmith RAG agent span 树
      en: LangSmith RAG agent span tree
      ja: LangSmith RAG agent Span ツリー
    descriptions:
      zh: |-
        LangSmith 中一次 RAG agent 调用的 trace（LangChain tracing docs）：
        - 根 span: "agent.run" (duration: 3.2s)
          - 子 span: "retriever.search" (duration: 0.8s, documents: 5)
          - 子 span: "llm.generate" (duration: 2.1s, model: "gpt-4", tokens: 1500)
          - 子 span: "tool.execute" (duration: 0.3s, tool: "calculator")
      en: |-
        LangSmith trace for one RAG agent call (LangChain tracing docs):
        - Root span: "agent.run" (duration: 3.2s)
          - Child span: "retriever.search" (duration: 0.8s, documents: 5)
          - Child span: "llm.generate" (duration: 2.1s, model: "gpt-4", tokens: 1500)
          - Child span: "tool.execute" (duration: 0.3s, tool: "calculator")
      ja: |-
        LangSmith における 1 回の RAG agent 呼び出し trace（LangChain tracing docs）：
        - ルート span: "agent.run" (duration: 3.2s)
          - 子 span: "retriever.search" (duration: 0.8s, documents: 5)
          - 子 span: "llm.generate" (duration: 2.1s, model: "gpt-4", tokens: 1500)
          - 子 span: "tool.execute" (duration: 0.3s, tool: "calculator")
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      record_id: span-record-search-catalog-001
      record_kind: span
      observed_at: 2026-07-16T12:00:00.430Z
      provenance_ref: catalog-agent-instrumentation
      runtime_correlation_ref: 4bf92f3577b34da6a3ce929d0e0e4736/00f067aa0ba902b7
      span_id: 00f067aa0ba902b7
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      parent_span_id: b7ad6b7169203331
      start_time: 2026-07-16T12:00:00.000Z
      end_time: 2026-07-16T12:00:00.420Z
      attributes:
        tool.name: search_catalog
      status:
        code: OK
    related_node_ids:
      - TraceSpan
      - TraceRecord
      - TraceEvent
      - ObservabilityRecord
    related_relation_ids:
      - TraceSpan-is_a-ObservabilityRecord
      - TraceRecord-contains_span-TraceSpan
      - TraceSpan-records_event-TraceEvent
    source_claims:
      - claim-trace-span-design
  - id: TraceSpan-example-boundary-001
    labels:
      zh: LangGraph StateSnapshot 非 Span
      en: LangGraph StateSnapshot not Span
      ja: LangGraph StateSnapshot は Span ではない
    descriptions:
      zh: LangGraph graph.get_state(config) 返回 StateSnapshot（values、next、checkpoint_id），这是状态恢复记录，不是带 OTel trace_id/span_id 的 Span 导出。
      en: LangGraph graph.get_state(config) returns StateSnapshot (values, next, checkpoint_id); that is state-restore record, not exported Span with OTel trace_id/span_id.
      ja: LangGraph get_state は StateSnapshot を返し OTel Span エクスポートではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceSpan
      - TraceEvent
    related_relation_ids:
      - TraceSpan-records_event-TraceEvent
    source_claims:
      - claim-trace-span-design
  - id: TraceSpan-example-3
    labels:
      zh: OTel SpanContext 与 Span 边界
      en: OTel SpanContext versus Span
      ja: OTel SpanContext と Span 境界
    descriptions:
      zh: OpenTelemetry Trace API：SpanContext 含 W3C TraceContext TraceId/SpanId/TraceFlags，由 Tracer.start_span 生成；span.SpanContext() 返回传播标识，不是第二个 Span 操作。
      en: "OpenTelemetry Trace API: SpanContext holds W3C TraceContext TraceId/SpanId/TraceFlags from Tracer.start_span; span.SpanContext() returns propagation identity, not a second Span operation."
      ja: SpanContext は Span の不変識別部分であり 2 つ目の Span 操作ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceSpan
    related_relation_ids: []
    source_claims:
      - claim-trace-span-design
      - claim-trace-span-design
  - id: TraceSpan-example-4
    labels:
      zh: Langfuse llm-call generation span
      en: Langfuse llm-call generation span
      ja: Langfuse llm-call generation span
    descriptions:
      zh: |-
        Langfuse JS SDK cookbook 嵌套 observation（langfuse.com/guides/cookbook/js_langfuse_sdk）：
        - 根 span: "manual-observation"
          - 子 tool span: "fetch-weather" (asType: tool, city: Paris)
          - 子 generation span: "llm-call" (model: gpt-4, input_tokens: 10, output_tokens: 5)
      en: |-
        Langfuse JS SDK cookbook nested observations:
        - Root span: "manual-observation"
          - Child tool span: "fetch-weather" (asType: tool, city: Paris)
          - Child generation span: "llm-call" (model: gpt-4, input_tokens: 10, output_tokens: 5)
      ja: |-
        Langfuse JS SDK cookbook ネスト observation：
        - ルート span: "manual-observation"
          - 子 tool span: "fetch-weather" (asType: tool, city: Paris)
          - 子 generation span: "llm-call" (model: gpt-4, input_tokens: 10, output_tokens: 5)
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceSpan
    related_relation_ids: []
    source_claims:
      - claim-trace-span-design
      - claim-trace-span-design
parent_relation:
  id: TraceSpan-is_a-ObservabilityRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 TraceSpan 都是 ObservabilityRecord，其种差是记录一个有起止时间的操作区间及其上下文、父级、属性、事件、链接与状态。
    en: Every TraceSpan is an ObservabilityRecord distinguished by recording one duration-bearing operation interval with context, parent, attributes, events, links, and status.
    ja: すべての TraceSpan は ObservabilityRecord で、一つの継続時間を持つ操作区間を context・parent・attribute・event・link・status と共に記録する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trace-span-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TraceSpan-records_event-TraceEvent
    predicate: records_event
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records event
      en: records event
      ja: records event
    definitions:
      zh: TraceSpan 通过 records_event 指向其操作区间内记录的 TraceEvent；事件保留名称、时间戳和属性，并保持记录顺序。
      en: TraceSpan records_event each TraceEvent added within its operation interval, preserving event name, timestamp, attributes, and recording order.
      ja: TraceSpan は操作区間内に追加された TraceEvent を records_event し、event name・timestamp・attributes・recording order を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: belongs_to_span
      labels:
        zh: 属于追踪跨度
        en: belongs to span
        ja: トレーススパンに属する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-span-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceEvent
  - id: TraceSpan-has_parent-TraceSpan
    predicate: has_parent
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 具有父跨度
      en: has parent span
      ja: 親スパンを持つ
    definitions:
      zh: 非根 TraceSpan 通过 has_parent 指向其唯一语义父跨度；子跨度继承父级 trace_id，但父关系不同于 TraceLink。
      en: A non-root TraceSpan has_parent its single semantic parent span; the child retains the parent's trace_id, while parentage remains distinct from TraceLink.
      ja: 非 root TraceSpan は唯一の意味 parent Span を has_parent し、parent の trace_id を保持しますが parentage は TraceLink と別です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: has_child_span
      labels:
        zh: 是子跨度的父跨度
        en: is parent of child span
        ja: 子スパンの親スパンである
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-span-design
    distinct_fact_rationale:
      zh: 父跨度定义同一追踪内的直接嵌套；子跨度继承父级 trace_id，但语义父关系不同于 TraceLink 的多源非父关联。
      en: Parent span defines direct nesting within one trace; the child inherits the parent's trace_id, while semantic parentage remains distinct from multi-source non-parent TraceLink associations.
      ja: 親スパンは同一 trace 内の直接入れ子を定義し、子は parent の trace_id を継承しますが、意味 parentage は multi-source non-parent TraceLink 関連と異なります。
    layout_role: cross-link
    target: concept:TraceSpan
  - id: TraceSpan-observes-RunAttempt
    predicate: observes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: observes
      en: observes
      ja: observes
    definitions:
      zh: TraceSpan 通过 observes 指向其有时长操作区间所记录的具体 RunAttempt；执行事实仍由运行尝试模块拥有。
      en: TraceSpan observes the concrete RunAttempt represented by its duration-bearing operation interval, while the execution fact remains owned by the execution-attempt module.
      ja: TraceSpan は継続時間を持つ操作区間が記録する具体 RunAttempt を observes し、execution fact は execution-attempt module が所有します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_observes
      labels:
        zh: 反向：observes
        en: is target of observes
        ja: 逆方向：observes
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-trace-span-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RunAttempt
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-otel-observability
    source: src-otel-protocol
    supports: OpenTelemetry OTLP export provides traceId, spanId, and parent links for TraceSpan mapping.
    locator: OTLP > TracesData
    evidence_kind: design-inference
    confidence: high
  - id: claim-langsmith-observability
    source: src-langsmith
    supports: LangSmith run trees expose parent_run_id hierarchy mappable to TraceRecord.
    locator: Runs > run tree
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-span-design
    source: src-runtime-observability-design
    supports: TraceSpan observes runtime operations without replacing RunAttempt.
    locator: TraceSpan boundary
    evidence_kind: design-inference
    confidence: high
