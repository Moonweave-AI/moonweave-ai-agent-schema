source_claims:
  - id: claim-trace-span-001
    source: eng-std-opentelemetry-trace-api
    supports: The OpenTelemetry Tracing API defines a Span as the representation of one operation with SpanContext, parent, start and end times, attributes, Events, Links, and Status. Moonweave models TraceSpan as that recorded information representation rather than as the runtime activity being observed.
    locator: Tracing API > SpanContext; Span; Span creation; Span operations; Events; Links; Status
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-002
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry defines SpanId as an eight-byte non-zero identifier represented as sixteen lowercase hexadecimal characters; Moonweave uses it as TraceSpan's local identity key.
    locator: Tracing API > SpanContext > SpanId and IsValid
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-003
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry defines TraceId as a sixteen-byte non-zero identifier represented as thirty-two lowercase hexadecimal characters.
    locator: Tracing API > SpanContext > TraceId and IsValid
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-004
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry determines a span's semantic parent from the creation Context and permits a root span with no parent.
    locator: Tracing API > Span > Span Creation > Determining the Parent Span
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-005
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry requires spans to capture the start and end timestamps of the represented operation.
    locator: Tracing API > Span > start and end timestamps
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-006
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry records the operation end time and disallows ordinary span mutation after the span ends.
    locator: Tracing API > Span > start and end timestamps; Span operations
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-007
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry defines attributes as key-value data encapsulated by a Span and set through span operations; it does not define SpanAttribute as a shared metadata class.
    locator: Tracing API > Span > Span state; Span Creation > Attributes; Span operations
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-008
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry structurally defines Span Status by StatusCode and optional error Description, with UNSET, OK, and ERROR values; Moonweave stores that structure directly on TraceSpan.
    locator: Tracing API > Span operations > Set Status
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-trace-span-009
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry defines a Span as the representation of one operation with SpanContext, parent, start and end time, attributes, events, links, and status; Moonweave treats the recorded span as information rather than the operation activity.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-010
    source: eng-std-opentelemetry-trace-api
    supports: Every TraceSpan is an ObservabilityRecord distinguished by recording one duration-bearing operation interval with context, parent, attributes, events, links, and status. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-011
    source: eng-std-opentelemetry-trace-api
    supports: TraceSpan records_event each TraceEvent added within its operation interval, preserving event name, timestamp, attributes, and recording order. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-012
    source: eng-std-opentelemetry-trace-api
    supports: A non-root TraceSpan has_parent its single semantic parent span; the child retains the parent's trace_id, while parentage remains distinct from TraceLink. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-span-013
    source: eng-fw-openai-tracing
    supports: TraceSpan observes the concrete RunAttempt represented by its duration-bearing operation interval, while the execution fact remains owned by the execution-attempt module. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Tracing > Traces and spans, Default tracing, Sensitive data, and custom processors
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

