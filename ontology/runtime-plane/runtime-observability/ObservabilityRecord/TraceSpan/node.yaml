schema: moonweave.ai/ontology-node/v1
id: TraceSpan
kind: concept
status: accepted
labels:
  en: trace span
  zh: 追踪跨度
  ja: トレーススパン
semantics:
  short_definition:
    zh: 追踪中一次操作的记录表示。
    en: The recorded representation of one operation in a trace.
    ja: トレース内の一つの操作を記録した表現。
  definition:
    zh: 追踪跨度是一种 ObservabilityRecord，是追踪中一次操作的记录表示，并继承 record_id 作为唯一记录身份。span_id 与 trace_id 是外部遥测相关键；父跨度或链接、开始与结束时间、属性、状态以及附着事件描述该记录。操作本身是运行活动，Span 是其观测记录。
    en: "A TraceSpan is an ObservabilityRecord: the recorded representation of one operation in a trace, inheriting record_id as its sole record identity. span_id and trace_id are external telemetry correlation keys; parent or links, start and end times, attributes, status, and attached events describe the record. The operation is a runtime activity, while the Span is its observation record."
    ja: TraceSpan はトレース内の一操作を表す ObservabilityRecord で、唯一の記録同一性として record_id を継承します。span_id と trace_id は外部テレメトリ相関キーです。親またはリンク、開始・終了時刻、属性、状態、付随イベントが記録を記述します。
  why_needed:
    zh: 跨度把端到端追踪拆成可计时、可归因的操作单元，使系统能够定位延迟、错误状态和跨组件因果；若把跨度当作实际执行活动，会混淆被观察的操作与它的遥测记录。
    en: Spans divide an end-to-end trace into timed, attributable operation records for locating latency, error status, and cross-component causality. Treating the span as the executed activity would conflate the observed operation with its telemetry record.
    ja: スパンはエンドツーエンドのトレースを時刻と帰属を持つ操作記録に分け、遅延、エラー状態、コンポーネント間因果を特定可能にします。スパンを実行活動そのものとすると、観測対象の操作とテレメトリ記録が混同されます。
  includes:
    - zh: 包括智能体运行中的模型调用、工具调用、路由决策或外部请求等操作的跨度记录，只要它具有明确的跨度身份和操作时间边界。
      en: Includes span records for model calls, tool calls, routing decisions, and external requests when they have explicit span identity and operation time boundaries.
      ja: 明示的なスパン同一性と操作時間境界を持つ、モデル呼出し、ツール呼出し、経路判断、外部要求のスパン記録を含みます。
  excludes:
    - zh: 不包括被跨度观察的 CommandExecution 等实际活动，也不包括由多个跨度组成的完整 TraceRecord。
      en: Excludes the executed activity observed by the span, such as CommandExecution, and the complete TraceRecord composed of multiple spans.
      ja: Span が観測する CommandExecution などの実活動、および複数スパンからなる完全な TraceRecord は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: span_id
      labels:
        zh: 跨度标识
        en: span ID
        ja: span ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属追踪中唯一标识该跨度。
        en: Uniquely identifies the span within its trace.
        ja: 所属 trace 内で span を一意に識別します。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-trace-span-002
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: trace ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该跨度所属的端到端追踪。
        en: Identifies the end-to-end trace containing the span.
        ja: span を含む end-to-end trace を識別します。
      allowed_values: []
      pattern: ^[0-9a-f]{32}$
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-trace-span-003
    - id: parent_span_id
      labels:
        zh: 父跨度标识
        en: parent span ID
        ja: 親 span ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录同一追踪中的语义父跨度；根跨度不提供该值。
        en: Records the semantic parent span in the same trace; a root span omits it.
        ja: 同一 trace の semantic parent span を記録し、root span は省略します。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: b7ad6b7169203331
      source_claims:
        - claim-trace-span-004
    - id: start_time
      labels:
        zh: 开始时刻
        en: start time
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被观察操作开始的时间。
        en: Records when the observed operation started.
        ja: 観測対象 operation の開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T12:00:00.000Z
      source_claims:
        - claim-trace-span-005
    - id: end_time
      labels:
        zh: 结束时刻
        en: end time
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被观察操作结束的时间，并封闭该跨度的可变记录期。
        en: Records when the observed operation ended and closes the span's mutable recording period.
        ja: 観測対象 operation の終了時刻を記録し span の可変 recording period を閉じます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T12:00:00.420Z
      source_claims:
        - claim-trace-span-006
    - id: attributes
      labels:
        zh: 跨度属性
        en: span attributes
        ja: span attributes
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存解释被观察操作的键值属性集合；它是 TraceSpan 的数据字段，不是独立图节点。
        en: Stores the key-value attributes that describe the observed operation; it is TraceSpan data, not an independent graph node.
        ja: 観測対象 operation を説明する key-value attribute 集合で、独立 graph node ではなく TraceSpan の data field です。
      allowed_values: []
      pattern: null
      example_value:
        tool.name: search_catalog
        server.address: catalog.internal
      source_claims:
        - claim-trace-span-007
    - id: status
      labels:
        zh: 跨度状态
        en: span status
        ja: span status
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 UNSET、OK 或 ERROR 状态码，以及仅在 ERROR 时使用的可选描述；它是 TraceSpan 的数据字段，不是独立图节点。
        en: Stores an UNSET, OK, or ERROR status code and an optional description used only for ERROR; it is TraceSpan data, not an independent graph node.
        ja: UNSET・OK・ERROR status code と ERROR 時だけ用いる任意 description を保持する TraceSpan data field で、独立 graph node ではありません。
      allowed_values: []
      pattern: null
      example_value:
        code: ERROR
        description: catalog timeout
      source_claims:
        - claim-trace-span-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: TraceSpan-example-positive-001
    kind: positive
    labels:
      zh: 一次工具操作的记录表示
      en: Recorded representation of one tool operation
      ja: 一回のツール操作の記録表現
    scenario_id: null
    descriptions:
      zh: search_catalog 工具操作的跨度保存 span_id、trace_id、父 span_id、开始与结束时间、tool.name 属性、最终 OK 状态，以及中途一次 cache.miss 事件。
      en: The span for search_catalog preserves span_id, trace_id, parent span_id, start and end times, a tool.name attribute, final OK status, and one cache.miss event during the operation.
      ja: search_catalog操作のスパンはspan_id、trace_id、親span_id、開始・終了時刻、tool.name属性、最終OK状態、途中のcache.missイベントを保存する。
    field_values:
      record_id: span-record-search-catalog-001
      record_kind: span
      observed_at: 2026-07-16T12:00:00.430Z
      provenance_ref: catalog-agent-instrumentation
      runtime_correlation_ref: 4bf92f3577b34da6a3ce929d0e0e4736/00f067aa0ba902b7
      span_id: 00f067aa0ba902b7
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      parent_span_id: b7ad6b7169203331
      start_time: 2026-07-16T12:00:00.000Z
      end_time: 2026-07-16T12:00:00.420Z
      attributes:
        tool.name: search_catalog
      status:
        code: OK
    related_node_ids:
      - TraceSpan
      - TraceRecord
      - TraceEvent
      - ObservabilityRecord
    related_relation_ids:
      - TraceSpan-is_a-ObservabilityRecord
      - TraceRecord-contains_span-TraceSpan
      - TraceSpan-records_event-TraceEvent
    expected_result:
      zh: 该对象被识别为 TraceSpan，并作为一项有时长操作的可观测记录加入所属 TraceRecord。
      en: The object is classified as TraceSpan and joins its TraceRecord as the observability record of one duration-bearing operation.
      ja: 対象はTraceSpanに分類され、継続時間を持つ一操作の観測記録としてTraceRecordへ属する。
    why_valid_or_invalid:
      zh: 它记录操作的身份、区间、父关系、属性、结果和事件；执行操作本身仍是运行活动。
      en: It records operation identity, interval, parentage, attributes, outcome, and events; the executing operation itself remains a runtime activity.
      ja: 操作識別、区間、親関係、属性、結果、イベントを記録し、操作の実行自体は実行活動である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-span-009
  - id: TraceSpan-example-boundary-001
    kind: boundary
    labels:
      zh: 瞬时重试标记不是独立跨度
      en: An instantaneous retry marker is not a separate span
      ja: 瞬時の再試行マーカーは独立スパンではない
    scenario_id: null
    descriptions:
      zh: 一次模型调用跨度在中途记录 retry.scheduled，只有时间戳和 retry.ordinal，没有自己的开始、结束或独立工作。该对象应为 TraceEvent，而不是 TraceSpan。
      en: A model-call span records retry.scheduled midway with only a timestamp and retry.ordinal, no independent start/end interval or work. The object is TraceEvent rather than TraceSpan.
      ja: モデル呼出しスパン途中にretry.scheduledを記録し、時刻とretry.ordinalだけで独自の開始・終了区間や作業がない。これはTraceSpanではなくTraceEventである。
    field_values: {}
    related_node_ids:
      - TraceSpan
      - TraceEvent
    related_relation_ids:
      - TraceSpan-records_event-TraceEvent
    expected_result:
      zh: 该标记作为父跨度内的 TraceEvent 保存，不创建无持续时间的子跨度。
      en: The marker is stored as TraceEvent inside the parent span and no durationless child span is created.
      ja: マーカーは親スパン内のTraceEventとして保存し、継続時間のない子スパンは作らない。
    why_valid_or_invalid:
      zh: 跨度表示可独立计时的操作；事件表示跨度区间内一次有时间戳的发生。
      en: A span represents an independently timed operation; an event represents one timestamped occurrence within that interval.
      ja: スパンは独立計時できる操作、イベントはその区間内の時刻付き発生を表す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-span-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AgentTranscript
    shared_parent_concept_id: ObservabilityRecord
    differentia:
      zh: 已审查兄弟区分：父节点 ObservabilityRecord：TraceSpan（semantic kind=information，骨架 TraceSpan-is_a-ObservabilityRecord）；AgentTranscript（semantic kind=information，骨架 AgentTranscript-is_a-ObservabilityRecord）。双端条件：TraceSpan 条件：“作为可观测记录，追踪跨度由这一事实区分：它是追踪中的操作区间或工作单元，记录父跨度、时间、状态、属性、所含事件以及与相关跨度的链接”；AgentTranscript 条件：“作为可观测记录，智能体转录记录由这一事实区分：它按顺序保存实际可见或已发出的消息、动作、工具调用、模型输出、策略决策、警告和产物引用”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ObservabilityRecord: TraceSpan (semantic kind=information, backbone TraceSpan-is_a-ObservabilityRecord); AgentTranscript (semantic kind=information, backbone AgentTranscript-is_a-ObservabilityRecord). Endpoint conditions: TraceSpan condition: “Trace span belongs to the observability record category and differs from broader members in that it is an operation interval or unit of work inside a trace, with parent span, timing, status, attributes, contained events, and links to related spans”; AgentTranscript condition: “Agent transcript belongs to the observability record category and differs from broader members in that it is an ordered runtime transcript of messages, actions, tool calls, model outputs, policy decisions, warnings, and artifact references that were actually visible or emitted”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ObservabilityRecord：TraceSpan（semantic kind=information、バックボーン TraceSpan-is_a-ObservabilityRecord）；AgentTranscript（semantic kind=information、バックボーン AgentTranscript-is_a-ObservabilityRecord）。両端条件：TraceSpan の条件：「トレーススパンは観測記録として、次の条件により他の対象と区別されます：それは、トレース内の操作区間または作業単位であり、親スパン、時刻、状態、属性、含まれるイベント、関連スパンへのリンクを記録します」；AgentTranscript の条件：「エージェント転写記録は観測記録として、次の条件により他の対象と区別されます：それは、実際に可視化または発行されたメッセージ、行動、ツール呼び出し、モデル出力、ポリシー判断、警告、成果物参照を順序付きで保存します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-trace-span-009
parent_relation:
  id: TraceSpan-is_a-ObservabilityRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 TraceSpan 都是 ObservabilityRecord，其种差是记录一个有起止时间的操作区间及其上下文、父级、属性、事件、链接与状态。
    en: Every TraceSpan is an ObservabilityRecord distinguished by recording one duration-bearing operation interval with context, parent, attributes, events, links, and status.
    ja: すべての TraceSpan は ObservabilityRecord で、一つの継続時間を持つ操作区間を context・parent・attribute・event・link・status と共に記録する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TraceSpan-is_a-ObservabilityRecord-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 逐项核实正例
        en: Point-reviewed positive case
        ja: 項目別審査の正例
      scenario_id: null
      descriptions:
        zh: span-tool-7 记录工具调用从 10:14:03 到 10:14:08，父跨度、输入属性、cache.miss 事件与 ERROR 状态齐全。
        en: span-tool-7 records a tool call from 10:14:03 to 10:14:08 with parent, input attributes, cache.miss event, and ERROR status.
        ja: span-tool-7 が 10:14:03–10:14:08 の tool call を parent・input attributes・cache.miss event・ERROR status と共に記録します。
      field_values: {}
      related_node_ids:
        - TraceSpan
        - ObservabilityRecord
      related_relation_ids:
        - TraceSpan-is_a-ObservabilityRecord
      expected_result:
        zh: 仅在所述证据存在时返回这条有向事实。
        en: Return this directed fact only when the described evidence exists.
        ja: 記載された証拠が存在する場合だけ、この有向事実を返します。
      why_valid_or_invalid:
        zh: 每个 TraceSpan 都是 ObservabilityRecord，其种差是记录一个有起止时间的操作区间及其上下文、父级、属性、事件、链接与状态。
        en: Every TraceSpan is an ObservabilityRecord distinguished by recording one duration-bearing operation interval with context, parent, attributes, events, links, and status.
        ja: すべての TraceSpan は ObservabilityRecord で、一つの継続時間を持つ操作区間を context・parent・attribute・event・link・status と共に記録する点が種差です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-span-010
    - id: TraceSpan-is_a-ObservabilityRecord-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 逐项核实边界例
        en: Point-reviewed boundary case
        ja: 項目別審査の境界例
      scenario_id: null
      descriptions:
        zh: error.timeout 只有一个发生时间和两个属性，没有开始、结束或操作区间。
        en: error.timeout has one occurrence time and two attributes but no start, end, or operation interval.
        ja: error.timeout は一つの発生時刻と二 attributes だけで、開始・終了・操作区間を持ちません。
      field_values: {}
      related_node_ids:
        - TraceSpan
        - ObservabilityRecord
      related_relation_ids:
        - TraceSpan-is_a-ObservabilityRecord
      expected_result:
        zh: 不得从该边界情形推断这条关系。
        en: Do not infer this relation from the boundary case.
        ja: この境界事例から当該関係を推論しません。
      why_valid_or_invalid:
        zh: 单时点注记属于 TraceEvent；缺少操作区间就不能作为 TraceSpan。
        en: A point-in-time annotation is TraceEvent; without an operation interval it cannot be TraceSpan.
        ja: 一点時 annotation は TraceEvent で、操作区間がなければ TraceSpan ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-span-010
  source_claims:
    - claim-trace-span-010
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: TraceSpan-records_event-TraceEvent
    predicate: records_event
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records event
      en: records event
      ja: records event
    definitions:
      zh: TraceSpan 通过 records_event 指向其操作区间内记录的 TraceEvent；事件保留名称、时间戳和属性，并保持记录顺序。
      en: TraceSpan records_event each TraceEvent added within its operation interval, preserving event name, timestamp, attributes, and recording order.
      ja: TraceSpan は操作区間内に追加された TraceEvent を records_event し、event name・timestamp・attributes・recording order を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: belongs_to_span
      labels:
        zh: 属于追踪跨度
        en: belongs to span
        ja: トレーススパンに属する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: TraceSpan-records_event-TraceEvent-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 逐项核实正例
          en: Point-reviewed positive case
          ja: 項目別審査の正例
        scenario_id: null
        descriptions:
          zh: span-tool-7 依次记录 retry.scheduled 与 retry.started，两事件均带时间戳并保留加入顺序。
          en: span-tool-7 records retry.scheduled and retry.started with timestamps and preserves their addition order.
          ja: span-tool-7 が retry.scheduled と retry.started を timestamp 付きで記録し追加順を保持します。
        field_values: {}
        related_node_ids:
          - TraceSpan
          - TraceEvent
        related_relation_ids:
          - TraceSpan-records_event-TraceEvent
        expected_result:
          zh: 仅在所述证据存在时返回这条有向事实。
          en: Return this directed fact only when the described evidence exists.
          ja: 記載された証拠が存在する場合だけ、この有向事実を返します。
        why_valid_or_invalid:
          zh: TraceSpan 通过 records_event 指向其操作区间内记录的 TraceEvent；事件保留名称、时间戳和属性，并保持记录顺序。
          en: TraceSpan records_event each TraceEvent added within its operation interval, preserving event name, timestamp, attributes, and recording order.
          ja: TraceSpan は操作区間内に追加された TraceEvent を records_event し、event name・timestamp・attributes・recording order を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-span-011
      - id: TraceSpan-records_event-TraceEvent-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 逐项核实边界例
          en: Point-reviewed boundary case
          ja: 項目別審査の境界例
        scenario_id: null
