schema: moonweave.ai/ontology-node/v1
id: TraceContext
kind: concept
status: accepted
labels:
  en: trace context
  zh: 追踪上下文
  ja: トレース文脈
semantics:
  short_definition:
    zh: 跨进程传播追踪与跨度身份的上下文元数据。
    en: Context metadata propagating trace and span identity across boundaries.
    ja: 境界を越えてトレースとスパン識別を伝播する文脈メタデータ。
  definition:
    zh: TraceContext 是附着于当前 TraceSpan 的传播上下文，携带 trace_id、span_id、trace_flags 与 trace_state，并可在进程、服务或异步边界间注入与提取。它让新跨度继承正确的追踪身份和采样决定；业务载荷、任意跨度属性与完整 TraceRecord 不属于上下文本身。
    en: TraceContext is propagation context attached to the current TraceSpan. It carries trace_id, span_id, trace_flags, and trace_state and supports injection and extraction across process, service, or asynchronous boundaries. It lets a new span inherit trace identity and sampling decisions; business payload, arbitrary span attributes, and the complete TraceRecord are not the context.
    ja: TraceContext は現在の TraceSpan に付く propagation context で、trace_id・span_id・trace_flags・trace_state を持ち、process・service・async boundary で injection/extraction できます。新 span に trace identity と sampling decision を継承し、business payload・任意 span attribute・完全な TraceRecord は含みません。
  why_needed:
    zh: 上下文传播把分布式智能体、工具服务与模型网关产生的跨度关联为同一追踪；若缺少它，每个服务都会形成孤立根跨度，端到端因果和采样一致性都会丢失。
    en: Context propagation correlates spans from distributed agents, tool services, and model gateways into one trace. Without it, each service creates an isolated root span, losing end-to-end causality and consistent sampling.
    ja: 文脈伝播は分散エージェント、ツールサービス、モデルゲートウェイのスパンを同一トレースへ結びます。なければ各サービスが孤立ルートを作り、因果とサンプリング整合性を失います。
  includes:
    - zh: 包括通过 W3C `traceparent` 与 `tracestate` 传递的有效 trace_id、父 span_id、采样标志和供应商状态。
      en: Includes valid trace_id, parent span_id, sampling flag, and vendor state propagated through W3C `traceparent` and `tracestate`.
      ja: W3C `traceparent` と `tracestate` で伝播する有効 trace_id、親 span_id、サンプリング印、ベンダー状態を含みます。
  excludes:
    - zh: 不包括用户身份、提示内容等业务数据，不包括普通 SpanAttribute、TraceLink、整个 TraceRecord，也不把无效或全零标识当作有效上下文。
      en: Excludes business data such as user identity or prompt content, ordinary SpanAttribute values, TraceLink, the complete TraceRecord, and invalid all-zero identifiers.
      ja: 利用者識別やプロンプト内容など業務データ、通常 SpanAttribute、TraceLink、完全 TraceRecord、全ゼロ無効識別は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - trace_id
    - span_id
  fields:
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: トレース ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: W3C/OpenTelemetry 的 16 字节非零追踪标识；同一追踪的所有跨度保持该值。
        en: The non-zero 16-byte W3C/OpenTelemetry trace identifier retained by every span in the same trace.
        ja: 同一トレースの全スパンが保持する W3C/OpenTelemetry の非ゼロ 16-byte trace identifier。
      allowed_values: []
      pattern: ^[0-9a-f]{32}$
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-trace-context-002
    - id: span_id
      labels:
        zh: 当前跨度标识
        en: current span ID
        ja: 現在スパン ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该上下文当前代表的 8 字节非零跨度标识。
        en: The non-zero 8-byte identifier of the span currently represented by this context.
        ja: この context が現在表す非ゼロ 8-byte span identifier。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-trace-context-002
    - id: trace_flags
      labels:
        zh: 追踪标志
        en: trace flags
        ja: trace flags
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 随上下文传播的标志位，至少保留采样决定。
        en: Flags propagated with the context, including at least the sampling decision.
        ja: sampling decision を含め context と共に伝播する flags。
      allowed_values: []
      pattern: ^[0-9a-f]{2}$
      example_value: "01"
      source_claims:
        - claim-trace-context-002
    - id: trace_state
      labels:
        zh: 追踪系统状态
        en: trace state
        ja: trace state
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 按 W3C Trace Context 规则携带的厂商或追踪系统键值列表。
        en: The vendor or tracing-system key-value list carried under W3C Trace Context rules.
        ja: W3C Trace Context 規則で運ばれる vendor/tracing-system key-value list。
      allowed_values: []
      pattern: null
      example_value: vendor=opaque-state
      source_claims:
        - claim-trace-context-002
    - id: is_remote
      labels:
        zh: 是否来自远端
        en: is remote
        ja: remote 由来
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明该上下文是否由传播器从远端父级提取。
        en: Indicates whether a propagator extracted the context from a remote parent.
        ja: propagator が remote parent から抽出した context かを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-trace-context-002
  constraints:
    - id: trace-context-identifiers-valid
      severity: error
      expression_language: plain
      expression: trace_id is 32 hexadecimal characters and not all zero; span_id is 16 hexadecimal characters and not all zero
      explanations:
        zh: 追踪与跨度标识必须满足 OpenTelemetry 有效性条件。
        en: Trace and span identifiers must satisfy OpenTelemetry validity conditions.
        ja: trace/span identifier は OpenTelemetry validity 条件を満たします。
      source_claims:
        - claim-trace-context-002
    - id: trace-context-immutable
      severity: error
      expression_language: plain
      expression: trace_id, span_id, trace_flags, trace_state, and is_remote do not change after this context is created
      explanations:
        zh: 一个已建立的传播上下文不可原地改写；变化应形成新上下文。
        en: An established propagation context is not mutated in place; a change creates a new context.
        ja: 確立済み propagation context は in-place 変更せず、新 context を作成します。
      source_claims:
        - claim-trace-context-002
  required_relation_constraints:
    - id: trace-context-owned-by-one-span
      direction: incoming
      predicate: has_context
      target_concept_id: TraceSpan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个上下文信息节点附着于一个当前跨度。
        en: Each context information node is attached to one current span.
        ja: 各 context information node は一つの current span に付属します。
      source_claims:
        - claim-trace-context-002
examples:
  - id: TraceContext-example-positive-001
    kind: positive
    labels:
      zh: 跨工具服务传播追踪身份
      en: Propagate trace identity across a tool service
      ja: ツールサービス間でトレース識別情報を伝播
    scenario_id: null
    descriptions:
      zh: 智能体网关调用外部检索服务时注入 trace_id、当前 span_id、trace_flags 和 trace_state；服务提取后创建子跨度，沿用 trace_id 并把新的 span_id 作为当前上下文。
      en: When an agent gateway calls an external retrieval service, it injects trace_id, current span_id, trace_flags, and trace_state. The service extracts them, creates a child span with the same trace_id, and publishes the new span_id as current context.
      ja: エージェントゲートウェイが外部検索サービスを呼ぶ際、trace_id、現在span_id、trace_flags、trace_stateを注入する。サービスが抽出して同じtrace_idの子スパンを作り、新span_idを現在文脈にする。
    field_values:
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
      trace_flags: "01"
      trace_state: vendor=opaque-state
      is_remote: true
    related_node_ids:
      - TraceContext
      - TraceSpan
      - TraceRecord
    related_relation_ids:
      - TraceSpan-has_context-TraceContext
    expected_result:
      zh: 两个服务的跨度被关联到同一追踪，并保留父子关系和采样决定。
      en: Spans from both services join the same trace while retaining parentage and the sampling decision.
      ja: 両サービスのスパンが同一トレースに結ばれ、親子関係とサンプリング判断を保つ。
    why_valid_or_invalid:
      zh: 传播对象只携带识别和采样所需字段，不传递完整追踪记录或业务载荷。
      en: The propagated object contains only identification and sampling fields, not the complete trace record or business payload.
      ja: 伝播対象は識別・サンプリングに必要な項目だけを持ち、完全トレース記録や業務ペイロードを運ばない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-context-001
  - id: TraceContext-example-boundary-001
    kind: boundary
    labels:
      zh: 业务会话标识不是追踪上下文
      en: A business session ID is not trace context
      ja: 業務セッションIDはトレース文脈ではない
    scenario_id: null
    descriptions:
      zh: 请求只携带 customer_session="S-8"，没有 trace_id、span_id 或采样标志。该字段可以成为跨度属性或业务关联键，但无法让接收端延续分布式追踪。
      en: A request carries only customer_session="S-8" and no trace_id, span_id, or trace flags. It may be a span attribute or business correlation key, but it cannot let the receiver continue a distributed trace.
      ja: 要求はcustomer_session="S-8"だけを持ち、trace_id、span_id、サンプリングフラグがない。スパン属性・業務相関キーにはなり得るが、受信側は分散トレースを継続できない。
    field_values: {}
    related_node_ids:
      - TraceContext
      - SpanAttribute
      - TraceMetadata
    related_relation_ids:
      - TraceContext-is_a-TraceMetadata
    expected_result:
      zh: 业务会话字段不被误标为 TraceContext；缺少追踪身份时接收端创建新的根跨度。
      en: The business-session field is not mislabeled as TraceContext; without trace identity the receiver creates a new root span.
      ja: 業務セッション項目をTraceContextと誤分類せず、追跡識別情報がなければ受信側は新しいルートスパンを作る。
    why_valid_or_invalid:
      zh: 业务相关性不能替代 W3C/OpenTelemetry 追踪身份和采样传播语义。
      en: Business correlation cannot substitute for W3C/OpenTelemetry trace identity and sampling propagation semantics.
      ja: 業務相関はW3C/OpenTelemetryの追跡識別・サンプリング伝播を代替できない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-context-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TraceLink
    shared_parent_concept_id: TraceSpan
    differentia:
      zh: 共享逻辑父节点 TraceSpan：TraceContext 通过 has_context 提供该跨度的传播身份与采样状态；TraceLink 通过 has_link 记录该跨度指向非父级 SpanContext 的关联。前者决定后续传播上下文，后者补充单一父子链无法表达的扇入或异步因果，二者不能互换。
      en: "Shared logical parent TraceSpan: TraceContext is attached by has_context and provides the span's propagation identity and sampling state; TraceLink is attached by has_link and records associations from the span to non-parent SpanContexts. The former determines propagated context, whereas the latter adds fan-in or asynchronous causality that one parent chain cannot express."
      ja: 共有 logical parent は TraceSpan です。TraceContext は has_context で付き span の propagation identity/sampling state を提供し、TraceLink は has_link で非親 SpanContext への関連を記録します。前者は伝播 context、後者は単一 parent chain で表せない fan-in/async causality を担い、交換できません。
    source_claims:
      - claim-trace-context-001
parent_relation:
  id: TraceSpan-has_context-TraceContext
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: trace has context
    en: trace has context
    ja: trace has context
  definitions:
    zh: TraceSpan 通过 has_context 指向其不可变 TraceContext，后者携带该跨度的 trace_id、span_id、flags、tracestate 与远程来源。
    en: TraceSpan has_context its immutable TraceContext carrying that span's trace_id, span_id, flags, tracestate, and remote-origin state.
    ja: TraceSpan は自身の trace_id・span_id・flags・tracestate・remote origin を持つ immutable TraceContext を has_context します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：trace has context
      en: is target of trace has context
      ja: 逆方向：trace has context
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: TraceSpan-has_context-TraceContext-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 逐项核实正例
        en: Point-reviewed positive case
        ja: 項目別審査の正例
      scenario_id: null
      descriptions:
        zh: span-tool-7 的上下文包含 trace_id=8f2c1、span_id=07、sampled=true 和 vendor tracestate。
        en: span-tool-7 has context with trace_id=8f2c1, span_id=07, sampled=true, and vendor tracestate.
        ja: span-tool-7 の context は trace_id=8f2c1・span_id=07・sampled=true・vendor tracestate を含みます。
      field_values: {}
      related_node_ids:
        - TraceSpan
        - TraceContext
      related_relation_ids:
        - TraceSpan-has_context-TraceContext
      expected_result:
        zh: 仅在所述证据存在时返回这条有向事实。
        en: Return this directed fact only when the described evidence exists.
        ja: 記載された証拠が存在する場合だけ、この有向事実を返します。
      why_valid_or_invalid:
        zh: TraceSpan 通过 has_context 指向其不可变 TraceContext，后者携带该跨度的 trace_id、span_id、flags、tracestate 与远程来源。
        en: TraceSpan has_context its immutable TraceContext carrying that span's trace_id, span_id, flags, tracestate, and remote-origin state.
        ja: TraceSpan は自身の trace_id・span_id・flags・tracestate・remote origin を持つ immutable TraceContext を has_context します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-context-003
    - id: TraceSpan-has_context-TraceContext-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 逐项核实边界例
        en: Point-reviewed boundary case
        ja: 項目別審査の境界例
      scenario_id: null
      descriptions:
        zh: TraceRecord 只有共享 trace_id 与 span 集合，无法提供某个具体跨度的 span_id 或 IsRemote。
        en: A TraceRecord has a shared trace_id and span set but cannot supply one particular span's span_id or IsRemote state.
        ja: TraceRecord は共有 trace_id と Span 集合を持ちますが個別 Span の span_id や IsRemote を提供できません。
      field_values: {}
      related_node_ids:
        - TraceSpan
        - TraceContext
      related_relation_ids:
        - TraceSpan-has_context-TraceContext
      expected_result:
        zh: 不得从该边界情形推断这条关系。
        en: Do not infer this relation from the boundary case.
        ja: この境界事例から当該関係を推論しません。
      why_valid_or_invalid:
        zh: SpanContext 属于具体跨度；把它挂在整个 TraceRecord 会丢失 span 级身份。
        en: SpanContext belongs to a particular span; attaching it to the whole TraceRecord loses span-level identity.
        ja: SpanContext は個別 Span に属し、TraceRecord 全体へ付けると span-level identity を失います。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-context-003
  source_claims:
    - claim-trace-context-003
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenTelemetry、W3C Trace Context 与 LangGraph checkpoint/replay 逐项核验，TraceSpan 与 Checkpoint 语义成立。
    en: Verified against OpenTelemetry, W3C Trace Context, and LangGraph checkpoint/replay. TraceSpan and Checkpoint semantics hold.
    ja: OpenTelemetry、W3C Trace Context、LangGraph checkpoint/replay に照らし TraceSpan と Checkpoint semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-trace-context-001
    source: eng-std-opentelemetry-trace-api
    supports: OpenTelemetry SpanContext is immutable and carries TraceId, SpanId, TraceFlags, TraceState, and remote origin for propagation; Moonweave therefore attaches context to a TraceSpan, not to a whole trace container.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-context-002
    source: eng-std-opentelemetry-trace-api
    supports: "Direct source premise: OpenTelemetry defines an immutable SpanContext containing TraceId, SpanId, TraceFlags, TraceState, and remote-origin state, and defines validity through non-zero TraceId and SpanId. Moonweave design inference: the trace/span pair is the stable identity of the graph information node and each accepted TraceContext must be attached to exactly one current TraceSpan."
    locator: OpenTelemetry Tracing API > SpanContext > identifiers, TraceFlags, TraceState, IsValid, and IsRemote
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-context-003
    source: eng-std-opentelemetry-trace-api
    supports: TraceSpan has_context its immutable TraceContext carrying that span's trace_id, span_id, flags, tracestate, and remote-origin state. The cited section establishes the endpoint semantics; relation ownership, identifier, and graph direction are Moonweave's reviewed ontology decisions.
    locator: Tracing API > SpanContext, Span creation, Span operations, Events, Status, and Link
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

