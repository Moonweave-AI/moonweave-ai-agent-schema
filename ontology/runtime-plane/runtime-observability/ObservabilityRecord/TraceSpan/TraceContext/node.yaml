schema: moonweave.ai/ontology-node/v1
id: TraceContext
kind: concept
labels:
  en: trace context
  zh: 追踪上下文
  ja: トレース文脈
semantics:
  short_definition:
    zh: 跨进程传播追踪与跨度身份的上下文元数据。
    en: Context metadata propagating trace and span identity across boundaries.
    ja: 境界を越えてトレースとスパン識別を伝播する文脈メタデータ。
  definition:
    zh: TraceContext 是附着于当前 TraceSpan 的传播上下文，携带 trace_id、span_id、trace_flags 与 trace_state，并可在进程、服务或异步边界间注入与提取。它让新跨度继承正确的追踪身份和采样决定；业务载荷、任意跨度属性与完整 TraceRecord 不属于上下文本身。
    en: TraceContext is propagation context attached to the current TraceSpan. It carries trace_id, span_id, trace_flags, and trace_state and supports injection and extraction across process, service, or asynchronous boundaries. It lets a new span inherit trace identity and sampling decisions; business payload, arbitrary span attributes, and the complete TraceRecord are not the context.
    ja: TraceContext は現在の TraceSpan に付く propagation context で、trace_id・span_id・trace_flags・trace_state を持ち、process・service・async boundary で injection/extraction できます。新 span に trace identity と sampling decision を継承し、business payload・任意 span attribute・完全な TraceRecord は含みません。
  why_needed:
    zh: 上下文传播把分布式智能体、工具服务与模型网关产生的跨度关联为同一追踪；若缺少它，每个服务都会形成孤立根跨度，端到端因果和采样一致性都会丢失。
    en: Context propagation correlates spans from distributed agents, tool services, and model gateways into one trace. Without it, each service creates an isolated root span, losing end-to-end causality and consistent sampling.
    ja: 文脈伝播は分散エージェント、ツールサービス、モデルゲートウェイのスパンを同一トレースへ結びます。なければ各サービスが孤立ルートを作り、因果とサンプリング整合性を失います。
  includes:
    - zh: 包括通过 W3C `traceparent` 与 `tracestate` 传递的有效 trace_id、父 span_id、采样标志和供应商状态。
      en: Includes valid trace_id, parent span_id, sampling flag, and vendor state propagated through W3C `traceparent` and `tracestate`.
      ja: W3C `traceparent` と `tracestate` で伝播する有効 trace_id、親 span_id、サンプリング印、ベンダー状態を含みます。
  excludes:
    - zh: 不包括用户身份、提示内容等业务数据，不包括普通 SpanAttribute、TraceLink、整个 TraceRecord，也不把无效或全零标识当作有效上下文。
      en: Excludes business data such as user identity or prompt content, ordinary SpanAttribute values, TraceLink, the complete TraceRecord, and invalid all-zero identifiers.
      ja: 利用者識別やプロンプト内容など業務データ、通常 SpanAttribute、TraceLink、完全 TraceRecord、全ゼロ無効識別は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 TraceContext 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating TraceContext, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: TraceContext 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to TraceContext.
      format: |-
        # Example TraceContext ingest
        { "trace-context_ref": "example-1" }
      source_claims:
        - claim-trace-context-design
  typical_output:
    - description: Moonweave-local TraceContext projection.
      format: '{ "schema_owner": "moonweave-local-design", "trace-context_id": "example-1" }'
      source_claims:
        - claim-trace-context-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys:
    - trace_id
    - span_id
  fields:
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: トレース ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: W3C/OpenTelemetry 的 16 字节非零追踪标识；同一追踪的所有跨度保持该值。
        en: The non-zero 16-byte W3C/OpenTelemetry trace identifier retained by every span in the same trace.
        ja: 同一トレースの全スパンが保持する W3C/OpenTelemetry の非ゼロ 16-byte trace identifier。
      allowed_values: []
      pattern: ^[0-9a-f]{32}$
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims:
        - claim-trace-context-design
    - id: span_id
      labels:
        zh: 当前跨度标识
        en: current span ID
        ja: 現在スパン ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该上下文当前代表的 8 字节非零跨度标识。
        en: The non-zero 8-byte identifier of the span currently represented by this context.
        ja: この context が現在表す非ゼロ 8-byte span identifier。
      allowed_values: []
      pattern: ^[0-9a-f]{16}$
      example_value: 00f067aa0ba902b7
      source_claims:
        - claim-trace-context-design
    - id: trace_flags
      labels:
        zh: 追踪标志
        en: trace flags
        ja: trace flags
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 随上下文传播的标志位，至少保留采样决定。
        en: Flags propagated with the context, including at least the sampling decision.
        ja: sampling decision を含め context と共に伝播する flags。
      allowed_values: []
      pattern: ^[0-9a-f]{2}$
      example_value: "01"
      source_claims:
        - claim-trace-context-design
    - id: trace_state
      labels:
        zh: 追踪系统状态
        en: trace state
        ja: trace state
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 按 W3C Trace Context 规则携带的厂商或追踪系统键值列表。
        en: The vendor or tracing-system key-value list carried under W3C Trace Context rules.
        ja: W3C Trace Context 規則で運ばれる vendor/tracing-system key-value list。
      allowed_values: []
      pattern: null
      example_value: vendor=opaque-state
      source_claims:
        - claim-trace-context-design
    - id: is_remote
      labels:
        zh: 是否来自远端
        en: is remote
        ja: remote 由来
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明该上下文是否由传播器从远端父级提取。
        en: Indicates whether a propagator extracted the context from a remote parent.
        ja: propagator が remote parent から抽出した context かを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-trace-context-design
  constraints:
    - id: trace-context-identifiers-valid
      severity: error
      expression_language: plain
      expression: trace_id is 32 hexadecimal characters and not all zero; span_id is 16 hexadecimal characters and not all zero
      explanations:
        zh: 追踪与跨度标识必须满足 OpenTelemetry 有效性条件。
        en: Trace and span identifiers must satisfy OpenTelemetry validity conditions.
        ja: trace/span identifier は OpenTelemetry validity 条件を満たします。
      source_claims:
        - claim-trace-context-design
    - id: trace-context-immutable
      severity: error
      expression_language: plain
      expression: trace_id, span_id, trace_flags, trace_state, and is_remote do not change after this context is created
      explanations:
        zh: 一个已建立的传播上下文不可原地改写；变化应形成新上下文。
        en: An established propagation context is not mutated in place; a change creates a new context.
        ja: 確立済み propagation context は in-place 変更せず、新 context を作成します。
      source_claims:
        - claim-trace-context-design
  required_relation_constraints:
    - id: trace-context-owned-by-one-span
      direction: incoming
      predicate: has_context
      target_concept_id: TraceSpan
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个上下文信息节点附着于一个当前跨度。
        en: Each context information node is attached to one current span.
        ja: 各 context information node は一つの current span に付属します。
      source_claims:
        - claim-trace-context-design
examples:
  - id: TraceContext-example-positive-001
    labels:
      zh: W3C traceparent 传播
      en: W3C traceparent propagation
      ja: W3C traceparent 伝播
    descriptions:
      zh: OpenTelemetry propagators.inject(carrier) 写入 W3C traceparent=00-{trace_id}-{span_id}-01；HTTP 下游服务 extract 后继续同一 trace。
      en: OpenTelemetry propagators.inject(carrier) writes W3C traceparent=00-{trace_id}-{span_id}-01; downstream HTTP service extract continues same trace.
      ja: OTel inject/extract で W3C traceparent を HTTP ヘッダに伝播する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
      span_id: 00f067aa0ba902b7
      trace_flags: "01"
      trace_state: vendor=opaque-state
      is_remote: true
    related_node_ids:
      - TraceContext
      - TraceSpan
      - TraceRecord
    related_relation_ids:
      - TraceSpan-has_context-TraceContext
    source_claims:
      - claim-trace-context-design
  - id: TraceContext-example-boundary-001
    labels:
      zh: Datadog trace_id 单独字段
      en: Datadog trace_id field alone
      ja: Datadog trace_id 単独フィールド
    descriptions:
      zh: Datadog APM 日志仅含 dd.trace_id 无 span_id/trace_flags 完整 SpanContext，不能单独建模 TraceContext。
      en: Datadog APM log containing only dd.trace_id without span_id/trace_flags complete SpanContext cannot alone model TraceContext.
      ja: dd.trace_id だけでは完全 TraceContext にならない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceContext
      - SpanAttribute
      - TraceMetadata
    related_relation_ids:
      - TraceContext-is_a-TraceMetadata
    source_claims:
      - claim-trace-context-design
  - id: TraceContext-example-3
    labels:
      zh: TraceContext 与 TraceSpan 边界
      en: TraceContext versus TraceSpan
      ja: TraceContext と TraceSpan 境界
    descriptions:
      zh: TraceContext 是 TraceSpan 的传播标识部分（part_of）；Tracer.start_span 创建 Span 操作，SpanContext() 返回标识但不等于第二个 Span。
      en: TraceContext is propagation identity part_of TraceSpan; Tracer.start_span creates Span operation, SpanContext() returns identity but is not a second Span.
      ja: TraceContext は TraceSpan の part_of 伝播識別子である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceContext
    related_relation_ids: []
    source_claims:
      - claim-trace-context-vendor
      - claim-trace-context-design
  - id: TraceContext-example-4
    labels:
      zh: OpenTelemetry inject/extract 实例
      en: OpenTelemetry inject extract instance
      ja: OpenTelemetry inject/extract 事例
    descriptions:
      zh: Python OTel：context.attach(set_span_in_context(span)) 后 requests 出站调用 inject traceparent 头 trace_id=4bf92f3577b34da6a3ce929d0e0e4736、span_id=00f067aa0ba902b7。
      en: "Python OTel: after context.attach(set_span_in_context(span)), outbound requests inject traceparent header trace_id=4bf92f3577b34da6a3ce929d0e0e4736, span_id=00f067aa0ba902b7."
      ja: Python OTel で traceparent ヘッダに trace_id/span_id を注入する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - TraceContext
    related_relation_ids: []
    source_claims:
      - claim-trace-context-vendor
      - claim-trace-context-design
parent_relation:
  id: TraceSpan-has_context-TraceContext
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: trace has context
    en: trace has context
    ja: trace has context
  definitions:
    zh: TraceSpan 通过 has_context 指向其不可变 TraceContext，后者携带该跨度的 trace_id、span_id、flags、tracestate 与远程来源。
    en: TraceSpan has_context its immutable TraceContext carrying that span's trace_id, span_id, flags, tracestate, and remote-origin state.
    ja: TraceSpan は自身の trace_id・span_id・flags・tracestate・remote origin を持つ immutable TraceContext を has_context します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：trace has context
      en: is target of trace has context
      ja: 逆方向：trace has context
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trace-context-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-otel-protocol
    title: OpenTelemetry Protocol Specification
    url: https://opentelemetry.io/docs/specs/otel/protocol/
    source_type: official-spec
    relevance: OTLP traceId, spanId, parent links, status codes.
  - id: src-langsmith
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run trees with parent_run_id and nested child runs.
  - id: src-langgraph-checkpoints
    title: LangGraph Persistence
    url: https://langchain-ai.github.io/langgraph/concepts/persistence/
    source_type: official-doc
    relevance: Checkpoint and StateSnapshot capture for recovery.
  - id: src-runtime-observability-design
    title: Moonweave runtime-observability module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TraceSpan, Checkpoint, TraceEvent boundaries versus Execution.
source_claims:
  - id: claim-trace-context-vendor
    source: src-otel-protocol
    supports: runtime-observability vendor evidence supports TraceContext identity and boundary mapping.
    locator: TraceContext integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-trace-context-design
    source: src-runtime-observability-design
    supports: Moonweave TraceContext concept boundary within runtime-observability.
    locator: TraceContext boundary
    evidence_kind: design-inference
    confidence: high
