schema: moonweave.ai/ontology-node/v1
id: TraceContext
kind: concept
status: accepted
labels: {zh: OpenTelemetry SpanContext 记录, en: OpenTelemetry SpanContext record, ja: OpenTelemetry SpanContext 記録}
semantics:
  short_definition: {zh: 与一个 TraceSpan 关联的 OpenTelemetry SpanContext 的持久化不可变表示。, en: A persisted immutable representation of the OpenTelemetry SpanContext associated with one TraceSpan., ja: 1つの TraceSpan に関連付けられた OpenTelemetry SpanContext の永続化された不変表現。}
  definition: {zh: TraceContext 存储一个 TraceSpan 的传播 OTel SpanContext 值，包括 TraceId、SpanId、TraceFlags、TraceState 引用和远程标志。它不是 Span 操作、整条追踪、TraceLink、通用日志关联字段或可变运行时上下文对象。, en: "A TraceContext stores the propagated OTel SpanContext values for a TraceSpan, including TraceId, SpanId, TraceFlags, TraceState reference, and remote flag. It is not a Span operation, a whole trace, a TraceLink, a generic log correlation field, or a mutable runtime context object.", ja: TraceContext は、TraceId、SpanId、TraceFlags、TraceState 参照、リモートフラグを含む、TraceSpan の伝播された OTel SpanContext 値を格納する。Span 操作、全体のトレース、TraceLink、一般的なログ相関フィールド、可変なランタイムコンテキストオブジェクトではない。}
  why_needed: {zh: 跨进程追踪关联和导出验证需要精确的不可变上下文值，且这些值应能独立于 span 操作时间和任意应用上下文进行检查。, en: Cross-process trace correlation and export validation need the exact immutable context values independently inspectable from the span's operation timing and from arbitrary application context., ja: プロセス横断のトレース相関とエクスポート検証には、Span の操作時刻や任意のアプリケーションコンテキストとは独立して検査可能な、正確で不変のコンテキスト値が必要である。}
  includes:
    - {zh: 有效的 OTel TraceId、SpanId、TraceFlags、远程指示符，以及可选的脱敏 TraceState 表示。, en: "Valid OTel TraceId, SpanId, TraceFlags, remote indicator, and optionally redacted TraceState representation.", ja: 有効な OTel TraceId、SpanId、TraceFlags、リモート指標、および任意のマスキング済み TraceState 表現。}
    - {zh: 与一个持久化 TraceSpan 关联的传播标识。, en: Propagation identity associated with one persisted TraceSpan., ja: 1つの永続化 TraceSpan に関連する伝播識別子。}
  excludes:
    - {zh: Span 属性、用户会话元数据、TraceLink 的目标上下文，以及任意业务上下文传播。, en: "Span attributes, user session metadata, a TraceLink's target context, and arbitrary business context propagation.", ja: Span 属性、ユーザーセッションメタデータ、TraceLink の対象コンテキスト、任意の業務コンテキスト伝播。}
    - {zh: 它所属的 TraceSpan 操作记录的替代品。, en: A replacement for the TraceSpan operation record to which it belongs., ja: 所属する TraceSpan 操作記録の代替。}
  semantic_kind: entity
  aliases: [SpanContext projection, trace propagation context]
engineering:
  explanation: {zh: 插桩在创建 OTel Span 时创建 SpanContext，并使用符合标准的载体传播其标识符。导出持久化会在宿主 TraceSpan 下记录不可变标识符，保留远程状态和标志，而不把上下文值当作第二个操作。, en: "Instrumentation creates a SpanContext when creating an OTel Span and propagates its identifiers using standards-aware carriers. Export persistence records the immutable identifiers under the host TraceSpan, preserving remote status and flags without treating context values as a second operation.", ja: 計装は OTel Span の作成時に SpanContext を作成し、標準対応のキャリアを用いて識別子を伝播する。エクスポート永続化は、コンテキスト値を第2の操作として扱わず、ホスト TraceSpan の下に不変の識別子を記録してリモート状態とフラグを保持する。}
  typical_input:
    - description: {zh: SpanContext 导出, en: SpanContext export, ja: SpanContext エクスポート}
      format: |-
        {"trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_id":"8f2d8a3c5b6e7f90","trace_flags":"01","is_remote":false}
  typical_output:
    - description: {zh: 持久化 SpanContext 记录, en: Persisted SpanContext record, ja: 永続化された SpanContext 記録}
      format: |-
        {"trace_context_id":"context-33","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","span_id":"8f2d8a3c5b6e7f90","is_remote":false}
  reference_implementations:
    - {name: OpenTelemetry Trace API, url: https://opentelemetry.io/docs/specs/otel/trace/api/, description: "Documents immutable SpanContext fields and their propagation role."}
    - {name: W3C Trace Context, url: https://www.w3.org/TR/trace-context/, description: "Documents traceparent and tracestate propagation formats."}
structure:
  identity_keys: [trace_context_id, trace_id, span_id]
  fields:
    - id: trace_context_id
      labels: {zh: 追踪上下文记录 ID, en: Trace context record ID, ja: トレースコンテキスト記録 ID}
      definitions: {zh: 一个导出 SpanContext 表示的稳定存储标识符。, en: Stable storage identifier for one exported SpanContext representation., ja: 1件のエクスポート済み SpanContext 表現の安定したストレージ識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: context-33
      source_claims: [claim-otel-span-context]
    - id: trace_id
      labels: {zh: OTel Trace ID, en: OTel Trace ID, ja: OTel Trace ID}
      definitions: {zh: SpanContext 携带的小写十六进制 TraceId。, en: Lowercase hexadecimal TraceId carried by the SpanContext., ja: SpanContext が保持する小文字16進の TraceId。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{32}$'
      example_value: 4bf92f3577b34da6a3ce929d0e0e4736
      source_claims: [claim-otel-span-context]
    - id: span_id
      labels: {zh: OTel Span ID, en: OTel Span ID, ja: OTel Span ID}
      definitions: {zh: SpanContext 携带的小写十六进制 SpanId。, en: Lowercase hexadecimal SpanId carried by the SpanContext., ja: SpanContext が保持する小文字16進の SpanId。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{16}$'
      example_value: 8f2d8a3c5b6e7f90
      source_claims: [claim-otel-span-context]
    - id: trace_flags
      labels: {zh: 追踪标志, en: Trace flags, ja: トレースフラグ}
      definitions: {zh: 按当前追踪上下文格式编码的传播追踪标志。, en: Propagated trace flags encoded according to the active trace-context format., ja: 有効なトレースコンテキスト形式に従って符号化された伝播トレースフラグ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{2}$'
      example_value: '01'
      source_claims: [claim-otel-span-context]
    - id: is_remote
      labels: {zh: 是否远程, en: Is remote, ja: リモートか}
      definitions: {zh: 该上下文是从另一个进程接收还是本地生成。, en: Whether the context was received from another process or generated locally., ja: コンテキストが別プロセスから受信されたか、ローカルで生成されたか。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: false
      source_claims: [claim-otel-span-context]
  constraints:
    - id: trace-context-immutable-and-valid
      severity: error
      language: plain
      expression: A TraceContext must contain valid non-zero OTel TraceId and SpanId values, one trace-flag encoding, and immutable exported values matching its host TraceSpan.
      explanation: {zh: 不能从任意可变应用上下文可靠地重建传播标识。, en: Propagation identity cannot be reconstructed reliably from arbitrary mutable application context., ja: 伝播識別子は任意の可変アプリケーションコンテキストから確実に再構築できない。}
      source_claims: [claim-otel-span-context]
  required_relations: [TraceContext-part_of-TraceSpan]
examples:
  - id: trace-context-positive
    labels: {zh: "W3C traceparent 传播", en: "W3C traceparent propagation", ja: "W3C traceparent 伝播"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceContext maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; TraceContext maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; TraceContext TraceSpan/Record."}
    field_values: {trace_context_id: context-33, trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, span_id: 8f2d8a3c5b6e7f90, trace_flags: '01', is_remote: false}
    related_node_ids: [TraceContext, TraceSpan]
    related_relation_ids: [TraceContext-part_of-TraceSpan]
    source_claims: [claim-otel-span-context]
  - id: trace-context-counterexample
    labels: {zh: "Datadog trace_id 单独字段", en: "Datadog trace_id field alone", ja: "Datadog trace_id 単独フィールド"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style TraceContext TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style TraceContext TraceRecord.", ja: "Missing trace rejects Langfuse-style TraceContext."}
    field_values: {session_id: session-73}
    related_node_ids: [RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-otel-span-context]
  - id: trace-context-boundary
    labels: {zh: "TraceContext 与 TraceSpan 边界", en: "TraceContext versus TraceSpan", ja: "TraceContext と TraceSpan 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; TraceContext must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; TraceContext must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {trace_context_id: context-33}
    related_node_ids: [TraceContext, TraceSpan, TraceLink]
    related_relation_ids: [TraceContext-part_of-TraceSpan]
    source_claims: [claim-otel-span-context]
  - id: trace-context-instance-33
    labels: {zh: "OpenTelemetry inject/extract 实例", en: "OpenTelemetry inject extract instance", ja: "OpenTelemetry inject/extract 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->TraceContext ObservabilityEvent.", en: "Phoenix instance: drift+quality->TraceContext ObservabilityEvent.", ja: "Phoenix instance maps to TraceContext Event."}
    field_values: {trace_context_id: context-33, trace_id: 4bf92f3577b34da6a3ce929d0e0e4736, span_id: 8f2d8a3c5b6e7f90, trace_flags: '01', is_remote: false}
    related_node_ids: [TraceContext, TraceSpan, TraceRecord, TraceLink]
    related_relation_ids: [TraceContext-part_of-TraceSpan]
    source_claims: [claim-otel-span-context]
parent_relation:
  id: TraceContext-part_of-TraceSpan
  predicate: part_of
  target: concept:TraceSpan
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是 TraceSpan 的一部分, en: is part of TraceSpan, ja: TraceSpan の一部である}
  definitions: {zh: 当 TraceContext 持久化与该 span 投影关联的不可变 OTel SpanContext 时，它是 TraceSpan 的 part_of。, en: TraceContext is part_of TraceSpan when it persists the immutable OTel SpanContext associated with that span projection., ja: TraceContext がその Span 投影に関連する不変の OTel SpanContext を永続化するとき、TraceSpan の part_of である。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_context, labels: {zh: 具有 SpanContext, en: has SpanContext, ja: SpanContext を持つ}}
  conditions:
    - id: trace-context-parent-condition
      severity: error
      expression: TraceId and SpanId in the context must match the target TraceSpan identity, including remote/local provenance when known.
      explanations: {zh: 一个上下文不能组合到无关的 span 投影之下。, en: A context cannot be composed under an unrelated span projection., ja: コンテキストを無関係な Span 投影の下にコンポジションできない。}
      source_claims: [claim-otel-span-context]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-otel-span-context]
relations: []
sources:
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines immutable SpanContext fields and their relation to a Span.
  - id: w3c-trace-context
    title: "W3C Trace Context"
    url: https://www.w3.org/TR/trace-context/
    source_type: standard
    relevance: Defines traceparent and tracestate propagation formats and trace identifier interoperability.
source_claims:
  - id: claim-otel-span-context
    source: otel-trace-api
    supports: OpenTelemetry SpanContext is immutable and contains TraceId, SpanId, TraceFlags, TraceState, and an IsRemote indicator for distributed propagation.
    locator: SpanContext
    evidence_kind: standard
    confidence: high

