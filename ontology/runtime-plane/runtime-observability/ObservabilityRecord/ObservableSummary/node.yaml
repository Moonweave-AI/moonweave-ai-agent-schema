sibling_differentiation:
  - sibling_concept_id: StateRecord
    shared_parent_concept_id: ObservabilityRecord
    differentia:
      zh: 正向身份比较：父节点 ObservabilityRecord：ObservableSummary（semantic kind=information，骨架 ObservableSummary-is_a-ObservabilityRecord）；StateRecord（semantic kind=information，骨架 StateRecord-is_a-ObservabilityRecord）。双端条件：ObservableSummary 条件：“可观测摘要是以如下事实为区分特征的可观测记录：它把先前事件、状态、转录或产物证据压缩为运行期可见摘要，用于上下文预算、审查或移交，同时不保存私有推理转录”；StateRecord 条件：“状态记录是一种以特定版本或时点的运行状态、版本间差异或可恢复一致性边界为主要内容的可观测记录”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent ObservabilityRecord: ObservableSummary (semantic kind=information, backbone ObservableSummary-is_a-ObservabilityRecord); StateRecord (semantic kind=information, backbone StateRecord-is_a-ObservabilityRecord). Endpoint conditions: ObservableSummary condition: “Observable summary is an observability record; its differentiating condition is that it is an observable runtime summary that compresses prior events, state, transcript, or artifact evidence for context budget, review, or handoff without storing private reasoning transcripts”; StateRecord condition: “As an observability record, State record is distinguished by the fact that it is an ObservabilityRecord whose primary content is runtime state at a version or time, a difference between versions, or a recoverable consistency boundary”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 ObservabilityRecord：ObservableSummary（semantic kind=information、バックボーン ObservableSummary-is_a-ObservabilityRecord）；StateRecord（semantic kind=information、バックボーン StateRecord-is_a-ObservabilityRecord）。両端条件：ObservableSummary の条件：「観測可能要約は観測記録の一種であり、次の条件で区別されます：それは、過去のイベント、状態、転写、成果物証拠を実行時に見える要約へ圧縮し、文脈予算、レビュー、引き継ぎに用いますが、私的な推論転写は保存しません」；StateRecord の条件：「観測記録に属する状態記録は、次の事実を種差とします：StateRecord は特定版・時点の実行状態、版間差分、復元可能な整合性境界を主内容とする ObservabilityRecord である」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-observable-summary-001
