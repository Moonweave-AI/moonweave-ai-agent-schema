      - claim-observable-summary-design
  - id: ObservableSummary-example-4
    labels:
      zh: support-agent p99 实例
      en: support-agent p99 instance
      ja: support-agent p99 事例
    descriptions:
      zh: ObservableSummary summary_id=obs-70、metric_name=llm_latency_p99、value=820、unit=ms、computed_at=2026-01-15T12:00:00Z。
      en: ObservableSummary summary_id=obs-70, metric_name=llm_latency_p99, value=820, unit=ms, computed_at=2026-01-15T12:00:00Z.
      ja: obs-70 p99 サマリーを記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
