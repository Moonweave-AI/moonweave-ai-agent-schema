schema: moonweave.ai/ontology-node/v1
id: ObservableSummary
kind: concept
status: accepted
labels:
  en: observable summary
  zh: 可观测摘要
  ja: 観測可能要約
semantics:
  short_definition:
    zh: 保留来源引用的运行证据压缩摘要。
    en: A compressed runtime-evidence summary retaining source references.
    ja: 出典参照を保持した実行証拠の圧縮要約。
  definition:
    zh: 可观测摘要是一种 ObservabilityRecord，把一组已外化的追踪、状态、转录或产物证据压缩成供后续运行、审查或移交使用的短记录。它必须保留所覆盖时间区间和来源记录引用，使读者能够回查；它不是原始证据，也不能加入来源中不存在的私有推理。
    en: An ObservableSummary is an ObservabilityRecord that compresses a set of externalized trace, state, transcript, or artifact evidence for later runtime use, review, or handoff. It retains the covered interval and source-record references for verification; it is not raw evidence and must not add private reasoning absent from its sources.
    ja: ObservableSummary は、外化済みのトレース、状態、転写、成果物証拠を後続実行、審査、引継ぎ向けに圧縮する ObservabilityRecord です。検証できるよう対象期間と元記録参照を保持し、生証拠ではなく、出典にない私的推論を追加できません。
  why_needed:
    zh: 长时运行无法总把完整追踪和转录放入上下文，摘要在控制上下文成本的同时保留可追溯证据，支持新的智能体或人工审查者迅速接续而不把压缩结果误当成原始事实。
    en: Long-running agents cannot always carry full traces and transcripts in context. This summary controls context cost while retaining traceable evidence, allowing another agent or reviewer to continue without mistaking compression for raw fact.
    ja: 長時間実行では完全なトレースと転写を常に文脈へ載せられません。この要約は費用を抑えつつ追跡可能証拠を保ち、圧縮結果を生事実と誤認せず後続主体が引き継げます。
  includes:
    - zh: 包括对最近五十个跨度中工具错误、重试结果和未完成任务的交接摘要，并逐项引用对应 span_id。
      en: Includes a handoff summary of tool errors, retry outcomes, and unfinished work across recent spans, with each statement referencing its span_id.
      ja: 最近のスパンにおけるツール障害、再試行結果、未完了作業をまとめ、各記述が span_id を参照する引継ぎ要約を含みます。
  excludes:
    - zh: 不包括逐项保留原始顺序的 AgentTranscript、完整 TraceRecord，以及没有来源引用或凭空补充推理的自由文本总结。
      en: Excludes an AgentTranscript preserving each original turn, a complete TraceRecord, and free-form summaries lacking source references or inventing reasoning.
      ja: 各ターンを保持する AgentTranscript、完全な TraceRecord、出典参照がなく推論を創作する自由文要約は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ObservableSummary-example-positive-001
    kind: positive
    labels:
      zh: 带证据引用的运行交接摘要
      en: Evidence-linked runtime handoff summary
      ja: 証拠参照付き実行引継ぎ要約
    scenario_id: null
    descriptions:
      zh: 长任务交接前，系统将 09:00–09:18 的十二个跨度、两条工具错误和参与者转录压缩为摘要；摘要保留覆盖区间、每项结论对应的源记录 ID 和未解决事项。
      en: Before handing off a long-running task, the system compresses twelve spans, two tool errors, and the participant transcript from 09:00–09:18. The summary retains the covered interval, source-record IDs for each conclusion, and unresolved items.
      ja: 長時間タスクの引継ぎ前に、09:00–09:18の12スパン、2件のツールエラー、参加者転写を要約する。要約は対象区間、各結論の元記録ID、未解決事項を保持する。
    field_values:
      record_id: summary-handoff-0900-0918
      record_kind: summary
      observed_at: 2026-07-16T09:18:05.000Z
      provenance_ref: handoff-summary-builder
      runtime_correlation_ref: runtime-session-long-task-9
    related_node_ids:
      - ObservableSummary
      - TraceRecord
      - AgentTranscript
      - ObservabilityRecord
    related_relation_ids:
      - ObservableSummary-is_a-ObservabilityRecord
      - ObservableSummary-derived_from-TraceRecord
    expected_result:
      zh: 摘要可作为后续运行上下文，同时任何结论都能追溯至已外显源证据。
      en: The summary can serve later runtime context while every conclusion remains traceable to externalized source evidence.
      ja: 要約は後続実行の文脈として使え、各結論を外部化済みの元証拠へ追跡できる。
    why_valid_or_invalid:
      zh: 它有意压缩多条可观测证据，却保留覆盖范围和来源，因此是摘要而不是原始记录的替代品。
      en: It deliberately compresses multiple observable records while preserving coverage and provenance, so it is a summary rather than a replacement for raw evidence.
      ja: 複数の観測記録を意図的に圧縮しつつ範囲と来歴を保つため、生証拠の代替ではなく要約である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observable-summary-001
  - id: ObservableSummary-example-boundary-001
    kind: boundary
    labels:
      zh: 无来源的复盘判断不是可观测摘要
      en: An unreferenced conclusion is not an observable summary
      ja: 出典のない所感は観測要約ではない
    scenario_id: null
    descriptions:
      zh: 评审者写下“模型大概因为不够谨慎而失败”，却没有覆盖时间、跨度或记录引用，也引入了源证据中不存在的心理推断。该文本是评论意见，不是可验证的可观测摘要。
      en: A reviewer writes “the model probably failed because it was not cautious enough” without a covered interval, span or record references, and adds a mental-state inference absent from the evidence. The text is commentary, not a verifiable ObservableSummary.
      ja: 評者が「モデルは慎重さ不足で失敗したらしい」と書くが、対象期間、スパン・記録参照がなく、証拠にない心理推測を加える。この文は所感であり、検証可能なObservableSummaryではない。
    field_values: {}
    related_node_ids:
      - ObservableSummary
      - CritiqueArtifact
      - ObservabilityRecord
    related_relation_ids:
      - ObservableSummary-is_a-ObservabilityRecord
    expected_result:
      zh: 该文本不得归入可观测摘要；应作为评审意见保存并补充其证据引用。
      en: The text is not classified as an ObservableSummary; it belongs as review commentary and needs explicit evidence references.
      ja: この文はObservableSummaryに分類されず、評者コメントとして保存し、明示的な証拠参照を補う必要がある。
    why_valid_or_invalid:
      zh: 可观测摘要只能压缩已外显证据，不能把无来源的主观解释伪装为运行事实。
      en: An ObservableSummary may compress externalized evidence but cannot present an unsupported subjective interpretation as runtime fact.
      ja: ObservableSummaryは外部化済み証拠を圧縮できるが、根拠のない主観解釈を実行事実として示せない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-observable-summary-001
