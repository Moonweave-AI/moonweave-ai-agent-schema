schema: moonweave.ai/ontology-node/v1
id: ObservableSummary
kind: concept
status: accepted
labels: {zh: 可观测性摘要, en: Observability summary, ja: 可観測性要約}
semantics:
  short_definition: {zh: 存储运行时证据的有限窗口聚合或派生概要的 ObservabilityRecord。, en: "An ObservabilityRecord that stores a bounded-window aggregation or derived synopsis of runtime evidence.", ja: ランタイム証拠の有限ウィンドウ集約または派生概要を保存する ObservabilityRecord。}
  definition: {zh: ObservableSummary 是在声明输入范围和时间窗口上的自定义持久化计算，例如计数、速率、百分点或分组结果。它本身不是 OpenTelemetry Metric、OpenTelemetry Metric data point、Log Record 或原始追踪；它可汇总其中任一来源的数据。, en: "An ObservableSummary is a custom persisted calculation over a declared input scope and time window, such as count, rate, percentile, or grouped outcome. It is not itself an OpenTelemetry Metric, OpenTelemetry Metric data point, Log Record, or raw trace; it may summarize data sourced from any of them.", ja: ObservableSummary は、カウント、レート、パーセンタイル、グループ化結果など、宣言された入力範囲と時間ウィンドウ上のカスタム永続計算である。OpenTelemetry Metric、OpenTelemetry Metric data point、Log Record、生トレースそのものではなく、それらのいずれかをソースとするデータを要約できる。}
  why_needed: {zh: 操作人员需要用于仪表板和策略决策的紧凑保留汇总，同时保留派生报告和源遥测数据模型之间的差异。, en: "Operators need compact retained rollups for dashboards and policy decisions while preserving the difference between a derived report and the source telemetry data model.", ja: 運用者にはダッシュボードとポリシー決定のためコンパクトな保持ロールアップが必要で、派生レポートとソーステレメトリーデータモデルの違いを保つ必要がある。}
  includes:
    - {zh: 摘要 ID、聚合类型、窗口边界、输入范围引用、计算值和计算版本。, en: "Summary ID, aggregation kind, window bounds, input-scope reference, computed values, and calculation version.", ja: 要約 ID、集約種別、ウィンドウ境界、入力範囲参照、計算値、計算バージョン。}
    - {zh: 错误率、延迟百分点、执行计数和分组结果摘要。, en: "Error-rate, latency percentile, execution count, and grouped outcome summaries.", ja: エラー率、レイテンシパーセンタイル、実行数、グループ化結果の要約。}
  excludes:
    - {zh: 单个 OTel 数据点、流式指标 instrument、无界仪表板和未聚合源记录。, en: "Individual OTel data points, a streaming metric instrument, an unbounded dashboard, and source records without aggregation.", ja: 個別 OTel データポイント、ストリーミングメトリック instrument、無限ダッシュボード、集約なしのソース記録。}
    - {zh: 在策略下响应摘要的 TelemetryEvent 通知。, en: "A TelemetryEvent notification that responds to a summary under policy.", ja: ポリシー下で要約に応答する TelemetryEvent 通知。}
  semantic_kind: entity
  aliases: [derived observability rollup, runtime summary]
engineering:
  explanation: {zh: 聚合作业选择带版本的输入范围和有限时间窗口，在具名公式下计算值，使用计算元数据存储摘要，并可选馈送独立策略事件。即使读取 OTel 指标流，计算仍是自定义报告。, en: "An aggregation job selects a versioned input scope and finite time window, computes values under a named formula, stores the summary with calculation metadata, and optionally feeds a separate policy event. The calculation remains a custom report even when it reads OTel metric streams.", ja: 集約ジョブはバージョン付き入力範囲と有限時間ウィンドウを選び、名前付き式で値を計算し、計算メタデータ付きで要約を保存し、必要に応じ別のポリシーイベントへ供給する。OTel メトリックストリームを読んでも計算はカスタムレポートのままである。}
  typical_input:
    - description: {zh: 窗口聚合请求, en: Windowed aggregation request, ja: ウィンドウ集約要求}
      format: |-
        {"input_scope":"trace-records/support-agent-prod","window_start":"2026-07-18T09:00:00Z","window_end":"2026-07-18T10:00:00Z","aggregation_kind":"latency_p95"}
  typical_output:
    - description: {zh: 摘要记录, en: Summary record, ja: 要約記録}
      format: |-
        {"summary_id":"summary-70","aggregation_kind":"latency_p95","window_start":"2026-07-18T09:00:00Z","window_end":"2026-07-18T10:00:00Z","value":820}
  reference_implementations:
    - {name: OpenTelemetry Metrics Data Model, url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/, description: Defines native OpenTelemetry Metric streams and points, distinct from arbitrary persisted rollups.}
structure:
  identity_keys: [record_id, summary_id, calculation_version]
  fields:
    - id: record_id
      labels: {zh: 记录 ID, en: Record ID, ja: 記録 ID}
      definitions: {zh: 从 ObservabilityRecord 继承并与摘要计算属于同一持久记录的稳定标识符。, en: Stable identifier inherited from ObservabilityRecord for the same persisted record as this summary calculation., ja: この要約計算と同じ永続記録に対する ObservabilityRecord から継承した安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: summary-70
      source_claims: [claim-observable-summary-boundary]
    - id: record_kind
      labels: {zh: 记录类型, en: Record kind, ja: 記録種別}
      definitions: {zh: 从 ObservabilityRecord 继承并固定为摘要的保留证据类别。, en: Retained-evidence category inherited from ObservabilityRecord and fixed to summary., ja: ObservabilityRecord から継承し summary に固定される保持証拠カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [summary]
      example_value: summary
      source_claims: [claim-observable-summary-boundary]
    - id: recorded_at
      labels: {zh: 持久化时间, en: Persistence time, ja: 永続化時刻}
      definitions: {zh: 从 ObservabilityRecord 继承的摘要记录完成持久化时间。, en: Persistence time inherited from ObservabilityRecord for the finalized summary record., ja: 確定した要約記録に対する ObservabilityRecord から継承した永続化時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T10:00:00Z'
      source_claims: [claim-observable-summary-boundary]
    - id: summary_id
      labels: {zh: 摘要 ID, en: Summary ID, ja: 要約 ID}
      definitions: {zh: 一条持久聚合结果的稳定标识符。, en: Stable identifier of one persisted aggregation result., ja: 1件の永続集約結果の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: summary-70
      source_claims: [claim-observable-summary-boundary]
    - id: aggregation_kind
      labels: {zh: 聚合类型, en: Aggregation kind, ja: 集約種別}
      definitions: {zh: 应用于有界输入范围的具名计算。, en: Named calculation applied to the bounded input scope., ja: 有界入力範囲へ適用される名前付き計算。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [count, error_rate, latency_p50, latency_p95, grouped_outcome]
      example_value: latency_p95
      source_claims: [claim-observable-summary-boundary]
    - id: window_start
      labels: {zh: 窗口开始, en: Window start, ja: ウィンドウ開始}
      definitions: {zh: 有限聚合窗口的包含开始时间。, en: Inclusive start time of the finite aggregation window., ja: 有限集約ウィンドウの包含開始時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:00:00Z'
      source_claims: [claim-observable-summary-boundary]
    - id: window_end
      labels: {zh: 窗口结束, en: Window end, ja: ウィンドウ終了}
      definitions: {zh: 有限聚合窗口的排除结束时间。, en: Exclusive end time of the finite aggregation window., ja: 有限集約ウィンドウの排他的終了時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T10:00:00Z'
      source_claims: [claim-observable-summary-boundary]
  constraints:
    - id: observable-summary-window-and-input
      severity: error
      language: plain
      expression: A summary must declare a finite non-empty window, input scope, aggregation kind, and calculation version; it must not call the resulting rollup an OpenTelemetry Metric or OpenTelemetry Metric data point without native metric-stream semantics.
      explanation: {zh: 派生报告需要可复现计算边界，不能仅凭溯源继承原始遥测身份。, en: "Derived reports need reproducible calculation boundaries and cannot inherit raw telemetry identity by provenance alone.", ja: 派生レポートには再現可能な計算境界が必要で、来歴だけで生テレメトリー識別性を継承できない。}
      source_claims: [claim-observable-summary-boundary]
  required_relations: [ObservableSummary-specializes-ObservabilityRecord]
examples:
  - id: observable-summary-positive
    labels: {zh: "Arize Phoenix LLM p99 摘要", en: "Arize Phoenix LLM p99 summary", ja: "Arize Phoenix LLM p99 サマリー"}
    descriptions: {zh: "Arize Phoenix embedding drift, prompt/response quality, trace viz; ObservableSummary maps ObservabilityEvent/MetricSample.", en: "Arize Phoenix embedding drift, prompt/response quality, trace viz; ObservableSummary maps ObservabilityEvent/MetricSample.", ja: "Phoenix drift+quality; ObservableSummary ObservabilityEvent."}
    field_values: {record_id: summary-70, record_kind: summary, recorded_at: '2026-07-18T10:00:00Z', summary_id: summary-70, aggregation_kind: latency_p95, window_start: '2026-07-18T09:00:00Z', window_end: '2026-07-18T10:00:00Z'}
    related_node_ids: [ObservableSummary, TraceRecord]
    related_relation_ids: [ObservableSummary-specializes-ObservabilityRecord]
    source_claims: [claim-observable-summary-boundary]
  - id: observable-summary-counterexample
    labels: {zh: "单次 span latency 非 Summary", en: "Single span latency not Summary", ja: "単一 span latency は Summary ではない"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style ObservableSummary.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style ObservableSummary.", ja: "Gateway bypass rejects Helicone-style ObservableSummary."}
    field_values: {metric_name: runtime.latency}
    related_node_ids: [ObservabilityRecord]
    related_relation_ids: []
    source_claims: [claim-observable-summary-boundary]
  - id: observable-summary-boundary
    labels: {zh: "Summary 与 TraceRecord 边界", en: "Summary versus TraceRecord boundary", ja: "Summary と TraceRecord 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ObservableSummary preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ObservableSummary preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {summary_id: summary-70}
    related_node_ids: [ObservableSummary, TelemetryEvent]
    related_relation_ids: []
    source_claims: [claim-observable-summary-boundary]
  - id: observable-summary-instance-70
    labels: {zh: "support-agent p99 实例", en: "support-agent p99 instance", ja: "support-agent p99 事例"}
    descriptions: {zh: "Helicone instance: request_id=hc-771 latency_ms=842 cost_usd=0.003 model=gpt-4o->ObservableSummary.", en: "Helicone instance: request_id latency cost model->ObservableSummary.", ja: "Helicone instance maps to ObservableSummary Execution."}
    field_values: {record_id: summary-70, record_kind: summary, recorded_at: '2026-07-18T10:00:00Z', summary_id: summary-70, aggregation_kind: latency_p95, window_start: '2026-07-18T09:00:00Z', window_end: '2026-07-18T10:00:00Z'}
    related_node_ids: [ObservableSummary, TraceRecord, TelemetryEvent]
    related_relation_ids: [ObservableSummary-specializes-ObservabilityRecord]
    source_claims: [claim-observable-summary-boundary]
parent_relation:
  id: ObservableSummary-specializes-ObservabilityRecord
  predicate: is_a
  target: concept:ObservabilityRecord
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是可观测性摘要, en: is an observability summary, ja: 可観測性要約である}
  definitions: {zh: 每个 ObservableSummary 都是包含有界派生聚合的 ObservabilityRecord。, en: Every ObservableSummary is an ObservabilityRecord containing a bounded derived aggregation., ja: すべての ObservableSummary は有界派生集約を含む ObservabilityRecord である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_observability_summary, labels: {zh: 具有可观测性摘要, en: has observability summary, ja: 可観測性要約を持つ}}
  conditions:
    - id: observable-summary-parent-condition
      severity: error
      expression: Require a finite window, named calculation, and declared input scope for the retained aggregation.
      explanations: {zh: 无界仪表板显示和原始信号点不是此契约下的摘要。, en: Unbounded dashboard displays and raw signal points are not summaries under this contract., ja: 無限ダッシュボード表示と生シグナル点はこの契約の要約ではない。}
      source_claims: [claim-observable-summary-boundary]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-observable-summary-boundary]
relations: []
sources:
  - id: otel-metrics-data-model
    title: "OpenTelemetry Metrics Data Model"
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines OpenTelemetry Metric streams and data points, supporting an explicit boundary for custom persisted aggregations.
source_claims:
  - id: claim-observable-summary-boundary
    source: otel-metrics-data-model
    supports: OpenTelemetry metrics distinguish instrument-recorded events, metric streams, and timestamped data points, which do not make arbitrary derived dashboard summaries native Metrics.
    locator: Model Details, Event Model, and Timeseries Model
    evidence_kind: standard
    confidence: high

