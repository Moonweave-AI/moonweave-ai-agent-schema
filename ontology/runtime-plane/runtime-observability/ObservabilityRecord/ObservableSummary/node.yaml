    labels:
      zh: 单次 span latency 非 Summary
      en: Single span latency not Summary
      ja: 単一 span latency は Summary ではない
    descriptions:
      zh: LangSmith 单 run latency_ms=820 是 TraceSpan 属性，不是跨 run 聚合 ObservableSummary。
      en: LangSmith single run latency_ms=820 is TraceSpan attribute, not cross-run aggregate ObservableSummary.
      ja: 単一 run latency は TraceSpan 属性である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservableSummary
      - CritiqueArtifact
      - ObservabilityRecord
    related_relation_ids:
      - ObservableSummary-is_a-ObservabilityRecord
    source_claims:
      - claim-observable-summary-design
  - id: ObservableSummary-example-3
    labels:
      zh: Summary 与 TraceRecord 边界
      en: Summary versus TraceRecord boundary
      ja: Summary と TraceRecord 境界
    descriptions:
      zh: ObservableSummary 是聚合统计；TraceRecord 是单次 trace 导出；metrics 与 traces 信号分离。
      en: ObservableSummary is aggregate statistic; TraceRecord is single trace export; metrics and traces signals separated.
      ja: Summary は集計、TraceRecord は単一 trace である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ObservableSummary
    related_relation_ids: []
    source_claims:
