    supports: LangSmith run trees expose parent_run_id hierarchy mappable to TraceRecord.
    locator: Runs > run tree
    evidence_kind: design-inference
    confidence: high
  - id: claim-observable-summary-design
    source: src-runtime-observability-design
    supports: ObservableSummary aggregates metrics/logs as observations only.
    locator: ObservableSummary boundary
    evidence_kind: design-inference
    confidence: high
