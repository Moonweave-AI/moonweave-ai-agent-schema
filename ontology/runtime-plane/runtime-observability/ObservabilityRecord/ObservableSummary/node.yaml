schema: moonweave.ai/ontology-node/v1
id: ObservableSummary
kind: concept
labels:
  en: observable summary
  zh: 可观测摘要
  ja: 観測可能要約
semantics:
  short_definition:
    zh: 保留来源引用的运行证据压缩摘要。
    en: A compressed runtime-evidence summary retaining source references.
    ja: 出典参照を保持した実行証拠の圧縮要約。
  definition:
    zh: 可观测摘要是一种 ObservabilityRecord，把一组已外化的追踪、状态、转录或产物证据压缩成供后续运行、审查或移交使用的短记录。它必须保留所覆盖时间区间和来源记录引用，使读者能够回查；它不是原始证据，也不能加入来源中不存在的私有推理。
    en: An ObservableSummary is an ObservabilityRecord that compresses a set of externalized trace, state, transcript, or artifact evidence for later runtime use, review, or handoff. It retains the covered interval and source-record references for verification; it is not raw evidence and must not add private reasoning absent from its sources.
    ja: ObservableSummary は、外化済みのトレース、状態、転写、成果物証拠を後続実行、審査、引継ぎ向けに圧縮する ObservabilityRecord です。検証できるよう対象期間と元記録参照を保持し、生証拠ではなく、出典にない私的推論を追加できません。
  why_needed:
    zh: 长时运行无法总把完整追踪和转录放入上下文，摘要在控制上下文成本的同时保留可追溯证据，支持新的智能体或人工审查者迅速接续而不把压缩结果误当成原始事实。
    en: Long-running agents cannot always carry full traces and transcripts in context. This summary controls context cost while retaining traceable evidence, allowing another agent or reviewer to continue without mistaking compression for raw fact.
    ja: 長時間実行では完全なトレースと転写を常に文脈へ載せられません。この要約は費用を抑えつつ追跡可能証拠を保ち、圧縮結果を生事実と誤認せず後続主体が引き継げます。
  includes:
    - zh: 包括对最近五十个跨度中工具错误、重试结果和未完成任务的交接摘要，并逐项引用对应 span_id。
      en: Includes a handoff summary of tool errors, retry outcomes, and unfinished work across recent spans, with each statement referencing its span_id.
      ja: 最近のスパンにおけるツール障害、再試行結果、未完了作業をまとめ、各記述が span_id を参照する引継ぎ要約を含みます。
  excludes:
    - zh: 不包括逐项保留原始顺序的 AgentTranscript、完整 TraceRecord，以及没有来源引用或凭空补充推理的自由文本总结。
      en: Excludes an AgentTranscript preserving each original turn, a complete TraceRecord, and free-form summaries lacking source references or inventing reasoning.
      ja: 各ターンを保持する AgentTranscript、完全な TraceRecord、出典参照がなく推論を創作する自由文要約は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ObservableSummary（Metric/LogEntry 摘要）映射 OTel metrics、Datadog span meta 与 wandb.run.log；提供观测摘要不替代 RunAttempt 终态。
    en: ObservableSummary (Metric/LogEntry summary) maps OTel metrics, Datadog span meta, and wandb.run.log; supplies observation summary without replacing RunAttempt terminal state.
    ja: ObservableSummary（Metric/LogEntry）は OTel metric 等の観測 summary で RunAttempt 终态を代替しません。
  typical_input:
    - description: OTLP export or LangSmith run tree ingest.
      format: run.log({"latency_ms":842,"tokens_out":1204})
      source_claims:
        - claim-otel-observability
        - claim-observable-summary-design
  typical_output:
    - description: Moonweave observability record projection.
      format: '{"observable_summary_id":"obs-run-330","run_attempt_ref":"attempt-330-a"}'
      source_claims:
        - claim-observable-summary-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
