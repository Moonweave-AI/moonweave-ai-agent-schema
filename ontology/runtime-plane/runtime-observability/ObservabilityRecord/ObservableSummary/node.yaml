    descriptions:
      zh: Arize Phoenix export_project 生成 ObservableSummary：metric=llm_latency_p99、value_ms=820、window=24h、service=support-agent。
      en: "Arize Phoenix export_project generates ObservableSummary: metric=llm_latency_p99, value_ms=820, window=24h, service=support-agent."
      ja: Arize Phoenix p99 が ObservableSummary である。
    example_source:
      product: OpenTelemetry
