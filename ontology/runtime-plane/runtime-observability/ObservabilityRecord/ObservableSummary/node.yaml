    related_relation_ids: []
    source_claims:
      - claim-observable-summary-design
      - claim-observable-summary-design
parent_relation:
  id: ObservableSummary-is_a-ObservabilityRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ObservableSummary 都是 ObservabilityRecord，其种差是压缩一组外显追踪、状态、转录或审计证据，同时保留覆盖区间与来源引用。
    en: Every ObservableSummary is an ObservabilityRecord distinguished by condensing externalized trace, state, transcript, or audit evidence while retaining the covered interval and source references.
    ja: すべての ObservableSummary は ObservabilityRecord で、外部化 trace・state・transcript・audit evidence を圧縮しつつ対象区間と出典参照を保持する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-observable-summary-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ObservableSummary-derived_from-TraceRecord
    predicate: derived_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: derived from
      en: derived from
      ja: derived from
    definitions:
      zh: ObservableSummary 通过 derived_from 指向其压缩与解释所依据的 TraceRecord，使摘要结论能够回溯到原始跨度证据。
      en: ObservableSummary is derived_from the TraceRecord whose span evidence it condenses and interprets, allowing every summary conclusion to be traced back to raw evidence.
      ja: ObservableSummary は圧縮・解釈の基礎となる TraceRecord へ derived_from で結び、summary 結論を元 Span evidence へ遡及可能にします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_derived_from
      labels:
        zh: 反向：derived from
        en: is target of derived from
        ja: 逆方向：derived from
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-observable-summary-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceRecord
