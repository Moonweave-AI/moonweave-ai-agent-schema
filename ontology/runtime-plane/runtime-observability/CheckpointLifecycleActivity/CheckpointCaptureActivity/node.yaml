schema: moonweave.ai/ontology-node/v1
id: CheckpointCaptureActivity
kind: concept
status: accepted
labels:
  zh: 检查点捕获活动
  en: checkpoint capture activity
  ja: チェックポイント取得活動
semantics:
  short_definition:
    zh: 在确定执行位置捕获状态并生成检查点记录的活动。
    en: An activity that captures state at a determined execution position and creates a checkpoint record.
    ja: 確定した実行位置で状態を取得し checkpoint record を作る活動です。
  definition:
    zh: 检查点捕获活动是一种检查点生命周期活动；其种差是在确定的线程、步骤或会话位置读取可恢复状态，形成有版本的 StateSnapshot，并生成引用该快照的 Checkpoint。
    en: A checkpoint capture activity is a CheckpointLifecycleActivity distinguished by reading recoverable state at a determined thread, step, or session position, forming a versioned StateSnapshot, and creating a Checkpoint that references it.
    ja: チェックポイント取得活動は CheckpointLifecycleActivity の一種で、確定した thread・step・session 位置の回復可能状態を読み、版付き StateSnapshot とそれを参照する Checkpoint を生成します。
  why_needed:
    zh: 单独建模捕获活动可以回答哪个活动在何处创建了哪个检查点，而不把恢复或回放误当成状态采集。
    en: Modeling capture separately answers which activity created which checkpoint at which position without treating restore or replay as state capture.
    ja: 取得を独立にモデル化すると、どの活動がどの位置でどの checkpoint を作ったかを照会でき、復元や再生を状態取得と誤認しません。
  includes:
    - zh: 包含把当前可恢复状态固化为版本快照并登记检查点的活动。
      en: Includes activities that persist current recoverable state as a versioned snapshot and register a checkpoint.
      ja: 現在の回復可能状態を版付き snapshot として永続化し checkpoint を登録する活動を含みます。
  excludes:
    - zh: 不包含读取既有检查点的恢复活动、重新执行轨迹的回放活动或检查点记录本身。
      en: Excludes restore activities that read an existing checkpoint, replay activities that re-execute a trajectory, and the checkpoint record itself.
      ja: 既存 checkpoint を読む復元、軌跡を再実行する再生、checkpoint record 自体を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: CheckpointCaptureActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 检查点捕获正例
      en: Positive checkpoint capture example
      ja: checkpoint 取得の正例
    scenario_id: null
    descriptions:
      zh: capture-12 在线程 t-7 的 super-step 12 结束时读取 channel values、next nodes 与 task metadata，生成 StateSnapshot snapshot-12，并通过新 checkpoint_id=cp-12 和 parent_config=cp-11 将其持久化。
      en: At the end of super-step 12 in thread t-7, capture-12 reads channel values, next nodes, and task metadata, forms StateSnapshot snapshot-12, and persists it under new checkpoint ID cp-12 with parent_config cp-11.
      ja: capture-12 は thread t-7 の super-step 12 終了時に channel values・next nodes・task metadata を読み、StateSnapshot snapshot-12 を形成し、新しい checkpoint ID cp-12 と parent_config cp-11 で永続化します。
    field_values:
      lifecycle_activity_id: checkpoint-capture-t7-s12
      lifecycle_operation: capture
      checkpoint_ref: cp-12
      session_ref: t-7
      started_at: 2026-07-16T10:00:12.000Z
      ended_at: 2026-07-16T10:00:12.055Z
      outcome: succeeded
    related_node_ids:
      - CheckpointCaptureActivity
      - Checkpoint
      - StateSnapshot
      - CheckpointLifecycleActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 把 capture-12 识别为 CheckpointCaptureActivity，并把新建的 cp-12 与 snapshot-12 作为其输出证据；不得把同一活动解释为恢复或回放。
      en: Classify capture-12 as CheckpointCaptureActivity and retain newly created cp-12 and snapshot-12 as its output evidence; do not reinterpret the same activity as restore or replay.
      ja: capture-12 を CheckpointCaptureActivity とし、新規 cp-12 と snapshot-12 を出力証拠として保持します。同じ活動を restore または replay と解釈しません。
    why_valid_or_invalid:
      zh: 该活动不仅读取当前状态，还第一次形成具有新 checkpoint_id、父检查点引用和创建时间的可恢复边界；创建新边界正是捕获与恢复、回放之间的种差。
      en: "The activity does more than read current state: it first forms an addressable recovery boundary with a new checkpoint ID, parent reference, and creation time. Creating that new boundary is the differentia from restore and replay."
      ja: この活動は現在状態を読むだけでなく、新しい checkpoint ID、親参照、作成時刻を持つ回復境界を初めて形成します。この新境界の作成が restore・replay との種差です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-capture-activity-001
  - id: CheckpointCaptureActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检查点捕获边界例
      en: Checkpoint capture boundary example
      ja: checkpoint 取得の境界例
    scenario_id: null
    descriptions:
      zh: restore-13 使用既有 thread_id=t-7 与 checkpoint_id=cp-12 读取 snapshot-12，重建 channel values 并从 next 节点继续；它没有分配新 checkpoint_id，也没有写出新的 StateSnapshot。
      en: restore-13 uses existing thread ID t-7 and checkpoint ID cp-12 to read snapshot-12, reconstruct channel values, and continue from next; it allocates no new checkpoint ID and writes no new StateSnapshot.
      ja: restore-13 は既存 thread ID t-7 と checkpoint ID cp-12 で snapshot-12 を読み、channel values を再構成して next から継続します。新しい checkpoint ID を割り当てず、新規 StateSnapshot も書きません。
    field_values: {}
    related_node_ids:
      - CheckpointCaptureActivity
      - RestoreActivity
      - CheckpointLifecycleActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 把 restore-13 归为 RestoreActivity，并明确拒绝 CheckpointCaptureActivity；既有检查点仍是输入而不是该活动新创建的输出。
      en: Classify restore-13 as RestoreActivity and explicitly reject CheckpointCaptureActivity; the existing checkpoint remains its input rather than a newly created output.
      ja: restore-13 を RestoreActivity とし CheckpointCaptureActivity を明示的に否定します。既存 checkpoint は入力であり、この活動が新規作成した出力ではありません。
    why_valid_or_invalid:
      zh: 读取并应用既有状态边界满足恢复语义，却缺少捕获所必需的新快照身份、持久化写入和父检查点链更新；共享同一 checkpoint 不能消除两类活动的方向差异。
      en: Reading and applying an existing state boundary satisfies restore semantics but lacks the new snapshot identity, persistence write, and parent-checkpoint update required by capture. Sharing one checkpoint does not erase the directional difference.
      ja: 既存状態境界の読取と適用は restore semantics を満たしますが、capture に必要な新 snapshot identity、永続化 write、親 checkpoint chain 更新を欠きます。同じ checkpoint の共有は方向差を消しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-capture-activity-001
