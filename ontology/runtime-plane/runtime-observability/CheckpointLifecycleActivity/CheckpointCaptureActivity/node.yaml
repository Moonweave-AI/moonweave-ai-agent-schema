schema: moonweave.ai/ontology-node/v1
id: CheckpointCaptureActivity
kind: concept
status: accepted
labels: {zh: 检查点捕获活动, en: Checkpoint capture activity, ja: チェックポイント取得アクティビティ}
semantics:
  short_definition: {zh: 序列化可恢复运行时状态版本并生成 Checkpoint Entity 的 CheckpointLifecycleActivity。, en: "A CheckpointLifecycleActivity that serializes a recoverable runtime state version and generates a Checkpoint Entity.", ja: 回復可能なランタイム状態バージョンを直列化し Checkpoint Entity を生成する CheckpointLifecycleActivity。}
  definition: {zh: CheckpointCaptureActivity 是读取当前会话或图状态、将其序列化并创建持久 Checkpoint 的有界捕获操作。它不是生成后的 Checkpoint、已存储的被动状态快照、会话暂停事件，也不是度量捕获延迟的 OTel Span。, en: "A CheckpointCaptureActivity is the bounded capture operation that reads current session or graph state, serializes it, and creates a durable Checkpoint. It is not the resulting Checkpoint, a passive state snapshot already stored, a session pause event, or an OTel Span that instruments capture latency.", ja: CheckpointCaptureActivity は、現在のセッションまたはグラフ状態を読み取り、直列化して永続 Checkpoint を作成する有界の取得操作である。生成済みの Checkpoint、保存済みの受動的な状態スナップショット、セッション一時停止イベント、取得レイテンシを計測する OTel Span ではない。}
  why_needed: {zh: 持久恢复需要说明检查点如何制作、代表哪个源状态，以及捕获是否在之后的暂停、重试或恢复前完成的溯源证据。, en: "Durable recovery needs provenance for how a checkpoint was made, which source state it represents, and whether capture completed before a later pause, retry, or restore.", ja: 永続的な復旧には、チェックポイントの作成方法、表すソース状態、後続の停止・再試行・復元前に取得が完了したかを示す来歴が必要である。}
  includes:
    - {zh: 源状态版本、捕获时间、序列化结果、存储引用和生成的 Checkpoint。, en: "Source state version, capture time, serialization outcome, storage reference, and generated Checkpoint.", ja: ソース状態バージョン、取得時刻、直列化結果、ストレージ参照、生成された Checkpoint。}
    - {zh: 在恢复、中断处理或时间旅行前执行的状态持久化工作。, en: "State persistence work performed before recovery, interrupt handling, or time travel.", ja: 復旧、中断処理、タイムトラベルの前に実施される状態永続化作業。}
  excludes:
    - {zh: 检查点载荷本身、恢复操作和通用工件导出。, en: "The checkpoint payload itself, a restore operation, and a generic artifact export.", ja: チェックポイントペイロード自体、復元操作、一般的な Artifact エクスポート。}
    - {zh: 没有状态生成证据而仅报告捕获时长的 trace span。, en: "A trace span that reports capture duration without state-generation evidence.", ja: 状態生成の証拠なしに取得時間だけを報告する trace span。}
  semantic_kind: activity
  aliases: [save checkpoint, state capture]
engineering:
  explanation: {zh: 运行时冻结或读取一致的状态版本，通过检查点保存器将其序列化，验证存储记录，并从捕获 Activity 向生成的 Checkpoint 发出溯源关系。独立生命周期事件可传达之后的暂停，但不能取代此捕获操作。, en: "The runtime freezes or reads a consistent state version, serializes it through a checkpointer, verifies the stored record, and emits provenance from the capture Activity to its generated Checkpoint. A separate lifecycle event may communicate a later pause, but it does not replace the capture operation.", ja: ランタイムは一貫した状態バージョンを固定または読み取り、チェックポインターで直列化して保存記録を検証し、取得 Activity から生成した Checkpoint への来歴を記録する。別のライフサイクルイベントは後続の停止を伝え得るが、この取得操作を置き換えない。}
  typical_input:
    - description: {zh: LangGraph BaseCheckpointSaver.put 调用, en: LangGraph BaseCheckpointSaver.put call, ja: LangGraph BaseCheckpointSaver.put 呼び出し}
      format: |-
        {"config":{"configurable":{"thread_id":"session-73","checkpoint_ns":""}},"checkpoint":{"id":"18","channel_values":{"messages":[]}},"metadata":{"source":"capture"},"new_versions":{"messages":18}}
  typical_output:
    - description: {zh: 已提交的检查点配置与生成实体引用, en: Committed checkpoint config and generated entity reference, ja: コミット済みチェックポイント設定と生成エンティティ参照}
      format: |-
        {"activity_id":"checkpoint-op-31","returned_config":{"configurable":{"thread_id":"session-73","checkpoint_id":"18"}},"checkpoint_id":"checkpoint-4","state_digest":"sha256:2d7a...","outcome":"succeeded"}
  reference_implementations:
    - {name: LangGraph BaseCheckpointSaver, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents checkpointer.put/get_tuple persisting thread-scoped graph state as checkpoints.}
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 捕获活动 ID, en: Capture activity ID, ja: 取得アクティビティ ID}
      definitions: {zh: 一次状态捕获操作的稳定 ID。, en: Stable ID for one state capture operation., ja: 1回の状態取得操作の安定 ID。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: checkpoint-op-31
      source_claims: [claim-checkpoint-capture]
    - id: operation_kind
      labels: {zh: 操作类型, en: Operation kind, ja: 操作種別}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承并固定为捕获的生命周期操作类型。, en: Checkpoint lifecycle operation inherited from CheckpointLifecycleActivity and fixed to capture., ja: CheckpointLifecycleActivity から継承し capture に固定されるライフサイクル操作。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [capture]
      example_value: capture
      source_claims: [claim-checkpoint-capture]
    - id: outcome
      labels: {zh: 操作结果, en: Operation outcome, ja: 操作結果}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承的捕获操作终态。, en: Final capture outcome inherited from CheckpointLifecycleActivity., ja: CheckpointLifecycleActivity から継承する取得操作の最終結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, cancelled]
      example_value: succeeded
      source_claims: [claim-checkpoint-capture]
    - id: source_state_version
      labels: {zh: 源状态版本, en: Source state version, ja: ソース状態バージョン}
      definitions: {zh: 选作序列化对象的运行时状态版本标识符。, en: Version identifier of the runtime state selected for serialization., ja: 直列化対象に選ばれたランタイム状態のバージョン識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '18'
      source_claims: [claim-checkpoint-capture]
    - id: captured_at
      labels: {zh: 捕获时间, en: Capture time, ja: 取得時刻}
      definitions: {zh: 捕获一致源状态的时间戳。, en: Timestamp when the consistent source state was captured., ja: 一貫したソース状態が取得された時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:15:55Z'
      source_claims: [claim-checkpoint-capture]
  constraints:
    - id: checkpoint-capture-generated-state
      severity: error
      language: plain
      expression: A successful capture must generate one Checkpoint with a source state version and integrity evidence; a failed capture must not claim a usable generated checkpoint.
      explanation: {zh: 恢复取决于能否确认状态记录确已提交。, en: Recovery depends on knowing whether the state record was actually committed., ja: 復旧には状態記録が実際にコミットされたかの確認が必要である。}
      source_claims: [claim-checkpoint-capture]
  required_relations: [CheckpointCaptureActivity-specializes-CheckpointLifecycleActivity, CheckpointCaptureActivity-generates-Checkpoint]
examples:
  - id: checkpoint-capture-positive
    labels: {zh: "LangGraph checkpointer.put 捕获", en: "LangGraph checkpointer.put capture", ja: "LangGraph checkpointer.put キャプチャ"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointCaptureActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointCaptureActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; CheckpointCaptureActivity TraceSpan/Record."}
    field_values: {activity_id: checkpoint-op-31, operation_kind: capture, outcome: succeeded, source_state_version: '18', captured_at: '2026-07-18T09:15:55Z'}
    related_node_ids: [CheckpointCaptureActivity, Checkpoint, RuntimeSession]
    related_relation_ids: [CheckpointCaptureActivity-generates-Checkpoint]
    source_claims: [claim-checkpoint-capture]
  - id: checkpoint-capture-counterexample
    labels: {zh: "手动 JSON 快照非 CaptureActivity", en: "Manual JSON snapshot not CaptureActivity", ja: "手動 JSON スナップショットは CaptureActivity ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style CheckpointCaptureActivity TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style CheckpointCaptureActivity TraceRecord.", ja: "Missing trace rejects Langfuse-style CheckpointCaptureActivity."}
    field_values: {checkpoint_id: checkpoint-4}
    related_node_ids: [Checkpoint, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-checkpoint-capture]
  - id: checkpoint-capture-boundary
    labels: {zh: "Capture 与 StateSnapshot 边界", en: "Capture versus StateSnapshot boundary", ja: "Capture と StateSnapshot 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; CheckpointCaptureActivity must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; CheckpointCaptureActivity must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {activity_id: checkpoint-op-31}
    related_node_ids: [CheckpointCaptureActivity, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-checkpoint-capture]
  - id: checkpoint-capture-instance-31
    labels: {zh: "super-step checkpoint 捕获实例", en: "super-step checkpoint capture instance", ja: "super-step checkpoint キャプチャ事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->CheckpointCaptureActivity ObservabilityEvent.", en: "Phoenix instance: drift+quality->CheckpointCaptureActivity ObservabilityEvent.", ja: "Phoenix instance maps to CheckpointCaptureActivity Event."}
    field_values: {activity_id: checkpoint-op-31, operation_kind: capture, outcome: succeeded, source_state_version: '18', captured_at: '2026-07-18T09:15:55Z'}
    related_node_ids: [CheckpointCaptureActivity, Checkpoint, RuntimeSession, TraceSpan]
    related_relation_ids: [CheckpointCaptureActivity-generates-Checkpoint]
    source_claims: [claim-checkpoint-capture]
parent_relation:
  id: CheckpointCaptureActivity-specializes-CheckpointLifecycleActivity
  predicate: is_a
  target: concept:CheckpointLifecycleActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是检查点捕获活动, en: is a checkpoint capture activity, ja: チェックポイント取得アクティビティである}
  definitions: {zh: 每个 CheckpointCaptureActivity 都是生成可恢复 Checkpoint 的 CheckpointLifecycleActivity。, en: Every CheckpointCaptureActivity is a CheckpointLifecycleActivity that generates a recoverable Checkpoint., ja: すべての CheckpointCaptureActivity は回復可能な Checkpoint を生成する CheckpointLifecycleActivity である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_capture_activity, labels: {zh: 具有捕获活动, en: has capture activity, ja: 取得アクティビティを持つ}}
  conditions:
    - id: checkpoint-capture-parent-condition
      severity: error
      expression: Require operation_kind capture and evidence of a generated Checkpoint on successful completion.
      explanations: {zh: 通用状态读取和失败写入不满足捕获语义。, en: Generic state reads and failed writes do not satisfy capture semantics., ja: 一般的な状態読み取りと失敗書き込みは取得意味を満たさない。}
      source_claims: [claim-checkpoint-capture]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-checkpoint-capture]
relations:
  - id: CheckpointCaptureActivity-generates-Checkpoint
    predicate: generates
    target: concept:Checkpoint
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 生成检查点, en: generates checkpoint, ja: チェックポイントを生成する}
    definitions: {zh: 成功捕获提交持久恢复状态记录时，CheckpointCaptureActivity 生成 Checkpoint。, en: CheckpointCaptureActivity generates Checkpoint when a successful capture commits a durable recovery state record., ja: 成功した取得が永続的な復旧状態記録をコミットするとき、CheckpointCaptureActivity は Checkpoint を生成する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_generated_by, labels: {zh: 由捕获活动生成, en: was generated by capture activity, ja: 取得アクティビティにより生成された}}
    conditions:
      - id: checkpoint-capture-generation-condition
        severity: error
        expression: Assert generation only after the target checkpoint has integrity and storage-commit evidence from this capture activity.
        explanations: {zh: 预留 ID 或尝试写入并不等于成功生成检查点。, en: Reserving an ID or attempting a write is not successful checkpoint generation., ja: ID の予約や書き込み試行は成功したチェックポイント生成ではない。}
        source_claims: [claim-checkpoint-capture]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-checkpoint-capture]
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines generation provenance between an Activity and an Entity.
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents checkpointers persisting a thread's graph state as checkpoints.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines Spans as distinct tracing operation records with timing and attributes.
source_claims:
  - id: claim-checkpoint-capture
    source: langgraph-persistence
    supports: LangGraph checkpointers persist a thread's graph state as checkpoints for continuity, interruption handling, time travel, and fault tolerance.
    locator: Persistence overview, Checkpointers versus stores
    evidence_kind: documentation
    confidence: high

