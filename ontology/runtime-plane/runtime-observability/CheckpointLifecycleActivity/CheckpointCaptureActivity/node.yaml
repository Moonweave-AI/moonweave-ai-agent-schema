schema: moonweave.ai/ontology-node/v1
id: CheckpointCaptureActivity
kind: concept
labels:
  zh: 检查点捕获活动
  en: checkpoint capture activity
  ja: チェックポイント取得活動
semantics:
  short_definition:
    zh: 在确定执行位置捕获状态并生成检查点记录的活动。
    en: An activity that captures state at a determined execution position and creates a checkpoint record.
    ja: 確定した実行位置で状態を取得し checkpoint record を作る活動です。
  definition:
    zh: 检查点捕获活动是一种检查点生命周期活动；其种差是在确定的线程、步骤或会话位置读取可恢复状态，形成有版本的 StateSnapshot，并生成引用该快照的 Checkpoint。
    en: A checkpoint capture activity is a CheckpointLifecycleActivity distinguished by reading recoverable state at a determined thread, step, or session position, forming a versioned StateSnapshot, and creating a Checkpoint that references it.
    ja: チェックポイント取得活動は CheckpointLifecycleActivity の一種で、確定した thread・step・session 位置の回復可能状態を読み、版付き StateSnapshot とそれを参照する Checkpoint を生成します。
  why_needed:
    zh: 单独建模捕获活动可以回答哪个活动在何处创建了哪个检查点，而不把恢复或回放误当成状态采集。
    en: Modeling capture separately answers which activity created which checkpoint at which position without treating restore or replay as state capture.
    ja: 取得を独立にモデル化すると、どの活動がどの位置でどの checkpoint を作ったかを照会でき、復元や再生を状態取得と誤認しません。
  includes:
    - zh: 包含把当前可恢复状态固化为版本快照并登记检查点的活动。
      en: Includes activities that persist current recoverable state as a versioned snapshot and register a checkpoint.
      ja: 現在の回復可能状態を版付き snapshot として永続化し checkpoint を登録する活動を含みます。
  excludes:
    - zh: 不包含读取既有检查点的恢复活动、重新执行轨迹的回放活动或检查点记录本身。
      en: Excludes restore activities that read an existing checkpoint, replay activities that re-execute a trajectory, and the checkpoint record itself.
      ja: 既存 checkpoint を読む復元、軌跡を再実行する再生、checkpoint record 自体を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成 CheckpointCaptureActivity 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating CheckpointCaptureActivity, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: CheckpointCaptureActivity 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to CheckpointCaptureActivity.
      format: |-
        # Example CheckpointCaptureActivity ingest
        { "checkpoint-capture-activity_ref": "example-1" }
      source_claims:
        - claim-checkpoint-capture-activity-design
  typical_output:
    - description: Moonweave-local CheckpointCaptureActivity projection.
      format: '{ "schema_owner": "moonweave-local-design", "checkpoint-capture-activity_id": "example-1" }'
      source_claims:
        - claim-checkpoint-capture-activity-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: CheckpointCaptureActivity-example-positive-manual-001
    labels:
      zh: LangGraph checkpointer.put 捕获
      en: LangGraph checkpointer.put capture
      ja: LangGraph checkpointer.put キャプチャ
    descriptions:
      zh: LangGraph checkpointer.put(config, checkpoint, metadata, new_versions) 在 super-step 结束捕获 CheckpointCaptureActivity，写入 checkpoint_id 与 channel_values。
      en: LangGraph checkpointer.put(config, checkpoint, metadata, new_versions) at super-step end captures CheckpointCaptureActivity writing checkpoint_id and channel_values.
      ja: checkpointer.put が CheckpointCaptureActivity として super-step checkpoint を捕獲する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      lifecycle_activity_id: checkpoint-capture-t7-s12
      lifecycle_operation: capture
      checkpoint_ref: cp-12
      session_ref: t-7
      started_at: 2026-07-16T10:00:12.000Z
      ended_at: 2026-07-16T10:00:12.055Z
      outcome: succeeded
    related_node_ids:
      - CheckpointCaptureActivity
      - Checkpoint
      - StateSnapshot
      - CheckpointLifecycleActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-checkpoint-capture-activity-design
  - id: CheckpointCaptureActivity-example-boundary-manual-001
    labels:
      zh: 手动 JSON 快照非 CaptureActivity
      en: Manual JSON snapshot not CaptureActivity
      ja: 手動 JSON スナップショットは CaptureActivity ではない
    descriptions:
      zh: 开发者手动 json.dump(state) 到 /tmp/snap.json 无 checkpointer.put metadata/new_versions，不是 CheckpointCaptureActivity。
      en: Developer manual json.dump(state) to /tmp/snap.json without checkpointer.put metadata/new_versions is not CheckpointCaptureActivity.
      ja: 手動 json.dump は CheckpointCaptureActivity ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointCaptureActivity
      - RestoreActivity
      - CheckpointLifecycleActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-checkpoint-capture-activity-design
  - id: CheckpointCaptureActivity-example-3
    labels:
      zh: Capture 与 StateSnapshot 边界
      en: Capture versus StateSnapshot boundary
      ja: Capture と StateSnapshot 境界
    descriptions:
      zh: CheckpointCaptureActivity 是写 checkpoint 的 Activity；StateSnapshot 是 get_state 读视图；capture 写、snapshot 读。
      en: CheckpointCaptureActivity is Activity writing checkpoint; StateSnapshot is get_state read view; capture writes, snapshot reads.
      ja: Capture は書込 Activity、Snapshot は読取 view である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointCaptureActivity
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-capture-activity-vendor
      - claim-checkpoint-capture-activity-design
  - id: CheckpointCaptureActivity-example-4
    labels:
      zh: super-step checkpoint 捕获实例
      en: super-step checkpoint capture instance
      ja: super-step checkpoint キャプチャ事例
    descriptions:
      zh: CheckpointCaptureActivity activity_id=cp-capture-31、checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336、thread_id=thread-1、captured_at=2026-01-15T10:00:01Z。
      en: CheckpointCaptureActivity activity_id=cp-capture-31, checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336, thread_id=thread-1, captured_at=2026-01-15T10:00:01Z.
      ja: cp-capture-31 が super-step checkpoint を捕獲する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointCaptureActivity
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-capture-activity-vendor
      - claim-checkpoint-capture-activity-design
parent_relation:
  id: CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 CheckpointCaptureActivity 都是 CheckpointLifecycleActivity，其种差是在确定执行位置读取当前可恢复状态并创建新的检查点记录。
    en: Every CheckpointCaptureActivity is a CheckpointLifecycleActivity distinguished by reading current recoverable state at a determined execution position and creating a new checkpoint record.
    ja: すべての CheckpointCaptureActivity は CheckpointLifecycleActivity で、確定した実行位置の回復可能状態を読み新 Checkpoint を作る点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不规定实例基数。
    en: Taxonomic inheritance does not impose instance cardinality.
    ja: 分類継承は instance 基数を規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有检查点捕获特化类
      en: has checkpoint capture specialization
      ja: checkpoint capture 特殊化を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-checkpoint-capture-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CheckpointCaptureActivity-captures-StateSnapshot
    predicate: captures
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: captures
      en: captures
      ja: captures
    definitions:
      zh: CheckpointCaptureActivity 通过 captures 指向它在确定执行位置读取并冻结为一致视图的 StateSnapshot。
      en: CheckpointCaptureActivity captures the StateSnapshot it reads and freezes as a consistent view at a determined execution position.
      ja: CheckpointCaptureActivity は確定実行位置で読み、一貫 view として固定した StateSnapshot を captures します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_captures
      labels:
        zh: 反向 captures
        en: inverse captures
        ja: 逆 captures
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-capture-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StateSnapshot
  - id: CheckpointCaptureActivity-produces-Checkpoint
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
      ja: produces
    definitions:
      zh: CheckpointCaptureActivity 通过 produces 指向该次捕获新创建的 Checkpoint 记录；产物具有新的稳定检查点身份。
      en: CheckpointCaptureActivity produces the newly identified Checkpoint record created by that capture, and the output has a new stable checkpoint identity.
      ja: CheckpointCaptureActivity は当該 capture が新規作成した Checkpoint record を produces し、output は新しい安定 checkpoint identity を持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_produces
      labels:
        zh: 反向 produces
        en: inverse produces
        ja: 逆 produces
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-capture-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Checkpoint
