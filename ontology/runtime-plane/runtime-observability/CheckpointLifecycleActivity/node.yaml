schema: moonweave.ai/ontology-node/v1
id: CheckpointLifecycleActivity
kind: concept
labels:
  zh: 检查点生命周期活动
  en: checkpoint lifecycle activity
  ja: チェックポイント・ライフサイクル活動
semantics:
  short_definition:
    zh: 围绕持久化状态边界进行捕获、恢复或回放的运行活动。
    en: A runtime activity that captures, restores, or replays a durable state boundary.
    ja: 永続状態境界を取得・復元・再生する実行活動です。
  definition:
    zh: 检查点生命周期活动是管理可恢复状态边界的活动总类；其成员捕获检查点、从检查点恢复状态或从保存边界回放执行，检查点记录本身不属于该活动类。
    en: Checkpoint lifecycle activity is the activity genus for managing a recoverable state boundary; its members capture a checkpoint, restore state from one, or replay execution from a saved boundary, while the Checkpoint record itself remains information.
    ja: チェックポイント・ライフサイクル活動は回復可能な状態境界を管理する活動の上位概念で、取得・復元・保存境界からの再生を含み、Checkpoint 記録自体は情報のままです。
  why_needed:
    zh: 该总类把捕获、恢复与回放放进同一真实活动谱系，同时保留三者在输入、输出和是否重新执行上的差异。
    en: This genus places capture, restore, and replay in one genuine activity lineage while preserving their different inputs, outputs, and re-execution behavior.
    ja: この上位概念は取得・復元・再生を一つの活動系譜に置きつつ、入力・出力・再実行有無の差を保ちます。
  includes:
    - zh: 包含以可验证检查点或状态快照为边界的捕获、恢复和回放活动。
      en: Includes capture, restore, and replay activities bounded by a verifiable checkpoint or state snapshot.
      ja: 検証可能な checkpoint または state snapshot を境界とする取得・復元・再生活動を含みます。
  excludes:
    - zh: 不包含 Checkpoint、StateSnapshot、StateDiff 等信息记录，也不包含普通的无持久化重试。
      en: Excludes Checkpoint, StateSnapshot, and StateDiff information records and ordinary retries without persisted state.
      ja: Checkpoint、StateSnapshot、StateDiff の情報記録と、永続状態を用いない通常の再試行を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成 CheckpointLifecycleActivity 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating CheckpointLifecycleActivity, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: CheckpointLifecycleActivity 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to CheckpointLifecycleActivity.
      format: |-
        # Example CheckpointLifecycleActivity ingest
        { "checkpoint-lifecycle-activity_ref": "example-1" }
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
  typical_output:
    - description: Moonweave-local CheckpointLifecycleActivity projection.
      format: '{ "schema_owner": "moonweave-local-design", "checkpoint-lifecycle-activity_id": "example-1" }'
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys:
    - lifecycle_activity_id
  fields:
    - id: lifecycle_activity_id
      labels:
        zh: 生命周期活动标识
        en: lifecycle activity ID
        ja: ライフサイクル活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次检查点捕获、恢复或回放活动。
        en: Stably identifies one checkpoint capture, restore, or replay activity.
        ja: 一つのチェックポイント取得、復元、再生活動を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: checkpoint-capture-t7-s8
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: lifecycle_operation
      labels:
        zh: 生命周期操作
        en: lifecycle operation
        ja: ライフサイクル操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分捕获、恢复与回放三类不可互换的状态生命周期活动。
        en: Distinguishes the non-interchangeable capture, restore, and replay operations.
        ja: 交換不能な状態ライフサイクル活動である取得、復元、再生を区別します。
      allowed_values:
        - id: checkpoint-operation-capture
          value: capture
          labels:
            zh: 捕获
            en: capture
            ja: 取得
          definitions:
            zh: 表示捕获操作。
            en: Identifies the capture operation.
            ja: 取得操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
        - id: checkpoint-operation-restore
          value: restore
          labels:
            zh: 恢复
            en: restore
            ja: 復元
          definitions:
            zh: 表示恢复操作。
            en: Identifies the restore operation.
            ja: 復元操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
        - id: checkpoint-operation-replay
          value: replay
          labels:
            zh: 回放
            en: replay
            ja: 再生
          definitions:
            zh: 表示回放操作。
            en: Identifies the replay operation.
            ja: 再生操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
      pattern: null
      example_value: capture
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: checkpoint_ref
      labels:
        zh: 检查点引用
        en: checkpoint reference
        ja: チェックポイント参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本活动创建、读取或作为回放起点的具体检查点。
        en: References the concrete checkpoint created, read, or used as the replay origin.
        ja: この活動が作成、読取、再生起点として使う具体的チェックポイントを参照します。
      allowed_values: []
      pattern: null
      example_value: cp-8
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: session_ref
      labels:
        zh: 会话引用
        en: session reference
        ja: セッション参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用检查点所属且活动作用于其状态的运行会话或线程。
        en: References the runtime session or thread whose checkpointed state the activity acts upon.
        ja: チェックポイント状態の所有元であり活動対象となる実行セッションまたはスレッドを参照します。
      allowed_values: []
      pattern: null
      example_value: t-7
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录状态生命周期活动实际开始的时间。
        en: Records when the state-lifecycle activity actually began.
        ja: 状態ライフサイクル活動が実際に開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:08Z
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动完成、失败或取消的时间。
        en: Records when the activity completed, failed, or was cancelled.
        ja: 活動が完了、失敗、取消となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:08.040Z
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
    - id: outcome
      labels:
        zh: 活动结局
        en: activity outcome
        ja: 活動結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动成功、失败或取消的受控结局。
        en: Records the controlled succeeded, failed, or cancelled outcome.
        ja: 活動の成功、失敗、取消という制御済み結果を記録します。
      allowed_values:
        - id: checkpoint-outcome-succeeded
          value: succeeded
          labels:
            zh: 成功
            en: succeeded
            ja: 成功
          definitions:
            zh: 表示成功操作。
            en: Identifies the succeeded operation.
            ja: 成功操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
        - id: checkpoint-outcome-failed
          value: failed
          labels:
            zh: 失败
            en: failed
            ja: 失敗
          definitions:
            zh: 表示失败操作。
            en: Identifies the failed operation.
            ja: 失敗操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
        - id: checkpoint-outcome-cancelled
          value: cancelled
          labels:
            zh: 取消
            en: cancelled
            ja: 取消
          definitions:
            zh: 表示取消操作。
            en: Identifies the cancelled operation.
            ja: 取消操作を示します。
          source_claims:
            - claim-checkpoint-lifecycle-activity-design
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
  constraints:
    - id: checkpoint-lifecycle-operation-interval-and-subtype-coherence
      severity: error
      expression_language: plain
      expression: lifecycle_operation must match the most specific activity subtype; ended_at must not precede started_at; checkpoint_ref and session_ref must resolve within the same durable execution lineage
      explanations:
        zh: 操作必须与最具体下位类型一致，结束不得早于开始，检查点与会话必须属于同一持久执行谱系。
        en: The operation matches the most specific subtype, end does not precede start, and checkpoint and session belong to one durable lineage.
        ja: 操作は最具体下位型と一致し、終了は開始より前にならず、チェックポイントとセッションは同一の永続実行系譜に属します。
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
  required_relation_constraints:
    - id: checkpoint-lifecycle-manages-state-record
      direction: outgoing
      predicate: manages
      target_concept_id: StateRecord
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每次检查点生命周期活动必须管理至少一条可恢复状态记录。
        en: Every checkpoint lifecycle activity manages at least one recoverable state record.
        ja: 各チェックポイントライフサイクル活動は少なくとも一つの復元可能状態記録を管理します。
      source_claims:
        - claim-checkpoint-lifecycle-activity-design
examples:
  - id: CheckpointLifecycleActivity-example-positive-manual-001
    labels:
      zh: LangGraph CheckpointSaver 生命周期
      en: LangGraph CheckpointSaver lifecycle
      ja: LangGraph CheckpointSaver ライフサイクル
    descriptions:
      zh: LangGraph CheckpointSaver 对 thread_id=thread-1 执行 put/get 周期：CheckpointCaptureActivity 写 checkpoint，RestoreActivity 读 get_state 恢复。
      en: "LangGraph CheckpointSaver put/get cycle on thread_id=thread-1: CheckpointCaptureActivity writes checkpoint, RestoreActivity reads get_state restore."
      ja: CheckpointSaver put/get 周期が CheckpointLifecycleActivity である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      lifecycle_activity_id: checkpoint-capture-t7-s8
      lifecycle_operation: capture
      checkpoint_ref: cp-8
      session_ref: t-7
      started_at: 2026-07-16T10:00:08.000Z
      ended_at: 2026-07-16T10:00:08.040Z
      outcome: succeeded
    related_node_ids:
      - CheckpointLifecycleActivity
      - CheckpointCaptureActivity
      - RestoreActivity
      - ReplayActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
      - RestoreActivity-is_a-CheckpointLifecycleActivity
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-checkpoint-lifecycle-activity-design
  - id: CheckpointLifecycleActivity-example-boundary-manual-001
    labels:
      zh: S3 backup 非 CheckpointLifecycleActivity
      en: S3 backup not CheckpointLifecycleActivity
      ja: S3 backup は CheckpointLifecycleActivity ではない
    descriptions:
      zh: AWS S3 备份 LangGraph DB 是运维备份 Activity，不是 CheckpointSaver put/get 生命周期 Activity。
      en: AWS S3 backup of LangGraph DB is ops backup Activity, not CheckpointSaver put/get lifecycle Activity.
      ja: S3 DB 备份は CheckpointLifecycleActivity ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointLifecycleActivity
      - RetryActivity
      - ReplayActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-checkpoint-lifecycle-activity-design
  - id: CheckpointLifecycleActivity-example-3
    labels:
      zh: Capture 与 Restore Activity 边界
      en: Capture versus Restore Activity boundary
      ja: Capture と Restore Activity 境界
    descriptions:
      zh: CheckpointLifecycleActivity 分组 capture/restore/replay；CheckpointCaptureActivity 与 RestoreActivity 是子 Activity 类型，不可合并为单一 span。
      en: CheckpointLifecycleActivity groups capture/restore/replay; CheckpointCaptureActivity and RestoreActivity are child Activity types, not merged into single span.
      ja: Capture/Restore は子 Activity として分離する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointLifecycleActivity
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-lifecycle-activity-vendor
      - claim-checkpoint-lifecycle-activity-design
  - id: CheckpointLifecycleActivity-example-4
    labels:
      zh: PostgresSaver put/get 周期
      en: PostgresSaver put get cycle
      ja: PostgresSaver put/get 周期
    descriptions:
      zh: PostgresSaver 在 super-step 边界：CheckpointCaptureActivity activity_id=cp-life-31 put checkpoint_id=1f070a87...；随后 RestoreActivity get_state。
      en: "PostgresSaver at super-step boundary: CheckpointCaptureActivity activity_id=cp-life-31 put checkpoint_id=1f070a87...; then RestoreActivity get_state."
      ja: PostgresSaver super-step 境界で capture/restore 周期を記録する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - CheckpointLifecycleActivity
    related_relation_ids: []
    source_claims:
      - claim-checkpoint-lifecycle-activity-vendor
      - claim-checkpoint-lifecycle-activity-design
parent_relation: null
relations:
  - id: CheckpointLifecycleActivity-manages-StateRecord
    predicate: manages
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 管理状态记录
      en: manages state record
      ja: 状態記録を管理する
    definitions:
      zh: CheckpointLifecycleActivity-manages-StateRecord 表示检查点捕获、恢复或回放活动在其有效区间内创建、读取、验证或转换一条可恢复 StateRecord，并由具体下位关系说明动作。无持久状态输入或输出的普通重试不满足该关系。
      en: CheckpointLifecycleActivity-manages-StateRecord states that a checkpoint capture, restore, or replay activity creates, reads, validates, or transforms a recoverable StateRecord during its valid interval, with subtype-specific relations identifying the action. An ordinary retry with no persisted state input or output does not qualify.
      ja: CheckpointLifecycleActivity-manages-StateRecord は、checkpoint capture・restore・replay 活動が有効期間中に回復可能 StateRecord を作成・読取・検証・変換し、下位具体関係で操作を示すことを表します。永続状態入出力のない通常 retry は含みません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次活动可管理检查点、快照与差分等多条记录；具体数量由活动类型和恢复策略决定。
      en: One activity may manage checkpoints, snapshots, and diffs; concrete counts depend on activity type and recovery policy.
      ja: 一活動が checkpoint・snapshot・diff 等複数 record を管理し得て、具体数は活動型と recovery policy が決めます。
    inverse_reading:
      predicate: managed_by_checkpoint_lifecycle_activity
      labels:
        zh: 由检查点生命周期活动管理
        en: managed by checkpoint lifecycle activity
        ja: チェックポイント活動により管理される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-checkpoint-lifecycle-activity-design
    distinct_fact_rationale:
      zh: RestoreActivity-consumes-Checkpoint 等具体边描述一种动作；manages 是捕获、恢复和回放共同的上位职责桥，不替代具体输入输出关系。
      en: Specific edges such as RestoreActivity-consumes-Checkpoint describe one action; manages is the shared responsibility bridge across capture, restore, and replay and does not replace concrete input/output relations.
      ja: RestoreActivity-consumes-Checkpoint 等は具体操作、manages は capture・restore・replay 共通責務 bridge で、具体入出力関係を置換しません。
    layout_role: cross-link
    target: concept:StateRecord
