schema: moonweave.ai/ontology-node/v1
id: CheckpointLifecycleActivity
kind: concept
status: accepted
labels:
  zh: 检查点生命周期活动
  en: checkpoint lifecycle activity
  ja: チェックポイント・ライフサイクル活動
semantics:
  short_definition:
    zh: 围绕持久化状态边界进行捕获、恢复或回放的运行活动。
    en: A runtime activity that captures, restores, or replays a durable state boundary.
    ja: 永続状態境界を取得・復元・再生する実行活動です。
  definition:
    zh: 检查点生命周期活动是管理可恢复状态边界的活动总类；其成员捕获检查点、从检查点恢复状态或从保存边界回放执行，检查点记录本身不属于该活动类。
    en: Checkpoint lifecycle activity is the activity genus for managing a recoverable state boundary; its members capture a checkpoint, restore state from one, or replay execution from a saved boundary, while the Checkpoint record itself remains information.
    ja: チェックポイント・ライフサイクル活動は回復可能な状態境界を管理する活動の上位概念で、取得・復元・保存境界からの再生を含み、Checkpoint 記録自体は情報のままです。
  why_needed:
    zh: 该总类把捕获、恢复与回放放进同一真实活动谱系，同时保留三者在输入、输出和是否重新执行上的差异。
    en: This genus places capture, restore, and replay in one genuine activity lineage while preserving their different inputs, outputs, and re-execution behavior.
    ja: この上位概念は取得・復元・再生を一つの活動系譜に置きつつ、入力・出力・再実行有無の差を保ちます。
  includes:
    - zh: 包含以可验证检查点或状态快照为边界的捕获、恢复和回放活动。
      en: Includes capture, restore, and replay activities bounded by a verifiable checkpoint or state snapshot.
      ja: 検証可能な checkpoint または state snapshot を境界とする取得・復元・再生活動を含みます。
  excludes:
    - zh: 不包含 Checkpoint、StateSnapshot、StateDiff 等信息记录，也不包含普通的无持久化重试。
      en: Excludes Checkpoint, StateSnapshot, and StateDiff information records and ordinary retries without persisted state.
      ja: Checkpoint、StateSnapshot、StateDiff の情報記録と、永続状態を用いない通常の再試行を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - lifecycle_activity_id
  fields:
    - id: lifecycle_activity_id
      labels:
        zh: 生命周期活动标识
        en: lifecycle activity ID
        ja: ライフサイクル活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次检查点捕获、恢复或回放活动。
        en: Stably identifies one checkpoint capture, restore, or replay activity.
        ja: 一つのチェックポイント取得、復元、再生活動を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: checkpoint-capture-t7-s8
      source_claims:
        - claim-checkpoint-lifecycle-activity-002
    - id: lifecycle_operation
      labels:
        zh: 生命周期操作
        en: lifecycle operation
        ja: ライフサイクル操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分捕获、恢复与回放三类不可互换的状态生命周期活动。
        en: Distinguishes the non-interchangeable capture, restore, and replay operations.
        ja: 交換不能な状態ライフサイクル活動である取得、復元、再生を区別します。
      allowed_values:
        - id: checkpoint-operation-capture
          value: capture
          labels:
            zh: 捕获
            en: capture
            ja: 取得
          definitions:
            zh: 表示捕获操作。
            en: Identifies the capture operation.
            ja: 取得操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-003
        - id: checkpoint-operation-restore
          value: restore
          labels:
            zh: 恢复
            en: restore
            ja: 復元
          definitions:
            zh: 表示恢复操作。
            en: Identifies the restore operation.
            ja: 復元操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-004
        - id: checkpoint-operation-replay
          value: replay
          labels:
            zh: 回放
            en: replay
            ja: 再生
          definitions:
            zh: 表示回放操作。
            en: Identifies the replay operation.
            ja: 再生操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-005
      pattern: null
      example_value: capture
      source_claims:
        - claim-checkpoint-lifecycle-activity-006
    - id: checkpoint_ref
      labels:
        zh: 检查点引用
        en: checkpoint reference
        ja: チェックポイント参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本活动创建、读取或作为回放起点的具体检查点。
        en: References the concrete checkpoint created, read, or used as the replay origin.
        ja: この活動が作成、読取、再生起点として使う具体的チェックポイントを参照します。
      allowed_values: []
      pattern: null
      example_value: cp-8
      source_claims:
        - claim-checkpoint-lifecycle-activity-007
    - id: session_ref
      labels:
        zh: 会话引用
        en: session reference
        ja: セッション参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用检查点所属且活动作用于其状态的运行会话或线程。
        en: References the runtime session or thread whose checkpointed state the activity acts upon.
        ja: チェックポイント状態の所有元であり活動対象となる実行セッションまたはスレッドを参照します。
      allowed_values: []
      pattern: null
      example_value: t-7
      source_claims:
        - claim-checkpoint-lifecycle-activity-008
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录状态生命周期活动实际开始的时间。
        en: Records when the state-lifecycle activity actually began.
        ja: 状態ライフサイクル活動が実際に開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:08Z
      source_claims:
        - claim-checkpoint-lifecycle-activity-009
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动完成、失败或取消的时间。
        en: Records when the activity completed, failed, or was cancelled.
        ja: 活動が完了、失敗、取消となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:08.040Z
      source_claims:
        - claim-checkpoint-lifecycle-activity-010
    - id: outcome
      labels:
        zh: 活动结局
        en: activity outcome
        ja: 活動結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动成功、失败或取消的受控结局。
        en: Records the controlled succeeded, failed, or cancelled outcome.
        ja: 活動の成功、失敗、取消という制御済み結果を記録します。
      allowed_values:
        - id: checkpoint-outcome-succeeded
          value: succeeded
          labels:
            zh: 成功
            en: succeeded
            ja: 成功
          definitions:
            zh: 表示成功操作。
            en: Identifies the succeeded operation.
            ja: 成功操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-011
        - id: checkpoint-outcome-failed
          value: failed
          labels:
            zh: 失败
            en: failed
            ja: 失敗
          definitions:
            zh: 表示失败操作。
            en: Identifies the failed operation.
            ja: 失敗操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-012
        - id: checkpoint-outcome-cancelled
          value: cancelled
          labels:
            zh: 取消
            en: cancelled
            ja: 取消
          definitions:
            zh: 表示取消操作。
            en: Identifies the cancelled operation.
            ja: 取消操作を示します。
          status: accepted
          source_claims:
            - claim-checkpoint-lifecycle-activity-013
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-checkpoint-lifecycle-activity-014
  constraints:
    - id: checkpoint-lifecycle-operation-interval-and-subtype-coherence
      severity: error
      expression_language: plain
      expression: lifecycle_operation must match the most specific activity subtype; ended_at must not precede started_at; checkpoint_ref and session_ref must resolve within the same durable execution lineage
      explanations:
        zh: 操作必须与最具体下位类型一致，结束不得早于开始，检查点与会话必须属于同一持久执行谱系。
        en: The operation matches the most specific subtype, end does not precede start, and checkpoint and session belong to one durable lineage.
        ja: 操作は最具体下位型と一致し、終了は開始より前にならず、チェックポイントとセッションは同一の永続実行系譜に属します。
      source_claims:
        - claim-checkpoint-lifecycle-activity-015
  required_relation_constraints:
    - id: checkpoint-lifecycle-manages-state-record
      direction: outgoing
      predicate: manages
      target_concept_id: StateRecord
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每次检查点生命周期活动必须管理至少一条可恢复状态记录。
        en: Every checkpoint lifecycle activity manages at least one recoverable state record.
        ja: 各チェックポイントライフサイクル活動は少なくとも一つの復元可能状態記録を管理します。
      source_claims:
        - claim-checkpoint-lifecycle-activity-016
examples:
  - id: CheckpointLifecycleActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 检查点生命周期正例
      en: Positive checkpoint lifecycle example
      ja: チェックポイント・ライフサイクルの正例
    scenario_id: null
    descriptions:
      zh: 持久化工作流在线程 t-7 的 super-step 8 形成 checkpoint cp-8；故障后从 cp-8 恢复 values 与 next，调试时又从同一边界重新执行后续节点。捕获、恢复和回放分别拥有活动 ID 与起止时间。
      en: Thread t-7 forms checkpoint cp-8 at super-step 8; after a failure it restores values and next from cp-8, and during debugging it re-executes later nodes from that same boundary. Capture, restore, and replay retain separate activity IDs and time intervals.
      ja: 永続ワークフローは thread t-7 の super-step 8 で checkpoint cp-8 を形成し、障害後に cp-8 から values と next を復元し、デバッグ時には同じ境界から後続 node を再実行します。取得・復元・再生は別々の activity ID と時間区間を保持します。
    field_values:
      lifecycle_activity_id: checkpoint-capture-t7-s8
      lifecycle_operation: capture
      checkpoint_ref: cp-8
      session_ref: t-7
      started_at: 2026-07-16T10:00:08.000Z
      ended_at: 2026-07-16T10:00:08.040Z
      outcome: succeeded
    related_node_ids:
      - CheckpointLifecycleActivity
      - CheckpointCaptureActivity
      - RestoreActivity
      - ReplayActivity
    related_relation_ids:
      - CheckpointCaptureActivity-is_a-CheckpointLifecycleActivity
      - RestoreActivity-is_a-CheckpointLifecycleActivity
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 将三个发生过程分别归为 CheckpointCaptureActivity、RestoreActivity 与 ReplayActivity，并允许沿 CheckpointLifecycleActivity 上位类统一查询。
      en: Classify the three occurrences separately as CheckpointCaptureActivity, RestoreActivity, and ReplayActivity while making all three queryable through CheckpointLifecycleActivity.
      ja: 三つの発生を CheckpointCaptureActivity・RestoreActivity・ReplayActivity に分け、CheckpointLifecycleActivity 上位概念から共通検索できるようにします。
    why_valid_or_invalid:
      zh: 三个过程都围绕同一可恢复状态边界发生，但输入输出不同：捕获创建边界，恢复读取边界重建状态，回放从边界重新执行后续步骤，因此共享上位类而不能合并为一个活动。
      en: "All three occurrences depend on one recoverable state boundary, but their inputs and outputs differ: capture creates the boundary, restore reconstructs state from it, and replay re-executes later steps. They share a genus without becoming one activity."
      ja: 三つはいずれも一つの回復可能状態境界に依存しますが、取得は境界を作成し、復元はそこから状態を再構成し、再生は後続 step を再実行します。同じ上位類を共有しても一つの活動には統合されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-lifecycle-activity-001
  - id: CheckpointLifecycleActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检查点生命周期边界例
      en: Checkpoint lifecycle boundary example
      ja: チェックポイント・ライフサイクルの境界例
    scenario_id: null
    descriptions:
      zh: tool-call-attempt-3 因瞬时网络错误失败后由 RetryPolicy 立即启动 attempt-4；两次尝试之间没有 checkpoint_id、StateSnapshot、线程状态读取、恢复位置或回放起点。
      en: After tool-call-attempt-3 fails with a transient network error, RetryPolicy immediately starts attempt-4; there is no checkpoint ID, StateSnapshot, thread-state read, restore position, or replay starting boundary between the attempts.
      ja: tool-call-attempt-3 が一時的ネットワーク障害で失敗した後、RetryPolicy は直ちに attempt-4 を開始します。両試行の間に checkpoint ID、StateSnapshot、thread state 読取、復元位置、再生開始境界はありません。
    field_values: {}
    related_node_ids:
      - CheckpointLifecycleActivity
      - RetryActivity
      - ReplayActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 保留普通 RetryActivity 或重试尝试类型，不创建 CheckpointLifecycleActivity 实例，也不推断 RestoreActivity 或 ReplayActivity。
      en: Keep the occurrence as an ordinary retry activity or retry attempt; create no CheckpointLifecycleActivity, RestoreActivity, or ReplayActivity instance.
      ja: 通常の RetryActivity または retry attempt として保持し、CheckpointLifecycleActivity・RestoreActivity・ReplayActivity の instance を作成しません。
    why_valid_or_invalid:
      zh: 普通重试只重新发起失败操作；没有被持久化并可重新定位的状态边界，就不满足检查点生命周期活动的必要条件。相同输入或连续 attempt 编号不能替代 checkpoint 证据。
      en: An ordinary retry only reissues failed work. Without a persisted, addressable state boundary it fails the necessary condition for a checkpoint lifecycle activity; shared input or consecutive attempt numbers cannot substitute for checkpoint evidence.
      ja: 通常の retry は失敗作業を再発行するだけです。永続化され再指定可能な状態境界がなければ checkpoint lifecycle activity の必要条件を満たさず、同じ入力や連続 attempt 番号は checkpoint 証拠の代わりになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-checkpoint-lifecycle-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: CheckpointLifecycleActivity-manages-StateRecord
    predicate: manages
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 管理状态记录
      en: manages state record
      ja: 状態記録を管理する
    definitions:
      zh: CheckpointLifecycleActivity-manages-StateRecord 表示检查点捕获、恢复或回放活动在其有效区间内创建、读取、验证或转换一条可恢复 StateRecord，并由具体下位关系说明动作。无持久状态输入或输出的普通重试不满足该关系。
      en: CheckpointLifecycleActivity-manages-StateRecord states that a checkpoint capture, restore, or replay activity creates, reads, validates, or transforms a recoverable StateRecord during its valid interval, with subtype-specific relations identifying the action. An ordinary retry with no persisted state input or output does not qualify.
      ja: CheckpointLifecycleActivity-manages-StateRecord は、checkpoint capture・restore・replay 活動が有効期間中に回復可能 StateRecord を作成・読取・検証・変換し、下位具体関係で操作を示すことを表します。永続状態入出力のない通常 retry は含みません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次活动可管理检查点、快照与差分等多条记录；具体数量由活动类型和恢复策略决定。
      en: One activity may manage checkpoints, snapshots, and diffs; concrete counts depend on activity type and recovery policy.
      ja: 一活動が checkpoint・snapshot・diff 等複数 record を管理し得て、具体数は活動型と recovery policy が決めます。
    inverse_reading:
      predicate: managed_by_checkpoint_lifecycle_activity
      labels:
        zh: 由检查点生命周期活动管理
        en: managed by checkpoint lifecycle activity
        ja: チェックポイント活動により管理される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CheckpointLifecycleActivity-manages-StateRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 恢复活动读取检查点并产生状态差分
          en: Restore reads a checkpoint and produces a state diff
          ja: restore が checkpoint を読み state diff を生成する
        scenario_id: null
        descriptions:
          zh: restore-27 消费 checkpoint-26，验证其 session 与 schema 版本，并产生 state-diff-27 和恢复后的 snapshot-27。
          en: restore-27 consumes checkpoint-26, validates its session and schema version, and produces state-diff-27 and restored snapshot-27.
          ja: restore-27 は checkpoint-26 を消費し session と schema version を検証し、state-diff-27 と復元 snapshot-27 を生成します。
        field_values: {}
        related_node_ids:
          - CheckpointLifecycleActivity
          - RestoreActivity
          - StateRecord
          - Checkpoint
          - StateDiff
          - StateSnapshot
        related_relation_ids:
          - CheckpointLifecycleActivity-manages-StateRecord
          - RestoreActivity-consumes-Checkpoint
          - RestoreActivity-produces-StateDiff
          - RestoreActivity-produces-StateSnapshot
        expected_result:
          zh: 建立通用 manages，并保留消费与产出边描述具体动作。
          en: Assert generic manages while retaining consumes and produces edges for concrete actions.
          ja: 汎用 manages を表明し、具体操作の consumes・produces edge を保持します。
        why_valid_or_invalid:
          zh: 活动确实读取并转换可恢复状态记录，且每个具体产物具有稳定身份。
          en: The activity actually reads and transforms recoverable state records, each with stable identity.
          ja: 活動が回復可能 state record を実際に読取・変換し、各産物が安定 identity を持ちます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-checkpoint-lifecycle-activity-017
      - id: CheckpointLifecycleActivity-manages-StateRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 无持久状态的普通重试
          en: Ordinary retry without persisted state
          ja: 永続状態のない通常 retry
        scenario_id: null
        descriptions:
          zh: retry-28 在网络超时后立即重新发送相同请求，没有读取或写入 Checkpoint、StateSnapshot 或 StateDiff。
          en: retry-28 immediately resends the same request after a network timeout and reads or writes no Checkpoint, StateSnapshot, or StateDiff.
          ja: retry-28 は network timeout 後に同じ request を再送するだけで、Checkpoint・StateSnapshot・StateDiff を読み書きしません。
        field_values: {}
        related_node_ids:
          - CheckpointLifecycleActivity
          - RetryActivity
          - StateRecord
        related_relation_ids:
          - CheckpointLifecycleActivity-manages-StateRecord
        expected_result:
          zh: 不得把重试归为检查点生命周期活动，也不得建立 manages。
          en: Do not classify the retry as a checkpoint lifecycle activity or assert manages.
          ja: retry を checkpoint lifecycle activity に分類せず manages も表明しません。
        why_valid_or_invalid:
          zh: 重复执行不等于管理持久状态；必须有可识别状态记录和实际读写或转换。
          en: Repeated execution is not persisted-state management; an identifiable state record and actual read, write, or transformation are required.
          ja: 反復実行は永続 state 管理ではなく、識別可能 state record と実際の読取・書込・変換が必要です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-checkpoint-lifecycle-activity-018
    source_claims:
      - claim-checkpoint-lifecycle-activity-019
    distinct_fact_rationale:
      zh: RestoreActivity-consumes-Checkpoint 等具体边描述一种动作；manages 是捕获、恢复和回放共同的上位职责桥，不替代具体输入输出关系。
      en: Specific edges such as RestoreActivity-consumes-Checkpoint describe one action; manages is the shared responsibility bridge across capture, restore, and replay and does not replace concrete input/output relations.
      ja: RestoreActivity-consumes-Checkpoint 等は具体操作、manages は capture・restore・replay 共通責務 bridge で、具体入出力関係を置換しません。
    layout_role: cross-link
    review_status: accepted
    target: concept:StateRecord
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenTelemetry、W3C Trace Context 与 LangGraph checkpoint/replay 逐项核验，TraceSpan 与 Checkpoint 语义成立。
    en: Verified against OpenTelemetry, W3C Trace Context, and LangGraph checkpoint/replay. TraceSpan and Checkpoint semantics hold.
    ja: OpenTelemetry、W3C Trace Context、LangGraph checkpoint/replay に照らし TraceSpan と Checkpoint semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-checkpoint-lifecycle-activity-001
