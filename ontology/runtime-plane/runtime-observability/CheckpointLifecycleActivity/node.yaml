schema: moonweave.ai/ontology-node/v1
id: CheckpointLifecycleActivity
kind: concept
status: accepted
labels: {zh: 检查点生命周期活动, en: Checkpoint lifecycle activity, ja: チェックポイントライフサイクルアクティビティ}
semantics:
  short_definition: {zh: 一个有界 PROV-O Activity，用于捕获、恢复或重放与检查点关联的持久运行时状态。, en: "A bounded PROV-O Activity that captures, restores, or replays durable runtime state associated with a checkpoint.", ja: チェックポイントに関連する永続ランタイム状態を取得、復元、または再生する有界の PROV-O Activity。}
  definition: {zh: CheckpointLifecycleActivity 是对 Checkpoint 或可恢复状态记录执行的工作：它捕获状态、将状态恢复到运行时，或从状态重放执行。它不是 Checkpoint Entity、当前 RuntimeSession、OpenTelemetry Span，或仅提及检查点的通用日志记录。, en: "A CheckpointLifecycleActivity is work performed on a Checkpoint or recoverable state record: it captures state, restores it into a runtime, or replays execution from it. It is not the Checkpoint Entity, the current RuntimeSession, an OpenTelemetry Span, or a generic log record that merely mentions a checkpoint.", ja: CheckpointLifecycleActivity は Checkpoint または回復可能な状態記録に対して行う作業であり、状態を取得し、ランタイムへ復元し、またはそこから実行を再生する。Checkpoint Entity、現在の RuntimeSession、OpenTelemetry Span、あるいは単にチェックポイントに言及する一般的なログ記録ではない。}
  why_needed: {zh: 恢复正确性取决于将状态管理工作与其产生或消耗的持久状态分开归因，也与观察该工作的遥测分开归因。, en: Recovery correctness depends on attributing state-management work separately from the durable state it produces or consumes and separately from telemetry that observes that work., ja: 復旧の正しさは、状態管理作業を、それが生成または消費する永続状態、およびその作業を観測するテレメトリーから別々に帰属させることに依存する。}
  includes:
    - {zh: 具有开始/结束证据、检查点引用和结果状态的捕获、恢复和重放操作。, en: "Capture, restore, and replay operations with start/end evidence, checkpoint references, and result status.", ja: 開始/終了証拠、チェックポイント参照、結果状態を伴う取得、復元、再生操作。}
    - {zh: 可以使用或生成状态记录并触发后续运行时执行的活动。, en: Activities that may use or generate state records and trigger later runtime execution., ja: 状態記録を使用または生成し、後続のランタイム実行をトリガーし得る Activity。}
  excludes:
    - {zh: 检查点字节、状态快照、会话生命周期事件以及 OTel span 或 span event。, en: "Checkpoint bytes, state snapshots, session lifecycle events, and OTel spans or span events.", ja: チェックポイントバイト、状態スナップショット、セッションライフサイクルイベント、OTel Span または Span Event。}
    - {zh: 静态重试策略或仅对检查点 ID 的引用。, en: A static retry policy or a mere reference to a checkpoint ID., ja: 静的な再試行ポリシー、またはチェックポイント ID への単なる参照。}
  semantic_kind: activity
  aliases: [checkpoint operation, state recovery activity]
engineering:
  explanation: {zh: 运行时调用状态后端以持久化或加载检查点。该操作记录其输入、输出、时间和结果；持久 Checkpoint 仍是 Entity，而任何 OTel span 都是通过 ID 关联的独立仪器记录。, en: "A runtime invokes a state backend to persist or load a checkpoint. The operation records its inputs, outputs, timing, and outcome; the durable Checkpoint remains an Entity, while any OTel span is a separate instrumentation record correlated by IDs.", ja: ランタイムは状態バックエンドを呼び出してチェックポイントを永続化または読み込む。操作は入力、出力、時刻、結果を記録し、永続的な Checkpoint は Entity のままであり、OTel Span は ID で相関される別個の計装記録である。}
  typical_input:
    - description: {zh: 状态生命周期请求, en: State lifecycle request, ja: 状態ライフサイクル要求}
      format: |-
        {"activity_id":"checkpoint-op-31","operation_kind":"capture","session_id":"session-73","state_version":"18"}
  typical_output:
    - description: {zh: 已完成的状态生命周期活动, en: Completed state lifecycle activity, ja: 完了した状態ライフサイクルアクティビティ}
      format: |-
        {"activity_id":"checkpoint-op-31","operation_kind":"capture","checkpoint_id":"checkpoint-4","outcome":"succeeded"}
  reference_implementations:
    - {name: PROV-O Activity, url: https://www.w3.org/TR/prov-o/, description: "Defines time-bounded work that uses or generates Entities."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Documents checkpointers persisting thread graph state as checkpoints."}
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 检查点活动 ID, en: Checkpoint activity ID, ja: チェックポイントアクティビティ ID}
      definitions: {zh: 一次状态管理操作的稳定标识符。, en: Stable identifier of one state-management operation., ja: 1 回の状態管理操作の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: checkpoint-op-31
      source_claims: [claim-checkpoint-lifecycle-activity]
    - id: operation_kind
      labels: {zh: 操作类型, en: Operation kind, ja: 操作種別}
      definitions: {zh: 此 Activity 执行的检查点生命周期操作。, en: The checkpoint lifecycle action performed by this Activity., ja: この Activity が実行するチェックポイントライフサイクル操作。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [capture, restore, replay]
      example_value: capture
      source_claims: [claim-checkpoint-lifecycle-activity]
    - id: outcome
      labels: {zh: 操作结果, en: Operation outcome, ja: 操作結果}
      definitions: {zh: 有界状态管理操作的最终结果。, en: Final outcome of the bounded state-management operation., ja: 有界な状態管理操作の最終結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, cancelled]
      example_value: succeeded
      source_claims: [claim-checkpoint-lifecycle-activity]
  constraints:
    - id: checkpoint-lifecycle-activity-bounded-work
      severity: error
      language: plain
      expression: Each activity must name one operation kind, a start/end or terminal outcome, and checkpoint evidence appropriate to that operation.
      explanation: {zh: 状态管理工作必须与状态 Entity 及其遥测信息区分开来。, en: State management work must be distinguishable from the state Entity and from telemetry about it., ja: 状態管理作業は状態 Entity およびそのテレメトリーから区別可能でなければならない。}
      source_claims: [claim-checkpoint-lifecycle-activity]
  required_relations: []
examples:
  - id: checkpoint-lifecycle-activity-positive
    labels: {zh: "LangGraph CheckpointSaver 生命周期", en: "LangGraph CheckpointSaver lifecycle", ja: "LangGraph CheckpointSaver ライフサイクル"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointLifecycleActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; CheckpointLifecycleActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; CheckpointLifecycleActivity TraceSpan/Record."}
    field_values: {activity_id: checkpoint-op-31, operation_kind: capture, outcome: succeeded}
    related_node_ids: [CheckpointLifecycleActivity, Checkpoint]
    related_relation_ids: []
    source_claims: [claim-checkpoint-lifecycle-activity]
  - id: checkpoint-lifecycle-activity-counterexample
    labels: {zh: "S3 backup 非 CheckpointLifecycleActivity", en: "S3 backup not CheckpointLifecycleActivity", ja: "S3 backup は CheckpointLifecycleActivity ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style CheckpointLifecycleActivity TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style CheckpointLifecycleActivity TraceRecord.", ja: "Missing trace rejects Langfuse-style CheckpointLifecycleActivity."}
    field_values: {checkpoint_id: checkpoint-4}
    related_node_ids: [Checkpoint]
    related_relation_ids: []
    source_claims: [claim-checkpoint-lifecycle-activity]
  - id: checkpoint-lifecycle-activity-boundary
    labels: {zh: "Capture 与 Restore Activity 边界", en: "Capture versus Restore Activity boundary", ja: "Capture と Restore Activity 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; CheckpointLifecycleActivity must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; CheckpointLifecycleActivity must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {activity_id: checkpoint-op-31}
    related_node_ids: [CheckpointLifecycleActivity, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-checkpoint-lifecycle-activity]
  - id: checkpoint-lifecycle-activity-instance-31
    labels: {zh: "PostgresSaver put/get 周期", en: "PostgresSaver put get cycle", ja: "PostgresSaver put/get 周期"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->CheckpointLifecycleActivity ObservabilityEvent.", en: "Phoenix instance: drift+quality->CheckpointLifecycleActivity ObservabilityEvent.", ja: "Phoenix instance maps to CheckpointLifecycleActivity Event."}
    field_values: {activity_id: checkpoint-op-31, operation_kind: capture, outcome: succeeded}
    related_node_ids: [CheckpointLifecycleActivity, Checkpoint, RuntimeSession, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-checkpoint-lifecycle-activity]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Activity as time-bounded work that uses and generates Entities.
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents checkpointers persisting thread graph state as checkpoints for continuation and recovery.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines an OTel Span as a tracing operation record, supporting the explicit distinction from runtime recovery Activity.
source_claims:
  - id: claim-checkpoint-lifecycle-activity
    source: prov-o-core
    supports: PROV-O defines an Activity as something that occurs over time and acts upon or with Entities, making checkpoint operations distinct from checkpoint state Entities.
    locator: Section 3.2, prov:Activity
    evidence_kind: standard
    confidence: high

