schema: moonweave.ai/ontology-node/v1
id: ReplayActivity
kind: concept
status: accepted
labels: {zh: 重放活动, en: Replay activity, ja: 再生アクティビティ}
semantics:
  short_definition: {zh: 在先前检查点之后重新执行合格运行时工作的 CheckpointLifecycleActivity。, en: "A CheckpointLifecycleActivity that re-executes eligible runtime work after a prior checkpoint.", ja: 先行チェックポイント後に適格なランタイム作業を再実行する CheckpointLifecycleActivity。}
  definition: {zh: ReplayActivity 是从记录的检查点状态继续并再次执行下游步骤以复现或探索先前执行路径的有界操作。它不是缓存读取、TraceRecord 回放、仅加载状态的 RestoreActivity，也不是没有检查点重放证据的通用重试。, en: "A ReplayActivity is the bounded operation that resumes from recorded checkpoint state and executes downstream steps again to reproduce or explore a prior execution path. It is not a cache read, a TraceRecord playback, a RestoreActivity that merely loads state, or a generic retry without checkpoint-based replay evidence.", ja: ReplayActivity は、記録済みチェックポイント状態から再開し、先行実行パスを再現または探索するため下流ステップを再度実行する有界操作である。キャッシュ読み取り、TraceRecord の再生、状態を読み込むだけの RestoreActivity、チェックポイント再生証拠のない一般的な再試行ではない。}
  why_needed: {zh: 调试、恢复和时间旅行需要明确证据表明下游工作已被重新执行且可能分叉，而非假定只是取得先前输出。, en: "Debugging, recovery, and time-travel behavior need explicit evidence that downstream work was re-executed and may diverge, rather than assuming a prior output was merely fetched.", ja: デバッグ、復旧、タイムトラベルには、先行出力を取得しただけと仮定せず、下流作業が再実行され結果が分岐し得ることを示す明示的な証拠が必要である。}
  includes:
    - {zh: 源检查点、重放目标执行谱系、选定下游范围和观测到的分叉或终止结果。, en: "Source checkpoint, replay target execution lineage, selected downstream scope, and observed divergence or terminal outcome.", ja: ソースチェックポイント、再生対象実行系譜、選択した下流範囲、観測された分岐または終端結果。}
    - {zh: 检查点恢复后对合格模型调用、工具或图节点的重新执行。, en: "Re-execution of eligible model calls, tools, or graph nodes after checkpoint restoration.", ja: チェックポイント復元後の適格なモデル呼び出し、ツール、グラフノードの再実行。}
  excludes:
    - {zh: 查看历史追踪、读取缓存结果字节，以及恢复状态后不运行任何工作的情况。, en: "Viewing a historical trace, reading cached result bytes, and restoring state without running anything afterward.", ja: 履歴トレースの閲覧、キャッシュ結果バイトの読み取り、復元後に何も実行しない状態復元。}
    - {zh: 描述过去工作但不引发新工作的 OTel 追踪导出。, en: "An OTel trace export that describes past work without causing new work.", ja: 新しい作業を引き起こさず過去の作業を記述する OTel トレースエクスポート。}
  semantic_kind: activity
  aliases: [time-travel replay, checkpoint replay]
engineering:
  explanation: {zh: 运行时选择先前检查点、恢复其状态边界，再次调用合格下游工作。它记录原始执行谱系、重放范围、得到的执行尝试和任何结果差异；检查点之前的先前工作不被视为已重新执行。, en: "The runtime selects a prior checkpoint, restores its state boundary, then invokes eligible downstream work again. It records the original execution lineage, replay scope, resulting execution attempt, and any outcome difference; prior work before the checkpoint is not treated as re-executed.", ja: ランタイムは先行チェックポイントを選択して状態境界を復元し、適格な下流作業を再度呼び出す。元の実行系譜、再生範囲、結果の実行試行、結果差異を記録し、チェックポイント前の作業は再実行されたものとして扱わない。}
  typical_input:
    - description: {zh: 重放请求, en: Replay request, ja: 再生要求}
      format: |-
        {"activity_id":"replay-op-45","checkpoint_id":"checkpoint-4","source_execution_id":"exec-842","scope":"steps-after-checkpoint"}
  typical_output:
    - description: {zh: 重放活动结果, en: Replay activity result, ja: 再生アクティビティ結果}
      format: |-
        {"activity_id":"replay-op-45","replayed_execution_id":"exec-842","new_attempt_id":"run-19","outcome":"succeeded","diverged":false}
  reference_implementations:
    - {name: LangGraph time travel, url: https://docs.langchain.com/oss/python/langgraph/use-time-travel, description: Documents replay from a prior checkpoint and re-execution of downstream nodes.}
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 重放活动 ID, en: Replay activity ID, ja: 再生アクティビティ ID}
      definitions: {zh: 一次基于检查点的重放操作的稳定标识符。, en: Stable identifier for one checkpoint-based replay operation., ja: 1回のチェックポイントベース再生操作の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: replay-op-45
      source_claims: [claim-checkpoint-replay]
    - id: operation_kind
      labels: {zh: 操作类型, en: Operation kind, ja: 操作種別}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承并固定为重放的生命周期操作类型。, en: Checkpoint lifecycle operation inherited from CheckpointLifecycleActivity and fixed to replay., ja: CheckpointLifecycleActivity から継承し replay に固定されるライフサイクル操作。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [replay]
      example_value: replay
      source_claims: [claim-checkpoint-replay]
    - id: outcome
      labels: {zh: 操作结果, en: Operation outcome, ja: 操作結果}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承的重放操作终态。, en: Final replay outcome inherited from CheckpointLifecycleActivity., ja: CheckpointLifecycleActivity から継承する再生操作の最終結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, cancelled]
      example_value: succeeded
      source_claims: [claim-checkpoint-replay]
    - id: replay_scope
      labels: {zh: 重放范围, en: Replay scope, ja: 再生範囲}
      definitions: {zh: 选定检查点后可重新执行的已声明工作部分。, en: Declared portion of work eligible for re-execution after the selected checkpoint., ja: 選択したチェックポイント後に再実行可能と宣言された作業部分。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [steps_after_checkpoint, selected_branch]
      example_value: steps_after_checkpoint
      source_claims: [claim-checkpoint-replay]
    - id: diverged
      labels: {zh: 是否分叉, en: Diverged, ja: 分岐したか}
      definitions: {zh: 重放工作是否产生了与记录谱系有实质不同的结果。, en: Whether replayed work produced an outcome materially different from the recorded lineage., ja: 再生作業が記録済み系譜と実質的に異なる結果を生んだか。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: false
      source_claims: [claim-checkpoint-replay]
  constraints:
    - id: replay-activity-reexecution-proof
      severity: error
      language: plain
      expression: A replay must use a prior Checkpoint and record evidence that downstream work was invoked again; reading cached output or historical telemetry alone is not replay.
      explanation: {zh: 重放语义要求状态边界后的新执行，且可能产生不同结果。, en: Replay semantics require new execution after a state boundary and may yield different results., ja: 再生意味には状態境界後の新しい実行が必要で、異なる結果を生じ得る。}
      source_claims: [claim-checkpoint-replay]
  required_relations: [ReplayActivity-specializes-CheckpointLifecycleActivity, ReplayActivity-uses-Checkpoint, ReplayActivity-replays-Execution]
examples:
  - id: replay-activity-positive
    labels: {zh: "LangGraph time-travel replay Activity", en: "LangGraph time-travel replay Activity", ja: "LangGraph time-travel replay Activity"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ReplayActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; ReplayActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; ReplayActivity TraceSpan/Record."}
    field_values: {activity_id: replay-op-45, operation_kind: replay, outcome: succeeded, replay_scope: steps_after_checkpoint, diverged: false}
    related_node_ids: [ReplayActivity, Checkpoint, Execution, RunAttempt]
    related_relation_ids: [ReplayActivity-uses-Checkpoint, ReplayActivity-replays-Execution]
    source_claims: [claim-checkpoint-replay]
  - id: replay-activity-counterexample
    labels: {zh: "单元测试 mock 非 ReplayActivity", en: "Unit test mock not ReplayActivity", ja: "ユニットテスト mock は ReplayActivity ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style ReplayActivity TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style ReplayActivity TraceRecord.", ja: "Missing trace rejects Langfuse-style ReplayActivity."}
    field_values: {trace_id: trace-900}
    related_node_ids: [TraceRecord]
    related_relation_ids: []
    source_claims: [claim-checkpoint-replay]
  - id: replay-activity-boundary
    labels: {zh: "Replay 与 Restore 边界", en: "Replay versus Restore boundary", ja: "Replay と Restore 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; ReplayActivity must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; ReplayActivity must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {activity_id: replay-op-45}
    related_node_ids: [ReplayActivity, RetryActivity, Checkpoint]
    related_relation_ids: []
    source_claims: [claim-checkpoint-replay]
  - id: replay-activity-instance-45
    labels: {zh: "历史 checkpoint replay 实例", en: "Historical checkpoint replay instance", ja: "履歴 checkpoint replay 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->ReplayActivity ObservabilityEvent.", en: "Phoenix instance: drift+quality->ReplayActivity ObservabilityEvent.", ja: "Phoenix instance maps to ReplayActivity Event."}
    field_values: {activity_id: replay-op-45, operation_kind: replay, outcome: succeeded, replay_scope: steps_after_checkpoint, diverged: false}
    related_node_ids: [ReplayActivity, Checkpoint, Execution, RunAttempt, TraceRecord]
    related_relation_ids: [ReplayActivity-uses-Checkpoint, ReplayActivity-replays-Execution]
    source_claims: [claim-checkpoint-replay]
parent_relation:
  id: ReplayActivity-specializes-CheckpointLifecycleActivity
  predicate: is_a
  target: concept:CheckpointLifecycleActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是重放活动, en: is a replay activity, ja: 再生アクティビティである}
  definitions: {zh: 每个 ReplayActivity 都是在先前检查点后重新执行工作的 CheckpointLifecycleActivity。, en: Every ReplayActivity is a CheckpointLifecycleActivity that re-executes work after a prior checkpoint., ja: すべての ReplayActivity は先行チェックポイント後に作業を再実行する CheckpointLifecycleActivity である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_replay_activity, labels: {zh: 具有重放活动, en: has replay activity, ja: 再生アクティビティを持つ}}
  conditions:
    - id: replay-activity-parent-condition
      severity: error
      expression: Require operation_kind replay, a prior checkpoint, and downstream execution invocation evidence.
      explanations: {zh: 缓存命中或追踪查看器不能满足重放语义。, en: A cache hit or trace viewer cannot satisfy replay semantics., ja: キャッシュヒットやトレースビューアは再生意味を満たせない。}
      source_claims: [claim-checkpoint-replay]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-checkpoint-replay]
relations:
  - id: ReplayActivity-uses-Checkpoint
    predicate: uses
    target: concept:Checkpoint
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 使用检查点, en: uses checkpoint, ja: チェックポイントを使用する}
    definitions: {zh: ReplayActivity 将 Checkpoint 作为合格下游工作恢复的状态边界使用。, en: ReplayActivity uses Checkpoint as the state boundary from which eligible downstream work resumes., ja: ReplayActivity は適格な下流作業を再開する状態境界として Checkpoint を使用する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_used_by, labels: {zh: 由重放活动使用, en: was used by replay activity, ja: 再生アクティビティに使用された}}
    conditions:
      - id: replay-checkpoint-use-condition
        severity: error
        expression: Require a resolved prior checkpoint and replay scope before asserting checkpoint use.
        explanations: {zh: 通用状态引用不能显示重放边界。, en: A generic state reference does not show a replay boundary., ja: 一般的な状態参照は再生境界を示さない。}
        source_claims: [claim-checkpoint-replay]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-checkpoint-replay]
  - id: ReplayActivity-replays-Execution
    predicate: replays
    target: concept:Execution
    direction: source-to-target
    relation_kind: derivation
    labels: {zh: 重放执行谱系, en: replays execution lineage, ja: 実行系譜を再生する}
    definitions: {zh: ReplayActivity 从选定检查点调用先前执行谱系的合格下游工作时重放该 Execution。, en: ReplayActivity replays Execution when it invokes the eligible downstream work of that prior execution lineage from a selected checkpoint., ja: ReplayActivity は選択チェックポイントから先行実行系譜の適格下流作業を呼び出すとき、その Execution を再生する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_replayed_by, labels: {zh: 由活动重放, en: was replayed by activity, ja: アクティビティにより再生された}}
    conditions:
      - id: replay-execution-lineage-condition
        severity: error
        expression: Record the original execution ID and a new attempt or execution ID; do not assert replay when no downstream work was invoked.
        explanations: {zh: 即使输出匹配，重放也创建新的活动谱系。, en: Replay creates a new activity lineage even when outputs match., ja: 出力が一致しても再生は新しい Activity 系譜を作成する。}
        source_claims: [claim-checkpoint-replay]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-checkpoint-replay]
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Activities and provenance use relationships for state inputs and work lineage.
  - id: langgraph-time-travel
    title: "LangGraph time travel"
    url: https://docs.langchain.com/oss/python/langgraph/use-time-travel
    source_type: documentation
    relevance: Documents replaying from prior checkpoints and re-executing downstream nodes.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines trace and span telemetry records separately from runtime re-execution semantics.
source_claims:
  - id: claim-checkpoint-replay
    source: langgraph-time-travel
    supports: LangGraph replay resumes from a prior checkpoint and re-executes downstream nodes; it is not merely reading cached results and can produce different results.
    locator: Overview and Replay
    evidence_kind: documentation
    confidence: high

