schema: moonweave.ai/ontology-node/v1
id: ReplayActivity
kind: concept
status: review
labels:
  zh: 回放活动
  en: Replay activity
  ja: 再生活動
semantics:
  short_definition:
    zh: 从检查点按历史输入重新执行后续步骤的活动。
    en: Re-execution of post-checkpoint steps with recorded inputs.
    ja: チェックポイント後の手順を記録済み入力で再実行する活動。
  definition:
    zh: 回放活动是一种检查点生命周期活动：它以已保存检查点为起点，按照历史输入和执行顺序重新运行后续步骤，用于复现既有路径或从某一步形成一条可比较的新分支。它要求重新执行；仅把状态装载回内存属于恢复活动。
    en: A replay activity is a checkpoint lifecycle activity that starts from a saved checkpoint and re-executes subsequent steps with recorded inputs and ordering to reproduce an earlier path or create a comparable branch. Re-execution is essential; loading saved state without running later steps is restoration.
    ja: 再生活動はチェックポイント・ライフサイクル活動の一種であり、保存済みチェックポイントを起点に、記録された入力と順序で後続ステップを再実行して、以前の経路を再現するか比較可能な分岐を作ります。後続処理を実行せず状態だけを読み戻すのは復元活動です。
  why_needed:
    zh: 需要单独记录回放，才能回答某次调试或时间旅行运行究竟复用了哪个检查点、重演了哪些步骤，以及新结果与原路径从何处开始分歧；这些问题不能由一次状态恢复记录回答。
    en: Replay must be recorded separately to identify the checkpoint reused by a debugging or time-travel run, the steps actually re-executed, and the point at which a new result diverged from the original path. A restoration record alone cannot answer those questions.
    ja: デバッグまたはタイムトラベル実行が再利用したチェックポイント、実際に再実行した手順、新結果が元経路から分岐した地点を特定するため、再生を独立して記録します。復元記録だけではこれらを説明できません。
  includes:
    - zh: 包括确定起始检查点，并以历史输入或审计记录中的输入重新运行一个或多个后续步骤的调试回放、故障复现和时间旅行分支。
      en: Includes debugging replays, incident reproductions, and time-travel branches that identify a starting checkpoint and rerun one or more subsequent steps with recorded inputs.
      ja: 開始チェックポイントを特定し、記録済み入力で一つ以上の後続ステップを再実行するデバッグ再生、障害再現、タイムトラベル分岐を含みます。
  excludes:
    - zh: 不包括仅装载检查点状态而不执行后续步骤的恢复，也不包括创建新检查点的捕获活动。
      en: Excludes restoration that only loads checkpointed state without executing later steps, and capture activities that create a new checkpoint.
      ja: 後続ステップを実行せず状態だけを読み戻す復元、および新しいチェックポイントを作る取得活動は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReplayActivity-example-positive-001
    kind: positive
    labels:
      zh: 从检查点重执行并比较分歧
      en: Re-execute from a checkpoint and compare divergence
      ja: チェックポイントから再実行して差異を比較
    scenario_id: null
    descriptions:
      zh: 调查工具故障时，系统载入 cp-17，按记录顺序重新提供后续输入并执行原节点；它把新跨度与原追踪逐步比较，在第三个工具调用处定位到首次分歧。
      en: While investigating a tool failure, the system loads cp-17, supplies subsequent inputs in the recorded order, and executes the original nodes. It compares new spans with the original trace and locates the first divergence at the third tool call.
      ja: ツール障害調査でcp-17を読み、記録順に後続入力を与えて元ノードを再実行する。新しいスパンを元トレースと逐次比較し、3回目のツール呼出しで最初の差異を特定する。
    field_values:
      lifecycle_activity_id: replay-activity-cp17
      lifecycle_operation: replay
      checkpoint_ref: cp-17
      session_ref: investigation-session-17
      started_at: 2026-07-16T11:08:04.000Z
      ended_at: 2026-07-16T11:08:09.420Z
      outcome: succeeded
    related_node_ids:
      - ReplayActivity
      - Checkpoint
      - TraceRecord
      - CheckpointLifecycleActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
      - ReplayActivity-uses-Checkpoint
      - ReplayActivity-uses-TraceRecord
    expected_result:
      zh: 该过程被识别为重放活动，并产出可与原路径比较的新执行证据。
      en: The process is classified as ReplayActivity and produces new execution evidence comparable to the original path.
      ja: この過程はReplayActivityに分類され、元経路と比較可能な新しい実行証拠を生む。
    why_valid_or_invalid:
      zh: 它不只读取旧状态，还用记录输入重新执行后续步骤；重执行是重放身份的决定条件。
      en: "It does more than read saved state: it re-executes later steps with recorded inputs, which is the decisive condition for replay."
      ja: 保存状態を読むだけでなく、記録入力で後続手順を再実行する。この再実行がリプレイの決定条件である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-replay-activity-001
  - id: ReplayActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 仅加载状态属于恢复而非重放
      en: Loading state alone is restore, not replay
      ja: 状態読込みだけならリプレイではなく復元
    scenario_id: null
    descriptions:
      zh: 恢复器读取 cp-17、校验摘要并把会话状态设回保存值，然后停止；没有再次执行任何后续节点，也没有产生可与原路径比较的新跨度。
      en: A restorer reads cp-17, validates the digest, reinstates the saved session values, and stops. It executes no later node and produces no new spans to compare with the original path.
      ja: 復元器がcp-17を読み、ダイジェストを検証してセッション値を保存状態へ戻し、終了する。後続ノードを再実行せず、元経路と比較する新スパンも生まない。
    field_values: {}
    related_node_ids:
      - ReplayActivity
      - RestoreActivity
      - Checkpoint
      - CheckpointLifecycleActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 该过程归入恢复活动，不得因为使用同一检查点就标记为重放活动。
      en: The process is classified as RestoreActivity and must not be labeled ReplayActivity merely because it uses the same checkpoint.
      ja: 同じチェックポイントを使うだけでReplayActivityとはせず、RestoreActivityに分類する。
    why_valid_or_invalid:
      zh: 恢复重建保存状态；重放必须从该状态继续执行并形成新的可比较路径。
      en: Restore reinstates saved state; replay must continue execution from that state and create a new comparable path.
      ja: 復元は保存状態を再構成し、リプレイはそこから実行を続けて比較可能な新経路を作る必要がある。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-replay-activity-001
external_mappings: []
applicability:
