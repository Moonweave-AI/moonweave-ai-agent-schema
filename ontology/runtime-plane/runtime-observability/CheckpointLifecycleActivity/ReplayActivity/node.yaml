schema: moonweave.ai/ontology-node/v1
id: ReplayActivity
kind: concept
labels:
  zh: 回放活动
  en: Replay activity
  ja: 再生活動
semantics:
  short_definition:
    zh: 从检查点按历史输入重新执行后续步骤的活动。
    en: Re-execution of post-checkpoint steps with recorded inputs.
    ja: チェックポイント後の手順を記録済み入力で再実行する活動。
  definition:
    zh: 回放活动是一种检查点生命周期活动：它以已保存检查点为起点，按照历史输入和执行顺序重新运行后续步骤，用于复现既有路径或从某一步形成一条可比较的新分支。它要求重新执行；仅把状态装载回内存属于恢复活动。
    en: A replay activity is a checkpoint lifecycle activity that starts from a saved checkpoint and re-executes subsequent steps with recorded inputs and ordering to reproduce an earlier path or create a comparable branch. Re-execution is essential; loading saved state without running later steps is restoration.
    ja: 再生活動はチェックポイント・ライフサイクル活動の一種であり、保存済みチェックポイントを起点に、記録された入力と順序で後続ステップを再実行して、以前の経路を再現するか比較可能な分岐を作ります。後続処理を実行せず状態だけを読み戻すのは復元活動です。
  why_needed:
    zh: 需要单独记录回放，才能回答某次调试或时间旅行运行究竟复用了哪个检查点、重演了哪些步骤，以及新结果与原路径从何处开始分歧；这些问题不能由一次状态恢复记录回答。
    en: Replay must be recorded separately to identify the checkpoint reused by a debugging or time-travel run, the steps actually re-executed, and the point at which a new result diverged from the original path. A restoration record alone cannot answer those questions.
    ja: デバッグまたはタイムトラベル実行が再利用したチェックポイント、実際に再実行した手順、新結果が元経路から分岐した地点を特定するため、再生を独立して記録します。復元記録だけではこれらを説明できません。
  includes:
    - zh: 包括确定起始检查点，并以历史输入或审计记录中的输入重新运行一个或多个后续步骤的调试回放、故障复现和时间旅行分支。
      en: Includes debugging replays, incident reproductions, and time-travel branches that identify a starting checkpoint and rerun one or more subsequent steps with recorded inputs.
      ja: 開始チェックポイントを特定し、記録済み入力で一つ以上の後続ステップを再実行するデバッグ再生、障害再現、タイムトラベル分岐を含みます。
  excludes:
    - zh: 不包括仅装载检查点状态而不执行后续步骤的恢复，也不包括创建新检查点的捕获活动。
      en: Excludes restoration that only loads checkpointed state without executing later steps, and capture activities that create a new checkpoint.
      ja: 後続ステップを実行せず状態だけを読み戻す復元、および新しいチェックポイントを作る取得活動は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成 ReplayActivity 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ReplayActivity, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ReplayActivity 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ReplayActivity.
      format: |-
        # Example ReplayActivity ingest
        { "replay-activity_ref": "example-1" }
      source_claims:
        - claim-replay-activity-design
  typical_output:
    - description: Moonweave-local ReplayActivity projection.
      format: '{ "schema_owner": "moonweave-local-design", "replay-activity_id": "example-1" }'
      source_claims:
        - claim-replay-activity-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReplayActivity-example-positive-001
    labels:
      zh: LangGraph time-travel replay Activity
      en: LangGraph time-travel replay Activity
      ja: LangGraph time-travel replay Activity
    descriptions:
      zh: LangGraph graph.invoke(None, config={"configurable":{"thread_id":"thread-1","checkpoint_id":"1f070a87..."}}) time-travel ReplayActivity 重放历史 super-step 而非继续 forward。
      en: LangGraph graph.invoke(None, config={"configurable":{"thread_id":"thread-1","checkpoint_id":"1f070a87..."}}) time-travel ReplayActivity re-enacts historical super-step rather than continuing forward.
      ja: time-travel invoke が ReplayActivity として歴史 super-step を再演する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      lifecycle_activity_id: replay-activity-cp17
      lifecycle_operation: replay
      checkpoint_ref: cp-17
      session_ref: investigation-session-17
      started_at: 2026-07-16T11:08:04.000Z
      ended_at: 2026-07-16T11:08:09.420Z
      outcome: succeeded
    related_node_ids:
      - ReplayActivity
      - Checkpoint
      - TraceRecord
      - CheckpointLifecycleActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
      - ReplayActivity-uses-Checkpoint
      - ReplayActivity-uses-TraceRecord
    source_claims:
      - claim-replay-activity-design
  - id: ReplayActivity-example-boundary-001
    labels:
      zh: 单元测试 mock 非 ReplayActivity
      en: Unit test mock not ReplayActivity
      ja: ユニットテスト mock は ReplayActivity ではない
    descriptions:
      zh: pytest mock graph.invoke 无 checkpoint_id/thread 生产证据，不是 ReplayActivity。
      en: pytest mock graph.invoke without checkpoint_id/thread production evidence is not ReplayActivity.
      ja: pytest mock は ReplayActivity ではない。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayActivity
      - RestoreActivity
      - Checkpoint
      - CheckpointLifecycleActivity
    related_relation_ids:
      - ReplayActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-replay-activity-design
  - id: ReplayActivity-example-3
    labels:
      zh: Replay 与 Restore 边界
      en: Replay versus Restore boundary
      ja: Replay と Restore 境界
    descriptions:
      zh: ReplayActivity 重放历史；RestoreActivity 从 checkpoint 继续 forward；replay 用 checkpoint_id 定位历史点。
      en: ReplayActivity re-enacts history; RestoreActivity continues forward from checkpoint; replay uses checkpoint_id to locate historical point.
      ja: Replay は再演、Restore は forward 継続である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayActivity
    related_relation_ids: []
    source_claims:
      - claim-replay-activity-vendor
      - claim-replay-activity-design
  - id: ReplayActivity-example-4
    labels:
      zh: 历史 checkpoint replay 实例
      en: Historical checkpoint replay instance
      ja: 履歴 checkpoint replay 事例
    descriptions:
      zh: ReplayActivity activity_id=replay-45、checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336、thread_id=thread-1、replayed_at=2026-01-15T11:05:00Z。
      en: ReplayActivity activity_id=replay-45, checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336, thread_id=thread-1, replayed_at=2026-01-15T11:05:00Z.
      ja: replay-45 が履歴 checkpoint を replay する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - ReplayActivity
    related_relation_ids: []
    source_claims:
      - claim-replay-activity-vendor
      - claim-replay-activity-design
parent_relation:
  id: ReplayActivity-is_a-CheckpointLifecycleActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 ReplayActivity 都是 CheckpointLifecycleActivity，其种差是从保存的检查点边界按既定输入重新执行后续步骤。
    en: Every ReplayActivity is a CheckpointLifecycleActivity distinguished by re-executing post-checkpoint steps from a saved boundary with selected recorded inputs.
    ja: すべての ReplayActivity は CheckpointLifecycleActivity で、保存境界から選択された記録入力で後続 step を再実行する点が種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不规定实例基数。
    en: Taxonomic inheritance does not impose instance cardinality.
    ja: 分類継承は instance 基数を規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有回放特化类
      en: has replay specialization
      ja: replay 特殊化を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-replay-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ReplayActivity-uses-Checkpoint
    predicate: uses
    direction: source-to-target
    relation_kind: information
    labels:
      zh: uses
      en: uses
      ja: uses
    definitions:
      zh: ReplayActivity 通过 uses 指向限定回放起点的 Checkpoint；该检查点决定哪些旧步骤跳过、哪些后续步骤重新执行。
      en: ReplayActivity uses the Checkpoint that bounds its starting point, determining which prior steps are skipped and which subsequent steps are re-executed.
      ja: ReplayActivity は開始点を限定する Checkpoint を uses し、旧 step の skip 範囲と後続 step の再実行範囲を決めます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_uses
      labels:
        zh: 反向 uses
        en: inverse uses
        ja: 逆 uses
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-replay-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Checkpoint
  - id: ReplayActivity-uses-TraceRecord
    predicate: uses
    direction: source-to-target
    relation_kind: information
    labels:
      zh: uses
      en: uses
      ja: uses
    definitions:
      zh: ReplayActivity 通过 uses 指向用于重建既有操作、输入与时间顺序的 TraceRecord；检查点限定状态起点，追踪记录提供执行证据。
      en: ReplayActivity uses the TraceRecord employed to reconstruct prior operations, inputs, and ordering; the checkpoint bounds state while the trace supplies execution evidence.
      ja: ReplayActivity は既存操作・入力・順序を再構成する TraceRecord を uses し、Checkpoint が状態起点、trace が実行 evidence を提供します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_uses
      labels:
        zh: 反向 uses
        en: inverse uses
        ja: 逆 uses
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-replay-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceRecord
