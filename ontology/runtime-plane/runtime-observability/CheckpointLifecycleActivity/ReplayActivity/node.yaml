sibling_differentiation:
  - sibling_concept_id: RestoreActivity
    shared_parent_concept_id: CheckpointLifecycleActivity
    differentia:
      zh: 共享真实父节点 CheckpointLifecycleActivity 的对照：ReplayActivity 是由 ReplayActivity-is_a-CheckpointLifecycleActivity 分类的检查点生命周期活动，其区分条件是从已保存检查点开始，按记录的输入与顺序重新执行后续步骤；RestoreActivity 由 RestoreActivity-is_a-CheckpointLifecycleActivity 分类，其区分条件是恢复已保存状态、位置与运行上下文，并在该状态可继续运行时结束。重放包含后续重新执行，恢复本身不包含；任一条件成立不推出另一端。
      en: "Contrast under the real shared parent CheckpointLifecycleActivity: ReplayActivity is classified by ReplayActivity-is_a-CheckpointLifecycleActivity and starts from a saved checkpoint to re-execute subsequent steps with recorded inputs and ordering; RestoreActivity is classified by RestoreActivity-is_a-CheckpointLifecycleActivity and reinstates saved state, position, and runtime context, ending when that state is resumable. Replay includes subsequent re-execution, while restore itself does not; either condition leaves the other unproven."
      ja: 実在する共通親 CheckpointLifecycleActivity の下での対照：ReplayActivity は ReplayActivity-is_a-CheckpointLifecycleActivity で分類され、保存済みチェックポイントから記録された入力と順序で後続手順を再実行します。RestoreActivity は RestoreActivity-is_a-CheckpointLifecycleActivity で分類され、保存状態・位置・実行コンテキストを復元し、その状態が再開可能になった時点で終了します。リプレイは後続再実行を含み、復元自体は含みません。一方の条件は他方を証明しません。
    source_claims:
      - claim-replay-activity-001
