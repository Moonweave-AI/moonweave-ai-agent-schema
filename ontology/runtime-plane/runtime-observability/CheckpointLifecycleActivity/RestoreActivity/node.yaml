schema: moonweave.ai/ontology-node/v1
id: RestoreActivity
kind: concept
status: accepted
labels: {zh: 状态恢复活动, en: State restore activity, ja: 状態復元アクティビティ}
semantics:
  short_definition: {zh: 读取持久 Checkpoint 并将记录状态具体化为可恢复运行时上下文的 CheckpointLifecycleActivity。, en: "A CheckpointLifecycleActivity that reads a durable Checkpoint and materializes its recorded state into a recoverable runtime context.", ja: 永続 Checkpoint を読み取り、記録済み状態を回復可能なランタイムコンテキストに具体化する CheckpointLifecycleActivity。}
  definition: {zh: RestoreActivity 是验证并将一个检查点状态加载到会话、图或执行上下文以便继续的有界工作。它不是 Checkpoint Entity、SessionResumeEvent、重新执行后续节点的 ReplayActivity，也不是仅度量恢复时长的 OTel Span。, en: "A RestoreActivity is bounded work that verifies and loads one checkpointed state into a session, graph, or execution context for continuation. It is not the Checkpoint Entity, a SessionResumeEvent, a ReplayActivity that re-executes later nodes, or an OTel Span that only measures restore duration.", ja: RestoreActivity は、継続のために1つのチェックポイント状態を検証し、セッション、グラフ、または実行コンテキストへ読み込む有界作業である。Checkpoint Entity、SessionResumeEvent、後続ノードを再実行する ReplayActivity、復元時間だけを測る OTel Span ではない。}
  why_needed: {zh: 恢复必须记录消耗了哪个持久状态、完整性检查是否通过，以及继续前运行时上下文是否实际具体化。, en: "Recovery must record which durable state was consumed, whether integrity checks passed, and whether runtime context was actually materialized before continuation proceeds.", ja: 復旧では、どの永続状態を消費したか、完全性検査が通ったか、継続前にランタイムコンテキストが実際に具体化されたかを記録しなければならない。}
  includes:
    - {zh: 检查点选择、完整性验证、具体化目标、恢复时间和终止结果。, en: "Checkpoint selection, integrity verification, materialization target, restore time, and terminal outcome.", ja: チェックポイント選択、完全性検証、具体化対象、復元時刻、終端結果。}
    - {zh: 故障恢复、迁移、中断或操作人员指示恢复后所需的状态加载工作。, en: "State load work required after fault recovery, migration, interruption, or operator-directed restoration.", ja: 障害復旧、移行、中断、運用者指示の復元後に必要な状態読み込み作業。}
  excludes:
    - {zh: 编辑检查点、生成新的捕获，或不加载状态而报告生命周期转换。, en: "Editing a checkpoint, generating a fresh capture, or reporting a lifecycle transition without loading state.", ja: チェックポイントの編集、新しい取得の生成、状態を読み込まずにライフサイクル遷移を報告すること。}
    - {zh: 宣告恢复但缺少状态消耗证据的 OTel Log Record 或 Span Event。, en: "An OTel Log Record or Span Event that announces restoration but lacks state-consumption evidence.", ja: 復元を通知するが状態消費の証拠を欠く OTel Log Record または Span Event。}
  semantic_kind: activity
  aliases: [checkpoint restore, state recovery]
engineering:
  explanation: {zh: 运行时解析检查点标识符、验证兼容性和完整性、将状态加载到新的或现有上下文并报告终止结果。只有生命周期管理器选择重新激活会话后才可能出现 SessionResumeEvent。, en: "The runtime resolves a checkpoint identifier, verifies its compatibility and integrity, loads the state into a new or existing context, and reports a terminal outcome. A SessionResumeEvent can follow only after the lifecycle manager chooses to reactivate the session.", ja: ランタイムはチェックポイント識別子を解決し、互換性と完全性を検証して、新規または既存コンテキストへ状態を読み込み、終端結果を報告する。SessionResumeEvent はライフサイクル管理者がセッションの再アクティブ化を選んだ後にのみ続き得る。}
  typical_input:
    - description: {zh: 恢复请求, en: Restore request, ja: 復元要求}
      format: |-
        {"activity_id":"restore-op-44","checkpoint_id":"checkpoint-4","target_session_id":"session-73","requested_by":"recovery-controller"}
  typical_output:
    - description: {zh: 恢复活动结果, en: Restore activity result, ja: 復元アクティビティ結果}
      format: |-
        {"activity_id":"restore-op-44","checkpoint_id":"checkpoint-4","integrity_verified":true,"outcome":"succeeded"}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents persisted thread state used for interruption recovery and continuation.}
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 恢复活动 ID, en: Restore activity ID, ja: 復元アクティビティ ID}
      definitions: {zh: 一次检查点恢复操作的稳定 ID。, en: Stable ID for one checkpoint restoration operation., ja: 1回のチェックポイント復元操作の安定 ID。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: restore-op-44
      source_claims: [claim-checkpoint-restore]
    - id: operation_kind
      labels: {zh: 操作类型, en: Operation kind, ja: 操作種別}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承并固定为恢复的生命周期操作类型。, en: Checkpoint lifecycle operation inherited from CheckpointLifecycleActivity and fixed to restore., ja: CheckpointLifecycleActivity から継承し restore に固定されるライフサイクル操作。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [restore]
      example_value: restore
      source_claims: [claim-checkpoint-restore]
    - id: outcome
      labels: {zh: 操作结果, en: Operation outcome, ja: 操作結果}
      definitions: {zh: 从 CheckpointLifecycleActivity 继承的恢复操作终态。, en: Final restore outcome inherited from CheckpointLifecycleActivity., ja: CheckpointLifecycleActivity から継承する復元操作の最終結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, cancelled]
      example_value: succeeded
      source_claims: [claim-checkpoint-restore]
    - id: checkpoint_id
      labels: {zh: 源检查点 ID, en: Source checkpoint ID, ja: ソースチェックポイント ID}
      definitions: {zh: 恢复所消耗的持久 Checkpoint 标识符。, en: Identifier of the durable Checkpoint consumed by restoration., ja: 復元が消費する永続 Checkpoint の識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: checkpoint-4
      source_claims: [claim-checkpoint-restore]
    - id: integrity_verified
      labels: {zh: 已验证完整性, en: Integrity verified, ja: 完全性検証済み}
      definitions: {zh: 选定检查点在使用前是否通过要求的兼容性和完整性检查。, en: Whether the selected checkpoint passed required compatibility and integrity checks before use., ja: 選択したチェックポイントが使用前に必要な互換性および完全性検査を通過したか。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: true
      source_claims: [claim-checkpoint-restore]
  constraints:
    - id: restore-activity-checkpoint-proof
      severity: error
      language: plain
      expression: A successful restore must use exactly one compatible Checkpoint with verified integrity and identify its materialization target; it must not claim success solely from a resume notification.
      explanation: {zh: 生命周期消息无法证明恢复状态确已加载。, en: Lifecycle messaging cannot prove that recovery state was actually loaded., ja: ライフサイクルメッセージは復旧状態が実際に読み込まれたことを証明できない。}
      source_claims: [claim-checkpoint-restore]
  required_relations: [RestoreActivity-specializes-CheckpointLifecycleActivity, RestoreActivity-uses-Checkpoint]
examples:
  - id: restore-activity-positive
    labels: {zh: "LangGraph graph.get_state 恢复", en: "LangGraph graph.get_state restore", ja: "LangGraph graph.get_state 復元"}
    descriptions: {zh: "OpenTelemetry TracerProvider->Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; RestoreActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", en: "OpenTelemetry Tracer->Span; tracer.start_span('llm.call', attributes={model:gpt-4,tokens:1500}); SpanKind CLIENT/SERVER/INTERNAL; RestoreActivity maps TraceSpan/TraceRecord/ObservabilityEvent.", ja: "OTel Tracer->Span llm.call; RestoreActivity TraceSpan/Record."}
    field_values: {activity_id: restore-op-44, operation_kind: restore, outcome: succeeded, checkpoint_id: checkpoint-4, integrity_verified: true}
    related_node_ids: [RestoreActivity, Checkpoint, RuntimeSession]
    related_relation_ids: [RestoreActivity-uses-Checkpoint]
    source_claims: [claim-checkpoint-restore]
  - id: restore-activity-counterexample
    labels: {zh: "OpenAI Thread 加载非 RestoreActivity", en: "OpenAI Thread load not RestoreActivity", ja: "OpenAI Thread 読込は RestoreActivity ではない"}
    descriptions: {zh: "Generation without trace container cannot serve as Langfuse-style RestoreActivity TraceRecord.", en: "Generation without trace container cannot serve as Langfuse-style RestoreActivity TraceRecord.", ja: "Missing trace rejects Langfuse-style RestoreActivity."}
    field_values: {event_id: session-event-93}
    related_node_ids: [SessionResumeEvent]
    related_relation_ids: []
    source_claims: [claim-checkpoint-restore]
  - id: restore-activity-boundary
    labels: {zh: "Restore 与 Replay 边界", en: "Restore versus Replay boundary", ja: "Restore と Replay 境界"}
    descriptions: {zh: "run.outputs is trace preview not PROV Entity; RestoreActivity must not treat run JSON as Artifact digest.", en: "run.outputs is trace preview not PROV Entity; RestoreActivity must not treat run JSON as Artifact digest.", ja: "run.outputs not Artifact."}
    field_values: {activity_id: restore-op-44, checkpoint_id: checkpoint-4}
    related_node_ids: [RestoreActivity, ReplayActivity, Checkpoint]
    related_relation_ids: [RestoreActivity-uses-Checkpoint]
    source_claims: [claim-checkpoint-restore]
  - id: restore-activity-instance-44
    labels: {zh: "interrupt 后 get_state 实例", en: "get_state after interrupt instance", ja: "interrupt 後 get_state 事例"}
    descriptions: {zh: "Phoenix instance: embedding_drift_score=0.18 prompt_quality=0.91->RestoreActivity ObservabilityEvent.", en: "Phoenix instance: drift+quality->RestoreActivity ObservabilityEvent.", ja: "Phoenix instance maps to RestoreActivity Event."}
    field_values: {activity_id: restore-op-44, operation_kind: restore, outcome: succeeded, checkpoint_id: checkpoint-4, integrity_verified: true}
    related_node_ids: [RestoreActivity, Checkpoint, RuntimeSession, SessionResumeEvent, TraceSpan]
    related_relation_ids: [RestoreActivity-uses-Checkpoint]
    source_claims: [claim-checkpoint-restore]
parent_relation:
  id: RestoreActivity-specializes-CheckpointLifecycleActivity
  predicate: is_a
  target: concept:CheckpointLifecycleActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是状态恢复活动, en: is a state restore activity, ja: 状態復元アクティビティである}
  definitions: {zh: 每个 RestoreActivity 都是消耗 Checkpoint 以具体化记录状态的 CheckpointLifecycleActivity。, en: Every RestoreActivity is a CheckpointLifecycleActivity that consumes a Checkpoint to materialize recorded state., ja: すべての RestoreActivity は記録済み状態を具体化するため Checkpoint を消費する CheckpointLifecycleActivity である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_restore_activity, labels: {zh: 具有恢复活动, en: has restore activity, ja: 復元アクティビティを持つ}}
  conditions:
    - id: restore-activity-parent-condition
      severity: error
      expression: Require operation_kind restore, one source checkpoint, and state-materialization evidence.
      explanations: {zh: 仅选择或提及检查点不会恢复运行时状态。, en: Merely selecting or mentioning a checkpoint does not restore runtime state., ja: チェックポイントを選択または言及するだけではランタイム状態を復元しない。}
      source_claims: [claim-checkpoint-restore]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-checkpoint-restore]
relations:
  - id: RestoreActivity-uses-Checkpoint
    predicate: uses
    target: concept:Checkpoint
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 使用检查点, en: uses checkpoint, ja: チェックポイントを使用する}
    definitions: {zh: RestoreActivity 验证并读取该状态记录以具体化时使用 Checkpoint。, en: RestoreActivity uses Checkpoint when it verifies and reads that state record for materialization., ja: RestoreActivity は具体化のためその状態記録を検証して読み込むとき Checkpoint を使用する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_used_by, labels: {zh: 由恢复活动使用, en: was used by restore activity, ja: 復元アクティビティに使用された}}
    conditions:
      - id: restore-checkpoint-use-condition
        severity: error
        expression: Assert use only when the checkpoint ID, integrity result, and restore target are recorded by the activity.
        explanations: {zh: 日志行中的检查点引用不是状态消耗证明。, en: A checkpoint reference in a log line is not proof of state consumption., ja: ログ行のチェックポイント参照は状態消費の証明ではない。}
        source_claims: [claim-checkpoint-restore]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-checkpoint-restore]
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines an Activity using an Entity through provenance relationships.
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents checkpoints for continuing conversations, resuming interruptions, and recovering failures.
  - id: otel-trace-api
    title: "OpenTelemetry Trace API"
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    source_type: standard
    relevance: Defines Span telemetry separately from application state restoration work.
source_claims:
  - id: claim-checkpoint-restore
    source: langgraph-persistence
    supports: LangGraph checkpointers persist thread state for continuation, interruption recovery, time travel, and fault tolerance.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

