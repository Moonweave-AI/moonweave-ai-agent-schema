schema: moonweave.ai/ontology-node/v1
id: RestoreActivity
kind: concept
status: accepted
labels:
  zh: 恢复活动
  en: Restore activity
  ja: 復元活動
semantics:
  short_definition:
    zh: 把已保存检查点重建为可继续运行状态的活动。
    en: Reinstatement of a saved checkpoint as resumable runtime state.
    ja: 保存済みチェックポイントを再開可能な実行状態へ戻す活動。
  definition:
    zh: 恢复活动是一种检查点生命周期活动：它读取一个已保存检查点，并把其中的状态、位置与必要的运行上下文重新装载为可继续执行的当前状态。恢复以重建可运行状态为止；若随后按历史输入重新执行步骤，则后续部分属于回放。
    en: A restore activity is a checkpoint lifecycle activity that reads a saved checkpoint and reinstates its state, position, and required runtime context as the current resumable state. Restoration ends when that state is available; subsequent re-execution with recorded inputs is replay.
    ja: 復元活動はチェックポイント・ライフサイクル活動の一種であり、保存済みチェックポイントを読み、その状態、位置、必要な実行文脈を再開可能な現在状態として戻します。状態が利用可能になった時点で復元は完了し、その後の記録済み入力による再実行は再生です。
  why_needed:
    zh: 恢复记录说明系统在崩溃恢复、暂停后继续或人工介入后继续时采用了哪个已保存状态，并允许核验恢复目标是否与检查点一致；若把它并入回放，就无法区分“只恢复”与“恢复后重演”。
    en: A restore record identifies the saved state used after a crash, pause, or human intervention and supports checking that the reinstated state matches the checkpoint. Keeping it distinct from replay preserves the difference between merely resuming and resuming followed by re-execution.
    ja: 復元記録は、障害、停止、人手介入後に用いた保存状態を特定し、復元状態がチェックポイントと一致するか検証できるようにします。再生と分けることで、単なる再開と再開後の再実行を区別できます。
  includes:
    - zh: 包括从持久化检查点恢复图状态、执行位置、待处理任务和恢复所需上下文，并使运行重新达到可继续状态的操作。
      en: Includes operations that restore graph state, execution position, pending work, and required context from a persisted checkpoint until the run is resumable.
      ja: 永続化チェックポイントからグラフ状態、実行位置、保留作業、必要文脈を戻し、実行を再開可能にする操作を含みます。
  excludes:
    - zh: 不包括恢复后对步骤的重新执行，也不包括把当前状态写成新检查点的捕获活动。
      en: Excludes re-executing steps after restoration and writing the current state as a new checkpoint.
      ja: 復元後のステップ再実行、および現在状態を新しいチェックポイントとして保存する取得活動は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: RestoreActivity-example-positive-001
    kind: positive
    labels:
      zh: 从持久检查点重建当前状态
      en: Reinstate current state from a persisted checkpoint
      ja: 永続チェックポイントから現在状態を復元
    scenario_id: null
    descriptions:
      zh: 进程崩溃后，恢复器读取 cp-42，验证摘要，恢复各通道版本、待处理写入和下一节点，并生成恢复后的 StateSnapshot 及与故障前内存状态的 StateDiff。
      en: After a process crash, the restorer reads cp-42, validates its digest, reinstates channel versions, pending writes, and the next node, then emits a restored StateSnapshot and a StateDiff against the pre-restore in-memory state.
      ja: プロセス障害後、復元器がcp-42を読み、ダイジェストを検証し、チャネル版、保留書込み、次ノードを復元し、復元後StateSnapshotと障害前メモリ状態との差分を生成する。
    field_values:
      lifecycle_activity_id: restore-activity-cp42
      lifecycle_operation: restore
      checkpoint_ref: cp-42
      session_ref: incident-session-42
      started_at: 2026-07-16T10:05:00.000Z
      ended_at: 2026-07-16T10:05:00.080Z
      outcome: succeeded
    related_node_ids:
      - RestoreActivity
      - Checkpoint
      - StateSnapshot
      - StateDiff
      - CheckpointLifecycleActivity
    related_relation_ids:
      - RestoreActivity-is_a-CheckpointLifecycleActivity
      - RestoreActivity-consumes-Checkpoint
      - RestoreActivity-produces-StateSnapshot
      - RestoreActivity-produces-StateDiff
    expected_result:
      zh: 全过程被识别为恢复活动；完成条件是保存状态成为当前可继续状态。
      en: The process is classified as RestoreActivity and completes when the saved state becomes the current resumable state.
      ja: 過程はRestoreActivityに分類され、保存状態が現在の再開可能状態になった時点で完了する。
    why_valid_or_invalid:
      zh: 它读取一个检查点并重建状态、位置和必要运行上下文，具有明确输入、过程和输出。
      en: It reads a checkpoint and reinstates state, position, and required runtime context with explicit input, process, and outputs.
      ja: チェックポイントを読み、状態、位置、必要な実行文脈を明示的な入力・過程・出力として復元する。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-restore-activity-001
  - id: RestoreActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 恢复后继续执行进入重放
      en: Execution after restore crosses into replay
      ja: 復元後の再実行はリプレイへ移る
    scenario_id: null
    descriptions:
      zh: 系统恢复 cp-42 后，又按旧输入执行后续三个节点并与原跨度比较。加载和重建部分是恢复；后续重执行部分必须单独建模为重放活动。
      en: After restoring cp-42, the system executes the next three nodes with recorded inputs and compares their spans with the original run. Loading and reinstatement are restore; subsequent re-execution must be modeled separately as ReplayActivity.
      ja: cp-42を復元後、記録入力で後続3ノードを実行し元スパンと比較する。読込みと再構成は復元であり、その後の再実行は別のReplayActivityとして表す。
    field_values: {}
    related_node_ids:
      - RestoreActivity
      - ReplayActivity
      - Checkpoint
      - CheckpointLifecycleActivity
    related_relation_ids:
      - RestoreActivity-is_a-CheckpointLifecycleActivity
    expected_result:
      zh: 图谱在状态可用时结束 RestoreActivity，并为后续重执行建立 ReplayActivity。
      en: The graph ends RestoreActivity when state is available and opens ReplayActivity for later re-execution.
      ja: 状態が利用可能になった時点でRestoreActivityを終え、後続再実行にReplayActivityを作成する。
    why_valid_or_invalid:
      zh: 恢复的目标是重建保存状态；继续运行并形成新路径属于另一项活动。
      en: Restore aims to reinstate saved state; continuing execution to form a new path is a different activity.
      ja: 復元の目的は保存状態の再構成であり、新しい経路を形成する継続実行は別活動である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-restore-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ReplayActivity
    shared_parent_concept_id: CheckpointLifecycleActivity
    differentia:
      zh: 共享真实父节点 CheckpointLifecycleActivity 的对照：RestoreActivity 是由 RestoreActivity-is_a-CheckpointLifecycleActivity 分类的检查点生命周期活动，其区分条件是恢复已保存状态、位置与运行上下文，并在该状态可继续运行时结束；ReplayActivity 由 ReplayActivity-is_a-CheckpointLifecycleActivity 分类，其区分条件是从已保存检查点开始，按记录的输入与顺序重新执行后续步骤。恢复使状态重新可用但不执行后续步骤，重放则必须重新执行；任一条件成立不推出另一端。
      en: "Contrast under the real shared parent CheckpointLifecycleActivity: RestoreActivity is classified by RestoreActivity-is_a-CheckpointLifecycleActivity and reinstates saved state, position, and runtime context, ending when that state is resumable; ReplayActivity is classified by ReplayActivity-is_a-CheckpointLifecycleActivity and starts from a saved checkpoint to re-execute subsequent steps with recorded inputs and ordering. Restore makes state available without executing later steps, whereas replay requires re-execution; either condition leaves the other unproven."
      ja: 実在する共通親 CheckpointLifecycleActivity の下での対照：RestoreActivity は RestoreActivity-is_a-CheckpointLifecycleActivity で分類され、保存状態・位置・実行コンテキストを復元し、その状態が再開可能になった時点で終了します。ReplayActivity は ReplayActivity-is_a-CheckpointLifecycleActivity で分類され、保存済みチェックポイントから記録された入力と順序で後続手順を再実行します。復元は後続手順を実行せず状態を利用可能にし、リプレイは再実行を必須とします。一方の条件は他方を証明しません。
    source_claims:
      - claim-restore-activity-001
