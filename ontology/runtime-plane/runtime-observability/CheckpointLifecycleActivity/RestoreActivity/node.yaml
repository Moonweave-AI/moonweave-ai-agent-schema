schema: moonweave.ai/ontology-node/v1
id: RestoreActivity
kind: concept
labels:
  zh: 恢复活动
  en: Restore activity
  ja: 復元活動
semantics:
  short_definition:
    zh: 把已保存检查点重建为可继续运行状态的活动。
    en: Reinstatement of a saved checkpoint as resumable runtime state.
    ja: 保存済みチェックポイントを再開可能な実行状態へ戻す活動。
  definition:
    zh: 恢复活动是一种检查点生命周期活动：它读取一个已保存检查点，并把其中的状态、位置与必要的运行上下文重新装载为可继续执行的当前状态。恢复以重建可运行状态为止；若随后按历史输入重新执行步骤，则后续部分属于回放。
    en: A restore activity is a checkpoint lifecycle activity that reads a saved checkpoint and reinstates its state, position, and required runtime context as the current resumable state. Restoration ends when that state is available; subsequent re-execution with recorded inputs is replay.
    ja: 復元活動はチェックポイント・ライフサイクル活動の一種であり、保存済みチェックポイントを読み、その状態、位置、必要な実行文脈を再開可能な現在状態として戻します。状態が利用可能になった時点で復元は完了し、その後の記録済み入力による再実行は再生です。
  why_needed:
    zh: 恢复记录说明系统在崩溃恢复、暂停后继续或人工介入后继续时采用了哪个已保存状态，并允许核验恢复目标是否与检查点一致；若把它并入回放，就无法区分“只恢复”与“恢复后重演”。
    en: A restore record identifies the saved state used after a crash, pause, or human intervention and supports checking that the reinstated state matches the checkpoint. Keeping it distinct from replay preserves the difference between merely resuming and resuming followed by re-execution.
    ja: 復元記録は、障害、停止、人手介入後に用いた保存状態を特定し、復元状態がチェックポイントと一致するか検証できるようにします。再生と分けることで、単なる再開と再開後の再実行を区別できます。
  includes:
    - zh: 包括从持久化检查点恢复图状态、执行位置、待处理任务和恢复所需上下文，并使运行重新达到可继续状态的操作。
      en: Includes operations that restore graph state, execution position, pending work, and required context from a persisted checkpoint until the run is resumable.
      ja: 永続化チェックポイントからグラフ状態、実行位置、保留作業、必要文脈を戻し、実行を再開可能にする操作を含みます。
  excludes:
    - zh: 不包括恢复后对步骤的重新执行，也不包括把当前状态写成新检查点的捕获活动。
      en: Excludes re-executing steps after restoration and writing the current state as a new checkpoint.
      ja: 復元後のステップ再実行、および現在状態を新しいチェックポイントとして保存する取得活動は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成 RestoreActivity 时应分别映射 OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating RestoreActivity, map OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: RestoreActivity 統合時は OpenTelemetry OTLP traces/spans, LangSmith run trees, LangGraph checkpoint snapshots を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to RestoreActivity.
      format: |-
        # Example RestoreActivity ingest
        { "restore-activity_ref": "example-1" }
      source_claims:
        - claim-restore-activity-design
  typical_output:
    - description: Moonweave-local RestoreActivity projection.
      format: '{ "schema_owner": "moonweave-local-design", "restore-activity_id": "example-1" }'
      source_claims:
        - claim-restore-activity-design
  reference_implementations:
    - name: OpenTelemetry OTLP
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      description: Traces and spans → Trace, Span, Metric export.
    - name: LangSmith
      url: https://docs.smith.langchain.com/
      description: Run trees and feedback → RunTree, TraceRecord.
    - name: LangGraph Checkpoints
      url: https://langchain-ai.github.io/langgraph/concepts/persistence/
      description: State snapshots and checkpoint restore events.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: RestoreActivity-example-positive-001
    labels:
      zh: LangGraph graph.get_state 恢复
      en: LangGraph graph.get_state restore
      ja: LangGraph graph.get_state 復元
    descriptions:
      zh: LangGraph graph.get_state(config={configurable:{thread_id:thread-1}}) 在 interrupt 后 RestoreActivity 读取 checkpoint values/next 准备 resume。
      en: LangGraph graph.get_state(config={configurable:{thread_id:thread-1}}) after interrupt RestoreActivity reads checkpoint values/next preparing resume.
      ja: interrupt 後 get_state が RestoreActivity として checkpoint を読む。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values:
      lifecycle_activity_id: restore-activity-cp42
      lifecycle_operation: restore
      checkpoint_ref: cp-42
      session_ref: incident-session-42
      started_at: 2026-07-16T10:05:00.000Z
      ended_at: 2026-07-16T10:05:00.080Z
      outcome: succeeded
    related_node_ids:
      - RestoreActivity
      - Checkpoint
      - StateSnapshot
      - StateDiff
      - CheckpointLifecycleActivity
    related_relation_ids:
      - RestoreActivity-is_a-CheckpointLifecycleActivity
      - RestoreActivity-consumes-Checkpoint
      - RestoreActivity-produces-StateSnapshot
      - RestoreActivity-produces-StateDiff
    source_claims:
      - claim-restore-activity-design
  - id: RestoreActivity-example-boundary-001
    labels:
      zh: OpenAI Thread 加载非 RestoreActivity
      en: OpenAI Thread load not RestoreActivity
      ja: OpenAI Thread 読込は RestoreActivity ではない
    descriptions:
      zh: OpenAI client.beta.threads.messages.list(thread_id) 加载对话历史是 RuntimeSession 操作，不是 LangGraph RestoreActivity。
      en: OpenAI client.beta.threads.messages.list(thread_id) loading conversation history is RuntimeSession operation, not LangGraph RestoreActivity.
      ja: OpenAI Thread messages.list は RuntimeSession 操作である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - RestoreActivity
      - ReplayActivity
      - Checkpoint
      - CheckpointLifecycleActivity
    related_relation_ids:
      - RestoreActivity-is_a-CheckpointLifecycleActivity
    source_claims:
      - claim-restore-activity-design
  - id: RestoreActivity-example-3
    labels:
      zh: Restore 与 Replay 边界
      en: Restore versus Replay boundary
      ja: Restore と Replay 境界
    descriptions:
      zh: RestoreActivity 读取 checkpoint 恢复执行上下文；ReplayActivity 重放历史 super-step；restore 继续，replay 重演。
      en: RestoreActivity reads checkpoint restoring execution context; ReplayActivity replays historical super-step; restore continues, replay re-enacts.
      ja: Restore は継続、Replay は再演である。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - RestoreActivity
    related_relation_ids: []
    source_claims:
      - claim-restore-activity-vendor
      - claim-restore-activity-design
  - id: RestoreActivity-example-4
    labels:
      zh: interrupt 后 get_state 实例
      en: get_state after interrupt instance
      ja: interrupt 後 get_state 事例
    descriptions:
      zh: RestoreActivity activity_id=restore-44、checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336、thread_id=thread-1、restored_at=2026-01-15T10:20:00Z。
      en: RestoreActivity activity_id=restore-44, checkpoint_id=1f070a87-33b3-6d36-8001-50c306580336, thread_id=thread-1, restored_at=2026-01-15T10:20:00Z.
      ja: restore-44 が interrupt 後 checkpoint を復元する。
    example_source:
      product: OpenTelemetry
      url: https://opentelemetry.io/docs/specs/otel/protocol/
      version: OTLP traces
    field_values: {}
    related_node_ids:
      - RestoreActivity
    related_relation_ids: []
    source_claims:
      - claim-restore-activity-vendor
      - claim-restore-activity-design
parent_relation:
  id: RestoreActivity-is_a-CheckpointLifecycleActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 RestoreActivity 都是 CheckpointLifecycleActivity，其种差是在不重新执行已保存区间的前提下，从既有检查点重建可继续运行的状态。
    en: Every RestoreActivity is a CheckpointLifecycleActivity distinguished by reconstructing resumable state from an existing checkpoint without re-executing the saved interval.
    ja: すべての RestoreActivity は CheckpointLifecycleActivity で、保存区間を再実行せず既存 Checkpoint から再開可能状態を再構成する点で区別されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不规定实例基数。
    en: Taxonomic inheritance does not impose instance cardinality.
    ja: 分類継承は instance 基数を規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有恢复特化类
      en: has restore specialization
      ja: restore 特殊化を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-restore-activity-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RestoreActivity-consumes-Checkpoint
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: consumes
      en: consumes
      ja: consumes
    definitions:
      zh: RestoreActivity 通过 consumes 指向其读取并作为唯一恢复基线的 Checkpoint；活动不就地修改该检查点。
      en: RestoreActivity consumes the Checkpoint it reads as the recovery baseline, without mutating that checkpoint in place.
      ja: RestoreActivity は回復 baseline として読む Checkpoint を consumes し、その Checkpoint を in-place 変更しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: consumed_by_restore_activity
      labels:
        zh: 由恢复活动消费
        en: consumed by restore activity
        ja: 復元活動に消費される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-restore-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Checkpoint
  - id: RestoreActivity-produces-StateDiff
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
      ja: produces
    definitions:
      zh: RestoreActivity 通过 produces 指向描述恢复前当前状态与恢复后 successor snapshot 之间变化的 StateDiff。
      en: RestoreActivity produces the StateDiff describing changes between pre-restore current state and the post-restore successor snapshot.
      ja: RestoreActivity は復元前 current state と復元後 successor snapshot の変化を記述する StateDiff を produces します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_produces
      labels:
        zh: 反向 produces
        en: inverse produces
        ja: 逆 produces
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-restore-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StateDiff
  - id: RestoreActivity-produces-StateSnapshot
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
      ja: produces
    definitions:
      zh: RestoreActivity 通过 produces 指向恢复完成后新识别的 successor StateSnapshot，而不是把原检查点快照就地改写。
      en: RestoreActivity produces a newly identified successor StateSnapshot after restoration rather than overwriting the checkpoint's original snapshot.
      ja: RestoreActivity は復元後に新 identity の successor StateSnapshot を produces し、元 Checkpoint snapshot を上書きしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_produces
      labels:
        zh: 反向 produces
        en: inverse produces
        ja: 逆 produces
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-restore-activity-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StateSnapshot
