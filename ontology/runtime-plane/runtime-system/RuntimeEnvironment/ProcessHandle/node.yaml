schema: moonweave.ai/ontology-node/v1
id: ProcessHandle
kind: concept
labels:
  zh: 进程句柄
  en: process handle
  ja: プロセスハンドル
semantics:
  short_definition:
    zh: 进程句柄是把一次运行尝试关联到具体操作系统进程的可验证标识记录。
    en: A ProcessHandle is a verifiable identifier record that correlates a run attempt with a concrete operating-system process.
    ja: ProcessHandle は、実行試行を具体的な OS プロセスへ対応付ける検証可能な識別記録である。
  definition:
    zh: 进程句柄是一类信息记录；它以进程标识、主机或容器范围以及可防止 PID 复用歧义的启动标记来指称一个已创建进程，并可附带终止、标准流和清理控制信息。它不是进程活动本身，也不是 RunAttempt 的结果或状态。
    en: A ProcessHandle is an information record that denotes one spawned process using a process identifier, host or container scope, and a start marker that avoids PID-reuse ambiguity; it may also carry termination, standard-stream, and cleanup controls. It is neither the process activity itself nor the result or state of a RunAttempt.
    ja: ProcessHandle は、プロセス ID、ホストまたはコンテナ範囲、PID 再利用の曖昧さを避ける開始標識で一つの生成済みプロセスを指す情報記録であり、終了、標準ストリーム、後始末の制御を持ち得る。プロセス活動そのものでも RunAttempt の結果・状態でもない。
  why_needed:
    zh: 该记录使取消、超时清理、标准输出归属和孤儿进程排查能够指向实际进程，而不把易复用的裸 PID 当作永久身份。
    en: The record lets cancellation, timeout cleanup, stream attribution, and orphan-process diagnosis address the actual process without treating a reusable bare PID as permanent identity.
    ja: この記録により、取消、タイムアウト後処理、ストリーム帰属、孤児プロセス診断が実プロセスを対象にでき、再利用可能な裸 PID を恒久識別子として扱わずに済む。
  includes:
    - zh: 纳入由命令或工具调用创建、带 PID、执行环境范围和启动标记并可用于控制或关联的进程引用。
      en: Includes a process reference created by a command or tool call with PID, execution-environment scope, start marker, and enough information for control or correlation.
      ja: コマンドまたはツール呼び出しで生成され、PID、実行環境範囲、開始標識、制御または対応付けに十分な情報を持つプロセス参照を含む。
  excludes:
    - zh: 不纳入脱离主机与启动时间的裸整数 PID、描述预期命令的 InvocationSpecification 或业务运行结果。
      en: Excludes a bare integer PID without host and start context, an InvocationSpecification describing an intended command, and a business run result.
      ja: ホストと開始文脈を欠く裸の整数 PID、予定コマンドを記述する InvocationSpecification、業務実行結果は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 ProcessHandle 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ProcessHandle, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ProcessHandle 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ProcessHandle.
      format: |-
        # Example ProcessHandle ingest
        { "process-handle_ref": "example-1" }
      source_claims:
        - claim-process-handle-design
  typical_output:
    - description: Moonweave-local ProcessHandle projection.
      format: '{ "schema_owner": "moonweave-local-design", "process-handle_id": "example-1" }'
      source_claims:
        - claim-process-handle-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys:
    - runtime_environment_ref
    - process_id
    - started_at
  fields:
    - id: runtime_environment_ref
      labels:
        zh: 运行环境引用
        en: runtime-environment reference
        ja: runtime environment 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定进程标识有效的主机、容器或沙箱环境。
        en: Scopes the process identifier to its host, container, or sandbox environment.
        ja: process identifier が有効な host/container/sandbox environment を限定します。
      allowed_values: []
      pattern: null
      example_value: runtime-environment:sandbox-17
      source_claims:
        - claim-process-handle-design
    - id: process_id
      labels:
        zh: 进程标识
        en: process ID
        ja: process ID
      datatype: string-or-integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 由运行环境分配的进程标识；不能脱离环境与启动时间单独作为永久身份。
        en: The process identifier assigned by the runtime; it is not a durable identity without scope and start time.
        ja: runtime が割り当てる process identifier。scope と start time なしでは durable identity ではありません。
      allowed_values: []
      pattern: null
      example_value: 4821
      source_claims:
        - claim-process-handle-design
    - id: started_at
      labels:
        zh: 进程启动时间
        en: process started at
        ja: process start time
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际子进程创建的时间，用于区分被复用的进程标识。
        en: The actual child-process creation time used to disambiguate reused process IDs.
        ja: 再利用された process ID を区別する actual child-process creation time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T09:31:04Z
      source_claims:
        - claim-process-handle-design
    - id: lifecycle_state
      labels:
        zh: 进程生命周期状态
        en: process lifecycle state
        ja: process lifecycle state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录句柄所指进程当前为运行、已退出、已终止或已强制结束。
        en: Records whether the denoted process is running, exited, terminated, or killed.
        ja: 対象 process が running/exited/terminated/killed のどれかを記録します。
      allowed_values: []
      pattern: null
      example_value: running
      source_claims:
        - claim-process-handle-design
    - id: standard_input_ref
      labels:
        zh: 标准输入控制引用
        en: standard-input control reference
        ja: standard input control 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用可关闭或写入子进程标准输入的控制通道。
        en: References the control channel used to write or close the child process's standard input.
        ja: child process の standard input を write/close する control channel を参照します。
      allowed_values: []
      pattern: null
      example_value: stream-control:stdin-4821
      source_claims:
        - claim-process-handle-design
    - id: standard_output_ref
      labels:
        zh: 标准输出流引用
        en: standard-output stream reference
        ja: standard output stream 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用该进程的标准输出流。
        en: References the process's standard-output stream.
        ja: process の standard-output stream を参照します。
      allowed_values: []
      pattern: null
      example_value: output-stream:stdout-4821
      source_claims:
        - claim-process-handle-design
    - id: standard_error_ref
      labels:
        zh: 标准错误流引用
        en: standard-error stream reference
        ja: standard error stream 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用该进程的标准错误流。
        en: References the process's standard-error stream.
        ja: process の standard-error stream を参照します。
      allowed_values: []
      pattern: null
      example_value: output-stream:stderr-4821
      source_claims:
        - claim-process-handle-design
    - id: termination_control_ref
      labels:
        zh: 终止控制引用
        en: termination-control reference
        ja: termination control 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用可执行有序关闭、终止与强制结束的受控能力。
        en: References the controlled capability for orderly close, terminate, and kill escalation.
        ja: orderly close/terminate/kill escalation を実行する controlled capability を参照します。
      allowed_values: []
      pattern: null
      example_value: process-control:sandbox-17/4821
      source_claims:
        - claim-process-handle-design
    - id: exited_at
      labels:
        zh: 进程退出时间
        en: process exited at
        ja: process exit time
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录运行环境观察到进程结束的时间。
        en: Records when the runtime environment observed the process end.
        ja: runtime environment が process end を観測した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T09:34:12Z
      source_claims:
        - claim-process-handle-design
    - id: exit_code
      labels:
        zh: 退出码
        en: exit code
        ja: exit code
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在运行环境提供时保存进程的数值退出状态。
        en: Stores the process's numeric exit status when supplied by the runtime.
        ja: runtime が提供する場合の numeric exit status。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-process-handle-design
  constraints:
    - id: process-handle-pid-reuse-safe
      severity: error
      expression_language: plain
      expression: runtime_environment_ref, process_id, and started_at remain immutable and jointly denote one spawned process
      explanations:
        zh: 裸 PID 不能单独构成稳定句柄。
        en: A bare PID cannot constitute a stable handle by itself.
        ja: bare PID 単独では stable handle を構成しません。
      source_claims:
        - claim-process-handle-design
    - id: process-handle-terminal-evidence-coherent
      severity: error
      expression_language: plain
      expression: exited_at and exit_code describe this process incarnation only; lifecycle_state is terminal when exited_at is present
      explanations:
        zh: 退出证据不得误配到同 PID 的其他进程实例。
        en: Exit evidence must not be attached to another process incarnation that reused the PID.
        ja: exit evidence を同じ PID を再利用した別 process incarnation に付けません。
      source_claims:
        - claim-process-handle-design
  required_relation_constraints:
    - id: process-handle-valid-in-one-runtime-environment
      direction: outgoing
      predicate: valid_in
      target_concept_id: RuntimeEnvironment
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 句柄仅在一个明确运行环境内有效。
        en: The handle is valid in exactly one explicit runtime environment.
        ja: handle は一つの明示 runtime environment 内でのみ有効です。
      source_claims:
        - claim-process-handle-design
examples:
  - id: ProcessHandle-example-positive-001
    labels:
      zh: Docker exec worker PID
      en: Docker exec worker PID
      ja: Docker exec worker PID
    descriptions:
      zh: Docker CLI docker exec worker ps aux 返回 PID=4820 作为 ProcessHandle process_id=4820、command=python agent_worker.py、container_id=cr-11。
      en: Docker CLI docker exec worker ps aux returns PID=4820 as ProcessHandle process_id=4820, command=python agent_worker.py, container_id=cr-11.
      ja: docker exec ps が ProcessHandle PID=4820 を返す。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      runtime_environment_ref: runtime-environment:sandbox-17
      process_id: 4821
      started_at: 2026-07-17T09:31:04Z
      lifecycle_state: running
      standard_input_ref: stream-control:stdin-4821
      standard_output_ref: output-stream:stdout-4821
      standard_error_ref: output-stream:stderr-4821
      termination_control_ref: process-control:sandbox-17/4821
    related_node_ids:
      - ProcessHandle
      - RunAttempt
    related_relation_ids:
      - ProcessHandle-correlates-RunAttempt
    source_claims:
      - claim-process-handle-design
  - id: ProcessHandle-example-boundary-001
    labels:
      zh: OpenAI run_id 非 ProcessHandle
      en: OpenAI run_id not ProcessHandle
      ja: OpenAI run_id は ProcessHandle ではない
    descriptions:
      zh: OpenAI Run id=run_qVYsWok6 是 Execution 标识，不是 OS ProcessHandle PID。
      en: OpenAI Run id=run_qVYsWok6 is Execution identifier, not OS ProcessHandle PID.
      ja: OpenAI run_id は ProcessHandle ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - ProcessHandle
      - RunAttempt
    related_relation_ids:
      - ProcessHandle-correlates-RunAttempt
    source_claims:
      - claim-process-handle-design
  - id: ProcessHandle-example-3
    labels:
      zh: ProcessHandle 与 Execution 边界
      en: ProcessHandle versus Execution boundary
      ja: ProcessHandle と Execution 境界
    descriptions:
      zh: ProcessHandle 指向 OS 进程；Execution 是逻辑 agent work Activity；同一 ProcessHandle 可承载多次 Execution。
      en: ProcessHandle points to OS process; Execution is logical agent work Activity; one ProcessHandle can host multiple Executions.
      ja: ProcessHandle は OS 进程、Execution は論理 Activity である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - ProcessHandle
    related_relation_ids: []
    source_claims:
      - claim-process-handle-vendor
      - claim-process-handle-design
  - id: ProcessHandle-example-4
    labels:
      zh: PID 4820 实例
      en: PID 4820 instance
      ja: PID 4820 事例
    descriptions:
      zh: ProcessHandle handle_id=proc-27、process_id=4820、command=python agent_worker.py、started_at=2026-01-15T08:00:05Z。
      en: ProcessHandle handle_id=proc-27, process_id=4820, command=python agent_worker.py, started_at=2026-01-15T08:00:05Z.
      ja: proc-27 PID 4820 ProcessHandle を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - ProcessHandle
    related_relation_ids: []
    source_claims:
      - claim-process-handle-vendor
      - claim-process-handle-design
parent_relation:
  id: ProcessHandle-valid_in-RuntimeEnvironment
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 在运行环境内有效
    en: is valid in runtime environment
    ja: 実行環境内で有効である
  definitions:
    zh: ProcessHandle-valid_in-RuntimeEnvironment 表示进程句柄的 PID 或等价标识、启动标记、主机或容器范围与目标 RuntimeEnvironment 的同一实例相匹配，因此该句柄只在该环境及其进程生命周期内可解析。相同 PID 出现在另一容器、主机或重启后的生命周期中，不得沿用这条关系。
    en: ProcessHandle-valid_in-RuntimeEnvironment states that the handle's PID or equivalent identifier, start marker, and host or container scope match the same RuntimeEnvironment instance, so the handle is resolvable only within that environment and process lifetime. The same PID in another container, host, or post-restart lifetime does not preserve the relation.
    ja: ProcessHandle-valid_in-RuntimeEnvironment は、handle の PID 等識別子・開始 marker・host/container scope が同じ RuntimeEnvironment instance と一致し、その環境と process lifetime 内だけで解決可能であることを表します。別 container・host・再起動後の同一 PID には関係を引き継ぎません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 句柄在一个有效时间点应解析到一个环境实例，但迁移或导入记录可能形成分段有效期；本体以带时间范围的事实表达，不强制静态全局基数。
    en: A handle should resolve to one environment instance at a valid-time point, but migration or imported records may create segmented validity; the ontology represents time-scoped facts rather than a static global cardinality.
    ja: handle は一時点で一環境 instance に解決すべきですが、移行・取込記録では有効期間が分割され得るため、静的全局基数でなく時間範囲付き事実で表します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 限定进程句柄范围
      en: scopes process handle
      ja: プロセスハンドルを範囲化する
  conditions:
    - id: process-handle-environment-scope-condition
      severity: error
      expression_language: plain
      expression: ProcessHandle process identifier, start marker, and host_or_container_scope match the target RuntimeEnvironment instance for the asserted valid-time interval.
      explanations:
        zh: 只有进程标识、启动标记和主机或容器范围全部匹配目标环境实例时，句柄才在该环境内有效。
        en: The handle is valid in the environment only when process identifier, start marker, and host or container scope all match the target environment instance.
        ja: process ID・開始 marker・host/container scope がすべて対象環境 instance と一致する場合だけ handle はその環境内で有効です。
      source_claims:
        - claim-process-handle-design
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-process-handle-design
    - claim-process-handle-design
  distinct_fact_rationale:
    zh: ProcessHandle-correlates-RunAttempt 说明进程与哪次业务尝试相关；valid_in 说明该句柄在哪个进程命名空间内可安全解析，业务关联与身份作用域不可合并。
    en: ProcessHandle-correlates-RunAttempt links a process to a business attempt, while valid_in identifies the process namespace in which the handle can be safely resolved; business correlation and identity scope are distinct facts.
    ja: ProcessHandle-correlates-RunAttempt は process と業務試行の関連、valid_in は handle を安全に解決できる process namespace を表し、業務相関と identity scope は別事実です。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ProcessHandle-correlates-RunAttempt
    predicate: correlates
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关联执行尝试
      en: correlates run attempt
      ja: 実行試行を対応付ける
    definitions:
      zh: 把包含进程标识、宿主或容器范围及启动标记的 ProcessHandle 关联到实际由该进程承载的 RunAttempt；仅有相同 PID 文本或相邻时间戳不足以建立关联。
      en: Correlates a ProcessHandle carrying process identity, host or container scope, and a start marker with the RunAttempt actually hosted by that process; matching PID text or nearby timestamps alone are insufficient.
      ja: process identity・host/container scope・start markerを持つProcessHandleを、そのprocessが実際にhostしたRunAttemptへ対応付けます。同じPID文字列や近いtimestampだけでは不十分です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: correlated_by_process_handle
      labels:
        zh: 由进程句柄关联
        en: correlated by process handle
        ja: process handleで対応付けられる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-process-handle-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RunAttempt
sources:
