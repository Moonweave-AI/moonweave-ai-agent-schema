schema: moonweave.ai/ontology-node/v1
id: ProcessHandle
kind: concept
status: accepted
labels: {zh: 进程句柄, en: Process handle, ja: プロセスハンドル}
semantics:
  short_definition: {zh: 标识并管理一个已生成操作系统进程生命周期的 RuntimeEnvironment 组件。, en: A RuntimeEnvironment component that identifies and manages one spawned operating-system process lifecycle., ja: 1 つの生成されたオペレーティングシステムプロセスのライフサイクルを識別および管理する RuntimeEnvironment コンポーネント。}
  definition: {zh: ProcessHandle 是特定子进程或受管理进程的运行时记录，包括其进程标识符、命令指纹、状态和受控 I/O 引用。它不是请求命令的 Execution Activity、托管它的容器、原始进程输出或该进程生成的持久 Artifact。, en: "A ProcessHandle is a runtime record for a specific child or managed process, including its process identifier, command fingerprint, status, and controlled I/O references. It is not the Execution Activity that requested a command, the container that hosts it, raw process output, or a durable Artifact produced by the process.", ja: ProcessHandle は特定の子プロセスまたは管理対象プロセスのランタイム記録であり、プロセス識別子、コマンドフィンガープリント、状態、制御された I/O 参照を含む。コマンドを要求した Execution Activity、それをホストするコンテナ、生のプロセス出力、またはプロセスが生成した永続 Artifact ではない。}
  why_needed: {zh: 智能体运行时需要受控引用来支持取消、超时、退出状态收集和诊断关联，同时不将进程管理与进程执行的语义工作混淆。, en: "Agent runtimes need a controlled reference for cancellation, timeout, exit-status collection, and diagnostic correlation without conflating process management with the semantic work the process performs.", ja: エージェントランタイムには、プロセス管理をプロセスが実行する意味上の作業と混同せずに、キャンセル、タイムアウト、終了状態収集、診断相関を行うための制御された参照が必要である。}
  includes:
    - {zh: 句柄 ID、进程 ID、命令指纹、生命周期状态、超时策略和经脱敏的流引用。, en: "Handle ID, process ID, command fingerprint, lifecycle status, timeout policy, and redacted stream references.", ja: ハンドル ID、プロセス ID、コマンドフィンガープリント、ライフサイクル状態、タイムアウトポリシー、マスキング済みストリーム参照。}
    - {zh: 属于一个 RuntimeEnvironment 且可选由 Execution 启动的受管理进程。, en: A managed process belonging to one RuntimeEnvironment and optionally launched by an Execution., ja: 1 つの RuntimeEnvironment に属し、任意で Execution が起動する管理対象プロセス。}
  excludes:
    - {zh: 包含机密的完整命令参数、原始 stdout/stderr 载荷或可执行 Artifact。, en: "Full command arguments containing secrets, raw stdout/stderr payloads, or an executable Artifact.", ja: 秘密を含む完全なコマンド引数、生の stdout/stderr ペイロード、または実行可能 Artifact。}
    - {zh: 容器身份、shell 工作区或业务级执行结果。, en: "A container identity, shell workspace, or business-level execution result.", ja: コンテナ識別性、シェルワークスペース、またはビジネスレベルの実行結果。}
  semantic_kind: entity
  aliases: [child process reference, managed subprocess]
engineering:
  explanation: {zh: 运行时生成子进程，为其分配句柄，将有界输出流向可观测性记录或工件，执行超时与取消策略，并记录最终退出状态。即使调用执行或工作器终止，该句柄仍保留进程生命周期元数据。, en: "A runtime spawns a subprocess, assigns it a handle, streams bounded output to observability or artifacts, enforces timeout/cancellation policy, and records final exit state. The handle preserves process lifecycle metadata even when the invoking execution or worker terminates.", ja: ランタイムはサブプロセスを生成してハンドルを割り当て、制限付き出力を可観測性または Artifact へストリーミングし、タイムアウトとキャンセルポリシーを適用して最終終了状態を記録する。呼び出し元の実行またはワーカーが終了しても、ハンドルはプロセスライフサイクルメタデータを保持する。}
  typical_input:
    - description: {zh: 进程生成请求, en: Process spawn request, ja: プロセス生成要求}
      format: |-
        {"environment_id":"env-prod-a","command_digest":"sha256:8b1a...","timeout_ms":30000,"working_directory_id":"workdir-5"}
  typical_output:
    - description: {zh: 进程句柄记录, en: Process handle record, ja: プロセスハンドル記録}
      format: |-
        {"process_handle_id":"proc-27","pid":4421,"status":"exited","exit_code":0,"output_ref":"artifact-process-output-27"}
  reference_implementations:
    - {name: Node.js child_process, url: https://nodejs.org/api/child_process.html, description: "Documents spawning child processes, stream I/O, exit events, and termination."}
structure:
  identity_keys: [process_handle_id]
  fields:
    - id: process_handle_id
      labels: {zh: 进程句柄 ID, en: Process handle ID, ja: プロセスハンドル ID}
      definitions: {zh: 一个受管理进程记录的稳定运行时标识符。, en: Stable runtime identifier for one managed process record., ja: 1 つの管理対象プロセス記録の安定したランタイム識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: proc-27
      source_claims: [claim-process-handle-lifecycle]
    - id: pid
      labels: {zh: 进程 ID, en: Process ID, ja: プロセス ID}
      definitions: {zh: 在进程生命周期内有效的操作系统进程标识符。, en: Operating-system process identifier valid during the process lifetime., ja: プロセスの存続期間中に有効なオペレーティングシステムのプロセス識別子。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      minimum: 1
      example_value: 4421
      source_claims: [claim-process-handle-lifecycle]
    - id: command_digest
      labels: {zh: 命令摘要, en: Command digest, ja: コマンドダイジェスト}
      definitions: {zh: 已解析命令规范的摘要或批准标识符，而非包含机密的原始参数。, en: "Digest or approved identifier for the resolved command specification, not raw secret-bearing arguments.", ja: 解決済みコマンド仕様のダイジェストまたは承認済み識別子であり、秘密を含む生の引数ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6
      source_claims: [claim-process-handle-lifecycle]
  constraints:
    - id: process-handle-lifecycle-safety
      severity: error
      language: plain
      expression: A handle must record one current lifecycle status and may expose redacted output references, but must not store raw credentials or unrestricted command arguments.
      explanation: {zh: 进程控制需要足够数据用于问责，但不能通过进程元数据泄露机密。, en: Process control needs enough data for accountability without leaking secrets through process metadata., ja: プロセス制御には説明責任のための十分なデータが必要だが、プロセスメタデータ経由で秘密を漏らしてはならない。}
      source_claims: [claim-process-handle-lifecycle]
  required_relations: [ProcessHandle-part-of-RuntimeEnvironment]
examples:
  - id: process-handle-positive
    labels: {zh: "Docker exec worker PID", en: "Docker exec worker PID", ja: "Docker exec worker PID"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; ProcessHandle maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; ProcessHandle maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; ProcessHandle serving env."}
    field_values: {process_handle_id: proc-27, pid: 4421, command_digest: sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6}
    related_node_ids: [ProcessHandle, RuntimeEnvironment, Artifact]
    related_relation_ids: [ProcessHandle-part-of-RuntimeEnvironment]
    source_claims: [claim-process-handle-lifecycle]
  - id: process-handle-counterexample
    labels: {zh: "OpenAI run_id 非 ProcessHandle", en: "OpenAI run_id not ProcessHandle", ja: "OpenAI run_id は ProcessHandle ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style ProcessHandle.", en: "ID without PROV relations cannot serve as PROV-O-style ProcessHandle.", ja: "Missing PROV relations rejects ProcessHandle."}
    field_values: {artifact_id: artifact-process-output-27}
    related_node_ids: [Artifact]
    related_relation_ids: []
    source_claims: [claim-process-handle-lifecycle]
  - id: process-handle-boundary
    labels: {zh: "ProcessHandle 与 Execution 边界", en: "ProcessHandle versus Execution boundary", ja: "ProcessHandle と Execution 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; ProcessHandle must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; ProcessHandle must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {process_handle_id: proc-27}
    related_node_ids: [ProcessHandle, Execution]
    related_relation_ids: []
    source_claims: [claim-process-handle-lifecycle]
  - id: process-handle-instance-proc-27
    labels: {zh: "PID 4820 实例", en: "PID 4820 instance", ja: "PID 4820 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->ProcessHandle.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->ProcessHandle.", ja: "OTel instance maps to ProcessHandle."}
    field_values: {process_handle_id: proc-27, pid: 4421, command_digest: sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6}
    related_node_ids: [ProcessHandle, RuntimeEnvironment, WorkingDirectory]
    related_relation_ids: [ProcessHandle-part-of-RuntimeEnvironment]
    source_claims: [claim-process-handle-lifecycle]
parent_relation:
  id: ProcessHandle-part-of-RuntimeEnvironment
  predicate: part_of
  target: concept:RuntimeEnvironment
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是运行环境的一部分, en: is part of runtime environment, ja: 実行環境の一部である}
  definitions: {zh: ProcessHandle 在一个 RuntimeEnvironment 的执行边界内受管理。, en: A ProcessHandle is managed within one RuntimeEnvironment's execution boundary., ja: ProcessHandle は 1 つの RuntimeEnvironment の実行境界内で管理される。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_process_handle, labels: {zh: 具有进程句柄, en: has process handle, ja: プロセスハンドルを持つ}}
  conditions:
    - id: process-handle-parent-condition
      severity: error
      expression: The handle must resolve to the environment responsible for process creation, cancellation, and output policy.
      explanations: {zh: 脱离上下文的 PID 不能建立治理运行时边界。, en: A detached PID does not establish the governing runtime boundary., ja: 文脈から切り離された PID では統治するランタイム境界を確立できない。}
      source_claims: [claim-process-handle-lifecycle]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-process-handle-lifecycle]
relations: []
sources:
  - id: nodejs-child-process
    title: "Node.js child_process API"
    url: https://nodejs.org/api/child_process.html
    source_type: documentation
    relevance: Documents child-process spawning, lifecycle events, I/O streams, exit codes, and termination controls.
source_claims:
  - id: claim-process-handle-lifecycle
    source: nodejs-child-process
    supports: Node.js child process APIs create and manage subprocesses with process identifiers, streams, exit events, and termination behavior.
    locator: Child process module overview, spawn, and event lifecycle
    evidence_kind: documentation
    confidence: high

