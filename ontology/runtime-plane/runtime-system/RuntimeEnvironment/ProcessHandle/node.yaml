source_claims:
  - id: claim-process-handle-001
    source: eng-proto-mcp-spec
    supports: The MCP stdio transport requires lifecycle management of a server subprocess and its standard streams. Moonweave's ProcessHandle records the scoped process identity needed to correlate and control that subprocess.
    locator: MCP Specification > Basic transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-002
    source: eng-proto-mcp-spec
    supports: "Direct source premise: MCP stdio communication uses a child server process and its standard streams; shutdown closes input, waits for exit, then may send termination and kill signals. Moonweave design inference: runtime scope, process ID, and start time form a PID-reuse-safe handle, while stream and termination references retain the concrete controls needed for cleanup."
    locator: MCP Specification > Basic > Lifecycle > Shutdown > stdio; Transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-003
    source: eng-proto-mcp-spec
    supports: The MCP stdio transport defines a client launching and communicating with a server subprocess over standard streams. The example adds Moonweave correlation and cleanup fields for that spawned-process situation.
    locator: MCP Specification > Basic transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-004
    source: eng-proto-mcp-spec
    supports: The MCP transport context involves a concrete subprocess and its streams, not an unscoped number. Moonweave therefore rejects an isolated PID as a complete handle.
    locator: MCP Specification > Basic transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-005
    source: eng-runtime-oci-linux-config
    supports: OCI scopes a configured process to a concrete container runtime and namespace boundary. Moonweave uses that scope together with a start marker to prevent cross-environment PID ambiguity.
    locator: OCI Runtime Specification > Configuration > Process and Linux namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-006
    source: eng-proto-mcp-spec
    supports: MCP stdio requires the client to launch and manage a server subprocess and its standard streams; Moonweave records the environment-scoped process identity needed to do so safely.
    locator: MCP Specification > Basic transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-007
    source: eng-runtime-oci-linux-config
    supports: OCI process configuration is interpreted inside a particular runtime and namespace boundary; Moonweave therefore rejects a bare PID as evidence across container instances.
    locator: OCI Runtime Specification > Configuration > Process and Linux namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-008
    source: eng-proto-mcp-spec
    supports: The MCP stdio transport requires lifecycle management of a server subprocess and its standard streams, motivating a resolvable process handle rather than an unscoped integer PID.
    locator: MCP Specification > Basic transports > stdio
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-009
    source: eng-runtime-oci-linux-config
    supports: OCI binds process configuration to a concrete runtime and namespace boundary; Moonweave uses that boundary as the RuntimeEnvironment scope of a ProcessHandle.
    locator: OCI Runtime Specification > Configuration > Process and Linux namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-process-handle-010
    source: eng-proto-mcp-spec
    supports: The MCP stdio transport specifies that the client launches the server as a subprocess and exchanges protocol messages over stdin and stdout. Moonweave adds a ProcessHandle-to-RunAttempt correlation so the subprocess occurrence is not confused with a reusable PID value.
    locator: Base Protocol > Transports > stdio > client launches server as subprocess
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

