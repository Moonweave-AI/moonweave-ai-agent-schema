  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: Container-example-positive-001
    kind: positive
    labels:
      zh: 容器正例
      en: Positive example of container
      ja: コンテナの正例
    scenario_id: null
    descriptions:
      zh: 工具调用在 sandbox-17 中启动，使用只读基础镜像、单独的可写工作区、受限网络和 LOG_LEVEL 环境变量，并记录该容器身份。
      en: A tool call starts in sandbox-17 with a read-only base image, a separate writable workspace, restricted networking, and a LOG_LEVEL environment variable, all bound to that container identity.
      ja: ツール呼び出しは sandbox-17 で開始され、読み取り専用ベースイメージ、別の書き込み可能ワークスペース、制限ネットワーク、LOG_LEVEL 環境変数がそのコンテナ識別子に束縛される。
    field_values:
      environment_variables:
        - name: LOG_LEVEL
          value_reference: env:LOG_LEVEL
    related_node_ids:
      - Container
      - RuntimeEnvironment
    related_relation_ids:
      - Container-is_a-RuntimeEnvironment
    expected_result:
      zh: sandbox-17 归类为 Container，并同时继承 RuntimeEnvironment。
      en: sandbox-17 is classified as Container and therefore also as RuntimeEnvironment.
      ja: sandbox-17 は Container に分類され、同時に RuntimeEnvironment でもある。
    why_valid_or_invalid:
      zh: 该记录同时给出容器身份、文件系统边界、进程配置和安全限制，而不是只有一个目录或变量集合。
      en: The record supplies a container identity plus filesystem, process, and security boundaries rather than merely a directory or variable set.
      ja: 記録にはコンテナ識別子とファイルシステム、プロセス、安全の境界があり、単なるディレクトリや変数集合ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-container-002
  - id: Container-example-boundary-001
    kind: boundary
    labels:
      zh: 容器边界例
      en: Boundary case for container
      ja: コンテナの境界例
    scenario_id: null
    descriptions:
      zh: 项目只激活位于主机上的 Python 虚拟环境 .venv；它共享主机文件系统和进程安全边界，没有容器身份、根文件系统或挂载配置。
      en: A project merely activates a host Python virtual environment named .venv. It shares the host filesystem and process security boundary and has no container identity, root filesystem, or mount configuration.
      ja: プロジェクトはホスト上の Python 仮想環境 .venv を有効化するだけで、ホストのファイルシステムとプロセス安全境界を共有し、コンテナ識別子、ルートファイルシステム、マウント設定を持たない。
    field_values: {}
    related_node_ids:
      - Container
      - RuntimeEnvironment
    related_relation_ids:
      - Container-is_a-RuntimeEnvironment
    expected_result:
      zh: 该环境可归为 RuntimeEnvironment，但不能仅凭依赖隔离归为 Container。
      en: The environment may be a RuntimeEnvironment, but dependency isolation alone does not classify it as Container.
      ja: この環境は RuntimeEnvironment になり得るが、依存隔離だけでは Container に分類できない。
    why_valid_or_invalid:
      zh: 语言依赖隔离不等同于进程、文件系统与资源的容器隔离边界。
      en: Language-dependency isolation is not the same as a container boundary over processes, filesystems, and resources.
      ja: 言語依存の隔離は、プロセス、ファイルシステム、資源に及ぶコンテナ境界とは異なる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-container-003
