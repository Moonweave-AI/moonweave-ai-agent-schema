schema: moonweave.ai/ontology-node/v1
id: Container
kind: concept
labels:
  zh: 容器
  en: container
  ja: コンテナ
semantics:
  short_definition:
    zh: 容器是以隔离的进程、文件系统和资源配置承载执行的运行环境。
    en: A Container is a runtime environment that hosts execution inside an isolated process, filesystem, and resource configuration.
    ja: Container は、分離されたプロセス、ファイルシステム、資源設定の中で実行を収容する実行環境である。
  definition:
    zh: 容器是 RuntimeEnvironment 的一种；其种差是由容器配置建立可识别的隔离边界，绑定根文件系统、启动进程、挂载、环境变量以及适用的资源和安全限制。普通主机环境、语言虚拟环境或工作目录本身不具备这一完整边界。
    en: A Container is a RuntimeEnvironment distinguished by a runtime configuration that establishes an identifiable isolation boundary and binds a root filesystem, initial process, mounts, environment variables, and applicable resource and security limits. A host environment, language virtual environment, or working directory alone lacks that complete boundary.
    ja: Container は RuntimeEnvironment の一種であり、ルートファイルシステム、初期プロセス、マウント、環境変数、資源・安全制限を束縛するコンテナ設定によって識別可能な隔離境界を形成する。通常のホスト環境、言語仮想環境、作業ディレクトリだけではこの境界を持たない。
  why_needed:
    zh: 该概念用于核实代码究竟在哪个隔离边界内执行，并把环境变量、挂载和资源限制归属到正确的运行环境。
    en: This concept identifies the isolation boundary in which code actually executes and assigns environment variables, mounts, and resource limits to the correct runtime environment.
    ja: この概念はコードが実際に動く隔離境界を特定し、環境変数、マウント、資源制限を正しい実行環境へ帰属させる。
  includes:
    - zh: 纳入具有独立容器标识、根文件系统、启动进程配置和明确安全限制的本地或托管执行沙箱。
      en: Includes a local or hosted execution sandbox with a container identity, root filesystem, initial-process configuration, and explicit security limits.
      ja: コンテナ識別子、ルートファイルシステム、初期プロセス設定、明示的な安全制限を持つローカルまたはホスト型実行サンドボックスを含む。
  excludes:
    - zh: 不纳入仅改变依赖搜索路径的 Python 虚拟环境、单独的 WorkingDirectory、ProcessHandle 或整套 AgentSystem。
      en: Excludes a Python virtual environment that only changes dependency resolution, a WorkingDirectory by itself, a ProcessHandle, and the enclosing AgentSystem.
      ja: 依存解決だけを変える Python 仮想環境、単独の WorkingDirectory、ProcessHandle、包含する AgentSystem は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 Container 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating Container, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: Container 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to Container.
      format: |-
        # Example Container ingest
        { "container_ref": "example-1" }
      source_claims:
        - claim-container-design
  typical_output:
    - description: Moonweave-local Container projection.
      format: '{ "schema_owner": "moonweave-local-design", "container_id": "example-1" }'
      source_claims:
        - claim-container-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: Container-example-positive-001
    labels:
      zh: Docker 镜像 digest 固定
      en: Docker image digest pin
      ja: Docker イメージ digest 固定
    descriptions:
      zh: Docker docker run python:3.12-slim@sha256:abc123... 固定 Container image_digest=sha256:abc123、container_id=cr-11，作为 agent worker 运行环境。
      en: Docker docker run python:3.12-slim@sha256:abc123... pins Container image_digest=sha256:abc123, container_id=cr-11 as agent worker runtime.
      ja: Docker digest 固定 Container が worker 環境である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      environment_variables:
        - name: LOG_LEVEL
          value_reference: env:LOG_LEVEL
    related_node_ids:
      - Container
      - RuntimeEnvironment
    related_relation_ids:
      - Container-is_a-RuntimeEnvironment
    source_claims:
      - claim-container-design
  - id: Container-example-boundary-001
    labels:
      zh: Kubernetes Pod name 非 Container
      en: Kubernetes Pod name not Container
      ja: Kubernetes Pod name は Container ではない
    descriptions:
      zh: Kubernetes Pod metadata.name=worker-7 无 image digest/容器/filesystem 边界，不是 Moonweave Container 记录。
      en: Kubernetes Pod metadata.name=worker-7 without image digest/container/filesystem boundary is not Moonweave Container record.
      ja: Pod name だけでは Container 記録にならない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - Container
      - RuntimeEnvironment
    related_relation_ids:
      - Container-is_a-RuntimeEnvironment
    source_claims:
      - claim-container-design
  - id: Container-example-3
    labels:
      zh: Container 与 Artifact 边界
      en: Container versus Artifact boundary
      ja: Container と Artifact 境界
    descriptions:
      zh: Container 是瞬态执行载体；Artifact 是稳定 content digest 输出；Docker 容器 ID 不是 Artifact。
      en: Container is transient execution carrier; Artifact is stable content digest output; Docker container ID is not Artifact.
      ja: Container は実行载体、Artifact は出力 Entity である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - Container
    related_relation_ids: []
    source_claims:
      - claim-container-vendor
      - claim-container-design
  - id: Container-example-4
    labels:
      zh: python:3.12-slim 实例
      en: python 3.12 slim instance
      ja: python:3.12-slim 事例
    descriptions:
      zh: Container container_id=cr-11、image_ref=python:3.12-slim、image_digest=sha256:abc123、c runtime_started_at=2026-01-15T08:00:00Z。
      en: Container container_id=cr-11, image_ref=python:3.12-slim, image_digest=sha256:abc123, runtime_started_at=2026-01-15T08:00:00Z.
      ja: cr-11 python:3.12-slim Container を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - Container
    related_relation_ids: []
    source_claims:
      - claim-container-vendor
      - claim-container-design
parent_relation:
  id: Container-is_a-RuntimeEnvironment
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行环境
    en: is a runtime environment
    ja: 実行環境の一種
  definitions:
    zh: 声明每个实际启动并以 root filesystem、process、mount、namespace 与资源控制形成执行边界的 Container 都是 RuntimeEnvironment；仅有镜像或配置文件尚不构成容器实例。
    en: States that every started Container whose root filesystem, process, mounts, namespaces, and resource controls form an execution boundary is a RuntimeEnvironment; an image or configuration file alone is not a container instance.
    ja: root filesystem・process・mount・namespace・resource controlで実行境界を形成する起動済みContainerはRuntimeEnvironmentです。imageや設定ファイルだけはcontainer instanceではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有运行环境子类
      en: has runtime-environment subtype
      ja: 実行環境subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-container-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-threads
    title: OpenAI Assistants Threads API
    url: https://platform.openai.com/docs/api-reference/threads
    source_type: official-doc
    relevance: thread_id preserving multi-turn context across runs.
  - id: src-langgraph-threads
    title: LangGraph Server Threads API
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
    source_type: official-doc
    relevance: Persistent thread_id with checkpoint and run history.
  - id: src-e2b-sandbox
    title: E2B Documentation
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Sandbox sessions, process handles, and working directories.
  - id: src-runtime-system-design
    title: Moonweave runtime-system module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: AgentSystem, RuntimeEnvironment, RuntimeSession boundaries.
source_claims:
  - id: claim-container-vendor
    source: src-openai-threads
    supports: runtime-system vendor evidence supports Container identity and boundary mapping.
    locator: Container integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-container-design
    source: src-runtime-system-design
    supports: Moonweave Container concept boundary within runtime-system.
    locator: Container boundary
    evidence_kind: design-inference
    confidence: high
