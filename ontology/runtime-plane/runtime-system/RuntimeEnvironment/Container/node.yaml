source_claims:
  - id: claim-container-001
    source: eng-security-mcp-nsa-2026
    supports: NSA guidance treats sandboxing and isolation as substantive security controls for tool and MCP execution. Moonweave models Container as the runtime environment that realizes such an identifiable isolation boundary; the exact fields remain a design inference.
    locator: NSA MCP Security Design Considerations > Sandboxing and isolation controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-container-002
    source: eng-security-mcp-nsa-2026
    supports: NSA guidance emphasizes sandboxing and isolation for MCP-related execution. The sandbox-17 record is Moonweave's concrete container example and does not claim that the guidance defines this ontology class.
    locator: NSA MCP Security Design Considerations > Sandboxing and isolation controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-container-003
    source: eng-security-mcp-nsa-2026
    supports: The security guidance motivates distinguishing strong execution isolation from weaker local setup. Moonweave uses that distinction to keep a host virtual environment outside Container.
    locator: NSA MCP Security Design Considerations > Sandboxing and isolation controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-container-004
    source: eng-runtime-oci-linux-config
    supports: The OCI Runtime Specification defines the Linux namespaces, devices, cgroups, seccomp, and filesystem restrictions that establish a running container's execution boundary. Treating such a running container as a RuntimeEnvironment is Moonweave's taxonomic inference.
    locator: Linux container configuration > Namespaces, devices, cgroups, seccomp, masked and read-only paths
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

