schema: moonweave.ai/ontology-node/v1
id: Container
kind: concept
status: accepted
labels: {zh: 运行时容器, en: Runtime container, ja: ランタイムコンテナ}
semantics:
  short_definition: {zh: 表示一个已预配容器实例及其隔离配置的 RuntimeEnvironment 组件。, en: A RuntimeEnvironment component representing one provisioned container instance and its isolation configuration., ja: 1 つのプロビジョニング済みコンテナインスタンスとその隔離構成を表す RuntimeEnvironment コンポーネント。}
  definition: {zh: Container 是 RuntimeEnvironment 内已标识的运行时容器实例，以镜像摘要和声明的隔离配置为特征。它不是不可变容器镜像 Artifact、受管理子进程、AgentSystem 或通用文件系统目录。, en: "A Container is an identified runtime container instance within a RuntimeEnvironment, characterized by an image digest and declared isolation profile. It is not the immutable container image artifact, a managed child process, an AgentSystem, or a generic filesystem directory.", ja: Container は RuntimeEnvironment 内の識別済みランタイムコンテナインスタンスであり、イメージダイジェストと宣言された隔離プロファイルで特徴付けられる。不変のコンテナイメージ Artifact、管理された子プロセス、AgentSystem、または一般的なファイルシステムディレクトリではない。}
  why_needed: {zh: 容器级身份让运营能够将可复现镜像出处和隔离策略与其中执行的进程和智能体工作区分开来。, en: Container-level identity lets operations distinguish reproducible image provenance and isolation policy from the processes and agent work that execute inside it., ja: コンテナレベルの識別性により、運用は再現可能なイメージ来歴と隔離ポリシーを、その内部で実行されるプロセスおよびエージェント作業から区別できる。}
  includes:
    - {zh: 容器实例 ID、镜像摘要、运行时状态和非机密隔离配置引用。, en: "Container instance ID, image digest, runtime state, and non-secret isolation profile reference.", ja: コンテナインスタンス ID、イメージダイジェスト、ランタイム状態、および非秘密の隔離プロファイル参照。}
    - {zh: 一个或多个受管理进程的已预配执行边界。, en: The provisioned execution boundary for one or more managed processes., ja: 1 つ以上の管理対象プロセスのためのプロビジョニング済み実行境界。}
  excludes:
    - {zh: 尚未作为容器实例化的镜像清单或源 Artifact。, en: An image manifest or source artifact not yet instantiated as a container., ja: まだコンテナとしてインスタンス化されていないイメージマニフェストまたはソース Artifact。}
    - {zh: 单个进程 PID、进程输出流或执行追踪。, en: "A single process PID, process output stream, or execution trace.", ja: 単一のプロセス PID、プロセス出力ストリーム、または実行トレース。}
  semantic_kind: entity
  aliases: [container instance, isolated runtime]
engineering:
  explanation: {zh: 预配流程按摘要拉取或解析镜像，使用资源和网络策略创建容器实例，并在 RuntimeEnvironment 下记录该实例。进程句柄和工作目录可与该容器关联，但不会成为容器本身。, en: "Provisioning pulls or resolves an image by digest, creates a container instance with resource and network policy, and records the instance under a RuntimeEnvironment. Process handles and working directories may be associated with that container without becoming the container itself.", ja: プロビジョニングはダイジェストでイメージを取得または解決し、リソースおよびネットワークポリシーを伴うコンテナインスタンスを作成して RuntimeEnvironment の下に記録する。プロセスハンドルと作業ディレクトリは、そのコンテナ自体になることなく関連付けられる。}
  typical_input:
    - description: {zh: 容器启动请求, en: Container launch request, ja: コンテナ起動要求}
      format: |-
        {"environment_id":"env-prod-a","image_digest":"sha256:4f3d...","isolation_profile":"restricted-network"}
  typical_output:
    - description: {zh: 容器记录, en: Container record, ja: コンテナ記録}
      format: |-
        {"container_id":"container-11","image_digest":"sha256:4f3d...","runtime_state":"running","isolation_profile":"restricted-network"}
  reference_implementations:
    - {name: Docker container concepts, url: https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-a-container/, description: "Documents containers as isolated runnable instances created from images."}
structure:
  identity_keys: [container_id]
  fields:
    - id: container_id
      labels: {zh: 容器 ID, en: Container ID, ja: コンテナ ID}
      definitions: {zh: 一个已预配容器实例的运行时标识符。, en: Runtime identifier for one provisioned container instance., ja: 1 つのプロビジョニング済みコンテナインスタンスのランタイム識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: container-11
      source_claims: [claim-container-instance]
    - id: image_digest
      labels: {zh: 镜像摘要, en: Image digest, ja: イメージダイジェスト}
      definitions: {zh: 用于创建容器的镜像的内容寻址标识符。, en: Content-addressed identifier of the image used to create the container., ja: コンテナの作成に使われたイメージのコンテンツアドレス識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:4f3d40d1bb34b1f5284c3b72c2f9902a478e3b6bfa61245f9b5f3b2e1d4a6c8e
      source_claims: [claim-container-instance]
    - id: isolation_profile
      labels: {zh: 隔离配置, en: Isolation profile, ja: 隔離プロファイル}
      definitions: {zh: 应用于此实例的资源、网络和文件系统策略的非机密引用。, en: "Non-secret reference to the resource, network, and filesystem policy applied to this instance.", ja: このインスタンスに適用されるリソース、ネットワーク、ファイルシステムポリシーへの非秘密参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: restricted-network
      source_claims: [claim-container-instance]
  constraints:
    - id: container-image-and-policy
      severity: error
      language: plain
      expression: A container record must name an immutable image digest and an isolation profile; image tags alone are insufficient for reproducible attribution.
      explanation: {zh: 可变标签和缺失的策略数据无法重建执行边界。, en: Mutable tags and absent policy data cannot reconstruct the execution boundary., ja: 可変タグと欠落したポリシーデータでは実行境界を再構成できない。}
      source_claims: [claim-container-instance]
  required_relations: [Container-part-of-RuntimeEnvironment]
examples:
  - id: container-positive
    labels: {zh: "Docker 镜像 digest 固定", en: "Docker image digest pin", ja: "Docker イメージ digest 固定"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; Container maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; Container maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; Container serving env."}
    field_values: {container_id: container-11, image_digest: sha256:4f3d40d1bb34b1f5284c3b72c2f9902a478e3b6bfa61245f9b5f3b2e1d4a6c8e, isolation_profile: restricted-network}
    related_node_ids: [Container, RuntimeEnvironment]
    related_relation_ids: [Container-part-of-RuntimeEnvironment]
    source_claims: [claim-container-instance]
  - id: container-counterexample
    labels: {zh: "Kubernetes Pod name 非 Container", en: "Kubernetes Pod name not Container", ja: "Kubernetes Pod name は Container ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style Container.", en: "ID without PROV relations cannot serve as PROV-O-style Container.", ja: "Missing PROV relations rejects Container."}
    field_values: {image_digest: sha256:4f3d40d1bb34b1f5284c3b72c2f9902a478e3b6bfa61245f9b5f3b2e1d4a6c8e}
    related_node_ids: [Artifact]
    related_relation_ids: []
    source_claims: [claim-container-instance]
  - id: container-boundary
    labels: {zh: "Container 与 Artifact 边界", en: "Container versus Artifact boundary", ja: "Container と Artifact 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; Container must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; Container must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {container_id: container-11}
    related_node_ids: [Container, ProcessHandle]
    related_relation_ids: []
    source_claims: [claim-container-instance]
  - id: container-instance-11
    labels: {zh: "python:3.12-slim 实例", en: "python 3.12 slim instance", ja: "python:3.12-slim 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->Container.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->Container.", ja: "OTel instance maps to Container."}
    field_values: {container_id: container-11, image_digest: sha256:4f3d40d1bb34b1f5284c3b72c2f9902a478e3b6bfa61245f9b5f3b2e1d4a6c8e, isolation_profile: restricted-network}
    related_node_ids: [Container, RuntimeEnvironment, ProcessHandle]
    related_relation_ids: [Container-part-of-RuntimeEnvironment]
    source_claims: [claim-container-instance]
parent_relation:
  id: Container-part-of-RuntimeEnvironment
  predicate: part_of
  target: concept:RuntimeEnvironment
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是运行环境的一部分, en: is part of runtime environment, ja: 実行環境の一部である}
  definitions: {zh: Container 被预配为一个 RuntimeEnvironment 边界的组成部分。, en: A Container is provisioned as a component of one RuntimeEnvironment boundary., ja: Container は 1 つの RuntimeEnvironment 境界のコンポーネントとしてプロビジョニングされる。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_container, labels: {zh: 具有容器, en: has container, ja: コンテナを持つ}}
  conditions:
    - id: container-parent-condition
      severity: error
      expression: The container record must reference the environment that provides its runtime isolation policy.
      explanations: {zh: 未限定范围的容器 ID 无法建立治理边界。, en: An unscoped container ID cannot establish the governing boundary., ja: スコープのないコンテナ ID では統治境界を確立できない。}
      source_claims: [claim-container-instance]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-container-instance]
relations: []
sources:
  - id: docker-container-concepts
    title: "Docker container concepts"
    url: https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-a-container/
    source_type: documentation
    relevance: Documents images, isolated container instances, and portable application execution.
source_claims:
  - id: claim-container-instance
    source: docker-container-concepts
    supports: Docker defines a container as an isolated runnable instance created from an image and packaged with the application dependencies it needs.
    locator: What is a container?
    evidence_kind: documentation
    confidence: high

