parent_relation:
  id: Container-is_a-RuntimeEnvironment
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行环境
    en: is a runtime environment
    ja: 実行環境の一種
  definitions:
    zh: 声明每个实际启动并以 root filesystem、process、mount、namespace 与资源控制形成执行边界的 Container 都是 RuntimeEnvironment；仅有镜像或配置文件尚不构成容器实例。
    en: States that every started Container whose root filesystem, process, mounts, namespaces, and resource controls form an execution boundary is a RuntimeEnvironment; an image or configuration file alone is not a container instance.
    ja: root filesystem・process・mount・namespace・resource controlで実行境界を形成する起動済みContainerはRuntimeEnvironmentです。imageや設定ファイルだけはcontainer instanceではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_runtime_environment_subtype
    labels:
      zh: 具有运行环境子类
      en: has runtime-environment subtype
      ja: 実行環境subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Container-is_a-RuntimeEnvironment-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种运行环境正例
        en: "Positive case: is a runtime environment"
        ja: 実行環境の一種の正例
      scenario_id: null
      descriptions:
        zh: sandbox-17 已按 OCI 配置启动，具有独立 rootfs、只读挂载、PID namespace、cwd 与受限进程能力。
        en: sandbox-17 is started from an OCI configuration with its own rootfs, read-only mounts, PID namespace, cwd, and constrained process capabilities.
        ja: sandbox-17はOCI設定から起動され、独自rootfs・read-only mount・PID namespace・cwd・制限process capabilityを持ちます。
      field_values: {}
      related_node_ids:
        - Container
        - RuntimeEnvironment
      related_relation_ids:
        - Container-is_a-RuntimeEnvironment
      expected_result:
        zh: 将 sandbox-17 同时识别为 Container 与 RuntimeEnvironment。
        en: Classify sandbox-17 as both Container and RuntimeEnvironment.
        ja: sandbox-17をContainerかつRuntimeEnvironmentに分類します。
      why_valid_or_invalid:
        zh: 该实例真实提供执行资源和隔离边界，满足运行环境的全部种差。
        en: The instance actually supplies execution resources and an isolation boundary, satisfying the RuntimeEnvironment differentia.
        ja: instanceが実際にexecution resourceとisolation boundaryを提供し、RuntimeEnvironment differentiaを満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-container-004
    - id: Container-is_a-RuntimeEnvironment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种运行环境边界例
        en: "Boundary case: is a runtime environment"
        ja: 実行環境の一種の境界例
      scenario_id: null
      descriptions:
        zh: image ghcr.io/acme/agent:3 只存在于镜像仓库，尚未创建容器、进程或文件系统挂载。
        en: Image ghcr.io/acme/agent:3 exists only in a registry; no container, process, or filesystem mount has been created.
        ja: image ghcr.io/acme/agent:3はregistryにあるだけで、container・process・filesystem mountは作成されていません。
      field_values: {}
      related_node_ids:
        - Container
