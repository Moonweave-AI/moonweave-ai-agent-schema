schema: moonweave.ai/ontology-node/v1
id: WorkingDirectory
kind: concept
labels:
  zh: 工作目录
  en: working directory
  ja: 作業ディレクトリ
semantics:
  short_definition:
    zh: 工作目录是记录运行环境用于解析相对路径和默认文件操作的基准目录的信息。
    en: A WorkingDirectory is an information record naming the base directory a runtime environment uses for relative-path resolution and default file operations.
    ja: WorkingDirectory は、実行環境が相対パス解決と既定ファイル操作に使う基準ディレクトリを示す情報記録である。
  definition:
    zh: 工作目录是一类环境组成信息；它以规范化路径和所属 RuntimeEnvironment 指定命令启动、文件读取写入及相对资源定位的默认基准，并可附带挂载或沙箱约束。它不是任意文件夹、仓库 URL、当前打开文件或完整运行环境。
    en: A WorkingDirectory is constituent environment information distinguished by a normalized path and owning RuntimeEnvironment that set the default base for process launch, file reads and writes, and relative resource resolution, optionally with mount or sandbox constraints. It is not any folder, a repository URL, the currently open file, or the whole runtime environment.
    ja: WorkingDirectory は、正規化パスと所属 RuntimeEnvironment により、プロセス起動、ファイル読み書き、相対資源解決の既定基準を定め、必要に応じてマウント・サンドボックス制約を持つ環境構成情報である。任意のフォルダ、リポジトリ URL、開いているファイル、実行環境全体ではない。
  why_needed:
    zh: 该信息让相对路径、文件副作用与沙箱范围能够重现和审计，避免不同执行环境把同一路径解释到不同位置。
    en: This information makes relative paths, file side effects, and sandbox scope reproducible and auditable, preventing different environments from resolving the same relative path to different places unnoticed.
    ja: この情報は相対パス、ファイル副作用、サンドボックス範囲を再現・監査可能にし、環境ごとの解決先の違いを見落とさないようにする。
  includes:
    - zh: 纳入由具体 RuntimeEnvironment 采用、以规范化目录路径记录并作为命令和文件工具默认基准的位置。
      en: Includes a normalized directory path adopted by a specific RuntimeEnvironment as the default base for commands and file tools.
      ja: 特定 RuntimeEnvironment が採用し、正規化ディレクトリパスとして記録され、コマンドとファイルツールの既定基準となる位置を含む。
  excludes:
    - zh: 不纳入仓库 URL、单个文件路径、模型输出中提到的目录、未挂载的宿主路径或 RuntimeEnvironment 本身。
      en: Excludes a repository URL, one file path, a directory merely mentioned in model output, an unmounted host path, and the RuntimeEnvironment itself.
      ja: リポジトリ URL、単一ファイルパス、モデル出力で言及されただけのディレクトリ、未マウントのホストパス、RuntimeEnvironment 自体は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 WorkingDirectory 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating WorkingDirectory, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: WorkingDirectory 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to WorkingDirectory.
      format: |-
        # Example WorkingDirectory ingest
        { "working-directory_ref": "example-1" }
      source_claims:
        - claim-working-directory-design
  typical_output:
    - description: Moonweave-local WorkingDirectory projection.
      format: '{ "schema_owner": "moonweave-local-design", "working-directory_id": "example-1" }'
      source_claims:
        - claim-working-directory-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys:
    - runtime_environment_ref
    - normalized_path
  fields:
    - id: runtime_environment_ref
      labels:
        zh: 运行环境引用
        en: runtime-environment reference
        ja: runtime environment 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际采用该目录作为解析基准的 RuntimeEnvironment。
        en: References the RuntimeEnvironment that actually adopts this directory as its resolution base.
        ja: この directory を resolution base として実際に採用する RuntimeEnvironment を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-environment:sandbox-17
      source_claims:
        - claim-working-directory-design
    - id: normalized_path
      labels:
        zh: 规范化绝对路径
        en: normalized absolute path
        ja: normalized absolute path
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按运行平台规则规范化的绝对目录路径。
        en: The absolute directory path normalized under the runtime platform's path rules.
        ja: runtime platform の path rules で normalized された absolute directory path。
      allowed_values: []
      pattern: null
      example_value: /workspace/repo
      source_claims:
        - claim-working-directory-design
    - id: path_style
      labels:
        zh: 路径风格
        en: path style
        ja: path style
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明路径按 POSIX、Windows 或环境定义的虚拟路径规则解释。
        en: Declares whether the path follows POSIX, Windows, or environment-defined virtual path rules.
        ja: path が POSIX/Windows/environment-defined virtual rules のどれで解釈されるかを示します。
      allowed_values: []
      pattern: null
      example_value: posix
      source_claims:
        - claim-working-directory-design
    - id: access_mode
      labels:
        zh: 访问模式
        en: access mode
        ja: access mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该环境将目录视为只读还是可读写。
        en: Records whether the environment treats the directory as read-only or read-write.
        ja: environment が directory を read-only/read-write のどちらとして扱うかを記録します。
      allowed_values: []
      pattern: null
      example_value: read-write
      source_claims:
        - claim-working-directory-design
    - id: mount_ref
      labels:
        zh: 挂载引用
        en: mount reference
        ja: mount 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当路径来自挂载时，引用提供其来源和挂载选项的记录。
        en: When the path is mounted, references the record that provides its source and mount options.
        ja: path が mount 由来の場合、その source と mount options の record を参照します。
      allowed_values: []
      pattern: null
      example_value: mount:sandbox-17/workspace
      source_claims:
        - claim-working-directory-design
    - id: sandbox_boundary_ref
      labels:
        zh: 沙箱边界引用
        en: sandbox-boundary reference
        ja: sandbox boundary 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用约束该目录可见路径和允许操作的沙箱边界。
        en: References the sandbox boundary constraining visible paths and allowed operations for the directory.
        ja: directory の visible paths と allowed operations を制約する sandbox boundary を参照します。
      allowed_values: []
      pattern: null
      example_value: sandbox-boundary:17
      source_claims:
        - claim-working-directory-design
  constraints:
    - id: working-directory-is-absolute-and-normalized
      severity: error
      expression_language: plain
      expression: normalized_path is absolute and contains no unresolved dot segments under path_style
      explanations:
        zh: 工作目录必须可确定地解析相对路径。
        en: The working directory must resolve relative paths deterministically.
        ja: working directory は relative paths を deterministic に解決できなければなりません。
      source_claims:
        - claim-working-directory-design
    - id: working-directory-within-runtime-authority
      severity: error
      expression_language: plain
      expression: normalized_path and access_mode are permitted by runtime_environment_ref and sandbox_boundary_ref when present
      explanations:
        zh: 目录声明不能扩大环境或沙箱实际权限。
        en: The directory declaration cannot expand the runtime or sandbox's actual authority.
        ja: directory declaration は runtime/sandbox の actual authority を拡大しません。
      source_claims:
        - claim-working-directory-design
  required_relation_constraints:
    - id: working-directory-belongs-to-one-runtime
      direction: incoming
      predicate: has_working_directory
      target_concept_id: RuntimeEnvironment
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个工作目录记录属于一个明确运行环境。
        en: A working-directory record belongs to one explicit runtime environment.
        ja: working-directory record は一つの explicit runtime environment に属します。
      source_claims:
        - claim-working-directory-design
examples:
  - id: WorkingDirectory-example-positive-001
    labels:
      zh: Cursor workspace /project
      en: Cursor workspace project path
      ja: Cursor workspace /project
    descriptions:
      zh: Cursor IDE workspace 根路径 /workspace/project 作为 WorkingDirectory path=/workspace/project、env_id=env-prod-a；agent 工具 read_file 相对此路径。
      en: Cursor IDE workspace root /workspace/project as WorkingDirectory path=/workspace/project, env_id=env-prod-a; agent tool read_file relative to this path.
      ja: Cursor workspace /workspace/project が WorkingDirectory である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      runtime_environment_ref: runtime-environment:sandbox-17
      normalized_path: /workspace/repo
      path_style: posix
      access_mode: read-write
      mount_ref: mount:sandbox-17/workspace
      sandbox_boundary_ref: sandbox-boundary:17
    related_node_ids:
      - WorkingDirectory
      - RuntimeEnvironment
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    source_claims:
      - claim-working-directory-design
  - id: WorkingDirectory-example-boundary-001
    labels:
      zh: S3 bucket 前缀非 WorkingDirectory
      en: S3 bucket prefix not WorkingDirectory
      ja: S3 bucket プレフィックスは WorkingDirectory ではない
    descriptions:
      zh: S3 uri s3://artifacts/build/ 是远程对象存储前缀，不是本地 filesystem WorkingDirectory。
      en: S3 uri s3://artifacts/build/ is remote object storage prefix, not local filesystem WorkingDirectory.
      ja: S3 prefix は WorkingDirectory ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - WorkingDirectory
      - RuntimeEnvironment
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    source_claims:
      - claim-working-directory-design
  - id: WorkingDirectory-example-3
    labels:
      zh: WorkingDirectory 与 Artifact 边界
      en: WorkingDirectory versus Artifact boundary
      ja: WorkingDirectory と Artifact 境界
    descriptions:
      zh: WorkingDirectory 是运行时 cwd 引用；PatchArtifact/ExportArtifact 是生成输出 Entity；路径引用不等于 Artifact。
      en: WorkingDirectory is runtime cwd reference; PatchArtifact/ExportArtifact are generated output Entity; path reference is not Artifact.
      ja: WorkingDirectory は cwd 参照、Artifact は出力 Entity である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - WorkingDirectory
    related_relation_ids: []
    source_claims:
      - claim-working-directory-vendor
      - claim-working-directory-design
  - id: WorkingDirectory-example-4
    labels:
      zh: /workspace/project 实例
      en: /workspace/project instance
      ja: /workspace/project 事例
    descriptions:
      zh: WorkingDirectory workdir_id=workdir-5、path=/workspace/project、container_id=cr-11、resolved_at=2026-01-15T08:00:01Z。
      en: WorkingDirectory workdir_id=workdir-5, path=/workspace/project, container_id=cr-11, resolved_at=2026-01-15T08:00:01Z.
      ja: workdir-5 /workspace/project を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - WorkingDirectory
    related_relation_ids: []
    source_claims:
      - claim-working-directory-vendor
      - claim-working-directory-design
parent_relation:
  id: RuntimeEnvironment-has_working_directory-WorkingDirectory
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有工作目录
    en: has working directory
    ja: 作業ディレクトリを持つ
  definitions:
    zh: 表示 RuntimeEnvironment 为进程启动和相对路径解析设置的默认 WorkingDirectory；目录是环境的一项组成信息，不等于整个环境，也不由仓库 URL 或当前打开文件代替。
    en: Relates a RuntimeEnvironment to the default WorkingDirectory used for process launch and relative-path resolution; the directory is constituent environment information, not the whole environment, a repository URL, or an open file.
    ja: RuntimeEnvironmentをprocess launchとrelative-path resolutionのdefault WorkingDirectoryへ結びます。directoryはenvironmentの構成情報で、environment全体・repository URL・open fileではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其工作目录
      en: working directory of
      ja: その作業ディレクトリである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-working-directory-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-openai-threads
    title: OpenAI Assistants Threads API
    url: https://platform.openai.com/docs/api-reference/threads
    source_type: official-doc
    relevance: thread_id preserving multi-turn context across runs.
  - id: src-langgraph-threads
    title: LangGraph Server Threads API
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
    source_type: official-doc
    relevance: Persistent thread_id with checkpoint and run history.
  - id: src-e2b-sandbox
    title: E2B Documentation
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Sandbox sessions, process handles, and working directories.
  - id: src-runtime-system-design
    title: Moonweave runtime-system module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: AgentSystem, RuntimeEnvironment, RuntimeSession boundaries.
source_claims:
  - id: claim-working-directory-vendor
    source: src-openai-threads
    supports: runtime-system vendor evidence supports WorkingDirectory identity and boundary mapping.
    locator: WorkingDirectory integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-working-directory-design
    source: src-runtime-system-design
    supports: Moonweave WorkingDirectory concept boundary within runtime-system.
    locator: WorkingDirectory boundary
    evidence_kind: design-inference
    confidence: high
