schema: moonweave.ai/ontology-node/v1
id: WorkingDirectory
kind: concept
status: accepted
labels: {zh: 工作目录, en: Working directory, ja: 作業ディレクトリ}
semantics:
  short_definition: {zh: 标识授权文件系统基准的 RuntimeEnvironment 组件，用于解析受管理运行时工作的相对路径。, en: A RuntimeEnvironment component that identifies an authorized filesystem base used to resolve relative paths for managed runtime work., ja: 管理対象ランタイム作業の相対パスを解決するために、認可されたファイルシステム基準を識別する RuntimeEnvironment コンポーネント。}
  definition: {zh: WorkingDirectory 是 RuntimeEnvironment 内规范化且受策略限定的目录引用。它标识进程和文件操作使用的基路径或挂载工作区；它不是目录的完整文件树、源 Artifact、没有策略证据的可变进程当前目录值，或宽泛主机文件系统根目录。, en: "A WorkingDirectory is a normalized, policy-scoped directory reference within a RuntimeEnvironment. It identifies the base path or mounted workspace used by processes and file operations; it is not the directory's entire file tree, a source Artifact, a mutable process current-directory value without policy evidence, or a broad host filesystem root.", ja: WorkingDirectory は RuntimeEnvironment 内の正規化されポリシーでスコープされたディレクトリ参照である。プロセスとファイル操作で使用する基底パスまたはマウント済みワークスペースを識別し、ディレクトリ全体のファイルツリー、ソース Artifact、ポリシー証拠のない可変なプロセスカレントディレクトリ値、または広範なホストファイルシステムルートではない。}
  why_needed: {zh: 产出文件的工具和子进程需要确定性的相对路径解析和明确授权边界，以防读写悄然逃逸出预期工作区。, en: File-producing tools and child processes need deterministic relative-path resolution and an explicit authorization boundary to prevent writes or reads from silently escaping the intended workspace., ja: ファイルを生成するツールと子プロセスには、書き込みまたは読み取りが意図したワークスペースから黙って逸脱しないよう、決定的な相対パス解決と明示的な認可境界が必要である。}
  includes:
    - {zh: 稳定目录 ID、规范化路径或逻辑路径引用、访问模式和授权根引用。, en: "Stable directory ID, normalized path or logical path reference, access mode, and authorized-root reference.", ja: 安定したディレクトリ ID、正規化パスまたは論理パス参照、アクセスモード、および認可済みルート参照。}
    - {zh: 受管理相对文件系统操作的已批准基目录。, en: The approved base directory for managed relative filesystem operations., ja: 管理対象の相対ファイルシステム操作のために承認された基底ディレクトリ。}
  excludes:
    - {zh: 路径下的所有文件、git 仓库 Artifact，或规范化与授权前的任意用户提供路径。, en: "All files under the path, a git repository artifact, or an arbitrary user-provided path before normalization and authorization.", ja: パス配下のすべてのファイル、git リポジトリ Artifact、または正規化と認可前の任意のユーザー提供パス。}
    - {zh: Container 或 ProcessHandle；它们可以使用目录但不是目录本身。, en: "A Container or ProcessHandle, which can use a directory without being one.", ja: Container または ProcessHandle。これらはディレクトリを使用できるが、ディレクトリそのものではない。}
  semantic_kind: entity
  aliases: [workspace root, process cwd boundary]
engineering:
  explanation: {zh: 环境预配流程解析已批准的基目录或挂载点。进程启动接收该目录引用；所有相对路径都相对于它规范化，并在发生副作用前检查是否位于授权根目录内。生成的文件成为独立 Artifact 或状态记录。, en: Environment provisioning resolves an approved base directory or mount. A process launch receives that directory reference; all relative paths are normalized against it and checked against authorized roots before side effects occur. Resulting files become separate Artifacts or state records., ja: 環境プロビジョニングは承認済みの基底ディレクトリまたはマウントを解決する。プロセス起動はそのディレクトリ参照を受け取り、すべての相対パスはそれに対して正規化され、副作用が生じる前に認可済みルートに対して検査される。結果のファイルは別個の Artifact または状態記録となる。}
  typical_input:
    - description: {zh: 工作区授权, en: Workspace authorization, ja: ワークスペース認可}
      format: |-
        {"environment_id":"env-prod-a","directory_ref":"workspace-prod/app","access_mode":"read_write","authorized_root_ref":"workspace-prod"}
  typical_output:
    - description: {zh: 工作目录记录, en: Working directory record, ja: 作業ディレクトリ記録}
      format: |-
        {"working_directory_id":"workdir-5","directory_ref":"workspace-prod/app","access_mode":"read_write","normalized":true}
  reference_implementations:
    - {name: POSIX getcwd, url: https://pubs.opengroup.org/onlinepubs/9799919799/functions/getcwd.html, description: "Defines obtaining the current working directory as an absolute pathname."}
structure:
  identity_keys: [working_directory_id, directory_ref]
  fields:
    - id: working_directory_id
      labels: {zh: 工作目录 ID, en: Working directory ID, ja: 作業ディレクトリ ID}
      definitions: {zh: 一个环境中已批准目录引用的稳定标识符。, en: Stable identifier for one approved directory reference in an environment., ja: 1 つの環境内で承認されたディレクトリ参照の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: workdir-5
      source_claims: [claim-working-directory-path]
    - id: directory_ref
      labels: {zh: 目录引用, en: Directory reference, ja: ディレクトリ参照}
      definitions: {zh: 解析到授权根目录内的规范化逻辑或绝对路径引用。, en: Normalized logical or absolute path reference that resolves within an authorized root., ja: 認可済みルート内で解決する正規化された論理または絶対パス参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: workspace-prod/app
      source_claims: [claim-working-directory-path]
    - id: access_mode
      labels: {zh: 访问模式, en: Access mode, ja: アクセスモード}
      definitions: {zh: 此目录边界的授权文件操作模式。, en: Authorized file operation mode for this directory boundary., ja: このディレクトリ境界に対する認可済みファイル操作モード。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [read_only, read_write]
      example_value: read_write
      source_claims: [claim-working-directory-path]
  constraints:
    - id: working-directory-authorized-root
      severity: error
      language: plain
      expression: Normalize directory_ref before use and require it to remain within an explicitly authorized root; never authorize a path solely because a process supplied it.
      explanation: {zh: 确定性路径解析和边界检查可防止文件系统遍历到已批准工作区之外。, en: Deterministic path resolution and boundary checks prevent filesystem traversal outside the approved workspace., ja: 決定的なパス解決と境界検査により、承認済みワークスペース外へのファイルシステム走査を防ぐ。}
      source_claims: [claim-working-directory-path]
  required_relations: [WorkingDirectory-part-of-RuntimeEnvironment]
examples:
  - id: working-directory-positive
    labels: {zh: "Cursor workspace /project", en: "Cursor workspace project path", ja: "Cursor workspace /project"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; WorkingDirectory maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; WorkingDirectory maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; WorkingDirectory serving env."}
    field_values: {working_directory_id: workdir-5, directory_ref: workspace-prod/app, access_mode: read_write}
    related_node_ids: [WorkingDirectory, RuntimeEnvironment, ProcessHandle]
    related_relation_ids: [WorkingDirectory-part-of-RuntimeEnvironment]
    source_claims: [claim-working-directory-path]
  - id: working-directory-counterexample
    labels: {zh: "S3 bucket 前缀非 WorkingDirectory", en: "S3 bucket prefix not WorkingDirectory", ja: "S3 bucket プレフィックスは WorkingDirectory ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style WorkingDirectory.", en: "ID without PROV relations cannot serve as PROV-O-style WorkingDirectory.", ja: "Missing PROV relations rejects WorkingDirectory."}
    field_values: {path: ../../secrets}
    related_node_ids: [RuntimeEnvironment]
    related_relation_ids: []
    source_claims: [claim-working-directory-path]
  - id: working-directory-boundary
    labels: {zh: "WorkingDirectory 与 Artifact 边界", en: "WorkingDirectory versus Artifact boundary", ja: "WorkingDirectory と Artifact 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; WorkingDirectory must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; WorkingDirectory must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {working_directory_id: workdir-5, directory_ref: workspace-prod/app}
    related_node_ids: [WorkingDirectory, Artifact]
    related_relation_ids: []
    source_claims: [claim-working-directory-path]
  - id: working-directory-instance-workdir-5
    labels: {zh: "/workspace/project 实例", en: "/workspace/project instance", ja: "/workspace/project 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->WorkingDirectory.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->WorkingDirectory.", ja: "OTel instance maps to WorkingDirectory."}
    field_values: {working_directory_id: workdir-5, directory_ref: workspace-prod/app, access_mode: read_write}
    related_node_ids: [WorkingDirectory, RuntimeEnvironment, ProcessHandle]
    related_relation_ids: [WorkingDirectory-part-of-RuntimeEnvironment]
    source_claims: [claim-working-directory-path]
parent_relation:
  id: WorkingDirectory-part-of-RuntimeEnvironment
  predicate: part_of
  target: concept:RuntimeEnvironment
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是运行环境的一部分, en: is part of runtime environment, ja: 実行環境の一部である}
  definitions: {zh: WorkingDirectory 是一个 RuntimeEnvironment 的授权文件系统组件。, en: A WorkingDirectory is an authorized filesystem component of one RuntimeEnvironment., ja: WorkingDirectory は 1 つの RuntimeEnvironment の認可済みファイルシステムコンポーネントである。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_working_directory, labels: {zh: 具有工作目录, en: has working directory, ja: 作業ディレクトリを持つ}}
  conditions:
    - id: working-directory-parent-condition
      severity: error
      expression: The directory reference and its authorization policy must belong to the target RuntimeEnvironment.
      explanations: {zh: 没有明确挂载或策略证据时，工作区不能跨环境复用。, en: A workspace cannot be reused across environments without explicit mount or policy evidence., ja: 明示的なマウントまたはポリシー証拠なしに、ワークスペースを環境間で再利用することはできない。}
      source_claims: [claim-working-directory-path]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-working-directory-path]
relations: []
sources:
  - id: posix-getcwd
    title: "POSIX getcwd"
    url: https://pubs.opengroup.org/onlinepubs/9799919799/functions/getcwd.html
    source_type: standard
    relevance: Defines the current working directory as an absolute pathname used for process-relative path context.
source_claims:
  - id: claim-working-directory-path
    source: posix-getcwd
    supports: POSIX defines getcwd as obtaining the absolute pathname of the current working directory used for relative path context.
    locator: DESCRIPTION
    evidence_kind: standard
    confidence: high

