schema: moonweave.ai/ontology-node/v1
id: WorkingDirectory
kind: concept
status: accepted
labels:
  zh: 工作目录
  en: working directory
  ja: 作業ディレクトリ
semantics:
  short_definition:
    zh: 工作目录是记录运行环境用于解析相对路径和默认文件操作的基准目录的信息。
    en: A WorkingDirectory is an information record naming the base directory a runtime environment uses for relative-path resolution and default file operations.
    ja: WorkingDirectory は、実行環境が相対パス解決と既定ファイル操作に使う基準ディレクトリを示す情報記録である。
  definition:
    zh: 工作目录是一类环境组成信息；它以规范化路径和所属 RuntimeEnvironment 指定命令启动、文件读取写入及相对资源定位的默认基准，并可附带挂载或沙箱约束。它不是任意文件夹、仓库 URL、当前打开文件或完整运行环境。
    en: A WorkingDirectory is constituent environment information distinguished by a normalized path and owning RuntimeEnvironment that set the default base for process launch, file reads and writes, and relative resource resolution, optionally with mount or sandbox constraints. It is not any folder, a repository URL, the currently open file, or the whole runtime environment.
    ja: WorkingDirectory は、正規化パスと所属 RuntimeEnvironment により、プロセス起動、ファイル読み書き、相対資源解決の既定基準を定め、必要に応じてマウント・サンドボックス制約を持つ環境構成情報である。任意のフォルダ、リポジトリ URL、開いているファイル、実行環境全体ではない。
  why_needed:
    zh: 该信息让相对路径、文件副作用与沙箱范围能够重现和审计，避免不同执行环境把同一路径解释到不同位置。
    en: This information makes relative paths, file side effects, and sandbox scope reproducible and auditable, preventing different environments from resolving the same relative path to different places unnoticed.
    ja: この情報は相対パス、ファイル副作用、サンドボックス範囲を再現・監査可能にし、環境ごとの解決先の違いを見落とさないようにする。
  includes:
    - zh: 纳入由具体 RuntimeEnvironment 采用、以规范化目录路径记录并作为命令和文件工具默认基准的位置。
      en: Includes a normalized directory path adopted by a specific RuntimeEnvironment as the default base for commands and file tools.
      ja: 特定 RuntimeEnvironment が採用し、正規化ディレクトリパスとして記録され、コマンドとファイルツールの既定基準となる位置を含む。
  excludes:
    - zh: 不纳入仓库 URL、单个文件路径、模型输出中提到的目录、未挂载的宿主路径或 RuntimeEnvironment 本身。
      en: Excludes a repository URL, one file path, a directory merely mentioned in model output, an unmounted host path, and the RuntimeEnvironment itself.
      ja: リポジトリ URL、単一ファイルパス、モデル出力で言及されただけのディレクトリ、未マウントのホストパス、RuntimeEnvironment 自体は含まない。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - runtime_environment_ref
    - normalized_path
  fields:
    - id: runtime_environment_ref
      labels:
        zh: 运行环境引用
        en: runtime-environment reference
        ja: runtime environment 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际采用该目录作为解析基准的 RuntimeEnvironment。
        en: References the RuntimeEnvironment that actually adopts this directory as its resolution base.
        ja: この directory を resolution base として実際に採用する RuntimeEnvironment を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-environment:sandbox-17
      source_claims:
        - claim-working-directory-002
    - id: normalized_path
      labels:
        zh: 规范化绝对路径
        en: normalized absolute path
        ja: normalized absolute path
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按运行平台规则规范化的绝对目录路径。
        en: The absolute directory path normalized under the runtime platform's path rules.
        ja: runtime platform の path rules で normalized された absolute directory path。
      allowed_values: []
      pattern: null
      example_value: /workspace/repo
      source_claims:
        - claim-working-directory-002
    - id: path_style
      labels:
        zh: 路径风格
        en: path style
        ja: path style
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明路径按 POSIX、Windows 或环境定义的虚拟路径规则解释。
        en: Declares whether the path follows POSIX, Windows, or environment-defined virtual path rules.
        ja: path が POSIX/Windows/environment-defined virtual rules のどれで解釈されるかを示します。
      allowed_values: []
      pattern: null
      example_value: posix
      source_claims:
        - claim-working-directory-002
    - id: access_mode
      labels:
        zh: 访问模式
        en: access mode
        ja: access mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该环境将目录视为只读还是可读写。
        en: Records whether the environment treats the directory as read-only or read-write.
        ja: environment が directory を read-only/read-write のどちらとして扱うかを記録します。
      allowed_values: []
      pattern: null
      example_value: read-write
      source_claims:
        - claim-working-directory-002
    - id: mount_ref
      labels:
        zh: 挂载引用
        en: mount reference
        ja: mount 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当路径来自挂载时，引用提供其来源和挂载选项的记录。
        en: When the path is mounted, references the record that provides its source and mount options.
        ja: path が mount 由来の場合、その source と mount options の record を参照します。
      allowed_values: []
      pattern: null
      example_value: mount:sandbox-17/workspace
      source_claims:
        - claim-working-directory-002
    - id: sandbox_boundary_ref
      labels:
        zh: 沙箱边界引用
        en: sandbox-boundary reference
        ja: sandbox boundary 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用约束该目录可见路径和允许操作的沙箱边界。
        en: References the sandbox boundary constraining visible paths and allowed operations for the directory.
        ja: directory の visible paths と allowed operations を制約する sandbox boundary を参照します。
      allowed_values: []
      pattern: null
      example_value: sandbox-boundary:17
      source_claims:
        - claim-working-directory-002
  constraints:
    - id: working-directory-is-absolute-and-normalized
      severity: error
      expression_language: plain
      expression: normalized_path is absolute and contains no unresolved dot segments under path_style
      explanations:
        zh: 工作目录必须可确定地解析相对路径。
        en: The working directory must resolve relative paths deterministically.
        ja: working directory は relative paths を deterministic に解決できなければなりません。
      source_claims:
        - claim-working-directory-002
    - id: working-directory-within-runtime-authority
      severity: error
      expression_language: plain
      expression: normalized_path and access_mode are permitted by runtime_environment_ref and sandbox_boundary_ref when present
      explanations:
        zh: 目录声明不能扩大环境或沙箱实际权限。
        en: The directory declaration cannot expand the runtime or sandbox's actual authority.
        ja: directory declaration は runtime/sandbox の actual authority を拡大しません。
      source_claims:
        - claim-working-directory-002
  required_relation_constraints:
    - id: working-directory-belongs-to-one-runtime
      direction: incoming
      predicate: has_working_directory
      target_concept_id: RuntimeEnvironment
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 一个工作目录记录属于一个明确运行环境。
        en: A working-directory record belongs to one explicit runtime environment.
        ja: working-directory record は一つの explicit runtime environment に属します。
      source_claims:
        - claim-working-directory-002
examples:
  - id: WorkingDirectory-example-positive-001
    kind: positive
    labels:
      zh: 工作目录正例
      en: Positive example of working directory
      ja: 作業ディレクトリの正例
    scenario_id: null
    descriptions:
      zh: sandbox-17 将规范化路径 /workspace/repo 挂载为可写目录，并把所有相对 shell 与文件工具路径从该位置解析。
      en: sandbox-17 mounts normalized path /workspace/repo as writable and resolves every relative shell and file-tool path from that location.
      ja: sandbox-17 は正規化パス /workspace/repo を書き込み可能にマウントし、相対 shell・ファイルツールパスをすべてそこから解決する。
    field_values:
      runtime_environment_ref: runtime-environment:sandbox-17
      normalized_path: /workspace/repo
      path_style: posix
      access_mode: read-write
      mount_ref: mount:sandbox-17/workspace
      sandbox_boundary_ref: sandbox-boundary:17
    related_node_ids:
      - WorkingDirectory
      - RuntimeEnvironment
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    expected_result:
      zh: /workspace/repo 的记录归类为 WorkingDirectory，并作为 sandbox-17 的组成信息显示。
      en: The /workspace/repo record is classified as WorkingDirectory and shown as constituent information of sandbox-17.
      ja: /workspace/repo の記録は WorkingDirectory に分類され、sandbox-17 の構成情報として表示される。
    why_valid_or_invalid:
      zh: 目录已绑定到特定环境，并实际决定相对命令和文件操作的解析基准。
      en: The directory is bound to a specific environment and actually determines the resolution base for relative commands and file operations.
      ja: ディレクトリが特定環境に束縛され、相対コマンドとファイル操作の解決基準を実際に決めている。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-working-directory-003
  - id: WorkingDirectory-example-boundary-001
    kind: boundary
    labels:
      zh: 工作目录边界例
      en: Boundary case for working directory
      ja: 作業ディレクトリの境界例
    scenario_id: null
    descriptions:
      zh: 任务输入包含仓库地址 https://example.test/repo.git，但环境尚未克隆或挂载该仓库，也未把任何本地目录设为执行基准。
      en: Task input contains repository URL https://example.test/repo.git, but the environment has not cloned or mounted it and has set no local directory as the execution base.
      ja: タスク入力にリポジトリ URL https://example.test/repo.git があるが、環境はまだ clone または mount せず、実行基準となるローカルディレクトリを設定していない。
    field_values: {}
    related_node_ids:
      - WorkingDirectory
      - RuntimeEnvironment
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    expected_result:
      zh: 该 URL 是远程资源引用，不能归类为 WorkingDirectory。
      en: The URL is a remote-resource reference and is not classified as WorkingDirectory.
      ja: この URL は遠隔資源参照であり、WorkingDirectory には分類されない。
    why_valid_or_invalid:
      zh: 工作目录必须是特定运行环境实际采用的目录基准；远程地址既不是目录位置也未参与路径解析。
      en: A working directory must be a directory base actually adopted by a runtime environment; a remote address is neither that directory location nor active in path resolution.
      ja: 作業ディレクトリは実行環境が実際に採用したディレクトリ基準でなければならず、遠隔アドレスはその位置でもパス解決の参加者でもない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-working-directory-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RuntimeEnvironment-has_working_directory-WorkingDirectory
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有工作目录
    en: has working directory
    ja: 作業ディレクトリを持つ
  definitions:
    zh: 表示 RuntimeEnvironment 为进程启动和相对路径解析设置的默认 WorkingDirectory；目录是环境的一项组成信息，不等于整个环境，也不由仓库 URL 或当前打开文件代替。
    en: Relates a RuntimeEnvironment to the default WorkingDirectory used for process launch and relative-path resolution; the directory is constituent environment information, not the whole environment, a repository URL, or an open file.
    ja: RuntimeEnvironmentをprocess launchとrelative-path resolutionのdefault WorkingDirectoryへ結びます。directoryはenvironmentの構成情報で、environment全体・repository URL・open fileではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是其工作目录
      en: working directory of
      ja: その作業ディレクトリである
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RuntimeEnvironment-has_working_directory-WorkingDirectory-example-positive-manual-001
      kind: positive
      labels:
        zh: 具有工作目录正例
        en: "Positive case: has working directory"
        ja: 作業ディレクトリを持つの正例
      scenario_id: null
      descriptions:
        zh: container sandbox-17 将 OCI process.cwd 设为绝对路径 /workspace/repo，所有相对 shell 与文件工具路径均从该处解析。
        en: Container sandbox-17 sets OCI process.cwd to absolute path /workspace/repo, from which all relative shell and file-tool paths are resolved.
        ja: container sandbox-17はOCI process.cwdをabsolute path /workspace/repoに設定し、relative shell/file-tool pathをそこからresolveします。
      field_values: {}
      related_node_ids:
        - RuntimeEnvironment
        - WorkingDirectory
      related_relation_ids:
        - RuntimeEnvironment-has_working_directory-WorkingDirectory
      expected_result:
        zh: 断言 sandbox-17 has_working_directory /workspace/repo。
        en: Assert that sandbox-17 has_working_directory /workspace/repo.
        ja: sandbox-17 has_working_directory /workspace/repoをassertします。
      why_valid_or_invalid:
        zh: 运行环境身份与实际生效的 cwd 值同时存在，且路径为进程默认解析基址。
        en: The runtime-environment identity and effective cwd are both present, and the path is the process's default resolution base.
        ja: runtime-environment identityとeffective cwdがあり、そのpathがprocessのdefault resolution baseです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-working-directory-005
    - id: RuntimeEnvironment-has_working_directory-WorkingDirectory-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 具有工作目录边界例
        en: "Boundary case: has working directory"
        ja: 作業ディレクトリを持つの境界例
      scenario_id: null
      descriptions:
        zh: 任务输入只有 https://example.test/repo.git；仓库尚未克隆或挂载，进程 cwd 仍为 /tmp。
        en: Task input contains only https://example.test/repo.git; the repository is neither cloned nor mounted, and process cwd remains /tmp.
        ja: task inputにはhttps://example.test/repo.gitだけがあり、clone/mountされずprocess cwdは/tmpのままです。
      field_values: {}
      related_node_ids:
        - RuntimeEnvironment
        - WorkingDirectory
      related_relation_ids:
        - RuntimeEnvironment-has_working_directory-WorkingDirectory
      expected_result:
        zh: 不得把仓库 URL 当作该环境的 WorkingDirectory。
        en: Do not treat the repository URL as the environment's WorkingDirectory.
        ja: repository URLをenvironmentのWorkingDirectoryとして扱いません。
      why_valid_or_invalid:
        zh: 网络标识不是进程实际采用的本地路径。
        en: A network identifier is not the local path actually used by the process.
        ja: network identifierはprocessが実際に使うlocal pathではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-working-directory-005
  source_claims:
    - claim-working-directory-005
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Agents Sessions、LangGraph thread 与 POSIX 进程环境逐项核验，RuntimeSession 生命周期语义成立。
    en: Verified against OpenAI Agents Sessions, LangGraph thread persistence, and POSIX process environment. RuntimeSession lifecycle holds.
    ja: OpenAI Agents Sessions、LangGraph thread、POSIX process environment に照らし RuntimeSession lifecycle を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-working-directory-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documentation exposes filesystem operations within a workspace-backed runtime context. Moonweave records the normalized base directory for those relative operations as WorkingDirectory.
    locator: Deep Agents JavaScript docs > Filesystem backends and workspace access
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-working-directory-002
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents filesystem backends resolve operations inside an accessible workspace or sandbox rather than against a repository URL alone. Moonweave design inference: runtime-environment reference plus normalized absolute path identifies the working-directory component, while path style, access mode, mount, and sandbox boundary explain how relative operations resolve."
    locator: Deep Agents JavaScript documentation > Filesystem backends, workspace access, and sandbox execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-working-directory-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documentation treats filesystem access as an execution capability scoped to a workspace or backend. The /workspace/repo record makes Moonweave's base-directory component explicit.
    locator: Deep Agents JavaScript docs > Filesystem backends and workspace access
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-working-directory-004
    source: eng-fw-deepagents-js-docs
    supports: The documented filesystem backend operates on an accessible workspace, not on a repository URL alone. Moonweave uses actual environment adoption as the WorkingDirectory boundary.
    locator: Deep Agents JavaScript docs > Filesystem backends and workspace access
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-working-directory-005
    source: eng-runtime-oci-linux-config
    supports: The OCI runtime configuration requires process.cwd and requires it to be an absolute path used as the executable's working directory. Moonweave represents the effective value as WorkingDirectory composed under the actual RuntimeEnvironment.
    locator: OCI Runtime Specification > Configuration > Process > cwd is required and absolute
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

