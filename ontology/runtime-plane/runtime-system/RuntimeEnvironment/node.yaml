schema: moonweave.ai/ontology-node/v1
id: RuntimeEnvironment
kind: concept
status: accepted
labels: {zh: 运行环境, en: Runtime environment, ja: 実行環境}
semantics:
  short_definition: {zh: 为 AgentSystem 提供操作系统、隔离、文件系统和策略边界的已标识执行上下文。, en: "An identified execution context that supplies the operating-system, isolation, filesystem, and policy boundary for an AgentSystem.", ja: AgentSystem にオペレーティングシステム、隔離、ファイルシステム、およびポリシー境界を提供する識別済みの実行コンテキスト。}
  definition: {zh: RuntimeEnvironment 是 AgentSystem 执行工作的主机、容器、沙箱或进程上下文的持久描述符。它捕获环境指纹和授权的执行边界；它不是 AgentSystem 的配置、某个 ProcessHandle、单独的工作目录路径或执行结果。, en: "A RuntimeEnvironment is a durable descriptor of the host, container, sandbox, or process context in which an AgentSystem performs work. It captures an environment fingerprint and authorized execution boundary; it is not the AgentSystem's configuration, a particular ProcessHandle, a working directory path alone, or an execution result.", ja: RuntimeEnvironment は AgentSystem が作業を行うホスト、コンテナ、サンドボックス、またはプロセスコンテキストの永続的な記述子である。環境フィンガープリントと認可された実行境界を保持し、AgentSystem の構成、特定の ProcessHandle、単独の作業ディレクトリパス、または実行結果ではない。}
  why_needed: {zh: 可复现性、隔离和事件分析要求明确回答运行时工作在何处执行，以及应用了哪种环境策略。, en: "Reproducibility, isolation, and incident analysis require an explicit answer to where runtime work was performed and which environmental policy applied.", ja: 再現性、隔離、インシデント分析には、実行時の作業がどこで実施され、どの環境ポリシーが適用されたかへの明示的な回答が必要である。}
  includes:
    - {zh: 环境 ID、执行模式、镜像或运行时指纹、策略指纹和授权文件系统根引用。, en: "Environment ID, execution mode, image or runtime fingerprint, policy fingerprint, and authorized filesystem root reference.", ja: 環境 ID、実行モード、イメージまたはランタイムフィンガープリント、ポリシーフィンガープリント、および認可済みファイルシステムルート参照。}
    - {zh: 容器、受管理进程句柄和工作目录描述符的组成边界。, en: "A composition boundary for containers, managed process handles, and working-directory descriptors.", ja: コンテナ、管理されたプロセスハンドル、作業ディレクトリ記述子のための合成境界。}
  excludes:
    - {zh: 源代码工件内容、AgentSystem 部署配置或正在进行的执行 Activity。, en: "Source code artifact contents, an AgentSystem deployment configuration, or a live execution Activity.", ja: ソースコード Artifact の内容、AgentSystem のデプロイ構成、または進行中の実行 Activity。}
    - {zh: 原始环境变量值、机密或瞬时 stdout/stderr 缓冲区。, en: "Raw environment-variable values, secrets, or transient stdout/stderr buffers.", ja: 生の環境変数値、秘密情報、または一時的な stdout/stderr バッファー。}
  semantic_kind: entity
  aliases: [execution environment, runtime host boundary]
engineering:
  explanation: {zh: 预配流程解析环境镜像或主机策略，创建环境描述符，并在该边界内启动智能体系统。执行和子进程记录环境 ID，使操作人员无需在本体数据中存储凭据即可重建隔离、文件系统授权和运行时版本。, en: "Provisioning resolves an environment image or host policy, creates an environment descriptor, and starts an agent system inside that boundary. Executions and child processes record the environment ID so operators can reconstruct isolation, filesystem authorization, and runtime version without storing credentials in ontology data.", ja: プロビジョニングは環境イメージまたはホストポリシーを解決し、環境記述子を作成して、その境界内でエージェントシステムを開始する。Execution と子プロセスは環境 ID を記録するため、運用者はオントロジーデータに資格情報を保存せずに隔離、ファイルシステム認可、ランタイムバージョンを再構成できる。}
  typical_input:
    - description: {zh: 环境预配请求, en: Environment provisioning request, ja: 環境プロビジョニング要求}
      format: |-
        {"environment_id":"env-prod-a","execution_mode":"container","image_digest":"sha256:4f3d...","authorized_root_ref":"workspace-prod"}
  typical_output:
    - description: {zh: 运行环境记录, en: Runtime environment record, ja: 実行環境記録}
      format: |-
        {"environment_id":"env-prod-a","execution_mode":"container","policy_fingerprint":"policy-2026-07","status":"ready"}
  reference_implementations:
    - {name: Docker container concepts, url: https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-a-container/, description: "Documents containers as isolated, portable units that package application code and dependencies."}
structure:
  identity_keys: [environment_id, policy_fingerprint]
  fields:
    - id: environment_id
      labels: {zh: 环境 ID, en: Environment ID, ja: 環境 ID}
      definitions: {zh: 一个已预配运行时边界的稳定标识符。, en: Stable identifier for one provisioned runtime boundary., ja: 1 つのプロビジョニング済みランタイム境界の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: env-prod-a
      source_claims: [claim-runtime-environment-boundary]
    - id: execution_mode
      labels: {zh: 执行模式, en: Execution mode, ja: 実行モード}
      definitions: {zh: 此运行时边界使用的隔离类别。, en: Isolation category used by this runtime boundary., ja: このランタイム境界で用いる隔離カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [container, host_process, sandbox]
      example_value: container
      source_claims: [claim-runtime-environment-boundary]
    - id: policy_fingerprint
      labels: {zh: 策略指纹, en: Policy fingerprint, ja: ポリシーフィンガープリント}
      definitions: {zh: 应用于此环境的非机密隔离和访问策略的版本化引用或摘要。, en: Versioned reference or digest of the non-secret isolation and access policy applied to this environment., ja: この環境に適用される非秘密の隔離およびアクセスポリシーのバージョン付き参照またはダイジェスト。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: policy-2026-07
      source_claims: [claim-runtime-environment-boundary]
  constraints:
    - id: runtime-environment-nonsecret-descriptor
      severity: error
      language: plain
      expression: Record environment identity, isolation mode, and policy fingerprint, but do not store raw credentials, environment-variable secret values, or private keys in this descriptor.
      explanation: {zh: 环境可观测性必须支持归因，但不能变成机密存储库。, en: Environment observability must support attribution without becoming a secret store., ja: 環境の可観測性は、秘密情報ストアにならずに帰属を支えなければならない。}
      source_claims: [claim-runtime-environment-boundary]
  required_relations: []
examples:
  - id: runtime-environment-positive
    labels: {zh: "Docker devcontainer + LangGraph", en: "Docker devcontainer plus LangGraph", ja: "Docker devcontainer + LangGraph"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; RuntimeEnvironment maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; RuntimeEnvironment maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; RuntimeEnvironment serving env."}
    field_values: {environment_id: env-prod-a, execution_mode: container, policy_fingerprint: policy-2026-07}
    related_node_ids: [RuntimeEnvironment, AgentSystem, Container]
    related_relation_ids: [RuntimeEnvironment-hosts-AgentSystem]
    source_claims: [claim-runtime-environment-boundary]
  - id: runtime-environment-counterexample
    labels: {zh: "cloud region 字符串非 Environment", en: "Cloud region string not Environment", ja: "cloud region 文字列は Environment ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style RuntimeEnvironment.", en: "ID without PROV relations cannot serve as PROV-O-style RuntimeEnvironment.", ja: "Missing PROV relations rejects RuntimeEnvironment."}
    field_values: {artifact_id: agent-config-42}
    related_node_ids: [Artifact, AgentSystem]
    related_relation_ids: []
    source_claims: [claim-runtime-environment-boundary]
  - id: runtime-environment-boundary
    labels: {zh: "Environment 与 Container 边界", en: "Environment versus Container boundary", ja: "Environment と Container 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; RuntimeEnvironment must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; RuntimeEnvironment must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {environment_id: env-prod-a}
    related_node_ids: [RuntimeEnvironment, ProcessHandle]
    related_relation_ids: []
    source_claims: [claim-runtime-environment-boundary]
  - id: runtime-environment-instance-env-prod-a
    labels: {zh: "env-prod-a 生产环境实例", en: "env-prod-a production environment instance", ja: "env-prod-a 本番環境事例"}
    descriptions: {zh: "PROV-O instance: Agent wasAssociatedWith Activity used Entity->RuntimeEnvironment.", en: "PROV-O instance: Agent wasAssociatedWith Activity used Entity->RuntimeEnvironment.", ja: "PROV-O instance maps to RuntimeEnvironment."}
    field_values: {environment_id: env-prod-a, execution_mode: container, policy_fingerprint: policy-2026-07}
    related_node_ids: [RuntimeEnvironment, AgentSystem, Container, WorkingDirectory]
    related_relation_ids: [RuntimeEnvironment-hosts-AgentSystem]
    source_claims: [claim-runtime-environment-boundary]
parent_relation: null
relations:
  - id: RuntimeEnvironment-hosts-AgentSystem
    predicate: hosts
    target: concept:AgentSystem
    direction: source-to-target
    relation_kind: deployment
    labels: {zh: 托管智能体系统, en: hosts agent system, ja: エージェントシステムをホストする}
    definitions: {zh: 当部署证据表明该系统版本在环境边界内执行时，RuntimeEnvironment 托管 AgentSystem。, en: RuntimeEnvironment hosts AgentSystem when deployment evidence shows that system version executing within the environment boundary., ja: デプロイ証拠がそのシステムバージョンが環境境界内で実行されることを示す場合、RuntimeEnvironment は AgentSystem をホストする。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: runs_in, labels: {zh: 在运行环境中运行, en: runs in runtime environment, ja: 実行環境で動作する}}
    conditions:
      - id: runtime-environment-host-condition
        severity: error
        expression: Assert hosting only with a deployment record that names both the environment and the target system version.
        explanations: {zh: 镜像、工件或共享主机本身不能证明活跃的系统部署。, en: "An image, artifact, or shared host does not by itself prove an active system deployment.", ja: イメージ、Artifact、または共有ホストだけでは、アクティブなシステムデプロイを証明しない。}
        source_claims: [claim-runtime-environment-boundary]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-runtime-environment-boundary]
sources:
  - id: docker-container-concepts
    title: "Docker container concepts"
    url: https://docs.docker.com/get-started/docker-concepts/the-basics/what-is-a-container/
    source_type: documentation
    relevance: Documents containers as isolated portable execution environments that package application code and dependencies.
source_claims:
  - id: claim-runtime-environment-boundary
    source: docker-container-concepts
    supports: Docker describes containers as isolated, portable units that package an application and its dependencies for consistent execution.
    locator: What is a container?
    evidence_kind: documentation
    confidence: high

