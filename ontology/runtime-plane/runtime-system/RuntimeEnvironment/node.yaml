schema: moonweave.ai/ontology-node/v1
id: RuntimeEnvironment
kind: concept
labels:
  en: runtime environment
  zh: 运行环境
  ja: 実行環境
semantics:
  short_definition:
    zh: 运行环境是为智能体或工具执行提供文件系统、进程、依赖和环境配置的实际宿主上下文。
    en: A RuntimeEnvironment is the actual host context that provides filesystem, process, dependency, and environment configuration for agent or tool execution.
    ja: RuntimeEnvironment は、エージェントまたはツール実行にファイルシステム、プロセス、依存関係、環境設定を提供する実際の宿主文脈である。
  definition:
    zh: 运行环境是一类资源实体；其种差是它在执行时真实承载代码，并确定可见文件、工作目录、进程能力、依赖版本、环境变量与适用的资源或安全限制。它可以是主机、虚拟机、容器或托管沙箱，但不是描述这些条件的配置文件，也不是执行活动 RuntimeSession。
    en: A RuntimeEnvironment is a resource entity distinguished by actually hosting code at execution time and determining visible files, working directory, process capabilities, dependency versions, environment variables, and applicable resource or security limits. It may be a host, virtual machine, container, or hosted sandbox, but it is not a configuration file describing those conditions or the RuntimeSession activity.
    ja: RuntimeEnvironment は、実行時にコードを実際に収容し、可視ファイル、作業ディレクトリ、プロセス能力、依存版、環境変数、資源・安全制限を決める資源実体である。ホスト、仮想マシン、コンテナ、ホスト型サンドボックスになり得るが、それらを記述する設定ファイルでも RuntimeSession 活動でもない。
  why_needed:
    zh: 该概念把依赖、路径、秘密引用和隔离条件归属到真实执行地点，从而解释同一计划为何在不同环境产生不同结果。
    en: This concept assigns dependencies, paths, secret references, and isolation conditions to the place that actually executes code, explaining why one plan can behave differently across environments.
    ja: この概念は依存関係、パス、秘密参照、隔離条件を実際の実行場所へ帰属させ、同じ計画が環境ごとに異なる結果となる理由を説明する。
  includes:
    - zh: 纳入本地主机、虚拟机、Container 或托管代码沙箱，只要其在运行时真实提供执行资源与边界。
      en: Includes a local host, virtual machine, Container, or hosted code sandbox when it actually supplies runtime resources and boundaries.
      ja: 実行時に資源と境界を実際に提供するローカルホスト、仮想マシン、Container、ホスト型コードサンドボックスを含む。
  excludes:
    - zh: 不纳入仅声明镜像或变量的部署清单、单独的 WorkingDirectory、ProcessHandle、AgentSystem 或 RuntimeSession。
      en: Excludes a deployment manifest that only declares an image or variables, a WorkingDirectory by itself, a ProcessHandle, an AgentSystem, and a RuntimeSession.
      ja: イメージや変数を宣言するだけの配備マニフェスト、単独の WorkingDirectory、ProcessHandle、AgentSystem、RuntimeSession は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: RuntimeEnvironment（Environment/Configuration 运行时组成）映射 E2B sandbox、Container/ProcessHandle/WorkingDirectory 与 LangGraph configurable 中的 runtime 参数；Sandbox 隔离规范归 safety 域。
    en: RuntimeEnvironment (Environment/Configuration runtime composition) maps E2B sandbox, Container/ProcessHandle/WorkingDirectory, and LangGraph configurable runtime parameters; Sandbox isolation specs belong to safety.
    ja: RuntimeEnvironment は E2B sandbox・Container/ProcessHandle/WorkingDirectory・configurable runtime 参数を写像します。
  typical_input:
    - description: OpenAI thread, LangGraph thread, or E2B sandbox session.
      format: Sandbox.create() => sandbox_id, cwd=/home/user
      source_claims:
        - claim-langgraph-thread-system
        - claim-runtime-environment-design
  typical_output:
    - description: Moonweave session/environment projection.
      format: '{"environment_id":"env-e2b-42","working_directory":"/home/user/project"}'
      source_claims:
        - claim-runtime-environment-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: environment_variables
      labels:
        zh: 环境变量
        en: environment variable
        ja: 環境変数
      datatype: object
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 名称—值绑定是运行环境的可重复结构值，不具备独立业务身份；保留为节点会把 schema 字段误画成概念。
        en: A name-value binding is a repeatable structural value of RuntimeEnvironment without independent business identity; keeping it as a node would turn a schema field into a concept.
        ja: 名前と値の束縛は独立した業務同一性を持たない RuntimeEnvironment の反復構造値であり、ノード化するとスキーマ項目を概念と誤認させる。
      allowed_values: []
      pattern: null
      example_value:
        name: LOG_LEVEL
        value_reference: env:LOG_LEVEL
      source_claims:
        - claim-runtime-environment-design
        - claim-runtime-environment-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RuntimeEnvironment-example-positive-001
    labels:
      zh: Docker devcontainer + LangGraph
      en: Docker devcontainer plus LangGraph
      ja: Docker devcontainer + LangGraph
    descriptions:
      zh: Cursor devcontainer.json + Docker image python:3.12 + LangGraph thread_id=thread-1 构成 RuntimeEnvironment env_id=env-prod-a，含 Container、ProcessHandle、WorkingDirectory。
      en: Cursor devcontainer.json + Docker image python:3.12 + LangGraph thread_id=thread-1 forms RuntimeEnvironment env_id=env-prod-a with Container, ProcessHandle, WorkingDirectory.
      ja: devcontainer + LangGraph thread が RuntimeEnvironment を構成する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      environment_variables:
        - name: LOG_LEVEL
          value_reference: env:LOG_LEVEL
    related_node_ids:
      - RuntimeEnvironment
      - WorkingDirectory
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    source_claims:
      - claim-runtime-environment-design
  - id: RuntimeEnvironment-example-boundary-001
    labels:
      zh: cloud region 字符串非 Environment
      en: Cloud region string not Environment
      ja: cloud region 文字列は Environment ではない
    descriptions:
      zh: 字符串 region=us-east-1 无 container/process/workdir 证据，不是 RuntimeEnvironment 记录。
      en: String region=us-east-1 without container/process/workdir evidence is not RuntimeEnvironment record.
      ja: region 文字列だけでは RuntimeEnvironment にならない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeEnvironment
      - WorkingDirectory
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    source_claims:
      - claim-runtime-environment-design
  - id: RuntimeEnvironment-example-3
    labels:
      zh: Environment 与 Container 边界
      en: Environment versus Container boundary
      ja: Environment と Container 境界
    descriptions:
      zh: RuntimeEnvironment 聚合环境载体；Container 是镜像/实例；ProcessHandle 是 PID；WorkingDirectory 是路径；Environment 是组合边界。
      en: RuntimeEnvironment aggregates environment carriers; Container is image/instance; ProcessHandle is PID; WorkingDirectory is path; Environment is composition boundary.
      ja: Environment は Container/Process/Workdir を束ねる。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeEnvironment
    related_relation_ids: []
    source_claims:
      - claim-runtime-environment-design
      - claim-runtime-environment-design
  - id: RuntimeEnvironment-example-4
    labels:
      zh: env-prod-a 生产环境实例
      en: env-prod-a production environment instance
      ja: env-prod-a 本番環境事例
    descriptions:
      zh: RuntimeEnvironment env_id=env-prod-a、container_digest=sha256:abc...、workdir=/workspace/project、process_pid=4820。
      en: RuntimeEnvironment env_id=env-prod-a, container_digest=sha256:abc..., workdir=/workspace/project, process_pid=4820.
      ja: env-prod-a 本番 RuntimeEnvironment を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeEnvironment
    related_relation_ids: []
    source_claims:
      - claim-runtime-environment-design
      - claim-runtime-environment-design
parent_relation: null
relations: []
sources:
  - id: src-openai-threads
    title: OpenAI Assistants Threads API
    url: https://platform.openai.com/docs/api-reference/threads
    source_type: official-doc
    relevance: thread_id preserving multi-turn context across runs.
  - id: src-langgraph-threads
    title: LangGraph Server Threads API
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
    source_type: official-doc
    relevance: Persistent thread_id with checkpoint and run history.
  - id: src-e2b-sandbox
    title: E2B Documentation
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Sandbox sessions, process handles, and working directories.
  - id: src-runtime-system-design
    title: Moonweave runtime-system module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: AgentSystem, RuntimeEnvironment, RuntimeSession boundaries.
source_claims:
  - id: claim-openai-thread-system
    source: src-openai-threads
    supports: OpenAI threads.create returns thread_id preserving context across runs.
    locator: Threads > create
    evidence_kind: design-inference
    confidence: high
  - id: claim-langgraph-thread-system
    source: src-langgraph-threads
    supports: LangGraph threads persist checkpoint and run history under thread_id.
    locator: Threads API
    evidence_kind: design-inference
    confidence: high
  - id: claim-e2b-session-system
    source: src-e2b-sandbox
    supports: E2B sandbox sessions provide isolated runtime environment boundaries.
    locator: Sandbox lifecycle
    evidence_kind: design-inference
    confidence: high
  - id: claim-runtime-environment-design
    source: src-runtime-system-design
    supports: RuntimeEnvironment is actual environment composition used by a run.
    locator: RuntimeEnvironment boundary
    evidence_kind: design-inference
    confidence: high
