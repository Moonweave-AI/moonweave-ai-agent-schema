source_claims:
  - id: claim-runtime-environment-001
    source: eng-fw-openai-python-docs
    supports: OpenAI's tools guide differentiates application-local execution from managed hosted-container execution. Moonweave abstracts the actual execution context shared by both paths as RuntimeEnvironment; the ontology boundary is a design inference.
    locator: Tools guide > Local runtime tools and hosted containers
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-environment-002
    source: eng-std-posix-shell-2024
    supports: POSIX shell command processing treats variable assignments as name-value entries applied to a command environment. Moonweave stores those scalar bindings inside RuntimeEnvironment.environment_variables because the binding value has no independent lifecycle or identity unless another domain explicitly models a secret or configuration resource.
    locator: POSIX.1-2024 Shell Command Language > 2.9.1 Simple Commands > Variable Assignments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-environment-003
    source: eng-fw-openai-python-docs
    supports: OpenAI Sandbox agents separate manifest-defined workspace configuration from the running Agent and sandbox client. Moonweave follows that boundary by keeping ordinary environment-variable name/value pairs as repeatable RuntimeEnvironment structure, while secrets, permissions, and sandbox policies remain separately governed concepts.
    locator: Sandbox agents > Concepts > Manifest and workspace; Sandbox clients
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-environment-004
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK distinguishes tools that run in the application's own environment from tools hosted in managed containers. The sandbox example instantiates Moonweave's common RuntimeEnvironment boundary.
    locator: Tools guide > Local runtime tools and hosted containers
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-environment-005
    source: eng-fw-openai-python-docs
    supports: The tools guide distinguishes where a tool actually runs. Moonweave uses that operational distinction to reject an unapplied deployment description as an environment instance.
    locator: Tools guide > Local runtime tools and hosted containers
    evidence_kind: design-inference
    confidence: high
    review_status: pending
