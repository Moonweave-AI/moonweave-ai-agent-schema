schema: moonweave.ai/ontology-node/v1
id: RuntimeEnvironment
kind: concept
status: review
labels:
  en: runtime environment
  zh: 运行环境
  ja: 実行環境
semantics:
  short_definition:
    zh: 运行环境是为智能体或工具执行提供文件系统、进程、依赖和环境配置的实际宿主上下文。
    en: A RuntimeEnvironment is the actual host context that provides filesystem, process, dependency, and environment configuration for agent or tool execution.
    ja: RuntimeEnvironment は、エージェントまたはツール実行にファイルシステム、プロセス、依存関係、環境設定を提供する実際の宿主文脈である。
  definition:
    zh: 运行环境是一类资源实体；其种差是它在执行时真实承载代码，并确定可见文件、工作目录、进程能力、依赖版本、环境变量与适用的资源或安全限制。它可以是主机、虚拟机、容器或托管沙箱，但不是描述这些条件的配置文件，也不是执行活动 RuntimeSession。
    en: A RuntimeEnvironment is a resource entity distinguished by actually hosting code at execution time and determining visible files, working directory, process capabilities, dependency versions, environment variables, and applicable resource or security limits. It may be a host, virtual machine, container, or hosted sandbox, but it is not a configuration file describing those conditions or the RuntimeSession activity.
    ja: RuntimeEnvironment は、実行時にコードを実際に収容し、可視ファイル、作業ディレクトリ、プロセス能力、依存版、環境変数、資源・安全制限を決める資源実体である。ホスト、仮想マシン、コンテナ、ホスト型サンドボックスになり得るが、それらを記述する設定ファイルでも RuntimeSession 活動でもない。
  why_needed:
    zh: 该概念把依赖、路径、秘密引用和隔离条件归属到真实执行地点，从而解释同一计划为何在不同环境产生不同结果。
    en: This concept assigns dependencies, paths, secret references, and isolation conditions to the place that actually executes code, explaining why one plan can behave differently across environments.
    ja: この概念は依存関係、パス、秘密参照、隔離条件を実際の実行場所へ帰属させ、同じ計画が環境ごとに異なる結果となる理由を説明する。
  includes:
    - zh: 纳入本地主机、虚拟机、Container 或托管代码沙箱，只要其在运行时真实提供执行资源与边界。
      en: Includes a local host, virtual machine, Container, or hosted code sandbox when it actually supplies runtime resources and boundaries.
      ja: 実行時に資源と境界を実際に提供するローカルホスト、仮想マシン、Container、ホスト型コードサンドボックスを含む。
  excludes:
    - zh: 不纳入仅声明镜像或变量的部署清单、单独的 WorkingDirectory、ProcessHandle、AgentSystem 或 RuntimeSession。
      en: Excludes a deployment manifest that only declares an image or variables, a WorkingDirectory by itself, a ProcessHandle, an AgentSystem, and a RuntimeSession.
      ja: イメージや変数を宣言するだけの配備マニフェスト、単独の WorkingDirectory、ProcessHandle、AgentSystem、RuntimeSession は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: environment_variables
      labels:
        zh: 环境变量
        en: environment variable
        ja: 環境変数
      datatype: object
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 名称—值绑定是运行环境的可重复结构值，不具备独立业务身份；保留为节点会把 schema 字段误画成概念。
        en: A name-value binding is a repeatable structural value of RuntimeEnvironment without independent business identity; keeping it as a node would turn a schema field into a concept.
        ja: 名前と値の束縛は独立した業務同一性を持たない RuntimeEnvironment の反復構造値であり、ノード化するとスキーマ項目を概念と誤認させる。
      allowed_values: []
      pattern: null
      example_value:
        name: LOG_LEVEL
        value_reference: env:LOG_LEVEL
      source_claims:
        - claim-runtime-environment-002
        - claim-runtime-environment-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: RuntimeEnvironment-example-positive-001
    kind: positive
    labels:
      zh: 运行环境正例
      en: Positive example of runtime environment
      ja: 実行環境の正例
    scenario_id: null
    descriptions:
      zh: 一次本地代码执行使用已固定 Node 版本、安装依赖、LOG_LEVEL 引用、网络限制和 /workspace/repo 工作目录的沙箱。
      en: A local code run uses a sandbox with a pinned Node version, installed dependencies, a LOG_LEVEL reference, network limits, and the /workspace/repo working directory.
      ja: ローカルコード実行が、固定 Node 版、導入済み依存、LOG_LEVEL 参照、ネットワーク制限、/workspace/repo 作業ディレクトリを持つサンドボックスを使う。
    field_values:
      environment_variables:
        - name: LOG_LEVEL
          value_reference: env:LOG_LEVEL
    related_node_ids:
      - RuntimeEnvironment
      - WorkingDirectory
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    expected_result:
      zh: 该实际沙箱归类为 RuntimeEnvironment，工作目录作为其组成信息保留。
      en: The actual sandbox is classified as RuntimeEnvironment, with its working directory retained as constituent information.
      ja: 実際のサンドボックスは RuntimeEnvironment に分類され、作業ディレクトリはその構成情報として保持される。
    why_valid_or_invalid:
      zh: 它真实承载执行并决定代码可见的文件、依赖、变量与限制，而非仅描述预期配置。
      en: It actually hosts execution and determines visible files, dependencies, variables, and limits rather than merely describing intended configuration.
      ja: 実行を実際に収容し、可視ファイル、依存、変数、制限を決めており、予定設定の記述だけではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-environment-004
  - id: RuntimeEnvironment-example-boundary-001
    kind: boundary
    labels:
      zh: 运行环境边界例
      en: Boundary case for runtime environment
      ja: 実行環境の境界例
    scenario_id: null
    descriptions:
      zh: deployment.yaml 声明 image、env 和 workingDir，但尚未创建任何主机、容器或沙箱，也没有执行发生。
      en: deployment.yaml declares an image, env values, and workingDir, but no host, container, or sandbox has been created and no execution has occurred.
      ja: deployment.yaml は image、env、workingDir を宣言するが、ホスト、コンテナ、サンドボックスはまだ作成されず、実行もない。
    field_values: {}
    related_node_ids:
      - RuntimeEnvironment
      - WorkingDirectory
    related_relation_ids:
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
    expected_result:
      zh: 该文件是环境配置规格，不是 RuntimeEnvironment 实例。
      en: The file is an environment configuration specification, not a RuntimeEnvironment instance.
      ja: このファイルは環境設定仕様であり、RuntimeEnvironment の実体ではない。
    why_valid_or_invalid:
      zh: 描述未来执行条件的信息不等于实际提供这些资源和边界的宿主实体。
      en: Information describing future execution conditions is not the host entity that actually supplies those resources and boundaries.
      ja: 将来の実行条件を記述する情報は、それらの資源と境界を実際に提供する宿主実体ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-environment-005
