parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Agents Sessions、LangGraph thread 与 POSIX 进程环境逐项核验，RuntimeSession 生命周期语义成立。
    en: Verified against OpenAI Agents Sessions, LangGraph thread persistence, and POSIX process environment. RuntimeSession lifecycle holds.
    ja: OpenAI Agents Sessions、LangGraph thread、POSIX process environment に照らし RuntimeSession lifecycle を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-agent-system-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK describes agents as configured model-driven components and Runner as the facility that manages turns, tools, handoffs, and sessions. Moonweave groups the deployment that owns these facilities under AgentSystem; its exact ontology placement is a design decision.
    locator: Agents guide > Agents, runners, tools, handoffs, and sessions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-agent-system-002
    source: eng-fw-langgraph-docs
    supports: LangGraph requires a thread_id to select the persisted execution lineage but does not define an identifier for the larger deployed agent system that may host many threads. Moonweave introduces system_id at that enclosing identity boundary so sessions and environments can be attributed to one AgentSystem without reusing a thread identifier.
    locator: Persistence > Threads; Checkpoints > thread_id
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-agent-system-003
    source: eng-fw-openai-python-docs
    supports: The Agents SDK identifies configured Agents and Session instances but does not publish an AgentSystem aggregate or system_id field. Moonweave therefore uses system_id as a deployment-local audit key for the host that coordinates those objects; it is not a renamed SDK property.
    locator: Agents > Basic configuration > name; Sessions > Operational patterns > Session ID naming
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-agent-system-004
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK separates reusable agent configuration and runner-managed behavior from individual session histories. The customer-support deployment is a Moonweave example of a system that owns those shared facilities.
    locator: Agents guide > Basic configuration, running agents, and sessions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-agent-system-005
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK documents sessions as histories keyed by session identity and supports multiple sessions. That distinction supports rejecting one session record as the whole deployed system.
    locator: Sessions guide > Session memory, IDs, and multiple sessions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

