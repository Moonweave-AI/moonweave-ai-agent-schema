schema: moonweave.ai/ontology-node/v1
id: AgentSystem
kind: concept
status: accepted
labels:
  zh: 智能体系统
  en: agent system
  ja: エージェントシステム
semantics:
  short_definition:
    zh: 智能体系统是承载一个或多个智能体运行以及共享服务与治理边界的可识别软件系统。
    en: An AgentSystem is an identifiable software system that hosts one or more agent runtimes under shared services and governance.
    ja: AgentSystem は、共有サービスとガバナンスの下で一つ以上のエージェント実行を収容する識別可能なソフトウェアシステムである。
  definition:
    zh: 智能体系统是一类软件实体；它以统一系统身份整合智能体配置、运行器、工具接入、状态服务与可观测性设施，并为多个运行会话提供共同的配置和治理边界。单个智能体配置、某次会话或某个容器都不足以构成完整的智能体系统。
    en: An AgentSystem is a software entity distinguished by a stable system identity that integrates agent configurations, runners, tool access, state services, and observability infrastructure while governing multiple runtime sessions. An individual agent definition, one session, or one container is not by itself the whole system.
    ja: AgentSystem は、安定したシステム識別子の下でエージェント設定、ランナー、ツール接続、状態サービス、可観測性基盤を統合し、複数の実行セッションを共通に統治するソフトウェア実体である。単一のエージェント定義、セッション、コンテナだけではシステム全体にならない。
  why_needed:
    zh: 该概念让配置归属、共享服务和治理策略能够跨会话追踪，也使系统级故障与单次会话故障保持可区分。
    en: This concept lets configuration ownership, shared services, and governance policies be traced across sessions while keeping system-level failures distinct from failures of one session.
    ja: この概念により、設定の所有、共有サービス、ガバナンスポリシーをセッション横断で追跡でき、システム障害と単一セッション障害を区別できる。
  includes:
    - zh: 纳入以稳定 system_id 运行、共同提供运行器、工具、状态或追踪服务并承载多个会话的智能体应用部署。
      en: Includes an agent-application deployment with a stable system_id that jointly provides runners, tools, state, or tracing services and hosts multiple sessions.
      ja: 安定した system_id を持ち、ランナー、ツール、状態、追跡サービスを共同提供して複数セッションを収容するエージェントアプリケーション配備を含む。
  excludes:
    - zh: 不纳入单个 Agent 配置、一次 RuntimeSession、运行它的 Container 或仅描述部署参数的配置文件。
      en: Excludes a single Agent configuration, one RuntimeSession, the Container that runs it, and a configuration file that merely describes a deployment.
      ja: 単一の Agent 設定、一回の RuntimeSession、それを実行する Container、配備を記述するだけの設定ファイルは含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: system_id
      labels:
        zh: 系统标识
        en: System ID
        ja: システム ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        en: captures identifier as a string scalar on agent-system artifacts, resources, events, policies, or adapter records.
        zh: 该数据字段记录对应的标量值，用于智能体系统中的产物、资源、事件、策略或适配记录。
        ja: このデータ項目は対応するスカラー値を記録し、エージェントシステム内の成果物、資源、イベント、ポリシー、適配記録で使います。
      allowed_values: []
      pattern: null
      example_value: agent-system-001
      source_claims:
        - claim-agent-system-002
        - claim-agent-system-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: AgentSystem-example-positive-001
    kind: positive
    labels:
      zh: 智能体系统正例
      en: Positive example of agent system
      ja: エージェントシステムの正例
    scenario_id: null
    descriptions:
      zh: 客服平台部署 agent-system-cs-01 共同管理分诊智能体、退款智能体、工具注册表、审计追踪和会话存储，并连续承载多个客户会话。
      en: The deployment agent-system-cs-01 jointly manages triage and refund agents, a tool registry, audit tracing, and session storage while hosting many customer sessions.
      ja: 配備 agent-system-cs-01 は、振り分け・返金エージェント、ツール登録簿、監査追跡、セッション保存を共同管理し、多数の顧客セッションを収容する。
    field_values:
      system_id: agent-system-001
    related_node_ids:
      - AgentSystem
      - RuntimeSession
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
    expected_result:
      zh: 该部署归类为 AgentSystem；各客户对话仍分别归类为 RuntimeSession。
      en: The deployment is classified as AgentSystem, while each customer conversation remains a separate RuntimeSession.
      ja: この配備は AgentSystem に分類され、各顧客対話は別個の RuntimeSession のままである。
    why_valid_or_invalid:
      zh: 它具有跨会话稳定身份，并真实拥有多项共享运行服务，满足系统而非会话的判定条件。
      en: It has a stable identity across sessions and genuinely owns several shared runtime services, satisfying the system rather than session differentia.
      ja: セッションを越える安定した識別子と複数の共有実行サービスの所有があり、セッションではなくシステムの種差を満たす。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-system-004
  - id: AgentSystem-example-boundary-001
    kind: boundary
    labels:
      zh: 智能体系统边界例
      en: Boundary case for agent system
      ja: エージェントシステムの境界例
    scenario_id: null
    descriptions:
      zh: 记录 session-42 的开始时间、参与者和消息历史只能识别一次运行会话；即使该会话调用多个智能体，它也没有跨会话拥有共享基础设施。
      en: A record of session-42 with a start time, participants, and message history identifies one runtime session. Calling several agents inside it does not make that record the owner of cross-session infrastructure.
      ja: 開始時刻、参加者、メッセージ履歴を持つ session-42 の記録は一回の実行セッションを示す。内部で複数エージェントを呼んでも、セッション横断基盤の所有者にはならない。
    field_values: {}
    related_node_ids:
      - AgentSystem
      - RuntimeSession
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
    expected_result:
      zh: session-42 保持 RuntimeSession 类型，不被提升为 AgentSystem。
      en: session-42 remains a RuntimeSession and is not promoted to AgentSystem.
      ja: session-42 は RuntimeSession のままで AgentSystem には昇格しない。
    why_valid_or_invalid:
      zh: 会话有时间边界和连续上下文，而系统需要跨会话的稳定身份与共享服务所有权。
      en: A session has a temporal boundary and continuity context; a system additionally requires identity and ownership that persist across sessions.
      ja: セッションには時間境界と連続コンテキストがあり、システムにはさらにセッションを越える識別子と所有が必要である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-system-005
external_mappings: []
