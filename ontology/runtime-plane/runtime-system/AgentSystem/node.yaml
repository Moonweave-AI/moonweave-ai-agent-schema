schema: moonweave.ai/ontology-node/v1
id: AgentSystem
kind: concept
labels:
  zh: 智能体系统
  en: agent system
  ja: エージェントシステム
semantics:
  short_definition:
    zh: 智能体系统是承载一个或多个智能体运行以及共享服务与治理边界的可识别软件系统。
    en: An AgentSystem is an identifiable software system that hosts one or more agent runtimes under shared services and governance.
    ja: AgentSystem は、共有サービスとガバナンスの下で一つ以上のエージェント実行を収容する識別可能なソフトウェアシステムである。
  definition:
    zh: 智能体系统是一类软件实体；它以统一系统身份整合智能体配置、运行器、工具接入、状态服务与可观测性设施，并为多个运行会话提供共同的配置和治理边界。单个智能体配置、某次会话或某个容器都不足以构成完整的智能体系统。
    en: An AgentSystem is a software entity distinguished by a stable system identity that integrates agent configurations, runners, tool access, state services, and observability infrastructure while governing multiple runtime sessions. An individual agent definition, one session, or one container is not by itself the whole system.
    ja: AgentSystem は、安定したシステム識別子の下でエージェント設定、ランナー、ツール接続、状態サービス、可観測性基盤を統合し、複数の実行セッションを共通に統治するソフトウェア実体である。単一のエージェント定義、セッション、コンテナだけではシステム全体にならない。
  why_needed:
    zh: 该概念让配置归属、共享服务和治理策略能够跨会话追踪，也使系统级故障与单次会话故障保持可区分。
    en: This concept lets configuration ownership, shared services, and governance policies be traced across sessions while keeping system-level failures distinct from failures of one session.
    ja: この概念により、設定の所有、共有サービス、ガバナンスポリシーをセッション横断で追跡でき、システム障害と単一セッション障害を区別できる。
  includes:
    - zh: 纳入以稳定 system_id 运行、共同提供运行器、工具、状态或追踪服务并承载多个会话的智能体应用部署。
      en: Includes an agent-application deployment with a stable system_id that jointly provides runners, tools, state, or tracing services and hosts multiple sessions.
      ja: 安定した system_id を持ち、ランナー、ツール、状態、追跡サービスを共同提供して複数セッションを収容するエージェントアプリケーション配備を含む。
  excludes:
    - zh: 不纳入单个 Agent 配置、一次 RuntimeSession、运行它的 Container 或仅描述部署参数的配置文件。
      en: Excludes a single Agent configuration, one RuntimeSession, the Container that runs it, and a configuration file that merely describes a deployment.
      ja: 単一の Agent 設定、一回の RuntimeSession、それを実行する Container、配備を記述するだけの設定ファイルは含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 AgentSystem 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating AgentSystem, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: AgentSystem 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to AgentSystem.
      format: |-
        # Example AgentSystem ingest
        { "agent-system_ref": "example-1" }
      source_claims:
        - claim-agent-system-design
  typical_output:
    - description: Moonweave-local AgentSystem projection.
      format: '{ "schema_owner": "moonweave-local-design", "agent-system_id": "example-1" }'
      source_claims:
        - claim-agent-system-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: system_id
      labels:
        zh: 系统标识
        en: System ID
        ja: システム ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        en: captures identifier as a string scalar on agent-system artifacts, resources, events, policies, or adapter records.
        zh: 该数据字段记录对应的标量值，用于智能体系统中的产物、资源、事件、策略或适配记录。
        ja: このデータ項目は対応するスカラー値を記録し、エージェントシステム内の成果物、資源、イベント、ポリシー、適配記録で使います。
      allowed_values: []
      pattern: null
      example_value: agent-system-001
      source_claims:
        - claim-agent-system-design
        - claim-agent-system-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AgentSystem-example-positive-001
    labels:
      zh: OpenAI 多 Agent handoff 系统
      en: OpenAI multi-agent handoff system
      ja: OpenAI マルチ Agent handoff システム
    descriptions:
      zh: OpenAI Agents SDK 定义 triage_agent handoffs=[booking_agent, refund_agent]；AgentSystem system_id=support-agent-prod 拥有 Session 存储与多 Agent 边界。
      en: OpenAI Agents SDK defines triage_agent handoffs=[booking_agent, refund_agent]; AgentSystem system_id=support-agent-prod owns Session storage and multi-agent boundary.
      ja: OpenAI handoffs が AgentSystem 境界を定義する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      system_id: agent-system-001
    related_node_ids:
      - AgentSystem
      - RuntimeSession
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
    source_claims:
      - claim-agent-system-design
  - id: AgentSystem-example-boundary-001
    labels:
      zh: 单个 Agent 配置非 System
      en: Single Agent config not System
      ja: 単一 Agent 設定は System ではない
    descriptions:
      zh: 单个 Agent(name=, tools=[get_weather]) 配置无 system_id/session store/多 agent 编排，不是 AgentSystem。
      en: Single Agent(name=, tools=[get_weather]) config without system_id/session store/multi-agent orchestration is not AgentSystem.
      ja: 単一 Agent 設定は AgentSystem ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - AgentSystem
      - RuntimeSession
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
    source_claims:
      - claim-agent-system-design
  - id: AgentSystem-example-3
    labels:
      zh: AgentSystem 与 RuntimeEnvironment 边界
      en: AgentSystem versus RuntimeEnvironment
      ja: AgentSystem と RuntimeEnvironment 境界
    descriptions:
      zh: AgentSystem 是编排与 session 所有权边界；RuntimeEnvironment 是容器/进程/工作目录；系统配置与环境载体分离。
      en: AgentSystem is orchestration and session ownership boundary; RuntimeEnvironment is container/process/workdir; system config separated from environment carrier.
      ja: AgentSystem は编排、RuntimeEnvironment は実行環境である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - AgentSystem
    related_relation_ids: []
    source_claims:
      - claim-agent-system-vendor
      - claim-agent-system-design
  - id: AgentSystem-example-4
    labels:
      zh: support-agent-prod 部署实例
      en: support-agent-prod deployment instance
      ja: support-agent-prod デプロイ事例
    descriptions:
      zh: AgentSystem system_id=support-agent-prod、deployment_ref=ecs/support-agent:3、session_store_ref=redis://sessions/support-agent-prod。
      en: AgentSystem system_id=support-agent-prod, deployment_ref=ecs/support-agent:3, session_store_ref=redis://sessions/support-agent-prod.
      ja: support-agent-prod AgentSystem デプロイを記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - AgentSystem
    related_relation_ids: []
    source_claims:
      - claim-agent-system-vendor
      - claim-agent-system-design
parent_relation: null
relations: []
sources:
  - id: src-openai-threads
    title: OpenAI Assistants Threads API
    url: https://platform.openai.com/docs/api-reference/threads
    source_type: official-doc
    relevance: thread_id preserving multi-turn context across runs.
  - id: src-langgraph-threads
    title: LangGraph Server Threads API
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
    source_type: official-doc
    relevance: Persistent thread_id with checkpoint and run history.
  - id: src-e2b-sandbox
    title: E2B Documentation
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Sandbox sessions, process handles, and working directories.
  - id: src-runtime-system-design
    title: Moonweave runtime-system module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: AgentSystem, RuntimeEnvironment, RuntimeSession boundaries.
source_claims:
  - id: claim-agent-system-vendor
    source: src-openai-threads
    supports: runtime-system vendor evidence supports AgentSystem identity and boundary mapping.
    locator: AgentSystem integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-agent-system-design
    source: src-runtime-system-design
    supports: Moonweave AgentSystem concept boundary within runtime-system.
    locator: AgentSystem boundary
    evidence_kind: design-inference
    confidence: high
