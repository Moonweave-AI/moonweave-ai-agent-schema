schema: moonweave.ai/ontology-node/v1
id: AgentSystem
kind: concept
status: accepted
labels: {zh: 智能体系统, en: Agent system, ja: エージェントシステム}
semantics:
  short_definition: {zh: 可部署的智能体运行时组件、配置和操作边界组合，可承载会话与执行。, en: "A deployable composition of agent runtime components, configuration, and operational boundaries that can host sessions and executions.", ja: セッションと実行をホストできる、デプロイ可能なエージェントランタイムコンポーネント、構成、運用境界の組み合わせ。}
  definition: {zh: AgentSystem 是一种已标识的运行时系统配置，将软件参与者、模型、工具、会话存储和部署设置组装为操作服务。它不是单个 AgentActor、一次 Execution Activity、特定 RuntimeSession 或宿主环境本身。, en: "An AgentSystem is the identified runtime system configuration that assembles software actors, models, tools, session storage, and deployment settings into an operational service. It is not a single AgentActor, one Execution Activity, a specific RuntimeSession, or the host environment itself.", ja: AgentSystem は、ソフトウェアアクター、モデル、ツール、セッションストレージ、デプロイ設定を運用サービスに組み立てる、識別されたランタイムシステム構成である。単一の AgentActor、1つの Execution Activity、特定の RuntimeSession、ホスト環境自体ではない。}
  why_needed: {zh: 操作人员需要稳定的系统级标识，将执行、策略和会话行为归属给可部署运行时组合，而不是恰好运行它的某个进程。, en: "Operators need a stable system-level identity to attribute executions, policies, and session behavior to a deployable runtime composition rather than to whichever process happens to run it.", ja: 運用者には安定したシステムレベルのアイデンティティが必要であり、実行、ポリシー、セッション動作を、たまたま実行するプロセスではなくデプロイ可能なランタイム構成に帰属させる。}
  includes:
    - {zh: 系统标识符、部署版本、已解析配置引用和已声明组件边界。, en: "System identifier, deployment version, resolved configuration reference, and declared component boundaries.", ja: システム識別子、デプロイバージョン、解決済み構成参照、宣言済みコンポーネント境界。}
    - {zh: 可承载多个会话、通过 Actor 执行工作并部署到一个或多个运行时环境的系统。, en: "The system that may host multiple sessions, execute work through Actors, and be deployed to one or more runtime environments.", ja: 複数セッションをホストし、Actor を通じて作業を実行し、1つ以上のランタイム環境にデプロイできるシステム。}
  excludes:
    - {zh: 特定软件智能体标识、模型实例、执行尝试或用户对话。, en: "A particular software agent identity, model instance, execution attempt, or user conversation.", ja: 特定のソフトウェアエージェントアイデンティティ、モデルインスタンス、実行試行、ユーザー会話。}
    - {zh: 独立于系统部署考虑的容器镜像、进程句柄或工作目录。, en: "A container image, process handle, or working directory considered independently of the system deployment.", ja: システムデプロイメントから独立して考えられるコンテナイメージ、プロセスハンドル、作業ディレクトリ。}
  semantic_kind: system
  aliases: [agent runtime, deployed agent service]
engineering:
  explanation: {zh: 部署将智能体配置、工具注册表、模型策略和状态后端解析为一个命名系统版本。传入工作被路由到该系统；它创建会话和执行，其记录保留系统 ID 以支持运维、审计和回滚。, en: "Deployment resolves an agent configuration, tool registry, model policy, and state backend into one named system version. Incoming work is routed to that system; it creates sessions and executions whose records retain the system ID for operations, auditing, and rollback.", ja: デプロイメントはエージェント構成、ツールレジストリ、モデルポリシー、状態バックエンドを1つの名前付きシステムバージョンに解決する。受信作業はそのシステムにルーティングされ、運用、監査、ロールバックのためにシステム ID を保持するセッションと実行を作成する。}
  typical_input:
    - description: {zh: 部署组合, en: Deployment composition, ja: デプロイメント構成}
      format: |-
        {"system_id":"support-agent-prod","deployment_version":"2026.07.18","config_artifact_id":"agent-config-42","session_backend":"redis"}
  typical_output:
    - description: {zh: 已解析智能体系统记录, en: Resolved agent system record, ja: 解決済みエージェントシステム記録}
      format: |-
        {"system_id":"support-agent-prod","deployment_version":"2026.07.18","environment_id":"env-prod-a","status":"ready"}
  reference_implementations:
    - {name: OpenAI Agents SDK, url: https://openai.github.io/openai-agents-python/, description: "Documents composing agents with tools, handoffs, guardrails, sessions, and a runner."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Documents persisted graph state and operational execution continuity."}
structure:
  identity_keys: [system_id, deployment_version]
  fields:
    - id: system_id
      labels: {zh: 系统 ID, en: System ID, ja: システム ID}
      definitions: {zh: 可部署智能体系统的稳定逻辑标识符。, en: Stable logical identifier for the deployable agent system., ja: デプロイ可能なエージェントシステムの安定した論理識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: support-agent-prod
      source_claims: [claim-agent-system-composition]
    - id: deployment_version
      labels: {zh: 部署版本, en: Deployment version, ja: デプロイバージョン}
      definitions: {zh: 本记录当前描述的已解析运行时组合版本。, en: Version of the resolved runtime composition currently described by this record., ja: この記録が現在記述する解決済みランタイム構成のバージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026.07.18
      source_claims: [claim-agent-system-composition]
    - id: config_artifact_id
      labels: {zh: 配置工件 ID, en: Configuration artifact ID, ja: 構成成果物 ID}
      definitions: {zh: 指向用于组装本系统版本的耐久配置 Artifact 的引用。, en: Reference to the durable configuration Artifact used to assemble this system version., ja: このシステムバージョンの組み立てに用いる耐久構成 Artifact への参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: agent-config-42
      source_claims: [claim-agent-system-composition]
  constraints:
    - id: agent-system-resolved-composition
      severity: error
      language: plain
      expression: A deployment record must resolve one configuration artifact and one deployment version before accepting session or execution attribution.
      explanation: {zh: 可变的无名配置无法建立可重现的系统归属。, en: A mutable unnamed configuration cannot establish reproducible system ownership., ja: 可変で名前のない構成は再現可能なシステム帰属を確立できない。}
      source_claims: [claim-agent-system-composition]
  required_relations: []
examples:
  - id: agent-system-positive
    labels: {zh: "OpenAI 多 Agent handoff 系统", en: "OpenAI multi-agent handoff system", ja: "OpenAI マルチ Agent handoff システム"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; AgentSystem maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; AgentSystem maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; AgentSystem serving env."}
    field_values: {system_id: support-agent-prod, deployment_version: 2026.07.18, config_artifact_id: agent-config-42}
    related_node_ids: [AgentSystem, RuntimeEnvironment, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-agent-system-composition]
  - id: agent-system-counterexample
    labels: {zh: "单个 Agent 配置非 System", en: "Single Agent config not System", ja: "単一 Agent 設定は System ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style AgentSystem.", en: "ID without PROV relations cannot serve as PROV-O-style AgentSystem.", ja: "Missing PROV relations rejects AgentSystem."}
    field_values: {actor_id: triage-agent}
    related_node_ids: [AgentActor]
    related_relation_ids: []
    source_claims: [claim-agent-system-composition]
  - id: agent-system-boundary
    labels: {zh: "AgentSystem 与 RuntimeEnvironment 边界", en: "AgentSystem versus RuntimeEnvironment", ja: "AgentSystem と RuntimeEnvironment 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; AgentSystem must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; AgentSystem must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {system_id: support-agent-prod, deployment_version: 2026.07.18}
    related_node_ids: [AgentSystem, RuntimeEnvironment]
    related_relation_ids: []
    source_claims: [claim-agent-system-composition]
  - id: agent-system-instance-support-agent-prod
    labels: {zh: "support-agent-prod 部署实例", en: "support-agent-prod deployment instance", ja: "support-agent-prod デプロイ事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->AgentSystem.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->AgentSystem.", ja: "OTel instance maps to AgentSystem."}
    field_values: {system_id: support-agent-prod, deployment_version: 2026.07.18, config_artifact_id: agent-config-42}
    related_node_ids: [AgentSystem, RuntimeSession, RuntimeEnvironment, Artifact]
    related_relation_ids: []
    source_claims: [claim-agent-system-composition]
parent_relation: null
relations: []
sources:
  - id: openai-agents-overview
    title: "OpenAI Agents SDK overview"
    url: https://openai.github.io/openai-agents-python/
    source_type: documentation
    relevance: Documents agent runtime composition around agents, tools, handoffs, guardrails, sessions, and running agents.
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents persisted graph state and runtime continuity across executions.
source_claims:
  - id: claim-agent-system-composition
    source: openai-agents-overview
    supports: The OpenAI Agents SDK composes agents with tools, handoffs, guardrails, sessions, and a runner to operate an agent runtime.
    locator: Overview
    evidence_kind: documentation
    confidence: high
  - id: claim-agent-system-persistence
    source: langgraph-persistence
    supports: LangGraph persistence provides durable state continuity needed by a deployed graph-based runtime.
    locator: Persistence overview
    evidence_kind: documentation
    confidence: high

