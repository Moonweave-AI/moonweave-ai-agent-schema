    source: src-openai-threads
    supports: runtime-system vendor evidence supports SessionPauseEvent identity and boundary mapping.
    locator: SessionPauseEvent integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-session-pause-event-design
    source: src-runtime-system-design
    supports: Moonweave SessionPauseEvent concept boundary within runtime-system.
    locator: SessionPauseEvent boundary
    evidence_kind: design-inference
    confidence: high
