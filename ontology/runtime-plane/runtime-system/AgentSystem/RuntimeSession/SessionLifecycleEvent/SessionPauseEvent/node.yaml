schema: moonweave.ai/ontology-node/v1
id: SessionPauseEvent
kind: concept
labels:
  en: session pause event
  zh: 会话暂停事件
  ja: セッション一時停止イベント
semantics:
  short_definition:
    zh: 会话暂停事件是把活动会话转入可恢复暂停状态并保留连续性依据的生命周期事件。
    en: A SessionPauseEvent is the lifecycle event that moves an active session into a resumable paused state while preserving continuity evidence.
    ja: SessionPauseEvent は活動中セッションを再開可能な停止状態へ移し、連続性の根拠を保存するライフサイクルイベントである。
  definition:
    zh: 会话暂停事件是 SessionLifecycleEvent 的一种；其种差是它完成 active 到 paused 或 interrupted 的非终止转换，并指向恢复所需的 StateSnapshot、Checkpoint、待审批项或中断原因。它不关闭会话，也不表示故障必然发生。
    en: A SessionPauseEvent is a SessionLifecycleEvent distinguished by completing a non-terminal transition from active to paused or interrupted and referencing the StateSnapshot, Checkpoint, pending approval, or interruption reason required for resumption. It does not close the session or necessarily assert a failure.
    ja: SessionPauseEvent は SessionLifecycleEvent の一種であり、active から paused または interrupted への非終端遷移を完了し、再開に必要な StateSnapshot、Checkpoint、保留承認、または中断理由を指す。セッションを閉じず、必ずしも障害を主張しない。
  why_needed:
    zh: 该事件把可恢复中断与终止分开，使系统能够证明保存了哪份状态、为何停止以及后续从何处继续。
    en: This event separates resumable interruption from termination so the system can show which state was preserved, why work stopped, and where continuation should begin.
    ja: このイベントは再開可能な中断と終了を分け、保存状態、停止理由、再開位置を証明できるようにする。
  includes:
    - zh: 纳入因人工审批、外部依赖等待、计划维护或可恢复中断而从 active 转为 paused，并保留恢复依据的事件。
      en: Includes an active-to-paused event caused by human approval, waiting on an external dependency, planned maintenance, or another resumable interruption, with recovery evidence retained.
      ja: 人間承認、外部依存待ち、計画保守、その他再開可能な中断により active から paused へ移り、復元根拠を保持するイベントを含む。
  excludes:
    - zh: 不纳入 SessionEndEvent、仅创建 Checkpoint 的动作、短暂队列等待、失败诊断或没有状态转换的审批请求。
      en: Excludes a SessionEndEvent, checkpoint creation alone, transient queue waiting, a failure diagnostic, and an approval request that causes no state transition.
      ja: SessionEndEvent、Checkpoint 作成だけの動作、一時的キュー待ち、障害診断、状態遷移を起こさない承認要求は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 SessionPauseEvent 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SessionPauseEvent, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SessionPauseEvent 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SessionPauseEvent.
      format: |-
        # Example SessionPauseEvent ingest
        { "session-pause-event_ref": "example-1" }
      source_claims:
        - claim-session-pause-event-design
  typical_output:
    - description: Moonweave-local SessionPauseEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "session-pause-event_id": "example-1" }'
      source_claims:
        - claim-session-pause-event-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: continuation_state_ref
      labels:
        zh: 可继续状态引用
        en: continuation-state reference
        ja: continuation state 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用允许同一会话随后恢复的检查点、快照或序列化运行状态。
        en: References the checkpoint, snapshot, or serialized run state that permits the same session to resume later.
        ja: 同じ session の後続 resume を可能にする checkpoint/snapshot/serialized run state を参照します。
      allowed_values: []
      pattern: null
      example_value: state-snapshot:session-17/pause-1
      source_claims:
        - claim-session-pause-event-design
  constraints:
    - id: session-pause-transition
      severity: error
      expression_language: plain
      expression: prior_state is active and resulting_state is paused or interrupted, with continuation_state_ref present
      explanations:
        zh: 暂停必须保留继续同一会话所需状态。
        en: A pause preserves the state needed to continue the same session.
        ja: pause は同じ session を続けるための state を保持します。
      source_claims:
        - claim-session-pause-event-design
  required_relation_constraints: []
examples:
  - id: SessionPauseEvent-example-positive-001
    labels:
      zh: LangGraph interrupt 暂停
      en: LangGraph interrupt pause
      ja: LangGraph interrupt 一時停止
    descriptions:
      zh: LangGraph graph.invoke 触发 interrupt(value={"approval":required}) 产生 SessionPauseEvent session_id=langgraph-thread-1、paused_at=2026-01-15T09:10:00Z，checkpoint 保留状态。
      en: LangGraph graph.invoke triggers interrupt(value={"approval":required}) producing SessionPauseEvent session_id=langgraph-thread-1, paused_at=2026-01-15T09:10:00Z with checkpoint preserving state.
      ja: LangGraph interrupt が SessionPauseEvent を生成する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      session_event_id: session-event:17/pause/1
      session_ref: runtime-session:17
      occurred_at: 2026-07-17T10:04:00Z
      prior_state: active
      resulting_state: paused
      trigger_kind: approval-required
      actor_ref: actor:runner-3
      reason: payment tool requires approval
      continuation_state_ref: state-snapshot:session-17/pause-1
    related_node_ids:
      - SessionPauseEvent
      - StateSnapshot
    related_relation_ids:
      - pauses_with_snapshot
    source_claims:
      - claim-session-pause-event-design
  - id: SessionPauseEvent-example-boundary-001
    labels:
      zh: Run cancelled 非 SessionPause
      en: Run cancelled not SessionPause
      ja: Run cancelled は SessionPause ではない
    descriptions:
      zh: OpenAI runs.cancel(run_id) 取消单次 Run 是 Execution 终止，不是 RuntimeSession SessionPauseEvent（session 仍可 resume）。
      en: OpenAI runs.cancel(run_id) cancels single Run terminating Execution, not RuntimeSession SessionPauseEvent (session can still resume).
      ja: runs.cancel は Execution 終了であり SessionPause ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionPauseEvent
      - StateSnapshot
      - SessionEndEvent
    related_relation_ids:
      - pauses_with_snapshot
    source_claims:
      - claim-session-pause-event-design
  - id: SessionPauseEvent-example-3
    labels:
      zh: Pause 与 SessionEnd 边界
      en: Pause versus SessionEnd boundary
      ja: Pause と SessionEnd 境界
    descriptions:
      zh: SessionPauseEvent 临时中断可 resume；SessionEndEvent 终止会话；pause 保留 session_id 与 store 历史。
      en: SessionPauseEvent temporarily interrupts resumable; SessionEndEvent terminates session; pause retains session_id and store history.
      ja: Pause は再開可能、End はセッション終了である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionPauseEvent
    related_relation_ids: []
    source_claims:
      - claim-session-pause-event-vendor
      - claim-session-pause-event-design
  - id: SessionPauseEvent-example-4
    labels:
      zh: session-90 interrupt 实例
      en: session-90 interrupt instance
      ja: session-90 interrupt 事例
    descriptions:
      zh: SessionPauseEvent event_id=session-pause-90、session_id=session-90、paused_at=2026-01-15T09:10:00Z、reason=human_approval_required。
      en: SessionPauseEvent event_id=session-pause-90, session_id=session-90, paused_at=2026-01-15T09:10:00Z, reason=human_approval_required.
      ja: session-pause-90 interrupt を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionPauseEvent
    related_relation_ids: []
    source_claims:
      - claim-session-pause-event-vendor
      - claim-session-pause-event-design
parent_relation:
  id: SessionPauseEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个记录 RuntimeSession 从 active 进入可恢复 paused 或 interrupted 状态，并保存恢复所需引用的 SessionPauseEvent 都是 SessionLifecycleEvent；进程卡顿或终态结束不属于该子类。
    en: States that every SessionPauseEvent recording a RuntimeSession's transition from active to a resumable paused or interrupted state and retaining recovery references is a SessionLifecycleEvent; a process stall or terminal end is not in this subtype.
    ja: RuntimeSessionがactiveから再開可能なpaused/interruptedへ移り、recovery参照を保持するSessionPauseEventはSessionLifecycleEventです。process stallやterminal endはこのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有暂停事件子类
      en: has pause-event subtype
      ja: pause-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-session-pause-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: pauses_with_snapshot
    predicate: pauses_with_snapshot
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 暂停并保留状态快照
      en: pauses with state snapshot
      ja: 状態snapshotを保持して一時停止する
    definitions:
      zh: 表示 SessionPauseEvent 在完成非终态暂停时明确引用可供检查或恢复的 StateSnapshot；单纯等待、日志记录或没有持久状态的进程停顿不建立该边。
      en: States that a SessionPauseEvent completing a nonterminal pause explicitly references the StateSnapshot retained for inspection or resumption; waiting, logging, or a process stall without persisted state does not establish the edge.
      ja: 非終端pauseを完了したSessionPauseEventがinspection/resume用に保持したStateSnapshotを明示参照する関係です。persisted stateのない待機・log・process stallでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: retained_by_pause_event
      labels:
        zh: 由暂停事件保留
        en: retained by pause event
        ja: pause eventに保持される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-session-pause-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:StateSnapshot
