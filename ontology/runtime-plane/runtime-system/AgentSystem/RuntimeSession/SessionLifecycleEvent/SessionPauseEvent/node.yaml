schema: moonweave.ai/ontology-node/v1
id: SessionPauseEvent
kind: concept
status: accepted
labels:
  en: session pause event
  zh: 会话暂停事件
  ja: セッション一時停止イベント
semantics:
  short_definition:
    zh: 会话暂停事件是把活动会话转入可恢复暂停状态并保留连续性依据的生命周期事件。
    en: A SessionPauseEvent is the lifecycle event that moves an active session into a resumable paused state while preserving continuity evidence.
    ja: SessionPauseEvent は活動中セッションを再開可能な停止状態へ移し、連続性の根拠を保存するライフサイクルイベントである。
  definition:
    zh: 会话暂停事件是 SessionLifecycleEvent 的一种；其种差是它完成 active 到 paused 或 interrupted 的非终止转换，并指向恢复所需的 StateSnapshot、Checkpoint、待审批项或中断原因。它不关闭会话，也不表示故障必然发生。
    en: A SessionPauseEvent is a SessionLifecycleEvent distinguished by completing a non-terminal transition from active to paused or interrupted and referencing the StateSnapshot, Checkpoint, pending approval, or interruption reason required for resumption. It does not close the session or necessarily assert a failure.
    ja: SessionPauseEvent は SessionLifecycleEvent の一種であり、active から paused または interrupted への非終端遷移を完了し、再開に必要な StateSnapshot、Checkpoint、保留承認、または中断理由を指す。セッションを閉じず、必ずしも障害を主張しない。
  why_needed:
    zh: 该事件把可恢复中断与终止分开，使系统能够证明保存了哪份状态、为何停止以及后续从何处继续。
    en: This event separates resumable interruption from termination so the system can show which state was preserved, why work stopped, and where continuation should begin.
    ja: このイベントは再開可能な中断と終了を分け、保存状態、停止理由、再開位置を証明できるようにする。
  includes:
    - zh: 纳入因人工审批、外部依赖等待、计划维护或可恢复中断而从 active 转为 paused，并保留恢复依据的事件。
      en: Includes an active-to-paused event caused by human approval, waiting on an external dependency, planned maintenance, or another resumable interruption, with recovery evidence retained.
      ja: 人間承認、外部依存待ち、計画保守、その他再開可能な中断により active から paused へ移り、復元根拠を保持するイベントを含む。
  excludes:
    - zh: 不纳入 SessionEndEvent、仅创建 Checkpoint 的动作、短暂队列等待、失败诊断或没有状态转换的审批请求。
      en: Excludes a SessionEndEvent, checkpoint creation alone, transient queue waiting, a failure diagnostic, and an approval request that causes no state transition.
      ja: SessionEndEvent、Checkpoint 作成だけの動作、一時的キュー待ち、障害診断、状態遷移を起こさない承認要求は含まない。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: continuation_state_ref
      labels:
        zh: 可继续状态引用
        en: continuation-state reference
        ja: continuation state 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用允许同一会话随后恢复的检查点、快照或序列化运行状态。
        en: References the checkpoint, snapshot, or serialized run state that permits the same session to resume later.
        ja: 同じ session の後続 resume を可能にする checkpoint/snapshot/serialized run state を参照します。
      allowed_values: []
      pattern: null
      example_value: state-snapshot:session-17/pause-1
      source_claims:
        - claim-session-pause-event-002
  constraints:
    - id: session-pause-transition
      severity: error
      expression_language: plain
      expression: prior_state is active and resulting_state is paused or interrupted, with continuation_state_ref present
      explanations:
        zh: 暂停必须保留继续同一会话所需状态。
        en: A pause preserves the state needed to continue the same session.
        ja: pause は同じ session を続けるための state を保持します。
      source_claims:
        - claim-session-pause-event-002
  required_relation_constraints: []
examples:
  - id: SessionPauseEvent-example-positive-001
    kind: positive
    labels:
      zh: 会话暂停事件正例
      en: Positive example of session pause event
      ja: セッション一時停止イベントの正例
    scenario_id: null
    descriptions:
      zh: session-17 在调用付款工具前等待人工批准，系统保存 checkpoint cp-203，并于 10:03Z 将状态从 active 改为 paused。
      en: Before a payment tool call, session-17 awaits human approval; the system saves checkpoint cp-203 and changes state from active to paused at 10:03Z.
      ja: 支払いツール呼び出し前に session-17 が人間承認を待ち、システムは checkpoint cp-203 を保存して 10:03Z に active から paused へ変更する。
    field_values:
      session_event_id: session-event:17/pause/1
      session_ref: runtime-session:17
      occurred_at: 2026-07-17T10:04:00Z
      prior_state: active
      resulting_state: paused
      trigger_kind: approval-required
      actor_ref: actor:runner-3
      reason: payment tool requires approval
      continuation_state_ref: state-snapshot:session-17/pause-1
    related_node_ids:
      - SessionPauseEvent
      - StateSnapshot
    related_relation_ids:
      - pauses_with_snapshot
    expected_result:
      zh: 该转换归类为 SessionPauseEvent，并关联用于恢复的状态快照。
      en: The transition is classified as SessionPauseEvent and linked to the state snapshot used for resumption.
      ja: この遷移は SessionPauseEvent に分類され、再開用状態スナップショットへ関連付けられる。
    why_valid_or_invalid:
      zh: 会话未终止，暂停原因明确，而且保存了后续继续所需的状态。
      en: The session is not terminal, the pause reason is explicit, and state needed for later continuation has been preserved.
      ja: セッションは終端でなく、停止理由が明示され、後の継続に必要な状態が保存されている。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-pause-event-003
  - id: SessionPauseEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 会话暂停事件边界例
      en: Boundary case for session pause event
      ja: セッション一時停止イベントの境界例
    scenario_id: null
    descriptions:
      zh: session-17 完成最终输出后释放资源，并把状态改为 completed；没有后续恢复点。
      en: session-17 releases resources after final output and changes state to completed, with no continuation point.
      ja: session-17 は最終出力後に資源を解放し、状態を completed に変更して継続点を残さない。
    field_values: {}
    related_node_ids:
      - SessionPauseEvent
      - StateSnapshot
      - SessionEndEvent
    related_relation_ids:
      - pauses_with_snapshot
    expected_result:
      zh: 该转换是 SessionEndEvent，而不是 SessionPauseEvent。
      en: The transition is a SessionEndEvent, not a SessionPauseEvent.
      ja: この遷移は SessionPauseEvent ではなく SessionEndEvent である。
    why_valid_or_invalid:
      zh: 终态与资源释放表明生命周期关闭；暂停必须保留继续同一会话的可能。
      en: Terminal state and resource release close the lifecycle; a pause must preserve the possibility of continuing the same session.
      ja: 終端状態と資源解放はライフサイクルを閉じる。停止は同じセッションを続ける可能性を保持しなければならない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-pause-event-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SessionResumeEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 共享父节点对照：父节点 SessionLifecycleEvent：SessionPauseEvent（semantic kind=event，骨架 SessionPauseEvent-is_a-SessionLifecycleEvent）；SessionResumeEvent（semantic kind=event，骨架 SessionResumeEvent-is_a-SessionLifecycleEvent）。双端条件：SessionPauseEvent 条件：“会话暂停事件是一种会话生命周期事件；其区分条件是：它记录会话停止推进但保留可恢复状态和待处理工作的可观测转移”；SessionResumeEvent 条件：“会话恢复事件是以如下事实为区分特征的会话生命周期事件：它记录从保留状态、检查点或外部延续恢复已暂停会话的可观测转移”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SessionLifecycleEvent: SessionPauseEvent (semantic kind=event, backbone SessionPauseEvent-is_a-SessionLifecycleEvent); SessionResumeEvent (semantic kind=event, backbone SessionResumeEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionPauseEvent condition: “As a session lifecycle event, Session pause event is distinguished by the fact that it records an observable transition where a session stops progressing while preserving resumable state and pending work”; SessionResumeEvent condition: “Session resume event is a session lifecycle event; its differentiating condition is that it records the observable transition that restores a paused session from retained state, checkpoint, or external continuation”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SessionLifecycleEvent：SessionPauseEvent（semantic kind=event、バックボーン SessionPauseEvent-is_a-SessionLifecycleEvent）；SessionResumeEvent（semantic kind=event、バックボーン SessionResumeEvent-is_a-SessionLifecycleEvent）。両端条件：SessionPauseEvent の条件：「セッションライフサイクルイベントに属するセッション一時停止イベントは、次の事実を種差とします：それは、セッションの進行が止まりつつ、再開可能な状態と保留中の作業が保持される観測可能な遷移を記録します」；SessionResumeEvent の条件：「セッション再開イベントはセッションライフサイクルイベントの一種であり、次の条件で区別されます：それは、保持された状態、チェックポイント、または外部継続から一時停止されたセッションを復元する観測可能な遷移を記録します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-session-pause-event-005
  - sibling_concept_id: SessionStartEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 端点特定对照：父节点 SessionLifecycleEvent：SessionPauseEvent（semantic kind=event，骨架 SessionPauseEvent-is_a-SessionLifecycleEvent）；SessionStartEvent（semantic kind=event，骨架 SessionStartEvent-is_a-SessionLifecycleEvent）。双端条件：SessionPauseEvent 条件：“会话暂停事件是一种会话生命周期事件；其区分条件是：它记录会话停止推进但保留可恢复状态和待处理工作的可观测转移”；SessionStartEvent 条件：“会话开始事件是一种会话生命周期事件；其区分条件是：它记录打开运行会话的可观测事件，并把会话绑定到初始参与者、环境、目标和上下文状态”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SessionLifecycleEvent: SessionPauseEvent (semantic kind=event, backbone SessionPauseEvent-is_a-SessionLifecycleEvent); SessionStartEvent (semantic kind=event, backbone SessionStartEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionPauseEvent condition: “As a session lifecycle event, Session pause event is distinguished by the fact that it records an observable transition where a session stops progressing while preserving resumable state and pending work”; SessionStartEvent condition: “As a session lifecycle event, Session start event is distinguished by the fact that it records the observable event that opens a runtime session and binds the session to initial actor, environment, goal, and context state”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SessionLifecycleEvent：SessionPauseEvent（semantic kind=event、バックボーン SessionPauseEvent-is_a-SessionLifecycleEvent）；SessionStartEvent（semantic kind=event、バックボーン SessionStartEvent-is_a-SessionLifecycleEvent）。両端条件：SessionPauseEvent の条件：「セッションライフサイクルイベントに属するセッション一時停止イベントは、次の事実を種差とします：それは、セッションの進行が止まりつつ、再開可能な状態と保留中の作業が保持される観測可能な遷移を記録します」；SessionStartEvent の条件：「セッションライフサイクルイベントに属するセッション開始イベントは、次の事実を種差とします：それは、実行セッションを開く観測可能なイベントを記録し、初期アクター、環境、目標、文脈状態に結び付けます」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-session-pause-event-006
parent_relation:
  id: SessionPauseEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个记录 RuntimeSession 从 active 进入可恢复 paused 或 interrupted 状态，并保存恢复所需引用的 SessionPauseEvent 都是 SessionLifecycleEvent；进程卡顿或终态结束不属于该子类。
    en: States that every SessionPauseEvent recording a RuntimeSession's transition from active to a resumable paused or interrupted state and retaining recovery references is a SessionLifecycleEvent; a process stall or terminal end is not in this subtype.
    ja: RuntimeSessionがactiveから再開可能なpaused/interruptedへ移り、recovery参照を保持するSessionPauseEventはSessionLifecycleEventです。process stallやterminal endはこのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_pause_event_subtype
    labels:
      zh: 具有暂停事件子类
      en: has pause-event subtype
      ja: pause-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SessionPauseEvent-is_a-SessionLifecycleEvent-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种会话生命周期事件正例
        en: "Positive case: is a session lifecycle event"
        ja: セッションライフサイクルイベントの一種の正例
      scenario_id: null
      descriptions:
        zh: pause-12 因等待外部审批把 session-12 从 active 改为 paused，并记录 checkpoint cp-12。
        en: pause-12 moves session-12 from active to paused while awaiting external approval and records checkpoint cp-12.
        ja: pause-12はexternal approval待ちでsession-12をactiveからpausedへ移し、checkpoint cp-12を記録します。
      field_values: {}
      related_node_ids:
        - SessionPauseEvent
        - SessionLifecycleEvent
      related_relation_ids:
        - SessionPauseEvent-is_a-SessionLifecycleEvent
      expected_result:
        zh: 将 pause-12 分类为 SessionLifecycleEvent。
        en: Classify pause-12 as a SessionLifecycleEvent.
        ja: pause-12をSessionLifecycleEventに分類します。
      why_valid_or_invalid:
        zh: 事件完成了可恢复的状态转换并保存继续执行所需状态。
        en: The event completes a resumable state transition and retains the state needed to continue.
        ja: eventがresumable state transitionを完了し、continuationに必要なstateを保持します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-session-pause-event-007
    - id: SessionPauseEvent-is_a-SessionLifecycleEvent-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种会话生命周期事件边界例
        en: "Boundary case: is a session lifecycle event"
        ja: セッションライフサイクルイベントの一種の境界例
      scenario_id: null
      descriptions:
        zh: worker-12 因网络超时暂时无输出，但 RuntimeSession 仍是 active，也未保存 checkpoint。
        en: worker-12 produces no output during a network timeout, but its RuntimeSession remains active and no checkpoint is saved.
        ja: worker-12はnetwork timeout中outputがありませんが、RuntimeSessionはactiveのままでcheckpointも保存しません。
      field_values: {}
      related_node_ids:
