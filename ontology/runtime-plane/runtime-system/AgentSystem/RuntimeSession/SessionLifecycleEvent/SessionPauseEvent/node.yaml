schema: moonweave.ai/ontology-node/v1
id: SessionPauseEvent
kind: concept
status: accepted
labels: {zh: 会话暂停事件, en: Session pause event, ja: セッション一時停止イベント}
semantics:
  short_definition: {zh: 记录 RuntimeSession 变为非活动但有意可恢复的 SessionLifecycleEvent。, en: A SessionLifecycleEvent that records a RuntimeSession becoming inactive but intentionally resumable., ja: RuntimeSession が非アクティブだが意図的に再開可能になることを記録する SessionLifecycleEvent。}
  definition: {zh: SessionPauseEvent 记录 RuntimeSession 从 active 转为 paused，同时其持久上下文仍可用于继续。它不是终止结束、进程挂起信号、检查点捕获 Activity，也不是消息之间的任意延迟。, en: "A SessionPauseEvent records that a RuntimeSession moved from active to paused while its durable context remains available for continuation. It is not a terminal end, a process suspension signal, a checkpoint capture Activity, or an arbitrary delay between messages.", ja: SessionPauseEvent は RuntimeSession が active から paused へ移り、その永続コンテキストが継続利用可能であることを記録する。終端終了、プロセス停止シグナル、チェックポイント取得 Activity、またはメッセージ間の任意の遅延ではない。}
  why_needed: {zh: 人工审批、外部输入、速率限制和持久中断需要明确的可恢复生命周期状态，以避免系统将暂停的工作视为已完成或已丢失。, en: "Human approval, external input, rate limits, and durable interruptions need an explicit resumable lifecycle state so the system can avoid treating paused work as completed or lost.", ja: 人手承認、外部入力、レート制限、永続的な中断には明示的で再開可能なライフサイクル状態が必要であり、システムが停止中の作業を完了または消失と誤認しないようにする。}
  includes:
    - {zh: 暂停时间、受控的暂停原因、可选的中断引用和可选的恢复检查点引用。, en: "Pause time, controlled pause reason, optional interrupt reference, and optional recovery checkpoint reference.", ja: 一時停止時刻、管理された停止理由、任意の割り込み参照、および任意の復旧チェックポイント参照。}
    - {zh: 在保留会话身份和允许上下文时从 active 转为 paused。, en: Transition from active to paused while preserving the session's identity and allowable context., ja: セッションの識別子と許可されたコンテキストを保ちながら active から paused へ移ること。}
  excludes:
    - {zh: 已关闭的会话、操作系统进程停止，或没有明确会话转换的通用空闲计时器。, en: "A closed session, an operating-system process stop, or a generic idle timer without an explicit session transition.", ja: 閉じられたセッション、OS プロセスの停止、または明示的なセッション遷移を伴わない一般的なアイドルタイマー。}
    - {zh: 检查点状态或捕获操作本身。, en: The checkpoint state or capture operation itself., ja: チェックポイント状態または取得操作そのもの。}
  semantic_kind: event
  aliases: [session interruption, resumable pause]
engineering:
  explanation: {zh: 一次执行遇到策略或输入中断，持久化所需状态，将会话生命周期改为 paused，并发出此事件。检查点记录和之后的恢复执行仍是由会话及证据标识符关联的独立记录。, en: "An execution reaches a policy or input interruption, persists any required state, changes the session lifecycle to paused, and emits this event. The checkpoint record and later resume execution remain separate records connected by session and evidence identifiers.", ja: 実行がポリシーまたは入力による中断に達すると、必要な状態を永続化し、セッションのライフサイクルを paused に変更してこのイベントを発行する。チェックポイント記録と後続の再開実行は、セッションおよび証拠識別子で結ばれた別個の記録のままである。}
  typical_input:
    - description: {zh: 暂停请求, en: Pause request, ja: 一時停止要求}
      format: |-
        {"session_id":"session-73","reason":"awaiting_human_approval","interrupt_ref":"interrupt-12","checkpoint_id":"checkpoint-4"}
  typical_output:
    - description: {zh: 暂停事件记录, en: Pause event record, ja: 一時停止イベント記録}
      format: |-
        {"event_id":"session-event-90","session_id":"session-73","event_type":"paused","pause_reason":"awaiting_human_approval","paused_at":"2026-07-18T09:16:00Z"}
  reference_implementations:
    - {name: LangGraph interrupts, url: https://docs.langchain.com/oss/python/langgraph/interrupts, description: "Documents interruption that pauses graph execution and later resumes from persisted state."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 暂停事件 ID, en: Pause event ID, ja: 一時停止イベント ID}
      definitions: {zh: 一次可恢复暂停转换的稳定标识符。, en: Stable identifier of one resumable pause transition., ja: 1 回の再開可能な一時停止遷移の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-event-90
      source_claims: [claim-session-pause-interrupt]
    - id: session_id
      labels:
        zh: "会话 ID"
        en: "Session ID"
        ja: "セッション ID"
      definitions:
        zh: "发生暂停转换的 RuntimeSession 的稳定标识。"
        en: "Stable identifier of the RuntimeSession undergoing the pause transition."
        ja: "一時停止遷移を行う RuntimeSession の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-session-pause-interrupt]
    - id: event_type
      labels:
        zh: "事件类型"
        en: "Event type"
        ja: "イベント種別"
      definitions:
        zh: "固定为 paused，以保留生命周期事件类别。"
        en: "Fixed to paused to retain the lifecycle-event category."
        ja: "ライフサイクルイベント種別を保持するため paused に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [paused]
      example_value: paused
      source_claims: [claim-session-pause-interrupt]
    - id: paused_at
      labels: {zh: 暂停时间, en: Pause time, ja: 一時停止時刻}
      definitions: {zh: 会话进入 paused 状态的时间戳。, en: Timestamp at which the session entered paused state., ja: セッションが paused 状態に入った時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:16:00Z'
      source_claims: [claim-session-pause-interrupt]
    - id: pause_reason
      labels: {zh: 暂停原因, en: Pause reason, ja: 一時停止理由}
      definitions: {zh: 要求会话在继续前等待的受控原因。, en: Controlled reason requiring the session to wait before continuation., ja: 継続前にセッションが待機することを要求する管理された理由。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [awaiting_human_approval, awaiting_external_input, rate_limited, scheduled_suspend]
      example_value: awaiting_human_approval
      source_claims: [claim-session-pause-interrupt]
  constraints:
    - id: session-pause-event-resumable-state
      severity: error
      language: plain
      expression: A SessionPauseEvent must set event_type to paused, transition from active to paused, and retain a resolvable session state or checkpoint reference when recovery is required.
      explanation: {zh: 暂停承诺会继续；丢失恢复证据会使其变成未追踪的失败。, en: A pause promises intended continuation; loss of recovery evidence turns it into an untracked failure., ja: 一時停止は継続の意思を示すため、復旧証拠を失うと追跡されない失敗に変わる。}
      source_claims: [claim-session-pause-interrupt]
  required_relations: [SessionPauseEvent-specializes-SessionLifecycleEvent]
examples:
  - id: session-pause-event-positive
    labels: {zh: "LangGraph interrupt 暂停", en: "LangGraph interrupt pause", ja: "LangGraph interrupt 一時停止"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionPauseEvent maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionPauseEvent maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; SessionPauseEvent serving env."}
    field_values: {event_id: session-event-90, session_id: session-73, event_type: paused, paused_at: '2026-07-18T09:16:00Z', pause_reason: awaiting_human_approval}
    related_node_ids: [SessionPauseEvent, RuntimeSession, Checkpoint]
    related_relation_ids: [SessionPauseEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-pause-interrupt]
  - id: session-pause-event-counterexample
    labels: {zh: "Run cancelled 非 SessionPause", en: "Run cancelled not SessionPause", ja: "Run cancelled は SessionPause ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style SessionPauseEvent.", en: "ID without PROV relations cannot serve as PROV-O-style SessionPauseEvent.", ja: "Missing PROV relations rejects SessionPauseEvent."}
    field_values: {run_attempt_id: run-18, outcome: completed}
    related_node_ids: [RunAttempt, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-session-pause-interrupt]
  - id: session-pause-event-boundary
    labels: {zh: "Pause 与 SessionEnd 边界", en: "Pause versus SessionEnd boundary", ja: "Pause と SessionEnd 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; SessionPauseEvent must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; SessionPauseEvent must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {event_id: session-event-90}
    related_node_ids: [SessionPauseEvent, Checkpoint, CheckpointCaptureActivity]
    related_relation_ids: []
    source_claims: [claim-session-pause-interrupt]
  - id: session-pause-event-instance-90
    labels: {zh: "session-90 interrupt 实例", en: "session-90 interrupt instance", ja: "session-90 interrupt 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->SessionPauseEvent.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->SessionPauseEvent.", ja: "OTel instance maps to SessionPauseEvent."}
    field_values: {event_id: session-event-90, session_id: session-73, event_type: paused, paused_at: '2026-07-18T09:16:00Z', pause_reason: awaiting_human_approval}
    related_node_ids: [SessionPauseEvent, RuntimeSession, Checkpoint]
    related_relation_ids: [SessionPauseEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-pause-interrupt]
parent_relation:
  id: SessionPauseEvent-specializes-SessionLifecycleEvent
  predicate: is_a
  target: concept:SessionLifecycleEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是会话暂停事件, en: is a session pause event, ja: セッション一時停止イベントである}
  definitions: {zh: 每个 SessionPauseEvent 都是进入可恢复 paused 状态的 SessionLifecycleEvent。, en: Every SessionPauseEvent is a SessionLifecycleEvent that enters a resumable paused state., ja: すべての SessionPauseEvent は、再開可能な paused 状態に入る SessionLifecycleEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_pause_event, labels: {zh: 具有暂停事件, en: has pause event, ja: 一時停止イベントを持つ}}
  conditions:
    - id: session-pause-event-parent-condition
      severity: error
      expression: Require event_type paused, prior active state, and an explicit resumable pause reason.
      explanations: {zh: 没有生命周期变化的空闲时间或工作完成不是会话暂停。, en: Idle time or work completion without a lifecycle change is not a session pause., ja: ライフサイクルの変更を伴わないアイドル時間または作業完了はセッション一時停止ではない。}
      source_claims: [claim-session-pause-interrupt]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-session-pause-interrupt]
relations: []
sources:
  - id: langgraph-interrupts
    title: "LangGraph interrupts"
    url: https://docs.langchain.com/oss/python/langgraph/interrupts
    source_type: documentation
    relevance: Documents pausing graph execution for an interrupt and continuing later with persisted state.
source_claims:
  - id: claim-session-pause-interrupt
    source: langgraph-interrupts
    supports: LangGraph interrupts pause graph execution to surface input and resume later from persisted state after a value is supplied.
    locator: Interrupts overview and Resume using Command
    evidence_kind: documentation
    confidence: high

