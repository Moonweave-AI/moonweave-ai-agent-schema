schema: moonweave.ai/ontology-node/v1
id: SessionLifecycleEvent
kind: concept
status: accepted
labels:
  zh: 会话生命周期事件
  en: session lifecycle event
  ja: セッションライフサイクルイベント
semantics:
  short_definition:
    zh: 会话生命周期事件是记录运行会话发生离散状态转换的带时间事件。
    en: A SessionLifecycleEvent is a timestamped event that records a discrete state transition of a RuntimeSession.
    ja: SessionLifecycleEvent は RuntimeSession の離散的な状態遷移を記録する時刻付きイベントである。
  definition:
    zh: 会话生命周期事件是一类事件；它以发生时间、目标 session_id、前置状态、后置状态和触发原因记录一次已发生的会话状态转换，并由开始、暂停、恢复或结束事件具体化。它不是会话当前状态值、会话活动本身或任意追踪事件。
    en: A SessionLifecycleEvent is an event distinguished by recording one completed session-state transition with occurrence time, target session_id, prior state, resulting state, and trigger reason, specialized as start, pause, resume, or end. It is not the session's current state value, the session activity itself, or an arbitrary trace event.
    ja: SessionLifecycleEvent は、発生時刻、対象 session_id、前状態、後状態、誘因によって一回の完了済みセッション状態遷移を記録し、開始、停止、再開、終了に特殊化されるイベントである。現在状態値、セッション活動そのもの、任意の追跡イベントではない。
  why_needed:
    zh: 该事件族让审计者重建会话状态历史，并检查暂停、恢复与结束是否按允许的状态机顺序发生。
    en: This event family lets auditors reconstruct session-state history and verify that pause, resume, and end transitions followed the permitted state machine.
    ja: このイベント族により監査者はセッション状態履歴を再構成し、停止、再開、終了が許可された状態機械に従ったか確認できる。
  includes:
    - zh: 纳入具有目标会话、发生时间以及明确前后状态的 SessionStartEvent、SessionPauseEvent、SessionResumeEvent 和 SessionEndEvent。
      en: Includes SessionStartEvent, SessionPauseEvent, SessionResumeEvent, and SessionEndEvent records with a target session, occurrence time, and explicit before and after states.
      ja: 対象セッション、発生時刻、明示的な前後状態を持つ SessionStartEvent、SessionPauseEvent、SessionResumeEvent、SessionEndEvent を含む。
  excludes:
    - zh: 不纳入仅保存当前状态的字段、一般 TraceEvent、Checkpoint、RuntimeSession 或未实际发生的生命周期计划。
      en: Excludes a field holding only current state, a general TraceEvent, a Checkpoint, a RuntimeSession, and a planned lifecycle change that has not occurred.
      ja: 現在状態だけを保持する項目、一般 TraceEvent、Checkpoint、RuntimeSession、未発生のライフサイクル計画は含まない。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - session_event_id
  fields:
    - id: session_event_id
      labels:
        zh: 会话事件标识
        en: session-event ID
        ja: session event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次不可变会话状态转换记录。
        en: Stably identifies one immutable session-state transition record.
        ja: 一つの immutable session-state transition record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: session-event:17/pause/1
      source_claims:
        - claim-session-lifecycle-event-002
    - id: session_ref
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用状态被改变的原 RuntimeSession。
        en: References the original RuntimeSession whose state changed.
        ja: state が変化した元 RuntimeSession を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-session:17
      source_claims:
        - claim-session-lifecycle-event-002
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录状态转换成为事实的时间。
        en: Records when the state transition became a fact.
        ja: state transition が事実となった時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T10:04:00Z
      source_claims:
        - claim-session-lifecycle-event-002
    - id: prior_state
      labels:
        zh: 前置状态
        en: prior state
        ja: prior state
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录转换前状态；首次开始可为空或 created。
        en: Records the state before the transition; an initial start may use null or created.
        ja: transition 前 state。initial start では null または created を許容します。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-session-lifecycle-event-002
    - id: resulting_state
      labels:
        zh: 后置状态
        en: resulting state
        ja: resulting state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录转换完成后的会话状态。
        en: Records the session state after the transition completes.
        ja: transition 完了後の session state。
      allowed_values: []
      pattern: null
      example_value: paused
      source_claims:
        - claim-session-lifecycle-event-002
    - id: trigger_kind
      labels:
        zh: 触发类型
        en: trigger kind
        ja: trigger kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分初始化、审批中断、审批完成、取消、失败或正常完成等触发原因类别。
        en: Classifies the trigger as initialization, approval interruption, approval completion, cancellation, failure, normal completion, or another explicit kind.
        ja: initialization/approval interruption/approval completion/cancellation/failure/normal completion 等の trigger class。
      allowed_values: []
      pattern: null
      example_value: approval-required
      source_claims:
        - claim-session-lifecycle-event-002
    - id: actor_ref
      labels:
        zh: 触发者引用
        en: triggering-actor reference
        ja: triggering actor 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在可知时引用发起或确认转换的 Actor。
        en: References the Actor that initiated or confirmed the transition when known.
        ja: 判明する場合に transition を開始または確認した Actor を参照します。
      allowed_values: []
      pattern: null
      example_value: actor:approval-operator-7
      source_claims:
        - claim-session-lifecycle-event-002
    - id: reason
      labels:
        zh: 转换理由
        en: transition reason
        ja: transition reason
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 提供可审计的具体转换原因，而不是重复后置状态。
        en: Provides an auditable concrete reason for the transition rather than repeating the resulting state.
        ja: resulting state の反復ではない auditable concrete reason。
      allowed_values: []
      pattern: null
      example_value: refund tool requires approval
      source_claims:
        - claim-session-lifecycle-event-002
  constraints:
    - id: session-lifecycle-event-records-change
      severity: error
      expression_language: plain
      expression: prior_state is absent only for an initial start; otherwise prior_state differs from resulting_state
      explanations:
        zh: 事件必须记录真实状态变化，而不是重复快照。
        en: The event records a real state change rather than a duplicate snapshot.
        ja: event は duplicate snapshot ではなく real state change を記録します。
      source_claims:
        - claim-session-lifecycle-event-002
    - id: session-lifecycle-event-immutable
      severity: error
      expression_language: plain
      expression: session_event_id, session_ref, occurred_at, prior_state, and resulting_state do not change after acceptance
      explanations:
        zh: 已接受的生命周期事件只能追加更正记录，不能原地重写。
        en: An accepted lifecycle event can only be corrected by an appended record, not rewritten in place.
        ja: accepted lifecycle event は appended correction でのみ訂正し、in-place rewrite しません。
      source_claims:
        - claim-session-lifecycle-event-002
  required_relation_constraints:
    - id: session-event-changes-one-session
      direction: outgoing
      predicate: changes_state_of
      target_concept_id: RuntimeSession
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个生命周期事件改变一个既定会话的状态。
        en: Each lifecycle event changes the state of one identified session.
        ja: 各 lifecycle event は一つの identified session の state を変更します。
      source_claims:
        - claim-session-lifecycle-event-002
examples:
  - id: SessionLifecycleEvent-example-positive-001
    kind: positive
    labels:
      zh: 会话生命周期事件正例
      en: Positive example of session lifecycle event
      ja: セッションライフサイクルイベントの正例
    scenario_id: null
    descriptions:
      zh: 事件记录 session-17 在 10:03Z 因等待人工批准从 active 变为 paused，并保留触发审批 ID。
      en: An event records session-17 changing from active to paused at 10:03Z because human approval is pending, retaining the approval ID that triggered it.
      ja: イベントが session-17 の active から paused への 10:03Z の遷移と、原因となる人間承認 ID を記録する。
    field_values:
      session_event_id: session-event:17/pause/1
      session_ref: runtime-session:17
      occurred_at: 2026-07-17T10:04:00Z
      prior_state: active
      resulting_state: paused
      trigger_kind: approval-required
      actor_ref: actor:runner-3
      reason: payment tool requires approval
    related_node_ids:
      - SessionLifecycleEvent
      - RuntimeSession
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
    expected_result:
      zh: 该记录归入 SessionLifecycleEvent，并可进一步归为 SessionPauseEvent。
      en: The record is a SessionLifecycleEvent and can be further classified as SessionPauseEvent.
      ja: この記録は SessionLifecycleEvent であり、さらに SessionPauseEvent に分類できる。
    why_valid_or_invalid:
      zh: 它断言了特定会话在特定时刻完成的前后状态变化，而不只是给出当前状态。
      en: It asserts a completed before-and-after state change for a specific session at a specific time rather than merely reporting current state.
      ja: 特定セッションの特定時刻に完了した前後状態変化を主張し、現在状態の報告だけではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-lifecycle-event-003
  - id: SessionLifecycleEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 会话生命周期事件边界例
      en: Boundary case for session lifecycle event
      ja: セッションライフサイクルイベントの境界例
    scenario_id: null
    descriptions:
      zh: 会话表中的 lifecycle_state=paused 只表示读取时的当前状态，没有发生时间、前置状态或触发原因。
      en: The field lifecycle_state=paused in a session row reports only current state at read time and contains no occurrence time, prior state, or trigger reason.
      ja: セッション行の lifecycle_state=paused は読取時の現在状態だけを示し、発生時刻、前状態、誘因を持たない。
    field_values: {}
    related_node_ids:
      - SessionLifecycleEvent
      - RuntimeSession
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
    expected_result:
      zh: 该字段属于 RuntimeSession 状态，不单独构成 SessionLifecycleEvent。
      en: The field is session state and does not by itself constitute a SessionLifecycleEvent.
      ja: この項目は RuntimeSession の状態であり、それだけでは SessionLifecycleEvent を構成しない。
    why_valid_or_invalid:
      zh: 事件必须断言一次发生过的转换；静态状态值无法证明何时以及为何发生变化。
      en: An event must assert an occurrence; a static state value cannot establish when or why a transition happened.
      ja: イベントは発生を主張する必要があり、静的状態値だけではいつ、なぜ遷移したか証明できない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-lifecycle-event-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SessionLifecycleEvent-changes_state_of-RuntimeSession
  predicate: changes_state_of
  direction: source-to-target
  relation_kind: temporal
  labels:
    zh: 改变会话状态
    en: changes session state
    ja: セッション状態を変更する
  definitions:
    zh: 把已发生的 SessionLifecycleEvent 连接到其状态被改变的 RuntimeSession；事件必须记录目标 session_id、发生时间、前态与后态，当前状态字段或未来计划不能替代该事件事实。
    en: Links an occurred SessionLifecycleEvent to the RuntimeSession whose state it changes; the event must record target session_id, occurrence time, prior state, and resulting state, and cannot be replaced by a current-state field or future plan.
    ja: 発生済みSessionLifecycleEventをstate変更対象RuntimeSessionへ結び、target session_id・occurrence time・prior/result stateを必要とします。current-state fieldやfuture planでは代替できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: state_changed_by_lifecycle_event
    labels:
      zh: 状态由生命周期事件改变
      en: state changed by lifecycle event
      ja: lifecycle eventで状態変更される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: SessionLifecycleEvent-changes_state_of-RuntimeSession-example-positive-manual-001
      kind: positive
      labels:
        zh: 改变会话状态正例
        en: "Positive case: changes session state"
        ja: セッション状態を変更するの正例
      scenario_id: null
      descriptions:
        zh: resume-9 记录 session-9 在 08:15Z 从 paused 变为 active，并引用触发该转换的审批结果。
        en: resume-9 records session-9 changing from paused to active at 08:15Z and references the approval result that triggered the transition.
        ja: resume-9はsession-9が08:15Zにpausedからactiveへ変わり、transitionをtriggerしたapproval resultを参照します。
      field_values: {}
      related_node_ids:
        - SessionLifecycleEvent
        - RuntimeSession
      related_relation_ids:
        - SessionLifecycleEvent-changes_state_of-RuntimeSession
      expected_result:
        zh: 断言 resume-9 changes_state_of session-9。
        en: Assert resume-9 changes_state_of session-9.
        ja: resume-9 changes_state_of session-9をassertします。
      why_valid_or_invalid:
