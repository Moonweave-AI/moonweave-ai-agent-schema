        en: Target, time, and verifiable before/after states form a complete state-transition event.
        ja: target・time・検証可能なbefore/after stateが完全なstate-transition eventを構成します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-session-lifecycle-event-005
    - id: SessionLifecycleEvent-changes_state_of-RuntimeSession-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 改变会话状态边界例
        en: "Boundary case: changes session state"
        ja: セッション状態を変更するの境界例
      scenario_id: null
      descriptions:
        zh: session-9 数据行只有 lifecycle_state=active 和更新时间，没有前态、触发原因或事件标识。
        en: The session-9 row contains only lifecycle_state=active and an update timestamp, with no prior state, trigger, or event identity.
        ja: session-9 rowにはlifecycle_state=activeとupdate timestampだけがあり、prior state・trigger・event identityがありません。
      field_values: {}
      related_node_ids:
        - SessionLifecycleEvent
        - RuntimeSession
      related_relation_ids:
        - SessionLifecycleEvent-changes_state_of-RuntimeSession
      expected_result:
        zh: 不得从当前状态字段创建 changes_state_of 事件边。
        en: Do not create a changes_state_of event edge from the current-state field.
        ja: current-state fieldからchanges_state_of event edgeを作りません。
      why_valid_or_invalid:
        zh: 状态快照不证明哪一次事件完成了转换。
        en: A state snapshot does not identify which occurrence completed the transition.
        ja: state snapshotはどのoccurrenceがtransitionを完了したかを示しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-session-lifecycle-event-005
  source_claims:
