source_claims:
  - id: claim-session-lifecycle-event-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK documents identifiable pause and resume occurrences around approval workflows. Moonweave generalizes those occurrences, together with start and end, into SessionLifecycleEvent.
    locator: Human-in-the-loop guide > Pause, approve, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-lifecycle-event-002
    source: eng-fw-openai-python-docs
    supports: "Direct source premise: the Agents SDK exposes a pending interruption, serializable RunState, an explicit approval or rejection, and continuation of the original run. Moonweave design inference: session lifecycle occurrences are immutable state-transition events with one event identity, one session reference, prior and resulting states, trigger, actor, and reason."
    locator: OpenAI Agents SDK > Human-in-the-loop > How the approval flow works; pause, serialize RunState, approve or reject, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-lifecycle-event-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK documents pausing a run for approval and resuming serialized RunState. The example models the observable session-state change produced by that flow.
    locator: Human-in-the-loop guide > Pause, approve, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-lifecycle-event-004
    source: eng-fw-langgraph-docs
    supports: LangGraph exposes current snapshots and a history of successive checkpoints as different views. Moonweave likewise distinguishes a current lifecycle-state value from the event that changed it.
    locator: Persistence guide > StateSnapshot fields and state history
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-lifecycle-event-005
    source: eng-proto-a2a-spec
    supports: A2A defines stateful Tasks that progress through interrupted or terminal states. Moonweave reifies each verified RuntimeSession state transition as a SessionLifecycleEvent so the transition history remains queryable rather than being collapsed into one current value.
    locator: Life of a Task > stateful Task lifecycle > interrupted and terminal states
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

