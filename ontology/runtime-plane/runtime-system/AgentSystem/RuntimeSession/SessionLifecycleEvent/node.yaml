schema: moonweave.ai/ontology-node/v1
id: SessionLifecycleEvent
kind: concept
status: accepted
labels: {zh: 会话生命周期事件, en: Session lifecycle event, ja: セッションライフサイクルイベント}
semantics:
  short_definition: {zh: RuntimeSession 生命周期中一个具名转换的耐久记录。, en: A durable record of one named transition in a RuntimeSession lifecycle., ja: RuntimeSession ライフサイクルにおける1つの名前付き遷移の耐久記録。}
  definition: {zh: SessionLifecycleEvent 是一个由 RuntimeSession 发出的事件记录，发生在其生命周期进入、离开、暂停、恢复或结束可用交互状态时。它记录一个时间点的转换；除非被单独插桩为此对象，它不是会话的完整状态、导致转换的 Execution Activity 或 OpenTelemetry Span Event。, en: "A SessionLifecycleEvent is an event record emitted by a RuntimeSession when its lifecycle enters, leaves, pauses, resumes, or ends a usable interaction state. It records a transition at a point in time; it is not the session's complete state, the Execution Activity that caused the transition, or an OpenTelemetry Span Event unless separately instrumented as one.", ja: SessionLifecycleEvent は、RuntimeSession のライフサイクルが使用可能な対話状態に入る、離れる、停止する、再開する、終了するときに RuntimeSession が発行するイベント記録である。時点での遷移を記録し、別途そのように計装されない限り、セッションの完全な状態、遷移を引き起こした Execution Activity、OpenTelemetry Span Event ではない。}
  why_needed: {zh: 支持、恢复和审计工作流需要会话状态变更的有序证据，而不会把可变会话记录或遥测流视为权威生命周期历史。, en: "Support, recovery, and audit workflows need ordered evidence of session state changes without treating a mutable session record or telemetry stream as the authoritative lifecycle history.", ja: サポート、復旧、監査のワークフローには、可変のセッション記録やテレメトリーストリームを権威あるライフサイクル履歴として扱わず、セッション状態変更の順序付き証拠が必要である。}
  includes:
    - {zh: 事件 ID、会话 ID、事件类型、发生时间、先前状态、下一状态和非机密原因引用。, en: "Event ID, session ID, event type, occurrence time, prior state, next state, and a non-secret cause reference.", ja: イベント ID、セッション ID、イベント種別、発生時刻、前状態、次状態、非機密の原因参照。}
    - {zh: 与一个会话关联的开始、暂停、恢复和结束事件记录。, en: "Start, pause, resume, and end event records associated with one session.", ja: 1つのセッションに関連する開始、停止、再開、終了イベント記録。}
  excludes:
    - {zh: 当前会话对象、状态快照、检查点捕获 Activity 和 trace span event。, en: "The current session object, a state snapshot, a checkpoint capture Activity, and a trace span event.", ja: 現在のセッションオブジェクト、状態スナップショット、チェックポイントキャプチャ Activity、trace span event。}
    - {zh: 缺少会话标识或状态转换证据的通用日志行。, en: A generic log line that lacks session identity or state-transition evidence., ja: セッションアイデンティティまたは状態遷移証拠を欠く一般的なログ行。}
  semantic_kind: event
  aliases: [session transition, lifecycle record]
engineering:
  explanation: {zh: 会话管理在改变会话状态时发出一条生命周期记录。记录持有稳定的前/后状态值和事件时间，而会话继续拥有可变上下文，执行或用户操作可作为原因单独链接。, en: "Session management emits one lifecycle record as it changes the session state. The record holds stable before/after state values and event time, while the session continues to own mutable context and an execution or user action may be separately linked as the cause.", ja: セッション管理はセッション状態を変更するときに1つのライフサイクル記録を発行する。記録は安定した前後状態値とイベント時刻を保持し、セッションは可変コンテキストを所有し続け、Execution またはユーザー操作は原因として別にリンクできる。}
  typical_input:
    - description: {zh: 生命周期转换, en: Lifecycle transition, ja: ライフサイクル遷移}
      format: |-
        {"session_id":"session-73","event_type":"paused","previous_state":"active","next_state":"paused","occurred_at":"2026-07-18T09:16:00Z"}
  typical_output:
    - description: {zh: 生命周期事件记录, en: Lifecycle event record, ja: ライフサイクルイベント記録}
      format: |-
        {"event_id":"session-event-90","session_id":"session-73","event_type":"paused","next_state":"paused"}
  reference_implementations:
    - {name: LangGraph interrupts, url: https://docs.langchain.com/oss/python/langgraph/interrupts, description: "Documents interruption and resume behavior in a stateful graph runtime."}
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Documents resuming interrupted agent runs using the same session."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 生命周期事件 ID, en: Lifecycle event ID, ja: ライフサイクルイベント ID}
      definitions: {zh: 一次记录转换的稳定标识符。, en: Stable identifier of one recorded transition., ja: 1件の記録済み遷移の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-event-90
      source_claims: [claim-session-interruption-continuity]
    - id: session_id
      labels: {zh: 会话 ID, en: Session ID, ja: セッション ID}
      definitions: {zh: 发出该转换的 RuntimeSession 标识符。, en: Identifier of the RuntimeSession that emitted this transition., ja: この遷移を発行した RuntimeSession の識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-session-interruption-continuity]
    - id: event_type
      labels: {zh: 事件类型, en: Event type, ja: イベント種別}
      definitions: {zh: 由此事件记录的生命周期转换类别。, en: Lifecycle transition category recorded by this event., ja: このイベントが記録するライフサイクル遷移カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [started, paused, resumed, ended]
      example_value: paused
      source_claims: [claim-session-interruption-continuity]
  constraints:
    - id: session-lifecycle-event-transition
      severity: error
      language: plain
      expression: The event session_id must match the emitted-by RuntimeSession, and event_type must agree with the recorded next lifecycle state.
      explanation: {zh: 如果会话所有者或状态方向不明确，转换无法被重放或审计。, en: A transition cannot be replayed or audited if its session owner or state direction is ambiguous., ja: セッション所有者または状態方向が曖昧だと、遷移をリプレイまたは監査できない。}
      source_claims: [claim-session-interruption-continuity]
  required_relations: [SessionLifecycleEvent-part_of-RuntimeSession, SessionLifecycleEvent-emitted-by-RuntimeSession]
examples:
  - id: session-lifecycle-event-positive
    labels: {zh: "OpenAI Session 生命周期事件", en: "OpenAI Session lifecycle event", ja: "OpenAI Session ライフサイクルイベント"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionLifecycleEvent maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionLifecycleEvent maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; SessionLifecycleEvent serving env."}
    field_values: {event_id: session-event-90, session_id: session-73, event_type: paused}
    related_node_ids: [SessionLifecycleEvent, RuntimeSession]
    related_relation_ids: [SessionLifecycleEvent-part_of-RuntimeSession, SessionLifecycleEvent-emitted-by-RuntimeSession]
    source_claims: [claim-session-interruption-continuity]
  - id: session-lifecycle-event-counterexample
    labels: {zh: "Run status 变更非 Session 事件", en: "Run status change not Session event", ja: "Run status 変更は Session イベントではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style SessionLifecycleEvent.", en: "ID without PROV relations cannot serve as PROV-O-style SessionLifecycleEvent.", ja: "Missing PROV relations rejects SessionLifecycleEvent."}
    field_values: {session_id: session-73, state: paused}
    related_node_ids: [RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-session-interruption-continuity]
  - id: session-lifecycle-event-boundary
    labels: {zh: "Start/End 与 Pause/Resume 边界", en: "Start End versus Pause Resume boundary", ja: "Start/End と Pause/Resume 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; SessionLifecycleEvent must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; SessionLifecycleEvent must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {event_id: session-event-90}
    related_node_ids: [SessionLifecycleEvent, TraceEvent]
    related_relation_ids: []
    source_claims: [claim-session-interruption-continuity]
  - id: session-lifecycle-event-instance-90
    labels: {zh: "session-90 生命周期序列", en: "session-90 lifecycle sequence", ja: "session-90 ライフサイクル系列"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->SessionLifecycleEvent.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->SessionLifecycleEvent.", ja: "OTel instance maps to SessionLifecycleEvent."}
    field_values: {event_id: session-event-90, session_id: session-73, event_type: paused}
    related_node_ids: [SessionLifecycleEvent, RuntimeSession, SessionPauseEvent]
    related_relation_ids: [SessionLifecycleEvent-emitted-by-RuntimeSession]
    source_claims: [claim-session-interruption-continuity]
parent_relation:
  id: SessionLifecycleEvent-part_of-RuntimeSession
  predicate: part_of
  target: concept:RuntimeSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是运行时会话的一部分, en: is part of runtime session, ja: ランタイムセッションの一部である}
  definitions: {zh: 每个 SessionLifecycleEvent 都保留在一个 RuntimeSession 的生命周期历史中。, en: Every SessionLifecycleEvent is retained in the lifecycle history of one RuntimeSession., ja: すべての SessionLifecycleEvent は1つの RuntimeSession のライフサイクル履歴に保持される。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_lifecycle_event, labels: {zh: 具有生命周期事件, en: has lifecycle event, ja: ライフサイクルイベントを持つ}}
  conditions:
    - id: session-lifecycle-event-parent-condition
      severity: error
      expression: The event session_id must resolve to the target RuntimeSession.
      explanations: {zh: 组合关系保留一个所属生命周期历史。, en: Composition preserves one owning lifecycle history., ja: コンポジションは1つの所有ライフサイクル履歴を保持する。}
      source_claims: [claim-session-interruption-continuity]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-session-interruption-continuity]
relations:
  - id: SessionLifecycleEvent-emitted-by-RuntimeSession
    predicate: emitted_by
    target: concept:RuntimeSession
    direction: source-to-target
    relation_kind: emission
    labels: {zh: 由运行时会话发出, en: was emitted by runtime session, ja: ランタイムセッションにより発行された}
    definitions: {zh: 当 RuntimeSession 的管理器记录状态转换时，该 SessionLifecycleEvent 由该 RuntimeSession emitted_by。, en: A SessionLifecycleEvent was emitted_by the RuntimeSession whose manager recorded the state transition., ja: RuntimeSession のマネージャーが状態遷移を記録するとき、SessionLifecycleEvent はその RuntimeSession により emitted_by される。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: emitted, labels: {zh: 发出生命周期事件, en: emitted lifecycle event, ja: ライフサイクルイベントを発行した}}
    conditions:
      - id: session-lifecycle-event-emitter-condition
        severity: error
        expression: Assert emission only when the event session_id equals the target RuntimeSession ID.
        explanations: {zh: 一个关联执行或追踪可以观察转换，但不能代表另一个会话发出它。, en: "A correlated execution or trace may observe a transition but does not emit it on behalf of another session.", ja: 相関する Execution またはトレースは遷移を観測し得るが、別のセッションを代表して発行することはない。}
        source_claims: [claim-session-interruption-continuity]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-session-interruption-continuity]
sources:
  - id: langgraph-interrupts
    title: "LangGraph interrupts"
    url: https://docs.langchain.com/oss/python/langgraph/interrupts
    source_type: documentation
    relevance: Documents pausing graph execution for input and resuming it with persisted state.
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Documents interrupted agent-run resumption with the same session and persisted history.
source_claims:
  - id: claim-session-interruption-continuity
    source: openai-agents-sessions
    supports: Agents SDK sessions preserve history across runs, and an interrupted run can resume with the same session context.
    locator: Resuming interrupted runs with the same session and Core session behavior
    evidence_kind: documentation
    confidence: high

