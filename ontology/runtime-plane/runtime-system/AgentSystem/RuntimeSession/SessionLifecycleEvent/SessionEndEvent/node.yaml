source_claims:
  - id: claim-session-end-event-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK distinguishes ongoing loop execution from completion with a final output. Moonweave records that session-level terminal occurrence as SessionEndEvent.
    locator: Running agents guide > Agent loop and final output
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-end-event-002
    source: eng-fw-openai-python-docs
    supports: "Direct source premise: the Agents SDK exposes a pending interruption, serializable RunState, an explicit approval or rejection, and continuation of the original run. Moonweave design inference: session lifecycle occurrences are immutable state-transition events with one event identity, one session reference, prior and resulting states, trigger, actor, and reason."
    locator: OpenAI Agents SDK > Human-in-the-loop > How the approval flow works; pause, serialize RunState, approve or reject, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-end-event-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK exposes a final run result after the agent loop completes. Moonweave's example records the session-level terminal transition around that final output.
    locator: Running agents guide > Results and final output
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-end-event-004
    source: eng-fw-langgraph-docs
    supports: LangGraph documents resuming from saved state after interruption. Moonweave therefore treats a checkpointed wait with planned continuation as pause rather than end.
    locator: Persistence guide > Fault tolerance and resume from the last successful step
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-end-event-005
    source: eng-proto-a2a-spec
    supports: A2A separates interrupted states that await input or authentication from completed, failed, canceled, and rejected terminal states. Moonweave uses that terminal/non-terminal boundary to distinguish SessionEndEvent, which closes normal continuation, from SessionPauseEvent, which preserves a resumable session.
    locator: Specification > 4.1.3 TaskState > interrupted and terminal states
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-session-end-event-006
    source: eng-proto-a2a-spec
    supports: "A2A forbids further messages to a Task in a terminal state but treats input-required and auth-required as interrupted rather than terminal. Moonweave consequently separates SessionEndEvent from SessionResumeEvent: an ended session cannot be resumed as the same normal continuation, whereas an interrupted session can return to active."
    locator: Specification > 3.1.1 Send Message > terminal-state restriction; 4.1.3 TaskState
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-session-end-event-007
    source: eng-proto-a2a-spec
    supports: A2A explicitly separates interrupted input-required and auth-required states from terminal completed, canceled, rejected, and failed states. Moonweave uses that distinction to differentiate SessionEndEvent within the lifecycle-event taxonomy.
    locator: Life of a Task > Agent Response > interrupted versus terminal Task states
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-end-event-008
    source: eng-proto-a2a-spec
    supports: A2A distinguishes interrupted task states from terminal completed, canceled, rejected, and failed states and states that a terminal Task cannot restart. Moonweave applies this terminal/nonterminal distinction to the RuntimeSession end-event relation.
    locator: Life of a Task > Task Immutability > terminal tasks cannot restart
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

