schema: moonweave.ai/ontology-node/v1
id: SessionEndEvent
kind: concept
labels:
  en: session end event
  zh: 会话结束事件
  ja: セッション終了イベント
semantics:
  short_definition:
    zh: 会话结束事件是把运行会话置于完成、取消或失败终态并关闭其活动边界的生命周期事件。
    en: A SessionEndEvent is the lifecycle event that places a RuntimeSession in a completed, cancelled, or failed terminal state and closes its activity boundary.
    ja: SessionEndEvent は RuntimeSession を completed、cancelled、failed の終端状態に置き、その活動境界を閉じるライフサイクルイベントである。
  definition:
    zh: 会话结束事件是 SessionLifecycleEvent 的一种；其种差是它记录结束时间、终态、结束原因和适用的最终输出或诊断，并终止同一会话的正常继续。资源清理可以由它触发，但清理动作不是事件本身；可恢复暂停也不属于结束。
    en: A SessionEndEvent is a SessionLifecycleEvent distinguished by recording end time, terminal state, end reason, and applicable final output or diagnostic and by ending normal continuation of the same session. It may trigger resource cleanup, but cleanup is not the event itself, and a resumable pause is not an end.
    ja: SessionEndEvent は SessionLifecycleEvent の一種であり、終了時刻、終端状態、終了理由、該当する最終出力または診断を記録し、同じセッションの通常継続を終える。資源後処理を誘発し得るが後処理自体ではなく、再開可能な停止も終了ではない。
  why_needed:
    zh: 该事件为耗时、最终结果、失败原因和资源回收建立明确结算点，并阻止终态会话被无审计地继续。
    en: This event establishes a settlement point for duration, final result, failure reason, and resource reclamation and prevents an ended session from continuing without an audited new decision.
    ja: このイベントは所要時間、最終結果、障害理由、資源回収の確定点を作り、終了済みセッションの無監査継続を防ぐ。
  includes:
    - zh: 纳入把 active 或 paused 会话转换为 completed、cancelled 或 failed，并记录结束时间与原因的事件。
      en: Includes an event that changes an active or paused session to completed, cancelled, or failed and records end time and reason.
      ja: active または paused のセッションを completed、cancelled、failed に変更し、終了時刻と理由を記録するイベントを含む。
  excludes:
    - zh: 不纳入可恢复 SessionPauseEvent、某个 RunAttempt 的结束、最后一条 Message、资源清理动作或仅预测会话将结束的计划。
      en: Excludes a resumable SessionPauseEvent, the end of one RunAttempt, the final Message, a resource-cleanup activity, and a plan that merely predicts session end.
      ja: 再開可能な SessionPauseEvent、単一 RunAttempt の終了、最後の Message、資源後処理活動、終了を予測するだけの計画は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 SessionEndEvent 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SessionEndEvent, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SessionEndEvent 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SessionEndEvent.
      format: |-
        # Example SessionEndEvent ingest
        { "session-end-event_ref": "example-1" }
      source_claims:
        - claim-session-end-event-design
  typical_output:
    - description: Moonweave-local SessionEndEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "session-end-event_id": "example-1" }'
      source_claims:
        - claim-session-end-event-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: terminal_outcome
      labels:
        zh: 终止结果
        en: terminal outcome
        ja: terminal outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分完成、取消、拒绝、失败或超时等终止结果。
        en: Distinguishes completed, cancelled, rejected, failed, timed-out, or another explicit terminal outcome.
        ja: completed/cancelled/rejected/failed/timed-out 等の terminal outcome を区別します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-session-end-event-design
    - id: final_output_ref
      labels:
        zh: 最终输出引用
        en: final-output reference
        ja: final output 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 完成时引用该会话的最终可交付输出。
        en: References the session's final deliverable output when it completes successfully.
        ja: successful completion 時の session final deliverable output を参照します。
      allowed_values: []
      pattern: null
      example_value: output:refund-status-88
      source_claims:
        - claim-session-end-event-design
    - id: diagnostic_ref
      labels:
        zh: 终止诊断引用
        en: terminal-diagnostic reference
        ja: terminal diagnostic 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 失败、拒绝或超时时引用解释终止原因的诊断记录。
        en: References the diagnostic record explaining a failure, rejection, or timeout.
        ja: failure/rejection/timeout を説明する diagnostic record を参照します。
      allowed_values: []
      pattern: null
      example_value: diagnostic:session-88/final
      source_claims:
        - claim-session-end-event-design
  constraints:
    - id: session-end-transition
      severity: error
      expression_language: plain
      expression: resulting_state is terminal; completed has final_output_ref, while failed, rejected, or timed-out has diagnostic_ref
      explanations:
        zh: 结束事件关闭正常继续路径，并保留与结果相符的证据。
        en: An end event closes normal continuation and retains evidence appropriate to its outcome.
        ja: end event は normal continuation を閉じ、outcome に適合する evidence を保持します。
      source_claims:
        - claim-session-end-event-design
  required_relation_constraints: []
examples:
  - id: SessionEndEvent-example-positive-001
    labels:
      zh: OpenAI Session 结束
      en: OpenAI Session end
      ja: OpenAI Session 終了
    descriptions:
      zh: OpenAI Agents SDK session.close() 或 TTL 过期产生 SessionEndEvent session_id=session-99、ended_at=2026-01-15T10:00:00Z；store 标记 closed。
      en: OpenAI Agents SDK session.close() or TTL expiry produces SessionEndEvent session_id=session-99, ended_at=2026-01-15T10:00:00Z; store marked closed.
      ja: OpenAI session.close が SessionEndEvent を生成する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      session_event_id: session-event:88/end/1
      session_ref: runtime-session:88
      occurred_at: 2026-07-17T11:42:00Z
      prior_state: active
      resulting_state: completed
      trigger_kind: normal-completion
      actor_ref: actor:runner-3
      reason: final refund status returned
      terminal_outcome: completed
      final_output_ref: output:refund-status-88
    related_node_ids:
      - SessionEndEvent
      - RuntimeSession
    related_relation_ids:
      - closes_runtime_session
    source_claims:
      - claim-session-end-event-design
  - id: SessionEndEvent-example-boundary-001
    labels:
      zh: Process exit 非 SessionEnd
      en: Process exit not SessionEnd
      ja: Process exit は SessionEnd ではない
    descriptions:
      zh: worker 进程 exit(code=0) 是 ProcessHandle/RuntimeEnvironment 事件，不是 RuntimeSession SessionEndEvent。
      en: worker process exit(code=0) is ProcessHandle/RuntimeEnvironment event, not RuntimeSession SessionEndEvent.
      ja: process exit は SessionEnd ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionEndEvent
      - RuntimeSession
      - SessionPauseEvent
    related_relation_ids:
      - closes_runtime_session
    source_claims:
      - claim-session-end-event-design
  - id: SessionEndEvent-example-3
    labels:
      zh: SessionEnd 与 Execution completed 边界
      en: SessionEnd versus Execution completed boundary
      ja: SessionEnd と Execution completed 境界
    descriptions:
      zh: SessionEndEvent 关闭会话上下文；Execution completed 结束单次 Run；session 结束后不可 SessionResumeEvent。
      en: SessionEndEvent closes session context; Execution completed ends single Run; after session end no SessionResumeEvent.
      ja: SessionEnd 後は Resume 不可、Execution completed は Run 終了である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionEndEvent
    related_relation_ids: []
    source_claims:
      - claim-session-end-event-vendor
      - claim-session-end-event-design
  - id: SessionEndEvent-example-4
    labels:
      zh: session-99 关闭实例
      en: session-99 close instance
      ja: session-99 クローズ事例
    descriptions:
      zh: SessionEndEvent event_id=session-end-99、session_id=session-99、ended_at=2026-01-15T10:00:00Z、reason=user_logout。
      en: SessionEndEvent event_id=session-end-99, session_id=session-99, ended_at=2026-01-15T10:00:00Z, reason=user_logout.
      ja: session-end-99 クローズを記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionEndEvent
    related_relation_ids: []
    source_claims:
      - claim-session-end-event-vendor
      - claim-session-end-event-design
parent_relation:
  id: SessionEndEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个记录 RuntimeSession 从非终态进入 completed、canceled、rejected 或 failed 等终态的 SessionEndEvent 都是 SessionLifecycleEvent；可恢复暂停不属于该子类。
    en: States that every SessionEndEvent recording a RuntimeSession's transition from a nonterminal state to a terminal state such as completed, canceled, rejected, or failed is a SessionLifecycleEvent; a resumable pause is not in this subtype.
    ja: RuntimeSessionがnonterminal stateからcompleted・canceled・rejected・failed等terminal stateへ移ることを記録するSessionEndEventはSessionLifecycleEventです。resumable pauseはこのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有结束事件子类
      en: has end-event subtype
      ja: end-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-session-end-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: closes_runtime_session
    predicate: closes_runtime_session
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 结束运行会话
      en: closes runtime session
      ja: 実行セッションを終了する
    definitions:
      zh: 把已经发生的 SessionEndEvent 连接到其终结的 RuntimeSession；只有事件记录了该会话从非终态进入终态的时间、原因和最终状态时，该边才成立。
      en: Links an occurred SessionEndEvent to the RuntimeSession it terminates, and is asserted only when the event records that session's transition from a nonterminal state to a terminal state with time, reason, and final status.
      ja: 発生済みSessionEndEventを終了対象RuntimeSessionへ結び、非終端状態から終端状態への遷移時刻・理由・final statusを記録する場合だけ成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: closed_by_session_end_event
      labels:
        zh: 由会话结束事件关闭
        en: closed by session end event
        ja: セッション終了イベントで閉じられる
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-session-end-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RuntimeSession
sources:
  - id: src-openai-threads
    title: OpenAI Assistants Threads API
    url: https://platform.openai.com/docs/api-reference/threads
    source_type: official-doc
    relevance: thread_id preserving multi-turn context across runs.
  - id: src-langgraph-threads
    title: LangGraph Server Threads API
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
    source_type: official-doc
    relevance: Persistent thread_id with checkpoint and run history.
  - id: src-e2b-sandbox
    title: E2B Documentation
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Sandbox sessions, process handles, and working directories.
  - id: src-runtime-system-design
    title: Moonweave runtime-system module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: AgentSystem, RuntimeEnvironment, RuntimeSession boundaries.
source_claims:
  - id: claim-session-end-event-vendor
    source: src-openai-threads
    supports: runtime-system vendor evidence supports SessionEndEvent identity and boundary mapping.
    locator: SessionEndEvent integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-session-end-event-design
    source: src-runtime-system-design
    supports: Moonweave SessionEndEvent concept boundary within runtime-system.
    locator: SessionEndEvent boundary
    evidence_kind: design-inference
    confidence: high
