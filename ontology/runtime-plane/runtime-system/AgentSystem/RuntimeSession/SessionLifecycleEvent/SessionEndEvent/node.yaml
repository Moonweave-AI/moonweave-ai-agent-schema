schema: moonweave.ai/ontology-node/v1
id: SessionEndEvent
kind: concept
status: accepted
labels:
  en: session end event
  zh: 会话结束事件
  ja: セッション終了イベント
semantics:
  short_definition:
    zh: 会话结束事件是把运行会话置于完成、取消或失败终态并关闭其活动边界的生命周期事件。
    en: A SessionEndEvent is the lifecycle event that places a RuntimeSession in a completed, cancelled, or failed terminal state and closes its activity boundary.
    ja: SessionEndEvent は RuntimeSession を completed、cancelled、failed の終端状態に置き、その活動境界を閉じるライフサイクルイベントである。
  definition:
    zh: 会话结束事件是 SessionLifecycleEvent 的一种；其种差是它记录结束时间、终态、结束原因和适用的最终输出或诊断，并终止同一会话的正常继续。资源清理可以由它触发，但清理动作不是事件本身；可恢复暂停也不属于结束。
    en: A SessionEndEvent is a SessionLifecycleEvent distinguished by recording end time, terminal state, end reason, and applicable final output or diagnostic and by ending normal continuation of the same session. It may trigger resource cleanup, but cleanup is not the event itself, and a resumable pause is not an end.
    ja: SessionEndEvent は SessionLifecycleEvent の一種であり、終了時刻、終端状態、終了理由、該当する最終出力または診断を記録し、同じセッションの通常継続を終える。資源後処理を誘発し得るが後処理自体ではなく、再開可能な停止も終了ではない。
  why_needed:
    zh: 该事件为耗时、最终结果、失败原因和资源回收建立明确结算点，并阻止终态会话被无审计地继续。
    en: This event establishes a settlement point for duration, final result, failure reason, and resource reclamation and prevents an ended session from continuing without an audited new decision.
    ja: このイベントは所要時間、最終結果、障害理由、資源回収の確定点を作り、終了済みセッションの無監査継続を防ぐ。
  includes:
    - zh: 纳入把 active 或 paused 会话转换为 completed、cancelled 或 failed，并记录结束时间与原因的事件。
      en: Includes an event that changes an active or paused session to completed, cancelled, or failed and records end time and reason.
      ja: active または paused のセッションを completed、cancelled、failed に変更し、終了時刻と理由を記録するイベントを含む。
  excludes:
    - zh: 不纳入可恢复 SessionPauseEvent、某个 RunAttempt 的结束、最后一条 Message、资源清理动作或仅预测会话将结束的计划。
      en: Excludes a resumable SessionPauseEvent, the end of one RunAttempt, the final Message, a resource-cleanup activity, and a plan that merely predicts session end.
      ja: 再開可能な SessionPauseEvent、単一 RunAttempt の終了、最後の Message、資源後処理活動、終了を予測するだけの計画は含まない。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: terminal_outcome
      labels:
        zh: 终止结果
        en: terminal outcome
        ja: terminal outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分完成、取消、拒绝、失败或超时等终止结果。
        en: Distinguishes completed, cancelled, rejected, failed, timed-out, or another explicit terminal outcome.
        ja: completed/cancelled/rejected/failed/timed-out 等の terminal outcome を区別します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-session-end-event-002
    - id: final_output_ref
      labels:
        zh: 最终输出引用
        en: final-output reference
        ja: final output 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 完成时引用该会话的最终可交付输出。
        en: References the session's final deliverable output when it completes successfully.
        ja: successful completion 時の session final deliverable output を参照します。
      allowed_values: []
      pattern: null
      example_value: output:refund-status-88
      source_claims:
        - claim-session-end-event-002
    - id: diagnostic_ref
      labels:
        zh: 终止诊断引用
        en: terminal-diagnostic reference
        ja: terminal diagnostic 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 失败、拒绝或超时时引用解释终止原因的诊断记录。
        en: References the diagnostic record explaining a failure, rejection, or timeout.
        ja: failure/rejection/timeout を説明する diagnostic record を参照します。
      allowed_values: []
      pattern: null
      example_value: diagnostic:session-88/final
      source_claims:
        - claim-session-end-event-002
  constraints:
    - id: session-end-transition
      severity: error
      expression_language: plain
      expression: resulting_state is terminal; completed has final_output_ref, while failed, rejected, or timed-out has diagnostic_ref
      explanations:
        zh: 结束事件关闭正常继续路径，并保留与结果相符的证据。
        en: An end event closes normal continuation and retains evidence appropriate to its outcome.
        ja: end event は normal continuation を閉じ、outcome に適合する evidence を保持します。
      source_claims:
        - claim-session-end-event-002
  required_relation_constraints: []
examples:
  - id: SessionEndEvent-example-positive-001
    kind: positive
    labels:
      zh: 会话结束事件正例
      en: Positive example of session end event
      ja: セッション終了イベントの正例
    scenario_id: null
    descriptions:
      zh: session-88 在返回最终退款状态后于 11:42Z 从 active 变为 completed，保存 final_output_ref 并记录 normal-completion 原因。
      en: After returning the final refund status, session-88 changes from active to completed at 11:42Z, stores final_output_ref, and records normal-completion as the reason.
      ja: 最終返金状態の返却後、session-88 は 11:42Z に active から completed へ変わり、final_output_ref と normal-completion 理由を保存する。
    field_values:
      session_event_id: session-event:88/end/1
      session_ref: runtime-session:88
      occurred_at: 2026-07-17T11:42:00Z
      prior_state: active
      resulting_state: completed
      trigger_kind: normal-completion
      actor_ref: actor:runner-3
      reason: final refund status returned
      terminal_outcome: completed
      final_output_ref: output:refund-status-88
    related_node_ids:
      - SessionEndEvent
      - RuntimeSession
    related_relation_ids:
      - closes_runtime_session
    expected_result:
      zh: 该终态转换归类为 SessionEndEvent，并关闭 session-88 的持续时间。
      en: The terminal transition is classified as SessionEndEvent and closes the duration of session-88.
      ja: この終端遷移は SessionEndEvent に分類され、session-88 の継続時間を閉じる。
    why_valid_or_invalid:
      zh: 事件给出终态、结束时刻、原因和最终输出，且没有继续同一会话的恢复点。
      en: The event supplies terminal state, end time, reason, and final output, with no continuation point for the same session.
      ja: 終端状態、終了時刻、理由、最終出力があり、同じセッションの継続点がない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-end-event-003
  - id: SessionEndEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 会话结束事件边界例
      en: Boundary case for session end event
      ja: セッション終了イベントの境界例
    scenario_id: null
    descriptions:
      zh: session-88 因限流等待三十秒并保存 checkpoint，状态改为 paused，调度器计划稍后继续。
      en: session-88 waits thirty seconds because of rate limiting, saves a checkpoint, changes to paused, and is scheduled to continue later.
      ja: session-88 はレート制限で三十秒待ち、checkpoint を保存して paused へ変わり、後で継続予定である。
    field_values: {}
    related_node_ids:
      - SessionEndEvent
      - RuntimeSession
      - SessionPauseEvent
    related_relation_ids:
      - closes_runtime_session
    expected_result:
      zh: 这是 SessionPauseEvent，不是 SessionEndEvent。
      en: This is a SessionPauseEvent, not a SessionEndEvent.
      ja: これは SessionEndEvent ではなく SessionPauseEvent である。
    why_valid_or_invalid:
      zh: 保存状态与计划继续证明会话仍可恢复，尚未进入终态。
      en: Saved state and scheduled continuation show that the session remains resumable and has not entered a terminal state.
      ja: 保存状態と継続予定が再開可能性を示し、終端状態には入っていない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-end-event-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SessionPauseEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 共享父节点对照：父节点 SessionLifecycleEvent：SessionEndEvent（semantic kind=event，骨架 SessionEndEvent-is_a-SessionLifecycleEvent）；SessionPauseEvent（semantic kind=event，骨架 SessionPauseEvent-is_a-SessionLifecycleEvent）。双端条件：SessionEndEvent 条件：“作为会话生命周期事件，会话结束事件由这一事实区分：它记录运行会话的可观测关闭，包括最终状态、清理、产物和剩余审计引用”；SessionPauseEvent 条件：“会话暂停事件是一种会话生命周期事件；其区分条件是：它记录会话停止推进但保留可恢复状态和待处理工作的可观测转移”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SessionLifecycleEvent: SessionEndEvent (semantic kind=event, backbone SessionEndEvent-is_a-SessionLifecycleEvent); SessionPauseEvent (semantic kind=event, backbone SessionPauseEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionEndEvent condition: “Session end event belongs to the session lifecycle event category and differs from broader members in that it records the observable closure of a runtime session, including final status, cleanup, artifacts, and remaining audit references”; SessionPauseEvent condition: “As a session lifecycle event, Session pause event is distinguished by the fact that it records an observable transition where a session stops progressing while preserving resumable state and pending work”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SessionLifecycleEvent：SessionEndEvent（semantic kind=event、バックボーン SessionEndEvent-is_a-SessionLifecycleEvent）；SessionPauseEvent（semantic kind=event、バックボーン SessionPauseEvent-is_a-SessionLifecycleEvent）。両端条件：SessionEndEvent の条件：「セッション終了イベントはセッションライフサイクルイベントとして、次の条件により他の対象と区別されます：それは、実行セッションの観測可能な終了を記録し、最終状態、クリーンアップ、成果物、残る監査参照を含みます」；SessionPauseEvent の条件：「セッションライフサイクルイベントに属するセッション一時停止イベントは、次の事実を種差とします：それは、セッションの進行が止まりつつ、再開可能な状態と保留中の作業が保持される観測可能な遷移を記録します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-session-end-event-005
  - sibling_concept_id: SessionResumeEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 端点特定对照：父节点 SessionLifecycleEvent：SessionEndEvent（semantic kind=event，骨架 SessionEndEvent-is_a-SessionLifecycleEvent）；SessionResumeEvent（semantic kind=event，骨架 SessionResumeEvent-is_a-SessionLifecycleEvent）。双端条件：SessionEndEvent 条件：“作为会话生命周期事件，会话结束事件由这一事实区分：它记录运行会话的可观测关闭，包括最终状态、清理、产物和剩余审计引用”；SessionResumeEvent 条件：“会话恢复事件是以如下事实为区分特征的会话生命周期事件：它记录从保留状态、检查点或外部延续恢复已暂停会话的可观测转移”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SessionLifecycleEvent: SessionEndEvent (semantic kind=event, backbone SessionEndEvent-is_a-SessionLifecycleEvent); SessionResumeEvent (semantic kind=event, backbone SessionResumeEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionEndEvent condition: “Session end event belongs to the session lifecycle event category and differs from broader members in that it records the observable closure of a runtime session, including final status, cleanup, artifacts, and remaining audit references”; SessionResumeEvent condition: “Session resume event is a session lifecycle event; its differentiating condition is that it records the observable transition that restores a paused session from retained state, checkpoint, or external continuation”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SessionLifecycleEvent：SessionEndEvent（semantic kind=event、バックボーン SessionEndEvent-is_a-SessionLifecycleEvent）；SessionResumeEvent（semantic kind=event、バックボーン SessionResumeEvent-is_a-SessionLifecycleEvent）。両端条件：SessionEndEvent の条件：「セッション終了イベントはセッションライフサイクルイベントとして、次の条件により他の対象と区別されます：それは、実行セッションの観測可能な終了を記録し、最終状態、クリーンアップ、成果物、残る監査参照を含みます」；SessionResumeEvent の条件：「セッション再開イベントはセッションライフサイクルイベントの一種であり、次の条件で区別されます：それは、保持された状態、チェックポイント、または外部継続から一時停止されたセッションを復元する観測可能な遷移を記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-session-end-event-006
parent_relation:
  id: SessionEndEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个记录 RuntimeSession 从非终态进入 completed、canceled、rejected 或 failed 等终态的 SessionEndEvent 都是 SessionLifecycleEvent；可恢复暂停不属于该子类。
    en: States that every SessionEndEvent recording a RuntimeSession's transition from a nonterminal state to a terminal state such as completed, canceled, rejected, or failed is a SessionLifecycleEvent; a resumable pause is not in this subtype.
    ja: RuntimeSessionがnonterminal stateからcompleted・canceled・rejected・failed等terminal stateへ移ることを記録するSessionEndEventはSessionLifecycleEventです。resumable pauseはこのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_end_event_subtype
    labels:
      zh: 具有结束事件子类
      en: has end-event subtype
      ja: end-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SessionEndEvent-is_a-SessionLifecycleEvent-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种会话生命周期事件正例
        en: "Positive case: is a session lifecycle event"
        ja: セッションライフサイクルイベントの一種の正例
      scenario_id: null
      descriptions:
        zh: end-404 记录 session-404 从 active 进入 failed，并带有 12:04Z、失败原因和最终诊断引用。
        en: end-404 records session-404 moving from active to failed at 12:04Z with a failure reason and final diagnostic reference.
        ja: end-404はsession-404が12:04Zにactiveからfailedへ移り、failure reasonとfinal diagnostic参照を記録します。
      field_values: {}
      related_node_ids:
        - SessionEndEvent
        - SessionLifecycleEvent
      related_relation_ids:
        - SessionEndEvent-is_a-SessionLifecycleEvent
      expected_result:
        zh: 将 end-404 分类为 SessionLifecycleEvent。
        en: Classify end-404 as a SessionLifecycleEvent.
        ja: end-404をSessionLifecycleEventに分類します。
      why_valid_or_invalid:
        zh: 它是一次已发生、带前后状态和时间的终态生命周期转换。
        en: It is an occurred terminal lifecycle transition with before state, after state, and time.
        ja: before/after stateとtimeを持つ発生済みterminal lifecycle transitionです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-session-end-event-007
    - id: SessionEndEvent-is_a-SessionLifecycleEvent-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种会话生命周期事件边界例
        en: "Boundary case: is a session lifecycle event"
        ja: セッションライフサイクルイベントの一種の境界例
      scenario_id: null
      descriptions:
        zh: pause-404 记录 session-404 从 active 到 paused，并保留恢复检查点。
        en: pause-404 records session-404 moving from active to paused and retains a resume checkpoint.
        ja: pause-404はsession-404がactiveからpausedへ移り、resume checkpointを保持します。
      field_values: {}
      related_node_ids:
        - SessionEndEvent
        - SessionLifecycleEvent
      related_relation_ids:
        - SessionEndEvent-is_a-SessionLifecycleEvent
      expected_result:
        zh: 不得把 pause-404 分类为 SessionEndEvent。
        en: Do not classify pause-404 as a SessionEndEvent.
        ja: pause-404をSessionEndEventに分類しません。
      why_valid_or_invalid:
        zh: paused 是可恢复的非终态，种差不满足。
        en: Paused is a resumable nonterminal state, so the subtype differentia is absent.
        ja: pausedはresumable nonterminal stateで、subtype differentiaを欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-session-end-event-007
  source_claims:
    - claim-session-end-event-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: closes_runtime_session
    predicate: closes_runtime_session
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 结束运行会话
      en: closes runtime session
      ja: 実行セッションを終了する
    definitions:
      zh: 把已经发生的 SessionEndEvent 连接到其终结的 RuntimeSession；只有事件记录了该会话从非终态进入终态的时间、原因和最终状态时，该边才成立。
      en: Links an occurred SessionEndEvent to the RuntimeSession it terminates, and is asserted only when the event records that session's transition from a nonterminal state to a terminal state with time, reason, and final status.
      ja: 発生済みSessionEndEventを終了対象RuntimeSessionへ結び、非終端状態から終端状態への遷移時刻・理由・final statusを記録する場合だけ成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: closed_by_session_end_event
      labels:
        zh: 由会话结束事件关闭
        en: closed by session end event
        ja: セッション終了イベントで閉じられる
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: closes_runtime_session-example-positive-manual-001
        kind: positive
        labels:
          zh: 结束运行会话正例
          en: "Positive case: closes runtime session"
          ja: 実行セッションを終了するの正例
        scenario_id: null
        descriptions:
          zh: end-88 记录 session-88 在 11:42Z 从 active 进入 completed，并保存 normal-completion 原因与最终输出引用。
          en: end-88 records session-88 moving from active to completed at 11:42Z with reason normal-completion and a final-output reference.
          ja: end-88はsession-88が11:42Zにactiveからcompletedへ移り、normal-completion理由とfinal-output参照を記録します。
        field_values: {}
        related_node_ids:
          - SessionEndEvent
          - RuntimeSession
        related_relation_ids:
          - closes_runtime_session
        expected_result:
          zh: 断言 end-88 closes_runtime_session session-88。
          en: Assert that end-88 closes_runtime_session session-88.
          ja: end-88 closes_runtime_session session-88をassertします。
        why_valid_or_invalid:
          zh: 事件、目标会话、终态转换与结束证据均可核对。
          en: The event, target session, terminal transition, and closure evidence are all identifiable.
          ja: event・target session・terminal transition・closure evidenceをすべて確認できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-session-end-event-008
      - id: closes_runtime_session-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 结束运行会话边界例
          en: "Boundary case: closes runtime session"
          ja: 実行セッションを終了するの境界例
        scenario_id: null
        descriptions:
          zh: pause-88 在 11:35Z 将 session-88 暂停并保留 checkpoint；后续允许以同一 session_id 恢复。
          en: pause-88 pauses session-88 at 11:35Z and retains a checkpoint; later continuation under the same session_id remains allowed.
          ja: pause-88は11:35Zにsession-88をpauseしてcheckpointを保持し、同じsession_idで後続再開できます。
        field_values: {}
        related_node_ids:
          - SessionEndEvent
          - RuntimeSession
        related_relation_ids:
          - closes_runtime_session
