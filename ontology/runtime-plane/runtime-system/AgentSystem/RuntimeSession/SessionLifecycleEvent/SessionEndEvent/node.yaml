schema: moonweave.ai/ontology-node/v1
id: SessionEndEvent
kind: concept
status: accepted
labels: {zh: 会话结束事件, en: Session end event, ja: セッション終了イベント}
semantics:
  short_definition: {zh: 记录 RuntimeSession 离开 active 或 paused 使用状态并变为 closed 的 SessionLifecycleEvent。, en: A SessionLifecycleEvent that records a RuntimeSession leaving active or paused use and becoming closed., ja: RuntimeSession が active または paused の利用状態を離れ closed になることを記録する SessionLifecycleEvent。}
  definition: {zh: SessionEndEvent 记录已识别会话的终止转换，包括结束时间和受控原因类别。它不是最终模型响应、进程退出、自动删除每个存储项，或使会话仍可使用的一次 Execution 的错误事件。, en: "A SessionEndEvent records an identified session's terminal transition with the end time and a controlled reason category. It is not the final model response, a process exit, automatic deletion of every stored item, or an error event from one Execution that leaves the session usable.", ja: SessionEndEvent は識別されたセッションの終端遷移を、終了時刻と管理された理由カテゴリとともに記録する。最終モデル応答、プロセス終了、すべての保存項目の自動削除、またはセッションを使用可能なままにする 1 つの Execution のエラーイベントではない。}
  why_needed: {zh: 会话关闭支持保留、清理、治理和面向用户的生命周期行为，而无需从沉默或单次失败运行推断生命周期结束。, en: "Session closure supports retention, cleanup, governance, and user-facing lifecycle behavior without inferring end-of-life from silence or a single failed run.", ja: セッション終了は、沈黙や単発の失敗実行から寿命の終わりを推論することなく、保持、クリーンアップ、ガバナンス、ユーザー向けライフサイクル動作を支える。}
  includes:
    - {zh: 结束时间、终止原因、最终会话状态，以及可选摘要或保留引用。, en: "End time, terminal reason, final session state, and optional summary or retention reference.", ja: 終了時刻、終端理由、最終セッション状態、ならびに任意の要約または保持参照。}
    - {zh: 明确的用户关闭、策略到期和不可恢复的会话级终止。, en: "Explicit user closure, policy expiry, and unrecoverable session-level termination.", ja: 明示的なユーザー終了、ポリシー失効、および回復不能なセッションレベルの終了。}
  excludes:
    - {zh: 正常执行完成、瞬时工具错误或子进程终止。, en: "A normal execution completion, a transient tool error, or a child-process termination.", ja: 通常の実行完了、一時的なツールエラー、または子プロセスの終了。}
    - {zh: 在对话关闭后汇总对话的报告工件。, en: A report artifact that summarizes a conversation after it closes., ja: 会話の終了後にその会話を要約する ReportArtifact。}
  semantic_kind: event
  aliases: [session closure, conversation end]
engineering:
  explanation: {zh: 会话管理器首先提交允许的最终历史项，应用保留策略，将会话生命周期改为 ended，并发出终止记录。清理操作可以是独立 Activities，因此不会仅从结束事件推定其成功。, en: "The session manager first commits any allowable final history items, applies retention policy, changes the session lifecycle to ended, and emits a terminal record. Cleanup actions can be separate Activities so their success is not assumed from the end event alone.", ja: セッション管理者は最初に許可された最終履歴項目をコミットし、保持ポリシーを適用してセッションのライフサイクルを ended に変更し、終端記録を発行する。クリーンアップ操作は別個の Activity にできるため、終了イベントだけからその成功を仮定しない。}
  typical_input:
    - description: {zh: 关闭会话命令, en: Close session command, ja: セッション終了コマンド}
      format: |-
        {"session_id":"session-73","reason":"user_closed","requested_at":"2026-07-18T09:30:00Z"}
  typical_output:
    - description: {zh: 结束事件记录, en: End event record, ja: 終了イベント記録}
      format: |-
        {"event_id":"session-event-99","session_id":"session-73","event_type":"ended","end_reason":"user_closed","ended_at":"2026-07-18T09:30:01Z"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Documents explicit session history management and clearing behavior separate from individual runs."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 结束事件 ID, en: End event ID, ja: 終了イベント ID}
      definitions: {zh: 终止会话转换的稳定标识符。, en: Stable identifier of the terminal session transition., ja: 終端セッション遷移の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-event-99
      source_claims: [claim-session-end-management]
    - id: session_id
      labels:
        zh: "会话 ID"
        en: "Session ID"
        ja: "セッション ID"
      definitions:
        zh: "发生结束转换的 RuntimeSession 的稳定标识。"
        en: "Stable identifier of the RuntimeSession undergoing the end transition."
        ja: "終了遷移を行う RuntimeSession の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-session-end-management]
    - id: event_type
      labels:
        zh: "事件类型"
        en: "Event type"
        ja: "イベント種別"
      definitions:
        zh: "固定为 ended，以保留生命周期事件类别。"
        en: "Fixed to ended to retain the lifecycle-event category."
        ja: "ライフサイクルイベント種別を保持するため ended に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [ended]
      example_value: ended
      source_claims: [claim-session-end-management]
    - id: ended_at
      labels: {zh: 结束时间, en: End time, ja: 終了時刻}
      definitions: {zh: 会话进入 ended 生命周期状态的时间戳。, en: Timestamp at which the session entered its ended lifecycle state., ja: セッションが ended ライフサイクル状態に入った時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:30:01Z'
      source_claims: [claim-session-end-management]
    - id: end_reason
      labels: {zh: 结束原因, en: End reason, ja: 終了理由}
      definitions: {zh: 终止转换的受控原因类别。, en: Controlled reason category for the terminal transition., ja: 終端遷移に対する管理された理由カテゴリ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [user_closed, retention_expired, policy_terminated, unrecoverable_session_failure]
      example_value: user_closed
      source_claims: [claim-session-end-management]
  constraints:
    - id: session-end-event-terminal-state
      severity: error
      language: plain
      expression: A SessionEndEvent must set event_type to ended and next state to ended; later lifecycle records for the same session require an explicit new session or documented reactivation policy.
      explanation: {zh: 不能从一次失败执行或无声的非活动状态推断关闭。, en: Closure cannot be inferred from one failed execution or silent inactivity., ja: 終了は、1 回の失敗実行または無言の非アクティブ状態から推論できない。}
      source_claims: [claim-session-end-management]
  required_relations: [SessionEndEvent-specializes-SessionLifecycleEvent]
examples:
  - id: session-end-event-positive
    labels: {zh: "OpenAI Session 结束", en: "OpenAI Session end", ja: "OpenAI Session 終了"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionEndEvent maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionEndEvent maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; SessionEndEvent serving env."}
    field_values: {event_id: session-event-99, session_id: session-73, event_type: ended, ended_at: '2026-07-18T09:30:01Z', end_reason: user_closed}
    related_node_ids: [SessionEndEvent, RuntimeSession]
    related_relation_ids: [SessionEndEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-end-management]
  - id: session-end-event-counterexample
    labels: {zh: "Process exit 非 SessionEnd", en: "Process exit not SessionEnd", ja: "Process exit は SessionEnd ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style SessionEndEvent.", en: "ID without PROV relations cannot serve as PROV-O-style SessionEndEvent.", ja: "Missing PROV relations rejects SessionEndEvent."}
    field_values: {run_attempt_id: run-18, outcome: failed}
    related_node_ids: [RunAttempt, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-session-end-management]
  - id: session-end-event-boundary
    labels: {zh: "SessionEnd 与 Execution completed 边界", en: "SessionEnd versus Execution completed boundary", ja: "SessionEnd と Execution completed 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; SessionEndEvent must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; SessionEndEvent must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {event_id: session-event-99}
    related_node_ids: [SessionEndEvent, Execution, Artifact]
    related_relation_ids: []
    source_claims: [claim-session-end-management]
  - id: session-end-event-instance-99
    labels: {zh: "session-99 关闭实例", en: "session-99 close instance", ja: "session-99 クローズ事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->SessionEndEvent.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->SessionEndEvent.", ja: "OTel instance maps to SessionEndEvent."}
    field_values: {event_id: session-event-99, session_id: session-73, event_type: ended, ended_at: '2026-07-18T09:30:01Z', end_reason: user_closed}
    related_node_ids: [SessionEndEvent, RuntimeSession]
    related_relation_ids: [SessionEndEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-end-management]
parent_relation:
  id: SessionEndEvent-specializes-SessionLifecycleEvent
  predicate: is_a
  target: concept:SessionLifecycleEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是会话结束事件, en: is a session end event, ja: セッション終了イベントである}
  definitions: {zh: 每个 SessionEndEvent 都是其下一生命周期状态为 ended 的 SessionLifecycleEvent。, en: Every SessionEndEvent is a SessionLifecycleEvent whose next lifecycle state is ended., ja: すべての SessionEndEvent は、次のライフサイクル状態が ended である SessionLifecycleEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_end_event, labels: {zh: 具有结束事件, en: has end event, ja: 終了イベントを持つ}}
  conditions:
    - id: session-end-event-parent-condition
      severity: error
      expression: Require event_type ended, an end time, and one controlled end reason.
      explanations: {zh: 通用日志消息和单次运行失败不能建立终止会话语义。, en: Generic log messages and individual run failures do not establish terminal session semantics., ja: 一般的なログメッセージや個別の実行失敗は、終端セッションの意味を確立しない。}
      source_claims: [claim-session-end-management]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-session-end-management]
relations: []
sources:
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Documents explicit session history management and clearing operations independent of individual runs.
source_claims:
  - id: claim-session-end-management
    source: openai-agents-sessions
    supports: The Agents SDK session interface manages a named session's stored history and provides explicit history operations separate from agent execution.
    locator: Core session behavior and Memory operations
    evidence_kind: documentation
    confidence: high

