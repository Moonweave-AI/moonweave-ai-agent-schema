          en: A resumable nonterminal transition does not satisfy the terminal condition of the closure edge.
          ja: 再開可能なnonterminal transitionはclosure edgeのterminal条件を満たしません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-session-end-event-008
    source_claims:
