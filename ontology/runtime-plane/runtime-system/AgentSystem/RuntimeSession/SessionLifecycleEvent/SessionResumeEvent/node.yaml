schema: moonweave.ai/ontology-node/v1
id: SessionResumeEvent
kind: concept
status: accepted
labels: {zh: 会话恢复事件, en: Session resume event, ja: セッション再開イベント}
semantics:
  short_definition: {zh: 记录既有、已暂停的 RuntimeSession 再次变为 active 的 SessionLifecycleEvent。, en: A SessionLifecycleEvent that records an existing paused RuntimeSession becoming active again., ja: 既存の paused RuntimeSession が再び active になることを記録する SessionLifecycleEvent。}
  definition: {zh: SessionResumeEvent 使用相同的会话身份和可恢复上下文，记录先前暂停的 RuntimeSession 的继续。它不是创建新会话、原始人工输入项、检查点恢复 Activity，也不是碰巧包含会话 ID 的新追踪。, en: "A SessionResumeEvent records continuation of a previously paused RuntimeSession using the same session identity and recoverable context. It is not creation of a new session, a raw human input item, a checkpoint restore Activity, or a new trace that happens to include the session ID.", ja: SessionResumeEvent は同じセッション識別子と回復可能なコンテキストを用いて、以前に paused となった RuntimeSession の継続を記録する。新しいセッションの作成、生の人手入力項目、チェックポイント復元 Activity、またはたまたまセッション ID を含む新しいトレースではない。}
  why_needed: {zh: 暂停和恢复路径需要明确证据，证明会话从既有上下文继续，而不是悄然重启或被分配给不同的用户交互。, en: Pause and recovery paths need explicit evidence that a session continued from an existing context rather than silently starting over or being assigned to a different user interaction., ja: 停止および復旧経路には、セッションが黙って再開し直したり別のユーザー対話へ割り当てられたりせず、既存コンテキストから継続したことを示す明示的な証拠が必要である。}
  includes:
    - {zh: 恢复时间、受控触发器、先前暂停的会话 ID，以及可选的检查点或中断引用。, en: "Resume time, controlled trigger, prior paused session ID, and optional checkpoint or interruption reference.", ja: 再開時刻、管理されたトリガー、以前に paused だったセッション ID、ならびに任意のチェックポイントまたは中断参照。}
    - {zh: 后续执行继续工作前从 paused 到 active 的转换。, en: A transition from paused to active before later executions continue work., ja: 後続の実行が作業を続ける前に paused から active へ移る遷移。}
  excludes:
    - {zh: 新身份的 SessionStartEvent、用户消息和状态恢复 Activity。, en: "A SessionStartEvent for a new identity, a user message, and a state restore Activity.", ja: 新しい識別子の SessionStartEvent、ユーザーメッセージ、および状態復元 Activity。}
    - {zh: 不会重新激活会话生命周期状态的一次执行的通用重试。, en: A generic retry of one execution that does not reactivate session lifecycle state., ja: セッションのライフサイクル状態を再アクティブ化しない、1 回の実行の一般的な再試行。}
  semantic_kind: event
  aliases: [session continuation, resumed interaction]
engineering:
  explanation: {zh: 会话管理器验证暂停的会话及其可恢复状态，应用已批准或等待的输入，将生命周期移回 active，并发出此记录。后续执行完成恢复后的工作；事件本身不执行模型或工具调用。, en: "The session manager verifies the paused session and its recoverable state, applies approved or awaited input, moves the lifecycle back to active, and emits this record. A following execution performs the resumed work; the event itself does not execute model or tool calls.", ja: セッション管理者は paused のセッションと回復可能な状態を検証し、承認済みまたは待機していた入力を適用してライフサイクルを active に戻し、この記録を発行する。後続の Execution が再開した作業を実行し、イベント自体はモデルまたはツール呼び出しを実行しない。}
  typical_input:
    - description: {zh: 恢复请求, en: Resume request, ja: 再開要求}
      format: |-
        {"session_id":"session-73","resume_trigger":"human_approved","checkpoint_id":"checkpoint-4","requested_at":"2026-07-18T09:20:00Z"}
  typical_output:
    - description: {zh: 恢复事件记录, en: Resume event record, ja: 再開イベント記録}
      format: |-
        {"event_id":"session-event-93","session_id":"session-73","event_type":"resumed","resume_trigger":"human_approved","resumed_at":"2026-07-18T09:20:01Z"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Documents resuming an interrupted run with the same session instance or backing store."}
    - {name: LangGraph interrupts, url: https://docs.langchain.com/oss/python/langgraph/interrupts, description: "Documents resuming interrupted graph execution using supplied values and persisted state."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 恢复事件 ID, en: Resume event ID, ja: 再開イベント ID}
      definitions: {zh: 一次会话重新激活转换的稳定标识符。, en: Stable identifier of one session reactivation transition., ja: 1 回のセッション再アクティブ化遷移の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-event-93
      source_claims: [claim-session-resume-continuity]
    - id: session_id
      labels:
        zh: "会话 ID"
        en: "Session ID"
        ja: "セッション ID"
      definitions:
        zh: "发生恢复转换的 RuntimeSession 的稳定标识。"
        en: "Stable identifier of the RuntimeSession undergoing the resume transition."
        ja: "再開遷移を行う RuntimeSession の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-session-resume-continuity]
    - id: event_type
      labels:
        zh: "事件类型"
        en: "Event type"
        ja: "イベント種別"
      definitions:
        zh: "固定为 resumed，以保留生命周期事件类别。"
        en: "Fixed to resumed to retain the lifecycle-event category."
        ja: "ライフサイクルイベント種別を保持するため resumed に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [resumed]
      example_value: resumed
      source_claims: [claim-session-resume-continuity]
    - id: resumed_at
      labels: {zh: 恢复时间, en: Resume time, ja: 再開時刻}
      definitions: {zh: 暂停会话再次变为 active 的时间戳。, en: Timestamp at which the paused session became active again., ja: paused のセッションが再び active になった時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-session-resume-continuity]
    - id: resume_trigger
      labels: {zh: 恢复触发器, en: Resume trigger, ja: 再開トリガー}
      definitions: {zh: 授权继续暂停工作的受控原因。, en: Controlled cause that authorized continuation of paused work., ja: 停止中の作業の継続を許可した管理された原因。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [human_approved, external_input_received, rate_limit_elapsed, scheduled_resume]
      example_value: human_approved
      source_claims: [claim-session-resume-continuity]
  constraints:
    - id: session-resume-event-continuity
      severity: error
      language: plain
      expression: A SessionResumeEvent must refer to an existing paused session, set event_type to resumed, and transition its lifecycle state from paused to active.
      explanation: {zh: 恢复必须保留身份和有序状态历史，而不是创建未追踪的重复上下文。, en: Resume must preserve identity and ordered state history instead of creating an untracked duplicate context., ja: 再開は未追跡の重複コンテキストを作るのではなく、識別子と順序付けられた状態履歴を保たなければならない。}
      source_claims: [claim-session-resume-continuity]
  required_relations: [SessionResumeEvent-specializes-SessionLifecycleEvent]
examples:
  - id: session-resume-event-positive
    labels: {zh: "OpenAI 中断 Run 恢复", en: "OpenAI interrupted Run resume", ja: "OpenAI 中断 Run 再開"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionResumeEvent maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionResumeEvent maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; SessionResumeEvent serving env."}
    field_values: {event_id: session-event-93, session_id: session-73, event_type: resumed, resumed_at: '2026-07-18T09:20:01Z', resume_trigger: human_approved}
    related_node_ids: [SessionResumeEvent, RuntimeSession, SessionPauseEvent]
    related_relation_ids: [SessionResumeEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-resume-continuity]
  - id: session-resume-event-counterexample
    labels: {zh: "新 Thread 非 Resume", en: "New Thread not Resume", ja: "新 Thread は Resume ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style SessionResumeEvent.", en: "ID without PROV relations cannot serve as PROV-O-style SessionResumeEvent.", ja: "Missing PROV relations rejects SessionResumeEvent."}
    field_values: {session_id: session-88}
    related_node_ids: [SessionStartEvent, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-session-resume-continuity]
  - id: session-resume-event-boundary
    labels: {zh: "Resume 与 SessionStart 边界", en: "Resume versus SessionStart boundary", ja: "Resume と SessionStart 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; SessionResumeEvent must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; SessionResumeEvent must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {event_id: session-event-93}
    related_node_ids: [SessionResumeEvent, RestoreActivity, Checkpoint]
    related_relation_ids: []
    source_claims: [claim-session-resume-continuity]
  - id: session-resume-event-instance-93
    labels: {zh: "session-93 HITL 恢复实例", en: "session-93 HITL resume instance", ja: "session-93 HITL 再開事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->SessionResumeEvent.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->SessionResumeEvent.", ja: "OTel instance maps to SessionResumeEvent."}
    field_values: {event_id: session-event-93, session_id: session-73, event_type: resumed, resumed_at: '2026-07-18T09:20:01Z', resume_trigger: human_approved}
    related_node_ids: [SessionResumeEvent, RuntimeSession, Checkpoint, Execution]
    related_relation_ids: [SessionResumeEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-resume-continuity]
parent_relation:
  id: SessionResumeEvent-specializes-SessionLifecycleEvent
  predicate: is_a
  target: concept:SessionLifecycleEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是会话恢复事件, en: is a session resume event, ja: セッション再開イベントである}
  definitions: {zh: 每个 SessionResumeEvent 都是将既有 paused 会话改回 active 的 SessionLifecycleEvent。, en: Every SessionResumeEvent is a SessionLifecycleEvent that changes an existing paused session back to active., ja: すべての SessionResumeEvent は、既存の paused セッションを active に戻す SessionLifecycleEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_resume_event, labels: {zh: 具有恢复事件, en: has resume event, ja: 再開イベントを持つ}}
  conditions:
    - id: session-resume-event-parent-condition
      severity: error
      expression: Require event_type resumed, prior paused state, and a resolvable existing RuntimeSession identity.
      explanations: {zh: 没有前置状态的新工作是开始，而不是恢复。, en: "New work without predecessor state is a start, not a resume.", ja: 先行状態のない新しい作業は開始であり、再開ではない。}
      source_claims: [claim-session-resume-continuity]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-session-resume-continuity]
relations: []
sources:
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Documents resumed runs using the same session instance or another session instance pointing to the same backing store.
  - id: langgraph-interrupts
    title: "LangGraph interrupts"
    url: https://docs.langchain.com/oss/python/langgraph/interrupts
    source_type: documentation
    relevance: Documents continuing an interrupted graph from persisted state after a supplied resume value.
source_claims:
  - id: claim-session-resume-continuity
    source: openai-agents-sessions
    supports: Agents SDK resumes an interrupted run with the same session or another session instance pointing to the same backing store, retaining stored history.
    locator: Resuming interrupted runs with the same session
    evidence_kind: documentation
    confidence: high

