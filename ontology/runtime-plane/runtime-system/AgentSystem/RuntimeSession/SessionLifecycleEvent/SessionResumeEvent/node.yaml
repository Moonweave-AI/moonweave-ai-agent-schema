schema: moonweave.ai/ontology-node/v1
id: SessionResumeEvent
kind: concept
labels:
  en: session resume event
  zh: 会话恢复事件
  ja: セッション再開イベント
semantics:
  short_definition:
    zh: 会话恢复事件是从已保存连续性依据把暂停会话重新转入活动状态的生命周期事件。
    en: A SessionResumeEvent is the lifecycle event that returns a paused session to active state from preserved continuity evidence.
    ja: SessionResumeEvent は保存された連続性根拠から停止中セッションを活動状態へ戻すライフサイクルイベントである。
  definition:
    zh: 会话恢复事件是 SessionLifecycleEvent 的一种；其种差是它以原 session_id 验证 Checkpoint、StateSnapshot 或序列化运行状态，并完成 paused 或 interrupted 到 active 的转换。它延续既有会话，不创建新会话，也不等同于从历史状态进行 Replay。
    en: A SessionResumeEvent is a SessionLifecycleEvent distinguished by validating a Checkpoint, StateSnapshot, or serialized run state under the existing session_id and completing a paused-or-interrupted to active transition. It continues the existing session, creates no new session, and is not the same as replaying historical execution.
    ja: SessionResumeEvent は SessionLifecycleEvent の一種であり、既存 session_id の下で Checkpoint、StateSnapshot、または直列化実行状態を検証し、paused または interrupted から active への遷移を完了する。既存セッションを継続し、新規セッションを作らず、履歴実行の Replay とも異なる。
  why_needed:
    zh: 该事件证明恢复使用了哪份状态并保持同一会话身份，从而区分继续、重新开始和历史重放。
    en: This event records which state was used and preserves session identity, distinguishing continuation from a fresh start and from historical replay.
    ja: このイベントは使用した状態と同一セッション識別子を記録し、継続、新規開始、履歴再生を区別する。
  includes:
    - zh: 纳入审批完成、依赖恢复或故障消除后，以原 session_id 和可验证保存状态从 paused/interrupted 转回 active 的事件。
      en: Includes an event that, after approval, dependency recovery, or fault clearance, returns paused or interrupted to active using the original session_id and verifiable saved state.
      ja: 承認完了、依存復旧、障害解消後に、元の session_id と検証可能な保存状態で paused/interrupted から active に戻すイベントを含む。
  excludes:
    - zh: 不纳入新 session_id 的 SessionStartEvent、没有状态转换的 Checkpoint 读取、ReplayActivity 或终止会话后的克隆。
      en: Excludes a SessionStartEvent for a new session_id, reading a Checkpoint without a state transition, ReplayActivity, and cloning after the original session ended.
      ja: 新しい session_id の SessionStartEvent、状態遷移を伴わない Checkpoint 読取、ReplayActivity、元セッション終了後の複製は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 SessionResumeEvent 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SessionResumeEvent, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SessionResumeEvent 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SessionResumeEvent.
      format: |-
        # Example SessionResumeEvent ingest
        { "session-resume-event_ref": "example-1" }
      source_claims:
        - claim-session-resume-event-design
  typical_output:
    - description: Moonweave-local SessionResumeEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "session-resume-event_id": "example-1" }'
      source_claims:
        - claim-session-resume-event-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: continuation_state_ref
      labels:
        zh: 恢复状态引用
        en: resume-state reference
        ja: resume state 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用已经验证并用于继续原会话的检查点、快照或序列化运行状态。
        en: References the validated checkpoint, snapshot, or serialized run state used to continue the original session.
        ja: original session 継続に使う validated checkpoint/snapshot/serialized run state を参照します。
      allowed_values: []
      pattern: null
      example_value: checkpoint:cp-203
      source_claims:
        - claim-session-resume-event-design
  constraints:
    - id: session-resume-transition
      severity: error
      expression_language: plain
      expression: prior_state is paused or interrupted, resulting_state is active, and continuation_state_ref belongs to session_ref
      explanations:
        zh: 恢复继续原会话，不创建新的 session_id。
        en: Resume continues the original session and does not create a new session ID.
        ja: resume は original session を続け、新 session ID を作りません。
      source_claims:
        - claim-session-resume-event-design
  required_relation_constraints: []
examples:
  - id: SessionResumeEvent-example-positive-001
    labels:
      zh: OpenAI 中断 Run 恢复
      en: OpenAI interrupted Run resume
      ja: OpenAI 中断 Run 再開
    descriptions:
      zh: OpenAI Agents SDK 文档：interrupt 后 Runner.run(agent, session=same_session) 产生 SessionResumeEvent，从 SQLiteSession 加载中断前历史继续。
      en: "OpenAI Agents SDK docs: after interrupt, Runner.run(agent, session=same_session) produces SessionResumeEvent loading pre-interrupt history from SQLiteSession."
      ja: OpenAI interrupt 後 same session Runner.run が SessionResumeEvent を生成する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      session_event_id: session-event:17/resume/1
      session_ref: runtime-session:17
      occurred_at: 2026-07-17T10:08:00Z
      prior_state: paused
      resulting_state: active
      trigger_kind: approval-granted
      actor_ref: actor:approval-operator-7
      reason: approval apr-9 accepted
      continuation_state_ref: checkpoint:cp-203
    related_node_ids:
      - SessionResumeEvent
      - Checkpoint
    related_relation_ids:
      - resumes_from_checkpoint
    source_claims:
      - claim-session-resume-event-design
  - id: SessionResumeEvent-example-boundary-001
    labels:
      zh: 新 Thread 非 Resume
      en: New Thread not Resume
      ja: 新 Thread は Resume ではない
    descriptions:
      zh: OpenAI client.beta.threads.create() 开新 Thread 是新建会话，不是 SessionResumeEvent（resume 必须同一 session_id）。
      en: OpenAI client.beta.threads.create() new Thread is new session, not SessionResumeEvent (resume requires same session_id).
      ja: 新 Thread 作成は Resume ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionResumeEvent
      - Checkpoint
      - SessionEndEvent
    related_relation_ids:
      - resumes_from_checkpoint
    source_claims:
      - claim-session-resume-event-design
  - id: SessionResumeEvent-example-3
    labels:
      zh: Resume 与 SessionStart 边界
      en: Resume versus SessionStart boundary
      ja: Resume と SessionStart 境界
    descriptions:
      zh: SessionResumeEvent 继续已有 session_id；SessionStartEvent 初始化新 session；resume 不重置 session 标识。
      en: SessionResumeEvent continues existing session_id; SessionStartEvent initializes new session; resume does not reset session identity.
      ja: Resume は同一 session_id 継続、Start は新規 session である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionResumeEvent
    related_relation_ids: []
    source_claims:
      - claim-session-resume-event-vendor
      - claim-session-resume-event-design
  - id: SessionResumeEvent-example-4
    labels:
      zh: session-93 HITL 恢复实例
      en: session-93 HITL resume instance
      ja: session-93 HITL 再開事例
    descriptions:
      zh: SessionResumeEvent event_id=session-resume-93、session_id=session-73、resumed_at=2026-01-15T09:15:00Z、prior_pause_event=session-pause-90。
      en: SessionResumeEvent event_id=session-resume-93, session_id=session-73, resumed_at=2026-01-15T09:15:00Z, prior_pause_event=session-pause-90.
      ja: session-resume-93 HITL 再開を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionResumeEvent
    related_relation_ids: []
    source_claims:
      - claim-session-resume-event-vendor
      - claim-session-resume-event-design
parent_relation:
  id: SessionResumeEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个以原 session_id 验证持久状态并将 RuntimeSession 从 paused 或 interrupted 恢复为 active 的 SessionResumeEvent 都是 SessionLifecycleEvent；新会话启动和历史分叉回放不属于该子类。
    en: States that every SessionResumeEvent validating persisted state under the original session_id and moving a RuntimeSession from paused or interrupted back to active is a SessionLifecycleEvent; new-session start and historical replay forks are excluded.
    ja: 元session_idでpersisted stateを検証しRuntimeSessionをpaused/interruptedからactiveへ戻すSessionResumeEventはSessionLifecycleEventです。new-session startとhistorical replay forkは除外します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有恢复事件子类
      en: has resume-event subtype
      ja: resume-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-session-resume-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: resumes_from_checkpoint
    predicate: resumes_from_checkpoint
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 从检查点恢复
      en: resumes from checkpoint
      ja: checkpointから再開する
    definitions:
      zh: 把 SessionResumeEvent 连接到实际加载的 Checkpoint；事件必须沿用原 session_id，并以该检查点恢复暂停位置和待处理状态，而不是从历史数据创建新会话或分叉回放。
      en: Links a SessionResumeEvent to the Checkpoint actually loaded while preserving the original session_id and restoring its paused position and pending state, rather than creating a new session or a replay fork from historical data.
      ja: SessionResumeEventを実際にloadしたCheckpointへ結び、元session_idを保ってpause位置とpending stateをrestoreします。historical dataから新sessionやreplay forkを作る場合は含みません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: used_by_session_resume_event
      labels:
        zh: 被会话恢复事件使用
        en: used by session resume event
        ja: session resume eventに使用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-session-resume-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Checkpoint
