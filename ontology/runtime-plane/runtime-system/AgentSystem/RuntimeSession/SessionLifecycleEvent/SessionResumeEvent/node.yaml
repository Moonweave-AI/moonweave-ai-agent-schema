schema: moonweave.ai/ontology-node/v1
id: SessionResumeEvent
kind: concept
status: accepted
labels:
  en: session resume event
  zh: 会话恢复事件
  ja: セッション再開イベント
semantics:
  short_definition:
    zh: 会话恢复事件是从已保存连续性依据把暂停会话重新转入活动状态的生命周期事件。
    en: A SessionResumeEvent is the lifecycle event that returns a paused session to active state from preserved continuity evidence.
    ja: SessionResumeEvent は保存された連続性根拠から停止中セッションを活動状態へ戻すライフサイクルイベントである。
  definition:
    zh: 会话恢复事件是 SessionLifecycleEvent 的一种；其种差是它以原 session_id 验证 Checkpoint、StateSnapshot 或序列化运行状态，并完成 paused 或 interrupted 到 active 的转换。它延续既有会话，不创建新会话，也不等同于从历史状态进行 Replay。
    en: A SessionResumeEvent is a SessionLifecycleEvent distinguished by validating a Checkpoint, StateSnapshot, or serialized run state under the existing session_id and completing a paused-or-interrupted to active transition. It continues the existing session, creates no new session, and is not the same as replaying historical execution.
    ja: SessionResumeEvent は SessionLifecycleEvent の一種であり、既存 session_id の下で Checkpoint、StateSnapshot、または直列化実行状態を検証し、paused または interrupted から active への遷移を完了する。既存セッションを継続し、新規セッションを作らず、履歴実行の Replay とも異なる。
  why_needed:
    zh: 该事件证明恢复使用了哪份状态并保持同一会话身份，从而区分继续、重新开始和历史重放。
    en: This event records which state was used and preserves session identity, distinguishing continuation from a fresh start and from historical replay.
    ja: このイベントは使用した状態と同一セッション識別子を記録し、継続、新規開始、履歴再生を区別する。
  includes:
    - zh: 纳入审批完成、依赖恢复或故障消除后，以原 session_id 和可验证保存状态从 paused/interrupted 转回 active 的事件。
      en: Includes an event that, after approval, dependency recovery, or fault clearance, returns paused or interrupted to active using the original session_id and verifiable saved state.
      ja: 承認完了、依存復旧、障害解消後に、元の session_id と検証可能な保存状態で paused/interrupted から active に戻すイベントを含む。
  excludes:
    - zh: 不纳入新 session_id 的 SessionStartEvent、没有状态转换的 Checkpoint 读取、ReplayActivity 或终止会话后的克隆。
      en: Excludes a SessionStartEvent for a new session_id, reading a Checkpoint without a state transition, ReplayActivity, and cloning after the original session ended.
      ja: 新しい session_id の SessionStartEvent、状態遷移を伴わない Checkpoint 読取、ReplayActivity、元セッション終了後の複製は含まない。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: continuation_state_ref
      labels:
        zh: 恢复状态引用
        en: resume-state reference
        ja: resume state 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用已经验证并用于继续原会话的检查点、快照或序列化运行状态。
        en: References the validated checkpoint, snapshot, or serialized run state used to continue the original session.
        ja: original session 継続に使う validated checkpoint/snapshot/serialized run state を参照します。
      allowed_values: []
      pattern: null
      example_value: checkpoint:cp-203
      source_claims:
        - claim-session-resume-event-002
  constraints:
    - id: session-resume-transition
      severity: error
      expression_language: plain
      expression: prior_state is paused or interrupted, resulting_state is active, and continuation_state_ref belongs to session_ref
      explanations:
        zh: 恢复继续原会话，不创建新的 session_id。
        en: Resume continues the original session and does not create a new session ID.
        ja: resume は original session を続け、新 session ID を作りません。
      source_claims:
        - claim-session-resume-event-002
  required_relation_constraints: []
examples:
  - id: SessionResumeEvent-example-positive-001
    kind: positive
    labels:
      zh: 会话恢复事件正例
      en: Positive example of session resume event
      ja: セッション再開イベントの正例
    scenario_id: null
    descriptions:
      zh: 批准请求 apr-9 后，系统验证 session-17 的 checkpoint cp-203，在 10:08Z 恢复待执行节点并把 paused 改为 active。
      en: After approval request apr-9 is accepted, the system validates checkpoint cp-203 for session-17, restores the pending node at 10:08Z, and changes paused to active.
      ja: 承認要求 apr-9 の受理後、システムは session-17 の checkpoint cp-203 を検証し、10:08Z に保留ノードを復元して paused から active へ変更する。
    field_values:
      session_event_id: session-event:17/resume/1
      session_ref: runtime-session:17
      occurred_at: 2026-07-17T10:08:00Z
      prior_state: paused
      resulting_state: active
      trigger_kind: approval-granted
      actor_ref: actor:approval-operator-7
      reason: approval apr-9 accepted
      continuation_state_ref: checkpoint:cp-203
    related_node_ids:
      - SessionResumeEvent
      - Checkpoint
    related_relation_ids:
      - resumes_from_checkpoint
    expected_result:
      zh: 该转换归类为 SessionResumeEvent，并继续原 RuntimeSession。
      en: The transition is classified as SessionResumeEvent and continues the original RuntimeSession.
      ja: この遷移は SessionResumeEvent に分類され、元の RuntimeSession を継続する。
    why_valid_or_invalid:
      zh: 恢复引用原会话的已保存状态，且前后状态明确为 paused 到 active。
      en: The resume references saved state from the original session and explicitly changes paused to active.
      ja: 元セッションの保存状態を参照し、paused から active への変化が明示されている。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-resume-event-003
  - id: SessionResumeEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 会话恢复事件边界例
      en: Boundary case for session resume event
      ja: セッション再開イベントの境界例
    scenario_id: null
    descriptions:
      zh: 调试人员从旧 checkpoint 分叉一个新的 session-debug-4，以修改输入并重新执行后续节点；原 session-17 保持结束状态。
      en: A debugger forks old checkpoint data into a new session-debug-4, changes input, and re-executes later nodes while original session-17 remains ended.
      ja: デバッガが古い checkpoint から新しい session-debug-4 を分岐し、入力を変更して後続ノードを再実行する一方、元の session-17 は終了のままである。
    field_values: {}
    related_node_ids:
      - SessionResumeEvent
      - Checkpoint
      - SessionEndEvent
    related_relation_ids:
      - resumes_from_checkpoint
    expected_result:
      zh: 这是新会话中的重放或分叉，不是 session-17 的 SessionResumeEvent。
      en: This is replay or forking in a new session, not a SessionResumeEvent for session-17.
      ja: これは新規セッションでの再生または分岐であり、session-17 の SessionResumeEvent ではない。
    why_valid_or_invalid:
      zh: 新的会话身份和改变后的轨迹打断了原会话连续性；恢复必须继续原 session_id。
      en: The new session identity and altered trajectory break original-session continuity; resume must continue the original session_id.
      ja: 新しいセッション識別子と変更された軌跡が元セッションの連続性を断ち、再開は元の session_id を継続しなければならない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-resume-event-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SessionStartEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 共享父节点对照：父节点 SessionLifecycleEvent：SessionResumeEvent（semantic kind=event，骨架 SessionResumeEvent-is_a-SessionLifecycleEvent）；SessionStartEvent（semantic kind=event，骨架 SessionStartEvent-is_a-SessionLifecycleEvent）。双端条件：SessionResumeEvent 条件：“会话恢复事件是以如下事实为区分特征的会话生命周期事件：它记录从保留状态、检查点或外部延续恢复已暂停会话的可观测转移”；SessionStartEvent 条件：“会话开始事件是一种会话生命周期事件；其区分条件是：它记录打开运行会话的可观测事件，并把会话绑定到初始参与者、环境、目标和上下文状态”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SessionLifecycleEvent: SessionResumeEvent (semantic kind=event, backbone SessionResumeEvent-is_a-SessionLifecycleEvent); SessionStartEvent (semantic kind=event, backbone SessionStartEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionResumeEvent condition: “Session resume event is a session lifecycle event; its differentiating condition is that it records the observable transition that restores a paused session from retained state, checkpoint, or external continuation”; SessionStartEvent condition: “As a session lifecycle event, Session start event is distinguished by the fact that it records the observable event that opens a runtime session and binds the session to initial actor, environment, goal, and context state”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SessionLifecycleEvent：SessionResumeEvent（semantic kind=event、バックボーン SessionResumeEvent-is_a-SessionLifecycleEvent）；SessionStartEvent（semantic kind=event、バックボーン SessionStartEvent-is_a-SessionLifecycleEvent）。両端条件：SessionResumeEvent の条件：「セッション再開イベントはセッションライフサイクルイベントの一種であり、次の条件で区別されます：それは、保持された状態、チェックポイント、または外部継続から一時停止されたセッションを復元する観測可能な遷移を記録します」；SessionStartEvent の条件：「セッションライフサイクルイベントに属するセッション開始イベントは、次の事実を種差とします：それは、実行セッションを開く観測可能なイベントを記録し、初期アクター、環境、目標、文脈状態に結び付けます」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-session-resume-event-005
parent_relation:
  id: SessionResumeEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个以原 session_id 验证持久状态并将 RuntimeSession 从 paused 或 interrupted 恢复为 active 的 SessionResumeEvent 都是 SessionLifecycleEvent；新会话启动和历史分叉回放不属于该子类。
    en: States that every SessionResumeEvent validating persisted state under the original session_id and moving a RuntimeSession from paused or interrupted back to active is a SessionLifecycleEvent; new-session start and historical replay forks are excluded.
    ja: 元session_idでpersisted stateを検証しRuntimeSessionをpaused/interruptedからactiveへ戻すSessionResumeEventはSessionLifecycleEventです。new-session startとhistorical replay forkは除外します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_resume_event_subtype
    labels:
      zh: 具有恢复事件子类
      en: has resume-event subtype
      ja: resume-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
