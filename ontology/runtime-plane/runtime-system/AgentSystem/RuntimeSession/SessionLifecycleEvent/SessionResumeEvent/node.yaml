source_claims:
  - id: claim-session-resume-event-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK resumes serialized RunState after an approval decision. Moonweave represents the resulting paused-to-active occurrence as SessionResumeEvent.
    locator: "Human-in-the-loop guide > Example: pause, approve, resume"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-resume-event-002
    source: eng-fw-openai-python-docs
    supports: "Direct source premise: the Agents SDK exposes a pending interruption, serializable RunState, an explicit approval or rejection, and continuation of the original run. Moonweave design inference: session lifecycle occurrences are immutable state-transition events with one event identity, one session reference, prior and resulting states, trigger, actor, and reason."
    locator: OpenAI Agents SDK > Human-in-the-loop > How the approval flow works; pause, serialize RunState, approve or reject, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-resume-event-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK demonstrates approving pending tool calls on saved RunState and resuming the original run. The cp-203 event makes that continuation explicit at session level.
    locator: "Human-in-the-loop guide > Example: pause, approve, resume"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-resume-event-004
    source: eng-fw-langgraph-docs
    supports: LangGraph distinguishes resuming interrupted work from replaying or forking prior checkpoints. That documented distinction supports this boundary case.
    locator: Persistence guide > Replay and update state
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-resume-event-005
    source: eng-fw-langgraph-interrupts
    supports: LangGraph resumes an interrupt by re-invoking the graph with Command under the same thread_id; choosing a new thread_id starts with empty state. Moonweave classifies the former as SessionResumeEvent and the latter as SessionStartEvent, preventing a restart or replay fork from masquerading as continuity.
    locator: Interrupts > Resuming interrupts; thread_id as persistent cursor
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-session-resume-event-006
    source: eng-fw-langgraph-interrupts
    supports: LangGraph documents that resumption reuses the same thread ID and supplies a Command resume value to the suspended computation. Moonweave reifies the resulting paused-to-active occurrence as SessionResumeEvent.
    locator: Interrupts > Resuming interrupts > reuse thread ID and supply Command(resume=...) value
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-session-resume-event-007
