schema: moonweave.ai/ontology-node/v1
id: SessionStartEvent
kind: concept
labels:
  en: session start event
  zh: 会话开始事件
  ja: セッション開始イベント
semantics:
  short_definition:
    zh: 会话开始事件是创建会话身份并使运行会话首次进入活动状态的生命周期事件。
    en: A SessionStartEvent is the lifecycle event that creates a session identity and first places a RuntimeSession into an active state.
    ja: SessionStartEvent はセッション識別子を作成し、RuntimeSession を初めて活動状態へ置くライフサイクルイベントである。
  definition:
    zh: 会话开始事件是 SessionLifecycleEvent 的一种；其种差是它为尚未活动的会话建立 session_id、开始时间和初始上下文，并完成从不存在或已创建到 active 的首次转换。暂停后的再次激活属于 SessionResumeEvent，而不是新的开始事件。
    en: A SessionStartEvent is a SessionLifecycleEvent distinguished by establishing session_id, start time, and initial context for a not-yet-active session and completing its first transition from absent or created to active. Reactivation after a pause is a SessionResumeEvent, not another start.
    ja: SessionStartEvent は SessionLifecycleEvent の一種であり、未活動セッションに session_id、開始時刻、初期コンテキストを設定し、不存在または created から active への最初の遷移を完了する。停止後の再活性化は SessionResumeEvent であり、新しい開始ではない。
  why_needed:
    zh: 该事件确定会话计时、初始状态与审计链起点，并避免把恢复或首条业务消息误认为会话创建。
    en: This event fixes the session clock, initial state, and audit-chain origin and prevents a resume or first business message from being mistaken for session creation.
    ja: このイベントはセッション時計、初期状態、監査連鎖の起点を確定し、再開や最初の業務メッセージとの混同を防ぐ。
  includes:
    - zh: 纳入为新 session_id 记录开始时间、初始参与者或上下文并将状态首次置为 active 的事件。
      en: Includes an event that records start time and initial participants or context for a new session_id and first sets the state to active.
      ja: 新しい session_id に開始時刻と初期参加者またはコンテキストを記録し、初めて active にするイベントを含む。
  excludes:
    - zh: 不纳入首条 Message、首次 RunAttempt、暂停后的 SessionResumeEvent、部署 AgentSystem 的事件或预先分配但未启动的 session_id。
      en: Excludes the first Message, the first RunAttempt, a SessionResumeEvent after pause, deployment of an AgentSystem, and a preallocated session_id that has not started.
      ja: 最初の Message、最初の RunAttempt、停止後の SessionResumeEvent、AgentSystem 配備、未開始の事前割当 session_id は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 SessionStartEvent 时应分别映射 OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SessionStartEvent, map OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SessionStartEvent 統合時は OpenAI threads, LangGraph thread_id, E2B sandbox sessions, and runtime configuration を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SessionStartEvent.
      format: |-
        # Example SessionStartEvent ingest
        { "session-start-event_ref": "example-1" }
      source_claims:
        - claim-session-start-event-design
  typical_output:
    - description: Moonweave-local SessionStartEvent projection.
      format: '{ "schema_owner": "moonweave-local-design", "session-start-event_id": "example-1" }'
      source_claims:
        - claim-session-start-event-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys: []
  fields:
    - id: initial_context_ref
      labels:
        zh: 初始上下文引用
        en: initial-context reference
        ja: initial context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用首次激活会话时固定的输入与参与者上下文。
        en: References the input and participant context fixed when the session is first activated.
        ja: session 初回 activation 時に固定された input/participant context を参照します。
      allowed_values: []
      pattern: null
      example_value: context-package:session-88/initial
      source_claims:
        - claim-session-start-event-design
  constraints:
    - id: session-start-transition
      severity: error
      expression_language: plain
      expression: prior_state is absent or created, and resulting_state is active
      explanations:
        zh: 开始事件只建立会话的首次激活。
        en: A start event establishes only the session's first activation.
        ja: start event は session の first activation のみを確立します。
      source_claims:
        - claim-session-start-event-design
  required_relation_constraints: []
examples:
  - id: SessionStartEvent-example-positive-001
    labels:
      zh: OpenAI SQLiteSession 创建
      en: OpenAI SQLiteSession create
      ja: OpenAI SQLiteSession 作成
    descriptions:
      zh: OpenAI Agents SDK SQLiteSession(session_id="session-71") 首次 Runner.run 前创建 SessionStartEvent event_time=2026-01-15T08:00:00Z、store_ref=session-store/sqlite。
      en: OpenAI Agents SDK SQLiteSession(session_id="session-71") creates SessionStartEvent event_time=2026-01-15T08:00:00Z, store_ref=session-store/sqlite before first Runner.run.
      ja: SQLiteSession 初回 run 前 SessionStartEvent を生成する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      session_event_id: session-event:88/start/1
      session_ref: runtime-session:88
      occurred_at: 2026-07-17T11:20:00Z
      prior_state: created
      resulting_state: active
      trigger_kind: initial-request
      actor_ref: actor:gateway-2
      reason: new conversation accepted
      initial_context_ref: context-package:session-88/initial
    related_node_ids:
      - SessionStartEvent
      - RuntimeSession
    related_relation_ids:
      - opens_runtime_session
    source_claims:
      - claim-session-start-event-design
  - id: SessionStartEvent-example-boundary-001
    labels:
      zh: Thread create 非 SessionStartEvent
      en: Thread create not SessionStartEvent
      ja: Thread create は SessionStartEvent ではない
    descriptions:
      zh: OpenAI client.beta.threads.create() 创建 Thread 是对话容器 API，不是 Moonweave SessionStartEvent（需 system_id/store_ref）。
      en: OpenAI client.beta.threads.create() creates Thread conversation container API, not Moonweave SessionStartEvent (needs system_id/store_ref).
      ja: threads.create は Thread API であり SessionStartEvent ではない。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionStartEvent
      - RuntimeSession
      - SessionEndEvent
    related_relation_ids:
      - opens_runtime_session
    source_claims:
      - claim-session-start-event-design
  - id: SessionStartEvent-example-3
    labels:
      zh: SessionStart 与 Execution start 边界
      en: SessionStart versus Execution start boundary
      ja: SessionStart と Execution start 境界
    descriptions:
      zh: SessionStartEvent 标记会话上下文开始；Execution.started_at 标记单次 Run Activity 开始；一次 Session 可含多次 Execution start。
      en: SessionStartEvent marks session context start; Execution.started_at marks single Run Activity start; one Session can contain multiple Execution starts.
      ja: SessionStart と Execution.started_at は別概念である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionStartEvent
    related_relation_ids: []
    source_claims:
      - claim-session-start-event-vendor
      - claim-session-start-event-design
  - id: SessionStartEvent-example-4
    labels:
      zh: session-71 启动实例
      en: session-71 start instance
      ja: session-71 開始事例
    descriptions:
      zh: SessionStartEvent event_id=session-start-71、session_id=session-71、system_id=support-agent-prod、started_at=2026-01-15T08:00:00Z。
      en: SessionStartEvent event_id=session-start-71, session_id=session-71, system_id=support-agent-prod, started_at=2026-01-15T08:00:00Z.
      ja: session-start-71 を記録する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - SessionStartEvent
    related_relation_ids: []
    source_claims:
      - claim-session-start-event-vendor
      - claim-session-start-event-design
parent_relation:
  id: SessionStartEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个为尚未活动的 RuntimeSession 建立 session_id、开始时间和初始上下文，并完成 created 到 active 首次转换的 SessionStartEvent 都是 SessionLifecycleEvent；暂停恢复不能重复记为开始。
    en: States that every SessionStartEvent establishing session_id, start time, and initial context for a not-yet-active RuntimeSession and completing its first created-to-active transition is a SessionLifecycleEvent; pause recovery must not be recorded as another start.
    ja: 未activeのRuntimeSessionにsession_id・start time・initial contextを確立し、最初のcreated-to-active transitionを完了するSessionStartEventはSessionLifecycleEventです。pause recoveryを再startとして記録しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有开始事件子类
      en: has start-event subtype
      ja: start-event subtypeを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-session-start-event-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: opens_runtime_session
    predicate: opens_runtime_session
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 开启运行会话
      en: opens runtime session
      ja: 実行セッションを開始する
    definitions:
      zh: 把 SessionStartEvent 连接到它首次激活的 RuntimeSession；事件必须建立新的 session_id、开始时间与初始上下文，而不能用于已经存在会话的恢复。
      en: Links a SessionStartEvent to the RuntimeSession it first activates; the event must establish a new session_id, start time, and initial context and must not be used for resuming an existing session.
      ja: SessionStartEventを初回activate対象RuntimeSessionへ結び、新しいsession_id・start time・initial contextを確立する場合に限ります。既存sessionのresumeには用いません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: opened_by_session_start_event
      labels:
        zh: 由会话开始事件开启
        en: opened by session start event
        ja: セッション開始イベントで開始される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-session-start-event-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RuntimeSession
