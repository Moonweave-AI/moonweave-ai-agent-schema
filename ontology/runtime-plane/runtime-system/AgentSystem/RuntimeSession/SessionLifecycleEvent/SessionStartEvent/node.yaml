schema: moonweave.ai/ontology-node/v1
id: SessionStartEvent
kind: concept
status: accepted
labels: {zh: 会话开始事件, en: Session start event, ja: セッション開始イベント}
semantics:
  short_definition: {zh: 记录 RuntimeSession 创建及进入活动交互状态的 SessionLifecycleEvent。, en: A SessionLifecycleEvent that records creation of a RuntimeSession and entry into an active interaction state., ja: RuntimeSession の作成とアクティブな対話状態への移行を記録する SessionLifecycleEvent。}
  definition: {zh: SessionStartEvent 是新创建 RuntimeSession 的初始生命周期记录。它标识分配的会话 ID、开始时间和初始化上下文引用；它不是初始用户消息、智能体执行或先前暂停会话的后续恢复。, en: "A SessionStartEvent is the initial lifecycle record for a newly created RuntimeSession. It identifies the assigned session ID, start time, and initialization context reference; it is not the initial user message, an agent execution, or a later resume of a previously paused session.", ja: SessionStartEvent は新規作成 RuntimeSession の初期ライフサイクル記録である。割り当てられたセッション ID、開始時刻、初期化コンテキスト参照を識別する。初期ユーザーメッセージ、エージェント実行、以前に停止したセッションの後続再開ではない。}
  why_needed: {zh: 会话创建必须与重复轮次区分开来，以便策略、保留和审计可以确定一个交互上下文从哪里开始。, en: "Session creation must be distinguishable from repeated turns so policy, retention, and audit can establish where one interaction context begins.", ja: セッション作成は繰り返しターンと区別できなければならず、ポリシー、保持、監査は1つの対話コンテキストがどこから始まるかを確立できる。}
  includes:
    - {zh: 分配的会话 ID、创建时间、初始状态和非敏感初始上下文引用。, en: "Assigned session ID, creation time, initial state, and a non-sensitive initial-context reference.", ja: 割り当てられたセッション ID、作成時刻、初期状態、非機微な初期コンテキスト参照。}
    - {zh: 新会话记录进入 active 状态的转换。, en: The transition into active status for a new session record., ja: 新しいセッション記録が active 状態へ移行する遷移。}
  excludes:
    - {zh: 用户消息、模型响应或会话创建后执行的第一次执行。, en: "A user message, a model response, or the first execution performed after session creation.", ja: ユーザーメッセージ、モデル応答、セッション作成後に実行される最初の Execution。}
    - {zh: 暂停后恢复存储上下文；那是 SessionResumeEvent。, en: Resuming stored context after a pause; that is a SessionResumeEvent., ja: 停止後に保存コンテキストを再開すること。これは SessionResumeEvent である。}
  semantic_kind: event
  aliases: [session creation event, conversation start]
engineering:
  explanation: {zh: 会话管理器分配 ID 和后端存储，记录开始事件，然后针对新初始化上下文运行第一个智能体轮次。初始输入存储为独立转录项目或执行输入，而不是并入生命周期记录。, en: "The session manager allocates an ID and backing store, records a start event, then runs the first agent turn against that newly initialized context. Initial input is stored as a separate transcript item or execution input rather than being folded into the lifecycle record.", ja: セッションマネージャーは ID とバッキングストアを割り当て、開始イベントを記録し、その新規初期化コンテキストに対して最初のエージェントターンを実行する。初期入力はライフサイクル記録に畳み込まず、別個の転記項目または実行入力として保存する。}
  typical_input:
    - description: {zh: 新会话请求, en: New session request, ja: 新規セッション要求}
      format: |-
        {"system_id":"support-agent-prod","initial_context_ref":"request-551","created_at":"2026-07-18T09:00:00Z"}
  typical_output:
    - description: {zh: 开始事件记录, en: Start event record, ja: 開始イベント記録}
      format: |-
        {"event_id":"session-event-71","session_id":"session-73","event_type":"started","started_at":"2026-07-18T09:00:00Z"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Documents creating a session instance with a session ID before running agent turns."}
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 开始事件 ID, en: Start event ID, ja: 開始イベント ID}
      definitions: {zh: 会话创建转换的稳定标识符。, en: Stable identifier of the session creation transition., ja: セッション作成遷移の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-event-71
      source_claims: [claim-session-start]
    - id: session_id
      labels:
        zh: "会话 ID"
        en: "Session ID"
        ja: "セッション ID"
      definitions:
        zh: "发生开始转换的 RuntimeSession 的稳定标识。"
        en: "Stable identifier of the RuntimeSession undergoing the start transition."
        ja: "開始遷移を行う RuntimeSession の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-73
      source_claims: [claim-session-start]
    - id: event_type
      labels:
        zh: "事件类型"
        en: "Event type"
        ja: "イベント種別"
      definitions:
        zh: "固定为 started，以保留生命周期事件类别。"
        en: "Fixed to started to retain the lifecycle-event category."
        ja: "ライフサイクルイベント種別を保持するため started に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [started]
      example_value: started
      source_claims: [claim-session-start]
    - id: started_at
      labels: {zh: 开始时间, en: Start time, ja: 開始時刻}
      definitions: {zh: 会话可用于第一个轮次的时间戳。, en: Timestamp at which the session became available for its first turn., ja: セッションが最初のターンに利用可能になった時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:00:00Z'
      source_claims: [claim-session-start]
    - id: initial_context_ref
      labels: {zh: 初始上下文引用, en: Initial context reference, ja: 初期コンテキスト参照}
      definitions: {zh: 指向初始化输入或恢复策略上下文的可选非机密引用。, en: Optional non-secret reference to initialization input or restored policy context., ja: 初期化入力または復元ポリシーコンテキストへの任意の非機密参照。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: request-551
      source_claims: [claim-session-start]
  constraints:
    - id: session-start-event-initial-state
      severity: error
      language: plain
      expression: A SessionStartEvent must set event_type to started, next state to active, and occur before any non-start lifecycle event for the same new session ID.
      explanation: {zh: 创建与后续继续必须在有序生命周期历史中保持可区分。, en: Creation and later continuation must remain distinguishable in ordered lifecycle history., ja: 作成と後続継続は順序付きライフサイクル履歴で区別可能なままでなければならない。}
      source_claims: [claim-session-start]
  required_relations: [SessionStartEvent-specializes-SessionLifecycleEvent]
examples:
  - id: session-start-event-positive
    labels: {zh: "OpenAI SQLiteSession 创建", en: "OpenAI SQLiteSession create", ja: "OpenAI SQLiteSession 作成"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionStartEvent maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; SessionStartEvent maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; SessionStartEvent serving env."}
    field_values: {event_id: session-event-71, session_id: session-73, event_type: started, started_at: '2026-07-18T09:00:00Z', initial_context_ref: request-551}
    related_node_ids: [SessionStartEvent, RuntimeSession]
    related_relation_ids: [SessionStartEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-start]
  - id: session-start-event-counterexample
    labels: {zh: "Thread create 非 SessionStartEvent", en: "Thread create not SessionStartEvent", ja: "Thread create は SessionStartEvent ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style SessionStartEvent.", en: "ID without PROV relations cannot serve as PROV-O-style SessionStartEvent.", ja: "Missing PROV relations rejects SessionStartEvent."}
    field_values: {message_id: message-1}
    related_node_ids: [AgentTranscript, RuntimeSession]
    related_relation_ids: []
    source_claims: [claim-session-start]
  - id: session-start-event-boundary
    labels: {zh: "SessionStart 与 Execution start 边界", en: "SessionStart versus Execution start boundary", ja: "SessionStart と Execution start 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; SessionStartEvent must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; SessionStartEvent must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {event_id: session-event-71}
    related_node_ids: [SessionStartEvent, SessionResumeEvent]
    related_relation_ids: []
    source_claims: [claim-session-start]
  - id: session-start-event-instance-71
    labels: {zh: "session-71 启动实例", en: "session-71 start instance", ja: "session-71 開始事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->SessionStartEvent.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->SessionStartEvent.", ja: "OTel instance maps to SessionStartEvent."}
    field_values: {event_id: session-event-71, session_id: session-73, event_type: started, started_at: '2026-07-18T09:00:00Z', initial_context_ref: request-551}
    related_node_ids: [SessionStartEvent, RuntimeSession, Execution]
    related_relation_ids: [SessionStartEvent-specializes-SessionLifecycleEvent]
    source_claims: [claim-session-start]
parent_relation:
  id: SessionStartEvent-specializes-SessionLifecycleEvent
  predicate: is_a
  target: concept:SessionLifecycleEvent
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是会话开始事件, en: is a session start event, ja: セッション開始イベントである}
  definitions: {zh: 每个 SessionStartEvent 都是转换创建新 active 会话的 SessionLifecycleEvent。, en: Every SessionStartEvent is a SessionLifecycleEvent whose transition creates a new active session., ja: すべての SessionStartEvent は、遷移が新しい active セッションを作成する SessionLifecycleEvent である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_start_event, labels: {zh: 具有开始事件, en: has start event, ja: 開始イベントを持つ}}
  conditions:
    - id: session-start-event-parent-condition
      severity: error
      expression: Require event_type started and a new session identifier with no earlier lifecycle event in the same session stream.
      explanations: {zh: 重复会话 ID 应通过恢复继续，而不是通过新创建事件。, en: Repeated session IDs should continue through resume rather than new creation events., ja: 繰り返されるセッション ID は新規作成イベントではなく再開を通じて継続すべきである。}
      source_claims: [claim-session-start]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-session-start]
relations: []
sources:
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Shows creating a session instance with an explicit session ID before agent runs.
source_claims:
  - id: claim-session-start
    source: openai-agents-sessions
    supports: The Agents SDK creates a session with a session ID and uses it to manage conversation history across later runs.
    locator: Quick start and Core session behavior
    evidence_kind: documentation
    confidence: high

