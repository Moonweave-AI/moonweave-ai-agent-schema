source_claims:
  - id: claim-session-start-event-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK uses an explicit session object and identifier to begin retaining conversation history. Moonweave records the first activation of that session identity as SessionStartEvent.
    locator: Sessions guide > Quick start and session IDs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-session-start-event-002
    source: eng-fw-openai-python-docs
    supports: "Direct source premise: the Agents SDK exposes a pending interruption, serializable RunState, an explicit approval or rejection, and continuation of the original run. Moonweave design inference: session lifecycle occurrences are immutable state-transition events with one event identity, one session reference, prior and resulting states, trigger, actor, and reason."
    locator: OpenAI Agents SDK > Human-in-the-loop > How the approval flow works; pause, serialize RunState, approve or reject, and resume
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-session-start-event-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK creates a session object with a session ID before using it across turns. The gateway transition is Moonweave's explicit event for opening that bounded session.
    locator: Sessions guide > Quick start and session IDs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-session-start-event-004
    source: eng-fw-openai-python-docs
    supports: The documented approval flow resumes previously serialized run state rather than creating a fresh run history. Moonweave classifies that occurrence as resume, not start.
    locator: "Human-in-the-loop guide > Example: pause, approve, resume"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-session-start-event-005
    source: eng-proto-a2a-spec
    supports: A2A distinguishes submitted or working lifecycle positions from completed, failed, canceled, and rejected terminal states. Moonweave uses that direction to separate SessionStartEvent, which first establishes an active interval, from SessionEndEvent, which records the transition to a terminal session state.
    locator: Specification > 4.1.3 TaskState > submitted, working, and terminal states
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-session-start-event-006
    source: eng-proto-a2a-spec
    supports: A2A assigns a new contextId on the first interaction and expects later messages to reuse it for continuity. Moonweave uses that first-identity distinction when differentiating SessionStartEvent from SessionResumeEvent.
    locator: Life of a Task > Group Related Interactions > new contextId on first interaction
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-session-start-event-007
    source: eng-proto-a2a-spec
    supports: A2A states that the first interaction receives a new contextId and later interactions reuse that identifier for continuity. Moonweave maps first establishment of a runtime-session identity to SessionStartEvent rather than equating an A2A context with the ontology class.
    locator: Life of a Task > Group Related Interactions > first response creates contextId
    evidence_kind: design-inference
    confidence: high
    review_status: pending
