schema: moonweave.ai/ontology-node/v1
id: SessionStartEvent
kind: concept
status: review
labels:
  en: session start event
  zh: 会话开始事件
  ja: セッション開始イベント
semantics:
  short_definition:
    zh: 会话开始事件是创建会话身份并使运行会话首次进入活动状态的生命周期事件。
    en: A SessionStartEvent is the lifecycle event that creates a session identity and first places a RuntimeSession into an active state.
    ja: SessionStartEvent はセッション識別子を作成し、RuntimeSession を初めて活動状態へ置くライフサイクルイベントである。
  definition:
    zh: 会话开始事件是 SessionLifecycleEvent 的一种；其种差是它为尚未活动的会话建立 session_id、开始时间和初始上下文，并完成从不存在或已创建到 active 的首次转换。暂停后的再次激活属于 SessionResumeEvent，而不是新的开始事件。
    en: A SessionStartEvent is a SessionLifecycleEvent distinguished by establishing session_id, start time, and initial context for a not-yet-active session and completing its first transition from absent or created to active. Reactivation after a pause is a SessionResumeEvent, not another start.
    ja: SessionStartEvent は SessionLifecycleEvent の一種であり、未活動セッションに session_id、開始時刻、初期コンテキストを設定し、不存在または created から active への最初の遷移を完了する。停止後の再活性化は SessionResumeEvent であり、新しい開始ではない。
  why_needed:
    zh: 该事件确定会话计时、初始状态与审计链起点，并避免把恢复或首条业务消息误认为会话创建。
    en: This event fixes the session clock, initial state, and audit-chain origin and prevents a resume or first business message from being mistaken for session creation.
    ja: このイベントはセッション時計、初期状態、監査連鎖の起点を確定し、再開や最初の業務メッセージとの混同を防ぐ。
  includes:
    - zh: 纳入为新 session_id 记录开始时间、初始参与者或上下文并将状态首次置为 active 的事件。
      en: Includes an event that records start time and initial participants or context for a new session_id and first sets the state to active.
      ja: 新しい session_id に開始時刻と初期参加者またはコンテキストを記録し、初めて active にするイベントを含む。
  excludes:
    - zh: 不纳入首条 Message、首次 RunAttempt、暂停后的 SessionResumeEvent、部署 AgentSystem 的事件或预先分配但未启动的 session_id。
      en: Excludes the first Message, the first RunAttempt, a SessionResumeEvent after pause, deployment of an AgentSystem, and a preallocated session_id that has not started.
      ja: 最初の Message、最初の RunAttempt、停止後の SessionResumeEvent、AgentSystem 配備、未開始の事前割当 session_id は含まない。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: initial_context_ref
      labels:
        zh: 初始上下文引用
        en: initial-context reference
        ja: initial context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用首次激活会话时固定的输入与参与者上下文。
        en: References the input and participant context fixed when the session is first activated.
        ja: session 初回 activation 時に固定された input/participant context を参照します。
      allowed_values: []
      pattern: null
      example_value: context-package:session-88/initial
      source_claims:
        - claim-session-start-event-002
  constraints:
    - id: session-start-transition
      severity: error
      expression_language: plain
      expression: prior_state is absent or created, and resulting_state is active
      explanations:
        zh: 开始事件只建立会话的首次激活。
        en: A start event establishes only the session's first activation.
        ja: start event は session の first activation のみを確立します。
      source_claims:
        - claim-session-start-event-002
  required_relation_constraints: []
examples:
  - id: SessionStartEvent-example-positive-001
    kind: positive
    labels:
      zh: 会话开始事件正例
      en: Positive example of session start event
      ja: セッション開始イベントの正例
    scenario_id: null
    descriptions:
      zh: 网关为新对话分配 session-88，在 11:20Z 保存初始参与者和输入上下文，并把状态从 created 改为 active。
      en: The gateway allocates session-88 for a new conversation, stores initial participants and input context at 11:20Z, and changes state from created to active.
      ja: ゲートウェイが新規対話に session-88 を割り当て、11:20Z に初期参加者と入力コンテキストを保存し、created から active へ変更する。
    field_values:
      session_event_id: session-event:88/start/1
      session_ref: runtime-session:88
      occurred_at: 2026-07-17T11:20:00Z
      prior_state: created
      resulting_state: active
      trigger_kind: initial-request
      actor_ref: actor:gateway-2
      reason: new conversation accepted
      initial_context_ref: context-package:session-88/initial
    related_node_ids:
      - SessionStartEvent
      - RuntimeSession
    related_relation_ids:
      - opens_runtime_session
    expected_result:
      zh: 该转换记录归类为 SessionStartEvent，并打开 session-88 的生命周期。
      en: The transition record is classified as SessionStartEvent and opens the lifecycle of session-88.
      ja: この遷移記録は SessionStartEvent に分類され、session-88 のライフサイクルを開始する。
    why_valid_or_invalid:
      zh: 这是新会话身份的首次激活，同时给出开始时间和初始上下文。
      en: It is the first activation of a new session identity and supplies both start time and initial context.
      ja: 新しいセッション識別子の最初の活性化であり、開始時刻と初期コンテキストもある。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-start-event-003
  - id: SessionStartEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 会话开始事件边界例
      en: Boundary case for session start event
      ja: セッション開始イベントの境界例
    scenario_id: null
    descriptions:
      zh: session-88 已处于 paused；人工批准后它以原 session_id 和保存状态重新进入 active。
      en: session-88 is already paused; after human approval it re-enters active under the existing session_id and saved state.
      ja: session-88 は既に paused であり、人間承認後に既存 session_id と保存状態のまま active へ戻る。
    field_values: {}
    related_node_ids:
      - SessionStartEvent
      - RuntimeSession
      - SessionEndEvent
    related_relation_ids:
      - opens_runtime_session
    expected_result:
      zh: 该记录应归为 SessionResumeEvent，而不是第二个 SessionStartEvent。
      en: The record is a SessionResumeEvent, not a second SessionStartEvent.
      ja: この記録は二つ目の SessionStartEvent ではなく SessionResumeEvent である。
    why_valid_or_invalid:
      zh: 会话身份和历史已经存在，变化是恢复连续活动而非创建新会话。
      en: Session identity and history already exist; the change restores continuity rather than creating a new session.
      ja: セッション識別子と履歴が既にあり、新規作成ではなく連続活動の復元である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-session-start-event-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SessionEndEvent
    shared_parent_concept_id: SessionLifecycleEvent
    differentia:
      zh: 共享父节点对照：父节点 SessionLifecycleEvent：SessionStartEvent（semantic kind=event，骨架 SessionStartEvent-is_a-SessionLifecycleEvent）；SessionEndEvent（semantic kind=event，骨架 SessionEndEvent-is_a-SessionLifecycleEvent）。双端条件：SessionStartEvent 条件：“会话开始事件是一种会话生命周期事件；其区分条件是：它记录打开运行会话的可观测事件，并把会话绑定到初始参与者、环境、目标和上下文状态”；SessionEndEvent 条件：“作为会话生命周期事件，会话结束事件由这一事实区分：它记录运行会话的可观测关闭，包括最终状态、清理、产物和剩余审计引用”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SessionLifecycleEvent: SessionStartEvent (semantic kind=event, backbone SessionStartEvent-is_a-SessionLifecycleEvent); SessionEndEvent (semantic kind=event, backbone SessionEndEvent-is_a-SessionLifecycleEvent). Endpoint conditions: SessionStartEvent condition: “As a session lifecycle event, Session start event is distinguished by the fact that it records the observable event that opens a runtime session and binds the session to initial actor, environment, goal, and context state”; SessionEndEvent condition: “Session end event belongs to the session lifecycle event category and differs from broader members in that it records the observable closure of a runtime session, including final status, cleanup, artifacts, and remaining audit references”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SessionLifecycleEvent：SessionStartEvent（semantic kind=event、バックボーン SessionStartEvent-is_a-SessionLifecycleEvent）；SessionEndEvent（semantic kind=event、バックボーン SessionEndEvent-is_a-SessionLifecycleEvent）。両端条件：SessionStartEvent の条件：「セッションライフサイクルイベントに属するセッション開始イベントは、次の事実を種差とします：それは、実行セッションを開く観測可能なイベントを記録し、初期アクター、環境、目標、文脈状態に結び付けます」；SessionEndEvent の条件：「セッション終了イベントはセッションライフサイクルイベントとして、次の条件により他の対象と区別されます：それは、実行セッションの観測可能な終了を記録し、最終状態、クリーンアップ、成果物、残る監査参照を含みます」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-session-start-event-005
parent_relation:
  id: SessionStartEvent-is_a-SessionLifecycleEvent
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种会话生命周期事件
    en: is a session lifecycle event
    ja: セッションライフサイクルイベントの一種
  definitions:
    zh: 声明每个为尚未活动的 RuntimeSession 建立 session_id、开始时间和初始上下文，并完成 created 到 active 首次转换的 SessionStartEvent 都是 SessionLifecycleEvent；暂停恢复不能重复记为开始。
    en: States that every SessionStartEvent establishing session_id, start time, and initial context for a not-yet-active RuntimeSession and completing its first created-to-active transition is a SessionLifecycleEvent; pause recovery must not be recorded as another start.
    ja: 未activeのRuntimeSessionにsession_id・start time・initial contextを確立し、最初のcreated-to-active transitionを完了するSessionStartEventはSessionLifecycleEventです。pause recoveryを再startとして記録しません。
  cardinality: null
