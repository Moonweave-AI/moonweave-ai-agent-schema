source_claims:
  - id: claim-runtime-session-001
    source: eng-fw-langgraph-docs
    supports: LangGraph organizes persisted execution state into threads identified by thread IDs and distinguishes it from cross-thread memory stores. Moonweave uses that continuity boundary for RuntimeSession while modeling lifecycle events separately.
    locator: Persistence guide > Threads, checkpoints, and memory store
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-session-002
    source: eng-fw-openai-python-docs
    supports: OpenAI creates a Session instance with a session ID before passing it into the first Runner invocation. Moonweave calls that admitted-but-not-yet-started boundary created; the SDK does not expose created as a Session enum.
    locator: Sessions > Quick start > create a session instance with a session ID
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-003
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_SUBMITTED as successfully submitted and acknowledged before active processing begins. Moonweave maps that pre-active lifecycle position to SessionStateCreated while preserving the distinction between an A2A Task and a RuntimeSession.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_SUBMITTED and TASK_STATE_WORKING
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-004
    source: eng-fw-openai-python-docs
    supports: With a Session enabled, Runner retrieves prior history before each run and stores the new turn afterward, allowing subsequent work under the same session identity. Moonweave calls the interval in which such runs may start active; the SDK does not publish this state label.
    locator: Sessions > Core session behavior
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-005
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_WORKING as active processing by the agent. Moonweave uses that active-processing boundary as supporting evidence for SessionStateActive without asserting that an A2A Task and RuntimeSession are identical.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_WORKING
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-006
    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupt() suspends execution, saves graph state through a checkpointer, and later resumes it with Command. Moonweave maps that intentional, state-preserving suspension to SessionStatePaused.
    locator: Interrupts > Pause using interrupt; Resuming interrupts
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-session-007
    source: eng-fw-openai-python-docs
    supports: The Agents SDK directs an interrupted run to resume with the same Session instance or another instance backed by the same store. This supports the same-session continuity condition of paused, though paused remains a Moonweave-controlled value.
    locator: Sessions > Resuming interrupted runs with the same session
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-session-008
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_INPUT_REQUIRED and TASK_STATE_AUTH_REQUIRED as interrupted states rather than terminal states. Moonweave generalizes that outstanding external prerequisite to SessionStateInterrupted for a RuntimeSession.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_INPUT_REQUIRED and TASK_STATE_AUTH_REQUIRED
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-session-009
    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupts wait for external input and expose the pending interrupt to the caller while retaining resumable state. That supplies the non-terminal wait condition for SessionStateInterrupted.
    locator: Interrupts > Pause using interrupt; stream.interrupts and stream.interrupted
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-runtime-session-010
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_COMPLETED as successful and terminal. Moonweave applies the same successful-terminal meaning to an explicitly ended RuntimeSession; the mapping does not make every completed Task end its containing session.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_COMPLETED
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-011
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_CANCELED as terminal cancellation before completion. Moonweave maps that boundary to the British-spelled SessionStateCancelled when a SessionEndEvent explicitly closes the RuntimeSession by cancellation.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_CANCELED
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-012
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_FAILED as terminal completion with an error. Moonweave applies that error-terminal boundary only when a SessionEndEvent closes the RuntimeSession, rather than promoting every failed attempt to session failure.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_FAILED
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-013
    source: eng-proto-a2a-spec
    supports: A2A defines TASK_STATE_REJECTED for a task an agent decides it cannot or will not perform and marks it terminal. Moonweave maps that explicit refusal boundary to SessionStateRejected when the refusal closes the RuntimeSession itself.
    locator: Specification > 4.1.3 TaskState > TASK_STATE_REJECTED
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-014
    source: eng-proto-a2a-spec
    supports: A2A TaskStatus carries one current TaskState and distinguishes pre-active, active, interrupted, and terminal positions. RuntimeSession.lifecycle_state adopts that lifecycle shape as a scalar current-state projection while keeping each occurred transition in SessionLifecycleEvent; it is not a copied A2A enum.
    locator: Specification > 4.1.2 TaskStatus; 4.1.3 TaskState
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-015
    source: eng-fw-langgraph-interrupts
    supports: LangGraph exposes whether a run paused for external input and preserves the state required to resume. Moonweave uses that evidence to distinguish active, paused, and interrupted session positions, while explicit start and end events establish created and terminal states.
    locator: Interrupts > Pause using interrupt; Resuming interrupts; stream.interrupted
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-016
    source: eng-proto-a2a-spec
    supports: A2A TaskStatus may carry the timestamp at which a state was recorded and distinguishes terminal states. Moonweave copies the timestamp of the accepted SessionEndEvent into RuntimeSession.end_time so the current session record has a queryable closure boundary; A2A does not define this session field.
    locator: Specification > 4.1.2 TaskStatus > timestamp; 4.1.3 TaskState > terminal states
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-017
    source: eng-fw-langgraph-persistence
    supports: LangGraph state history exposes timestamped StateSnapshot records for a thread but does not declare when a Moonweave RuntimeSession has ended. Moonweave derives end_time only from an accepted terminal lifecycle event and leaves it absent while the session remains non-terminal.
    locator: Persistence > Get state history; StateSnapshot > created_at and metadata
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-018
    source: eng-proto-a2a-spec
    supports: A2A TaskStatus can timestamp a recorded lifecycle state, including the initial submitted or working state. Moonweave uses the occurrence time of the first accepted SessionStartEvent as RuntimeSession.start_time; the protocol does not equate a Task timestamp with a session start.
    locator: Specification > 4.1.2 TaskStatus > timestamp; 4.1.3 TaskState > TASK_STATE_SUBMITTED and TASK_STATE_WORKING
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-019
    source: eng-fw-langgraph-persistence
    supports: LangGraph persists an ordered history of StateSnapshot records under a thread_id. Moonweave derives start_time from the first lifecycle event that activates the RuntimeSession rather than from an arbitrary later checkpoint; that derivation is ontology-owned.
    locator: Persistence > Threads; Get state history; StateSnapshot > created_at
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-020
    source: eng-fw-openai-python-docs
    supports: OpenAI Session implementations are constructed or resumed with a session ID, and operational guidance recommends meaningful unique IDs for users or conversations. Moonweave adopts session_id as the RuntimeSession identity key within one AgentSystem deployment.
    locator: Sessions > Quick start > SQLiteSession session ID; Operational patterns > Session ID naming
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-021
    source: eng-fw-langgraph-persistence
    supports: LangGraph uses thread_id as the key under which checkpoints and state history are stored and recovered. Moonweave's session_id serves the analogous continuity role for RuntimeSession, while remaining distinct from any provider-specific thread key.
    locator: Persistence > Threads; Checkpoints > thread_id
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-022
    source: eng-proto-a2a-spec
    supports: A2A lifecycle updates move forward to interrupted or terminal states and timestamp the recorded status. Moonweave's end_time >= start_time constraint is the local temporal invariant that prevents a terminal SessionEndEvent from preceding the SessionStartEvent; it is not a protocol constraint copied verbatim.
    locator: Specification > 3.3.3 Asynchronous Processing; 4.1.2 TaskStatus > timestamp; 4.1.3 TaskState
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-runtime-session-023
    source: eng-fw-langgraph-persistence
    supports: LangGraph state history returns checkpoint snapshots in execution history with creation timestamps and parent configurations. Moonweave validates session start and end against the accepted lifecycle-event order rather than trusting an unordered scalar update; the comparison expression is a Moonweave rule.
    locator: Persistence > Get state history; StateSnapshot > created_at and parent_config
    evidence_kind: design-inference
