schema: moonweave.ai/ontology-node/v1
id: RuntimeSession
kind: concept
status: review
labels:
  en: runtime session
  zh: 运行会话
  ja: 実行セッション
semantics:
  short_definition:
    zh: 运行会话是以一个会话身份维持连续上下文并承载一组相关智能体回合与执行尝试的有界活动。
    en: A RuntimeSession is a bounded activity that maintains one continuity context under a session identity across related agent turns and execution attempts.
    ja: RuntimeSession は、一つのセッション識別子の下で連続コンテキストを維持し、関連するエージェントターンと実行試行を収容する有界活動である。
  definition:
    zh: 运行会话是一类有开始与结束边界的活动；它以 session_id 关联参与者、短期上下文、状态历史、运行尝试和追踪记录，并可在暂停后恢复。它不是跨会话记忆库、AgentSystem、单次 RunAttempt，也不是表示状态变化的生命周期事件。
    en: A RuntimeSession is an activity with start and end boundaries, distinguished by a session_id that correlates participants, short-term context, state history, run attempts, and traces and may survive pause and resume. It is not a cross-session memory store, an AgentSystem, one RunAttempt, or a lifecycle event that reports a state change.
    ja: RuntimeSession は開始・終了境界を持つ活動であり、session_id により参加者、短期コンテキスト、状態履歴、実行試行、追跡を関連付け、停止後に再開できる。セッション横断メモリ、AgentSystem、単一 RunAttempt、状態変化を報告するライフサイクルイベントではない。
  why_needed:
    zh: 该概念为多轮连续性、暂停恢复和会话级审计提供统一时间范围，并防止把长期用户记忆或整个系统误当作一次会话。
    en: This concept supplies one temporal scope for multi-turn continuity, pause and resume, and session-level audit while preventing long-term user memory or the whole system from being mistaken for one session.
    ja: この概念は複数ターンの連続性、停止・再開、セッション監査に一つの時間範囲を与え、長期利用者メモリやシステム全体との混同を防ぐ。
  includes:
    - zh: 纳入由 session_id 标识、具有开始时刻和生命周期状态，并关联一个或多个智能体回合、尝试或追踪的交互活动。
      en: Includes an interaction activity identified by session_id with a start time and lifecycle state that correlates one or more agent turns, attempts, or traces.
      ja: session_id、開始時刻、ライフサイクル状態を持ち、一つ以上のエージェントターン、試行、追跡を関連付ける対話活動を含む。
  excludes:
    - zh: 不纳入单条模型响应、单次 RunAttempt、跨多个 session_id 的用户画像、AgentSystem 或 SessionLifecycleEvent。
      en: Excludes one model response, one RunAttempt, a user profile shared across session IDs, an AgentSystem, and a SessionLifecycleEvent.
      ja: 単一モデル応答、単一 RunAttempt、複数 session_id で共有される利用者プロファイル、AgentSystem、SessionLifecycleEvent は含まない。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - session_id
  fields:
    - id: lifecycle_state
      labels:
        zh: 生命周期状态
        en: lifecycle state
        ja: ライフサイクル状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 会话在受控生命周期中的当前状态，而不是新的图节点。
        en: Current state in the controlled session lifecycle, not a separate graph node.
        ja: 制御されたセッションライフサイクル上の現在状態であり、別のグラフノードではありません。
      allowed_values:
        - id: SessionStateCreated
          value: created
          labels:
            zh: 已创建
            en: Created
            ja: 作成済み
          definitions:
            zh: 会话身份已经分配，但首次 SessionStartEvent 尚未把它置为活动状态。
            en: The session identity has been allocated, but its first SessionStartEvent has not yet made it active.
            ja: セッション識別子は割り当て済みですが、最初の SessionStartEvent により active にはまだなっていません。
          status: accepted
          source_claims:
            - claim-runtime-session-002
            - claim-runtime-session-003
        - id: SessionStateActive
          value: active
          labels:
            zh: 活动中
            en: Active
            ja: アクティブ
          definitions:
            zh: 会话已开始，可以接纳新的运行尝试，并且尚未暂停或终止。
            en: The session has started, may admit new run attempts, and is neither paused nor terminal.
            ja: セッションは開始済みで新しい実行試行を受け入れられ、一時停止中でも終端状態でもありません。
          status: accepted
          source_claims:
            - claim-runtime-session-004
            - claim-runtime-session-005
        - id: SessionStatePaused
          value: paused
          labels:
            zh: 已暂停
            en: Paused
            ja: 一時停止
          definitions:
            zh: 会话被有意暂停，连续性状态已经保留，可在同一 session_id 下恢复。
            en: The session is intentionally suspended with continuity state retained for resumption under the same session_id.
            ja: セッションは意図的に停止され、同じ session_id で再開できる継続状態が保持されています。
          status: accepted
          source_claims:
            - claim-runtime-session-006
            - claim-runtime-session-007
        - id: SessionStateInterrupted
          value: interrupted
          labels:
            zh: 已中断
            en: Interrupted
            ja: 中断中
          definitions:
            zh: 会话因所需输入、认证、审批或其他外部条件尚未满足而停止推进，但仍属于非终态。
            en: The session cannot progress because required input, authentication, approval, or another external condition is outstanding, but it remains non-terminal.
            ja: 必要な入力、認証、承認、その他の外部条件が未充足のため進行できませんが、終端状態ではありません。
          status: accepted
          source_claims:
            - claim-runtime-session-008
            - claim-runtime-session-009
        - id: SessionStateCompleted
          value: completed
          labels:
            zh: 已完成
            en: Completed
            ja: 完了
          definitions:
            zh: 会话在成功产出其最终结果后进入的终态。
            en: A terminal session state reached after the session successfully produces its final result.
            ja: セッションが最終結果を正常に生成した後に到達する終端状態です。
          status: accepted
          source_claims:
            - claim-runtime-session-010
        - id: SessionStateCancelled
          value: cancelled
          labels:
            zh: 已取消
            en: Cancelled
            ja: 取消済み
          definitions:
            zh: 会话在完成前被明确取消后进入的终态。
            en: A terminal session state reached when the session is explicitly cancelled before completion.
            ja: 完了前にセッションが明示的に取り消された場合の終端状態です。
          status: accepted
          source_claims:
            - claim-runtime-session-011
        - id: SessionStateFailed
          value: failed
          labels:
            zh: 已失败
            en: Failed
            ja: 失敗
          definitions:
            zh: 会话因未恢复的错误而结束后进入的终态。
            en: A terminal session state reached when the session ends because of an unrecovered error.
            ja: 回復されなかったエラーによりセッションが終了した場合の終端状態です。
          status: accepted
          source_claims:
            - claim-runtime-session-012
        - id: SessionStateRejected
          value: rejected
          labels:
            zh: 已拒绝
            en: Rejected
            ja: 拒否済み
          definitions:
            zh: 系统决定不启动或不再继续该会话后进入的终态。
            en: A terminal session state reached when the system decides not to start or continue the session.
            ja: システムがセッションを開始または継続しないと決定した場合の終端状態です。
          status: accepted
          source_claims:
            - claim-runtime-session-013
      pattern: null
      example_value: active
      source_claims:
        - claim-runtime-session-014
        - claim-runtime-session-015
    - id: end_time
      labels:
        zh: 结束时间
        en: end time
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 会话结束事件生效的 UTC 时间；活动会话为空。
        en: UTC instant at which the session-end event took effect; null while active.
        ja: セッション終了イベントが発効した UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-runtime-session-016
        - claim-runtime-session-017
    - id: start_time
      labels:
        zh: 开始时间
        en: start time
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 会话开始事件生效的 UTC 时间。
        en: UTC instant at which the session-start event took effect.
        ja: セッション開始イベントが発効した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T01:00:00.000Z
      source_claims:
        - claim-runtime-session-018
        - claim-runtime-session-019
    - id: session_id
      labels:
        zh: 会话标识
        en: session ID
        ja: セッション ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在一次系统部署范围内稳定标识该运行会话。
        en: Stable identifier for this runtime session within one system deployment.
        ja: 一つのシステム配備内でこの実行セッションを安定して識別します。
      allowed_values: []
      pattern: ^session-[A-Za-z0-9-]+$
      example_value: session-20260714-001
      source_claims:
        - claim-runtime-session-020
        - claim-runtime-session-021
  constraints:
    - id: runtime-session-lifecycle-order
      severity: error
      expression_language: plain
      expression: end_time is absent or end_time >= start_time
      explanations:
        zh: 结束时间若存在，不得早于开始时间。
        en: When present, end_time must not precede start_time.
        ja: 終了時刻がある場合、開始時刻より前であってはなりません。
      source_claims:
        - claim-runtime-session-022
        - claim-runtime-session-023
  required_relation_constraints:
    - id: runtime-session-has-attempt
      direction: outgoing
      predicate: has_attempt
      target_concept_id: RunAttempt
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 运行会话至少包含一次可审计的执行尝试。
        en: A runtime session contains at least one auditable run attempt.
        ja: 実行セッションには少なくとも一つの監査可能な実行試行が含まれます。
      source_claims:
        - claim-runtime-session-024
        - claim-runtime-session-025
examples:
  - id: RuntimeSession-example-positive-001
    kind: positive
    labels:
      zh: 运行会话正例
      en: Positive example of runtime session
      ja: 実行セッションの正例
    scenario_id: null
    descriptions:
      zh: session-20260714-001 于 01:00Z 开始，连续处理三轮对话、两次工具尝试和相应追踪；短暂暂停后仍以同一 session_id 恢复。
      en: session-20260714-001 starts at 01:00Z, carries three conversational turns, two tool attempts, and their traces, and resumes under the same session_id after a temporary pause.
      ja: session-20260714-001 は 01:00Z に開始し、三つの対話ターン、二つのツール試行と追跡を保持し、一時停止後も同じ session_id で再開する。
    field_values:
      lifecycle_state: active
      start_time: 2026-07-13T01:00:00.000Z
      session_id: session-20260714-001
    related_node_ids:
      - RuntimeSession
      - TraceEvent
      - TraceRecord
    related_relation_ids:
      - session_has_trace
    expected_result:
      zh: 从开始到最终结束的连续活动归为一个 RuntimeSession。
      en: The continuous activity from start through final end is classified as one RuntimeSession.
      ja: 開始から最終終了までの連続活動は一つの RuntimeSession に分類される。
    why_valid_or_invalid:
      zh: 相同会话身份、连续短期上下文和明确生命周期边界把这些回合与尝试组成一个会话。
      en: The shared session identity, continuous short-term context, and explicit lifecycle boundary unite the turns and attempts into one session.
      ja: 共通のセッション識別子、連続する短期コンテキスト、明示的なライフサイクル境界がターンと試行を一つのセッションにまとめる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-session-026
  - id: RuntimeSession-example-boundary-001
    kind: boundary
    labels:
      zh: 运行会话边界例
      en: Boundary case for runtime session
      ja: 実行セッションの境界例
    scenario_id: null
    descriptions:
      zh: 同一用户在 session-a 和 session-b 中各自开始对话；长期偏好存储让两个会话都能读取用户语言，但两段短期历史并未合并。
      en: The same user starts conversations in session-a and session-b. A long-term preference store exposes the user's language to both, but their short-term histories remain separate.
      ja: 同じ利用者が session-a と session-b で対話を開始し、長期嗜好ストアから両方が言語設定を読むが、短期履歴は別のままである。
    field_values: {}
    related_node_ids:
      - RuntimeSession
      - TraceEvent
      - TraceRecord
    related_relation_ids:
      - session_has_trace
    expected_result:
      zh: 应保留两个 RuntimeSession；共享用户身份或长期记忆不把它们合并。
      en: Two RuntimeSessions remain; shared user identity or long-term memory does not merge them.
      ja: 二つの RuntimeSession を保持し、共有利用者識別子や長期メモリで統合しない。
    why_valid_or_invalid:
      zh: 会话成员资格由会话身份和短期连续性决定，而不是由同一用户或可共享记忆决定。
      en: Session membership is determined by session identity and short-term continuity, not merely by a common user or shareable memory.
      ja: セッション所属はセッション識別子と短期連続性で決まり、共通利用者や共有可能メモリだけでは決まらない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-session-027
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: AgentSystem-hosts-RuntimeSession
  predicate: hosts
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 承载运行会话
    en: hosts runtime session
    ja: 実行セッションを収容する
  definitions:
    zh: 表示一个具有稳定 system_id 的 AgentSystem 对 RuntimeSession 的系统级归属：系统提供会话所依赖的运行器、状态与治理服务，但会话仍是有自身时间边界的活动，而不是系统子类。
    en: Relates an AgentSystem with a stable system_id to a RuntimeSession whose runner, state, and governance services it supplies; the session remains a time-bounded activity rather than a subtype of the system.
    ja: 安定したsystem_idを持つAgentSystemがrunner・state・governance serviceを提供するRuntimeSessionを関連付けます。セッションは時間境界を持つactivityであり、systemのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: hosted_by_agent_system
    labels:
      zh: 由智能体系统承载
      en: hosted by agent system
      ja: エージェントシステムに収容される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AgentSystem-hosts-RuntimeSession-example-positive-manual-001
      kind: positive
      labels:
        zh: 承载运行会话正例
        en: "Positive case: hosts runtime session"
        ja: 実行セッションを収容するの正例
      scenario_id: null
      descriptions:
        zh: 系统 travel-assistant-prod 创建 session-20260716-41，并由该系统的运行器、会话存储和追踪配置持续管理。
        en: System travel-assistant-prod creates session-20260716-41 and continuously supplies its runner, session store, and tracing configuration.
        ja: system travel-assistant-prodがsession-20260716-41を作成し、自身のrunner・session store・tracing設定で継続管理します。
      field_values: {}
      related_node_ids:
        - AgentSystem
        - RuntimeSession
      related_relation_ids:
        - AgentSystem-hosts-RuntimeSession
      expected_result:
        zh: 记录 AgentSystem-hosts-RuntimeSession，且会话保持独立活动身份。
        en: Assert AgentSystem-hosts-RuntimeSession while preserving the session's independent activity identity.
        ja: セッションの独立activity identityを保ってAgentSystem-hosts-RuntimeSessionをassertします。
      why_valid_or_invalid:
        zh: 稳定系统身份与实际提供的会话服务共同证明了承载归属。
        en: Stable system identity plus the services actually supplied to the session establish hosting ownership.
        ja: 安定したsystem identityと実際に提供されたsession serviceがhosting ownershipを証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-runtime-session-028
    - id: AgentSystem-hosts-RuntimeSession-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 承载运行会话边界例
        en: "Boundary case: hosts runtime session"
        ja: 実行セッションを収容するの境界例
      scenario_id: null
      descriptions:
        zh: monitoring-console 只读取 session-20260716-41 的公开状态；它既未创建该会话，也不提供运行或状态服务。
        en: monitoring-console only reads the public status of session-20260716-41; it neither created the session nor supplies runtime or state services.
        ja: monitoring-consoleはsession-20260716-41の公開状態を読むだけで、作成もruntime/state service提供も行いません。
      field_values: {}
      related_node_ids:
        - AgentSystem
        - RuntimeSession
      related_relation_ids:
        - AgentSystem-hosts-RuntimeSession
      expected_result:
        zh: 不得把 monitoring-console 断言为该 RuntimeSession 的承载系统。
        en: Do not assert monitoring-console as the AgentSystem hosting that RuntimeSession.
        ja: monitoring-consoleをそのRuntimeSessionのhost AgentSystemとしてassertしません。
      why_valid_or_invalid:
        zh: 观察关系不产生系统级承载归属，共享可见性也不等于服务所有权。
        en: Observation does not create system-level hosting ownership, and shared visibility is not service ownership.
        ja: 観測はsystem-level hosting ownershipを作らず、共有visibilityはservice ownershipではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-runtime-session-028
  source_claims:
    - claim-runtime-session-028
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations:
  - id: RuntimeSession-has_attempt-RunAttempt
    predicate: has_attempt
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含执行尝试
      en: has run attempt
      ja: 実行試行を含む
    definitions:
      zh: 把 RuntimeSession 连接到在其有效活动区间内启动的 RunAttempt；一个会话可包含多次尝试，但每次尝试必须有明确会话归属，暂停期间或终止后不得无恢复事件创建新尝试。
      en: Links a RuntimeSession to a RunAttempt started during its effective active interval; a session may contain multiple attempts, but each attempt needs explicit session ownership and cannot start while paused or after termination without a resume event.
      ja: RuntimeSessionをeffective active interval内に開始したRunAttemptへ結びます。sessionは複数attemptを含めますが、各attemptは明示session ownershipを持ち、pause中やtermination後にresume eventなしで開始できません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: attempt_of_runtime_session
      labels:
        zh: 属于运行会话
        en: attempt of runtime session
        ja: 実行セッションの試行である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: RuntimeSession-has_attempt-RunAttempt-example-positive-manual-001
        kind: positive
        labels:
          zh: 包含执行尝试正例
          en: "Positive case: has run attempt"
          ja: 実行試行を含むの正例
        scenario_id: null
        descriptions:
          zh: session-72 在 active 区间 10:00–10:20Z 内启动 attempt-72-b，并将 session_id 写入尝试记录。
          en: session-72 starts attempt-72-b during its active interval 10:00–10:20Z and records the session_id on the attempt.
          ja: session-72はactive interval 10:00–10:20Zにattempt-72-bを開始し、attempt recordへsession_idを記録します。
        field_values: {}
        related_node_ids:
          - RuntimeSession
          - RunAttempt
        related_relation_ids:
          - RuntimeSession-has_attempt-RunAttempt
        expected_result:
          zh: 断言 session-72 has_attempt attempt-72-b。
          en: Assert session-72 has_attempt attempt-72-b.
          ja: session-72 has_attempt attempt-72-bをassertします。
        why_valid_or_invalid:
          zh: 尝试的会话外键与开始时刻均落在该会话的有效活动范围。
          en: The attempt's session reference and start time both fall within the session's effective active scope.
          ja: attemptのsession referenceとstart timeがsessionのeffective active scope内にあります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-runtime-session-029
      - id: RuntimeSession-has_attempt-RunAttempt-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 包含执行尝试边界例
          en: "Boundary case: has run attempt"
          ja: 実行試行を含むの境界例
        scenario_id: null
        descriptions:
