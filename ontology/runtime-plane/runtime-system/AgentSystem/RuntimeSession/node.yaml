schema: moonweave.ai/ontology-node/v1
id: RuntimeSession
kind: concept
labels:
  en: runtime session
  zh: 运行会话
  ja: 実行セッション
semantics:
  short_definition:
    zh: 运行会话是以一个会话身份维持连续上下文并承载一组相关智能体回合与执行尝试的有界活动。
    en: A RuntimeSession is a bounded activity that maintains one continuity context under a session identity across related agent turns and execution attempts.
    ja: RuntimeSession は、一つのセッション識別子の下で連続コンテキストを維持し、関連するエージェントターンと実行試行を収容する有界活動である。
  definition:
    zh: 运行会话是一类有开始与结束边界的活动；它以 session_id 关联参与者、短期上下文、状态历史、运行尝试和追踪记录，并可在暂停后恢复。它不是跨会话记忆库、AgentSystem、单次 RunAttempt，也不是表示状态变化的生命周期事件。
    en: A RuntimeSession is an activity with start and end boundaries, distinguished by a session_id that correlates participants, short-term context, state history, run attempts, and traces and may survive pause and resume. It is not a cross-session memory store, an AgentSystem, one RunAttempt, or a lifecycle event that reports a state change.
    ja: RuntimeSession は開始・終了境界を持つ活動であり、session_id により参加者、短期コンテキスト、状態履歴、実行試行、追跡を関連付け、停止後に再開できる。セッション横断メモリ、AgentSystem、単一 RunAttempt、状態変化を報告するライフサイクルイベントではない。
  why_needed:
    zh: 该概念为多轮连续性、暂停恢复和会话级审计提供统一时间范围，并防止把长期用户记忆或整个系统误当作一次会话。
    en: This concept supplies one temporal scope for multi-turn continuity, pause and resume, and session-level audit while preventing long-term user memory or the whole system from being mistaken for one session.
    ja: この概念は複数ターンの連続性、停止・再開、セッション監査に一つの時間範囲を与え、長期利用者メモリやシステム全体との混同を防ぐ。
  includes:
    - zh: 纳入由 session_id 标识、具有开始时刻和生命周期状态，并关联一个或多个智能体回合、尝试或追踪的交互活动。
      en: Includes an interaction activity identified by session_id with a start time and lifecycle state that correlates one or more agent turns, attempts, or traces.
      ja: session_id、開始時刻、ライフサイクル状態を持ち、一つ以上のエージェントターン、試行、追跡を関連付ける対話活動を含む。
  excludes:
    - zh: 不纳入单条模型响应、单次 RunAttempt、跨多个 session_id 的用户画像、AgentSystem 或 SessionLifecycleEvent。
      en: Excludes one model response, one RunAttempt, a user profile shared across session IDs, an AgentSystem, and a SessionLifecycleEvent.
      ja: 単一モデル応答、単一 RunAttempt、複数 session_id で共有される利用者プロファイル、AgentSystem、SessionLifecycleEvent は含まない。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: RuntimeSession（Session/Thread）映射 OpenAI thread_id、LangGraph thread 与 E2B sandbox session；SessionLifecycleEvent 记录 start/pause/resume/end，配置存在不等于会话已开始。
    en: RuntimeSession (Session/Thread) maps OpenAI thread_id, LangGraph thread, and E2B sandbox session; SessionLifecycleEvent records start/pause/resume/end; configuration alone does not mean session started.
    ja: RuntimeSession（Session/Thread）は OpenAI/LangGraph thread_id と E2B session を写像し lifecycle event で状態変化を記録します。
  typical_input:
    - description: OpenAI thread, LangGraph thread, or E2B sandbox session.
      format: POST /v1/threads => {"id":"thread_abc"}
      source_claims:
        - claim-langgraph-thread-system
        - claim-runtime-session-design
  typical_output:
    - description: Moonweave session/environment projection.
      format: '{"session_id":"session-91","thread_id":"thread_abc","lifecycle_state":"active"}'
      source_claims:
        - claim-runtime-session-design
  reference_implementations:
    - name: OpenAI Threads API
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread → Session/Thread context container.
    - name: LangGraph Threads
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      description: Persistent thread_id with configuration.
    - name: E2B Sandbox
      url: https://e2b.dev/docs
      description: Sandbox session, environment, file outputs.
structure:
  identity_keys:
    - session_id
  fields:
    - id: lifecycle_state
      labels:
        zh: 生命周期状态
        en: lifecycle state
        ja: ライフサイクル状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 会话在受控生命周期中的当前状态，而不是新的图节点。
        en: Current state in the controlled session lifecycle, not a separate graph node.
        ja: 制御されたセッションライフサイクル上の現在状態であり、別のグラフノードではありません。
      allowed_values:
        - id: SessionStateCreated
          value: created
          labels:
            zh: 已创建
            en: Created
            ja: 作成済み
          definitions:
            zh: 会话身份已经分配，但首次 SessionStartEvent 尚未把它置为活动状态。
            en: The session identity has been allocated, but its first SessionStartEvent has not yet made it active.
            ja: セッション識別子は割り当て済みですが、最初の SessionStartEvent により active にはまだなっていません。
          source_claims:
            - claim-runtime-session-design
            - claim-runtime-session-design
        - id: SessionStateActive
          value: active
          labels:
            zh: 活动中
            en: Active
            ja: アクティブ
          definitions:
            zh: 会话已开始，可以接纳新的运行尝试，并且尚未暂停或终止。
            en: The session has started, may admit new run attempts, and is neither paused nor terminal.
            ja: セッションは開始済みで新しい実行試行を受け入れられ、一時停止中でも終端状態でもありません。
          source_claims:
            - claim-runtime-session-design
            - claim-runtime-session-design
        - id: SessionStatePaused
          value: paused
          labels:
            zh: 已暂停
            en: Paused
            ja: 一時停止
          definitions:
            zh: 会话被有意暂停，连续性状态已经保留，可在同一 session_id 下恢复。
            en: The session is intentionally suspended with continuity state retained for resumption under the same session_id.
            ja: セッションは意図的に停止され、同じ session_id で再開できる継続状態が保持されています。
          source_claims:
            - claim-runtime-session-design
            - claim-runtime-session-design
        - id: SessionStateInterrupted
          value: interrupted
          labels:
            zh: 已中断
            en: Interrupted
            ja: 中断中
          definitions:
            zh: 会话因所需输入、认证、审批或其他外部条件尚未满足而停止推进，但仍属于非终态。
            en: The session cannot progress because required input, authentication, approval, or another external condition is outstanding, but it remains non-terminal.
            ja: 必要な入力、認証、承認、その他の外部条件が未充足のため進行できませんが、終端状態ではありません。
          source_claims:
            - claim-runtime-session-design
            - claim-runtime-session-design
        - id: SessionStateCompleted
          value: completed
          labels:
            zh: 已完成
            en: Completed
            ja: 完了
          definitions:
            zh: 会话在成功产出其最终结果后进入的终态。
            en: A terminal session state reached after the session successfully produces its final result.
            ja: セッションが最終結果を正常に生成した後に到達する終端状態です。
          source_claims:
            - claim-runtime-session-design
        - id: SessionStateCancelled
          value: cancelled
          labels:
            zh: 已取消
            en: Cancelled
            ja: 取消済み
          definitions:
            zh: 会话在完成前被明确取消后进入的终态。
            en: A terminal session state reached when the session is explicitly cancelled before completion.
            ja: 完了前にセッションが明示的に取り消された場合の終端状態です。
          source_claims:
            - claim-runtime-session-design
        - id: SessionStateFailed
          value: failed
          labels:
            zh: 已失败
            en: Failed
            ja: 失敗
          definitions:
            zh: 会话因未恢复的错误而结束后进入的终态。
            en: A terminal session state reached when the session ends because of an unrecovered error.
            ja: 回復されなかったエラーによりセッションが終了した場合の終端状態です。
          source_claims:
            - claim-runtime-session-design
        - id: SessionStateRejected
          value: rejected
          labels:
            zh: 已拒绝
            en: Rejected
            ja: 拒否済み
          definitions:
            zh: 系统决定不启动或不再继续该会话后进入的终态。
            en: A terminal session state reached when the system decides not to start or continue the session.
            ja: システムがセッションを開始または継続しないと決定した場合の終端状態です。
          source_claims:
            - claim-runtime-session-design
      pattern: null
      example_value: active
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
    - id: end_time
      labels:
        zh: 结束时间
        en: end time
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 会话结束事件生效的 UTC 时间；活动会话为空。
        en: UTC instant at which the session-end event took effect; null while active.
        ja: セッション終了イベントが発効した UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
    - id: start_time
      labels:
        zh: 开始时间
        en: start time
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 会话开始事件生效的 UTC 时间。
        en: UTC instant at which the session-start event took effect.
        ja: セッション開始イベントが発効した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T01:00:00.000Z
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
    - id: session_id
      labels:
        zh: 会话标识
        en: session ID
        ja: セッション ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在一次系统部署范围内稳定标识该运行会话。
        en: Stable identifier for this runtime session within one system deployment.
        ja: 一つのシステム配備内でこの実行セッションを安定して識別します。
      allowed_values: []
      pattern: ^session-[A-Za-z0-9-]+$
      example_value: session-20260714-001
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
  constraints:
    - id: runtime-session-lifecycle-order
      severity: error
      expression_language: plain
      expression: end_time is absent or end_time >= start_time
      explanations:
        zh: 结束时间若存在，不得早于开始时间。
        en: When present, end_time must not precede start_time.
        ja: 終了時刻がある場合、開始時刻より前であってはなりません。
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
  required_relation_constraints:
    - id: runtime-session-has-attempt
      direction: outgoing
      predicate: has_attempt
      target_concept_id: RunAttempt
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 运行会话至少包含一次可审计的执行尝试。
        en: A runtime session contains at least one auditable run attempt.
        ja: 実行セッションには少なくとも一つの監査可能な実行試行が含まれます。
      source_claims:
        - claim-runtime-session-design
        - claim-runtime-session-design
examples:
  - id: RuntimeSession-example-positive-001
    labels:
      zh: OpenAI Agents Session 历史
      en: OpenAI Agents Session history
      ja: OpenAI Agents Session 履歴
    descriptions:
      zh: OpenAI Agents SDK Session(session_id="openai-session-support-73") 在 Runner.run 前加载 SQLite 历史，run 后 append items；store_ref=session-store/sqlite、system_id=support-agent-prod。
      en: OpenAI Agents SDK Session(session_id="openai-session-support-73") loads SQLite history before Runner.run, appends after; store_ref=session-store/sqlite, system_id=support-agent-prod.
      ja: OpenAI Session が run 前後で SQLite 履歴を管理する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values:
      lifecycle_state: active
      start_time: 2026-07-13T01:00:00.000Z
      session_id: session-20260714-001
    related_node_ids:
      - RuntimeSession
      - TraceEvent
      - TraceRecord
    related_relation_ids:
      - session_has_trace
    source_claims:
      - claim-runtime-session-design
  - id: RuntimeSession-example-boundary-001
    labels:
      zh: Assistants Thread ID  alone
      en: Assistants Thread ID alone
      ja: Assistants Thread ID のみ
    descriptions:
      zh: 仅有 Assistants thread_id=thread_abc 无 store_ref、system_id、lifecycle state，不是完整 RuntimeSession 记录。
      en: Only Assistants thread_id=thread_abc without store_ref, system_id, lifecycle state is incomplete RuntimeSession record.
      ja: thread_id のみでは RuntimeSession 記録として不十分である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeSession
      - TraceEvent
      - TraceRecord
    related_relation_ids:
      - session_has_trace
    source_claims:
      - claim-runtime-session-design
  - id: RuntimeSession-example-3
    labels:
      zh: Session 与 Execution 边界
      en: Session versus Execution boundary
      ja: Session と Execution 境界
    descriptions:
      zh: OpenAI Session 跨多次 Run 保留历史；每次 Run 是独立 Execution Activity；Session 连续性与 Execution timing 分开查询。
      en: OpenAI Session retains history across Runs; each Run is separate Execution Activity; Session continuity and Execution timing queried separately.
      ja: Session は履歴、各 Run は独立 Execution である。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeSession
    related_relation_ids: []
    source_claims:
      - claim-runtime-session-design
      - claim-runtime-session-design
  - id: RuntimeSession-example-4
    labels:
      zh: LangGraph PostgresSaver session
      en: LangGraph PostgresSaver session
      ja: LangGraph PostgresSaver セッション
    descriptions:
      zh: LangGraph thread_id=thread-1、store_ref=checkpointer/postgres、PostgresSaver 持久化；interrupt 后 SessionResumeEvent 用同 thread 恢复。
      en: LangGraph thread_id=thread-1, store_ref=checkpointer/postgres, PostgresSaver persistence; after interrupt SessionResumeEvent resumes same thread.
      ja: LangGraph thread-1 PostgresSaver セッションを interrupt 後 resume する。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref.html#tag/threads
      version: threads and sessions
    field_values: {}
    related_node_ids:
      - RuntimeSession
    related_relation_ids: []
    source_claims:
      - claim-runtime-session-design
      - claim-runtime-session-design
parent_relation:
  id: AgentSystem-hosts-RuntimeSession
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 承载运行会话
    en: hosts runtime session
    ja: 実行セッションを収容する
  definitions:
    zh: 表示一个具有稳定 system_id 的 AgentSystem 对 RuntimeSession 的系统级归属：系统提供会话所依赖的运行器、状态与治理服务，但会话仍是有自身时间边界的活动，而不是系统子类。
    en: Relates an AgentSystem with a stable system_id to a RuntimeSession whose runner, state, and governance services it supplies; the session remains a time-bounded activity rather than a subtype of the system.
    ja: 安定したsystem_idを持つAgentSystemがrunner・state・governance serviceを提供するRuntimeSessionを関連付けます。セッションは時間境界を持つactivityであり、systemのsubtypeではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由智能体系统承载
      en: hosted by agent system
      ja: エージェントシステムに収容される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-runtime-session-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: RuntimeSession-has_attempt-RunAttempt
    predicate: has_attempt
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含执行尝试
      en: has run attempt
      ja: 実行試行を含む
    definitions:
      zh: 把 RuntimeSession 连接到在其有效活动区间内启动的 RunAttempt；一个会话可包含多次尝试，但每次尝试必须有明确会话归属，暂停期间或终止后不得无恢复事件创建新尝试。
      en: Links a RuntimeSession to a RunAttempt started during its effective active interval; a session may contain multiple attempts, but each attempt needs explicit session ownership and cannot start while paused or after termination without a resume event.
      ja: RuntimeSessionをeffective active interval内に開始したRunAttemptへ結びます。sessionは複数attemptを含めますが、各attemptは明示session ownershipを持ち、pause中やtermination後にresume eventなしで開始できません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: attempt_of_runtime_session
      labels:
        zh: 属于运行会话
        en: attempt of runtime session
        ja: 実行セッションの試行である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-runtime-session-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RunAttempt
  - id: session_has_trace
    predicate: session_has_trace
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 具有会话追踪记录
      en: has session trace
      ja: セッショントレースを持つ
    definitions:
      zh: 把 RuntimeSession 连接到记录其端到端工作流的 TraceRecord；事件必须经由 TraceRecord 包含的 TraceSpan 及其事件关系进入，而不是从会话直接平铺到每个 TraceEvent。
      en: Links a RuntimeSession to the TraceRecord for its end-to-end workflow; individual events enter through TraceSpans contained by that trace rather than through a flattened direct session-to-TraceEvent edge.
      ja: RuntimeSessionをend-to-end workflowのTraceRecordへ結びます。個別eventはtrace内TraceSpanとevent関係を通り、sessionからTraceEventへflatに直結しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: trace_of_runtime_session
      labels:
        zh: 追踪其运行会话
        en: trace of runtime session
        ja: 実行セッションのtraceである
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-runtime-session-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:TraceRecord
  - id: RuntimeSession-runs_in-RuntimeEnvironment
    predicate: runs_in
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 运行于环境
      en: runs in runtime environment
      ja: 実行環境で動作する
    definitions:
      zh: RuntimeSession-runs_in-RuntimeEnvironment 表示某个具有稳定 session_id 的会话在目标环境的有效区间内实际执行了至少一个会话动作或 RunAttempt，并有环境实例标识、时间重叠与运行证据。配置中声明镜像、候选环境或默认部署位置，都不足以建立这条事实。
      en: RuntimeSession-runs_in-RuntimeEnvironment states that a session with a stable session_id actually executed at least one session action or RunAttempt during the target environment's valid interval, evidenced by an environment-instance identifier, temporal overlap, and runtime records. A configured image, candidate environment, or default deployment location is insufficient.
      ja: RuntimeSession-runs_in-RuntimeEnvironment は、安定した session_id を持つ会話が対象環境の有効期間中に少なくとも一つの session action または RunAttempt を実行し、environment instance ID・時間重複・実行記録で証明されることを表します。設定上の image、候補環境、既定配備先だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个会话可在迁移、远程工具或恢复后使用多个环境；本体不强制统一基数，但每条关系都必须绑定可识别环境实例和有效区间。
      en: A session may use multiple environments after migration, remote execution, or recovery; the ontology imposes no universal cardinality, but every assertion must bind an identifiable environment instance and valid interval.
      ja: 会話は移行・遠隔実行・復旧後に複数環境を使い得るため一律基数を課さず、各 assertion は識別可能な環境 instance と有効期間へ束縛します。
    inverse_reading:
      predicate: hosts_runtime_session
      labels:
        zh: 承载运行会话
        en: hosts runtime session
        ja: 実行セッションを収容する
    conditions:
      - id: runtime-session-runs-in-environment-evidence-condition
        severity: error
