schema: moonweave.ai/ontology-node/v1
id: RuntimeSession
kind: concept
status: accepted
labels: {zh: 运行时会话, en: Runtime session, ja: ランタイムセッション}
semantics:
  short_definition: {zh: 一个耐久、系统范围的对话或交互上下文，在多次执行间保留选定历史。, en: "A durable, system-scoped conversation or interaction context that preserves selected history across multiple executions.", ja: 複数の実行にわたり選択された履歴を保持する、耐久的でシステムスコープの会話または対話コンテキスト。}
  definition: {zh: RuntimeSession 是一个由一个 AgentSystem 拥有并由会话存储支持的已标识有状态上下文。它围绕共享历史将多个轮次或中断/恢复的运行分组，但不是一个 Execution Activity、不可变状态快照、单条转录消息或 OpenTelemetry 追踪。, en: "A RuntimeSession is an identified stateful context owned by one AgentSystem and backed by a session store. It groups multiple turns or interrupted/resumed runs around shared history, but it is not one Execution Activity, an immutable state snapshot, an individual transcript message, or an OpenTelemetry trace.", ja: RuntimeSession は、1つの AgentSystem が所有しセッションストアにより支えられる、識別された状態付きコンテキストである。共有履歴を中心に複数ターンや中断／再開実行をグループ化するが、1つの Execution Activity、不変の状態スナップショット、個別の転記メッセージ、OpenTelemetry トレースではない。}
  why_needed: {zh: 多轮智能体行为需要一个耐久范围来保存先前项目、中断和继续，而不会把每次运行合并为一个无界全局记忆。, en: "Multi-turn agent behavior needs a durable scope for prior items, interruptions, and continuation without merging every run into one unbounded global memory.", ja: マルチターンエージェント動作には、すべての実行を無制限のグローバルメモリに統合せず、先行項目、中断、継続を保持する耐久スコープが必要である。}
  includes:
    - {zh: 会话 ID、拥有系统、存储引用、生命周期状态和历史保留策略引用。, en: "Session ID, owning system, store reference, lifecycle state, and history-retention policy reference.", ja: セッション ID、所有システム、ストア参照、ライフサイクル状態、履歴保持ポリシー参照。}
    - {zh: 多条 Execution 记录和生命周期转换记录的公共上下文。, en: A common context for several Execution records and lifecycle transition records., ja: 複数の Execution 記録とライフサイクル遷移記録の共通コンテキスト。}
  excludes:
    - {zh: 单次模型调用、单个用户/助手项目、检查点载荷或追踪标识符。, en: "A single model invocation, individual user/assistant item, checkpoint payload, or trace identifier.", ja: 単一モデル呼び出し、個別ユーザー／アシスタント項目、チェックポイントペイロード、トレース識別子。}
    - {zh: 可在任何会话开始前存在的静态 AgentSystem 配置。, en: A static AgentSystem configuration that can exist before any session begins., ja: どのセッション開始前にも存在し得る静的 AgentSystem 構成。}
  semantic_kind: entity
  aliases: [conversation session, interaction context]
engineering:
  explanation: {zh: 运行时在运行前解析会话 ID 并检索其存储历史，然后在运行后写入新生成项目。如果工作因批准而暂停，恢复执行使用同一会话存储，使继续操作保留预期上下文。, en: "The runtime resolves a session ID and retrieves its stored history before a run, then writes newly produced items after the run. If work pauses for approval, a resumed execution uses the same session store so continuation keeps the intended context.", ja: ランタイムは実行前にセッション ID を解決し、保存済み履歴を取得して、実行後に新たに生成された項目を書き込む。承認のため作業が停止した場合、再開 Execution は同じセッションストアを使用し、継続は意図したコンテキストを保持する。}
  typical_input:
    - description: {zh: 会话查找, en: Session lookup, ja: セッション検索}
      format: |-
        {"session_id":"session-73","system_id":"support-agent-prod","store_ref":"redis://sessions/support-agent-prod"}
  typical_output:
    - description: {zh: 会话上下文记录, en: Session context record, ja: セッションコンテキスト記録}
      format: |-
        {"session_id":"session-73","state":"active","history_item_count":18,"last_activity_at":"2026-07-18T09:15:00Z"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Documents session IDs, stored conversation history, and resuming interrupted runs with the same session."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Documents persisted graph state organized for resumed runtime work."}
structure:
  identity_keys: [session_id, system_id]
  fields:
    - id: session_id
      labels: {zh: 会话 ID, en: Session ID, ja: セッション ID}
      definitions: {zh: 一个逻辑交互上下文的稳定标识符。, en: Stable identifier for one logical interaction context., ja: 1つの論理的対話コンテキストの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: session-73
      source_claims: [claim-runtime-session-history]
    - id: system_id
      labels: {zh: 拥有系统 ID, en: Owning system ID, ja: 所有システム ID}
      definitions: {zh: 拥有会话存储和生命周期策略的 AgentSystem 标识符。, en: Identifier of the AgentSystem that owns session storage and lifecycle policy., ja: セッションストレージとライフサイクルポリシーを所有する AgentSystem の識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: support-agent-prod
      source_claims: [claim-runtime-session-history]
    - id: store_ref
      labels: {zh: 会话存储引用, en: Session store reference, ja: セッションストア参照}
      definitions: {zh: 不含嵌入凭据的、指向后端存储的脱敏或逻辑引用。, en: "Redacted or logical reference to the backing store, without embedded credentials.", ja: 埋め込み資格情報を含まない、バッキングストアへのマスキング済みまたは論理的な参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: session-store/support-agent-prod
      source_claims: [claim-runtime-session-history]
  constraints:
    - id: runtime-session-owner-and-store
      severity: error
      language: plain
      expression: A session must have exactly one owning system and one resolvable backing store reference; credentials must not be embedded in the reference.
      explanation: {zh: 当会话在系统间漂移或将机密存储在元数据中时，所有权和持久历史边界会变得模糊。, en: Ownership and persisted-history boundaries become ambiguous when a session floats between systems or stores secrets in metadata., ja: セッションがシステム間を漂流したり、メタデータに秘密を保存したりすると、所有権と永続履歴の境界が曖昧になる。}
      source_claims: [claim-runtime-session-history]
  required_relations: [RuntimeSession-part-of-AgentSystem]
examples:
  - id: runtime-session-positive
    labels: {zh: "OpenAI Agents Session 历史", en: "OpenAI Agents Session history", ja: "OpenAI Agents Session 履歴"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; RuntimeSession maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; RuntimeSession maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; RuntimeSession serving env."}
    field_values: {session_id: openai-session-support-73, system_id: support-agent-prod, store_ref: session-store/sqlite}
    related_node_ids: [RuntimeSession, AgentSystem, SessionStartEvent]
    related_relation_ids: [RuntimeSession-part-of-AgentSystem]
    source_claims: [claim-runtime-session-history]
  - id: runtime-session-counterexample
    labels: {zh: "Assistants Thread ID  alone", en: "Assistants Thread ID alone", ja: "Assistants Thread ID のみ"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style RuntimeSession.", en: "ID without PROV relations cannot serve as PROV-O-style RuntimeSession.", ja: "Missing PROV relations rejects RuntimeSession."}
    field_values: {thread_id: thread_abc}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-runtime-session-history]
  - id: runtime-session-boundary
    labels: {zh: "Session 与 Execution 边界", en: "Session versus Execution boundary", ja: "Session と Execution 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; RuntimeSession must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; RuntimeSession must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {session_id: openai-session-support-73}
    related_node_ids: [RuntimeSession, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-session-history]
  - id: runtime-session-instance-session-73
    labels: {zh: "LangGraph PostgresSaver session", en: "LangGraph PostgresSaver session", ja: "LangGraph PostgresSaver セッション"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->RuntimeSession.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->RuntimeSession.", ja: "OTel instance maps to RuntimeSession."}
    field_values: {session_id: langgraph-thread-1, system_id: support-agent-prod, store_ref: checkpointer/postgres}
    related_node_ids: [RuntimeSession, AgentSystem, SessionResumeEvent, Checkpoint]
    related_relation_ids: [RuntimeSession-part-of-AgentSystem]
    source_claims: [claim-runtime-session-history]
parent_relation:
  id: RuntimeSession-part-of-AgentSystem
  predicate: part_of
  target: concept:AgentSystem
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是智能体系统的一部分, en: is part of agent system, ja: エージェントシステムの一部である}
  definitions: {zh: RuntimeSession 在一个 AgentSystem 边界内被管理。, en: A RuntimeSession is managed within the boundary of one AgentSystem., ja: RuntimeSession は1つの AgentSystem の境界内で管理される。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_runtime_session, labels: {zh: 具有运行时会话, en: has runtime session, ja: ランタイムセッションを持つ}}
  conditions:
    - id: runtime-session-parent-condition
      severity: error
      expression: The session system_id must resolve to the target AgentSystem deployment record.
      explanations: {zh: 会话不能归属给任意无关运行时系统。, en: A session cannot be attributed to an arbitrary unrelated runtime system., ja: セッションを任意の無関係なランタイムシステムに帰属できない。}
      source_claims: [claim-runtime-session-history]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-runtime-session-history]
relations: []
sources:
  - id: openai-agents-sessions
    title: "OpenAI Agents SDK sessions"
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: documentation
    relevance: Documents session IDs, persistence of conversation history across runs, and resumption with the same session.
  - id: langgraph-persistence
    title: "LangGraph persistence"
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: documentation
    relevance: Documents persisted runtime state for later continuation and replay.
source_claims:
  - id: claim-runtime-session-history
    source: openai-agents-sessions
    supports: Agents SDK sessions store conversation history for a session and retrieve history before later runs; interrupted work can resume with the same session.
    locator: Overview, Core session behavior, and Resuming interrupted runs
    evidence_kind: documentation
    confidence: high

