            zh: 棰嗗煙澶嶆牳纭 AgentSystem 涓?RuntimeSession 鎻忚堪绯荤粺鍙婂叾浼氳瘽鍙戠敓锛孯untimeEnvironment 鎻忚堪瀹為檯鎵ц鍦扮偣锛屼簩鑰呯敱 RuntimeSession-runs_in-RuntimeEnvironment 鍏宠仈浣嗚韩浠界嫭绔嬨€俁unAttempt銆丷unResult 涓?RunOutcome 浠嶇敱鎵ц灏濊瘯妯″潡鎷ユ湁锛涙湰妯″潡鍙洖绛斾細璇濆睘浜庡摢涓郴缁熴€佸浜庝綍绉嶇敓鍛藉懆鏈熺姸鎬佸苟瀹為檯杩愯鍦ㄥ摢閲屻€?            en: Domain review confirms that AgentSystem and RuntimeSession describe a system and its session occurrence, while RuntimeEnvironment identifies the actual execution place; RuntimeSession-runs_in-RuntimeEnvironment relates them without merging their identities. RunAttempt, RunResult, and RunOutcome remain owned by execution attempts; this module answers which system owns a session, its lifecycle state, and where it actually runs.
            ja: domain review 銇?AgentSystem 銇?RuntimeSession 銇?system 銇?session occurrence銆丷untimeEnvironment 銇屽疅闅涖伄 execution place 銈掕〃銇欍仺纰鸿獚銇椼伨銇欍€俁untimeSession-runs_in-RuntimeEnvironment 銇浮鑰呫倰闁㈤€ｄ粯銇戙伨銇欍亴 identity 銈掔当鍚堛仐銇俱仜銈撱€俁unAttempt銉籖unResult銉籖unOutcome 銇?execution-attempt module 銇屾墍鏈夈仐銆佹湰 module 銇?session 銇?system 鎵€灞炪兓lifecycle state銉诲疅琛屽牬鎵€銇犮亼銇瓟銇堛伨銇欍€?        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
