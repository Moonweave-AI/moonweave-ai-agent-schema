schema: moonweave.ai/ontology-node/v1
id: runtime-system
kind: module
labels:
  zh: 运行系统、环境与会话
  en: Runtime systems, environments, and sessions
  ja: 実行システム・環境・セッション
semantics:
  short_definition:
    zh: 运行系统模块描述智能体在哪个系统边界内运行、实际使用什么环境，以及哪条会话把多次执行归入同一交互上下文。
    en: The runtime-system module describes which system boundary hosts an agent, which environment is actually used, and which session groups multiple executions into one interaction context.
    ja: runtime-system モジュールは、どの system 境界で agent が動くか、実際の environment、複数 execution を同一対話文脈にまとめる session を記述します。
  definition:
    zh: 本模块保留三种不可互换身份：AgentSystem 是承载智能体及共享服务的软件系统边界；RuntimeEnvironment 是一次运行实际使用的 Container、ProcessHandle、WorkingDirectory 等环境组成；RuntimeSession 是在 AgentSystem 内延续上下文的会话容器，通过 SessionLifecycleEvent（SessionStartEvent、SessionPauseEvent、SessionResumeEvent、SessionEndEvent）记录状态变化。OpenAI thread、LangGraph thread_id、Cursor agent session 与 Claude conversation 均可映射为 RuntimeSession 形状。Sandbox 隔离规范归安全域；Execution 与 RunAttempt 归 execution-attempts 模块。
    en: "This module preserves three non-interchangeable identities: AgentSystem is the software boundary hosting agents and shared services; RuntimeEnvironment is the actual composition of Container, ProcessHandle, WorkingDirectory, and related environment parts; RuntimeSession is the context-bearing session container within AgentSystem with state changes recorded by SessionLifecycleEvent (SessionStartEvent, SessionPauseEvent, SessionResumeEvent, SessionEndEvent). OpenAI threads, LangGraph thread_id, Cursor agent sessions, and Claude conversations are mappable RuntimeSession shapes. Sandbox isolation specs belong to safety; Execution and RunAttempt belong to execution-attempts."
    ja: 本モジュールは AgentSystem、RuntimeEnvironment（Container・ProcessHandle・WorkingDirectory 等）、RuntimeSession（SessionLifecycleEvent で状態変化を記録）の三非代替 identity を保持します。OpenAI thread、LangGraph thread_id、Cursor agent session、Claude conversation を RuntimeSession 形状に写像できます。Sandbox 分離仕様は safety、Execution/RunAttempt は execution-attempts に属します。
  why_needed:
    zh: 没有这一模块，查询无法分别回答“哪个系统承载运行”“实际 cwd 与进程在哪里”“OpenAI thread 与 LangGraph thread 是否同一 Moonweave 会话”以及“哪条生命周期事件支持当前会话状态”。
    en: Without this module, queries cannot separately answer which system hosts a run, actual cwd and process location, whether an OpenAI thread and LangGraph thread belong to one Moonweave session, or which lifecycle event supports current session state.
    ja: このモジュールがなければ、どの system が run を収容するか、実 cwd/プロセス位置、OpenAI thread と LangGraph thread が同一 Moonweave session か、現在 session 状態を支える lifecycle event は何かを別々に答えられません。
  includes:
    - zh: AgentSystem 与其承载的 RuntimeSession 及 SessionLifecycleEvent 有序链。
      en: AgentSystem, the RuntimeSession it hosts, and ordered SessionLifecycleEvent chains.
      ja: AgentSystem、収容する RuntimeSession、順序付き SessionLifecycleEvent 連鎖。
    - zh: RuntimeEnvironment 及 Container、ProcessHandle、WorkingDirectory 组成与会话—环境关联。
      en: RuntimeEnvironment with Container, ProcessHandle, WorkingDirectory composition and session-to-environment association.
      ja: RuntimeEnvironment と Container・ProcessHandle・WorkingDirectory 構成、session-environment 関連。
  excludes:
    - zh: "Execution、RunAttempt、RuntimeBudget（owner: runtime-execution-attempts）；会话可包含多次执行但不成为尝试本身。"
      en: "Execution, RunAttempt, RuntimeBudget (owner: runtime-execution-attempts); a session may contain many executions but is not an attempt."
      ja: "Execution・RunAttempt・RuntimeBudget（owner: runtime-execution-attempts）。session は複数 execution を含めても attempt 自体にはなりません。"
    - zh: "Sandbox、IsolationSpec、mount 权限（owner: safety-plane）；约束环境但不等于实际 RuntimeEnvironment。"
      en: "Sandbox, IsolationSpec, mount permissions (owner: safety-plane); they constrain but are not the actual RuntimeEnvironment."
      ja: "Sandbox・IsolationSpec・mount 権限（owner: safety-plane）。環境を制約しますが実 RuntimeEnvironment ではありません。"
    - zh: "TraceSpan、Checkpoint、AgentTranscript（owner: runtime-observability）；可关联会话但不拥有会话身份。"
      en: "TraceSpan, Checkpoint, AgentTranscript (owner: runtime-observability); may reference a session but do not own session identity."
      ja: "TraceSpan・Checkpoint・AgentTranscript（owner: runtime-observability）。session を参照できますが session identity は所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI Assistants thread（POST /v1/threads、thread_id 跨 run 保持上下文）、LangGraph thread（POST /threads、thread_id 持久化 checkpoint 与 run 历史）、Cursor agent session（docs.cursor.com/agent 多步 session 边界与 Shell cwd）、以及 Claude conversation（Messages API 多轮 messages 数组或 conversation_id 若可用）。静态 IDE 工作区配置属于其他域；threads.create、POST /threads、Cursor session 启动与 Claude 多轮 message 创建触发的 RuntimeSession 与 SessionStartEvent occurrence 才属于本模块。
    en: "Integrations should map OpenAI Assistants threads (POST /v1/threads, thread_id preserving context across runs), LangGraph threads (POST /threads, thread_id persisting checkpoints and run history), Cursor agent sessions (docs.cursor.com/agent multi-step session boundaries and Shell cwd), and Claude conversations (Messages API multi-turn messages array or conversation_id when available) separately. Static IDE workspace config belongs elsewhere; RuntimeSession and SessionStartEvent occurrences triggered by threads.create, POST /threads, Cursor session start, and Claude multi-turn message creation belong here."
    ja: 統合では OpenAI Assistants thread、LangGraph thread、Cursor agent session、Claude conversation を個別に写像します。静的 IDE workspace 設定は他ドメイン、threads.create・POST /threads・Cursor session 開始・Claude 多轮 message 作成で触発される RuntimeSession/SessionStartEvent occurrence が本モジュールです。
  typical_input:
    - description: OpenAI Assistants API — create thread for multi-turn context.
      format: |
        POST https://api.openai.com/v1/threads
        {}
        =>
        {"id": "thread_abc123", "object": "thread", "created_at": 1720000000}

        POST https://api.openai.com/v1/threads/thread_abc123/runs
        {"assistant_id": "asst_abc", "stream": true}
      source_claims: [claim-runtime-system-openai-thread]
    - description: LangGraph Server — create persisted thread.
      format: |
        POST https://langgraph.example.com/threads
        {"metadata": {"project": "support"}}
        =>
        {"thread_id": "thread-42", "created_at": "2026-07-16T08:00:00Z"}

        POST https://langgraph.example.com/threads/thread-42/runs
        {"assistant_id": "support-agent", "input": {"messages": [...]}}
      source_claims: [claim-runtime-system-langgraph-thread]
    - description: Cursor agent session with terminal cwd and shell execution.
      format: |
        # Cursor Agent mode session-cursor-042
        session_id: session-cursor-042
        cwd: D:/moonweave-ai/moonweave-ai-agent-schema
        shell: powershell
        command: npm test ontology/runtime-plane
      source_claims: [claim-runtime-system-cursor-session]
    - description: Anthropic Claude multi-turn conversation via Messages API.
      format: |
        POST https://api.anthropic.com/v1/messages
        {
          "model": "claude-sonnet-4-20250514",
          "max_tokens": 1024,
          "messages": [
            {"role": "user", "content": "Review runtime-system node.yaml"},
            {"role": "assistant", "content": "I'll read the file first."},
            {"role": "user", "content": "Focus on session boundaries."}
          ]
        }
      source_claims: [claim-runtime-system-claude-conversation]
  typical_output:
    - description: Moonweave-local session projection linking system, environment, session, and lifecycle events without conflating session with execution.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "agent_system_id": "agent-system-cursor-01",
          "session_ref": "session-cursor-042",
          "runtime_environment_id": "container-cursor-042",
          "working_directory": "D:/moonweave-ai/moonweave-ai-agent-schema",
          "lifecycle_state": "active",
          "latest_lifecycle_event_id": "start-cursor-042"
        }
      source_claims: [claim-runtime-system-design]
  reference_implementations:
    - name: OpenAI Assistants Threads
      url: https://platform.openai.com/docs/api-reference/threads
      description: Thread creation and thread-scoped runs preserving multi-turn context.
    - name: LangGraph Server API
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
      description: POST /threads and thread_id for persisted checkpoint and run history.
    - name: Cursor Agent
      url: https://docs.cursor.com/agent
      description: Agent-mode session boundaries, shell cwd, and multi-step work context.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Multi-turn messages array forming conversation context across requests.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 运行系统模块的稳定标识，不是某个 RuntimeSession 或 thread_id。
        en: Stable identifier of the runtime-system module, not a RuntimeSession or thread_id.
        ja: runtime-system モジュールの安定識別子であり、RuntimeSession や thread_id ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^runtime-system$'
      example_value: runtime-system
      allowed_values: []
      source_claims: [claim-runtime-system-design]
    - id: session_ref
      labels: {zh: 会话引用, en: Session reference, ja: セッション参照}
      definitions:
        zh: 把多次 Execution 或 RunAttempt 归入同一交互边界的会话标识，例如 LangGraph thread_id、OpenAI thread_id 或 Cursor agent session。
        en: Session identifier grouping multiple Executions or RunAttempts within one interaction boundary, such as LangGraph thread_id, OpenAI thread_id, or Cursor agent session.
        ja: LangGraph thread_id、OpenAI thread_id、Cursor agent session 等、複数 Execution/RunAttempt を同一対話境界にまとめる session 識別子。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session-330
      allowed_values: []
      source_claims: [claim-runtime-system-openai-thread, claim-runtime-system-langgraph-thread]
    - id: runtime_environment_ref
      labels: {zh: 运行环境引用, en: Runtime environment reference, ja: 実行環境参照}
      definitions:
        zh: 标识一次运行实际使用的 RuntimeEnvironment，含 Container、ProcessHandle 与 WorkingDirectory 组成。
        en: Identifies the RuntimeEnvironment actually used in a run, including Container, ProcessHandle, and WorkingDirectory composition.
        ja: Container・ProcessHandle・WorkingDirectory 構成を含む、実行で実際に使われた RuntimeEnvironment を識別します。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: container-410
      allowed_values: []
      source_claims: [claim-runtime-system-design]
    - id: lifecycle_state
      labels: {zh: 生命周期状态, en: Lifecycle state, ja: ライフサイクル状態}
      definitions:
        zh: RuntimeSession 当前状态，必须由有序 SessionLifecycleEvent 推导并可与存储字段交叉验证。
        en: Current RuntimeSession state that must be derived from ordered SessionLifecycleEvent and cross-checked against stored fields.
        ja: 順序付き SessionLifecycleEvent から導出し保存 field と相互検証可能な RuntimeSession 現在状態。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: active
      allowed_values: [created, active, paused, interrupted, completed, canceled]
      source_claims: [claim-runtime-system-design]
  constraints:
    - id: session-state-from-lifecycle-events
      severity: error
      expression_language: plain
      expression: RuntimeSession lifecycle_state must be derivable from ordered SessionLifecycleEvent through changes_state_of relations; a stale stored scalar must not override a later SessionEndEvent or SessionPauseEvent.
      explanation:
        zh: 会话状态必须由事件序列复核，不能单靠未同步字符串。
        en: Session state must be verified from the event sequence, not an unsynchronized string alone.
        ja: session 状態は未同期文字列だけでなく event sequence で検証する必要があります。
      source_claims: [claim-runtime-system-design]
    - id: session-not-execution
      severity: error
      expression_language: plain
      expression: RuntimeSession must not be asserted as Execution or RunAttempt; multiple executions may belong to one session through explicit has_attempt or equivalent relations.
      explanation:
        zh: 会话容器与一次执行尝试是不同身份。
        en: A session container and one execution attempt are distinct identities.
        ja: session 容器と一回の execution attempt は別 identity です。
      source_claims: [claim-runtime-system-design]
    - id: environment-not-sandbox-spec
      severity: warning
      expression_language: plain
      expression: RuntimeEnvironment records actual Container, ProcessHandle, and WorkingDirectory used; IsolationSpec or Sandbox policy alone without instantiated environment evidence is insufficient.
      explanation:
        zh: 隔离规范不能代替实际运行环境发生事实。
        en: Isolation specification cannot replace actual runtime environment occurrence facts.
        ja: 分離仕様だけでは実 runtime environment occurrence を代替できません。
      source_claims: [claim-runtime-system-design]
  required_relations:
    - id: runtime-system-organizes-agent-system
      direction: outgoing
      predicate: organizes
      target_concept_id: AgentSystem
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 AgentSystem→RuntimeSession 承载链。
        en: The module organizes at least one AgentSystem→RuntimeSession hosting chain.
        ja: モジュールは少なくとも一つの AgentSystem→RuntimeSession 収容連鎖を組織します。
      source_claims: [claim-runtime-system-design]
examples:
  - id: runtime-system-example-openai-thread-session
    labels:
      zh: OpenAI thread 会话
      en: OpenAI thread session
      ja: OpenAI thread セッション
    descriptions:
      zh: POST /v1/threads 创建 thread_abc123；SessionStartEvent start-openai-abc 通过 changes_state_of 指向 session-openai-abc。同一 thread 上两次 POST /threads/thread_abc123/runs 产生 execution-openai-run-1 与 execution-openai-run-2，共享 session_ref=session-openai-abc 但各自拥有独立 RunAttempt。
      en: POST /v1/threads creates thread_abc123; SessionStartEvent start-openai-abc changes_state_of session-openai-abc. Two POST /threads/thread_abc123/runs produce execution-openai-run-1 and execution-openai-run-2 sharing session_ref=session-openai-abc but each owning a separate RunAttempt.
      ja: POST /v1/threads で thread_abc123 を作成。SessionStartEvent start-openai-abc が changes_state_of で session-openai-abc を更新。同一 thread 上の二回の run が execution-openai-run-1/2 を生成し session_ref=session-openai-abc を共有しますが RunAttempt は別々です。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/threads
    field_values:
      thread_id: thread_abc123
      session_ref: session-openai-abc
      agent_system_id: agent-system-openai-01
      execution_refs:
        - execution-openai-run-1
        - execution-openai-run-2
      lifecycle_state: active
      session_start_event_id: start-openai-abc
    related_node_ids:
      - AgentSystem
      - RuntimeSession
      - SessionStartEvent
      - Execution
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
      - RuntimeSession-has_attempt-RunAttempt
    source_claims:
      - claim-runtime-system-openai-thread
      - claim-runtime-system-design
  - id: runtime-system-example-langgraph-thread
    labels:
      zh: LangGraph thread 持久会话
      en: LangGraph persisted thread session
      ja: LangGraph 永続 thread セッション
    descriptions:
      zh: POST /threads 返回 thread_id=thread-42；session-330 绑定该 thread，checkpoint 与 run 历史在 thread 内持久化。POST /threads/thread-42/runs 创建 run-884 归属 session-330；SessionLifecycleEvent 链记录 start→active，environment container-410 通过 runs_in 关联。
      en: POST /threads returns thread_id=thread-42; session-330 binds that thread with checkpoints and run history persisted in-thread. POST /threads/thread-42/runs creates run-884 belonging to session-330; SessionLifecycleEvent chain records start→active and environment container-410 associates via runs_in.
      ja: POST /threads が thread_id=thread-42 を返し session-330 がその thread に束縛、checkpoint/run 履歴は thread 内永続化。POST /threads/thread-42/runs で run-884 が session-330 に属し SessionLifecycleEvent が start→active を記録、environment container-410 が runs_in で関連します。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
    field_values:
      thread_id: thread-42
      session_ref: session-330
      run_id: run-884
      runtime_environment_id: container-410
      working_directory: /workspace/moonweave
      lifecycle_state: active
    related_node_ids:
      - RuntimeSession
      - RuntimeEnvironment
      - Container
      - SessionLifecycleEvent
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
      - RuntimeSession-runs_in-RuntimeEnvironment
    source_claims:
      - claim-runtime-system-langgraph-thread
      - claim-runtime-system-design
  - id: runtime-system-example-cursor-agent-session
    labels:
      zh: Cursor agent 终端会话
      en: Cursor agent terminal session
      ja: Cursor agent 端末セッション
    descriptions:
      zh: Cursor Agent 在 session-cursor-042 中通过 Shell 运行 npm test ontology/runtime-plane；RuntimeEnvironment env-cursor-042 记录 powershell cwd=D:/moonweave-ai/moonweave-ai-agent-schema 与 shell PID。Execution execution-cursor-042 与后续文件编辑 run 共享 session_ref 但 RunAttempt 独立；AgentTranscript 归 observability 模块引用。
      en: Cursor Agent runs npm test ontology/runtime-plane via Shell in session-cursor-042; RuntimeEnvironment env-cursor-042 records powershell cwd=D:/moonweave-ai/moonweave-ai-agent-schema and shell PID. Execution execution-cursor-042 shares session_ref with later file-edit runs but owns a separate RunAttempt; AgentTranscript belongs to observability via reference.
      ja: session-cursor-042 で Cursor Agent が Shell 経由 npm test ontology/runtime-plane を実行。RuntimeEnvironment env-cursor-042 が powershell cwd と shell PID を記録。Execution execution-cursor-042 は後続ファイル編集 run と session_ref を共有しますが RunAttempt は独立。AgentTranscript は observability が参照します。
    example_source:
      product: Cursor Agent
      url: https://docs.cursor.com/agent
    field_values:
      session_ref: session-cursor-042
      agent_system_id: agent-system-cursor-01
      runtime_environment_id: env-cursor-042
      shell: powershell
      cwd: D:/moonweave-ai/moonweave-ai-agent-schema
      command: npm test ontology/runtime-plane
      exit_code: 0
      execution_ref: execution-cursor-042
    related_node_ids:
      - AgentSystem
      - RuntimeSession
      - RuntimeEnvironment
      - ProcessHandle
      - WorkingDirectory
    related_relation_ids:
      - RuntimeSession-runs_in-RuntimeEnvironment
    source_claims:
      - claim-runtime-system-cursor-session
      - claim-runtime-system-design
  - id: runtime-system-example-claude-conversation
    labels:
      zh: Claude 多轮对话会话
      en: Claude multi-turn conversation session
      ja: Claude 多轮対話セッション
    descriptions:
      zh: 同一 session-claude-019 内三次 POST /v1/messages 携带递增 messages 数组（user→assistant→user 多轮）。SessionStartEvent start-claude-019 标记会话开始；每次 message 创建映射为独立 Execution，但 session_ref 保持连续对话边界。
      en: Three POST /v1/messages calls within session-claude-019 carry an expanding messages array (multi-turn user→assistant→user). SessionStartEvent start-claude-019 marks session start; each message creation maps to a distinct Execution while session_ref preserves continuous conversation boundary.
      ja: session-claude-019 内の三回 POST /v1/messages が拡張 messages 配列（多轮 user→assistant→user）を運びます。SessionStartEvent start-claude-019 が session 開始を示し、各 message 作成は別 Execution に写像されますが session_ref は連続対話境界を保持します。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      session_ref: session-claude-019
      model: claude-sonnet-4-20250514
      message_turns: 3
      execution_refs:
        - execution-claude-turn-1
        - execution-claude-turn-2
        - execution-claude-turn-3
      lifecycle_state: active
    related_node_ids:
      - RuntimeSession
      - SessionStartEvent
      - Execution
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
      - RuntimeSession-has_attempt-RunAttempt
    source_claims:
      - claim-runtime-system-claude-conversation
      - claim-runtime-system-design
  - id: runtime-system-example-stale-lifecycle-state
    labels:
      zh: 陈旧状态字段被 SessionEndEvent 否决
      en: Stale lifecycle field overridden by SessionEndEvent
      ja: 古い lifecycle field が SessionEndEvent で上書き
    descriptions:
      zh: session-311 存储字段仍写 active，但事件序列含 start-311@09:00 与 end-311@09:10（reason=completed）。09:12 查询必须判定 lifecycle_state=completed 并报告 stored_lifecycle_state 与事件推导不一致。
      en: session-311 stored field still reads active but the event sequence contains start-311@09:00 and end-311@09:10 (reason=completed). A 09:12 query must classify lifecycle_state=completed and report mismatch between stored_lifecycle_state and event-derived result.
      ja: session-311 の保存値は active ですが event 列に start-311@09:00 と end-311@09:10（reason=completed）があります。09:12 query は lifecycle_state=completed と判定し stored_lifecycle_state と event-derived result の不一致を報告する必要があります。
    example_source:
      product: Moonweave runtime-system boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      session_id: session-311
      stored_lifecycle_state: active
      derived_lifecycle_state: completed
      event_sequence:
        - start-311@2026-07-16T09:00:00Z
        - end-311@2026-07-16T09:10:00Z:completed
      evaluated_at: 2026-07-16T09:12:00Z
    related_node_ids:
      - RuntimeSession
      - SessionStartEvent
      - SessionEndEvent
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
    source_claims:
      - claim-runtime-system-design
parent_relation: null
relations: []
