              zh: 人工复核确认同一环境可承载零到多个网络交互，环境身份不依赖任一调用。
              en: Manual review confirms that one environment may host zero or many network interactions and does not depend on any one call for identity.
              ja: 手動審査は同一 environment が zero-to-many network interaction を持ち得て任一 call に同一性を依存しないと確認しました。
  overlap_checks:
    - other_module_id: runtime-execution-attempts
      semantic_area:
        zh: 运行会话与会话内执行
        en: Runtime sessions versus executions within sessions
        ja: 実行セッションとセッション内実行
      candidate_concept_ids:
        - RunAttempt
        - RuntimeBudget
      overlap_reason:
        zh: 两者都带开始结束时间，但 Session 是多活动共享容器，Execution 是实现某个工作定义的活动，且可有多次 Attempt。 本条仅记录 RunAttempt、RuntimeBudget；其 canonical owner 是执行尝试与结果（runtime-execution-attempts），因此 runtime-system 在此引用这些概念。
        en: Both have start and end times, but Session is a container shared by many activities while Execution realizes work and may have multiple Attempts. This record is limited to RunAttempt, RuntimeBudget; their canonical owner is Execution attempts and outcomes (runtime-execution-attempts), so runtime-system references these concepts here.
        ja: どちらも開始・終了時刻を持ちますが、Session は複数活動の共有コンテナ、Execution は作業を実現し複数 Attempt を持てます。 この記録は RunAttempt、RuntimeBudget だけを対象とし、canonical owner は実行試行と結果（runtime-execution-attempts）です。したがって runtime-system はここでこれらを参照します。
      disambiguation_test:
        zh: 若对象可包含多个无共同目标的活动，则归运行环境与会话；若身份依赖具体工作、attempt lineage 和 outcome，则归执行尝试与结果。
        en: If an object can contain multiple activities without one shared goal, it belongs to runtime environments and sessions; if identity depends on specific work, attempt lineage, and outcome, it belongs to execution attempts and outcomes.
        ja: 対象が共通目標を持たない複数活動を含められるなら実行環境とセッション、同一性が具体作業、attempt lineage、outcome に依存すれば実行試行と結果に属します。
