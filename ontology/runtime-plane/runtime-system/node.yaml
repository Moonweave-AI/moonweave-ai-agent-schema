      decision: owns
      owner_module_id: runtime-system
      rationale:
        zh: RuntimeEnvironment 由实际资源、进程边界、工作目录和配置快照界定，归运行系统；允许或拒绝某次网络交互不改变环境身份。
        en: RuntimeEnvironment is identified by actual resources, process boundary, working directory, and configuration snapshot and belongs to runtime system; allowing or denying one network interaction does not change environment identity.
        ja: RuntimeEnvironment は actual resource・process boundary・working directory・configuration snapshot で識別され runtime system に属し、一回の network interaction の allow／deny で environment identity は変わりません。
