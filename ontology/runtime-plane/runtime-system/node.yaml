schema: moonweave.ai/ontology-node/v1
id: runtime-system
kind: module
status: accepted
labels:
  zh: 运行系统、环境与会话
  en: Runtime systems, environments, and sessions
  ja: 実行システム・環境・セッション
semantics:
  short_definition:
    zh: 描述智能体软件系统、实际运行环境和跨多次执行保持连续的运行会话，并用有序生命周期事件说明会话如何开始、暂停、恢复和结束。
    en: Describes the agent software system, its actual runtime environment, and a runtime session that remains continuous across executions, with ordered lifecycle events for start, pause, resume, and end.
    ja: エージェントのソフトウェアシステム、実際の実行環境、複数実行をまたいで連続する実行セッション、および開始・一時停止・再開・終了の順序付きライフサイクルイベントを記述します。
  definition:
    zh: 本模块保留三种不可互换的身份：AgentSystem 是承载智能体及共享服务的系统边界；RuntimeEnvironment 是一次运行实际使用的文件系统、进程和配置上下文；RuntimeSession 是在该系统中延续上下文的会话容器。Container、ProcessHandle 与 WorkingDirectory 描述环境组成，SessionLifecycleEvent 描述会话状态变化，而不是执行结果。
    en: "The module preserves three non-interchangeable identities: AgentSystem is the software boundary hosting agents and shared services; RuntimeEnvironment is the filesystem, process, and configuration context actually used; RuntimeSession is the context-bearing session container within that system. Container, ProcessHandle, and WorkingDirectory describe environment composition, while SessionLifecycleEvent describes session-state change rather than execution outcome."
    ja: 本モジュールは三つの非代替な同一性を保持します。AgentSystem はエージェントと共有サービスを収容するシステム境界、RuntimeEnvironment は実際に使われたファイルシステム・プロセス・構成の文脈、RuntimeSession は同一システム内で文脈を継続するセッション容器です。Container・ProcessHandle・WorkingDirectory は環境構成を、SessionLifecycleEvent は実行結果ではなくセッション状態変化を表します。
  why_needed:
    zh: 让查询能够分别回答“哪个系统承载运行”“实际在哪里运行”“是否仍是同一会话”以及“哪项事件支持当前会话状态”。
    en: Enables separate answers to which system hosts the run, where it actually executes, whether session continuity is preserved, and which event supports the current session state.
    ja: どのシステムが実行を収容するか、実際の実行場所、同一セッションが継続しているか、現在状態を裏付けるイベントは何かを別々に回答できるようにします。
  includes:
    - zh: AgentSystem 与其承载的 RuntimeSession，以及能够证明会话开始、暂停、恢复或结束的 SessionLifecycleEvent。
      en: AgentSystem, the RuntimeSession it hosts, and SessionLifecycleEvent occurrences that prove session start, pause, resume, or end.
      ja: AgentSystem、そこに収容される RuntimeSession、ならびに開始・一時停止・再開・終了を立証する SessionLifecycleEvent。
    - zh: RuntimeEnvironment 及其实际组成，包括 Container、ProcessHandle、WorkingDirectory，以及会话到实际环境的明确关联。
      en: RuntimeEnvironment and its actual composition, including Container, ProcessHandle, WorkingDirectory, and the explicit session-to-environment association.
      ja: RuntimeEnvironment と、その実構成である Container・ProcessHandle・WorkingDirectory、およびセッションから実環境への明示的関連。
  excludes:
    - zh: Execution、RunAttempt、RuntimeBudget、RunResult 与 RunOutcome；一次会话可以包含多次执行，但不因此成为执行尝试。
      en: Execution, RunAttempt, RuntimeBudget, RunResult, and RunOutcome; a session may contain many executions without becoming an execution attempt.
      ja: Execution・RunAttempt・RuntimeBudget・RunResult・RunOutcome。セッションは複数実行を含めても実行試行にはなりません。
    - zh: Sandbox、隔离规范、挂载权限、进程限制和逃逸风险；它们约束环境，却不等同于实际 RuntimeEnvironment。
      en: Sandbox, isolation specifications, mount permissions, process restrictions, and escape risk; they constrain an environment but are not the actual RuntimeEnvironment.
      ja: Sandbox・分離仕様・マウント権限・プロセス制限・escape risk。これらは環境を制約しますが実 RuntimeEnvironment そのものではありません。
    - zh: Trace、Checkpoint、日志与诊断结论；它们可以关联会话，但分别属于运行可观测性或反馈域。
      en: Traces, checkpoints, logs, and diagnostic conclusions; they may reference a session but belong to runtime observability or feedback.
      ja: Trace・Checkpoint・ログ・診断結論。セッションを参照できますが、実行可観測性またはフィードバックに属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为每次运行提供稳定的系统、环境和会话坐标，使环境归属与会话状态都能由明确关系和事件复核。
  en: Provides stable system, environment, and session coordinates for each run so environment placement and session state can be verified from explicit relations and events.
  ja: 各実行に安定したシステム・環境・セッション座標を与え、環境所属とセッション状態を明示的な関係とイベントから検証できるようにします。
structure: null
examples:
  - id: runtime-system-cq-session-state-v3-example-positive
    kind: positive
    labels:
      zh: 某个 RuntimeSession 当前处于已创建、活动、暂停、中断或哪种终态，哪组有序生命周期事件支持判断？：正例
      en: "Is a RuntimeSession created, active, paused, interrupted, or in a specific terminal state, and which ordered lifecycle events support that judgment?: positive case"
      ja: RuntimeSession は created・active・paused・interrupted・特定 terminal state のどれで、どの順序付き lifecycle event が判断を支えますか。：正例
    scenario_id: null
    descriptions:
      zh: session-310 依次发生 start-310@09:00、pause-310@09:05 与 resume-310@09:07，三项事件均通过 changes_state_of 指向该会话；attempt-310-a 在首个活动区间的 09:01 启动并明确归属该会话，在 09:08 评估时最后一项有效事件是恢复事件。
      en: session-310 has start-310@09:00, pause-310@09:05, and resume-310@09:07 in order, each linked to the session through changes_state_of; attempt-310-a starts at 09:01 in the first active interval with explicit session membership, and at 09:08 the latest effective event is the resume event.
      ja: session-310 では start-310@09:00、pause-310@09:05、resume-310@09:07 が順に発生し、すべて changes_state_of で session に接続されます。attempt-310-a は最初の active interval の 09:01 に開始して session 所属が明示され、09:08 の評価では最新有効 event は resume event です。
    field_values:
      session_id: session-310
      stored_lifecycle_state: active
      event_sequence:
        - start-310@2026-07-16T09:00:00Z
        - pause-310@2026-07-16T09:05:00Z
        - resume-310@2026-07-16T09:07:00Z
      evaluated_at: 2026-07-16T09:08:00Z
      run_attempt_id: attempt-310-a
      run_attempt_started_at: 2026-07-16T09:01:00Z
    related_node_ids:
      - RuntimeSession
      - SessionLifecycleEvent
      - SessionStartEvent
      - SessionPauseEvent
      - SessionResumeEvent
      - RunAttempt
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
      - RuntimeSession-has_attempt-RunAttempt
    expected_result:
      zh: 返回 lifecycle_state=active，并以 resume-310 为直接支持事件，同时保留此前 start 与 pause 事件作为状态推导链。
      en: Return lifecycle_state=active with resume-310 as the immediate supporting event, while retaining the preceding start and pause events as the derivation chain.
      ja: lifecycle_state=active を返し、resume-310 を直接支持 event、先行 start/pause event を導出 chain として保持します。
    why_valid_or_invalid:
      zh: 事件时间单调递增，start→pause→resume 是有效转换，尝试开始时刻落在活动区间，存储状态与最后一项有效事件一致。
      en: Event times are monotonic, start-to-pause-to-resume is a valid transition sequence, the attempt starts within an active interval, and the stored state agrees with the latest effective event.
      ja: event 時刻は単調増加し start→pause→resume は有効遷移で、attempt 開始時刻は active interval 内にあり、保存 state は最新有効 event と一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-003
      - claim-runtime-system-004
  - id: runtime-system-cq-session-state-v3-example-counter
    kind: counterexample
    labels:
      zh: 某个 RuntimeSession 当前处于已创建、活动、暂停、中断或哪种终态，哪组有序生命周期事件支持判断？：反例
      en: "Is a RuntimeSession created, active, paused, interrupted, or in a specific terminal state, and which ordered lifecycle events support that judgment?: counterexample"
      ja: RuntimeSession は created・active・paused・interrupted・特定 terminal state のどれで、どの順序付き lifecycle event が判断を支えますか。：反例
    scenario_id: null
    descriptions:
      zh: session-311 的当前字段仍写 active，但其事件序列在 start-311@09:00 之后已有 end-311@09:10，结束原因是 completed；09:12 的查询不得继续信任陈旧状态字段。
      en: session-311 still stores active, but its event sequence contains end-311@09:10 after start-311@09:00 with terminal reason completed; a 09:12 query must not trust the stale scalar state.
      ja: session-311 の保存値は active のままですが、start-311@09:00 後に terminal reason=completed の end-311@09:10 が存在します。09:12 の query は stale scalar state を信用できません。
    field_values:
      session_id: session-311
      stored_lifecycle_state: active
      event_sequence:
        - start-311@2026-07-16T09:00:00Z
        - end-311@2026-07-16T09:10:00Z:completed
      evaluated_at: 2026-07-16T09:12:00Z
    related_node_ids:
      - RuntimeSession
      - SessionLifecycleEvent
      - SessionStartEvent
      - SessionEndEvent
    related_relation_ids:
      - SessionLifecycleEvent-changes_state_of-RuntimeSession
    expected_result:
      zh: 将会话判定为 completed，并报告 stored_lifecycle_state 与事件推导结果不一致；不得返回 active。
      en: Classify the session as completed and report the mismatch between stored_lifecycle_state and the event-derived result; do not return active.
      ja: session を completed と判定し stored_lifecycle_state と event-derived result の不一致を報告し、active を返しません。
    why_valid_or_invalid:
      zh: SessionEndEvent 是晚于启动事件的有效终态发生事实；当前状态必须由事件序列复核，不能由未同步的字符串单独决定。
      en: SessionEndEvent is a valid terminal occurrence after the start event; current state must be checked against the event sequence rather than decided by an unsynchronized string alone.
      ja: SessionEndEvent は start 後の有効 terminal occurrence であり、current state は未同期文字列だけでなく event sequence で検証する必要があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-003
      - claim-runtime-system-004
  - id: runtime-system-cq-environment-binding-v3-example-positive
    kind: positive
    labels:
      zh: 一个 AgentSystem 在哪个实际环境和工作目录运行，环境是否引用了获准的隔离规范？：正例
      en: "In which actual environment and working directory does an AgentSystem run, and does that environment reference an approved isolation specification?: positive case"
      ja: AgentSystem はどの実環境と作業ディレクトリで動き、その環境は承認済み分離仕様を参照していますか。：正例
    scenario_id: null
    descriptions:
      zh: agent-system-01 通过 hosts 连接 session-410，session-410 通过 runs_in 指向 container-410，后者包含 /workspace/moonweave。sandbox-410 的 runtime_environment_ref 精确指向 container-410，并通过 constrained_by 连接已批准的 isolation-spec-410@3。
      en: agent-system-01 hosts session-410, session-410 runs_in container-410, and that environment contains /workspace/moonweave. sandbox-410 has runtime_environment_ref=container-410 and is constrained_by the approved isolation-spec-410@3.
      ja: agent-system-01 は session-410 を hosts し、session-410 は container-410 で runs_in し、その環境は /workspace/moonweave を含みます。sandbox-410 の runtime_environment_ref は container-410 を正確に指し、approved isolation-spec-410@3 に constrained_by されます。
    field_values:
      system_id: agent-system-01
      session_id: session-410
      runtime_environment_id: container-410
      working_directory: /workspace/moonweave
      sandbox_id: sandbox-410
      sandbox_runtime_environment_ref: container-410
      isolation_spec_id: isolation-spec-410@3
      approval_status: approved
    related_node_ids:
      - AgentSystem
      - RuntimeSession
      - RuntimeEnvironment
      - Container
      - WorkingDirectory
      - Sandbox
      - IsolationSpecification
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
      - RuntimeSession-runs_in-RuntimeEnvironment
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 返回 container-410、/workspace/moonweave、sandbox-410 与 isolation-spec-410@3，并明确前两者属于运行系统、后两者属于执行隔离。
      en: Return container-410, /workspace/moonweave, sandbox-410, and isolation-spec-410@3, explicitly keeping the first two in runtime-system and the latter two in execution isolation.
      ja: container-410、/workspace/moonweave、sandbox-410、isolation-spec-410@3 を返し、前二者を runtime-system、後二者を execution isolation に明確に分けます。
    why_valid_or_invalid:
      zh: 系统—会话—环境—工作目录由图关系回答；沙箱到实际环境使用其已声明的引用字段核对，隔离规范则由 constrained_by 关系与批准状态共同确认。
      en: Graph relations answer system-to-session-to-environment-to-working-directory; the sandbox's declared environment reference performs the cross-owner match, and constrained_by plus approval status confirms the isolation specification.
      ja: system→session→environment→working-directory は graph 関係で答え、sandbox の宣言済み environment reference で owner 間照合し、constrained_by と approval status で isolation specification を確認します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-005
      - claim-runtime-system-006
  - id: runtime-system-cq-environment-binding-v3-example-counter
    kind: counterexample
    labels:
      zh: 一个 AgentSystem 在哪个实际环境和工作目录运行，环境是否引用了获准的隔离规范？：反例
      en: "In which actual environment and working directory does an AgentSystem run, and does that environment reference an approved isolation specification?: counterexample"
      ja: AgentSystem はどの実環境と作業ディレクトリで動き、その環境は承認済み分離仕様を参照していますか。：反例
    scenario_id: null
    descriptions:
      zh: session-411 实际运行在 container-411，但名为 sandbox-411 的记录指向 container-099，且它加载的 isolation-spec-legacy@1 状态为 revoked；名称相近不能把该沙箱归到当前环境。
      en: session-411 actually runs in container-411, but the record named sandbox-411 references container-099 and loads isolation-spec-legacy@1 with status revoked; similar names do not associate that sandbox with the current environment.
      ja: session-411 は container-411 で実行されますが sandbox-411 の record は container-099 を参照し、isolation-spec-legacy@1 は revoked です。類似名称だけで当該 sandbox を現在環境に関連付けられません。
    field_values:
      system_id: agent-system-01
      session_id: session-411
      runtime_environment_id: container-411
      working_directory: /workspace/release
      candidate_sandbox_id: sandbox-411
      sandbox_runtime_environment_ref: container-099
      isolation_spec_id: isolation-spec-legacy@1
      approval_status: revoked
    related_node_ids:
      - AgentSystem
      - RuntimeSession
      - RuntimeEnvironment
      - Container
      - WorkingDirectory
      - Sandbox
      - IsolationSpecification
    related_relation_ids:
      - AgentSystem-hosts-RuntimeSession
      - RuntimeSession-runs_in-RuntimeEnvironment
      - RuntimeEnvironment-has_working_directory-WorkingDirectory
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 返回 container-411 与 /workspace/release，但把合格沙箱与隔离规范结果标为未找到；不得返回 sandbox-411 或已撤销规范。
      en: Return container-411 and /workspace/release, but report no qualifying sandbox or isolation specification; do not return sandbox-411 or the revoked specification.
      ja: container-411 と /workspace/release は返しますが qualifying sandbox/isolation specification は未検出とし、sandbox-411 や revoked specification を返しません。
    why_valid_or_invalid:
      zh: 沙箱的环境引用与真实运行环境不一致，且规范已撤销；两项独立失败均足以拒绝隔离合规结论。
      en: The sandbox's environment reference disagrees with the actual runtime environment and its specification is revoked; either independent failure is sufficient to reject the isolation-compliance conclusion.
      ja: sandbox の environment reference は実 runtime environment と不一致で specification も revoked であり、どちらか一方だけでも isolation-compliance 結論を拒否します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-005
      - claim-runtime-system-006
  - id: runtime-system-cq-session-attempt-membership-v3-example-positive
    kind: positive
    labels:
      zh: 某次执行尝试属于哪个会话，会话暂停或结束后是否仍错误地产生新尝试？：正例
      en: "To which session does an execution attempt belong, and were new attempts incorrectly created after pause or end?: positive case"
      ja: ある実行試行はどのセッションに属し、セッション一時停止または終了後に新試行が誤生成されていませんか。：正例
    scenario_id: null
    descriptions:
      zh: session-510 在 09:00 由 start-510 激活，attempt-510-02 于 09:04 开始，并由 RuntimeSession-has_attempt-RunAttempt 从会话指向该尝试；09:04 位于会话的活动区间内。
      en: start-510 activates session-510 at 09:00; attempt-510-02 starts at 09:04 and RuntimeSession-has_attempt-RunAttempt links the session to that attempt; 09:04 lies inside the session's active interval.
      ja: start-510 は session-510 を 09:00 に active 化し、attempt-510-02 は 09:04 に開始します。RuntimeSession-has_attempt-RunAttempt が session から attempt を結び、09:04 は active interval 内です。
    field_values:
      session_id: session-510
      attempt_id: attempt-510-02
      session_active_from: 2026-07-16T09:00:00Z
      session_active_to: 2026-07-16T09:10:00Z
      attempt_started_at: 2026-07-16T09:04:00Z
      membership_evidence_id: session-attempt-edge-510-02
    related_node_ids:
      - RuntimeSession
      - RunAttempt
    related_relation_ids:
      - RuntimeSession-has_attempt-RunAttempt
    expected_result:
      zh: 返回 attempt-510-02 属于 session-510，时间有效性为 valid；该结论同时要求成员边与活动区间成立。
      en: Return attempt-510-02 as a member of session-510 with temporal validity=valid; both the membership edge and active interval are required for that conclusion.
      ja: attempt-510-02 を session-510 の member、temporal validity=valid として返し、membership edge と active interval の両方を必須とします。
    why_valid_or_invalid:
      zh: 尝试有唯一会话成员事实，且其开始时间不早于 start、不晚于 end，也没有落在暂停区间。
      en: The attempt has one session-membership fact, and its start time is neither before start nor after end and does not fall inside a paused interval.
      ja: attempt は一つの session-membership fact を持ち、開始時刻は start 前でも end 後でもなく paused interval にも入りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-007
      - claim-runtime-system-008
  - id: runtime-system-cq-session-attempt-membership-v3-example-counter
    kind: counterexample
    labels:
      zh: 某次执行尝试属于哪个会话，会话暂停或结束后是否仍错误地产生新尝试？：反例
      en: "To which session does an execution attempt belong, and were new attempts incorrectly created after pause or end?: counterexample"
      ja: ある実行試行はどのセッションに属し、セッション一時停止または終了後に新試行が誤生成されていませんか。：反例
    scenario_id: null
    descriptions:
      zh: session-511 已由 end-511 在 09:10 结束，但仍存在指向 attempt-511-03 的成员边，而该尝试 started_at=09:12；成员边不能使终态后的开始时间合法化。
      en: end-511 terminates session-511 at 09:10, yet a membership edge points to attempt-511-03 whose started_at is 09:12; the membership edge cannot legalize a start after the terminal event.
      ja: end-511 は session-511 を 09:10 に終了しますが、membership edge が started_at=09:12 の attempt-511-03 を指します。membership edge は terminal event 後の開始を合法化しません。
    field_values:
      session_id: session-511
      attempt_id: attempt-511-03
      session_end_event_id: end-511
      session_ended_at: 2026-07-16T09:10:00Z
      attempt_started_at: 2026-07-16T09:12:00Z
      membership_evidence_id: session-attempt-edge-511-03
    related_node_ids:
      - RuntimeSession
      - RunAttempt
    related_relation_ids:
      - RuntimeSession-has_attempt-RunAttempt
    expected_result:
      zh: 保留 attempt-511-03 的会话成员事实用于审计，但将其时间有效性标为 invalid_after_session_end，并产生一致性缺陷。
      en: Retain the session-membership fact for audit, but mark attempt-511-03 as invalid_after_session_end and emit a consistency defect.
      ja: audit のため session-membership fact は保持しますが attempt-511-03 を invalid_after_session_end とし consistency defect を生成します。
    why_valid_or_invalid:
      zh: 成员关系回答“属于哪个会话”，生命周期事件回答“何时可开始”；两者都成立才是有效执行尝试。
      en: Membership answers which session owns the attempt, while lifecycle events answer when it may start; a valid attempt requires both conditions.
      ja: membership は attempt が属する session を、lifecycle event は開始可能時刻を答え、有効 attempt には両条件が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-system-007
      - claim-runtime-system-008
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 运行环境与会话的输入概念族为会话开始事件、会话恢复事件、检查点；责任交接由已接受事实 会话开始事件 —opens_runtime_session→ 运行会话 (opens_runtime_session)；会话恢复事件 —resumes_from_checkpoint→ 检查点 (resumes_from_checkpoint) 明确给出。 共享关系在本面的职责：在输入面，该事实以 SessionStartEvent 端点表达开启请求；尚未把 RuntimeSession 当作已经存在的输入。在输入面，该事实以 SessionResumeEvent 与 Checkpoint 两个端点固定恢复请求及其不可替换的来源快照。
          en: "The input families for Runtime environments and sessions are session start event, session resume event, checkpoint; the accepted facts session start event —opens_runtime_session→ runtime session (opens_runtime_session); session resume event —resumes_from_checkpoint→ checkpoint (resumes_from_checkpoint) make the responsibility handoff explicit. Facet-specific role of shared facts: On the input facet, this fact uses the SessionStartEvent endpoint to express the opening request; RuntimeSession is not treated as a pre-existing input. On the input facet, this fact uses the SessionResumeEvent and Checkpoint endpoints to fix the recovery request and its non-substitutable source snapshot."
          ja: 実行環境とセッションの入力概念族はセッション開始イベント、セッション再開イベント、チェックポイントです。責任の受け渡しは承認済み事実 セッション開始イベント —opens_runtime_session→ 実行セッション (opens_runtime_session)；セッション再開イベント —resumes_from_checkpoint→ チェックポイント (resumes_from_checkpoint) により明示されます。 共有関係のこの面での役割：入力面では、この事実の SessionStartEvent 端点が開始要求を表し、RuntimeSession を既存入力とは扱いません。入力面では、この事実の SessionResumeEvent と Checkpoint 端点が回復要求と置換不能な出典スナップショットを固定します。
        family_concept_ids:
          - SessionStartEvent
          - SessionResumeEvent
          - Checkpoint
        relation_ids:
          - opens_runtime_session
          - resumes_from_checkpoint
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 运行环境与会话输出持续存在的 RuntimeSession，并通过 session_has_trace 把会话交给观测域的 TraceRecord；具体跨度和事件继续沿 TraceRecord → TraceSpan → TraceEvent 层级表达。
          en: Runtime environments and sessions output the enduring RuntimeSession and hand it to observability through session_has_trace to TraceRecord; spans and events remain expressed through the TraceRecord -> TraceSpan -> TraceEvent hierarchy.
          ja: 実行環境とセッションは持続するRuntimeSessionを出力し、session_has_traceでobservabilityのTraceRecordへ渡します。spanとeventはTraceRecord→TraceSpan→TraceEvent階層で表現します。
        family_concept_ids:
          - RuntimeSession
          - TraceRecord
        relation_ids:
          - opens_runtime_session
          - session_has_trace
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。执行、追踪、工具或安全范围需要说明活动发生在哪个系统、环境和会话中时，引用这里的运行容器。
          en: This ontology does not own runtime-failure adjudication. Execution, tracing, tools, or safety scopes reference runtime containers here when identifying the system, environment, and session in which activity occurred.
          ja: このオントロジーは実行失敗の判定を所有しません。実行、トレース、ツール、安全範囲が活動の system、environment、session を示すとき、ここで定義した実行コンテナを参照します。
      recovery:
        applicable: true
        description:
          zh: 运行环境与会话的恢复概念族为会话恢复事件、运行会话、检查点；责任交接由已接受事实 会话生命周期事件 —changes_state_of→ 运行会话 (SessionLifecycleEvent-changes_state_of-RuntimeSession)；会话恢复事件 —resumes_from_checkpoint→ 检查点 (resumes_from_checkpoint) 明确给出。 共享关系在本面的职责：在恢复面，同一事实证明恢复动作确实从指定 Checkpoint 续接；会话状态变化另由生命周期关系表达，二者不相互替代。
          en: "The recovery families for Runtime environments and sessions are session resume event, runtime session, checkpoint; the accepted facts session lifecycle event —changes_state_of→ runtime session (SessionLifecycleEvent-changes_state_of-RuntimeSession); session resume event —resumes_from_checkpoint→ checkpoint (resumes_from_checkpoint) make the responsibility handoff explicit. Facet-specific role of shared facts: On the recovery facet, the same fact proves that resumption continues from the specified Checkpoint; the lifecycle relation separately expresses the session-state change, and neither substitutes for the other."
          ja: 実行環境とセッションの回復概念族はセッション再開イベント、実行セッション、チェックポイントです。責任の受け渡しは承認済み事実 セッションライフサイクルイベント —changes_state_of→ 実行セッション (SessionLifecycleEvent-changes_state_of-RuntimeSession)；セッション再開イベント —resumes_from_checkpoint→ チェックポイント (resumes_from_checkpoint) により明示されます。 共有関係のこの面での役割：回復面では、同じ事実が指定 Checkpoint から再開したことを証明します。セッション状態変化は別のライフサイクル関係で表し、両者は代替しません。
        family_concept_ids:
          - SessionResumeEvent
          - RuntimeSession
          - Checkpoint
        relation_ids:
          - SessionLifecycleEvent-changes_state_of-RuntimeSession
          - resumes_from_checkpoint
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认输入面只接收开启或恢复会话所需的 SessionStartEvent、SessionResumeEvent 与 Checkpoint；输出面给出持续存在的 RuntimeSession 并把追踪引用交给观测域；恢复面分别记录状态改变与恢复来源。本模块不判定执行失败，也不把尚未创建的 RuntimeSession 当作输入。
            en: Domain review confirms the input facet accepts only SessionStartEvent, SessionResumeEvent, and Checkpoint needed to open or resume a session. The output facet provides the enduring RuntimeSession and hands trace references to observability; recovery records state change separately from recovery source. This module does not adjudicate execution failure or treat a not-yet-created RuntimeSession as input.
            ja: domain review は input facet が session 開始・再開に必要な SessionStartEvent・SessionResumeEvent・Checkpoint だけを受け、output facet が継続する RuntimeSession と observability への trace reference を出すと確認します。recovery は state change と recovery source を分離して記録し、本 module は execution failure を判定せず未作成 RuntimeSession を input ともしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 结构复核确认 opens_runtime_session 从 SessionStartEvent 指向新会话，resumes_from_checkpoint 从 SessionResumeEvent 指向不可替换的 Checkpoint，SessionLifecycleEvent-changes_state_of-RuntimeSession 只表达状态迁移。三条事实端点、时间身份与职责不同，不能合并或反向；session_has_trace 仅承担到观测域的输出交接。
            en: Structural review confirms opens_runtime_session points from SessionStartEvent to the new session, resumes_from_checkpoint points from SessionResumeEvent to the non-substitutable Checkpoint, and SessionLifecycleEvent-changes_state_of-RuntimeSession expresses only state transition. Their endpoints, temporal identities, and responsibilities differ and cannot be merged or reversed; session_has_trace serves only as the output handoff to observability.
            ja: 構造審査は opens_runtime_session が SessionStartEvent から新 session、resumes_from_checkpoint が SessionResumeEvent から置換不能 Checkpoint、SessionLifecycleEvent-changes_state_of-RuntimeSession が state transition だけを指すと確認します。端点・時間 identity・責務が異なるため統合や反転はできず、session_has_trace は observability への output handoff だけを担います。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - AgentSystem
    allowed_backbone_predicates:
      - changes_state_of
      - has_working_directory
      - hosts
      - is_a
      - valid_in
    flat_root_exception_concept_ids:
      - RuntimeEnvironment
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认 AgentSystem 与 RuntimeSession 描述系统及其会话发生，RuntimeEnvironment 描述实际执行地点，二者由 RuntimeSession-runs_in-RuntimeEnvironment 关联但身份独立。RunAttempt、RunResult 与 RunOutcome 仍由执行尝试模块拥有；本模块只回答会话属于哪个系统、处于何种生命周期状态并实际运行在哪里。
            en: Domain review confirms that AgentSystem and RuntimeSession describe a system and its session occurrence, while RuntimeEnvironment identifies the actual execution place; RuntimeSession-runs_in-RuntimeEnvironment relates them without merging their identities. RunAttempt, RunResult, and RunOutcome remain owned by execution attempts; this module answers which system owns a session, its lifecycle state, and where it actually runs.
            ja: domain review は AgentSystem と RuntimeSession が system と session occurrence、RuntimeEnvironment が実際の execution place を表すと確認します。RuntimeSession-runs_in-RuntimeEnvironment は両者を関連付けますが identity を統合しません。RunAttempt・RunResult・RunOutcome は execution-attempt module が所有し、本 module は session の system 所属・lifecycle state・実行場所だけに答えます。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 结构复核保留 AgentSystem 为系统根并通过 hosts 组织 RuntimeSession；SessionLifecycleEvent 通过 changes_state_of 挂接到被改变的会话，再由真实 is_a 展开开始、暂停、恢复与结束事件。RuntimeEnvironment 是独立 composition-root，通过 is_a 展开 Container，并构成 WorkingDirectory 与 ProcessHandle；runs_in 仅为会话到环境的 cross-link，不作为父边。
            en: Structural review retains AgentSystem as the system root and organizes RuntimeSession through hosts. SessionLifecycleEvent attaches to the changed session through changes_state_of and expands start, pause, resume, and end events through genuine is_a. RuntimeEnvironment is an independent composition-root that expands Container through is_a and composes WorkingDirectory and ProcessHandle; runs_in is only a session-to-environment cross-link, not a parent edge.
            ja: 構造審査は AgentSystem を system root とし hosts で RuntimeSession を編成します。SessionLifecycleEvent は changes_state_of で変更対象 session に接続し、真正な is_a で start・pause・resume・end event を展開します。RuntimeEnvironment は独立 composition-root とし、is_a で Container、構成関係で WorkingDirectory・ProcessHandle を編成します。runs_in は session→environment の cross-link だけで親辺ではありません。
  competency_questions:
    - id: runtime-system-cq-session-state-v3
      semantic_key: runtime-system.session-state
      primary_owner_module_id: runtime-system
      related_module_ids:
        - runtime-execution-attempts
      questions:
        zh: 某个 RuntimeSession 当前处于已创建、活动、暂停、中断或哪种终态，哪组有序生命周期事件支持判断，其 RunAttempt 归属是否与该时段一致？
        en: Is a RuntimeSession created, active, paused, interrupted, or in a specific terminal state, which ordered lifecycle events support that judgment, and are its RunAttempt memberships consistent with those intervals?
        ja: RuntimeSession は created・active・paused・interrupted・特定 terminal state のどれで、どの順序付き lifecycle event が判断を支え、RunAttempt 所属はその期間と整合しますか。
      query: Load SessionLifecycleEvent instances linked through changes_state_of, order them by occurrence time, validate each transition, derive the latest effective state, compare that result with RuntimeSession.lifecycle_state, and reject any RuntimeSession-has_attempt-RunAttempt membership whose attempt starts outside an effective active interval.
      expected_assertion: Exactly one current lifecycle state is supported by a valid ordered event sequence; any disagreement with the stored scalar is reported, a lifecycle-state value is never mistaken for an event occurrence, and attempt membership corroborates but never replaces lifecycle evidence.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - RuntimeSession
          - SessionLifecycleEvent
          - SessionStartEvent
          - SessionPauseEvent
          - SessionResumeEvent
          - SessionEndEvent
        related_concept_ids:
          - RunAttempt
        relation_ids:
          - SessionLifecycleEvent-changes_state_of-RuntimeSession
          - RuntimeSession-has_attempt-RunAttempt
        not_applicable_reason: null
      positive_example_ids:
        - runtime-system-cq-session-state-v3-example-positive
      counterexample_ids:
        - runtime-system-cq-session-state-v3-example-counter
      source_claims:
        - claim-runtime-system-003
        - claim-runtime-system-004
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
    - id: runtime-system-cq-environment-binding-v3
      semantic_key: runtime-system.environment-binding
      primary_owner_module_id: runtime-system
      related_module_ids:
        - safety-sandbox-network
      questions:
        zh: 一个 AgentSystem 在哪个实际环境和工作目录运行，环境是否引用了获准的隔离规范？
        en: In which actual environment and working directory does an AgentSystem run, and does that environment reference an approved isolation specification?
        ja: AgentSystem はどの実環境と作業ディレクトリで動き、その環境は承認済み分離仕様を参照していますか。
      query: Follow AgentSystem-hosts-RuntimeSession, RuntimeSession-runs_in-RuntimeEnvironment, and RuntimeEnvironment-has_working_directory-WorkingDirectory; then match Sandbox.runtime_environment_ref to that environment and follow Sandbox-constrained_by-IsolationSpecification together with the specification's approval status.
      expected_assertion: The answer identifies the actual RuntimeEnvironment and WorkingDirectory, then reports only a Sandbox whose declared environment reference matches and whose IsolationSpecification is approved, without merging the runtime and safety identities.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - Container
          - RuntimeEnvironment
        related_concept_ids:
          - Sandbox
          - IsolationSpecification
        relation_ids: []
        not_applicable_reason:
          zh: 会话到环境、环境到工作目录以及沙箱到隔离规范各自由已接受关系回答；跨 owner 的环境—沙箱对齐由 Sandbox.runtime_environment_ref 节点字段核验，当前没有把该字段重复提升为图边。
          en: Accepted relations answer session-to-environment, environment-to-working-directory, and sandbox-to-isolation-specification separately; the cross-owner environment-to-sandbox match is verified through the Sandbox.runtime_environment_ref node field, which is not duplicated as a graph edge.
          ja: session→environment、environment→working-directory、sandbox→isolation-specification は各 accepted relation で答え、owner 間の environment→sandbox 照合は Sandbox.runtime_environment_ref node field で検証し、graph edge として重複させません。
      positive_example_ids:
        - runtime-system-cq-environment-binding-v3-example-positive
      counterexample_ids:
        - runtime-system-cq-environment-binding-v3-example-counter
      source_claims:
        - claim-runtime-system-005
        - claim-runtime-system-006
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
    - id: runtime-system-cq-session-attempt-membership-v3
      semantic_key: runtime-system.session-attempt-membership
      primary_owner_module_id: runtime-system
      related_module_ids:
        - runtime-execution-attempts
      questions:
        zh: 某次执行尝试属于哪个会话，会话暂停或结束后是否仍错误地产生新尝试？
        en: To which session does an execution attempt belong, and were new attempts incorrectly created after pause or end?
        ja: ある実行試行はどのセッションに属し、セッション一時停止または終了後に新試行が誤生成されていませんか。
      query: Follow RuntimeSession-has_attempt-RunAttempt to establish membership, derive active intervals from the session's ordered lifecycle events, and compare each attempt's started_at with those intervals.
      expected_assertion: "Membership and temporal validity are reported separately: an attempt may retain its audit membership edge yet be invalid if it starts after a terminal event or during a pause without a preceding resume."
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - RuntimeSession
        related_concept_ids:
          - RunAttempt
        relation_ids:
          - RuntimeSession-has_attempt-RunAttempt
        not_applicable_reason: null
      positive_example_ids:
        - runtime-system-cq-session-attempt-membership-v3-example-positive
      counterexample_ids:
        - runtime-system-cq-session-attempt-membership-v3-example-counter
      source_claims:
        - claim-runtime-system-007
        - claim-runtime-system-008
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 运行环境与会话与执行尝试与结果按唯一 owner 和可判定问题分界。
              en: Runtime environments and sessions and Execution attempts and outcomes are separated by unique ownership and answerable questions.
              ja: 実行環境とセッションと実行試行と結果は一意の所有者と判定可能な問いで分離されます。
  key_notion:
    zh: 运行会话
    en: runtime session
    ja: 実行セッション
  owns_when:
    zh: 若删除系统标识、实际环境标识或会话连续性后，该对象便无法保持同一身份，则由本模块定义；会话状态必须由属于该会话的有序生命周期事件支持。
    en: This module defines an object when removing the system identity, actual environment identity, or session continuity would destroy its identity; session state must be supported by ordered lifecycle events belonging to that session.
    ja: システム識別子・実環境識別子・セッション連続性のいずれかを除くと同一性を保てない対象を本モジュールで定義し、セッション状態は当該セッションに属する順序付きライフサイクルイベントで裏付けます。
  references_when:
    zh: 执行、追踪、工具和安全模块只在需要定位发生场所或会话归属时引用这里的系统、环境与会话；它们各自仍拥有执行、证据、调用或约束事实。
    en: Execution, tracing, tool, and safety modules reference the system, environment, and session here only to locate an occurrence or establish session membership; they retain ownership of execution, evidence, invocation, or constraint facts.
    ja: 実行・トレース・ツール・安全モジュールは発生場所またはセッション所属を示す場合だけ本モジュールの system・environment・session を参照し、実行・証拠・呼出・制約の事実は各モジュールが保持します。
  boundary_decisions:
    - other_module_id: runtime-execution-attempts
      subject_concept_ids:
        - RunAttempt
      decision: references
      owner_module_id: runtime-execution-attempts
      rationale:
        zh: 运行环境与会话拥有系统容器、环境身份和会话生命周期；执行尝试与结果拥有容器中发生的 Execution、Attempt、Result 与 Outcome。 本条仅记录 RunAttempt；其 canonical owner 是执行尝试与结果（runtime-execution-attempts），因此 runtime-system 在此引用这些概念。
        en: Runtime environments and sessions own system containers, environment identity, and session lifecycle; execution attempts and outcomes own Execution, Attempt, Result, and Outcome occurrences within those containers. This record is limited to RunAttempt; their canonical owner is Execution attempts and outcomes (runtime-execution-attempts), so runtime-system references these concepts here.
        ja: 実行環境とセッションはシステムコンテナ、環境同一性、セッションライフサイクルを所有し、実行試行と結果はその中で発生する Execution、Attempt、Result、Outcome を所有します。 この記録は RunAttempt だけを対象とし、canonical owner は実行試行と結果（runtime-execution-attempts）です。したがって runtime-system はここでこれらを参照します。
      relation_ids:
        - ProcessHandle-correlates-RunAttempt
        - RunAttempt-occurs_in-RuntimeEnvironment
        - RuntimeSession-has_attempt-RunAttempt
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-system-009
        - claim-runtime-system-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
