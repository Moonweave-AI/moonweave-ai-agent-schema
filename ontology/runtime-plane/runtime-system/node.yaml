      owner_module_id: safety-network-control
      rationale:
        zh: NetworkCall 与 NetworkInteraction 由实际网络请求、对端和策略裁决界定，归网络控制；它们发生于环境中但不是 RuntimeEnvironment。
        en: NetworkCall and NetworkInteraction are identified by actual network request, peer, and policy decision and belong to network control; they occur in an environment but are not RuntimeEnvironment.
        ja: NetworkCall と NetworkInteraction は actual network request・peer・policy decision で識別され network control に属します。environment 内で発生しても RuntimeEnvironment ではありません。
      relation_ids: []
      relation_not_applicable_reason:
        zh: 该边界只比较网络交互与运行环境的身份，当前没有已接受的额外 runtime handoff 事实。
        en: This boundary compares network-interaction and runtime-environment identity only; no accepted additional runtime handoff fact currently exists.
        ja: この境界は network interaction と runtime environment の同一性だけを比較し、承認済み additional runtime handoff fact は現在ありません。
      source_claims:
        - claim-runtime-system-027
      review:
        review_status: accepted
        reviewers:
