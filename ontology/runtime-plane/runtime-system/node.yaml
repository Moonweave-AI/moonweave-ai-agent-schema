source_claims:
  - id: claim-runtime-system-001
    source: eng-fw-langgraph-docs
    supports: LangGraph documents durable execution, thread-scoped checkpoint persistence, human-in-the-loop interruption, memory, and subgraphs as separate runtime capabilities. This supports modeling persistent execution context and resumable sessions inside a runtime system. LangGraph does not define Moonweave's AgentSystem aggregate, module membership, or ownership boundary; grouping system identity, actual environments, sessions, and lifecycle events is a Moonweave design inference.
    locator: Overview > Core benefits; Persistence > Checkpointer vs. store
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-system-002
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK separately documents agent definitions, Runner invocations, Sessions, tracing, and live sandbox sessions. These interfaces support distinguishing a configured agent, one run, persistent session context, and an execution environment. The SDK does not define Moonweave's AgentSystem aggregate or canonical ownership; the runtime-system boundary is a Moonweave ontology decision over those documented distinctions.
    locator: Agents > Agent configuration; Running agents > Runner lifecycle and configuration; Sessions > Overview; Sandbox agents > Concepts > Execution boundary
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-system-003
    source: eng-fw-langgraph-docs
    supports: LangGraph Persistence distinguishes thread-scoped checkpoints from cross-thread stores and states that persistence can continue a conversation or resume after an interruption; Interrupts resumes paused execution with Command(resume=...) under the same thread_id. This directly supports preserving one execution context across pause and resume. It does not define Moonweave's RuntimeSession state vocabulary or valid event order, which remain design inferences constrained by that documented behavior.
    locator: Persistence > Checkpointer vs. store; Interrupts > Pause using interrupt; Resume interrupts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-system-004
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK Sessions requires a paused run to resume with the same session instance or backing store so conversation history continues, and its core behavior retrieves history before each run and stores new items after it. This directly supports session continuity across pause and resume. It does not define Moonweave's RuntimeSession state vocabulary or event-ordering rules, which remain design inferences.
    locator: Sessions > Resuming interrupted runs with the same session; Core session behavior
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-system-005
    source: eng-std-posix-shell-2024
    supports: POSIX Shell Command Language defines a command's execution environment, variable assignments, and current-working-directory behavior. This supports treating environment values and working directory as properties of an actual execution context. POSIX does not define containers, isolation approval, or Moonweave ownership, so a RuntimeEnvironment reference to an approved isolation specification remains a Moonweave design inference.
    locator: Shell Command Language > Shell Execution Environment; Variables and Parameters; cd
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-system-006
    source: eng-fw-openai-python-docs
    supports: OpenAI Sandbox Concepts separates Manifest as the desired fresh-workspace contract, a sandbox session as the live isolated environment, and SandboxRunConfig as the mechanism that creates, injects, or reconnects that session. This directly supports separating actual RuntimeEnvironment identity from an isolation or workspace specification. Moonweave's runs_in relation and approval-state test are ontology design inferences.
    locator: Sandbox agents > Concepts > Execution boundary; Manifest; SandboxRunConfig
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
