          decision_note:
            zh: 棰嗗煙澶嶆牳纭杈撳叆闈㈠彧鎺ユ敹寮€鍚垨鎭㈠浼氳瘽鎵€闇€鐨?SessionStartEvent銆丼essionResumeEvent 涓?Checkpoint锛涜緭鍑洪潰缁欏嚭鎸佺画瀛樺湪鐨?RuntimeSession 骞舵妸杩借釜寮曠敤浜ょ粰瑙傛祴鍩燂紱鎭㈠闈㈠垎鍒褰曠姸鎬佹敼鍙樹笌鎭㈠鏉ユ簮銆傛湰妯″潡涓嶅垽瀹氭墽琛屽け璐ワ紝涔熶笉鎶婂皻鏈垱寤虹殑 RuntimeSession 褰撲綔杈撳叆銆?            en: Domain review confirms the input facet accepts only SessionStartEvent, SessionResumeEvent, and Checkpoint needed to open or resume a session. The output facet provides the enduring RuntimeSession and hands trace references to observability; recovery records state change separately from recovery source. This module does not adjudicate execution failure or treat a not-yet-created RuntimeSession as input.
