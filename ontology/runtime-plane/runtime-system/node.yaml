              en: Manual review confirms that a session may have multiple checkpoints and trace records while pause and resume remain individual lifecycle occurrences.
              ja: 手動審査は session が複数 checkpoint／trace record を持ち得る一方 pause／resume は個別 lifecycle occurrence と確認しました。
    - other_module_id: safety-network-control
      subject_concept_ids:
