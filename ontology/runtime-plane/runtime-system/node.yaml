schema: moonweave.ai/ontology-node/v1
id: runtime-system
kind: module
status: accepted
labels: {zh: 运行时系统, en: Runtime system, ja: ランタイムシステム}
semantics:
  short_definition: {zh: 智能体系统、其交互会话、生命周期事实和执行环境 Entity。, en: "The agent system, its interaction sessions, lifecycle facts, and execution environment Entities.", ja: エージェントシステム、その対話セッション、ライフサイクル事実、実行環境 Entity。}
  definition: {zh: Runtime system 建模承担智能体操作责任的已部署软件系统、限定交互状态的会话、报告会话转换的生命周期事件，以及该系统使用的环境 Entity。它将会话与特定执行 Activity 区分开，也将环境描述符与实时进程区分开。, en: "Runtime system models the deployed software system that bears responsibility for agent operation, a session that scopes interaction state, lifecycle events that report session transitions, and the environment Entities used by that system. It keeps a session distinct from a particular execution Activity and an environment descriptor distinct from a live process.", ja: Runtime system は、エージェント操作に責任を負うデプロイ済みソフトウェアシステム、対話状態をスコープするセッション、セッション遷移を報告するライフサイクルイベント、そのシステムが使用する環境 Entity をモデル化する。セッションを特定の実行 Activity と区別し、環境記述子をライブプロセスと区別する。}
  why_needed: {zh: 长时间运行的智能体需要持久会话上下文和可重现环境事实。没有这些边界，进程重启可能被误认为新的用户会话，或容器镜像可能与进程执行混淆。, en: "A long-running agent needs durable session context and reproducible environment facts. Without these boundaries, a process restart can be mistaken for a new user conversation or a container image can be confused with a process execution.", ja: 長時間稼働するエージェントには耐久的なセッションコンテキストと再現可能な環境事実が必要である。これらの境界がなければ、プロセス再起動を新規ユーザー会話と誤認したり、コンテナイメージをプロセス実行と混同したりする。}
  includes:
    - {zh: 智能体系统、运行时会话、会话开始、暂停、恢复和结束事件。, en: "Agent systems, runtime sessions, session start, pause, resume, and end events.", ja: エージェントシステム、ランタイムセッション、セッション開始、停止、再開、終了イベント。}
    - {zh: 运行时环境描述符、容器、进程句柄和工作目录 Entity。, en: "Runtime environment descriptors, containers, process handles, and working-directory Entities.", ja: ランタイム環境記述子、コンテナ、プロセスハンドル、作業ディレクトリ Entity。}
  excludes:
    - {zh: 模型调用或工具调用；它是 Execution 或 TraceSpan。, en: "A model invocation or tool call, which is an Execution or TraceSpan.", ja: モデル呼び出しまたはツール呼び出し。これは Execution または TraceSpan である。}
    - {zh: 持久用户记忆项或任务计划；它属于另一个领域。, en: "A persistent user memory item or a task plan, which belongs to another domain.", ja: 永続的なユーザーメモリ項目またはタスク計画。これは別の領域に属する。}
  semantic_kind: null
  aliases: [sessions, execution environment]
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input: {applicable: true, description: {zh: 系统配置、会话键、环境描述符和传入的用户或程序输入。, en: "System configuration, a session key, environment descriptor, and incoming user or program input.", ja: システム構成、セッションキー、環境記述子、受信ユーザーまたはプログラム入力。}, family_concept_ids: [AgentSystem, RuntimeSession, RuntimeEnvironment], relation_ids: []}
      output: {applicable: true, description: {zh: 由执行使用的会话范围状态转换、生命周期记录和环境引用。, en: "A session-scoped state transition, lifecycle record, and environment reference used by an execution.", ja: 実行により使用されるセッションスコープの状態遷移、ライフサイクル記録、環境参照。}, family_concept_ids: [RuntimeSession, SessionLifecycleEvent, RuntimeEnvironment], relation_ids: []}
      failure: {applicable: true, description: {zh: 丢失会话持久化或环境不可用会阻止安全继续，并且必须报告为生命周期或执行结果。, en: Lost session persistence or unavailable environment prevents safe continuation and must be reported as a lifecycle or execution outcome., ja: セッション永続化の喪失または環境の利用不可は安全な継続を妨げ、ライフサイクルまたは実行結果として報告しなければならない。}, family_concept_ids: [RuntimeSession, ProcessHandle], relation_ids: []}
      recovery: {applicable: true, description: {zh: 重新水合会话状态或开始一个新会话，同时保留先前生命周期证据和环境指纹。, en: "Rehydrate session state or start a new session, preserving the previous lifecycle evidence and environment fingerprint.", ja: セッション状態を再水和するか新しいセッションを開始し、以前のライフサイクル証拠と環境フィンガープリントを保持する。}, family_concept_ids: [RuntimeSession, RuntimeEnvironment], relation_ids: []}
  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids: [AgentSystem, RuntimeEnvironment]
    allowed_backbone_predicates: [is_a, part_of]
    flat_root_exception_concept_ids: [AgentSystem, RuntimeEnvironment]
    not_applicable_reason: null
  key_notion: Session scope, environment facts, and execution occurrence have independent identifiers.
  owns_when: {zh: 关注点是智能体系统在哪里运行或使用了哪个会话范围状态。, en: The concern is where an agent system ran or which conversation-scoped state it used., ja: 関心がエージェントシステムがどこで実行されたか、どの会話スコープ状態を使用したかである場合。}
  references_when: {zh: 关注点是具体尝试结果、追踪信号或持久工件。, en: "The concern is a specific attempt outcome, trace signal, or durable artifact.", ja: 関心が特定の試行結果、トレースシグナル、耐久的成果物である場合。}
  boundary_decisions: []
  overlap_checks: []
engineering:
  explanation: {zh: 运行时在智能体循环前解析会话 ID，并通过持久化提供者存储会话范围状态。环境记录捕获镜像摘要和工作目录 URI 等不可变配置；实时 PID 以有效期单独记录。, en: The runtime resolves a session ID before an agent loop and stores session-scoped state through a persistence provider. Environment records capture immutable configuration such as image digest and working-directory URI; a live PID is recorded separately with a validity interval., ja: ランタイムはエージェントループ前にセッション ID を解決し、永続化プロバイダーを通じてセッションスコープ状態を保存する。環境記録はイメージダイジェストや作業ディレクトリ URI などの不変構成を捕捉し、ライブ PID は有効期間とともに別に記録する。}
  typical_input:
    - description: {zh: 会话调用输入, en: Session invocation input, ja: セッション呼び出し入力}
      format: |-
        {"session_id":"sess-77","system_id":"agent-system-1","environment_id":"env-9","input":"review this patch"}
  typical_output:
    - description: {zh: 会话范围结果, en: Session-scoped result, ja: セッションスコープ結果}
      format: |-
        {"session_id":"sess-77","execution_id":"exec-842","lifecycle_event_id":"session-resume-4","environment_id":"env-9"}
  reference_implementations:
    - {name: OpenAI Agents SDK sessions, url: https://openai.github.io/openai-agents-python/sessions/, description: "Persistent session history and session backends for agent runs."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Thread-scoped state, checkpoints, and state history."}
structure:
  identity_keys: [system_id, session_id]
  fields:
    - id: system_id
      labels: {zh: 系统 ID, en: System ID, ja: システム ID}
      definitions: {zh: 承担智能体操作责任的已部署系统标识符。, en: Identifier of the deployed system responsible for agent operation., ja: エージェント操作に責任を持つデプロイ済みシステムの識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: agent-system-1
      source_claims: [claim-runtime-system-session]
    - id: session_id
      labels: {zh: 会话 ID, en: Session ID, ja: セッション ID}
      definitions: {zh: 该系统内持久交互上下文的稳定标识符。, en: Stable identifier for persistent interaction context within the system., ja: システム内の永続的な対話コンテキストの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: sess-77
      source_claims: [claim-runtime-system-session]
  constraints:
    - id: runtime-system-session-context
      severity: error
      language: plain
      expression: A runtime system record must bind a stable session ID to a system ID and must not substitute a transient process ID for session identity.
      explanation: {zh: 持久会话上下文与短暂进程生命周期不同，两者都需要独立标识。, en: Persistent session context differs from transient process lifecycle and both need independent identity., ja: 永続セッションコンテキストは一時的なプロセスライフサイクルとは異なり、両方に独立した識別性が必要である。}
      source_claims: [claim-runtime-system-session]
  required_relations: []
examples:
  - id: runtime-system-positive
    labels: {zh: "OpenAI Agents Session 跨 Run", en: "OpenAI Agents Session across Runs", ja: "OpenAI Agents Session 複数 Run"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; runtime-system maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; runtime-system maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; runtime-system serving env."}
    field_values: {session_id: openai-session-support-73}
    related_node_ids: [RuntimeSession, SessionResumeEvent, AgentSystem]
    related_relation_ids: []
    source_claims: [claim-runtime-system-session]
  - id: runtime-system-counterexample
    labels: {zh: "Linux PID 非 RuntimeSession", en: "Linux PID not RuntimeSession", ja: "Linux PID は RuntimeSession ではない"}
    descriptions: {zh: "ID without PROV relations cannot serve as PROV-O-style runtime-system.", en: "ID without PROV relations cannot serve as PROV-O-style runtime-system.", ja: "Missing PROV relations rejects runtime-system."}
    field_values: {pid: 4820}
    related_node_ids: [ProcessHandle]
    related_relation_ids: []
    source_claims: [claim-runtime-system-session]
  - id: runtime-system-boundary
    labels: {zh: "Session 与 Thread 映射边界", en: "Session versus Thread mapping boundary", ja: "Session と Thread マッピング境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; runtime-system must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; runtime-system must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {session_id: openai-session-support-73, thread_id: thread_abc}
    related_node_ids: [RuntimeSession, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-system-session]
  - id: runtime-system-instance-sess-77
    labels: {zh: "Cursor agent session 实例", en: "Cursor agent session instance", ja: "Cursor agent session 事例"}
    descriptions: {zh: "OTel instance: trace_id=4bf92f3577b34da6 span_id=00f067aa kind=CLIENT name=llm.call->runtime-system.", en: "OTel instance: trace_id+span_id kind=CLIENT name=llm.call->runtime-system.", ja: "OTel instance maps to runtime-system."}
    field_values: {session_id: cursor-agent-session-77}
    related_node_ids: [RuntimeSession, AgentSystem, Container, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-system-session]
parent_relation: null
relations: []
