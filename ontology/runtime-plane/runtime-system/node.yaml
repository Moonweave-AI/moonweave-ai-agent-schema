        ja: canonical graph は現在 RuntimeEnvironment—NetworkCall／NetworkInteraction 直接関係を承認せず、environment evidence と network-policy fact を別 domain に保持します。
      source_claims:
        - claim-runtime-system-028
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-system-domain-reviewer
