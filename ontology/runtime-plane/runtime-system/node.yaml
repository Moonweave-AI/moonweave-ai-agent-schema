        en: RuntimeSession is identified by session identifier, lifecycle continuity, and cross-attempt context and belongs to runtime system; participants entering or leaving do not change its container identity.
        ja: RuntimeSession は session identifier・lifecycle continuity・attempt 間 context で識別され runtime system に属し、participant の出入りで container identity は変わりません。
