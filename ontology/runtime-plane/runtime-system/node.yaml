              en: Concept review confirms that ConversationTurn and MessageHistory follow an information-structure parent chain, not the runtime-system lifecycle.
              ja: 概念審査は ConversationTurn／MessageHistory の親 chain が information structure で runtime-system lifecycle ではないと確認しました。
    - other_module_id: info-messages-instructions
