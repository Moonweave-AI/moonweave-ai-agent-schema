            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐概念核实网络调用是受控交互 occurrence，不是环境容器或会话事件。
              en: Concept review confirms that a network call is a controlled-interaction occurrence, not an environment container or session event.
              ja: 概念審査は network call が controlled-interaction occurrence で environment container／session event ではないと確認しました。
