      owner_module_id: runtime-system
      rationale:
        zh: SessionLifecycleEvent 与 SessionStartEvent 由实际 RuntimeSession 的状态转移和发生时间界定，归运行系统；消息历史可在事件前后存在但不是事件本身。
        en: SessionLifecycleEvent and SessionStartEvent are identified by an actual RuntimeSession state transition and occurrence time and belong to runtime system; message history may exist before or after the event but is not the event itself.
        ja: SessionLifecycleEvent と SessionStartEvent は実 RuntimeSession の state transition・occurrence time で識別され runtime system に属します。message history は前後に存在しても event 自体ではありません。
