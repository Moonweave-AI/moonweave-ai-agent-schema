          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 缁撴瀯澶嶆牳纭 opens_runtime_session 浠?SessionStartEvent 鎸囧悜鏂颁細璇濓紝resumes_from_checkpoint 浠?SessionResumeEvent 鎸囧悜涓嶅彲鏇挎崲鐨?Checkpoint锛孲essionLifecycleEvent-changes_state_of-RuntimeSession 鍙〃杈剧姸鎬佽縼绉汇€備笁鏉′簨瀹炵鐐广€佹椂闂磋韩浠戒笌鑱岃矗涓嶅悓锛屼笉鑳藉悎骞舵垨鍙嶅悜锛泂ession_has_trace 浠呮壙鎷呭埌瑙傛祴鍩熺殑杈撳嚭浜ゆ帴銆?            en: Structural review confirms opens_runtime_session points from SessionStartEvent to the new session, resumes_from_checkpoint points from SessionResumeEvent to the non-substitutable Checkpoint, and SessionLifecycleEvent-changes_state_of-RuntimeSession expresses only state transition. Their endpoints, temporal identities, and responsibilities differ and cannot be merged or reversed; session_has_trace serves only as the output handoff to observability.
            ja: 妲嬮€犲鏌汇伅 opens_runtime_session 銇?SessionStartEvent 銇嬨倝鏂?session銆乺esumes_from_checkpoint 銇?SessionResumeEvent 銇嬨倝缃彌涓嶈兘 Checkpoint銆丼essionLifecycleEvent-changes_state_of-RuntimeSession 銇?state transition 銇犮亼銈掓寚銇欍仺纰鸿獚銇椼伨銇欍€傜鐐广兓鏅傞枔 identity銉昏铂鍕欍亴鐣般仾銈嬨仧銈佺当鍚堛倓鍙嶈虎銇仹銇嶃仛銆乻ession_has_trace 銇?observability 銇搞伄 output handoff 銇犮亼銈掓媴銇勩伨銇欍€?  taxonomy_contract:
