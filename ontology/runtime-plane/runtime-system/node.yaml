        en: No accepted direct MessageHistory or ConversationTurn-to-SessionLifecycleEvent edge currently exists; content continuity and runtime lifecycle remain separate.
        ja: 承認済み MessageHistory／ConversationTurn—SessionLifecycleEvent 直接辺は現在なく、content continuity と runtime lifecycle を分離します。
