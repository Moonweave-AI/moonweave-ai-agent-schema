        en: RuntimeSession, SessionPauseEvent, and SessionResumeEvent carry session-container and lifecycle-occurrence identity and belong to runtime system; the four cross-boundary edges reference observation evidence without transferring ownership.
        ja: RuntimeSession・SessionPauseEvent・SessionResumeEvent は session container／lifecycle occurrence identity を担い runtime system に属します。四つの境界辺は observation evidence を参照しても owner を移転しません。
