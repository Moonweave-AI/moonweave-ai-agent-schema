      rationale:
        zh: Actor 是在运行中承担行动责任的主体，归运行参与者；它可参加 RuntimeSession，但不是会话容器。
        en: Actor is a runtime participant bearing action responsibility and belongs to runtime actors; it may participate in RuntimeSession but is not the session container.
        ja: Actor は実行中に行為責任を担う主体で runtime actors に属し RuntimeSession に参加できますが session container ではありません。
