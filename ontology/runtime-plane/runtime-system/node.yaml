    source: eng-fw-langgraph-docs
    supports: LangGraph Persistence states that checkpointers retain a thread's graph state beyond one graph run and that thread_id selects the continuing thread. This supports a session-like context spanning multiple invocations. It does not define Moonweave RunAttempt identity, ownership, or the rule that an attempt must start within an active session interval; those are design inferences.
