    title: OpenAI Agents SDK sessions
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: official-doc
    relevance: Describes persistent sessions and pluggable session storage for agent runs.
  - id: langgraph-persistence
    title: LangGraph persistence
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: official-doc
    relevance: Describes thread-scoped state, checkpoints, state history, and resumption.
  - id: prov-o-core
