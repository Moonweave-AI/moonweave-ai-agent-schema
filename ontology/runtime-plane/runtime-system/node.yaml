source_claims:
  - id: claim-runtime-system-session
    source: openai-agents-sessions
    supports: The OpenAI Agents SDK documents Sessions as a persistent layer for conversation history and working context across agent runs.
    locator: Sessions overview
    evidence_kind: official-doc
    confidence: high


