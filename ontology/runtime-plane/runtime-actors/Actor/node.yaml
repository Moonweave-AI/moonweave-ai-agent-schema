schema: moonweave.ai/ontology-node/v1
id: Actor
kind: concept
status: review
labels:
  zh: 运行参与主体
  en: runtime actor
  ja: 実行アクター
semantics:
  short_definition:
    zh: 运行参与主体是在一次智能体运行中能够实施、控制或接收行动并承担可追踪责任的实体。
    en: A runtime Actor is an entity that can perform, control, or receive actions and bear traceable responsibility in an agent run.
    ja: 実行 Actor は、エージェント実行で行為を実施、制御、受領し、追跡可能な責任を負える実体である。
  definition:
    zh: 运行参与主体是一类可识别实体；其种差是它以自身身份真实参与运行活动，能够发起、控制或接收行动，并可被赋予角色、能力、权限与责任。它由人类参与主体和软件参与主体具体化；模型、绑定记录、会话与工具定义即使与运行相关，也不是参与主体。
    en: A runtime Actor is an identifiable entity distinguished by participating in actual runtime activity under its own identity, initiating, controlling, or receiving actions, and being assignable roles, capabilities, authority, and accountability. HumanActor and SoftwareActor specialize it; a Model, binding record, session, or tool definition is not an Actor merely because it is used in a run.
    ja: 実行 Actor は、自身の識別子で実際の実行活動に参加し、行為を開始、制御、受領し、役割、能力、権限、責任を割り当てられる識別可能な実体である。HumanActor と SoftwareActor が特殊化し、Model、束縛記録、セッション、ツール定義は実行で使われるだけでは Actor にならない。
  why_needed:
    zh: 该上位概念为运行追踪中的行动归属与责任审计提供稳定主体身份，并把主体与其临时角色、能力和使用的模型分开。
    en: This upper concept provides stable identity for action attribution and accountability in traces while separating a participant from temporary roles, capabilities, and models it uses.
    ja: この上位概念は追跡内の行為帰属と責任監査に安定した主体識別子を与え、参加者を一時的役割、能力、使用モデルから分離する。
  includes:
    - zh: 纳入在运行中以可追踪身份作出决定、执行操作、提供服务、提出请求或接收委派的人或运行软件。
      en: Includes a person or running software that decides, executes, serves, requests, or receives delegation under a traceable runtime identity.
      ja: 実行中に追跡可能な識別子で判断、操作、サービス、要求、委任受領を行う人または稼働ソフトウェアを含む。
  excludes:
    - zh: 不纳入 Model 权重或端点、ActorBinding、RuntimeSession、工具规格、组织名称或仅出现在日志文本中的字符串。
      en: Excludes Model weights or endpoints, ActorBinding records, RuntimeSession activities, tool specifications, organization names, and strings merely mentioned in logs.
      ja: Model の重み・エンドポイント、ActorBinding、RuntimeSession、ツール仕様、組織名、ログに言及されただけの文字列は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - actor_id
  fields:
    - id: actor_id
      labels:
        zh: 主体标识
        en: actor ID
        ja: アクター ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在系统边界内稳定标识承担行为或责任的主体。
        en: Stable identifier for the subject that bears actions or responsibilities within the system boundary.
        ja: システム境界内で行為または責任を担う主体を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: actor-reviewer-001
      source_claims:
        - claim-actor-002
        - claim-actor-003
    - id: actor_kind
      labels:
        zh: 主体类别
        en: actor kind
        ja: アクター種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分人类、软件或外部服务主体的受控类别。
        en: Controlled category distinguishing human, software, or external-service actors.
        ja: 人間、ソフトウェア、外部サービスのアクターを区別する制御カテゴリです。
      allowed_values: []
      pattern: null
      example_value: human
      source_claims:
        - claim-actor-004
        - claim-actor-005
    - id: display_name
      labels:
        zh: 显示名称
        en: display name
        ja: 表示名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供审计界面显示且不参与身份判定的名称。
        en: Human-readable name for audit displays that does not determine identity.
        ja: 監査表示用の可読名で、同一性判定には用いません。
      allowed_values: []
      pattern: null
      example_value: Ontology reviewer
      source_claims:
        - claim-actor-006
        - claim-actor-007
  constraints:
    - id: actor-kind-consistency
      severity: error
      expression_language: plain
      expression: actor_kind must agree with the most specific Actor subtype
      explanations:
        zh: 主体类别必须与其最具体的 Actor 下位类型一致。
        en: actor_kind must agree with the most specific Actor subtype.
        ja: actor_kind は最も具体的な Actor 下位型と一致しなければなりません。
      source_claims:
        - claim-actor-008
        - claim-actor-009
  required_relation_constraints:
    - id: actor-has-binding
      direction: outgoing
      predicate: has_binding
      target_concept_id: ActorBinding
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 主体至少通过一个绑定说明其角色、能力或权限。
        en: An actor has at least one binding that states a role, capability, or authority.
        ja: アクターには役割、能力、権限を示す少なくとも一つのバインディングがあります。
      source_claims:
        - claim-actor-010
        - claim-actor-011
examples:
  - id: Actor-example-positive-001
    kind: positive
    labels:
      zh: 运行参与主体正例
      en: Positive example of runtime actor
      ja: 実行アクターの正例
    scenario_id: null
    descriptions:
      zh: actor-reviewer-001 在运行中查看高风险工具请求、作出拒绝决定并留下签名审计记录；追踪将决定和责任归到该参与者。
      en: actor-reviewer-001 inspects a high-risk tool request during a run, rejects it, and leaves a signed audit record that attributes the decision and responsibility to that participant.
      ja: actor-reviewer-001 が実行中に高リスクツール要求を審査し、拒否を決定して署名監査記録を残し、追跡が判断と責任をその参加者へ帰属させる。
    field_values:
      actor_id: actor-reviewer-001
      actor_kind: human
      display_name: Ontology reviewer
    related_node_ids:
      - Actor
      - ActorBinding
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    expected_result:
      zh: actor-reviewer-001 归类为 Actor，并可另行通过绑定记录说明其审核角色。
      en: actor-reviewer-001 is classified as Actor; a separate binding may describe the review role.
      ja: actor-reviewer-001 は Actor に分類され、審査役割は別の束縛で説明できる。
    why_valid_or_invalid:
      zh: 该人以稳定身份实施了影响运行的决定，并能承担审计责任；角色记录不是其身份本身。
      en: The person made a run-affecting decision under stable identity and can bear audit responsibility; the role record is not the participant itself.
      ja: 安定した識別子で実行に影響する判断を行い監査責任を負えるためであり、役割記録は主体そのものではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-001
  - id: Actor-example-boundary-001
    kind: boundary
    labels:
      zh: 运行参与主体边界例
      en: Boundary case for runtime actor
      ja: 実行アクターの境界例
    scenario_id: null
    descriptions:
      zh: 记录 binding-77 说明 actor-reviewer-001 在本次运行中承担 reviewer 角色并在十二点失效；该记录本身不作决定也不执行行动。
      en: Record binding-77 says actor-reviewer-001 bears the reviewer role in this run until noon; the record itself makes no decision and performs no action.
      ja: binding-77 は actor-reviewer-001 がこの実行で正午まで reviewer 役割を持つと記録するが、記録自体は判断も行為も行わない。
    field_values: {}
    related_node_ids:
      - Actor
      - ActorBinding
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    expected_result:
      zh: binding-77 保持 ActorRoleBinding 类型，不能因关联参与者而归为 Actor。
      en: binding-77 remains an ActorRoleBinding and is not an Actor merely because it refers to one.
      ja: binding-77 は ActorRoleBinding のままで、参加者を参照するだけでは Actor にならない。
    why_valid_or_invalid:
      zh: 信息记录描述主体与角色的关系，而主体必须能够在运行中实施或承受行动。
      en: An information record describes a participant-role relation, whereas an Actor must be capable of acting or being acted upon in the run.
      ja: 情報記録は主体と役割の関係を記述し、Actor は実行で行為または行為の受領が可能でなければならない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-001
  - id: Actor-example-instance-001
    kind: instance
    labels:
      zh: 本体审查参与者实例
      en: Ontology-review participant instance
      ja: 本体審査参加者インスタンス
    scenario_id: null
    descriptions:
      zh: actor-reviewer-001 标识承担本体边界审查责任的人类参与者，显示名为“Ontology reviewer”；actor_kind=human 表示其持久参与者类别，具体审查者角色则由上下文绑定记录。
      en: actor-reviewer-001 identifies the human participant accountable for an ontology-boundary review and displays as “Ontology reviewer.” actor_kind=human records the persistent participant category, while the contextual reviewer role belongs on a binding.
      ja: actor-reviewer-001は本体境界審査に責任を持つ人間参加者を識別し、表示名を「Ontology reviewer」とする。actor_kind=humanは恒常参加者分類を示し、文脈上の審査者役割はbindingに置く。
    field_values:
      actor_id: actor-reviewer-001
      actor_kind: human
      display_name: Ontology reviewer
    related_node_ids:
      - Actor
      - HumanActor
      - ActorBinding
    related_relation_ids:
      - HumanActor-is_a-Actor
    expected_result:
      zh: 字段满足 Actor 的身份契约，且参与者可在不同任务中通过不同 ActorBinding 承担不同角色。
      en: The fields satisfy Actor identity, and the participant may carry different roles in different tasks through separate ActorBindings.
      ja: 項目はActor同一性契約を満たし、参加者は別ActorBindingによりタスクごとに異なる役割を担える。
    why_valid_or_invalid:
      zh: 稳定 actor_id 与 actor_kind 决定参与者身份；display_name 仅用于显示，不把“审查者”误建为永久 Actor 子类。
      en: Stable actor_id and actor_kind determine participant identity; display_name is presentational and does not turn “reviewer” into a permanent Actor subtype.
      ja: 安定actor_idとactor_kindが参加者同一性を決め、display_nameは表示用で「reviewer」を恒久Actor下位型にしない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: Actor-has_binding-ActorBinding
    predicate: has_binding
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 具有有效主体绑定
      en: has active actor binding
      ja: 有効なアクター束縛を持つ
    definitions:
      zh: Actor-has_binding-ActorBinding 表示某条 ActorBinding 的 actor_id 精确解析为该 Actor，并且该记录在声明的范围与有效期内为其绑定角色、能力或授权依据；它不把角色、能力或权限变成 Actor 的固有类型。
      en: Actor-has_binding-ActorBinding states that an ActorBinding resolves by actor_id to this Actor and binds a role, capability, or authority basis within its declared scope and validity interval; it does not turn that role, capability, or authority into an intrinsic Actor type.
      ja: Actor-has_binding-ActorBinding は ActorBinding の actor_id がこの Actor に正確に解決され、宣言された範囲と有効期間で役割・能力・権限根拠を束縛することを表す。役割・能力・権限を Actor の固有型にはしない。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: binds_actor
      labels:
        zh: 绑定主体
        en: binds actor
        ja: アクターを束縛する
    conditions:
      - id: Actor-has_binding-ActorBinding-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the binding actor_id equals the Actor's canonical identity and the scope, validity interval, granting source, and revocation state are all verifiable.
        explanations:
          zh: 仅当绑定记录的 actor_id 与 Actor 的规范身份相同，且其范围、有效期、授予来源与撤销状态均可核实时成立。
          en: Assert only when the binding actor_id equals the Actor's canonical identity and the scope, validity interval, granting source, and revocation state are all verifiable.
          ja: binding の actor_id が Actor の正規同一性と一致し、範囲・有効期間・付与元・取消状態をすべて検証できる時だけ成立する。
        source_claims:
          - claim-actor-012
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Actor-has_binding-ActorBinding-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 具有有效主体绑定正例
          en: "Positive case: has active actor binding"
          ja: 有効なアクター束縛を持つの正例
        scenario_id: null
        descriptions:
          zh: role-binding-12 将 h-411 绑定为 review-203 的独立审核者，记录 09:00–12:00 有效期、授予者和禁止自审条件；其 actor_id 精确解析为 h-411。
          en: role-binding-12 binds h-411 as the independent reviewer for review-203, records a 09:00–12:00 interval, grantor, and no-self-review condition, and its actor_id resolves exactly to h-411.
          ja: role-binding-12 は h-411 を review-203 の独立審査者として束縛し、09:00–12:00 の有効期間、付与者、自己審査禁止条件を記録し、actor_id は h-411 に正確に解決される。
        field_values: {}
        related_node_ids:
          - Actor
          - ActorBinding
        related_relation_ids:
          - Actor-has_binding-ActorBinding
        expected_result:
          zh: 建立 h-411 到 role-binding-12 的 has_binding 事实，并保留绑定的时态和范围。
          en: Assert h-411 has_binding role-binding-12 while retaining the binding's scope and valid time.
          ja: h-411 から role-binding-12 への has_binding を範囲と有効時間付きで確立する。
        why_valid_or_invalid:
          zh: 主体身份、绑定对象、有效范围和来源全部一致，因此该边可被审计。
          en: Actor identity, bound object, valid scope, and provenance all agree, so the edge is auditable.
          ja: 主体同一性、束縛対象、有効範囲、来歴が一致し監査可能である。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-actor-012
      - id: Actor-has_binding-ActorBinding-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 具有有效主体绑定边界例
          en: "Boundary case: has active actor binding"
          ja: 有効なアクター束縛を持つの境界例
        scenario_id: null
        descriptions:
          zh: cap-binding-8 的 actor_id 是 agent-7，虽然它与 h-411 出现在同一会话中，也不能把该记录连接到 h-411。
          en: cap-binding-8 names agent-7; its presence in the same session as h-411 does not permit linking the record to h-411.
          ja: cap-binding-8 の actor_id は agent-7 であり、h-411 と同一セッションにあっても h-411 へ接続できない。
        field_values: {}
        related_node_ids:
          - Actor
          - ActorBinding
        related_relation_ids:
          - Actor-has_binding-ActorBinding
        expected_result:
          zh: 拒绝 h-411 has_binding cap-binding-8；只连接记录明确标识的主体。
          en: Reject h-411 has_binding cap-binding-8 and link only the Actor explicitly identified by the record.
          ja: h-411 has_binding cap-binding-8 を拒否し、記録が明示する主体だけに接続する。
        why_valid_or_invalid:
          zh: 会话共现不能替代 binding 内部的主体标识和有效范围。
          en: Session co-occurrence cannot replace the Actor identifier and validity scope inside the binding.
          ja: セッション共起は binding 内の主体識別子と有効範囲を代替できない。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-actor-012
    source_claims:
      - claim-actor-012
    distinct_fact_rationale:
      zh: 该边关联主体与独立绑定记录，不等同于直接角色分类、能力可用性或授权决定。
      en: This edge links an Actor to an independent binding record; it is not direct role classification, capability availability, or an authorization decision.
      ja: 主体と独立束縛記録を結び、直接的な役割分類・能力可用性・認可判断とは異なる。
    layout_role: cross-link
    review_status: pending
    target: concept:ActorBinding
  - id: associated_with_attempt
    predicate: associated_with_attempt
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 参与执行尝试
      en: is associated with run attempt
      ja: 実行試行に関与する
    definitions:
      zh: associated_with_attempt 表示某 Actor 在特定 RunAttempt 中实际发起、执行、批准、观察或接收了可归责行动，并可由追踪或审计记录定位；目录成员、可选参与者或日志中的名称提及不足以建立该边。
      en: associated_with_attempt states that an Actor actually initiated, executed, approved, observed, or received an attributable action in a specific RunAttempt and can be located through trace or audit evidence; directory membership, eligibility, or a name mention is insufficient.
      ja: associated_with_attempt は Actor が特定 RunAttempt で帰責可能な行為を開始・実行・承認・観測・受領し、trace または audit 証拠で特定できることを表す。名簿所属、候補資格、名前の記載だけでは成立しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: has_associated_actor
      labels:
        zh: 具有相关参与主体
        en: has associated actor
        ja: 関連アクターを持つ
    conditions:
      - id: associated_with_attempt-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when trace, audit, or qualified-association evidence for the RunAttempt jointly identifies this Actor, participation mode, and attempt_id.
        explanations:
          zh: 仅当 RunAttempt 的追踪、审计或合格关联记录同时标识该 Actor、参与方式与该尝试的 attempt_id 时成立。
          en: Assert only when trace, audit, or qualified-association evidence for the RunAttempt jointly identifies this Actor, participation mode, and attempt_id.
          ja: RunAttempt の trace・audit・qualified association がこの Actor、参加方式、attempt_id を同時に識別する時だけ成立する。
        source_claims:
          - claim-actor-013
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Actor 身份由 runtime-actors 拥有，RunAttempt 由 runtime-execution-attempts 拥有；该边只记录可归责的跨模块参与事实。
        en: Actor identity remains owned by runtime-actors and RunAttempt by runtime-execution-attempts; this edge records only the attributable cross-module participation fact.
        ja: Actor identity は runtime-actors、RunAttempt は runtime-execution-attempts が所有し、この辺は帰責可能なモジュール横断参加事実だけを記録する。
      protocol_or_resource_context:
        zh: 查询必须以 attempt_id、actor_id 和参与证据联合匹配，不从同一会话或目录成员关系推断。
        en: Queries must jointly match attempt_id, actor_id, and participation evidence rather than infer from the same session or directory membership.
        ja: 照会は attempt_id・actor_id・参加証拠を共同照合し、同一 session や名簿所属から推論しない。
    constraints: []
    examples:
      - id: associated_with_attempt-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 参与执行尝试正例
          en: "Positive case: is associated with run attempt"
          ja: 実行試行に関与するの正例
        scenario_id: null
        descriptions:
          zh: attempt-22 的审批中断记录 h-411 为批准者，记录 decision_id、时间与随后恢复的同一 attempt_id。
          en: attempt-22's approval interruption identifies h-411 as approver and records the decision ID, time, and same attempt_id resumed afterward.
          ja: attempt-22 の承認 interrupt は h-411 を承認者として decision_id、時刻、再開した同一 attempt_id を記録する。
        field_values: {}
        related_node_ids:
          - Actor
          - RunAttempt
        related_relation_ids:
          - associated_with_attempt
        expected_result:
          zh: 建立 h-411 associated_with_attempt attempt-22，并把参与方式保留为批准。
          en: Assert h-411 associated_with_attempt attempt-22 and retain approval as the participation mode.
          ja: h-411 associated_with_attempt attempt-22 を確立し参加方式を承認として保持する。
        why_valid_or_invalid:
