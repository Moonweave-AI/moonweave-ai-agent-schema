schema: moonweave.ai/ontology-node/v1
id: Actor
kind: concept
labels:
  zh: 运行参与主体
  en: runtime actor
  ja: 実行アクター
semantics:
  short_definition:
    zh: 运行参与主体是在一次智能体运行中能够实施、控制或接收行动并承担可追踪责任的实体。
    en: A runtime Actor is an entity that can perform, control, or receive actions and bear traceable responsibility in an agent run.
    ja: 実行 Actor は、エージェント実行で行為を実施、制御、受領し、追跡可能な責任を負える実体である。
  definition:
    zh: 运行参与主体是一类可识别实体；其种差是它以自身身份真实参与运行活动，能够发起、控制或接收行动，并可被赋予角色、能力、权限与责任。它由人类参与主体和软件参与主体具体化；模型、绑定记录、会话与工具定义即使与运行相关，也不是参与主体。
    en: A runtime Actor is an identifiable entity distinguished by participating in actual runtime activity under its own identity, initiating, controlling, or receiving actions, and being assignable roles, capabilities, authority, and accountability. HumanActor and SoftwareActor specialize it; a Model, binding record, session, or tool definition is not an Actor merely because it is used in a run.
    ja: 実行 Actor は、自身の識別子で実際の実行活動に参加し、行為を開始、制御、受領し、役割、能力、権限、責任を割り当てられる識別可能な実体である。HumanActor と SoftwareActor が特殊化し、Model、束縛記録、セッション、ツール定義は実行で使われるだけでは Actor にならない。
  why_needed:
    zh: 该上位概念为运行追踪中的行动归属与责任审计提供稳定主体身份，并把主体与其临时角色、能力和使用的模型分开。
    en: This upper concept provides stable identity for action attribution and accountability in traces while separating a participant from temporary roles, capabilities, and models it uses.
    ja: この上位概念は追跡内の行為帰属と責任監査に安定した主体識別子を与え、参加者を一時的役割、能力、使用モデルから分離する。
  includes:
    - zh: 纳入在运行中以可追踪身份作出决定、执行操作、提供服务、提出请求或接收委派的人或运行软件。
      en: Includes a person or running software that decides, executes, serves, requests, or receives delegation under a traceable runtime identity.
      ja: 実行中に追跡可能な識別子で判断、操作、サービス、要求、委任受領を行う人または稼働ソフトウェアを含む。
  excludes:
    - zh: 不纳入 Model 权重或端点、ActorBinding、RuntimeSession、工具规格、组织名称或仅出现在日志文本中的字符串。
      en: Excludes Model weights or endpoints, ActorBinding records, RuntimeSession activities, tool specifications, organization names, and strings merely mentioned in logs.
      ja: Model の重み・エンドポイント、ActorBinding、RuntimeSession、ツール仕様、組織名、ログに言及されただけの文字列は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Actor 映射 OpenAI assistant 身份、LangGraph runnable config actor_id、Anthropic message role 与 A2A 远程主体解析；配置默认值不能代替 participates_in_session 或 associated_with_attempt 证据。
    en: Actor maps OpenAI assistant identity, LangGraph runnable config actor_id, Anthropic message roles, and A2A remote resolution; configured defaults cannot replace participates_in_session or associated_with_attempt evidence.
    ja: Actor は OpenAI assistant identity、LangGraph actor_id、Anthropic message role、A2A remote 解決を写像し、設定 default は参加証拠を代替できません。
  typical_input:
    - description: OpenAI Assistants assistant/model/tools or LangGraph runnable config.
      format: POST /v1/assistants => {"id":"asst_abc","model":"gpt-4.1","tools":[...]}
      source_claims:
        - claim-openai-assistants-actor
        - claim-actor-design
  typical_output:
    - description: Moonweave Actor projection with participation evidence.
      format: '{"participant_actor_id":"actor-agent-reviewer-01","model_ref":"model:gpt-4.1:2026-04-14"}'
      source_claims:
        - claim-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys:
    - actor_id
  fields:
    - id: actor_id
      labels:
        zh: 主体标识
        en: actor ID
        ja: アクター ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在系统边界内稳定标识承担行为或责任的主体。
        en: Stable identifier for the subject that bears actions or responsibilities within the system boundary.
        ja: システム境界内で行為または責任を担う主体を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: actor-reviewer-001
      source_claims:
        - claim-actor-design
        - claim-actor-design
    - id: actor_kind
      labels:
        zh: 主体类别
        en: actor kind
        ja: アクター種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分人类、软件或外部服务主体的受控类别。
        en: Controlled category distinguishing human, software, or external-service actors.
        ja: 人間、ソフトウェア、外部サービスのアクターを区別する制御カテゴリです。
      allowed_values: []
      pattern: null
      example_value: human
      source_claims:
        - claim-actor-design
        - claim-actor-design
    - id: display_name
      labels:
        zh: 显示名称
        en: display name
        ja: 表示名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供审计界面显示且不参与身份判定的名称。
        en: Human-readable name for audit displays that does not determine identity.
        ja: 監査表示用の可読名で、同一性判定には用いません。
      allowed_values: []
      pattern: null
      example_value: Ontology reviewer
      source_claims:
        - claim-actor-design
        - claim-actor-design
  constraints:
    - id: actor-kind-consistency
      severity: error
      expression_language: plain
      expression: actor_kind must agree with the most specific Actor subtype
      explanations:
        zh: 主体类别必须与其最具体的 Actor 下位类型一致。
        en: actor_kind must agree with the most specific Actor subtype.
        ja: actor_kind は最も具体的な Actor 下位型と一致しなければなりません。
      source_claims:
        - claim-actor-design
        - claim-actor-design
  required_relation_constraints:
    - id: actor-has-binding
      direction: outgoing
      predicate: has_binding
      target_concept_id: ActorBinding
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 主体至少通过一个绑定说明其角色、能力或权限。
        en: An actor has at least one binding that states a role, capability, or authority.
        ja: アクターには役割、能力、権限を示す少なくとも一つのバインディングがあります。
      source_claims:
        - claim-actor-design
        - claim-actor-design
examples:
  - id: Actor-example-positive-001
    labels:
      zh: PROV-O SoftwareAgent 审查
      en: PROV-O SoftwareAgent review
      ja: PROV-O SoftwareAgent レビュー
    descriptions:
      zh: W3C PROV-O prov:SoftwareAgent(agent-reviewer-2) 关联 prov:Activity(review-exec-842)；actor_id 本地稳定，不复制 OpenAI assistant_id 原生字段。
      en: W3C PROV-O prov:SoftwareAgent(agent-reviewer-2) associated with prov:Activity(review-exec-842); actor_id locally stable, not copying OpenAI assistant_id native field.
      ja: PROV-O SoftwareAgent が review Activity に関連する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-reviewer-001
      actor_kind: human
      display_name: Ontology reviewer
    related_node_ids:
      - Actor
      - ActorBinding
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    source_claims:
      - claim-actor-design
  - id: Actor-example-boundary-001
    labels:
      zh: LangSmith span 当 Actor
      en: LangSmith span as Actor
      ja: LangSmith span を Actor とする
    descriptions:
      zh: LangSmith tool run span 写入 actor_id；span 描述操作 timing 不是责任主体，应保留 TraceSpan 并单独建模 Actor。
      en: LangSmith tool run span written to actor_id; span describes operation timing not responsible principal; keep TraceSpan and model Actor separately.
      ja: tool run span は Actor ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - Actor
      - ActorBinding
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    source_claims:
      - claim-actor-design
  - id: Actor-example-instance-001
    labels:
      zh: A2A AgentCard 名边界
      en: A2A AgentCard name boundary
      ja: A2A AgentCard 名境界
    descriptions:
      zh: A2A AgentCard.name=reviewer 是发现文档字段；Moonweave actor_id 是本地 opaque ID；RemoteAgentReference 存 card URL 不复制 name 到 actor_id。
      en: A2A AgentCard.name=reviewer is discovery document field; Moonweave actor_id is local opaque ID; RemoteAgentReference stores card URL without copying name to actor_id.
      ja: AgentCard.name と actor_id は別ライフサイクルである。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-reviewer-001
      actor_kind: human
      display_name: Ontology reviewer
    related_node_ids:
      - Actor
      - HumanActor
      - ActorBinding
    related_relation_ids:
      - HumanActor-is_a-Actor
    source_claims:
      - claim-actor-design
  - id: Actor-example-4
    labels:
      zh: OpenAI triage agent 实例
      en: OpenAI triage agent instance
      ja: OpenAI triage agent 事例
    descriptions:
      zh: OpenAI Agents SDK triage_agent handoffs=[booking_agent, refund_agent] 映射 Actor actor_id=openai-triage-agent、actor_kind=SoftwareActor。
      en: OpenAI Agents SDK triage_agent handoffs=[booking_agent, refund_agent] maps Actor actor_id=openai-triage-agent, actor_kind=SoftwareActor.
      ja: OpenAI triage_agent が Actor にマップされる。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - Actor
    related_relation_ids: []
    source_claims:
      - claim-openai-assistants-actor
      - claim-actor-design
parent_relation: null
relations:
  - id: Actor-has_binding-ActorBinding
    predicate: has_binding
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 具有有效主体绑定
      en: has active actor binding
      ja: 有効なアクター束縛を持つ
    definitions:
      zh: Actor-has_binding-ActorBinding 表示某条 ActorBinding 的 actor_id 精确解析为该 Actor，并且该记录在声明的范围与有效期内为其绑定角色、能力或授权依据；它不把角色、能力或权限变成 Actor 的固有类型。
      en: Actor-has_binding-ActorBinding states that an ActorBinding resolves by actor_id to this Actor and binds a role, capability, or authority basis within its declared scope and validity interval; it does not turn that role, capability, or authority into an intrinsic Actor type.
      ja: Actor-has_binding-ActorBinding は ActorBinding の actor_id がこの Actor に正確に解決され、宣言された範囲と有効期間で役割・能力・権限根拠を束縛することを表す。役割・能力・権限を Actor の固有型にはしない。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: binds_actor
      labels:
        zh: 绑定主体
        en: binds actor
        ja: アクターを束縛する
    conditions:
      - id: Actor-has_binding-ActorBinding-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the binding actor_id equals the Actor's canonical identity and the scope, validity interval, granting source, and revocation state are all verifiable.
        explanations:
          zh: 仅当绑定记录的 actor_id 与 Actor 的规范身份相同，且其范围、有效期、授予来源与撤销状态均可核实时成立。
          en: Assert only when the binding actor_id equals the Actor's canonical identity and the scope, validity interval, granting source, and revocation state are all verifiable.
          ja: binding の actor_id が Actor の正規同一性と一致し、範囲・有効期間・付与元・取消状態をすべて検証できる時だけ成立する。
        source_claims:
          - claim-actor-design
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-actor-design
    distinct_fact_rationale:
      zh: 该边关联主体与独立绑定记录，不等同于直接角色分类、能力可用性或授权决定。
      en: This edge links an Actor to an independent binding record; it is not direct role classification, capability availability, or an authorization decision.
      ja: 主体と独立束縛記録を結び、直接的な役割分類・能力可用性・認可判断とは異なる。
    layout_role: cross-link
    target: concept:ActorBinding
  - id: associated_with_attempt
    predicate: associated_with_attempt
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 参与执行尝试
      en: is associated with run attempt
      ja: 実行試行に関与する
    definitions:
      zh: associated_with_attempt 表示某 Actor 在特定 RunAttempt 中实际发起、执行、批准、观察或接收了可归责行动，并可由追踪或审计记录定位；目录成员、可选参与者或日志中的名称提及不足以建立该边。
      en: associated_with_attempt states that an Actor actually initiated, executed, approved, observed, or received an attributable action in a specific RunAttempt and can be located through trace or audit evidence; directory membership, eligibility, or a name mention is insufficient.
      ja: associated_with_attempt は Actor が特定 RunAttempt で帰責可能な行為を開始・実行・承認・観測・受領し、trace または audit 証拠で特定できることを表す。名簿所属、候補資格、名前の記載だけでは成立しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: has_associated_actor
      labels:
        zh: 具有相关参与主体
        en: has associated actor
        ja: 関連アクターを持つ
    conditions:
      - id: associated_with_attempt-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when trace, audit, or qualified-association evidence for the RunAttempt jointly identifies this Actor, participation mode, and attempt_id.
        explanations:
          zh: 仅当 RunAttempt 的追踪、审计或合格关联记录同时标识该 Actor、参与方式与该尝试的 attempt_id 时成立。
          en: Assert only when trace, audit, or qualified-association evidence for the RunAttempt jointly identifies this Actor, participation mode, and attempt_id.
          ja: RunAttempt の trace・audit・qualified association がこの Actor、参加方式、attempt_id を同時に識別する時だけ成立する。
        source_claims:
          - claim-actor-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Actor 身份由 runtime-actors 拥有，RunAttempt 由 runtime-execution-attempts 拥有；该边只记录可归责的跨模块参与事实。
        en: Actor identity remains owned by runtime-actors and RunAttempt by runtime-execution-attempts; this edge records only the attributable cross-module participation fact.
        ja: Actor identity は runtime-actors、RunAttempt は runtime-execution-attempts が所有し、この辺は帰責可能なモジュール横断参加事実だけを記録する。
      protocol_or_resource_context:
        zh: 查询必须以 attempt_id、actor_id 和参与证据联合匹配，不从同一会话或目录成员关系推断。
        en: Queries must jointly match attempt_id, actor_id, and participation evidence rather than infer from the same session or directory membership.
        ja: 照会は attempt_id・actor_id・参加証拠を共同照合し、同一 session や名簿所属から推論しない。
    constraints: []
    source_claims:
      - claim-actor-design
    distinct_fact_rationale:
      zh: 该边记录一次尝试中的实际参与，不等同于会话成员关系或角色/能力绑定。
      en: This edge records actual participation in one attempt, not session membership or a role/capability binding.
      ja: 一試行での実参加を記録し、session 所属や役割・能力束縛とは異なる。
    layout_role: cross-link
    target: concept:RunAttempt
  - id: has_actor_capability_binding
    predicate: has_actor_capability_binding
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 具有能力绑定
      en: has actor capability binding
      ja: 能力束縛を持つ
    definitions:
      zh: has_actor_capability_binding 表示 Actor-has_binding 的目标进一步被确认为 ActorCapabilityBinding，从而说明该主体在指定范围、版本与条件下可使用或提供某能力；它不证明调用已发生，也不赋予超出有效授权的权限。
      en: has_actor_capability_binding states that the target of Actor-has_binding is specifically an ActorCapabilityBinding, showing that the Actor may use or provide a capability under stated scope, version, and conditions; it proves neither that an invocation occurred nor authority beyond effective authorization.
      ja: has_actor_capability_binding は Actor-has_binding の対象が ActorCapabilityBinding であり、主体が指定範囲・版・条件で能力を利用または提供できることを表す。呼出し発生も有効認可以上の権限も証明しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: binds_actor_capability
      labels:
        zh: 绑定主体能力
        en: binds actor capability
        ja: アクター能力を束縛する
    conditions:
      - id: has_actor_capability_binding-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the binding actor_id points to this Actor, the binding is classified as ActorCapabilityBinding, and its scope, version, conditions, and valid interval currently apply.
        explanations:
          zh: 仅当 binding 的 actor_id 指向该 Actor，binding 已归为 ActorCapabilityBinding，且其范围、版本、条件和有效期当前适用时成立。
          en: Assert only when the binding actor_id points to this Actor, the binding is classified as ActorCapabilityBinding, and its scope, version, conditions, and valid interval currently apply.
          ja: binding の actor_id がこの Actor を指し ActorCapabilityBinding に分類され、範囲・版・条件・有効期間が現在適用される時だけ成立する。
        source_claims:
          - claim-actor-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Actor 与 ActorCapabilityBinding 由 runtime-actors 拥有；工具定义与授权决定仍由各自模块拥有。
        en: Actor and ActorCapabilityBinding remain owned by runtime-actors; tool definitions and authorization decisions retain their own module ownership.
        ja: Actor と ActorCapabilityBinding は runtime-actors が所有し tool 定義と認可判断は各 module が所有する。
      protocol_or_resource_context:
        zh: 查询必须验证 binding 类型、actor_id、范围、版本与有效期，不从工具列表或调用记录推断。
        en: Queries must verify binding type, actor_id, scope, version, and validity rather than infer from a tool list or invocation record.
        ja: 照会は binding 型・actor_id・範囲・版・有効期間を検証し tool 一覧や呼出し記録から推論しない。
    constraints: []
    source_claims:
      - claim-actor-design
    distinct_fact_rationale:
      zh: 这是 Actor-has_binding 的能力特化查询边，不与工具调用、工具定义或授权决定合并。
      en: This is a capability-specialized query edge over Actor-has_binding and is not merged with tool invocation, tool definition, or authorization decision.
      ja: Actor-has_binding の能力特化照会辺で tool 呼出し・定義・認可判断と統合しない。
    layout_role: cross-link
    target: concept:ActorCapabilityBinding
  - id: has_actor_role_binding
    predicate: has_actor_role_binding
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 具有角色绑定
      en: has actor role binding
      ja: 役割束縛を持つ
    definitions:
      zh: has_actor_role_binding 表示 Actor-has_binding 的目标进一步被确认为 ActorRoleBinding，从而在具体任务、会话与有效期内说明主体承担某项责任角色；改变或结束该绑定不会改变 Actor 的规范身份。
      en: has_actor_role_binding states that the target of Actor-has_binding is specifically an ActorRoleBinding, showing which responsibility role the Actor bears for a concrete task, session, and valid interval; changing or ending the binding does not change canonical Actor identity.
      ja: has_actor_role_binding は Actor-has_binding の対象が ActorRoleBinding で、具体 task・session・有効期間に主体が担う責任役割を示す。束縛の変更・終了は Actor の正規同一性を変えない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: binds_actor_role
      labels:
        zh: 绑定主体角色
        en: binds actor role
        ja: アクター役割を束縛する
    conditions:
      - id: has_actor_role_binding-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the binding actor_id points to this Actor, the record is an ActorRoleBinding, and its role scope, validity, and conflict conditions currently hold.
        explanations:
          zh: 仅当 binding 的 actor_id 指向该 Actor、记录已归为 ActorRoleBinding，并且角色范围、有效期与冲突条件当前成立时建立。
          en: Assert only when the binding actor_id points to this Actor, the record is an ActorRoleBinding, and its role scope, validity, and conflict conditions currently hold.
          ja: binding の actor_id がこの Actor を指し ActorRoleBinding で、役割範囲・有効期間・競合条件が現在成立する時だけ確立する。
        source_claims:
          - claim-actor-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ActorRoleBinding 记录承担事实；角色定义仍由 orchestration 模块拥有，授权仍由 safety 模块判定。
        en: ActorRoleBinding records role-bearing facts; role definitions remain owned by orchestration and authorization remains decided by safety modules.
        ja: ActorRoleBinding は担務事実を記録し役割定義は orchestration、認可判断は safety module が所有する。
      protocol_or_resource_context:
        zh: 查询必须以 binding ID、actor_id、角色对象、范围和有效期联合解析。
        en: Queries must jointly resolve binding ID, actor_id, role object, scope, and valid interval.
        ja: 照会は binding ID・actor_id・役割対象・範囲・有効期間を共同解決する。
    constraints: []
    source_claims:
      - claim-actor-design
    distinct_fact_rationale:
      zh: 这是 Actor-has_binding 的角色特化查询边，不把角色名称变成永久 Actor 子类事实。
      en: This is a role-specialized query edge over Actor-has_binding and does not turn a role name into a permanent Actor-subtype fact.
      ja: Actor-has_binding の役割特化照会辺で役割名を恒久 Actor subtype 事実にしない。
    layout_role: cross-link
    target: concept:ActorRoleBinding
  - id: participates_in_session
    predicate: participates_in_session
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 参与运行会话
      en: participates in runtime session
      ja: 実行セッションに参加する
    definitions:
      zh: participates_in_session 表示某 Actor 在 RuntimeSession 的有效区间内实际发送、接收、执行、批准或观察了会话行动，并由 session_id 与 actor_id 的运行证据确认；仅被配置、可发现或列为候选不构成参与。
      en: participates_in_session states that an Actor actually sent, received, executed, approved, or observed session actions during a RuntimeSession's valid interval, confirmed by session_id and actor_id evidence; being configured, discoverable, or eligible does not constitute participation.
      ja: participates_in_session は Actor が RuntimeSession 有効期間に session 行為を実際に送信・受信・実行・承認・観測し session_id と actor_id 証拠で確認されることを表す。設定・発見可能・候補だけでは参加でない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: has_session_participant
      labels:
        zh: 具有会话参与主体
        en: has session participant
        ja: セッション参加者を持つ
    conditions:
      - id: participates_in_session-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when session trace, message, approval, or execution evidence jointly identifies actor_id, session_id, participation action, and a time inside the session interval.
        explanations:
          zh: 仅当会话 trace、消息、审批或执行记录同时标识该 actor_id、session_id、参与动作与时间落在会话区间内时成立。
          en: Assert only when session trace, message, approval, or execution evidence jointly identifies actor_id, session_id, participation action, and a time inside the session interval.
          ja: session trace・message・approval・execution 記録が actor_id・session_id・参加 action・session 区間内時刻を共同識別する時だけ成立する。
        source_claims:
          - claim-actor-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Actor 身份由 runtime-actors 拥有，RuntimeSession 生命周期由 runtime-system 拥有；该边只表达实际参与。
        en: Actor identity remains owned by runtime-actors and RuntimeSession lifecycle by runtime-system; this edge expresses actual participation only.
        ja: Actor identity は runtime-actors、RuntimeSession lifecycle は runtime-system が所有し、この辺は実参加だけを表す。
      protocol_or_resource_context:
        zh: 查询必须以 actor_id、session_id、动作与时间证据联合匹配，不从配置或发现记录推断。
        en: Queries must jointly match actor_id, session_id, action, and time evidence rather than infer from configuration or discovery records.
        ja: 照会は actor_id・session_id・action・time 証拠を共同照合し設定や discovery 記録から推論しない。
    constraints: []
    source_claims:
      - claim-actor-design
    distinct_fact_rationale:
      zh: 该边记录会话级实际参与，区别于一次 RunAttempt 关联、角色绑定和仅配置的候选。
      en: This edge records actual session-level participation, distinct from one RunAttempt association, a role binding, or a merely configured candidate.
      ja: session 級実参加を記録し一 RunAttempt 関連・役割束縛・設定候補と区別する。
    layout_role: cross-link
    target: concept:RuntimeSession
