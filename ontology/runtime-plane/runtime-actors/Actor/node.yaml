source_claims:
  - id: claim-actor-001
    source: eng-ont-prov-o
    supports: PROV-O defines Agent by responsibility for activities, entities, or other agents. Moonweave narrows Actor to an identifiable participant with attributable runtime responsibility.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-002
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK requires a human-readable Agent name but does not supply a cross-system identifier for every human, software service, model host, or tool service that can participate in a run. Moonweave therefore introduces actor_id as the stable audit identity that survives display-name and role changes; this identifier is a design inference, not an SDK field mapping.
    locator: Agents > Basic configuration > name; Context > RunContextWrapper
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-003
    source: lit-mas-wooldridge-jennings
    supports: Wooldridge and Jennings characterize an agent as a self-contained entity with control over its state and behavior and, for software agents, as a concurrently executing process that can communicate with peers. That entity-level continuity motivates actor_id, while the paper neither specifies an identifier field nor Moonweave's audit-key format.
    locator: 1 Introduction > 1.1 What is an Agent? > 1.1.1 A Weak Notion of Agency
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-004
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK distinguishes configured Agents, callable tools or MCP services, models, and human-in-the-loop participants as operationally different runtime parties. Moonweave normalizes those parties into actor_kind values so queries do not conflate an autonomous agent, a person, and an external service; the enum is Moonweave-owned.
    locator: Intro > Why use the Agents SDK; Agents > Basic configuration; Human-in-the-loop; Tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-005
    source: lit-mas-wooldridge-jennings
    supports: The paper explicitly discusses software agents as self-contained processes and interactions between agents and humans, establishing that bearer kind changes the operational interpretation of agency. Moonweave's human/software/external-service actor_kind partition is a local closed-world classification over that distinction, not a taxonomy asserted by the paper.
    locator: 1 Introduction > 1.1 What is an Agent? > 1.1.1 A Weak Notion of Agency
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-006
    source: eng-fw-openai-python-docs
    supports: OpenAI Agent configuration requires name and describes it as human-readable. Moonweave maps that presentation function to display_name while keeping actor_id as the identity key, so renaming an actor changes its label but not its audit identity.
    locator: Agents > Basic configuration > name
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-007
    source: lit-mas-wooldridge-jennings
    supports: "Wooldridge and Jennings define agents through behavioral and architectural properties rather than their labels. Moonweave uses that separation as a negative boundary: display_name aids human audit displays but cannot establish that two records denote the same Actor."
    locator: 1 Introduction > 1.1 What is an Agent? > A Weak Notion of Agency; A Stronger Notion of Agency
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-008
    source: eng-fw-openai-python-docs
    supports: The SDK assigns materially different interfaces to Agents, models, tools, MCP servers, and human approvals. Moonweave's actor-kind-consistency constraint prevents a record classified under one of those operational branches from carrying a contradictory actor_kind; the validation rule is ontology-owned.
    locator: Agents > Basic configuration; Models; Tools; Human-in-the-loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-009
    source: lit-mas-wooldridge-jennings
    supports: The paper separates a weak software-process notion of agency from stronger mentalistic and human-facing notions. Moonweave operationalizes that need for coherent categorization by requiring actor_kind to match the most specific Actor subtype; the paper does not prescribe this constraint syntax.
    locator: 1 Introduction > 1.1 What is an Agent? > 1.1.1 A Weak Notion of Agency; 1.1.2 A Stronger Notion of Agency
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-010
    source: eng-fw-openai-python-docs
    supports: OpenAI separates an Agent's configured identity from run context, tools, handoff targets, and other runtime-dependent behavior. Moonweave represents those scoped role or capability assignments as ActorBinding records and requires Actor-has_binding-ActorBinding when such an assignment is asserted; this relation is a Moonweave audit design, not an SDK object.
    locator: Agents > Basic configuration; Context; Dynamic instructions
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-011
    source: lit-mas-wooldridge-jennings
    supports: Wooldridge and Jennings treat autonomy, social ability, and other properties as characteristics borne by an agent rather than as the agent's identity. Moonweave reifies time- and scope-bounded assignments of such responsibilities or capabilities in ActorBinding and connects them through has_binding; that reification is a local ontology decision.
    locator: 1 Introduction > 1.1 What is an Agent? > A Weak Notion of Agency; Other Attributes of Agency
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-012
    source: eng-ont-prov-o
    supports: PROV-O qualified Association separates the responsible Agent, the Activity, and a Role. Moonweave uses that qualified pattern to model a scoped ActorBinding instead of encoding mutable roles or authority as Actor identity.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-013
    source: eng-ont-prov-o
    supports: PROV-O qualified Association links an Activity to an Agent and can qualify the Agent's role. Moonweave specializes that pattern to an Actor's evidenced participation in one RunAttempt.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-014
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK distinguishes an Agent's configured or conditionally enabled tools from the tool calls emitted during a run. Moonweave attaches that availability to an Actor through a scoped ActorCapabilityBinding.
    locator: Agents > Basic configuration > tools; Tools > conditional enablement
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-015
    source: eng-ont-prov-o
    supports: PROV-O qualified Association represents an Agent's Role in relation to an Activity. Moonweave materializes the scoped assignment as ActorRoleBinding and keeps the Actor's identity independent from role changes.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-016
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK Runner executes an agent loop for a run, while human approvals and handoffs can add accountable participants. Moonweave requires session-scoped evidence for each Actor rather than limiting participation to AgentActor.
    locator: Agents > Basic configuration; Running agents > The agent loop
    evidence_kind: design-inference
    confidence: high
    review_status: pending
