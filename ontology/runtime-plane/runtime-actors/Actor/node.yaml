schema: moonweave.ai/ontology-node/v1
id: Actor
kind: concept
status: accepted
labels:
  zh: 运行时参与者
  en: Runtime actor
  ja: ランタイムアクター
semantics:
  short_definition:
    zh: 对运行时工作承担责任的 Moonweave 本地主体。
    en: A Moonweave local principal that bears responsibility for runtime work.
    ja: ランタイム作業に責任を負う Moonweave ローカル主体。
  definition:
    zh: Actor 是与 PROV-O Agent 责任模型对齐的 Moonweave 本地责任超类型。其 actor_id 本地且持久，不是 A2A AgentCard、MCP host/client/server 角色、OpenTelemetry service.name 或 service.instance.id、CloudEvents source，也不是一次 Execution 发生。HumanActor 与 SoftwareActor 是其受控子类，分别对应 W3C PROV-O 的 Person 与 SoftwareAgent 投影边界。
    en: Actor is Moonweave's local responsibility supertype aligned with the PROV-O Agent responsibility model. Its actor_id is local and durable; it is not an A2A AgentCard, an MCP host/client/server role, an OpenTelemetry service.name or service.instance.id, a CloudEvents source, or an execution occurrence. HumanActor and SoftwareActor are its controlled subtypes, corresponding to W3C PROV-O Person and SoftwareAgent projection boundaries.
    ja: Actor は PROV-O Agent 責任モデルに整合する Moonweave ローカル責任のスーパータイプである。actor_id はローカルで永続的であり、A2A AgentCard、MCP host/client/server ロール、OpenTelemetry service.name または service.instance.id、CloudEvents source、Execution 発生ではない。HumanActor と SoftwareActor はその管理されたサブタイプで、W3C PROV-O の Person と SoftwareAgent 投影境界に対応する。
  why_needed:
    zh: 稳定的本地主体使责任与授权在端点、部署与遥测变化后仍可追溯；若把观测值或协议字段当作 actor_id，历史归因会在基础设施轮换时断裂。
    en: A stable local principal preserves responsibility and authorization across endpoint, deployment, and telemetry changes; treating observation values or protocol fields as actor_id breaks historical attribution when infrastructure rotates.
    ja: 安定したローカル主体により、エンドポイント、デプロイ、テレメトリーの変化後も責任と認可を追跡できる。観測値やプロトコルフィールドを actor_id とすると、インフラ轮换時に履歴帰属が断ち切られる。
  includes:
    - zh: Moonweave 可在多次 Execution 间归因的人类与软件参与者。
      en: Human and software participants that Moonweave can attribute work to across executions.
      ja: Moonweave が複数 Execution にまたいで作業を帰属できる人間とソフトウェア参加者。
  excludes:
    - zh: A2A 发现文档、MCP 连接组件、遥测资源、事件上下文、模型资产、trace 或单次 Activity。
      en: An A2A discovery document, MCP connection component, telemetry resource, event context, model asset, trace, or individual activity.
      ja: A2A 発見文書、MCP 接続コンポーネント、テレメトリーリソース、イベント文脈、モデル資産、trace、個別 Activity。
  semantic_kind: agent
  aliases: [local principal, responsible participant]
engineering:
  explanation:
    zh: 注册与归因 API 使用 actor_id 加 actor_kind 本地分类。Execution、trace 与外部协议记录可引用 Actor，但不得通过复制原生字段来供应 actor_id；引用须指向已注册的本地记录。
    en: Actor registration and attribution APIs use actor_id plus local actor_kind classification. Executions, traces, and external protocol records may reference an Actor but must not supply actor_id by copying a native field; references must point to a registered local record.
    ja: 登録と帰属 API は actor_id と actor_kind のローカル分類を用いる。Execution、trace、外部プロトコル記録は Actor を参照できるが、ネイティブフィールドの複製で actor_id を供給してはならない。参照は登録済みローカル記録を指す必要がある。
  typical_input:
    - description:
        zh: 本地参与者注册（对齐 PROV-O Agent 注册形状）
        en: Local actor registration aligned with PROV-O Agent registration shape
        ja: PROV-O Agent 登録形状に整合するローカル参加者登録
      format: '{"actor_id":"agent-reviewer-2","actor_kind":"SoftwareActor"}'
  typical_output:
    - description:
        zh: 本地责任记录
        en: Local actor responsibility record
        ja: ローカル責任記録
      format: '{"actor_id":"agent-reviewer-2","actor_kind":"SoftwareActor","responsibility_scope_ref":"scope:review"}'
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines Agent as an entity bearing responsibility for activities and other entities.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 参与者 ID
        en: Actor ID
        ja: アクター ID
      definitions:
        zh: 责任主体的 Moonweave 不透明标识符。
        en: Opaque Moonweave identifier for the responsible participant.
        ja: 責任主体の Moonweave 不透明識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: agent-reviewer-2
      source_claims: [claim-actor-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 本地 HumanActor 或 SoftwareActor 子类分类。
        en: Local HumanActor or SoftwareActor subtype classification.
        ja: ローカル HumanActor または SoftwareActor サブタイプ分類。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [HumanActor, SoftwareActor]
      example_value: SoftwareActor
      source_claims: [claim-actor-boundary]
  constraints:
    - id: actor-id-stable-local
      severity: error
      language: plain
      expression: actor_id must not be reassigned to a different responsible participant and must not be sourced from an external protocol or telemetry identifier.
      explanation:
        zh: 重新分配或复制原生字段会使历史归因不可信。
        en: Reassignment or native-field copying makes historical attribution unreliable.
        ja: 再割当やネイティブフィールド複製は履歴帰属を信頼できなくする。
      source_claims: [claim-actor-boundary]
  required_relations: []
examples:
  - id: actor-positive
    labels: {zh: "PROV-O SoftwareAgent 审查", en: "PROV-O SoftwareAgent review", ja: "PROV-O SoftwareAgent レビュー"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; Actor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; Actor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; Actor provenance graph."}
    field_values: {actor_id: prov-software-agent-review, actor_kind: SoftwareActor}
    related_node_ids: [Actor, SoftwareActor, Execution]
    related_relation_ids: []
    source_claims: [claim-actor-boundary]
  - id: actor-counterexample
    labels: {zh: "LangSmith span 当 Actor", en: "LangSmith span as Actor", ja: "LangSmith span を Actor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style Actor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style Actor.", ja: "Missing parent_run_id rejects LangSmith-style Actor."}
    field_values: {run_id: langsmith-tool-run-1}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-actor-boundary]
  - id: actor-boundary
    labels: {zh: "A2A AgentCard 名边界", en: "A2A AgentCard name boundary", ja: "A2A AgentCard 名境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Actor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Actor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {agent_card_name: reviewer}
    related_node_ids: [A2AAgentCard]
    related_relation_ids: []
    source_claims: [claim-actor-boundary]
  - id: actor-instance
    labels: {zh: "OpenAI triage agent 实例", en: "OpenAI triage agent instance", ja: "OpenAI triage agent 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->Actor.", en: "Langfuse instance: trace+span+score->Actor.", ja: "Langfuse instance maps to Actor."}
    field_values: {actor_id: openai-triage-agent, actor_kind: SoftwareActor}
    related_node_ids: [Actor, AgentActor, Execution]
    related_relation_ids: []
    source_claims: [claim-actor-boundary]
parent_relation: null
relations: []
sources:
  - id: prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent, Person, SoftwareAgent, Entity, and Activity.
  - id: a2a-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines the server-published AgentCard discovery document.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server architecture, sessions, and capabilities.
  - id: otel-resource
    title: OpenTelemetry Resource Semantic Conventions
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: Defines telemetry resource attributes including service.name and service.instance.id.
source_claims:
  - id: claim-actor-boundary
    source: a2a-discovery
    supports: A2A AgentCard, MCP roles, and telemetry resource attributes are distinct from the Moonweave local responsibility identity.
    locator: Official specification boundary and Moonweave local projection
    evidence_kind: design-inference
    confidence: high

