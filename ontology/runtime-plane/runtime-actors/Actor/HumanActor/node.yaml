schema: moonweave.ai/ontology-node/v1
id: HumanActor
kind: concept
labels:
  zh: 人类参与主体
  en: human actor
  ja: 人間アクター
semantics:
  short_definition:
    zh: 人类参与主体是由自然人亲自实施或承担运行行动与决定的参与主体。
    en: A HumanActor is an Actor whose runtime actions or decisions are personally performed or borne by a natural person.
    ja: HumanActor は、実行上の行為または判断を自然人本人が実施し責任を負う Actor である。
  definition:
    zh: 人类参与主体是 Actor 的一种；其种差是运行中的意图、判断、批准、请求或责任最终归属于一个可识别自然人，即使交互经由账号或界面完成。用户账号、组织、角色名称和代表人的软件进程都不是该自然人本身。
    en: A HumanActor is an Actor distinguished by runtime intent, judgment, approval, request, or accountability ultimately belonging to an identifiable natural person, even when interaction occurs through an account or interface. A user account, organization, role name, or software process representing the person is not the person itself.
    ja: HumanActor は Actor の一種であり、アカウントや画面を介していても、実行上の意図、判断、承認、要求、責任が最終的に識別可能な自然人へ帰属する。利用者アカウント、組織、役割名、代理ソフトウェアプロセスは自然人そのものではない。
  why_needed:
    zh: 该类别使人工批准、人工反馈和责任追踪能够指向真实人员，同时不把账号、角色或自动化代理误认为人。
    en: This class lets approval, feedback, and accountability point to real people without mistaking accounts, roles, or automated proxies for humans.
    ja: この分類により承認、フィードバック、責任を実在の人へ向け、アカウント、役割、自動代理との混同を防ぐ。
  includes:
    - zh: 纳入通过界面、消息或签名身份真实提出请求、审核输出、批准操作或控制运行的自然人。
      en: Includes a natural person who actually requests, reviews, approves, or controls runtime through an interface, message, or signed identity.
      ja: 画面、メッセージ、署名識別子を通じて実際に要求、審査、承認、実行制御を行う自然人を含む。
  excludes:
    - zh: 不纳入服务账号、组织、团队、聊天用户名字符串、AgentActor 或代表人执行的机器人。
      en: Excludes service accounts, organizations, teams, username strings, AgentActor instances, and bots acting on a person's behalf.
      ja: サービスアカウント、組織、チーム、利用者名文字列、AgentActor、本人を代理するボットは含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 HumanActor 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating HumanActor, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: HumanActor 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to HumanActor.
      format: |-
        # Example HumanActor ingest
        { "human-actor_ref": "example-1" }
      source_claims:
        - claim-human-actor-design
  typical_output:
    - description: Moonweave-local HumanActor projection.
      format: '{ "schema_owner": "moonweave-local-design", "human-actor_id": "example-1" }'
      source_claims:
        - claim-human-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: HumanActor-example-positive-001
    labels:
      zh: PROV-O Person 人工审查
      en: PROV-O Person human review
      ja: PROV-O Person 人的レビュー
    descriptions:
      zh: W3C PROV-O prov:Person(human-reviewer-1) 关联 HumanReview Activity；承担审查责任，不是 Messages API role=user 消息发送者。
      en: W3C PROV-O prov:Person(human-reviewer-1) associated with HumanReview Activity; bears review responsibility, not Messages API role=user message sender.
      ja: PROV-O Person が HumanReview Activity に関連する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-human-001
      actor_kind: human
      display_name: Human participant
    related_node_ids:
      - HumanActor
      - AgentActor
    related_relation_ids:
      - HumanActor-may_review-AgentActor
    source_claims:
      - claim-human-actor-design
  - id: HumanActor-example-instance-001
    labels:
      zh: user message 发送者非 HumanActor
      en: User message sender not HumanActor
      ja: user message 送信者は HumanActor ではない
    descriptions:
      zh: Anthropic Messages role=user 消息发送者是 UserActor；HumanActor 是承担运行时责任的人（审查员/操作员）。
      en: Anthropic Messages role=user message sender is UserActor; HumanActor is person bearing runtime responsibility (reviewer/operator).
      ja: role=user は UserActor、审查责任者は HumanActor である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-human-001
      actor_kind: human
      display_name: Human participant
    related_node_ids:
      - HumanActor
    related_relation_ids: []
    source_claims:
      - claim-human-actor-design
  - id: HumanActor-example-boundary-001
    labels:
      zh: HumanActor 与 UserActor 边界
      en: HumanActor versus UserActor boundary
      ja: HumanActor と UserActor 境界
    descriptions:
      zh: HumanActor 泛化人类责任主体；UserActor 专指对话 user 角色；DeveloperRole/HumanOperatorRole 是 HumanActor 子类 runtime role。
      en: HumanActor generalizes human responsible principal; UserActor specifically dialogue user role; DeveloperRole/HumanOperatorRole are HumanActor subtype runtime roles.
      ja: HumanActor/UserActor/RuntimeRole は階層が異なる。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - HumanActor
      - AgentActor
      - SoftwareActor
    related_relation_ids:
      - HumanActor-may_review-AgentActor
    source_claims:
      - claim-human-actor-design
  - id: HumanActor-example-4
    labels:
      zh: 审查员 human-reviewer-1
      en: Reviewer human-reviewer-1
      ja: レビュアー human-reviewer-1
    descriptions:
      zh: HumanActor actor_id=human-reviewer-1、actor_kind=HumanActor、role_ref=ReviewerRole、associated_activity=review-exec-842。
      en: HumanActor actor_id=human-reviewer-1, actor_kind=HumanActor, role_ref=ReviewerRole, associated_activity=review-exec-842.
      ja: human-reviewer-1 HumanActor を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - HumanActor
    related_relation_ids: []
    source_claims:
      - claim-human-actor-vendor
      - claim-human-actor-design
parent_relation:
  id: HumanActor-is_a-Actor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行参与主体
    en: is a runtime actor
    ja: 実行アクターの一種である
  definitions:
    zh: HumanActor-is_a-Actor 表示每个 HumanActor 都是可识别的自然人，并在运行活动中以本人身份发起、控制、审核、批准或接收行动而承担责任；账户、组织、软件代理或姓名字符串都不是该子类。
    en: HumanActor-is_a-Actor states that every HumanActor is an identifiable natural person who bears responsibility by initiating, controlling, reviewing, approving, or receiving actions in a run under that person's identity; an account, organization, software proxy, or name string is not this subtype.
    ja: HumanActor-is_a-Actor は全 HumanActor が識別可能な自然人で、run で本人同一性により行為を開始・制御・審査・承認・受領し責任を負うことを表す。account、組織、software proxy、氏名文字列は該当しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有人类参与主体子类
      en: has human-actor subtype
      ja: HumanActor 下位型を持つ
  conditions:
    - id: HumanActor-is_a-Actor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object has verifiable natural-person identity and runtime or audit evidence attributes responsibility to that person rather than an account or proxy.
      explanations:
        zh: 仅当对象具有可核验的自然人身份，并有运行或审计证据把责任归于该人而不是其账户或代理时成立。
        en: Assert only when the object has verifiable natural-person identity and runtime or audit evidence attributes responsibility to that person rather than an account or proxy.
        ja: 対象が検証可能な自然人同一性を持ち、runtime または audit 証拠が account や proxy でなく本人へ責任を帰属する時だけ成立する。
      source_claims:
        - claim-human-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-human-actor-design
  distinct_fact_rationale:
    zh: 该边按自然人身份与责任分类，不把账户、组织、角色绑定或软件代理并入人类主体。
    en: The edge classifies natural-person identity and responsibility without merging accounts, organizations, role bindings, or software proxies into HumanActor.
    ja: 自然人同一性と責任で分類し account・組織・役割束縛・software proxy を HumanActor に統合しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: HumanActor-may_review-AgentActor
    predicate: may_review
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 可审核智能体行为
      en: may review agent actor
      ja: AgentActor を審査できる
    definitions:
      zh: HumanActor-may_review-AgentActor 表示在特定审核对象与时间，某 HumanActor 因有效 Reviewer ActorRoleBinding、无冲突条件及适用 PolicyDecision 而有资格审核目标 AgentActor 的行为；该边不表示所有人类天然拥有审核权。
      en: HumanActor-may_review-AgentActor states that, for a specific review object and time, a HumanActor is eligible to review the target AgentActor because of an effective Reviewer ActorRoleBinding, satisfied conflict rules, and an applicable PolicyDecision; it does not grant inherent review authority to all humans.
      ja: HumanActor-may_review-AgentActor は特定 review 対象と時点で HumanActor が有効 Reviewer ActorRoleBinding、競合条件充足、適用 PolicyDecision により対象 AgentActor を審査できることを表す。全人間への固有審査権ではない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: may_be_reviewed_by_human
      labels:
        zh: 可由人类审核
        en: may be reviewed by human
        ja: 人間に審査され得る
    conditions:
      - id: HumanActor-may_review-AgentActor-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when an effective Reviewer ActorRoleBinding covers the review object, a PolicyDecision permits the review, and no self-review, separation-of-duty, or expiry conflict exists.
        explanations:
          zh: 仅当有效 Reviewer ActorRoleBinding 覆盖该审核对象，PolicyDecision 允许审核，且不存在自审、职责分离或过期冲突时成立。
          en: Assert only when an effective Reviewer ActorRoleBinding covers the review object, a PolicyDecision permits the review, and no self-review, separation-of-duty, or expiry conflict exists.
          ja: 有効 Reviewer ActorRoleBinding が review 対象を覆い PolicyDecision が許可し自己審査・職務分離・失効 conflict がない時だけ成立する。
        source_claims:
          - claim-human-actor-design
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-human-actor-design
    distinct_fact_rationale:
      zh: 这是由角色绑定与策略共同推导的资格边，不是 HumanActor 子类边或已发生 ReviewActivity。
      en: This is an eligibility edge derived jointly from role binding and policy, not a HumanActor subtype edge or an already performed ReviewActivity.
      ja: 役割束縛と policy から共同導出する資格辺で HumanActor subtype や実施済み ReviewActivity ではない。
    layout_role: cross-link
    target: concept:AgentActor
