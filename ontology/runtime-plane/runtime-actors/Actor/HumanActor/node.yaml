relations:
  - id: HumanActor-may_review-AgentActor
    predicate: may_review
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 可审核智能体行为
      en: may review agent actor
      ja: AgentActor を審査できる
    definitions:
      zh: HumanActor-may_review-AgentActor 表示在特定审核对象与时间，某 HumanActor 因有效 Reviewer ActorRoleBinding、无冲突条件及适用 PolicyDecision 而有资格审核目标 AgentActor 的行为；该边不表示所有人类天然拥有审核权。
      en: HumanActor-may_review-AgentActor states that, for a specific review object and time, a HumanActor is eligible to review the target AgentActor because of an effective Reviewer ActorRoleBinding, satisfied conflict rules, and an applicable PolicyDecision; it does not grant inherent review authority to all humans.
      ja: HumanActor-may_review-AgentActor は特定 review 対象と時点で HumanActor が有効 Reviewer ActorRoleBinding、競合条件充足、適用 PolicyDecision により対象 AgentActor を審査できることを表す。全人間への固有審査権ではない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: may_be_reviewed_by_human
      labels:
        zh: 可由人类审核
        en: may be reviewed by human
        ja: 人間に審査され得る
    conditions:
      - id: HumanActor-may_review-AgentActor-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when an effective Reviewer ActorRoleBinding covers the review object, a PolicyDecision permits the review, and no self-review, separation-of-duty, or expiry conflict exists.
        explanations:
          zh: 仅当有效 Reviewer ActorRoleBinding 覆盖该审核对象，PolicyDecision 允许审核，且不存在自审、职责分离或过期冲突时成立。
          en: Assert only when an effective Reviewer ActorRoleBinding covers the review object, a PolicyDecision permits the review, and no self-review, separation-of-duty, or expiry conflict exists.
          ja: 有効 Reviewer ActorRoleBinding が review 対象を覆い PolicyDecision が許可し自己審査・職務分離・失効 conflict がない時だけ成立する。
        source_claims:
          - claim-human-actor-004
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: HumanActor-may_review-AgentActor-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 可审核智能体行为正例
          en: "Positive case: may review agent actor"
          ja: AgentActor を審査できるの正例
        scenario_id: null
        descriptions:
          zh: h-411 的 reviewer-binding 覆盖 audit-agent-01 的 release-4 行为，策略允许且 h-411 未参与该智能体配置。
          en: h-411's reviewer binding covers audit-agent-01 behavior for release-4, policy allows the review, and h-411 did not configure that agent.
          ja: h-411 の reviewer binding は release-4 の audit-agent-01 行動を覆い policy は許可し h-411 は agent 設定に関与していない。
        field_values: {}
        related_node_ids:
          - HumanActor
          - AgentActor
        related_relation_ids:
          - HumanActor-may_review-AgentActor
        expected_result:
          zh: 在 release-4 审核范围内建立 h-411 may_review audit-agent-01。
          en: Assert h-411 may_review audit-agent-01 within the release-4 review scope.
          ja: release-4 review 範囲で h-411 may_review audit-agent-01 を確立する。
        why_valid_or_invalid:
          zh: 角色、对象、策略、有效期和利益冲突检查都已闭合。
          en: Role, object, policy, validity, and conflict checks all close.
          ja: 役割・対象・policy・有効期間・利益 conflict 検査が全て閉じる。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-human-actor-004
      - id: HumanActor-may_review-AgentActor-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 可审核智能体行为边界例
          en: "Boundary case: may review agent actor"
          ja: AgentActor を審査できるの境界例
        scenario_id: null
        descriptions:
          zh: h-310 是 audit-agent-01 的配置作者，虽然也是 HumanActor，但 no-self-review 条件禁止其审核 release-4。
          en: h-310 authored audit-agent-01's configuration; although a HumanActor, the no-self-review condition forbids reviewing release-4.
          ja: h-310 は audit-agent-01 設定作者で HumanActor だが no-self-review 条件により release-4 審査は禁止される。
        field_values: {}
        related_node_ids:
          - HumanActor
          - AgentActor
        related_relation_ids:
          - HumanActor-may_review-AgentActor
        expected_result:
          zh: 拒绝 h-310 may_review audit-agent-01。
          en: Reject h-310 may_review audit-agent-01.
          ja: h-310 may_review audit-agent-01 を拒否する。
        why_valid_or_invalid:
          zh: HumanActor 类型本身不授予审核权限，冲突策略可否决角色资格。
          en: HumanActor membership itself grants no review authority, and conflict policy can deny role eligibility.
          ja: HumanActor 所属自体は審査権を与えず conflict policy が役割資格を否定できる。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-human-actor-004
    source_claims:
      - claim-human-actor-004
    distinct_fact_rationale:
      zh: 这是由角色绑定与策略共同推导的资格边，不是 HumanActor 子类边或已发生 ReviewActivity。
      en: This is an eligibility edge derived jointly from role binding and policy, not a HumanActor subtype edge or an already performed ReviewActivity.
      ja: 役割束縛と policy から共同導出する資格辺で HumanActor subtype や実施済み ReviewActivity ではない。
    layout_role: cross-link
    review_status: accepted
    target: concept:AgentActor
