    source: src-openai-assistants
    supports: runtime-actors vendor evidence supports HumanActor identity and boundary mapping.
    locator: HumanActor integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-human-actor-design
    source: src-runtime-actors-design
    supports: Moonweave HumanActor concept boundary within runtime-actors.
    locator: HumanActor boundary
    evidence_kind: design-inference
    confidence: high
