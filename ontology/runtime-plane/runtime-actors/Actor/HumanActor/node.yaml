schema: moonweave.ai/ontology-node/v1
id: HumanActor
kind: concept
status: accepted
labels:
  zh: 人类参与主体
  en: human actor
  ja: 人間アクター
semantics:
  short_definition:
    zh: 人类参与主体是由自然人亲自实施或承担运行行动与决定的参与主体。
    en: A HumanActor is an Actor whose runtime actions or decisions are personally performed or borne by a natural person.
    ja: HumanActor は、実行上の行為または判断を自然人本人が実施し責任を負う Actor である。
  definition:
    zh: 人类参与主体是 Actor 的一种；其种差是运行中的意图、判断、批准、请求或责任最终归属于一个可识别自然人，即使交互经由账号或界面完成。用户账号、组织、角色名称和代表人的软件进程都不是该自然人本身。
    en: A HumanActor is an Actor distinguished by runtime intent, judgment, approval, request, or accountability ultimately belonging to an identifiable natural person, even when interaction occurs through an account or interface. A user account, organization, role name, or software process representing the person is not the person itself.
    ja: HumanActor は Actor の一種であり、アカウントや画面を介していても、実行上の意図、判断、承認、要求、責任が最終的に識別可能な自然人へ帰属する。利用者アカウント、組織、役割名、代理ソフトウェアプロセスは自然人そのものではない。
  why_needed:
    zh: 该类别使人工批准、人工反馈和责任追踪能够指向真实人员，同时不把账号、角色或自动化代理误认为人。
    en: This class lets approval, feedback, and accountability point to real people without mistaking accounts, roles, or automated proxies for humans.
    ja: この分類により承認、フィードバック、責任を実在の人へ向け、アカウント、役割、自動代理との混同を防ぐ。
  includes:
    - zh: 纳入通过界面、消息或签名身份真实提出请求、审核输出、批准操作或控制运行的自然人。
      en: Includes a natural person who actually requests, reviews, approves, or controls runtime through an interface, message, or signed identity.
      ja: 画面、メッセージ、署名識別子を通じて実際に要求、審査、承認、実行制御を行う自然人を含む。
  excludes:
    - zh: 不纳入服务账号、组织、团队、聊天用户名字符串、AgentActor 或代表人执行的机器人。
      en: Excludes service accounts, organizations, teams, username strings, AgentActor instances, and bots acting on a person's behalf.
      ja: サービスアカウント、組織、チーム、利用者名文字列、AgentActor、本人を代理するボットは含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: HumanActor-example-positive-001
    kind: positive
    labels:
      zh: 人类参与主体正例
      en: Positive example of human actor
      ja: 人間アクターの正例
    scenario_id: null
    descriptions:
      zh: 员工 h-204 通过已认证控制台审阅调用参数并批准付款工具；审计日志把决定归到该员工身份。
      en: Employee h-204 reviews call arguments in an authenticated console and approves the payment tool; the audit log attributes the decision to that employee identity.
      ja: 従業員 h-204 が認証済み画面で呼出引数を審査して支払いツールを承認し、監査ログが判断を本人へ帰属させる。
    field_values:
      actor_id: actor-human-001
      actor_kind: human
      display_name: Human participant
    related_node_ids:
      - HumanActor
      - AgentActor
    related_relation_ids:
      - HumanActor-may_review-AgentActor
    expected_result:
      zh: h-204 归类为 HumanActor，并可在该时段承担 HumanOperator 角色。
      en: h-204 is classified as HumanActor and may bear the HumanOperator role during that interval.
      ja: h-204 は HumanActor に分類され、その期間に HumanOperator 役割を持ち得る。
    why_valid_or_invalid:
      zh: 批准判断和责任可追溯到一个自然人，而不是仅追到界面或账号。
      en: The approval judgment and accountability resolve to a natural person rather than only to an interface or account.
      ja: 承認判断と責任が画面やアカウントだけでなく自然人へ解決される。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-human-actor-001
  - id: HumanActor-example-instance-001
    kind: instance
    labels:
      zh: 人类参与主体结构化实例
      en: Structured instance of human actor
      ja: 人間アクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-human-001 是名为 Human participant 的已认证员工；她在 approval-204 中亲自检查付款参数并作出批准决定，审计记录把责任解析到该自然人。
      en: actor-human-001 is the authenticated employee named Human participant; she personally inspects payment arguments and approves approval-204, with the audit record resolving accountability to that natural person.
      ja: actor-human-001 は Human participant という認証済み従業員で、approval-204 の支払い引数を本人が確認して承認し、監査記録は責任をその自然人へ解決します。
    field_values:
      actor_id: actor-human-001
      actor_kind: human
      display_name: Human participant
    related_node_ids:
      - HumanActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 HumanActor 的继承结构，判断与责任属于自然人的种差成立，实例不进入图节点集合。
      en: The fields satisfy HumanActor's inherited structure, the natural-person judgment and accountability differentia holds, and the instance is not added to the graph node set.
      ja: 項目は HumanActor の継承構造を満たし、判断と責任が自然人に属する種差が成立し、instance は graph node 集合へ追加されません。
    why_valid_or_invalid:
      zh: actor_kind 为 human，actor_id 可追溯到作出决定的本人；控制台、账号与凭证只承载交互，不替代人的身份。
      en: actor_kind is human and actor_id traces to the person who made the decision; the console, account, and credential mediate interaction but do not replace human identity.
      ja: actor_kind は human で、actor_id は判断した本人へ追跡でき、console、account、credential は対話を媒介するだけで人の identity を置換しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-human-actor-001
  - id: HumanActor-example-boundary-001
    kind: boundary
    labels:
      zh: 人类参与主体边界例
      en: Boundary case for human actor
      ja: 人間アクターの境界例
    scenario_id: null
    descriptions:
      zh: 服务账号 user-alice 每晚自动调用报表工具，但凭据由调度服务持有，运行中没有 Alice 本人作出决定。
      en: Service account user-alice invokes a report tool nightly, but credentials are held by a scheduler and no person named Alice makes a runtime decision.
      ja: サービスアカウント user-alice が毎晩報告ツールを呼ぶが、資格情報はスケジューラが保持し、実行中に Alice 本人は判断しない。
    field_values: {}
    related_node_ids:
      - HumanActor
      - AgentActor
      - SoftwareActor
    related_relation_ids:
      - HumanActor-may_review-AgentActor
    expected_result:
      zh: 实际调度进程归为 SoftwareActor；账号名称不能建立 HumanActor。
      en: The scheduler process is a SoftwareActor; the account name does not establish a HumanActor.
      ja: 実際のスケジューラプロセスは SoftwareActor であり、アカウント名だけでは HumanActor を成立させない。
    why_valid_or_invalid:
      zh: 自然人分类需要人的实际参与与责任归属，而不是具有人名形式的技术凭据。
      en: Human classification requires actual personal participation and accountability, not a technical credential formatted like a person's name.
      ja: 人間分類には本人の実参加と責任帰属が必要で、人名形式の技術資格情報では足りない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-human-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SoftwareActor
    shared_parent_concept_id: Actor
    differentia:
      zh: 共享父节点对照：父节点 Actor：HumanActor（semantic kind=entity，骨架 HumanActor-is_a-Actor）；SoftwareActor（semantic kind=entity，骨架 SoftwareActor-is_a-Actor）。双端条件：HumanActor 条件：“人类参与主体是一种由自然人承担、能够提出请求、执行操作、审核、批准或纠正系统工作的运行参与主体”；SoftwareActor 条件：“软件参与主体是一种运行参与主体；其区分条件是：它是一种由可执行软件、服务或智能体进程承担，能够接收输入、采取动作并留下可追踪身份的运行参与主体”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent Actor: HumanActor (semantic kind=entity, backbone HumanActor-is_a-Actor); SoftwareActor (semantic kind=entity, backbone SoftwareActor-is_a-Actor). Endpoint conditions: HumanActor condition: “A HumanActor is a runtime Actor borne by a natural person who can request, operate, review, approve, or correct system work”; SoftwareActor condition: “A SoftwareActor is a runtime Actor borne by executable software, a service, or an agent process that receives input, acts, and leaves a traceable identity”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 Actor：HumanActor（semantic kind=entity、バックボーン HumanActor-is_a-Actor）；SoftwareActor（semantic kind=entity、バックボーン SoftwareActor-is_a-Actor）。両端条件：HumanActor の条件：「人間アクターは実行アクターのうち、次の事実を定義条件とする対象です：HumanActor は自然人が担い、要求、操作、レビュー、承認、修正を行える実行 Actor である」；SoftwareActor の条件：「実行アクターに属するソフトウェアアクターは、次の事実を種差とします：SoftwareActor は実行ソフトウェア、サービス、エージェントプロセスが担い、入力を受け、行動し、追跡可能な同一性を残す実行 Actor である」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-human-actor-002
parent_relation:
  id: HumanActor-is_a-Actor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行参与主体
    en: is a runtime actor
    ja: 実行アクターの一種である
  definitions:
    zh: HumanActor-is_a-Actor 表示每个 HumanActor 都是可识别的自然人，并在运行活动中以本人身份发起、控制、审核、批准或接收行动而承担责任；账户、组织、软件代理或姓名字符串都不是该子类。
    en: HumanActor-is_a-Actor states that every HumanActor is an identifiable natural person who bears responsibility by initiating, controlling, reviewing, approving, or receiving actions in a run under that person's identity; an account, organization, software proxy, or name string is not this subtype.
    ja: HumanActor-is_a-Actor は全 HumanActor が識別可能な自然人で、run で本人同一性により行為を開始・制御・審査・承認・受領し責任を負うことを表す。account、組織、software proxy、氏名文字列は該当しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
