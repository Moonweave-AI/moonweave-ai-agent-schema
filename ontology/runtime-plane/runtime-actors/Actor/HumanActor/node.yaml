schema: moonweave.ai/ontology-node/v1
id: HumanActor
kind: concept
status: accepted
labels:
  zh: 人类运行时参与者
  en: Human runtime actor
  ja: 人間ランタイムアクター
semantics:
  short_definition:
    zh: 由人类个人承担运行时责任的 Actor。
    en: An Actor whose responsibility is borne by a human person.
    ja: 人間個人がランタイム責任を負う Actor。
  definition:
    zh: HumanActor 是 Moonweave 对承担运行时责任的自然人的本地投影，与 PROV-O Person 对齐。其 actor_id 与 identity_provider_ref 是本地引用，不是复制的凭据、A2A 字段、MCP 会话值或遥测属性。它不等同于聊天消息作者字段、浏览器会话或匿名遥测主体。
    en: HumanActor is Moonweave's local projection of a person who bears runtime responsibility, aligned with PROV-O Person. Its actor_id and identity_provider_ref are local references rather than copied credentials, A2A fields, MCP session values, or telemetry attributes. It is not a chat-message author field, browser session, or anonymous telemetry principal.
    ja: HumanActor は PROV-O Person に整合する、ランタイム責任を負う自然人の Moonweave ローカル投影である。actor_id と identity_provider_ref は、複製された資格情報、A2A フィールド、MCP セッション値、テレメトリー属性ではなくローカル参照である。チャットメッセージ作者フィールド、ブラウザセッション、匿名テレメトリー主体ではない。
  why_needed:
    zh: 人工审批、所有权与审计需要可持久的责任人，但不能在责任记录中持久化秘密身份断言或令牌载荷。
    en: Human approval, ownership, and audit require a durable responsible person without persisting secret identity assertions or token payloads on the responsibility record.
    ja: 人的承認、所有権、監査には永続的な責任者が必要だが、責任記録に秘密の identity 主張やトークンペイロードを永続化してはならない。
  includes:
    - zh: 以本地责任记录表示的具名操作者、审查者、所有者和审批者。
      en: Named operators, reviewers, owners, and approvers represented by a local responsibility record.
      ja: ローカル責任記録で表される具名のオペレーター、レビュアー、所有者、承認者。
  excludes:
    - zh: 凭据、访问令牌、浏览器会话、聊天消息作者字段或匿名遥测主体。
      en: A credential, access token, browser session, chat-message author field, or anonymous telemetry principal.
      ja: 資格情報、アクセストークン、ブラウザセッション、チャットメッセージ作者フィールド、匿名テレメトリー主体。
  semantic_kind: agent
  aliases: [person, human principal]
engineering:
  explanation:
    zh: 投影接受本地 actor_id 与可选的不透明 identity_provider_ref。输出责任记录，从不输出或存储凭据与会话秘密；认证材料只能在外部系统中解析引用。
    en: The projection accepts a local actor_id and an optional opaque identity-provider reference. It emits a responsibility record and never emits or stores credentials or session secrets; authentication material resolves only in external systems via reference.
    ja: 投影はローカル actor_id と任意の不透明 identity-provider 参照を受け取る。責任記録を出力し、資格情報やセッション秘密を出力・保存しない。認証材料は参照経由でのみ外部システムで解決される。
  typical_input:
    - description:
        zh: 人类责任注册（PROV-O Person 本地投影）
        en: Human responsibility registration as a PROV-O Person local projection
        ja: PROV-O Person ローカル投影としての人間責任登録
      format: '{"actor_id":"operator-lin","identity_provider_ref":"idp:employee-204"}'
  typical_output:
    - description:
        zh: 本地人类责任记录
        en: Local human responsibility record
        ja: ローカル人間責任記録
      format: '{"actor_id":"operator-lin","actor_kind":"HumanActor","identity_provider_ref":"idp:employee-204"}'
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines Person as a specialization of Agent.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 人类参与者 ID
        en: Human actor ID
        ja: 人間アクター ID
      definitions:
        zh: 自然人的本地稳定责任标识符。
        en: Local stable responsibility identifier for a person.
        ja: 自然人のローカル安定責任識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: operator-lin
      source_claims: [claim-human-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 固定为 HumanActor，以保留继承的人类责任参与者类别。
        en: Fixed to HumanActor to retain the inherited human responsibility-actor category.
        ja: 継承した人間責任アクターの種別を保持するため HumanActor に固定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [HumanActor]
      example_value: HumanActor
      source_claims: [claim-human-boundary]
    - id: identity_provider_ref
      labels:
        zh: 身份提供方引用
        en: Identity-provider reference
        ja: アイデンティティプロバイダー参照
      definitions:
        zh: 指向权威身份记录的不透明引用，绝不是凭据或断言载荷。
        en: Opaque reference to an authoritative identity record, never a credential or assertion payload.
        ja: 権威ある identity 記録への不透明参照であり、資格情報や assertion ペイロードではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: idp:employee-204
      source_claims: [claim-human-boundary]
  constraints:
    - id: human-actor-no-secret-identity-data
      severity: error
      language: plain
      expression: identity_provider_ref must be opaque; credentials, tokens, claims payloads, and session identifiers must not be stored on HumanActor.
      explanation:
        zh: 责任归因需要引用，而不是敏感认证材料。
        en: Responsibility attribution needs a reference, not sensitive authentication material.
        ja: 責任帰属には参照が必要であり、機微な認証材料ではない。
      source_claims: [claim-human-boundary]
  required_relations: [HumanActor-specializes-Actor]
examples:
  - id: humanactor-positive
    labels: {zh: "PROV-O Person 人工审查", en: "PROV-O Person human review", ja: "PROV-O Person 人的レビュー"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; HumanActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; HumanActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; HumanActor provenance graph."}
    field_values: {actor_id: operator-lin, actor_kind: HumanActor, identity_provider_ref: idp:employee-204}
    related_node_ids: [HumanActor, Actor]
    related_relation_ids: []
    source_claims: [claim-human-boundary]
  - id: humanactor-counterexample
    labels: {zh: "user message 发送者非 HumanActor", en: "User message sender not HumanActor", ja: "user message 送信者は HumanActor ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style HumanActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style HumanActor.", ja: "Missing parent_run_id rejects LangSmith-style HumanActor."}
    field_values: {access_token: secret-value}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-human-boundary]
  - id: humanactor-boundary
    labels: {zh: "HumanActor 与 UserActor 边界", en: "HumanActor versus UserActor boundary", ja: "HumanActor と UserActor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; HumanActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; HumanActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {session_id: mcp-session-42}
    related_node_ids: [MCPSession]
    related_relation_ids: []
    source_claims: [claim-human-boundary]
  - id: humanactor-instance
    labels: {zh: "审查员 human-reviewer-1", en: "Reviewer human-reviewer-1", ja: "レビュアー human-reviewer-1"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->HumanActor.", en: "Langfuse instance: trace+span+score->HumanActor.", ja: "Langfuse instance maps to HumanActor."}
    field_values: {actor_id: operator-lin, actor_kind: HumanActor, identity_provider_ref: idp:employee-204}
    related_node_ids: [HumanActor, Actor]
    related_relation_ids: []
    source_claims: [claim-human-boundary]
parent_relation:
  id: HumanActor-specializes-Actor
  predicate: is_a
  target: concept:Actor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是人类运行时参与者
    en: is a human runtime actor
    ja: 人間ランタイムアクターである
  definitions:
    zh: 每个 HumanActor 都是由人类承担责任的 Actor。
    en: Every HumanActor is an Actor whose responsibility is borne by a person.
    ja: すべての HumanActor は人間が責任を負う Actor である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: [claim-human-boundary]
relations: []
sources:
  - id: prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent, Person, SoftwareAgent, Entity, and Activity.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server architecture, sessions, and capabilities.
source_claims:
  - id: claim-human-boundary
    source: mcp-architecture
    supports: MCP sessions are transport state; HumanActor is a separate Moonweave local responsibility projection and does not store credentials or session identifiers.
    locator: Official specification boundary and Moonweave local projection
    evidence_kind: design-inference
    confidence: high

