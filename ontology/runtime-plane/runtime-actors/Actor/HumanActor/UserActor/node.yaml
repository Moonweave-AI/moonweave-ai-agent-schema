schema: moonweave.ai/ontology-node/v1
id: UserActor
kind: concept
labels:
  zh: 用户参与者
  en: user actor
  ja: ユーザーアクター
semantics:
  short_definition:
    zh: 用户参与者是为满足自身目标而向智能体系统提出请求、提供输入或接收结果的人类参与主体。
    en: A UserActor is a HumanActor who requests, supplies input to, or receives results from an agent system in pursuit of that person's goal.
    ja: UserActor は自身の目的のためエージェントシステムへ要求・入力を与え、または結果を受ける HumanActor である。
  definition:
    zh: 用户参与者是 HumanActor 的一种角色限定子类；其种差是该自然人在特定交互或会话中作为需求与结果的受益或负责主体，提出目标、补充上下文或接收输出。用户账号只是身份凭据，代表用户的自动客户端是 SoftwareActor；同一自然人可在其他运行范围通过 ActorRoleBinding 承担 DeveloperRole、ReviewerRole 或 HumanOperatorRole，这些运行职责不会改变本次交互中的 UserActor 身份。
    en: A UserActor is a role-qualified HumanActor distinguished by being the beneficiary or accountable requester of a goal and result in a specified interaction or session, supplying objectives or context or receiving output. A user account is only a credential, and an automated client acting for the user is a SoftwareActor. In another run scope, the same person may hold DeveloperRole, ReviewerRole, or HumanOperatorRole through ActorRoleBinding; those run responsibilities do not alter the person's UserActor identity in this interaction.
    ja: UserActor は役割で限定された HumanActor であり、特定の対話・セッションで目標と結果の受益者または責任ある要求者となり、目的・文脈を与え、出力を受ける。利用者アカウントは資格情報にすぎず、利用者を代理する自動クライアントは SoftwareActor である。同じ自然人が別の実行範囲で ActorRoleBinding を介して DeveloperRole、ReviewerRole、HumanOperatorRole を担っても、この対話における UserActor の同一性は変わらない。
  why_needed:
    zh: 该类别把需求所有者与账号、代理软件和系统操作员分开，使输入授权、偏好和结果交付能够指向真实人员。
    en: This class separates the goal owner from accounts, proxy software, and system operators so input authority, preferences, and result delivery resolve to a real person.
    ja: この分類は目標所有者をアカウント、代理ソフトウェア、操作員から分け、入力権限、嗜好、結果配信を実在の人へ解決する。
  includes:
    - zh: 纳入在会话中提出问题或任务、补充个人上下文、确认目标并接收最终结果的自然人。
      en: Includes a natural person who asks a question or task, supplies personal context, confirms the goal, or receives the final result in a session.
      ja: セッションで質問・タスクを出し、個人文脈を補い、目標を確認し、最終結果を受ける自然人を含む。
  excludes:
    - zh: 不纳入用户账号记录、API 密钥、代表用户轮询结果的软件客户端、在该交互中仅承担 HumanOperatorRole 而不提出或受益于目标的自然人，以及未参与交互的受益组织。
      en: Excludes a user-account record, API key, software client polling on the user's behalf, a person who holds only HumanOperatorRole in the interaction without requesting or benefiting from its goal, and a beneficiary organization absent from the interaction.
      ja: 利用者アカウント記録、API キー、利用者を代理して結果を poll するソフトウェア、この対話では HumanOperatorRole だけを担い目標を要求せず受益もしない自然人、および対話に参加しない受益組織は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 UserActor 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating UserActor, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: UserActor 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to UserActor.
      format: |-
        # Example UserActor ingest
        { "user-actor_ref": "example-1" }
      source_claims:
        - claim-user-actor-design
  typical_output:
    - description: Moonweave-local UserActor projection.
      format: '{ "schema_owner": "moonweave-local-design", "user-actor_id": "example-1" }'
      source_claims:
        - claim-user-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: UserActor-example-positive-001
    labels:
      zh: Anthropic Messages role=user
      en: Anthropic Messages role=user
      ja: Anthropic Messages role=user
    descriptions:
      zh: Anthropic Messages API messages=[{role:"user", content:"Review this patch"}] 发送者映射 UserActor actor_id=user-alice-1，是对话输入方不是审查操作员。
      en: Anthropic Messages API messages=[{role:"user", content:"Review this patch"}] sender maps UserActor actor_id=user-alice-1, dialogue input party not review operator.
      ja: Anthropic role=user が UserActor である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-user-001
      actor_kind: human
      display_name: Requesting user
    related_node_ids:
      - UserActor
      - HumanActor
    related_relation_ids:
      - UserActor-is_a-HumanActor
    source_claims:
      - claim-user-actor-design
  - id: UserActor-example-instance-001
    labels:
      zh: OpenAI end-user id 当 UserActor
      en: OpenAI end-user id as UserActor
      ja: OpenAI end-user id を UserActor とする
    descriptions:
      zh: OpenAI metadata.end_user_id 是计费/滥用追踪字段，无对话 message 证据时不单独建模 UserActor。
      en: OpenAI metadata.end_user_id is billing/abuse tracking field; without dialogue message evidence do not alone model UserActor.
      ja: end_user_id だけでは UserActor にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-user-001
      actor_kind: human
      display_name: Requesting user
    related_node_ids:
      - UserActor
    related_relation_ids: []
    source_claims:
      - claim-user-actor-design
  - id: UserActor-example-boundary-001
    labels:
      zh: UserActor 与 HumanOperatorRole 边界
      en: UserActor versus HumanOperatorRole boundary
      ja: UserActor と HumanOperatorRole 境界
    descriptions:
      zh: UserActor 是对话 user 角色；HumanOperatorRole 是 HITL 审批操作员；同一自然人可兼有两者但 actor_id 必须分开。
      en: UserActor is dialogue user role; HumanOperatorRole is HITL approval operator; same person may have both but actor_id must be separate.
      ja: UserActor と HumanOperatorRole は actor_id を分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - UserActor
      - HumanActor
      - SoftwareActor
    related_relation_ids:
      - UserActor-is_a-HumanActor
    source_claims:
      - claim-user-actor-design
  - id: UserActor-example-4
    labels:
      zh: thread 用户消息发送者
      en: Thread user message sender
      ja: thread ユーザーメッセージ送信者
    descriptions:
      zh: UserActor actor_id=user-alice-1、thread_id=thread_abc、last_message_id=msg-user-12、sent_at=2026-01-15T09:00:00Z。
      en: UserActor actor_id=user-alice-1, thread_id=thread_abc, last_message_id=msg-user-12, sent_at=2026-01-15T09:00:00Z.
      ja: user-alice-1 UserActor を thread メッセージに関連付ける。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - UserActor
    related_relation_ids: []
    source_claims:
      - claim-user-actor-vendor
      - claim-user-actor-design
parent_relation:
  id: UserActor-is_a-HumanActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是具交互目标的人类主体
    en: is a goal-bearing user human actor
    ja: 対話目標を持つ人間アクターである
  definitions:
    zh: UserActor-is_a-HumanActor 表示在给定交互或会话中，某自然人通过 ActorRoleBinding 对请求目标、输入上下文或结果接收承担用户责任；这是有范围的交互角色，不等同于用户账户、API 客户端或代表该人的软件代理。
    en: UserActor-is_a-HumanActor states that, for a given interaction or session, a natural person bears user responsibility through an ActorRoleBinding for the request goal, supplied context, or receipt of the result; it is a scoped interaction role, not a user account, API client, or software proxy acting for that person.
    ja: UserActor-is_a-HumanActor は指定 interaction/session で自然人が ActorRoleBinding により request goal・提供 context・result 受領の user 責任を負うことを表す。範囲付き interaction 役割で user account・API client・代理 software ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有用户参与者子类
      en: has user-actor subtype
      ja: UserActor 下位型を持つ
  conditions:
    - id: UserActor-is_a-HumanActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies HumanActor and an effective User ActorRoleBinding connects that person to an identified request, session, or result responsibility.
      explanations:
        zh: 仅当对象先满足 HumanActor，且有效 User ActorRoleBinding 把该人连接到明确请求、会话或结果责任时成立。
        en: Assert only when the object first satisfies HumanActor and an effective User ActorRoleBinding connects that person to an identified request, session, or result responsibility.
        ja: 対象がまず HumanActor を満たし有効 User ActorRoleBinding が本人を明示 request・session・result 責任へ接続する時だけ成立する。
      source_claims:
        - claim-user-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-user-actor-design
  distinct_fact_rationale:
    zh: 该边是有效用户角色绑定支持的人类交互视图，不把账户、凭据或代理软件归入 HumanActor。
    en: The edge is a human interaction view backed by an effective user-role binding and does not classify accounts, credentials, or proxy software as HumanActor.
    ja: 有効 user-role binding に基づく human interaction 視点で account・credential・proxy software を HumanActor にしない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
