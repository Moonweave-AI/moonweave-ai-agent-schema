schema: moonweave.ai/ontology-node/v1
id: UserActor
kind: concept
status: accepted
labels:
  zh: 用户参与者
  en: user actor
  ja: ユーザーアクター
semantics:
  short_definition:
    zh: 用户参与者是为满足自身目标而向智能体系统提出请求、提供输入或接收结果的人类参与主体。
    en: A UserActor is a HumanActor who requests, supplies input to, or receives results from an agent system in pursuit of that person's goal.
    ja: UserActor は自身の目的のためエージェントシステムへ要求・入力を与え、または結果を受ける HumanActor である。
  definition:
    zh: 用户参与者是 HumanActor 的一种角色限定子类；其种差是该自然人在特定交互或会话中作为需求与结果的受益或负责主体，提出目标、补充上下文或接收输出。用户账号只是身份凭据，代表用户的自动客户端是 SoftwareActor；同一自然人可在其他运行范围通过 ActorRoleBinding 承担 DeveloperRole、ReviewerRole 或 HumanOperatorRole，这些运行职责不会改变本次交互中的 UserActor 身份。
    en: A UserActor is a role-qualified HumanActor distinguished by being the beneficiary or accountable requester of a goal and result in a specified interaction or session, supplying objectives or context or receiving output. A user account is only a credential, and an automated client acting for the user is a SoftwareActor. In another run scope, the same person may hold DeveloperRole, ReviewerRole, or HumanOperatorRole through ActorRoleBinding; those run responsibilities do not alter the person's UserActor identity in this interaction.
    ja: UserActor は役割で限定された HumanActor であり、特定の対話・セッションで目標と結果の受益者または責任ある要求者となり、目的・文脈を与え、出力を受ける。利用者アカウントは資格情報にすぎず、利用者を代理する自動クライアントは SoftwareActor である。同じ自然人が別の実行範囲で ActorRoleBinding を介して DeveloperRole、ReviewerRole、HumanOperatorRole を担っても、この対話における UserActor の同一性は変わらない。
  why_needed:
    zh: 该类别把需求所有者与账号、代理软件和系统操作员分开，使输入授权、偏好和结果交付能够指向真实人员。
    en: This class separates the goal owner from accounts, proxy software, and system operators so input authority, preferences, and result delivery resolve to a real person.
    ja: この分類は目標所有者をアカウント、代理ソフトウェア、操作員から分け、入力権限、嗜好、結果配信を実在の人へ解決する。
  includes:
    - zh: 纳入在会话中提出问题或任务、补充个人上下文、确认目标并接收最终结果的自然人。
      en: Includes a natural person who asks a question or task, supplies personal context, confirms the goal, or receives the final result in a session.
      ja: セッションで質問・タスクを出し、個人文脈を補い、目標を確認し、最終結果を受ける自然人を含む。
  excludes:
    - zh: 不纳入用户账号记录、API 密钥、代表用户轮询结果的软件客户端、在该交互中仅承担 HumanOperatorRole 而不提出或受益于目标的自然人，以及未参与交互的受益组织。
      en: Excludes a user-account record, API key, software client polling on the user's behalf, a person who holds only HumanOperatorRole in the interaction without requesting or benefiting from its goal, and a beneficiary organization absent from the interaction.
      ja: 利用者アカウント記録、API キー、利用者を代理して結果を poll するソフトウェア、この対話では HumanOperatorRole だけを担い目標を要求せず受益もしない自然人、および対話に参加しない受益組織は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: UserActor-example-positive-001
    kind: positive
    labels:
      zh: 用户参与者正例
      en: Positive example of user actor
      ja: ユーザーアクターの正例
    scenario_id: null
    descriptions:
      zh: 用户 h-552 在 session-91 中请求比较两份合同，说明风险偏好，并接收带引用的最终差异报告。
      en: User h-552 asks session-91 to compare two contracts, supplies risk preferences, and receives a final cited difference report.
      ja: 利用者 h-552 が session-91 に二契約の比較を要求し、リスク嗜好を与え、引用付き最終差分報告を受ける。
    field_values:
      actor_id: actor-user-001
      actor_kind: human
      display_name: Requesting user
    related_node_ids:
      - UserActor
      - HumanActor
    related_relation_ids:
      - UserActor-is_a-HumanActor
    expected_result:
      zh: h-552 在 session-91 的请求范围内归类为 UserActor。
      en: h-552 is classified as UserActor for the request scope of session-91.
      ja: h-552 は session-91 の要求範囲で UserActor に分類される。
    why_valid_or_invalid:
      zh: 该自然人拥有交互目标、提供任务上下文并接收其结果。
      en: The person owns the interaction goal, supplies task context, and receives its result.
      ja: 本人が対話目標を所有し、タスク文脈を与え、その結果を受ける。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-user-actor-001
  - id: UserActor-example-instance-001
    kind: instance
    labels:
      zh: 用户参与主体结构化实例
      en: Structured instance of user actor
      ja: ユーザーアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-user-001 是名为 Requesting user 的自然人请求者；她在 session-91 提交两份合同、说明风险偏好，并作为目标受益者接收带引用的差异报告。
      en: actor-user-001 is the natural-person requester named Requesting user; in session-91, she submits two contracts, supplies risk preferences, and receives the cited difference report as the goal beneficiary.
      ja: actor-user-001 は Requesting user という自然人 requester で、session-91 に二契約と risk preference を提出し、goal beneficiary として引用付き差分報告を受け取ります。
    field_values:
      actor_id: actor-user-001
      actor_kind: human
      display_name: Requesting user
    related_node_ids:
      - UserActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 UserActor 的继承结构，请求者与目标受益者种差在 session-91 范围成立，实例不会成为独立节点。
      en: The fields satisfy UserActor's inherited structure, requester and goal-beneficiary status holds for session-91, and the instance does not become an independent node.
      ja: 項目は UserActor の継承構造を満たし、requester と goal beneficiary の種差が session-91 範囲で成立し、instance は独立 node になりません。
    why_valid_or_invalid:
      zh: actor_kind 为 human，actor_id 指向拥有交互目标并接收结果的自然人；账号凭证与代办自动客户端不是此 UserActor。
      en: actor_kind is human and actor_id identifies the natural person who owns the interaction goal and receives the result; account credentials and an automated client acting on her behalf are not this UserActor.
      ja: actor_kind は human で、actor_id は interaction goal を所有して結果を受ける自然人を示し、account credential や代理 automated client はこの UserActor ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-user-actor-001
  - id: UserActor-example-boundary-001
    kind: boundary
    labels:
      zh: 用户参与者边界例
      en: Boundary case for user actor
      ja: ユーザーアクターの境界例
    scenario_id: null
    descriptions:
      zh: client-bot-8 使用 h-552 的授权令牌定时查询状态并下载报告，但该进程没有人的目标或受益身份。
      en: client-bot-8 uses h-552's authorization token to poll status and download a report, but the process has no personal goal or beneficiary identity.
      ja: client-bot-8 は h-552 の認可トークンで状態を定期照会して報告を取得するが、プロセス自体に人の目標や受益者識別はない。
    field_values: {}
    related_node_ids:
      - UserActor
      - HumanActor
      - SoftwareActor
    related_relation_ids:
      - UserActor-is_a-HumanActor
    expected_result:
      zh: client-bot-8 归类为 SoftwareActor；其代表关系不把它变成 UserActor。
      en: client-bot-8 is a SoftwareActor; representation of a user does not make it UserActor.
      ja: client-bot-8 は SoftwareActor であり、利用者代理関係で UserActor にはならない。
    why_valid_or_invalid:
      zh: UserActor 必须是承担目标与结果的人，自动客户端只是代理执行者。
      en: A UserActor must be the person who bears the goal and result; an automated client is only a proxy executor.
      ja: UserActor は目標と結果を負う人でなければならず、自動クライアントは代理実行者にすぎない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-user-actor-001
