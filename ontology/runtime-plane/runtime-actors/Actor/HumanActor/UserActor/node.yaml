schema: moonweave.ai/ontology-node/v1
id: UserActor
kind: concept
status: accepted
labels:
  zh: 用户运行时参与者
  en: User runtime actor
  ja: ユーザーランタイムアクター
semantics:
  short_definition:
    zh: 作为运行时工作请求者或受益人的 HumanActor。
    en: A HumanActor acting as a local requester or beneficiary of runtime work.
    ja: ランタイム作業のローカル要求者または受益者として機能する HumanActor。
  definition:
    zh: UserActor 是 Moonweave 对使用系统的自然人的本地责任与请求上下文投影。它不是协议消息角色、OpenAI SDK 输入项、MCP 客户端身份或 A2A AgentCard 消费者字段。它继承 HumanActor 的 actor_id 与 identity_provider_ref 契约，并追加可选 user_scope_ref 以限定租户或受益范围。
    en: UserActor is a local responsibility and request-context projection for a person using a system. It is not a protocol message role, an OpenAI SDK input item, an MCP client identity, or an A2A AgentCard consumer field. It inherits HumanActor actor_id and identity_provider_ref contracts and adds an optional user_scope_ref for tenant or beneficiary scope.
    ja: UserActor はシステムを利用する自然人のローカル責任と要求文脈投影である。プロトコルメッセージロール、OpenAI SDK 入力項目、MCP クライアント identity、A2A AgentCard 消費者フィールドではない。HumanActor の actor_id と identity_provider_ref 契約を継承し、テナントまたは受益者スコープ用の任意 user_scope_ref を追加する。
  why_needed:
    zh: 一次请求可以命名人类请求者或受益人，而不把该人与会话、单条消息或传输客户端混同。
    en: A request can name a human requester or beneficiary without conflating that person with a session, a message, or a transport client.
    ja: 要求は、その人物をセッション、メッセージ、トランスポートクライアントと混同せずに、人間の要求者または受益者を名指しできる。
  includes:
    - zh: 具有明确请求或受益范围的本地用户。
      en: Local users with an explicit request or beneficiary scope.
      ja: 明示的な要求または受益者スコープを持つローカルユーザー。
  excludes:
    - zh: 聊天消息角色、会话 ID、匿名浏览器标识、MCP 客户端或外部发现消费者。
      en: A chat-message role, session ID, anonymous browser identifier, MCP client, or external discovery consumer.
      ja: チャットメッセージロール、セッション ID、匿名ブラウザ識別子、MCP クライアント、外部発見消費者。
  semantic_kind: agent
  aliases: [requester, beneficiary]
engineering:
  explanation:
    zh: 本地投影将 actor_id 与 user_scope_ref 关联。请求消息与会话可链接到 UserActor，但其原生 ID 不得复制进 identity 字段；OpenAI Agents SDK 的 user 输入项只能作为请求证据引用。
    en: The local projection joins actor_id with user_scope_ref. Request messages and sessions may link to UserActor, but their native IDs are not copied into identity fields; OpenAI Agents SDK user input items remain request evidence references only.
    ja: ローカル投影は actor_id と user_scope_ref を結び付ける。要求メッセージとセッションは UserActor にリンクできるが、ネイティブ ID を identity フィールドへ複製してはならない。OpenAI Agents SDK の user 入力項目は要求証拠参照に留まる。
  typical_input:
    - description:
        zh: 作用域内用户请求上下文
        en: Scoped user request context
        ja: スコープ付きユーザー要求文脈
      format: '{"actor_id":"user-lin","user_scope_ref":"tenant:moonweave"}'
  typical_output:
    - description:
        zh: 本地用户责任投影
        en: Local user responsibility projection
        ja: ローカルユーザー責任投影
      format: '{"actor_id":"user-lin","actor_kind":"HumanActor","user_scope_ref":"tenant:moonweave"}'
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Provides the Person and Agent responsibility model used for the local projection.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 用户参与者 ID
        en: User actor ID
        ja: ユーザーアクター ID
      definitions:
        zh: 用于责任与请求上下文的本地稳定自然人标识符。
        en: Local stable person identifier for responsibility and request context.
        ja: 責任と要求文脈のためのローカル安定自然人識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: user-lin
      source_claims: [claim-user-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 固定为 HumanActor，以保留从 HumanActor 继承的人员责任类别。
        en: Fixed to HumanActor to retain the responsibility category inherited from HumanActor.
        ja: HumanActor から継承した責任種別を保持するため HumanActor に固定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [HumanActor]
      example_value: HumanActor
      source_claims: [claim-user-boundary]
    - id: user_scope_ref
      labels:
        zh: 用户作用域引用
        en: User scope reference
        ja: ユーザースコープ参照
      definitions:
        zh: 指向租户、工作区或受益范围的本地引用。
        en: Local reference to the tenant, workspace, or beneficiary scope for a request.
        ja: 要求のテナント、ワークスペース、または受益者スコープへのローカル参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: tenant:moonweave
      source_claims: [claim-user-boundary]
  constraints:
    - id: user-actor-not-message-or-session
      severity: error
      language: plain
      expression: Do not use a protocol message role, session ID, or MCP client identifier as actor_id; link those records to a UserActor instead.
      explanation:
        zh: 消息与传输状态是请求证据，UserActor 是本地自然人投影。
        en: Messages and transport state are request evidence, while UserActor is the local person projection.
        ja: メッセージとトランスポート状態は要求証拠であり、UserActor はローカル自然人投影である。
      source_claims: [claim-user-boundary]
  required_relations: [UserActor-specializes-HumanActor]
examples:
  - id: useractor-positive
    labels: {zh: "Anthropic Messages role=user", en: "Anthropic Messages role=user", ja: "Anthropic Messages role=user"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; UserActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; UserActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; UserActor provenance graph."}
    field_values: {actor_id: user-lin, actor_kind: HumanActor, user_scope_ref: tenant:moonweave}
    related_node_ids: [UserActor, HumanActor]
    related_relation_ids: []
    source_claims: [claim-user-boundary]
  - id: useractor-counterexample
    labels: {zh: "OpenAI end-user id 当 UserActor", en: "OpenAI end-user id as UserActor", ja: "OpenAI end-user id を UserActor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style UserActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style UserActor.", ja: "Missing parent_run_id rejects LangSmith-style UserActor."}
    field_values: {role: user}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-user-boundary]
  - id: useractor-boundary
    labels: {zh: "UserActor 与 HumanOperatorRole 边界", en: "UserActor versus HumanOperatorRole boundary", ja: "UserActor と HumanOperatorRole 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; UserActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; UserActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {client_id: mcp-client-7}
    related_node_ids: [MCPSession]
    related_relation_ids: []
    source_claims: [claim-user-boundary]
  - id: useractor-instance
    labels: {zh: "thread 用户消息发送者", en: "Thread user message sender", ja: "thread ユーザーメッセージ送信者"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->UserActor.", en: "Langfuse instance: trace+span+score->UserActor.", ja: "Langfuse instance maps to UserActor."}
    field_values: {actor_id: user-lin, actor_kind: HumanActor, user_scope_ref: tenant:moonweave}
    related_node_ids: [UserActor, HumanActor]
    related_relation_ids: []
    source_claims: [claim-user-boundary]
parent_relation:
  id: UserActor-specializes-HumanActor
  predicate: is_a
  target: concept:HumanActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是作为用户的 HumanActor
    en: is a human actor acting as a user
    ja: ユーザーとして機能する HumanActor である
  definitions:
    zh: 每个 UserActor 都是带请求者或受益人上下文的 HumanActor。
    en: Every UserActor is a HumanActor with a requester or beneficiary context.
    ja: すべての UserActor は要求者または受益者文脈を持つ HumanActor である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: [claim-user-boundary]
relations: []
sources:
  - id: prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent, Person, SoftwareAgent, Entity, and Activity.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server architecture, sessions, and capabilities.
  - id: a2a-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines the server-published AgentCard discovery document.
source_claims:
  - id: claim-user-boundary
    source: mcp-architecture
    supports: MCP client and session are connection architecture and state; UserActor is a Moonweave local person-and-request-context projection.
    locator: Official specification boundary and Moonweave local projection
    evidence_kind: design-inference
    confidence: high

