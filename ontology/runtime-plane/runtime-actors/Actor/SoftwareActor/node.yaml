      zh: OpenTelemetry resource attribute service.name=review-api 标识部署服务 SoftwareActor actor_id=review-api-worker；不是 trace span 名称。
      en: OpenTelemetry resource attribute service.name=review-api identifies deployed service SoftwareActor actor_id=review-api-worker; not trace span name.
      ja: OTel service.name が SoftwareActor を标识する。
    example_source:
