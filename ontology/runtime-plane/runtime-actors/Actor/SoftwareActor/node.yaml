source_claims:
  - id: claim-software-actor-001
    source: eng-ont-prov-o
    supports: PROV-O defines SoftwareAgent as running software and a subclass of Agent. Moonweave applies that execution and responsibility boundary to SoftwareActor.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-software-actor-002
    source: eng-fw-openai-python-docs
    supports: OpenAI Runner executes Agent software and tool integrations, whereas human-in-the-loop pauses that software until a person supplies approval or another decision. Moonweave uses this bearer distinction to keep SoftwareActor and HumanActor as sibling categories rather than inferring one from the role or interface used in a run.
    locator: Running agents > The agent loop; Human-in-the-loop > Approve or reject tool calls
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-software-actor-003
    source: eng-ont-prov-o
    supports: PROV-O defines SoftwareAgent as running software and a subclass of Agent. Moonweave applies that execution and responsibility boundary to SoftwareActor while excluding static software artifacts.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

