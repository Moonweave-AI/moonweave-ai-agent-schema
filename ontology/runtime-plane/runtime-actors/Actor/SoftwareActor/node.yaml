schema: moonweave.ai/ontology-node/v1
id: SoftwareActor
kind: concept
status: accepted
labels:
  zh: 软件参与主体
  en: software actor
  ja: ソフトウェアアクター
semantics:
  short_definition:
    zh: 软件参与主体是由正在运行的程序、进程或服务实施行动并承担技术责任的参与主体。
    en: A SoftwareActor is an Actor whose actions are performed by a running program, process, or service under a technical identity.
    ja: SoftwareActor は、稼働中のプログラム、プロセス、サービスが技術識別子の下で行為を実施する Actor である。
  definition:
    zh: 软件参与主体是 Actor 的一种；其种差是运行行动由可识别的软件执行体产生，该执行体能发起或接收调用、维护运行状态并在追踪中承担技术归属。源代码、模型权重、静态配置和未运行的服务描述不是软件参与主体。
    en: A SoftwareActor is an Actor distinguished by runtime actions produced by an identifiable software execution, capable of initiating or receiving calls, maintaining runtime state, and bearing technical attribution in traces. Source code, model weights, static configuration, and an unstarted service description are not SoftwareActor instances.
    ja: SoftwareActor は Actor の一種であり、識別可能なソフトウェア実行体が行為を生成し、呼出を開始または受領し、実行状態を維持し、追跡上の技術帰属を負う。ソースコード、モデル重み、静的設定、未起動サービス記述は SoftwareActor ではない。
  why_needed:
    zh: 该类别把自动行动归属到真实运行组件，并将运行者与其代码、配置、模型及人工所有者分开。
    en: This class attributes automated actions to the actual running component and separates the executor from its code, configuration, model, and human owner.
    ja: この分類は自動行為を実際の稼働コンポーネントへ帰属させ、実行者をコード、設定、モデル、人間所有者から分離する。
  includes:
    - zh: 纳入在运行中以进程、服务或代理身份接收任务、调用模型或工具并产生可追踪操作的软件执行体。
      en: Includes a software execution that receives work, invokes models or tools, and produces traceable operations under a process, service, or agent identity.
      ja: 実行中にプロセス、サービス、エージェント識別子で仕事を受け、モデルやツールを呼び、追跡可能な操作を生成するソフトウェア実行体を含む。
  excludes:
    - zh: 不纳入源代码仓库、容器镜像、Model、Agent 配置对象、工具规格或仅描述服务的 Agent Card。
      en: Excludes source repositories, container images, Model artifacts, Agent configuration objects, tool specifications, and Agent Cards that merely describe services.
      ja: ソースリポジトリ、コンテナイメージ、Model、Agent 設定オブジェクト、ツール仕様、サービスを記述するだけの Agent Card は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SoftwareActor-example-positive-001
    kind: positive
    labels:
      zh: 软件参与主体正例
      en: Positive example of software actor
      ja: ソフトウェアアクターの正例
    scenario_id: null
    descriptions:
      zh: runtime-agent-12 作为活跃进程接收任务、调用模型、请求检索工具并把每次操作写入追踪。
      en: runtime-agent-12 is an active process that receives a task, calls a model, requests a retrieval tool, and writes each operation to a trace.
      ja: runtime-agent-12 は稼働プロセスとしてタスクを受け、モデルを呼び、検索ツールを要求し、各操作を追跡へ書く。
    field_values:
      actor_id: actor-software-001
      actor_kind: software
      display_name: Agent runtime process
    related_node_ids:
      - SoftwareActor
      - Actor
    related_relation_ids:
      - SoftwareActor-is_a-Actor
    expected_result:
      zh: runtime-agent-12 归类为 SoftwareActor，并可进一步归为 AgentActor。
      en: runtime-agent-12 is a SoftwareActor and may be further classified as AgentActor.
      ja: runtime-agent-12 は SoftwareActor に分類され、さらに AgentActor に分類できる。
    why_valid_or_invalid:
      zh: 行动由有运行身份和状态的软件执行体实际产生，而不是由静态代码或配置产生。
      en: Actions are actually produced by a stateful software execution with runtime identity, not by static code or configuration.
      ja: 行為は実行識別子と状態を持つソフトウェア実行体が実際に生成し、静的コードや設定ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-software-actor-001
  - id: SoftwareActor-example-instance-001
    kind: instance
    labels:
      zh: 软件参与主体结构化实例
      en: Structured instance of software actor
      ja: ソフトウェアアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-software-001 是名为 Agent runtime process 的活跃进程 runtime-agent-12；它接收 task-918、保持会话状态、发出模型与工具请求，并把操作归属写入 trace-772。
      en: actor-software-001 is the active process runtime-agent-12 named Agent runtime process; it receives task-918, maintains session state, issues model and tool requests, and records action attribution in trace-772.
      ja: actor-software-001 は Agent runtime process という稼働 process runtime-agent-12 で、task-918 を受け、session state を保持し、model・tool request を発行して action attribution を trace-772 に記録します。
    field_values:
      actor_id: actor-software-001
      actor_kind: software
      display_name: Agent runtime process
    related_node_ids:
      - SoftwareActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 SoftwareActor 的继承结构，运行身份、状态与可归属行动种差成立，实例不生成独立图节点。
      en: The fields satisfy SoftwareActor's inherited structure, runtime identity, state, and attributable action hold, and the instance generates no independent graph node.
      ja: 項目は SoftwareActor の継承構造を満たし、runtime identity、state、帰属可能行為の種差が成立し、instance は独立 graph node を生成しません。
    why_valid_or_invalid:
      zh: actor_kind 为 software，actor_id 指向正在运行且产生行动的执行体，而不是源代码、模型权重、静态配置或未启动服务。
      en: actor_kind is software and actor_id identifies a running execution that produces actions rather than source code, model weights, static configuration, or an unstarted service.
      ja: actor_kind は software で、actor_id は source code、model weight、static configuration、未起動 service ではなく、行為を生成する稼働実行体を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-software-actor-001
  - id: SoftwareActor-example-boundary-001
    kind: boundary
    labels:
      zh: 软件参与主体边界例
      en: Boundary case for software actor
      ja: ソフトウェアアクターの境界例
    scenario_id: null
    descriptions:
      zh: 镜像 agent-runtime:v4 包含代码和依赖但尚未启动；它不能发起调用，也没有进程或服务身份。
      en: Image agent-runtime:v4 contains code and dependencies but has not started; it can initiate no calls and has no process or service identity.
      ja: イメージ agent-runtime:v4 はコードと依存を含むが未起動で、呼出を開始できずプロセスまたはサービス識別子もない。
    field_values: {}
    related_node_ids:
      - SoftwareActor
      - Actor
      - HumanActor
    related_relation_ids:
      - SoftwareActor-is_a-Actor
    expected_result:
      zh: 该镜像是部署制品，不是 SoftwareActor；启动后的进程才可能成为参与主体。
      en: The image is a deployment artifact, not a SoftwareActor; a started process may become the participant.
      ja: このイメージは配備成果物で SoftwareActor ではなく、起動後プロセスが参加主体になり得る。
    why_valid_or_invalid:
      zh: 软件参与主体要求实际运行和行动能力，静态可执行内容只提供实现。
      en: A SoftwareActor requires actual execution and action capacity; static executable content only supplies implementation.
      ja: SoftwareActor には実際の稼働と行為能力が必要で、静的実行内容は実装を提供するだけである。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-software-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: HumanActor
    shared_parent_concept_id: Actor
    differentia:
      zh: 共享父节点对照：父节点 Actor：SoftwareActor（semantic kind=entity，骨架 SoftwareActor-is_a-Actor）；HumanActor（semantic kind=entity，骨架 HumanActor-is_a-Actor）。双端条件：SoftwareActor 条件：“软件参与主体是一种运行参与主体；其区分条件是：它是一种由可执行软件、服务或智能体进程承担，能够接收输入、采取动作并留下可追踪身份的运行参与主体”；HumanActor 条件：“人类参与主体是一种由自然人承担、能够提出请求、执行操作、审核、批准或纠正系统工作的运行参与主体”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent Actor: SoftwareActor (semantic kind=entity, backbone SoftwareActor-is_a-Actor); HumanActor (semantic kind=entity, backbone HumanActor-is_a-Actor). Endpoint conditions: SoftwareActor condition: “A SoftwareActor is a runtime Actor borne by executable software, a service, or an agent process that receives input, acts, and leaves a traceable identity”; HumanActor condition: “A HumanActor is a runtime Actor borne by a natural person who can request, operate, review, approve, or correct system work”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 Actor：SoftwareActor（semantic kind=entity、バックボーン SoftwareActor-is_a-Actor）；HumanActor（semantic kind=entity、バックボーン HumanActor-is_a-Actor）。両端条件：SoftwareActor の条件：「実行アクターに属するソフトウェアアクターは、次の事実を種差とします：SoftwareActor は実行ソフトウェア、サービス、エージェントプロセスが担い、入力を受け、行動し、追跡可能な同一性を残す実行 Actor である」；HumanActor の条件：「人間アクターは実行アクターのうち、次の事実を定義条件とする対象です：HumanActor は自然人が担い、要求、操作、レビュー、承認、修正を行える実行 Actor である」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-software-actor-002
