      display_name: Agent runtime process
    related_node_ids:
      - SoftwareActor
      - Actor
    related_relation_ids:
      - SoftwareActor-is_a-Actor
    source_claims:
      - claim-software-actor-design
  - id: SoftwareActor-example-instance-001
    labels:
      zh: Span name 当 SoftwareActor
      en: Span name as SoftwareActor
      ja: Span name を SoftwareActor とする
    descriptions:
      zh: TraceSpan span_name=agent.tool_call 是单次操作名，不是长期 SoftwareActor 身份；span 不能写入 actor_id。
      en: TraceSpan span_name=agent.tool_call is single operation name, not long-lived SoftwareActor identity; span cannot be actor_id.
      ja: span_name は SoftwareActor ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-software-001
      actor_kind: software
      display_name: Agent runtime process
    related_node_ids:
      - SoftwareActor
    related_relation_ids: []
    source_claims:
      - claim-software-actor-design
  - id: SoftwareActor-example-boundary-001
    labels:
      zh: SoftwareActor 与 ModelActor 边界
      en: SoftwareActor versus ModelActor boundary
      ja: SoftwareActor と ModelActor 境界
    descriptions:
      zh: SoftwareActor 是软件责任主体；ModelActor 引用 GenerativeModel 资产；agent 进程 Actor 与 model 资产引用分离。
      en: SoftwareActor is software responsible principal; ModelActor references GenerativeModel asset; agent process Actor separated from model asset reference.
      ja: SoftwareActor と ModelActor は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - SoftwareActor
      - Actor
      - HumanActor
    related_relation_ids:
      - SoftwareActor-is_a-Actor
    source_claims:
      - claim-software-actor-design
  - id: SoftwareActor-example-4
    labels:
      zh: support-agent worker 实例
      en: support-agent worker instance
      ja: support-agent worker 事例
    descriptions:
      zh: SoftwareActor actor_id=support-agent-worker、service.name=support-agent-prod、deployment_ref=ecs/task:3。
      en: SoftwareActor actor_id=support-agent-worker, service.name=support-agent-prod, deployment_ref=ecs/task:3.
      ja: support-agent-worker SoftwareActor を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - SoftwareActor
    related_relation_ids: []
    source_claims:
      - claim-software-actor-vendor
      - claim-software-actor-design
parent_relation:
  id: SoftwareActor-is_a-Actor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行参与主体
    en: is a runtime actor
    ja: 実行アクターの一種である
  definitions:
    zh: SoftwareActor-is_a-Actor 表示每个 SoftwareActor 都是由正在运行的程序、进程或服务产生可归责行动的 Actor，并具有可追踪技术身份；源代码、容器镜像、Model、静态配置或服务描述不因可执行而成为该主体。
    en: SoftwareActor-is_a-Actor states that every SoftwareActor is an Actor whose attributable actions are produced by a running program, process, or service under a traceable technical identity; source code, container images, Models, static configuration, or service descriptions are not this subtype merely because they are executable.
    ja: SoftwareActor-is_a-Actor は全 SoftwareActor が追跡可能な技術同一性の下で実行中 program・process・service により帰責可能 action を生む Actor であることを表す。source code・container image・Model・静的設定・service 記述は実行可能なだけで該当しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有软件参与主体子类
      en: has software-actor subtype
      ja: SoftwareActor 下位型を持つ
  conditions:
    - id: SoftwareActor-is_a-Actor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object has an actual runtime identity, can initiate or receive actions, and trace evidence attributes actions to that technical identity.
      explanations:
        zh: 仅当对象具有实际运行身份、能够发起或接收行动，并且 trace 可把行动归于该技术身份时成立。
        en: Assert only when the object has an actual runtime identity, can initiate or receive actions, and trace evidence attributes actions to that technical identity.
        ja: 対象が実 runtime identity を持ち action を開始または受信でき trace が技術同一性へ action を帰属する時だけ成立する。
      source_claims:
        - claim-software-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-software-actor-design
  distinct_fact_rationale:
    zh: 该边按运行执行身份分类，不把代码、模型、配置或部署镜像平铺为 Actor。
    en: The edge classifies runtime execution identity and does not flatten code, models, configuration, or deployment images into Actor.
    ja: runtime execution identity で分類し code・model・設定・deployment image を Actor に平坦化しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
