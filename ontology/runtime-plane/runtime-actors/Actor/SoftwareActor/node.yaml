schema: moonweave.ai/ontology-node/v1
id: SoftwareActor
kind: concept
status: accepted
labels:
  zh: 软件运行时参与者
  en: Software runtime actor
  ja: ソフトウェアランタイムアクター
semantics:
  short_definition:
    zh: 由软件系统承担运行时责任的 Actor。
    en: An Actor whose runtime responsibility is borne by a software system.
    ja: ソフトウェアシステムがランタイム責任を負う Actor。
  definition:
    zh: SoftwareActor 是与 PROV-O SoftwareAgent 对齐的、承担责任的软件系统 Moonweave 本地投影。仅因使用 MCP 协议并不等于 MCP server 或 client，仅因发布服务并不等于 A2A AgentCard，也不等于 OpenTelemetry service.name、service.instance.id 或 CloudEvents source。AgentActor、ModelActor 等是其进一步细化的子类。
    en: SoftwareActor is Moonweave's local projection of a responsibility-bearing software system, aligned with PROV-O SoftwareAgent. Speaking MCP does not make it an MCP server or client; advertising a service does not make it an A2A AgentCard; it is not an OpenTelemetry service.name, service.instance.id, or CloudEvents source. AgentActor, ModelActor, and related subtypes further refine this category.
    ja: SoftwareActor は PROV-O SoftwareAgent に整合する、責任を負うソフトウェアシステムの Moonweave ローカル投影である。MCP を話すだけで MCP server/client にはならず、サービスを公開するだけで A2A AgentCard にはならない。OpenTelemetry service.name、service.instance.id、CloudEvents source でもない。AgentActor、ModelActor などがこのカテゴリをさらに具体化する。
  why_needed:
    zh: 软件部署、协议端点与遥测实例独立于本地责任系统身份变化；混同会使轮换基础设施时丢失可归因的服务主体。
    en: Software deployments, protocol endpoints, and telemetry instances change independently of the responsible local system identity; conflating them loses an attributable service principal when infrastructure rotates.
    ja: ソフトウェare デプロイ、プロトコルエンドポイント、テレメトリーインスタンスは、責任を負うローカルシステム identity とは独立して変化する。混同するとインフラ轮换時に帰属可能なサービス主体を失う。
  includes:
    - zh: 本地智能体运行时、服务主体、模型服务与工具执行服务。
      en: Local agent runtimes, service principals, model-serving services, and tool-executing services.
      ja: ローカルエージェントランタイム、サービスプリンシパル、モデル提供サービス、ツール実行サービス。
  excludes:
    - zh: 协议端点、广告化发现文档、遥测资源属性、CloudEvents 事件 source 字符串或模型资产。
      en: A protocol endpoint, advertised discovery document, telemetry resource attribute, CloudEvents event source string, or model asset.
      ja: プロトコルエンドポイント、広告化された発見文書、テレメトリーリソース属性、CloudEvents イベント source 文字列、モデル資産。
  semantic_kind: agent
  aliases: [software principal, software agent]
engineering:
  explanation:
    zh: 使用 actor_id 与 responsibility_scope_ref 注册本地软件参与者。部署 URL、service.name、MCP 端点与 event source 可作为证据链接，但不得复制进 actor_id。
    en: Register a local software actor with actor_id and responsibility_scope_ref. Deployment URL, service.name, MCP endpoint, and event source may link as evidence but must not be copied into actor_id.
    ja: actor_id と responsibility_scope_ref でローカルソフトウェア参加者を登録する。デプロイ URL、service.name、MCP エンドポイント、event source は証拠としてリンクできるが、actor_id へ複製してはならない。
  typical_input:
    - description:
        zh: 本地软件责任注册（PROV-O SoftwareAgent 投影）
        en: Local software responsibility registration as a PROV-O SoftwareAgent projection
        ja: PROV-O SoftwareAgent 投影としてのローカルソフトウェア責任登録
      format: '{"actor_id":"review-service","responsibility_scope_ref":"scope:code-review"}'
  typical_output:
    - description:
        zh: 本地软件责任记录
        en: Local software responsibility record
        ja: ローカルソフトウェア責任記録
      format: '{"actor_id":"review-service","actor_kind":"SoftwareActor","responsibility_scope_ref":"scope:code-review"}'
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines SoftwareAgent as an Agent implemented by software.
    - name: OpenTelemetry resource conventions
      url: https://opentelemetry.io/docs/specs/semconv/resource/
      description: Defines telemetry attributes distinct from local actor identity.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 软件参与者 ID
        en: Software actor ID
        ja: ソフトウェアアクター ID
      definitions:
        zh: 承担责任的软件系统的本地持久身份。
        en: Local durable identity for a responsibility-bearing software system.
        ja: 責任を負うソフトウェアシステムのローカル永続 identity。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: review-service
      source_claims: [claim-software-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 固定为 SoftwareActor，以保留继承的软件责任参与者类别。
        en: Fixed to SoftwareActor to retain the inherited software responsibility-actor category.
        ja: 継承したソフトウェア責任アクターの種別を保持するため SoftwareActor に固定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [SoftwareActor]
      example_value: SoftwareActor
      source_claims: [claim-software-boundary]
    - id: responsibility_scope_ref
      labels:
        zh: 责任作用域引用
        en: Responsibility scope reference
        ja: 責任スコープ参照
      definitions:
        zh: 指向软件参与者负责的工作边界的本地引用。
        en: Local reference to the work boundary for which the software actor is accountable.
        ja: ソフトウェアアクターが説明責任を負う作業境界へのローカル参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: scope:code-review
      source_claims: [claim-software-boundary]
  constraints:
    - id: software-actor-not-telemetry-or-protocol-id
      severity: error
      language: plain
      expression: actor_id must not equal a service.name, service.instance.id, CloudEvents source, MCP endpoint, or A2A card identifier unless separately assigned as a local opaque ID.
      explanation:
        zh: 这些标识描述观测、传输或发现，不承担相同的责任生命周期。
        en: Those identifiers describe observation, transport, or discovery and do not carry the same responsibility lifecycle.
        ja: それらの識別子は観測、トランスポート、発見を記述し、同じ責任ライフサイクルを持たない。
      source_claims: [claim-software-boundary]
  required_relations: [SoftwareActor-specializes-Actor]
examples:
  - id: softwareactor-positive
    labels: {zh: "OTel service.name review-api", en: "OTel service.name review-api", ja: "OTel service.name review-api"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; SoftwareActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; SoftwareActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; SoftwareActor provenance graph."}
    field_values: {actor_id: review-service, actor_kind: SoftwareActor, responsibility_scope_ref: scope:code-review}
    related_node_ids: [SoftwareActor, Actor]
    related_relation_ids: []
    source_claims: [claim-software-boundary]
  - id: softwareactor-counterexample
    labels: {zh: "Span name 当 SoftwareActor", en: "Span name as SoftwareActor", ja: "Span name を SoftwareActor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style SoftwareActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style SoftwareActor.", ja: "Missing parent_run_id rejects LangSmith-style SoftwareActor."}
    field_values: {service_name: review-api}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-software-boundary]
  - id: softwareactor-boundary
    labels: {zh: "SoftwareActor 与 ModelActor 边界", en: "SoftwareActor versus ModelActor boundary", ja: "SoftwareActor と ModelActor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SoftwareActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SoftwareActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {mcp_endpoint: https://tools.example/mcp}
    related_node_ids: [MCPSession]
    related_relation_ids: []
    source_claims: [claim-software-boundary]
  - id: softwareactor-instance
    labels: {zh: "support-agent worker 实例", en: "support-agent worker instance", ja: "support-agent worker 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->SoftwareActor.", en: "Langfuse instance: trace+span+score->SoftwareActor.", ja: "Langfuse instance maps to SoftwareActor."}
    field_values: {actor_id: review-service, actor_kind: SoftwareActor, responsibility_scope_ref: scope:code-review}
    related_node_ids: [SoftwareActor, Actor]
    related_relation_ids: []
    source_claims: [claim-software-boundary]
parent_relation:
  id: SoftwareActor-specializes-Actor
  predicate: is_a
  target: concept:Actor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是软件运行时参与者
    en: is a software runtime actor
    ja: ソフトウェアランタイムアクターである
  definitions:
    zh: 每个 SoftwareActor 都是由软件承担责任的 Actor。
    en: Every SoftwareActor is an Actor whose responsibility is borne by software.
    ja: すべての SoftwareActor はソフトウェアが責任を負う Actor である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: [claim-software-boundary]
relations: []
sources:
  - id: prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent, Person, SoftwareAgent, Entity, and Activity.
  - id: otel-resource
    title: OpenTelemetry Resource Semantic Conventions
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: Defines telemetry resource attributes including service.name and service.instance.id.
  - id: a2a-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines the server-published AgentCard discovery document.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server architecture, sessions, and capabilities.
source_claims:
  - id: claim-software-boundary
    source: otel-resource
    supports: OpenTelemetry service attributes, A2A discovery, and MCP endpoints are distinct from the Moonweave local responsibility identity.
    locator: Official specification boundary and Moonweave local projection
    evidence_kind: design-inference
    confidence: high

