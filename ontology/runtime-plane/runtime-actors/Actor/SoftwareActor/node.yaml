schema: moonweave.ai/ontology-node/v1
id: SoftwareActor
kind: concept
labels:
  zh: 软件参与主体
  en: software actor
  ja: ソフトウェアアクター
semantics:
  short_definition:
    zh: 软件参与主体是由正在运行的程序、进程或服务实施行动并承担技术责任的参与主体。
    en: A SoftwareActor is an Actor whose actions are performed by a running program, process, or service under a technical identity.
    ja: SoftwareActor は、稼働中のプログラム、プロセス、サービスが技術識別子の下で行為を実施する Actor である。
  definition:
    zh: 软件参与主体是 Actor 的一种；其种差是运行行动由可识别的软件执行体产生，该执行体能发起或接收调用、维护运行状态并在追踪中承担技术归属。源代码、模型权重、静态配置和未运行的服务描述不是软件参与主体。
    en: A SoftwareActor is an Actor distinguished by runtime actions produced by an identifiable software execution, capable of initiating or receiving calls, maintaining runtime state, and bearing technical attribution in traces. Source code, model weights, static configuration, and an unstarted service description are not SoftwareActor instances.
    ja: SoftwareActor は Actor の一種であり、識別可能なソフトウェア実行体が行為を生成し、呼出を開始または受領し、実行状態を維持し、追跡上の技術帰属を負う。ソースコード、モデル重み、静的設定、未起動サービス記述は SoftwareActor ではない。
  why_needed:
    zh: 该类别把自动行动归属到真实运行组件，并将运行者与其代码、配置、模型及人工所有者分开。
    en: This class attributes automated actions to the actual running component and separates the executor from its code, configuration, model, and human owner.
    ja: この分類は自動行為を実際の稼働コンポーネントへ帰属させ、実行者をコード、設定、モデル、人間所有者から分離する。
  includes:
    - zh: 纳入在运行中以进程、服务或代理身份接收任务、调用模型或工具并产生可追踪操作的软件执行体。
      en: Includes a software execution that receives work, invokes models or tools, and produces traceable operations under a process, service, or agent identity.
      ja: 実行中にプロセス、サービス、エージェント識別子で仕事を受け、モデルやツールを呼び、追跡可能な操作を生成するソフトウェア実行体を含む。
  excludes:
    - zh: 不纳入源代码仓库、容器镜像、Model、Agent 配置对象、工具规格或仅描述服务的 Agent Card。
      en: Excludes source repositories, container images, Model artifacts, Agent configuration objects, tool specifications, and Agent Cards that merely describe services.
      ja: ソースリポジトリ、コンテナイメージ、Model、Agent 設定オブジェクト、ツール仕様、サービスを記述するだけの Agent Card は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 SoftwareActor 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SoftwareActor, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SoftwareActor 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SoftwareActor.
      format: |-
        # Example SoftwareActor ingest
        { "software-actor_ref": "example-1" }
      source_claims:
        - claim-software-actor-design
  typical_output:
    - description: Moonweave-local SoftwareActor projection.
      format: '{ "schema_owner": "moonweave-local-design", "software-actor_id": "example-1" }'
      source_claims:
        - claim-software-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
