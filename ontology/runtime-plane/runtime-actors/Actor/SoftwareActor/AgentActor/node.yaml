      en: CrewAI Agent(role=, tools=[SerperDevTool()]) maps AgentActor actor_id=crewai-journalist, runtime_configuration_ref=cfg:crewai-journalist-v1.
      ja: CrewAI journalist が AgentActor にマップされる。
    example_source:
