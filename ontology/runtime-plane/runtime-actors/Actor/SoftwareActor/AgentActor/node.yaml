schema: moonweave.ai/ontology-node/v1
id: AgentActor
kind: concept
status: accepted
labels:
  en: agent actor
  zh: 智能体参与者
  ja: エージェントアクター
semantics:
  short_definition:
    zh: 智能体参与者是运行模型驱动决策循环并依据指令选择输出、工具或交接的软件参与主体。
    en: An AgentActor is a SoftwareActor that runs a model-guided decision loop to choose outputs, tools, or handoffs under instructions.
    ja: AgentActor は、指示の下で出力、ツール、引継ぎを選ぶモデル誘導判断ループを実行する SoftwareActor である。
  definition:
    zh: 智能体参与者是 SoftwareActor 的一种；其种差是它将模型调用置于带指令、上下文、工具、护栏和停止条件的运行循环中，并以智能体身份对下一步行动负责。单个 Model、只转发推理请求的 ModelActor、普通系统服务或工具服务都不具备这一完整控制循环。
    en: An AgentActor is a SoftwareActor distinguished by placing model calls inside a runtime loop with instructions, context, tools, guardrails, and stopping conditions and by owning the choice of the next action under an agent identity. A Model alone, a ModelActor that only brokers inference, a generic system service, or a tool service lacks that complete control loop.
    ja: AgentActor は SoftwareActor の一種であり、モデル呼出を指示、コンテキスト、ツール、ガードレール、停止条件を持つ実行ループに置き、エージェント識別子で次行為の選択を担う。Model 単体、推論を中継するだけの ModelActor、一般システムサービス、ツールサービスは完全な制御ループを持たない。
  why_needed:
    zh: 该类别标明谁拥有模型—工具循环与下一步选择责任，从而避免把模型、模型网关或被调用工具误认为智能体。
    en: This class identifies who owns the model-tool loop and next-action choice, preventing a model, model gateway, or invoked tool from being mistaken for the agent.
    ja: この分類はモデル・ツールループと次行為選択の所有者を示し、モデル、モデルゲートウェイ、呼ばれたツールとの混同を防ぐ。
  includes:
    - zh: 纳入以稳定智能体身份运行，读取上下文，调用模型，并依据模型结果与规则选择回复、工具调用或交接的软件执行体。
      en: Includes a software execution with stable agent identity that reads context, calls a model, and chooses a response, tool call, or handoff from model output and rules.
      ja: 安定したエージェント識別子で実行し、コンテキストを読み、モデルを呼び、結果と規則から応答、ツール呼出、引継ぎを選ぶソフトウェア実行体を含む。
  excludes:
    - zh: 不纳入 GenerativeModel、模型 API 客户端、ToolServiceActor、静态 Agent 配置、工作流中不作选择的普通函数或 HumanActor。
      en: Excludes a GenerativeModel, model API client, ToolServiceActor, static Agent configuration, workflow function that makes no choice, and HumanActor.
      ja: GenerativeModel、モデル API クライアント、ToolServiceActor、静的 Agent 設定、選択を行わない通常関数、HumanActor は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: AgentActor-example-positive-001
    kind: positive
    labels:
      zh: 智能体参与者正例
      en: Positive example of agent actor
      ja: エージェントアクターの正例
    scenario_id: null
    descriptions:
      zh: audit-agent-01 读取审计任务和上下文，调用生成模型，在权限范围内选择图谱查询工具，并根据结果决定继续查询或返回报告。
      en: audit-agent-01 reads an audit task and context, calls a generative model, selects a graph-query tool within its authority, and decides from the result whether to query again or return a report.
      ja: audit-agent-01 は監査タスクとコンテキストを読み、生成モデルを呼び、権限範囲内でグラフ照会ツールを選び、結果から再照会か報告返却かを決める。
    field_values:
      actor_id: actor-agent-001
      actor_kind: software
      display_name: Ontology audit agent
    related_node_ids:
      - AgentActor
      - AuthorityScope
    related_relation_ids:
      - AgentActor-has_authority_scope-AuthorityScope
    expected_result:
      zh: audit-agent-01 归类为 AgentActor，并继承 SoftwareActor 与 Actor。
      en: audit-agent-01 is classified as AgentActor and inherits SoftwareActor and Actor.
      ja: audit-agent-01 は AgentActor に分類され、SoftwareActor と Actor を継承する。
    why_valid_or_invalid:
      zh: 它拥有持续决策循环、工具选择和停止判断，而不只是执行一次模型请求。
      en: It owns an ongoing decision loop, tool selection, and stopping judgment rather than merely performing one model request.
      ja: 継続判断ループ、ツール選択、停止判断を所有し、一回のモデル要求を行うだけではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-actor-001
  - id: AgentActor-example-instance-001
    kind: instance
    labels:
      zh: 智能体参与者结构化实例
      en: Structured instance of agent actor
      ja: エージェントアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-agent-001 是名为 Ontology audit agent 的软件参与者；该记录只把继承自 Actor 的身份与类别字段作为 AgentActor 节点内实例展示。
      en: actor-agent-001 is a software actor named Ontology audit agent; the record displays the identity and kind fields inherited from Actor only as an inline AgentActor instance.
      ja: actor-agent-001 は Ontology audit agent という software actor で、Actor から継承した identity と kind を AgentActor ノード内の instance としてのみ表示します。
    field_values:
      actor_id: actor-agent-001
      actor_kind: software
      display_name: Ontology audit agent
    related_node_ids:
      - AgentActor
    related_relation_ids: []
    expected_result:
      zh: 三个字段通过 AgentActor 的继承结构约束，实例不会成为图中的独立节点。
      en: The three fields satisfy AgentActor's inherited structure contract, and the instance does not become a separate graph node.
      ja: 三つの項目は AgentActor の継承構造契約を満たし、instance は別の graph node になりません。
    why_valid_or_invalid:
      zh: actor_id 标识参与者，actor_kind 保持 software 分支，display_name 只提供人类可读名称；这些值没有引入新的分类层。
      en: actor_id identifies the actor, actor_kind retains the software branch, and display_name supplies only a human-readable name; the values introduce no new classification layer.
      ja: actor_id は actor を識別し、actor_kind は software 分岐を保ち、display_name は可読名だけを与えるため、新たな分類層を導入しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-actor-001
  - id: AgentActor-example-boundary-001
    kind: boundary
    labels:
      zh: 智能体参与者边界例
      en: Boundary case for agent actor
      ja: エージェントアクターの境界例
    scenario_id: null
    descriptions:
      zh: inference-gateway-2 接收已确定的模型名和参数，转发请求并返回响应与用量；它不读取任务目标，也不选择工具或下一步。
      en: inference-gateway-2 receives a predetermined model name and parameters, forwards the request, and returns response and usage; it reads no task goal and chooses neither tools nor next steps.
      ja: inference-gateway-2 は決定済みモデル名と引数を受けて要求を転送し、応答と使用量を返すが、タスク目標を読まずツールや次行為を選ばない。
    field_values: {}
    related_node_ids:
      - AgentActor
      - AuthorityScope
      - ExternalServiceActor
    related_relation_ids:
      - AgentActor-has_authority_scope-AuthorityScope
    expected_result:
      zh: 该网关可归为 ModelActor，但不能仅凭调用模型归为 AgentActor。
      en: The gateway may be a ModelActor but is not an AgentActor merely because it invokes a model.
      ja: このゲートウェイは ModelActor になり得るが、モデルを呼ぶだけでは AgentActor にならない。
    why_valid_or_invalid:
      zh: 智能体种差是拥有基于目标的循环与行动选择；固定转发组件不承担该控制责任。
      en: Agenthood requires ownership of a goal-directed loop and action choice; a fixed broker does not bear that control responsibility.
      ja: エージェントの種差は目標指向ループと行為選択の所有であり、固定中継コンポーネントはその制御責任を負わない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-agent-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ExternalServiceActor
    shared_parent_concept_id: SoftwareActor
    differentia:
      zh: 共享父节点对照：父节点 SoftwareActor：AgentActor（semantic kind=entity，骨架 AgentActor-is_a-SoftwareActor）；ExternalServiceActor（semantic kind=entity，骨架 ExternalServiceActor-is_a-SoftwareActor）。双端条件：AgentActor 条件：“智能体参与者是一种软件参与主体；其区分条件是：它是能够行动、观察、调用工具、接收委派、发出追踪事件并对会话活动承担责任的运行身份”；ExternalServiceActor 条件：“作为软件参与主体，外部服务参与者由这一事实区分：它位于受控系统之外，可以接收请求、返回结果，并引入信任边界与溯源义务”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SoftwareActor: AgentActor (semantic kind=entity, backbone AgentActor-is_a-SoftwareActor); ExternalServiceActor (semantic kind=entity, backbone ExternalServiceActor-is_a-SoftwareActor). Endpoint conditions: AgentActor condition: “As a software actor, Agent actor is distinguished by the fact that it is a runtime identity capable of acting, observing, invoking tools, receiving delegation, emitting trace events, and being accountable for session activity”; ExternalServiceActor condition: “External service actor belongs to the software actor category and differs from broader members in that it is a runtime participant outside the controlled system that can receive requests, return results, or introduce trust-boundary and provenance obligations”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SoftwareActor：AgentActor（semantic kind=entity、バックボーン AgentActor-is_a-SoftwareActor）；ExternalServiceActor（semantic kind=entity、バックボーン ExternalServiceActor-is_a-SoftwareActor）。両端条件：AgentActor の条件：「ソフトウェアアクターに属するエージェントアクターは、次の事実を種差とします：それは、行動、観測、ツール呼び出し、委任の受領、トレースイベントの発行、セッション活動への責任を担える実行上の識別です」；ExternalServiceActor の条件：「外部サービスアクターはソフトウェアアクターとして、次の条件により他の対象と区別されます：それは制御されたシステムの外側にあり、要求を受け取り、結果を返し、信頼境界と来歴上の義務を生じさせます」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-agent-actor-002
parent_relation:
  id: AgentActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种软件参与主体
    en: is a software actor
    ja: ソフトウェアアクターの一種である
  definitions:
    zh: AgentActor-is_a-SoftwareActor 表示每个 AgentActor 都是实际运行的软件主体，并以在指令、模型、工具、护栏和停止条件之间拥有下一步行动选择循环为种差；静态 Agent 配置、单独 Model 或固定转发服务不满足该子类。
    en: AgentActor-is_a-SoftwareActor states that every AgentActor is running software differentiated by owning the next-action loop across instructions, model calls, tools, guardrails, and stopping conditions; a static Agent configuration, Model alone, or fixed forwarding service does not satisfy the subtype.
    ja: AgentActor-is_a-SoftwareActor は全 AgentActor が実行中ソフトウェア主体であり、指示・モデル呼出し・ツール・ガードレール・停止条件を跨ぐ次行為選択ループを担うことを種差とする。静的設定、Model 単体、固定中継サービスは該当しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有智能体参与者子类
      en: has agent-actor subtype
      ja: AgentActor 下位型を持つ
  conditions:
    - id: AgentActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when a traceable software runtime identity selects continuation, tool invocation, handoff, or termination from model output and rules inside an agent Runner loop.
      explanations:
        zh: 仅当存在可追踪的软件运行身份，且该身份在 Runner 循环中根据模型输出与规则选择继续、调用工具、交接或结束时成立。
        en: Assert only when a traceable software runtime identity selects continuation, tool invocation, handoff, or termination from model output and rules inside an agent Runner loop.
        ja: 追跡可能なソフトウェア実行同一性が agent Runner loop 内でモデル出力と規則から継続・tool 呼出し・handoff・終了を選ぶ時だけ成立する。
      source_claims:
        - claim-agent-actor-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AgentActor-is_a-SoftwareActor-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种软件参与主体正例
        en: "Positive case: is a software actor"
        ja: ソフトウェアアクターの一種であるの正例
      scenario_id: null
      descriptions:
        zh: audit-agent-01 在 Runner 中读取任务，调用模型，选择 graph_query，处理结果后决定再次查询或输出最终报告。
        en: audit-agent-01 runs under Runner, reads the task, calls a model, selects graph_query, processes its result, and decides whether to query again or return a final report.
        ja: audit-agent-01 は Runner で task を読み、model を呼び、graph_query を選び、結果後に再照会か最終報告かを決める。
      field_values: {}
      related_node_ids:
