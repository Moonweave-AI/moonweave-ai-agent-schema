schema: moonweave.ai/ontology-node/v1
id: AgentActor
kind: concept
labels:
  en: agent actor
  zh: 智能体参与者
  ja: エージェントアクター
semantics:
  short_definition:
    zh: 智能体参与者是运行模型驱动决策循环并依据指令选择输出、工具或交接的软件参与主体。
    en: An AgentActor is a SoftwareActor that runs a model-guided decision loop to choose outputs, tools, or handoffs under instructions.
    ja: AgentActor は、指示の下で出力、ツール、引継ぎを選ぶモデル誘導判断ループを実行する SoftwareActor である。
  definition:
    zh: 智能体参与者是 SoftwareActor 的一种；其种差是它将模型调用置于带指令、上下文、工具、护栏和停止条件的运行循环中，并以智能体身份对下一步行动负责。单个 Model、只转发推理请求的 ModelActor、普通系统服务或工具服务都不具备这一完整控制循环。
    en: An AgentActor is a SoftwareActor distinguished by placing model calls inside a runtime loop with instructions, context, tools, guardrails, and stopping conditions and by owning the choice of the next action under an agent identity. A Model alone, a ModelActor that only brokers inference, a generic system service, or a tool service lacks that complete control loop.
    ja: AgentActor は SoftwareActor の一種であり、モデル呼出を指示、コンテキスト、ツール、ガードレール、停止条件を持つ実行ループに置き、エージェント識別子で次行為の選択を担う。Model 単体、推論を中継するだけの ModelActor、一般システムサービス、ツールサービスは完全な制御ループを持たない。
  why_needed:
    zh: 该类别标明谁拥有模型—工具循环与下一步选择责任，从而避免把模型、模型网关或被调用工具误认为智能体。
    en: This class identifies who owns the model-tool loop and next-action choice, preventing a model, model gateway, or invoked tool from being mistaken for the agent.
    ja: この分類はモデル・ツールループと次行為選択の所有者を示し、モデル、モデルゲートウェイ、呼ばれたツールとの混同を防ぐ。
  includes:
    - zh: 纳入以稳定智能体身份运行，读取上下文，调用模型，并依据模型结果与规则选择回复、工具调用或交接的软件执行体。
      en: Includes a software execution with stable agent identity that reads context, calls a model, and chooses a response, tool call, or handoff from model output and rules.
      ja: 安定したエージェント識別子で実行し、コンテキストを読み、モデルを呼び、結果と規則から応答、ツール呼出、引継ぎを選ぶソフトウェア実行体を含む。
  excludes:
    - zh: 不纳入 GenerativeModel、模型 API 客户端、ToolServiceActor、静态 Agent 配置、工作流中不作选择的普通函数或 HumanActor。
      en: Excludes a GenerativeModel, model API client, ToolServiceActor, static Agent configuration, workflow function that makes no choice, and HumanActor.
      ja: GenerativeModel、モデル API クライアント、ToolServiceActor、静的 Agent 設定、選択を行わない通常関数、HumanActor は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: AgentActor（AgentProcess）映射 OpenAI Agents SDK agent loop、LangGraph compiled node executor 与 assistant run 中实际选择工具/交接的主体；ModelActor 或 ToolServiceActor 不能因共现而升级为 AgentActor。
    en: AgentActor (AgentProcess) maps OpenAI Agents SDK agent loop, LangGraph compiled node executors, and the principal that chooses tools/handoffs during an assistant run; ModelActor or ToolServiceActor must not be promoted via co-occurrence.
    ja: AgentActor（AgentProcess）は OpenAI agent loop、LangGraph node executor、tool/handoff 選択主体を写像し、ModelActor/ToolServiceActor を共起だけで昇格させません。
  typical_input:
    - description: OpenAI Assistants assistant/model/tools or LangGraph runnable config.
      format: graph.invoke(..., config={"configurable":{"actor_id":"agent-reviewer-01"}})
      source_claims:
        - claim-openai-assistants-actor
        - claim-agent-actor-design
  typical_output:
    - description: Moonweave Actor projection with participation evidence.
      format: '{"actor_id":"actor-agent-reviewer-01","actor_kind":"software","agent_loop":true}'
      source_claims:
        - claim-agent-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
