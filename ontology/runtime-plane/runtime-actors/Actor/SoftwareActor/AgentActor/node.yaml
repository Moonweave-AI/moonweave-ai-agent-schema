      expected_result:
        zh: 将 audit-agent-01 归为 AgentActor，并继承 SoftwareActor 与 Actor。
        en: Classify audit-agent-01 as AgentActor and inherit SoftwareActor and Actor.
        ja: audit-agent-01 を AgentActor とし SoftwareActor と Actor を継承する。
      why_valid_or_invalid:
