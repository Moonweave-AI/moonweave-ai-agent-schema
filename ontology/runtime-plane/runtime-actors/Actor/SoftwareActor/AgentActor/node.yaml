source_claims:
  - id: claim-agent-actor-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK distinguishes Agent configuration and a Runner-managed loop that calls a model, executes tools or handoffs, and repeats until final output. Moonweave identifies the running loop owner as AgentActor.
    locator: Agents > Basic configuration; Running agents > The agent loop
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-agent-actor-002
    source: eng-fw-openai-python-docs
    supports: The SDK defines Agent as an LLM configured with instructions, tools, and runtime behavior and defines tools or MCP servers as callable interfaces exposed to that Agent. Moonweave therefore treats AgentActor as the loop-owning software participant and ExternalServiceActor as a separately addressed service participant; calling a service does not make it the running agent.
    locator: Agents > Basic configuration; Tools; Model context protocol (MCP)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-agent-actor-003
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK documents an Agent configuration and a Runner-managed loop that calls the LLM, executes tools or handoffs, and repeats until final output. Moonweave classifies the running owner of that loop as AgentActor.
    locator: Agents > Basic configuration; Running agents > The agent loop
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

