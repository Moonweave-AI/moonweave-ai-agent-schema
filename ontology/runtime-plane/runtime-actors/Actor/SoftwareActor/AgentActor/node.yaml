schema: moonweave.ai/ontology-node/v1
id: AgentActor
kind: concept
status: accepted
labels:
  zh: 智能体运行时参与者
  en: Agent runtime actor
  ja: エージェント実行時アクター
semantics:
  short_definition:
    zh: 对智能体运行循环承担持续责任的 Moonweave 软件参与者。
    en: A Moonweave software participant with continuing responsibility for an agent runtime.
    ja: エージェント実行時の継続的な責任を負う Moonweave ソフトウェア参加者。
  definition:
    zh: AgentActor 是 Moonweave 对运行时责任主体的本地分类；它可运行推理、工具调用与移交循环，并跨多个执行保持可追溯身份。它可以由 OpenAI Agents SDK 的 Agent 配置实现，也可以引用经验证的 A2A AgentCard，但不等同于 SDK 配置对象、A2A 发现文档，或 MCP 的 host、client、server。
    en: AgentActor is Moonweave's local classification of the party responsible for an agent runtime. It may run reasoning, tool-call, and handoff loops and retain traceable identity across executions. It may be implemented with an OpenAI Agents SDK Agent configuration and may reference a verified A2A AgentCard, but it is not field-equivalent to that SDK configuration, the A2A discovery document, or an MCP host, client, or server.
    ja: AgentActor は、エージェント実行時の責任主体を表す Moonweave のローカル分類である。推論、ツール呼出し、ハンドオフのループを実行し、複数の実行にまたがる追跡可能な識別子を持てる。OpenAI Agents SDK の Agent 設定で実装され、検証済みの A2A AgentCard を参照できるが、SDK 設定、A2A 発見文書、MCP の host、client、server と同一の型ではない。
  why_needed:
    zh: 运行责任、发现文档、连接端点和一次执行具有不同生命周期；把它们合并会破坏归因与审计。
    en: Runtime responsibility, discovery documents, connection endpoints, and individual executions have different lifecycles, so conflating them breaks attribution and auditability.
    ja: 実行時の責任、発見文書、接続エンドポイント、個別実行は寿命が異なるため、同一視すると帰属と監査可能性が失われる。
  includes:
    - zh: 具有本地运行时身份、配置引用和多个执行记录的工具使用型或委派型智能体服务。
      en: Tool-using or delegated agent services with a local runtime identity, configuration reference, and multiple execution records.
      ja: ローカル実行時識別子、設定参照、複数の実行記録を持つツール利用または委任型エージェントサービス。
    - zh: 与验证后的 A2A AgentCard 建立引用关联的本地智能体运行时。
      en: A local agent runtime that maintains a reference to a verified A2A AgentCard.
      ja: 検証済みの A2A AgentCard への参照を保持するローカルエージェント実行時。
  excludes:
    - zh: A2A AgentCard 本身；它是服务发布的发现文档，不是本地运行责任身份。
      en: An A2A AgentCard itself; it is a server-published discovery document, not a local runtime-responsibility identity.
      ja: A2A AgentCard 自体。これはサーバー公開の発見文書であり、ローカル実行責任の識別子ではない。
    - zh: MCP 的 host、client、server 或会话端点；它们描述协议架构和连接角色。
      en: An MCP host, client, server, or session endpoint; those describe protocol architecture and connection roles.
      ja: MCP の host、client、server、またはセッションエンドポイント。これらはプロトコル構成と接続ロールを表す。
    - zh: OpenAI Agents SDK 的 Agent 配置对象、模型资产、单次模型调用或 Execution Activity。
      en: An OpenAI Agents SDK Agent configuration object, model asset, single model call, or Execution Activity.
      ja: OpenAI Agents SDK の Agent 設定オブジェクト、モデル資産、単一モデル呼出し、または Execution Activity。
  semantic_kind: agent
  aliases: [agent service, local agent runtime]
engineering:
  explanation:
    zh: 此节点的 I/O 是 Moonweave 本地运行时投影：输入以本地 actor_id、runtime_configuration_ref 和 input_ref 关联，输出以 execution_ref、output_ref 和 trace_ref 关联。它不会把 A2A Card 字段、MCP 初始化能力或 SDK 配置字段复制为本地身份字段。
    en: "This node's I/O is a Moonweave local runtime projection: inputs join local actor_id, runtime_configuration_ref, and input_ref; outputs join execution_ref, output_ref, and trace_ref. It does not copy A2A Card fields, MCP initialization capabilities, or SDK configuration fields into a local identity."
    ja: このノードの I/O は Moonweave のローカル実行時投影である。入力は actor_id、runtime_configuration_ref、input_ref を結び、出力は execution_ref、output_ref、trace_ref を結ぶ。A2A Card のフィールド、MCP 初期化能力、SDK 設定フィールドをローカル識別子へ複製しない。
  typical_input:
    - description:
        zh: Moonweave 本地智能体运行调用。
        en: Moonweave local agent-run invocation.
        ja: Moonweave ローカルエージェント実行呼出し。
      format: |-
        {"actor_id":"agent-reviewer-2","runtime_configuration_ref":"cfg:review-v7","input_ref":"input:task-842","a2a_card_ref":"card:reviewer"}
  typical_output:
    - description:
        zh: Moonweave 本地执行归因结果。
        en: Moonweave local execution-attribution result.
        ja: Moonweave ローカル実行帰属結果。
      format: |-
        {"actor_id":"agent-reviewer-2","execution_ref":"exec:842","output_ref":"artifact:report-22","trace_ref":"trace:842"}
  reference_implementations:
    - name: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-js/guides/agents/
      description: Documents the SDK Agent as a configurable LLM with instructions, model, and tools.
    - name: A2A Agent Discovery
      url: https://a2a-protocol.org/latest/topics/agent-discovery/
      description: Documents the server-published AgentCard discovery document.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 本地智能体参与者 ID
        en: Local agent actor ID
        ja: ローカルエージェントアクター ID
      definitions:
        zh: Moonweave 为持续运行责任主体分配的稳定本地标识，不从 A2A、MCP 或 SDK 字段派生。
        en: Stable Moonweave identifier for the party responsible across runs; it is not derived from an A2A, MCP, or SDK field.
        ja: 実行をまたぐ責任主体に Moonweave が割り当てる安定識別子。A2A、MCP、SDK のフィールドから導出しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: agent-reviewer-2
      source_claims: [claim-local-runtime-identity]
    - id: actor_kind
      labels:
        zh: 软件参与者类别
        en: Software actor kind
        ja: ソフトウェアアクター種別
      definitions:
        zh: 固定为 SoftwareActor，以保留从 SoftwareActor 继承的责任类别。
        en: Fixed to SoftwareActor to retain the responsibility category inherited from SoftwareActor.
        ja: SoftwareActor から継承した責任種別を保持するため SoftwareActor に固定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [SoftwareActor]
      example_value: SoftwareActor
      source_claims: [claim-local-runtime-identity]
    - id: runtime_configuration_ref
      labels:
        zh: 运行时配置引用
        en: Runtime configuration reference
        ja: 実行時設定参照
      definitions:
        zh: 指向本地版本化运行时配置的不可变引用；它可指向 SDK Agent 配置记录，但不是该配置对象的镜像。
        en: Immutable reference to a local versioned runtime configuration; it may point to an SDK Agent configuration record but is not a mirror of that object.
        ja: ローカルの版管理された実行時設定への不変参照。SDK Agent 設定記録を指せるが、そのオブジェクトの複製ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: cfg:review-v7
      source_claims: [claim-agent-actor-sdk]
  constraints:
    - id: agent-actor-run-separation
      severity: error
      language: plain
      expression: Each execution attribution must reference an AgentActor; execution_ref must not be used as actor_id.
      explanation:
        zh: actor_id 标识长期责任主体，而 execution_ref 标识一次活动。
        en: actor_id identifies the long-lived responsible party, while execution_ref identifies one activity.
        ja: actor_id は長期の責任主体を、execution_ref は一つの活動を識別する。
      source_claims: [claim-local-runtime-identity]
    - id: agent-actor-protocol-non-equivalence
      severity: error
      language: plain
      expression: Do not populate actor_id from an A2A AgentCard, an MCP host/client/server identity, or an OpenAI Agents SDK Agent configuration identifier; preserve each as a separately typed reference where needed.
      explanation:
        zh: A2A Card 是发现文档，MCP 角色是连接架构，SDK Agent 是配置原语；三者都不能替代 Moonweave 运行时责任身份。
        en: An A2A Card is a discovery document, MCP roles are connection architecture, and an SDK Agent is a configuration primitive; none replaces the Moonweave runtime-responsibility identity.
        ja: A2A Card は発見文書、MCP ロールは接続構成、SDK Agent は設定プリミティブであり、いずれも Moonweave の実行責任識別子を置き換えない。
      source_claims: [claim-a2a-card-boundary, claim-mcp-boundary, claim-agent-actor-sdk]
  required_relations: [AgentActor-specializes-SoftwareActor, AgentActor-has-A2AAgentCardReference]
examples:
  - id: agent-actor-positive
    labels: {zh: "OpenAI Weather Agent", en: "OpenAI Weather Agent", ja: "OpenAI Weather Agent"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; AgentActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; AgentActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; AgentActor provenance graph."}
    field_values: {actor_id: openai-weather-agent, actor_kind: SoftwareActor, runtime_configuration_ref: 'cfg:weather-v1'}
    related_node_ids: [AgentActor, Execution]
    related_relation_ids: []
    source_claims: [claim-agent-actor-sdk, claim-local-runtime-identity]
  - id: agent-actor-counterexample
    labels: {zh: "AgentCard 复制为 actor_id", en: "AgentCard copied to actor_id", ja: "AgentCard を actor_id に複製"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style AgentActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style AgentActor.", ja: "Missing parent_run_id rejects LangSmith-style AgentActor."}
    field_values: {actor_id: agent-reviewer-2, agent_card_name: reviewer}
    related_node_ids: [AgentActor, A2AAgentCard]
    related_relation_ids: [AgentActor-has-A2AAgentCardReference]
    source_claims: [claim-a2a-card-boundary]
  - id: agent-actor-boundary
    labels: {zh: "MCP client 连接边界", en: "MCP client connection boundary", ja: "MCP client 接続境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; AgentActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; AgentActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {mcp_server_url: 'https://tools.example/mcp', actor_id: openai-weather-agent}
    related_node_ids: [AgentActor, ToolServiceActor]
    related_relation_ids: []
    source_claims: [claim-mcp-boundary]
  - id: agent-actor-instance-agent-reviewer-2
    labels: {zh: "CrewAI journalist agent", en: "CrewAI journalist agent", ja: "CrewAI journalist agent"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->AgentActor.", en: "Langfuse instance: trace+span+score->AgentActor.", ja: "Langfuse instance maps to AgentActor."}
    field_values: {actor_id: crewai-journalist, actor_kind: SoftwareActor, runtime_configuration_ref: 'cfg:crewai-journalist-v1'}
    related_node_ids: [AgentActor, Execution]
    related_relation_ids: []
    source_claims: [claim-agent-actor-sdk]
parent_relation:
  id: AgentActor-specializes-SoftwareActor
  predicate: is_a
  target: concept:SoftwareActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是运行智能体循环的软件参与者
    en: is a software participant running an agent loop
    ja: エージェントループを実行するソフトウェア参加者である
  definitions:
    zh: 每个 AgentActor 都是负责智能体运行行为的 SoftwareActor。
    en: Every AgentActor is a SoftwareActor responsible for agent-runtime behavior.
    ja: すべての AgentActor はエージェント実行時の振る舞いに責任を持つ SoftwareActor である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: [claim-local-runtime-identity]
relations:
  - id: AgentActor-has-A2AAgentCardReference
    predicate: has_discovery_card_reference
    target: concept:A2AAgentCard
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 具有 A2A 发现卡引用
      en: has A2A discovery-card reference
      ja: A2A 発見カード参照を持つ
    definitions:
      zh: 本地 AgentActor 可保留经验证的 A2A AgentCard 引用；该关系不是同一性或字段映射。
      en: A local AgentActor may retain a verified A2A AgentCard reference; this relation is neither identity nor field mapping.
      ja: ローカル AgentActor は検証済み A2A AgentCard 参照を保持できる。この関係は同一性でもフィールド対応でもない。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    source_claims: [claim-a2a-card-boundary]
sources:
  - id: openai-agents-sdk-agents
    title: OpenAI Agents SDK Agents
    url: https://openai.github.io/openai-agents-js/guides/agents/
    source_type: official-doc
    relevance: Defines an SDK Agent as a configurable LLM with instructions, model selection, and tools.
  - id: a2a-agent-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines the server-published AgentCard used to advertise agent identity, capabilities, skills, interfaces, and authentication.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines the MCP host-client-server architecture, stateful sessions, and negotiated capabilities.
source_claims:
  - id: claim-local-runtime-identity
    source: openai-agents-sdk-agents
    supports: A long-lived responsible runtime identity is a Moonweave local projection used to attribute multiple executions; it is not a protocol-native SDK field.
    locator: Agents guide overview and Agent definition
    evidence_kind: design-inference
    confidence: high
  - id: claim-agent-actor-sdk
    source: openai-agents-sdk-agents
    supports: The SDK defines Agent as a configurable LLM with instructions, model, and tools, so Moonweave AgentActor must remain distinct from the SDK configuration object.
    locator: Agents guide, Agent definition
    evidence_kind: official-doc
    confidence: high
  - id: claim-a2a-card-boundary
    source: a2a-agent-discovery
    supports: A2A AgentCard is a server-published discovery document for advertised identity, capabilities, skills, interfaces, and authentication rather than a local execution-responsibility identity.
    locator: Agent Discovery overview
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-boundary
    source: mcp-architecture
    supports: MCP defines host-client-server architecture, stateful sessions, and capability negotiation; it does not define a generic agent-runtime identity entity.
    locator: Core components and capability negotiation
    evidence_kind: official-spec
    confidence: high

