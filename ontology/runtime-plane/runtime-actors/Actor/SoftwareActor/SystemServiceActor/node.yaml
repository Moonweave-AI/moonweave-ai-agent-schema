sibling_differentiation:
  - sibling_concept_id: ToolServiceActor
    shared_parent_concept_id: SoftwareActor
    differentia:
      zh: 正向身份比较：父节点 SoftwareActor：SystemServiceActor（semantic kind=entity，骨架 SystemServiceActor-is_a-SoftwareActor）；ToolServiceActor（semantic kind=entity，骨架 ToolServiceActor-is_a-SoftwareActor）。双端条件：SystemServiceActor 条件：“系统服务参与者是以如下事实为区分特征的软件参与主体：它表示智能体系统使用的内部服务，例如调度器、沙箱、存储、遥测或策略中介”；ToolServiceActor 条件：“工具服务参与者是一种软件参与主体；其区分条件是：它表示可调用服务或工具端点，负责执行请求并返回可观测结果、警告、错误或产物”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent SoftwareActor: SystemServiceActor (semantic kind=entity, backbone SystemServiceActor-is_a-SoftwareActor); ToolServiceActor (semantic kind=entity, backbone ToolServiceActor-is_a-SoftwareActor). Endpoint conditions: SystemServiceActor condition: “System service actor is a software actor; its differentiating condition is that it is a runtime participant representing an internal service such as scheduler, sandbox, storage, telemetry, or policy mediator used by the agent system”; ToolServiceActor condition: “As a software actor, Tool service actor is distinguished by the fact that it is a runtime participant representing a callable service or tool endpoint that executes requests and returns observable results, warnings, errors, or artifacts”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 SoftwareActor：SystemServiceActor（semantic kind=entity、バックボーン SystemServiceActor-is_a-SoftwareActor）；ToolServiceActor（semantic kind=entity、バックボーン ToolServiceActor-is_a-SoftwareActor）。両端条件：SystemServiceActor の条件：「システムサービスアクターはソフトウェアアクターの一種であり、次の条件で区別されます：それは、スケジューラ、サンドボックス、ストレージ、テレメトリ、ポリシー仲介など、エージェントシステムが使う内部サービスを表します」；ToolServiceActor の条件：「ソフトウェアアクターに属するツールサービスアクターは、次の事実を種差とします：それは、呼び出し可能なサービスまたはツールエンドポイントを表し、要求を実行して観測可能な結果、警告、エラー、成果物を返します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-system-service-actor-002
