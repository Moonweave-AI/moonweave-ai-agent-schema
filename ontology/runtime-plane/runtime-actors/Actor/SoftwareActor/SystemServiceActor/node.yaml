schema: moonweave.ai/ontology-node/v1
id: SystemServiceActor
kind: concept
status: accepted
labels:
  zh: 系统服务参与者
  en: System service actor
  ja: システムサービスアクター
semantics:
  short_definition:
    zh: 对运行时拥有的支撑系统服务负责的本地软件参与者。
    en: A local software actor responsible for a runtime-owned supporting system service.
    ja: ランタイムが所有する支援システムサービスに責任を持つローカルソフトウェア参加者。
  definition:
    zh: SystemServiceActor 是调度、状态持久化、路由或审计投递等运行时自有服务的 Moonweave 本地责任身份。它不是 OpenTelemetry service.name 或 service.instance.id、MCP 服务器角色、CloudEvents source，也不是单次后台作业或 trace span。
    en: SystemServiceActor is a Moonweave local responsibility identity for a runtime-owned service such as scheduling, state persistence, routing, or audit delivery. It is not an OpenTelemetry service.name or service.instance.id, an MCP server role, a CloudEvents source, or an individual background job or trace span.
    ja: SystemServiceActor はスケジューリング、状態永続化、ルーティング、監査配送などランタイム所有サービスの Moonweave ローカル責任 identity である。OpenTelemetry service.name/service.instance.id、MCP サーバーロール、CloudEvents source、個別バックグラウンドジョブ、trace span ではない。
  why_needed:
    zh: 运维服务需要能在副本、部署与单次作业变化后仍可问责的身份。
    en: Operational services need accountable identities that survive replicas, deployments, and individual jobs.
    ja: 運用サービスには、レプリカ、デプロイ、個別ジョブを超えて説明可能な identity が必要である。
  includes:
    - zh: 本地调度、持久化、路由、审计与编排支撑服务。
      en: Local scheduler, persistence, routing, audit, and orchestration support services.
      ja: ローカルスケジューラ、永続化、ルーティング、監査、オーケストレーション支援サービス。
  excludes:
    - zh: 进程副本、Kubernetes Pod、service.name 值、MCP 端点、event source、后台作业或 trace span。
      en: A process replica, Kubernetes pod, service.name value, MCP endpoint, event source, background job, or trace span.
      ja: プロセスレプリカ、Kubernetes Pod、service.name 値、MCP エンドポイント、event source、バックグラウンドジョブ、trace span。
  semantic_kind: agent
  aliases: ["runtime service principal"]
engineering:
  explanation:
    zh: "Local I/O accepts actor_id and service_function_ref and emits a responsibility record. Deployment and telemetry values are linked evidence rather than identity fields."
    en: "Local I/O accepts actor_id and service_function_ref and emits a responsibility record. Deployment and telemetry values are linked evidence rather than identity fields."
    ja: "Local I/O accepts actor_id and service_function_ref and emits a responsibility record. Deployment and telemetry values are linked evidence rather than identity fields."
  typical_input:
    - description:
        zh: "Runtime service registration."
        en: "Runtime service registration."
        ja: "Runtime service registration."
      format: "{\"actor_id\":\"scheduler-service\",\"service_function_ref\":\"function:scheduling\"}"
  typical_output:
    - description:
        zh: "Local system-service projection."
        en: "Local system-service projection."
        ja: "Local system-service projection."
      format: "{\"actor_id\":\"scheduler-service\",\"actor_kind\":\"SystemServiceActor\"}"
  reference_implementations:
    - name: "OpenTelemetry resource conventions"
      url: https://opentelemetry.io/docs/specs/semconv/resource/
      description: "Defines resource attributes that remain separate from local service identity."
structure:
  identity_keys: ["actor_id"]
  fields:
    - id: actor_id
      labels:
        zh: "System service actor ID"
        en: "System service actor ID"
        ja: "System service actor ID"
      definitions:
        zh: "Local durable accountability identifier."
        en: "Local durable accountability identifier."
        ja: "Local durable accountability identifier."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "scheduler-service"
      source_claims: ["claim-system-service-boundary"]
    - id: actor_kind
      labels:
        zh: "参与者类别"
        en: "Actor kind"
        ja: "アクター種別"
      definitions:
        zh: "固定为 SoftwareActor，以保留从 SoftwareActor 继承的责任类别。"
        en: "Fixed to SoftwareActor to retain the responsibility category inherited from SoftwareActor."
        ja: "SoftwareActor から継承した責任種別を保持するため SoftwareActor に固定する。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      allowed_values: ["SoftwareActor"]
      example_value: "SoftwareActor"
      source_claims: ["claim-system-service-boundary"]
    - id: service_function_ref
      labels:
        zh: "Service function reference"
        en: "Service function reference"
        ja: "Service function reference"
      definitions:
        zh: "Local reference to the supported runtime function."
        en: "Local reference to the supported runtime function."
        ja: "Local reference to the supported runtime function."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "function:scheduling"
      source_claims: ["claim-system-service-boundary"]
  constraints:
    - id: system-service-not-process-or-telemetry
      severity: error
      language: plain
      expression: "actor_id must not be a process instance, service.name, service.instance.id, event source, or job ID."
      explanation:
        zh: "Those values identify deployment or observation details rather than durable system responsibility."
        en: "Those values identify deployment or observation details rather than durable system responsibility."
        ja: "Those values identify deployment or observation details rather than durable system responsibility."
      source_claims: ["claim-system-service-boundary"]
  required_relations: ["SystemServiceActor-specializes-SoftwareActor"]
examples:
  - id: systemserviceactor-positive
    labels: {zh: "LangGraph PostgresSaver 检查点服务", en: "LangGraph PostgresSaver checkpointer service", ja: "LangGraph PostgresSaver チェックポインタサービス"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; SystemServiceActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; SystemServiceActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; SystemServiceActor provenance graph."}
    field_values: {"actor_id":"scheduler-service","actor_kind":"SoftwareActor","service_function_ref":"function:scheduling"}
    related_node_ids: ["SystemServiceActor"]
    related_relation_ids: []
    source_claims: ["claim-system-service-boundary"]
  - id: systemserviceactor-counterexample
    labels: {zh: "PostgreSQL 连接串当 Actor", en: "PostgreSQL connection string as Actor", ja: "PostgreSQL 接続文字列を Actor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style SystemServiceActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style SystemServiceActor.", ja: "Missing parent_run_id rejects LangSmith-style SystemServiceActor."}
    field_values: {"actor_id":"pod-2f9a"}
    related_node_ids: []
    related_relation_ids: []
    source_claims: ["claim-system-service-boundary"]
  - id: systemserviceactor-boundary
    labels: {zh: "SystemServiceActor 与 Container 边界", en: "SystemServiceActor versus Container boundary", ja: "SystemServiceActor と Container 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SystemServiceActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SystemServiceActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"service_name":"scheduler"}
    related_node_ids: []
    related_relation_ids: []
    source_claims: ["claim-system-service-boundary"]
  - id: systemserviceactor-instance
    labels: {zh: "checkpointer/postgres 服务实例", en: "checkpointer postgres service instance", ja: "checkpointer/postgres サービス事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->SystemServiceActor.", en: "Langfuse instance: trace+span+score->SystemServiceActor.", ja: "Langfuse instance maps to SystemServiceActor."}
    field_values: {"actor_id":"scheduler-service","actor_kind":"SoftwareActor","service_function_ref":"function:scheduling"}
    related_node_ids: ["SystemServiceActor"]
    related_relation_ids: []
    source_claims: ["claim-system-service-boundary"]
parent_relation:
  id: SystemServiceActor-specializes-SoftwareActor
  predicate: is_a
  target: concept:SoftwareActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: "is a runtime-owned system service actor"
    en: "is a runtime-owned system service actor"
    ja: "is a runtime-owned system service actor"
  definitions:
    zh: "Every SystemServiceActor is a SoftwareActor accountable for a runtime-owned support function."
    en: "Every SystemServiceActor is a SoftwareActor accountable for a runtime-owned support function."
    ja: "Every SystemServiceActor is a SoftwareActor accountable for a runtime-owned support function."
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: ["claim-system-service-boundary"]
relations: []
sources:
  - id: prov
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: "Defines responsibility-bearing Agent and SoftwareAgent."
  - id: otel
    title: "OpenTelemetry Resource Semantic Conventions"
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: "Defines service telemetry resource attributes."
  - id: mcp
    title: "MCP Architecture and Tools"
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: "Defines MCP server tools and host-client-server architecture."
source_claims:
  - id: claim-system-service-boundary
    source: otel
    supports: "OpenTelemetry resource attributes and MCP server roles describe observation or transport, while SystemServiceActor is a local accountable service identity."
    locator: "Official specification and Moonweave projection boundary"
    evidence_kind: design-inference
    confidence: high

