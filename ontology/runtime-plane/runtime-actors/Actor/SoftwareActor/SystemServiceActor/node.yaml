schema: moonweave.ai/ontology-node/v1
id: SystemServiceActor
kind: concept
labels:
  zh: 系统服务参与者
  en: system service actor
  ja: システムサービスアクター
semantics:
  short_definition:
    zh: 系统服务参与者是在智能体系统治理边界内提供调度、状态、策略或可观测性基础能力的软件参与主体。
    en: A SystemServiceActor is a SoftwareActor inside the agent system's governance boundary that provides scheduling, state, policy, or observability infrastructure.
    ja: SystemServiceActor はエージェントシステムの統治境界内でスケジューリング、状態、ポリシー、可観測性基盤を提供する SoftwareActor である。
  definition:
    zh: 系统服务参与者是 SoftwareActor 的一种；其种差是它由 AgentSystem 运营并在运行中承担共享基础设施职责，例如会话调度、检查点保存、策略执行、秘密解析或遥测导出，而不拥有用户任务的模型决策循环。它可被其他参与者调用，但服务配置、数据库记录或外部托管服务不是这一内部运行者。
    en: A SystemServiceActor is a SoftwareActor distinguished by being operated by the AgentSystem and carrying shared infrastructure responsibility during runtime, such as session scheduling, checkpoint persistence, policy enforcement, secret resolution, or telemetry export, without owning the user-task model decision loop. Other actors may call it, but its configuration, database records, and an externally operated service are not this internal runtime participant.
    ja: SystemServiceActor は SoftwareActor の一種であり、AgentSystem が運用し、セッション調度、checkpoint 保存、ポリシー実施、秘密解決、telemetry export などの共有基盤責任を実行中に担い、利用者タスクのモデル判断ループは持たない。設定、DB 記録、外部運用サービスはこの内部実行者ではない。
  why_needed:
    zh: 该类别把平台基础设施行动与 AgentActor 的任务决策和 ExternalServiceActor 的外部责任分开，便于定位系统级故障与权限。
    en: This class separates platform-infrastructure actions from AgentActor task decisions and ExternalServiceActor responsibility, enabling correct system-level failure and authority attribution.
    ja: この分類はプラットフォーム基盤行為を AgentActor のタスク判断と ExternalServiceActor の外部責任から分け、システム障害と権限を正しく帰属させる。
  includes:
    - zh: 纳入由当前 AgentSystem 运营、具有运行身份并为多个会话提供调度、状态、策略、审计或遥测服务的软件组件。
      en: Includes a runtime-identified component operated by the current AgentSystem that provides scheduling, state, policy, audit, or telemetry services to multiple sessions.
      ja: 現 AgentSystem が運用し、実行識別子を持ち、複数セッションへ調度、状態、ポリシー、監査、telemetry を提供するソフトウェアコンポーネントを含む。
  excludes:
    - zh: 不纳入 AgentActor、面向业务调用的 ToolServiceActor、外部托管服务、服务配置文件、状态数据库或 AgentSystem 整体。
      en: Excludes an AgentActor, a business-facing ToolServiceActor, an externally hosted service, a service configuration file, a state database, and the whole AgentSystem.
      ja: AgentActor、業務呼出向け ToolServiceActor、外部ホストサービス、サービス設定、状態 DB、AgentSystem 全体は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 SystemServiceActor 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SystemServiceActor, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SystemServiceActor 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SystemServiceActor.
      format: |-
        # Example SystemServiceActor ingest
        { "system-service-actor_ref": "example-1" }
      source_claims:
        - claim-system-service-actor-design
  typical_output:
    - description: Moonweave-local SystemServiceActor projection.
      format: '{ "schema_owner": "moonweave-local-design", "system-service-actor_id": "example-1" }'
      source_claims:
        - claim-system-service-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
