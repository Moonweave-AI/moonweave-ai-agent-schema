    labels:
      zh: LangGraph PostgresSaver 检查点服务
      en: LangGraph PostgresSaver checkpointer service
      ja: LangGraph PostgresSaver チェックポインタサービス
    descriptions:
      zh: LangGraph PostgresSaver(conn_string=postgresql://...) 作为 SystemServiceActor actor_id=langgraph-postgres-checkpointer，执行 checkpointer.put/get 系统服务。
      en: LangGraph PostgresSaver(conn_string=postgresql://...) as SystemServiceActor actor_id=langgraph-postgres-checkpointer performing checkpointer.put/get system service.
      ja: PostgresSaver が SystemServiceActor として checkpoint サービスを提供する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-system-service-001
      actor_kind: software
      display_name: Runtime scheduler service
    related_node_ids:
      - SystemServiceActor
      - SoftwareActor
    related_relation_ids:
      - SystemServiceActor-is_a-SoftwareActor
    source_claims:
      - claim-system-service-actor-design
  - id: SystemServiceActor-example-instance-001
    labels:
      zh: PostgreSQL 连接串当 Actor
      en: PostgreSQL connection string as Actor
      ja: PostgreSQL 接続文字列を Actor とする
    descriptions:
      zh: 裸 postgresql://user:pass@host/db 连接串无服务行为证据，不是 SystemServiceActor；需 checkpointer/session store 服务角色。
      en: Bare postgresql://user:pass@host/db connection string without service behavior evidence is not SystemServiceActor; needs checkpointer/session store service role.
      ja: 接続文字列だけでは SystemServiceActor にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-system-service-001
      actor_kind: software
      display_name: Runtime scheduler service
    related_node_ids:
      - SystemServiceActor
    related_relation_ids: []
    source_claims:
      - claim-system-service-actor-design
  - id: SystemServiceActor-example-boundary-001
    labels:
      zh: SystemServiceActor 与 Container 边界
      en: SystemServiceActor versus Container boundary
      ja: SystemServiceActor と Container 境界
    descriptions:
      zh: SystemServiceActor 是运行时基础设施服务；Container 是执行环境载体；Postgres 服务 Actor 与 Docker 容器分离。
      en: SystemServiceActor is runtime infrastructure service; Container is execution environment carrier; Postgres service Actor separated from Docker container.
      ja: SystemServiceActor と Container は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - SystemServiceActor
      - SoftwareActor
      - AgentActor
    related_relation_ids:
      - SystemServiceActor-is_a-SoftwareActor
    source_claims:
      - claim-system-service-actor-design
  - id: SystemServiceActor-example-4
    labels:
      zh: checkpointer/postgres 服务实例
      en: checkpointer postgres service instance
      ja: checkpointer/postgres サービス事例
    descriptions:
      zh: SystemServiceActor actor_id=langgraph-postgres-checkpointer、service_kind=checkpointer、store_ref=checkpointer/postgres。
      en: SystemServiceActor actor_id=langgraph-postgres-checkpointer, service_kind=checkpointer, store_ref=checkpointer/postgres.
      ja: langgraph-postgres-checkpointer SystemServiceActor を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - SystemServiceActor
    related_relation_ids: []
    source_claims:
      - claim-system-service-actor-vendor
      - claim-system-service-actor-design
parent_relation:
  id: SystemServiceActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是系统基础设施软件参与主体
    en: is a system-infrastructure software actor
    ja: システム基盤ソフトウェアアクターである
  definitions:
    zh: SystemServiceActor-is_a-SoftwareActor 表示每个系统服务参与者都是当前 AgentSystem 运营的运行软件，并以为多个会话提供调度、状态、策略、密钥或遥测基础设施为种差；AgentActor 的任务决策循环、外部服务或静态配置不属于该子类。
    en: SystemServiceActor-is_a-SoftwareActor states that every system-service actor is running software operated by the current AgentSystem and differentiated by providing scheduling, state, policy, secret, or telemetry infrastructure to multiple sessions; an AgentActor task loop, external service, or static configuration is not this subtype.
    ja: SystemServiceActor-is_a-SoftwareActor は全 system-service actor が現 AgentSystem 運営の実行 software で複数 session へ scheduling・state・policy・secret・telemetry 基盤を提供することを種差とする。AgentActor task loop・外部 service・静的設定は該当しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有系统服务参与者子类
      en: has system-service-actor subtype
      ja: SystemServiceActor 下位型を持つ
  conditions:
    - id: SystemServiceActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when an identifiable running service is operated by the current AgentSystem and actually performs cross-session infrastructure responsibilities.
      explanations:
        zh: 仅当可识别的运行服务由当前 AgentSystem 运营，并实际执行跨会话基础设施职责时成立。
        en: Assert only when an identifiable running service is operated by the current AgentSystem and actually performs cross-session infrastructure responsibilities.
        ja: 識別可能な実行 service が現 AgentSystem に運営され複数 session 横断の基盤責任を実行する時だけ成立する。
      source_claims:
        - claim-system-service-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-system-service-actor-design
  distinct_fact_rationale:
    zh: 该边按共享基础设施责任分类，不与 AgentActor 的目标循环、ToolServiceActor 的业务操作或配置文件合并。
    en: The edge classifies shared infrastructure responsibility without merging the AgentActor goal loop, ToolServiceActor business operation, or a configuration file.
    ja: 共有基盤責任で分類し AgentActor goal loop・ToolServiceActor 業務操作・設定 file と統合しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
