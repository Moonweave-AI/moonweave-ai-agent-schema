schema: moonweave.ai/ontology-node/v1
id: SystemServiceActor
kind: concept
status: review
labels:
  zh: 系统服务参与者
  en: system service actor
  ja: システムサービスアクター
semantics:
  short_definition:
    zh: 系统服务参与者是在智能体系统治理边界内提供调度、状态、策略或可观测性基础能力的软件参与主体。
    en: A SystemServiceActor is a SoftwareActor inside the agent system's governance boundary that provides scheduling, state, policy, or observability infrastructure.
    ja: SystemServiceActor はエージェントシステムの統治境界内でスケジューリング、状態、ポリシー、可観測性基盤を提供する SoftwareActor である。
  definition:
    zh: 系统服务参与者是 SoftwareActor 的一种；其种差是它由 AgentSystem 运营并在运行中承担共享基础设施职责，例如会话调度、检查点保存、策略执行、秘密解析或遥测导出，而不拥有用户任务的模型决策循环。它可被其他参与者调用，但服务配置、数据库记录或外部托管服务不是这一内部运行者。
    en: A SystemServiceActor is a SoftwareActor distinguished by being operated by the AgentSystem and carrying shared infrastructure responsibility during runtime, such as session scheduling, checkpoint persistence, policy enforcement, secret resolution, or telemetry export, without owning the user-task model decision loop. Other actors may call it, but its configuration, database records, and an externally operated service are not this internal runtime participant.
    ja: SystemServiceActor は SoftwareActor の一種であり、AgentSystem が運用し、セッション調度、checkpoint 保存、ポリシー実施、秘密解決、telemetry export などの共有基盤責任を実行中に担い、利用者タスクのモデル判断ループは持たない。設定、DB 記録、外部運用サービスはこの内部実行者ではない。
  why_needed:
    zh: 该类别把平台基础设施行动与 AgentActor 的任务决策和 ExternalServiceActor 的外部责任分开，便于定位系统级故障与权限。
    en: This class separates platform-infrastructure actions from AgentActor task decisions and ExternalServiceActor responsibility, enabling correct system-level failure and authority attribution.
    ja: この分類はプラットフォーム基盤行為を AgentActor のタスク判断と ExternalServiceActor の外部責任から分け、システム障害と権限を正しく帰属させる。
  includes:
    - zh: 纳入由当前 AgentSystem 运营、具有运行身份并为多个会话提供调度、状态、策略、审计或遥测服务的软件组件。
      en: Includes a runtime-identified component operated by the current AgentSystem that provides scheduling, state, policy, audit, or telemetry services to multiple sessions.
      ja: 現 AgentSystem が運用し、実行識別子を持ち、複数セッションへ調度、状態、ポリシー、監査、telemetry を提供するソフトウェアコンポーネントを含む。
  excludes:
    - zh: 不纳入 AgentActor、面向业务调用的 ToolServiceActor、外部托管服务、服务配置文件、状态数据库或 AgentSystem 整体。
      en: Excludes an AgentActor, a business-facing ToolServiceActor, an externally hosted service, a service configuration file, a state database, and the whole AgentSystem.
      ja: AgentActor、業務呼出向け ToolServiceActor、外部ホストサービス、サービス設定、状態 DB、AgentSystem 全体は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SystemServiceActor-example-positive-001
    kind: positive
    labels:
      zh: 系统服务参与者正例
      en: Positive example of system service actor
      ja: システムサービスアクターの正例
    scenario_id: null
    descriptions:
      zh: scheduler-svc-4 为多个 RuntimeSession 分配执行槽、触发超时取消，并把每次调度决定写入审计追踪。
      en: scheduler-svc-4 allocates execution slots to multiple RuntimeSessions, triggers timeout cancellation, and records every scheduling decision in audit traces.
      ja: scheduler-svc-4 が複数 RuntimeSession へ実行 slot を割り当て、timeout cancellation を起動し、各調度判断を監査追跡へ記録する。
    field_values:
      actor_id: actor-system-service-001
      actor_kind: software
      display_name: Runtime scheduler service
    related_node_ids:
      - SystemServiceActor
      - SoftwareActor
    related_relation_ids:
      - SystemServiceActor-is_a-SoftwareActor
    expected_result:
      zh: scheduler-svc-4 归类为 SystemServiceActor。
      en: scheduler-svc-4 is classified as SystemServiceActor.
      ja: scheduler-svc-4 は SystemServiceActor に分類される。
    why_valid_or_invalid:
      zh: 它是系统内部运行服务，持续为多个会话提供共享调度能力且承担技术归属。
      en: It is an internally operated runtime service providing shared scheduling to several sessions under its own technical identity.
      ja: 内部運用実行サービスとして複数セッションへ共有調度を提供し、固有技術識別子を持つ。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-service-actor-001
  - id: SystemServiceActor-example-instance-001
    kind: instance
    labels:
      zh: 系统服务参与主体结构化实例
      en: Structured instance of system service actor
      ja: システムサービスアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-system-service-001 是名为 Runtime scheduler service 的内部服务 scheduler-svc-4；它为 session-17 与 session-18 分配执行槽、实施超时取消并记录每次调度决定。
      en: actor-system-service-001 is the internally operated scheduler-svc-4 named Runtime scheduler service; it allocates execution slots to session-17 and session-18, enforces timeout cancellation, and records each scheduling decision.
      ja: actor-system-service-001 は Runtime scheduler service という内部運用 scheduler-svc-4 で、session-17 と session-18 に実行 slot を割り当て、timeout cancellation を実施し、各 scheduling decision を記録します。
    field_values:
      actor_id: actor-system-service-001
      actor_kind: software
      display_name: Runtime scheduler service
    related_node_ids:
      - SystemServiceActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 SystemServiceActor 的继承结构，内部运营与跨会话基础设施责任种差成立，实例不成为图节点。
      en: The fields satisfy SystemServiceActor's inherited structure, internal operation and cross-session infrastructure responsibility hold, and the instance does not become a graph node.
      ja: 項目は SystemServiceActor の継承構造を満たし、内部運用と session 横断 infrastructure responsibility が成立し、instance は graph node になりません。
    why_valid_or_invalid:
      zh: actor_id 指向由 AgentSystem 运营的实际运行服务，actor_kind 保持 software；配置文件或外部托管调度器不满足该身份。
      en: actor_id identifies an actual running service operated by the AgentSystem and actor_kind remains software; a configuration file or externally hosted scheduler would not satisfy this identity.
      ja: actor_id は AgentSystem が運用する実稼働 service を示し、actor_kind は software を保ち、configuration file や外部 hosted scheduler はこの identity を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-service-actor-001
  - id: SystemServiceActor-example-boundary-001
    kind: boundary
    labels:
      zh: 系统服务参与者边界例
      en: Boundary case for system service actor
      ja: システムサービスアクターの境界例
    scenario_id: null
    descriptions:
      zh: scheduler-config.yaml 声明并发上限和超时，但文件本身不分配执行槽，也没有服务身份或运行状态。
      en: scheduler-config.yaml declares concurrency and timeout limits, but the file allocates no slots and has no service identity or runtime state.
      ja: scheduler-config.yaml は並行上限と timeout を宣言するが、slot を割り当てずサービス識別子も実行状態もない。
    field_values: {}
    related_node_ids:
      - SystemServiceActor
      - SoftwareActor
      - AgentActor
    related_relation_ids:
      - SystemServiceActor-is_a-SoftwareActor
    expected_result:
      zh: 该文件是配置规格，不是 SystemServiceActor。
      en: The file is a configuration specification, not a SystemServiceActor.
      ja: このファイルは設定仕様であり SystemServiceActor ではない。
    why_valid_or_invalid:
      zh: 系统服务必须是实际运行并实施基础设施行动的软件执行体；静态配置只约束它。
      en: A system service must be running software that performs infrastructure actions; static configuration only constrains it.
      ja: システムサービスは基盤行為を実施する稼働ソフトウェアでなければならず、静的設定は制約するだけである。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-service-actor-001
