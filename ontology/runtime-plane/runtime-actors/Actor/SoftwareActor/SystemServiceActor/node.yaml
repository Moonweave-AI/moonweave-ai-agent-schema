    ja: SystemServiceActor-is_a-SoftwareActor は全 system-service actor が現 AgentSystem 運営の実行 software で複数 session へ scheduling・state・policy・secret・telemetry 基盤を提供することを種差とする。AgentActor task loop・外部 service・静的設定は該当しない。
