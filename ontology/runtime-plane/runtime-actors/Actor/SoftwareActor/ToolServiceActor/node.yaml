parent_relation:
  id: ToolServiceActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是工具执行软件参与主体
    en: is a tool-execution software actor
    ja: ツール実行ソフトウェアアクターである
  definitions:
    zh: ToolServiceActor-is_a-SoftwareActor 表示每个工具服务参与者都是实际运行的软件主体，并以接收结构化工具调用、验证参数与授权、执行或分派操作及返回结果为种差；ToolDefinition、ToolCall、函数源码和注册表条目不是执行服务。
    en: ToolServiceActor-is_a-SoftwareActor states that every tool-service actor is running software differentiated by receiving structured tool calls, validating arguments and authority, executing or dispatching operations, and returning results; ToolDefinition, ToolCall, function source, and registry entries are not the executing service.
    ja: ToolServiceActor-is_a-SoftwareActor は全 tool-service actor が実行中 software で structured tool call 受信、argument/authority 検証、operation 実行・dispatch、result 返却を種差とする。ToolDefinition・ToolCall・function source・registry entry は実行 service でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有工具服务参与者子类
      en: has tool-service-actor subtype
      ja: ToolServiceActor 下位型を持つ
  conditions:
    - id: ToolServiceActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when software with a traceable service identity actually handles structured tool calls and returns attributable results or diagnostics.
      explanations:
        zh: 仅当具有可追踪服务身份的软件实际处理结构化工具调用并返回可归责结果或诊断时成立。
        en: Assert only when software with a traceable service identity actually handles structured tool calls and returns attributable results or diagnostics.
        ja: 追跡可能 service identity を持つ software が structured tool call を実際に処理し帰責可能 result または diagnostic を返す時だけ成立する。
      source_claims:
        - claim-tool-service-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-tool-service-actor-design
  distinct_fact_rationale:
    zh: 该边对工具调用执行服务分类，不把 ToolDefinition、RegistryEntry、ToolCall 或 AgentActor 的选择行为并入。
    en: The edge classifies the tool-call execution service and does not merge ToolDefinition, RegistryEntry, ToolCall, or AgentActor selection behavior.
    ja: tool-call execution service を分類し ToolDefinition・RegistryEntry・ToolCall・AgentActor 選択を統合しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
