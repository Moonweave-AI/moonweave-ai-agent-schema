source_claims:
  - id: claim-tool-service-boundary
    source: mcp
    supports: "MCP tool schemas and server roles are protocol definitions; ToolServiceActor is a separate Moonweave local executor identity."
    locator: "Official specification and Moonweave projection boundary"
    evidence_kind: design-inference
    confidence: high

