      ja: MCP repo read サービス事例
    descriptions:
      zh: ToolServiceActor actor_id=mcp-filesystem-svc、server_url=https://tools.example/mcp、tool_name=filesystem.read。
      en: ToolServiceActor actor_id=mcp-filesystem-svc, server_url=https://tools.example/mcp, tool_name=filesystem.read.
      ja: mcp-filesystem-svc ToolServiceActor を記録する。
    example_source:
