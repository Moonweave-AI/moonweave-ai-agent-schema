    kind: positive
    labels:
      zh: 工具服务参与者正例
      en: Positive example of tool service actor
      ja: ツールサービスアクターの正例
    scenario_id: null
    descriptions:
      zh: doc-search-svc 接收带 schema 校验的 search_documents 调用，检查调用者范围，查询索引并返回带来源的结果或结构化错误。
      en: doc-search-svc receives a schema-validated search_documents call, checks caller scope, queries the index, and returns sourced results or a structured error.
      ja: doc-search-svc が schema 検証済み search_documents 呼出を受け、呼出者範囲を確認し、index を照会して出典付き結果または構造化 error を返す。
    field_values:
      actor_id: actor-tool-service-001
      actor_kind: software
      display_name: Document search tool service
    related_node_ids:
      - ToolServiceActor
