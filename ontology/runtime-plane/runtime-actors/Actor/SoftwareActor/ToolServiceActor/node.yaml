  id: ToolServiceActor-specializes-SoftwareActor
  predicate: is_a
  target: concept:SoftwareActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: "is a tool-executing software actor"
    en: "is a tool-executing software actor"
    ja: "is a tool-executing software actor"
  definitions:
    zh: "Every ToolServiceActor is a SoftwareActor responsible for executing tool-facing service work."
    en: "Every ToolServiceActor is a SoftwareActor responsible for executing tool-facing service work."
    ja: "Every ToolServiceActor is a SoftwareActor responsible for executing tool-facing service work."
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: ["claim-tool-service-boundary"]
relations:
  - id: ToolServiceActor-supports-CapabilityDefinition
    predicate: supports_capability
    target: concept:CapabilityDefinition
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: semantic
    labels:
      zh: "supports capability definition"
      en: "supports capability definition"
      ja: "supports capability definition"
    definitions:
      zh: "A local tool service actor may execute work authorized by a separately defined capability."
      en: "A local tool service actor may execute work authorized by a separately defined capability."
      ja: "A local tool service actor may execute work authorized by a separately defined capability."
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    source_claims: ["claim-tool-service-boundary"]
sources:
  - id: prov
    title: "PROV-O: The PROV Ontology"
