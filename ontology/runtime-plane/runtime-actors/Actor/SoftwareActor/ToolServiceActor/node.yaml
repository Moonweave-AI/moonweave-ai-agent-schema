schema: moonweave.ai/ontology-node/v1
id: ToolServiceActor
kind: concept
status: accepted
labels:
  zh: 工具服务参与者
  en: Tool service actor
  ja: ツールサービスアクター
semantics:
  short_definition:
    zh: 负责执行面向工具工作的本地软件参与者。
    en: A local software actor responsible for executing tool-facing work.
    ja: ツール向け作業の実行に責任を持つローカルソフトウェア参加者。
  definition:
    zh: ToolServiceActor 是执行工具面向工作的服务的 Moonweave 本地责任身份。它与 MCP Tool 定义、MCP 服务器角色、OpenAI Agents SDK 工具配置、ToolCall Activity 以及能力定义不同；工具 schema 只能作为实现引用，不能复制为 actor_id。
    en: ToolServiceActor is Moonweave's local responsibility identity for a service that executes tool-facing work. It is distinct from an MCP Tool definition, an MCP server role, an OpenAI Agents SDK tool configuration, a ToolCall activity, and a capability definition; tool schemas remain implementation references rather than actor_id copies.
    ja: ToolServiceActor はツール向け作業を実行するサービスの Moonweave ローカル責任 identity である。MCP Tool 定義、MCP サーバーロール、OpenAI Agents SDK ツール設定、ToolCall Activity、能力定義とは異なる。ツール schema は actor_id の複製ではなく実装参照に留まる。
  why_needed:
    zh: 工具定义、传输接口、调用与执行服务具有不同的授权与审计边界。
    en: Tool definitions, transport interfaces, calls, and executing services have distinct authorization and audit boundaries.
    ja: ツール定義、トランスポートインターフェース、呼び出し、実行サービスは異なる認可と監査境界を持つ。
  includes:
    - zh: 执行工具工作的本地 tool runner、沙箱服务、连接器后端与服务主体。
      en: Local tool runners, sandbox services, connector backends, and service principals executing tool work.
      ja: ツール作業を実行するローカル tool runner、サンドボックスサービス、コネクタバックエンド、サービスプリンシパル。
  excludes:
    - zh: MCP Tool schema、MCP 服务器组件、SDK function-tool 配置、工具调用请求、能力记录或端点 URL。
      en: An MCP Tool schema, MCP server component, SDK function-tool configuration, tool-call request, capability record, or endpoint URL.
      ja: MCP Tool schema、MCP サーバーコンポーネント、SDK function-tool 設定、ツール呼び出し要求、能力記録、エンドポイント URL。
  semantic_kind: agent
  aliases: ["tool runner","tool executor"]
engineering:
  explanation:
    zh: "Local I/O records actor_id with a typed capability reference and execution-policy reference. MCP tool schemas or SDK tool configuration remain external implementation references."
    en: "Local I/O records actor_id with a typed capability reference and execution-policy reference. MCP tool schemas or SDK tool configuration remain external implementation references."
    ja: "Local I/O records actor_id with a typed capability reference and execution-policy reference. MCP tool schemas or SDK tool configuration remain external implementation references."
  typical_input:
    - description:
        zh: "Tool-service registration."
        en: "Tool-service registration."
        ja: "Tool-service registration."
      format: "{\"actor_id\":\"repo-tool-runner\",\"capability_ref\":\"capability:read-repo\",\"policy_ref\":\"policy:read-only\"}"
  typical_output:
    - description:
        zh: "Local tool-service projection."
        en: "Local tool-service projection."
        ja: "Local tool-service projection."
      format: "{\"actor_id\":\"repo-tool-runner\",\"actor_kind\":\"ToolServiceActor\",\"capability_ref\":\"capability:read-repo\"}"
  reference_implementations:
    - name: "MCP Tools"
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: "Defines server-exposed tools and schemas separately from tool-executing responsibility."
structure:
  identity_keys: ["actor_id"]
  fields:
    - id: actor_id
      labels:
        zh: "Tool service actor ID"
        en: "Tool service actor ID"
        ja: "Tool service actor ID"
      definitions:
        zh: "Local durable identity for the service responsible for tool execution."
        en: "Local durable identity for the service responsible for tool execution."
        ja: "Local durable identity for the service responsible for tool execution."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "repo-tool-runner"
      source_claims: ["claim-tool-service-boundary"]
    - id: actor_kind
      labels:
        zh: "参与者类别"
        en: "Actor kind"
        ja: "アクター種別"
      definitions:
        zh: "固定为 SoftwareActor，以保留从 SoftwareActor 继承的责任类别。"
        en: "Fixed to SoftwareActor to retain the responsibility category inherited from SoftwareActor."
        ja: "SoftwareActor から継承した責任種別を保持するため SoftwareActor に固定する。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      allowed_values: ["SoftwareActor"]
      example_value: "SoftwareActor"
      source_claims: ["claim-tool-service-boundary"]
    - id: tool_execution_policy_ref
      labels:
        zh: "Tool execution policy reference"
        en: "Tool execution policy reference"
        ja: "Tool execution policy reference"
      definitions:
        zh: "Local reference to the policy that constrains execution."
        en: "Local reference to the policy that constrains execution."
        ja: "Local reference to the policy that constrains execution."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "policy:read-only"
      source_claims: ["claim-tool-service-boundary"]
  constraints:
    - id: tool-service-not-tool-definition-or-call
      severity: error
      language: plain
      expression: "Do not use an MCP tool name, SDK tool configuration ID, or tool-call ID as actor_id; link the executing service to a typed capability reference."
      explanation:
        zh: "Tool schema, configuration, and invocation are different entities from the accountable executor."
        en: "Tool schema, configuration, and invocation are different entities from the accountable executor."
        ja: "Tool schema, configuration, and invocation are different entities from the accountable executor."
      source_claims: ["claim-tool-service-boundary"]
  required_relations: ["ToolServiceActor-specializes-SoftwareActor","ToolServiceActor-supports-CapabilityDefinition"]
examples:
  - id: toolserviceactor-positive
    labels: {zh: "MCP filesystem.read 工具服务", en: "MCP filesystem.read tool service", ja: "MCP filesystem.read ツールサービス"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ToolServiceActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ToolServiceActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ToolServiceActor provenance graph."}
    field_values: {"actor_id":"repo-tool-runner","actor_kind":"SoftwareActor","tool_execution_policy_ref":"policy:read-only"}
    related_node_ids: ["ToolServiceActor","CapabilityDefinition"]
    related_relation_ids: ["ToolServiceActor-supports-CapabilityDefinition"]
    source_claims: ["claim-tool-service-boundary"]
  - id: toolserviceactor-counterexample
    labels: {zh: "OpenAI function 名当 ToolServiceActor", en: "OpenAI function name as ToolServiceActor", ja: "OpenAI function 名を ToolServiceActor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ToolServiceActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ToolServiceActor.", ja: "Missing parent_run_id rejects LangSmith-style ToolServiceActor."}
    field_values: {"actor_id":"read_file"}
    related_node_ids: []
    related_relation_ids: []
    source_claims: ["claim-tool-service-boundary"]
  - id: toolserviceactor-boundary
    labels: {zh: "ToolServiceActor 与 AgentActor 边界", en: "ToolServiceActor versus AgentActor boundary", ja: "ToolServiceActor と AgentActor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ToolServiceActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ToolServiceActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"sdk_tool_name":"read_file"}
    related_node_ids: []
    related_relation_ids: []
    source_claims: ["claim-tool-service-boundary"]
  - id: toolserviceactor-instance
    labels: {zh: "MCP repo read 服务实例", en: "MCP repo read service instance", ja: "MCP repo read サービス事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ToolServiceActor.", en: "Langfuse instance: trace+span+score->ToolServiceActor.", ja: "Langfuse instance maps to ToolServiceActor."}
    field_values: {"actor_id":"repo-tool-runner","actor_kind":"SoftwareActor","tool_execution_policy_ref":"policy:read-only"}
    related_node_ids: ["ToolServiceActor","CapabilityDefinition"]
    related_relation_ids: ["ToolServiceActor-supports-CapabilityDefinition"]
    source_claims: ["claim-tool-service-boundary"]
