source_claims:
  - id: claim-tool-service-actor-001
    source: eng-proto-mcp-spec
    supports: MCP defines servers that expose tools, list definitions, handle tools/call requests, and return results. Moonweave types the running server-side executor separately from ToolDefinition and ToolCall.
    locator: MCP Specification 2025-11-25 > Architecture > Servers; Server features > Tools
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-service-actor-002
    source: eng-fw-openai-python-docs
    supports: "OpenAI defines Agent as the LLM-centered component that owns instructions and selects actions, and Tool as a callable operation whose result returns to the agent loop. Moonweave therefore distinguishes AgentActor from ToolServiceActor: exposing a callable capability does not confer goal selection or loop ownership on the tool service."
    locator: Agents > Basic configuration; Tools; Running agents > The agent loop
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-service-actor-003
    source: eng-proto-mcp-spec
    supports: MCP architecture defines servers that expose features, and the Tools specification requires a server capability, tools/list discovery, and tools/call handling. Moonweave classifies the running server-side executor separately from definitions and calls.
    locator: MCP Specification 2025-11-25 > Architecture > Servers; Server features > Tools
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

