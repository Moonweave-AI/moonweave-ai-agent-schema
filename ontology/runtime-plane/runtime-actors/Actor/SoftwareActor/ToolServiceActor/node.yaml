sibling_differentiation:
  - sibling_concept_id: AgentActor
    shared_parent_concept_id: SoftwareActor
    differentia:
      zh: 端点特定对照：父节点 SoftwareActor：ToolServiceActor（semantic kind=entity，骨架 ToolServiceActor-is_a-SoftwareActor）；AgentActor（semantic kind=entity，骨架 AgentActor-is_a-SoftwareActor）。双端条件：ToolServiceActor 条件：“工具服务参与者是一种软件参与主体；其区分条件是：它表示可调用服务或工具端点，负责执行请求并返回可观测结果、警告、错误或产物”；AgentActor 条件：“智能体参与者是一种软件参与主体；其区分条件是：它是能够行动、观察、调用工具、接收委派、发出追踪事件并对会话活动承担责任的运行身份”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SoftwareActor: ToolServiceActor (semantic kind=entity, backbone ToolServiceActor-is_a-SoftwareActor); AgentActor (semantic kind=entity, backbone AgentActor-is_a-SoftwareActor). Endpoint conditions: ToolServiceActor condition: “As a software actor, Tool service actor is distinguished by the fact that it is a runtime participant representing a callable service or tool endpoint that executes requests and returns observable results, warnings, errors, or artifacts”; AgentActor condition: “As a software actor, Agent actor is distinguished by the fact that it is a runtime identity capable of acting, observing, invoking tools, receiving delegation, emitting trace events, and being accountable for session activity”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SoftwareActor：ToolServiceActor（semantic kind=entity、バックボーン ToolServiceActor-is_a-SoftwareActor）；AgentActor（semantic kind=entity、バックボーン AgentActor-is_a-SoftwareActor）。両端条件：ToolServiceActor の条件：「ソフトウェアアクターに属するツールサービスアクターは、次の事実を種差とします：それは、呼び出し可能なサービスまたはツールエンドポイントを表し、要求を実行して観測可能な結果、警告、エラー、成果物を返します」；AgentActor の条件：「ソフトウェアアクターに属するエージェントアクターは、次の事実を種差とします：それは、行動、観測、ツール呼び出し、委任の受領、トレースイベントの発行、セッション活動への責任を担える実行上の識別です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-tool-service-actor-002
