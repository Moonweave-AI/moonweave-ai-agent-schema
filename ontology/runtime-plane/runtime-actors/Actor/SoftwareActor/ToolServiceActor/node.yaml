    expected_result:
      zh: doc-search-svc 归类为 ToolServiceActor；search_documents 的定义与调用分别保持独立类型。
      en: doc-search-svc is a ToolServiceActor; the search_documents definition and call retain separate types.
      ja: doc-search-svc は ToolServiceActor であり、search_documents の定義と呼出は別型のままである。
    why_valid_or_invalid:
      zh: 该运行服务真实接收、授权并执行工具操作，且以服务身份交付结果。
      en: The running service actually receives, authorizes, and executes the tool operation and delivers results under service identity.
      ja: 稼働サービスがツール操作を実際に受け、認可、実行し、サービス識別子で結果を返す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-service-actor-001
  - id: ToolServiceActor-example-instance-001
