      en: Structured instance of tool service actor
      ja: ツールサービスアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-tool-service-001 是名为 Document search tool service 的运行服务 doc-search-svc；它接收 MCP tools/call request-614，验证 search_documents 参数与调用权限，查询索引并返回带来源结果。
      en: actor-tool-service-001 is the running doc-search-svc named Document search tool service; it receives MCP tools/call request-614, validates search_documents arguments and caller authority, queries the index, and returns sourced results.
      ja: actor-tool-service-001 は Document search tool service という稼働 doc-search-svc で、MCP tools/call request-614 を受け、search_documents の引数と caller authority を検証し、index を照会して出典付き結果を返します。
    field_values:
      actor_id: actor-tool-service-001
      actor_kind: software
      display_name: Document search tool service
    related_node_ids:
      - ToolServiceActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 ToolServiceActor 的继承结构，调用接收、授权、执行与结果返回种差成立，实例仅在节点内展示。
      en: The fields satisfy ToolServiceActor's inherited structure; call receipt, authorization, execution, and result return hold, and the instance is displayed only inline.
      ja: 項目は ToolServiceActor の継承構造を満たし、call receipt、authorization、execution、result return の種差が成立し、instance は node 内だけに表示されます。
    why_valid_or_invalid:
      zh: actor_id 标识实际执行 tools/call 的运行服务，actor_kind 为 software；工具定义、注册项或单次 ToolCall 均不是该执行主体。
      en: actor_id identifies the running service that actually executes tools/call and actor_kind is software; a tool definition, registry entry, or individual ToolCall is not that executor.
      ja: actor_id は tools/call を実際に実行する稼働 service を示し、actor_kind は software であり、tool definition、registry entry、単一 ToolCall はその executor ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-service-actor-001
  - id: ToolServiceActor-example-boundary-001
    kind: boundary
    labels:
      zh: 工具服务参与者边界例
      en: Boundary case for tool service actor
      ja: ツールサービスアクターの境界例
    scenario_id: null
    descriptions:
      zh: registry-entry-9 保存工具名、输入 schema 和服务 URL，但它不接收调用、检查权限或执行检索。
      en: registry-entry-9 stores a tool name, input schema, and service URL but receives no calls, checks no authority, and executes no retrieval.
      ja: registry-entry-9 はツール名、入力 schema、サービス URL を保存するが、呼出を受けず権限確認も検索実行もしない。
    field_values: {}
    related_node_ids:
      - ToolServiceActor
      - SoftwareActor
      - AgentActor
    related_relation_ids:
      - ToolServiceActor-is_a-SoftwareActor
    expected_result:
      zh: 该对象是工具注册信息，不是 ToolServiceActor。
      en: The object is tool-registry information, not a ToolServiceActor.
      ja: この対象はツール登録情報であり ToolServiceActor ではない。
    why_valid_or_invalid:
      zh: 服务参与主体要求正在运行并实施工具操作，描述可调用能力的信息记录不具行动能力。
      en: A service actor must be running and perform tool operations; an information record describing callable capability cannot act.
      ja: サービス主体は稼働してツール操作を実施する必要があり、呼出能力を記述する情報記録は行為できない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-service-actor-001
