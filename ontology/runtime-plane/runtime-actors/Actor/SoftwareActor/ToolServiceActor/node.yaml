schema: moonweave.ai/ontology-node/v1
id: ToolServiceActor
kind: concept
labels:
  zh: 工具服务参与者
  en: tool service actor
  ja: ツールサービスアクター
semantics:
  short_definition:
    zh: 工具服务参与者是以运行服务身份公开可调用工具操作并返回可观察结果的软件参与主体。
    en: A ToolServiceActor is a SoftwareActor that exposes callable tool operations and returns observable results under a runtime service identity.
    ja: ToolServiceActor は実行サービス識別子で呼出可能なツール操作を公開し、可観測結果を返す SoftwareActor である。
  definition:
    zh: 工具服务参与者是 SoftwareActor 的一种；其种差是它在运行中接收结构化工具调用、验证参数与权限、执行或转交操作并返回结果或诊断。它按功能分类，因此可以同时是内部 SystemServiceActor 或外部 ExternalServiceActor；Tool、ToolDefinition、APIOperation 和单次 ToolCall 都不是执行服务本身。
    en: A ToolServiceActor is a SoftwareActor distinguished by receiving structured tool calls at runtime, validating arguments and authority, executing or dispatching the operation, and returning a result or diagnostic. It is a functional classification and may also be an internal SystemServiceActor or external ExternalServiceActor; a Tool, ToolDefinition, APIOperation, or individual ToolCall is not the executing service itself.
    ja: ToolServiceActor は SoftwareActor の一種であり、実行中に構造化ツール呼出を受け、引数と権限を検証し、操作を実行または転送して結果・診断を返す。機能分類なので内部 SystemServiceActor または外部 ExternalServiceActor と重なり得るが、Tool、ToolDefinition、APIOperation、単一 ToolCall は実行サービス自体ではない。
  why_needed:
    zh: 该类别把工具调用的服务执行者与工具契约、调用记录和智能体选择者分开，同时允许明确内部或外部运营边界。
    en: This class separates the service executing a tool call from the tool contract, call record, and agent selector while allowing its internal or external operating boundary to be stated.
    ja: この分類はツール呼出のサービス実行者をツール契約、呼出記録、選択エージェントから分け、内部・外部運用境界も示せる。
  includes:
    - zh: 纳入具有服务身份、通过 MCP、HTTP、函数运行器或本地守护进程接收工具调用并产生结果的软件执行体。
      en: Includes a runtime service with identity that receives tool calls through MCP, HTTP, a function runner, or a local daemon and produces results.
      ja: サービス識別子を持ち、MCP、HTTP、関数ランナー、ローカル daemon でツール呼出を受けて結果を生成するソフトウェア実行体を含む。
  excludes:
    - zh: 不纳入 ToolDefinition、函数源码、一次 ToolCall、ExecutionResult、选择工具的 AgentActor 或仅列出工具的注册表记录。
      en: Excludes a ToolDefinition, function source code, one ToolCall, an ExecutionResult, the AgentActor selecting the tool, and a registry record that only lists the tool.
      ja: ToolDefinition、関数ソース、単一 ToolCall、ExecutionResult、ツールを選ぶ AgentActor、一覧だけの登録記録は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: ToolServiceActor（ToolExecutor）映射 OpenAI assistant tools（code_interpreter、file_search）、LangGraph tool node 与 MCP tool server 的执行服务主体；工具 schema 列表不等于 ToolServiceActor 参与事实。
    en: ToolServiceActor (ToolExecutor) maps OpenAI assistant tools (code_interpreter, file_search), LangGraph tool nodes, and MCP tool server execution principals; a tools schema list is not participation evidence.
    ja: ToolServiceActor（ToolExecutor）は OpenAI tools、LangGraph tool node、MCP server 実行主体を写像し tools 配列だけでは参加証拠になりません。
  typical_input:
    - description: OpenAI Assistants assistant/model/tools or LangGraph runnable config.
      format: tools=[{"type":"code_interpreter"}] + tool_calls in run step
      source_claims:
        - claim-openai-assistants-actor
        - claim-tool-service-actor-design
  typical_output:
    - description: Moonweave Actor projection with participation evidence.
      format: '{"tool_service_actor_id":"tool-code-interpreter-01","tool_call_id":"call_abc"}'
      source_claims:
        - claim-tool-service-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
