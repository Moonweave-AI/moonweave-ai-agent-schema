source_claims:
  - id: claim-external-service-actor-001
    source: eng-proto-a2a-spec
    supports: A2A separates the AgentCard discovery record from the server-side agent that receives messages and manages tasks. Moonweave types the actually participating externally operated service as ExternalServiceActor.
    locator: A2A Protocol Specification v1.0 §4.4 AgentCard and §8 Agent discovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-external-service-actor-002
    source: eng-fw-openai-python-docs
    supports: OpenAI separates model providers and model selection from tools and MCP servers that expose callable external operations. Moonweave uses that boundary to classify software whose defining function is hosting or invoking a Model as ModelActor, while a service addressed for a non-model operation is ExternalServiceActor.
    locator: Models > Using other LLM providers; Tools; Model context protocol (MCP)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-external-service-actor-003
    source: eng-proto-a2a-spec
    supports: The A2A specification separates an AgentCard used for discovery from the server-side agent that receives messages and manages tasks. Moonweave classifies the running externally operated service as ExternalServiceActor and keeps the card as information.
    locator: A2A Protocol Specification v1.0 §4.4 AgentCard and §8 Agent discovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

