        - SoftwareActor
      related_relation_ids:
        - ExternalServiceActor-is_a-SoftwareActor
      expected_result:
        zh: AgentCard 保持 RemoteAgentReference，不据此实例化 ExternalServiceActor 参与事实。
        en: Keep the AgentCard as RemoteAgentReference and do not instantiate ExternalServiceActor participation from it.
        ja: AgentCard は RemoteAgentReference のままとし ExternalServiceActor 参加を生成しない。
      why_valid_or_invalid:
        zh: 发现信息描述潜在服务，实际参与需要可归责的运行通信。
        en: Discovery information describes a potential service; actual participation requires attributable runtime communication.
        ja: discovery 情報は潜在 service を記述し、実参加には帰責可能な runtime 通信が必要である。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-external-service-actor-003
  source_claims:
    - claim-external-service-actor-003
  distinct_fact_rationale:
    zh: 该边按实际运行主体与外部治理条件分类，不把 RemoteAgentReference、接口地址或信任边界本身当作 Actor。
    en: The edge classifies an actual runtime participant under an external-governance condition and does not treat RemoteAgentReference, endpoint address, or the boundary itself as an Actor.
    ja: 実行主体を外部統治条件で分類し RemoteAgentReference・endpoint・boundary 自体を Actor にしない。
