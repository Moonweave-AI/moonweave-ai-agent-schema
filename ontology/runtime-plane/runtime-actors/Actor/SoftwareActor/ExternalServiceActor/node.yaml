schema: moonweave.ai/ontology-node/v1
id: ExternalServiceActor
kind: concept
labels:
  zh: 外部服务参与者
  en: external service actor
  ja: 外部サービスアクター
semantics:
  short_definition:
    zh: 外部服务参与者是位于本智能体系统治理边界之外、通过协议参与运行的软件参与主体。
    en: An ExternalServiceActor is a SoftwareActor outside the agent system's governance boundary that participates in runtime through a protocol.
    ja: ExternalServiceActor は本エージェントシステムの統治境界外にあり、プロトコルで実行へ参加する SoftwareActor である。
  definition:
    zh: 外部服务参与者是 SoftwareActor 的一种；其种差是运行中的调用或响应由另一个运营或信任边界内的可识别服务执行，当前系统只能通过端点、协议身份和契约与其交互。它可以同时提供工具或远程智能体能力，但 RemoteAgentReference 只是描述该服务的信息，网络地址本身也不是参与主体。
    en: An ExternalServiceActor is a SoftwareActor distinguished by calls or responses executed by an identifiable service operated in another governance or trust boundary, with the current system interacting only through endpoint, protocol identity, and contract. It may also provide tools or a remote agent, but RemoteAgentReference is only information describing it and a network address is not itself an Actor.
    ja: ExternalServiceActor は SoftwareActor の一種であり、別の運用・信頼境界で識別可能なサービスが呼出・応答を実行し、現システムはエンドポイント、プロトコル識別子、契約だけで対話する。ツールや遠隔エージェント能力も提供し得るが、RemoteAgentReference は記述情報であり、ネットワークアドレス自体も Actor ではない。
  why_needed:
    zh: 该类别标明运行责任与信任边界跨越的位置，使可用性、认证、数据披露和故障归属不会错误落到本地服务。
    en: This class marks where runtime responsibility crosses a trust boundary so availability, authentication, disclosure, and failure attribution are not incorrectly assigned to a local service.
    ja: この分類は実行責任が信頼境界を越える位置を示し、可用性、認証、情報開示、障害帰属をローカルサービスへ誤配しない。
  includes:
    - zh: 纳入由外部组织或独立平台运行、具有服务身份并通过 A2A、MCP、HTTP 或消息协议参与当前运行的服务。
      en: Includes a service operated by an outside organization or independent platform with service identity that participates through A2A, MCP, HTTP, or messaging protocols.
      ja: 外部組織または独立プラットフォームが運用し、サービス識別子を持ち、A2A、MCP、HTTP、メッセージプロトコルで現実行へ参加するサービスを含む。
  excludes:
    - zh: 不纳入内部 SystemServiceActor、静态 URL、RemoteAgentReference、外部组织本身或尚未收到任何运行调用的服务目录条目。
      en: Excludes an internal SystemServiceActor, a static URL, a RemoteAgentReference, the outside organization itself, and a service-catalog entry with no runtime participation.
      ja: 内部 SystemServiceActor、静的 URL、RemoteAgentReference、外部組織自体、実行参加のないサービス目録項目は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 ExternalServiceActor 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ExternalServiceActor, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ExternalServiceActor 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ExternalServiceActor.
      format: |-
        # Example ExternalServiceActor ingest
        { "external-service-actor_ref": "example-1" }
      source_claims:
        - claim-external-service-actor-design
  typical_output:
    - description: Moonweave-local ExternalServiceActor projection.
      format: '{ "schema_owner": "moonweave-local-design", "external-service-actor_id": "example-1" }'
      source_claims:
        - claim-external-service-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExternalServiceActor-example-positive-001
    labels:
      zh: A2A 远程 review 服务
      en: A2A remote review service
      ja: A2A リモート review サービス
    descriptions:
      zh: A2A Protocol AgentCard url=https://review.example.com/.well-known/agent.json 引用 ExternalServiceActor actor_id=a2a-review-remote，执行远程 review 任务。
      en: A2A Protocol AgentCard url=https://review.example.com/.well-known/agent.json references ExternalServiceActor actor_id=a2a-review-remote executing remote review task.
      ja: A2A AgentCard URL が ExternalServiceActor を参照する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-external-service-001
      actor_kind: external-service
      display_name: External retrieval service
    related_node_ids:
      - ExternalServiceActor
      - SoftwareActor
    related_relation_ids:
      - ExternalServiceActor-is_a-SoftwareActor
    source_claims:
      - claim-external-service-actor-design
  - id: ExternalServiceActor-example-instance-001
    labels:
      zh: HTTP 404 当 ExternalServiceActor
      en: HTTP 404 as ExternalServiceActor
      ja: HTTP 404 を ExternalServiceActor とする
    descriptions:
      zh: HTTP 404 响应无 AgentCard/服务端点身份，不是 ExternalServiceActor；需稳定远程服务引用与能力证据。
      en: HTTP 404 response without AgentCard/service endpoint identity is not ExternalServiceActor; needs stable remote service reference and capability evidence.
      ja: HTTP 404 だけでは ExternalServiceActor にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-external-service-001
      actor_kind: external-service
      display_name: External retrieval service
    related_node_ids:
      - ExternalServiceActor
    related_relation_ids: []
    source_claims:
      - claim-external-service-actor-design
  - id: ExternalServiceActor-example-boundary-001
    labels:
      zh: ExternalServiceActor 与 RemoteAgentReference 边界
      en: ExternalServiceActor versus RemoteAgentReference boundary
      ja: ExternalServiceActor と RemoteAgentReference 境界
    descriptions:
      zh: ExternalServiceActor 是远程服务责任主体；RemoteAgentReference 是发现/card 引用 Entity；card 引用不等于本地 Actor 身份。
      en: ExternalServiceActor is remote service responsible principal; RemoteAgentReference is discovery/card reference Entity; card reference is not local Actor identity.
      ja: ExternalServiceActor と RemoteAgentReference は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ExternalServiceActor
      - SoftwareActor
      - AgentActor
    related_relation_ids:
      - ExternalServiceActor-is_a-SoftwareActor
    source_claims:
      - claim-external-service-actor-design
  - id: ExternalServiceActor-example-4
    labels:
      zh: a2a-review.example.com 实例
      en: a2a-review.example.com instance
      ja: a2a-review.example.com 事例
    descriptions:
      zh: ExternalServiceActor actor_id=a2a-review-remote、agent_card_url=https://review.example.com/.well-known/agent.json、capability=review_patch。
      en: ExternalServiceActor actor_id=a2a-review-remote, agent_card_url=https://review.example.com/.well-known/agent.json, capability=review_patch.
      ja: a2a-review-remote ExternalServiceActor を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ExternalServiceActor
    related_relation_ids: []
    source_claims:
      - claim-external-service-actor-vendor
      - claim-external-service-actor-design
parent_relation:
  id: ExternalServiceActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是外部治理的软件参与主体
    en: is an externally governed software actor
    ja: 外部統治のソフトウェアアクターである
  definitions:
    zh: ExternalServiceActor-is_a-SoftwareActor 表示每个外部服务参与者都是实际运行的软件主体，并以其运行责任位于当前 AgentSystem 治理或信任边界之外、仅经声明协议接口参与为种差；URL、AgentCard 或外部组织本身不是该主体。
    en: ExternalServiceActor-is_a-SoftwareActor states that every external-service actor is running software differentiated by operating responsibility outside the current AgentSystem governance or trust boundary and participating only through declared protocol interfaces; a URL, AgentCard, or outside organization is not the actor.
    ja: ExternalServiceActor-is_a-SoftwareActor は全外部 service actor が実行中 software で、運用責任が現 AgentSystem の統治・信頼境界外にあり宣言 protocol interface 経由で参加することを種差とする。URL、AgentCard、外部組織自体は主体でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有外部服务参与者子类
      en: has external-service-actor subtype
      ja: ExternalServiceActor 下位型を持つ
  conditions:
    - id: ExternalServiceActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when an identifiable software service actually receives or returns messages for this run and its operator or execution environment lies beyond a declared external boundary.
      explanations:
        zh: 仅当可识别的软件服务实际接收或返回本次运行消息，并且其运营方或执行环境位于已声明的外部边界时成立。
        en: Assert only when an identifiable software service actually receives or returns messages for this run and its operator or execution environment lies beyond a declared external boundary.
        ja: 識別可能な software service が本 run の message を実際に受送信し、運営者または実行環境が宣言外部境界の向こうにある時だけ成立する。
      source_claims:
        - claim-external-service-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-external-service-actor-design
  distinct_fact_rationale:
    zh: 该边按实际运行主体与外部治理条件分类，不把 RemoteAgentReference、接口地址或信任边界本身当作 Actor。
    en: The edge classifies an actual runtime participant under an external-governance condition and does not treat RemoteAgentReference, endpoint address, or the boundary itself as an Actor.
    ja: 実行主体を外部統治条件で分類し RemoteAgentReference・endpoint・boundary 自体を Actor にしない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
