schema: moonweave.ai/ontology-node/v1
id: ExternalServiceActor
kind: concept
status: accepted
labels:
  zh: 外部服务参与者
  en: External service actor
  ja: 外部サービスアクター
semantics:
  short_definition:
    zh: 在当前运行时边界之外运营、但已在本地注册的责任服务的记录。
    en: A local record for a responsibility-bearing service operated outside the current runtime boundary.
    ja: 現在のランタイム境界外で運用され、ローカル登録された責任サービスの記録。
  definition:
    zh: ExternalServiceActor 是外部服务完成注册且责任边界经评估后的 Moonweave 本地可信服务投影。发布 AgentCard 不会自动使其成为 A2A 智能体，暴露 MCP 也不会自动使其成为 MCP 服务器；它不等于 OpenTelemetry service 属性或 CloudEvents event source。它通过 trust_ref 保留验证证据，并可引用 A2A AgentCard，但不复制发现文档字段为 actor_id。
    en: ExternalServiceActor is Moonweave's local trusted-service projection after an external service has been registered and its responsibility boundary evaluated. It is not automatically an A2A agent because it publishes a card, not an MCP server merely because it exposes MCP, not an OpenTelemetry service attribute, and not a CloudEvents event source. It retains verification evidence through trust_ref and may reference an A2A AgentCard without copying discovery document fields into actor_id.
    ja: ExternalServiceActor は外部サービスが登録され責任境界が評価された後の Moonweave ローカル信頼サービス投影である。AgentCard を公開したからといって A2A エージェントにはならず、MCP を公開しただけで MCP サーバーにもならない。OpenTelemetry service 属性や CloudEvents event source でもない。trust_ref で検証証拠を保持し、A2A AgentCard を参照できるが、発見文書フィールドを actor_id に複製しない。
  why_needed:
    zh: 外部服务需要持久的本地问责与信任上下文，但不能把发现、传输或遥测标识当作参与者身份。
    en: External services need durable local accountability and trust context without treating discovery, transport, or telemetry identifiers as actor identities.
    ja: 外部サービスには永続的なローカル説明責任と信頼文脈が必要だが、発見、トランスポート、テレメトリー識別子を参加者 identity として扱ってはならない。
  includes:
    - zh: 具有本地问责记录的已注册远程 API、合作伙伴服务与外部运营 worker 服务。
      en: Registered remote APIs, partner services, and externally operated worker services with a local accountability record.
      ja: ローカル説明責任記録を持つ登録済みリモート API、パートナーサービス、外部運用 worker サービス。
  excludes:
    - zh: 未验证端点、原始 A2A AgentCard、MCP 服务器进程、service.name 值、CloudEvents source 字符串或单次远程调用。
      en: An unverified endpoint, raw A2A AgentCard, MCP server process, service.name value, CloudEvents source string, or individual remote call.
      ja: 未検証エンドポイント、生 A2A AgentCard、MCP サーバープロセス、service.name 値、CloudEvents source 文字列、個別リモート呼び出し。
  semantic_kind: agent
  aliases: ["remote service principal"]
engineering:
  explanation:
    zh: "Input records a local actor_id plus trusted endpoint and provenance references. Output is a local responsibility record; source URLs and discovery cards remain separately typed references."
    en: "Input records a local actor_id plus trusted endpoint and provenance references. Output is a local responsibility record; source URLs and discovery cards remain separately typed references."
    ja: "Input records a local actor_id plus trusted endpoint and provenance references. Output is a local responsibility record; source URLs and discovery cards remain separately typed references."
  typical_input:
    - description:
        zh: "External-service registration."
        en: "External-service registration."
        ja: "External-service registration."
      format: "{\"actor_id\":\"partner-review\",\"endpoint_ref\":\"url:https://partner.example/a2a\",\"trust_ref\":\"trust:partner-v1\"}"
  typical_output:
    - description:
        zh: "Trusted local service projection."
        en: "Trusted local service projection."
        ja: "Trusted local service projection."
      format: "{\"actor_id\":\"partner-review\",\"actor_kind\":\"ExternalServiceActor\",\"trust_ref\":\"trust:partner-v1\"}"
  reference_implementations:
    - name: "A2A Agent Discovery"
      url: https://a2a-protocol.org/latest/topics/agent-discovery/
      description: "Shows that AgentCard is separate discovery metadata."
structure:
  identity_keys: ["actor_id"]
  fields:
    - id: actor_id
      labels:
        zh: "External service actor ID"
        en: "External service actor ID"
        ja: "External service actor ID"
      definitions:
        zh: "Local durable responsibility identifier after registration."
        en: "Local durable responsibility identifier after registration."
        ja: "Local durable responsibility identifier after registration."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "partner-review"
      source_claims: ["claim-external-service-boundary"]
    - id: actor_kind
      labels:
        zh: "参与者类别"
        en: "Actor kind"
        ja: "アクター種別"
      definitions:
        zh: "固定为 SoftwareActor，以保留从 SoftwareActor 继承的责任类别。"
        en: "Fixed to SoftwareActor to retain the responsibility category inherited from SoftwareActor."
        ja: "SoftwareActor から継承した責任種別を保持するため SoftwareActor に固定する。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      allowed_values: ["SoftwareActor"]
      example_value: "SoftwareActor"
      source_claims: ["claim-external-service-boundary"]
    - id: trust_ref
      labels:
        zh: "Trust reference"
        en: "Trust reference"
        ja: "Trust reference"
      definitions:
        zh: "Local reference to verification and accountability evidence."
        en: "Local reference to verification and accountability evidence."
        ja: "Local reference to verification and accountability evidence."
      datatype: string
      required: false
      cardinality: {"min":0,"max":1}
      example_value: "trust:partner-v1"
      source_claims: ["claim-external-service-boundary"]
  constraints:
    - id: external-service-actor-trust-before-attribution
      severity: error
      language: plain
      expression: "An ExternalServiceActor must have a local trust_ref before it is used for responsibility attribution; an endpoint or AgentCard alone is insufficient."
      explanation:
        zh: "Discovery and transport facts establish neither local accountability nor authorization."
        en: "Discovery and transport facts establish neither local accountability nor authorization."
        ja: "Discovery and transport facts establish neither local accountability nor authorization."
      source_claims: ["claim-external-service-boundary"]
  required_relations: ["ExternalServiceActor-specializes-SoftwareActor","ExternalServiceActor-references-A2AAgentCard"]
examples:
  - id: externalserviceactor-positive
    labels: {zh: "A2A 远程 review 服务", en: "A2A remote review service", ja: "A2A リモート review サービス"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ExternalServiceActor maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ExternalServiceActor maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ExternalServiceActor provenance graph."}
    field_values: {"actor_id":"partner-review","actor_kind":"SoftwareActor","trust_ref":"trust:partner-v1"}
    related_node_ids: ["ExternalServiceActor","A2AAgentCard"]
    related_relation_ids: ["ExternalServiceActor-references-A2AAgentCard"]
    source_claims: ["claim-external-service-boundary"]
  - id: externalserviceactor-counterexample
    labels: {zh: "HTTP 404 当 ExternalServiceActor", en: "HTTP 404 as ExternalServiceActor", ja: "HTTP 404 を ExternalServiceActor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ExternalServiceActor.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ExternalServiceActor.", ja: "Missing parent_run_id rejects LangSmith-style ExternalServiceActor."}
    field_values: {"endpoint":"https://partner.example/a2a"}
    related_node_ids: []
    related_relation_ids: []
    source_claims: ["claim-external-service-boundary"]
  - id: externalserviceactor-boundary
    labels: {zh: "ExternalServiceActor 与 RemoteAgentReference 边界", en: "ExternalServiceActor versus RemoteAgentReference boundary", ja: "ExternalServiceActor と RemoteAgentReference 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ExternalServiceActor preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ExternalServiceActor preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"agent_card_ref":"card:partner-review"}
    related_node_ids: ["A2AAgentCard"]
    related_relation_ids: ["ExternalServiceActor-references-A2AAgentCard"]
    source_claims: ["claim-external-service-boundary"]
  - id: externalserviceactor-instance
    labels: {zh: "a2a-review.example.com 实例", en: "a2a-review.example.com instance", ja: "a2a-review.example.com 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ExternalServiceActor.", en: "Langfuse instance: trace+span+score->ExternalServiceActor.", ja: "Langfuse instance maps to ExternalServiceActor."}
    field_values: {"actor_id":"partner-review","actor_kind":"SoftwareActor","trust_ref":"trust:partner-v1"}
    related_node_ids: ["ExternalServiceActor"]
    related_relation_ids: []
    source_claims: ["claim-external-service-boundary"]
parent_relation:
  id: ExternalServiceActor-specializes-SoftwareActor
  predicate: is_a
  target: concept:SoftwareActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: "is an externally operated software actor"
    en: "is an externally operated software actor"
    ja: "is an externally operated software actor"
  definitions:
    zh: "Every ExternalServiceActor is a SoftwareActor whose accountable operation is external to the current runtime boundary."
    en: "Every ExternalServiceActor is a SoftwareActor whose accountable operation is external to the current runtime boundary."
    ja: "Every ExternalServiceActor is a SoftwareActor whose accountable operation is external to the current runtime boundary."
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: ["claim-external-service-boundary"]
relations:
  - id: ExternalServiceActor-references-A2AAgentCard
    predicate: references_discovery_card
    target: concept:A2AAgentCard
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: "references A2A discovery card"
      en: "references A2A discovery card"
      ja: "references A2A discovery card"
    definitions:
      zh: "A local external service record may retain a verified A2A AgentCard reference without becoming that document."
      en: "A local external service record may retain a verified A2A AgentCard reference without becoming that document."
      ja: "A local external service record may retain a verified A2A AgentCard reference without becoming that document."
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    source_claims: ["claim-external-service-boundary"]
sources:
  - id: prov
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: "Defines responsibility-bearing Agent and SoftwareAgent."
  - id: a2a
    title: "A2A Agent Discovery"
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: "Defines AgentCard as a server-published discovery document."
  - id: mcp
    title: "MCP Architecture and Tools"
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: "Defines MCP server tools and host-client-server architecture."
  - id: otel
    title: "OpenTelemetry Resource Semantic Conventions"
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: "Defines service telemetry resource attributes."
source_claims:
  - id: claim-external-service-boundary
    source: a2a
    supports: "A2A AgentCard and MCP endpoint roles are discovery or transport facts; ExternalServiceActor is a Moonweave local accountability projection."
    locator: "Official specification and Moonweave projection boundary"
    evidence_kind: design-inference
    confidence: high

