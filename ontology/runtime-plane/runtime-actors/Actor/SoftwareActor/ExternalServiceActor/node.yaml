schema: moonweave.ai/ontology-node/v1
id: ExternalServiceActor
kind: concept
status: accepted
labels:
  zh: 外部服务参与者
  en: external service actor
  ja: 外部サービスアクター
semantics:
  short_definition:
    zh: 外部服务参与者是位于本智能体系统治理边界之外、通过协议参与运行的软件参与主体。
    en: An ExternalServiceActor is a SoftwareActor outside the agent system's governance boundary that participates in runtime through a protocol.
    ja: ExternalServiceActor は本エージェントシステムの統治境界外にあり、プロトコルで実行へ参加する SoftwareActor である。
  definition:
    zh: 外部服务参与者是 SoftwareActor 的一种；其种差是运行中的调用或响应由另一个运营或信任边界内的可识别服务执行，当前系统只能通过端点、协议身份和契约与其交互。它可以同时提供工具或远程智能体能力，但 RemoteAgentReference 只是描述该服务的信息，网络地址本身也不是参与主体。
    en: An ExternalServiceActor is a SoftwareActor distinguished by calls or responses executed by an identifiable service operated in another governance or trust boundary, with the current system interacting only through endpoint, protocol identity, and contract. It may also provide tools or a remote agent, but RemoteAgentReference is only information describing it and a network address is not itself an Actor.
    ja: ExternalServiceActor は SoftwareActor の一種であり、別の運用・信頼境界で識別可能なサービスが呼出・応答を実行し、現システムはエンドポイント、プロトコル識別子、契約だけで対話する。ツールや遠隔エージェント能力も提供し得るが、RemoteAgentReference は記述情報であり、ネットワークアドレス自体も Actor ではない。
  why_needed:
    zh: 该类别标明运行责任与信任边界跨越的位置，使可用性、认证、数据披露和故障归属不会错误落到本地服务。
    en: This class marks where runtime responsibility crosses a trust boundary so availability, authentication, disclosure, and failure attribution are not incorrectly assigned to a local service.
    ja: この分類は実行責任が信頼境界を越える位置を示し、可用性、認証、情報開示、障害帰属をローカルサービスへ誤配しない。
  includes:
    - zh: 纳入由外部组织或独立平台运行、具有服务身份并通过 A2A、MCP、HTTP 或消息协议参与当前运行的服务。
      en: Includes a service operated by an outside organization or independent platform with service identity that participates through A2A, MCP, HTTP, or messaging protocols.
      ja: 外部組織または独立プラットフォームが運用し、サービス識別子を持ち、A2A、MCP、HTTP、メッセージプロトコルで現実行へ参加するサービスを含む。
  excludes:
    - zh: 不纳入内部 SystemServiceActor、静态 URL、RemoteAgentReference、外部组织本身或尚未收到任何运行调用的服务目录条目。
      en: Excludes an internal SystemServiceActor, a static URL, a RemoteAgentReference, the outside organization itself, and a service-catalog entry with no runtime participation.
      ja: 内部 SystemServiceActor、静的 URL、RemoteAgentReference、外部組織自体、実行参加のないサービス目録項目は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExternalServiceActor-example-positive-001
    kind: positive
    labels:
      zh: 外部服务参与者正例
      en: Positive example of external service actor
      ja: 外部サービスアクターの正例
    scenario_id: null
    descriptions:
      zh: retrieval.vendor.example 的服务实例以已认证 A2A 身份接收 task-73，在供应商环境执行检索并返回签名结果。
      en: A service instance at retrieval.vendor.example receives task-73 under an authenticated A2A identity, executes retrieval in the vendor environment, and returns a signed result.
      ja: retrieval.vendor.example のサービス実体が認証済み A2A 識別子で task-73 を受け、提供者環境で検索し署名結果を返す。
    field_values:
      actor_id: actor-external-service-001
      actor_kind: external-service
      display_name: External retrieval service
    related_node_ids:
      - ExternalServiceActor
      - SoftwareActor
    related_relation_ids:
      - ExternalServiceActor-is_a-SoftwareActor
    expected_result:
      zh: 该运行服务归类为 ExternalServiceActor；其 Agent Card 另归为 RemoteAgentReference 或描述记录。
      en: The running service is an ExternalServiceActor; its Agent Card is separately a RemoteAgentReference or descriptive record.
      ja: 稼働サービスは ExternalServiceActor に分類され、Agent Card は別の RemoteAgentReference または記述記録となる。
    why_valid_or_invalid:
      zh: 行动由外部信任边界中的可识别服务实际执行，并通过协议影响当前运行。
      en: An identifiable service in an external trust boundary actually performs the action and affects the current run through a protocol.
      ja: 外部信頼境界の識別可能サービスが実際に行為し、プロトコルで現実行へ影響する。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-service-actor-001
  - id: ExternalServiceActor-example-instance-001
    kind: instance
    labels:
      zh: 外部服务参与主体结构化实例
      en: Structured instance of external service actor
      ja: 外部サービスアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-external-service-001 是名为 External retrieval service 的供应商运行服务；它以 vendor-retrieval-prod/eu-3 身份在外部信任边界接收 A2A task-73、执行检索并返回签名结果。
      en: actor-external-service-001 is the vendor-operated service named External retrieval service; under identity vendor-retrieval-prod/eu-3, it receives A2A task-73 across an external trust boundary, performs retrieval, and returns a signed result.
      ja: actor-external-service-001 は External retrieval service という提供者運用サービスで、外部信頼境界の vendor-retrieval-prod/eu-3 識別子により A2A task-73 を受信し、検索を実行して署名済み結果を返します。
    field_values:
      actor_id: actor-external-service-001
      actor_kind: external-service
      display_name: External retrieval service
    related_node_ids:
      - ExternalServiceActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 ExternalServiceActor 的继承结构，外部运营与实际协议参与种差成立，实例仅保留为节点信息。
      en: The fields satisfy ExternalServiceActor's inherited structure, external operation and actual protocol participation hold, and the instance remains inline node information.
      ja: 項目は ExternalServiceActor の継承構造を満たし、外部運用と実際の protocol 参加という種差が成立し、instance は node 内情報に留まります。
    why_valid_or_invalid:
      zh: external-service 值明确其治理边界，actor_id 指向真实执行任务的服务身份，而不是 URL、Agent Card 或远程引用记录。
      en: The external-service value fixes the governance boundary, and actor_id identifies the service that actually executes the task rather than a URL, Agent Card, or remote-reference record.
      ja: external-service 値は治理境界を示し、actor_id は URL、Agent Card、remote reference record ではなく実際に task を実行する service identity を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-service-actor-001
  - id: ExternalServiceActor-example-boundary-001
    kind: boundary
    labels:
      zh: 外部服务参与者边界例
      en: Boundary case for external service actor
      ja: 外部サービスアクターの境界例
    scenario_id: null
    descriptions:
      zh: 配置文件保存 https://retrieval.vendor.example 和一份 Agent Card 缓存，但本次运行没有建立连接或发送任务。
      en: Configuration stores https://retrieval.vendor.example and a cached Agent Card, but this run establishes no connection and sends no task.
      ja: 設定に https://retrieval.vendor.example と Agent Card cache があるが、この実行では接続もタスク送信もない。
    field_values: {}
    related_node_ids:
      - ExternalServiceActor
      - SoftwareActor
      - AgentActor
    related_relation_ids:
      - ExternalServiceActor-is_a-SoftwareActor
    expected_result:
      zh: URL 与卡片是信息引用，不足以证明 ExternalServiceActor 参与本次运行。
      en: The URL and card are information references and do not establish an ExternalServiceActor participating in this run.
      ja: URL とカードは情報参照であり、この実行への ExternalServiceActor 参加を成立させない。
    why_valid_or_invalid:
      zh: 主体分类要求可识别服务实际实施或接收运行行动，静态发现信息只说明潜在能力。
      en: Actor classification requires an identifiable service to actually perform or receive runtime action; static discovery information shows only potential capability.
      ja: 主体分類には識別可能サービスの実行行為が必要で、静的発見情報は潜在能力だけを示す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-service-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ModelActor
    shared_parent_concept_id: SoftwareActor
    differentia:
      zh: 正向身份比较：父节点 SoftwareActor：ExternalServiceActor（semantic kind=entity，骨架 ExternalServiceActor-is_a-SoftwareActor）；ModelActor（semantic kind=entity，骨架 ModelActor-is_a-SoftwareActor）。双端条件：ExternalServiceActor 条件：“作为软件参与主体，外部服务参与者由这一事实区分：它位于受控系统之外，可以接收请求、返回结果，并引入信任边界与溯源义务”；ModelActor 条件：“模型参与者属于软件参与主体，区别于其他同类对象的条件是：它是由模型支撑的运行参与者，可生成、嵌入、排序、评估、转换或分类信息，并产生可追踪的跨度和预算消耗记录”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent SoftwareActor: ExternalServiceActor (semantic kind=entity, backbone ExternalServiceActor-is_a-SoftwareActor); ModelActor (semantic kind=entity, backbone ModelActor-is_a-SoftwareActor). Endpoint conditions: ExternalServiceActor condition: “External service actor belongs to the software actor category and differs from broader members in that it is a runtime participant outside the controlled system that can receive requests, return results, or introduce trust-boundary and provenance obligations”; ModelActor condition: “Model actor is a software actor whose defining condition is that it is a model-backed runtime participant that generates, embeds, ranks, evaluates, transforms, or classifies information while producing traceable spans and budget use”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 SoftwareActor：ExternalServiceActor（semantic kind=entity、バックボーン ExternalServiceActor-is_a-SoftwareActor）；ModelActor（semantic kind=entity、バックボーン ModelActor-is_a-SoftwareActor）。両端条件：ExternalServiceActor の条件：「外部サービスアクターはソフトウェアアクターとして、次の条件により他の対象と区別されます：それは制御されたシステムの外側にあり、要求を受け取り、結果を返し、信頼境界と来歴上の義務を生じさせます」；ModelActor の条件：「モデルアクターはソフトウェアアクターのうち、次の事実を定義条件とする対象です：それは、モデルに支えられた実行参加者であり、情報の生成、埋め込み、順位付け、評価、変換、分類を行い、追跡可能なスパンと予算使用を残します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-external-service-actor-002
parent_relation:
  id: ExternalServiceActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是外部治理的软件参与主体
    en: is an externally governed software actor
    ja: 外部統治のソフトウェアアクターである
  definitions:
    zh: ExternalServiceActor-is_a-SoftwareActor 表示每个外部服务参与者都是实际运行的软件主体，并以其运行责任位于当前 AgentSystem 治理或信任边界之外、仅经声明协议接口参与为种差；URL、AgentCard 或外部组织本身不是该主体。
    en: ExternalServiceActor-is_a-SoftwareActor states that every external-service actor is running software differentiated by operating responsibility outside the current AgentSystem governance or trust boundary and participating only through declared protocol interfaces; a URL, AgentCard, or outside organization is not the actor.
    ja: ExternalServiceActor-is_a-SoftwareActor は全外部 service actor が実行中 software で、運用責任が現 AgentSystem の統治・信頼境界外にあり宣言 protocol interface 経由で参加することを種差とする。URL、AgentCard、外部組織自体は主体でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有外部服务参与者子类
      en: has external-service-actor subtype
      ja: ExternalServiceActor 下位型を持つ
  conditions:
    - id: ExternalServiceActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when an identifiable software service actually receives or returns messages for this run and its operator or execution environment lies beyond a declared external boundary.
      explanations:
        zh: 仅当可识别的软件服务实际接收或返回本次运行消息，并且其运营方或执行环境位于已声明的外部边界时成立。
        en: Assert only when an identifiable software service actually receives or returns messages for this run and its operator or execution environment lies beyond a declared external boundary.
        ja: 識別可能な software service が本 run の message を実際に受送信し、運営者または実行環境が宣言外部境界の向こうにある時だけ成立する。
      source_claims:
        - claim-external-service-actor-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
