        en: vendor-agent-svc receives task-73 as an A2A service, executes it in the vendor environment, and returns status and artifacts under the taskId.
        ja: vendor-agent-svc は A2A service として task-73 を受け vendor 環境で実行し taskId 付き status と artifact を返す。
      field_values: {}
      related_node_ids:
        - ExternalServiceActor
        - SoftwareActor
      related_relation_ids:
        - ExternalServiceActor-is_a-SoftwareActor
      expected_result:
        zh: 把运行中的 vendor-agent-svc 归为 ExternalServiceActor 与 SoftwareActor。
        en: Classify the running vendor-agent-svc as ExternalServiceActor and SoftwareActor.
        ja: 実行中 vendor-agent-svc を ExternalServiceActor と SoftwareActor に分類する。
      why_valid_or_invalid:
        zh: 外部运营的软件身份实际执行了影响本次运行的协议动作。
        en: An externally operated software identity actually performs protocol actions that affect this run.
        ja: 外部運営 software identity が本 run に影響する protocol 行為を実行する。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-external-service-actor-003
    - id: ExternalServiceActor-is_a-SoftwareActor-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是外部治理的软件参与主体边界例
        en: "Boundary case: is an externally governed software actor"
        ja: 外部統治のソフトウェアアクターであるの境界例
      scenario_id: null
      descriptions:
        zh: 缓存的 AgentCard 只描述 vendor-agent-svc 的接口与能力，本次运行没有建立连接或发送消息。
        en: A cached AgentCard only describes vendor-agent-svc interfaces and capabilities; this run establishes no connection and sends no message.
        ja: cached AgentCard は vendor-agent-svc の interface と能力だけを記述し本 run は接続も message 送信もしない。
      field_values: {}
      related_node_ids:
