    labels:
      zh: OpenAI Agents Agent.model
      en: OpenAI Agents Agent.model
      ja: OpenAI Agents Agent.model
    descriptions:
      zh: OpenAI Agents SDK Agent(model=) 映射 ModelActor actor_id=model-actor-gpt5nano，引用 GenerativeModel 资产而非复制 model 字符串到 actor_id。
      en: OpenAI Agents SDK Agent(model=) maps ModelActor actor_id=model-actor-gpt5nano referencing GenerativeModel asset not copying model string to actor_id.
      ja: OpenAI Agent.model が ModelActor 参照である。
    example_source:
