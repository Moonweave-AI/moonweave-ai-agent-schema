        why_valid_or_invalid:
          zh: 解析、请求与响应证据指向同一执行主体、调用和模型版本。
          en: Resolution, request, and response evidence identify the same executor, call, and model version.
          ja: 解決・request・response 証拠が同一 executor・call・model 版を示す。
