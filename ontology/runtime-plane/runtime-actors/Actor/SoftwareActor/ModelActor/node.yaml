      descriptions:
        zh: gpt-model-snapshot-7 具有固定模型版本与推理行为，但没有进程身份、路由逻辑或用量日志。
        en: gpt-model-snapshot-7 has fixed model version and inference behavior but no process identity, routing logic, or usage log.
        ja: gpt-model-snapshot-7 は固定 model 版と推論挙動を持つが process identity・routing logic・usage log がない。
