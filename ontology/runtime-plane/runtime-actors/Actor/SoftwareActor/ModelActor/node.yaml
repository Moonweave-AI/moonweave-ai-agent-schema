source_claims:
  - id: claim-model-actor-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK assigns model-name resolution to ModelProvider and supports concrete Model implementations. Moonweave types the running resolver and request executor as ModelActor, not the resolved Model.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-model-actor-002
    source: eng-fw-openai-python-docs
    supports: OpenAI models are reached through model/provider interfaces, while Runner and Session implementations manage loop execution and persisted conversation state. Moonweave classifies software whose defining responsibility is serving or invoking a model as ModelActor and software whose defining responsibility is runtime infrastructure as SystemServiceActor.
    locator: Models > Using other LLM providers; Running agents > The agent loop; Sessions > Custom session implementations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-model-actor-003
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK separates ModelProvider resolution, concrete Model implementations, per-agent model selection, and run-level model selection. Moonweave assigns the running resolver and caller to ModelActor and the resolved computational object to Model.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-model-actor-004
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK documents that model names are resolved by a ModelProvider to concrete Model implementations and that selection may occur per agent or per run. Moonweave requires call evidence before asserting actual use.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

