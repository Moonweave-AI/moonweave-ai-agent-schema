schema: moonweave.ai/ontology-node/v1
id: ModelActor
kind: concept
labels:
  zh: 模型参与者
  en: model actor
  ja: モデルアクター
semantics:
  short_definition:
    zh: 模型参与者是代表运行系统执行模型选择、推理调用与响应交付的软件参与主体。
    en: A ModelActor is a SoftwareActor that performs model resolution, inference calls, and response delivery on behalf of a runtime.
    ja: ModelActor は実行システムに代わってモデル解決、推論呼出、応答配信を行う SoftwareActor である。
  definition:
    zh: 模型参与者是 SoftwareActor 的一种；其种差是它以运行服务或适配器身份解析模型标识、绑定提供商与传输、执行推理请求并记录响应和用量，同时通过 uses 关系指向被调用的 Model。它不是模型权重或版本本身，也不因转发推理而自动拥有 AgentActor 的目标与工具决策循环。
    en: A ModelActor is a SoftwareActor distinguished by acting as a runtime service or adapter that resolves model identifiers, binds provider and transport, executes inference requests, and records responses and usage while referring through uses to the invoked Model. It is not the model weights or version itself and does not acquire an AgentActor's goal and tool-decision loop merely by brokering inference.
    ja: ModelActor は SoftwareActor の一種であり、実行サービスまたはアダプタとしてモデル識別子を解決し、提供者と伝送を束縛し、推論要求を実行して応答と使用量を記録し、uses で呼出対象 Model を指す。モデル重み・版そのものではなく、推論中継だけで AgentActor の目標・ツール判断ループを持たない。
  why_needed:
    zh: 该类别把推理调用的技术执行者与模型制品、提供商名称和拥有任务目标的智能体分开，便于追踪路由、重试与用量。
    en: This class separates the technical executor of inference from the model artifact, provider name, and goal-owning agent, enabling routing, retry, and usage attribution.
    ja: この分類は推論の技術実行者をモデル成果物、提供者名、目標を持つエージェントから分け、経路、再試行、使用量を追跡可能にする。
  includes:
    - zh: 纳入具有运行身份、把模型名解析为具体 Model、执行 API 或本地推理并返回响应与用量的模型网关或适配进程。
      en: Includes a model gateway or adapter process with runtime identity that resolves a model name to a concrete Model, executes API or local inference, and returns response and usage.
      ja: 実行識別子を持ち、モデル名を具体的 Model へ解決し、API またはローカル推論を実行して応答と使用量を返すモデルゲートウェイ・アダプタを含む。
  excludes:
    - zh: 不纳入 Model 权重、模型名称字符串、模型提供商组织、AgentActor、一次模型响应或静态 ModelSettings。
      en: Excludes Model weights, a model-name string, the provider organization, an AgentActor, one model response, and static ModelSettings.
      ja: Model 重み、モデル名文字列、提供者組織、AgentActor、単一モデル応答、静的 ModelSettings は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: ModelActor（ModelInstance 执行者）映射 OpenAI chat.completions/responses 调用网关、LangGraph llm node 与 Anthropic messages.create 的实际推理执行；uses 事实必须指向被调用的 GenerativeModel 版本。
    en: ModelActor (ModelInstance executor) maps OpenAI chat.completions/responses gateways, LangGraph llm nodes, and Anthropic messages.create inference execution; uses facts must point to invoked GenerativeModel version.
    ja: ModelActor（ModelInstance executor）は OpenAI/Anthropic inference 実行を写像し uses は GenerativeModel 版を指します。
  typical_input:
    - description: OpenAI Assistants assistant/model/tools or LangGraph runnable config.
      format: POST /v1/responses {"model":"gpt-4.1",...}
      source_claims:
        - claim-openai-assistants-actor
        - claim-model-actor-design
  typical_output:
    - description: Moonweave Actor projection with participation evidence.
      format: '{"model_actor_id":"model-worker-openai-01","model_ref":"model:gpt-4.1:2026-04-14"}'
      source_claims:
        - claim-model-actor-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
