schema: moonweave.ai/ontology-node/v1
id: ModelActor
kind: concept
status: accepted
labels:
  zh: 模型参与者
  en: model actor
  ja: モデルアクター
semantics:
  short_definition:
    zh: 模型参与者是代表运行系统执行模型选择、推理调用与响应交付的软件参与主体。
    en: A ModelActor is a SoftwareActor that performs model resolution, inference calls, and response delivery on behalf of a runtime.
    ja: ModelActor は実行システムに代わってモデル解決、推論呼出、応答配信を行う SoftwareActor である。
  definition:
    zh: 模型参与者是 SoftwareActor 的一种；其种差是它以运行服务或适配器身份解析模型标识、绑定提供商与传输、执行推理请求并记录响应和用量，同时通过 uses 关系指向被调用的 Model。它不是模型权重或版本本身，也不因转发推理而自动拥有 AgentActor 的目标与工具决策循环。
    en: A ModelActor is a SoftwareActor distinguished by acting as a runtime service or adapter that resolves model identifiers, binds provider and transport, executes inference requests, and records responses and usage while referring through uses to the invoked Model. It is not the model weights or version itself and does not acquire an AgentActor's goal and tool-decision loop merely by brokering inference.
    ja: ModelActor は SoftwareActor の一種であり、実行サービスまたはアダプタとしてモデル識別子を解決し、提供者と伝送を束縛し、推論要求を実行して応答と使用量を記録し、uses で呼出対象 Model を指す。モデル重み・版そのものではなく、推論中継だけで AgentActor の目標・ツール判断ループを持たない。
  why_needed:
    zh: 该类别把推理调用的技术执行者与模型制品、提供商名称和拥有任务目标的智能体分开，便于追踪路由、重试与用量。
    en: This class separates the technical executor of inference from the model artifact, provider name, and goal-owning agent, enabling routing, retry, and usage attribution.
    ja: この分類は推論の技術実行者をモデル成果物、提供者名、目標を持つエージェントから分け、経路、再試行、使用量を追跡可能にする。
  includes:
    - zh: 纳入具有运行身份、把模型名解析为具体 Model、执行 API 或本地推理并返回响应与用量的模型网关或适配进程。
      en: Includes a model gateway or adapter process with runtime identity that resolves a model name to a concrete Model, executes API or local inference, and returns response and usage.
      ja: 実行識別子を持ち、モデル名を具体的 Model へ解決し、API またはローカル推論を実行して応答と使用量を返すモデルゲートウェイ・アダプタを含む。
  excludes:
    - zh: 不纳入 Model 权重、模型名称字符串、模型提供商组织、AgentActor、一次模型响应或静态 ModelSettings。
      en: Excludes Model weights, a model-name string, the provider organization, an AgentActor, one model response, and static ModelSettings.
      ja: Model 重み、モデル名文字列、提供者組織、AgentActor、単一モデル応答、静的 ModelSettings は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ModelActor-example-positive-001
    kind: positive
    labels:
      zh: 模型参与者正例
      en: Positive example of model actor
      ja: モデルアクターの正例
    scenario_id: null
    descriptions:
      zh: model-gateway-3 将别名 quality-model 解析为已批准的具体版本，通过指定传输执行请求，并记录延迟、令牌用量和响应 ID。
      en: model-gateway-3 resolves alias quality-model to an approved concrete version, executes the request over the selected transport, and records latency, token usage, and response ID.
      ja: model-gateway-3 は別名 quality-model を承認済み具体版へ解決し、選択伝送で要求を実行して遅延、トークン使用量、応答 ID を記録する。
    field_values:
      actor_id: actor-model-001
      actor_kind: software
      display_name: Generation model service
    related_node_ids:
      - ModelActor
      - Model
    related_relation_ids:
      - ModelActor-uses-Model
    expected_result:
      zh: model-gateway-3 归类为 ModelActor；被解析的版本独立归类为 Model。
      en: model-gateway-3 is a ModelActor, while the resolved version is separately a Model.
      ja: model-gateway-3 は ModelActor に分類され、解決された版は別に Model となる。
    why_valid_or_invalid:
      zh: 网关是有运行身份的调用执行者，而版本化模型是它使用的计算对象。
      en: The gateway is the runtime-identified call executor, whereas the versioned model is the computational object it uses.
      ja: ゲートウェイは実行識別子を持つ呼出実行者で、版付きモデルは使用される計算対象である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-model-actor-001
  - id: ModelActor-example-instance-001
    kind: instance
    labels:
      zh: 模型参与主体结构化实例
      en: Structured instance of model actor
      ja: モデルアクターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: actor-model-001 是名为 Generation model service 的运行网关；它把 quality-model 解析到批准版本 gpt-5.2-2026-06，执行 inference-661 并记录响应 ID、延迟与令牌用量。
      en: actor-model-001 is the running gateway named Generation model service; it resolves quality-model to approved version gpt-5.2-2026-06, executes inference-661, and records response ID, latency, and token usage.
      ja: actor-model-001 は Generation model service という稼働 gateway で、quality-model を承認版 gpt-5.2-2026-06 へ解決し、inference-661 を実行して response ID、latency、token usage を記録します。
    field_values:
      actor_id: actor-model-001
      actor_kind: software
      display_name: Generation model service
    related_node_ids:
      - ModelActor
    related_relation_ids: []
    expected_result:
      zh: 字段通过 ModelActor 的继承结构，解析并执行模型请求的服务种差成立，实例不被提升为新图节点。
      en: The fields satisfy ModelActor's inherited structure, the model-resolution and request-execution service differentia holds, and the instance is not promoted to a new graph node.
      ja: 項目は ModelActor の継承構造を満たし、model 解決・request 実行 service の種差が成立し、instance は新しい graph node へ昇格しません。
    why_valid_or_invalid:
      zh: actor_id 标识有状态调用执行者，actor_kind 保持 software 分支；被解析的模型版本是其使用对象，不等于该服务身份。
      en: actor_id identifies the stateful call executor and actor_kind retains the software branch; the resolved model version is the object it uses, not the service identity.
      ja: actor_id は stateful call executor を識別し、actor_kind は software 分岐を保ち、解決された model version は利用対象であって service identity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-model-actor-001
  - id: ModelActor-example-boundary-001
    kind: boundary
    labels:
      zh: 模型参与者边界例
      en: Boundary case for model actor
      ja: モデルアクターの境界例
    scenario_id: null
    descriptions:
      zh: model://provider/generative-v7 是带版本和能力元数据的模型制品引用，但它没有进程身份，也不发送请求或记录用量。
      en: model://provider/generative-v7 is a versioned model-artifact reference with capability metadata, but it has no process identity and sends no requests or usage records.
      ja: model://provider/generative-v7 は版と能力メタデータを持つモデル成果物参照だが、プロセス識別子がなく、要求送信や使用量記録を行わない。
    field_values: {}
    related_node_ids:
      - ModelActor
      - Model
      - AgentActor
    related_relation_ids:
      - ModelActor-uses-Model
    expected_result:
      zh: 该对象归类为 Model，不归类为 ModelActor。
      en: The object is a Model, not a ModelActor.
      ja: この対象は Model であり ModelActor ではない。
    why_valid_or_invalid:
      zh: 被调用的计算制品不等于执行调用并承担运行归属的软件服务。
      en: The invoked computational artifact is not the software service that executes the call and bears runtime attribution.
      ja: 呼ばれる計算成果物は、呼出を実行して実行帰属を負うソフトウェアサービスではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-model-actor-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SystemServiceActor
    shared_parent_concept_id: SoftwareActor
    differentia:
      zh: 共享父节点对照：父节点 SoftwareActor：ModelActor（semantic kind=entity，骨架 ModelActor-is_a-SoftwareActor）；SystemServiceActor（semantic kind=entity，骨架 SystemServiceActor-is_a-SoftwareActor）。双端条件：ModelActor 条件：“模型参与者属于软件参与主体，区别于其他同类对象的条件是：它是由模型支撑的运行参与者，可生成、嵌入、排序、评估、转换或分类信息，并产生可追踪的跨度和预算消耗记录”；SystemServiceActor 条件：“系统服务参与者是以如下事实为区分特征的软件参与主体：它表示智能体系统使用的内部服务，例如调度器、沙箱、存储、遥测或策略中介”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent SoftwareActor: ModelActor (semantic kind=entity, backbone ModelActor-is_a-SoftwareActor); SystemServiceActor (semantic kind=entity, backbone SystemServiceActor-is_a-SoftwareActor). Endpoint conditions: ModelActor condition: “Model actor is a software actor whose defining condition is that it is a model-backed runtime participant that generates, embeds, ranks, evaluates, transforms, or classifies information while producing traceable spans and budget use”; SystemServiceActor condition: “System service actor is a software actor; its differentiating condition is that it is a runtime participant representing an internal service such as scheduler, sandbox, storage, telemetry, or policy mediator used by the agent system”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 SoftwareActor：ModelActor（semantic kind=entity、バックボーン ModelActor-is_a-SoftwareActor）；SystemServiceActor（semantic kind=entity、バックボーン SystemServiceActor-is_a-SoftwareActor）。両端条件：ModelActor の条件：「モデルアクターはソフトウェアアクターのうち、次の事実を定義条件とする対象です：それは、モデルに支えられた実行参加者であり、情報の生成、埋め込み、順位付け、評価、変換、分類を行い、追跡可能なスパンと予算使用を残します」；SystemServiceActor の条件：「システムサービスアクターはソフトウェアアクターの一種であり、次の条件で区別されます：それは、スケジューラ、サンドボックス、ストレージ、テレメトリ、ポリシー仲介など、エージェントシステムが使う内部サービスを表します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-model-actor-002
parent_relation:
  id: ModelActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是模型服务型软件参与主体
    en: is a model-service software actor
    ja: モデルサービス型ソフトウェアアクターである
  definitions:
    zh: ModelActor-is_a-SoftwareActor 表示每个 ModelActor 都是实际运行的软件主体，并以解析模型名、选择提供方或传输、执行推理请求及记录响应和用量为种差；被解析的 Model、提供方组织或模型别名不是该执行主体。
    en: ModelActor-is_a-SoftwareActor states that every ModelActor is running software differentiated by resolving model names, selecting provider or transport, executing inference requests, and recording responses and usage; the resolved Model, provider organization, or model alias is not the executing actor.
    ja: ModelActor-is_a-SoftwareActor は全 ModelActor が実行中 software で、model 名解決、provider/transport 選択、推論 request 実行、response/usage 記録を種差とする。解決 Model、provider 組織、model alias は実行主体でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有模型参与者子类
      en: has model-actor subtype
      ja: ModelActor 下位型を持つ
  conditions:
    - id: ModelActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when a traceable software service or adapter identity actually resolves and executes model requests.
      explanations:
        zh: 仅当存在可追踪的软件服务或适配器身份，且该身份实际解析并执行模型请求时成立。
        en: Assert only when a traceable software service or adapter identity actually resolves and executes model requests.
        ja: 追跡可能な software service または adapter 同一性が model request を実際に解決・実行する時だけ成立する。
      source_claims:
        - claim-model-actor-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ModelActor-is_a-SoftwareActor-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是模型服务型软件参与主体正例
        en: "Positive case: is a model-service software actor"
        ja: モデルサービス型ソフトウェアアクターであるの正例
      scenario_id: null
      descriptions:
        zh: model-gateway-3 通过 ModelProvider 把 quality-model 解析为具体模型实现，发送请求并记录 response_id、延迟和用量。
        en: model-gateway-3 uses ModelProvider to resolve quality-model to a concrete model implementation, sends the request, and records response_id, latency, and usage.
        ja: model-gateway-3 は ModelProvider で quality-model を具体 model 実装へ解決し request を送り response_id・latency・usage を記録する。
      field_values: {}
      related_node_ids:
        - ModelActor
        - SoftwareActor
      related_relation_ids:
        - ModelActor-is_a-SoftwareActor
      expected_result:
        zh: 把 model-gateway-3 归为 ModelActor、SoftwareActor 与 Actor。
        en: Classify model-gateway-3 as ModelActor, SoftwareActor, and Actor.
        ja: model-gateway-3 を ModelActor・SoftwareActor・Actor に分類する。
      why_valid_or_invalid:
        zh: 它是有运行身份的推理调用执行者，而不是计算模型本身。
        en: It is the runtime-identified executor of inference calls rather than the computational Model itself.
        ja: runtime 同一性を持つ推論 call executor で計算 Model 自体ではない。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-model-actor-003
    - id: ModelActor-is_a-SoftwareActor-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是模型服务型软件参与主体边界例
        en: "Boundary case: is a model-service software actor"
        ja: モデルサービス型ソフトウェアアクターであるの境界例
