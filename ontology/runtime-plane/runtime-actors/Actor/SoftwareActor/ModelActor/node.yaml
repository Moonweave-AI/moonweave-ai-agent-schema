  - id: ModelActor-example-instance-001
    labels:
      zh: model 名称字符串当 Actor
      en: Model name string as Actor
      ja: model 名文字列を Actor とする
    descriptions:
      zh: LangSmith run.extra.metadata.model=gpt-4o 是 span 元数据，不是 Moonweave ModelActor 本地身份。
      en: LangSmith run.extra.metadata.model=gpt-4o is span metadata, not Moonweave ModelActor local identity.
      ja: LangSmith model メタデータは ModelActor ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      actor_id: actor-model-001
      actor_kind: software
      display_name: Generation model service
    related_node_ids:
      - ModelActor
    related_relation_ids: []
    source_claims:
      - claim-model-actor-design
  - id: ModelActor-example-boundary-001
    labels:
      zh: ModelActor 与 GenerativeModel 边界
      en: ModelActor versus GenerativeModel boundary
      ja: ModelActor と GenerativeModel 境界
    descriptions:
      zh: ModelActor 是引用 model 资产的 SoftwareActor 子类；GenerativeModel 是 model 资产 Entity；Actor 引用 Model 不合并。
      en: ModelActor is SoftwareActor subtype referencing model asset; GenerativeModel is model asset Entity; Actor references Model without merging.
      ja: ModelActor は GenerativeModel を参照する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ModelActor
      - Model
      - AgentActor
    related_relation_ids:
      - ModelActor-uses-Model
    source_claims:
      - claim-model-actor-design
  - id: ModelActor-example-4
    labels:
      zh: gpt-5-nano ModelActor 实例
      en: gpt-5-nano ModelActor instance
      ja: gpt-5-nano ModelActor 事例
    descriptions:
      zh: ModelActor actor_id=model-actor-gpt5nano、model_ref=GenerativeModel:gpt-5-nano、invoked_by=openai-weather-agent。
      en: ModelActor actor_id=model-actor-gpt5nano, model_ref=GenerativeModel:gpt-5-nano, invoked_by=openai-weather-agent.
      ja: model-actor-gpt5nano ModelActor を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ModelActor
    related_relation_ids: []
    source_claims:
      - claim-model-actor-design
      - claim-model-actor-design
parent_relation:
  id: ModelActor-is_a-SoftwareActor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是模型服务型软件参与主体
    en: is a model-service software actor
    ja: モデルサービス型ソフトウェアアクターである
  definitions:
    zh: ModelActor-is_a-SoftwareActor 表示每个 ModelActor 都是实际运行的软件主体，并以解析模型名、选择提供方或传输、执行推理请求及记录响应和用量为种差；被解析的 Model、提供方组织或模型别名不是该执行主体。
    en: ModelActor-is_a-SoftwareActor states that every ModelActor is running software differentiated by resolving model names, selecting provider or transport, executing inference requests, and recording responses and usage; the resolved Model, provider organization, or model alias is not the executing actor.
    ja: ModelActor-is_a-SoftwareActor は全 ModelActor が実行中 software で、model 名解決、provider/transport 選択、推論 request 実行、response/usage 記録を種差とする。解決 Model、provider 組織、model alias は実行主体でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有模型参与者子类
      en: has model-actor subtype
      ja: ModelActor 下位型を持つ
  conditions:
    - id: ModelActor-is_a-SoftwareActor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when a traceable software service or adapter identity actually resolves and executes model requests.
      explanations:
        zh: 仅当存在可追踪的软件服务或适配器身份，且该身份实际解析并执行模型请求时成立。
        en: Assert only when a traceable software service or adapter identity actually resolves and executes model requests.
        ja: 追跡可能な software service または adapter 同一性が model request を実際に解決・実行する時だけ成立する。
      source_claims:
        - claim-model-actor-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-model-actor-design
  distinct_fact_rationale:
    zh: 该边对推理服务执行者分类，不把模型版本、提供方名称或 AgentActor 的控制循环合并进来。
    en: The edge classifies the inference-service executor without merging model version, provider name, or AgentActor control loop.
    ja: 推論 service executor を分類し model 版・provider 名・AgentActor control loop を統合しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ModelActor-uses-Model
    predicate: uses
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 使用精确模型版本
      en: uses exact model
      ja: 正確なモデル版を使用する
    definitions:
      zh: ModelActor-uses-Model 表示某 ModelActor 在可识别的推理请求或运行中解析并调用了目标 Model 的精确实现或版本；配置中的默认名、候选路由或提供方支持列表不能证明该使用事实。
      en: ModelActor-uses-Model states that a ModelActor resolved and invoked the target Model's exact implementation or version in an identifiable inference request or run; a configured default name, routing candidate, or provider support list does not prove use.
      ja: ModelActor-uses-Model は ModelActor が識別可能な推論 request/run で対象 Model の正確な実装または版を解決・呼出したことを表す。default 名、routing candidate、provider support list は使用を証明しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_used_by_model_actor
      labels:
        zh: 由模型参与者使用
        en: is used by model actor
        ja: ModelActor に使用される
    conditions:
      - id: ModelActor-uses-Model-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when request, response, or trace evidence jointly identifies the ModelActor, resolved Model version, and same call ID.
        explanations:
          zh: 仅当请求、响应或 trace 同时标识 ModelActor、已解析 Model 版本和同一调用 ID 时成立。
          en: Assert only when request, response, or trace evidence jointly identifies the ModelActor, resolved Model version, and same call ID.
          ja: request・response・trace が ModelActor、解決 Model 版、同一 call ID を共同識別する時だけ成立する。
        source_claims:
          - claim-model-actor-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-model-actor-design
    distinct_fact_rationale:
      zh: 该边记录实际解析与调用，不与 ModelProvider 支持、默认配置或模型类型层级重复。
      en: The edge records actual resolution and invocation and does not duplicate ModelProvider support, default configuration, or model-type hierarchy.
      ja: 実解決と呼出しを記録し ModelProvider support・default 設定・model 型階層を複製しない。
    layout_role: cross-link
    target: concept:Model
sources:
  - id: src-openai-assistants
    title: OpenAI Assistants API
    url: https://platform.openai.com/docs/api-reference/assistants
    source_type: official-doc
    relevance: Assistant, model, and tool role objects for AgentActor, Model, ToolServiceActor.
  - id: src-langgraph
    title: LangGraph Documentation
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Compiled node executors and runnable config actor metadata.
  - id: src-anthropic-messages
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Message roles and streaming for actor participation evidence.
  - id: src-a2a
    title: Agent2Agent (A2A) Protocol
    url: https://google.github.io/A2A/
    source_type: official-spec
    relevance: Agent Card discovery and remote AgentActor resolution.
  - id: src-runtime-actors-design
    title: Moonweave runtime-actors module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Actor, RuntimeRole, Model, ActorBinding, RemoteAgentReference boundaries.
source_claims:
  - id: claim-openai-assistants-actor
    source: src-openai-assistants
    supports: OpenAI Assistants API exposes assistant, model, and tool identities mappable to runtime actors when a run occurs.
    locator: Assistants > assistant object
    evidence_kind: design-inference
    confidence: high
  - id: claim-langgraph-executor-actor
    source: src-langgraph
    supports: LangGraph node invoke and runnable config can carry actor identifiers for AgentProcess mapping.
    locator: Graph API > invoke > configurable
    evidence_kind: design-inference
    confidence: high
  - id: claim-model-actor-design
    source: src-runtime-actors-design
    supports: ModelActor executes inference separately from Model artifact identity.
    locator: ModelActor boundary
    evidence_kind: design-inference
    confidence: high
