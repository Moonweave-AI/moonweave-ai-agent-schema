schema: moonweave.ai/ontology-node/v1
id: ModelActor
kind: concept
status: accepted
labels:
  zh: 模型服务参与者
  en: Model service actor
  ja: モデルサービスアクター
semantics:
  short_definition:
    zh: 在运行时负责提供或路由模型的本地软件参与者。
    en: A local software actor responsible for serving or routing a model at runtime.
    ja: ランタイムでモデルを提供またはルーティングする責任を持つローカルソフトウェア参加者。
  definition:
    zh: ModelActor 是模型服务或路由软件的本地责任身份。它与所服务的 Model 资产、OpenAI Agents SDK 模型选择、SDK Agent 配置、提供商端点、OpenTelemetry service 资源以及单次模型调用不同。它通过 serves_model 关系引用 Model，而不是把 model_ref 或 provider 模型名复制为 actor_id。
    en: ModelActor is the local responsibility identity for a model-serving or model-routing software service. It is distinct from the Model asset it serves, an OpenAI Agents SDK model selection, an SDK Agent configuration, a provider endpoint, an OpenTelemetry service resource, and a model invocation. It references a Model through a serves_model relation rather than copying model_ref or a provider model name into actor_id.
    ja: ModelActor はモデル提供またはルーティングソフトウェアのローカル責任 identity である。提供する Model 資産、OpenAI Agents SDK モデル選択、SDK Agent 設定、プロバイダーエンドポイント、OpenTelemetry service リソース、単一モデル呼び出しとは異なる。model_ref やプロバイダーモデル名を actor_id に複製せず、serves_model 関係で Model を参照する。
  why_needed:
    zh: 同一模型资产可能由不同 accountable 服务提供，同一服务也可能在版本间路由；若把模型名当作 actor_id，服务轮换与版本升级会破坏归因。
    en: One model asset may be served through different accountable services while one service may route among model versions; treating a model name as actor_id breaks attribution when services rotate or versions upgrade.
    ja: 1つのモデル資産は異なる説明可能サービスから提供され、1つのサービスはバージョン間でルーティングし得る。モデル名を actor_id とすると、サービス轮换やバージョン更新で帰属が壊れる。
  includes:
    - zh: 对运行时交付负责的本地推理网关、模型路由器与模型服务。
      en: Local inference gateways, model routers, and model-serving services with responsibility for runtime delivery.
      ja: ランタイム提供に責任を持つローカル推論ゲートウェイ、モデルルーター、モデル提供サービス。
  excludes:
    - zh: 带版本的 Model 资产、SDK 模型配置、提供商模型名、模型请求/响应、trace span 或端点 URL。
      en: A versioned Model asset, SDK model configuration, provider model name, model request/response, trace span, or endpoint URL.
      ja: バージョン付き Model 資産、SDK モデル設定、プロバイダーモデル名、モデル要求/応答、trace span、エンドポイント URL。
  semantic_kind: agent
  aliases: [model service, model router]
engineering:
  explanation:
    zh: 本地投影将 actor_id 链接到 Model 引用与可选 endpoint_ref。注册输入包含 model_ref；输出保留 serves_model_ref。不得把 provider 模型 ID 或 SDK 配置字段复制进 actor_id。
    en: The local projection joins actor_id to a Model reference and an optional endpoint_ref. Registration input includes model_ref; output retains serves_model_ref. Provider model IDs and SDK configuration fields must not be copied into actor_id.
    ja: ローカル投影は actor_id を Model 参照と任意 endpoint_ref に結び付ける。登録入力に model_ref を含み、出力は serves_model_ref を保持する。プロバイダーモデル ID や SDK 設定フィールドを actor_id に複製してはならない。
  typical_input:
    - description:
        zh: 模型服务注册
        en: Model-service registration
        ja: モデルサービス登録
      format: '{"actor_id":"model-gateway","model_ref":"model:gpt-5","endpoint_ref":"url:https://provider.example"}'
  typical_output:
    - description:
        zh: 本地模型服务投影
        en: Local model-service projection
        ja: ローカルモデルサービス投影
      format: '{"actor_id":"model-gateway","serves_model_ref":"model:gpt-5"}'
  reference_implementations:
    - name: OpenAI Agents SDK Models
      url: https://openai.github.io/openai-agents-js/guides/models/
      description: Documents model selection separately from the agent runtime.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 模型参与者 ID
        en: Model actor ID
        ja: モデルアクター ID
      definitions:
        zh: 提供或路由服务的本地问责标识符。
        en: Local accountability identifier for the serving or routing service.
        ja: 提供またはルーティングサービスのローカル説明責任識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: model-gateway
      source_claims: [claim-model-actor-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 固定为 SoftwareActor，以保留从 SoftwareActor 继承的责任类别。
        en: Fixed to SoftwareActor to retain the responsibility category inherited from SoftwareActor.
        ja: SoftwareActor から継承した責任種別を保持するため SoftwareActor に固定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [SoftwareActor]
      example_value: SoftwareActor
      source_claims: [claim-model-actor-boundary]
    - id: endpoint_ref
      labels:
        zh: 端点引用
        en: Endpoint reference
        ja: エンドポイント参照
      definitions:
        zh: 指向部署端点的可选类型化引用，不是参与者身份。
        en: Optional typed reference to a deployment endpoint, not the actor identity.
        ja: デプロイエンドポイントへの任意型付き参照であり、アクター identity ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: url:https://provider.example
      source_claims: [claim-model-actor-boundary]
  constraints:
    - id: model-actor-model-asset-separation
      severity: error
      language: plain
      expression: A ModelActor must reference a Model through a cross-link and must not use model_ref, provider model name, or endpoint_ref as actor_id.
      explanation:
        zh: 服务责任与带版本的模型描述是不同关注点。
        en: Serving responsibility and versioned model description are separate concerns.
        ja: 提供責任とバージョン付きモデル記述は別の関心事である。
      source_claims: [claim-model-actor-boundary]
  required_relations: [ModelActor-specializes-SoftwareActor, ModelActor-serves-Model]
examples:
  - id: modelactor-positive
    labels: {zh: "OpenAI Agents Agent.model", en: "OpenAI Agents Agent.model", ja: "OpenAI Agents Agent.model"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; ModelActor maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; ModelActor maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; ModelActor serving env."}
    field_values: {actor_id: model-gateway, actor_kind: SoftwareActor, endpoint_ref: url:https://provider.example}
    related_node_ids: [ModelActor, Model]
    related_relation_ids: [ModelActor-serves-Model]
    source_claims: [claim-model-actor-boundary]
  - id: modelactor-counterexample
    labels: {zh: "model 名称字符串当 Actor", en: "Model name string as Actor", ja: "model 名文字列を Actor とする"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style ModelActor.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style ModelActor.", ja: "Gateway bypass rejects Helicone-style ModelActor."}
    field_values: {actor_id: model:gpt-5}
    related_node_ids: [Model]
    related_relation_ids: []
    source_claims: [claim-model-actor-boundary]
  - id: modelactor-boundary
    labels: {zh: "ModelActor 与 GenerativeModel 边界", en: "ModelActor versus GenerativeModel boundary", ja: "ModelActor と GenerativeModel 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; ModelActor must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; ModelActor must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {sdk_model: gpt-5}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-model-actor-boundary]
  - id: modelactor-instance
    labels: {zh: "gpt-5-nano ModelActor 实例", en: "gpt-5-nano ModelActor instance", ja: "gpt-5-nano ModelActor 事例"}
    descriptions: {zh: "Helicone instance: request_id=hc-771 latency_ms=842 cost_usd=0.003 model=gpt-4o->ModelActor.", en: "Helicone instance: request_id latency cost model->ModelActor.", ja: "Helicone instance maps to ModelActor Execution."}
    field_values: {actor_id: model-gateway, actor_kind: SoftwareActor, endpoint_ref: url:https://provider2.example}
    related_node_ids: [ModelActor, Model]
    related_relation_ids: [ModelActor-serves-Model]
    source_claims: [claim-model-actor-boundary]
parent_relation:
  id: ModelActor-specializes-SoftwareActor
  predicate: is_a
  target: concept:SoftwareActor
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是模型服务软件参与者
    en: is a model-serving software actor
    ja: モデル提供ソフトウェアアクターである
  definitions:
    zh: 每个 ModelActor 都是负责提供或路由模型的 SoftwareActor。
    en: Every ModelActor is a SoftwareActor responsible for serving or routing a model.
    ja: すべての ModelActor はモデルを提供またはルーティングする責任を持つ SoftwareActor である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: [claim-model-actor-boundary]
relations:
  - id: ModelActor-serves-Model
    predicate: serves_model
    target: concept:Model
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: semantic
    labels:
      zh: 服务模型
      en: serves model
      ja: モデルを提供する
    definitions:
      zh: 本地模型服务参与者可通过 cross-link 服务单独版本化的 Model 资产。
      en: A local model service actor may serve a separately versioned Model asset.
      ja: ローカルモデルサービス参加者は、別途バージョン管理された Model 資産を提供できる。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    source_claims: [claim-model-actor-boundary]
sources:
  - id: prov
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent and SoftwareAgent.
  - id: sdk
    title: OpenAI Agents SDK Tools and Models
    url: https://openai.github.io/openai-agents-js/guides/models/
    source_type: official-doc
    relevance: Documents SDK model selection and configurable agent primitives.
  - id: otel
    title: OpenTelemetry Resource Semantic Conventions
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: Defines service telemetry resource attributes.
source_claims:
  - id: claim-model-actor-boundary
    source: sdk
    supports: OpenAI Agents SDK model settings are configuration primitives, while ModelActor is a Moonweave local service-responsibility projection.
    locator: Official specification and Moonweave projection boundary
    evidence_kind: design-inference
    confidence: high

