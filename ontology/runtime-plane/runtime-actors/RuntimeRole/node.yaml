schema: moonweave.ai/ontology-node/v1
id: RuntimeRole
kind: concept
status: accepted
labels: {zh: 运行时角色, en: Runtime role, ja: ランタイムロール}
semantics:
  short_definition: {zh: 描述参与者在运行时工作中上下文责任的可复用职能描述符。, en: A reusable function descriptor for a participant's contextual responsibility in runtime work., ja: ランタイム作業における参加者の文脈上の責任を表す再利用可能な機能記述子。}
  definition: {zh: RuntimeRole 是一个类实体的角色定义，用于命名开发者、审阅者或人工操作员等职能。它通过 ActorRoleBinding 应用；它既不是 Actor 身份，也不是能力授权，更不是持有该角色者所执行的活动。, en: "A RuntimeRole is an Entity-like role definition that names a function such as developer, reviewer, or human operator. It is applied through an ActorRoleBinding; it is neither an Actor identity, a capability grant, nor the activity performed by someone holding the role.", ja: RuntimeRole は、開発者、レビュー担当者、人間のオペレーターなどの機能を名前で表すエンティティ類似のロール定義である。ActorRoleBinding を通じて適用され、Actor のID、能力付与、またはそのロール保持者が行うアクティビティそのものではない。}
  why_needed: {zh: 同一参与者可在不同范围和时间承担不同职责。可复用的角色概念可使责任清晰可见，而无需将其永久编码进参与者身份。, en: The same actor can have different duties in different scopes and times. A reusable role concept makes responsibility legible without permanently encoding it into the actor identity., ja: 同じアクターでも、範囲や時点によって異なる責務を担うことがある。再利用可能なロール概念は、責任をアクターIDに恒久的に埋め込まずに明確化する。}
  includes:
    - {zh: 命名済みの責任職能、職務説明、および許可される活動カテゴリ。, en: "Named responsibility functions, duty descriptions, and permitted activity categories.", ja: 名前付きの責任機能、職務記述、許可されるアクティビティカテゴリ。}
    - {zh: 参与者角色绑定和授权策略使用的角色标识符。, en: Role identifiers used by actor role bindings and authorization policy., ja: アクターロールバインディングおよび認可ポリシーで使用するロール識別子。}
  excludes:
    - {zh: 持有角色的人员或软件服务、范围化绑定以及直接的权限令牌。, en: "The person or software service holding a role, the scoped binding, and a direct permission token.", ja: ロールを保持する人物またはソフトウェアサービス、スコープ付きバインディング、直接の権限トークン。}
    - {zh: 在某一角色下发生的任务步骤或执行活动。, en: A task step or execution activity that happens under a role., ja: ロールの下で発生するタスクステップまたは実行アクティビティ。}
  semantic_kind: role
  aliases: [duty, responsibility role]
engineering:
  explanation: {zh: 角色注册表提供 role_id 和职责语义。在运行时，授权会评估角色绑定，而不是将请求中的角色字符串视为权限证明。, en: "A role registry supplies role_id and duty semantics. At runtime, authorization evaluates a role binding rather than treating a role string in a request as proof of authority.", ja: ロールレジストリは role_id と職務の意味を提供する。実行時には、認可はリクエスト内のロール文字列を権限の証明として扱うのではなく、ロールバインディングを評価する。}
  typical_input:
    - description: {zh: 角色定义, en: Role definition, ja: ロール定義}
      format: |-
        {"role_id":"ReviewerRole","duty":"assess output evidence","permitted_actions":["review","approve"]}
  typical_output:
    - description: {zh: 角色查找, en: Role lookup, ja: ロール検索}
      format: |-
        {"role_id":"ReviewerRole","binding_required":true,"duty":"assess output evidence"}
  reference_implementations:
    - {name: PROV-O Role, url: https://www.w3.org/TR/prov-o/, description: Role is a qualified provenance term used to state contextual participation.}
structure:
  identity_keys: [role_id]
  fields:
    - id: role_id
      labels: {zh: 角色 ID, en: Role ID, ja: ロール ID}
      definitions: {zh: 可复用运行时职能的稳定标识符。, en: Stable identifier for the reusable runtime function., ja: 再利用可能なランタイム機能の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z][A-Za-z0-9]{2,127}$'
      example_value: ReviewerRole
      source_claims: [claim-runtime-role]
    - id: duty
      labels: {zh: 职责, en: Duty, ja: 職務}
      definitions: {zh: 该角色以自然语言描述的责任。, en: Plain-language responsibility described by the role., ja: ロールによって平易な言葉で記述される責任。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: assess-output-evidence
      source_claims: [claim-runtime-role]
  constraints:
    - id: runtime-role-not-principal
      severity: error
      language: plain
      expression: A role definition cannot be used as actor_id; an actor role binding is required for attribution or authorization.
      explanation: {zh: 职责说明并不能标识谁执行了或可以执行某项活动。, en: A duty description does not identify who performed or may perform an activity., ja: 職務記述は、誰がアクティビティを実行したか、または実行できるかを特定しない。}
      source_claims: [claim-runtime-role]
  required_relations: []
examples:
  - id: runtime-role-positive
    labels: {zh: "CrewAI Agent role 字段", en: "CrewAI Agent role field", ja: "CrewAI Agent role フィールド"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RuntimeRole maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RuntimeRole maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RuntimeRole provenance graph."}
    field_values: {role_id: ReviewerRole, duty: assess-output-evidence}
    related_node_ids: [RuntimeRole, ActorRoleBinding]
    related_relation_ids: [ActorRoleBinding-binds-RuntimeRole]
    source_claims: [claim-runtime-role]
  - id: runtime-role-counterexample
    labels: {zh: "OpenAI agent name 非 RuntimeRole", en: "OpenAI agent name not RuntimeRole", ja: "OpenAI agent name は RuntimeRole ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style RuntimeRole.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style RuntimeRole.", ja: "Missing parent_run_id rejects LangSmith-style RuntimeRole."}
    field_values: {role_id: agent-reviewer-2}
    related_node_ids: [Actor]
    related_relation_ids: []
    source_claims: [claim-runtime-role]
  - id: runtime-role-boundary
    labels: {zh: "RuntimeRole 与 Actor 边界", en: "RuntimeRole versus Actor boundary", ja: "RuntimeRole と Actor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RuntimeRole preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RuntimeRole preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {role_id: DeveloperRole}
    related_node_ids: [RuntimeRole, ActorCapabilityBinding]
    related_relation_ids: []
    source_claims: [claim-runtime-role]
  - id: runtime-role-instance-reviewer-role
    labels: {zh: "Data Analysis Specialist 角色", en: "Data Analysis Specialist role", ja: "Data Analysis Specialist ロール"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->RuntimeRole.", en: "Langfuse instance: trace+span+score->RuntimeRole.", ja: "Langfuse instance maps to RuntimeRole."}
    field_values: {role_id: ReviewerRole, duty: assess-output-evidence}
    related_node_ids: [RuntimeRole, ActorRoleBinding, Actor]
    related_relation_ids: [ActorRoleBinding-binds-RuntimeRole]
    source_claims: [claim-runtime-role]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Role as a qualified provenance term distinct from Agent identity and Activity occurrence.
source_claims:
  - id: claim-runtime-role
    source: prov-o-core
    supports: PROV-O includes Role among qualified terms for contextual provenance relationships.
    locator: Section 3.3, Role
    evidence_kind: standard
    confidence: high

