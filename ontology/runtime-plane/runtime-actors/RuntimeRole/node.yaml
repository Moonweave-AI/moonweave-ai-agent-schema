schema: moonweave.ai/ontology-node/v1
id: RuntimeRole
kind: concept
labels:
  zh: 运行时角色
  en: runtime role
  ja: runtime role
semantics:
  short_definition:
    zh: 可在明确范围和有效期内由参与者承担的运行职责定义。
    en: A runtime responsibility definition that an Actor may bear within an explicit scope and validity period.
    ja: Actor が明示 scope と validity period 内で担える runtime responsibility definition。
  definition:
    zh: 运行时角色是一项角色定义，以 role_id 和职责语义为身份，规定主体在某个运行、项目、对象或权限范围内可承担的责任。它不是 Actor 本身，也不是绑定记录；ActorRoleBinding 才说明哪个 Actor 在何时、何种范围内承担该角色。
    en: A Runtime Role is a role definition identified by role_id and responsibility semantics. It specifies responsibility that an Actor may bear for a run, project, object, or authority scope. It is neither the Actor nor the binding record; ActorRoleBinding states which Actor bears the role, when, and within what scope.
    ja: Runtime Role は role_id と responsibility semantics で識別される role definition で、run・project・object・authority scope に対して Actor が担える責任を規定します。Actor 自体でも binding record でもなく、ActorRoleBinding が誰がいつどの scope で担うかを示します。
  why_needed:
    zh: 把职责从主体身份中分离，允许同一人同时或先后承担多个角色，也允许角色被撤销而不改变主体身份。
    en: Separating responsibility from Actor identity lets one person bear multiple roles concurrently or sequentially and lets a role be revoked without changing identity.
    ja: responsibility を Actor identity から分離し、一人が複数 role を同時・順次に担い、identity を変えず role を revoke できます。
  includes:
    - zh: 纳入可通过范围、有效期和职责说明进行绑定的角色定义。
      en: Includes role definitions bindable through scope, validity, and responsibility terms.
      ja: scope・validity・responsibility term で binding 可能な role definition を含みます。
  excludes:
    - zh: 排除自然人、软件主体、角色绑定记录和单次角色行为。
      en: Excludes persons, software actors, role-binding records, and individual role actions.
      ja: person・software actor・role-binding record・個別 role action を除きます。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 集成 RuntimeRole 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating RuntimeRole, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: RuntimeRole 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to RuntimeRole.
      format: |-
        # Example RuntimeRole ingest
        { "runtime-role_ref": "example-1" }
      source_claims:
        - claim-runtime-role-design
  typical_output:
    - description: Moonweave-local RuntimeRole projection.
      format: '{ "schema_owner": "moonweave-local-design", "runtime-role_id": "example-1" }'
      source_claims:
        - claim-runtime-role-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 角色标识
        en: role ID
        ja: role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识职责定义，而不是角色承担者。
        en: Stably identifies the responsibility definition rather than its bearer.
        ja: role bearer ではなく responsibility definition を安定識別します。
      allowed_values: []
      pattern: null
      example_value: role:runtime:reviewer
      source_claims:
        - claim-runtime-role-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RuntimeRole-example-positive-manual-001
    labels:
      zh: CrewAI Agent role 字段
      en: CrewAI Agent role field
      ja: CrewAI Agent role フィールド
    descriptions:
      zh: CrewAI Agent(role=, goal="...", backstory="...") 的 role 字段定义 RuntimeRole role_id=senior-data-researcher。
      en: CrewAI Agent(role=, goal="...", backstory="...") role field defines RuntimeRole role_id=senior-data-researcher.
      ja: CrewAI Agent.role が RuntimeRole を定義する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      role_id: role:runtime:reviewer
    related_node_ids:
      - RuntimeRole
      - ActorRoleBinding
    related_relation_ids:
      - ActorRoleBinding-binds-RuntimeRole
    source_claims:
      - claim-runtime-role-design
  - id: RuntimeRole-example-boundary-manual-001
    labels:
      zh: OpenAI agent name 非 RuntimeRole
      en: OpenAI agent name not RuntimeRole
      ja: OpenAI agent name は RuntimeRole ではない
    descriptions:
      zh: OpenAI Agents SDK Agent(name=) 的 name 是 agent 配置名，不是 CrewAI 式 RuntimeRole 定义。
      en: OpenAI Agents SDK Agent(name=) name is agent config name, not CrewAI-style RuntimeRole definition.
      ja: OpenAI Agent.name は RuntimeRole ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - RuntimeRole
      - HumanActor
    related_relation_ids: []
    source_claims:
      - claim-runtime-role-design
  - id: RuntimeRole-example-3
    labels:
      zh: RuntimeRole 与 Actor 边界
      en: RuntimeRole versus Actor boundary
      ja: RuntimeRole と Actor 境界
    descriptions:
      zh: RuntimeRole 是角色定义 Entity；Actor 是责任主体；ActorRoleBinding 将 role 绑定到 actor scope。
      en: RuntimeRole is role definition Entity; Actor is responsible principal; ActorRoleBinding binds role to actor scope.
      ja: RuntimeRole 定義と Actor 主体は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - RuntimeRole
    related_relation_ids: []
    source_claims:
      - claim-runtime-role-vendor
      - claim-runtime-role-design
  - id: RuntimeRole-example-4
    labels:
      zh: Data Analysis Specialist 角色
      en: Data Analysis Specialist role
      ja: Data Analysis Specialist ロール
    descriptions:
      zh: RuntimeRole role_id=data-analysis-specialist、label="Data Analysis Specialist"、framework=crewai。
      en: RuntimeRole role_id=data-analysis-specialist, label="Data Analysis Specialist", framework=crewai.
      ja: data-analysis-specialist RuntimeRole を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - RuntimeRole
    related_relation_ids: []
    source_claims:
      - claim-runtime-role-vendor
      - claim-runtime-role-design
parent_relation: null
relations: []
sources:
  - id: src-openai-assistants
    title: OpenAI Assistants API
    url: https://platform.openai.com/docs/api-reference/assistants
    source_type: official-doc
    relevance: Assistant, model, and tool role objects for AgentActor, Model, ToolServiceActor.
  - id: src-langgraph
    title: LangGraph Documentation
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Compiled node executors and runnable config actor metadata.
  - id: src-anthropic-messages
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Message roles and streaming for actor participation evidence.
  - id: src-a2a
    title: Agent2Agent (A2A) Protocol
    url: https://google.github.io/A2A/
    source_type: official-spec
    relevance: Agent Card discovery and remote AgentActor resolution.
  - id: src-runtime-actors-design
    title: Moonweave runtime-actors module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Actor, RuntimeRole, Model, ActorBinding, RemoteAgentReference boundaries.
source_claims:
  - id: claim-runtime-role-vendor
    source: src-openai-assistants
    supports: runtime-actors vendor evidence supports RuntimeRole identity and boundary mapping.
    locator: RuntimeRole integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-runtime-role-design
    source: src-runtime-actors-design
    supports: Moonweave RuntimeRole concept boundary within runtime-actors.
    locator: RuntimeRole boundary
    evidence_kind: design-inference
    confidence: high
