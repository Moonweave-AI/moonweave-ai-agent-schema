schema: moonweave.ai/ontology-node/v1
id: RuntimeRole
kind: concept
status: accepted
labels:
  zh: 运行时角色
  en: runtime role
  ja: runtime role
semantics:
  short_definition:
    zh: 可在明确范围和有效期内由参与者承担的运行职责定义。
    en: A runtime responsibility definition that an Actor may bear within an explicit scope and validity period.
    ja: Actor が明示 scope と validity period 内で担える runtime responsibility definition。
  definition:
    zh: 运行时角色是一项角色定义，以 role_id 和职责语义为身份，规定主体在某个运行、项目、对象或权限范围内可承担的责任。它不是 Actor 本身，也不是绑定记录；ActorRoleBinding 才说明哪个 Actor 在何时、何种范围内承担该角色。
    en: A Runtime Role is a role definition identified by role_id and responsibility semantics. It specifies responsibility that an Actor may bear for a run, project, object, or authority scope. It is neither the Actor nor the binding record; ActorRoleBinding states which Actor bears the role, when, and within what scope.
    ja: Runtime Role は role_id と responsibility semantics で識別される role definition で、run・project・object・authority scope に対して Actor が担える責任を規定します。Actor 自体でも binding record でもなく、ActorRoleBinding が誰がいつどの scope で担うかを示します。
  why_needed:
    zh: 把职责从主体身份中分离，允许同一人同时或先后承担多个角色，也允许角色被撤销而不改变主体身份。
    en: Separating responsibility from Actor identity lets one person bear multiple roles concurrently or sequentially and lets a role be revoked without changing identity.
    ja: responsibility を Actor identity から分離し、一人が複数 role を同時・順次に担い、identity を変えず role を revoke できます。
  includes:
    - zh: 纳入可通过范围、有效期和职责说明进行绑定的角色定义。
      en: Includes role definitions bindable through scope, validity, and responsibility terms.
      ja: scope・validity・responsibility term で binding 可能な role definition を含みます。
  excludes:
    - zh: 排除自然人、软件主体、角色绑定记录和单次角色行为。
      en: Excludes persons, software actors, role-binding records, and individual role actions.
      ja: person・software actor・role-binding record・個別 role action を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 角色标识
        en: role ID
        ja: role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识职责定义，而不是角色承担者。
        en: Stably identifies the responsibility definition rather than its bearer.
        ja: role bearer ではなく responsibility definition を安定識別します。
      allowed_values: []
      pattern: null
      example_value: role:runtime:reviewer
      source_claims:
        - claim-runtime-role-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: RuntimeRole-example-positive-manual-001
    kind: positive
    labels:
      zh: 有范围的审核职责
      en: scoped review responsibility
      ja: scoped review responsibility
    scenario_id: null
    descriptions:
      zh: role:runtime:reviewer 定义针对发布候选的审核职责，但不指定承担者。
      en: role:runtime:reviewer defines review responsibility for a release candidate without naming its bearer.
      ja: role:runtime:reviewer は release candidate の review responsibility を定義しますが bearer を指定しません。
    field_values:
      role_id: role:runtime:reviewer
    related_node_ids:
      - RuntimeRole
      - ActorRoleBinding
    related_relation_ids:
      - ActorRoleBinding-binds-RuntimeRole
    expected_result:
      zh: 保留为可绑定的 RuntimeRole。
      en: Retain as a bindable RuntimeRole.
      ja: binding 可能な RuntimeRole として保持します。
    why_valid_or_invalid:
      zh: 该记录定义可被承担和撤销的职责，而不是任何主体的稳定身份。
      en: The record defines responsibility rather than Actor identity.
      ja: record は Actor identity ではなく responsibility を定義します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-runtime-role-003
  - id: RuntimeRole-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 自然人身份边界
      en: person-identity boundary
      ja: person-identity 境界
    scenario_id: runtime-role-boundary
    descriptions:
      zh: actor:alice 标识自然人 Alice，没有职责定义。
      en: actor:alice identifies the person Alice and contains no responsibility definition.
      ja: actor:alice は person Alice を識別し responsibility definition を持ちません。
    field_values: {}
    related_node_ids:
      - RuntimeRole
      - HumanActor
    related_relation_ids: []
    expected_result:
      zh: 归入 HumanActor，不归入 RuntimeRole。
      en: Classify as HumanActor, not RuntimeRole.
      ja: RuntimeRole ではなく HumanActor に分類します。
    why_valid_or_invalid:
      zh: 自然人的主体身份不能替代具有职责、范围和有效期的角色定义。
      en: Actor identity cannot substitute for a role definition.
      ja: Actor identity は role definition を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-runtime-role-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O、OpenAI Agents SDK、Wooldridge 主体模型逐项核验，Actor 层次与绑定语义成立。
    en: Verified against PROV-O, OpenAI Agents SDK, and Wooldridge agency. Actor hierarchy and binding semantics hold.
    ja: PROV-O、OpenAI Agents SDK、Wooldridge agency に照らし Actor hierarchy と binding semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-runtime-role-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Role from Agent and attaches a role through qualified association; Moonweave applies this separation to runtime responsibility.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-role-002
    source: eng-ont-prov-o
    supports: PROV-O distinguishes a prov:Role from the Agent that bears it in a qualified association.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-role-003
    source: eng-ont-prov-o
    supports: PROV-O models Role separately from Agent in qualified association.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-role-004
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Person/Agent from Role.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Person, Agent, Role
    evidence_kind: official
    confidence: high
    review_status: accepted

