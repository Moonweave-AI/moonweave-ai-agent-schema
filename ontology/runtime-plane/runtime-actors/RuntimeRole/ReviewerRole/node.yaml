schema: moonweave.ai/ontology-node/v1
id: ReviewerRole
kind: concept
labels:
  zh: 审核者角色
  en: reviewer role
  ja: reviewer role
semantics:
  short_definition:
    zh: 针对明确对象和准则形成可追溯评价判断的运行时角色。
    en: A runtime role that produces traceable assessment judgments for an identified object and criteria.
    ja: identified object と criteria に対して traceable assessment judgment を作る runtime role。
  definition:
    zh: 审核者角色是一种 RuntimeRole，其种差是针对明确审核对象、准则、利益冲突和有效期形成接受、拒绝、缺陷或改进判断。ActorRoleBinding 记录承担者与范围。
    en: ReviewerRole is a RuntimeRole distinguished by producing accept, reject, defect, or improvement judgments for an identified review object, criteria, conflict conditions, and validity period. ActorRoleBinding records the bearer and scope.
    ja: ReviewerRole は identified review object・criteria・conflict condition・validity period に対して accept/reject/defect/improvement judgment を作る RuntimeRole で、ActorRoleBinding が bearer と scope を記録します。
  why_needed:
    zh: 审核责任可由不同人在不同对象上承担，也可与开发职责并存。
    en: Review responsibility may be borne by different people for different objects and may coexist with developer responsibility.
    ja: review responsibility は object ごとに別 person が担え、developer responsibility と併存できます。
  includes:
    - zh: 纳入有审核对象、准则和可追溯结论的职责。
      en: Includes responsibility with a review object, criteria, and traceable conclusion.
      ja: review object・criteria・traceable conclusion を持つ responsibility を含みます。
  excludes:
    - zh: 排除无责任绑定的普通评论和自动评价模型身份。
      en: Excludes ordinary comments without responsibility binding and automated evaluator identity.
      ja: responsibility binding のない ordinary comment と automated evaluator identity を除きます。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 集成 ReviewerRole 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ReviewerRole, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ReviewerRole 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ReviewerRole.
      format: |-
        # Example ReviewerRole ingest
        { "reviewer-role_ref": "example-1" }
      source_claims:
        - claim-reviewer-role-design
  typical_output:
    - description: Moonweave-local ReviewerRole projection.
      format: '{ "schema_owner": "moonweave-local-design", "reviewer-role_id": "example-1" }'
      source_claims:
        - claim-reviewer-role-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
