schema: moonweave.ai/ontology-node/v1
id: ReviewerRole
kind: concept
status: accepted
labels: {zh: 审阅者角色, en: Reviewer role, ja: レビュアーロール}
semantics:
  short_definition: {zh: 负责依据既定标准评估执行、制品或证据的 RuntimeRole。, en: "A RuntimeRole responsible for assessing an execution, artifact, or evidence against stated criteria.", ja: 定められた基準に対して実行、成果物、または証拠を評価する責任を持つ RuntimeRole。}
  definition: {zh: ReviewerRole 是为检查证据、批准、拒绝或记录运行时工作发现的参与者定义的角色。它不是审阅者 Actor、审阅活动、被评估制品，也不是审阅产生的质量分数。, en: "ReviewerRole is a role definition for a participant who inspects evidence, approves, rejects, or records findings about runtime work. It is not the reviewer Actor, the review Activity, the evaluated artifact, or a quality score produced by review.", ja: ReviewerRole は、証拠を検査し、承認、却下、またはランタイム作業に関する所見を記録する参加者のロール定義である。レビュー担当者 Actor、レビューアクティビティ、評価対象の成果物、またはレビューで生成される品質スコアそのものではない。}
  why_needed: {zh: 运行时工作常常需要区别于实现和运营的可问责检查。对角色进行建模可防止审阅结果在没有声明责任的情况下错误归因于通用用户或自动检查。, en: Runtime work often needs accountable inspection distinct from implementation and operation. Modeling the role prevents a review result from being incorrectly attributed to a generic user or an automated check without declared responsibility., ja: ランタイム作業では、実装や運用とは異なる説明責任を持つ検査が必要になることが多い。ロールをモデル化することで、責任が宣言されていない汎用ユーザーや自動チェックにレビュー結果が誤って帰属されることを防ぐ。}
  includes:
    - {zh: 制品审阅、追踪审阅、运行批准、安全审阅和事件证据评估职责。, en: "Artifact review, trace review, run approval, safety review, and incident evidence assessment duties.", ja: 成果物レビュー、トレースレビュー、実行承認、安全レビュー、インシデント証拠評価の職務。}
    - {zh: 由参与者角色绑定引用的范围化审阅者角色定义。, en: Scoped reviewer role definitions referenced by actor role bindings., ja: アクターロールバインディングから参照されるスコープ付きレビュアーロール定義。}
  excludes:
    - {zh: Feedback 评估结果、审阅评论或策略规则。, en: "A Feedback evaluation result, a review comment, or a policy rule.", ja: Feedback 評価結果、レビューコメント、またはポリシールール。}
    - {zh: 开发者实现责任和人工操作员恢复控制。, en: Developer implementation responsibility and human operator recovery control., ja: 開発者の実装責任および人間オペレーターの復旧制御。}
  semantic_kind: role
  aliases: [auditor, assessor]
engineering:
  explanation: {zh: 审阅工作流在接受决定前解析 ReviewerRole 绑定。它将审阅者参与者 ID、角色绑定、审阅目标、标准版本和决定作为独立证据记录。, en: "A review workflow resolves ReviewerRole binding before accepting a decision. It records reviewer actor ID, role binding, reviewed target, criteria version, and decision as separate evidence records.", ja: レビューワークフローは、決定を受け入れる前に ReviewerRole バインディングを解決する。レビュー担当アクターID、ロールバインディング、レビュー対象、基準バージョン、決定をそれぞれ別個の証拠記録として保存する。}
  typical_input:
    - description: {zh: 审阅请求, en: Review request, ja: レビュー要求}
      format: |-
        {"actor_id":"agent-reviewer-2","role_id":"ReviewerRole","target_artifact_id":"patch-17","criteria_version":"review-v3"}
  typical_output:
    - description: {zh: 审阅决定, en: Review decision, ja: レビュー決定}
      format: |-
        {"review_id":"review-22","reviewer_actor_id":"agent-reviewer-2","target_artifact_id":"patch-17","decision":"approved"}
  reference_implementations:
    - {name: PROV-O Role, url: https://www.w3.org/TR/prov-o/, description: Role contextualizes responsibility distinct from agent identity and activity occurrence.}
structure:
  identity_keys: [role_id]
  fields:
    - id: role_id
      labels: {zh: 角色 ID, en: Role ID, ja: ロール ID}
      definitions: {zh: 证据评估责任的稳定标识符。, en: Stable identifier for evidence-assessment responsibility., ja: 証拠評価責任の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z][A-Za-z0-9]{2,127}$'
      example_value: ReviewerRole
      source_claims: [claim-reviewer-role]
    - id: duty
      labels:
        zh: "职责"
        en: "Duty"
        ja: "職務"
      definitions:
        zh: "此角色承担的固定证据与输出评估职责。"
        en: "Fixed evidence and output-assessment duty carried by this role."
        ja: "このロールが担う固定の証拠および出力評価職務。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [assess-output-evidence]
      example_value: assess-output-evidence
      source_claims: [claim-reviewer-role]
    - id: criteria_scope
      labels: {zh: 标准范围, en: Criteria scope, ja: 基準スコープ}
      definitions: {zh: 审阅者角色获授权应用的标准族。, en: Criteria family the reviewer role is authorized to apply., ja: レビュアーロールが適用を認可された基準ファミリー。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: code-quality
      source_claims: [claim-reviewer-role]
  constraints:
    - id: reviewer-role-target-separation
      severity: error
      language: plain
      expression: A reviewer decision must identify a reviewer binding and evaluated target; the target cannot also be the reviewer role.
      explanation: {zh: 评估责任与正在评估的证据是不同对象。, en: Evaluation responsibility and the evidence being evaluated are separate objects., ja: 評価責任と評価される証拠は別個のオブジェクトである。}
      source_claims: [claim-reviewer-role]
  required_relations: [ReviewerRole-specializes-RuntimeRole]
examples:
  - id: reviewer-role-positive
    labels: {zh: "CrewAI Data Analysis Specialist 审查", en: "CrewAI Data Analysis Specialist review", ja: "CrewAI Data Analysis Specialist レビュー"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ReviewerRole maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ReviewerRole maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ReviewerRole provenance graph."}
    field_values: {role_id: ReviewerRole, duty: assess-output-evidence, criteria_scope: code-quality}
    related_node_ids: [ReviewerRole, PatchArtifact, ActorRoleBinding]
    related_relation_ids: []
    source_claims: [claim-reviewer-role]
  - id: reviewer-role-counterexample
    labels: {zh: "GitHub CODEOWNERS 非 ReviewerRole", en: "GitHub CODEOWNERS not ReviewerRole", ja: "GitHub CODEOWNERS は ReviewerRole ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ReviewerRole.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ReviewerRole.", ja: "Missing parent_run_id rejects LangSmith-style ReviewerRole."}
    field_values: {record_id: lint-4}
    related_node_ids: [AuditRecord]
    related_relation_ids: []
    source_claims: [claim-reviewer-role]
  - id: reviewer-role-boundary
    labels: {zh: "ReviewerRole 与 HumanActor 边界", en: "ReviewerRole versus HumanActor boundary", ja: "ReviewerRole と HumanActor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ReviewerRole preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ReviewerRole preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {role_id: ReviewerRole}
    related_node_ids: [ReviewerRole, DeveloperRole]
    related_relation_ids: []
    source_claims: [claim-reviewer-role]
  - id: reviewer-role-instance-reviewer-role
    labels: {zh: "reviewer-role 实例", en: "reviewer-role instance", ja: "reviewer-role 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ReviewerRole.", en: "Langfuse instance: trace+span+score->ReviewerRole.", ja: "Langfuse instance maps to ReviewerRole."}
    field_values: {role_id: ReviewerRole, duty: assess-output-evidence, criteria_scope: code-quality}
    related_node_ids: [ReviewerRole, ActorRoleBinding, Actor]
    related_relation_ids: []
    source_claims: [claim-reviewer-role]
parent_relation:
  id: ReviewerRole-specializes-RuntimeRole
  predicate: is_a
  target: concept:RuntimeRole
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是审阅者运行时角色, en: is a reviewer runtime role, ja: レビュアーのランタイムロールである}
  definitions: {zh: 每个 ReviewerRole 都是负责评估不同运行时证据或输出的 RuntimeRole。, en: Every ReviewerRole is a RuntimeRole with responsibility to assess distinct runtime evidence or outputs., ja: すべての ReviewerRole は、別個のランタイム証拠または出力を評価する責任を持つ RuntimeRole である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_reviewer_role, labels: {zh: 具有审阅者角色, en: has reviewer role, ja: レビュアーロールを持つ}}
  conditions:
    - id: reviewer-role-parent-condition
      severity: error
      expression: Require a duty to assess a separately identified target against stated criteria.
      explanations: {zh: 仅制品生成或运行时操作并不满足该子类型。, en: Artifact generation or runtime operation alone does not satisfy this subtype., ja: 成果物の生成またはランタイム操作だけでは、このサブタイプを満たさない。}
      source_claims: [claim-reviewer-role]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-reviewer-role]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Role terms support contextual responsibility for assessment activities without identity collapse.
source_claims:
  - id: claim-reviewer-role
    source: prov-o-core
    supports: PROV-O Role provides a qualified contextual term for an agent's responsibility in an activity.
    locator: Section 3.3, Role and Association
    evidence_kind: standard
    confidence: high

