schema: moonweave.ai/ontology-node/v1
id: ReviewerRole
kind: concept
status: accepted
labels:
  zh: 审核者角色
  en: reviewer role
  ja: reviewer role
semantics:
  short_definition:
    zh: 针对明确对象和准则形成可追溯评价判断的运行时角色。
    en: A runtime role that produces traceable assessment judgments for an identified object and criteria.
    ja: identified object と criteria に対して traceable assessment judgment を作る runtime role。
  definition:
    zh: 审核者角色是一种 RuntimeRole，其种差是针对明确审核对象、准则、利益冲突和有效期形成接受、拒绝、缺陷或改进判断。ActorRoleBinding 记录承担者与范围。
    en: ReviewerRole is a RuntimeRole distinguished by producing accept, reject, defect, or improvement judgments for an identified review object, criteria, conflict conditions, and validity period. ActorRoleBinding records the bearer and scope.
    ja: ReviewerRole は identified review object・criteria・conflict condition・validity period に対して accept/reject/defect/improvement judgment を作る RuntimeRole で、ActorRoleBinding が bearer と scope を記録します。
  why_needed:
    zh: 审核责任可由不同人在不同对象上承担，也可与开发职责并存。
    en: Review responsibility may be borne by different people for different objects and may coexist with developer responsibility.
    ja: review responsibility は object ごとに別 person が担え、developer responsibility と併存できます。
  includes:
    - zh: 纳入有审核对象、准则和可追溯结论的职责。
      en: Includes responsibility with a review object, criteria, and traceable conclusion.
      ja: review object・criteria・traceable conclusion を持つ responsibility を含みます。
  excludes:
    - zh: 排除无责任绑定的普通评论和自动评价模型身份。
      en: Excludes ordinary comments without responsibility binding and automated evaluator identity.
      ja: responsibility binding のない ordinary comment と automated evaluator identity を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewerRole-example-positive-manual-001
    kind: positive
    labels:
      zh: 发布候选审核
      en: release-candidate review
      ja: release-candidate review
    scenario_id: null
    descriptions:
      zh: 角色要求依据发布准则接受或拒绝候选构建并记录理由。
      en: The role requires accepting or rejecting a candidate build under release criteria and recording the rationale.
      ja: role は release criteria に基づき candidate build を accept/reject し rationale を記録します。
    field_values:
      role_id: role:reviewer:release
    related_node_ids:
      - ReviewerRole
      - RuntimeRole
    related_relation_ids:
      - ReviewerRole-is_a-RuntimeRole
    expected_result:
      zh: 归入 ReviewerRole。
      en: Classify as ReviewerRole.
      ja: ReviewerRole に分類します。
    why_valid_or_invalid:
      zh: 审核对象、判断准则和形成结论的责任均已明确记录。
      en: Object, criteria, and judgment responsibility are explicit.
      ja: object・criteria・judgment responsibility が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-reviewer-role-002
  - id: ReviewerRole-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 无责任评论边界
      en: unassigned-comment boundary
      ja: unassigned-comment 境界
    scenario_id: reviewer-role-boundary
    descriptions:
      zh: 用户留言“看起来不错”，没有审核对象、准则或绑定。
      en: A user comments 'looks good' with no review object, criteria, or binding.
      ja: user が review object・criteria・binding なしで 'looks good' とコメントします。
    field_values: {}
    related_node_ids:
      - ReviewerRole
      - UserActor
    related_relation_ids: []
    expected_result:
      zh: 不得据此绑定 ReviewerRole。
      en: Do not bind ReviewerRole from this alone.
      ja: これだけで ReviewerRole を binding しません。
    why_valid_or_invalid:
      zh: 普通反馈没有审核对象、准则和责任绑定，不等于可追溯审核责任。
      en: Ordinary feedback is not traceable review responsibility.
      ja: ordinary feedback は traceable review responsibility ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-reviewer-role-003
