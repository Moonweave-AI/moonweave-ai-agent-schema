parent_relation:
  id: ReviewerRole-is_a-RuntimeRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行时角色
    en: is a runtime role
    ja: runtime role の一種
  definitions:
    zh: ReviewerRole 是以有对象、有准则且可追溯的评价责任为种差的 RuntimeRole。
    en: ReviewerRole is a RuntimeRole specialized by traceable assessment responsibility with an identified object and criteria.
    ja: ReviewerRole は identified object・criteria・traceable assessment responsibility を種差とする RuntimeRole です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 是类级种属关系。
    en: is_a is a class-level genus relation.
    ja: is_a は class-level genus relation です。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions:
    - id: ReviewerRole-is_a-RuntimeRole-condition-001
      severity: error
      expression_language: custom
      expression: review_object_and_criteria_are_explicit == true
      explanations:
        zh: 只有审核对象、判断准则和结论责任均明确时，才使用该下位关系。
        en: Use this subtype only when the review object, judgment criteria, and conclusion responsibility are explicit.
        ja: review object・judgment criteria・conclusion responsibility が明示される場合だけこの subtype を用います。
      source_claims:
        - claim-reviewer-role-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-reviewer-role-design
  distinct_fact_rationale:
    zh: 该边表达审核职责的类级专门化。
    en: This edge expresses class-level specialization by review responsibility.
    ja: review responsibility による class-level specialization を表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
