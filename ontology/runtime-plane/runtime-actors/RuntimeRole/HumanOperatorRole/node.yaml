schema: moonweave.ai/ontology-node/v1
id: HumanOperatorRole
kind: concept
status: accepted
labels: {zh: 人工操作员角色, en: Human operator role, ja: 人間オペレーターロール}
semantics:
  short_definition: {zh: 为获授权监督或操作运行时控制的 HumanActor 定义的 RuntimeRole。, en: A RuntimeRole for a HumanActor authorized to supervise or operate runtime controls., ja: ランタイム制御を監督または操作する権限を持つ HumanActor のための RuntimeRole。}
  definition: {zh: HumanOperatorRole 是用于人工参与运营控制的角色定义，例如批准中断、恢复会话、启动还原或处理事件。它不是该人员、自动化服务，也不是记录该操作的生命周期事件。, en: "HumanOperatorRole is a role definition for human participation in operational controls such as approving an interrupt, resuming a session, initiating restore, or handling an incident. It is not the person, an automation service, or the lifecycle event that records the action.", ja: HumanOperatorRole は、中断の承認、セッションの再開、リストアの開始、インシデントの処理など、運用制御への人間の参加のためのロール定義である。人物、自動化サービス、または操作を記録するライフサイクルイベントそのものではない。}
  why_needed: {zh: 人在回路控制要求清晰的问责以及与普通用户请求或自动恢复的分离，特别是在批准会改变运行时状态时。, en: "Human-in-the-loop controls require clear accountability and separation from ordinary user requests or automated recovery, especially where approval changes runtime state.", ja: ヒューマンインザループの制御には、特に承認がランタイム状態を変更する場合、明確な説明責任と通常のユーザー要求または自動復旧からの分離が必要である。}
  includes:
    - {zh: 人工监督、批准、事件响应、手动中断、恢复和复原职责。, en: "Human oversight, approval, incident response, manual interruption, resume, and recovery duties.", ja: 人間による監督、承認、インシデント対応、手動中断、再開、復旧の職務。}
    - {zh: 要求 HumanActor 角色绑定的范围化角色语义。, en: Scoped role semantics requiring a HumanActor role binding., ja: HumanActor のロールバインディングを必要とするスコープ付きロール意味論。}
  excludes:
    - {zh: 普通 UserActor 请求、自动化 SystemServiceActor 或检查点还原活动。, en: "An ordinary UserActor request, an automated SystemServiceActor, or a checkpoint restore Activity.", ja: 通常の UserActor 要求、自動化された SystemServiceActor、またはチェックポイント復元アクティビティ。}
    - {zh: 软件智能体持有的通用角色。, en: A generic role held by software agents., ja: ソフトウェアエージェントが持つ汎用ロール。}
  semantic_kind: role
  aliases: [operator, human in the loop]
engineering:
  explanation: {zh: 控制平面在接受特权运营操作前，需要一个参与者类型为 HumanActor 的有效 ActorRoleBinding。生成的生命周期或还原活动会记录人工参与者及绑定 ID。, en: A control plane requires an active ActorRoleBinding whose actor kind is HumanActor before it accepts a privileged operational action. The resulting lifecycle or restore Activity records the human actor and binding ID., ja: コントロールプレーンは、特権的な運用操作を受け入れる前に、アクター種別が HumanActor である有効な ActorRoleBinding を必要とする。結果となるライフサイクルまたは復元アクティビティは、人間のアクターとバインディングIDを記録する。}
  typical_input:
    - description: {zh: 人工操作员批准, en: Human operator approval, ja: 人間オペレーターの承認}
      format: |-
        {"actor_id":"user-99","role_id":"HumanOperatorRole","binding_id":"rolebind-44","action":"checkpoint.restore","checkpoint_id":"cp-18"}
  typical_output:
    - description: {zh: 已批准操作记录, en: Approved operation record, ja: 承認済み操作記録}
      format: |-
        {"approval_id":"approval-12","actor_id":"user-99","binding_id":"rolebind-44","action":"checkpoint.restore","approved":true}
  reference_implementations:
    - {name: OpenAI Agents SDK Human in the Loop, url: https://openai.github.io/openai-agents-js/guides/human-in-the-loop/, description: Documents pausing agent work for human approval.}
structure:
  identity_keys: [role_id]
  fields:
    - id: role_id
      labels: {zh: 角色 ID, en: Role ID, ja: ロール ID}
      definitions: {zh: 人工运营责任的稳定标识符。, en: Stable identifier for human operational responsibility., ja: 人間の運用責任の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z][A-Za-z0-9]{2,127}$'
      example_value: HumanOperatorRole
      source_claims: [claim-human-operator-role]
    - id: duty
      labels:
        zh: "职责"
        en: "Duty"
        ja: "職務"
      definitions:
        zh: "此角色承担的固定人工运行监督或控制职责。"
        en: "Fixed human runtime-supervision or control duty carried by this role."
        ja: "このロールが担う固定の人間による実行時監督または制御職務。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [supervise-runtime-control]
      example_value: supervise-runtime-control
      source_claims: [claim-human-operator-role]
    - id: control_scope
      labels: {zh: 控制范围, en: Control scope, ja: 制御スコープ}
      definitions: {zh: 由该角色管理的运行时环境或操作族。, en: Runtime environment or action family governed by this role., ja: このロールが管理するランタイム環境またはアクションファミリー。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: checkpoint.restore
      source_claims: [claim-human-operator-role]
  constraints:
    - id: human-operator-human-binding
      severity: error
      language: plain
      expression: HumanOperatorRole must be bound to a HumanActor and validated for the affected scope before a privileged operation.
      explanation: {zh: 自动化可以执行独立的系统服务角色，但不得冒充人工批准。, en: Automation can execute a separate system service role but must not impersonate human approval., ja: 自動化は別個のシステムサービスロールを実行できるが、人間の承認を偽装してはならない。}
      source_claims: [claim-human-operator-role]
  required_relations: [HumanOperatorRole-specializes-RuntimeRole]
examples:
  - id: human-operator-role-positive
    labels: {zh: "OpenAI HITL 审批操作员", en: "OpenAI HITL approval operator", ja: "OpenAI HITL 承認オペレータ"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; HumanOperatorRole maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; HumanOperatorRole maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; HumanOperatorRole provenance graph."}
    field_values: {role_id: HumanOperatorRole, duty: supervise-runtime-control, control_scope: checkpoint.restore}
    related_node_ids: [HumanOperatorRole, HumanActor, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-human-operator-role]
  - id: human-operator-role-counterexample
    labels: {zh: "UserActor 对话用户非 Operator", en: "UserActor dialogue user not Operator", ja: "UserActor 対話ユーザーは Operator ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style HumanOperatorRole.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style HumanOperatorRole.", ja: "Missing parent_run_id rejects LangSmith-style HumanOperatorRole."}
    field_values: {actor_id: checkpoint-service}
    related_node_ids: [SystemServiceActor, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-human-operator-role]
  - id: human-operator-role-boundary
    labels: {zh: "OperatorRole 与 DeveloperRole 边界", en: "OperatorRole versus DeveloperRole boundary", ja: "OperatorRole と DeveloperRole 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; HumanOperatorRole preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; HumanOperatorRole preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {role_id: HumanOperatorRole}
    related_node_ids: [UserActor, HumanOperatorRole]
    related_relation_ids: []
    source_claims: [claim-human-operator-role]
  - id: human-operator-role-instance-operator-role
    labels: {zh: "operator-role 审批实例", en: "operator-role approval instance", ja: "operator-role 承認事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->HumanOperatorRole.", en: "Langfuse instance: trace+span+score->HumanOperatorRole.", ja: "Langfuse instance maps to HumanOperatorRole."}
    field_values: {role_id: HumanOperatorRole, duty: supervise-runtime-control, control_scope: checkpoint.restore}
    related_node_ids: [HumanOperatorRole, ActorRoleBinding, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-human-operator-role]
parent_relation:
  id: HumanOperatorRole-specializes-RuntimeRole
  predicate: is_a
  target: concept:RuntimeRole
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是人工操作员运行时角色, en: is a human operator runtime role, ja: 人間オペレーターのランタイムロールである}
  definitions: {zh: 每个 HumanOperatorRole 都是限于人工运营监督或控制职责的 RuntimeRole。, en: Every HumanOperatorRole is a RuntimeRole constrained to human operational supervision or control duties., ja: すべての HumanOperatorRole は、人間による運用監督または制御の職務に制約された RuntimeRole である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_human_operator_role, labels: {zh: 具有人工作操作员角色, en: has human operator role, ja: 人間オペレーターロールを持つ}}
  conditions:
    - id: human-operator-role-parent-condition
      severity: error
      expression: Require human-supervision or runtime-control duty and a HumanActor binding at use time.
      explanations: {zh: 仅限软件的角色不满足该子类型。, en: Software-only roles do not satisfy this subtype., ja: ソフトウェアのみのロールはこのサブタイプを満たさない。}
      source_claims: [claim-human-operator-role]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-human-operator-role]
relations: []
sources:
  - id: openai-agents-human-in-loop
    title: OpenAI Agents SDK Human in the Loop
    url: https://openai.github.io/openai-agents-js/guides/human-in-the-loop/
    source_type: official-doc
    relevance: Documents pausing agent work for human approval while keeping application-specific operator identity and role assignment separate.
source_claims:
  - id: claim-human-operator-role
    source: openai-agents-human-in-loop
    supports: The Agents SDK documents human-in-the-loop interruption and approval flow; Moonweave keeps the HumanOperatorRole definition, HumanActor identity, and ActorRoleBinding as separate local records.
    locator: Human in the loop overview
    evidence_kind: design-inference
    confidence: high

