schema: moonweave.ai/ontology-node/v1
id: HumanOperatorRole
kind: concept
labels:
  zh: 人类操作员角色
  en: human operator role
  ja: human operator role
semantics:
  short_definition:
    zh: 在指定运行与权限范围内承担实时控制或干预责任的角色。
    en: A role bearing real-time control or intervention responsibility within a specified run and authority scope.
    ja: specified run と authority scope 内で real-time control/intervention responsibility を担う role。
  definition:
    zh: 人类操作员角色是一种 RuntimeRole，其种差是在指定运行、环境、权限和有效期内批准敏感工具、处理告警、暂停或恢复会话、重定向执行或触发安全停机。它必须绑定到 HumanActor，但该绑定不把人永久分类为操作员。
    en: HumanOperatorRole is a RuntimeRole distinguished by approving sensitive tools, responding to alerts, pausing or resuming sessions, redirecting execution, or triggering safe shutdown within a specified run, environment, authority scope, and validity period. It must bind to a HumanActor, but the binding does not permanently classify the person as an operator.
    ja: HumanOperatorRole は specified run・environment・authority scope・validity period 内で sensitive tool approval・alert response・session pause/resume・execution redirect・safe shutdown を担う RuntimeRole です。HumanActor に binding しますが person を永久 operator に分類しません。
  why_needed:
    zh: 运行控制权可轮班、撤销和限制到单次会话，不能作为永久主体类型。
    en: Operational control can rotate, be revoked, and be limited to one session, so it cannot be a permanent Actor type.
    ja: operational control は rotation・revocation・single session 限定が可能で permanent Actor type にできません。
  includes:
    - zh: 纳入有明确运行、权限和有效期的人工控制职责。
      en: Includes human control responsibility with an explicit run, authority, and validity period.
      ja: explicit run・authority・validity period を持つ human control responsibility を含みます。
  excludes:
    - zh: 排除仅设计系统、仅评价产物或仅提交请求的身份。
      en: Excludes identities that only design systems, assess artifacts, or submit requests.
      ja: system design のみ・artifact assessment のみ・request submission のみの identity を除きます。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 集成 HumanOperatorRole 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating HumanOperatorRole, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: HumanOperatorRole 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to HumanOperatorRole.
      format: |-
        # Example HumanOperatorRole ingest
        { "human-operator-role_ref": "example-1" }
      source_claims:
        - claim-human-operator-role-design
  typical_output:
    - description: Moonweave-local HumanOperatorRole projection.
      format: '{ "schema_owner": "moonweave-local-design", "human-operator-role_id": "example-1" }'
      source_claims:
        - claim-human-operator-role-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
