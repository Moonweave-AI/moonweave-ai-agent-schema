schema: moonweave.ai/ontology-node/v1
id: HumanOperatorRole
kind: concept
status: accepted
labels:
  zh: 人类操作员角色
  en: human operator role
  ja: human operator role
semantics:
  short_definition:
    zh: 在指定运行与权限范围内承担实时控制或干预责任的角色。
    en: A role bearing real-time control or intervention responsibility within a specified run and authority scope.
    ja: specified run と authority scope 内で real-time control/intervention responsibility を担う role。
  definition:
    zh: 人类操作员角色是一种 RuntimeRole，其种差是在指定运行、环境、权限和有效期内批准敏感工具、处理告警、暂停或恢复会话、重定向执行或触发安全停机。它必须绑定到 HumanActor，但该绑定不把人永久分类为操作员。
    en: HumanOperatorRole is a RuntimeRole distinguished by approving sensitive tools, responding to alerts, pausing or resuming sessions, redirecting execution, or triggering safe shutdown within a specified run, environment, authority scope, and validity period. It must bind to a HumanActor, but the binding does not permanently classify the person as an operator.
    ja: HumanOperatorRole は specified run・environment・authority scope・validity period 内で sensitive tool approval・alert response・session pause/resume・execution redirect・safe shutdown を担う RuntimeRole です。HumanActor に binding しますが person を永久 operator に分類しません。
  why_needed:
    zh: 运行控制权可轮班、撤销和限制到单次会话，不能作为永久主体类型。
    en: Operational control can rotate, be revoked, and be limited to one session, so it cannot be a permanent Actor type.
    ja: operational control は rotation・revocation・single session 限定が可能で permanent Actor type にできません。
  includes:
    - zh: 纳入有明确运行、权限和有效期的人工控制职责。
      en: Includes human control responsibility with an explicit run, authority, and validity period.
      ja: explicit run・authority・validity period を持つ human control responsibility を含みます。
  excludes:
    - zh: 排除仅设计系统、仅评价产物或仅提交请求的身份。
      en: Excludes identities that only design systems, assess artifacts, or submit requests.
      ja: system design のみ・artifact assessment のみ・request submission のみの identity を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: HumanOperatorRole-example-positive-manual-001
    kind: positive
    labels:
      zh: 运行批准职责
      en: run-approval responsibility
      ja: run-approval responsibility
    scenario_id: null
    descriptions:
      zh: 角色允许值班人员在 run-42 中批准敏感工具并恢复暂停会话。
      en: The role lets the on-call person approve a sensitive tool and resume the paused run-42 session.
      ja: role は on-call person が run-42 で sensitive tool を approve し paused session を resume することを許可します。
    field_values:
      role_id: role:operator:run-42
    related_node_ids:
      - HumanOperatorRole
      - RuntimeRole
    related_relation_ids:
      - HumanOperatorRole-is_a-RuntimeRole
    expected_result:
      zh: 归入 HumanOperatorRole。
      en: Classify as HumanOperatorRole.
      ja: HumanOperatorRole に分類します。
    why_valid_or_invalid:
      zh: 具体运行、批准权限和实时干预责任均已明确记录。
      en: Run, authority, and intervention responsibility are explicit.
      ja: run・authority・intervention responsibility が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-human-operator-role-002
  - id: HumanOperatorRole-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 系统设计者边界
      en: system-designer boundary
      ja: system-designer 境界
    scenario_id: operator-role-boundary
    descriptions:
      zh: 开发者编写运行配置，但不值守 run-42，也无批准权限。
      en: A developer authors the run configuration but is not on call for run-42 and has no approval authority.
      ja: developer が run configuration を作成しますが run-42 の on-call ではなく approval authority もありません。
    field_values: {}
    related_node_ids:
      - HumanOperatorRole
      - DeveloperRole
    related_relation_ids: []
    expected_result:
      zh: 不得绑定 HumanOperatorRole。
      en: Do not bind HumanOperatorRole.
      ja: HumanOperatorRole を binding しません。
    why_valid_or_invalid:
      zh: 系统设计责任不会自动推出某次运行中的批准和控制责任。
      en: Design responsibility does not imply operational-control responsibility.
      ja: design responsibility は operational-control responsibility を含意しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-human-operator-role-003
