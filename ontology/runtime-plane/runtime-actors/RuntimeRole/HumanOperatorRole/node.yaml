    labels:
      zh: OpenAI HITL 审批操作员
      en: OpenAI HITL approval operator
      ja: OpenAI HITL 承認オペレータ
    descriptions:
      zh: OpenAI Agents SDK human-in-the-loop：Runner.run 触发 approval 时 HumanOperatorRole role_id=operator-role 绑定 operator@corp.com 执行 approve/reject。
      en: "OpenAI Agents SDK human-in-the-loop: Runner.run triggers approval where HumanOperatorRole role_id=operator-role binds operator@corp.com to approve/reject."
      ja: OpenAI HITL approval が HumanOperatorRole である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      role_id: role:operator:run-42
    related_node_ids:
      - HumanOperatorRole
      - RuntimeRole
    related_relation_ids:
      - HumanOperatorRole-is_a-RuntimeRole
    source_claims:
      - claim-human-operator-role-design
  - id: HumanOperatorRole-example-boundary-manual-001
    labels:
      zh: UserActor 对话用户非 Operator
      en: UserActor dialogue user not Operator
      ja: UserActor 対話ユーザーは Operator ではない
    descriptions:
      zh: Anthropic Messages role=user 是对话输入 UserActor，不是 HITL HumanOperatorRole 审批操作员。
      en: Anthropic Messages role=user is dialogue input UserActor, not HITL HumanOperatorRole approval operator.
      ja: role=user は UserActor、HITL 承認者は HumanOperatorRole である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - HumanOperatorRole
      - DeveloperRole
    related_relation_ids: []
    source_claims:
      - claim-human-operator-role-design
  - id: HumanOperatorRole-example-3
    labels:
      zh: OperatorRole 与 DeveloperRole 边界
      en: OperatorRole versus DeveloperRole boundary
      ja: OperatorRole と DeveloperRole 境界
    descriptions:
      zh: HumanOperatorRole 是运行时审批/操作 role；DeveloperRole 是 IDE 开发者触发 agent；operator 与 developer 职责不同。
      en: HumanOperatorRole is runtime approval/operation role; DeveloperRole is IDE developer triggering agent; operator and developer duties differ.
      ja: HumanOperatorRole と DeveloperRole は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - HumanOperatorRole
    related_relation_ids: []
    source_claims:
      - claim-human-operator-role-vendor
      - claim-human-operator-role-design
  - id: HumanOperatorRole-example-4
    labels:
      zh: operator-role 审批实例
      en: operator-role approval instance
      ja: operator-role 承認事例
    descriptions:
      zh: HumanOperatorRole role_id=operator-role、operator_id=operator@corp.com、approval_request_id=appr-900、decision=approved。
      en: HumanOperatorRole role_id=operator-role, operator_id=operator@corp.com, approval_request_id=appr-900, decision=approved.
      ja: operator-role 承認 decision を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - HumanOperatorRole
    related_relation_ids: []
    source_claims:
      - claim-human-operator-role-vendor
      - claim-human-operator-role-design
parent_relation:
  id: HumanOperatorRole-is_a-RuntimeRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行时角色
    en: is a runtime role
    ja: runtime role の一種
  definitions:
    zh: HumanOperatorRole 是以指定运行中的实时控制与干预责任为种差的 RuntimeRole。
    en: HumanOperatorRole is a RuntimeRole specialized by real-time control and intervention responsibility for a specified run.
    ja: HumanOperatorRole は specified run の real-time control/intervention responsibility を種差とする RuntimeRole です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 是类级种属关系。
    en: is_a is a class-level genus relation.
    ja: is_a は class-level genus relation です。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions:
    - id: HumanOperatorRole-is_a-RuntimeRole-condition-001
      severity: error
      expression_language: custom
      expression: run_control_authority_is_explicit == true
      explanations:
        zh: 只有指定运行中的控制权限和干预责任均明确时，才使用该下位关系。
        en: Use this subtype only when control authority and intervention responsibility for a specified run are explicit.
        ja: specified run の control authority と intervention responsibility が明示される場合だけこの subtype を用います。
      source_claims:
        - claim-human-operator-role-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-human-operator-role-design
  distinct_fact_rationale:
    zh: 该边表达运行控制职责的类级专门化。
    en: This edge expresses class-level specialization by operational-control responsibility.
    ja: operational-control responsibility による class-level specialization を表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
