schema: moonweave.ai/ontology-node/v1
id: DeveloperRole
kind: concept
labels:
  zh: 开发者角色
  en: developer role
  ja: developer role
semantics:
  short_definition:
    zh: 对智能体实现与配置变更承担创作和技术责任的运行时角色。
    en: A runtime role bearing authorship and technical responsibility for agent implementation and configuration changes.
    ja: agent implementation/configuration change の authorship と technical responsibility を担う runtime role。
  definition:
    zh: 开发者角色是一种 RuntimeRole，其种差是在明确项目、组件和有效期内对代码、工具契约、提示、配置或本体变更承担创作与技术责任。任何 Actor 都须通过 ActorRoleBinding 才在相应范围内承担它。
    en: DeveloperRole is a RuntimeRole distinguished by authorship and technical responsibility for code, tool contracts, prompts, configuration, or ontology changes within an explicit project, component, and validity period. An Actor bears it only through ActorRoleBinding in that scope.
    ja: DeveloperRole は明示 project・component・validity period 内で code・tool contract・prompt・configuration・ontology change の authorship と technical responsibility を担う RuntimeRole です。Actor は ActorRoleBinding によりその scope でのみ担います。
  why_needed:
    zh: 同一人可在一个项目中开发、在另一个项目中只使用；角色不能固化成人的身份。
    en: The same person may develop one project and only use another, so the responsibility cannot be frozen into personal identity.
    ja: 同一 person が一 project では develop し別 project では use のみの場合があるため、responsibility を personal identity に固定できません。
  includes:
    - zh: 纳入有明确变更对象和责任范围的开发职责。
      en: Includes development responsibility with an identified change object and scope.
      ja: identified change object と scope を持つ development responsibility を含みます。
  excludes:
    - zh: 排除作者字符串、自动代码生成器和没有责任范围的普通使用者。
      en: Excludes author strings, automated code generators, and ordinary users without a responsibility scope.
      ja: author string・automated code generator・responsibility scope のない ordinary user を除きます。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: 集成 DeveloperRole 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating DeveloperRole, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: DeveloperRole 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to DeveloperRole.
      format: |-
        # Example DeveloperRole ingest
        { "developer-role_ref": "example-1" }
      source_claims:
        - claim-developer-role-design
  typical_output:
    - description: Moonweave-local DeveloperRole projection.
      format: '{ "schema_owner": "moonweave-local-design", "developer-role_id": "example-1" }'
      source_claims:
        - claim-developer-role-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeveloperRole-example-positive-manual-001
    labels:
      zh: Cursor IDE 开发者触发 agent
      en: Cursor IDE developer triggers agent
      ja: Cursor IDE 開発者が agent を起動
    descriptions:
      zh: Cursor IDE 开发者打开 Chat session_id=cursor-agent-session-77 触发 agent run，映射 DeveloperRole role_id=developer-role、developer_id=dev-bob。
      en: Cursor IDE developer opens Chat session_id=cursor-agent-session-77 triggering agent run mapping DeveloperRole role_id=developer-role, developer_id=dev-bob.
      ja: Cursor Chat 起動が DeveloperRole である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      role_id: role:developer:ontology
    related_node_ids:
      - DeveloperRole
      - RuntimeRole
    related_relation_ids:
      - DeveloperRole-is_a-RuntimeRole
    source_claims:
      - claim-developer-role-design
  - id: DeveloperRole-example-boundary-manual-001
    labels:
      zh: git commit author 非 DeveloperRole
      en: git commit author not DeveloperRole
      ja: git commit author は DeveloperRole ではない
    descriptions:
      zh: git commit author=dev-bob 是 VCS 元数据，不是运行时 DeveloperRole Activity 证据。
      en: git commit author=dev-bob is VCS metadata, not runtime DeveloperRole Activity evidence.
      ja: git author は DeveloperRole ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - DeveloperRole
      - HumanActor
    related_relation_ids: []
    source_claims:
      - claim-developer-role-design
  - id: DeveloperRole-example-3
    labels:
      zh: DeveloperRole 与 HumanOperatorRole 边界
      en: DeveloperRole versus HumanOperatorRole boundary
      ja: DeveloperRole と HumanOperatorRole 境界
    descriptions:
      zh: DeveloperRole 是 IDE/开发场景触发 agent 的 role；HumanOperatorRole 是 HITL 审批；developer 触发 run，operator 审批 run。
      en: DeveloperRole is IDE/dev scenario triggering agent role; HumanOperatorRole is HITL approval; developer triggers run, operator approves run.
      ja: DeveloperRole は run 起動、HumanOperatorRole は承認である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - DeveloperRole
    related_relation_ids: []
    source_claims:
      - claim-developer-role-vendor
      - claim-developer-role-design
  - id: DeveloperRole-example-4
    labels:
      zh: developer-role Cursor 会话
      en: developer-role Cursor session
      ja: developer-role Cursor セッション
    descriptions:
      zh: DeveloperRole role_id=developer-role、developer_id=dev-bob、session_id=cursor-agent-session-77、triggered_at=2026-01-15T08:30:00Z。
      en: DeveloperRole role_id=developer-role, developer_id=dev-bob, session_id=cursor-agent-session-77, triggered_at=2026-01-15T08:30:00Z.
      ja: developer-role Cursor セッションを記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - DeveloperRole
    related_relation_ids: []
    source_claims:
      - claim-developer-role-vendor
      - claim-developer-role-design
parent_relation:
  id: DeveloperRole-is_a-RuntimeRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行时角色
    en: is a runtime role
    ja: runtime role の一種
  definitions:
    zh: DeveloperRole 是以开发创作和技术责任为种差的 RuntimeRole。
    en: DeveloperRole is a RuntimeRole specialized by development authorship and technical responsibility.
    ja: DeveloperRole は development authorship と technical responsibility を種差とする RuntimeRole です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 是类级种属关系。
    en: is_a is a class-level genus relation.
    ja: is_a は class-level genus relation です。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions:
    - id: DeveloperRole-is_a-RuntimeRole-condition-001
      severity: error
      expression_language: custom
      expression: development_responsibility_is_explicit == true
      explanations:
        zh: 只有职责定义明确承担开发创作与技术责任时，才使用该下位关系。
        en: Use this subtype only when the role definition explicitly bears development authorship and technical responsibility.
        ja: role definition が development authorship と technical responsibility を明示する場合だけこの subtype を用います。
      source_claims:
        - claim-developer-role-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-developer-role-design
  distinct_fact_rationale:
    zh: 该边表达开发职责的类级专门化。
    en: This edge expresses class-level specialization by developer responsibility.
    ja: developer responsibility による class-level specialization を表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
