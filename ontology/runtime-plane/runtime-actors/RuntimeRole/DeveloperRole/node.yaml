    supports: PROV-O requires an association context to state a role; a bare label is not a qualified role assignment.
    locator: §3.2 > Role and qualifiedAssociation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-developer-role-004
    source: eng-ont-prov-o
    supports: The cited official specification supports the role or binding boundary stated by this condition; Moonweave records the explicit assertion test.
    locator: W3C PROV-O Recommendation §3.2 > Role and qualifiedAssociation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-developer-role-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Role from Agent identity.
    locator: §3.2 > Role and qualifiedAssociation
    evidence_kind: design-inference
    confidence: high
