schema: moonweave.ai/ontology-node/v1
id: DeveloperRole
kind: concept
status: accepted
labels:
  zh: 开发者角色
  en: developer role
  ja: developer role
semantics:
  short_definition:
    zh: 对智能体实现与配置变更承担创作和技术责任的运行时角色。
    en: A runtime role bearing authorship and technical responsibility for agent implementation and configuration changes.
    ja: agent implementation/configuration change の authorship と technical responsibility を担う runtime role。
  definition:
    zh: 开发者角色是一种 RuntimeRole，其种差是在明确项目、组件和有效期内对代码、工具契约、提示、配置或本体变更承担创作与技术责任。任何 Actor 都须通过 ActorRoleBinding 才在相应范围内承担它。
    en: DeveloperRole is a RuntimeRole distinguished by authorship and technical responsibility for code, tool contracts, prompts, configuration, or ontology changes within an explicit project, component, and validity period. An Actor bears it only through ActorRoleBinding in that scope.
    ja: DeveloperRole は明示 project・component・validity period 内で code・tool contract・prompt・configuration・ontology change の authorship と technical responsibility を担う RuntimeRole です。Actor は ActorRoleBinding によりその scope でのみ担います。
  why_needed:
    zh: 同一人可在一个项目中开发、在另一个项目中只使用；角色不能固化成人的身份。
    en: The same person may develop one project and only use another, so the responsibility cannot be frozen into personal identity.
    ja: 同一 person が一 project では develop し別 project では use のみの場合があるため、responsibility を personal identity に固定できません。
  includes:
    - zh: 纳入有明确变更对象和责任范围的开发职责。
      en: Includes development responsibility with an identified change object and scope.
      ja: identified change object と scope を持つ development responsibility を含みます。
  excludes:
    - zh: 排除作者字符串、自动代码生成器和没有责任范围的普通使用者。
      en: Excludes author strings, automated code generators, and ordinary users without a responsibility scope.
      ja: author string・automated code generator・responsibility scope のない ordinary user を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeveloperRole-example-positive-manual-001
    kind: positive
    labels:
      zh: 本体维护职责
      en: ontology-maintenance responsibility
      ja: ontology-maintenance responsibility
    scenario_id: null
    descriptions:
      zh: DeveloperRole 规定对 info ontology 变更承担技术责任。
      en: DeveloperRole assigns technical responsibility for changes to the info ontology.
      ja: DeveloperRole が info ontology change の technical responsibility を規定します。
    field_values:
      role_id: role:developer:ontology
    related_node_ids:
      - DeveloperRole
      - RuntimeRole
    related_relation_ids:
      - DeveloperRole-is_a-RuntimeRole
    expected_result:
      zh: 归入 DeveloperRole。
      en: Classify as DeveloperRole.
      ja: DeveloperRole に分類します。
    why_valid_or_invalid:
      zh: 开发职责、负责的变更对象和适用范围均已明确记录。
      en: Responsibility, object, and scope are explicit.
      ja: responsibility・object・scope が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-developer-role-002
  - id: DeveloperRole-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 作者字段边界
      en: author-field boundary
      ja: author-field 境界
    scenario_id: developer-role-boundary
    descriptions:
      zh: 提交元数据只有 author=alice，没有角色范围或责任绑定。
      en: Commit metadata contains only author=alice with no role scope or responsibility binding.
      ja: commit metadata は author=alice のみで role scope や responsibility binding がありません。
    field_values: {}
    related_node_ids:
      - DeveloperRole
      - HumanActor
    related_relation_ids: []
    expected_result:
      zh: 不得据此绑定 DeveloperRole。
      en: Do not bind DeveloperRole from this alone.
      ja: これだけで DeveloperRole を binding しません。
    why_valid_or_invalid:
      zh: 作者字段只能说明署名，不能证明开发职责的范围和有效期。
      en: An author field does not prove a responsibility scope.
      ja: author field は responsibility scope を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-developer-role-003
