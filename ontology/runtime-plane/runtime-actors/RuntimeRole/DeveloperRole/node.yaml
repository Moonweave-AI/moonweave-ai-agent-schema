schema: moonweave.ai/ontology-node/v1
id: DeveloperRole
kind: concept
status: accepted
labels: {zh: 开发者角色, en: Developer role, ja: 開発者ロール}
semantics:
  short_definition: {zh: 在已分配范围内负责实现、修改或验证工程制品的 RuntimeRole。, en: "A RuntimeRole responsible for implementing, modifying, or validating engineering artifacts within an assigned scope.", ja: 割り当てられた範囲でエンジニアリング成果物を実装、変更、または検証する責任を持つ RuntimeRole。}
  definition: {zh: DeveloperRole 是分配给受托创建或修改代码、配置、测试或其他工程制品的参与者的角色定义。它本身不授权每一次写入操作，也不是开发者 Actor、补丁实体或产生补丁的活动。, en: "DeveloperRole is a role definition for a participant entrusted to create or modify code, configuration, tests, or other engineering artifacts. It does not itself authorize every write operation and is not the developer Actor, the patch Entity, or the patch-producing Activity.", ja: DeveloperRole は、コード、設定、テスト、その他のエンジニアリング成果物を作成または変更することを託された参加者のロール定義である。それ自体はすべての書き込み操作を認可せず、開発者 Actor、パッチエンティティ、またはパッチを生成するアクティビティでもない。}
  why_needed: {zh: 工程变更需要明确的责任和批准分离，尤其是当智能体、人员或服务可以提出补丁，但不同角色可能审阅或部署该补丁时。, en: "Engineering changes need clear responsibility and approval separation, especially when an agent, human, or service can propose a patch but a different role may review or deploy it.", ja: エンジニアリング変更には明確な責任と承認の分離が必要である。特に、エージェント、人間、サービスがパッチを提案できても、別のロールがそれをレビューまたはデプロイする場合に重要である。}
  includes:
    - {zh: 实现、重构、编写测试和修改配置的职责。, en: "Implementation, refactoring, test-writing, and configuration-change duties.", ja: 実装、リファクタリング、テスト作成、設定変更の職務。}
    - {zh: 范围化 ActorRoleBinding 所使用的角色语义。, en: Role semantics used by scoped ActorRoleBindings., ja: スコープ付き ActorRoleBinding で使用するロール意味論。}
  excludes:
    - {zh: 审阅者批准、发布操作或细粒度文件系统能力授权。, en: "Reviewer approval, release operation, or granular filesystem capability grants.", ja: レビュー担当者の承認、リリース操作、または細粒度のファイルシステム能力付与。}
    - {zh: 补丁制品或提交元数据中列出的人员。, en: A patch artifact or a person named in commit metadata., ja: パッチ成果物またはコミットメタデータに記載された人物。}
  semantic_kind: role
  aliases: [implementer, engineer]
engineering:
  explanation: {zh: 变更工作流会在允许可变工作区操作前检查有效的 DeveloperRole 绑定，然后将生成的补丁记录为 Artifact，并将实际变更工作记录为 Execution。, en: "A change workflow checks a valid DeveloperRole binding before allowing a mutable workspace operation, then records the resulting patch as an Artifact and the actual change work as an Execution.", ja: 変更ワークフローは、可変ワークスペース操作を許可する前に有効な DeveloperRole バインディングを確認し、結果のパッチを Artifact、実際の変更作業を Execution として記録する。}
  typical_input:
    - description: {zh: 开发者授权检查, en: Developer authorization check, ja: 開発者の認可確認}
      format: |-
        {"actor_id":"agent-dev-4","role_id":"DeveloperRole","scope":"repo:moonweave","action":"patch.write"}
  typical_output:
    - description: {zh: 授权决定, en: Authorization decision, ja: 認可判定}
      format: |-
        {"authorized":true,"binding_id":"rolebind-77","required_capability":"filesystem.write"}
  reference_implementations:
    - {name: PROV-O Role, url: https://www.w3.org/TR/prov-o/, description: Role qualifies contextual actor responsibility.}
structure:
  identity_keys: [role_id]
  fields:
    - id: role_id
      labels: {zh: 角色 ID, en: Role ID, ja: ロール ID}
      definitions: {zh: 开发者职责的稳定标识符。, en: Stable identifier for the developer duty., ja: 開発者職務の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z][A-Za-z0-9]{2,127}$'
      example_value: DeveloperRole
      source_claims: [claim-developer-role]
    - id: duty
      labels:
        zh: "职责"
        en: "Duty"
        ja: "職務"
      definitions:
        zh: "此角色承担的固定工程实现与变更职责。"
        en: "Fixed engineering implementation and change duty carried by this role."
        ja: "このロールが担う固定のエンジニアリング実装および変更職務。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [implement-engineering-change]
      example_value: implement-engineering-change
      source_claims: [claim-developer-role]
    - id: change_scope
      labels: {zh: 变更范围, en: Change scope, ja: 変更スコープ}
      definitions: {zh: 可在其中分配该职责的制品或工作区范围。, en: Artifact or workspace scope within which the duty may be assigned., ja: この職務を割り当てられる成果物またはワークスペースの範囲。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: repo:moonweave
      source_claims: [claim-developer-role]
  constraints:
    - id: developer-role-capability-separation
      severity: error
      language: plain
      expression: A DeveloperRole binding must be evaluated with required granular capability grants before a protected write.
      explanation: {zh: 角色描述职责；它不是无限制的权限令牌。, en: A role describes duty; it is not an unbounded permission token., ja: ロールは職務を記述するものであり、無制限の権限トークンではない。}
      source_claims: [claim-developer-role]
  required_relations: [DeveloperRole-specializes-RuntimeRole]
examples:
  - id: developer-role-positive
    labels: {zh: "Cursor IDE 开发者触发 agent", en: "Cursor IDE developer triggers agent", ja: "Cursor IDE 開発者が agent を起動"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; DeveloperRole maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; DeveloperRole maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; DeveloperRole provenance graph."}
    field_values: {role_id: DeveloperRole, duty: implement-engineering-change, change_scope: repo:moonweave}
    related_node_ids: [DeveloperRole, ActorRoleBinding, PatchArtifact]
    related_relation_ids: []
    source_claims: [claim-developer-role]
  - id: developer-role-counterexample
    labels: {zh: "git commit author 非 DeveloperRole", en: "git commit author not DeveloperRole", ja: "git commit author は DeveloperRole ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style DeveloperRole.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style DeveloperRole.", ja: "Missing parent_run_id rejects LangSmith-style DeveloperRole."}
    field_values: {artifact_id: patch-17}
    related_node_ids: [PatchArtifact]
    related_relation_ids: []
    source_claims: [claim-developer-role]
  - id: developer-role-boundary
    labels: {zh: "DeveloperRole 与 HumanOperatorRole 边界", en: "DeveloperRole versus HumanOperatorRole boundary", ja: "DeveloperRole と HumanOperatorRole 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; DeveloperRole preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; DeveloperRole preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {role_id: DeveloperRole}
    related_node_ids: [DeveloperRole, ReviewerRole]
    related_relation_ids: []
    source_claims: [claim-developer-role]
  - id: developer-role-instance-developer-role
    labels: {zh: "developer-role Cursor 会话", en: "developer-role Cursor session", ja: "developer-role Cursor セッション"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->DeveloperRole.", en: "Langfuse instance: trace+span+score->DeveloperRole.", ja: "Langfuse instance maps to DeveloperRole."}
    field_values: {role_id: DeveloperRole, duty: implement-engineering-change, change_scope: repo:moonweave}
    related_node_ids: [DeveloperRole, ActorRoleBinding, PatchArtifact]
    related_relation_ids: []
    source_claims: [claim-developer-role]
parent_relation:
  id: DeveloperRole-specializes-RuntimeRole
  predicate: is_a
  target: concept:RuntimeRole
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是开发者运行时角色, en: is a developer runtime role, ja: 開発者ランタイムロールである}
  definitions: {zh: 每个 DeveloperRole 都是具有实现与工程变更职责的 RuntimeRole。, en: Every DeveloperRole is a RuntimeRole with implementation and engineering-change duties., ja: すべての DeveloperRole は、実装およびエンジニアリング変更の職務を持つ RuntimeRole である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_developer_role, labels: {zh: 具有开发者角色, en: has developer role, ja: 開発者ロールを持つ}}
  conditions:
    - id: developer-role-parent-condition
      severity: error
      expression: Require a duty centered on producing or modifying engineering artifacts.
      explanations: {zh: 仅评估职责属于 ReviewerRole。, en: Evaluation-only duties belong to ReviewerRole., ja: 評価のみの職務は ReviewerRole に属する。}
      source_claims: [claim-developer-role]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-developer-role]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Role terms support contextual responsibility separate from actor and activity identity.
source_claims:
  - id: claim-developer-role
    source: prov-o-core
    supports: PROV-O Role is a qualified term for contextualizing responsible agents without identifying the role with the agent or activity.
    locator: Section 3.3, Role
    evidence_kind: standard
    confidence: high

