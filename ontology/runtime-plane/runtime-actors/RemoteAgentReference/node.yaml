schema: moonweave.ai/ontology-node/v1
id: RemoteAgentReference
kind: concept
status: accepted
labels:
  zh: 远程智能体引用
  en: Remote agent reference
  ja: リモートエージェント参照
semantics:
  short_definition:
    zh: 指向经验证 A2A 发现记录的 Moonweave 本地远程参与者引用。
    en: A Moonweave local reference to a verified remote A2A discovery record.
    ja: 検証済みリモート A2A 発見記録への Moonweave ローカル参照。
  definition:
    zh: RemoteAgentReference 是 Moonweave 的本地解析记录，用于将经验证的 A2A AgentCard 及其选择的接口关联到本地委派或互操作上下文。它不是远程 AgentActor、AgentCard 本身、MCP server/client、网络 URL、Handoff Activity 或一次网络请求；这些对象通过类型化引用保持独立。
    en: RemoteAgentReference is a Moonweave local resolution record that associates a verified A2A AgentCard and a selected interface with local delegation or interoperability context. It is not the remote AgentActor, the AgentCard itself, an MCP server or client, a network URL, a Handoff Activity, or one network request; those objects remain separate through typed references.
    ja: RemoteAgentReference は、検証済み A2A AgentCard と選択されたインターフェースをローカルの委任または相互運用文脈に関連付ける Moonweave ローカル解決記録である。リモート AgentActor、AgentCard 自体、MCP server/client、ネットワーク URL、Handoff Activity、単一ネットワーク要求ではなく、それらは型付き参照で独立して保持される。
  why_needed:
    zh: 发现文档、选择的接口、信任验证和本地责任映射具有不同生命周期，必须可分别审计。
    en: Discovery documents, selected interfaces, trust verification, and local responsibility mapping have different lifecycles and must be auditable separately.
    ja: 発見文書、選択インターフェース、信頼検証、ローカル責任マッピングは寿命が異なり、個別に監査可能でなければならない。
  includes:
    - zh: 对已验证 A2A AgentCard、选定接口和本地解析状态的类型化引用。
      en: Typed references to a verified A2A AgentCard, selected interface, and local resolution state.
      ja: 検証済み A2A AgentCard、選択インターフェース、ローカル解決状態への型付き参照。
  excludes:
    - zh: 原始 URL、AgentCard 字段副本、MCP 连接端点、远程执行或本地 Actor 身份。
      en: A raw URL, copied AgentCard fields, an MCP connection endpoint, a remote execution, or a local Actor identity.
      ja: 生 URL、複製された AgentCard フィールド、MCP 接続エンドポイント、リモート実行、ローカル Actor 識別子。
  semantic_kind: entity
  aliases: [remote discovery reference, resolved remote agent reference]
engineering:
  explanation:
    zh: 输入是本地 reference_id、agent_card_ref、selected_interface_ref 和 verification_ref。输出是本地解析状态；不把 AgentCard 的 name、skills、interfaces 或端点 URL 复制为本地 actor_id。
    en: Input is local reference_id, agent_card_ref, selected_interface_ref, and verification_ref. Output is local resolution state; it does not copy AgentCard name, skills, interfaces, or endpoint URL into a local actor_id.
    ja: 入力はローカル reference_id、agent_card_ref、selected_interface_ref、verification_ref である。出力はローカル解決状態であり、AgentCard の name、skills、interfaces、エンドポイント URL をローカル actor_id へ複製しない。
  typical_input:
    - description:
        zh: 已验证的远程发现解析请求。
        en: Verified remote discovery-resolution request.
        ja: 検証済みリモート発見解決要求。
      format: |-
        {"reference_id":"remote-ref-7","agent_card_ref":"card:partner-reviewer","selected_interface_ref":"interface:https-jsonrpc","verification_ref":"verify:partner-v3"}
  typical_output:
    - description:
        zh: 本地远程引用解析记录。
        en: Local remote-reference resolution record.
        ja: ローカルリモート参照解決記録。
      format: |-
        {"reference_id":"remote-ref-7","resolution_state":"verified","local_actor_ref":"actor:partner-review"}
  reference_implementations:
    - name: A2A Agent Discovery
      url: https://a2a-protocol.org/latest/topics/agent-discovery/
      description: Defines server-published AgentCard discovery and advertised interfaces.
    - name: Model Context Protocol Architecture
      url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
      description: Defines MCP host-client-server transport roles separately from remote-agent discovery.
structure:
  identity_keys: [reference_id]
  fields:
    - id: reference_id
      labels:
        zh: 远程引用 ID
        en: Remote reference ID
        ja: リモート参照 ID
      definitions:
        zh: Moonweave 对本地远程发现解析记录分配的稳定标识。
        en: Stable Moonweave identifier assigned to the local remote-discovery resolution record.
        ja: ローカルリモート発見解決記録に Moonweave が割り当てる安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: remote-ref-7
      source_claims: [claim-remote-reference-boundary]
    - id: agent_card_ref
      labels:
        zh: A2A 发现卡引用
        en: A2A discovery-card reference
        ja: A2A 発見カード参照
      definitions:
        zh: 指向独立 A2A AgentCard 实体的类型化引用，而不是复制卡字段。
        en: Typed reference to a separately modeled A2A AgentCard rather than a copy of its fields.
        ja: そのフィールドの複製ではなく、別途モデル化された A2A AgentCard への型付き参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: card:partner-reviewer
      source_claims: [claim-remote-reference-a2a]
    - id: verification_ref
      labels:
        zh: 验证引用
        en: Verification reference
        ja: 検証参照
      definitions:
        zh: 指向本地信任或验证证据的引用，不包含凭证材料。
        en: Reference to local trust or verification evidence and never credential material.
        ja: ローカル信頼または検証証拠への参照であり、資格情報を含まない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: verify:partner-v3
      source_claims: [claim-remote-reference-boundary]
  constraints:
    - id: remote-reference-card-and-verification-required
      severity: error
      language: plain
      expression: A RemoteAgentReference must reference an A2AAgentCard and verification evidence before it resolves to a local Actor; raw endpoints, MCP session IDs, and copied card fields are invalid substitutes.
      explanation:
        zh: A2A 发现、信任验证与本地责任映射是分开的步骤。
        en: A2A discovery, trust verification, and local responsibility mapping are separate steps.
        ja: A2A 発見、信頼検証、ローカル責任マッピングは別個の段階である。
      source_claims: [claim-remote-reference-a2a, claim-remote-reference-boundary]
  required_relations: [RemoteAgentReference-references-A2AAgentCard, RemoteAgentReference-may-resolve-Actor]
examples:
  - id: remote-agent-reference-positive
    labels: {zh: "A2A AgentCard URL 引用", en: "A2A AgentCard URL reference", ja: "A2A AgentCard URL 参照"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RemoteAgentReference maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RemoteAgentReference maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RemoteAgentReference provenance graph."}
    field_values: {reference_id: remote-ref-7, agent_card_ref: 'card:partner-reviewer', verification_ref: 'verify:partner-v3'}
    related_node_ids: [RemoteAgentReference, A2AAgentCard, Actor]
    related_relation_ids: [RemoteAgentReference-references-A2AAgentCard, RemoteAgentReference-may-resolve-Actor]
    source_claims: [claim-remote-reference-a2a]
  - id: remote-agent-reference-counterexample
    labels: {zh: "assistant_id 当 RemoteReference", en: "assistant_id as RemoteReference", ja: "assistant_id を RemoteReference とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style RemoteAgentReference.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style RemoteAgentReference.", ja: "Missing parent_run_id rejects LangSmith-style RemoteAgentReference."}
    field_values: {reference_id: 'https://partner.example/a2a'}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-remote-reference-boundary]
  - id: remote-agent-reference-boundary
    labels: {zh: "RemoteReference 与 ExternalServiceActor 边界", en: "RemoteReference versus ExternalServiceActor boundary", ja: "RemoteReference と ExternalServiceActor 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RemoteAgentReference preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RemoteAgentReference preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {mcp_session_id: mcp-session-42}
    related_node_ids: [MCPSession]
    related_relation_ids: []
    source_claims: [claim-remote-reference-boundary]
  - id: remote-agent-reference-instance
    labels: {zh: "review.example.com card 实例", en: "review.example.com card instance", ja: "review.example.com card 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->RemoteAgentReference.", en: "Langfuse instance: trace+span+score->RemoteAgentReference.", ja: "Langfuse instance maps to RemoteAgentReference."}
    field_values: {reference_id: remote-ref-7, agent_card_ref: 'card:partner-reviewer', verification_ref: 'verify:partner-v3'}
    related_node_ids: [RemoteAgentReference, A2AAgentCard, Actor]
    related_relation_ids: [RemoteAgentReference-references-A2AAgentCard, RemoteAgentReference-may-resolve-Actor]
    source_claims: [claim-remote-reference-a2a]
parent_relation: null
relations:
  - id: RemoteAgentReference-references-A2AAgentCard
    predicate: references_discovery_card
    target: concept:A2AAgentCard
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 引用 A2A 发现卡
      en: references A2A discovery card
      ja: A2A 発見カードを参照する
    definitions:
      zh: 本地引用记录指向独立的 A2A AgentCard。
      en: The local reference record points to a separately modeled A2A AgentCard.
      ja: ローカル参照記録は別途モデル化された A2A AgentCard を指す。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    source_claims: [claim-remote-reference-a2a]
  - id: RemoteAgentReference-may-resolve-Actor
    predicate: may_resolve_to
    target: concept:Actor
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 可解析到本地参与者
      en: may resolve to local actor
      ja: ローカルアクターへ解決できる
    definitions:
      zh: 验证后的远程引用可关联一个单独记录的本地 Actor；这不是远程主体和本地身份的同一性声明。
      en: A verified remote reference may associate with a separately recorded local Actor; this is not an identity claim between remote subject and local identity.
      ja: 検証済みリモート参照は別記録のローカル Actor と関連付けられるが、リモート主体とローカル識別子の同一性主張ではない。
    cardinality: {source: {min: 0, max: 1}, target: {min: 0, max: null}}
    source_claims: [claim-remote-reference-boundary]
sources:
  - id: a2a-agent-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines server-published AgentCard discovery and advertised interfaces.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server transport roles and stateful sessions.
source_claims:
  - id: claim-remote-reference-a2a
    source: a2a-agent-discovery
    supports: A2A AgentCard is a server-published discovery document that advertises identity, capabilities, skills, interfaces, and authentication.
    locator: Agent Discovery overview
    evidence_kind: official-spec
    confidence: high
  - id: claim-remote-reference-boundary
    source: mcp-architecture
    supports: MCP host-client-server components and sessions are transport architecture; a Moonweave RemoteAgentReference is a separate local resolution projection.
    locator: Core components and sessions
    evidence_kind: design-inference
    confidence: high

