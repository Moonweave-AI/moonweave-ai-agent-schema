source_claims:
  - id: claim-remote-agent-reference-001
    source: eng-proto-a2a-spec
    supports: A2A AgentCard supplies agent identity, interfaces, skills, capabilities, and security requirements for discovery. Moonweave stores a verified local representation as RemoteAgentReference.
    locator: A2A Protocol Specification v1.0 §4.4 AgentCard and §8 Agent discovery
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-002
    source: eng-proto-a2a-spec
    supports: A2A permits Agent Cards to be discovered through several mechanisms. Moonweave introduces reference_id so the local verified representation remains independently addressable across refreshes.
    locator: A2A Protocol Specification §8.2 > Agent Card discovery through well-known URI, registry, or direct configuration
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-remote-agent-reference-003
    source: eng-proto-a2a-spec
    supports: A2A AgentCard publishes agent identity metadata and requires server identity verification. remote_agent_id is Moonweave's canonical trust identity, not an asserted AgentCard field.
    locator: A2A Protocol Specification §4.4.1 > AgentCard identity metadata and §7 server identity verification
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-remote-agent-reference-004
    source: eng-proto-a2a-spec
    supports: A2A normatively requires AgentCard.version. Moonweave preserves that value as agent_version on the local reference.
    locator: A2A Protocol Specification §4.4.1 AgentCard > required version field
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-005
    source: eng-proto-a2a-spec
    supports: A2A specifies canonicalization and signature verification for Agent Cards. Moonweave records a digest of the verified canonical payload to identify the exact represented card.
    locator: A2A Protocol Specification §8.4 > JCS canonicalization, JWS signing, and signature verification
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-006
    source: eng-proto-a2a-spec
    supports: A2A requires AgentCard.supportedInterfaces and defines each interface by transport, URL, and protocol version. Moonweave preserves the verified ordered declaration.
    locator: A2A Protocol Specification §4.4.1 AgentCard and §8.3.1 > required ordered supportedInterfaces
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-007
    source: eng-proto-a2a-spec
    supports: A2A defines optional operation-enabling capabilities and requires unsupported operations to be rejected. Moonweave preserves the declaration used for client selection.
    locator: A2A Protocol Specification §4.4.3 AgentCapabilities and §3.3.4 capability validation
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-008
    source: eng-proto-a2a-spec
    supports: A2A defines optional security schemes and requirements for contacting an agent. Moonweave copies only the requirement metadata and excludes credentials.
    locator: A2A Protocol Specification §4.4.1 AgentCard > securitySchemes and securityRequirements; §7 authentication
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-009
    source: eng-proto-a2a-spec
    supports: A2A requires clients to verify signatures before trust and governs card caching. verified_at is Moonweave's evidence timestamp for that local verification event.
    locator: A2A Protocol Specification §8.4.3 signature verification and §8.6 Agent Card caching
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-010
    source: eng-proto-a2a-spec
    supports: A2A requires accurate supported-interface declarations and specifies canonical signature verification. Moonweave validates the local reference as one coherent verified card snapshot.
    locator: A2A Protocol Specification §8.3 protocol declaration, §8.4 signing, and §8.6 caching
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-011
    source: eng-proto-a2a-spec
    supports: The Agent Card describes one discoverable agent and its interfaces. Moonweave preserves that reference-to-subject separation through one reviewed refers_to relation.
    locator: A2A Protocol Specification §4.4 AgentCard and §8 Agent Discovery
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-012
    source: eng-proto-a2a-spec
    supports: The A2A specification requires AgentCard interface, capability, and authentication metadata and recommends HTTPS and signature verification. Moonweave combines verified card metadata with a local boundary assessment and models the result as information on RemoteAgentReference.
    locator: A2A Protocol Specification v1.0 §4.4 AgentCard and §8 Agent discovery
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-remote-agent-reference-013
    source: eng-proto-a2a-spec
    supports: The A2A specification defines AgentCard as discovery metadata for agent identity, interfaces, skills, capabilities, and security requirements and supports signature verification. Moonweave resolves a verified local card record to AgentActor without identifying the card as the actor.
    locator: A2A Protocol Specification v1.0 §4.4 AgentCard and §8 Agent discovery
    evidence_kind: design-inference
    confidence: high
    review_status: pending
