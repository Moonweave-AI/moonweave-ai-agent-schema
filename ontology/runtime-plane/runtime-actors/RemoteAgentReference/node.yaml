schema: moonweave.ai/ontology-node/v1
id: RemoteAgentReference
kind: concept
status: review
labels:
  en: remote agent reference
  zh: 远程智能体引用
  ja: 遠隔エージェント参照
semantics:
  short_definition:
    zh: 远程智能体引用是描述可跨网络访问的智能体身份、接口、能力与信任条件的信息记录。
    en: A RemoteAgentReference is an information record describing the identity, interfaces, capabilities, and trust conditions of a network-reachable agent.
    ja: RemoteAgentReference はネットワーク到達可能なエージェントの識別子、interface、能力、信頼条件を記述する情報記録である。
  definition:
    zh: 远程智能体引用是一类发现与解析信息；其种差是它以稳定远程身份关联协议版本、一个或多个服务接口、能力或技能声明、认证要求、签名或缓存状态，并可指向实际 AgentActor。它不是远程服务执行体、活动连接、委派过程或未经验证的 URL 字符串。
    en: A RemoteAgentReference is discovery and resolution information distinguished by linking a stable remote identity to protocol version, one or more service interfaces, capability or skill declarations, authentication requirements, signature or cache status, and optionally the actual AgentActor. It is not the remote running service, an active connection, a delegation process, or an unverified URL string.
    ja: RemoteAgentReference は発見・解決情報であり、安定した遠隔識別子を protocol 版、一つ以上の service interface、能力・skill 宣言、認証要件、署名・cache 状態へ結び、実 AgentActor を指し得る。遠隔稼働サービス、活動接続、委任過程、未検証 URL 文字列ではない。
  why_needed:
    zh: 该记录支持远程发现、能力预检、协议协商与信任验证，同时让描述信息与真正参与运行的外部服务保持分离。
    en: This record supports remote discovery, capability preflight, protocol negotiation, and trust validation while keeping descriptive information separate from the external service that actually participates.
    ja: この記録は遠隔発見、能力事前確認、protocol 交渉、信頼検証を支え、記述情報を実際に参加する外部サービスから分離する。
  includes:
    - zh: 纳入经过来源验证的 Agent Card 或等价解析记录，包含远程身份、服务接口、协议版本、能力、认证与信任元数据。
      en: Includes a source-verified Agent Card or equivalent resolution record containing remote identity, service interfaces, protocol version, capabilities, authentication, and trust metadata.
      ja: 出典検証済み Agent Card または等価解決記録で、遠隔識別子、service interface、protocol 版、能力、認証、信頼メタデータを含むもの。
  excludes:
    - zh: 不纳入 ExternalServiceActor 本身、活动网络会话、裸 URL、工具注册项、DelegationContract 或只显示远程名称的日志。
      en: Excludes the ExternalServiceActor itself, an active network session, a bare URL, a tool registry entry, a DelegationContract, and a log containing only a remote name.
      ja: ExternalServiceActor 自体、活動ネットワークセッション、裸 URL、ツール登録項目、DelegationContract、遠隔名だけのログは含まない。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 远程引用标识
        en: remote reference ID
        ja: リモート参照 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条在本地保存且可再次验证的远程智能体引用。
        en: Stably identifies one locally retained and re-verifiable remote-agent reference.
        ja: ローカルに保持され、再検証できる一つのリモートエージェント参照を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: ra-12
      source_claims:
        - claim-remote-agent-reference-002
    - id: remote_agent_id
      labels:
        zh: 远程智能体标识
        en: remote agent ID
        ja: リモートエージェント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本地信任配置用来解析远程 AgentActor 的稳定主体标识。
        en: Records the stable subject identifier used by local trust configuration to resolve the remote AgentActor.
        ja: ローカルの信頼設定がリモート AgentActor を解決するために用いる安定した主体識別子を記録します。
      allowed_values: []
      pattern: null
      example_value: remote-agent-7
      source_claims:
        - claim-remote-agent-reference-003
    - id: agent_version
      labels:
        zh: 远程智能体版本
        en: remote agent version
        ja: リモートエージェント版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录已验证 Agent Card 声明的远程智能体版本。
        en: Records the remote-agent version declared by the verified Agent Card.
        ja: 検証済み Agent Card が宣言するリモートエージェント版を記録します。
      allowed_values: []
      pattern: null
      example_value: 1.0.0
      source_claims:
        - claim-remote-agent-reference-004
    - id: agent_card_digest
      labels:
        zh: Agent Card 摘要
        en: Agent Card digest
        ja: Agent Card digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存完成规范化与签名验证后的 Agent Card 内容密码学摘要。
        en: Stores the cryptographic digest of Agent Card content after canonicalization and signature verification.
        ja: 正規化と署名検証を終えた Agent Card 内容の暗号学的ダイジェストを保持します。
      allowed_values: []
      pattern: null
      example_value: sha256:8c479f4b1b7d1f12
      source_claims:
        - claim-remote-agent-reference-005
    - id: supported_interfaces
      labels:
        zh: 支持的接口
        en: supported interfaces
        ja: 対応インターフェース
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按偏好顺序保存端点 URL、协议绑定与协议版本。
        en: Stores endpoint URL, protocol binding, and protocol version in preference order.
        ja: エンドポイント URL、プロトコル束縛、プロトコル版を優先順に保持します。
      allowed_values: []
      pattern: null
      example_value:
        - url: https://remote.example/a2a
          protocol_binding: HTTP+JSON
          protocol_version: "1.0"
      source_claims:
        - claim-remote-agent-reference-006
    - id: capabilities
      labels:
        zh: 远程能力声明
        en: remote capabilities
        ja: リモート能力宣言
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存 Agent Card 对流式传输、推送通知、扩展卡片与协议扩展的能力声明。
        en: Stores the Agent Card's streaming, push-notification, extended-card, and extension capability declarations.
        ja: Agent Card のストリーミング、プッシュ通知、拡張カード、プロトコル拡張に関する能力宣言を保持します。
      allowed_values: []
      pattern: null
      example_value:
        streaming: true
        push_notifications: false
      source_claims:
        - claim-remote-agent-reference-007
    - id: security_requirements
      labels:
        zh: 安全要求
        en: security requirements
        ja: security requirement
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存联系远程智能体所需的认证方案与权限范围，但不保存凭证。
        en: Stores authentication schemes and scopes required to contact the remote agent without storing credentials.
        ja: リモートエージェントへの接続に必要な認証方式とスコープを、資格情報を含めずに保持します。
      allowed_values: []
      pattern: null
      example_value:
        oauth2:
          - a2a.invoke
      source_claims:
        - claim-remote-agent-reference-008
    - id: verified_at
      labels:
        zh: 验证时间
        en: verified at
        ja: 検証時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本地最近一次完成端点、签名与信任条件验证的时间。
        en: Records when local verification of endpoint, signature, and trust conditions last completed.
        ja: エンドポイント、署名、信頼条件のローカル検証が最後に完了した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:30:00Z
      source_claims:
        - claim-remote-agent-reference-009
  constraints:
    - id: remote-agent-reference-verification-coherence
      severity: error
      expression_language: plain
      expression: supported_interfaces must contain at least one verified interface, and agent_card_digest must identify the canonical Agent Card whose version, capabilities, and security requirements are recorded
      explanations:
        zh: 至少一个接口必须通过验证，且摘要必须标识提供当前版本、能力与安全要求的同一规范化卡片。
        en: At least one interface is verified, and the digest identifies the same canonical card supplying version, capabilities, and security requirements.
        ja: 少なくとも一つのインターフェースが検証済みで、ダイジェストは版・能力・安全要件を提供した同一の正規化カードを識別します。
      source_claims:
        - claim-remote-agent-reference-010
  required_relation_constraints:
    - id: remote-agent-reference-resolves-agent
      direction: outgoing
      predicate: refers_to
      target_concept_id: AgentActor
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条已接受的远程引用必须恰好解析到一个本地 AgentActor 身份节点。
        en: Every accepted remote reference resolves to exactly one local AgentActor identity node.
        ja: 各 accepted リモート参照は、ちょうど一つのローカル AgentActor 識別ノードへ解決されます。
      source_claims:
        - claim-remote-agent-reference-011
examples:
  - id: RemoteAgentReference-example-positive-001
    kind: positive
    labels:
      zh: 远程智能体引用正例
      en: Positive example of remote agent reference
      ja: 遠隔エージェント参照の正例
    scenario_id: null
    descriptions:
      zh: reference ra-12 保存已签名 Agent Card 的摘要、remote-agent-7 身份、A2A 1.0 接口、streaming 能力、OAuth 要求和最后验证时间。
      en: Reference ra-12 stores the signed Agent Card digest, remote-agent-7 identity, A2A 1.0 interface, streaming capability, OAuth requirement, and last verification time.
      ja: reference ra-12 は署名 Agent Card digest、remote-agent-7 識別子、A2A 1.0 interface、streaming 能力、OAuth 要件、最終検証時刻を保存する。
    field_values:
      reference_id: ra-12
      remote_agent_id: remote-agent-7
      agent_version: 1.0.0
      agent_card_digest: sha256:8c479f4b1b7d1f12
      supported_interfaces:
        - url: https://remote.example/a2a
          protocol_binding: HTTP+JSON
          protocol_version: "1.0"
      capabilities:
        streaming: true
        push_notifications: false
      security_requirements:
        oauth2:
          - a2a.invoke
      verified_at: 2026-07-16T08:30:00Z
    related_node_ids:
      - RemoteAgentReference
      - TrustBoundary
    related_relation_ids:
      - remote_agent_crosses_trust_boundary
    expected_result:
      zh: ra-12 归类为 RemoteAgentReference，并可在实际交互时指向对应外部 AgentActor。
      en: ra-12 is a RemoteAgentReference and may point to the corresponding external AgentActor during actual interaction.
      ja: ra-12 は RemoteAgentReference に分類され、実対話時に対応外部 AgentActor を指し得る。
    why_valid_or_invalid:
      zh: 该记录完整承载发现、接口、能力和信任信息，但没有冒充远程运行服务。
      en: The record carries discovery, interface, capability, and trust information without pretending to be the remote running service.
      ja: 発見、interface、能力、信頼情報を完全に持つが、遠隔稼働サービス自体ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-remote-agent-reference-001
  - id: RemoteAgentReference-example-boundary-001
    kind: boundary
    labels:
      zh: 远程智能体引用边界例
      en: Boundary case for remote agent reference
      ja: 遠隔エージェント参照の境界例
    scenario_id: null
    descriptions:
      zh: 配置只含字符串 https://agent.example，没有 Agent Card、协议版本、能力、认证信息或来源验证。
      en: Configuration contains only the string https://agent.example, with no Agent Card, protocol version, capabilities, authentication information, or source verification.
      ja: 設定には文字列 https://agent.example だけがあり、Agent Card、protocol 版、能力、認証情報、出典検証がない。
    field_values: {}
    related_node_ids:
      - RemoteAgentReference
      - TrustBoundary
    related_relation_ids:
      - remote_agent_crosses_trust_boundary
    expected_result:
      zh: 该字符串是未验证网络地址，不足以归为 RemoteAgentReference。
      en: The string is an unverified network address and is insufficient for RemoteAgentReference.
      ja: この文字列は未検証ネットワークアドレスで RemoteAgentReference には不十分である。
    why_valid_or_invalid:
      zh: 远程引用必须解析稳定身份、交互接口和信任条件；URL 只提供潜在位置。
      en: A remote reference must resolve stable identity, interaction interface, and trust conditions; a URL supplies only a possible location.
      ja: 遠隔参照は安定識別子、対話 interface、信頼条件を解決する必要があり、URL は候補位置だけを示す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-remote-agent-reference-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: remote_agent_crosses_trust_boundary
    predicate: remote_agent_crosses_trust_boundary
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录远程智能体所在信任边界
      en: records remote-agent trust boundary
      ja: 遠隔エージェントの信頼境界を記録する
    definitions:
      zh: remote_agent_crosses_trust_boundary 表示 RemoteAgentReference 记录的服务接口、运营方与认证条件使其所指 AgentActor 位于某个明确 TrustBoundary 的另一侧；跨越者是所指远程主体与通信，引用记录本身只是描述该边界事实。
      en: remote_agent_crosses_trust_boundary states that service interfaces, operator, and authentication conditions in a RemoteAgentReference place its referred AgentActor across a named TrustBoundary; the referred actor and communication cross the boundary, while the reference merely records that fact.
      ja: remote_agent_crosses_trust_boundary は RemoteAgentReference の service interface・operator・認証条件により参照 AgentActor が明示 TrustBoundary の向こうにあることを表す。cross するのは遠隔主体と通信で reference 自体はその事実を記述する。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_recorded_for_remote_agent_reference
      labels:
        zh: 由远程智能体引用记录
        en: is recorded by remote-agent reference
        ja: 遠隔エージェント参照に記録される
    conditions:
      - id: remote_agent_crosses_trust_boundary-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the reference resolves to a stable remote Actor, both interface-operator boundary and local TrustBoundary are evidenced, and authentication or transport conditions are recorded.
        explanations:
          zh: 仅当引用已解析到稳定远程主体，接口运营边界与本地 TrustBoundary 均有证据，并记录认证或传输条件时成立。
          en: Assert only when the reference resolves to a stable remote Actor, both interface-operator boundary and local TrustBoundary are evidenced, and authentication or transport conditions are recorded.
          ja: reference が安定 remote Actor に解決され interface operator 境界と local TrustBoundary の証拠があり認証または transport 条件を記録する時だけ成立する。
        source_claims:
          - claim-remote-agent-reference-012
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: RemoteAgentReference 由 runtime-actors 拥有，TrustBoundary 由 safety-trust-boundary 拥有；该信息边不转移定义权。
        en: RemoteAgentReference remains owned by runtime-actors and TrustBoundary by safety-trust-boundary; this information edge transfers no definitional ownership.
        ja: RemoteAgentReference は runtime-actors、TrustBoundary は safety-trust-boundary が所有し情報辺は定義所有権を移さない。
      protocol_or_resource_context:
        zh: 查询必须联合已验证 AgentCard、接口运营方、认证条件和本地边界评估。
        en: Queries must join a verified AgentCard, interface operator, authentication conditions, and local boundary assessment.
        ja: 照会は verified AgentCard・interface operator・authentication 条件・local boundary 評価を結合する。
    constraints: []
    examples:
      - id: remote_agent_crosses_trust_boundary-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 记录远程智能体所在信任边界正例
          en: "Positive case: records remote-agent trust boundary"
          ja: 遠隔エージェントの信頼境界を記録するの正例
        scenario_id: null
        descriptions:
          zh: ra-12 的签名 AgentCard 指向 vendor-agent-7，接口由供应商域运营且要求 OAuth；本地评估将该域置于 tb-external 之外。
          en: ra-12's signed AgentCard identifies vendor-agent-7, whose interface is operated in the vendor domain and requires OAuth; local assessment places that domain beyond tb-external.
          ja: ra-12 の signed AgentCard は vendor-agent-7 を示し interface は vendor domain 運営で OAuth 必須、local 評価は当該 domain を tb-external の外側に置く。
        field_values: {}
        related_node_ids:
          - RemoteAgentReference
          - TrustBoundary
        related_relation_ids:
          - remote_agent_crosses_trust_boundary
        expected_result:
          zh: 建立 ra-12 remote_agent_crosses_trust_boundary tb-external，并注明这是引用记录的边界描述。
          en: Assert ra-12 remote_agent_crosses_trust_boundary tb-external and mark it as boundary information recorded by the reference.
          ja: ra-12 remote_agent_crosses_trust_boundary tb-external を reference の境界情報として確立する。
        why_valid_or_invalid:
          zh: 远程身份、运营方、接口、认证与本地边界评估相互一致。
          en: Remote identity, operator, interface, authentication, and local boundary assessment agree.
          ja: remote identity・operator・interface・authentication・local boundary 評価が一致する。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-remote-agent-reference-012
      - id: remote_agent_crosses_trust_boundary-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 记录远程智能体所在信任边界边界例
          en: "Boundary case: records remote-agent trust boundary"
          ja: 遠隔エージェントの信頼境界を記録するの境界例
        scenario_id: null
        descriptions:
          zh: ra-local 指向同一 AgentSystem 内部的 agent-2，接口仅为进程内 handoff，未越过网络或治理边界。
          en: ra-local points to agent-2 inside the same AgentSystem and exposes only an in-process handoff, crossing no network or governance boundary.
          ja: ra-local は同一 AgentSystem 内 agent-2 を指し in-process handoff だけで network/統治境界を越えない。
        field_values: {}
        related_node_ids:
          - RemoteAgentReference
          - TrustBoundary
        related_relation_ids:
          - remote_agent_crosses_trust_boundary
        expected_result:
          zh: 不建立 ra-local 到 tb-external 的边界事实。
          en: Do not assert a boundary fact from ra-local to tb-external.
          ja: ra-local から tb-external への境界事実を確立しない。
        why_valid_or_invalid:
          zh: 远程样式名称或引用类型不自动证明实际信任边界跨越。
          en: A remote-looking name or reference type does not by itself prove a trust-boundary crossing.
          ja: remote 風名称や reference 型だけでは信頼境界 crossing を証明しない。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-remote-agent-reference-012
    source_claims:
      - claim-remote-agent-reference-012
    distinct_fact_rationale:
      zh: 该边描述引用所指通信的信任边界，不把 RemoteAgentReference 本身误当作执行动作的 Actor。
      en: This edge describes the trust boundary of the referred communication and does not mistake RemoteAgentReference for an acting Actor.
      ja: 参照先通信の信頼境界を記述し RemoteAgentReference 自体を行為 Actor と誤らない。
    layout_role: cross-link
    review_status: pending
    target: concept:TrustBoundary
  - id: RemoteAgentReference-refers_to-AgentActor
    predicate: refers_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 指向远程智能体参与者
      en: refers to remote agent actor
      ja: 遠隔 AgentActor を参照する
    definitions:
      zh: RemoteAgentReference-refers_to-AgentActor 表示一条经来源、摘要或签名验证的 RemoteAgentReference 把 AgentCard 中的稳定远程身份解析为目标 AgentActor；该边不把 URL、AgentCard、活动连接或 A2A Task 与远程主体合并。
      en: RemoteAgentReference-refers_to-AgentActor states that a RemoteAgentReference verified by source, digest, or signature resolves the stable remote identity in an AgentCard to the target AgentActor; it does not merge a URL, AgentCard, active connection, or A2A Task with the remote actor.
      ja: RemoteAgentReference-refers_to-AgentActor は source・digest・signature で検証した RemoteAgentReference が AgentCard の安定 remote identity を対象 AgentActor に解決することを表す。URL、AgentCard、active connection、A2A Task を remote actor と統合しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_described_by_remote_agent_reference
      labels:
