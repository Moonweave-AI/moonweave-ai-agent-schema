      en: CrewAI Senior Data Researcher role binding
      ja: CrewAI Senior Data Researcher ロールバインディング
    descriptions:
      zh: CrewAI Agent(role=) 绑定 Task task-61 产生 ActorRoleBinding binding_id=role-researcher-task61、role=Senior Data Researcher、task_id=task-61。
      en: CrewAI Agent(role=) bound to Task task-61 produces ActorRoleBinding binding_id=role-researcher-task61, role=Senior Data Researcher, task_id=task-61.
      ja: CrewAI role が Task に ActorRoleBinding される。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      binding_id: role-binding-12
      actor_ref: h-411
      binding_kind: role
      bound_object_ref: independent-reviewer
      scope_ref: review-203
      validity:
        starts_at: 2026-07-16T08:00:00Z
        ends_when: release-decision-203-completed
      provenance_ref: review-assignment-203
      conditions:
        self_review: forbidden
    related_node_ids:
      - ActorRoleBinding
      - AgentActor
      - Actor
    related_relation_ids:
      - has_actor_role_binding
    source_claims:
