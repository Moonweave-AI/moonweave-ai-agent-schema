schema: moonweave.ai/ontology-node/v1
id: ActorRoleBinding
kind: concept
labels:
  en: actor role binding
  zh: 参与者角色绑定
  ja: アクター役割バインディング
semantics:
  short_definition:
    zh: 参与者角色绑定是在特定范围与时段把运行参与主体关联到职责角色的主体绑定记录。
    en: An ActorRoleBinding is an ActorBinding that assigns a responsibility role to an Actor for a specified scope and interval.
    ja: ActorRoleBinding は指定範囲と期間で責任役割を Actor へ割り当てる ActorBinding である。
  definition:
    zh: 参与者角色绑定是 ActorBinding 的一种；其种差是把一个 Actor 与一项 RuntimeRole 连接，并记录角色范围、有效期、授予者、利益冲突或撤销条件。它说明某个主体何时承担 DeveloperRole、ReviewerRole 或 HumanOperatorRole；角色定义、主体身份和能力绑定都不是该记录。
    en: An ActorRoleBinding is an ActorBinding distinguished by connecting an Actor to a RuntimeRole and recording scope, validity, grantor, conflict, or revocation conditions. It states when an Actor bears DeveloperRole, ReviewerRole, or HumanOperatorRole; the role definition, Actor identity, and capability binding are not this record.
    ja: ActorRoleBinding は ActorBinding の一種で、Actor を RuntimeRole に結び scope・validity・grantor・conflict・revocation condition を記録します。Actor が DeveloperRole・ReviewerRole・HumanOperatorRole をいつ担うかを示し、role definition・Actor identity・capability binding 自体ではありません。
  why_needed:
    zh: 该记录允许角色随任务、会话与时间变化，并支持兼任与利益冲突检查，而不把上下文角色永久写进主体身份。
    en: This record allows roles to vary by task, session, and time and supports concurrent-role and conflict checks without permanently encoding contextual roles into Actor identity.
    ja: この記録はタスク、セッション、時間ごとの役割変化、兼任、利益相反確認を可能にし、文脈役割を Actor 識別へ恒久化しない。
  includes:
    - zh: 纳入把具体 actor_id 与命名职责角色关联，并记录任务或会话范围、有效期和角色约束的绑定。
      en: Includes a binding from a concrete actor_id to a named responsibility role with task or session scope, validity, and role constraints.
      ja: 具体的 actor_id を責任役割へ結び、タスク・セッション範囲、有効性、役割制約を記録する束縛を含む。
  excludes:
    - zh: 不纳入角色定义本身、ActorCapabilityBinding、组织职位目录、无主体的 ACL 条目或仅由类名推断的永久角色。
      en: Excludes the role definition itself, ActorCapabilityBinding, an organization job catalog, an ACL entry with no Actor, and a permanent role inferred only from a class name.
      ja: 役割定義自体、ActorCapabilityBinding、組織職務目録、主体のない ACL 項目、クラス名だけから推論する恒久役割は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 ActorRoleBinding 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ActorRoleBinding, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ActorRoleBinding 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ActorRoleBinding.
      format: |-
        # Example ActorRoleBinding ingest
        { "actor-role-binding_ref": "example-1" }
      source_claims:
        - claim-actor-role-binding-design
  typical_output:
    - description: Moonweave-local ActorRoleBinding projection.
      format: '{ "schema_owner": "moonweave-local-design", "actor-role-binding_id": "example-1" }'
      source_claims:
        - claim-actor-role-binding-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
