  id: ActorRoleBinding-specializes-ActorBinding
  predicate: is_a
  target: concept:ActorBinding
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: "is a role-specific actor binding"
    en: "is a role-specific actor binding"
    ja: "is a role-specific actor binding"
  definitions:
    zh: "Every ActorRoleBinding is an ActorBinding that records a scoped RuntimeRole assignment."
    en: "Every ActorRoleBinding is an ActorBinding that records a scoped RuntimeRole assignment."
    ja: "Every ActorRoleBinding is an ActorBinding that records a scoped RuntimeRole assignment."
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  source_claims: ["claim-role-binding-boundary"]
relations:
  - id: ActorRoleBinding-binds-RuntimeRole
    predicate: binds_role
    target: concept:RuntimeRole
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: semantic
    labels:
      zh: "binds runtime role"
      en: "binds runtime role"
      ja: "binds runtime role"
    definitions:
      zh: "A local role binding references a separately defined RuntimeRole."
      en: "A local role binding references a separately defined RuntimeRole."
      ja: "A local role binding references a separately defined RuntimeRole."
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    source_claims: ["claim-role-binding-boundary"]
