        en: Its bound object is a scoped responsibility role with complete audit conditions.
        ja: 束縛対象が範囲付き責任役割で完全な監査条件を持つ。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-actor-role-binding-003
    - id: ActorRoleBinding-is_a-ActorBinding-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种主体绑定边界例
        en: "Boundary case: is an actor binding"
        ja: アクター束縛の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: cap-binding-8 只允许 agent-7 使用 document_search，没有分配审核、开发、操作或用户责任。
        en: cap-binding-8 only permits agent-7 to use document_search and assigns no review, development, operation, or user responsibility.
        ja: cap-binding-8 は agent-7 の document_search 利用だけを許可し、審査・開発・運用・利用者責任を付与しない。
      field_values: {}
