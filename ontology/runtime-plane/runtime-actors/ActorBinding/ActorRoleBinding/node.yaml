  - id: claim-actor-role-binding-002
    source: eng-fw-openai-python-docs
    supports: OpenAI distinguishes an Agent's available tools or MCP servers from delegation through manager patterns and handoffs. Moonweave uses that operational split to keep ActorRoleBinding, which records scoped responsibility, separate from ActorCapabilityBinding, which records an available action or service interface.
    locator: Agents > Basic configuration > tools, mcp_servers, and handoffs; Multi-agent system design patterns
    evidence_kind: design-inference
