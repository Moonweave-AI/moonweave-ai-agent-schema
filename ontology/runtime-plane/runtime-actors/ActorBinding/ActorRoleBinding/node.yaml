      kind: positive
      labels:
        zh: 是一种主体绑定正例
        en: "Positive case: is an actor binding"
        ja: アクター束縛の一種であるの正例
      scenario_id: null
      descriptions:
        zh: role-binding-12 将 h-411 绑定为 review-203 的独立 Reviewer，直至发布决定结束，并禁止审核自己的提交。
        en: role-binding-12 assigns h-411 the independent Reviewer role for review-203 until the release decision completes and prohibits reviewing that person's own submission.
        ja: role-binding-12 は h-411 に review-203 の独立 Reviewer 役割をリリース判断完了まで付与し、自己提出物の審査を禁止する。
      field_values: {}
