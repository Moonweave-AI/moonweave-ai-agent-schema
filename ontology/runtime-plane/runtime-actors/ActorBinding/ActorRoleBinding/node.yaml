schema: moonweave.ai/ontology-node/v1
id: ActorRoleBinding
kind: concept
status: review
labels:
  en: actor role binding
  zh: 参与者角色绑定
  ja: アクター役割バインディング
semantics:
  short_definition:
    zh: 参与者角色绑定是在特定范围与时段把运行参与主体关联到职责角色的主体绑定记录。
    en: An ActorRoleBinding is an ActorBinding that assigns a responsibility role to an Actor for a specified scope and interval.
    ja: ActorRoleBinding は指定範囲と期間で責任役割を Actor へ割り当てる ActorBinding である。
  definition:
    zh: 参与者角色绑定是 ActorBinding 的一种；其种差是把一个 Actor 与一项 RuntimeRole 连接，并记录角色范围、有效期、授予者、利益冲突或撤销条件。它说明某个主体何时承担 DeveloperRole、ReviewerRole 或 HumanOperatorRole；角色定义、主体身份和能力绑定都不是该记录。
    en: An ActorRoleBinding is an ActorBinding distinguished by connecting an Actor to a RuntimeRole and recording scope, validity, grantor, conflict, or revocation conditions. It states when an Actor bears DeveloperRole, ReviewerRole, or HumanOperatorRole; the role definition, Actor identity, and capability binding are not this record.
    ja: ActorRoleBinding は ActorBinding の一種で、Actor を RuntimeRole に結び scope・validity・grantor・conflict・revocation condition を記録します。Actor が DeveloperRole・ReviewerRole・HumanOperatorRole をいつ担うかを示し、role definition・Actor identity・capability binding 自体ではありません。
  why_needed:
    zh: 该记录允许角色随任务、会话与时间变化，并支持兼任与利益冲突检查，而不把上下文角色永久写进主体身份。
    en: This record allows roles to vary by task, session, and time and supports concurrent-role and conflict checks without permanently encoding contextual roles into Actor identity.
    ja: この記録はタスク、セッション、時間ごとの役割変化、兼任、利益相反確認を可能にし、文脈役割を Actor 識別へ恒久化しない。
  includes:
    - zh: 纳入把具体 actor_id 与命名职责角色关联，并记录任务或会话范围、有效期和角色约束的绑定。
      en: Includes a binding from a concrete actor_id to a named responsibility role with task or session scope, validity, and role constraints.
      ja: 具体的 actor_id を責任役割へ結び、タスク・セッション範囲、有効性、役割制約を記録する束縛を含む。
  excludes:
    - zh: 不纳入角色定义本身、ActorCapabilityBinding、组织职位目录、无主体的 ACL 条目或仅由类名推断的永久角色。
      en: Excludes the role definition itself, ActorCapabilityBinding, an organization job catalog, an ACL entry with no Actor, and a permanent role inferred only from a class name.
      ja: 役割定義自体、ActorCapabilityBinding、組織職務目録、主体のない ACL 項目、クラス名だけから推論する恒久役割は含まない。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ActorRoleBinding-example-positive-001
    kind: positive
    labels:
      zh: 参与者角色绑定正例
      en: Positive example of actor role binding
      ja: アクター役割バインディングの正例
    scenario_id: null
    descriptions:
      zh: role-binding-12 指定 h-411 在 review-203 中担任独立审核者，直到发布决定完成，并禁止审核自己的提交。
      en: role-binding-12 assigns h-411 as independent reviewer for review-203 until the release decision completes and prohibits review of that person's own submission.
      ja: role-binding-12 は h-411 を review-203 の独立審査者として release 判断完了まで割り当て、自己提出審査を禁止する。
    field_values:
      binding_id: role-binding-12
      actor_ref: h-411
      binding_kind: role
      bound_object_ref: independent-reviewer
      scope_ref: review-203
      validity:
        starts_at: 2026-07-16T08:00:00Z
        ends_when: release-decision-203-completed
      provenance_ref: review-assignment-203
      conditions:
        self_review: forbidden
    related_node_ids:
      - ActorRoleBinding
      - AgentActor
      - Actor
    related_relation_ids:
      - has_actor_role_binding
    expected_result:
      zh: role-binding-12 归类为 ActorRoleBinding。
      en: role-binding-12 is classified as ActorRoleBinding.
      ja: role-binding-12 は ActorRoleBinding に分類される。
    why_valid_or_invalid:
      zh: 绑定对象是职责角色，并明确主体、任务范围、有效期和利益冲突条件。
      en: The bound object is a responsibility role and the record states participant, task scope, validity, and conflict condition.
      ja: 束縛対象が責任役割で、主体、タスク範囲、有効性、利益相反条件が明示される。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-role-binding-001
  - id: ActorRoleBinding-example-boundary-001
    kind: boundary
    labels:
      zh: 参与者角色绑定边界例
      en: Boundary case for actor role binding
      ja: アクター役割バインディングの境界例
    scenario_id: null
    descriptions:
      zh: cap-binding-8 允许 agent-7 在 session-4 调用 document_search，但没有授予审核、操作或开发职责。
      en: cap-binding-8 allows agent-7 to call document_search in session-4 but assigns no review, operation, or development responsibility.
      ja: cap-binding-8 は agent-7 に session-4 で document_search 呼出を許すが、審査、運用、開発責任を割り当てない。
    field_values: {}
    related_node_ids:
      - ActorRoleBinding
      - AgentActor
      - ActorCapabilityBinding
      - Actor
    related_relation_ids:
      - has_actor_role_binding
    expected_result:
      zh: cap-binding-8 是 ActorCapabilityBinding，不是 ActorRoleBinding。
      en: cap-binding-8 is an ActorCapabilityBinding, not an ActorRoleBinding.
      ja: cap-binding-8 は ActorCapabilityBinding で ActorRoleBinding ではない。
    why_valid_or_invalid:
      zh: 可调用能力说明主体能做什么；角色绑定说明主体对什么职责负责。
      en: A capability says what an Actor can do; a role binding says what responsibility the Actor bears.
      ja: 能力は Actor が何をできるかを示し、役割束縛は何の責任を負うかを示す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-role-binding-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ActorCapabilityBinding
    shared_parent_concept_id: ActorBinding
    differentia:
      zh: 已审查兄弟区分：父节点 ActorBinding：ActorRoleBinding（semantic kind=information，骨架 ActorRoleBinding-is_a-ActorBinding）；ActorCapabilityBinding（semantic kind=information，骨架 ActorCapabilityBinding-is_a-ActorBinding）。双端条件：ActorRoleBinding 条件：“参与者角色绑定属于主体绑定记录，区别于其他同类对象的条件是：它把运行参与者绑定到承担责任的角色，使委派、审查、批准和问责保持可追踪”；ActorCapabilityBinding 条件：“参与者能力绑定属于主体绑定记录，区别于其他同类对象的条件是：它把运行参与者连接到可调用、可观测、检索、生成或审查能力，并同时记录允许使用这些能力的条件”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ActorBinding: ActorRoleBinding (semantic kind=information, backbone ActorRoleBinding-is_a-ActorBinding); ActorCapabilityBinding (semantic kind=information, backbone ActorCapabilityBinding-is_a-ActorBinding). Endpoint conditions: ActorRoleBinding condition: “Actor role binding is an actor binding whose defining condition is that it is an assignment record that binds a runtime actor to a responsibility-bearing role so delegation, review, approval, and accountability remain traceable”; ActorCapabilityBinding condition: “Actor capability binding is an actor binding whose defining condition is that it is a binding record that connects a runtime actor to callable, observable, retrieval, generation, or review capabilities together with allowed conditions of use”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ActorBinding：ActorRoleBinding（semantic kind=information、バックボーン ActorRoleBinding-is_a-ActorBinding）；ActorCapabilityBinding（semantic kind=information、バックボーン ActorCapabilityBinding-is_a-ActorBinding）。両端条件：ActorRoleBinding の条件：「アクター役割バインディングはアクター束縛記録のうち、次の事実を定義条件とする対象です：それは、実行アクターを責任を伴う役割へ結び付け、委任、レビュー、承認、説明責任を追跡可能にします」；ActorCapabilityBinding の条件：「アクター能力バインディングはアクター束縛記録のうち、次の事実を定義条件とする対象です：それは、実行アクターを呼び出し、観測、検索、生成、レビューの能力へ結び付け、その利用条件を併せて記録します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-actor-role-binding-002
parent_relation:
  id: ActorRoleBinding-is_a-ActorBinding
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种主体绑定
    en: is an actor binding
    ja: アクター束縛の一種である
  definitions:
    zh: ActorRoleBinding-is_a-ActorBinding 表示每个参与者角色绑定都满足 ActorBinding 的主体、范围、有效期与来源要求，并以所绑定对象是责任角色为种差；角色定义和承担角色的 Actor 都不是绑定记录。
    en: ActorRoleBinding-is_a-ActorBinding states that every actor-role binding satisfies ActorBinding identity, scope, validity, and provenance requirements and is differentiated by binding a responsibility role; neither the role definition nor the Actor bearing it is the binding record.
    ja: ActorRoleBinding-is_a-ActorBinding は全ての役割束縛が ActorBinding の主体・範囲・有効期間・来歴要件を満たし、責任役割を束縛することを種差とする。役割定義も担い手 Actor も束縛記録ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_role_binding_subtype
    labels:
      zh: 具有角色绑定子类
      en: has role-binding subtype
      ja: 役割束縛下位型を持つ
  conditions:
    - id: ActorRoleBinding-is_a-ActorBinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the record first satisfies ActorBinding and explicitly names the role, responsibility scope, validity, granting source, and conflict or revocation conditions.
      explanations:
        zh: 仅当记录先满足 ActorBinding，并明确角色标识、责任范围、有效期、授予来源和冲突或撤销条件时成立。
        en: Assert only when the record first satisfies ActorBinding and explicitly names the role, responsibility scope, validity, granting source, and conflict or revocation conditions.
        ja: 記録がまず ActorBinding を満たし、役割識別子、責任範囲、有効期間、付与元、競合または取消条件を明示する時だけ成立する。
      source_claims:
        - claim-actor-role-binding-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
