  - id: ActorRoleBinding-example-boundary-001
    labels:
      zh: OpenAI instructions 文本非 RoleBinding
      en: OpenAI instructions text not RoleBinding
      ja: OpenAI instructions テキストは RoleBinding ではない
    descriptions:
      zh: OpenAI Agent instructions="You are a researcher..." 是自然语言配置，不是 scoped ActorRoleBinding 记录。
      en: OpenAI Agent instructions="You are a researcher..." is natural language config, not scoped ActorRoleBinding record.
      ja: instructions テキストだけでは RoleBinding にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorRoleBinding
      - AgentActor
      - ActorCapabilityBinding
      - Actor
    related_relation_ids:
      - has_actor_role_binding
    source_claims:
      - claim-actor-role-binding-design
  - id: ActorRoleBinding-example-3
    labels:
      zh: RoleBinding 与 RuntimeRole 边界
      en: RoleBinding versus RuntimeRole boundary
      ja: RoleBinding と RuntimeRole 境界
    descriptions:
      zh: ActorRoleBinding 将 RuntimeRole 绑定到 actor/task scope；RuntimeRole 是角色定义；binding 是 scoped 关联记录。
      en: ActorRoleBinding binds RuntimeRole to actor/task scope; RuntimeRole is role definition; binding is scoped association record.
      ja: RuntimeRole 定義と RoleBinding 記録は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorRoleBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-role-binding-vendor
      - claim-actor-role-binding-design
  - id: ActorRoleBinding-example-4
    labels:
      zh: researcher task-61 绑定实例
      en: researcher task-61 binding instance
      ja: researcher task-61 バインディング事例
    descriptions:
      zh: ActorRoleBinding binding_id=role-researcher-task61、actor_id=crewai-journalist、role_ref=ReviewerRole、scope_ref=task-61。
      en: ActorRoleBinding binding_id=role-researcher-task61, actor_id=crewai-journalist, role_ref=ReviewerRole, scope_ref=task-61.
      ja: role-researcher-task61 ActorRoleBinding を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorRoleBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-role-binding-vendor
      - claim-actor-role-binding-design
parent_relation:
  id: ActorRoleBinding-is_a-ActorBinding
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种主体绑定
    en: is an actor binding
    ja: アクター束縛の一種である
  definitions:
    zh: ActorRoleBinding-is_a-ActorBinding 表示每个参与者角色绑定都满足 ActorBinding 的主体、范围、有效期与来源要求，并以所绑定对象是责任角色为种差；角色定义和承担角色的 Actor 都不是绑定记录。
    en: ActorRoleBinding-is_a-ActorBinding states that every actor-role binding satisfies ActorBinding identity, scope, validity, and provenance requirements and is differentiated by binding a responsibility role; neither the role definition nor the Actor bearing it is the binding record.
    ja: ActorRoleBinding-is_a-ActorBinding は全ての役割束縛が ActorBinding の主体・範囲・有効期間・来歴要件を満たし、責任役割を束縛することを種差とする。役割定義も担い手 Actor も束縛記録ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有角色绑定子类
      en: has role-binding subtype
      ja: 役割束縛下位型を持つ
  conditions:
    - id: ActorRoleBinding-is_a-ActorBinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the record first satisfies ActorBinding and explicitly names the role, responsibility scope, validity, granting source, and conflict or revocation conditions.
      explanations:
        zh: 仅当记录先满足 ActorBinding，并明确角色标识、责任范围、有效期、授予来源和冲突或撤销条件时成立。
        en: Assert only when the record first satisfies ActorBinding and explicitly names the role, responsibility scope, validity, granting source, and conflict or revocation conditions.
        ja: 記録がまず ActorBinding を満たし、役割識別子、責任範囲、有効期間、付与元、競合または取消条件を明示する時だけ成立する。
      source_claims:
        - claim-actor-role-binding-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-actor-role-binding-design
  distinct_fact_rationale:
    zh: 这是角色绑定的类型成员关系，不是 Actor 永久成为某个角色的身份断言。
    en: This is type membership for a role-binding record, not an assertion that an Actor permanently becomes a role.
    ja: 役割束縛記録の型所属であり、Actor が役割へ恒久変化する断言ではない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ActorRoleBinding-binds-RuntimeRole
    predicate: binds
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 绑定运行时角色
      en: binds runtime role
      ja: runtime role を binding する
    definitions:
      zh: ActorRoleBinding binds RuntimeRole 表示绑定记录指向其所授予的职责定义；Actor 通过另一个 has_binding 事实连接到该绑定记录。
      en: ActorRoleBinding binds RuntimeRole means that the binding record points to the responsibility definition it grants. The Actor connects to the binding record through the separate has_binding fact.
      ja: ActorRoleBinding binds RuntimeRole は binding record が付与する responsibility definition を指すことを表します。Actor は別の has_binding fact で binding record に接続します。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_bound_by
      labels:
        zh: 由角色绑定记录绑定
        en: is bound by role binding
        ja: role binding により binding される
    conditions:
      - id: ActorRoleBinding-binds-RuntimeRole-condition-001
        severity: error
        expression_language: custom
        expression: binding_role_scope_and_validity_are_explicit == true
        explanations:
          zh: 只有绑定记录明确角色定义、适用范围和有效期时，才建立该绑定事实。
          en: Assert this binding fact only when the record explicitly names the role definition, scope, and validity period.
          ja: binding record が role definition・scope・validity period を明示する場合だけこの fact を assertion します。
        source_claims:
          - claim-actor-role-binding-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-actor-role-binding-design
    distinct_fact_rationale:
      zh: 该边连接绑定记录与职责定义，不替代 Actor-has_binding-ActorBinding。
      en: This edge links the binding record to the responsibility definition and does not replace Actor-has_binding-ActorBinding.
      ja: binding record と responsibility definition を結び、Actor-has_binding-ActorBinding を代替しません。
    layout_role: cross-link
    target: concept:RuntimeRole
  - id: ActorRoleBinding-binds-CoordinationRole
    predicate: binds_role
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 绑定协同角色
      en: binds coordination role
      ja: 調整役割をバインドする
    definitions:
      zh: 参与者角色绑定所绑定的协同角色，表示一个 ActorRoleBinding 在给定任务、范围和有效期内把实际 Actor 与一个 CoordinationRole 连接；这不是 Actor is_a Role。
      en: ActorRoleBinding binds CoordinationRole when a role-binding record connects an actual Actor to one CoordinationRole for a stated task, scope, and validity interval; it is not an Actor-is-a-Role assertion.
      ja: ActorRoleBinding が CoordinationRole をバインドするとは、指定タスク、範囲、有効期間について実際の Actor を一つの CoordinationRole に接続することであり、Actor is_a Role ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: bound_by
      labels:
        zh: 反向：由参与者角色绑定
        en: bound by actor-role binding
        ja: 逆方向：アクター役割バインディングにより結ばれる
    conditions:
      - id: ActorRoleBinding-binds-CoordinationRole-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the ActorRoleBinding identifies one canonical Actor, one resolvable CoordinationRole, a matching task or session scope, a valid interval, and provenance for the binding decision.
        explanations:
          zh: 仅当 ActorRoleBinding 标识一个规范 Actor、一个可解析 CoordinationRole、相符的任务或会话范围、有效时段以及绑定决定来源时成立。
          en: Assert only when the ActorRoleBinding identifies one canonical Actor, one resolvable CoordinationRole, a matching task or session scope, a valid interval, and provenance for the binding decision.
          ja: ActorRoleBinding が一つの canonical Actor、一つの解決可能な CoordinationRole、整合する task/session scope、有効期間、binding decision provenance を識別する時だけ成立します。
        source_claims:
          - claim-actor-role-binding-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-actor-role-binding-design
    distinct_fact_rationale:
      zh: 该关系记录实际承担或责任落点，不与角色分类或主体身份合并。
      en: This relation records an actual role assignment or responsibility holder and is not merged with role taxonomy or actor identity.
      ja: この関係は実際の役割割り当てまたは責任保持者を記録し、役割分類や主体同一性と統合しません。
    layout_role: cross-link
    target: concept:CoordinationRole
