      expected_result:
        zh: cap-binding-8 归为 ActorCapabilityBinding，而非 ActorRoleBinding。
        en: Classify cap-binding-8 as ActorCapabilityBinding, not ActorRoleBinding.
        ja: cap-binding-8 は ActorCapabilityBinding とし ActorRoleBinding にはしない。
      why_valid_or_invalid:
