source_claims:
  - id: claim-role-binding-boundary
    source: prov
    supports: "PROV-O role is a qualified association concept; MCP connection roles and A2A metadata are not Moonweave RuntimeRole assignments."
    locator: "PROV-O qualified association; MCP Architecture; A2A Agent Discovery"
    evidence_kind: design-inference
    confidence: high

