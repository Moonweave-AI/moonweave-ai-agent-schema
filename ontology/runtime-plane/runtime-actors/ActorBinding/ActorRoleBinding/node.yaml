        en: Capability answers what may be done; role answers which responsibility is borne in that scope.
        ja: 能力は何が可能か、役割はその範囲で何の責任を負うかを答える。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
