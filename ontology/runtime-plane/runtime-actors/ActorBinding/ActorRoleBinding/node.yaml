schema: moonweave.ai/ontology-node/v1
id: ActorRoleBinding
kind: concept
status: accepted
labels:
  zh: 参与者角色绑定
  en: Actor role binding
  ja: アクターロールバインディング
semantics:
  short_definition:
    zh: 在明确作用域内分配本地 RuntimeRole 的 ActorBinding。
    en: An ActorBinding that assigns a local runtime role within an explicit scope.
    ja: 明示的スコープ内でローカル RuntimeRole を割り当てる ActorBinding。
  definition:
    zh: ActorRoleBinding 是将单独定义的 RuntimeRole 分配给参与者绑定的 Moonweave 本地关联。它不是协议消息角色、MCP host/client/server 角色、A2A card 字段、配置标签或永久参与者身份。
    en: ActorRoleBinding is a Moonweave local association that assigns a separately defined RuntimeRole to an actor binding. It is not a protocol message role, an MCP host/client/server role, an A2A card field, a configuration label, or a permanent actor identity.
    ja: ActorRoleBinding は、別途定義された RuntimeRole をアクターバインディングに割り当てる Moonweave ローカル関連である。プロトコルメッセージロール、MCP host/client/server ロール、A2A card フィールド、設定ラベル、永続参加者 identity ではない。
  why_needed:
    zh: 角色表达有作用域的职责与审查期望，而身份、消息、协议组件与 Activity 具有不同生命周期。
    en: Roles express scoped duties and review expectations, whereas identities, messages, protocol components, and activities have different lifecycles.
    ja: ロールはスコープ付きの職務とレビュー期待を表すが、identity、メッセージ、プロトコルコンポーネント、Activity は異なるライフサイクルを持つ。
  includes:
    - zh: 带绑定证据的、对参与者的本地有作用域角色分配。
      en: Local scoped role assignments to actors with binding evidence.
      ja: バインディング証拠を伴う、アクターへのローカルスコープ付きロール割当。
  excludes:
    - zh: 聊天角色标签、MCP 连接角色、A2A 广告角色、能力授予或参与者身份本身。
      en: A chat role label, MCP connection role, A2A advertised role, capability grant, or an actor identity itself.
      ja: チャットロールラベル、MCP 接続ロール、A2A 広告ロール、能力付与、参加者 identity 自体。
  semantic_kind: entity
  aliases: ["role assignment","qualified role"]
engineering:
  explanation:
    zh: "Input joins binding_id, role_ref, and scope_ref. Output is a local role-assignment record; external role strings remain evidence or interface metadata."
    en: "Input joins binding_id, role_ref, and scope_ref. Output is a local role-assignment record; external role strings remain evidence or interface metadata."
    ja: "Input joins binding_id, role_ref, and scope_ref. Output is a local role-assignment record; external role strings remain evidence or interface metadata."
  typical_input:
    - description:
        zh: "Local role-assignment request."
        en: "Local role-assignment request."
        ja: "Local role-assignment request."
      format: "{\"binding_id\":\"rolebind-44\",\"role_ref\":\"role:ReviewerRole\",\"scope_ref\":\"repo:moonweave\"}"
  typical_output:
    - description:
        zh: "Local role-assignment record."
        en: "Local role-assignment record."
        ja: "Local role-assignment record."
      format: "{\"binding_id\":\"rolebind-44\",\"role_ref\":\"role:ReviewerRole\",\"scope_ref\":\"repo:moonweave\"}"
  reference_implementations:
    - name: "PROV-O"
      url: https://www.w3.org/TR/prov-o/
      description: "Defines roles through qualified provenance associations."
structure:
  identity_keys: ["binding_id"]
  fields:
    - id: binding_id
      labels:
        zh: "Role binding ID"
        en: "Role binding ID"
        ja: "Role binding ID"
      definitions:
        zh: "Stable local identifier for a scoped role assignment."
        en: "Stable local identifier for a scoped role assignment."
        ja: "Stable local identifier for a scoped role assignment."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "rolebind-44"
      source_claims: ["claim-role-binding-boundary"]
    - id: actor_ref
      labels:
        zh: "参与者引用"
        en: "Actor reference"
        ja: "アクター参照"
      definitions:
        zh: "指向被分配该 RuntimeRole 的本地 Actor 的类型化引用。"
        en: "Typed local reference to the Actor assigned this RuntimeRole."
        ja: "この RuntimeRole を割り当てられた Actor への型付きローカル参照。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "actor:agent-reviewer-2"
      source_claims: ["claim-role-binding-boundary"]
    - id: role_ref
      labels:
        zh: "Runtime role reference"
        en: "Runtime role reference"
        ja: "Runtime role reference"
      definitions:
        zh: "Typed local reference to the separately defined RuntimeRole."
        en: "Typed local reference to the separately defined RuntimeRole."
        ja: "Typed local reference to the separately defined RuntimeRole."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "role:ReviewerRole"
      source_claims: ["claim-role-binding-boundary"]
    - id: scope_ref
      labels:
        zh: "Scope reference"
        en: "Scope reference"
        ja: "Scope reference"
      definitions:
        zh: "Local reference to where the role assignment applies."
        en: "Local reference to where the role assignment applies."
        ja: "Local reference to where the role assignment applies."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "repo:moonweave"
      source_claims: ["claim-role-binding-boundary"]
  constraints:
    - id: role-binding-not-message-or-connection-role
      severity: error
      language: plain
      expression: "ActorRoleBinding must reference a local RuntimeRole and scope; message and protocol connection roles must not be used as role_ref."
      explanation:
        zh: "Protocol roles describe message or transport semantics rather than local duties."
        en: "Protocol roles describe message or transport semantics rather than local duties."
        ja: "Protocol roles describe message or transport semantics rather than local duties."
      source_claims: ["claim-role-binding-boundary"]
  required_relations: ["ActorRoleBinding-specializes-ActorBinding","ActorRoleBinding-binds-RuntimeRole"]
examples:
  - id: actorrolebinding-positive
    labels: {zh: "CrewAI Senior Data Researcher 角色绑定", en: "CrewAI Senior Data Researcher role binding", ja: "CrewAI Senior Data Researcher ロールバインディング"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ActorRoleBinding maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ActorRoleBinding maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ActorRoleBinding provenance graph."}
    field_values: {"binding_id":"rolebind-44","actor_ref":"actor:agent-reviewer-2","role_ref":"role:ReviewerRole","scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorRoleBinding","RuntimeRole"]
    related_relation_ids: ["ActorRoleBinding-binds-RuntimeRole"]
    source_claims: ["claim-role-binding-boundary"]
  - id: actorrolebinding-counterexample
    labels: {zh: "OpenAI instructions 文本非 RoleBinding", en: "OpenAI instructions text not RoleBinding", ja: "OpenAI instructions テキストは RoleBinding ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ActorRoleBinding.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ActorRoleBinding.", ja: "Missing parent_run_id rejects LangSmith-style ActorRoleBinding."}
    field_values: {"role_ref":"role:ReviewerRole"}
    related_node_ids: ["RuntimeRole"]
    related_relation_ids: []
    source_claims: ["claim-role-binding-boundary"]
  - id: actorrolebinding-boundary
    labels: {zh: "RoleBinding 与 RuntimeRole 边界", en: "RoleBinding versus RuntimeRole boundary", ja: "RoleBinding と RuntimeRole 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorRoleBinding preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorRoleBinding preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"role_ref":"client"}
    related_node_ids: ["MCPSession"]
    related_relation_ids: []
    source_claims: ["claim-role-binding-boundary"]
  - id: actorrolebinding-instance
    labels: {zh: "researcher task-61 绑定实例", en: "researcher task-61 binding instance", ja: "researcher task-61 バインディング事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ActorRoleBinding.", en: "Langfuse instance: trace+span+score->ActorRoleBinding.", ja: "Langfuse instance maps to ActorRoleBinding."}
    field_values: {"binding_id":"rolebind-44","actor_ref":"actor:agent-reviewer-2","role_ref":"role:ReviewerRole","scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorRoleBinding","RuntimeRole"]
    related_relation_ids: ["ActorRoleBinding-binds-RuntimeRole"]
    source_claims: ["claim-role-binding-boundary"]
