schema: moonweave.ai/ontology-node/v1
id: ActorCapabilityBinding
kind: concept
status: accepted
labels:
  zh: 参与者能力绑定
  en: Actor capability binding
  ja: アクター能力バインディング
semantics:
  short_definition:
    zh: 在明确资源作用域内授予本地能力的 ActorBinding。
    en: An ActorBinding that grants a local capability within an explicit resource scope.
    ja: 明示的リソーススコープ内でローカル能力を付与する ActorBinding。
  definition:
    zh: ActorCapabilityBinding 是将参与者绑定链接到单独定义的能力与资源作用域的 Moonweave 本地授权分配记录。它不是 A2A AgentCapabilities 字段、MCP 服务器能力协商、OpenAI Agents SDK 工具列表、凭据或工具调用结果。
    en: ActorCapabilityBinding is a Moonweave local authorization-assignment record linking an actor binding to a separately defined capability and resource scope. It is not an A2A AgentCapabilities field, MCP server capability negotiation, an OpenAI Agents SDK tool list, a credential, or a tool-call result.
    ja: ActorCapabilityBinding は、アクターバインディングを別途定義された能力とリソーススコープへ結び付ける Moonweave ローカル認可割当記録である。A2A AgentCapabilities フィールド、MCP サーバー能力協調、OpenAI Agents SDK ツールリスト、資格情報、ツール呼び出し結果ではない。
  why_needed:
    zh: 发现能力、传输能力、配置工具、授权授予与实际调用具有不同语义与证据。
    en: Discovery capabilities, transport capabilities, configured tools, authorization grants, and actual calls have different semantics and evidence.
    ja: 発見能力、トランスポート能力、設定ツール、認可付与、実際の呼び出しは異なる意味と証拠を持つ。
  includes:
    - zh: 具有可审计 binding 标识与资源作用域的本地有作用域能力授予。
      en: Local scoped capability grants with an auditable binding identifier and resource scope.
      ja: 監査可能な binding 識別子とリソーススコープを持つローカルスコープ付き能力付与。
  excludes:
    - zh: 原始秘密、A2A 能力广告、MCP initialize 能力对象、SDK 工具配置或工具调用。
      en: A raw secret, A2A capabilities advertisement, MCP initialize capability object, SDK tool configuration, or tool invocation.
      ja: 生秘密、A2A 能力広告、MCP initialize 能力オブジェクト、SDK ツール設定、ツール呼び出し。
  semantic_kind: entity
  aliases: ["capability grant","scoped authorization"]
engineering:
  explanation:
    zh: "Input joins binding_id, capability_ref, and resource_scope_ref. Output is a local authorization projection; it does not copy discovery or transport capability fields."
    en: "Input joins binding_id, capability_ref, and resource_scope_ref. Output is a local authorization projection; it does not copy discovery or transport capability fields."
    ja: "Input joins binding_id, capability_ref, and resource_scope_ref. Output is a local authorization projection; it does not copy discovery or transport capability fields."
  typical_input:
    - description:
        zh: "Local capability-grant request."
        en: "Local capability-grant request."
        ja: "Local capability-grant request."
      format: "{\"binding_id\":\"capbind-8\",\"capability_ref\":\"capability:filesystem.read\",\"resource_scope_ref\":\"repo:moonweave\"}"
  typical_output:
    - description:
        zh: "Local scoped capability grant."
        en: "Local scoped capability grant."
        ja: "Local scoped capability grant."
      format: "{\"binding_id\":\"capbind-8\",\"capability_ref\":\"capability:filesystem.read\",\"resource_scope_ref\":\"repo:moonweave\"}"
  reference_implementations:
    - name: "MCP Tools"
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: "Defines tools and schemas separately from authorization grants."
structure:
  identity_keys: ["binding_id"]
  fields:
    - id: binding_id
      labels:
        zh: "Capability binding ID"
        en: "Capability binding ID"
        ja: "Capability binding ID"
      definitions:
        zh: "Stable local identifier for a scoped authorization association."
        en: "Stable local identifier for a scoped authorization association."
        ja: "Stable local identifier for a scoped authorization association."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "capbind-8"
      source_claims: ["claim-capability-binding-boundary"]
    - id: actor_ref
      labels:
        zh: "参与者引用"
        en: "Actor reference"
        ja: "アクター参照"
      definitions:
        zh: "指向持有该能力授权的本地 Actor 的类型化引用。"
        en: "Typed local reference to the Actor that holds the capability authorization."
        ja: "能力認可を保持する Actor への型付きローカル参照。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "actor:agent-reviewer-2"
      source_claims: ["claim-capability-binding-boundary"]
    - id: scope_ref
      labels:
        zh: "适用范围引用"
        en: "Scope reference"
        ja: "スコープ参照"
      definitions:
        zh: "该能力绑定适用的父级本地范围；resource_scope_ref 可进一步限定资源。"
        en: "Owning local scope in which the capability binding applies; resource_scope_ref may narrow the resource."
        ja: "能力バインディングが適用される親ローカルスコープ。resource_scope_ref はリソースをさらに絞り込める。"
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "repo:moonweave"
      source_claims: ["claim-capability-binding-boundary"]
    - id: capability_ref
      labels:
        zh: "Capability reference"
        en: "Capability reference"
        ja: "Capability reference"
      definitions:
        zh: "Typed reference to the separately defined local capability."
        en: "Typed reference to the separately defined local capability."
        ja: "Typed reference to the separately defined local capability."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "capability:filesystem.read"
      source_claims: ["claim-capability-binding-boundary"]
    - id: resource_scope_ref
      labels:
        zh: "Resource scope reference"
        en: "Resource scope reference"
        ja: "Resource scope reference"
      definitions:
        zh: "Local reference to the resources authorized by the grant."
        en: "Local reference to the resources authorized by the grant."
        ja: "Local reference to the resources authorized by the grant."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "repo:moonweave"
      source_claims: ["claim-capability-binding-boundary"]
  constraints:
    - id: capability-binding-no-protocol-payload
      severity: error
      language: plain
      expression: "ActorCapabilityBinding must reference a local CapabilityDefinition and explicit scope; it must not use A2A, MCP, or SDK capability payloads as a grant."
      explanation:
        zh: "External capability declarations do not establish local authorization."
        en: "External capability declarations do not establish local authorization."
        ja: "External capability declarations do not establish local authorization."
      source_claims: ["claim-capability-binding-boundary"]
  required_relations: ["ActorCapabilityBinding-specializes-ActorBinding","ActorCapabilityBinding-binds-CapabilityDefinition"]
examples:
