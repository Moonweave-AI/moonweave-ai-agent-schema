      source_claims:
        - claim-actor-capability-binding-003
    - id: ActorCapabilityBinding-is_a-ActorBinding-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种主体绑定边界例
        en: "Boundary case: is an actor binding"
