    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ActorCapabilityBinding maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ActorCapabilityBinding maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ActorCapabilityBinding provenance graph."}
    field_values: {"binding_id":"capbind-8","actor_ref":"actor:agent-reviewer-2","scope_ref":"repo:moonweave","capability_ref":"capability:filesystem.read","resource_scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorCapabilityBinding","CapabilityDefinition"]
