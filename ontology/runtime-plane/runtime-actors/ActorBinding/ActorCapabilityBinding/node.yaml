    source_claims: ["claim-capability-binding-boundary"]
  - id: actorcapabilitybinding-counterexample
    labels: {zh: "OpenAI tools 数组非 CapabilityBinding", en: "OpenAI tools array not CapabilityBinding", ja: "OpenAI tools 配列は CapabilityBinding ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ActorCapabilityBinding.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ActorCapabilityBinding.", ja: "Missing parent_run_id rejects LangSmith-style ActorCapabilityBinding."}
