schema: moonweave.ai/ontology-node/v1
id: ActorCapabilityBinding
kind: concept
status: accepted
labels:
  en: actor capability binding
  zh: 参与者能力绑定
  ja: アクター能力バインディング
semantics:
  short_definition:
    zh: 参与者能力绑定是在特定条件下声明运行参与主体可使用或提供某项能力的主体绑定记录。
    en: An ActorCapabilityBinding is an ActorBinding that states an Actor may use or provide a capability under specified conditions.
    ja: ActorCapabilityBinding は指定条件で Actor が能力を使用または提供できると述べる ActorBinding である。
  definition:
    zh: 参与者能力绑定是 ActorBinding 的一种；其种差是被绑定对象是一项可调用、生成、检索、观察或评审能力，并记录适用会话或环境、版本、权限前提、配额和有效期。它表达可用性而不证明某次调用已发生，也不等同于承担职责的 ActorRoleBinding、能力定义或权限决策。
    en: An ActorCapabilityBinding is an ActorBinding distinguished by binding a callable, generative, retrieval, observation, or review capability and recording applicable session or environment, version, authority prerequisites, quota, and validity. It states availability without proving that an invocation occurred and is not an ActorRoleBinding, capability definition, or authorization decision.
    ja: ActorCapabilityBinding は ActorBinding の一種で、呼出、生成、検索、観測、審査能力を束縛し、適用セッション・環境、版、権限前提、quota、有効性を記録する。利用可能性を述べるが呼出発生を証明せず、ActorRoleBinding、能力定義、認可判断でもない。
  why_needed:
    zh: 该记录让能力发现、最小权限与运行前验证基于主体、范围和版本，而不把潜在可用性误当作实际调用或职责。
    en: This record lets discovery, least privilege, and pre-run validation use participant, scope, and version without confusing potential availability with actual invocation or responsibility.
    ja: この記録は主体、範囲、版に基づく能力発見、最小権限、実行前検証を可能にし、利用可能性を実呼出や責任と混同しない。
  includes:
    - zh: 纳入把具体 Actor 与命名能力、版本和使用条件关联，并在会话或环境范围内有效的绑定。
      en: Includes a binding from a concrete Actor to a named capability and version with use conditions valid for a session or environment scope.
      ja: 具体的 Actor を命名能力・版と使用条件へ結び、セッション・環境範囲で有効な束縛を含む。
  excludes:
    - zh: 不纳入 Capability 或 ToolDefinition 本身、ActorRoleBinding、AuthorizationDecision、一次 ToolCall、成功结果或只有能力名称的广告。
      en: Excludes the Capability or ToolDefinition itself, ActorRoleBinding, AuthorizationDecision, one ToolCall, a successful result, and an advertisement containing only a capability name.
      ja: Capability・ToolDefinition 自体、ActorRoleBinding、AuthorizationDecision、単一 ToolCall、成功結果、能力名だけの広告は含まない。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ActorCapabilityBinding-example-positive-001
    kind: positive
    labels:
      zh: 参与者能力绑定正例
      en: Positive example of actor capability binding
      ja: アクター能力バインディングの正例
    scenario_id: null
    descriptions:
      zh: cap-binding-8 允许 agent-7 在 production-readonly 环境和 session-4 中调用 document_search v3，每分钟最多二十次且禁止写操作。
      en: cap-binding-8 allows agent-7 to call document_search v3 in production-readonly for session-4, capped at twenty calls per minute and excluding writes.
      ja: cap-binding-8 は agent-7 に production-readonly の session-4 で document_search v3 を許し、毎分二十回上限と書込禁止を設定する。
    field_values:
      binding_id: cap-binding-8
      actor_ref: agent-7
      binding_kind: capability
      bound_object_ref: document_search-v3
      scope_ref: session-4
      validity:
        starts_at: 2026-07-16T10:00:00Z
        ends_when: session-4-closed
      provenance_ref: tool-availability-policy-4
      conditions:
        environment: production-readonly
        max_calls_per_minute: 20
        writes: forbidden
    related_node_ids:
      - ActorCapabilityBinding
      - AgentActor
      - Actor
    related_relation_ids:
      - has_actor_capability_binding
    expected_result:
      zh: cap-binding-8 归类为 ActorCapabilityBinding。
      en: cap-binding-8 is classified as ActorCapabilityBinding.
      ja: cap-binding-8 は ActorCapabilityBinding に分類される。
    why_valid_or_invalid:
      zh: 记录明确主体、能力版本、环境与会话范围、配额和禁止条件，表达受约束可用性。
      en: The record explicitly states participant, capability version, environment and session scope, quota, and prohibition, expressing constrained availability.
      ja: 主体、能力版、環境・セッション範囲、quota、禁止条件を明示し、制約付き利用可能性を表す。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-capability-binding-001
  - id: ActorCapabilityBinding-example-boundary-001
    kind: boundary
    labels:
      zh: 参与者能力绑定边界例
      en: Boundary case for actor capability binding
      ja: アクター能力バインディングの境界例
    scenario_id: null
    descriptions:
      zh: trace-55 记录 agent-7 已调用 document_search 一次，但没有说明未来是否可调用、适用版本、配额或权限范围。
      en: trace-55 records that agent-7 invoked document_search once but says nothing about future availability, version, quota, or authority scope.
      ja: trace-55 は agent-7 が document_search を一回呼んだと記録するが、将来の利用可能性、版、quota、権限範囲を述べない。
    field_values: {}
    related_node_ids:
      - ActorCapabilityBinding
      - AgentActor
      - ActorRoleBinding
      - Actor
    related_relation_ids:
      - has_actor_capability_binding
    expected_result:
      zh: trace-55 是调用证据，不是 ActorCapabilityBinding。
      en: trace-55 is invocation evidence, not an ActorCapabilityBinding.
      ja: trace-55 は呼出証拠で ActorCapabilityBinding ではない。
    why_valid_or_invalid:
      zh: 已发生调用与规定可用能力是不同事实；绑定需要规范性范围与条件。
      en: An occurred invocation and prescribed capability availability are different facts; a binding requires normative scope and conditions.
      ja: 発生済み呼出と規定された能力利用可能性は別事実で、束縛には規範的範囲と条件が必要である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-capability-binding-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ActorRoleBinding
    shared_parent_concept_id: ActorBinding
    differentia:
      zh: 已审查兄弟区分：父节点 ActorBinding：ActorCapabilityBinding（semantic kind=information，骨架 ActorCapabilityBinding-is_a-ActorBinding）；ActorRoleBinding（semantic kind=information，骨架 ActorRoleBinding-is_a-ActorBinding）。双端条件：ActorCapabilityBinding 条件：“参与者能力绑定属于主体绑定记录，区别于其他同类对象的条件是：它把运行参与者连接到可调用、可观测、检索、生成或审查能力，并同时记录允许使用这些能力的条件”；ActorRoleBinding 条件：“参与者角色绑定属于主体绑定记录，区别于其他同类对象的条件是：它把运行参与者绑定到承担责任的角色，使委派、审查、批准和问责保持可追踪”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ActorBinding: ActorCapabilityBinding (semantic kind=information, backbone ActorCapabilityBinding-is_a-ActorBinding); ActorRoleBinding (semantic kind=information, backbone ActorRoleBinding-is_a-ActorBinding). Endpoint conditions: ActorCapabilityBinding condition: “Actor capability binding is an actor binding whose defining condition is that it is a binding record that connects a runtime actor to callable, observable, retrieval, generation, or review capabilities together with allowed conditions of use”; ActorRoleBinding condition: “Actor role binding is an actor binding whose defining condition is that it is an assignment record that binds a runtime actor to a responsibility-bearing role so delegation, review, approval, and accountability remain traceable”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ActorBinding：ActorCapabilityBinding（semantic kind=information、バックボーン ActorCapabilityBinding-is_a-ActorBinding）；ActorRoleBinding（semantic kind=information、バックボーン ActorRoleBinding-is_a-ActorBinding）。両端条件：ActorCapabilityBinding の条件：「アクター能力バインディングはアクター束縛記録のうち、次の事実を定義条件とする対象です：それは、実行アクターを呼び出し、観測、検索、生成、レビューの能力へ結び付け、その利用条件を併せて記録します」；ActorRoleBinding の条件：「アクター役割バインディングはアクター束縛記録のうち、次の事実を定義条件とする対象です：それは、実行アクターを責任を伴う役割へ結び付け、委任、レビュー、承認、説明責任を追跡可能にします」。一方の成立は他方を証明しません。
    source_claims:
      - claim-actor-capability-binding-002
parent_relation:
  id: ActorCapabilityBinding-is_a-ActorBinding
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种主体绑定
    en: is an actor binding
    ja: アクター束縛の一種である
  definitions:
    zh: ActorCapabilityBinding-is_a-ActorBinding 表示每个参与者能力绑定都继承 ActorBinding 的主体、范围、有效期与来源要求，并以受约束的能力可用性为种差；一次实际调用或成功结果不属于该子类。
    en: ActorCapabilityBinding-is_a-ActorBinding states that every actor-capability binding inherits ActorBinding identity, scope, validity, and provenance requirements and is differentiated by constrained capability availability; an invocation or successful result is not this subtype.
    ja: ActorCapabilityBinding-is_a-ActorBinding は全ての能力束縛が ActorBinding の主体・範囲・有効期間・来歴要件を継承し、制約付き能力可用性を種差とすることを表す。実際の呼出しや成功結果はこの型ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有能力绑定子类
      en: has capability-binding subtype
      ja: 能力束縛下位型を持つ
  conditions:
    - id: ActorCapabilityBinding-is_a-ActorBinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the record first satisfies every ActorBinding identity condition and explicitly names capability version, applicable session or environment, use conditions, and validity.
      explanations:
        zh: 仅当记录先满足 ActorBinding 的全部身份条件，并明确能力版本、适用会话或环境、使用条件与有效期时成立。
        en: Assert only when the record first satisfies every ActorBinding identity condition and explicitly names capability version, applicable session or environment, use conditions, and validity.
        ja: 記録がまず ActorBinding の全同一性条件を満たし、能力版、適用セッションまたは環境、利用条件、有効期間を明示する時だけ成立する。
      source_claims:
        - claim-actor-capability-binding-003
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ActorCapabilityBinding-is_a-ActorBinding-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种主体绑定正例
        en: "Positive case: is an actor binding"
        ja: アクター束縛の一種であるの正例
      scenario_id: null
      descriptions:
        zh: cap-binding-8 将 agent-7 与 document_search v3 绑定到 session-4 的 production-readonly 范围，并记录速率上限与禁止写入条件。
        en: cap-binding-8 binds agent-7 to document_search v3 in session-4 under production-readonly scope, with a rate limit and an explicit write prohibition.
        ja: cap-binding-8 は agent-7 を session-4 の production-readonly 範囲で document_search v3 に束縛し、速度上限と書込み禁止を記録する。
      field_values: {}
      related_node_ids:
