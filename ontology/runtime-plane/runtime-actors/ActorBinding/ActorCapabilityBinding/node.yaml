examples:
  - id: ActorCapabilityBinding-example-positive-001
    labels:
      zh: MCP filesystem.read 能力绑定
      en: MCP filesystem.read capability binding
      ja: MCP filesystem.read ケイパビリティバインディング
    descriptions:
      zh: MCP tools/list 返回 filesystem.read；ActorCapabilityBinding binding_id=cap-fs-read-repo、capability=filesystem.read、scope_ref=repo:moonweave/schema。
      en: MCP tools/list returns filesystem.read; ActorCapabilityBinding binding_id=cap-fs-read-repo, capability=filesystem.read, scope_ref=repo:moonweave/schema.
      ja: MCP filesystem.read が repo scope に CapabilityBinding される。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      binding_id: cap-binding-8
      actor_ref: agent-7
      binding_kind: capability
      bound_object_ref: document_search-v3
      scope_ref: session-4
      validity:
        starts_at: 2026-07-16T10:00:00Z
        ends_when: session-4-closed
      provenance_ref: tool-availability-policy-4
      conditions:
        environment: production-readonly
        max_calls_per_minute: 20
        writes: forbidden
    related_node_ids:
      - ActorCapabilityBinding
      - AgentActor
      - Actor
    related_relation_ids:
      - has_actor_capability_binding
    source_claims:
      - claim-actor-capability-binding-design
  - id: ActorCapabilityBinding-example-boundary-001
    labels:
      zh: OpenAI tools 数组非 CapabilityBinding
      en: OpenAI tools array not CapabilityBinding
      ja: OpenAI tools 配列は CapabilityBinding ではない
    descriptions:
      zh: OpenAI Agent tools=[get_weather] 是工具 schema 列表，无 capability+scope 绑定记录，不是 ActorCapabilityBinding。
      en: OpenAI Agent tools=[get_weather] is tool schema list without capability+scope binding record, not ActorCapabilityBinding.
      ja: tools 配列だけでは CapabilityBinding にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorCapabilityBinding
      - AgentActor
      - ActorRoleBinding
      - Actor
    related_relation_ids:
      - has_actor_capability_binding
    source_claims:
      - claim-actor-capability-binding-design
  - id: ActorCapabilityBinding-example-3
    labels:
      zh: CapabilityBinding 与 ToolServiceActor 边界
      en: CapabilityBinding versus ToolServiceActor boundary
      ja: CapabilityBinding と ToolServiceActor 境界
    descriptions:
      zh: ActorCapabilityBinding 记录 actor 在 scope 内可用 capability；ToolServiceActor 是执行服务主体；capability 绑定与 tool 服务 Actor 分离。
      en: ActorCapabilityBinding records actor capability available within scope; ToolServiceActor is execution service principal; capability binding separated from tool service Actor.
      ja: CapabilityBinding と ToolServiceActor は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorCapabilityBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-capability-binding-vendor
      - claim-actor-capability-binding-design
  - id: ActorCapabilityBinding-example-4
    labels:
      zh: repo read 能力 scope 实例
      en: repo read capability scope instance
      ja: repo read ケイパビリティ scope 事例
    descriptions:
      zh: ActorCapabilityBinding binding_id=cap-fs-read-repo、actor_id=openai-weather-agent、capability=filesystem.read、scope_ref=repo:moonweave/schema。
      en: ActorCapabilityBinding binding_id=cap-fs-read-repo, actor_id=openai-weather-agent, capability=filesystem.read, scope_ref=repo:moonweave/schema.
      ja: cap-fs-read-repo CapabilityBinding を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorCapabilityBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-capability-binding-vendor
      - claim-actor-capability-binding-design
parent_relation:
  id: ActorCapabilityBinding-is_a-ActorBinding
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种主体绑定
    en: is an actor binding
    ja: アクター束縛の一種である
  definitions:
    zh: ActorCapabilityBinding-is_a-ActorBinding 表示每个参与者能力绑定都继承 ActorBinding 的主体、范围、有效期与来源要求，并以受约束的能力可用性为种差；一次实际调用或成功结果不属于该子类。
    en: ActorCapabilityBinding-is_a-ActorBinding states that every actor-capability binding inherits ActorBinding identity, scope, validity, and provenance requirements and is differentiated by constrained capability availability; an invocation or successful result is not this subtype.
    ja: ActorCapabilityBinding-is_a-ActorBinding は全ての能力束縛が ActorBinding の主体・範囲・有効期間・来歴要件を継承し、制約付き能力可用性を種差とすることを表す。実際の呼出しや成功結果はこの型ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有能力绑定子类
      en: has capability-binding subtype
      ja: 能力束縛下位型を持つ
  conditions:
    - id: ActorCapabilityBinding-is_a-ActorBinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the record first satisfies every ActorBinding identity condition and explicitly names capability version, applicable session or environment, use conditions, and validity.
      explanations:
        zh: 仅当记录先满足 ActorBinding 的全部身份条件，并明确能力版本、适用会话或环境、使用条件与有效期时成立。
        en: Assert only when the record first satisfies every ActorBinding identity condition and explicitly names capability version, applicable session or environment, use conditions, and validity.
        ja: 記録がまず ActorBinding の全同一性条件を満たし、能力版、適用セッションまたは環境、利用条件、有効期間を明示する時だけ成立する。
      source_claims:
        - claim-actor-capability-binding-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-actor-capability-binding-design
  distinct_fact_rationale:
    zh: 这是严格子类边；它不复制 has_actor_capability_binding 的实例级连接。
    en: This is a strict subtype edge and does not duplicate the instance-level has_actor_capability_binding fact.
    ja: 厳密な下位型辺であり、インスタンス級 has_actor_capability_binding を複製しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
