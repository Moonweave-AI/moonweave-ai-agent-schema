  - id: actorcapabilitybinding-instance
    labels: {zh: "repo read 能力 scope 实例", en: "repo read capability scope instance", ja: "repo read ケイパビリティ scope 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ActorCapabilityBinding.", en: "Langfuse instance: trace+span+score->ActorCapabilityBinding.", ja: "Langfuse instance maps to ActorCapabilityBinding."}
    field_values: {"binding_id":"capbind-8","actor_ref":"actor:agent-reviewer-2","scope_ref":"repo:moonweave","capability_ref":"capability:filesystem.read","resource_scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorCapabilityBinding","CapabilityDefinition"]
    related_relation_ids: ["ActorCapabilityBinding-binds-CapabilityDefinition"]
