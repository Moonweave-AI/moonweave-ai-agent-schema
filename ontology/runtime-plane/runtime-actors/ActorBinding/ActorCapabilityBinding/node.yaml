source_claims:
  - id: claim-actor-capability-binding-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK distinguishes configured or conditionally enabled tools from individual tool calls. Moonweave records actor-specific scoped availability as ActorCapabilityBinding.
    locator: Agents > Basic configuration > tools; Tools > conditional enablement
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-actor-capability-binding-002
    source: eng-fw-openai-python-docs
    supports: OpenAI Agent configuration exposes tools and MCP servers as callable capabilities, while handoffs and manager patterns assign responsibility for work. Moonweave reifies the former as ActorCapabilityBinding and the latter as ActorRoleBinding; both are scoped bindings, but capability answers what the actor can invoke and role answers what responsibility the actor bears.
    locator: Agents > Basic configuration > tools, mcp_servers, and handoffs; Multi-agent system design patterns
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-actor-capability-binding-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK distinguishes tools configured or conditionally enabled for an agent from individual tool calls and their results. Moonweave records the scoped availability as ActorCapabilityBinding.
    locator: Agents > Basic configuration > tools; Tools > conditional enablement
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

