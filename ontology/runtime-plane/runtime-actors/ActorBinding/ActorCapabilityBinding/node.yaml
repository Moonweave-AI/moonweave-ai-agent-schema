    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorCapabilityBinding preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorCapabilityBinding preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"mcp_capability":"tools"}
