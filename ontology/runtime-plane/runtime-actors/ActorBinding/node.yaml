schema: moonweave.ai/ontology-node/v1
id: ActorBinding
kind: concept
labels:
  zh: 主体绑定记录
  en: actor binding
  ja: アクター束縛記録
semantics:
  short_definition:
    zh: 主体绑定记录是在明确范围和有效期内把运行参与主体关联到角色、能力或权限的信息记录。
    en: An ActorBinding is an information record linking a runtime Actor to a role, capability, or authority within a stated scope and validity interval.
    ja: ActorBinding は明示された範囲と有効期間で実行 Actor を役割、能力、権限へ結ぶ情報記録である。
  definition:
    zh: 主体绑定记录是一类可审计信息；其种差是它同时标识参与主体、被绑定对象、适用范围、有效时间、授予或声明来源以及条件，用来说明某个主体何时以何种资格参与运行。ActorRoleBinding 与 ActorCapabilityBinding 是其具体类型；参与主体、角色定义、能力定义或权限范围本身都不是绑定记录。
    en: An ActorBinding is auditable information distinguished by jointly identifying the Actor, bound object, applicable scope, validity time, grant or assertion source, and conditions, thereby stating when and in what capacity an Actor participates. ActorRoleBinding and ActorCapabilityBinding specialize it; the Actor, role definition, capability definition, and authority scope themselves are not binding records.
    ja: ActorBinding は、Actor、束縛対象、適用範囲、有効時間、付与・主張元、条件を共同で識別し、Actor がいつどの資格で実行へ参加するかを述べる監査可能情報である。ActorRoleBinding と ActorCapabilityBinding が特殊化し、Actor、役割定義、能力定義、権限範囲自体は束縛記録ではない。
  why_needed:
    zh: 该记录把可变化的角色、能力和权限从参与主体身份中分离，使撤销、过期、委派来源与历史审计能够表达。
    en: This record separates changing roles, capabilities, and authority from Actor identity so revocation, expiry, delegation source, and historical audit can be represented.
    ja: この記録は変化する役割、能力、権限を Actor 識別から分け、取消、期限切れ、委任元、履歴監査を表現できる。
  includes:
    - zh: 纳入同时给出 actor_id、绑定类型或对象、范围、有效期与来源，并对一次或多次运行适用的角色、能力或权限分配记录。
      en: Includes an assignment record with actor_id, binding kind or object, scope, validity, and provenance that applies a role, capability, or authority to one or more runs.
      ja: actor_id、束縛種別・対象、範囲、有効性、来歴を持ち、一回以上の実行へ役割、能力、権限を適用する割当記録を含む。
  excludes:
    - zh: 不纳入 Actor、Role 或 Capability 定义、AuthorityScope、运行会话、一次调用事实或没有主体与有效范围的标签。
      en: Excludes an Actor, Role or Capability definition, AuthorityScope, runtime session, one invocation fact, and a label lacking both participant and valid scope.
      ja: Actor、Role・Capability 定義、AuthorityScope、実行セッション、単一呼出事実、主体と有効範囲を欠くラベルは含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 ActorBinding 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ActorBinding, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ActorBinding 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ActorBinding.
      format: |-
        # Example ActorBinding ingest
        { "actor-binding_ref": "example-1" }
      source_claims:
        - claim-actor-binding-design
  typical_output:
    - description: Moonweave-local ActorBinding projection.
      format: '{ "schema_owner": "moonweave-local-design", "actor-binding_id": "example-1" }'
      source_claims:
        - claim-actor-binding-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys:
    - binding_id
  fields:
    - id: binding_id
      labels:
        zh: 绑定标识
        en: binding ID
        ja: 束縛 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在系统边界内稳定标识一次可审计主体绑定记录。
        en: Stable identifier for one auditable actor-binding record within the system boundary.
        ja: システム境界内で一つの監査可能な主体束縛記録を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: binding-77
      source_claims:
        - claim-actor-binding-design
    - id: actor_ref
      labels:
        zh: 主体引用
        en: actor reference
        ja: 主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向承担该绑定资格或责任的具体 Actor。
        en: References the concrete Actor that bears the bound capacity or responsibility.
        ja: 束縛された資格または責任を担う具体的 Actor を参照します。
      allowed_values: []
      pattern: null
      example_value: actor-reviewer-001
      source_claims:
        - claim-actor-binding-design
    - id: binding_kind
      labels:
        zh: 绑定类别
        en: binding kind
        ja: 束縛種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分角色、能力或权限范围绑定的受控类别。
        en: Controlled category distinguishing role, capability, and authority-scope bindings.
        ja: 役割、能力、権限範囲の束縛を区別する制御カテゴリです。
      allowed_values:
        - id: actor-binding-kind-role
          value: role
          labels:
            zh: 角色
            en: role
            ja: 役割
          definitions:
            zh: 把主体关联到承担责任的角色。
            en: Links an Actor to a responsibility-bearing role.
            ja: Actor を責任を担う役割へ結びます。
          source_claims:
            - claim-actor-binding-design
        - id: actor-binding-kind-capability
          value: capability
          labels:
            zh: 能力
            en: capability
            ja: 能力
          definitions:
            zh: 把主体关联到可使用或提供的能力。
            en: Links an Actor to a capability it may use or provide.
            ja: Actor を利用または提供できる能力へ結びます。
          source_claims:
            - claim-actor-binding-design
        - id: actor-binding-kind-authority
          value: authority
          labels:
            zh: 权限
            en: authority
            ja: 権限
          definitions:
            zh: 把主体关联到可行使的权限范围。
            en: Links an Actor to an authority scope it may exercise.
            ja: Actor を行使可能な権限範囲へ結びます。
          source_claims:
            - claim-actor-binding-design
      pattern: null
      example_value: role
      source_claims:
        - claim-actor-binding-design
    - id: bound_object_ref
      labels:
        zh: 绑定对象引用
        en: bound object reference
        ja: 束縛対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本记录分配给主体的角色、能力或权限范围。
        en: References the role, capability, or authority scope assigned to the Actor by this record.
        ja: この記録が Actor へ割り当てる役割、能力、権限範囲を参照します。
      allowed_values: []
      pattern: null
      example_value: reviewer
      source_claims:
        - claim-actor-binding-design
    - id: scope_ref
      labels:
        zh: 适用范围引用
        en: scope reference
        ja: 適用範囲参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识绑定生效的发布、会话、任务、资源域或其他审计范围。
        en: Identifies the release, session, task, resource domain, or other audit scope in which the binding applies.
        ja: 束縛が有効な release、session、task、resource domain、その他の監査範囲を識別します。
      allowed_values: []
      pattern: null
      example_value: ontology-release-4
      source_claims:
        - claim-actor-binding-design
    - id: validity
      labels:
        zh: 有效性规则
        en: validity rule
        ja: 有効性規則
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出绑定的开始、结束或事件条件，使时间区间型与条件终止型绑定都可审计。
        en: States start, end, or event conditions so both interval-bound and condition-terminated bindings remain auditable.
        ja: 開始、終了、イベント条件を示し、時間区間型と条件終了型の束縛を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        starts_at: 2026-07-16T09:00:00Z
        ends_at: 2026-07-16T12:00:00Z
      source_claims:
        - claim-actor-binding-design
    - id: provenance_ref
      labels:
        zh: 授予来源引用
        en: grant provenance reference
        ja: 付与来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向创建、授予或声明该绑定的可追踪来源。
        en: References the traceable source that created, granted, or asserted the binding.
        ja: 束縛を作成、付与、主張した追跡可能な出所を参照します。
      allowed_values: []
      pattern: null
      example_value: grant-release-owner-04
      source_claims:
        - claim-actor-binding-design
    - id: conditions
      labels:
        zh: 使用条件
        en: conditions
        ja: 利用条件
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存不改变主体身份的限制条件，例如禁止自审、只读或速率上限。
        en: Stores restrictions that do not change Actor identity, such as no-self-review, read-only access, or rate limits.
        ja: 自己審査禁止、read-only、rate limit など Actor 識別を変えない制限を保持します。
      allowed_values: []
      pattern: null
      example_value:
        self_review: forbidden
      source_claims:
        - claim-actor-binding-design
  constraints:
    - id: actor-binding-kind-consistency
      severity: error
      expression_language: plain
      expression: binding_kind must agree with the most specific ActorBinding subtype, and validity must define at least one start or end condition without an end preceding its start
      explanations:
        zh: 绑定类别必须与最具体下位类型一致；有效性至少给出一个边界或条件，且结束不得早于开始。
        en: binding_kind must match the most specific subtype; validity states at least one boundary or condition and cannot end before it starts.
        ja: binding_kind は最具体下位型と一致し、有効性は少なくとも一境界・条件を持ち終了は開始より前になりません。
      source_claims:
        - claim-actor-binding-design
  required_relation_constraints:
    - id: actor-binding-linked-from-actor
      direction: incoming
      predicate: has_binding
      target_concept_id: Actor
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每项 ActorBinding 必须恰由一个具体 Actor 持有。
        en: Every ActorBinding is held by exactly one concrete Actor.
        ja: 各 ActorBinding はちょうど一つの具体的 Actor に保持されます。
      source_claims:
        - claim-actor-binding-design
examples:
  - id: ActorBinding-example-positive-001
    labels:
      zh: OpenAI handoff 绑定
      en: OpenAI handoff binding
      ja: OpenAI handoff バインディング
    descriptions:
      zh: OpenAI Agents SDK triage_agent handoffs=[booking_agent] 产生 ActorBinding binding_id=handoff-triage-booking、source_actor=triage_agent、target_scope=booking_agent。
      en: OpenAI Agents SDK triage_agent handoffs=[booking_agent] produces ActorBinding binding_id=handoff-triage-booking, source_actor=triage_agent, target_scope=booking_agent.
      ja: OpenAI handoffs が ActorBinding を生成する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      binding_id: binding-77
      actor_ref: actor-reviewer-001
      binding_kind: role
      bound_object_ref: reviewer
      scope_ref: ontology-release-4
      validity:
        starts_at: 2026-07-16T09:00:00Z
        ends_at: 2026-07-16T12:00:00Z
      provenance_ref: grant-release-owner-04
      conditions:
        self_review: forbidden
    related_node_ids:
      - ActorBinding
      - Actor
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    source_claims:
      - claim-actor-binding-design
  - id: ActorBinding-example-boundary-001
    labels:
      zh: 全局 tools 列表非 Binding
      en: Global tools list not Binding
      ja: グローバル tools 一覧は Binding ではない
    descriptions:
      zh: Agent tools=[get_weather, read_file] 全局列表无 source/target scope，不是 ActorBinding。
      en: Agent tools=[get_weather, read_file] global list without source/target scope is not ActorBinding.
      ja: tools 一覧だけでは ActorBinding にならない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorBinding
      - Actor
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    source_claims:
      - claim-actor-binding-design
  - id: ActorBinding-example-3
    labels:
      zh: ActorBinding 与 ActorRoleBinding 边界
      en: ActorBinding versus ActorRoleBinding boundary
      ja: ActorBinding と ActorRoleBinding 境界
    descriptions:
      zh: ActorBinding 泛化 actor 间绑定；ActorRoleBinding 绑定 role；ActorCapabilityBinding 绑定 capability；handoff 是 AgentBinding 子类型。
      en: ActorBinding generalizes inter-actor binding; ActorRoleBinding binds role; ActorCapabilityBinding binds capability; handoff is AgentBinding subtype.
      ja: Binding 类型は scope によって分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-binding-vendor
      - claim-actor-binding-design
  - id: ActorBinding-example-4
    labels:
      zh: triage→booking handoff 实例
      en: triage to booking handoff instance
      ja: triage→booking handoff 事例
    descriptions:
      zh: ActorBinding binding_id=handoff-triage-booking、source_actor_id=openai-triage-agent、target_actor_id=openai-booking-agent。
      en: ActorBinding binding_id=handoff-triage-booking, source_actor_id=openai-triage-agent, target_actor_id=openai-booking-agent.
      ja: handoff-triage-booking ActorBinding を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - ActorBinding
    related_relation_ids: []
    source_claims:
      - claim-actor-binding-vendor
      - claim-actor-binding-design
parent_relation: null
relations: []
sources:
  - id: src-openai-assistants
    title: OpenAI Assistants API
    url: https://platform.openai.com/docs/api-reference/assistants
    source_type: official-doc
    relevance: Assistant, model, and tool role objects for AgentActor, Model, ToolServiceActor.
  - id: src-langgraph
    title: LangGraph Documentation
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Compiled node executors and runnable config actor metadata.
  - id: src-anthropic-messages
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Message roles and streaming for actor participation evidence.
  - id: src-a2a
    title: Agent2Agent (A2A) Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Agent Card discovery and remote AgentActor resolution.
  - id: src-runtime-actors-design
    title: Moonweave runtime-actors module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Actor, RuntimeRole, Model, ActorBinding, RemoteAgentReference boundaries.
source_claims:
  - id: claim-actor-binding-vendor
    source: src-openai-assistants
    supports: runtime-actors vendor evidence supports ActorBinding identity and boundary mapping.
    locator: ActorBinding integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-actor-binding-design
    source: src-runtime-actors-design
    supports: Moonweave ActorBinding concept boundary within runtime-actors.
    locator: ActorBinding boundary
    evidence_kind: design-inference
    confidence: high
