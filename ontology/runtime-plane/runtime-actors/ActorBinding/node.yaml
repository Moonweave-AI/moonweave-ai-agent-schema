    labels: {zh: "triage→booking handoff 实例", en: "triage to booking handoff instance", ja: "triage→booking handoff 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->ActorBinding.", en: "Langfuse instance: trace+span+score->ActorBinding.", ja: "Langfuse instance maps to ActorBinding."}
    field_values: {"binding_id":"bind-219","actor_ref":"actor:agent-reviewer-2","scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorBinding","Actor"]
    related_relation_ids: ["ActorBinding-binds-Actor"]
    source_claims: ["claim-binding-boundary"]
parent_relation: null
