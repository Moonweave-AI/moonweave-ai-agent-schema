    labels: {zh: "OpenAI handoff 绑定", en: "OpenAI handoff binding", ja: "OpenAI handoff バインディング"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ActorBinding maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ActorBinding maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ActorBinding provenance graph."}
    field_values: {"binding_id":"bind-219","actor_ref":"actor:agent-reviewer-2","scope_ref":"repo:moonweave"}
    related_node_ids: ["ActorBinding","Actor"]
    related_relation_ids: ["ActorBinding-binds-Actor"]
    source_claims: ["claim-binding-boundary"]
