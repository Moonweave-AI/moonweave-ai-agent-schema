schema: moonweave.ai/ontology-node/v1
id: ActorBinding
kind: concept
status: accepted
labels:
  zh: 参与者绑定
  en: Actor binding
  ja: アクターバインディング
semantics:
  short_definition:
    zh: Actor 与运行时分配上下文之间的本地、有作用域关联。
    en: A Moonweave local, scoped association between an Actor and a runtime assignment context.
    ja: Actor とランタイム割当コンテキストの間の Moonweave ローカル・スコープ付き関連。
  definition:
    zh: ActorBinding 是记录 Actor 如何在作用域与有效区间内被绑定的本地 qualified association（对齐 PROV-O prov:Association）。它不是 Actor 本身、A2A AgentCapabilities 文档、MCP 协商能力、OpenAI SDK Agent 配置，也不能证明一次 Execution 已发生。
    en: ActorBinding is a local qualified association that records how an Actor is bound within a scope and validity interval, aligned with PROV-O prov:Association. It is not the Actor itself, an A2A AgentCapabilities document, MCP negotiated capabilities, an OpenAI SDK Agent configuration, or proof that an execution occurred.
    ja: ActorBinding は、Actor がスコープと有効期間内でどのように束縛されるかを記録するローカル qualified association（PROV-O prov:Association に整合）である。Actor 自体、A2A AgentCapabilities 文書、MCP 協調能力、OpenAI SDK Agent 設定、Execution 発生の証明ではない。
  why_needed:
    zh: 分配事实独立于责任身份与执行历史变化；没有绑定记录就无法审计“谁在什么范围内被授权行动”。
    en: Assignment facts change independently of responsible identities and execution history; without binding records, auditing who was authorized to act in which scope is impossible.
    ja: 割当事実は責任 identity と実行履歴から独立して変化する。バインディング記録がなければ、どのスコープで誰が行動を許可されたかを監査できない。
  includes:
    - zh: 标识参与者、作用域及可选有效证据的本地有作用域关联。
      en: Scoped local associations that identify an actor, scope, and optional validity evidence.
      ja: アクター、スコープ、任意の有効性証拠を識別するスコープ付きローカル関連。
  excludes:
    - zh: 参与者身份、角色定义、能力定义、协议能力载荷或 Execution 事件。
      en: An actor identity, a role definition, a capability definition, a protocol capability payload, or an execution event.
      ja: 参加者 identity、ロール定義、能力定義、プロトコル能力ペイロード、Execution イベント。
  semantic_kind: entity
  aliases: ["qualified association","assignment record"]
engineering:
  explanation:
    zh: "The input is a local binding_id, actor_ref, and scope_ref. Output is an auditable Moonweave association; external protocol capabilities remain referenced evidence."
    en: "The input is a local binding_id, actor_ref, and scope_ref. Output is an auditable Moonweave association; external protocol capabilities remain referenced evidence."
    ja: "The input is a local binding_id, actor_ref, and scope_ref. Output is an auditable Moonweave association; external protocol capabilities remain referenced evidence."
  typical_input:
    - description:
        zh: "Local actor-assignment request."
        en: "Local actor-assignment request."
        ja: "Local actor-assignment request."
      format: "{\"binding_id\":\"bind-219\",\"actor_ref\":\"actor:agent-reviewer-2\",\"scope_ref\":\"repo:moonweave\"}"
  typical_output:
    - description:
        zh: "Local actor-binding record."
        en: "Local actor-binding record."
        ja: "Local actor-binding record."
      format: "{\"binding_id\":\"bind-219\",\"actor_ref\":\"actor:agent-reviewer-2\",\"scope_ref\":\"repo:moonweave\"}"
  reference_implementations:
    - name: "PROV-O"
      url: https://www.w3.org/TR/prov-o/
      description: "Defines qualified association and responsibility."
structure:
  identity_keys: ["binding_id"]
  fields:
    - id: binding_id
      labels:
        zh: "Binding ID"
        en: "Binding ID"
        ja: "Binding ID"
      definitions:
        zh: "Stable local identifier for the qualified association."
        en: "Stable local identifier for the qualified association."
        ja: "Stable local identifier for the qualified association."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "bind-219"
      source_claims: ["claim-binding-boundary"]
    - id: actor_ref
      labels:
        zh: "Actor reference"
        en: "Actor reference"
        ja: "Actor reference"
      definitions:
        zh: "Typed local reference to the separately recorded Actor."
        en: "Typed local reference to the separately recorded Actor."
        ja: "Typed local reference to the separately recorded Actor."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "actor:agent-reviewer-2"
      source_claims: ["claim-binding-boundary"]
    - id: scope_ref
      labels:
        zh: "Scope reference"
        en: "Scope reference"
        ja: "Scope reference"
      definitions:
        zh: "Local reference to the scope where the association applies."
        en: "Local reference to the scope where the association applies."
        ja: "Local reference to the scope where the association applies."
      datatype: string
      required: true
      cardinality: {"min":1,"max":1}
      example_value: "repo:moonweave"
      source_claims: ["claim-binding-boundary"]
  constraints:
    - id: actor-binding-requires-local-actor
      severity: error
      language: plain
      expression: "ActorBinding must reference a local Actor and explicit scope; it must not use an A2A, MCP, or SDK configuration payload as its identity."
      explanation:
        zh: "The binding records a Moonweave association, while external protocol concepts remain distinct."
        en: "The binding records a Moonweave association, while external protocol concepts remain distinct."
        ja: "The binding records a Moonweave association, while external protocol concepts remain distinct."
      source_claims: ["claim-binding-boundary"]
  required_relations: ["ActorBinding-binds-Actor"]
