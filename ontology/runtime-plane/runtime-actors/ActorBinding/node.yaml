    source: prov
    supports: "PROV-O qualified association supports a separate assignment record; A2A and MCP capabilities are protocol metadata rather than Moonweave ActorBinding identity."
    locator: "PROV-O qualified association; A2A Agent Discovery; MCP Architecture"
    evidence_kind: design-inference
    confidence: high

