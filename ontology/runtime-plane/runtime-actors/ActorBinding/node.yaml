      en: "binds actor"
      ja: "binds actor"
    definitions:
      zh: "A local ActorBinding links an Actor to a scoped assignment context."
      en: "A local ActorBinding links an Actor to a scoped assignment context."
      ja: "A local ActorBinding links an Actor to a scoped assignment context."
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
