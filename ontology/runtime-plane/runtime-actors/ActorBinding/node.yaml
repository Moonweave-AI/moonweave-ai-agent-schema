schema: moonweave.ai/ontology-node/v1
id: ActorBinding
kind: concept
status: review
labels:
  zh: 主体绑定记录
  en: actor binding
  ja: アクター束縛記録
semantics:
  short_definition:
    zh: 主体绑定记录是在明确范围和有效期内把运行参与主体关联到角色、能力或权限的信息记录。
    en: An ActorBinding is an information record linking a runtime Actor to a role, capability, or authority within a stated scope and validity interval.
    ja: ActorBinding は明示された範囲と有効期間で実行 Actor を役割、能力、権限へ結ぶ情報記録である。
  definition:
    zh: 主体绑定记录是一类可审计信息；其种差是它同时标识参与主体、被绑定对象、适用范围、有效时间、授予或声明来源以及条件，用来说明某个主体何时以何种资格参与运行。ActorRoleBinding 与 ActorCapabilityBinding 是其具体类型；参与主体、角色定义、能力定义或权限范围本身都不是绑定记录。
    en: An ActorBinding is auditable information distinguished by jointly identifying the Actor, bound object, applicable scope, validity time, grant or assertion source, and conditions, thereby stating when and in what capacity an Actor participates. ActorRoleBinding and ActorCapabilityBinding specialize it; the Actor, role definition, capability definition, and authority scope themselves are not binding records.
    ja: ActorBinding は、Actor、束縛対象、適用範囲、有効時間、付与・主張元、条件を共同で識別し、Actor がいつどの資格で実行へ参加するかを述べる監査可能情報である。ActorRoleBinding と ActorCapabilityBinding が特殊化し、Actor、役割定義、能力定義、権限範囲自体は束縛記録ではない。
  why_needed:
    zh: 该记录把可变化的角色、能力和权限从参与主体身份中分离，使撤销、过期、委派来源与历史审计能够表达。
    en: This record separates changing roles, capabilities, and authority from Actor identity so revocation, expiry, delegation source, and historical audit can be represented.
    ja: この記録は変化する役割、能力、権限を Actor 識別から分け、取消、期限切れ、委任元、履歴監査を表現できる。
  includes:
    - zh: 纳入同时给出 actor_id、绑定类型或对象、范围、有效期与来源，并对一次或多次运行适用的角色、能力或权限分配记录。
      en: Includes an assignment record with actor_id, binding kind or object, scope, validity, and provenance that applies a role, capability, or authority to one or more runs.
      ja: actor_id、束縛種別・対象、範囲、有効性、来歴を持ち、一回以上の実行へ役割、能力、権限を適用する割当記録を含む。
  excludes:
    - zh: 不纳入 Actor、Role 或 Capability 定义、AuthorityScope、运行会话、一次调用事实或没有主体与有效范围的标签。
      en: Excludes an Actor, Role or Capability definition, AuthorityScope, runtime session, one invocation fact, and a label lacking both participant and valid scope.
      ja: Actor、Role・Capability 定義、AuthorityScope、実行セッション、単一呼出事実、主体と有効範囲を欠くラベルは含まない。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - binding_id
  fields:
    - id: binding_id
      labels:
        zh: 绑定标识
        en: binding ID
        ja: 束縛 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在系统边界内稳定标识一次可审计主体绑定记录。
        en: Stable identifier for one auditable actor-binding record within the system boundary.
        ja: システム境界内で一つの監査可能な主体束縛記録を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: binding-77
      source_claims:
        - claim-actor-binding-002
    - id: actor_ref
      labels:
        zh: 主体引用
        en: actor reference
        ja: 主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向承担该绑定资格或责任的具体 Actor。
        en: References the concrete Actor that bears the bound capacity or responsibility.
        ja: 束縛された資格または責任を担う具体的 Actor を参照します。
      allowed_values: []
      pattern: null
      example_value: actor-reviewer-001
      source_claims:
        - claim-actor-binding-003
    - id: binding_kind
      labels:
        zh: 绑定类别
        en: binding kind
        ja: 束縛種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分角色、能力或权限范围绑定的受控类别。
        en: Controlled category distinguishing role, capability, and authority-scope bindings.
        ja: 役割、能力、権限範囲の束縛を区別する制御カテゴリです。
      allowed_values:
        - id: actor-binding-kind-role
          value: role
          labels:
            zh: 角色
            en: role
            ja: 役割
          definitions:
            zh: 把主体关联到承担责任的角色。
            en: Links an Actor to a responsibility-bearing role.
            ja: Actor を責任を担う役割へ結びます。
          status: accepted
          source_claims:
            - claim-actor-binding-004
        - id: actor-binding-kind-capability
          value: capability
          labels:
            zh: 能力
            en: capability
            ja: 能力
          definitions:
            zh: 把主体关联到可使用或提供的能力。
            en: Links an Actor to a capability it may use or provide.
            ja: Actor を利用または提供できる能力へ結びます。
          status: accepted
          source_claims:
            - claim-actor-binding-005
        - id: actor-binding-kind-authority
          value: authority
          labels:
            zh: 权限
            en: authority
            ja: 権限
          definitions:
            zh: 把主体关联到可行使的权限范围。
            en: Links an Actor to an authority scope it may exercise.
            ja: Actor を行使可能な権限範囲へ結びます。
          status: accepted
          source_claims:
            - claim-actor-binding-006
      pattern: null
      example_value: role
      source_claims:
        - claim-actor-binding-007
    - id: bound_object_ref
      labels:
        zh: 绑定对象引用
        en: bound object reference
        ja: 束縛対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本记录分配给主体的角色、能力或权限范围。
        en: References the role, capability, or authority scope assigned to the Actor by this record.
        ja: この記録が Actor へ割り当てる役割、能力、権限範囲を参照します。
      allowed_values: []
      pattern: null
      example_value: reviewer
      source_claims:
        - claim-actor-binding-008
    - id: scope_ref
      labels:
        zh: 适用范围引用
        en: scope reference
        ja: 適用範囲参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识绑定生效的发布、会话、任务、资源域或其他审计范围。
        en: Identifies the release, session, task, resource domain, or other audit scope in which the binding applies.
        ja: 束縛が有効な release、session、task、resource domain、その他の監査範囲を識別します。
      allowed_values: []
      pattern: null
      example_value: ontology-release-4
      source_claims:
        - claim-actor-binding-009
    - id: validity
      labels:
        zh: 有效性规则
        en: validity rule
        ja: 有効性規則
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出绑定的开始、结束或事件条件，使时间区间型与条件终止型绑定都可审计。
        en: States start, end, or event conditions so both interval-bound and condition-terminated bindings remain auditable.
        ja: 開始、終了、イベント条件を示し、時間区間型と条件終了型の束縛を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        starts_at: 2026-07-16T09:00:00Z
        ends_at: 2026-07-16T12:00:00Z
      source_claims:
        - claim-actor-binding-010
    - id: provenance_ref
      labels:
        zh: 授予来源引用
        en: grant provenance reference
        ja: 付与来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向创建、授予或声明该绑定的可追踪来源。
        en: References the traceable source that created, granted, or asserted the binding.
        ja: 束縛を作成、付与、主張した追跡可能な出所を参照します。
      allowed_values: []
      pattern: null
      example_value: grant-release-owner-04
      source_claims:
        - claim-actor-binding-011
    - id: conditions
      labels:
        zh: 使用条件
        en: conditions
        ja: 利用条件
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存不改变主体身份的限制条件，例如禁止自审、只读或速率上限。
        en: Stores restrictions that do not change Actor identity, such as no-self-review, read-only access, or rate limits.
        ja: 自己審査禁止、read-only、rate limit など Actor 識別を変えない制限を保持します。
      allowed_values: []
      pattern: null
      example_value:
        self_review: forbidden
      source_claims:
        - claim-actor-binding-012
  constraints:
    - id: actor-binding-kind-consistency
      severity: error
      expression_language: plain
      expression: binding_kind must agree with the most specific ActorBinding subtype, and validity must define at least one start or end condition without an end preceding its start
      explanations:
        zh: 绑定类别必须与最具体下位类型一致；有效性至少给出一个边界或条件，且结束不得早于开始。
        en: binding_kind must match the most specific subtype; validity states at least one boundary or condition and cannot end before it starts.
        ja: binding_kind は最具体下位型と一致し、有効性は少なくとも一境界・条件を持ち終了は開始より前になりません。
      source_claims:
        - claim-actor-binding-013
  required_relation_constraints:
    - id: actor-binding-linked-from-actor
      direction: incoming
      predicate: has_binding
      target_concept_id: Actor
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每项 ActorBinding 必须恰由一个具体 Actor 持有。
        en: Every ActorBinding is held by exactly one concrete Actor.
        ja: 各 ActorBinding はちょうど一つの具体的 Actor に保持されます。
      source_claims:
        - claim-actor-binding-014
examples:
  - id: ActorBinding-example-positive-001
    kind: positive
    labels:
      zh: 主体绑定记录正例
      en: Positive example of actor binding
      ja: アクター束縛記録の正例
    scenario_id: null
    descriptions:
      zh: binding-77 把 actor-reviewer-001 与 reviewer 角色关联到 ontology-release-4，记录 09:00—12:00 的有效期、授予者和不得审核本人提交的条件。
      en: binding-77 links actor-reviewer-001 to the reviewer role for ontology-release-4, recording 09:00-12:00 validity, grantor, and a no-self-review condition.
      ja: binding-77 は actor-reviewer-001 を ontology-release-4 の reviewer 役割へ結び、09:00–12:00 の有効期間、付与者、自己提出審査禁止条件を記録する。
    field_values:
      binding_id: binding-77
      actor_ref: actor-reviewer-001
      binding_kind: role
      bound_object_ref: reviewer
      scope_ref: ontology-release-4
      validity:
        starts_at: 2026-07-16T09:00:00Z
        ends_at: 2026-07-16T12:00:00Z
      provenance_ref: grant-release-owner-04
      conditions:
        self_review: forbidden
    related_node_ids:
      - ActorBinding
      - Actor
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    expected_result:
      zh: binding-77 归类为 ActorBinding，并可进一步归为 ActorRoleBinding。
      en: binding-77 is an ActorBinding and can be further classified as ActorRoleBinding.
      ja: binding-77 は ActorBinding であり、さらに ActorRoleBinding に分類できる。
    why_valid_or_invalid:
      zh: 记录完整表达主体、绑定对象、范围、有效期、来源和约束，而不是只给一个角色名称。
      en: The record fully states participant, bound object, scope, validity, provenance, and condition rather than only a role name.
      ja: 主体、束縛対象、範囲、有効性、来歴、条件を完全に述べ、役割名だけではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-binding-001
  - id: ActorBinding-example-boundary-001
    kind: boundary
    labels:
      zh: 主体绑定记录边界例
      en: Boundary case for actor binding
      ja: アクター束縛記録の境界例
    scenario_id: null
    descriptions:
      zh: 标签 reviewer 出现在界面上，却没有 actor_id、适用发布、有效期或授予来源。
      en: The label reviewer appears in a UI but has no actor_id, applicable release, validity, or grant source.
      ja: UI に reviewer ラベルがあるが、actor_id、対象 release、有効性、付与元がない。
    field_values: {}
    related_node_ids:
      - ActorBinding
      - Actor
    related_relation_ids:
      - Actor-has_binding-ActorBinding
    expected_result:
      zh: 该标签不是 ActorBinding，最多是尚未绑定的角色词汇。
      en: The label is not an ActorBinding and is at most an unbound role term.
      ja: このラベルは ActorBinding ではなく、未束縛の役割語にすぎない。
    why_valid_or_invalid:
      zh: 绑定记录必须把具体主体和绑定对象置于可审计范围与时间中。
      en: A binding record must place a concrete participant and bound object inside an auditable scope and time.
      ja: 束縛記録は具体的主体と対象を監査可能な範囲・時間へ置く必要がある。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-actor-binding-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
  - id: claim-actor-binding-001
    source: eng-ont-prov-o
    supports: PROV-O qualified Association separates Agent, Activity, and Role. Moonweave materializes the scoped, time-qualified assignment as ActorBinding instead of changing Actor identity.
    locator: W3C PROV-O Recommendation §3.1–3.2 > Agent, SoftwareAgent, Association, and Role
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-002
    source: eng-ont-prov-o
    supports: PROV-O reifies a qualified Association so it can carry its own descriptions. Moonweave introduces binding_id to keep each scoped association independently addressable; PROV-O does not prescribe this identifier field.
    locator: W3C PROV-O Recommendation §3.3 and §4 > qualified Association as an identifiable influence record
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-003
    source: eng-ont-prov-o
    supports: PROV-O requires a qualified Association to identify its participating Agent through prov:agent. actor_ref is Moonweave's canonical reference form for that participant.
    locator: W3C PROV-O Recommendation §4 > prov:Association described with prov:agent
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-004
    source: eng-ont-prov-o
    supports: PROV-O permits an Association to state the Agent's role. Moonweave uses role as the controlled discriminator for that binding branch.
    locator: W3C PROV-O Recommendation §4 > prov:Association and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-005
    source: eng-fw-openai-python-docs
    supports: The SDK makes tool availability configurable and conditionally enabled per agent context. Moonweave reifies that scoped availability under the capability discriminator.
    locator: OpenAI Agents SDK > Agents > Basic configuration > tools and conditional enablement
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-binding-006
    source: eng-ont-prov-o
    supports: PROV-O represents attributable responsibility but does not define application authorization. Moonweave adds authority as a local discriminator for scoped permission-bearing bindings.
    locator: W3C PROV-O Recommendation §3.1 and §3.3 > Agent responsibility and qualified influence
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-actor-binding-007
    source: eng-ont-prov-o
    supports: PROV-O distinguishes the participating Agent and optional Role in an Association while allowing domain-specific specialization. Moonweave uses binding_kind to keep role, capability, and authority assignments non-interchangeable.
    locator: W3C PROV-O Recommendation §3.3 and §4 > qualified Association, Agent, Role, and extensible descriptions
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-008
    source: eng-ont-prov-o
    supports: PROV-O lets an Association identify the role borne by its Agent and permits domain extensions. bound_object_ref generalizes that endpoint to Moonweave roles, capabilities, or authority scopes.
    locator: W3C PROV-O Recommendation §4 > prov:Association described with prov:hadRole and application properties
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-009
    source: eng-ont-prov-o
    supports: A PROV Association is qualified in the context of an Activity and may cite a Plan. Moonweave normalizes the applicable operational boundary as scope_ref rather than treating a role as globally permanent.
    locator: W3C PROV-O Recommendation §4 > qualified Association contextualized by its Activity and Plan
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-010
    source: eng-ont-prov-o
    supports: PROV-O associates responsibility with an Activity whose interval can be recorded. Moonweave places the binding's effective interval or ending condition directly on the reified ActorBinding as validity.
    locator: W3C PROV-O Recommendation §3.1 and §4 > Activity startedAtTime, endedAtTime, and qualified Association
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-011
    source: eng-ont-prov-o
    supports: PROV-O's purpose is to preserve attributable influence and responsibility. provenance_ref is Moonweave's audit link to the grant or assertion that produced this binding.
    locator: W3C PROV-O Recommendation §3.1–3.3 > attribution, association, and qualified influence provenance
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-012
    source: eng-ont-prov-o
    supports: PROV-O's qualified influence pattern allows application-specific descriptions on the reified relationship. Moonweave stores binding-local restrictions in conditions rather than changing the Actor or bound object.
    locator: W3C PROV-O Recommendation §3.3 > qualified influence may carry additional application descriptions
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-013
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Association roles and Activity time. Moonweave validates subtype coherence and non-contradictory effective time as local closed-world rules.
    locator: W3C PROV-O Recommendation §3.1, §3.3, and §4 > Activity time and qualified Association semantics
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-actor-binding-014
    source: eng-ont-prov-o
    supports: A qualified Association identifies the Agent whose responsibility it qualifies. Moonweave enforces one canonical owning Actor for an ActorBinding through the reviewed has_binding relation.
    locator: W3C PROV-O Recommendation §4 > prov:Association described with exactly its participating prov:agent in the qualified pattern
    evidence_kind: design-inference
    confidence: high
    review_status: pending
