    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorBinding preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ActorBinding preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {"mcp_capabilities":["tools"]}
