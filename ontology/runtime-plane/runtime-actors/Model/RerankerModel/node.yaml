schema: moonweave.ai/ontology-node/v1
id: RerankerModel
kind: concept
status: accepted
labels:
  en: reranker model
  zh: 重排序模型
  ja: 再順位付けモデル
semantics:
  short_definition:
    zh: 重排序模型是依据查询与候选内容重新评分并输出候选顺序的运行模型。
    en: A RerankerModel is a Model that rescores supplied candidates against a query and outputs their ordering.
    ja: RerankerModel は query に対して与えられた候補を再採点し、順序を出力する Model である。
  definition:
    zh: 重排序模型是 Model 的一种；其种差是推理输入同时包含查询或目标以及一组已检索候选，输出为候选相关性分数、偏好或重排顺序，而不负责最初发现候选。它不是生成向量的 EmbeddingModel、执行检索的索引或搜索活动、生成开放式内容的 GenerativeModel，也不是排序后的 RetrievedChunk 本身。
    en: A RerankerModel is a Model distinguished by inference over both a query or objective and an already retrieved candidate set, producing candidate relevance scores, preferences, or a reordered list without performing initial candidate discovery. It is not an EmbeddingModel, retrieval index or search activity, open-ended GenerativeModel, or the ranked RetrievedChunk itself.
    ja: RerankerModel は Model の一種で、query・目的と既検索候補集合を共に入力し、候補の関連 score、選好、再配列を出力し、初期候補発見は行わない。EmbeddingModel、検索 index・活動、開放生成 GenerativeModel、順位付き RetrievedChunk 自体ではない。
  why_needed:
    zh: 该子类把候选发现与候选精排分开，使评估、延迟和输入上限能够针对重排序阶段管理。
    en: This subtype separates candidate discovery from fine reranking so evaluation, latency, and input limits can be managed for the reranking stage.
    ja: この下位型は候補発見と精密再配列を分け、評価、遅延、入力上限を reranking 段階ごとに管理できる。
  includes:
    - zh: 纳入接收查询与候选文本、输出每个候选分数或新顺序，并由此改进最终上下文选择的模型版本。
      en: Includes a model version that consumes a query and candidate texts, outputs candidate scores or a new order, and thereby refines final context selection.
      ja: query と候補 text を受け、候補 score または新順序を出し、最終 context 選択を精密化するモデル版を含む。
  excludes:
    - zh: 不纳入向量检索器、EmbeddingModel、只生成查询的 GenerativeModel、静态排序规则、排序结果列表或 RetrievedChunk。
      en: Excludes a vector retriever, EmbeddingModel, GenerativeModel that only writes a query, static sort rule, ranked result list, and RetrievedChunk.
      ja: vector 検索器、EmbeddingModel、query 生成だけの GenerativeModel、静的 sort rule、順位結果 list、RetrievedChunk は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: RerankerModel-example-positive-001
    kind: positive
    labels:
      zh: 重排序模型正例
      en: Positive example of reranker model
      ja: 再順位付けモデルの正例
    scenario_id: null
    descriptions:
      zh: rerank-v2 接收问题与初检的五十个文档块，为每个块计算相关性分数并返回前八个的新顺序。
      en: rerank-v2 receives a question and fifty initially retrieved chunks, scores each for relevance, and returns a new top-eight ordering.
      ja: rerank-v2 は質問と初期検索された五十文書 chunk を受け、各関連 score を計算し、新しい上位八件順序を返す。
    field_values:
      model_id: rerank-v2
      model_version: 2.0.0
      model_kind: reranker
      resolver_ref: cohere-rerank-provider
      capability_profile:
        maximum_candidates: 50
        returned_candidates: 8
        score_semantics: query-relevance
    related_node_ids:
      - RerankerModel
      - RetrievedChunk
    related_relation_ids:
      - reranks_result
    expected_result:
      zh: rerank-v2 归类为 RerankerModel。
      en: rerank-v2 is classified as RerankerModel.
      ja: rerank-v2 は RerankerModel に分類される。
    why_valid_or_invalid:
      zh: 输入包含已发现候选，核心输出是候选相关性分数与重排顺序。
      en: The input already contains discovered candidates and the core output is candidate relevance scores and reordered ranking.
      ja: 入力に既発見候補があり、核心出力が候補関連 score と再配列順序である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-reranker-model-001
  - id: RerankerModel-example-boundary-001
    kind: boundary
    labels:
      zh: 重排序模型边界例
      en: Boundary case for reranker model
      ja: 再順位付けモデルの境界例
    scenario_id: null
    descriptions:
      zh: vector-search 在索引中用余弦距离发现最相近的五十个块，但不读取候选全文做二次评分，也不改变检索顺序。
      en: vector-search discovers fifty nearest chunks in an index by cosine distance but does not read candidate text for second-stage scoring or change the retrieval order.
      ja: vector-search は index で cosine 距離により近傍五十 chunk を発見するが、候補全文の二次採点や順序変更を行わない。
    field_values: {}
    related_node_ids:
      - RerankerModel
      - RetrievedChunk
      - EmbeddingModel
    related_relation_ids:
      - reranks_result
    expected_result:
      zh: 该组件是检索活动或索引服务，不是 RerankerModel。
      en: The component is a retrieval activity or index service, not a RerankerModel.
      ja: このコンポーネントは検索活動・index service であり RerankerModel ではない。
    why_valid_or_invalid:
      zh: 重排序以已有候选为输入并执行独立评分；初始近邻发现不满足这一阶段边界。
      en: Reranking takes an existing candidate set and performs a separate scoring pass; initial nearest-neighbor discovery lacks that stage boundary.
      ja: reranking は既存候補を入力に独立採点し、初期近傍発見はその段階境界を欠く。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-reranker-model-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: EmbeddingModel
    shared_parent_concept_id: Model
    differentia:
      zh: 已审查兄弟区分：父节点 Model：RerankerModel（semantic kind=entity，骨架 RerankerModel-is_a-Model）；EmbeddingModel（semantic kind=entity，骨架 EmbeddingModel-is_a-Model）。双端条件：RerankerModel 条件：“重排序模型是以如下事实为区分特征的运行模型：它是以重新排列候选项为区分能力的一种模型”；EmbeddingModel 条件：“嵌入模型是一种运行模型；其区分条件是：它是以生成检索或匹配表示为区分能力的一种模型”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent Model: RerankerModel (semantic kind=entity, backbone RerankerModel-is_a-Model); EmbeddingModel (semantic kind=entity, backbone EmbeddingModel-is_a-Model). Endpoint conditions: RerankerModel condition: “Reranker model is a runtime model; its differentiating condition is that it is a Model distinguished by reordering candidate items using relevance evidence”; EmbeddingModel condition: “As a runtime model, Embedding model is distinguished by the fact that it is a Model distinguished by producing representations for retrieval or matching”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 Model：RerankerModel（semantic kind=entity、バックボーン RerankerModel-is_a-Model）；EmbeddingModel（semantic kind=entity、バックボーン EmbeddingModel-is_a-Model）。両端条件：RerankerModel の条件：「再順位付けモデルは実行モデルの一種であり、次の条件で区別されます：それは関連性証拠に基づき候補を並べ替える能力で区別される Model である」；EmbeddingModel の条件：「実行モデルに属する埋め込みモデルは、次の事実を種差とします：それは検索や照合用の表現生成能力で区別される Model である」。一方の成立は他方を証明しません。
    source_claims:
      - claim-reranker-model-002
      - claim-reranker-model-003
parent_relation:
  id: RerankerModel-is_a-Model
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: RerankerModel-is_a-Model 表示每个重排模型都是可解析版本的 Model，并以同时接收查询和已有候选列表、输出相关性分数或新顺序为种差；初始检索器、静态排序规则和排序后的结果记录不是该模型子类。
    en: RerankerModel-is_a-Model states that every reranker is a resolvable versioned Model differentiated by taking both a query and an existing candidate list and returning relevance scores or a new order; an initial retriever, static sort rule, or ranked result record is not this model subtype.
    ja: RerankerModel-is_a-Model は全 reranker が解決可能な版付き Model で、query と既存 candidate list を受け relevance score または新順序を返すことを種差とする。初期 retriever・静的 sort rule・ranked result 記録はこの型でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有重排模型子类
      en: has reranker-model subtype
      ja: RerankerModel 下位型を持つ
  conditions:
    - id: RerankerModel-is_a-Model-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies Model identity and declares a query-plus-documents candidate input contract and relevance-ordering output.
      explanations:
        zh: 仅当对象先满足 Model 身份，并声明 query、documents 候选输入及相关性排序输出契约时成立。
        en: Assert only when the object first satisfies Model identity and declares a query-plus-documents candidate input contract and relevance-ordering output.
        ja: 対象がまず Model 同一性を満たし query と documents candidate の入力契約および relevance ordering 出力を宣言する時だけ成立する。
      source_claims:
        - claim-reranker-model-004
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RerankerModel-is_a-Model-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种运行模型正例
        en: "Positive case: is a runtime model"
        ja: 実行モデルの一種であるの正例
      scenario_id: null
      descriptions:
        zh: rerank-v4.0-pro 接收一个 query 与已有 documents 列表，并返回每个候选的相关性索引和从高到低排序。
        en: rerank-v4.0-pro accepts one query and an existing documents list and returns candidate indices ordered from most to least relevant.
        ja: rerank-v4.0-pro は一 query と既存 documents list を受け candidate index を relevance 高順で返す。
      field_values: {}
      related_node_ids:
        - RerankerModel
        - Model
      related_relation_ids:
        - RerankerModel-is_a-Model
      expected_result:
        zh: 把 rerank-v4.0-pro 归为 RerankerModel 与 Model。
        en: Classify rerank-v4.0-pro as RerankerModel and Model.
        ja: rerank-v4.0-pro を RerankerModel と Model に分類する。
      why_valid_or_invalid:
        zh: 它对已给候选执行查询相关的第二阶段排序，而不是发现候选。
        en: It performs query-dependent second-stage ordering over supplied candidates rather than discovering them.
        ja: 与えられた候補へ query-dependent second-stage ordering を行い候補発見はしない。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-reranker-model-004
    - id: RerankerModel-is_a-Model-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种运行模型边界例
        en: "Boundary case: is a runtime model"
        ja: 実行モデルの一種であるの境界例
      scenario_id: null
      descriptions:
        zh: vector-search 通过向量索引首次发现近邻 chunk，但没有接收已有候选列表进行第二次评分。
        en: vector-search discovers nearest chunks from an index but receives no existing candidate list for a second scoring pass.
        ja: vector-search は index から近傍 chunk を初回発見するが既存 candidate list の二次 scoring を受けない。
      field_values: {}
      related_node_ids:
        - RerankerModel
        - Model
      related_relation_ids:
        - RerankerModel-is_a-Model
      expected_result:
        zh: vector-search 保持检索活动或服务类型，不归为 RerankerModel。
        en: Keep vector-search as retrieval activity or service and do not classify it as RerankerModel.
        ja: vector-search は retrieval activity/service のままとし RerankerModel にしない。
      why_valid_or_invalid:
        zh: 初始召回与候选集上的第二阶段重排具有不同输入契约。
        en: Initial recall and second-stage reranking over a candidate set have different input contracts.
        ja: 初期 recall と candidate set 上の second-stage reranking は入力契約が異なる。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-reranker-model-004
  source_claims:
    - claim-reranker-model-004
  distinct_fact_rationale:
    zh: 该边表达模型契约类型，不把检索活动、候选记录或一次重排结果并入 Model 层级。
    en: The edge expresses a model contract type and does not place retrieval activity, candidate records, or one reranking result in the Model hierarchy.
    ja: model 契約型を表し retrieval activity・candidate record・一 rerank result を Model 階層へ入れない。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: reranks_result
    predicate: reranks_result
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 曾重排检索结果
      en: reranked retrieved result
      ja: 検索結果を再順位付けした
    definitions:
      zh: reranks_result 表示有证据证明某精确 RerankerModel 版本在一次可识别的重排活动中，针对给定查询重新评分目标 RetrievedChunk 并影响其输出次序；模型可用性或初始检索排名不能单独建立该边。
      en: reranks_result states that evidence identifies an exact RerankerModel version as rescoring the target RetrievedChunk for a given query in a particular reranking activity and affecting its output order; model availability or initial retrieval rank alone cannot establish the edge.
      ja: reranks_result は特定 reranking activity で正確な RerankerModel 版が query に対し対象 RetrievedChunk を再 scoring し出力順へ影響した証拠を表す。model 可用性や初期 retrieval rank だけでは成立しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: was_reranked_by_model
      labels:
        zh: 由重排模型重新排序
        en: was reranked by model
        ja: rerank model に再順位付けされた
    conditions:
      - id: reranks_result-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the same reranking run records model version, query, candidate RetrievedChunk, and relevance score or output rank.
        explanations:
          zh: 仅当同一重排运行记录模型版本、查询、候选 RetrievedChunk、相关性分数或输出名次时成立。
          en: Assert only when the same reranking run records model version, query, candidate RetrievedChunk, and relevance score or output rank.
          ja: 同一 reranking run が model 版・query・candidate RetrievedChunk・relevance score または output rank を記録する時だけ成立する。
        source_claims:
          - claim-reranker-model-005
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: RerankerModel 仍由 runtime-plane 拥有，RetrievedChunk 仍由 memory-plane 拥有；该 causal 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: RerankerModel remains owned by runtime-plane and RetrievedChunk by memory-plane; this causal fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: RerankerModel は runtime-plane、RetrievedChunk は memory-plane に引き続き所有されます。この causal 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 RerankerModel → RetrievedChunk 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical RerankerModel → RetrievedChunk assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは RerankerModel → RetrievedChunk の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: reranks_result-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 曾重排检索结果正例
          en: "Positive case: reranked retrieved result"
          ja: 検索結果を再順位付けしたの正例
        scenario_id: null
        descriptions:
          zh: rerank-run-6 使用 rerank-v4.0-pro 对 query-12 与五十个 RetrievedChunk 评分，chunk-88 从第 23 位升至第 4 位。
          en: rerank-run-6 uses rerank-v4.0-pro to score query-12 against fifty RetrievedChunks, moving chunk-88 from rank 23 to rank 4.
          ja: rerank-run-6 は rerank-v4.0-pro で query-12 と50 RetrievedChunk を scoring し chunk-88 を23位から4位へ移す。
        field_values: {}
        related_node_ids:
          - RerankerModel
          - RetrievedChunk
        related_relation_ids:
          - reranks_result
        expected_result:
          zh: 建立 rerank-v4.0-pro reranks_result chunk-88，并保留 run、query、分数和名次证据。
          en: Assert rerank-v4.0-pro reranks_result chunk-88 and retain run, query, score, and rank evidence.
          ja: rerank-v4.0-pro reranks_result chunk-88 を確立し run・query・score・rank 証拠を保持する。
        why_valid_or_invalid:
          zh: 模型版本与具体候选的二次评分和顺序变化在同一运行中闭合。
          en: The model version, candidate rescoring, and order change close in the same run.
          ja: model 版・candidate rescoring・順序変化が同一 run で閉じる。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-reranker-model-005
      - id: reranks_result-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 曾重排检索结果边界例
          en: "Boundary case: reranked retrieved result"
          ja: 検索結果を再順位付けしたの境界例
        scenario_id: null
        descriptions:
          zh: retrieval-run-2 通过向量相似度首次返回 chunk-88 第 23 位，随后没有执行任何 rerank 模型调用。
          en: retrieval-run-2 initially returns chunk-88 at rank 23 by vector similarity and performs no rerank-model call afterward.
          ja: retrieval-run-2 は vector similarity で chunk-88 を23位返すが後続 rerank model call はない。
        field_values: {}
        related_node_ids:
          - RerankerModel
          - RetrievedChunk
        related_relation_ids:
          - reranks_result
        expected_result:
          zh: 不得建立任何 RerankerModel reranks_result chunk-88。
          en: Do not assert any RerankerModel reranks_result chunk-88.
          ja: どの RerankerModel にも reranks_result chunk-88 を確立しない。
        why_valid_or_invalid:
          zh: 初始检索排名不是重排模型产生的二次评分事实。
          en: Initial retrieval rank is not a second-stage scoring fact produced by a reranker.
          ja: 初期 retrieval rank は reranker が生成した二次 scoring 事実でない。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-reranker-model-005
    source_claims:
      - claim-reranker-model-005
    distinct_fact_rationale:
      zh: 该边是由重排运行派生的查询捷径，不与 RerankerModel 类型边或初始检索事实重复。
      en: This edge is a query shortcut derived from a reranking run and does not duplicate RerankerModel typing or initial retrieval facts.
      ja: reranking run から導く照会 shortcut で RerankerModel 型や初期 retrieval 事実を複製しない。
    layout_role: cross-link
    review_status: accepted
    target: concept:RetrievedChunk
