parent_relation:
  id: RerankerModel-is_a-Model
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: RerankerModel-is_a-Model 表示每个重排模型都是可解析版本的 Model，并以同时接收查询和已有候选列表、输出相关性分数或新顺序为种差；初始检索器、静态排序规则和排序后的结果记录不是该模型子类。
    en: RerankerModel-is_a-Model states that every reranker is a resolvable versioned Model differentiated by taking both a query and an existing candidate list and returning relevance scores or a new order; an initial retriever, static sort rule, or ranked result record is not this model subtype.
    ja: RerankerModel-is_a-Model は全 reranker が解決可能な版付き Model で、query と既存 candidate list を受け relevance score または新順序を返すことを種差とする。初期 retriever・静的 sort rule・ranked result 記録はこの型でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有重排模型子类
      en: has reranker-model subtype
      ja: RerankerModel 下位型を持つ
  conditions:
    - id: RerankerModel-is_a-Model-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies Model identity and declares a query-plus-documents candidate input contract and relevance-ordering output.
      explanations:
        zh: 仅当对象先满足 Model 身份，并声明 query、documents 候选输入及相关性排序输出契约时成立。
        en: Assert only when the object first satisfies Model identity and declares a query-plus-documents candidate input contract and relevance-ordering output.
        ja: 対象がまず Model 同一性を満たし query と documents candidate の入力契約および relevance ordering 出力を宣言する時だけ成立する。
      source_claims:
        - claim-reranker-model-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-reranker-model-design
  distinct_fact_rationale:
    zh: 该边表达模型契约类型，不把检索活动、候选记录或一次重排结果并入 Model 层级。
    en: The edge expresses a model contract type and does not place retrieval activity, candidate records, or one reranking result in the Model hierarchy.
    ja: model 契約型を表し retrieval activity・candidate record・一 rerank result を Model 階層へ入れない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: reranks_result
    predicate: reranks_result
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 曾重排检索结果
      en: reranked retrieved result
      ja: 検索結果を再順位付けした
    definitions:
      zh: reranks_result 表示有证据证明某精确 RerankerModel 版本在一次可识别的重排活动中，针对给定查询重新评分目标 RetrievedChunk 并影响其输出次序；模型可用性或初始检索排名不能单独建立该边。
      en: reranks_result states that evidence identifies an exact RerankerModel version as rescoring the target RetrievedChunk for a given query in a particular reranking activity and affecting its output order; model availability or initial retrieval rank alone cannot establish the edge.
      ja: reranks_result は特定 reranking activity で正確な RerankerModel 版が query に対し対象 RetrievedChunk を再 scoring し出力順へ影響した証拠を表す。model 可用性や初期 retrieval rank だけでは成立しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: was_reranked_by_model
      labels:
        zh: 由重排模型重新排序
        en: was reranked by model
        ja: rerank model に再順位付けされた
    conditions:
      - id: reranks_result-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the same reranking run records model version, query, candidate RetrievedChunk, and relevance score or output rank.
        explanations:
          zh: 仅当同一重排运行记录模型版本、查询、候选 RetrievedChunk、相关性分数或输出名次时成立。
          en: Assert only when the same reranking run records model version, query, candidate RetrievedChunk, and relevance score or output rank.
          ja: 同一 reranking run が model 版・query・candidate RetrievedChunk・relevance score または output rank を記録する時だけ成立する。
        source_claims:
          - claim-reranker-model-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: RerankerModel 仍由 runtime-plane 拥有，RetrievedChunk 仍由 memory-plane 拥有；该 causal 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: RerankerModel remains owned by runtime-plane and RetrievedChunk by memory-plane; this causal fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: RerankerModel は runtime-plane、RetrievedChunk は memory-plane に引き続き所有されます。この causal 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 RerankerModel → RetrievedChunk 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical RerankerModel → RetrievedChunk assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは RerankerModel → RetrievedChunk の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    source_claims:
      - claim-reranker-model-design
    distinct_fact_rationale:
      zh: 该边是由重排运行派生的查询捷径，不与 RerankerModel 类型边或初始检索事实重复。
      en: This edge is a query shortcut derived from a reranking run and does not duplicate RerankerModel typing or initial retrieval facts.
      ja: reranking run から導く照会 shortcut で RerankerModel 型や初期 retrieval 事実を複製しない。
    layout_role: cross-link
    target: concept:RetrievedChunk
