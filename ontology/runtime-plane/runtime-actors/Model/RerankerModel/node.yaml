schema: moonweave.ai/ontology-node/v1
id: RerankerModel
kind: concept
status: accepted
labels: {zh: 重排序模型, en: Reranker model, ja: リランカーモデル}
semantics:
  short_definition: {zh: 其契约相对于查询或目标对提供的候选项评分或排序的 Model。, en: A Model whose contract scores or orders supplied candidates relative to a query or objective., ja: 契約がクエリまたは目的に対して提供候補を採点または順位付けする Model。}
  definition: {zh: RerankerModel 是接收查询或目标及现有候选集，并生成分数、排序或选择元数据的版本化 Model Entity。它不是候选集合、嵌入索引、生成答案或排序 Activity。, en: "A RerankerModel is a versioned Model Entity that receives a query or objective and an existing candidate set, then produces scores, an ordering, or selection metadata. It is not the candidate collection, an embedding index, a generated answer, or a ranking Activity.", ja: RerankerModel はクエリまたは目的と既存候補集合を受け取り、スコア、順位、選択メタデータを生成するバージョン化 Model Entity である。候補コレクション、埋め込みインデックス、生成回答、ランキング Activity ではない。}
  why_needed: {zh: 检索质量和溯源要求将候选生成与后续选择最终上下文的评分或排序模型分离。, en: "Retrieval quality and provenance require separating candidate generation from the later scoring or ordering model that chose the final context.", ja: 検索品質と来歴には、候補生成を最終コンテキストを選んだ後続の採点または順位付けモデルから分離する必要がある。}
  includes:
    - {zh: 交叉编码器、学习排序器和相关性评分模型版本。, en: "Cross-encoder, learned ranker, and relevance-scoring model versions.", ja: クロスエンコーダー、学習済みランカー、関連性スコアリングモデルバージョン。}
    - {zh: 候选上限、分数尺度、查询模态和输出排序元数据。, en: "Candidate limit, score scale, query modality, and output ordering metadata.", ja: 候補上限、スコア尺度、クエリモダリティ、出力順位メタデータ。}
  excludes:
    - {zh: 生成向量表示的嵌入模型和创建新内容的生成模型。, en: "Embedding models that generate vector representations and generative models that create new content.", ja: ベクトル表現を生成する埋め込みモデルと新しいコンテンツを作成する生成モデル。}
    - {zh: 一次推理调用产生的有序结果列表。, en: The ordered result list from one inference invocation., ja: 一回の推論呼び出しからの順序付き結果リスト。}
  semantic_kind: entity
  aliases: [ranker, relevance model]
engineering:
  explanation: {zh: 重排序请求携带查询、候选 ID 和 model_id。响应返回带可选分数的有序列表，并记录已解析模型版本；候选项保持独立输入 Entity。, en: "A rerank request carries query, candidate IDs, and model_id. The response returns an ordered list with optional scores and records the resolved model version; the candidates remain independent input Entities.", ja: リランキング要求はクエリ、候補 ID、model_id を持つ。応答は任意のスコアを伴う順序付きリストを返し、解決済みモデルバージョンを記録する。候補は独立した入力 Entity のままである。}
  typical_input:
    - description: {zh: 重排序请求, en: Reranking request, ja: リランキング要求}
      format: |-
        {"model_id":"model-r-2","query":"checkpoint recovery","candidate_ids":["doc-4","doc-9","doc-12"]}
  typical_output:
    - description: {zh: 重排序结果, en: Reranking result, ja: リランキング結果}
      format: |-
        {"model_id":"model-r-2","ranking":[{"candidate_id":"doc-9","score":0.94},{"candidate_id":"doc-4","score":0.61}]}
  reference_implementations:
    - {name: Cohere Rerank Overview, url: https://docs.cohere.com/docs/rerank-overview, description: Documents reranking an existing candidate set against a query.}
structure:
  identity_keys: [model_id, version]
  fields:
    - id: model_id
      labels: {zh: 重排序模型 ID, en: Reranker model ID, ja: リランカーモデル ID}
      definitions: {zh: 从版本化 Model 描述符继承的标识符。, en: Identifier inherited from the versioned Model descriptor., ja: バージョン化 Model 記述子から継承される識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: model-r-2
      source_claims: [claim-reranker-model]
    - id: version
      labels:
        zh: "模型版本"
        en: "Model version"
        ja: "モデルバージョン"
      definitions:
        zh: "该重排序模型记录所属的已声明版本。"
        en: "Declared version to which this reranker-model record belongs."
        ja: "このリランカーモデル記録が属する宣言済みバージョン。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-06-01
      source_claims: [claim-reranker-model]
    - id: provider
      labels:
        zh: "模型提供方"
        en: "Model provider"
        ja: "モデル提供者"
      definitions:
        zh: "对该版本模型承担交付责任的已声明提供方。"
        en: "Declared provider responsible for delivering this model version."
        ja: "このモデルバージョンの提供に責任を持つ宣言済みの提供者。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: example-ai
      source_claims: [claim-reranker-model]
    - id: score_semantics
      labels: {zh: 分数语义, en: Score semantics, ja: スコア意味}
      definitions: {zh: 排序器输出分数的含义和尺度。, en: Meaning and scale of scores emitted by the ranker., ja: ランカーが出力するスコアの意味と尺度。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: relevance-probability
      source_claims: [claim-reranker-model]
    - id: candidate_limit
      labels: {zh: 候选上限, en: Candidate limit, ja: 候補上限}
      definitions: {zh: 已声明重排序契约接受的最大候选数。, en: Maximum number of candidates accepted by the declared reranking contract., ja: 宣言済みリランキング契約が受け入れる最大候補数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 100
      source_claims: [claim-reranker-model]
  constraints:
    - id: reranker-candidate-identity
      severity: error
      language: plain
      expression: Each returned ranking item must reference one candidate ID supplied to the same request.
      explanation: {zh: 重排序器对候选项排序或评分；不得捏造新候选项作为排序输出。, en: "A reranker orders or scores candidates; it must not fabricate a new candidate as its ranking output.", ja: リランカーは候補を順位付けまたは採点し、ランキング出力として新しい候補を捏造してはならない。}
      source_claims: [claim-reranker-model]
  required_relations: [RerankerModel-specializes-Model]
examples:
  - id: reranker-model-positive
    labels: {zh: "Cohere rerank-v3 LangSmith tool run", en: "Cohere rerank-v3 LangSmith tool run", ja: "Cohere rerank-v3 LangSmith tool run"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RerankerModel maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RerankerModel maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RerankerModel provenance graph."}
    field_values: {model_id: model-r-2, version: 2026-06-01, provider: example-ai, score_semantics: relevance-probability, candidate_limit: 100}
    related_node_ids: [RerankerModel, Model]
    related_relation_ids: []
    source_claims: [claim-reranker-model]
  - id: reranker-model-counterexample
    labels: {zh: "sort() 本地排序非 RerankerModel", en: "Local sort not RerankerModel", ja: "sort() ローカルソートは RerankerModel ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style RerankerModel.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style RerankerModel.", ja: "Missing parent_run_id rejects LangSmith-style RerankerModel."}
    field_values: {ranking_id: rank-18}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-reranker-model]
  - id: reranker-model-boundary
    labels: {zh: "RerankerModel 与 EmbeddingModel 边界", en: "RerankerModel versus EmbeddingModel boundary", ja: "RerankerModel と EmbeddingModel 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RerankerModel preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RerankerModel preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {model_id: model-r-2}
    related_node_ids: [RerankerModel, GenerativeModel]
    related_relation_ids: []
    source_claims: [claim-reranker-model]
  - id: reranker-model-instance-model-r-2
    labels: {zh: "model-r-2 rerank 实例", en: "model-r-2 rerank instance", ja: "model-r-2 rerank 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->RerankerModel.", en: "Langfuse instance: trace+span+score->RerankerModel.", ja: "Langfuse instance maps to RerankerModel."}
    field_values: {model_id: model-r-2, version: 2026-06-01, provider: example-ai, score_semantics: relevance-probability, candidate_limit: 100}
    related_node_ids: [RerankerModel, Artifact]
    related_relation_ids: []
    source_claims: [claim-reranker-model]
parent_relation:
  id: RerankerModel-specializes-Model
  predicate: is_a
  target: concept:Model
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是重排序模型资产, en: is a reranker model asset, ja: リランカーモデル資産である}
  definitions: {zh: 每个 RerankerModel 都是具有已声明候选评分或排序输出契约的 Model。, en: Every RerankerModel is a Model with a declared candidate-scoring or ordering output contract., ja: すべての RerankerModel は宣言済み候補採点または順位付け出力契約を持つ Model である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_reranker_model, labels: {zh: 具有重排序模型, en: has reranker model, ja: リランカーモデルを持つ}}
  conditions:
    - id: reranker-model-parent-condition
      severity: error
      expression: Require a query-relative score or ordering over supplied candidates.
      explanations: {zh: 嵌入向量或新生成响应不满足此子类型。, en: An embedding vector or newly generated response does not satisfy this subtype., ja: 埋め込みベクトルまたは新たに生成された応答はこのサブタイプを満たさない。}
      source_claims: [claim-reranker-model]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-reranker-model]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports modeling a reranker descriptor and its produced ranking as distinct Entities connected by an Activity.
  - id: cohere-rerank-overview
    title: Cohere Rerank Overview
    url: https://docs.cohere.com/docs/rerank-overview
    source_type: official-doc
    relevance: Documents reranking a supplied set of documents against a query and returning relevance results.
source_claims:
  - id: claim-reranker-model
    source: cohere-rerank-overview
    supports: Cohere documents reranking a supplied candidate set against a query; Moonweave keeps the versioned RerankerModel descriptor distinct from the one-off ranked output.
    locator: Rerank overview
    evidence_kind: design-inference
    confidence: high

