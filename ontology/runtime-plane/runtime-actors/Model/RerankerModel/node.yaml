    labels:
      zh: Cohere rerank-v3 LangSmith tool run
      en: Cohere rerank-v3 LangSmith tool run
      ja: Cohere rerank-v3 LangSmith tool run
    descriptions:
      zh: Cohere rerank(model=, query="...", documents=[...]) 在 LangSmith tool run name=rerank 中映射 RerankerModel model_id=model-r-2、top_n=5。
      en: Cohere rerank(model=, query="...", documents=[...]) in LangSmith tool run name=rerank maps RerankerModel model_id=model-r-2, top_n=5.
      ja: Cohere rerank-v3 が RerankerModel である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      model_id: rerank-v2
      model_version: 2.0.0
      model_kind: reranker
      resolver_ref: cohere-rerank-provider
      capability_profile:
        maximum_candidates: 50
        returned_candidates: 8
        score_semantics: query-relevance
    related_node_ids:
      - RerankerModel
      - RetrievedChunk
    related_relation_ids:
      - reranks_result
    source_claims:
      - claim-reranker-model-design
  - id: RerankerModel-example-boundary-001
    labels:
      zh: sort() 本地排序非 RerankerModel
      en: Local sort not RerankerModel
      ja: sort() ローカルソートは RerankerModel ではない
    descriptions:
      zh: Python sorted(docs, key=score) 是本地排序逻辑，不是 Cohere RerankerModel 资产。
      en: Python sorted(docs, key=score) is local sorting logic, not Cohere RerankerModel asset.
      ja: sorted() は RerankerModel ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
