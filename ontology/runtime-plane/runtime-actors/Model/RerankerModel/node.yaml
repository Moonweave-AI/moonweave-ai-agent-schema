schema: moonweave.ai/ontology-node/v1
id: RerankerModel
kind: concept
labels:
  en: reranker model
  zh: 重排序模型
  ja: 再順位付けモデル
semantics:
  short_definition:
    zh: 重排序模型是依据查询与候选内容重新评分并输出候选顺序的运行模型。
    en: A RerankerModel is a Model that rescores supplied candidates against a query and outputs their ordering.
    ja: RerankerModel は query に対して与えられた候補を再採点し、順序を出力する Model である。
  definition:
    zh: 重排序模型是 Model 的一种；其种差是推理输入同时包含查询或目标以及一组已检索候选，输出为候选相关性分数、偏好或重排顺序，而不负责最初发现候选。它不是生成向量的 EmbeddingModel、执行检索的索引或搜索活动、生成开放式内容的 GenerativeModel，也不是排序后的 RetrievedChunk 本身。
    en: A RerankerModel is a Model distinguished by inference over both a query or objective and an already retrieved candidate set, producing candidate relevance scores, preferences, or a reordered list without performing initial candidate discovery. It is not an EmbeddingModel, retrieval index or search activity, open-ended GenerativeModel, or the ranked RetrievedChunk itself.
    ja: RerankerModel は Model の一種で、query・目的と既検索候補集合を共に入力し、候補の関連 score、選好、再配列を出力し、初期候補発見は行わない。EmbeddingModel、検索 index・活動、開放生成 GenerativeModel、順位付き RetrievedChunk 自体ではない。
  why_needed:
    zh: 该子类把候选发现与候选精排分开，使评估、延迟和输入上限能够针对重排序阶段管理。
    en: This subtype separates candidate discovery from fine reranking so evaluation, latency, and input limits can be managed for the reranking stage.
    ja: この下位型は候補発見と精密再配列を分け、評価、遅延、入力上限を reranking 段階ごとに管理できる。
  includes:
    - zh: 纳入接收查询与候选文本、输出每个候选分数或新顺序，并由此改进最终上下文选择的模型版本。
      en: Includes a model version that consumes a query and candidate texts, outputs candidate scores or a new order, and thereby refines final context selection.
      ja: query と候補 text を受け、候補 score または新順序を出し、最終 context 選択を精密化するモデル版を含む。
  excludes:
    - zh: 不纳入向量检索器、EmbeddingModel、只生成查询的 GenerativeModel、静态排序规则、排序结果列表或 RetrievedChunk。
      en: Excludes a vector retriever, EmbeddingModel, GenerativeModel that only writes a query, static sort rule, ranked result list, and RetrievedChunk.
      ja: vector 検索器、EmbeddingModel、query 生成だけの GenerativeModel、静的 sort rule、順位結果 list、RetrievedChunk は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 RerankerModel 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating RerankerModel, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: RerankerModel 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to RerankerModel.
      format: |-
        # Example RerankerModel ingest
        { "reranker-model_ref": "example-1" }
      source_claims:
        - claim-reranker-model-design
  typical_output:
    - description: Moonweave-local RerankerModel projection.
      format: '{ "schema_owner": "moonweave-local-design", "reranker-model_id": "example-1" }'
      source_claims:
        - claim-reranker-model-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://google.github.io/A2A/
      description: Remote agent discovery via Agent Card.
