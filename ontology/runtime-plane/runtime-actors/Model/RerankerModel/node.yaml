      - RetrievedChunk
      - EmbeddingModel
    related_relation_ids:
      - reranks_result
    source_claims:
      - claim-reranker-model-design
  - id: RerankerModel-example-3
    labels:
      zh: RerankerModel 与 EmbeddingModel 边界
      en: RerankerModel versus EmbeddingModel boundary
      ja: RerankerModel と EmbeddingModel 境界
    descriptions:
      zh: RerankerModel 是 rerank 模型资产；EmbeddingModel 是向量模型；retriever pipeline 可先后引用两者。
      en: RerankerModel is rerank model asset; EmbeddingModel is vector model; retriever pipeline may reference both sequentially.
      ja: RerankerModel と EmbeddingModel は別資産である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - RerankerModel
    related_relation_ids: []
    source_claims:
      - claim-reranker-model-vendor
      - claim-reranker-model-design
  - id: RerankerModel-example-4
    labels:
      zh: model-r-2 rerank 实例
      en: model-r-2 rerank instance
      ja: model-r-2 rerank 事例
    descriptions:
      zh: RerankerModel model_id=model-r-2、model_name=rerank-v3、provider=cohere、top_n=5。
      en: RerankerModel model_id=model-r-2, model_name=rerank-v3, provider=cohere, top_n=5.
      ja: model-r-2 RerankerModel を記録する。
    example_source:
      product: OpenAI Assistants API
