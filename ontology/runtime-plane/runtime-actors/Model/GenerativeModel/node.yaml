schema: moonweave.ai/ontology-node/v1
id: GenerativeModel
kind: concept
labels:
  zh: 生成模型
  en: generative model
  ja: 生成モデル
semantics:
  short_definition:
    zh: 生成模型是根据输入上下文产生新文本、结构化内容或工具调用提议的运行模型。
    en: A GenerativeModel is a Model that produces new text, structured content, or proposed tool calls conditioned on input context.
    ja: GenerativeModel は入力 context に条件付けて新しい text、構造化内容、tool-call 提案を生成する Model である。
  definition:
    zh: 生成模型是 Model 的一种；其种差是推理输出是依据输入与模型参数逐步生成的新内容，例如自然语言、代码、结构化对象或工具调用，而非仅返回固定维度向量或给定候选的排序分数。它可以被 AgentActor 使用，但不拥有智能体的指令、工具执行或循环控制责任。
    en: A GenerativeModel is a Model distinguished by inference that generates new content from input and model parameters, such as natural language, code, structured objects, or tool calls, rather than only a fixed-dimensional vector or scores over supplied candidates. An AgentActor may use it, but the model does not own agent instructions, tool execution, or loop control.
    ja: GenerativeModel は Model の一種で、入力とモデルパラメータから自然言語、コード、構造化 object、tool call などの新内容を生成し、固定次元 vector や候補 score だけを返すものではない。AgentActor が使用し得るが、指示、ツール実行、ループ制御は所有しない。
  why_needed:
    zh: 该子类为生成能力、结构化输出和工具调用兼容性提供准确选择边界，同时避免把模型生成行为误当作完整智能体。
    en: This subtype gives generation, structured-output, and tool-call compatibility an accurate selection boundary without mistaking model generation for a complete agent.
    ja: この下位型は生成、構造化出力、tool-call 互換性の正確な選択境界を与え、モデル生成を完全なエージェントと混同しない。
  includes:
    - zh: 纳入输入提示或多模态上下文后生成自然语言、代码、图像描述、结构化输出或工具调用参数的模型版本。
      en: Includes a model version that generates language, code, image descriptions, structured output, or tool-call arguments from prompts or multimodal context.
      ja: prompt または multimodal context から言語、コード、画像記述、構造化出力、tool-call 引数を生成するモデル版を含む。
  excludes:
    - zh: 不纳入 EmbeddingModel、只重排候选的 RerankerModel、缓存响应、生成结果、AgentActor 或模型服务进程。
      en: Excludes an EmbeddingModel, a RerankerModel that only reorders candidates, a cached response, generated result, AgentActor, and model-service process.
      ja: EmbeddingModel、候補並べ替えだけの RerankerModel、cache 応答、生成結果、AgentActor、モデルサービスプロセスは含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 GenerativeModel 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating GenerativeModel, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: GenerativeModel 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to GenerativeModel.
      format: |-
        # Example GenerativeModel ingest
        { "generative-model_ref": "example-1" }
      source_claims:
        - claim-generative-model-design
  typical_output:
    - description: Moonweave-local GenerativeModel projection.
      format: '{ "schema_owner": "moonweave-local-design", "generative-model_id": "example-1" }'
      source_claims:
        - claim-generative-model-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: GenerativeModel-example-positive-001
    labels:
      zh: OpenAI gpt-4o LangSmith generation
      en: OpenAI gpt-4o LangSmith generation
      ja: OpenAI gpt-4o LangSmith generation
    descriptions:
      zh: LangSmith generation run name=llm.generate、model=gpt-4o、input_tokens=1200、output_tokens=300；映射 GenerativeModel model_id=model-g-12。
      en: LangSmith generation run name=llm.generate, model=gpt-4o, input_tokens=1200, output_tokens=300; maps GenerativeModel model_id=model-g-12.
      ja: LangSmith llm.generate が GenerativeModel gpt-4o である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      model_id: generative-v7-schema
      model_version: 7.1.0
      model_kind: generative
      resolver_ref: provider-structured-generation
      capability_profile:
        structured_output: true
        tool_calls: true
        input_modalities:
          - text
          - json-schema
    related_node_ids:
      - GenerativeModel
      - Model
    related_relation_ids:
      - GenerativeModel-is_a-Model
    source_claims:
      - claim-generative-model-design
  - id: GenerativeModel-example-boundary-001
    labels:
      zh: tokenizer 配置非 GenerativeModel
      en: Tokenizer config not GenerativeModel
      ja: tokenizer 設定は GenerativeModel ではない
    descriptions:
      zh: tiktoken encoding cl100k_base 是 tokenizer 配置，不是 GenerativeModel 资产记录。
      en: tiktoken encoding cl100k_base is tokenizer config, not GenerativeModel asset record.
      ja: tokenizer 設定は GenerativeModel ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - GenerativeModel
      - Model
      - EmbeddingModel
    related_relation_ids:
      - GenerativeModel-is_a-Model
    source_claims:
      - claim-generative-model-design
  - id: GenerativeModel-example-3
    labels:
      zh: GenerativeModel 与 ModelActor 边界
      en: GenerativeModel versus ModelActor boundary
      ja: GenerativeModel と ModelActor 境界
    descriptions:
      zh: GenerativeModel 是文本生成 model 资产；ModelActor 是引用 model 的 Actor；generation span 报告调用，Model 记录资产。
      en: GenerativeModel is text generation model asset; ModelActor is Actor referencing model; generation span reports invocation, Model records asset.
      ja: GenerativeModel 資産と ModelActor 参照は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - GenerativeModel
    related_relation_ids: []
    source_claims:
      - claim-generative-model-vendor
      - claim-generative-model-design
  - id: GenerativeModel-example-4
    labels:
      zh: gpt-4o generation run 实例
      en: gpt-4o generation run instance
      ja: gpt-4o generation run 事例
    descriptions:
      zh: GenerativeModel model_id=model-g-12、model_name=gpt-4o、provider=openai、max_output_tokens=4096。
      en: GenerativeModel model_id=model-g-12, model_name=gpt-4o, provider=openai, max_output_tokens=4096.
      ja: model-g-12 GenerativeModel gpt-4o を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - GenerativeModel
    related_relation_ids: []
    source_claims:
      - claim-generative-model-vendor
      - claim-generative-model-design
parent_relation:
  id: GenerativeModel-is_a-Model
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: GenerativeModel-is_a-Model 表示每个生成模型都是可解析版本的 Model，并以根据输入上下文产生新文本、结构化输出或工具调用建议为种差；AgentActor 的循环控制、模型服务进程和一次生成结果不属于该模型子类。
    en: GenerativeModel-is_a-Model states that every generative model is a resolvable versioned Model differentiated by producing new text, structured output, or proposed tool calls from input context; AgentActor loop control, a model-service process, and one generated result are not this model subtype.
    ja: GenerativeModel-is_a-Model は全生成 model が解決可能な版付き Model で、入力 context から新しい text・structured output・tool call 提案を生成することを種差とする。AgentActor loop 制御、model service process、一生成結果はこの型でない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有生成模型子类
      en: has generative-model subtype
      ja: GenerativeModel 下位型を持つ
  conditions:
    - id: GenerativeModel-is_a-Model-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies Model identity and declares generative output modalities or structured/tool-call capabilities with version compatibility.
      explanations:
        zh: 仅当对象先满足 Model 身份，并声明可生成的输出模态或结构化/工具调用能力及其版本兼容性时成立。
        en: Assert only when the object first satisfies Model identity and declares generative output modalities or structured/tool-call capabilities with version compatibility.
        ja: 対象がまず Model 同一性を満たし、生成 output modality または structured/tool-call 能力と版互換性を宣言する時だけ成立する。
      source_claims:
        - claim-generative-model-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-generative-model-design
  distinct_fact_rationale:
    zh: 该边只表达模型的生成推理类型，不把 AgentActor、ModelActor 或输出结果纳入模型层级。
    en: The edge expresses only a model's generative-inference type and does not place AgentActor, ModelActor, or an output result in the model hierarchy.
    ja: model の生成推論型だけを表し AgentActor・ModelActor・output result を model 階層へ入れない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
