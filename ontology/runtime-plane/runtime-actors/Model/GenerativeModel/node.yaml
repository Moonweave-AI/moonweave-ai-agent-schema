source_claims:
  - id: claim-generative-model-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK separates a selected Model implementation from Agent orchestration and documents model outputs used by the Runner. Moonweave types the resolved content-generating computational model as GenerativeModel.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-generative-model-002
    source: eng-fw-langchain-agents
    supports: LangChain agents call chat models to interpret conversation state, choose tool calls, and produce task responses. That establishes the content-and-action generation function of GenerativeModel; it does not describe rescoring an already supplied candidate list.
    locator: LangChain agents > Agent loop; Model > Static model and Dynamic model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-generative-model-003
    source: eng-model-cohere-rerank
    supports: Cohere Rerank accepts a query plus an existing list of documents and returns those candidates with relevance scores in a new order. That directly supports RerankerModel's candidate-reordering differentia and separates it from GenerativeModel, whose defining output is newly generated content or actions.
    locator: Rerank overview > How Rerank works; Rerank API > query, documents, and results
    evidence_kind: vendor
    confidence: high
    review_status: accepted
  - id: claim-generative-model-004
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK separates Agent orchestration from a selected Model implementation and documents model support for generated text, structured output, and tool calls. Moonweave types the resolved computational model independently from its caller.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

