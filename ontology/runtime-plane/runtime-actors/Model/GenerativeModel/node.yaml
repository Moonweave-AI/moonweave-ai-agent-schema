schema: moonweave.ai/ontology-node/v1
id: GenerativeModel
kind: concept
status: accepted
labels: {zh: 生成模型, en: Generative model, ja: 生成モデル}
semantics:
  short_definition: {zh: 其声明契约从输入上下文生成内容的 Model。, en: A Model whose declared contract produces generated content from an input context., ja: 宣言された契約が入力コンテキストから生成コンテンツを生み出す Model。}
  definition: {zh: GenerativeModel 是配置为生成文本、结构化输出、代码、图像、音频或其他声明生成模态的版本化 Model Entity。它描述能力；不是 AgentActor、补全 Entity、推理 Activity 或追踪 span。, en: "A GenerativeModel is a versioned Model Entity configured to produce text, structured output, code, image, audio, or another declared generative modality. It describes a capability; it is not an AgentActor, a completion Entity, an inference Activity, or a trace span.", ja: GenerativeModel はテキスト、構造化出力、コード、画像、音声、その他の宣言済み生成モダリティを生成するよう構成されたバージョン化 Model Entity である。能力を記述し、AgentActor、補完 Entity、推論 Activity、トレース span ではない。}
  why_needed: {zh: 智能体系统需要将生成能力与检索、排序、端点路由和单个生成输出分开选择与审计。, en: "Agent systems need to select and audit generative capability separately from retrieval, ranking, endpoint routing, and individual generated outputs.", ja: エージェントシステムは生成能力を検索、ランキング、エンドポイントルーティング、個別の生成出力から分けて選択・監査する必要がある。}
  includes:
    - {zh: 文本、代码、多模态和结构化输出生成模型版本。, en: "Text, code, multimodal, and structured-output generative model versions.", ja: テキスト、コード、マルチモーダル、構造化出力の生成モデルバージョン。}
    - {zh: 已声明的输入模态、输出模态以及上下文或输出限制。, en: "Declared input modalities, output modality, and context or output limits.", ja: 宣言済み入力モダリティ、出力モダリティ、コンテキストまたは出力制限。}
  excludes:
    - {zh: 主要输出为向量或排序的嵌入和重排序模型。, en: Embedding and reranker models whose primary outputs are vectors or orderings., ja: 主な出力がベクトルまたは順位である埋め込みモデルとリランカーモデル。}
    - {zh: 生成的补全，它是可归属于某活动的输出 Entity。, en: "A generated completion, which is an output Entity attributable to an activity.", ja: Activity に帰属可能な出力 Entity である生成補完。}
  semantic_kind: entity
  aliases: [LLM, generation model]
engineering:
  explanation: {zh: 生成请求提供 model_id、输入消息或结构化上下文以及可选输出模式。结果标识已解析模型版本和生成输出引用；服务参与者和追踪仍是独立记录。, en: "A generative request supplies model_id, input messages or structured context, and optional output schema. The result identifies the resolved model version and generated output reference; the serving actor and trace remain separate records.", ja: 生成要求は model_id、入力メッセージまたは構造化コンテキスト、任意の出力スキーマを提供する。結果は解決済みモデルバージョンと生成出力参照を識別し、提供アクターとトレースは別個の記録のままである。}
  typical_input:
    - description: {zh: 生成请求, en: Generative request, ja: 生成要求}
      format: |-
        {"model_id":"model-g-12","input":[{"role":"user","content":"summarize"}],"response_format":"text"}
  typical_output:
    - description: {zh: 生成响应契约, en: Generated response contract, ja: 生成応答契約}
      format: |-
        {"resolved_model_id":"model-g-12","output_ref":"completion-5","finish_reason":"stop"}
  reference_implementations:
    - {name: OpenAI Agents SDK Models, url: https://openai.github.io/openai-agents-js/guides/models/, description: Documents model selection and provider interfaces used by agent runs.}
structure:
  identity_keys: [model_id, version]
  fields:
    - id: model_id
      labels: {zh: 生成模型 ID, en: Generative model ID, ja: 生成モデル ID}
      definitions: {zh: 从版本化 Model 描述符继承的标识符。, en: Identifier inherited from the versioned Model descriptor., ja: バージョン化 Model 記述子から継承される識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: model-g-12
      source_claims: [claim-generative-model]
    - id: version
      labels:
        zh: "模型版本"
        en: "Model version"
        ja: "モデルバージョン"
      definitions:
        zh: "该生成模型记录所属的已声明版本。"
        en: "Declared version to which this generative-model record belongs."
        ja: "この生成モデル記録が属する宣言済みバージョン。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-06-01
      source_claims: [claim-generative-model]
    - id: provider
      labels:
        zh: "模型提供方"
        en: "Model provider"
        ja: "モデル提供者"
      definitions:
        zh: "对该版本模型承担交付责任的已声明提供方。"
        en: "Declared provider responsible for delivering this model version."
        ja: "このモデルバージョンの提供に責任を持つ宣言済みの提供者。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: example-ai
      source_claims: [claim-generative-model]
    - id: output_modality
      labels: {zh: 输出模态, en: Output modality, ja: 出力モダリティ}
      definitions: {zh: 生成输出的已声明模态。, en: Declared modality of generated output., ja: 生成出力の宣言されたモダリティ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [text, structured-data, code, image, audio]
      example_value: text
      source_claims: [claim-generative-model]
    - id: context_limit
      labels: {zh: 上下文限制, en: Context limit, ja: コンテキスト制限}
      definitions: {zh: 模型契约支持的最大输入上下文。, en: Maximum supported input context in the model contract., ja: モデル契約でサポートされる最大入力コンテキスト。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 128000
      source_claims: [claim-generative-model]
  constraints:
    - id: generative-model-output-contract
      severity: error
      language: plain
      expression: Generated output must conform to the declared output modality or supplied response schema.
      explanation: {zh: 模型选择记录不能承诺调用契约不接受的模态。, en: A model selection record cannot promise a modality that the call contract does not accept., ja: モデル選択記録は呼び出し契約が受け入れないモダリティを約束できない。}
      source_claims: [claim-generative-model]
  required_relations: [GenerativeModel-specializes-Model]
examples:
  - id: generative-model-positive
    labels: {zh: "OpenAI gpt-4o LangSmith generation", en: "OpenAI gpt-4o LangSmith generation", ja: "OpenAI gpt-4o LangSmith generation"}
    descriptions: {zh: "vLLM python -m vllm.entrypoints.openai.api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; GenerativeModel maps RuntimeEnvironment/Execution/GenerativeModel.", en: "vLLM api_server --model meta-llama/Llama-3-8B; PagedAttention+continuous batching; GenerativeModel maps RuntimeEnvironment/Execution/GenerativeModel.", ja: "vLLM api_server PagedAttention; GenerativeModel serving env."}
    field_values: {model_id: model-g-12, version: 2026-06-01, provider: example-ai, output_modality: text, context_limit: 128000}
    related_node_ids: [GenerativeModel, ModelActor]
    related_relation_ids: []
    source_claims: [claim-generative-model]
  - id: generative-model-counterexample
    labels: {zh: "tokenizer 配置非 GenerativeModel", en: "Tokenizer config not GenerativeModel", ja: "tokenizer 設定は GenerativeModel ではない"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style GenerativeModel.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style GenerativeModel.", ja: "Gateway bypass rejects Helicone-style GenerativeModel."}
    field_values: {output_ref: completion-5}
    related_node_ids: [Artifact]
    related_relation_ids: []
    source_claims: [claim-generative-model]
  - id: generative-model-boundary
    labels: {zh: "GenerativeModel 与 ModelActor 边界", en: "GenerativeModel versus ModelActor boundary", ja: "GenerativeModel と ModelActor 境界"}
    descriptions: {zh: "model manifest is env config; chat completion is Execution; GenerativeModel must not treat Modelfile path as Execution result.", en: "model manifest is env config; chat completion is Execution; GenerativeModel must not treat Modelfile path as Execution result.", ja: "manifest env; chat completion Execution."}
    field_values: {output_modality: text}
    related_node_ids: [GenerativeModel, EmbeddingModel]
    related_relation_ids: []
    source_claims: [claim-generative-model]
  - id: generative-model-instance-model-g-12
    labels: {zh: "gpt-4o generation run 实例", en: "gpt-4o generation run instance", ja: "gpt-4o generation run 事例"}
    descriptions: {zh: "Helicone instance: request_id=hc-771 latency_ms=842 cost_usd=0.003 model=gpt-4o->GenerativeModel.", en: "Helicone instance: request_id latency cost model->GenerativeModel.", ja: "Helicone instance maps to GenerativeModel Execution."}
    field_values: {model_id: model-g-12, version: 2026-06-01, provider: example-ai, output_modality: text, context_limit: 128000}
    related_node_ids: [GenerativeModel, Artifact, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-generative-model]
parent_relation:
  id: GenerativeModel-specializes-Model
  predicate: is_a
  target: concept:Model
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是生成模型资产, en: is a generative model asset, ja: 生成モデル資産である}
  definitions: {zh: 每个 GenerativeModel 都是具有已声明生成内容输出契约的 Model。, en: Every GenerativeModel is a Model with a declared generated-content output contract., ja: すべての GenerativeModel は宣言済み生成コンテンツ出力契約を持つ Model である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_generative_model, labels: {zh: 具有生成模型, en: has generative model, ja: 生成モデルを持つ}}
  conditions:
    - id: generative-model-parent-condition
      severity: error
      expression: Require a declared generative output modality.
      explanations: {zh: 仅有输入模态不足以分类模型。, en: Input modality alone is insufficient to classify the model., ja: 入力モダリティだけではモデルの分類に不十分である。}
      source_claims: [claim-generative-model]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-generative-model]
relations: []
sources:
  - id: openai-agents-models
    title: OpenAI Agents SDK models
    url: https://openai.github.io/openai-agents-js/guides/models/
    source_type: official-doc
    relevance: Documents model selection and provider interfaces separately from agent-runtime configuration and execution.
source_claims:
  - id: claim-generative-model
    source: openai-agents-models
    supports: The Agents SDK keeps model configuration and provider interfaces separate from agent execution, supporting a versioned generation-capability Entity in this ontology.
    locator: Models overview
    evidence_kind: official-doc
    confidence: medium

