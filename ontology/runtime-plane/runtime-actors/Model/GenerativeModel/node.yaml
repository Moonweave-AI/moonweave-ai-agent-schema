schema: moonweave.ai/ontology-node/v1
id: GenerativeModel
kind: concept
status: accepted
labels:
  zh: 生成模型
  en: generative model
  ja: 生成モデル
semantics:
  short_definition:
    zh: 生成模型是根据输入上下文产生新文本、结构化内容或工具调用提议的运行模型。
    en: A GenerativeModel is a Model that produces new text, structured content, or proposed tool calls conditioned on input context.
    ja: GenerativeModel は入力 context に条件付けて新しい text、構造化内容、tool-call 提案を生成する Model である。
  definition:
    zh: 生成模型是 Model 的一种；其种差是推理输出是依据输入与模型参数逐步生成的新内容，例如自然语言、代码、结构化对象或工具调用，而非仅返回固定维度向量或给定候选的排序分数。它可以被 AgentActor 使用，但不拥有智能体的指令、工具执行或循环控制责任。
    en: A GenerativeModel is a Model distinguished by inference that generates new content from input and model parameters, such as natural language, code, structured objects, or tool calls, rather than only a fixed-dimensional vector or scores over supplied candidates. An AgentActor may use it, but the model does not own agent instructions, tool execution, or loop control.
    ja: GenerativeModel は Model の一種で、入力とモデルパラメータから自然言語、コード、構造化 object、tool call などの新内容を生成し、固定次元 vector や候補 score だけを返すものではない。AgentActor が使用し得るが、指示、ツール実行、ループ制御は所有しない。
  why_needed:
    zh: 该子类为生成能力、结构化输出和工具调用兼容性提供准确选择边界，同时避免把模型生成行为误当作完整智能体。
    en: This subtype gives generation, structured-output, and tool-call compatibility an accurate selection boundary without mistaking model generation for a complete agent.
    ja: この下位型は生成、構造化出力、tool-call 互換性の正確な選択境界を与え、モデル生成を完全なエージェントと混同しない。
  includes:
    - zh: 纳入输入提示或多模态上下文后生成自然语言、代码、图像描述、结构化输出或工具调用参数的模型版本。
      en: Includes a model version that generates language, code, image descriptions, structured output, or tool-call arguments from prompts or multimodal context.
      ja: prompt または multimodal context から言語、コード、画像記述、構造化出力、tool-call 引数を生成するモデル版を含む。
  excludes:
    - zh: 不纳入 EmbeddingModel、只重排候选的 RerankerModel、缓存响应、生成结果、AgentActor 或模型服务进程。
      en: Excludes an EmbeddingModel, a RerankerModel that only reorders candidates, a cached response, generated result, AgentActor, and model-service process.
      ja: EmbeddingModel、候補並べ替えだけの RerankerModel、cache 応答、生成結果、AgentActor、モデルサービスプロセスは含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: GenerativeModel-example-positive-001
    kind: positive
    labels:
      zh: 生成模型正例
      en: Positive example of generative model
      ja: 生成モデルの正例
    scenario_id: null
    descriptions:
      zh: generative-v7 接收合同文本与 JSON schema，生成符合 schema 的风险摘要，并在需要外部事实时输出 search_documents 工具调用参数。
      en: generative-v7 receives contract text and a JSON schema, generates a schema-conforming risk summary, and emits search_documents arguments when external facts are needed.
      ja: generative-v7 は契約 text と JSON schema を受け、schema 適合リスク要約を生成し、外部事実が必要なら search_documents 引数を出す。
    field_values:
      model_id: generative-v7-schema
      model_version: 7.1.0
      model_kind: generative
      resolver_ref: provider-structured-generation
      capability_profile:
        structured_output: true
        tool_calls: true
        input_modalities:
          - text
          - json-schema
    related_node_ids:
      - GenerativeModel
      - Model
    related_relation_ids:
      - GenerativeModel-is_a-Model
    expected_result:
      zh: generative-v7 归类为 GenerativeModel。
      en: generative-v7 is classified as GenerativeModel.
      ja: generative-v7 は GenerativeModel に分類される。
    why_valid_or_invalid:
      zh: 其核心推理行为是根据输入生成新的语言与结构化内容，而不是向量化或候选打分。
      en: Its core inference behavior generates new language and structured content from input rather than embedding or scoring candidates.
      ja: 核心推論挙動が入力から新言語・構造化内容を生成し、vector 化や候補採点ではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-generative-model-001
  - id: GenerativeModel-example-boundary-001
    kind: boundary
    labels:
      zh: 生成模型边界例
      en: Boundary case for generative model
      ja: 生成モデルの境界例
    scenario_id: null
    descriptions:
      zh: embed-v3 将每段合同映射为 1536 维向量，输出只用于相似度检索，不生成摘要或工具调用。
      en: embed-v3 maps each contract passage to a 1536-dimensional vector used only for similarity retrieval and generates no summary or tool call.
      ja: embed-v3 は各契約 passage を 1536 次元 vector へ写像し類似検索だけに使い、要約や tool call を生成しない。
    field_values: {}
    related_node_ids:
      - GenerativeModel
      - Model
      - EmbeddingModel
    related_relation_ids:
      - GenerativeModel-is_a-Model
    expected_result:
      zh: embed-v3 是 EmbeddingModel，不是 GenerativeModel。
      en: embed-v3 is an EmbeddingModel, not a GenerativeModel.
      ja: embed-v3 は EmbeddingModel であり GenerativeModel ではない。
    why_valid_or_invalid:
      zh: 固定维度表示学习与开放式内容生成具有不同输出语义和使用契约。
      en: Fixed-dimensional representation and open-ended content generation have different output semantics and use contracts.
      ja: 固定次元表現と開放的内容生成は出力意味と利用契約が異なる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-generative-model-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RerankerModel
    shared_parent_concept_id: Model
    differentia:
      zh: 正向身份比较：父节点 Model：GenerativeModel（semantic kind=entity，骨架 GenerativeModel-is_a-Model）；RerankerModel（semantic kind=entity，骨架 RerankerModel-is_a-Model）。双端条件：GenerativeModel 条件：“生成模型是以如下事实为区分特征的运行模型：它是以产生文本、代码、结构化输出或调用参数为区分能力的一种模型”；RerankerModel 条件：“重排序模型是以如下事实为区分特征的运行模型：它是以重新排列候选项为区分能力的一种模型”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent Model: GenerativeModel (semantic kind=entity, backbone GenerativeModel-is_a-Model); RerankerModel (semantic kind=entity, backbone RerankerModel-is_a-Model). Endpoint conditions: GenerativeModel condition: “Generative model is a runtime model; its differentiating condition is that it is a Model distinguished by generating text, code, structured output, or call arguments”; RerankerModel condition: “Reranker model is a runtime model; its differentiating condition is that it is a Model distinguished by reordering candidate items using relevance evidence”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 Model：GenerativeModel（semantic kind=entity、バックボーン GenerativeModel-is_a-Model）；RerankerModel（semantic kind=entity、バックボーン RerankerModel-is_a-Model）。両端条件：GenerativeModel の条件：「生成モデルは実行モデルの一種であり、次の条件で区別されます：それはテキスト、コード、構造化出力、呼出引数を生成する能力で区別される Model である」；RerankerModel の条件：「再順位付けモデルは実行モデルの一種であり、次の条件で区別されます：それは関連性証拠に基づき候補を並べ替える能力で区別される Model である」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-generative-model-002
      - claim-generative-model-003
parent_relation:
  id: GenerativeModel-is_a-Model
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: GenerativeModel-is_a-Model 表示每个生成模型都是可解析版本的 Model，并以根据输入上下文产生新文本、结构化输出或工具调用建议为种差；AgentActor 的循环控制、模型服务进程和一次生成结果不属于该模型子类。
    en: GenerativeModel-is_a-Model states that every generative model is a resolvable versioned Model differentiated by producing new text, structured output, or proposed tool calls from input context; AgentActor loop control, a model-service process, and one generated result are not this model subtype.
    ja: GenerativeModel-is_a-Model は全生成 model が解決可能な版付き Model で、入力 context から新しい text・structured output・tool call 提案を生成することを種差とする。AgentActor loop 制御、model service process、一生成結果はこの型でない。
  cardinality: null
