schema: moonweave.ai/ontology-node/v1
id: Model
kind: concept
labels:
  zh: 运行模型
  en: runtime model
  ja: 実行モデル
semantics:
  short_definition:
    zh: 运行模型是由提供商或本地运行时解析并用于执行推理的版本化计算对象。
    en: A runtime Model is a versioned computational object resolved by a provider or local runtime and used to perform inference.
    ja: 実行 Model は提供者またはローカル実行環境が解決し、推論に使う版付き計算対象である。
  definition:
    zh: 运行模型是一类计算实体；其种差是它以稳定系列与版本身份实现可调用的输入—输出推理行为，并声明适用模态、上下文、能力和兼容限制，可由 ModelActor 解析和调用。它不是正在运行的推理服务、提供商组织、AgentActor、模型名称字符串、一次响应或训练数据集。
    en: A runtime Model is a computational entity distinguished by a stable family and version identity implementing callable input-output inference behavior and declaring applicable modalities, context, capabilities, and compatibility limits, resolvable and invocable by a ModelActor. It is not the running inference service, provider organization, AgentActor, model-name string, one response, or training dataset.
    ja: 実行 Model は、安定した系列・版識別子で呼出可能な入出力推論挙動を実装し、適用 modality、context、能力、互換制約を宣言し、ModelActor が解決・呼出できる計算実体である。稼働推論サービス、提供者組織、AgentActor、モデル名文字列、単一応答、訓練データではない。
  why_needed:
    zh: 该根概念使模型版本、能力与兼容性能够独立于调用服务和智能体生命周期管理，避免路由或升级时混淆制品与执行者。
    en: This root concept lets model version, capability, and compatibility be managed independently from the calling service and agent lifecycle, avoiding confusion between artifact and executor during routing or upgrade.
    ja: この根概念はモデル版、能力、互換性を呼出サービスとエージェントライフサイクルから独立管理し、経路・更新で成果物と実行者を混同しない。
  includes:
    - zh: 纳入具有可解析系列与版本身份、推理接口和能力约束的托管或本地生成、嵌入、重排序模型。
      en: Includes a hosted or local generative, embedding, or reranking model with resolvable family and version identity, inference interface, and capability constraints.
      ja: 解決可能な系列・版識別子、推論 interface、能力制約を持つホスト型またはローカル生成・embedding・reranking model を含む。
  excludes:
    - zh: 不纳入 ModelActor、模型提供商、模型别名字符串、ModelSettings、推理请求、响应、Embedding 向量或训练活动。
      en: Excludes a ModelActor, model provider, model-alias string, ModelSettings, inference request, response, Embedding vector, and training activity.
      ja: ModelActor、モデル提供者、別名文字列、ModelSettings、推論要求、応答、Embedding vector、訓練活動は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Model 映射 OpenAI model 字段、Anthropic model 参数与 embedding/rerank 端点标识的版本化计算对象；assistant.model 默认值在没有 invocation 证据时不得写入 uses 事实。
    en: Model maps OpenAI model field, Anthropic model parameter, and versioned embedding/rerank endpoints; assistant.model defaults without invocation evidence must not become uses facts.
    ja: Model は OpenAI/Anthropic model 識別子と版付き計算 object を写像し、invocation 証拠なき default は uses 事実になりません。
  typical_input:
    - description: OpenAI Assistants assistant/model/tools or LangGraph runnable config.
      format: '{"model":"gpt-4.1","object":"model"}'
      source_claims:
        - claim-openai-assistants-actor
        - claim-model-design
  typical_output:
    - description: Moonweave Actor projection with participation evidence.
      format: '{"model_id":"model:gpt-4.1:2026-04-14","model_kind":"generative"}'
      source_claims:
        - claim-model-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
structure:
  identity_keys:
    - model_id
    - model_version
  fields:
    - id: model_id
      labels:
        zh: 模型标识
        en: model ID
        ja: モデル ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识提供方或本地解析器可解析的计算模型族。
        en: Identifies the computational model family resolvable by a provider or local resolver.
        ja: provider または local resolver が解決できる計算 model family を識別します。
      allowed_values: []
      pattern: null
      example_value: generative-v7
      source_claims:
        - claim-model-design
    - id: model_version
      labels:
        zh: 模型版本
        en: model version
        ja: モデル版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定影响推理行为和能力声明的模型版本或不可变修订。
        en: Pins the model version or immutable revision that affects inference behavior and capability claims.
        ja: 推論挙動と capability claim に影響する model version または immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: 7.0.0
      source_claims:
        - claim-model-design
    - id: model_kind
      labels:
        zh: 模型类别
        en: model kind
        ja: モデル種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分生成、嵌入和重排计算合同的受控类别。
        en: Controlled category distinguishing generative, embedding, and reranking computation contracts.
        ja: 生成、embedding、reranking の計算 contract を区別する制御カテゴリです。
      allowed_values:
        - id: runtime-model-kind-generative
          value: generative
          labels:
            zh: 生成
            en: generative
            ja: 生成
          definitions:
            zh: 基于输入上下文生成文本、结构化内容或工具调用。
            en: Generates text, structured content, or tool calls from input context.
            ja: 入力 context から text、structured content、tool call を生成します。
          source_claims:
            - claim-model-design
        - id: runtime-model-kind-embedding
          value: embedding
          labels:
            zh: 嵌入
            en: embedding
            ja: embedding
          definitions:
            zh: 把输入编码为固定维度数值向量。
            en: Encodes inputs as fixed-dimensional numeric vectors.
            ja: 入力を固定次元の数値 vector へ符号化します。
          source_claims:
            - claim-model-design
        - id: runtime-model-kind-reranker
          value: reranker
          labels:
            zh: 重排
            en: reranker
            ja: reranker
          definitions:
            zh: 按查询相关性重新评分并排序候选项。
            en: Rescores and orders supplied candidates for a query.
            ja: query に対して候補を再採点し並べ替えます。
          source_claims:
            - claim-model-design
      pattern: null
      example_value: generative
      source_claims:
        - claim-model-design
    - id: resolver_ref
      labels:
        zh: 解析器引用
        en: resolver reference
        ja: resolver 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向把模型标识解析为可调用实现的 ModelProvider 或本地运行时。
        en: References the ModelProvider or local runtime that resolves the model identity to a callable implementation.
        ja: model identity を callable implementation へ解決する ModelProvider または local runtime を参照します。
      allowed_values: []
      pattern: null
      example_value: provider-main
      source_claims:
        - claim-model-design
    - id: capability_profile
      labels:
        zh: 能力画像
        en: capability profile
        ja: 能力 profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存与该固定版本一致的上下文限制、模态、结构化输出、工具调用、维度或排序能力。
        en: Stores version-specific context limits, modalities, structured-output, tool-call, dimensional, or ranking capabilities.
        ja: 固定 version に対応する context limit、modality、structured output、tool call、dimension、ranking capability を保持します。
      allowed_values: []
      pattern: null
      example_value:
        context_limit_tokens: 128000
        structured_output: true
        tool_calls: true
      source_claims:
        - claim-model-design
  constraints:
    - id: runtime-model-kind-and-version-consistency
      severity: error
      expression_language: plain
      expression: model_kind must agree with the most specific Model subtype and model_version must identify the immutable behavior described by capability_profile
      explanations:
        zh: 模型类别必须与最具体下位类型一致，版本必须固定能力画像所描述的行为。
        en: model_kind matches the most specific subtype, and model_version pins the behavior described by capability_profile.
        ja: model_kind は最具体下位型と一致し、model_version は capability_profile の挙動を固定します。
      source_claims:
        - claim-model-design
  required_relation_constraints: []
examples:
  - id: Model-example-positive-001
    labels:
      zh: OpenAI gpt-4o 模型资产
      en: OpenAI gpt-4o model asset
      ja: OpenAI gpt-4o モデル資産
    descriptions:
      zh: OpenAI Agents SDK Agent(model=) 引用 Model model_id=model-g-12、provider=openai、model_name=gpt-4o 作为生成模型资产。
      en: OpenAI Agents SDK Agent(model=) references Model model_id=model-g-12, provider=openai, model_name=gpt-4o as generative model asset.
      ja: OpenAI gpt-4o が Model 資産として参照される。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      model_id: provider-generative-v7
      model_version: 7.0.0
      model_kind: generative
      resolver_ref: provider-main
      capability_profile:
        context_limit_tokens: 131072
        structured_output: true
        tool_calls: true
    related_node_ids:
      - Model
      - ModelActor
    related_relation_ids:
      - ModelActor-uses-Model
    source_claims:
      - claim-model-design
  - id: Model-example-boundary-001
    labels:
      zh: LangSmith model 字符串非 Model
      en: LangSmith model string not Model
      ja: LangSmith model 文字列は Model ではない
    descriptions:
      zh: LangSmith run.extra.metadata.model= 是 span 元数据字符串，不是 Moonweave Model 资产记录。
      en: LangSmith run.extra.metadata.model= is span metadata string, not Moonweave Model asset record.
      ja: LangSmith model 文字列は Model 資産ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - Model
      - ModelActor
    related_relation_ids:
      - ModelActor-uses-Model
    source_claims:
      - claim-model-design
  - id: Model-example-3
    labels:
      zh: Model 与 GenerativeModel 边界
      en: Model versus GenerativeModel boundary
      ja: Model と GenerativeModel 境界
    descriptions:
      zh: Model 是模型资产基类；GenerativeModel/EmbeddingModel/RerankerModel 是子类；ModelActor 引用 Model 不合并 span metadata。
      en: Model is model asset base class; GenerativeModel/EmbeddingModel/RerankerModel are subtypes; ModelActor references Model without merging span metadata.
      ja: Model 階層と ModelActor 参照は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - Model
    related_relation_ids: []
    source_claims:
      - claim-model-design
      - claim-model-design
  - id: Model-example-4
    labels:
      zh: model-g-12 gpt-4o 实例
      en: model-g-12 gpt-4o instance
      ja: model-g-12 gpt-4o 事例
    descriptions:
      zh: Model model_id=model-g-12、provider=openai、model_name=gpt-4o、model_kind=GenerativeModel。
      en: Model model_id=model-g-12, provider=openai, model_name=gpt-4o, model_kind=GenerativeModel.
      ja: model-g-12 gpt-4o Model を記録する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - Model
    related_relation_ids: []
    source_claims:
      - claim-model-design
      - claim-model-design
parent_relation: null
relations: []
sources:
  - id: src-openai-assistants
    title: OpenAI Assistants API
    url: https://platform.openai.com/docs/api-reference/assistants
    source_type: official-doc
    relevance: Assistant, model, and tool role objects for AgentActor, Model, ToolServiceActor.
  - id: src-langgraph
    title: LangGraph Documentation
    url: https://langchain-ai.github.io/langgraph/
    source_type: official-doc
    relevance: Compiled node executors and runnable config actor metadata.
  - id: src-anthropic-messages
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Message roles and streaming for actor participation evidence.
  - id: src-a2a
    title: Agent2Agent (A2A) Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Agent Card discovery and remote AgentActor resolution.
  - id: src-runtime-actors-design
    title: Moonweave runtime-actors module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Actor, RuntimeRole, Model, ActorBinding, RemoteAgentReference boundaries.
source_claims:
  - id: claim-openai-assistants-actor
    source: src-openai-assistants
    supports: OpenAI Assistants API exposes assistant, model, and tool identities mappable to runtime actors when a run occurs.
    locator: Assistants > assistant object
    evidence_kind: design-inference
    confidence: high
  - id: claim-langgraph-executor-actor
    source: src-langgraph
    supports: LangGraph node invoke and runnable config can carry actor identifiers for AgentProcess mapping.
    locator: Graph API > invoke > configurable
    evidence_kind: design-inference
    confidence: high
  - id: claim-model-design
    source: src-runtime-actors-design
    supports: Model is versioned computational object distinct from ModelActor executor.
    locator: Model boundary
    evidence_kind: design-inference
    confidence: high
