schema: moonweave.ai/ontology-node/v1
id: Model
kind: concept
status: review
labels:
  zh: 运行模型
  en: runtime model
  ja: 実行モデル
semantics:
  short_definition:
    zh: 运行模型是由提供商或本地运行时解析并用于执行推理的版本化计算对象。
    en: A runtime Model is a versioned computational object resolved by a provider or local runtime and used to perform inference.
    ja: 実行 Model は提供者またはローカル実行環境が解決し、推論に使う版付き計算対象である。
  definition:
    zh: 运行模型是一类计算实体；其种差是它以稳定系列与版本身份实现可调用的输入—输出推理行为，并声明适用模态、上下文、能力和兼容限制，可由 ModelActor 解析和调用。它不是正在运行的推理服务、提供商组织、AgentActor、模型名称字符串、一次响应或训练数据集。
    en: A runtime Model is a computational entity distinguished by a stable family and version identity implementing callable input-output inference behavior and declaring applicable modalities, context, capabilities, and compatibility limits, resolvable and invocable by a ModelActor. It is not the running inference service, provider organization, AgentActor, model-name string, one response, or training dataset.
    ja: 実行 Model は、安定した系列・版識別子で呼出可能な入出力推論挙動を実装し、適用 modality、context、能力、互換制約を宣言し、ModelActor が解決・呼出できる計算実体である。稼働推論サービス、提供者組織、AgentActor、モデル名文字列、単一応答、訓練データではない。
  why_needed:
    zh: 该根概念使模型版本、能力与兼容性能够独立于调用服务和智能体生命周期管理，避免路由或升级时混淆制品与执行者。
    en: This root concept lets model version, capability, and compatibility be managed independently from the calling service and agent lifecycle, avoiding confusion between artifact and executor during routing or upgrade.
    ja: この根概念はモデル版、能力、互換性を呼出サービスとエージェントライフサイクルから独立管理し、経路・更新で成果物と実行者を混同しない。
  includes:
    - zh: 纳入具有可解析系列与版本身份、推理接口和能力约束的托管或本地生成、嵌入、重排序模型。
      en: Includes a hosted or local generative, embedding, or reranking model with resolvable family and version identity, inference interface, and capability constraints.
      ja: 解決可能な系列・版識別子、推論 interface、能力制約を持つホスト型またはローカル生成・embedding・reranking model を含む。
  excludes:
    - zh: 不纳入 ModelActor、模型提供商、模型别名字符串、ModelSettings、推理请求、响应、Embedding 向量或训练活动。
      en: Excludes a ModelActor, model provider, model-alias string, ModelSettings, inference request, response, Embedding vector, and training activity.
      ja: ModelActor、モデル提供者、別名文字列、ModelSettings、推論要求、応答、Embedding vector、訓練活動は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - model_id
    - model_version
  fields:
    - id: model_id
      labels:
        zh: 模型标识
        en: model ID
        ja: モデル ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识提供方或本地解析器可解析的计算模型族。
        en: Identifies the computational model family resolvable by a provider or local resolver.
        ja: provider または local resolver が解決できる計算 model family を識別します。
      allowed_values: []
      pattern: null
      example_value: generative-v7
      source_claims:
        - claim-model-002
    - id: model_version
      labels:
        zh: 模型版本
        en: model version
        ja: モデル版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定影响推理行为和能力声明的模型版本或不可变修订。
        en: Pins the model version or immutable revision that affects inference behavior and capability claims.
        ja: 推論挙動と capability claim に影響する model version または immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: 7.0.0
      source_claims:
        - claim-model-003
    - id: model_kind
      labels:
        zh: 模型类别
        en: model kind
        ja: モデル種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分生成、嵌入和重排计算合同的受控类别。
        en: Controlled category distinguishing generative, embedding, and reranking computation contracts.
        ja: 生成、embedding、reranking の計算 contract を区別する制御カテゴリです。
      allowed_values:
        - id: runtime-model-kind-generative
          value: generative
          labels:
            zh: 生成
            en: generative
            ja: 生成
          definitions:
            zh: 基于输入上下文生成文本、结构化内容或工具调用。
            en: Generates text, structured content, or tool calls from input context.
            ja: 入力 context から text、structured content、tool call を生成します。
          status: accepted
          source_claims:
            - claim-model-004
        - id: runtime-model-kind-embedding
          value: embedding
          labels:
            zh: 嵌入
            en: embedding
            ja: embedding
          definitions:
            zh: 把输入编码为固定维度数值向量。
            en: Encodes inputs as fixed-dimensional numeric vectors.
            ja: 入力を固定次元の数値 vector へ符号化します。
          status: accepted
          source_claims:
            - claim-model-005
        - id: runtime-model-kind-reranker
          value: reranker
          labels:
            zh: 重排
            en: reranker
            ja: reranker
          definitions:
            zh: 按查询相关性重新评分并排序候选项。
            en: Rescores and orders supplied candidates for a query.
            ja: query に対して候補を再採点し並べ替えます。
          status: accepted
          source_claims:
            - claim-model-006
      pattern: null
      example_value: generative
      source_claims:
        - claim-model-007
    - id: resolver_ref
      labels:
        zh: 解析器引用
        en: resolver reference
        ja: resolver 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向把模型标识解析为可调用实现的 ModelProvider 或本地运行时。
        en: References the ModelProvider or local runtime that resolves the model identity to a callable implementation.
        ja: model identity を callable implementation へ解決する ModelProvider または local runtime を参照します。
      allowed_values: []
      pattern: null
      example_value: provider-main
      source_claims:
        - claim-model-008
    - id: capability_profile
      labels:
        zh: 能力画像
        en: capability profile
        ja: 能力 profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存与该固定版本一致的上下文限制、模态、结构化输出、工具调用、维度或排序能力。
        en: Stores version-specific context limits, modalities, structured-output, tool-call, dimensional, or ranking capabilities.
        ja: 固定 version に対応する context limit、modality、structured output、tool call、dimension、ranking capability を保持します。
      allowed_values: []
      pattern: null
      example_value:
        context_limit_tokens: 128000
        structured_output: true
        tool_calls: true
      source_claims:
        - claim-model-009
  constraints:
    - id: runtime-model-kind-and-version-consistency
      severity: error
      expression_language: plain
      expression: model_kind must agree with the most specific Model subtype and model_version must identify the immutable behavior described by capability_profile
      explanations:
        zh: 模型类别必须与最具体下位类型一致，版本必须固定能力画像所描述的行为。
        en: model_kind matches the most specific subtype, and model_version pins the behavior described by capability_profile.
        ja: model_kind は最具体下位型と一致し、model_version は capability_profile の挙動を固定します。
      source_claims:
        - claim-model-010
  required_relation_constraints: []
examples:
  - id: Model-example-positive-001
    kind: positive
    labels:
      zh: 运行模型正例
      en: Positive example of runtime model
      ja: 実行モデルの正例
    scenario_id: null
    descriptions:
      zh: model://provider/generative-v7 固定系列、版本、上下文上限、结构化输出与工具调用能力，并可由模型提供者按该身份解析。
      en: model://provider/generative-v7 fixes family, version, context limit, structured-output and tool-call capabilities and can be resolved by a model provider under that identity.
      ja: model://provider/generative-v7 は系列、版、context 上限、構造化出力、tool-call 能力を固定し、その識別子で model provider が解決できる。
    field_values:
      model_id: provider-generative-v7
      model_version: 7.0.0
      model_kind: generative
      resolver_ref: provider-main
      capability_profile:
        context_limit_tokens: 131072
        structured_output: true
        tool_calls: true
    related_node_ids:
      - Model
      - ModelActor
    related_relation_ids:
      - ModelActor-uses-Model
    expected_result:
      zh: 该版本化计算对象归类为 Model，并可进一步归为 GenerativeModel。
      en: The versioned computational object is a Model and can be further classified as GenerativeModel.
      ja: この版付き計算対象は Model であり、さらに GenerativeModel に分類できる。
    why_valid_or_invalid:
      zh: 对象具有稳定模型身份、可调用推理行为与明确能力限制，而不是调用它的服务进程。
      en: The object has stable model identity, callable inference behavior, and explicit capability limits rather than being the service process that invokes it.
      ja: 安定したモデル識別子、呼出可能推論挙動、明示能力制約があり、呼出サービスプロセスではない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-model-001
  - id: Model-example-boundary-001
    kind: boundary
    labels:
      zh: 运行模型边界例
      en: Boundary case for runtime model
      ja: 実行モデルの境界例
    scenario_id: null
    descriptions:
      zh: model-gateway-3 解析模型别名、发送请求、处理重试并记录用量，但网关本身没有固定推理权重或版本行为。
      en: model-gateway-3 resolves aliases, sends requests, handles retries, and records usage, but the gateway itself has no fixed inference weights or version behavior.
      ja: model-gateway-3 は別名解決、要求送信、再試行、使用量記録を行うが、固定推論重みや版挙動を持たない。
    field_values: {}
    related_node_ids:
      - Model
      - ModelActor
    related_relation_ids:
      - ModelActor-uses-Model
    expected_result:
      zh: 该网关归类为 ModelActor，不归类为 Model。
      en: The gateway is a ModelActor, not a Model.
      ja: このゲートウェイは ModelActor であり Model ではない。
    why_valid_or_invalid:
      zh: 执行模型调用的软件与被解析的版本化计算对象承担不同身份与生命周期。
      en: Software executing model calls and the resolved versioned computational object have different identities and lifecycles.
      ja: モデル呼出を実行するソフトウェアと解決される版付き計算対象は異なる識別子とライフサイクルを持つ。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-model-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
  - id: claim-model-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK accepts model names or concrete Model implementations and resolves names through ModelProvider. Moonweave uses that separation for a versioned computational Model independent from the calling actor.
    locator: Models > Choosing a model setup, ModelProvider, and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-model-002
    source: eng-fw-openai-python-docs
    supports: The SDK accepts a model name or concrete Model implementation. Moonweave records the stable resolver-facing name as model_id while separating version and provider resolution.
    locator: OpenAI Agents SDK > Models > passing a model name or concrete Model implementation
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-model-003
    source: eng-fw-openai-python-docs
    supports: The SDK permits selection of a specific named or concrete model. Moonweave requires model_version so audited behavior is not attributed only to a mutable alias.
    locator: OpenAI Agents SDK > Models > selecting a specific model per Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-model-004
    source: eng-fw-openai-python-docs
    supports: The SDK resolves Model implementations for content and tool-call generation. Moonweave assigns the generative discriminator to that contract.
    locator: OpenAI Agents SDK > Models > Model interface used by the agent loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-model-005
    source: eng-api-openai-embeddings
    supports: The official API defines embedding models by returning numeric vector representations for input. Moonweave uses embedding as the discriminator for this contract.
    locator: OpenAI Embeddings guide > embeddings and create embeddings input, model, and dimensions
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-model-006
    source: eng-model-cohere-rerank
    supports: The official Rerank documentation defines a model that receives a query and candidate documents and returns relevance ordering. Moonweave uses reranker as that contract's discriminator.
    locator: Cohere Rerank overview > query, documents, and relevance ordering
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-model-007
    source: eng-fw-openai-python-docs
    supports: The SDK's Model interface represents inference used by an agent, while embedding and reranking APIs expose different input-output contracts. Moonweave records that non-interchangeable contract in model_kind.
    locator: OpenAI Agents SDK > Models > Model interface and provider resolution
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-model-008
    source: eng-fw-openai-python-docs
    supports: The SDK explicitly supports a ModelProvider that maps model names to Model instances and direct concrete implementations. resolver_ref preserves which resolver supplied the audited object.
    locator: OpenAI Agents SDK > Models > ModelProvider at Runner.run scope and concrete Model implementations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-model-009
    source: eng-fw-openai-python-docs
    supports: The SDK exposes model-specific settings and notes differences among concrete models and providers. Moonweave keeps the verified version-specific capability declaration together in capability_profile.
    locator: OpenAI Agents SDK > Models > ModelSettings and model-specific configuration
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-model-010
    source: eng-fw-openai-python-docs
    supports: The SDK separates model selection, resolution, and settings. Moonweave validates their coherence as a local audit invariant.
    locator: OpenAI Agents SDK > Models > choosing a model, ModelProvider, and model-specific settings
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
