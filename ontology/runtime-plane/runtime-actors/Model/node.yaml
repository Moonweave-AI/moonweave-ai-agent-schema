schema: moonweave.ai/ontology-node/v1
id: Model
kind: concept
status: accepted
labels: {zh: 模型资产, en: Model asset, ja: モデル資産}
semantics:
  short_definition: {zh: 描述运行时参与者所用计算模型能力的版本化 Entity。, en: A versioned Entity that describes a computational model capability used by runtime actors., ja: ランタイムアクターが使用する計算モデル能力を記述するバージョン化 Entity。}
  definition: {zh: Model 是版本化信息 Entity，标识模型预期的输入和输出模态、提供方或溯源以及能力限制。它不同于服务请求的 ModelActor、模型调用 Activity、提示或响应 Entity，以及调用产生的可观测性信号。, en: "A Model is a versioned information Entity identifying a model's intended input and output modality, provider or provenance, and capability limits. It is distinct from a ModelActor that serves requests, a model-invocation Activity, the prompt or response Entities, and observability signals from the call.", ja: Model はモデルの意図された入力および出力モダリティ、プロバイダーまたは来歴、能力制限を識別するバージョン化情報 Entity である。要求を提供する ModelActor、モデル呼び出し Activity、プロンプトまたは応答 Entity、呼び出しからの可観測性シグナルとは異なる。}
  why_needed: {zh: 可重现性和安全性依赖于准确知道选用了哪个模型配置，同时避免错误声称模型描述符本身执行了运行时操作。, en: "Reproducibility and safety depend on knowing exactly which model configuration was selected while avoiding the false claim that the model descriptor itself performed a runtime action.", ja: 再現性と安全性は、選択されたモデル構成を正確に知ることに依存し、モデル記述子自体がランタイム操作を実行したという誤った主張を避けなければならない。}
  includes:
    - {zh: 带模态和能力元数据的版本化生成、嵌入和重排序模型描述符。, en: "Versioned generative, embedding, and reranker model descriptors with modality and capability metadata.", ja: モダリティと能力メタデータを持つバージョン化された生成、埋め込み、リランカーモデル記述子。}
    - {zh: 不可变模型 ID、提供方引用和已声明输入或输出契约。, en: "Immutable model IDs, provider references, and declared input or output contracts.", ja: 不変のモデル ID、プロバイダー参照、宣言済み入力または出力契約。}
  excludes:
    - {zh: 推理端点、请求、补全、span 或成本记录。, en: "An inference endpoint, request, completion, span, or cost record.", ja: 推論エンドポイント、要求、補完、span、コスト記録。}
    - {zh: 没有可解析版本或部署引用的模糊提供方系列名称。, en: A vague provider family name without a resolvable version or deployment reference., ja: 解決可能なバージョンまたはデプロイ参照を持たない曖昧なプロバイダーファミリー名。}
  semantic_kind: entity
  aliases: [model version, model descriptor]
engineering:
  explanation: {zh: 运行时从配置选择 model_id，并在每次推理归因中记录已解析版本。模型记录发布能力元数据；ModelActor 拥有服务操作，TraceSpan 观察一次调用。, en: "A runtime chooses a model_id from configuration and records the resolved version in each inference attribution. The model record publishes capability metadata; a ModelActor owns serving operations and a TraceSpan observes one call.", ja: ランタイムは構成から model_id を選択し、各推論帰属に解決済みバージョンを記録する。モデル記録は能力メタデータを公開し、ModelActor は提供操作を担い、TraceSpan は一つの呼び出しを観測する。}
  typical_input:
    - description: {zh: 模型描述符注册, en: Model descriptor registration, ja: モデル記述子登録}
      format: |-
        {"model_id":"model-g-12","provider":"example-ai","version":"2026-06-01","kind":"GenerativeModel","input_modalities":["text"]}
  typical_output:
    - description: {zh: 已解析模型契约, en: Resolved model contract, ja: 解決済みモデル契約}
      format: |-
        {"model_id":"model-g-12","kind":"GenerativeModel","output_modality":"text","context_limit":128000}
  reference_implementations:
    - {name: OpenAI Agents SDK Models, url: https://openai.github.io/openai-agents-js/guides/models/, description: Documents model selection and provider interfaces separately from agent configuration and execution.}
structure:
  identity_keys: [model_id, version]
  fields:
    - id: model_id
      labels: {zh: 模型 ID, en: Model ID, ja: モデル ID}
      definitions: {zh: 一个模型系列或部署描述符的稳定标识符。, en: Stable identifier for one model family or deployment descriptor., ja: 一つのモデルファミリーまたはデプロイ記述子の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: model-g-12
      source_claims: [claim-model-entity]
    - id: version
      labels: {zh: 模型版本, en: Model version, ja: モデルバージョン}
      definitions: {zh: 用于解析模型行为的不可变提供方、发布或内容版本。, en: "Immutable provider, release, or content version used to resolve model behavior.", ja: モデル動作の解決に使用される不変のプロバイダー、リリース、コンテンツバージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-06-01
      source_claims: [claim-model-entity]
    - id: provider
      labels: {zh: 模型提供方, en: Model provider, ja: モデルプロバイダー}
      definitions: {zh: 发布模型描述符的权威机构或来源。, en: Authority or source that publishes the model descriptor., ja: モデル記述子を公開する権限主体またはソース。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: example-ai
      source_claims: [claim-model-entity]
  constraints:
    - id: model-version-required
      severity: error
      language: plain
      expression: A runtime attribution must resolve model_id to a versioned model record.
      explanation: {zh: 仅有系列名称无法复现能力限制或输出行为。, en: A family name alone cannot reproduce capability limits or output behavior., ja: ファミリー名だけでは能力制限または出力動作を再現できない。}
      source_claims: [claim-model-entity]
  required_relations: []
examples:
  - id: model-positive
    labels: {zh: "OpenAI gpt-4o 模型资产", en: "OpenAI gpt-4o model asset", ja: "OpenAI gpt-4o モデル資産"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; Model maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; Model maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; Model provenance graph."}
    field_values: {model_id: model-g-12, version: 2026-06-01, provider: example-ai}
    related_node_ids: [Model, ModelActor]
    related_relation_ids: [ModelActor-serves-Model]
    source_claims: [claim-model-entity]
  - id: model-counterexample
    labels: {zh: "LangSmith model 字符串非 Model", en: "LangSmith model string not Model", ja: "LangSmith model 文字列は Model ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style Model.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style Model.", ja: "Missing parent_run_id rejects LangSmith-style Model."}
    field_values: {request_id: modelreq-9}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-model-entity]
  - id: model-boundary
    labels: {zh: "Model 与 GenerativeModel 边界", en: "Model versus GenerativeModel boundary", ja: "Model と GenerativeModel 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Model preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Model preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {model_id: model-g-12}
    related_node_ids: [Model, ModelActor]
    related_relation_ids: [ModelActor-serves-Model]
    source_claims: [claim-model-entity]
  - id: model-instance-model-g-12
    labels: {zh: "model-g-12 gpt-4o 实例", en: "model-g-12 gpt-4o instance", ja: "model-g-12 gpt-4o 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->Model.", en: "Langfuse instance: trace+span+score->Model.", ja: "Langfuse instance maps to Model."}
    field_values: {model_id: model-g-12, version: 2026-06-01, provider: example-ai}
    related_node_ids: [Model, ModelActor, TraceSpan]
    related_relation_ids: [ModelActor-serves-Model]
    source_claims: [claim-model-entity]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines an Entity as a thing with fixed aspects and distinguishes it from Activities and Agents.
  - id: openai-agents-models
    title: OpenAI Agents SDK models
    url: https://openai.github.io/openai-agents-js/guides/models/
    source_type: official-doc
    relevance: Documents model selection and provider interfaces separately from agent-runtime configuration and execution.
source_claims:
  - id: claim-model-entity
    source: prov-o-core
    supports: PROV-O defines an Entity as a physical, digital, conceptual, or other thing with some fixed aspects.
    locator: Section 3.1, prov:Entity
    evidence_kind: standard
    confidence: high

