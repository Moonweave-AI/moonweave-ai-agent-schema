schema: moonweave.ai/ontology-node/v1
id: EmbeddingModel
kind: concept
status: accepted
labels: {zh: 嵌入模型, en: Embedding model, ja: 埋め込みモデル}
semantics:
  short_definition: {zh: 其契约将输入内容映射为数值向量表示的 Model。, en: A Model whose contract maps input content to a numerical vector representation., ja: 契約が入力コンテンツを数値ベクトル表現へ写像する Model。}
  definition: {zh: EmbeddingModel 是将已声明输入模态转换为固定或配置维度向量表示、用于相似性、检索、聚类或下游评分的版本化 Model Entity。它不是一次调用生成的向量 Entity、向量索引、GenerativeModel 或推理 Activity。, en: "An EmbeddingModel is a versioned Model Entity that transforms declared input modalities into fixed- or configured-dimension vector representations for similarity, retrieval, clustering, or downstream scoring. It is not a vector Entity produced by one call, a vector index, a GenerativeModel, or an inference Activity.", ja: EmbeddingModel は、宣言済み入力モダリティを類似性、検索、クラスタリング、下流スコアリング用の固定または構成済み次元ベクトル表現に変換するバージョン化 Model Entity である。一回の呼び出しで生成されたベクトル Entity、ベクトルインデックス、GenerativeModel、推論 Activity ではない。}
  why_needed: {zh: 检索管道需要可重现的向量语义和维度。将嵌入模型当作生成答案或索引条目会掩盖兼容性要求和溯源。, en: "Retrieval pipelines need reproducible vector semantics and dimensions. Treating an embedding model as a generated answer or an index entry obscures compatibility requirements and provenance.", ja: 検索パイプラインには再現可能なベクトル意味と次元が必要である。埋め込みモデルを生成回答またはインデックス項目として扱うと、互換性要件と来歴が不明瞭になる。}
  includes:
    - {zh: 具有向量维度和归一化元数据的文本、图像或多模态嵌入模型版本。, en: "Text, image, or multimodal embedding model versions with vector dimension and normalization metadata.", ja: ベクトル次元と正規化メタデータを持つテキスト、画像、マルチモーダル埋め込みモデルバージョン。}
    - {zh: 已声明输入模态、向量维度和用于生成嵌入的模型版本。, en: "Declared input modality, vector dimension, and model version used to generate embeddings.", ja: 宣言済み入力モダリティ、ベクトル次元、埋め込み生成に使用されるモデルバージョン。}
  excludes:
    - {zh: 生成的嵌入向量、向量数据库行或相似度分数。, en: "A generated embedding vector, vector database row, or similarity score.", ja: 生成された埋め込みベクトル、ベクトルデータベース行、類似度スコア。}
    - {zh: 预期输出为生成内容或候选排序的模型。, en: A model whose intended output is generated content or candidate ordering., ja: 意図された出力が生成コンテンツまたは候補順位であるモデル。}
  semantic_kind: entity
  aliases: [vectorizer, embedding encoder]
engineering:
  explanation: {zh: 嵌入请求提交内容项和已解析模型 ID。响应返回带 model_id 和维度标签的向量；若向量维度或模型版本与索引契约不兼容，消费者必须拒绝该向量。, en: "An embedding request submits content items and a resolved model ID. The response returns vectors tagged with model_id and dimension; consumers must reject a vector if its dimension or model version is incompatible with the index contract.", ja: 埋め込み要求はコンテンツ項目と解決済みモデル ID を送信する。応答は model_id と次元がタグ付けされたベクトルを返し、次元またはモデルバージョンがインデックス契約と互換でなければ、コンシューマーはベクトルを拒否しなければならない。}
  typical_input:
    - description: {zh: 嵌入请求, en: Embedding request, ja: 埋め込み要求}
      format: |-
        {"model_id":"model-e-3","input":["runtime provenance"],"encoding_format":"float"}
  typical_output:
    - description: {zh: 嵌入响应, en: Embedding response, ja: 埋め込み応答}
      format: |-
        {"model_id":"model-e-3","dimension":1536,"vectors":[[0.12,-0.03,0.44]],"input_count":1}
  reference_implementations:
    - {name: OpenAI API Embeddings Guide, url: https://developers.openai.com/api/docs/guides/embeddings, description: Documents embeddings as vector representations generated for input content.}
structure:
  identity_keys: [model_id, version]
  fields:
    - id: model_id
      labels: {zh: 嵌入模型 ID, en: Embedding model ID, ja: 埋め込みモデル ID}
      definitions: {zh: 从版本化 Model 描述符继承的标识符。, en: Identifier inherited from the versioned Model descriptor., ja: バージョン化 Model 記述子から継承される識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: model-e-3
      source_claims: [claim-embedding-model]
    - id: version
      labels:
        zh: "模型版本"
        en: "Model version"
        ja: "モデルバージョン"
      definitions:
        zh: "该嵌入模型记录所属的已声明版本。"
        en: "Declared version to which this embedding-model record belongs."
        ja: "この埋め込みモデル記録が属する宣言済みバージョン。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-06-01
      source_claims: [claim-embedding-model]
    - id: provider
      labels:
        zh: "模型提供方"
        en: "Model provider"
        ja: "モデル提供者"
      definitions:
        zh: "对该版本模型承担交付责任的已声明提供方。"
        en: "Declared provider responsible for delivering this model version."
        ja: "このモデルバージョンの提供に責任を持つ宣言済みの提供者。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: example-ai
      source_claims: [claim-embedding-model]
    - id: vector_dimension
      labels: {zh: 向量维度, en: Vector dimension, ja: ベクトル次元}
      definitions: {zh: 配置的嵌入契约产生的数值分量数量。, en: Number of numeric components produced by the configured embedding contract., ja: 構成済み埋め込み契約が生成する数値コンポーネント数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 1536
      source_claims: [claim-embedding-model]
    - id: input_modality
      labels: {zh: 输入模态, en: Input modality, ja: 入力モダリティ}
      definitions: {zh: 嵌入契约接受的模态。, en: Modality accepted by the embedding contract., ja: 埋め込み契約が受け入れるモダリティ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      allowed_values: [text, image, multimodal]
      example_value: text
      source_claims: [claim-embedding-model]
  constraints:
    - id: embedding-vector-compatibility
      severity: error
      language: plain
      expression: Vectors stored or compared together must have the embedding model version and vector dimension required by the index contract.
      explanation: {zh: 来自不兼容模型版本或维度的看似相同向量不能安全比较。, en: Equal-looking vectors from incompatible model versions or dimensions are not safely comparable., ja: 互換でないモデルバージョンまたは次元からの同じように見えるベクトルは安全に比較できない。}
      source_claims: [claim-embedding-model]
  required_relations: [EmbeddingModel-specializes-Model]
examples:
  - id: embedding-model-positive
    labels: {zh: "OpenAI text-embedding-3-small", en: "OpenAI text-embedding-3-small", ja: "OpenAI text-embedding-3-small"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; EmbeddingModel maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; EmbeddingModel maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; EmbeddingModel provenance graph."}
    field_values: {model_id: model-e-3, version: 2026-06-01, provider: example-ai, vector_dimension: 1536, input_modality: text}
    related_node_ids: [EmbeddingModel, Model]
    related_relation_ids: []
    source_claims: [claim-embedding-model]
  - id: embedding-model-counterexample
    labels: {zh: "向量数组当 EmbeddingModel", en: "Vector array as EmbeddingModel", ja: "ベクトル配列を EmbeddingModel とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style EmbeddingModel.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style EmbeddingModel.", ja: "Missing parent_run_id rejects LangSmith-style EmbeddingModel."}
    field_values: {vector_id: vec-91}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-embedding-model]
  - id: embedding-model-boundary
    labels: {zh: "EmbeddingModel 与 TraceSpan 边界", en: "EmbeddingModel versus TraceSpan boundary", ja: "EmbeddingModel と TraceSpan 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; EmbeddingModel preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; EmbeddingModel preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {model_id: model-e-3}
    related_node_ids: [EmbeddingModel, RerankerModel]
    related_relation_ids: []
    source_claims: [claim-embedding-model]
  - id: embedding-model-instance-model-e-3
    labels: {zh: "model-e-3 retriever 实例", en: "model-e-3 retriever instance", ja: "model-e-3 retriever 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->EmbeddingModel.", en: "Langfuse instance: trace+span+score->EmbeddingModel.", ja: "Langfuse instance maps to EmbeddingModel."}
    field_values: {model_id: model-e-3, version: 2026-06-01, provider: example-ai, vector_dimension: 1536, input_modality: text}
    related_node_ids: [EmbeddingModel, Artifact]
    related_relation_ids: []
    source_claims: [claim-embedding-model]
parent_relation:
  id: EmbeddingModel-specializes-Model
  predicate: is_a
  target: concept:Model
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是嵌入模型资产, en: is an embedding model asset, ja: 埋め込みモデル資産である}
  definitions: {zh: 每个 EmbeddingModel 都是具有已声明向量表示输出契约的 Model。, en: Every EmbeddingModel is a Model with a declared vector-representation output contract., ja: すべての EmbeddingModel は宣言済みベクトル表現出力契約を持つ Model である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_embedding_model, labels: {zh: 具有嵌入模型, en: has embedding model, ja: 埋め込みモデルを持つ}}
  conditions:
    - id: embedding-model-parent-condition
      severity: error
      expression: Require a declared numerical vector output and dimension.
      explanations: {zh: 生成文本或排序列表不满足此子类型。, en: Generated text or ranked lists do not satisfy this subtype., ja: 生成テキストまたは順位付きリストはこのサブタイプを満たさない。}
      source_claims: [claim-embedding-model]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-embedding-model]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports modeling a versioned embedding capability and produced vector as distinct Entities.
  - id: openai-embeddings
    title: OpenAI API Embeddings Guide
    url: https://developers.openai.com/api/docs/guides/embeddings
    source_type: official-doc
    relevance: Documents embeddings as vector representations produced for input content.
source_claims:
  - id: claim-embedding-model
    source: openai-embeddings
    supports: The OpenAI embeddings guide describes vector representations generated for input content; Moonweave keeps the versioned EmbeddingModel descriptor distinct from a vector produced by an individual request.
    locator: Embeddings guide overview and response representation
    evidence_kind: design-inference
    confidence: high

