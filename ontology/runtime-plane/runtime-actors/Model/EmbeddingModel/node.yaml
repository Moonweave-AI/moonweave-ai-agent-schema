examples:
  - id: EmbeddingModel-example-positive-001
    labels:
      zh: OpenAI text-embedding-3-small
      en: OpenAI text-embedding-3-small
      ja: OpenAI text-embedding-3-small
    descriptions:
      zh: OpenAI embeddings.create(model=, input="...") 在 LangSmith retriever.search span 中引用 EmbeddingModel model_id=model-e-3、dimensions=1536。
      en: OpenAI embeddings.create(model=, input="...") referenced in LangSmith retriever.search span as EmbeddingModel model_id=model-e-3, dimensions=1536.
      ja: OpenAI text-embedding-3-small が EmbeddingModel である。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values:
      model_id: embed-v3
      model_version: 3.0.0
      model_kind: embedding
      resolver_ref: openai-embedding-provider
      capability_profile:
        dimensions: 1536
        distance_metric: cosine
        shared_query_document_space: true
    related_node_ids:
