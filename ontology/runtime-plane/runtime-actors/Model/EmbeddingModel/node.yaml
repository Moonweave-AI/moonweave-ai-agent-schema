    labels:
      zh: 向量数组当 EmbeddingModel
      en: Vector array as EmbeddingModel
      ja: ベクトル配列を EmbeddingModel とする
    descriptions:
      zh: numpy array shape=(1536,) 是 embedding 输出向量，不是 EmbeddingModel 资产定义。
      en: numpy array shape=(1536,) is embedding output vector, not EmbeddingModel asset definition.
      ja: ベクトル配列は EmbeddingModel 資産定義ではない。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - EmbeddingRun
      - EmbeddingModel
      - EmbeddingVector
      - GenerativeModel
      - Chunk
    related_relation_ids:
      - EmbeddingRun-uses-EmbeddingModel
      - EmbeddingRun-consumes-Chunk
      - EmbeddingRun-produces-EmbeddingVector
      - EmbeddingVector-represents-Chunk
    source_claims:
      - claim-embedding-model-design
  - id: EmbeddingModel-example-3
    labels:
      zh: EmbeddingModel 与 TraceSpan 边界
      en: EmbeddingModel versus TraceSpan boundary
      ja: EmbeddingModel と TraceSpan 境界
    descriptions:
      zh: EmbeddingModel 是 embedding 模型资产；TraceSpan retriever.search 记录调用 timing；model 资产与 span 分离。
      en: EmbeddingModel is embedding model asset; TraceSpan retriever.search records invocation timing; model asset separated from span.
      ja: EmbeddingModel 資産と retriever span は分離する。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      version: assistants and tools
    field_values: {}
    related_node_ids:
      - EmbeddingModel
    related_relation_ids: []
    source_claims:
      - claim-embedding-model-vendor
      - claim-embedding-model-design
  - id: EmbeddingModel-example-4
    labels:
      zh: model-e-3 retriever 实例
      en: model-e-3 retriever instance
      ja: model-e-3 retriever 事例
    descriptions:
      zh: EmbeddingModel model_id=model-e-3、model_name=text-embedding-3-small、provider=openai、dimensions=1536。
      en: EmbeddingModel model_id=model-e-3, model_name=text-embedding-3-small, provider=openai, dimensions=1536.
      ja: model-e-3 EmbeddingModel を記録する。
    example_source:
