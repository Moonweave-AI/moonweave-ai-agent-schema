source_claims:
  - id: claim-embedding-model-001
    source: eng-api-openai-embeddings
    supports: OpenAI's embeddings documentation defines embedding models that accept input and return numeric vector representations, with model and dimensions recorded separately from output vectors.
    locator: OpenAI Embeddings guide > What are embeddings; Create embeddings > input, model, and dimensions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-embedding-model-002
    source: eng-api-openai-embeddings
    supports: OpenAI defines embeddings as floating-point vectors created from input by an embedding model and used for search, clustering, recommendations, and related similarity tasks. This supports EmbeddingModel's vector-representation function and explicitly does not make it a model whose defining output is generated task content.
    locator: Embeddings guide > What are embeddings?; How to get embeddings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-embedding-model-003
    source: eng-fw-langchain-agents
    supports: LangChain agents invoke chat models inside an agent loop to interpret messages, choose actions, and produce responses. That operational role supports GenerativeModel as the content-and-action model branch; the page does not define embedding-vector generation, which remains the differentiating function of EmbeddingModel.
    locator: LangChain agents > Agent loop; Model > Static model and Dynamic model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-embedding-model-004
    source: eng-api-openai-embeddings
    supports: OpenAI's embeddings documentation defines embeddings as numeric vector representations returned by a selected embedding model and exposes model and dimensions as request parameters. Moonweave separates the callable model version from its vector outputs.
    locator: OpenAI Embeddings guide > What are embeddings; Create embeddings > input, model, and dimensions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

