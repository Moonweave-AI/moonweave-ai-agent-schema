        en: "Boundary case: is a runtime model"
        ja: 実行モデルの一種であるの境界例
      scenario_id: null
      descriptions:
        zh: embedding-991 只是某次请求返回的 1536 个数值与来源索引，不能再次接收输入执行推理。
        en: embedding-991 is only 1536 returned numbers plus a source index and cannot accept new input to perform inference.
        ja: embedding-991 は一回の返却 1536 数値と source index だけで新入力を受け推論できない。
      field_values: {}
      related_node_ids:
        - EmbeddingModel
        - Model
      related_relation_ids:
        - EmbeddingModel-is_a-Model
      expected_result:
        zh: embedding-991 归为 Embedding，不归为 EmbeddingModel。
        en: Classify embedding-991 as Embedding, not EmbeddingModel.
        ja: embedding-991 は Embedding とし EmbeddingModel にしない。
      why_valid_or_invalid:
        zh: 可调用模型与一次推理输出具有不同身份和生命周期。
        en: A callable model and one inference output have different identity and lifecycle.
        ja: 呼出可能 model と一推論出力は同一性と lifecycle が異なる。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-embedding-model-004
  source_claims:
    - claim-embedding-model-004
  distinct_fact_rationale:
    zh: 这是模型类型边，不复制某次 EmbeddingRun 的输入、输出或索引事实。
    en: This is a model-type edge and does not duplicate the inputs, outputs, or indexing facts of an EmbeddingRun.
    ja: model 型辺であり EmbeddingRun の入力・出力・index 事実を複製しない。
