schema: moonweave.ai/ontology-node/v1
id: EmbeddingModel
kind: concept
labels:
  zh: 嵌入模型
  en: embedding model
  ja: 埋め込みモデル
semantics:
  short_definition:
    zh: 嵌入模型是把输入内容映射为固定维度数值向量、供相似度与检索使用的运行模型。
    en: An EmbeddingModel is a Model that maps input content to fixed-dimensional numeric vectors for similarity and retrieval.
    ja: EmbeddingModel は入力内容を類似度・検索用の固定次元数値 vector へ写像する Model である。
  definition:
    zh: 嵌入模型是 Model 的一种；其种差是每次推理将文本、图像或其他内容编码为具有声明维度和度量约定的向量表示，以支持相似度搜索、聚类或匹配。它不是生成自然语言的 GenerativeModel、重新给候选打分的 RerankerModel、已产生的 EmbeddingVector 或向量数据库。
    en: An EmbeddingModel is a Model distinguished by encoding text, images, or other content into vector representations with declared dimensionality and metric conventions for similarity search, clustering, or matching. It is not a GenerativeModel that produces language, a RerankerModel that rescores supplied candidates, the resulting EmbeddingVector, or a vector database.
    ja: EmbeddingModel は Model の一種で、text、image、その他の内容を、宣言された次元と metric 規約を持つ vector 表現へ符号化し、類似検索、cluster、matching に使う。言語を生成する GenerativeModel、候補を再採点する RerankerModel、生成済みの EmbeddingVector、vector database ではない。
  why_needed:
    zh: 该子类让向量维度、度量与版本兼容性成为检索管线的显式条件，避免混用不同嵌入空间或把向量结果当作模型。
    en: This subtype makes vector dimension, metric, and version compatibility explicit in retrieval pipelines, preventing incompatible embedding spaces from being mixed or a vector result from being mistaken for the model.
    ja: この下位型は vector 次元、metric、版互換性を検索 pipeline の明示条件にし、非互換 embedding 空間の混在や vector 結果との混同を防ぐ。
  includes:
    - zh: 纳入为文本块、查询、图像或工具描述生成声明维度向量，并用于语义相似度或索引的模型版本。
      en: Includes a model version that generates declared-dimension vectors for chunks, queries, images, or tool descriptions for semantic similarity or indexing.
      ja: chunk、query、image、tool 記述へ宣言次元 vector を生成し、意味類似度・index に使うモデル版を含む。
  excludes:
    - zh: 不纳入已生成的 EmbeddingVector、向量索引、GenerativeModel、RerankerModel、词元计数器或普通哈希函数。
      en: Excludes a generated EmbeddingVector, vector index, GenerativeModel, RerankerModel, token counter, and ordinary hash function.
      ja: 生成済み EmbeddingVector、vector index、GenerativeModel、RerankerModel、token counter、通常の hash 関数は含まない。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: 集成 EmbeddingModel 时应分别映射 OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating EmbeddingModel, map OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: EmbeddingModel 統合時は OpenAI assistant/model/tool roles, LangGraph node executors, Anthropic message roles, and A2A Agent Cards を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to EmbeddingModel.
      format: |-
        # Example EmbeddingModel ingest
        { "embedding-model_ref": "example-1" }
      source_claims:
        - claim-embedding-model-design
  typical_output:
    - description: Moonweave-local EmbeddingModel projection.
      format: '{ "schema_owner": "moonweave-local-design", "embedding-model_id": "example-1" }'
      source_claims:
        - claim-embedding-model-design
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, tool roles → AgentActor, ModelInstance, ToolExecutor.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Node executors and runnable config actor metadata → AgentProcess.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message roles for human/software actor evidence.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Remote agent discovery via Agent Card.
