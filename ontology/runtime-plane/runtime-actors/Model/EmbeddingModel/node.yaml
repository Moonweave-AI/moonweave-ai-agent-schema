schema: moonweave.ai/ontology-node/v1
id: EmbeddingModel
kind: concept
status: accepted
labels:
  zh: 嵌入模型
  en: embedding model
  ja: 埋め込みモデル
semantics:
  short_definition:
    zh: 嵌入模型是把输入内容映射为固定维度数值向量、供相似度与检索使用的运行模型。
    en: An EmbeddingModel is a Model that maps input content to fixed-dimensional numeric vectors for similarity and retrieval.
    ja: EmbeddingModel は入力内容を類似度・検索用の固定次元数値 vector へ写像する Model である。
  definition:
    zh: 嵌入模型是 Model 的一种；其种差是每次推理将文本、图像或其他内容编码为具有声明维度和度量约定的向量表示，以支持相似度搜索、聚类或匹配。它不是生成自然语言的 GenerativeModel、重新给候选打分的 RerankerModel、已产生的 EmbeddingVector 或向量数据库。
    en: An EmbeddingModel is a Model distinguished by encoding text, images, or other content into vector representations with declared dimensionality and metric conventions for similarity search, clustering, or matching. It is not a GenerativeModel that produces language, a RerankerModel that rescores supplied candidates, the resulting EmbeddingVector, or a vector database.
    ja: EmbeddingModel は Model の一種で、text、image、その他の内容を、宣言された次元と metric 規約を持つ vector 表現へ符号化し、類似検索、cluster、matching に使う。言語を生成する GenerativeModel、候補を再採点する RerankerModel、生成済みの EmbeddingVector、vector database ではない。
  why_needed:
    zh: 该子类让向量维度、度量与版本兼容性成为检索管线的显式条件，避免混用不同嵌入空间或把向量结果当作模型。
    en: This subtype makes vector dimension, metric, and version compatibility explicit in retrieval pipelines, preventing incompatible embedding spaces from being mixed or a vector result from being mistaken for the model.
    ja: この下位型は vector 次元、metric、版互換性を検索 pipeline の明示条件にし、非互換 embedding 空間の混在や vector 結果との混同を防ぐ。
  includes:
    - zh: 纳入为文本块、查询、图像或工具描述生成声明维度向量，并用于语义相似度或索引的模型版本。
      en: Includes a model version that generates declared-dimension vectors for chunks, queries, images, or tool descriptions for semantic similarity or indexing.
      ja: chunk、query、image、tool 記述へ宣言次元 vector を生成し、意味類似度・index に使うモデル版を含む。
  excludes:
    - zh: 不纳入已生成的 EmbeddingVector、向量索引、GenerativeModel、RerankerModel、词元计数器或普通哈希函数。
      en: Excludes a generated EmbeddingVector, vector index, GenerativeModel, RerankerModel, token counter, and ordinary hash function.
      ja: 生成済み EmbeddingVector、vector index、GenerativeModel、RerankerModel、token counter、通常の hash 関数は含まない。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: EmbeddingModel-example-positive-001
    kind: positive
    labels:
      zh: 嵌入模型正例
      en: Positive example of embedding model
      ja: 埋め込みモデルの正例
    scenario_id: null
    descriptions:
      zh: embed-v3 把 query 与文档块编码为同一 1536 维、余弦度量空间，并把模型版本写入索引元数据。
      en: embed-v3 encodes queries and document chunks into the same 1536-dimensional cosine space and records the model version in index metadata.
      ja: embed-v3 は query と文書 chunk を同じ 1536 次元 cosine 空間へ符号化し、model 版を index metadata に記録する。
    field_values:
      model_id: embed-v3
      model_version: 3.0.0
      model_kind: embedding
      resolver_ref: openai-embedding-provider
      capability_profile:
        dimensions: 1536
        distance_metric: cosine
        shared_query_document_space: true
    related_node_ids:
      - EmbeddingRun
      - EmbeddingModel
      - EmbeddingVector
      - Chunk
    related_relation_ids:
      - EmbeddingRun-uses-EmbeddingModel
    expected_result:
      zh: embed-v3 归类为 EmbeddingModel；每个输出向量另归为 EmbeddingVector。
      en: embed-v3 is an EmbeddingModel; each output vector is separately an EmbeddingVector.
      ja: embed-v3 は EmbeddingModel で、各出力 vector は別個の EmbeddingVector となる。
    why_valid_or_invalid:
      zh: 模型定义了稳定的向量空间和编码行为，输出向量只是该行为的结果。
      en: The model defines the stable vector space and encoding behavior; an output vector is only a result of that behavior.
      ja: モデルが安定 vector 空間と符号化挙動を定め、出力 vector はその結果にすぎない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-model-001
  - id: EmbeddingModel-example-boundary-001
    kind: boundary
    labels:
      zh: 嵌入模型边界例
      en: Boundary case for embedding model
      ja: 埋め込みモデルの境界例
    scenario_id: null
    descriptions:
      zh: run:embed-991 使用 embed-v3 编码 chunk-991，产生表示该块的 vector-991；vector-991 只有 1536 个数值与来源标识，不能继续编码其他内容。
      en: run:embed-991 uses embed-v3 to encode chunk-991 and produces vector-991 as its representation; vector-991 contains only 1536 numeric values and source identity and cannot encode further content.
      ja: run:embed-991 は embed-v3 で chunk-991 を符号化し、その表現 vector-991 を生成します。vector-991 は 1536 数値と source identity のみを持ち、他内容を符号化できません。
    field_values: {}
    related_node_ids:
      - EmbeddingRun
      - EmbeddingModel
      - EmbeddingVector
      - GenerativeModel
      - Chunk
    related_relation_ids:
      - EmbeddingRun-uses-EmbeddingModel
      - EmbeddingRun-consumes-Chunk
      - EmbeddingRun-produces-EmbeddingVector
      - EmbeddingVector-represents-Chunk
    expected_result:
      zh: vector-991 是 EmbeddingVector 信息，不是 EmbeddingModel。
      en: vector-991 is EmbeddingVector information, not an EmbeddingModel.
      ja: vector-991 は EmbeddingVector 情報であり、EmbeddingModel ではない。
    why_valid_or_invalid:
      zh: 模型是可重复执行编码行为的计算对象，单个向量是一次推理的不可调用结果。
      en: The model is the callable computational object that repeatedly encodes inputs; one vector is a non-callable inference result.
      ja: モデルは入力を反復符号化する呼出可能計算対象で、単一 vector は呼出不能な推論結果である。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-model-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GenerativeModel
    shared_parent_concept_id: Model
    differentia:
      zh: 端点特定对照：父节点 Model：EmbeddingModel（semantic kind=entity，骨架 EmbeddingModel-is_a-Model）；GenerativeModel（semantic kind=entity，骨架 GenerativeModel-is_a-Model）。双端条件：EmbeddingModel 条件：“嵌入模型是一种运行模型；其区分条件是：它是以生成检索或匹配表示为区分能力的一种模型”；GenerativeModel 条件：“生成模型是以如下事实为区分特征的运行模型：它是以产生文本、代码、结构化输出或调用参数为区分能力的一种模型”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent Model: EmbeddingModel (semantic kind=entity, backbone EmbeddingModel-is_a-Model); GenerativeModel (semantic kind=entity, backbone GenerativeModel-is_a-Model). Endpoint conditions: EmbeddingModel condition: “As a runtime model, Embedding model is distinguished by the fact that it is a Model distinguished by producing representations for retrieval or matching”; GenerativeModel condition: “Generative model is a runtime model; its differentiating condition is that it is a Model distinguished by generating text, code, structured output, or call arguments”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 Model：EmbeddingModel（semantic kind=entity、バックボーン EmbeddingModel-is_a-Model）；GenerativeModel（semantic kind=entity、バックボーン GenerativeModel-is_a-Model）。両端条件：EmbeddingModel の条件：「実行モデルに属する埋め込みモデルは、次の事実を種差とします：それは検索や照合用の表現生成能力で区別される Model である」；GenerativeModel の条件：「生成モデルは実行モデルの一種であり、次の条件で区別されます：それはテキスト、コード、構造化出力、呼出引数を生成する能力で区別される Model である」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-embedding-model-002
      - claim-embedding-model-003
parent_relation:
  id: EmbeddingModel-is_a-Model
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: EmbeddingModel-is_a-Model 表示每个 EmbeddingModel 都是可解析版本的 Model，并以把输入内容编码成固定维度数值向量为种差；生成的向量、EmbeddingRun、向量索引或普通哈希函数都不是该模型子类。
    en: EmbeddingModel-is_a-Model states that every EmbeddingModel is a resolvable versioned Model differentiated by encoding input content into fixed-dimensional numeric vectors; an output vector, EmbeddingRun, vector index, or ordinary hash function is not this model subtype.
    ja: EmbeddingModel-is_a-Model は全 EmbeddingModel が解決可能な版付き Model で、入力内容を固定次元数値 vector に符号化することを種差とする。出力 vector、EmbeddingRun、vector index、通常 hash はこの型ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_embedding_model_subtype
    labels:
      zh: 具有嵌入模型子类
      en: has embedding-model subtype
      ja: EmbeddingModel 下位型を持つ
  conditions:
    - id: EmbeddingModel-is_a-Model-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies Model version and callable-inference identity and declares vector output dimensions and applicable input modalities.
      explanations:
        zh: 仅当对象先满足 Model 的版本与可调用推理身份，并声明向量输出维数及适用输入模态时成立。
        en: Assert only when the object first satisfies Model version and callable-inference identity and declares vector output dimensions and applicable input modalities.
        ja: 対象がまず Model の版と呼出可能推論同一性を満たし、vector 出力次元と適用入力 modality を宣言する時だけ成立する。
      source_claims:
        - claim-embedding-model-004
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EmbeddingModel-is_a-Model-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种运行模型正例
        en: "Positive case: is a runtime model"
        ja: 実行モデルの一種であるの正例
      scenario_id: null
      descriptions:
        zh: text-embedding-3-large 的固定模型标识接收文本并通过 embeddings 端点返回可指定维数的浮点向量。
        en: text-embedding-3-large has a stable model identifier, accepts text, and returns floating-point vectors with configurable dimensions through the embeddings endpoint.
        ja: text-embedding-3-large は安定 model ID を持ち text を受け embeddings endpoint から指定可能次元の浮動小数 vector を返す。
      field_values: {}
      related_node_ids:
        - EmbeddingModel
        - Model
      related_relation_ids:
        - EmbeddingModel-is_a-Model
      expected_result:
        zh: 把该模型版本归为 EmbeddingModel 与 Model；每个返回向量另建 Embedding。
        en: Classify that model version as EmbeddingModel and Model; represent each returned vector separately as Embedding.
        ja: 当該 model 版を EmbeddingModel と Model に分類し、各返却 vector は別の Embedding とする。
      why_valid_or_invalid:
        zh: 模型身份与重复编码行为稳定，输出是向量而非生成文本或候选排序。
        en: The model identity and repeatable encoding behavior are stable, and its output is a vector rather than generated text or candidate ordering.
        ja: model 同一性と反復可能符号化が安定し、出力は生成 text や候補順序でなく vector である。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
