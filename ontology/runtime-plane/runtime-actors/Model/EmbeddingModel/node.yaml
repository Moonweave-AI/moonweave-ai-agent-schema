parent_relation:
  id: EmbeddingModel-is_a-Model
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行模型
    en: is a runtime model
    ja: 実行モデルの一種である
  definitions:
    zh: EmbeddingModel-is_a-Model 表示每个 EmbeddingModel 都是可解析版本的 Model，并以把输入内容编码成固定维度数值向量为种差；生成的向量、EmbeddingRun、向量索引或普通哈希函数都不是该模型子类。
    en: EmbeddingModel-is_a-Model states that every EmbeddingModel is a resolvable versioned Model differentiated by encoding input content into fixed-dimensional numeric vectors; an output vector, EmbeddingRun, vector index, or ordinary hash function is not this model subtype.
    ja: EmbeddingModel-is_a-Model は全 EmbeddingModel が解決可能な版付き Model で、入力内容を固定次元数値 vector に符号化することを種差とする。出力 vector、EmbeddingRun、vector index、通常 hash はこの型ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有嵌入模型子类
      en: has embedding-model subtype
      ja: EmbeddingModel 下位型を持つ
  conditions:
    - id: EmbeddingModel-is_a-Model-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the object first satisfies Model version and callable-inference identity and declares vector output dimensions and applicable input modalities.
      explanations:
        zh: 仅当对象先满足 Model 的版本与可调用推理身份，并声明向量输出维数及适用输入模态时成立。
        en: Assert only when the object first satisfies Model version and callable-inference identity and declares vector output dimensions and applicable input modalities.
        ja: 対象がまず Model の版と呼出可能推論同一性を満たし、vector 出力次元と適用入力 modality を宣言する時だけ成立する。
      source_claims:
        - claim-embedding-model-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-embedding-model-design
  distinct_fact_rationale:
    zh: 这是模型类型边，不复制某次 EmbeddingRun 的输入、输出或索引事实。
    en: This is a model-type edge and does not duplicate the inputs, outputs, or indexing facts of an EmbeddingRun.
    ja: model 型辺であり EmbeddingRun の入力・出力・index 事実を複製しない。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
