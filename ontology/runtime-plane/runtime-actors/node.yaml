module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: 输入面分别解析参与主体与计算模型：Actor —participates_in_session→ RuntimeSession 证明实际会话参与，ModelActor —uses→ Model 证明运行软件解析到的计算模型；二者不合并。
          en: "The input facet resolves participants and computational models separately: Actor —participates_in_session→ RuntimeSession proves actual session participation, while ModelActor —uses→ Model proves the computational model resolved by running software; the identities are not merged."
          ja: 入力面は参加主体と計算モデルを分けて解決します。Actor —participates_in_session→ RuntimeSession は実参加を、ModelActor —uses→ Model は実行ソフトウェアが解決した計算モデルを示し、同一性を統合しません。
        family_concept_ids:
          - Actor
          - Model
        relation_ids:
          - participates_in_session
          - ModelActor-uses-Model
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出面产生可独立审计的绑定或远程引用：Actor —has_binding→ ActorBinding 保留范围与有效期，ActorRoleBinding —binds→ CoordinationRole 连接运行时绑定与编排责任定义，RemoteAgentReference —refers_to→ AgentActor 保留经核验的远程解析；任何一项都不造成永久类型突变或端点所有权转移。
          en: "The output facet produces independently auditable bindings or remote references: Actor-has_binding-ActorBinding retains scope and valid time, ActorRoleBinding-binds-CoordinationRole connects a runtime binding to an orchestration responsibility definition, and RemoteAgentReference-refers_to-AgentActor retains verified remote resolution; none creates a permanent type mutation or transfers endpoint ownership."
          ja: 出力面は独立監査可能な束縛・遠隔参照を生成します。Actor-has_binding-ActorBinding は範囲と有効時間を、ActorRoleBinding-binds-CoordinationRole は runtime binding と orchestration responsibility definition の接続を、RemoteAgentReference-refers_to-AgentActor は検証済み遠隔解決を保持し、恒久的型変更や endpoint ownership 移転を生みません。
        family_concept_ids:
          - ActorBinding
          - CoordinationRole
          - RemoteAgentReference
        relation_ids:
          - Actor-has_binding-ActorBinding
          - ActorRoleBinding-binds-CoordinationRole
          - RemoteAgentReference-refers_to-AgentActor
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本模块不判定运行失败。会话、执行尝试、编排、安全策略、记忆流水线或工具调用需要说明谁参与、调用哪个模型、当时有什么绑定或远程身份如何解析时，引用本模块的规范身份。
          en: This module does not adjudicate runtime failure. Sessions, run attempts, orchestration, safety policy, memory pipelines, and tool invocations reference this module's canonical identities when stating who participated, which model was invoked, which binding was effective, or how a remote identity was resolved.
          ja: このモジュールは実行失敗を判定しません。session、run attempt、orchestration、safety policy、memory pipeline、tool invocation が参加者、呼出モデル、有効束縛、遠隔同一性の解決を示す時、このモジュールの正規同一性を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本模块不启动恢复流程。会话、执行尝试、编排、安全策略、记忆流水线或工具调用需要说明谁参与、调用哪个模型、当时有什么绑定或远程身份如何解析时，引用本模块的规范身份。
          en: This module does not initiate recovery. Sessions, run attempts, orchestration, safety policy, memory pipelines, and tool invocations reference this module's canonical identities when stating who participated, which model was invoked, which binding was effective, or how a remote identity was resolved.
          ja: このモジュールは回復を開始しません。session、run attempt、orchestration、safety policy、memory pipeline、tool invocation が参加者、呼出モデル、有効束縛、遠隔同一性の解決を示す時、このモジュールの正規同一性を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 输入契约分别解析实际参与的 Actor 与被调用的 Model，输出契约分别保留有效 ActorBinding 和经核验的 RemoteAgentReference；四种身份只通过可审计事实连接，不因交互而合并。
            en: The input contract resolves participating Actors separately from invoked Models, while the output contract retains effective ActorBindings separately from verified RemoteAgentReferences; auditable facts connect these four identities without merging them.
            ja: 入力契約は参加 Actor と呼出 Model を別々に解決し、出力契約は有効 ActorBinding と検証済み RemoteAgentReference を別々に保持する。四種の同一性は監査可能な事実で接続するだけで統合しない。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 交互审查确认 participates_in_session、uses、has_binding、binds 与 refers_to 均保留各自端点和时态条件；它们回答参与、调用、绑定或指称问题，不改变端点的分类身份。
            en: Interaction review confirms that participates_in_session, uses, has_binding, binds, and refers_to retain their endpoints and temporal conditions; they answer participation, invocation, binding, or denotation questions without changing endpoint taxonomy.
            ja: interaction 審査では participates_in_session・uses・has_binding・binds・refers_to が端点と時態条件を保持し、参加・呼出・束縛・指示を答えるだけで端点分類を変更しないことを確認した。
  taxonomy_contract:
    applicability: specialization
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Actor
      - Model
      - ActorBinding
      - RemoteAgentReference
      - RuntimeRole
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 分类主干按五种不可互换的身份或定义分根：Actor 是参与主体，RuntimeRole 是职责定义，Model 是计算实体，ActorBinding 是有范围的绑定记录，RemoteAgentReference 是远程发现与解析信息；各根内部只使用人工核实的 is_a 关系。
            en: "The taxonomic backbone has five non-interchangeable identity or definition roots: Actor is a participant, RuntimeRole a responsibility definition, Model a computational entity, ActorBinding a scoped binding record, and RemoteAgentReference remote discovery and resolution information; only manually verified is_a relations form their internal backbones."
            ja: 分類主幹は交換不能な五つの identity/definition root に分けます。Actor は participant、RuntimeRole は responsibility definition、Model は computational entity、ActorBinding は scoped binding record、RemoteAgentReference は remote discovery/resolution information で、各 root 内部は手動確認済み is_a のみを用います。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 已核实五个根节点均无主父关系且每个非根节点恰有一个 is_a 主父；binds、has_binding、uses 与 refers_to 保留事实方向但不参与分类布局。
            en: All five roots were verified to have no primary parent and every non-root to have exactly one is_a primary parent; binds, has_binding, uses, and refers_to retain their fact direction but do not participate in taxonomic layout.
            ja: 五 root に primary parent がなく、各 non-root に is_a primary parent が一つだけあることを確認しました。binds・has_binding・uses・refers_to は fact direction を保持しますが taxonomy layout には参加しません。
  competency_questions:
    - id: runtime-actors-cq-session-participants-v3
      semantic_key: runtime-actors.session-participants
      primary_owner_module_id: runtime-actors
      related_module_ids:
        - runtime-system
      questions:
        zh: 某个 RuntimeSession 中哪些 Actor 有实际参与证据，各 Actor 当时有哪些角色或能力绑定，又由哪个 ModelActor 调用了哪个 Model？
        en: Which Actors have evidence of actual participation in a RuntimeSession, which role or capability bindings were effective for each, and which Model did each ModelActor invoke?
        ja: RuntimeSession で実参加証拠を持つ Actor は誰で、各 Actor の有効な役割・能力束縛は何で、各 ModelActor はどの Model を呼びましたか。
      query: Follow participates_in_session from each Actor to the selected RuntimeSession; for those participants only, inspect Actor-has_binding-ActorBinding and the binding subtype, resolve ActorRoleBinding-binds-RuntimeRole within the recorded scope and interval, and evaluate ModelActor-uses-Model as a separate invocation fact.
      expected_assertion: Every returned participant has explicit session evidence; every returned role or capability comes from a matching, effective binding; each invoked Model remains distinct from its ModelActor; and none of those facts implies authorization without a safety decision.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
