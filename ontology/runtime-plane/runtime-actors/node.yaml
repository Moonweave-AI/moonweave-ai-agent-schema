schema: moonweave.ai/ontology-node/v1
id: runtime-actors
kind: module
status: accepted
labels:
  zh: 运行时参与者
  en: Runtime actors
  ja: ランタイムアクター
semantics:
  short_definition:
    zh: 运行时中承担责任的本地身份、绑定、模型资产与远程引用。
    en: Local responsibility identities, bindings, model assets, and remote references used at runtime.
    ja: ランタイムで使用されるローカル責任識別子、バインディング、モデル資産、リモート参照。
  definition:
    zh: 本模块建模 Moonweave 本地运行时责任、角色、能力绑定、模型资产与远程智能体引用。它刻意将这些本地投影与 A2A AgentCard、MCP 主机-客户端-服务器角色、OpenAI Agents SDK Agent 配置、OpenTelemetry 资源属性以及 CloudEvents 事件上下文区分开来；协议字段与遥测属性只能作为类型化引用或证据，不能替代 actor_id 或绑定标识。
    en: This module models Moonweave local runtime responsibility, roles, capability bindings, model assets, and remote-agent references. It deliberately keeps those projections distinct from A2A AgentCards, MCP host-client-server roles, OpenAI Agents SDK Agent configurations, OpenTelemetry resource attributes, and CloudEvents event context; protocol fields and telemetry attributes remain typed references or evidence and never replace actor_id or a binding identifier.
    ja: このモジュールは Moonweave のローカル実行時責任、ロール、能力バインディング、モデル資産、リモートエージェント参照をモデル化する。それらを A2A AgentCard、MCP host-client-server ロール、OpenAI Agents SDK Agent 設定、OpenTelemetry リソース属性、CloudEvents イベント文脈と意図的に区別する。プロトコルフィールドとテレメトリー属性は型付き参照または証拠に留まり、actor_id やバインディング識別子を置き換えない。
  why_needed:
    zh: 归因与授权需要可持久的本地记录，而发现、传输、遥测与事件协议服务于不同目的；若把协议 ID 复制为本地身份，部署或观测变化就会破坏历史责任链。
    en: Attribution and authorization need durable local records while discovery, transport, telemetry, and event protocols serve different purposes; copying protocol IDs into local identity breaks historical responsibility when deployment or observation changes.
    ja: 帰属と認可には永続的なローカル記録が必要だが、発見、トランスポート、テレメトリー、イベントプロトコルは別目的を持つ。プロトコル ID をローカル識別子に複製すると、デプロイや観測の変化で履歴上の責任連鎖が壊れる。
  includes:
    - zh: 本地人类与软件责任身份、作用域绑定、模型资产以及类型化远程引用。
      en: Local human and software responsibility identities, scoped bindings, model assets, and typed remote references.
      ja: ローカルな人間・ソフトウェア責任識別子、スコープ付きバインディング、モデル資産、型付きリモート参照。
  excludes:
    - zh: A2A AgentCard 载荷、MCP 连接角色、OpenTelemetry 资源属性、CloudEvents source 或 id 值，以及单次 Execution。
      en: A2A AgentCard payloads, MCP connection roles, OpenTelemetry resource attributes, CloudEvents source or id values, and single executions.
      ja: A2A AgentCard ペイロード、MCP 接続ロール、OpenTelemetry リソース属性、CloudEvents の source または id 値、単一 Execution。
  semantic_kind: entity
  aliases: [runtime identities, local responsibility projections]
engineering:
  explanation:
    zh: 本模块只暴露 Moonweave 本地投影 I/O。注册时使用 actor_id 与 actor_kind；解析输出可附带 binding_ref 与 runtime_role_ref。外部协议字段与遥测属性通过引用关联，不得写入 identity 字段。
    en: This module exposes only Moonweave local projection I/O. Registration uses actor_id and actor_kind; resolved output may attach binding_ref and runtime_role_ref. External protocol fields and telemetry attributes correlate by reference and must not populate identity fields.
    ja: このモジュールは Moonweave ローカル投影 I/O のみを公開する。登録は actor_id と actor_kind を用い、解決出力は binding_ref と runtime_role_ref を付け得る。外部プロトコルフィールドとテレメトリー属性は参照で相関し、identity フィールドへ書き込んではならない。
  typical_input:
    - description:
        zh: 本地运行时责任注册
        en: Local runtime responsibility registration
        ja: ローカル実行時責任登録
      format: '{"actor_id":"agent-reviewer-2","actor_kind":"software","scope_ref":"repo:moonweave"}'
  typical_output:
    - description:
        zh: 已解析的本地责任投影
        en: Resolved local responsibility projection
        ja: 解決済みローカル責任投影
      format: '{"actor_id":"agent-reviewer-2","binding_ref":"bind:219","runtime_role_ref":"role:reviewer"}'
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines responsibility-bearing Agents, Person, SoftwareAgent, and qualified associations.
    - name: A2A Agent Discovery
      url: https://a2a-protocol.org/latest/topics/agent-discovery/
      description: Defines AgentCard without defining a local runtime identity.
structure:
  identity_keys: [actor_id]
  fields:
    - id: actor_id
      labels:
        zh: 本地参与者 ID
        en: Local actor ID
        ja: ローカルアクター ID
      definitions:
        zh: 稳定的 Moonweave 责任标识符，不得复制协议或遥测值。
        en: Stable Moonweave responsibility identifier, never a copied protocol or telemetry value.
        ja: 安定した Moonweave 責任識別子。プロトコルまたはテレメトリー値の複製ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: agent-reviewer-2
      source_claims: [claim-runtime-boundary, claim-runtime-cloudevent-boundary]
    - id: actor_kind
      labels:
        zh: 参与者类别
        en: Actor kind
        ja: アクター種別
      definitions:
        zh: 责任记录的受控本地分类。
        en: Controlled local classification of the responsibility record.
        ja: 責任記録の管理されたローカル分類。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [human, software]
      example_value: software
      source_claims: [claim-runtime-boundary]
  constraints:
    - id: runtime-actors-local-identity-only
      severity: error
      language: plain
      expression: Do not populate actor_id from an A2A AgentCard field, MCP connection role, OpenTelemetry service attribute, or CloudEvents event-context attribute.
      explanation:
        zh: 这些值具有发现、传输或遥测生命周期，只能作为类型化引用或证据保留。
        en: Those values have discovery, transport, or telemetry lifecycles and remain typed references or evidence.
        ja: それらの値は発見、トランスポート、またはテレメトリーのライフサイクルを持ち、型付き参照または証拠として留まる。
      source_claims: [claim-runtime-boundary]
  required_relations: []
examples:
  - id: runtime-actors-positive
    labels: {zh: "OpenAI triage Agent 参与者平面", en: "OpenAI triage agent actor plane", ja: "OpenAI triage Agent アクター平面"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; runtime-actors maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; runtime-actors maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; runtime-actors provenance graph."}
    field_values: {actor_id: crewai-senior-researcher, actor_kind: software}
    related_node_ids: [Actor, AgentActor, RuntimeRole]
    related_relation_ids: []
    source_claims: [claim-runtime-boundary]
  - id: runtime-actors-counterexample
    labels: {zh: "LangSmith run_id 当 Actor", en: "LangSmith run_id as Actor", ja: "LangSmith run_id を Actor とする"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-actors.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-actors.", ja: "Missing parent_run_id rejects LangSmith-style runtime-actors."}
    field_values: {span_id: span-910, service_name: review-api}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-runtime-boundary]
  - id: runtime-actors-boundary
    labels: {zh: "Actor 与 TraceSpan 边界", en: "Actor versus TraceSpan boundary", ja: "Actor と TraceSpan 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-actors preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-actors preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {agent_card_ref: card:reviewer, mcp_server_url: https://tools.example/mcp}
    related_node_ids: [A2AAgentCard]
    related_relation_ids: []
    source_claims: [claim-runtime-boundary]
  - id: runtime-actors-instance
    labels: {zh: "CrewAI 多角色 Actor 实例", en: "CrewAI multi-role actor instance", ja: "CrewAI マルチロール Actor 事例"}
    descriptions: {zh: "Langfuse instance: trace_id=langfuse-0192a3b4 span llm-call score accuracy=0.95->runtime-actors.", en: "Langfuse instance: trace+span+score->runtime-actors.", ja: "Langfuse instance maps to runtime-actors."}
    field_values: {actor_id: openai-haiku-agent, actor_kind: software}
    related_node_ids: [Actor, AgentActor, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-boundary]
parent_relation: null
relations: []
sources:
  - id: prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: official-spec
    relevance: Defines responsibility-bearing Agent, Person, SoftwareAgent, Entity, and Activity.
  - id: a2a-discovery
    title: A2A Agent Discovery
    url: https://a2a-protocol.org/latest/topics/agent-discovery/
    source_type: official-spec
    relevance: Defines the server-published AgentCard discovery document.
  - id: mcp-architecture
    title: Model Context Protocol Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-spec
    relevance: Defines MCP host-client-server architecture, sessions, and capabilities.
  - id: otel-resource
    title: OpenTelemetry Resource Semantic Conventions
    url: https://opentelemetry.io/docs/specs/semconv/resource/
    source_type: official-spec
    relevance: Defines telemetry resource attributes including service.name and service.instance.id.
  - id: cloudevents-core
    title: CloudEvents Core Specification
    url: https://github.com/cloudevents/spec/blob/main/cloudevents/spec.md
    source_type: official-spec
    relevance: Defines event context attributes such as id, source, and type for individual events.
source_claims:
  - id: claim-runtime-boundary
    source: a2a-discovery
    supports: A2A AgentCard is a discovery document and MCP and telemetry identifiers serve different protocol or observation roles, so runtime identity is a Moonweave local projection.
    locator: Official specification boundary and Moonweave local projection
    evidence_kind: design-inference
    confidence: high
  - id: claim-runtime-cloudevent-boundary
    source: cloudevents-core
    supports: CloudEvents id, source, and type identify event context and event uniqueness; they are not a durable runtime actor identity.
    locator: CloudEvents context attributes
    evidence_kind: official-spec
    confidence: high


