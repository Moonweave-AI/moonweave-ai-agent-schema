            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域审查确认该问分别验证实际会话参与、时态绑定和模型调用；任何一条证据缺失时，只缩减相应答案，不由另外两条事实补推。
              en: Domain review confirms that the question tests session participation, temporal bindings, and model invocation separately; if one evidence chain is absent, that answer is omitted rather than inferred from either of the others.
              ja: domain 審査は session 参加・時態 binding・model 呼出を別々に検証し、一証拠 chain が欠ければ他の二事実から補推せず該当回答だけを除外すると確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构审查确认 participates_in_session、has_binding、binds 与 uses 均保留各自方向和端点，CQ 不把四条边压缩成一种“参与者配置”关系。
              en: Ontology review confirms that participates_in_session, has_binding, binds, and uses retain their own directions and endpoints; the CQ does not collapse them into one generic participant-configuration relation.
              ja: ontology 審査は participates_in_session・has_binding・binds・uses が固有方向と endpoint を保持し、CQ が一つの participant-configuration 関係へ圧縮しないことを確認しました。
    - id: runtime-actors-cq-actor-role-separation-v3
      semantic_key: runtime-actors.actor-role-separation
      primary_owner_module_id: runtime-actors
      related_module_ids:
        - runtime-system
        - orchestration-actors-delegation
      questions:
        zh: 某个 HumanActor 在指定 RuntimeSession 的任务与时间区间内承担哪项 RuntimeRole、是否另有独立的 CoordinationRole，角色变化是否保持其 Actor 身份？
        en: Which RuntimeRole does a HumanActor bear for a task and interval in a specified RuntimeSession, does it separately bear a CoordinationRole, and does a role change preserve Actor identity?
        ja: 指定 RuntimeSession の task・期間で HumanActor はどの RuntimeRole を担い、独立した CoordinationRole も担うか、role 変更後も Actor 同一性を保持しますか。
      query: Resolve the HumanActor by actor_id, require participates_in_session evidence for the selected RuntimeSession, follow its effective has_actor_role_binding facts, resolve ActorRoleBinding-binds-RuntimeRole and ActorRoleBinding-binds-CoordinationRole independently, and retain only bindings whose task scope, validity interval, and provenance match the query context.
      expected_assertion: The result reports a session participant, its independently evidenced task-scoped RuntimeRole, and any separately bound CoordinationRole; participation or either role dimension alone does not establish the other, and binding expiry changes no canonical Actor identity.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Actor
          - HumanActor
          - ActorRoleBinding
          - RuntimeRole
          - DeveloperRole
          - ReviewerRole
          - HumanOperatorRole
        related_concept_ids:
          - RuntimeSession
          - CoordinationRole
        relation_ids:
          - participates_in_session
          - has_actor_role_binding
          - ActorRoleBinding-binds-RuntimeRole
          - ActorRoleBinding-binds-CoordinationRole
        not_applicable_reason: null
      positive_example_ids:
        - runtime-actors-cq-actor-role-separation-v3-example-positive
      counterexample_ids:
        - runtime-actors-cq-actor-role-separation-v3-example-counter
      source_claims:
        - claim-runtime-actors-013
        - claim-runtime-actors-014
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域审查确认会话参与、运行职责与协同位置是三个独立判断：参与需要会话内行动证据，RuntimeRole 与 CoordinationRole 分别需要有效绑定，三者都不能改写 HumanActor 的稳定身份。
              en: "Domain review confirms three independent judgments: session participation needs in-session action evidence, RuntimeRole and CoordinationRole each need an effective binding, and none of them rewrites stable HumanActor identity."
              ja: domain 審査は session 参加・runtime responsibility・coordination position を独立判断とし、参加には session 内 action、各 role には有効 binding が必要で、いずれも HumanActor の安定 identity を書き換えないことを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构审查确认查询先以 Actor→RuntimeSession 证明参与，再沿 Actor→ActorRoleBinding 分别读取 RuntimeRole 与 CoordinationRole；两类角色不能互相推出，旧 DeveloperActor、ReviewerActor 与 HumanOperator 分类边不得参与。
              en: Ontology review first requires Actor-to-RuntimeSession participation evidence, then follows Actor-to-ActorRoleBinding and resolves RuntimeRole and CoordinationRole separately; neither role dimension implies the other, and deprecated actor-role classification edges are excluded.
              ja: ontology 審査はまず Actor→RuntimeSession で参加を証明し、Actor→ActorRoleBinding から RuntimeRole と CoordinationRole を別に解決します。role 次元は相互含意せず、deprecated actor-role 分類 edge は除外します。
    - id: runtime-actors-cq-model-binding-provenance-v3
      semantic_key: runtime-actors.model-binding-provenance
      primary_owner_module_id: runtime-actors
      related_module_ids:
        - memory-embedding-indexes
      questions:
        zh: 一次生成、嵌入或重排活动由哪个 ModelActor 执行、实际解析到哪个版本化 Model，并由哪条运行证据连接输入与结果？
        en: Which ModelActor executed a generation, embedding, or reranking activity, which versioned Model was actually resolved, and which run evidence connects its input and result?
        ja: generation・embedding・reranking activity をどの ModelActor が実行し、どの版付き Model に解決し、どの run 証拠が入力と結果を結びますか。
      query: Resolve ModelActor-uses-Model, then require the owning run record to identify the same model snapshot and connect its concrete input and output; for embedding, follow EmbeddingRun-uses-EmbeddingModel, EmbeddingRun-consumes-Chunk, and EmbeddingRun-produces-EmbeddingVector.
      expected_assertion: The answer identifies the software Actor, exact Model snapshot, run activity, input, and output through separate facts; a default model configuration or family name cannot substitute for run-specific evidence.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - EmbeddingModel
        related_concept_ids:
          - EmbeddingRun
        relation_ids:
          - EmbeddingRun-uses-EmbeddingModel
        not_applicable_reason: null
      positive_example_ids:
        - runtime-actors-cq-model-binding-provenance-v3-example-positive
      counterexample_ids:
        - runtime-actors-cq-model-binding-provenance-v3-example-counter
      source_claims:
        - claim-runtime-actors-015
        - claim-runtime-actors-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域审查确认模型服务主体、可调用模型快照、一次嵌入运行、输入块与输出向量各有独立身份；必须由本次运行证据把它们连接起来。
              en: Domain review confirms that the model-service Actor, callable model snapshot, one embedding run, input chunk, and output vector have distinct identities and must be connected by evidence from that run.
              ja: domain 審査は model-service Actor、呼出可能 model snapshot、一 embedding run、input chunk、output vector が別 identity を持ち、当該 run の証拠で接続される必要を確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构审查确认 ModelActor-uses-Model 说明主体通常解析到的模型，而 EmbeddingRun-uses-EmbeddingModel 说明具体运行使用的快照；两条 uses 边不可互相替代。
              en: Ontology review distinguishes ModelActor-uses-Model, which records the model resolved by a software actor, from EmbeddingRun-uses-EmbeddingModel, which records the snapshot used by one run; neither uses edge substitutes for the other.
              ja: ontology 審査は software actor が解決する model を示す ModelActor-uses-Model と、一 run の snapshot を示す EmbeddingRun-uses-EmbeddingModel を区別し、相互代替できないと確認しました。
  key_notion:
    zh: 可归责运行参与者
    en: accountable runtime participant
    ja: 帰責可能な実行参加者
  owns_when:
    zh: 当对象必须依赖参与者标识、可复用职责定义、模型提供方与版本、绑定的主体/范围/有效期，或远程解析记录才能唯一识别时，由本模块定义。
    en: This module defines an object when unique identity depends on participant identity, reusable responsibility definition, model provider and revision, binding actor/scope/validity, or a remote-resolution record.
    ja: participant identity、再利用可能な責務定義、model provider と revision、binding の actor・scope・validity、または遠隔解決記録が一意識別に必須なら本モジュールで定義します。
  references_when:
    zh: 会话、执行、编排、安全、记忆和工具模块只在说明实际参与者、有效绑定、模型快照或远程解析结果时引用这里的身份；任务责任、授权决定和调用结果仍由各自模块定义。
    en: Session, execution, orchestration, safety, memory, and tool modules reference these identities only for actual participation, effective bindings, model snapshots, or remote resolution; task responsibility, authorization decisions, and invocation results remain defined by their own modules.
    ja: session・execution・orchestration・safety・memory・tool は実参加者・有効 binding・model snapshot・遠隔解決結果を示す場合だけ本 identity を参照し、task responsibility・authorization decision・invocation result は各モジュールが定義します。
