      en: session-2043 logs mention actor-agent-planner-02 and default_model=gpt-4.1, but there is no participates_in_session edge, no ModelActor-uses-Model fact, and ActorRoleBinding expired at 08:55; the actor must not be returned as an actual participant or invoked model.
