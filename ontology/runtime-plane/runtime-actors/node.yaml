schema: moonweave.ai/ontology-node/v1
id: runtime-actors
kind: module
status: accepted
labels:
  zh: 运行参与者、角色与模型
  en: Runtime participants, roles, and models
  ja: 実行参加者・役割・モデル
semantics:
  short_definition:
    zh: 区分实际参与运行并可被归责的 Actor、可复用的 RuntimeRole、被调用的版本化 Model、在给定范围和时段有效的 ActorBinding，以及指向远程智能体的可核验引用。
    en: Distinguishes accountable Actors that actually participate, reusable RuntimeRoles, invoked versioned Models, ActorBindings effective for a scope and interval, and verifiable references to remote agents.
    ja: 実際に参加して責任を負える Actor、再利用可能な RuntimeRole、呼び出された versioned Model、範囲と期間に対して有効な ActorBinding、遠隔エージェントへの検証可能な参照を区別します。
  definition:
    zh: Actor 的身份来自实际人或软件参与者；RuntimeRole 是职责定义，不是参与者类型；Model 是可由软件主体调用或承载的计算对象，不等于 ModelActor；ActorBinding 是把主体与角色或能力在明确范围和有效期内连接起来的信息记录，不自动授予安全权限；RemoteAgentReference 保存发现和解析远程主体所需的信息，但不冒充被引用的 AgentActor。
    en: Actor identity comes from an actual human or software participant. RuntimeRole is a responsibility definition, not a participant type. Model is a computational object that a software participant may invoke or host and is not ModelActor. ActorBinding is an information record linking an actor to a role or capability for an explicit scope and validity interval and does not itself grant security authority. RemoteAgentReference preserves discovery and resolution information without impersonating the referenced AgentActor.
    ja: Actor の同一性は実際の人または software participant に由来します。RuntimeRole は責務定義で participant type ではありません。Model は software participant が呼出または提供する計算対象で ModelActor とは異なります。ActorBinding は明示範囲と有効期間内で actor と role/capability を結ぶ情報記録で、安全権限を自動付与しません。RemoteAgentReference は遠隔主体の discovery/resolve 情報を保持しますが参照先 AgentActor そのものではありません。
  why_needed:
    zh: 让系统能够分别回答“谁参加了运行”“当时承担什么职责”“实际用了哪个模型”和“远程身份如何解析”，避免从名称或配置推断未发生的参与和授权。
    en: Enables separate answers to who participated, which responsibility was effective, which model was actually used, and how remote identity was resolved, without inferring participation or authority from names or configuration alone.
    ja: 誰が参加したか、当時どの責務が有効だったか、実際にどの model を使ったか、遠隔 identity をどう解決したかを別々に答え、名称や構成だけから未発生の参加や権限を推論しないようにします。
  includes:
    - zh: 参与主体层级：Actor 下分 HumanActor 与 SoftwareActor；SoftwareActor 再分 AgentActor、ModelActor、ExternalServiceActor、SystemServiceActor 与 ToolServiceActor。
      en: "Participant hierarchy: Actor divides into HumanActor and SoftwareActor; SoftwareActor further divides into AgentActor, ModelActor, ExternalServiceActor, SystemServiceActor, and ToolServiceActor."
      ja: 参加主体階層：Actor を HumanActor と SoftwareActor に分け、SoftwareActor を AgentActor、ModelActor、ExternalServiceActor、SystemServiceActor、ToolServiceActor に分けます。
    - zh: 运行角色层级：RuntimeRole 下分 DeveloperRole、ReviewerRole 与 HumanOperatorRole；ActorRoleBinding 赋予有范围和有效期的职责，但不改变 Actor 类型。
      en: "Runtime-role hierarchy: RuntimeRole divides into DeveloperRole, ReviewerRole, and HumanOperatorRole; ActorRoleBinding grants a scoped, time-bounded responsibility without changing the Actor type."
      ja: runtime role 階層：RuntimeRole を DeveloperRole・ReviewerRole・HumanOperatorRole に分け、ActorRoleBinding は Actor 型を変えず範囲・期間付き責務を付与します。
    - zh: 计算模型层级：Model 下分 GenerativeModel、EmbeddingModel 与 RerankerModel；ModelActor 是调用或承载模型的软件主体，不是 Model 的子类。
      en: "Computational-model hierarchy: Model divides into GenerativeModel, EmbeddingModel, and RerankerModel; ModelActor is the software participant that invokes or hosts a model, not a Model subtype."
      ja: 計算モデル階層：Model を GenerativeModel、EmbeddingModel、RerankerModel に分けます。ModelActor はモデルを呼出し・提供するソフトウェア主体であり、Model の下位型ではありません。
    - zh: 绑定与引用：ActorBinding 下分 ActorRoleBinding 与 ActorCapabilityBinding；RemoteAgentReference 通过核验后的解析关系指向 AgentActor，但引用记录不等于远程主体本身。
      en: "Bindings and references: ActorBinding divides into ActorRoleBinding and ActorCapabilityBinding; a verified RemoteAgentReference resolves to an AgentActor, but the reference record is not the remote actor itself."
      ja: 束縛と参照：ActorBinding を ActorRoleBinding と ActorCapabilityBinding に分けます。検証済み RemoteAgentReference は AgentActor に解決されますが、参照記録は遠隔主体そのものではありません。
  excludes:
    - zh: CoordinationRole、Orchestrator、Subagent、Worker、Delegation、Handoff 与任务所有权归 orchestration；本模块只拥有实际 Actor 和其有范围的绑定记录。
      en: CoordinationRole, Orchestrator, Subagent, Worker, Delegation, Handoff, and task ownership belong to orchestration; this module owns only actual Actors and their scoped binding records.
      ja: CoordinationRole、Orchestrator、Subagent、Worker、Delegation、Handoff、task ownership は orchestration に属し、このモジュールは実 Actor と範囲付き束縛記録だけを所有します。
    - zh: AuthorizationGrant、PolicyDecision 与 AuthorityScope 归 safety；ActorRoleBinding 或 ActorCapabilityBinding 只记录运行关联，不自动产生授权。
      en: AuthorizationGrant, PolicyDecision, and AuthorityScope belong to safety; ActorRoleBinding and ActorCapabilityBinding record runtime association and do not automatically create authority.
      ja: AuthorizationGrant・PolicyDecision・AuthorityScope は safety に属し、ActorRoleBinding と ActorCapabilityBinding は実行上の関連だけを記録して認可を自動生成しません。
    - zh: RuntimeSession、RunAttempt、EmbeddingRun、Embedding、排序结果与调用结果由各自运行、记忆或工具模块拥有；本模块仅以关系引用这些活动或结果。
      en: RuntimeSession, RunAttempt, EmbeddingRun, Embedding, ranked results, and invocation results are owned by their runtime, memory, or tool modules; this module references those activities or results only through relations.
      ja: RuntimeSession、RunAttempt、EmbeddingRun、Embedding、順位結果、呼出結果は各 runtime・memory・tool モジュールが所有し、このモジュールは関係を通じて参照するだけです。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为运行中的主体、职责、模型使用和远程身份解析建立可审计且互不混淆的身份层。
  en: Establishes an auditable identity layer for runtime participants, responsibilities, model use, and remote resolution without conflating them.
  ja: 実行参加者・責務・model 使用・遠隔 identity 解決について、相互に混同しない監査可能な identity layer を確立します。
structure: null
examples:
  - id: runtime-actors-cq-session-participants-v3-example-positive
    kind: positive
    labels:
      zh: 某个 RuntimeSession 中哪些 Actor 有实际参与证据，各 Actor 当时有哪些角色或能力绑定，又由哪个 ModelActor 调用了哪个 Model？：正例
      en: "Which Actors have evidence of actual participation in a RuntimeSession, which role or capability bindings were effective for each, and which Model did each ModelActor invoke?: positive case"
      ja: RuntimeSession で実参加証拠を持つ Actor は誰で、各 Actor の有効な役割・能力束縛は何で、各 ModelActor はどの Model を呼びましたか。：正例
    scenario_id: null
    descriptions:
      zh: session-2042 的审计记录表明 actor-agent-planner-01 在 09:00 至 09:15 期间实际参与；binding:2042:planner 同期有效并绑定 DeveloperRole；model-worker-02 另以 uses 事实指向 model:gpt-5:2026-07。参与、角色绑定与模型调用是三组独立证据。
      en: The audit record for session-2042 shows actor-agent-planner-01 participating from 09:00 to 09:15; binding:2042:planner is effective in the same interval and binds DeveloperRole; a separate uses fact links model-worker-02 to model:gpt-5:2026-07. Participation, role binding, and model invocation are three independent facts.
      ja: session-2042 の監査記録では actor-agent-planner-01 が 09:00–09:15 に実参加し、同期間に binding:2042:planner が DeveloperRole を束縛します。別の uses 事実は model-worker-02 を model:gpt-5:2026-07 に結び、参加・役割束縛・モデル呼出を別々に立証します。
    field_values:
      session_id: session-2042
      participant_actor_id: actor-agent-planner-01
      participation_evidence_id: audit-participation-2042-01
      binding_id: binding:2042:planner
      runtime_role_id: role:developer:planner
      valid_from: 2026-07-16T09:00:00Z
      valid_to: 2026-07-16T09:15:00Z
      model_actor_id: model-worker-02
      model_id: model:gpt-5:2026-07
    related_node_ids:
      - AgentActor
      - RuntimeSession
      - ActorRoleBinding
      - DeveloperRole
      - ModelActor
      - Model
    related_relation_ids:
      - participates_in_session
      - Actor-has_binding-ActorBinding
      - ActorRoleBinding-binds-RuntimeRole
      - ModelActor-uses-Model
    expected_result:
      zh: 返回 actor-agent-planner-01 为会话参与者、DeveloperRole 为该时段的职责、model:gpt-5:2026-07 为 model-worker-02 实际调用的模型；不得把角色或能力绑定解释为授权。
      en: Return actor-agent-planner-01 as the session participant, DeveloperRole as its responsibility for the stated interval, and model:gpt-5:2026-07 as the model invoked by model-worker-02; do not interpret either role or capability binding as authorization.
      ja: actor-agent-planner-01 を参加者、DeveloperRole を指定期間の責務、model:gpt-5:2026-07 を model-worker-02 の実呼出モデルとして返し、role/capability binding を認可と解釈しません。
    why_valid_or_invalid:
      zh: 三项结论分别有参与边、带有效期的角色绑定链和模型调用边支撑，端点身份及时间范围均可核验。
      en: Each conclusion is supported independently by a participation edge, a time-bounded role-binding chain, or a model-invocation edge, with verifiable endpoint identities and intervals.
      ja: 各結論は参加 edge、期間付き role-binding chain、model-invocation edge の別個の証拠を持ち、endpoint identity と期間を検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-actors-003
      - claim-runtime-actors-004
  - id: runtime-actors-cq-session-participants-v3-example-counter
    kind: counterexample
    labels:
      zh: 某个 RuntimeSession 中哪些 Actor 有实际参与证据，各 Actor 当时有哪些角色或能力绑定，又由哪个 ModelActor 调用了哪个 Model？：反例
      en: "Which Actors have evidence of actual participation in a RuntimeSession, which role or capability bindings were effective for each, and which Model did each ModelActor invoke?: counterexample"
      ja: RuntimeSession で実参加証拠を持つ Actor は誰で、各 Actor の有効な役割・能力束縛は何で、各 ModelActor はどの Model を呼びましたか。：反例
    scenario_id: null
    descriptions:
      zh: session-2043 的日志文本提到 actor-agent-planner-02，但没有 participates_in_session 事实；它唯一的角色绑定已于 08:55 失效，配置文件中的 default_model 也没有对应的 ModelActor-uses-Model 运行事实。
      en: The log for session-2043 mentions actor-agent-planner-02 but contains no participates_in_session fact; its only role binding expired at 08:55, and the configured default_model has no corresponding ModelActor-uses-Model runtime fact.
      ja: session-2043 の log は actor-agent-planner-02 に言及しますが participates_in_session 事実がなく、唯一の role binding は 08:55 に失効済みです。設定上の default_model にも対応する ModelActor-uses-Model 実行事実がありません。
    field_values:
      session_id: session-2043
      mentioned_actor_id: actor-agent-planner-02
      participation_evidence_id: null
      expired_binding_id: binding:2043:planner-old
      binding_valid_to: 2026-07-16T08:55:00Z
      session_start: 2026-07-16T09:00:00Z
      configured_default_model: model:gpt-5:latest
      model_invocation_evidence_id: null
    related_node_ids:
      - AgentActor
      - RuntimeSession
      - ActorRoleBinding
      - RuntimeRole
      - ModelActor
      - Model
    related_relation_ids:
      - participates_in_session
      - Actor-has_binding-ActorBinding
      - ActorRoleBinding-binds-RuntimeRole
      - ModelActor-uses-Model
    expected_result:
      zh: 不得把 actor-agent-planner-02 返回为实际参与者，也不得为该会话返回已失效角色或仅配置、未实际调用的模型。
      en: Do not return actor-agent-planner-02 as an actual participant, and do not return the expired role or a merely configured, uninvoked model for this session.
      ja: actor-agent-planner-02 を実参加者として返さず、失効 role や設定だけで実呼出のない model もこの session の結果に含めません。
    why_valid_or_invalid:
      zh: 文本共现不能替代参与边，失效绑定不能跨越有效期，配置默认值也不能替代具体运行的模型调用证据。
      en: Textual co-occurrence cannot replace a participation edge, an expired binding cannot cross its validity interval, and a configured default cannot replace evidence of the model invoked in the run.
      ja: 文字列共起は参加 edge の代わりにならず、失効 binding は有効期間を越えられず、default 設定も実行時 model 呼出証拠の代わりになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-actors-005
      - claim-runtime-actors-004
  - id: runtime-actors-cq-actor-role-separation-v3-example-positive
    kind: positive
    labels:
      zh: RuntimeRole、CoordinationRole 与 Actor 身份分离：正例
      en: "RuntimeRole, CoordinationRole, and Actor identity remain separate: positive case"
      ja: RuntimeRole・CoordinationRole・Actor identity の分離：正例
    scenario_id: null
    descriptions:
      zh: actor-17 在 session-42 中始终是同一个 HumanActor。binding:task-42:reviewer 在 10:00 至 11:30 对 task-42 有效并指向 ReviewerRole；另一条 binding:task-42:worker 在同一范围指向 WorkerRole。11:30 后两条职责均失效，但 Actor 身份不变。
      en: actor-17 remains the same HumanActor in session-42. binding:task-42:reviewer is effective for task-42 from 10:00 to 11:30 and points to ReviewerRole, while a separate binding:task-42:worker points to WorkerRole in the same scope. Both responsibilities cease after 11:30 without changing Actor identity.
      ja: actor-17 は session-42 で同一 HumanActor のままです。binding:task-42:reviewer は task-42 の 10:00–11:30 に ReviewerRole を指し、別の binding:task-42:worker は同範囲で WorkerRole を指します。11:30 後は両責務が失効しても Actor identity は変わりません。
    field_values:
      actor_id: actor-17
      runtime_session_id: session-42
      binding_id: binding:task-42:reviewer
      role_id: role:reviewer:release
      coordination_binding_id: binding:task-42:worker
      coordination_role_id: role:worker:task-42
      scope_id: task-42
      valid_from: 2026-07-16T10:00:00Z
      valid_to: 2026-07-16T11:30:00Z
      provenance_ref: approval-role-assignment-774
    related_node_ids:
      - HumanActor
      - ActorRoleBinding
      - RuntimeRole
      - ReviewerRole
      - RuntimeSession
      - CoordinationRole
      - WorkerRole
    related_relation_ids:
      - participates_in_session
      - has_actor_role_binding
      - ActorRoleBinding-binds-RuntimeRole
      - ActorRoleBinding-binds-CoordinationRole
    expected_result:
      zh: 仅在 session-42、task-42 与有效期均匹配时，分别返回 ReviewerRole 与 WorkerRole；有效期外不返回任一角色，但 Actor 始终保持 actor-17。
      en: Return ReviewerRole and WorkerRole as separate role dimensions only while session-42, task-42, and the binding interval match; outside it, omit both while preserving actor-17 as the same Actor.
      ja: session-42・task-42・binding 期間が一致する間だけ ReviewerRole と WorkerRole を別 role 次元として返し、期間外では両方を除外しても Actor は actor-17 のまま保持します。
    why_valid_or_invalid:
      zh: 运行职责与协同位置由各自带范围、有效期和来源的绑定记录授予；两者互不推出，也都不是 HumanActor 的永久子类型。
      en: Runtime responsibility and coordination position are granted by separate bindings with scope, validity, and provenance; neither implies the other, and neither is a permanent HumanActor subtype.
      ja: runtime responsibility と coordination position は各自 scope・validity・provenance を持つ別 binding が付与し、相互に含意せず HumanActor の恒久 subtype でもありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-actors-006
      - claim-runtime-actors-007
  - id: runtime-actors-cq-actor-role-separation-v3-example-counter
    kind: counterexample
    labels:
      zh: 会话参与与裸角色词不足以建立角色绑定：反例
      en: "Session participation and a bare role word do not establish role bindings: counterexample"
      ja: session 参加と bare role word だけでは role binding にならない：反例
    scenario_id: null
    descriptions:
      zh: session-43 的 trace 证明 actor-18 实际参与，但 task-43 日志仅写有“请 actor-18 找 reviewer 看一下”；没有指向 actor-18 的有效 ActorRoleBinding，也没有绑定记录到 ReviewerRole 或任何 CoordinationRole 的 binds 事实。
      en: The session-43 trace proves that actor-18 participated, but the task-43 log only says “ask actor-18 to find a reviewer”; there is no effective ActorRoleBinding for actor-18 and no binds fact to ReviewerRole or any CoordinationRole.
      ja: session-43 trace は actor-18 の参加を証明しますが、task-43 log は「actor-18 に reviewer を探させる」と記すだけで、有効 ActorRoleBinding も ReviewerRole または CoordinationRole への binds 事実もありません。
    field_values:
      actor_id: actor-18
      runtime_session_id: session-43
      scope_id: task-43
      observed_log_text: ask actor-18 to find a reviewer
      binding_id: null
      role_id: null
      evaluated_at: 2026-07-16T12:00:00Z
    related_node_ids:
      - HumanActor
      - ActorRoleBinding
      - RuntimeRole
      - ReviewerRole
      - RuntimeSession
      - CoordinationRole
    related_relation_ids:
      - participates_in_session
      - has_actor_role_binding
      - ActorRoleBinding-binds-RuntimeRole
    expected_result:
      zh: 返回 actor-18 的规范 HumanActor 身份与 session-43 参与事实，但 RuntimeRole 和 CoordinationRole 结果均为空；不得创建 ReviewerActor 类型或推断审核授权。
      en: Return actor-18's canonical HumanActor identity and session-43 participation, but no RuntimeRole or CoordinationRole; do not create a ReviewerActor type or infer review authority.
      ja: actor-18 の正規 HumanActor identity と session-43 参加は返しますが RuntimeRole/CoordinationRole は空とし、ReviewerActor 型や review authority を推論しません。
    why_valid_or_invalid:
      zh: 句子中的 reviewer 是被寻找的第三方角色描述，既没有绑定主体 actor-18，也没有范围、有效期和来源，不能形成角色事实。
      en: In the sentence, reviewer describes a third party to be found; it neither binds actor-18 nor supplies scope, validity, or provenance, so it cannot establish a role fact.
      ja: 文中の reviewer は探索対象の第三者 role を表すだけで、actor-18 を束縛せず scope・validity・provenance もないため role fact を成立させません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-actors-008
      - claim-runtime-actors-007
  - id: runtime-actors-cq-model-binding-provenance-v3-example-positive
    kind: positive
    labels:
      zh: 一次生成、嵌入或重排活动由哪个 ModelActor 执行、实际解析到哪个版本化 Model，并由哪条运行证据连接输入与结果？：正例
      en: "Which ModelActor executed a generation, embedding, or reranking activity, which versioned Model was actually resolved, and which run evidence connects its input and result?: positive case"
      ja: generation・embedding・reranking activity をどの ModelActor が実行し、どの版付き Model に解決し、どの run 証拠が入力と結果を結びますか。：正例
    scenario_id: null
    descriptions:
      zh: model-worker-02 通过 ModelActor-uses-Model 指向 text-embedding-3-small@2026-06；embedding-run-17 的请求清单与响应均记录同一快照，并分别通过 consumes 与 produces 连接 chunk-77 和 vector-77。
      en: ModelActor-uses-Model links model-worker-02 to text-embedding-3-small@2026-06; both the request manifest and response for embedding-run-17 record that same snapshot, while consumes and produces link the run to chunk-77 and vector-77 respectively.
      ja: ModelActor-uses-Model は model-worker-02 を text-embedding-3-small@2026-06 に結び、embedding-run-17 の request manifest と response は同じ snapshot を記録します。consumes と produces は run を chunk-77 と vector-77 にそれぞれ結びます。
    field_values:
      model_actor_id: model-worker-02
      model_snapshot: text-embedding-3-small@2026-06
      run_id: embedding-run-17
      input_chunk_id: chunk-77
      output_vector_id: vector-77
      request_evidence_id: embedding-request-17
      response_evidence_id: embedding-response-17
    related_node_ids:
      - ModelActor
      - Model
      - EmbeddingRun
      - EmbeddingModel
      - Chunk
      - EmbeddingVector
    related_relation_ids:
      - ModelActor-uses-Model
      - EmbeddingRun-uses-EmbeddingModel
      - EmbeddingRun-consumes-Chunk
      - EmbeddingRun-produces-EmbeddingVector
    expected_result:
      zh: 报告 model-worker-02 为软件执行主体、text-embedding-3-small@2026-06 为实际模型快照、embedding-run-17 为活动，并保留输入 chunk-77 与输出 vector-77 的独立身份。
      en: Report model-worker-02 as the software actor, text-embedding-3-small@2026-06 as the invoked model snapshot, and embedding-run-17 as the activity, while preserving chunk-77 and vector-77 as distinct input and output identities.
      ja: model-worker-02 を software actor、text-embedding-3-small@2026-06 を実呼出 model snapshot、embedding-run-17 を activity として報告し、chunk-77 と vector-77 の入力・出力同一性を分離します。
    why_valid_or_invalid:
      zh: 主体到模型、运行到模型、运行到输入与运行到输出四条事实互相印证，且请求和响应中的模型快照完全一致。
      en: Four independent facts—actor to model, run to model, run to input, and run to output—corroborate one another, and the model snapshot agrees exactly between request and response.
      ja: actor→model、run→model、run→input、run→output の四事実が相互検証され、request と response の model snapshot も完全一致します。
