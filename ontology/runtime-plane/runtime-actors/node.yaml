schema: moonweave.ai/ontology-node/v1
id: runtime-actors
kind: module
labels:
  zh: 运行参与者、角色与模型
  en: Runtime participants, roles, and models
  ja: 実行参加者・役割・モデル
semantics:
  short_definition:
    zh: 运行参与者模块记录谁在运行中实际出现、承担什么职责、调用了哪个模型，以及如何解析远程智能体身份。
    en: The runtime-actors module records who actually appeared in a run, which responsibilities were effective, which model was invoked, and how remote agent identity is resolved.
    ja: runtime-actors モジュールは、実行中に実際に現れた主体、有効だった責務、呼び出された model、遠隔 agent identity の解決方法を記録します。
  definition:
    zh: 本模块拥有五类正交对象：Actor（HumanActor、SoftwareActor 及其 AgentActor、ModelActor 等子型）表达实际参与主体；RuntimeRole（DeveloperRole、ReviewerRole、HumanOperatorRole）表达可复用职责定义；Model（GenerativeModel、EmbeddingModel、RerankerModel）表达被调用的版本化计算对象；ActorBinding（ActorRoleBinding、ActorCapabilityBinding）表达在明确范围与有效期内的主体—职责或主体—能力关联；RemoteAgentReference 保存 A2A 等协议下远程 AgentActor 的发现与解析信息。ActorBinding 只记录运行关联，不自动授予安全授权；RemoteAgentReference 不等于被引用的远程主体本身。CoordinationRole、Delegation 与任务所有权归编排域；RunAttempt 与 RuntimeSession 归运行域其他模块。
    en: "This module owns five orthogonal families: Actor (HumanActor, SoftwareActor, and subtypes such as AgentActor and ModelActor) for actual participants; RuntimeRole (DeveloperRole, ReviewerRole, HumanOperatorRole) for reusable responsibility definitions; Model (GenerativeModel, EmbeddingModel, RerankerModel) for invoked versioned computational objects; ActorBinding (ActorRoleBinding, ActorCapabilityBinding) for actor-to-role or actor-to-capability links within explicit scope and validity intervals; and RemoteAgentReference for discovery and resolution of remote AgentActor identities under protocols such as A2A. ActorBinding records runtime association only and does not grant security authority; a RemoteAgentReference is not the referenced remote actor. CoordinationRole, Delegation, and task ownership belong to orchestration; RunAttempt and RuntimeSession belong to other runtime modules."
    ja: 本モジュールは Actor（HumanActor・SoftwareActor と AgentActor・ModelActor 等）、RuntimeRole（DeveloperRole・ReviewerRole・HumanOperatorRole）、Model（GenerativeModel・EmbeddingModel・RerankerModel）、ActorBinding（ActorRoleBinding・ActorCapabilityBinding）、RemoteAgentReference（A2A 等の遠隔 AgentActor 解決情報）の五直交族を所有します。ActorBinding は runtime 関連のみを記録し安全権限を付与しません。RemoteAgentReference は参照先主体そのものではありません。CoordinationRole・Delegation・task ownership は orchestration、RunAttempt・RuntimeSession は他 runtime モジュールに属します。
  why_needed:
    zh: 没有这一模块，团队无法分别回答“谁参加了这次运行”“当时承担什么职责”“实际用了哪个模型”以及“远程智能体如何被解析”，容易把配置默认值或名称共现误当成实际参与与授权。
    en: Without this module, teams cannot separately answer who participated, which responsibility was effective, which model was actually invoked, or how a remote agent was resolved, and defaults or name co-occurrence get mistaken for participation and authority.
    ja: このモジュールがなければ、誰が参加したか、どの責務が有効だったか、実際にどの model が呼ばれたか、遠隔 agent をどう解決したかを別々に答えられず、default や名称共起が参加・権限と誤認されます。
  includes:
    - zh: Actor 层级（HumanActor、SoftwareActor、AgentActor、ModelActor、ExternalServiceActor、SystemServiceActor、ToolServiceActor）及其实际参与证据。
      en: Actor hierarchy (HumanActor, SoftwareActor, AgentActor, ModelActor, ExternalServiceActor, SystemServiceActor, ToolServiceActor) and evidence of actual participation.
      ja: Actor 階層（HumanActor・SoftwareActor・AgentActor・ModelActor・ExternalServiceActor・SystemServiceActor・ToolServiceActor）と実参加証拠。
    - zh: RuntimeRole 层级（DeveloperRole、ReviewerRole、HumanOperatorRole）及 ActorRoleBinding 的有范围、有有效期的职责绑定。
      en: RuntimeRole hierarchy (DeveloperRole, ReviewerRole, HumanOperatorRole) and scoped, time-bounded ActorRoleBinding assignments.
      ja: RuntimeRole 階層（DeveloperRole・ReviewerRole・HumanOperatorRole）と範囲・有効期間付き ActorRoleBinding。
    - zh: Model 层级（GenerativeModel、EmbeddingModel、RerankerModel）及 ModelActor-uses-Model 运行调用事实。
      en: Model hierarchy (GenerativeModel, EmbeddingModel, RerankerModel) and ModelActor-uses-Model runtime invocation facts.
      ja: Model 階層（GenerativeModel・EmbeddingModel・RerankerModel）と ModelActor-uses-Model runtime 呼出事実。
    - zh: RemoteAgentReference 及经核验解析后指向 AgentActor 的引用链（含 A2A Agent Card 与 endpoint 解析）。
      en: RemoteAgentReference and verified resolution chains pointing to AgentActor, including A2A Agent Card and endpoint resolution.
      ja: RemoteAgentReference と検証済み AgentActor 解決連鎖（A2A Agent Card・endpoint 解決を含む）。
  excludes:
    - zh: "CoordinationRole、Orchestrator、Subagent、Worker、Delegation、Handoff（owner: orchestration-plane）；本模块只拥有实际 Actor 与有范围绑定。"
      en: "CoordinationRole, Orchestrator, Subagent, Worker, Delegation, Handoff (owner: orchestration-plane); this module owns actual Actors and scoped bindings only."
      ja: "CoordinationRole・Orchestrator・Subagent・Worker・Delegation・Handoff（owner: orchestration-plane）。本モジュールは実 Actor と scoped binding のみ所有。"
    - zh: "AuthorizationGrant、PolicyDecision、AuthorityScope（owner: safety-plane）；ActorBinding 不自动产生授权。"
      en: "AuthorizationGrant, PolicyDecision, AuthorityScope (owner: safety-plane); ActorBinding does not automatically create authority."
      ja: "AuthorizationGrant・PolicyDecision・AuthorityScope（owner: safety-plane）。ActorBinding は認可を自動生成しません。"
    - zh: "RuntimeSession、RunAttempt、ToolResult、EmbeddingRun（owner: runtime-system、runtime-execution-attempts 等）；本模块仅以关系引用这些活动。"
      en: "RuntimeSession, RunAttempt, ToolResult, EmbeddingRun (owner: runtime-system, runtime-execution-attempts, etc.); this module references those activities through relations only."
      ja: "RuntimeSession・RunAttempt・ToolResult・EmbeddingRun（owner: runtime-system・runtime-execution-attempts 等）。本モジュールは関係経由で参照のみ。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI Assistants API 的 assistant/model/tool 角色（assistant 对象、model 字段、tools 数组）、LangGraph 图节点 executor（compiled node callable 与 runnable config 中的 actor 标识）、CrewAI agent runtime（Agent.role、Agent.llm、Agent.tools 绑定到 AgentActor 与 Model）、以及 A2A 远程 agent（Agent Card URL、/.well-known/agent.json、SendMessage 目标 endpoint）。静态配置属于其他域；assistants.create、graph node invoke、crew.kickoff 与 a2a SendMessage 触发的实际参与、模型调用与远程解析才属于本模块 occurrence。
    en: "Integrations should map OpenAI Assistants API assistant/model/tool roles (assistant object, model field, tools array), LangGraph graph-node executors (compiled node callables and actor identifiers in runnable config), CrewAI agent runtime (Agent.role, Agent.llm, Agent.tools bound to AgentActor and Model), and A2A remote agents (Agent Card URL, /.well-known/agent.json, SendMessage target endpoint) separately. Static configuration belongs elsewhere; actual participation, model invocation, and remote resolution triggered by assistants.create, graph node invoke, crew.kickoff, and a2a SendMessage belong to runtime-actors occurrences."
    ja: 統合では OpenAI Assistants API の assistant/model/tool role、LangGraph node executor、CrewAI agent runtime（Agent.role・Agent.llm・Agent.tools を AgentActor/Model に束縛）、A2A remote agent（Agent Card URL・/.well-known/agent.json・SendMessage endpoint）を個別に写像します。静的設定は他ドメイン、assistants.create・graph node invoke・crew.kickoff・a2a SendMessage で触発された実参加・model 呼出・remote 解決が本モジュール occurrence です。
  typical_input:
    - description: OpenAI Assistants API — create assistant with model and tool roles.
      format: |
        POST https://api.openai.com/v1/assistants
        {
          "name": "ontology-reviewer",
          "model": "gpt-4.1",
          "tools": [{"type": "code_interpreter"}, {"type": "file_search"}]
        }
        =>
        {"id": "asst_abc", "model": "gpt-4.1", "tools": [...]}
      source_claims: [claim-runtime-actors-openai-assistants]
    - description: LangGraph — node executor invoked with runnable config actor metadata.
      format: |
        # Parent graph invokes a compiled node executor
        result = graph.invoke(
            {"messages": [{"role": "user", "content": "Review node.yaml"}]},
            config={
                "configurable": {
                    "thread_id": "thread-42",
                    "actor_id": "agent-reviewer-01",
                    "model": "claude-sonnet-4-20250514"
                }
            }
        )
      source_claims: [claim-runtime-actors-langgraph-executor]
    - description: CrewAI — agent runtime with role, LLM, and tools at kickoff.
      format: |
        from crewai import Agent, Crew, Task

        researcher = Agent(
            role="Research Analyst",
            goal="Gather sources",
            llm="gpt-4.1",
            tools=[search_tool]
        )
        crew = Crew(agents=[researcher], tasks=[task])
        crew.kickoff(inputs={"topic": "runtime ontology"})
      source_claims: [claim-runtime-actors-crewai]
    - description: A2A — resolve remote agent from Agent Card and SendMessage endpoint.
      format: |
        GET https://remote-agent.example/.well-known/agent.json
        =>
        {
          "name": "support-agent",
          "url": "https://remote-agent.example/a2a/v1",
          "capabilities": {"streaming": true}
        }

        POST https://remote-agent.example/a2a/v1
        {"jsonrpc":"2.0","method":"SendMessage","params":{"message":{...}}}
      source_claims: [claim-runtime-actors-a2a]
  typical_output:
    - description: Moonweave-local actor projection linking participant, role binding, model use, and remote reference without conflating configuration with occurrence.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "participant_actor_id": "actor-agent-reviewer-01",
          "actor_role_binding_id": "binding-thread-42-reviewer",
          "runtime_role_id": "role:reviewer",
          "model_actor_id": "model-worker-openai-01",
          "model_id": "model:gpt-4.1:2026-04-14",
          "remote_agent_reference_id": "ref-a2a-support-agent"
        }
      source_claims: [claim-runtime-actors-design]
  reference_implementations:
    - name: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
      description: Assistant, model, and tool role objects for agent runtime participants.
    - name: LangGraph
      url: https://langchain-ai.github.io/langgraph/
      description: Compiled node executors and runnable config actor metadata.
    - name: CrewAI
      url: https://docs.crewai.com/
      description: Agent.role, Agent.llm, and Agent.tools runtime bindings.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Agent Card discovery and SendMessage remote agent resolution.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 运行参与者模块的稳定标识，不是某个 Actor 或 Model 的标识。
        en: Stable identifier of the runtime-actors module, not an Actor or Model identifier.
        ja: runtime-actors モジュールの安定識別子であり、Actor や Model の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^runtime-actors$'
      example_value: runtime-actors
      allowed_values: []
      source_claims: [claim-runtime-actors-design]
    - id: actor_ref
      labels: {zh: 参与者引用, en: Actor reference, ja: 参加者参照}
      definitions:
        zh: 标识一次运行中实际参与主体的稳定引用；不得用 assistant 配置 ID 或角色名称代替未发生的参与事实。
        en: Stable reference identifying an actor that actually participated in a run; assistant config ID or role name must not replace an occurrence without participation evidence.
        ja: 実行中に実参加した主体を識別する安定参照。assistant 設定 ID や role 名で未発生 participation を代替してはなりません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: actor-agent-reviewer-01
      allowed_values: []
      source_claims: [claim-runtime-actors-openai-assistants, claim-runtime-actors-design]
    - id: model_ref
      labels: {zh: 模型引用, en: Model reference, ja: モデル参照}
      definitions:
        zh: 标识一次运行中实际被 ModelActor 调用的版本化 Model；configured default 不等于 invocation 事实。
        en: Identifies a versioned Model actually invoked by a ModelActor in a run; a configured default is not an invocation fact.
        ja: 実行中に ModelActor が実呼出した versioned Model。configured default は invocation 事実ではありません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: model:gpt-4.1:2026-04-14
      allowed_values: []
      source_claims: [claim-runtime-actors-openai-assistants, claim-runtime-actors-crewai]
    - id: remote_agent_reference_ref
      labels: {zh: 远程智能体引用, en: Remote agent reference, ja: 遠隔エージェント参照}
      definitions:
        zh: A2A 或其他协议下保存 Agent Card URL、endpoint 与解析结果的 RemoteAgentReference；解析成功后可链接到 AgentActor，但引用记录本身不是远程主体。
        en: RemoteAgentReference preserving Agent Card URL, endpoint, and resolution result under A2A or similar protocols; may link to AgentActor after verified resolution but is not the remote actor itself.
        ja: A2A 等で Agent Card URL・endpoint・解決結果を保持する RemoteAgentReference。検証後 AgentActor にリンク可能ですが、参照記録は遠隔主体そのものではありません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: ref-a2a-support-agent
      allowed_values: []
      source_claims: [claim-runtime-actors-a2a]
  constraints:
    - id: actor-participation-requires-evidence
      severity: error
      expression_language: plain
      expression: An Actor must not be asserted as a session or run participant without an explicit participation edge or equivalent runtime occurrence evidence; log mentions and configuration defaults are insufficient.
      explanation:
        zh: 名称共现或配置存在不能证明某主体实际参加了运行。
        en: Name co-occurrence or configuration presence does not prove an actor actually participated in a run.
        ja: 名称共起や設定存在だけでは actor が実参加したとは証明できません。
      source_claims: [claim-runtime-actors-design]
    - id: actor-binding-not-authorization
      severity: error
      expression_language: plain
      expression: ActorRoleBinding and ActorCapabilityBinding record runtime association within scope and validity interval; they must not be interpreted as AuthorizationGrant or PolicyDecision without separate safety-domain evidence.
      explanation:
        zh: 运行职责绑定与安全授权是不同事实，不能互相替代。
        en: Runtime responsibility binding and security authorization are distinct facts and must not substitute for each other.
        ja: runtime 責務 binding と安全認可は別事実で相互代替できません。
      source_claims: [claim-runtime-actors-design]
    - id: model-invocation-not-default-config
      severity: warning
      expression_language: plain
      expression: ModelActor-uses-Model must reference the model actually invoked in the run; assistant.model or Agent.llm default values without invocation evidence must not be promoted to runtime model-use facts.
      explanation:
        zh: 配置默认值不能代替一次运行中实际调用的模型证据。
        en: Configured defaults cannot replace evidence of the model actually invoked in a run.
        ja: 設定 default は実行中に実呼出された model の証拠を代替できません。
      source_claims: [claim-runtime-actors-openai-assistants, claim-runtime-actors-crewai]
  required_relations:
    - id: runtime-actors-organizes-actor
      direction: outgoing
      predicate: organizes
      target_concept_id: Actor
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 Actor 参与层级（Actor→SoftwareActor→AgentActor）。
        en: The module organizes at least one Actor participation hierarchy (Actor→SoftwareActor→AgentActor).
        ja: モジュールは少なくとも一つの Actor 参加階層（Actor→SoftwareActor→AgentActor）を組織します。
      source_claims: [claim-runtime-actors-design]
    - id: runtime-actors-organizes-runtime-role
      direction: outgoing
      predicate: organizes
      target_concept_id: RuntimeRole
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 RuntimeRole 职责定义（RuntimeRole→ReviewerRole 等）。
        en: The module organizes at least one RuntimeRole responsibility definition (RuntimeRole→ReviewerRole, etc.).
        ja: モジュールは少なくとも一つの RuntimeRole 責務定義（RuntimeRole→ReviewerRole 等）を組織します。
      source_claims: [claim-runtime-actors-design]
examples:
  - id: runtime-actors-example-openai-assistant-model-tools
    labels:
      zh: OpenAI Assistant 的 model 与 tool 角色
      en: OpenAI Assistant model and tool roles
      ja: OpenAI Assistant の model と tool role
    descriptions:
      zh: POST /v1/assistants 创建 asst_abc（model=gpt-4.1，tools 含 code_interpreter 与 file_search）。运行中 thread run 触发 ModelActor model-worker-openai-01 以 uses 事实调用 model:gpt-4.1:2026-04-14，ToolServiceActor tool-code-interpreter-01 参与 code_interpreter 调用；DeveloperRole 通过 binding-thread-42-dev 在 09:00–09:30 有效。
      en: POST /v1/assistants creates asst_abc (model=gpt-4.1, tools include code_interpreter and file_search). A thread run triggers ModelActor model-worker-openai-01 to invoke model:gpt-4.1:2026-04-14 via a uses fact, and ToolServiceActor tool-code-interpreter-01 participates in code_interpreter calls; DeveloperRole is effective via binding-thread-42-dev from 09:00–09:30.
      ja: POST /v1/assistants で asst_abc（model=gpt-4.1、tools に code_interpreter/file_search）を作成。thread run で ModelActor model-worker-openai-01 が uses 事実で model:gpt-4.1:2026-04-14 を呼び出し、ToolServiceActor tool-code-interpreter-01 が code_interpreter 呼出に参加します。DeveloperRole は binding-thread-42-dev で 09:00–09:30 有効です。
    example_source:
      product: OpenAI Assistants API
      url: https://platform.openai.com/docs/api-reference/assistants
    field_values:
      api_endpoint: POST /v1/assistants
      assistant_id: asst_abc
      model: gpt-4.1
      tools:
        - code_interpreter
        - file_search
      model_actor_id: model-worker-openai-01
      model_ref: model:gpt-4.1:2026-04-14
      tool_service_actor_id: tool-code-interpreter-01
      actor_role_binding_id: binding-thread-42-dev
      runtime_role_id: role:developer
    related_node_ids:
      - Actor
      - ModelActor
      - Model
      - ToolServiceActor
      - RuntimeRole
      - ActorRoleBinding
    related_relation_ids:
      - ModelActor-uses-Model
      - ActorRoleBinding-binds-RuntimeRole
    source_claims:
      - claim-runtime-actors-openai-assistants
      - claim-runtime-actors-design
  - id: runtime-actors-example-langgraph-node-executor
    labels:
      zh: LangGraph 节点 executor 参与者
      en: LangGraph node executor participant
      ja: LangGraph node executor 参加者
    descriptions:
      zh: LangGraph 图在 thread-42 上 invoke reviewer_node；runnable config 中 actor_id=agent-reviewer-01、model=claude-sonnet-4-20250514。系统将 agent-reviewer-01 映射为 AgentActor actor-agent-reviewer-01，ReviewerRole 通过 binding-run-884-reviewer 绑定，ModelActor 实际调用 model:claude-sonnet-4-20250514。
      en: LangGraph invokes reviewer_node on thread-42; runnable config carries actor_id=agent-reviewer-01 and model=claude-sonnet-4-20250514. The system maps agent-reviewer-01 to AgentActor actor-agent-reviewer-01, binds ReviewerRole via binding-run-884-reviewer, and records ModelActor invocation of model:claude-sonnet-4-20250514.
      ja: LangGraph が thread-42 で reviewer_node を invoke し、runnable config に actor_id=agent-reviewer-01、model=claude-sonnet-4-20250514。agent-reviewer-01 を AgentActor actor-agent-reviewer-01 に写像し、ReviewerRole を binding-run-884-reviewer で束縛、ModelActor が model:claude-sonnet-4-20250514 を実呼出します。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/
    field_values:
      thread_id: thread-42
      node_name: reviewer_node
      actor_id: agent-reviewer-01
      actor_ref: actor-agent-reviewer-01
      model: claude-sonnet-4-20250514
      model_ref: model:claude-sonnet-4-20250514
      runtime_role_id: role:reviewer
      actor_role_binding_id: binding-run-884-reviewer
    related_node_ids:
      - AgentActor
      - ModelActor
      - Model
      - ReviewerRole
      - ActorRoleBinding
    related_relation_ids:
      - ModelActor-uses-Model
      - ActorRoleBinding-binds-RuntimeRole
    source_claims:
      - claim-runtime-actors-langgraph-executor
      - claim-runtime-actors-design
  - id: runtime-actors-example-crewai-agent-runtime
    labels:
      zh: CrewAI agent runtime 角色与 LLM
      en: CrewAI agent runtime role and LLM
      ja: CrewAI agent runtime の role と LLM
    descriptions:
      zh: CrewAI crew.kickoff 启动 Research Analyst agent；Agent.role 映射 DeveloperRole，Agent.llm=gpt-4.1 经 ModelActor model-worker-crew-01 产生 uses 事实指向 model:gpt-4.1:2026-04-14，search_tool 映射 ToolServiceActor tool-search-01；HumanOperatorRole 通过 binding-crew-kickoff-01 在 kickoff 窗口有效。
      en: CrewAI crew.kickoff starts the Research Analyst agent; Agent.role maps to DeveloperRole, Agent.llm=gpt-4.1 produces a uses fact via ModelActor model-worker-crew-01 pointing to model:gpt-4.1:2026-04-14, search_tool maps to ToolServiceActor tool-search-01, and HumanOperatorRole is effective via binding-crew-kickoff-01 during the kickoff window.
      ja: CrewAI crew.kickoff が Research Analyst agent を起動。Agent.role は DeveloperRole に対応、Agent.llm=gpt-4.1 は ModelActor model-worker-crew-01 経由で model:gpt-4.1:2026-04-14 への uses 事実を生成、search_tool は ToolServiceActor tool-search-01 に対応、HumanOperatorRole は binding-crew-kickoff-01 で kickoff 窗口中有効です。
    example_source:
      product: CrewAI
      url: https://docs.crewai.com/
    field_values:
      framework: crewai
      agent_role: Research Analyst
      agent_ref: actor-agent-research-01
      llm: gpt-4.1
      model_ref: model:gpt-4.1:2026-04-14
      model_actor_id: model-worker-crew-01
      tool_ref: tool-search-01
      runtime_role_id: role:developer
    related_node_ids:
      - AgentActor
      - ModelActor
      - Model
      - ToolServiceActor
      - DeveloperRole
    related_relation_ids:
      - ModelActor-uses-Model
      - ActorRoleBinding-binds-RuntimeRole
    source_claims:
      - claim-runtime-actors-crewai
      - claim-runtime-actors-design
  - id: runtime-actors-example-a2a-remote-agent
    labels:
      zh: A2A 远程 Agent 解析
      en: A2A remote agent resolution
      ja: A2A 遠隔 Agent 解決
    descriptions:
      zh: GET /.well-known/agent.json 返回 support-agent 的 Agent Card；RemoteAgentReference ref-a2a-support-agent 保存 card_url 与 resolved endpoint。SendMessage 成功后解析链指向 AgentActor actor-remote-support-01，ExternalServiceActor 记录远程服务边界；本地 AgentActor actor-local-router-01 发起调用但不冒充远程主体。
      en: GET /.well-known/agent.json returns the support-agent Agent Card; RemoteAgentReference ref-a2a-support-agent preserves card_url and resolved endpoint. After SendMessage succeeds, the resolution chain points to AgentActor actor-remote-support-01 and ExternalServiceActor records the remote service boundary; local AgentActor actor-local-router-01 initiates the call without impersonating the remote actor.
      ja: GET /.well-known/agent.json が support-agent の Agent Card を返し、RemoteAgentReference ref-a2a-support-agent が card_url と resolved endpoint を保持。SendMessage 成功後、解決連鎖は AgentActor actor-remote-support-01 を指し ExternalServiceActor が remote service 境界を記録。local AgentActor actor-local-router-01 が呼出を開始しますが遠隔主体になりすましません。
