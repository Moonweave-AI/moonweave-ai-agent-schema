  - id: claim-runtime-actors-openai-assistants
    source: src-openai-assistants
    supports: OpenAI Assistants API exposes assistant identity, model field, and tools array that map to AgentActor, Model, and ToolServiceActor runtime roles when a run actually occurs.
    locator: API reference > Assistant object > model and tools
    evidence_kind: primary-api
    confidence: high
  - id: claim-runtime-actors-langgraph-executor
    source: src-langgraph
    supports: LangGraph node invocation via compiled executors and runnable config can carry actor and model identifiers mappable to AgentActor and Model use facts.
    locator: Graph API > invoke > configurable metadata
    evidence_kind: primary-doc
    confidence: high
  - id: claim-runtime-actors-crewai
    source: src-crewai
    supports: CrewAI Agent.role, Agent.llm, and Agent.tools bind runtime responsibilities and model/tool use at crew.kickoff without conflating configuration with post-hoc occurrence.
    locator: Agents > role, llm, tools
    evidence_kind: primary-doc
    confidence: medium
  - id: claim-runtime-actors-a2a
    source: src-a2a
    supports: A2A Agent Card at /.well-known/agent.json and SendMessage endpoint provide verifiable remote agent discovery and resolution without impersonating the remote AgentActor.
    locator: Specification > Agent Card > SendMessage
    evidence_kind: primary-spec
    confidence: high
  - id: claim-runtime-actors-design
    source: src-runtime-actors-design
    supports: Moonweave assigns Actor, RuntimeRole, Model, ActorBinding, and RemoteAgentReference to runtime-actors while CoordinationRole, Delegation, and AuthorizationGrant remain in orchestration and safety domains.
    locator: Runtime actors module boundary
    evidence_kind: design-inference
    confidence: high
