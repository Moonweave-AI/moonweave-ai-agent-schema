  overlap_checks:
    - other_module_id: orchestration-actors-delegation
      semantic_area:
        zh: 规范 Actor、角色定义与角色绑定
        en: Canonical Actor, role definition, and role binding
        ja: 正規 Actor・役割定義・役割束縛
      candidate_concept_ids:
        - CoordinationOwnershipRecord
        - Orchestrator
      overlap_reason:
        zh: 同一人或软件可在不同任务承担不同角色；Actor 标识持久主体，CoordinationRole 标识可复用责任定义，ActorRoleBinding 标识某主体在某范围和时段承担该责任。 本条只比较 CoordinationOwnershipRecord、Orchestrator，其 canonical owner 为 orchestration-actors-delegation。
        en: "The same person or software may bear different roles across tasks: Actor identifies the persistent participant, CoordinationRole the reusable responsibility definition, and ActorRoleBinding the participant's scoped, time-bounded assumption of that responsibility. This record compares only CoordinationOwnershipRecord, Orchestrator; their canonical owner is orchestration-actors-delegation."
        ja: 同じ人・ソフトウェアが task ごとに別役割を担えます。Actor は持続主体、CoordinationRole は再利用可能な責任定義、ActorRoleBinding は主体が範囲と期間内で責任を担う記録です。 この記録は CoordinationOwnershipRecord、Orchestrator だけを比較し、canonical owner は orchestration-actors-delegation です。
      disambiguation_test:
        zh: 问“谁”并由 actor_id 持续识别则归本模块的 Actor；问“什么职责”且可被多人复用则归 orchestration 的角色定义；问“谁在何时何范围承担该职责”则归本模块的 ActorRoleBinding。
        en: If the question is who and identity persists by actor_id, use Actor here; if it is which reusable responsibility, use the orchestration role definition; if it is who bears that responsibility when and where, use ActorRoleBinding here.
        ja: 「誰」で actor_id が持続するなら本モジュールの Actor、「どの再利用可能責任」なら orchestration の役割定義、「誰がいつどの範囲で担うか」なら本モジュールの ActorRoleBinding です。
      result: distinct
      owner_module_id: orchestration-actors-delegation
      source_claims:
        - claim-runtime-actors-042
        - claim-runtime-actors-043
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 若更换任务或团队后身份仍由 actor id 和运行绑定保持，则归运行参与者；若身份随职责范围变化，则归协同角色。
              en: If identity persists by actor ID and runtime binding after changing task or team, it belongs to runtime participants; if identity changes with responsibility scope, it belongs to coordination roles.
              ja: タスクやチームを替えても actor id と実行バインディングで同一性が保たれるなら実行参加者、責務範囲で変わるなら協調ロールに属します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 若更换任务或团队后身份仍由 actor id 和运行绑定保持，则归运行参与者；若身份随职责范围变化，则归协同角色。
              en: If identity persists by actor ID and runtime binding after changing task or team, it belongs to runtime participants; if identity changes with responsibility scope, it belongs to coordination roles.
              ja: タスクやチームを替えても actor id と実行バインディングで同一性が保たれるなら実行参加者、責務範囲で変わるなら協調ロールに属します。
