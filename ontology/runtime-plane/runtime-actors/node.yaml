review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O、OpenAI Agents SDK、Wooldridge 主体模型逐项核验，Actor 层次与绑定语义成立。
    en: Verified against PROV-O, OpenAI Agents SDK, and Wooldridge agency. Actor hierarchy and binding semantics hold.
    ja: PROV-O、OpenAI Agents SDK、Wooldridge agency に照らし Actor hierarchy と binding semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-runtime-actors-001
    source: eng-fw-langgraph-docs
    supports: LangGraph documents durable execution, human participation, subgraph workers, and persisted run state, which demonstrates that participant identity and execution context must remain distinguishable. It does not define Moonweave Actor, RuntimeRole, Model, ActorBinding, or RemoteAgentReference; the five-branch ownership boundary is a Moonweave design decision grounded in those operational distinctions.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-002
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK distinguishes configured Agents, selected models, callable tools or MCP services, human intervention, run context, and persisted sessions as different runtime surfaces. Moonweave uses those distinctions to organize Actor, RuntimeRole, Model, ActorBinding, and RemoteAgentReference as five non-interchangeable branches; the exact role and binding semantics remain Moonweave ontology decisions.
    locator: Intro > Why use the Agents SDK; Agents > Basic configuration; Models; Tools; Human-in-the-loop; Sessions > Overview
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-003
    source: eng-fw-langgraph-docs
    supports: LangGraph persists thread-scoped state and records tasks and interrupts within that execution lineage. It does not identify every Moonweave Actor that participated, define ActorBinding, or establish a model invocation. Moonweave therefore requires explicit participation, effective binding, and model-use facts for the three independent conclusions in this case.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-004
    source: eng-fw-openai-python-docs
    supports: OpenAI Runner executes a configured Agent, passes RunContextWrapper to agents, tools, and handoffs, and can use a Session to maintain conversation history. Those surfaces distinguish configured actors, run-local dependencies, and persisted conversation state, but they do not prove that every referenced actor participated or define ActorBinding. Moonweave therefore requires explicit participates_in_session evidence and time-valid bindings for this CQ.
    locator: Agents > Context; Running agents > Conversations/chat threads > Sessions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-005
    source: eng-fw-langgraph-docs
    supports: "LangGraph's thread lineage can retain state even when a named participant never executed the selected session interval. That documented persistence boundary supports this negative case: textual presence or stored configuration cannot replace Moonweave participation, binding-validity, and model-invocation evidence."
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-006
    source: eng-ont-prov-o
    supports: W3C PROV-O separates the Agent from the Role supplied through a qualified association. The example applies that boundary by preserving actor-17 and representing ReviewerRole through the scoped ActorRoleBinding rather than by reclassifying the person.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-007
    source: eng-fw-openai-python-docs
    supports: OpenAI keeps Agent configuration distinct from context-dependent instructions, manager-style delegation, and handoff behavior. That distinction supports treating an actor's identity separately from a responsibility borne in one task or session. The SDK does not define ActorRoleBinding, validity intervals, or Moonweave's role-qualified HumanActor views; those are explicit ontology design decisions.
    locator: Agents > Basic configuration; Dynamic instructions; Multi-agent system design patterns
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-008
    source: eng-ont-prov-o
    supports: W3C PROV-O requires a qualified association to connect an Agent with a Role; a role word appearing in unrelated text is not such an association. Moonweave therefore rejects the actor-18 inference because no ActorRoleBinding, scope, or validity is present.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-009
    source: eng-api-openai-embeddings
    supports: OpenAI's embeddings API requires model and input values and returns vector data with the model identity. The example reifies that request-response occurrence as embedding-run-17 and preserves the actor, model snapshot, input Chunk, and output EmbeddingVector as distinct auditable objects.
    locator: OpenAI Embeddings guide > Create embeddings > request model and input; response data and model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-010
    source: eng-fw-openai-python-docs
    supports: OpenAI Agent configuration selects a model, while the Models guide separates model names, providers, and per-run model settings and RunResult exposes the responses produced during execution. This supports separating a configured model from evidence about the model actually used. Moonweave additionally requires the exact run, input, version, and output provenance before asserting generation, embedding, or reranking relations.
    locator: Agents > Basic configuration > model and model_settings; Models > Model configuration; Results > RunResult > raw_responses
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-011
    source: eng-api-openai-embeddings
    supports: OpenAI's embeddings interface makes the model selection part of an individual request and returns the resolved model with the result. A family name in configuration without a matching run response is therefore insufficient to establish the exact model snapshot used by embedding-run-18.
    locator: OpenAI Embeddings guide > Create embeddings > request model and response model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-012
    source: eng-fw-langgraph-docs
    supports: LangGraph persists thread-scoped state and records tasks and interrupts within that execution lineage. It does not identify every Moonweave Actor that participated, define ActorBinding, or establish a model invocation. Moonweave therefore treats thread continuity only as session context and requires explicit participation, effective binding, and model-use facts for the three separate parts of this question.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-013
    source: eng-ont-prov-o
    supports: W3C PROV-O represents an Agent's role through a qualified association and prov:hadRole, keeping the Agent distinct from the Role it bears. Moonweave applies that identity boundary to ActorRoleBinding and adds task/session scope, validity, and provenance as explicit local audit requirements.
    locator: W3C PROV-O Recommendation §3.2 > qualifiedAssociation and hadRole
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-014
    source: eng-fw-openai-python-docs
    supports: OpenAI keeps Agent configuration distinct from context-dependent instructions, manager-style delegation, handoff behavior, and human approval decisions. This supports separating a participant's stable identity from a responsibility borne in one run context; ActorRoleBinding and its validity interval remain explicit Moonweave ontology decisions.
    locator: Agents > Basic configuration; Dynamic instructions; Multi-agent system design patterns
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-actors-015
    source: eng-api-openai-embeddings
    supports: OpenAI's embeddings API requires a model and input and returns vector data together with the resolved model identity. That supports retaining model, request input, and output vector as separately inspectable evidence; Moonweave additionally reifies the EmbeddingRun and requires its edges to those objects.
    locator: OpenAI Embeddings guide > Create embeddings > request model and input; response data and model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
