  competency_questions:
    - id: runtime-artifacts-cq-provenance-v3
      semantic_key: runtime-artifacts.provenance
      primary_owner_module_id: runtime-artifacts
      related_module_ids:
        - runtime-execution-attempts
        - runtime-observability
      questions:
        zh: 某个不可变产物版本由哪次执行尝试生成、实际读取了哪些输入、直接派生自哪些前驱，哪个追踪事件记录了这次生成？
        en: Which RunAttempt generated an immutable artifact revision, which inputs did it actually consume, which direct predecessors was it derived from, and which TraceEvent recorded the generation?
        ja: 不変 artifact revision を生成した RunAttempt、実消費した input、直接 derivation predecessor、生成を記録した TraceEvent は何ですか。
      query: Resolve Artifact by artifact_id, version, and content_digest; traverse generated_by, inverse consumes, direct derived_from, and records_generated_artifact while rejecting cycles and unkeyed filename mentions.
      expected_assertion: Each runtime Artifact revision has exactly one generating RunAttempt, zero or more evidenced input revisions, an acyclic direct-derivation lineage, and only keyed observation records.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Artifact
        related_concept_ids:
          - RunAttempt
          - TraceEvent
        relation_ids:
          - Artifact-generated_by-RunAttempt
          - RunAttempt-consumes-Artifact
          - TraceEvent-records_generated_artifact-Artifact
        not_applicable_reason: null
      positive_example_ids:
        - runtime-artifacts-cq-provenance-v3-example-positive
      counterexample_ids:
        - runtime-artifacts-cq-provenance-v3-example-counter
      source_claims:
        - claim-runtime-artifacts-001
        - claim-runtime-artifacts-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐条核实生成、使用、派生与观测记录四类事实，禁止由文件名补推缺失谱系。
              en: Manually verified generation, usage, derivation, and observation as four distinct facts; filename inference cannot fill missing lineage.
              ja: generation・usage・derivation・observation の四事実を個別確認し、file 名から欠落 lineage を補推しません。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
