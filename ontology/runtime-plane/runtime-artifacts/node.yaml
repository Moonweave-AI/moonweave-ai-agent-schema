    - id: runtime-artifacts-cq-version-identity-v3
      semantic_key: runtime-artifacts.version-identity
      primary_owner_module_id: runtime-artifacts
      related_module_ids:
        - runtime-execution-attempts
      questions:
        zh: 两个记录是同一不可变版本、同一逻辑产物的不同版本，还是两个独立产物；哪些标识、摘要和派生证据决定结论？
        en: Are two records the same immutable revision, different revisions of one logical artifact, or separate artifacts, and which identifiers, digests, and derivation evidence decide?
        ja: 二記録は同一不変 revision、同一 logical artifact の別 revision、別成果物のどれで、どの identifier・digest・derivation evidence が判断しますか。
      query: Compare artifact_id, version, content_digest, semantic subtype, direct derivation, and the RunAttempt that generated each revision; treat filename, URI, and display label only as locators or presentation metadata.
      expected_assertion: Same revision requires the same artifact_id, version, and digest; a new version retains artifact_id but changes version or digest and records its derivation or generating RunAttempt; a separate artifact has a distinct logical identity.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Artifact
        related_concept_ids:
          - RunAttempt
        relation_ids:
