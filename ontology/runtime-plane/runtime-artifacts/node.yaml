              zh: 确认治理状态是字段值，审查发生和 finding 是独立事实，不以状态词制造伪子类。
              en: Confirmed governance state is a field value and review occurrence/finding are separate facts; status words do not create pseudo-subclasses.
              ja: governance 状態は field value、review occurrence/finding は別事実であり status 語から pseudo-subclass を作らないと確認しました。
