            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐端点复核确认 SchemaProjectionRun 是生成活动而不是持久产物。
              en: Endpoint-by-endpoint review confirms that SchemaProjectionRun is a generation activity rather than a persistent artifact.
              ja: endpoint ごとの審査により SchemaProjectionRun は永続 artifact ではなく生成 activity と確認しました。
    - other_module_id: adapter-schema-export
      subject_concept_ids:
        - SchemaArtifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
        zh: SchemaArtifact 以 artifact_id、不可变版本、内容摘要与来源谱系保持独立身份，归运行产物模块；由投影活动生成不改变其 owner。
        en: SchemaArtifact retains independent identity through artifact_id, immutable version, content digest, and provenance lineage and belongs to runtime artifacts; generation by a projection activity does not change its owner.
        ja: SchemaArtifact は artifact_id・不変 version・content digest・provenance lineage で独立同一性を保ち runtime artifacts に属します。projection activity による生成で owner は変わりません。
