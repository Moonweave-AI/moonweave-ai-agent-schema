  key_notion:
    zh: 运行产物
    en: runtime artifact
    ja: 実行成果物
  owns_when:
    zh: 当对象能以 artifact_id、精确版本和内容摘要独立寻址，并在生成或消费活动结束后仍作为同一内容实体存在时，由本模块定义。
    en: This module defines an object when it is independently addressable by artifact ID, exact revision, and content digest and remains the same content entity after the producing or consuming activity ends.
    ja: artifact_id・正確な revision・content digest で独立に参照でき、生成または消費活動の終了後も同じ内容 entity として残る対象を本モジュールで定義します。
  references_when:
    zh: 生成、消费、观测、存储、披露或审查产物时，只引用相应活动、位置、事件和判断；这些关系不会把执行、来源或审查对象变成 Artifact 子类。
    en: When an artifact is generated, consumed, observed, stored, disclosed, or reviewed, the corresponding activity, location, event, or judgment is referenced; those relations do not turn execution, source, or review objects into Artifact subtypes.
    ja: artifact の生成・消費・観測・保存・開示・審査では対応する activity・location・event・judgment だけを参照し、それらの関係によって execution・source・review object を Artifact subtype にしません。
