            decision_note:
              zh: 本体复核逐边计算反馈 owner 端点并完整投影五条 accepted 关系，移除两条旧非 accepted 捷径。
              en: Ontology review computes feedback-owner endpoints edge by edge, projects all five accepted relations, and removes the two retired non-accepted shortcuts.
              ja: 本体審査は辺ごとに feedback-owner endpoint を算出して五つの承認済み関係を完全投影し、二つの旧非 accepted shortcut を除外しました。
    - other_module_id: feedback-review-optimization
      subject_concept_ids:
        - Artifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
        zh: 五条 accepted 跨边在运行产物侧共享唯一端点 Artifact。它可以被审查、修改、作为 finding 对象，并充当 ReviewEvidenceArtifact 或 RevisionArtifact 的上位类；这些事实不转移其版本、摘要和来源身份。
        en: All five accepted cross-boundary edges share the sole runtime-artifact endpoint Artifact. It may be reviewed, modified, addressed by a finding, and serve as the parent of ReviewEvidenceArtifact or RevisionArtifact without transferring version, digest, or provenance identity.
        ja: 五つの承認済み境界辺は runtime artifact 側で唯一 Artifact を共有します。review・modify・finding 対象となり ReviewEvidenceArtifact・RevisionArtifact の親になっても version・digest・provenance identity は移転しません。
      relation_ids:
