        zh: SchemaProjectionRun 的身份由目标格式、投影配置与一次导出活动确定，归模式导出模块；运行产物模块只在生成事实中引用该活动。
        en: SchemaProjectionRun identity is fixed by target format, projection profile, and one export activity and therefore belongs to schema export; runtime artifacts reference that activity only in the generation fact.
        ja: SchemaProjectionRun の同一性は target format・projection profile・一回の export activity で定まり schema export に属します。runtime artifacts は生成事実でその activity を参照するだけです。
