source_claims:
  - id: claim-runtime-artifacts-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Entity identity from generation, usage, derivation, attribution, and provenance records; Moonweave specializes those roles for immutable Artifact revisions and RunAttempt activities.
    locator: W3C Recommendation > 搂5.2 prov:Entity and 搂5.3 generation, usage, derivation, attribution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-002
    source: eng-proto-a2a-spec
    supports: A2A defines Artifact as task output composed of typed Parts; Moonweave generalizes that operational content identity beyond one protocol while preserving independent artifact metadata.
    locator: Specification > Task object > artifacts and Artifact object > parts
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-003
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines algorithm-qualified digests over content and representations; Moonweave uses a digest to verify an immutable Artifact revision independently of its filename or location.
    locator: RFC 9530 > 搂2 Content-Digest and 搂3 Repr-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-004
    source: eng-ont-owl
    supports: OWL 2 distinguishes class membership from property values; Moonweave therefore represents a mutable governance state as data on an Artifact revision rather than inventing status-named subclasses.
    locator: W3C Recommendation > 搂2.1 Classes, Properties, and Individuals
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-005
    source: eng-val-jsonschema-spec
    supports: JSON Schema resources have identifiers and dialects independent of any one retrieval location.
    locator: JSON Schema Core > schema resource identifiers and dialects
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-006
    source: eng-ont-prov-o
    supports: PROV-O distinguishes a time-bounded Activity from the Entity it generates. Moonweave applies that distinction to SchemaProjectionRun and SchemaArtifact; module ownership and the specialized edge are design inferences.
    locator: W3C Recommendation > 搂5.2 prov:Entity and 搂5.3 generation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-007
    source: eng-ont-prov-o
    supports: PROV-O keeps a generated Entity distinct from the Activity that generated it. Moonweave specializes that separation for a versioned SchemaArtifact and its SchemaProjectionRun.
    locator: W3C Recommendation > 搂5.2 prov:Entity and 搂5.3 generation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-008
    source: eng-proto-mcp-spec
    supports: MCP distinguishes protocol result content from server resources and artifacts that may underlie it. Moonweave uses that premise to separate audience-facing disclosure identity from persistent artifact identity.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-runtime-artifacts-009
    source: eng-ont-prov-o
    supports: PROV-O gives Entities identity and lineage independently of any later presentation. Moonweave applies that distinction to ExportArtifact and ReportArtifact while leaving audience disclosure to its own module.
    locator: W3C Recommendation > 搂5.2 prov:Entity and provenance relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-010
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Plans, Activities, Entities, and structured collections. Moonweave uses those distinctions to keep composition-specific input and output roles separate from generic artifact identity.
    locator: "PROV-O Recommendation 搂搂3.1-3.2: Entity, Activity, Plan, Collection, usage, generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-011
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Entity's identity and provenance from the role it may play in a particular Activity. Moonweave therefore keeps generic Artifact ownership separate from composition-specific roles.
    locator: "PROV-O Recommendation 搂搂3.1-3.2: Entity, Activity, usage, generation"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-artifacts-012
    source: eng-val-jsonschema-spec
    supports: A schema resource's identifier and dialect are distinct from retrieval location.
    locator: JSON Schema Core > $id and $schema
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
