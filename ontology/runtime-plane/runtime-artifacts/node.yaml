    - other_module_id: feedback-review-optimization
      subject_concept_ids:
        - CorrectionActivity
        - ReviewActivity
        - ReviewEvidenceArtifact
        - ReviewFinding
        - RevisionArtifact
      decision: references
      owner_module_id: feedback-review-optimization
      rationale:
        zh: 五条 accepted 跨边覆盖审查发生、纠正发生、原子发现以及两类审查产物下位类。反馈侧精确端点是 CorrectionActivity、ReviewActivity、ReviewEvidenceArtifact、ReviewFinding、RevisionArtifact；抽象 Correction 和旧捷径关系均已排除。
        en: Five accepted cross-boundary edges cover review occurrence, correction occurrence, atomic finding, and two review-artifact subtypes. Exact feedback-side endpoints are CorrectionActivity, ReviewActivity, ReviewEvidenceArtifact, ReviewFinding, and RevisionArtifact; abstract Correction and retired shortcut relations are excluded.
        ja: 五つの承認済み境界辺は review occurrence・correction occurrence・atomic finding・二つの review artifact subtype を扱います。feedback 側の正確な endpoint は CorrectionActivity・ReviewActivity・ReviewEvidenceArtifact・ReviewFinding・RevisionArtifact で、抽象 Correction と旧 shortcut は除外します。
