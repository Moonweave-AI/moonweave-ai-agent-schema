schema: moonweave.ai/ontology-node/v1
id: runtime-artifacts
kind: module
labels:
  zh: 运行产物
  en: Runtime artifacts
  ja: 実行成果物
semantics:
  short_definition:
    zh: 运行产物模块为执行期间读取或生成的工作产品赋予稳定标识、不可变版本与内容摘要，使其在运行结束后仍可被精确引用。
    en: The runtime-artifacts module assigns stable identity, immutable revision, and content digest to work products read or generated during execution so they remain precisely referable after the run ends.
    ja: runtime-artifacts モジュールは実行中に読み書きされた work product に安定 identity・不変 revision・content digest を与え、実行終了後も正確に参照可能にします。
  definition:
    zh: 本模块以 Artifact 为根，按内容功能区分 PatchArtifact、ReportArtifact、GraphArtifact、SchemaArtifact（含 JSONSchemaArtifact、SHACLShapesArtifact、RDFSchemaArtifact）与 ExportArtifact。Artifact 身份由 artifact_id、精确 version 与 content_digest 共同确定；路径、文件名或 draft/final 治理状态不能代替版本身份。Artifact-generated_by-RunAttempt 与 Artifact-derived_from-Artifact 记录生成与派生谱系；A2A Artifact parts、OpenAI file outputs 与 git patch 均可映射为本模块形状。Execution、RunAttempt 与 TraceEvent 分别归 execution 与 observability 模块。
    en: "This module roots at Artifact and distinguishes PatchArtifact, ReportArtifact, GraphArtifact, SchemaArtifact (including JSONSchemaArtifact, SHACLShapesArtifact, RDFSchemaArtifact), and ExportArtifact by content function. Artifact identity is jointly determined by artifact_id, exact version, and content_digest; path, filename, or draft/final governance state cannot replace revision identity. Artifact-generated_by-RunAttempt and Artifact-derived_from-Artifact record generation and derivation lineage. A2A Artifact parts, OpenAI file outputs, and git patches are mappable shapes. Execution, RunAttempt, and TraceEvent belong to execution and observability modules."
    ja: 本モジュールは Artifact を root とし PatchArtifact・ReportArtifact・GraphArtifact・SchemaArtifact・ExportArtifact を内容機能で区別します。identity は artifact_id・正確 version・content_digest の組合せで決まり path/ファイル名/governance 状態は revision identity を代替できません。A2A Artifact parts、OpenAI file output、git patch を写像可能です。Execution・RunAttempt・TraceEvent は各 sibling モジュールに属します。
  why_needed:
    zh: 没有这一模块，输入、输出与后续派生只能依赖易变路径或展示名称，无法回答“哪次尝试生成了哪一版精确内容”或“两个同名文件是否为同一产物版本”。
    en: Without this module, inputs, outputs, and derivations rely on mutable paths or display names and cannot answer which attempt generated which exact content revision or whether two same-named files are the same artifact version.
    ja: このモジュールがなければ入出力/derivation が可変 path や表示名に依存し、どの attempt がどの正確 content revision を生成したか、同名 file が同一 artifact version か答えられません。
  includes:
    - zh: Artifact 的逻辑标识、不可变 version、content_digest、media_type 与内容级谱系。
      en: Artifact logical identity, immutable version, content_digest, media_type, and content-level lineage.
      ja: Artifact の logical identity・不変 version・content_digest・media_type・content-level lineage。
    - zh: 按内容功能定义的补丁、报告、图、模式与导出产物及经语言约束核验的模式子型。
      en: Patch, report, graph, schema, and export artifacts defined by content function plus schema subtypes verified against language constraints.
      ja: 内容機能で定義される patch/report/graph/schema/export artifact と言語制約検証済み schema subtype。
  excludes:
    - zh: "Execution、RunAttempt（owner: runtime-execution-attempts）；它们是发生事实，不是持久内容实体。"
      en: "Execution, RunAttempt (owner: runtime-execution-attempts); occurrences, not persistent content entities."
      ja: "Execution・RunAttempt（owner: runtime-execution-attempts）。発生 fact であり persistent content entity ではありません。"
    - zh: "TraceEvent、AgentTranscript（owner: runtime-observability）；只记录对产物的观测，不决定产物身份。"
      en: "TraceEvent, AgentTranscript (owner: runtime-observability); they record observations about artifacts without determining artifact identity."
      ja: "TraceEvent・AgentTranscript（owner: runtime-observability）。artifact 観測を記録するだけで identity を決めません。"
    - zh: "DraftArtifact、FinalArtifact 等状态伪类；governance_state 是字段值，不是子类型。"
      en: "Status pseudo-classes such as DraftArtifact or FinalArtifact; governance_state is a field value, not a subtype."
      ja: "DraftArtifact/FinalArtifact 等 status 擬似型。governance_state は field 値であり subtype ではありません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 A2A Task artifacts（typed Parts 与 artifact_id）、OpenAI Assistants file outputs 与 code_interpreter 生成文件（file_id + content hash）、git unified diff patch（patch artifact 与 derived_from 前驱）、JSON Schema / SHACL / RDF Schema 文档（SchemaArtifact 子型需语言约束核验），以及 LangGraph / Cursor 运行导出的 report JSON。静态仓库路径属于存储域；RunAttempt 实际 materialize 内容版本并产生 digest 才是 Artifact occurrence。
    en: "Integrations should map A2A Task artifacts (typed Parts and artifact_id), OpenAI Assistants file outputs and code_interpreter generated files (file_id plus content hash), git unified diff patches (patch artifact with derived_from predecessor), JSON Schema / SHACL / RDF Schema documents (SchemaArtifact subtypes requiring language constraint verification), and report JSON exported from LangGraph or Cursor runs separately. Static repository paths belong to storage; Artifact occurrence requires a RunAttempt actually materializing a content revision with digest."
    ja: 統合では A2A Task artifact、OpenAI file output、git unified diff patch、JSON Schema/SHACL/RDF Schema document、LangGraph/Cursor export report JSON を個別に写像します。静的 repo path は storage 域、RunAttempt が content revision を materialize し digest を生成することが Artifact occurrence です。
  typical_input:
    - description: A2A Task artifact with typed parts and artifact metadata.
      format: |
        {
          "id": "task-884",
          "status": {"state": "completed"},
          "artifacts": [{
            "artifactId": "report-release",
            "parts": [
              {"kind": "text", "text": "{\"version\": 2, \"summary\": \"...\"}"}
            ]
          }]
        }
      source_claims: [claim-runtime-artifacts-a2a]
    - description: OpenAI Assistants run producing file output from code interpreter.
      format: |
        GET https://api.openai.com/v1/threads/thread_abc123/runs/run_xyz
        {
          "id": "run_xyz",
          "status": "completed",
          "file_ids": ["file-abc123"]
        }

        GET https://api.openai.com/v1/files/file-abc123/content
        => CSV bytes hashed as sha256:report2
      source_claims: [claim-runtime-artifacts-openai-files]
    - description: Git unified diff as PatchArtifact input.
      format: |
        diff --git a/ontology/runtime-plane/node.yaml b/ontology/runtime-plane/node.yaml
        --- a/ontology/runtime-plane/node.yaml
        +++ b/ontology/runtime-plane/node.yaml
        @@ -1,3 +1,5 @@
         schema: moonweave.ai/ontology-node/v1
        +id: runtime-plane
        +kind: domain
      source_claims: [claim-runtime-artifacts-git-patch]
    - description: JSON Schema document verified as JSONSchemaArtifact.
      format: |
        {
          "$schema": "https://json-schema.org/draft/2020-12/schema",
          "$id": "https://moonweave.ai/schemas/artifact/v1",
          "type": "object",
          "properties": {
            "artifact_id": {"type": "string"},
            "version": {"type": "string"},
            "content_digest": {"type": "string"}
          },
          "required": ["artifact_id", "version", "content_digest"]
        }
      source_claims: [claim-runtime-artifacts-jsonschema]
  typical_output:
    - description: Moonweave-local artifact projection with immutable revision, digest, and provenance without filename-only identity.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "artifact_id": "report-release",
          "version": "2",
          "content_digest": "sha256:report2",
          "media_type": "application/json",
          "semantic_type": "ReportArtifact",
          "generated_by_attempt_ref": "attempt-601",
          "derived_from_refs": ["report-release@1"]
        }
      source_claims: [claim-runtime-artifacts-design]
  reference_implementations:
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task artifacts with artifactId and typed Parts.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: File outputs from assistant runs and code interpreter.
    - name: RFC 9530
      url: https://www.rfc-editor.org/rfc/rfc9530.html
      description: Content-Digest fields for immutable revision verification.
    - name: JSON Schema
      url: https://json-schema.org/draft/2020-12/json-schema-core.html
      description: Schema resource identifiers independent of retrieval location.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 运行产物模块的稳定标识，不是某个 artifact_id。
        en: Stable identifier of the runtime-artifacts module, not an artifact_id.
        ja: runtime-artifacts モジュールの安定識別子であり、artifact_id ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^runtime-artifacts$'
      example_value: runtime-artifacts
      allowed_values: []
      source_claims: [claim-runtime-artifacts-design]
    - id: artifact_id
      labels: {zh: 产物逻辑标识, en: Artifact logical identifier, ja: 成果物論理識別子}
      definitions:
        zh: 跨版本稳定的 Artifact 逻辑标识；与 version、content_digest 联用才能唯一定位不可变 revision。
        en: Stable logical Artifact identifier across revisions; must pair with version and content_digest to uniquely locate an immutable revision.
        ja: 版を跨いで安定する Artifact logical id。version・content_digest と組み合わせて不変 revision を一意特定します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: report-release
      allowed_values: []
      source_claims: [claim-runtime-artifacts-design]
    - id: version
      labels: {zh: 版本, en: Version, ja: バージョン}
      definitions:
        zh: artifact_id 范围内的精确不可变版本号；内容变化必须产生新 version 或新 digest。
        en: Exact immutable version number within artifact_id scope; content change must produce a new version or digest.
        ja: artifact_id スコープ内の正確な不変 version。内容変更は新 version または digest を生む必要があります。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2"
      allowed_values: []
      source_claims: [claim-runtime-artifacts-design]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: コンテンツダイジェスト}
      definitions:
        zh: 算法限定的内容摘要（如 sha256:...），用于验证不可变 revision 独立于文件名或路径。
        en: Algorithm-qualified content digest (e.g., sha256:...) verifying immutable revision independently of filename or path.
        ja: sha256:... 等 algorithm-qualified digest。ファイル名/path とは独立に不変 revision を検証します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: sha256:report2
      allowed_values: []
      source_claims: [claim-runtime-artifacts-rfc9530]
  constraints:
    - id: artifact-identity-requires-id-version-digest
      severity: error
      expression_language: plain
      expression: An Artifact revision must be addressable by artifact_id, version, and content_digest together; filename, URI, or display label alone is insufficient for identity or merge decisions.
      explanation:
        zh: 文件名与路径只能定位存储，不能决定产物版本身份。
        en: Filenames and paths locate storage but do not determine artifact revision identity.
        ja: ファイル名/path は storage を位置づけるだけで artifact revision identity を決めません。
      source_claims: [claim-runtime-artifacts-design, claim-runtime-artifacts-rfc9530]
    - id: artifact-derivation-acyclic
      severity: error
      expression_language: plain
      expression: Artifact-derived_from-Artifact direct derivation edges must form an acyclic graph within one artifact_id lineage; mutual derivation claims must be rejected.
      explanation:
        zh: 循环派生违反时间与生成依赖。
        en: Cyclic derivation violates temporal and generative dependency.
        ja: 循環 derivation は時間・生成依存に違反します。
      source_claims: [claim-runtime-artifacts-design]
    - id: governance-state-not-subtype
      severity: warning
      expression_language: plain
      expression: governance_state values such as draft, under-review, or final must remain field values on an Artifact revision; status-named subclasses such as DraftArtifact or FinalArtifact must not be asserted.
      explanation:
        zh: 工作流状态变化不改变内容种差，不能制造伪子类。
        en: Workflow state changes do not alter content differentia and must not create pseudo-subclasses.
        ja: workflow 状態変更は content 種差を変えず pseudo-subclass を作ってはなりません。
      source_claims: [claim-runtime-artifacts-design]
  required_relations:
    - id: runtime-artifacts-organizes-artifact
      direction: outgoing
      predicate: organizes
      target_concept_id: Artifact
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 Artifact 内容子型 is_a 链（Artifact→ReportArtifact 等）。
        en: The module organizes at least one Artifact content subtype is_a chain (Artifact→ReportArtifact, etc.).
        ja: モジュールは少なくとも一つの Artifact content subtype is_a 連鎖（Artifact→ReportArtifact 等）を組織します。
      source_claims: [claim-runtime-artifacts-design]
examples:
  - id: runtime-artifacts-example-a2a-task-artifact
    labels:
      zh: A2A Task 产物 parts
      en: A2A Task artifact parts
      ja: A2A Task 成果物 parts
    descriptions:
      zh: A2A task-884 completed 返回 artifacts 含 artifactId=report-release；parts 中 JSON 文本 hash 为 sha256:report2。系统物化为 ReportArtifact report-release@2，RunAttempt attempt-601 通过 generated_by 绑定首次 materialize，TraceEvent 可观测但不拥有产物身份。
      en: A2A task-884 completed returns artifacts with artifactId=report-release; JSON text in parts hashes to sha256:report2. The system materializes ReportArtifact report-release@2 with RunAttempt attempt-601 bound via generated_by; TraceEvent may observe but does not own artifact identity.
      ja: A2A task-884 completed が artifactId=report-release の artifact を返し parts 内 JSON text の hash は sha256:report2。ReportArtifact report-release@2 を materialize し RunAttempt attempt-601 が generated_by で束縛。TraceEvent は観測可能ですが artifact identity は所有しません。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
    field_values:
      task_id: task-884
      artifact_id: report-release
      version: "2"
      content_digest: sha256:report2
      semantic_type: ReportArtifact
      media_type: application/json
      run_attempt_ref: attempt-601
    related_node_ids:
      - Artifact
      - ReportArtifact
      - RunAttempt
    related_relation_ids:
      - Artifact-generated_by-RunAttempt
    source_claims:
      - claim-runtime-artifacts-a2a
      - claim-runtime-artifacts-design
  - id: runtime-artifacts-example-openai-file-output
    labels:
      zh: OpenAI code interpreter 文件输出
      en: OpenAI code interpreter file output
      ja: OpenAI code interpreter ファイル出力
    descriptions:
      zh: Assistants run run_xyz 完成并返回 file_ids=[file-abc123]；下载内容 hash 为 sha256:csv-export-7，物化为 ExportArtifact export-logs@1。attempt-openai-file-1 为 generating RunAttempt；file-abc123 是 OpenAI 存储引用，不是 Moonweave artifact_id。
      en: Assistants run run_xyz completes with file_ids=[file-abc123]; downloaded content hashes to sha256:csv-export-7 and materializes as ExportArtifact export-logs@1. attempt-openai-file-1 is the generating RunAttempt; file-abc123 is an OpenAI storage reference, not the Moonweave artifact_id.
      ja: Assistants run run_xyz が file_ids=[file-abc123] で完了。DL 内容 hash は sha256:csv-export-7 で ExportArtifact export-logs@1 として materialize。attempt-openai-file-1 が generating RunAttempt。file-abc123 は OpenAI storage 参照であり Moonweave artifact_id ではありません。
    example_source:
      product: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
    field_values:
      run_id: run_xyz
      openai_file_id: file-abc123
      artifact_id: export-logs
      version: "1"
      content_digest: sha256:csv-export-7
      semantic_type: ExportArtifact
      media_type: text/csv
      run_attempt_ref: attempt-openai-file-1
    related_node_ids:
      - ExportArtifact
      - RunAttempt
    related_relation_ids:
      - Artifact-generated_by-RunAttempt
    source_claims:
      - claim-runtime-artifacts-openai-files
      - claim-runtime-artifacts-design
  - id: runtime-artifacts-example-patch-derived-lineage
    labels:
      zh: Git patch 派生谱系
      en: Git patch derivation lineage
      ja: Git patch 派生 lineage
    descriptions:
      zh: attempt-602 读取 schema-api@4 与 ontology-node@7，生成 PatchArtifact patch-runtime-plane@3（sha256:patch3），derived_from 指向 ontology-node@7；输入 consumes 记录两摘要，派生路径无环。
      en: attempt-602 reads schema-api@4 and ontology-node@7, generates PatchArtifact patch-runtime-plane@3 (sha256:patch3) derived_from ontology-node@7; input consumes records both digests and the derivation path is acyclic.
      ja: attempt-602 が schema-api@4 と ontology-node@7 を読み PatchArtifact patch-runtime-plane@3（sha256:patch3）を生成、derived_from ontology-node@7。input consumes が両 digest を記録し derivation path は acyclic です。
    example_source:
      product: Git unified diff
      url: https://git-scm.com/docs/git-diff
    field_values:
      artifact_id: patch-runtime-plane
      version: "3"
      content_digest: sha256:patch3
      semantic_type: PatchArtifact
      predecessor_ref: ontology-node@7
      input_artifact_refs:
        - schema-api@4
        - ontology-node@7
      run_attempt_ref: attempt-602
    related_node_ids:
      - PatchArtifact
      - RunAttempt
      - Artifact
    related_relation_ids:
      - Artifact-generated_by-RunAttempt
      - Artifact-derived_from-Artifact
      - RunAttempt-consumes-Artifact
    source_claims:
      - claim-runtime-artifacts-git-patch
      - claim-runtime-artifacts-design
  - id: runtime-artifacts-example-jsonschema-artifact
    labels:
      zh: JSON Schema 模式产物
      en: JSON Schema schema artifact
      ja: JSON Schema スキーマ成果物
    descriptions:
      zh: schema-artifact-v1@1 以 $id=https://moonweave.ai/schemas/artifact/v1 通过 JSON Schema 2020-12 校验，分类为 JSONSchemaArtifact（SchemaArtifact 子型）。移动仓库路径不改变 artifact_id/version/digest；ExportArtifact 投影运行另存副本时 derived_from 指向 schema-artifact-v1@1。
      en: schema-artifact-v1@1 with $id=https://moonweave.ai/schemas/artifact/v1 passes JSON Schema 2020-12 validation and classifies as JSONSchemaArtifact (SchemaArtifact subtype). Moving repository path does not change artifact_id, version, or digest; an ExportArtifact projection copy derived_from schema-artifact-v1@1 when saved separately.
      ja: schema-artifact-v1@1（$id=https://moonweave.ai/schemas/artifact/v1）が JSON Schema 2020-12 検証を通過し JSONSchemaArtifact（SchemaArtifact subtype）に分類。repo path 移動は artifact_id/version/digest を変えず、別保存 ExportArtifact は derived_from schema-artifact-v1@1 です。
    example_source:
      product: JSON Schema
      url: https://json-schema.org/draft/2020-12/json-schema-core.html
    field_values:
      artifact_id: schema-artifact-v1
      version: "1"
      content_digest: sha256:schema-artifact-v1
      schema_id: https://moonweave.ai/schemas/artifact/v1
      semantic_type: JSONSchemaArtifact
      json_schema_dialect: https://json-schema.org/draft/2020-12/schema
    related_node_ids:
      - SchemaArtifact
      - JSONSchemaArtifact
      - ExportArtifact
    related_relation_ids:
      - Artifact-derived_from-Artifact
    source_claims:
      - claim-runtime-artifacts-jsonschema
      - claim-runtime-artifacts-design
  - id: runtime-artifacts-example-filename-only-counter
    labels:
      zh: 文件名不能识别产物版本
      en: Filename alone cannot identify artifact revision
      ja: ファイル名だけでは成果物 revision を識別不可
    descriptions:
      zh: trace-602 只写 report.json，无 artifact_id、version 或 digest；数据还声称 report@1 与 report@2 相互 derived_from。必须拒绝生成/派生边并报告缺失不可变版本身份。
      en: trace-602 mentions report.json only without artifact_id, version, or digest, and claims mutual derived_from between report@1 and report@2. Generation and derivation edges must be rejected and missing immutable revision identity reported.
      ja: trace-602 は report.json のみ言及し artifact_id/version/digest がなく report@1 と report@2 の相互 derived_from を主張。generation/derivation 辺を拒否し不変 revision identity 欠落を報告する必要があります。
    example_source:
      product: Moonweave runtime-artifacts boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      mentioned_filename: report.json
      artifact_id: null
      version: null
      content_digest: null
      claimed_cyclic_derivations:
        - report@1 -> report@2
        - report@2 -> report@1
      generating_attempt_ref: null
    related_node_ids:
      - Artifact
      - TraceEvent
    related_relation_ids:
      - Artifact-derived_from-Artifact
      - TraceEvent-records_generated_artifact-Artifact
    source_claims:
      - claim-runtime-artifacts-design
parent_relation: null
relations: []
sources:
  - id: src-a2a-artifacts
    title: Agent2Agent (A2A) Protocol
    publisher: Google
    url: https://a2a-protocol.org/latest/specification/
    version: Task artifacts and Parts checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    why_it_matters: Task artifacts with artifactId and typed Parts as runtime work products.
  - id: src-openai-files
    title: OpenAI Files API
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/files
    version: assistant file outputs checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-doc
    authority: A
    why_it_matters: File outputs from assistant runs materializable as ExportArtifact with content digest.
  - id: src-rfc9530
    title: RFC 9530 HTTP Message Content Digests
    publisher: IETF
    url: https://www.rfc-editor.org/rfc/rfc9530.html
    version: Content-Digest checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    why_it_matters: Algorithm-qualified digests verifying immutable Artifact revisions independent of location.
  - id: src-json-schema
    title: JSON Schema Core 2020-12
    publisher: JSON Schema
    url: https://json-schema.org/draft/2020-12/json-schema-core.html
    version: $id and dialect checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    why_it_matters: Schema resource identifiers independent of retrieval path for JSONSchemaArtifact classification.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    publisher: Moonweave
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    version: module boundary checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: design-inference
