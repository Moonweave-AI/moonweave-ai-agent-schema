        en: What is an artifact revision's current governance state, which review supports it, and did the state transition preserve Artifact type and content identity?
        ja: artifact revision の現在 governance 状態、それを支持する review、状態遷移後も Artifact type と内容同一性が不変かを確認できますか。
      query: Read governance_state on an exact Artifact revision, follow ReviewActivity-reviews-Artifact and review_finding_about_artifact, and verify that no status-named subtype was asserted.
      expected_assertion: Governance state is a controlled value supported by review evidence; it never creates DraftArtifact, ReviewedArtifact, or FinalArtifact subclasses.
