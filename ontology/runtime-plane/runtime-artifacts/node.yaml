              en: If identity keys are artifact_id, version, digest, and content differentia, classify as runtime artifact; if they are event_id, timestamp, event_type, and correlation key, classify as observation.
              ja: identity key が artifact_id・version・digest・content 種差なら runtime artifact、event_id・timestamp・event_type・correlation key なら observation です。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 若身份键是 artifact_id、version、digest 与内容种差，则归运行产物；若身份键是 event_id、timestamp、event_type 与 correlation key，则归观测。
              en: If identity keys are artifact_id, version, digest, and content differentia, classify as runtime artifact; if they are event_id, timestamp, event_type, and correlation key, classify as observation.
              ja: identity key が artifact_id・version・digest・content 種差なら runtime artifact、event_id・timestamp・event_type・correlation key なら observation です。
