              en: An object that answers what was observed when, but cannot be independently used as a stable work product, belongs to observability.
              ja: 「いつ何を観測したか」に答え stable work product として独立利用できない対象は observability に属します。
    - other_module_id: runtime-execution-attempts
      semantic_area:
        zh: 执行结果发生与持久产物
        en: Execution-result occurrence versus persistent artifact
        ja: execution result occurrence と persistent artifact
      candidate_concept_ids:
        - ExportArtifact
        - SchemaArtifact
      overlap_reason:
        zh: 一个 RunResult 可引用多个 Artifact，Artifact 也可从前一版本派生并在执行结束后继续评审；产物不是 Result 的状态子类。
        en: One RunResult can reference several Artifacts, and an Artifact can derive from a prior version and remain under review after execution ends; artifacts are not Result status subtypes.
        ja: 一 RunResult は複数 Artifact を参照でき、Artifact は prior version から derive され execution 終了後も review され、Result の status subtype ではありません。
