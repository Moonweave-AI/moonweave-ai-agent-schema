      owner_module_id: info-output-disclosure
      rationale:
        zh: DisclosedOutputSegment 与 DisclosureRecord 由受众、可见范围和披露结果界定，归输出披露模块；它们不是按版本和摘要存在的持久产物。
        en: DisclosedOutputSegment and DisclosureRecord are identified by audience, visible range, and disclosure outcome and belong to output disclosure; they are not persistent artifacts identified by version and digest.
        ja: DisclosedOutputSegment と DisclosureRecord は audience・visible range・disclosure outcome で識別され output disclosure に属し、version・digest で識別する永続 artifact ではありません。
      relation_ids: []
