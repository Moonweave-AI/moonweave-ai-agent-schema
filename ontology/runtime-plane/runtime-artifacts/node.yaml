      semantic_area:
        zh: 运行产物与产物观测记录
        en: Runtime artifacts versus observations about artifacts
        ja: 実行成果物と成果物に関する観測記録
      candidate_concept_ids:
        - ExportArtifact
        - SchemaArtifact
      overlap_reason:
        zh: 两者都可引用文件或摘要，但 Artifact 是被持续引用的结果对象，TraceEvent 只是某时刻创建、读取或修改它的发生记录。
        en: Both may reference files or digests, but Artifact is the persistently referenced result object while TraceEvent is an occurrence that created, read, or changed it at a time.
        ja: どちらもファイルやダイジェストを参照できますが、Artifact は持続参照される結果対象、TraceEvent はある時点の作成・読取・変更の発生記録です。
      disambiguation_test:
        zh: 若离开具体事件时间仍能用 artifact id 和版本引用对象，则归运行产物；若身份依赖 trace context 和发生时刻，则归追踪与检查点。
        en: If the object remains referable by artifact ID and version outside a specific event time, it belongs to runtime artifacts; if identity depends on trace context and occurrence time, it belongs to tracing and checkpoints.
        ja: 具体イベント時刻を離れても artifact id と版で参照できれば実行成果物、同一性が trace context と発生時刻に依存すればトレースとチェックポイントに属します。
