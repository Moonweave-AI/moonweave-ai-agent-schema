            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 被审查、被指出问题或被纠正不会把 Artifact 变成 ReviewFinding 或 Correction；本域继续拥有产物身份、版本与摘要，反馈域拥有审查结论。
              en: Being reviewed, found deficient, or corrected does not turn an Artifact into ReviewFinding or Correction; this domain retains artifact identity, version, and digest while feedback owns review judgments.
              ja: review・finding・correction の対象でも Artifact は ReviewFinding/Correction にならず、本 domain が同一性・version・digest、feedback が判断を所有します。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 被审查、被指出问题或被纠正不会把 Artifact 变成 ReviewFinding 或 Correction；本域继续拥有产物身份、版本与摘要，反馈域拥有审查结论。
              en: Being reviewed, found deficient, or corrected does not turn an Artifact into ReviewFinding or Correction; this domain retains artifact identity, version, and digest while feedback owns review judgments.
              ja: review・finding・correction の対象でも Artifact は ReviewFinding/Correction にならず、本 domain が同一性・version・digest、feedback が判断を所有します。
    - other_module_id: adapter-schema-export
