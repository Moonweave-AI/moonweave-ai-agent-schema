              en: Manual review confirms that artifact_id, version, and digest determine SchemaArtifact existence, not the export profile.
              ja: 手動審査は SchemaArtifact の存在条件が artifact_id・version・digest であり export profile ではないと確認しました。
    - other_module_id: info-output-disclosure
      subject_concept_ids:
        - DisclosedOutputSegment
        - DisclosureRecord
