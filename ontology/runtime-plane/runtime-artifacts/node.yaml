        en: No accepted cross-module fact currently connects output disclosure and runtime artifacts; this row decides the two disclosure endpoints' owner without inventing a disclosure-equals-artifact-generation relation.
        ja: output disclosure と runtime artifacts を結ぶ承認済み cross-module fact は現在ありません。本行は二つの disclosure endpoint の owner だけを判定し、「disclosure＝artifact generation」関係を捏造しません。
      source_claims:
        - claim-runtime-artifacts-008
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐项核实披露片段和披露记录均不满足产物的独立版本身份条件。
              en: Point-by-point review confirms that neither a disclosed segment nor a disclosure record satisfies independent artifact-version identity.
              ja: 個別審査により disclosed segment と disclosure record はいずれも独立 artifact version の同一性条件を満たさないと確認しました。
    - other_module_id: info-output-disclosure
      subject_concept_ids:
        - ExportArtifact
        - ReportArtifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
        zh: ExportArtifact 与 ReportArtifact 以独立 artifact_id、版本、摘要和存储谱系存在，归运行产物模块；它们是否或如何向某一受众披露是另一项事实。
        en: ExportArtifact and ReportArtifact exist through independent artifact_id, version, digest, and storage lineage and belong to runtime artifacts; whether and how they are disclosed to an audience is a separate fact.
        ja: ExportArtifact と ReportArtifact は独立 artifact_id・version・digest・storage lineage で存在し runtime artifacts に属します。特定 audience へどう開示するかは別事実です。
      relation_ids: []
      relation_not_applicable_reason:
        zh: 输出披露与运行产物之间目前没有已接受的跨模块事实；产物可能成为披露输入不等于 canonical 图已接受直接边。
        en: No accepted cross-module fact currently connects output disclosure and runtime artifacts; an artifact being a possible disclosure input does not mean the canonical graph has accepted a direct edge.
        ja: output disclosure と runtime artifacts を結ぶ承認済み cross-module fact は現在ありません。artifact が disclosure input になり得ることは canonical graph が直接辺を承認したことを意味しません。
      source_claims:
        - claim-runtime-artifacts-009
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 人工复核将持久产物身份与一次面向受众的披露决定明确分开。
              en: Manual review explicitly separates persistent artifact identity from one audience-facing disclosure decision.
              ja: 手動審査は永続 artifact identity と一回の audience-facing disclosure decision を明確に分離しました。
    - other_module_id: orchestration-composition
      subject_concept_ids:
        - CompositionArtifact
        - SynthesisInput
        - SynthesisOutput
      decision: references
      owner_module_id: orchestration-composition
      rationale:
        zh: CompositionArtifact、SynthesisInput 与 SynthesisOutput 的身份依赖一次组合或综合过程中的语义角色，归编排组合模块；运行产物模块不把这些角色重新定义为通用产物子类。
        en: CompositionArtifact, SynthesisInput, and SynthesisOutput are identified by their semantic roles in one composition or synthesis process and belong to orchestration composition; runtime artifacts do not redefine those roles as generic artifact subtypes.
        ja: CompositionArtifact・SynthesisInput・SynthesisOutput は一つの composition／synthesis process 内の意味役割で識別され orchestration composition に属します。runtime artifacts はそれらを generic artifact subtype として再定義しません。
      relation_ids: []
      relation_not_applicable_reason:
        zh: 该边界只判定组合角色与通用持久产物的身份差异，当前没有已接受的运行时跨模块传递事实。
        en: This boundary decides the identity difference between composition roles and generic persistent artifacts; no accepted runtime cross-module handoff fact currently exists.
        ja: この境界は composition role と generic persistent artifact の同一性差だけを判定し、現在承認済み runtime cross-module handoff fact はありません。
      source_claims:
        - claim-runtime-artifacts-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐概念核实三个端点都依赖组合语境，不能仅凭名称中的 Artifact 或 Output 移入运行产物树。
              en: Concept-by-concept review confirms that all three endpoints depend on composition context and cannot move into the runtime-artifact tree merely because their names contain Artifact or Output.
              ja: 概念ごとの審査により三 endpoint は composition context に依存し、名称に Artifact／Output があるだけで runtime-artifact tree へ移せないと確認しました。
    - other_module_id: orchestration-composition
      subject_concept_ids:
        - Artifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
        zh: Artifact 的身份由 artifact_id、版本、摘要与谱系决定，独立于任何组合角色，归运行产物模块；组合过程若需引用持久输入或输出，应通过未来经审核的显式事实连接。
        en: Artifact identity is determined by artifact_id, version, digest, and lineage independently of any composition role and belongs to runtime artifacts; a composition that references persistent input or output requires a future reviewed explicit fact.
        ja: Artifact の同一性は composition role と独立に artifact_id・version・digest・lineage で定まり runtime artifacts に属します。composition が永続 input／output を参照する場合は将来の審査済み明示 fact が必要です。
      relation_ids: []
      relation_not_applicable_reason:
        zh: 当前没有已接受的 orchestration-composition—runtime-artifacts 跨模块关系；不能把概念名称相近当作传递边。
        en: There is currently no accepted orchestration-composition-to-runtime-artifacts relation; lexical similarity between concept names is not a handoff edge.
        ja: 現在承認済み orchestration-composition—runtime-artifacts 関係はなく、概念名の類似を handoff edge とみなしません。
      source_claims:
        - claim-runtime-artifacts-011
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 人工复核确认通用 Artifact 的存在条件不依赖一次组合活动或综合阶段。
              en: Manual review confirms that generic Artifact existence does not depend on one composition activity or synthesis stage.
              ja: 手動審査は generic Artifact の存在条件が一回の composition activity や synthesis stage に依存しないと確認しました。
  overlap_checks:
