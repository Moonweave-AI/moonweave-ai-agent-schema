schema: moonweave.ai/ontology-node/v1
id: runtime-artifacts
kind: module
status: accepted
labels: {zh: 运行时工件, en: Runtime artifacts, ja: ランタイム成果物}
semantics:
  short_definition: {zh: 由运行时活动产生、导出或消费的带版本 Entity。, en: "Versioned Entities produced, exported, or consumed by runtime activities.", ja: ランタイム Activity により生成、エクスポート、消費されるバージョン付き Entity。}
  definition: {zh: Runtime artifacts 是持久或可寻址的信息 Entity，例如补丁、报告、图序列化和模式文档。它们可以由 Execution 生成，但不是活动本身、其可变的内存状态或描述该活动的可观测性信号。, en: "Runtime artifacts are durable or addressable information Entities such as patches, reports, graph serializations, and schema documents. They may be generated by an Execution, but they are not the activity, its mutable in-memory state, or an observability signal describing the activity.", ja: Runtime artifacts は、パッチ、レポート、グラフ直列化、スキーマ文書などの耐久的または参照可能な情報 Entity である。Execution により生成され得るが、Activity 自体、その可変なメモリ内状態、Activity を記述する可観測性シグナルではない。}
  why_needed: {zh: 输出必须可追踪、可重现且可与创建它们的运行区分开来，以便后续使用者识别其所用的准确版本。, en: "Outputs must be traceable, reproducible, and distinguishable from the run that created them so a later consumer can identify the exact version it used.", ja: 出力は追跡可能、再現可能で、作成した実行と区別できなければならず、後の利用者が使用した正確なバージョンを識別できる必要がある。}
  includes:
    - {zh: 具有稳定工件标识的代码补丁、生成报告、导出、图文件和机器可读模式。, en: "Code patches, generated reports, exports, graph files, and machine-readable schemas with stable artifact identity.", ja: 安定した成果物アイデンティティを持つコードパッチ、生成レポート、エクスポート、グラフファイル、機械可読スキーマ。}
    - {zh: 内容哈希、媒体类型、存储位置以及指向生成活动的来源链接。, en: "Content hashes, media types, storage locations, and provenance links to producing activities.", ja: コンテンツハッシュ、メディアタイプ、ストレージ位置、生成 Activity へのプロヴナンスリンク。}
  excludes:
    - {zh: 生成文件的执行尝试，它是 Activity。, en: "The execution attempt that generated the file, which is an Activity.", ja: ファイルを生成した実行試行。これは Activity である。}
    - {zh: 仅报告工件写入的 trace span 或日志记录。, en: A trace span or log record that merely reports an artifact write., ja: 成果物書き込みを単に報告する trace span またはログ記録。}
  semantic_kind: null
  aliases: [run outputs, generated entities]
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input: {applicable: true, description: {zh: 字节或结构化内容、媒体类型、生产者标识以及可选前序工件 ID。, en: "Bytes or structured content, media type, producer identity, and optional predecessor artifact IDs.", ja: バイトまたは構造化コンテンツ、メディアタイプ、生成者アイデンティティ、任意の先行成果物 ID。}, family_concept_ids: [Artifact], relation_ids: []}
      output: {applicable: true, description: {zh: 带有 ID、摘要、媒体类型和来源引用的不可变工件记录。, en: "An immutable artifact record with ID, digest, media type, and provenance references.", ja: ID、ダイジェスト、メディアタイプ、プロヴナンス参照を持つ不変の成果物記録。}, family_concept_ids: [Artifact], relation_ids: []}
      failure: {applicable: true, description: {zh: 缺少摘要、存储位置或生产者链接会使工件无法验证。, en: "A missing digest, storage location, or producer link makes the artifact unverifiable.", ja: ダイジェスト、ストレージ位置、生成者リンクの欠落により、成果物を検証できなくなる。}, family_concept_ids: [Artifact], relation_ids: []}
      recovery: {applicable: true, description: {zh: 重新读取或重新生成一个新工件版本；绝不静默重定向已有摘要。, en: Re-read or regenerate a new artifact version; never silently repoint an existing digest., ja: 新しい成果物バージョンを再読込または再生成する。既存ダイジェストを黙って付け替えてはならない。}, family_concept_ids: [Artifact], relation_ids: []}
  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids: [Artifact]
    allowed_backbone_predicates: [is_a]
    flat_root_exception_concept_ids: []
    not_applicable_reason: null
  key_notion: Artifact identity is an Entity identity, not an execution or telemetry identity.
  owns_when: {zh: 关注点是具体输出的内容、序列化、版本或来源。, en: "The concern is a concrete output's content, serialization, version, or provenance.", ja: 関心が具体的な出力のコンテンツ、直列化、バージョン、プロヴナンスである場合。}
  references_when: {zh: 关注点是该输出周围的执行过程、状态变更或可观测性信号。, en: "The concern is the execution process, state mutation, or observability signal around that output.", ja: 関心がその出力の周囲の実行プロセス、状態変更、可観測性シグナルである場合。}
  boundary_decisions: []
  overlap_checks: []
engineering:
  explanation: {zh: 生产者持久化内容、计算摘要并发出工件记录。使用者接收 URI 或字节、媒体类型和摘要，然后在使用前验证该引用。, en: "A producer persists content, calculates a digest, and emits an artifact record. Consumers receive a URI or bytes plus a media type and digest, then verify that reference before use.", ja: 生成者はコンテンツを永続化し、ダイジェストを計算して成果物記録を発行する。利用者は URI またはバイト、メディアタイプ、ダイジェストを受け取り、使用前にその参照を検証する。}
  typical_input:
    - description: {zh: 工件写入请求, en: Artifact write request, ja: 成果物書き込み要求}
      format: |-
        {"content":"diff --git a/app.ts","media_type":"text/x-diff","producer_execution_id":"exec-842"}
  typical_output:
    - description: {zh: 工件记录, en: Artifact record, ja: 成果物記録}
      format: |-
        {"artifact_id":"patch-17","sha256":"8b1a9953c4611296a827abf8c47804d7","media_type":"text/x-diff","generated_by":"exec-842"}
  reference_implementations:
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: "Checkpointed state and replay make state-derived outputs traceable to an execution history."}
structure:
  identity_keys: [artifact_id]
  fields:
    - id: artifact_id
      labels: {zh: 工件 ID, en: Artifact ID, ja: 成果物 ID}
      definitions: {zh: 一个持久运行时输出的稳定标识符。, en: Stable identifier for one durable runtime output., ja: 1 つの永続ランタイム出力の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: patch-17
      source_claims: [claim-runtime-artifacts-entity]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: コンテンツダイジェスト}
      definitions: {zh: 用于验证工件固定内容的内容寻址摘要。, en: Content-addressed digest used to verify fixed artifact content., ja: 固定された成果物内容を検証するコンテンツアドレスダイジェスト。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6
      source_claims: [claim-runtime-artifacts-entity]
  constraints:
    - id: runtime-artifacts-fixed-content
      severity: error
      language: plain
      expression: An artifact record must provide an artifact ID and content digest; a changed payload requires a new artifact record.
      explanation: {zh: 工件作为 Entity 的身份依赖固定内容，而不是可变的运行内存。, en: Artifact identity as an Entity depends on fixed content instead of mutable runtime memory., ja: Entity としての Artifact 識別性は可変ランタイムメモリではなく固定コンテンツに依存する。}
      source_claims: [claim-runtime-artifacts-entity]
  required_relations: []
examples:
  - id: runtime-artifacts-positive
    labels: {zh: "A2A Protocol v0.3 Artifact", en: "A2A Protocol v0.3 Artifact", ja: "A2A Protocol v0.3 Artifact"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; runtime-artifacts maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; runtime-artifacts maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; runtime-artifacts provenance graph."}
    field_values: {artifact_id: a2a-itinerary-a1}
    related_node_ids: [Artifact, ExportArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-artifacts-entity]
  - id: runtime-artifacts-counterexample
    labels: {zh: "Docker 容器 ID 非 Artifact", en: "Docker container ID not Artifact", ja: "Docker container ID は Artifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-artifacts.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style runtime-artifacts.", ja: "Missing parent_run_id rejects LangSmith-style runtime-artifacts."}
    field_values: {container_id: sha256:abc123}
    related_node_ids: [Container]
    related_relation_ids: []
    source_claims: [claim-runtime-artifacts-entity]
  - id: runtime-artifacts-boundary
    labels: {zh: "LangSmith run.outputs 边界", en: "LangSmith run.outputs boundary", ja: "LangSmith run.outputs 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-artifacts preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-artifacts preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {run_id: 0192a3b4-c5d6-7890-abcd-ef1234567890}
    related_node_ids: [Artifact, TraceRecord]
    related_relation_ids: []
    source_claims: [claim-runtime-artifacts-entity]
  - id: runtime-artifacts-instance-patch-17
    labels: {zh: "GitHub Actions 构建产物", en: "GitHub Actions build artifact", ja: "GitHub Actions ビルド artifact"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->runtime-artifacts.", en: "LangSmith instance: run_id parent_run_id run_type=llm->runtime-artifacts.", ja: "LangSmith instance maps to runtime-artifacts."}
    field_values: {artifact_id: gh-actions-production-build, content_digest: 'sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6'}
    related_node_ids: [ExportArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-artifacts-entity]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity identity, activity usage, and generation provenance.
source_claims:
  - id: claim-runtime-artifacts-entity
    source: prov-o-core
    supports: PROV-O defines an Entity as a thing with fixed aspects and relates generated Entities to the Activities that generated them.
    locator: Section 3.1 and Section 3.2
    evidence_kind: standard
    confidence: high


