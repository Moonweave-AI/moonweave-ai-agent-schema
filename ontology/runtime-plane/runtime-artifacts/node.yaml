schema: moonweave.ai/ontology-node/v1
id: runtime-artifacts
kind: module
status: review
labels:
  zh: 运行产物
  en: Runtime artifacts
  ja: 実行成果物
semantics:
  short_definition:
    zh: 描述智能体运行所读取或生成、具有稳定标识和不可变版本、能够在生成它的执行结束后继续被引用的工作产品。
    en: Describes work products read or generated by agent runs that have stable identity and immutable revisions and remain referable after the producing execution ends.
    ja: エージェント実行が読み取りまたは生成し、安定した識別子と不変 revision を持ち、生成実行の終了後も参照できる作業成果物を記述します。
  definition:
    zh: Artifact 的身份由逻辑标识、精确版本和内容摘要共同确定，位置、文件名或“草稿/最终”等状态变化不能代替版本身份。PatchArtifact、ReportArtifact、GraphArtifact、SchemaArtifact 与 ExportArtifact 按内容和可执行语义区分；JSON Schema、SHACL shapes graph 与 RDF Schema 仅在各自语言约束确实成立时成为 SchemaArtifact 的下位类型。
    en: Artifact identity is jointly determined by logical ID, exact revision, and content digest; location, filename, or draft/final state cannot replace revision identity. PatchArtifact, ReportArtifact, GraphArtifact, SchemaArtifact, and ExportArtifact are distinguished by content and executable semantics; JSON Schema, SHACL shapes graph, and RDF Schema become SchemaArtifact subtypes only when their language-specific constraints hold.
    ja: Artifact の同一性は logical ID・正確な revision・content digest の組合せで決まり、場所・ファイル名・draft/final 状態は revision identity の代替になりません。PatchArtifact・ReportArtifact・GraphArtifact・SchemaArtifact・ExportArtifact は内容と実行可能な意味で区別し、JSON Schema・SHACL shapes graph・RDF Schema は各言語の制約を満たす場合だけ SchemaArtifact の下位型になります。
  why_needed:
    zh: 使输入、输出和后续派生都能指向同一份精确内容，而不是依赖易变路径、展示名称或上下文角色猜测身份。
    en: Ensures that inputs, outputs, and later derivations point to exact content rather than inferring identity from mutable paths, display names, or contextual roles.
    ja: 入力・出力・後続 derivation が可変 path・表示名・文脈 role から同一性を推測せず、同じ正確な内容を指せるようにします。
  includes:
    - zh: Artifact 的逻辑标识、不可变版本、内容摘要、媒体类型、创建时间和内容级谱系。
      en: Artifact logical identity, immutable revision, content digest, media type, creation time, and content-level provenance.
      ja: Artifact の logical identity・不変 revision・content digest・media type・作成時刻・content-level provenance。
    - zh: 按内容功能定义的补丁、报告、图、模式和导出产物，以及经过语言约束核验的模式产物子型。
      en: Patch, report, graph, schema, and export artifacts defined by content function, plus schema-artifact subtypes verified against their language constraints.
      ja: 内容機能で定義される patch・report・graph・schema・export artifact、および言語制約を確認した schema artifact subtype。
  excludes:
    - zh: Execution、RunAttempt、RunResult 与 RunOutcome；它们是发生、证据集合或判断，不是持久内容实体。
      en: Execution, RunAttempt, RunResult, and RunOutcome; these are occurrences, evidence aggregates, or judgments rather than persistent content entities.
      ja: Execution・RunAttempt・RunResult・RunOutcome。これらは発生・証拠集合・判断であり、持続する内容 entity ではありません。
    - zh: 文件路径、URI、数据库行或存储位置；它们定位产物，但不决定产物内容身份。
      en: File paths, URIs, database rows, or storage locations; they locate artifacts but do not determine content identity.
      ja: ファイル path・URI・database row・storage location。artifact を位置づけますが内容同一性を決めません。
    - zh: TraceEvent、SourceReference、ReviewActivity、ReviewFinding 与 CorrectionActivity，以及 DraftArtifact/FinalArtifact 这类仅表达状态或上下文角色的伪类型。
      en: TraceEvent, SourceReference, ReviewActivity, ReviewFinding, CorrectionActivity, and pseudo-types such as DraftArtifact or FinalArtifact that express only state or contextual role.
      ja: TraceEvent・SourceReference・ReviewActivity・ReviewFinding・CorrectionActivity、および状態や文脈 role だけを表す DraftArtifact/FinalArtifact 等の擬似型。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为运行输入与输出建立可校验、可版本化、可追溯的内容身份。
  en: Establishes verifiable, versioned, and traceable content identity for runtime inputs and outputs.
  ja: 実行入出力に検証可能・versioned・traceable な内容同一性を与えます。
structure: null
examples:
  - id: runtime-artifacts-cq-provenance-v3-example-positive
    kind: positive
    labels:
      zh: 完整产物生成谱系
      en: Complete artifact generation lineage
      ja: 完全な成果物生成 lineage
    scenario_id: runtime-artifacts-cq-provenance-v3-scenario
    descriptions:
      zh: attempt-601 读取 schema-api@4 与 test-results@8，生成 report-release@2；输入清单记录两个摘要，生成记录绑定新摘要，report-release@2 还直接派生自 report-release@1。
      en: attempt-601 reads schema-api@4 and test-results@8 and generates report-release@2; the input manifest records both digests, generation binds the new digest, and report-release@2 directly derives from report-release@1.
      ja: attempt-601 は schema-api@4 と test-results@8 を読み report-release@2 を生成します。input manifest は二 digest を記録し generation は新 digest を結び、report-release@2 は report-release@1 から直接 derive します。
    field_values:
      artifact_id: report-release
      version: "2"
      content_digest: sha256:report2
      media_type: application/json
    related_node_ids:
      - Artifact
      - RunAttempt
      - TraceEvent
    related_relation_ids:
      - RunAttempt-consumes-Artifact
      - Artifact-generated_by-RunAttempt
      - Artifact-derived_from-Artifact
      - TraceEvent-records_generated_artifact-Artifact
    expected_result:
      zh: 返回唯一生成尝试、两个实际输入版本和一个直接前驱版本；派生路径无环。
      en: Return one generating attempt, two actually consumed revisions, and one direct predecessor; the derivation path is acyclic.
      ja: 一つの生成試行、実消費した二 revision、一つの直接 predecessor を返し、derivation path は acyclic です。
    why_valid_or_invalid:
      zh: 每条边都有版本标识、内容摘要与活动证据，且生成、使用、派生和事件记录没有相互冒充。
      en: Every edge has revision identity, content digest, and activity evidence, while generation, usage, derivation, and event recording remain distinct facts.
      ja: 各辺に revision 同一性・content digest・activity evidence があり、generation・usage・derivation・event record を混同しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-001
      - claim-runtime-artifacts-003
  - id: runtime-artifacts-cq-provenance-v3-example-counter
    kind: counterexample
    labels:
      zh: 文件名与循环伪造的谱系
      en: Filename-only and cyclic pseudo-lineage
      ja: file 名と循環による偽 lineage
    scenario_id: runtime-artifacts-cq-provenance-v3-scenario
    descriptions:
      zh: trace-602 只写有 report.json，没有产物 ID、版本或摘要；数据还同时声称 report@1 派生自 report@2 且 report@2 派生自 report@1。
      en: trace-602 only mentions report.json without artifact ID, version, or digest, and the data claims both report@1 derives from report@2 and report@2 derives from report@1.
      ja: trace-602 は report.json の名だけで artifact ID・version・digest がなく、さらに report@1→report@2 と report@2→report@1 の相互 derivation を主張します。
    field_values:
      trace_event_id: trace-602
      mentioned_filename: report.json
      artifact_id: null
      version: null
      content_digest: null
      claimed_direct_derivations:
        - report@1 -> report@2
        - report@2 -> report@1
      generating_attempt_id: null
    related_node_ids:
      - Artifact
      - TraceEvent
    related_relation_ids:
      - Artifact-derived_from-Artifact
      - TraceEvent-records_generated_artifact-Artifact
    expected_result:
      zh: 拒绝生成记录和循环派生边，并报告缺失的不可变版本身份与生成活动。
      en: Reject the recording assertion and cyclic derivation edges, reporting the missing immutable revision identity and generating activity.
      ja: record assertion と循環 derivation 辺を拒否し、不変 revision 同一性と生成 activity の欠落を報告します。
    why_valid_or_invalid:
      zh: 文件名不能识别实体版本，循环也违反直接派生的时间和生成依赖。
      en: A filename cannot identify an Entity revision, and a cycle violates the temporal and generative dependency of direct derivation.
      ja: file 名は Entity revision を識別できず、循環は直接 derivation の時間・生成依存に違反します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-001
      - claim-runtime-artifacts-003
  - id: runtime-artifacts-cq-version-identity-v3-example-positive
    kind: positive
    labels:
      zh: 同一产物的两个不可变版本
      en: Two immutable revisions of one artifact
      ja: 同一成果物の二不変 revision
    scenario_id: runtime-artifacts-cq-version-identity-v3-scenario
    descriptions:
      zh: 两个对象都以 report-release 为 artifact_id，但版本分别为 1 和 2，摘要不同；版本 2 明确 derived_from 版本 1，并由 attempt-report-release-2 首次生成，显示名均为 report.json。
      en: Both objects use report-release as artifact_id, but versions are 1 and 2 with different digests; version 2 explicitly derives from version 1 and was first generated by attempt-report-release-2, while both display names are report.json.
      ja: 両対象の artifact_id は report-release ですが version は 1 と 2、digest は異なります。version 2 は version 1 から明示 derive し attempt-report-release-2 が初めて生成します。display 名は共に report.json です。
    field_values:
      artifact_id: report-release
      version: "2"
      content_digest: sha256:report2
      run_attempt_id: attempt-report-release-2
    related_node_ids:
      - Artifact
      - RunAttempt
    related_relation_ids:
      - Artifact-derived_from-Artifact
      - Artifact-generated_by-RunAttempt
    expected_result:
      zh: 判定为同一逻辑产物的两个不同不可变版本，而不是两个同一版本或两个独立产物。
      en: Classify them as two distinct immutable revisions of one logical artifact, not the same revision or two separate artifacts.
      ja: 同一 logical artifact の異なる二不変 revision と判定し、同一 revision や別成果物とはしません。
    why_valid_or_invalid:
      zh: 逻辑标识相同、版本与摘要不同，且有向派生边与生成该摘要的 RunAttempt 相互印证；显示名不参与身份判定。
      en: The logical ID matches, version and digest differ, and the directed derivation edge is corroborated by the RunAttempt that generated the digest; display name is not an identity key.
      ja: logical ID は同じで version/digest が異なり、有向 derivation edge と digest を生成した RunAttempt が相互確認され、display 名は identity key ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-001
      - claim-runtime-artifacts-003
  - id: runtime-artifacts-cq-version-identity-v3-example-counter
    kind: counterexample
    labels:
      zh: 同名但身份不同的两个产物
      en: Same filename but separate artifacts
      ja: 同名だが別成果物
    scenario_id: runtime-artifacts-cq-version-identity-v3-scenario
    descriptions:
      zh: schema-auth@7 与 report-auth@7 都存为 auth.json，但 artifact_id、媒体语义和摘要均不同，也没有派生或导出关系。
      en: schema-auth@7 and report-auth@7 are both stored as auth.json, but artifact ID, media semantics, and digest differ, with no derivation or export relation.
      ja: schema-auth@7 と report-auth@7 は共に auth.json ですが artifact ID・media 意味・digest が異なり derivation/export 関係もありません。
    field_values:
      left_artifact_id: schema-auth
      left_version: "7"
      left_content_digest: sha256:schema-auth-7
      left_semantic_type: SchemaArtifact
      right_artifact_id: report-auth
      right_version: "7"
      right_content_digest: sha256:report-auth-7
      right_semantic_type: ReportArtifact
      shared_filename: auth.json
      direct_derivation_present: false
    related_node_ids:
      - SchemaArtifact
      - ReportArtifact
    related_relation_ids: []
    expected_result:
      zh: 保持为两个独立产物，不得用文件名或版本号 7 将它们合并。
      en: Keep them as separate artifacts and do not merge them by filename or the shared version number 7.
      ja: 別成果物として保持し、file 名や共通 version number 7 で統合しません。
    why_valid_or_invalid:
      zh: 版本号只在相应 artifact_id 内有意义，路径与显示名也不是产物身份。
      en: A version number has meaning only within its artifact_id, and neither path nor display name is artifact identity.
      ja: version number は対応 artifact_id 内でのみ意味を持ち、path/display 名も成果物同一性ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-003
      - claim-runtime-artifacts-001
  - id: runtime-artifacts-cq-status-not-subtype-v3-example-positive
    kind: positive
    labels:
      zh: 评审后更新治理状态
      en: Governance state changes after review
      ja: review 後の governance 状態変更
    scenario_id: runtime-artifacts-cq-status-not-subtype-v3-scenario
    descriptions:
      zh: report-release@2 的内容摘要保持不变；review-77 审查该版本并产生已接受 finding 后，governance_state 从 under-review 更新为 final。
      en: report-release@2 keeps the same content digest; after review-77 reviews that revision and yields an accepted finding, governance_state changes from under-review to final.
      ja: report-release@2 の content digest は不変で、review-77 が revision を審査し accepted finding を出した後 governance_state は under-review から final へ変わります。
    field_values:
      artifact_id: report-release
      version: "2"
      content_digest: sha256:report2
      governance_state: final
    related_node_ids:
      - Artifact
      - ReviewActivity
      - ReviewFinding
    related_relation_ids:
      - ReviewActivity-reviews-Artifact
      - review_finding_about_artifact
    expected_result:
      zh: 仍返回同一个 Artifact 版本，并把 final 作为治理字段；分类图中不存在 FinalArtifact。
      en: Return the same Artifact revision with final as a governance field; no FinalArtifact class exists in the taxonomy.
      ja: 同じ Artifact revision を final governance field 付きで返し、taxonomy に FinalArtifact class は存在しません。
    why_valid_or_invalid:
      zh: 评审改变的是工作流状态而非内容或种差，因此不产生新类型。
      en: Review changes workflow state rather than content or genus-differentia conditions, so it does not create a new type.
      ja: review は内容や genus-differentia ではなく workflow 状態を変えるため新 type を作りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-004
      - claim-runtime-artifacts-001
  - id: runtime-artifacts-cq-status-not-subtype-v3-example-counter
    kind: counterexample
    labels:
      zh: 把草稿状态误建为子类
      en: Draft state mis-modeled as a subtype
      ja: draft 状態を subtype と誤設計
    scenario_id: runtime-artifacts-cq-status-not-subtype-v3-scenario
    descriptions:
      zh: 导入数据仅因 governance_state=draft 就创建 DraftArtifact，并把同一版本在状态变更后重新分类为 FinalArtifact。
      en: Imported data creates DraftArtifact solely from governance_state=draft and reclassifies the same revision as FinalArtifact after a state change.
      ja: import data は governance_state=draft だけで DraftArtifact を作り、状態変更後に同じ revision を FinalArtifact へ再分類します。
    field_values:
      governance_state: draft
    related_node_ids:
      - Artifact
    related_relation_ids: []
    expected_result:
      zh: 拒绝两个状态伪类，只保留 Artifact 与受控治理状态值。
      en: Reject both status pseudo-classes and retain Artifact with a controlled governance-state value.
      ja: 二つの status pseudo-class を拒否し Artifact と controlled governance-state value を保持します。
    why_valid_or_invalid:
      zh: 同一对象可随流程改变状态，而类成员资格应表达稳定种差；状态值不能自动推出子类。
      en: One object can change state through a workflow, while class membership expresses stable differentia; a state value cannot automatically entail a subtype.
      ja: 同一対象は workflow で状態変更できますが class membership は安定種差を表すため、状態値から subtype は自動 entail されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-runtime-artifacts-004
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: Artifact 谱系的输入是带 artifact_id、version 与 content_digest 的直接前驱版本，由 Artifact-derived_from-Artifact 记录；RunAttempt 对产物的实际读取由源端点所属的 runtime-execution-attempts 规范存储。
          en: An Artifact-lineage input is an exact predecessor revision identified by artifact_id, version, and content_digest and recorded through Artifact-derived_from-Artifact; actual RunAttempt use is canonically stored by runtime-execution-attempts, which owns that relation's source endpoint.
          ja: Artifact lineage の input は artifact_id・version・content_digest で識別する直接 predecessor revision で、Artifact-derived_from-Artifact により記録します。RunAttempt による実消費は relation の source endpoint を所有する runtime-execution-attempts が canonical storage を担います。
        family_concept_ids:
          - Artifact
        relation_ids:
          - Artifact-derived_from-Artifact
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: Artifact 作为新输出时，由 Artifact→RunAttempt 的 generated_by 事实绑定首次物化该内容版本的尝试。
          en: A new Artifact output uses Artifact-to-RunAttempt generated_by to bind the attempt that first materialized that content revision.
          ja: 新 Artifact output は Artifact→RunAttempt generated_by により内容 revision を初めて物化した attempt と結びます。
        family_concept_ids:
          - Artifact
        relation_ids:
          - Artifact-generated_by-RunAttempt
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域记录失败运行留下或消费的产物，但失败判定由 RunOutcome 与执行尝试域拥有。
          en: This domain records artifacts left or consumed by a failed run, but RunOutcome and execution attempts own failure adjudication.
          ja: 失敗 run が残す/消費する artifact は記録しますが失敗判断は RunOutcome と execution-attempt domain が所有します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域可为恢复尝试提供输入产物，但恢复策略、重试与补偿活动由执行或编排域拥有。
          en: This domain can supply artifacts to a recovery attempt, but execution or orchestration owns recovery policy, retry, and compensation activity.
          ja: recovery attempt へ artifact を提供できますが recovery policy・retry・compensation activity は execution/orchestration が所有します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-artifact-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核实产物身份、版本、摘要、内容子类、生成/消费/派生、观测记录和审查边界；不把执行、事件、存储引用、审查工作或状态词混入产物分类树。
            en: Manually verified artifact identity, revision, digest, content subtypes, generation/usage/derivation, observation records, and review boundaries; execution, events, storage references, review work, and status words are not mixed into the artifact taxonomy.
            ja: artifact 同一性・revision・digest・content subtype・generation/usage/derivation・observation record・review 境界を個別確認し、execution・event・storage reference・review work・status 語を artifact taxonomy に混在させません。
        - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核实产物身份、版本、摘要、内容子类、生成/消费/派生、观测记录和审查边界；不把执行、事件、存储引用、审查工作或状态词混入产物分类树。
            en: Manually verified artifact identity, revision, digest, content subtypes, generation/usage/derivation, observation records, and review boundaries; execution, events, storage references, review work, and status words are not mixed into the artifact taxonomy.
            ja: artifact 同一性・revision・digest・content subtype・generation/usage/derivation・observation record・review 境界を個別確認し、execution・event・storage reference・review work・status 語を artifact taxonomy に混在させません。
  taxonomy_contract:
    applicability: specialization
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Artifact
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-artifact-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Artifact 是唯一根，五个直接内容子型与 SchemaArtifact 下的三种模式语言子型只通过已审查 is_a 边继承；字段状态和跨域对象不得进入分类骨架。
            en: Artifact is the sole root; its five direct content subtypes and the three schema-language subtypes beneath SchemaArtifact inherit only through reviewed is_a edges. Field states and cross-domain objects cannot enter the taxonomy backbone.
            ja: Artifact を唯一 root とし、五 direct content subtype と SchemaArtifact 配下の三 schema-language subtype は reviewed is_a 辺だけで継承し、field state/cross-domain object は taxonomy backbone に入れません。
        - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Artifact 是唯一根，五个直接内容子型与 SchemaArtifact 下的三种模式语言子型只通过已审查 is_a 边继承；字段状态和跨域对象不得进入分类骨架。
            en: Artifact is the sole root; its five direct content subtypes and the three schema-language subtypes beneath SchemaArtifact inherit only through reviewed is_a edges. Field states and cross-domain objects cannot enter the taxonomy backbone.
