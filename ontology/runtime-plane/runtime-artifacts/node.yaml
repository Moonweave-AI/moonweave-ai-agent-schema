schema: moonweave.ai/ontology-node/v1
id: runtime-artifacts
kind: module
status: accepted
labels: {zh: 运行时工件, en: Runtime artifacts, ja: ランタイム成果物}
semantics:
  short_definition: {zh: 由运行时活动产生、导出或消费的带版本 Entity。, en: "Versioned Entities produced, exported, or consumed by runtime activities.", ja: ランタイム Activity により生成、エクスポート、消費されるバージョン付き Entity。}
  definition: {zh: Runtime artifacts 是持久或可寻址的信息 Entity，例如补丁、报告、图序列化和模式文档。它们可以由 Execution 生成，但不是活动本身、其可变的内存状态或描述该活动的可观测性信号。, en: "Runtime artifacts are durable or addressable information Entities such as patches, reports, graph serializations, and schema documents. They may be generated by an Execution, but they are not the activity, its mutable in-memory state, or an observability signal describing the activity.", ja: Runtime artifacts は、パッチ、レポート、グラフ直列化、スキーマ文書などの耐久的または参照可能な情報 Entity である。Execution により生成され得るが、Activity 自体、その可変なメモリ内状態、Activity を記述する可観測性シグナルではない。}
  why_needed: {zh: 输出必须可追踪、可重现且可与创建它们的运行区分开来，以便后续使用者识别其所用的准确版本。, en: "Outputs must be traceable, reproducible, and distinguishable from the run that created them so a later consumer can identify the exact version it used.", ja: 出力は追跡可能、再現可能で、作成した実行と区別できなければならず、後の利用者が使用した正確なバージョンを識別できる必要がある。}
  includes:
    - {zh: 具有稳定工件标识的代码补丁、生成报告、导出、图文件和机器可读模式。, en: "Code patches, generated reports, exports, graph files, and machine-readable schemas with stable artifact identity.", ja: 安定した成果物アイデンティティを持つコードパッチ、生成レポート、エクスポート、グラフファイル、機械可読スキーマ。}
    - {zh: 内容哈希、媒体类型、存储位置以及指向生成活动的来源链接。, en: "Content hashes, media types, storage locations, and provenance links to producing activities.", ja: コンテンツハッシュ、メディアタイプ、ストレージ位置、生成 Activity へのプロヴナンスリンク。}
  excludes:
    - {zh: 生成文件的执行尝试，它是 Activity。, en: "The execution attempt that generated the file, which is an Activity.", ja: ファイルを生成した実行試行。これは Activity である。}
    - {zh: 仅报告工件写入的 trace span 或日志记录。, en: A trace span or log record that merely reports an artifact write., ja: 成果物書き込みを単に報告する trace span またはログ記録。}
  semantic_kind: null
  aliases: [run outputs, generated entities]
module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: Artifact 谱系的输入是带 artifact_id、version 与 content_digest 的直接前驱版本，由 Artifact-derived_from-Artifact 记录；RunAttempt 对产物的实际读取由源端点所属的 runtime-execution-attempts 规范存储。
          en: An Artifact-lineage input is an exact predecessor revision identified by artifact_id, version, and content_digest and recorded through Artifact-derived_from-Artifact; actual RunAttempt use is canonically stored by runtime-execution-attempts, which owns that relation's source endpoint.
          ja: Artifact lineage の input は artifact_id・version・content_digest で識別する直接 predecessor revision で、Artifact-derived_from-Artifact により記録します。RunAttempt による実消費は relation の source endpoint を所有する runtime-execution-attempts が canonical storage を担います。
        family_concept_ids:
          - Artifact
        relation_ids:
          - Artifact-derived_from-Artifact
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: Artifact 作为新输出时，由 Artifact→RunAttempt 的 generated_by 事实绑定首次物化该内容版本的尝试。
          en: A new Artifact output uses Artifact-to-RunAttempt generated_by to bind the attempt that first materialized that content revision.
          ja: 新 Artifact output は Artifact→RunAttempt generated_by により内容 revision を初めて物化した attempt と結びます。
        family_concept_ids:
          - Artifact
        relation_ids:
          - Artifact-generated_by-RunAttempt
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域记录失败运行留下或消费的产物，但失败判定由 RunOutcome 与执行尝试域拥有。
          en: This domain records artifacts left or consumed by a failed run, but RunOutcome and execution attempts own failure adjudication.
          ja: 失敗 run が残す/消費する artifact は記録しますが失敗判断は RunOutcome と execution-attempt domain が所有します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域可为恢复尝试提供输入产物，但恢复策略、重试与补偿活动由执行或编排域拥有。
          en: This domain can supply artifacts to a recovery attempt, but execution or orchestration owns recovery policy, retry, and compensation activity.
          ja: recovery attempt へ artifact を提供できますが recovery policy・retry・compensation activity は execution/orchestration が所有します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-artifact-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核实产物身份、版本、摘要、内容子类、生成/消费/派生、观测记录和审查边界；不把执行、事件、存储引用、审查工作或状态词混入产物分类树。
            en: Manually verified artifact identity, revision, digest, content subtypes, generation/usage/derivation, observation records, and review boundaries; execution, events, storage references, review work, and status words are not mixed into the artifact taxonomy.
            ja: artifact 同一性・revision・digest・content subtype・generation/usage/derivation・observation record・review 境界を個別確認し、execution・event・storage reference・review work・status 語を artifact taxonomy に混在させません。
        - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核实产物身份、版本、摘要、内容子类、生成/消费/派生、观测记录和审查边界；不把执行、事件、存储引用、审查工作或状态词混入产物分类树。
            en: Manually verified artifact identity, revision, digest, content subtypes, generation/usage/derivation, observation records, and review boundaries; execution, events, storage references, review work, and status words are not mixed into the artifact taxonomy.
            ja: artifact 同一性・revision・digest・content subtype・generation/usage/derivation・observation record・review 境界を個別確認し、execution・event・storage reference・review work・status 語を artifact taxonomy に混在させません。
  taxonomy_contract:
    applicability: specialization
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Artifact
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-runtime-artifact-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Artifact 是唯一根，五个直接内容子型与 SchemaArtifact 下的三种模式语言子型只通过已审查 is_a 边继承；字段状态和跨域对象不得进入分类骨架。
            en: Artifact is the sole root; its five direct content subtypes and the three schema-language subtypes beneath SchemaArtifact inherit only through reviewed is_a edges. Field states and cross-domain objects cannot enter the taxonomy backbone.
            ja: Artifact を唯一 root とし、五 direct content subtype と SchemaArtifact 配下の三 schema-language subtype は reviewed is_a 辺だけで継承し、field state/cross-domain object は taxonomy backbone に入れません。
        - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Artifact 是唯一根，五个直接内容子型与 SchemaArtifact 下的三种模式语言子型只通过已审查 is_a 边继承；字段状态和跨域对象不得进入分类骨架。
            en: Artifact is the sole root; its five direct content subtypes and the three schema-language subtypes beneath SchemaArtifact inherit only through reviewed is_a edges. Field states and cross-domain objects cannot enter the taxonomy backbone.
            ja: Artifact を唯一 root とし、五 direct content subtype と SchemaArtifact 配下の三 schema-language subtype は reviewed is_a 辺だけで継承し、field state/cross-domain object は taxonomy backbone に入れません。
  competency_questions:
    - id: runtime-artifacts-cq-provenance-v3
      semantic_key: runtime-artifacts.provenance
      primary_owner_module_id: runtime-artifacts
      related_module_ids:
        - runtime-execution-attempts
        - runtime-observability
      questions:
        zh: 某个不可变产物版本由哪次执行尝试生成、实际读取了哪些输入、直接派生自哪些前驱，哪个追踪事件记录了这次生成？
        en: Which RunAttempt generated an immutable artifact revision, which inputs did it actually consume, which direct predecessors was it derived from, and which TraceEvent recorded the generation?
        ja: 不変 artifact revision を生成した RunAttempt、実消費した input、直接 derivation predecessor、生成を記録した TraceEvent は何ですか。
      query: Resolve Artifact by artifact_id, version, and content_digest; traverse generated_by, inverse consumes, direct derived_from, and records_generated_artifact while rejecting cycles and unkeyed filename mentions.
      expected_assertion: Each runtime Artifact revision has exactly one generating RunAttempt, zero or more evidenced input revisions, an acyclic direct-derivation lineage, and only keyed observation records.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Artifact
        related_concept_ids:
          - RunAttempt
          - TraceEvent
        relation_ids:
          - Artifact-generated_by-RunAttempt
          - RunAttempt-consumes-Artifact
          - TraceEvent-records_generated_artifact-Artifact
        not_applicable_reason: null
      positive_example_ids:
        - runtime-artifacts-cq-provenance-v3-example-positive
      counterexample_ids:
        - runtime-artifacts-cq-provenance-v3-example-counter
      source_claims:
        - claim-runtime-artifacts-001
        - claim-runtime-artifacts-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐条核实生成、使用、派生与观测记录四类事实，禁止由文件名补推缺失谱系。
              en: Manually verified generation, usage, derivation, and observation as four distinct facts; filename inference cannot fill missing lineage.
              ja: generation・usage・derivation・observation の四事実を個別確認し、file 名から欠落 lineage を補推しません。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐条核实生成、使用、派生与观测记录四类事实，禁止由文件名补推缺失谱系。
              en: Manually verified generation, usage, derivation, and observation as four distinct facts; filename inference cannot fill missing lineage.
              ja: generation・usage・derivation・observation の四事実を個別確認し、file 名から欠落 lineage を補推しません。
    - id: runtime-artifacts-cq-version-identity-v3
      semantic_key: runtime-artifacts.version-identity
      primary_owner_module_id: runtime-artifacts
      related_module_ids:
        - runtime-execution-attempts
      questions:
        zh: 两个记录是同一不可变版本、同一逻辑产物的不同版本，还是两个独立产物；哪些标识、摘要和派生证据决定结论？
        en: Are two records the same immutable revision, different revisions of one logical artifact, or separate artifacts, and which identifiers, digests, and derivation evidence decide?
        ja: 二記録は同一不変 revision、同一 logical artifact の別 revision、別成果物のどれで、どの identifier・digest・derivation evidence が判断しますか。
      query: Compare artifact_id, version, content_digest, semantic subtype, direct derivation, and the RunAttempt that generated each revision; treat filename, URI, and display label only as locators or presentation metadata.
      expected_assertion: Same revision requires the same artifact_id, version, and digest; a new version retains artifact_id but changes version or digest and records its derivation or generating RunAttempt; a separate artifact has a distinct logical identity.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Artifact
        related_concept_ids:
          - RunAttempt
        relation_ids:
          - Artifact-derived_from-Artifact
          - Artifact-generated_by-RunAttempt
        not_applicable_reason: null
      positive_example_ids:
        - runtime-artifacts-cq-version-identity-v3-example-positive
      counterexample_ids:
        - runtime-artifacts-cq-version-identity-v3-example-counter
      source_claims:
        - claim-runtime-artifacts-001
        - claim-runtime-artifacts-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项核对逻辑标识、版本与摘要，明确路径和显示名不参与产物身份合并。
              en: Manually checked logical ID, version, and digest; path and display name never merge artifact identity.
              ja: logical ID・version・digest を個別確認し path/display 名で成果物同一性を統合しません。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项核对逻辑标识、版本与摘要，明确路径和显示名不参与产物身份合并。
              en: Manually checked logical ID, version, and digest; path and display name never merge artifact identity.
              ja: logical ID・version・digest を個別確認し path/display 名で成果物同一性を統合しません。
    - id: runtime-artifacts-cq-status-not-subtype-v3
      semantic_key: runtime-artifacts.status-not-subtype
      primary_owner_module_id: runtime-artifacts
      related_module_ids:
        - feedback-review-optimization
      questions:
        zh: 产物版本当前处于什么治理状态，哪次审查支持该状态，状态变化是否保持 Artifact 类型和内容身份不变？
        en: What is an artifact revision's current governance state, which review supports it, and did the state transition preserve Artifact type and content identity?
        ja: artifact revision の現在 governance 状態、それを支持する review、状態遷移後も Artifact type と内容同一性が不変かを確認できますか。
      query: Read governance_state on an exact Artifact revision, follow ReviewActivity-reviews-Artifact and review_finding_about_artifact, and verify that no status-named subtype was asserted.
      expected_assertion: Governance state is a controlled value supported by review evidence; it never creates DraftArtifact, ReviewedArtifact, or FinalArtifact subclasses.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - Artifact
        related_concept_ids:
          - ReviewActivity
          - ReviewFinding
        relation_ids:
          - ReviewActivity-reviews-Artifact
          - review_finding_about_artifact
        not_applicable_reason: null
      positive_example_ids:
        - runtime-artifacts-cq-status-not-subtype-v3-example-positive
      counterexample_ids:
        - runtime-artifacts-cq-status-not-subtype-v3-example-counter
      source_claims:
        - claim-runtime-artifacts-004
        - claim-runtime-artifacts-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 确认治理状态是字段值，审查发生和 finding 是独立事实，不以状态词制造伪子类。
              en: Confirmed governance state is a field value and review occurrence/finding are separate facts; status words do not create pseudo-subclasses.
              ja: governance 状態は field value、review occurrence/finding は別事実であり status 語から pseudo-subclass を作らないと確認しました。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 确认治理状态是字段值，审查发生和 finding 是独立事实，不以状态词制造伪子类。
              en: Confirmed governance state is a field value and review occurrence/finding are separate facts; status words do not create pseudo-subclasses.
              ja: governance 状態は field value、review occurrence/finding は別事実であり status 語から pseudo-subclass を作らないと確認しました。
  key_notion:
    zh: 运行产物
    en: runtime artifact
    ja: 実行成果物
  owns_when:
    zh: 当对象能以 artifact_id、精确版本和内容摘要独立寻址，并在生成或消费活动结束后仍作为同一内容实体存在时，由本模块定义。
    en: This module defines an object when it is independently addressable by artifact ID, exact revision, and content digest and remains the same content entity after the producing or consuming activity ends.
    ja: artifact_id・正確な revision・content digest で独立に参照でき、生成または消費活動の終了後も同じ内容 entity として残る対象を本モジュールで定義します。
  references_when:
    zh: 生成、消费、观测、存储、披露或审查产物时，只引用相应活动、位置、事件和判断；这些关系不会把执行、来源或审查对象变成 Artifact 子类。
    en: When an artifact is generated, consumed, observed, stored, disclosed, or reviewed, the corresponding activity, location, event, or judgment is referenced; those relations do not turn execution, source, or review objects into Artifact subtypes.
    ja: artifact の生成・消費・観測・保存・開示・審査では対応する activity・location・event・judgment だけを参照し、それらの関係によって execution・source・review object を Artifact subtype にしません。
  boundary_decisions:
    - other_module_id: runtime-observability
      subject_concept_ids:
        - Artifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
        zh: 本域拥有具稳定版本与摘要的工作产品；追踪域只能记录该版本被生成、读取或检查的观测。TraceEvent 指向 Artifact 不会把 Artifact 归入观测事件。
        en: This domain owns work products with stable revision identity and digest; observability only records that such a revision was generated, read, or inspected. A TraceEvent pointing to an Artifact does not make the Artifact an observation event.
        ja: 本 domain は安定 revision 同一性と digest を持つ work product を所有し、observability は生成・読取・検査の観測だけを記録します。TraceEvent が Artifact を指しても Artifact は observation event になりません。
      relation_ids:
        - TraceEvent-records_generated_artifact-Artifact
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-artifacts-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本域拥有具稳定版本与摘要的工作产品；追踪域只能记录该版本被生成、读取或检查的观测。TraceEvent 指向 Artifact 不会把 Artifact 归入观测事件。
              en: This domain owns work products with stable revision identity and digest; observability only records that such a revision was generated, read, or inspected. A TraceEvent pointing to an Artifact does not make the Artifact an observation event.
              ja: 本 domain は安定 revision 同一性と digest を持つ work product を所有し、observability は生成・読取・検査の観測だけを記録します。TraceEvent が Artifact を指しても Artifact は observation event になりません。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本域拥有具稳定版本与摘要的工作产品；追踪域只能记录该版本被生成、读取或检查的观测。TraceEvent 指向 Artifact 不会把 Artifact 归入观测事件。
              en: This domain owns work products with stable revision identity and digest; observability only records that such a revision was generated, read, or inspected. A TraceEvent pointing to an Artifact does not make the Artifact an observation event.
              ja: 本 domain は安定 revision 同一性と digest を持つ work product を所有し、observability は生成・読取・検査の観測だけを記録します。TraceEvent が Artifact を指しても Artifact は observation event になりません。
    - other_module_id: runtime-observability
      subject_concept_ids:
        - TraceEvent
      decision: references
      owner_module_id: runtime-observability
      rationale:
        zh: TraceEvent 的身份来自时间、事件类型与关联键，归追踪域；运行产物域只借它证明生成被观测，不拥有事件本身。
        en: TraceEvent identity comes from time, event type, and correlation keys and belongs to observability; runtime artifacts only reference it as evidence that generation was observed.
        ja: TraceEvent 同一性は時刻・event type・correlation key により observability が所有し、runtime artifact は生成観測 evidence として参照するだけです。
      relation_ids:
        - TraceEvent-records_generated_artifact-Artifact
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-artifacts-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: TraceEvent 的身份来自时间、事件类型与关联键，归追踪域；运行产物域只借它证明生成被观测，不拥有事件本身。
              en: TraceEvent identity comes from time, event type, and correlation keys and belongs to observability; runtime artifacts only reference it as evidence that generation was observed.
              ja: TraceEvent 同一性は時刻・event type・correlation key により observability が所有し、runtime artifact は生成観測 evidence として参照するだけです。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: TraceEvent 的身份来自时间、事件类型与关联键，归追踪域；运行产物域只借它证明生成被观测，不拥有事件本身。
              en: TraceEvent identity comes from time, event type, and correlation keys and belongs to observability; runtime artifacts only reference it as evidence that generation was observed.
              ja: TraceEvent 同一性は時刻・event type・correlation key により observability が所有し、runtime artifact は生成観測 evidence として参照するだけです。
    - other_module_id: runtime-execution-attempts
      subject_concept_ids:
        - Artifact
      decision: owns
      owner_module_id: runtime-artifacts
      rationale:
