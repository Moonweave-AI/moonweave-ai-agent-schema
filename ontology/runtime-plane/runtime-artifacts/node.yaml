        en: If the object remains referable by artifact ID and version outside a specific event time, it belongs to runtime artifacts; if identity depends on trace context and occurrence time, it belongs to tracing and checkpoints.
        ja: 具体イベント時刻を離れても artifact id と版で参照できれば実行成果物、同一性が trace context と発生時刻に依存すればトレースとチェックポイントに属します。
      result: distinct
