        - CorrectionActivity-modifies-Artifact
        - ReviewActivity-reviews-Artifact
        - ReviewEvidenceArtifact-is_a-Artifact
        - ReviewFinding-about-Artifact
        - RevisionArtifact-is_a-Artifact
      relation_not_applicable_reason: null
      source_claims:
        - claim-runtime-artifacts-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-runtime-artifact-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 领域复核确认五个反馈端点分别保持活动、发现或专用产物身份，不能压缩为抽象 Correction。
              en: Domain review confirms that the five feedback endpoints retain activity, finding, or specialized-artifact identity and cannot be collapsed into abstract Correction.
              ja: ドメイン審査は五つの feedback endpoint が activity・finding・specialized artifact identity を保持し抽象 Correction に圧縮できないと確認しました。
          - reviewer_id: moonweave-runtime-artifact-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
