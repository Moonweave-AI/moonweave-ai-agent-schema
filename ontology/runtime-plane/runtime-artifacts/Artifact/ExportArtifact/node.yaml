schema: moonweave.ai/ontology-node/v1
id: ExportArtifact
kind: concept
labels:
  zh: 导出包产物
  en: export-package artifact
  ja: export package 成果物
semantics:
  short_definition:
    zh: 为外部交付冻结格式、清单和来源摘要的新产物版本。
    en: A new artifact revision with frozen format, manifest, and source digest for external delivery.
    ja: 外部納品向けに形式・manifest・source digest を固定した新しい成果物 revision です。
  definition:
    zh: 导出包产物是一种运行产物；其种差是由另一 Artifact 派生为可传输包，固定导出格式、源产物摘要和清单摘要，并拥有自己的 artifact_id、version 与内容摘要。
    en: An export-package artifact is a runtime artifact distinguished as a transportable package derived from another Artifact, with frozen export format, source-artifact digest, manifest digest, and its own artifact ID, version, and content digest.
    ja: export package 成果物は別 Artifact から派生した transportable package で、export format、source artifact digest、manifest digest と固有 artifact ID・version・content digest を持つ実行成果物です。
  why_needed:
    zh: 把导出建模为新产物可避免把同一内容误说成同时具有内部格式和外部交付格式。
    en: Modeling export as a new artifact avoids claiming that one byte identity simultaneously has internal and delivery formats.
    ja: export を新成果物とすることで、一つの byte 同一性が内部形式と納品形式を同時に持つ誤りを防ぎます。
  includes:
    - zh: 包含具有清单、固定序列化格式和源产物摘要的 ZIP、JSON-LD 或其它交付包。
      en: Includes ZIP, JSON-LD, or other delivery packages with a manifest, fixed serialization, and source-artifact digest.
      ja: manifest、固定 serialization、source artifact digest を持つ ZIP、JSON-LD などの納品 package を含みます。
  excludes:
    - zh: 不包含仅改变下载文件名、URL 或可见性而未产生新字节版本的操作。
      en: Excludes changing only a download name, URL, or visibility without producing a new byte revision.
      ja: 新しい byte revision を作らず download 名、URL、visibility だけを変える操作を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ExportArtifact（FileOutput）映射 E2B sandbox 导出文件、OpenAI Files API file_id 与 assistant message attachments；路径提及不能代替 digest 身份。
    en: ExportArtifact (FileOutput) maps E2B sandbox exported files, OpenAI Files API file_id, and assistant message attachments; path mentions cannot replace digest identity.
    ja: ExportArtifact（FileOutput）は E2B 导出/OpenAI file_id を digest 付き artifact として写像します。
  typical_input:
    - description: E2B file write or OpenAI assistant file output.
      format: GET /v1/files/file-abc/content
      source_claims:
        - claim-e2b-artifact
        - claim-export-artifact-design
  typical_output:
    - description: Moonweave Artifact with digest and provenance.
      format: '{"artifact_id":"export-report-txt","version":"3","media_type":"text/plain","content_digest":"sha256:..."}'
      source_claims:
        - claim-export-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: export_format
      labels:
        zh: 导出格式
        en: export format
        ja: export format
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 交付包的规范序列化或归档格式。
        en: Normative serialization or archive format of the delivery package.
        ja: 納品 package の規範 serialization または archive format です。
      allowed_values: []
      pattern: null
      example_value: application/ld+json
      source_claims:
        - claim-export-artifact-design
    - id: source_artifact_digest
      labels:
        zh: 源产物摘要
        en: source artifact digest
        ja: source artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被导出源版本的内容摘要。
        en: Content digest identifying the source revision being exported.
        ja: export 元 revision を識別する content digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:source…
      source_claims:
        - claim-export-artifact-design
    - id: manifest_digest
      labels:
        zh: 清单摘要
        en: manifest digest
        ja: manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定包成员、路径和成员摘要清单的内容摘要。
        en: Digest of the manifest that fixes package members, paths, and member digests.
        ja: package member・path・member digest を固定する manifest の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:manifest…
      source_claims:
        - claim-export-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExportArtifact-example-positive-manual-20260716
    labels:
      zh: GitHub Actions upload-artifact
      en: GitHub Actions upload artifact
      ja: GitHub Actions upload-artifact
    descriptions:
      zh: GitHub Actions actions/upload-artifact@v4 name=production-build、path=dist/、retention-days=90；ExportArtifact artifact_id=export-5、content_digest=sha256:...
      en: GitHub Actions actions/upload-artifact@v4 name=production-build, path=dist/, retention-days=90; ExportArtifact artifact_id=export-5, content_digest=sha256:...
      ja: GitHub upload-artifact が ExportArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: export-12
      version: "1"
      content_digest: sha256:export-12-v1
      media_type: application/ld+json
      export_format: application/ld+json
      source_artifact_digest: sha256:source…
      manifest_digest: sha256:manifest…
    related_node_ids:
      - Artifact
      - ExportArtifact
    related_relation_ids:
      - artifact_exported_as
      - ExportArtifact-is_a-Artifact
    source_claims:
      - claim-export-artifact-design
  - id: ExportArtifact-example-boundary-manual-20260716
    labels:
      zh: S3 object 非 ExportArtifact
      en: S3 object not ExportArtifact
      ja: S3 object は ExportArtifact ではない
    descriptions:
      zh: 裸 s3://bucket/key 对象无 CI export 元数据与 retention 策略，不是 Moonweave ExportArtifact 记录。
      en: Bare s3://bucket/key object without CI export metadata and retention policy is not Moonweave ExportArtifact record.
      ja: S3 object だけでは ExportArtifact にならない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - Artifact
      - ExportArtifact
    related_relation_ids:
      - artifact_exported_as
    source_claims:
      - claim-export-artifact-design
  - id: ExportArtifact-example-3
    labels:
      zh: ExportArtifact 与 ReportArtifact 边界
      en: ExportArtifact versus ReportArtifact boundary
      ja: ExportArtifact と ReportArtifact 境界
    descriptions:
      zh: ExportArtifact 是 CI/打包导出产物；ReportArtifact 是 agent 研究报告；build dist/ 与 research markdown 用途不同。
      en: ExportArtifact is CI/package export product; ReportArtifact is agent research report; build dist/ and research markdown differ in purpose.
      ja: ExportArtifact と ReportArtifact は用途が異なる。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - ExportArtifact
    related_relation_ids: []
    source_claims:
      - claim-export-artifact-design
      - claim-export-artifact-design
  - id: ExportArtifact-example-4
    labels:
      zh: export-5 production-build 实例
      en: export-5 production-build instance
      ja: export-5 production-build 事例
    descriptions:
      zh: ExportArtifact artifact_id=export-5、name=production-build、path=dist/、workflow_run_id=9001。
      en: ExportArtifact artifact_id=export-5, name=production-build, path=dist/, workflow_run_id=9001.
      ja: export-5 ExportArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - ExportArtifact
    related_relation_ids: []
    source_claims:
      - claim-export-artifact-design
      - claim-export-artifact-design
parent_relation:
  id: ExportArtifact-is_a-Artifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 导出包具有独立版本、摘要和溯源，因此是 Artifact；其额外种差是外部交付格式、清单和源摘要。
    en: An export package has independent version, digest, and provenance and is therefore an Artifact; export format, manifest, and source digest are its additional differentia.
    ja: export package は独立版本・digest・provenance を持つため Artifact で、外部納品 format・manifest・source digest が追加種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-export-artifact-design
  distinct_fact_rationale:
    zh: 该方向记录具有独立谓词和工程含义，不能由反向事实完整推出。
    en: This direction has an independent predicate and engineering meaning that cannot be fully inferred from the reverse fact.
    ja: この方向は独立した述語と工学的意味を持ち、逆方向事実から完全には推論できません。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://www.e2b.dev/docs/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-e2b-artifact
    source: src-e2b-files
    supports: E2B sandbox filesystem writes produce addressable file outputs with path and bytes.
    locator: Sandbox filesystem
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-file-artifact
    source: src-openai-files
    supports: OpenAI Files API returns file_id and metadata for assistant-generated outputs.
    locator: Files > file object
    evidence_kind: design-inference
    confidence: high
  - id: claim-export-artifact-design
    source: src-runtime-artifacts-design
    supports: ExportArtifact is materialized byte output suitable for delivery.
    locator: ExportArtifact boundary
    evidence_kind: design-inference
    confidence: high
