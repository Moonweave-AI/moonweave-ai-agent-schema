schema: moonweave.ai/ontology-node/v1
id: ExportArtifact
kind: concept
status: accepted
labels:
  zh: 导出包产物
  en: export-package artifact
  ja: export package 成果物
semantics:
  short_definition:
    zh: 为外部交付冻结格式、清单和来源摘要的新产物版本。
    en: A new artifact revision with frozen format, manifest, and source digest for external delivery.
    ja: 外部納品向けに形式・manifest・source digest を固定した新しい成果物 revision です。
  definition:
    zh: 导出包产物是一种运行产物；其种差是由另一 Artifact 派生为可传输包，固定导出格式、源产物摘要和清单摘要，并拥有自己的 artifact_id、version 与内容摘要。
    en: An export-package artifact is a runtime artifact distinguished as a transportable package derived from another Artifact, with frozen export format, source-artifact digest, manifest digest, and its own artifact ID, version, and content digest.
    ja: export package 成果物は別 Artifact から派生した transportable package で、export format、source artifact digest、manifest digest と固有 artifact ID・version・content digest を持つ実行成果物です。
  why_needed:
    zh: 把导出建模为新产物可避免把同一内容误说成同时具有内部格式和外部交付格式。
    en: Modeling export as a new artifact avoids claiming that one byte identity simultaneously has internal and delivery formats.
    ja: export を新成果物とすることで、一つの byte 同一性が内部形式と納品形式を同時に持つ誤りを防ぎます。
  includes:
    - zh: 包含具有清单、固定序列化格式和源产物摘要的 ZIP、JSON-LD 或其它交付包。
      en: Includes ZIP, JSON-LD, or other delivery packages with a manifest, fixed serialization, and source-artifact digest.
      ja: manifest、固定 serialization、source artifact digest を持つ ZIP、JSON-LD などの納品 package を含みます。
  excludes:
    - zh: 不包含仅改变下载文件名、URL 或可见性而未产生新字节版本的操作。
      en: Excludes changing only a download name, URL, or visibility without producing a new byte revision.
      ja: 新しい byte revision を作らず download 名、URL、visibility だけを変える操作を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: export_format
      labels:
        zh: 导出格式
        en: export format
        ja: export format
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 交付包的规范序列化或归档格式。
        en: Normative serialization or archive format of the delivery package.
        ja: 納品 package の規範 serialization または archive format です。
      allowed_values: []
      pattern: null
      example_value: application/ld+json
      source_claims:
        - claim-export-artifact-002
    - id: source_artifact_digest
      labels:
        zh: 源产物摘要
        en: source artifact digest
        ja: source artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被导出源版本的内容摘要。
        en: Content digest identifying the source revision being exported.
        ja: export 元 revision を識別する content digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:source…
      source_claims:
        - claim-export-artifact-003
    - id: manifest_digest
      labels:
        zh: 清单摘要
        en: manifest digest
        ja: manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定包成员、路径和成员摘要清单的内容摘要。
        en: Digest of the manifest that fixes package members, paths, and member digests.
        ja: package member・path・member digest を固定する manifest の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:manifest…
      source_claims:
        - claim-export-artifact-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExportArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 带清单的 JSON-LD 导出
      en: Manifested JSON-LD export
      ja: manifest 付き JSON-LD export
    scenario_id: null
    descriptions:
      zh: graph-12 被序列化为 export-12@1；包记录 JSON-LD 格式、graph-12 摘要和成员清单摘要。
      en: graph-12 is serialized as export-12@1, whose record carries JSON-LD format, the graph-12 digest, and a member-manifest digest.
      ja: graph-12 は export-12@1 として serialization され、JSON-LD format、graph-12 digest、member manifest digest を記録します。
    field_values:
      artifact_id: export-12
      version: "1"
      content_digest: sha256:export-12-v1
      media_type: application/ld+json
      export_format: application/ld+json
      source_artifact_digest: sha256:source…
      manifest_digest: sha256:manifest…
    related_node_ids:
      - Artifact
      - ExportArtifact
    related_relation_ids:
      - artifact_exported_as
      - ExportArtifact-is_a-Artifact
    expected_result:
      zh: 生成独立 ExportArtifact，并保留到源产物的导出边。
      en: Create an independent ExportArtifact and retain the export edge to its source.
      ja: 独立 ExportArtifact を作り source への export 辺を保持します。
    why_valid_or_invalid:
      zh: 新包有独立字节身份、来源摘要和清单，因此不是源产物的显示属性。
      en: The new package has independent byte identity, source digest, and manifest, so it is not a display property of the source.
      ja: 新 package は独立 byte 同一性、source digest、manifest を持ち、source の表示属性ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-export-artifact-005
  - id: ExportArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 仅生成临时下载链接
      en: Temporary download link only
      ja: 一時 download link のみ
    scenario_id: null
    descriptions:
      zh: 系统为 report-8 创建十分钟有效 URL，但内容摘要、格式和版本均未变化，也没有新包。
      en: The system creates a ten-minute URL for report-8, but digest, format, and version do not change and no new package exists.
      ja: system は report-8 に10分有効 URL を作りますが、digest・format・version は変わらず新 package もありません。
    field_values: {}
    related_node_ids:
      - Artifact
      - ExportArtifact
    related_relation_ids:
      - artifact_exported_as
    expected_result:
      zh: 不得创建 ExportArtifact；URL 只是访问机制。
      en: Do not create ExportArtifact; the URL is only an access mechanism.
      ja: ExportArtifact を作らず、URL は access mechanism とします。
    why_valid_or_invalid:
      zh: 没有新字节身份或清单，因而不存在可独立引用的导出产物。
      en: There is no new byte identity or manifest, so no independently referable export artifact exists.
      ja: 新 byte 同一性も manifest もなく、独立参照可能な export artifact は存在しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-export-artifact-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GraphArtifact
    shared_parent_concept_id: Artifact
    differentia:
      zh: ExportArtifact 的身份来自跨运行边界交付所需的封装格式、成员清单与源产物摘要；GraphArtifact 的身份来自可查询节点—边结构及其图模型。图可以被导出，但“图内容”与“交付封装”是两个可分别版本化的产物。
      en: ExportArtifact is identified by the package format, member manifest, and source-artifact digest needed for delivery across a runtime boundary; GraphArtifact is identified by a queryable node-edge structure and graph model. A graph can be exported, but graph content and delivery packaging remain separately versioned artifacts.
      ja: ExportArtifact は runtime 境界外へ納品する package format・member manifest・source artifact digest で識別し、GraphArtifact は照会可能な node-edge 構造と graph model で識別します。graph を export できても graph 内容と納品 package は別々に version 管理されます。
    source_claims:
      - claim-export-artifact-007
      - claim-export-artifact-008
parent_relation:
  id: ExportArtifact-is_a-Artifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 导出包具有独立版本、摘要和溯源，因此是 Artifact；其额外种差是外部交付格式、清单和源摘要。
    en: An export package has independent version, digest, and provenance and is therefore an Artifact; export format, manifest, and source digest are its additional differentia.
    ja: export package は独立版本・digest・provenance を持つため Artifact で、外部納品 format・manifest・source digest が追加種差です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ExportArtifact-is_a-Artifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: ExportArtifact 子类正例
        en: Positive ExportArtifact specialization
        ja: ExportArtifact 特殊化の正例
      scenario_id: null
      descriptions:
        zh: ExportArtifact 对象同时满足 Artifact 的独立版本、摘要和生成溯源，并满足自身种差。
        en: The ExportArtifact object satisfies Artifact identity, digest, and generation provenance plus its own differentia.
        ja: ExportArtifact 対象は Artifact の独立版本・digest・生成 provenance と固有種差を満たします。
      field_values: {}
      related_node_ids:
        - ExportArtifact
        - Artifact
      related_relation_ids:
        - ExportArtifact-is_a-Artifact
      expected_result:
        zh: 可沿 ExportArtifact→Artifact 继承通用产物语义。
        en: It inherits common artifact semantics along ExportArtifact-to-Artifact.
        ja: ExportArtifact→Artifact に沿い共通成果物意味を継承します。
      why_valid_or_invalid:
        zh: 子类完整满足父类身份条件并增加更窄种差。
        en: The subtype fully satisfies parent identity and adds a narrower differentia.
        ja: subtype は parent 同一性を完全に満たしより狭い種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-export-artifact-009
    - id: ExportArtifact-is_a-Artifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: ExportArtifact 子类边界
        en: Boundary for ExportArtifact specialization
        ja: ExportArtifact 特殊化の境界
      scenario_id: null
      descriptions:
        zh: 一个普通 Artifact 版本缺少 ExportArtifact 的专属身份字段或内容语义。
        en: A generic Artifact revision lacks the identity fields or content semantics specific to ExportArtifact.
        ja: 一般 Artifact revision は ExportArtifact 固有の同一性 field または content 意味を欠きます。
      field_values: {}
      related_node_ids:
        - ExportArtifact
        - Artifact
      related_relation_ids:
        - ExportArtifact-is_a-Artifact
      expected_result:
        zh: 保持为 Artifact，不得反向归入 ExportArtifact。
        en: Keep it as Artifact and do not reverse-classify it as ExportArtifact.
        ja: Artifact のままとし ExportArtifact へ逆分類しません。
      why_valid_or_invalid:
        zh: 继承只从下位概念推向上位概念，父类成员不自动满足子类种差。
        en: Inheritance runs from subtype to parent; parent membership does not automatically satisfy subtype differentia.
        ja: 継承は subtype から parent へ進み parent 所属だけで subtype 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-export-artifact-010
  source_claims:
    - claim-export-artifact-011
  distinct_fact_rationale:
    zh: 该方向记录具有独立谓词和工程含义，不能由反向事实完整推出。
    en: This direction has an independent predicate and engineering meaning that cannot be fully inferred from the reverse fact.
    ja: この方向は独立した述語と工学的意味を持ち、逆方向事実から完全には推論できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Entity/Generation 与 JSON Schema/RDF/SHACL 规范逐项核验，Artifact 五类子型语义成立。
    en: Verified against PROV-O Entity/Generation and JSON Schema/RDF/SHACL. Five Artifact subtypes and provenance hold.
    ja: PROV-O Entity/Generation と JSON Schema/RDF/SHACL に照らし五 Artifact subtype と provenance を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-export-artifact-001
    source: eng-ont-prov-o
    supports: PROV-O derivation relates a new Entity state to source Entities; Moonweave uses that pattern for immutable export packages.
    locator: W3C Recommendation > §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-002
    source: eng-ont-jsonld
    supports: JSON-LD 1.1 defines a JSON serialization for linked data; Moonweave records the selected export format on the package artifact.
    locator: W3C Recommendation > §1.1 How to Read this Document and serialization model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-003
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 grounds representation digest semantics used to identify the exact source revision.
    locator: RFC 9530 > §3 Repr-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-004
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 provides digest integrity semantics; Moonweave applies them to the package manifest.
    locator: RFC 9530 > §2 Content-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-005
    source: eng-ont-jsonld
    supports: JSON-LD defines a linked-data serialization; Moonweave treats a frozen serialization package as a derived artifact.
    locator: W3C Recommendation > §9 Data Model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-006
    source: eng-ont-prov-o
    supports: PROV-O derivation requires a distinct generated Entity state; a location alone does not create one.
    locator: W3C Recommendation > §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-007
    source: eng-ont-jsonld
    supports: JSON-LD defines a graph serialization but does not make every serialized graph a delivery package; Moonweave keeps graph semantics separate from export packaging.
    locator: W3C Recommendation > §1.1 serialization model and §5 JSON-LD data model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-008
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines algorithm-qualified digests over content and representations; Moonweave uses a digest to verify an immutable Artifact revision independently of its filename or location.
    locator: RFC 9530 > §2 Content-Digest and §3 Repr-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-009
    source: eng-ont-prov-o
    supports: ExportArtifact uses the cited specification to narrow the general immutable Artifact identity; the hierarchy placement is a reviewed Moonweave inference.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-010
    source: eng-ont-prov-o
    supports: The cited source grounds ExportArtifact's narrower semantics; it does not classify every Artifact as ExportArtifact.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-export-artifact-011
    source: eng-ont-prov-o
    supports: ExportArtifact is manually classified under Artifact because it retains independent immutable work-product identity while adding the cited narrower semantics.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

