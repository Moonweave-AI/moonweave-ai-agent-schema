schema: moonweave.ai/ontology-node/v1
id: ExportArtifact
kind: concept
status: accepted
labels: {zh: 导出工件, en: Export artifact, ja: エクスポート成果物}
semantics:
  short_definition: {zh: 一个被序列化以在其生产运行时边界外传输或消费的 Artifact。, en: An Artifact serialized for transfer or consumption outside its producing runtime boundary., ja: 生成したランタイム境界の外で転送または消費されるよう直列化された Artifact。}
  definition: {zh: ExportArtifact 是一个耐久 Entity，表示被交付到外部系统、用户或存储边界的运行时内容的打包或序列化版本。它不是传输 Activity、远程服务参与者、本地源工件或保留策略。, en: "An ExportArtifact is a durable Entity representing a packaged or serialized rendition of runtime content delivered to an external system, user, or storage boundary. It is not the transmission Activity, remote service actor, local source artifact, or retention policy.", ja: ExportArtifact は、外部システム、ユーザー、ストレージ境界へ配信されるランタイムコンテンツのパッケージ化または直列化された表現を表す耐久 Entity である。送信 Activity、リモートサービスアクター、ローカルソース成果物、保持ポリシーではない。}
  why_needed: {zh: 交付会创建具有自身格式、目的地、完整性和隐私义务的新表示。单独建模可以防止将本地源来源与实际导出的内容混淆。, en: "Delivery creates a new representation with its own format, destination, integrity, and privacy obligations. Modeling it separately prevents local source provenance from being confused with what was actually exported.", ja: 配信は独自の形式、宛先、完全性、プライバシー義務を持つ新しい表現を作る。別個にモデル化することで、ローカルソースのプロヴナンスと実際にエクスポートされたものを混同しない。}
  includes:
    - {zh: 下载包、API 导出载荷、归档文件、签名包和数据提取。, en: "Download packages, API export payloads, archive files, signed bundles, and data extracts.", ja: ダウンロードパッケージ、API エクスポートペイロード、アーカイブファイル、署名済みバンドル、データ抽出。}
    - {zh: 导出格式、目的地类别、清单、内容摘要和源工件引用。, en: "Export format, destination class, manifest, content digest, and source artifact references.", ja: エクスポート形式、宛先クラス、マニフェスト、コンテンツダイジェスト、ソース成果物参照。}
  excludes:
    - {zh: 上传或交付 Activity、网络 span、外部服务或源数据库记录。, en: "The upload or delivery Activity, a network span, an external service, or the source database record.", ja: アップロードまたは配信 Activity、ネットワーク Span、外部サービス、ソースデータベース記録。}
    - {zh: 仍位于运行时正常存储边界内的报告。, en: A report that remains inside the runtime's normal storage boundary., ja: ランタイムの通常のストレージ境界内に留まるレポート。}
  semantic_kind: entity
  aliases: [delivery package, serialized export]
engineering:
  explanation: {zh: 导出操作将选定源工件序列化为声明的媒体类型，写入清单和摘要，然后交付字节。ExportArtifact 存储包标识；交付遥测单独记录传输。, en: "An export operation serializes selected source artifacts into a declared media type, writes a manifest and digest, then delivers the bytes. The ExportArtifact stores the package identity; delivery telemetry records the transfer separately.", ja: エクスポート操作は選択したソース成果物を宣言済みメディアタイプに直列化し、マニフェストとダイジェストを書き込んでからバイトを配信する。ExportArtifact はパッケージアイデンティティを保存し、配信テレメトリーは転送を別に記録する。}
  typical_input:
    - description: {zh: 导出请求, en: Export request, ja: エクスポート要求}
      format: |-
        {"source_artifact_ids":["report-22"],"format":"application/zip","destination_class":"customer-download"}
  typical_output:
    - description: {zh: 导出包, en: Export package, ja: エクスポートパッケージ}
      format: |-
        {"artifact_id":"export-5","media_type":"application/zip","manifest_ref":"manifest-5","source_artifact_ids":["report-22"]}
  reference_implementations:
    - {name: PROV-O Entity derivation, url: https://www.w3.org/TR/prov-o/, description: A serialized rendition is a distinct Entity derived from source content.}
structure:
  identity_keys: [artifact_id, version, sha256]
  fields:
    - id: artifact_id
      labels: {zh: 导出 ID, en: Export ID, ja: エクスポート ID}
      definitions: {zh: 一个可被外部消费包的稳定标识符。, en: Stable identifier for one externally consumable package., ja: 1つの外部消費可能パッケージの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: export-5
      source_claims: [claim-export-artifact]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "导出包的声明序列化媒体类型。"
        en: "Declared serialization media type of the export package."
        ja: "エクスポートパッケージの宣言済みシリアル化メディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: application/zip
      source_claims: [claim-export-artifact]
    - id: destination_class
      labels: {zh: 目的地类别, en: Destination class, ja: 宛先クラス}
      definitions: {zh: 该导出的已分类目的地或接收者边界。, en: Categorized destination or recipient boundary for the export., ja: エクスポートの分類された宛先または受信者境界。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: customer-download
      source_claims: [claim-export-artifact]
    - id: manifest_ref
      labels: {zh: 清单引用, en: Manifest reference, ja: マニフェスト参照}
      definitions: {zh: 指向导出所表示源和条目列表的引用。, en: Reference to the list of sources and entries represented by the export., ja: エクスポートが表すソースとエントリのリストへの参照。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: manifest-5
      source_claims: [claim-export-artifact]
  constraints:
    - id: export-manifest-required
      severity: error
      language: plain
      expression: An ExportArtifact must record media type, destination class, manifest, and digest before delivery.
      explanation: {zh: 如果省略打包和内容标识，外部传输无法审计。, en: External transfer cannot be audited if packaging and content identity are omitted., ja: パッケージングとコンテンツアイデンティティを省略すると、外部転送を監査できない。}
      source_claims: [claim-export-artifact]
  required_relations: [ExportArtifact-specializes-Artifact]
examples:
  - id: export-artifact-positive
    labels: {zh: "GitHub Actions upload-artifact", en: "GitHub Actions upload artifact", ja: "GitHub Actions upload-artifact"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ExportArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ExportArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ExportArtifact provenance graph."}
    field_values: {artifact_id: export-5, media_type: application/zip, destination_class: customer-download, manifest_ref: manifest-5}
    related_node_ids: [ExportArtifact, ReportArtifact]
    related_relation_ids: []
    source_claims: [claim-export-artifact]
  - id: export-artifact-counterexample
    labels: {zh: "S3 object 非 ExportArtifact", en: "S3 object not ExportArtifact", ja: "S3 object は ExportArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ExportArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ExportArtifact.", ja: "Missing parent_run_id rejects LangSmith-style ExportArtifact."}
    field_values: {span_id: span-21}
    related_node_ids: [TraceSpan]
    related_relation_ids: []
    source_claims: [claim-export-artifact]
  - id: export-artifact-boundary
    labels: {zh: "ExportArtifact 与 ReportArtifact 边界", en: "ExportArtifact versus ReportArtifact boundary", ja: "ExportArtifact と ReportArtifact 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ExportArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ExportArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {artifact_id: export-5}
    related_node_ids: [ExportArtifact, ReportArtifact]
    related_relation_ids: []
    source_claims: [claim-export-artifact]
  - id: export-artifact-instance-export-5
    labels: {zh: "export-5 production-build 实例", en: "export-5 production-build instance", ja: "export-5 production-build 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->ExportArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->ExportArtifact.", ja: "LangSmith instance maps to ExportArtifact."}
    field_values: {artifact_id: export-5, media_type: application/zip, destination_class: customer-download, manifest_ref: manifest-5}
    related_node_ids: [ExportArtifact, ReportArtifact, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-export-artifact]
parent_relation:
  id: ExportArtifact-specializes-Artifact
  predicate: is_a
  target: concept:Artifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是导出工件, en: is an export artifact, ja: エクスポート成果物である}
  definitions: {zh: 每个 ExportArtifact 都是为交付或消费边界打包的 Artifact。, en: Every ExportArtifact is an Artifact packaged for a delivery or consumption boundary., ja: すべての ExportArtifact は配信または消費境界のためにパッケージ化された Artifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_export_artifact, labels: {zh: 具有导出工件, en: has export artifact, ja: エクスポート成果物を持つ}}
  conditions:
    - id: export-artifact-parent-condition
      severity: error
      expression: Require an external destination class and serialized package representation.
      explanations: {zh: 内部源工件在被打包用于传输前不是导出。, en: An internal source artifact is not an export until it is packaged for transfer., ja: 内部ソース成果物は転送用にパッケージ化されるまでエクスポートではない。}
      source_claims: [claim-export-artifact]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-export-artifact]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports representing a derived serialized Entity separately from its source and delivery Activity.
source_claims:
  - id: claim-export-artifact
    source: prov-o-core
    supports: PROV-O provides Entity derivation and generation patterns for representing a new serialized rendition separately from source Entities and the activity that creates it.
    locator: Section 3.1 and Section 3.2, wasDerivedFrom and wasGeneratedBy
    evidence_kind: standard
    confidence: medium

