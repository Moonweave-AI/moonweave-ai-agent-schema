schema: moonweave.ai/ontology-node/v1
id: SchemaArtifact
kind: concept
status: accepted
labels: {zh: 模式工件, en: Schema artifact, ja: スキーマ成果物}
semantics:
  short_definition: {zh: 一个包含带版本正式模式文档的 Artifact，机器可加载该文档以解释或验证结构化数据。, en: An Artifact containing a versioned formal schema document that machines can load to interpret or validate structured data., ja: 構造化データを解釈または検証するために機械が読み込める、バージョン付き正式スキーマ文書を含む Artifact。}
  definition: {zh: SchemaArtifact 是一个耐久 Entity，其内容以命名模式语言和方言声明词汇、形状、类型系统或结构契约。它是固定模式文档本身，而不是验证 Activity、验证报告、实时注册表条目或刚好符合该模式的单条数据实例。, en: "A SchemaArtifact is a durable Entity whose content declares a vocabulary, shape, type system, or structural contract in a named schema language and dialect. It is the fixed schema document itself, not a validation Activity, a validation report, a live registry entry, or a single data instance that happens to conform to it.", ja: SchemaArtifact は、名前付きスキーマ言語と方言で語彙、形状、型システム、構造契約を宣言する耐久 Entity である。固定されたスキーマ文書そのものであり、検証 Activity、検証レポート、ライブレジストリエントリ、たまたま適合する単一データインスタンスではない。}
  why_needed: {zh: 运行时契约需要可寻址的模式版本，使生产者、使用者和验证器能就同一结构达成一致，而无需从实现代码推断规则。, en: "Runtime contracts need an addressable schema version so producers, consumers, and validators can agree on the same structure without inferring rules from implementation code.", ja: ランタイム契約には参照可能なスキーマバージョンが必要であり、生成者、利用者、バリデーターは実装コードから規則を推論せず同じ構造に合意できる。}
  includes:
    - {zh: 带具体版本或摘要存储的 JSON Schema 文档、RDF Schema 词汇文档和 SHACL shapes 图。, en: "JSON Schema documents, RDF Schema vocabulary documents, and SHACL shapes graphs stored with a concrete version or digest.", ja: 具体的なバージョンまたはダイジェストで保存された JSON Schema 文書、RDF Schema 語彙文書、SHACL shapes グラフ。}
    - {zh: 模式语言、方言标识符、目标表示和耐久内容引用。, en: "Schema language, dialect identifier, target representation, and durable content reference.", ja: スキーマ言語、方言識別子、対象表現、耐久コンテンツ参照。}
  excludes:
    - {zh: 根据模式检查载荷的 Activity 或它发出的报告。, en: The Activity that checks a payload against a schema or the report it emits., ja: ペイロードをスキーマに対して検査する Activity またはそれが発行するレポート。}
    - {zh: 没有已解析文档版本的可变模式注册表标签。, en: A mutable schema registry label without a resolved document version., ja: 解決済み文書バージョンのない可変スキーマレジストリラベル。}
  semantic_kind: entity
  aliases: [schema document, contract artifact]
engineering:
  explanation: {zh: 一个构建或治理执行发出模式文档，分配版本和内容摘要，并将其作为 Artifact 发布。验证器在检查载荷前解析该固定文档，从而保持可重现的契约行为。, en: "A build or governance execution emits a schema document, assigns a version and content digest, and publishes it as an Artifact. A validator resolves that fixed document before checking a payload, preserving reproducible contract behavior.", ja: ビルドまたはガバナンス実行はスキーマ文書を発行し、バージョンとコンテンツダイジェストを割り当て、Artifact として公開する。バリデーターはペイロード検査前にその固定文書を解決し、再現可能な契約動作を保持する。}
  typical_input:
    - description: {zh: 模式发布请求, en: Schema publication request, ja: スキーマ公開要求}
      format: |-
        {"schema_language":"json-schema","dialect_uri":"https://json-schema.org/draft/2020-12/schema","version":"2026-07"}
  typical_output:
    - description: {zh: 已发布模式工件, en: Published schema artifact, ja: 公開済みスキーマ成果物}
      format: |-
        {"artifact_id":"schema-agent-output-v3","media_type":"application/schema+json","version":"3","sha256":"a5d4..."}
  reference_implementations:
    - {name: PROV-O Entity, url: https://www.w3.org/TR/prov-o/, description: Durable generated documents are modeled as Entities with fixed aspects.}
structure:
  identity_keys: [artifact_id, version]
  fields:
    - id: artifact_id
      labels: {zh: 模式工件 ID, en: Schema artifact ID, ja: スキーマ成果物 ID}
      definitions: {zh: 已发布模式文档的稳定标识符。, en: Stable identifier of the published schema document., ja: 公開済みスキーマ文書の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: schema-agent-output-v3
      source_claims: [claim-schema-artifact-entity]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "模式文档持久化表示的声明媒体类型。"
        en: "Declared media type of the persisted schema-document representation."
        ja: "永続化されたスキーマ文書表現の宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: application/schema+json
      source_claims: [claim-schema-artifact-entity]
    - id: schema_language
      labels: {zh: 模式语言, en: Schema language, ja: スキーマ言語}
      definitions: {zh: 用来表达文档契约的命名语言。, en: Named language used to express the document contract., ja: 文書契約を表現するために用いる名前付き言語。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [json-schema, rdf-schema, shacl]
      example_value: json-schema
      source_claims: [claim-schema-artifact-entity]
    - id: dialect_uri
      labels: {zh: 方言 URI, en: Dialect URI, ja: 方言 URI}
      definitions: {zh: 标识模式语言方言或版本的可选 URI。, en: Optional URI identifying the schema language dialect or version., ja: スキーマ言語の方言またはバージョンを識別する任意の URI。}
      datatype: uri
      required: false
      cardinality: {min: 0, max: 1}
      example_value: https://json-schema.org/draft/2020-12/schema
      source_claims: [claim-schema-artifact-entity]
  constraints:
    - id: schema-artifact-resolved-version
      severity: error
      language: plain
      expression: A schema reference used for validation or interchange must resolve to one immutable artifact version or content digest.
      explanation: {zh: 一个浮动注册表别名不能重现先前契约决定。, en: A floating registry alias cannot reproduce a prior contract decision., ja: 変動するレジストリエイリアスは過去の契約判断を再現できない。}
      source_claims: [claim-schema-artifact-entity]
  required_relations: [SchemaArtifact-specializes-Artifact]
examples:
  - id: schema-artifact-positive
    labels: {zh: "OpenAI function tool JSON Schema", en: "OpenAI function tool JSON Schema", ja: "OpenAI function tool JSON Schema"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; SchemaArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; SchemaArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; SchemaArtifact provenance graph."}
    field_values: {artifact_id: schema-agent-output-v3, media_type: application/schema+json, schema_language: json-schema}
    related_node_ids: [SchemaArtifact, Artifact]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-schema-artifact-entity]
  - id: schema-artifact-counterexample
    labels: {zh: "OpenAPI spec 全文非 SchemaArtifact", en: "Full OpenAPI spec not SchemaArtifact", ja: "OpenAPI spec 全文は SchemaArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style SchemaArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style SchemaArtifact.", ja: "Missing parent_run_id rejects LangSmith-style SchemaArtifact."}
    field_values: {execution_id: exec-842}
    related_node_ids: [Execution]
    related_relation_ids: []
    source_claims: [claim-schema-artifact-entity]
  - id: schema-artifact-boundary
    labels: {zh: "SchemaArtifact 子类型边界", en: "SchemaArtifact subtype boundary", ja: "SchemaArtifact サブタイプ境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SchemaArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SchemaArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {alias: current-tool-output, artifact_id: schema-agent-output-v3}
    related_node_ids: [SchemaArtifact, Artifact]
    related_relation_ids: []
    source_claims: [claim-schema-artifact-entity]
  - id: schema-artifact-instance-agent-output-v3
    labels: {zh: "agent-output-v3 schema 实例", en: "agent-output-v3 schema instance", ja: "agent-output-v3 schema 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->SchemaArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->SchemaArtifact.", ja: "LangSmith instance maps to SchemaArtifact."}
    field_values: {artifact_id: schema-agent-output-v3, media_type: application/schema+json, schema_language: json-schema, dialect_uri: https://json-schema.org/draft/2020-12/schema}
    related_node_ids: [SchemaArtifact, Artifact, Execution]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-schema-artifact-entity]
parent_relation:
  id: SchemaArtifact-specializes-Artifact
  predicate: is_a
  target: concept:Artifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是模式工件, en: is a schema artifact, ja: スキーマ成果物である}
  definitions: {zh: 每个 SchemaArtifact 都是其内容为正式模式文档的 Artifact。, en: Every SchemaArtifact is an Artifact whose content is a formal schema document., ja: すべての SchemaArtifact は、正式なスキーマ文書をコンテンツとする Artifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_schema_artifact, labels: {zh: 具有模式工件, en: has schema artifact, ja: スキーマ成果物を持つ}}
  conditions:
    - id: schema-artifact-parent-condition
      severity: error
      expression: Require a declared schema language and a resolved durable artifact version.
      explanations: {zh: 没有模式语言契约的通用文档仍是通用 Artifact。, en: Generic documents without a schema-language contract remain generic Artifacts., ja: スキーマ言語契約のない一般文書は一般的な Artifact のままである。}
      source_claims: [claim-schema-artifact-entity]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-schema-artifact-entity]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity identity and provenance boundaries for durable generated documents.
source_claims:
  - id: claim-schema-artifact-entity
    source: prov-o-core
    supports: PROV-O models a durable document with fixed aspects as an Entity, separate from the Activity that generates or uses it.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high

