source_claims:
  - id: claim-schema-artifact-001
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines schema documents, resources, dialects, and vocabularies, supplying one concrete language family beneath the format-neutral SchemaArtifact parent.
    locator: JSON Schema Draft 2020-12 Core > §4.3 Data Model and §8 The JSON Schema Core Vocabulary
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-002
    source: eng-val-shacl
    supports: SHACL defines shapes graphs in RDF and therefore demonstrates a schema representation whose identity is not a JSON Schema dialect or $id.
    locator: W3C SHACL Recommendation > §1 Introduction and §2 Shapes Graph
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-003
    source: eng-ont-rdfs
    supports: RDF Schema defines a vocabulary-description language for classes and properties, demonstrating a schema artifact whose organizing identity is a vocabulary namespace rather than JSON Schema validation keywords.
    locator: W3C RDF Schema 1.1 > §2 Classes and §3 Properties
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-004
    source: eng-val-shacl
    supports: The SHACL Recommendation defines a distinct RDF vocabulary and shapes-graph interpretation, demonstrating why the generic parent must identify its schema language without assuming JSON Schema keywords.
    locator: W3C SHACL Recommendation > §1 Introduction and §2 SHACL Core
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-005
    source: eng-val-shacl
    supports: The SHACL Recommendation defines the language and conformance profile used to interpret a shapes graph, independently of any one graph's storage location.
    locator: W3C SHACL Recommendation > §1.5 Conformance
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-006
    source: eng-val-shacl
    supports: SHACL defines shapes graphs and a conformance language distinct from JSON Schema and RDFS; Moonweave uses that distinction to instantiate the format-neutral parent and its SHACL subtype.
    locator: W3C SHACL Recommendation > §1 Introduction and §2 Shapes Graph
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-007
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core distinguishes an instance from a schema document and schema resource; Moonweave preserves that role boundary at the language-neutral parent.
    locator: JSON Schema Draft 2020-12 Core > §4.3.1 JSON Document and §4.3.2 Instance
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-008
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core distinguishes a schema document and resource from the transport or archive that may carry it.
    locator: JSON Schema Draft 2020-12 Core > §4.3.1 JSON Document and §4.3.3 JSON Schema
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-009
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines algorithm-qualified digests over content and representations; Moonweave uses a digest to verify an immutable Artifact revision independently of its filename or location.
    locator: RFC 9530 > §2 Content-Digest and §3 Repr-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-010
    source: eng-val-shacl
    supports: SHACL defines a versionable normative shapes graph distinct from the data graph; Moonweave treats that schema-language resource as an Artifact subtype while keeping SHACL-specific identity one layer lower.
    locator: W3C SHACL Recommendation > §1.2 RDF Graphs and §2 Shapes Graph
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-011
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core distinguishes JSON documents used as schema resources from JSON instances, illustrating why an arbitrary Artifact does not automatically become SchemaArtifact.
    locator: JSON Schema Draft 2020-12 Core > §4.3.1 JSON Document, §4.3.2 Instance, and §4.3.3 JSON Schema
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-012
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core distinguishes schema documents/resources from instances, providing one concrete schema-language case beneath the generic Artifact identity.
    locator: JSON Schema Draft 2020-12 Core > §4.3.1-§4.3.3
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-013
    source: eng-val-shacl
    supports: SHACL distinguishes a shapes graph from the data graph it validates, providing a second representation-independent schema-language case beneath Artifact.
    locator: W3C SHACL Recommendation > §1.2 RDF Graphs and §2 Shapes Graph
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-schema-artifact-014
    source: eng-ont-rdfs
    supports: RDF Schema defines versionable class and property vocabulary resources, providing a vocabulary-description case beneath the generic SchemaArtifact category.
    locator: W3C RDF Schema 1.1 > §2 Classes and §3 Properties
    evidence_kind: design-inference
    confidence: high
    review_status: pending
