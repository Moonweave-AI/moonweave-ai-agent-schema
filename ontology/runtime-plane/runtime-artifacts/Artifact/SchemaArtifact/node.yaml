schema: moonweave.ai/ontology-node/v1
id: SchemaArtifact
kind: concept
labels:
  zh: 模式产物
  en: schema artifact
  ja: schema 成果物
semantics:
  short_definition:
    zh: 以明确的模式语言和语言配置表达结构、词汇或验证约束的版本化产物。
    en: A versioned artifact expressing structure, vocabulary, or validation constraints in an identified schema language and language profile.
    ja: 識別された schema language と language profile で構造・語彙・validation constraint を表す版本付き成果物です。
  definition:
    zh: 模式产物是一种运行产物；其种差是规范内容由已标识的模式语言及其语言配置解释，用于声明结构、类型、词汇或验证约束。该上位概念不预设 JSON Schema 的 $schema/$id、SHACL 的 shapes graph 或 RDFS 的命名空间机制；这些语言专属身份只属于相应下位概念。
    en: A schema artifact is a runtime artifact whose canonical content is interpreted by an identified schema language and language profile to declare structure, types, vocabulary, or validation constraints. This parent does not assume JSON Schema $schema/$id, a SHACL shapes graph, or an RDFS namespace mechanism; those language-specific identities belong only to the corresponding subtypes.
    ja: schema 成果物は、識別された schema language と language profile で正規内容を解釈し、構造・型・語彙・validation constraint を宣言する実行成果物です。この上位概念は JSON Schema の $schema/$id、SHACL shapes graph、RDFS namespace 機構を仮定せず、それら language 固有 identity は対応 subtype だけに属します。
  why_needed:
    zh: 形式中立的上位概念让调用者先查询“是否为可版本化模式”，再按语言子型解释其专属标识和约束，避免把一种语言的字段错误强加给其它语言。
    en: A format-neutral parent lets callers first ask whether an artifact is a versioned schema, then interpret identifiers and constraints through a language subtype instead of imposing one language's fields on every schema.
    ja: format-neutral な parent により、まず versions 付き schema かを問い、その後 language subtype で固有 identifier/constraint を解釈でき、一言語の field を全 schema に強制しません。
  includes:
    - zh: 包含具有独立 artifact_id/version、明确 schema_language 和 language_profile 的 JSON Schema 文档、SHACL shapes graph、RDF Schema 词汇及其它模式资源。
      en: Includes JSON Schema documents, SHACL shapes graphs, RDF Schema vocabularies, and other schema resources with independent artifact_id/version plus an explicit schema_language and language_profile.
      ja: 独立 artifact_id/version と明示 schema_language/language_profile を持つ JSON Schema 文書、SHACL shapes graph、RDF Schema vocabulary 等を含みます。
  excludes:
    - zh: 不包含模式实例数据、从一次校验产生的报告或没有约束语义的字段样例。
      en: Excludes schema instance data, validation reports, and field examples without constraint semantics.
      ja: schema instance data、validation report、constraint 意味のない field example を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 SchemaArtifact 时应分别映射 E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SchemaArtifact, map E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SchemaArtifact 統合時は E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SchemaArtifact.
      format: |-
        # Example SchemaArtifact ingest
        { "schema-artifact_ref": "example-1" }
      source_claims:
        - claim-schema-artifact-design
  typical_output:
    - description: Moonweave-local SchemaArtifact projection.
      format: '{ "schema_owner": "moonweave-local-design", "schema-artifact_id": "example-1" }'
      source_claims:
        - claim-schema-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: schema_language
      labels:
        zh: 模式语言
        en: schema language
        ja: schema language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释该产物规范内容的模式或词汇语言名称。
        en: Name of the schema or vocabulary language that interprets the artifact's normative content.
        ja: artifact の規範内容を解釈する schema または vocabulary language 名です。
      allowed_values: []
      pattern: null
      example_value: SHACL
      source_claims:
        - claim-schema-artifact-design
    - id: language_profile
      labels:
        zh: 语言配置
        en: language profile
        ja: language profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 确定该语言版本、规范配置或处理约定的稳定名称或 URI；具体资源标识由语言子型另行记录。
        en: Stable name or URI selecting the language version, normative profile, or processing convention; a concrete resource identifier is recorded only by the language subtype that defines one.
        ja: language version・規範 profile・processing convention を選ぶ安定名称または URI で、具体 resource identifier はそれを定義する language subtype だけが記録します。
      allowed_values: []
      pattern: null
      example_value: W3C SHACL Recommendation
      source_claims:
        - claim-schema-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SchemaArtifact-example-positive-manual-20260716
    labels:
      zh: OpenAI function tool JSON Schema
      en: OpenAI function tool JSON Schema
      ja: OpenAI function tool JSON Schema
    descriptions:
      zh: OpenAI function calling tools=[{type:"function", function:{name:"get_weather", parameters:{type:"object", properties:{city:{type:"string"}}}}}] 映射 SchemaArtifact。
      en: OpenAI function calling tools=[{type:"function", function:{name:"get_weather", parameters:{type:"object", properties:{city:{type:"string"}}}}}] maps SchemaArtifact.
      ja: OpenAI function parameters JSON Schema が SchemaArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: artifact-shapes
      version: "2"
      content_digest: sha256:artifact-shapes-v2
      media_type: text/turtle
      schema_language: SHACL
      language_profile: W3C SHACL Recommendation
    related_node_ids:
      - SchemaArtifact
      - Artifact
    related_relation_ids:
      - SchemaArtifact-is_a-Artifact
    source_claims:
      - claim-schema-artifact-design
  - id: SchemaArtifact-example-boundary-manual-20260716
    labels:
      zh: OpenAPI spec 全文非 SchemaArtifact
      en: Full OpenAPI spec not SchemaArtifact
      ja: OpenAPI spec 全文は SchemaArtifact ではない
    descriptions:
      zh: 完整 OpenAPI 3.1 spec YAML 含 paths/servers 是 API 文档，不是单个 agent tool SchemaArtifact。
      en: Full OpenAPI 3.1 spec YAML with paths/servers is API documentation, not single agent tool SchemaArtifact.
      ja: OpenAPI spec 全文は SchemaArtifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - SchemaArtifact
      - StructuredDataBlock
    related_relation_ids: []
    source_claims:
      - claim-schema-artifact-design
  - id: SchemaArtifact-example-3
    labels:
      zh: SchemaArtifact 子类型边界
      en: SchemaArtifact subtype boundary
      ja: SchemaArtifact サブタイプ境界
    descriptions:
      zh: SchemaArtifact 基类；JSONSchemaArtifact/RDFSchemaArtifact/SHACLShapesArtifact 是子类；按 schema 语言分型。
      en: SchemaArtifact base class; JSONSchemaArtifact/RDFSchemaArtifact/SHACLShapesArtifact are subtypes; typed by schema language.
      ja: SchemaArtifact 子类型按 schema 语言分离。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - SchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-schema-artifact-vendor
      - claim-schema-artifact-design
  - id: SchemaArtifact-example-4
    labels:
      zh: agent-output-v3 schema 实例
      en: agent-output-v3 schema instance
      ja: agent-output-v3 schema 事例
    descriptions:
      zh: SchemaArtifact artifact_id=agent-output-v3、schema_kind=json_schema、validates=agent_final_output。
      en: SchemaArtifact artifact_id=agent-output-v3, schema_kind=json_schema, validates=agent_final_output.
      ja: agent-output-v3 SchemaArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - SchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-schema-artifact-vendor
      - claim-schema-artifact-design
parent_relation:
  id: SchemaArtifact-is_a-Artifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 模式产物具有 Artifact 的独立版本、摘要和生成谱系，并以 schema_language、language_profile 及规范性结构、词汇或验证内容进一步特化；语言专属标识由下一层子类承载。
    en: A schema artifact has independent Artifact revision, digest, and generation provenance and is further specialized by schema_language, language_profile, and normative structural, vocabulary, or validation content; language-specific identifiers remain on the next subtype layer.
    ja: schema 成果物は Artifact の独立 revision・digest・generation provenance を持ち、schema_language・language_profile・規範 structure/vocabulary/validation 内容で特殊化され、language 固有 identifier は次 subtype layer に保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-schema-artifact-design
    - claim-schema-artifact-design
    - claim-schema-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://www.e2b.dev/docs/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-schema-artifact-vendor
    source: src-e2b-files
    supports: runtime-artifacts vendor evidence supports SchemaArtifact identity and boundary mapping.
    locator: SchemaArtifact integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-schema-artifact-design
    source: src-runtime-artifacts-design
    supports: Moonweave SchemaArtifact concept boundary within runtime-artifacts.
    locator: SchemaArtifact boundary
    evidence_kind: design-inference
    confidence: high
