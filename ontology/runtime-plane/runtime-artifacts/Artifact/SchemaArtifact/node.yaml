schema: moonweave.ai/ontology-node/v1
id: SchemaArtifact
kind: concept
status: review
labels:
  zh: 模式产物
  en: schema artifact
  ja: schema 成果物
semantics:
  short_definition:
    zh: 以明确的模式语言和语言配置表达结构、词汇或验证约束的版本化产物。
    en: A versioned artifact expressing structure, vocabulary, or validation constraints in an identified schema language and language profile.
    ja: 識別された schema language と language profile で構造・語彙・validation constraint を表す版本付き成果物です。
  definition:
    zh: 模式产物是一种运行产物；其种差是规范内容由已标识的模式语言及其语言配置解释，用于声明结构、类型、词汇或验证约束。该上位概念不预设 JSON Schema 的 $schema/$id、SHACL 的 shapes graph 或 RDFS 的命名空间机制；这些语言专属身份只属于相应下位概念。
    en: A schema artifact is a runtime artifact whose canonical content is interpreted by an identified schema language and language profile to declare structure, types, vocabulary, or validation constraints. This parent does not assume JSON Schema $schema/$id, a SHACL shapes graph, or an RDFS namespace mechanism; those language-specific identities belong only to the corresponding subtypes.
    ja: schema 成果物は、識別された schema language と language profile で正規内容を解釈し、構造・型・語彙・validation constraint を宣言する実行成果物です。この上位概念は JSON Schema の $schema/$id、SHACL shapes graph、RDFS namespace 機構を仮定せず、それら language 固有 identity は対応 subtype だけに属します。
  why_needed:
    zh: 形式中立的上位概念让调用者先查询“是否为可版本化模式”，再按语言子型解释其专属标识和约束，避免把一种语言的字段错误强加给其它语言。
    en: A format-neutral parent lets callers first ask whether an artifact is a versioned schema, then interpret identifiers and constraints through a language subtype instead of imposing one language's fields on every schema.
    ja: format-neutral な parent により、まず versions 付き schema かを問い、その後 language subtype で固有 identifier/constraint を解釈でき、一言語の field を全 schema に強制しません。
  includes:
    - zh: 包含具有独立 artifact_id/version、明确 schema_language 和 language_profile 的 JSON Schema 文档、SHACL shapes graph、RDF Schema 词汇及其它模式资源。
      en: Includes JSON Schema documents, SHACL shapes graphs, RDF Schema vocabularies, and other schema resources with independent artifact_id/version plus an explicit schema_language and language_profile.
      ja: 独立 artifact_id/version と明示 schema_language/language_profile を持つ JSON Schema 文書、SHACL shapes graph、RDF Schema vocabulary 等を含みます。
  excludes:
    - zh: 不包含模式实例数据、从一次校验产生的报告或没有约束语义的字段样例。
      en: Excludes schema instance data, validation reports, and field examples without constraint semantics.
      ja: schema instance data、validation report、constraint 意味のない field example を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: schema_language
      labels:
        zh: 模式语言
        en: schema language
        ja: schema language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释该产物规范内容的模式或词汇语言名称。
        en: Name of the schema or vocabulary language that interprets the artifact's normative content.
        ja: artifact の規範内容を解釈する schema または vocabulary language 名です。
      allowed_values: []
      pattern: null
      example_value: SHACL
      source_claims:
        - claim-schema-artifact-004
    - id: language_profile
      labels:
        zh: 语言配置
        en: language profile
        ja: language profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 确定该语言版本、规范配置或处理约定的稳定名称或 URI；具体资源标识由语言子型另行记录。
        en: Stable name or URI selecting the language version, normative profile, or processing convention; a concrete resource identifier is recorded only by the language subtype that defines one.
        ja: language version・規範 profile・processing convention を選ぶ安定名称または URI で、具体 resource identifier はそれを定義する language subtype だけが記録します。
      allowed_values: []
      pattern: null
      example_value: W3C SHACL Recommendation
      source_claims:
        - claim-schema-artifact-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: SchemaArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 声明语言的模式产物
      en: Schema artifact with an explicit language
      ja: language 明示 schema 成果物
    scenario_id: null
    descriptions:
      zh: artifact-shapes@2 具有独立版本和摘要，并将 schema_language 声明为 SHACL、language_profile 声明为 W3C SHACL Recommendation；具体 shapes graph 标识由 SHACLShapesArtifact 子型解释。
      en: artifact-shapes@2 has an independent revision and digest, declares schema_language SHACL and language_profile W3C SHACL Recommendation; its concrete shapes-graph identity is interpreted by the SHACLShapesArtifact subtype.
      ja: artifact-shapes@2 は独立 revision/digest を持ち、schema_language=SHACL、language_profile=W3C SHACL Recommendation を宣言し、具体 shapes graph identity は SHACLShapesArtifact subtype が解釈します。
    field_values:
      artifact_id: artifact-shapes
      version: "2"
      content_digest: sha256:artifact-shapes-v2
      media_type: text/turtle
      schema_language: SHACL
      language_profile: W3C SHACL Recommendation
    related_node_ids:
      - SchemaArtifact
      - Artifact
    related_relation_ids:
      - SchemaArtifact-is_a-Artifact
    expected_result:
      zh: 先归入 SchemaArtifact，再依据 SHACL 专属字段归入 SHACLShapesArtifact。
      en: Classify it first as SchemaArtifact and then as SHACLShapesArtifact using the SHACL-specific fields.
      ja: まず SchemaArtifact、次に SHACL 固有 field から SHACLShapesArtifact に分類します。
    why_valid_or_invalid:
      zh: 上位概念只要求明确语言及配置，不把 SHACL 的图标识误写成所有模式都共有的字段。
      en: The parent requires an explicit language and profile without misrepresenting a SHACL graph identifier as a field shared by every schema.
      ja: parent は language/profile を要求しますが、SHACL graph identifier を全 schema 共通 field と誤認しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-artifact-006
  - id: SchemaArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 符合模式的数据实例
      en: Conforming data instance
      ja: schema 適合 data instance
    scenario_id: null
    descriptions:
      zh: artifact.json 只有 artifact_id、version 和 digest 值，既未声明 schema_language/language_profile，也没有任何模式或词汇约束内容。
      en: artifact.json contains artifact_id, version, and digest values but declares no schema_language or language_profile and contains no schema or vocabulary constraints.
      ja: artifact.json は artifact_id・version・digest 値だけで、schema_language/language_profile も schema/vocabulary constraint も宣言しません。
    field_values: {}
    related_node_ids:
      - SchemaArtifact
      - StructuredDataBlock
    related_relation_ids: []
    expected_result:
      zh: 归为结构化数据实例，不得归入 SchemaArtifact。
      en: Classify it as a structured data instance, not SchemaArtifact.
      ja: structured data instance とし SchemaArtifact に分類しません。
    why_valid_or_invalid:
      zh: 符合某模式与定义模式是不同角色，实例内容不声明验证语义。
      en: Conforming to a schema and defining a schema are different roles; instance content does not declare validation semantics.
      ja: schema 適合と schema 定義は異なる役割で、instance 内容は validation 意味を宣言しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-artifact-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ExportArtifact
    shared_parent_concept_id: Artifact
    differentia:
      zh: SchemaArtifact 由模式语言、语言配置与规范约束内容界定；ExportArtifact 由导出格式、成员清单及被导出源版本界定。导出包可以包含模式，但包是交付容器，模式是结构、词汇或验证规则。
      en: SchemaArtifact is delimited by schema language, language profile, and normative constraint content; ExportArtifact is delimited by export format, member manifest, and exported source revision. An export package may contain a schema, but the package is a delivery container while the schema defines structure, vocabulary, or validation rules.
      ja: SchemaArtifact は schema language・language profile・規範 constraint 内容で区切り、ExportArtifact は export format・member manifest・export 元 revision で区切ります。export package が schema を含んでも package は納品 container、schema は構造・語彙・validation rule です。
    source_claims:
      - claim-schema-artifact-008
      - claim-schema-artifact-009
parent_relation:
  id: SchemaArtifact-is_a-Artifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 模式产物具有 Artifact 的独立版本、摘要和生成谱系，并以 schema_language、language_profile 及规范性结构、词汇或验证内容进一步特化；语言专属标识由下一层子类承载。
    en: A schema artifact has independent Artifact revision, digest, and generation provenance and is further specialized by schema_language, language_profile, and normative structural, vocabulary, or validation content; language-specific identifiers remain on the next subtype layer.
    ja: schema 成果物は Artifact の独立 revision・digest・generation provenance を持ち、schema_language・language_profile・規範 structure/vocabulary/validation 内容で特殊化され、language 固有 identifier は次 subtype layer に保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SchemaArtifact-is_a-Artifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: SchemaArtifact 子类正例
        en: Positive SchemaArtifact specialization
        ja: SchemaArtifact 特殊化の正例
      scenario_id: null
      descriptions:
        zh: tool-shapes@2 具有 Artifact 的 artifact_id、version、摘要与生成谱系，同时声明 schema_language=SHACL 和明确 language_profile；SHACL 图专属标识留给下一层。
        en: tool-shapes@2 has Artifact artifact_id, version, digest, and generation provenance while declaring schema_language SHACL and an explicit language_profile; its SHACL graph identifier remains on the next layer.
        ja: tool-shapes@2 は Artifact の artifact_id・version・digest・generation provenance と schema_language=SHACL・明示 language_profile を持ち、SHACL graph identifier は次 layer に保持します。
      field_values:
        schema_language: SHACL
        language_profile: W3C SHACL Recommendation
      related_node_ids:
        - SchemaArtifact
        - Artifact
      related_relation_ids:
        - SchemaArtifact-is_a-Artifact
      expected_result:
        zh: 可沿 SchemaArtifact→Artifact 继承通用产物语义。
        en: It inherits common artifact semantics along SchemaArtifact-to-Artifact.
        ja: SchemaArtifact→Artifact に沿い共通成果物意味を継承します。
      why_valid_or_invalid:
        zh: 子类完整满足父类身份条件并增加更窄种差。
        en: The subtype fully satisfies parent identity and adds a narrower differentia.
        ja: subtype は parent 同一性を完全に満たしより狭い種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-schema-artifact-010
    - id: SchemaArtifact-is_a-Artifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: SchemaArtifact 子类边界
        en: Boundary for SchemaArtifact specialization
        ja: SchemaArtifact 特殊化の境界
      scenario_id: null
      descriptions:
        zh: 一个普通 Artifact 版本缺少 SchemaArtifact 的专属身份字段或内容语义。
        en: A generic Artifact revision lacks the identity fields or content semantics specific to SchemaArtifact.
        ja: 一般 Artifact revision は SchemaArtifact 固有の同一性 field または content 意味を欠きます。
      field_values: {}
      related_node_ids:
        - SchemaArtifact
        - Artifact
      related_relation_ids:
        - SchemaArtifact-is_a-Artifact
      expected_result:
        zh: 保持为 Artifact，不得反向归入 SchemaArtifact。
        en: Keep it as Artifact and do not reverse-classify it as SchemaArtifact.
        ja: Artifact のままとし SchemaArtifact へ逆分類しません。
      why_valid_or_invalid:
        zh: 继承只从下位概念推向上位概念，父类成员不自动满足子类种差。
        en: Inheritance runs from subtype to parent; parent membership does not automatically satisfy subtype differentia.
        ja: 継承は subtype から parent へ進み parent 所属だけで subtype 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-schema-artifact-011
  source_claims:
    - claim-schema-artifact-012
    - claim-schema-artifact-013
    - claim-schema-artifact-014
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
