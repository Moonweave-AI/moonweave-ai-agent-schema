schema: moonweave.ai/ontology-node/v1
id: RDFSchemaArtifact
kind: concept
labels:
  zh: RDF Schema 词汇产物
  en: RDF Schema artifact
  ja: RDF Schema 成果物
semantics:
  short_definition:
    zh: 以 RDF Schema 类与属性词汇描述 RDF 资源语义的模式产物。
    en: A schema artifact describing RDF resource semantics with RDF Schema class and property vocabulary.
    ja: RDF Schema の class/property vocabulary で RDF resource 意味を記述する schema 成果物です。
  definition:
    zh: RDF Schema 词汇产物是一种 SchemaArtifact；其种差是规范图在稳定词汇命名空间中声明 rdfs:Class、rdf:Property 及 subClassOf、subPropertyOf、domain、range 等词汇关系。它描述词汇与推理语义，不因采用 Turtle/JSON-LD 等序列化而改变身份，也不自动成为 SHACL 约束图。
    en: An RDF Schema artifact is a SchemaArtifact whose normative graph declares rdfs:Class, rdf:Property, and vocabulary relations such as subClassOf, subPropertyOf, domain, and range in a stable vocabulary namespace. It describes vocabulary and entailment semantics, does not change identity with Turtle or JSON-LD serialization, and is not automatically a SHACL constraints graph.
    ja: RDF Schema 成果物は SchemaArtifact の一種で、安定 vocabulary namespace 内で rdfs:Class・rdf:Property・subClassOf・subPropertyOf・domain・range 等を宣言する規範 graph です。vocabulary/entailment 意味を記述し、Turtle/JSON-LD 表現で identity は変わらず、自動的に SHACL constraint graph にはなりません。
  why_needed:
    zh: 把词汇命名空间与 RDF 序列化明确建模，才能区分“定义类和属性含义”的 RDFS 产物与“验证数据是否满足约束”的 SHACL 产物。
    en: Explicit vocabulary-namespace and RDF-serialization fields distinguish an RDFS artifact that defines class/property meaning from a SHACL artifact that validates data against constraints.
    ja: vocabulary namespace と RDF serialization を明示し、class/property 意味を定義する RDFS artifact と constraint 検証を行う SHACL artifact を区別します。
  includes:
    - zh: 包含具有独立 artifact_id/version、稳定 vocabulary_namespace_uri、RDF 媒体类型，并声明类、属性、继承、domain 或 range 的词汇图。
      en: Includes vocabulary graphs with independent artifact_id/version, a stable vocabulary_namespace_uri, an RDF media type, and declarations of classes, properties, inheritance, domain, or range.
      ja: 独立 artifact_id/version、安定 vocabulary_namespace_uri、RDF media type、class/property/inheritance/domain/range 宣言を持つ vocabulary graph を含みます。
  excludes:
    - zh: 不包含只使用该词汇的实例数据图、主要由 SHACL shape/target/constraint 构成的验证图、OWL 本体的完整专属表达能力，或普通 JSON Schema 文档。
      en: Excludes instance data graphs that merely use the vocabulary, validation graphs principally composed of SHACL shapes/targets/constraints, OWL-specific expressivity as a whole, and ordinary JSON Schema documents.
      ja: vocabulary を使うだけの instance data graph、SHACL shape/target/constraint 主体の validation graph、OWL 固有表現力全体、一般 JSON Schema 文書を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 RDFSchemaArtifact 时应分别映射 E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating RDFSchemaArtifact, map E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: RDFSchemaArtifact 統合時は E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to RDFSchemaArtifact.
      format: |-
        # Example RDFSchemaArtifact ingest
        { "rdfschema-artifact_ref": "example-1" }
      source_claims:
        - claim-rdfschema-artifact-design
  typical_output:
    - description: Moonweave-local RDFSchemaArtifact projection.
      format: '{ "schema_owner": "moonweave-local-design", "rdfschema-artifact_id": "example-1" }'
      source_claims:
        - claim-rdfschema-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://e2b.dev/docs/sandbox/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: vocabulary_namespace_uri
      labels:
        zh: 词汇命名空间 URI
        en: vocabulary namespace URI
        ja: vocabulary namespace URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用于生成并解释该 RDFS 词汇中类与属性 URI 的稳定命名空间。
        en: Stable namespace used to mint and interpret class and property URIs in this RDFS vocabulary.
        ja: この RDFS vocabulary の class/property URI を生成・解釈する安定 namespace です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://moonweave.ai/vocab/agent-runtime#
      source_claims:
        - claim-rdfschema-artifact-design
    - id: serialization_media_type
      labels:
        zh: 序列化媒体类型
        en: serialization media type
        ja: serialization media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前 RDFS 图字节表示的 RDF 媒体类型；同一词汇可有不同序列化而保持同一逻辑版本。
        en: RDF media type of the current byte representation; the same vocabulary can have different serializations while retaining one logical revision.
        ja: 現在の RDFS graph byte 表現の RDF media type で、同一 vocabulary は異なる serialization でも同じ論理 revision を保てます。
      allowed_values: []
      pattern: ^[a-z0-9.+-]+/[a-z0-9.+-]+$
      example_value: text/turtle
      source_claims:
        - claim-rdfschema-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: RDFSchemaArtifact-example-positive-manual-20260716
    labels:
      zh: W3C RDF Schema 导出
      en: W3C RDF Schema export
      ja: W3C RDF Schema エクスポート
    descriptions:
      zh: W3C RDF/RDFS 导出 runtime-plane 类层次：rdfs:Class Execution、rdfs:subClassOf prov:Activity；RDFSchemaArtifact artifact_id=rdfs-runtime-v1、format=ttl。
      en: "W3C RDF/RDFS export runtime-plane class hierarchy: rdfs:Class Execution, rdfs:subClassOf prov:Activity; RDFSchemaArtifact artifact_id=rdfs-runtime-v1, format=ttl."
      ja: W3C RDFS 导出が RDFSchemaArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values:
      artifact_id: agent-runtime-vocabulary
      version: "4"
      content_digest: sha256:agent-runtime-vocabulary-v4
      media_type: text/turtle
      schema_language: RDFS
      language_profile: RDF Schema 1.1
      vocabulary_namespace_uri: https://moonweave.ai/vocab/agent-runtime#
      serialization_media_type: text/turtle
    related_node_ids:
      - RDFSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - RDFSchemaArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-rdfschema-artifact-design
  - id: RDFSchemaArtifact-example-boundary-manual-20260716
    labels:
      zh: JSON-LD @context 片段非完整 RDFS
      en: JSON-LD context snippet not full RDFS
      ja: JSON-LD @context 断片は完全 RDFS ではない
    descriptions:
      zh: JSON-LD @context {"Execution":"mw:Execution"} 是 context 片段，不是完整 RDFS ontology 导出 RDFSchemaArtifact。
      en: JSON-LD @context {"Execution":"mw:Execution"} is context snippet, not complete RDFS ontology export RDFSchemaArtifact.
      ja: "@context 断片は RDFSchemaArtifact ではない。"
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values:
      serialization_media_type: text/turtle
      uses_namespace: https://moonweave.ai/vocab/agent-runtime#
    related_node_ids:
      - RDFSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - RDFSchemaArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-rdfschema-artifact-design
  - id: RDFSchemaArtifact-example-3
    labels:
      zh: RDFSchema 与 JSONSchema 边界
      en: RDFSchema versus JSONSchema boundary
      ja: RDFSchema と JSONSchema 境界
    descriptions:
      zh: RDFSchemaArtifact 是 RDF/RDFS 结构 schema；JSONSchemaArtifact 是 JSON Schema；ontology 导出与 agent tool schema 分离。
      en: RDFSchemaArtifact is RDF/RDFS structure schema; JSONSchemaArtifact is JSON Schema; ontology export separated from agent tool schema.
      ja: RDFSchema と JSONSchema は分離する。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - RDFSchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-rdfschema-artifact-vendor
      - claim-rdfschema-artifact-design
  - id: RDFSchemaArtifact-example-4
    labels:
      zh: rdfs-runtime-v1 导出实例
      en: rdfs-runtime-v1 export instance
      ja: rdfs-runtime-v1 エクスポート事例
    descriptions:
      zh: RDFSchemaArtifact artifact_id=rdfs-runtime-v1、format=text/turtle、class_count=73。
      en: RDFSchemaArtifact artifact_id=rdfs-runtime-v1, format=text/turtle, class_count=73.
      ja: rdfs-runtime-v1 RDFSchemaArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - RDFSchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-rdfschema-artifact-vendor
      - claim-rdfschema-artifact-design
parent_relation:
  id: RDFSchemaArtifact-is_a-SchemaArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种模式产物
    en: is a schema artifact
    ja: schema 成果物の一種
  definitions:
    zh: 该分类事实表示每个 RDFSchemaArtifact 都继承 SchemaArtifact 的可版本化模式身份，并以稳定词汇命名空间及 RDFS class/property/subClassOf/domain/range 语义增加更窄种差。
    en: This classification states that every RDFSchemaArtifact inherits versioned schema identity from SchemaArtifact and adds the narrower differentia of a stable vocabulary namespace plus RDFS class/property/subClassOf/domain/range semantics.
    ja: この分類は全 RDFSchemaArtifact が SchemaArtifact の版本付き schema identity を継承し、安定 vocabulary namespace と RDFS class/property/subClassOf/domain/range 意味の狭い種差を加えることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation cardinality を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有 RDF Schema 子型
      en: has RDF Schema subtype
      ja: 逆方向：RDF Schema subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-rdfschema-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://e2b.dev/docs/sandbox/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-rdfschema-artifact-vendor
    source: src-e2b-files
    supports: runtime-artifacts vendor evidence supports RDFSchemaArtifact identity and boundary mapping.
    locator: RDFSchemaArtifact integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-rdfschema-artifact-design
    source: src-runtime-artifacts-design
    supports: Moonweave RDFSchemaArtifact concept boundary within runtime-artifacts.
    locator: RDFSchemaArtifact boundary
    evidence_kind: design-inference
    confidence: high
