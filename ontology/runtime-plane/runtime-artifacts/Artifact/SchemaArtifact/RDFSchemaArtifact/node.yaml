schema: moonweave.ai/ontology-node/v1
id: RDFSchemaArtifact
kind: concept
status: accepted
labels: {zh: RDF Schema 工件, en: RDF Schema artifact, ja: RDF Schema 成果物}
semantics:
  short_definition: {zh: 一个发布 RDF 类、属性及其预期使用的 RDF Schema 词汇定义的 SchemaArtifact。, en: "A SchemaArtifact that publishes RDF Schema vocabulary definitions for RDF classes, properties, and their intended use.", ja: RDF クラス、プロパティ、およびその意図された使用の RDF Schema 語彙定義を公開する SchemaArtifact。}
  definition: {zh: RDFSchemaArtifact 是一个耐久 Entity，包含声明类、属性、域、范围、标签和注释等 RDF Schema 资源的 RDF 图。它是带版本词汇文档，而不是任意 RDF 数据图、SPARQL 查询、图遍历 Activity 或 OWL 推理结果。, en: "An RDFSchemaArtifact is a durable Entity containing an RDF graph that declares RDF Schema resources such as classes, properties, domains, ranges, labels, and comments. It is the versioned vocabulary document, not an arbitrary RDF data graph, a SPARQL query, a graph traversal Activity, or an OWL reasoning result.", ja: RDFSchemaArtifact は、クラス、プロパティ、ドメイン、レンジ、ラベル、コメントなどの RDF Schema リソースを宣言する RDF グラフを含む耐久 Entity である。バージョン付き語彙文書であり、任意の RDF データグラフ、SPARQL クエリ、グラフ走査 Activity、OWL 推論結果ではない。}
  why_needed: {zh: 语义交换需要带版本词汇工件，使 RDF 生产者和使用者能解析相同的类和属性语义，而不是依赖未文档化标识符。, en: Semantic interchange needs a versioned vocabulary artifact so RDF producers and consumers can resolve the same class and property meanings rather than relying on undocumented identifiers., ja: 意味的相互運用にはバージョン付き語彙成果物が必要であり、RDF 生成者と利用者は文書化されていない識別子に頼らず同じクラスとプロパティの意味を解決できる。}
  includes:
    - {zh: 以 Turtle、RDF/XML、JSON-LD 或其他 RDF 语法序列化的 RDF Schema 类和属性定义。, en: "RDF Schema class and property definitions serialized in Turtle, RDF/XML, JSON-LD, or another RDF syntax.", ja: Turtle、RDF/XML、JSON-LD、その他の RDF 構文で直列化された RDF Schema クラスとプロパティ定義。}
    - {zh: 命名空间 URI、序列化媒体类型以及 rdfs:Class 和 rdf:Property 等已声明词汇资源。, en: "Namespace URI, serialization media type, and declared vocabulary resources such as rdfs:Class and rdf:Property.", ja: 名前空間 URI、直列化メディアタイプ、rdfs:Class や rdf:Property などの宣言済み語彙リソース。}
  excludes:
    - {zh: 使用词汇但不定义它的实例数据图。, en: An instance data graph that uses a vocabulary but does not define it., ja: 語彙を使用するが定義しないインスタンスデータグラフ。}
    - {zh: SHACL 约束、需要 OWL 语义的 OWL 本体或实时图存储。, en: "SHACL constraints, an OWL ontology requiring OWL semantics, or a live graph store.", ja: SHACL 制約、OWL 意味を必要とする OWL オントロジー、ライブグラフストア。}
  semantic_kind: entity
  aliases: [RDFS document, RDF vocabulary artifact]
engineering:
  explanation: {zh: 词汇构建写入定义类和属性的 RDF 三元组，发布命名空间/版本 URI 和摘要，并让生成工件可供 RDF 序列化器和验证器使用。使用者将工件作为固定词汇契约，而实例图仍是独立 Artifact。, en: "A vocabulary build writes RDF triples that define classes and properties, publishes a namespace/version URI and digest, and makes the resulting artifact available to RDF serializers and validators. Consumers use the artifact as a fixed vocabulary contract, while instance graphs remain separate Artifacts.", ja: 語彙ビルドはクラスとプロパティを定義する RDF トリプルを書き、名前空間／バージョン URI とダイジェストを公開し、結果の成果物を RDF シリアライザーとバリデーターに提供する。利用者は成果物を固定語彙契約として使用し、インスタンスグラフは別個の Artifact のままである。}
  typical_input:
    - description: {zh: 词汇定义, en: Vocabulary definitions, ja: 語彙定義}
      format: |-
        {"namespace_uri":"https://schemas.example.test/runtime#","classes":["Execution"],"properties":["generatedArtifact"]}
  typical_output:
    - description: {zh: RDF Schema 工件, en: RDF Schema artifact, ja: RDF Schema 成果物}
      format: |-
        {"artifact_id":"rdfs-runtime-v1","serialization":"text/turtle","namespace_uri":"https://schemas.example.test/runtime#"}
  reference_implementations:
    - {name: RDF Schema 1.1, url: https://www.w3.org/TR/rdf-schema/, description: "Defines the RDF vocabulary for classes, properties, domains, and ranges."}
structure:
  identity_keys: [artifact_id, version, namespace_uri]
  fields:
    - id: artifact_id
      labels: {zh: RDF Schema 工件 ID, en: RDF Schema artifact ID, ja: RDF Schema 成果物 ID}
      definitions: {zh: 持久化 RDF 词汇文档的稳定标识符。, en: Stable identifier of the persisted RDF vocabulary document., ja: 永続化された RDF 語彙文書の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: rdfs-runtime-v1
      source_claims: [claim-rdf-schema-vocabulary]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "RDF Schema 文档持久化表示的声明媒体类型。"
        en: "Declared media type of the persisted RDF Schema document representation."
        ja: "永続化された RDF Schema 文書表現の宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [text/turtle, application/rdf+xml, application/ld+json]
      example_value: text/turtle
      source_claims: [claim-rdf-schema-vocabulary]
    - id: schema_language
      labels:
        zh: "模式语言"
        en: "Schema language"
        ja: "スキーマ言語"
      definitions:
        zh: "固定为 rdf-schema，以保留从 SchemaArtifact 继承的模式语言契约。"
        en: "Fixed to rdf-schema to retain the schema-language contract inherited from SchemaArtifact."
        ja: "SchemaArtifact から継承したスキーマ言語契約を保持するため rdf-schema に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [rdf-schema]
      example_value: rdf-schema
      source_claims: [claim-rdf-schema-vocabulary]
    - id: namespace_uri
      labels: {zh: 词汇命名空间 URI, en: Vocabulary namespace URI, ja: 語彙名前空間 URI}
      definitions: {zh: 用于标识本工件定义的词汇类和属性的命名空间。, en: Namespace used to identify vocabulary classes and properties defined by this artifact., ja: この成果物が定義する語彙クラスとプロパティを識別する名前空間。}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      example_value: https://schemas.example.test/runtime#
      source_claims: [claim-rdf-schema-vocabulary]
    - id: serialization
      labels: {zh: RDF 序列化, en: RDF serialization, ja: RDF 直列化}
      definitions: {zh: 用于持久化词汇图的 RDF 具体语法。, en: RDF concrete syntax used to persist the vocabulary graph., ja: 語彙グラフを永続化するための RDF 具体構文。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [text/turtle, application/rdf+xml, application/ld+json]
      example_value: text/turtle
      source_claims: [claim-rdf-schema-vocabulary]
  constraints:
    - id: rdf-schema-artifact-vocabulary-content
      severity: error
      language: plain
      expression: The RDF graph must declare at least one vocabulary class or property in the artifact namespace; instance triples alone are insufficient.
      explanation: {zh: 该节点表示模式词汇，而不是任意 RDF 数据。, en: "The node represents a schema vocabulary, not arbitrary RDF data.", ja: このノードは任意の RDF データではなくスキーマ語彙を表す。}
      source_claims: [claim-rdf-schema-vocabulary]
  required_relations: [RDFSchemaArtifact-specializes-SchemaArtifact]
examples:
  - id: rdf-schema-artifact-positive
    labels: {zh: "W3C RDF Schema 导出", en: "W3C RDF Schema export", ja: "W3C RDF Schema エクスポート"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RDFSchemaArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RDFSchemaArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RDFSchemaArtifact provenance graph."}
    field_values: {artifact_id: rdfs-runtime-v1, media_type: text/turtle, schema_language: rdf-schema, namespace_uri: https://schemas.example.test/runtime#, serialization: text/turtle}
    related_node_ids: [RDFSchemaArtifact, SchemaArtifact]
    related_relation_ids: [RDFSchemaArtifact-specializes-SchemaArtifact]
    source_claims: [claim-rdf-schema-vocabulary]
  - id: rdf-schema-artifact-counterexample
    labels: {zh: "JSON-LD @context 片段非完整 RDFS", en: "JSON-LD context snippet not full RDFS", ja: "JSON-LD @context 断片は完全 RDFS ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style RDFSchemaArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style RDFSchemaArtifact.", ja: "Missing parent_run_id rejects LangSmith-style RDFSchemaArtifact."}
    field_values: {serialization: text/turtle}
    related_node_ids: [GraphArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-rdf-schema-vocabulary]
  - id: rdf-schema-artifact-boundary
    labels: {zh: "RDFSchema 与 JSONSchema 边界", en: "RDFSchema versus JSONSchema boundary", ja: "RDFSchema と JSONSchema 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RDFSchemaArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RDFSchemaArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {namespace_uri: https://schemas.example.test/runtime#}
    related_node_ids: [RDFSchemaArtifact, SHACLShapesArtifact]
    related_relation_ids: []
    source_claims: [claim-rdf-schema-vocabulary]
  - id: rdf-schema-artifact-instance-rdfs-runtime-v1
    labels: {zh: "rdfs-runtime-v1 导出实例", en: "rdfs-runtime-v1 export instance", ja: "rdfs-runtime-v1 エクスポート事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->RDFSchemaArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->RDFSchemaArtifact.", ja: "LangSmith instance maps to RDFSchemaArtifact."}
    field_values: {artifact_id: rdfs-runtime-v1, media_type: text/turtle, schema_language: rdf-schema, namespace_uri: https://schemas.example.test/runtime#, serialization: text/turtle}
    related_node_ids: [RDFSchemaArtifact, Artifact]
    related_relation_ids: [RDFSchemaArtifact-specializes-SchemaArtifact]
    source_claims: [claim-rdf-schema-vocabulary]
parent_relation:
  id: RDFSchemaArtifact-specializes-SchemaArtifact
  predicate: is_a
  target: concept:SchemaArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 RDF Schema 工件, en: is an RDF Schema artifact, ja: RDF Schema 成果物である}
  definitions: {zh: 每个 RDFSchemaArtifact 都是 RDF 内容定义词汇类或属性的 SchemaArtifact。, en: Every RDFSchemaArtifact is a SchemaArtifact whose RDF content defines vocabulary classes or properties., ja: すべての RDFSchemaArtifact は、RDF コンテンツが語彙クラスまたはプロパティを定義する SchemaArtifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_rdf_schema_artifact, labels: {zh: 具有 RDF Schema 工件, en: has RDF Schema artifact, ja: RDF Schema 成果物を持つ}}
  conditions:
    - id: rdf-schema-artifact-parent-condition
      severity: error
      expression: Require RDF Schema vocabulary declarations and an RDF serialization, not only instance triples.
      explanations: {zh: 该子类型由模式词汇内容定义。, en: The subtype is defined by schema vocabulary content., ja: このサブタイプはスキーマ語彙コンテンツにより定義される。}
      source_claims: [claim-rdf-schema-vocabulary]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-rdf-schema-vocabulary]
relations: []
sources:
  - id: rdf-schema-1-1
    title: "RDF Schema 1.1"
    url: https://www.w3.org/TR/rdf-schema/
    source_type: standard
    relevance: Defines RDF Schema resources for classes, properties, domains, ranges, labels, and comments.
source_claims:
  - id: claim-rdf-schema-vocabulary
    source: rdf-schema-1-1
    supports: RDF Schema provides vocabulary for describing classes and properties and their intended use in RDF graphs.
    locator: Sections 2 and 3
    evidence_kind: standard
    confidence: high

