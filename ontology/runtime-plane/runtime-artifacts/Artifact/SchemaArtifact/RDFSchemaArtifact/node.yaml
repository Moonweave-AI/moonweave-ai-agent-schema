schema: moonweave.ai/ontology-node/v1
id: RDFSchemaArtifact
kind: concept
status: accepted
labels:
  zh: RDF Schema 词汇产物
  en: RDF Schema artifact
  ja: RDF Schema 成果物
semantics:
  short_definition:
    zh: 以 RDF Schema 类与属性词汇描述 RDF 资源语义的模式产物。
    en: A schema artifact describing RDF resource semantics with RDF Schema class and property vocabulary.
    ja: RDF Schema の class/property vocabulary で RDF resource 意味を記述する schema 成果物です。
  definition:
    zh: RDF Schema 词汇产物是一种 SchemaArtifact；其种差是规范图在稳定词汇命名空间中声明 rdfs:Class、rdf:Property 及 subClassOf、subPropertyOf、domain、range 等词汇关系。它描述词汇与推理语义，不因采用 Turtle/JSON-LD 等序列化而改变身份，也不自动成为 SHACL 约束图。
    en: An RDF Schema artifact is a SchemaArtifact whose normative graph declares rdfs:Class, rdf:Property, and vocabulary relations such as subClassOf, subPropertyOf, domain, and range in a stable vocabulary namespace. It describes vocabulary and entailment semantics, does not change identity with Turtle or JSON-LD serialization, and is not automatically a SHACL constraints graph.
    ja: RDF Schema 成果物は SchemaArtifact の一種で、安定 vocabulary namespace 内で rdfs:Class・rdf:Property・subClassOf・subPropertyOf・domain・range 等を宣言する規範 graph です。vocabulary/entailment 意味を記述し、Turtle/JSON-LD 表現で identity は変わらず、自動的に SHACL constraint graph にはなりません。
  why_needed:
    zh: 把词汇命名空间与 RDF 序列化明确建模，才能区分“定义类和属性含义”的 RDFS 产物与“验证数据是否满足约束”的 SHACL 产物。
    en: Explicit vocabulary-namespace and RDF-serialization fields distinguish an RDFS artifact that defines class/property meaning from a SHACL artifact that validates data against constraints.
    ja: vocabulary namespace と RDF serialization を明示し、class/property 意味を定義する RDFS artifact と constraint 検証を行う SHACL artifact を区別します。
  includes:
    - zh: 包含具有独立 artifact_id/version、稳定 vocabulary_namespace_uri、RDF 媒体类型，并声明类、属性、继承、domain 或 range 的词汇图。
      en: Includes vocabulary graphs with independent artifact_id/version, a stable vocabulary_namespace_uri, an RDF media type, and declarations of classes, properties, inheritance, domain, or range.
      ja: 独立 artifact_id/version、安定 vocabulary_namespace_uri、RDF media type、class/property/inheritance/domain/range 宣言を持つ vocabulary graph を含みます。
  excludes:
    - zh: 不包含只使用该词汇的实例数据图、主要由 SHACL shape/target/constraint 构成的验证图、OWL 本体的完整专属表达能力，或普通 JSON Schema 文档。
      en: Excludes instance data graphs that merely use the vocabulary, validation graphs principally composed of SHACL shapes/targets/constraints, OWL-specific expressivity as a whole, and ordinary JSON Schema documents.
      ja: vocabulary を使うだけの instance data graph、SHACL shape/target/constraint 主体の validation graph、OWL 固有表現力全体、一般 JSON Schema 文書を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: vocabulary_namespace_uri
      labels:
        zh: 词汇命名空间 URI
        en: vocabulary namespace URI
        ja: vocabulary namespace URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用于生成并解释该 RDFS 词汇中类与属性 URI 的稳定命名空间。
        en: Stable namespace used to mint and interpret class and property URIs in this RDFS vocabulary.
        ja: この RDFS vocabulary の class/property URI を生成・解釈する安定 namespace です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://moonweave.ai/vocab/agent-runtime#
      source_claims:
        - claim-rdf-schema-artifact-002
    - id: serialization_media_type
      labels:
        zh: 序列化媒体类型
        en: serialization media type
        ja: serialization media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前 RDFS 图字节表示的 RDF 媒体类型；同一词汇可有不同序列化而保持同一逻辑版本。
        en: RDF media type of the current byte representation; the same vocabulary can have different serializations while retaining one logical revision.
        ja: 現在の RDFS graph byte 表現の RDF media type で、同一 vocabulary は異なる serialization でも同じ論理 revision を保てます。
      allowed_values: []
      pattern: ^[a-z0-9.+-]+/[a-z0-9.+-]+$
      example_value: text/turtle
      source_claims:
        - claim-rdf-schema-artifact-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: RDFSchemaArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 智能体运行词汇
      en: Agent-runtime vocabulary
      ja: agent-runtime vocabulary
    scenario_id: null
    descriptions:
      zh: agent-runtime-vocabulary@4 在 https://moonweave.ai/vocab/agent-runtime# 下声明 RuntimeSession 与 RunAttempt 为 rdfs:Class，并为 runsIn 声明 rdf:Property、domain 与 range；当前表示为 Turtle。
      en: agent-runtime-vocabulary@4 declares RuntimeSession and RunAttempt as rdfs:Class under https://moonweave.ai/vocab/agent-runtime#, and declares runsIn as rdf:Property with domain and range; the current representation is Turtle.
      ja: agent-runtime-vocabulary@4 は https://moonweave.ai/vocab/agent-runtime# 配下で RuntimeSession/RunAttempt を rdfs:Class、runsIn を domain/range 付き rdf:Property として宣言し、現在表現は Turtle です。
    field_values:
      artifact_id: agent-runtime-vocabulary
      version: "4"
      content_digest: sha256:agent-runtime-vocabulary-v4
      media_type: text/turtle
      schema_language: RDFS
      language_profile: RDF Schema 1.1
      vocabulary_namespace_uri: https://moonweave.ai/vocab/agent-runtime#
      serialization_media_type: text/turtle
    related_node_ids:
      - RDFSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - RDFSchemaArtifact-is_a-SchemaArtifact
    expected_result:
      zh: 归入 RDFSchemaArtifact，并把命名空间作为词汇身份、Turtle 作为当前表示。
      en: Classify it as RDFSchemaArtifact, treating the namespace as vocabulary identity and Turtle as the current representation.
      ja: RDFSchemaArtifact とし、namespace を vocabulary identity、Turtle を現在 representation として扱います。
    why_valid_or_invalid:
      zh: 图的规范内容确实定义 RDFS 类、属性和 domain/range 语义，而不是只使用这些词汇描述实例。
      en: The graph's normative content defines RDFS classes, properties, and domain/range semantics rather than merely using those terms to describe instances.
      ja: graph の規範内容が RDFS class/property/domain/range 意味を定義し、用語を instance 記述に使うだけではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rdf-schema-artifact-004
  - id: RDFSchemaArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只使用词汇的运行实例图
      en: Runtime instance graph that only uses the vocabulary
      ja: vocabulary を使うだけの runtime instance graph
    scenario_id: null
    descriptions:
      zh: run-42.ttl 声明 :session-42 rdf:type mw:RuntimeSession 并引用 mw:runsIn，但没有定义任何 rdfs:Class、rdf:Property、subClassOf、domain 或 range。
      en: run-42.ttl states :session-42 rdf:type mw:RuntimeSession and uses mw:runsIn but defines no rdfs:Class, rdf:Property, subClassOf, domain, or range.
      ja: run-42.ttl は :session-42 rdf:type mw:RuntimeSession と mw:runsIn を使いますが、rdfs:Class・rdf:Property・subClassOf・domain・range を定義しません。
    field_values:
      serialization_media_type: text/turtle
      uses_namespace: https://moonweave.ai/vocab/agent-runtime#
    related_node_ids:
      - RDFSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - RDFSchemaArtifact-is_a-SchemaArtifact
    expected_result:
      zh: 不得归入 RDFSchemaArtifact；它是使用词汇的 RDF 数据实例产物。
      en: Do not classify it as RDFSchemaArtifact; it is an RDF data-instance artifact that uses the vocabulary.
      ja: RDFSchemaArtifact にせず、vocabulary を使う RDF data-instance artifact とします。
    why_valid_or_invalid:
      zh: 使用 RDFS 词汇与定义 RDFS 词汇是不同角色；该图没有任何词汇声明种差。
      en: Using an RDFS vocabulary and defining that vocabulary are different roles; this graph has none of the vocabulary-declaration differentia.
      ja: RDFS vocabulary 使用と定義は別 role で、この graph には vocabulary declaration 種差がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rdf-schema-artifact-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: JSONSchemaArtifact
    shared_parent_concept_id: SchemaArtifact
    differentia:
      zh: RDFSchemaArtifact 以 IRI 命名的 class/property 与 domain/range 构成 RDF 词汇；JSONSchemaArtifact 以 $schema/$id 和 JSON Schema 词汇约束 JSON 实例。
      en: RDFSchemaArtifact forms an RDF vocabulary from IRI-named classes/properties and domain/range; JSONSchemaArtifact uses $schema/$id and JSON Schema vocabularies to constrain JSON instances.
      ja: RDFSchemaArtifact は IRI 名 class/property と domain/range で RDF vocabulary を構成し、JSONSchemaArtifact は $schema/$id と JSON Schema vocabulary で JSON instance を制約します。
    source_claims:
      - claim-rdf-schema-artifact-006
      - claim-rdf-schema-artifact-007
parent_relation:
  id: RDFSchemaArtifact-is_a-SchemaArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种模式产物
    en: is a schema artifact
    ja: schema 成果物の一種
  definitions:
    zh: 该分类事实表示每个 RDFSchemaArtifact 都继承 SchemaArtifact 的可版本化模式身份，并以稳定词汇命名空间及 RDFS class/property/subClassOf/domain/range 语义增加更窄种差。
    en: This classification states that every RDFSchemaArtifact inherits versioned schema identity from SchemaArtifact and adds the narrower differentia of a stable vocabulary namespace plus RDFS class/property/subClassOf/domain/range semantics.
    ja: この分類は全 RDFSchemaArtifact が SchemaArtifact の版本付き schema identity を継承し、安定 vocabulary namespace と RDFS class/property/subClassOf/domain/range 意味の狭い種差を加えることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation cardinality を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：具有 RDF Schema 子型
      en: has RDF Schema subtype
      ja: 逆方向：RDF Schema subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RDFSchemaArtifact-is_a-SchemaArtifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 词汇图继承模式身份
        en: Vocabulary graph inherits schema identity
        ja: vocabulary graph の schema identity 継承
      scenario_id: null
      descriptions:
        zh: agent-runtime-vocabulary@4 具有 artifact_id/version、schema_language=RDF Schema、稳定命名空间，并声明 rdfs:Class、rdf:Property、domain 与 range，因而满足父类与 RDFS 子型。
        en: agent-runtime-vocabulary@4 has artifact_id/version, schema_language RDF Schema, a stable namespace, and rdfs:Class, rdf:Property, domain, and range declarations, satisfying the parent and RDFS subtype.
        ja: agent-runtime-vocabulary@4 は artifact_id/version、schema_language=RDF Schema、安定 namespace、rdfs:Class/rdf:Property/domain/range 宣言を持ち、parent と RDFS subtype を満たします。
      field_values:
        vocabulary_namespace_uri: https://moonweave.ai/vocab/agent-runtime#
        serialization_media_type: text/turtle
      related_node_ids:
        - RDFSchemaArtifact
        - SchemaArtifact
      related_relation_ids:
        - RDFSchemaArtifact-is_a-SchemaArtifact
      expected_result:
        zh: 沿 RDFSchemaArtifact→SchemaArtifact 继承通用模式身份，同时保留词汇命名空间和 RDF 表示信息。
        en: Inherit generic schema identity along RDFSchemaArtifact-to-SchemaArtifact while retaining vocabulary-namespace and RDF-representation information.
        ja: RDFSchemaArtifact→SchemaArtifact で generic schema identity を継承し vocabulary namespace/RDF representation 情報を保持します。
      why_valid_or_invalid:
        zh: 规范图同时满足父类的可版本化模式条件，并通过 RDFS 词汇声明而非文件语法形成清楚种差。
        en: The normative graph satisfies the parent's versioned-schema conditions and forms a clear differentia through RDFS vocabulary declarations rather than file syntax.
        ja: 規範 graph は parent の版本付き schema 条件を満たし、file syntax でなく RDFS vocabulary 宣言で明確な種差を作ります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-rdf-schema-artifact-008
    - id: RDFSchemaArtifact-is_a-SchemaArtifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 普通 RDF 实例不反向成为 RDFS 模式
        en: Ordinary RDF instance does not reverse-classify as RDFS schema
        ja: 一般 RDF instance は RDFS schema へ逆分類しない
      scenario_id: null
      descriptions:
        zh: run-42.ttl 是版本化 RDF 数据产物并使用 mw:RuntimeSession，但没有声明任何类、属性、继承、domain 或 range；共享 RDF 模型不足以形成 RDFS 子型。
        en: run-42.ttl is a versioned RDF data artifact using mw:RuntimeSession but declares no class, property, hierarchy, domain, or range; sharing the RDF model is insufficient for the RDFS subtype.
        ja: run-42.ttl は mw:RuntimeSession を使う版本付き RDF data artifact ですが class/property/hierarchy/domain/range を宣言せず、RDF model 共有だけでは RDFS subtype になりません。
      field_values:
        serialization_media_type: text/turtle
        uses_namespace: https://moonweave.ai/vocab/agent-runtime#
      related_node_ids:
        - RDFSchemaArtifact
        - SchemaArtifact
      related_relation_ids:
        - RDFSchemaArtifact-is_a-SchemaArtifact
      expected_result:
        zh: 保留为数据产物而非 RDFSchemaArtifact，不从词汇使用反推词汇定义。
        en: Keep it as a data artifact rather than RDFSchemaArtifact; vocabulary use must not imply vocabulary definition.
        ja: RDFSchemaArtifact でなく data artifact とし、vocabulary 使用から vocabulary 定義を逆推論しません。
      why_valid_or_invalid:
        zh: is_a 需要满足 RDFS 词汇定义种差；引用一个类并不等于规范性地定义该类。
        en: The is_a classification requires RDFS vocabulary-definition differentia; referencing a class is not the same as normatively defining it.
        ja: is_a 分類には RDFS vocabulary-definition 種差が必要で、class 参照は規範的 class 定義と同じではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-rdf-schema-artifact-009
  source_claims:
    - claim-rdf-schema-artifact-010
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Entity/Generation 与 JSON Schema/RDF/SHACL 规范逐项核验，Artifact 五类子型语义成立。
    en: Verified against PROV-O Entity/Generation and JSON Schema/RDF/SHACL. Five Artifact subtypes and provenance hold.
    ja: PROV-O Entity/Generation と JSON Schema/RDF/SHACL に照らし五 Artifact subtype と provenance を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-rdf-schema-artifact-001
    source: eng-ont-rdfs
    supports: RDF Schema 1.1 directly defines the class, property, subclass, subproperty, domain, and range vocabulary semantics that delimit this artifact subtype.
    locator: W3C RDF Schema 1.1 > §2 Classes, §3 Properties, and §5 RDF Schema Summary
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-002
    source: eng-ont-rdfs
    supports: RDF Schema identifies classes and properties as RDF resources denoted by IRIs; Moonweave records the stable namespace that owns those vocabulary IRIs.
    locator: W3C RDF Schema 1.1 > §2.2 rdfs:Class and §3.1 rdf:Property
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-003
    source: eng-ont-rdfs
    supports: RDF Schema semantics are defined over RDF graphs and vocabulary terms, not one concrete serialization; Moonweave therefore records serialization as representation metadata.
    locator: W3C RDF Schema 1.1 > §1 Introduction and §5 RDF Schema Summary
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-004
    source: eng-ont-rdfs
    supports: RDF Schema directly defines classes, properties, subclass relations, domains, and ranges used by this vocabulary example.
    locator: W3C RDF Schema 1.1 > §2 Classes and §3 Properties
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-005
    source: eng-ont-rdfs
    supports: RDF Schema distinguishes vocabulary resources such as rdfs:Class and rdf:Property from ordinary resources that are instances of those classes or use those properties.
    locator: W3C RDF Schema 1.1 > §2.2 rdfs:Class and §3.1 rdf:Property
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-006
    source: eng-ont-rdfs
    supports: RDF Schema defines IRI-named class and property vocabulary semantics that distinguish this subtype.
    locator: W3C RDF Schema 1.1 > §2 Classes and §3 Properties
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-007
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines JSON documents, dialects, resources, and vocabularies that distinguish the sibling subtype.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3, §7, and §8
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-008
    source: eng-ont-rdfs
    supports: RDF Schema defines the class, property, domain, range, and hierarchy semantics instantiated by this subtype relation.
    locator: W3C RDF Schema 1.1 > §2 Classes and §3 Properties
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-009
    source: eng-ont-rdfs
    supports: RDF Schema distinguishes class/property vocabulary declarations from ordinary RDF resources that merely instantiate or use the vocabulary.
    locator: W3C RDF Schema 1.1 > §2.2 rdfs:Class and §3.1 rdf:Property
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rdf-schema-artifact-010
    source: eng-ont-rdfs
    supports: RDF Schema 1.1 directly defines the vocabulary semantics used as differentia beneath the broader Moonweave SchemaArtifact category.
    locator: W3C RDF Schema 1.1 > §2 Classes, §3 Properties, and §5 Summary
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

