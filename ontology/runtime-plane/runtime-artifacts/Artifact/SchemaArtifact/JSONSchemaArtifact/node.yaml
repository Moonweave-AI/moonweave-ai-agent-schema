schema: moonweave.ai/ontology-node/v1
id: JSONSchemaArtifact
kind: concept
status: accepted
labels: {zh: JSON Schema 工件, en: JSON Schema artifact, ja: JSON Schema 成果物}
semantics:
  short_definition: {zh: 一个以 JSON Schema 文档表示的 SchemaArtifact，用于声明 JSON 实例结构和约束。, en: A SchemaArtifact expressed as a JSON Schema document for declaring JSON instance structure and constraints., ja: JSON インスタンスの構造と制約を宣言する JSON Schema 文書として表現された SchemaArtifact。}
  definition: {zh: JSONSchemaArtifact 是一个带版本模式 Entity，其 JSON 内容标识 JSON Schema 方言并声明 JSON 实例的允许结构。它不是 OpenAPI 操作、特定工具调用、已经验证的 JSON 载荷或运行时验证结果。, en: "A JSONSchemaArtifact is a versioned schema Entity whose JSON content identifies a JSON Schema dialect and declares the allowed structure of JSON instances. It is not an OpenAPI operation, a particular tool invocation, an already validated JSON payload, or a runtime validation result.", ja: JSONSchemaArtifact は、JSON コンテンツが JSON Schema 方言を識別し、JSON インスタンスに許可される構造を宣言するバージョン付きスキーマ Entity である。OpenAPI 操作、特定のツール呼び出し、検証済み JSON ペイロード、ランタイム検証結果ではない。}
  why_needed: {zh: 工具输入、结构化输出和事件载荷需要一个可独立于运行时实现解析的明确可移植契约。, en: "Tool inputs, structured outputs, and event payloads need an explicit portable contract that can be resolved independently of the runtime implementation.", ja: ツール入力、構造化出力、イベントペイロードには、ランタイム実装から独立して解決できる明示的でポータブルな契約が必要である。}
  includes:
    - {zh: Draft 2020-12 模式资源、子模式、词汇和 JSON 对象/数组/值约束。, en: "Draft 2020-12 schema resources, subschemas, vocabularies, and JSON object/array/value constraints.", ja: Draft 2020-12 スキーマリソース、サブスキーマ、語彙、JSON オブジェクト／配列／値制約。}
    - {zh: 一个 $schema 方言 URI、模式资源标识符和目标 JSON 媒体类型。, en: "A $schema dialect URI, schema resource identifier, and target JSON media type.", ja: $schema 方言 URI、スキーマリソース識別子、対象 JSON メディアタイプ。}
  excludes:
    - {zh: 任意 JSON 示例、OpenAPI 端点定义或工具调用载荷。, en: "An arbitrary JSON example, OpenAPI endpoint definition, or tool-call payload.", ja: 任意の JSON 例、OpenAPI エンドポイント定義、ツール呼び出しペイロード。}
    - {zh: 应用该文档的验证器执行或验证报告。, en: A validator execution or validation report that applies this document., ja: この文書を適用するバリデーター実行または検証レポート。}
  semantic_kind: entity
  aliases: [JSON contract, schema.json]
engineering:
  explanation: {zh: 契约生成器发出具有声明方言的 JSON Schema 资源。生产者将已解析的模式工件版本附加到载荷契约；验证器加载该版本并评估实例，不会把载荷或评估本身视为模式。, en: A contract generator emits a JSON Schema resource with a declared dialect. Producers attach the resolved schema artifact version to a payload contract; validators load that version and evaluate instances without treating either the payload or evaluation as the schema., ja: 契約生成器は宣言された方言を持つ JSON Schema リソースを発行する。生成者は解決済みスキーマ成果物バージョンをペイロード契約に付着し、バリデーターはそのバージョンを読み込んで、ペイロードや評価をスキーマとして扱わずにインスタンスを評価する。}
  typical_input:
    - description: {zh: 契约要求, en: Contract requirements, ja: 契約要件}
      format: |-
        {"name":"tool-output","properties":{"answer":{"type":"string"}},"required":["answer"]}
  typical_output:
    - description: {zh: JSON Schema 工件, en: JSON Schema artifact, ja: JSON Schema 成果物}
      format: |-
        {"artifact_id":"schema-tool-output-v1","dialect_uri":"https://json-schema.org/draft/2020-12/schema","media_type":"application/schema+json"}
  reference_implementations:
    - {name: JSON Schema Core 2020-12, url: https://json-schema.org/draft/2020-12/json-schema-core, description: "Defines JSON Schema resources, dialects, identifiers, and vocabularies."}
structure:
  identity_keys: [artifact_id, version, schema_resource_uri]
  fields:
    - id: artifact_id
      labels: {zh: JSON Schema 工件 ID, en: JSON Schema artifact ID, ja: JSON Schema 成果物 ID}
      definitions: {zh: 持久化 JSON Schema 文档的稳定标识符。, en: Stable identifier of the persisted JSON Schema document., ja: 永続化された JSON Schema 文書の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: schema-tool-output-v1
      source_claims: [claim-json-schema-resource]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "JSON Schema 文档持久化表示的声明媒体类型。"
        en: "Declared media type of the persisted JSON Schema document representation."
        ja: "永続化された JSON Schema 文書表現の宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [application/schema+json]
      example_value: application/schema+json
      source_claims: [claim-json-schema-resource]
    - id: schema_language
      labels:
        zh: "模式语言"
        en: "Schema language"
        ja: "スキーマ言語"
      definitions:
        zh: "固定为 json-schema，以保留从 SchemaArtifact 继承的模式语言契约。"
        en: "Fixed to json-schema to retain the schema-language contract inherited from SchemaArtifact."
        ja: "SchemaArtifact から継承したスキーマ言語契約を保持するため json-schema に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [json-schema]
      example_value: json-schema
      source_claims: [claim-json-schema-resource]
    - id: dialect_uri
      labels: {zh: JSON Schema 方言 URI, en: JSON Schema dialect URI, ja: JSON Schema 方言 URI}
      definitions: {zh: 标识用于解释模式资源的方言的 URI。, en: URI that identifies the dialect used to interpret the schema resource., ja: スキーマリソースの解釈に用いる方言を識別する URI。}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      example_value: https://json-schema.org/draft/2020-12/schema
      source_claims: [claim-json-schema-resource]
    - id: schema_resource_uri
      labels: {zh: 模式资源 URI, en: Schema resource URI, ja: スキーマリソース URI}
      definitions: {zh: 在注册表或文档内标识模式资源的可选规范 URI。, en: Optional canonical URI identifying the schema resource within a registry or document., ja: レジストリまたは文書内でスキーマリソースを識別する任意の正規 URI。}
      datatype: uri
      required: false
      cardinality: {min: 0, max: 1}
      example_value: https://schemas.example.test/tool-output/v1
      source_claims: [claim-json-schema-resource]
  constraints:
    - id: json-schema-artifact-dialect
      severity: error
      language: plain
      expression: A JSON Schema artifact must declare one supported dialect URI before consumers evaluate its keywords.
      explanation: {zh: 关键字语义取决于方言和活动词汇。, en: Keyword meaning depends on the dialect and active vocabularies., ja: キーワードの意味は方言とアクティブな語彙に依存する。}
      source_claims: [claim-json-schema-resource]
  required_relations: [JSONSchemaArtifact-specializes-SchemaArtifact]
examples:
  - id: json-schema-artifact-positive
    labels: {zh: "OpenAI function parameters schema", en: "OpenAI function parameters schema", ja: "OpenAI function parameters schema"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; JSONSchemaArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; JSONSchemaArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; JSONSchemaArtifact provenance graph."}
    field_values: {artifact_id: schema-tool-output-v1, media_type: application/schema+json, schema_language: json-schema, dialect_uri: https://json-schema.org/draft/2020-12/schema}
    related_node_ids: [JSONSchemaArtifact, SchemaArtifact]
    related_relation_ids: [JSONSchemaArtifact-specializes-SchemaArtifact]
    source_claims: [claim-json-schema-resource]
  - id: json-schema-artifact-counterexample
    labels: {zh: "JSON 实例数据非 JSONSchemaArtifact", en: "JSON instance data not JSONSchemaArtifact", ja: "JSON インスタンスデータは JSONSchemaArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style JSONSchemaArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style JSONSchemaArtifact.", ja: "Missing parent_run_id rejects LangSmith-style JSONSchemaArtifact."}
    field_values: {answer: ok}
    related_node_ids: [Artifact]
    related_relation_ids: []
    source_claims: [claim-json-schema-resource]
  - id: json-schema-artifact-boundary
    labels: {zh: "JSONSchema 与 SHACL 边界", en: "JSONSchema versus SHACL boundary", ja: "JSONSchema と SHACL 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; JSONSchemaArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; JSONSchemaArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {document_kind: OpenAPI}
    related_node_ids: [JSONSchemaArtifact, SchemaArtifact]
    related_relation_ids: []
    source_claims: [claim-json-schema-resource]
  - id: json-schema-artifact-instance-tool-output-v1
    labels: {zh: "tool-output-v1 JSON Schema 实例", en: "tool-output-v1 JSON Schema instance", ja: "tool-output-v1 JSON Schema 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->JSONSchemaArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->JSONSchemaArtifact.", ja: "LangSmith instance maps to JSONSchemaArtifact."}
    field_values: {artifact_id: schema-tool-output-v1, media_type: application/schema+json, schema_language: json-schema, dialect_uri: https://json-schema.org/draft/2020-12/schema, schema_resource_uri: https://schemas.example.test/tool-output/v1}
    related_node_ids: [JSONSchemaArtifact, SchemaArtifact, Artifact]
    related_relation_ids: [JSONSchemaArtifact-specializes-SchemaArtifact]
    source_claims: [claim-json-schema-resource]
parent_relation:
  id: JSONSchemaArtifact-specializes-SchemaArtifact
  predicate: is_a
  target: concept:SchemaArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 JSON Schema 工件, en: is a JSON Schema artifact, ja: JSON Schema 成果物である}
  definitions: {zh: 每个 JSONSchemaArtifact 都是根据声明的 JSON Schema 方言表示的 SchemaArtifact。, en: Every JSONSchemaArtifact is a SchemaArtifact expressed according to a declared JSON Schema dialect., ja: すべての JSONSchemaArtifact は、宣言された JSON Schema 方言に従って表現された SchemaArtifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_json_schema_artifact, labels: {zh: 具有 JSON Schema 工件, en: has JSON Schema artifact, ja: JSON Schema 成果物を持つ}}
  conditions:
    - id: json-schema-artifact-parent-condition
      severity: error
      expression: Require JSON Schema resource content and a declared dialect URI.
      explanations: {zh: 通用 JSON 文件不会仅因使用 JSON 序列化而成为模式文档。, en: Generic JSON files are not schema documents merely because they use JSON serialization., ja: 一般的な JSON ファイルは、JSON 直列化を使用するだけでスキーマ文書になるわけではない。}
      source_claims: [claim-json-schema-resource]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-json-schema-resource]
relations: []
sources:
  - id: json-schema-core-2020-12
    title: "JSON Schema Core: Draft 2020-12"
    url: https://json-schema.org/draft/2020-12/json-schema-core
    source_type: standard
    relevance: Defines JSON Schema resources, identifiers, dialects, and vocabularies.
source_claims:
  - id: claim-json-schema-resource
    source: json-schema-core-2020-12
    supports: JSON Schema defines a schema as a JSON resource interpreted under a dialect and its active vocabularies.
    locator: Sections 4.3.3 and 8.1
    evidence_kind: standard
    confidence: high

