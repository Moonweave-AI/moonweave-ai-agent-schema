schema: moonweave.ai/ontology-node/v1
id: JSONSchemaArtifact
kind: concept
status: accepted
labels:
  zh: JSON Schema 产物
  en: JSON Schema artifact
  ja: JSON Schema 成果物
semantics:
  short_definition:
    zh: 以 JSON Schema 方言声明 JSON 实例结构与验证断言的模式产物。
    en: A schema artifact that uses a JSON Schema dialect to declare JSON instance structure and validation assertions.
    ja: JSON Schema dialect で JSON instance 構造と validation assertion を宣言する schema 成果物です。
  definition:
    zh: JSON Schema 产物是一种 SchemaArtifact；其种差是内容为 JSON Schema 文档或模式资源，以 $schema 选择方言并以解析后的 $id 标识模式资源。它不包括仅使用 JSON 序列化的 SHACL shapes graph、RDF Schema 词汇或符合该模式的数据实例。
    en: A JSON Schema artifact is a SchemaArtifact whose content is a JSON Schema document or schema resource, selects a dialect through $schema, and identifies the schema resource through the resolved $id. It excludes SHACL shapes graphs or RDF Schema vocabularies merely serialized as JSON and instances that only conform to the schema.
    ja: JSON Schema 成果物は SchemaArtifact の一種で、内容が JSON Schema document/resource であり、$schema で dialect を選び、解決済み $id で schema resource を識別します。JSON 表現だけを使う SHACL shapes graph・RDF Schema vocabulary や適合 instance は含みません。
  why_needed:
    zh: 把 JSON Schema 的方言与资源 URI 放在专属子类，既能精确执行验证，也不会把 $schema/$id 错当成所有模式语言的通用字段。
    en: Keeping JSON Schema dialect and resource URIs on this subtype enables precise validation without treating $schema and $id as universal fields of every schema language.
    ja: JSON Schema dialect/resource URI をこの subtype に限定し、正確な validation を可能にしつつ $schema/$id を全 schema language 共通 field と誤認しません。
  includes:
    - zh: 包含具有独立 artifact_id/version、规范 $schema URI、解析后模式资源 URI 与 JSON Schema 关键字的文档或嵌入式模式资源。
      en: Includes documents or embedded schema resources with independent artifact_id/version, a normative $schema URI, a resolved schema-resource URI, and JSON Schema keywords.
      ja: 独立 artifact_id/version、規範 $schema URI、解決済み schema-resource URI、JSON Schema keyword を持つ文書または embedded schema resource を含みます。
  excludes:
    - zh: 不包含普通 JSON 数据、OpenAPI 文档整体、SHACL/RDFS 图，或只有文件扩展名而没有 JSON Schema 方言语义的内容。
      en: Excludes ordinary JSON data, an OpenAPI document as a whole, SHACL/RDFS graphs, and content that has only a filename extension without JSON Schema dialect semantics.
      ja: 一般 JSON data、OpenAPI 文書全体、SHACL/RDFS graph、または拡張子だけで JSON Schema dialect 意味を持たない内容を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: schema_dialect_uri
      labels:
        zh: 模式方言 URI
        en: schema dialect URI
        ja: schema dialect URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 由 $schema 声明、用于确定元模式与词汇集合的绝对 URI。
        en: Absolute URI declared by $schema that selects the meta-schema and vocabulary set used to process the document.
        ja: $schema が宣言し、文書処理用 meta-schema と vocabulary 集を選ぶ absolute URI です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://json-schema.org/draft/2020-12/schema
      source_claims:
        - claim-json-schema-artifact-002
    - id: schema_resource_uri
      labels:
        zh: 模式资源 URI
        en: schema resource URI
        ja: schema resource URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在基准 URI 下解析 $id 后得到、用于标识该 JSON Schema 资源的绝对 URI。
        en: Absolute URI that identifies this JSON Schema resource after resolving $id against its base URI.
        ja: base URI に対して $id を解決し、この JSON Schema resource を識別する absolute URI です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://moonweave.ai/schemas/tool-definition/v3
      source_claims:
        - claim-json-schema-artifact-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: JSONSchemaArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 工具定义 JSON Schema
      en: Tool-definition JSON Schema
      ja: tool-definition JSON Schema
    scenario_id: null
    descriptions:
      zh: tool-definition-schema@3 声明 2020-12 的 $schema、稳定 $id，以及 properties/required/type 断言，并以独立摘要固定内容。
      en: tool-definition-schema@3 declares the 2020-12 $schema, a stable $id, and properties/required/type assertions, with an independent digest fixing the content.
      ja: tool-definition-schema@3 は 2020-12 $schema、安定 $id、properties/required/type assertion を宣言し、独立 digest で内容を固定します。
    field_values:
      artifact_id: tool-definition-schema
      version: "3"
      content_digest: sha256:tool-definition-schema-v3
      media_type: application/schema+json
      schema_language: JSON Schema
      language_profile: Draft 2020-12
      schema_dialect_uri: https://json-schema.org/draft/2020-12/schema
      schema_resource_uri: https://moonweave.ai/schemas/tool-definition/v3
    related_node_ids:
      - JSONSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - JSONSchemaArtifact-is_a-SchemaArtifact
    expected_result:
      zh: 归入 JSONSchemaArtifact，并按 2020-12 方言解析和验证其模式资源。
      en: Classify it as JSONSchemaArtifact and process the schema resource under the 2020-12 dialect.
      ja: JSONSchemaArtifact に分類し、2020-12 dialect で schema resource を処理・検証します。
    why_valid_or_invalid:
      zh: $schema 和解析后的 $id 同时给出方言与资源身份，内容也确实包含 JSON Schema 断言关键字。
      en: $schema and the resolved $id supply both dialect and resource identity, and the content actually contains JSON Schema assertion keywords.
      ja: $schema と解決済み $id が dialect/resource identity を与え、内容にも JSON Schema assertion keyword があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-json-schema-artifact-004
  - id: JSONSchemaArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: JSON-LD 序列化的 SHACL 图
      en: SHACL graph serialized as JSON-LD
      ja: JSON-LD 表現 SHACL graph
    scenario_id: null
    descriptions:
      zh: shapes.jsonld 是含 sh:NodeShape 的 RDF shapes graph；虽然使用 JSON-LD 字节序列化，但没有 JSON Schema $schema、$id 或验证词汇。
      en: shapes.jsonld is an RDF shapes graph containing sh:NodeShape; despite JSON-LD byte serialization, it has no JSON Schema $schema, $id, or validation vocabulary.
      ja: shapes.jsonld は sh:NodeShape を含む RDF shapes graph で、JSON-LD byte 表現でも JSON Schema $schema・$id・validation vocabulary はありません。
    field_values:
      serialization_media_type: application/ld+json
      shapes_graph_ref: urn:moonweave:shapes:tool-definition
    related_node_ids:
      - JSONSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - JSONSchemaArtifact-is_a-SchemaArtifact
    expected_result:
      zh: 保持为 SchemaArtifact，并在具备 SHACL 种差时归入 SHACLShapesArtifact；不得因 JSON 序列化而归入 JSONSchemaArtifact。
      en: Keep it as SchemaArtifact and classify it as SHACLShapesArtifact when its SHACL differentia are present; JSON serialization alone must not make it JSONSchemaArtifact.
      ja: SchemaArtifact のまま SHACL 種差があれば SHACLShapesArtifact とし、JSON 表現だけで JSONSchemaArtifact にしません。
    why_valid_or_invalid:
      zh: 分类依据规范语言而不是文件语法；JSON-LD 是 RDF 序列化，不等于 JSON Schema。
      en: Classification follows the normative language rather than file syntax; JSON-LD is an RDF serialization, not JSON Schema.
      ja: 分類は file syntax でなく規範 language に従い、JSON-LD は RDF serialization で JSON Schema ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-json-schema-artifact-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SHACLShapesArtifact
    shared_parent_concept_id: SchemaArtifact
    differentia:
      zh: JSONSchemaArtifact 用 $schema 与 $id 解释 JSON 实例；SHACLShapesArtifact 以 RDF shapes graph 和 shape/target/constraint components 验证数据图。
      en: JSONSchemaArtifact uses $schema and $id to interpret JSON instances; SHACLShapesArtifact uses an RDF shapes graph with shapes, targets, and constraint components to validate data graphs.
      ja: JSONSchemaArtifact は $schema/$id で JSON instance を解釈し、SHACLShapesArtifact は shape・target・constraint component を含む RDF shapes graph で data graph を検証します。
    source_claims:
      - claim-json-schema-artifact-006
      - claim-json-schema-artifact-007
parent_relation:
  id: JSONSchemaArtifact-is_a-SchemaArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种模式产物
    en: is a schema artifact
    ja: schema 成果物の一種
  definitions:
    zh: 该分类事实表示每个 JSONSchemaArtifact 都继承 SchemaArtifact 的可版本化模式身份，并以 JSON Schema $schema 方言与解析后 $id 资源 URI 增加更窄种差。
    en: This classification states that every JSONSchemaArtifact inherits versioned schema identity from SchemaArtifact and adds the narrower differentia of a JSON Schema $schema dialect and resolved $id resource URI.
    ja: この分類は全 JSONSchemaArtifact が SchemaArtifact の版本付き schema identity を継承し、JSON Schema $schema dialect と解決済み $id resource URI の狭い種差を加えることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation cardinality を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有 JSON Schema 子型
      en: has JSON Schema subtype
      ja: 逆方向：JSON Schema subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: JSONSchemaArtifact-is_a-SchemaArtifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 2020-12 模式继承
        en: 2020-12 schema inheritance
        ja: 2020-12 schema 継承
      scenario_id: null
      descriptions:
        zh: tool-definition-schema@3 同时具有 artifact_id/version、schema_language=JSON Schema、2020-12 $schema URI 与解析后 $id，因而先满足 SchemaArtifact，再满足 JSONSchemaArtifact 种差。
        en: tool-definition-schema@3 has artifact_id/version, schema_language JSON Schema, a 2020-12 $schema URI, and a resolved $id, so it satisfies SchemaArtifact before the narrower JSONSchemaArtifact differentia.
        ja: tool-definition-schema@3 は artifact_id/version、schema_language=JSON Schema、2020-12 $schema URI、解決済み $id を持ち、SchemaArtifact を満たしてから JSONSchemaArtifact 種差を満たします。
      field_values:
        schema_dialect_uri: https://json-schema.org/draft/2020-12/schema
        schema_resource_uri: https://moonweave.ai/schemas/tool-definition/v3
      related_node_ids:
        - JSONSchemaArtifact
        - SchemaArtifact
      related_relation_ids:
        - JSONSchemaArtifact-is_a-SchemaArtifact
      expected_result:
        zh: 沿 JSONSchemaArtifact→SchemaArtifact 继承通用模式身份，同时保留 JSON Schema 专属字段。
        en: Inherit generic schema identity along JSONSchemaArtifact-to-SchemaArtifact while retaining JSON Schema-specific fields.
        ja: JSONSchemaArtifact→SchemaArtifact で generic schema identity を継承し JSON Schema 固有 field を保持します。
      why_valid_or_invalid:
        zh: 子类完整包含父类的模式语言与版本身份，并新增方言 URI 和资源 URI，而没有改变父类含义。
        en: The subtype contains the parent's schema-language and revision identity and adds dialect and resource URIs without changing the parent meaning.
        ja: subtype は parent の schema-language/revision identity を含み dialect/resource URI を追加しますが parent 意味を変えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-json-schema-artifact-008
    - id: JSONSchemaArtifact-is_a-SchemaArtifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 通用模式不反向成为 JSON Schema
        en: Generic schema does not reverse-classify as JSON Schema
        ja: generic schema は JSON Schema へ逆分類しない
      scenario_id: null
      descriptions:
        zh: 一个 SHACL shapes graph 满足 SchemaArtifact 的版本化模式身份，但没有 $schema、$id 或 JSON Schema 词汇，因此不能沿父类反向推成 JSONSchemaArtifact。
        en: A SHACL shapes graph satisfies versioned SchemaArtifact identity but has no $schema, $id, or JSON Schema vocabulary, so parent membership cannot reverse-infer JSONSchemaArtifact.
        ja: SHACL shapes graph は版本付き SchemaArtifact identity を満たしますが $schema・$id・JSON Schema vocabulary がなく、parent 所属から JSONSchemaArtifact を逆推論できません。
      field_values:
        schema_language: SHACL
        language_profile: W3C SHACL Recommendation
      related_node_ids:
        - JSONSchemaArtifact
        - SchemaArtifact
      related_relation_ids:
        - JSONSchemaArtifact-is_a-SchemaArtifact
      expected_result:
        zh: 只保留 SchemaArtifact（并可归入 SHACLShapesArtifact），拒绝 JSONSchemaArtifact 分类。
        en: Retain SchemaArtifact (and possibly SHACLShapesArtifact) while rejecting JSONSchemaArtifact classification.
        ja: SchemaArtifact（必要なら SHACLShapesArtifact）を保持し JSONSchemaArtifact 分類を拒否します。
      why_valid_or_invalid:
        zh: is_a 只保证子类是父类，不保证任一父类成员满足特定子类的语言种差。
        en: is_a guarantees that a subtype is a parent, not that every parent member satisfies one language-specific subtype differentia.
        ja: is_a は subtype が parent であることだけを保証し、全 parent member が language 固有 subtype 種差を満たすとは限りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-json-schema-artifact-009
  source_claims:
    - claim-json-schema-artifact-010
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Entity/Generation 与 JSON Schema/RDF/SHACL 规范逐项核验，Artifact 五类子型语义成立。
    en: Verified against PROV-O Entity/Generation and JSON Schema/RDF/SHACL. Five Artifact subtypes and provenance hold.
    ja: PROV-O Entity/Generation と JSON Schema/RDF/SHACL に照らし五 Artifact subtype と provenance を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-json-schema-artifact-001
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core directly defines JSON Schema documents and resources, dialect selection through $schema, and resource identification through $id.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3 JSON Schema, §8.1.1 $schema, and §8.2.1 $id
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-002
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines $schema as the keyword that identifies the dialect and its meta-schema resource.
    locator: JSON Schema Draft 2020-12 Core > §8.1.1 The $schema Keyword
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-003
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines $id as the identifier that establishes the base URI and canonical identifier of a schema resource.
    locator: JSON Schema Draft 2020-12 Core > §8.2.1 The $id Keyword
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-004
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines dialect declaration, schema-resource identification, and assertion/applicator vocabularies used by this example.
    locator: JSON Schema Draft 2020-12 Core > §7 Vocabularies and §8 Core Vocabulary
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-005
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core requires JSON Schema vocabulary and resource semantics; JSON syntax alone does not establish a JSON Schema resource.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3 JSON Schema and §7 Vocabularies
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-006
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines JSON Schema documents, dialects, and resources that distinguish this subtype.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3 and §8
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-007
    source: eng-val-shacl
    supports: SHACL defines shapes graphs, targets, and constraint components that distinguish the sibling subtype.
    locator: W3C SHACL Recommendation > §2 Shapes Graph and §3 Targets
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-008
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core defines the document, dialect, and resource identity instantiated by this subtype relation.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3, §8.1.1, and §8.2.1
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-009
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core requires JSON Schema document and vocabulary semantics, which a SHACL shapes graph does not acquire merely by being another schema artifact.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3 JSON Schema and §7 Vocabularies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-json-schema-artifact-010
    source: eng-val-jsonschema-2020-12-core
    supports: JSON Schema Core directly defines the language-specific document, dialect, vocabulary, and resource features used as differentia beneath the broader Moonweave SchemaArtifact category.
    locator: JSON Schema Draft 2020-12 Core > §4.3.3, §7, and §8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

