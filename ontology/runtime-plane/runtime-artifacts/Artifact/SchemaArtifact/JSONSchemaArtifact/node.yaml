schema: moonweave.ai/ontology-node/v1
id: JSONSchemaArtifact
kind: concept
labels:
  zh: JSON Schema 产物
  en: JSON Schema artifact
  ja: JSON Schema 成果物
semantics:
  short_definition:
    zh: 以 JSON Schema 方言声明 JSON 实例结构与验证断言的模式产物。
    en: A schema artifact that uses a JSON Schema dialect to declare JSON instance structure and validation assertions.
    ja: JSON Schema dialect で JSON instance 構造と validation assertion を宣言する schema 成果物です。
  definition:
    zh: JSON Schema 产物是一种 SchemaArtifact；其种差是内容为 JSON Schema 文档或模式资源，以 $schema 选择方言并以解析后的 $id 标识模式资源。它不包括仅使用 JSON 序列化的 SHACL shapes graph、RDF Schema 词汇或符合该模式的数据实例。
    en: A JSON Schema artifact is a SchemaArtifact whose content is a JSON Schema document or schema resource, selects a dialect through $schema, and identifies the schema resource through the resolved $id. It excludes SHACL shapes graphs or RDF Schema vocabularies merely serialized as JSON and instances that only conform to the schema.
    ja: JSON Schema 成果物は SchemaArtifact の一種で、内容が JSON Schema document/resource であり、$schema で dialect を選び、解決済み $id で schema resource を識別します。JSON 表現だけを使う SHACL shapes graph・RDF Schema vocabulary や適合 instance は含みません。
  why_needed:
    zh: 把 JSON Schema 的方言与资源 URI 放在专属子类，既能精确执行验证，也不会把 $schema/$id 错当成所有模式语言的通用字段。
    en: Keeping JSON Schema dialect and resource URIs on this subtype enables precise validation without treating $schema and $id as universal fields of every schema language.
    ja: JSON Schema dialect/resource URI をこの subtype に限定し、正確な validation を可能にしつつ $schema/$id を全 schema language 共通 field と誤認しません。
  includes:
    - zh: 包含具有独立 artifact_id/version、规范 $schema URI、解析后模式资源 URI 与 JSON Schema 关键字的文档或嵌入式模式资源。
      en: Includes documents or embedded schema resources with independent artifact_id/version, a normative $schema URI, a resolved schema-resource URI, and JSON Schema keywords.
      ja: 独立 artifact_id/version、規範 $schema URI、解決済み schema-resource URI、JSON Schema keyword を持つ文書または embedded schema resource を含みます。
  excludes:
    - zh: 不包含普通 JSON 数据、OpenAPI 文档整体、SHACL/RDFS 图，或只有文件扩展名而没有 JSON Schema 方言语义的内容。
      en: Excludes ordinary JSON data, an OpenAPI document as a whole, SHACL/RDFS graphs, and content that has only a filename extension without JSON Schema dialect semantics.
      ja: 一般 JSON data、OpenAPI 文書全体、SHACL/RDFS graph、または拡張子だけで JSON Schema dialect 意味を持たない内容を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: JSONSchemaArtifact（JSONArtifact）映射 OpenAI structured outputs schema、tool parameters JSON Schema 与运行时生成的 schema 文件；schema 文本必须 content_digest 固定。
    en: JSONSchemaArtifact (JSONArtifact) maps OpenAI structured outputs schema, tool parameter JSON Schema, and runtime-generated schema files; schema bytes must be fixed by content_digest.
    ja: JSONSchemaArtifact（JSONArtifact）は structured outputs/tool JSON Schema を digest 固定 artifact として写像します。
  typical_input:
    - description: E2B file write or OpenAI assistant file output.
      format: '{"type":"json_schema","json_schema":{"name":"result","schema":{...}}}'
      source_claims:
        - claim-e2b-artifact
        - claim-json-schema-artifact-design
  typical_output:
    - description: Moonweave Artifact with digest and provenance.
      format: '{"artifact_id":"schema-run-output","version":"1","media_type":"application/schema+json"}'
      source_claims:
        - claim-json-schema-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: schema_dialect_uri
      labels:
        zh: 模式方言 URI
        en: schema dialect URI
        ja: schema dialect URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 由 $schema 声明、用于确定元模式与词汇集合的绝对 URI。
        en: Absolute URI declared by $schema that selects the meta-schema and vocabulary set used to process the document.
        ja: $schema が宣言し、文書処理用 meta-schema と vocabulary 集を選ぶ absolute URI です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://json-schema.org/draft/2020-12/schema
      source_claims:
        - claim-json-schema-artifact-design
    - id: schema_resource_uri
      labels:
        zh: 模式资源 URI
        en: schema resource URI
        ja: schema resource URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在基准 URI 下解析 $id 后得到、用于标识该 JSON Schema 资源的绝对 URI。
        en: Absolute URI that identifies this JSON Schema resource after resolving $id against its base URI.
        ja: base URI に対して $id を解決し、この JSON Schema resource を識別する absolute URI です。
      allowed_values: []
      pattern: ^https?://
      example_value: https://moonweave.ai/schemas/tool-definition/v3
      source_claims:
        - claim-json-schema-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: JSONSchemaArtifact-example-positive-manual-20260716
    labels:
      zh: OpenAI function parameters schema
      en: OpenAI function parameters schema
      ja: OpenAI function parameters schema
    descriptions:
      zh: 'OpenAI function parameters: {type:"object", properties:{location:{type:"string"}}, required:["location"]} 映射 JSONSchemaArtifact artifact_id=tool-output-v1。'
      en: 'OpenAI function parameters: {type:"object", properties:{location:{type:"string"}}, required:["location"]} maps JSONSchemaArtifact artifact_id=tool-output-v1.'
      ja: OpenAI function parameters が JSONSchemaArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: tool-definition-schema
      version: "3"
      content_digest: sha256:tool-definition-schema-v3
      media_type: application/schema+json
      schema_language: JSON Schema
      language_profile: Draft 2020-12
      schema_dialect_uri: https://json-schema.org/draft/2020-12/schema
      schema_resource_uri: https://moonweave.ai/schemas/tool-definition/v3
    related_node_ids:
      - JSONSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - JSONSchemaArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-json-schema-artifact-design
  - id: JSONSchemaArtifact-example-boundary-manual-20260716
    labels:
      zh: JSON 实例数据非 JSONSchemaArtifact
      en: JSON instance data not JSONSchemaArtifact
      ja: JSON インスタンスデータは JSONSchemaArtifact ではない
    descriptions:
      zh: agent 输出 JSON {"location":"Paris"} 是实例数据 Entity，不是 JSONSchemaArtifact 模式定义。
      en: Agent output JSON {"location":"Paris"} is instance data Entity, not JSONSchemaArtifact schema definition.
      ja: JSON インスタンスは JSONSchemaArtifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      serialization_media_type: application/ld+json
      shapes_graph_ref: urn:moonweave:shapes:tool-definition
    related_node_ids:
      - JSONSchemaArtifact
      - SchemaArtifact
    related_relation_ids:
      - JSONSchemaArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-json-schema-artifact-design
  - id: JSONSchemaArtifact-example-3
    labels:
      zh: JSONSchema 与 SHACL 边界
      en: JSONSchema versus SHACL boundary
      ja: JSONSchema と SHACL 境界
    descriptions:
      zh: JSONSchemaArtifact 是 JSON Schema 结构；SHACLShapesArtifact 是 SHACL 约束；同一 agent 输出可用 JSON Schema 验证，ontology 用 SHACL。
      en: JSONSchemaArtifact is JSON Schema structure; SHACLShapesArtifact is SHACL constraints; same agent output may validate with JSON Schema, ontology with SHACL.
      ja: JSONSchema と SHACL は別 schema 言語である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - JSONSchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-json-schema-artifact-design
      - claim-json-schema-artifact-design
  - id: JSONSchemaArtifact-example-4
    labels:
      zh: tool-output-v1 JSON Schema 实例
      en: tool-output-v1 JSON Schema instance
      ja: tool-output-v1 JSON Schema 事例
    descriptions:
      zh: JSONSchemaArtifact artifact_id=tool-output-v1、schema_version=draft-2020-12、validates_tool=get_weather。
      en: JSONSchemaArtifact artifact_id=tool-output-v1, schema_version=draft-2020-12, validates_tool=get_weather.
      ja: tool-output-v1 JSONSchemaArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - JSONSchemaArtifact
    related_relation_ids: []
    source_claims:
      - claim-json-schema-artifact-design
      - claim-json-schema-artifact-design
parent_relation:
  id: JSONSchemaArtifact-is_a-SchemaArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种模式产物
    en: is a schema artifact
    ja: schema 成果物の一種
  definitions:
    zh: 该分类事实表示每个 JSONSchemaArtifact 都继承 SchemaArtifact 的可版本化模式身份，并以 JSON Schema $schema 方言与解析后 $id 资源 URI 增加更窄种差。
    en: This classification states that every JSONSchemaArtifact inherits versioned schema identity from SchemaArtifact and adds the narrower differentia of a JSON Schema $schema dialect and resolved $id resource URI.
    ja: この分類は全 JSONSchemaArtifact が SchemaArtifact の版本付き schema identity を継承し、JSON Schema $schema dialect と解決済み $id resource URI の狭い種差を加えることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation cardinality を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有 JSON Schema 子型
      en: has JSON Schema subtype
      ja: 逆方向：JSON Schema subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-json-schema-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://www.e2b.dev/docs/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-e2b-artifact
    source: src-e2b-files
    supports: E2B sandbox filesystem writes produce addressable file outputs with path and bytes.
    locator: Sandbox filesystem
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-file-artifact
    source: src-openai-files
    supports: OpenAI Files API returns file_id and metadata for assistant-generated outputs.
    locator: Files > file object
    evidence_kind: design-inference
    confidence: high
  - id: claim-json-schema-artifact-design
    source: src-runtime-artifacts-design
    supports: JSONSchemaArtifact stores immutable schema bytes as artifact revision.
    locator: JSONSchemaArtifact boundary
    evidence_kind: design-inference
    confidence: high
