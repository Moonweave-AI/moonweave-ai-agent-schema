schema: moonweave.ai/ontology-node/v1
id: SHACLShapesArtifact
kind: concept
labels:
  zh: SHACL 形状图产物
  en: SHACL shapes artifact
  ja: SHACL shapes 成果物
semantics:
  short_definition:
    zh: 以 SHACL shapes graph 表达目标、形状与约束组件的模式产物。
    en: A schema artifact expressing targets, shapes, and constraint components as a SHACL shapes graph.
    ja: SHACL shapes graph として target・shape・constraint component を表す schema 成果物です。
  definition:
    zh: SHACL 形状图产物是一种 SchemaArtifact；其种差是规范内容构成 SHACL shapes graph，其中 shape、target 与 constraint component 用于验证独立的数据图。其逻辑身份是图资源而不是某种 RDF 字节语法，因此 Turtle、JSON-LD 或 RDF/XML 只是序列化信息。
    en: A SHACL shapes artifact is a SchemaArtifact whose normative content forms a SHACL shapes graph in which shapes, targets, and constraint components validate a separate data graph. Its logical identity is the graph resource rather than an RDF byte syntax, so Turtle, JSON-LD, and RDF/XML are serialization information only.
    ja: SHACL shapes 成果物は SchemaArtifact の一種で、規範内容が SHACL shapes graph を構成し、shape・target・constraint component が別の data graph を検証します。論理 identity は RDF byte syntax でなく graph resource で、Turtle・JSON-LD・RDF/XML は serialization 情報だけです。
  why_needed:
    zh: 独立子类把 SHACL 的图级身份与序列化媒介分开，避免因文件是 JSON-LD 就误归为 JSON Schema，也避免把词汇声明误当验证形状。
    en: This subtype separates SHACL graph identity from serialization media, preventing JSON-LD files from being mistaken for JSON Schema and vocabulary declarations from being mistaken for validation shapes.
    ja: SHACL graph identity と serialization media を分離し、JSON-LD file を JSON Schema と誤認したり vocabulary 宣言を validation shape と誤認したりしません。
  includes:
    - zh: 包含有独立 artifact_id/version、可解析 shapes_graph_ref、RDF 序列化媒体类型，并实际声明 SHACL shape、target 或 constraint component 的图产物。
      en: Includes graph artifacts with independent artifact_id/version, a resolvable shapes_graph_ref, an RDF serialization media type, and actual SHACL shapes, targets, or constraint components.
      ja: 独立 artifact_id/version、解決可能 shapes_graph_ref、RDF serialization media type、実際の SHACL shape/target/constraint component を持つ graph 成果物を含みます。
  excludes:
    - zh: 不包含待验证的数据图、SHACL 验证报告、只有 rdfs:Class/rdfs:domain/rdfs:range 的词汇图，或仅因使用 Turtle 而被推定为 shapes graph 的文件。
      en: Excludes the data graph being validated, SHACL validation reports, vocabulary graphs containing only rdfs:Class/rdfs:domain/rdfs:range, and files inferred to be shapes graphs merely because they use Turtle.
      ja: validation 対象 data graph、SHACL validation report、rdfs:Class/domain/range だけの vocabulary graph、Turtle 使用だけで shapes graph と推定した file を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 SHACLShapesArtifact 时应分别映射 E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating SHACLShapesArtifact, map E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: SHACLShapesArtifact 統合時は E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to SHACLShapesArtifact.
      format: |-
        # Example SHACLShapesArtifact ingest
        { "shaclshapes-artifact_ref": "example-1" }
      source_claims:
        - claim-shaclshapes-artifact-design
  typical_output:
    - description: Moonweave-local SHACLShapesArtifact projection.
      format: '{ "schema_owner": "moonweave-local-design", "shaclshapes-artifact_id": "example-1" }'
      source_claims:
        - claim-shaclshapes-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: shapes_graph_ref
      labels:
        zh: 形状图引用
        en: shapes graph reference
        ja: shapes graph reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定引用 SHACL shapes graph 逻辑资源的 URI、命名图标识或受控仓库引用。
        en: Stable URI, named-graph identifier, or controlled repository reference for the logical SHACL shapes graph resource.
        ja: 論理 SHACL shapes graph resource を安定参照する URI・named graph identifier・controlled repository reference です。
      allowed_values: []
      pattern: null
      example_value: urn:moonweave:shapes:tool-definition:v2
      source_claims:
        - claim-shaclshapes-artifact-design
    - id: serialization_media_type
      labels:
        zh: 序列化媒体类型
        en: serialization media type
        ja: serialization media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前字节表示所用 RDF 序列化的媒体类型；它不改变 shapes graph 的逻辑身份。
        en: Media type of the RDF serialization used by the current byte representation; it does not change the logical identity of the shapes graph.
        ja: 現在の byte representation が使う RDF serialization media type で、shapes graph の論理 identity は変えません。
      allowed_values: []
      pattern: ^[a-z0-9.+-]+/[a-z0-9.+-]+$
      example_value: text/turtle
      source_claims:
        - claim-shaclshapes-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: SHACLShapesArtifact-example-positive-manual-20260716
    labels:
      zh: W3C SHACL shapes 验证工件
      en: W3C SHACL shapes validation artifact
      ja: W3C SHACL shapes 検証 artifact
    descriptions:
      zh: W3C SHACL shapes 约束 Execution：sh:targetClass mw:Execution；sh:property sh:path mw:execution_id、sh:datatype xsd:string；SHACLShapesArtifact artifact_id=runtime-v1。
      en: "W3C SHACL shapes constrain Execution: sh:targetClass mw:Execution; sh:property sh:path mw:execution_id, sh:datatype xsd:string; SHACLShapesArtifact artifact_id=runtime-v1."
      ja: W3C SHACL shapes が SHACLShapesArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: tool-shapes
      version: "2"
      content_digest: sha256:tool-shapes-v2
      media_type: text/turtle
      schema_language: SHACL
      language_profile: W3C SHACL Recommendation
      shapes_graph_ref: urn:moonweave:shapes:tool-definition:v2
      serialization_media_type: text/turtle
    related_node_ids:
      - SHACLShapesArtifact
      - SchemaArtifact
    related_relation_ids:
      - SHACLShapesArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-shaclshapes-artifact-design
  - id: SHACLShapesArtifact-example-boundary-manual-20260716
    labels:
      zh: JSON Schema 非 SHACL
      en: JSON Schema not SHACL
      ja: JSON Schema は SHACL ではない
    descriptions:
      zh: OpenAI function JSON Schema required=[location] 是 JSON Schema 验证，不是 SHACL shapes 约束。
      en: OpenAI function JSON Schema required=[location] is JSON Schema validation, not SHACL shapes constraint.
      ja: JSON Schema は SHACL ではない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      vocabulary_namespace_uri: https://moonweave.ai/vocab/tool#
      serialization_media_type: text/turtle
    related_node_ids:
      - SHACLShapesArtifact
      - SchemaArtifact
    related_relation_ids:
      - SHACLShapesArtifact-is_a-SchemaArtifact
    source_claims:
      - claim-shaclshapes-artifact-design
  - id: SHACLShapesArtifact-example-3
    labels:
      zh: SHACL 与 RDFSchema 边界
      en: SHACL versus RDFSchema boundary
      ja: SHACL と RDFSchema 境界
    descriptions:
      zh: SHACLShapesArtifact 是 SHACL 约束；RDFSchemaArtifact 是 RDFS 类层次；validation shapes 与 taxonomy schema 分离。
      en: SHACLShapesArtifact is SHACL constraints; RDFSchemaArtifact is RDFS class hierarchy; validation shapes separated from taxonomy schema.
      ja: SHACL shapes と RDFS taxonomy は分離する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - SHACLShapesArtifact
    related_relation_ids: []
    source_claims:
      - claim-shaclshapes-artifact-vendor
      - claim-shaclshapes-artifact-design
  - id: SHACLShapesArtifact-example-4
    labels:
      zh: runtime-v1 SHACL shapes 实例
      en: runtime-v1 SHACL shapes instance
      ja: runtime-v1 SHACL shapes 事例
    descriptions:
      zh: SHACLShapesArtifact artifact_id=runtime-v1、target_class=Execution、constraint_count=12、format=ttl。
      en: SHACLShapesArtifact artifact_id=runtime-v1, target_class=Execution, constraint_count=12, format=ttl.
      ja: runtime-v1 SHACLShapesArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - SHACLShapesArtifact
    related_relation_ids: []
    source_claims:
      - claim-shaclshapes-artifact-vendor
      - claim-shaclshapes-artifact-design
parent_relation:
  id: SHACLShapesArtifact-is_a-SchemaArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种模式产物
    en: is a schema artifact
    ja: schema 成果物の一種
  definitions:
    zh: 该分类事实表示每个 SHACLShapesArtifact 都继承 SchemaArtifact 的可版本化模式身份，并以独立 shapes graph、shape/target/constraint component 及 RDF 表示信息增加更窄种差。
    en: This classification states that every SHACLShapesArtifact inherits versioned schema identity from SchemaArtifact and adds the narrower differentia of a distinct shapes graph, shapes/targets/constraint components, and RDF representation information.
    ja: この分類は全 SHACLShapesArtifact が SchemaArtifact の版本付き schema identity を継承し、独立 shapes graph・shape/target/constraint component・RDF representation 情報の狭い種差を加えることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation cardinality を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有 SHACL 形状图子型
      en: has SHACL shapes subtype
      ja: 逆方向：SHACL shapes subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-shaclshapes-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
