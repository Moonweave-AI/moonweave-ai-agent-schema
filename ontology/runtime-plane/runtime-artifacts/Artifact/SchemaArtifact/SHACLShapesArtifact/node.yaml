        en: tool-shapes@2 has artifact_id/version, schema_language SHACL, a stable shapes_graph_ref, and sh:NodeShape plus constraint components, satisfying SchemaArtifact and the narrower SHACL subtype.
        ja: tool-shapes@2 は artifact_id/version、schema_language=SHACL、安定 shapes_graph_ref、sh:NodeShape/constraint component を持ち、SchemaArtifact と狭い SHACL subtype を満たします。
      field_values:
        shapes_graph_ref: urn:moonweave:shapes:tool-definition:v2
        serialization_media_type: text/turtle
      related_node_ids:
        - SHACLShapesArtifact
        - SchemaArtifact
      related_relation_ids:
