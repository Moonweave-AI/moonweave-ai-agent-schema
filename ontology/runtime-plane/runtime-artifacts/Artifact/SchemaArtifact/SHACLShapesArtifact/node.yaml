      expected_result:
        zh: 保留 SchemaArtifact/RDFSchemaArtifact 分类，拒绝 SHACLShapesArtifact 分类。
        en: Retain SchemaArtifact/RDFSchemaArtifact classification while rejecting SHACLShapesArtifact classification.
        ja: SchemaArtifact/RDFSchemaArtifact 分類を保持し SHACLShapesArtifact 分類を拒否します。
      why_valid_or_invalid:
        zh: 共享 RDF 图模型和 Turtle 序列化不能替代 SHACL 专属验证种差。
        en: Sharing the RDF graph model and Turtle serialization cannot substitute for SHACL-specific validation differentia.
        ja: RDF graph model/Turtle serialization の共有は SHACL 固有 validation 種差の代わりになりません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-shacl-shapes-artifact-009
