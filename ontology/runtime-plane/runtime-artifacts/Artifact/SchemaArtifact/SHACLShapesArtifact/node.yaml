schema: moonweave.ai/ontology-node/v1
id: SHACLShapesArtifact
kind: concept
status: accepted
labels: {zh: SHACL 形状工件, en: SHACL shapes artifact, ja: SHACL シェイプ成果物}
semantics:
  short_definition: {zh: 一个包含 RDF shapes 图的 SchemaArtifact，该图声明用于检查 RDF 数据一致性的 SHACL 约束。, en: A SchemaArtifact containing an RDF shapes graph that declares SHACL constraints for checking RDF data conformance., ja: RDF データ適合性を検査する SHACL 制約を宣言する RDF shapes グラフを含む SchemaArtifact。}
  definition: {zh: SHACLShapesArtifact 是一个耐久 Entity，其 RDF 内容包含用于评估数据图的 SHACL shapes 和约束组件。它是带版本 shapes 图，而不是被检查的数据图、验证 Activity、验证报告或不含 SHACL 约束的 OWL/RDFS 词汇定义。, en: "A SHACLShapesArtifact is a durable Entity whose RDF content contains SHACL shapes and constraint components used to assess a data graph. It is the versioned shapes graph, not the data graph being checked, a validation Activity, a validation report, or an OWL/RDFS vocabulary definition without SHACL constraints.", ja: SHACLShapesArtifact は、データグラフを評価するための SHACL shapes と制約コンポーネントを RDF コンテンツに含む耐久 Entity である。バージョン付き shapes グラフであり、検査対象データグラフ、検証 Activity、検証レポート、SHACL 制約のない OWL/RDFS 語彙定義ではない。}
  why_needed: {zh: 运行时 RDF 契约需要一组可追溯的 shapes，使后续一致性决定能够确切识别应用了哪些规则、目标和约束组件。, en: "Runtime RDF contracts require a traceable set of shapes so a later conformance decision can identify exactly which rules, targets, and constraint components were applied.", ja: ランタイム RDF 契約には追跡可能な shapes の集合が必要であり、後の適合性判断はどの規則、対象、制約コンポーネントが適用されたかを正確に識別できる。}
  includes:
    - {zh: sh:NodeShape 和 sh:PropertyShape 资源、目标、路径、基数、数据类型和其他 SHACL 约束。, en: "sh:NodeShape and sh:PropertyShape resources, targets, paths, cardinalities, datatypes, and other SHACL constraints.", ja: sh:NodeShape と sh:PropertyShape リソース、ターゲット、パス、カーディナリティ、データ型、その他の SHACL 制約。}
    - {zh: Shapes 图 URI、目标类或节点选择器、SHACL 版本和内容摘要。, en: "Shapes graph URI, target class or node selectors, SHACL version, and content digest.", ja: shapes グラフ URI、ターゲットクラスまたはノードセレクター、SHACL バージョン、コンテンツダイジェスト。}
  excludes:
    - {zh: RDF 实例图、SHACL 验证报告或调用 SHACL 引擎的执行。, en: "The RDF instance graph, SHACL validation report, or execution that invokes a SHACL engine.", ja: RDF インスタンスグラフ、SHACL 検証レポート、SHACL エンジンを呼び出す Execution。}
    - {zh: 定义类但不包含 SHACL shape 或约束组件的词汇文档。, en: A vocabulary document that defines classes but contains no SHACL shape or constraint component., ja: クラスを定義するが SHACL shape または制約コンポーネントを含まない語彙文書。}
  semantic_kind: entity
  aliases: [shapes graph, SHACL contract]
engineering:
  explanation: {zh: 模式构建生成具有明确目标和约束组件的 RDF shapes 图。验证器接收已解析 shapes Artifact 和独立数据图，然后生成一致性结果或报告，而不会将任一者与 shapes 文档混淆。, en: "A schema build produces an RDF shapes graph with explicit targets and constraint components. A validator receives the resolved shapes Artifact and an independent data graph, then produces a conformance outcome or report without conflating either with the shapes document.", ja: スキーマビルドは明示的なターゲットと制約コンポーネントを持つ RDF shapes グラフを生成する。バリデーターは解決済み shapes Artifact と独立したデータグラフを受け取り、どちらも shapes 文書と混同せずに適合結果またはレポートを生成する。}
  typical_input:
    - description: {zh: 数据契约要求, en: Data contract requirement, ja: データ契約要件}
      format: |-
        {"target_class":"https://schemas.example.test/runtime#Execution","path":"https://schemas.example.test/runtime#status","min_count":1}
  typical_output:
    - description: {zh: SHACL 形状工件, en: SHACL shapes artifact, ja: SHACL シェイプ成果物}
      format: |-
        {"artifact_id":"shapes-runtime-v1","shapes_graph_uri":"https://schemas.example.test/runtime/shapes/v1","target_class_iri":"https://schemas.example.test/runtime#Execution"}
  reference_implementations:
    - {name: W3C SHACL, url: https://www.w3.org/TR/shacl/, description: "Defines shapes graphs, targets, constraint components, validation reports, and conformance checking."}
structure:
  identity_keys: [artifact_id, version, shapes_graph_uri]
  fields:
    - id: artifact_id
      labels: {zh: SHACL 形状工件 ID, en: SHACL shapes artifact ID, ja: SHACL シェイプ成果物 ID}
      definitions: {zh: 已发布 shapes 图的稳定标识符。, en: Stable identifier of the published shapes graph., ja: 公開済み shapes グラフの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: shapes-runtime-v1
      source_claims: [claim-shacl-shapes-graph]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "SHACL 形状图持久化表示的声明媒体类型。"
        en: "Declared media type of the persisted SHACL shapes graph representation."
        ja: "永続化された SHACL シェイプグラフ表現の宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [text/turtle, application/ld+json]
      example_value: text/turtle
      source_claims: [claim-shacl-shapes-graph]
    - id: schema_language
      labels:
        zh: "模式语言"
        en: "Schema language"
        ja: "スキーマ言語"
      definitions:
        zh: "固定为 shacl，以保留从 SchemaArtifact 继承的模式语言契约。"
        en: "Fixed to shacl to retain the schema-language contract inherited from SchemaArtifact."
        ja: "SchemaArtifact から継承したスキーマ言語契約を保持するため shacl に固定する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [shacl]
      example_value: shacl
      source_claims: [claim-shacl-shapes-graph]
    - id: shapes_graph_uri
      labels: {zh: Shapes 图 URI, en: Shapes graph URI, ja: shapes グラフ URI}
      definitions: {zh: 标识包含 SHACL shapes 的具体 RDF 图的 URI。, en: URI identifying the concrete RDF graph that contains the SHACL shapes., ja: SHACL shapes を含む具体的な RDF グラフを識別する URI。}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      example_value: https://schemas.example.test/runtime/shapes/v1
      source_claims: [claim-shacl-shapes-graph]
    - id: target_class_iri
      labels: {zh: 目标类 IRI, en: Target class IRI, ja: ターゲットクラス IRI}
      definitions: {zh: 本工件中某个 shape 所针对的可选代表类。, en: Optional representative class targeted by a shape in this artifact., ja: この成果物の shape が対象とする任意の代表クラス。}
      datatype: uri
      required: false
      cardinality: {min: 0, max: null}
      example_value: https://schemas.example.test/runtime#Execution
      source_claims: [claim-shacl-shapes-graph]
  constraints:
    - id: shacl-shapes-artifact-shape-content
      severity: error
      language: plain
      expression: The RDF graph must contain at least one SHACL shape with a declared target or constraint component.
      explanation: {zh: 没有约束的 RDF 图不是 SHACL shapes 工件。, en: An unconstrained RDF graph is not a SHACL shapes artifact., ja: 制約のない RDF グラフは SHACL shapes 成果物ではない。}
      source_claims: [claim-shacl-shapes-graph]
  required_relations: [SHACLShapesArtifact-specializes-SchemaArtifact]
examples:
  - id: shacl-shapes-artifact-positive
    labels: {zh: "W3C SHACL shapes 验证工件", en: "W3C SHACL shapes validation artifact", ja: "W3C SHACL shapes 検証 artifact"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; SHACLShapesArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; SHACLShapesArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; SHACLShapesArtifact provenance graph."}
    field_values: {artifact_id: shapes-runtime-v1, media_type: text/turtle, schema_language: shacl, shapes_graph_uri: https://schemas.example.test/runtime/shapes/v1, target_class_iri: https://schemas.example.test/runtime#Execution}
    related_node_ids: [SHACLShapesArtifact, SchemaArtifact]
    related_relation_ids: [SHACLShapesArtifact-specializes-SchemaArtifact]
    source_claims: [claim-shacl-shapes-graph]
  - id: shacl-shapes-artifact-counterexample
    labels: {zh: "JSON Schema 非 SHACL", en: "JSON Schema not SHACL", ja: "JSON Schema は SHACL ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style SHACLShapesArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style SHACLShapesArtifact.", ja: "Missing parent_run_id rejects LangSmith-style SHACLShapesArtifact."}
    field_values: {artifact_id: report-22}
    related_node_ids: [ReportArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-shacl-shapes-graph]
  - id: shacl-shapes-artifact-boundary
    labels: {zh: "SHACL 与 RDFSchema 边界", en: "SHACL versus RDFSchema boundary", ja: "SHACL と RDFSchema 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SHACLShapesArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; SHACLShapesArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {shapes_graph_uri: https://schemas.example.test/runtime/shapes/v1}
    related_node_ids: [SHACLShapesArtifact, RDFSchemaArtifact]
    related_relation_ids: []
    source_claims: [claim-shacl-shapes-graph]
  - id: shacl-shapes-artifact-instance-runtime-v1
    labels: {zh: "runtime-v1 SHACL shapes 实例", en: "runtime-v1 SHACL shapes instance", ja: "runtime-v1 SHACL shapes 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->SHACLShapesArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->SHACLShapesArtifact.", ja: "LangSmith instance maps to SHACLShapesArtifact."}
    field_values: {artifact_id: shapes-runtime-v1, media_type: text/turtle, schema_language: shacl, shapes_graph_uri: https://schemas.example.test/runtime/shapes/v1, target_class_iri: https://schemas.example.test/runtime#Execution}
    related_node_ids: [SHACLShapesArtifact, SchemaArtifact, Artifact]
    related_relation_ids: [SHACLShapesArtifact-specializes-SchemaArtifact]
    source_claims: [claim-shacl-shapes-graph]
parent_relation:
  id: SHACLShapesArtifact-specializes-SchemaArtifact
  predicate: is_a
  target: concept:SchemaArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 SHACL 形状工件, en: is a SHACL shapes artifact, ja: SHACL シェイプ成果物である}
  definitions: {zh: 每个 SHACLShapesArtifact 都是 RDF 内容声明 SHACL shapes 和约束的 SchemaArtifact。, en: Every SHACLShapesArtifact is a SchemaArtifact whose RDF content declares SHACL shapes and constraints., ja: すべての SHACLShapesArtifact は、RDF コンテンツが SHACL shapes と制約を宣言する SchemaArtifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_shacl_shapes_artifact, labels: {zh: 具有 SHACL 形状工件, en: has SHACL shapes artifact, ja: SHACL シェイプ成果物を持つ}}
  conditions:
    - id: shacl-shapes-artifact-parent-condition
      severity: error
      expression: Require at least one SHACL shape with a target or constraint component.
      explanations: {zh: 通用 RDF 或 RDFS 文档不是 SHACL shapes 图。, en: Generic RDF or RDFS documents are not SHACL shapes graphs., ja: 一般的な RDF または RDFS 文書は SHACL shapes グラフではない。}
      source_claims: [claim-shacl-shapes-graph]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-shacl-shapes-graph]
relations: []
sources:
  - id: w3c-shacl
    title: "Shapes Constraint Language (SHACL)"
    url: https://www.w3.org/TR/shacl/
    source_type: standard
    relevance: Defines SHACL shapes graphs, targets, constraint components, validation reports, and validation semantics.
source_claims:
  - id: claim-shacl-shapes-graph
    source: w3c-shacl
    supports: SHACL defines a shapes graph containing shapes and constraints that are applied to an independent data graph to determine conformance.
    locator: Sections 2.1, 3, and 5
    evidence_kind: standard
    confidence: high

