        en: RDFS vocabulary does not reverse-classify as SHACL
        ja: RDFS vocabulary は SHACL へ逆分類しない
      scenario_id: null
      descriptions:
        zh: 一个 RDFS 词汇图满足 SchemaArtifact 的版本化模式身份，但只声明 class/property/domain/range，没有 shape、target 或 constraint component。
        en: An RDFS vocabulary graph satisfies versioned SchemaArtifact identity but declares only classes, properties, domains, and ranges, with no shape, target, or constraint component.
        ja: RDFS vocabulary graph は版本付き SchemaArtifact identity を満たしますが class/property/domain/range だけで shape・target・constraint component はありません。
      field_values:
        vocabulary_namespace_uri: https://moonweave.ai/vocab/agent-runtime#
        serialization_media_type: text/turtle
      related_node_ids:
        - SHACLShapesArtifact
        - SchemaArtifact
      related_relation_ids:
