      zh: SHACLShapesArtifact 以 shape、target 和 constraint component 验证数据图；RDFSchemaArtifact 以 class/property/subClassOf/domain/range 描述词汇语义。
      en: SHACLShapesArtifact validates a data graph through shapes, targets, and constraint components; RDFSchemaArtifact describes vocabulary semantics through classes, properties, subClassOf, domain, and range.
      ja: SHACLShapesArtifact は shape・target・constraint component で data graph を検証し、RDFSchemaArtifact は class・property・subClassOf・domain・range で vocabulary 意味を記述します。
