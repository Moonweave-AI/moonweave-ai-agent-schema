    labels:
      zh: 反向：具有 SHACL 形状图子型
      en: has SHACL shapes subtype
      ja: 逆方向：SHACL shapes subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
