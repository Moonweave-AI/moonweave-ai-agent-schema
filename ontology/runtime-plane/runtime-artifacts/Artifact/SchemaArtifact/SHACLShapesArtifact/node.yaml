      expected_result:
        zh: 沿 SHACLShapesArtifact→SchemaArtifact 继承通用模式身份，同时保留图级与表示级专属信息。
        en: Inherit generic schema identity along SHACLShapesArtifact-to-SchemaArtifact while retaining graph-level and representation-specific information.
        ja: SHACLShapesArtifact→SchemaArtifact で generic schema identity を継承し、graph/representation 固有情報を保持します。
      why_valid_or_invalid:
        zh: 形状图既满足父类的可版本化规范内容条件，又以 SHACL 形状和约束明确缩窄其语言角色。
        en: The shapes graph satisfies the parent's versioned normative-content conditions and narrows its language role through explicit SHACL shapes and constraints.
        ja: shapes graph は parent の版本付き規範内容条件を満たし、明示 SHACL shape/constraint で language role を狭めます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
