schema: moonweave.ai/ontology-node/v1
id: Artifact
kind: concept
labels:
  zh: 运行产物
  en: runtime artifact
  ja: 実行成果物
semantics:
  short_definition:
    zh: 具有稳定标识、不可变版本、内容摘要和运行溯源的独立工作产品。
    en: An independently referable work product with stable identity, immutable version, digest, and runtime provenance.
    ja: 安定識別、不変版本、内容 digest、実行 provenance を持つ独立参照可能な作業成果です。
  definition:
    zh: 运行产物是一种信息实体；其种差是作为一次智能体运行可独立寻址和复核的工作产品，由 artifact_id 与 version 标识，以内容摘要固定字节，并通过生成、使用、派生、归因和审查关系保存溯源。
    en: A runtime artifact is an information entity distinguished as an independently addressable and reviewable work product of agent operation, identified by artifact_id and version, byte-fixed by a content digest, and provenance-linked through generation, use, derivation, attribution, and review.
    ja: 実行成果物は情報 entity の一種で、agent 実行における独立アドレス可能・再検査可能な作業成果として区別され、artifact_id と version で識別し、content digest で byte を固定し、生成・使用・派生・帰属・review の provenance を持ちます。
  why_needed:
    zh: 没有独立产物身份时，报告、补丁和图数据只能作为临时字段存在，无法可靠复现、审查、派生或交付。
    en: Without independent artifact identity, reports, patches, and graph data collapse into transient fields that cannot be reliably reproduced, reviewed, derived, or delivered.
    ja: 独立成果物識別がなければ report・patch・graph data は一時 field に潰れ、再現・review・派生・納品を確実に行えません。
  includes:
    - zh: 包含已物化、可按标识和版本读取，并具有内容摘要与生成溯源的运行工作产品。
      en: Includes materialized runtime work products readable by identifier and version with a content digest and generation provenance.
      ja: 識別子と版本で読め、content digest と生成 provenance を持つ物化済み実行成果を含みます。
  excludes:
    - zh: 不包含消息中的临时字段、尚未物化的计划输出、只有路径而无内容身份的文件位置或一次 TraceEvent 记录。
      en: Excludes transient message fields, planned but unmaterialized output, file locations without content identity, and TraceEvent records.
      ja: 一時 message field、未物化の予定出力、内容識別のない file location、TraceEvent 記録を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Artifact 映射 E2B 写入文件、OpenAI assistant 输出文件、PatchArtifact diff 与 JSONSchemaArtifact；须 artifact_id+version+content_digest，TraceEvent 不能代替 Artifact 内容身份。
    en: Artifact maps E2B written files, OpenAI assistant output files, PatchArtifact diffs, and JSONSchemaArtifact; requires artifact_id+version+content_digest; TraceEvent cannot replace Artifact content identity.
    ja: Artifact は E2B/OpenAI 出力・Patch/JSON schema を写像し artifact_id+version+digest が必須です。
  typical_input:
    - description: E2B file write or OpenAI assistant file output.
      format: sandbox.files.write("/out/report.json", bytes)
      source_claims:
        - claim-e2b-artifact
        - claim-artifact-design
  typical_output:
    - description: Moonweave Artifact with digest and provenance.
      format: '{"artifact_id":"artifact-validation-report","version":"7","content_digest":"sha256:..."}'
      source_claims:
        - claim-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://e2b.dev/docs/sandbox/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: artifact_id
      labels:
        zh: 产物标识
        en: artifact ID
        ja: 成果物 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨不可变修订保持稳定的逻辑工作产品标识。
        en: Stable identifier of the logical work product across immutable revisions.
        ja: 不変 revision 間で安定する論理作業成果の識別子です。
      allowed_values: []
      pattern: null
      example_value: artifact-validation-report
      source_claims:
        - claim-artifact-design
    - id: version
      labels:
        zh: 不可变版本
        en: immutable version
        ja: 不変版本
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一份内容固定且不可原地覆盖的产物修订。
        en: Identifies one content-fixed artifact revision that cannot be overwritten in place.
        ja: 内容が固定され直接上書きできない一つの成果物 revision を識別します。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-artifact-design
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该版本规范字节序列计算的算法限定摘要，用于完整性与同一性校验。
        en: Algorithm-qualified digest of the revision's canonical byte sequence for integrity and identity verification.
        ja: revision の canonical byte 列に対する algorithm 付き digest で、完全性と同一性を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:9a4f…
      source_claims:
        - claim-artifact-design
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明产物字节的解释格式，而非产物在本体中的业务类别。
        en: Declares how artifact bytes are interpreted, not the artifact's ontology class.
        ja: 成果物 byte の解釈形式を宣言し、本体上の業務 class とは区別します。
      allowed_values: []
      pattern: null
      example_value: application/json
      source_claims:
        - claim-artifact-design
    - id: byte_count
      labels:
        zh: 原始字节数
        en: raw byte count
        ja: 生バイト数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该不可变版本在 Base64 编码或分词之前的原始内容字节数；它用于容量与传输一致性核验，不替代 content_digest，也不参与产物分类。
        en: Records the immutable revision's raw content size in bytes before Base64 encoding or tokenization. It supports capacity and transfer-consistency checks, does not replace content_digest, and does not determine artifact class.
        ja: 不変 revision の Base64 符号化・tokenization 前の生内容バイト数を記録します。容量・転送整合性の検査に使い、content_digest を置換せず成果物分類にも使いません。
      allowed_values: []
      pattern: null
      example_value: 48211
      source_claims:
        - claim-artifact-design
    - id: display_label
      labels:
        zh: 显示名称
        en: display label
        ja: 表示名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供人类界面展示和识别该产物版本的可选名称；它可以修改而不改变 artifact_id、version 或内容身份，因此不得作为唯一键。
        en: Optional human-readable name used to present and recognize the artifact revision. It may change without changing artifact_id, version, or content identity and therefore is not an identity key.
        ja: 成果物 revision を人間向け UI で表示・識別する任意名称です。artifact_id・version・内容同一性を変えず変更できるため identity key にはしません。
      allowed_values: []
      pattern: null
      example_value: Validation report
      source_claims:
        - claim-artifact-design
    - id: visibility
      labels:
        zh: 预期披露范围
        en: intended visibility scope
        ja: 意図された開示範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 以受控值标注该产物版本预期允许披露到的最宽受众范围。该标签为访问与披露策略提供输入，但本身不是授权决定、访问控制列表或已发生披露的证明。
        en: Labels the broadest intended audience scope for the artifact revision with a controlled value. The label is input to access and disclosure policy; it is not itself an authorization decision, access-control list, or proof that disclosure occurred.
        ja: 成果物 revision の意図された最大受信者範囲を制御値でラベル付けします。このラベルは access・disclosure policy の入力であり、認可判断、ACL、実際の開示証明そのものではありません。
      allowed_values:
        - id: VisibilityPrivate
          value: private
          labels:
            zh: 私有
            en: private
            ja: 非公開
          definitions:
            zh: 只允许披露给策略明确指定的主体；不得因主体参加同一会话或属于同一用户而自动扩大范围。
            en: Disclosure is intended only for principals explicitly admitted by policy; sharing a session or user identity does not automatically widen the scope.
            ja: policy が明示的に許可した principal のみに開示し、同一 session・user であるだけでは範囲を拡張しません。
          source_claims:
            - claim-artifact-design
        - id: VisibilitySession
          value: session
          labels:
            zh: 会话内
            en: session-scoped
            ja: セッション内
          definitions:
            zh: 允许在产生或使用该产物的同一受控运行会话内披露；跨会话使用必须重新经过策略判断。
            en: Disclosure is intended within the same controlled runtime session that produced or uses the artifact; cross-session use requires a new policy decision.
            ja: 成果物を生成・利用する同一の制御済み runtime session 内で開示し、session を跨ぐ利用には新たな policy 判断を必要とします。
          source_claims:
            - claim-artifact-design
        - id: VisibilityUser
          value: user
          labels:
            zh: 用户可见
            en: user-scoped
            ja: ユーザー範囲
          definitions:
            zh: 允许向经身份与策略确认的同一终端用户披露，可跨该用户的受控会话，但不自动允许其他用户访问。
            en: Disclosure is intended for the same authenticated and policy-admitted end user across controlled sessions, without automatically admitting other users.
            ja: 認証され policy で許可された同一 end user へ制御済み session を跨いで開示できますが、他 user を自動的には許可しません。
          source_claims:
            - claim-artifact-design
        - id: VisibilityPublic
          value: public
          labels:
            zh: 公开
            en: public
            ja: 公開
          definitions:
            zh: 允许在完成适用的发布、脱敏与治理检查后向不特定受众披露；公开标签不会跳过这些检查。
            en: Disclosure is intended for an unrestricted audience only after applicable release, redaction, and governance checks; the public label does not bypass those checks.
            ja: 適用される release・redaction・governance 検査後に不特定受信者へ開示でき、public ラベルは検査を迂回しません。
          source_claims:
            - claim-artifact-design
      pattern: null
      example_value: session
      source_claims:
        - claim-artifact-design
    - id: governance_state
      labels:
        zh: 治理状态
        en: governance state
        ja: governance 状態
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该不可变产物版本当前在评审与发布流程中的治理状态；状态变化不改变产物类型或内容摘要。
        en: Records the immutable revision's current governance state in review and release workflows; a state change does not change artifact type or content digest.
        ja: 不変成果物 revision の review・release workflow における現在の governance 状態を記録し、状態変更は成果物 type や content digest を変更しません。
      allowed_values:
        - id: artifact-governance-state-draft
          value: draft
          labels:
            zh: 草稿
            en: draft
            ja: draft
          definitions:
            zh: 内容版本已形成但尚未提交正式审查。
            en: The content revision exists but has not entered formal review.
            ja: content revision は存在しますが正式 review に未提出です。
          source_claims:
            - claim-artifact-design
        - id: artifact-governance-state-under-review
          value: under-review
          labels:
            zh: 审查中
            en: under review
            ja: review 中
          definitions:
            zh: 具名审查活动正在评价该内容版本，尚无最终处置。
            en: A named review activity is evaluating the revision and has no final disposition yet.
            ja: named review activity が revision を評価中で最終 disposition は未決です。
          source_claims:
            - claim-artifact-design
        - id: artifact-governance-state-accepted
          value: accepted
          labels:
            zh: 已接受
            en: accepted
            ja: accepted
          definitions:
            zh: 审查处置确认该版本满足当前接受条件，但尚不必是发布终态。
            en: Review disposition confirms the revision meets current acceptance conditions without necessarily being the release-final state.
            ja: review disposition が現在の acceptance 条件を満たすと確認しますが release-final とは限りません。
          source_claims:
            - claim-artifact-design
        - id: artifact-governance-state-rejected
          value: rejected
          labels:
            zh: 已拒绝
            en: rejected
            ja: rejected
          definitions:
            zh: 审查处置确认该版本不满足接受条件且不能按当前内容发布。
            en: Review disposition confirms the revision fails acceptance conditions and cannot be released as-is.
            ja: review disposition が acceptance 条件不適合を確認し現内容のまま release できません。
          source_claims:
            - claim-artifact-design
        - id: artifact-governance-state-final
          value: final
          labels:
            zh: 最终版
            en: final
            ja: final
          definitions:
            zh: 该版本已被选定为当前交付或发布基线，后续内容变化必须创建新版本。
            en: The revision is the current delivery or release baseline; later content changes require a new revision.
            ja: revision は現在の delivery/release baseline で、後続内容変更は新 revision を必要とします。
          source_claims:
            - claim-artifact-design
        - id: artifact-governance-state-withdrawn
          value: withdrawn
          labels:
            zh: 已撤回
            en: withdrawn
            ja: withdrawn
          definitions:
            zh: 该版本保留谱系记录但不再作为可选择或可发布候选。
            en: The revision remains in lineage records but is no longer an eligible selection or release candidate.
            ja: revision は lineage record に残りますが selection/release candidate ではありません。
          source_claims:
            - claim-artifact-design
      pattern: null
      example_value: under-review
      source_claims:
        - claim-artifact-design
  constraints:
    - id: artifact-version-content-immutable
      severity: error
      expression_language: plain
      expression: the same artifact_id and version must always resolve to the same content_digest
      explanations:
        zh: 相同逻辑标识与版本不得解析到不同内容；任何内容变化必须创建新版本。
        en: The same logical identifier and version cannot resolve to different content; every content change creates a new version.
        ja: 同じ論理識別と版本が異なる内容を指してはならず、内容変更は新版本を作成します。
      source_claims:
        - claim-artifact-design
  required_relation_constraints:
    - id: runtime-artifact-generated-by-one-attempt
      direction: outgoing
      predicate: generated_by
      target_concept_id: RunAttempt
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 运行产物版本必须追溯到实际生成该字节版本的一次执行尝试。
        en: A runtime artifact revision must trace to the one RunAttempt that generated those bytes.
        ja: 実行成果物 revision はその byte を生成した一つの RunAttempt へ追跡できなければなりません。
      source_claims:
        - claim-artifact-design
examples:
  - id: Artifact-example-positive-manual-20260716
    labels:
      zh: A2A Artifact parts
      en: A2A Artifact parts
      ja: A2A Artifact parts
    descriptions:
      zh: A2A Artifact artifactId=a2a-report-a1、name=report、parts=[TextPart, FilePart]、content_digest=sha256:8b1a9953...；PROV-O Entity 由 Execution 生成。
      en: A2A Artifact artifactId=a2a-report-a1, name=report, parts=[TextPart, FilePart], content_digest=sha256:8b1a9953...; PROV-O Entity generated by Execution.
      ja: A2A Artifact parts が PROV Entity である。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values:
      artifact_id: artifact-validation-report
      version: "7"
      content_digest: sha256:9a4f…
      media_type: application/json
      byte_count: 48211
      display_label: Validation report
      visibility: session
    related_node_ids:
      - Artifact
      - RunAttempt
    related_relation_ids:
      - Artifact-generated_by-RunAttempt
    source_claims:
      - claim-artifact-design
  - id: Artifact-example-boundary-manual-20260716
    labels:
      zh: 进程句柄非 Artifact
      en: Process handle not Artifact
      ja: プロセスハンドルは Artifact ではない
    descriptions:
      zh: ProcessHandle PID=4820 指向 worker 进程，无稳定内容输出与 content_digest，不是 Artifact。
      en: ProcessHandle PID=4820 points to worker process without stable content output and content_digest, not Artifact.
      ja: PID は Artifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - Artifact
      - Message
    related_relation_ids: []
    source_claims:
      - claim-artifact-design
  - id: Artifact-example-3
    labels:
      zh: Span event 与 Artifact 边界
      en: Span event versus Artifact boundary
      ja: Span event と Artifact 境界
    descriptions:
      zh: OTel span.add_event("artifact_uploaded") 报告上传发生；Artifact 内容在独立 Entity 记录；event 是证据，Artifact 是输出。
      en: OTel span.add_event("artifact_uploaded") reports upload occurrence; Artifact content in independent Entity record; event is evidence, Artifact is output.
      ja: span event と Artifact Entity は分離する。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - Artifact
    related_relation_ids: []
    source_claims:
      - claim-artifact-design
      - claim-artifact-design
  - id: Artifact-example-4
    labels:
      zh: OpenAI assistant message 输出
      en: OpenAI assistant message output
      ja: OpenAI assistant message 出力
    descriptions:
      zh: OpenAI Assistants Messages API 返回 assistant role message 文本作为 Run 输出 Artifact artifact_id=openai-message-output-22、media_type=text/plain。
      en: OpenAI Assistants Messages API returns assistant role message text as Run output Artifact artifact_id=openai-message-output-22, media_type=text/plain.
      ja: OpenAI assistant message が Artifact 出力である。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - Artifact
    related_relation_ids: []
    source_claims:
      - claim-artifact-design
      - claim-artifact-design
parent_relation: null
relations:
  - id: artifact_attributed_to_actor
    predicate: artifact_attributed_to_actor
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 归因于智能体参与者
      en: attributed to agent actor
      ja: agent actor に帰属
    definitions:
      zh: Artifact 通过此关系指向对该版本内容承担创作或生成责任的 AgentActor；归因不表示该参与者亲自执行每个生成步骤，也不等同于审查者。
      en: Artifact points to the AgentActor bearing authorship or generation responsibility for that revision; attribution neither says the actor executed every generating step nor makes it a reviewer.
      ja: Artifact はその revision の著作または生成責任を負う AgentActor を指し、帰属は全生成 step の直接実行や reviewer 身分を意味しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_artifact_attributed_to_actor
      labels:
        zh: 反向：artifact attributed to actor
        en: is target of artifact attributed to actor
        ja: 逆方向：artifact attributed to actor
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AgentActor
  - id: artifact_exported_as
    predicate: artifact_exported_as
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 导出为独立包
      en: exported as package
      ja: package として export
    definitions:
      zh: 源 Artifact 通过此关系指向由导出活动生成的独立 ExportArtifact；目标必须有自己的版本和摘要，并记录源版本摘要与清单，而不是同一对象的别名。
      en: A source Artifact points to an independent ExportArtifact generated by export; the target has its own version and digest plus source-version and manifest digests, rather than being an alias of the same object.
      ja: source Artifact は export で生成された独立 ExportArtifact を指し、target は固有版本・digest・source version digest・manifest digest を持ち、同一対象 alias ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_artifact_exported_as
      labels:
        zh: 反向：artifact exported as
        en: is target of artifact exported as
        ja: 逆方向：artifact exported as
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale:
      zh: 该方向记录具有独立谓词和工程含义，不能由反向事实完整推出。
      en: This direction has an independent predicate and engineering meaning that cannot be fully inferred from the reverse fact.
      ja: この方向は独立した述語と工学的意味を持ち、逆方向事実から完全には推論できません。
    layout_role: cross-link
    target: concept:ExportArtifact
  - id: Artifact-addresses-Task
    predicate: addresses
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 回应任务规范
      en: addresses task specification
      ja: task specification に応答
    definitions:
      zh: Artifact 通过此关系指向其内容旨在满足、证明或部分回应的 Task 规范；该边是语义适用关系，不表示 Task 生成产物，也不证明完成标准已经满足。
      en: Artifact points to the Task specification its content is intended to satisfy, evidence, or partially answer; this applicability relation neither says the Task generated the artifact nor proves completion criteria were met.
      ja: Artifact は内容が充足・証明・部分応答を意図する Task specification を指し、この適用関係は Task が成果物を生成したことも completion criterion 充足も意味しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_addresses
      labels:
        zh: 反向：addresses
        en: is target of addresses
        ja: 逆方向：addresses
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: Artifact 仍由 runtime-plane 拥有，Task 仍由 orchestration-plane 拥有；该 mapping 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: Artifact remains owned by runtime-plane and Task by orchestration-plane; this mapping fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: Artifact は runtime-plane、Task は orchestration-plane に引き続き所有されます。この mapping 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 Artifact → Task 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical Artifact → Task assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは Artifact → Task の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Task
  - id: Artifact-derived_from-Artifact
    predicate: derived_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 派生自源产物
      en: derived from source artifact
      ja: source artifact から派生
    definitions:
      zh: 新 Artifact 版本通过此关系指向其内容转换所依赖的直接源 Artifact 版本；两端必须具有不同版本身份，并记录足以复现或解释派生的活动与参数。
      en: A new Artifact revision points to the direct source Artifact revision on whose content transformation it depends; endpoints have distinct version identities and retain the activity and parameters needed to reproduce or explain derivation.
      ja: 新 Artifact revision は content transformation が依存する直接 source Artifact revision を指し、両端は異なる版本同一性を持ち、派生再現・説明に必要な activity と parameter を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_derived_from
      labels:
        zh: 反向：derived from
        en: is target of derived from
        ja: 逆方向：derived from
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Artifact
  - id: Artifact-generated_by-RunAttempt
    predicate: generated_by
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由执行尝试生成
      en: generated by run attempt
      ja: 実行試行により生成
    definitions:
      zh: Artifact 版本通过此关系指向使该内容版本首次可用的 RunAttempt；生成活动必须与目标摘要和完成时刻对应，不能用仅观察到产物的 TraceEvent 代替。
      en: An Artifact revision points to the RunAttempt that first made that content version available; the generating activity must correspond to the target digest and completion time and cannot be replaced by a TraceEvent that merely observed it.
      ja: Artifact revision はその内容版本を初めて利用可能にした RunAttempt を指し、生成 activity は target digest と完了時刻に対応し、観測しただけの TraceEvent で代替できません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates_artifact
      labels:
        zh: 生成产物
        en: generates artifact
        ja: 成果物を生成する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale:
      zh: consumed_by_attempt 把 Artifact 标为尝试输入；generated_by 把它标为该尝试的新输出，同一尝试可承担不同角色。
      en: consumed_by_attempt marks an Artifact as an attempt input, whereas generated_by marks it as that attempt's new output.
      ja: consumed_by_attempt は Artifact を試行入力として、generated_by は同試行の新出力として区別します。
    layout_role: cross-link
    target: concept:RunAttempt
  - id: Artifact-reviewed_by-ReviewerActor
    predicate: reviewed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由实际参与者审查
      en: reviewed by participating actor
      ja: 参加 Actor が審査
    definitions:
      zh: Artifact 通过此关系指向实际参与该版本审查并对审查记录承担身份责任的 Actor；若需表达 ReviewerRole，必须另由有效 ActorRoleBinding 证明。审查结论仍由 ReviewActivity、Review 和 ReviewFinding 表达，不存入此参与者边。
      en: Artifact points to the Actor who actually participated in reviewing that revision and is identity-responsible for the review record; any ReviewerRole must be proven separately by an effective ActorRoleBinding. The review judgment remains represented by ReviewActivity, Review, and ReviewFinding, not by this participant edge.
      ja: Artifact は revision review に実参加し review 記録へ identity 責任を持つ Actor を指します。ReviewerRole は有効な ActorRoleBinding で別途証明し、review 判断は ReviewActivity・Review・ReviewFinding で表してこの participant edge に格納しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_reviewed_by
      labels:
        zh: 反向：reviewed by
        en: is target of reviewed by
        ja: 逆方向：reviewed by
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-artifact-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Actor
