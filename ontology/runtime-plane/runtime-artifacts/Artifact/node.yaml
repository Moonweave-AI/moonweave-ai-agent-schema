schema: moonweave.ai/ontology-node/v1
id: Artifact
kind: concept
status: accepted
labels: {zh: 运行时工件, en: Runtime artifact, ja: ランタイム成果物}
semantics:
  short_definition: {zh: 由运行时工作产生、导出或使用的、耐久且可寻址的 PROV-O Entity。, en: "A durable, addressable PROV-O Entity produced, exported, or used by runtime work.", ja: ランタイム作業により生成、エクスポート、使用される、耐久的で参照可能な PROV-O Entity。}
  definition: {zh: Artifact 是一个带版本数字 Entity，具有稳定标识、媒体类型、内容表示和可选摘要。它可以由 Execution 生成，但不是生成它的 Activity、实时进程、会话状态记录或其创建的遥测观测。, en: "An Artifact is a versioned digital Entity with stable identity, media type, content representation, and optional digest. It may be generated by an Execution but is not the Activity that generated it, a live process, a session state record, or a telemetry observation of its creation.", ja: Artifact は、安定したアイデンティティ、メディアタイプ、コンテンツ表現、任意のダイジェストを持つバージョン付きデジタル Entity である。Execution により生成され得るが、それを生成した Activity、ライブプロセス、セッション状態記録、作成に関するテレメトリー観測ではない。}
  why_needed: {zh: 可重现性和审计需要在工作进程、追踪或会话消失后，仍能耐久地引用确切输出字节或结构化内容。, en: "Reproducibility and audit require a durable reference to the exact output bytes or structured content after a worker, trace, or session has disappeared.", ja: 再現性と監査には、ワーカー、トレース、セッションが消えた後も、正確な出力バイトまたは構造化コンテンツへの耐久的参照が必要である。}
  includes:
    - {zh: 具有不可变版本或摘要证据的补丁、报告、导出、图序列化和模式文档。, en: "Patches, reports, exports, graph serializations, and schema documents with immutable version or digest evidence.", ja: 不変のバージョンまたはダイジェスト証拠を持つパッチ、レポート、エクスポート、グラフ直列化、スキーマ文書。}
    - {zh: 媒体类型、内容 URI、哈希、生成时间和生产执行引用。, en: "Media type, content URI, hash, generation time, and producing execution reference.", ja: メディアタイプ、コンテンツ URI、ハッシュ、生成時刻、生成実行参照。}
  excludes:
    - {zh: Execution Activity、文件写入 span、进程句柄和可变内存状态。, en: "The Execution Activity, a file-write span, a process handle, and mutable in-memory state.", ja: Execution Activity、ファイル書き込み Span、プロセスハンドル、可変メモリ内状態。}
    - {zh: 无法标识具体内容表示的未版本化标签。, en: An unversioned label that cannot identify a concrete content representation., ja: 具体的なコンテンツ表現を識別できない未バージョンのラベル。}
  semantic_kind: entity
  aliases: [output entity, generated artifact]
engineering:
  explanation: {zh: 生产者将内容写入耐久存储、计算摘要并创建工件记录。使用者在使用前验证 artifact_id、media_type 和摘要，而生成来源指回生产执行。, en: "A producer writes content to durable storage, calculates a digest, and creates an artifact record. Consumers verify artifact_id, media_type, and digest before use, while generation provenance points back to the producing execution.", ja: 生成者はコンテンツを耐久ストレージに書き込み、ダイジェストを計算して成果物記録を作成する。利用者は使用前に artifact_id、media_type、ダイジェストを検証し、生成プロヴナンスは生成した Execution を指す。}
  typical_input:
    - description: {zh: 工件持久化请求, en: Artifact persistence request, ja: 成果物永続化要求}
      format: |-
        {"artifact_id":"artifact-17","media_type":"text/plain","content_uri":"store://artifacts/17","producer_execution_id":"exec-842"}
  typical_output:
    - description: {zh: 工件记录, en: Artifact record, ja: 成果物記録}
      format: |-
        {"artifact_id":"artifact-17","sha256":"8b1a9953c4611296a827abf8c47804d7","media_type":"text/plain","generated_by":"exec-842"}
  reference_implementations:
    - {name: PROV-O Entity and Generation, url: https://www.w3.org/TR/prov-o/, description: Entity identity and activity generation provenance.}
structure:
  identity_keys: [artifact_id, version]
  fields:
    - id: artifact_id
      labels: {zh: 工件 ID, en: Artifact ID, ja: 成果物 ID}
      definitions: {zh: 一条工件记录的稳定标识符。, en: Stable identifier for one artifact record., ja: 1件の成果物記録の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: artifact-17
      source_claims: [claim-artifact-entity]
    - id: media_type
      labels: {zh: 媒体类型, en: Media type, ja: メディアタイプ}
      definitions: {zh: 已注册或已声明的内容表示类型。, en: Registered or declared content representation type., ja: 登録済みまたは宣言済みのコンテンツ表現タイプ。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: text/plain
      source_claims: [claim-artifact-entity]
    - id: sha256
      labels: {zh: SHA-256 摘要, en: SHA-256 digest, ja: SHA-256 ダイジェスト}
      definitions: {zh: 用于验证不可变工件字节的内容摘要。, en: Content digest used to verify immutable artifact bytes., ja: 不変の成果物バイトを検証するためのコンテンツダイジェスト。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: 8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6
      source_claims: [claim-artifact-entity]
  constraints:
    - id: artifact-content-identity
      severity: error
      language: plain
      expression: A published artifact version must retain one content reference and may not silently change bytes for the same digest.
      explanation: {zh: 如果一个工件记录指向可变或不匹配内容，标识和验证将失败。, en: Identity and verification fail if one artifact record points to mutable or mismatched content., ja: 1つの成果物記録が可変または不一致のコンテンツを指すと、アイデンティティと検証が失敗する。}
      source_claims: [claim-artifact-entity]
  required_relations: [Artifact-generated_by-Execution]
examples:
  - id: artifact-positive
    labels: {zh: "A2A Artifact parts", en: "A2A Artifact parts", ja: "A2A Artifact parts"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; Artifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; Artifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; Artifact provenance graph."}
    field_values: {artifact_id: a2a-report-a1, media_type: text/plain, content_digest: 'sha256:8b1a9953c4611296a827abf8c47804d78efc4f3c6b4b5c621c6efc72e6c4b0c6'}
    related_node_ids: [Artifact, Execution]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-artifact-entity]
  - id: artifact-counterexample
    labels: {zh: "进程句柄非 Artifact", en: "Process handle not Artifact", ja: "プロセスハンドルは Artifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style Artifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style Artifact.", ja: "Missing parent_run_id rejects LangSmith-style Artifact."}
    field_values: {pid: 4820}
    related_node_ids: [ProcessHandle]
    related_relation_ids: []
    source_claims: [claim-artifact-entity]
  - id: artifact-boundary
    labels: {zh: "Span event 与 Artifact 边界", en: "Span event versus Artifact boundary", ja: "Span event と Artifact 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Artifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Artifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {artifact_id: a2a-report-a1}
    related_node_ids: [Artifact, TraceEvent]
    related_relation_ids: []
    source_claims: [claim-artifact-entity]
  - id: artifact-instance-report-22
    labels: {zh: "OpenAI assistant message 输出", en: "OpenAI assistant message output", ja: "OpenAI assistant message 出力"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->Artifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->Artifact.", ja: "LangSmith instance maps to Artifact."}
    field_values: {artifact_id: openai-message-output-22, media_type: text/plain}
    related_node_ids: [Artifact, Execution, TraceSpan]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-artifact-entity]
parent_relation: null
relations:
  - id: Artifact-generated_by-Execution
    predicate: was_generated_by
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由执行生成, en: was generated by execution, ja: 実行により生成された}
    definitions: {zh: 当执行输出记录或存储提交将该执行标识为生产者时，Artifact 由 Execution was_generated_by。, en: Artifact was_generated_by Execution when the execution output record or storage commit identifies that execution as producer., ja: 実行出力記録またはストレージコミットがその Execution を生成者として識別するとき、Artifact は Execution に was_generated_by される。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: generated, labels: {zh: 生成工件, en: generated artifact, ja: 成果物を生成した}}
    conditions:
      - id: artifact-generation-condition
        severity: error
        expression: Assert only with a producer execution ID and generation evidence; a later reader does not become generator.
        explanations: {zh: 消费与生成具有相反的来源方向。, en: Consumption and generation have opposite provenance direction., ja: 消費と生成は反対のプロヴナンス方向を持つ。}
        source_claims: [claim-artifact-entity]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-artifact-entity]
    target: concept:Execution
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity fixed aspects and wasGeneratedBy provenance relationships.
source_claims:
  - id: claim-artifact-entity
    source: prov-o-core
    supports: PROV-O defines an Entity with fixed aspects and relates generated Entities to the Activities that generated them.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high

