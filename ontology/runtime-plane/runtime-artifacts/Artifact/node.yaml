schema: moonweave.ai/ontology-node/v1
id: Artifact
kind: concept
status: accepted
labels:
  zh: 运行产物
  en: runtime artifact
  ja: 実行成果物
semantics:
  short_definition:
    zh: 具有稳定标识、不可变版本、内容摘要和运行溯源的独立工作产品。
    en: An independently referable work product with stable identity, immutable version, digest, and runtime provenance.
    ja: 安定識別、不変版本、内容 digest、実行 provenance を持つ独立参照可能な作業成果です。
  definition:
    zh: 运行产物是一种信息实体；其种差是作为一次智能体运行可独立寻址和复核的工作产品，由 artifact_id 与 version 标识，以内容摘要固定字节，并通过生成、使用、派生、归因和审查关系保存溯源。
    en: A runtime artifact is an information entity distinguished as an independently addressable and reviewable work product of agent operation, identified by artifact_id and version, byte-fixed by a content digest, and provenance-linked through generation, use, derivation, attribution, and review.
    ja: 実行成果物は情報 entity の一種で、agent 実行における独立アドレス可能・再検査可能な作業成果として区別され、artifact_id と version で識別し、content digest で byte を固定し、生成・使用・派生・帰属・review の provenance を持ちます。
  why_needed:
    zh: 没有独立产物身份时，报告、补丁和图数据只能作为临时字段存在，无法可靠复现、审查、派生或交付。
    en: Without independent artifact identity, reports, patches, and graph data collapse into transient fields that cannot be reliably reproduced, reviewed, derived, or delivered.
    ja: 独立成果物識別がなければ report・patch・graph data は一時 field に潰れ、再現・review・派生・納品を確実に行えません。
  includes:
    - zh: 包含已物化、可按标识和版本读取，并具有内容摘要与生成溯源的运行工作产品。
      en: Includes materialized runtime work products readable by identifier and version with a content digest and generation provenance.
      ja: 識別子と版本で読め、content digest と生成 provenance を持つ物化済み実行成果を含みます。
  excludes:
    - zh: 不包含消息中的临时字段、尚未物化的计划输出、只有路径而无内容身份的文件位置或一次 TraceEvent 记录。
      en: Excludes transient message fields, planned but unmaterialized output, file locations without content identity, and TraceEvent records.
      ja: 一時 message field、未物化の予定出力、内容識別のない file location、TraceEvent 記録を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: artifact_id
      labels:
        zh: 产物标识
        en: artifact ID
        ja: 成果物 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨不可变修订保持稳定的逻辑工作产品标识。
        en: Stable identifier of the logical work product across immutable revisions.
        ja: 不変 revision 間で安定する論理作業成果の識別子です。
      allowed_values: []
      pattern: null
      example_value: artifact-validation-report
      source_claims:
        - claim-artifact-002
    - id: version
      labels:
        zh: 不可变版本
        en: immutable version
        ja: 不変版本
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一份内容固定且不可原地覆盖的产物修订。
        en: Identifies one content-fixed artifact revision that cannot be overwritten in place.
        ja: 内容が固定され直接上書きできない一つの成果物 revision を識別します。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-artifact-003
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该版本规范字节序列计算的算法限定摘要，用于完整性与同一性校验。
        en: Algorithm-qualified digest of the revision's canonical byte sequence for integrity and identity verification.
        ja: revision の canonical byte 列に対する algorithm 付き digest で、完全性と同一性を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:9a4f…
      source_claims:
        - claim-artifact-004
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明产物字节的解释格式，而非产物在本体中的业务类别。
        en: Declares how artifact bytes are interpreted, not the artifact's ontology class.
        ja: 成果物 byte の解釈形式を宣言し、本体上の業務 class とは区別します。
      allowed_values: []
      pattern: null
      example_value: application/json
      source_claims:
        - claim-artifact-005
    - id: byte_count
      labels:
        zh: 原始字节数
        en: raw byte count
        ja: 生バイト数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该不可变版本在 Base64 编码或分词之前的原始内容字节数；它用于容量与传输一致性核验，不替代 content_digest，也不参与产物分类。
        en: Records the immutable revision's raw content size in bytes before Base64 encoding or tokenization. It supports capacity and transfer-consistency checks, does not replace content_digest, and does not determine artifact class.
        ja: 不変 revision の Base64 符号化・tokenization 前の生内容バイト数を記録します。容量・転送整合性の検査に使い、content_digest を置換せず成果物分類にも使いません。
      allowed_values: []
      pattern: null
      example_value: 48211
      source_claims:
        - claim-artifact-006
    - id: display_label
      labels:
        zh: 显示名称
        en: display label
        ja: 表示名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供人类界面展示和识别该产物版本的可选名称；它可以修改而不改变 artifact_id、version 或内容身份，因此不得作为唯一键。
        en: Optional human-readable name used to present and recognize the artifact revision. It may change without changing artifact_id, version, or content identity and therefore is not an identity key.
        ja: 成果物 revision を人間向け UI で表示・識別する任意名称です。artifact_id・version・内容同一性を変えず変更できるため identity key にはしません。
      allowed_values: []
      pattern: null
      example_value: Validation report
      source_claims:
        - claim-artifact-007
    - id: visibility
      labels:
        zh: 预期披露范围
        en: intended visibility scope
        ja: 意図された開示範囲
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 以受控值标注该产物版本预期允许披露到的最宽受众范围。该标签为访问与披露策略提供输入，但本身不是授权决定、访问控制列表或已发生披露的证明。
        en: Labels the broadest intended audience scope for the artifact revision with a controlled value. The label is input to access and disclosure policy; it is not itself an authorization decision, access-control list, or proof that disclosure occurred.
        ja: 成果物 revision の意図された最大受信者範囲を制御値でラベル付けします。このラベルは access・disclosure policy の入力であり、認可判断、ACL、実際の開示証明そのものではありません。
      allowed_values:
        - id: VisibilityPrivate
          value: private
          labels:
            zh: 私有
            en: private
            ja: 非公開
          definitions:
            zh: 只允许披露给策略明确指定的主体；不得因主体参加同一会话或属于同一用户而自动扩大范围。
            en: Disclosure is intended only for principals explicitly admitted by policy; sharing a session or user identity does not automatically widen the scope.
            ja: policy が明示的に許可した principal のみに開示し、同一 session・user であるだけでは範囲を拡張しません。
          status: accepted
          source_claims:
            - claim-artifact-008
        - id: VisibilitySession
          value: session
          labels:
            zh: 会话内
            en: session-scoped
            ja: セッション内
          definitions:
            zh: 允许在产生或使用该产物的同一受控运行会话内披露；跨会话使用必须重新经过策略判断。
            en: Disclosure is intended within the same controlled runtime session that produced or uses the artifact; cross-session use requires a new policy decision.
            ja: 成果物を生成・利用する同一の制御済み runtime session 内で開示し、session を跨ぐ利用には新たな policy 判断を必要とします。
          status: accepted
          source_claims:
            - claim-artifact-009
        - id: VisibilityUser
          value: user
          labels:
            zh: 用户可见
            en: user-scoped
            ja: ユーザー範囲
          definitions:
            zh: 允许向经身份与策略确认的同一终端用户披露，可跨该用户的受控会话，但不自动允许其他用户访问。
            en: Disclosure is intended for the same authenticated and policy-admitted end user across controlled sessions, without automatically admitting other users.
            ja: 認証され policy で許可された同一 end user へ制御済み session を跨いで開示できますが、他 user を自動的には許可しません。
          status: accepted
          source_claims:
            - claim-artifact-010
        - id: VisibilityPublic
          value: public
          labels:
            zh: 公开
            en: public
            ja: 公開
          definitions:
            zh: 允许在完成适用的发布、脱敏与治理检查后向不特定受众披露；公开标签不会跳过这些检查。
            en: Disclosure is intended for an unrestricted audience only after applicable release, redaction, and governance checks; the public label does not bypass those checks.
            ja: 適用される release・redaction・governance 検査後に不特定受信者へ開示でき、public ラベルは検査を迂回しません。
          status: accepted
          source_claims:
            - claim-artifact-011
      pattern: null
      example_value: session
      source_claims:
        - claim-artifact-012
    - id: governance_state
      labels:
        zh: 治理状态
        en: governance state
        ja: governance 状態
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该不可变产物版本当前在评审与发布流程中的治理状态；状态变化不改变产物类型或内容摘要。
        en: Records the immutable revision's current governance state in review and release workflows; a state change does not change artifact type or content digest.
        ja: 不変成果物 revision の review・release workflow における現在の governance 状態を記録し、状態変更は成果物 type や content digest を変更しません。
      allowed_values:
        - id: artifact-governance-state-draft
          value: draft
          labels:
            zh: 草稿
            en: draft
            ja: draft
          definitions:
            zh: 内容版本已形成但尚未提交正式审查。
            en: The content revision exists but has not entered formal review.
            ja: content revision は存在しますが正式 review に未提出です。
          status: accepted
          source_claims:
            - claim-artifact-013
        - id: artifact-governance-state-under-review
          value: under-review
          labels:
            zh: 审查中
            en: under review
            ja: review 中
          definitions:
            zh: 具名审查活动正在评价该内容版本，尚无最终处置。
            en: A named review activity is evaluating the revision and has no final disposition yet.
            ja: named review activity が revision を評価中で最終 disposition は未決です。
          status: accepted
          source_claims:
            - claim-artifact-014
        - id: artifact-governance-state-accepted
          value: accepted
          labels:
            zh: 已接受
            en: accepted
            ja: accepted
          definitions:
            zh: 审查处置确认该版本满足当前接受条件，但尚不必是发布终态。
            en: Review disposition confirms the revision meets current acceptance conditions without necessarily being the release-final state.
            ja: review disposition が現在の acceptance 条件を満たすと確認しますが release-final とは限りません。
          status: accepted
          source_claims:
            - claim-artifact-015
        - id: artifact-governance-state-rejected
          value: rejected
          labels:
            zh: 已拒绝
            en: rejected
            ja: rejected
          definitions:
            zh: 审查处置确认该版本不满足接受条件且不能按当前内容发布。
            en: Review disposition confirms the revision fails acceptance conditions and cannot be released as-is.
            ja: review disposition が acceptance 条件不適合を確認し現内容のまま release できません。
          status: accepted
          source_claims:
            - claim-artifact-016
        - id: artifact-governance-state-final
          value: final
          labels:
            zh: 最终版
            en: final
            ja: final
          definitions:
            zh: 该版本已被选定为当前交付或发布基线，后续内容变化必须创建新版本。
            en: The revision is the current delivery or release baseline; later content changes require a new revision.
            ja: revision は現在の delivery/release baseline で、後続内容変更は新 revision を必要とします。
          status: accepted
          source_claims:
            - claim-artifact-017
        - id: artifact-governance-state-withdrawn
          value: withdrawn
          labels:
            zh: 已撤回
            en: withdrawn
            ja: withdrawn
          definitions:
            zh: 该版本保留谱系记录但不再作为可选择或可发布候选。
            en: The revision remains in lineage records but is no longer an eligible selection or release candidate.
            ja: revision は lineage record に残りますが selection/release candidate ではありません。
          status: accepted
          source_claims:
            - claim-artifact-018
      pattern: null
      example_value: under-review
      source_claims:
        - claim-artifact-019
  constraints:
    - id: artifact-version-content-immutable
      severity: error
      expression_language: plain
      expression: the same artifact_id and version must always resolve to the same content_digest
      explanations:
        zh: 相同逻辑标识与版本不得解析到不同内容；任何内容变化必须创建新版本。
        en: The same logical identifier and version cannot resolve to different content; every content change creates a new version.
        ja: 同じ論理識別と版本が異なる内容を指してはならず、内容変更は新版本を作成します。
      source_claims:
        - claim-artifact-020
  required_relation_constraints:
    - id: runtime-artifact-generated-by-one-attempt
      direction: outgoing
      predicate: generated_by
      target_concept_id: RunAttempt
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 运行产物版本必须追溯到实际生成该字节版本的一次执行尝试。
        en: A runtime artifact revision must trace to the one RunAttempt that generated those bytes.
        ja: 実行成果物 revision はその byte を生成した一つの RunAttempt へ追跡できなければなりません。
      source_claims:
        - claim-artifact-021
examples:
  - id: Artifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 不可变验证报告产物
      en: Immutable validation-report artifact
      ja: 不変 validation report 成果物
    scenario_id: null
    descriptions:
      zh: artifact-validation-report@7 可按 ID 与版本读取，摘要 sha256:9a4f… 与存储字节一致，并由 attempt-501-1 生成。
      en: artifact-validation-report@7 is readable by ID and version, digest sha256:9a4f… matches its stored bytes, and attempt-501-1 generated it.
      ja: artifact-validation-report@7 は ID と版本で読め、digest sha256:9a4f… が保存 byte と一致し、attempt-501-1 が生成しています。
    field_values:
      artifact_id: artifact-validation-report
      version: "7"
      content_digest: sha256:9a4f…
      media_type: application/json
      byte_count: 48211
      display_label: Validation report
      visibility: session
    related_node_ids:
      - Artifact
      - RunAttempt
    related_relation_ids:
      - Artifact-generated_by-RunAttempt
    expected_result:
      zh: 归入 Artifact，并保留不可变版本与生成溯源。
      en: Classify it as Artifact and retain immutable version and generation provenance.
      ja: Artifact に分類し、不変版本と生成 provenance を保持します。
    why_valid_or_invalid:
      zh: 它同时满足独立寻址、内容固定和实际生成活动三项身份条件。
      en: It satisfies independent addressability, content fixation, and actual generation provenance.
      ja: 独立 address、内容固定、実生成活動の三条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-artifact-022
  - id: Artifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 消息中的临时文本字段
      en: Transient message text field
      ja: 一時 message text field
    scenario_id: null
    descriptions:
      zh: 响应对象含 answer_text 字段，但没有 artifact_id、版本、摘要或独立读取地址。
      en: A response has an answer_text field but no artifact ID, version, digest, or independent retrieval address.
      ja: response に answer_text field はありますが、artifact ID、版本、digest、独立取得 address がありません。
    field_values: {}
    related_node_ids:
      - Artifact
      - Message
    related_relation_ids: []
    expected_result:
      zh: 保留为消息内容，不得提升为 Artifact。
      en: Keep it as message content and do not promote it to Artifact.
      ja: message content のままとし Artifact へ昇格しません。
    why_valid_or_invalid:
      zh: 字段值不能独立寻址或验证内容身份，因此不是运行工作产品实体。
      en: The field cannot be independently addressed or content-verified, so it is not a runtime work-product entity.
      ja: field は独立 address も内容同一性検証もできず、実行作業成果 entity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-artifact-023
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: artifact_attributed_to_actor
    predicate: artifact_attributed_to_actor
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 归因于智能体参与者
      en: attributed to agent actor
      ja: agent actor に帰属
    definitions:
      zh: Artifact 通过此关系指向对该版本内容承担创作或生成责任的 AgentActor；归因不表示该参与者亲自执行每个生成步骤，也不等同于审查者。
      en: Artifact points to the AgentActor bearing authorship or generation responsibility for that revision; attribution neither says the actor executed every generating step nor makes it a reviewer.
      ja: Artifact はその revision の著作または生成責任を負う AgentActor を指し、帰属は全生成 step の直接実行や reviewer 身分を意味しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_artifact_attributed_to_actor
      labels:
        zh: 反向：artifact attributed to actor
        en: is target of artifact attributed to actor
        ja: 逆方向：artifact attributed to actor
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: artifact_attributed_to_actor-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 报告归因于报告智能体
          en: Report attributed to report agent
          ja: report agent への帰属
        scenario_id: null
        descriptions:
          zh: report-7 的 provenance 指定 agent-reporting-v2 对内容综合负责，生成尝试另由 Artifact-generated_by-RunAttempt 记录。
          en: report-7 provenance names agent-reporting-v2 as responsible for synthesis, while the generating attempt is recorded separately.
          ja: report-7 provenance は agent-reporting-v2 を synthesis 責任者とし、生成試行は別に記録します。
        field_values: {}
        related_node_ids:
          - Artifact
          - AgentActor
          - RunAttempt
        related_relation_ids:
          - artifact_attributed_to_actor
        expected_result:
          zh: 返回内容责任参与者，同时保留独立生成活动。
          en: Return the responsible actor while retaining the distinct generating activity.
          ja: 内容責任 actor を返し独立生成活動を保持します。
        why_valid_or_invalid:
          zh: 归因声明有明确参与者和责任角色，而不是从执行环境猜测。
          en: The attribution names an actor and responsibility role rather than inferring one from runtime environment.
          ja: 帰属は actor と責任 role を明示し実行環境から推測しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-artifact-024
      - id: artifact_attributed_to_actor-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 仅在同一会话出现
          en: Mere session co-presence
          ja: session 共在のみ
        scenario_id: null
        descriptions:
          zh: agent-helper 与 report-7 出现在同一会话，但没有作者、责任或归因声明。
          en: agent-helper and report-7 occur in one session but no authorship, responsibility, or attribution statement exists.
          ja: agent-helper と report-7 は同 session に現れますが著作・責任・帰属声明がありません。
        field_values: {}
        related_node_ids:
          - Artifact
          - AgentActor
        related_relation_ids:
          - artifact_attributed_to_actor
        expected_result:
          zh: 不得把该会话共现记录断言为产物归因关系。
          en: Do not assert attribution.
          ja: この session 共在記録から成果物の帰属関係を主張しません。
        why_valid_or_invalid:
          zh: 共同参与会话不足以证明对具体内容版本承担责任。
          en: Session participation alone does not establish responsibility for a specific content revision.
          ja: session 参加だけでは特定 content revision の責任を証明しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-artifact-025
    source_claims:
      - claim-artifact-026
