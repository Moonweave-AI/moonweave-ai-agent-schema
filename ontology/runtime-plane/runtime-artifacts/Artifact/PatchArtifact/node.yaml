schema: moonweave.ai/ontology-node/v1
id: PatchArtifact
kind: concept
status: accepted
labels: {zh: 补丁工件, en: Patch artifact, ja: パッチ成果物}
semantics:
  short_definition: {zh: 一个包含相对于已标识基线的带版本变更集的 Artifact。, en: An Artifact containing a versioned change set against an identified base., ja: 識別されたベースに対するバージョン付き変更セットを含む Artifact。}
  definition: {zh: PatchArtifact 是一个耐久 Entity，编码相对于基线修订或目标表示的添加、删除或替换。它可以由运行时工作提议、应用或拒绝，但不是修改 Activity、未提交工作区状态或生成的完整文件树。, en: "A PatchArtifact is a durable Entity encoding additions, deletions, or replacements relative to a base revision or target representation. It may be proposed, applied, or rejected by runtime work, but it is not the modification Activity, an uncommitted workspace state, or the resulting full file tree.", ja: PatchArtifact は、ベースリビジョンまたは対象表現に対する追加、削除、置換を符号化する耐久 Entity である。ランタイム作業により提案、適用、拒否され得るが、変更 Activity、未コミットのワークスペース状態、結果の完全なファイルツリーではない。}
  why_needed: {zh: 代码和配置变更必须可审查、可重现且可归属，而不要求访问原始运行工作区。, en: "Code and configuration changes must be reviewable, reproducible, and attributable without requiring access to the original running workspace.", ja: コードと構成の変更は、元の実行ワークスペースへのアクセスを必要とせずに、レビュー可能、再現可能、帰属可能でなければならない。}
  includes:
    - {zh: 统一 diff、结构化补丁、变更清单、基线修订引用和补丁摘要。, en: "Unified diffs, structured patches, change manifests, base revision references, and patch digests.", ja: unified diff、構造化パッチ、変更マニフェスト、ベースリビジョン参照、パッチダイジェスト。}
    - {zh: 具有明确目标和基线标识的已提议或已应用变更集。, en: Proposed or applied change sets with explicit target and base identity., ja: 明示的な対象とベースアイデンティティを持つ、提案済みまたは適用済み変更セット。}
  excludes:
    - {zh: 编写或应用补丁的活动、提交对象或实时工作目录。, en: "The activity that authored or applied the patch, a commit object, or a live working directory.", ja: パッチを作成または適用した Activity、コミットオブジェクト、ライブ作業ディレクトリ。}
    - {zh: 仅描述变更而没有机器可读变更集的报告。, en: A report merely describing a change without a machine-readable change set., ja: 機械可読の変更セットなしに変更を説明するだけのレポート。}
  semantic_kind: entity
  aliases: [diff, change set]
engineering:
  explanation: {zh: 补丁 API 接收 base_ref 和操作或 diff 文本，验证基线匹配，并返回内容寻址的补丁工件。应用补丁是单独的执行步骤，记录结果和生成的工件 ID。, en: "A patch API receives base_ref and operations or diff text, validates that the base matches, and returns a content-addressed patch artifact. Applying the patch is a separate execution step that records outcome and resulting artifact IDs.", ja: パッチ API は base_ref と操作または diff テキストを受け取り、ベースが一致することを検証して、コンテンツアドレス指定のパッチ成果物を返す。パッチ適用は別個の実行ステップであり、結果と生成成果物 ID を記録する。}
  typical_input:
    - description: {zh: 补丁创建输入, en: Patch creation input, ja: パッチ作成入力}
      format: |-
        {"base_ref":"git:abc123","media_type":"text/x-diff","content":"diff --git a/app.ts b/app.ts"}
  typical_output:
    - description: {zh: 补丁工件记录, en: Patch artifact record, ja: パッチ成果物記録}
      format: |-
        {"artifact_id":"patch-17","base_ref":"git:abc123","media_type":"text/x-diff","sha256":"8b1a9953c4611296a827abf8c47804d7"}
  reference_implementations:
    - {name: PROV-O derivation, url: https://www.w3.org/TR/prov-o/, description: Derivation distinguishes changed Entities from activities that create them.}
structure:
  identity_keys: [artifact_id, version, sha256]
  fields:
    - id: artifact_id
      labels: {zh: 补丁工件 ID, en: Patch artifact ID, ja: パッチ成果物 ID}
      definitions: {zh: 从 Artifact 继承的稳定 ID。, en: Stable ID inherited from Artifact., ja: Artifact から継承した安定 ID。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: patch-17
      source_claims: [claim-patch-artifact]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "补丁表示的声明序列化媒体类型。"
        en: "Declared serialization media type of the patch representation."
        ja: "パッチ表現の宣言済みシリアル化メディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: text/x-diff
      source_claims: [claim-patch-artifact]
    - id: base_ref
      labels: {zh: 基线引用, en: Base reference, ja: ベース参照}
      definitions: {zh: 定义补丁所针对的确切修订或表示。, en: Exact revision or representation against which the patch is defined., ja: パッチが定義される対象の正確なリビジョンまたは表現。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: git:abc123
      source_claims: [claim-patch-artifact]
    - id: operation_count
      labels: {zh: 操作数量, en: Operation count, ja: 操作数}
      definitions: {zh: 补丁表示编码的变更数量。, en: Number of changes encoded by the patch representation., ja: パッチ表現に符号化された変更数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 4
      source_claims: [claim-patch-artifact]
  constraints:
    - id: patch-base-required
      severity: error
      language: plain
      expression: A PatchArtifact must name its base reference and its serialized change representation.
      explanation: {zh: 没有目标基线，变更集无法被安全重现或应用。, en: A change set cannot be reproduced or applied safely without its target baseline., ja: 対象ベースラインなしには、変更セットを安全に再現または適用できない。}
      source_claims: [claim-patch-artifact]
  required_relations: [PatchArtifact-specializes-Artifact]
examples:
  - id: patch-artifact-positive
    labels: {zh: "GitHub PR unified diff", en: "GitHub PR unified diff", ja: "GitHub PR unified diff"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; PatchArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; PatchArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; PatchArtifact provenance graph."}
    field_values: {artifact_id: patch-17, media_type: text/x-diff, base_ref: git:abc123, operation_count: 4}
    related_node_ids: [PatchArtifact, Execution]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-patch-artifact]
  - id: patch-artifact-counterexample
    labels: {zh: "LangGraph StateDiff 非 PatchArtifact", en: "LangGraph StateDiff not PatchArtifact", ja: "LangGraph StateDiff は PatchArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style PatchArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style PatchArtifact.", ja: "Missing parent_run_id rejects LangSmith-style PatchArtifact."}
    field_values: {working_directory: workspace-7}
    related_node_ids: [WorkingDirectory]
    related_relation_ids: []
    source_claims: [claim-patch-artifact]
  - id: patch-artifact-boundary
    labels: {zh: "PatchArtifact 与 ReportArtifact 边界", en: "PatchArtifact versus ReportArtifact boundary", ja: "PatchArtifact と ReportArtifact 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; PatchArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; PatchArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {artifact_id: patch-17}
    related_node_ids: [PatchArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-patch-artifact]
  - id: patch-artifact-instance-patch-17
    labels: {zh: "patch-17 PR diff 实例", en: "patch-17 PR diff instance", ja: "patch-17 PR diff 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->PatchArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->PatchArtifact.", ja: "LangSmith instance maps to PatchArtifact."}
    field_values: {artifact_id: patch-17, media_type: text/x-diff, base_ref: git:abc123, operation_count: 4}
    related_node_ids: [PatchArtifact, Execution, WorkingDirectory]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-patch-artifact]
parent_relation:
  id: PatchArtifact-specializes-Artifact
  predicate: is_a
  target: concept:Artifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是补丁工件, en: is a patch artifact, ja: パッチ成果物である}
  definitions: {zh: 每个 PatchArtifact 都是一个 Artifact，其内容编码相对于已标识基线的变更。, en: Every PatchArtifact is an Artifact whose content encodes changes relative to an identified base., ja: すべての PatchArtifact は、識別されたベースに対する変更をコンテンツに符号化する Artifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_patch_artifact, labels: {zh: 具有补丁工件, en: has patch artifact, ja: パッチ成果物を持つ}}
  conditions:
    - id: patch-artifact-parent-condition
      severity: error
      expression: Require a serialized delta and base reference.
      explanations: {zh: 仅有完整快照或文字描述不是补丁。, en: A full snapshot or prose description alone is not a patch., ja: 完全なスナップショットまたは文章説明だけではパッチではない。}
      source_claims: [claim-patch-artifact]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-patch-artifact]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and derivation patterns for representing changed outputs separately from activities.
source_claims:
  - id: claim-patch-artifact
    source: prov-o-core
    supports: PROV-O supports expressing distinct output Entities and derivation relationships without treating the generating activity as the output.
    locator: Section 3.1 and Section 3.2, Entity and wasDerivedFrom
    evidence_kind: standard
    confidence: medium

