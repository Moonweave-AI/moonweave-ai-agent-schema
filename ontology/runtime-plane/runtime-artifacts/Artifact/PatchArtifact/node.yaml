schema: moonweave.ai/ontology-node/v1
id: PatchArtifact
kind: concept
labels:
  zh: 变更集产物
  en: change-set artifact
  ja: change set 成果物
semantics:
  short_definition:
    zh: 针对明确基线、可重放为目标版本的有序变更集。
    en: An ordered change set against an identified base that can be replayed toward a target revision.
    ja: 識別された base に対し target revision へ replay 可能な順序付き change set です。
  definition:
    zh: 变更集产物是一种运行产物；其种差是以 base digest、目标 digest 和 patch format 标识从旧内容到新内容的操作序列，它不是完整目标文件，也不是泛指任何修改建议。
    en: A change-set artifact is a runtime artifact distinguished by an operation sequence from old to new content, identified by base digest, target digest, and patch format; it is neither the complete target file nor an unstructured change suggestion.
    ja: change set 成果物は base digest、target digest、patch format で旧内容から新内容への操作列を識別する実行成果物で、完全 target file や非構造 change suggestion ではありません。
  why_needed:
    zh: 显式基线和目标身份让补丁可验证重放，并避免把修改后的文件与修改指令混为一物。
    en: Explicit base and target identity makes a patch replayable and verifiable without conflating the changed file with change instructions.
    ja: 明示 base と target 同一性により patch を検証 replay でき、変更後 file と変更指令を混同しません。
  includes:
    - zh: 包含 unified diff、Git binary patch 或其它带基线身份和应用语义的变更集。
      en: Includes unified diffs, Git binary patches, and other change sets with base identity and application semantics.
      ja: unified diff、Git binary patch、base 同一性と適用意味を持つ change set を含みます。
  excludes:
    - zh: 不包含完整替换文件、没有基线的自然语言修改建议或仅记录变更已发生的事件。
      en: Excludes complete replacement files, natural-language change suggestions without a base, and events that merely record a change.
      ja: 完全 replacement file、base のない自然言語 change suggestion、変更発生を記録するだけの event を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: PatchArtifact 映射 unified diff、OpenAI apply_patch 工具输出与 git-style patch；必须引用 base artifact digest 与 produced revision。
    en: PatchArtifact maps unified diff, OpenAI apply_patch tool output, and git-style patches; must reference base artifact digest and produced revision.
    ja: PatchArtifact は unified diff/apply_patch 出力を写像し base digest と produced revision を参照します。
  typical_input:
    - description: E2B file write or OpenAI assistant file output.
      format: |-
        {"patch":"--- a/file
        +++ b/file
        ..."}
      source_claims:
        - claim-e2b-artifact
        - claim-patch-artifact-design
  typical_output:
    - description: Moonweave Artifact with digest and provenance.
      format: '{"artifact_id":"patch-node-yaml-42","base_digest":"sha256:base","content_digest":"sha256:patch"}'
      source_claims:
        - claim-patch-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: base_artifact_digest
      labels:
        zh: 基线摘要
        en: base artifact digest
        ja: base artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 补丁应用前内容版本的摘要。
        en: Digest of the content revision before patch application.
        ja: patch 適用前 content revision の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:base…
      source_claims:
        - claim-patch-artifact-design
    - id: target_artifact_digest
      labels:
        zh: 目标摘要
        en: target artifact digest
        ja: target artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 成功应用补丁后预期内容版本的摘要。
        en: Expected digest of the content revision after successful application.
        ja: patch 成功適用後に期待する content revision の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:target…
      source_claims:
        - claim-patch-artifact-design
    - id: patch_format
      labels:
        zh: 补丁格式
        en: patch format
        ja: patch format
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定路径、hunk、模式和应用规则的补丁方言。
        en: Patch dialect governing paths, hunks, modes, and application rules.
        ja: path・hunk・mode・適用規則を定める patch dialect です。
      allowed_values: []
      pattern: null
      example_value: git-extended-diff
      source_claims:
        - claim-patch-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PatchArtifact-example-positive-manual-20260716
    labels:
      zh: GitHub PR unified diff
      en: GitHub PR unified diff
      ja: GitHub PR unified diff
    descriptions:
      zh: GitHub REST API pulls/17/files 返回 unified diff patch；PatchArtifact artifact_id=patch-17、media_type=text/x-diff、content_digest=sha256:...
      en: GitHub REST API pulls/17/files returns unified diff patch; PatchArtifact artifact_id=patch-17, media_type=text/x-diff, content_digest=sha256:...
      ja: GitHub PR unified diff が PatchArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: patch-auth
      version: "2"
      content_digest: sha256:patch-auth-v2
      media_type: text/x-diff
      base_artifact_digest: sha256:base…
      target_artifact_digest: sha256:target…
      patch_format: git-extended-diff
    related_node_ids:
      - PatchArtifact
      - Artifact
    related_relation_ids:
      - PatchArtifact-is_a-Artifact
    source_claims:
      - claim-patch-artifact-design
  - id: PatchArtifact-example-boundary-manual-20260716
    labels:
      zh: LangGraph StateDiff 非 PatchArtifact
      en: LangGraph StateDiff not PatchArtifact
      ja: LangGraph StateDiff は PatchArtifact ではない
    descriptions:
      zh: LangGraph StateDiff channel=messages patch 是运行时状态 delta，不是 Git unified diff PatchArtifact。
      en: LangGraph StateDiff channel=messages patch is runtime state delta, not Git unified diff PatchArtifact.
      ja: StateDiff は PatchArtifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - PatchArtifact
      - Feedback
    related_relation_ids: []
    source_claims:
      - claim-patch-artifact-design
  - id: PatchArtifact-example-3
    labels:
      zh: PatchArtifact 与 ReportArtifact 边界
      en: PatchArtifact versus ReportArtifact boundary
      ja: PatchArtifact と ReportArtifact 境界
    descriptions:
      zh: PatchArtifact 是代码/文本 patch 输出；ReportArtifact 是研究报告；patch diff 与 narrative report 媒体类型不同。
      en: PatchArtifact is code/text patch output; ReportArtifact is research report; patch diff and narrative report differ in media type.
      ja: PatchArtifact と ReportArtifact は媒体类型が異なる。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - PatchArtifact
    related_relation_ids: []
    source_claims:
      - claim-patch-artifact-design
      - claim-patch-artifact-design
  - id: PatchArtifact-example-4
    labels:
      zh: patch-17 PR diff 实例
      en: patch-17 PR diff instance
      ja: patch-17 PR diff 事例
    descriptions:
      zh: PatchArtifact artifact_id=patch-17、pr_number=17、repo=moonweave/schema、lines_changed=42。
      en: PatchArtifact artifact_id=patch-17, pr_number=17, repo=moonweave/schema, lines_changed=42.
      ja: patch-17 PatchArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - PatchArtifact
    related_relation_ids: []
    source_claims:
      - claim-patch-artifact-design
      - claim-patch-artifact-design
parent_relation:
  id: PatchArtifact-is_a-Artifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 变更集是具有独立摘要和溯源的 Artifact，并由基线、目标与可重放操作序列进一步特化。
    en: A change set is an independently digested, provenance-bearing Artifact further specialized by base, target, and replayable operations.
    ja: change set は独立 digest・provenance を持つ Artifact で、base・target・replay 可能操作列で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-patch-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://www.e2b.dev/docs/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-e2b-artifact
    source: src-e2b-files
    supports: E2B sandbox filesystem writes produce addressable file outputs with path and bytes.
    locator: Sandbox filesystem
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-file-artifact
    source: src-openai-files
    supports: OpenAI Files API returns file_id and metadata for assistant-generated outputs.
    locator: Files > file object
    evidence_kind: design-inference
    confidence: high
  - id: claim-patch-artifact-design
    source: src-runtime-artifacts-design
    supports: PatchArtifact is diff-shaped artifact with base and result provenance.
    locator: PatchArtifact boundary
    evidence_kind: design-inference
    confidence: high
