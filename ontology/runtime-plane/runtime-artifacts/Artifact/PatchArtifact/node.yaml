schema: moonweave.ai/ontology-node/v1
id: PatchArtifact
kind: concept
status: accepted
labels:
  zh: 变更集产物
  en: change-set artifact
  ja: change set 成果物
semantics:
  short_definition:
    zh: 针对明确基线、可重放为目标版本的有序变更集。
    en: An ordered change set against an identified base that can be replayed toward a target revision.
    ja: 識別された base に対し target revision へ replay 可能な順序付き change set です。
  definition:
    zh: 变更集产物是一种运行产物；其种差是以 base digest、目标 digest 和 patch format 标识从旧内容到新内容的操作序列，它不是完整目标文件，也不是泛指任何修改建议。
    en: A change-set artifact is a runtime artifact distinguished by an operation sequence from old to new content, identified by base digest, target digest, and patch format; it is neither the complete target file nor an unstructured change suggestion.
    ja: change set 成果物は base digest、target digest、patch format で旧内容から新内容への操作列を識別する実行成果物で、完全 target file や非構造 change suggestion ではありません。
  why_needed:
    zh: 显式基线和目标身份让补丁可验证重放，并避免把修改后的文件与修改指令混为一物。
    en: Explicit base and target identity makes a patch replayable and verifiable without conflating the changed file with change instructions.
    ja: 明示 base と target 同一性により patch を検証 replay でき、変更後 file と変更指令を混同しません。
  includes:
    - zh: 包含 unified diff、Git binary patch 或其它带基线身份和应用语义的变更集。
      en: Includes unified diffs, Git binary patches, and other change sets with base identity and application semantics.
      ja: unified diff、Git binary patch、base 同一性と適用意味を持つ change set を含みます。
  excludes:
    - zh: 不包含完整替换文件、没有基线的自然语言修改建议或仅记录变更已发生的事件。
      en: Excludes complete replacement files, natural-language change suggestions without a base, and events that merely record a change.
      ja: 完全 replacement file、base のない自然言語 change suggestion、変更発生を記録するだけの event を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: base_artifact_digest
      labels:
        zh: 基线摘要
        en: base artifact digest
        ja: base artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 补丁应用前内容版本的摘要。
        en: Digest of the content revision before patch application.
        ja: patch 適用前 content revision の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:base…
      source_claims:
        - claim-patch-artifact-002
    - id: target_artifact_digest
      labels:
        zh: 目标摘要
        en: target artifact digest
        ja: target artifact digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 成功应用补丁后预期内容版本的摘要。
        en: Expected digest of the content revision after successful application.
        ja: patch 成功適用後に期待する content revision の digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:target…
      source_claims:
        - claim-patch-artifact-003
    - id: patch_format
      labels:
        zh: 补丁格式
        en: patch format
        ja: patch format
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定路径、hunk、模式和应用规则的补丁方言。
        en: Patch dialect governing paths, hunks, modes, and application rules.
        ja: path・hunk・mode・適用規則を定める patch dialect です。
      allowed_values: []
      pattern: null
      example_value: git-extended-diff
      source_claims:
        - claim-patch-artifact-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: PatchArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 带基线目标的 Git 补丁
      en: Git patch with base and target
      ja: base/target 付き Git patch
    scenario_id: null
    descriptions:
      zh: patch-auth@2 声明 base 与 target SHA-256、git-extended-diff 格式，并含两个可应用 hunk。
      en: patch-auth@2 declares base and target SHA-256 digests, git-extended-diff format, and two applicable hunks.
      ja: patch-auth@2 は base/target SHA-256 digest、git-extended-diff format、適用可能な二 hunk を宣言します。
    field_values:
      artifact_id: patch-auth
      version: "2"
      content_digest: sha256:patch-auth-v2
      media_type: text/x-diff
      base_artifact_digest: sha256:base…
      target_artifact_digest: sha256:target…
      patch_format: git-extended-diff
    related_node_ids:
      - PatchArtifact
      - Artifact
    related_relation_ids:
      - PatchArtifact-is_a-Artifact
    expected_result:
      zh: 归入 PatchArtifact，并可验证应用前后摘要。
      en: Classify it as PatchArtifact and verify pre/post-application digests.
      ja: PatchArtifact に分類し適用前後 digest を検証します。
    why_valid_or_invalid:
      zh: 它具有明确基线、目标和可重放操作序列。
      en: It has an explicit base, target, and replayable operation sequence.
      ja: 明示 base・target・replay 可能操作列を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-patch-artifact-005
  - id: PatchArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 自然语言修改建议
      en: Natural-language change suggestion
      ja: 自然言語 change suggestion
    scenario_id: null
    descriptions:
      zh: 评论写着“请优化登录逻辑”，但没有基线、目标摘要或可应用操作。
      en: A comment says “improve login logic” but provides no base, target digest, or applicable operations.
      ja: comment は「login logic を改善」と書くだけで base、target digest、適用操作がありません。
    field_values: {}
    related_node_ids:
      - PatchArtifact
      - Feedback
    related_relation_ids: []
    expected_result:
      zh: 归为反馈或变更提案，不得归入 PatchArtifact。
      en: Classify it as feedback or a change proposal, not PatchArtifact.
      ja: feedback または change proposal とし PatchArtifact に分類しません。
    why_valid_or_invalid:
      zh: 意图描述无法确定地重放为目标内容版本。
      en: An intent description cannot be deterministically replayed into a target content revision.
      ja: 意図記述は target content revision へ決定的に replay できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-patch-artifact-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ReportArtifact
    shared_parent_concept_id: Artifact
    differentia:
      zh: PatchArtifact 的核心内容是可应用的变更及其基线/目标摘要；ReportArtifact 的核心内容是围绕具名主题形成的发现、评估与结论。报告可建议补丁，补丁也可附说明，但只有前者回答分析问题，后者改变目标内容。
      en: PatchArtifact's core content is an applicable change with base and target digests; ReportArtifact's core content is findings, evaluation, and conclusions about a named subject. A report may recommend a patch and a patch may carry notes, but only the former answers an analytical question while the latter changes target content.
      ja: PatchArtifact の中核は base/target digest を持つ適用可能な変更で、ReportArtifact の中核は特定 subject に関する finding・evaluation・conclusion です。report が patch を提案し patch が説明を持っても、前者は分析問に答え、後者は対象内容を変更します。
    source_claims:
      - claim-patch-artifact-007
      - claim-patch-artifact-008
parent_relation:
  id: PatchArtifact-is_a-Artifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 变更集是具有独立摘要和溯源的 Artifact，并由基线、目标与可重放操作序列进一步特化。
    en: A change set is an independently digested, provenance-bearing Artifact further specialized by base, target, and replayable operations.
    ja: change set は独立 digest・provenance を持つ Artifact で、base・target・replay 可能操作列で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PatchArtifact-is_a-Artifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: PatchArtifact 子类正例
        en: Positive PatchArtifact specialization
        ja: PatchArtifact 特殊化の正例
      scenario_id: null
      descriptions:
        zh: PatchArtifact 对象同时满足 Artifact 的独立版本、摘要和生成溯源，并满足自身种差。
        en: The PatchArtifact object satisfies Artifact identity, digest, and generation provenance plus its own differentia.
        ja: PatchArtifact 対象は Artifact の独立版本・digest・生成 provenance と固有種差を満たします。
      field_values: {}
      related_node_ids:
        - PatchArtifact
        - Artifact
      related_relation_ids:
        - PatchArtifact-is_a-Artifact
      expected_result:
        zh: 可沿 PatchArtifact→Artifact 继承通用产物语义。
        en: It inherits common artifact semantics along PatchArtifact-to-Artifact.
        ja: PatchArtifact→Artifact に沿い共通成果物意味を継承します。
      why_valid_or_invalid:
        zh: 子类完整满足父类身份条件并增加更窄种差。
        en: The subtype fully satisfies parent identity and adds a narrower differentia.
        ja: subtype は parent 同一性を完全に満たしより狭い種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-patch-artifact-009
    - id: PatchArtifact-is_a-Artifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: PatchArtifact 子类边界
        en: Boundary for PatchArtifact specialization
        ja: PatchArtifact 特殊化の境界
      scenario_id: null
      descriptions:
        zh: 一个普通 Artifact 版本缺少 PatchArtifact 的专属身份字段或内容语义。
        en: A generic Artifact revision lacks the identity fields or content semantics specific to PatchArtifact.
        ja: 一般 Artifact revision は PatchArtifact 固有の同一性 field または content 意味を欠きます。
      field_values: {}
      related_node_ids:
        - PatchArtifact
        - Artifact
      related_relation_ids:
        - PatchArtifact-is_a-Artifact
      expected_result:
        zh: 保持为 Artifact，不得反向归入 PatchArtifact。
        en: Keep it as Artifact and do not reverse-classify it as PatchArtifact.
        ja: Artifact のままとし PatchArtifact へ逆分類しません。
      why_valid_or_invalid:
        zh: 继承只从下位概念推向上位概念，父类成员不自动满足子类种差。
        en: Inheritance runs from subtype to parent; parent membership does not automatically satisfy subtype differentia.
        ja: 継承は subtype から parent へ進み parent 所属だけで subtype 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-patch-artifact-010
  source_claims:
    - claim-patch-artifact-011
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Entity/Generation 与 JSON Schema/RDF/SHACL 规范逐项核验，Artifact 五类子型语义成立。
    en: Verified against PROV-O Entity/Generation and JSON Schema/RDF/SHACL. Five Artifact subtypes and provenance hold.
    ja: PROV-O Entity/Generation と JSON Schema/RDF/SHACL に照らし五 Artifact subtype と provenance を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-patch-artifact-001
    source: eng-vcs-git-patch-format
    supports: Git's official patch format defines base/target object identity and replayable hunks used to delimit PatchArtifact.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-002
    source: eng-vcs-git-patch-format
    supports: Git patch extended headers identify before and after paths and index object names; Moonweave binds the base with a digest.
    locator: Git patch format > Generating patch text with -p > index header
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-003
    source: eng-vcs-git-patch-format
    supports: Git patch index headers identify before and after object names; Moonweave records the target digest explicitly.
    locator: Git patch format > Generating patch text with -p > index header
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-004
    source: eng-vcs-git-patch-format
    supports: Git documents extended diff headers, hunks, modes, renames, and combined diff format.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-005
    source: eng-vcs-git-patch-format
    supports: Git's documented patch representation grounds the paths, object identities, and hunk semantics used by this example.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-006
    source: eng-vcs-git-patch-format
    supports: Git patch format requires concrete change representation; Moonweave excludes unstructured requests from PatchArtifact.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-007
    source: eng-vcs-git-patch-format
    supports: Git patch format specifies change-oriented headers and hunks, grounding PatchArtifact's transformation boundary.
    locator: Git patch format > Generating patch text with -p > diff and hunk headers
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-008
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Entity identity from generation, usage, derivation, attribution, and provenance records; Moonweave specializes those roles for immutable Artifact revisions and RunAttempt activities.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 generation, usage, derivation, attribution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-009
    source: eng-vcs-git-patch-format
    supports: PatchArtifact uses the cited specification to narrow the general immutable Artifact identity; the hierarchy placement is a reviewed Moonweave inference.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-010
    source: eng-vcs-git-patch-format
    supports: The cited source grounds PatchArtifact's narrower semantics; it does not classify every Artifact as PatchArtifact.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-patch-artifact-011
    source: eng-vcs-git-patch-format
    supports: PatchArtifact is manually classified under Artifact because it retains independent immutable work-product identity while adding the cited narrower semantics.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

