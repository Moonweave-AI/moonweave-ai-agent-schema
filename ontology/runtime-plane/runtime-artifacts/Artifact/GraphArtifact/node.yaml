source_claims:
  - id: claim-graph-artifact-001
    source: eng-ont-rdf
    supports: RDF 1.1 provides an authoritative node-edge graph data model used to delimit GraphArtifact from renderings and schemas.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-002
    source: eng-ont-rdf
    supports: RDF 1.1 defines RDF graphs and datasets as node-edge semantic structures.
    locator: W3C Recommendation > §3 RDF Graphs and §4 RDF Datasets
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-003
    source: eng-ont-rdf
    supports: RDF graph semantics distinguish nodes and triples; Moonweave records an optional materialized node count.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-004
    source: eng-ont-rdf
    supports: RDF defines a graph as a set of triples; Moonweave records an optional materialized edge count.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-005
    source: eng-ont-rdf
    supports: RDF 1.1 defines graph and dataset semantics instantiated by this example.
    locator: W3C Recommendation > §3 RDF Graphs and §4 RDF Datasets
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-006
    source: eng-ont-rdf
    supports: RDF graph identity is a set of triples, not a visual rendering; Moonweave preserves that boundary.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-007
    source: eng-ont-rdf
    supports: RDF 1.1 defines a graph as a set of triples and a dataset as named graphs plus a default graph, grounding snapshot-like graph content.
    locator: W3C Recommendation > §3 RDF Graphs and §4 RDF Datasets
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-008
    source: eng-vcs-git-patch-format
    supports: Git documents patch hunks and extended headers that encode a before-to-after change rather than the resulting full graph state.
    locator: Git patch format > Generating patch text with -p
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-009
    source: eng-ont-rdf
    supports: GraphArtifact uses the cited specification to narrow the general immutable Artifact identity; the hierarchy placement is a reviewed Moonweave inference.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-010
    source: eng-ont-rdf
    supports: The cited source grounds GraphArtifact's narrower semantics; it does not classify every Artifact as GraphArtifact.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-graph-artifact-011
    source: eng-ont-rdf
    supports: GraphArtifact is manually classified under Artifact because it retains independent immutable work-product identity while adding the cited narrower semantics.
    locator: W3C Recommendation > §3 RDF Graphs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
