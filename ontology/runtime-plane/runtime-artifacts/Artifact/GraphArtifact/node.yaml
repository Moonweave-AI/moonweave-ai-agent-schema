schema: moonweave.ai/ontology-node/v1
id: GraphArtifact
kind: concept
status: review
labels:
  zh: 图数据产物
  en: graph-data artifact
  ja: graph data 成果物
semantics:
  short_definition:
    zh: 以节点、边及其标识关系作为规范内容的数据产物。
    en: A data artifact whose canonical content is identified nodes, edges, and their relations.
    ja: 識別された node・edge・関係を canonical 内容とする data 成果物です。
  definition:
    zh: 图数据产物是一种运行产物；其种差是规范内容构成图数据模型，节点和边具有稳定标识或可判定等价规则，方向、标签和属性属于图本身，而非仅用于画面的布局坐标。
    en: "A graph-data artifact is a runtime artifact whose canonical content instantiates a graph data model: nodes and edges have stable identity or decidable equivalence, and direction, labels, and properties belong to the graph rather than merely to visual layout coordinates."
    ja: graph data 成果物は graph data model を canonical 内容として実体化し、node・edge は安定識別または判定可能な同値規則を持ち、方向・label・property は可視化座標ではなく graph 自体に属します。
  why_needed:
    zh: 它把可交换的图数据与截图、布局缓存和图谱查看状态分离。
    en: It separates exchangeable graph data from screenshots, layout caches, and viewer state.
    ja: 交換可能 graph data を screenshot、layout cache、viewer state から分離します。
  includes:
    - zh: 包含 RDF 数据集、属性图快照或具有明确节点边模式的其它图数据文件。
      en: Includes RDF datasets, property-graph snapshots, and other files with explicit node-edge semantics.
      ja: RDF dataset、property graph snapshot、明示 node-edge 意味を持つ file を含みます。
  excludes:
    - zh: 不包含只显示图形的 PNG、没有图语义的坐标列表或本体 Schema 约束本身。
      en: Excludes PNG renderings, coordinate lists without graph semantics, and the ontology Schema constraints themselves.
      ja: PNG rendering、graph 意味のない座標列、本体 Schema 制約自体を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: graph_model
      labels:
        zh: 图模型
        en: graph model
        ja: graph model
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明节点边语义所遵循的数据模型或方言。
        en: Declares the data model or dialect governing node-edge semantics.
        ja: node-edge 意味が従う data model または dialect を宣言します。
      allowed_values: []
      pattern: null
      example_value: RDF 1.1 Dataset
      source_claims:
        - claim-graph-artifact-002
    - id: node_count
      labels:
        zh: 节点数
        en: node count
        ja: node 数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规范图快照中可寻址节点的计数。
        en: Count of addressable nodes in the canonical graph snapshot.
        ja: canonical graph snapshot の addressable node 数です。
      allowed_values: []
      pattern: null
      example_value: 318
      source_claims:
        - claim-graph-artifact-003
    - id: edge_count
      labels:
        zh: 边数
        en: edge count
        ja: edge 数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规范图快照中语义边或三元组的计数。
        en: Count of semantic edges or triples in the canonical graph snapshot.
        ja: canonical graph snapshot の semantic edge または triple 数です。
      allowed_values: []
      pattern: null
      example_value: 742
      source_claims:
        - claim-graph-artifact-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: RDF 数据集产物
      en: RDF dataset artifact
      ja: RDF dataset 成果物
    scenario_id: null
    descriptions:
      zh: artifact-graph@3 保存 318 个节点和 742 条三元组，graph_model=RDF 1.1 Dataset，摘要固定具体版本。
      en: artifact-graph@3 stores 318 nodes and 742 triples under graph_model=RDF 1.1 Dataset, with a digest fixing the revision.
      ja: artifact-graph@3 は graph_model=RDF 1.1 Dataset で318 node と742 triple を保存し、digest が revision を固定します。
    field_values:
      artifact_id: artifact-graph
      version: "3"
      content_digest: sha256:artifact-graph-v3
      media_type: application/trig
      graph_model: RDF 1.1 Dataset
      node_count: 318
      edge_count: 742
    related_node_ids:
      - GraphArtifact
      - Artifact
    related_relation_ids:
      - GraphArtifact-is_a-Artifact
    expected_result:
      zh: 归入 GraphArtifact，并可按图语义重新加载。
      en: Classify it as GraphArtifact and reload it by graph semantics.
      ja: GraphArtifact に分類し graph 意味で再読込できます。
    why_valid_or_invalid:
      zh: 规范内容是真实节点边集合，而非渲染结果或约束文档。
      en: Its canonical content is an actual node-edge set, not a rendering or constraint document.
      ja: canonical 内容は実 node-edge 集合で、rendering や制約文書ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-artifact-005
  - id: GraphArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 关系图截图
      en: Graph screenshot
      ja: graph screenshot
    scenario_id: null
    descriptions:
      zh: graph.png 只包含像素，无法恢复节点标识、边方向或属性。
      en: graph.png contains pixels only and cannot recover node IDs, edge direction, or properties.
      ja: graph.png は pixel だけを含み、node ID、edge direction、property を復元できません。
    field_values: {}
    related_node_ids:
      - GraphArtifact
      - ImageBlock
    related_relation_ids: []
    expected_result:
      zh: 归为图像内容而非 GraphArtifact。
      en: Classify it as image content, not GraphArtifact.
      ja: image content とし GraphArtifact に分類しません。
    why_valid_or_invalid:
      zh: 可视相似不提供图数据模型所需的节点边身份。
      en: Visual similarity does not supply node-edge identity required by a graph data model.
      ja: 視覚的類似は graph data model に必要な node-edge 同一性を提供しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-artifact-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PatchArtifact
    shared_parent_concept_id: Artifact
    differentia:
      zh: GraphArtifact 固定某一时点的节点、边与图模型；PatchArtifact 固定从基线摘要到目标摘要的变更指令与 hunk。补丁可能修改图文件，但它描述转换，而不是转换后的图快照。
      en: GraphArtifact fixes nodes, edges, and a graph model at one revision; PatchArtifact fixes change instructions and hunks from a base digest to a target digest. A patch may modify a graph file, but it describes a transformation rather than the resulting graph snapshot.
      ja: GraphArtifact は一 revision の node・edge・graph model を固定し、PatchArtifact は base digest から target digest への変更命令と hunk を固定します。patch が graph file を変更しても、結果 graph snapshot ではなく変換を表します。
    source_claims:
      - claim-graph-artifact-007
      - claim-graph-artifact-008
parent_relation:
  id: GraphArtifact-is_a-Artifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 图数据版本满足 Artifact 的独立内容身份，并以节点边数据模型进一步特化。
    en: A graph-data revision satisfies independent Artifact identity and is further specialized by a node-edge data model.
    ja: graph data revision は独立 Artifact 同一性を満たし node-edge data model で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphArtifact-is_a-Artifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: GraphArtifact 子类正例
        en: Positive GraphArtifact specialization
        ja: GraphArtifact 特殊化の正例
      scenario_id: null
      descriptions:
        zh: GraphArtifact 对象同时满足 Artifact 的独立版本、摘要和生成溯源，并满足自身种差。
        en: The GraphArtifact object satisfies Artifact identity, digest, and generation provenance plus its own differentia.
        ja: GraphArtifact 対象は Artifact の独立版本・digest・生成 provenance と固有種差を満たします。
      field_values: {}
      related_node_ids:
        - GraphArtifact
        - Artifact
      related_relation_ids:
        - GraphArtifact-is_a-Artifact
      expected_result:
        zh: 可沿 GraphArtifact→Artifact 继承通用产物语义。
        en: It inherits common artifact semantics along GraphArtifact-to-Artifact.
        ja: GraphArtifact→Artifact に沿い共通成果物意味を継承します。
      why_valid_or_invalid:
        zh: 子类完整满足父类身份条件并增加更窄种差。
        en: The subtype fully satisfies parent identity and adds a narrower differentia.
        ja: subtype は parent 同一性を完全に満たしより狭い種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-artifact-009
    - id: GraphArtifact-is_a-Artifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: GraphArtifact 子类边界
        en: Boundary for GraphArtifact specialization
        ja: GraphArtifact 特殊化の境界
      scenario_id: null
      descriptions:
        zh: 一个普通 Artifact 版本缺少 GraphArtifact 的专属身份字段或内容语义。
        en: A generic Artifact revision lacks the identity fields or content semantics specific to GraphArtifact.
        ja: 一般 Artifact revision は GraphArtifact 固有の同一性 field または content 意味を欠きます。
      field_values: {}
      related_node_ids:
        - GraphArtifact
        - Artifact
      related_relation_ids:
        - GraphArtifact-is_a-Artifact
      expected_result:
        zh: 保持为 Artifact，不得反向归入 GraphArtifact。
        en: Keep it as Artifact and do not reverse-classify it as GraphArtifact.
        ja: Artifact のままとし GraphArtifact へ逆分類しません。
      why_valid_or_invalid:
        zh: 继承只从下位概念推向上位概念，父类成员不自动满足子类种差。
        en: Inheritance runs from subtype to parent; parent membership does not automatically satisfy subtype differentia.
        ja: 継承は subtype から parent へ進み parent 所属だけで subtype 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-artifact-010
  source_claims:
    - claim-graph-artifact-011
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations: []
