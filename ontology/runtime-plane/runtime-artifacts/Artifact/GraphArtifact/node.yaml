schema: moonweave.ai/ontology-node/v1
id: GraphArtifact
kind: concept
status: accepted
labels: {zh: 图工件, en: Graph artifact, ja: グラフ成果物}
semantics:
  short_definition: {zh: 一个将已标识节点和边构成的图序列化以供交换或分析的 Artifact。, en: An Artifact that serializes a graph of identified nodes and edges for interchange or analysis., ja: 識別されたノードとエッジのグラフを交換または分析のために直列化する Artifact。}
  definition: {zh: GraphArtifact 是一个耐久 Entity，其内容编码节点、边、有向性、标签和可选图模式。它可以表示知识图、依赖图、工作流图或来源投影，但不是实时运行时执行图、图遍历 Activity 或该图中的单个节点。, en: "A GraphArtifact is a durable Entity whose content encodes nodes, edges, directedness, labels, and optional graph schema. It can represent a knowledge graph, dependency graph, workflow graph, or provenance projection, but it is not the live runtime execution graph, a graph traversal Activity, or an individual node in that graph.", ja: GraphArtifact は、ノード、エッジ、有向性、ラベル、任意のグラフスキーマをコンテンツに符号化する耐久 Entity である。ナレッジグラフ、依存グラフ、ワークフローグラフ、プロヴナンス投影を表せるが、ライブランタイム実行グラフ、グラフ走査 Activity、そのグラフ内の個別ノードではない。}
  why_needed: {zh: 基于图的输出需要带版本内容标识，使下游工具可以比较、验证和重现图快照，而不是依赖不断变化的内存结构。, en: "Graph-based outputs need versioned content identity so downstream tooling can compare, validate, and reproduce a graph snapshot rather than relying on a changing in-memory structure.", ja: グラフベースの出力にはバージョン付きコンテンツアイデンティティが必要であり、下流ツールは変化するメモリ内構造に頼らずグラフスナップショットを比較、検証、再現できる。}
  includes:
    - {zh: 具有节点和边数量的 RDF、JSON 图、GraphML、DOT 和其他图序列化。, en: "RDF, JSON graph, GraphML, DOT, and other graph serializations with node and edge counts.", ja: ノード数とエッジ数を持つ RDF、JSON グラフ、GraphML、DOT、その他のグラフ直列化。}
    - {zh: 有向性、图格式、模式引用和图内容摘要。, en: "Directedness, graph format, schema reference, and graph content digest.", ja: 有向性、グラフ形式、スキーマ参照、グラフコンテンツダイジェスト。}
  excludes:
    - {zh: 实时编排拓扑、单个本体概念或图查询活动。, en: "A live orchestration topology, individual ontology concept, or graph query activity.", ja: ライブのオーケストレーション構造、個別オントロジー概念、グラフクエリ Activity。}
    - {zh: 描述图但不携带图结构的报告。, en: A report that describes a graph without carrying graph structure., ja: グラフ構造を保持せずにグラフを記述するレポート。}
  semantic_kind: entity
  aliases: [graph snapshot, graph export]
engineering:
  explanation: {zh: 图导出器接收节点和边集合以及选定序列化，验证标识符和边端点，然后写入具有内容摘要的固定图工件。渲染器或查询引擎把工件作为数据消费，而不假定它表示实时状态。, en: "A graph exporter receives a set of nodes and edges plus a chosen serialization, validates identifiers and edge endpoints, then writes a fixed graph artifact with content digest. A renderer or query engine consumes the artifact as data rather than assuming it represents live state.", ja: グラフエクスポーターはノードとエッジの集合および選択した直列化を受け取り、識別子とエッジ端点を検証して、コンテンツダイジェストを持つ固定グラフ成果物を書き込む。レンダラーまたはクエリエンジンは、ライブ状態を表すと仮定せずデータとして成果物を消費する。}
  typical_input:
    - description: {zh: 图导出输入, en: Graph export input, ja: グラフエクスポート入力}
      format: |-
        {"format":"application/ld+json","nodes":[{"id":"exec-842"}],"edges":[{"source":"exec-842","target":"report-22","predicate":"generated"}]}
  typical_output:
    - description: {zh: 图工件记录, en: Graph artifact record, ja: グラフ成果物記録}
      format: |-
        {"artifact_id":"graph-8","media_type":"application/ld+json","node_count":2,"edge_count":1,"directed":true}
  reference_implementations:
    - {name: PROV-O, url: https://www.w3.org/TR/prov-o/, description: "Provenance relations can be serialized as a graph of Entities, Activities, and Agents."}
structure:
  identity_keys: [artifact_id, version, sha256]
  fields:
    - id: artifact_id
      labels: {zh: 图工件 ID, en: Graph artifact ID, ja: グラフ成果物 ID}
      definitions: {zh: 一个图序列化的稳定 ID。, en: Stable ID for one graph serialization., ja: 1つのグラフ直列化の安定 ID。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: graph-8
      source_claims: [claim-graph-artifact]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "图工件序列化的声明媒体类型，与 graph_format 保持一致。"
        en: "Declared media type of the graph serialization, consistent with graph_format."
        ja: "graph_format と整合するグラフシリアル化の宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: application/ld+json
      source_claims: [claim-graph-artifact]
    - id: graph_format
      labels: {zh: 图格式, en: Graph format, ja: グラフ形式}
      definitions: {zh: 节点和边所使用的序列化格式。, en: Serialization format used for nodes and edges., ja: ノードとエッジに使用される直列化形式。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [application/ld+json, text/turtle, application/graphml+xml, text/vnd.graphviz]
      example_value: application/ld+json
      source_claims: [claim-graph-artifact]
    - id: directed
      labels: {zh: 有向图, en: Directed graph, ja: 有向グラフ}
      definitions: {zh: 边方向在此图版本中是否具有语义意义。, en: Whether edge orientation is semantically significant in this graph rendition., ja: このグラフ表現でエッジ方向が意味的に重要かどうか。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: true
      source_claims: [claim-graph-artifact]
  constraints:
    - id: graph-artifact-edge-endpoints
      severity: error
      language: plain
      expression: Every serialized edge must reference node identifiers present in the same graph or an explicitly declared external reference.
      explanation: {zh: 图工件必须保留端点标识才能进行有意义的交换。, en: A graph artifact must preserve endpoint identity for meaningful interchange., ja: 意味のある交換のため、グラフ成果物は端点アイデンティティを保持しなければならない。}
      source_claims: [claim-graph-artifact]
  required_relations: [GraphArtifact-specializes-Artifact]
examples:
  - id: graph-artifact-positive
    labels: {zh: "LangGraph 状态图 JSON 导出", en: "LangGraph state graph JSON export", ja: "LangGraph 状態グラフ JSON エクスポート"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; GraphArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; GraphArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; GraphArtifact provenance graph."}
    field_values: {artifact_id: graph-8, media_type: application/ld+json, graph_format: application/ld+json, directed: true}
    related_node_ids: [GraphArtifact, Execution, Artifact]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-graph-artifact]
  - id: graph-artifact-counterexample
    labels: {zh: "Mermaid 渲染图非 GraphArtifact", en: "Mermaid render not GraphArtifact", ja: "Mermaid レンダリングは GraphArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style GraphArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style GraphArtifact.", ja: "Missing parent_run_id rejects LangSmith-style GraphArtifact."}
    field_values: {runtime_object: scheduler-live}
    related_node_ids: [Execution]
    related_relation_ids: []
    source_claims: [claim-graph-artifact]
  - id: graph-artifact-boundary
    labels: {zh: "GraphArtifact 与 SchemaArtifact 边界", en: "GraphArtifact versus SchemaArtifact boundary", ja: "GraphArtifact と SchemaArtifact 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; GraphArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; GraphArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {artifact_id: graph-8}
    related_node_ids: [GraphArtifact, Execution]
    related_relation_ids: []
    source_claims: [claim-graph-artifact]
  - id: graph-artifact-instance-graph-8
    labels: {zh: "graph-8 state graph 实例", en: "graph-8 state graph instance", ja: "graph-8 state graph 事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->GraphArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->GraphArtifact.", ja: "LangSmith instance maps to GraphArtifact."}
    field_values: {artifact_id: graph-8, media_type: application/ld+json, graph_format: application/ld+json, directed: true}
    related_node_ids: [GraphArtifact, Execution, Artifact]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-graph-artifact]
parent_relation:
  id: GraphArtifact-specializes-Artifact
  predicate: is_a
  target: concept:Artifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是图工件, en: is a graph artifact, ja: グラフ成果物である}
  definitions: {zh: 每个 GraphArtifact 都是内容编码图节点和边的 Artifact。, en: Every GraphArtifact is an Artifact whose content encodes graph nodes and edges., ja: すべての GraphArtifact は、コンテンツにグラフノードとエッジを符号化する Artifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_graph_artifact, labels: {zh: 具有图工件, en: has graph artifact, ja: グラフ成果物を持つ}}
  conditions:
    - id: graph-artifact-parent-condition
      severity: error
      expression: Require graph serialization with identifiable nodes and edges.
      explanations: {zh: 文字图描述不满足结构契约。, en: A prose graph description does not satisfy the structural contract., ja: 文章によるグラフ説明は構造契約を満たさない。}
      source_claims: [claim-graph-artifact]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-graph-artifact]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines a graphable provenance vocabulary of Agents, Activities, Entities, and relations.
source_claims:
  - id: claim-graph-artifact
    source: prov-o-core
    supports: PROV-O defines interoperable classes and properties for representing provenance information, which can be serialized as a graph of Entities, Activities, and Agents.
    locator: Abstract and Section 3.1
    evidence_kind: standard
    confidence: high

