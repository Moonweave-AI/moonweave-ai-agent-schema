schema: moonweave.ai/ontology-node/v1
id: GraphArtifact
kind: concept
labels:
  zh: 图数据产物
  en: graph-data artifact
  ja: graph data 成果物
semantics:
  short_definition:
    zh: 以节点、边及其标识关系作为规范内容的数据产物。
    en: A data artifact whose canonical content is identified nodes, edges, and their relations.
    ja: 識別された node・edge・関係を canonical 内容とする data 成果物です。
  definition:
    zh: 图数据产物是一种运行产物；其种差是规范内容构成图数据模型，节点和边具有稳定标识或可判定等价规则，方向、标签和属性属于图本身，而非仅用于画面的布局坐标。
    en: "A graph-data artifact is a runtime artifact whose canonical content instantiates a graph data model: nodes and edges have stable identity or decidable equivalence, and direction, labels, and properties belong to the graph rather than merely to visual layout coordinates."
    ja: graph data 成果物は graph data model を canonical 内容として実体化し、node・edge は安定識別または判定可能な同値規則を持ち、方向・label・property は可視化座標ではなく graph 自体に属します。
  why_needed:
    zh: 它把可交换的图数据与截图、布局缓存和图谱查看状态分离。
    en: It separates exchangeable graph data from screenshots, layout caches, and viewer state.
    ja: 交換可能 graph data を screenshot、layout cache、viewer state から分離します。
  includes:
    - zh: 包含 RDF 数据集、属性图快照或具有明确节点边模式的其它图数据文件。
      en: Includes RDF datasets, property-graph snapshots, and other files with explicit node-edge semantics.
      ja: RDF dataset、property graph snapshot、明示 node-edge 意味を持つ file を含みます。
  excludes:
    - zh: 不包含只显示图形的 PNG、没有图语义的坐标列表或本体 Schema 约束本身。
      en: Excludes PNG renderings, coordinate lists without graph semantics, and the ontology Schema constraints themselves.
      ja: PNG rendering、graph 意味のない座標列、本体 Schema 制約自体を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 GraphArtifact 时应分别映射 E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating GraphArtifact, map E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: GraphArtifact 統合時は E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to GraphArtifact.
      format: |-
        # Example GraphArtifact ingest
        { "graph-artifact_ref": "example-1" }
      source_claims:
        - claim-graph-artifact-design
  typical_output:
    - description: Moonweave-local GraphArtifact projection.
      format: '{ "schema_owner": "moonweave-local-design", "graph-artifact_id": "example-1" }'
      source_claims:
        - claim-graph-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://www.e2b.dev/docs/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: graph_model
      labels:
        zh: 图模型
        en: graph model
        ja: graph model
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明节点边语义所遵循的数据模型或方言。
        en: Declares the data model or dialect governing node-edge semantics.
        ja: node-edge 意味が従う data model または dialect を宣言します。
      allowed_values: []
      pattern: null
      example_value: RDF 1.1 Dataset
      source_claims:
        - claim-graph-artifact-design
    - id: node_count
      labels:
        zh: 节点数
        en: node count
        ja: node 数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规范图快照中可寻址节点的计数。
        en: Count of addressable nodes in the canonical graph snapshot.
        ja: canonical graph snapshot の addressable node 数です。
      allowed_values: []
      pattern: null
      example_value: 318
      source_claims:
        - claim-graph-artifact-design
    - id: edge_count
      labels:
        zh: 边数
        en: edge count
        ja: edge 数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规范图快照中语义边或三元组的计数。
        en: Count of semantic edges or triples in the canonical graph snapshot.
        ja: canonical graph snapshot の semantic edge または triple 数です。
      allowed_values: []
      pattern: null
      example_value: 742
      source_claims:
        - claim-graph-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphArtifact-example-positive-manual-20260716
    labels:
      zh: LangGraph 状态图 JSON 导出
      en: LangGraph state graph JSON export
      ja: LangGraph 状態グラフ JSON エクスポート
    descriptions:
      zh: LangGraph 导出 compiled StateGraph JSON：nodes=[agent, tools]、edges=[...]；GraphArtifact artifact_id=graph-8、media_type=application/json。
      en: "LangGraph exports compiled StateGraph JSON: nodes=[agent, tools], edges=[...]; GraphArtifact artifact_id=graph-8, media_type=application/json."
      ja: LangGraph StateGraph JSON が GraphArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values:
      artifact_id: artifact-graph
      version: "3"
      content_digest: sha256:artifact-graph-v3
      media_type: application/trig
      graph_model: RDF 1.1 Dataset
      node_count: 318
      edge_count: 742
    related_node_ids:
      - GraphArtifact
      - Artifact
    related_relation_ids:
      - GraphArtifact-is_a-Artifact
    source_claims:
      - claim-graph-artifact-design
  - id: GraphArtifact-example-boundary-manual-20260716
    labels:
      zh: Mermaid 渲染图非 GraphArtifact
      en: Mermaid render not GraphArtifact
      ja: Mermaid レンダリングは GraphArtifact ではない
    descriptions:
      zh: Mermaid flowchart 渲染 PNG 是可视化图像，不是 LangGraph state graph 结构 JSON GraphArtifact。
      en: Mermaid flowchart rendered PNG is visualization image, not LangGraph state graph structure JSON GraphArtifact.
      ja: Mermaid PNG は GraphArtifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - GraphArtifact
      - ImageBlock
    related_relation_ids: []
    source_claims:
      - claim-graph-artifact-design
  - id: GraphArtifact-example-3
    labels:
      zh: GraphArtifact 与 SchemaArtifact 边界
      en: GraphArtifact versus SchemaArtifact boundary
      ja: GraphArtifact と SchemaArtifact 境界
    descriptions:
      zh: GraphArtifact 是图结构/runtime graph 导出；SchemaArtifact 是 JSON Schema/RDF/SHACL；graph topology 与 validation schema 分离。
      en: GraphArtifact is graph structure/runtime graph export; SchemaArtifact is JSON Schema/RDF/SHACL; graph topology separated from validation schema.
      ja: GraphArtifact と SchemaArtifact は分離する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - GraphArtifact
    related_relation_ids: []
    source_claims:
      - claim-graph-artifact-vendor
      - claim-graph-artifact-design
  - id: GraphArtifact-example-4
    labels:
      zh: graph-8 state graph 实例
      en: graph-8 state graph instance
      ja: graph-8 state graph 事例
    descriptions:
      zh: GraphArtifact artifact_id=graph-8、graph_kind=langgraph_state、node_count=5、edge_count=6。
      en: GraphArtifact artifact_id=graph-8, graph_kind=langgraph_state, node_count=5, edge_count=6.
      ja: graph-8 GraphArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://www.e2b.dev/docs/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - GraphArtifact
    related_relation_ids: []
    source_claims:
      - claim-graph-artifact-vendor
      - claim-graph-artifact-design
parent_relation:
  id: GraphArtifact-is_a-Artifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 图数据版本满足 Artifact 的独立内容身份，并以节点边数据模型进一步特化。
    en: A graph-data revision satisfies independent Artifact identity and is further specialized by a node-edge data model.
    ja: graph data revision は独立 Artifact 同一性を満たし node-edge data model で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-graph-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://www.e2b.dev/docs/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-graph-artifact-vendor
    source: src-e2b-files
    supports: runtime-artifacts vendor evidence supports GraphArtifact identity and boundary mapping.
    locator: GraphArtifact integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-artifact-design
    source: src-runtime-artifacts-design
    supports: Moonweave GraphArtifact concept boundary within runtime-artifacts.
    locator: GraphArtifact boundary
    evidence_kind: design-inference
    confidence: high
