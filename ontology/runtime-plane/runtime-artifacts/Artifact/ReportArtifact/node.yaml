source_claims:
  - id: claim-report-artifact-001
    source: eng-ont-prov-o
    supports: PROV-O supports a report as a generated, derived Entity with traceable source evidence; its communicative report structure is a Moonweave domain specialization.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-002
    source: eng-ont-prov-o
    supports: PROV-O supports describing Entities about provenance subjects; Moonweave requires a stable subject reference for a report.
    locator: W3C Recommendation > §5.2 prov:Entity
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-003
    source: eng-ont-prov-o
    supports: PROV-O allows Entities to carry domain-specific attributes; Moonweave uses purpose to delimit report identity from raw evidence.
    locator: W3C Recommendation > §5.2 prov:Entity
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-004
    source: eng-ont-prov-o
    supports: PROV-O grounds the report as a derived Entity whose provenance can cite source Entities and generating Activity.
    locator: W3C Recommendation > §5.3 prov:wasDerivedFrom and prov:wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-005
    source: eng-ont-prov-o
    supports: PROV-O permits distinct derived Entity states; Moonweave does not conflate source evidence with a report derived from it.
    locator: W3C Recommendation > §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-006
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Entity identity from generation, usage, derivation, attribution, and provenance records; Moonweave specializes those roles for immutable Artifact revisions and RunAttempt activities.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 generation, usage, derivation, attribution
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-007
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core defines schema resources, dialects, identifiers, and vocabularies used for machine validation.
    locator: JSON Schema Core > schema resources, $schema, $id, and vocabularies
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-008
    source: eng-ont-prov-o
    supports: ReportArtifact uses the cited specification to narrow the general immutable Artifact identity; the hierarchy placement is a reviewed Moonweave inference.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-009
    source: eng-ont-prov-o
    supports: The cited source grounds ReportArtifact's narrower semantics; it does not classify every Artifact as ReportArtifact.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-report-artifact-010
    source: eng-ont-prov-o
    supports: ReportArtifact is manually classified under Artifact because it retains independent immutable work-product identity while adding the cited narrower semantics.
    locator: W3C Recommendation > §5.2 prov:Entity and §5.3 prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
