schema: moonweave.ai/ontology-node/v1
id: ReportArtifact
kind: concept
status: accepted
labels: {zh: 报告工件, en: Report artifact, ja: レポート成果物}
semantics:
  short_definition: {zh: 一个面向已定义受众呈现综合发现、结果或证据的 Artifact。, en: "An Artifact that presents synthesized findings, results, or evidence for a defined audience.", ja: 定義された対象者に対して総合した発見、結果、証拠を提示する Artifact。}
  definition: {zh: ReportArtifact 是由运行时输入、工件或观测生成的耐久文档或结构化报告。它可以总结执行或呈现发现，但不是它所描述的原始追踪、审计记录、评估 Activity 或源工件。, en: "A ReportArtifact is a durable document or structured report generated from runtime inputs, artifacts, or observations. It can summarize an execution or present findings, but it is not the raw trace, audit record, evaluation Activity, or source artifact it describes.", ja: ReportArtifact は、ランタイム入力、成果物、観測から生成される耐久文書または構造化レポートである。実行を要約したり発見を提示したりできるが、記述する生トレース、監査記録、評価 Activity、ソース成果物ではない。}
  why_needed: {zh: 使用者和操作人员需要可寻址的结果呈现，同时保留指向原始证据的链接，以防摘要成为无法追溯的来源替代品。, en: Users and operators need an addressable presentation of results while retaining links to raw evidence so summaries do not become an untraceable substitute for provenance., ja: 利用者と運用者には、要約が追跡不能なプロヴナンスの代替にならないよう、生の証拠へのリンクを保持した結果の参照可能な提示が必要である。}
  includes:
    - {zh: 具有受众、章节和源引用元数据的 Markdown、HTML、PDF、JSON 或其他渲染报告。, en: "Markdown, HTML, PDF, JSON, or other rendered reports with audience, section, and source-reference metadata.", ja: 対象者、セクション、ソース参照メタデータを持つ Markdown、HTML、PDF、JSON、その他のレンダリング済みレポート。}
    - {zh: 运行摘要、代码审查报告、事件报告和生成发现。, en: "Run summaries, code review reports, incident reports, and generated findings.", ja: 実行要約、コードレビュー報告、インシデント報告、生成された発見。}
  excludes:
    - {zh: 没有报告结构的原始追踪、不可变审计日志、指标数据点或评估分数。, en: "A raw trace, immutable audit log, metric data point, or evaluation score without report structure.", ja: レポート構造を持たない生トレース、不変の監査ログ、メトリックデータポイント、評価スコア。}
    - {zh: 人类对话转录，除非它有意被渲染为报告。, en: A human conversation transcript unless it is intentionally rendered as a report., ja: 意図的にレポートとしてレンダリングされない限り、人間の会話転記。}
  semantic_kind: entity
  aliases: [run report, findings document]
engineering:
  explanation: {zh: 报告生成器消费被引用的输入工件 ID，并生成带 report_id、媒体类型、内容摘要和证据引用的渲染文档。使用者 UI 渲染报告，但保留指向原始记录的链接。, en: "A report generator consumes cited input artifact IDs and produces a rendered document with report_id, media type, content digest, and evidence references. Consumer UIs render the report but retain links to raw records.", ja: レポート生成器は引用された入力成果物 ID を消費し、report_id、メディアタイプ、コンテンツダイジェスト、証拠参照を持つレンダリング済み文書を生成する。利用者 UI はレポートを描画するが、生記録へのリンクを保持する。}
  typical_input:
    - description: {zh: 报告生成输入, en: Report generation input, ja: レポート生成入力}
      format: |-
        {"execution_id":"exec-842","source_artifact_ids":["patch-17","trace-842"],"format":"text/markdown"}
  typical_output:
    - description: {zh: 报告工件, en: Report artifact, ja: レポート成果物}
      format: |-
        {"artifact_id":"report-22","media_type":"text/markdown","sections":["summary","findings"],"source_artifact_ids":["patch-17","trace-842"]}
  reference_implementations:
    - {name: OpenAI Agents SDK results, url: https://openai.github.io/openai-agents-python/results/, description: Documents result containers returned by agent execution.}
structure:
  identity_keys: [artifact_id, version, sha256]
  fields:
    - id: artifact_id
      labels: {zh: 报告 ID, en: Report ID, ja: レポート ID}
      definitions: {zh: 稳定的报告工件标识符。, en: Stable report artifact identifier., ja: 安定したレポート成果物識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: report-22
      source_claims: [claim-report-artifact]
    - id: media_type
      labels:
        zh: "媒体类型"
        en: "Media type"
        ja: "メディアタイプ"
      definitions:
        zh: "报告呈现内容的声明媒体类型。"
        en: "Declared media type of the report presentation content."
        ja: "レポート提示コンテンツの宣言済みメディアタイプ。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: text/markdown
      source_claims: [claim-report-artifact]
    - id: audience
      labels: {zh: 目标受众, en: Intended audience, ja: 想定対象者}
      definitions: {zh: 报告呈现所面向的接收者群体。, en: Recipient group for which the report presentation is composed., ja: レポート提示が作成された受信者グループ。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: engineering
      source_claims: [claim-report-artifact]
    - id: source_artifact_ids
      labels: {zh: 源工件 ID, en: Source artifact IDs, ja: ソース成果物 ID}
      definitions: {zh: 被报告总结或引用的证据工件标识符。, en: Identifiers of evidence artifacts summarized or cited by the report., ja: レポートにより要約または引用される証拠成果物の識別子。}
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      example_value: patch-17
      source_claims: [claim-report-artifact]
  constraints:
    - id: report-evidence-reference
      severity: error
      language: plain
      expression: A report claiming runtime findings must cite source artifact or record IDs for material conclusions.
      explanation: {zh: 呈现层不能成为某个发现的唯一来源证据。, en: A presentation layer cannot be the sole provenance evidence for a finding., ja: 提示レイヤーは発見に対する唯一のプロヴナンス証拠にはなれない。}
      source_claims: [claim-report-artifact]
  required_relations: [ReportArtifact-specializes-Artifact]
examples:
  - id: report-artifact-positive
    labels: {zh: "A2A TextPart 研究报告", en: "A2A TextPart research report", ja: "A2A TextPart 研究レポート"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; ReportArtifact maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; ReportArtifact maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; ReportArtifact provenance graph."}
    field_values: {artifact_id: report-22, media_type: text/markdown, audience: engineering, source_artifact_ids: patch-17}
    related_node_ids: [ReportArtifact, PatchArtifact, TraceRecord]
    related_relation_ids: []
    source_claims: [claim-report-artifact]
  - id: report-artifact-counterexample
    labels: {zh: "LangSmith run.outputs 非 ReportArtifact", en: "LangSmith run.outputs not ReportArtifact", ja: "LangSmith run.outputs は ReportArtifact ではない"}
    descriptions: {zh: "Log without parent_run_id/run_type cannot serve as LangSmith-style ReportArtifact.", en: "Log without parent_run_id/run_type cannot serve as LangSmith-style ReportArtifact.", ja: "Missing parent_run_id rejects LangSmith-style ReportArtifact."}
    field_values: {trace_id: trace-842}
    related_node_ids: [TraceRecord]
    related_relation_ids: []
    source_claims: [claim-report-artifact]
  - id: report-artifact-boundary
    labels: {zh: "ReportArtifact 与 ExportArtifact 边界", en: "ReportArtifact versus ExportArtifact boundary", ja: "ReportArtifact と ExportArtifact 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ReportArtifact preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; ReportArtifact preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {artifact_id: report-22}
    related_node_ids: [ReportArtifact, AuditRecord]
    related_relation_ids: []
    source_claims: [claim-report-artifact]
  - id: report-artifact-instance-report-22
    labels: {zh: "report-22 研究输出实例", en: "report-22 research output instance", ja: "report-22 研究出力事例"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->ReportArtifact.", en: "LangSmith instance: run_id parent_run_id run_type=llm->ReportArtifact.", ja: "LangSmith instance maps to ReportArtifact."}
    field_values: {artifact_id: report-22, media_type: text/markdown, audience: engineering, source_artifact_ids: patch-17}
    related_node_ids: [ReportArtifact, Execution, PatchArtifact, TraceRecord]
    related_relation_ids: [Artifact-generated_by-Execution]
    source_claims: [claim-report-artifact]
parent_relation:
  id: ReportArtifact-specializes-Artifact
  predicate: is_a
  target: concept:Artifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是报告工件, en: is a report artifact, ja: レポート成果物である}
  definitions: {zh: 每个 ReportArtifact 都是被组织来传达综合发现或结果的 Artifact。, en: Every ReportArtifact is an Artifact organized to communicate synthesized findings or results., ja: すべての ReportArtifact は、総合した発見または結果を伝えるために組織化された Artifact である。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_report_artifact, labels: {zh: 具有报告工件, en: has report artifact, ja: レポート成果物を持つ}}
  conditions:
    - id: report-artifact-parent-condition
      severity: error
      expression: Require rendered or structured presentation content and a stated report purpose.
      explanations: {zh: 原始信号导出仍是可观测性记录。, en: Raw signal exports remain observability records., ja: 生シグナルエクスポートは可観測性記録のままである。}
      source_claims: [claim-report-artifact]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-report-artifact]
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports provenance links from derived report Entities to their generating activities and source Entities.
source_claims:
  - id: claim-report-artifact
    source: prov-o-core
    supports: PROV-O distinguishes generated and derived Entities from activities and source Entities, supporting report evidence links.
    locator: Section 3.1 and Section 3.2, wasGeneratedBy and wasDerivedFrom
    evidence_kind: standard
    confidence: medium

