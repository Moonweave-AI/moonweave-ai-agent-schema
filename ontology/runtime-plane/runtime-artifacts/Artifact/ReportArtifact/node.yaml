schema: moonweave.ai/ontology-node/v1
id: ReportArtifact
kind: concept
labels:
  zh: 报告产物
  en: report artifact
  ja: report 成果物
semantics:
  short_definition:
    zh: 围绕明确主题组织证据、发现和结论的可版本化沟通产物。
    en: A versioned communication artifact organizing evidence, findings, and conclusions about an identified subject.
    ja: 識別 subject に関する evidence・finding・conclusion を編成する版本付き communication 成果物です。
  definition:
    zh: 报告产物是一种运行产物；其种差是以明确 subject 和 purpose 组织可追溯证据、分析、发现与结论，供人或系统审阅；它不同于原始日志、单条结果记录或没有论证结构的自由文本。
    en: A report artifact is a runtime artifact distinguished by organizing traceable evidence, analysis, findings, and conclusions around an identified subject and purpose for human or system review; it differs from raw logs, one result record, or unstructured prose.
    ja: report 成果物は明示 subject と purpose の周囲に追跡可能 evidence・analysis・finding・conclusion を編成し、人または system review に供する実行成果物で、raw log、単一 result record、非構造 prose と異なります。
  why_needed:
    zh: 报告身份把一次分析性综合与其底层日志和证据分开，允许独立版本、审查和引用。
    en: Report identity separates an analytical synthesis from underlying logs and evidence so it can be independently versioned, reviewed, and cited.
    ja: report 同一性は分析 synthesis を基礎 log/evidence から分離し、独立版本・review・citation を可能にします。
  includes:
    - zh: 包含审计报告、评估报告、事件复盘和带证据结论的研究报告。
      en: Includes audit reports, evaluation reports, incident reviews, and research reports with evidenced conclusions.
      ja: audit report、evaluation report、incident review、evidence 付き research report を含みます。
  excludes:
    - zh: 不包含未经组织的日志流、单条错误消息、纯数据图或仅有标题的空文档。
      en: Excludes unorganized log streams, single error messages, pure graph data, and empty titled documents.
      ja: 非編成 log stream、単一 error message、純 graph data、title だけの空文書を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 ReportArtifact 时应分别映射 E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts；静态配置属于其他域，实际运行 occurrence 才写入本概念。
    en: When integrating ReportArtifact, map E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts separately; static configuration belongs elsewhere and only runtime occurrences belong here.
    ja: ReportArtifact 統合時は E2B file outputs, OpenAI assistant files, patch diffs, and JSON schema artifacts を個別写像し、静的設定は他ドメイン、runtime occurrence のみ本 concept に属します。
  typical_input:
    - description: Vendor API payload mappable to ReportArtifact.
      format: |-
        # Example ReportArtifact ingest
        { "report-artifact_ref": "example-1" }
      source_claims:
        - claim-report-artifact-design
  typical_output:
    - description: Moonweave-local ReportArtifact projection.
      format: '{ "schema_owner": "moonweave-local-design", "report-artifact_id": "example-1" }'
      source_claims:
        - claim-report-artifact-design
  reference_implementations:
    - name: E2B File Outputs
      url: https://e2b.dev/docs/sandbox/filesystem
      description: Sandbox-written files → FileOutput.
    - name: OpenAI Files API
      url: https://platform.openai.com/docs/api-reference/files
      description: Assistant file outputs and JSON artifacts.
    - name: LangSmith Artifacts
      url: https://docs.smith.langchain.com/
      description: Run-attached artifacts with provenance.
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: report_subject_ref
      labels:
        zh: 报告主题引用
        en: report subject reference
        ja: report subject reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被报告分析的运行、任务、产物或其它稳定对象引用。
        en: Stable reference to the run, task, artifact, or other object analyzed by the report.
        ja: report が分析する run・task・artifact 等の安定参照です。
      allowed_values: []
      pattern: null
      example_value: execution-501
      source_claims:
        - claim-report-artifact-design
    - id: report_purpose
      labels:
        zh: 报告目的
        en: report purpose
        ja: report purpose
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定报告要回答的审计、评估、复盘或研究问题。
        en: Defines the audit, evaluation, review, or research question the report answers.
        ja: report が答える audit・evaluation・review・research 問題を定めます。
      allowed_values: []
      pattern: null
      example_value: release-readiness
      source_claims:
        - claim-report-artifact-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReportArtifact-example-positive-manual-20260716
    labels:
      zh: A2A TextPart 研究报告
      en: A2A TextPart research report
      ja: A2A TextPart 研究レポート
    descriptions:
      zh: A2A Protocol Artifact parts=[TextPart(text="Research findings...")]、artifactId=report-22、name=research_report；任务可交付研究报告。
      en: A2A Protocol Artifact parts=[TextPart(text="Research findings...")], artifactId=report-22, name=research_report; task deliverable research report.
      ja: A2A TextPart research report が ReportArtifact である。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values:
      artifact_id: report-release
      version: "4"
      content_digest: sha256:report-release-v4
      media_type: application/json
      report_subject_ref: execution-501
      report_purpose: release-readiness
    related_node_ids:
      - ReportArtifact
      - Artifact
    related_relation_ids:
      - ReportArtifact-is_a-Artifact
    source_claims:
      - claim-report-artifact-design
  - id: ReportArtifact-example-boundary-manual-20260716
    labels:
      zh: LangSmith run.outputs 非 ReportArtifact
      en: LangSmith run.outputs not ReportArtifact
      ja: LangSmith run.outputs は ReportArtifact ではない
    descriptions:
      zh: LangSmith run.outputs={"summary":"..."} 是 trace 预览，无 content_digest 与独立检索，不是 ReportArtifact Entity。
      en: LangSmith run.outputs={"summary":"..."} is trace preview without content_digest and independent retrieval, not ReportArtifact Entity.
      ja: LangSmith outputs は ReportArtifact ではない。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - ReportArtifact
      - LogArtifact
    related_relation_ids: []
    source_claims:
      - claim-report-artifact-design
  - id: ReportArtifact-example-3
    labels:
      zh: ReportArtifact 与 ExportArtifact 边界
      en: ReportArtifact versus ExportArtifact boundary
      ja: ReportArtifact と ExportArtifact 境界
    descriptions:
      zh: ReportArtifact 是 narrative/report 文本输出；ExportArtifact 是 CI/打包导出；research report 与 build artifact 用途不同。
      en: ReportArtifact is narrative/report text output; ExportArtifact is CI/package export; research report and build artifact differ in purpose.
      ja: ReportArtifact と ExportArtifact は用途が異なる。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - ReportArtifact
    related_relation_ids: []
    source_claims:
      - claim-report-artifact-vendor
      - claim-report-artifact-design
  - id: ReportArtifact-example-4
    labels:
      zh: report-22 研究输出实例
      en: report-22 research output instance
      ja: report-22 研究出力事例
    descriptions:
      zh: ReportArtifact artifact_id=report-22、media_type=text/markdown、word_count=1800、generated_by=review-exec-842。
      en: ReportArtifact artifact_id=report-22, media_type=text/markdown, word_count=1800, generated_by=review-exec-842.
      ja: report-22 ReportArtifact を記録する。
    example_source:
      product: E2B Sandbox
      url: https://e2b.dev/docs/sandbox/filesystem
      version: file outputs
    field_values: {}
    related_node_ids:
      - ReportArtifact
    related_relation_ids: []
    source_claims:
      - claim-report-artifact-vendor
      - claim-report-artifact-design
parent_relation:
  id: ReportArtifact-is_a-Artifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 报告满足 Artifact 的版本化内容身份，并由围绕主题组织证据、发现和结论的结构进一步特化。
    en: A report satisfies versioned Artifact identity and is further specialized by organizing evidence, findings, and conclusions around a subject.
    ja: report は版本付き Artifact 同一性を満たし subject を中心に evidence・finding・conclusion を編成する構造で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-report-artifact-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-e2b-files
    title: E2B Sandbox Files
    url: https://e2b.dev/docs/sandbox/filesystem
    source_type: official-doc
    relevance: File outputs from sandbox execution as FileOutput artifacts.
  - id: src-openai-files
    title: OpenAI Files API
    url: https://platform.openai.com/docs/api-reference/files
    source_type: official-doc
    relevance: Assistant-generated file outputs and JSON artifacts.
  - id: src-langsmith-artifacts
    title: LangSmith Artifacts
    url: https://docs.smith.langchain.com/
    source_type: official-doc
    relevance: Run-attached artifacts and feedback-linked outputs.
  - id: src-runtime-artifacts-design
    title: Moonweave runtime-artifacts module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Artifact identity, version, digest, and provenance boundaries.
source_claims:
  - id: claim-report-artifact-vendor
    source: src-e2b-files
    supports: runtime-artifacts vendor evidence supports ReportArtifact identity and boundary mapping.
    locator: ReportArtifact integration
    evidence_kind: design-inference
    confidence: high
  - id: claim-report-artifact-design
    source: src-runtime-artifacts-design
    supports: Moonweave ReportArtifact concept boundary within runtime-artifacts.
    locator: ReportArtifact boundary
    evidence_kind: design-inference
    confidence: high
