schema: moonweave.ai/ontology-node/v1
id: ReportArtifact
kind: concept
status: review
labels:
  zh: 报告产物
  en: report artifact
  ja: report 成果物
semantics:
  short_definition:
    zh: 围绕明确主题组织证据、发现和结论的可版本化沟通产物。
    en: A versioned communication artifact organizing evidence, findings, and conclusions about an identified subject.
    ja: 識別 subject に関する evidence・finding・conclusion を編成する版本付き communication 成果物です。
  definition:
    zh: 报告产物是一种运行产物；其种差是以明确 subject 和 purpose 组织可追溯证据、分析、发现与结论，供人或系统审阅；它不同于原始日志、单条结果记录或没有论证结构的自由文本。
    en: A report artifact is a runtime artifact distinguished by organizing traceable evidence, analysis, findings, and conclusions around an identified subject and purpose for human or system review; it differs from raw logs, one result record, or unstructured prose.
    ja: report 成果物は明示 subject と purpose の周囲に追跡可能 evidence・analysis・finding・conclusion を編成し、人または system review に供する実行成果物で、raw log、単一 result record、非構造 prose と異なります。
  why_needed:
    zh: 报告身份把一次分析性综合与其底层日志和证据分开，允许独立版本、审查和引用。
    en: Report identity separates an analytical synthesis from underlying logs and evidence so it can be independently versioned, reviewed, and cited.
    ja: report 同一性は分析 synthesis を基礎 log/evidence から分離し、独立版本・review・citation を可能にします。
  includes:
    - zh: 包含审计报告、评估报告、事件复盘和带证据结论的研究报告。
      en: Includes audit reports, evaluation reports, incident reviews, and research reports with evidenced conclusions.
      ja: audit report、evaluation report、incident review、evidence 付き research report を含みます。
  excludes:
    - zh: 不包含未经组织的日志流、单条错误消息、纯数据图或仅有标题的空文档。
      en: Excludes unorganized log streams, single error messages, pure graph data, and empty titled documents.
      ja: 非編成 log stream、単一 error message、純 graph data、title だけの空文書を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - version
  fields:
    - id: report_subject_ref
      labels:
        zh: 报告主题引用
        en: report subject reference
        ja: report subject reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被报告分析的运行、任务、产物或其它稳定对象引用。
        en: Stable reference to the run, task, artifact, or other object analyzed by the report.
        ja: report が分析する run・task・artifact 等の安定参照です。
      allowed_values: []
      pattern: null
      example_value: execution-501
      source_claims:
        - claim-report-artifact-002
    - id: report_purpose
      labels:
        zh: 报告目的
        en: report purpose
        ja: report purpose
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定报告要回答的审计、评估、复盘或研究问题。
        en: Defines the audit, evaluation, review, or research question the report answers.
        ja: report が答える audit・evaluation・review・research 問題を定めます。
      allowed_values: []
      pattern: null
      example_value: release-readiness
      source_claims:
        - claim-report-artifact-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReportArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 发布就绪审计报告
      en: Release-readiness audit report
      ja: release readiness audit report
    scenario_id: null
    descriptions:
      zh: report-release@4 针对 execution-501，整合测试证据、风险发现、未决项和发布结论，并有独立摘要。
      en: report-release@4 concerns execution-501 and integrates test evidence, risk findings, open items, and a release conclusion under its own digest.
      ja: report-release@4 は execution-501 を subject とし、test evidence、risk finding、open item、release conclusion を固有 digest で統合します。
    field_values:
      artifact_id: report-release
      version: "4"
      content_digest: sha256:report-release-v4
      media_type: application/json
      report_subject_ref: execution-501
      report_purpose: release-readiness
    related_node_ids:
      - ReportArtifact
      - Artifact
    related_relation_ids:
      - ReportArtifact-is_a-Artifact
    expected_result:
      zh: 归入 ReportArtifact，并独立于底层测试和日志产物版本化。
      en: Classify it as ReportArtifact and version it independently of underlying test and log artifacts.
      ja: ReportArtifact に分類し、基礎 test/log 成果物とは独立版本化します。
    why_valid_or_invalid:
      zh: 它具有明确主题、综合证据、发现与结论的沟通结构。
      en: It has an identified subject and a communicative structure of synthesized evidence, findings, and conclusion.
      ja: 明示 subject と evidence synthesis・finding・conclusion の communication 構造を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-report-artifact-004
  - id: ReportArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 原始日志归档
      en: Raw log archive
      ja: raw log archive
    scenario_id: null
    descriptions:
      zh: logs.ndjson 包含按时间排列的事件，没有报告主题、分析、发现或结论。
      en: logs.ndjson contains time-ordered events with no report subject, analysis, findings, or conclusion.
      ja: logs.ndjson は時系列 event を含むだけで report subject、analysis、finding、conclusion がありません。
    field_values: {}
    related_node_ids:
      - ReportArtifact
      - LogArtifact
    related_relation_ids: []
    expected_result:
      zh: 保持为日志产物，不得归入 ReportArtifact。
      en: Keep it as a log artifact and do not classify it as ReportArtifact.
      ja: log 成果物のままとし ReportArtifact に分類しません。
    why_valid_or_invalid:
      zh: 原始证据集合尚未形成围绕问题的分析性综合。
      en: The raw evidence collection has not formed an analytical synthesis around a question.
      ja: raw evidence 集合は問題を中心とする分析 synthesis を形成していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-report-artifact-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SchemaArtifact
    shared_parent_concept_id: Artifact
    differentia:
      zh: ReportArtifact 以报告主题与报告目的界定一组证据化陈述；SchemaArtifact 以方言 URI 与模式标识界定可执行的结构和验证约束。报告描述或评价对象，模式约束对象是否有效，二者不能因都采用 JSON 而合并。
      en: ReportArtifact uses a report subject and purpose to delimit evidence-backed statements; SchemaArtifact uses a dialect URI and schema identifier to delimit executable structural and validation constraints. A report describes or evaluates an object, whereas a schema constrains whether an object is valid; sharing JSON syntax does not merge them.
      ja: ReportArtifact は report subject と purpose で evidence 付き statement を区切り、SchemaArtifact は dialect URI と schema identifier で実行可能な構造・validation constraint を区切ります。report は対象を記述・評価し schema は妥当性を制約するため、共に JSON でも統合しません。
    source_claims:
      - claim-report-artifact-006
      - claim-report-artifact-007
parent_relation:
  id: ReportArtifact-is_a-Artifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种运行产物
    en: is a runtime artifact
    ja: 実行成果物の一種
  definitions:
    zh: 报告满足 Artifact 的版本化内容身份，并由围绕主题组织证据、发现和结论的结构进一步特化。
    en: A report satisfies versioned Artifact identity and is further specialized by organizing evidence, findings, and conclusions around a subject.
    ja: report は版本付き Artifact 同一性を満たし subject を中心に evidence・finding・conclusion を編成する構造で特殊化されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ReportArtifact-is_a-Artifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: ReportArtifact 子类正例
        en: Positive ReportArtifact specialization
        ja: ReportArtifact 特殊化の正例
      scenario_id: null
      descriptions:
        zh: ReportArtifact 对象同时满足 Artifact 的独立版本、摘要和生成溯源，并满足自身种差。
        en: The ReportArtifact object satisfies Artifact identity, digest, and generation provenance plus its own differentia.
        ja: ReportArtifact 対象は Artifact の独立版本・digest・生成 provenance と固有種差を満たします。
      field_values: {}
      related_node_ids:
        - ReportArtifact
        - Artifact
      related_relation_ids:
        - ReportArtifact-is_a-Artifact
      expected_result:
        zh: 可沿 ReportArtifact→Artifact 继承通用产物语义。
        en: It inherits common artifact semantics along ReportArtifact-to-Artifact.
        ja: ReportArtifact→Artifact に沿い共通成果物意味を継承します。
      why_valid_or_invalid:
        zh: 子类完整满足父类身份条件并增加更窄种差。
        en: The subtype fully satisfies parent identity and adds a narrower differentia.
        ja: subtype は parent 同一性を完全に満たしより狭い種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-report-artifact-008
    - id: ReportArtifact-is_a-Artifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: ReportArtifact 子类边界
        en: Boundary for ReportArtifact specialization
        ja: ReportArtifact 特殊化の境界
      scenario_id: null
      descriptions:
        zh: 一个普通 Artifact 版本缺少 ReportArtifact 的专属身份字段或内容语义。
        en: A generic Artifact revision lacks the identity fields or content semantics specific to ReportArtifact.
        ja: 一般 Artifact revision は ReportArtifact 固有の同一性 field または content 意味を欠きます。
      field_values: {}
      related_node_ids:
        - ReportArtifact
        - Artifact
      related_relation_ids:
        - ReportArtifact-is_a-Artifact
      expected_result:
        zh: 保持为 Artifact，不得反向归入 ReportArtifact。
        en: Keep it as Artifact and do not reverse-classify it as ReportArtifact.
        ja: Artifact のままとし ReportArtifact へ逆分類しません。
      why_valid_or_invalid:
        zh: 继承只从下位概念推向上位概念，父类成员不自动满足子类种差。
        en: Inheritance runs from subtype to parent; parent membership does not automatically satisfy subtype differentia.
        ja: 継承は subtype から parent へ進み parent 所属だけで subtype 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-report-artifact-009
  source_claims:
    - claim-report-artifact-010
  distinct_fact_rationale: null
