  - id: runtime-budget-boundary
    labels: {zh: "Temporal WorkflowExecutionTimeout", en: "Temporal WorkflowExecutionTimeout", ja: "Temporal WorkflowExecutionTimeout"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RuntimeBudget preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RuntimeBudget preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {budget_id: budget-3}
