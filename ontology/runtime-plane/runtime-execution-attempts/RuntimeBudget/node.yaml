  - id: runtime-budget-positive
    labels: {zh: "OpenAI Agents max_turns 预算", en: "OpenAI Agents max_turns budget", ja: "OpenAI Agents max_turns 予算"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RuntimeBudget maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RuntimeBudget maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RuntimeBudget provenance graph."}
    field_values: {budget_id: budget-3, scope: execution, max_turns: 8, on_exhaustion: fail}
    related_node_ids: [RuntimeBudget, Execution]
    related_relation_ids: []
