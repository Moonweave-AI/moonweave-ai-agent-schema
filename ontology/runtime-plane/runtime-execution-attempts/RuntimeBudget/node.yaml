schema: moonweave.ai/ontology-node/v1
id: RuntimeBudget
kind: concept
status: accepted
labels:
  zh: 运行预算
  en: Runtime budget
  ja: 実行予算
semantics:
  short_definition:
    zh: 在运行前声明并在运行中执行的一组时间、请求、令牌、工具调用或尝试次数上限。
    en: A prospective specification of time, request, token, tool-call, or attempt ceilings enforced during a run.
    ja: run 前に宣言し実行中に適用する time・request・token・tool-call・attempt ceiling の specification。
  definition:
    zh: >-
      RuntimeBudget 是约束 Execution 或 RunAttempt 的多维规范。它声明一个或多个可计量上限以及
      耗尽时动作；实际消耗属于 usage/observation 记录，不属于预算本身。预算不是事后成本指标、
      重试策略、超时事件或框架配置对象。货币成本因定价和币种依赖部署，暂不纳入核心字段。
    en: >-
      A RuntimeBudget is a multidimensional specification constraining an Execution or RunAttempt.
      It declares one or more measurable ceilings and an action on exhaustion. Actual consumption
      belongs to usage or observation records, not the budget. It is not a post-hoc cost metric,
      RetryPolicy, timeout event, or framework configuration object. Monetary cost is excluded from
      the core fields because pricing and currency are deployment-specific.
    ja: >-
      RuntimeBudget は Execution または RunAttempt を制約する multidimensional specification です。
      measurable ceiling と exhaustion action を宣言し、実 consumption は usage/observation record
      に属します。cost metric・RetryPolicy・timeout event・framework config object ではありません。
      monetary cost は pricing/currency が deployment-specific のため core field から除外します。
  why_needed:
    zh: 单一 cost 数字无法说明运行可被时间、模型请求、令牌、工具调用或重试中的哪一维限制。
    en: A single cost number cannot express whether time, model requests, tokens, tool calls, or retries limit a run.
    ja: 単一 cost 値では time・model request・token・tool call・retry のどの上限か表せません。
  includes:
    - zh: 在运行开始前确定、可在执行中检查的硬上限。
      en: Hard ceilings fixed before a run and checkable during execution.
      ja: run 前に確定し execution 中に検査できる hard ceiling。
  excludes:
    - zh: 事后观测到的实际 usage、账单金额或性能指标。
      en: Observed usage, billed amount, or performance metrics measured after the fact.
      ja: 事後に観測する usage・billing amount・performance metric。
    - zh: 失败类型、重试资格与退避规则；它们属于 RetryPolicy。
      en: Failure matching, retry eligibility, and backoff rules; those belong to RetryPolicy.
      ja: failure matching・retry eligibility・backoff rule。これらは RetryPolicy に属します。
  semantic_kind: specification
  aliases: []
applicability: [core]
structure:
  identity_keys: [budget_id]
  fields:
    - id: budget_id
      labels: {zh: 预算标识, en: Budget ID, ja: budget ID}
      definitions: {zh: 稳定标识一份运行预算规范。, en: Stable identity of one runtime-budget specification., ja: 一 runtime-budget specification の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
      example_value: budget-build-ci
      allowed_values: []
      source_claims: [claim-runtime-budget-design]
    - id: scope_kind
      labels: {zh: 约束范围, en: Scope kind, ja: scope kind}
      definitions: {zh: 预算约束整个 Execution 还是单个 RunAttempt。, en: Whether the budget constrains a whole Execution or one RunAttempt., ja: budget が Execution 全体か一 RunAttempt を制約するか。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: execution
      allowed_values:
        - id: runtime-budget-scope-execution
          value: execution
          labels: {zh: 整次执行, en: execution, ja: execution}
          definitions: {zh: 所有限额在一个 Execution 内累计。, en: Ceilings accumulate across one Execution., ja: ceiling を一 Execution 内で累積。}
          status: accepted
          source_claims: [claim-runtime-budget-runner]
        - id: runtime-budget-scope-attempt
          value: attempt
          labels: {zh: 单次尝试, en: attempt, ja: attempt}
          definitions: {zh: 限额在每个 RunAttempt 开始时独立应用。, en: Ceilings apply independently to each RunAttempt., ja: ceiling を各 RunAttempt に独立適用。}
          status: accepted
          source_claims: [claim-runtime-budget-retry]
      source_claims: [claim-runtime-budget-design]
    - id: max_duration_ms
      labels: {zh: 最大持续毫秒, en: Maximum duration in milliseconds, ja: 最大継続ミリ秒}
      definitions: {zh: 允许的最长墙钟持续时间。, en: Maximum allowed wall-clock duration., ja: 許可する最大 wall-clock duration。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 300000
      allowed_values: []
      source_claims: [claim-runtime-budget-retry]
    - id: max_model_requests
      labels: {zh: 最大模型请求数, en: Maximum model requests, ja: 最大 model request 数}
      definitions: {zh: 在范围内允许发起的模型请求总数。, en: Maximum model requests allowed within the scope., ja: scope 内で許可する model request 総数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 12
      allowed_values: []
      source_claims: [claim-runtime-budget-runner]
    - id: max_input_tokens
      labels: {zh: 最大输入令牌数, en: Maximum input tokens, ja: 最大 input token 数}
      definitions: {zh: 在范围内允许消耗的输入令牌总数。, en: Maximum input tokens consumable within the scope., ja: scope 内で消費可能な input token 総数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 100000
      allowed_values: []
      source_claims: [claim-runtime-budget-usage]
    - id: max_output_tokens
      labels: {zh: 最大输出令牌数, en: Maximum output tokens, ja: 最大 output token 数}
      definitions: {zh: 在范围内允许生成的输出令牌总数。, en: Maximum output tokens generatable within the scope., ja: scope 内で生成可能な output token 総数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 20000
      allowed_values: []
      source_claims: [claim-runtime-budget-usage]
    - id: max_tool_calls
      labels: {zh: 最大工具调用数, en: Maximum tool calls, ja: 最大 tool call 数}
      definitions: {zh: 在范围内允许开始的工具调用总数。, en: Maximum tool calls allowed to start within the scope., ja: scope 内で開始可能な tool call 総数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 20
      allowed_values: []
      source_claims: [claim-runtime-budget-design]
    - id: max_attempts
      labels: {zh: 最大尝试数, en: Maximum attempts, ja: 最大 attempt 数}
      definitions: {zh: 包含第一次尝试在内允许建立的 RunAttempt 总数。, en: Maximum RunAttempts allowed, including the first attempt., ja: first attempt を含む許可 RunAttempt 総数。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims: [claim-runtime-budget-retry]
    - id: exhaustion_action
      labels: {zh: 耗尽动作, en: Exhaustion action, ja: exhaustion action}
      definitions: {zh: 任一硬上限达到时执行的规范动作。, en: Prescribed action when any hard ceiling is reached., ja: hard ceiling 到達時に実行する規定 action。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: stop
      allowed_values:
        - id: runtime-budget-action-stop
          value: stop
          labels: {zh: 停止运行, en: stop, ja: 停止}
          definitions: {zh: 不再开始新的运行步骤。, en: Start no further runtime steps., ja: 新しい runtime step を開始しない。}
          status: accepted
          source_claims: [claim-runtime-budget-runner, claim-runtime-budget-retry]
        - id: runtime-budget-action-require-approval
          value: require-approval
          labels: {zh: 请求批准, en: require approval, ja: approval 要求}
          definitions: {zh: 暂停并要求有权主体批准扩展预算。, en: Suspend and require an authorized actor to approve a budget extension., ja: suspend し authorized actor に budget extension approval を要求。}
          status: accepted
          source_claims: [claim-runtime-budget-design]
      source_claims: [claim-runtime-budget-design]
  constraints:
    - id: runtime-budget-at-least-one-ceiling
      severity: error
      expression_language: plain
      expression: at least one of max_duration_ms, max_model_requests, max_input_tokens, max_output_tokens, max_tool_calls, or max_attempts is present and greater than zero
      explanations: {zh: 没有任何上限的对象不是预算。, en: An object without any ceiling is not a budget., ja: ceiling のない object は budget ではありません。}
      source_claims: [claim-runtime-budget-design]
  required_relations: []
examples:
  - id: runtime-budget-example-ci
    kind: positive
    labels: {zh: CI 执行预算, en: CI execution budget, ja: CI execution budget}
    scenario_id: null
    descriptions: {zh: 一次 CI Execution 最多运行五分钟、发起十二次模型请求、二十次工具调用和三次尝试，任一上限耗尽即停止。, en: One CI Execution is limited to five minutes, twelve model requests, twenty tool calls, and three attempts, and stops when any ceiling is exhausted., ja: 一 CI Execution を5分・12 model request・20 tool call・3 attempt に制限し、いずれか到達で停止します。}
    field_values: {budget_id: budget-build-ci, scope_kind: execution, max_duration_ms: 300000, max_model_requests: 12, max_tool_calls: 20, max_attempts: 3, exhaustion_action: stop}
    related_node_ids: [RuntimeBudget, Execution]
    related_relation_ids: [RuntimeBudget-constrains-Execution]
    expected_result: {zh: 每一维都可独立计量和执行。, en: Each dimension is measurable and enforceable independently., ja: 各 dimension を独立計測・適用できます。}
    why_valid_or_invalid: {zh: 预算在运行前声明，未混入事后 usage 或货币换算。, en: The budget is prospective and does not mix in observed usage or monetary conversion., ja: budget は prospective で observed usage や monetary conversion を混ぜません。}
    synthetic: true
    source_claims: [claim-runtime-budget-runner, claim-runtime-budget-retry, claim-runtime-budget-design]
parent_relation: null
relations:
  - id: RuntimeBudget-constrains-Execution
    predicate: constrains
    target: concept:Execution
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 约束执行, en: constrains execution, ja: execution を制約する}
    definitions: {zh: 当 scope_kind 为 execution 时，指向受该预算约束的 Execution。, en: When scope_kind is execution, points to the Execution governed by this budget., ja: scope_kind が execution のとき、この budget が統制する Execution を指します。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: constrained_by_budget, labels: {zh: 受运行预算约束, en: constrained by runtime budget, ja: runtime budget により制約される}}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-runtime-budget-runner, claim-runtime-budget-design]
    distinct_fact_rationale: {zh: 预算规范独立于被约束的执行活动。, en: The budget specification is distinct from the governed execution activity., ja: budget specification は governed execution activity と別です。}
    layout_role: cross-link
    review_status: accepted
  - id: RuntimeBudget-constrains-RunAttempt
    predicate: constrains
    target: concept:RunAttempt
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 约束运行尝试, en: constrains run attempt, ja: run attempt を制約する}
    definitions: {zh: 当 scope_kind 为 attempt 时，指向独立应用该预算的 RunAttempt。, en: When scope_kind is attempt, points to the RunAttempt to which the budget applies independently., ja: scope_kind が attempt のとき budget を独立適用する RunAttempt を指します。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: constrained_by_budget, labels: {zh: 受运行预算约束, en: constrained by runtime budget, ja: runtime budget により制約される}}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-runtime-budget-retry, claim-runtime-budget-design]
    distinct_fact_rationale: {zh: 尝试级上限每次重新应用，不等于整次执行累计预算。, en: Attempt-level ceilings reapply per attempt and are not an Execution-wide cumulative budget., ja: attempt-level ceiling は各 attempt に再適用し Execution-wide cumulative budget と異なります。}
    layout_role: cross-link
    review_status: accepted
review:
  status: accepted
  method: manual-semantic
  reviewer: codex-manual-ontology-review
  reviewed_on: 2026-07-17
  note: {zh: 已人工删除无单位的单一 cost 字段，按官方 max_turns/usage 与 timeout/max_attempts 证据重写为多维前瞻预算，并把货币成本明确留到部署扩展。, en: Manually removed the unitless single cost field and rewrote the concept as a multidimensional prospective budget using official max_turns/usage and timeout/max_attempts evidence, leaving monetary cost to deployment extensions., ja: unitless な単一 cost field を削除し official max_turns/usage と timeout/max_attempts evidence に基づく multidimensional prospective budget に改め、monetary cost は deployment extension に残しました。}
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-runtime-budget-runner
    source: eng-fw-openai-python-docs
    supports: The Agents SDK runner accepts max_turns and raises MaxTurnsExceeded when the configured model-turn limit is exceeded.
    locator: Running agents > RunConfig and max_turns; Exceptions > MaxTurnsExceeded
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-budget-usage
    source: eng-fw-openai-python-docs
    supports: The Agents SDK exposes per-run request and token usage separately from configured run limits.
    locator: Usage > Usage tracking; Run-level usage
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-budget-retry
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph exposes per-attempt timeout and max_attempts, with max_attempts including the first attempt.
    locator: Fault tolerance > RetryPolicy; timeouts
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-budget-design
    source: eng-fw-openai-python-docs
    supports: OpenAI documents prospective run limits and separately observed usage; Moonweave generalizes this separation into a multidimensional budget with explicit scope and exhaustion action.
    locator: Running agents > max_turns; Usage > Usage tracking
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
