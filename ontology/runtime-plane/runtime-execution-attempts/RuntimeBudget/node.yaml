    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style RuntimeBudget.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style RuntimeBudget.", ja: "Gateway bypass rejects Helicone-style RuntimeBudget."}
    field_values: {tokens_used: 7421}
    related_node_ids: [ObservableSummary]
