    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->RuntimeBudget.", en: "LangSmith instance: run_id parent_run_id run_type=llm->RuntimeBudget.", ja: "LangSmith instance maps to RuntimeBudget."}
    field_values: {budget_id: budget-3, scope: execution, max_turns: 8, on_exhaustion: fail}
