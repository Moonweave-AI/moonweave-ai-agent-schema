schema: moonweave.ai/ontology-node/v1
id: RuntimeBudget
kind: concept
status: accepted
labels: {zh: 运行时预算, en: Runtime budget, ja: ランタイム予算}
semantics:
  short_definition: {zh: 为运行时工作指定可衡量资源上限和耗尽行为的前瞻性 Entity。, en: A prospective Entity specifying measurable resource ceilings and exhaustion behavior for runtime work., ja: ランタイム作業の測定可能なリソース上限と枯渇動作を指定する将来指向の Entity。}
  definition: {zh: RuntimeBudget 是一个带版本配置 Entity，通过时间、轮次、令牌、工具调用或尝试等限制约束 Execution 或 RunAttempt，并声明耗尽时应执行的操作。它不是已观测的消耗、重试控制 Activity、超时事件或事后成本报告。, en: "A RuntimeBudget is a versioned configuration Entity that constrains an Execution or RunAttempt by limits such as time, turns, tokens, tool calls, or attempts and declares what to do on exhaustion. It is not observed consumption, a retry control Activity, a timeout event, or a post-hoc cost report.", ja: RuntimeBudget は、時間、ターン、トークン、ツール呼び出し、試行などの制限で Execution または RunAttempt を制約し、枯渇時の動作を宣言するバージョン付き構成 Entity である。観測済み消費、再試行制御 Activity、タイムアウトイベント、事後コストレポートではない。}
  why_needed: {zh: 智能体循环和重试需要明确且可审计的限制，以防止无界工作，并解释执行为何停止、警告或需要人工干预。, en: "Agent loops and retries need explicit, auditable limits to prevent unbounded work and to explain why an execution stopped, warned, or required human intervention.", ja: エージェントループと再試行には、無制限の作業を防ぎ、実行が停止、警告、人間介入を必要とした理由を説明する明示的で監査可能な制限が必要である。}
  includes:
    - {zh: 执行持续时间、轮次、令牌、工具调用和尝试的正上限，以及耗尽动作。, en: "Positive ceilings for execution duration, turns, tokens, tool calls, and attempts plus an exhaustion action.", ja: 実行時間、ターン、トークン、ツール呼び出し、試行に対する正の上限と枯渇アクション。}
    - {zh: 显示限制适用于执行还是单次尝试的范围和版本元数据。, en: Scope and version metadata showing whether a limit applies to an execution or individual attempt., ja: 制限が実行または個別試行のどちらに適用されるかを示すスコープとバージョンメタデータ。}
  excludes:
    - {zh: 实际令牌使用量、经过的时长、可计费成本或指标观测。, en: "Actual token usage, elapsed duration, billable cost, or metric observations.", ja: 実際のトークン使用量、経過時間、請求可能コスト、メトリック観測。}
    - {zh: 重试资格策略、已完成的超时 Activity 或生成的错误记录。, en: "Retry eligibility policy, a completed timeout Activity, or a generated error record.", ja: 再試行適格性ポリシー、完了したタイムアウト Activity、生成されたエラー記録。}
  semantic_kind: entity
  aliases: [resource budget, run limits]
engineering:
  explanation: {zh: Runner 在开始工作前读取预算，在循环期间递增已观测计数器，并在将超过上限时应用已配置的耗尽动作。使用计数器作为遥测或结果数据发出，而预算记录保持不可变配置。, en: "A runner reads a budget before starting work, increments observed counters during the loop, and applies the configured exhaustion action when a ceiling would be exceeded. Usage counters are emitted as telemetry or result data while the budget record remains immutable configuration.", ja: Runner は作業開始前に予算を読み、ループ中に観測カウンターを増加させ、上限を超える場合に構成済みの枯渇アクションを適用する。使用カウンターはテレメトリーまたは結果データとして発行し、予算記録は不変の構成として保持する。}
  typical_input:
    - description: {zh: 运行时预算配置, en: Runtime budget configuration, ja: ランタイム予算構成}
      format: |-
        {"budget_id":"budget-3","scope":"execution","max_turns":8,"max_time_ms":30000,"max_attempts":3,"on_exhaustion":"fail"}
  typical_output:
    - description: {zh: 预算决定, en: Budget decision, ja: 予算判断}
      format: |-
        {"budget_id":"budget-3","dimension":"max_turns","consumed":8,"limit":8,"decision":"fail"}
  reference_implementations:
    - {name: OpenAI Agents SDK running agents, url: https://openai.github.io/openai-agents-python/running_agents/, description: Documents max_turns and terminal handling for the agent loop.}
    - {name: LangGraph fault tolerance, url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance, description: Documents retry limits and fault-tolerance behavior.}
structure:
  identity_keys: [budget_id, version]
  fields:
    - id: budget_id
      labels: {zh: 预算 ID, en: Budget ID, ja: 予算 ID}
      definitions: {zh: 一个运行时限制配置的稳定标识符。, en: Stable identifier for one runtime-limit configuration., ja: 1つのランタイム制限構成に対する安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: budget-3
      source_claims: [claim-runtime-budget]
    - id: scope
      labels: {zh: 预算范围, en: Budget scope, ja: 予算スコープ}
      definitions: {zh: 限制是应用于一次执行还是一次单独尝试。, en: Whether limits apply to one execution or one individual attempt., ja: 制限が1つの Execution に適用されるか、1つの個別試行に適用されるか。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [execution, attempt]
      example_value: execution
      source_claims: [claim-runtime-budget]
    - id: max_turns
      labels: {zh: 最大轮次, en: Maximum turns, ja: 最大ターン数}
      definitions: {zh: 当运行时暴露该维度时，智能体循环轮次的上限。, en: Upper bound on agent-loop turns where the runtime exposes that dimension., ja: ランタイムがその次元を公開する場合の、エージェントループターン数の上限。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 8
      source_claims: [claim-runtime-budget]
    - id: on_exhaustion
      labels: {zh: 耗尽动作, en: Exhaustion action, ja: 枯渇アクション}
      definitions: {zh: 达到强制上限时采取的动作。, en: Action taken when an enforced ceiling is reached., ja: 強制される上限に達したときに取るアクション。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [fail, interrupt, warn]
      example_value: fail
      source_claims: [claim-runtime-budget]
  constraints:
    - id: runtime-budget-positive-ceiling
      severity: error
      language: plain
      expression: At least one configured ceiling must be a positive integer or positive duration.
      explanation: {zh: 没有可衡量边界的预算无法约束运行时工作。, en: A budget with no measurable bound cannot constrain runtime work., ja: 測定可能な境界のない予算はランタイム作業を制約できない。}
      source_claims: [claim-runtime-budget]
    - id: runtime-budget-prospective
      severity: error
      language: plain
      expression: Budget fields state limits and action, not consumed values or billing totals.
      explanation: {zh: 使用量是观测输出，不能覆盖前瞻性配置。, en: Usage is observational output and must not overwrite prospective configuration., ja: 使用量は観測出力であり、将来指向の構成を上書きしてはならない。}
      source_claims: [claim-runtime-budget]
  required_relations: []
