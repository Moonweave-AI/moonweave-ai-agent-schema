        family_concept_ids: [Task, WorkItem, Artifact, RuntimeEnvironment, RuntimeBudget]
        relation_ids: [Execution-realizes-Task, Execution-carries_out-WorkItem, RunAttempt-consumes-Artifact, RunAttempt-occurs_in-RuntimeEnvironment, RuntimeBudget-constrains-Execution, RuntimeBudget-constrains-RunAttempt]
        not_applicable_reason: null
