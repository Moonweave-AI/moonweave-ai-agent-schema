schema: moonweave.ai/ontology-node/v1
id: runtime-execution-attempts
kind: module
status: accepted
labels: {zh: 执行尝试, en: Execution attempts, ja: 実行試行}
semantics:
  short_definition: {zh: 具有时间边界的执行 Activity、其尝试、重试和运行时预算。, en: "Time-bounded execution Activities, their attempts, retries, and runtime budgets.", ja: 時間境界を持つ実行 Activity、その試行、再試行、ランタイム予算。}
  definition: {zh: 本模块表示已经实际开始或完成的工作。Execution 及其尝试是具有时间边界的 PROV-O Activity；重试是与先前尝试证据关联的新 Activity，而预算是约束工作的 Entity 或策略输入，绝不是尝试本身。, en: "This module represents work that has actually begun or completed. Execution and its attempts are PROV-O Activities with temporal boundaries; a retry is a new Activity linked to prior attempt evidence, while a budget is an Entity or policy input that constrains work and is never itself an attempt.", ja: このモジュールは実際に開始または完了した作業を表す。Execution とその試行は時間境界を持つ PROV-O Activity である。再試行は先行試行証拠にリンクする新しい Activity であり、予算は作業を制約する Entity またはポリシー入力で、試行そのものではない。}
  why_needed: {zh: 系统需要区分一个逻辑执行与每次可观测尝试（包括失败和重试决定），以便指标和责任不会意外地把失败工作合并到最终结果中。, en: "Systems need to distinguish one logical execution from each observable try, including failures and retry decisions, so metrics and responsibility do not accidentally merge failed work into a final result.", ja: システムは、失敗と再試行判断を含む1つの論理実行と各観測可能な試行を区別する必要がある。これによりメトリックと責任が失敗した作業を最終結果に誤って統合しない。}
  includes:
    - {zh: Execution、运行尝试、重试活动、开始与结束时间、终止结果以及预算 Entity。, en: "Executions, run attempts, retry activities, start and end times, terminal outcomes, and budget entities.", ja: Execution、実行試行、再試行 Activity、開始・終了時刻、終端結果、予算 Entity。}
    - {zh: 当任务定义在本运行时模块外时，从执行到已实现任务或目标的链接。, en: Links from an execution to a realized task or goal when the task definition is outside this runtime module., ja: タスク定義がこのランタイムモジュール外にある場合の、実行から実現されたタスクまたは目標へのリンク。}
  excludes:
    - {zh: 尚未开始的已调度或已批准任务。, en: A scheduled or approved task that has not started., ja: まだ開始していないスケジュール済みまたは承認済みタスク。}
    - {zh: 用作尝试记录替代品的 trace span、检查点、输出和策略。, en: "Trace spans, checkpoints, outputs, and policies as substitutes for an attempt record.", ja: 試行記録の代替としての trace span、チェックポイント、出力、ポリシー。}
  semantic_kind: null
  aliases: [runs, attempts, retries]
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description: {zh: 输入是已规划的 Task/WorkItem、实际 Artifact 与 RuntimeEnvironment，以及运行前 RuntimeBudget。, en: Inputs are planned Task/WorkItem, actual Artifact and RuntimeEnvironment, and a prospective RuntimeBudget., ja: input は planned Task/WorkItem・actual Artifact/RuntimeEnvironment・prospective RuntimeBudget。}
        family_concept_ids: [Task, WorkItem, Artifact, RuntimeEnvironment, RuntimeBudget]
        relation_ids: [Execution-realizes-Task, Execution-carries_out-WorkItem, RunAttempt-consumes-Artifact, RunAttempt-occurs_in-RuntimeEnvironment, RuntimeBudget-constrains-Execution, RuntimeBudget-constrains-RunAttempt]
        not_applicable_reason: null
      output:
        applicable: true
        description: {zh: 本模块的输出事实是 RunAttempt 进入 succeeded、failed 或 canceled 终态；结果材料由其具体所有模块记录。, en: This module outputs the fact that a RunAttempt entered succeeded, failed, or canceled; concrete result material remains in its owning module., ja: 本 module の output fact は RunAttempt が succeeded/failed/canceled に入ったことで、result material は owner module が記録します。}
        family_concept_ids: [RunAttempt]
        relation_ids: []
        not_applicable_reason: null
      failure:
        applicable: true
        description: {zh: 失败由 RunAttempt 的 failed 终态表达；错误事件和诊断记录由其各自模块拥有。, en: Failure is expressed by RunAttempt terminal state failed; error events and diagnostics remain owned by their modules., ja: failure は RunAttempt terminal state failed で表し error event/diagnostic は各 module が所有します。}
        family_concept_ids: [RunAttempt]
        relation_ids: []
        not_applicable_reason: null
      recovery:
        applicable: true
        description: {zh: RoutingDecision 选择 retry 后，RetryActivity 落实调度并创建身份不同的后续 RunAttempt。, en: After RoutingDecision selects retry, RetryActivity performs scheduling and creates a successor RunAttempt with a distinct identity., ja: RoutingDecision が retry を選択後 RetryActivity が scheduling を実行し新 identity の successor RunAttempt を作ります。}
        family_concept_ids: [RoutingDecision, RetryActivity, RunAttempt]
        relation_ids: [RetryActivity-implements-RoutingDecision, RetryActivity-responds_to-RunAttempt, RetryActivity-creates-RunAttempt]
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: codex-manual-ontology-review
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-17
          decision_note: {zh: 已逐关系核对输入、输出、失败与恢复边界，未把来源或框架对象纳入概念族。, en: Manually checked input, output, failure, and recovery boundaries relation by relation without admitting sources or framework objects as concepts., ja: input/output/failure/recovery 境界を relation 単位で確認し source/framework object を concept に含めません。}
  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids: [Execution, RuntimeBudget]
    allowed_backbone_predicates: [part_of]
    flat_root_exception_concept_ids: []
    not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: codex-manual-ontology-review
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-17
          decision_note: {zh: Execution 只通过 part_of 包含 RunAttempt 与 RetryActivity；RuntimeBudget 因规范身份独立而保留为模块根。证据、评估、约束和策略应用均为横向关系。, en: Execution contains RunAttempt and RetryActivity only through part_of. RuntimeBudget remains a module root because its specification identity is independent. Evidence, evaluation, constraints, and policy application remain cross-relations., ja: Execution は part_of のみで RunAttempt/RetryActivity を含み RuntimeBudget は specification identity が独立するため module root。evidence/evaluation/constraint/policy application は cross-relation です。}
  competency_questions:
    - id: runtime-execution-attempts-cq-attempt-lineage
      semantic_key: runtime-execution-attempts.attempt-lineage
      primary_owner_module_id: runtime-execution-attempts
      related_module_ids: [orchestration-routing-control]
      questions: {zh: 哪个失败尝试触发了哪次 retry 决定和哪个新尝试？, en: Which failed attempt led to which retry decision and which successor attempt?, ja: どの failed attempt がどの retry decision と successor attempt に繋がったか。}
      query: Follow RetryActivity-responds_to-RunAttempt, RetryActivity-implements-RoutingDecision, and RetryActivity-creates-RunAttempt.
      expected_assertion: Each RetryActivity has one predecessor, one retry RoutingDecision, and one distinct successor within the same Execution.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids: [RetryActivity, RunAttempt, Execution]
        related_concept_ids: [RoutingDecision]
        relation_ids: [RetryActivity-part_of-Execution, RetryActivity-responds_to-RunAttempt, RetryActivity-implements-RoutingDecision, RetryActivity-creates-RunAttempt]
        not_applicable_reason: null
      positive_example_ids: [runtime-execution-attempts-example-retry]
      counterexample_ids: []
      source_claims:
        - source_id: eng-fw-langgraph-fault-tolerance
          supports: LangGraph exposes retry attempts, attempt numbering, policy parameters, and exhaustion; Moonweave adds explicit provenance links among decision, predecessor, and successor.
          locator: Fault tolerance > RetryPolicy; Accessing retry metadata during execution
          evidence_kind: design-inference
          confidence: high
          review_status: accepted
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 问题由明确关系回答，不依赖名称或时间邻接猜测。, en: Explicit relations answer the question without name matching or temporal adjacency guesses., ja: name matching や時刻近接ではなく明示 relation で回答します。}
    - id: runtime-execution-attempts-cq-terminal-state-evidence
      semantic_key: runtime-execution-attempts.terminal-state-evidence
      primary_owner_module_id: runtime-execution-attempts
      related_module_ids: [orchestration-task-planning]
      questions: {zh: 哪些具体结果或评估证据支持一个 RunAttempt 的终态？, en: Which concrete result or evaluation evidence supports a RunAttempt terminal state?, ja: どの concrete result/evaluation evidence が RunAttempt terminal state を支持するか。}
      query: Follow evidence relations such as ToolResult-evidences-RunAttempt and EvaluationRun-evaluates-RunAttempt without moving evidence ownership into runtime.
      expected_assertion: The RunAttempt stores terminal state while concrete evidence and evaluation retain their own identities and owners.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids: [RunAttempt]
        related_concept_ids: [ToolResult, EvaluationRun, TaskCompletionCriterion]
        relation_ids: [ToolResult-evidences-RunAttempt, EvaluationRun-evaluates-RunAttempt]
        not_applicable_reason: null
      positive_example_ids: []
      counterexample_ids: []
      source_claims:
        - source_id: eng-ont-prov-o
          supports: PROV-O separates generated entities from generating activities; Moonweave extends that separation to result evidence and outcome judgment.
          locator: PROV-O > Entity; Activity; Generation
          evidence_kind: design-inference
          confidence: high
          review_status: accepted
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 该问题防止从单个结果自动推断 succeeded，同时避免再造通用结果或结局容器。, en: This prevents inferring succeeded from one result and avoids recreating generic result or outcome containers., ja: 単一 result から succeeded を推論せず generic result/outcome container を再作成しません。}
  key_notion: {zh: 一次逻辑 Execution 由不可变 RunAttempt 和 RetryActivity 组成；结果与结局是独立信息记录。, en: One logical Execution is composed of immutable RunAttempts and RetryActivities; result and outcome are independent information records., ja: 一 logical Execution は immutable RunAttempt/RetryActivity で構成され result/outcome は独立 information record。}
  owns_when: {zh: 对象的身份由逻辑执行、执行内尝试/重试活动、前瞻预算、通用结果材料或通用终态判断决定。, en: Own an object when its identity is determined by a logical execution, an internal attempt/retry activity, a prospective budget, generic result material, or a generic terminal judgment., ja: identity が logical execution・internal attempt/retry activity・prospective budget・generic result material・generic terminal judgment で決まる場合に所有。}
  references_when: {zh: 对象的身份由 Task/WorkItem、RoutingDecision/RetryPolicy、Invocation/Command、工具专用结果或观测记录决定。, en: Reference objects whose identity is determined by Task/WorkItem, RoutingDecision/RetryPolicy, Invocation/Command, tool-specific results, or observation records., ja: identity が Task/WorkItem・RoutingDecision/RetryPolicy・Invocation/Command・tool-specific result・observation record で決まる場合は参照。}
  boundary_decisions:
    - other_module_id: tool-invocation-execution
      subject_concept_ids: [RunAttempt]
      decision: splits-with
      owner_module_id: runtime-execution-attempts
      rationale: {zh: 本模块只拥有跨工具通用运行语义；Invocation、InvocationAttempt、Command、ExecutionResult 和 ToolResult 由工具调用模块拥有。, en: This module owns only tool-agnostic runtime semantics; Invocation, InvocationAttempt, Command, ExecutionResult, and ToolResult belong to tool invocation., ja: 本 module は tool-agnostic runtime semantics のみ所有し Invocation・InvocationAttempt・Command・ExecutionResult・ToolResult は tool invocation が所有します。}
      relation_ids: [InvocationAttempt-is_a-RunAttempt]
      relation_not_applicable_reason: null
      overlap_not_applicable_reason: null
      source_claims:
        - source_id: eng-ont-prov-o
          supports: PROV-O distinguishes activity occurrences from generated entities but does not prescribe Moonweave module ownership; the split is an explicit design decision.
          locator: PROV-O > Activity; Entity; Generation
          evidence_kind: design-inference
          confidence: high
          review_status: accepted
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 已打开 Command、InvocationAttempt 与 ExecutionResult 节点核对身份，运行时只保留通用尝试语义。, en: Opened and checked Command, InvocationAttempt, and ExecutionResult identities; runtime retains only generic attempt semantics., ja: Command・InvocationAttempt・ExecutionResult identity を確認し runtime は generic attempt semantics のみ保持します。}
    - other_module_id: orchestration-routing-control
      subject_concept_ids: [RetryActivity]
      decision: splits-with
      owner_module_id: runtime-execution-attempts
      rationale: {zh: RoutingDecision 应用 RetryPolicy 并选择 retry/stop；RetryActivity 只落实已选择的 retry 并创建后续尝试。, en: RoutingDecision applies RetryPolicy and selects retry or stop; RetryActivity only implements a selected retry and creates the successor., ja: RoutingDecision が RetryPolicy を適用し retry/stop を選び RetryActivity は選択済み retry を実装し successor を作ります。}
      relation_ids: [RetryActivity-implements-RoutingDecision]
      relation_not_applicable_reason: null
      overlap_not_applicable_reason: null
      source_claims:
        - source_id: eng-fw-langgraph-fault-tolerance
          supports: LangGraph separates retry-policy evaluation, attempt rerun, and exhaustion handling; Moonweave assigns decision and execution occurrences to different modules.
          locator: Fault tolerance > RetryPolicy; Handling errors after retries are exhausted
          evidence_kind: design-inference
          confidence: high
          review_status: accepted
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 已核对 RoutingDecision 当前定义与 applies RetryPolicy 关系，避免两个模块重复“决定是否重试”。, en: Checked the current RoutingDecision definition and applies-RetryPolicy relation so both modules do not duplicate retry choice., ja: RoutingDecision definition と applies-RetryPolicy relation を確認し retry choice の重複を除きました。}
  overlap_checks: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Activity、OpenAI Agents runner 与 LangGraph RetryPolicy 逐项核验，Execution/RunAttempt 语义成立。
    en: Verified against PROV-O Activity, OpenAI Agents runner, and LangGraph RetryPolicy. Execution and RunAttempt semantics hold.
    ja: PROV-O Activity、OpenAI Agents runner、LangGraph RetryPolicy に照らし Execution/RunAttempt semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-runtime-module-activity
    source: eng-ont-prov-o
    supports: PROV-O distinguishes activities from entities and provides start/end, use, and generation relations used to separate runtime occurrences from result information.
    locator: PROV-O > Activity; Entity; startedAtTime; endedAtTime; used; wasGeneratedBy
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-runner
    source: eng-fw-openai-python-docs
    supports: The Agents SDK separates one runner loop, configured run limits, observed usage, and returned result surfaces; Moonweave uses those boundaries without making SDK classes ontology concepts.
    locator: Running agents; Results; Usage
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-retry
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph documents per-attempt retries, attempt numbering, backoff, timeout, and exhaustion; Moonweave reifies explicit provenance among the generic runtime occurrences.
    locator: Fault tolerance > RetryPolicy; Accessing retry metadata during execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-lifecycle
    source: eng-proto-a2a-spec
    supports: A2A separates Task lifecycle status from messages and artifacts; Moonweave keeps terminal state on the runtime occurrence while result material remains in its concrete owning module.
    locator: Definitions > Task; TaskStatus; Artifact
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

