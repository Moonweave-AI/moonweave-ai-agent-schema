          reviewed_on: 2026-07-17
          decision_note: {zh: Execution 鍙€氳繃 part_of 鍖呭惈 RunAttempt 涓?RetryActivity锛汻untimeBudget 鍥犺鑼冭韩浠界嫭绔嬭€屼繚鐣欎负妯″潡鏍广€傝瘉鎹€佽瘎浼般€佺害鏉熷拰绛栫暐搴旂敤鍧囦负妯悜鍏崇郴銆? en: Execution contains RunAttempt and RetryActivity only through part_of. RuntimeBudget remains a module root because its specification identity is independent. Evidence, evaluation, constraints, and policy application remain cross-relations., ja: Execution 銇?part_of 銇伩銇?RunAttempt/RetryActivity 銈掑惈銇?RuntimeBudget 銇?specification identity 銇岀嫭绔嬨仚銈嬨仧銈?module root銆俥vidence/evaluation/constraint/policy application 銇?cross-relation 銇с仚銆倉
  competency_questions:
    - id: runtime-execution-attempts-cq-attempt-lineage
      semantic_key: runtime-execution-attempts.attempt-lineage
      primary_owner_module_id: runtime-execution-attempts
      related_module_ids: [orchestration-routing-control]
      questions: {zh: 鍝釜澶辫触灏濊瘯瑙﹀彂浜嗗摢娆?retry 鍐冲畾鍜屽摢涓柊灏濊瘯锛? en: Which failed attempt led to which retry decision and which successor attempt?, ja: 銇┿伄 failed attempt 銇屻仼銇?retry decision 銇?successor attempt 銇箣銇屻仯銇熴亱銆倉
      query: Follow RetryActivity-responds_to-RunAttempt, RetryActivity-implements-RoutingDecision, and RetryActivity-creates-RunAttempt.
      expected_assertion: Each RetryActivity has one predecessor, one retry RoutingDecision, and one distinct successor within the same Execution.
