source_claims:
  - id: claim-runtime-module-activity
    source: eng-ont-prov-o
    supports: PROV-O distinguishes activities from entities and provides start/end, use, and generation relations used to separate runtime occurrences from result information.
    locator: PROV-O > Activity; Entity; startedAtTime; endedAtTime; used; wasGeneratedBy
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-runner
    source: eng-fw-openai-python-docs
    supports: The Agents SDK separates one runner loop, configured run limits, observed usage, and returned result surfaces; Moonweave uses those boundaries without making SDK classes ontology concepts.
    locator: Running agents; Results; Usage
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-retry
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph documents per-attempt retries, attempt numbering, backoff, timeout, and exhaustion; Moonweave reifies explicit provenance among the generic runtime occurrences.
    locator: Fault tolerance > RetryPolicy; Accessing retry metadata during execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-runtime-module-lifecycle
    source: eng-proto-a2a-spec
    supports: A2A separates Task lifecycle status from messages and artifacts; Moonweave keeps terminal state on the runtime occurrence while result material remains in its concrete owning module.
    locator: Definitions > Task; TaskStatus; Artifact
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
