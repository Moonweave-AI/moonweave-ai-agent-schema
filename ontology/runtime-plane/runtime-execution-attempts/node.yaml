schema: moonweave.ai/ontology-node/v1
id: runtime-execution-attempts
kind: module
status: accepted
labels: {zh: 执行尝试, en: Execution attempts, ja: 実行試行}
semantics:
  short_definition: {zh: 具有时间边界的执行 Activity、其尝试、重试和运行时预算。, en: "Time-bounded execution Activities, their attempts, retries, and runtime budgets.", ja: 時間境界を持つ実行 Activity、その試行、再試行、ランタイム予算。}
  definition: {zh: 本模块表示已经实际开始或完成的工作。Execution 及其尝试是具有时间边界的 PROV-O Activity；重试是与先前尝试证据关联的新 Activity，而预算是约束工作的 Entity 或策略输入，绝不是尝试本身。, en: "This module represents work that has actually begun or completed. Execution and its attempts are PROV-O Activities with temporal boundaries; a retry is a new Activity linked to prior attempt evidence, while a budget is an Entity or policy input that constrains work and is never itself an attempt.", ja: このモジュールは実際に開始または完了した作業を表す。Execution とその試行は時間境界を持つ PROV-O Activity である。再試行は先行試行証拠にリンクする新しい Activity であり、予算は作業を制約する Entity またはポリシー入力で、試行そのものではない。}
  why_needed: {zh: 系统需要区分一个逻辑执行与每次可观测尝试（包括失败和重试决定），以便指标和责任不会意外地把失败工作合并到最终结果中。, en: "Systems need to distinguish one logical execution from each observable try, including failures and retry decisions, so metrics and responsibility do not accidentally merge failed work into a final result.", ja: システムは、失敗と再試行判断を含む1つの論理実行と各観測可能な試行を区別する必要がある。これによりメトリックと責任が失敗した作業を最終結果に誤って統合しない。}
  includes:
    - {zh: Execution、运行尝试、重试活动、开始与结束时间、终止结果以及预算 Entity。, en: "Executions, run attempts, retry activities, start and end times, terminal outcomes, and budget entities.", ja: Execution、実行試行、再試行 Activity、開始・終了時刻、終端結果、予算 Entity。}
    - {zh: 当任务定义在本运行时模块外时，从执行到已实现任务或目标的链接。, en: Links from an execution to a realized task or goal when the task definition is outside this runtime module., ja: タスク定義がこのランタイムモジュール外にある場合の、実行から実現されたタスクまたは目標へのリンク。}
  excludes:
    - {zh: 尚未开始的已调度或已批准任务。, en: A scheduled or approved task that has not started., ja: まだ開始していないスケジュール済みまたは承認済みタスク。}
    - {zh: 用作尝试记录替代品的 trace span、检查点、输出和策略。, en: "Trace spans, checkpoints, outputs, and policies as substitutes for an attempt record.", ja: 試行記録の代替としての trace span、チェックポイント、出力、ポリシー。}
  semantic_kind: null
  aliases: [runs, attempts, retries]
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input: {applicable: true, description: {zh: 包含执行 ID、参与者、输入引用、限制和可选先前尝试 ID 的启动请求。, en: "A launch request with execution ID, actor, input reference, limits, and optional prior attempt ID.", ja: 実行 ID、アクター、入力参照、制限、任意の先行試行 ID を含む起動要求。}, family_concept_ids: [Execution, RuntimeBudget], relation_ids: []}
      output: {applicable: true, description: {zh: 带有时间戳、结果、输出引用和重试谱系的尝试记录。, en: "An attempt record with timestamps, outcome, output references, and retry lineage.", ja: 時刻、結果、出力参照、再試行系譜を持つ試行記録。}, family_concept_ids: [RunAttempt, RetryActivity], relation_ids: []}
      failure: {applicable: true, description: {zh: 超时、护栏失败、工具错误或预算耗尽会以类型化结果终止一次尝试。, en: "A timeout, guardrail failure, tool error, or exhausted budget terminates an attempt with a typed outcome.", ja: タイムアウト、ガードレール失敗、ツールエラー、予算枯渇は、型付けされた結果で試行を終了する。}, family_concept_ids: [RunAttempt, RuntimeBudget], relation_ids: []}
      recovery: {applicable: true, description: {zh: 从检查点或输入引用开始新的尝试，并保持失败尝试不可变。, en: Start a new attempt from a checkpoint or input reference and keep the failed attempt immutable., ja: チェックポイントまたは入力参照から新しい試行を開始し、失敗した試行を不変のまま保持する。}, family_concept_ids: [RetryActivity, RunAttempt], relation_ids: []}
  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids: [Execution, RuntimeBudget]
    allowed_backbone_predicates: [part_of]
    flat_root_exception_concept_ids: [RuntimeBudget]
    not_applicable_reason: null
  key_notion: An attempt is an occurrence, while a budget is a constraining Entity.
  owns_when: {zh: 一条记录回答工作何时运行、是哪次尝试以及发生了什么结果。, en: "A record answers when work ran, which attempt it was, and what outcome occurred.", ja: 記録が、作業がいつ実行されたか、どの試行か、どの結果が起きたかを答える場合。}
  references_when: {zh: 一条记录回答哪些遥测或输出附着于该工作。, en: A record answers what telemetry or output was attached to the work., ja: 記録が、どのテレメトリーまたは出力が作業に付着したかを答える場合。}
  boundary_decisions: []
  overlap_checks: []
engineering:
  explanation: {zh: 开始操作创建不可变尝试 ID，并捕获时间、输入、已配置限制和父执行。完成操作追加结果和输出引用；重试会创建另一次尝试而不是覆盖第一次。, en: "Start creates an immutable attempt ID and captures time, inputs, configured limits, and parent execution. Completion appends outcome and output references; retry creates another attempt rather than overwriting the first.", ja: 開始は不変の試行 ID を作成し、時刻、入力、構成済み制限、親実行を捕捉する。完了は結果と出力参照を追加し、再試行は最初の試行を上書きせず別の試行を作成する。}
  typical_input:
    - description: {zh: 尝试开始请求, en: Attempt start request, ja: 試行開始要求}
      format: |-
        {"execution_id":"exec-842","attempt_number":2,"prior_attempt_id":"attempt-1","max_turns":8,"timeout_ms":30000}
  typical_output:
    - description: {zh: 尝试完成记录, en: Attempt completion record, ja: 試行完了記録}
      format: |-
        {"attempt_id":"attempt-2","execution_id":"exec-842","started_at":"2026-07-18T09:01:00Z","ended_at":"2026-07-18T09:01:12Z","outcome":"succeeded"}
  reference_implementations:
    - {name: OpenAI Agents SDK running agents, url: https://openai.github.io/openai-agents-python/running_agents/, description: "Runner executes the agent loop, tool calls, handoffs, guardrails, and turn limits."}
    - {name: LangGraph fault tolerance, url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance, description: "Retry and timeout behaviors for stateful graph nodes."}
structure:
  identity_keys: [execution_id]
  fields:
    - id: execution_id
      labels: {zh: 执行 ID, en: Execution ID, ja: 実行 ID}
      definitions: {zh: 一个逻辑运行工作的稳定标识符。, en: Stable identifier for one logical unit of runtime work., ja: 1 つの論理的ランタイム作業単位の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: exec-842
      source_claims: [claim-runtime-execution-activity]
    - id: started_at
      labels: {zh: 开始时间, en: Start time, ja: 開始時刻}
      definitions: {zh: 执行或尝试实际开始的时间戳。, en: Timestamp at which an execution or attempt actually begins., ja: 実行または試行が実際に開始した時刻。}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      example_value: '2026-07-18T09:01:00Z'
      source_claims: [claim-runtime-execution-activity]
  constraints:
    - id: runtime-execution-attempts-observed-start
      severity: error
      language: plain
      expression: An execution attempt must have a stable execution ID and actual start time before it is recorded as a runtime Activity.
      explanation: {zh: 已调度或批准的工作不是运行时活动，直到可观测执行真正开始。, en: Scheduled or approved work is not a runtime Activity until observable execution actually starts., ja: スケジュール済みまたは承認済みの作業は、観測可能な実行が実際に開始するまでランタイム Activity ではない。}
      source_claims: [claim-runtime-execution-activity]
  required_relations: []
examples:
  - id: runtime-execution-attempts-positive
    labels: {zh: "OpenAI Run 生命周期", en: "OpenAI Run lifecycle", ja: "OpenAI Run ライフサイクル"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; runtime-execution-attempts maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; runtime-execution-attempts maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; runtime-execution-attempts provenance graph."}
    field_values: {execution_id: run-qvy-swok6, started_at: '2026-01-08T12:00:03Z'}
    related_node_ids: [Execution, RunAttempt]
    related_relation_ids: []
    source_claims: [claim-runtime-execution-activity]
  - id: runtime-execution-attempts-counterexample
    labels: {zh: "queued 单次 poll 误判", en: "Single poll on queued misjudged", ja: "queued 1回 poll 誤判定"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style runtime-execution-attempts.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style runtime-execution-attempts.", ja: "Gateway bypass rejects Helicone-style runtime-execution-attempts."}
    field_values: {run_id: run-qvy-swok6, status: queued}
    related_node_ids: [RunAttempt]
    related_relation_ids: []
    source_claims: [claim-runtime-execution-activity]
  - id: runtime-execution-attempts-boundary
    labels: {zh: "max_turns 与 Execution 边界", en: "max_turns versus Execution boundary", ja: "max_turns と Execution 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-execution-attempts preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; runtime-execution-attempts preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {max_turns: 10}
    related_node_ids: [RuntimeBudget, Execution]
    related_relation_ids: []
    source_claims: [claim-runtime-execution-activity]
  - id: runtime-execution-attempts-instance-attempt-2
    labels: {zh: "requires_action 第二次尝试", en: "requires_action second attempt", ja: "requires_action 2 回目試行"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->runtime-execution-attempts.", en: "LangSmith instance: run_id parent_run_id run_type=llm->runtime-execution-attempts.", ja: "LangSmith instance maps to runtime-execution-attempts."}
    field_values: {attempt_id: openai-run-attempt-2, execution_id: run-qvy-swok6}
    related_node_ids: [RunAttempt, RetryActivity, Execution]
    related_relation_ids: [RunAttempt-retries-RunAttempt]
    source_claims: [claim-runtime-execution-activity]
parent_relation: null
relations: []
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines time-bounded Activities, associated Agents, use, and generation.
  - id: openai-agents-running
    title: OpenAI Agents SDK running agents
    url: https://openai.github.io/openai-agents-python/running_agents/
    source_type: official-doc
    relevance: Documents the agent loop, tool execution, handoffs, guardrails, and turn-limited runner behavior.
source_claims:
  - id: claim-runtime-execution-activity
    source: prov-o-core
    supports: PROV-O defines an Activity as something that occurs over a period of time and acts upon or with Entities.
    locator: Section 3.1, prov:Activity
    evidence_kind: standard
    confidence: high


