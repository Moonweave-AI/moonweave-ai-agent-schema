      questions: {zh: 鍝簺鍏蜂綋缁撴灉鎴栬瘎浼拌瘉鎹敮鎸佷竴涓?RunAttempt 鐨勭粓鎬侊紵, en: Which concrete result or evaluation evidence supports a RunAttempt terminal state?, ja: 銇┿伄 concrete result/evaluation evidence 銇?RunAttempt terminal state 銈掓敮鎸併仚銈嬨亱銆倉
      query: Follow evidence relations such as ToolResult-evidences-RunAttempt and EvaluationRun-evaluates-RunAttempt without moving evidence ownership into runtime.
      expected_assertion: The RunAttempt stores terminal state while concrete evidence and evaluation retain their own identities and owners.
      evidence_binding:
        applicability: relation-backed
