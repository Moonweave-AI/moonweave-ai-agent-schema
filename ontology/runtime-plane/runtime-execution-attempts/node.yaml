            decision_note: {zh: 闂鐢辨槑纭叧绯诲洖绛旓紝涓嶄緷璧栧悕绉版垨鏃堕棿閭绘帴鐚滄祴銆? en: Explicit relations answer the question without name matching or temporal adjacency guesses., ja: name matching 銈勬檪鍒昏繎鎺ャ仹銇仾銇忔槑绀?relation 銇у洖绛斻仐銇俱仚銆倉
    - id: runtime-execution-attempts-cq-terminal-state-evidence
