schema: moonweave.ai/ontology-node/v1
id: runtime-execution-attempts
kind: module
status: accepted
labels: {zh: 执行尝试, en: Execution attempts, ja: 実行試行}
semantics:
  short_definition: {zh: 具有时间边界的执行 Activity、其尝试、重试和运行时预算。, en: "Time-bounded execution Activities, their attempts, retries, and runtime budgets.", ja: 時間境界を持つ実行 Activity、その試行、再試行、ランタイム予算。}
  definition: {zh: 本模块表示已经实际开始或完成的工作。Execution 及其尝试是具有时间边界的 PROV-O Activity；重试是与先前尝试证据关联的新 Activity，而预算是约束工作的 Entity 或策略输入，绝不是尝试本身。, en: "This module represents work that has actually begun or completed. Execution and its attempts are PROV-O Activities with temporal boundaries; a retry is a new Activity linked to prior attempt evidence, while a budget is an Entity or policy input that constrains work and is never itself an attempt.", ja: このモジュールは実際に開始または完了した作業を表す。Execution とその試行は時間境界を持つ PROV-O Activity である。再試行は先行試行証拠にリンクする新しい Activity であり、予算は作業を制約する Entity またはポリシー入力で、試行そのものではない。}
  why_needed: {zh: 系统需要区分一个逻辑执行与每次可观测尝试（包括失败和重试决定），以便指标和责任不会意外地把失败工作合并到最终结果中。, en: "Systems need to distinguish one logical execution from each observable try, including failures and retry decisions, so metrics and responsibility do not accidentally merge failed work into a final result.", ja: システムは、失敗と再試行判断を含む1つの論理実行と各観測可能な試行を区別する必要がある。これによりメトリックと責任が失敗した作業を最終結果に誤って統合しない。}
  includes:
    - {zh: Execution、运行尝试、重试活动、开始与结束时间、终止结果以及预算 Entity。, en: "Executions, run attempts, retry activities, start and end times, terminal outcomes, and budget entities.", ja: Execution、実行試行、再試行 Activity、開始・終了時刻、終端結果、予算 Entity。}
    - {zh: 当任务定义在本运行时模块外时，从执行到已实现任务或目标的链接。, en: Links from an execution to a realized task or goal when the task definition is outside this runtime module., ja: タスク定義がこのランタイムモジュール外にある場合の、実行から実現されたタスクまたは目標へのリンク。}
  excludes:
    - {zh: 尚未开始的已调度或已批准任务。, en: A scheduled or approved task that has not started., ja: まだ開始していないスケジュール済みまたは承認済みタスク。}
    - {zh: 用作尝试记录替代品的 trace span、检查点、输出和策略。, en: "Trace spans, checkpoints, outputs, and policies as substitutes for an attempt record.", ja: 試行記録の代替としての trace span、チェックポイント、出力、ポリシー。}
  semantic_kind: null
  aliases: [runs, attempts, retries]
