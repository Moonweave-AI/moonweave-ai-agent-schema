        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 璇ラ棶棰橀槻姝粠鍗曚釜缁撴灉鑷姩鎺ㄦ柇 succeeded锛屽悓鏃堕伩鍏嶅啀閫犻€氱敤缁撴灉鎴栫粨灞€瀹瑰櫒銆? en: This prevents inferring succeeded from one result and avoids recreating generic result or outcome containers., ja: 鍗樹竴 result 銇嬨倝 succeeded 銈掓帹璜栥仜銇?generic result/outcome container 銈掑啀浣滄垚銇椼伨銇涖倱銆倉
  key_notion: {zh: 涓€娆￠€昏緫 Execution 鐢变笉鍙彉 RunAttempt 鍜?RetryActivity 缁勬垚锛涚粨鏋滀笌缁撳眬鏄嫭绔嬩俊鎭褰曘€? en: One logical Execution is composed of immutable RunAttempts and RetryActivities; result and outcome are independent information records., ja: 涓€ logical Execution 銇?immutable RunAttempt/RetryActivity 銇ф鎴愩仌銈?result/outcome 銇嫭绔?information record銆倉
  owns_when: {zh: 瀵硅薄鐨勮韩浠界敱閫昏緫鎵ц銆佹墽琛屽唴灏濊瘯/閲嶈瘯娲诲姩銆佸墠鐬婚绠椼€侀€氱敤缁撴灉鏉愭枡鎴栭€氱敤缁堟€佸垽鏂喅瀹氥€? en: Own an object when its identity is determined by a logical execution, an internal attempt/retry activity, a prospective budget, generic result material, or a generic terminal judgment., ja: identity 銇?logical execution銉籭nternal attempt/retry activity銉籶rospective budget銉籫eneric result material銉籫eneric terminal judgment 銇ф焙銇俱倠鍫村悎銇墍鏈夈€倉
  references_when: {zh: 瀵硅薄鐨勮韩浠界敱 Task/WorkItem銆丷outingDecision/RetryPolicy銆両nvocation/Command銆佸伐鍏蜂笓鐢ㄧ粨鏋滄垨瑙傛祴璁板綍鍐冲畾銆? en: Reference objects whose identity is determined by Task/WorkItem, RoutingDecision/RetryPolicy, Invocation/Command, tool-specific results, or observation records., ja: identity 銇?Task/WorkItem銉籖outingDecision/RetryPolicy銉籌nvocation/Command銉籺ool-specific result銉籵bservation record 銇ф焙銇俱倠鍫村悎銇弬鐓с€倉
  boundary_decisions:
    - other_module_id: tool-invocation-execution
      subject_concept_ids: [RunAttempt]
      decision: splits-with
      owner_module_id: runtime-execution-attempts
      rationale: {zh: 鏈ā鍧楀彧鎷ユ湁璺ㄥ伐鍏烽€氱敤杩愯璇箟锛汭nvocation銆両nvocationAttempt銆丆ommand銆丒xecutionResult 鍜?ToolResult 鐢卞伐鍏疯皟鐢ㄦā鍧楁嫢鏈夈€? en: This module owns only tool-agnostic runtime semantics; Invocation, InvocationAttempt, Command, ExecutionResult, and ToolResult belong to tool invocation., ja: 鏈?module 銇?tool-agnostic runtime semantics 銇伩鎵€鏈夈仐 Invocation銉籌nvocationAttempt銉籆ommand銉籈xecutionResult銉籘oolResult 銇?tool invocation 銇屾墍鏈夈仐銇俱仚銆倉
