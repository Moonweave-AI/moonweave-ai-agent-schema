            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 宸叉墦寮€ Command銆両nvocationAttempt 涓?ExecutionResult 鑺傜偣鏍稿韬唤锛岃繍琛屾椂鍙繚鐣欓€氱敤灏濊瘯璇箟銆? en: Opened and checked Command, InvocationAttempt, and ExecutionResult identities; runtime retains only generic attempt semantics., ja: Command銉籌nvocationAttempt銉籈xecutionResult identity 銈掔⒑瑾嶃仐 runtime 銇?generic attempt semantics 銇伩淇濇寔銇椼伨銇欍€倉
    - other_module_id: orchestration-routing-control
      subject_concept_ids: [RetryActivity]
      decision: splits-with
      owner_module_id: runtime-execution-attempts
      rationale: {zh: RoutingDecision 搴旂敤 RetryPolicy 骞堕€夋嫨 retry/stop锛汻etryActivity 鍙惤瀹炲凡閫夋嫨鐨?retry 骞跺垱寤哄悗缁皾璇曘€? en: RoutingDecision applies RetryPolicy and selects retry or stop; RetryActivity only implements a selected retry and creates the successor., ja: RoutingDecision 銇?RetryPolicy 銈掗仼鐢ㄣ仐 retry/stop 銈掗伕銇?RetryActivity 銇伕鎶炴笀銇?retry 銈掑疅瑁呫仐 successor 銈掍綔銈娿伨銇欍€倉
      relation_ids: [RetryActivity-implements-RoutingDecision]
