schema: moonweave.ai/ontology-node/v1
id: runtime-execution-attempts
kind: module
labels:
  zh: 执行、尝试与结果
  en: Executions, attempts, and results
  ja: 実行・試行・結果
semantics:
  short_definition:
    zh: 执行尝试模块记录一次逻辑执行如何开始、分成哪些不可变尝试、消耗多少预算，以及最终以何种终态结束。
    en: The execution-attempts module records how a logical execution starts, splits into immutable attempts, consumes budget, and reaches a terminal state.
    ja: execution-attempts モジュールは、logical execution の開始、immutable attempt への分割、budget 消費、terminal state 到達を記録します。
  definition:
    zh: 本模块拥有 Execution（跨工具与非工具场景通用的逻辑执行 episode）、RunAttempt（同一 Execution 内不可变、可谱系化的具体尝试，终态直接记录在 RunAttempt 上）、RetryActivity（Execution 内落实已选 retry 并创建后继 RunAttempt 的活动）与 RuntimeBudget（运行前预算规范，约束 Execution 与 RunAttempt）。具体 Invocation、ToolResult、TraceSpan 与 EvaluationRun 分别归工具、可观测与反馈模块所有。TaskPlan 与 RoutingDecision 归编排域；本模块只记录实际发生的 Execution 与 RunAttempt，不冒充尚未实例化的计划。
    en: "This module owns Execution (a tool-agnostic logical execution episode), RunAttempt (immutable, lineaged concrete attempts within one Execution with terminal state recorded on RunAttempt), RetryActivity (in-Execution activity implementing a selected retry and creating a successor RunAttempt), and RuntimeBudget (prospective budget specification constraining Execution and RunAttempt). Concrete Invocation, ToolResult, TraceSpan, and EvaluationRun belong to tool, observability, and feedback modules. TaskPlan and RoutingDecision belong to orchestration; this module records actual Executions and RunAttempts only and does not impersonate uninstantiated plans."
    ja: 本モジュールは Execution、RunAttempt（同一 Execution 内の immutable 試行、terminal state は RunAttempt 自体に記録）、RetryActivity、RuntimeBudget を所有します。Invocation・ToolResult・TraceSpan・EvaluationRun は各モジュールが所有します。TaskPlan・RoutingDecision は orchestration に属し、本モジュールは実際の Execution/RunAttempt のみ記録し未具体化 plan になりすましません。
  why_needed:
    zh: 没有这一模块，团队无法区分“计划可启动”与“尝试已开始”，也无法在重试或恢复后保留不可变尝试谱系，容易覆盖第一次失败记录并破坏审计与回放。
    en: Without this module, teams cannot distinguish a plan ready to start from an attempt that actually started, and retries or restores cannot preserve immutable attempt lineage without overwriting first-failure evidence.
    ja: このモジュールがなければ plan 開始可能と attempt 開始済みを区別できず、retry/restore 後も immutable attempt lineage を初回 failure 証拠を上書きせず保持できません。
  includes:
    - zh: Execution 及其 RunAttempt 组成，含 succeeded、failed、canceled 等终态与 attempt 编号谱系。
      en: Execution and its RunAttempt components, including terminal states such as succeeded, failed, and canceled and attempt numbering lineage.
      ja: Execution と RunAttempt 構成、succeeded/failed/canceled 等 terminal state と attempt 番号 lineage。
    - zh: RetryActivity 落实编排域已选 retry 并创建身份不同的后继 RunAttempt。
      en: RetryActivity implementing an orchestration-selected retry and creating a successor RunAttempt with distinct identity.
      ja: orchestration 選択 retry を実装し distinct identity の successor RunAttempt を作る RetryActivity。
    - zh: RuntimeBudget 对 Execution 与 RunAttempt 的前瞻约束（token、时间、成本上限等）。
      en: Prospective RuntimeBudget constraints on Execution and RunAttempt (token, time, cost caps, etc.).
      ja: Execution/RunAttempt への prospective RuntimeBudget 制約（token・時間・コスト上限等）。
  excludes:
    - zh: "TaskPlan、RoutingDecision、RetryPolicy 资格判定（owner: orchestration-plane）；本模块只记录实际 retry 活动与尝试结果。"
      en: "TaskPlan, RoutingDecision, and RetryPolicy eligibility (owner: orchestration-plane); this module records actual retry activities and attempt outcomes only."
      ja: "TaskPlan・RoutingDecision・RetryPolicy 資格判定（owner: orchestration-plane）。本モジュールは実 retry activity と attempt outcome のみ記録。"
    - zh: "Invocation、Command、ToolResult、ExecutionResult（owner: tool-plane）；本模块保留跨工具通用 RunAttempt 语义。"
      en: "Invocation, Command, ToolResult, ExecutionResult (owner: tool-plane); this module retains tool-agnostic RunAttempt semantics."
      ja: "Invocation・Command・ToolResult・ExecutionResult（owner: tool-plane）。本モジュールは tool-agnostic RunAttempt 意味を保持。"
    - zh: "TraceSpan、Checkpoint、EvaluationRun（owner: runtime-observability、feedback-plane）；本模块可引用但不拥有观测与评估语义。"
      en: "TraceSpan, Checkpoint, EvaluationRun (owner: runtime-observability, feedback-plane); this module may reference but does not own observation or evaluation semantics."
      ja: "TraceSpan・Checkpoint・EvaluationRun（owner: runtime-observability・feedback-plane）。本モジュールは参照のみで観測・評価意味は所有しません。"
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI Responses API 运行生命周期（response.created→in_progress→completed/failed/cancelled 及 stream 事件）、LangGraph Server POST /threads/{thread_id}/runs（run_id、status=pending/running/success/error/interrupted、checkpoint 恢复创建新 attempt）、Anthropic Messages API 创建与流式状态（message_start→content_block_delta→message_stop，stop_reason 映射终态），以及各厂商 SSE/WebSocket streaming state。静态 runner 配置属于其他域；response.created、run status 迁移与 message_start 触发的 Execution/RunAttempt occurrence 才属于本模块。
    en: "Integrations should map OpenAI Responses API run lifecycle (response.created→in_progress→completed/failed/cancelled and stream events), LangGraph Server POST /threads/{thread_id}/runs (run_id, status=pending/running/success/error/interrupted, checkpoint restore creating new attempts), Anthropic Messages API creation and streaming states (message_start→content_block_delta→message_stop with stop_reason mapping to terminal state), and vendor SSE/WebSocket streaming states separately. Static runner configuration belongs elsewhere; Execution/RunAttempt occurrences triggered by response.created, run status transitions, and message_start belong here."
    ja: 統合では OpenAI Responses API lifecycle、LangGraph POST /threads/{thread_id}/runs、Anthropic Messages 作成・ストリーム状態、各ベンダー SSE/WebSocket streaming state を個別に写像します。静的 runner 設定は他ドメイン、response.created・run status 遷移・message_start で触発される Execution/RunAttempt occurrence が本モジュールです。
  typical_input:
    - description: OpenAI Responses API — create response and stream lifecycle events.
      format: |
        POST https://api.openai.com/v1/responses
        {"model": "gpt-4.1", "input": "Summarize logs", "stream": true}
        =>
        event: response.created
        data: {"type":"response.created","response":{"id":"resp_abc","status":"in_progress"}}

        event: response.completed
        data: {"type":"response.completed","response":{"id":"resp_abc","status":"completed"}}
      source_claims: [claim-runtime-execution-openai-responses]
    - description: LangGraph Server — create persisted run on thread.
      format: |
        POST https://langgraph.example.com/threads/thread-42/runs
        {
          "assistant_id": "support-agent",
          "input": {"messages": [{"role": "user", "content": "Reset password"}]},
          "stream_mode": ["values"]
        }
        =>
        {"run_id": "run-884", "thread_id": "thread-42", "status": "pending"}
      source_claims: [claim-runtime-execution-langgraph-run]
    - description: Anthropic Messages API — create message with streaming states.
      format: |
        POST https://api.anthropic.com/v1/messages
        {"model":"claude-sonnet-4-20250514","max_tokens":1024,"stream":true,"messages":[...]}

        event: message_start
        data: {"type":"message_start","message":{"id":"msg_01XYZ","role":"assistant"}}

        event: message_stop
        data: {"type":"message_stop"}
      source_claims: [claim-runtime-execution-anthropic-messages]
    - description: LangGraph run status transition after network interruption and restore.
      format: |
        GET https://langgraph.example.com/threads/thread-42/runs/run-884
        {"run_id":"run-884","status":"interrupted","checkpoint_id":"ckpt-330-1"}

        POST https://langgraph.example.com/threads/thread-42/runs
        {"assistant_id":"support-agent","checkpoint_id":"ckpt-330-1"}
        =>
        {"run_id":"run-885","status":"pending"}
      source_claims: [claim-runtime-execution-langgraph-run]
  typical_output:
    - description: Moonweave-local execution projection linking Execution, RunAttempt lineage, budget, and terminal state without collapsing stream fragments into plan state.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "execution_id": "execution-openai-abc",
          "run_attempt_id": "attempt-1",
          "attempt_number": 1,
          "terminal_state": "succeeded",
          "runtime_budget_ref": "budget-session-330",
          "prior_attempt_ref": null
        }
      source_claims: [claim-runtime-execution-design]
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Response lifecycle and streaming states from created through completed.
    - name: LangGraph Server API
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
      description: POST /threads/{thread_id}/runs, run status, checkpoint resume.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Message creation and streaming event sequence with stop_reason.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 执行尝试模块的稳定标识，不是某个 Execution 或 RunAttempt 的标识。
        en: Stable identifier of the execution-attempts module, not an Execution or RunAttempt identifier.
        ja: execution-attempts モジュールの安定識別子であり、Execution や RunAttempt の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^runtime-execution-attempts$'
      example_value: runtime-execution-attempts
      allowed_values: []
      source_claims: [claim-runtime-execution-design]
    - id: execution_ref
      labels: {zh: 执行引用, en: Execution reference, ja: 実行参照}
      definitions:
        zh: 标识一次有边界逻辑执行 episode 的稳定引用，通常对应 OpenAI response id、LangGraph run_id 或 Anthropic message id 会话边界。
        en: Stable reference identifying one bounded logical execution episode, typically an OpenAI response id, LangGraph run_id, or Anthropic message session boundary.
        ja: OpenAI response id、LangGraph run_id、Anthropic message 境界等、境界付け logical execution episode を識別する安定参照。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: execution-openai-abc
      allowed_values: []
      source_claims: [claim-runtime-execution-openai-responses, claim-runtime-execution-langgraph-run]
    - id: run_attempt_ref
      labels: {zh: 运行尝试引用, en: Run attempt reference, ja: 実行試行参照}
      definitions:
        zh: 在同一 Execution 内标识一次具体尝试；重试、恢复或人工介入必须创建新 attempt 而非覆盖旧记录。
        en: Identifies one concrete attempt within the same Execution; retry, restore, or human intervention must create a new attempt rather than overwrite prior records.
        ja: 同一 Execution 内の一回の具体試行。retry・restore・human intervention は上書きせず新 attempt を作成します。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: attempt-2
      allowed_values: []
      source_claims: [claim-runtime-execution-design]
    - id: terminal_state
      labels: {zh: 终态, en: Terminal state, ja: 終端状態}
      definitions:
        zh: RunAttempt 进入的终态，例如 succeeded、failed、canceled；必须记录在 RunAttempt 上而非 TaskPlan 上。
        en: Terminal state entered by a RunAttempt, such as succeeded, failed, or canceled; must be recorded on RunAttempt, not TaskPlan.
        ja: RunAttempt が入る succeeded/failed/canceled 等 terminal state。TaskPlan ではなく RunAttempt に記録します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: succeeded
      allowed_values: [succeeded, failed, canceled, in_progress, pending]
      source_claims: [claim-runtime-execution-openai-responses, claim-runtime-execution-langgraph-run]
    - id: stream_event_type
      labels: {zh: 流式事件类型, en: Stream event type, ja: ストリームイベント種別}
      definitions:
        zh: 厂商 SSE 流中的事件类型，例如 response.created、message_start、content_block_delta；须绑定 execution_ref 或 run_attempt_ref。
        en: Vendor SSE stream event type such as response.created, message_start, or content_block_delta; must bind to execution_ref or run_attempt_ref.
        ja: response.created、message_start、content_block_delta 等ベンダー SSE イベント型。execution_ref または run_attempt_ref に束縛必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: response.output_item.added
      allowed_values: []
      source_claims: [claim-runtime-execution-openai-responses, claim-runtime-execution-anthropic-messages]
  constraints:
    - id: execution-requires-occurrence-not-plan
      severity: error
      expression_language: plain
      expression: A TaskPlan or RoutingDecision must not be asserted as an Execution or RunAttempt without a separate runtime occurrence record and observable start evidence such as response.created or run status pending.
      explanation:
        zh: 计划批准不能证明尝试已经开始。
        en: Plan approval does not prove an attempt has started.
        ja: plan 承認は attempt 開始を証明しません。
      source_claims: [claim-runtime-execution-design]
    - id: retry-creates-new-attempt
      severity: error
      expression_language: plain
      expression: A retry or restore after pause must create a new run_attempt_ref and link it to the prior attempt through explicit lineage rather than overwriting the first attempt record.
      explanation:
        zh: 覆盖第一次尝试会破坏审计与回放。
        en: Overwriting the first attempt breaks audit and replay.
        ja: 初回 attempt 上書きは監査/再生を壊します。
      source_claims: [claim-runtime-execution-langgraph-run, claim-runtime-execution-design]
    - id: stream-events-bind-to-execution
      severity: warning
      expression_language: plain
      expression: Streaming events such as response.created or message_start must resolve to an execution_ref or run_attempt_ref; orphan stream fragments must not be promoted to completed outcomes.
      explanation:
        zh: 没有 execution 绑定的流式片段不能当作最终结果。
        en: Stream fragments without an execution binding must not be promoted to completed outcomes.
        ja: execution 束縛のないストリーム断片を完了結果に昇格させてはなりません。
      source_claims: [claim-runtime-execution-openai-responses, claim-runtime-execution-anthropic-messages]
  required_relations:
    - id: execution-attempts-organizes-execution
      direction: outgoing
      predicate: organizes
      target_concept_id: Execution
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条 Execution 及其 RunAttempt part_of 链。
        en: The module organizes at least one Execution and its RunAttempt part_of chain.
        ja: モジュールは少なくとも一つの Execution と RunAttempt part_of 連鎖を組織します。
      source_claims: [claim-runtime-execution-design]
examples:
  - id: runtime-execution-attempts-example-openai-responses-lifecycle
    labels:
      zh: OpenAI Responses 运行生命周期
      en: OpenAI Responses run lifecycle
      ja: OpenAI Responses 実行ライフサイクル
    descriptions:
      zh: 客户端 stream=true 调用 POST /v1/responses；SSE 依次收到 response.created（resp_abc, in_progress）、response.output_item.added 与 response.completed（status=completed）。系统将 resp_abc 映射为 execution_ref=execution-openai-abc，RunAttempt attempt-1 终态 succeeded；中间 SSE 事件绑定 attempt-1 而不丢失顺序。
      en: The client calls POST /v1/responses with stream=true; SSE delivers response.created (resp_abc, in_progress), response.output_item.added, and response.completed (status=completed). The system maps resp_abc to execution_ref=execution-openai-abc, marks RunAttempt attempt-1 terminal state succeeded, and binds intermediate SSE events to attempt-1 without losing order.
      ja: クライアントが stream=true で POST /v1/responses を呼び、SSE で response.created（resp_abc, in_progress）、response.output_item.added、response.completed（status=completed）を受信。resp_abc を execution_ref=execution-openai-abc に写像し RunAttempt attempt-1 を succeeded とし、中間 SSE イベントを attempt-1 に束縛して順序を保持します。
    example_source:
      product: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses-streaming
    field_values:
      api_endpoint: POST /v1/responses
      response_id: resp_abc
      stream: true
      sse_events:
        - response.created
        - response.output_item.added
        - response.completed
      execution_ref: execution-openai-abc
      run_attempt_ref: attempt-1
      terminal_state: succeeded
    related_node_ids:
      - Execution
      - RunAttempt
    related_relation_ids:
      - RunAttempt-part_of-Execution
    source_claims:
      - claim-runtime-execution-openai-responses
      - claim-runtime-execution-design
  - id: runtime-execution-attempts-example-langgraph-thread-run
    labels:
      zh: LangGraph thread run 与 checkpoint 恢复
      en: LangGraph thread run and checkpoint restore
      ja: LangGraph thread run と checkpoint 復元
    descriptions:
      zh: POST /threads/thread-42/runs 返回 run_id=run-884、status=pending；网络中断后 status=interrupted、checkpoint_id=ckpt-330-1。从 checkpoint 创建 run-885 产生 attempt-2，attempt-1 保留为 failed/interrupted 不可变证据，RetryActivity retry-330 链接 attempt-1 与 attempt-2。
      en: POST /threads/thread-42/runs returns run_id=run-884, status=pending; after network interruption status=interrupted with checkpoint_id=ckpt-330-1. Restoring from checkpoint creates run-885 as attempt-2 while attempt-1 remains immutable failed/interrupted evidence; RetryActivity retry-330 links attempt-1 and attempt-2.
      ja: POST /threads/thread-42/runs が run_id=run-884, status=pending を返し、network interruption 後 status=interrupted, checkpoint_id=ckpt-330-1。checkpoint から run-885 を作成して attempt-2 を生成し attempt-1 は immutable failed/interrupted 証拠として保持。RetryActivity retry-330 が attempt-1 と attempt-2 をリンクします。
    example_source:
      product: LangGraph Server
      url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
    field_values:
      thread_id: thread-42
      run_id: run-884
      assistant_id: support-agent
      checkpoint_id: ckpt-330-1
      run_attempt_refs:
        - attempt-1
        - attempt-2
      retry_activity_id: retry-330
      attempt_1_terminal_state: interrupted
      attempt_2_terminal_state: succeeded
    related_node_ids:
      - Execution
      - RunAttempt
      - RetryActivity
    related_relation_ids:
      - RunAttempt-part_of-Execution
      - RetryActivity-creates-RunAttempt
      - RetryActivity-responds_to-RunAttempt
    source_claims:
      - claim-runtime-execution-langgraph-run
      - claim-runtime-execution-design
  - id: runtime-execution-attempts-example-anthropic-message-streaming
    labels:
      zh: Anthropic Messages 流式创建
      en: Anthropic Messages streaming creation
      ja: Anthropic Messages ストリーミング作成
    descriptions:
      zh: POST /v1/messages stream=true 产生 message_start（msg_01XYZ）、content_block_start、content_block_delta 与 message_stop。execution_ref=execution-anthropic-xyz 绑定 msg_01XYZ，RunAttempt attempt-1 在 message_stop 后标记 succeeded；stop_reason=end_turn 写入终态证据。
      en: POST /v1/messages with stream=true emits message_start (msg_01XYZ), content_block_start, content_block_delta, and message_stop. execution_ref=execution-anthropic-xyz binds msg_01XYZ; RunAttempt attempt-1 marks succeeded after message_stop with stop_reason=end_turn as terminal evidence.
      ja: POST /v1/messages stream=true が message_start（msg_01XYZ）、content_block_start、content_block_delta、message_stop を送出。execution_ref=execution-anthropic-xyz が msg_01XYZ を束縛し RunAttempt attempt-1 は message_stop 後 succeeded、stop_reason=end_turn を terminal 証拠として記録します。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages-streaming
    field_values:
      api_endpoint: POST /v1/messages
      message_id: msg_01XYZ
      model: claude-sonnet-4-20250514
      stream_events:
        - message_start
        - content_block_start
        - content_block_delta
        - message_stop
      execution_ref: execution-anthropic-xyz
      run_attempt_ref: attempt-1
      stop_reason: end_turn
      terminal_state: succeeded
    related_node_ids:
      - Execution
      - RunAttempt
    related_relation_ids:
      - RunAttempt-part_of-Execution
    source_claims:
      - claim-runtime-execution-anthropic-messages
      - claim-runtime-execution-design
  - id: runtime-execution-attempts-example-retry-lineage
    labels:
      zh: 失败后重试尝试谱系
      en: Retry attempt lineage after failure
      ja: 失敗後 retry attempt lineage
    descriptions:
      zh: Execution execution-build-42 包含 failed 的 attempt-1、RetryActivity retry-build-42（落实 orchestration 选定的 retry）与 succeeded 的 attempt-2。RuntimeBudget budget-build-42 约束两次 attempt 的 token 上限；ToolResult 等具体证据归工具模块，RunAttempt 只保留终态。
      en: Execution execution-build-42 contains failed attempt-1, RetryActivity retry-build-42 implementing an orchestration-selected retry, and succeeded attempt-2. RuntimeBudget budget-build-42 constrains token caps across both attempts; ToolResult and other concrete evidence remain in tool modules while RunAttempt retains terminal state only.
      ja: Execution execution-build-42 は failed attempt-1、orchestration 選択 retry を実装する RetryActivity retry-build-42、succeeded attempt-2 を含みます。RuntimeBudget budget-build-42 が両 attempt の token 上限を制約し、ToolResult 等は tool モジュール、RunAttempt は terminal state のみ保持します。
    example_source:
      product: Moonweave execution-attempts boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      execution_id: execution-build-42
      run_attempt_refs:
        - attempt-1
        - attempt-2
      attempt_1_terminal_state: failed
      attempt_2_terminal_state: succeeded
      retry_activity_id: retry-build-42
      runtime_budget_ref: budget-build-42
    related_node_ids:
      - Execution
      - RunAttempt
      - RetryActivity
      - RuntimeBudget
    related_relation_ids:
      - RunAttempt-part_of-Execution
      - RetryActivity-part_of-Execution
      - RetryActivity-creates-RunAttempt
      - RuntimeBudget-constrains-Execution
    source_claims:
      - claim-runtime-execution-design
  - id: runtime-execution-attempts-example-unexecuted-plan
    labels:
      zh: 未实例化计划不是 Execution
      en: Uninstantiated plan is not an Execution
      ja: 未具体化 plan は Execution ではない
    descriptions:
      zh: plan-audit-18@2 已 ready 但尚未 POST /threads/.../runs 或 POST /v1/responses；无 Execution、RunAttempt 或 response.created 证据。治理批准只表示计划可启动，不得写入 execution_ref 或 run_attempt_ref。
      en: plan-audit-18@2 is ready but no POST /threads/.../runs or POST /v1/responses has fired; no Execution, RunAttempt, or response.created evidence exists. Governance approval only means the plan may start and must not be written as execution_ref or run_attempt_ref.
