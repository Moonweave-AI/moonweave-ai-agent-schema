          decision_note: {zh: 宸查€愬叧绯绘牳瀵硅緭鍏ャ€佽緭鍑恒€佸け璐ヤ笌鎭㈠杈圭晫锛屾湭鎶婃潵婧愭垨妗嗘灦瀵硅薄绾冲叆姒傚康鏃忋€? en: Manually checked input, output, failure, and recovery boundaries relation by relation without admitting sources or framework objects as concepts., ja: input/output/failure/recovery 澧冪晫銈?relation 鍗樹綅銇х⒑瑾嶃仐 source/framework object 銈?concept 銇惈銈併伨銇涖倱銆倉
  taxonomy_contract:
