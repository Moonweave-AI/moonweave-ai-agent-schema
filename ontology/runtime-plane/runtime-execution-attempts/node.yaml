          confidence: high
          review_status: accepted
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: codex-manual-ontology-review
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note: {zh: 宸叉牳瀵?RoutingDecision 褰撳墠瀹氫箟涓?applies RetryPolicy 鍏崇郴锛岄伩鍏嶄袱涓ā鍧楅噸澶嶁€滃喅瀹氭槸鍚﹂噸璇曗€濄€? en: Checked the current RoutingDecision definition and applies-RetryPolicy relation so both modules do not duplicate retry choice., ja: RoutingDecision definition 銇?applies-RetryPolicy relation 銈掔⒑瑾嶃仐 retry choice 銇噸瑜囥倰闄ゃ亶銇俱仐銇熴€倉
