    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: Response lifecycle and streaming events for Execution and RunAttempt.
  - id: src-langgraph-runs
    title: LangGraph Server API Reference
    url: https://langchain-ai.github.io/langgraph/cloud/reference/api/api_ref/
    source_type: official-doc
    relevance: POST /threads/{thread_id}/runs, checkpoint resume, attempt lineage.
  - id: src-anthropic-messages
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: message_start through message_stop streaming for RunAttempt terminal evidence.
  - id: src-runtime-execution-design
