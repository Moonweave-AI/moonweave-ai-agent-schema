schema: moonweave.ai/ontology-node/v1
id: RetryActivity
kind: concept
status: accepted
labels: {zh: 重试活动, en: Retry activity, ja: 再試行 Activity}
semantics:
  short_definition: {zh: 在重试条件成立时评估尝试结果并启动后续尝试的控制 Activity。, en: A control Activity that evaluates an attempt outcome and initiates a later attempt when retry conditions hold., ja: 再試行条件が満たされるときに試行結果を評価し、後続試行を開始する制御 Activity。}
  definition: {zh: RetryActivity 是 Execution 内有时间边界的决定或控制发生。它消费失败或可重试 RunAttempt 的证据，应用重试策略和预算约束，并可以创建后续 RunAttempt。它不是失败尝试、新尝试或静态重试策略 Entity。, en: "A RetryActivity is a time-bounded decision or control occurrence inside an Execution. It consumes evidence from a failed or retryable RunAttempt, applies retry policy and budget constraints, and may create a later RunAttempt. It is not the failed attempt, the new attempt, or a static retry policy Entity.", ja: RetryActivity は Execution 内の時間境界を持つ判断または制御の発生である。失敗または再試行可能な RunAttempt の証拠を消費し、再試行ポリシーと予算制約を適用して、後続 RunAttempt を作成し得る。失敗試行、新規試行、静的な再試行ポリシー Entity ではない。}
  why_needed: {zh: 将决定实体化可以区分有意恢复行为和意外重复工作，并使退避、策略、耗尽和人工干预可审计。, en: "Reifying the decision distinguishes intentional recovery behavior from accidental duplicate work and makes backoff, policy, exhaustion, and human intervention auditable.", ja: 判断を実体化することで、意図的な復旧動作と偶発的な重複作業を区別し、バックオフ、ポリシー、枯渇、人間介入を監査可能にする。}
  includes:
    - {zh: 重试资格评估、退避调度、预算检查、重试决定以及后续尝试的创建。, en: "Retry eligibility evaluation, backoff scheduling, budget checks, retry decision, and creation of a subsequent attempt.", ja: 再試行適格性評価、バックオフスケジューリング、予算チェック、再試行判断、後続試行の作成。}
    - {zh: 指向源尝试、产生的尝试、适用策略和决定原因的链接。, en: "Links to the source attempt, produced attempt, applicable policy, and decision reason.", ja: ソース試行、生成試行、適用ポリシー、判断理由へのリンク。}
  excludes:
    - {zh: 一个失败 RunAttempt、一个成功替代 RunAttempt 或 RetryPolicy 配置。, en: "A failed RunAttempt, a successful replacement RunAttempt, or a RetryPolicy configuration.", ja: 失敗した RunAttempt、成功した代替 RunAttempt、RetryPolicy 構成。}
    - {zh: 一个从检查点恢复而不重试同一工作的通用状态恢复活动。, en: A generic state restoration activity that resumes from a checkpoint without retrying the same work., ja: 同じ作業を再試行せずにチェックポイントから再開する一般的な状態復元 Activity。}
  semantic_kind: activity
  aliases: [retry decision, retry controller action]
engineering:
  explanation: {zh: 一次尝试结束后，控制器检查结果分类、重试次数、退避、预算和取消状态。它记录 retry_activity_id 和决定，必要时等待，然后创建新的尝试记录或记录耗尽。, en: "After an attempt ends, the controller checks outcome classification, retry count, backoff, budget, and cancellation state. It records retry_activity_id and decision, waits if necessary, then creates a fresh attempt record or records exhaustion.", ja: 試行終了後、コントローラーは結果分類、再試行回数、バックオフ、予算、取消状態を確認する。retry_activity_id と判断を記録し、必要なら待機して、新しい試行記録を作成するか枯渇を記録する。}
  typical_input:
    - description: {zh: 重试决定输入, en: Retry decision input, ja: 再試行判断入力}
      format: |-
        {"retry_activity_id":"retry-4","failed_attempt_id":"attempt-1","error_kind":"timeout","attempt_number":1,"max_attempts":3,"backoff_ms":500}
  typical_output:
    - description: {zh: 重试决定输出, en: Retry decision output, ja: 再試行判断出力}
      format: |-
        {"retry_activity_id":"retry-4","decision":"retry","next_attempt_id":"attempt-2","scheduled_at":"2026-07-18T09:01:00Z"}
  reference_implementations:
    - {name: LangGraph fault tolerance, url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance, description: "Retry policies, backoff, and recovery behavior."}
structure:
  identity_keys: [retry_activity_id]
  fields:
    - id: retry_activity_id
      labels: {zh: 重试活动 ID, en: Retry activity ID, ja: 再試行 Activity ID}
      definitions: {zh: 一次重试决定发生的稳定标识符。, en: Stable identifier for one retry decision occurrence., ja: 1つの再試行判断発生に対する安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: retry-4
      source_claims: [claim-retry-activity]
    - id: decision
      labels: {zh: 重试决定, en: Retry decision, ja: 再試行判断}
      definitions: {zh: 评估是否应创建后续尝试的结果。, en: Result of evaluating whether a later attempt should be created., ja: 後続試行を作成すべきかを評価した結果。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [retry, stop, escalate]
      example_value: retry
      source_claims: [claim-retry-activity]
    - id: backoff_ms
      labels: {zh: 退避毫秒数, en: Backoff milliseconds, ja: バックオフミリ秒}
      definitions: {zh: 当决定为重试时，下次尝试前的计划等待时间。, en: Scheduled wait before the next attempt when decision is retry., ja: 判断が retry のとき、次の試行前に予定される待機時間。}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 500
      source_claims: [claim-retry-activity]
  constraints:
    - id: retry-activity-source-outcome
      severity: error
      language: plain
      expression: A retry decision of retry requires a source attempt with a retryable terminal outcome and remaining budget.
      explanation: {zh: 控制器不得从一个活跃或成功的尝试创建重复尝试。, en: A controller must not create duplicate attempts from an active or successful attempt., ja: コントローラーはアクティブまたは成功した試行から重複試行を作成してはならない。}
      source_claims: [claim-retry-activity]
  required_relations: [RetryActivity-part_of-Execution, RetryActivity-responds_to-RunAttempt]
examples:
  - id: retry-activity-positive
    labels: {zh: "OpenAI submit_tool_outputs 重试", en: "OpenAI submit_tool_outputs retry", ja: "OpenAI submit_tool_outputs 再試行"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RetryActivity maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RetryActivity maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RetryActivity provenance graph."}
    field_values: {retry_activity_id: retry-4, decision: retry, backoff_ms: 500}
    related_node_ids: [RetryActivity, RunAttempt, RuntimeBudget]
    related_relation_ids: [RetryActivity-responds_to-RunAttempt, RetryActivity-creates-RunAttempt]
    source_claims: [claim-retry-activity]
  - id: retry-activity-counterexample
    labels: {zh: "LangGraph RetryPolicy 内部循环", en: "LangGraph RetryPolicy internal loop", ja: "LangGraph RetryPolicy 内部ループ"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style RetryActivity.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style RetryActivity.", ja: "Gateway bypass rejects Helicone-style RetryActivity."}
    field_values: {retry_activity_id: retry-4, decision: retry}
    related_node_ids: [RunAttempt]
    related_relation_ids: []
    source_claims: [claim-retry-activity]
  - id: retry-activity-boundary
    labels: {zh: "Temporal signal 与 RetryActivity 边界", en: "Temporal signal versus RetryActivity", ja: "Temporal signal と RetryActivity 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RetryActivity preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RetryActivity preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {retry_activity_id: retry-4}
    related_node_ids: [RetryActivity, RestoreActivity]
    related_relation_ids: []
    source_claims: [claim-retry-activity]
  - id: retry-activity-instance-retry-4
    labels: {zh: "CrewAI kickoff 失败后重跑", en: "CrewAI kickoff retry after failure", ja: "CrewAI kickoff 失敗後再実行"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->RetryActivity.", en: "LangSmith instance: run_id parent_run_id run_type=llm->RetryActivity.", ja: "LangSmith instance maps to RetryActivity."}
    field_values: {retry_activity_id: retry-4, decision: retry, backoff_ms: 500}
    related_node_ids: [RetryActivity, RunAttempt, RuntimeBudget, Execution]
    related_relation_ids: [RetryActivity-responds_to-RunAttempt, RetryActivity-creates-RunAttempt]
    source_claims: [claim-retry-activity]
parent_relation:
  id: RetryActivity-part_of-Execution
  predicate: part_of
  target: concept:Execution
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是执行内的重试控制活动, en: is a retry control activity within execution, ja: 実行内の再試行制御 Activity である}
  definitions: {zh: 每个 RetryActivity 都是一个 Execution 的组合控制 Activity。, en: Every RetryActivity is a compositional control Activity of one Execution., ja: すべての RetryActivity は1つの Execution のコンポジション制御 Activity である。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_retry_activity, labels: {zh: 具有重试活动, en: has retry activity, ja: 再試行 Activity を持つ}}
  conditions:
    - id: retry-activity-parent-condition
      severity: error
      expression: RetryActivity execution_id must match its parent Execution identifier.
      explanations: {zh: 重试控制不能静默跨越逻辑执行边界。, en: Retry control cannot silently cross a logical execution boundary., ja: 再試行制御は論理 Execution 境界を黙って越えてはならない。}
      source_claims: [claim-retry-activity]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-retry-activity]
relations:
  - id: RetryActivity-responds_to-RunAttempt
    predicate: responds_to
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 响应运行尝试, en: responds to run attempt, ja: 実行試行に応答する}
    definitions: {zh: 当 RetryActivity 的决定评估该尝试的终止结果或失败证据时，它响应 RunAttempt。, en: RetryActivity responds to RunAttempt when its decision evaluates that attempt's terminal outcome or failure evidence., ja: RetryActivity の判断がその試行の終端結果または失敗証拠を評価するとき、RunAttempt に応答する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: has_retry_response, labels: {zh: 具有重试响应, en: has retry response, ja: 再試行応答を持つ}}
    conditions:
      - id: retry-responds-to-condition
        severity: error
        expression: Target attempt must have ended before the retry decision and share execution_id.
        explanations: {zh: 重试不能响应一个活跃或无关的尝试。, en: A retry cannot respond to an active or unrelated attempt., ja: 再試行はアクティブまたは無関係な試行に応答できない。}
        source_claims: [claim-retry-activity]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-retry-activity]
    target: concept:RunAttempt
  - id: RetryActivity-creates-RunAttempt
    predicate: creates
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 创建后续运行尝试, en: creates subsequent run attempt, ja: 後続実行試行を作成する}
    definitions: {zh: 当重试决定在同一执行中调度并开始一次新尝试时，RetryActivity 创建 RunAttempt。, en: RetryActivity creates RunAttempt when a retry decision schedules and starts a new attempt in the same execution., ja: 再試行判断が同じ実行内で新しい試行をスケジュールして開始するとき、RetryActivity は RunAttempt を作成する。}
    cardinality: {source: {min: 0, max: 1}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_created_by_retry, labels: {zh: 由重试活动创建, en: is created by retry activity, ja: 再試行 Activity により作成される}}
    conditions:
      - id: retry-creates-attempt-condition
        severity: error
        expression: Assert only if decision is retry and target attempt starts after the retry activity with the next ordinal.
        explanations: {zh: 停止或升级决定不能创建重试尝试。, en: A stop or escalate decision cannot create a retry attempt., ja: stop または escalate の判断は再試行を作成できない。}
        source_claims: [claim-retry-activity]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-retry-activity]
    target: concept:RunAttempt
sources:
  - id: langgraph-fault-tolerance
    title: LangGraph fault tolerance
    url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance
    source_type: official-doc
    relevance: Documents retries, backoff, and fault-tolerance controls for graph execution.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports modeling the decision and created work as separate time-bounded Activities.
source_claims:
  - id: claim-retry-activity
    source: langgraph-fault-tolerance
    supports: LangGraph documents retry policies and retry behavior; this ontology reifies the observed retry control decision as a distinct activity for auditability.
    locator: Fault tolerance and retry policy sections
    evidence_kind: official-doc
    confidence: medium

