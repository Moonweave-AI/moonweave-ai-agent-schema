schema: moonweave.ai/ontology-node/v1
id: Execution
kind: concept
status: accepted
labels:
  zh: 执行
  en: Execution
  ja: 実行
semantics:
  short_definition:
    zh: 为完成一项已确定工作而发生的一次有边界运行。
    en: One bounded run that occurs to carry out identified work.
    ja: 特定された作業を遂行するために生じる一回の境界付き実行。
  definition:
    zh: >-
      Execution 是代理系统中可寻址的活动发生：它从某一生命周期状态开始，承接一个明确的
      Task 或 WorkItem，并在完成、失败、取消或拒绝时结束。它可以包含多个 RunAttempt，
      但不是 Task 规范、调用日志、结果记录或框架的 runner 对象。
    en: >-
      An Execution is an addressable activity occurrence in an agent system. It begins when work
      actually starts, carries an identified Task or WorkItem, and ends by completion, failure,
      cancellation, or rejection. It may contain several RunAttempts, but it is not the Task
      specification, a log entry, a result record, or a framework runner object.
    ja: >-
      Execution はエージェントシステム内の識別可能な activity occurrence です。明示された
      Task または WorkItem を担い、完了・失敗・取消・拒否で終了します。複数の RunAttempt
      を含み得ますが、Task 仕様、ログ、結果記録、framework runner object ではありません。
  why_needed:
    zh: 将一次逻辑运行与其内部尝试、工具调用、产物和终态记录分开，才能稳定追踪生命周期和责任。
    en: Separating a logical run from its attempts, tool calls, artifacts, and terminal records makes lifecycle and responsibility traceable.
    ja: 論理実行を試行・tool call・artifact・終端記録から分けることで、lifecycle と責任を追跡できます。
  includes:
    - zh: 已有稳定执行标识且工作确实开始的一次运行。
      en: A run whose work actually started and has a stable execution identity.
      ja: 作業が実際に開始し安定した execution identity を持つ実行。
  excludes:
    - zh: 尚未发生的 Task、WorkItem 或计划规范。
      en: A Task, WorkItem, or plan specification that has not occurred.
      ja: まだ発生していない Task・WorkItem・plan 仕様。
    - zh: 单次模型调用、命令执行或结果载荷；它们是内部活动或信息对象。
      en: A single model call, command execution, or result payload; those are contained activities or information objects.
      ja: 単一 model call・command execution・result payload。これらは内部 activity または information object です。
  semantic_kind: activity
  aliases: []
applicability: [core]
structure:
  identity_keys: [execution_id]
  fields:
    - id: execution_id
      labels:
        zh: 执行标识
        en: Execution ID
        ja: 実行ID
      definitions:
        zh: 在执行生命周期内保持不变的稳定标识。
        en: Stable identity that remains unchanged for the execution lifecycle.
        ja: execution lifecycle 全体で変化しない安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
      example_value: execution-build-42
      allowed_values: []
      source_claims: [claim-execution-activity, claim-execution-lifecycle]
    - id: lifecycle_state
      labels:
        zh: 生命周期状态
        en: Lifecycle state
        ja: ライフサイクル状態
      definitions:
        zh: 执行当前运行或终止状态；终态不可回到非终态。
        en: Current running or terminal state of the execution; a terminal state cannot return to a nonterminal state.
        ja: execution の現在の running/terminal state。終端から非終端へ戻りません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: running
      allowed_values:
        - id: execution-state-running
          value: running
          labels: {zh: 运行中, en: running, ja: 実行中}
          definitions: {zh: 正在开展工作。, en: Work is actively occurring., ja: 作業が進行中。}
          status: accepted
          source_claims: [claim-execution-lifecycle]
        - id: execution-state-interrupted
          value: interrupted
          labels: {zh: 中断待续, en: interrupted, ja: 中断中}
          definitions: {zh: 等待输入、授权或外部恢复条件，尚非终态。, en: Waiting for input, authorization, or another recovery condition; not terminal., ja: 入力・認可・回復条件待ちで、終端ではない。}
          status: accepted
          source_claims: [claim-execution-lifecycle]
        - id: execution-state-completed
          value: completed
          labels: {zh: 已完成, en: completed, ja: 完了}
          definitions: {zh: 逻辑工作已满足适用完成条件。, en: The logical work satisfied its applicable completion criteria., ja: logical work が適用 completion criteria を満たしました。}
          status: accepted
          source_claims: [claim-execution-lifecycle]
        - id: execution-state-failed
          value: failed
          labels: {zh: 已失败, en: failed, ja: 失敗}
          definitions: {zh: 执行结束且没有完成工作。, en: The execution ended without completing the work., ja: work を完了せず execution が終了。}
          status: accepted
          source_claims: [claim-execution-lifecycle]
        - id: execution-state-canceled
          value: canceled
          labels: {zh: 已取消, en: canceled, ja: 取消}
          definitions: {zh: 执行开始后被授权主体取消。, en: The execution was canceled by an authorized actor after it began., ja: 開始後に authorized actor が execution を取消。}
          status: accepted
          source_claims: [claim-execution-lifecycle]
      source_claims: [claim-execution-lifecycle]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions: {zh: 第一个运行活动实际开始的时间。, en: Time at which the first run activity actually began., ja: 最初の実行 activity が実際に開始した時刻。}
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-17T05:00:00Z'
      allowed_values: []
      source_claims: [claim-execution-activity]
    - id: ended_at
      labels: {zh: 结束时间, en: Ended at, ja: 終了時刻}
      definitions: {zh: 执行进入终态的时间。, en: Time at which the execution entered a terminal state., ja: execution が終端状態に入った時刻。}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '2026-07-17T05:03:00Z'
      allowed_values: []
      source_claims: [claim-execution-activity]
  constraints:
    - id: execution-time-order
      severity: error
      expression_language: plain
      expression: ended_at is absent or started_at is present and ended_at >= started_at
      explanations: {zh: 结束不能早于开始。, en: An execution cannot end before it starts., ja: execution は開始前に終了できません。}
      source_claims: [claim-execution-activity]
  required_relations: []
examples:
  - id: execution-example-build-42
    kind: positive
    labels: {zh: 一次构建执行, en: One build execution, ja: 一回の build execution}
    scenario_id: null
    descriptions:
      zh: execution-build-42 承接构建 WorkItem，内部第一次尝试失败，第二次尝试完成；执行标识始终不变。
      en: execution-build-42 carries a build WorkItem, contains a failed first attempt and a successful second attempt, and keeps one execution identity.
      ja: execution-build-42 は build WorkItem を担い、失敗した第一試行と成功した第二試行を含み、同一 identity を保ちます。
    field_values: {execution_id: execution-build-42, lifecycle_state: completed}
    related_node_ids: [Execution, RunAttempt, WorkItem]
    related_relation_ids: [Execution-carries_out-WorkItem, RunAttempt-part_of-Execution]
    expected_result: {zh: 两次尝试归属于同一执行。, en: Both attempts belong to one execution., ja: 二つの attempt が一つの execution に属します。}
    why_valid_or_invalid: {zh: 逻辑运行身份没有因重试而改变。, en: Retry did not replace the logical run identity., ja: retry によって論理実行 identity は置換されません。}
    synthetic: true
    source_claims: [claim-execution-runner-loop]
parent_relation: null
relations:
  - id: Execution-realizes-Task
    predicate: realizes
    target: concept:Task
    direction: source-to-target
    relation_kind: mapping
    labels: {zh: 实现任务, en: realizes task, ja: task を実現する}
    definitions:
      zh: 将一次执行发生连接到它试图满足的 Task 规范；Task 本身不是运行发生。
      en: Links an execution occurrence to the Task specification it attempts to satisfy; the Task is not the occurrence.
      ja: execution occurrence を満たそうとする Task 仕様へ結びます。Task 自体は occurrence ではありません。
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: realized_by
      labels: {zh: 由执行实现, en: realized by execution, ja: execution により実現される}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-execution-plan-separation]
    distinct_fact_rationale: {zh: 规范与发生具有不同身份。, en: Specification and occurrence have different identities., ja: 仕様と occurrence は異なる identity を持ちます。}
    layout_role: cross-link
    review_status: accepted
  - id: Execution-carries_out-WorkItem
    predicate: carries_out
    target: concept:WorkItem
    direction: source-to-target
    relation_kind: mapping
    labels: {zh: 承接工作项, en: carries out work item, ja: work item を遂行する}
    definitions: {zh: 指明本次执行实际接受的具体工作分配。, en: Identifies the concrete work allocation accepted by this execution., ja: この execution が受け入れた具体的 work allocation を示します。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: carried_out_by
      labels: {zh: 由执行承接, en: carried out by execution, ja: execution により遂行される}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-execution-plan-separation]
    distinct_fact_rationale: {zh: 工作分配与抽象任务规范可以不同。, en: A concrete allocation is distinct from an abstract Task specification., ja: 具体 allocation は抽象 Task 仕様と区別されます。}
    layout_role: cross-link
    review_status: accepted
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Activity、OpenAI Agents runner 与 LangGraph RetryPolicy 逐项核验，Execution/RunAttempt 语义成立。
    en: Verified against PROV-O Activity, OpenAI Agents runner, and LangGraph RetryPolicy. Execution and RunAttempt semantics hold.
    ja: PROV-O Activity、OpenAI Agents runner、LangGraph RetryPolicy に照らし Execution/RunAttempt semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-execution-activity
    source: eng-ont-prov-o
    supports: PROV-O defines an Activity as something that occurs over time and may use or generate entities, with explicit start and end times.
    locator: PROV-O > Activity, startedAtTime, endedAtTime
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-execution-runner-loop
    source: eng-fw-openai-python-docs
    supports: The Agents SDK Runner operates a loop across model output, handoffs, and tool calls until final output or a configured limit; Moonweave uses this only as evidence for a run scope wider than one call.
    locator: Running agents > The agent loop; Exceptions > MaxTurnsExceeded
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-lifecycle
    source: eng-proto-a2a-spec
    supports: A2A separates working and interrupted states from terminal completed, failed, canceled, and rejected states; Moonweave maps only states applicable after an Execution activity actually begins and leaves pre-start rejection on the Task side.
    locator: Definitions > Task; TaskState
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-execution-plan-separation
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an occurring Activity from an Entity or Plan associated with it; Moonweave applies that distinction to Execution, Task, and WorkItem.
    locator: PROV-O > Activity; Plan; Association
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

