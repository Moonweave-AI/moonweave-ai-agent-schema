schema: moonweave.ai/ontology-node/v1
id: Execution
kind: concept
status: accepted
labels: {zh: 执行, en: Execution, ja: 実行}
semantics:
  short_definition: {zh: 表示面向 Task 或 TaskStep 的实际智能体工作的、具有时间边界的 PROV-O Activity。, en: A time-bounded PROV-O Activity representing actual agent work toward a Task or TaskStep., ja: Task または TaskStep に向けた実際のエージェント作業を表す、時間境界を持つ PROV-O Activity。}
  definition: {zh: Execution 是一次可寻址的运行时工作发生，具有开始时间、终止或当前状态、负责参与者、输入和生成输出。它可以实现 A2A 风格的 Task 并执行一个或多个计划的 TaskStep，但它不是 Task 或 TaskStep 定义、单次模型调用、Runner 实现对象或追踪记录。, en: "An Execution is an addressable occurrence of runtime work with a start, a terminal or current state, responsible actors, inputs, and generated outputs. It may realize an A2A-style Task and perform one or more planned TaskSteps, but it is not the Task or TaskStep definition, a single model call, a Runner implementation object, or a trace record.", ja: Execution は、開始、終端または現在の状態、責任を持つアクター、入力、生成出力を持つ参照可能なランタイム作業の発生である。A2A 風 Task を実現し、計画された1つ以上の TaskStep を実行できるが、Task または TaskStep 定義、単一モデル呼び出し、Runner 実装オブジェクト、トレース記録ではない。}
  why_needed: {zh: 智能体工作的逻辑单元需要跨重试、中断、输出和遥测具有一个稳定标识，使工程师能询问实际发生了什么，而不会混淆计划工作和已执行工作。, en: "A logical unit of agent work needs one stable identity across retries, interruption, outputs, and telemetry so engineers can ask what actually happened without confusing planned work with performed work.", ja: エージェント作業の論理単位には、再試行、中断、出力、テレメトリーをまたぐ1つの安定したアイデンティティが必要である。これによりエンジニアは計画作業と実施作業を混同せずに実際の発生を問える。}
  includes:
    - {zh: 具有执行标识和时间边界的已开始、运行中、中断、完成、失败或取消的运行时工作。, en: "Started, running, interrupted, completed, failed, or cancelled runtime work with execution identity and time bounds.", ja: 実行アイデンティティと時間境界を持つ、開始済み、実行中、中断、完了、失敗、取消済みのランタイム作業。}
    - {zh: 与 Task 或 TaskStep、负责 Actor、尝试、生成工件和追踪证据的关联。, en: "Associations to a Task or TaskStep, responsible Actors, attempts, generated artifacts, and trace evidence.", ja: Task または TaskStep、責任を持つ Actor、試行、生成成果物、トレース証拠への関連。}
  excludes:
    - {zh: 仅描述预期工作且尚未开始的 Task 或 TaskStep。, en: A Task or TaskStep that only describes intended work and has not yet begun., ja: 意図された作業だけを記述し、まだ開始していない Task または TaskStep。}
    - {zh: 单次模型调用、工具调用、重试决定、Runner 类或 trace span。, en: "A single model invocation, tool call, retry decision, Runner class, or trace span.", ja: 単一のモデル呼び出し、ツール呼び出し、再試行判断、Runner クラス、trace span。}
  semantic_kind: activity
  aliases: [run, execution occurrence]
engineering:
  explanation: {zh: 启动智能体循环会分配 execution_id，并记录参与者、任务引用、输入引用、开始时间和预算。循环可以创建多个 RunAttempt；完成时追加一个终止结果和输出引用，而不会重写先前尝试证据。, en: "Starting an agent loop allocates execution_id and records the actor, task reference, input reference, start time, and budget. The loop can create multiple RunAttempts; completion appends one terminal outcome and output references without rewriting previous attempt evidence.", ja: エージェントループの開始は execution_id を割り当て、アクター、タスク参照、入力参照、開始時刻、予算を記録する。ループは複数の RunAttempt を作成でき、完了時には先行試行証拠を書き換えずに1つの終端結果と出力参照を追加する。}
  typical_input:
    - description: {zh: OpenAI Agents SDK 运行启动, en: OpenAI Agents SDK run initiation, ja: OpenAI Agents SDK 実行開始}
      format: |-
        {"execution_id":"exec-842","agent_actor_id":"agent-reviewer-2","task_id":"task-61","task_step_ids":["step-61-1"],"input":"review the patch","max_turns":8}
  typical_output:
    - description: {zh: 执行完成记录, en: Execution completion record, ja: 実行完了記録}
      format: |-
        {"execution_id":"exec-842","state":"completed","started_at":"2026-07-18T09:00:00Z","ended_at":"2026-07-18T09:01:12Z","attempt_ids":["attempt-1"],"output_refs":["report-22"]}
  reference_implementations:
    - {name: OpenAI Agents SDK running agents, url: https://openai.github.io/openai-agents-python/running_agents/, description: "Documents the agent loop, tool invocation, handoffs, and turn limits."}
    - {name: LangGraph persistence, url: https://docs.langchain.com/oss/python/langgraph/persistence, description: Documents stateful and durable agent execution.}
structure:
  identity_keys: [execution_id]
  fields:
    - id: execution_id
      labels: {zh: 执行 ID, en: Execution ID, ja: 実行 ID}
      definitions: {zh: 一次逻辑运行时工作发生的稳定标识符。, en: Stable identifier for one logical occurrence of runtime work., ja: ランタイム作業の1つの論理的発生に対する安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: exec-842
      source_claims: [claim-execution-activity]
    - id: state
      labels: {zh: 执行状态, en: Execution state, ja: 実行状態}
      definitions: {zh: 执行发生的当前生命周期状态。, en: Current lifecycle state of the execution occurrence., ja: 実行発生の現在のライフサイクル状態。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [queued, running, interrupted, completed, failed, cancelled]
      example_value: running
      source_claims: [claim-execution-activity]
    - id: started_at
      labels: {zh: 开始于, en: Started at, ja: 開始時刻}
      definitions: {zh: 运行时工作开始的事件时间。, en: Event time at which runtime work began., ja: ランタイム作業が開始したイベント時刻。}
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-07-18T09:00:00Z
      source_claims: [claim-execution-activity]
    - id: ended_at
      labels: {zh: 结束于, en: Ended at, ja: 終了時刻}
      definitions: {zh: 达到终止状态时的事件时间。, en: Event time at which a terminal state was reached., ja: 終端状態に達したイベント時刻。}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      example_value: 2026-07-18T09:01:12Z
      source_claims: [claim-execution-activity]
  constraints:
    - id: execution-time-order
      severity: error
      language: plain
      expression: ended_at must be absent for a non-terminal state and otherwise must not precede started_at.
      explanation: {zh: Activity 具有一致的时间边界；终止证据不能早于开始时间。, en: An Activity has coherent temporal boundaries; terminal evidence cannot predate start., ja: Activity には整合した時間境界があり、終端証拠は開始より前であってはならない。}
      source_claims: [claim-execution-activity]
    - id: execution-task-evidence
      severity: error
      language: plain
      expression: A realized Task or performed TaskStep reference must be explicit and must not be inferred from prompt text.
      explanation: {zh: 计划来源需要稳定对象引用，而不是自然语言相似性。, en: Plan provenance needs stable object references rather than natural-language resemblance., ja: 計画プロヴナンスには自然言語の類似性ではなく安定したオブジェクト参照が必要である。}
      source_claims: [claim-execution-task-separation]
  required_relations: [Execution-realizes-Task]
examples:
  - id: execution-positive
    labels: {zh: "OpenAI Assistants Run 生命周期", en: "OpenAI Assistants Run lifecycle", ja: "OpenAI Assistants Run ライフサイクル"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; Execution maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; Execution maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; Execution provenance graph."}
    field_values: {execution_id: run-qvy-swok6, state: completed, started_at: '2026-01-08T12:00:03Z', ended_at: '2026-01-08T12:00:06Z'}
    related_node_ids: [Execution, RunAttempt]
    related_relation_ids: []
    source_claims: [claim-execution-activity]
  - id: execution-counterexample
    labels: {zh: "LangGraph 编译图非 Execution", en: "LangGraph compiled graph not Execution", ja: "LangGraph コンパイル済みグラフは Execution ではない"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style Execution.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style Execution.", ja: "Gateway bypass rejects Helicone-style Execution."}
    field_values: {plan_id: plan-42}
    related_node_ids: []
    related_relation_ids: []
    source_claims: [claim-execution-task-separation]
  - id: execution-boundary
    labels: {zh: "LangSmith 子 run 与 Execution 边界", en: "LangSmith child run versus Execution", ja: "LangSmith 子 run と Execution 境界"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Execution preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; Execution preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {execution_id: run-qvy-swok6}
    related_node_ids: [Execution, TraceSpan]
    related_relation_ids: []
    source_claims: [claim-execution-activity]
  - id: execution-instance-exec-842
    labels: {zh: "LangGraph graph.invoke 执行", en: "LangGraph graph.invoke execution", ja: "LangGraph graph.invoke 実行"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->Execution.", en: "LangSmith instance: run_id parent_run_id run_type=llm->Execution.", ja: "LangSmith instance maps to Execution."}
    field_values: {execution_id: langgraph-thread-1-run, state: completed, started_at: '2026-08-03T20:28:43Z', ended_at: '2026-08-03T20:28:46Z'}
    related_node_ids: [Execution, RunAttempt, Checkpoint, TraceRecord]
    related_relation_ids: []
    source_claims: [claim-execution-activity]
parent_relation: null
relations:
  - id: Execution-realizes-Task
    predicate: realizes
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 实现任务, en: realizes task, ja: タスクを実現する}
    definitions: {zh: 当活动已开始追求所标识 Task 请求的结果时，Execution 实现 Task。, en: Execution realizes Task when the activity has begun to pursue the identified Task's requested outcome., ja: Activity が識別された Task の要求結果を追求し始めたとき、Execution は Task を実現する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_realized_by, labels: {zh: 由执行实现, en: is realized by execution, ja: 実行により実現される}}
    conditions:
      - id: execution-realizes-task-condition
        severity: error
        expression: Assert only when execution input or dispatch metadata contains the exact task ID.
        explanations: {zh: 相似的提示词措辞不能建立任务实现关系。, en: Similar prompt wording does not establish a task realization relation., ja: 類似したプロンプト文言はタスク実現関係を確立しない。}
        source_claims: [claim-execution-task-separation]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-execution-task-separation]
    target: concept:Task
  - id: Execution-performs-TaskStep
    predicate: performs
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 执行计划任务步骤, en: performs planned task step, ja: 計画タスクステップを実行する}
    definitions: {zh: 当调度或检查点证据将该计划步骤记录为实际已承担的工作时，Execution 执行 TaskStep。, en: Execution performs TaskStep when dispatch or checkpoint evidence records that planned step as work actually undertaken., ja: ディスパッチまたはチェックポイント証拠がその計画ステップを実際に着手した作業として記録するとき、Execution は TaskStep を実行する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_performed_by, labels: {zh: 由执行完成, en: is performed by execution, ja: 実行により行われる}}
    conditions:
      - id: execution-performs-task-step-condition
        severity: error
        expression: Assert only when the exact TaskStep ID appears in execution state or dispatch metadata.
        explanations: {zh: 完成一个相关 Task 并不能证明每个计划步骤都发生了。, en: Completion of a related Task does not prove every planned step occurred., ja: 関連 Task の完了は、すべての計画ステップが発生したことを証明しない。}
        source_claims: [claim-execution-task-separation]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-execution-task-separation]
    target: concept:TaskStep
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines time-bounded Activity and its relationships to Agents and Entities.
  - id: openai-agents-running
    title: OpenAI Agents SDK running agents
    url: https://openai.github.io/openai-agents-python/running_agents/
    source_type: official-doc
    relevance: Documents agent loop behavior, tools, handoffs, guardrails, and turn limits.
  - id: a2a-task-spec
    title: A2A Task specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines task identity and lifecycle concepts used only for the Task boundary reference.
source_claims:
  - id: claim-execution-activity
    source: prov-o-core
    supports: PROV-O defines an Activity as something that occurs over a period of time and acts upon or with Entities.
    locator: Section 3.1, prov:Activity
    evidence_kind: standard
    confidence: high
  - id: claim-execution-task-separation
    source: prov-o-core
    supports: PROV-O distinguishes an Activity occurrence from an Entity or Plan that describes intended actions.
    locator: Section 3.1 and Section 3.2, prov:Plan
    evidence_kind: standard
    confidence: high

