schema: moonweave.ai/ontology-node/v1
id: RunAttempt
kind: concept
status: accepted
labels:
  zh: 运行尝试
  en: Run attempt
  ja: 実行試行
semantics:
  short_definition:
    zh: 一个 Execution 内为推进工作而发生的一次有编号、可独立结束的尝试活动。
    en: One numbered, independently ending attempt activity within an Execution.
    ja: 一つの Execution 内で作業を進める、番号付きで独立して終了する試行 activity。
  definition:
    zh: >-
      RunAttempt 是 Execution 的活动组成部分。每次尝试有自己的身份、序号、开始与结束边界；
      失败后重试会创建新的 RunAttempt，而不是改写旧尝试。它不等同于整个 Execution、
      RetryActivity、运行结果信息或最终结局判断。
    en: >-
      A RunAttempt is an activity component of an Execution. Each attempt has its own identity,
      ordinal, and start/end boundary. A retry after failure creates a new RunAttempt instead of
      rewriting the previous one. It is not the whole Execution, a RetryActivity, result
      information, or a terminal outcome judgment.
    ja: >-
      RunAttempt は Execution の activity component です。各 attempt は固有 identity・ordinal・
      start/end 境界を持ちます。失敗後の retry は旧 attempt を書き換えず新しい RunAttempt を
      作ります。Execution 全体、RetryActivity、result 情報、終端 outcome 判断ではありません。
  why_needed:
    zh: 重试、超时和恢复必须保留每次发生的不可变边界，不能只保留最后一次状态。
    en: Retries, timeouts, and recovery require immutable boundaries for each occurrence rather than only the latest state.
    ja: retry・timeout・recovery では最新状態だけでなく各 occurrence の不変境界が必要です。
  includes:
    - zh: 第一次尝试和由重试产生的后续尝试。
      en: The first attempt and each successor attempt created by retry.
      ja: 最初の attempt と retry により作られた後続 attempt。
  excludes:
    - zh: 同一次尝试的暂停与继续；若身份未改变，它仍是原 RunAttempt。
      en: Suspension and continuation of the same attempt; if identity is unchanged, it remains the same RunAttempt.
      ja: 同一 attempt の中断と継続。identity が変わらなければ同じ RunAttempt です。
    - zh: 决定是否重试的控制活动。
      en: The control activity that decides or schedules a retry.
      ja: retry を決定・schedule する control activity。
  semantic_kind: activity
  aliases: []
applicability: [core]
structure:
  identity_keys: [attempt_id]
  fields:
    - id: attempt_id
      labels: {zh: 尝试标识, en: Attempt ID, ja: 試行ID}
      definitions: {zh: 在单次尝试生命周期内不变的标识。, en: Stable identity of one attempt occurrence., ja: 一つの attempt occurrence の安定識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]*$'
      example_value: attempt-build-42-2
      allowed_values: []
      source_claims: [claim-run-attempt-activity]
    - id: attempt_number
      labels: {zh: 尝试序号, en: Attempt number, ja: 試行番号}
      definitions: {zh: 在同一 Execution 内从 1 开始的尝试序号。, en: One-based ordinal within the same Execution., ja: 同一 Execution 内の1始まり ordinal。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [claim-run-attempt-number]
    - id: attempt_state
      labels: {zh: 尝试状态, en: Attempt state, ja: 試行状態}
      definitions: {zh: 表达已开始尝试的运行、暂停或终止状态；终态直接保存在尝试上。, en: Running, suspended, or terminal state of an attempt that has actually started; terminal disposition is stored on the attempt itself., ja: 実際に開始した attempt の running・suspended・terminal state。terminal disposition は attempt 自体に保持します。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: running
      allowed_values:
        - id: attempt-state-running
          value: running
          labels: {zh: 运行中, en: running, ja: 実行中}
          definitions: {zh: 尝试正在发生。, en: The attempt is occurring., ja: attempt が発生中。}
          status: accepted
          source_claims: [claim-run-attempt-state]
        - id: attempt-state-suspended
          value: suspended
          labels: {zh: 已暂停, en: suspended, ja: 一時停止}
          definitions: {zh: 保留同一身份等待恢复。, en: Waiting to resume with the same identity., ja: 同一 identity のまま再開待ち。}
          status: accepted
          source_claims: [claim-run-attempt-state]
        - id: attempt-state-succeeded
          value: succeeded
          labels: {zh: 已成功, en: succeeded, ja: 成功}
          definitions: {zh: 尝试已停止且满足适用完成条件。, en: The attempt stopped after satisfying applicable completion criteria., ja: 適用 completion criteria を満たして attempt が停止。}
          status: accepted
          source_claims: [claim-run-attempt-state]
        - id: attempt-state-failed
          value: failed
          labels: {zh: 已失败, en: failed, ja: 失敗}
          definitions: {zh: 尝试因错误或未满足条件而停止。, en: The attempt stopped because of error or unmet conditions., ja: error または unmet condition により attempt が停止。}
          status: accepted
          source_claims: [claim-run-attempt-state]
        - id: attempt-state-canceled
          value: canceled
          labels: {zh: 已取消, en: canceled, ja: 取消}
          definitions: {zh: 尝试开始后被授权主体取消。, en: The attempt was canceled by an authorized actor after it started., ja: 開始後に authorized actor が attempt を取消。}
          status: accepted
          source_claims: [claim-run-attempt-state]
      source_claims: [claim-run-attempt-state]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions: {zh: 本次尝试实际开始执行的时间。, en: Time this attempt actually began., ja: この attempt が実際に開始した時刻。}
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-17T05:01:00Z'
      allowed_values: []
      source_claims: [claim-run-attempt-activity]
    - id: ended_at
      labels: {zh: 结束时间, en: Ended at, ja: 終了時刻}
      definitions: {zh: 本次尝试停止执行的时间。, en: Time this attempt stopped., ja: この attempt が停止した時刻。}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: '2026-07-17T05:02:00Z'
      allowed_values: []
      source_claims: [claim-run-attempt-activity]
  constraints:
    - id: run-attempt-positive-number
      severity: error
      expression_language: plain
      expression: attempt_number >= 1
      explanations: {zh: 第一次尝试编号为 1，后续尝试单调递增。, en: The first attempt is 1 and successors increase monotonically., ja: 最初は1で後続 attempt は単調増加します。}
      source_claims: [claim-run-attempt-number]
    - id: run-attempt-time-order
      severity: error
      expression_language: plain
      expression: ended_at is absent or started_at is present and ended_at >= started_at
      explanations: {zh: 结束不能早于开始。, en: An attempt cannot end before it starts., ja: attempt は開始前に終了できません。}
      source_claims: [claim-run-attempt-activity]
    - id: run-attempt-terminal-time
      severity: error
      expression_language: plain
      expression: attempt_state in [succeeded, failed, canceled] if and only if ended_at is present
      explanations: {zh: 终态尝试必须有结束时间，未终止尝试不得伪造结束时间。, en: A terminal attempt must have an end time, and a nonterminal attempt must not fabricate one., ja: terminal attempt は end time が必要で nonterminal attempt は end time を偽造しません。}
      source_claims: [claim-run-attempt-activity, claim-run-attempt-state]
  required_relations: []
examples:
  - id: run-attempt-example-retry-successor
    kind: positive
    labels: {zh: 重试后的第二次尝试, en: Second attempt after retry, ja: retry 後の第二試行}
    scenario_id: null
    descriptions: {zh: attempt-build-42-2 属于 execution-build-42，序号为 2，并通过 retries 指向直接前一次尝试。, en: attempt-build-42-2 belongs to execution-build-42, has ordinal 2, and points through retries to its direct predecessor., ja: attempt-build-42-2 は execution-build-42 に属し番号2で、retries により直前 attempt を指します。}
    field_values: {attempt_id: attempt-build-42-2, attempt_number: 2, attempt_state: succeeded}
    related_node_ids: [RunAttempt, Execution]
    related_relation_ids: [RunAttempt-part_of-Execution, RunAttempt-retries-RunAttempt]
    expected_result: {zh: 两次尝试保留不同身份并共享一个执行父级。, en: The attempts retain different identities and share one Execution parent., ja: 二つの attempt は異なる identity を保ち同一 Execution を共有します。}
    why_valid_or_invalid: {zh: 重试新增事实而不改写历史尝试。, en: Retry adds a new occurrence without rewriting history., ja: retry は履歴を書き換えず新 occurrence を追加します。}
    synthetic: true
    source_claims: [claim-run-attempt-number, claim-run-attempt-retry]
parent_relation:
  id: RunAttempt-part_of-Execution
  predicate: part_of
  target: concept:Execution
  endpoint_order: child-to-parent
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 是执行的组成尝试, en: is an attempt within execution, ja: execution 内の attempt である}
  definitions: {zh: 每个 RunAttempt 的身份和序号都在一个 Execution 范围内成立。, en: Every RunAttempt obtains its identity and ordinal within one Execution., ja: 各 RunAttempt の identity と ordinal は一つの Execution 範囲で成立します。}
  cardinality: {source: {min: 1, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels: {zh: 包含运行尝试, en: has run attempt, ja: run attempt を含む}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-run-attempt-composition]
  distinct_fact_rationale: {zh: 这是活动组成关系，不是子类关系；Execution 可以由多次尝试组成。, en: This is activity composition, not subclassing; one Execution may contain several attempts., ja: subclass ではなく activity composition で、一 Execution は複数 attempt を含み得ます。}
  layout_role: primary-backbone
  review_status: accepted
relations:
  - id: RunAttempt-retries-RunAttempt
    predicate: retries
    target: concept:RunAttempt
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 重试前一次尝试, en: retries prior attempt, ja: 直前 attempt を再試行する}
    definitions: {zh: 从后续尝试指向导致其产生的直接前一次尝试；不能仅凭时间接近推断。, en: Points from a successor attempt to the direct predecessor whose eligible failure led to it; temporal proximity alone is insufficient., ja: successor attempt から、その生成原因となった直接 predecessor へ指し、時間的近接だけでは推定しません。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: retried_by
      labels: {zh: 被后续尝试重试, en: retried by successor attempt, ja: successor attempt に再試行される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-attempt-retry]
    distinct_fact_rationale: {zh: 明确的重试谱系不能由序号或时间替代。, en: Explicit retry lineage cannot be replaced by ordinal or time inference., ja: 明示 retry lineage は ordinal や時刻推定で代替できません。}
    layout_role: cross-link
    review_status: accepted
  - id: RunAttempt-consumes-Artifact
    predicate: consumes
    target: concept:Artifact
    direction: source-to-target
    relation_kind: information
    labels: {zh: 实际读取产物, en: consumes artifact, ja: artifact を使用する}
    definitions: {zh: 仅在本次尝试实际读取特定 Artifact 版本时建立。, en: Asserted only when this attempt actually reads a particular Artifact revision., ja: この attempt が特定 Artifact revision を実際に読んだ場合のみ assertion します。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: consumed_by, labels: {zh: 被尝试读取, en: consumed by attempt, ja: attempt に使用される}}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-attempt-usage]
    distinct_fact_rationale: {zh: 可见或可用不等于实际读取。, en: Availability or visibility does not prove actual use., ja: available・visible だけでは実使用を証明しません。}
    layout_role: cross-link
    review_status: accepted
  - id: RunAttempt-occurs_in-RuntimeEnvironment
    predicate: occurs_in
    target: concept:RuntimeEnvironment
    direction: source-to-target
    relation_kind: mapping
    labels: {zh: 发生于运行环境, en: occurs in runtime environment, ja: runtime environment で発生する}
    definitions: {zh: 连接到本次尝试实际使用的环境实例或快照，而不是允许的环境模板。, en: Links to the actual environment instance or snapshot used by the attempt, not an allowed environment template., ja: 許可 template ではなく、attempt が実際に使った environment instance または snapshot に結びます。}
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: hosts_attempt, labels: {zh: 承载尝试, en: hosts attempt, ja: attempt を実行する}}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-attempt-environment]
    distinct_fact_rationale: {zh: 实际运行位置是尝试发生的上下文事实。, en: The actual runtime location is contextual evidence about the occurrence., ja: 実 runtime location は occurrence の context fact です。}
    layout_role: cross-link
    review_status: accepted
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-runtime-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 PROV-O Activity、OpenAI Agents runner 与 LangGraph RetryPolicy 逐项核验，Execution/RunAttempt 语义成立。
    en: Verified against PROV-O Activity, OpenAI Agents runner, and LangGraph RetryPolicy. Execution and RunAttempt semantics hold.
    ja: PROV-O Activity、OpenAI Agents runner、LangGraph RetryPolicy に照らし Execution/RunAttempt semantics を確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-run-attempt-activity
    source: eng-ont-prov-o
    supports: PROV-O provides the occurring Activity boundary and explicit start/end properties used for each attempt.
    locator: PROV-O > Activity, startedAtTime, endedAtTime
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-run-attempt-composition
    source: eng-fw-openai-python-docs
    supports: The Agents SDK runner keeps one run loop across multiple model and tool steps; Moonweave infers a separate contained-attempt layer only where retryable occurrences have independent identities.
    locator: Running agents > The agent loop
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-run-attempt-number
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph exposes a one-indexed node_attempt and states that max_attempts includes the first attempt; Moonweave scopes the ordinal to one Execution as a design inference.
    locator: Fault tolerance > RetryPolicy; Accessing retry metadata during execution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-run-attempt-state
    source: eng-proto-a2a-spec
    supports: A2A distinguishes working and interrupted task states from terminal completed, failed, and canceled states; Moonweave maps the applicable post-start states onto a generic RunAttempt.
    locator: Definitions > TaskState
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-run-attempt-retry
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph RetryPolicy reruns eligible failed work as a later attempt and exposes the current attempt number; Moonweave adds an explicit direct-predecessor relation.
    locator: Fault tolerance > RetryPolicy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-run-attempt-usage
    source: eng-ont-prov-o
    supports: PROV-O used relates an Activity to an Entity actually used during its occurrence.
    locator: PROV-O > used
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-run-attempt-environment
    source: eng-ont-prov-o
    supports: PROV-O can associate an Activity with a concrete Location; Moonweave maps the actual runtime snapshot to this occurrence context.
    locator: PROV-O > atLocation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted

