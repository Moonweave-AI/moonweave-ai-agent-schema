schema: moonweave.ai/ontology-node/v1
id: RunAttempt
kind: concept
status: accepted
labels: {zh: 运行尝试, en: Run attempt, ja: 実行試行}
semantics:
  short_definition: {zh: 一个独立计时的执行尝试，是 Execution 的组合部分。, en: One independently timed execution try that is a compositional part of an Execution., ja: Execution のコンポジション部分である、独立して時間計測された1つの実行試行。}
  definition: {zh: RunAttempt 是一个 PROV-O Activity 段，表示更广泛 Execution 内的一次具体尝试。它有自己的尝试 ID、序号、时间边界、失败或成功结果和输入。重试会创建新的 RunAttempt；不会覆盖或变成先前尝试。, en: "A RunAttempt is a PROV-O Activity segment representing one concrete try within a broader Execution. It has its own attempt ID, ordinal, time bounds, failure or success outcome, and inputs. A retry creates a new RunAttempt; it does not overwrite or become a prior attempt.", ja: RunAttempt は、より広い Execution 内の1つの具体的な試行を表す PROV-O Activity セグメントである。独自の試行 ID、序数、時間境界、失敗または成功結果、入力を持つ。再試行は新しい RunAttempt を作成し、先行試行を上書きしたり、それになることはない。}
  why_needed: {zh: 失败分析、成本归属和重试策略需要完整尝试序列。只保留最终结果会掩盖执行是否缓慢、不稳定或在瞬态错误后恢复。, en: "Failure analysis, cost attribution, and retry policy need the full sequence of tries. Keeping only the final outcome hides whether an execution was slow, flaky, or recovered after a transient error.", ja: 失敗分析、コスト帰属、再試行ポリシーには完全な試行系列が必要である。最終結果だけを保持すると、実行が遅かったか、不安定だったか、一時的エラー後に復旧したかが隠れる。}
  includes:
    - {zh: 初始尝试、重试尝试、每次尝试的开始/结束、序号、结果和错误分类。, en: "Initial tries, retry tries, per-attempt start/end, ordinal, outcome, and error classification.", ja: 初回試行、再試行、試行ごとの開始／終了、序数、結果、エラー分類。}
    - {zh: 针对一次尝试的不可变输入和输出引用。, en: Immutable input and output references specific to one try., ja: 1つの試行に固有の不変な入力・出力参照。}
  excludes:
    - {zh: 整个逻辑 Execution、重试决定活动、总重试预算或最终工件。, en: "The entire logical Execution, the retry decision activity, a total retry budget, or a final artifact.", ja: 論理 Execution 全体、再試行判断 Activity、合計再試行予算、最終成果物。}
    - {zh: 可能只观测一次尝试一部分的单个 span。, en: A single span that may observe only part of an attempt., ja: 1つの試行の一部しか観測しない可能性がある単一 Span。}
  semantic_kind: activity
  aliases: [attempt, execution try]
engineering:
  explanation: {zh: 执行器在开始工作时分配 attempt_id 和 attempt_number。完成时记录结果和时间戳。如果策略允许另一次尝试，重试控制器保留失败记录并创建下一个序号。, en: "An executor allocates attempt_id and attempt_number when it begins work. On completion it records outcome and timestamps. If policy allows another try, the retry controller preserves the failed record and creates the next ordinal.", ja: 実行者は作業開始時に attempt_id と attempt_number を割り当てる。完了時に結果と時刻を記録する。ポリシーが再試行を許可する場合、再試行コントローラーは失敗記録を保持して次の序数を作成する。}
  typical_input:
    - description: {zh: 尝试开始, en: Attempt start, ja: 試行開始}
      format: |-
        {"attempt_id":"attempt-2","execution_id":"exec-842","attempt_number":2,"input_ref":"input-4","started_at":"2026-07-18T09:01:00Z"}
  typical_output:
    - description: {zh: 尝试结束, en: Attempt end, ja: 試行終了}
      format: |-
        {"attempt_id":"attempt-2","outcome":"succeeded","ended_at":"2026-07-18T09:01:12Z","output_refs":["report-22"]}
  reference_implementations:
    - {name: LangGraph fault tolerance, url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance, description: Retry policies and durable stateful execution boundaries.}
structure:
  identity_keys: [attempt_id]
  fields:
    - id: attempt_id
      labels: {zh: 尝试 ID, en: Attempt ID, ja: 試行 ID}
      definitions: {zh: 一次具体尝试的稳定标识符。, en: Stable identifier for one concrete try., ja: 1つの具体的な試行の安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: attempt-2
      source_claims: [claim-run-attempt]
    - id: attempt_number
      labels: {zh: 尝试编号, en: Attempt number, ja: 試行番号}
      definitions: {zh: 该尝试在其执行中的从一开始的序号。, en: One-based ordinal of the attempt within its execution., ja: その Execution 内での1始まりの試行序数。}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2
      source_claims: [claim-run-attempt]
    - id: outcome
      labels: {zh: 尝试结果, en: Attempt outcome, ja: 試行結果}
      definitions: {zh: 这一次尝试的终止结果。, en: Terminal outcome for this one try., ja: この1回の試行に対する終端結果。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: [succeeded, failed, timed_out, cancelled]
      example_value: succeeded
      source_claims: [claim-run-attempt]
  constraints:
    - id: attempt-ordinal-unique
      severity: error
      language: plain
      expression: attempt_number must be unique within one execution and must be greater than zero.
      explanation: {zh: 序号是排序元数据，本身不是因果重试谱系的证明。, en: "The ordinal is ordering metadata, not proof of causal retry lineage by itself.", ja: 序数は順序付けメタデータであり、それだけで因果的再試行系譜の証拠ではない。}
      source_claims: [claim-run-attempt]
    - id: attempt-immutability
      severity: error
      language: plain
      expression: A terminal attempt record must not be rewritten when a later attempt is created.
      explanation: {zh: 重试分析需要历史失败输入、时间和结果。, en: "Retry analysis needs historical failure inputs, timing, and outcome.", ja: 再試行分析には履歴の失敗入力、時刻、結果が必要である。}
      source_claims: [claim-run-attempt]
  required_relations: [RunAttempt-part_of-Execution]
examples:
  - id: run-attempt-positive
    labels: {zh: "OpenAI Run in_progress 尝试", en: "OpenAI Run in_progress attempt", ja: "OpenAI Run in_progress 試行"}
    descriptions: {zh: "W3C PROV-O prov:Agent wasAssociatedWith prov:Activity; Activity used/generated Entity; RunAttempt maps actor/execution/artifact provenance graph.", en: "W3C PROV-O prov:Agent wasAssociatedWith Activity; Activity used/generated Entity; RunAttempt maps actor/execution/artifact provenance graph.", ja: "PROV-O Agent-Activity-Entity; RunAttempt provenance graph."}
    field_values: {attempt_id: attempt-2, attempt_number: 2, outcome: succeeded}
    related_node_ids: [RunAttempt, Execution]
    related_relation_ids: [RunAttempt-part_of-Execution, RunAttempt-retries-RunAttempt]
    source_claims: [claim-run-attempt]
  - id: run-attempt-counterexample
    labels: {zh: "不可变违反：改写失败尝试", en: "Immutability violation rewriting failed attempt", ja: "不変性違反：失敗試行の書き換え"}
    descriptions: {zh: "Mock bypassing Helicone gateway cannot serve as Helicone-style RunAttempt.", en: "Mock bypassing Helicone gateway cannot serve as Helicone-style RunAttempt.", ja: "Gateway bypass rejects Helicone-style RunAttempt."}
    field_values: {attempt_id: attempt-1, outcome: succeeded}
    related_node_ids: [RunAttempt]
    related_relation_ids: []
    source_claims: [claim-run-attempt]
  - id: run-attempt-boundary
    labels: {zh: "RunAttempt 与 RetryActivity 分离", en: "RunAttempt versus RetryActivity", ja: "RunAttempt と RetryActivity 分離"}
    descriptions: {zh: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RunAttempt preserves boundaries.", en: "Span.add_event produces TraceEvent on Span; Metrics are not Execution; RunAttempt preserves boundaries.", ja: "OTel Event on Span; Metrics not Execution."}
    field_values: {attempt_id: attempt-2}
    related_node_ids: [RunAttempt, RetryActivity]
    related_relation_ids: [RetryActivity-creates-RunAttempt]
    source_claims: [claim-run-attempt]
  - id: run-attempt-instance-attempt-2
    labels: {zh: "OpenAI 第二次 RunAttempt", en: "OpenAI second RunAttempt", ja: "OpenAI 2 回目 RunAttempt"}
    descriptions: {zh: "LangSmith instance: run_id=0192a3b4 parent_run_id=0192a3b3 run_type=llm->RunAttempt.", en: "LangSmith instance: run_id parent_run_id run_type=llm->RunAttempt.", ja: "LangSmith instance maps to RunAttempt."}
    field_values: {attempt_id: attempt-2, attempt_number: 2, outcome: succeeded}
    related_node_ids: [RunAttempt, Execution, RetryActivity, ReportArtifact]
    related_relation_ids: [RunAttempt-part_of-Execution, RunAttempt-retries-RunAttempt]
    source_claims: [claim-run-attempt]
parent_relation:
  id: RunAttempt-part_of-Execution
  predicate: part_of
  target: concept:Execution
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是执行的一次尝试, en: is an attempt of execution, ja: 実行の試行である}
  definitions: {zh: 每个 RunAttempt 都是恰好一个 Execution 内的组合执行尝试。, en: Every RunAttempt is a compositional execution try within exactly one Execution., ja: すべての RunAttempt は、ちょうど1つの Execution 内のコンポジション実行試行である。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_attempt, labels: {zh: 具有运行尝试, en: has run attempt, ja: 実行試行を持つ}}
  conditions:
    - id: run-attempt-parent-condition
      severity: error
      expression: Attempt execution_id must equal the parent Execution identifier.
      explanations: {zh: 重试不能把一个尝试迁移到不同的逻辑执行中。, en: A retry cannot migrate an attempt into a different logical execution., ja: 再試行は試行を別の論理 Execution に移動できない。}
      source_claims: [claim-run-attempt]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-run-attempt]
relations:
  - id: RunAttempt-retries-RunAttempt
    predicate: retries
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 重试先前尝试, en: retries prior attempt, ja: 先行試行を再試行する}
    definitions: {zh: 当重试控制在可重试结果后创建一个更晚的 RunAttempt 来重新尝试同一执行工作时，它重试先前 RunAttempt。, en: A later RunAttempt retries a prior RunAttempt when retry control created it to reattempt the same execution work after a retryable outcome., ja: 再試行可能な結果の後、再試行制御が同じ実行作業を再試行するために後続 RunAttempt を作成したとき、その後続 RunAttempt は先行 RunAttempt を再試行する。}
    cardinality: {source: {min: 0, max: 1}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_retried_by, labels: {zh: 被后续尝试重试, en: is retried by later attempt, ja: 後続試行により再試行される}}
    conditions:
      - id: run-attempt-retries-condition
        severity: error
        expression: Source and target must share execution_id, source attempt_number must equal target attempt_number plus one, and retry evidence must exist.
        explanations: {zh: 没有重试决定或策略证据，仅序号相邻是不充分的。, en: Ordinal adjacency alone is insufficient without a retry decision or policy evidence., ja: 再試行判断またはポリシー証拠なしに、序数の隣接だけでは不十分である。}
        source_claims: [claim-run-attempt]
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-attempt]
    target: concept:RunAttempt
sources:
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines time-bounded Activities and provenance relationships for distinct occurrences.
  - id: langgraph-fault-tolerance
    title: LangGraph fault tolerance
    url: https://docs.langchain.com/oss/python/langgraph/fault-tolerance
    source_type: official-doc
    relevance: Documents retry policy and resilient graph execution behavior.
source_claims:
  - id: claim-run-attempt
    source: langgraph-fault-tolerance
    supports: LangGraph documents retry and fault-tolerance mechanisms; this ontology reifies each observed try as a distinct Activity record.
    locator: Retry policy and fault tolerance sections
    evidence_kind: official-doc
    confidence: medium

