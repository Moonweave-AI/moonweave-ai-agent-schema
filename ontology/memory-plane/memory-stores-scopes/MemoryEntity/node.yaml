source_claims:
  - id: claim-memory-entity-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents describes long-term memory as learned information persisted across conversations and accessed through memory files and backends. Moonweave introduces MemoryEntity as the common genus for independently identifiable persistent information, adding version, provenance, and lifecycle requirements that the documentation does not define.
    locator: Memory > How memory works > learned information, file paths, and persisted updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-002
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench evaluates whether agents can retain, retrieve, and use information across interactions. MemoryEntity is Moonweave's common genus for the logical item, persistent record, or file carrier that gives such information durable and auditable identity.
    locator: README > LongMemEval Overview > Accurate Retrieval and Conflict Resolution
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents persists learned information across conversations and addresses it through memory files and backends. memory_entity_id is Moonweave's stable logical identity across those persistent representations.
    locator: Memory > How memory works > learned information, file paths, and persisted updates across conversations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-entity-004
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench evaluates retention and conflict resolution over changing information across interactions. entity_version lets Moonweave distinguish successive states of one remembered item during those operations.
    locator: README > LongMemEval Overview > Accurate Retrieval and Conflict Resolution
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents can update persistent memory files across conversations. content_digest is Moonweave's integrity control for distinguishing the exact retained content version.
    locator: Memory > How memory works > memory files and persisted updates
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-006
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench tests whether an agent retains and resolves information from prior interactions. provenance_ref records the source interaction and location supporting a remembered value.
    locator: README > LongMemEval Overview > Information Extraction and Conflict Resolution
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-entity-007
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench includes conflict resolution over potentially changing information. lifecycle_state lets Moonweave distinguish the currently applicable memory version from superseded or invalidated versions.
    locator: README > LongMemEval Overview > Accurate Retrieval and Conflict Resolution
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-entity-008
    source: lit-agent-memoryagentbench
    supports: Conflict-resolution evaluation requires distinguishing older information from an updated value. Moonweave preserves each version immutably so that resolution and provenance remain auditable.
    locator: README > LongMemEval Overview > Accurate Retrieval and Conflict Resolution
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-entity-009
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents persistent learned information stored in memory files and updated across conversations. Moonweave's MemoryEntity example distinguishes logical item, versioned record, and file carrier as three persistence forms; the documentation supports durable memory content but does not prescribe this taxonomy.
    locator: Memory > How memory works > learned information, file paths, and persisted updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-010
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench evaluates agents on retaining and using information across interactions. The example instantiates one stable remembered preference across logical item, persistence record, and file carrier without claiming the benchmark defines these classes.
    locator: README > LongMemEval Overview > Four Core Competencies for Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-011
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents separates persisted memory content from the backend paths and scopes used to route that content. Moonweave applies this operational boundary by treating a remembered value as MemoryEntity and its logical partition as MemoryNamespace; the class names are Moonweave-specific.
    locator: Memory > Scoped memory > agent-scoped and user-scoped backend namespaces
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-entity-012
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench's cross-interaction memory tasks require identifiable remembered content, while evaluation grouping or user partitioning is not itself remembered content. This supports the boundary interpreted here.
    locator: README > LongMemEval Overview > incremental multi-turn interaction design
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
