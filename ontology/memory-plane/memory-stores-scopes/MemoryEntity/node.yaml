schema: moonweave.ai/ontology-node/v1
id: MemoryEntity
kind: concept
status: review
labels:
  zh: 记忆实体
  en: memory entity
  ja: 記憶実体
semantics:
  short_definition:
    zh: 具有稳定身份、内容或载体、来源、版本与生命周期的可持久化记忆信息实体。
    en: A persistable memory information entity with stable identity, content or carrier, provenance, version, and lifecycle.
    ja: 安定同一性、内容または媒体、来歴、版、ライフサイクルを持つ永続化可能な記憶情報実体です。
  definition:
    zh: 记忆实体是一种信息实体；其种差是：它可跨一次模型调用被保存或重新取得，并以稳定标识、内容或持久载体、来源、版本和生命周期状态为身份条件。MemoryRecord、MemoryItem 与 MemoryFile 是不同持久化形态；MemoryStore、MemoryNamespace、MemoryScope 与 MemoryRetentionPolicy 分别是存储设施、集合边界或治理规范，不是其子类。
    en: A MemoryEntity is an information entity that can be retained or retrieved beyond one model call and is identified by stable ID, content or durable carrier, provenance, version, and lifecycle state. MemoryRecord, MemoryItem, and MemoryFile are persistence forms; MemoryStore, MemoryNamespace, MemoryScope, and MemoryRetentionPolicy are storage facilities, collection boundaries, or governing specifications rather than subtypes.
    ja: MemoryEntity は情報実体の一種で、一回のモデル呼出しを越えて保存・再取得でき、安定ID、内容または永続媒体、来歴、版、ライフサイクル状態で識別されます。MemoryRecord・MemoryItem・MemoryFile は永続化形態で、MemoryStore・MemoryNamespace・MemoryScope・MemoryRetentionPolicy は保存施設、集合境界、統治仕様であり下位型ではありません。
  why_needed:
    zh: 该上位概念统一文件、逻辑项和持久记录的身份、来源、版本与生命周期语义，同时防止把存储设施或作用域标签误作记忆内容类型。
    en: This genus unifies identity, provenance, version, and lifecycle semantics across files, logical items, and persistent records while preventing stores or scope labels from being mistaken for memory-content types.
    ja: ファイル、論理項目、永続レコードの同一性・来歴・版・ライフサイクル意味を統一し、ストアやスコープ標識を記憶内容型と誤認することを防ぎます。
  includes:
    - zh: 纳入具有可重识别 ID、内容或载体、来源版本和生命周期状态，并能在后续调用中读取的 MemoryRecord、MemoryItem 与 MemoryFile。
      en: Includes MemoryRecords, MemoryItems, and MemoryFiles with reidentifiable ID, content or carrier, source version, lifecycle state, and later-call retrievability.
      ja: 再識別可能ID、内容または媒体、出典版、ライフサイクル状態を持ち、後続呼出しで取得できる MemoryRecord・MemoryItem・MemoryFile を含みます。
  excludes:
    - zh: 排除 MemoryStore、MemoryNamespace、MemoryScope、MemoryRetentionPolicy 和一次性的 ContextSlot；它们分别是设施、集合边界、规范或调用内位置。
      en: Excludes MemoryStore, MemoryNamespace, MemoryScope, MemoryRetentionPolicy, and call-local ContextSlot because they are facilities, collection boundaries, specifications, or positions rather than persistent memory information.
      ja: MemoryStore、MemoryNamespace、MemoryScope、MemoryRetentionPolicy、一回呼出し内 ContextSlot は施設・集合境界・仕様・位置であり、永続記憶情報ではないため除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - memory_entity_id
    - entity_version
  fields:
    - id: memory_entity_id
      labels:
        zh: 记忆实体标识
        en: memory-entity ID
        ja: 記憶 entity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨持久化版本稳定标识同一逻辑记忆实体。
        en: Stably identifies the same logical memory entity across persistence versions.
        ja: 永続化 version をまたいで同一 logical memory entity を安定識別します。
      allowed_values: []
      pattern: null
      example_value: item-pref-language
      source_claims:
        - claim-memory-entity-003
    - id: entity_version
      labels:
        zh: 实体版本
        en: entity version
        ja: entity version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一记忆实体系列中内容和生命周期状态固定的一版。
        en: Identifies one version in which the memory entity's content and lifecycle state are fixed.
        ja: 同じ memory entity 系列で内容と lifecycle state が固定された一版を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-memory-entity-004
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该版本的规范化记忆内容或持久载体计算的完整性摘要。
        en: Integrity digest of the normalized memory content or durable carrier for this version.
        ja: この version の正規化 memory content または durable carrier の完全性 digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:pref-language-zh-cn-v3
      source_claims:
        - claim-memory-entity-005
    - id: provenance_ref
      labels:
        zh: 谱系引用
        en: provenance reference
        ja: 来歴参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向支持该记忆内容的不可变来源与位置。
        en: Points to the immutable source and location supporting the memory content.
        ja: 記憶内容を支持する不変の出典と位置を指します。
      allowed_values: []
      pattern: null
      example_value: user-preference-turn-17#span-2
      source_claims:
        - claim-memory-entity-006
    - id: lifecycle_state
      labels:
        zh: 生命周期状态
        en: lifecycle state
        ja: lifecycle state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该版本是否活跃、被替代、失效或成为墓碑；状态变化产生新版本。
        en: Records whether the version is active, superseded, invalidated, or tombstoned; a state change creates a new version.
        ja: version が active・superseded・invalidated・tombstoned のいずれかを記録し、状態変更は新 version を作ります。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-memory-entity-007
  constraints:
    - id: memory-entity-version-is-immutable
      severity: error
      expression_language: plain
      expression: memory_entity_id + entity_version fixes content_digest, provenance_ref, and lifecycle_state
      explanations:
        zh: 同一记忆版本不能就地改写内容、来源或状态；变化必须创建新版本。
        en: A memory-entity version cannot rewrite content, provenance, or state in place; a change creates a new version.
        ja: 同じ memory-entity version の内容・来歴・状態をその場で書き換えず、変更は新 version を作ります。
      source_claims:
        - claim-memory-entity-008
  required_relation_constraints: []
examples:
  - id: MemoryEntity-example-positive-001
    kind: positive
    labels:
      zh: 记忆实体正例
      en: Positive example of memory entity
      ja: 記憶実体の正例
    scenario_id: null
    descriptions:
      zh: 记忆项 item-pref-language/v3 保存偏好“使用简体中文”，内容摘要固定为 sha256:pref-language-zh-cn-v3，来源为 user-preference-turn-17#span-2，当前状态为 active；持久记录和文件只是它可关联的具体载体。
      en: Memory item item-pref-language/v3 stores the preference “use Simplified Chinese,” fixes digest sha256:pref-language-zh-cn-v3 and provenance user-preference-turn-17#span-2, and is active; its persistence record and file are related concrete carriers.
      ja: memory item item-pref-language/v3 は「簡体字中国語を使用」を保存し、digest sha256:pref-language-zh-cn-v3 と provenance user-preference-turn-17#span-2 を固定し active です。永続 record と file は関連する具体 carrier です。
    field_values:
      memory_entity_id: item-pref-language
      entity_version: "3"
      content_digest: sha256:pref-language-zh-cn-v3
      provenance_ref: user-preference-turn-17#span-2
      lifecycle_state: active
    related_node_ids:
      - MemoryEntity
      - MemoryNamespace
    related_relation_ids:
      - MemoryEntity-scoped_by-MemoryNamespace
    expected_result:
      zh: 该运行可查询 MemoryEntity 以及方向保持不变的事实 MemoryEntity-scoped_by-MemoryNamespace。
      en: The run can query MemoryEntity together with direction-preserving fact MemoryEntity-scoped_by-MemoryNamespace.
      ja: この実行では MemoryEntity と方向を保持した事実 MemoryEntity-scoped_by-MemoryNamespace を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、MemoryEntity-scoped_by-MemoryNamespace 的 canonical 方向、概念定义和可用字段值。
      en: Each object has stable identity, content or durable carrier, provenance, version, and lifecycle beyond one model call while preserving its more specific persistence form.
      ja: このシナリオは実際の運用文脈、MemoryEntity-scoped_by-MemoryNamespace の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-entity-009
      - claim-memory-entity-010
  - id: MemoryEntity-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆实体边界例
      en: Boundary case for memory entity
      ja: 記憶実体の境界例
    scenario_id: null
    descriptions:
      zh: namespace=(tenant-7,user-42,preferences) 只定义记录集合的寻址分区，没有被记住的内容、载体版本或自身生命周期；它组织 MemoryEntity，但本身不是 MemoryEntity。
      en: namespace=(tenant-7,user-42,preferences) defines only an addressing partition for a record collection and has no remembered content, carrier version, or content lifecycle; it organizes MemoryEntities but is not one.
      ja: namespace=(tenant-7,user-42,preferences) はレコード集合のアドレス区画だけを定め、記憶内容・媒体版・内容ライフサイクルを持ちません。MemoryEntity を組織しますが自身は MemoryEntity ではありません。
    field_values: {}
    related_node_ids:
      - MemoryEntity
      - MemoryNamespace
    related_relation_ids:
      - MemoryEntity-scoped_by-MemoryNamespace
    expected_result:
      zh: MemoryNamespace 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryEntity。
      en: MemoryNamespace retains its own type; validation must not promote it to MemoryEntity from relation co-occurrence.
      ja: MemoryNamespace は元の型を維持し、関係の共起だけで MemoryEntity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 MemoryEntity-scoped_by-MemoryNamespace 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A namespace is identified by its collection key and membership boundary; a memory entity is identified by persistent information or carrier plus version and lifecycle. Scoping links rather than merges them.
      ja: 境界例は実在する対照ノードを示し、MemoryEntity-scoped_by-MemoryNamespace の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-entity-011
      - claim-memory-entity-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
