schema: moonweave.ai/ontology-node/v1
id: MemoryEntity
kind: concept
labels:
  zh: 记忆实体
  en: memory entity
  ja: 記憶実体
semantics:
  short_definition:
    zh: 可跨多次模型调用保存或重新取回的、具有稳定身份的记忆信息对象。
    en: A memory information object with stable identity that can be saved or retrieved across model calls.
    ja: 安定した identity を持ち、複数回の model call を越えて保存・再取得できる記憶情報 object です。
  definition:
    zh: MemoryEntity 是记忆对象与存储模块的上位概念，统一“被记住的内容”在身份、来源、版本与生命周期上的语义。Mem0 返回的 memory 对象、Letta 的 core block 或 archival passage、LangGraph BaseStore 的 Item 都可映射为 MemoryEntity 的具体形态。MemoryRecord、MemoryItem 与 MemoryFile 是其三种持久化分支；MemoryStore、MemoryNamespace、MemoryScope 与 MemoryRetentionPolicy 分别描述存储设施、寻址分区、访问规范与保留规则，不是 MemoryEntity 的子类。
    en: MemoryEntity is the genus in the memory objects and stores module, unifying identity, provenance, version, and lifecycle semantics for remembered content. Mem0 memory objects, Letta core blocks or archival passages, and LangGraph BaseStore Items map to concrete MemoryEntity forms. MemoryRecord, MemoryItem, and MemoryFile are its three persistence branches; MemoryStore, MemoryNamespace, MemoryScope, and MemoryRetentionPolicy describe storage facilities, addressing partitions, access specifications, and retention rules—not subtypes of MemoryEntity.
    ja: MemoryEntity は記憶オブジェクトとストア module の上位概念で、記憶内容の identity、来歴、版、ライフサイクル意味を統一します。Mem0 memory object、Letta core block/archival passage、LangGraph BaseStore Item が具体形に写像されます。MemoryRecord・MemoryItem・MemoryFile が三つの永続 branch で、MemoryStore・MemoryNamespace・MemoryScope・MemoryRetentionPolicy は保存施設・住所区分・アクセス仕様・保持規則であり subtype ではありません。
  why_needed:
    zh: 如果团队把“数据库里的一行”“向量索引里的一个 id”和“用户说的那条偏好”混为一谈，就无法解释版本替代、跨后端迁移和遗忘审计。MemoryEntity 提供一个共同的上位身份，让不同载体上的同一逻辑记忆可以被追踪。
    en: If teams treat “a database row,” “a vector index id,” and “the user’s preference” as the same thing, they cannot explain version supersession, backend migration, or forget audits. MemoryEntity supplies a common genus so the same logical memory can be tracked across carriers.
    ja: 「DB 行」「vector index id」「ユーザー選好」を同一視すると、版置換・backend 移行・忘却監査を説明できません。MemoryEntity は共通 genus を与え、同一 logical memory を carrier 横断で追跡できます。
  includes:
    - zh: 具有可重识别 ID、内容或载体、来源与生命周期状态，且能在后续调用中读取的 MemoryRecord、MemoryItem 与 MemoryFile。
      en: MemoryRecords, MemoryItems, and MemoryFiles with reidentifiable ID, content or carrier, provenance, lifecycle state, and later-call retrievability.
      ja: 再識別可能 ID、内容または carrier、来歴、lifecycle state を持ち後続 call で取得できる MemoryRecord・MemoryItem・MemoryFile。
  excludes:
    - zh: MemoryStore、MemoryNamespace、MemoryScope、MemoryRetentionPolicy，以及一次调用内的 ContextSlot 或检索时生成的 RetrievedCandidate。
      en: MemoryStore, MemoryNamespace, MemoryScope, MemoryRetentionPolicy, call-local ContextSlots, and runtime RetrievedCandidates.
      ja: MemoryStore、MemoryNamespace、MemoryScope、MemoryRetentionPolicy、一回 call 内 ContextSlot、実行時 RetrievedCandidate。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成时把 Mem0 GET /v1/memories/{id}/ 返回体、Letta block/passage 对象、LangGraph Item 与 Deep Agents 记忆文件都投影为 MemoryEntity，再按载体细分为 Record、Item 或 File。Moonweave 本地字段 memory_entity_id 与 entity_version 跨 API 稳定标识逻辑实体；外部 API 的 id 字段映射到各子类的具体 identity key，而不是直接替代 memory_entity_id。
    en: Map Mem0 GET /v1/memories/{id}/ responses, Letta block/passage objects, LangGraph Items, and Deep Agents memory files to MemoryEntity, then specialize to Record, Item, or File by carrier. Moonweave-local memory_entity_id and entity_version stably identify the logical entity across APIs; external id fields map to subtype identity keys rather than replacing memory_entity_id directly.
    ja: Mem0 GET /v1/memories/{id}/ 応答、Letta block/passage、LangGraph Item、Deep Agents memory file を MemoryEntity に投影し carrier 別に Record/Item/File へ细分。Moonweave ローカル memory_entity_id/entity_version が API 横断 logical entity を安定識別し、外部 id は subtype identity key へ写像します。
  typical_input:
    - description: Mem0 memory object returned by create or get API.
      format: |
        {
          "id": "mem0-8f3c2a1b",
          "memory": "Prefers TypeScript for code examples.",
          "user_id": "alice",
          "agent_id": "support-bot",
          "created_at": "2026-07-16T08:00:00Z",
          "updated_at": "2026-07-16T09:30:00Z"
        }
      source_claims: [claim-memory-entity-mem0]
    - description: Letta core memory block returned by agent state or block update.
      format: |
        {
          "label": "human",
          "value": "Name: Alice. Prefers dark mode.",
          "limit": 2000,
          "read_only": false
        }
      source_claims: [claim-memory-entity-letta]
    - description: LangGraph BaseStore Item from get or search.
      format: |
        {
          "namespace": ["tenant-7", "user-42", "preferences"],
          "key": "response-language",
          "value": {"language": "zh-CN"},
          "created_at": "2026-07-16T08:00:00Z",
          "updated_at": "2026-07-16T09:00:00Z"
        }
      source_claims: [claim-memory-entity-langgraph]
  typical_output:
    - description: Moonweave-local MemoryEntity envelope linking logical identity to a persistence branch.
      format: |
        {
          "memory_entity_id": "item-language",
          "entity_version": "3",
          "persistence_form": "MemoryRecord",
          "external_refs": {
            "mem0_id": "mem0-8f3c2a1b",
            "namespace": ["tenant-7", "user-42", "preferences"],
            "key": "response-language"
          },
          "lifecycle_state": "active"
        }
      source_claims: [claim-memory-entity-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Memory objects with id, memory text, user_id, agent_id, created_at, updated_at.
    - name: Letta Memory
      url: https://docs.letta.com/guides/core-concepts/memory
      description: Core blocks and archival passages as addressable memory carriers.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore Item with namespace, key, value, timestamps.
structure:
  identity_keys:
    - memory_entity_id
    - entity_version
  fields:
    - id: memory_entity_id
      labels: {zh: 记忆实体标识, en: memory entity ID, ja: 記憶 entity ID}
      definitions:
        zh: 跨持久化版本稳定标识同一逻辑记忆实体；不同于 Mem0 id 或 LangGraph key  alone。
        en: Stably identifies the same logical memory entity across persistence versions; distinct from Mem0 id or LangGraph key alone.
        ja: 永続版を跨ぐ logical memory entity の安定 ID。Mem0 id や LangGraph key 単独とは別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: item-language
      allowed_values: []
      source_claims: [claim-memory-entity-design]
    - id: entity_version
      labels: {zh: 实体版本, en: entity version, ja: entity version}
      definitions:
        zh: 标识同一记忆实体系列中内容和生命周期状态固定的一版；Mem0 updated_at 变化应产生新版。
        en: Identifies one version where content and lifecycle state are fixed; Mem0 updated_at changes should yield a new version.
        ja: 内容と lifecycle state が固定された一版。Mem0 updated_at 変更は新版を生む。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "3"
      allowed_values: []
      source_claims: [claim-memory-entity-design]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: 内容 digest}
      definitions:
        zh: 对该版本规范化记忆内容或持久载体计算的完整性摘要。
        en: Integrity digest of normalized memory content or durable carrier for this version.
        ja: 正規化 memory content または durable carrier の完全性 digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:pref-language-zh-cn-v3
      allowed_values: []
      source_claims: [claim-memory-entity-design]
    - id: provenance_ref
      labels: {zh: 谱系引用, en: provenance reference, ja: 来歴参照}
      definitions:
        zh: 指向支持该记忆内容的不可变来源与位置，如 Mem0 ingestion turn 或 Letta message id。
        en: Points to immutable source and location supporting the memory, such as a Mem0 ingestion turn or Letta message id.
        ja: Mem0 ingestion turn や Letta message id 等、記憶内容を支持する不変出典・位置。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conversation://user/turn-17#span-2
      allowed_values: []
      source_claims: [claim-memory-entity-design]
    - id: lifecycle_state
      labels: {zh: 生命周期状态, en: lifecycle state, ja: lifecycle state}
      definitions:
        zh: 记录该版本是否 active、superseded、invalidated 或 tombstoned；状态变化产生新版本。
        en: Records whether the version is active, superseded, invalidated, or tombstoned; state change creates a new version.
        ja: active・superseded・invalidated・tombstoned のいずれか。状態変更は新版を作る。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: active
      allowed_values: [active, superseded, invalidated, tombstoned]
      source_claims: [claim-memory-entity-design]
  constraints:
    - id: memory-entity-version-is-immutable
      severity: error
      expression_language: plain
      expression: memory_entity_id + entity_version fixes content_digest, provenance_ref, and lifecycle_state
      explanation:
        zh: 同一记忆版本不能就地改写内容、来源或状态；变化必须创建新版本。
        en: A memory-entity version cannot rewrite content, provenance, or state in place; change creates a new version.
        ja: 同一版の内容・来歴・状態をその場で書き換えず、変更は新版を作る。
      source_claims: [claim-memory-entity-design]
  required_relations: []
examples:
  - id: memory-entity-example-mem0-preference
    labels:
      zh: Mem0 用户偏好记忆实体
      en: Mem0 user preference memory entity
      ja: Mem0 ユーザー選好 memory entity
    descriptions:
      zh: Mem0 为 Alice 写入偏好 “Prefers TypeScript for code examples.”，返回 id=mem0-8f3c2a1b。Moonweave 将其映射为 memory_entity_id=item-language、entity_version=1 的 MemoryEntity，并以 MemoryRecord 持久化；后续 PUT 更新产生 entity_version=2 而不改写 v1。
      en: Mem0 writes preference "Prefers TypeScript for code examples." for Alice with id=mem0-8f3c2a1b. Moonweave maps it to MemoryEntity memory_entity_id=item-language, entity_version=1 as MemoryRecord; a later PUT update yields entity_version=2 without rewriting v1.
      ja: Mem0 が Alice 向け “Prefers TypeScript for code examples.” を id=mem0-8f3c2a1b で書込。Moonweave は memory_entity_id=item-language, entity_version=1 の MemoryEntity→MemoryRecord へ写像。後続 PUT は v1 を書換えず entity_version=2。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/ response object
    field_values:
      memory_entity_id: item-language
      entity_version: "1"
      content_digest: sha256:pref-typescript-v1
      provenance_ref: mem0://ingestion/session-17
      lifecycle_state: active
      external_mem0_id: mem0-8f3c2a1b
    related_node_ids: [MemoryEntity, MemoryRecord, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-entity-mem0, claim-memory-entity-design]
  - id: memory-entity-example-letta-core-block
    labels:
      zh: Letta 核心记忆块实体
      en: Letta core memory block entity
      ja: Letta core memory block entity
    descriptions:
      zh: "Letta 智能体通过 core_memory_replace 更新 label=human 的 block，内容为 Name: Alice. Timezone: JST.。该 block 是 in-context 可编辑载体，Moonweave 将其视为 MemoryEntity（常物化为 MemoryFile 或 MemoryRecord），与 archival passage 的区外存储层级不同。"
      en: "A Letta agent updates the human block via core_memory_replace to Name: Alice. Timezone: JST. The block is an in-context editable carrier; Moonweave treats it as MemoryEntity (often MemoryFile or MemoryRecord), distinct from out-of-window archival passages."
      ja: "Letta エージェントが core_memory_replace で human block を Name: Alice. Timezone: JST. に更新。in-context 編集可能 carrier として MemoryEntity（多くは MemoryFile/MemoryRecord）に写像し、archival passage とは storage tier が異なる。"
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory
      version: core_memory_replace block object
    field_values:
      memory_entity_id: block-human-alice
      entity_version: "2"
      content_digest: sha256:human-block-v2
      provenance_ref: letta://agent/agent-42/core/human
      lifecycle_state: active
      block_label: human
    related_node_ids: [MemoryEntity, MemoryItem, MemoryFile, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-entity-letta, claim-memory-entity-design]
  - id: memory-entity-example-langgraph-item
    labels:
      zh: LangGraph Store Item 记忆实体
      en: LangGraph Store Item memory entity
      ja: LangGraph Store Item memory entity
    descriptions:
      zh: LangGraph 应用在 BaseStore 写入 namespace=("tenant-7","user-42","preferences")、key="response-language" 的 Item。Moonweave 将其映射为 MemoryEntity 并以 MemoryRecord 表达 namespace/key/version 地址；thread checkpointer 状态不属于 MemoryEntity。
      en: A LangGraph app writes an Item at namespace=("tenant-7","user-42","preferences"), key="response-language" in BaseStore. Moonweave maps it to MemoryEntity expressed as MemoryRecord with namespace/key/version address; thread checkpointer state is not MemoryEntity.
      ja: LangGraph アプリが BaseStore に namespace=("tenant-7","user-42","preferences"), key="response-language" の Item を書込。Moonweave は MemoryEntity→MemoryRecord（namespace/key/version 住所）へ写像。thread checkpointer 状態は MemoryEntity ではない。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore Item namespace and key
    field_values:
      memory_entity_id: item-response-language
      entity_version: "2"
      content_digest: sha256:lang-zh-cn-v2
      provenance_ref: langgraph://put/thread-abc-17
      lifecycle_state: active
      namespace: [tenant-7, user-42, preferences]
      key: response-language
    related_node_ids: [MemoryEntity, MemoryRecord, MemoryStore, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-entity-langgraph, claim-memory-entity-design]
  - id: memory-entity-example-namespace-boundary
    labels:
      zh: 命名空间不是记忆实体
      en: Namespace is not a memory entity
      ja: namespace は memory entity ではない
    descriptions:
      zh: LangGraph namespace=("tenant-7","user-42","preferences") 只定义记录集合的寻址分区，没有被记住的内容、载体版本或内容生命周期；它组织 MemoryEntity，但本身是 MemoryNamespace 而不是 MemoryEntity。
      en: LangGraph namespace=("tenant-7","user-42","preferences") defines only an addressing partition with no remembered content, carrier version, or content lifecycle; it organizes MemoryEntities as MemoryNamespace, not MemoryEntity.
      ja: namespace=("tenant-7","user-42","preferences") は住所区分のみで記憶内容・carrier 版・内容 lifecycle を持たない。MemoryEntity を組織する MemoryNamespace であり MemoryEntity ではない。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: ListNamespacesOp and namespace tuple
    field_values:
      namespace_path: [tenant-7, user-42, preferences]
      is_memory_entity: false
    related_node_ids: [MemoryEntity, MemoryNamespace, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-entity-langgraph, claim-memory-entity-design]
parent_relation: null
relations: []
sources:
  - id: src-mem0-entity
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Memory object with id, memory, user_id, created_at, updated_at.
  - id: src-letta-entity
    title: Letta Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory
    source_type: official-doc
    relevance: Core blocks and archival passages as memory carriers.
  - id: src-langgraph-entity
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore Item with namespace, key, value, timestamps.
  - id: src-memory-entity-design
    title: Moonweave memory-stores-scopes genus design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: MemoryEntity as genus separating content from store and scope facets.
source_claims:
  - id: claim-memory-entity-mem0
    source: src-mem0-entity
    supports: Mem0 returns memory objects with stable id, text content, entity scoping fields, and timestamps suitable for MemoryEntity mapping.
    locator: Add and get memory API response schema
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-entity-letta
    source: src-letta-entity
    supports: Letta core blocks and archival passages are addressable memory carriers with editable or searchable content distinct from store facilities.
    locator: Core concepts > memory — blocks and archival
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-entity-langgraph
    source: src-langgraph-entity
    supports: LangGraph Item combines namespace, key, value, and timestamps as a durable memory entry mappable to MemoryEntity via MemoryRecord.
    locator: Item, PutOp, GetOp
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-entity-design
    source: src-memory-entity-design
    supports: Moonweave MemoryEntity unifies logical identity and lifecycle across Record, Item, and File branches while excluding store and scope specifications.
    locator: MemoryEntity genus boundary
    evidence_kind: design-inference
    confidence: high
