schema: moonweave.ai/ontology-node/v1
id: MemoryEntity
kind: concept
status: accepted
labels:
  zh: 记忆实体
  en: Memory Entity
  ja: 記憶エンティティ
semantics:
  short_definition:
    zh: 一个被明确登记、可独立识别并作为代理持久记忆管理的内容或表示工件的抽象类别。
    en: An abstract class for a deliberately registered, independently identifiable content or representation artifact managed as persistent agent memory.
    ja: persistent agent memory として明示的に登録され、独立して識別できる content 又は representation artifact の抽象クラス。
  definition:
    zh: >-
      MemoryEntity 是用于统一描述已被系统明确登记为持久代理记忆的独立工件的抽象概念。一个实体具有稳定的
      memory_entity_id 和 representation_kind，并可选择关联来源信息。具体实现包括键值存储表示 MemoryItem、
      版本化文件工件 MemoryFile 和具备语义、范围、版本及生命周期的 MemoryRecord。它不是每一段普通文本、
      每条消息历史、MemoryStore、MemoryNamespace、MemoryScope、EmbeddingVector、VectorIndex、检索候选、
      重排输出或 Context Assembly。内容相似、被一次检索命中或被模型看到都不会自动把对象登记为 MemoryEntity。
    en: >-
      MemoryEntity is an abstract concept for an independent artifact explicitly registered as persistent agent memory.
      An entity has stable memory_entity_id and representation_kind and may link to provenance. Concrete forms include
      key-value storage representation MemoryItem, versioned file artifact MemoryFile, and MemoryRecord with semantic,
      scope, version, and lifecycle facts. It is not every ordinary text span, every message-history entry, a MemoryStore,
      MemoryNamespace, MemoryScope, EmbeddingVector, VectorIndex, retrieval candidate, reranking output, or Context
      Assembly. Similar content, one retrieval hit, or model visibility never automatically registers an object as a MemoryEntity.
    ja: >-
      MemoryEntity は persistent agent memory として明示的に登録された独立 artifact を表す抽象概念です。entity は
      安定した memory_entity_id と representation_kind を持ち、provenance に link できます。具体形には key-value
      storage representation の MemoryItem、versioned file artifact の MemoryFile、semantic、scope、version、
      lifecycle fact を持つ MemoryRecord が含まれます。すべての通常 text span、すべての message-history entry、
      MemoryStore、MemoryNamespace、MemoryScope、EmbeddingVector、VectorIndex、retrieval candidate、reranking output、
      Context Assembly ではありません。類似 content、一回の retrieval hit、model visibility によって object が自動で
      MemoryEntity に登録されることはありません。
  why_needed:
    zh: >-
      记忆平面需要一个能连接多种持久化表示的最小抽象层，但不能抹去存储、来源、检索和提示词之间的边界。该层使
      具体子类可以共享可审计的身份与登记语义，同时仍让每种表示保留自己的地址和行为。
    en: >-
      The memory plane needs a minimal abstraction that connects multiple persistent representations without erasing the
      boundaries between storage, provenance, retrieval, and prompts. It lets concrete subclasses share auditable identity
      and registration semantics while each representation keeps its own address and behavior.
    ja: >-
      memory plane には storage、provenance、retrieval、prompt の境界を消さずに複数の persistent representation を
      接続する最小の abstraction が必要です。concrete subclass は audit 可能な identity と registration semantics を
      共有できる一方、各 representation は固有の address と behavior を維持します。
  includes:
    - zh: 已登记的键值记忆项目、具有可校验版本的记忆文件，以及具有记录标识、范围和来源的记忆记录。
      en: A registered key-value memory item, a memory file with a verifiable version, and a memory record with record identity, scope, and provenance.
      ja: 登録済み key-value memory item、verify 可能な version を持つ memory file、record identity、scope、provenance を持つ memory record。
  excludes:
    - zh: 未登记的原始网页文本、单条聊天消息、存储设施或命名空间、向量与索引、检索候选、重排结果以及模型可见上下文。
      en: Unregistered raw web text, one chat message, a storage facility or namespace, a vector or index, a retrieval candidate, a reranking result, and model-visible context.
      ja: 未登録の raw web text、一つの chat message、storage facility 又は namespace、vector 又は index、retrieval candidate、reranking result、model-visible context。
  semantic_kind: entity
  aliases: [registered memory artifact, persistent memory entity]
engineering:
  explanation:
    zh: >-
      登记步骤为工件分配 memory_entity_id、声明 representation_kind，并记录可用的来源引用。随后具体子类负责其
      自己的存储地址和操作：MemoryItem 使用存储加路径加键，MemoryFile 使用定位符加摘要，MemoryRecord 使用记录
      标识、范围和版本。检索仅返回候选；Context Assembly 另行选择、排序、裁剪并呈现内容。
    en: >-
      Registration assigns memory_entity_id, declares representation_kind, and records available provenance references.
      Concrete subclasses then own their storage address and operations: MemoryItem uses store plus path plus key,
      MemoryFile uses locator plus digest, and MemoryRecord uses record identity, scope, and version. Retrieval returns
      candidates only; Context Assembly separately selects, orders, trims, and presents content.
    ja: >-
      registration は memory_entity_id を割り当て、representation_kind を宣言し、利用可能な provenance reference を
      記録します。concrete subclass はその後それぞれの storage address と operation を担当します。MemoryItem は store と
      path と key、MemoryFile は locator と digest、MemoryRecord は record identity、scope、version を使用します。retrieval は
      candidate だけを返し、Context Assembly が別途 content を選択、順序付け、切り詰め、提示します。
  typical_input:
    - description: Register a file-backed memory artifact
      format: |
        registration = {
          "memory_entity_id": "memory-entity-policy-p-88-v4",
          "representation_kind": "file-artifact",
          "provenance_ref": "policy-source-p-88-v4"
        }
        register_memory_entity(registration)
  typical_output:
    - description: Registered abstract entity with concrete representation
      format: |
        {
          "memory_entity_id": "memory-entity-policy-p-88-v4",
          "representation_kind": "file-artifact",
          "concrete_entity_ref": "policy-source-p-88-v4",
          "model_visible": false
        }
  reference_implementations:
    - name: LangGraph long-term Store
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents explicit long-term Store items addressed by namespaces and keys.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines independently identifiable entities and provenance relationships.
structure:
  identity_keys: [memory_entity_id]
  fields:
    - id: memory_entity_id
      labels:
        zh: 记忆实体标识
        en: memory entity ID
        ja: memory entity ID
      definitions:
        zh: 稳定标识一个已登记的抽象记忆实体；具体子类可保留额外的存储或版本身份。
        en: Stably identifies one registered abstract memory entity; concrete subclasses can retain additional storage or version identity.
        ja: 一つの登録済み abstract memory entity を安定して識別する。concrete subclass は追加の storage 又は version identity を保持できる。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-entity-policy-p-88-v4
      source_claims: [claim-memory-entity-independent-identity]
    - id: representation_kind
      labels:
        zh: 表示类别
        en: representation kind
        ja: representation 種別
      definitions:
        zh: 声明实体被登记为 store-item、file-artifact、memory-record 或 tombstone 的哪种具体表示，而不是内容主题或检索算法。
        en: Declares whether the entity is registered as store-item, file-artifact, memory-record, or tombstone representation, not its content topic or retrieval algorithm.
        ja: entity が store-item、file-artifact、memory-record、tombstone のどの representation として登録されたかを宣言する。content topic や retrieval algorithm ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [store-item, file-artifact, memory-record, tombstone]
      pattern: null
      example_value: file-artifact
      source_claims: [claim-memory-entity-representation-boundary]
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: provenance 参照
      definitions:
        zh: 可选引用描述实体产生、登记或来源的可审计证据；它不是存储地址、检索分数或模型提示词位置。
        en: Optionally references auditable evidence describing entity origin, registration, or source; it is not a storage address, retrieval score, or model-prompt position.
        ja: entity の origin、registration、source を表す audit 可能な evidence を任意に参照する。storage address、retrieval score、model-prompt position ではない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: policy-source-p-88-v4
      source_claims: [claim-memory-entity-independent-identity]
  constraints:
    - id: memory-entity-registration-identity
      severity: error
      expression_language: plain
      expression: memory_entity_id and representation_kind are required for a registered MemoryEntity. The identifier must resolve to one registration, and the representation kind must correspond to explicit subtype facts rather than a retrieval score, content similarity, or model visibility.
      explanation:
        zh: 记忆实体的登记需要稳定身份与可验证表示；算法输出或一次模型调用不能替代该登记事实。
        en: Memory-entity registration needs stable identity and verifiable representation; an algorithm output or one model call cannot substitute for that registration fact.
        ja: memory-entity registration には安定 identity と verify 可能な representation が必要である。algorithm output や一回の model call はその registration fact の代わりにならない。
      source_claims: [claim-memory-entity-independent-identity, claim-memory-entity-representation-boundary]
    - id: memory-entity-role-boundary
      severity: error
      expression_language: plain
      expression: MemoryEntity is an abstract registered artifact, not a catch-all for messages, stores, namespaces, scopes, vectors, indexes, retrieval candidates, reranking outputs, or Context Assembly. A concrete object joins this class only through explicit registration or subtype evidence.
      explanation:
        zh: 通用内容、运行设施和检索或提示词中间结果都有独立语义；它们不能仅因可被代理使用而自动成为持久记忆实体。
        en: General content, runtime facilities, and retrieval or prompt intermediates have independent semantics and cannot become persistent memory entities merely because an agent can use them.
        ja: 一般 content、runtime facility、retrieval 又は prompt intermediate には独立した semantics があり、agent が使えるだけで persistent memory entity にはならない。
      source_claims: [claim-memory-entity-role-boundary]
  required_relations: []
examples:
  - id: memory-entity-positive-example

    labels:
      zh: 已登记用户偏好记录
      en: Registered user-preference record
      ja: 登録済み user-preference record

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values: {memory_entity_id: memory-entity-pref-u-123-v2, representation_kind: memory-record, provenance_ref: ingestion-run-pref-u-123}
    related_node_ids: [MemoryEntity, MemoryRecord, IngestionRun]
    related_relation_ids: []

    source_claims: [claim-memory-entity-independent-identity]
  - id: memory-entity-boundary-example

    labels:
      zh: 相似向量但未登记
      en: Similar vector but unregistered
      ja: 類似 vector だが未登録

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values: {embedding_id: embedding-query-77, model: text-embedding-3-small, usage: retrieval-query, registration_state: unregistered}
    related_node_ids: [MemoryEntity, EmbeddingVector, RetrievalQuery]
    related_relation_ids: []

    source_claims: [claim-memory-entity-role-boundary]
  - id: memory-entity-counterexample-example

    labels:
      zh: 单条消息历史不是记忆实体
      en: One history message is not a memory entity
      ja: 一つの history message は memory entity ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values: {message_id: message-501, thread_id: thread-t-401, checkpoint_ref: checkpoint-thread-t-401-v9, registration_state: unregistered}
    related_node_ids: [MemoryEntity, MessageHistory, Checkpoint]
    related_relation_ids: []

    source_claims: [claim-memory-entity-store-boundary, claim-memory-entity-role-boundary]
  - id: memory-entity-instance-example

    labels:
      zh: 实例：已登记政策文件工件
      en: "Instance: registered policy file artifact"
      ja: "事例: 登録済み policy file artifact"

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values: {memory_entity_id: memory-entity-policy-p-88-v4, representation_kind: file-artifact, provenance_ref: policy-source-p-88-v4}
    related_node_ids: [MemoryEntity, MemoryFile, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-memory-entity-independent-identity, claim-memory-entity-role-boundary]
parent_relation: null
relations: []
sources:
  - id: langgraph-memory-store
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents explicit long-term Store items addressed by namespace and key, separately from thread-scoped short-term memory.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines independently identifiable entities and relationships to activities and provenance information.
source_claims:
  - id: claim-memory-entity-independent-identity
    source: w3c-prov-o
    supports: PROV-O describes independently identifiable entities and their provenance relations. Moonweave uses a stable entity ID and optional provenance reference for artifacts explicitly registered as persistent agent memory.
    locator: "PROV-O: Entity, Activity, and provenance relations"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-entity-store-boundary
    source: langgraph-memory-store
    supports: LangGraph distinguishes thread-scoped short-term state from explicit long-term Store items addressed by namespaces and keys. Moonweave does not treat raw checkpoint history as automatically registered persistent memory.
    locator: "Memory guide: short-term memory and long-term memory"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-entity-representation-boundary
    source: langgraph-memory-store
    supports: LangGraph Store addressing makes a concrete item representation explicit. Moonweave uses representation_kind to distinguish registered store-item, file-artifact, record, and tombstone forms without treating a vector, index, candidate, or prompt as one of those forms.
    locator: "Memory guide: long-term Store operations"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-entity-role-boundary
    source: w3c-prov-o
    supports: PROV-O keeps entities, activities, and derived entities distinct. Moonweave separately models runtime facilities, retrieval outputs, and model-context assembly, so use by an agent does not alone register an object as a MemoryEntity.
    locator: "PROV-O: Entity, Activity, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
