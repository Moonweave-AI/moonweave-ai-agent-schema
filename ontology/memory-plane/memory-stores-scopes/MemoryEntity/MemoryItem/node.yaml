sibling_differentiation:
  - sibling_concept_id: MemoryRecord
    shared_parent_concept_id: MemoryEntity
    differentia:
      zh: 已审查兄弟区分：父节点 MemoryEntity：MemoryItem（semantic kind=information，骨架 MemoryItem-is_a-MemoryEntity）；MemoryRecord（semantic kind=information，骨架 MemoryRecord-is_a-MemoryEntity）。双端条件：MemoryItem 条件：“记忆项是一种记忆实体；其区分条件是：它是可寻址记忆单元，可保存为文本、摘要、向量支撑分块、经验、偏好、程序或反思”；MemoryRecord 条件：“记忆记录是一种记忆实体；其区分条件是：它是持久或会话级记忆条目，包含内容、来源、类型、命名空间、作用范围、保留状态、置信度和生命周期历史”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MemoryEntity: MemoryItem (semantic kind=information, backbone MemoryItem-is_a-MemoryEntity); MemoryRecord (semantic kind=information, backbone MemoryRecord-is_a-MemoryEntity). Endpoint conditions: MemoryItem condition: “As a memory entity, Memory item is distinguished by the fact that it is an addressable memory unit that may be stored as text, summary, vector-backed chunk, experience, preference, procedure, or reflection”; MemoryRecord condition: “As a memory entity, Memory record is distinguished by the fact that it is a persistent or session-scoped memory entry with content, provenance, type, namespace, scope, retention state, confidence, and lifecycle history”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MemoryEntity：MemoryItem（semantic kind=information、バックボーン MemoryItem-is_a-MemoryEntity）；MemoryRecord（semantic kind=information、バックボーン MemoryRecord-is_a-MemoryEntity）。両端条件：MemoryItem の条件：「記憶実体に属する記憶項目は、次の事実を種差とします：それは、テキスト、要約、ベクトル付きチャンク、経験、選好、手続き、反省として保存され得るアドレス可能な記憶単位です」；MemoryRecord の条件：「記憶実体に属する記憶レコードは、次の事実を種差とします：それは、内容、来歴、型、名前空間、スコープ、保持状態、信頼度、ライフサイクル履歴を持つ永続またはセッション単位の記憶項目です」。一方の成立は他方を証明しません。
    source_claims:
      - claim-memory-item-007
