schema: moonweave.ai/ontology-node/v1
id: MemoryItem
kind: concept
labels:
  zh: 记忆项
  en: memory item
  ja: 記憶項目
semantics:
  short_definition:
    zh: 可独立寻址和检索、表达一个事实、偏好、经验、程序或反思的逻辑记忆单元。
    en: An independently addressable and retrievable logical memory unit expressing one fact, preference, experience, procedure, or reflection.
    ja: 一つの事実・選好・経験・手順・省察を表す、独立アドレス可能で検索可能な論理記憶単位です。
  definition:
    zh: MemoryItem 是一种 MemoryEntity；其种差是语义上可独立寻址、可检索和可遗忘的最小记忆单元，以 item_id 与内容语义标识，保持 storage-neutral——Mem0 的 memory 文本、Letta block 内一句事实、LangGraph key 所指向的“含义”都可表达为 Item，但数据库行、文件路径或 Pinecone vector id 不决定其身份。MemoryRecord 可在某一时刻表示 Item，但 Item 不等于持久记录本身。
    en: A MemoryItem is a MemoryEntity whose differentia is the smallest semantically independent unit that can be addressed, retrieved, and forgotten, identified by item_id and content meaning while remaining storage-neutral. Mem0 memory text, a fact inside a Letta block, or the meaning behind a LangGraph key can be Items, but database rows, file paths, or Pinecone vector ids do not determine item identity. A MemoryRecord may represent an Item at a point in time, but the item is not the persistence record itself.
    ja: MemoryItem は item_id と内容意味で識別される最小 semantic memory unit で storage-neutral。Mem0 memory text、Letta block 内事実、LangGraph key の「意味」が Item になり得るが、DB 行・file path・Pinecone vector id は identity を決めない。MemoryRecord が一時的に表現し得るが Item≠永続 record。
  why_needed:
    zh: 用户说“忘记我的语言偏好”时，系统应针对一条逻辑事实操作，而不是误删整个 preferences.md 或 Pinecone namespace。MemoryItem 让检索、更新、合并和遗忘以语义单元为粒度。
    en: When a user says “forget my language preference,” the system should target one logical fact—not delete all of preferences.md or a Pinecone namespace. MemoryItem makes retrieval, update, merge, and forget operate at semantic-unit granularity.
    ja: 「言語選好を忘れて」要求は論理事実一つを対象とし、preferences.md 全体や Pinecone namespace 誤削除を防ぐ。MemoryItem で検索・更新・マージ・忘却を semantic unit 粒度に。
  includes:
    - zh: “用户偏好简体中文”“部署前必须运行 schema gate”等具有独立 item_id、来源与版本、可单独检索和更新的原子或小粒度记忆。
      en: Atomic or small-grained memories such as “user prefers Simplified Chinese” or “run schema gate before deploy,” with independent item ID, provenance, version, retrieval, and update.
      ja: 「簡体字中国語を好む」「配備前に schema gate」等、独立 item_id・来歴・版を持ち単独検索・更新できる atomic/small-grained 記憶。
  excludes:
    - zh: 整个 MemoryFile、MemoryStore、只含存储状态的 MemoryRecord、检索时生成的 RetrievedCandidate 和一次调用内的 ContextSlot。
      en: An entire MemoryFile, MemoryStore, a MemoryRecord containing only storage state, a runtime RetrievedCandidate, and a call-local ContextSlot.
      ja: MemoryFile 全体、MemoryStore、保存状態だけの MemoryRecord、実行時 RetrievedCandidate、一回 call 内 ContextSlot。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Mem0 提取的 memory 字符串、Letta human block 中的一句偏好、LangGraph store 中 key=response-language 所表达的命题，都映射为 MemoryItem。集成时保留 item_id 稳定键，把 mem0 id、namespace/key 或 file section 作为 MemoryItem-represented_by-MemoryRecord 的外部表示，而非 item 身份本身。
    en: Mem0 extracted memory strings, a preference sentence in a Letta human block, and the proposition behind LangGraph key=response-language map to MemoryItem. Integrations keep a stable item_id and treat mem0 id, namespace/key, or file section as external representations via MemoryItem-represented_by-MemoryRecord—not as the item identity itself.
    ja: Mem0 抽出 memory 文字列、Letta human block 内選好、LangGraph key=response-language の命題を MemoryItem に写像。item_id を安定鍵とし、mem0 id/namespace/key/file section は MemoryItem-represented_by-MemoryRecord の外部表現に留める。
  typical_input:
    - description: Mem0 memory text after add or search — semantic content without storage address.
      format: |
        {
          "memory": "Prefers Simplified Chinese for responses.",
          "user_id": "alice",
          "metadata": {"category": "preferences"}
        }
      source_claims: [claim-memory-item-mem0]
    - description: LangGraph logical value addressed by key within a namespace.
      format: |
        key: response-language
        value: {"language": "zh-CN"}
        # semantic item = "user response language is zh-CN"
      source_claims: [claim-memory-item-langgraph]
  typical_output:
    - description: Moonweave-local MemoryItem with storage-neutral identity.
      format: |
        {
          "memory_entity_id": "item-pref-language",
          "entity_version": "3",
          "content_digest": "sha256:pref-language-zh-cn-v3",
          "provenance_ref": "conversation://user/turn-3",
          "lifecycle_state": "active"
        }
      source_claims: [claim-memory-item-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Extracted memory strings scoped by user_id, agent_id, run_id.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Namespace-key values whose stable meaning maps to logical items.
    - name: Letta Core Memory
      url: https://docs.letta.com/guides/core-concepts/memory
      description: Editable block content carrying discrete learned facts.
structure:
  identity_keys:
    - item_id
  fields:
    - id: item_id
      labels: {zh: 记忆项标识, en: memory item ID, ja: 記憶 item ID}
      definitions:
        zh: 跨存储后端稳定标识同一语义记忆单元的逻辑键；不同于 Mem0 id 或 LangGraph key alone。
        en: Stable logical key identifying the same semantic memory unit across backends; distinct from Mem0 id or LangGraph key alone.
        ja: backend 横断で同一 semantic memory unit を識別する logical key。Mem0 id/LangGraph key 単独とは別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: item-pref-language
      allowed_values: []
      source_claims: [claim-memory-item-design]
    - id: content_text
      labels: {zh: 内容文本, en: content text, ja: 内容 text}
      definitions:
        zh: 该版本 Item 所表达的可读命题或偏好文本；对应 Mem0 memory 字段。
        en: Readable proposition or preference text this item version expresses; maps to Mem0 memory field.
        ja: 当該版 Item が表す可読命題・選好 text。Mem0 memory field に対応。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Prefers Simplified Chinese for responses.
      allowed_values: []
      source_claims: [claim-memory-item-mem0]
    - id: memory_category
      labels: {zh: 记忆类别, en: memory category, ja: 記憶 category}
      definitions:
        zh: 可选语义分类，如 preference、procedure、fact；常来自 Mem0 metadata.category。
        en: Optional semantic category such as preference, procedure, or fact; often from Mem0 metadata.category.
        ja: preference/procedure/fact 等の optional semantic category。Mem0 metadata.category 由来が多い。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: preferences
      allowed_values: []
      source_claims: [claim-memory-item-mem0]
  constraints:
    - id: memory-item-storage-neutral
      severity: error
      expression_language: plain
      expression: item_id and content meaning determine MemoryItem identity; no database row, file path, namespace, vector id, or backend alone may serve as the sole identity key
      explanation:
        zh: Item 身份必须由语义单元键决定，不能把存储地址当作被记住的语义本身。
        en: Item identity must be determined by the semantic unit key, not storage address as the remembered meaning itself.
        ja: Item identity は semantic unit key で決め、storage address を記憶意味自体にしてはならない。
      source_claims: [claim-memory-item-design]
  required_relations: []
examples:
  - id: memory-item-example-mem0-language-preference
    labels:
      zh: Mem0 语言偏好记忆项
      en: Mem0 language preference memory item
      ja: Mem0 言語選好 memory item
    descriptions:
      zh: Mem0 从 Alice 的对话提取 “Prefers Simplified Chinese for responses.” 并写入 user_id=alice。Moonweave 将其建模为 item_id=item-pref-language 的 MemoryItem；mem0-8f3c2a1b 是 MemoryRecord 外部 id，不是 item 身份。
      en: Mem0 extracts "Prefers Simplified Chinese for responses." from Alice's conversation under user_id=alice. Moonweave models it as MemoryItem item_id=item-pref-language; mem0-8f3c2a1b is an external MemoryRecord id, not the item identity.
      ja: Mem0 が Alice 会話から “Prefers Simplified Chinese for responses.” を user_id=alice で抽出。item_id=item-pref-language の MemoryItem。mem0-8f3c2a1b は外部 MemoryRecord id で item identity ではない。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/ extracted memory
    field_values:
      item_id: item-pref-language
      content_text: Prefers Simplified Chinese for responses.
      memory_category: preferences
      user_id: alice
    related_node_ids: [MemoryItem, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [MemoryItem-represented_by-MemoryRecord]
    source_claims: [claim-memory-item-mem0, claim-memory-item-design]
  - id: memory-item-example-langgraph-key-meaning
    labels:
      zh: LangGraph key 级逻辑记忆项
      en: LangGraph key-level logical memory item
      ja: LangGraph key 級 logical memory item
    descriptions:
      zh: LangGraph 应用在 namespace=("tenant-7","user-42","preferences") 下 key=response-language 存储 {"language":"zh-CN"}。语义上是“用户响应语言为 zh-CN”这一 MemoryItem；BaseStore Item 地址映射为 MemoryRecord 表示。
      en: A LangGraph app stores {"language":"zh-CN"} at namespace=("tenant-7","user-42","preferences"), key=response-language. Semantically this is MemoryItem “user response language is zh-CN”; the BaseStore address maps to a MemoryRecord representation.
      ja: LangGraph アプリが namespace=("tenant-7","user-42","preferences"), key=response-language に {"language":"zh-CN"} を保存。意味上は MemoryItem「ユーザー応答言語は zh-CN」。BaseStore 住所は MemoryRecord 表現へ写像。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.put namespace and key
    field_values:
      item_id: item-response-language
      content_text: User response language is zh-CN.
      namespace: [tenant-7, user-42, preferences]
      key: response-language
    related_node_ids: [MemoryItem, MemoryRecord, MemoryStore, memory-stores-scopes]
    related_relation_ids: [MemoryItem-represented_by-MemoryRecord]
    source_claims: [claim-memory-item-langgraph, claim-memory-item-design]
  - id: memory-item-example-letta-block-fact
    labels:
      zh: Letta 块内单条事实记忆项
      en: Letta single-fact memory item in block
      ja: Letta block 内単一事実 memory item
    descriptions:
      zh: "Letta human block 含 Name: Alice. Timezone: JST. 其中 Timezone: JST 可独立更新与检索，建模为 item_id=item-timezone-alice。整个 block 是载体，不是 Item 本身。"
      en: "A Letta human block contains Name: Alice. Timezone: JST. The fact Timezone: JST can be updated and retrieved independently as item_id=item-timezone-alice. The whole block is a carrier, not the item itself."
      ja: "Letta human block に Name: Alice. Timezone: JST. Timezone: JST は item_id=item-timezone-alice として独立更新・検索可。block 全体は carrier で Item 自体ではない。"
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory
      version: core_memory_replace human block
    field_values:
      item_id: item-timezone-alice
      content_text: User timezone is JST.
      block_label: human
    related_node_ids: [MemoryItem, MemoryFile, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [MemoryItem-represented_by-MemoryRecord]
    source_claims: [claim-memory-item-letta, claim-memory-item-design]
  - id: memory-item-example-file-carrier-boundary
    labels:
      zh: 记忆文件不是记忆项
      en: Memory file is not a memory item
      ja: memory file は memory item ではない
    descriptions:
      zh: memories/preferences.md 同时保存语言、时区与输出格式三项偏好，以路径和文件版本 v12 为身份。它是 MemoryFile 载体，而不是其中任一 MemoryItem；共享 MemoryEntity 上位不等于身份条件可互换。
      en: memories/preferences.md stores language, timezone, and output-format preferences, identified by path and file version v12. It is a MemoryFile carrier, not any one MemoryItem; shared MemoryEntity ancestry does not make identity conditions interchangeable.
      ja: memories/preferences.md は言語・timezone・出力形式三選好を path/file 版 v12 で識別。MemoryFile carrier で個別 MemoryItem ではない。MemoryEntity 共通上位でも identity 条件は interchangeable ではない。
    example_source:
      product: Deep Agents
      url: https://docs.langchain.com/oss/javascript/deepagents/memory
      version: memory file carrier versus learned facts
    field_values:
      file_path: /memories/preferences.md
      entity_version: v12
      is_memory_item: false
    related_node_ids: [MemoryItem, MemoryFile, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-item-deepagents, claim-memory-item-design]
parent_relation:
  id: MemoryItem-is_a-MemoryEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆实体
    en: is a memory entity
    ja: 記憶実体の一種
  definitions:
    zh: 每个 MemoryItem 都是 MemoryEntity；其种差是可独立检索、更新或遗忘的最小语义记忆单元，并保持 storage-neutral。
    en: Every MemoryItem is a MemoryEntity distinguished as the smallest semantic memory unit independently retrievable, updateable, or forgettable while remaining storage-neutral.
    ja: すべての MemoryItem は MemoryEntity で、独立に検索・更新・忘却できる最小 semantic memory unit という種差を持ち storage-neutral。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-item-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryItem-represented_by-MemoryRecord
    predicate: represented_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由持久记录表示
      en: represented by persistent record
      ja: 永続記録により表現される
    definitions:
      zh: MemoryItem-represented_by-MemoryRecord 把 storage-neutral 的语义记忆版本连接到承载其内容的一个持久记录版本；同一 Item 可有多个后端或历史 Record 表示，但不合并身份。
      en: MemoryItem-represented_by-MemoryRecord links a storage-neutral semantic memory version to one persistent record version carrying its content. The same Item may have representations in several backends or history versions without merging identities.
      ja: storage-neutral semantic memory 版を内容を担う一永続 record 版へ結ぶ。同一 Item は複数 backend/履歴 Record で表現され得るが identity は merge しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: 検索可能な意味事実を記録し、全実行 instance に一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_represented_by
      labels: {zh: 反向：represented by, en: is target of represented by, ja: 逆方向：represented by}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-memory-item-design]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:MemoryRecord
sources:
  - id: src-mem0-item
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Extracted memory text and metadata as semantic content.
  - id: src-deepagents-item
    title: Deep Agents Memory Documentation
    publisher: LangChain
    url: https://docs.langchain.com/oss/javascript/deepagents/memory
    source_type: official-doc
    relevance: File carriers versus individual learned facts within files.
  - id: src-langgraph-item
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: Namespace-key values as logical memory meanings.
  - id: src-letta-item
    title: Letta Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory
    source_type: official-doc
    relevance: Discrete facts within editable core blocks.
  - id: src-memory-item-design
    title: Moonweave MemoryItem storage-neutral design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates semantic item from persistence record identity.
source_claims:
  - id: claim-memory-item-mem0
    source: src-mem0-item
    supports: Mem0 memory field carries the semantic content of one addressable remembered fact independent of storage backend.
    locator: Memory object memory field and metadata
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-item-langgraph
    source: src-langgraph-item
    supports: LangGraph store values under namespace and key express stable logical meanings mappable to MemoryItem separate from Item persistence entry.
    locator: BaseStore put/get and Item schema
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-item-letta
    source: src-letta-item
    supports: Letta core blocks can contain independently editable learned facts within one in-context carrier.
    locator: Core memory blocks and core_memory_replace
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-item-deepagents
    source: src-deepagents-item
    supports: Deep Agents distinguishes file carriers from individual learned facts edited within files.
    locator: Memory files versus learned information
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-item-design
    source: src-memory-item-design
    supports: Moonweave MemoryItem remains storage-neutral with item_id while MemoryRecord holds namespace-key or API addresses.
    locator: MemoryItem differentia
    evidence_kind: design-inference
    confidence: high
