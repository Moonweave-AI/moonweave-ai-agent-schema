      en: MemoryItem-represented_by-MemoryRecord links a storage-neutral semantic memory version to one persistent record version carrying its content. The same Item may have representations in several backends or history versions without merging their identities.
      ja: MemoryItem-represented_by-MemoryRecord は storage-neutral な意味記憶版をその内容を担う一永続記録版へ結びます。同一 Item は複数backend・履歴Recordで表現され得ますが同一化しません。
