source_claims:
  - id: claim-memory-item-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents describes persistent memory as learned information stored and updated across conversations, including semantic facts and procedural skills. MemoryItem is Moonweave's smallest business-addressable remembered meaning, independent of whether a file, record, graph, or vector entry represents it.
    locator: Memory > How memory works > learned information and file updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-002
    source: eng-fw-langgraph-docs
    supports: LangGraph Store persists memory values under a namespace and key for retrieval across threads. Moonweave interprets the key-addressable logical meaning as MemoryItem and separates it from record metadata, file carrier, and store facility.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' Memory documentation describes storing learned information in files and updating it across conversations. The single preference in this example is Moonweave's logical MemoryItem independent of its file or record representation.
    locator: Memory > How memory works > learned information and file updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-004
    source: eng-fw-langgraph-docs
    supports: LangGraph's memory model stores values under namespace and key and retrieves them across threads. item-pref-language corresponds to the stable logical key-level memory, while Moonweave separately models its record version.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents can load a complete memory file while editing individual learned facts within it. This operational distinction supports Moonweave's logical item versus file carrier boundary.
    locator: Memory > How memory works > learned information and file updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-006
    source: eng-fw-langgraph-docs
    supports: LangGraph Store addresses individual values by namespace and key rather than treating the entire backend as one memory. Moonweave applies that addressability criterion to MemoryItem.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents describes learned facts that persist and are updated in memory files across conversations. Moonweave distinguishes the stable remembered meaning as MemoryItem from each versioned, provenance-bearing MemoryRecord that represents it at a point in time; Deep Agents does not prescribe this item-versus-record taxonomy.
    locator: Memory > How memory works > learned information and file updates across conversations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-item-008
    source: eng-fw-langgraph-memory-store
    supports: The proposition remains addressable by semantic identity even before a particular BaseStore address is chosen.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-item-009
    source: eng-fw-langgraph-memory-store
    supports: An object identified by namespace and key matches the persistent Item contract in the BaseStore reference and is therefore a MemoryRecord rather than the storage-neutral semantic unit.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-item-010
    source: eng-fw-langgraph-memory-store
    supports: LangGraph Item is a stored key-value entry; Moonweave deliberately separates the storage-neutral semantic unit from that persistence entry so one item can have several representations.
