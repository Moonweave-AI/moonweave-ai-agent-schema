schema: moonweave.ai/ontology-node/v1
id: MemoryItem
kind: concept
status: accepted
labels:
  zh: 记忆存储条目
  en: Memory Item
  ja: 記憶ストア項目
semantics:
  short_definition:
    zh: 由一个存储、精确命名空间路径、键和值寻址的持久化键值条目。
    en: A persistent key-value entry addressed by one store, an exact namespace path, a key, and a value.
    ja: 一つの store、正確な namespace path、key、value で address される永続 key-value entry。
  definition:
    zh: >-
      MemoryItem 是在一个具体 MemoryStore 中以完整 namespace_path 与 item_key 寻址的键值存储表示，携带可序列化的
      item_value 及可选创建和更新时间。它对应 Store 的 put、get 和 search 操作返回或写入的项目，并可序列化一个
      MemoryRecord 的内容。它不是该记录的语义身份或版本本身，不是 MemoryNamespace、整个 MemoryStore、文件、
      EmbeddingVector、VectorIndex、消息历史或已经装配的模型上下文。同一个键在不同存储或不同命名空间中表示不同项目。
    en: >-
      A MemoryItem is a key-value storage representation addressed in one concrete MemoryStore by a complete
      namespace_path and item_key, carrying serializable item_value plus optional creation and update times. It is the
      item written or returned by Store put, get, and search operations and may serialize the contents of a MemoryRecord.
      It is not that record's semantic identity or version by itself, a MemoryNamespace, an entire MemoryStore, a file,
      EmbeddingVector, VectorIndex, message history, or already assembled model context. The same key in a different
      store or namespace denotes a different item.
    ja: >-
      MemoryItem は一つの具体的な MemoryStore 内で完全な namespace_path と item_key により address される
      key-value storage representation で、serializable な item_value と任意の作成時刻・更新時刻を持ちます。
      Store の put、get、search operation が書き込み又は返す item であり、MemoryRecord の内容を serialize できます。
      ただし record 自体の semantic identity や version、MemoryNamespace、MemoryStore 全体、file、EmbeddingVector、
      VectorIndex、message history、既に assembly 済みの model context ではありません。別 store 又は別 namespace の
      同じ key は別の item を表します。
  why_needed:
    zh: >-
      存储 API 需要可被精确读取、更新和审计的操作性对象。将该对象与记录语义、文件和检索索引分开，可避免把一次
      API 返回、一个内容版本和一个向量检索入口误当成同一实体。
    en: >-
      Storage APIs need an operational object that can be read, updated, and audited exactly. Separating it from record
      semantics, files, and retrieval indexes prevents one API return, one content version, and one vector-search entry
      from being mistaken for the same entity.
    ja: >-
      storage API には正確に read、update、audit できる operational object が必要です。これを record semantics、file、
      retrieval index と分離すると、一つの API return、一つの content version、一つの vector-search entry を同じ
      entity と誤認しません。
  includes:
    - zh: memory-store-primary 中路径 (users,u-123,profile)、键 preferences、值为 JSON 对象的持久化 Store 项目。
      en: A persistent Store item in memory-store-primary at path (users,u-123,profile), key preferences, with a JSON-object value.
      ja: memory-store-primary の (users,u-123,profile) path、preferences key、JSON object value を持つ永続 Store item。
  excludes:
    - zh: 单独的 namespace 路径、普通文件字节流、纯向量或索引条目、模型输入片段，以及没有存储地址的抽象记忆记录。
      en: A namespace path alone, ordinary file bytes, a bare vector or index entry, a model-input fragment, or an abstract memory record without storage address.
      ja: namespace path 単体、通常の file bytes、単独の vector 又は index entry、model-input fragment、storage address を持たない抽象 memory record。
  semantic_kind: entity
  aliases: [store item, key-value memory item]
engineering:
  explanation:
    zh: >-
      LangGraph 的 Store put 使用 namespace、key 和 JSON value 写入项目；get 用相同 namespace 与 key 精确读取，
      search 在 namespace 范围内返回候选项目。Moonweave 把完整存储地址建模为项目身份，而不会把临时搜索前缀或返回的
      相似度分数写进项目本体。
    en: >-
      LangGraph Store put writes an item with namespace, key, and JSON value; get reads it exactly with the same
      namespace and key, and search returns candidate items within a namespace scope. Moonweave models the complete
      storage address as item identity and does not place a temporary search prefix or returned similarity score in the
      item's ontology identity.
    ja: >-
      LangGraph Store の put は namespace、key、JSON value を持つ item を書き込み、get は同じ namespace と key で
      正確に読み取り、search は namespace scope 内の candidate item を返します。Moonweave は完全な storage address を
      item identity として扱い、一時的な search prefix や返された similarity score を item の ontology identity に
      入れません。
  typical_input:
    - description: Exact Store write
      format: |
        runtime.store.put(
          ("users", "u-123", "profile"),
          "preferences",
          {"theme": "dark", "digest": "sha256:4a2e"},
        )
  typical_output:
    - description: Exact Store lookup result
      format: |
        item = runtime.store.get(
          ("users", "u-123", "profile"),
          "preferences",
        )
        # {"key":"preferences", "value":{"theme":"dark","digest":"sha256:4a2e"}}
  reference_implementations:
    - name: LangGraph long-term Store
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents Store put, get, and search operations using namespace tuples, keys, and JSON values.
structure:
  identity_keys: [memory_entity_id, memory_store_ref, namespace_path, item_key]
  fields:
    - id: memory_entity_id
      labels:
        zh: 记忆实体标识
        en: Memory entity ID
        ja: 記憶エンティティ ID
      definitions:
        zh: 标识已登记的抽象记忆实体；对于 MemoryItem，它补充存储地址并不替代完整 namespace-plus-key 身份。
        en: Identifies the registered abstract memory entity; for a MemoryItem, it complements rather than replaces the full namespace-plus-key storage identity.
        ja: 登録済みの抽象記憶エンティティを識別します。MemoryItem では完全な namespace-plus-key の storage identity を置き換えず補います。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-entity-user-preferences-v1
      source_claims: [claim-memory-item-specialization, claim-memory-item-addressing]
    - id: representation_kind
      labels:
        zh: 表示类别
        en: Representation kind
        ja: 表現種別
      definitions:
        zh: 继承自 MemoryEntity 的表示类别；MemoryItem 将其收窄为 store-item，而不是文件工件、语义记录或墓碑。
        en: The representation category inherited from MemoryEntity; MemoryItem narrows it to store-item rather than a file artifact, semantic record, or tombstone.
        ja: MemoryEntity から継承する表現カテゴリです。MemoryItem は file artifact、semantic record、tombstone ではなく store-item に限定します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [store-item]
      pattern: null
      example_value: store-item
      source_claims: [claim-memory-item-specialization]
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: Provenance reference
        ja: 来歴参照
      definitions:
        zh: 可选地引用创建、迁移或登记该存储项的可审计证据；它不等同于 Store 地址、键或值本身。
        en: Optionally references auditable evidence that created, migrated, or registered the Store item; it is not the Store address, key, or value itself.
        ja: Store item を作成、移行、登録した監査可能な証拠を任意で参照します。Store address、key、value 自体ではありません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: store-write-29
      source_claims: [claim-memory-item-specialization, claim-memory-item-representation-boundary]
    - id: memory_store_ref
      labels:
        zh: 所属存储引用
        en: owning store reference
        ja: 所有 store 参照
      definitions:
        zh: 引用承载此项目的一项具体 MemoryStore；不同存储中的相同路径和键不是同一项目。
        en: References the one concrete MemoryStore that holds this item; the same path and key in another store is not the same item.
        ja: この item を保持する一つの具体的な MemoryStore を参照する。別 store の同じ path と key は同じ item ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-store-primary
      source_claims: [claim-memory-item-addressing]
    - id: namespace_path
      labels:
        zh: 命名空间路径
        en: namespace path
        ja: namespace path
      definitions:
        zh: 以顺序保留的非空路径段组成的完整存储分区地址；它必须标识一个精确集合而不是搜索前缀。
        en: The ordered non-empty path segments that form the complete storage-partition address; it must identify one exact collection rather than a search prefix.
        ja: 完全な storage-partition address を構成する順序付き非空 path segment。search prefix ではなく一つの正確な collection を識別しなければならない。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '["users","u-123","profile"]'
      source_claims: [claim-memory-item-addressing]
    - id: item_key
      labels:
        zh: 项目键
        en: item key
        ja: item key
      definitions:
        zh: 在该存储与完整命名空间路径内唯一寻址项目的非空键。
        en: A non-empty key that addresses the item uniquely within its store and complete namespace path.
        ja: store と完全な namespace path の中で item を一意に address する非空 key。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: preferences
      source_claims: [claim-memory-item-addressing]
    - id: item_value
      labels:
        zh: 项目值
        en: item value
        ja: item value
      definitions:
        zh: 写入该项目的可序列化 JSON 值；它可以表示记录内容，但不是自动获得记录语义身份的证明。
        en: The serializable JSON value written for this item; it may represent record content but does not by itself prove a record's semantic identity.
        ja: この item に書き込まれる serializable JSON value。record content を表せるが、それだけで record の semantic identity を証明しない。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"theme":"dark","digest":"sha256:4a2e"}'
      source_claims: [claim-memory-item-store-value]
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      definitions:
        zh: 可选记录项目首次被该存储写入的时间，而不是原始内容产生或模型看到内容的时间。
        en: Optionally records when this item was first written in this store, not when source content originated or when a model saw it.
        ja: この item がこの store に初めて書き込まれた時刻を任意に記録する。source content の発生時刻や model が見た時刻ではない。
      datatype: datetime
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-18T09:20:01Z'
      source_claims: [claim-memory-item-store-value]
    - id: updated_at
      labels:
        zh: 更新时间
        en: updated at
        ja: 更新時刻
      definitions:
        zh: 可选记录项目值最后一次在该存储中更新的时间，不能代替记录版本或来源时间。
        en: Optionally records when the item value was last updated in this store; it cannot substitute for a record version or provenance time.
        ja: item value がこの store で最後に更新された時刻を任意に記録する。record version や provenance time の代わりにはならない。
      datatype: datetime
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-18T09:25:43Z'
      source_claims: [claim-memory-item-store-value]
  constraints:
    - id: memory-item-canonical-address
      severity: error
      expression_language: plain
      expression: memory_store_ref, namespace_path, item_key, and item_value are required. namespace_path must be an ordered full literal path with no wildcard or query-only prefix, and item_key must be non-empty. The tuple of store reference, full path, and key identifies exactly one MemoryItem.
      explanation:
        zh: 项目必须能被稳定精确地寻址；键仅在指定存储和完整命名空间内唯一，搜索选择器不能成为项目身份。
        en: An item must be stably and exactly addressable. A key is unique only inside its specified store and full namespace, and a search selector cannot become item identity.
        ja: item は安定して正確に address 可能でなければならない。key は指定された store と完全な namespace 内でのみ一意であり、search selector は item identity になれない。
      source_claims: [claim-memory-item-addressing]
    - id: memory-item-representation-boundary
      severity: error
      expression_language: plain
      expression: A MemoryItem is a key-value storage representation. Its item_value may serialize a MemoryRecord only with an explicit record reference or mapping. Do not classify a file, a bare vector, an index entry, a message-history event, or Context Assembly as MemoryItem merely because it contains similar content.
      explanation:
        zh: 内容相似或可序列化不能抹去存储表示与语义记录、文件、向量、历史事件和模型上下文之间的独立边界。
        en: Similar or serializable content cannot erase the independent boundary between a storage representation and a semantic record, file, vector, history event, or model context.
        ja: 類似又は serializable な content は、storage representation と semantic record、file、vector、history event、model context の独立した境界を消去できない。
      source_claims: [claim-memory-item-representation-boundary]
  required_relations: []
examples:
  - id: memory-item-positive-example

    labels:
      zh: 精确用户配置项目
      en: Exact user-preferences item
      ja: 正確な user-preferences item

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values: {memory_entity_id: memory-entity-user-preferences-v1, representation_kind: store-item, provenance_ref: store-write-29, memory_store_ref: memory-store-primary, namespace_path: '["users","u-123","profile"]', item_key: preferences, item_value: '{"theme":"dark"}', created_at: '2026-07-18T09:20:01Z'}
    related_node_ids: [MemoryItem, MemoryEntity, MemoryStore, MemoryNamespace]
    related_relation_ids: [MemoryItem-is_a-MemoryEntity]

    source_claims: [claim-memory-item-addressing, claim-memory-item-store-value]
  - id: memory-item-boundary-example

    labels:
      zh: 相同键但不同存储
      en: Same key, different store
      ja: 同じ key だが別 store

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values: {memory_entity_id: memory-entity-user-preferences-v2, representation_kind: store-item, provenance_ref: store-write-30, memory_store_ref: memory-store-secondary, namespace_path: '["users","u-123","profile"]', item_key: preferences, item_value: '{"theme":"light"}'}
    related_node_ids: [MemoryItem, MemoryStore, MemoryNamespace]
    related_relation_ids: []

    source_claims: [claim-memory-item-addressing]
  - id: memory-item-counterexample-example

    labels:
      zh: 文件字节不是键值项目
      en: File bytes are not a key-value item
      ja: file bytes は key-value item ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values: {memory_entity_id: memory-entity-file-preferences-v1, representation_kind: file-artifact, provenance_ref: ingestion-run-47, canonical_locator: file:///archive/u-123/preferences.json, content_digest: sha256:db71aa, media_type: application/json}
    related_node_ids: [MemoryItem, MemoryFile, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-memory-item-representation-boundary]
  - id: memory-item-instance-example

    labels:
      zh: 实例：项目政策快照项目
      en: "Instance: project-policy snapshot item"
      ja: "事例: project-policy snapshot item"

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values: {memory_entity_id: memory-entity-active-policy-v4, representation_kind: store-item, provenance_ref: store-write-31, memory_store_ref: memory-store-primary, namespace_path: '["projects","p-88","policies"]', item_key: active-policy, item_value: '{"record_ref":"policy-record-p-88-v4","digest":"sha256:8f01"}', updated_at: '2026-07-18T09:25:43Z'}
    related_node_ids: [MemoryItem, MemoryRecord, MemoryNamespace]
    related_relation_ids: [MemoryItem-is_a-MemoryEntity]

    source_claims: [claim-memory-item-addressing, claim-memory-item-representation-boundary]
parent_relation:
  id: MemoryItem-is_a-MemoryEntity
  predicate: is_a
  target: concept:MemoryEntity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是作为存储项的记忆实体
    en: is a memory entity with a Store-item representation
    ja: Store-item 表現を持つ記憶エンティティである
  definitions:
    zh: MemoryItem 是具有完整存储地址和键值载荷的 MemoryEntity 子类，而不是所有记忆实体的通用同义词。
    en: MemoryItem is a subtype of MemoryEntity with a complete Store address and key-value payload, not a general synonym for every memory entity.
    ja: MemoryItem は完全な Store address と key-value payload を持つ MemoryEntity の下位型であり、すべての memory entity の一般的同義語ではない。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有存储项子类
      en: has Store-item subtype
      ja: Store-item 下位型を持つ
  conditions:
    - id: memory-item-is-a-memory-entity-condition
      severity: error
      expression_language: plain
      expression: Assert is_a only when the MemoryEntity has one concrete memory_store_ref, complete namespace_path, non-empty item_key, and serializable item_value. A file, bare vector, index entry, or abstract record without that key-value address is not a MemoryItem subtype.
      explanation:
        zh: 存储项子类要求明确的键值寻址；相似内容或可检索性不足以证明该结构。
        en: The Store-item subtype requires explicit key-value addressing; similar content or retrievability is insufficient evidence for that structure.
        ja: Store-item 下位型には明示的な key-value addressing が必要であり、類似 content や retrievability はその構造の十分な evidence ではない。
      source_claims: [claim-memory-item-specialization]
  temporal_scope: timeless
  boundary_context: A Store search candidate is not a MemoryItem identity unless its concrete store, full namespace path, key, and value are known.
  constraints: []
  examples: []
  source_claims: [claim-memory-item-specialization]
  distinct_fact_rationale: This subtype captures a concrete Store representation, whereas MemoryRecord captures durable memory semantics and MemoryNamespace captures the collection that addresses items.
  layout_role: primary-backbone
relations: []
sources:
  - id: langgraph-memory-store
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents Store put, get, and search operations using namespace tuples, keys, and JSON values for long-term memory.
source_claims:
  - id: claim-memory-item-addressing
    source: langgraph-memory-store
    supports: LangGraph Store writes and reads use an explicit namespace tuple and key, and search operates within a namespace scope. Those operations support a concrete key-value item address made from a store, full namespace, and key.
    locator: "Memory guide: long-term memory; Store put/aput, get, and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-memory-item-store-value
    source: langgraph-memory-store
    supports: LangGraph Store put accepts a JSON value for the supplied namespace and key. Moonweave models optional store-local create and update times separately from source provenance and record version.
    locator: "Memory guide: Store put/aput examples"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-item-representation-boundary
    source: langgraph-memory-store
    supports: Store operations define a namespace, key, and value representation. Moonweave keeps that representation distinct from files, vectors, indexes, short-term history, Context Assembly, and the semantic identity of a MemoryRecord.
    locator: "Memory guide: long-term Store operations and short-term memory"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-item-specialization
    source: langgraph-memory-store
    supports: Treating a fully addressed Store value as a storage-layer subtype of a generic MemoryEntity is a Moonweave ontology design inference based on documented Store addressing, not a claim that every memory entity is a Store item.
    locator: "Memory guide: Store namespace, key, and value examples"
    evidence_kind: ontology-design-inference
    confidence: medium
