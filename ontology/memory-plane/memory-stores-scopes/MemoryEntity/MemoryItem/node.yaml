schema: moonweave.ai/ontology-node/v1
id: MemoryItem
kind: concept
status: accepted
labels:
  zh: 记忆项
  en: memory item
  ja: 記憶項目
semantics:
  short_definition:
    zh: 可独立寻址和检索、表达一个事实、偏好、经验、程序或反思的逻辑记忆单元。
    en: An independently addressable and retrievable logical memory unit expressing one fact, preference, experience, procedure, or reflection.
    ja: 一つの事実・選好・経験・手順・省察を表す、独立アドレス可能で検索可能な論理記憶単位です。
  definition:
    zh: MemoryItem 是一种 MemoryEntity；其种差是：它是语义上可独立寻址、可检索和可遗忘的最小记忆单元，以 item_id、内容语义、来源与版本标识，但保持 storage-neutral，不由数据库行、文件路径、命名空间或后端决定身份。它可以被 MemoryRecord 表示，却不等同于持久记录。
    en: "A MemoryItem is a MemoryEntity whose differentia is the smallest semantically independent unit that can be addressed, retrieved, and forgotten. It is identified by item_id, content meaning, provenance, and version but remains storage-neutral: no database row, file path, namespace, or backend determines its identity. A MemoryRecord may represent it, but the item is not the persistence record."
    ja: MemoryItem は意味的に独立してアドレス・検索・忘却できる最小 MemoryEntity で、item_id、内容意味、来歴、版で識別されますが storage-neutral であり、DB行・ファイル経路・namespace・backend が同一性を決めません。MemoryRecord に表現され得ますが持続記録そのものではありません。
  why_needed:
    zh: 该概念让检索、更新、合并和遗忘针对一个逻辑记忆事实，而不误操作整个文件或把存储记录当作被记住的语义本身。
    en: It lets retrieval, update, merge, and forgetting target one logical memory fact without operating on an entire file or mistaking its storage record for the remembered semantics.
    ja: 検索・更新・統合・忘却を一つの論理記憶事実へ向け、ファイル全体を誤操作したり保存レコードを記憶意味自体と誤認したりしません。
  includes:
    - zh: 纳入“用户偏好简体中文”“部署前必须运行 schema gate”这类具有独立 item_id、来源与版本、可单独检索和更新的原子或小粒度记忆。
      en: Includes atomic or small-grained memories such as “user prefers Simplified Chinese” or “run the schema gate before deployment,” with independent item ID, provenance, version, retrieval, and update.
      ja: 「利用者は簡体字中国語を好む」「配備前に schema gate を実行」のように独立 item_id、来歴、版を持ち単独検索・更新できる原子的または小粒度記憶を含みます。
  excludes:
    - zh: 排除整个 MemoryFile、MemoryStore、只含存储状态的 MemoryRecord、检索时生成的 RetrievedCandidate 和一次调用内的 ContextSlot。
      en: Excludes an entire MemoryFile, MemoryStore, a MemoryRecord containing only storage state, a runtime RetrievedCandidate, and a call-local ContextSlot.
      ja: MemoryFile 全体、MemoryStore、保存状態だけの MemoryRecord、実行時 RetrievedCandidate、一回呼出し内 ContextSlot を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryItem-example-positive-001
    kind: positive
    labels:
      zh: 记忆项正例
      en: Positive example of memory item
      ja: 記憶項目の正例
    scenario_id: null
    descriptions:
      zh: item-pref-language 是“用户偏好简体中文”这一可独立检索和更新的逻辑记忆，来源为用户 turn-3；record-pref-language/v3 保存其当前表示。
      en: item-pref-language is the independently retrievable and updateable logical memory “user prefers Simplified Chinese,” sourced from user turn-3; record-pref-language/v3 stores its current representation.
      ja: item-pref-language は利用者 turn-3 を出典とする独立検索・更新可能な論理記憶「利用者は簡体字中国語を好む」で、record-pref-language/v3 が現表示を保存します。
    field_values:
      memory_entity_id: item-pref-language
      entity_version: "3"
      content_digest: sha256:pref-language-zh-cn-v3
      provenance_ref: conversation://user/turn-3
      lifecycle_state: active
    related_node_ids:
      - MemoryItem
      - MemoryRecord
    related_relation_ids:
      - MemoryItem-represented_by-MemoryRecord
    expected_result:
      zh: 该运行可查询 MemoryItem 以及方向保持不变的事实 MemoryItem-represented_by-MemoryRecord。
      en: The run can query MemoryItem together with direction-preserving fact MemoryItem-represented_by-MemoryRecord.
      ja: この実行では MemoryItem と方向を保持した事実 MemoryItem-represented_by-MemoryRecord を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、MemoryItem-represented_by-MemoryRecord 的 canonical 方向、概念定义和可用字段值。
      en: The remembered semantic unit has its own item identity and provenance and can survive a change of record version or storage carrier; the record is its persistence representation.
      ja: このシナリオは実際の運用文脈、MemoryItem-represented_by-MemoryRecord の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-item-003
      - claim-memory-item-004
  - id: MemoryItem-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆项边界例
      en: Boundary case for memory item
      ja: 記憶項目の境界例
    scenario_id: null
    descriptions:
      zh: memories/preferences.md 同时保存语言、时区和输出格式三项偏好，以路径和文件版本为身份；它是 MemoryFile 载体，而不是其中任一 MemoryItem。
      en: memories/preferences.md stores language, time-zone, and output-format preferences and is identified by path and file version; it is the MemoryFile carrier, not any one MemoryItem inside it.
      ja: memories/preferences.md は言語・時間帯・出力形式の三選好を保存し、パスとファイル版で識別されます。MemoryFile媒体で、内部の個別 MemoryItem ではありません。
    field_values: {}
    related_node_ids:
      - MemoryItem
      - MemoryRecord
      - MemoryFile
    related_relation_ids:
      - MemoryItem-represented_by-MemoryRecord
    expected_result:
      zh: MemoryFile 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryItem。
      en: MemoryFile retains its own type; validation must not promote it to MemoryItem from relation co-occurrence.
      ja: MemoryFile は元の型を維持し、関係の共起だけで MemoryItem へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 MemoryItem-represented_by-MemoryRecord 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: An item is one addressable remembered meaning; a file is a durable carrier that may contain many items. Shared MemoryEntity ancestry does not make their identity conditions interchangeable.
      ja: 境界例は実在する対照ノードを示し、MemoryItem-represented_by-MemoryRecord の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-item-005
      - claim-memory-item-006
