    supports: LangGraph TTLConfig and sweep_ttl provide default_ttl, refresh_on_read, and deletion on expiry mappable to retention policy fields.
    locator: TTLConfig, PutOp ttl, PostgresStore.sweep_ttl
    evidence_kind: primary-api
