schema: moonweave.ai/ontology-node/v1
id: MemoryRetentionPolicy
kind: concept
labels:
  zh: 记忆保留策略
  en: memory retention policy
  ja: 記憶保持方針
semantics:
  short_definition:
    zh: 规定各类记忆保留期限以及到期、删除和墓碑行为的版本化治理规范。
    en: A versioned governance specification defining retention duration and expiry, deletion, and tombstone behavior for memory classes.
    ja: 記憶類型ごとの保持期間と期限切れ・削除・墓標動作を定める版管理統治仕様です。
  definition:
    zh: MemoryRetentionPolicy 是一种规范；其种差是以 policy_id 和版本为身份，按记忆类型、作用域或数据分类声明保留时长、刷新/压缩条件、到期动作、法律保留例外以及删除后是否保留墓碑。LangGraph TTLConfig（default_ttl、refresh_on_read、sweep）映射到 retention_duration 与 terminal_action；Generative Agents 记忆流在检索时用 recency = 0.99^hours 衰减权重，属于 MemoryDecay 操作而非本策略的直接字段，但可引用为 refresh_on_access 的类比。它治理 MemoryStore 或 MemoryRecord，但不是存储设施，也不是已发生的 MemoryExpiration 事件。
    en: MemoryRetentionPolicy is a specification identified by policy ID and version declaring, by memory type, scope, or data class, retention duration, refresh or compaction conditions, expiry action, legal-hold exceptions, and whether deletion leaves a tombstone. LangGraph TTLConfig (default_ttl, refresh_on_read, sweep) maps to retention_duration and terminal_action; Generative Agents memory-stream recency = 0.99^hours at retrieval is a MemoryDecay operation rather than a direct policy field but may inform refresh_on_access analogies. It governs MemoryStores or MemoryRecords but is neither a storage facility nor an occurred MemoryExpiration event.
    ja: MemoryRetentionPolicy は policy_id+版で、記憶型/scope/データ分類別に保持期間・refresh/compact・期限動作・legal hold・削除後 tombstone を宣言する仕様。LangGraph TTLConfig が retention_duration/terminal_action に写像。Generative Agents recency=0.99^hours は MemoryDecay で policy 直接 field ではない。MemoryStore/Record を統治するが施設でも期限 event でもない。
  why_needed:
    zh: 没有显式保留策略，团队无法证明“30 天 TTL 是否真的执行”“用户撤回后是否只删索引不删记录”，也无法在 legal hold 期间暂停删除。策略版本让数据最小化、法律保留和可恢复删除可以统一验证。
    en: Without explicit retention policies, teams cannot prove whether a 30-day TTL actually ran, whether user withdrawal deleted only indexes, or whether deletion paused during legal hold. Versioned policies make data minimization, legal hold, and recoverable deletion jointly verifiable.
    ja: 明示保持方針がなければ 30 日 TTL 実行・ユーザー撤回時の index のみ削除・legal hold 中停止を証明できない。版付き方針でデータ最小化・legal hold・復旧可能削除を共同検証。
  includes:
    - zh: LangGraph TTLConfig 映射的会话 TTL、Mem0/Zep 应用层保留规则，以及“session 记忆 30 天后 delete 并保留 90 天 tombstone”类 Moonweave 策略版本。
      en: Session TTL mapped from LangGraph TTLConfig, application-layer retention rules for Mem0/Zep, and Moonweave policy versions such as “session memory delete after 30 days with 90-day tombstone.”
      ja: LangGraph TTLConfig 写像 session TTL、Mem0/Zep アプリ層規則、「session 30 日後 delete+90 日 tombstone」等 Moonweave 方針版。
  excludes:
    - zh: MemoryStore、单条记录的 expires_at  alone、已发生的 MemoryExpiration/MemoryDelete，以及只规定访问范围的 MemoryScope。
      en: MemoryStore, a lone expires_at on one record, occurred MemoryExpiration or MemoryDelete, and MemoryScope specifications governing only access boundaries.
      ja: MemoryStore、単一 expires_at のみ、発生済み MemoryExpiration/MemoryDelete、アクセス境界だけの MemoryScope。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangGraph store.put(..., ttl=86400) 与 TTLConfig.default_ttl/refresh_on_read 定义条目级与 store 级保留；PostgresStore.sweep_ttl 执行 delete terminal_action。Generative Agents 在检索时用 recency 因子降权旧观察，Moonweave 登记为 MemoryDecay 而非改写 MemoryRetentionPolicy。策略绑定通过 MemoryRecord-governed_by-MemoryRetentionPolicy 或 memory_store_governed_by_retention_policy 表达。
    en: LangGraph store.put(..., ttl=86400) and TTLConfig.default_ttl/refresh_on_read define item- and store-level retention; PostgresStore.sweep_ttl executes delete terminal_action. Generative Agents down-weights stale observations at retrieval via recency factor; Moonweave records MemoryDecay rather than rewriting MemoryRetentionPolicy. Bind via MemoryRecord-governed_by-MemoryRetentionPolicy or memory_store_governed_by_retention_policy.
    ja: LangGraph put ttl/TTLConfig が item/store 級保持。PostgresStore.sweep_ttl が delete terminal_action。Generative Agents recency は MemoryDecay として記録。MemoryRecord-governed_by または store governed_by で binding。
  typical_input:
    - description: LangGraph TTLConfig on BaseStore.
      format: |
        TTLConfig(
          default_ttl=43200,      # minutes
          refresh_on_read=True
        )
        await store.put(ns, key, value, ttl=86400)
      source_claims: [claim-memory-retention-langgraph]
    - description: Generative Agents recency decay at memory-stream retrieval.
      format: |
        recency(i) = 0.99 ** hours_since_last_access(i)
        retrieval_weight = alpha*recency + beta*importance + gamma*relevance
      source_claims: [claim-memory-retention-generative-agents]
  typical_output:
    - description: Moonweave-local retention policy version applied to records.
      format: |
        {
          "retention_policy_id": "policy-session",
          "version": "5",
          "retention_basis": "last-access",
          "retention_duration": "P30D",
          "refresh_on_access": true,
          "terminal_action": "delete",
          "tombstone_duration": "P90D",
          "legal_hold_behavior": "pause-terminal-action"
        }
      source_claims: [claim-memory-retention-design]
  reference_implementations:
    - name: LangGraph Store TTLConfig
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: default_ttl, refresh_on_read, sweep_ttl deletion.
    - name: Generative Agents Paper
      url: https://arxiv.org/abs/2304.03442
      description: Memory stream recency decay with 0.99 hourly factor at retrieval.
structure:
  identity_keys:
    - retention_policy_id
    - version
  fields:
    - id: retention_policy_id
      labels: {zh: 保留策略标识, en: retention policy ID, ja: 保持方針 ID}
      definitions:
        zh: 跨版本稳定标识同一逻辑保留策略。
        en: Stably identifies the same logical retention policy across versions.
        ja: 版を跨ぐ logical 保持方針の安定 ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy-session
      allowed_values: []
      source_claims: [claim-memory-retention-design]
    - id: version
      labels: {zh: 策略版本, en: policy version, ja: 方針版}
      definitions:
        zh: 标识一组不可变的适用条件、期限与终止动作；任何语义变化都形成新版本。
        en: Identifies one immutable set of applicability, duration, and terminal behavior; semantic change creates a new version.
        ja: 不変 applicable 条件・期限・終了動作の一組。意味変更は新版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "5"
      allowed_values: []
      source_claims: [claim-memory-retention-design]
    - id: retention_basis
      labels: {zh: 保留计时基准, en: retention timing basis, ja: 保持計時基準}
      definitions:
        zh: 声明 retention_duration 从 created-at、last-access 或 last-write 中的哪一时刻计算；LangGraph TTL 默认 last-access。
        en: Declares whether retention_duration is measured from created-at, last-access, or last-write; LangGraph TTL defaults to last-access.
        ja: retention_duration の起点（created-at/last-access/last-write）。LangGraph TTL 既定 last-access。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: last-access
      allowed_values: [created-at, last-access, last-write, explicit-start]
      source_claims: [claim-memory-retention-langgraph]
    - id: retention_duration
      labels: {zh: 保留时长, en: retention duration, ja: 保持期間}
      definitions:
        zh: 从 retention_basis 计算的正时长；LangGraph default_ttl 以分钟表示，Moonweave 用 ISO-8601 duration。
        en: Positive duration from retention_basis; LangGraph default_ttl uses minutes, Moonweave uses ISO-8601 duration.
        ja: retention_basis からの正の期間。LangGraph default_ttl は分、Moonweave は ISO-8601 duration。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: P30D
      allowed_values: []
      source_claims: [claim-memory-retention-langgraph]
    - id: refresh_on_access
      labels: {zh: 访问时刷新, en: refresh on access, ja: アクセス時更新}
      definitions:
        zh: 合格的 read/search 是否重置保留计时；对应 LangGraph TTLConfig.refresh_on_read。
        en: Whether eligible reads or searches reset the retention clock; maps to LangGraph TTLConfig.refresh_on_read.
        ja: 適格 read/search が保持 clock を reset するか。LangGraph refresh_on_read に対応。
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [claim-memory-retention-langgraph]
    - id: terminal_action
      labels: {zh: 到期终止动作, en: expiry terminal action, ja: 期限終了動作}
      definitions:
        zh: 到期后执行 expire、compact、archive 或 delete；LangGraph sweep_ttl 对应 delete。
        en: Expiry leads to expire, compact, archive, or delete; LangGraph sweep_ttl corresponds to delete.
        ja: 期限後 expire/compact/archive/delete。LangGraph sweep_ttl は delete。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: delete
      allowed_values: [expire, compact, archive, delete]
      source_claims: [claim-memory-retention-langgraph]
    - id: tombstone_duration
      labels: {zh: 墓碑保留时长, en: tombstone duration, ja: 墓標保持期間}
      definitions:
        zh: 删除后不含原内容的 MemoryTombstone 继续保留多久；缺省表示不要求墓碑。
        en: How long a content-free MemoryTombstone remains after deletion; absence means no tombstone required.
        ja: 削除後 content-free MemoryTombstone の保持期間。欠如は tombstone 不要。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: P90D
      allowed_values: []
      source_claims: [claim-memory-retention-design]
    - id: legal_hold_behavior
      labels: {zh: 法律保留行为, en: legal-hold behavior, ja: 法的保持動作}
      definitions:
        zh: 匹配法律保留时如何处理保留时钟与终止动作，如 pause-terminal-action。
        en: How retention clock and terminal action behave under legal hold, such as pause-terminal-action.
        ja: legal hold 下の保持 clock/終了動作（例 pause-terminal-action）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pause-terminal-action
      allowed_values: []
      source_claims: [claim-memory-retention-design]
  constraints:
    - id: memory-retention-terminal-action-consistency
      severity: error
      expression_language: plain
      expression: retention_duration is positive; terminal_action is one of expire, compact, archive, or delete; tombstone_duration permitted only for delete; legal hold evaluated before terminal action
      explanation:
        zh: 保留时长必须为正；墓碑只随 delete；法律保留必须先于终止动作求值。
        en: Duration is positive; tombstones accompany deletion only; legal hold is evaluated before terminal action.
        ja: 保持期間は正、tombstone は delete のみ、legal hold を先に評価。
      source_claims: [claim-memory-retention-design]
  required_relations: []
examples:
  - id: memory-retention-example-langgraph-ttl
    labels:
      zh: LangGraph TTL 保留策略
      en: LangGraph TTL retention policy
      ja: LangGraph TTL 保持方針
    descriptions:
      zh: LangGraph BaseStore 配置 TTLConfig default_ttl=43200 分钟、refresh_on_read=True；put 时 ttl=86400 秒覆盖单条 Item。到期后 PostgresStore.sweep_ttl 删除条目；Moonweave 映射为 policy-session-v5、terminal_action=delete、retention_basis=last-access。
      en: LangGraph BaseStore sets TTLConfig default_ttl=43200 minutes and refresh_on_read=True; put uses ttl=86400 seconds per Item. PostgresStore.sweep_ttl deletes on expiry; Moonweave maps to policy-session-v5, terminal_action=delete, retention_basis=last-access.
      ja: LangGraph TTLConfig default_ttl=43200 分、refresh_on_read=True、put ttl=86400。sweep_ttl で削除。policy-session-v5, terminal_action=delete, retention_basis=last-access へ写像。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: TTLConfig and PostgresStore.sweep_ttl
    field_values:
      retention_policy_id: policy-session
      version: "5"
      retention_basis: last-access
      retention_duration: P30D
      refresh_on_access: true
      terminal_action: delete
      default_ttl_minutes: 43200
    related_node_ids: [MemoryRetentionPolicy, MemoryStore, MemoryRecord, memory-lifecycle]
    related_relation_ids: [memory_store_governed_by_retention_policy]
    source_claims: [claim-memory-retention-langgraph, claim-memory-retention-design]
  - id: memory-retention-example-generative-agents-decay
    labels:
      zh: Generative Agents 新近度衰减
      en: Generative Agents recency decay
      ja: Generative Agents 新近度減衰
    descriptions:
      zh: 模拟小镇智能体检索记忆流时对 48 小时未访问观察应用 recency=0.99^48 重加权。Moonweave 登记 MemoryDecay 操作而非改写 MemoryRecord 内容；若策略需记录 decay 参数，可在 applicability_selector 中引用 recency_decay_factor=0.99。
      en: A simulated town agent reweights observations unused for 48 hours with recency=0.99^48 when retrieving the memory stream. Moonweave records MemoryDecay without rewriting MemoryRecord content; policies may reference recency_decay_factor=0.99 in applicability_selector.
      ja: 48 時間未アクセス观察に recency=0.99^48 を適用。MemoryDecay を記録し MemoryRecord 内容は不改変。applicability_selector に recency_decay_factor=0.99 参照可。
    example_source:
      product: Generative Agents (Stanford)
      url: https://arxiv.org/abs/2304.03442
      version: Memory stream recency scoring
    field_values:
      recency_decay_factor: 0.99
      hours_since_last_access: 48
      recency_score: 0.624
      terminal_action: decay-at-retrieval
    related_node_ids: [MemoryRetentionPolicy, MemoryRecord, memory-lifecycle, memory-retrieval-ranking]
    related_relation_ids: []
    source_claims: [claim-memory-retention-generative-agents, claim-memory-retention-design]
  - id: memory-retention-example-session-tombstone
    labels:
      zh: 会话记忆删除与墓碑策略
      en: Session memory delete and tombstone policy
      ja: session 記憶削除と tombstone 方針
    descriptions:
      zh: policy-session-v5 规定会话记忆最后访问 30 天后 delete，删除后保留 90 天 MemoryTombstone；legal_hold=true 时 pause-terminal-action。Mem0 DELETE 成功必须产生可审计 tombstone，不能只让 search 返回空。
      en: policy-session-v5 deletes session memory 30 days after last access and retains MemoryTombstone for 90 days; legal_hold=true pauses terminal action. Mem0 DELETE success must yield an auditable tombstone, not merely empty search results.
      ja: policy-session-v5 は last-access 30 日後 delete、90 日 tombstone。legal_hold で pause。Mem0 DELETE 成功は tombstone 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: session retention with tombstone duration
    field_values:
      retention_policy_id: policy-session
      version: "5"
      retention_duration: P30D
      terminal_action: delete
      tombstone_duration: P90D
      legal_hold_behavior: pause-terminal-action
    related_node_ids: [MemoryRetentionPolicy, MemoryTombstone, MemoryStore, memory-lifecycle]
    related_relation_ids: [MemoryRecord-governed_by-MemoryRetentionPolicy]
    source_claims: [claim-memory-retention-design]
  - id: memory-retention-example-store-not-policy
    labels:
      zh: 记忆存储不是保留策略
      en: Memory store is not retention policy
      ja: memory store は retention policy ではない
    descriptions:
      zh: store-prod 实现 put/get/delete 并托管命名空间，但不声明 30 天期限或 legal hold 例外。它受 policy-session-v5 治理 via memory_store_governed_by_retention_policy，但自身是 MemoryStore。
      en: store-prod implements put/get/delete and hosts namespaces but declares no 30-day duration or legal-hold exception. It is governed by policy-session-v5 via memory_store_governed_by_retention_policy while remaining MemoryStore.
      ja: store-prod は put/get/delete/namespace を提供するが期限/legal hold を宣言しない。policy-session-v5 に統治される MemoryStore。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore operations versus TTLConfig
    field_values:
      memory_store_id: store-prod
      has_retention_policy_fields: false
    related_node_ids: [MemoryRetentionPolicy, MemoryStore, memory-stores-scopes]
    related_relation_ids: [memory_store_governed_by_retention_policy]
    source_claims: [claim-memory-retention-langgraph, claim-memory-retention-design]
parent_relation:
  id: MemoryRecord-governed_by-MemoryRetentionPolicy
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 受记录级保留策略治理
    en: governed by record retention policy
    ja: 記録保持方針に統治される
  definitions:
    zh: MemoryRecord-governed_by-MemoryRetentionPolicy 把记录版本绑定到直接适用的策略版本；直接绑定优先于 store 默认，但不表示终止动作已发生。
    en: MemoryRecord-governed_by-MemoryRetentionPolicy binds a record version to the directly applicable policy version; direct binding overrides store default but does not assert terminal action occurred.
    ja: record 版を直接適用方針版へ結合。store 既定より優先するが終了発生を意味しない。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：governed by, en: governs, ja: 逆方向：governed by}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-retention-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
