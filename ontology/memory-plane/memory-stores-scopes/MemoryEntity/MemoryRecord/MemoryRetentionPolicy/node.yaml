schema: moonweave.ai/ontology-node/v1
id: MemoryRetentionPolicy
kind: concept
status: review
labels:
  zh: 记忆保留策略
  en: memory retention policy
  ja: 記憶保持方針
semantics:
  short_definition:
    zh: 规定各类记忆的保留期限以及到期、压缩、归档、删除和墓碑行为的版本化治理规范。
    en: A versioned governance specification defining retention periods and expiry, compaction, archival, deletion, and tombstone behavior for memory classes.
    ja: 記憶類型ごとの保持期間と期限切れ・圧縮・保管・削除・墓標動作を定める版管理統治仕様です。
  definition:
    zh: 记忆保留策略是一种规范；其种差是：它以 policy_id 和版本为身份，按记忆类型、作用域或数据分类声明保留时长、刷新/压缩条件、归档位置、到期动作、法律保留例外以及删除后是否保留墓碑。它治理 MemoryStore 或 MemoryRecord，但不是存储设施，也不是一次实际到期或删除事件。
    en: A MemoryRetentionPolicy is a specification identified by policy ID and version that declares, by memory type, scope, or data class, retention duration, refresh or compaction conditions, archive target, expiry action, legal-hold exceptions, and whether deletion leaves a tombstone. It governs MemoryStores or MemoryRecords but is neither a storage facility nor an actual expiry or deletion event.
    ja: MemoryRetentionPolicy は policy_id と版で識別され、記憶型・スコープ・データ分類別に保持期間、更新・圧縮条件、保管先、期限動作、法的保持例外、削除後墓標を定める仕様です。MemoryStore・MemoryRecord を統治しますが、保存施設や実際の期限・削除イベントではありません。
  why_needed:
    zh: 显式保留策略使数据最小化、法律保留和可恢复删除可以统一验证，并允许审计某条记录为何仍存在或被终止。
    en: An explicit retention policy makes data minimization, legal hold, and recoverable deletion jointly verifiable and explains why a record still exists or was terminated.
    ja: 明示保持方針によりデータ最小化、法的保持、復旧可能削除を共同検証し、レコードが残存・終了した理由を監査できます。
  includes:
    - zh: 纳入“会话记忆 30 天后过期并保留 90 天墓碑；法律保留期间暂停删除”这类具有版本、适用条件和终止动作的策略。
      en: Includes policies such as “session memory expires after 30 days and leaves a 90-day tombstone; deletion pauses during legal hold,” with version, applicability, and terminal action.
      ja: 「会話記憶は30日後失効し90日墓標を残す、法的保持中は削除停止」のように版・適用条件・終了動作を持つ方針を含みます。
  excludes:
    - zh: 排除 MemoryStore、单条记录的 expires_at 字段、已经发生的 MemoryExpiration/MemoryDelete，以及只规定访问范围的 MemoryScope。
      en: Excludes MemoryStore, one record's expires_at field, an occurred MemoryExpiration or MemoryDelete, and MemoryScope specifications that govern only access boundaries.
      ja: MemoryStore、単一レコードの expires_at、発生済み MemoryExpiration・MemoryDelete、アクセス境界だけを定める MemoryScope を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - retention_policy_id
    - version
  fields:
    - id: retention_policy_id
      labels:
        zh: 保留策略标识
        en: retention policy ID
        ja: 保持方針 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识同一逻辑保留策略。
        en: Stably identifies the same logical retention policy across versions.
        ja: 版を跨いで同じ論理保持方針を安定識別します。
      allowed_values: []
      pattern: null
      example_value: policy-session
      source_claims:
        - claim-memory-retention-policy-003
    - id: version
      labels:
        zh: 策略版本
        en: policy version
        ja: 方針版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一组不可变的适用条件、期限与终止动作；任何语义变化都形成新版本。
        en: Identifies one immutable set of applicability conditions, duration, and terminal behavior; any semantic change creates a new version.
        ja: 一組の不変な適用条件・期間・終了動作を識別し、意味変更は新版を作ります。
      allowed_values: []
      pattern: null
      example_value: "5"
      source_claims:
        - claim-memory-retention-policy-004
    - id: applicability_selector
      labels:
        zh: 适用对象选择条件
        en: applicability selector
        ja: 適用対象選択条件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以记忆类型、范围、命名空间模式或数据分类确定策略适用的记录集合。
        en: Determines the records governed by the policy using memory type, scope, namespace pattern, or data classification.
        ja: 記憶型・scope・namespace pattern・data classification で方針適用 record 集合を決定します。
      allowed_values: []
      pattern: null
      example_value:
        memory_types:
          - session
        tenant_refs:
          - tenant-7
      source_claims:
        - claim-memory-retention-policy-005
    - id: retention_basis
      labels:
        zh: 保留计时基准
        en: retention timing basis
        ja: 保持計時基準
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 retention_duration 从创建、最后访问、最后写入或显式起始时间中的哪一时刻计算。
        en: Declares whether retention_duration is measured from creation, last access, last write, or an explicit start instant.
        ja: retention_duration を作成・最終アクセス・最終書込・明示開始時刻のどこから測るか宣言します。
      allowed_values:
        - id: memory-retention-basis-created-at
          value: created-at
          status: accepted
          labels:
            zh: 创建时间
            en: creation time
            ja: 作成時刻
          definitions:
            zh: 从记录版本创建时开始计时。
            en: Measures from creation of the record version.
            ja: record 版作成時から計時します。
          source_claims:
            - claim-memory-retention-policy-006
        - id: memory-retention-basis-last-access
          value: last-access
          status: accepted
          labels:
            zh: 最后访问时间
            en: last access time
            ja: 最終アクセス時刻
          definitions:
            zh: 从最近一次配置允许刷新的读取或写入访问开始计时。
            en: Measures from the latest read or write access configured to refresh TTL.
            ja: TTL refresh 対象に設定された最新 read・write access から計時します。
          source_claims:
            - claim-memory-retention-policy-007
        - id: memory-retention-basis-last-write
          value: last-write
          status: accepted
          labels:
            zh: 最后写入时间
            en: last write time
            ja: 最終書込時刻
          definitions:
            zh: 只从最近一次写入或更新开始计时。
            en: Measures only from the latest write or update.
            ja: 最新 write・update からだけ計時します。
          source_claims:
            - claim-memory-retention-policy-008
        - id: memory-retention-basis-explicit-start
          value: explicit-start
          status: accepted
          labels:
            zh: 显式起点
            en: explicit start
            ja: 明示起点
          definitions:
            zh: 从记录绑定的显式保留起点开始计时。
            en: Measures from an explicit retention-start instant bound to the record.
            ja: record に結び付く明示保持開始時刻から計時します。
          source_claims:
            - claim-memory-retention-policy-009
      pattern: null
      example_value: last-access
      source_claims:
        - claim-memory-retention-policy-010
    - id: retention_duration
      labels:
        zh: 保留时长
        en: retention duration
        ja: 保持期間
      datatype: duration
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录从 retention_basis 计算的正时长，使用可机器解析的持续时间表示。
        en: Records the positive duration measured from retention_basis using a machine-readable duration representation.
        ja: retention_basis から測る正の期間を machine-readable duration で記録します。
      allowed_values: []
      pattern: null
      example_value: P30D
      source_claims:
        - claim-memory-retention-policy-011
    - id: refresh_on_access
      labels:
        zh: 访问时刷新
        en: refresh on access
        ja: アクセス時更新
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明合格的读取或搜索是否重置保留计时；false 表示读取不延长生命周期。
        en: States whether eligible reads or searches reset the retention clock; false means reading does not extend lifecycle.
        ja: 適格 read・search が保持 clock を reset するか示し、false なら読取で lifecycle を延長しません。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-memory-retention-policy-012
    - id: terminal_action
      labels:
        zh: 到期终止动作
        en: expiry terminal action
        ja: 期限終了動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明到期后执行 expire、compact、archive 或 delete 中的哪一种治理动作；动作发生本身仍需独立事件记录。
        en: Declares whether expiry leads to expire, compact, archive, or delete; occurrence of the action still requires a separate event record.
        ja: 期限後に expire・compact・archive・delete のどの統治動作を行うか示し、実際の動作発生には別 event 記録が必要です。
      allowed_values: []
      pattern: null
      example_value: delete
      source_claims:
        - claim-memory-retention-policy-013
    - id: archive_target_ref
      labels:
        zh: 归档目标引用
        en: archive target reference
        ja: 保管先参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当 terminal_action=archive 时引用接收归档副本的确定设施或集合；其他动作不得伪造归档目标。
        en: When terminal_action is archive, references the determinate facility or collection receiving the archival copy; other actions do not fabricate an archive target.
        ja: terminal_action=archive のとき archive copy を受ける確定施設・集合を参照し、他動作で保管先を捏造しません。
      allowed_values: []
      pattern: null
      example_value: archive-store:cold-7
      source_claims:
        - claim-memory-retention-policy-014
    - id: legal_hold_behavior
      labels:
        zh: 法律保留行为
        en: legal-hold behavior
        ja: 法的保持動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明匹配法律保留时如何处理保留时钟与终止动作，例如暂停终止但继续保留可审计截止时间。
        en: Declares how the retention clock and terminal action behave under a matching legal hold, such as pausing termination while retaining an auditable deadline.
        ja: 法的保持適合時に保持 clock・終了動作をどう扱うか（例：監査可能 deadline を残し終了を停止）宣言します。
      allowed_values: []
      pattern: null
      example_value: pause-terminal-action
      source_claims:
        - claim-memory-retention-policy-015
    - id: tombstone_duration
      labels:
        zh: 墓碑保留时长
        en: tombstone duration
        ja: 墓標保持期間
      datatype: duration
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选声明删除后不含原内容的 MemoryTombstone 继续保留多久；缺省表示该策略不要求墓碑。
        en: Optionally states how long a content-free MemoryTombstone remains after deletion; absence means the policy does not require a tombstone.
        ja: 削除後に原内容を含まない MemoryTombstone を保持する期間を任意指定し、欠如は墓標不要を示します。
      allowed_values: []
      pattern: null
      example_value: P90D
      source_claims:
        - claim-memory-retention-policy-016
  constraints:
    - id: memory-retention-terminal-action-consistency
      severity: error
      expression_language: plain
      expression: retention_duration is positive; terminal_action is one of expire, compact, archive, or delete; archive requires archive_target_ref; tombstone_duration is permitted only for delete; and a matching legal hold follows legal_hold_behavior before any terminal action
      explanations:
        zh: 保留时长必须为正；归档必须有目标，墓碑只随删除使用；任何匹配的法律保留必须先按声明行为阻止或调整终止动作。
        en: Duration is positive, archive has a target, and tombstones accompany deletion only. A matching legal hold is evaluated before and may pause or alter any terminal action according to the declared behavior.
        ja: 保持期間は正、archive は target 必須、tombstone は delete のみです。適合する法的保持を先に評価し、宣言動作に従い終了を停止・変更します。
      source_claims:
        - claim-memory-retention-policy-017
  required_relation_constraints: []
examples:
  - id: MemoryRetentionPolicy-example-positive-001
    kind: positive
    labels:
      zh: 记忆保留策略正例
      en: Positive example of memory retention policy
      ja: 記憶保持方針の正例
    scenario_id: null
    descriptions:
      zh: policy-session-v5 规定会话记忆最后访问 30 天后过期，删除时保留 90 天墓碑；若 legal_hold=true 则暂停终止动作，并记录策略版本。
      en: policy-session-v5 expires session memory 30 days after last access and retains a tombstone for 90 days after deletion; when legal_hold=true, terminal actions pause, and the applied policy version is recorded.
      ja: policy-session-v5 は会話記憶を最終アクセス30日後に失効させ、削除後90日墓標を保持し、legal_hold=true なら終了動作を停止し適用方針版を記録します。
    field_values:
      retention_policy_id: policy-session
      version: "5"
      applicability_selector:
        memory_types:
          - session
        tenant_refs:
          - tenant-7
      retention_basis: last-access
      retention_duration: P30D
      refresh_on_access: true
      terminal_action: delete
      legal_hold_behavior: pause-terminal-action
      tombstone_duration: P90D
    related_node_ids:
      - MemoryRetentionPolicy
      - MemoryStore
    related_relation_ids:
      - memory_store_governed_by_retention_policy
    expected_result:
      zh: 该运行可查询 MemoryRetentionPolicy 以及方向保持不变的事实 memory_store_governed_by_retention_policy。
      en: The run can query MemoryRetentionPolicy together with direction-preserving fact memory_store_governed_by_retention_policy.
      ja: この実行では MemoryRetentionPolicy と方向を保持した事実 memory_store_governed_by_retention_policy を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、memory_store_governed_by_retention_policy 的 canonical 方向、概念定义和可用字段值。
      en: The object is a reusable versioned rule set with applicability, duration, terminal action, tombstone behavior, and exception—not an expiry event that has already occurred.
      ja: このシナリオは実際の運用文脈、memory_store_governed_by_retention_policy の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retention-policy-018
      - claim-memory-retention-policy-019
  - id: MemoryRetentionPolicy-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆保留策略边界例
      en: Boundary case for memory retention policy
      ja: 記憶保持方針の境界例
    scenario_id: null
    descriptions:
      zh: store-prod 实现 put/get/search/delete 并承载多个命名空间，却不声明 30 天期限或 legal hold 例外；它受 policy-session-v5 治理，但自身是 MemoryStore。
      en: store-prod implements put/get/search/delete and hosts namespaces but declares neither a 30-day duration nor legal-hold exception. It is governed by policy-session-v5 while remaining MemoryStore.
      ja: store-prod は put/get/search/delete と名前空間を提供しますが30日期間や legal hold 例外を宣言しません。policy-session-v5 に統治される MemoryStore です。
    field_values: {}
    related_node_ids:
      - MemoryRetentionPolicy
      - MemoryStore
    related_relation_ids:
      - memory_store_governed_by_retention_policy
    expected_result:
      zh: MemoryStore 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryRetentionPolicy。
      en: MemoryStore retains its own type; validation must not promote it to MemoryRetentionPolicy from relation co-occurrence.
      ja: MemoryStore は元の型を維持し、関係の共起だけで MemoryRetentionPolicy へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 memory_store_governed_by_retention_policy 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The store executes persistence operations; the policy specifies when and how lifecycle operations should occur. Governance connects facility and rule without merging them.
      ja: 境界例は実在する対照ノードを示し、memory_store_governed_by_retention_policy の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retention-policy-020
      - claim-memory-retention-policy-021
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryRecord-governed_by-MemoryRetentionPolicy
  predicate: governed_by
  direction: source-to-target
  relation_kind: governance
  labels:
    zh: 受记录级保留策略治理
    en: governed by record retention policy
    ja: 記録保持方針に統治される
  definitions:
    zh: MemoryRecord-governed_by-MemoryRetentionPolicy 把记录版本绑定到直接适用的策略版本，该策略决定期限、刷新或压缩、归档、法律保留与终止动作；直接绑定优先于存储默认，但不表示终止动作已经发生。
    en: MemoryRecord-governed_by-MemoryRetentionPolicy binds a record version to the directly applicable policy version controlling expiry, refresh or compaction, archive, legal hold, and terminal action. The direct binding overrides a store default but does not assert that a terminal action has occurred.
    ja: MemoryRecord-governed_by-MemoryRetentionPolicy は記録版を期限・更新/圧縮・保管・legal hold・終了動作を定める直接適用方針版へ結びます。直接方針はstore既定に優先しますが終了発生を意味しません。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: governs
    labels:
      zh: 反向：governed by
      en: governs
      ja: 逆方向：governed by
  conditions:
    - id: MemoryRecord-governed_by-MemoryRetentionPolicy-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the MemoryRecord matches the policy's applicability scope and records the exact policy identity and version, retention start, deadline or duration, and terminal action; a store-level default that was not evaluated for the record is insufficient.
      explanations:
        zh: 仅当 MemoryRecord 满足政策适用范围，并记录精确政策身份和版本、保留起点、截止时间或期限以及终止动作时成立；未针对该记录求值的存储级默认政策不足。
        en: Assert only when the MemoryRecord matches the policy's applicability scope and records the exact policy identity and version, retention start, deadline or duration, and terminal action; a store-level default that was not evaluated for the record is insufficient.
        ja: MemoryRecord が policy applicability scope を満たし、正確な policy ID/version、retention start、deadline/duration、terminal action を記録した場合だけ成立します。record に評価されていない store-level default は不十分です。
      source_claims:
        - claim-memory-retention-policy-022
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryRecord-governed_by-MemoryRetentionPolicy-example-positive-001
      kind: positive
      labels:
        zh: 受记录级保留策略治理正例
        en: "Positive case: governed by record retention policy"
        ja: 記録保持方針に統治されるの正例
      scenario_id: null
      descriptions:
        zh: record-tax-2025 绑定 policy-tax-7y@v4，并因 legal-hold-19 暂停删除。
        en: record-tax-2025 is bound to policy-tax-7y@v4 and deletion is suspended by legal-hold-19.
        ja: record-tax-2025 は policy-tax-7y@v4 に結ばれ legal-hold-19 により削除停止中です。
      field_values: {}
      related_node_ids:
        - MemoryRecord
        - MemoryRetentionPolicy
      related_relation_ids:
        - MemoryRecord-governed_by-MemoryRetentionPolicy
      expected_result:
        zh: 解析返回 v4 规则、当前保留例外和下一可执行动作。
        en: Resolution returns the v4 rules, active hold exception, and next executable action.
        ja: 解決は v4 規則・有効hold例外・次の実行动作を返します。
      why_valid_or_invalid:
        zh: 策略版本、适用记录和例外均被显式记录。
        en: Policy version, governed record, and exception are all explicit.
        ja: 方針版・対象記録・例外がすべて明示されています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-retention-policy-023
    - id: MemoryRecord-governed_by-MemoryRetentionPolicy-example-boundary-001
      kind: boundary
      labels:
        zh: 受记录级保留策略治理边界例
        en: "Boundary case: governed by record retention policy"
        ja: 記録保持方針に統治されるの境界例
      scenario_id: null
      descriptions:
        zh: record-temp 有 expires_at，但没有 policy_id 或策略版本。
        en: record-temp has expires_at but no policy ID or policy version.
        ja: record-temp は expires_at を持ちますが policy_id・版がありません。
      field_values: {}
      related_node_ids:
        - MemoryRecord
        - MemoryRetentionPolicy
      related_relation_ids:
        - MemoryRecord-governed_by-MemoryRetentionPolicy
