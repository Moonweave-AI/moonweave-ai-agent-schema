  - id: claim-memory-retention-policy-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents provides persistent memory and background consolidation across conversations but does not prescribe one retention lifecycle. MemoryRetentionPolicy is Moonweave's versioned specification for expiry, compaction, archival, deletion, tombstones, and legal-hold exceptions over that persistence.
