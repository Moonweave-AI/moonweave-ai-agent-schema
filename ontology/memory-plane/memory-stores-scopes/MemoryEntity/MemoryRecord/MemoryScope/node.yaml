schema: moonweave.ai/ontology-node/v1
id: MemoryScope
kind: concept
labels:
  zh: 记忆范围规范
  en: memory scope
  ja: 記憶範囲仕様
semantics:
  short_definition:
    zh: 规定记忆可由哪些主体在何种 tenant、用户、智能体或会话上下文中被访问与复用的规范。
    en: A specification stating which subjects may access and reuse memory in which tenant, user, agent, or session contexts.
    ja: どの主体がどの tenant/user/agent/session 文脈で記憶へアクセス・再利用できるかを定める仕様です。
  definition:
    zh: MemoryScope 是一种规范；其种差是把主体、允许操作、资源选择条件与会话/任务/tenant 边界组合成对 MemoryRecord 的可判定访问与复用边界。Mem0 的 user_id、agent_id、run_id 是 API 级作用域 facet，Letta 区分 agent-scoped 与 org-scoped 记忆，Zep 区分 user memory 与 session memory——这些映射到 scope facet，而不是 MemoryNamespace 的寻址键。它回答“谁在何处能做什么”；MemoryNamespace 回答“记录存在哪里”，MemoryRetentionPolicy 回答“保留多久”。
    en: MemoryScope is a specification combining subject, allowed operations, resource selectors, and session/task/tenant boundaries into a decidable access and reuse boundary for MemoryRecords. Mem0 user_id, agent_id, and run_id are API scope facets; Letta separates agent-scoped versus org-scoped memory; Zep distinguishes user versus session memory—these map to scope facets, not MemoryNamespace addressing keys. It answers “who may do what where”; MemoryNamespace answers where records live; MemoryRetentionPolicy answers how long they are kept.
    ja: MemoryScope は主体・許可操作・資源選択・session/task/tenant 境界を組み合わせ MemoryRecord の判定可能 access/reuse 境界とする仕様。Mem0 user_id/agent_id/run_id、Letta agent/org scope、Zep user/session memory は scope facet への写像で MemoryNamespace 鍵ではない。「誰がどこで何をできるか」に答え、MemoryNamespace は保存場所、MemoryRetentionPolicy は保持期間。
  why_needed:
    zh: 把 Pinecone namespace 或 LangGraph namespace tuple 误当成权限，会导致 agent A 的记忆被 agent B 读到，或 session 指令被当成跨会话用户画像。MemoryScope 让跨会话复用、跨智能体共享和遗忘请求在同一套可审计条件下授权或拒绝。
    en: Mistaking Pinecone namespace or LangGraph namespace tuples for authorization lets agent A's memories leak to agent B or session instructions become cross-session user profile. MemoryScope lets cross-session reuse, cross-agent sharing, and forget requests be allowed or denied under one auditable condition set.
    ja: Pinecone/LangGraph namespace を認可と誤認すると agent 間漏洩や session 指示の cross-session プロファイル化が起きる。MemoryScope で cross-session 再利用・agent 間共有・忘却要求を監査可能条件で許可/拒否。
  includes:
    - zh: Mem0 user_id/agent_id/run_id 组合、Letta agent-scoped 与 org-scoped 边界、Zep user/session 路径，以及带主体、操作与边界条件的 Moonweave 策略版本。
      en: Mem0 user_id/agent_id/run_id combinations, Letta agent-scoped versus org-scoped boundaries, Zep user/session paths, and Moonweave policy versions with subject, operation, and boundary conditions.
      ja: Mem0 user_id/agent_id/run_id 組合せ、Letta agent/org scope、Zep user/session path、主体・操作・境界条件付き Moonweave 方針版。
  excludes:
    - zh: MemoryNamespace、MemoryRetentionPolicy、具体 MemoryRecord、一次授权决定和网络 TrustBoundary。
      en: MemoryNamespace, MemoryRetentionPolicy, a concrete MemoryRecord, one authorization decision, and network TrustBoundary.
      ja: MemoryNamespace、MemoryRetentionPolicy、具体 MemoryRecord、一回の認可判断、ネットワーク TrustBoundary。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Mem0 创建与搜索必须传入相同 user_id/agent_id/run_id 才能命中记忆；Letta 的 agent-scoped memory 仅对该 agent 可见，org-scoped 跨 agent 共享；Zep session memory 不得混入 user memory graph 的长期事实。Moonweave memory_scope_id/version 冻结一组不可变 selector；namespace tuple 只写入 MemoryRecord.namespace，不替代 subject_selector。
    en: Mem0 create and search must pass the same user_id/agent_id/run_id to hit memories; Letta agent-scoped memory is visible only to that agent while org-scoped shares across agents; Zep session memory must not mix into user memory graph long-term facts. Moonweave memory_scope_id/version freezes immutable selectors; namespace tuples go to MemoryRecord.namespace, not subject_selector substitution.
    ja: Mem0 create/search は同一 user_id/agent_id/run_id 必須。Letta agent-scoped は当該 agent のみ、org-scoped は agent 横断。Zep session memory を user graph 長期事実に混ぜない。memory_scope_id/version で selector 固定。namespace tuple は MemoryRecord.namespace のみ。
  typical_input:
    - description: Mem0 scoped memory create — entity IDs scope the memory.
      format: |
        POST https://api.mem0.ai/v1/memories/
        {
          "messages": [{"role": "user", "content": "I prefer dark mode."}],
          "user_id": "alice",
          "agent_id": "support-bot",
          "run_id": "session-17"
        }
      source_claims: [claim-memory-scope-mem0]
    - description: Letta agent-scoped versus shared organizational memory configuration.
      format: |
        # Agent-scoped: visible only to agent-42
        # Org-scoped: shared across agents in organization
        agent_id: agent-42
        memory_scope: agent
      source_claims: [claim-memory-scope-letta]
    - description: Zep user versus session memory API paths.
      format: |
        POST /api/v2/users/{user_id}/memory      # long-term user scope
        POST /api/v2/sessions/{session_id}/memory  # session scope
      source_claims: [claim-memory-scope-zep]
  typical_output:
    - description: Moonweave-local MemoryScope policy version bound to records.
      format: |
        {
          "memory_scope_id": "scope-user-pref",
          "version": "2",
          "subject_selector": {"tenant_id": "tenant-7", "roles": ["assistant"]},
          "allowed_operations": ["read", "reuse"],
          "resource_selector": {"owner_id": "user-42", "memory_types": ["preference"]},
          "boundary_selector": {"cross_session": true, "cross_tenant": false},
          "scope_facets": {"user_id": "alice", "agent_id": "support-bot", "session_id": null}
        }
      source_claims: [claim-memory-scope-design]
  reference_implementations:
    - name: Mem0 Entity Scoping
      url: https://docs.mem0.ai
      description: user_id, agent_id, run_id on create and search.
    - name: Letta Memory Scoping
      url: https://docs.letta.com/guides/core-concepts/memory
      description: Agent-scoped versus organization-scoped memory tiers.
    - name: Zep User and Session Memory
      url: https://help.getzep.com/concepts
      description: Separate API paths and recall semantics for user versus session scope.
structure:
  identity_keys:
    - memory_scope_id
    - version
  fields:
    - id: memory_scope_id
      labels: {zh: 记忆范围标识, en: memory scope ID, ja: 記憶範囲 ID}
      definitions:
        zh: 跨版本稳定标识同一逻辑记忆访问与复用范围规范。
        en: Stably identifies the same logical memory-access and reuse scope across versions.
        ja: 版を跨いで同一 logical access/reuse scope を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: scope-user-pref
      allowed_values: []
      source_claims: [claim-memory-scope-design]
    - id: version
      labels: {zh: 范围版本, en: scope version, ja: 範囲版}
      definitions:
        zh: 固定一组不可变的主体、操作、资源、边界与环境条件；任一条件变化都形成新版本。
        en: Freezes immutable subject, operation, resource, boundary, and environment conditions; any change creates a new version.
        ja: 不変 subject/operation/resource/boundary/environment 条件を固定。変更は新版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2"
      allowed_values: []
      source_claims: [claim-memory-scope-design]
    - id: user_id
      labels: {zh: 用户标识, en: user ID, ja: user ID}
      definitions:
        zh: Mem0/Zep API 中声明记忆所属用户的 scope facet。
        en: Scope facet declaring memory ownership for user in Mem0 and Zep APIs.
        ja: Mem0/Zep API における user 所属 scope facet。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: alice
      allowed_values: []
      source_claims: [claim-memory-scope-mem0]
    - id: agent_id
      labels: {zh: 智能体标识, en: agent ID, ja: agent ID}
      definitions:
        zh: Mem0 agent_id 或 Letta agent-scoped 边界键。
        en: Mem0 agent_id or Letta agent-scoped boundary key.
        ja: Mem0 agent_id または Letta agent-scoped 境界鍵。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: support-bot
      allowed_values: []
      source_claims: [claim-memory-scope-mem0, claim-memory-scope-letta]
    - id: session_id
      labels: {zh: 会话标识, en: session ID, ja: session ID}
      definitions:
        zh: Mem0 run_id 或 Zep session memory 的作用域键；短期/session 级记忆。
        en: Mem0 run_id or Zep session memory scope key for short-lived session-level memory.
        ja: Mem0 run_id または Zep session memory の scope 鍵。短期/session 級。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session-17
      allowed_values: []
      source_claims: [claim-memory-scope-mem0, claim-memory-scope-zep]
    - id: allowed_operations
      labels: {zh: 允许操作, en: allowed operations, ja: 許可操作}
      definitions:
        zh: 在全部其他条件匹配时可执行的记忆操作，如 read、reuse、update、forget-request。
        en: Memory operations permitted when all other conditions match, such as read, reuse, update, forget-request.
        ja: 他条件適合時許可される read/reuse/update/forget-request 等。
      datatype: array
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: [read, reuse]
      allowed_values: []
      source_claims: [claim-memory-scope-design]
    - id: cross_session
      labels: {zh: 允许跨会话, en: cross session allowed, ja: セッション横断許可}
      definitions:
        zh: 声明匹配记录是否可在不同 session/run 间复用；Zep user memory 通常为 true，session memory 为 false。
        en: Declares whether matching records may be reused across sessions or runs; Zep user memory typically true, session memory false.
        ja: 一致 record の session/run 横断 reuse 可否。Zep user memory は通常 true、session memory は false。
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [claim-memory-scope-zep]
  constraints:
    - id: memory-scope-deny-outside-membership
      severity: error
      expression_language: plain
      expression: a request matches MemoryScope only when all selectors and scope facets evaluate true against one attribute snapshot; otherwise the scope grants nothing
      explanation:
        zh: 主体、操作、资源、边界与 scope facet 必须全部满足；namespace 路径 alone 不足。
        en: Subject, operation, resource, boundary, and scope facets must all match; namespace path alone is insufficient.
        ja: subject/operation/resource/boundary/scope facet が全適合必要。namespace path 単独不可。
      source_claims: [claim-memory-scope-design]
  required_relations: []
examples:
  - id: memory-scope-example-mem0-user-agent
    labels:
      zh: Mem0 用户与智能体作用域
      en: Mem0 user and agent scope
      ja: Mem0 user/agent 作用域
    descriptions:
      zh: 应用为 Alice 的 support-bot 写入偏好时 POST /v1/memories/ 携带 user_id=alice 与 agent_id=support-bot。后续 search 必须传入相同 entity ID；不能把 agent 记忆当作全局共享，也不能用 namespace 路径替代这些 facet。
      en: Writing Alice's support-bot preference via POST /v1/memories/ with user_id=alice and agent_id=support-bot requires the same entity IDs on search; agent memory must not be globally shared and namespace paths cannot substitute these facets.
      ja: POST /v1/memories/（user_id=alice, agent_id=support-bot）後の search も同 entity ID 必須。agent 記憶を全局共有扱い不可、namespace で facet 代替不可。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: user_id and agent_id on create and search
    field_values:
      user_id: alice
      agent_id: support-bot
      allowed_operations: [read, write, search]
      cross_session: true
    related_node_ids: [MemoryScope, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [MemoryRecord-scoped_by-MemoryScope]
    source_claims: [claim-memory-scope-mem0, claim-memory-scope-design]
  - id: memory-scope-example-letta-agent-vs-org
    labels:
      zh: Letta 智能体与组织作用域
      en: Letta agent versus org scope
      ja: Letta agent vs org 作用域
    descriptions:
      zh: Letta agent-scoped memory 仅 agent-42 可读可写；org-scoped archival 可被同组织其他 agent 搜索。Moonweave 将 agent_id 与 organization_id 建模为不同 MemoryScope 版本，而不是把 block label 当作授权。
      en: Letta agent-scoped memory is readable/writable only by agent-42; org-scoped archival is searchable by other agents in the organization. Moonweave models agent_id and organization_id as different MemoryScope versions, not block labels as authorization.
      ja: Letta agent-scoped は agent-42 のみ read/write、org-scoped archival は同 org 他 agent が search 可。agent_id/organization_id を別 MemoryScope 版としてモデル化。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory
      version: agent-scoped versus org-scoped memory
    field_values:
      agent_id: agent-42
      scope_tier: agent-scoped
      cross_session: true
      allowed_operations: [read, update]
    related_node_ids: [MemoryScope, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [MemoryRecord-scoped_by-MemoryScope]
    source_claims: [claim-memory-scope-letta, claim-memory-scope-design]
  - id: memory-scope-example-zep-session-vs-user
    labels:
      zh: Zep 会话与用户作用域
      en: Zep session versus user scope
      ja: Zep session vs user 作用域
    descriptions:
      zh: Zep 将 Alice 长期事实写入 POST /api/v2/users/alice/memory，将 session-17 临时指令写入 POST /api/v2/sessions/session-17/memory。recall 必须区分 API 路径；session 指令不得成为跨会话用户画像。
      en: Zep writes Alice's long-term facts to POST /api/v2/users/alice/memory and session-17 instructions to POST /api/v2/sessions/session-17/memory. Recall must distinguish API paths; session instructions must not become cross-session user profile.
      ja: Zep は user memory と session memory で API path が異なり、session 指示を cross-session user プロファイルにしてはならない。
    example_source:
      product: Zep
      url: https://help.getzep.com/concepts
      version: user memory versus session memory APIs
    field_values:
      user_id: alice
      session_id: session-17
      user_memory_cross_session: true
      session_memory_cross_session: false
    related_node_ids: [MemoryScope, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [MemoryRecord-scoped_by-MemoryScope]
    source_claims: [claim-memory-scope-zep, claim-memory-scope-design]
  - id: memory-scope-example-namespace-not-scope
    labels:
      zh: 命名空间不是记忆范围
      en: Namespace is not memory scope
      ja: namespace は memory scope ではない
    descriptions:
      zh: LangGraph namespace=(tenant-7,user-42,preferences) 只说明记录寻址分区，没有主体、操作或 cross_session 条件。它是 MemoryNamespace，即使与 user-42 同名也不得提升为 MemoryScope。
      en: LangGraph namespace=(tenant-7,user-42,preferences) only states record addressing with no subject, operation, or cross_session conditions. It is MemoryNamespace and must not be promoted to MemoryScope despite sharing user-42 in the path.
      ja: namespace=(tenant-7,user-42,preferences) は住所区分のみで subject/operation/cross_session なし。MemoryNamespace で MemoryScope に昇格不可。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: namespace tuple addressing
    field_values:
      namespace_path: [tenant-7, user-42, preferences]
      is_memory_scope: false
    related_node_ids: [MemoryScope, MemoryNamespace, MemoryRecord, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-scope-langgraph, claim-memory-scope-design]
parent_relation:
  id: MemoryRecord-scoped_by-MemoryScope
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 受访问作用域约束
    en: constrained by memory scope
    ja: 記憶作用域に制約される
  definitions:
    zh: MemoryRecord-scoped_by-MemoryScope 把记录版本绑定到可判定的访问与复用规范；它不表示某次请求已经获准。
    en: MemoryRecord-scoped_by-MemoryScope binds a record version to a decidable access-and-reuse specification; it does not assert a particular request was authorized.
    ja: record 版を判定可能 access/reuse 仕様へ結合。個別 request 認可済みを意味しない。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：scoped by, en: is target of scoped by, ja: 逆方向：scoped by}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-scope-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
