source_claims:
  - id: claim-memory-scope-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents runtime identity context, context propagation, context isolation, and filesystem permission rules. MemoryScope is Moonweave's versioned specification combining actors, allowed operations, resource selectors, tenant/session boundaries, trust conditions, and validity for memory access and reuse.
    locator: Memory > Scoped memory > user isolation; Backends > Permissions and policy hooks
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-scope-002
    source: eng-fw-langgraph-docs
    supports: LangGraph's long-term memory examples use runtime user identity and namespace filtering to constrain cross-thread recall. Moonweave separates the access and reuse rule from the namespace address, naming that reusable rule MemoryScope.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
