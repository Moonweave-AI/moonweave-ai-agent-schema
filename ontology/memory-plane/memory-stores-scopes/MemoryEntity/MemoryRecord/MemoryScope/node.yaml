    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: user_id, agent_id, run_id scoping on create and search.
  - id: src-letta-scope
    title: Letta Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory
    source_type: official-doc
    relevance: Agent-scoped versus org-scoped memory boundaries.
  - id: src-zep-scope
    title: Zep Memory Documentation
    publisher: Zep
    url: https://help.getzep.com/concepts
    source_type: official-doc
    relevance: User versus session memory API paths and recall.
  - id: src-langgraph-scope
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: Namespace addressing distinct from authorization.
  - id: src-memory-scope-design
    title: Moonweave MemoryScope design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates scope facets from namespace addressing.
source_claims:
  - id: claim-memory-scope-mem0
    source: src-mem0-scope
    supports: Mem0 requires matching user_id, agent_id, and optional run_id on create and search to scope memories.
    locator: Entity ID fields on add and search memories
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-scope-letta
    source: src-letta-scope
    supports: Letta distinguishes agent-scoped memory visible to one agent from org-scoped shared archival tiers.
    locator: Memory scoping — agent versus organization
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-scope-zep
    source: src-zep-scope
    supports: Zep exposes separate user and session memory endpoints with distinct scope and recall semantics.
    locator: User memory versus session memory routes
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-scope-langgraph
    source: src-langgraph-scope
    supports: LangGraph namespace tuples address records but do not encode subject authorization or operation permissions.
    locator: Item.namespace and list_namespaces
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-scope-design
    source: src-memory-scope-design
    supports: Moonweave MemoryScope packages reusable access and reuse conditions separate from MemoryNamespace and MemoryRetentionPolicy.
    locator: MemoryScope specification boundary
    evidence_kind: design-inference
    confidence: high
