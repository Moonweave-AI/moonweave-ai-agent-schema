schema: moonweave.ai/ontology-node/v1
id: MemoryScope
kind: concept
status: review
labels:
  zh: 记忆范围规范
  en: memory scope
  ja: 記憶範囲仕様
semantics:
  short_definition:
    zh: 规定一条记忆可由哪些主体在何种会话、任务、租户和信任上下文中执行哪些操作的访问规范。
    en: An access specification stating which actors may perform which operations on memory in which session, task, tenant, and trust contexts.
    ja: どの主体がどの会話・タスク・テナント・信頼文脈で記憶へどの操作を行えるかを定めるアクセス仕様です。
  definition:
    zh: 记忆范围是一种规范；其种差是：它把主体或角色、允许操作、资源选择条件、会话/任务/租户边界、信任条件和有效期组合成对 MemoryRecord 的可判定访问与复用边界。它回答“谁在何处能做什么”，而 MemoryNamespace 回答“记录存在哪里并如何寻址”，MemoryRetentionPolicy 回答“保留多久”。
    en: A MemoryScope is a specification combining actor or role, allowed operations, resource selectors, session/task/tenant boundary, trust conditions, and validity interval into a decidable access and reuse boundary for MemoryRecords. It answers “who may do what where”; MemoryNamespace answers where records are addressed, and MemoryRetentionPolicy answers how long they remain.
    ja: MemoryScope は主体・役割、許可操作、資源選択条件、会話・タスク・テナント境界、信頼条件、有効期間を組み合わせ、MemoryRecord の判定可能なアクセス・再利用境界を作る仕様です。「誰がどこで何をできるか」に答え、MemoryNamespace は保存・アドレス、MemoryRetentionPolicy は保持期間に答えます。
  why_needed:
    zh: 它使跨会话复用、跨智能体共享和遗忘请求能够在同一套可审计条件下授权或拒绝，避免把命名空间隔离误当成访问控制。
    en: It lets cross-session reuse, cross-agent sharing, and forgetting requests be allowed or denied under one auditable condition set without mistaking namespace partitioning for access control.
    ja: セッション横断再利用、エージェント間共有、忘却要求を同じ監査可能条件で許可・拒否し、名前空間分割をアクセス制御と誤認しません。
  includes:
    - zh: 纳入“user-42 的偏好可由同租户助手跨会话读取，只有本人可更新或遗忘”这类带主体、操作、资源和边界条件的规范。
      en: Includes specifications such as “user-42 preferences may be read across sessions by same-tenant assistants, but only the user may update or forget them,” with actor, operation, resource, and boundary conditions.
      ja: 「user-42 の選好は同一テナント助手が会話横断で読めるが、更新・忘却は本人のみ」のように主体・操作・資源・境界条件を持つ仕様を含みます。
  excludes:
    - zh: 排除 MemoryNamespace、MemoryRetentionPolicy、具体 MemoryRecord、一次授权决定和网络 TrustBoundary；它们分别回答寻址、时长、内容、决策或系统边界问题。
      en: Excludes MemoryNamespace, MemoryRetentionPolicy, a concrete MemoryRecord, one authorization decision, and a network TrustBoundary; these address naming, duration, content, decisions, or system boundaries.
      ja: MemoryNamespace、MemoryRetentionPolicy、具体 MemoryRecord、一回の認可判断、ネットワーク TrustBoundary は命名・期間・内容・判断・システム境界を扱うため除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - memory_scope_id
    - version
  fields:
    - id: memory_scope_id
      labels:
        zh: 记忆范围标识
        en: memory scope ID
        ja: 記憶範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识同一逻辑记忆访问与复用范围规范。
        en: Stably identifies the same logical memory-access and reuse scope across versions.
        ja: 版を跨いで同じ論理記憶アクセス・再利用範囲仕様を安定識別します。
      allowed_values: []
      pattern: null
      example_value: scope-user-pref
      source_claims:
        - claim-memory-scope-003
    - id: version
      labels:
        zh: 范围版本
        en: scope version
        ja: 範囲版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可变的主体、操作、资源、边界、环境和有效期条件；任一条件变化都形成新版本。
        en: Freezes one immutable set of subject, operation, resource, boundary, environment, and validity conditions; changing any condition creates a new version.
        ja: 一組の不変な subject・operation・resource・boundary・environment・validity 条件を固定し、条件変更は新版を作ります。
      allowed_values: []
      pattern: null
      example_value: "2"
      source_claims:
        - claim-memory-scope-004
    - id: subject_selector
      labels:
        zh: 主体选择条件
        en: subject selector
        ja: 主体選択条件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以主体标识、角色、租户归属或其他可验证属性确定哪些人类或非人主体可匹配该范围。
        en: Uses subject identity, role, tenant affiliation, or other verifiable attributes to determine which human or non-person entities match the scope.
        ja: subject identity・role・tenant affiliation 等の検証可能属性でどの human・non-person entity が scope に適合するか決めます。
      allowed_values: []
      pattern: null
      example_value:
        tenant_id: tenant-7
        roles:
          - assistant
      source_claims:
        - claim-memory-scope-005
    - id: allowed_operations
      labels:
        zh: 允许操作
        en: allowed operations
        ja: 許可操作
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出在全部其他条件匹配时可执行的一个或多个记忆操作，例如 read、reuse、update 或 forget-request。
        en: Lists one or more memory operations permitted when all other conditions match, such as read, reuse, update, or forget-request.
        ja: 他条件が全て適合するとき許される read・reuse・update・forget-request 等一つ以上の記憶操作を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - read
        - reuse
      source_claims:
        - claim-memory-scope-006
    - id: resource_selector
      labels:
        zh: 资源选择条件
        en: resource selector
        ja: 資源選択条件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 MemoryRecord 标识、类型、数据分类、所有者或命名空间属性确定范围治理的资源集合。
        en: Selects the governed resources using MemoryRecord identity, type, data classification, owner, or namespace attributes.
        ja: MemoryRecord identity・type・data classification・owner・namespace 属性で統治対象 resource 集合を選びます。
      allowed_values: []
      pattern: null
      example_value:
        memory_types:
          - preference
        owner_id: user-42
      source_claims:
        - claim-memory-scope-007
    - id: boundary_selector
      labels:
        zh: 运行边界选择条件
        en: runtime boundary selector
        ja: 実行境界選択条件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明会话、任务、智能体、应用或租户边界如何限制跨上下文读取与复用；空对象必须显式表示无额外边界。
        en: Declares how session, task, agent, application, or tenant boundaries restrict cross-context reading and reuse; an empty object explicitly means no additional boundary.
        ja: session・task・agent・application・tenant 境界が context 横断 read・reuse をどう制限するか示し、空 object は追加境界なしを明示します。
      allowed_values: []
      pattern: null
      example_value:
        tenant_id: tenant-7
        cross_session: true
        cross_tenant: false
      source_claims:
        - claim-memory-scope-008
    - id: environment_conditions
      labels:
        zh: 环境与信任条件
        en: environment and trust conditions
        ja: 環境・信頼条件
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录访问时必须满足的时间、位置、风险、信任等级或执行环境属性；空对象显式表示无附加环境条件。
        en: Records time, location, risk, trust-level, or execution-environment attributes required at access time; an empty object explicitly means no additional environment condition.
        ja: access 時に必要な time・location・risk・trust level・execution environment 属性を記録し、空 object は追加環境条件なしを明示します。
      allowed_values: []
      pattern: null
      example_value:
        minimum_trust_level: tenant-authenticated
        permitted_environments:
          - production
      source_claims:
        - claim-memory-scope-009
    - id: validity_interval
      labels:
        zh: 有效时间区间
        en: validity interval
        ja: 有効時間区間
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以含起点、可选终点的区间限制该版本何时可用于访问判断；区间外默认不匹配。
        en: Limits when this version may be used for access decisions with a start and optional end; outside the interval it does not match by default.
        ja: 開始・任意終了を持つ区間で本版を access 判断に使える時期を制限し、区間外は既定で不適合です。
      allowed_values: []
      pattern: null
      example_value:
        valid_from: 2026-07-01T00:00:00Z
        valid_until: null
      source_claims:
        - claim-memory-scope-010
  constraints:
    - id: memory-scope-deny-outside-membership
      severity: error
      expression_language: plain
      expression: a request matches MemoryScope only when subject_selector, requested operation in allowed_operations, resource_selector, boundary_selector, environment_conditions, and validity_interval all evaluate true against one attribute snapshot; otherwise the scope grants nothing
      explanations:
        zh: 主体、操作、资源、运行边界、环境和有效期必须在同一属性快照上全部满足；任一条件不满足时，该范围不授予访问或复用。
        en: Subject, operation, resource, runtime boundary, environment, and validity must all match one attribute snapshot. If any condition fails, this scope grants no access or reuse.
        ja: subject・operation・resource・runtime boundary・environment・validity が同一 attribute snapshot で全て適合する必要があり、一条件でも失敗すれば本 scope は権限を与えません。
      source_claims:
        - claim-memory-scope-011
  required_relation_constraints: []
examples:
  - id: MemoryScope-example-positive-001
    kind: positive
    labels:
      zh: 记忆范围规范正例
      en: Positive example of memory scope
      ja: 記憶範囲仕様の正例
    scenario_id: null
    descriptions:
      zh: scope-user-pref-v2 允许 tenant-7 内助手跨会话读取 user-42 的偏好，禁止跨租户读取，并只允许 user-42 更新或发起遗忘；规则带有效期和角色选择条件。
      en: scope-user-pref-v2 allows assistants in tenant-7 to read user-42 preferences across sessions, denies cross-tenant reads, and permits only user-42 to update or request forgetting; it carries validity and role selectors.
      ja: scope-user-pref-v2 は tenant-7 内助手の user-42 選好会話横断読取を許可し、テナント横断読取を拒否し、更新・忘却要求を user-42 のみに許可し、有効期と役割選択条件を持ちます。
    field_values:
      memory_scope_id: scope-user-pref
      version: "2"
      subject_selector:
        tenant_id: tenant-7
        roles:
          - assistant
      allowed_operations:
        - read
        - reuse
      resource_selector:
        memory_types:
          - preference
        owner_id: user-42
      boundary_selector:
        tenant_id: tenant-7
        cross_session: true
        cross_tenant: false
      environment_conditions:
        minimum_trust_level: tenant-authenticated
        permitted_environments:
          - production
      validity_interval:
        valid_from: 2026-07-01T00:00:00Z
        valid_until: null
    related_node_ids:
      - MemoryScope
      - MemoryRecord
    related_relation_ids:
      - MemoryRecord-scoped_by-MemoryScope
    expected_result:
      zh: 该运行可查询 MemoryScope 以及方向保持不变的事实 MemoryRecord-scoped_by-MemoryScope。
      en: The run can query MemoryScope together with direction-preserving fact MemoryRecord-scoped_by-MemoryScope.
      ja: この実行では MemoryScope と方向を保持した事実 MemoryRecord-scoped_by-MemoryScope を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、MemoryRecord-scoped_by-MemoryScope 的 canonical 方向、概念定义和可用字段值。
      en: The specification combines actor, operation, resource selector, tenant boundary, and validity into a decidable access rule rather than merely naming where the record is stored.
      ja: このシナリオは実際の運用文脈、MemoryRecord-scoped_by-MemoryScope の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-scope-012
      - claim-memory-scope-013
  - id: MemoryScope-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆范围规范边界例
      en: Boundary case for memory scope
      ja: 記憶範囲仕様の境界例
    scenario_id: null
    descriptions:
      zh: record-pref-language/v3 保存偏好内容、来源和生命周期，并引用 scope-user-pref-v2；它是受规则约束的 MemoryRecord，不是声明主体和操作条件的 MemoryScope。
      en: record-pref-language/v3 stores preference content, provenance, and lifecycle and references scope-user-pref-v2. It is the governed MemoryRecord, not the MemoryScope declaring actor and operation conditions.
      ja: record-pref-language/v3 は選好内容・来歴・ライフサイクルを保存し scope-user-pref-v2 を参照します。統治される MemoryRecord で、主体・操作条件を宣言する MemoryScope ではありません。
    field_values: {}
    related_node_ids:
      - MemoryScope
      - MemoryRecord
    related_relation_ids:
      - MemoryRecord-scoped_by-MemoryScope
    expected_result:
      zh: MemoryRecord 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryScope。
      en: MemoryRecord retains its own type; validation must not promote it to MemoryScope from relation co-occurrence.
      ja: MemoryRecord は元の型を維持し、関係の共起だけで MemoryScope へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 MemoryRecord-scoped_by-MemoryScope 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A record is persistent information with content and lifecycle; a scope is a reusable access specification. The scoped_by relation preserves this governed-object versus rule distinction.
      ja: 境界例は実在する対照ノードを示し、MemoryRecord-scoped_by-MemoryScope の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-scope-014
      - claim-memory-scope-015
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryRecord-scoped_by-MemoryScope
  predicate: scoped_by
  direction: source-to-target
  relation_kind: governance
  labels:
    zh: 受访问作用域约束
    en: constrained by memory scope
    ja: 記憶作用域に制約される
  definitions:
    zh: MemoryRecord-scoped_by-MemoryScope 把记录版本绑定到可判定的访问与复用规范，该规范组合主体/角色、操作、资源条件、会话/任务/租户边界、环境与有效期；它不表示某次请求已经获准。
    en: MemoryRecord-scoped_by-MemoryScope binds a record version to a decidable access-and-reuse specification combining subject or role, operation, resource selectors, session/task/tenant boundary, environment, and validity. It does not assert that a particular request was authorized.
    ja: MemoryRecord-scoped_by-MemoryScope は記録版を主体/role・操作・資源条件・session/task/tenant境界・環境・有効期を組み合わせる判定可能な access/reuse 仕様へ結びます。個別要求の認可済みを意味しません。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: is_target_of_scoped_by
    labels:
      zh: 反向：scoped by
      en: is target of scoped by
      ja: 逆方向：scoped by
  conditions:
    - id: MemoryRecord-scoped_by-MemoryScope-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the MemoryRecord records the exact MemoryScope identity and version and its namespace, tenant, principal, session, or task attributes satisfy the scope membership predicate; matching one label without the membership rule is insufficient.
      explanations:
        zh: 仅当 MemoryRecord 记录精确 MemoryScope 身份和版本，且其 namespace、tenant、principal、session 或 task 属性满足范围成员谓词时成立；只有一个同名标签而没有成员规则不足。
        en: Assert only when the MemoryRecord records the exact MemoryScope identity and version and its namespace, tenant, principal, session, or task attributes satisfy the scope membership predicate; matching one label without the membership rule is insufficient.
        ja: MemoryRecord が正確な MemoryScope ID/version を記録し、namespace・tenant・principal・session・task attribute が scope membership predicate を満たす場合だけ成立します。同名 label 一つだけでは不十分です。
      source_claims:
        - claim-memory-scope-016
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryRecord-scoped_by-MemoryScope-example-positive-001
      kind: positive
      labels:
        zh: 受访问作用域约束正例
        en: "Positive case: constrained by memory scope"
        ja: 記憶作用域に制約されるの正例
      scenario_id: null
      descriptions:
        zh: record-17 受 scope-user42-preferences@v3 约束：同租户助手可读，只有 user-42 可更新或遗忘。
        en: "record-17 is constrained by scope-user42-preferences@v3: same-tenant assistants may read, while only user-42 may update or forget."
        ja: record-17 は scope-user42-preferences@v3 に制約され、同tenant助手は読取可、user-42のみ更新・忘却可です。
      field_values: {}
      related_node_ids:
        - MemoryRecord
        - MemoryScope
      related_relation_ids:
        - MemoryRecord-scoped_by-MemoryScope
      expected_result:
        zh: 授权输入返回主体、操作、资源、租户和有效期条件。
        en: Authorization input returns subject, operation, resource, tenant, and validity conditions.
        ja: 認可入力は主体・操作・資源・tenant・有効期条件を返します。
      why_valid_or_invalid:
        zh: 作用域版本包含 NIST ABAC 所需的完整属性类别。
        en: The scope version contains the attribute categories required for ABAC evaluation.
        ja: scope版はABAC評価に必要な属性分類を含みます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-scope-017
    - id: MemoryRecord-scoped_by-MemoryScope-example-boundary-001
      kind: boundary
      labels:
        zh: 受访问作用域约束边界例
        en: "Boundary case: constrained by memory scope"
        ja: 記憶作用域に制約されるの境界例
      scenario_id: null
      descriptions:
        zh: namespace=(tenant-7,user-42) 只说明记录地址，没有操作或主体条件。
        en: namespace=(tenant-7,user-42) only states the record address and has no operation or subject conditions.
        ja: namespace=(tenant-7,user-42) は記録住所だけで操作・主体条件がありません。
      field_values: {}
      related_node_ids:
        - MemoryRecord
        - MemoryScope
      related_relation_ids:
        - MemoryRecord-scoped_by-MemoryScope
      expected_result:
        zh: 命名空间不能替代 MemoryScope。
        en: The namespace cannot substitute for MemoryScope.
        ja: namespace は MemoryScope を代替できません。
      why_valid_or_invalid:
        zh: 寻址集合无法回答谁能执行何种操作。
        en: An addressing collection cannot answer who may perform which operation.
        ja: 住所集合は誰が何を実行できるか答えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-scope-018
  source_claims:
