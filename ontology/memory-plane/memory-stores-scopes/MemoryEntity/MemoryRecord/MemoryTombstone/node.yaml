source_claims:
  - id: claim-memory-tombstone-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents makes long-term memory writable and persists updates for later conversations through a backend. It does not define tombstones; Moonweave introduces MemoryTombstone as the immutable terminal MemoryRecord that makes a completed deletion auditable without preserving the withdrawn content.
    locator: Memory > How memory works > Agent updates memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-002
    source: eng-fw-langgraph-docs
    supports: LangGraph's BaseStore contract provides keyed delete alongside put, get, search, and namespace listing. Moonweave layers a content-free terminal record over successful deletion to retain original identity, predecessor, reason, actor, and time; that taxonomy is explicitly a design inference.
    locator: Stores > Build a custom store > Base contract > adelete
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents treats long-term memory files as persisted, writable state whose later conversations observe updates. Moonweave adds an immutable terminal record so a deletion update can remain auditable without reloading withdrawn content; the documentation does not itself prescribe tombstones.
    locator: Memory > How memory works > Agent updates memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-004
    source: eng-fw-langgraph-docs
    supports: LangGraph's BaseStore contract deletes an item by namespace and key. memory-record-001/v5 is Moonweave's post-delete audit representation layered above that operation, retaining termination identity while excluding the removed value.
    locator: Stores > Build a custom store > Base contract > adelete
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents says memory-file edits persist and become available in later conversations. A still-readable active preference therefore remains ordinary memory; Moonweave assigns tombstone status only after content withdrawal has completed.
    locator: Memory > How memory works > Agent updates memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-006
    source: eng-fw-langgraph-docs
    supports: LangGraph distinguishes a stored item returned by get or search from the adelete operation that removes it. Moonweave likewise keeps an active MemoryRecord separate from the terminal MemoryTombstone produced only after deletion.
    locator: Stores > Build a custom store > Base contract
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents persists memory updates across conversations through configured backends. The instance records Moonweave's audit metadata for one terminal update while deliberately omitting withdrawn content.
    locator: Memory > How memory works; Scoped memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-008
    source: eng-fw-langgraph-docs
    supports: LangGraph Store identifies values by namespace and key and provides adelete for removal. Moonweave's instance retains record key, version, deletion provenance, and governance metadata outside the removed value so deletion remains auditable.
    locator: Stores > Base contract; Namespace design
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-tombstone-009
    source: eng-fw-langgraph-memory-store
    supports: The namespace-key address and later version remain durable while the prior value is absent, matching a persistent deletion marker rather than live content.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-tombstone-010
    source: eng-fw-langgraph-memory-store
    supports: An event describing deletion lacks the store address and persistent Item identity required of a tombstone record.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-tombstone-011
    source: eng-fw-langgraph-memory-store
    supports: LangGraph BaseStore models deletion as a PutOp with a null value at a namespace-key address; Moonweave specializes the retained, versioned deletion marker as MemoryTombstone when audit and stale-resurrection prevention require it.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
