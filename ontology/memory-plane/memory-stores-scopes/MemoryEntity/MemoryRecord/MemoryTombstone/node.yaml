schema: moonweave.ai/ontology-node/v1
id: MemoryTombstone
kind: concept
status: accepted
labels:
  zh: 记忆墓碑记录
  en: Memory tombstone record
  ja: 記憶墓標記録
semantics:
  short_definition:
    zh: 在内容被删除、过期或驱逐后保留原记录身份与终止事实、但不保留被撤回内容的不可变 MemoryRecord。
    en: An immutable MemoryRecord retaining original identity and termination facts after deletion, expiry, or eviction without retaining withdrawn content.
    ja: 削除・失効・退去後に元レコード同一性と終了事実を保持し、撤回内容は保持しない不変 MemoryRecord です。
  definition:
    zh: 记忆墓碑是一种 MemoryRecord；其种差是：它替代已经删除、过期、驱逐或被隐私请求撤回的记录版本，以不可变形式保留原 memory_record_id、前驱版本、终止操作、原因、时间和执行者，同时删除或不可恢复地遮蔽原内容。它证明“曾存在且已终止”，不是仍可用于回答的记忆内容。
    en: A MemoryTombstone is a MemoryRecord replacing a version deleted, expired, evicted, or withdrawn by a privacy request. It immutably retains original record ID, predecessor version, terminal operation, reason, time, and actor while deleting or irreversibly obscuring the original content. It proves that the record existed and terminated, not memory content usable for answering.
    ja: MemoryTombstone は削除・失効・退去・プライバシー要求で撤回された版を置換する MemoryRecord です。元 record ID、前駆版、終了操作・理由・時刻・実行者を不変保持し、元内容を削除または不可逆遮蔽します。「存在し終了した」ことを証明し、回答に使える記憶内容ではありません。
  why_needed:
    zh: 墓碑防止已删除记录被复制副本重新导入，支持跨副本传播删除和审计终止原因，同时避免继续暴露被撤回内容。
    en: Tombstones prevent deleted records from being reintroduced by replicas, propagate deletion across copies, and audit termination reasons without continuing to expose withdrawn content.
    ja: 墓標は複製から削除記録が再導入されることを防ぎ、複製間削除伝播と終了理由監査を行いながら撤回内容の露出を避けます。
  includes:
    - zh: 纳入 tombstone-record-pref-42 这类保留原 ID、前驱版本、deleted_by_user_request、时间和执行者，但 content 为空或不可恢复散列的记录。
      en: Includes records such as tombstone-record-pref-42 retaining original ID, predecessor version, deleted_by_user_request, time, and actor while content is absent or irreversibly hashed.
      ja: 元ID、前駆版、deleted_by_user_request、時刻、実行者を保持し、content が空または不可逆hashの tombstone-record-pref-42 のような記録を含みます。
  excludes:
    - zh: 排除仍含可用记忆内容的普通 MemoryRecord、MemoryDelete 活动、删除审计事件、软删除标志以及匿名化后的新记录。
      en: Excludes ordinary MemoryRecords with usable content, the MemoryDelete activity, deletion audit events, a soft-delete flag by itself, and newly anonymized records.
      ja: 利用可能内容を持つ通常 MemoryRecord、MemoryDelete活動、削除監査イベント、soft-delete標識だけ、匿名化後の新レコードを除外します。
  semantic_kind: information
  aliases: []
