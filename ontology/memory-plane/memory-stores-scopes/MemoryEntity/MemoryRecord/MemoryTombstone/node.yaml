      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 版本 5 与终止时间形成新的不可变记录边界，来源直接指向删除请求；保留的分类与访问策略用于审计，缺少内容则确保它不能再次参与回答。
      en: Version 5 and the terminal timestamp form a new immutable record boundary, with provenance pointing directly to the deletion request. Classification and access policy remain for audit, while absent content prevents reuse in answers.
      ja: 版5と終了時刻が新しい不変record境界を形成し、来歴は削除要求を直接指します。分類とアクセス方針は監査用に残し、内容欠如により回答への再利用を防ぎます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
