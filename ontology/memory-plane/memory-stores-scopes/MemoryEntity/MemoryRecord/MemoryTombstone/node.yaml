schema: moonweave.ai/ontology-node/v1
id: MemoryTombstone
kind: concept
labels:
  zh: 记忆墓碑记录
  en: memory tombstone record
  ja: 記憶墓標記録
semantics:
  short_definition:
    zh: 在内容被删除或过期后保留原记录身份与终止事实、但不保留被撤回内容的 MemoryRecord。
    en: A MemoryRecord retaining original identity and termination facts after deletion or expiry without retaining withdrawn content.
    ja: 削除・失効後に元 record 同一性と終了事実を保持し撤回内容は保持しない MemoryRecord です。
  definition:
    zh: MemoryTombstone 是一种 MemoryRecord；其种差是替代已经删除、过期、驱逐或被隐私请求撤回的记录版本，以不可变形式保留原 memory_record_id、前驱版本、终止操作、原因、时间和执行者，同时删除或不可逆遮蔽原内容。Mem0 DELETE /v1/memories/{id}/ 成功后 API 不再返回内容，Moonweave 必须登记 tombstone 事实；Letta archival_memory_delete 移除 passage 后同样应保留审计墓碑。LangGraph BaseStore.delete 或 PutOp null value 可表达删除标记。它证明“曾存在且已终止”，不是仍可用于回答的记忆内容。
    en: A MemoryTombstone is a MemoryRecord replacing a version deleted, expired, evicted, or withdrawn by a privacy request. It immutably retains original memory_record_id, predecessor version, terminal operation, reason, time, and actor while deleting or irreversibly obscuring original content. After Mem0 DELETE /v1/memories/{id}/ succeeds the API returns no content and Moonweave must record a tombstone fact; Letta archival_memory_delete likewise should retain audit tombstones. LangGraph BaseStore.delete or PutOp null value can express deletion markers. It proves the record existed and terminated, not content usable for answers.
    ja: MemoryTombstone は削除・失効・退去・プライバシー撤回で置換される MemoryRecord。元 record ID・前駆版・終了操作・理由・時刻・実行者を不変保持し原内容を削除/不可逆遮蔽。Mem0 DELETE 後・Letta archival_memory_delete 後・LangGraph delete/null put 後に tombstone 事実を残す。「存在し終了した」証明であり回答可能内容ではない。
  why_needed:
    zh: 没有墓碑，已删除记录可能被复制副本重新导入，用户要求遗忘时也可能只删检索索引而持久行仍在。Mem0/Letta 的软删除语义需要 Moonweave 层可审计的终止记录。
    en: Without tombstones, deleted records may be reintroduced by replicas, and forget requests may delete only search indexes while persistent rows remain. Mem0/Letta soft-delete semantics need auditable termination records at the Moonweave layer.
    ja: tombstone がなければ削除 record が replica から再導入され、忘却要求で index のみ消える。Mem0/Letta soft-delete に Moonweave 監査可能終了 record が必要。
  includes:
    - zh: 保留原 ID、前驱版本、deleted_by_user_request 等原因与时间，但 content 为空或不可逆散列的 Mem0/Letta/LangGraph 删除后记录。
      en: Post-deletion records from Mem0/Letta/LangGraph retaining original ID, predecessor version, deletion reason and time, with absent or irreversible content digest.
      ja: Mem0/Letta/LangGraph 削除後、元 ID・前駆版・削除理由・時刻を保持し content 空/不可逆 hash の record。
  excludes:
    - zh: 仍含可用记忆内容的普通 MemoryRecord、MemoryDelete 活动、删除审计事件，以及仅有软删除标志但未完成终止的 active 记录。
      en: Ordinary MemoryRecords with usable content, MemoryDelete activities, deletion audit events, and active records with only a soft-delete flag before termination completes.
      ja: 利用可能内容の通常 MemoryRecord、MemoryDelete 活動、削除監査 event、終了未完了 active record（soft-delete 標識のみ）。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Mem0 DELETE 返回成功消息后，Moonweave 登记 MemoryDelete 并产出 tombstone 版本，lifecycle_state=tombstoned，value 为空。Letta archival_memory_delete 针对 passage id 移除内容但应保留 passage_id 与删除原因。LangGraph store.delete(namespace, key) 后立即不可 get；若需审计，put null 或内部 tombstone row 映射为 MemoryTombstone。检索层不得再返回原 value。
    en: After Mem0 DELETE succeeds, Moonweave records MemoryDelete and produces a tombstone version with lifecycle_state=tombstoned and empty value. Letta archival_memory_delete removes passage content but should retain passage_id and deletion reason. LangGraph store.delete(namespace, key) makes get fail immediately; audit may map null put or internal tombstone rows to MemoryTombstone. Retrieval must not return the original value.
    ja: Mem0 DELETE 成功後 lifecycle_state=tombstoned・空 value の tombstone 版。Letta archival_memory_delete は passage_id/理由を残す。LangGraph delete 後 get 不可。検索は原 value を返さない。
  typical_input:
    - description: Mem0 delete memory API success response.
      format: |
        DELETE https://api.mem0.ai/v1/memories/{memory_id}/
        # => {"message": "Memory deleted successfully!"}
      source_claims: [claim-memory-tombstone-mem0]
    - description: Letta archival memory delete after search.
      format: |
        archival_memory_search(query="JWT refresh rotation")
        archival_memory_delete(id="archival-passage-42")
      source_claims: [claim-memory-tombstone-letta]
    - description: LangGraph BaseStore delete by namespace and key.
      format: |
        await store.delete(
          ("tenant-7", "user-42", "preferences"),
          "response-language"
        )
      source_claims: [claim-memory-tombstone-langgraph]
  typical_output:
    - description: Moonweave-local MemoryTombstone record after termination.
      format: |
        {
          "memory_record_id": "record-310",
          "version": 3,
          "lifecycle_state": "tombstoned",
          "value": null,
          "predecessor_id": "record-310-v2",
          "invalidation_reason": "user-forget-request",
          "terminated_at": "2026-07-16T09:15:00Z",
          "external_memory_id": "mem0-8f3c2a1b"
        }
      source_claims: [claim-memory-tombstone-design]
  reference_implementations:
    - name: Mem0 Delete Memory API
      url: https://docs.mem0.ai
      description: DELETE /v1/memories/{id}/ removes stored memory by id.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_delete removes out-of-window passages.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.delete removes namespace-key Items.
structure:
  identity_keys:
    - memory_record_id
    - version
  fields:
    - id: memory_record_id
      labels: {zh: 记忆记录标识, en: memory record ID, ja: 記憶 record ID}
      definitions:
        zh: 与原被删除记录相同的逻辑 record id；墓碑占据同一 lineage 的新版本。
        en: Same logical record id as the deleted record; tombstone occupies a new version in the same lineage.
        ja: 削除された record と同一 logical record id。同一 lineage の新版として tombstone が占める。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-310
      allowed_values: []
      source_claims: [claim-memory-tombstone-design]
    - id: version
      labels: {zh: 版本, en: version, ja: 版}
      definitions:
        zh: 墓碑版本号，单调大于被终止的前驱版本。
        en: Tombstone version number, monotonically greater than the terminated predecessor.
        ja: tombstone 版番号。終了前駆版より単調に大きい。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims: [claim-memory-tombstone-design]
    - id: lifecycle_state
      labels: {zh: 生命周期状态, en: lifecycle state, ja: lifecycle state}
      definitions:
        zh: 必须为 tombstoned；区别于 active 或 superseded 普通记录。
        en: Must be tombstoned; distinct from active or superseded ordinary records.
        ja: tombstoned 必須。active/superseded 通常 record と区別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tombstoned
      allowed_values: [tombstoned]
      source_claims: [claim-memory-tombstone-design]
    - id: predecessor_id
      labels: {zh: 前驱版本引用, en: predecessor reference, ja: 前駆版参照}
      definitions:
        zh: 指向被本墓碑终止的上一 record 版本。
        en: Points to the prior record version terminated by this tombstone.
        ja: 本 tombstone が終了させた直前 record 版を指す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-310-v2
      allowed_values: []
      source_claims: [claim-memory-tombstone-design]
    - id: invalidation_reason
      labels: {zh: 失效原因, en: invalidation reason, ja: 失効理由}
      definitions:
        zh: 终止原因，如 user-forget-request、ttl-expiry、archival-delete。
        en: Termination reason such as user-forget-request, ttl-expiry, archival-delete.
        ja: user-forget-request、ttl-expiry、archival-delete 等の終了理由。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: user-forget-request
      allowed_values: []
      source_claims: [claim-memory-tombstone-mem0]
    - id: terminated_at
      labels: {zh: 终止时间, en: terminated at, ja: 終了時刻}
      definitions:
        zh: 删除或过期操作完成并登记墓碑的 UTC 时间。
        en: UTC time when deletion or expiry completed and the tombstone was recorded.
        ja: 削除/失効完了と tombstone 登録の UTC 時刻。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:15:00Z
      allowed_values: []
      source_claims: [claim-memory-tombstone-design]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: 内容 digest}
      definitions:
        zh: 对空内容或 tombstone 标记计算的摘要；不得等于前驱版本的原内容 digest。
        en: Digest of empty content or tombstone marker; must not equal the predecessor's original content digest.
        ja: 空内容/tombstone marker の digest。前駆原内容 digest と同一不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:tombstone-record-310-v3
      allowed_values: []
      source_claims: [claim-memory-tombstone-design]
  constraints:
    - id: memory-tombstone-no-recoverable-content
      severity: error
      expression_language: plain
      expression: lifecycle_state is tombstoned; value is absent or irreversibly hashed; predecessor_id and invalidation_reason are present
      explanation:
        zh: 墓碑不得保留可恢复的原记忆内容；必须保留终止证据。
        en: Tombstones must not retain recoverable original memory content; terminal evidence is required.
        ja: tombstone は復元可能原内容を保持せず、終了証拠必須。
      source_claims: [claim-memory-tombstone-design]
  required_relations: []
examples:
  - id: memory-tombstone-example-mem0-delete
    labels:
      zh: Mem0 删除后墓碑
      en: Mem0 post-delete tombstone
      ja: Mem0 削除後 tombstone
    descriptions:
      zh: 用户请求遗忘偏好后，应用调用 DELETE /v1/memories/mem0-8f3c2a1b/ 成功。Moonweave 消费 record-310-v2 并产出 record-310-v3：lifecycle_state=tombstoned、value 为空、invalidation_reason=user-forget-request，而不是仅让后续 search 返回空。
      en: After a user forget request, DELETE /v1/memories/mem0-8f3c2a1b/ succeeds. Moonweave consumes record-310-v2 and produces record-310-v3 with lifecycle_state=tombstoned, empty value, invalidation_reason=user-forget-request—not merely empty later search.
      ja: DELETE /v1/memories/mem0-8f3c2a1b/ 成功後、record-310-v3 を tombstoned・空 value・user-forget-request で生成。後続 search 空だけでは不十分。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: DELETE /v1/memories/{memory_id}/
    field_values:
      memory_record_id: record-310
      version: 3
      lifecycle_state: tombstoned
      predecessor_id: record-310-v2
      invalidation_reason: user-forget-request
      terminated_at: 2026-07-16T09:15:00Z
      external_memory_id: mem0-8f3c2a1b
      value: null
    related_node_ids: [MemoryTombstone, MemoryRecord, memory-lifecycle, memory-stores-scopes]
    related_relation_ids: [MemoryTombstone-is_a-MemoryRecord]
    source_claims: [claim-memory-tombstone-mem0, claim-memory-tombstone-design]
  - id: memory-tombstone-example-letta-archival-delete
    labels:
      zh: Letta 归档删除墓碑
      en: Letta archival delete tombstone
      ja: Letta archival 削除 tombstone
    descriptions:
      zh: 智能体通过 archival_memory_search 定位 passage archival-passage-42，再 archival_memory_delete 移除过时的 API 摘要。Moonweave 针对 archival record 登记 tombstone，保留 passage_id 与删除原因，core human/persona 块不受影响。
      en: The agent locates passage archival-passage-42 via archival_memory_search and removes the stale API summary with archival_memory_delete. Moonweave records a tombstone for the archival record retaining passage_id and deletion reason; core human/persona blocks are unaffected.
      ja: archival_memory_search で archival-passage-42 を特定し archival_memory_delete。archival record に tombstone を登録し passage_id/理由を保持。core block は非影響。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      version: archival_memory_delete
    field_values:
      memory_record_id: record-archival-42
      version: 2
      lifecycle_state: tombstoned
      invalidation_reason: archival-delete
      deleted_passage_id: archival-passage-42
      storage_tier: archival
    related_node_ids: [MemoryTombstone, MemoryRecord, memory-lifecycle, memory-stores-scopes]
    related_relation_ids: [MemoryTombstone-is_a-MemoryRecord]
    source_claims: [claim-memory-tombstone-letta, claim-memory-tombstone-design]
  - id: memory-tombstone-example-langgraph-delete
    labels:
      zh: LangGraph 删除后墓碑
      en: LangGraph post-delete tombstone
      ja: LangGraph 削除後 tombstone
    descriptions:
      zh: 应用对 BaseStore 中 ("tenant-7","user-42","preferences")/response-language 调用 delete，Item 立即不可 get。Moonweave 登记 tombstone 版本保留 namespace/key 地址与 terminated_at，防止旧版本在副本中复活。
      en: store.delete on ("tenant-7","user-42","preferences")/response-language makes the Item immediately ungettable. Moonweave records a tombstone version retaining namespace/key address and terminated_at to prevent stale resurrection across replicas.
      ja: store.delete 後 Item は get 不可。namespace/key 住所と terminated_at 付き tombstone 版を登録し replica 間の旧版復活を防止。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.delete
    field_values:
      memory_record_id: record-17
      version: 3
      namespace: [tenant-7, user-42, preferences]
      key: response-language
      lifecycle_state: tombstoned
      invalidation_reason: explicit-delete
      terminated_at: 2026-07-16T09:20:00Z
    related_node_ids: [MemoryTombstone, MemoryRecord, MemoryStore, memory-lifecycle]
    related_relation_ids: [MemoryTombstone-is_a-MemoryRecord]
    source_claims: [claim-memory-tombstone-langgraph, claim-memory-tombstone-design]
  - id: memory-tombstone-example-active-record-boundary
    labels:
      zh: 活跃记录不是墓碑
      en: Active record is not tombstone
      ja: active record は tombstone ではない
    descriptions:
      zh: record-310-v2 仍保存可检索的 TypeScript 偏好，lifecycle_state=active，无 invalidation_reason。即使计划稍后 DELETE，在删除提交前仍是普通 MemoryRecord，不是 MemoryTombstone。
      en: record-310-v2 still holds retrievable TypeScript preference with lifecycle_state=active and no invalidation_reason. Even if DELETE is scheduled, it remains an ordinary MemoryRecord until deletion commits, not MemoryTombstone.
      ja: record-310-v2 は active で検索可能内容を保持。DELETE 予定でも確定前は通常 MemoryRecord で MemoryTombstone ではない。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: GET /v1/memories/{memory_id}/ active record
    field_values:
      memory_record_id: record-310
      version: 2
      lifecycle_state: active
      is_memory_tombstone: false
    related_node_ids: [MemoryTombstone, MemoryRecord, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-tombstone-mem0, claim-memory-tombstone-design]
parent_relation:
  id: MemoryTombstone-is_a-MemoryRecord
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆记录
    en: is a memory record
    ja: 記憶レコードの一種
  definitions:
    zh: 每个 MemoryTombstone 都是 MemoryRecord；其种差是在删除后继续占据原逻辑地址、移除原值，并记录终止时间、原因与防复活版本标记。
    en: Every MemoryTombstone is a MemoryRecord distinguished by remaining at the deleted logical address after value removal, recording termination time, reason, and anti-resurrection version marker.
    ja: すべての MemoryTombstone は MemoryRecord で、削除後も論理住所を占め原値を除去し終了時刻・理由・復活防止版 marker を記録する種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on all runtime instances.
    ja: 全実行 instance に一律基数を課しません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向 is_a, en: has subtype, ja: 逆 is_a}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-tombstone-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
