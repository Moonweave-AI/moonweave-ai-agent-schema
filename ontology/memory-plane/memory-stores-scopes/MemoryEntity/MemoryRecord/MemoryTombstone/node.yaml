    related_relation_ids:
      - MemoryDelete-produces-MemoryTombstone
    expected_result:
      zh: MemoryRecord 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryTombstone。
      en: MemoryRecord retains its own type; validation must not promote it to MemoryTombstone from relation co-occurrence.
      ja: MemoryRecord は元の型を維持し、関係の共起だけで MemoryTombstone へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 墓碑的身份条件要求终止已经发生、原内容已不可用并保留终止证据；活动记录、待删除标志或仍可回答问题的普通记录都不满足该种差。
      en: Tombstone identity requires completed termination, unavailable original content, and retained terminal evidence. An activity record, pending-delete flag, or ordinary record still usable for answers fails that differentia.
      ja: 墓標の同一性には終了完了、元内容の利用不能、終了証拠の保持が必要です。活動記録、削除待ち標識、回答に使える通常レコードはいずれも種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-tombstone-005
      - claim-memory-tombstone-006
