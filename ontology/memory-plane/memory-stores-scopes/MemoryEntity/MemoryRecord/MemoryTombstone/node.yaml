      en: After the user withdraws a preference, memory-record-001/v5 replaces content-bearing v4. Its content is removed, provenance_ref points to deletion-request-842, and it retains the original record ID, predecessor version, deleted_by_user_request reason, actor, and termination time 2026-07-13T03:00Z.
      ja: 利用者が選好を撤回した後、memory-record-001/v5 は原文を含む v4 を置換します。content は除去され、provenance_ref は deletion-request-842 を指し、元record ID、前駆版、deleted_by_user_request 理由、実行者、終了時刻2026-07-13T03:00Zを保持します。
