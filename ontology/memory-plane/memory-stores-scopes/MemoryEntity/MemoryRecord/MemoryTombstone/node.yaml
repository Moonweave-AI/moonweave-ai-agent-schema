  - id: MemoryTombstone-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆墓碑记录边界例
      en: Boundary case for Memory tombstone record
      ja: 記憶墓標記録の境界例
    scenario_id: null
    descriptions:
      zh: memory-record-001/v4 仍保存“使用简体中文”的可检索内容，状态为 active，且没有终止原因或删除操作引用；即使计划稍后删除，它在删除提交前仍是普通 MemoryRecord，不是 MemoryTombstone。
      en: memory-record-001/v4 still contains the retrievable preference “use Simplified Chinese,” has active status, and has no terminal reason or deletion-operation reference. Even if deletion is scheduled, it remains an ordinary MemoryRecord until the deletion commits, not a MemoryTombstone.
      ja: memory-record-001/v4 は検索可能な選好「簡体字中国語を使う」を保持し、状態は active で、終了理由や削除操作参照もありません。削除予定でも、削除が確定するまでは通常の MemoryRecord であり MemoryTombstone ではありません。
    field_values: {}
    related_node_ids:
