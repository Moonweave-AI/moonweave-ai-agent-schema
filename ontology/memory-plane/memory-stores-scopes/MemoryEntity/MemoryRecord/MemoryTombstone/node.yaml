    labels:
      zh: 记忆墓碑记录结构化实例
      en: Structured instance of Memory tombstone record
      ja: 記憶墓標記録の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: memory-record-001/v5 是跨会话、长期有效的情景记忆墓碑；它继承记录身份、版本、作用域、来源和访问策略字段，其中 provenance_ref=deletion-request-842 指向终止依据，节点没有任何可恢复的原偏好内容。
      en: memory-record-001/v5 is a cross-session, long-term episodic-memory tombstone. It inherits record identity, version, scope, provenance, and access-policy fields; provenance_ref=deletion-request-842 identifies the terminal basis, and the node carries no recoverable preference content.
      ja: memory-record-001/v5 はセッション横断・長期のエピソード記憶墓標です。record同一性、版、scope、来歴、アクセス方針を継承し、provenance_ref=deletion-request-842 が終了根拠を示し、復元可能な元選好内容を持ちません。
    field_values:
      memory_scope:
        - CrossSessionMemory
      memory_kind:
        - EpisodicMemory
      memory_duration: LongTermMemory
      memory_record_id: memory-record-001
      version: 5
      valid_from: 2026-07-13T03:00:00.000Z
      confidence: 1
