      en: The run can query MemoryTombstone together with direction-preserving fact MemoryTombstone-is_a-MemoryRecord.
      ja: この実行では MemoryTombstone と方向を保持した事実 MemoryTombstone-is_a-MemoryRecord を共に照会できます。
    why_valid_or_invalid:
      zh: 该对象在删除完成后仍以原记录 ID 和新版本稳定存在，并表达终止状态而不是执行删除；原内容不可用，因此它是 MemoryRecord 的终止型特化，而非 MemoryDelete 活动。
      en: The object persists after deletion under the original record ID and a new version and represents terminal state rather than performing deletion. With original content unavailable, it is a terminal MemoryRecord specialization, not the MemoryDelete activity.
      ja: 削除後も元record IDと新版で安定して存在し、削除を実行せず終了状態を表します。元内容は利用不能なので、MemoryDelete活動ではなく MemoryRecord の終了型特化です。
