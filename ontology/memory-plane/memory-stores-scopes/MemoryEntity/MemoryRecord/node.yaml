schema: moonweave.ai/ontology-node/v1
id: MemoryRecord
kind: concept
status: accepted
labels:
  zh: 记忆记录
  en: memory record
  ja: 記憶レコード
semantics:
  short_definition:
    zh: 把记忆内容及其来源、作用域、保留状态和生命周期固化为一个可持久化条目的 MemoryEntity。
    en: A MemoryEntity that persists memory content together with provenance, scope, retention state, and lifecycle as one addressable entry.
    ja: 記憶内容と来歴・スコープ・保持状態・ライフサイクルを一つのアドレス可能項目として永続化する MemoryEntity です。
  definition:
    zh: MemoryRecord 是一种 MemoryEntity；其种差是：它是在一个 MemoryStore 中以 namespace-and-key 复合地址和 version 标识的持久条目，把一个 MemoryItem 或内联记忆值与创建更新时间、来源、MemoryScope、MemoryRetentionPolicy 和生命周期状态绑定。它不是语义记忆本身、文件载体或写入活动。
    en: A MemoryRecord is a MemoryEntity whose differentia is a persistent entry identified in one MemoryStore by a namespace-and-key compound address plus version. It binds a MemoryItem or inline memory value to creation/update time, provenance, MemoryScope, MemoryRetentionPolicy, and lifecycle state. It is not the semantic memory itself, a file carrier, or a write activity.
    ja: MemoryRecord は一つの MemoryStore 内で namespace-and-key 複合住所と版により識別される持続条目という種差を持つ MemoryEntity です。MemoryItem または内包値を作成更新時刻、来歴、MemoryScope、MemoryRetentionPolicy、ライフサイクル状態へ結びます。意味記憶そのもの・ファイル媒体・書込活動ではありません。
  why_needed:
    zh: 记录层把记忆语义、来源和治理状态放在同一版本边界内，使检索结果可审计、更新可并发控制、删除可留下墓碑。
    en: The record layer places memory semantics, provenance, and governance state inside one version boundary, making retrieval auditable, updates concurrency-controlled, and deletion tombstone-capable.
    ja: 記憶意味・来歴・統治状態を一つの版境界へ置き、検索監査、更新の並行制御、削除墓標を可能にします。
  includes:
    - zh: 纳入 record-pref-42/v3 这类具有稳定 ID、版本、记忆内容或 item 引用、来源、命名空间、作用域和生命周期状态的持久条目。
      en: Includes persistent entries such as record-pref-42/v3 with stable ID, version, memory content or item reference, provenance, namespace, scope, and lifecycle state.
      ja: record-pref-42/v3 のように安定ID、版、記憶内容またはitem参照、来歴、名前空間、スコープ、ライフサイクル状態を持つ永続項目を含みます。
  excludes:
    - zh: 排除 MemoryFile 载体、MemoryStore 设施、MemoryWrite/MemoryDelete 活动、检索候选和只描述读写边界的 MemoryScope。
      en: Excludes the MemoryFile carrier, MemoryStore facility, MemoryWrite or MemoryDelete activities, retrieval candidates, and MemoryScope specifications that only describe access boundaries.
      ja: MemoryFile媒体、MemoryStore施設、MemoryWrite・MemoryDelete活動、検索候補、読書込境界だけを記す MemoryScope を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - memory_record_id
    - version
  fields:
    - id: memory_scope
      labels:
        zh: 记忆范围
        en: memory scope
        ja: 記憶スコープ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 可组合标注记录适用的会话、任务或跨会话范围。
        en: Composable session, task, or cross-session applicability scopes.
        ja: セッション、タスク、セッション横断の適用範囲を組み合わせて示します。
      allowed_values:
        - id: CrossSessionMemory
          value: CrossSessionMemory
          labels:
            zh: 跨会话范围
            en: cross-session scope
            ja: セッション横断範囲
          definitions:
            en: memory retained beyond one session so preferences, experience, project knowledge, or procedures can be reused in later conversations or runs.
            zh: 跨会话记忆是在一次会话之外保留的记忆，使偏好、经验、项目知识或流程能在后续对话或运行中复用。
            ja: クロスセッション記憶は、一つのセッションを越えて保持される記憶で、選好、経験、プロジェクト知識、手順を後続の会話や実行で再利用できるようにします。
          status: accepted
          source_claims:
            - claim-memory-record-003
            - claim-memory-record-004
        - id: SessionMemory
          value: SessionMemory
          labels:
            zh: 会话范围
            en: session scope
            ja: セッション範囲
          definitions:
            en: memory retained within a runtime session or thread boundary, including state needed for continuity, checkpointing, and context refresh.
            zh: 会话记忆是在运行会话或线程边界内保留的记忆，包括连续性、检查点和上下文刷新所需状态。
            ja: セッション記憶は、実行セッションまたはスレッド境界内で保持される記憶で、継続性、チェックポイント、コンテキスト更新に必要な状態を含みます。
          status: accepted
          source_claims:
            - claim-memory-record-005
            - claim-memory-record-006
        - id: TaskMemory
          value: TaskMemory
          labels:
            zh: 任务范围
            en: task scope
            ja: タスク範囲
          definitions:
            en: task-scoped memory that preserves decisions, constraints, intermediate artifacts, dependencies, and lessons for a particular goal or work item.
            zh: 任务记忆是在特定目标或工作项范围内保存决策、约束、中间产物、依赖和经验教训的记忆。
            ja: タスク記憶は、特定の目標または作業項目に関する意思決定、制約、中間成果物、依存関係、教訓を保存するタスク単位の記憶です。
          status: accepted
          source_claims:
            - claim-memory-record-007
            - claim-memory-record-008
      pattern: null
      example_value: CrossSessionMemory
      source_claims:
        - claim-memory-record-009
        - claim-memory-record-010
    - id: memory_kind
      labels:
        zh: 记忆种类
        en: memory kind
        ja: 記憶種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 可组合标注情景、语义、程序、反思、偏好或经验种类。
        en: Composable tags for episodic, semantic, procedural, reflective, preference, or experience kind.
        ja: エピソード、意味、手続き、内省、選好、経験の種別を組み合わせて示します。
      allowed_values:
        - id: EpisodicMemory
          value: EpisodicMemory
          labels:
            zh: 情景记忆
            en: episodic memory
            ja: エピソード記憶
          definitions:
            en: memory record of an observed episode, interaction, event sequence, decision, or experience that can later support retrieval, reflection, evaluation, or planning.
            zh: 情景记忆记录被观察到的一段经历、交互、事件序列、决策或经验，以便后续支持检索、反思、评估或规划。
            ja: エピソード記憶は、観測された出来事、相互作用、イベント列、意思決定、経験を記録し、後の検索、反省、評価、計画を支えます。
          status: accepted
          source_claims:
            - claim-memory-record-011
            - claim-memory-record-012
        - id: ExperienceMemory
          value: ExperienceMemory
          labels:
            zh: 经验记忆
            en: experience memory
            ja: 経験記憶
          definitions:
            en: memory record distilled from prior agent-environment trajectories, tool outcomes, failures, corrections, or successes for future adaptation.
            zh: 经验记忆从既往智能体与环境轨迹、工具结果、失败、修正或成功中提炼，用于未来适应。
            ja: 経験記憶は、過去のエージェント環境軌跡、ツール結果、失敗、修正、成功から蒸留され、将来の適応に使われる記憶です。
          status: accepted
          source_claims:
            - claim-memory-record-013
            - claim-memory-record-014
        - id: PreferenceMemory
          value: PreferenceMemory
          labels:
            zh: 偏好记忆
            en: preference memory
            ja: 選好記憶
          definitions:
            en: long-lived memory record for stable preferences or standing instructions, scoped by source, confidence, freshness, and supersession so it can guide context assembly without becoming hidden reasoning.
            zh: 偏好记忆是稳定偏好或长期指令的长寿命记忆记录，由来源、置信度、新鲜度和取代关系限定，可指导上下文组装但不成为隐藏推理。
            ja: 選好記憶は、安定した選好や常設指示の長期記憶レコードで、出典、信頼度、新鮮度、置換関係により範囲づけられ、隠れた推論にならずにコンテキスト組み立てを導きます。
          status: accepted
          source_claims:
            - claim-memory-record-015
            - claim-memory-record-016
        - id: ProceduralMemory
          value: ProceduralMemory
          labels:
            zh: 程序记忆
            en: procedural memory
            ja: 手続記憶
          definitions:
            en: memory record that stores reusable procedures, skills, workflows, tool-use patterns, or policy routines for future action selection.
            zh: 程序记忆保存可复用流程、技能、工作流、工具使用模式或策略例程，用于未来动作选择。
            ja: 手続き記憶は、将来の行動選択のために再利用可能な手順、技能、ワークフロー、ツール利用パターン、方針ルーチンを保存する記憶です。
          status: accepted
          source_claims:
            - claim-memory-record-017
            - claim-memory-record-018
        - id: ReflectiveMemory
          value: ReflectiveMemory
          labels:
            zh: 反思记忆
            en: reflective memory
            ja: 省察記憶
          definitions:
            en: higher-level memory produced by reflection or consolidation over observations, episodes, feedback, and outcomes to guide future planning or behavior.
            zh: 反思记忆是对观测、情景、反馈和结果进行反思或巩固后产生的高层记忆，用于指导未来规划或行为。
            ja: 反省記憶は、観測、エピソード、フィードバック、結果に対する反省または集約から生まれる高次の記憶で、将来の計画や振る舞いを導きます。
          status: accepted
          source_claims:
            - claim-memory-record-019
            - claim-memory-record-020
        - id: SemanticMemory
          value: SemanticMemory
          labels:
            zh: 语义记忆
            en: semantic memory
            ja: 意味記憶
          definitions:
            en: memory record that stores generalized facts, concepts, user knowledge, project conventions, or world knowledge independent of one specific episode.
            zh: 语义记忆存储一般化事实、概念、用户知识、项目约定或世界知识，不依赖某一个具体情景。
            ja: 意味記憶は、特定の一つのエピソードに依存しない一般化された事実、概念、ユーザー知識、プロジェクト規約、世界知識を保存する記憶です。
          status: accepted
          source_claims:
            - claim-memory-record-021
            - claim-memory-record-022
      pattern: null
      example_value: EpisodicMemory
      source_claims:
        - claim-memory-record-023
        - claim-memory-record-024
    - id: memory_duration
      labels:
        zh: 记忆持续时长
        en: Memory duration
        ja: 記憶持続期間
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 标识记忆记录按保留与使用周期划分的持续时长，例如工作、短期或长期；该维度独立于记忆种类和可见范围。
        en: Identifies a MemoryRecord's retention and use duration, such as working, short-term, or long-term; this dimension is independent of kind and scope.
        ja: 記憶レコードの保持・利用周期（作業、短期、長期など）を識別し、記憶種別と可視範囲から独立させます。
      allowed_values:
        - id: LongTermMemory
          value: LongTermMemory
          labels:
            zh: 长期
            en: long-term
            ja: 長期
          definitions:
            en: durable memory retained across sessions or threads for future tasks, usually governed by namespace, retention, validation, and user or project scope.
            zh: 长期记忆是跨会话或线程保留以支持未来任务的持久记忆，通常受命名空间、保留、验证以及用户或项目范围控制。
            ja: 長期記憶は、将来のタスクのためにセッションやスレッドを越えて保持される永続記憶で、通常は名前空間、保持、検証、ユーザーまたはプロジェクトスコープで統制されます。
          status: accepted
          source_claims:
            - claim-memory-record-025
            - claim-memory-record-026
        - id: ShortTermMemory
          value: ShortTermMemory
          labels:
            zh: 短期
            en: short-term
            ja: 短期
          definitions:
            en: thread- or session-level memory retained across nearby steps in a run so state can be resumed, checked, or summarized before it becomes long-term memory.
            zh: 短期记忆是在一次运行的相邻步骤间保留的线程或会话级记忆，使状态在成为长期记忆前可以恢复、检查或摘要。
            ja: 短期記憶は、実行中の近接ステップ間で保持されるスレッドまたはセッション単位の記憶で、長期記憶になる前に状態の再開、確認、要約を可能にします。
          status: accepted
          source_claims:
            - claim-memory-record-027
            - claim-memory-record-028
        - id: WorkingMemory
          value: WorkingMemory
          labels:
            zh: 工作期
            en: working
            ja: 作業中
          definitions:
            en: transient memory surface used during an active reasoning or execution step to hold current task state, scratch state, selected evidence, and pending actions without implying long-term persistence.
            zh: 工作记忆是在活动推理或执行步骤中临时保存当前任务状态、草稿状态、已选证据和待执行动作的记忆表面，不意味着长期持久化。
            ja: 作業記憶は、進行中の推論または実行ステップで現在のタスク状態、作業状態、選択済み証拠、保留中の行動を保持する一時的な記憶面であり、長期永続化を意味しません。
          status: accepted
          source_claims:
            - claim-memory-record-029
            - claim-memory-record-030
      pattern: null
      example_value: LongTermMemory
      source_claims:
        - claim-memory-record-031
        - claim-memory-record-032
    - id: memory_record_id
      labels:
        zh: 记忆记录标识
        en: memory-record ID
        ja: 記憶記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识跨不可变版本的逻辑记忆记录。
        en: Stable identifier for the logical memory record across immutable versions.
        ja: 不変バージョンにまたがる論理記憶記録を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: memory-record-001
      source_claims:
        - claim-memory-record-033
        - claim-memory-record-034
    - id: version
      labels:
        zh: 版本
        en: version
        ja: バージョン
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一项不可变记忆记录版本的递增值。
        en: Monotonic value identifying one immutable version of the memory record.
        ja: 記憶記録の一つの不変バージョンを識別する単調増加値です。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims:
        - claim-memory-record-035
        - claim-memory-record-036
    - id: valid_from
      labels:
        zh: 有效起点
        en: valid from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本开始适用于推理或上下文组装的 UTC 时间。
        en: UTC instant from which this version is valid for reasoning or context assembly.
        ja: このバージョンが推論またはコンテキスト組み立てに有効となる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T02:05:00.000Z
      source_claims:
        - claim-memory-record-037
        - claim-memory-record-038
    - id: valid_until
      labels:
        zh: 有效终点
        en: valid until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该版本停止适用的 UTC 时间；当前版本为空。
        en: UTC instant after which this version is no longer valid; null for the current version.
        ja: このバージョンが無効となる UTC 時刻で、現行版は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-memory-record-039
        - claim-memory-record-040
    - id: confidence
      labels:
        zh: 置信度
        en: confidence
        ja: 信頼度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录内容在写入或验证时得到的零到一置信度。
        en: Zero-to-one confidence assigned when the record was written or validated.
        ja: 記録の書き込みまたは検証時に割り当てたゼロから一の信頼度です。
      allowed_values: []
      pattern: null
      example_value: 0.92
      source_claims:
        - claim-memory-record-041
        - claim-memory-record-042
    - id: provenance_ref
      labels:
        zh: 谱系引用
        en: provenance reference
        ja: 来歴参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向支持该记忆内容的不可变来源与位置。
        en: Points to the immutable source and location supporting the memory content.
        ja: 記憶内容を支持する不変の出典と位置を指します。
      allowed_values: []
      pattern: null
      example_value: source-ref-001#span-4
      source_claims:
        - claim-memory-record-043
        - claim-memory-record-044
    - id: access_policy_id
      labels:
        zh: 访问策略标识
        en: access-policy ID
        ja: アクセス方針 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识读取、更新和披露该记录时适用的策略。
        en: Identifies the policy governing read, update, and disclosure of this record.
        ja: 記録の読み取り、更新、開示を統制する方針を識別します。
      allowed_values: []
      pattern: null
      example_value: memory-policy-project-private
      source_claims:
        - claim-memory-record-045
        - claim-memory-record-046
  constraints:
    - id: memory-record-version-immutable
      severity: error
      expression_language: plain
      expression: an update creates a new version and never changes an existing version in place
      explanations:
        zh: 更新必须创建新版本，禁止原地修改既有记忆版本。
        en: An update creates a new version and never changes an existing memory version in place.
        ja: 更新は新しいバージョンを作成し、既存の記憶バージョンをその場で変更してはなりません。
      source_claims:
        - claim-memory-record-047
        - claim-memory-record-048
    - id: memory-record-valid-confidence
      severity: error
      expression_language: plain
      expression: confidence is between zero and one, and valid_until is absent or no earlier than valid_from
      explanations:
        zh: 置信度必须位于零到一，且有效终点不得早于起点。
        en: Confidence is between zero and one, and valid_until is absent or no earlier than valid_from.
        ja: confidence はゼロ以上一以下で、valid_until は空または valid_from 以後です。
      source_claims:
        - claim-memory-record-049
        - claim-memory-record-050
  required_relation_constraints:
    - id: memory-record-owned-by
      direction: outgoing
      predicate: owned_by
      target_concept_id: Actor
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 记忆记录必须有可审计的责任主体。
        en: A memory record has an auditable responsible actor.
        ja: 記憶記録には監査可能な責任アクターがあります。
      source_claims:
        - claim-memory-record-051
        - claim-memory-record-052
    - id: memory-record-scoped-by
      direction: outgoing
      predicate: scoped_by
      target_concept_id: MemoryScope
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 记忆记录必须明确适用范围。
        en: A memory record identifies its applicability scope.
        ja: 記憶記録は適用範囲を明示します。
      source_claims:
        - claim-memory-record-053
        - claim-memory-record-054
    - id: memory-record-member-of-namespace
      direction: outgoing
      predicate: member_of
      target_concept_id: MemoryNamespace
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 记忆记录必须属于一个命名空间。
        en: A memory record belongs to one namespace.
        ja: 記憶記録は一つの名前空間に属します。
      source_claims:
        - claim-memory-record-055
        - claim-memory-record-056
    - id: memory-record-governed-by-retention
      direction: outgoing
      predicate: governed_by
      target_concept_id: MemoryRetentionPolicy
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 记忆记录必须受保留策略约束。
        en: A memory record is governed by a retention policy.
        ja: 記憶記録は保持方針により統制されます。
      source_claims:
        - claim-memory-record-057
        - claim-memory-record-058
examples:
  - id: MemoryRecord-example-positive-001
    kind: positive
    labels:
      zh: 记忆记录正例
      en: Positive example of memory record
      ja: 記憶レコードの正例
    scenario_id: null
    descriptions:
