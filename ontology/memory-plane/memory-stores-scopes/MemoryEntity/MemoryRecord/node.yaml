          ja: v2 supersedes v1 を確立し new current version 選択後も old record を immutable history として保持します。
        why_valid_or_invalid:
          zh: 新记录明确指向同一可版本对象的前驱，生成活动确认替换，方向从后继指向被取代版本。
          en: The new record explicitly names a predecessor of the same versioned object and the generating activity confirms replacement, fixing successor-to-predecessor direction.
