schema: moonweave.ai/ontology-node/v1
id: MemoryRecord
kind: concept
status: accepted
labels:
  zh: 记忆记录
  en: Memory Record
  ja: 記憶レコード
semantics:
  short_definition:
    zh: 在命名空间与键下持久保存、可版本化并带来源和生命周期状态的记忆条目。
    en: A persistent, versioned memory entry under a namespace and key with provenance and lifecycle state.
    ja: namespaceとkeyの下で永続化され、version、provenance、lifecycle stateを持つ記憶項目。
  definition:
    zh: >
      MemoryRecord 是 MemoryEntity 的一种：它在一个 MemoryStore 中以 namespace_path 与 record_key 寻址，
      以 memory_record_id 与 record_version 确定一个不可混淆的内容版本，并携带内容摘要、来源、MemoryScope
      和生命周期状态。它是可审计的、可被检索的长期记忆记录；更新内容、来源、作用域或保留状态时必须产生新版本。
      它不是 MemoryStore 设施、MemoryNamespace 分区、裸的 MemoryItem API 返回值、MemoryFile 载体、MessageHistory、
      Context Assembly 的可见上下文、EmbeddingVector 或一次 MemoryWrite 活动。
    en: >
      A MemoryRecord is a MemoryEntity addressed in one MemoryStore by namespace_path and record_key, with one
      unambiguous content version identified by memory_record_id and record_version and carrying a content digest,
      provenance, MemoryScope, and lifecycle state. It is an auditable, retrievable long-term-memory record; changing
      content, provenance, scope, or retention state creates a new version. It is not the MemoryStore facility,
      MemoryNamespace partition, bare MemoryItem API return, MemoryFile carrier, MessageHistory, a Context Assembly's
      visible context, an EmbeddingVector, or a MemoryWrite activity.
    ja: >
      MemoryRecord は一つのMemoryStore内でnamespace_pathとrecord_keyによりアドレスされ、memory_record_idと
      record_versionで一意なcontent versionが定まり、content digest、provenance、MemoryScope、lifecycle stateを
      持つMemoryEntityです。監査可能かつ検索可能なlong-term memory recordであり、content、provenance、scope、
      retention stateが変われば新versionを作ります。MemoryStore施設、MemoryNamespace分区、裸のMemoryItem API戻り値、
      MemoryFile媒体、MessageHistory、Context Assemblyのvisible context、EmbeddingVector、MemoryWrite活動ではありません。
  why_needed:
    zh: 记录层将可复用记忆的地址、内容版本和治理证据绑定在一起，使系统能解释检索结果、保留旧版本，并避免把瞬时上下文误写成长期记忆。
    en: The record layer binds reusable memory's address, content version, and governance evidence so the system can explain retrieval results, retain older versions, and avoid treating transient context as long-term memory.
    ja: record層は再利用可能memoryのaddress、content version、governance evidenceを結び、retrieval resultの説明、旧versionの保持、一時contextをlong-term memoryと誤記することの防止を可能にします。
  includes:
    - zh: 包含在一个 Store 命名空间中有确定键、版本、内容摘要、来源和适用范围的用户偏好、经验或项目事实记录。
      en: User-preference, experience, or project-fact entries with a determinate Store namespace, key, version, content digest, provenance, and applicability scope.
      ja: 確定Store namespace、key、version、content digest、provenance、applicability scopeを持つuser preference、experience、project fact entry。
  excludes:
    - zh: 排除无版本/来源/生命周期的 MemoryItem、一个文件整体的 MemoryFile、存储设施与命名空间、仅候选检索项、消息或检查点状态、数值向量和模型调用中临时选取的文本。
      en: A MemoryItem without version/provenance/lifecycle, a whole-file MemoryFile, store facility and namespace, a retrieval candidate only, message or checkpoint state, numeric vector, or text temporarily selected for a model call.
      ja: version/provenance/lifecycleのないMemoryItem、file全体のMemoryFile、store facilityとnamespace、retrieval candidateだけ、messageまたはcheckpoint state、numeric vector、model callで一時選択されたtext。
  semantic_kind: information
  aliases: [versioned memory entry, persisted memory record]
engineering:
  explanation:
    zh: 应用通过 Store 的 namespace 和 key 写入 JSON 值，再为该写入分配 Moonweave 记录 ID、版本、来源、作用域和生命周期状态。Store 检索返回记录候选；Context Assembly 仍须选择、排序和裁剪后才形成模型输入。
    en: Application code writes a JSON value through a Store namespace and key, then assigns the write a Moonweave record ID, version, provenance, scope, and lifecycle state. Store retrieval returns record candidates; Context Assembly must still select, order, and trim them before model input.
    ja: application code は Store の namespace と key で JSON value を書き込み、その write に Moonweave の record ID、version、provenance、scope、lifecycle state を与えます。Store retrieval は record candidate を返すだけであり、Context Assembly が選択、順序付け、切り詰めをしてから model input になります。
  typical_input:
    - description: Store write with record metadata
      format: |
        namespace = ("users", "u-123", "profile")
        runtime.store.put(namespace, "preferred_language", {"value": "Chinese"})
        # application records record-user-language@v1 with source and scope metadata
  typical_output:
    - description: Versioned record snapshot
      format: |
        {
          "memory_record_id": "record-user-language",
          "record_version": 1,
          "memory_store_ref": "memory-store-primary",
          "namespace_path": ["users", "u-123", "profile"],
          "record_key": "preferred_language",
          "content_digest": "sha256:3ad7f0",
          "scope_ref": "scope-user-u-123",
          "lifecycle_state": "active"
        }
  reference_implementations:
    - name: LangGraph Memory Store
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents long-term Store values addressed by namespace and key and retrieved across conversations.
structure:
  identity_keys: [memory_entity_id, memory_record_id, record_version]
  fields:
    - id: memory_entity_id
      labels:
        zh: 记忆实体标识
        en: Memory entity ID
        ja: 記憶エンティティ ID
      definitions:
        zh: 标识被登记为抽象记忆实体的记录；它与 record_id 和版本一起保留记录的通用实体身份和具体版本身份。
        en: Identifies the record as a registered abstract memory entity; together with record ID and version it preserves both generic entity identity and concrete version identity.
        ja: 記録を登録済みの抽象記憶エンティティとして識別します。record ID と version とともに、汎用エンティティ identity と具体的な version identity を保持します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-entity-user-language-v1
      source_claims: [claim-memory-record-specialization, claim-memory-record-store-address]
    - id: representation_kind
      labels:
        zh: 表示类别
        en: Representation kind
        ja: 表現種別
      definitions:
        zh: 继承自 MemoryEntity 的表示类别；MemoryRecord 将其收窄为 memory-record，以区别 Store 项、文件工件和墓碑。
        en: The representation category inherited from MemoryEntity; MemoryRecord narrows it to memory-record, distinguishing it from a Store item, file artifact, or tombstone.
        ja: MemoryEntity から継承する表現カテゴリです。MemoryRecord は Store item、file artifact、tombstone と区別して memory-record に限定します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [memory-record]
      pattern: null
      example_value: memory-record
      source_claims: [claim-memory-record-specialization]
    - id: memory_record_id
      labels: {zh: 记忆记录标识, en: memory record ID, ja: memory record ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识同一逻辑记忆记录跨版本的连续性，不是 Store 内的地址键。
        en: Stably identifies continuity of the same logical memory record across versions; it is not the Store address key.
        ja: 同じ論理memory recordのversion横断の連続性を安定識別し、Store address keyではありません。
      allowed_values: []
      pattern: null
      example_value: record-user-language
      source_claims: [claim-memory-record-versioning]
    - id: record_version
      labels: {zh: 记录版本, en: record version, ja: record version}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分同一 logical record 的不可变内容与治理快照；它不等同于 Store 的最近更新时间。
        en: Distinguishes immutable content and governance snapshots of one logical record; it is not simply the Store's latest update time.
        ja: 一つのlogical recordの不変contentとgovernance snapshotを区別し、Storeの最新update timeそのものではありません。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims: [claim-memory-record-versioning]
    - id: memory_store_ref
      labels: {zh: 存储引用, en: memory store reference, ja: memory store reference}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向承载此版本的 MemoryStore，避免把逻辑记忆与其当前物理持久化位置混为一谈。
        en: Points to the MemoryStore hosting this version, keeping logical memory distinct from its current physical persistence location.
        ja: このversionを保持するMemoryStoreを指し、logical memoryを現在のphysical persistence locationと混同しません。
      allowed_values: []
      pattern: null
      example_value: memory-store-primary
      source_claims: [claim-memory-record-store-address]
    - id: namespace_path
      labels: {zh: 命名空间路径, en: namespace path, ja: namespace path}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录在所属存储内的完整有序命名空间地址；不能用前缀或通配符代替。
        en: The record's complete ordered namespace address within its store; a prefix or wildcard cannot substitute for it.
        ja: 所属store内の完全ordered namespace addressであり、prefixやwildcardで代替できません。
      allowed_values: []
      pattern: null
      example_value: '["users","u-123","profile"]'
      source_claims: [claim-memory-record-store-address]
    - id: record_key
      labels: {zh: 记录键, en: record key, ja: record key}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在该完整命名空间内定位已持久化值的键；同名键在另一命名空间不代表同一地址。
        en: The key locating the persisted value in the full namespace; the same key in another namespace is not the same address.
        ja: 完全namespace内で永続値を位置付けるkeyであり、別namespaceの同名keyは同じaddressではありません。
      allowed_values: []
      pattern: null
      example_value: preferred_language
      source_claims: [claim-memory-record-store-address]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: content digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 规范化记录值的算法标识与摘要，用于验证一个版本的内容没有被静默改写。
        en: Algorithm identifier and digest of the normalized record value, used to verify that a version's content was not silently rewritten.
        ja: 正規化record valueのalgorithm identifierとdigestで、version contentが無言に書換えられていないことを検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:3ad7f0
      source_claims: [claim-memory-record-versioning]
    - id: provenance_ref
      labels: {zh: 来源引用, en: provenance reference, ja: provenance reference}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向说明该版本如何产生、确认或修订的可检查来源记录，而不是笼统的“用户说过”。
        en: Points to inspectable provenance describing how this version was created, confirmed, or revised rather than a general claim that a user once said it.
        ja: userが一度言ったという一般主張ではなく、このversionがどう作成、確認、改訂されたかを記す検査可能provenanceを指します。
      allowed_values: []
      pattern: null
      example_value: provenance/preference-language-2026-07-18
      source_claims: [claim-memory-record-provenance]
    - id: scope_ref
      labels: {zh: 作用域引用, en: scope reference, ja: scope reference}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向定义此版本适用主体、操作与可见性条件的 MemoryScope；它不由命名空间路径隐式推断。
        en: Points to the MemoryScope defining subjects, operations, and visibility conditions for this version; it is not inferred implicitly from a namespace path.
        ja: このversionのsubject、operation、visibility条件を定義するMemoryScopeを指し、namespace pathから暗黙推論しません。
      allowed_values: []
      pattern: null
      example_value: scope-user-u-123
      source_claims: [claim-memory-record-scope-boundary]
    - id: lifecycle_state
      labels: {zh: 生命周期状态, en: lifecycle state, ja: lifecycle state}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明当前版本是否 active、expired、superseded 或 tombstoned；状态不等同于记录值的语义内容。
        en: Declares whether the current version is active, expired, superseded, or tombstoned; state is not the semantic content of the record value.
        ja: 現在versionがactive、expired、superseded、tombstonedのいずれかを宣言し、stateはrecord valueの意味contentではありません。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims: [claim-memory-record-lifecycle]
    - id: retention_policy_ref
      labels: {zh: 保留策略引用, en: retention policy reference, ja: retention policy reference}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 可选引用适用于该版本的 MemoryRetentionPolicy；缺失并不表示记录可永久保留。
        en: Optionally references the MemoryRetentionPolicy that applies to this version; absence does not imply the record may be kept forever.
        ja: このversionに適用するMemoryRetentionPolicyを任意参照し、欠落は永続保持可能を意味しません。
      allowed_values: []
      pattern: null
      example_value: retention-user-profile-v1
      source_claims: [claim-memory-record-lifecycle]
  constraints:
    - id: memory-record-address-and-version
      severity: error
      expression_language: plain
      expression: memory_store_ref, a complete non-wildcard namespace_path, record_key, memory_record_id, positive record_version, content_digest, provenance_ref, scope_ref, and lifecycle_state are required. A content, provenance, scope, or lifecycle change creates a new record_version and cannot overwrite the prior version's digest.
      explanation:
        zh: 可审计记录需要明确地址、版本、内容身份、来源与适用范围；否则不能区分覆盖、复制和真正的修订。
        en: An auditable record needs explicit address, version, content identity, provenance, and applicability; otherwise overwrite, copy, and genuine revision cannot be distinguished.
        ja: 監査可能recordには明示address、version、content identity、provenance、applicabilityが必要で、そうでなければoverwrite、copy、正当revisionを区別できません。
      source_claims: [claim-memory-record-store-address, claim-memory-record-versioning]
    - id: memory-record-boundary
      severity: error
      expression_language: plain
      expression: A MemoryRecord is a persistent, governed entry. It cannot be inferred from raw message history, a checkpoint, a visible-context snippet, a retrieval candidate, an EmbeddingVector, a MemoryFile, a MemoryItem lacking required record metadata, or the MemoryStore facility that holds it.
      explanation:
        zh: 相同文本可以出现在状态、上下文、文件、向量和存储记录中；只有具有完整持久化与治理证据的条目才是 MemoryRecord。
        en: The same text can appear in state, context, files, vectors, and stored records; only an entry with complete persistence and governance evidence is a MemoryRecord.
        ja: 同じtextはstate、context、file、vector、stored recordに現れ得ますが、完全なpersistenceとgovernance evidenceを持つentryだけがMemoryRecordです。
      source_claims: [claim-memory-record-scope-boundary]
  required_relations: []
examples:
  - id: MemoryRecord-positive-mem0-extracted-fact

    labels: {zh: Mem0 提取的用户偏好记录, en: Mem0 extracted user-preference record, ja: Mem0 抽出 user-preference record}

    descriptions:
      zh: "Generative Agents Memory Stream 条目：timestamp + natural language observation + importance score；MemGPT archival entry；Pinecone upsert metadata={text, created_at}。"
      en: "Generative Agents Memory Stream entry: timestamp + natural language observation + importance score; MemGPT archival entry; Pinecone upsert metadata={text, created_at}."
      ja: Generative Agents Memory Stream entry timestamp+observation+importance。MemGPT archival entry。Pinecone upsert metadata。
    field_values: {memory_entity_id: memory-entity-mem0-ea925981, representation_kind: memory-record, memory_record_id: mem0-ea925981, record_version: 1, memory_store_ref: mem0-user-store-001, namespace_path: '["users","alice","memories"]', record_key: ea925981, content_digest: sha256:3ad7f0, provenance_ref: provenance/mem0-add-2026-07-19, scope_ref: scope-user-alice, lifecycle_state: active, retention_policy_ref: retention-user-profile-v1}
    related_node_ids: [MemoryRecord, MemoryStore, MemoryNamespace, MemoryScope]
    related_relation_ids: [MemoryRecord-is_a-MemoryEntity]

    source_claims: [claim-memory-record-store-address, claim-memory-record-provenance]
  - id: MemoryRecord-boundary-langgraph-store-item

    labels: {zh: LangGraph Store Item, en: LangGraph Store Item, ja: LangGraph Store Item}

    descriptions:
      zh: MemoryRecord 持久内容 vs RetrievedCandidate 检索候选；RAG 文档 z 检索结果不等于已写入 MemoryRecord。
      en: MemoryRecord persistent content vs RetrievedCandidate retrieval candidate; RAG document z retrieval result is not written MemoryRecord.
      ja: MemoryRecord 永続内容 vs RetrievedCandidate。RAG doc z は書込済 MemoryRecord ではない。
    field_values: {memory_entity_id: memory-entity-langgraph-item-v1, representation_kind: store-item, provenance_ref: store-write-32, memory_store_ref: langgraph-inmemory-store-001, namespace_path: '["users","u-123","profile"]', item_key: preferred_language, item_value: '{"value":"Chinese"}'}
    related_node_ids: [MemoryRecord, MemoryItem, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-memory-record-store-address, claim-memory-record-scope-boundary]
  - id: MemoryRecord-counterexample-cursor-context-snippet

    labels: {zh: Cursor @ 引用上下文片段, en: Cursor @-referenced context snippet, ja: Cursor @ 参照 context snippet}

    descriptions:
      zh: 反例：EmbeddingVector 1536-d float 数组当作 MemoryRecord 内容项。
      en: Counterexample: EmbeddingVector 1536-d float array treated as MemoryRecord content item.
      ja: 反例：EmbeddingVector 1536-d float 配列を MemoryRecord content とする。
    field_values: {memory_entity_id: memory-entity-ephemeral-context-v1, representation_kind: memory-record, provenance_ref: null, call_id: cursor-call-121, context_text: '@src/config.ts user prefers Chinese', source_kind: cursor-at-reference}
    related_node_ids: [MemoryRecord, ContextAssembly, MessageHistory]
    related_relation_ids: []

    source_claims: [claim-memory-record-scope-boundary]
  - id: MemoryRecord-instance-letta-core-memory-block

    labels: {zh: 实例：Letta core memory 块修订, en: "Instance: Letta core memory block revision", ja: "事例: Letta core memory block revision"}

    descriptions:
      zh: Generative Agents: "Sam Khan is working on a poetry project" importance=7 timestamp=2023-02-14 10:00 stored in stream。
      en: Generative Agents: "Sam Khan is working on a poetry project" importance=7 timestamp=2023-02-14 10:00 stored in stream.
      ja: Generative Agents observation importance=7 timestamp=2023-02-14 stream 保存。
    field_values: {memory_entity_id: memory-entity-letta-human-v2, representation_kind: memory-record, memory_record_id: record-letta-human, record_version: 2, memory_store_ref: letta-agent-store-001, namespace_path: '["agents","support-bot","core_memory"]', record_key: human, content_digest: sha256:7c2d91, provenance_ref: provenance/letta-memory-replace-2026-07-19, scope_ref: scope-agent-support-bot, lifecycle_state: active, retention_policy_ref: retention-agent-v1}
    related_node_ids: [MemoryRecord, MemoryNamespace, MemoryRetentionPolicy]
    related_relation_ids: [MemoryRecord-is_a-MemoryEntity]

    source_claims: [claim-memory-record-versioning, claim-memory-record-provenance]
parent_relation:
  id: MemoryRecord-is_a-MemoryEntity
  predicate: is_a
  target: concept:MemoryEntity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是持久记忆记录实体, en: is a persistent memory-record entity, ja: 永続 memory-record エンティティである}
  definitions:
    zh: MemoryRecord 继承记忆内容实体角色，并以可寻址存储位置、版本、来源、作用域和生命周期状态作为种差。
    en: MemoryRecord is a subtype of MemoryEntity, specialized by addressable storage location, version, provenance, scope, and lifecycle state.
    ja: MemoryRecordはmemory-content entityの役割を継承し、addressable storage location、version、provenance、scope、lifecycle stateを種差として加えます。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: 有持久记忆记录子类, en: has persistent memory-record subtype, ja: 永続 memory-record 下位型を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: A semantic fact, API item, file, or visible-context snippet does not become a record until it meets the address, version, provenance, scope, and lifecycle conditions.
  constraints: []
  examples: []
  source_claims: [claim-memory-record-specialization]
  distinct_fact_rationale: This hierarchy captures the extra persistence and governance identity of a record rather than a mere content item or storage facility.
  layout_role: primary-backbone
relations: []
sources:
  - id: langgraph-memory-store
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents long-term Store values addressed by namespace and key and retrieved through Store search.
  - id: generative-agents-paper
    title: "Generative Agents: Interactive Simulacra of Human Behavior"
    url: https://arxiv.org/abs/2304.03442
    type: academic-paper
    source_type: academic-paper
    relevance: Describes a memory stream that stores natural-language records of agent experiences, synthesizes reflections, and retrieves memories for planning.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines Entity provenance and a revision as a derivation from an earlier entity version.
source_claims:
  - id: claim-memory-record-store-address
    source: langgraph-memory-store
    supports: LangGraph documents long-term Store values written using a namespace and key and retrieved by Store search, supporting an addressable persistent memory entry distinct from a thread checkpoint.
    locator: "Memory guide: long-term memory; Store put/aput and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-memory-record-provenance
    source: generative-agents-paper
    supports: Generative Agents describes a memory stream that stores a complete natural-language record of experiences, synthesizes higher-level reflections over time, and retrieves memories dynamically for planning.
    locator: "Abstract; architecture memory stream"
    evidence_kind: academic-result
    confidence: high
  - id: claim-memory-record-versioning
    source: w3c-prov-o
    supports: PROV-O models an Entity revision as a derivation from an earlier Entity. Moonweave applies this pattern to immutable MemoryRecord versions with content digests and a retained predecessor state.
    locator: "PROV-O: Entity derivation and prov:wasRevisionOf"
    evidence_kind: ontology-design-inference
    confidence: high
