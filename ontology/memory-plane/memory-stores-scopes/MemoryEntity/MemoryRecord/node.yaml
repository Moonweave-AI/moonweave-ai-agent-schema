schema: moonweave.ai/ontology-node/v1
id: MemoryRecord
kind: concept
labels:
  zh: 记忆记录
  en: memory record
  ja: 記憶レコード
semantics:
  short_definition:
    zh: 在 MemoryStore 中以 namespace-and-key 与 version 标识、绑定内容与治理元数据的持久 MemoryEntity 条目。
    en: A persistent MemoryEntity entry identified by namespace-and-key plus version in a MemoryStore, binding content and governance metadata.
    ja: MemoryStore 内で namespace-and-key と version により識別され、内容と統治 metadata を結ぶ永続 MemoryEntity 条目です。
  definition:
    zh: MemoryRecord 是一种 MemoryEntity；其种差是在一个 MemoryStore 内以 namespace-and-key 复合地址和 version 标识的持久条目，把 MemoryItem 或内联记忆值与创建/更新时间、来源、作用域 facet、保留状态与生命周期绑定。Mem0 GET /v1/memories/{id}/ 返回的 {id, memory, user_id, created_at, updated_at} 是典型 API 形状；LangGraph Item 的 namespace、key、value、created_at、updated_at 同理。它不是语义记忆本身、文件载体或 MemoryWrite 活动。
    en: A MemoryRecord is a MemoryEntity whose differentia is a persistent entry in one MemoryStore identified by namespace-and-key plus version, binding a MemoryItem or inline value to timestamps, provenance, scope facets, retention state, and lifecycle. Mem0 GET /v1/memories/{id}/ returning {id, memory, user_id, created_at, updated_at} is the canonical API shape; LangGraph Item namespace, key, value, created_at, updated_at likewise. It is not the semantic memory itself, a file carrier, or a MemoryWrite activity.
    ja: MemoryRecord は一 MemoryStore 内 namespace-and-key+version で識別される永続条目という種差を持つ MemoryEntity。MemoryItem/inline 値を時刻・来歴・scope facet・保持・lifecycle へ結合。Mem0 GET {id,memory,user_id,created_at,updated_at} と LangGraph Item が典型 API 形状。semantic memory 自体・file carrier・MemoryWrite 活動ではない。
  why_needed:
    zh: 记录层把“存了什么”和“存在哪、属于谁、保留多久”放在同一版本边界内，使 Mem0 更新、LangGraph put/delete 与 Zep session memory 都能被审计、并发控制，并在删除时留下墓碑。
    en: The record layer places what is stored with where it lives, who it belongs to, and how long it is kept inside one version boundary, making Mem0 updates, LangGraph put/delete, and Zep session memory auditable, concurrency-controlled, and tombstone-capable on deletion.
    ja: record 層が「何を保存したか」と「どこに・誰に・どれだけ」を一版境界に置き、Mem0 更新・LangGraph put/delete・Zep session memory を監査・並行制御・削除時 tombstone 可能にする。
  includes:
    - zh: Mem0 memory dict、LangGraph BaseStore Item、Zep user/session memory 条目，以及带 namespace、key、version、内容与时间戳的持久记录。
      en: Mem0 memory dicts, LangGraph BaseStore Items, Zep user/session memory entries, and persistent records with namespace, key, version, content, and timestamps.
      ja: Mem0 memory dict、LangGraph BaseStore Item、Zep user/session memory 条目、namespace/key/version/内容/時刻付き永続 record。
  excludes:
    - zh: MemoryFile 载体、MemoryStore 设施、MemoryWrite/MemoryDelete 活动、RetrievedCandidate，以及只描述访问边界的 MemoryScope 规范。
      en: MemoryFile carriers, MemoryStore facilities, MemoryWrite or MemoryDelete activities, RetrievedCandidates, and MemoryScope specifications that only describe access boundaries.
      ja: MemoryFile carrier、MemoryStore 施設、MemoryWrite/MemoryDelete 活動、RetrievedCandidate、アクセス境界だけの MemoryScope 仕様。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 Mem0 时把 id→external_memory_id、memory→value、user_id/agent_id/run_id→scope facets、created_at/updated_at→valid_from 与版本谱系。LangGraph store.put/get 映射 namespace[]、key、value、Item.created_at/updated_at；delete 或 TTL 到期应产生新版本或 MemoryTombstone。record 级 MemoryScope 与 MemoryRetentionPolicy 通过关系引用，不把 namespace 误当授权。
    en: For Mem0, map id→external_memory_id, memory→value, user_id/agent_id/run_id→scope facets, created_at/updated_at→valid_from and version lineage. LangGraph store.put/get maps namespace[], key, value, Item.created_at/updated_at; delete or TTL expiry should yield a new version or MemoryTombstone. Record-level MemoryScope and MemoryRetentionPolicy attach via relations—do not treat namespace as authorization.
    ja: Mem0 では id→external_memory_id、memory→value、user_id/agent_id/run_id→scope facet、created_at/updated_at→valid_from/版系譜。LangGraph は namespace[]/key/value/Item timestamps。delete/TTL は新版または MemoryTombstone。MemoryScope/MemoryRetentionPolicy は relation 参照、namespace を認可と混同しない。
  typical_input:
    - description: Mem0 get memory response — canonical record fields.
      format: |
        GET https://api.mem0.ai/v1/memories/{memory_id}/
        {
          "id": "mem0-8f3c2a1b",
          "memory": "Prefers TypeScript for code examples.",
          "user_id": "alice",
          "agent_id": "support-bot",
          "created_at": "2026-07-16T08:00:00Z",
          "updated_at": "2026-07-16T09:30:00Z",
          "metadata": {"category": "preferences"}
        }
      source_claims: [claim-memory-record-mem0]
    - description: LangGraph BaseStore Item from put or get.
      format: |
        await store.put(
          ("tenant-7", "user-42", "preferences"),
          "response-language",
          {"language": "zh-CN"},
          ttl=86400
        )
        # Item: namespace, key, value, created_at, updated_at
      source_claims: [claim-memory-record-langgraph]
    - description: Zep user memory ingestion message batch.
      format: |
        POST https://api.getzep.com/api/v2/users/{user_id}/memory
        {"messages": [{"role": "user", "content": "My timezone is JST."}]}
      source_claims: [claim-memory-record-zep]
  typical_output:
    - description: Moonweave-local MemoryRecord with store address and version lineage.
      format: |
        {
          "memory_record_id": "record-17",
          "namespace": ["tenant-7", "user-42", "preferences"],
          "key": "response-language",
          "version": 2,
          "predecessor_id": "record-12",
          "value": "zh-CN",
          "external_mem0_id": null,
          "created_at": "2026-07-16T08:00:00Z",
          "updated_at": "2026-07-16T09:00:00Z",
          "lifecycle_state": "active"
        }
      source_claims: [claim-memory-record-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: GET/PUT/DELETE /v1/memories/{id}/ with id, memory, user_id, timestamps.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore Item with namespace, key, value, TTL, timestamps.
    - name: Zep Memory
      url: https://help.getzep.com/concepts
      description: User and session memory graph entries with scoped recall.
structure:
  identity_keys:
    - memory_record_id
    - version
  fields:
    - id: memory_record_id
      labels: {zh: 记忆记录标识, en: memory record ID, ja: 記憶 record ID}
      definitions:
        zh: 稳定标识跨不可变版本的逻辑记忆记录；Moonweave 内部 id，可引用 Mem0 id 但不等同。
        en: Stable identifier for the logical memory record across immutable versions; Moonweave internal id, may reference but not equal Mem0 id.
        ja: 不変版を跨ぐ logical record の安定 ID。Mem0 id を参照可だが同一ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: record-17
      allowed_values: []
      source_claims: [claim-memory-record-design]
    - id: version
      labels: {zh: 版本, en: version, ja: 版}
      definitions:
        zh: 同一 record lineage 内的单调版本号；更新必须 increment 而非原地改写。
        en: Monotonic version within one record lineage; updates must increment, not rewrite in place.
        ja: 同一 record lineage 内の単調版。更新は increment 必須で in-place 不可。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [claim-memory-record-design]
    - id: namespace
      labels: {zh: 命名空间, en: namespace, ja: 名前空間}
      definitions:
        zh: LangGraph/Moonweave 分层地址元组；Mem0 user_id 等可映射为 namespace 段。
        en: LangGraph/Moonweave hierarchical address tuple; Mem0 user_id etc. may map as namespace segments.
        ja: LangGraph/Moonweave 階層 address tuple。Mem0 user_id 等を segment に写像可。
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [tenant-7, user-42, preferences]
      allowed_values: []
      source_claims: [claim-memory-record-langgraph]
    - id: key
      labels: {zh: 记录键, en: record key, ja: レコード key}
      definitions:
        zh: namespace 内唯一寻址该记录的业务键；LangGraph Item.key。
        en: Business key uniquely addressing this record within namespace; LangGraph Item.key.
        ja: namespace 内で record を一意に指す business key。LangGraph Item.key。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: response-language
      allowed_values: []
      source_claims: [claim-memory-record-langgraph]
    - id: value
      labels: {zh: 记录值, en: record value, ja: レコード value}
      definitions:
        zh: 该版本持久化的记忆内容；Mem0 memory 字段或 LangGraph Item.value。
        en: Persisted memory content for this version; Mem0 memory field or LangGraph Item.value.
        ja: 当該版の永続 memory 内容。Mem0 memory または LangGraph Item.value。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Prefers TypeScript for code examples.
      allowed_values: []
      source_claims: [claim-memory-record-mem0]
    - id: external_memory_id
      labels: {zh: 外部记忆标识, en: external memory ID, ja: 外部 memory ID}
      definitions:
        zh: Mem0 等托管 API 返回的 id；与 memory_record_id 映射但不可单独替代内部版本谱系。
        en: id returned by hosted APIs such as Mem0; maps to memory_record_id but cannot alone replace internal version lineage.
        ja: Mem0 等 API が返す id。memory_record_id に写像するが内部版系譜の代替不可。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mem0-8f3c2a1b
      allowed_values: []
      source_claims: [claim-memory-record-mem0]
    - id: user_id
      labels: {zh: 用户标识, en: user ID, ja: user ID}
      definitions:
        zh: Mem0/Zep 声明记忆所属用户的稳定作用域键。
        en: Stable scope key for memory ownership in Mem0 and Zep.
        ja: Mem0/Zep で記憶所属 user を宣言する安定 scope 鍵。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: alice
      allowed_values: []
      source_claims: [claim-memory-record-mem0]
    - id: agent_id
      labels: {zh: 智能体标识, en: agent ID, ja: agent ID}
      definitions:
        zh: Mem0 agent_id 作用域键；与 user_id 共同限定索引与搜索范围。
        en: Mem0 agent_id scope key; jointly limits index and search with user_id.
        ja: Mem0 agent_id scope 鍵。user_id と共に index/search 範囲を限定。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: support-bot
      allowed_values: []
      source_claims: [claim-memory-record-mem0]
    - id: created_at
      labels: {zh: 创建时间, en: created at, ja: 作成時刻}
      definitions:
        zh: 该记录版本首次持久化的时间戳；对应 Mem0 created_at 或 LangGraph Item.created_at。
        en: Timestamp when this record version was first persisted; maps to Mem0 created_at or LangGraph Item.created_at.
        ja: 当該 record 版初回永続化 timestamp。Mem0 created_at/LangGraph Item.created_at。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      allowed_values: []
      source_claims: [claim-memory-record-mem0, claim-memory-record-langgraph]
    - id: updated_at
      labels: {zh: 更新时间, en: updated at, ja: 更新時刻}
      definitions:
        zh: 该版本内容或元数据最后变更时间；Mem0 PUT 成功后应产生新版本并更新此字段。
        en: Last change time for this version's content or metadata; Mem0 PUT success should yield a new version updating this field.
        ja: 当該版内容/metadata 最終変更時刻。Mem0 PUT 成功は新版生成と共に更新。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      allowed_values: []
      source_claims: [claim-memory-record-mem0, claim-memory-record-langgraph]
    - id: lifecycle_state
      labels: {zh: 生命周期状态, en: lifecycle state, ja: lifecycle state}
      definitions:
        zh: active、superseded、invalidated 或 tombstoned；状态变化产生新版本。
        en: active, superseded, invalidated, or tombstoned; state change creates a new version.
        ja: active/superseded/invalidated/tombstoned。状態変更は新版を作る。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: active
      allowed_values: [active, superseded, invalidated, tombstoned]
      source_claims: [claim-memory-record-design]
    - id: predecessor_id
      labels: {zh: 前驱记录标识, en: predecessor record ID, ja: 先行 record ID}
      definitions:
        zh: 可选引用被本版本替代的前一 record 版本；证明 supersession 链。
        en: Optional reference to the prior record version this version supersedes; proves supersession chain.
        ja: 本版が置換する先行 record 版への optional 参照。supersession 鎖を証明。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: record-17-v1
      allowed_values: []
      source_claims: [claim-memory-record-design]
  constraints:
    - id: memory-record-version-immutable
      severity: error
      expression_language: plain
      expression: an update creates a new version and never changes an existing version in place
      explanation:
        zh: 更新必须创建新版本，禁止原地修改既有记忆版本。
        en: An update creates a new version and never changes an existing memory version in place.
        ja: 更新は新版を作り、既存版を in-place 変更しない。
      source_claims: [claim-memory-record-design]
    - id: memory-record-namespace-key-required
      severity: error
      expression_language: plain
      expression: namespace and key are required for LangGraph-style records; Mem0 records must map external id and scope facets to internal address or document the mapping
      explanation:
        zh: 持久条目必须有可审计的存储地址或显式映射到 Mem0 外部 id。
        en: Persistent entries require an auditable store address or explicit mapping to Mem0 external id.
        ja: 永続条目は監査可能 store address または Mem0 外部 id への明示 mapping が必要。
      source_claims: [claim-memory-record-design]
  required_relations: []
examples:
  - id: memory-record-example-mem0-get
    labels:
      zh: Mem0 记忆记录
      en: Mem0 memory record
      ja: Mem0 memory record
    descriptions:
      zh: 应用调用 GET /v1/memories/mem0-8f3c2a1b/ 返回 Alice 的偏好记录。Moonweave 映射为 memory_record_id=record-310、external_memory_id=mem0-8f3c2a1b、user_id=alice、value 含 TypeScript 偏好，created_at/updated_at 固定 v2 版本边界。
      en: GET /v1/memories/mem0-8f3c2a1b/ returns Alice's preference record. Moonweave maps to memory_record_id=record-310, external_memory_id=mem0-8f3c2a1b, user_id=alice, value with TypeScript preference, created_at/updated_at fixing v2 version boundary.
      ja: GET /v1/memories/mem0-8f3c2a1b/ が Alice 選好 record を返却。memory_record_id=record-310, external_memory_id=mem0-8f3c2a1b, user_id=alice, value=TypeScript 選好, created_at/updated_at が v2 版境界を固定。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: GET /v1/memories/{memory_id}/
    field_values:
      memory_record_id: record-310
      version: 2
      external_memory_id: mem0-8f3c2a1b
      user_id: alice
      agent_id: support-bot
      value: Prefers TypeScript and strict null checks.
      created_at: 2026-07-16T08:00:00Z
      updated_at: 2026-07-16T09:30:00Z
      lifecycle_state: active
      predecessor_id: record-310-v1
    related_node_ids: [MemoryRecord, MemoryItem, memory-stores-scopes, memory-lifecycle]
    related_relation_ids: [MemoryItem-represented_by-MemoryRecord]
    source_claims: [claim-memory-record-mem0, claim-memory-record-design]
  - id: memory-record-example-langgraph-item
    labels:
      zh: LangGraph BaseStore 记忆记录
      en: LangGraph BaseStore memory record
      ja: LangGraph BaseStore memory record
    descriptions:
      zh: LangGraph 在 BaseStore 写入 namespace=("tenant-7","user-42","preferences")、key="response-language" 的 Item，value={"language":"zh-CN"}。Moonweave 将其表达为 memory_record_id=record-17、version=2，namespace/key 为存储地址，与 thread checkpointer 状态分离。
      en: LangGraph writes Item at namespace=("tenant-7","user-42","preferences"), key="response-language", value={"language":"zh-CN"} in BaseStore. Moonweave expresses memory_record_id=record-17, version=2 with namespace/key as store address, separate from thread checkpointer state.
      ja: LangGraph が BaseStore に namespace/key/value Item を書込。memory_record_id=record-17, version=2、namespace/key が store address。thread checkpointer 状態と分離。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.put Item schema
    field_values:
      memory_record_id: record-17
      version: 2
      namespace: [tenant-7, user-42, preferences]
      key: response-language
      value: '{"language":"zh-CN"}'
      created_at: 2026-07-16T08:00:00Z
      updated_at: 2026-07-16T09:00:00Z
      lifecycle_state: active
    related_node_ids: [MemoryRecord, MemoryStore, MemoryNamespace, memory-stores-scopes]
    related_relation_ids: [MemoryRecord-member_of-MemoryNamespace, MemoryRecord-stored_in-MemoryStore]
    source_claims: [claim-memory-record-langgraph, claim-memory-record-design]
  - id: memory-record-example-zep-user-memory
    labels:
      zh: Zep 用户记忆记录
      en: Zep user memory record
      ja: Zep user memory record
    descriptions:
      zh: Zep POST /api/v2/users/alice/memory  ingest “My timezone is JST.” 到 user memory graph。Moonweave 将其建模为 user_id=alice 作用域下的 MemoryRecord，与 session memory API 路径区分。
      en: Zep POST /api/v2/users/alice/memory ingests "My timezone is JST." into the user memory graph. Moonweave models it as MemoryRecord under user_id=alice scope, distinct from session memory API paths.
      ja: Zep POST /api/v2/users/alice/memory が “My timezone is JST.” を user memory graph へ ingest。user_id=alice scope の MemoryRecord としてモデル化し session memory API と区別。
    example_source:
      product: Zep
      url: https://help.getzep.com/concepts
      version: POST /api/v2/users/{user_id}/memory
    field_values:
      memory_record_id: record-zep-alice-tz
      version: 1
      user_id: alice
      value: Timezone is JST.
      created_at: 2026-07-16T10:00:00Z
      updated_at: 2026-07-16T10:00:00Z
      lifecycle_state: active
    related_node_ids: [MemoryRecord, MemoryScope, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-record-zep, claim-memory-record-design]
  - id: memory-record-example-item-without-address-boundary
    labels:
      zh: 无语义地址的不是记忆记录
      en: Semantic item without store address is not a record
      ja: store address なし semantic item は record ではない
    descriptions:
      zh: item-pref-language 表达“用户偏好简体中文”并可独立更新，但只有 item_id 与命题内容，没有 namespace、key、version 或 Mem0 external id。它是 MemoryItem，在选定后端之前不是 MemoryRecord。
      en: item-pref-language expresses "user prefers Simplified Chinese" and can update independently but has only item_id and proposition content—no namespace, key, version, or Mem0 external id. It is MemoryItem, not MemoryRecord until a backend is chosen.
      ja: item-pref-language は「簡体字中国語を好む」を表し item_id/命題のみで namespace/key/version/Mem0 external id なし。backend 選択前は MemoryItem で MemoryRecord ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: MemoryItem versus MemoryRecord boundary
    field_values:
      item_id: item-pref-language
      has_namespace_key: false
      is_memory_record: false
    related_node_ids: [MemoryRecord, MemoryItem, memory-stores-scopes]
    related_relation_ids: [MemoryItem-represented_by-MemoryRecord]
    source_claims: [claim-memory-record-design]
parent_relation:
  id: MemoryRecord-is_a-MemoryEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆实体
    en: is a memory entity
    ja: 記憶実体の一種
  definitions:
    zh: 每个 MemoryRecord 都是 MemoryEntity；其种差是在 MemoryStore 内由 namespace-and-key 与 version 标识的持久条目。
    en: Every MemoryRecord is a MemoryEntity distinguished as a persistent entry identified by namespace-and-key plus version within a MemoryStore.
    ja: すべての MemoryRecord は MemoryEntity で、MemoryStore 内 namespace-and-key+version で識別される永続条目という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-record-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryRecord-member_of-MemoryNamespace
    predicate: member_of
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 属于命名空间
      en: member of namespace
      ja: 名前空間の構成員
