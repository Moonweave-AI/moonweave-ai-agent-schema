      zh: MemoryRecord —supersedes→ MemoryRecord 从新记录指向其被替代前驱，表达当前有效版本选择；该事实属于记录版本关系，不属于更新活动本身。
      en: MemoryRecord —supersedes→ MemoryRecord points from a new record to its replaced predecessor and expresses current-version selection; the fact is a record-version relation, not the update activity itself.
      ja: MemoryRecord —supersedes→ MemoryRecord はnew recordからreplaced predecessorへ向きcurrent-version selectionを表し、update activity自体でなくrecord-version relationです。
