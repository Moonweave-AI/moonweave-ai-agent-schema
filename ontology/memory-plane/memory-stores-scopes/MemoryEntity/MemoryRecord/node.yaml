sibling_differentiation:
  - sibling_concept_id: MemoryFile
    shared_parent_concept_id: MemoryEntity
    differentia:
      zh: 正向身份比较：父节点 MemoryEntity：MemoryRecord（semantic kind=information，骨架 MemoryRecord-is_a-MemoryEntity）；MemoryFile（semantic kind=information，骨架 MemoryFile-is_a-MemoryEntity）。双端条件：MemoryRecord 条件：“记忆记录是一种记忆实体；其区分条件是：它是持久或会话级记忆条目，包含内容、来源、类型、命名空间、作用范围、保留状态、置信度和生命周期历史”；MemoryFile 条件：“作为记忆实体，记忆文件由这一事实区分：它是文件承载的持久记忆资源，在即时提示窗口之外保存项目约定、用户偏好、笔记、计划或跨会话上下文”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryEntity: MemoryRecord (semantic kind=information, backbone MemoryRecord-is_a-MemoryEntity); MemoryFile (semantic kind=information, backbone MemoryFile-is_a-MemoryEntity). Endpoint conditions: MemoryRecord condition: “As a memory entity, Memory record is distinguished by the fact that it is a persistent or session-scoped memory entry with content, provenance, type, namespace, scope, retention state, confidence, and lifecycle history”; MemoryFile condition: “Memory file belongs to the memory entity category and differs from broader members in that it is a file-backed persistent memory resource that preserves project conventions, user preferences, notes, plans, or cross-session context outside the immediate prompt window”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryEntity：MemoryRecord（semantic kind=information、バックボーン MemoryRecord-is_a-MemoryEntity）；MemoryFile（semantic kind=information、バックボーン MemoryFile-is_a-MemoryEntity）。両端条件：MemoryRecord の条件：「記憶実体に属する記憶レコードは、次の事実を種差とします：それは、内容、来歴、型、名前空間、スコープ、保持状態、信頼度、ライフサイクル履歴を持つ永続またはセッション単位の記憶項目です」；MemoryFile の条件：「記憶ファイルは記憶実体として、次の条件により他の対象と区別されます：それは、直近のプロンプトウィンドウ外でプロジェクト規約、ユーザー選好、メモ、計画、クロスセッション文脈を保持する、ファイルベースの永続記憶資源です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-record-067
