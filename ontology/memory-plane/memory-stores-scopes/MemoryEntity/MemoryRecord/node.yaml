          zh: record-512-v2 声明 predecessor_id=record-512-v1，两者共享 versioned_object_id=prefs-timezone，且 update-512 已成功完成。
          en: record-512-v2 declares predecessor_id=record-512-v1; both share versioned_object_id=prefs-timezone and update-512 completed successfully.
