sibling_differentiation:
  - sibling_concept_id: MemoryItem
    shared_parent_concept_id: MemoryEntity
    differentia:
      zh: 正向身份比较：父节点 MemoryEntity：MemoryFile（semantic kind=information，骨架 MemoryFile-is_a-MemoryEntity）；MemoryItem（semantic kind=information，骨架 MemoryItem-is_a-MemoryEntity）。双端条件：MemoryFile 条件：“作为记忆实体，记忆文件由这一事实区分：它是文件承载的持久记忆资源，在即时提示窗口之外保存项目约定、用户偏好、笔记、计划或跨会话上下文”；MemoryItem 条件：“记忆项是一种记忆实体；其区分条件是：它是可寻址记忆单元，可保存为文本、摘要、向量支撑分块、经验、偏好、程序或反思”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryEntity: MemoryFile (semantic kind=information, backbone MemoryFile-is_a-MemoryEntity); MemoryItem (semantic kind=information, backbone MemoryItem-is_a-MemoryEntity). Endpoint conditions: MemoryFile condition: “Memory file belongs to the memory entity category and differs from broader members in that it is a file-backed persistent memory resource that preserves project conventions, user preferences, notes, plans, or cross-session context outside the immediate prompt window”; MemoryItem condition: “As a memory entity, Memory item is distinguished by the fact that it is an addressable memory unit that may be stored as text, summary, vector-backed chunk, experience, preference, procedure, or reflection”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryEntity：MemoryFile（semantic kind=information、バックボーン MemoryFile-is_a-MemoryEntity）；MemoryItem（semantic kind=information、バックボーン MemoryItem-is_a-MemoryEntity）。両端条件：MemoryFile の条件：「記憶ファイルは記憶実体として、次の条件により他の対象と区別されます：それは、直近のプロンプトウィンドウ外でプロジェクト規約、ユーザー選好、メモ、計画、クロスセッション文脈を保持する、ファイルベースの永続記憶資源です」；MemoryItem の条件：「記憶実体に属する記憶項目は、次の事実を種差とします：それは、テキスト、要約、ベクトル付きチャンク、経験、選好、手続き、反省として保存され得るアドレス可能な記憶単位です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-file-004
