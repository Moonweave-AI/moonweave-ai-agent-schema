    confidence: high
    review_status: pending
  - id: claim-memory-file-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents memory as files exposed through backend filesystem operations; Moonweave classifies the individually addressed durable file carrier as MemoryFile.
    locator: Deep Agents JavaScript documentation > Memory > Memory files and backend namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-file-008
    source: eng-fw-deepagents-js-docs
    supports: A versioned memory file whose sections preserve record keys provides an inspectable materialization of those logical records.
    locator: Deep Agents JavaScript documentation > Memory > Memory files and backend namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-file-009
    source: eng-fw-deepagents-js-docs
    supports: A documentation file that only describes memory behavior does not contain the values or identifiers required to materialize a MemoryRecord.
    locator: Deep Agents JavaScript documentation > Memory > Memory files and backend namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-file-010
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents stores persistent agent memory in readable files; Moonweave makes the carrier-to-logical-record correspondence explicit so path identity and namespace-key identity remain separate.
    locator: Deep Agents JavaScript documentation > Memory > Memory files and backend namespaces
