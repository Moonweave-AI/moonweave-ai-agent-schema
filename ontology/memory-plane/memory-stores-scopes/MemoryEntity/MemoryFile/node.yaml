schema: moonweave.ai/ontology-node/v1
id: MemoryFile
kind: concept
labels:
  zh: 记忆文件
  en: memory file
  ja: 記憶ファイル
semantics:
  short_definition:
    zh: 以文件路径和内容版本为身份、在提示窗口外保存记忆内容的文件型 MemoryEntity。
    en: A file-backed MemoryEntity identified by path and content version that preserves memory outside the prompt window.
    ja: パスと内容版で識別され、プロンプト窓外に記憶を保存するファイル型 MemoryEntity です。
  definition:
    zh: MemoryFile 是一种 MemoryEntity；其种差是以规范化路径与内容摘要或版本标识的可寻址文件载体，通过可读文件把一个或多个 MemoryRecord 的内容持久化。Deep Agents 的 AGENTS.md、memories/user-preferences.md 与 Letta 导出的 block 快照都属于文件型载体：路径是媒体身份，namespace-and-key 仍是逻辑记录身份。一个文件可物化多条记录，一条记录也可由 Mem0 API 或 LangGraph BaseStore 等非文件后端保存。
    en: A MemoryFile is a MemoryEntity whose differentia is a file-addressable carrier identified by normalized path and content digest or version, persistently rendering one or more MemoryRecords as readable file bytes. Deep Agents AGENTS.md, memories/user-preferences.md, and Letta-exported block snapshots are file carriers—path identifies the media while namespace-and-key identifies logical records. One file may materialize several records; a record may also live in Mem0 or LangGraph BaseStore without a file.
    ja: MemoryFile は正規 path と内容 digest/版で識別される file-addressable carrier で、一つ以上の MemoryRecord を可読 file byte として永続化する MemoryEntity です。Deep Agents AGENTS.md、memories/user-preferences.md、Letta block snapshot が file carrier で、path は媒体、namespace-and-key は論理 record。一 file は複数 record を物化でき、record は Mem0/LangGraph 等非 file backend にも保存可。
  why_needed:
    zh: 许多框架（Deep Agents、Cursor、Letta 导出）把长期记忆落成人类可读文件。没有 MemoryFile，团队无法审计路径、内容版本和 git 历史，也会把“整个 preferences.md”和“其中一条偏好”混成同一对象。
    en: Many frameworks (Deep Agents, Cursor, Letta export) persist long-term memory as human-readable files. Without MemoryFile, teams cannot audit path, content version, and git history, and conflate “the whole preferences.md” with “one preference inside it.”
    ja: Deep Agents/Cursor/Letta export 等は長期記憶を human-readable file にします。MemoryFile がなければ path・内容版・git 履歴を監査できず、「preferences.md 全体」と「内部一選好」を混同します。
  includes:
    - zh: AGENTS.md、memory/user-preferences.md、Letta block 导出文件等具有稳定路径、版本或摘要、可读取内容和来源信息的持久文件。
      en: Persistent files such as AGENTS.md, memory/user-preferences.md, or Letta block exports with stable path, version or digest, readable content, and provenance.
      ja: AGENTS.md、memory/user-preferences.md、Letta block export 等、安定 path・版/digest・可読内容・来歴を持つ永続 file。
  excludes:
    - zh: 数据库行、Pinecone/Chroma 向量条目、文件内单个逻辑 MemoryItem，以及只指向文件的 SourceReference。
      en: Database rows, Pinecone/Chroma vector entries, individual logical MemoryItems inside a file, and SourceReferences that only point to a file.
      ja: DB 行、Pinecone/Chroma vector entry、file 内個別 MemoryItem、file を指すだけの SourceReference。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成 Deep Agents StoreBackend 时，ls/read/write 操作针对 MemoryFile 路径；git blob 或 sha256 摘要可作为 content_digest。文件内段落若带 record key 注释，可建立 MemoryFile-materializes-MemoryRecord 关系。Mem0 与 LangGraph 无文件路径时不应强行分类为 MemoryFile。
    en: With Deep Agents StoreBackend, ls/read/write target MemoryFile paths; git blob or sha256 digests serve as content_digest. Paragraphs carrying record-key markers establish MemoryFile-materializes-MemoryRecord. Mem0 and LangGraph entries without file paths should not be forced into MemoryFile.
    ja: Deep Agents StoreBackend の ls/read/write は MemoryFile path を対象。git blob/sha256 が content_digest。record key 付き段落は MemoryFile-materializes-MemoryRecord。path のない Mem0/LangGraph は MemoryFile 強制分類不可。
  typical_input:
    - description: Deep Agents filesystem memory path read at startup.
      format: |
        # StoreBackend namespace factory per user
        backend.read("/memories/AGENTS.md")
        # => file bytes + path identity
      source_claims: [claim-memory-file-deepagents]
    - description: Git-tracked preferences file with blob identity.
      format: |
        path: memories/preferences.md
        git_blob: a1b2c3d4e5f6...
        content: |
          ## language
          key: response-language
          Prefers Simplified Chinese.
      source_claims: [claim-memory-file-deepagents]
  typical_output:
    - description: Moonweave-local MemoryFile record with path-version identity.
      format: |
        {
          "memory_entity_id": "memories/preferences.md",
          "entity_version": "v12",
          "content_digest": "git-blob:a1b2c3d4",
          "file_path": "/memories/preferences.md",
          "lifecycle_state": "active"
        }
      source_claims: [claim-memory-file-design]
  reference_implementations:
    - name: Deep Agents JavaScript Memory
      url: https://docs.langchain.com/oss/javascript/deepagents/memory
      description: Filesystem-backed long-term memory with path-addressable files.
    - name: Letta Memory Export
      url: https://docs.letta.com/guides/core-concepts/memory
      description: Core blocks editable in context; exportable as readable snapshots.
structure:
  identity_keys:
    - file_path
    - entity_version
  fields:
    - id: file_path
      labels: {zh: 文件路径, en: file path, ja: ファイルパス}
      definitions:
        zh: 规范化、相对于记忆后端根目录的文件路径；Deep Agents /memories/ 前缀下的稳定地址。
        en: Normalized file path relative to the memory backend root; stable address under Deep Agents /memories/ prefix.
        ja: memory backend root からの正規 file path。Deep Agents /memories/ 下の安定 address。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: /memories/preferences.md
      allowed_values: []
      source_claims: [claim-memory-file-deepagents]
    - id: entity_version
      labels: {zh: 文件版本, en: file version, ja: ファイル版}
      definitions:
        zh: 标识该路径上某一固定内容版本的标签，如 git commit、etag 或单调版本号。
        en: Label identifying one fixed content version at this path, such as git commit, etag, or monotonic version.
        ja: git commit、etag、単調版番号等、この path の固定内容版を識別する label。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v12
      allowed_values: []
      source_claims: [claim-memory-file-design]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: 内容 digest}
      definitions:
        zh: 对该文件版本全部字节或规范化文本计算的完整性摘要。
        en: Integrity digest of all bytes or normalized text for this file version.
        ja: 当該 file 版の全 byte または正規化 text の完全性 digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: git-blob:a1b2c3d4
      allowed_values: []
      source_claims: [claim-memory-file-deepagents]
    - id: backend_ref
      labels: {zh: 后端引用, en: backend reference, ja: backend 参照}
      definitions:
        zh: 引用承载该文件的 MemoryStore 或 StoreBackend 端点。
        en: References the MemoryStore or StoreBackend endpoint hosting this file.
        ja: 当該 file を host する MemoryStore または StoreBackend 端点を参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: memory-store:deepagents-prod
      allowed_values: []
      source_claims: [claim-memory-file-deepagents]
  constraints:
    - id: memory-file-path-version-identity
      severity: error
      expression_language: plain
      expression: file_path + entity_version uniquely identifies one MemoryFile version; content change requires new entity_version
      explanation:
        zh: 路径与版本共同确定文件身份；内容变化必须产生新版本。
        en: Path and version jointly determine file identity; content change requires a new version.
        ja: path と版が file 同一性を決め、内容変更は新版必須。
      source_claims: [claim-memory-file-design]
  required_relations: []
examples:
  - id: memory-file-example-deepagents-agents-md
    labels:
      zh: Deep Agents AGENTS.md 记忆文件
      en: Deep Agents AGENTS.md memory file
      ja: Deep Agents AGENTS.md memory file
    descriptions:
      zh: Deep Agents 项目在 /memories/AGENTS.md 保存项目约定，StoreBackend 在启动时 ls/read 加载。文件以路径与 git blob 摘要 v12 为身份，跨会话可读可写；内部各段落可分别物化为 MemoryRecord。
      en: A Deep Agents project stores conventions in /memories/AGENTS.md; StoreBackend ls/read loads it at startup. The file is identified by path and git blob digest v12, readable and writable across sessions; sections may materialize as separate MemoryRecords.
      ja: Deep Agents プロジェクトが /memories/AGENTS.md に規約を保存。StoreBackend が startup で ls/read。path と git blob digest v12 で識別され session 横断 read/write 可。各節は別 MemoryRecord に物化可。
    example_source:
      product: Deep Agents
      url: https://docs.langchain.com/oss/javascript/deepagents/memory
      version: filesystem memory files and StoreBackend
    field_values:
      file_path: /memories/AGENTS.md
      entity_version: v12
      content_digest: git-blob:9a7f2e1c
      lifecycle_state: active
    related_node_ids: [MemoryFile, MemoryRecord, MemoryStore, memory-stores-scopes]
    related_relation_ids: [MemoryFile-materializes-MemoryRecord]
    source_claims: [claim-memory-file-deepagents, claim-memory-file-design]
  - id: memory-file-example-preferences-md-sections
    labels:
      zh: preferences.md 多记录物化
      en: preferences.md multi-record materialization
      ja: preferences.md 複数 record 物化
    descriptions:
      zh: memories/preferences.md@v9 以三个带 record key 的 Markdown 段落保存语言、时区与输出格式偏好。Moonweave 将整文件建模为 MemoryFile，各段落通过 MemoryFile-materializes-MemoryRecord 连接到独立 namespace/key 记录。
      en: memories/preferences.md@v9 stores language, timezone, and output-format preferences as three Markdown sections with record keys. Moonweave models the whole file as MemoryFile; each section links to independent namespace/key records via MemoryFile-materializes-MemoryRecord.
      ja: memories/preferences.md@v9 が言語・timezone・出力形式を record key 付き三節で保存。全体を MemoryFile、各節を MemoryFile-materializes-MemoryRecord で独立 namespace/key record へ接続。
    example_source:
      product: Deep Agents
      url: https://docs.langchain.com/oss/javascript/deepagents/memory
      version: persisted memory file updates
    field_values:
      file_path: /memories/preferences.md
      entity_version: v9
      content_digest: sha256:preferences-v9
      materialized_record_keys: [response-language, timezone, output-format]
    related_node_ids: [MemoryFile, MemoryRecord, MemoryItem, memory-stores-scopes]
    related_relation_ids: [MemoryFile-materializes-MemoryRecord]
    source_claims: [claim-memory-file-deepagents, claim-memory-file-design]
  - id: memory-file-example-item-not-file-boundary
    labels:
      zh: 逻辑记忆项不是记忆文件
      en: Logical memory item is not a memory file
      ja: logical memory item は memory file ではない
    descriptions:
      zh: Mem0 返回 id=mem0-8f3c2a1b 的偏好 “Prefers Simplified Chinese”，有 user_id 与 updated_at 但没有文件路径或文件内容版本。即使该偏好后来被写入 preferences.md，其 MemoryItem 身份仍独立于 MemoryFile 路径身份。
      en: Mem0 returns preference "Prefers Simplified Chinese" as id=mem0-8f3c2a1b with user_id and updated_at but no file path or file-content version. Even if later written into preferences.md, its MemoryItem identity stays separate from MemoryFile path identity.
      ja: Mem0 が “Prefers Simplified Chinese” を id=mem0-8f3c2a1b（user_id/updated_at あり、file path なし）で返却。後に preferences.md へ書いても MemoryItem identity は MemoryFile path identity と独立。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: GET /v1/memories/{memory_id}/
    field_values:
      memory_entity_id: item-pref-language
      has_file_path: false
      external_mem0_id: mem0-8f3c2a1b
    related_node_ids: [MemoryFile, MemoryItem, MemoryRecord, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-file-mem0, claim-memory-file-design]
  - id: memory-file-example-storebackend-not-file
    labels:
      zh: StoreBackend 不是记忆文件
      en: StoreBackend is not a memory file
      ja: StoreBackend は memory file ではない
    descriptions:
      zh: Deep Agents StoreBackend 暴露 ls/read/write 接口并托管多个 MemoryFile，但 backend 本身是 MemoryStore 设施，不是其中任何一份 AGENTS.md 或 preferences.md。
      en: Deep Agents StoreBackend exposes ls/read/write and hosts multiple MemoryFiles, but the backend itself is a MemoryStore facility—not any AGENTS.md or preferences.md it carries.
      ja: Deep Agents StoreBackend は ls/read/write を提供し複数 MemoryFile を host するが、backend 自体は MemoryStore 施設であり AGENTS.md/preferences.md ではない。
    example_source:
      product: Deep Agents
      url: https://docs.langchain.com/oss/javascript/deepagents/memory
      version: StoreBackend and backends
    field_values:
      backend_type: StoreBackend
      is_memory_file: false
    related_node_ids: [MemoryFile, MemoryStore, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-memory-file-deepagents, claim-memory-file-design]
parent_relation:
  id: MemoryFile-is_a-MemoryEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆实体
    en: is a memory entity
    ja: 記憶実体の一種
  definitions:
    zh: 每个 MemoryFile 都是 MemoryEntity；其种差是以规范路径与内容摘要或版本标识的可寻址文件载体。
    en: Every MemoryFile is a MemoryEntity distinguished as a file-addressable carrier identified by normalized path and content digest or version.
    ja: すべての MemoryFile は MemoryEntity で、正規 path と内容 digest/版で識別される file-addressable carrier という種差を持つ。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-file-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryFile-materializes-MemoryRecord
    predicate: materializes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 物化记忆记录
      en: materializes memory record
      ja: 記憶記録を物化する
    definitions:
      zh: MemoryFile-materializes-MemoryRecord 表示某文件版本把一个或多个逻辑 MemoryRecord 的值与必要标识呈现为可读取字节；文件是载体，记录仍由 namespace、key 与 version 识别。
      en: MemoryFile-materializes-MemoryRecord states that one file version renders one or more logical MemoryRecords as readable bytes; the file is a carrier while each record remains identified by namespace, key, and version.
      ja: 一 file 版が一つ以上の論理 MemoryRecord を可読 byte として表す。file は carrier、record は namespace/key/version で識別。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: 検索可能な意味事実を記録し、全実行 instance に一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_materializes
      labels: {zh: 反向：materializes, en: is target of materializes, ja: 逆方向：materializes}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-memory-file-design]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:MemoryRecord
sources:
  - id: src-deepagents-memory
    title: Deep Agents Memory Documentation
    publisher: LangChain
    url: https://docs.langchain.com/oss/javascript/deepagents/memory
    source_type: official-doc
    relevance: Filesystem-backed memory files, StoreBackend ls/read/write.
  - id: src-mem0-file-boundary
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: API memories without file path identity.
  - id: src-memory-file-design
    title: Moonweave MemoryFile carrier design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates file carrier from logical record and item identity.
source_claims:
  - id: claim-memory-file-deepagents
    source: src-deepagents-memory
    supports: Deep Agents persists learned information in path-addressable memory files loaded via StoreBackend across conversations.
    locator: Memory > filesystem-backed files and StoreBackend
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-file-mem0
    source: src-mem0-file-boundary
    supports: Mem0 memory objects are identified by API id and entity scoping fields without requiring a filesystem path.
    locator: Memory API response schema
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-file-design
    source: src-memory-file-design
    supports: Moonweave MemoryFile binds path and content version as carrier identity separate from namespace-key record addresses inside the file.
    locator: MemoryFile differentia
    evidence_kind: design-inference
    confidence: high
