source_claims:
  - id: claim-memory-file-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' Memory documentation states that long-term memory is filesystem-backed, persists across conversations, and can be loaded at startup or read on demand. MemoryFile is Moonweave's addressable, versioned file carrier for that persistent content, distinct from logical items inside it.
    locator: Memory > How memory works > file paths, startup loading, and persisted file updates
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-file-002
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents filesystem-backed long-term memory, where memory files persist across conversations and are loaded at startup or on demand. The versioned preferences.md example is a direct file-carrier instance with Moonweave integrity metadata.
    locator: Memory > How memory works > file paths, startup loading, and persisted file updates
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-file-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents treats a memory file as a container that can be read into context, while individual learned facts can be edited within that file. Moonweave formalizes the carrier-versus-logical-item boundary shown here.
    locator: Memory > How memory works > file paths, startup loading, and persisted file updates
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-file-004
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents persistent memory files that may contain learned facts and can be loaded or edited across conversations. Moonweave therefore distinguishes MemoryFile as the addressable carrier from MemoryItem as the business-addressable remembered meaning within or across carriers; this ontology split is not defined by Deep Agents.
    locator: Memory > How memory works > learned information, file paths, startup loading, and persisted file updates
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-file-005
    source: eng-fw-deepagents-js-docs
    supports: A normalized memory path plus immutable digest instantiates the documented file-based durable memory carrier.
    locator: Deep Agents JavaScript documentation > Memory > Memory files and backend namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: pending
