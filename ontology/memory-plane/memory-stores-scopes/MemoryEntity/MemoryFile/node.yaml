      en: materializes memory record
      ja: 記憶記録を物化する
    definitions:
      zh: MemoryFile-materializes-MemoryRecord 表示某文件版本把一个或多个逻辑 MemoryRecord 的值与必要标识呈现为可读取字节；文件是载体，记录仍由 namespace、key 与 version 识别，两者不是同一实体。
      en: MemoryFile-materializes-MemoryRecord states that one file version renders the value and necessary identifiers of one or more logical MemoryRecords as readable bytes. The file is a carrier, while each record remains identified by namespace, key, and version; they are not the same entity.
      ja: MemoryFile-materializes-MemoryRecord は一ファイル版が一つ以上の論理 MemoryRecord の値と必要識別子を可読byteとして表すことを示します。ファイルは媒体、記録は namespace・key・version で識別され、同一実体ではありません。
