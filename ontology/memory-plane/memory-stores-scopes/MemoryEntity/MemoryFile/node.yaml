schema: moonweave.ai/ontology-node/v1
id: MemoryFile
kind: concept
status: review
labels:
  zh: 记忆文件
  en: memory file
  ja: 記憶ファイル
semantics:
  short_definition:
    zh: 以文件路径和内容版本为身份、在提示窗口外保存记忆内容的文件型 MemoryEntity。
    en: A file-backed MemoryEntity identified by path and content version that preserves memory outside the prompt window.
    ja: パスと内容版で識別され、プロンプト窓外に記憶を保存するファイル型 MemoryEntity です。
  definition:
    zh: MemoryFile 是一种 MemoryEntity；其种差是：它是以规范化路径与内容摘要或版本标识的 file-addressable materialization，通过可读文件把一个或多个 MemoryRecord 的内容持久化。文件路径是载体身份，记录的 namespace-and-key 是逻辑条目身份；一个文件可物化多条记录，一条记录也可由非文件后端保存。
    en: A MemoryFile is a MemoryEntity whose differentia is a file-addressable materialization identified by normalized path and content digest or version, persistently rendering one or more MemoryRecords as readable file content. The path identifies the carrier while namespace-and-key identifies the logical record; one file may materialize several records, and a record may use a non-file backend.
    ja: MemoryFile は正規化経路と内容digestまたは版で識別される file-addressable materialization で、一つ以上の MemoryRecord を可読ファイル内容として持続化する MemoryEntity です。経路は媒体、namespace-and-key は論理記録を識別し、一ファイルは複数記録を物化でき、記録は非ファイルbackendにも保存できます。
  why_needed:
    zh: 该概念让系统审计文件路径、内容摘要和变更历史，并把物理文件载体与文件中可独立寻址的逻辑记忆项或记录分开。
    en: It supports auditing path, content digest, and change history while separating the physical file carrier from independently addressable logical items or records inside it.
    ja: ファイルパス、内容ダイジェスト、変更履歴を監査可能にし、物理ファイル媒体と内部の独立アドレス可能な論理項目・レコードを分離します。
  includes:
    - zh: 纳入 AGENTS.md、memory/user-preferences.md 或会话归档文件这类具有稳定路径、版本或摘要、可读取内容和来源信息的持久文件。
      en: Includes persistent files such as AGENTS.md, memory/user-preferences.md, or conversation archives with stable path, version or digest, readable content, and provenance.
      ja: AGENTS.md、memory/user-preferences.md、会話アーカイブのように安定パス、版またはダイジェスト、読取可能内容、来歴を持つ永続ファイルを含みます。
  excludes:
    - zh: 排除数据库行、向量条目、文件内标题段落以及仅指向文件的 SourceReference；它们分别是其他载体、逻辑单元或引用，而非文件型记忆实体。
      en: Excludes database rows, vector entries, headings inside a file, and SourceReferences that only point to a file; these are other carriers, logical units, or references rather than file-backed memory entities.
      ja: データベース行、ベクトル項目、ファイル内見出し、ファイルを指すだけの SourceReference は別媒体・論理単位・参照であり、ファイル型記憶実体ではないため除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryFile-example-positive-001
    kind: positive
    labels:
      zh: 记忆文件正例
      en: Positive example of memory file
      ja: 記憶ファイルの正例
    scenario_id: null
    descriptions:
      zh: memories/preferences.md 以路径、git blob 摘要和版本 v12 为身份，跨会话保存三条用户偏好；文件内每条偏好可分别物化为 MemoryRecord。
      en: memories/preferences.md is identified by path, git blob digest, and version v12 and preserves three user preferences across sessions; each preference inside the file may be materialized as a separate MemoryRecord.
      ja: memories/preferences.md はパス、git blobダイジェスト、版v12で識別され、三利用者選好を会話横断で保存します。ファイル内各選好は別 MemoryRecord として物化できます。
    field_values:
      memory_entity_id: memories/preferences.md
      entity_version: v12
      content_digest: git-blob:preferences-v12
      provenance_ref: repository://agent-memory/commit-12#memories/preferences.md
      lifecycle_state: active
    related_node_ids:
      - MemoryFile
      - MemoryRecord
    related_relation_ids:
      - MemoryFile-materializes-MemoryRecord
    expected_result:
      zh: 该运行可查询 MemoryFile 以及方向保持不变的事实 MemoryFile-materializes-MemoryRecord。
      en: The run can query MemoryFile together with direction-preserving fact MemoryFile-materializes-MemoryRecord.
      ja: この実行では MemoryFile と方向を保持した事実 MemoryFile-materializes-MemoryRecord を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、MemoryFile-materializes-MemoryRecord 的 canonical 方向、概念定义和可用字段值。
      en: The durable carrier has file identity and version outside the prompt window; logical records inside it remain independently addressable rather than becoming the file itself.
      ja: このシナリオは実際の運用文脈、MemoryFile-materializes-MemoryRecord の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-file-002
  - id: MemoryFile-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆文件边界例
      en: Boundary case for memory file
      ja: 記憶ファイルの境界例
    scenario_id: null
    descriptions:
      zh: item-pref-language 表达“使用简体中文”并可独立更新，但没有文件路径或文件内容版本；即使写在 preferences.md 中，它仍是 MemoryItem 而不是 MemoryFile。
      en: item-pref-language expresses “use Simplified Chinese” and can be updated independently but has no file path or file-content version. Even when written in preferences.md, it remains MemoryItem rather than MemoryFile.
      ja: item-pref-language は「簡体字中国語を使用」を表し独立更新できますが、ファイルパスやファイル内容版を持ちません。preferences.md に書かれても MemoryItem で MemoryFile ではありません。
    field_values: {}
    related_node_ids:
      - MemoryFile
      - MemoryRecord
      - MemoryItem
    related_relation_ids:
      - MemoryFile-materializes-MemoryRecord
    expected_result:
      zh: MemoryItem 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryFile。
      en: MemoryItem retains its own type; validation must not promote it to MemoryFile from relation co-occurrence.
      ja: MemoryItem は元の型を維持し、関係の共起だけで MemoryFile へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 MemoryFile-materializes-MemoryRecord 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: File identity depends on carrier path and content version; item identity depends on one remembered semantic unit. Containment or materialization does not collapse carrier and content.
      ja: 境界例は実在する対照ノードを示し、MemoryFile-materializes-MemoryRecord の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-file-003
