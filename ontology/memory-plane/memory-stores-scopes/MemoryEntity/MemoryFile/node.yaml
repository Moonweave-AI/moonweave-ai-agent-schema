schema: moonweave.ai/ontology-node/v1
id: MemoryFile
kind: concept
status: accepted
labels:
  zh: 记忆文件
  en: Memory File
  ja: 記憶ファイル
semantics:
  short_definition:
    zh: 以可定位、可校验的文件版本保存或提供记忆内容的持久化文件工件。
    en: A persistent file artifact whose locatable, verifiable version stores or supplies memory content.
    ja: 記憶 content を保存又は提供する、locate と verify が可能な version を持つ永続 file artifact。
  definition:
    zh: >-
      MemoryFile 是由 canonical_locator、content_digest、media_type 和可选 version_ref 标识的文件工件。它的字节可以
      保存代理记忆或作为摄取来源，在明确的读取或摄取活动后生成 MemoryRecord、Chunk 或其他派生工件。它不是单个
      MemoryRecord 的语义身份，不是 MemoryItem 的 namespace-plus-key 表示，不是 MemoryNamespace 或 MemoryStore，
      不是 EmbeddingVector 或 VectorIndex，也不是消息历史或已排序、裁剪并呈现给模型的 Context Assembly。相同路径
      的新字节或新版本必须被视为不同的文件版本。
    en: >-
      A MemoryFile is a file artifact identified by canonical_locator, content_digest, media_type, and optional
      version_ref. Its bytes can store agent memory or serve as an ingestion source that produces a MemoryRecord,
      Chunk, or other derived artifact only after an explicit read or ingestion activity. It is not the semantic identity
      of one MemoryRecord, the namespace-plus-key representation of a MemoryItem, a MemoryNamespace or MemoryStore, an
      EmbeddingVector or VectorIndex, message history, or a Context Assembly that has already been ordered, trimmed,
      and presented to a model. New bytes or a new version at the same path must be treated as a distinct file version.
    ja: >-
      MemoryFile は canonical_locator、content_digest、media_type、任意の version_ref により識別される file artifact
      です。その bytes は agent memory を保存でき、又は明示的な read / ingestion activity の後にのみ MemoryRecord、
      Chunk、その他の derived artifact を生成する ingestion source になれます。一つの MemoryRecord の semantic
      identity、MemoryItem の namespace-plus-key representation、MemoryNamespace や MemoryStore、EmbeddingVector や
      VectorIndex、message history、既に順序付け、切り詰め、model に渡した Context Assembly ではありません。同じ path
      でも新しい bytes 又は version は別の file version として扱わなければなりません。
  why_needed:
    zh: >-
      代理可以维护可由开发者直接查看和版本管理的记忆文件，但必须保留具体文件版本的来源和完整性。显式文件工件可避免
      把文件路径、摄取后的记录、拆分后的片段和最终提示词错误地合并为同一个对象。
    en: >-
      Agents can maintain memory files that developers inspect and version directly, but provenance and integrity must
      remain attached to a specific file version. An explicit file artifact prevents a file path, its ingested record,
      its split fragments, and a final prompt from being incorrectly collapsed into one object.
    ja: >-
      agent は developer が直接 inspect と version 管理できる memory file を維持できるが、provenance と integrity は
      特定の file version に結び付いたままでなければならない。明示的な file artifact は file path、ingested record、
      split fragment、最終 prompt を誤って一つの object にまとめることを防ぐ。
  includes:
    - zh: 一个 Markdown 或 YAML 文件版本，其文件定位符、字节摘要和媒体类型都已记录，并由代理读取以获取项目记忆。
      en: A Markdown or YAML file version with recorded file locator, byte digest, and media type that an agent reads for project memory.
      ja: file locator、byte digest、media type が記録され、agent が project memory のために読む Markdown 又は YAML file version。
  excludes:
    - zh: 仅有文件名的目录条目、Store 键值项目、抽象记录、内容片段或向量、查询候选，以及已经呈现给模型的上下文。
      en: A directory entry with only a file name, a Store key-value item, an abstract record, a content fragment or vector, a query candidate, or context already presented to a model.
      ja: file name だけを持つ directory entry、Store key-value item、抽象 record、content fragment 又は vector、query candidate、既に model に提示された context。
  semantic_kind: entity
  aliases: [file-backed memory artifact, memory source file]
engineering:
  explanation:
    zh: >-
      文件读取先固定定位符和字节摘要，再把该版本交给摄取或解析活动。若文件在同一路径被编辑，新的摘要或 version_ref
      会产生新的 MemoryFile 身份；下游记录、Chunk 和 Context Assembly 必须通过显式来源链引用对应版本，而不能只用路径。
    en: >-
      File reading fixes the locator and byte digest before passing that version to ingestion or parsing. If a file is
      edited at the same path, a new digest or version_ref creates a new MemoryFile identity. Downstream records, Chunks,
      and Context Assembly must refer to the version through an explicit provenance chain rather than the path alone.
    ja: >-
      file read は、その version を ingestion 又は parsing に渡す前に locator と byte digest を固定します。同じ path の
      file が編集された場合、新しい digest 又は version_ref は新しい MemoryFile identity を作ります。downstream の
      record、Chunk、Context Assembly は path だけでなく明示的な provenance chain によりその version を参照します。
  typical_input:
    - description: Register an exact memory-file version before ingestion
      format: |
        file_artifact = {
          "canonical_locator": "file:///workspace/.agent/project-memory.md",
          "content_digest": "sha256:8f01d2",
          "media_type": "text/markdown",
          "version_ref": "git:3a1c9ef"
        }
        ingest(file_artifact)
  typical_output:
    - description: File version and downstream provenance
      format: |
        {
          "memory_file_id": "memory-file-project-notes-v7",
          "content_digest": "sha256:8f01d2",
          "derived_record_ref": "record-project-notes-v7",
          "derived_by": "ingestion-run-44"
        }
  reference_implementations:
    - name: Anthropic Claude 4 memory files announcement
      url: https://www.anthropic.com/news/claude-4
      description: Describes agents with local file access creating and maintaining memory files.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities and derivation relationships used to preserve source-version provenance.
structure:
  identity_keys: [memory_entity_id, canonical_locator, content_digest]
  fields:
    - id: memory_entity_id
      labels:
        zh: 记忆实体标识
        en: Memory entity ID
        ja: 記憶エンティティ ID
      definitions:
        zh: 标识已登记的抽象记忆实体；对于 MemoryFile，它与定位符和摘要一起指向一个具体文件版本，而不替代文件版本身份。
        en: Identifies the registered abstract memory entity; for a MemoryFile, it accompanies the locator and digest for one concrete file version and does not replace version identity.
        ja: 登録済みの抽象記憶エンティティを識別します。MemoryFile では locator と digest を補い、一つの具体的な file version を指しますが、version identity を置き換えません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-entity-project-memory-v1
      source_claims: [claim-memory-file-specialization, claim-memory-file-version-identity]
    - id: representation_kind
      labels:
        zh: 表示类别
        en: Representation kind
        ja: 表現種別
      definitions:
        zh: 继承自 MemoryEntity 的表示类别；MemoryFile 将该值收窄为 file-artifact，而不是 Store 项、语义记录或墓碑。
        en: The representation category inherited from MemoryEntity; MemoryFile narrows it to file-artifact rather than a Store item, semantic record, or tombstone.
        ja: MemoryEntity から継承する表現カテゴリです。MemoryFile は Store item、semantic record、tombstone ではなく file-artifact に限定します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [file-artifact]
      pattern: null
      example_value: file-artifact
      source_claims: [claim-memory-file-specialization]
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: Provenance reference
        ja: 来歴参照
      definitions:
        zh: 可选地引用文件的登记、读取或来源证据；它不充当定位符、内容摘要或检索分数。
        en: Optionally references registration, read, or source evidence for the file; it is not a locator, content digest, or retrieval score.
        ja: file の登録、read、source の証拠を任意で参照します。locator、content digest、retrieval score ではありません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: ingestion-run-44
      source_claims: [claim-memory-file-specialization, claim-memory-file-representation-boundary]
    - id: canonical_locator
      labels:
        zh: 规范文件定位符
        en: canonical file locator
        ja: 正規 file locator
      definitions:
        zh: 可解析到该文件工件的稳定定位符，如规范化文件 URI 或版本库路径；它不是仅供显示的文件名。
        en: A stable locator that resolves to the file artifact, such as a normalized file URI or repository path; it is not merely a display file name.
        ja: normalized file URI や repository path など file artifact に解決できる安定した locator。表示用 file name だけではない。
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: file:///workspace/.agent/project-memory.md
      source_claims: [claim-memory-file-version-identity]
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      definitions:
        zh: 对该文件版本的确切字节计算的稳定摘要，用于区分同一路径上的不同内容。
        en: A stable digest computed from the exact bytes of this file version, used to distinguish different content at the same path.
        ja: この file version の正確な bytes から計算され、同じ path の異なる content を区別する stable digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: sha256:8f01d2
      source_claims: [claim-memory-file-version-identity]
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      definitions:
        zh: 声明该版本字节的媒体类型，以便选择适当读取或解析器；它不是内容语义类别。
        en: Declares the media type of this version's bytes so an appropriate reader or parser can be selected; it is not a content semantic category.
        ja: 適切な reader 又は parser を選べるよう、この version の bytes の media type を宣言する。content semantic category ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims: [claim-memory-file-artifact]
    - id: version_ref
      labels:
        zh: 文件版本引用
        en: file version reference
        ja: file version 参照
      definitions:
        zh: 可选的版本控制提交、对象版本或不可变生成引用，用于补充定位符和摘要；它不能替代摘要。
        en: An optional version-control commit, object version, or immutable generation reference that complements the locator and digest; it cannot replace the digest.
        ja: locator と digest を補う任意の version-control commit、object version、immutable generation reference。digest の代わりにはならない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: git:3a1c9ef
      source_claims: [claim-memory-file-version-identity]
    - id: byte_length
      labels:
        zh: 字节长度
        en: byte length
        ja: byte 長
      definitions:
        zh: 可选记录该确切文件版本的字节数，用于读取审计或完整性诊断，而不是模型令牌预算。
        en: Optionally records the byte count of this exact file version for read auditing or integrity diagnostics, not a model token budget.
        ja: read audit 又は integrity diagnostic のためにこの正確な file version の byte count を任意に記録する。model token budget ではない。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: 1842
      source_claims: [claim-memory-file-artifact]
  constraints:
    - id: memory-file-version-identity
      severity: error
      expression_language: plain
      expression: canonical_locator, content_digest, and media_type are required. content_digest must be computed from the exact bytes accessible through canonical_locator. A changed digest at the same locator denotes a different MemoryFile version; version_ref may corroborate but cannot replace the digest.
      explanation:
        zh: 仅有路径无法稳定识别文件内容；摘要将可变定位符绑定到可校验的字节版本。
        en: A path alone cannot stably identify file content; the digest binds a mutable locator to verifiable versioned bytes.
        ja: path だけでは file content を安定して識別できない。digest は可変 locator を verify 可能な versioned bytes に結び付ける。
      source_claims: [claim-memory-file-version-identity]
    - id: memory-file-representation-boundary
      severity: error
      expression_language: plain
      expression: MemoryFile represents a versioned file artifact only. It must not be classified as a MemoryItem, MemoryRecord, Chunk, EmbeddingVector, VectorIndex, checkpoint, message history, or Context Assembly solely because the same text or facts occur there. Such a relationship requires explicit read, ingestion, derivation, or assembly evidence.
      explanation:
        zh: 内容重叠不能抹去文件工件与存储表示、语义记录、片段、向量、历史和模型上下文之间的独立来源边界。
        en: Content overlap cannot erase the independent provenance boundary between a file artifact and a storage representation, semantic record, fragment, vector, history, or model context.
        ja: content overlap は file artifact と storage representation、semantic record、fragment、vector、history、model context の独立した provenance boundary を消去できない。
      source_claims: [claim-memory-file-representation-boundary]
  required_relations: []
examples:
  - id: memory-file-positive-example

    labels:
      zh: 可校验项目记忆文件
      en: Verifiable project-memory file
      ja: verify 可能な project-memory file

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values: {memory_entity_id: memory-entity-project-memory-v1, representation_kind: file-artifact, provenance_ref: ingestion-run-44, canonical_locator: file:///workspace/.agent/project-memory.md, content_digest: sha256:8f01d2, media_type: text/markdown, version_ref: git:3a1c9ef, byte_length: 1842}
    related_node_ids: [MemoryFile, IngestionRun, MemoryEntity]
    related_relation_ids: [MemoryFile-is_a-MemoryEntity]

    source_claims: [claim-memory-file-artifact, claim-memory-file-version-identity]
  - id: memory-file-boundary-example

    labels:
      zh: 同一路径的新版本
      en: New version at the same path
      ja: 同じ path の新 version

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values: {memory_entity_id: memory-entity-project-memory-v2, representation_kind: file-artifact, provenance_ref: ingestion-run-45, canonical_locator: file:///workspace/.agent/project-memory.md, content_digest: sha256:91cc77, media_type: text/markdown, version_ref: git:4b2d0af}
    related_node_ids: [MemoryFile, MemoryRecord, IngestionRun]
    related_relation_ids: []

    source_claims: [claim-memory-file-version-identity]
  - id: memory-file-counterexample-example

    labels:
      zh: Store 项目不是文件工件
      en: Store item is not a file artifact
      ja: Store item は file artifact ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values: {memory_entity_id: memory-entity-preferences-v3, representation_kind: store-item, provenance_ref: store-write-29, memory_store_ref: memory-store-primary, namespace_path: '["users","u-123","profile"]', item_key: preferences, value_media_type: application/json}
    related_node_ids: [MemoryFile, MemoryItem, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-memory-file-representation-boundary]
  - id: memory-file-instance-example

    labels:
      zh: 实例：政策源文件
      en: "Instance: policy source file"
      ja: "事例: policy source file"

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values: {memory_entity_id: memory-entity-policy-p-88-v4, representation_kind: file-artifact, provenance_ref: parser-run-77, canonical_locator: file:///projects/p-88/memory/policy.md, content_digest: sha256:53b1a9, media_type: text/markdown, version_ref: git:ee4012a, byte_length: 9021}
    related_node_ids: [MemoryFile, MemoryRecord, Chunk, ChunkingRun]
    related_relation_ids: [MemoryFile-is_a-MemoryEntity]

    source_claims: [claim-memory-file-artifact, claim-memory-file-version-identity]
parent_relation:
  id: MemoryFile-is_a-MemoryEntity
  predicate: is_a
  target: concept:MemoryEntity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是作为文件工件的记忆实体
    en: is a memory entity with a file-artifact representation
    ja: file-artifact 表現を持つ記憶エンティティである
  definitions:
    zh: MemoryFile 是具有可定位、可校验文件版本的 MemoryEntity 子类，而不是所有记忆实体或所有文件的同义词。
    en: MemoryFile is a subtype of MemoryEntity with a locatable, verifiable file version, not a synonym for every memory entity or every file.
    ja: MemoryFile は locate と verify が可能な file version を持つ MemoryEntity の下位型であり、すべての memory entity 又はすべての file の同義語ではない。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有文件工件子类
      en: has file-artifact subtype
      ja: file-artifact 下位型を持つ
  conditions:
    - id: memory-file-is-a-memory-entity-condition
      severity: error
      expression_language: plain
      expression: Assert is_a only when the MemoryEntity has canonical_locator, content_digest, and media_type for one accessible file version. A Store item, bare record, chunk, vector, query candidate, or prompt context without those file-version facts is not a MemoryFile subtype.
      explanation:
        zh: 文件工件子类要求可定位和可校验的字节版本，而不只是相同内容或可读取文本。
        en: The file-artifact subtype requires a locatable and verifiable byte version, not merely matching content or readable text.
        ja: file-artifact 下位型には locate と verify が可能な byte version が必要であり、単に一致する content や読める text だけでは足りない。
      source_claims: [claim-memory-file-specialization]
  temporal_scope: timeless
  boundary_context: An input file becomes a record, chunk, vector, or model context only through separately evidenced ingestion, processing, indexing, retrieval, or assembly activities.
  constraints: []
  examples: []
  source_claims: [claim-memory-file-specialization]
  distinct_fact_rationale: This subtype captures a versioned file representation, while MemoryRecord captures durable memory semantics and downstream processing captures derived content artifacts.
  layout_role: primary-backbone
relations: []
sources:
  - id: anthropic-claude-4-memory-files
    title: Introducing Claude 4
    url: https://www.anthropic.com/news/claude-4
    type: official-doc
    source_type: official-doc
    relevance: Describes agents with local file access creating and maintaining memory files for long-running work.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities and derivation concepts used to trace a file version to artifacts produced from it.
source_claims:
  - id: claim-memory-file-artifact
    source: anthropic-claude-4-memory-files
    supports: Anthropic describes agents with local file access creating and maintaining memory files. Moonweave models each such usable file as a separately addressable file artifact rather than treating its text as already ingested memory or prompt context.
    locator: "Claude 4 announcement: local file access and memory files"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-file-version-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes entities and their derivations. Moonweave uses a canonical locator plus exact-byte digest, with optional version reference, to identify an auditable file version and distinguish changed content at one path.
    locator: "PROV-O: Entity and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-file-representation-boundary
    source: w3c-prov-o
    supports: PROV-O allows separately identified source and derived entities. Moonweave therefore keeps a file artifact distinct from Store items, records, chunks, vectors, history, and Context Assembly unless explicit read, derivation, or assembly evidence relates them.
    locator: "PROV-O: Entity, Activity, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-file-specialization
    source: anthropic-claude-4-memory-files
    supports: Modeling an agent-maintained memory file with locator and byte-version facts as a MemoryEntity subtype is a Moonweave design inference; the source does not define a universal file-memory ontology.
    locator: "Claude 4 announcement: agents maintaining memory files"
    evidence_kind: ontology-design-inference
    confidence: medium
