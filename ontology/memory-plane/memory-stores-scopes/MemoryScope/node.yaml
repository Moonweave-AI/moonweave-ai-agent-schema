schema: moonweave.ai/ontology-node/v1
id: MemoryScope
kind: concept
status: accepted
labels:
  zh: 记忆作用域
  en: Memory Scope
  ja: 記憶スコープ
semantics:
  short_definition:
    zh: 声明某条记忆记录适用于哪个全局、租户、用户、会话或线程主体的逻辑边界。
    en: A declared logical boundary that states which global, tenant, user, session, or thread subject a memory record may apply to.
    ja: 記憶レコードが適用できる global、tenant、user、session、thread の主体を宣言する論理的な境界。
  definition:
    zh: >-
      MemoryScope 是由 scope_id、scope_kind 和可选的 scope_subject_ref 标识的可审计适用性声明。它把一条
      MemoryRecord 绑定到全局，或绑定到一个具体 tenant、user、session 或 thread，从而使检索、复用或模型输入
      组装前能够判断该记录是否落在当前请求的逻辑边界内。它不是 MemoryStore 的部署设施，不是 MemoryNamespace
      的寻址路径，不是短期消息历史或 checkpoint，也不是已经呈现给模型的 Context Assembly。它同样不独自授予
      读取、写入或跨边界共享权限；身份认证与授权仍须由独立的访问控制机制判定。
    en: >-
      A MemoryScope is an auditable applicability declaration identified by scope_id, scope_kind, and an optional
      scope_subject_ref. It binds a MemoryRecord either globally or to one concrete tenant, user, session, or thread,
      so retrieval, reuse, or model-input assembly can determine whether the record falls within a request's logical
      boundary. It is not a deployed MemoryStore, a MemoryNamespace addressing path, short-term message history or a
      checkpoint, nor a Context Assembly already shown to a model. It also does not independently grant read, write,
      or cross-boundary sharing permission; authentication and authorization remain separate access-control decisions.
    ja: >-
      MemoryScope は scope_id、scope_kind、任意の scope_subject_ref で識別される監査可能な適用性宣言です。
      MemoryRecord を global、または一つの具体的な tenant、user、session、thread に結び付け、検索、再利用、
      model-input assembly の前に record が要求の論理的境界に入るかを判定できるようにします。配備された
      MemoryStore、MemoryNamespace の addressing path、短期 message history や checkpoint、モデルに既に渡した
      Context Assembly ではありません。また read、write、境界横断共有の権限を単独で与えず、authentication と
      authorization は別の access-control decision として扱います。
  why_needed:
    zh: >-
      记录的存储位置、生命周期和提示词位置都不能说明它能为谁使用。显式作用域可阻止用户或线程之间的错误复用，
      同时避免把 namespace 前缀或 checkpoint 身份误当作访问授权。
    en: >-
      A record's storage location, lifecycle, and prompt position cannot say who may use it. An explicit scope blocks
      accidental reuse across users or threads while preventing namespace prefixes and checkpoint identities from being
      mistaken for access grants.
    ja: >-
      record の保存場所、lifecycle、prompt 内の位置だけでは誰が利用できるかを表せません。明示的な scope は
      user や thread をまたぐ誤った再利用を防ぎ、namespace prefix や checkpoint identity を access grant と
      誤認しないようにします。
  includes:
    - zh: 绑定到 user:u-123 的用户作用域、绑定到 thread:t-401 的线程作用域，以及没有主体引用的全局作用域声明。
      en: A user scope bound to user:u-123, a thread scope bound to thread:t-401, and a global scope declaration with no subject reference.
      ja: user:u-123 に結び付く user scope、thread:t-401 に結び付く thread scope、subject reference を持たない global scope 宣言。
  excludes:
    - zh: 存储 namespace 路径、单个记录值、消息历史或 checkpoint、访问令牌或 ACL，以及已排序裁剪的模型输入上下文。
      en: A store namespace path, one record value, message history or a checkpoint, an access token or ACL, or already ordered and trimmed model-input context.
      ja: store namespace path、一つの record value、message history や checkpoint、access token や ACL、並べ替えと切り詰め済みの model-input context。
  semantic_kind: policy
  aliases: [memory applicability scope, memory visibility boundary]
engineering:
  explanation:
    zh: >-
      在读取或将记录送入 Context Assembly 前，运行时以当前请求的 tenant、user、session 或 thread 身份比对
      scope_kind 与 scope_subject_ref。LangGraph 使用 thread_id 为短期 checkpoint 隔离状态，而其跨对话 Store
      使用 namespace 和 key 寻址；Moonweave 将“谁可以适用”建模为独立作用域事实，不能由这两种技术标识直接推断。
    en: >-
      Before reading a record or sending it to Context Assembly, runtime compares scope_kind and scope_subject_ref with
      the request's tenant, user, session, or thread identity. LangGraph isolates short-term checkpoint state by
      thread_id and addresses cross-conversation Store items by namespace and key; Moonweave models who may apply a
      record as a separate scope fact rather than inferring it from either technical identifier.
    ja: >-
      record を読む前、または Context Assembly に送る前に、runtime は scope_kind と scope_subject_ref を request の
      tenant、user、session、thread identity と照合します。LangGraph は短期 checkpoint state を thread_id で分離し、
      会話をまたぐ Store item を namespace と key で address します。Moonweave は record を誰に適用できるかを、
      どちらの technical identifier からも推論せず独立した scope fact として扱います。
  typical_input:
    - description: Scope eligibility check before retrieval reuse
      format: |
        scope = {
          "scope_id": "scope-user-u-123",
          "scope_kind": "user",
          "scope_subject_ref": "user:u-123"
        }
        record = {"memory_record_id": "pref-u-123", "scope_ref": "scope-user-u-123"}
        request = {"principal_ref": "user:u-123", "thread_id": "thread-88"}
  typical_output:
    - description: Applicability result, not an authorization decision
      format: |
        {
          "record_id": "pref-u-123",
          "scope_match": true,
          "reason": "request principal matches scope_subject_ref",
          "authorization_decision": "external"
        }
  reference_implementations:
    - name: LangGraph memory and Store namespaces
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents thread-scoped short-term memory and namespace-addressed Store operations for long-term memory.
    - name: LangGraph persistence
      url: https://docs.langchain.com/oss/python/langgraph/persistence
      description: Documents checkpoint persistence and the thread identifier used to isolate state.
structure:
  identity_keys: [scope_id]
  fields:
    - id: scope_id
      labels:
        zh: 作用域标识
        en: scope ID
        ja: スコープ ID
      definitions:
        zh: 稳定标识一个可被记录引用和审计的作用域声明。
        en: Stably identifies one scope declaration that records can reference and audits can inspect.
        ja: record が参照でき、audit が検査できる一つの scope 宣言を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: scope-user-u-123
      source_claims: [claim-memory-scope-record-binding]
    - id: scope_kind
      labels:
        zh: 作用域类别
        en: scope kind
        ja: スコープ種別
      definitions:
        zh: 声明边界适用于 global、tenant、user、session 或 thread 的哪一种主体层级。
        en: Declares whether the boundary applies at the global, tenant, user, session, or thread subject level.
        ja: 境界が global、tenant、user、session、thread のどの主体レベルに適用されるかを宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [global, tenant, user, session, thread]
      pattern: null
      example_value: user
      source_claims: [claim-memory-scope-levels]
    - id: scope_subject_ref
      labels:
        zh: 作用域主体引用
        en: scope subject reference
        ja: スコープ主体参照
      definitions:
        zh: 对非全局作用域，引用边界所绑定的一个具体 tenant、user、session 或 thread；全局作用域必须省略该值。
        en: For a non-global scope, references the one concrete tenant, user, session, or thread bound by the boundary; a global scope must omit it.
        ja: non-global scope では境界に結び付く一つの具体的な tenant、user、session、thread を参照し、global scope では省略しなければならない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: user:u-123
      source_claims: [claim-memory-scope-subject-binding]
  constraints:
    - id: memory-scope-subject-binding
      severity: error
      expression_language: plain
      expression: scope_id and scope_kind are required. scope_kind=global requires scope_subject_ref to be absent. Each non-global scope requires exactly one scope_subject_ref whose subject type matches scope_kind; values such as user:u-123 and thread:t-401 identify the bound subject rather than a storage path.
      explanation:
        zh: 作用域必须有稳定身份和清晰的主体边界；全局作用域没有具体主体，而非全局作用域不能因缺少主体而扩展为不受限访问。
        en: A scope needs stable identity and an unambiguous subject boundary. Global has no concrete subject, while a non-global scope cannot expand into unrestricted use because its subject is missing.
        ja: scope には安定した identity と曖昧でない subject boundary が必要である。global には具体的 subject がなく、non-global scope は subject の欠落によって無制限利用へ拡張してはならない。
      source_claims: [claim-memory-scope-subject-binding]
    - id: memory-scope-role-boundary
      severity: error
      expression_language: plain
      expression: MemoryScope expresses record applicability only. It must not be used as a MemoryNamespace path, a checkpoint or message-history identity, a stored record payload, a Context Assembly, or an authorization grant. Authorization must be evaluated independently after scope matching.
      explanation:
        zh: 存储寻址、短期状态、持久记录、模型上下文与访问授权都可与作用域相关，但它们是可独立审计和变化的不同事实。
        en: Store addressing, short-term state, persistent records, model context, and access authorization can relate to a scope but remain different facts that can change and be audited independently.
        ja: store addressing、短期 state、persistent record、model context、access authorization は scope と関係し得るが、独立して変化し audit できる別の fact である。
      source_claims: [claim-memory-scope-role-boundary]
  required_relations: []
examples:
  - id: memory-scope-positive-example

    labels:
      zh: 用户作用域匹配
      en: User-scope match
      ja: user scope の一致

    descriptions:
      zh: Generative Agents agent-scoped Memory Stream；MemGPT per-user archival/recall 分区；Pinecone namespace + metadata filter 限定检索域。
      en: Generative Agents agent-scoped Memory Stream; MemGPT per-user archival/recall partition; Pinecone namespace + metadata filter bounds retrieval domain.
      ja: Generative Agents agent-scoped Memory Stream。MemGPT per-user 分区。Pinecone namespace+metadata filter。
    field_values: {scope_id: scope-user-u-123, scope_kind: user, scope_subject_ref: user:u-123}
    related_node_ids: [MemoryScope, MemoryRecord, MemoryNamespace]
    related_relation_ids: [MemoryScope-bounds-MemoryRecord]

    source_claims: [claim-memory-scope-subject-binding, claim-memory-scope-record-binding]
  - id: MemoryScope-boundary-mem0-agent-filter

    labels:
      zh: 同名事件但不同用户主体
      en: Same event name, different user subject
      ja: 同じ event name だが異なる user subject

    descriptions:
      zh: MemoryScope 逻辑分区 vs MemoryNamespace 物理寻址；Weaviate tenant vs collection 层级。
      en: MemoryScope logical partition vs MemoryNamespace physical addressing; Weaviate tenant vs collection hierarchy.
      ja: MemoryScope 論理分区 vs MemoryNamespace 物理 addressing。
    field_values: {scope_id: scope-user-u-123, scope_kind: user, scope_subject_ref: user:u-123}
    related_node_ids: [MemoryScope, MemoryRecord, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-memory-scope-subject-binding]
  - id: MemoryScope-counterexample-langgraph-namespace

    labels:
      zh: 命名空间路径不是作用域
      en: Namespace path is not a scope
      ja: namespace path は scope ではない

    descriptions:
      zh: 反例：跨 tenant 检索无 scope_id 约束，违反 multi-tenancy 隔离。
      en: Counterexample: cross-tenant retrieval without scope_id constraint, violating multi-tenancy isolation.
      ja: 反例：scope_id なし cross-tenant 検索。
    field_values: {memory_store_ref: memory-store-primary, namespace_path: '["users","u-123","profile"]'}
    related_node_ids: [MemoryScope, MemoryNamespace, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-memory-scope-role-boundary]
  - id: MemoryScope-instance-langgraph-thread

    labels:
      zh: 实例：线程专属工作记录
      en: "Instance: thread-specific working record"
      ja: "事例: thread 固有の作業 record"

    descriptions:
      zh: Qdrant Filter(must=[FieldCondition(key="user_id", match=MatchValue(value="u-42"))]) 限定 scope-memory-042。
      en: Qdrant Filter(must=[FieldCondition(key="user_id", match=MatchValue(value="u-42"))]) bounds scope-memory-042.
      ja: Qdrant Filter(user_id="u-42") が scope-memory-042 を限定。
    field_values: {scope_id: scope-thread-t-401, scope_kind: thread, scope_subject_ref: thread:t-401}
    related_node_ids: [MemoryScope, MemoryRecord, ContextAssembly]
    related_relation_ids: [MemoryScope-bounds-MemoryRecord]

    source_claims: [claim-memory-scope-thread-isolation, claim-memory-scope-role-boundary]
parent_relation: null
relations:
  - id: MemoryScope-bounds-MemoryRecord
    predicate: bounds
    target: concept:MemoryRecord
    endpoint_order: child-to-parent
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 限定记忆记录的适用边界
      en: bounds applicability of memory record
      ja: memory record の適用境界を限定する
    definitions:
      zh: 一个 MemoryScope 仅在记录的 scope_ref 等于该 scope_id 且主体边界一致时，限定该 MemoryRecord 的逻辑适用性。
      en: A MemoryScope bounds a MemoryRecord's logical applicability only when the record's scope_ref equals this scope_id and the subject boundary matches.
      ja: MemoryScope は record の scope_ref がこの scope_id と一致し subject boundary も一致する場合にのみ、MemoryRecord の論理的 applicability を限定する。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: bounded_by
      labels:
        zh: 被作用域限定
        en: bounded by scope
        ja: scope により限定される
    conditions:
      - id: memory-scope-bounds-record-condition
        severity: error
        expression_language: plain
        expression: Assert only when record.scope_ref equals scope.scope_id and scope_kind with scope_subject_ref satisfies the record's declared applicability boundary. Namespace co-location, matching query text, or shared checkpoint thread_id alone never proves this relation.
        explanation:
          zh: 绑定必须由记录中的明确 scope_ref 和作用域主体事实证明；共用路径、查询文本或 thread_id 只能提供候选关联。
          en: Binding requires the record's explicit scope_ref and scope subject facts; a shared path, query text, or thread_id provides only a candidate association.
          ja: binding には record の明示的な scope_ref と scope subject fact が必要である。共有 path、query text、thread_id は candidate association にすぎない。
        source_claims: [claim-memory-scope-record-binding]
    temporal_scope: valid-time
    boundary_context: A MemoryNamespace path, a checkpoint thread_id, or a similar retrieval query does not establish record applicability without an explicit scope binding.
    constraints: []
    examples: []
    source_claims: [claim-memory-scope-record-binding]
    distinct_fact_rationale: This relation records the applicability boundary of a persistent record, not where it is stored, whether it was retrieved, or whether it was placed in a model prompt.
    layout_role: primary-backbone
sources:
  - id: langgraph-memory
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents thread-scoped short-term memory and Store namespace operations for long-term memory.
  - id: langgraph-persistence
    title: LangGraph Persistence
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    type: official-doc
    source_type: official-doc
    relevance: Documents checkpoint persistence keyed by thread_id.
source_claims:
  - id: claim-memory-scope-thread-isolation
    source: langgraph-persistence
    supports: LangGraph persists checkpoint state by thread identifier, establishing a real short-term state-isolation boundary. Moonweave uses this as evidence for a thread scope but does not equate the scope declaration with checkpoint history.
    locator: "Persistence guide: Threads and checkpoints"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-scope-levels
    source: langgraph-memory
    supports: LangGraph distinguishes short-term thread memory from long-term Store memory addressed by application-defined namespaces. Moonweave generalizes application applicability into global, tenant, user, session, and thread scope kinds rather than treating namespace syntax as authorization.
    locator: "Memory guide: short-term memory and long-term memory"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-scope-subject-binding
    source: langgraph-memory
    supports: The documented separation of thread identity and Store namespace addressing supports modeling a stable explicit subject binding for a non-global applicability boundary. The allowed values and subject-reference syntax are Moonweave design choices.
    locator: "Memory guide: Manage short-term memory and Store namespace examples"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-scope-role-boundary
    source: langgraph-memory
    supports: LangGraph presents checkpointed thread state and Store items as distinct mechanisms. Moonweave additionally keeps scope, authorization, record payload, and Context Assembly separate so neither a storage path nor a checkpoint identity becomes a permission or prompt payload by implication.
    locator: "Memory guide: short-term memory, long-term Store, and context management"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-scope-record-binding
    source: langgraph-memory
    supports: Long-term Store operations address explicit items, while thread persistence addresses state by thread. Modeling a record-to-scope binding through record.scope_ref is a Moonweave design inference that makes applicability independently auditable from storage and checkpoint identity.
    locator: "Memory guide: Store put/get/search and short-term memory"
    evidence_kind: ontology-design-inference
    confidence: medium
