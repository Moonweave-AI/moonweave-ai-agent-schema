schema: moonweave.ai/ontology-node/v1
id: VectorDatabase
kind: concept
status: review
labels:
  zh: 向量数据库
  en: Vector database
  ja: ベクトルデータベース
semantics:
  short_definition:
    zh: 托管向量索引、集合与查询服务的 MemoryStore。
    en: A MemoryStore hosting vector indexes, collections, and query service.
    ja: vector index・collection・query serviceをhostする MemoryStore です。
  definition:
    zh: VectorDatabase 是提供持久化、索引管理和向量检索接口的 MemoryStore 服务实例，可托管多个 VectorIndex；它不是某个索引、向量或索引版本。
    en: VectorDatabase is a MemoryStore service instance providing persistence, index management, and vector-retrieval interfaces and may host multiple VectorIndex values; it is not one index, vector, or index version.
    ja: VectorDatabase は永続化・index管理・vector検索interfaceを提供し複数 VectorIndex をhostできる MemoryStore service instanceで、単一index・vector・index版ではありません。
  why_needed:
    zh: 区分存储服务、逻辑索引和索引快照。
    en: Separates storage service, logical index, and index snapshot.
    ja: 保存service・logical index・index snapshotを分離します。
  includes:
    - zh: 纳入有稳定服务/集群身份与 endpoint 的向量存储实例。
      en: Includes vector-store instances with stable service or cluster identity and endpoint.
      ja: 安定service/cluster同一性とendpointを持つvector-store instanceを含みます。
  excludes:
    - zh: 排除 VectorIndex、IndexVersion 和单个 Point。
      en: Excludes VectorIndex, IndexVersion, and an individual point.
      ja: VectorIndex・IndexVersion・個別pointを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - database_id
  fields:
    - id: database_id
      labels:
        zh: 数据库标识
        en: database ID
        ja: database ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识服务或集群。
        en: Stable identifier for the service or cluster.
        ja: serviceまたはclusterの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: vectordb-prod
      source_claims:
        - claim-vector-database-002
    - id: endpoint
      labels:
        zh: 访问端点
        en: endpoint
        ja: endpoint
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录管理与查询访问位置。
        en: Records the management and query access location.
        ja: 管理・query access locationを記録します。
      allowed_values: []
      pattern: null
      example_value: https://vector.internal
      source_claims:
        - claim-vector-database-003
    - id: engine_version
      labels:
        zh: 引擎版本
        en: engine version
        ja: engine版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定存储引擎行为版本。
        en: Fixes the storage-engine behavior version.
        ja: storage-engine挙動版を固定します。
      allowed_values: []
      pattern: null
      example_value: qdrant-2026.06
      source_claims:
        - claim-vector-database-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: VectorDatabase-example-positive-manual-001
    kind: positive
    labels:
      zh: 向量数据库正例
      en: "Positive case: Vector database"
      ja: ベクトルデータベース正例
    scenario_id: null
    descriptions:
      zh: vectordb-prod 以稳定数据库 ID、服务端点和命名空间持久化向量条目，并托管 customer-memory 与 docs 两个 VectorIndex。
      en: Vectordb-prod persistently stores vector entries under a stable database ID, endpoint, and namespaces and hosts customer-memory and docs VectorIndexes.
      ja: vectordb-prod は安定 DB ID、提供端点、namespace の下で vector entry を永続化し、customer-memory と docs の VectorIndex を托管します。
    field_values:
      database_id: vectordb-prod
      endpoint: https://vector.internal
      engine_version: qdrant-2026.06
      deployment_scope: remote
      memory_store_id: memory-store-vectordb-prod
    related_node_ids:
      - VectorDatabase
    related_relation_ids: []
    expected_result:
      zh: 创建 VectorDatabase 与 MemoryStore 身份，并用 hosts 连接两个索引。
      en: Create VectorDatabase and MemoryStore identities and connect both indexes with hosts.
      ja: VectorDatabase と MemoryStore 同一性を作成し、二索引を hosts で結びます。
    why_valid_or_invalid:
      zh: 它拥有数据库级持久化、管理和查询边界，而索引是其中被托管的逻辑结构。
      en: It owns database-level persistence, management, and query boundaries, while indexes are hosted logical structures.
      ja: DB レベルの永続化、管理、問合せ境界を所有し、索引は托管論理構造です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-database-005
  - id: VectorDatabase-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 向量数据库边界例
      en: "Boundary case: Vector database"
      ja: ベクトルデータベース境界例
    scenario_id: null
    descriptions:
      zh: vector-index-17 只声明 1536 维、cosine 距离和分片策略，部署位置由 vectordb-prod 另行决定。
      en: Vector-index-17 only declares dimension 1,536, cosine distance, and shard policy; vectordb-prod separately determines deployment.
      ja: vector-index-17 は次元 1536、cosine 距離、分片方針だけを宣言し、配備は vectordb-prod が別に決めます。
    field_values: {}
    related_node_ids:
      - VectorDatabase
    related_relation_ids: []
    expected_result:
      zh: 将其归为 VectorIndex，不把逻辑索引误作 VectorDatabase。
      en: Classify it as VectorIndex and do not treat the logical index as VectorDatabase.
      ja: VectorIndex と分類し、論理索引を VectorDatabase と誤認しません。
    why_valid_or_invalid:
      zh: 索引配置没有数据库级端点、命名空间管理或多索引托管身份。
      en: An index configuration lacks database-level endpoint, namespace management, and multi-index hosting identity.
      ja: 索引設定は DB レベル端点、namespace 管理、多索引托管同一性を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-database-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: VectorDatabase-is_a-MemoryStore
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: VectorDatabase —is_a→ MemoryStore 表示该服务满足持久记忆存储身份，并以向量索引/检索作为专门种差。
    en: VectorDatabase —is_a→ MemoryStore means that the service satisfies persistent memory-store identity with vector indexing and retrieval as its specialized differentia.
    ja: VectorDatabase —is_a→ MemoryStore はserviceが永続memory-store同一性を満たしvector indexing/retrievalを専用種差とすることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: VectorDatabase-is_a-MemoryStore-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the service persists memory records and provides vector-index lifecycle management.
      explanations:
        zh: 仅当服务持久化记忆记录并提供向量索引生命周期时成立。
        en: Assert only when the service persists memory records and provides vector-index lifecycle management.
        ja: serviceがmemory recordを永続化しvector-index lifecycleを提供する時だけ成立します。
      source_claims:
        - claim-vector-database-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: VectorDatabase-is_a-MemoryStore-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: vector-db-prod 以稳定数据库身份持久化记忆表示，提供写入、删除、命名空间和相似度查询能力。
        en: Vector-db-prod persistently stores memory representations under a stable database identity and provides write, delete, namespace, and similarity-query operations.
        ja: vector-db-prod は安定 DB 同一性の下で記憶表現を永続化し、書込、削除、namespace、類似度問合せを提供します。
      field_values: {}
      related_node_ids:
        - VectorDatabase
        - MemoryStore
      related_relation_ids:
        - VectorDatabase-is_a-MemoryStore
      expected_result:
        zh: 将其分类为 VectorDatabase 和 MemoryStore。
        en: Classify it as VectorDatabase and MemoryStore.
        ja: VectorDatabase かつ MemoryStore と分類します。
      why_valid_or_invalid:
        zh: 它满足持久记忆存储的一般条件，并以向量集合与相似度访问为种差。
        en: It satisfies general persistent memory-store conditions and is distinguished by vector collections and similarity access.
        ja: 一般永続 MemoryStore 条件を満たし、ベクトル collection と類似度アクセスで区別されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-database-007
    - id: VectorDatabase-is_a-MemoryStore-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 进程内数组临时保存本轮向量，进程退出即丢失且没有数据库或命名空间身份。
        en: An in-process array temporarily holds vectors for one turn, disappears on process exit, and has no database or namespace identity.
        ja: プロセス内配列が一ターンだけベクトルを保持し、終了時に消え、DB・namespace 同一性を持ちません。
      field_values: {}
      related_node_ids:
        - VectorDatabase
        - MemoryStore
      related_relation_ids:
        - VectorDatabase-is_a-MemoryStore
      expected_result:
        zh: 可视为临时缓存，不归为 VectorDatabase。
        en: Treat it as a transient cache, not a VectorDatabase.
        ja: 一時 cache として扱い、VectorDatabase には分類しません。
      why_valid_or_invalid:
        zh: 临时容器不满足可持久、可管理的 MemoryStore 身份条件。
        en: A transient container does not satisfy the persistent, manageable MemoryStore identity conditions.
        ja: 一時 container は永続・管理可能 MemoryStore 同一性条件を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-database-007
  source_claims:
    - claim-vector-database-007
  distinct_fact_rationale:
    zh: is_a 说明 VectorDatabase 满足 MemoryStore 的持久化设施身份；hosts 说明它承载某个 VectorIndex；stores 说明 IndexEntry 持有某个 Representation。设施分类、索引承载与条目存储是三条不同事实。
    en: is_a states that VectorDatabase satisfies persistent MemoryStore facility identity; hosts states that it carries a VectorIndex; stores states that an IndexEntry holds a Representation. Facility classification, index hosting, and entry storage are distinct facts.
    ja: is_a は VectorDatabase が persistent MemoryStore facility identity を満たすこと、hosts は VectorIndex の収容、stores は IndexEntry の Representation 保持を示し、三 fact は異なります。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
