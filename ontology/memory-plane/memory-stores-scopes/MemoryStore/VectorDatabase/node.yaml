schema: moonweave.ai/ontology-node/v1
id: VectorDatabase
kind: concept
labels:
  zh: 向量数据库
  en: vector database
  ja: ベクトルデータベース
semantics:
  short_definition:
    zh: 托管向量索引、集合与相似度查询服务的 MemoryStore。
    en: A MemoryStore hosting vector indexes, collections, and similarity-query services.
    ja: vector index・collection・類似度 query service を host する MemoryStore です。
  definition:
    zh: VectorDatabase 是提供持久化、索引管理与向量检索接口的 MemoryStore 服务实例，可托管多个 VectorIndex；Pinecone index、Chroma server、Qdrant cluster 与 Weaviate instance 都是典型实现。它不是某个 index 配置、单个 vector id 或 embedding 向量本身——那些分别属于 memory-embedding-indexes 模块。Moonweave 用 database_id 与 endpoint 标识服务，用 hosts 关系连接 VectorIndex，而不把索引内部结构并入 MemoryStore 分类。
    en: VectorDatabase is a MemoryStore service instance providing persistence, index management, and vector-retrieval interfaces and may host multiple VectorIndexes. Pinecone indexes, Chroma servers, Qdrant clusters, and Weaviate instances are typical implementations. It is not an index configuration, individual vector id, or embedding vector itself—those belong to memory-embedding-indexes. Moonweave identifies services by database_id and endpoint, connects VectorIndexes via hosts, without folding index internals into MemoryStore taxonomy.
    ja: VectorDatabase は永続化・index 管理・vector 検索 interface を提供する MemoryStore service instance で複数 VectorIndex を host 可。Pinecone/Chroma/Qdrant/Weaviate が典型。index 設定・単一 vector id・embedding 自体ではなく memory-embedding-indexes 所属。database_id/endpoint で識別し hosts で VectorIndex 接続。
  why_needed:
    zh: 向量后端与逻辑索引、索引快照是三层不同事实。把 Pinecone index 配置误当作“数据库本身”，会导致部署迁移、分片策略与 entry 存储无法分开审计。
    en: Vector backends, logical indexes, and index snapshots are three distinct facts. Mistaking Pinecone index configuration for "the database itself" prevents auditing deployment migration, shard policy, and entry storage separately.
    ja: vector backend・logical index・index snapshot は三層の別 fact。Pinecone index 設定を DB 自体と誤認すると移行・shard・entry 監査が分離できない。
  includes:
    - zh: Pinecone 项目 index、自托管 Qdrant/Weaviate 集群、Chroma HttpClient 连接的服务实例，以及带稳定 database_id 与 endpoint 的向量存储部署。
      en: Pinecone project indexes, self-hosted Qdrant/Weaviate clusters, Chroma HttpClient-connected service instances, and vector-store deployments with stable database_id and endpoint.
      ja: Pinecone index、自ホスト Qdrant/Weaviate、Chroma HttpClient 接続 instance、安定 database_id/endpoint 付き vector store 配備。
  excludes:
    - zh: VectorIndex 逻辑配置、IndexVersion、单个 Point/Entry，以及进程内临时向量数组。
      en: VectorIndex logical configuration, IndexVersion, individual Point/Entry, and in-process temporary vector arrays.
      ja: VectorIndex 論理設定、IndexVersion、個別 Point/Entry、プロセス内一時 vector 配列。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Pinecone Pinecone(api_key) + Index(host) 提供 upsert/query/delete 与 namespace；Chroma HttpClient(host, port) + collection.add/query；Qdrant QdrantClient(url) + create_collection；Weaviate weaviate.connect_to_local() + collections。Moonweave VectorDatabase 记录 engine_version（如 pinecone-serverless-2024、qdrant-1.9）与 deployment_scope；VectorIndex 维度/距离/metric 归 embedding-indexes 模块，通过 VectorDatabase-hosts-VectorIndex 引用。
    en: Pinecone Pinecone(api_key) + Index(host) provides upsert/query/delete with namespaces; Chroma HttpClient(host, port) + collection.add/query; Qdrant QdrantClient(url) + create_collection; Weaviate weaviate.connect_to_local() + collections. Moonweave VectorDatabase records engine_version (e.g., pinecone-serverless-2024, qdrant-1.9) and deployment_scope; VectorIndex dimension/distance/metric belongs to embedding-indexes via VectorDatabase-hosts-VectorIndex.
    ja: Pinecone/Chroma/Qdrant/Weaviate 各 SDK の host/url + collection/index 操作。engine_version/deployment_scope を記録。VectorIndex 次元/距離/metric は embedding-indexes が hosts 経由で参照。
  typical_input:
    - description: Pinecone index client for vector upsert and query.
      format: |
        from pinecone import Pinecone
        pc = Pinecone(api_key=os.environ["PINECONE_API_KEY"])
        index = pc.Index("hybrid-memories")
        index.upsert(vectors=[...], namespace="tenant-7-user-alice")
      source_claims: [claim-vector-database-pinecone]
    - description: Chroma HTTP client and collection query.
      format: |
        client = chromadb.HttpClient(host="localhost", port=8000)
        collection = client.get_collection("agent_memories_alice")
        collection.query(query_embeddings=[...], n_results=5)
      source_claims: [claim-vector-database-chroma]
    - description: Qdrant client creating a collection for agent memories.
      format: |
        from qdrant_client import QdrantClient
        client = QdrantClient(url="http://localhost:6333")
        client.create_collection(collection_name="agent_memories", vectors_config=...)
      source_claims: [claim-vector-database-qdrant]
  typical_output:
    - description: Moonweave-local VectorDatabase facility record.
      format: |
        {
          "database_id": "vectordb-prod",
          "memory_store_id": "store-vectordb-prod",
          "endpoint": "https://hybrid-memories-abc123.svc.pinecone.io",
          "engine_version": "pinecone-serverless-2024",
          "deployment_scope": "remote",
          "hosted_indexes": ["hybrid-memories"]
        }
      source_claims: [claim-vector-database-design]
  reference_implementations:
    - name: Pinecone
      url: https://docs.pinecone.io
      description: Managed vector index with namespace upsert and query.
    - name: Chroma
      url: https://docs.trychroma.com
      description: Collection-based embedding storage and query.
    - name: Qdrant
      url: https://qdrant.tech/documentation/
      description: Vector search engine with collections and points.
    - name: Weaviate
      url: https://weaviate.io/developers/weaviate
      description: Vector database with schema-backed collections.
structure:
  identity_keys:
    - database_id
  fields:
    - id: database_id
      labels: {zh: 数据库标识, en: database ID, ja: database ID}
      definitions:
        zh: 稳定标识向量数据库服务或集群实例。
        en: Stable identifier for the vector database service or cluster instance.
        ja: vector database service/cluster instance の安定 ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: vectordb-prod
      allowed_values: []
      source_claims: [claim-vector-database-design]
    - id: memory_store_id
      labels: {zh: 记忆存储标识, en: memory store ID, ja: 記憶ストア ID}
      definitions:
        zh: 与 MemoryStore 身份对齐的 store id；VectorDatabase —is_a→ MemoryStore。
        en: Store id aligned with MemoryStore identity; VectorDatabase —is_a→ MemoryStore.
        ja: MemoryStore identity と整合する store id。VectorDatabase —is_a→ MemoryStore。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: store-vectordb-prod
      allowed_values: []
      source_claims: [claim-vector-database-design]
    - id: endpoint
      labels: {zh: 访问端点, en: endpoint, ja: endpoint}
      definitions:
        zh: Pinecone index host URL、Chroma HTTP URL、Qdrant/Weaviate 连接地址。
        en: Pinecone index host URL, Chroma HTTP URL, or Qdrant/Weaviate connection address.
        ja: Pinecone host URL、Chroma HTTP URL、Qdrant/Weaviate 接続 address。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: https://hybrid-memories-abc123.svc.pinecone.io
      allowed_values: []
      source_claims: [claim-vector-database-pinecone]
    - id: engine_version
      labels: {zh: 引擎版本, en: engine version, ja: engine 版}
      definitions:
        zh: 固定向量引擎行为与 API 版本，如 pinecone-serverless-2024、chromadb-0.5、qdrant-1.9。
        en: Fixes vector engine behavior and API version, such as pinecone-serverless-2024, chromadb-0.5, qdrant-1.9.
        ja: pinecone-serverless-2024、chromadb-0.5、qdrant-1.9 等の engine/API 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pinecone-serverless-2024
      allowed_values: []
      source_claims: [claim-vector-database-pinecone]
    - id: deployment_scope
      labels: {zh: 部署范围, en: deployment scope, ja: 配置範囲}
      definitions:
        zh: local、remote 或 hybrid 部署位置。
        en: local, remote, or hybrid deployment placement.
        ja: local/remote/hybrid の配備位置。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: remote
      allowed_values: [local, remote, hybrid]
      source_claims: [claim-vector-database-design]
  constraints:
    - id: vector-database-hosts-index-not-is-index
      severity: warning
      expression_language: plain
      expression: VectorIndex logical structure must not be classified as VectorDatabase; only hosting relationship is recorded here
      explanation:
        zh: 托管向量索引的服务是 VectorDatabase；索引配置本身归表示与索引模块。
        en: The service hosting vector indexes is VectorDatabase; index configuration belongs to representations and indexes module.
        ja: vector index を host する service が VectorDatabase。index 設定は表現と索引 module 所属。
      source_claims: [claim-vector-database-design]
  required_relations: []
examples:
  - id: vector-database-example-pinecone-serverless
    labels:
      zh: Pinecone Serverless 向量数据库
      en: Pinecone Serverless vector database
      ja: Pinecone Serverless vector database
    descriptions:
      zh: 生产使用 Pinecone(api_key) 连接 index hybrid-memories，endpoint 为 https://hybrid-memories-abc123.svc.pinecone.io。upsert/query 在 namespace tenant-7-user-alice 下执行；Moonweave 建模为 database_id=vectordb-prod 的 VectorDatabase，并通过 hosts 连接 VectorIndex hybrid-memories。
      en: Production uses Pinecone(api_key) against index hybrid-memories with endpoint https://hybrid-memories-abc123.svc.pinecone.io. upsert/query run under namespace tenant-7-user-alice; Moonweave models database_id=vectordb-prod VectorDatabase hosting VectorIndex hybrid-memories.
      ja: Pinecone index hybrid-memories に upsert/query（namespace tenant-7-user-alice）。database_id=vectordb-prod VectorDatabase が VectorIndex hybrid-memories を host。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      version: Pinecone Index upsert and query
    field_values:
      database_id: vectordb-prod
      memory_store_id: store-vectordb-prod
      endpoint: https://hybrid-memories-abc123.svc.pinecone.io
      engine_version: pinecone-serverless-2024
      deployment_scope: remote
      pinecone_index: hybrid-memories
    related_node_ids: [VectorDatabase, MemoryStore, MemoryNamespace, memory-embedding-indexes]
    related_relation_ids: [VectorDatabase-is_a-MemoryStore, VectorDatabase-hosts-VectorIndex]
    source_claims: [claim-vector-database-pinecone, claim-vector-database-design]
  - id: vector-database-example-chroma-local
    labels:
      zh: 本地 Chroma 向量数据库
      en: Local Chroma vector database
      ja: ローカル Chroma vector database
    descriptions:
      zh: 开发环境 chromadb.HttpClient(host=localhost, port=8000) 托管 collections agent_memories_alice 与 docs；collection.add/query 提供向量持久化。Moonweave 将 HttpClient 连接建模为 backend_type=chroma、deployment_scope=local 的 VectorDatabase。
      en: Dev uses chromadb.HttpClient(host=localhost, port=8000) hosting collections agent_memories_alice and docs; collection.add/query persist vectors. Moonweave models the HttpClient connection as VectorDatabase with backend_type=chroma, deployment_scope=local.
      ja: chromadb.HttpClient(localhost:8000) が collections を host。backend_type=chroma, deployment_scope=local の VectorDatabase。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/manage-collections
      version: HttpClient and collection query
    field_values:
      database_id: vectordb-chroma-dev
      memory_store_id: store-chroma-local
      endpoint: http://localhost:8000
      engine_version: chromadb-0.5
      deployment_scope: local
    related_node_ids: [VectorDatabase, MemoryStore, MemoryNamespace, memory-embedding-indexes]
    related_relation_ids: [VectorDatabase-is_a-MemoryStore]
    source_claims: [claim-vector-database-chroma, claim-vector-database-design]
  - id: vector-database-example-qdrant-cluster
    labels:
      zh: Qdrant 集群向量数据库
      en: Qdrant cluster vector database
      ja: Qdrant cluster vector database
    descriptions:
      zh: 自托管 QdrantClient(url=http://qdrant.internal:6333) 创建 collection agent_memories 并 upsert points。Moonweave 记录 engine_version=qdrant-1.9，VectorIndex 维度与 cosine 配置通过 hosts 关系引用，不写入 VectorDatabase 字段。
      en: Self-hosted QdrantClient(url=http://qdrant.internal:6333) creates collection agent_memories and upserts points. Moonweave records engine_version=qdrant-1.9; VectorIndex dimension and cosine config attach via hosts, not VectorDatabase fields.
      ja: QdrantClient(http://qdrant.internal:6333) で collection agent_memories を作成し points upsert。engine_version=qdrant-1.9。VectorIndex 次元/cosine は hosts 参照。
    example_source:
      product: Qdrant
      url: https://qdrant.tech/documentation/concepts/collections/
      version: QdrantClient create_collection and upsert
    field_values:
      database_id: vectordb-qdrant-prod
      memory_store_id: store-qdrant-prod
      endpoint: http://qdrant.internal:6333
      engine_version: qdrant-1.9
      deployment_scope: remote
    related_node_ids: [VectorDatabase, MemoryStore, memory-embedding-indexes]
    related_relation_ids: [VectorDatabase-is_a-MemoryStore, VectorDatabase-hosts-VectorIndex]
    source_claims: [claim-vector-database-qdrant, claim-vector-database-design]
  - id: vector-database-example-index-config-boundary
    labels:
      zh: 索引配置不是向量数据库
      en: Index configuration is not vector database
      ja: index 設定は vector database ではない
    descriptions:
      zh: vector-index-17 只声明 1536 维、cosine 距离与 HNSW 参数，没有 database endpoint 或多索引托管身份。它是 VectorIndex 逻辑结构，由 vectordb-prod 通过 hosts 关系托管，而不是 VectorDatabase 本身。
      en: vector-index-17 declares only 1536 dimensions, cosine distance, and HNSW parameters without database endpoint or multi-index hosting identity. It is VectorIndex logical structure hosted by vectordb-prod via hosts, not VectorDatabase itself.
      ja: vector-index-17 は 1536 次元/cosine/HNSW のみで endpoint/多 index host identity なし。VectorIndex 論理構造で vectordb-prod が hosts。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: VectorDatabase versus VectorIndex boundary
    field_values:
      index_id: vector-index-17
      dimensions: 1536
      metric: cosine
      is_vector_database: false
    related_node_ids: [VectorDatabase, memory-embedding-indexes]
    related_relation_ids: [VectorDatabase-hosts-VectorIndex]
    source_claims: [claim-vector-database-design]
parent_relation:
  id: VectorDatabase-is_a-MemoryStore
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆存储
    en: is a memory store
    ja: 記憶ストアの一種
  definitions:
    zh: VectorDatabase —is_a→ MemoryStore 表示该服务满足持久记忆存储身份，并以向量索引/检索作为专门种差。
    en: VectorDatabase —is_a→ MemoryStore means the service satisfies persistent memory-store identity with vector indexing and retrieval as specialized differentia.
    ja: VectorDatabase —is_a→ MemoryStore は永続 memory-store identity を満たし vector indexing/retrieval を専用種差とする。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: fact 単位制約で schema 層一律 cardinality を課さない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: has subtype, ja: 逆方向読取}
  conditions:
    - id: VectorDatabase-is_a-MemoryStore-condition
      severity: error
      expression_language: plain
      expression: Assert only when the service persists memory records and provides vector-index lifecycle management
      explanation:
        zh: 仅当服务持久化记忆记录并提供向量索引生命周期管理时成立。
        en: Assert only when the service persists memory records and provides vector-index lifecycle management.
        ja: memory record 永続化と vector-index lifecycle 管理を提供する時のみ成立。
      source_claims: [claim-vector-database-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-vector-database-design]
  distinct_fact_rationale:
    zh: is_a 说明 VectorDatabase 满足 MemoryStore 身份；hosts 说明它承载 VectorIndex；索引 entry 存储归 embedding-indexes 模块。
    en: is_a states VectorDatabase satisfies MemoryStore identity; hosts states it carries VectorIndex; index entry storage belongs to embedding-indexes module.
    ja: is_a は MemoryStore identity、hosts は VectorIndex 収容、entry 保存は embedding-indexes module。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: VectorDatabase-hosts-VectorIndex
    predicate: hosts
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 托管索引
      en: hosts index
      ja: index を host する
    definitions:
      zh: VectorDatabase —hosts→ VectorIndex 表示数据库服务为该逻辑向量索引提供持久化、管理与查询端点。
      en: VectorDatabase —hosts→ VectorIndex means the database service provides persistence, management, and query endpoints for that logical vector index.
      ja: database service が logical vector index へ永続化・管理・query endpoint を提供する。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: fact 単位制約で schema 層一律 cardinality を課さない。
    inverse_reading:
      predicate: hosted_by
      labels: {zh: 反向：hosts, en: hosted by, ja: 逆方向：hosts}
    conditions:
      - id: VectorDatabase-hosts-VectorIndex-condition
        severity: error
        expression_language: plain
        expression: Assert only when the index database_id or endpoint resolves to that service instance
        explanation:
          zh: 仅当索引的 database_id/endpoint 解析到该服务实例时成立。
          en: Assert only when the index database_id or endpoint resolves to that service instance.
          ja: index の database_id/endpoint が当該 service instance に解決する時のみ成立。
        source_claims: [claim-vector-database-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-vector-database-design]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:VectorIndex
