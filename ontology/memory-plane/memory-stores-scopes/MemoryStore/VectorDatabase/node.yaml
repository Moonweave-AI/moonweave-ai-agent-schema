schema: moonweave.ai/ontology-node/v1
id: VectorDatabase
kind: concept
status: accepted
labels:
  zh: 向量数据库
  en: Vector Database
  ja: ベクトルデータベース
semantics:
  short_definition:
    zh: 承载向量索引并执行向量写入和相似度候选查询的存储后端设施。
    en: A storage-backend facility that hosts vector indexes and executes vector writes and similarity-candidate queries.
    ja: vector index をホストし、vector write と similarity-candidate query を実行する storage-backend facility。
  definition:
    zh: >-
      VectorDatabase 是一个具体的存储后端设施，可通过一个或多个 VectorIndex 接收带标识和元数据的向量条目，
      并对已提供的查询向量执行相似度或受过滤的检索。它不负责把文本转换为 EmbeddingVector，不等同于任一 VectorIndex
      或索引条目，也不是 MemoryRecord、Chunk、MemoryNamespace、MemoryScope、RetrievedCandidate、重排结果或
      Context Assembly。查询仅产生候选和分数；查询或后续重排不会仅因命中而写入记录、向量或索引。
    en: >-
      A VectorDatabase is a concrete storage-backend facility that accepts identified vector entries with metadata through
      one or more VectorIndexes and executes similarity or filtered retrieval over a supplied query vector. It does not
      convert text into an EmbeddingVector, is not any one VectorIndex or index entry, and is not a MemoryRecord, Chunk,
      MemoryNamespace, MemoryScope, RetrievedCandidate, reranking result, or Context Assembly. A query produces only
      candidates and scores; the query or later reranking does not write records, vectors, or indexes merely because of a hit.
    ja: >-
      VectorDatabase は一つ以上の VectorIndex を通じて identifier と metadata を持つ vector entry を受け入れ、提供
      された query vector に対して similarity 又は filter 付き retrieval を実行する具体的な storage-backend facility
      です。text を EmbeddingVector に変換せず、一つの VectorIndex や index entry、MemoryRecord、Chunk、
      MemoryNamespace、MemoryScope、RetrievedCandidate、reranking result、Context Assembly ではありません。query は
      candidate と score だけを生成し、hit があっただけで query 又は後続 reranking が record、vector、index を write しません。
  why_needed:
    zh: >-
      语义检索需要一个能在大量向量上执行受约束近邻查询的运行设施，但该设施必须与嵌入生成、索引结构、候选选择、
      重排和模型上下文分离。否则一次数据库查询会被错误解释为内容写入或模型已见事实。
    en: >-
      Semantic retrieval needs a runtime facility that performs constrained nearest-neighbor queries over many vectors,
      yet that facility must remain separate from embedding generation, index structure, candidate selection, reranking,
      and model context. Otherwise one database query could be mistaken for a content write or a fact already seen by a model.
    ja: >-
      semantic retrieval には多数の vector に対して制約付き nearest-neighbor query を実行する runtime facility が必要だが、
      embedding generation、index structure、candidate selection、reranking、model context から分離しなければならない。
      そうしないと一つの database query が content write や model が既に見た fact と誤認される。
  includes:
    - zh: 一个具有非秘密连接配置、托管索引引用和 dense 加元数据过滤查询能力的向量检索后端。
      en: A vector-retrieval backend with a non-secret connection profile, hosted-index references, and dense plus metadata-filter query capability.
      ja: non-secret connection profile、hosted-index reference、dense と metadata-filter query capability を持つ vector-retrieval backend。
  excludes:
    - zh: 单个 float 向量、HNSW 或其他单个索引结构、文本嵌入模型、一次检索候选、重排分数或最终提示词上下文。
      en: One float vector, one HNSW or other index structure, a text-embedding model, one retrieval candidate, a reranking score, or final prompt context.
      ja: 一つの float vector、一つの HNSW 又は他の index structure、text-embedding model、一つの retrieval candidate、reranking score、最終 prompt context。
  semantic_kind: facility
  aliases: [vector store backend, similarity-search backend]
engineering:
  explanation:
    zh: >-
      嵌入活动先将输入文本转换为向量。写入活动随后把 vector_id、向量和受控元数据放入目标索引；检索活动向数据库
      发送查询向量、top-k 和可选元数据过滤器，再将返回的候选交给独立的筛选、重排或 Context Assembly 阶段。数据库
      查询路径不修改持久记忆；任何写入必须是单独可审计的 upsert 或删除活动。
    en: >-
      An embedding activity first converts input text into a vector. A write activity then places vector_id, vector, and
      controlled metadata into a target index. A retrieval activity sends a query vector, top-k, and optional metadata
      filter to the database, then hands returned candidates to separate filtering, reranking, or Context Assembly stages.
      The database query path does not modify persistent memory; every write must be a separately auditable upsert or delete activity.
    ja: >-
      embedding activity は最初に input text を vector に変換します。write activity はその後 vector_id、vector、controlled
      metadata を target index に置きます。retrieval activity は query vector、top-k、任意の metadata filter を database に送り、
      返された candidate を別の filtering、reranking、Context Assembly stage に渡します。database の query path は persistent
      memory を変更せず、すべての write は別途 audit 可能な upsert 又は delete activity でなければなりません。
  typical_input:
    - description: Filtered candidate query over an existing index
      format: |
        query = {
          "index_ref": "project-index-p-88",
          "query_embedding_ref": "embedding-query-77",
          "top_k": 8,
          "metadata_filter": {"project_id": "p-88"}
        }
        candidates = vector_database.query(query)
  typical_output:
    - description: Candidate identifiers and scores with no write
      format: |
        {
          "index_ref": "project-index-p-88",
          "candidate_ids": ["index-entry-41", "index-entry-58"],
          "scores": [0.91, 0.84],
          "write_performed": false
        }
  reference_implementations:
    - name: Pinecone vector search and metadata filtering
      url: https://docs.pinecone.io/guides/search/filter-by-metadata
      description: Documents records containing IDs, vectors, and metadata plus vector queries constrained by metadata filters.
    - name: OpenAI embeddings guide
      url: https://developers.openai.com/api/docs/guides/embeddings
      description: Documents generation of numerical vector representations from input content.
structure:
  identity_keys: [store_id, vector_database_id]
  fields:
    - id: store_id
      labels:
        zh: 存储标识
        en: Store ID
        ja: ストア ID
      definitions:
        zh: 继承自 MemoryStore 的稳定存储身份；它标识提供读写接口的逻辑存储，而不是其中某个索引或向量。
        en: The stable storage identity inherited from MemoryStore; it identifies the logical store that provides read/write interfaces, not an index or vector inside it.
        ja: MemoryStore から継承する安定した storage identity です。read/write interface を提供する logical store を識別し、内部の index や vector は識別しません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: memory-store-vector-prod
      source_claims: [claim-vector-database-store-specialization, claim-vector-database-facility]
    - id: operation_interface_ref
      labels:
        zh: 操作接口引用
        en: Operation interface reference
        ja: 操作インターフェース参照
      definitions:
        zh: 指向该向量后端公开的读写或查询接口契约；它不保存连接凭据或单次查询结果。
        en: References the published read, write, or query interface contract for this vector backend; it does not contain credentials or one query result.
        ja: この vector backend の公開された read、write、query interface contract を参照します。接続資格情報や一回の query result は含みません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: pinecone-index-api-v1
      source_claims: [claim-vector-database-query, claim-vector-database-store-specialization]
    - id: namespace_addressing_mode
      labels:
        zh: 命名空间寻址方式
        en: Namespace addressing mode
        ja: 名前空間アドレス方式
      definitions:
        zh: 说明租户、集合或命名空间如何参与向量记录寻址；它不是记录的语义作用域或访问授权规则。
        en: States how tenant, collection, or namespace participates in vector-record addressing; it is not a record’s semantic scope or access-authorization rule.
        ja: tenant、collection、namespace が vector-record addressing にどう参加するかを示します。record の semantic scope や access authorization rule ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: metadata-tenant-and-collection
      source_claims: [claim-vector-database-query, claim-vector-database-store-specialization]
    - id: write_audit_mode
      labels:
        zh: 写入审计方式
        en: Write audit mode
        ja: 書き込み監査方式
      definitions:
        zh: 说明如何为向量记录的上写、更新或删除保留可审计事件；它不是向量相似度分数或检索排序规则。
        en: States how auditable events are retained for vector-record upsert, update, or deletion; it is not a vector-similarity score or retrieval ranking rule.
        ja: vector-record の upsert、update、delete に対する監査可能な event の保持方法を示します。vector similarity score や retrieval ranking rule ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: append-only-upsert-delete-events
      source_claims: [claim-vector-database-retrieval-boundary, claim-vector-database-store-specialization]
    - id: vector_database_id
      labels:
        zh: 向量数据库标识
        en: vector database ID
        ja: vector database ID
      definitions:
        zh: 稳定标识一个具体向量数据库设施，而非其内部某个索引或向量条目。
        en: Stably identifies one concrete vector-database facility, not one internal index or vector entry.
        ja: 内部の一つの index 又は vector entry ではなく、一つの具体的な vector-database facility を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: vector-db-prod
      source_claims: [claim-vector-database-facility]
    - id: backend_kind
      labels:
        zh: 后端类别
        en: backend kind
        ja: backend 種別
      definitions:
        zh: 描述设施的部署类别，以便运维选择正确适配器，而不定义任何特定索引算法或嵌入模型。
        en: Describes the facility's deployment category so operations select the right adapter; it does not define an index algorithm or embedding model.
        ja: operations が適切な adapter を選べるよう facility の deployment category を表す。index algorithm や embedding model は定義しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [managed-service, self-hosted-service, embedded-library]
      pattern: null
      example_value: managed-service
      source_claims: [claim-vector-database-facility]
    - id: connection_profile_ref
      labels:
        zh: 连接配置引用
        en: connection profile reference
        ja: connection profile 参照
      definitions:
        zh: 引用不含凭据的部署或连接配置；秘密凭据必须留在独立的秘密管理系统中。
        en: References a deployment or connection profile that contains no credentials; secret credentials must remain in a separate secret-management system.
        ja: credential を含まない deployment 又は connection profile を参照する。secret credential は別の secret-management system に残さなければならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: vector-db-prod-profile
      source_claims: [claim-vector-database-facility]
    - id: managed_index_refs
      labels:
        zh: 托管索引引用
        en: managed index references
        ja: 管理 index 参照
      definitions:
        zh: 可选列出由此数据库承载的 VectorIndex 引用；列表中的每项仍是独立索引对象，而不是数据库本身。
        en: Optionally lists VectorIndex references hosted by this database; every listed entry remains a separate index object rather than the database itself.
        ja: この database がホストする VectorIndex reference を任意に列挙する。各 entry は database 自体ではなく別の index object のままである。
      datatype: json
      required: false
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["project-index-p-88"]'
      source_claims: [claim-vector-database-index-boundary]
    - id: query_capabilities
      labels:
        zh: 查询能力
        en: query capabilities
        ja: query capability
      definitions:
        zh: 可选声明设施支持的查询模式，如 dense、sparse、hybrid 或 metadata-filter；它不记录一次查询的候选或分数。
        en: Optionally declares query modes the facility supports, such as dense, sparse, hybrid, or metadata-filter; it does not record one query's candidates or scores.
        ja: dense、sparse、hybrid、metadata-filter など facility が support する query mode を任意に宣言する。一回の query の candidate や score は記録しない。
      datatype: json
      required: false
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["dense","metadata-filter"]'
      source_claims: [claim-vector-database-query]
  constraints:
    - id: vector-database-facility-identity
      severity: error
      expression_language: plain
      expression: vector_database_id, backend_kind, and connection_profile_ref are required. connection_profile_ref must identify a non-secret deployment profile. managed_index_refs, when present, may list hosted VectorIndexes but must not be used as the database identity or as an EmbeddingVector identity.
      explanation:
        zh: 运行设施、部署配置、索引和向量有不同的身份和安全边界；秘密不应进入本体实例字段。
        en: The runtime facility, deployment profile, indexes, and vectors have different identity and security boundaries; secrets must not enter ontology instance fields.
        ja: runtime facility、deployment profile、index、vector は異なる identity と security boundary を持つ。secret は ontology instance field に入れてはならない。
      source_claims: [claim-vector-database-facility, claim-vector-database-index-boundary]
    - id: vector-database-query-write-boundary
      severity: error
      expression_language: plain
      expression: A query must consume an existing query EmbeddingVector and optional metadata filter and return candidate identifiers with scores. Querying, candidate filtering, and reranking must not create or update MemoryRecords, EmbeddingVectors, VectorIndexes, or stored entries. Only an explicit write activity may upsert or delete an index entry.
      explanation:
        zh: 检索、筛选和重排是读取路径；候选相关性或分数不是写入持久记忆、向量或索引的证据。
        en: Retrieval, filtering, and reranking are read paths; candidate relevance or a score is not evidence for writing persistent memory, a vector, or an index.
        ja: retrieval、filtering、reranking は read path である。candidate relevance や score は persistent memory、vector、index への write の evidence ではない。
      source_claims: [claim-vector-database-query, claim-vector-database-retrieval-boundary]
  required_relations: []
examples:
  - id: VectorDatabase-positive-pinecone-hybrid-query

    labels:
      zh: Pinecone 混合检索候选查询
      en: Pinecone hybrid-search candidate query
      ja: Pinecone hybrid-search candidate query

    descriptions:
      zh: Pinecone index.query(vector=[...], top_k=10, filter={"category":"tech"}) serverless；Weaviate client.collections.create("Article", vectorizer_config=Configure.Vectorizer.text2vec_openai())；Qdrant client.search(collection_name="docs", query_filter=Filter(...))。
      en: Pinecone index.query(top_k=10, filter={"category":"tech"}) serverless; Weaviate collections.create with text2vec_openai; Qdrant client.search with query_filter.
      ja: Pinecone query+filter serverless。Weaviate collections.create。Qdrant search+query_filter。
    field_values: {store_id: memory-store-vector-prod, vector_database_id: pinecone-serverless-prod, backend_kind: managed-service, operation_interface_ref: pinecone-index-api-v1, namespace_addressing_mode: metadata-tenant-and-collection, write_audit_mode: append-only-upsert-delete-events, connection_profile_ref: pinecone-prod-profile, managed_index_refs: '["project-index-p-88"]', query_capabilities: '["dense","hybrid","metadata-filter"]'}
    related_node_ids: [VectorDatabase, VectorIndex, EmbeddingVector, RetrievedCandidate]
    related_relation_ids: [VectorDatabase-is_a-MemoryStore]

    source_claims: [claim-vector-database-query, claim-vector-database-retrieval-boundary]
  - id: VectorDatabase-boundary-openai-dimension-mismatch

    labels:
      zh: OpenAI 嵌入维度不匹配
      en: OpenAI embedding dimension mismatch
      ja: OpenAI embedding dimension mismatch

    descriptions:
      zh: VectorDatabase 托管 VectorIndex vs EmbeddingRun 生成向量的表示边界；ColBERT index 的 token-level 存储 vs dense pgvector HNSW。
      en: VectorDatabase hosts VectorIndex vs EmbeddingRun generates vectors; ColBERT token-level index vs dense pgvector HNSW boundary.
      ja: VectorDatabase vs EmbeddingRun 境界。ColBERT token-level vs pgvector HNSW。
    field_values: {vector_database_id: pinecone-serverless-prod, backend_kind: managed-service, connection_profile_ref: pinecone-prod-profile, managed_index_refs: '["project-index-p-88"]'}
    related_node_ids: [VectorDatabase, VectorIndex, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-vector-database-embedding-boundary, claim-vector-database-retrieval-boundary]
  - id: VectorDatabase-counterexample-weaviate-hnsw-config

    labels:
      zh: Weaviate HNSW 配置不是数据库设施
      en: Weaviate HNSW config is not the database facility
      ja: Weaviate HNSW config は database facility ではない

    descriptions:
      zh: 反例：把 OpenAI embedding API 响应当作 VectorDatabase，缺少 upsert/query/filter 端点与 connection_profile。
      en: Counterexample: treating OpenAI embedding API response as VectorDatabase without upsert/query/filter endpoints.
      ja: 反例：OpenAI embedding API 応答を VectorDatabase とみなし upsert/query/filter endpoint がない。
    field_values: {index_id: weaviate-hnsw-config-17, index_algorithm: hnsw, vector_database_id: absent, connection_profile_ref: absent}
    related_node_ids: [VectorDatabase, VectorIndex, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-vector-database-index-boundary]
  - id: VectorDatabase-instance-qdrant-collection-filter

    labels:
      zh: 实例：Qdrant collection 多向量检索
      en: "Instance: Qdrant collection multi-vector retrieval"
      ja: "事例: Qdrant collection multi-vector retrieval"

    descriptions:
      zh: ChromaDB client.create_collection("docs") + collection.query(query_texts=["search"], n_results=5)；pgvector CREATE EXTENSION vector; SELECT * ORDER BY embedding <=> query LIMIT 5。
      en: ChromaDB create_collection + query; pgvector CREATE EXTENSION vector; SELECT ORDER BY embedding <=> query LIMIT 5.
      ja: ChromaDB create_collection+query。pgvector <=> LIMIT 5。
    field_values: {store_id: memory-store-vector-projects, vector_database_id: qdrant-projects-db, backend_kind: self-hosted-service, operation_interface_ref: qdrant-api-v1, namespace_addressing_mode: metadata-tenant-and-collection, write_audit_mode: append-only-upsert-delete-events, connection_profile_ref: qdrant-projects-profile, managed_index_refs: '["projects-collection-p-88","projects-collection-p-89"]', query_capabilities: '["dense","hybrid","metadata-filter","multi-vector"]'}
    related_node_ids: [VectorDatabase, VectorIndex, RetrievalRequest, RetrievedCandidate]
    related_relation_ids: [VectorDatabase-is_a-MemoryStore]

    source_claims: [claim-vector-database-query, claim-vector-database-retrieval-boundary]
parent_relation:
  id: VectorDatabase-is_a-MemoryStore
  predicate: is_a
  target: concept:MemoryStore
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是提供向量后端的记忆存储
    en: is a memory store with a vector-backend capability
    ja: ベクトルバックエンド機能を持つ記憶ストアである
  definitions:
    zh: VectorDatabase 是提供向量条目持久化和候选检索能力的 MemoryStore 子类，不等同于其中的每个索引或向量。
    en: VectorDatabase is a subtype of MemoryStore that provides vector-entry persistence and candidate retrieval, not an identity for every index or vector within it.
    ja: VectorDatabase は vector-entry persistence と candidate retrieval を提供する MemoryStore の下位型であり、内部のすべての index 又は vector の identity ではない。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有向量后端子类
      en: has vector-backend subtype
      ja: vector-backend 下位型を持つ
  conditions:
    - id: vector-database-is-a-memory-store-condition
      severity: error
      expression_language: plain
      expression: Assert is_a only when the facility has stable database identity, a non-secret connection profile, and separately auditable vector-entry write and candidate-query operations. An embedding model, VectorIndex, vector value, candidate list, or reranking result alone is not a VectorDatabase subtype.
      explanation:
        zh: 存储后端子类要求设施级运行能力；算法、数据结构、数据值和查询输出不能代替该能力。
        en: The storage-backend subtype requires facility-level operations; an algorithm, data structure, data value, or query output cannot substitute for that capability.
        ja: storage-backend 下位型には facility-level operation が必要である。algorithm、data structure、data value、query output はその capability の代わりにならない。
      source_claims: [claim-vector-database-store-specialization]
  temporal_scope: timeless
  boundary_context: Hosting or querying a VectorIndex does not make that index, its vectors, its candidates, or a reranking result identical to the VectorDatabase facility.
  constraints: []
  examples: []
  source_claims: [claim-vector-database-store-specialization]
  distinct_fact_rationale: This subtype records the deployed vector-storage facility, whereas VectorIndex records an index structure, EmbeddingVector records a numerical representation, and retrieval nodes record read-only query outcomes.
  layout_role: primary-backbone
relations: []
sources:
  - id: pinecone-vector-query
    title: Pinecone metadata-filtered vector search
    url: https://docs.pinecone.io/guides/search/filter-by-metadata
    type: official-doc
    source_type: official-doc
    relevance: Documents indexed records containing an ID and dense or sparse vector, metadata filtering, and vector search over an index.
  - id: openai-embeddings
    title: OpenAI embeddings guide
    url: https://developers.openai.com/api/docs/guides/embeddings
    type: official-doc
    source_type: official-doc
    relevance: Documents transforming input content into numerical embedding vectors.
source_claims:
  - id: claim-vector-database-query
    source: pinecone-vector-query
    supports: Pinecone documents index records containing IDs, dense or sparse vectors, and metadata, and documents vector search constrained by metadata filters. These are concrete vector-database query and data-operation capabilities.
    locator: "Filter by metadata: record requirements and Search with a metadata filter"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-vector-database-embedding-boundary
    source: openai-embeddings
    supports: OpenAI documents embeddings as numerical vector representations created from input content. Moonweave keeps that embedding activity and its EmbeddingVector output distinct from the VectorDatabase that stores or queries an already supplied vector.
    locator: "Embeddings guide: What are embeddings and create embeddings"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-vector-database-facility
    source: pinecone-vector-query
    supports: Pinecone provides a concrete deployed index-query service. Moonweave models a stable database identifier, deployment profile reference, and backend category as facility facts; the specific field vocabulary is a local design choice and excludes credentials.
    locator: "Filter by metadata: search API and indexed records"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-vector-database-index-boundary
    source: pinecone-vector-query
    supports: The documentation distinguishes an index, records within it, and search operations. Moonweave separately models the database facility, VectorIndex, and EmbeddingVector rather than making any one of them a synonym for another.
    locator: "Filter by metadata: records in an index and search"
    evidence_kind: ontology-design-inference
    confidence: medium
