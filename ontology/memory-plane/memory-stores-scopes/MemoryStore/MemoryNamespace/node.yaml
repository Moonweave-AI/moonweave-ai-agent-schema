schema: moonweave.ai/ontology-node/v1
id: MemoryNamespace
kind: concept
status: review
labels:
  zh: 记忆命名空间
  en: memory namespace
  ja: 記憶名前空間
semantics:
  short_definition:
    zh: 以层级命名键隔离记忆记录、限定存储寻址与查询范围的逻辑集合。
    en: A logical collection using a hierarchical name key to isolate memory records and bound storage addressing and queries.
    ja: 階層名キーで記憶レコードを分離し、保存アドレスと検索範囲を限定する論理集合です。
  definition:
    zh: 记忆命名空间是一种逻辑集合；其种差是：它由一个稳定、可层级组合的 namespace key 标识，作为 MemoryStore 内记录写入、寻址、列举和检索的分区边界，常按租户、用户、应用或任务分隔。它不直接表达谁有权读取，也不等同于部署中的存储实例。
    en: A MemoryNamespace is a logical collection identified by a stable, hierarchically composable namespace key. It partitions record writes, addressing, listing, and retrieval inside a MemoryStore, often by tenant, user, application, or task. It does not itself express authorization and is not the deployed store instance.
    ja: MemoryNamespace は安定し階層合成可能な namespace key で識別される論理集合です。MemoryStore 内のレコード書込・アドレス・列挙・検索をテナント、利用者、アプリ、タスク等で分割します。読取権限自体を表さず、配備ストア実体でもありません。
  why_needed:
    zh: 命名空间使同一存储中的跨租户和跨用户数据可确定性寻址并避免无意混查，同时仍可由独立 MemoryScope 控制读写与复用权限。
    en: Namespaces provide deterministic addressing and prevent accidental cross-tenant or cross-user queries within one store while leaving read, write, and reuse permissions to separate MemoryScope rules.
    ja: 同一ストア内でテナント・利用者横断データを決定的にアドレスし誤混在検索を防ぎ、読書込・再利用権限は別 MemoryScope に委ねます。
  includes:
    - zh: 纳入 namespace=(tenant-7,user-42,preferences) 这类具有稳定层级键、所属存储和明确成员集合的逻辑分区。
      en: Includes logical partitions such as namespace=(tenant-7,user-42,preferences) with stable hierarchical key, owning store, and determinate member set.
      ja: namespace=(tenant-7,user-42,preferences) のように安定階層キー、所属ストア、確定構成集合を持つ論理区画を含みます。
  excludes:
    - zh: 排除 MemoryStore、数据库 schema 名、未形成成员集合的任意标签，以及描述访问条件的 MemoryScope。
      en: Excludes MemoryStore, a database schema name by itself, an arbitrary label with no member collection, and MemoryScope specifications describing access conditions.
      ja: MemoryStore、単なるDB schema名、構成集合を持たない任意標識、アクセス条件を記す MemoryScope を除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - memory_store_ref
    - namespace_path
  fields:
    - id: memory_store_ref
      labels:
        zh: 所属记忆存储引用
        en: owning memory store reference
        ja: 所属記憶ストア参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际承载该逻辑集合的唯一 MemoryStore；相同 namespace_path 位于另一存储时形成不同命名空间。
        en: References the one MemoryStore that actually hosts the logical collection; the same namespace_path in another store denotes a different namespace.
        ja: 論理集合を実際保持する唯一の MemoryStore を参照し、別 store の同じ namespace_path は別 namespace です。
      allowed_values: []
      pattern: null
      example_value: memory-store:prod
      source_claims:
        - claim-memory-namespace-003
    - id: namespace_path
      labels:
        zh: 命名空间路径
        en: namespace path
        ja: 名前空間パス
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按顺序保存一个或多个非空路径段，形成定位集合的完整层级键；段顺序是身份的一部分。
        en: Stores one or more ordered, non-empty segments forming the complete hierarchical collection key; segment order is part of identity.
        ja: 一つ以上の順序付き非空 segment で完全階層 collection key を構成し、segment 順序も同一性の一部です。
      allowed_values: []
      pattern: null
      example_value:
        - tenant-7
        - user-42
        - preferences
      source_claims:
        - claim-memory-namespace-004
    - id: purpose
      labels:
        zh: 集合用途
        en: collection purpose
        ja: 集合用途
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选说明该集合承载的记忆类别或应用用途；它帮助解释路径，但不授予访问权限。
        en: Optionally explains the memory class or application purpose hosted by the collection; it interprets the path but grants no access permission.
        ja: collection が保持する記憶種別・application 用途を任意説明し、path 解釈を助けますがアクセス権を与えません。
      allowed_values: []
      pattern: null
      example_value: user preference records shared across sessions
      source_claims:
        - claim-memory-namespace-005
  constraints:
    - id: memory-namespace-canonical-path
      severity: error
      expression_language: plain
      expression: namespace_path contains at least one non-empty literal string segment, preserves segment order, contains no wildcard segment, and is interpreted only within memory_store_ref
      explanations:
        zh: 路径至少包含一个非空字面段，顺序不可重排且不得使用通配段；完整身份始终由所属存储与路径共同决定。
        en: The path has at least one non-empty literal segment, preserves order, and contains no wildcard segment. Complete identity is always the owning store plus path.
        ja: path は一つ以上の非空 literal segment を持ち、順序を保ち wildcard を含みません。完全 identity は常に所属 store と path の組です。
      source_claims:
        - claim-memory-namespace-006
  required_relation_constraints: []
examples:
  - id: MemoryNamespace-example-positive-001
    kind: positive
    labels:
      zh: 记忆命名空间正例
      en: Positive example of memory namespace
      ja: 記憶名前空間の正例
    scenario_id: null
    descriptions:
      zh: store-prod 的 namespace=(tenant-7,user-42,preferences) 收纳 user-42 的偏好记录；写入和查询必须携带完整层级键，tenant-8 的同名 user-42 不会命中该集合。
      en: In store-prod, namespace=(tenant-7,user-42,preferences) contains user-42 preference records; writes and queries require the full hierarchical key, so tenant-8's user-42 cannot match this collection.
      ja: store-prod の namespace=(tenant-7,user-42,preferences) は user-42 の選好記録を収め、書込・検索は完全階層キーを要し、tenant-8 の同名 user-42 はこの集合へ一致しません。
    field_values:
      memory_store_ref: memory-store:prod
      namespace_path:
        - tenant-7
        - user-42
        - preferences
      purpose: user preference records shared across sessions
    related_node_ids:
      - MemoryNamespace
      - MemoryStore
    related_relation_ids:
      - memory_store_has_namespace
    expected_result:
      zh: 该运行可查询 MemoryNamespace 以及方向保持不变的事实 memory_store_has_namespace。
      en: The run can query MemoryNamespace together with direction-preserving fact memory_store_has_namespace.
      ja: この実行では MemoryNamespace と方向を保持した事実 memory_store_has_namespace を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、memory_store_has_namespace 的 canonical 方向、概念定义和可用字段值。
      en: The stable hierarchical key determines collection membership and storage lookup while avoiding any claim that the namespace itself authorizes access.
      ja: このシナリオは実際の運用文脈、memory_store_has_namespace の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-namespace-007
      - claim-memory-namespace-008
  - id: MemoryNamespace-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆命名空间边界例
      en: Boundary case for memory namespace
      ja: 記憶名前空間の境界例
    scenario_id: null
    descriptions:
      zh: store-prod 是具有后端连接、部署范围和持久操作接口的 MemoryStore，可承载成千上万个命名空间；它不以某一个层级集合键为身份，因此不是 MemoryNamespace。
      en: store-prod is a MemoryStore with backend connection, deployment scope, and durable operation interface and can host thousands of namespaces. It is not identified by one hierarchical collection key and is not MemoryNamespace.
      ja: store-prod はbackend接続、配備範囲、永続操作接口を持ち多数名前空間を収容する MemoryStore です。一つの階層集合キーで識別されず MemoryNamespace ではありません。
    field_values: {}
    related_node_ids:
      - MemoryNamespace
      - MemoryStore
    related_relation_ids:
      - memory_store_has_namespace
    expected_result:
      zh: MemoryStore 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryNamespace。
      en: MemoryStore retains its own type; validation must not promote it to MemoryNamespace from relation co-occurrence.
      ja: MemoryStore は元の型を維持し、関係の共起だけで MemoryNamespace へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 memory_store_has_namespace 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A store is the deployed facility; a namespace is one logical partition inside it. Composition makes the latter part of the former without making their types interchangeable.
      ja: 境界例は実在する対照ノードを示し、memory_store_has_namespace の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-namespace-009
      - claim-memory-namespace-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: memory_store_has_namespace
  predicate: memory_store_has_namespace
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含命名空间
    en: has namespace
    ja: 名前空間を持つ
  definitions:
    zh: memory_store_has_namespace 表示 MemoryNamespace 是某个 MemoryStore 内由层级 namespace key 确定的逻辑记录集合；命名空间的成员资格只在该存储端点内成立，相同键在另一存储中不是同一集合。
    en: memory_store_has_namespace states that a MemoryNamespace is a logical record collection inside one MemoryStore, identified by a hierarchical namespace key. Membership is local to that store endpoint; the same key in another store is a different collection.
    ja: memory_store_has_namespace は MemoryNamespace が一つの MemoryStore 内で階層 namespace key により識別される論理記録集合であることを示します。所属はその端点内だけで成立し、別ストアの同一キーは別集合です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: is_target_of_memory_store_has_namespace
    labels:
      zh: 反向：memory store has namespace
      en: is target of memory store has namespace
      ja: 逆方向：memory store has namespace
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: memory_store_has_namespace-example-positive-001
      kind: positive
      labels:
        zh: 包含命名空间正例
        en: "Positive case: has namespace"
        ja: 名前空間を持つの正例
      scenario_id: null
      descriptions:
        zh: store-prod 包含 namespace=(tenant-7,user-42,preferences)，其列举操作只返回该集合的键。
        en: store-prod contains namespace=(tenant-7,user-42,preferences), whose list operation returns only keys in that collection.
        ja: store-prod は namespace=(tenant-7,user-42,preferences) を含み、列挙は同集合のkeyだけを返します。
      field_values: {}
      related_node_ids:
        - MemoryStore
        - MemoryNamespace
      related_relation_ids:
        - memory_store_has_namespace
      expected_result:
        zh: 查询以 store_id 与 namespace tuple 共同定位集合。
        en: The query identifies the collection jointly by store ID and namespace tuple.
        ja: 照会は store_id と namespace tuple の組で集合を識別します。
      why_valid_or_invalid:
        zh: LangGraph 的命名空间操作始终在具体 Store 上执行。
        en: LangGraph namespace operations execute against a concrete Store.
        ja: LangGraph の namespace 操作は具体 Store 上で実行されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-namespace-011
    - id: memory_store_has_namespace-example-boundary-001
      kind: boundary
      labels:
        zh: 包含命名空间边界例
        en: "Boundary case: has namespace"
        ja: 名前空間を持つの境界例
      scenario_id: null
      descriptions:
        zh: store-staging 也有相同 namespace tuple，但属于另一个部署端点。
        en: store-staging has the same namespace tuple but belongs to a different deployed endpoint.
        ja: store-staging に同じ namespace tuple がありますが別配備端点です。
      field_values: {}
      related_node_ids:
        - MemoryStore
        - MemoryNamespace
      related_relation_ids:
        - memory_store_has_namespace
      expected_result:
        zh: 两个命名空间不得按键名合并。
        en: The two namespaces are not merged by key name.
        ja: 二つの namespace をキー名で同一化しません。
      why_valid_or_invalid:
        zh: 集合身份同时依赖所属存储与层级键。
        en: Collection identity depends on both owning store and hierarchical key.
        ja: 集合同一性は所属ストアと階層キーの両方に依存します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-namespace-012
  source_claims:
    - claim-memory-namespace-013
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
