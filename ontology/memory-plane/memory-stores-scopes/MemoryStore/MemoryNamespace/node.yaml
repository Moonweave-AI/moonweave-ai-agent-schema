schema: moonweave.ai/ontology-node/v1
id: MemoryNamespace
kind: concept
labels:
  zh: 记忆命名空间
  en: memory namespace
  ja: 記憶名前空間
semantics:
  short_definition:
    zh: 以层级命名键隔离记忆记录、限定存储寻址与查询范围的逻辑集合。
    en: A logical collection using a hierarchical name key to isolate memory records and bound storage addressing and queries.
    ja: 階層名キーで記憶レコードを分離し、保存アドレスと検索範囲を限定する論理集合です。
  definition:
    zh: MemoryNamespace 是一种逻辑集合；其种差是由稳定、可层级组合的 namespace key 标识，作为 MemoryStore 内记录写入、寻址、列举和检索的分区边界。LangGraph BaseStore 的 Item.namespace tuple、Pinecone index 内的 namespace 字符串、Chroma 的 collection_name，以及 Deep Agents 的 tenant/user 路径段都可映射到此概念。它不表达谁有权读取（那是 MemoryScope），也不是部署中的 MemoryStore 实例本身。
    en: A MemoryNamespace is a logical collection identified by a stable, hierarchically composable namespace key partitioning record writes, addressing, listing, and retrieval inside a MemoryStore. LangGraph Item.namespace tuples, Pinecone index namespace strings, Chroma collection_name, and Deep Agents tenant/user path segments map here. It does not express read authorization (MemoryScope) and is not the deployed MemoryStore instance itself.
    ja: MemoryNamespace は安定階層 namespace key で MemoryStore 内の write/address/list/retrieve を分割する論理集合。LangGraph namespace tuple、Pinecone namespace、Chroma collection_name、Deep Agents tenant/user path が写像対象。読取権限（MemoryScope）でも MemoryStore 实例でもない。
  why_needed:
    zh: 同一 PostgreSQL 或 Pinecone index 内，tenant-7 与 tenant-8 的数据必须确定性隔离；否则查询会混入其他租户记忆。命名空间提供寻址边界，但仍需 MemoryScope 控制授权。
    en: Within one PostgreSQL or Pinecone index, tenant-7 and tenant-8 data must isolate deterministically; otherwise queries mix other tenants' memories. Namespaces provide addressing boundaries while MemoryScope still controls authorization.
    ja: 同一 PostgreSQL/Pinecone index 内で tenant-7/tenant-8 を決定的分離。否则他 tenant 記憶が混入。namespace は住所境界、認可は MemoryScope。
  includes:
    - zh: LangGraph ("tenant-7","user-42","preferences")、Pinecone tenant-7-user-alice、Chroma agent_memories_alice 等具有稳定层级键与所属 store 的逻辑分区。
      en: LangGraph ("tenant-7","user-42","preferences"), Pinecone tenant-7-user-alice, Chroma agent_memories_alice, and similar partitions with stable hierarchical keys and owning store.
      ja: LangGraph tuple、Pinecone namespace 文字列、Chroma collection 等、安定階層キーと所属 store を持つ論理区画。
  excludes:
    - zh: MemoryStore 实例、数据库 schema 名 alone、任意标签，以及描述访问条件的 MemoryScope。
      en: MemoryStore instances, database schema names alone, arbitrary labels, and MemoryScope specifications describing access conditions.
      ja: MemoryStore 实例、DB schema 名のみ、任意 label、MemoryScope アクセス条件。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: LangGraph store.put/get/search/list_namespaces 始终在具体 store 上用 namespace tuple 操作；Pinecone upsert/query 必须指定 namespace；Chroma 以 collection 为边界。Moonweave memory_store_ref + namespace_path 共同确定身份；相同 tuple 在不同 store 中是不同 MemoryNamespace。
    en: LangGraph store.put/get/search/list_namespaces always operate on namespace tuples within a concrete store; Pinecone upsert/query must specify namespace; Chroma uses collections as boundaries. Moonweave memory_store_ref + namespace_path jointly determine identity; the same tuple in different stores is a different MemoryNamespace.
    ja: LangGraph/Pinecone/Chroma いずれも namespace/collection 指定必須。memory_store_ref+namespace_path が identity。別 store の同 tuple は別 MemoryNamespace。
  typical_input:
    - description: LangGraph hierarchical namespace on put.
      format: |
        await store.put(
          ("tenant-7", "user-42", "preferences"),
          "response-language",
          {"language": "zh-CN"}
        )
      source_claims: [claim-memory-namespace-langgraph]
    - description: Pinecone namespace partition within an index.
      format: |
        index.upsert(
          vectors=[{"id": "mem-001", "values": [...]}],
          namespace="tenant-7-user-alice"
        )
      source_claims: [claim-memory-namespace-pinecone]
    - description: Chroma collection as namespace boundary.
      format: |
        collection = client.get_or_create_collection(name="agent_memories_alice")
        collection.add(ids=["mem-001"], documents=["..."], metadatas=[...])
      source_claims: [claim-memory-namespace-chroma]
  typical_output:
    - description: Moonweave-local MemoryNamespace identity.
      format: |
        {
          "memory_store_ref": "store-prod",
          "namespace_path": ["tenant-7", "user-42", "preferences"],
          "purpose": "user preference records shared across sessions"
        }
      source_claims: [claim-memory-namespace-design]
  reference_implementations:
    - name: LangGraph Store Namespaces
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Tuple namespaces on Item and ListNamespacesOp.
    - name: Pinecone Namespaces
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      description: Index-level namespace strings for partition isolation.
    - name: Chroma Collections
      url: https://docs.trychroma.com/docs/collections/manage-collections
      description: Named collections as primary isolation boundaries.
structure:
  identity_keys:
    - memory_store_ref
    - namespace_path
  fields:
    - id: memory_store_ref
      labels: {zh: 所属存储引用, en: owning memory store reference, ja: 所属ストア参照}
      definitions:
        zh: 引用实际承载该逻辑集合的唯一 MemoryStore；相同 namespace_path 位于另一存储时形成不同命名空间。
        en: References the one MemoryStore hosting the logical collection; same namespace_path in another store is a different namespace.
        ja: 論理集合を host する唯一 MemoryStore を参照。別 store の同 path は別 namespace。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: memory-store:prod
      allowed_values: []
      source_claims: [claim-memory-namespace-langgraph]
    - id: namespace_path
      labels: {zh: 命名空间路径, en: namespace path, ja: 名前空間パス}
      definitions:
        zh: 有序非空路径段组成的完整层级键；LangGraph tuple 或 Pinecone namespace 字符串解析后的段列表。
        en: Ordered non-empty segments forming the complete hierarchical key; segment list parsed from LangGraph tuple or Pinecone namespace string.
        ja: 有序非空 segment の完全階層キー。LangGraph tuple/Pinecone namespace から解析。
      datatype: array
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: [tenant-7, user-42, preferences]
      allowed_values: []
      source_claims: [claim-memory-namespace-langgraph]
    - id: pinecone_namespace
      labels: {zh: Pinecone 命名空间, en: Pinecone namespace, ja: Pinecone 名前空間}
      definitions:
        zh: 当后端为 Pinecone 时的单字符串 namespace；可映射到 namespace_path 的单段或扁平化形式。
        en: Single-string namespace when backend is Pinecone; mappable to one segment or flattened namespace_path.
        ja: Pinecone backend 時の単一文字列 namespace。namespace_path へ写像可。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: tenant-7-user-alice
      allowed_values: []
      source_claims: [claim-memory-namespace-pinecone]
    - id: collection_name
      labels: {zh: 集合名称, en: collection name, ja: コレクション名}
      definitions:
        zh: Chroma 或类似后端的命名隔离边界；在 Chroma 映射中常作为 namespace_path 的单段。
        en: Named isolation boundary for Chroma or similar backends; often a single namespace_path segment in Chroma mappings.
        ja: Chroma 等の命名分離境界。Chroma 写像では namespace_path 一段として扱う。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: agent_memories_alice
      allowed_values: []
      source_claims: [claim-memory-namespace-chroma]
    - id: purpose
      labels: {zh: 集合用途, en: collection purpose, ja: 集合用途}
      definitions:
        zh: 可选说明该集合承载的记忆类别；帮助解释路径，但不授予访问权限。
        en: Optional description of memory class hosted; interprets the path but grants no access permission.
        ja: 記憶種別の optional 説明。path 解釈を助けるがアクセス権は与えない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: user preference records shared across sessions
      allowed_values: []
      source_claims: [claim-memory-namespace-design]
  constraints:
    - id: memory-namespace-canonical-path
      severity: error
      expression_language: plain
      expression: namespace_path contains at least one non-empty literal segment, preserves order, contains no wildcard, and is interpreted only within memory_store_ref
      explanation:
        zh: 路径至少一个非空字面段，顺序不可重排，不得使用通配段；完整身份由所属存储与路径共同决定。
        en: Path has at least one non-empty literal segment, preserves order, no wildcards; identity is owning store plus path.
        ja: 非空 literal segment 必須、順序固定、wildcard 不可。identity は store+path。
      source_claims: [claim-memory-namespace-design]
  required_relations: []
examples:
  - id: memory-namespace-example-langgraph-preferences
    labels:
      zh: LangGraph 偏好命名空间
      en: LangGraph preferences namespace
      ja: LangGraph 選好 namespace
    descriptions:
      zh: store-prod 内 namespace=("tenant-7","user-42","preferences") 收纳 user-42 偏好记录；list_namespaces 与 search 必须携带完整 tuple，tenant-8 的同名 user-42 不会命中。
      en: In store-prod, namespace=("tenant-7","user-42","preferences") holds user-42 preference records; list_namespaces and search require the full tuple—tenant-8's user-42 does not match.
      ja: store-prod の ("tenant-7","user-42","preferences") が user-42 選好を収容。完全 tuple 必須で tenant-8 同名 user は不一致。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: Item.namespace tuple and list_namespaces
    field_values:
      memory_store_ref: store-prod
      namespace_path: [tenant-7, user-42, preferences]
      purpose: user preference records shared across sessions
    related_node_ids: [MemoryNamespace, MemoryStore, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [memory_store_has_namespace, MemoryRecord-member_of-MemoryNamespace]
    source_claims: [claim-memory-namespace-langgraph, claim-memory-namespace-design]
  - id: memory-namespace-example-pinecone-tenant
    labels:
      zh: Pinecone 租户命名空间
      en: Pinecone tenant namespace
      ja: Pinecone tenant namespace
    descriptions:
      zh: 同一 Pinecone index hybrid-memories 下，Alice 的向量写入 namespace tenant-7-user-alice；query 必须指定相同 namespace，否则其他租户向量会混入结果。
      en: Under Pinecone index hybrid-memories, Alice's vectors go to namespace tenant-7-user-alice; queries must specify the same namespace or other tenants' vectors leak into results.
      ja: index hybrid-memories 内で Alice 向量は tenant-7-user-alice へ。query は同 namespace 必須。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      version: upsert and query with namespace
    field_values:
      memory_store_ref: store-pinecone-prod
      pinecone_namespace: tenant-7-user-alice
      namespace_path: [tenant-7-user-alice]
    related_node_ids: [MemoryNamespace, VectorDatabase, memory-stores-scopes, memory-embedding-indexes]
    related_relation_ids: [memory_store_has_namespace]
    source_claims: [claim-memory-namespace-pinecone, claim-memory-namespace-design]
  - id: memory-namespace-example-chroma-collection
    labels:
      zh: Chroma 集合命名空间
      en: Chroma collection namespace
      ja: Chroma collection namespace
    descriptions:
      zh: Chroma 服务上 collection agent_memories_alice 为 Alice 隔离 documents 与 embeddings；add/query 必须 targeting 同一 collection_name，不能与其他用户 collection 混查。
      en: Chroma collection agent_memories_alice isolates Alice's documents and embeddings; add/query must target the same collection_name without mixing other users' collections.
      ja: collection agent_memories_alice が Alice の documents/embeddings を分離。同一 collection_name 必須。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/manage-collections
      version: get_or_create_collection
    field_values:
      memory_store_ref: store-chroma-local
      collection_name: agent_memories_alice
      namespace_path: [agent_memories_alice]
    related_node_ids: [MemoryNamespace, MemoryStore, VectorDatabase, memory-stores-scopes]
    related_relation_ids: [memory_store_has_namespace]
    source_claims: [claim-memory-namespace-chroma, claim-memory-namespace-design]
  - id: memory-namespace-example-store-not-namespace
    labels:
      zh: 记忆存储不是命名空间
      en: Memory store is not namespace
      ja: memory store は namespace ではない
    descriptions:
      zh: store-prod 是具有 PostgreSQL 连接与 put/get/delete 接口的 MemoryStore，可承载成千上万个 namespace；它不以某一个层级集合键为身份，因此不是 MemoryNamespace。
      en: store-prod is a MemoryStore with PostgreSQL connection and put/get/delete interface hosting thousands of namespaces; it is not identified by one hierarchical collection key and is not MemoryNamespace.
      ja: store-prod は多数 namespace を host する MemoryStore で、一つの階層キーで識別されないため MemoryNamespace ではない。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: PostgresStore facility versus Item.namespace
    field_values:
      memory_store_id: store-prod
      is_memory_namespace: false
    related_node_ids: [MemoryNamespace, MemoryStore, memory-stores-scopes]
    related_relation_ids: [memory_store_has_namespace]
    source_claims: [claim-memory-namespace-langgraph, claim-memory-namespace-design]
parent_relation:
  id: memory_store_has_namespace
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含命名空间
    en: has namespace
    ja: 名前空間を持つ
  definitions:
    zh: memory_store_has_namespace 表示 MemoryNamespace 是某个 MemoryStore 内由层级 namespace key 确定的逻辑记录集合；相同键在另一存储中不是同一集合。
    en: memory_store_has_namespace states a MemoryNamespace is a logical record collection inside one MemoryStore identified by a hierarchical namespace key; the same key in another store is a different collection.
    ja: MemoryNamespace が一 MemoryStore 内の階層 namespace key による論理 record 集合。別 store の同キーは別集合。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: 検索可能な意味事実を記録し、全 instance に一律基数を課しません。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：has namespace, en: is part of store, ja: 逆方向：has namespace}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-namespace-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langgraph-namespace
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: Tuple namespaces on Items and namespace listing.
  - id: src-pinecone-namespace
    title: Pinecone Namespaces Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/use-namespaces
    source_type: official-doc
    relevance: Index namespace partitioning for multi-tenant vectors.
  - id: src-chroma-namespace
    title: Chroma Collections Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/manage-collections
    source_type: official-doc
    relevance: Named collections as isolation boundaries.
  - id: src-memory-namespace-design
    title: Moonweave MemoryNamespace design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Addressing partition separate from authorization.
source_claims:
  - id: claim-memory-namespace-langgraph
    source: src-langgraph-namespace
    supports: LangGraph BaseStore uses ordered tuple namespaces as hierarchical collection paths scoped to one store endpoint.
    locator: Item.namespace, PutOp, ListNamespacesOp
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-namespace-pinecone
    source: src-pinecone-namespace
    supports: Pinecone partitions vectors within an index using namespace strings for logical tenant isolation.
    locator: Use namespaces — upsert and query
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-namespace-chroma
    source: src-chroma-namespace
    supports: Chroma collections provide named boundaries for stored documents, embeddings, and metadata.
    locator: Manage collections
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-namespace-design
    source: src-memory-namespace-design
    supports: Moonweave MemoryNamespace identity requires owning store plus canonical namespace path without wildcard segments.
    locator: MemoryNamespace collection boundary
    evidence_kind: design-inference
    confidence: high
