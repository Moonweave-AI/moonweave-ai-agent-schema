source_claims:
  - id: claim-memory-namespace-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents routes persistent memory through backends and filesystem paths, including per-agent and project locations. MemoryNamespace is Moonweave's backend-neutral logical collection key for partitioning writes and retrievals; authorization remains a separate MemoryScope concern.
    locator: Memory > Scoped memory > agent-scoped and user-scoped backend namespaces
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-002
    source: eng-fw-langgraph-docs
    supports: LangGraph's long-term memory Store uses tuple namespaces and keys to organize, put, get, and search memories across threads. MemoryNamespace directly models that stable collection and lookup partition, while its placement under MemoryStore is Moonweave's structural decision.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-003
    source: eng-fw-langgraph-memory-store
    supports: "Direct source premise: LangGraph BaseStore is the persistent key-value store interface whose operations accept namespace paths. Moonweave design inference: memory_store_ref scopes namespace identity to one concrete store endpoint because the reference API does not assign a standalone namespace object identity."
    locator: LangGraph BaseStore reference v4.1.1 > BaseStore > get, put, search, and list_namespaces
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-namespace-004
    source: eng-fw-langgraph-memory-store
    supports: "Direct source premise: LangGraph Item defines namespace as a tuple of strings forming the hierarchical path of the collection, and PutOp describes each tuple element as one hierarchy level. Moonweave design inference: namespace_path is the canonical ordered identity component and rejects empty or wildcard segments."
    locator: LangGraph store reference v4.1.1 > Item.namespace and PutOp.namespace > hierarchical path and tuple levels
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-namespace-005
    source: eng-fw-langgraph-docs
    supports: "Direct source premise: LangGraph memory examples use tuples such as user_id plus memories to organize user-specific long-term records across threads. Moonweave design inference: purpose documents the intended collection semantics without treating a descriptive label as identity or authorization."
    locator: LangGraph Memory documentation > Add long-term memory > namespace = (user_id, memories)
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-006
    source: eng-fw-langgraph-memory-store
    supports: "Direct source premise: LangGraph defines namespace as an ordered tuple of strings representing hierarchy levels and distinguishes exact item namespaces from namespace-prefix search. Moonweave design inference: a MemoryNamespace identity uses a canonical non-wildcard full path scoped to one store."
    locator: LangGraph store reference v4.1.1 > Item.namespace, PutOp.namespace, and BaseStore.search namespace prefix
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-namespace-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents uses backend routing and filesystem paths to partition persistent memory. The tuple namespace in this example is Moonweave's backend-neutral logical collection key for tenant and user isolation.
    locator: Memory > Scoped memory > agent-scoped and user-scoped backend namespaces
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-008
    source: eng-fw-langgraph-docs
    supports: LangGraph Store persists and searches memories under tuple namespaces and keys across threads. The tenant/user/preferences tuple directly instantiates that documented addressing pattern.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-009
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents separates pluggable filesystem backends from paths and memory files routed through them. Moonweave similarly separates the store facility from a logical namespace partition.
    locator: Memory > Scoped memory > agent-scoped and user-scoped backend namespaces
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-010
    source: eng-fw-langgraph-docs
    supports: LangGraph distinguishes Store implementations from the namespace tuples and keys passed to store operations. This directly supports the facility-versus-partition boundary.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-namespace-011
    source: eng-fw-langgraph-memory-store
    supports: Listing one namespace on store-prod instantiates the official store-plus-namespace addressing contract.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-namespace-012
    source: eng-fw-langgraph-memory-store
    supports: The reference scopes namespace operations to a BaseStore instance, so equal tuples on two deployed stores do not denote one collection.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-namespace-013
    source: eng-fw-langgraph-memory-store
    supports: LangGraph BaseStore operations address data through hierarchical namespace tuples within a concrete store; Moonweave models each such store-local collection as MemoryNamespace.
    locator: LangGraph store reference > BaseStore, Item, GetOp, PutOp, ListNamespacesOp, and TTLConfig
    evidence_kind: design-inference
    confidence: high
    review_status: pending
