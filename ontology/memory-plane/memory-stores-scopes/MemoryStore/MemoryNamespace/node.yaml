schema: moonweave.ai/ontology-node/v1
id: MemoryNamespace
kind: concept
status: accepted
labels:
  zh: 记忆命名空间
  en: Memory Namespace
  ja: 記憶名前空間
semantics:
  short_definition:
    zh: 在一个 MemoryStore 内以有序路径隔离和寻址记录的逻辑分区。
    en: A logical partition that isolates and addresses records by an ordered path within one MemoryStore.
    ja: 一つのMemoryStore内で順序付きpathによりrecordを分離・アドレスする論理分区。
  definition:
    zh: >
      MemoryNamespace 是属于一个具体 MemoryStore 的逻辑集合，由 store 引用和有序 namespace_path 共同标识。
      Store 的 put、get、search 和列举操作以该路径限定记录归属与查询范围，常用来区分租户、用户、应用或记忆类别。
      它不是部署的 MemoryStore、单个 MemoryRecord、记录键 MemoryItem 或访问授权规则 MemoryScope；路径可帮助隔离数据，
      但自身不授予读取、写入或跨命名空间复用权限。
    en: >
      A MemoryNamespace is a logical collection inside one concrete MemoryStore, identified jointly by a store
      reference and an ordered namespace_path. Store put, get, search, and listing operations use that path to
      bound record membership and query scope, commonly separating tenants, users, applications, or memory classes.
      It is not the deployed MemoryStore, a single MemoryRecord, a record-key MemoryItem, or an authorization rule
      MemoryScope. A path can isolate data but does not itself grant read, write, or cross-namespace reuse permission.
    ja: >
      MemoryNamespace は一つの具体的MemoryStore内の論理集合で、store参照と順序付きnamespace_pathで共同識別されます。
      Storeのput、get、search、listingはpathを使いrecordの所属とquery範囲を限定し、tenant、user、application、memory classを分離します。
      配備MemoryStore、単一MemoryRecord、record keyであるMemoryItem、authorization ruleのMemoryScopeではありません。
      pathはdataを分離できますが、読書込やnamespace横断再利用の権限をそれ自体で与えません。
  why_needed:
    zh: 明确建模存储内的逻辑分区，可防止跨用户混查，并把“记录放在哪里”与“谁可以使用它”保持为可独立审计的问题。
    en: Explicitly modeling the logical partition prevents accidental cross-user queries and keeps “where a record lives” independently auditable from “who may use it.”
    ja: 論理分区を明示的にモデル化することで意図しないuser横断queryを防ぎ、「recordがどこにあるか」と「誰が使えるか」を独立に監査できます。
  includes:
    - zh: 包含附属于 memory-store-primary、路径为 (users,u-123,profile) 且仅收纳该分区记录的逻辑集合。
      en: A logical collection hosted by memory-store-primary at path (users,u-123,profile) and containing only records assigned to that partition.
      ja: memory-store-primaryに所属し、(users,u-123,profile) pathで、そのpartitionに割り当てられたrecordだけを収める論理集合。
  excludes:
    - zh: 排除整套 MemoryStore、数据库连接或 schema、一个 MemoryRecord、仅用于搜索的路径前缀通配符、以及声明授权、保留或可见性条件的 MemoryScope。
      en: The complete MemoryStore, a database connection or schema, one MemoryRecord, a wildcard path prefix used only for search, or MemoryScope declaring authorization, retention, or visibility conditions.
      ja: 完全なMemoryStore、database connectionまたはschema、一つのMemoryRecord、searchだけに使うwildcard path prefix、authorization、retention、visibility条件を宣言するMemoryScope。
  semantic_kind: collection
  aliases: [store namespace, memory partition]
engineering:
  explanation:
    zh: LangGraph Store 操作明确传入 tuple namespace。精确路径用于写入或读取一个逻辑集合，前缀搜索可跨多个子集合；前缀是查询条件而不是一个新的命名空间身份。
    en: LangGraph Store operations explicitly receive a tuple namespace. An exact path writes or reads one logical collection; prefix search may span child collections, and the prefix is a query condition rather than a new namespace identity.
    ja: LangGraph Store operation は tuple namespace を明示的に受け取ります。exact path は一つの論理 collection を write 又は read し、prefix search は child collection をまたげます。prefix は query condition であり新しい namespace identity ではありません。
  typical_input:
    - description: Exact namespace write
      format: |
        namespace = ("users", "u-123", "profile")
        runtime.store.put(namespace, "preferences", {"theme": "dark"})
  typical_output:
    - description: Namespace-scoped item lookup
      format: |
        item = runtime.store.get(
          ("users", "u-123", "profile"),
          "preferences",
        )
        # item belongs to the exact namespace; it is a record, not the namespace itself
  reference_implementations:
    - name: LangGraph Memory Store namespaces
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents long-term Store writes and searches using namespace tuples and keys.
structure:
  identity_keys: [memory_store_ref, namespace_path]
  fields:
    - id: memory_store_ref
      labels: {zh: 所属存储引用, en: owning store reference, ja: owning store reference}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 引用实际承载此逻辑集合的一个 MemoryStore；相同路径在另一存储中代表不同命名空间。
        en: References the one MemoryStore that hosts this logical collection; the same path in another store denotes a different namespace.
        ja: この論理集合を保持する一つのMemoryStoreを参照し、別storeの同じpathは別namespaceを表します。
      allowed_values: []
      pattern: null
      example_value: memory-store-primary
      source_claims: [claim-memory-namespace-store-locality]
    - id: namespace_path
      labels: {zh: 命名空间路径, en: namespace path, ja: namespace path}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 按顺序保存一个或多个非空字面路径段，形成集合的完整分区键；段顺序属于身份。
        en: Stores one or more ordered, non-empty literal path segments that form the collection's full partition key; segment order is part of identity.
        ja: 一つ以上の順序付き非空literal path segmentで集合の完全partition keyを構成し、segment順序もidentityの一部です。
      allowed_values: []
      pattern: null
      example_value: '["users","u-123","profile"]'
      source_claims: [claim-memory-namespace-addressing]
    - id: collection_purpose
      labels: {zh: 集合用途, en: collection purpose, ja: collection purpose}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 可选说明该集合预期承载的记录类别或应用用途；它帮助解释路径但不构成授权策略。
        en: Optionally describes the expected record class or application purpose of the collection; it interprets the path but is not an authorization policy.
        ja: collectionが想定して保持するrecord classまたはapplication purposeを任意記述し、pathを解釈しますがauthorization policyではありません。
      allowed_values: []
      pattern: null
      example_value: user profile memory shared across sessions
      source_claims: [claim-memory-namespace-scope-boundary]
  constraints:
    - id: memory-namespace-canonical-address
      severity: error
      expression_language: plain
      expression: memory_store_ref and namespace_path are required. namespace_path must contain one or more non-empty literal string segments in preserved order and must not contain a wildcard or query-only prefix marker. The pair of store reference and full path identifies one namespace.
      explanation:
        zh: 命名空间必须是可稳定定位的集合；通配符和前缀用于选择多集合的查询，不能作为一个集合的稳定身份。
        en: A namespace must be a stably locatable collection; wildcards and prefixes select multiple collections in a query and cannot be its stable identity.
        ja: namespaceは安定して位置付けられるcollectionでなければならず、wildcardやprefixはqueryで複数collectionを選択するもので安定identityにはできません。
      source_claims: [claim-memory-namespace-addressing]
    - id: memory-namespace-role-boundary
      severity: error
      expression_language: plain
      expression: A MemoryNamespace organizes store-local records but does not grant authorization, define retention, represent one stored value, or become a model-visible context. Those concerns belong respectively to MemoryScope, MemoryRetentionPolicy, MemoryRecord, and Context Assembly.
      explanation:
        zh: 路径结构可以限制寻址范围，却不能替代谁有权访问、记录生命周期或模型输入选择的独立事实。
        en: Path structure can bound addressing but cannot replace independent facts about who is authorized, a record's lifecycle, or model-input selection.
        ja: path構造はaddressingを限定できますが、誰がauthorizedか、record lifecycle、model-input selectionについての独立factを置換できません。
      source_claims: [claim-memory-namespace-scope-boundary]
  required_relations: []
examples:
  - id: MemoryNamespace-positive-langgraph-user-profile

    labels: {zh: LangGraph 用户档案命名空间, en: LangGraph user-profile namespace, ja: LangGraph user-profile namespace}

    descriptions:
      zh: Pinecone index namespace="tenant-a" 隔离向量；Weaviate multi-tenancy collection.with_tenant("org-42")；Qdrant payload index filter 按 tenant 分区。
      en: Pinecone index namespace="tenant-a" isolates vectors; Weaviate multi-tenancy collection.with_tenant("org-42"); Qdrant payload filter partitions by tenant.
      ja: Pinecone namespace、Weaviate multi-tenancy、Qdrant payload filter による tenant 分区。
    field_values: {memory_store_ref: langgraph-inmemory-store-001, namespace_path: '["users","u-123","profile"]', collection_purpose: user profile memory shared across sessions}
    related_node_ids: [MemoryNamespace, MemoryStore, MemoryRecord]
    related_relation_ids: [MemoryNamespace-part-of-MemoryStore]

    source_claims: [claim-memory-namespace-addressing, claim-memory-namespace-store-locality]
  - id: MemoryNamespace-boundary-mem0-filters-not-namespace

    labels: {zh: Mem0 filters 不是命名空间, en: Mem0 filters are not a namespace, ja: Mem0 filters は namespace ではない}

    descriptions:
      zh: MemGPT core_memory block key（如 persona）vs archival_memory 全局搜索的命名边界；Generative Agents agent_id 作用域 vs 单次对话 thread。
      en: MemGPT core_memory block key vs archival_memory global search namespace boundary; Generative Agents agent_id scope vs single-dialog thread.
      ja: MemGPT core_memory block key と archival_memory 全局検索の namespace 境界。
    field_values: {scope_id: mem0-filters-alice-support, scope_kind: user, scope_subject_ref: user:alice, permitted_operation: read}
    related_node_ids: [MemoryNamespace, MemoryScope, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-memory-namespace-scope-boundary]
  - id: MemoryNamespace-counterexample-langgraph-prefix-search

    labels: {zh: LangGraph 前缀搜索参数, en: LangGraph prefix-search parameter, ja: LangGraph prefix-search parameter}

    descriptions:
      zh: 反例：ChromaDB collection 无 metadata partition 就把所有 user 记忆混在同一 collection 且无 scope 标识。
      en: Counterexample: ChromaDB collection without metadata partition mixing all user memories without scope ID.
      ja: 反例：ChromaDB collection が metadata partition なしで全 user 記憶を混在。
    field_values: {namespace_prefix: '["users"]', query_operation: search, match_scope: multiple-namespaces}
    related_node_ids: [MemoryNamespace, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-memory-namespace-addressing]
  - id: MemoryNamespace-instance-zep-user-collection

    labels: {zh: 实例：Zep 用户会话集合, en: "Instance: Zep user session collection", ja: "事例: Zep user session collection"}

    descriptions:
      zh: pgvector CREATE TABLE items(tenant text, embedding vector(1536)) 按 tenant 列分区；Redis FT.CREATE idx PREFIX 1 doc: 前缀命名空间。
      en: pgvector CREATE TABLE items(tenant text, embedding vector(1536)) partitioned by tenant; Redis FT.CREATE idx PREFIX 1 doc: prefix namespace.
      ja: pgvector tenant 列分区。Redis FT.CREATE PREFIX 1 doc: namespace。
    field_values: {memory_store_ref: zep-memory-store-001, namespace_path: '["users","alice","sessions"]', collection_purpose: user session and entity memory}
    related_node_ids: [MemoryNamespace, MemoryStore, MemoryScope]
    related_relation_ids: [MemoryNamespace-part-of-MemoryStore]

    source_claims: [claim-memory-namespace-addressing, claim-memory-namespace-scope-boundary]
parent_relation:
  id: MemoryNamespace-part-of-MemoryStore
  predicate: part_of
  target: concept:MemoryStore
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是记忆存储的逻辑分区, en: is logical partition of memory store, ja: memory storeの論理分区である}
  definitions:
    zh: 一个 MemoryNamespace 作为特定 MemoryStore 中以完整路径界定的逻辑记录集合而存在；相同路径在不同存储中不是同一集合。
    en: A MemoryNamespace exists as a full-path-bounded logical record collection in one specific MemoryStore; the same path in another store is not the same collection.
    ja: MemoryNamespaceは一つの特定MemoryStore内で完全pathにより境界付けられた論理record collectionとして存在し、別storeの同じpathは同じcollectionではありません。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_partition, labels: {zh: 有逻辑分区, en: has logical partition, ja: 論理分区を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: A database schema name or query prefix is not a namespace until it identifies a concrete store-local record collection.
  constraints: []
  examples: []
  source_claims: [claim-memory-namespace-part-of-store]
  distinct_fact_rationale: This composition records storage-local collection membership, not access authorization or a relationship between a store and one record.
  layout_role: primary-backbone
relations: []
sources:
  - id: langgraph-memory-store
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents Store operations using namespace tuples and keys to write and retrieve long-term memory across conversations.
source_claims:
  - id: claim-memory-namespace-addressing
    source: langgraph-memory-store
    supports: LangGraph Store writes use an explicit namespace tuple and key, while store search accepts a namespace scope; tuple paths provide the operational addressing boundary for long-term memory items.
    locator: "Memory guide: long-term memory; Store put/aput and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-memory-namespace-store-locality
    source: langgraph-memory-store
    supports: Store operations execute through a concrete runtime.store object; Moonweave treats the store reference plus full namespace path as collection identity and does not equate the same path across different facilities.
    locator: "Memory guide: Access the store inside nodes"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-namespace-scope-boundary
    source: langgraph-memory-store
    supports: LangGraph namespaces organize Store writes and searches. Moonweave separately models authorization, retention, and model-visible context so a naming path is not misread as an access rule, lifecycle policy, or prompt payload.
    locator: "Memory guide: long-term Store operations and Manage short-term memory"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-namespace-part-of-store
    source: langgraph-memory-store
    supports: Modeling a stable namespace-and-key collection as a logical partition of the concrete Store on which operations run is a Moonweave composition inference based on documented Store addressing.
    locator: "Memory guide: Store namespace and key examples"
    evidence_kind: ontology-design-inference
    confidence: high
