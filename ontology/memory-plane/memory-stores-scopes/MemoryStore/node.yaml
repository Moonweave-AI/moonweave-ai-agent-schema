schema: moonweave.ai/ontology-node/v1
id: MemoryStore
kind: concept
labels:
  zh: 记忆存储
  en: memory store
  ja: 記憶ストア
semantics:
  short_definition:
    zh: 提供命名空间、持久读写、查询和生命周期操作的已部署记忆存储设施。
    en: A deployed memory-storage facility providing namespaces, durable reads and writes, queries, and lifecycle operations.
    ja: 名前空間、永続読書込、検索、ライフサイクル操作を提供する配備済み記憶保存施設です。
  definition:
    zh: MemoryStore 是一种已部署设施实体；其种差是以 store_id、backend_type 和部署范围为身份，提供一个或多个 MemoryNamespace 以及对 MemoryRecord 的持久 put/get/delete/search/list 能力。LangGraph BaseStore（PostgresStore、RedisStore）、Mem0 托管后端、Zep Memory 服务、Pinecone index 与 Chroma collection 在 Moonweave 中都可映射为 MemoryStore 或 VectorDatabase 子类。它是设施，不是其中保存的 MemoryEntity，也不是 VectorIndex 的逻辑结构本身。
    en: A MemoryStore is a deployed facility entity identified by store ID, backend type, and deployment scope, providing one or more MemoryNamespaces and durable put/get/delete/search/list for MemoryRecords. LangGraph BaseStore (PostgresStore, RedisStore), Mem0 hosted backend, Zep Memory service, Pinecone indexes, and Chroma collections map to MemoryStore or VectorDatabase subclasses in Moonweave. It is the facility, not stored MemoryEntities or VectorIndex logical structure itself.
    ja: MemoryStore は store_id/backend_type/配備範囲で識別される配備施設で、MemoryNamespace と MemoryRecord 向け put/get/delete/search/list を提供。LangGraph BaseStore、Mem0 backend、Zep、Pinecone、Chroma が MemoryStore/VectorDatabase に写像。施設であり保存 MemoryEntity や VectorIndex 構造自体ではない。
  why_needed:
    zh: 把存储设施与逻辑记忆内容分开，才能独立描述部署、可用性、后端迁移和治理策略，而不改变每条记忆的语义身份。否则无法回答“这条记录存在哪个 PostgreSQL 端点或哪个 Mem0 项目”。
    en: Separating the facility from logical memory content allows deployment, availability, backend migration, and governance to change without changing each memory's semantic identity. Otherwise teams cannot answer which PostgreSQL endpoint or Mem0 project holds a record.
    ja: 施設と論理記憶を分離しないと配備・移行・統治を記述できず、どの PostgreSQL 端点/Mem0 project に record があるか答えられない。
  includes:
    - zh: LangGraph PostgresStore/RedisStore、Mem0 托管项目、Zep memory 服务、Chroma collection 宿主，以及带 store_id、endpoint 和持久操作接口的复合后端。
      en: LangGraph PostgresStore/RedisStore, Mem0 hosted projects, Zep memory services, Chroma collection hosts, and composite backends with store ID, endpoint, and durable operation interfaces.
      ja: LangGraph PostgresStore/RedisStore、Mem0 托管 project、Zep memory service、Chroma collection host、store_id/endpoint/永続操作 interface 付き複合 backend。
  excludes:
    - zh: MemoryRecord、MemoryFile、MemoryNamespace、MemoryRetentionPolicy、VectorIndex 内部结构，以及只描述连接参数的配置对象。
      en: MemoryRecord, MemoryFile, MemoryNamespace, MemoryRetentionPolicy, VectorIndex internal structure, and configuration objects describing only connection parameters.
      ja: MemoryRecord、MemoryFile、MemoryNamespace、MemoryRetentionPolicy、VectorIndex 内部、接続パラメータのみの設定。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: LangGraph 通过 PostgresStore.from_conn_string 或 RedisStore 实例化 BaseStore；Mem0 客户端指向 api.mem0.ai 项目；Zep 客户端指向 getzep.com API；Chroma get_or_create_collection 创建 collection 宿主。Moonweave memory_store_id 标识端点，backend_type 记录 langgraph_postgres、mem0_cloud、zep、chroma 等。VectorDatabase 子类额外暴露 vector upsert/query；索引配置归 memory-embedding-indexes 模块。
    en: LangGraph instantiates BaseStore via PostgresStore.from_conn_string or RedisStore; Mem0 client targets api.mem0.ai projects; Zep client targets getzep.com API; Chroma get_or_create_collection creates collection hosts. Moonweave memory_store_id identifies the endpoint; backend_type records langgraph_postgres, mem0_cloud, zep, chroma, etc. VectorDatabase subclasses additionally expose vector upsert/query; index configuration belongs to memory-embedding-indexes.
    ja: LangGraph PostgresStore/RedisStore、Mem0 api.mem0.ai、Zep getzep.com、Chroma collection。memory_store_id で端点、backend_type で種別。VectorDatabase は vector upsert/query 追加。索引設定は memory-embedding-indexes。
  typical_input:
    - description: LangGraph PostgresStore connection for cross-thread BaseStore.
      format: |
        from langgraph.store.postgres import PostgresStore
        store = PostgresStore.from_conn_string("postgresql://memory-primary:5432/agent_memory")
        store.setup()
      source_claims: [claim-memory-store-langgraph]
    - description: Mem0 client initialization for hosted memory backend.
      format: |
        from mem0 import MemoryClient
        client = MemoryClient(api_key=os.environ["MEM0_API_KEY"])
        # project-scoped hosted store
      source_claims: [claim-memory-store-mem0]
    - description: Chroma collection as named storage boundary.
      format: |
        client = chromadb.HttpClient(host="localhost", port=8000)
        collection = client.get_or_create_collection(name="agent_memories_alice")
      source_claims: [claim-memory-store-chroma]
    - description: Zep client for user memory graph backend.
      format: |
        from zep_cloud.client import Zep
        client = Zep(api_key=os.environ["ZEP_API_KEY"])
      source_claims: [claim-memory-store-zep]
  typical_output:
    - description: Moonweave-local MemoryStore facility descriptor.
      format: |
        {
          "memory_store_id": "store-prod",
          "backend_type": "langgraph_postgres",
          "deployment_scope": "remote",
          "endpoint": "postgresql://memory-primary:5432/agent_memory",
          "supported_operations": ["put", "get", "delete", "search", "list_namespaces"]
        }
      source_claims: [claim-memory-store-design]
  reference_implementations:
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore with PostgresStore, RedisStore, put/get/delete/search.
    - name: Mem0 Platform
      url: https://docs.mem0.ai
      description: Hosted memory API backend scoped by project and entity IDs.
    - name: Chroma Collections
      url: https://docs.trychroma.com/docs/collections/manage-collections
      description: Named collections as storage and isolation boundaries.
    - name: Zep Memory
      url: https://help.getzep.com/concepts
      description: User and session memory graph service backend.
structure:
  identity_keys:
    - memory_store_id
  fields:
    - id: memory_store_id
      labels: {zh: 存储标识, en: memory store ID, ja: 記憶ストア ID}
      definitions:
        zh: 唯一标识一个记忆存储端点或部署实例。
        en: Uniquely identifies one memory-store endpoint or deployment instance.
        ja: 一つの memory-store 端点/配備 instance を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: store-prod
      allowed_values: []
      source_claims: [claim-memory-store-design]
    - id: backend_type
      labels: {zh: 后端类型, en: backend type, ja: backend 種別}
      definitions:
        zh: 实现该存储的引擎或 SaaS 类型，如 langgraph_postgres、mem0_cloud、zep、chroma、pinecone。
        en: Engine or SaaS type implementing the store, such as langgraph_postgres, mem0_cloud, zep, chroma, pinecone.
        ja: langgraph_postgres、mem0_cloud、zep、chroma、pinecone 等の engine/SaaS 種別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: langgraph_postgres
      allowed_values: []
      source_claims: [claim-memory-store-langgraph]
    - id: deployment_scope
      labels: {zh: 部署范围, en: deployment scope, ja: 配置範囲}
      definitions:
        zh: 端点部署在 local、remote 或 hybrid；不改变 MemoryStore 语义身份。
        en: Whether the endpoint is local, remote, or hybrid; does not change MemoryStore semantic identity.
        ja: local/remote/hybrid の配備位置。MemoryStore 意味 identity は変えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: remote
      allowed_values: [local, remote, hybrid]
      source_claims: [claim-memory-store-design]
    - id: endpoint
      labels: {zh: 访问端点, en: endpoint, ja: エンドポイント}
      definitions:
        zh: 连接字符串、HTTP URL 或 API base URL，用于读写该存储。
        en: Connection string, HTTP URL, or API base URL used to read and write the store.
        ja: store 読書込に用いる connection string/HTTP URL/API base URL。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: postgresql://memory-primary:5432/agent_memory
      allowed_values: []
      source_claims: [claim-memory-store-langgraph]
  constraints:
    - id: memory-store-facility-not-content
      severity: error
      expression_language: plain
      expression: MemoryStore identity requires store_id, backend_type, endpoint, and operation surface; it must not embed record value or semantic item content
      explanation:
        zh: 存储设施身份不得嵌入记录内容或语义项文本。
        en: Store facility identity must not embed record values or semantic item text.
        ja: store 施設 identity に record 値/semantic item 文本を埋め込まない。
      source_claims: [claim-memory-store-design]
  required_relations: []
examples:
  - id: memory-store-example-langgraph-postgres
    labels:
      zh: LangGraph PostgresStore 记忆存储
      en: LangGraph PostgresStore memory store
      ja: LangGraph PostgresStore memory store
    descriptions:
      zh: 生产环境通过 PostgresStore.from_conn_string 部署 LangGraph BaseStore，endpoint 为 postgresql://memory-primary:5432/agent_memory，跨 thread 共享 namespace-key Items，并提供 put/get/delete/search/list_namespaces。
      en: Production deploys LangGraph BaseStore via PostgresStore.from_conn_string with endpoint postgresql://memory-primary:5432/agent_memory, sharing namespace-key Items across threads with put/get/delete/search/list_namespaces.
      ja: PostgresStore.from_conn_string で BaseStore を配備。thread 横断 namespace-key Item と put/get/delete/search/list_namespaces。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: PostgresStore.from_conn_string
    field_values:
      memory_store_id: store-prod
      backend_type: langgraph_postgres
      deployment_scope: remote
      endpoint: postgresql://memory-primary:5432/agent_memory
    related_node_ids: [MemoryStore, MemoryNamespace, MemoryRecord, memory-stores-scopes]
    related_relation_ids: [memory_store_has_namespace, MemoryRecord-stored_in-MemoryStore]
    source_claims: [claim-memory-store-langgraph, claim-memory-store-design]
  - id: memory-store-example-mem0-cloud
    labels:
      zh: Mem0 托管记忆存储
      en: Mem0 hosted memory store
      ja: Mem0 托管 memory store
    descriptions:
      zh: 应用使用 Mem0 MemoryClient 连接 api.mem0.ai 项目，通过 POST/GET/DELETE /v1/memories/ 持久化 scoped memories。Moonweave 将该项目映射为 backend_type=mem0_cloud 的 MemoryStore，Mem0 id 映射到 MemoryRecord.external_memory_id。
      en: The app uses Mem0 MemoryClient against an api.mem0.ai project, persisting scoped memories via POST/GET/DELETE /v1/memories/. Moonweave maps the project to MemoryStore with backend_type=mem0_cloud; Mem0 ids map to MemoryRecord.external_memory_id.
      ja: Mem0 MemoryClient が api.mem0.ai project に接続。backend_type=mem0_cloud の MemoryStore へ写像。Mem0 id→external_memory_id。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: MemoryClient and /v1/memories/ API
    field_values:
      memory_store_id: store-mem0-prod
      backend_type: mem0_cloud
      deployment_scope: remote
      endpoint: https://api.mem0.ai
    related_node_ids: [MemoryStore, MemoryRecord, MemoryScope, memory-stores-scopes]
    related_relation_ids: [MemoryRecord-stored_in-MemoryStore]
    source_claims: [claim-memory-store-mem0, claim-memory-store-design]
  - id: memory-store-example-chroma-collection-host
    labels:
      zh: Chroma collection 记忆存储
      en: Chroma collection memory store
      ja: Chroma collection memory store
    descriptions:
      zh: 应用通过 chromadb.HttpClient 创建 collection agent_memories_alice，以 collection 为隔离边界存储 documents、embeddings 与 metadata。Moonweave 将 Chroma 服务实例建模为 MemoryStore（或 VectorDatabase），collection_name 映射到 MemoryNamespace。
      en: The app creates collection agent_memories_alice via chromadb.HttpClient, storing documents, embeddings, and metadata with collection as isolation boundary. Moonweave models the Chroma service as MemoryStore (or VectorDatabase); collection_name maps to MemoryNamespace.
      ja: chromadb.HttpClient で collection agent_memories_alice を作成。Chroma サービスを MemoryStore/VectorDatabase にモデル化。collection_name→MemoryNamespace。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/manage-collections
      version: get_or_create_collection and add
    field_values:
      memory_store_id: store-chroma-local
      backend_type: chroma
      deployment_scope: local
      endpoint: http://localhost:8000
      collection_name: agent_memories_alice
    related_node_ids: [MemoryStore, VectorDatabase, MemoryNamespace, memory-embedding-indexes]
    related_relation_ids: [memory_store_has_namespace]
    source_claims: [claim-memory-store-chroma, claim-memory-store-design]
  - id: memory-store-example-retention-policy-boundary
    labels:
      zh: 保留策略不是记忆存储
      en: Retention policy is not memory store
      ja: retention policy は memory store ではない
    descriptions:
      zh: policy-session-v5 规定 30 天删除与 90 天 tombstone，但没有 store_id、endpoint 或 put/get 接口。它通过 memory_store_governed_by_retention_policy 治理 store-prod，但自身是 MemoryRetentionPolicy。
      en: policy-session-v5 specifies 30-day delete and 90-day tombstone but has no store_id, endpoint, or put/get interface. It governs store-prod via memory_store_governed_by_retention_policy while remaining MemoryRetentionPolicy.
      ja: policy-session-v5 は期限/tombstone を規定するが store_id/endpoint/put/get なし。memory_store_governed_by_retention_policy で store-prod を統治する MemoryRetentionPolicy。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: TTLConfig versus BaseStore facility
    field_values:
      retention_policy_id: policy-session
      version: "5"
      is_memory_store: false
    related_node_ids: [MemoryStore, MemoryRetentionPolicy, memory-stores-scopes]
    related_relation_ids: [memory_store_governed_by_retention_policy]
    source_claims: [claim-memory-store-langgraph, claim-memory-store-design]
parent_relation: null
relations:
  - id: memory_store_governed_by_retention_policy
    predicate: memory_store_governed_by_retention_policy
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受保留策略治理
      en: governed by retention policy
      ja: 保持方針に統治される
    definitions:
      zh: memory_store_governed_by_retention_policy 表示某一 MemoryRetentionPolicy 版本是 MemoryStore 的默认保留治理基线；不等于 TTL 已启用，也不覆盖记录级 legal hold。
      en: memory_store_governed_by_retention_policy states a MemoryRetentionPolicy version is the default retention baseline for a MemoryStore; it does not assert TTL is enabled and does not override record-level legal holds.
      ja: MemoryRetentionPolicy 版が MemoryStore の既定保持基線。TTL 有効化や record 級 legal hold 上書きを意味しない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: 検索可能な意味事実を記録し、全 instance に一律基数を課しません。
    inverse_reading:
      predicate: is_target_of_memory_store_governed_by_retention_policy
      labels: {zh: 反向：governed by, en: is target of governed by, ja: 逆方向：governed by}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-memory-store-design]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:MemoryRetentionPolicy
sources:
  - id: src-langgraph-store-facility
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: PostgresStore, RedisStore, BaseStore operations.
  - id: src-mem0-store
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Hosted memory API as persistence backend.
  - id: src-chroma-store
    title: Chroma Collections Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/manage-collections
    source_type: official-doc
    relevance: Collection-hosted vector and document storage.
  - id: src-zep-store
    title: Zep Memory Documentation
    publisher: Zep
    url: https://help.getzep.com/concepts
    source_type: official-doc
    relevance: User and session memory graph service.
  - id: src-memory-store-design
    title: Moonweave MemoryStore design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Facility identity separate from records and retention policy.
source_claims:
  - id: claim-memory-store-langgraph
    source: src-langgraph-store-facility
    supports: LangGraph BaseStore implementations provide durable namespace-key operations across threads as a deployable persistence facility.
    locator: PostgresStore, RedisStore, BaseStore.put/get/delete/search
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-store-mem0
    source: src-mem0-store
    supports: Mem0 hosted API acts as a remote memory persistence backend addressable by project and entity-scoped operations.
    locator: MemoryClient and REST /v1/memories/
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-store-chroma
    source: src-chroma-store
    supports: Chroma collections provide named storage boundaries with add/query operations on documents and embeddings.
    locator: get_or_create_collection and collection.add
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-store-zep
    source: src-zep-store
    supports: Zep exposes a memory graph service backend for user and session scoped memory APIs.
    locator: Zep client and memory routes
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-store-design
    source: src-memory-store-design
    supports: Moonweave MemoryStore identifies deployment endpoints separately from MemoryRecord content and MemoryRetentionPolicy rules.
    locator: MemoryStore facility boundary
    evidence_kind: design-inference
    confidence: high
