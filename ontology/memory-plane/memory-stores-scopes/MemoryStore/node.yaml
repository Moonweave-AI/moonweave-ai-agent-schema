schema: moonweave.ai/ontology-node/v1
id: MemoryStore
kind: concept
status: accepted
labels:
  zh: 记忆存储
  en: Memory Store
  ja: 記憶ストア
semantics:
  short_definition:
    zh: 以命名空间和键提供记忆记录读写与搜索操作的存储设施。
    en: A storage facility that provides namespaced, keyed read/write and search operations for memory records.
    ja: 名前空間とkeyで記憶recordの読書込と検索を提供する保存施設。
  definition:
    zh: >
      MemoryStore 是已配置的存储设施，而不是一条记忆内容。它以稳定的 store_id、后端类型和操作接口标识，
      接受 namespace、key 与值作为写入或读取的边界，并可按 namespace 查询已有记录。它承载 MemoryNamespace
      和其中的 MemoryRecord，且可由关系数据库、文档库、对象存储或专门的 VectorDatabase 实现。它不等同于
      MessageHistory、线程 checkpoint、某次 Context Assembly 的模型可见输入、EmbeddingVector、VectorIndex 或单个 MemoryRecord。
    en: >
      A MemoryStore is a configured storage facility, not one memory-content item. It is identified by a stable
      store_id, backend kind, and operation interface; it accepts a namespace, key, and value at read/write
      boundaries and can query records within a namespace. It holds MemoryNamespaces and their MemoryRecords and
      may be implemented by a relational database, document store, object store, or specialized VectorDatabase.
      It is not MessageHistory, a thread checkpoint, a model-visible input from one Context Assembly, an
      EmbeddingVector, a VectorIndex, or one MemoryRecord.
    ja: >
      MemoryStore は一つの記憶内容ではなく、設定済みの保存施設です。安定したstore_id、backend kind、operation
      interfaceで識別され、読書込境界でnamespace、key、valueを受け取り、namespace内のrecordを検索できます。
      MemoryNamespaceとそのMemoryRecordを保持し、relational database、document store、object store、専用の
      VectorDatabaseで実装できます。MessageHistory、thread checkpoint、一回のContext Assemblyのmodel-visible input、
      EmbeddingVector、VectorIndex、一つのMemoryRecordではありません。
  why_needed:
    zh: 将设施与内容、线程状态和模型上下文分开，才能独立治理访问、迁移后端与审计写入，而不会把所有可读取信息误当作长期记忆。
    en: Separating the facility from content, thread state, and model context permits independent access control, backend migration, and write auditing without treating every readable item as long-term memory.
    ja: 施設を内容、thread state、model contextから分離することで、読取可能な全情報をlong-term memoryと誤認せずに、アクセス制御、backend移行、書込監査を独立して扱えます。
  includes:
    - zh: 含有可识别端点、命名空间寻址和 put/get/search 操作的 LangGraph Store 或应用部署的文档、关系、对象或向量存储服务。
      en: A LangGraph Store or application-deployed document, relational, object, or vector-storage service with an identifiable endpoint, namespace addressing, and put/get/search operations.
      ja: 識別可能なendpoint、namespace addressing、put/get/search操作を持つLangGraph Storeまたはアプリ配備のdocument、relational、object、vector storage service。
  excludes:
    - zh: 排除单条 MemoryRecord、逻辑分区 MemoryNamespace、存储对象的键 MemoryItem、文件内容 MemoryFile、未写入的 Chunk、数值 EmbeddingVector、索引条目、消息历史及其 checkpoint。
      en: A single MemoryRecord, a logical MemoryNamespace partition, a store object's key MemoryItem, file content MemoryFile, an unwritten Chunk, numeric EmbeddingVector, index entry, message history, or its checkpoint.
      ja: 単一MemoryRecord、論理分区MemoryNamespace、store objectのkeyであるMemoryItem、file内容MemoryFile、未書込Chunk、数値EmbeddingVector、index entry、message history、そのcheckpoint。
  semantic_kind: entity
  aliases: [long-term memory store, namespaced memory backend]
engineering:
  explanation:
    zh: LangGraph 将长期记忆放在 Store 中；应用显式选择 namespace 和 key，调用 put 写入 JSON 值，再调用 search 或 get 读取。读取结果仍须由 Context Assembly 选择后才可进入模型输入。
    en: LangGraph places long-term memory in a Store. Application code explicitly selects a namespace and key, calls put to write a JSON value, then uses search or get to read. A Context Assembly must still select a read result before it enters model input.
    ja: LangGraph は long-term memory を Store に置きます。application code は namespace と key を明示的に選び、put で JSON value を書き込み、search 又は get で読みます。read result は Context Assembly が選択してから初めて model input に入ります。
  typical_input:
    - description: Namespaced memory write
      format: |
        namespace = ("users", "u-123", "profile")
        runtime.store.put(namespace, "preferences", {"theme": "dark"})
  typical_output:
    - description: Namespaced query result
      format: |
        items = runtime.store.search(
          ("users", "u-123", "profile"),
          query="theme preference",
          limit=3,
        )
        # items are MemoryRecord candidates, not automatically visible prompt context
  reference_implementations:
    - name: LangGraph Memory Store
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents long-term Store access with namespace, key, put/aput, and search operations.
structure:
  identity_keys: [store_id]
  fields:
    - id: store_id
      labels: {zh: 存储标识, en: store ID, ja: store ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个已配置的存储设施或服务端点，而非其中任一记录或命名空间。
        en: Stably identifies one configured storage facility or service endpoint, not a record or namespace within it.
        ja: 設定済みstorage facilityまたはservice endpoint一つを安定識別し、その中のrecordやnamespaceではありません。
      allowed_values: []
      pattern: null
      example_value: memory-store-primary
      source_claims: [claim-memory-store-operations]
    - id: backend_kind
      labels: {zh: 后端类型, en: backend kind, ja: backend kind}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明该设施使用的存储实现类别，例如 document-store、relational-store、object-store 或 vector-database；它不是存入内容的向量类型。
        en: Declares the facility's storage implementation class, such as document-store, relational-store, object-store, or vector-database; it is not the vector type of stored content.
        ja: document-store、relational-store、object-store、vector-databaseなど施設のstorage implementation classを宣言し、保存内容のvector typeではありません。
      allowed_values: []
      pattern: null
      example_value: document-store
      source_claims: [claim-memory-store-operations]
    - id: operation_interface_ref
      labels: {zh: 操作接口引用, en: operation interface reference, ja: operation interface reference}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识用于读、写、删除和查询该设施的已部署接口或版本，使设施能力与业务数据分开。
        en: Identifies the deployed interface or version used to read, write, delete, and query the facility, separating facility capabilities from business data.
        ja: 施設の読取、書込、削除、検索に使う配備済みinterfaceまたは版を識別し、施設能力をbusiness dataから分離します。
      allowed_values: []
      pattern: null
      example_value: langgraph-store-v1
      source_claims: [claim-memory-store-operations]
    - id: namespace_addressing_mode
      labels: {zh: 命名空间寻址模式, en: namespace addressing mode, ja: namespace addressing mode}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明写入和搜索如何指定逻辑分区，例如 tuple-prefix；它不等于该分区本身的 MemoryNamespace 身份。
        en: Declares how writes and searches specify logical partitions, such as a tuple prefix; it is not the identity of the MemoryNamespace itself.
        ja: tuple prefixなど、書込と検索が論理分区を指定する方法を宣言し、そのMemoryNamespace自体のidentityではありません。
      allowed_values: []
      pattern: null
      example_value: tuple-prefix
      source_claims: [claim-memory-store-operations]
    - id: write_audit_mode
      labels: {zh: 写入审计模式, en: write audit mode, ja: write audit mode}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识该设施是否以及如何记录写入的执行证据；它不替代 MemoryRecord 的来源或保留状态。
        en: Identifies whether and how the facility records execution evidence for writes; it does not replace a MemoryRecord's provenance or retention state.
        ja: 施設が書込のexecution evidenceを記録するか、どう記録するかを識別し、MemoryRecordのprovenanceやretention stateを置換しません。
      allowed_values: []
      pattern: null
      example_value: append-only-write-log
      source_claims: [claim-memory-store-audit-boundary]
  constraints:
    - id: memory-store-addressability
      severity: error
      expression_language: plain
      expression: store_id, backend_kind, operation_interface_ref, and namespace_addressing_mode are required. The interface must support explicit namespace-and-key writes or reads and namespace-scoped queries; a value cannot be attributed to this store only because it appeared in model context.
      explanation:
        zh: 有可读取文本不证明其已存入长期记忆；设施必须提供可检查的命名空间寻址与读写证据。
        en: Readable text does not prove it was stored as long-term memory; the facility needs inspectable namespace addressing and read/write evidence.
        ja: 読取可能なtextだけではlong-term memoryへの保存を証明せず、施設には検査可能なnamespace addressingと読書込証拠が必要です。
      source_claims: [claim-memory-store-operations]
    - id: memory-store-boundary
      severity: error
      expression_language: plain
      expression: A MemoryStore is a storage facility and must not be inferred from message history, a checkpoint, one visible context window, an embedding vector, a vector index, or one record. A VectorDatabase can specialize this facility, but a VectorIndex or EmbeddingVector cannot.
      explanation:
        zh: 线程状态、模型输入、数值表示、索引组织和存储设施是不同层；相同文本或相同检索流程不会合并其身份。
        en: Thread state, model input, numeric representation, index organization, and storage facility are distinct layers; shared text or retrieval flow does not collapse their identities.
        ja: thread state、model input、numeric representation、index organization、storage facilityは別層であり、共有textまたはretrieval flowでidentityは統合されません。
      source_claims: [claim-memory-store-boundary]
  required_relations: []
examples:
  - id: MemoryStore-positive-mem0-user-memory

    labels: {zh: Mem0 用户级记忆存储, en: Mem0 user-level memory store, ja: Mem0 ユーザーレベル記憶ストア}

    descriptions:
      zh: "Generative Agents Memory Stream 按时间序 append 观察；MemGPT archival_memory_insert(content) 写入归档；Pinecone index.upsert(vectors=[(\"id1\", vec, {\"text\":...})]) serverless 持久化。"
      en: "Generative Agents Memory Stream appends observations chronologically; MemGPT archival_memory_insert(content) writes archival tier; Pinecone index.upsert(vectors=[(\"id1\", vec, {\"text\":...})]) on serverless index."
      ja: Generative Agents Memory Stream が時系列で observation を append。MemGPT archival_memory_insert(content) が archive 層へ write。Pinecone index.upsert serverless 永続化。
    field_values: {store_id: mem0-user-store-001, backend_kind: document-store, operation_interface_ref: mem0-platform-v3, namespace_addressing_mode: user-agent-run-filters, write_audit_mode: append-only-write-log}
    related_node_ids: [MemoryStore, MemoryNamespace, MemoryRecord]
    related_relation_ids: []

    source_claims: [claim-memory-store-operations]
  - id: MemoryStore-boundary-langgraph-checkpoint

    labels: {zh: LangGraph 线程 checkpoint, en: LangGraph thread checkpoint, ja: LangGraph thread checkpoint}

    descriptions:
      zh: MemGPT main_context（工作记忆）vs archival_memory（归档）vs recall_memory（回忆）三层边界；Generative Agents Memory Stream 不等于单次 ContextAssembly 可见输入。
      en: MemGPT main_context vs archival_memory vs recall_memory tier boundary; Generative Agents Memory Stream is not one ContextAssembly visible input.
      ja: MemGPT main_context vs archival_memory vs recall_memory 三層境界。Generative Agents Memory Stream は一回の ContextAssembly 可視 input ではない。
    field_values: {checkpoint_id: checkpoint-thread-88, thread_id: thread-88, state_kind: message-history, namespace_key_api: absent}
    related_node_ids: [MemoryStore, MessageHistory]
    related_relation_ids: []

    source_claims: [claim-memory-store-boundary]
  - id: MemoryStore-counterexample-openai-embedding

    labels: {zh: OpenAI 嵌入向量响应, en: OpenAI embedding vector response, ja: OpenAI embedding vector response}

    descriptions:
      zh: 反例：OpenAI POST /v1/embeddings 返回 1536 维向量但无 store_id/namespace/key 的 put/search 接口，不能当作 MemoryStore。
      en: Counterexample: OpenAI POST /v1/embeddings returns 1536-d vectors without store_id/namespace/key put/search APIs—not a MemoryStore.
      ja: 反例：OpenAI POST /v1/embeddings が 1536 次元 vector を返すが store_id/namespace/key put/search API がなく MemoryStore にならない。
    field_values: {embedding_id: emb-42, dimensions: 1536, model: text-embedding-3-small, input_digest: sha256:2d9ea4}
    related_node_ids: [MemoryStore, EmbeddingVector, VectorIndex]
    related_relation_ids: []

    source_claims: [claim-memory-store-boundary]
  - id: MemoryStore-instance-langgraph-store

    labels: {zh: 实例：LangGraph InMemoryStore, en: "Instance: LangGraph InMemoryStore", ja: "事例: LangGraph InMemoryStore"}

    descriptions:
      zh: "Qdrant client.upsert(collection_name=\"docs\", points=[PointStruct(id=1, vector=[...], payload={\"text\":...})])；ChromaDB collection.add(documents=[...], ids=[...]) 命名空间化存储实例。"
      en: Qdrant client.upsert(collection_name="docs", points=[PointStruct(...)]) ; ChromaDB collection.add(documents=[...], ids=[...]) namespaced store instance.
      ja: Qdrant client.upsert + ChromaDB collection.add の namespace 化 store 実例。
    field_values: {store_id: langgraph-inmemory-store-001, backend_kind: document-store, operation_interface_ref: langgraph-store-v1, namespace_addressing_mode: tuple-prefix, write_audit_mode: append-only-write-log}
    related_node_ids: [MemoryStore, MemoryNamespace, MemoryRecord, MemoryFile]
    related_relation_ids: []

    source_claims: [claim-memory-store-operations, claim-memory-store-audit-boundary]
parent_relation: null
relations: []
sources:
  - id: langgraph-memory-store
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents a long-term Store with namespace-and-key put/aput and search operations, separately from short-term thread state.
  - id: mem0-platform-v3
    title: Mem0 Platform v3 memory API
    url: https://docs.mem0.ai/migration/platform-v2-to-v3
    type: official-doc
    source_type: official-doc
    relevance: Documents add, search, get_all, and delete with user_id filters for managed long-term memory.
  - id: openai-embeddings-api
    title: OpenAI Embeddings API
    url: https://platform.openai.com/docs/api-reference/embeddings
    type: official-doc
    source_type: official-doc
    relevance: Returns embedding vectors without namespace-key store operations, illustrating representation versus facility boundary.
  - id: memgpt-paper
    title: "MemGPT: Towards LLMs as Operating Systems"
    url: https://arxiv.org/abs/2310.08560
    type: academic-paper
    source_type: academic-paper
    relevance: Distinguishes an LLM's limited main context from external recall and archival storage managed through retrieval and editing operations.
source_claims:
  - id: claim-memory-store-operations
    source: langgraph-memory-store
    supports: LangGraph documents long-term memory through a Store whose application code writes values with a namespace and key using put or aput and retrieves matching items through namespace-scoped search.
    locator: "Memory guide: long-term memory; Store put/aput and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-memory-store-boundary
    source: langgraph-memory-store
    supports: LangGraph distinguishes short-term memory held as thread state and checkpoints from long-term Store access; Moonweave further separates store facilities from a model-visible context, records, vectors, and index structures.
    locator: "Memory guide: short-term memory versus long-term memory; Manage short-term memory"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-store-audit-boundary
    source: memgpt-paper
    supports: MemGPT distinguishes limited in-context memory from external recall and archival storage that agents read and write through explicit operations. Moonweave models write-audit behavior on a storage facility separately from the stored record's own provenance and retention state.
    locator: "Sections 2.2 and 2.3: external context; self-directed editing and retrieval"
    evidence_kind: ontology-design-inference
    confidence: medium