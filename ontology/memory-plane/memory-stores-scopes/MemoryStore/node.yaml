source_claims:
  - id: claim-memory-store-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents defines pluggable storage backends, including StoreBackend for cross-thread durable storage, and exposes filesystem operations through those backends. Moonweave models the deployed endpoint that provides such persistent operations as MemoryStore; its ontology placement remains a design inference.
    locator: Backends > Built-in backends; StoreBackend (LangGraph store)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-002
    source: lit-mas-generative-agents
    supports: Generative Agents describes a memory stream database that maintains a comprehensive record of an agent's experience for later retrieval, reflection, and planning. This supports a persistent storage anchor while Moonweave adds endpoint identity, deployment scope, governance, and implementation-neutral operations.
    locator: Paper > Section 4.1, Memory and Retrieval > Memory stream
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents exposes pluggable memory backends whose selection changes where persistent files are read and written. Moonweave assigns memory_store_id to identify one concrete backend endpoint independently of the records it contains; Deep Agents does not define this identifier field.
    locator: Memory > Backends > StateBackend, StoreBackend, and CompositeBackend
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-004
    source: eng-fw-langgraph-docs
    supports: LangGraph's Store abstraction is a persistence facility addressed separately from namespace-and-key memory values. Moonweave uses memory_store_id as the stable endpoint identity for that facility; the field and uniqueness constraint are Moonweave-specific.
    locator: Overview > Memory > long-term Store abstraction and cross-thread persistence
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' StateBackend stores memory through agent state and represents a runtime-local backend option. Moonweave maps a store endpoint deployed within the local runtime boundary to memory-store-local; the deployment label is not a Deep Agents enum.
    locator: Memory > Backends > StateBackend
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-006
    source: eng-fw-langgraph-docs
    supports: LangGraph permits local Store implementations for development and execution within one process boundary. Moonweave records that placement as memory-store-local while keeping the MemoryStore identity independent from deployment scope.
    locator: Overview > Memory > Store implementations and persistence
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' StoreBackend delegates persistent memory to a LangGraph Store rather than keeping it solely in agent-local state. Moonweave uses memory-store-remote when that store endpoint is reached across a deployment boundary; the local-versus-remote facet is Moonweave-defined.
    locator: Memory > Backends > StoreBackend
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-008
    source: eng-fw-langgraph-docs
    supports: LangGraph's Store is an abstract persistence interface and may be backed by infrastructure outside the agent process. Moonweave classifies such an endpoint as memory-store-remote; LangGraph does not prescribe this deployment-scope value.
    locator: Overview > Memory > long-term Store abstraction and cross-thread persistence
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-009
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' CompositeBackend routes different filesystem paths to different backend implementations, allowing state-backed and store-backed memory to coexist. Moonweave names a MemoryStore spanning local and remote placement memory-store-hybrid; the label is a Moonweave inference.
    locator: Memory > Backends > CompositeBackend and path-based routing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-010
    source: eng-fw-langgraph-docs
    supports: LangGraph's Store abstraction can be composed with runtime state and application routing. Moonweave classifies an endpoint that intentionally combines local and remote persistence as memory-store-hybrid; this deployment taxonomy is not a LangGraph contract.
    locator: Overview > Memory > graph state and long-term Store
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-011
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes state-backed, store-backed, and composite memory backends. Moonweave records their placement implications in deployment_scope as local, remote, or hybrid while preserving the same MemoryStore identity; the three-value facet is Moonweave-specific.
    locator: Memory > Backends > StateBackend, StoreBackend, and CompositeBackend
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-store-012
    source: eng-fw-langgraph-docs
    supports: LangGraph separates graph state from the long-term Store abstraction, leaving concrete deployment to implementations. Moonweave makes that deployment choice explicit in deployment_scope without treating it as a change in MemoryStore semantic identity.
    locator: Overview > Durable execution and memory > graph state versus long-term Store
    evidence_kind: design-inference
    confidence: medium
