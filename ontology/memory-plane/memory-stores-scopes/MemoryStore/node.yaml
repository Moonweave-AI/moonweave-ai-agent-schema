schema: moonweave.ai/ontology-node/v1
id: MemoryStore
kind: concept
status: accepted
labels:
  zh: 记忆存储
  en: memory store
  ja: 記憶ストア
semantics:
  short_definition:
    zh: 提供命名空间、持久读写、查询和生命周期操作的已部署记忆存储设施。
    en: A deployed memory-storage facility providing namespaces, durable reads and writes, queries, and lifecycle operations.
    ja: 名前空間、永続読書込、検索、ライフサイクル操作を提供する配備済み記憶保存施設です。
  definition:
    zh: 记忆存储是一种已部署设施实体；其种差是：它以 store_id、后端类型和部署范围为身份，提供一个或多个 MemoryNamespace 以及对 MemoryRecord 的持久写入、读取、更新、删除、列举、查询、事务或审计能力。它可以由数据库、对象存储、文件系统或复合后端实现，但不是其中保存的 MemoryEntity。
    en: A MemoryStore is a deployed facility entity identified by store ID, backend type, and deployment scope. It provides one or more MemoryNamespaces and durable write, read, update, delete, list, query, transaction, or audit capabilities for MemoryRecords. It may be implemented by a database, object store, filesystem, or composite backend but is not a stored MemoryEntity.
    ja: MemoryStore は store_id、backend型、配備範囲で識別される配備施設実体です。一つ以上の MemoryNamespace と MemoryRecord の永続書込・読取・更新・削除・列挙・検索・取引・監査能力を提供します。DB、オブジェクトストア、ファイルシステム、複合backendで実装できますが保存 MemoryEntity ではありません。
  why_needed:
    zh: 把存储设施与逻辑记忆内容分开，才能独立描述部署、可用性、事务、后端迁移和治理策略，而不改变每条记忆的语义身份。
    en: Separating the facility from logical memory content allows deployment, availability, transactions, backend migration, and governance to change without changing each memory's semantic identity.
    ja: 保存施設と論理記憶内容を分離することで、各記憶の意味同一性を変えずに配備・可用性・取引・backend移行・統治を記述できます。
  includes:
    - zh: 纳入 LangGraph Store、租户级 PostgreSQL memory service 或文件系统复合后端这类具有 store_id、部署范围、命名空间和持久操作接口的设施。
      en: Includes facilities such as a LangGraph Store, tenant-scoped PostgreSQL memory service, or composite filesystem backend with store ID, deployment scope, namespaces, and durable operation interface.
      ja: LangGraph Store、テナント単位 PostgreSQL memory service、複合ファイルbackendのように store_id、配備範囲、名前空間、永続操作接口を持つ施設を含みます。
  excludes:
    - zh: 排除 MemoryRecord、MemoryFile、MemoryNamespace、MemoryRetentionPolicy、索引结构和只描述连接参数的配置对象。
      en: Excludes MemoryRecord, MemoryFile, MemoryNamespace, MemoryRetentionPolicy, index structures, and configuration objects that only describe connection parameters.
      ja: MemoryRecord、MemoryFile、MemoryNamespace、MemoryRetentionPolicy、索引構造、接続値だけを記す設定対象を除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - memory_store_id
  fields:
    - id: memory_store_id
      labels:
        zh: 存储 ID
        en: memory store ID
        ja: 記憶ストア ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一个记忆存储端点。
        en: Uniquely identifies one memory-store endpoint.
        ja: 一つの記憶ストア端点を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: memory-store-project
      source_claims:
        - claim-memory-store-003
        - claim-memory-store-004
    - id: deployment_scope
      labels:
        zh: 部署范围
        en: deployment scope
        ja: 配置範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明存储端点部署在本地、远程或混合位置；该 facet 不改变 MemoryStore 身份。
        en: States whether the store endpoint is deployed locally, remotely, or in a hybrid arrangement; the facet does not change MemoryStore identity.
        ja: ストア端点がローカル、リモート、混合のどこに配置されるかを示し、この facet は MemoryStore 同一性を変えません。
      allowed_values:
        - id: memory-store-local
          value: local
          labels:
            zh: 本地
            en: local
            ja: ローカル
          definitions:
            zh: 本地部署范围。
            en: local deployment scope.
            ja: ローカル配置範囲です。
          status: accepted
          source_claims:
            - claim-memory-store-005
            - claim-memory-store-006
        - id: memory-store-remote
          value: remote
          labels:
            zh: 远程
            en: remote
            ja: リモート
          definitions:
            zh: 远程部署范围。
            en: remote deployment scope.
            ja: リモート配置範囲です。
          status: accepted
          source_claims:
            - claim-memory-store-007
            - claim-memory-store-008
        - id: memory-store-hybrid
          value: hybrid
          labels:
            zh: 混合
            en: hybrid
            ja: 混合
          definitions:
            zh: 混合部署范围。
            en: hybrid deployment scope.
            ja: 混合配置範囲です。
          status: accepted
          source_claims:
            - claim-memory-store-009
            - claim-memory-store-010
      pattern: null
      example_value: remote
      source_claims:
        - claim-memory-store-011
        - claim-memory-store-012
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryStore-example-positive-001
    kind: positive
    labels:
      zh: 记忆存储正例
      en: Positive example of memory store
      ja: 記憶ストアの正例
    scenario_id: null
    descriptions:
      zh: 远程设施 store-project-memory-01 通过 StoreBackend 部署，在 tenant-7/user-42 命名空间内跨会话保存记录，并提供按键读取、写入、删除、检索和列举命名空间的操作；它受 retention-project-v2 治理，但策略并不取代该设施。
      en: The remote facility store-project-memory-01 is deployed through StoreBackend, persists records across threads under namespace tenant-7/user-42, and provides keyed read, write, delete, search, and namespace-listing operations. It is governed by retention-project-v2, but that policy does not replace the facility.
      ja: 遠隔施設 store-project-memory-01 は StoreBackend で配備され、tenant-7/user-42 名前空間にスレッド横断でレコードを保存し、キー読取・書込・削除・検索・名前空間列挙を提供します。retention-project-v2 の統治対象ですが、方針が施設そのものを置換するわけではありません。
    field_values:
      memory_store_id: memory-store-project
      deployment_scope: remote
    related_node_ids:
      - MemoryStore
      - MemoryRetentionPolicy
    related_relation_ids:
      - memory_store_governed_by_retention_policy
    expected_result:
      zh: 该运行可查询 MemoryStore 以及方向保持不变的事实 memory_store_governed_by_retention_policy。
      en: The run can query MemoryStore together with direction-preserving fact memory_store_governed_by_retention_policy.
      ja: この実行では MemoryStore と方向を保持した事実 memory_store_governed_by_retention_policy を共に照会できます。
    why_valid_or_invalid:
      zh: 对象由 store ID、部署位置、命名空间和一组持久化操作共同识别，因此它是承载记录的设施；retention-project-v2 仅规定设施执行的保留行为。
      en: Store ID, deployment location, namespaces, and a durable operation surface jointly identify a facility that carries records; retention-project-v2 only specifies retention behavior the facility enforces.
      ja: store ID、配備場所、名前空間、永続操作面がレコードを保持する施設を同定します。retention-project-v2 は施設が実施する保持挙動だけを規定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-store-013
      - claim-memory-store-014
  - id: MemoryStore-example-boundary-001
    kind: boundary
    labels:
      zh: 记忆存储边界例
      en: Boundary case for memory store
      ja: 記憶ストアの境界例
    scenario_id: null
    descriptions:
      zh: retention-project-v2 规定偏好记录保留 180 天、用户撤回时立即删除，并保留终止审计；它没有 store ID、部署端点、命名空间或读写接口，因此是 MemoryRetentionPolicy，而不是执行该规范的 MemoryStore。
      en: retention-project-v2 says preference records are retained for 180 days, deleted immediately on user withdrawal, and leave termination audit evidence. It has no store ID, deployment endpoint, namespace, or read/write interface, so it is a MemoryRetentionPolicy rather than the MemoryStore that enforces it.
      ja: retention-project-v2 は選好レコードを180日保持し、利用者撤回時に即時削除し、終了監査を残すと規定します。store ID、配備端点、名前空間、読書込インターフェースを持たないため、実施施設 MemoryStore ではなく MemoryRetentionPolicy です。
    field_values: {}
    related_node_ids:
      - MemoryStore
      - MemoryRetentionPolicy
    related_relation_ids:
      - memory_store_governed_by_retention_policy
    expected_result:
      zh: MemoryRetentionPolicy 保持其原有类型，验证器不得凭关系共现把它提升为 MemoryStore。
      en: MemoryRetentionPolicy retains its own type; validation must not promote it to MemoryStore from relation co-occurrence.
      ja: MemoryRetentionPolicy は元の型を維持し、関係の共起だけで MemoryStore へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 策略以条件、时限和处置结果为身份；存储设施以端点、部署和操作能力为身份。前者治理后者并不会让两个概念同类。
      en: A policy is identified by conditions, time limits, and required dispositions; a store facility is identified by endpoint, deployment, and operations. Governance links the two without making them the same kind.
      ja: 方針は条件・期限・必須処置で、保存施設は端点・配備・操作能力で同定されます。前者が後者を統治しても同じ種類にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-store-015
      - claim-memory-store-016
  - id: MemoryStore-example-instance-001
    kind: instance
    labels:
      zh: 记忆存储结构化实例
      en: Structured instance of memory store
      ja: 記憶ストアの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: memory-store-project 是部署范围为 remote 的项目记忆端点；该节点内实例只声明稳定端点 ID 和部署位置，命名空间、记录及保留策略通过关系连接，不重复编码为存储类型。
      en: memory-store-project is a project-memory endpoint with remote deployment scope. This node-local instance declares only the stable endpoint ID and deployment location; namespaces, records, and retention policies remain related objects rather than duplicated store types.
      ja: memory-store-project は deployment_scope=remote のプロジェクト記憶端点です。ノード内インスタンスは安定端点IDと配備位置だけを宣言し、名前空間・レコード・保持方針は重複したストア型ではなく関係対象として保ちます。
    field_values:
      memory_store_id: memory-store-project
      deployment_scope: remote
    related_node_ids:
      - MemoryStore
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: memory_store_id 给出设施身份，deployment_scope 给出端点位于远程；二者都描述设施本身，且没有把记录内容或治理规范误塞进实体字段。
      en: memory_store_id supplies facility identity and deployment_scope locates the endpoint remotely. Both fields describe the facility itself without embedding record content or governance specifications into the entity.
      ja: memory_store_id は施設同一性を、deployment_scope は遠隔端点を示します。両項目とも施設自体を記述し、レコード内容や統治仕様を実体項目へ混入しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-store-017
      - claim-memory-store-018
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: memory_store_governed_by_retention_policy
    predicate: memory_store_governed_by_retention_policy
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受保留策略治理
      en: governed by retention policy
      ja: 保持方針に統治される
    definitions:
      zh: memory_store_governed_by_retention_policy 表示某一 MemoryRetentionPolicy 版本是 MemoryStore 的默认保留治理基线，适用于没有更具体记录级覆盖的条目；它不等于后端 TTL 功能已经启用，也不覆盖记录级法律保留例外。
      en: memory_store_governed_by_retention_policy states that a MemoryRetentionPolicy version is the default retention baseline for a MemoryStore when no more specific record policy overrides it. It does not assert that backend TTL is enabled and does not override record-level legal holds.
      ja: memory_store_governed_by_retention_policy は MemoryRetentionPolicy 版が、より具体的な記録方針のない MemoryStore の既定保持基準であることを示します。backend TTL 有効化を意味せず記録単位 legal hold を上書きしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_memory_store_governed_by_retention_policy
      labels:
        zh: 反向：memory store governed by retention policy
        en: is target of memory store governed by retention policy
        ja: 逆方向：memory store governed by retention policy
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: memory_store_governed_by_retention_policy-example-positive-001
        kind: positive
        labels:
          zh: 受保留策略治理正例
          en: "Positive case: governed by retention policy"
          ja: 保持方針に統治されるの正例
        scenario_id: null
        descriptions:
          zh: store-user-memory 采用 policy-default-30d；未单独绑定策略的会话记录继承 30 天到期动作。
          en: store-user-memory adopts policy-default-30d, so session records without a specific policy inherit its 30-day expiry action.
          ja: store-user-memory は policy-default-30d を採用し、個別方針のない会話記録は30日期限動作を継承します。
        field_values: {}
        related_node_ids:
          - MemoryStore
          - MemoryRetentionPolicy
        related_relation_ids:
          - memory_store_governed_by_retention_policy
        expected_result:
          zh: 策略解析先返回记录覆盖，否则返回存储默认策略。
          en: Policy resolution returns a record override first and otherwise the store default.
          ja: 方針解決は記録上書きを優先し、なければストア既定を返します。
        why_valid_or_invalid:
          zh: 默认策略版本与适用存储端点均被明确固定。
          en: Both the default policy version and applicable store endpoint are explicit.
          ja: 既定方針版と適用ストア端点が明示されています。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-store-019
      - id: memory_store_governed_by_retention_policy-example-boundary-001
        kind: boundary
        labels:
          zh: 受保留策略治理边界例
          en: "Boundary case: governed by retention policy"
          ja: 保持方針に統治されるの境界例
        scenario_id: null
        descriptions:
          zh: postgres-store 支持 TTL 列，但没有配置任何 MemoryRetentionPolicy。
          en: postgres-store exposes a TTL column but has no configured MemoryRetentionPolicy.
          ja: postgres-store は TTL 列を持ちますが MemoryRetentionPolicy が設定されていません。
        field_values: {}
        related_node_ids:
          - MemoryStore
          - MemoryRetentionPolicy
        related_relation_ids:
          - memory_store_governed_by_retention_policy
        expected_result:
          zh: 能力存在不建立治理关系。
          en: Backend capability alone does not establish governance.
          ja: backend 能力だけでは統治関係を作りません。
        why_valid_or_invalid:
          zh: 机制支持与已采用的版本化策略是两个事实。
          en: Mechanism support and adoption of a versioned policy are distinct facts.
          ja: 機構対応と版付き方針採用は別事実です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-store-020
    source_claims:
      - claim-memory-store-021
