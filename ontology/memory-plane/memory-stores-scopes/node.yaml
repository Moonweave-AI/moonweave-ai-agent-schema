schema: moonweave.ai/ontology-node/v1
id: memory-stores-scopes
kind: module
status: accepted
labels:
  zh: 记忆对象与存储
  en: Memory objects and stores
  ja: 記憶オブジェクトとストア
semantics:
  short_definition:
    zh: 记忆对象与存储区分“保存什么”与“保存在哪里”。MemoryEntity 及其 MemoryItem、MemoryRecord 和 MemoryFile 分支描述可持久识别的记忆信息；MemoryStore 及 MemoryNamespace 描述存储设施与命名空间。作用域与保留要求是约束记忆记录的可组合信息，而写入、合并、过期和驱逐是生命周期操作。
    en: Memory objects and stores separates what is persistently remembered from where it is stored. MemoryEntity and its item, record, and file branches describe identifiable memory information; MemoryStore and MemoryNamespace describe storage facilities and address scopes. Scope and retention are composable constraints, while writes, merges, expiry, and eviction are lifecycle operations.
    ja: 記憶オブジェクトとストアは記憶実体を主要概念とするオントロジー境界です。MemoryEntity と MemoryRecord、MemoryItem、MemoryFile、および同一性キーと版参照。 所属判定は次に従います：対象の同一性が記憶記録・ファイルの業務キー、Store、Namespace、または独立に組合せ可能な記憶分類 facet で決まる場合に所有します。
  definition:
    zh: MemoryEntity 是信息对象根，其身份由稳定键、内容或载体、来源、版本和当前生命周期状态构成；MemoryStore 是部署后的存储设施根，提供命名空间与持久读写能力。VectorDatabase 是可托管向量索引的存储后端，但索引结构本身归“检索表示与索引”。
    en: "MemoryEntity and MemoryStore are parallel roots: the former identifies durable memory objects and their versions, while the latter identifies the facilities and namespaces that hold them. A logical retrieval index remains in retrieval representations and indexes even when a database service in this module hosts it."
    ja: 記憶オブジェクトとストアは記憶実体を主要概念とするオントロジー境界です。MemoryEntity と MemoryRecord、MemoryItem、MemoryFile、および同一性キーと版参照。 所属判定は次に従います：対象の同一性が記憶記録・ファイルの業務キー、Store、Namespace、または独立に組合せ可能な記憶分類 facet で決まる場合に所有します。
  why_needed:
    zh: 定义可持久识别的记忆对象、存储后端与命名空间，并以可组合 facet 表达种类、时长、作用域和保留要求。
    en: Define persistently identifiable memory objects, storage backends, and namespaces, using composable facets for kind, duration, scope, and retention requirements.
    ja: 永続識別可能な記憶オブジェクト、保存バックエンド、名前空間を定義し、kind、duration、scope、retention を組合せ可能な facet で表します。
  includes:
    - zh: MemoryEntity 及 MemoryRecord、MemoryItem、MemoryFile 与它们的身份键和版本引用。
      en: MemoryEntity and MemoryRecord, MemoryItem, and MemoryFile, with their identity keys and version references.
      ja: MemoryEntity と MemoryRecord、MemoryItem、MemoryFile、および同一性キーと版参照。
    - zh: MemoryStore、本地或远程存储、向量后端、MemoryNamespace，以及 kind、duration、scope、retention facet。
      en: MemoryStore, local and remote stores, vector backends, MemoryNamespace, and kind, duration, scope, and retention facets.
      ja: MemoryStore、ローカル・リモートストア、ベクトルバックエンド、MemoryNamespace、kind、duration、scope、retention facet。
  excludes:
    - zh: Episodic、Semantic、Procedural 与 Working、ShortTerm、LongTerm 不组成一棵互斥单继承树，而是不同 facet 值。
      en: Episodic, Semantic, Procedural, Working, ShortTerm, and LongTerm do not form one mutually exclusive single-inheritance tree; they are values of different facets.
      ja: Episodic、Semantic、Procedural、Working、ShortTerm、LongTerm は相互排他的単一継承木ではなく、異なる facet の値です。
    - zh: Write、Merge、Evict、Expire 等操作归记忆生命周期；Index 是索引结构而 VectorDatabase 是此处的存储后端。
      en: Write, Merge, Evict, Expire, and related operations belong to memory lifecycle; Index is an index structure while VectorDatabase is a storage backend here.
      ja: Write、Merge、Evict、Expire などの操作は記憶ライフサイクルに属し、Index は索引構造、VectorDatabase はここでの保存バックエンドです。
  semantic_kind: null
  aliases: []
purpose:
  zh: 定义可持久识别的记忆对象、存储后端与命名空间，并以可组合 facet 表达种类、时长、作用域和保留要求。
  en: Define persistently identifiable memory objects, storage backends, and namespaces, using composable facets for kind, duration, scope, and retention requirements.
  ja: 永続識別可能な記憶オブジェクト、保存バックエンド、名前空間を定義し、kind、duration、scope、retention を組合せ可能な facet で表します。
structure: null
examples:
  - id: memory-stores-scopes-cq-composable-facets-v3-example-positive
    kind: positive
    labels:
      zh: 语义到持久链正例
      en: Semantic-to-persistence chain positive case
      ja: 意味から永続鎖の正例
    scenario_id: null
    descriptions:
      zh: item-language@v2 由当前记录 record-17 表示；record-17 以 predecessor_id=record-12 明确替代同一 namespace/key 的 record-12，并存于 store-prod 的 namespace=(tenant-7,user-42,preferences)。
      en: item-language@v2 is represented by current record-17; record-17 explicitly supersedes record-12 for the same namespace and key through predecessor_id=record-12, and is persisted in store-prod under namespace=(tenant-7,user-42,preferences).
      ja: item-language@v2 は現行 record-17 に表現され、record-17 は predecessor_id=record-12 により同じ namespace/key の record-12 を明示的に置換し、store-prod の namespace=(tenant-7,user-42,preferences) に保存されます。
    field_values:
      memory_item:
        item_id: item-language
        semantic_key: user-preference.response-language
      predecessor_record:
        record_id: record-12
        namespace: tenant-7/user-42/preferences
        key: response-language
        version: 1
        value: en-US
      current_record:
        record_id: record-17
        namespace: tenant-7/user-42/preferences
        key: response-language
        version: 2
        value: zh-CN
        predecessor_id: record-12
      memory_store:
        store_id: store-prod
        backend_type: PostgreSQL
        endpoint: postgresql://memory-primary.internal:5432/agent_memory
      namespace_tuple:
        - tenant-7
        - user-42
        - preferences
    related_node_ids:
      - MemoryItem
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
    related_relation_ids:
      - MemoryItem-represented_by-MemoryRecord
      - MemoryRecord-supersedes-MemoryRecord
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
    expected_result:
      zh: 返回一个语义 Item、两条独立寻址的 Record 版本、显式前序边，以及当前版本的 Store 与 Namespace。
      en: Return one semantic Item, two separately addressed Record versions, the explicit predecessor edge, and the current version's Store and Namespace.
      ja: 一つの意味 Item、独立住所の二 Record 版、明示的先行辺、現行版の Store と Namespace を返します。
    why_valid_or_invalid:
      zh: Item ID 与两条 namespace/key/version 记录分别稳定；predecessor_id 证明有向版本承继，存储地址不会替代语义身份。
      en: The Item ID and both namespace/key/version records remain separately stable; predecessor_id proves directed version succession, and storage address does not replace semantic identity.
      ja: Item ID と二つの namespace/key/version 記録は別々に安定し、predecessor_id が有向版継承を証明し、保存住所は意味同一性を代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-003
  - id: memory-stores-scopes-cq-composable-facets-v3-example-counter
    kind: counterexample
    labels:
      zh: Item 与 Record 合并反例
      en: Item-Record collapse counterexample
      ja: Item-Record同一化の反例
    scenario_id: null
    descriptions:
      zh: 模型仅因 record-17 的写入时间晚于 record-12 就断言 supersedes，同时把 item-language 的 item_id 直接当作数据库 key；它既没有 predecessor_id，也混淆了 Item 与 Record 身份。
      en: A model asserts that record-17 supersedes record-12 merely because its write timestamp is later and also uses item-language's item ID directly as the database key; it has no predecessor_id and collapses Item and Record identity.
      ja: model は record-17 の書込時刻が record-12 より後という理由だけで supersedes を主張し、item-language の item_id をDB keyとして直接使います。predecessor_id がなく Item と Record の同一性も混同しています。
    field_values:
      memory_item_id: item-language
      older_record_id: record-12
      older_written_at: 2026-07-15T09:00:00Z
      newer_record_id: record-17
      newer_written_at: 2026-07-16T09:00:00Z
      supersession_asserted_from_timestamp_only: true
      predecessor_id_present: false
      database_key_used: item-language
      record_address_present: false
      validation_decision: reject-identity-collapse-and-chronology-only-supersession
    related_node_ids:
      - MemoryItem
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
    related_relation_ids:
      - MemoryItem-represented_by-MemoryRecord
      - MemoryRecord-supersedes-MemoryRecord
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
    expected_result:
      zh: 拒绝仅凭时间推断 supersedes，并要求独立的 Item/Record 身份与显式 predecessor_id。
      en: Reject timestamp-only supersession and require separate Item and Record identities plus an explicit predecessor_id.
      ja: 時刻だけの supersedes 推論を拒否し、別々の Item/Record 同一性と明示的 predecessor_id を要求します。
    why_valid_or_invalid:
      zh: 写入先后只说明时间顺序，不能证明同一业务记忆的替代；缺少 predecessor_id 时不得断言该边。
      en: Write order establishes only chronology, not replacement within one business-memory lineage; without predecessor_id the edge must not be asserted.
      ja: 書込順は時系列だけを示し、同一業務記憶系列の置換を証明しません。predecessor_id がなければこの辺を主張できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-004
  - id: memory-stores-scopes-cq-storage-location-v3-example-positive
    kind: positive
    labels:
      zh: 四项分离正例
      en: Four-facet separation positive case
      ja: 四facet分離の正例
    scenario_id: null
    descriptions:
      zh: record-17 存于 store-prod、属于 preferences namespace、受 scope-user42@v3 约束并由 policy-user-memory@v5 治理。
      en: record-17 is stored in store-prod, belongs to the preferences namespace, is constrained by scope-user42@v3, and is governed by policy-user-memory@v5.
      ja: record-17 は store-prod に保存され preferences namespace に属し scope-user42@v3 に制約され policy-user-memory@v5 に統治されます。
    field_values:
      memory_record:
        record_id: record-17
        namespace: tenant-7/user-42/preferences
        key: response-language
        version: 2
      memory_store:
        store_id: store-prod
        backend_type: PostgreSQL
        endpoint: postgresql://memory-primary.internal:5432/agent_memory
      memory_namespace_id: namespace-tenant7-user42-preferences
      memory_scope:
        scope_id: scope-user42@v3
        subject_selector: principal.user_id == 'user-42'
        allowed_operations:
          - read
          - update
        environment_condition: session.tenant_id == 'tenant-7'
      retention_policy:
        policy_id: policy-user-memory@v5
        retention_days: 365
        expiry_disposition: mark-ineligible-then-audit-delete
    related_node_ids:
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
      - MemoryScope
      - MemoryRetentionPolicy
    related_relation_ids:
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
      - MemoryRecord-scoped_by-MemoryScope
      - MemoryRecord-governed_by-MemoryRetentionPolicy
    expected_result:
      zh: 分别返回后端、地址集合、访问规范与保留规范。
      en: Return backend, address collection, access specification, and retention specification separately.
      ja: backend・住所集合・access仕様・保持仕様を別々に返します。
    why_valid_or_invalid:
      zh: 四个端点具有不同 semantic kind、身份键和判定问题。
      en: The four endpoints have different semantic kinds, identity keys, and decision questions.
      ja: 四端点は異なるsemantic kind・同一性key・判定質問を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-005
  - id: memory-stores-scopes-cq-storage-location-v3-example-counter
    kind: counterexample
    labels:
      zh: 命名空间即权限反例
      en: Namespace-as-permission counterexample
      ja: namespace即権限の反例
    scenario_id: null
    descriptions:
      zh: 系统看到 namespace=(tenant-7,user-42) 就允许任何同租户 Actor 删除记录，没有查询 MemoryScope 的主体与操作条件。
      en: The system sees namespace=(tenant-7,user-42) and lets any same-tenant Actor delete the record without evaluating MemoryScope subject and operation conditions.
      ja: system は namespace=(tenant-7,user-42) だけで同tenant全Actorに削除を許し MemoryScope の主体・操作条件を評価しません。
    field_values:
      memory_record_id: record-17
      namespace_tuple:
        - tenant-7
        - user-42
        - preferences
      requester_principal_id: user-99
      requester_tenant_id: tenant-7
      requested_operation: delete
      memory_scope_lookup_performed: false
      subject_attribute_evaluated: false
      operation_attribute_evaluated: false
      environment_attribute_evaluated: false
      incorrect_authorization_decision: allow
      required_authorization_decision: deny
    related_node_ids:
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
      - MemoryScope
      - MemoryRetentionPolicy
    related_relation_ids:
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
      - MemoryRecord-scoped_by-MemoryScope
      - MemoryRecord-governed_by-MemoryRetentionPolicy
    expected_result:
      zh: 拒绝授权并报告缺少主体、操作与环境判定。
      en: Deny authorization and report missing subject, operation, and environment evaluation.
      ja: 認可を拒否し主体・操作・環境評価欠落を報告します。
    why_valid_or_invalid:
      zh: 命名空间只说明逻辑存储地址；它没有表达请求主体、删除操作、环境条件或策略求值结果，因此不能充当授权决定。
      en: A namespace supplies a logical storage address, not the subject, delete operation, environment conditions, or evaluated policy required for authorization.
      ja: namespace は論理保存住所だけを示し、request subject・delete operation・environment condition・policy evaluation を表さないため認可判断になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-006
  - id: memory-stores-scopes-cq-backend-versus-index-v3-example-positive
    kind: positive
    labels:
      zh: 文件物化正例
      en: File materialization positive case
      ja: ファイル物化の正例
    scenario_id: null
    descriptions:
      zh: preferences.md@v9 物化 record-17 与 record-18；两条记录分别保留 key 与 version，并通过 store-prod 和 preferences namespace 寻址。
      en: preferences.md@v9 materializes record-17 and record-18; each retains its key and version and is addressed through store-prod and the preferences namespace.
      ja: preferences.md@v9 は record-17・record-18 を物化し、各記録は key・version を保持し store-prod・preferences namespace でアドレスされます。
    field_values:
      memory_file:
        file_id: preferences.md@v9
        path: /memories/tenant-7/user-42/preferences.md
        version: 9
        sha256: 23b9f612299b1aee3a2790df7e4475ce047669aab7b70e15a6a1137f4bdcde03
      materialized_records:
        - record_id: record-17
          key: response-language
          version: 2
          value_sha256: f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0
        - record_id: record-18
          key: response-style
          version: 4
          value_sha256: 9dc5f344545687188aeccc50572adfe4818cfd0f375ca42bb7d997de43e3d70f
      memory_store_id: store-prod
      memory_store_endpoint: s3://moonweave-memory-prod/tenant-7/user-42/
      namespace_tuple:
        - tenant-7
        - user-42
        - preferences
      index_identity_asserted: false
    related_node_ids:
      - MemoryFile
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
    related_relation_ids:
      - MemoryFile-materializes-MemoryRecord
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
      - memory_store_has_namespace
    expected_result:
      zh: 返回一个带版本摘要的文件载体，以及 record-17、record-18 两个独立的 namespace/key/version 逻辑地址和同一后端端点。
      en: Return the versioned file carrier, two independent namespace/key/version record addresses, and their shared store endpoint without inventing an index identity.
      ja: 版 digest を持つ一つの file carrier と、record-17・record-18 の独立した namespace/key/version 論理住所、共通 backend endpoint を返します。
    why_valid_or_invalid:
      zh: 文件路径、记录地址和后端端点均未被合并。
      en: File path, record addresses, and backend endpoint remain unmerged.
      ja: file経路・記録住所・backend端点は統合されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-007
  - id: memory-stores-scopes-cq-backend-versus-index-v3-example-counter
    kind: counterexample
    labels:
      zh: README 误作物化反例
      en: README-as-materialization counterexample
      ja: README物化誤認の反例
    scenario_id: null
    descriptions:
      zh: README.md 提到 record、store 与 namespace 三个术语，却不包含任何记录值、key 或 version。
      en: README.md mentions record, store, and namespace but contains no record value, key, or version.
      ja: README.md は record・store・namespace を記述しますが記録値・key・versionを含みません。
    field_values:
      file_id: README.md@main-8d4f2c1
      path: /docs/README.md
      mentioned_terms:
        - record
        - store
        - namespace
      record_values_present: false
      record_keys_present: false
      record_versions_present: false
      materialization_relation_asserted: true
      validation_decision: reject-terminology-cooccurrence-as-materialization
    related_node_ids:
      - MemoryFile
      - MemoryRecord
      - MemoryStore
      - MemoryNamespace
    related_relation_ids:
      - MemoryFile-materializes-MemoryRecord
      - MemoryRecord-stored_in-MemoryStore
      - MemoryRecord-member_of-MemoryNamespace
      - memory_store_has_namespace
    expected_result:
      zh: 拒绝建立 materializes 关系，并逐项指出 README.md 缺少记录值、逻辑 key 与版本身份。
      en: Reject the materializes relation and report that README.md contains no record value, logical key, or version identity.
      ja: 用語の共起だけでは materializes 関係を作らず、README.md に record value・logical key・version identity がないことを個別に示します。
    why_valid_or_invalid:
      zh: 说明文件仅讨论概念，没有承载可由 namespace/key/version 再识别的记录实例，术语出现不能替代物化证据。
      en: A descriptive file merely discusses concepts; without namespace/key/version-addressable instances, terminology cannot substitute for materialization evidence.
      ja: 説明 file は概念に言及するだけで namespace/key/version から再識別できる record instance を担わず、用語出現は物化証拠になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-stores-scopes-008
