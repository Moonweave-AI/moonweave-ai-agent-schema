  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - MemoryEntity
      - MemoryStore
    allowed_backbone_predicates:
      - governed_by
      - is_a
      - memory_store_has_namespace
      - scoped_by
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后保留 MemoryEntity 与 MemoryStore 两个显示根。MemoryScope 和 MemoryRetentionPolicy 仍是可跨记录复用的独立规范身份，但分别通过 scoped_by 与 governed_by 成为 MemoryRecord 的主阅读子节点；这些可选事实不把规范误写成 MemoryEntity 子类，也不要求每个记录必有同一策略。stored_in 继续作为可迁移、可复制的跨根运行事实，不能反向把 MemoryStore 挂到记录下。
            en: Point-by-point review retains MemoryEntity and MemoryStore as the two display roots. MemoryScope and MemoryRetentionPolicy remain independently reusable specification identities but appear as primary reading children of MemoryRecord through scoped_by and governed_by. These optional facts neither recast the specifications as MemoryEntity subtypes nor require every record to share one policy. stored_in remains a migratable, replicable cross-root runtime fact and cannot place MemoryStore below a record.
            ja: 個別審査後、表示rootは MemoryEntity と MemoryStore の二つです。MemoryScope と MemoryRetentionPolicy は記録横断で再利用可能な独立specification identityのまま、scoped_by/governed_by により MemoryRecord の主読解childになります。このoptional factはspecificationをMemoryEntity subtypeにせず、全recordへ同一policyも要求しません。stored_inはmigration/replication可能なcross-root runtime factで、MemoryStoreをrecord下へ逆配置しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 模块保留 MemoryEntity 与 MemoryStore 两根：前者是被持久化的记忆对象，后者是提供命名空间和读写接口的部署设施，MemoryStore 的定义明确排除它是一个 stored MemoryEntity，故不能挂在 MemoryRecord 下。MemoryRecord 以 scoped_by 与 governed_by 展开范围和保留政策；stored_in 保持可迁移、可复制的跨根运行事实，MemoryStore 则以 memory_store_has_namespace 展开命名空间。
            en: The module retains two roots, MemoryEntity and MemoryStore. The former is a persisted memory object; the latter is a deployed facility providing namespaces and read/write interfaces, and its definition explicitly excludes being a stored MemoryEntity, so it must not hang below MemoryRecord. MemoryRecord unfolds scope and retention policy through scoped_by and governed_by; stored_in remains a migratable and replicable cross-root runtime fact, while MemoryStore unfolds MemoryNamespace through memory_store_has_namespace.
            ja: MemoryEntity と MemoryStore の二 root を保持します。前者は persisted memory object、後者は namespace/read-write interface を提供する deployed facility で、定義上 stored MemoryEntity を除外するため MemoryRecord 下に置けません。MemoryRecord は scoped_by/governed_by で scope/retention policy を展開し、stored_in は migration/replication 可能な cross-root runtime fact、MemoryStore は memory_store_has_namespace で MemoryNamespace を展開します。
