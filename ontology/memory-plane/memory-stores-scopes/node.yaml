schema: moonweave.ai/ontology-node/v1
id: memory-stores-scopes
kind: module
labels:
  zh: 记忆对象与存储
  en: Memory objects and stores
  ja: 記憶オブジェクトとストア
semantics:
  short_definition:
    zh: 区分记忆存什么、存在哪、属于谁。
    en: Separates what is remembered, where it is stored, and who it belongs to.
    ja: 記憶内容・保存場所・帰属主体を分けます。
  definition:
    zh: 记忆对象与存储模块定义可持久识别的记忆实体、部署后的存储设施，以及租户、用户、智能体或会话等作用域边界。MemoryEntity 及其 MemoryItem、MemoryRecord、MemoryFile 分支描述“保存什么”；MemoryStore 与 MemoryNamespace 描述“保存在哪里”；MemoryScope 与 MemoryRetentionPolicy 描述“谁可访问、保留多久”。写入、合并、过期与驱逐属于记忆生命周期；向量索引内部结构属于表示与索引，即使由本模块托管的数据库服务承载也不因此变成存储类型。
    en: Memory objects and stores defines persistently identifiable memory entities, deployed storage facilities, and scope boundaries for tenants, users, agents, or sessions. MemoryEntity with its MemoryItem, MemoryRecord, and MemoryFile branches describe what is remembered; MemoryStore and MemoryNamespace describe where it lives; MemoryScope and MemoryRetentionPolicy describe who may access it and how long it is kept. Writes, merges, expiry, and eviction belong to memory lifecycle; vector index internals belong to representations and indexes even when hosted by a store service here.
    ja: 記憶オブジェクトとストアは永続識別可能な記憶実体、デプロイ済みストア、tenant/user/agent/session 等の作用域境界を定義します。MemoryEntity と MemoryItem・MemoryRecord・MemoryFile が「何を保存するか」、MemoryStore と MemoryNamespace が「どこに保存するか」、MemoryScope と MemoryRetentionPolicy が「誰がアクセスでき、どれだけ保持するか」を表します。書込・マージ・期限切れ・退避は記憶ライフサイクル、ベクトル索引内部は表現と索引の所有です。
  why_needed:
    zh: 没有清晰的存储与作用域模型，同一用户偏好会被另一会话覆盖，智能体 A 的记忆会泄漏给智能体 B，命名空间路径还会被误当成权限。团队也无法回答“这条记忆属于哪个 tenant、存在哪个 collection 或 namespace、与哪条旧版本有替代关系”。
    en: Without a clear store-and-scope model, one user's preferences get overwritten by another session, agent A's memories leak to agent B, and namespace paths get mistaken for authorization. Teams also cannot answer which tenant owns a memory, which collection or namespace holds it, or which prior version it supersedes.
    ja: ストアと作用域モデルがなければ、別セッションがユーザー選好を上書きし、agent A の記憶が agent B に漏れ、namespace パスが認可と混同されます。tenant 帰属、collection/namespace 所在、置換前版の関係も答えられません。
  includes:
    - zh: MemoryEntity、MemoryRecord、MemoryItem、MemoryFile 及其稳定身份键、版本引用与前驱关系。
      en: MemoryEntity, MemoryRecord, MemoryItem, and MemoryFile with stable identity keys, version references, and predecessor relations.
      ja: MemoryEntity、MemoryRecord、MemoryItem、MemoryFile と安定 identity key、版参照、先行関係。
    - zh: MemoryStore、MemoryNamespace、VectorDatabase 后端、以及 user/agent/session/tenant 等作用域与保留策略 facet。
      en: MemoryStore, MemoryNamespace, vector-database backends, and scope or retention facets for user, agent, session, and tenant.
      ja: MemoryStore、MemoryNamespace、ベクトル DB バックエンド、user/agent/session/tenant 等作用域と保持 facet。
  excludes:
    - zh: Write、Merge、Evict、Expire 等生命周期操作；Index、Shard、Entry 的索引内部结构；ContextPackage 与最终 prompt 组装。
      en: Lifecycle operations such as Write, Merge, Evict, and Expire; index internals such as Index, Shard, and Entry; ContextPackage and final prompt assembly.
      ja: Write・Merge・Evict・Expire 等のライフサイクル操作、Index・Shard・Entry 等の索引内部、ContextPackage と最終 prompt 組み立て。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 Mem0 的 user_id/agent_id/run_id 作用域、Letta 的 core memory blocks 与 archival 存储层、LangGraph BaseStore 的 namespace-key Item 与 thread checkpointer、Pinecone index/namespace、Chroma collection，以及 Zep 的 user/session memory。存储地址（namespace、collection、block label）与访问授权（MemoryScope）必须分开建模；VectorDatabase 托管 VectorIndex 时只记录 hosts 事实，不把索引结构并入 MemoryStore 分类。
    en: Integrations should map Mem0 user_id/agent_id/run_id scopes, Letta core memory blocks versus archival storage, LangGraph BaseStore namespace-key Items and thread checkpointers, Pinecone index/namespace, Chroma collections, and Zep user/session memory separately. Storage addresses (namespace, collection, block label) must stay distinct from access authorization (MemoryScope). When VectorDatabase hosts VectorIndex, record only the hosts fact without folding index structure into the MemoryStore taxonomy.
    ja: 統合では Mem0 の user_id/agent_id/run_id 作用域、Letta core memory blocks と archival、LangGraph BaseStore の namespace-key Item と thread checkpointer、Pinecone index/namespace、Chroma collection、Zep user/session memory を個別に写像します。保存住所とアクセス認可は分離し、VectorDatabase が VectorIndex を host するときは hosts fact のみ記録します。
  typical_input:
    - description: Mem0 scoped memory write — at least one entity ID scopes extracted or explicit memories.
      format: |
        POST https://api.mem0.ai/v1/memories/
        {
          "messages": [{"role": "user", "content": "I prefer dark mode."}],
          "user_id": "alice",
          "agent_id": "support-bot",
          "run_id": "session-17",
          "metadata": {"category": "preferences"}
        }
      source_claims: [claim-memory-stores-scopes-mem0]
    - description: Letta core memory blocks — in-context editable blocks versus out-of-window archival passages.
      format: |
        # Core blocks (pinned in context window)
        core_memory_replace(label="human", content="Name: Alice. Prefers TypeScript.")
        core_memory_replace(label="persona", content="You are a concise coding assistant.")

        # Archival (searchable, not pinned)
        archival_memory_insert(
          content="Long API design doc summary...",
          tags=["technical", "api-docs"]
        )
      source_claims: [claim-memory-stores-scopes-letta]
    - description: LangGraph BaseStore put — hierarchical namespace and key address a durable Item shared across threads.
      format: |
        await store.put(
          ("tenant-7", "user-42", "preferences"),
          "response-language",
          {"value": "zh-CN", "updated_by": "agent-3"},
          index=False
        )
        # Thread checkpointer persists graph state per thread_id separately
        config = {"configurable": {"thread_id": "thread-abc-17"}}
      source_claims: [claim-memory-stores-scopes-langgraph]
    - description: Pinecone namespace partition — logical tenant or corpus isolation inside one index.
      format: |
        index.upsert(
          vectors=[{"id": "mem-001", "values": [...], "metadata": {"user_id": "alice"}}],
          namespace="tenant-7-user-alice"
        )
        index.query(vector=[...], top_k=5, namespace="tenant-7-user-alice")
      source_claims: [claim-memory-stores-scopes-pinecone]
    - description: Chroma collection — named vector store boundary for documents and metadata.
      format: |
        client.get_or_create_collection(name="agent_memories_alice")
        collection.add(
          ids=["mem-001"],
          documents=["Prefers TypeScript for examples."],
          metadatas=[{"user_id": "alice", "agent_id": "support-bot"}]
        )
      source_claims: [claim-memory-stores-scopes-chroma]
    - description: Zep user and session memory — graph-backed long-term user memory versus session-scoped facts.
      format: |
        POST https://api.getzep.com/api/v2/users/{user_id}/memory
        {"messages": [{"role": "user", "content": "My timezone is JST."}]}

        POST https://api.getzep.com/api/v2/sessions/{session_id}/memory
        {"messages": [{"role": "user", "content": "For this chat, keep answers brief."}]}
      source_claims: [claim-memory-stores-scopes-zep]
  typical_output:
    - description: Moonweave-local memory record address — semantic item linked to a store-local namespace/key/version record.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "memory_item_id": "item-language",
          "memory_record": {
            "record_id": "record-17",
            "namespace": ["tenant-7", "user-42", "preferences"],
            "key": "response-language",
            "version": 2,
            "predecessor_id": "record-12",
            "value": "zh-CN"
          },
          "memory_store": {
            "store_id": "store-prod",
            "backend_type": "langgraph_basestore",
            "endpoint": "postgresql://memory-primary:5432/agent_memory"
          },
          "memory_scope": {
            "user_id": "user-42",
            "agent_id": null,
            "session_id": null
          }
        }
      source_claims: [claim-memory-stores-scopes-design]
  reference_implementations:
    - name: Mem0 Platform API
      url: https://docs.mem0.ai
      description: user_id, agent_id, run_id scoped memory types and metadata on create/search.
    - name: Letta Memory
      url: https://docs.letta.com/guides/core-concepts/memory
      description: Core memory blocks in context versus archival memory searchable out of window.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore namespace-key Items, put/get/delete/search, and TTLConfig.
    - name: Pinecone Namespaces
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      description: Index-level namespace partitioning for multi-tenant vector records.
    - name: Chroma Collections
      url: https://docs.trychroma.com/docs/collections/manage-collections
      description: Named collections as the primary storage and isolation boundary.
    - name: Zep Memory
      url: https://help.getzep.com/concepts
      description: User memory graph and session-scoped memory APIs.
structure:
  identity_keys: [memory_record_id, namespace, key, version]
  fields:
    - id: memory_record_id
      labels: {zh: 记忆记录标识, en: Memory record identifier, ja: 記憶レコード識別子}
      definitions:
        zh: 唯一标识一条持久 MemoryRecord 版本，不同于语义 MemoryItem ID 或向量 entry id。
        en: Uniquely identifies one persistent MemoryRecord version, distinct from semantic MemoryItem ID or vector entry id.
        ja: 永続 MemoryRecord 版を一意に識別。semantic MemoryItem ID や vector entry id とは別です。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: record-17
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-design]
    - id: namespace
      labels: {zh: 命名空间, en: Namespace, ja: 名前空間}
      definitions:
        zh: 分层地址元组，在特定 MemoryStore 内唯一标识逻辑分区；Mem0/Zep 实体 ID 或 LangGraph namespace tuple 映射到此字段。
        en: Hierarchical address tuple uniquely identifying a logical partition within a MemoryStore; Mem0/Zep entity IDs or LangGraph namespace tuples map here.
        ja: MemoryStore 内の論理区分を一意に示す階層 address tuple。Mem0/Zep entity ID や LangGraph namespace tuple を写像します。
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ["tenant-7", "user-42", "preferences"]
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-langgraph, claim-memory-stores-scopes-pinecone]
    - id: key
      labels: {zh: 记录键, en: Record key, ja: レコードキー}
      definitions:
        zh: 在 namespace 内唯一寻址一条 MemoryRecord 的业务键；不得用 MemoryItem 语义 ID 直接替代。
        en: Business key uniquely addressing one MemoryRecord inside a namespace; must not be replaced by MemoryItem semantic ID alone.
        ja: namespace 内で MemoryRecord を一意に指す business key。MemoryItem semantic ID だけで代替不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: response-language
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-langgraph]
    - id: version
      labels: {zh: 版本号, en: Version, ja: 版番号}
      definitions:
        zh: 同一 namespace/key  lineage 内的单调版本；替代关系需显式 predecessor_id，不能仅凭写入时间推断。
        en: Monotonic version within one namespace/key lineage; supersession requires explicit predecessor_id, not write timestamp alone.
        ja: 同一 namespace/key lineage 内の単調版。置換は明示 predecessor_id が必要で、書込時刻だけでは不可。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-design]
    - id: user_id
      labels: {zh: 用户标识, en: User identifier, ja: ユーザー識別子}
      definitions:
        zh: Mem0、Zep 等 API 中声明记忆所属用户的稳定作用域键。
        en: Stable scope key declaring memory ownership for user in APIs such as Mem0 and Zep.
        ja: Mem0・Zep 等で記憶所属 user を宣言する安定スコープ鍵。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: alice
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-mem0, claim-memory-stores-scopes-zep]
    - id: agent_id
      labels: {zh: 智能体标识, en: Agent identifier, ja: エージェント識別子}
      definitions:
        zh: 当记忆绑定到特定智能体运行时，与 user_id 共同限定可见与写入范围。
        en: When memory binds to a specific agent runtime, jointly limits visibility and writes with user_id.
        ja: 特定 agent runtime に binding する記憶の可視・書込範囲を user_id と共に限定。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: support-bot
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-mem0]
    - id: session_id
      labels: {zh: 会话标识, en: Session identifier, ja: セッション識別子}
      definitions:
        zh: 短期或会话级记忆的作用域键；Zep session memory 或 Mem0 run_id 映射到此 facet。
        en: Scope key for short-lived or session-level memory; maps from Zep session memory or Mem0 run_id.
        ja: 短期・セッション級記憶のスコープ鍵。Zep session memory や Mem0 run_id を写像。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session-17
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-mem0, claim-memory-stores-scopes-zep]
    - id: collection_name
      labels: {zh: 集合名称, en: Collection name, ja: コレクション名}
      definitions:
        zh: Chroma 或类似向量后端的命名隔离边界；不是单条 MemoryRecord 的业务键。
        en: Named isolation boundary for Chroma or similar vector backends; not the business key of one MemoryRecord.
        ja: Chroma 等ベクトル backend の命名分離境界。単一 MemoryRecord の business key ではありません。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: agent_memories_alice
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-chroma]
    - id: pinecone_namespace
      labels: {zh: Pinecone 命名空间, en: Pinecone namespace, ja: Pinecone 名前空間}
      definitions:
        zh: Pinecone index 内的逻辑分区字符串；与 Moonweave namespace tuple 可映射但语义独立。
        en: Logical partition string inside a Pinecone index; mappable but semantically distinct from Moonweave namespace tuple.
        ja: Pinecone index 内の論理分区文字列。Moonweave namespace tuple と写像可能ですが意味は独立。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: tenant-7-user-alice
      allowed_values: []
      source_claims: [claim-memory-stores-scopes-pinecone]
  constraints:
    - id: namespace-not-authorization
      severity: error
      expression_language: plain
      expression: A namespace tuple or collection name must not alone authorize read, update, or delete; MemoryScope subject and operation conditions are required.
      explanation:
        zh: 命名空间只说明逻辑存储地址，不能替代访问策略求值。
        en: A namespace supplies a logical address only and cannot substitute access-policy evaluation.
        ja: namespace は論理住所のみを示し、アクセス方針評価の代替になりません。
      source_claims: [claim-memory-stores-scopes-design]
    - id: item-record-identity-separation
      severity: error
      expression_language: plain
      expression: MemoryItem semantic identity and MemoryRecord store address must remain separately stable; predecessor_id proves supersession, not later write timestamp alone.
      explanation:
        zh: 把 Item ID 当数据库 key 会丢失版本谱系与可审计替代链。
        en: Using Item ID as the database key loses version lineage and an auditable supersession chain.
        ja: Item ID を DB key にすると版系譜と監査可能な置換鎖が失われます。
      source_claims: [claim-memory-stores-scopes-design]
    - id: index-not-store-type
      severity: warning
      expression_language: plain
      expression: VectorIndex logical structure must not be classified as a MemoryStore subtype; only VectorDatabase hosting is referenced here.
      explanation:
        zh: 托管向量索引的数据库服务仍是存储后端，索引配置本身归表示与索引模块。
        en: A database service hosting vector indexes remains a storage backend; index configuration belongs to representations and indexes.
        ja: ベクトル索引を host する DB は storage backend のままで、索引設定は表現と索引 module 所有です。
      source_claims: [claim-memory-stores-scopes-pinecone, claim-memory-stores-scopes-design]
  required_relations: []
examples:
  - id: memory-stores-scopes-example-mem0-user-agent
    labels:
      zh: Mem0 用户与智能体作用域
      en: Mem0 user and agent scopes
      ja: Mem0 ユーザーとエージェント作用域
    descriptions:
      zh: 应用为 Alice 的 support-bot 写入偏好 “Prefers TypeScript”。POST /v1/memories/ 同时携带 user_id=alice 与 agent_id=support-bot；Mem0 将事实索引在 user 与 agent 维度下，后续 search 必须传入相同实体 ID 才能命中，不能把 agent 记忆当作全局共享。
      en: The app writes preference "Prefers TypeScript" for Alice's support-bot via POST /v1/memories/ with user_id=alice and agent_id=support-bot. Mem0 indexes the fact under both user and agent dimensions; later search must pass the same entity IDs to hit it—agent memory must not be treated as globally shared.
      ja: アプリが Alice の support-bot 向けに “Prefers TypeScript” を POST /v1/memories/（user_id=alice, agent_id=support-bot）で書き込み。Mem0 は user/agent 両次元で索引し、後続 search も同 entity ID が必要で、agent 記憶を全局共有扱いできません。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/ with user_id and agent_id
    field_values:
      user_id: alice
      agent_id: support-bot
      memory_text: Prefers TypeScript for code examples.
      metadata:
        category: preferences
    related_node_ids:
      - memory-stores-scopes
      - memory-lifecycle
    related_relation_ids: []
    source_claims:
      - claim-memory-stores-scopes-mem0
      - claim-memory-stores-scopes-design
  - id: memory-stores-scopes-example-letta-core-vs-archival
    labels:
      zh: Letta 核心块与归档存储
      en: Letta core blocks versus archival storage
      ja: Letta コアブロックとアーカイブ保存
    descriptions:
      zh: Letta 智能体用 core_memory_replace 更新 human/persona 块——这些内容固定在上下文窗口内、可编辑。长篇 API 摘要则通过 archival_memory_insert 写入区外归档库并打 tags；二者存储层级与检索路径不同，不能把 archival passage 误建模为 in-context block。
      en: A Letta agent updates human/persona blocks via core_memory_replace—pinned and editable in the context window. A long API summary goes to out-of-window archival via archival_memory_insert with tags. The two tiers use different storage and retrieval paths; an archival passage must not be modeled as an in-context block.
      ja: Letta エージェントが core_memory_replace で human/persona block を更新（context 内固定・編集可）。長い API 要約は archival_memory_insert で window 外 archival へ tags 付き保存。二層は保存・検索経路が異なり、archival passage を in-context block と誤モデル化できません。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory
      version: core_memory_replace vs archival_memory_insert
    field_values:
      core_blocks:
        - label: human
          content: "Name: Alice. Timezone: JST."
        - label: persona
          content: Concise coding assistant.
      archival_passage: JWT bearer auth with 7-day refresh rotation.
      archival_tags:
        - technical
        - api-docs
    related_node_ids:
      - memory-stores-scopes
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-stores-scopes-letta
      - claim-memory-stores-scopes-design
  - id: memory-stores-scopes-example-langgraph-basestore
    labels:
      zh: LangGraph BaseStore 命名空间寻址
      en: LangGraph BaseStore namespace addressing
      ja: LangGraph BaseStore 名前空間アドレス
    descriptions:
      zh: LangGraph 应用在 BaseStore 中以 namespace=("tenant-7","user-42","preferences")、key="response-language" 写入 Item；同一 store 跨 thread 共享，而 thread checkpointer 仅持久化 graph 状态。Moonweave 将 namespace/key/version 映射为 MemoryRecord 地址，thread_id 仅作会话 facet。
      en: A LangGraph app writes an Item at namespace=("tenant-7","user-42","preferences"), key="response-language" in BaseStore; the same store is shared across threads while the thread checkpointer persists graph state only. Moonweave maps namespace/key/version to MemoryRecord address and treats thread_id as a session facet only.
      ja: LangGraph アプリが BaseStore に namespace=("tenant-7","user-42","preferences"), key="response-language" で Item を書き込み。同一 store は thread 横断共有、thread checkpointer は graph 状態のみ永続。Moonweave は namespace/key/version を MemoryRecord 住所に写像し thread_id は session facet のみ。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.put namespace and key
    field_values:
      namespace:
        - tenant-7
        - user-42
        - preferences
      key: response-language
      value:
        language: zh-CN
      thread_id: thread-abc-17
      store_shared_across_threads: true
    related_node_ids:
      - memory-stores-scopes
      - memory-lifecycle
    related_relation_ids: []
    source_claims:
      - claim-memory-stores-scopes-langgraph
      - claim-memory-stores-scopes-design
  - id: memory-stores-scopes-example-pinecone-chroma-isolation
    labels:
      zh: Pinecone 与 Chroma 租户隔离
      en: Pinecone and Chroma tenant isolation
      ja: Pinecone と Chroma の tenant 分離
