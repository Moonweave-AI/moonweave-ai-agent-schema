sources:
  - id: langgraph-memory
    title: LangGraph Memory
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    type: official-doc
    source_type: official-doc
    relevance: Documents thread-scoped short-term memory and long-term Store operations addressed by namespace tuples and keys.
  - id: langgraph-persistence
    title: LangGraph Persistence
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    type: official-doc
    source_type: official-doc
    relevance: Documents checkpoints and their thread-based persistence identity.
  - id: pinecone-vector-query
    title: Pinecone metadata-filtered vector search
    url: https://docs.pinecone.io/guides/search/filter-by-metadata
    type: official-doc
    source_type: official-doc
    relevance: Documents vector index records, metadata filters, and matching results returned by vector queries.
  - id: langchain-context-engineering
    title: LangChain context engineering
    url: https://docs.langchain.com/oss/python/deepagents/context-engineering
    type: official-doc
    source_type: official-doc
    relevance: Documents context as managed working input and context compression distinct from persistent memory storage.
source_claims:
  - id: claim-memory-stores-short-long-boundary
    source: langgraph-memory
    supports: LangGraph distinguishes thread-scoped short-term memory from long-term Store memory. Combined with the persistence guide's thread identifier, this supports keeping checkpoints and message history separate from cross-thread Store records unless an explicit transfer occurs.
    locator: "Memory guide: short-term memory and long-term memory"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-stores-addressing
    source: langgraph-memory
    supports: LangGraph Store operations use an explicit namespace tuple and key for long-term data. Moonweave models Store, exact MemoryNamespace, and item or record identity as separate address and content facts.
    locator: "Memory guide: Store put/aput, get, and search"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-stores-scope-boundary
    source: langgraph-memory
    supports: Store namespaces organize long-term data operations. Moonweave separately models record applicability scope and authorization so a path does not itself grant access or determine who may use a record.
    locator: "Memory guide: long-term Store operations"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-stores-vector-boundary
    source: pinecone-vector-query
    supports: Pinecone documents vector index records and vector-query results. Moonweave keeps the VectorDatabase facility, VectorIndex, EmbeddingVector, RetrievedCandidate, and later reranking as separate entities, with query results treated as read-only outcomes.
    locator: "Filter by metadata: indexed records and Search with a metadata filter"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-stores-context-boundary
    source: langchain-context-engineering
    supports: LangChain describes context as managed working input that may be compressed or rewritten. Moonweave keeps persistent stores, source artifacts, retrieval candidates, and final Context Assembly separate so storage does not imply model visibility.
    locator: "Context engineering guide: context management and compression"
    evidence_kind: ontology-design-inference
    confidence: medium
