schema: moonweave.ai/ontology-node/v1
id: memory-stores-scopes
kind: module
status: accepted
labels:
  zh: 记忆存储与作用域
  en: Memory Stores and Scopes
  ja: 記憶ストアとスコープ
semantics:
  short_definition:
    zh: 定义持久记忆工件、存储设施、命名空间寻址和记录适用性作用域之间的正交边界。
    en: Defines the orthogonal boundaries among persistent memory artifacts, storage facilities, namespace addressing, and record-applicability scopes.
    ja: persistent memory artifact、storage facility、namespace addressing、record applicability scope の直交する境界を定義する。
  definition:
    zh: >-
      memory-stores-scopes 模块定义持久记忆的“是什么、存在哪里、以何路径寻址、适用于谁”四个独立事实。MemoryEntity
      及其具体形式 MemoryRecord、MemoryItem 和 MemoryFile 表示已登记的记忆工件；MemoryStore 是承载它们的设施，
      MemoryNamespace 是设施内的精确逻辑路径，MemoryScope 是记录对全局、租户、用户、会话或线程主体的适用性边界。
      VectorDatabase 是可托管 VectorIndex 并进行候选查询的存储后端，但不是 EmbeddingVector、索引条目或检索结果。
      模块不把 thread checkpoint 或消息历史视为跨线程 Store 记忆，也不把存储、命名空间或检索候选视为已呈现给模型的
      Context Assembly。namespace 可隔离地址但不独自授予授权，scope 可限制适用性但不取代认证和授权。
    en: >-
      The memory-stores-scopes module defines four independent facts about persistent memory: what it is, where it is
      held, which path addresses it, and which subject it applies to. MemoryEntity and its concrete forms MemoryRecord,
      MemoryItem, and MemoryFile represent registered memory artifacts. MemoryStore is the facility that holds them,
      MemoryNamespace is one exact logical path inside that facility, and MemoryScope is a record-applicability boundary
      for a global, tenant, user, session, or thread subject. VectorDatabase is a storage backend that can host a
      VectorIndex and run candidate queries, but is not an EmbeddingVector, index entry, or retrieval result. The module
      does not treat thread checkpoints or message history as cross-thread Store memory, nor a store, namespace, or
      retrieval candidate as Context Assembly already presented to a model. A namespace can isolate addresses without
      granting authorization, and a scope can limit applicability without replacing authentication or authorization.
    ja: >-
      memory-stores-scopes module は persistent memory について「何か、どこに保持されるか、どの path が address するか、
      どの subject に適用されるか」という四つの独立した fact を定義します。MemoryEntity と具体形の MemoryRecord、
      MemoryItem、MemoryFile は登録済み memory artifact を表します。MemoryStore はそれらを保持する facility、
      MemoryNamespace はその facility 内の一つの正確な logical path、MemoryScope は global、tenant、user、session、
      thread subject に対する record applicability boundary です。VectorDatabase は VectorIndex を host し candidate query
      を実行できる storage backend ですが、EmbeddingVector、index entry、retrieval result ではありません。module は
      thread checkpoint や message history を cross-thread Store memory と扱わず、store、namespace、retrieval candidate を
      model に既に渡した Context Assembly と扱いません。namespace は authorization を与えずに address を隔離でき、scope は
      authentication や authorization を置き換えずに applicability を制限できます。
  why_needed:
    zh: >-
      如果将内容身份、存储地址、主体边界、向量检索和模型上下文混为一谈，跨用户泄漏、错误迁移、过度检索和不可审计的
      提示词输入都会发生。模块将每个事实保持为可独立变更和核验的对象与关系。
    en: >-
      If content identity, storage address, subject boundary, vector retrieval, and model context are collapsed together,
      cross-user leaks, incorrect migrations, over-retrieval, and unauditable prompt inputs follow. The module keeps
      every fact in an object or relation that can change and be verified independently.
    ja: >-
      content identity、storage address、subject boundary、vector retrieval、model context を一緒にすると、cross-user leak、
      誤った migration、over-retrieval、audit 不能な prompt input が起こる。module は各 fact を独立して変化・検証できる
      object 又は relation に保持する。
  includes:
    - zh: MemoryStore、MemoryNamespace、MemoryScope、MemoryEntity、MemoryRecord、MemoryItem、MemoryFile，以及作为存储后端的 VectorDatabase。
      en: MemoryStore, MemoryNamespace, MemoryScope, MemoryEntity, MemoryRecord, MemoryItem, MemoryFile, and VectorDatabase as a storage backend.
      ja: MemoryStore、MemoryNamespace、MemoryScope、MemoryEntity、MemoryRecord、MemoryItem、MemoryFile、storage backend としての VectorDatabase。
  excludes:
    - zh: 写入和删除操作、嵌入生成、索引构建、检索排序、重排、线程 checkpoint、消息历史以及最终模型提示词组装。
      en: Write and deletion operations, embedding generation, index construction, retrieval ranking, reranking, thread checkpoints, message history, and final model-prompt assembly.
      ja: write と deletion operation、embedding generation、index construction、retrieval ranking、reranking、thread checkpoint、message history、最終 model-prompt assembly。
  semantic_kind: module
  aliases: [persistent-memory storage model, memory address and scope model]
engineering:
  explanation:
    zh: >-
      一个长期记忆写入先选择 MemoryStore 和完整 MemoryNamespace 路径，再创建或更新对应的 MemoryItem 或 MemoryRecord，
      并附加独立的 MemoryScope。读取或向量查询只能返回存储项目或检索候选；之后的筛选、重排与 Context Assembly 是否把
      内容送入模型是另一个读路径。LangGraph 的短期状态由 thread_id 的 checkpoint 隔离，长期 Store 则用 namespace 和 key
      跨会话寻址，两者不得自动提升或合并。
    en: >-
      A long-term memory write first selects a MemoryStore and complete MemoryNamespace path, then creates or updates the
      matching MemoryItem or MemoryRecord and attaches a separate MemoryScope. Reads or vector queries return stored items
      or retrieval candidates only. Later filtering, reranking, and whether Context Assembly sends content to a model are
      another read path. LangGraph isolates short-term state in checkpoints by thread_id, while its long-term Store addresses
      data across conversations by namespace and key; the two must not be promoted or merged automatically.
    ja: >-
      long-term memory write は最初に MemoryStore と完全な MemoryNamespace path を選び、対応する MemoryItem 又は
      MemoryRecord を作成又は更新し、別の MemoryScope を付加します。read 又は vector query は stored item 又は
      retrieval candidate だけを返します。後続の filtering、reranking、Context Assembly が content を model に送るかは
      別の read path です。LangGraph は短期 state を thread_id により checkpoint で分離し、long-term Store は namespace と
      key により conversation をまたいで data を address します。両者を自動 promotion 又は merge してはなりません。
  typical_input:
    - description: Store a user-scoped long-term record
      format: |
        store_ref = "memory-store-primary"
        namespace = ["users", "u-123", "preferences"]
        item_key = "response-language"
        record = {"memory_record_id": "pref-u-123-v2", "content": "Chinese"}
        scope = {"scope_kind": "user", "scope_subject_ref": "user:u-123"}
  typical_output:
    - description: Stored artifact remains distinct from prompt context
      format: |
        {
          "store_ref": "memory-store-primary",
          "namespace": ["users", "u-123", "preferences"],
          "record_ref": "pref-u-123-v2",
          "scope_ref": "scope-user-u-123",
          "model_visible": false
        }
  reference_implementations:
    - name: LangGraph Memory
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents thread-scoped short-term memory and namespace-plus-key long-term Store operations.
    - name: LangGraph Persistence
      url: https://docs.langchain.com/oss/python/langgraph/persistence
      description: Documents checkpoint persistence keyed by thread identifiers.
    - name: Pinecone metadata-filtered vector search
      url: https://docs.pinecone.io/guides/search/filter-by-metadata
      description: Documents vector index records, metadata filtering, and query results.
    - name: LangChain context engineering
      url: https://docs.langchain.com/oss/python/deepagents/context-engineering
      description: Documents context as a managed working input separate from persisted memory.
structure:
  identity_keys: [module_id]
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      definitions:
        zh: 稳定标识这一组存储、寻址和适用性边界约束，而不是其中某个运行时设施或记忆工件。
        en: Stably identifies this set of storage, addressing, and applicability-boundary constraints rather than one runtime facility or memory artifact inside it.
        ja: 内部の一つの runtime facility 又は memory artifact ではなく、この storage、addressing、applicability-boundary constraint 群を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [memory-stores-scopes]
      pattern: null
      example_value: memory-stores-scopes
      source_claims: [claim-memory-stores-addressing]
    - id: boundary_contract
      labels:
        zh: 边界契约
        en: boundary contract
        ja: 境界契約
      definitions:
        zh: 声明模块必须区分工件身份、存储设施、精确命名空间路径、适用主体边界、向量检索读路径和最终模型上下文。
        en: Declares that the module must distinguish artifact identity, storage facility, exact namespace path, applicable-subject boundary, vector-retrieval read path, and final model context.
        ja: artifact identity、storage facility、正確な namespace path、適用 subject boundary、vector-retrieval read path、最終 model context を module が区別しなければならないことを宣言する。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"separates":["artifact","store","namespace","scope","retrieval","context"]}'
      source_claims: [claim-memory-stores-addressing, claim-memory-stores-context-boundary]
  constraints:
    - id: memory-stores-scopes-module-boundary
      severity: error
      expression_language: plain
      expression: The module must keep persistent artifact identity, deployed storage facility, exact namespace addressing, record applicability scope, vector-query candidates, checkpoint history, and final Context Assembly as separately asserted concerns. A namespace is not authorization, a scope is not a storage path, and retrieval does not write or make content model-visible.
      explanation:
        zh: 每个关切在不同时间由不同活动产生或改变；把它们合并会使地址、授权、读写审计和模型可见性都不可核验。
        en: Each concern is produced or changed by different activities at different times. Collapsing them makes addressability, authorization, read/write audit, and model visibility unverifiable.
        ja: 各 concern は異なる時点に異なる activity が生成又は変更する。それらをまとめると addressability、authorization、read/write audit、model visibility が検証不能になる。
      source_claims: [claim-memory-stores-short-long-boundary, claim-memory-stores-addressing, claim-memory-stores-vector-boundary, claim-memory-stores-context-boundary]
  required_relations: []
