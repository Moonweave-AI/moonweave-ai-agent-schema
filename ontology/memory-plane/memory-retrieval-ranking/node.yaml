module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入由 RetrievalRequest 与实际读取的 IndexVersion 共同界定；fulfills 保留规范请求，reads 保留执行事实。
          en: Input is jointly delimited by RetrievalRequest and the IndexVersion actually read; fulfills preserves the normative request while reads preserves execution fact.
          ja: inputはRetrievalRequestとactual read IndexVersionで定まりfulfillsはnormative request、readsはexecution factを保持します。
        family_concept_ids:
          - RetrievalRequest
          - IndexVersion
        relation_ids:
          - RetrievalRun-fulfills-RetrievalRequest
          - RetrievalRun-reads-IndexVersion
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出由运行产生的 RetrievalResult、结果明确包含的 RetrievedCandidate 和运行拥有的 RetrievalTrace 组成。
          en: Output comprises the RetrievalResult produced by the run, RetrievedCandidate members explicitly contained by the result, and the RetrievalTrace owned by the run.
          ja: outputはrun生成RetrievalResult・result明示RetrievedCandidate member・run所有RetrievalTraceで構成されます。
        family_concept_ids:
          - RetrievalResult
          - RetrievedCandidate
          - RetrievalTrace
        relation_ids:
          - RetrievalRun-produces-RetrievalResult
          - RetrievalResult-contains-RetrievedCandidate
          - RetrievalRun-has_trace-RetrievalTrace
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本模块记录检索事实与结果，不裁决运行失败类型；失败事件由运行时与可观测性本体拥有。
          en: This module records retrieval facts and results but does not adjudicate runtime failure types; runtime and observability own failure events.
          ja: 本moduleはretrieval fact/resultを記録しますがruntime failure typeを裁決せずfailure eventはruntime/observabilityが所有します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: RetrievalTrace 支持重放证据，但恢复或重试活动由运行时与编排本体启动。
          en: RetrievalTrace supports replay evidence, but runtime and orchestration initiate recovery or retry activities.
          ja: RetrievalTraceはreplay evidenceを支えますがrecovery/retry activity開始はruntime/orchestrationが所有します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
