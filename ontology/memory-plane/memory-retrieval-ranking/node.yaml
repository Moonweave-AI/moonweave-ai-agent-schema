schema: moonweave.ai/ontology-node/v1
id: memory-retrieval-ranking
kind: module
status: accepted
labels:
  zh: 检索与排序
  en: Retrieval and ranking
  ja: 検索と順位付け
semantics:
  short_definition:
    zh: 检索与排序描述一次检索如何接收请求、读取确定的索引版本、生成候选，再经评分、排名融合、模型重排和 Top-K 选择产生结果与可重放轨迹。RetrievalActivity 拥有执行过程，RetrievalArtifact 拥有请求、候选、分数和结果；索引内部结构与最终上下文采用属于其他模块。
    en: Retrieval and ranking describes the closed loop from request formation and actual index reading through candidate generation, stage scoring, rank fusion, model reranking, Top-K truncation, result, and trace. RetrievalActivity and RetrievalArtifact form two parallel logical trees; rules, sources, frameworks, index internals, context admission, and safety scanning are not mixed into retrieval nodes.
    ja: 検索と順位付けはrequest形成・actual index reading・candidate generation・stage scoring・rank fusion・model reranking・Top-K truncationからresult/traceまでの閉ループを記述します。RetrievalActivityとRetrievalArtifactを並行logical treeとしrule・source・framework・index内部・context admission・safety scanを混入しません。
  definition:
    zh: 检索与排序描述从请求形成、实际索引读取、候选生成、阶段评分、排名融合、模型重排与 TopK 截断到结果和追踪记录的完整闭环。模块以 RetrievalActivity 与 RetrievalArtifact 为两棵并行逻辑树；规则、来源、框架、索引内部结构、上下文采用和安全扫描均不作为检索节点混入。
    en: Retrieval and ranking describes the closed loop from request formation and actual index reading through candidate generation, stage scoring, rank fusion, model reranking, Top-K truncation, result, and trace. RetrievalActivity and RetrievalArtifact form two parallel logical trees; rules, sources, frameworks, index internals, context admission, and safety scanning are not mixed into retrieval nodes.
    ja: 検索と順位付けはrequest形成・actual index reading・candidate generation・stage scoring・rank fusion・model reranking・Top-K truncationからresult/traceまでの閉ループを記述します。RetrievalActivityとRetrievalArtifactを並行logical treeとしrule・source・framework・index内部・context admission・safety scanを混入しません。
  why_needed:
    zh: 用明确身份和关系链回答一次检索如何接收请求、读取哪一索引版本、如何形成并排序候选、为何返回这些候选，以及怎样逐阶段重放；同时把最终上下文采用与安全检查留给各自 owner。
    en: Uses explicit identities and relation chains to answer how a retrieval accepts a request, which index version it reads, how candidates are formed and ordered, why candidates are returned, and how stages are replayed, while leaving final context admission and safety checks to their owners.
    ja: 明示identity/relation chainによりrequest受領・read index version・candidate形成/順位・返却理由・stage replayを答え、final context admissionとsafety checkは各ownerへ残します。
  includes:
    - zh: 检索请求、查询、过滤条件、端到端检索运行、候选生成与阶段追踪。
      en: Retrieval requests, queries, filters, end-to-end runs, candidate generation, and stage traces.
      ja: retrieval request・query・filter・end-to-end run・candidate generation・stage trace。
    - zh: 候选集合、统一候选身份、Chunk 候选、阶段分数、评分、排名融合、模型重排、TopK 与检索结果。
      en: Candidate sets, the unified candidate identity, chunk candidates, stage scores, scoring, rank fusion, model reranking, Top-K selection, and retrieval results.
      ja: candidate set・unified candidate identity・chunk candidate・stage score・scoring・rank fusion・model reranking・Top-K・retrieval result。
  excludes:
    - zh: Index、IndexVersion、Shard、Entry 与 Embedding 的构建和内部结构归“表示与索引”；本模块只声明请求目标与运行实际读取的版本。
      en: Index, IndexVersion, Shard, Entry, and Embedding construction and internals belong to Representations and indexes; this module only states the requested target and version actually read.
      ja: Index・IndexVersion・Shard・Entry・Embedding構築/内部はrepresentation/index所有で、本moduleはrequest targetとactual read versionだけを表します。
    - zh: ContextPackage、ContextSlot、token 预算、上下文排除与最终采用归“上下文组装”；TopK 候选不等于已进入上下文。
      en: ContextPackage, ContextSlot, token budget, context exclusion, and final admission belong to Context assembly; a Top-K candidate is not automatically in context.
      ja: ContextPackage・ContextSlot・token budget・context exclusion・final admissionはcontext assembly所有で、Top-K candidateはcontext採用済みを意味しません。
    - zh: PatternScan、DefenseFinding、规则、来源文档和框架说明分别归安全本体或证据层，不作为检索层级节点。
      en: PatternScan, DefenseFinding, rules, source documents, and framework descriptions belong to safety ontologies or the evidence layer and are not retrieval hierarchy nodes.
      ja: PatternScan・DefenseFinding・rule・source document・framework descriptionはsafety ontology/evidence layer所有でretrieval hierarchy nodeではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 用明确身份和关系链回答一次检索如何接收请求、读取哪一索引版本、如何形成并排序候选、为何返回这些候选，以及怎样逐阶段重放；同时把最终上下文采用与安全检查留给各自 owner。
  en: Uses explicit identities and relation chains to answer how a retrieval accepts a request, which index version it reads, how candidates are formed and ordered, why candidates are returned, and how stages are replayed, while leaving final context admission and safety checks to their owners.
  ja: 明示identity/relation chainによりrequest受領・read index version・candidate形成/順位・返却理由・stage replayを答え、final context admissionとsafety checkは各ownerへ残します。
structure: null
examples:
  - id: memory-retrieval-ranking-cq-replay-v3-example-positive
    kind: positive
    labels:
      zh: 检索回放闭合正例
      en: Retrieval replay closure positive case
      ja: retrieval replay 閉路の正例
    scenario_id: null
    descriptions:
      zh: run-411 履行 request-419、实际读取 index-v19、拥有 trace-426；trace 按序记录请求、版本与排序阶段，重放得到同一候选成员和顺序。
      en: run-411 fulfills request-419, actually reads index-v19, and owns trace-426; the trace records request, version, and ranking stages in order, and replay reproduces membership and order.
      ja: run-411はrequest-419をfulfillしindex-v19を実読、trace-426がrequest/version/ranking stageを順に記録しreplayで同membership/orderを得ます。
    field_values:
      retrieval_run_id: run-411
      retrieval_request:
        request_id: request-419
        query_sha256: a6c5a2a276c4e3ad43ae3ca35d3c00fd856fbc903d47e16ae18fc3f050debc54
        filter: tenant_id=tenant-7 AND language=en
        requested_top_k: 10
      actual_index:
        index_id: policy-hybrid-index
        index_version_id: index-v19
        snapshot_sha256: 940fbf0c0d602945f534f93ebf8758431e5bb383a40124dd4734b19ec2e73a19
      retrieval_trace_id: trace-426
      ordered_stages:
        - stage_id: prefetch-sparse-411
          stage_type: candidate-generation
          limit: 40
        - stage_id: prefetch-dense-411
          stage_type: candidate-generation
          limit: 40
        - stage_id: rrf-411
          stage_type: rank-fusion
          rrf_k: 60
        - stage_id: topk-411
          stage_type: top-k-selection
          limit: 10
      recorded_candidate_order:
        - candidate-424
        - candidate-431
        - candidate-447
      replayed_candidate_order:
        - candidate-424
        - candidate-431
        - candidate-447
    related_node_ids:
      - RetrievalRun
      - RetrievalRequest
      - IndexVersion
      - RetrievalTrace
      - RankingOperation
    related_relation_ids:
      - RetrievalRun-fulfills-RetrievalRequest
      - RetrievalRun-reads-IndexVersion
      - RetrievalRun-has_trace-RetrievalTrace
      - RetrievalTrace-records-RetrievalRequest
      - RetrievalTrace-records-IndexVersion
      - RetrievalTrace-records-RankingOperation
    expected_result:
      zh: 重放成功，或以具体阶段 ID 报告首个差异。
      en: Replay succeeds or reports the first divergence with a concrete stage ID.
      ja: replay成功または具体stage IDでfirst divergenceを報告します。
    why_valid_or_invalid:
      zh: 规范请求、实际索引、追踪归属和阶段记录形成闭合证据链。
      en: Normative request, actual index, trace ownership, and stage records form a closed evidence chain.
      ja: normative request・actual index・trace ownership・stage recordがclosed evidence chainを形成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-005
  - id: memory-retrieval-ranking-cq-replay-v3-example-counter
    kind: counterexample
    labels:
      zh: 同文本异版本回放反例
      en: Same-text different-version replay counterexample
      ja: 同一 text・異 version replay の反例
    scenario_id: null
    descriptions:
      zh: 另一个运行使用同样查询文本但读取 index-v20；若只按文本相同复用 trace-426，会掩盖实际索引与阶段参数差异。
      en: Another run uses the same query text but reads index-v20; reusing trace-426 from text equality alone hides actual-index and stage-parameter differences.
      ja: 別runは同query textでもindex-v20を読み、text一致だけでtrace-426を再利用するとactual index/stage parameter差異を隠します。
    field_values:
      retrieval_run_id: run-412
      retrieval_request_id: request-420
      query_sha256: a6c5a2a276c4e3ad43ae3ca35d3c00fd856fbc903d47e16ae18fc3f050debc54
      actual_index_version_id: index-v20
      reused_trace_id: trace-426
      trace_recorded_index_version_id: index-v19
      current_rrf_k: 20
      trace_recorded_rrf_k: 60
      replay_equivalent: false
      first_divergence: index-version-before-prefetch-sparse-411
    related_node_ids:
      - RetrievalRun
      - RetrievalRequest
      - IndexVersion
      - RetrievalTrace
    related_relation_ids:
      - RetrievalRun-fulfills-RetrievalRequest
      - RetrievalRun-reads-IndexVersion
      - RetrievalRun-has_trace-RetrievalTrace
      - RetrievalTrace-records-RetrievalRequest
    expected_result:
      zh: 拒绝重放等价，并指出实际 IndexVersion 或阶段参数不一致。
      en: Reject replay equivalence and identify the actual IndexVersion or stage-parameter mismatch.
      ja: replay equivalenceを拒否しactual IndexVersionまたはstage parameter mismatchを示します。
    why_valid_or_invalid:
      zh: 同一文本不等于同一请求、运行、索引版本或阶段链。
      en: Equal text does not imply equal request, run, index version, or stage chain.
      ja: 同textは同request・run・index version・stage chainを意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-006
  - id: memory-retrieval-ranking-cq-score-explanation-v3-example-positive
    kind: positive
    labels:
      zh: 异质检索分数可解释正例
      en: Heterogeneous retrieval-score explanation positive case
      ja: 異種 retrieval score 説明の正例
    scenario_id: null
    descriptions:
      zh: candidate-424 先由 lexical-413 产生 BM25 分数，再由 vector-414 产生余弦相似度，最后由 rerank-416 产生重排分数；三个分数分别保留活动、方法和模型版本。
      en: candidate-424 receives a BM25 score from lexical-413, a cosine-similarity score from vector-414, and a rerank score from rerank-416; each score retains its activity, method, and model version.
      ja: candidate-424 は lexical-413 の BM25 score、vector-414 の cosine-similarity score、rerank-416 の rerank score を別々に持ち、各 score は activity・method・model version を保持します。
    field_values:
      candidate_id: candidate-424
      lexical_score:
        score_id: lexical-score-428
        value: 8.73
        activity_id: lexical-413
        method: BM25
        method_version: qdrant-bm25@1.16
      similarity_score:
        score_id: similarity-score-429
        value: 0.842
        activity_id: vector-414
        method: cosine-similarity
        model_version: text-embedding-3-large@2026-01
      rerank_score:
        score_id: rerank-score-430
        value: 0.917
        activity_id: rerank-416
        method: cross-encoder-rerank
        model_version: bge-reranker-v2-m3@2025-10
      heterogeneous_scores_directly_comparable: false
    related_node_ids:
      - CandidateScoringActivity
      - RetrievedCandidate
      - RetrievalScore
      - RerankActivity
      - RerankScore
    related_relation_ids:
      - CandidateScoringActivity-scores-RetrievedCandidate
      - CandidateScoringActivity-produces-RetrievalScore
      - RetrievedCandidate-has_score-RetrievalScore
      - RerankActivity-produces-RerankScore
      - RerankScore-is_a-RetrievalScore
    expected_result:
      zh: 分别解释每个分数的类型、阶段、方法或模型版本，不直接比较异质量纲。
      en: Explain each score's type, stage, method or model version without directly comparing heterogeneous scales.
      ja: 各score type・stage・method/model versionを説明しheterogeneous scaleを直接比較しません。
    why_valid_or_invalid:
      zh: 分数产生关系与候选拥有关系同时存在，且子类种差明确。
      en: Both score-production and candidate-ownership facts exist, with an explicit subtype differentia.
      ja: score-production/candidate-ownership factが共にありsubtype differentiaが明示されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-007
  - id: memory-retrieval-ranking-cq-score-explanation-v3-example-counter
    kind: counterexample
    labels:
      zh: 排名位置误作分数反例
      en: Rank-position-as-score counterexample
      ja: rank position を score と誤認する反例
    scenario_id: null
    descriptions:
      zh: 只看到 candidate-424 的 rank_position=3 就把 3 当作 RetrievalScore，且没有评分活动或方法证据。
      en: The value 3 from candidate-424's rank_position is treated as RetrievalScore without scoring activity or method evidence.
      ja: candidate-424のrank_position=3をscoring activity/method evidenceなしにRetrievalScore扱いします。
    field_values:
      candidate_id: candidate-424
      rank_position: 3
      incorrect_retrieval_score_value: 3
      score_type_present: false
      producing_activity_present: false
      method_present: false
      model_version_present: false
      validation_decision: reject-rank-position-as-retrieval-score
    related_node_ids:
      - RetrievedCandidate
      - RetrievalScore
      - CandidateScoringActivity
      - RerankActivity
    related_relation_ids:
      - CandidateScoringActivity-scores-RetrievedCandidate
      - CandidateScoringActivity-produces-RetrievalScore
      - RetrievedCandidate-has_score-RetrievalScore
      - RerankActivity-produces-RerankScore
    expected_result:
      zh: 拒绝把 ordinal rank 当成分数，并要求产生阶段与方法证据。
      en: Reject ordinal rank as a score and require producing-stage and method evidence.
      ja: ordinal rankをscore扱いせずproducing-stage/method evidenceを要求します。
    why_valid_or_invalid:
      zh: 排名字段与阶段分数具有不同身份和解释语境。
      en: Rank fields and stage scores have different identities and interpretation contexts.
      ja: rank fieldとstage scoreは異なるidentity/interpretation contextを持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-008
  - id: memory-retrieval-ranking-cq-candidate-result-separation-v3-example-positive
    kind: positive
    labels:
      zh: 候选阶段与最终结果分离正例
      en: Candidate-stage and final-result separation positive case
      ja: candidate stage と final result 分離の正例
    scenario_id: null
    descriptions:
      zh: generation-412 产生初始 CandidateSet，candidate-424 是阶段成员；TopK 从有序集合截断，result-422 最终包含 candidate-424，但不声明它已进入 ContextPackage。
      en: generation-412 produces an initial CandidateSet in which candidate-424 is a stage member; Top-K truncates an ordered set and result-422 finally contains candidate-424 without claiming ContextPackage admission.
      ja: generation-412がinitial CandidateSetを生成しcandidate-424がstage member、TopKがordered setをtruncateしresult-422がcandidate-424を含みますがContextPackage admissionは宣言しません。
    field_values:
      candidate_generation_activity_id: generation-412
      initial_candidate_set_id: candidate-set-412-initial
      initial_candidate_ids:
        - candidate-424
        - candidate-431
        - candidate-447
        - candidate-499
      top_k_selection_id: topk-416
      top_k: 3
      retrieval_result_id: result-422
      final_candidate_ids:
        - candidate-424
        - candidate-431
        - candidate-447
      context_package_admission_asserted: false
      candidate_rank_shadow_node_created: false
      retrieved_context_candidate_shadow_node_created: false
    related_node_ids:
      - CandidateGenerationActivity
      - CandidateSet
      - RetrievedCandidate
      - TopKSelection
      - RetrievalResult
    related_relation_ids:
      - CandidateGenerationActivity-produces-CandidateSet
      - CandidateSet-contains-RetrievedCandidate
      - RetrievalResult-has_candidate_set-CandidateSet
      - TopKSelection-selects_from-CandidateSet
      - RetrievalResult-contains-RetrievedCandidate
    expected_result:
      zh: 阶段候选、最终结果成员和下游上下文边界均可区分。
      en: Stage candidate, final result member, and downstream context boundary remain distinguishable.
      ja: stage candidate・final result member・downstream context boundaryを区別できます。
    why_valid_or_invalid:
      zh: 关系链止于检索结果，不借 RetrievedContextCandidate 或 context edge 重复候选身份。
      en: The chain stops at retrieval result and does not duplicate candidate identity through RetrievedContextCandidate or a context edge.
      ja: chainはretrieval resultで止まりRetrievedContextCandidate/context edgeでcandidate identityを重複しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-009
  - id: memory-retrieval-ranking-cq-candidate-result-separation-v3-example-counter
    kind: counterexample
    labels:
      zh: 初始成员误作最终成员反例
      en: Initial-member-as-final-member counterexample
      ja: initial member を final member と誤認する反例
    scenario_id: null
    descriptions:
      zh: 初始集合中的 candidate-499 在重排后被淘汰；若仅凭初始 membership 就声称 result-422 contains candidate-499，会混淆阶段与最终结果。
      en: candidate-499 belongs to the initial set but is removed after reranking; claiming result-422 contains it from initial membership alone conflates stage and final result.
      ja: candidate-499はinitial set memberですがrerank後除外され、initial membershipだけでresult-422 containsとするとstage/final resultを混同します。
    field_values:
      initial_candidate_set_id: candidate-set-412-initial
      candidate_id: candidate-499
      initial_membership: true
      reranked_position: 27
      top_k: 10
      retrieval_result_id: result-422
      final_membership: false
      incorrect_final_membership_asserted: true
      validation_decision: preserve-stage-membership-reject-final-membership
    related_node_ids:
      - CandidateSet
      - RetrievedCandidate
      - RetrievalResult
      - TopKSelection
    related_relation_ids:
      - CandidateGenerationActivity-produces-CandidateSet
      - CandidateSet-contains-RetrievedCandidate
      - RetrievalResult-has_candidate_set-CandidateSet
      - TopKSelection-selects_from-CandidateSet
    expected_result:
      zh: 保留初始集合成员事实，但拒绝最终结果包含事实。
      en: Preserve initial-set membership but reject final-result membership.
      ja: initial-set membershipは保持しfinal-result membershipを拒否します。
    why_valid_or_invalid:
      zh: CandidateSet membership 与 RetrievalResult membership 是不同可审计事实。
      en: CandidateSet membership and RetrievalResult membership are distinct auditable facts.
      ja: CandidateSet membershipとRetrievalResult membershipは異なるaudit可能factです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-retrieval-ranking-010
