  key_notion:
    zh: 检索活动与检索信息
    en: retrieval activities and artifacts
    ja: 検索活動と検索成果物
  owns_when:
    zh: 当对象的身份取决于检索请求或运行、候选生成/排序阶段、某候选在集合中的成员身份与排名、阶段分数、检索结果或可重放轨迹时，由本模块拥有。
    en: Own an object when its identity is determined by a retrieval request or run, candidate-generation or ranking stage, candidate-set membership, candidate rank, stage score, retrieval result, or retrieval trace.
    ja: object identityがretrieval request/run・candidate-generation/ranking stage・candidate-set membership・candidate rank・stage score・retrieval result/traceで決まる場合に所有します。
  references_when:
    zh: 运行读取 IndexVersion 时引用“表示与索引”的版本；下游上下文组装或安全扫描消费 RetrievedCandidate 时引用本模块候选，但不得把 ContextSlot、DefenseFinding 等反向并入检索树。
    en: A run references the IndexVersion owned by Representations and indexes; downstream context assembly or safety scanning may reference RetrievedCandidate, but ContextSlot and DefenseFinding must not be pulled back into the retrieval tree.
    ja: runはrepresentation/index所有IndexVersionを参照し、downstream context assembly/safety scanはRetrievedCandidateを参照できますがContextSlot/DefenseFindingをretrieval treeへ逆流させません。
  boundary_decisions:
    - other_module_id: memory-embedding-indexes
      subject_concept_ids:
        - IndexVersion
      decision: references
      owner_module_id: memory-embedding-indexes
      rationale:
        zh: IndexVersion 的身份由构建或刷新血缘、分片和条目决定，归表示与索引；检索请求指向目标版本、检索运行读取实际版本、检索追踪留存所用版本，三者都不取得版本所有权。
        en: IndexVersion identity is determined by build or refresh lineage, shards, and entries and belongs to representations and indexes. A retrieval request targets it, a run reads it, and a trace records the version used; none acquires ownership of the version.
        ja: IndexVersion identity は build/refresh lineage・shard・entry で決まり representation/index が所有します。retrieval request は target、run は read、trace は使用版を record しますが版 ownership は取得しません。
      relation_ids:
        - RetrievalRequest-targets-IndexVersion
        - RetrievalRun-reads-IndexVersion
        - RetrievalTrace-records-IndexVersion
      relation_not_applicable_reason: null
      source_claims:
        - claim-memory-retrieval-ranking-001
        - claim-memory-retrieval-ranking-002
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-memory-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 已确认 RetrievalRequest、RetrievalRun 与 RetrievalTrace 分别以 target、read、record 引用 IndexVersion，而不拥有或复制索引内部结构。
              en: Confirmed that RetrievalRequest, RetrievalRun, and RetrievalTrace reference IndexVersion through target, read, and record respectively without owning or duplicating index internals.
              ja: RetrievalRequest・RetrievalRun・RetrievalTrace が target・read・record で IndexVersion を参照し index 内部を所有・複製しないと確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 结构复核确认三条 accepted 关系共享 IndexVersion，但各自保留 Request、Run、Trace 的不同语义和检索侧端点。
              en: Structural review confirms that the three accepted relations share IndexVersion while preserving the distinct semantics and retrieval-side endpoints of Request, Run, and Trace.
              ja: 構造審査により三 accepted relation は IndexVersion を共有しつつ Request・Run・Trace の異なる意味と retrieval 側 endpoint を保持すると確認しました。
    - other_module_id: memory-embedding-indexes
      subject_concept_ids:
        - RetrievalRequest
        - RetrievalRun
        - RetrievalTrace
      decision: owns
      owner_module_id: memory-retrieval-ranking
      rationale:
        zh: 检索侧以三个不同层次接触同一 IndexVersion：RetrievalRequest 声明目标版本，RetrievalRun 记录实际读取版本，RetrievalTrace 固化可审计的已用版本。三者均由一次检索发生识别；它们不是 IndexVersion 的子类，也不接管索引版本身份。
        en: "The retrieval side touches the same IndexVersion at three distinct levels: RetrievalRequest declares the target, RetrievalRun records the version actually read, and RetrievalTrace fixes auditable evidence of the version used. All are identified by one retrieval occurrence; none is an IndexVersion subtype or takes ownership of index-version identity."
        ja: retrieval 側は同じ IndexVersion に三つの異なる level で接します。RetrievalRequest は target を宣言し、RetrievalRun は実際に read した版を記録し、RetrievalTrace は使用版の audit evidence を固定します。三者は一 retrieval occurrence で識別され、IndexVersion の下位型でも版 identity の owner でもありません。
      relation_ids:
        - RetrievalRequest-targets-IndexVersion
        - RetrievalRun-reads-IndexVersion
        - RetrievalTrace-records-IndexVersion
      relation_not_applicable_reason: null
      source_claims:
        - claim-memory-retrieval-ranking-011
        - claim-memory-retrieval-ranking-012
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-memory-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐条复核确认请求、运行和追踪分别承担 target、read 与 record 职责，三条 accepted 边均需保留。
              en: Point-by-point review confirms that request, run, and trace carry target, read, and record responsibilities respectively; all three accepted edges must remain.
              ja: 項目別審査により request・run・trace は target・read・record の責務をそれぞれ担い、三つの accepted edge をすべて保持すると確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 三条关系共享索引侧 IndexVersion 端点，但检索侧端点和语义各不相同；不得合并为一个泛化“使用索引”节点。
              en: The three relations share the IndexVersion endpoint but have distinct retrieval-side endpoints and meanings; they cannot be collapsed into one generic uses-index node.
              ja: 三 relation は index 側 IndexVersion endpoint を共有しますが retrieval 側 endpoint と意味は異なり、一 generic uses-index node へ統合しません。
    - other_module_id: memory-context
      subject_concept_ids:
        - RetrievedCandidate
        - RetrievedChunk
      decision: owns
      owner_module_id: memory-retrieval-ranking
      rationale:
        zh: RetrievedCandidate 与 RetrievedChunk 由检索运行、候选集合、分数和排名识别；ContextSelectionActivity 决定候选是否采用，ContextAssembly 消费已采用的 RetrievedChunk。两条边只表达下游选择与消费，不改写检索候选身份。
        en: RetrievedCandidate and RetrievedChunk are identified by retrieval run, candidate set, score, and rank. ContextSelectionActivity decides candidate admission, and ContextAssembly consumes an admitted RetrievedChunk. These edges express downstream selection and consumption without rewriting retrieval-candidate identity.
        ja: RetrievedCandidate と RetrievedChunk は retrieval run・candidate set・score・rank で識別します。ContextSelectionActivity は candidate admission を決定し、ContextAssembly は採用済み RetrievedChunk を consume します。二つの edge は downstream selection/consumption を表し retrieval-candidate identity を書き換えません。
      relation_ids:
        - ContextAssembly-consumes-RetrievedChunk
        - ContextSelectionActivity-selects-RetrievedCandidate
      relation_not_applicable_reason: null
      source_claims:
        - claim-memory-retrieval-ranking-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-memory-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 已确认检索结果成员不等于上下文采用结果；显式 selects 与 consumes 边连接两个阶段，但不通过影子候选节点改写检索身份。
              en: Confirmed that retrieval-result membership is not context admission; explicit selects and consumes edges connect the stages without rewriting retrieval identity through shadow candidate nodes.
              ja: retrieval-result membership は context admission ではなく、明示 selects/consumes edge が段階を接続しても shadow candidate node で retrieval identity を書き換えないと確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 结构复核确认 RetrievedCandidate 与 RetrievedChunk 保持检索所有权，ContextSelectionActivity 与 ContextAssembly 保持上下文所有权；跨界边不是 is_a。
              en: Structural review confirms that RetrievedCandidate and RetrievedChunk retain retrieval ownership while ContextSelectionActivity and ContextAssembly retain context ownership; the boundary edges are not is_a.
              ja: 構造審査により RetrievedCandidate・RetrievedChunk は retrieval ownership、ContextSelectionActivity・ContextAssembly は context ownership を保持し、境界 edge は is_a ではないと確認しました。
    - other_module_id: memory-context
      subject_concept_ids:
        - ContextAssembly
        - ContextSelectionActivity
      decision: references
      owner_module_id: memory-context
      rationale:
        zh: ContextSelectionActivity 选择一个 RetrievedCandidate 是否进入输入，ContextAssembly 随后消费已采用的 RetrievedChunk；二者均由具体上下文组装及其预算、槽位和版本识别。检索模块只提供候选，不拥有下游选择或组装活动。
        en: ContextSelectionActivity decides whether a RetrievedCandidate enters the input, and ContextAssembly then consumes an admitted RetrievedChunk. Both are identified by a concrete context assembly, its budget, slots, and version; retrieval supplies candidates but does not own downstream selection or assembly activities.
        ja: ContextSelectionActivity は RetrievedCandidate を入力へ採用するか決め、ContextAssembly は採用済み RetrievedChunk を続いて consume します。両者は具体 context assembly・budget・slot・version で識別され、retrieval は candidate を供給するだけで downstream selection/assembly activity を所有しません。
      relation_ids:
        - ContextAssembly-consumes-RetrievedChunk
        - ContextSelectionActivity-selects-RetrievedCandidate
      relation_not_applicable_reason: null
      source_claims:
        - claim-memory-retrieval-ranking-013
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-memory-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 逐条复核确认选择候选与消费已采用内容是两个上下文活动，不是检索候选的隐藏状态。
              en: Point-by-point review confirms that candidate selection and consumption of admitted content are two context activities, not hidden states of a retrieval candidate.
              ja: 項目別審査により candidate selection と採用内容 consumption は二つの context activity で、retrieval candidate の hidden state ではないと確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-17
            decision_note:
              zh: 两条 accepted 边的上下文侧端点分别是 ContextAssembly 与 ContextSelectionActivity，必须与检索侧 RetrievedChunk、RetrievedCandidate 分开归属。
              en: The context-side endpoints of the two accepted edges are ContextAssembly and ContextSelectionActivity and must remain separately owned from retrieval-side RetrievedChunk and RetrievedCandidate.
              ja: 二つの accepted edge の context 側 endpoint は ContextAssembly と ContextSelectionActivity で、retrieval 側 RetrievedChunk・RetrievedCandidate と owner を分離します。
  overlap_checks:
    - other_module_id: memory-embedding-indexes
      semantic_area:
        zh: 索引构建与索引查询
        en: Index construction versus index querying
        ja: index construction と index querying
      candidate_concept_ids:
        - RetrievalRequest
