review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-retrieval-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex 检索文档、Elasticsearch RRF、Cohere Rerank 与 ColBERT/cross-encoder 文献逐项核验概念定义、字段、关系与 RAG 检索管线结构。
    en: Verified concept definitions, fields, relations, and RAG retrieval pipeline structure against OpenAI Embeddings, Pinecone/Weaviate, LangChain/LlamaIndex retrieval docs, Elasticsearch RRF, Cohere Rerank, and ColBERT/cross-encoder literature.
    ja: OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex retrieval docs、Elasticsearch RRF、Cohere Rerank、ColBERT/cross-encoder 文献に照らし概念定義・フィールド・関係・RAG retrieval pipeline 構造を個別検証しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-memory-retrieval-ranking-001
    source: eng-fw-langchain-retrieval
    supports: LangChain defines retrieval as fetching relevant external knowledge at query time, models a retriever as a runnable accepting a query and returning Documents, and distinguishes retrievers from stores; Moonweave uses that evidence for the request-run-result boundary.
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-002
    source: eng-vector-qdrant-hybrid-query
    supports: Qdrant documents prefetch candidate stages, nested multi-stage queries, dense and sparse retrieval, fusion, limits, and score-distribution constraints; Moonweave uses that evidence for candidate-generation, scoring, and stage lineage.
    locator: Hybrid and Multi-Stage Queries > prefetches, fusion, and multi-stage queries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-003
    source: eng-search-elastic-rrf
    supports: Elasticsearch defines reciprocal rank fusion over independently ranked child retrievers and documents rank_constant, rank_window_size, and result truncation; Moonweave uses that evidence to separate fusion from scoring and Top-K selection.
    locator: Reciprocal rank fusion > formula, child retrievers, rank_constant, and rank_window_size
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-004
    source: eng-vector-pinecone-reranking
    supports: Pinecone documents two-stage retrieval in which initial results are rescored by a selected reranker with query, documents, rank_fields, top_n, and truncation; Moonweave uses that evidence to distinguish reranking from candidate generation and rank fusion.
    locator: Rerank results > two-stage retrieval and rerank request parameters
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-005
    source: eng-vector-qdrant-hybrid-query
    supports: Qdrant executes prefetch subqueries before the main query and exposes parameterized RRF; this case records index-v19, both prefetch limits, rrf_k=60, and Top-K so the ordered stages can be replayed.
    locator: Qdrant Hybrid Queries > prefetch parameter > nested stages; RRF > configurable k and ordered result sets
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-006
    source: eng-vector-qdrant-hybrid-query
    supports: Qdrant's main result depends on its prefetch inputs and RRF parameters; reading index-v20 with rrf_k=20 cannot reuse a trace that records index-v19 and rrf_k=60 merely because query text matches.
    locator: Qdrant Hybrid Queries > prefetch parameter > main query over prefetch results; RRF > configurable k
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-007
    source: eng-vector-pinecone-reranking
    supports: Pinecone defines reranking as a second scoring stage configured by model, query, rank_fields, and top_n; this case keeps the rerank score separate from earlier BM25 and cosine scores and records each producer.
    locator: Pinecone Rerank results > two-stage retrieval > rerank model, top_n, rank_fields, and returned ordering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-008
    source: eng-vector-pinecone-reranking
    supports: Pinecone returns an ordered reranked result after a model scores supplied documents; the ordinal position 3 alone is not a typed model score and lacks the required producing method and stage.
    locator: Pinecone Rerank results > standalone reranking request > model, query, documents, top_n, and rank_fields
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-009
    source: eng-fw-langchain-retrieval
    supports: LangChain defines a retriever's output as the Documents returned for a query and treats supplying them to generation as a downstream RAG step; this case stops at result-422 without fabricating context admission.
    locator: LangChain Retrieval > Building blocks > Retrievers return Documents for a query; RAG architectures > retrieval before generation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-010
    source: eng-fw-langchain-retrieval
    supports: LangChain's retriever contract concerns the documents actually returned for the query; candidate-499's membership in an earlier stage set cannot establish membership in the final retriever result after reranking and Top-K selection.
    locator: LangChain Retrieval > Building blocks > retriever output; RAG architectures > retrieved content versus model context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-011
    source: eng-fw-langchain-retrieval
    supports: "LangChain distinguishes query-time retrieval execution from the external knowledge stores it reads. Moonweave design inference: target declaration, actual read, and retained trace are separate retrieval-owned facts that all reference the independently owned IndexVersion."
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-retrieval-ranking-012
    source: eng-vector-qdrant-hybrid-query
    supports: Qdrant documents query and multi-stage execution over configured collections without redefining stored collection identity. Moonweave uses that separation to keep request, run, and trace identities in retrieval while IndexVersion remains in representations and indexes.
    locator: Hybrid and Multi-Stage Queries > prefetches, fusion, and multi-stage queries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
