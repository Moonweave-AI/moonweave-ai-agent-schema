schema: moonweave.ai/ontology-node/v1
id: memory-retrieval-ranking
kind: module
labels:
  zh: 检索与排序
  en: Retrieval and ranking
  ja: 検索と順位付け
semantics:
  short_definition:
    zh: 把查询变成有序候选并解释为何返回。
    en: Turns queries into ordered candidates and explains why they were returned.
    ja: クエリを順位付き候補にし、返却理由を説明します。
  definition:
    zh: 检索与排序描述从请求形成、实际索引读取、候选生成、阶段评分、排名融合、模型重排与 Top-K 截断到结果和追踪记录的完整闭环。RetrievalActivity 拥有执行过程，RetrievalArtifact 拥有请求、候选、分数与结果；IndexVersion 内部结构、ContextPackage 最终采用与安全扫描不归本模块。每次运行必须记录实际读取的索引版本与阶段参数，以便重放时复现候选成员与顺序。
    en: Retrieval and ranking describes the closed loop from request formation and actual index reading through candidate generation, stage scoring, rank fusion, model reranking, Top-K truncation, result, and trace. RetrievalActivity owns execution; RetrievalArtifact owns requests, candidates, scores, and results. IndexVersion internals, ContextPackage admission, and safety scanning are out of scope. Each run must record the index version actually read and stage parameters so replay can reproduce candidate membership and order.
    ja: 検索と順位付けは request 形成・actual index read・candidate 生成・stage scoring・rank fusion・model rerank・Top-K から result/trace までの閉ループです。RetrievalActivity が実行、RetrievalArtifact が request/candidate/score/result を所有。IndexVersion 内部、ContextPackage 採用、safety scan は scope 外。各 run は actual read した index 版と stage 参数を記録し replay で membership/order を再現します。
  why_needed:
    zh: 没有检索审计链，团队无法解释“为何返回这三条记忆、BM25 分与重排分来自哪一阶段、换索引版本后结果为何不同”。把 rank 位置当分数、把 Top-K 候选当已纳入上下文，都会导致 RAG 调试与合规回放失败。
    en: Without a retrieval audit chain, teams cannot explain why these three memories were returned, which stage produced BM25 versus rerank scores, or why results changed after an index version swap. Treating rank position as a score or Top-K candidates as context admission breaks RAG debugging and compliance replay.
    ja: 検索監査鎖がなければ、なぜ三記憶が返ったか、BM25 と rerank がどの stage か、index 版変更で結果が変わる理由を説明できません。rank 位置を score 扱い、Top-K を context 採用とみなすと RAG デバッグと compliance replay が失敗します。
  includes:
    - zh: RetrievalRequest、RetrievalRun、候选集合、阶段分数、Rank Fusion、Rerank、Top-K 与 RetrievalResult、RetrievalTrace。
      en: RetrievalRequest, RetrievalRun, candidate sets, stage scores, rank fusion, rerank, Top-K, RetrievalResult, and RetrievalTrace.
      ja: RetrievalRequest、RetrievalRun、candidate set、stage score、rank fusion、rerank、Top-K、RetrievalResult、RetrievalTrace。
  excludes:
    - zh: IndexVersion/Shard/Entry 构建细节；ContextPackage 与 token 预算裁剪；PatternScan 与 DefenseFinding。
      en: IndexVersion/Shard/Entry construction details; ContextPackage and token-budget trimming; PatternScan and DefenseFinding.
      ja: IndexVersion/Shard/Entry 構築詳細、ContextPackage と token 予算裁断、PatternScan と DefenseFinding。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 Mem0 POST /v1/memories/search（hybrid）、Pinecone index.query、Chroma collection.query、LangGraph store.search，以及二阶段 Cohere Rerank v3 与 ColBERT 式 late interaction。词汇分、向量相似度分与重排分必须保留产生阶段与方法版本；RRF 等融合参数需写入 trace 以支持重放。
    en: Integrations should map Mem0 POST /v1/memories/search (hybrid), Pinecone index.query, Chroma collection.query, LangGraph store.search, and second-stage Cohere Rerank v3 or ColBERT-style late interaction separately. Lexical, vector-similarity, and rerank scores must retain producing stage and method version; fusion parameters such as RRF must be written to the trace for replay.
    ja: 統合では Mem0 POST /v1/memories/search（hybrid）、Pinecone index.query、Chroma collection.query、LangGraph store.search、二段 Cohere Rerank v3、ColBERT late interaction を個別写像。lexical/vector/rerank score は生成 stage と method 版を保持し、RRF 等 fusion 参数は trace に記録して replay 可能にします。
  typical_input:
    - description: Mem0 hybrid search — semantic query with optional filters and top_k.
      format: |
        POST https://api.mem0.ai/v1/memories/search/
        {
          "query": "What language does Alice prefer for code?",
          "user_id": "alice",
          "agent_id": "support-bot",
          "top_k": 5,
          "filters": {"category": "preferences"}
        }
      source_claims: [claim-memory-retrieval-ranking-mem0]
    - description: Pinecone query — dense vector search with namespace and metadata filter.
      format: |
        index.query(
          vector=[0.12, -0.04, 0.33, ...],
          top_k=10,
          namespace="tenant-7-user-alice",
          filter={"category": {"$eq": "preferences"}},
          include_metadata=True
        )
      source_claims: [claim-memory-retrieval-ranking-pinecone]
    - description: Chroma collection.query — text or embedding query against a collection.
      format: |
        collection.query(
          query_texts=["Alice code language preference"],
          n_results=5,
          where={"user_id": "alice"}
        )
      source_claims: [claim-memory-retrieval-ranking-chroma]
    - description: LangGraph store.search — semantic search over BaseStore Items with namespace filter.
      format: |
        await store.search(
          ("tenant-7", "user-42"),
          query="response language preference",
          limit=10
        )
      source_claims: [claim-memory-retrieval-ranking-langgraph]
    - description: Cohere Rerank v3 — second-stage rescore of candidate documents.
      format: |
        POST https://api.cohere.com/v2/rerank
        {
          "model": "rerank-v3.5",
          "query": "What language does Alice prefer for code?",
          "documents": [
            {"text": "Prefers TypeScript for examples."},
            {"text": "Timezone is JST."}
          ],
          "top_n": 3
        }
      source_claims: [claim-memory-retrieval-ranking-cohere]
    - description: ColBERT late interaction — token-level MaxSim between query and document embeddings.
      format: |
        # query_embeddings: [num_query_tokens, dim]
        # doc_embeddings: [num_doc_tokens, dim]
        score = sum(max(dot(q_t, d_j) for d_j in doc_tokens) for q_t in query_tokens)
      source_claims: [claim-memory-retrieval-ranking-colbert]
  typical_output:
    - description: Moonweave-local retrieval result with stage scores and replayable trace.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "retrieval_run_id": "run-411",
          "retrieval_request_id": "request-419",
          "actual_index_version_id": "index-v19",
          "stages": [
            {"stage_id": "prefetch-sparse-411", "method": "BM25", "limit": 40},
            {"stage_id": "prefetch-dense-411", "method": "cosine-similarity", "limit": 40},
            {"stage_id": "rrf-411", "method": "RRF", "rrf_k": 60},
            {"stage_id": "rerank-416", "method": "cohere-rerank-v3.5", "top_n": 10}
          ],
          "final_candidate_ids": ["candidate-424", "candidate-431", "candidate-447"],
          "scores": [
            {"candidate_id": "candidate-424", "stage": "lexical", "value": 8.73},
            {"candidate_id": "candidate-424", "stage": "rerank", "value": 0.917}
          ],
          "context_admission_asserted": false
        }
      source_claims: [claim-memory-retrieval-ranking-design]
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys: [retrieval_run_id, retrieval_request_id]
  fields:
    - id: retrieval_run_id
      labels: {zh: 检索运行标识, en: Retrieval run identifier, ja: 検索実行識別子}
      definitions:
        zh: 唯一标识一次端到端检索执行，包含实际读取的 IndexVersion 与阶段链。
        en: Uniquely identifies one end-to-end retrieval execution including the IndexVersion actually read and stage chain.
        ja: actual read IndexVersion と stage chain を含む end-to-end 検索実行を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: run-411
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: retrieval_request_id
      labels: {zh: 检索请求标识, en: Retrieval request identifier, ja: 検索リクエスト識別子}
      definitions:
        zh: 规范检索请求的 stable ID，包含 query digest 与 filter；不等于 run，因为同一 query 可读取不同 index 版本。
        en: Stable ID for the normative retrieval request with query digest and filters; distinct from run because the same query may read different index versions.
        ja: query digest と filter を含む normative request の stable ID。同一 query でも index 版が異なれば run と別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: request-419
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: query_text
      labels: {zh: 查询文本, en: Query text, ja: クエリ文本}
      definitions:
        zh: 提交给检索后端的自然语言或关键词 query；Mem0 search、Chroma query_texts、Cohere rerank query 映射到此字段。
        en: Natural-language or keyword query submitted to the retrieval backend; maps from Mem0 search, Chroma query_texts, or Cohere rerank query.
        ja: 検索 backend へ送る自然言語/キーワード query。Mem0 search、Chroma query_texts、Cohere rerank query を写像。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: What language does Alice prefer for code?
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-mem0, claim-memory-retrieval-ranking-chroma]
    - id: actual_index_version_id
      labels: {zh: 实际索引版本, en: Actual index version, ja: 実際索引版}
      definitions:
        zh: 本次 run 实际读取的 IndexVersion；重放必须匹配此版本，不能仅凭 query 文本相同复用旧 trace。
        en: IndexVersion actually read by this run; replay must match this version—a matching query text alone cannot reuse an old trace.
        ja: 今回 run が actual read した IndexVersion。replay はこの版一致必須で、query 文本一致だけでは旧 trace 再利用不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-v19
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: top_k
      labels: {zh: Top-K, en: Top-K, ja: Top-K}
      definitions:
        zh: 最终返回或截断的候选数量上限；阶段 prefetch limit 可以更大，但 Top-K 阶段必须单独记录。
        en: Upper bound on candidates returned or truncated; prefetch stage limits may be larger but Top-K stage must be recorded separately.
        ja: 最終返却/截断候補数上限。prefetch limit は更大可だが Top-K stage は別記録必須。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 10
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-mem0, claim-memory-retrieval-ranking-pinecone]
    - id: rrf_k
      labels: {zh: RRF 常数, en: RRF constant, ja: RRF 定数}
      definitions:
        zh: Reciprocal Rank Fusion 的 rank_constant；写入 trace 以支持 hybrid 检索重放。
        en: rank_constant for Reciprocal Rank Fusion; written to trace to support hybrid retrieval replay.
        ja: Reciprocal Rank Fusion の rank_constant。hybrid 検索 replay 用に trace へ記録。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 60
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: rerank_model
      labels: {zh: 重排模型, en: Rerank model, ja: 再順位モデル}
      definitions:
        zh: 二阶段重排所用模型标识，如 cohere rerank-v3.5；与 lexical/vector 分数不可直接比大小。
        en: Model identifier for second-stage reranking, e.g., cohere rerank-v3.5; not directly comparable to lexical/vector scores.
        ja: 二段 rerank の model ID（例 cohere rerank-v3.5）。lexical/vector score と直接比較不可。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: rerank-v3.5
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-cohere]
    - id: rank_position
      labels: {zh: 排名位置, en: Rank position, ja: 順位位置}
      definitions:
        zh: 候选在最终结果中的序数位置；不是 RetrievalScore，不能替代阶段分数。
        en: Ordinal position of a candidate in the final result; not a RetrievalScore and cannot substitute stage scores.
        ja: 最終結果における候補の序数位置。RetrievalScore ではなく stage score の代替不可。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims: [claim-memory-retrieval-ranking-design]
  constraints:
    - id: heterogeneous-scores-not-comparable
      severity: error
      expression_language: plain
      expression: BM25, cosine-similarity, and rerank scores must retain stage, method, and model version; rank_position must not be stored as RetrievalScore.
      explanation:
        zh: 混用不同量纲会导致错误的相关性解释与 A/B 对比。
        en: Mixing scales causes incorrect relevance explanations and invalid A/B comparisons.
        ja: スケール混在は誤った関連性説明と invalid な A/B 比較を招きます。
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: replay-requires-index-version
      severity: error
      expression_language: plain
      expression: RetrievalTrace replay must bind the same actual_index_version_id and stage parameters; equal query text alone is insufficient.
      explanation:
        zh: 索引版本或 RRF 参数变化会改变候选集合，不能复用旧 trace。
        en: Index version or RRF parameter changes alter candidate sets; old traces cannot be reused.
        ja: index 版や RRF 参数変更で candidate set が変わり、旧 trace は再利用不可。
      source_claims: [claim-memory-retrieval-ranking-design]
    - id: top-k-not-context-admission
      severity: warning
      expression_language: plain
      expression: RetrievalResult membership must not assert ContextPackage admission; downstream context assembly owns final input selection.
      explanation:
        zh: 检索返回的文档集合不等于模型最终看见的 prompt 内容。
        en: Documents returned by retrieval are not the prompt content the model ultimately sees.
        ja: 検索返却 document 集合はモデルが最終的に見る prompt 内容ではありません。
      source_claims: [claim-memory-retrieval-ranking-design]
  required_relations: []
examples:
  - id: memory-retrieval-ranking-example-mem0-hybrid
    labels:
      zh: Mem0 混合检索
      en: Mem0 hybrid search
      ja: Mem0 ハイブリッド検索
    descriptions:
      zh: 应用向 Mem0 POST /v1/memories/search/ 发送 “Alice 代码语言偏好”，携带 user_id=alice、agent_id=support-bot、top_k=5 与 category 过滤。Mem0 在实体作用域内做 semantic/hybrid 召回；Moonweave 记录 request-419、run-411 与返回记忆列表，但不声明这些候选已进入 ContextPackage。
      en: The app sends "Alice code language preference" to Mem0 POST /v1/memories/search/ with user_id=alice, agent_id=support-bot, top_k=5, and category filter. Mem0 recalls within entity scope semantically/hybrid; Moonweave records request-419, run-411, and returned memories without asserting ContextPackage admission.
      ja: アプリが Mem0 POST /v1/memories/search/ へ “Alice code language preference” を user_id=alice、agent_id=support-bot、top_k=5、category filter で送信。Mem0 が entity 作用域内 semantic/hybrid recall。Moonweave は request-419、run-411、返却記憶を記録し ContextPackage 採用は宣言しません。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/search/
    field_values:
      query: What language does Alice prefer for code?
      user_id: alice
      agent_id: support-bot
      top_k: 5
      filters:
        category: preferences
      returned_memory_ids:
        - mem0-8f3c2a1b
        - mem0-9a1b2c3d
    related_node_ids:
      - memory-retrieval-ranking
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-retrieval-ranking-mem0
      - claim-memory-retrieval-ranking-design
  - id: memory-retrieval-ranking-example-pinecone-chroma
    labels:
      zh: Pinecone 与 Chroma 向量查询
      en: Pinecone and Chroma vector query
      ja: Pinecone と Chroma ベクトルクエリ
    descriptions:
      zh: RAG 流水线先用 OpenAI embedding 得到 query vector，再并行调用 Pinecone index.query（namespace tenant-7-user-alice, top_k=10）与 Chroma collection.query（n_results=5, where user_id=alice）。两路候选进入 RRF 融合；Moonweave 分别记录 dense score 与 namespace/collection 上下文。
      en: The RAG pipeline embeds the query, then calls Pinecone index.query (namespace tenant-7-user-alice, top_k=10) and Chroma collection.query (n_results=5, where user_id=alice) in parallel. Both candidate sets feed RRF fusion; Moonweave records dense scores and namespace/collection context separately.
      ja: RAG pipeline が query を embed し、Pinecone index.query（namespace tenant-7-user-alice, top_k=10）と Chroma collection.query（n_results=5, where user_id=alice）を並列実行。両 candidate を RRF 融合。Moonweave は dense score と namespace/collection context を別記録。
    example_source:
      product: Pinecone and Chroma
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: index.query and collection.query
    field_values:
      pinecone_namespace: tenant-7-user-alice
      pinecone_top_k: 10
      chroma_collection: agent_memories_alice
      chroma_n_results: 5
      fusion_method: RRF
      rrf_k: 60
    related_node_ids:
      - memory-retrieval-ranking
      - memory-embedding-indexes
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-retrieval-ranking-pinecone
      - claim-memory-retrieval-ranking-chroma
      - claim-memory-retrieval-ranking-design
  - id: memory-retrieval-ranking-example-langgraph-store-search
    labels:
      zh: LangGraph store.search
      en: LangGraph store.search
      ja: LangGraph store.search
    descriptions:
      zh: LangGraph 应用在 BaseStore 上对 namespace prefix ("tenant-7","user-42") 执行 search(query="response language", limit=10)，返回匹配 key 的 Item 列表。Moonweave 将其建模为 RetrievalRun 读取 langgraph-store-v3 索引版本，并把 Item key 映射为 RetrievedCandidate 身份。
      en: A LangGraph app runs store.search on namespace prefix ("tenant-7","user-42") with query="response language", limit=10, returning matching Items. Moonweave models this as RetrievalRun reading langgraph-store-v3 index version and maps Item keys to RetrievedCandidate identity.
      ja: LangGraph アプリが namespace prefix ("tenant-7","user-42") で store.search(query="response language", limit=10) を実行し matching Item を返却。Moonweave は RetrievalRun が langgraph-store-v3 を read したモデルとし Item key を RetrievedCandidate identity に写像。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.search
    field_values:
      namespace_prefix:
        - tenant-7
        - user-42
      query: response language
      limit: 10
      matched_keys:
        - response-language
        - response-style
    related_node_ids:
      - memory-retrieval-ranking
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-retrieval-ranking-langgraph
      - claim-memory-retrieval-ranking-design
  - id: memory-retrieval-ranking-example-cohere-rerank
    labels:
      zh: Cohere Rerank 二阶段重排
      en: Cohere Rerank second stage
      ja: Cohere Rerank 二段再順位
    descriptions:
      zh: 初始 BM25 与 cosine 候选各 40 条经 RRF 合并后，应用调用 Cohere POST /v2/rerank（model=rerank-v3.5, top_n=10）对 20 条文档重排。candidate-424 的 rerank score 0.917 与 lexical 8.73、cosine 0.842 分开保存，并记录 rerank-416 活动与模型版本。
      en: After RRF merges 40 BM25 and 40 cosine candidates, the app calls Cohere POST /v2/rerank (model=rerank-v3.5, top_n=10) on 20 documents. candidate-424's rerank score 0.917 is stored separately from lexical 8.73 and cosine 0.842, with rerank-416 activity and model version recorded.
      ja: BM25/cosine 各 40 候補を RRF 合并後、Cohere POST /v2/rerank（model=rerank-v3.5, top_n=10）で 20 文档を rerank。candidate-424 の rerank 0.917 は lexical 8.73、cosine 0.842 と分離保存し rerank-416 と model 版を記録。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: POST /v2/rerank rerank-v3.5
    field_values:
      rerank_model: rerank-v3.5
      top_n: 10
      candidate_id: candidate-424
      lexical_score: 8.73
      cosine_score: 0.842
      rerank_score: 0.917
      rerank_activity_id: rerank-416
    related_node_ids:
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-retrieval-ranking-cohere
      - claim-memory-retrieval-ranking-design
  - id: memory-retrieval-ranking-example-colbert-late-interaction
    labels:
      zh: ColBERT 迟交互检索
      en: ColBERT late interaction retrieval
      ja: ColBERT late interaction 検索
    descriptions:
      zh: 对长文档候选，ColBERT 将 query 与 document 分别编码为 token 级向量，通过 MaxSim 求 late interaction score 并排序。该分数与双塔 cosine 不同量纲；Moonweave 在 CandidateScoringActivity 中标记 method=colbert-maxsim 并保留 token embedding 模型版本，而不把 rank 位置写成 RetrievalScore。
      en: For long-document candidates, ColBERT encodes query and document to token-level vectors and ranks by MaxSim late interaction score. This scale differs from bi-encoder cosine; Moonweave tags method=colbert-maxsim in CandidateScoringActivity with token embedding model version, without writing rank position as RetrievalScore.
      ja: 長文候補で ColBERT が query/document を token 级 vector に编码し MaxSim late interaction score で順位付け。bi-encoder cosine とスケール不同。Moonweave は CandidateScoringActivity に method=colbert-maxsim と token embedding model 版を付与し rank 位置を RetrievalScore にしません。
