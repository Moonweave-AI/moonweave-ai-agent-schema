schema: moonweave.ai/ontology-node/v1
id: memory-retrieval-ranking
kind: module
status: accepted
labels:
  zh: 检索与排序模块
  en: Retrieval and Ranking Module
  ja: 検索と順位付けモジュール
semantics:
  short_definition:
    zh: 将查询转换为带来源与排序依据的候选结果，供后续上下文装配使用的模块。
    en: A module that turns a query into candidates with provenance and ranking basis for later context assembly.
    ja: クエリを来歴と順位根拠を持つ候補へ変換し、後続コンテキスト組立に渡すモジュール。
  definition:
    zh: 本模块描述从 RetrievalRequest、RetrievalQuery 与 RetrievalFilter 到候选生成、评分、排序、top-k、rerank、rank fusion 和 RetrievalResult 的检索边界。它产出可审计的 RetrievedCandidate 与 RetrievalScore，而不构建索引、不生成 embedding、不决定哪些候选进入模型 ContextPackage，也不把评分或排名视为事实正确性、授权或模型已使用某候选的证明。RetrievalActivity 是执行操作；RetrievalArtifact 是请求、候选与结果等数据对象。
    en: This module covers the retrieval boundary from RetrievalRequest, RetrievalQuery, and RetrievalFilter through candidate generation, scoring, ranking, top-k, reranking, rank fusion, and RetrievalResult. It produces auditable RetrievedCandidate and RetrievalScore records without building an index, generating embeddings, deciding which candidates enter a model ContextPackage, or treating a score or rank as proof of factual correctness, authorization, or model use. RetrievalActivity is the execution operation, while RetrievalArtifact is the data object such as request, candidate, and result.
    ja: このモジュールは RetrievalRequest、RetrievalQuery、RetrievalFilter から candidate generation、scoring、ranking、top-k、reranking、rank fusion、RetrievalResult までの検索境界を扱います。監査可能な RetrievedCandidate と RetrievalScore record を生みますが、index 構築、embedding 生成、候補を model ContextPackage に入れる決定、score や rank を事実正確性・認可・model 使用の証明として扱うことはしません。RetrievalActivity は実行操作であり、RetrievalArtifact は request、candidate、result などの data object です。
  why_needed:
    zh: 模型无法在每次调用中阅读完整语料库，且外部数据会变化。检索需要将用户或任务查询与可访问来源匹配，并留下足以说明候选从何而来、由何种分数和算法排序的证据；否则下游无法区分“可用候选”“实际可见上下文”和“被模型采纳的答案依据”。
    en: A model cannot read an entire corpus on every call, and external data changes. Retrieval must match a user or task query to accessible sources and retain enough evidence to explain where candidates came from and which scores and algorithms ordered them. Otherwise downstream systems cannot distinguish an available candidate, actual visible context, and evidence the model adopted in an answer.
    ja: model は毎回完全 corpus を読めず、外部 data も変化します。retrieval は user または task query をアクセス可能な source と対応付け、candidate の出所と、それを順序付けた score・algorithm を説明する十分な evidence を残す必要があります。さもなければ下流 system は、利用可能 candidate、実際の可視 context、model が回答で採用した根拠を区別できません。
  includes:
    - zh: 查询、过滤器、候选生成、候选集、分数、排序、top-k、rerank、融合以及结果和运行追踪。
      en: Queries, filters, candidate generation, candidate sets, scores, ranking, top-k, reranking, fusion, results, and run tracing.
      ja: query、filter、candidate generation、candidate set、score、ranking、top-k、reranking、fusion、result、run trace。
  excludes:
    - zh: 离线 embedding 或 index 构建、持久 MemoryRecord 写入、上下文预算选择、模型推理和生成。
      en: Offline embedding or index construction, persistent MemoryRecord writes, context-budget selection, model inference, and generation.
      ja: offline embedding または index 構築、永続 MemoryRecord 書込み、context-budget 選択、model inference、generation。
  semantic_kind: module
  aliases: [RAG retrieval, candidate retrieval, 检索排序]
engineering:
  explanation:
    zh: LangChain 将 retriever 定义为接收非结构化查询并返回文档的接口。pgvector 支持以距离排序并 LIMIT k 返回最近邻；Elasticsearch RRF 会独立执行多个 retriever 并合并其 top 文档。Moonweave 把这些 I/O 分解为请求、活动、候选、分数和结果，以免把提供商 API 的临时返回或排名策略误作持久来源或上下文选择。
    en: LangChain defines a retriever as an interface returning documents for an unstructured query. pgvector supports ordering by distance and LIMIT k to return nearest neighbors, while Elasticsearch RRF independently executes multiple retrievers and combines their top documents. Moonweave separates those I/O concerns into request, activity, candidate, score, and result so temporary API returns or ranking policy are not mistaken for persistent source or context selection.
    ja: LangChain は retriever を非構造化 query に対して document を返す interface と定義します。pgvector は距離順と LIMIT k で nearest neighbor を返せ、Elasticsearch RRF は複数 retriever を独立に実行して top document を結合します。Moonweave はこれらの I/O を request、activity、candidate、score、result に分離し、一時 API return や ranking policy を persistent source や context selection と誤認しません。
  typical_input:
    - description: pgvector nearest-neighbor query
      format: |
        SELECT id, content
        FROM memory_chunks
        ORDER BY embedding <-> '[0.1,0.2,0.3]'
        LIMIT 20;
    - description: Elasticsearch reciprocal-rank-fusion request
      format: |
        GET knowledge/_search
        {
          "retriever": {
            "rrf": {
              "retrievers": [/* lexical and kNN retrievers */],
              "rank_window_size": 50,
              "rank_constant": 20
            }
          }
        }
  typical_output:
    - description: Moonweave candidate-result envelope
      format: |
        {
          "retrieval_result_id": "retrieval-result-support-18",
          "request_ref": "retrieval-request-support-18",
          "candidate_refs": ["candidate-42", "candidate-77"],
          "ranking_method_ref": "rank-policy-hybrid-rrf-v1"
        }
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Describes retrievers returning documents for a query and retrieval within RAG workflows.
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents nearest-neighbor vector queries using ORDER BY distance and LIMIT.
    - name: Elasticsearch reciprocal rank fusion
      url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
      description: Documents independently run retrievers, rank-window controls, and RRF result fusion.
structure:
  identity_keys: [retrieval_contract_id]
  fields:
    - id: retrieval_contract_id
      labels: {zh: 检索契约标识, en: retrieval contract ID, ja: retrieval contract ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识可重用的查询、候选和排序约定，不复用为一次运行、请求或结果标识。
        en: Identifies reusable query, candidate, and ranking conventions and is not reused as one run, request, or result ID.
        ja: 再利用可能な query、candidate、ranking 規約を識別し、一回の run、request、result ID として再利用しません。
      allowed_values: []
      pattern: "^retrieval-contract-[A-Za-z0-9._-]+$"
      example_value: retrieval-contract-support-v1
      source_claims: [claim-retrieval-module-pipeline]
    - id: candidate_limit
      labels: {zh: 候选上限, en: candidate limit, ja: candidate limit}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明候选生成或融合阶段可返回的最大候选数，不等同于模型上下文预算或最终回答长度。
        en: Declares the maximum candidates a generation or fusion stage may return and is not model-context budget or final answer length.
        ja: candidate generation または fusion stage が返せる最大候補数を宣言し、model-context budget や最終回答長ではありません。
      allowed_values: []
      pattern: null
      example_value: 50
      source_claims: [claim-retrieval-module-pgvector-topk]
    - id: ranking_method_ref
      labels: {zh: 排序方法引用, en: ranking-method reference, ja: ranking-method 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向采用的评分、rerank 或融合方法版本；它不是某个候选的实际分数。
        en: Points to the versioned scoring, rerank, or fusion method and is not an actual score of one candidate.
        ja: versioned scoring、rerank、fusion method を指し、一候補の実際の score ではありません。
      allowed_values: []
      pattern: "^rank-policy-[A-Za-z0-9._-]+$"
      example_value: rank-policy-hybrid-rrf-v1
      source_claims: [claim-retrieval-module-rrf]
    - id: provenance_required
      labels: {zh: 必须记录来源, en: provenance required, ja: provenance required}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示每个结果候选必须能引用来源对象、运行和评分方法，而非只返回不可解释文本。
        en: Indicates every result candidate must be able to reference its source object, run, and scoring method rather than return unexplained text alone.
        ja: 各 result candidate が source object、run、scoring method を参照でき、説明不能な text だけを返さないことを示します。
      allowed_values: [true]
      pattern: null
      example_value: true
      source_claims: [claim-retrieval-module-provenance]
  constraints:
    - id: retrieval-module-result-boundary
      severity: error
      expression_language: plain
      expression: A retrieval result must preserve request_ref, candidate provenance, and ranking-method identity. It must not assert that a candidate was inserted into ContextPackage, attended by a model, factually correct, authorized, or persisted as memory without separate facts.
      explanation:
        zh: 检索结束于可解释候选和结果；上下文选择、模型使用、事实验证与记忆生命周期均属于独立边界。
        en: Retrieval ends with explainable candidates and results; context selection, model use, factual validation, and memory lifecycle are independent boundaries.
        ja: retrieval は説明可能な candidate と result で終わり、context selection、model use、factual validation、memory lifecycle は独立した境界です。
      source_claims: [claim-retrieval-module-pipeline, claim-retrieval-module-provenance]
    - id: retrieval-module-ranking-not-truth
      severity: warning
      expression_language: plain
      expression: A score or rank is comparable only under its declared method, scale, query, and candidate set. It must not be interpreted as a universal relevance probability or a guarantee of answer quality.
      explanation:
        zh: 不同索引、检索器、归一化和 reranker 的数值没有自动可比性，排名也不是正确性证明。
        en: Values from different indexes, retrievers, normalizations, and rerankers are not automatically comparable, and rank is not proof of correctness.
        ja: 異なる index、retriever、normalization、reranker の値は自動的に比較可能ではなく、rank は正確性の証明ではありません。
      source_claims: [claim-retrieval-module-rrf]
  required_relations: []
examples:
  - id: retrieval-module-example-positive-hybrid-result

    labels: {zh: 可追溯的混合候选结果, en: Traceable hybrid candidate result, ja: traceable hybrid candidate result}

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      retrieval_contract_id: retrieval-contract-support-v1
      candidate_limit: 50
      ranking_method_ref: rank-policy-hybrid-rrf-v1
      provenance_required: true
    related_node_ids: [RetrievalRequest, CandidateGenerationActivity, RankFusion, RetrievalResult]
    related_relation_ids: []

    source_claims: [claim-retrieval-module-rrf, claim-retrieval-module-rag-paper]
  - id: retrieval-module-example-counterexample-context-inclusion

    labels: {zh: 把候选结果当作已见上下文, en: Treat candidate result as visible context, ja: candidate result を可視 context と扱う}

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      candidate_limit: 50
      asserted_visible_candidate_count: 50
      context_package_ref: null
    related_node_ids: [RetrievalResult, ContextPackage, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-retrieval-module-pipeline]
  - id: retrieval-module-example-boundary-index-build

    labels: {zh: 索引构建不是在线检索, en: Index construction is not online retrieval, ja: index construction は online retrieval ではない}

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      operation_kind: index_build
      retrieval_contract_id: null
      candidate_limit: null
    related_node_ids: [RetrievalActivity, RetrievalResult]
    related_relation_ids: []

    source_claims: [claim-retrieval-module-pgvector-topk]
  - id: retrieval-module-example-instance-pgvector-topk

    labels: {zh: "实例：pgvector 最近邻查询", en: "Instance: pgvector nearest-neighbor query", ja: "インスタンス：pgvector nearest-neighbor query"}

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      retrieval_contract_id: retrieval-contract-support-v1
      candidate_limit: 20
      ranking_method_ref: rank-policy-vector-l2-v1
      provenance_required: true
    related_node_ids: [RetrievalRequest, CandidateGenerationActivity, RetrievedCandidate, RetrievalScore]
    related_relation_ids: []
    source_claims: [claim-retrieval-module-pgvector-topk]
parent_relation: null
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Defines retrievers as interfaces returning documents for unstructured queries and describes retrieval in RAG systems.
  - id: pgvector-readme
    title: pgvector project documentation
    source_type: official-project-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents nearest-neighbor vector search using ORDER BY distance and LIMIT.
  - id: elasticsearch-rrf
    title: Elasticsearch reciprocal rank fusion
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
    relevance: Documents independent retrievers, RRF parameters, and combined ranked hits.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    source_type: academic-paper
    url: https://arxiv.org/abs/2005.11401
    relevance: Introduces retrieval-augmented generation with retrieved non-parametric memory conditioned into generation.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes entities, activities, usage, and generated output for provenance representation.
source_claims:
  - id: claim-retrieval-module-pipeline
    source: langchain-retrieval
    supports: LangChain describes retrieval as fetching relevant external knowledge at query time and a retriever as an interface returning documents for an unstructured query. Moonweave separates request, activity, candidate, and result records around that interface.
    locator: "Retrieval overview and retriever building block"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-module-pgvector-topk
    source: pgvector-readme
    supports: pgvector documents nearest-neighbor queries with ORDER BY a distance operator and LIMIT, including a concrete LIMIT 5 example. Moonweave treats these rows as bounded candidate output rather than a context-selection or answer-quality guarantee.
    locator: "Getting Started and Querying nearest neighbors"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-module-rrf
    source: elasticsearch-rrf
    supports: Elasticsearch documents RRF executing child retrievers independently, then combining their top documents subject to rank_window_size and result size. Moonweave records fusion method and candidate-set scope so scores and ranks are not compared outside their declared context.
    locator: "RRF parameters and example request"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-module-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes entities, activities that use entities, and generated entities. Moonweave requires retrieval candidates and results to retain a link to the request, source, and activity without treating provenance as model-use evidence.
    locator: "PROV-O Entity, Activity, usage, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-module-rag-paper
    source: rag-paper
    supports: Lewis et al. describe retrieval-augmented generation as combining a parametric generator with retrieved non-parametric memory. The paper supports separating retrieval output from downstream generation; Moonweave's request, candidate, score, and result records are local engineering design.
    locator: "Abstract and model description"
    evidence_kind: academic-result
    confidence: high
