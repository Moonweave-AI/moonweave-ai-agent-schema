    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/query-data
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: POST /v2/rerank with rerank-v3 models.
  - id: src-langgraph-search
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
