    supports: LangChain documents retrieval as an operation that accepts a query and returns relevant documents; Moonweave separates the operation from its information artifacts.
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-retrieval-activity-002
    source: eng-fw-langchain-retrieval
    supports: "LangChain documents retrieval as an operation that accepts a query and returns relevant documents; Moonweave separates the operation from its information artifacts. Moonweave records RetrievalActivity.activity_id as the stated auditable datum: Stable identifier for one retrieval-domain activity."
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-retrieval-activity-003
    source: eng-fw-langchain-retrieval
    supports: "LangChain documents retrieval as an operation that accepts a query and returns relevant documents; Moonweave separates the operation from its information artifacts. Moonweave records RetrievalActivity.started_at as the stated auditable datum: Event time at which the activity started."
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-retrieval-activity-004
    source: eng-fw-langchain-retrieval
    supports: LangChain documents retrieval as an operation that accepts a query and returns relevant documents; Moonweave separates the operation from its information artifacts. The case applies the documented retrieval-stage separation without treating a vendor query object as the ontology activity.
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-retrieval-activity-005
    source: eng-fw-langchain-retrieval
    supports: LangChain documents retrieval as an operation that accepts a query and returns relevant documents; Moonweave separates the operation from its information artifacts. The documentation distinguishes retrieval inputs from the retriever operation that consumes them.
    locator: Retrieval > Building blocks, retriever interface, and RAG architectures
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
