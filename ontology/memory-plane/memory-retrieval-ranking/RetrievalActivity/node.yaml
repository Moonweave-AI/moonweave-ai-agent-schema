source_claims:
  - id: claim-retrieval-activity-mem0
    source: src-mem0-search
    supports: Mem0 search is an auditable retrieval execution with query, filters, and top_k.
    locator: Search memories API
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-activity-pinecone
    source: src-pinecone-query
    supports: Pinecone index.query is a vector retrieval activity returning ScoredVector matches.
    locator: Query data guide
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-activity-cohere
    source: src-cohere-rerank
    supports: Cohere rerank is a second-stage ranking activity separate from initial recall.
    locator: POST /v2/rerank
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-activity-langgraph
    source: src-langgraph-search
    supports: LangGraph store.search performs semantic retrieval over namespace-scoped Items.
    locator: BaseStore.search
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-activity-design
    source: src-memory-retrieval-design
    supports: Moonweave separates retrieval activities from request and result artifacts.
    locator: memory-retrieval-ranking module
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-activity-id
    source: src-memory-retrieval-design
    supports: activity_id stably identifies one retrieval-domain activity.
    locator: RetrievalActivity structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-activity-started
    source: src-memory-retrieval-design
    supports: started_at records when the retrieval activity began.
    locator: RetrievalActivity structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-activity-backend
    source: src-memory-retrieval-design
    supports: backend names the product executing the retrieval activity.
    locator: RetrievalActivity structure
    evidence_kind: design-inference
    confidence: high
