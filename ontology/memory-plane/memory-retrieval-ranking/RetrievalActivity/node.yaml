schema: moonweave.ai/ontology-node/v1
id: RetrievalActivity
kind: concept
labels:
  zh: 检索活动
  en: Retrieval activity
  ja: 検索活動
semantics:
  short_definition:
    zh: 可审计的检索执行过程。
    en: Auditable retrieval execution.
    ja: 監査可能な検索実行です。
  definition:
    zh: RetrievalActivity 是具有独立 activity_id、started_at 与可追踪输入输出的执行上位概念；它统摄 RetrievalRun、CandidateGenerationActivity 与 RankingOperation 等阶段，但不是 RetrievalRequest、RetrievalResult、RetrievedCandidate 或 RetrievalScore 等信息产物。集成 Mem0 search、Pinecone index.query、Chroma collection.query、LangGraph store.search 以及 Cohere/ColBERT 二阶段排序时，每个后端调用应映射为具名活动节点而非混为请求或结果。
    en: RetrievalActivity is the activity genus with its own activity_id, started_at, and traceable inputs and outputs. It subsumes RetrievalRun, CandidateGenerationActivity, and RankingOperation stages but is not an information artifact such as RetrievalRequest, RetrievalResult, RetrievedCandidate, or RetrievalScore. When integrating Mem0 search, Pinecone index.query, Chroma collection.query, LangGraph store.search, and second-stage Cohere or ColBERT ranking, each backend call should map to a named activity rather than being conflated with request or result records.
    ja: RetrievalActivity は独立 activity_id・started_at・追跡可能 input/output を持つ activity 上位概念で、RetrievalRun・CandidateGenerationActivity・RankingOperation 等を包含しますが RetrievalRequest・RetrievalResult・RetrievedCandidate・RetrievalScore 等 information artifact ではありません。Mem0 search、Pinecone index.query、Chroma collection.query、LangGraph store.search、二段 Cohere/ColBERT ranking 統合時は各 backend 呼出しを request/result と混同せず named activity に写像します。
  why_needed:
    zh: 如果检索执行没有独立身份，团队就无法区分“哪次 Pinecone query 产生了这条候选”与“哪次 Cohere rerank 改写了顺序”，调试 hybrid RAG 时只能靠日志猜测。
    en: Without independent execution identity, teams cannot tell which Pinecone query produced a candidate versus which Cohere rerank rewrote order, forcing hybrid RAG debugging back to log guessing.
    ja: 実行同一性がなければ、どの Pinecone query が候補を生成しどの Cohere rerank が順序を変えたか区別できず、hybrid RAG デバッグが log 推測に戻ります。
  includes:
    - zh: 纳入具有 activity_id、started_at 与阶段边界的检索、候选生成与排序活动。
      en: Includes retrieval, candidate-generation, and ranking activities with activity_id, started_at, and stage boundaries.
      ja: activity_id・started_at・stage boundary を持つ検索・候補生成・ranking activity を含みます。
  excludes:
    - zh: 排除 RetrievalRequest、CandidateSet、RetrievalScore、RetrievalResult 与 RetrievalTrace。
      en: Excludes RetrievalRequest, CandidateSet, RetrievalScore, RetrievalResult, and RetrievalTrace.
      ja: RetrievalRequest・CandidateSet・RetrievalScore・RetrievalResult・RetrievalTrace を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST /v1/memories/search/、Pinecone index.query、Chroma collection.query、LangGraph store.search 以及 Cohere Rerank v3 均是一次可命名的 RetrievalActivity 或其后代；活动记录 started_at、backend、method 与 run 归属，产物另行建模。
    en: Mem0 POST /v1/memories/search/, Pinecone index.query, Chroma collection.query, LangGraph store.search, and Cohere Rerank v3 each map to a named RetrievalActivity or subtype; the activity records started_at, backend, method, and run membership while artifacts are modeled separately.
    ja: Mem0 POST /v1/memories/search/、Pinecone index.query、Chroma collection.query、LangGraph store.search、Cohere Rerank v3 はいずれも named RetrievalActivity または subtype に写像。activity は started_at・backend・method・run 帰属を記録し artifact は別建模します。
  typical_input:
    - description: Any retrieval backend invocation with traceable start time.
      format: |
        POST https://api.mem0.ai/v1/memories/search/
        index.query(vector=[...], top_k=10)
        collection.query(query_texts=[...], n_results=5)
        await store.search(namespace, query="...", limit=10)
      source_claims: [claim-retrieval-activity-design]
  typical_output:
    - description: Activity record with activity_id and stage lineage.
      format: |
        {
          "activity_id": "activity-410",
          "started_at": "2026-07-16T02:10:00Z",
          "backend": "pinecone",
          "retrieval_run_id": "run-411"
        }
      source_claims: [claim-retrieval-activity-design]
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: Activity identifier, ja: 活動識別子}
      definitions:
        zh: 稳定标识一次检索域活动；对应 Moonweave run/stage 主键。
        en: Stable identifier for one retrieval-domain activity; Moonweave run/stage primary key.
        ja: 一 retrieval-domain activity を安定識別。Moonweave run/stage 主キー。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: activity-410
      allowed_values: []
      source_claims: [claim-retrieval-activity-id]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 活动开始的 UTC 事件时间；API 调用发起时刻映射到此字段。
        en: UTC event time when the activity started; maps from API call initiation time.
        ja: 活動開始 UTC event time。API 呼出し開始時刻を写像。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T02:10:00Z
      allowed_values: []
      source_claims: [claim-retrieval-activity-started]
    - id: backend
      labels: {zh: 后端产品, en: Backend product, ja: バックエンド製品}
      definitions:
        zh: 声明执行该活动的检索后端，如 mem0、pinecone、chroma、langgraph、cohere、colbert。
        en: Declares the retrieval backend, e.g., mem0, pinecone, chroma, langgraph, cohere, colbert.
        ja: retrieval backend を宣言（mem0/pinecone/chroma/langgraph/cohere/colbert）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pinecone
      allowed_values: []
      source_claims: [claim-retrieval-activity-backend]
  constraints: []
  required_relations: []
examples:
  - id: RetrievalActivity-example-mem0-search
    labels:
      zh: Mem0 检索活动
      en: Mem0 search activity
      ja: Mem0 検索活動
    descriptions:
      zh: 应用调用 Mem0 POST /v1/memories/search/ 并记录 activity_id=mem0-search-411、started_at 与 backend=mem0；返回的记忆列表建模为 RetrievalArtifact，而非活动本身。
      en: The app calls Mem0 POST /v1/memories/search/ and records activity_id=mem0-search-411, started_at, and backend=mem0; returned memories are modeled as RetrievalArtifact, not the activity.
      ja: アプリが Mem0 POST /v1/memories/search/ を呼び activity_id=mem0-search-411・started_at・backend=mem0 を記録。返却記憶は activity ではなく RetrievalArtifact。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/search/
    field_values:
      activity_id: mem0-search-411
      started_at: 2026-07-16T02:10:00Z
      backend: mem0
      query: What language does Alice prefer for code?
      top_k: 5
    related_node_ids:
      - RetrievalActivity
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-retrieval-activity-mem0
      - claim-retrieval-activity-design
  - id: RetrievalActivity-example-pinecone-query
    labels:
      zh: Pinecone 查询活动
      en: Pinecone query activity
      ja: Pinecone クエリ活動
    descriptions:
      zh: RAG 服务执行 index.query(vector=..., top_k=10, namespace=tenant-7-user-alice) 并记录 activity_id=pinecone-query-412、backend=pinecone；matches 中的 ScoredVector 属于 RetrievedCandidate 产物。
      en: The RAG service runs index.query(vector=..., top_k=10, namespace=tenant-7-user-alice) and records activity_id=pinecone-query-412, backend=pinecone; ScoredVector matches belong to RetrievedCandidate artifacts.
      ja: RAG サービスが index.query を実行し activity_id=pinecone-query-412・backend=pinecone を記録。matches の ScoredVector は RetrievedCandidate artifact。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: index.query
    field_values:
      activity_id: pinecone-query-412
      started_at: 2026-07-16T02:11:00Z
      backend: pinecone
      top_k: 10
      namespace: tenant-7-user-alice
    related_node_ids:
      - RetrievalActivity
      - CandidateGenerationActivity
    related_relation_ids: []
    source_claims:
      - claim-retrieval-activity-pinecone
      - claim-retrieval-activity-design
  - id: RetrievalActivity-example-cohere-rerank
    labels:
      zh: Cohere 重排活动
      en: Cohere rerank activity
      ja: Cohere 再順位活動
    descriptions:
      zh: 二阶段流水线调用 Cohere POST /v2/rerank(model=rerank-v3.5, top_n=10) 并记录 activity_id=cohere-rerank-416、backend=cohere；响应 relevance_score 写入 RerankScore 而非活动字段。
      en: The two-stage pipeline calls Cohere POST /v2/rerank (model=rerank-v3.5, top_n=10) and records activity_id=cohere-rerank-416, backend=cohere; response relevance_score values go to RerankScore, not activity fields.
      ja: 二段 pipeline が Cohere POST /v2/rerank を呼び activity_id=cohere-rerank-416・backend=cohere を記録。relevance_score は RerankScore へ。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: POST /v2/rerank
    field_values:
      activity_id: cohere-rerank-416
      started_at: 2026-07-16T02:14:00Z
      backend: cohere
      model: rerank-v3.5
      top_n: 10
    related_node_ids:
      - RetrievalActivity
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-retrieval-activity-cohere
      - claim-retrieval-activity-design
  - id: RetrievalActivity-example-langgraph-search
    labels:
      zh: LangGraph store.search 活动
      en: LangGraph store.search activity
      ja: LangGraph store.search 活動
    descriptions:
      zh: LangGraph 应用对 namespace ("tenant-7","user-42") 执行 store.search(query="response language", limit=10) 并记录 activity_id=langgraph-search-413；匹配 Item key 映射为 RetrievedCandidate 身份。
      en: A LangGraph app runs store.search on namespace ("tenant-7","user-42") with query="response language", limit=10 and records activity_id=langgraph-search-413; matched Item keys map to RetrievedCandidate identity.
      ja: LangGraph アプリが store.search を実行し activity_id=langgraph-search-413 を記録。matching Item key を RetrievedCandidate identity に写像。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.search
    field_values:
      activity_id: langgraph-search-413
      started_at: 2026-07-16T02:12:00Z
      backend: langgraph
      limit: 10
      namespace_prefix: [tenant-7, user-42]
    related_node_ids:
      - RetrievalActivity
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-retrieval-activity-langgraph
      - claim-retrieval-activity-design
parent_relation: null
relations: []
