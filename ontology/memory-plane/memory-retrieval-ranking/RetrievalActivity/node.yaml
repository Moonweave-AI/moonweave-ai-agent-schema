schema: moonweave.ai/ontology-node/v1
id: RetrievalActivity
kind: concept
status: accepted
labels:
  zh: 检索活动
  en: Retrieval activity
  ja: 検索活動
semantics:
  short_definition:
    zh: 在一个已声明索引版本上生成、评分或排序候选的可审计活动。
    en: An auditable activity that generates, scores, or orders candidates against a declared index version.
    ja: 指定index version上でcandidateを生成・採点・順位付けする監査可能activityです。
  definition:
    zh: RetrievalActivity 是具有独立活动标识、开始时间和可追踪输入输出的执行；它统摄完整检索运行、候选生成和排序活动，但不是请求、结果、候选或分数记录。
    en: RetrievalActivity is an execution with its own activity identity, start time, and traceable inputs and outputs. It subsumes retrieval runs, candidate generation, and ranking activities, but is not a request, result, candidate, or score record.
    ja: RetrievalActivity は固有activity identity・開始時刻・追跡可能input/outputを持つ実行で、run・candidate generation・rankingを包括しますがrequest・result・candidate・score recordではありません。
  why_needed:
    zh: 为检索执行提供一棵活动树，避免把运行、阶段和信息产物压成同级节点。
    en: Provides one activity tree for retrieval execution so runs, stages, and information artifacts are not flattened as peers.
    ja: run・stage・information artifactを同列化しないため検索実行のactivity treeを提供します。
  includes:
    - zh: 纳入具有自身执行身份和阶段边界的检索、候选生成、评分、融合、重排与截断活动。
      en: Includes retrieval, candidate-generation, scoring, fusion, reranking, and truncation activities with their own execution identity and stage boundary.
      ja: 固有execution identityとstage boundaryを持つ検索・候補生成・採点・融合・再順位付け・切詰めactivityを含みます。
  excludes:
    - zh: 排除 RetrievalRequest、CandidateSet、RetrievalScore、RetrievalResult 和 RetrievalTrace 等信息产物。
      en: Excludes information artifacts such as RetrievalRequest, CandidateSet, RetrievalScore, RetrievalResult, and RetrievalTrace.
      ja: RetrievalRequest・CandidateSet・RetrievalScore・RetrievalResult・RetrievalTraceなどinformation artifactを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - activity_id
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次检索域活动。
        en: Stable identifier for one retrieval-domain activity.
        ja: 一つのretrieval-domain activityを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-activity-410
      source_claims:
        - claim-retrieval-activity-002
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动开始的事件时间。
        en: Event time at which the activity started.
        ja: activity開始のevent timeです。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:10:00Z
      source_claims:
        - claim-retrieval-activity-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索活动正例
      en: "Positive case: Retrieval activity"
      ja: 検索活動正例
    scenario_id: null
    descriptions:
      zh: activity-410 读取已声明索引版本并开始候选生成。
      en: activity-410 starts candidate generation against a declared index version.
      ja: activity-410 は指定index versionに対するcandidate generationを開始します。
    field_values:
      activity_id: activity-410
      started_at: 2026-07-16T02:10:00Z
    related_node_ids:
      - RetrievalActivity
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalActivity。
      en: Classify the object as RetrievalActivity.
      ja: RetrievalActivity として分類します。
    why_valid_or_invalid:
      zh: 它具有独立活动身份、时间边界和可追踪输入输出。
      en: It has an independent activity identity, temporal boundary, and traceable inputs and outputs.
      ja: 独立activity identity・時間境界・追跡可能input/outputがあります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-activity-004
  - id: RetrievalActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索活动边界例
      en: "Boundary case: Retrieval activity"
      ja: 検索活動境界例
    scenario_id: null
    descriptions:
      zh: request-410 仅声明查询与过滤条件，尚未开始执行。
      en: request-410 only declares a query and filter; no execution has started.
      ja: request-410 はqueryとfilterを宣言するだけで実行は開始していません。
    field_values: {}
    related_node_ids:
      - RetrievalActivity
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalActivity。
      en: Do not classify the object as RetrievalActivity.
      ja: RetrievalActivity として分類しません。
    why_valid_or_invalid:
      zh: 它是信息产物，没有活动开始时间和执行身份。
      en: It is an information artifact without an execution identity or activity start.
      ja: information artifactでexecution identityやactivity startを持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-activity-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-retrieval-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex 检索文档、Elasticsearch RRF、Cohere Rerank 与 ColBERT/cross-encoder 文献逐项核验概念定义、字段、关系与 RAG 检索管线结构。
    en: Verified concept definitions, fields, relations, and RAG retrieval pipeline structure against OpenAI Embeddings, Pinecone/Weaviate, LangChain/LlamaIndex retrieval docs, Elasticsearch RRF, Cohere Rerank, and ColBERT/cross-encoder literature.
    ja: OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex retrieval docs、Elasticsearch RRF、Cohere Rerank、ColBERT/cross-encoder 文献に照らし概念定義・フィールド・関係・RAG retrieval pipeline 構造を個別検証しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
