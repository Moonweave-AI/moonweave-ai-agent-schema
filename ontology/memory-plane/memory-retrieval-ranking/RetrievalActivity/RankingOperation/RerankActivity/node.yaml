schema: moonweave.ai/ontology-node/v1
id: RerankActivity
kind: concept
labels:
  zh: 候选重排
  en: Candidate reranking
  ja: 候補再順位付け
semantics:
  short_definition:
    zh: 用重排模型重新评估候选的二阶段活动。
    en: Second-stage activity reassessing candidates with a reranker model.
    ja: reranker model で candidate を再評価する二段 activity。
  definition:
    zh: RerankActivity 消费已有 CandidateSet，将 query 与候选文档交给 Cohere POST /v2/rerank（model=rerank-v3.x, top_n）或等效 cross-encoder，产生 RerankScore；不从索引召回，也不仅按排名位置做 RRF。
    en: RerankActivity consumes an existing CandidateSet, sends query and documents to Cohere POST /v2/rerank (model=rerank-v3.x, top_n) or an equivalent cross-encoder, and produces RerankScore values. It neither recalls from an index nor fuses ranks by position alone.
    ja: RerankActivity は CandidateSet を consume し Cohere POST /v2/rerank(model=rerank-v3.x, top_n) 等へ query/documents を渡し RerankScore を生成。index recall も rank-position だけの RRF も行いません。
  why_needed:
    zh: Cohere rerank 会完全改写顺序，必须把模型版本、top_n 与 relevance_score 单独留痕，不能混进 Pinecone cosine 分数里。
    en: Cohere rerank can fully rewrite order; model version, top_n, and relevance_score must be traced separately from Pinecone cosine scores.
    ja: Cohere rerank は順序を全面変更するため model 版/top_n/relevance_score を Pinecone cosine と分離記録必須。
  includes:
    - zh: 纳入 Cohere rerank 与 cross-encoder 等联合 query-candidate 重新评分的活动。
      en: Includes Cohere rerank and cross-encoder activities rescoring joint query-candidate content.
      ja: Cohere rerank/cross-encoder 等 joint query-candidate 再採点 activity。
  excludes:
    - zh: 排除初始召回、RRF 融合与仅截断 Top-K。
      en: Excludes initial recall, RRF fusion, and truncation-only Top-K.
      ja: initial recall・RRF fusion・truncation-only Top-K を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Cohere POST /v2/rerank 的 model、query、documents、top_n；响应 results[].relevance_score 写入 RerankScore，index 字段为 rerank 后序数。
    en: Map Cohere POST /v2/rerank model, query, documents, top_n; response results[].relevance_score becomes RerankScore with rerank ordinals as index.
    ja: Cohere POST /v2/rerank の model/query/documents/top_n を写像。results[].relevance_score を RerankScore へ。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - rerank_activity_id
  fields:
    - id: rerank_activity_id
      labels:
        zh: 重排活动标识
        en: Rerank activity identifier
        ja: 再順位 activity 識別子
      definitions:
        zh: 稳定标识一次重排执行。
        en: Stable identifier for one reranking execution.
        ja: 一 reranking execution を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rerank-416
      allowed_values: []
      source_claims:
        - claim-rerank-activity-id
    - id: model_version
      labels:
        zh: 重排模型版本
        en: Rerank model version
        ja: 再順位モデル版
      definitions:
        zh: 实际执行重排的模型，如 cohere rerank-v3.5。
        en: Model performing reranking, e.g., cohere rerank-v3.5.
        ja: cohere rerank-v3.5 等 rerank model。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rerank-v3.5
      allowed_values: []
      source_claims:
        - claim-rerank-activity-model
    - id: top_n
      labels:
        zh: 返回数量 top_n
        en: Returned count top_n
        ja: 返却数 top_n
      definitions:
        zh: 对应 Cohere rerank API 的 top_n 参数。
        en: Maps to the Cohere rerank API top_n parameter.
        ja: Cohere rerank API top_n に対応。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 10
      allowed_values: []
      source_claims:
        - claim-rerank-activity-topn
  constraints: []
  required_relations: []
examples:
  - id: RerankActivity-example-cohere-v35
    labels:
      zh: Cohere rerank-v3.5
      en: Cohere rerank-v3.5
      ja: Cohere rerank-v3.5
    descriptions:
      zh: rerank-416 对 20 条融合候选调用 Cohere POST /v2/rerank(model=rerank-v3.5, top_n=10)；candidate-424 relevance_score=0.917。
      en: rerank-416 calls Cohere POST /v2/rerank on 20 fused candidates; candidate-424 relevance_score=0.917.
      ja: rerank-416 が 20 candidate を Cohere rerank し relevance_score=0.917。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: POST /v2/rerank rerank-v3.5
    field_values:
      rerank_activity_id: rerank-416
      model_version: rerank-v3.5
      top_n: 10
    related_node_ids:
      - RerankActivity
      - RerankScore
    related_relation_ids: []
    source_claims:
      - claim-rerank-activity-cohere
  - id: RerankActivity-example-pinecone-hosted
    labels:
      zh: Pinecone 托管 rerank
      en: Pinecone hosted rerank
      ja: Pinecone ホスト rerank
    descriptions:
      zh: 应用经 Pinecone inference API 调用 cohere-rerank-3.5 对初始 search hits 重排。
      en: The app reranks initial search hits via Pinecone inference API with cohere-rerank-3.5.
      ja: Pinecone inference API で cohere-rerank-3.5 rerank。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/rerank-results
      version: hosted rerank
    field_values:
      rerank_activity_id: rerank-417
      model_version: cohere-rerank-3.5
      top_n: 12
    related_node_ids:
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-rerank-activity-pinecone
  - id: RerankActivity-example-not-rrf
    labels:
      zh: 重排非 RRF
      en: Rerank is not RRF
      ja: rerank は RRF ではない
    descriptions:
      zh: RRF 只组合排名位置不读文档正文；RerankActivity 必须读取 candidate 文本。
      en: RRF combines rank positions without reading document text; RerankActivity must read candidate text.
      ja: RRF は rank 位置のみ結合。RerankActivity は candidate 文本必須。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
      version: contrast
    field_values: {}
    related_node_ids:
      - RerankActivity
      - RankFusion
    related_relation_ids: []
    source_claims:
      - claim-rerank-activity-not-rrf
parent_relation:
  id: RerankActivity-is_a-RankingOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RankingOperation
    en: is a RankingOperation
    ja: RankingOperationの一種
  definitions:
    zh: RerankActivity —is_a→ RankingOperation 成立，因为它用声明版本的模型重新评估已有候选并产生 RerankScore。
    en: RerankActivity —is_a→ RankingOperation holds because it uses a declared model version to reassess existing candidates and produce RerankScore values.
    ja: RerankActivity —is_a→ RankingOperation は指定model versionで既存candidateを再評価しRerankScoreを生成するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RerankActivity-is_a-RankingOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it uses a declared model version to reassess existing candidates and produce RerankScore values."
      explanations:
        zh: 仅当实例既满足 RankingOperation 的完整定义，又满足子类种差“它用声明版本的模型重新评估已有候选并产生 RerankScore。”时建立该边。
        en: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it uses a declared model version to reassess existing candidates and produce RerankScore values."
        ja: instanceがRankingOperation完全定義とchild differentia「指定model versionで既存candidateを再評価しRerankScoreを生成する」を共に満たす時だけassertします。
      source_claims:
        - claim-rerank-activity-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RerankActivity-is_a-RankingOperation-example-positive-manual-001
      labels:
        zh: 是一种RankingOperation正例
        en: "Positive case: is a RankingOperation"
        ja: RankingOperationの一種正例
      descriptions:
        zh: rerank-416 用 bge-reranker-v3 重排 80 个候选。
        en: rerank-416 reranks 80 candidates with bge-reranker-v3.
        ja: rerank-416がbge-reranker-v3で80候補をrerankします。
      field_values: {}
      related_node_ids:
        - RerankActivity
        - RankingOperation
      related_relation_ids:
        - RerankActivity-is_a-RankingOperation
      source_claims:
        - claim-rerank-activity-id
    - id: RerankActivity-is_a-RankingOperation-example-boundary-manual-001
      labels:
        zh: 是一种RankingOperation边界例
        en: "Boundary case: is a RankingOperation"
        ja: RankingOperationの一種境界例
      descriptions:
        zh: fusion-415 只按排名位置组合列表。
        en: fusion-415 only combines lists by rank position.
        ja: fusion-415はrank positionだけでlistを結合します。
      field_values: {}
      related_node_ids:
        - RerankActivity
        - RankingOperation
      related_relation_ids:
        - RerankActivity-is_a-RankingOperation
      source_claims:
        - claim-rerank-activity-id
  source_claims:
    - claim-rerank-activity-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RerankActivity-consumes-CandidateSet
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: consumes CandidateSet
      en: consumes CandidateSet
      ja: CandidateSetをconsumes
    definitions:
      zh: RerankActivity —consumes→ CandidateSet 表示重排活动把已有候选集合而非索引本身作为二阶段模型输入。
      en: RerankActivity —consumes→ CandidateSet states that the reranking activity takes an existing candidate set, not the index itself, as second-stage model input.
      ja: RerankActivity —consumes→ CandidateSet はreranking activityがindex自体でなく既存candidate setをsecond-stage model inputにします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_consumes
      labels:
        zh: 反向读取
        en: inverse consumes
        ja: 逆方向読取
    conditions:
      - id: RerankActivity-consumes-CandidateSet-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the documents in the rerank request correspond to this set's candidate members.
        explanations:
          zh: 仅当 rerank 请求中的 documents 与该集合候选成员一致时建立。
          en: Assert only when the documents in the rerank request correspond to this set's candidate members.
          ja: rerank request内documentsがこのsetのcandidate memberと対応する時だけassertします。
        source_claims:
          - claim-rerank-activity-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RerankActivity-consumes-CandidateSet-example-positive-manual-001
        labels:
          zh: consumes CandidateSet正例
          en: "Positive case: consumes CandidateSet"
          ja: CandidateSetをconsumes正例
        descriptions:
          zh: rerank-416 consumes candidate-set-fused-415。
          en: rerank-416 consumes candidate-set-fused-415.
          ja: rerank-416がcandidate-set-fused-415をconsumeします。
        field_values: {}
        related_node_ids:
          - RerankActivity
          - CandidateSet
        related_relation_ids:
          - RerankActivity-consumes-CandidateSet
        source_claims:
          - claim-rerank-activity-id
      - id: RerankActivity-consumes-CandidateSet-example-boundary-manual-001
        labels:
          zh: consumes CandidateSet边界例
          en: "Boundary case: consumes CandidateSet"
          ja: CandidateSetをconsumes境界例
        descriptions:
          zh: 直接在索引上首次检索属于候选生成而非此关系。
          en: First-stage index retrieval belongs to candidate generation, not this relation.
          ja: index上first-stage retrievalはcandidate generationでこのrelationではありません。
        field_values: {}
        related_node_ids:
          - RerankActivity
          - CandidateSet
        related_relation_ids:
          - RerankActivity-consumes-CandidateSet
        source_claims:
          - claim-rerank-activity-id
    source_claims:
      - claim-rerank-activity-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateSet
  - id: RerankActivity-produces-RerankScore
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces RerankScore
      en: produces RerankScore
      ja: RerankScoreをproduces
    definitions:
      zh: RerankActivity —produces→ RerankScore 表示该重排分数是声明模型联合评估查询与候选字段后的直接输出。
      en: RerankActivity —produces→ RerankScore states that the rerank score is the direct output of the declared model jointly evaluating query and candidate fields.
      ja: RerankActivity —produces→ RerankScore はrerank scoreが指定modelによるquery/candidate field joint evaluationのdirect outputです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_produces
      labels:
        zh: 反向读取
        en: inverse produces
        ja: 逆方向読取
    conditions:
      - id: RerankActivity-produces-RerankScore-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when score.model_version equals RerankActivity.model_version and candidate lineage is explicit.
        explanations:
          zh: 仅当 score.model_version 与 RerankActivity.model_version 一致且候选血缘明确时建立。
          en: Assert only when score.model_version equals RerankActivity.model_version and candidate lineage is explicit.
          ja: score.model_versionがactivity.model_versionと一致しcandidate lineageが明示される時だけassertします。
        source_claims:
          - claim-rerank-activity-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RerankActivity-produces-RerankScore-example-positive-manual-001
        labels:
          zh: produces RerankScore正例
          en: "Positive case: produces RerankScore"
          ja: RerankScoreをproduces正例
        descriptions:
          zh: rerank-416 produces rerank-score-430。
          en: rerank-416 produces rerank-score-430.
          ja: rerank-416がrerank-score-430を生成します。
        field_values: {}
        related_node_ids:
          - RerankActivity
          - RerankScore
        related_relation_ids:
          - RerankActivity-produces-RerankScore
        source_claims:
          - claim-rerank-activity-id
      - id: RerankActivity-produces-RerankScore-example-boundary-manual-001
        labels:
          zh: produces RerankScore边界例
          en: "Boundary case: produces RerankScore"
          ja: RerankScoreをproduces境界例
        descriptions:
          zh: 模型版本不同或仅复制旧分数时不得建立。
          en: Do not assert when model versions differ or the value merely copies an old score.
          ja: model version不一致またはold scoreコピーだけならassertしません。
        field_values: {}
        related_node_ids:
          - RerankActivity
          - RerankScore
        related_relation_ids:
          - RerankActivity-produces-RerankScore
        source_claims:
          - claim-rerank-activity-id
    source_claims:
      - claim-rerank-activity-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RerankScore
sources:
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: POST /v2/rerank with rerank-v3 models, query, documents, top_n.
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-elastic-rrf
    title: Elasticsearch Reciprocal Rank Fusion
    publisher: Elastic
    url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
    source_type: official-doc
    relevance: "RRF formula: score(d) = sum(1/(k+rank(d)))."
  - id: src-memory-retrieval-design
    title: Moonweave memory-retrieval-ranking module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates retrieval stages, scores, results, and context admission.
source_claims:
  - id: claim-rerank-activity-cohere
    source: src-cohere-rerank
    supports: Cohere rerank returns relevance_score and reordered documents.
    locator: POST /v2/rerank
    evidence_kind: primary-api
    confidence: high
  - id: claim-rerank-activity-pinecone
    source: src-pinecone-query
    supports: Pinecone supports hosted reranking as a second stage.
    locator: rerank results
    evidence_kind: primary-api
    confidence: high
  - id: claim-rerank-activity-not-rrf
    source: src-elastic-rrf
    supports: RRF and model reranking are distinct ordering mechanisms.
    locator: RRF
    evidence_kind: primary-api
    confidence: high
  - id: claim-rerank-activity-id
    source: src-memory-retrieval-design
    supports: rerank_activity_id identifies one rerank execution.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-rerank-activity-model
    source: src-cohere-rerank
    supports: model_version pins the rerank model.
    locator: model
    evidence_kind: primary-api
    confidence: high
  - id: claim-rerank-activity-topn
    source: src-cohere-rerank
    supports: top_n maps to Cohere rerank top_n parameter.
    locator: top_n
    evidence_kind: primary-api
    confidence: high
