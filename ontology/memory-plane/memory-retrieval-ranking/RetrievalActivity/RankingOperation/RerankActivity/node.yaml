schema: moonweave.ai/ontology-node/v1
id: RerankActivity
kind: concept
status: accepted
labels:
  zh: 候选重排
  en: Candidate reranking
  ja: 候補再順位付け
semantics:
  short_definition:
    zh: 用声明的重排模型重新评估初始候选并形成新顺序的第二阶段活动。
    en: A second-stage activity that reassesses initial candidates with a declared reranker model and forms a new order.
    ja: 指定reranker modelでinitial candidateを再評価しnew orderを作るsecond-stage activityです。
  definition:
    zh: RerankActivity 消费一个已有 CandidateSet，把查询与候选字段交给声明版本的重排模型，产生 RerankScore 并据此重排或截断候选；它不从索引生成初始候选，也不把多个独立排名仅按位置融合。
    en: RerankActivity consumes an existing CandidateSet, sends the query and declared candidate fields to a versioned reranker model, and produces RerankScore values that reorder or truncate candidates. It neither retrieves initial candidates from an index nor fuses independent rankings only by position.
    ja: RerankActivity は既存CandidateSetをconsumeしqueryと指定candidate fieldをversioned reranker modelへ渡しRerankScoreで再順序/切詰めします。initial recallやrank-positionだけのfusionではありません。
  why_needed:
    zh: 保留二阶段检索中重排模型、输入字段、top_n 与输出分数的独立可追溯性。
    en: Preserves independent traceability for the second-stage reranker model, input fields, top_n, and output scores.
    ja: second-stage reranker model・input field・top_n・output scoreの独立追跡性を保持します。
  includes:
    - zh: 纳入交叉编码器或其他根据查询-候选联合内容重新评分的活动。
      en: Includes cross-encoder and other activities that rescore joint query-candidate content.
      ja: query-candidate joint contentを再採点するcross-encoder等activityを含みます。
  excludes:
    - zh: 排除初始候选召回、RRF/DBSF 融合、仅按既有顺序截取 TopK 和上下文采用。
      en: Excludes initial recall, RRF or DBSF fusion, truncation of an existing order alone, and context admission.
      ja: initial recall・RRF/DBSF fusion・既存順序だけのTopK truncation・context admissionを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - rerank_activity_id
  fields:
    - id: rerank_activity_id
      labels:
        zh: 重排活动标识
        en: rerank activity ID
        ja: rerank activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次重排执行。
        en: Stable identifier for one reranking execution.
        ja: 一つのreranking executionを安定識別します。
