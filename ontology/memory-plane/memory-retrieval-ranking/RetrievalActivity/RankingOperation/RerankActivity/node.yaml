        en: reranker model version
        ja: reranker model version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际执行重排的模型及不可替代版本。
        en: Records the actual reranker model and non-substitutable version.
        ja: 実際にrerankしたmodelと置換不能versionを記録します。
      allowed_values: []
      pattern: null
      example_value: bge-reranker-v3
      source_claims:
        - claim-rerank-activity-003
    - id: top_n
      labels:
        zh: 返回数量
        en: top N
        ja: top N
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录重排调用请求返回的候选数量。
