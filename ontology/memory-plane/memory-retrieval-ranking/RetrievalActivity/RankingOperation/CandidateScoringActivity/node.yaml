      en: "Reviewed sibling distinction: parent RankingOperation: CandidateScoringActivity (semantic kind=activity, backbone CandidateScoringActivity-is_a-RankingOperation); RerankActivity (semantic kind=activity, backbone RerankActivity-is_a-RankingOperation). Endpoint conditions: CandidateScoringActivity condition: “A ranking activity that produces stage-specific scores for retrieval candidates with a declared method or model”; RerankActivity condition: “A second-stage activity that reassesses initial candidates with a declared reranker model and forms a new order”. Either condition leaves the other unproven."
