schema: moonweave.ai/ontology-node/v1
id: CandidateScoringActivity
kind: concept
labels:
  zh: 候选评分
  en: Candidate scoring
  ja: 候補採点
semantics:
  short_definition:
    zh: 为候选生成阶段性分数的排序活动。
    en: Ranking activity that produces stage-specific scores for candidates.
    ja: candidate に stage-specific score を生成する ranking activity。
  definition:
    zh: CandidateScoringActivity 逐候选计算 RetrievalScore，记录 scoring_method 与 model_version；Pinecone/Chroma 返回的 cosine/dot-product、ColBERT MaxSim 与 BM25 分数均在此活动产生，但不融合列表或决定最终采用。
    en: CandidateScoringActivity computes a RetrievalScore per candidate with scoring_method and model_version. Cosine/dot-product from Pinecone/Chroma, ColBERT MaxSim, and BM25 scores are produced here but it neither fuses lists nor decides final admission.
    ja: CandidateScoringActivity は candidate ごとに RetrievalScore を計算し scoring_method/model_version を記録。Pinecone/Chroma cosine/dot-product・ColBERT MaxSim・BM25 はここで生成するが list fusion/final admission は行いません。
  why_needed:
    zh: 必须把“算分”和 RRF 融合、Cohere rerank 分开，否则无法解释为什么 BM25 8.73 与 rerank 0.917 不能直接比大小。
    en: Score production must stay separate from RRF fusion and Cohere rerank; otherwise BM25 8.73 and rerank 0.917 look comparable when they are not.
    ja: score 生成を RRF/Cohere rerank と分離しないと BM25 8.73 と rerank 0.917 が比較可能に見えてしまいます。
  includes:
    - zh: 纳入词汇、向量相似度或 ColBERT late interaction 等产生可审计分数的活动。
      en: Includes lexical, vector-similarity, or ColBERT late-interaction activities producing auditable scores.
      ja: lexical/vector similarity/ColBERT late interaction 等で監査可能 score を生成する activity。
  excludes:
    - zh: 排除 RRF 融合、Top-K 截断与 RetrievalScore 数值记录本身。
      en: Excludes RRF fusion, Top-K truncation, and RetrievalScore value records themselves.
      ja: RRF fusion・Top-K truncation・RetrievalScore value record 自体を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Pinecone ScoredVector.score、Chroma distance、ColBERT MaxSim 与 BM25 输出映射到 RetrievalScore；scoring_method 声明 cosine-similarity、dot-product、bm25、colbert-maxsim 等。
    en: Pinecone ScoredVector.score, Chroma distance, ColBERT MaxSim, and BM25 outputs map to RetrievalScore; scoring_method declares cosine-similarity, dot-product, bm25, colbert-maxsim, etc.
    ja: Pinecone ScoredVector.score・Chroma distance・ColBERT MaxSim・BM25 を RetrievalScore に写像。scoring_method は cosine-similarity/dot-product/bm25/colbert-maxsim 等。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - scoring_activity_id
  fields:
    - id: scoring_activity_id
      labels:
        zh: 评分活动标识
        en: Scoring activity identifier
        ja: 採点 activity 識別子
      definitions:
        zh: 稳定标识一次候选评分执行。
        en: Stable identifier for one candidate-scoring execution.
        ja: 一 candidate-scoring execution を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-scoring-414
      allowed_values: []
      source_claims:
        - claim-candidate-scoring-id
    - id: scoring_method
      labels:
        zh: 评分方法
        en: Scoring method
        ja: 採点方式
      definitions:
        zh: 声明分数算法：cosine-similarity、dot-product、bm25、colbert-maxsim 等。
        en: "Declares scoring algorithm: cosine-similarity, dot-product, bm25, colbert-maxsim, etc."
        ja: cosine-similarity/dot-product/bm25/colbert-maxsim 等 algorithm を宣言。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: cosine-similarity
      allowed_values: []
      source_claims:
        - claim-candidate-scoring-method
    - id: model_version
      labels:
        zh: 模型版本
        en: Model version
        ja: モデル版
      definitions:
        zh: 模型参与评分时的不可替代版本，如 embed-model-v6 或 colbert-v2。
        en: Non-substitutable model version when a model performs scoring, e.g., embed-model-v6 or colbert-v2.
        ja: model 採点時の置換不能版（embed-model-v6/colbert-v2 等）。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: embed-model-v6
      allowed_values: []
      source_claims:
        - claim-candidate-scoring-model
  constraints: []
  required_relations: []
examples:
  - id: CandidateScoringActivity-example-pinecone-cosine
    labels:
      zh: Pinecone cosine 评分
      en: Pinecone cosine scoring
      ja: Pinecone cosine 採点
    descriptions:
      zh: scoring-414 读取 Pinecone ScoredVector.score=0.842（cosine）并为 candidate-424 写入 SimilarityScore。
      en: scoring-414 reads Pinecone ScoredVector.score=0.842 (cosine) and writes SimilarityScore for candidate-424.
      ja: scoring-414 が Pinecone score=0.842 を読み candidate-424 に SimilarityScore。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: ScoredVector.score
    field_values:
      scoring_activity_id: candidate-scoring-414
      scoring_method: cosine-similarity
      model_version: embed-model-v6
    related_node_ids:
      - CandidateScoringActivity
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-candidate-scoring-pinecone
  - id: CandidateScoringActivity-example-colbert
    labels:
      zh: ColBERT MaxSim 评分
      en: ColBERT MaxSim scoring
      ja: ColBERT MaxSim 採点
    descriptions:
      zh: scoring-415 用 colbert-maxsim 对长文档候选计算 late interaction score=14.7。
      en: scoring-415 computes late interaction score=14.7 for long-document candidates with colbert-maxsim.
      ja: scoring-415 が colbert-maxsim で late interaction score=14.7。
    example_source:
      product: ColBERT
      url: https://arxiv.org/abs/2004.12832
      version: MaxSim scoring
    field_values:
      scoring_activity_id: candidate-scoring-415
      scoring_method: colbert-maxsim
      model_version: colbert-v2
    related_node_ids:
      - CandidateScoringActivity
    related_relation_ids: []
    source_claims:
      - claim-candidate-scoring-colbert
  - id: CandidateScoringActivity-example-chroma-distance
    labels:
      zh: Chroma 距离转分数
      en: Chroma distance to score
      ja: Chroma distance から score
    descriptions:
      zh: scoring-416 将 Chroma query 返回的 distance=0.18 映射为 similarity score 并记录 scoring_method=cosine-distance。
      en: scoring-416 maps Chroma query distance=0.18 to a similarity score with scoring_method=cosine-distance.
      ja: scoring-416 が Chroma distance=0.18 を similarity score に写像。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: QueryResult distances
    field_values:
      scoring_activity_id: candidate-scoring-416
      scoring_method: cosine-distance
    related_node_ids:
      - CandidateScoringActivity
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-candidate-scoring-chroma
parent_relation:
  id: CandidateScoringActivity-is_a-RankingOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RankingOperation
    en: is a RankingOperation
    ja: RankingOperationの一種
  definitions:
    zh: CandidateScoringActivity —is_a→ RankingOperation 成立，因为它用声明方法逐候选产生 RetrievalScore，而不融合列表或决定最终采用。
    en: CandidateScoringActivity —is_a→ RankingOperation holds because it produces RetrievalScore values per candidate under a declared method without fusing lists or deciding final admission.
    ja: CandidateScoringActivity —is_a→ RankingOperation は指定methodでcandidate別RetrievalScoreを生成しlist fusion/final admissionを行わないため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: CandidateScoringActivity-is_a-RankingOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it produces RetrievalScore values per candidate under a declared method without fusing lists or deciding final admission."
      explanations:
        zh: 仅当实例既满足 RankingOperation 的完整定义，又满足子类种差“它用声明方法逐候选产生 RetrievalScore，而不融合列表或决定最终采用。”时建立该边。
        en: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it produces RetrievalScore values per candidate under a declared method without fusing lists or deciding final admission."
        ja: instanceがRankingOperation完全定義とchild differentia「指定methodでcandidate別RetrievalScoreを生成しlist fusion/final admissionを行わない」を共に満たす時だけassertします。
      source_claims:
        - claim-candidate-scoring-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CandidateScoringActivity-is_a-RankingOperation-example-positive-manual-001
      labels:
        zh: 是一种RankingOperation正例
        en: "Positive case: is a RankingOperation"
        ja: RankingOperationの一種正例
      descriptions:
        zh: scoring-414 用 cosine 为 candidate-424 生成分数。
        en: scoring-414 produces a cosine score for candidate-424.
        ja: scoring-414がcandidate-424にcosine scoreを生成します。
      field_values: {}
      related_node_ids:
        - CandidateScoringActivity
        - RankingOperation
      related_relation_ids:
        - CandidateScoringActivity-is_a-RankingOperation
      source_claims:
        - claim-candidate-scoring-id
    - id: CandidateScoringActivity-is_a-RankingOperation-example-boundary-manual-001
      labels:
        zh: 是一种RankingOperation边界例
        en: "Boundary case: is a RankingOperation"
        ja: RankingOperationの一種境界例
      descriptions:
        zh: topk-417 只截取已有顺序，不计算分数。
        en: topk-417 only truncates an existing order and computes no score.
        ja: topk-417は既存順序をtruncateするだけでscoreを計算しません。
      field_values: {}
      related_node_ids:
        - CandidateScoringActivity
        - RankingOperation
      related_relation_ids:
        - CandidateScoringActivity-is_a-RankingOperation
      source_claims:
        - claim-candidate-scoring-id
  source_claims:
    - claim-candidate-scoring-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CandidateScoringActivity-produces-RetrievalScore
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces RetrievalScore
      en: produces RetrievalScore
      ja: RetrievalScoreをproduces
    definitions:
      zh: CandidateScoringActivity —produces→ RetrievalScore 表示该分数是此活动按声明方法对候选求值的直接输出。
      en: CandidateScoringActivity —produces→ RetrievalScore states that the score is the direct output of this activity's declared evaluation method for a candidate.
      ja: CandidateScoringActivity —produces→ RetrievalScore はscoreがこのactivityの指定evaluation methodによるcandidate評価direct outputです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_produces
      labels:
        zh: 反向读取
        en: inverse produces
        ja: 逆方向読取
    conditions:
      - id: CandidateScoringActivity-produces-RetrievalScore-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the score's scoring_stage and method provenance trace back to this activity.
        explanations:
          zh: 仅当 score 的 scoring_stage 与活动标识/方法可追溯一致时建立。
          en: Assert only when the score's scoring_stage and method provenance trace back to this activity.
          ja: scoreのscoring_stage/method provenanceがこのactivityへ追跡一致する時だけassertします。
        source_claims:
          - claim-candidate-scoring-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CandidateScoringActivity-produces-RetrievalScore-example-positive-manual-001
        labels:
          zh: produces RetrievalScore正例
          en: "Positive case: produces RetrievalScore"
          ja: RetrievalScoreをproduces正例
        descriptions:
          zh: scoring-414 produces similarity-score-429。
          en: scoring-414 produces similarity-score-429.
          ja: scoring-414がsimilarity-score-429を生成します。
        field_values: {}
        related_node_ids:
          - CandidateScoringActivity
          - RetrievalScore
        related_relation_ids:
          - CandidateScoringActivity-produces-RetrievalScore
        source_claims:
          - claim-candidate-scoring-id
      - id: CandidateScoringActivity-produces-RetrievalScore-example-boundary-manual-001
        labels:
          zh: produces RetrievalScore边界例
          en: "Boundary case: produces RetrievalScore"
          ja: RetrievalScoreをproduces境界例
        descriptions:
          zh: 从别的模型导入的分数不能归给 scoring-414。
          en: A score imported from another model is not produced by scoring-414.
          ja: 別modelからimportしたscoreをscoring-414生成としません。
        field_values: {}
        related_node_ids:
          - CandidateScoringActivity
          - RetrievalScore
        related_relation_ids:
          - CandidateScoringActivity-produces-RetrievalScore
        source_claims:
          - claim-candidate-scoring-id
    source_claims:
      - claim-candidate-scoring-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievalScore
  - id: CandidateScoringActivity-scores-RetrievedCandidate
    predicate: scores
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: scores RetrievedCandidate
      en: scores RetrievedCandidate
      ja: RetrievedCandidateをscores
    definitions:
      zh: CandidateScoringActivity —scores→ RetrievedCandidate 表示该评分活动把此候选作为被评估对象并按声明方法形成阶段分数。
      en: CandidateScoringActivity —scores→ RetrievedCandidate states that the scoring activity evaluates this candidate under its declared method to form a stage score.
      ja: CandidateScoringActivity —scores→ RetrievedCandidate はscoring activityがこのcandidateを指定methodで評価しstage scoreを形成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_scores
      labels:
        zh: 反向读取
        en: inverse scores
        ja: 逆方向読取
    conditions:
      - id: CandidateScoringActivity-scores-RetrievedCandidate-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when scoring input names candidate_id and the output score belongs to the same candidate.
        explanations:
          zh: 仅当评分输入明确含 candidate_id 且输出分数归属于同一候选时建立。
          en: Assert only when scoring input names candidate_id and the output score belongs to the same candidate.
          ja: scoring inputがcandidate_idを含みoutput scoreが同candidateに属す時だけassertします。
        source_claims:
          - claim-candidate-scoring-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CandidateScoringActivity-scores-RetrievedCandidate-example-positive-manual-001
        labels:
          zh: scores RetrievedCandidate正例
          en: "Positive case: scores RetrievedCandidate"
          ja: RetrievedCandidateをscores正例
        descriptions:
          zh: scoring-414 scores candidate-424。
          en: scoring-414 scores candidate-424.
          ja: scoring-414がcandidate-424を採点します。
        field_values: {}
        related_node_ids:
          - CandidateScoringActivity
          - RetrievedCandidate
        related_relation_ids:
          - CandidateScoringActivity-scores-RetrievedCandidate
        source_claims:
          - claim-candidate-scoring-id
      - id: CandidateScoringActivity-scores-RetrievedCandidate-example-boundary-manual-001
        labels:
          zh: scores RetrievedCandidate边界例
          en: "Boundary case: scores RetrievedCandidate"
          ja: RetrievedCandidateをscores境界例
        descriptions:
          zh: 批次同现但未包含 candidate-424 不能建立评分边。
          en: Batch co-occurrence without candidate-424 as input does not establish scoring.
          ja: batch共起だけでcandidate-424 inputなしならscoring edgeを成立させません。
        field_values: {}
        related_node_ids:
          - CandidateScoringActivity
          - RetrievedCandidate
        related_relation_ids:
          - CandidateScoringActivity-scores-RetrievedCandidate
        source_claims:
          - claim-candidate-scoring-id
    source_claims:
      - claim-candidate-scoring-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievedCandidate
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: collection.query with query_texts, n_results, where filter.
  - id: src-colbert
    title: ColBERT — Efficient and Effective Passage Search
    publisher: arXiv
    url: https://arxiv.org/abs/2004.12832
    source_type: arXiv
    relevance: Token-level late interaction MaxSim scoring.
  - id: src-memory-retrieval-design
    title: Moonweave memory-retrieval-ranking module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates retrieval stages, scores, results, and context admission.
source_claims:
  - id: claim-candidate-scoring-pinecone
    source: src-pinecone-query
    supports: Pinecone ScoredVector.score is a dense similarity metric.
    locator: ScoredVector
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-scoring-chroma
    source: src-chroma-query
    supports: Chroma returns distances convertible to similarity scores.
    locator: QueryResult
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-scoring-colbert
    source: src-colbert
    supports: ColBERT MaxSim produces late interaction scores per candidate.
    locator: paper
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-scoring-id
    source: src-memory-retrieval-design
    supports: scoring_activity_id identifies one scoring execution.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-scoring-method
    source: src-memory-retrieval-design
    supports: scoring_method declares the algorithm family.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-scoring-model
    source: src-memory-retrieval-design
    supports: model_version pins the embedding or rerank model used.
    locator: structure
    evidence_kind: design-inference
    confidence: high
