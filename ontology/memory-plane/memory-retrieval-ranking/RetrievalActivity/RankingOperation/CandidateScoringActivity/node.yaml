source_claims:
  - id: claim-candidate-scoring-faiss
    source: faiss-index-api
    supports: FAISS documents search that returns distances and labels for nearest neighbors. Moonweave records a method-identified distance computation as candidate scoring rather than a universal relevance judgment.
    locator: "faiss::Index search method"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-candidate-scoring-pgvector
    source: pgvector-readme
    supports: pgvector documents ordering vectors by distance operators with LIMIT. Moonweave maps a declared distance calculation over a concrete candidate set to scoring activity and score artifacts.
    locator: "Querying nearest neighbors"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-candidate-scoring-boundary
    source: faiss-index-api
    supports: FAISS search documents nearest-neighbor distance and labels. Moonweave's boundaries among recall, scoring, rerank, fusion, top-k, authorization, and answer quality are local ontology design.
    locator: "faiss::Index search method"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-candidate-scoring-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from entities it uses and generates. Moonweave applies that distinction to CandidateScoringActivity, CandidateSet, and RetrievalScore.
    locator: "PROV-O: Activity, Entity, prov:used, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-candidate-scoring-subtype
    source: faiss-index-api
    supports: Modeling candidate score computation as CandidateScoringActivity subtype of RankingOperation is a Moonweave taxonomy inference based on documented distance-returning search behavior.
    locator: "faiss::Index search method"
    evidence_kind: ontology-design-inference
    confidence: medium
