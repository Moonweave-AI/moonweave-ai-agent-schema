        en: scoring method
        ja: 採点方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明分数的算法、度量或模型族。
        en: Declares the algorithm, metric, or model family that gives the score meaning.
        ja: score意味を決めるalgorithm・metric・model familyを宣言します。
      allowed_values: []
      pattern: null
      example_value: cosine-similarity
      source_claims:
        - claim-candidate-scoring-activity-003
    - id: model_version
      labels:
        zh: 模型版本
        en: model version
        ja: model version
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当模型参与评分时记录其不可替代版本。
        en: Records the non-substitutable model version when a model performs scoring.
        ja: modelがscoringする場合の置換不能versionを記録します。
      allowed_values: []
