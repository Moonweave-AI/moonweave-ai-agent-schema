schema: moonweave.ai/ontology-node/v1
id: CandidateScoringActivity
kind: concept
status: accepted
labels:
  zh: 候选评分
  en: Candidate scoring
  ja: 候補採点
semantics:
  short_definition:
    zh: 用一个声明的方法或模型为检索候选生成阶段性分数的排序活动。
    en: A ranking activity that produces stage-specific scores for retrieval candidates with a declared method or model.
    ja: 指定method/modelでretrieval candidateにstage-specific scoreを生成するranking activityです。
  definition:
    zh: CandidateScoringActivity 是逐候选计算 RetrievalScore 的活动；它记录评分方法或模型版本，但不把多个已排序列表融合为一列，也不把评分结果误作最终入选。
    en: CandidateScoringActivity computes a RetrievalScore for each candidate using a recorded method or model version. It neither fuses multiple ranked lists nor treats a score as final selection.
    ja: CandidateScoringActivity は記録済method/model versionで各candidateのRetrievalScoreを計算します。複数ranked listのfusionもscoreをfinal selection扱いもしません。
  why_needed:
    zh: 将“计算分数”从融合、重排和截断中单独表达，使每个分数能追溯到产生阶段。
    en: Separates score production from fusion, reranking, and truncation so each score can be traced to its producing stage.
    ja: score生成をfusion・reranking・truncationから分離し各scoreを生成stageへ追跡可能にします。
  includes:
    - zh: 纳入词汇、向量相似度或模型评分，只要活动为候选形成可审计分数。
      en: Includes lexical, vector-similarity, or model scoring when an activity creates auditable candidate scores.
      ja: candidateに監査可能scoreを作るlexical・vector similarity・model scoringを含みます。
  excludes:
    - zh: 排除仅组合排名、仅选择 TopK、仅保存分数值或只做上下文筛选的对象。
      en: Excludes operations that only combine ranks or select TopK, score-value records themselves, and context filtering.
      ja: rank結合のみ・TopK選択のみ・score value record自体・context filteringを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - scoring_activity_id
  fields:
