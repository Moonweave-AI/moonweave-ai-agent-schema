schema: moonweave.ai/ontology-node/v1
id: CandidateScoringActivity
kind: concept
status: accepted
labels:
  zh: 候选评分活动
  en: Candidate Scoring Activity
  ja: 候補スコアリング活動
semantics:
  short_definition:
    zh: 对已召回候选和一个确定请求计算可解释评分输出的 RankingOperation 子类。
    en: A RankingOperation subtype that computes explainable score output for recalled candidates and one determinate request.
    ja: recall 済み candidate と一つの確定済み request に対して説明可能な score output を計算する RankingOperation の下位型。
  definition:
    zh: >
      CandidateScoringActivity 是实际计算候选—请求评分的排序活动。它读取确定的请求、候选集和评分方法，产生一个或
      多个 RetrievalScore 记录或失败事实。它可以计算词法、向量相似度或其他已声明信号，但不是候选召回、多个
      排名列表融合、模型交叉编码器重排、top-k 截断、索引构建或最终答案判断。一个数值分数本身是输出工件，不是该活动。
    en: >
      CandidateScoringActivity is ranking activity that actually computes candidate–request scores. It reads a
      determinate request, candidate set, and scoring method and produces one or more RetrievalScore records or a
      failure fact. It may compute lexical, vector-similarity, or other declared signals, but is not candidate recall,
      fusion of multiple ranked lists, model cross-encoder reranking, top-k truncation, index construction, or final
      answer judgment. A numeric score itself is an output artifact, not this activity.
    ja: >
      CandidateScoringActivity は candidate–request score を実際に計算する ranking activity です。確定済み request、
      candidate set、scoring method を読み取り、一つ以上の RetrievalScore record または failure fact を生成します。
      lexical、vector-similarity、その他の宣言済み signal を計算できますが、candidate recall、複数 ranked list の
      fusion、model cross-encoder reranking、top-k truncation、index construction、final answer judgment ではありません。
      数値 score 自体は output artifact であり、この activity ではありません。
  why_needed:
    zh: 分数必须能回查请求、候选和方法；否则不同距离度量、归一化或版本的数值会被错误比较。
    en: A score must be traceable to request, candidate, and method; otherwise numbers from different distance metrics, normalizations, or revisions are compared incorrectly.
    ja: score は request、candidate、method まで追跡可能でなければならず、そうでなければ異なる distance metric、normalization、revision の数値を誤って比較します。
  includes:
    - zh: 已执行的词法或向量评分、明确输入候选集、方法版本和生成的分数输出。
      en: Executed lexical or vector scoring with explicit input candidate set, method revision, and generated score output.
      ja: 明示的 input candidate set、method revision、生成された score output を持つ実行済み lexical または vector scoring。
  excludes:
    - zh: 召回候选、单独的分数实体、RRF 融合、交叉编码器重排、排序截断、索引添加和答案评估。
      en: Recalling candidates, a score entity alone, RRF fusion, cross-encoder reranking, ranking truncation, index insertion, or answer evaluation.
      ja: candidate recall、score entity 単体、RRF fusion、cross-encoder reranking、ranking truncation、index insertion、answer evaluation。
  semantic_kind: activity
  aliases: [relevance scoring run, similarity scoring, 候选相关性计算]
engineering:
  explanation:
    zh: FAISS 的搜索 API 返回距离和标签数组，pgvector 按向量距离排序。Moonweave 将一次实际分数计算记为活动，将结果值记为独立 RetrievalScore。
    en: FAISS search returns distance and label arrays, and pgvector orders by vector distance. Moonweave records an actual score calculation as activity and the resulting value as independent RetrievalScore.
    ja: FAISS search は distance と label array を返し、pgvector は vector distance で order します。Moonweave は実際の score calculation を activity として、得られた値を独立した RetrievalScore として記録します。
  typical_input:
    - description: Candidate scoring request
      format: |
        {
          "request_ref": "retrieval-request-support-18",
          "candidate_set_ref": "candidate-set-support-18",
          "scoring_method_ref": "cosine-similarity-v1"
        }
  typical_output:
    - description: Score-generation record
      format: |
        {
          "candidate_scoring_activity_id": "candidate-scoring-18",
          "ranking_operation_id": "ranking-score-18",
          "retrieval_activity_id": "retrieval-activity-support-18",
          "request_ref": "retrieval-request-support-18",
          "candidate_set_ref": "candidate-set-support-18",
          "input_candidate_set_ref": "candidate-set-support-18",
          "scoring_method_ref": "cosine-similarity-v1",
          "ranking_method_ref": "cosine-similarity-v1",
          "implementation_ref": "faiss-vector-search-v1",
          "generated_score_refs": ["similarity-score-18-01", "similarity-score-18-02"],
          "output_result_ref": "retrieval-result-scored-18",
          "started_at": "2026-07-19T01:00:01Z",
          "scoring_status": "completed",
          "ranking_status": "completed",
          "execution_status": "completed"
        }
  reference_implementations:
    - name: FAISS Index search API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents search output distances and labels for nearest-neighbor candidates.
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents ordering nearest-neighbor rows by vector distance.
structure:
  identity_keys: [candidate_scoring_activity_id]
  fields:
    - id: candidate_scoring_activity_id
      labels: {zh: 候选评分活动标识, en: candidate-scoring activity ID, ja: 候補スコアリング活動 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际评分执行，不能复用为分数、候选或排序结果标识。
        en: Identifies one actual scoring execution and is not reused as score, candidate, or ranking-result ID.
        ja: 一回の実際の scoring execution を識別し、score、candidate、ranking-result ID として再利用しません。
      allowed_values: []
      pattern: "^candidate-scoring-[A-Za-z0-9._-]+$"
      example_value: candidate-scoring-18
      source_claims: [claim-candidate-scoring-faiss]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次评分使用的 RetrievalRequest，而非一个文本上相似但不同的请求。
        en: Points to RetrievalRequest used for this scoring rather than textually similar but different request.
        ja: この scoring に使った RetrievalRequest を指し、textually similar でも別の request を指しません。
      allowed_values: []
      pattern: "^retrieval-request-[A-Za-z0-9._-]+$"
      example_value: retrieval-request-support-18
      source_claims: [claim-candidate-scoring-provenance]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: candidate set reference, ja: candidate set 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次评分读取的候选集，不能通过分数输出反向伪造。
        en: Points to CandidateSet read for this scoring and cannot be fabricated backwards from score output.
        ja: この scoring が読み取った CandidateSet を指し、score output から遡って捏造できません。
      allowed_values: []
      pattern: "^candidate-set-[A-Za-z0-9._-]+$"
      example_value: candidate-set-support-18
      source_claims: [claim-candidate-scoring-provenance]
    - id: scoring_method_ref
      labels: {zh: 评分方法引用, en: scoring method reference, ja: scoring method 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向距离、相似度、词法或学习评分方法及其版本，不能仅记录一个裸数值。
        en: Points to distance, similarity, lexical, or learned scoring method and revision and cannot be only a bare number.
        ja: distance、similarity、lexical、learned scoring method と revision を指し、裸の数値だけにはできません。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: cosine-similarity-v1
      source_claims: [claim-candidate-scoring-faiss]
    - id: generated_score_refs
      labels: {zh: 生成分数引用, en: generated score references, ja: 生成 score 参照}
      datatype: array
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功时列出由本活动生成、且可回查候选和方法的 RetrievalScore；失败或运行中不可伪造。
        en: On success lists RetrievalScores generated by this activity and traceable to candidate and method; it cannot be fabricated on failure or while running.
        ja: 成功時にこの activity が生成し candidate と method まで追跡可能な RetrievalScore を列挙し、failure または running 中に捏造できません。
      allowed_values: []
      pattern: null
      example_value: [similarity-score-18-01, similarity-score-18-02]
      source_claims: [claim-candidate-scoring-provenance]
    - id: scoring_status
      labels: {zh: 评分状态, en: scoring status, ja: scoring status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示评分完成、失败、取消或部分完成，不是候选相关性的判断。
        en: Indicates scoring completed, failed, was cancelled, or partial and is not judgment of candidate relevance.
        ja: scoring が completed、failed、cancelled、partial のどれかを示し、candidate relevance の判断ではありません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-candidate-scoring-provenance]
    - id: ranking_operation_id
      labels:
        zh: 排序操作标识
        en: ranking operation ID
        ja: ランキング操作 ID
      definitions:
        zh: 标识同一候选打分执行的通用排序操作身份，不复用为候选集、结果或单个分数标识。
        en: Identifies the same candidate-scoring execution as a general ranking operation and is not reused as a candidate-set, result, or individual-score ID.
        ja: 同じ candidate-scoring execution を一般の ranking operation として識別し、candidate-set、result、個別 score ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^ranking-[A-Za-z0-9._-]+$'
      example_value: ranking-candidate-scoring-18
      source_claims: [claim-candidate-scoring-subtype]
    - id: input_candidate_set_ref
      labels:
        zh: 输入候选集引用
        en: input candidate set reference
        ja: input candidate set 参照
      definitions:
        zh: 指向该打分排序实际消费的 CandidateSet，不从最终结果中的相似候选反推。
        en: Points to the CandidateSet actually consumed by this scoring ranking and cannot be inferred from similar candidates in a final result.
        ja: この scoring ranking が実際に消費した CandidateSet を指し、final result の似た candidate から推論しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-set-[A-Za-z0-9._-]+$'
      example_value: candidate-set-support-18
      source_claims: [claim-candidate-scoring-provenance]
    - id: ranking_method_ref
      labels:
        zh: 排序方法引用
        en: ranking method reference
        ja: ranking method 参照
      definitions:
        zh: 指向产生该打分的排序方法版本，不等同于某个候选的数值分数。
        en: Points to the ranking-method revision that produced these scores and is not a candidate's numeric score.
        ja: この score を生成した ranking-method revision を指し、candidate の数値 score ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^[A-Za-z][A-Za-z0-9._-]+$'
      example_value: bm25-v1
      source_claims: [claim-candidate-scoring-provenance]
    - id: output_result_ref
      labels:
        zh: 输出检索结果引用
        en: output retrieval result reference
        ja: output retrieval result 参照
      definitions:
        zh: 指向发布或更新该候选分数的 RetrievalResult，不等同于最终模型上下文或回答。
        en: Points to the RetrievalResult that publishes or updates these candidate scores and is not final model context or an answer.
        ja: この candidate score を公開または更新する RetrievalResult を指し、final model context や answer ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-result-[A-Za-z0-9._-]+$'
      example_value: retrieval-result-support-scored-18
      source_claims: [claim-candidate-scoring-provenance]
    - id: ranking_status
      labels:
        zh: 排序状态
        en: ranking status
        ja: ranking status
      definitions:
        zh: 指示打分排序是否完成、失败、取消或部分完成，不是对候选相关性的评价。
        en: Indicates whether this scoring ranking completed, failed, was cancelled, or partially completed and is not a relevance evaluation of a candidate.
        ja: この scoring ranking が completed、failed、cancelled、partial のどれかを示し、candidate の relevance evaluation ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-candidate-scoring-provenance]
    - id: retrieval_activity_id
      labels:
        zh: 检索活动标识
        en: retrieval activity ID
        ja: retrieval activity ID
      definitions:
        zh: 标识同一候选打分执行的通用检索活动身份，不复用为请求、候选、分数或结果标识。
        en: Identifies the same candidate-scoring execution as a general retrieval activity and is not reused as a request, candidate, score, or result ID.
        ja: 同じ candidate-scoring execution を一般の retrieval activity として識別し、request、candidate、score、result ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-activity-[A-Za-z0-9._-]+$'
      example_value: retrieval-activity-candidate-scoring-18
      source_claims: [claim-candidate-scoring-subtype]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: implementation reference
        ja: implementation 参照
      definitions:
        zh: 指向执行打分排序方法的检索或排序实现版本，不等同于输出分数本身。
        en: Points to the retrieval or ranking implementation revision that executes the scoring method and is not an output score itself.
        ja: scoring method を実行する retrieval または ranking implementation revision を指し、出力 score 自体ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-impl-[A-Za-z0-9._-]+$'
      example_value: retrieval-impl-bm25-v1
      source_claims: [claim-candidate-scoring-faiss]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录候选打分检索活动开始的时间，不能由候选集或结果的创建时间替代。
        en: Records when this candidate-scoring retrieval activity began and cannot be substituted by candidate-set or result creation time.
        ja: この candidate-scoring retrieval activity の開始時刻を記録し、candidate-set または result の作成時刻では代替できない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-19T03:20:00Z'
      source_claims: [claim-candidate-scoring-provenance]
    - id: execution_status
      labels:
        zh: 执行状态
        en: execution status
        ja: execution status
      definitions:
        zh: 提供打分活动的粗粒度运行、完成或失败状态；详细取消和部分完成由 ranking_status 与 scoring_status 保留。
        en: Provides coarse running, completed, or failed status for scoring while ranking_status and scoring_status retain cancellation and partial-completion detail.
        ja: scoring の coarse な running、completed、failed 状態を示し、cancelled と partial の詳細は ranking_status と scoring_status に保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [running, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-candidate-scoring-provenance]
  constraints:
    - id: candidate-scoring-inherits-ranking-and-retrieval-fields
      severity: error
      expression_language: plain
      expression: CandidateScoringActivity is one RankingOperation and RetrievalActivity record. ranking_operation_id, retrieval_activity_id, and candidate_scoring_activity_id must resolve to the same execution; input_candidate_set_ref equals candidate_set_ref; ranking_method_ref resolves to scoring_method_ref; output_result_ref publishes generated_score_refs; implementation_ref executes that method; and ranking_status plus execution_status are the generic lifecycle projections of scoring_status.
      explanation:
        zh: 候选打分既是排序活动也是检索活动；其专用打分字段仅细化同一执行记录，不能以不同父记录替代继承的输入、输出、方法和状态事实。
        en: Candidate scoring is both a ranking and retrieval activity; its specialized scoring fields refine one execution record and cannot replace inherited input, output, method, or lifecycle facts with different parent records.
        ja: candidate scoring は ranking activity かつ retrieval activity であり、専用 scoring field は一つの execution record を細化する。別の親 record で継承した input、output、method、lifecycle fact を置き換えてはならない。
      source_claims: [claim-candidate-scoring-subtype, claim-candidate-scoring-provenance]
    - id: candidate-scoring-provenance
      severity: error
      expression_language: plain
      expression: request_ref, candidate_set_ref, scoring_method_ref, and scoring_status are required. A completed activity requires generated_score_refs whose scores reference candidates in candidate_set_ref and the stated method; a failed activity must not claim completed score output.
      explanation:
        zh: 每个分数都必须对应具体请求、候选与方法，不能因为数值范围相似就跨方法比较。
        en: Every score must correspond to concrete request, candidate, and method and cannot be compared across methods merely because numeric ranges look similar.
        ja: 各 score は具体的 request、candidate、method に対応し、数値 range が似ているだけで method をまたいで比較できません。
      source_claims: [claim-candidate-scoring-provenance]
    - id: candidate-scoring-not-rerank-or-selection
      severity: error
      expression_language: plain
      expression: CandidateScoringActivity must not assert initial recall, multi-list fusion, cross-encoder rerank, top-k selection, ContextPackage inclusion, answer correctness, or access authorization. These require separate activities or policy facts.
      explanation:
        zh: 评分产生信号；融合、模型重排、选择、治理和回答判断是不同边界。
        en: Scoring produces a signal; fusion, model rerank, selection, governance, and answer judgment are different boundaries.
        ja: scoring は signal を生成し、fusion、model rerank、selection、governance、answer judgment は別の境界です。
      source_claims: [claim-candidate-scoring-boundary]
  required_relations: []
examples:
  - id: candidate-scoring-example-positive

    labels: {zh: 对候选集计算相似度, en: Similarity scoring for candidate set, ja: candidate set の similarity scoring}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      candidate_scoring_activity_id: candidate-scoring-18
      ranking_operation_id: ranking-score-18
      retrieval_activity_id: retrieval-activity-support-18
      request_ref: retrieval-request-support-18
      candidate_set_ref: candidate-set-support-18
      input_candidate_set_ref: candidate-set-support-18
      scoring_method_ref: cosine-similarity-v1
      ranking_method_ref: cosine-similarity-v1
      implementation_ref: faiss-vector-search-v1
      generated_score_refs: [similarity-score-18-01, similarity-score-18-02]
      output_result_ref: retrieval-result-scored-18
      started_at: "2026-07-19T01:00:01Z"
      scoring_status: completed
      ranking_status: completed
      execution_status: completed
    related_node_ids: [CandidateScoringActivity, RankingOperation, CandidateSet, RetrievalScore]
    related_relation_ids: [CandidateScoringActivity-is_a-RankingOperation, CandidateScoringActivity-uses-CandidateSet, CandidateScoringActivity-generates-RetrievalScore]

    source_claims: [claim-candidate-scoring-faiss, claim-candidate-scoring-provenance]
  - id: candidate-scoring-example-counterexample-index-search

    labels: {zh: 只有召回的索引搜索, en: Index search with recall only, ja: recall だけの index search}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      operation_kind: candidate_recall
      request_ref: null
      candidate_set_ref: candidate-set-support-18
      scoring_method_ref: null
      generated_score_refs: []
    related_node_ids: [CandidateScoringActivity, CandidateGenerationActivity]
    related_relation_ids: []

    source_claims: [claim-candidate-scoring-boundary]
  - id: candidate-scoring-example-boundary-rerank

    labels: {zh: 交叉编码器重排, en: Cross-encoder rerank, ja: cross-encoder rerank}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      model_ref: cross-encoder-ms-marco
      input_candidate_set_ref: candidate-set-support-18
      reranked_candidate_set_ref: candidate-set-reranked-18
      scoring_method_ref: cross_encoder_pairwise
    related_node_ids: [CandidateScoringActivity, RerankActivity]
    related_relation_ids: []

    source_claims: [claim-candidate-scoring-boundary]
  - id: candidate-scoring-example-instance-pgvector

    labels: {zh: 实例：pgvector 距离评分, en: "Instance: pgvector distance scoring", ja: "事例：pgvector distance scoring"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values:
