schema: moonweave.ai/ontology-node/v1
id: TopKSelection
kind: concept
status: accepted
labels:
  zh: 前 K 选择活动
  en: Top-K Selection
  ja: Top-K 選択活動
semantics:
  short_definition:
    zh: 从一个已确定排序中保留前 k 个候选并产生有界结果的 RankingOperation 子类。
    en: A RankingOperation subtype that retains the first k candidates from a determinate ordering and produces a bounded result.
    ja: 確定済み ordering から最初の k candidate を保持し、有界 result を生成する RankingOperation の下位型。
  definition:
    zh: >
      TopKSelection 是对已有排序结果执行前缀选择的活动。它读取明确的输入排序、正整数 k 和选择规则，并产生一个
      最多含 k 个候选的新 RetrievalResult。它不计算候选分数、不改变输入排序、不融合多列表、不执行模型重排、
      不保证选中项相关或被允许进入 ContextPackage。top-k 是排序后的选择边界，而不是初始检索的候选上限。
    en: >
      TopKSelection is activity that performs prefix selection over an existing ranked result. It reads explicit input
      ordering, positive integer k, and selection rule and produces a new RetrievalResult containing at most k
      candidates. It does not compute candidate scores, change input order, fuse multiple lists, execute model rerank,
      or guarantee selected items are relevant or allowed into ContextPackage. Top-k is a post-ranking selection
      boundary, not candidate limit for initial retrieval.
    ja: >
      TopKSelection は既存 ranked result に対して prefix selection を行う activity です。明示的 input ordering、正の
      integer k、selection rule を読み取り、最大 k candidate を含む新しい RetrievalResult を生成します。candidate
      score を計算せず、input order を変えず、複数 list を fusion せず、model rerank を実行せず、選択 item が
      relevant または ContextPackage に許可されることも保証しません。top-k は post-ranking selection boundary
      であり、初期 retrieval の candidate limit ではありません。
  why_needed:
    zh: 系统常需把长排序列表裁成明确数量供后续步骤消费；独立记录 k 和输入顺序可防止把截断误读为重排或召回。
    en: Systems often need to bound long ranked lists for later consumption; recording k and input order separately prevents truncation from being read as rerank or recall.
    ja: system は後続消費のため長い ranked list を明確な数に制限する必要があり、k と input order を別に記録すると truncation を rerank や recall と誤読することを防げます。
  includes:
    - zh: 已执行的前缀选择、明确输入结果、正整数 k、稳定的顺序规则和有界输出。
      en: Executed prefix selection with explicit input result, positive integer k, stable ordering rule, and bounded output.
      ja: 明示的 input result、正の integer k、安定した ordering rule、有界 output を持つ実行済み prefix selection。
  excludes:
    - zh: 初始候选上限、候选评分、RRF 融合、模型重排、上下文预算装配和答案生成。
      en: Initial candidate limit, candidate scoring, RRF fusion, model rerank, context-budget assembly, or answer generation.
      ja: 初期 candidate limit、candidate scoring、RRF fusion、model rerank、context-budget assembly、answer generation。
  semantic_kind: activity
  aliases: [rank truncation, bounded result selection, 排名截断]
engineering:
  explanation:
    zh: FAISS Index.search 接受 k 并返回该数量的最近邻标签和距离。Moonweave 将“对已有排序取前 k 项”单独记录为选择活动，而不混淆为搜索调用本身。
    en: FAISS Index.search accepts k and returns labels and distances for that number of nearest neighbors. Moonweave records taking first k from an already ranked result as selection activity rather than confusing it with search call itself.
    ja: FAISS Index.search は k を受け取り、その数の nearest neighbor の label と distance を返します。Moonweave は既存 ranked result から最初の k を取ることを search call 自体と混同せず selection activity として記録します。
  typical_input:
    - description: Ranked result and selection bound
      format: |
        {
          "input_result_ref": "retrieval-result-reranked-18",
          "k": 5,
          "ordering_basis_ref": "rerank-score-desc-v1"
        }
  typical_output:
    - description: Bounded result
      format: |
        {
          "top_k_selection_id": "top-k-18",
          "ranking_operation_id": "ranking-top-k-18",
          "retrieval_activity_id": "retrieval-activity-support-18",
          "request_ref": "retrieval-request-support-18",
          "input_result_ref": "retrieval-result-reranked-18",
          "input_candidate_set_ref": "candidate-set-support-18",
          "ranking_method_ref": "top-k-by-rerank-v1",
          "implementation_ref": "faiss-search-top-k-v1",
          "ordering_basis_ref": "rerank-score-desc-v1",
          "k": 5,
          "output_result_ref": "retrieval-result-top5-18",
          "started_at": "2026-07-19T01:00:04Z",
          "selected_count": 5,
          "selection_status": "completed",
          "ranking_status": "completed",
          "execution_status": "completed"
        }
  reference_implementations:
    - name: FAISS Index API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents nearest-neighbor search with k and distance and label output arrays.
structure:
  identity_keys: [top_k_selection_id]
  fields:
    - id: top_k_selection_id
      labels: {zh: 前 K 选择标识, en: top-k selection ID, ja: Top-K 選択 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际排序前缀选择，不能复用为候选、结果或 k 值。
        en: Identifies one actual ranked-prefix selection and is not reused as candidate, result, or k value.
        ja: 一回の実際の ranked-prefix selection を識別し、candidate、result、k value として再利用しません。
      allowed_values: []
      pattern: "^top-k-[A-Za-z0-9._-]+$"
      example_value: top-k-18
      source_claims: [claim-topk-faiss]
    - id: input_result_ref
      labels: {zh: 输入排序结果引用, en: input ranked result reference, ja: input ranked result 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向选择前已有明确顺序的 RetrievalResult，不能从无序候选或输出倒推。
        en: Points to RetrievalResult with determinate order before selection and cannot be inferred from unordered candidates or output.
        ja: selection 前に確定済み order を持つ RetrievalResult を指し、unordered candidate や output から推論できません。
      allowed_values: []
      pattern: "^retrieval-result-[A-Za-z0-9._-]+$"
      example_value: retrieval-result-reranked-18
      source_claims: [claim-topk-provenance]
    - id: k
      labels: {zh: 选择数量, en: selection count k, ja: 選択数 k}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 从输入排序保留的最大候选数，必须为正数，不保证实际候选数达到此值。
        en: Maximum candidates retained from input ordering; it must be positive and does not guarantee actual count reaches it.
        ja: input ordering から保持する最大 candidate 数で、正でなければならず、actual count がこの値に達することは保証しません。
      allowed_values: []
      pattern: null
      example_value: 5
      source_claims: [claim-topk-faiss]
    - id: ordering_basis_ref
      labels: {zh: 排序依据引用, en: ordering basis reference, ja: ordering basis 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向输入结果所用顺序依据，如 rerank 分数降序或融合排序，而非重新计算该依据。
        en: Points to ordering basis used by input result, such as descending rerank score or fused rank, without recomputing it.
        ja: descending rerank score や fused rank など input result が使う ordering basis を指し、それを再計算しません。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: rerank-score-desc-v1
      source_claims: [claim-topk-provenance]
    - id: output_result_ref
      labels: {zh: 输出有界结果引用, en: output bounded result reference, ja: output bounded result 参照}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功时指向最多 k 项的新 RetrievalResult；失败或运行中不得伪造。
        en: On success points to new RetrievalResult with at most k items and cannot be fabricated on failure or while running.
        ja: 成功時に最大 k item の新しい RetrievalResult を指し、failure または running 中に捏造できません。
      allowed_values: []
      pattern: "^retrieval-result-[A-Za-z0-9._-]+$"
      example_value: retrieval-result-top5-18
      source_claims: [claim-topk-provenance]
    - id: selected_count
      labels: {zh: 实际选中数, en: selected count, ja: 実際の選択数}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功时记录输出实际成员数，必须不大于 k，可能因输入不足而更少。
        en: On success records actual output member count, which must not exceed k and may be smaller when input is short.
        ja: 成功時に actual output member count を記録し、k を超えず input が少なければ小さくなり得ます。
      allowed_values: []
      pattern: null
      example_value: 5
      source_claims: [claim-topk-provenance]
    - id: selection_status
      labels: {zh: 选择状态, en: selection status, ja: 選択 status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示选择完成、失败、取消或部分完成，而非候选相关性结论。
        en: Indicates selection completed, failed, was cancelled, or partial, not candidate relevance conclusion.
        ja: selection が completed、failed、cancelled、partial のどれかを示し、candidate relevance conclusion ではありません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-topk-provenance]
    - id: ranking_operation_id
      labels:
        zh: 排序操作标识
        en: ranking operation ID
        ja: ランキング操作 ID
      definitions:
        zh: 标识同一 top-k 截取执行的通用排序操作身份，不复用为候选集、结果或分数标识。
        en: Identifies the same top-k truncation execution as a general ranking operation and is not reused as a candidate-set, result, or score ID.
        ja: 同じ top-k truncation execution を一般の ranking operation として識別し、candidate-set、result、score ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^ranking-[A-Za-z0-9._-]+$'
      example_value: ranking-top-k-18
      source_claims: [claim-topk-subtype]
    - id: input_candidate_set_ref
      labels:
        zh: 输入候选集引用
        en: input candidate set reference
        ja: input candidate set 参照
      definitions:
        zh: 指向包含 input_result_ref 所截取候选的 CandidateSet，不由 k 值或输出数量反推。
        en: Points to the CandidateSet whose candidates are truncated from input_result_ref and is not inferred from k or output count.
        ja: input_result_ref から切り詰める candidate を含む CandidateSet を指し、k や output count から推論しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-set-[A-Za-z0-9._-]+$'
      example_value: candidate-set-support-ranked-18
      source_claims: [claim-topk-provenance]
    - id: ranking_method_ref
      labels:
        zh: 排序方法引用
        en: ranking method reference
        ja: ranking method 参照
      definitions:
        zh: 指向此 top-k 截取依赖的确定排序依据或方法版本，不等同于 k 值或最终上下文顺序。
        en: Points to the deterministic ordering basis or method revision used for top-k truncation and is not k or final context order.
        ja: top-k truncation に使う決定的 ordering basis または method revision を指し、k や最終 context order ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^[A-Za-z][A-Za-z0-9._-]+$'
      example_value: bm25-descending-v1
      source_claims: [claim-topk-provenance]
    - id: ranking_status
      labels:
        zh: 排序状态
        en: ranking status
        ja: ranking status
      definitions:
        zh: 指示 top-k 排序截取是否完成、失败、取消或部分完成，不等同于候选相关性或上下文选择状态。
        en: Indicates whether top-k ranking truncation completed, failed, was cancelled, or partially completed and is not candidate relevance or context-selection status.
        ja: top-k ranking truncation が completed、failed、cancelled、partial のどれかを示し、candidate relevance や context-selection status ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-topk-provenance]
    - id: retrieval_activity_id
      labels:
        zh: 检索活动标识
        en: retrieval activity ID
        ja: retrieval activity ID
      definitions:
        zh: 标识同一 top-k 截取执行的通用检索活动身份，不复用为请求、候选、分数或结果标识。
        en: Identifies the same top-k execution as a general retrieval activity and is not reused as a request, candidate, score, or result ID.
        ja: 同じ top-k execution を一般の retrieval activity として識別し、request、candidate、score、result ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-activity-[A-Za-z0-9._-]+$'
      example_value: retrieval-activity-top-k-18
      source_claims: [claim-topk-subtype]
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: request 参照
      definitions:
        zh: 指向输入结果和输出结果实际服务的 RetrievalRequest，不能由所选数量或候选内容反推。
        en: Points to the RetrievalRequest actually served by the input and output results and cannot be inferred from selected count or candidate content.
        ja: input と output result が実際に処理した RetrievalRequest を指し、selected count や candidate content から推論しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-request-[A-Za-z0-9._-]+$'
      example_value: retrieval-request-support-18
      source_claims: [claim-topk-provenance]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: implementation reference
        ja: implementation 参照
      definitions:
        zh: 指向执行该确定排序和截取的检索或排序实现版本，不等同于 k 或已选数量。
        en: Points to the retrieval or ranking implementation revision executing deterministic ordering and truncation, not k or selected count.
        ja: 決定的 ordering と truncation を実行する retrieval または ranking implementation revision を指し、k や selected count ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-impl-[A-Za-z0-9._-]+$'
      example_value: retrieval-impl-top-k-v1
      source_claims: [claim-topk-faiss]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录 top-k 检索活动开始的时间，不能由输入结果或输出结果的创建时间替代。
        en: Records when this top-k retrieval activity began and cannot be substituted by input-result or output-result creation time.
        ja: この top-k retrieval activity の開始時刻を記録し、input-result または output-result の作成時刻では代替できない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-19T03:20:00Z'
      source_claims: [claim-topk-provenance]
    - id: execution_status
      labels:
        zh: 执行状态
        en: execution status
        ja: execution status
      definitions:
        zh: 提供 top-k 活动的粗粒度运行、完成或失败状态；详细取消和部分完成由 ranking_status 与 selection_status 保留。
        en: Provides coarse running, completed, or failed status for top-k while ranking_status and selection_status retain cancellation and partial-completion detail.
        ja: top-k の coarse な running、completed、failed 状態を示し、cancelled と partial の詳細は ranking_status と selection_status に保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [running, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-topk-provenance]
  constraints:
    - id: topk-inherits-ranking-and-retrieval-fields
      severity: error
      expression_language: plain
      expression: TopKSelection is one RankingOperation and RetrievalActivity record. top_k_selection_id, ranking_operation_id, and retrieval_activity_id must resolve to the same execution; input_candidate_set_ref is the set represented by input_result_ref; ranking_method_ref resolves to ordering_basis_ref; request_ref is shared by input_result_ref and output_result_ref; implementation_ref executes that method; and ranking_status plus execution_status are the generic lifecycle projections of selection_status.
      explanation:
        zh: top-k 是排序和检索活动的真实特化；截取参数和专用状态细化同一执行记录，不能替代父类的请求、输入、方法、实现和生命周期事实。
        en: Top-k is a real ranking and retrieval specialization; its truncation parameters and detailed status refine one execution record and cannot replace inherited request, input, method, implementation, or lifecycle facts.
        ja: top-k は真の ranking および retrieval 特殊化であり、truncation parameter と詳細 status は一つの execution record を細化する。継承した request、input、method、implementation、lifecycle fact を置き換えてはならない。
      source_claims: [claim-topk-subtype, claim-topk-provenance]
    - id: topk-order-and-bound
      severity: error
      expression_language: plain
      expression: input_result_ref, positive k, ordering_basis_ref, and selection_status are required. A completed selection requires output_result_ref and selected_count not greater than k; output preserves the input ordering basis and cannot insert unranked candidates.
      explanation:
        zh: top-k 是已有顺序的有界前缀；没有顺序或超出 k 的输出不能称为该活动。
        en: Top-k is a bounded prefix of existing order; output with no order or more than k items cannot be this activity.
        ja: top-k は既存 order の有界 prefix であり、order のない output や k を超える item を持つ output はこの activity ではありません。
      source_claims: [claim-topk-provenance]
    - id: topk-not-rerank-or-context-selection
      severity: error
      expression_language: plain
      expression: TopKSelection must not assert score recomputation, model rerank, multi-list fusion, candidate recall, ContextPackage inclusion, model visibility, or answer correctness.
      explanation:
        zh: 选择只截断已有排序；重新评分、重排、融合、召回和上下文装配都是独立阶段。
        en: Selection truncates existing order only; rescoring, rerank, fusion, recall, and context assembly are independent stages.
        ja: selection は既存 order を切り詰めるだけで、rescoring、rerank、fusion、recall、context assembly は独立 stage です。
      source_claims: [claim-topk-boundary]
  required_relations: []
examples:
  - id: topk-example-positive

    labels: {zh: 从重排结果选择前五项, en: Select first five from reranked result, ja: reranked result から最初の五を選択}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      top_k_selection_id: top-k-18
      ranking_operation_id: ranking-top-k-18
      retrieval_activity_id: retrieval-activity-support-18
      request_ref: retrieval-request-support-18
      input_result_ref: retrieval-result-reranked-18
      input_candidate_set_ref: candidate-set-support-18
      k: 5
      ordering_basis_ref: rerank-score-desc-v1
      ranking_method_ref: top-k-by-rerank-v1
      implementation_ref: faiss-search-top-k-v1
      output_result_ref: retrieval-result-top5-18
      started_at: "2026-07-19T01:00:04Z"
      selected_count: 5
      selection_status: completed
      ranking_status: completed
      execution_status: completed
    related_node_ids: [TopKSelection, RankingOperation, RetrievalResult]
    related_relation_ids: [TopKSelection-is_a-RankingOperation, TopKSelection-uses-RetrievalResult, TopKSelection-generates-RetrievalResult]

    source_claims: [claim-topk-faiss, claim-topk-provenance]
  - id: topk-example-counterexample-unordered

    labels: {zh: 无序集合任取五项, en: Arbitrarily take five from unordered set, ja: unordered set から任意の五を取る}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      input_result_ref: null
      k: 5
      ordering_basis_ref: null
      selected_count: 5
    related_node_ids: [TopKSelection]
    related_relation_ids: []

    source_claims: [claim-topk-boundary]
  - id: topk-example-boundary-rerank

    labels: {zh: 重新计算并更新排序, en: Recompute and update ranking, ja: 再計算して ranking を更新する}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      reranker_model_ref: cross-encoder-ms-marco-v1
      input_candidate_set_ref: candidate-set-support-18
      k: null
      output_result_ref: retrieval-result-reranked-18
    related_node_ids: [TopKSelection, RerankActivity]
    related_relation_ids: []

    source_claims: [claim-topk-boundary]
  - id: topk-example-instance-faiss

