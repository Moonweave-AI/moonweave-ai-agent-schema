schema: moonweave.ai/ontology-node/v1
id: TopKSelection
kind: concept
status: review
labels:
  zh: 前 K 项选择
  en: Top-K selection
  ja: 上位K件選択
semantics:
  short_definition:
    zh: 从一个已排序候选集合中按声明的 K 和并列策略保留前项的排序活动。
    en: A ranking activity that retains the first K items from an ordered candidate set under a declared tie policy.
    ja: ordered candidate setから指定Kとtie policyで上位項目を保持するranking activityです。
  definition:
    zh: TopKSelection 消费已有顺序的 CandidateSet，并依据 k、并列处理与稳定排序规则选出保留范围；它不计算相关性、不融合列表，也不决定候选是否进入最终上下文。
    en: TopKSelection consumes an already ordered CandidateSet and determines the retained range from k, tie handling, and stable-order rules. It does not compute relevance, fuse lists, or decide admission to final context.
    ja: TopKSelection は既にorderedなCandidateSetをconsumeしk・tie handling・stable order ruleから保持範囲を決めます。relevance計算・list fusion・final context admissionは行いません。
  why_needed:
    zh: 让候选截断策略可重放，并与分数计算、融合、重排和上下文预算明确分开。
    en: Makes candidate truncation replayable and distinct from scoring, fusion, reranking, and context budgeting.
    ja: candidate truncationを再生可能にしscoring・fusion・reranking・context budgetから分離します。
  includes:
    - zh: 纳入基于已确定顺序和显式 k 值的候选保留活动。
      en: Includes candidate-retention activities based on an established order and explicit k value.
      ja: 確定済み順序と明示kに基づくcandidate retention activityを含みます。
  excludes:
    - zh: 排除产生分数、改变相关性顺序、按 token 预算装配上下文或删除存储记录的操作。
      en: Excludes producing scores, changing relevance order, assembling context under a token budget, and deleting stored records.
      ja: score生成・relevance順序変更・token budgetによるcontext assembly・stored record削除を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - selection_activity_id
  fields:
    - id: selection_activity_id
      labels:
        zh: 选择活动标识
        en: selection activity ID
        ja: selection activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次 TopK 截断执行。
        en: Stable identifier for one Top-K truncation execution.
        ja: 一つのTop-K truncation executionを安定識別します。
      allowed_values: []
      pattern: null
      example_value: topk-417
      source_claims:
        - claim-top-k-selection-002
    - id: k
      labels:
        zh: 保留数量 K
        en: retained K
        ja: 保持K
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明最多保留的候选数量。
        en: Declares the maximum number of candidates retained.
        ja: 保持する最大candidate数を宣言します。
      allowed_values: []
      pattern: null
      example_value: 12
      source_claims:
        - claim-top-k-selection-003
    - id: tie_break_policy
      labels:
        zh: 并列策略
        en: tie-break policy
        ja: 同順位処理
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明边界分数并列时如何保持确定顺序。
        en: Declares how deterministic order is preserved when scores tie at the cutoff.
        ja: cutoffでscore同値の場合の決定的順序を宣言します。
      allowed_values: []
      pattern: null
      example_value: stable-candidate-id
      source_claims:
        - claim-top-k-selection-004
  constraints: []
  required_relation_constraints: []
