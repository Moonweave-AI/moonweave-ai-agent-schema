schema: moonweave.ai/ontology-node/v1
id: TopKSelection
kind: concept
labels:
  zh: 前 K 项选择
  en: Top-K selection
  ja: 上位K件選択
semantics:
  short_definition:
    zh: 按 top_k 从已排序集合截取候选的活动。
    en: Activity truncating an ordered set to top_k candidates.
    ja: ordered set から top_k で candidate を截取する activity。
  definition:
    zh: TopKSelection 消费已有顺序的 CandidateSet，依据 k 与 tie_break_policy 确定保留范围；k 对应 Pinecone top_k、Chroma n_results、Mem0 top_k、Cohere top_n 与 LangGraph limit 的最终截断语义，但不计算相关性或决定 ContextPackage 采用。
    en: TopKSelection consumes an ordered CandidateSet and determines the retained range from k and tie_break_policy. k maps to final truncation semantics of Pinecone top_k, Chroma n_results, Mem0 top_k, Cohere top_n, and LangGraph limit but does not compute relevance or decide ContextPackage admission.
    ja: TopKSelection は ordered CandidateSet を consume し k/tie_break_policy で保持範囲を決定。k は Pinecone top_k/Chroma n_results/Mem0 top_k/Cohere top_n/LangGraph limit の最終 truncation に対応。relevance 計算/ContextPackage 採用は行いません。
  why_needed:
    zh: Prefetch limit 可以是 40，最终返回却是 5；必须把 top_k 截断作为独立可重放阶段记录。
    en: Prefetch limit may be 40 while five are returned; top_k truncation must be recorded as a separate replayable stage.
    ja: prefetch limit 40 と最終 5 件の差を説明するため top_k truncation を独立 stage として記録必須。
  includes:
    - zh: 纳入基于已确定顺序和显式 k 的候选保留活动。
      en: Includes candidate retention based on established order and explicit k.
      ja: 確定済み順序と明示 k による candidate retention。
  excludes:
    - zh: 排除产生分数、RRF/Cohere 重排与 token 预算上下文裁剪。
      en: Excludes score production, RRF/Cohere reranking, and token-budget context trimming.
      ja: score 生成・RRF/Cohere rerank・token budget context trimming を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: top_k 参数在 Pinecone index.query、Chroma n_results、Mem0 search、LangGraph limit 与 Cohere top_n 中均限制返回数量；TopKSelection 记录最终截断 k 与 tie_break_policy。
    en: top_k in Pinecone index.query, Chroma n_results, Mem0 search, LangGraph limit, and Cohere top_n all limit returned count; TopKSelection records final k and tie_break_policy.
    ja: Pinecone top_k/Chroma n_results/Mem0 top_k/LangGraph limit/Cohere top_n は返却数制限。TopKSelection は最終 k/tie_break_policy を記録。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - selection_activity_id
  fields:
    - id: selection_activity_id
      labels:
        zh: 选择活动标识
        en: Selection activity identifier
        ja: 選択 activity 識別子
      definitions:
        zh: 稳定标识一次 Top-K 截断执行。
        en: Stable identifier for one Top-K truncation execution.
        ja: 一 Top-K truncation execution を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: topk-417
      allowed_values: []
      source_claims:
        - claim-topk-id
    - id: k
      labels:
        zh: 保留数量 k
        en: Retained count k
        ja: 保持数 k
      definitions:
        zh: 最终保留候选上限；对应 API top_k/n_results/limit/top_n 的最终截断值。
        en: Upper bound on retained candidates; final truncation value for API top_k/n_results/limit/top_n.
        ja: 最終保持上限。API top_k/n_results/limit/top_n の truncation 値。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 12
      allowed_values: []
      source_claims:
        - claim-topk-k
    - id: tie_break_policy
      labels:
        zh: 并列策略
        en: Tie-break policy
        ja: 同順位処理
      definitions:
        zh: cutoff 分数并列时的确定顺序规则，如 stable-candidate-id。
        en: Deterministic ordering when scores tie at cutoff, e.g., stable-candidate-id.
        ja: cutoff 同点時の決定的順序（stable-candidate-id 等）。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: stable-candidate-id
      allowed_values: []
      source_claims:
        - claim-topk-tie
  constraints: []
  required_relations: []
examples:
  - id: TopKSelection-example-pinecone-topk
    labels:
      zh: Pinecone top_k=10
      en: Pinecone top_k=10
      ja: Pinecone top_k=10
    descriptions:
      zh: topk-417 从 rerank 后 80 候选稳定保留 k=12；API 层 Pinecone top_k=10 是 prefetch，最终 k=12 由 TopKSelection 记录。
      en: topk-417 retains k=12 from 80 post-rerank candidates; Pinecone top_k=10 is prefetch while final k=12 is recorded by TopKSelection.
      ja: topk-417 が k=12 を保持。Pinecone top_k=10 は prefetch、最終 k=12 は TopKSelection。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: top_k parameter
    field_values:
      selection_activity_id: topk-417
      k: 12
      tie_break_policy: stable-candidate-id
    related_node_ids:
      - TopKSelection
    related_relation_ids: []
    source_claims:
      - claim-topk-pinecone
  - id: TopKSelection-example-mem0-topk
    labels:
      zh: Mem0 top_k=5
      en: Mem0 top_k=5
      ja: Mem0 top_k=5
    descriptions:
      zh: Mem0 search top_k=5 直接限制返回记忆数；Moonweave 将其建模为 TopKSelection(k=5)。
      en: Mem0 search top_k=5 directly limits returned memories; Moonweave models it as TopKSelection(k=5).
      ja: Mem0 top_k=5 を TopKSelection(k=5) として建模。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: top_k=5
    field_values:
      selection_activity_id: topk-418
      k: 5
      tie_break_policy: stable-candidate-id
    related_node_ids:
      - TopKSelection
    related_relation_ids: []
    source_claims:
      - claim-topk-mem0
  - id: TopKSelection-example-not-context
    labels:
      zh: Top-K 非上下文采用
      en: Top-K is not context admission
      ja: Top-K は context 採用ではない
    descriptions:
      zh: token 预算排除长文档属于 ContextPackage 决策，不是 TopKSelection。
      en: Excluding long documents for token budget belongs to ContextPackage, not TopKSelection.
      ja: token budget 除外は ContextPackage で TopKSelection ではない。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: design boundary
    field_values:
      k: 12
    related_node_ids:
      - TopKSelection
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-topk-not-context
parent_relation:
  id: TopKSelection-is_a-RankingOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RankingOperation
    en: is a RankingOperation
    ja: RankingOperationの一種
  definitions:
    zh: TopKSelection —is_a→ RankingOperation 成立，因为它在既有顺序上按 k 与并列策略确定保留范围。
    en: TopKSelection —is_a→ RankingOperation holds because it determines the retained range from k and tie policy over an existing order.
    ja: TopKSelection —is_a→ RankingOperation は既存順序上でkとtie policyから保持範囲を決めるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: TopKSelection-is_a-RankingOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it determines the retained range from k and tie policy over an existing order."
      explanations:
        zh: 仅当实例既满足 RankingOperation 的完整定义，又满足子类种差“它在既有顺序上按 k 与并列策略确定保留范围。”时建立该边。
        en: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it determines the retained range from k and tie policy over an existing order."
        ja: instanceがRankingOperation完全定義とchild differentia「既存順序上でkとtie policyから保持範囲を決める」を共に満たす時だけassertします。
      source_claims:
        - claim-topk-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TopKSelection-is_a-RankingOperation-example-positive-manual-001
      labels:
        zh: 是一种RankingOperation正例
        en: "Positive case: is a RankingOperation"
        ja: RankingOperationの一種正例
      descriptions:
        zh: topk-417 稳定保留前 12 个候选。
        en: topk-417 stably retains the first 12 candidates.
        ja: topk-417が上位12 candidateを安定保持します。
      field_values: {}
      related_node_ids:
        - TopKSelection
        - RankingOperation
      related_relation_ids:
        - TopKSelection-is_a-RankingOperation
      source_claims:
        - claim-topk-id
    - id: TopKSelection-is_a-RankingOperation-example-boundary-manual-001
      labels:
        zh: 是一种RankingOperation边界例
        en: "Boundary case: is a RankingOperation"
        ja: RankingOperationの一種境界例
      descriptions:
        zh: context-select-417 因 token 预算排除候选。
        en: context-select-417 excludes a candidate because of token budget.
        ja: context-select-417はtoken budgetでcandidateを除外します。
      field_values: {}
      related_node_ids:
        - TopKSelection
        - RankingOperation
      related_relation_ids:
        - TopKSelection-is_a-RankingOperation
      source_claims:
        - claim-topk-id
  source_claims:
    - claim-topk-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TopKSelection-selects_from-CandidateSet
    predicate: selects_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: selects_from CandidateSet
      en: selects_from CandidateSet
      ja: CandidateSetをselects_from
    definitions:
      zh: TopKSelection —selects_from→ CandidateSet 表示TopK 活动在此已排序集合上应用 k 与并列策略以确定保留范围。
      en: TopKSelection —selects_from→ CandidateSet states that the Top-K activity applies k and tie policy to this ordered set to determine the retained range.
      ja: TopKSelection —selects_from→ CandidateSet はTop-K activityがこのordered setへk/tie policyを適用し保持範囲を決めます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_selects_from
      labels:
        zh: 反向读取
        en: inverse selects_from
        ja: 逆方向読取
    conditions:
      - id: TopKSelection-selects_from-CandidateSet-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the set already has deterministic order and selection.k matches the output membership boundary.
        explanations:
          zh: 仅当集合已有确定顺序且 selection.k 与输出成员边界一致时建立。
          en: Assert only when the set already has deterministic order and selection.k matches the output membership boundary.
          ja: setがdeterministic orderを持ちselection.kがoutput membership boundaryと一致する時だけassertします。
        source_claims:
          - claim-topk-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: TopKSelection-selects_from-CandidateSet-example-positive-manual-001
        labels:
          zh: selects_from CandidateSet正例
          en: "Positive case: selects_from CandidateSet"
          ja: CandidateSetをselects_from正例
        descriptions:
          zh: topk-417 selects_from candidate-set-423。
          en: topk-417 selects from candidate-set-423.
          ja: topk-417がcandidate-set-423からselectします。
        field_values: {}
        related_node_ids:
          - TopKSelection
          - CandidateSet
        related_relation_ids:
          - TopKSelection-selects_from-CandidateSet
        source_claims:
          - claim-topk-id
      - id: TopKSelection-selects_from-CandidateSet-example-boundary-manual-001
        labels:
          zh: selects_from CandidateSet边界例
          en: "Boundary case: selects_from CandidateSet"
          ja: CandidateSetをselects_from境界例
        descriptions:
          zh: 按 token 预算跳过高排名候选不是 TopK。
          en: Skipping a high-ranked candidate for token budget is not Top-K selection.
          ja: token budgetでhigh-ranked candidateをskipするのはTop-K selectionではありません。
        field_values: {}
        related_node_ids:
          - TopKSelection
          - CandidateSet
        related_relation_ids:
          - TopKSelection-selects_from-CandidateSet
        source_claims:
          - claim-topk-id
    source_claims:
      - claim-topk-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateSet
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-mem0-search
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: POST /v1/memories/search/ with query, entity IDs, filters, top_k.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: collection.query with query_texts, n_results, where filter.
  - id: src-memory-retrieval-design
    title: Moonweave memory-retrieval-ranking module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates retrieval stages, scores, results, and context admission.
source_claims:
  - id: claim-topk-pinecone
    source: src-pinecone-query
    supports: Pinecone top_k limits returned vector matches.
    locator: top_k
    evidence_kind: primary-api
    confidence: high
  - id: claim-topk-mem0
    source: src-mem0-search
    supports: Mem0 top_k limits search results.
    locator: top_k
    evidence_kind: primary-api
    confidence: high
  - id: claim-topk-not-context
    source: src-memory-retrieval-design
    supports: Top-K truncation is not context-package admission.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-topk-id
    source: src-memory-retrieval-design
    supports: selection_activity_id identifies truncation execution.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-topk-k
    source: src-pinecone-query
    supports: k is the final retained count.
    locator: k
    evidence_kind: primary-api
    confidence: high
  - id: claim-topk-tie
    source: src-memory-retrieval-design
    supports: tie_break_policy preserves deterministic order at cutoff.
    locator: tie_break
    evidence_kind: design-inference
    confidence: high
