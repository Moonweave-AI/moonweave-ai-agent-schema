schema: moonweave.ai/ontology-node/v1
id: RankFusion
kind: concept
status: review
labels:
  zh: 排名融合
  en: Rank fusion
  ja: 順位融合
semantics:
  short_definition:
    zh: 把两个或更多独立排序的候选列表组合成一个统一顺序的排序活动。
    en: A ranking activity that combines two or more independently ordered candidate lists into one ordering.
    ja: 二つ以上の独立ranked candidate listを一つの順序へ結合するranking activityです。
  definition:
    zh: RankFusion 消费包含多个排名信号或子列表的 CandidateSet，并依照声明的融合方法形成统一顺序；它以排名位置或归一化分数作组合，不等同于单一检索器评分，也不等同于模型重排。
    en: RankFusion consumes a CandidateSet carrying multiple rank signals or child lists and creates one ordering under a declared fusion method. It combines rank positions or normalized scores; it is neither single-retriever scoring nor model reranking.
    ja: RankFusion は複数rank signal/child listを持つCandidateSetをconsumeし指定fusion methodで一つの順序を作ります。rank positionまたはnormalized scoreを結合しsingle-retriever scoringやmodel rerankingではありません。
  why_needed:
    zh: 显式区分“组合多个排序”与“重新评估单个候选”。
    en: Explicitly separates combining multiple rankings from reassessing individual candidates.
    ja: 複数rankingの結合と個別candidateの再評価を明示的に分離します。
  includes:
    - zh: 纳入 RRF、DBSF 或其他对多个检索子列表进行确定性组合的活动。
      en: Includes RRF, DBSF, or other deterministic combination of multiple retriever lists.
      ja: RRF・DBSF等複数retriever listを決定的に結合するactivityを含みます。
  excludes:
    - zh: 排除单列表评分、交叉编码器重排、TopK 截断和上下文选择。
      en: Excludes single-list scoring, cross-encoder reranking, TopK truncation, and context selection.
      ja: single-list scoring・cross-encoder reranking・TopK truncation・context selectionを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - fusion_operation_id
  fields:
