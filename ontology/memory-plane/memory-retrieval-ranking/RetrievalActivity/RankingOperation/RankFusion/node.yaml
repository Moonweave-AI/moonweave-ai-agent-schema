        zh: 排名常数
        en: rank constant
        ja: rank constant
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录 RRF 等方法用于缓和头部排名影响的常数。
        en: Records the constant used by methods such as RRF to moderate top-rank influence.
        ja: RRF等で上位rank影響を緩和するconstantを記録します。
