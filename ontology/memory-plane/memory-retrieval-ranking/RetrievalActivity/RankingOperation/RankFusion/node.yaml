schema: moonweave.ai/ontology-node/v1
id: RankFusion
kind: concept
status: accepted
labels:
  zh: 排名融合活动
  en: Rank Fusion
  ja: ランク融合
semantics:
  short_definition:
    zh: 将两个或多个已排序候选列表按明确融合方法合成为一个排序输出的 RankingOperation 子类。
    en: A RankingOperation subtype that combines two or more already ranked candidate lists into one ranked output under an explicit fusion method.
    ja: 二つ以上の既に rank 済み candidate list を明示的 fusion method で一つの ranked output に結合する RankingOperation の下位型。
  definition:
    zh: >
      RankFusion 是对多路已有排序结果进行组合的排序活动，例如将词法与向量检索列表通过 reciprocal rank fusion
      合成为一个结果。它记录参与列表、融合方法和窗口参数，并生成新的融合排序结果。它不是单路候选召回、单个
      候选评分、交叉编码器重排、top-k 截断或 ContextPackage 选择。融合后的顺序不证明任何候选已被授权或将进入回答。
    en: >
      RankFusion is ranking activity that combines multiple existing ranked results, for example combining lexical and
      vector retrieval lists with reciprocal rank fusion into one result. It records participating lists, fusion
      method, and window parameters and generates a new fused ranking. It is not single-stream candidate recall,
      individual candidate scoring, cross-encoder rerank, top-k truncation, or ContextPackage selection. A fused
      order does not prove that any candidate is authorized or will enter an answer.
    ja: >
      RankFusion は複数の既存 ranked result を組み合わせる ranking activity で、例えば lexical と vector retrieval
      list を reciprocal rank fusion で一つの result に結合します。参加 list、fusion method、window parameter を
      記録し、新しい fused ranking を生成します。single-stream candidate recall、個別 candidate scoring、
      cross-encoder rerank、top-k truncation、ContextPackage selection ではありません。fused order は candidate が
      authorized であることや answer に入ることを証明しません。
  why_needed:
    zh: 混合检索通常产生互补列表；记录融合输入和参数可解释最终顺序，而不把任一原始排名或分数误认为唯一依据。
    en: Hybrid retrieval often produces complementary lists; recording fusion inputs and parameters explains final order without mistaking one original rank or score for the sole basis.
    ja: hybrid retrieval は補完的な list を生むことが多く、fusion input と parameter を記録すると、一つの元の rank や score を唯一の根拠と取り違えず final order を説明できます。
  includes:
    - zh: RRF 等多列表融合执行、输入排序列表、融合参数和新的融合结果。
      en: Multi-list fusion execution such as RRF, input ranked lists, fusion parameters, and new fused result.
      ja: RRF のような multi-list fusion execution、input ranked list、fusion parameter、新しい fused result。
  excludes:
    - zh: 单个检索器召回、单项相似度、模型重排、简单保留前 k 项、索引构建和回答生成。
      en: One retriever's recall, one similarity value, model rerank, simply retaining first k items, index construction, or answer generation.
      ja: 一つの retriever の recall、一つの similarity value、model rerank、単に最初の k item を残すこと、index construction、answer generation。
  semantic_kind: activity
  aliases: [reciprocal rank fusion, hybrid rank fusion, 混合检索融合]
engineering:
  explanation:
    zh: Elasticsearch RRF 独立执行多个 retriever 后组合结果，并公开 rank_constant 与 rank_window_size。Moonweave 将该调用记录为可复现的融合活动。
    en: Elasticsearch RRF independently executes multiple retrievers then combines results and exposes rank_constant and rank_window_size. Moonweave records that call as reproducible fusion activity.
    ja: Elasticsearch RRF は複数 retriever を独立に実行して結果を結合し、rank_constant と rank_window_size を公開します。Moonweave はこの call を再現可能な fusion activity として記録します。
  typical_input:
    - description: Two ranked candidate lists
      format: |
        {
          "input_ranked_list_refs": ["candidate-set-vector-18", "candidate-set-lexical-18"],
          "fusion_method_ref": "rrf-v1",
          "rank_constant": 60,
          "rank_window_size": 50
        }
  typical_output:
    - description: Fused result
      format: |
        {
          "rank_fusion_id": "rank-fusion-18",
          "ranking_operation_id": "ranking-fusion-18",
          "retrieval_activity_id": "retrieval-activity-hybrid-18",
          "request_ref": "retrieval-request-hybrid-18",
          "output_result_ref": "retrieval-result-hybrid-18",
          "input_candidate_set_ref": "candidate-set-hybrid-18",
          "input_ranked_list_refs": ["candidate-set-vector-18", "candidate-set-lexical-18"],
          "fusion_method_ref": "rrf-v1",
          "ranking_method_ref": "rrf-v1",
          "implementation_ref": "elasticsearch-rrf-v1",
          "started_at": "2026-07-19T01:00:02Z",
          "fusion_status": "completed",
          "ranking_status": "completed",
          "execution_status": "completed"
        }
  reference_implementations:
    - name: Elasticsearch reciprocal rank fusion
      url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
      description: Documents retrievers, rank_constant, rank_window_size, and reciprocal rank fusion response behavior.
structure:
  identity_keys: [rank_fusion_id]
  fields:
    - id: rank_fusion_id
      labels: {zh: 排名融合标识, en: rank fusion ID, ja: ランク融合 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际多列表融合执行，不能复用为输入列表或结果标识。
        en: Identifies one actual multi-list fusion execution and is not reused as input-list or result ID.
        ja: 一回の実際の multi-list fusion execution を識別し、input-list または result ID として再利用しません。
      allowed_values: []
      pattern: "^rank-fusion-[A-Za-z0-9._-]+$"
      example_value: rank-fusion-18
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: input_ranked_list_refs
      labels: {zh: 输入排序列表引用, en: input ranked list references, ja: input ranked list 参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 列出融合实际读取的两个或多个已排序候选列表，不能由融合输出反推。
        en: Lists two or more already ranked candidate lists actually read for fusion and cannot be inferred backward from fused output.
        ja: fusion のため実際に読み取った二つ以上の既に rank 済み candidate list を列挙し、fused output から遡って推論できません。
      allowed_values: []
      pattern: null
      example_value: [candidate-set-vector-18, candidate-set-lexical-18]
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: fusion_method_ref
      labels: {zh: 融合方法引用, en: fusion method reference, ja: fusion method 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向已声明的融合算法和版本，例如 RRF，而非某一输入检索器。
        en: Points to declared fusion algorithm and revision such as RRF rather than one input retriever.
        ja: 一つの input retriever ではなく、RRF のような宣言済み fusion algorithm と revision を指します。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: rrf-v1
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: rank_constant
      labels: {zh: 排名常数, en: rank constant, ja: rank constant}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: RRF 等方法使用的排名常数；不适用的方法应明确为空而非虚构数值。
        en: Rank constant used by methods such as RRF; a method for which it is inapplicable must record null rather than fabricate a number.
        ja: RRF のような method が使う rank constant で、適用できない method は数値を捏造せず null を記録します。
      allowed_values: []
      pattern: null
      example_value: 60
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: rank_window_size
      labels: {zh: 排名窗口大小, en: rank window size, ja: rank window size}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 融合前从每个输入列表考虑的窗口大小，不等同于最终返回数量。
        en: Number of entries considered from each input list before fusion and is not final returned count.
        ja: fusion 前に各 input list から考慮する entry 数で、final returned count ではありません。
      allowed_values: []
      pattern: null
      example_value: 50
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: output_result_ref
      labels: {zh: 融合结果引用, en: fused result reference, ja: fused result 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次融合生成的 RetrievalResult，而不是任一原始输入列表。
        en: Points to RetrievalResult generated by this fusion rather than any original input list.
        ja: 元の input list ではなく、この fusion が生成した RetrievalResult を指します。
      allowed_values: []
      pattern: "^retrieval-result-[A-Za-z0-9._-]+$"
      example_value: retrieval-result-hybrid-18
      source_claims: [claim-rank-fusion-provenance]
    - id: fusion_status
      labels: {zh: 融合状态, en: fusion status, ja: fusion status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示融合完成、失败、取消或部分完成，不表示结果质量。
        en: Indicates fusion completed, failed, was cancelled, or partial and does not represent result quality.
        ja: fusion が completed、failed、cancelled、partial のどれかを示し、result quality を表しません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-rank-fusion-provenance]
    - id: ranking_operation_id
      labels:
        zh: 排序操作标识
        en: ranking operation ID
        ja: ランキング操作 ID
      definitions:
        zh: 标识同一多列表融合执行的通用排序操作身份，不复用为候选集、结果或单个分数标识。
        en: Identifies the same multi-list fusion execution as a general ranking operation and is not reused as a candidate-set, result, or individual-score ID.
        ja: 同じ複数 list fusion execution を一般の ranking operation として識別し、candidate-set、result、個別 score ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^ranking-[A-Za-z0-9._-]+$'
      example_value: ranking-fusion-18
      source_claims: [claim-rank-fusion-subtype]
    - id: input_candidate_set_ref
      labels:
        zh: 输入候选集引用
        en: input candidate set reference
        ja: input candidate set 参照
      definitions:
        zh: 指向融合排序消费的规范 CandidateSet，其成员是输入有序列表的共同或并集候选基础。
        en: Points to the canonical CandidateSet consumed by fusion ranking, whose members are the common or union candidate basis of the input ranked lists.
        ja: fusion ranking が消費する canonical CandidateSet を指し、その member は input ranked list の共通または和集合 candidate basis である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-set-[A-Za-z0-9._-]+$'
      example_value: candidate-set-support-fusion-18
      source_claims: [claim-rank-fusion-provenance]
    - id: ranking_method_ref
      labels:
        zh: 排序方法引用
        en: ranking method reference
        ja: ranking method 参照
      definitions:
        zh: 指向本次融合采用的方法版本，不等同于单个输入列表的排名或某个候选分数。
        en: Points to the fusion-method revision used by this ranking and is not a rank in an input list or a candidate score.
        ja: この ranking が使う fusion-method revision を指し、input list 内の rank や candidate score ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^[A-Za-z][A-Za-z0-9._-]+$'
      example_value: rrf-k60-v1
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: ranking_status
      labels:
        zh: 排序状态
        en: ranking status
        ja: ranking status
      definitions:
        zh: 指示融合排序是否完成、失败、取消或部分完成，不是对融合结果相关性的评价。
        en: Indicates whether fusion ranking completed, failed, was cancelled, or partially completed and is not a relevance evaluation of the fused result.
        ja: fusion ranking が completed、failed、cancelled、partial のどれかを示し、fused result の relevance evaluation ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-rank-fusion-provenance]
    - id: retrieval_activity_id
      labels:
        zh: 检索活动标识
        en: retrieval activity ID
        ja: retrieval activity ID
      definitions:
        zh: 标识同一融合检索执行的通用检索活动身份，不复用为请求、候选、分数或结果标识。
        en: Identifies the same fusion execution as a general retrieval activity and is not reused as a request, candidate, score, or result ID.
        ja: 同じ fusion execution を一般の retrieval activity として識別し、request、candidate、score、result ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-activity-[A-Za-z0-9._-]+$'
      example_value: retrieval-activity-fusion-18
      source_claims: [claim-rank-fusion-subtype]
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: request 参照
      definitions:
        zh: 指向这些输入有序列表和融合输出实际服务的 RetrievalRequest，不由输出排名反推。
        en: Points to the RetrievalRequest actually served by the input ranked lists and fused output and is not inferred from output ordering.
        ja: input ranked list と fused output が実際に処理した RetrievalRequest を指し、output ordering から推論しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-request-[A-Za-z0-9._-]+$'
      example_value: retrieval-request-support-18
      source_claims: [claim-rank-fusion-provenance]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: implementation reference
        ja: implementation 参照
      definitions:
        zh: 指向执行该融合方法的检索或排序实现版本，不等同于融合常数或窗口大小。
        en: Points to the retrieval or ranking implementation revision executing the fusion method and is not the fusion constant or window size.
        ja: fusion method を実行する retrieval または ranking implementation revision を指し、fusion constant や window size ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-impl-[A-Za-z0-9._-]+$'
      example_value: retrieval-impl-rrf-v1
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录融合检索活动开始的时间，不能由任一输入列表或输出结果的创建时间替代。
        en: Records when this fusion retrieval activity began and cannot be substituted by creation time of an input list or the output result.
        ja: この fusion retrieval activity の開始時刻を記録し、input list または output result の作成時刻では代替できない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-19T03:20:00Z'
      source_claims: [claim-rank-fusion-provenance]
    - id: execution_status
      labels:
        zh: 执行状态
        en: execution status
        ja: execution status
      definitions:
        zh: 提供融合活动的粗粒度运行、完成或失败状态；详细取消和部分完成由 ranking_status 与 fusion_status 保留。
        en: Provides coarse running, completed, or failed status for fusion while ranking_status and fusion_status retain cancellation and partial-completion detail.
        ja: fusion の coarse な running、completed、failed 状態を示し、cancelled と partial の詳細は ranking_status と fusion_status に保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [running, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-rank-fusion-provenance]
  constraints:
    - id: rank-fusion-inherits-ranking-and-retrieval-fields
      severity: error
      expression_language: plain
      expression: RankFusion is one RankingOperation and RetrievalActivity record. rank_fusion_id, ranking_operation_id, and retrieval_activity_id must resolve to the same execution; input_candidate_set_ref is the canonical candidate basis for input_ranked_list_refs; ranking_method_ref resolves to fusion_method_ref; request_ref is shared by all inputs and output_result_ref; implementation_ref executes that method; and ranking_status plus execution_status are the generic lifecycle projections of fusion_status.
      explanation:
        zh: 融合是排序和检索活动的真实特化；列表、方法和参数字段细化同一执行记录，不能替代父类要求的请求、输入、实现和生命周期事实。
        en: Fusion is a real ranking and retrieval specialization; its list, method, and parameter fields refine one execution record and cannot replace inherited request, input, implementation, or lifecycle facts.
        ja: fusion は真の ranking および retrieval 特殊化であり、list、method、parameter field は一つの execution record を細化する。継承した request、input、implementation、lifecycle fact を置き換えてはならない。
      source_claims: [claim-rank-fusion-subtype, claim-rank-fusion-provenance]
    - id: rank-fusion-input-parameter-consistency
      severity: error
      expression_language: plain
      expression: input_ranked_list_refs must contain at least two lists. fusion_method_ref and fusion_status are required. For RRF, rank_constant and rank_window_size must be positive, and a completed fusion must name output_result_ref.
      explanation:
        zh: 融合必须有多路可检查输入和方法参数；单一列表或未知参数不能声称产生可复现融合排序。
        en: Fusion requires multiple inspectable inputs and method parameters; one list or unknown parameters cannot claim reproducible fused ranking.
        ja: fusion には複数の検査可能な input と method parameter が必要で、一つの list や不明 parameter では再現可能な fused ranking を主張できません。
      source_claims: [claim-rank-fusion-elasticsearch]
    - id: rank-fusion-not-rerank-or-topk
      severity: error
      expression_language: plain
      expression: RankFusion must not assert single-model query-document reranking, individual score semantics, initial recall, top-k-only truncation, ContextPackage inclusion, or answer correctness.
      explanation:
        zh: 融合组合多个排序来源；模型重排、评分、召回和截断是不同操作。
        en: Fusion combines multiple ranking sources; model rerank, scoring, recall, and truncation are distinct operations.
        ja: fusion は複数 ranking source を結合し、model rerank、scoring、recall、truncation は別の operation です。
      source_claims: [claim-rank-fusion-boundary]
  required_relations: []
examples:
  - id: rank-fusion-example-positive

    labels: {zh: 融合向量与词法列表, en: Fuse vector and lexical lists, ja: vector と lexical list を融合する}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      rank_fusion_id: rank-fusion-18
      ranking_operation_id: ranking-fusion-18
      retrieval_activity_id: retrieval-activity-hybrid-18
      request_ref: retrieval-request-hybrid-18
      input_ranked_list_refs: [candidate-set-vector-18, candidate-set-lexical-18]
      input_candidate_set_ref: candidate-set-hybrid-18
      fusion_method_ref: rrf-v1
      ranking_method_ref: rrf-v1
      implementation_ref: elasticsearch-rrf-v1
      rank_constant: 60
      rank_window_size: 50
      output_result_ref: retrieval-result-hybrid-18
      started_at: "2026-07-19T01:00:02Z"
      fusion_status: completed
      ranking_status: completed
      execution_status: completed
    related_node_ids: [RankFusion, RankingOperation, CandidateSet, RetrievalResult]
    related_relation_ids: [RankFusion-is_a-RankingOperation, RankFusion-uses-CandidateSet, RankFusion-generates-RetrievalResult]

    source_claims: [claim-rank-fusion-elasticsearch, claim-rank-fusion-provenance]
  - id: rank-fusion-example-counterexample-one-list

    labels: {zh: 单一列表重新命名, en: One list relabeled as fusion, ja: fusion と再ラベルした一つの list}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      input_ranked_list_refs: [candidate-set-lexical-18]
      fusion_method_ref: null
      rank_constant: null
      output_result_ref: retrieval-result-lexical-18
    related_node_ids: [RankFusion]
    related_relation_ids: []

    source_claims: [claim-rank-fusion-boundary]
  - id: rank-fusion-example-boundary-rerank

    labels: {zh: 单模型交叉编码器重排, en: Single-model cross-encoder rerank, ja: single-model cross-encoder rerank}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      input_candidate_set_ref: candidate-set-support-18
      model_ref: cross-encoder-ms-marco
      input_ranked_list_refs: [candidate-set-support-18]
      fusion_method_ref: null
    related_node_ids: [RankFusion, RerankActivity]
    related_relation_ids: []

    source_claims: [claim-rank-fusion-boundary]
  - id: rank-fusion-example-instance-elasticsearch

    labels: {zh: 实例：Elasticsearch RRF 参数, en: "Instance: Elasticsearch RRF parameters", ja: "事例：Elasticsearch RRF parameter"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
