schema: moonweave.ai/ontology-node/v1
id: RankFusion
kind: concept
labels:
  zh: 排名融合
  en: Rank fusion
  ja: 順位融合
semantics:
  short_definition:
    zh: 把多路独立排序合并为统一顺序的活动。
    en: Activity merging multiple independent rankings into one order.
    ja: 複数独立 ranking を一順序に合并する activity。
  definition:
    zh: RankFusion 消费含多个排名信号或子列表的 CandidateSet，按声明 fusion_method（如 RRF）形成统一顺序；RRF 公式 score(d)=Σ 1/(k+rank_i(d))，rank_constant 对应 Elasticsearch rank_constant 与 Moonweave rrf_k；它不是 Cohere rerank 也不是单向量 cosine 评分。
    en: RankFusion consumes a CandidateSet with multiple rank signals or child lists and forms one ordering under a declared fusion_method such as RRF. RRF uses score(d)=Σ 1/(k+rank_i(d)); rank_constant maps to Elasticsearch rank_constant and Moonweave rrf_k. It is neither Cohere rerank nor single-vector cosine scoring.
    ja: RankFusion は複数 rank signal/child list を持つ CandidateSet を consume し RRF 等 fusion_method で一順序を形成。score(d)=Σ1/(k+rank_i(d))、rank_constant は Elasticsearch/Moonweave rrf_k に対応。Cohere rerank でも単一 cosine でもありません。
  why_needed:
    zh: Hybrid 检索常并行跑 Pinecone 与 BM25 两路，必须单独记录 RRF 如何把两列排名合成一列，否则 replay 时无法复现融合顺序。
    en: Hybrid retrieval often runs Pinecone and BM25 in parallel; RRF must be recorded separately or replay cannot reproduce fused order.
    ja: Hybrid 検索で Pinecone/BM25 並列時、RRF 合并を別記録しないと replay で fused order を再現できません。
  includes:
    - zh: 纳入 RRF、DBSF 等对多检索子列表做确定性组合的活动。
      en: Includes RRF, DBSF, or other deterministic combination of multiple retriever lists.
      ja: RRF/DBSF 等で複数 retriever list を決定的に結合する activity。
  excludes:
    - zh: 排除 Cohere cross-encoder rerank、单列表 cosine 评分与 Top-K 截断。
      en: Excludes Cohere cross-encoder rerank, single-list cosine scoring, and Top-K truncation.
      ja: Cohere cross-encoder rerank・single-list cosine・Top-K truncation を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: RRF 公式 score(d)=Σ 1/(k+rank_i(d))；rank_constant 默认 60（Elasticsearch/Pinecone hybrid 常见值）；fusion_method=rrf 写入 trace 以支持重放。
    en: RRF formula score(d)=Σ 1/(k+rank_i(d)); rank_constant defaults to 60; fusion_method=rrf is written to trace for replay.
    ja: "RRF: score(d)=Σ1/(k+rank_i(d))。rank_constant 默认 60。fusion_method=rrf を trace に記録して replay 可能に。"
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - fusion_operation_id
  fields:
    - id: fusion_operation_id
      labels:
        zh: 融合操作标识
        en: Fusion operation identifier
        ja: 融合操作識別子
      definitions:
        zh: 稳定标识一次排名融合执行。
        en: Stable identifier for one rank-fusion execution.
        ja: 一 rank-fusion execution を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rank-fusion-415
      allowed_values: []
      source_claims:
        - claim-rank-fusion-id
    - id: fusion_method
      labels:
        zh: 融合方法
        en: Fusion method
        ja: 融合方式
      definitions:
        zh: 声明组合算法，如 rrf、dbsf。
        en: Declares combination algorithm, e.g., rrf, dbsf.
        ja: rrf/dbsf 等 combination algorithm を宣言。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rrf
      allowed_values: []
      source_claims:
        - claim-rank-fusion-method
    - id: rank_constant
      labels:
        zh: RRF 常数 k
        en: RRF constant k
        ja: RRF 定数 k
      definitions:
        zh: RRF 公式中的 k；对应 Elasticsearch rank_constant 与 API 文档中的 rrf_k。
        en: k in the RRF formula; maps to Elasticsearch rank_constant and rrf_k in APIs.
        ja: RRF 公式の k。Elasticsearch rank_constant/API rrf_k に対応。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 60
      allowed_values: []
      source_claims:
        - claim-rank-fusion-k
  constraints: []
  required_relations: []
examples:
  - id: RankFusion-example-pinecone-bm25-rrf
    labels:
      zh: Pinecone+BM25 RRF
      en: Pinecone+BM25 RRF
      ja: Pinecone+BM25 RRF
    descriptions:
      zh: fusion-415 用 RRF(k=60) 合并 Pinecone dense top-40 与 BM25 top-40 为统一顺序。
      en: fusion-415 merges Pinecone dense top-40 and BM25 top-40 with RRF(k=60).
      ja: fusion-415 が RRF(k=60) で dense/BM25 各 top-40 を合并。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
      version: RRF formula
    field_values:
      fusion_operation_id: rank-fusion-415
      fusion_method: rrf
      rank_constant: 60
    related_node_ids:
      - RankFusion
      - CandidateSet
    related_relation_ids: []
    source_claims:
      - claim-rank-fusion-rrf
  - id: RankFusion-example-chroma-mem0
    labels:
      zh: Chroma+Mem0 RRF
      en: Chroma+Mem0 RRF
      ja: Chroma+Mem0 RRF
    descriptions:
      zh: fusion-416 合并 Chroma collection.query 与 Mem0 search 两路候选，rank_constant=60。
      en: fusion-416 merges Chroma collection.query and Mem0 search lists with rank_constant=60.
      ja: fusion-416 が Chroma/Mem0 二 list を rank_constant=60 で合并。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: hybrid RRF
    field_values:
      fusion_operation_id: rank-fusion-416
      fusion_method: rrf
      rank_constant: 60
    related_node_ids:
      - RankFusion
    related_relation_ids: []
    source_claims:
      - claim-rank-fusion-hybrid
  - id: RankFusion-example-not-cohere
    labels:
      zh: RRF 非 Cohere rerank
      en: RRF is not Cohere rerank
      ja: RRF は Cohere rerank ではない
    descriptions:
      zh: Cohere POST /v2/rerank 读取候选文本重新评分属于 RerankActivity，不是 RankFusion。
      en: Cohere POST /v2/rerank rescoring candidate text is RerankActivity, not RankFusion.
      ja: Cohere rerank は RerankActivity で RankFusion ではない。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: contrast with RRF
    field_values:
      fusion_method: rrf
    related_node_ids:
      - RankFusion
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-rank-fusion-not-rerank
parent_relation:
  id: RankFusion-is_a-RankingOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RankingOperation
    en: is a RankingOperation
    ja: RankingOperationの一種
  definitions:
    zh: RankFusion —is_a→ RankingOperation 成立，因为它组合两个或更多独立排名信号形成统一顺序。
    en: RankFusion —is_a→ RankingOperation holds because it combines two or more independent rank signals into one ordering.
    ja: RankFusion —is_a→ RankingOperation は二つ以上の独立rank signalを一順序へ結合するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RankFusion-is_a-RankingOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it combines two or more independent rank signals into one ordering."
      explanations:
        zh: 仅当实例既满足 RankingOperation 的完整定义，又满足子类种差“它组合两个或更多独立排名信号形成统一顺序。”时建立该边。
        en: "Assert only when the instance satisfies the complete RankingOperation definition and the child differentia: it combines two or more independent rank signals into one ordering."
        ja: instanceがRankingOperation完全定義とchild differentia「二つ以上の独立rank signalを一順序へ結合する」を共に満たす時だけassertします。
      source_claims:
        - claim-rank-fusion-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RankFusion-is_a-RankingOperation-example-positive-manual-001
      labels:
        zh: 是一种RankingOperation正例
        en: "Positive case: is a RankingOperation"
        ja: RankingOperationの一種正例
      descriptions:
        zh: fusion-415 用 RRF 合并 dense 与 lexical 列表。
        en: fusion-415 uses RRF to merge dense and lexical lists.
        ja: fusion-415がRRFでdense/lexical listを統合します。
      field_values: {}
      related_node_ids:
        - RankFusion
        - RankingOperation
      related_relation_ids:
        - RankFusion-is_a-RankingOperation
      source_claims:
        - claim-rank-fusion-id
    - id: RankFusion-is_a-RankingOperation-example-boundary-manual-001
      labels:
        zh: 是一种RankingOperation边界例
        en: "Boundary case: is a RankingOperation"
        ja: RankingOperationの一種境界例
      descriptions:
        zh: rerank-416 用模型重新评分单个候选。
        en: rerank-416 uses a model to rescore individual candidates.
        ja: rerank-416はmodelでindividual candidateを再採点します。
      field_values: {}
      related_node_ids:
        - RankFusion
        - RankingOperation
      related_relation_ids:
        - RankFusion-is_a-RankingOperation
      source_claims:
        - claim-rank-fusion-id
  source_claims:
    - claim-rank-fusion-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RankFusion-consumes-CandidateSet
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: consumes CandidateSet
      en: consumes CandidateSet
      ja: CandidateSetをconsumes
    definitions:
      zh: RankFusion —consumes→ CandidateSet 表示融合活动把此集合中的多个独立排名信号或子列表作为输入。
      en: RankFusion —consumes→ CandidateSet states that the fusion activity takes the set's multiple independent rank signals or child lists as input.
      ja: RankFusion —consumes→ CandidateSet はfusion activityがset内複数独立rank signal/child listをinputにします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_consumes
      labels:
        zh: 反向读取
        en: inverse consumes
        ja: 逆方向読取
    conditions:
      - id: RankFusion-consumes-CandidateSet-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when CandidateSet preserves at least two distinguishable ranking inputs and the fusion trace references it.
        explanations:
          zh: 仅当该 CandidateSet 保留至少两个可区分排名输入且 fusion trace 引用它时建立。
          en: Assert only when CandidateSet preserves at least two distinguishable ranking inputs and the fusion trace references it.
          ja: CandidateSetが二つ以上の区別可能ranking inputを保持しfusion traceが参照する時だけassertします。
        source_claims:
          - claim-rank-fusion-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RankFusion-consumes-CandidateSet-example-positive-manual-001
        labels:
          zh: consumes CandidateSet正例
          en: "Positive case: consumes CandidateSet"
          ja: CandidateSetをconsumes正例
        descriptions:
          zh: fusion-415 consumes hybrid-candidate-set-415。
          en: fusion-415 consumes hybrid-candidate-set-415.
          ja: fusion-415がhybrid-candidate-set-415をconsumeします。
        field_values: {}
        related_node_ids:
          - RankFusion
          - CandidateSet
        related_relation_ids:
          - RankFusion-consumes-CandidateSet
        source_claims:
          - claim-rank-fusion-id
      - id: RankFusion-consumes-CandidateSet-example-boundary-manual-001
        labels:
          zh: consumes CandidateSet边界例
          en: "Boundary case: consumes CandidateSet"
          ja: CandidateSetをconsumes境界例
        descriptions:
          zh: 只有单一未排序列表时不能声称发生排名融合。
          en: A single unordered list is insufficient to assert rank fusion consumption.
          ja: single unordered listだけではrank fusion consumptionをassertしません。
        field_values: {}
        related_node_ids:
          - RankFusion
          - CandidateSet
        related_relation_ids:
          - RankFusion-consumes-CandidateSet
        source_claims:
          - claim-rank-fusion-id
    source_claims:
      - claim-rank-fusion-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateSet
  - id: RankFusion-orders-CandidateSet
    predicate: orders
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: orders CandidateSet
      en: orders CandidateSet
      ja: CandidateSetをorders
    definitions:
      zh: RankFusion —orders→ CandidateSet 表示融合活动依据声明方法为集合形成统一、可重放的成员顺序。
      en: RankFusion —orders→ CandidateSet states that the fusion activity establishes one replayable member order for the set under its declared method.
      ja: RankFusion —orders→ CandidateSet はfusion activityが指定methodでsetに一つのreplayable member orderを形成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_orders
      labels:
        zh: 反向读取
        en: inverse orders
        ja: 逆方向読取
    conditions:
      - id: RankFusion-orders-CandidateSet-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the output set records the fusion method and deterministic order and traces back to this activity.
        explanations:
          zh: 仅当输出集合记录 fusion_method 与确定顺序，且可回溯该活动时建立。
          en: Assert only when the output set records the fusion method and deterministic order and traces back to this activity.
          ja: output setがfusion_methodとdeterministic orderを記録しこのactivityへ追跡できる時だけassertします。
        source_claims:
          - claim-rank-fusion-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RankFusion-orders-CandidateSet-example-positive-manual-001
        labels:
          zh: orders CandidateSet正例
          en: "Positive case: orders CandidateSet"
          ja: CandidateSetをorders正例
        descriptions:
          zh: fusion-415 orders candidate-set-fused-415 by RRF。
          en: fusion-415 orders candidate-set-fused-415 by RRF.
          ja: fusion-415がRRFでcandidate-set-fused-415をorderします。
        field_values: {}
        related_node_ids:
          - RankFusion
          - CandidateSet
        related_relation_ids:
          - RankFusion-orders-CandidateSet
        source_claims:
          - claim-rank-fusion-id
      - id: RankFusion-orders-CandidateSet-example-boundary-manual-001
        labels:
          zh: orders CandidateSet边界例
          en: "Boundary case: orders CandidateSet"
          ja: CandidateSetをorders境界例
        descriptions:
          zh: 只计算各列表分数但未形成统一顺序不能建立此边。
          en: Computing list scores without forming one order does not establish this edge.
          ja: list score計算だけで一順序を形成しなければedgeを成立させません。
        field_values: {}
        related_node_ids:
          - RankFusion
          - CandidateSet
        related_relation_ids:
          - RankFusion-orders-CandidateSet
        source_claims:
          - claim-rank-fusion-id
    source_claims:
      - claim-rank-fusion-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateSet
