schema: moonweave.ai/ontology-node/v1
id: RankingOperation
kind: concept
labels:
  zh: 排序操作
  en: Ranking operation
  ja: 順位付け操作
semantics:
  short_definition:
    zh: 改变既有候选顺序或保留范围的排序活动。
    en: Ranking activity that changes order or retained range of existing candidates.
    ja: 既存 candidate の順序または保持範囲を変える ranking activity。
  definition:
    zh: RankingOperation 消费已有 CandidateSet 并改变分数解释、相对顺序或保留范围的活动上位概念；覆盖 CandidateScoringActivity、RankFusion、RerankActivity 与 TopKSelection，但不从索引首次召回。
    en: RankingOperation is the activity superclass consuming an existing CandidateSet to change score interpretation, relative order, or retained range. It covers CandidateScoringActivity, RankFusion, RerankActivity, and TopKSelection but not first-stage index recall.
    ja: RankingOperation は既存 CandidateSet を consume し score 解釈・相対順序・保持範囲を変える activity 上位概念。CandidateScoringActivity/RankFusion/RerankActivity/TopKSelection を含み first-stage recall は含みません。
  why_needed:
    zh: 多种排序机制需要共同父节点，同时保留 Cohere rerank 与 RRF 不同的输入输出语义。
    en: Multiple ranking mechanisms need a shared parent while preserving distinct Cohere rerank versus RRF semantics.
    ja: Cohere rerank と RRF の異なる入出力意味を保ちつつ共通 parent が必要です。
  includes:
    - zh: 纳入对已生成候选执行评分、融合、重排和截断的有身份活动。
      en: Includes identified activities that score, fuse, rerank, or truncate already generated candidates.
      ja: 生成済 candidate を score/fuse/rerank/truncate する identity 付き activity。
  excludes:
    - zh: 排除候选生成、请求/结果对象与上下文采用。
      en: Excludes candidate generation, request/result objects, and context admission.
      ja: candidate generation・request/result・context admission を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Cohere POST /v2/rerank、Elasticsearch RRF、ColBERT MaxSim 与 top_k 截断均属于 RankingOperation 子类；input_candidate_set_id 指向消费前的集合。
    en: Cohere POST /v2/rerank, Elasticsearch RRF, ColBERT MaxSim, and top_k truncation are RankingOperation subtypes; input_candidate_set_id points to the consumed set.
    ja: Cohere rerank・Elasticsearch RRF・ColBERT MaxSim・top_k truncation は RankingOperation subtype。input_candidate_set_id は consume 前 set を指す。
  typical_input:
    - description: Ranking stage input
      format: '{ "ranking_operation_id": "ranking-413", "input_candidate_set_id": "candidate-set-413" }'
      source_claims:
        - claim-ranking-operation-design
  typical_output:
    - description: Reordered or truncated output set
      format: '{ "output_candidate_set_id": "candidate-set-reranked-416", "stage": "rerank" }'
      source_claims:
        - claim-ranking-operation-design
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - ranking_operation_id
  fields:
    - id: ranking_operation_id
      labels:
        zh: 排序操作标识
        en: Ranking operation identifier
        ja: 順位付け操作識別子
      definitions:
        zh: 稳定标识一次排序阶段执行。
        en: Stable identifier for one ranking-stage execution.
        ja: 一 ranking-stage execution を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ranking-operation-413
      allowed_values: []
      source_claims:
        - claim-ranking-operation-id
    - id: input_candidate_set_id
      labels:
        zh: 输入候选集合标识
        en: Input candidate set identifier
        ja: 入力 candidate set 識別子
      definitions:
        zh: 标识排序前消费的 CandidateSet。
        en: Identifies the CandidateSet consumed before ranking.
        ja: ranking 前に consume する CandidateSet を識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-set-413
      allowed_values: []
      source_claims:
        - claim-ranking-operation-input
  constraints: []
  required_relations: []
examples:
  - id: RankingOperation-example-rrf
    labels:
      zh: RRF 融合排序
      en: RRF fusion ranking
      ja: RRF 融合 ranking
    descriptions:
      zh: ranking-415 消费含 dense 与 lexical 两路的 candidate-set-415 并执行 RRF 融合。
      en: ranking-415 consumes candidate-set-415 with dense and lexical lists and runs RRF fusion.
      ja: ranking-415 が dense/lexical 二 list を含む set を consume し RRF fusion。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
      version: RRF rank_constant=60
    field_values:
      ranking_operation_id: rank-fusion-415
      input_candidate_set_id: candidate-set-dense-lexical-415
    related_node_ids:
      - RankingOperation
      - RankFusion
    related_relation_ids: []
    source_claims:
      - claim-ranking-operation-rrf
      - claim-ranking-operation-design
  - id: RankingOperation-example-cohere
    labels:
      zh: Cohere 重排排序
      en: Cohere rerank ranking
      ja: Cohere rerank ranking
    descriptions:
      zh: ranking-416 消费 20 条融合候选并调用 Cohere rerank(top_n=10)。
      en: ranking-416 consumes 20 fused candidates and calls Cohere rerank(top_n=10).
      ja: ranking-416 が 20 fused candidate を consume し Cohere rerank(top_n=10)。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: POST /v2/rerank
    field_values:
      ranking_operation_id: rerank-416
      input_candidate_set_id: candidate-set-fused-415
    related_node_ids:
      - RankingOperation
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-ranking-operation-cohere
  - id: RankingOperation-example-topk
    labels:
      zh: Top-K 截断排序
      en: Top-K truncation ranking
      ja: Top-K truncation ranking
    descriptions:
      zh: ranking-417 对已排序 80 候选按 top_k=12 稳定截断。
      en: ranking-417 stably truncates 80 ordered candidates to top_k=12.
      ja: ranking-417 が ordered 80 candidate を top_k=12 に truncate。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: top_k parameter
    field_values:
      ranking_operation_id: topk-417
      input_candidate_set_id: candidate-set-reranked-416
    related_node_ids:
      - RankingOperation
      - TopKSelection
    related_relation_ids: []
    source_claims:
      - claim-ranking-operation-topk
sources:
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: POST /v2/rerank with rerank-v3 models, query, documents, top_n.
  - id: src-elastic-rrf
    title: Elasticsearch Reciprocal Rank Fusion
    publisher: Elastic
    url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
    source_type: official-doc
    relevance: RRF formula, rank_constant, and rank_window_size.
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-memory-retrieval-design
    title: Moonweave memory-retrieval-ranking module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates retrieval stages, scores, results, and context admission.
source_claims:
  - id: claim-ranking-operation-rrf
    source: src-elastic-rrf
    supports: RRF combines independently ranked lists into one ordering.
    locator: RRF
    evidence_kind: primary-api
    confidence: high
  - id: claim-ranking-operation-cohere
    source: src-cohere-rerank
    supports: Cohere rerank is a second-stage ranking operation over existing candidates.
    locator: POST /v2/rerank
    evidence_kind: primary-api
    confidence: high
  - id: claim-ranking-operation-topk
    source: src-pinecone-query
    supports: top_k truncation selects the first K candidates from an ordered set.
    locator: top_k
    evidence_kind: primary-api
    confidence: high
  - id: claim-ranking-operation-design
    source: src-memory-retrieval-design
    supports: RankingOperation consumes existing CandidateSet values.
    locator: module boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ranking-operation-id
    source: src-memory-retrieval-design
    supports: ranking_operation_id identifies one ranking stage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ranking-operation-input
    source: src-memory-retrieval-design
    supports: input_candidate_set_id records the pre-ranking set.
    locator: structure
    evidence_kind: design-inference
    confidence: high
parent_relation:
  id: RankingOperation-is_a-RetrievalActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalActivity
    en: is a RetrievalActivity
    ja: RetrievalActivityの一種
  definitions:
    zh: RankingOperation —is_a→ RetrievalActivity 成立，因为它消费既有 CandidateSet 并改变分数解释、顺序或保留范围。
    en: RankingOperation —is_a→ RetrievalActivity holds because it consumes an existing CandidateSet and changes score interpretation, order, or retained range.
    ja: RankingOperation —is_a→ RetrievalActivity は既存CandidateSetをconsumeしscore解釈・順序・保持範囲を変えるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RankingOperation-is_a-RetrievalActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it consumes an existing CandidateSet and changes score interpretation, order, or retained range."
      explanations:
        zh: 仅当实例既满足 RetrievalActivity 的完整定义，又满足子类种差“它消费既有 CandidateSet 并改变分数解释、顺序或保留范围。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it consumes an existing CandidateSet and changes score interpretation, order, or retained range."
        ja: instanceがRetrievalActivity完全定義とchild differentia「既存CandidateSetをconsumeしscore解釈・順序・保持範囲を変える」を共に満たす時だけassertします。
      source_claims:
        - claim-ranking-operation-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RankingOperation-is_a-RetrievalActivity-example-positive-manual-001
      labels:
        zh: 是一种RetrievalActivity正例
        en: "Positive case: is a RetrievalActivity"
        ja: RetrievalActivityの一種正例
      descriptions:
        zh: ranking-413 消费 candidate-set-423 并改变其排序状态。
        en: ranking-413 consumes candidate-set-423 and changes its ranking state.
        ja: ranking-413がcandidate-set-423をconsumeしranking stateを変えます。
      field_values: {}
      related_node_ids:
        - RankingOperation
        - RetrievalActivity
      related_relation_ids:
        - RankingOperation-is_a-RetrievalActivity
      source_claims:
        - claim-ranking-operation-design
    - id: RankingOperation-is_a-RetrievalActivity-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalActivity边界例
        en: "Boundary case: is a RetrievalActivity"
        ja: RetrievalActivityの一種境界例
      descriptions:
        zh: generation-412 从索引首次召回，尚无既有 CandidateSet 输入。
        en: generation-412 performs first recall and has no existing CandidateSet input.
        ja: generation-412はfirst recallで既存CandidateSet inputがありません。
      field_values: {}
      related_node_ids:
        - RankingOperation
        - RetrievalActivity
      related_relation_ids:
        - RankingOperation-is_a-RetrievalActivity
      source_claims:
        - claim-ranking-operation-design
  source_claims:
    - claim-ranking-operation-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
