      source_claims:
        - claim-ranking-operation-002
    - id: input_candidate_set_id
      labels:
        zh: 输入候选集合标识
        en: input candidate set ID
        ja: input candidate set ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识排序前所消费的候选集合。
        en: Identifies the candidate set consumed before ranking.
        ja: ranking前にconsumeするcandidate setを識別します。
      allowed_values: []
      pattern: null
      example_value: candidate-set-413
      source_claims:
        - claim-ranking-operation-003
  constraints: []
  required_relation_constraints: []
