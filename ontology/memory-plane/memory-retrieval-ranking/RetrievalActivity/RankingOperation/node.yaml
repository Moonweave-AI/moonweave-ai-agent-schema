schema: moonweave.ai/ontology-node/v1
id: RankingOperation
kind: concept
status: accepted
labels:
  zh: 排序操作
  en: Ranking Operation
  ja: ランキング操作
semantics:
  short_definition:
    zh: 消费已召回候选并按明确方法产生、更新或截断候选顺序的 RetrievalActivity 子类。
    en: A RetrievalActivity subtype that consumes recalled candidates and produces, updates, or truncates their order under an explicit method.
    ja: 明示的な method で recall 済み candidate を消費し、その order を生成、更新、または切り詰める RetrievalActivity の下位型。
  definition:
    zh: >
      RankingOperation 是在候选已存在后对其顺序或选择边界执行的检索活动。它使用声明的排序、评分、融合、重排或
      top-k 方法，生成可追溯的排序输出或更新后的候选结果。它不执行初始候选召回、不构建索引、也不保证候选相关、
      获授权、被放入 ContextPackage 或构成正确答案。CandidateScoringActivity、RankFusion、RerankActivity 和
      TopKSelection 都是该活动的不同专门化。
    en: >
      RankingOperation is retrieval activity performed after candidates already exist to operate on their order or
      selection boundary. It uses a declared ranking, scoring, fusion, rerank, or top-k method and produces
      traceable ordering output or updated candidate result. It does not perform initial candidate recall, build an
      index, or guarantee that a candidate is relevant, authorized, placed in ContextPackage, or part of a correct
      answer. CandidateScoringActivity, RankFusion, RerankActivity, and TopKSelection are different subtypes
      of this activity.
    ja: >
      RankingOperation は candidate がすでに存在した後に、その order または selection boundary を操作する
      retrieval activity です。宣言済み ranking、scoring、fusion、rerank、top-k method を使い、追跡可能な
      ordering output または更新済み candidate result を生成します。初期 candidate recall、index 構築を行わず、
      candidate が relevant、authorized、ContextPackage に配置済み、正しい answer の一部であることも保証しません。
      CandidateScoringActivity、RankFusion、RerankActivity、TopKSelection はこの activity の異なる特殊化です。
  why_needed:
    zh: 被召回与排在前列是不同事实；独立记录排序才能解释算法、输入范围和分数变化，而不会把候选发现误作最终选择。
    en: Being recalled and appearing early are different facts; recording ranking separately explains algorithm, input scope, and score change without mistaking discovery for final selection.
    ja: recall されたことと上位に現れることは別の事実です。ranking を分けて記録すると、discovery を final selection と取り違えず algorithm、input scope、score change を説明できます。
  includes:
    - zh: 已执行的候选评分、融合、模型重排和按确定顺序选择前 k 项的活动。
      en: Executed candidate scoring, fusion, model reranking, and selection of first k items from a determinate ordering.
      ja: 実行済み candidate scoring、fusion、model reranking、確定済み order から最初の k item を選ぶ activity。
  excludes:
    - zh: 初始候选生成、离线索引构建、单个分数实体、候选内容、上下文装配、模型回答和质量评估结论。
      en: Initial candidate generation, offline index construction, an individual score entity, candidate content, context assembly, model answer, or quality-evaluation conclusion.
      ja: 初期 candidate generation、offline index construction、個別 score entity、candidate content、context assembly、model answer、quality-evaluation conclusion。
  semantic_kind: activity
  aliases: [candidate ranking, retrieval post-processing, 检索精排]
engineering:
  explanation:
    zh: Elasticsearch 的 RRF 将多个 retriever 的结果组合为统一排序，表明排序活动可在候选召回之后独立存在。Moonweave 将该类活动记录为输入候选集与输出排序之间的可审计执行。
    en: Elasticsearch RRF combines results from multiple retrievers into one ranking, showing that a ranking activity can exist separately after candidate recall. Moonweave records such activity as an auditable execution between input candidate set and ranked output.
    ja: Elasticsearch RRF は複数 retriever の結果を一つの ranking に組み合わせ、ranking activity が candidate recall の後に独立して存在できることを示します。Moonweave はこの activity を input candidate set と ranked output の間の audit 可能な execution として記録します。
  typical_input:
    - description: Candidate set and ranking method
      format: |
        {
          "input_candidate_set_ref": "candidate-set-support-18",
          "ranking_method_ref": "rrf-k60-v1"
        }
  typical_output:
    - description: Ranked retrieval-result record
      format: |
        {
          "ranking_operation_id": "ranking-18",
          "retrieval_activity_id": "retrieval-activity-support-18",
          "request_ref": "retrieval-request-support-18",
          "input_candidate_set_ref": "candidate-set-support-18",
          "ranking_method_ref": "rrf-k60-v1",
          "implementation_ref": "elasticsearch-rrf-v1",
          "output_result_ref": "retrieval-result-support-18",
          "started_at": "2026-07-19T01:00:01Z",
          "ranking_status": "completed",
          "execution_status": "completed"
        }
  reference_implementations:
    - name: Elasticsearch reciprocal rank fusion
      url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
      description: Documents combining independently executed retrievers into a ranked result.
structure:
  identity_keys: [ranking_operation_id]
  fields:
    - id: ranking_operation_id
      labels: {zh: 排序操作标识, en: ranking operation ID, ja: ランキング操作 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际候选排序执行，不能复用为候选集、结果或分数标识。
        en: Identifies one actual candidate-ranking execution and is not reused as candidate-set, result, or score ID.
        ja: 一回の実際の candidate-ranking execution を識別し、candidate-set、result、score ID として再利用しません。
      allowed_values: []
      pattern: "^ranking-[A-Za-z0-9._-]+$"
      example_value: ranking-18
      source_claims: [claim-ranking-operation-rrf]
    - id: input_candidate_set_ref
      labels: {zh: 输入候选集引用, en: input candidate set reference, ja: input candidate set 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次排序实际消费的候选集，而非由最终结果反推的相似候选。
        en: Points to CandidateSet actually consumed by this ranking and cannot be inferred from similar candidates in final result.
        ja: この ranking が実際に消費した CandidateSet を指し、final result の似た candidate から推論することはできません。
      allowed_values: []
      pattern: "^candidate-set-[A-Za-z0-9._-]+$"
      example_value: candidate-set-support-18
      source_claims: [claim-ranking-operation-provenance]
    - id: ranking_method_ref
      labels: {zh: 排序方法引用, en: ranking method reference, ja: ranking method 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次执行采用的评分、融合、重排或选择方法版本，不是某个候选的数值分数。
        en: Points to scoring, fusion, rerank, or selection method revision used by this execution and is not one candidate's numeric score.
        ja: この execution が使った scoring、fusion、rerank、selection method revision を指し、一つの candidate の数値 score ではありません。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: rrf-k60-v1
      source_claims: [claim-ranking-operation-rrf]
    - id: output_result_ref
      labels: {zh: 输出检索结果引用, en: output retrieval result reference, ja: output retrieval result 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向由该排序生成或更新的 RetrievalResult，不等同于最终模型上下文或回答。
        en: Points to RetrievalResult generated or updated by this ranking and is not final model context or answer.
        ja: この ranking が生成または更新した RetrievalResult を指し、final model context や answer ではありません。
      allowed_values: []
      pattern: "^retrieval-result-[A-Za-z0-9._-]+$"
      example_value: retrieval-result-support-18
      source_claims: [claim-ranking-operation-provenance]
    - id: ranking_status
      labels: {zh: 排序状态, en: ranking status, ja: ランキング status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示此排序是否完成、失败、取消或部分完成，不等同于结果相关性评价。
        en: Indicates whether this ranking completed, failed, was cancelled, or partially completed and is not a relevance evaluation of result.
        ja: この ranking が completed、failed、cancelled、partial のどれかを示し、result の relevance evaluation ではありません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-ranking-operation-provenance]
    - id: retrieval_activity_id
      labels:
        zh: 检索活动标识
        en: retrieval activity ID
        ja: retrieval activity ID
      definitions:
        zh: 标识同一候选排序执行的通用检索活动身份，不复用为候选集、结果或分数标识。
        en: Identifies the same candidate-ranking execution as a general retrieval activity and is not reused as a candidate-set, result, or score ID.
        ja: 同じ candidate-ranking execution を一般の retrieval activity として識別し、candidate-set、result、score ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-activity-[A-Za-z0-9._-]+$'
      example_value: retrieval-activity-ranking-18
      source_claims: [claim-ranking-operation-subtype]
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: request 参照
      definitions:
        zh: 指向本次排序实际服务的 RetrievalRequest，不从最终排序结果或候选相似性反推。
        en: Points to the RetrievalRequest actually served by this ranking and is not inferred from its final output or candidate similarity.
        ja: この ranking が実際に処理した RetrievalRequest を指し、最終 output や candidate similarity から推論しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-request-[A-Za-z0-9._-]+$'
      example_value: retrieval-request-support-18
      source_claims: [claim-ranking-operation-provenance]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: implementation reference
        ja: implementation 参照
      definitions:
        zh: 指向执行排序方法的检索或排序实现版本，不等同于候选的数值分数。
        en: Points to the retrieval or ranking implementation revision that executes the ranking method and is not a candidate's numeric score.
        ja: ranking method を実行する retrieval または ranking implementation revision を指し、candidate の数値 score ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-impl-[A-Za-z0-9._-]+$'
      example_value: retrieval-impl-rrf-v1
      source_claims: [claim-ranking-operation-provenance]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录排序检索活动开始的时间，不能由候选集生成时间或结果发布时间替代。
        en: Records when this ranking retrieval activity began and cannot be substituted by candidate-set generation or result-publication time.
        ja: この ranking retrieval activity の開始時刻を記録し、candidate-set 生成時刻や result 公開時刻では代替できない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-19T03:20:00Z'
      source_claims: [claim-ranking-operation-provenance]
    - id: execution_status
      labels:
        zh: 执行状态
        en: execution status
        ja: execution status
      definitions:
        zh: 提供排序活动的粗粒度运行、完成或失败状态；详细取消和部分完成语义由 ranking_status 保留。
        en: Provides coarse running, completed, or failed status for the ranking activity while ranking_status retains cancellation and partial-completion detail.
        ja: ranking activity の coarse な running、completed、failed 状態を示し、cancelled と partial の詳細は ranking_status に保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [running, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-ranking-operation-provenance]
  constraints:
    - id: ranking-operation-inherits-retrieval-activity-fields
      severity: error
      expression_language: plain
      expression: RankingOperation is one RetrievalActivity record. retrieval_activity_id and ranking_operation_id must resolve to that same execution; request_ref must agree with the request of input_candidate_set_ref; implementation_ref implements ranking_method_ref; and execution_status is the coarse lifecycle projection of ranking_status, not a second parent activity.
      explanation:
        zh: 排序操作是检索活动的种差；其专用排序身份、方法和细粒度状态在同一活动记录上细化父契约。
        en: A ranking operation is a retrieval-activity specialization; its ranking identity, method, and detailed status refine the parent contract on the same activity record.
        ja: ranking operation は retrieval activity の特殊化であり、ranking identity、method、詳細 status は同じ activity record 上で親契約を細化する。
      source_claims: [claim-ranking-operation-subtype, claim-ranking-operation-provenance]
    - id: ranking-operation-input-output-provenance
      severity: error
      expression_language: plain
      expression: input_candidate_set_ref, ranking_method_ref, output_result_ref, and ranking_status are required. A completed operation must create or update output_result_ref from the stated input set; a failed operation must not claim a completed ordering.
      explanation:
        zh: 排序输出必须能关联到实际输入和方法，不能由主题相似或同一索引快照推测。
        en: Ranking output must connect to actual input and method and cannot be guessed from topic similarity or same index snapshot.
        ja: ranking output は実際の input と method に結び付ける必要があり、topic similarity や同じ index snapshot から推測できません。
      source_claims: [claim-ranking-operation-provenance]
    - id: ranking-operation-not-selection-or-answer
      severity: error
      expression_language: plain
      expression: RankingOperation must not assert candidate recall, source authorization, ContextPackage inclusion, answer correctness, or model visibility. Those facts require CandidateGenerationActivity, policy evaluation, ContextAssembly, or answer evaluation.
      explanation:
        zh: 排序只表达候选相对顺序或选择边界；它不替代召回、治理、上下文装配或回答判断。
        en: Ranking expresses candidate relative order or selection boundary only; it does not replace recall, governance, context assembly, or answer judgment.
        ja: ranking は candidate relative order または selection boundary だけを表し、recall、governance、context assembly、answer judgment の代替ではありません。
      source_claims: [claim-ranking-operation-boundary]
  required_relations: []
examples:
  - id: ranking-operation-example-positive

    labels: {zh: 对候选集执行 RRF 排序, en: RRF ranking over a candidate set, ja: candidate set に対する RRF ranking}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      ranking_operation_id: ranking-18
      retrieval_activity_id: retrieval-activity-support-18
      request_ref: retrieval-request-support-18
      input_candidate_set_ref: candidate-set-support-18
      ranking_method_ref: rrf-k60-v1
      implementation_ref: ranking-impl-rrf-k60-v1
      output_result_ref: retrieval-result-support-18
      started_at: "2026-07-19T01:00:01Z"
      ranking_status: completed
      execution_status: completed
    related_node_ids: [RankingOperation, RetrievalActivity, CandidateSet, RetrievalResult]
    related_relation_ids: [RankingOperation-is_a-RetrievalActivity, RankingOperation-uses-CandidateSet, RankingOperation-generates-RetrievalResult]

    source_claims: [claim-ranking-operation-rrf, claim-ranking-operation-provenance]
  - id: ranking-operation-example-counterexample-index-build

    labels: {zh: 写入索引而非排序, en: Index write rather than ranking, ja: ranking ではない index write}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      operation_kind: index_add
      input_candidate_set_ref: null
      ranking_method_ref: null
      output_result_ref: null
    related_node_ids: [RankingOperation]
    related_relation_ids: []

    source_claims: [claim-ranking-operation-boundary]
  - id: ranking-operation-example-boundary-candidate-recall

    labels: {zh: 初始候选召回, en: Initial candidate recall, ja: 初期 candidate recall}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      candidate_generation_activity_id: candidate-generation-18
      candidate_set_ref: candidate-set-support-18
      ranking_method_ref: null
      output_result_ref: null
    related_node_ids: [RankingOperation, CandidateGenerationActivity]
    related_relation_ids: []

    source_claims: [claim-ranking-operation-boundary]
  - id: ranking-operation-example-instance-elasticsearch

    labels: {zh: 实例：Elasticsearch RRF, en: "Instance: Elasticsearch RRF", ja: "事例：Elasticsearch RRF"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values:
      ranking_operation_id: ranking-rrf-21
      retrieval_activity_id: retrieval-activity-hybrid-21
      request_ref: retrieval-request-hybrid-21
      input_candidate_set_ref: candidate-set-hybrid-21
      ranking_method_ref: elasticsearch-rrf-v1
      implementation_ref: elasticsearch-rrf-v1
      output_result_ref: retrieval-result-hybrid-21
      started_at: "2026-07-19T02:00:01Z"
      ranking_status: completed
      execution_status: completed
    related_node_ids: [RankingOperation, RankFusion, CandidateSet, RetrievalResult]
    related_relation_ids: [RankingOperation-is_a-RetrievalActivity]
    source_claims: [claim-ranking-operation-rrf]
parent_relation:
  id: RankingOperation-is_a-RetrievalActivity
  predicate: is_a
  target: concept:RetrievalActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是检索活动的排序子类
    en: is a ranking subtype of retrieval activity
    ja: RetrievalActivity のランキング下位型である
  definitions:
    zh: RankingOperation is_a RetrievalActivity，表示每个排序操作都是检索阶段活动；它对已存在候选的顺序或选择边界操作。
    en: RankingOperation is_a RetrievalActivity means every ranking operation is retrieval-stage activity that operates on order or selection boundary of candidates already present.
    ja: RankingOperation is_a RetrievalActivity は、すべての ranking operation が既存 candidate の order または selection boundary を操作する retrieval-stage activity であることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不限制一个请求可以有多少个排序阶段。
    en: Classification does not prescribe how many ranking stages one request may have.
    ja: 分類関係は一つの request が持ち得る ranking stage 数を規定しません。
  inverse_reading:
    predicate: has_ranking_operation_subtype
    labels: {zh: 具有排序操作子类, en: has ranking-operation subtype, ja: ランキング操作下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-ranking-operation-subtype]
  distinct_fact_rationale:
    zh: 此关系表达活动类型归属，不表达候选生成、特定分数、融合参数、最终上下文选择或回答质量。
    en: This relation expresses activity type membership, not candidate generation, a particular score, fusion parameters, final context selection, or answer quality.
    ja: この関係は activity type membership を表し、candidate generation、特定 score、fusion parameter、final context selection、answer quality は表しません。
  layout_role: primary-backbone
relations:
  - id: RankingOperation-uses-CandidateSet
    predicate: uses
    target: concept:CandidateSet
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用候选集, en: uses candidate set, ja: candidate set を使用する}
    definitions:
      zh: 仅当 input_candidate_set_ref 指向目标且排序活动实际读取其成员和顺序信息时，排序操作使用该候选集。
      en: A ranking operation uses a CandidateSet only when input_candidate_set_ref identifies it and the activity actually reads its members and ordering information.
      ja: input_candidate_set_ref が対象を識別し、activity が member と ordering information を実際に読み取った場合にだけ、ranking operation は CandidateSet を使用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 融合操作可以使用多个候选列表；具体输入清单由运行记录表达。
      en: Fusion may use multiple candidate lists; concrete input list is expressed by run record.
      ja: fusion は複数 candidate list を使用でき、具体的 input list は run record で表します。
    inverse_reading:
      predicate: is_used_by_ranking_operation
      labels: {zh: 被排序操作使用, en: is used by ranking operation, ja: ランキング操作に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-ranking-operation-provenance]
    distinct_fact_rationale: "This records concrete candidate-set use rather than subtype membership or final answer selection."
    layout_role: cross-link
  - id: RankingOperation-generates-RetrievalResult
    predicate: generates
    target: concept:RetrievalResult
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成排序检索结果, en: generates ranked retrieval result, ja: ランク付けされた retrieval result を生成する}
    definitions:
      zh: 仅当 output_result_ref 指向目标且排序操作完成产生或更新排序输出时，排序操作生成该结果。
      en: A ranking operation generates a RetrievalResult only when output_result_ref identifies it and the operation completed producing or updating ranked output.
