schema: moonweave.ai/ontology-node/v1
id: RankingOperation
kind: concept
status: accepted
labels:
  zh: 排序操作
  en: Ranking operation
  ja: 順位付け操作
semantics:
  short_definition:
    zh: 对既有候选集合计算、组合或裁剪顺序的检索活动。
    en: A retrieval activity that scores, combines, or truncates the ordering of an existing candidate set.
    ja: 既存candidate setの順序を採点・結合・切詰めするretrieval activityです。
  definition:
    zh: RankingOperation 是以既有 CandidateSet 为输入并改变其分数解释、相对顺序或保留范围的活动上位概念；它覆盖评分、融合、重排与 TopK，但不负责从索引首次召回候选。
    en: RankingOperation is the activity superclass for operations that consume an existing CandidateSet and change its score interpretation, relative order, or retained range. It covers scoring, fusion, reranking, and TopK selection, but not first-stage recall from an index.
    ja: RankingOperation は既存CandidateSetをconsumeしscore解釈・相対順序・保持範囲を変えるactivity上位概念です。scoring・fusion・reranking・TopKを含みfirst-stage recallは含みません。
  why_needed:
    zh: 为多种排序机制建立共同父节点，同时保留各机制的不同输入、输出和语义。
    en: Gives ranking mechanisms a shared parent while preserving their distinct inputs, outputs, and semantics.
    ja: ranking機構に共通parentを与えつつ各入力・出力・意味の違いを保持します。
  includes:
    - zh: 纳入对已生成候选执行评分、融合、重排和截断的有身份活动。
      en: Includes identified activities that score, fuse, rerank, or truncate already generated candidates.
      ja: 生成済candidateをscore・fuse・rerank・truncateするidentity付きactivityを含みます。
  excludes:
    - zh: 排除候选生成、请求对象、结果对象、静态排序配置和上下文采用决策。
      en: Excludes candidate generation, request and result objects, static ranking configuration, and context-admission decisions.
      ja: candidate generation・request/result object・static ranking configuration・context admission decisionを除外します。
  semantic_kind: activity
  aliases: []
structure:
