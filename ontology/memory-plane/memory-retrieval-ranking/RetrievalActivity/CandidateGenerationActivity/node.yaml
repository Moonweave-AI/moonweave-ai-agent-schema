schema: moonweave.ai/ontology-node/v1
id: CandidateGenerationActivity
kind: concept
labels:
  zh: 候选生成
  en: Candidate generation
  ja: 候補生成
semantics:
  short_definition:
    zh: 从索引召回初始候选的首阶段活动。
    en: First-stage activity that recalls initial candidates from an index.
    ja: 索引から initial candidate を recall する first-stage activity。
  definition:
    zh: CandidateGenerationActivity 读取声明的 IndexVersion，按 RetrievalQuery 与可选 RetrievalFilter 调用 Mem0 search、Pinecone index.query、Chroma collection.query 或 LangGraph store.search 生成 CandidateSet；职责止于召回，不做 RRF 融合、Cohere rerank 或 ContextPackage 采用。
    en: CandidateGenerationActivity reads a declared IndexVersion and invokes Mem0 search, Pinecone index.query, Chroma collection.query, or LangGraph store.search for a RetrievalQuery and optional RetrievalFilter to produce a CandidateSet. It stops at recall and does not perform RRF fusion, Cohere rerank, or ContextPackage admission.
    ja: CandidateGenerationActivity は IndexVersion を read し RetrievalQuery/任意 RetrievalFilter で Mem0 search・Pinecone index.query・Chroma collection.query・LangGraph store.search を呼び CandidateSet を生成。recall で終わり RRF/Cohere rerank/ContextPackage 採用は行いません。
  why_needed:
    zh: 需要把“从索引拿候选”与后面的打分、融合、重排和截断分开，否则无法解释 Pinecone top_k=40 与最终返回 5 条之间的阶段差异。
    en: Recall must stay separate from later scoring, fusion, reranking, and truncation; otherwise the gap between Pinecone top_k=40 and five returned rows cannot be explained.
    ja: 索引からの recall を後段 scoring/fusion/rerank/truncation と分離しないと Pinecone top_k=40 と最終 5 件の差を説明できません。
  includes:
    - zh: 纳入向量、词汇或 hybrid 检索器对索引执行的首阶段召回。
      en: Includes first-stage recall by vector, lexical, or hybrid retrievers over an index.
      ja: vector/lexical/hybrid retriever による first-stage recall を含みます。
  excludes:
    - zh: 排除 RRF 融合、Cohere rerank、Top-K 截断与上下文采用。
      en: Excludes RRF fusion, Cohere rerank, Top-K truncation, and context admission.
      ja: RRF fusion・Cohere rerank・Top-K truncation・context admission を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Pinecone index.query 的 top_k、Chroma collection.query 的 n_results、Mem0 search 的 top_k 与 LangGraph store.search 的 limit 到 requested_limit；retrieval_method 记录 dense/sparse/hybrid。
    en: Map Pinecone index.query top_k, Chroma collection.query n_results, Mem0 search top_k, and LangGraph store.search limit to requested_limit; retrieval_method records dense/sparse/hybrid.
    ja: Pinecone top_k、Chroma n_results、Mem0 top_k、LangGraph limit を requested_limit に写像。retrieval_method は dense/sparse/hybrid を記録。
  typical_input:
    - description: Pinecone dense recall
      format: 'index.query(vector=[...], top_k=40, namespace="tenant-7-user-alice", filter={"category": {"$eq": "preferences"}})'
      source_claims:
        - claim-candidate-generation-pinecone
  typical_output:
    - description: Initial CandidateSet reference
      format: '{ "generation_activity_id": "candidate-generation-412", "retrieval_method": "dense-vector", "requested_limit": 40 }'
      source_claims:
        - claim-candidate-generation-design
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/ with query, entity IDs, filters, and top_k.
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query with vector, namespace, filter, and top_k.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query with query_texts or query_embeddings and n_results.
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search with namespace prefix and semantic query.
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank with model rerank-v3.x, query, documents, top_n.
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: Late interaction retrieval via token-level MaxSim scoring.
structure:
  identity_keys:
    - generation_activity_id
  fields:
    - id: generation_activity_id
      labels:
        zh: 生成活动标识
        en: Generation activity identifier
        ja: 生成 activity 識別子
      definitions:
        zh: 稳定标识一次候选生成阶段。
        en: Stable identifier for one candidate-generation stage.
        ja: 一 candidate-generation stage を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-generation-412
      allowed_values: []
      source_claims:
        - claim-candidate-generation-id
    - id: retrieval_method
      labels:
        zh: 检索方法
        en: Retrieval method
        ja: 検索方式
      definitions:
        zh: 记录该阶段检索器类别：dense-vector、sparse-lexical、hybrid、mem0-semantic 等。
        en: "Records retriever family: dense-vector, sparse-lexical, hybrid, mem0-semantic, etc."
        ja: dense-vector/sparse-lexical/hybrid/mem0-semantic 等 retriever 类别。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: dense-vector
      allowed_values: []
      source_claims:
        - claim-candidate-generation-method
    - id: requested_limit
      labels:
        zh: 请求上限
        en: Requested limit
        ja: 要求上限
      definitions:
        zh: 对应 Pinecone top_k、Chroma n_results、Mem0 top_k、LangGraph limit。
        en: Maps to Pinecone top_k, Chroma n_results, Mem0 top_k, or LangGraph limit.
        ja: Pinecone top_k・Chroma n_results・Mem0 top_k・LangGraph limit に対応。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 40
      allowed_values: []
      source_claims:
        - claim-candidate-generation-limit
  constraints: []
  required_relations: []
examples:
  - id: CandidateGenerationActivity-example-pinecone
    labels:
      zh: Pinecone 稠密召回
      en: Pinecone dense recall
      ja: Pinecone dense recall
    descriptions:
      zh: generation-412 对 index-v19 执行 index.query(top_k=40) 并产生 40 个 Pinecone ScoredVector 候选。
      en: generation-412 runs index.query(top_k=40) on index-v19 and produces 40 Pinecone ScoredVector candidates.
      ja: generation-412 が index-v19 で index.query(top_k=40) を実行し 40 ScoredVector 候補を生成。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: index.query top_k=40
    field_values:
      generation_activity_id: candidate-generation-412
      retrieval_method: dense-vector
      requested_limit: 40
      namespace: tenant-7-user-alice
    related_node_ids:
      - CandidateGenerationActivity
      - CandidateSet
    related_relation_ids: []
    source_claims:
      - claim-candidate-generation-pinecone
      - claim-candidate-generation-design
  - id: CandidateGenerationActivity-example-chroma
    labels:
      zh: Chroma 文本查询召回
      en: Chroma text query recall
      ja: Chroma テキストクエリ recall
    descriptions:
      zh: generation-413 调用 collection.query(query_texts=[...], n_results=20, where={"user_id":"alice"}) 生成初始候选。
      en: generation-413 calls collection.query(query_texts=[...], n_results=20, where={"user_id":"alice"}) for initial candidates.
      ja: generation-413 が collection.query(n_results=20) で initial candidate を生成。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: collection.query
    field_values:
      generation_activity_id: candidate-generation-413
      retrieval_method: dense-vector
      requested_limit: 20
      collection: agent_memories_alice
    related_node_ids:
      - CandidateGenerationActivity
    related_relation_ids: []
    source_claims:
      - claim-candidate-generation-chroma
  - id: CandidateGenerationActivity-example-mem0
    labels:
      zh: Mem0 hybrid 召回
      en: Mem0 hybrid recall
      ja: Mem0 hybrid recall
    descriptions:
      zh: generation-414 调用 Mem0 POST /v1/memories/search/(query=..., top_k=5, user_id=alice) 在实体作用域内召回记忆。
      en: generation-414 calls Mem0 POST /v1/memories/search/ with top_k=5 and user_id=alice for entity-scoped recall.
      ja: generation-414 が Mem0 search(top_k=5, user_id=alice) で entity 作用域 recall。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/search/
    field_values:
      generation_activity_id: candidate-generation-414
      retrieval_method: mem0-hybrid
      requested_limit: 5
      user_id: alice
    related_node_ids:
      - CandidateGenerationActivity
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-candidate-generation-mem0
  - id: CandidateGenerationActivity-example-langgraph
    labels:
      zh: LangGraph store.search 召回
      en: LangGraph store.search recall
      ja: LangGraph store.search recall
    descriptions:
      zh: generation-415 对 namespace ("tenant-7","user-42") 执行 store.search(limit=10) 返回匹配 Item。
      en: generation-415 runs store.search(limit=10) on namespace ("tenant-7","user-42") returning matching Items.
      ja: generation-415 が store.search(limit=10) で matching Item を返却。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.search
    field_values:
      generation_activity_id: candidate-generation-415
      retrieval_method: langgraph-semantic
      requested_limit: 10
    related_node_ids:
      - CandidateGenerationActivity
    related_relation_ids: []
    source_claims:
      - claim-candidate-generation-langgraph
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query with vector, namespace, filter, top_k.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: collection.query with query_texts, n_results, where filter.
  - id: src-mem0-search
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: POST /v1/memories/search/ with query, entity IDs, filters, top_k.
  - id: src-langgraph-search
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore.search semantic query over namespace prefix.
  - id: src-memory-retrieval-design
    title: Moonweave memory-retrieval-ranking module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates retrieval stages, scores, results, and context admission.
source_claims:
  - id: claim-candidate-generation-pinecone
    source: src-pinecone-query
    supports: Pinecone index.query top_k controls first-stage candidate count.
    locator: index.query parameters
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-generation-chroma
    source: src-chroma-query
    supports: Chroma collection.query n_results controls recall size.
    locator: collection.query
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-generation-mem0
    source: src-mem0-search
    supports: Mem0 search top_k limits hybrid semantic recall.
    locator: Search API
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-generation-langgraph
    source: src-langgraph-search
    supports: LangGraph store.search limit bounds semantic recall.
    locator: BaseStore.search
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-generation-design
    source: src-memory-retrieval-design
    supports: CandidateGenerationActivity stops at recall before ranking stages.
    locator: module boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-generation-id
    source: src-memory-retrieval-design
    supports: generation_activity_id identifies one recall stage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-generation-method
    source: src-memory-retrieval-design
    supports: retrieval_method records the retriever family used.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-generation-limit
    source: src-pinecone-query
    supports: requested_limit maps to API top_k/n_results/limit parameters.
    locator: API parameters
    evidence_kind: primary-api
    confidence: high
parent_relation:
  id: CandidateGenerationActivity-is_a-RetrievalActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalActivity
    en: is a RetrievalActivity
    ja: RetrievalActivityの一種
  definitions:
    zh: CandidateGenerationActivity —is_a→ RetrievalActivity 成立，因为它从查询、过滤器与索引版本产生初始 CandidateSet，职责止于召回。
    en: CandidateGenerationActivity —is_a→ RetrievalActivity holds because it produces an initial CandidateSet from query, filter, and index version and stops at recall.
    ja: CandidateGenerationActivity —is_a→ RetrievalActivity はquery・filter・index versionからinitial CandidateSetを生成し責務がrecallで終わるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: CandidateGenerationActivity-is_a-RetrievalActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it produces an initial CandidateSet from query, filter, and index version and stops at recall."
      explanations:
        zh: 仅当实例既满足 RetrievalActivity 的完整定义，又满足子类种差“它从查询、过滤器与索引版本产生初始 CandidateSet，职责止于召回。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it produces an initial CandidateSet from query, filter, and index version and stops at recall."
        ja: instanceがRetrievalActivity完全定義とchild differentia「query・filter・index versionからinitial CandidateSetを生成し責務がrecallで終わる」を共に満たす時だけassertします。
      source_claims:
        - claim-candidate-generation-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CandidateGenerationActivity-is_a-RetrievalActivity-example-positive-manual-001
      labels:
        zh: 是一种RetrievalActivity正例
        en: "Positive case: is a RetrievalActivity"
        ja: RetrievalActivityの一種正例
      descriptions:
        zh: generation-412 从 index-v19 召回 80 个候选。
        en: generation-412 recalls 80 candidates from index-v19.
        ja: generation-412がindex-v19から80候補をrecallします。
      field_values: {}
      related_node_ids:
        - CandidateGenerationActivity
        - RetrievalActivity
      related_relation_ids:
        - CandidateGenerationActivity-is_a-RetrievalActivity
      source_claims:
        - claim-candidate-generation-design
    - id: CandidateGenerationActivity-is_a-RetrievalActivity-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalActivity边界例
        en: "Boundary case: is a RetrievalActivity"
        ja: RetrievalActivityの一種境界例
      descriptions:
        zh: fusion-415 组合已有列表，不生成初始候选。
        en: fusion-415 combines existing lists and does not generate initial candidates.
        ja: fusion-415は既存listを結合しinitial candidateを生成しません。
      field_values: {}
      related_node_ids:
        - CandidateGenerationActivity
        - RetrievalActivity
      related_relation_ids:
        - CandidateGenerationActivity-is_a-RetrievalActivity
      source_claims:
        - claim-candidate-generation-design
  source_claims:
    - claim-candidate-generation-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CandidateGenerationActivity-produces-CandidateSet
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces CandidateSet
      en: produces CandidateSet
      ja: CandidateSetをproduces
    definitions:
      zh: CandidateGenerationActivity —produces→ CandidateSet 表示该初始候选集合是此候选生成阶段对查询、过滤器和索引求值后的直接输出。
      en: CandidateGenerationActivity —produces→ CandidateSet states that the initial candidate set is the direct output of evaluating query, filter, and index in this generation stage.
      ja: CandidateGenerationActivity —produces→ CandidateSet はinitial candidate setがこのgeneration stageでquery・filter・indexを評価した直接outputです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_produces
      labels:
        zh: 反向读取
        en: inverse produces
        ja: 逆方向読取
    conditions:
      - id: CandidateGenerationActivity-produces-CandidateSet-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when CandidateSet is marked as the initial-recall stage and its generation lineage points to this activity.
        explanations:
          zh: 仅当 CandidateSet 的 stage_name 标为初始召回且生成血缘指向该活动时建立。
          en: Assert only when CandidateSet is marked as the initial-recall stage and its generation lineage points to this activity.
          ja: CandidateSetがinitial-recall stageでgeneration lineageがこのactivityを指す時だけassertします。
        source_claims:
          - claim-candidate-generation-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CandidateGenerationActivity-produces-CandidateSet-example-positive-manual-001
        labels:
          zh: produces CandidateSet正例
          en: "Positive case: produces CandidateSet"
          ja: CandidateSetをproduces正例
        descriptions:
          zh: generation-412 produces candidate-set-initial-412。
          en: generation-412 produces candidate-set-initial-412.
          ja: generation-412がcandidate-set-initial-412を生成します。
        field_values: {}
        related_node_ids:
          - CandidateGenerationActivity
          - CandidateSet
        related_relation_ids:
          - CandidateGenerationActivity-produces-CandidateSet
        source_claims:
          - claim-candidate-generation-design
      - id: CandidateGenerationActivity-produces-CandidateSet-example-boundary-manual-001
        labels:
          zh: produces CandidateSet边界例
          en: "Boundary case: produces CandidateSet"
          ja: CandidateSetをproduces境界例
        descriptions:
          zh: 重排后的集合不能直接归为候选生成输出。
          en: A post-rerank set is not directly produced by candidate generation.
          ja: post-rerank setをcandidate generation direct outputとしません。
        field_values: {}
        related_node_ids:
          - CandidateGenerationActivity
          - CandidateSet
        related_relation_ids:
          - CandidateGenerationActivity-produces-CandidateSet
        source_claims:
          - claim-candidate-generation-design
    source_claims:
      - claim-candidate-generation-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateSet
