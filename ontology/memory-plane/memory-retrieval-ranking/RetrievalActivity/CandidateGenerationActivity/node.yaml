schema: moonweave.ai/ontology-node/v1
id: CandidateGenerationActivity
kind: concept
status: accepted
labels:
  zh: 候选生成
  en: Candidate generation
  ja: 候補生成
semantics:
  short_definition:
    zh: 从查询、过滤条件和索引版本产生初始候选集合的检索阶段。
    en: A retrieval stage that produces an initial candidate set from a query, filter, and index version.
    ja: query・filter・index versionからinitial candidate setを生成するretrieval stageです。
  definition:
    zh: CandidateGenerationActivity 是读取一个已声明 IndexVersion，并按 RetrievalQuery 与可选 RetrievalFilter 生成 CandidateSet 的活动；它决定召回范围，不负责跨列表融合、语义重排或上下文采用。
    en: CandidateGenerationActivity reads a declared IndexVersion and produces a CandidateSet for a RetrievalQuery and optional RetrievalFilter. It establishes recall scope but does not perform list fusion, semantic reranking, or context admission.
    ja: CandidateGenerationActivity は指定IndexVersionを読みRetrievalQueryと任意RetrievalFilterからCandidateSetを生成します。recall範囲を決めますがlist fusion・semantic reranking・context admissionは行いません。
  why_needed:
    zh: 把“取得候选”与后续评分、融合、重排和 TopK 分开。
    en: Separates obtaining candidates from later scoring, fusion, reranking, and TopK selection.
    ja: candidate取得を後続scoring・fusion・reranking・TopK selectionから分離します。
  includes:
    - zh: 纳入向量、词汇或其他检索器对索引执行的首阶段召回。
      en: Includes first-stage recall by vector, lexical, or other retrievers over an index.
      ja: vector・lexical等retrieverによるindex上のfirst-stage recallを含みます。
  excludes:
    - zh: 排除仅计算分数、合并已排序列表、重排已有候选或选择上下文的活动。
      en: Excludes activities that only score, fuse existing ranked lists, rerank candidates, or select context.
      ja: score計算のみ・既存ranked list融合・candidate再順位付け・context選択を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - generation_activity_id
  fields:
    - id: generation_activity_id
      labels:
        zh: 生成活动标识
        en: generation activity ID
        ja: generation activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次候选生成阶段。
        en: Stable identifier for one candidate-generation stage.
        ja: 一つのcandidate-generation stageを安定識別します。
      allowed_values: []
      pattern: null
      example_value: candidate-generation-412
      source_claims:
        - claim-candidate-generation-activity-002
    - id: retrieval_method
      labels:
        zh: 检索方法
        en: retrieval method
        ja: 検索方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该阶段使用的检索器或方法类别。
        en: Records the retriever or method family used by the stage.
        ja: stageが使うretrieverまたはmethod familyを記録します。
      allowed_values: []
      pattern: null
      example_value: dense-vector
      source_claims:
        - claim-candidate-generation-activity-003
    - id: requested_limit
      labels:
        zh: 请求上限
        en: requested limit
        ja: 要求上限
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该候选生成阶段请求的最大候选数量。
        en: Maximum number of candidates requested from this generation stage.
        ja: このgeneration stageで要求する最大candidate数です。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims:
        - claim-candidate-generation-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: CandidateGenerationActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 候选生成正例
      en: "Positive case: Candidate generation"
      ja: 候補生成正例
    scenario_id: null
    descriptions:
      zh: generation-412 对 index-v19 执行稠密向量召回并产生 80 个初始候选。
      en: generation-412 performs dense-vector recall on index-v19 and produces 80 initial candidates.
      ja: generation-412 はindex-v19でdense-vector recallを行い80件のinitial candidateを生成します。
    field_values:
      generation_activity_id: candidate-generation-412
      retrieval_method: dense-vector
      requested_limit: 80
      activity_id: candidate-generation-412
      started_at: 2026-07-16T12:00:00Z
    related_node_ids:
      - CandidateGenerationActivity
    related_relation_ids: []
    expected_result:
      zh: 归类为 CandidateGenerationActivity。
      en: Classify the object as CandidateGenerationActivity.
      ja: CandidateGenerationActivity として分類します。
    why_valid_or_invalid:
      zh: 输入是查询/索引，输出是首阶段候选集合，职责止于召回。
      en: Its inputs are query and index, its output is a first-stage candidate set, and its responsibility stops at recall.
      ja: inputはquery/index、outputはfirst-stage candidate setで責務はrecallまでです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-generation-activity-005
  - id: CandidateGenerationActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 候选生成边界例
      en: "Boundary case: Candidate generation"
      ja: 候補生成境界例
    scenario_id: null
    descriptions:
      zh: rerank-412 重新评估已有 80 个候选并输出前 12 个。
      en: rerank-412 rescales an existing set of 80 candidates and returns 12.
      ja: rerank-412 は既存80候補を再評価し12件を返します。
    field_values: {}
    related_node_ids:
      - CandidateGenerationActivity
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 CandidateGenerationActivity。
      en: Do not classify the object as CandidateGenerationActivity.
      ja: CandidateGenerationActivity として分類しません。
    why_valid_or_invalid:
      zh: 它消费已有候选，属于重排而非候选生成。
      en: It consumes existing candidates, so it is reranking rather than candidate generation.
      ja: 既存candidateをconsumeするためcandidate generationでなくrerankingです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-generation-activity-006
