schema: moonweave.ai/ontology-node/v1
id: RetrievalRun
kind: concept
status: accepted
labels:
  zh: 检索运行
  en: Retrieval Run
  ja: 検索実行
semantics:
  short_definition:
    zh: 针对一个确定 RetrievalRequest 实际执行候选生成及可选排序阶段、并产生检索结果或失败事实的 RetrievalActivity 子类。
    en: A RetrievalActivity subtype that actually executes candidate generation and optional ranking stages for one determinate RetrievalRequest and produces result or failure fact.
    ja: 一つの確定済み RetrievalRequest に対して candidate generation と任意の ranking stage を実際に実行し、result または failure fact を生成する RetrievalActivity の下位型。
  definition:
    zh: >
      RetrievalRun 是一次有时间边界的检索执行。它消费一个 RetrievalRequest，记录实际候选生成及后续排序活动，
      并产生一个 RetrievalResult、部分结果或失败事实。它不是请求契约、候选或结果实体、索引构建、上下文装配、
      模型调用或诊断追踪记录。RetrievalTrace 可以由该运行生成，但追踪仍是独立的信息实体而非该活动的子类。
    en: >
      RetrievalRun is one time-bounded retrieval execution. It consumes a RetrievalRequest, records actual candidate
      generation and subsequent ranking activities, and produces RetrievalResult, partial result, or failure fact.
      It is not request contract, candidate or result entity, index construction, context assembly, model invocation,
      or diagnostic trace record. A RetrievalTrace may be generated by this run, but trace remains a separate
      information entity rather than subtype of activity.
    ja: >
      RetrievalRun は一回の時間境界を持つ retrieval execution です。RetrievalRequest を消費し、実際の candidate
      generation と後続 ranking activity を記録し、RetrievalResult、partial result、または failure fact を生成します。
      request contract、candidate や result entity、index construction、context assembly、model invocation、診断 trace
      record ではありません。RetrievalTrace はこの run により生成され得ますが、trace は activity の下位型ではなく別の
      information entity のままです。
  why_needed:
    zh: 同一查询可在不同索引、范围、方法和时刻产生不同候选；一次明确执行是可审计输入、阶段与输出的最小单元。
    en: Same query can produce different candidates across index, scope, method, and time; one explicit execution is the smallest auditable unit for input, stages, and output.
    ja: 同じ query でも index、scope、method、time により異なる candidate を生み得るため、一つの明示的 execution が input、stage、output の最小 audit 単位です。
  includes:
    - zh: 已执行请求、候选生成引用、排序步骤引用、状态、时序和产生的检索结果或失败事实。
      en: Executed request, candidate-generation reference, ranking-step references, status, timing, and generated retrieval result or failure fact.
      ja: 実行済み request、candidate-generation reference、ranking-step reference、status、timing、生成された retrieval result または failure fact。
  excludes:
    - zh: RetrievalRequest、CandidateSet、RetrievalResult、索引维护、Trace、上下文包选择和回答生成。
      en: RetrievalRequest, CandidateSet, RetrievalResult, index maintenance, Trace, context-package selection, or answer generation.
      ja: RetrievalRequest、CandidateSet、RetrievalResult、index maintenance、Trace、context-package selection、answer generation。
  semantic_kind: activity
  aliases: [retrieval execution, search run, 检索调用]
engineering:
  explanation:
    zh: LangChain 将 retrieval 描述为在查询时从外部知识源获取信息。Moonweave 将一次实际调用建模为 RetrievalRun，并保留请求、阶段和输出之间的 PROV 关系。
    en: LangChain describes retrieval as fetching information from external knowledge at query time. Moonweave models one actual call as RetrievalRun and retains PROV relations among request, stages, and output.
    ja: LangChain は retrieval を query time に外部 knowledge から情報を取得することと説明します。Moonweave は一回の実際の call を RetrievalRun としてモデル化し、request、stage、output 間の PROV relation を保持します。
  typical_input:
    - description: Retrieval request and execution plan
      format: |
        {
          "request_ref": "retrieval-request-support-18",
          "candidate_generation_ref": "candidate-generation-18",
          "ranking_operation_refs": ["rerank-18", "top-k-18"]
        }
  typical_output:
    - description: Retrieval run result
      format: |
        {
          "retrieval_run_id": "retrieval-run-18",
          "retrieval_activity_id": "retrieval-activity-support-18",
          "request_ref": "retrieval-request-support-18",
          "implementation_ref": "retrieval-chain-support-v1",
          "output_result_ref": "retrieval-result-top5-18",
          "run_status": "completed",
          "started_at": "2026-07-19T01:00:00Z",
          "ended_at": "2026-07-19T01:00:00.080Z",
          "execution_status": "completed"
        }
  reference_implementations:
    - name: LangChain retrieval overview
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Describes retrieval systems fetching external knowledge at query time.
structure:
  identity_keys: [retrieval_run_id]
  fields:
    - id: retrieval_run_id
      labels: {zh: 检索运行标识, en: retrieval run ID, ja: 検索 run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际检索执行，不能复用为请求、结果或追踪标识。
        en: Identifies one actual retrieval execution and is not reused as request, result, or trace ID.
        ja: 一回の実際の retrieval execution を識別し、request、result、trace ID として再利用しません。
      allowed_values: []
      pattern: "^retrieval-run-[A-Za-z0-9._-]+$"
      example_value: retrieval-run-18
      source_claims: [claim-retrieval-run-langchain]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次运行实际消费的 RetrievalRequest，而不是其文本相似副本。
        en: Points to RetrievalRequest actually consumed by this run rather than a textually similar copy.
        ja: この run が実際に消費した RetrievalRequest を指し、textually similar な copy ではありません。
      allowed_values: []
      pattern: "^retrieval-request-[A-Za-z0-9._-]+$"
      example_value: retrieval-request-support-18
      source_claims: [claim-retrieval-run-provenance]
    - id: candidate_generation_ref
      labels: {zh: 候选生成活动引用, en: candidate-generation activity reference, ja: candidate-generation activity 参照}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功候选召回时指向实际 CandidateGenerationActivity；不以静态检索配置代替。
        en: On successful candidate recall points to actual CandidateGenerationActivity and is not replaced by static retrieval configuration.
        ja: 成功した candidate recall 時に実際の CandidateGenerationActivity を指し、静的 retrieval configuration で置き換えません。
      allowed_values: []
      pattern: "^candidate-generation-[A-Za-z0-9._-]+$"
      example_value: candidate-generation-18
      source_claims: [claim-retrieval-run-provenance]
    - id: ranking_operation_refs
      labels: {zh: 排序活动引用, en: ranking operation references, ja: ranking operation 参照}
      datatype: array
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 按执行顺序列出本运行实际调用的评分、融合、重排或 top-k 活动，空数组表示没有排序阶段。
        en: Lists scoring, fusion, rerank, or top-k activities actually invoked by this run in execution order; empty array means no ranking stage.
        ja: この run が実際に呼び出した scoring、fusion、rerank、top-k activity を execution order で列挙し、empty array は ranking stage がないことを示します。
      allowed_values: []
      pattern: null
      example_value: [rerank-18, top-k-18]
      source_claims: [claim-retrieval-run-provenance]
    - id: output_result_ref
      labels: {zh: 输出结果引用, en: output result reference, ja: output result 参照}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功或部分成功时指向本运行生成的 RetrievalResult；失败或取消时不得伪造。
        en: On completed or partial success points to RetrievalResult generated by this run and cannot be fabricated on failure or cancellation.
        ja: completed または partial success 時にこの run が生成した RetrievalResult を指し、failure または cancellation 時に捏造できません。
      allowed_values: []
      pattern: "^retrieval-result-[A-Za-z0-9._-]+$"
      example_value: retrieval-result-top5-18
      source_claims: [claim-retrieval-run-provenance]
    - id: run_status
      labels: {zh: 运行状态, en: run status, ja: run status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示运行完成、失败、取消或部分完成，不代表候选或答案质量。
        en: Indicates run completed, failed, was cancelled, or partial and does not represent candidate or answer quality.
        ja: run が completed、failed、cancelled、partial のどれかを示し、candidate や answer quality を表しません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-retrieval-run-provenance]
    - id: started_at
      labels: {zh: 开始时间, en: started at, ja: 開始時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录此实际检索执行开始的时间。
        en: Records when this actual retrieval execution began.
        ja: この実際の retrieval execution が開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00Z"
      source_claims: [claim-retrieval-run-provenance]
    - id: ended_at
      labels: {zh: 结束时间, en: ended at, ja: 終了時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录执行完成、失败或取消的时间，不能早于 started_at。
        en: Records when execution completed, failed, or was cancelled and cannot precede started_at.
        ja: execution が completed、failed、cancelled になった時刻を記録し、started_at より前にはできません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00.080Z"
      source_claims: [claim-retrieval-run-provenance]
    - id: retrieval_activity_id
      labels:
        zh: 检索活动标识
        en: retrieval activity ID
        ja: retrieval activity ID
      definitions:
        zh: 标识同一完整检索运行的通用活动身份，不复用为请求、结果或追踪标识。
        en: Identifies the same complete retrieval run as a general activity and is not reused as a request, result, or trace ID.
        ja: 同じ完全な retrieval run を一般 activity として識別し、request、result、trace ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-activity-[A-Za-z0-9._-]+$'
      example_value: retrieval-activity-run-18
      source_claims: [claim-retrieval-run-subtype]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: implementation reference
        ja: implementation 参照
      definitions:
        zh: 指向协调本次候选生成和可选排序阶段的检索实现版本，而不是某个候选或分数。
        en: Points to the retrieval implementation revision that coordinates this run's candidate-generation and optional ranking stages, not a candidate or score.
        ja: この run の candidate-generation と任意の ranking stage を調整する retrieval implementation revision を指し、candidate や score ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-impl-[A-Za-z0-9._-]+$'
      example_value: retrieval-impl-orchestrator-v1
      source_claims: [claim-retrieval-run-langchain]
    - id: execution_status
      labels:
        zh: 执行状态
        en: execution status
        ja: execution status
      definitions:
        zh: 提供完整检索运行的粗粒度运行、完成或失败状态；取消和部分完成细节由 run_status 保留。
        en: Provides coarse running, completed, or failed status for the complete retrieval run while run_status retains cancellation and partial-completion detail.
        ja: 完全な retrieval run の coarse な running、completed、failed 状態を示し、cancelled と partial の詳細は run_status に保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [running, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-retrieval-run-provenance]
  constraints:
    - id: retrieval-run-inherits-retrieval-activity-fields
      severity: error
      expression_language: plain
      expression: RetrievalRun is one RetrievalActivity record. retrieval_activity_id and retrieval_run_id must resolve to that same execution; implementation_ref coordinates the stated candidate-generation and ranking stages; request_ref and started_at remain the inherited activity facts; and execution_status is the coarse lifecycle projection of run_status.
      explanation:
        zh: 检索运行是检索活动的完整工作流特化，其运行身份和细粒度阶段不会创建第二个父活动记录。
        en: A retrieval run is the complete-workflow specialization of retrieval activity; its run identity and detailed stages do not create a second parent activity record.
        ja: retrieval run は retrieval activity の完全 workflow 特殊化であり、run identity と詳細 stage は第2の親 activity record を作らない。
      source_claims: [claim-retrieval-run-subtype, claim-retrieval-run-provenance]
    - id: retrieval-run-request-output-consistency
      severity: error
      expression_language: plain
      expression: request_ref, run_status, started_at, and ended_at are required and ended_at must not precede started_at. Completed or partial run requires output_result_ref; failed or cancelled run must not claim completed output, and any recorded stages must use the same request scope.
      explanation:
        zh: 一次运行需要可回查的输入、时间和输出状态；不能从同一查询文本或同一索引推断执行身份。
        en: One run needs traceable input, timing, and output state; execution identity cannot be inferred from same query text or same index.
        ja: 一つの run には追跡可能な input、timing、output state が必要で、同じ query text や index から execution identity を推論できません。
      source_claims: [claim-retrieval-run-provenance]
    - id: retrieval-run-not-artifact-or-context
      severity: error
      expression_language: plain
      expression: RetrievalRun must not be classified as RetrievalRequest, CandidateSet, RetrievalResult, RetrievalTrace, VectorIndex, ContextPackage, model call, or answer. Those are distinct entities or activities connected by ordinary provenance relations.
      explanation:
        zh: 检索执行与其输入、输出、诊断和后续上下文装配有不同身份和责任。
        en: Retrieval execution has a different identity and responsibility from its input, output, diagnostics, and later context assembly.
        ja: retrieval execution は input、output、diagnostic、後続 context assembly と異なる identity と responsibility を持ちます。
      source_claims: [claim-retrieval-run-boundary]
  required_relations: []
examples:
  - id: retrieval-run-example-positive

    labels: {zh: 完整支持请求检索运行, en: Complete support-request retrieval run, ja: 完全な support-request 検索実行}

    descriptions:
      zh: Self-RAG：模型输出 [Retrieve] 触发检索 → [IsRel]/[IsSup]/[IsUse] 评判；RAG retrieve-then-read p(z|x)；Generative Agents score 加权 top-k Memory Stream。
      en: Self-RAG: [Retrieve] triggers retrieval → [IsRel]/[IsSup]/[IsUse] critique; RAG retrieve-then-read p(z|x); Generative Agents score-weighted top-k Memory Stream.
      ja: Self-RAG [Retrieve]→[IsRel]/[IsSup]/[IsUse]。RAG p(z|x)。Generative Agents score top-k Memory Stream。
    field_values:
      retrieval_run_id: retrieval-run-18
      retrieval_activity_id: retrieval-activity-support-18
      request_ref: retrieval-request-support-18
      implementation_ref: retrieval-chain-support-v1
      candidate_generation_ref: candidate-generation-18
      ranking_operation_refs: [rerank-18, top-k-18]
      output_result_ref: retrieval-result-top5-18
      run_status: completed
      started_at: "2026-07-19T01:00:00Z"
      ended_at: "2026-07-19T01:00:00.080Z"
      execution_status: completed
    related_node_ids: [RetrievalRun, RetrievalActivity, RetrievalRequest, RetrievalResult]
    related_relation_ids: [RetrievalRun-is_a-RetrievalActivity, RetrievalRun-uses-RetrievalRequest, RetrievalRun-generates-RetrievalResult]

    source_claims: [claim-retrieval-run-langchain, claim-retrieval-run-provenance]
  - id: retrieval-run-example-counterexample-request

    labels: {zh: 未执行的检索请求, en: Unexecuted retrieval request, ja: 未実行 retrieval request}

    descriptions:
      zh: 反例：RetrievalRun 无 retrieval_scope_id 或 completed_at 的半成品执行记录。
      en: Counterexample: RetrievalRun missing retrieval_scope_id or completed_at incomplete execution record.
      ja: 反例：RetrievalRun に retrieval_scope_id/completed_at なし。
    field_values:
      request_ref: retrieval-request-support-18
      retrieval_run_id: null
      candidate_generation_ref: null
      output_result_ref: null
      run_status: null
    related_node_ids: [RetrievalRun, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-retrieval-run-boundary]
  - id: retrieval-run-example-boundary-trace

    labels: {zh: 检索诊断追踪记录, en: Retrieval diagnostic trace record, ja: 検索診断 trace record}

    descriptions:
      zh: RetrievalRun 在线查询 vs IndexBuildRun 离线索引构建；HyDE 在 CandidateGenerationActivity 层生成假设文档。
      en: RetrievalRun online query vs IndexBuildRun offline index build; HyDE generates hypothetical doc at CandidateGenerationActivity layer.
      ja: RetrievalRun online vs IndexBuildRun offline。HyDE は CandidateGenerationActivity 層。
    field_values:
      retrieval_trace_id: retrieval-trace-18
      retrieval_run_ref: retrieval-run-18
      stage_records: [{stage: candidate_generation, latency_ms: 24}]
      run_status: null
    related_node_ids: [RetrievalRun, RetrievalTrace]
    related_relation_ids: []

    source_claims: [claim-retrieval-run-boundary]
  - id: retrieval-run-example-instance-retrieval-chain

    labels: {zh: 实例：候选生成后重排, en: "Instance: recall then rerank", ja: "事例：recall の後に rerank"}

    descriptions:
      zh: MemGPT archival_memory_search(query="project notes", page=0, page_size=10) 分页检索 run；ChromaDB collection.query n_results=10 实例。
      en: MemGPT archival_memory_search(page=0, page_size=10) paginated retrieval run; ChromaDB collection.query n_results=10 instance.
      ja: MemGPT archival_memory_search 分页 run。ChromaDB query n_results=10。
    field_values:
      retrieval_run_id: retrieval-run-19
      retrieval_activity_id: retrieval-activity-support-19
      request_ref: retrieval-request-support-19
      implementation_ref: retrieval-chain-support-v1
      candidate_generation_ref: candidate-generation-19
      ranking_operation_refs: [rank-fusion-19, rerank-19]
      output_result_ref: retrieval-result-partial-19
      run_status: partial
      started_at: "2026-07-19T02:00:00Z"
      ended_at: "2026-07-19T02:00:03Z"
      execution_status: partial
    related_node_ids: [RetrievalRun, CandidateGenerationActivity, RankFusion, RerankActivity]
    related_relation_ids: [RetrievalRun-is_a-RetrievalActivity]
    source_claims: [claim-retrieval-run-langchain, claim-retrieval-run-provenance]
parent_relation:
  id: RetrievalRun-is_a-RetrievalActivity
  predicate: is_a
  target: concept:RetrievalActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是检索活动的执行子类
    en: is an execution subtype of retrieval activity
    ja: RetrievalActivity の実行下位型である
  definitions:
    zh: RetrievalRun is_a RetrievalActivity，表示每次实际有时间边界的检索执行都是检索活动；它不是请求、结果或追踪实体。
    en: RetrievalRun is_a RetrievalActivity means every actual time-bounded retrieval execution is retrieval activity and is not request, result, or trace entity.
    ja: RetrievalRun is_a RetrievalActivity は、すべての実際の時間境界を持つ retrieval execution が retrieval activity であり、request、result、trace entity ではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一次请求可触发多少运行，重试或分区执行应记录为不同运行。
    en: Classification does not prescribe how many runs a request may trigger; retry or partition execution is recorded as distinct run.
    ja: 分類関係は request が起こせる run 数を規定せず、retry や partition execution は別の run として記録します。
  inverse_reading:
    predicate: has_retrieval_run_subtype
    labels: {zh: 具有检索运行子类, en: has retrieval-run subtype, ja: 検索 run 下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-retrieval-run-subtype]
  distinct_fact_rationale:
    zh: 此关系表达活动类型归属，不表达请求内容、候选成员、输出结果、追踪或模型回答。
    en: This relation expresses activity type membership, not request content, candidate members, output result, trace, or model answer.
    ja: この関係は activity type membership を表し、request content、candidate member、output result、trace、model answer は表しません。
  layout_role: primary-backbone
relations:
  - id: RetrievalRun-uses-RetrievalRequest
    predicate: uses
    target: concept:RetrievalRequest
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用检索请求, en: uses retrieval request, ja: 検索 request を使用する}
    definitions:
      zh: 仅当 request_ref 指向目标且运行实际消费其查询与限制时，RetrievalRun 使用该请求。
      en: RetrievalRun uses RetrievalRequest only when request_ref identifies it and the run actually consumes its query and constraints.
      ja: request_ref が対象を識別し、run がその query と constraint を実際に消費した場合にだけ、RetrievalRun は RetrievalRequest を使用します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_used_by_retrieval_run
      labels: {zh: 被检索运行使用, en: is used by retrieval run, ja: 検索 run に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-retrieval-run-provenance]
    distinct_fact_rationale: "This is concrete request use and not containment of request inside an activity."
    layout_role: cross-link
  - id: RetrievalRun-generates-RetrievalResult
    predicate: generates
    target: concept:RetrievalResult
    endpoint_order: source-to-target
    direction: source-to-target
