schema: moonweave.ai/ontology-node/v1
id: RetrievalRun
kind: concept
status: accepted
labels:
  zh: 检索运行
  en: Retrieval run
  ja: 検索実行
semantics:
  short_definition:
    zh: 履行一个检索请求并贯穿候选生成到结果形成的端到端执行。
    en: An end-to-end execution that fulfills one retrieval request from candidate generation through result formation.
    ja: 一つのretrieval requestをcandidate generationからresult形成まで履行するend-to-end実行です。
  definition:
    zh: RetrievalRun 是绑定一个 RetrievalRequest 与实际读取的 IndexVersion 的端到端活动实例；其身份跨越各检索阶段，并最终产生 RetrievalResult 与 RetrievalTrace。
    en: RetrievalRun is an end-to-end activity instance bound to one RetrievalRequest and the IndexVersion actually read. Its identity spans retrieval stages and culminates in a RetrievalResult and RetrievalTrace.
    ja: RetrievalRun は一つのRetrievalRequestと実際に読んだIndexVersionに結び付くend-to-end activity instanceで、各stageを跨ぎRetrievalResultとRetrievalTraceを生成します。
  why_needed:
    zh: 把请求履行、索引版本、阶段链、结果和追踪记录连成可重放的运行单位。
    en: Connects request fulfillment, index version, stage chain, result, and trace into one replayable run unit.
    ja: request履行・index version・stage chain・result・traceを一つの再生可能run単位へ結びます。
  includes:
    - zh: 纳入已经开始、具有稳定 run_id 且能指向请求与实际索引版本的运行。
      en: Includes started executions with a stable run_id and explicit request and actual index-version references.
      ja: stable run_idとrequest・実際index versionへの明示参照を持つ開始済み実行を含みます。
  excludes:
    - zh: 排除尚未执行的请求、单独阶段、结果记录和日志条目。
      en: Excludes unexecuted requests, individual stages, result records, and log entries.
      ja: 未実行request・単独stage・result record・log entryを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - run_id
  fields:
    - id: run_id
      labels:
        zh: 运行标识
        en: run ID
        ja: run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次端到端检索运行。
        en: Stable identifier for one end-to-end retrieval run.
        ja: 一つのend-to-end retrieval runを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-run-411
      source_claims:
        - claim-retrieval-run-002
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: request ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该运行所履行的检索请求。
        en: Identifies the retrieval request fulfilled by the run.
        ja: runが履行するretrieval requestを識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-request-411
      source_claims:
        - claim-retrieval-run-003
    - id: index_version_id
      labels:
        zh: 索引版本标识
        en: index version ID
        ja: index version ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识运行实际读取而非仅计划读取的索引版本。
        en: Identifies the index version actually read, not merely planned.
        ja: 予定ではなく実際に読んだindex versionを識別します。
      allowed_values: []
      pattern: null
      example_value: index-v19
      source_claims:
        - claim-retrieval-run-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalRun-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索运行正例
      en: "Positive case: Retrieval run"
      ja: 検索実行正例
    scenario_id: null
    descriptions:
      zh: run-411 履行 request-411，读取 index-v19，并形成结果与追踪记录。
      en: run-411 fulfills request-411, reads index-v19, and produces a result and trace.
      ja: run-411 はrequest-411を履行しindex-v19を読みresultとtraceを生成します。
    field_values:
      run_id: retrieval-run-411
      request_id: retrieval-request-411
      index_version_id: index-v19
      activity_id: retrieval-run-411
      started_at: 2026-07-16T12:00:00Z
    related_node_ids:
      - RetrievalRun
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalRun。
      en: Classify the object as RetrievalRun.
      ja: RetrievalRun として分類します。
    why_valid_or_invalid:
      zh: 同一活动身份贯穿完整管线且明确记录请求和实际索引版本。
      en: One activity identity spans the pipeline and explicitly records the request and actual index version.
      ja: 一つのactivity identityがpipeline全体を跨ぎrequestと実際index versionを記録します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-run-005
  - id: RetrievalRun-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索运行边界例
      en: "Boundary case: Retrieval run"
      ja: 検索実行境界例
    scenario_id: null
    descriptions:
      zh: fusion-411 只对一个候选集合执行 RRF，没有履行请求或形成最终结果。
      en: fusion-411 performs RRF on one candidate set but does not fulfill the request or form the final result.
      ja: fusion-411 はcandidate setにRRFを行うだけでrequest履行やfinal result形成はしません。
    field_values: {}
    related_node_ids:
      - RetrievalRun
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalRun。
      en: Do not classify the object as RetrievalRun.
      ja: RetrievalRun として分類しません。
    why_valid_or_invalid:
      zh: 它是运行中的排序阶段，而非端到端 RetrievalRun。
      en: It is a ranking stage within a run, not the end-to-end RetrievalRun.
      ja: run内のranking stageでend-to-end RetrievalRunではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-run-006
