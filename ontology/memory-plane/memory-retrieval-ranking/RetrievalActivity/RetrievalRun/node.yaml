schema: moonweave.ai/ontology-node/v1
id: RetrievalRun
kind: concept
labels:
  zh: 检索运行
  en: Retrieval run
  ja: 検索実行
semantics:
  short_definition:
    zh: 履行一次检索请求的端到端运行。
    en: End-to-end run fulfilling one retrieval request.
    ja: 一 retrieval request を履行する end-to-end run。
  definition:
    zh: RetrievalRun 绑定 RetrievalRequest 与实际读取的 IndexVersion，以 run_id 贯穿候选生成、排序阶段直至 RetrievalResult 与 RetrievalTrace；对应一次 Mem0 search、Pinecone query 流水线或 LangGraph store.search 的完整执行，但不是单个阶段或结果记录。
    en: RetrievalRun binds a RetrievalRequest and the IndexVersion actually read, spanning candidate generation and ranking stages through RetrievalResult and RetrievalTrace under one run_id. It models a complete Mem0 search, Pinecone query pipeline, or LangGraph store.search execution, not a single stage or result record.
    ja: RetrievalRun は RetrievalRequest と actual IndexVersion に結合し run_id で candidate generation/ranking から RetrievalResult/RetrievalTrace まで跨ぎます。Mem0 search/Pinecone pipeline/LangGraph store.search の完全実行に対応。
  why_needed:
    zh: 同一 query 换索引版本结果会变；必须把 run 与 request 分开，并记录 actual_index_version_id 才能重放。
    en: The same query yields different results after an index swap; run must stay separate from request with actual_index_version_id for replay.
    ja: 同一 query でも index 版変更で結果が変わるため run/request 分離と actual_index_version_id 記録が replay に必要。
  includes:
    - zh: 纳入已开始、有 run_id 并指向 request 与实际 index 版本的运行。
      en: Includes started executions with run_id and explicit request and index-version references.
      ja: run_id と request/actual index version 参照を持つ開始済み実行。
  excludes:
    - zh: 排除未执行请求、单阶段与结果/日志条目。
      en: Excludes unexecuted requests, single stages, and result/log entries.
      ja: 未実行 request・単 stage・result/log entry を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: run_id 对应 Moonweave retrieval_run_id；request_id 与 actual_index_version_id 必须写入 trace 以支持重放。
    en: run_id maps to Moonweave retrieval_run_id; request_id and actual_index_version_id must appear in trace for replay.
    ja: run_id は retrieval_run_id。request_id/actual_index_version_id を trace に記録して replay。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - run_id
  fields:
    - id: run_id
      labels:
        zh: 运行标识
        en: Run identifier
        ja: run 識別子
      definitions:
        zh: 稳定标识一次端到端检索运行。
        en: Stable identifier for one end-to-end retrieval run.
        ja: end-to-end retrieval run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: run-411
      allowed_values: []
      source_claims:
        - claim-retrieval-run-id
    - id: request_id
      labels:
        zh: 请求标识
        en: Request identifier
        ja: request 識別子
      definitions:
        zh: 该运行履行的 RetrievalRequest。
        en: RetrievalRequest fulfilled by this run.
        ja: 履行する RetrievalRequest。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: request-419
      allowed_values: []
      source_claims:
        - claim-retrieval-run-request
    - id: actual_index_version_id
      labels:
        zh: 实际索引版本
        en: Actual index version
        ja: 実際 index 版
      definitions:
        zh: 本次 run 实际读取的 IndexVersion。
        en: IndexVersion actually read by this run.
        ja: 今回 actual read した IndexVersion。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: index-v19
      allowed_values: []
      source_claims:
        - claim-retrieval-run-index
  constraints: []
  required_relations: []
examples:
  - id: RetrievalRun-example-mem0
    labels:
      zh: Mem0 检索运行
      en: Mem0 retrieval run
      ja: Mem0 retrieval run
    descriptions:
      zh: run-411 履行 request-419，调用 Mem0 search(user_id=alice, top_k=5) 并读取 index-v19。
      en: run-411 fulfills request-419 via Mem0 search(user_id=alice, top_k=5) reading index-v19.
      ja: run-411 が request-419 を Mem0 search で履行。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: search run
    field_values:
      run_id: run-411
      request_id: request-419
      actual_index_version_id: index-v19
    related_node_ids:
      - RetrievalRun
      - RetrievalRequest
    related_relation_ids: []
    source_claims:
      - claim-retrieval-run-mem0
  - id: RetrievalRun-example-pinecone-pipeline
    labels:
      zh: Pinecone 流水线运行
      en: Pinecone pipeline run
      ja: Pinecone pipeline run
    descriptions:
      zh: run-412 并行 Pinecone query 与 BM25，经 RRF 与 Cohere rerank 形成 result-422。
      en: run-412 runs parallel Pinecone query and BM25, then RRF and Cohere rerank to result-422.
      ja: run-412 が Pinecone/BM25→RRF→Cohere rerank で result-422。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: multi-stage run
    field_values:
      run_id: run-412
      request_id: request-420
      actual_index_version_id: index-v19
    related_node_ids:
      - RetrievalRun
      - RetrievalResult
    related_relation_ids: []
    source_claims:
      - claim-retrieval-run-pinecone
  - id: RetrievalRun-example-stage-not-run
    labels:
      zh: 单阶段非运行
      en: Stage is not run
      ja: stage は run ではない
    descriptions:
      zh: rerank-416 只是 run-412 中的一个 RankingOperation 阶段，不是 RetrievalRun。
      en: rerank-416 is one RankingOperation stage inside run-412, not a RetrievalRun.
      ja: rerank-416 は run 内 stage で RetrievalRun ではない。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievalRun
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-retrieval-run-boundary
parent_relation:
  id: RetrievalRun-is_a-RetrievalActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalActivity
    en: is a RetrievalActivity
    ja: RetrievalActivityの一種
  definitions:
    zh: RetrievalRun —is_a→ RetrievalActivity 成立，因为它以一个 run_id 贯穿请求履行、实际索引读取、阶段链、结果与追踪记录。
    en: RetrievalRun —is_a→ RetrievalActivity holds because it uses one run_id across request fulfillment, actual index reading, the stage chain, result, and trace.
    ja: RetrievalRun —is_a→ RetrievalActivity は一run_idがrequest履行・actual index reading・stage chain・result・traceを跨ぐため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RetrievalRun-is_a-RetrievalActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it uses one run_id across request fulfillment, actual index reading, the stage chain, result, and trace."
      explanations:
        zh: 仅当实例既满足 RetrievalActivity 的完整定义，又满足子类种差“它以一个 run_id 贯穿请求履行、实际索引读取、阶段链、结果与追踪记录。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalActivity definition and the child differentia: it uses one run_id across request fulfillment, actual index reading, the stage chain, result, and trace."
        ja: instanceがRetrievalActivity完全定義とchild differentia「一run_idがrequest履行・actual index reading・stage chain・result・traceを跨ぐ」を共に満たす時だけassertします。
      source_claims:
        - claim-retrieval-run-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRun-is_a-RetrievalActivity-example-positive-manual-001
      labels:
        zh: 是一种RetrievalActivity正例
        en: "Positive case: is a RetrievalActivity"
        ja: RetrievalActivityの一種正例
      descriptions:
        zh: run-411 履行 request-419 并产生 result-422 与 trace-426。
        en: run-411 fulfills request-419 and produces result-422 and trace-426.
        ja: run-411がrequest-419を履行しresult-422/trace-426を生成します。
      field_values: {}
      related_node_ids:
        - RetrievalRun
        - RetrievalActivity
      related_relation_ids:
        - RetrievalRun-is_a-RetrievalActivity
      source_claims:
        - claim-retrieval-run-id
    - id: RetrievalRun-is_a-RetrievalActivity-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalActivity边界例
        en: "Boundary case: is a RetrievalActivity"
        ja: RetrievalActivityの一種境界例
      descriptions:
        zh: rerank-416 只是运行中的一个阶段。
        en: rerank-416 is only one stage within a run.
        ja: rerank-416はrun内の一stageだけです。
      field_values: {}
      related_node_ids:
        - RetrievalRun
        - RetrievalActivity
      related_relation_ids:
        - RetrievalRun-is_a-RetrievalActivity
      source_claims:
        - claim-retrieval-run-id
  source_claims:
    - claim-retrieval-run-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RetrievalRun-fulfills-RetrievalRequest
    predicate: fulfills
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: fulfills RetrievalRequest
      en: fulfills RetrievalRequest
      ja: RetrievalRequestをfulfills
    definitions:
      zh: RetrievalRun —fulfills→ RetrievalRequest 表示该运行以此请求为规范输入并承担完成它的端到端执行身份。
      en: RetrievalRun —fulfills→ RetrievalRequest states that the run takes this request as its normative input and bears the end-to-end identity of completing it.
      ja: RetrievalRun —fulfills→ RetrievalRequest はrunがこのrequestをnormative inputとし履行end-to-end identityを持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_fulfills
      labels:
        zh: 反向读取
        en: inverse fulfills
        ja: 逆方向読取
    conditions:
      - id: RetrievalRun-fulfills-RetrievalRequest-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when run.request_id identifies the request and the run's stages belong to that fulfillment chain.
        explanations:
          zh: 仅当 run.request_id 指向该请求且运行阶段均属于该履行链时建立。
          en: Assert only when run.request_id identifies the request and the run's stages belong to that fulfillment chain.
          ja: run.request_idがrequestを識別し全stageがそのfulfillment chainに属す時だけassertします。
        source_claims:
          - claim-retrieval-run-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalRun-fulfills-RetrievalRequest-example-positive-manual-001
        labels:
          zh: fulfills RetrievalRequest正例
          en: "Positive case: fulfills RetrievalRequest"
          ja: RetrievalRequestをfulfills正例
        descriptions:
          zh: run-411 fulfills request-419。
          en: run-411 fulfills request-419.
          ja: run-411がrequest-419を履行します。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - RetrievalRequest
        related_relation_ids:
          - RetrievalRun-fulfills-RetrievalRequest
        source_claims:
          - claim-retrieval-run-id
      - id: RetrievalRun-fulfills-RetrievalRequest-example-boundary-manual-001
        labels:
          zh: fulfills RetrievalRequest边界例
          en: "Boundary case: fulfills RetrievalRequest"
          ja: RetrievalRequestをfulfills境界例
        descriptions:
          zh: 重试运行具有新 run_id，不能与原运行混为一个履行事实。
          en: A retry with a new run_id must not be conflated with the original fulfillment fact.
          ja: new run_idのretryをoriginal fulfillment factと統合しません。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - RetrievalRequest
        related_relation_ids:
          - RetrievalRun-fulfills-RetrievalRequest
        source_claims:
          - claim-retrieval-run-id
    source_claims:
      - claim-retrieval-run-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievalRequest
  - id: RetrievalRun-has_phase-CandidateGenerationActivity
    predicate: has_phase
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: has_phase CandidateGenerationActivity
      en: has_phase CandidateGenerationActivity
      ja: CandidateGenerationActivityをhas_phase
    definitions:
      zh: RetrievalRun —has_phase→ CandidateGenerationActivity 表示该候选生成活动是此运行实际执行并记录顺序的阶段。
      en: RetrievalRun —has_phase→ CandidateGenerationActivity states that the candidate-generation activity is an actually executed, ordered stage of this run.
      ja: RetrievalRun —has_phase→ CandidateGenerationActivity はcandidate-generation activityがこのrunで実際実行され順序記録されたstageです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_has_phase
      labels:
        zh: 反向读取
        en: inverse has_phase
        ja: 逆方向読取
    conditions:
      - id: RetrievalRun-has_phase-CandidateGenerationActivity-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when both the stage's run association and trace order identify this RetrievalRun.
        explanations:
          zh: 仅当阶段的 run 关联与 trace 顺序均指向该 RetrievalRun 时建立。
          en: Assert only when both the stage's run association and trace order identify this RetrievalRun.
          ja: stageのrun associationとtrace orderが共にこのRetrievalRunを指す時だけassertします。
        source_claims:
          - claim-retrieval-run-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalRun-has_phase-CandidateGenerationActivity-example-positive-manual-001
        labels:
          zh: has_phase CandidateGenerationActivity正例
          en: "Positive case: has_phase CandidateGenerationActivity"
          ja: CandidateGenerationActivityをhas_phase正例
        descriptions:
          zh: run-411 has phase generation-412。
          en: run-411 has phase generation-412.
          ja: run-411がgeneration-412 phaseを持ちます。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - CandidateGenerationActivity
        related_relation_ids:
          - RetrievalRun-has_phase-CandidateGenerationActivity
        source_claims:
          - claim-retrieval-run-id
      - id: RetrievalRun-has_phase-CandidateGenerationActivity-example-boundary-manual-001
        labels:
          zh: has_phase CandidateGenerationActivity边界例
          en: "Boundary case: has_phase CandidateGenerationActivity"
          ja: CandidateGenerationActivityをhas_phase境界例
        descriptions:
          zh: 同配置的离线基准生成不属于 run-411。
          en: An offline benchmark generation with the same configuration is not a phase of run-411.
          ja: 同configurationのoffline benchmark generationはrun-411 phaseではありません。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - CandidateGenerationActivity
        related_relation_ids:
          - RetrievalRun-has_phase-CandidateGenerationActivity
        source_claims:
          - claim-retrieval-run-id
    source_claims:
      - claim-retrieval-run-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:CandidateGenerationActivity
  - id: RetrievalRun-has_phase-RankingOperation
    predicate: has_phase
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: has_phase RankingOperation
      en: has_phase RankingOperation
      ja: RankingOperationをhas_phase
    definitions:
      zh: RetrievalRun —has_phase→ RankingOperation 表示该排序操作是此运行候选生成之后实际执行并被追踪的排序阶段。
      en: RetrievalRun —has_phase→ RankingOperation states that the ranking operation is an actually executed and traced stage after candidate generation in this run.
      ja: RetrievalRun —has_phase→ RankingOperation はranking operationがこのrunのcandidate generation後に実行・traceされたstageです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_has_phase
      labels:
        zh: 反向读取
        en: inverse has_phase
        ja: 逆方向読取
    conditions:
      - id: RetrievalRun-has_phase-RankingOperation-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the operation consumes this run's candidate set and the trace records its stage identifier.
        explanations:
          zh: 仅当 operation 的输入候选集合来自该运行且 trace 记录其阶段标识时建立。
          en: Assert only when the operation consumes this run's candidate set and the trace records its stage identifier.
          ja: operationがこのrunのcandidate setをconsumeしtraceがstage IDを記録する時だけassertします。
        source_claims:
          - claim-retrieval-run-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalRun-has_phase-RankingOperation-example-positive-manual-001
        labels:
          zh: has_phase RankingOperation正例
          en: "Positive case: has_phase RankingOperation"
          ja: RankingOperationをhas_phase正例
        descriptions:
          zh: run-411 has phase ranking-413。
          en: run-411 has phase ranking-413.
          ja: run-411がranking-413 phaseを持ちます。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - RankingOperation
        related_relation_ids:
          - RetrievalRun-has_phase-RankingOperation
        source_claims:
          - claim-retrieval-run-id
      - id: RetrievalRun-has_phase-RankingOperation-example-boundary-manual-001
        labels:
          zh: has_phase RankingOperation边界例
          en: "Boundary case: has_phase RankingOperation"
          ja: RankingOperationをhas_phase境界例
        descriptions:
          zh: 共享同一模型的另一运行排序阶段不属于 run-411。
          en: A ranking stage in another run does not become part of run-411 merely by sharing a model.
          ja: 同model共有だけで別run ranking stageをrun-411へ含めません。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - RankingOperation
        related_relation_ids:
          - RetrievalRun-has_phase-RankingOperation
        source_claims:
          - claim-retrieval-run-id
    source_claims:
      - claim-retrieval-run-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RankingOperation
  - id: RetrievalRun-produces-RetrievalResult
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces RetrievalResult
      en: produces RetrievalResult
      ja: RetrievalResultをproduces
    definitions:
      zh: RetrievalRun —produces→ RetrievalResult 表示该结果是此运行完成或明确终止后形成的输出产物。
      en: RetrievalRun —produces→ RetrievalResult states that the result is the output artifact formed when this run completes or explicitly terminates.
      ja: RetrievalRun —produces→ RetrievalResult はresultがこのrun完了または明示終了時に形成されたoutput artifactです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_produces
      labels:
        zh: 反向读取
        en: inverse produces
        ja: 逆方向読取
    conditions:
      - id: RetrievalRun-produces-RetrievalResult-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the result's run lineage uniquely identifies this run_id.
        explanations:
          zh: 仅当 result 的运行血缘唯一指向该 run_id 时建立。
          en: Assert only when the result's run lineage uniquely identifies this run_id.
          ja: resultのrun lineageがこのrun_idだけを指す時にassertします。
        source_claims:
          - claim-retrieval-run-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalRun-produces-RetrievalResult-example-positive-manual-001
        labels:
          zh: produces RetrievalResult正例
          en: "Positive case: produces RetrievalResult"
          ja: RetrievalResultをproduces正例
        descriptions:
          zh: run-411 produces result-422。
          en: run-411 produces result-422.
          ja: run-411がresult-422を生成します。
        field_values: {}
        related_node_ids:
          - RetrievalRun
          - RetrievalResult
