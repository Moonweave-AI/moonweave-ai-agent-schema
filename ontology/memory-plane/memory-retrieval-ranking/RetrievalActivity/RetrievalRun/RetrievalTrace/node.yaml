schema: moonweave.ai/ontology-node/v1
id: RetrievalTrace
kind: concept
labels:
  zh: 检索追踪记录
  en: Retrieval trace
  ja: 検索trace
semantics:
  short_definition:
    zh: 可重放检索阶段的审计记录。
    en: Audit record replaying retrieval stages.
    ja: retrieval stage を replay 可能な監査 record。
  definition:
    zh: RetrievalTrace 记录一次 RetrievalRun 的阶段链：实际 IndexVersion、各 CandidateGenerationActivity/RankingOperation 参数（含 RRF rank_constant、Cohere model/top_n、top_k）与产物引用；用于解释为何返回特定候选顺序，不是运行本身或 ContextPackage。
    en: "RetrievalTrace records a RetrievalRun stage chain: actual IndexVersion, each CandidateGenerationActivity/RankingOperation parameter (including RRF rank_constant, Cohere model/top_n, top_k), and artifact references. It explains why a specific candidate order was returned; it is not the run itself or a ContextPackage."
    ja: RetrievalTrace は RetrievalRun の stage chain（actual IndexVersion、RRF rank_constant、Cohere model/top_n、top_k 等）と artifact 参照を記録。candidate 順序説明用で run 自体/ContextPackage ではない。
  why_needed:
    zh: 没有 trace，就无法回答“换 rrf_k=60 为 30 后顺序为何变化”或“Cohere 模型升级后分数来自哪一阶段”。
    en: Without trace, teams cannot explain order changes when rrf_k shifts from 60 to 30 or which stage produced scores after a Cohere model upgrade.
    ja: trace がなければ rrf_k 変更や Cohere model 升级後の score 由来を説明できません。
  includes:
    - zh: 纳入含 stage 列表、参数与产物引用的可重放审计记录。
      en: Includes replayable audit records with stage lists, parameters, and artifact references.
      ja: stage 列表・参数・artifact 参照を含む replayable audit record。
  excludes:
    - zh: 排除运行对象、原始日志流与上下文包。
      en: Excludes run objects, raw log streams, and context packages.
      ja: run object・raw log stream・context package を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: trace JSON 应包含 stages[]：method、limit/top_k、rrf_k、rerank_model；绑定 actual_index_version_id。
    en: Trace JSON should include stages[] with method, limit/top_k, rrf_k, rerank_model bound to actual_index_version_id.
    ja: trace JSON に stages[]（method/limit/top_k/rrf_k/rerank_model）と actual_index_version_id。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - trace_id
  fields:
    - id: trace_id
      labels:
        zh: 追踪标识
        en: Trace identifier
        ja: trace 識別子
      definitions:
        zh: 稳定标识一次检索追踪记录。
        en: Stable identifier for one retrieval trace.
        ja: 一 retrieval trace を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: trace-426
      allowed_values: []
      source_claims:
        - claim-retrieval-trace-id
    - id: retrieval_run_id
      labels:
        zh: 检索运行标识
        en: Retrieval run identifier
        ja: retrieval run 識別子
      definitions:
        zh: 所属 RetrievalRun。
        en: Owning RetrievalRun.
        ja: 所属 RetrievalRun。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: run-411
      allowed_values: []
      source_claims:
        - claim-retrieval-trace-run
    - id: actual_index_version_id
      labels:
        zh: 实际索引版本
        en: Actual index version
        ja: 実際 index 版
      definitions:
        zh: 重放必须匹配的 IndexVersion。
        en: IndexVersion replay must match.
        ja: replay 一致必須 IndexVersion。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: index-v19
      allowed_values: []
      source_claims:
        - claim-retrieval-trace-index
  constraints: []
  required_relations: []
examples:
  - id: RetrievalTrace-example-hybrid
    labels:
      zh: Hybrid 流水线 trace
      en: Hybrid pipeline trace
      ja: Hybrid pipeline trace
    descriptions:
      zh: trace-426 记录 run-411：BM25 limit=40、dense top_k=40、RRF rrf_k=60、Cohere rerank-v3.5 top_n=10、final top_k=5。
      en: "trace-426 records run-411: BM25 limit=40, dense top_k=40, RRF rrf_k=60, Cohere rerank-v3.5 top_n=10, final top_k=5."
      ja: trace-426 が stage 参数链を記録。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: stage chain
    field_values:
      trace_id: trace-426
      retrieval_run_id: run-411
      actual_index_version_id: index-v19
      stages:
        - method: RRF
          rrf_k: 60
        - method: cohere-rerank-v3.5
          top_n: 10
    related_node_ids:
      - RetrievalTrace
    related_relation_ids: []
    source_claims:
      - claim-retrieval-trace-hybrid
  - id: RetrievalTrace-example-mem0
    labels:
      zh: Mem0 trace
      en: Mem0 trace
      ja: Mem0 trace
    descriptions:
      zh: trace-427 记录 Mem0 search query digest、user_id、top_k=5 与 returned memory ids。
      en: trace-427 records Mem0 search query digest, user_id, top_k=5, and returned memory ids.
      ja: trace-427 が Mem0 search 参数を記録。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: search trace
    field_values:
      trace_id: trace-427
      retrieval_run_id: run-411
    related_node_ids:
      - RetrievalTrace
    related_relation_ids: []
    source_claims:
      - claim-retrieval-trace-mem0
  - id: RetrievalTrace-example-not-result
    labels:
      zh: Trace 非 Result
      en: Trace is not Result
      ja: trace は result ではない
    descriptions:
      zh: RetrievalResult 封装返回候选；RetrievalTrace 解释如何得到该顺序。
      en: RetrievalResult packages returned candidates; RetrievalTrace explains how that order was produced.
      ja: RetrievalResult は返却候補、RetrievalTrace は順序生成過程。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievalTrace
      - RetrievalResult
    related_relation_ids: []
    source_claims:
      - claim-retrieval-trace-boundary
parent_relation:
  id: RetrievalRun-has_trace-RetrievalTrace
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_trace RetrievalTrace
    en: has_trace RetrievalTrace
    ja: RetrievalTraceをhas_trace
  definitions:
    zh: RetrievalRun —has_trace→ RetrievalTrace 表示该追踪记录保存该运行实际请求、索引版本、阶段顺序和版本化参数。
    en: RetrievalRun —has_trace→ RetrievalTrace states that the trace records the run's actual request, index version, stage order, and versioned parameters.
    ja: RetrievalRun —has_trace→ RetrievalTrace はtraceがrunのactual request・index version・stage order・versioned parameterを記録します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_trace
      ja: 逆方向読取
  conditions:
    - id: RetrievalRun-has_trace-RetrievalTrace-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalTrace is a non-substitutable information component within this RetrievalRun's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalTrace 是该 RetrievalRun 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalTrace is a non-substitutable information component within this RetrievalRun's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalTraceがこのRetrievalRun identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-trace-id
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRun-has_trace-RetrievalTrace-example-positive-manual-001
      labels:
        zh: has_trace RetrievalTrace正例
        en: "Positive case: has_trace RetrievalTrace"
        ja: RetrievalTraceをhas_trace正例
      descriptions:
        zh: run-411 拥有 trace-426，二者共享 run_id。
        en: run-411 owns trace-426 and both share run_id.
        ja: run-411がtrace-426を所有しrun_idを共有します。
      field_values: {}
      related_node_ids:
        - RetrievalRun
        - RetrievalTrace
      related_relation_ids:
        - RetrievalRun-has_trace-RetrievalTrace
      source_claims:
        - claim-retrieval-trace-id
    - id: RetrievalRun-has_trace-RetrievalTrace-example-boundary-manual-001
      labels:
        zh: has_trace RetrievalTrace边界例
        en: "Boundary case: has_trace RetrievalTrace"
        ja: RetrievalTraceをhas_trace境界例
      descriptions:
        zh: 通用监控日志没有完整运行重放身份。
        en: A generic monitoring log lacks complete run-replay identity.
        ja: generic monitoring logは完全run-replay identityを欠きます。
      field_values: {}
      related_node_ids:
        - RetrievalRun
        - RetrievalTrace
      related_relation_ids:
        - RetrievalRun-has_trace-RetrievalTrace
      source_claims:
        - claim-retrieval-trace-id
  source_claims:
    - claim-retrieval-trace-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: RetrievalTrace-records-IndexVersion
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records IndexVersion
      en: records IndexVersion
      ja: IndexVersionをrecords
    definitions:
      zh: RetrievalTrace —records→ IndexVersion 表示追踪记录固定运行实际读取的索引版本，而不是仅记录请求目标。
      en: RetrievalTrace —records→ IndexVersion states that the trace fixes the index version actually read by the run rather than only the requested target.
      ja: RetrievalTrace —records→ IndexVersion はtraceがrequest targetだけでなくrunで実際読んだindex versionを固定します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_records
      labels:
        zh: 反向读取
        en: inverse records
        ja: 逆方向読取
    conditions:
      - id: RetrievalTrace-records-IndexVersion-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the trace value agrees with the RetrievalRun-reads-IndexVersion fact.
        explanations:
          zh: 仅当 trace 的版本值与 RetrievalRun-reads-IndexVersion 事实一致时建立。
          en: Assert only when the trace value agrees with the RetrievalRun-reads-IndexVersion fact.
          ja: trace version値がRetrievalRun-reads-IndexVersion factと一致する時だけassertします。
        source_claims:
          - claim-retrieval-trace-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalTrace-records-IndexVersion-example-positive-manual-001
        labels:
          zh: records IndexVersion正例
          en: "Positive case: records IndexVersion"
          ja: IndexVersionをrecords正例
        descriptions:
          zh: trace-426 records actual index-v19。
          en: trace-426 records actual index-v19.
          ja: trace-426がactual index-v19を記録します。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - IndexVersion
        related_relation_ids:
          - RetrievalTrace-records-IndexVersion
        source_claims:
          - claim-retrieval-trace-id
      - id: RetrievalTrace-records-IndexVersion-example-boundary-manual-001
        labels:
          zh: records IndexVersion边界例
          en: "Boundary case: records IndexVersion"
          ja: IndexVersionをrecords境界例
        descriptions:
          zh: 请求目标与实际读取版本不一致时不得记录错误版本。
          en: Do not record the requested target as actual when a different version was read.
          ja: request targetとactual read version不一致時に誤versionを記録しません。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - IndexVersion
        related_relation_ids:
          - RetrievalTrace-records-IndexVersion
        source_claims:
          - claim-retrieval-trace-id
    source_claims:
      - claim-retrieval-trace-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:IndexVersion
  - id: RetrievalTrace-records-RankingOperation
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records RankingOperation
      en: records RankingOperation
      ja: RankingOperationをrecords
    definitions:
      zh: RetrievalTrace —records→ RankingOperation 表示追踪记录保存该运行实际排序阶段的身份、顺序、方法和版本化参数。
      en: RetrievalTrace —records→ RankingOperation states that the trace preserves the identity, order, method, and versioned parameters of an actual ranking stage in the run.
      ja: RetrievalTrace —records→ RankingOperation はtraceがrun内actual ranking stageのidentity・order・method・versioned parameterを保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_records
      labels:
        zh: 反向读取
        en: inverse records
        ja: 逆方向読取
    conditions:
      - id: RetrievalTrace-records-RankingOperation-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the operation is a phase of this run and its parameter snapshot is sufficient for replay.
        explanations:
          zh: 仅当 operation 是该 run 的阶段且其参数快照足以重放时建立。
          en: Assert only when the operation is a phase of this run and its parameter snapshot is sufficient for replay.
          ja: operationがこのrun phaseでparameter snapshotがreplayに十分な時だけassertします。
        source_claims:
          - claim-retrieval-trace-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalTrace-records-RankingOperation-example-positive-manual-001
        labels:
          zh: records RankingOperation正例
          en: "Positive case: records RankingOperation"
          ja: RankingOperationをrecords正例
        descriptions:
          zh: trace-426 records ranking-413 and its RRF/rerank/TopK parameters。
          en: trace-426 records ranking-413 and its RRF, rerank, and Top-K parameters.
          ja: trace-426がranking-413とRRF/rerank/Top-K parameterを記録します。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - RankingOperation
        related_relation_ids:
          - RetrievalTrace-records-RankingOperation
        source_claims:
          - claim-retrieval-trace-id
      - id: RetrievalTrace-records-RankingOperation-example-boundary-manual-001
        labels:
          zh: records RankingOperation边界例
          en: "Boundary case: records RankingOperation"
          ja: RankingOperationをrecords境界例
        descriptions:
          zh: 只记录“ranking complete”而无阶段参数不能建立。
          en: A 'ranking complete' string without stage parameters does not establish this edge.
          ja: stage parameterなしのranking complete文字列ではedgeを成立させません。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - RankingOperation
        related_relation_ids:
          - RetrievalTrace-records-RankingOperation
        source_claims:
          - claim-retrieval-trace-id
    source_claims:
      - claim-retrieval-trace-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RankingOperation
  - id: RetrievalTrace-records-RetrievalRequest
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records RetrievalRequest
      en: records RetrievalRequest
      ja: RetrievalRequestをrecords
    definitions:
      zh: RetrievalTrace —records→ RetrievalRequest 表示追踪记录固定该运行实际履行的请求身份与请求输入摘要。
      en: RetrievalTrace —records→ RetrievalRequest states that the trace fixes the identity and input digest of the request actually fulfilled by the run.
      ja: RetrievalTrace —records→ RetrievalRequest はtraceがrunで実際履行したrequest identity/input digestを固定します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_records
      labels:
        zh: 反向读取
        en: inverse records
        ja: 逆方向読取
    conditions:
      - id: RetrievalTrace-records-RetrievalRequest-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the trace's run fulfills the same request_id.
        explanations:
          zh: 仅当 trace.run_id 所属运行 fulfills 同一 request_id 时建立。
          en: Assert only when the trace's run fulfills the same request_id.
          ja: trace.run_id所属runが同じrequest_idをfulfillする時だけassertします。
        source_claims:
          - claim-retrieval-trace-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalTrace-records-RetrievalRequest-example-positive-manual-001
        labels:
          zh: records RetrievalRequest正例
          en: "Positive case: records RetrievalRequest"
          ja: RetrievalRequestをrecords正例
        descriptions:
          zh: trace-426 records request-419。
          en: trace-426 records request-419.
          ja: trace-426がrequest-419を記録します。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - RetrievalRequest
        related_relation_ids:
          - RetrievalTrace-records-RetrievalRequest
        source_claims:
          - claim-retrieval-trace-id
      - id: RetrievalTrace-records-RetrievalRequest-example-boundary-manual-001
        labels:
          zh: records RetrievalRequest边界例
          en: "Boundary case: records RetrievalRequest"
          ja: RetrievalRequestをrecords境界例
        descriptions:
          zh: 相同 query_text 的另一请求不能替换 request-419。
          en: Another request with the same query_text cannot substitute for request-419.
          ja: 同query_textの別requestをrequest-419の代替にできません。
        field_values: {}
        related_node_ids:
          - RetrievalTrace
          - RetrievalRequest
        related_relation_ids:
          - RetrievalTrace-records-RetrievalRequest
        source_claims:
          - claim-retrieval-trace-id
    source_claims:
      - claim-retrieval-trace-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievalRequest
