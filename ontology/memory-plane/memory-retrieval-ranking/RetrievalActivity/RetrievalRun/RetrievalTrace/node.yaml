schema: moonweave.ai/ontology-node/v1
id: RetrievalTrace
kind: concept
status: accepted
labels:
  zh: 检索追踪记录
  en: Retrieval trace
  ja: 検索trace
semantics:
  short_definition:
    zh: 记录一次检索运行的请求、实际索引版本、阶段身份和关键配置的可重放追踪信息。
    en: A replay record of one retrieval run's request, actual index version, stage identities, and material configuration.
    ja: 一retrieval runのrequest・actual index version・stage identity・主要configurationを記録するreplay traceです。
  definition:
    zh: RetrievalTrace 是 RetrievalRun 的组成信息，按执行顺序记录请求、实际 IndexVersion、候选生成和排序活动及其版本化参数；它支持定位首个分歧阶段，但不是通用日志流、运行本身或最终结果。
    en: RetrievalTrace is the information component of RetrievalRun that records the request, actual IndexVersion, candidate-generation and ranking activities, and their versioned parameters in execution order. It supports locating the first divergent replay stage but is not a generic log stream, the run itself, or the final result.
    ja: RetrievalTrace はRetrievalRunのinformation componentでrequest・actual IndexVersion・candidate-generation/ranking activity・versioned parameterを実行順に記録します。first divergent replay stageを特定しますがgeneric log stream・run自体・final resultではありません。
  why_needed:
    zh: 为可重放检索提供最小充分的阶段、版本和参数证据。
    en: Provides minimally sufficient stage, version, and parameter evidence for replayable retrieval.
    ja: replayable retrievalに最小十分なstage・version・parameter evidenceを提供します。
  includes:
    - zh: 纳入能把运行还原到请求、索引版本、阶段顺序与不可替代模型/参数的结构化记录。
      en: Includes structured records that reconstruct request, index version, stage order, and non-substitutable model or parameter choices.
      ja: request・index version・stage order・置換不能model/parameterを再構成できるstructured recordを含みます。
  excludes:
    - zh: 排除无关联日志文本、仅有最终候选的结果、指标汇总和上下文追踪。
      en: Excludes uncorrelated log text, results containing only final candidates, metric summaries, and context traces.
      ja: 未相関log text・final candidateだけのresult・metric summary・context traceを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - trace_id
  fields:
    - id: trace_id
      labels:
        zh: 追踪标识
        en: trace ID
        ja: trace ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次检索运行的追踪记录。
        en: Stable identifier for one retrieval run's trace record.
        ja: 一retrieval runのtrace recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-trace-426
      source_claims:
        - claim-retrieval-trace-002
    - id: run_id
      labels:
        zh: 运行标识
        en: run ID
        ja: run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该追踪记录所属的 RetrievalRun。
        en: Identifies the RetrievalRun owning this trace.
        ja: このtraceを所有するRetrievalRunを識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-run-411
      source_claims:
        - claim-retrieval-trace-003
    - id: stage_sequence
      labels:
        zh: 阶段序列
        en: stage sequence
        ja: stage sequence
      datatype: array<string>
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按实际执行顺序记录阶段活动标识。
        en: Records stage activity identifiers in actual execution order.
        ja: 実際execution orderでstage activity IDを記録します。
      allowed_values: []
      pattern: null
      example_value:
        - candidate-generation-412
        - candidate-scoring-414
        - rank-fusion-415
        - rerank-416
        - topk-417
      source_claims:
        - claim-retrieval-trace-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalTrace-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索追踪记录正例
      en: "Positive case: Retrieval trace"
      ja: 検索trace正例
    scenario_id: null
    descriptions:
      zh: trace-426 记录 request-419、index-v19 与五个实际阶段的顺序和版本。
      en: trace-426 records request-419, index-v19, and the order and versions of five actual stages.
      ja: trace-426 はrequest-419・index-v19・五actual stageのorder/versionを記録します。
    field_values:
      trace_id: retrieval-trace-426
      run_id: retrieval-run-411
      stage_sequence:
        - candidate-generation-412
        - candidate-scoring-414
        - rank-fusion-415
        - rerank-416
        - topk-417
    related_node_ids:
      - RetrievalTrace
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalTrace。
      en: Classify the object as RetrievalTrace.
      ja: RetrievalTrace として分類します。
    why_valid_or_invalid:
      zh: 记录足以从同一请求与索引版本逐阶段重放并定位差异。
      en: The record is sufficient to replay from the same request and index version and locate stage divergence.
      ja: 同じrequest/index versionからstage別replayしdivergenceを特定できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-trace-005
  - id: RetrievalTrace-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索追踪记录边界例
      en: "Boundary case: Retrieval trace"
      ja: 検索trace境界例
    scenario_id: null
    descriptions:
      zh: log-426 只写“检索完成”，没有请求、索引版本或阶段参数。
      en: log-426 only says 'retrieval completed' and omits request, index version, and stage parameters.
      ja: log-426 はretrieval completedとだけ記しrequest・index version・stage parameterがありません。
    field_values: {}
    related_node_ids:
      - RetrievalTrace
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalTrace。
      en: Do not classify the object as RetrievalTrace.
      ja: RetrievalTrace として分類しません。
    why_valid_or_invalid:
      zh: 它不足以作为可重放 RetrievalTrace。
      en: It is insufficient as a replayable RetrievalTrace.
      ja: replayable RetrievalTraceとして不十分です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-trace-006
