schema: moonweave.ai/ontology-node/v1
id: RetrievalArtifact
kind: concept
status: review
labels:
  zh: 检索信息产物
  en: Retrieval artifact
  ja: 検索情報成果物
semantics:
  short_definition:
    zh: 由检索活动消费、产生或记录且具有稳定身份的信息对象。
    en: An information object with stable identity that retrieval activities consume, produce, or record.
    ja: retrieval activityがconsume・produce・recordするstable identity付きinformation objectです。
  definition:
    zh: RetrievalArtifact 是检索域信息对象的根：请求、结果与候选直接属于此树，查询、过滤器、候选集合、分数和追踪记录通过其拥有者作为组成信息展开；它不是执行活动、索引结构或上下文包。
    en: RetrievalArtifact is the root for retrieval-domain information objects. Requests, results, and candidates are direct subtypes; queries, filters, candidate sets, scores, and traces are expanded as information components of their owners. It is not an execution activity, index structure, or context package.
    ja: RetrievalArtifact はretrieval-domain information objectのrootです。request・result・candidateはdirect subtype、query・filter・candidate set・score・traceはownerのinformation componentです。execution activity・index structure・context packageではありません。
  why_needed:
    zh: 形成与 RetrievalActivity 平行的信息产物树，使数据记录不再与执行阶段混为同级。
    en: Forms an information-artifact tree parallel to RetrievalActivity so records are not flattened with execution stages.
    ja: RetrievalActivityと並行するinformation-artifact treeを形成しrecordとexecution stageを同列化しません。
  includes:
    - zh: 纳入具有稳定标识且由检索执行消费、输出或记录的请求、结果、候选及组成信息。
      en: Includes identified requests, results, candidates, and information components consumed, output, or recorded by retrieval execution.
      ja: retrieval executionがconsume・output・recordするidentity付きrequest・result・candidate・information componentを含みます。
  excludes:
    - zh: 排除 RetrievalActivity 及其阶段、IndexVersion 内部结构、ContextPackage、规则文档和来源文献。
      en: Excludes RetrievalActivity and its stages, IndexVersion internals, ContextPackage, rule documents, and source literature.
      ja: RetrievalActivity/stage・IndexVersion内部・ContextPackage・rule document・source literatureを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
  fields:
    - id: artifact_id
      labels:
        zh: 产物标识
        en: artifact ID
        ja: artifact ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个检索域信息产物。
        en: Stable identifier for one retrieval-domain information artifact.
        ja: 一つのretrieval-domain information artifactを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-artifact-418
      source_claims:
        - claim-retrieval-artifact-002
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该信息产物形成的事件时间。
        en: Event time at which the information artifact was formed.
        ja: information artifact形成のevent timeを記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:18:00Z
      source_claims:
        - claim-retrieval-artifact-003
  constraints: []
  required_relation_constraints: []
