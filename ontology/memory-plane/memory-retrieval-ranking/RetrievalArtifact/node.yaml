schema: moonweave.ai/ontology-node/v1
id: RetrievalArtifact
kind: concept
status: accepted
labels:
  zh: 检索工件
  en: Retrieval Artifact
  ja: 検索工件
semantics:
  short_definition:
    zh: 被检索活动消费或产生、可独立标识并保留来源边界的请求、候选、结果或追踪数据对象。
    en: An independently identifiable request, candidate, result, or trace data object consumed or produced by retrieval activity with preserved provenance boundary.
    ja: retrieval activity が消費または生成し、独立に識別でき provenance boundary を保持する request、candidate、result、trace の data object。
  definition:
    zh: RetrievalArtifact 是检索 I/O 的静态数据实体，可表现为 RetrievalRequest、RetrievalResult、RetrievedCandidate 或 RetrievalTrace，也可作为请求的组成部分如 RetrievalQuery 与 RetrievalFilter。它保存身份、种类、范围与来源引用，但不是执行中的 RetrievalActivity、评分算法、索引、embedding、上下文包或模型输出。一个工件被活动使用或产生需要单独的活动关系，不能从其文件或目录位置推断。
    en: RetrievalArtifact is a static data entity in retrieval I/O and can be a RetrievalRequest, RetrievalResult, RetrievedCandidate, or RetrievalTrace, as well as a request component such as RetrievalQuery or RetrievalFilter. It preserves identity, kind, scope, and provenance reference, but is not a running RetrievalActivity, scoring algorithm, index, embedding, context package, or model output. An artifact's use or generation by activity requires a separate activity relation and cannot be inferred from file or directory location.
    ja: RetrievalArtifact は retrieval I/O の静的 data entity であり、RetrievalRequest、RetrievalResult、RetrievedCandidate、RetrievalTrace、または RetrievalQuery・RetrievalFilter のような request component になれます。identity、kind、scope、provenance 参照を保持しますが、実行中 RetrievalActivity、scoring algorithm、index、embedding、context package、model output ではありません。activity による artifact の使用または生成には別個の activity relation が必要で、file や directory location から推定できません。
  why_needed:
    zh: 请求、候选、分数和结果的生命周期与执行活动不同。将它们建成工件允许在多次运行、重试、不同排序方法和后续上下文装配中引用同一输入或输出，同时不把任何数据记录误作一次已经发生的检索。
    en: Requests, candidates, scores, and results have lifecycles distinct from execution activities. Modeling them as artifacts lets systems reference the same input or output across runs, retries, different ranking methods, and later context assembly without treating any data record as retrieval that already occurred.
    ja: request、candidate、score、result の lifecycle は execution activity と異なります。artifact として model 化すると、run、retry、異なる ranking method、後続 context assembly をまたいで同じ input または output を参照でき、data record を既に起きた retrieval と扱いません。
  includes:
    - zh: 具有工件标识、种类、检索范围和完整性或来源引用的请求、候选、结果和追踪记录。
      en: Request, candidate, result, and trace records carrying artifact ID, kind, retrieval scope, and integrity or provenance reference.
      ja: artifact ID、kind、retrieval scope、integrity または provenance 参照を持つ request、candidate、result、trace record。
  excludes:
    - zh: 活动开始结束时间、执行器状态、索引实现、模型 embedding、排名政策以及模型 ContextPackage。
      en: Activity start and end time, executor status, index implementation, model embedding, ranking policy, and model ContextPackage.
      ja: activity start・end time、executor status、index implementation、model embedding、ranking policy、model ContextPackage。
  semantic_kind: entity
  aliases: [search data artifact, retrieval record, 检索数据对象]
engineering:
  explanation:
    zh: LangChain 将 retriever 返回的文档作为数据对象，供后续 RAG 流程消费。PROV-O 区分 Entity 与生成或使用它的 Activity。Moonweave 将检索请求、候选和结果作为 RetrievalArtifact，并将一次执行保留在 RetrievalActivity 中，因此同一候选可由多个排序活动重新评分而不被复制为新的活动。
    en: LangChain treats documents returned by a retriever as data objects for subsequent RAG flow. PROV-O distinguishes an Entity from the Activity that generates or uses it. Moonweave models retrieval request, candidate, and result as RetrievalArtifact and retains one execution in RetrievalActivity, so the same candidate can be rescored by multiple ranking activities without being copied into a new activity.
    ja: LangChain は retriever が返す document を後続 RAG flow が消費する data object と扱います。PROV-O は Entity とそれを生成・使用する Activity を区別します。Moonweave は retrieval request、candidate、result を RetrievalArtifact、一回の execution を RetrievalActivity として保持するため、同じ candidate を複数 ranking activity が再 scoring しても新 activity に複製されません。
  typical_input:
    - description: Retriever output treated as artifact input to later processing
      format: |
        documents = retriever.invoke("refund policy")
        # documents are data returned by retrieval, not the retrieval call itself
  typical_output:
    - description: Artifact envelope
      format: |
        {
          "retrieval_artifact_id": "candidate-42",
          "artifact_kind": "candidate",
          "retrieval_scope_id": "scope-support-18",
          "provenance_ref": "source-memory-42-v3"
        }
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents retrievers returning documents for queries within a RAG workflow.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines Entity and Activity as distinct provenance classes.
structure:
  identity_keys: [retrieval_artifact_id]
  fields:
    - id: retrieval_artifact_id
      labels: {zh: 检索工件标识, en: retrieval artifact ID, ja: retrieval artifact ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个检索 I/O 对象，不复用为活动、索引或模型响应标识。
        en: Stably identifies one retrieval I/O object and is not reused as activity, index, or model-response ID.
        ja: 一つの retrieval I/O object を安定して識別し、activity、index、model-response ID として再利用しません。
      allowed_values: []
      pattern: "^(?:retrieval-request|retrieval-result|candidate|retrieval-trace)-[A-Za-z0-9._-]+$"
      example_value: candidate-42
      source_claims: [claim-retrieval-artifact-entity-boundary]
    - id: artifact_kind
      labels: {zh: 工件种类, en: artifact kind, ja: artifact kind}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分请求、结果、候选或追踪工件，不能用种类掩盖活动状态或评分方法。
        en: Distinguishes request, result, candidate, or trace artifact and cannot use kind to conceal activity status or scoring method.
        ja: request、result、candidate、trace artifact を区別し、kind で activity status や scoring method を隠せません。
      allowed_values: [request, result, candidate, trace]
      pattern: null
      example_value: candidate
      source_claims: [claim-retrieval-artifact-entity-boundary]
    - id: retrieval_scope_id
      labels: {zh: 检索范围标识, en: retrieval scope ID, ja: retrieval scope ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识请求、租户、索引版本或运行边界所限定的检索范围，不等同于权限授权本身。
        en: Identifies the retrieval scope limited by request, tenant, index revision, or run boundary and is not authorization itself.
        ja: request、tenant、index revision、run boundary が限定する retrieval scope を識別し、authorization 自体ではありません。
      allowed_values: []
      pattern: "^scope-[A-Za-z0-9._-]+$"
      example_value: scope-support-18
      source_claims: [claim-retrieval-artifact-provenance]
    - id: provenance_ref
      labels: {zh: 来源引用, en: provenance reference, ja: provenance 参照}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 指向源对象、请求或活动审计记录；缺失时表示来源尚未解析，不可声称候选可验证。
        en: Points to source object, request, or activity audit record; absence means provenance is unresolved and candidate cannot be claimed verified.
        ja: source object、request、activity audit record を指し、欠ける場合 provenance は未解決で candidate を検証済みと主張できません。
      allowed_values: []
      pattern: null
      example_value: source-memory-42-v3
      source_claims: [claim-retrieval-artifact-provenance]
    - id: integrity_digest
      labels: {zh: 完整性摘要, en: integrity digest, ja: integrity digest}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 可选的内容或清单摘要，用于检测工件变化，不等同于相关性分数或来源权限。
        en: Optional content or manifest digest for detecting artifact change and not relevance score or source permission.
        ja: artifact change 検出用の任意 content または manifest digest であり、relevance score や source permission ではありません。
      allowed_values: []
      pattern: "^sha256-[A-Za-z0-9._-]+$"
      example_value: sha256-candidate-42-v1
      source_claims: [claim-retrieval-artifact-provenance]
  constraints:
    - id: retrieval-artifact-kind-and-provenance
      severity: error
      expression_language: plain
      expression: Every artifact requires ID, kind, and retrieval_scope_id. A result or candidate that will inform a downstream decision must resolve provenance_ref or explicitly record unresolved provenance; an artifact must not contain activity-only lifecycle fields as its identity.
      explanation:
        zh: 工件可被复用和审计，但执行时间与状态属于独立活动。
        en: Artifacts can be reused and audited, while execution time and status belong to separate activity.
        ja: artifact は再利用・監査できますが、execution time と status は別 activity に属します。
      source_claims: [claim-retrieval-artifact-entity-boundary, claim-retrieval-artifact-provenance]
    - id: retrieval-artifact-context-boundary
      severity: error
      expression_language: plain
      expression: RetrievalArtifact cannot alone establish ContextPackage inclusion, model use, answer correctness, or memory persistence. Those claims require ContextAssembly, invocation, evaluation, or memory-lifecycle facts respectively.
      explanation:
        zh: 工件存在只证明检索输入或输出对象存在，不证明下游如何处理它。
        en: Artifact existence proves only a retrieval input or output object exists, not how downstream systems handled it.
        ja: artifact の存在は retrieval input または output object の存在だけを証明し、下流 system がどう扱ったかを証明しません。
      source_claims: [claim-retrieval-artifact-rag-boundary]
  required_relations: []
examples:
  - id: retrieval-artifact-example-positive-candidate

    labels: {zh: 带来源的候选工件, en: Candidate artifact with provenance, ja: provenance 付き candidate artifact}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      retrieval_artifact_id: candidate-42
      artifact_kind: candidate
      retrieval_scope_id: scope-support-18
      provenance_ref: source-memory-42-v3
      integrity_digest: sha256-candidate-42-v1
    related_node_ids: [RetrievalArtifact, RetrievedCandidate, RetrievalResult]
    related_relation_ids: []

    source_claims: [claim-retrieval-artifact-provenance]
  - id: retrieval-artifact-example-counterexample-running-call

    labels: {zh: 运行中的调用不是工件, en: Running call is not artifact, ja: 実行中 call は artifact ではない}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      executor_ref: retrieval-impl-pgvector-l2-v1
      started_at: "2026-07-19T03:20:00Z"
      execution_status: running
      retrieval_artifact_id: null
    related_node_ids: [RetrievalArtifact, RetrievalActivity]
    related_relation_ids: []

    source_claims: [claim-retrieval-artifact-entity-boundary]
  - id: retrieval-artifact-example-boundary-context-package

    labels: {zh: 上下文包不是检索工件, en: Context package is not retrieval artifact, ja: context package は retrieval artifact ではない}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      context_package_id: ctx-package-18
      retrieval_artifact_id: null
      artifact_kind: null
      model_input_budget: 7168
    related_node_ids: [RetrievalArtifact, ContextPackage, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-retrieval-artifact-rag-boundary]
  - id: retrieval-artifact-example-instance-langchain-documents

    labels: {zh: "实例：retriever 返回的文档", en: "Instance: documents returned by retriever", ja: "インスタンス：retriever が返す document"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values:
      retrieval_artifact_id: candidate-42
      artifact_kind: candidate
      retrieval_scope_id: scope-support-18
      provenance_ref: source-memory-42-v3
      integrity_digest: sha256-candidate-42-v1
    related_node_ids: [RetrievalArtifact, RetrievedCandidate, RetrievalActivity]
    related_relation_ids: []
    source_claims: [claim-retrieval-artifact-entity-boundary]
parent_relation: null
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Defines retrievers returning documents for unstructured queries in a RAG workflow.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    source_type: academic-paper
    url: https://arxiv.org/abs/2005.11401
    relevance: Describes retrieved non-parametric memory supplied to a downstream generator.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines Entity and Activity distinctions for provenance.
source_claims:
  - id: claim-retrieval-artifact-entity-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes Entity from Activity. Moonweave models requests, candidates, results, and traces as retrieval entities, separate from retrieval activities that use or generate them.
    locator: "PROV-O Entity and Activity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-artifact-provenance
    source: w3c-prov-o
    supports: PROV-O provides usage and generation relations linking activities and entities. Moonweave requires a retrieval artifact to retain resolvable provenance or explicitly mark it unresolved without treating that provenance as model-use proof.
    locator: "PROV-O used and wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-artifact-rag-boundary
    source: rag-paper
    supports: RAG conditions downstream generation on retrieved non-parametric memory. The paper supports a boundary between retrieval output and generation, while Moonweave's distinction from ContextPackage is a local design inference.
    locator: "Abstract and model overview"
    evidence_kind: ontology-design-inference
    confidence: high
