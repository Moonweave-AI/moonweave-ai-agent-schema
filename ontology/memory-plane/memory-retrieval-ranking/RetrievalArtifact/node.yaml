      ja: RetrievalArtifact として分類します。
    why_valid_or_invalid:
      zh: 它是稳定可引用的信息对象，而不是执行。
      en: It is a stable, referencable information object rather than an execution.
      ja: stableに参照できるinformation objectでexecutionではありません。
