      ja: RetrievalArtifact として分類しません。
    why_valid_or_invalid:
      zh: 它具有活动身份和时间边界，应归 RetrievalActivity。
      en: It has activity identity and a temporal boundary, so it belongs under RetrievalActivity.
      ja: activity identityと時間境界を持つためRetrievalActivityに属します。
