schema: moonweave.ai/ontology-node/v1
id: RetrievalArtifact
kind: concept
labels:
  zh: 检索信息产物
  en: Retrieval artifact
  ja: 検索情報成果物
semantics:
  short_definition:
    zh: 检索域的信息产物根。
    en: Root of retrieval-domain information artifacts.
    ja: retrieval domain information artifact の root。
  definition:
    zh: RetrievalArtifact 是检索域信息对象根：RetrievalRequest、RetrievalResult、RetrievedCandidate 为直接子类；RetrievalQuery、RetrievalFilter、CandidateSet、RetrievalScore、RetrievalTrace 作为组成信息展开。它不是 RetrievalActivity、IndexVersion 内部或 ContextPackage。
    en: RetrievalArtifact is the root for retrieval information objects. RetrievalRequest, RetrievalResult, and RetrievedCandidate are direct subtypes; RetrievalQuery, RetrievalFilter, CandidateSet, RetrievalScore, and RetrievalTrace expand as components. It is not RetrievalActivity, IndexVersion internals, or ContextPackage.
    ja: RetrievalArtifact は retrieval information root。RetrievalRequest/RetrievalResult/RetrievedCandidate が direct subtype。RetrievalQuery/RetrievalFilter/CandidateSet/RetrievalScore/RetrievalTrace は component。
  why_needed:
    zh: 把“执行过程”和“请求/候选/分数/结果记录”分成两棵树，避免把 Pinecone QueryResponse 误当作一次活动。
    en: Separating execution from request/candidate/score/result records prevents treating a Pinecone QueryResponse as an activity.
    ja: 実行と request/candidate/score/result を二 tree に分離し QueryResponse を activity と誤認しない。
  includes:
    - zh: 纳入有稳定 artifact_id 且由检索执行消费或产生的信息对象。
      en: Includes information objects with stable artifact_id consumed or produced by retrieval.
      ja: stable artifact_id を持ち retrieval が consume/produce する information object。
  excludes:
    - zh: 排除 RetrievalActivity、IndexVersion 内部与 ContextPackage。
      en: Excludes RetrievalActivity, IndexVersion internals, and ContextPackage.
      ja: RetrievalActivity/IndexVersion 内部/ContextPackage を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone QueryResponse、Chroma QueryResult、Mem0 search 响应与 Cohere rerank 响应均拆为 RetrievalArtifact 子类型，而非活动。
    en: Pinecone QueryResponse, Chroma QueryResult, Mem0 search responses, and Cohere rerank responses decompose into RetrievalArtifact subtypes, not activities.
    ja: QueryResponse/QueryResult/search/rerank 响应は RetrievalArtifact subtype に分解。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - artifact_id
  fields:
    - id: artifact_id
      labels:
        zh: 产物标识
        en: Artifact identifier
        ja: artifact 識別子
      definitions:
        zh: 稳定标识一个检索域信息产物。
        en: Stable identifier for one retrieval information artifact.
        ja: 一 retrieval information artifact を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: retrieval-artifact-418
      allowed_values: []
      source_claims:
        - claim-retrieval-artifact-id
    - id: created_at
      labels:
        zh: 创建时间
        en: Created at
        ja: 作成時刻
      definitions:
        zh: 信息产物形成的事件时间。
        en: Event time when the artifact was formed.
        ja: artifact 形成 event time。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T02:18:00Z
      allowed_values: []
      source_claims:
        - claim-retrieval-artifact-created
  constraints: []
  required_relations: []
examples:
  - id: RetrievalArtifact-example-pinecone-response
    labels:
      zh: Pinecone 响应产物
      en: Pinecone response artifact
      ja: Pinecone 响应 artifact
    descriptions:
      zh: Pinecone QueryResponse.matches 映射为 RetrievedCandidate 列表，整体请求/结果封装为 RetrievalRequest/RetrievalResult。
      en: Pinecone QueryResponse.matches map to RetrievedCandidate list; request/result envelope as RetrievalRequest/RetrievalResult.
      ja: QueryResponse.matches→RetrievedCandidate。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: QueryResponse
    field_values:
      artifact_id: result-422
      created_at: 2026-07-16T02:18:00Z
    related_node_ids:
      - RetrievalArtifact
      - RetrievalResult
    related_relation_ids: []
    source_claims:
      - claim-retrieval-artifact-pinecone
  - id: RetrievalArtifact-example-chroma-result
    labels:
      zh: Chroma 查询结果
      en: Chroma query result
      ja: Chroma query result
    descriptions:
      zh: Chroma QueryResult 的 ids/documents/distances 映射为 RetrievedCandidate 与 SimilarityScore。
      en: Chroma QueryResult ids/documents/distances map to RetrievedCandidate and SimilarityScore.
      ja: QueryResult→RetrievedCandidate/SimilarityScore。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: QueryResult
    field_values: {}
    related_node_ids:
      - RetrievalArtifact
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieval-artifact-chroma
  - id: RetrievalArtifact-example-not-activity
    labels:
      zh: 产物非活动
      en: Artifact is not activity
      ja: artifact は activity ではない
    descriptions:
      zh: activity-418 正在执行候选生成；artifact-418 是已形成的候选记录。
      en: activity-418 executes candidate generation; artifact-418 is a formed candidate record.
      ja: activity は実行中、artifact は形成済み record。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievalArtifact
      - RetrievalActivity
    related_relation_ids: []
    source_claims:
      - claim-retrieval-artifact-boundary
parent_relation: null
relations: []
