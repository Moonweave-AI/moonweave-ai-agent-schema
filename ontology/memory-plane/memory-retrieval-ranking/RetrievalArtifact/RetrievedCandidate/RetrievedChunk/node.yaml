schema: moonweave.ai/ontology-node/v1
id: RetrievedChunk
kind: concept
labels:
  zh: 已检索块候选
  en: Retrieved chunk candidate
  ja: 取得chunk候補
semantics:
  short_definition:
    zh: 命中具体 chunk 的候选细化。
    en: Candidate refined to a specific chunk hit.
    ja: 具体 chunk hit への candidate 细化。
  definition:
    zh: RetrievedChunk 是 RetrievedCandidate 子类，当 referent_id 指向 Chunk/IndexEntry 等分块内容时使用；保留 chunk_id 与 source_span 引用，映射 Pinecone metadata.chunk_id 或 Chroma document metadata。它不是 Chunk 实体本身，而是检索命中视图。
    en: RetrievedChunk is a RetrievedCandidate subtype when referent_id points to Chunk/IndexEntry content, preserving chunk_id and source_span references. Maps Pinecone metadata.chunk_id or Chroma document metadata. It is a retrieval hit view, not the Chunk entity itself.
    ja: RetrievedChunk は referent が Chunk/IndexEntry の RetrievedCandidate subtype。chunk_id/source_span 保持。Chunk 实体自体ではない。
  why_needed:
    zh: RAG 返回的是 chunk 片段而非整篇文档；必须区分“检索命中记录”与 chunk 规范实体以便回到原文边界。
    en: RAG returns chunk segments not whole documents; retrieval hit records must differ from canonical Chunk entities for source-boundary return.
    ja: RAG は chunk 片段を返すため hit record と Chunk entity を分離必須。
  includes:
    - zh: 纳入 referent 为 chunk/index entry 的 RetrievedCandidate 细化。
      en: Includes RetrievedCandidate refinements whose referent is a chunk or index entry.
      ja: referent が chunk/index entry の细化。
  excludes:
    - zh: 排除 Chunk 规范实体、整文档 referent 与 ContextPackage。
      en: Excludes canonical Chunk entities, whole-document referents, and ContextPackage.
      ja: canonical Chunk/整 document referent/ContextPackage を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone include_metadata chunk_id→referent_id；Chroma metadatas chunk_id；Moonweave maps to RetrievedChunk with refers_to Chunk relation.
    en: Pinecone include_metadata chunk_id→referent_id; Chroma metadatas chunk_id; Moonweave maps to RetrievedChunk with refers_to Chunk relation.
    ja: metadata chunk_id 映射与 refers_to Chunk。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - candidate_id
  fields:
    - id: candidate_id
      labels:
        zh: 候选标识
        en: Candidate identifier
        ja: candidate 識別子
      definitions:
        zh: 继承 RetrievedCandidate.candidate_id。
        en: Inherits RetrievedCandidate.candidate_id.
        ja: RetrievedCandidate.candidate_id 継承。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-424
      allowed_values: []
      source_claims:
        - claim-retrieved-chunk-candidate
    - id: chunk_id
      labels:
        zh: 分块标识
        en: Chunk identifier
        ja: chunk 識別子
      definitions:
        zh: 命中的 chunk 业务 id；通常等于 referent_id 或 metadata.chunk_id。
        en: Hit chunk business id; usually equals referent_id or metadata.chunk_id.
        ja: hit chunk id。metadata.chunk_id。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: chunk-882
      allowed_values: []
      source_claims:
        - claim-retrieved-chunk-id
    - id: source_span_ref
      labels:
        zh: 来源跨度引用
        en: Source span reference
        ja: source span 参照
      definitions:
        zh: 可选指向精确字符/token 边界的 span 引用。
        en: Optional reference to exact character/token boundary span.
        ja: optional character/token span ref。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: source-span-policy-12
      allowed_values: []
      source_claims:
        - claim-retrieved-chunk-span
  constraints: []
  required_relations: []
examples:
  - id: RetrievedChunk-example-pinecone-metadata
    labels:
      zh: Pinecone metadata chunk
      en: Pinecone metadata chunk
      ja: Pinecone metadata chunk
    descriptions:
      zh: candidate-424 RetrievedChunk chunk_id=chunk-882 from Pinecone metadata include_metadata=True。
      en: candidate-424 RetrievedChunk chunk_id=chunk-882 from Pinecone metadata with include_metadata=True.
      ja: Pinecone metadata chunk_id。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: include_metadata
    field_values:
      candidate_id: candidate-424
      chunk_id: chunk-882
    related_node_ids:
      - RetrievedChunk
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieved-chunk-pinecone
  - id: RetrievedChunk-example-chroma
    labels:
      zh: Chroma document chunk
      en: Chroma document chunk
      ja: Chroma document chunk
    descriptions:
      zh: candidate-425 chunk_id from Chroma metadatas chunk_id field。
      en: candidate-425 chunk_id from Chroma metadatas chunk_id field.
      ja: Chroma metadatas chunk_id。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: metadatas
    field_values:
      candidate_id: candidate-425
      chunk_id: chunk-policy-7-003
    related_node_ids:
      - RetrievedChunk
    related_relation_ids: []
    source_claims:
      - claim-retrieved-chunk-chroma
  - id: RetrievedChunk-example-not-chunk-entity
    labels:
      zh: 非 Chunk 实体
      en: Not Chunk entity
      ja: Chunk 实体ではない
    descriptions:
      zh: chunk-882 规范 Chunk 实体是 memory-chunking 产物；RetrievedChunk 只是本次检索命中视图。
      en: Canonical chunk-882 Chunk entity belongs to memory-chunking; RetrievedChunk is only this retrieval hit view.
      ja: canonical Chunk と hit view を分離。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievedChunk
      - memory-chunking-situating
    related_relation_ids: []
    source_claims:
      - claim-retrieved-chunk-boundary
parent_relation:
  id: RetrievedChunk-is_a-RetrievedCandidate
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievedCandidate
    en: is a RetrievedCandidate
    ja: RetrievedCandidateの一種
  definitions:
    zh: RetrievedChunk —is_a→ RetrievedCandidate 成立，因为它先满足候选定义，且其 referent 的严格类型是 Chunk。
    en: RetrievedChunk —is_a→ RetrievedCandidate holds because it satisfies the candidate definition and its referent has the strict type Chunk.
    ja: RetrievedChunk —is_a→ RetrievedCandidate はcandidate定義を満たしreferentのstrict typeがChunkであるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RetrievedChunk-is_a-RetrievedCandidate-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievedCandidate definition and the child differentia: it satisfies the candidate definition and its referent has the strict type Chunk."
      explanations:
        zh: 仅当实例既满足 RetrievedCandidate 的完整定义，又满足子类种差“它先满足候选定义，且其 referent 的严格类型是 Chunk。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievedCandidate definition and the child differentia: it satisfies the candidate definition and its referent has the strict type Chunk."
        ja: instanceがRetrievedCandidate完全定義とchild differentia「candidate定義を満たしreferentのstrict typeがChunkである」を共に満たす時だけassertします。
      source_claims:
        - claim-retrieved-chunk-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievedChunk-is_a-RetrievedCandidate-example-positive-manual-001
      labels:
        zh: 是一种RetrievedCandidate正例
        en: "Positive case: is a RetrievedCandidate"
        ja: RetrievedCandidateの一種正例
      descriptions:
        zh: candidate-425 以 chunk_id=chunk-882 指向既有 Chunk。
        en: candidate-425 points to existing Chunk chunk-882.
        ja: candidate-425が既存Chunk chunk-882を指します。
      field_values: {}
      related_node_ids:
        - RetrievedChunk
        - RetrievedCandidate
      related_relation_ids:
        - RetrievedChunk-is_a-RetrievedCandidate
      source_claims:
        - claim-retrieved-chunk-id
    - id: RetrievedChunk-is_a-RetrievedCandidate-example-boundary-manual-001
      labels:
        zh: 是一种RetrievedCandidate边界例
        en: "Boundary case: is a RetrievedCandidate"
        ja: RetrievedCandidateの一種境界例
      descriptions:
        zh: candidate-425 若指向完整 Document 而非 Chunk，则只属于 RetrievedCandidate。
        en: If candidate-425 refers to a full Document rather than a Chunk, it remains only RetrievedCandidate.
        ja: candidate-425がChunkでなくfull Documentを指すならRetrievedCandidateのみです。
      field_values: {}
      related_node_ids:
        - RetrievedChunk
        - RetrievedCandidate
      related_relation_ids:
        - RetrievedChunk-is_a-RetrievedCandidate
      source_claims:
        - claim-retrieved-chunk-id
  source_claims:
    - claim-retrieved-chunk-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RetrievedChunk-refers_to-Chunk
    predicate: refers_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: refers_to Chunk
      en: refers_to Chunk
      ja: Chunkをrefers_to
    definitions:
      zh: RetrievedChunk —refers_to→ Chunk 表示候选记录以 chunk_id 指向既有 Chunk，而不复制或重新拥有其内容身份。
      en: RetrievedChunk —refers_to→ Chunk states that the candidate record points by chunk_id to an existing Chunk without duplicating or re-owning its content identity.
      ja: RetrievedChunk —refers_to→ Chunk はcandidate recordがchunk_idで既存Chunkを指しcontent identityを複製/再所有しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_refers_to
      labels:
        zh: 反向读取
        en: inverse refers_to
        ja: 逆方向読取
    conditions:
      - id: RetrievedChunk-refers_to-Chunk-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when RetrievedChunk.chunk_id exactly matches the canonical Chunk identifier.
        explanations:
          zh: 仅当 RetrievedChunk.chunk_id 与 canonical Chunk 标识完全一致时建立。
          en: Assert only when RetrievedChunk.chunk_id exactly matches the canonical Chunk identifier.
          ja: RetrievedChunk.chunk_idがcanonical Chunk IDと完全一致する時だけassertします。
        source_claims:
          - claim-retrieved-chunk-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievedChunk-refers_to-Chunk-example-positive-manual-001
        labels:
          zh: refers_to Chunk正例
          en: "Positive case: refers_to Chunk"
          ja: Chunkをrefers_to正例
        descriptions:
          zh: candidate-425 refers_to chunk-882。
          en: candidate-425 refers to chunk-882.
          ja: candidate-425がchunk-882を参照します。
        field_values: {}
        related_node_ids:
          - RetrievedChunk
          - Chunk
        related_relation_ids:
          - RetrievedChunk-refers_to-Chunk
        source_claims:
          - claim-retrieved-chunk-id
      - id: RetrievedChunk-refers_to-Chunk-example-boundary-manual-001
        labels:
          zh: refers_to Chunk边界例
          en: "Boundary case: refers_to Chunk"
          ja: Chunkをrefers_to境界例
        descriptions:
          zh: 文本内容相似但 chunk_id 不同不能建立引用边。
          en: Similar text with a different chunk_id does not establish the reference.
          ja: text類似でもchunk_idが違えばreferenceを成立させません。
        field_values: {}
        related_node_ids:
          - RetrievedChunk
          - Chunk
        related_relation_ids:
          - RetrievedChunk-refers_to-Chunk
        source_claims:
          - claim-retrieved-chunk-id
    source_claims:
      - claim-retrieved-chunk-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Chunk
