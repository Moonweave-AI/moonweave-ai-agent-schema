schema: moonweave.ai/ontology-node/v1
id: RetrievedChunk
kind: concept
status: accepted
labels:
  zh: 已检索片段候选项
  en: Retrieved chunk
  ja: 取得済みチャンク候補
semantics:
  short_definition:
    zh: 将一个固定文档片段版本表示为给定检索请求范围内候选项的检索产物。
    en: A retrieval artifact representing one fixed document-chunk version as a candidate in a request scope.
    ja: 一つの固定 document-chunk version を request scope 内の candidate として表す retrieval artifact。
  definition:
    zh: >-
      RetrievedChunk 是 RetrievedCandidate 的子类型，引用一个 ChunkArtifact 版本以及使该片段成为候选项的请求、范围和生成来源。
      它不是原始完整文档、ChunkArtifact 本身、片段文本的副本、候选评分、最终上下文包成员资格或模型使用证据。
    en: >-
      A RetrievedChunk is a subtype of RetrievedCandidate that references one ChunkArtifact version and the request, scope,
      and generating provenance that made that fragment a candidate. It is not the original full document, ChunkArtifact itself,
      a copy of fragment text, a candidate score, final context-package membership, or model-use evidence.
    ja: >-
      RetrievedChunk は RetrievedCandidate の下位型であり、一つの ChunkArtifact version とその fragment を candidate にした request、scope、
      generating provenance を参照する。元の full document、ChunkArtifact 自体、fragment text の複製、candidate score、最終 context-package 所属、
      model-use evidence ではない。
  why_needed:
    zh: RAG 常将细粒度片段而非完整文档作为候选项；保留版本与范围可追踪检索证据而不复制内容。
    en: RAG commonly retrieves granular fragments rather than full documents; retaining version and scope makes evidence traceable without copying content.
    ja: RAG は full document ではなく細粒度 fragment を candidate にすることが多い。version と scope を保持し content を複製せず evidence を追跡できる。
  includes:
    - zh: 片段版本引用、请求引用、范围引用、片段定位信息和生成来源。
      en: Chunk-version reference request reference scope reference chunk locator and generating provenance.
      ja: chunk-version 参照 request 参照 scope 参照 chunk locator generating provenance。
  excludes:
    - zh: 完整文档正文、片段正文副本、嵌入向量、评分、排名、上下文选择、答案文本和存储写入。
      en: Full-document body fragment-body copy embedding vector score rank context selection answer text and storage write.
      ja: full-document body fragment-body copy embedding vector score rank context selection answer text storage write。
  semantic_kind: entity
  aliases: [chunk candidate, retrieved snippet, 片段检索结果]
engineering:
  explanation:
    zh: 检索实现返回与查询匹配的文档或片段；系统用稳定片段版本和检索来源包装返回项，并在后续评分和上下文选择中引用该候选项。
    en: Retrieval implementation returns documents or fragments matching a query; the system wraps each returned item with stable chunk version and retrieval provenance then references it in later scoring and context selection.
    ja: retrieval implementation は query に一致する document または fragment を返す。system は各 returned item を安定した chunk version と retrieval provenance で包み後続 scoring と context selection で参照する。
  typical_input:
    - description: Chunk version returned from a scoped retrieval operation.
      format: |
        {
          "source_chunk_ref": "chunk-support-reset-v3",
          "request_ref": "retrieval-request-support-42",
          "retrieval_scope_ref": "scope-support-42",
          "provenance_ref": "candidate-generation-support-42"
        }
  typical_output:
    - description: Candidate artifact referring to the returned chunk version.
      format: |
        {
          "retrieved_chunk_id": "retrieved-chunk-support-42",
          "source_chunk_ref": "chunk-support-reset-v3",
          "request_ref": "retrieval-request-support-42",
          "retrieval_scope_ref": "scope-support-42",
          "chunk_locator": "support-reset#chunk-3",
          "provenance_ref": "candidate-generation-support-42",
          "content_digest": "sha256-chunk-support-reset-v3"
        }
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents retrievers returning documents for query-based retrieval workflows.
    - name: Retrieval-Augmented Generation paper
      url: https://arxiv.org/abs/2005.11401
      description: Describes retrieved non-parametric memory supplied to downstream generation.
structure:
  identity_keys: [retrieved_chunk_id]
  fields:
    - id: retrieved_chunk_id
      labels:
        zh: 已检索片段标识
        en: retrieved chunk ID
        ja: retrieved chunk ID
      definitions:
        zh: 在给定请求和范围内稳定标识一个片段候选项表示，而不是源片段本身。
        en: Stably identifies one chunk-candidate representation in a request scope rather than the source chunk itself.
        ja: source chunk 自体ではなく request scope 内の一つの chunk-candidate representation を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieved-chunk-[A-Za-z0-9._-]+$'
      example_value: retrieved-chunk-support-42
      source_claims: [claim-retrieved-chunk-candidate]
    - id: source_chunk_ref
      labels:
        zh: 源片段引用
        en: source chunk reference
        ja: source chunk 参照
      definitions:
        zh: 指向该候选项表示的固定 ChunkArtifact 版本，不复制片段正文。
        en: Points to the fixed ChunkArtifact version represented by this candidate without copying fragment body.
        ja: fragment body を複製せずこの candidate が表す固定 ChunkArtifact version を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-support-reset-v3
      source_claims: [claim-retrieved-chunk-candidate]
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: request 参照
      definitions:
        zh: 指向使片段成为候选项的 RetrievalRequest。
        en: Points to the RetrievalRequest that made the chunk a candidate.
        ja: chunk を candidate にした RetrievalRequest を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-request-support-42
      source_claims: [claim-retrieved-chunk-scope]
    - id: retrieval_scope_ref
      labels:
        zh: 检索范围引用
        en: retrieval scope reference
        ja: retrieval scope 参照
      definitions:
        zh: 标识实际返回片段的命名空间、索引或其他检索范围，而不是授权决定。
        en: Identifies namespace index or other retrieval scope that returned the chunk and is not an authorization decision.
        ja: chunk を返した namespace index または retrieval scope を識別し authorization decision ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: scope-support-42
      source_claims: [claim-retrieved-chunk-scope]
    - id: chunk_locator
      labels:
        zh: 片段定位符
        en: chunk locator
        ja: chunk locator
      definitions:
        zh: 提供源文档内可复现的片段定位信息，不替代源片段引用或正文。
        en: Supplies reproducible fragment location within source document without replacing source reference or body.
        ja: source reference や body を置き換えず source document 内の再現可能な fragment location を提供する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-reset#chunk-3
      source_claims: [claim-retrieved-chunk-candidate]
    - id: provenance_ref
      labels:
        zh: 生成来源引用
        en: generating provenance reference
        ja: generating provenance 参照
      definitions:
        zh: 指向返回该候选项的检索活动或运行，不声明片段被模型使用。
        en: Points to retrieval activity or run returning the candidate and does not assert model use of the chunk.
        ja: candidate を返した retrieval activity または run を指し chunk の model use を主張しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-generation-support-42
      source_claims: [claim-retrieved-chunk-provenance]
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      definitions:
        zh: 用于验证被引用片段版本完整性的摘要值，不是检索相似度分数。
        en: Digest used to verify integrity of referenced chunk version and not a retrieval similarity score.
        ja: 参照された chunk version の完全性を検証する digest であり retrieval similarity score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-chunk-support-reset-v3
      source_claims: [claim-retrieved-chunk-provenance]
    - id: retrieved_candidate_id
      labels:
        zh: 候选标识
        en: retrieved candidate ID
        ja: retrieved candidate ID
      definitions:
        zh: 稳定标识同一固定片段版本在请求范围内的候选表示，而不是来源片段自身。
        en: Stably identifies the same fixed chunk version as a candidate representation in a request scope rather than the source chunk itself.
        ja: source chunk 自体ではなく、同じ固定 chunk version を request scope 内の candidate representation として安定識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-[A-Za-z0-9._-]+$'
      example_value: candidate-support-chunk-42
      source_claims: [claim-retrieved-chunk-candidate]
    - id: source_artifact_ref
      labels:
        zh: 来源工件引用
        en: source artifact reference
        ja: source artifact 参照
      definitions:
        zh: 指向此候选所表示的固定 ChunkArtifact 来源版本，而不复制片段正文。
        en: Points to the fixed ChunkArtifact source version represented by this candidate without copying its fragment body.
        ja: この candidate が表す固定 ChunkArtifact source version を指し、その fragment body を複製しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-support-policy-v3
      source_claims: [claim-retrieved-chunk-candidate]
    - id: candidate_digest
      labels:
        zh: 候选摘要
        en: candidate digest
        ja: candidate digest
      definitions:
        zh: 验证候选所代表的来源版本和关键请求范围引用未变，不是片段文本副本或相似度分数。
        en: Verifies that the represented source version and key request-scope references did not change and is not copied fragment text or a similarity score.
        ja: 表現された source version と主要 request-scope reference が変更されていないことを検証し、複製 fragment text や similarity score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-candidate-support-chunk-42
      source_claims: [claim-retrieved-chunk-provenance]
    - id: retrieval_artifact_id
      labels:
        zh: 检索工件标识
        en: retrieval artifact ID
        ja: retrieval artifact ID
      definitions:
        zh: 稳定标识同一片段候选作为检索 I/O 工件，不复用为活动、索引或模型响应标识。
        en: Stably identifies the same chunk candidate as a retrieval I/O artifact and is not reused as an activity, index, or model-response ID.
        ja: 同じ chunk candidate を retrieval I/O artifact として安定識別し、activity、index、model-response ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:retrieval-request|retrieval-result|candidate|retrieval-trace)-[A-Za-z0-9._-]+$'
      example_value: candidate-support-chunk-42
      source_claims: [claim-retrieved-chunk-candidate]
    - id: artifact_kind
      labels:
        zh: 工件种类
        en: artifact kind
        ja: artifact kind
      definitions:
        zh: 将本记录声明为 candidate 工件，而不是原始 ChunkArtifact、评分、上下文成员或模型使用证据。
        en: Declares this record to be a candidate artifact rather than the original ChunkArtifact, a score, a context member, or model-use evidence.
        ja: この record を candidate artifact として宣言し、元の ChunkArtifact、score、context member、model-use evidence ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [request, result, candidate, trace]
      pattern: null
      example_value: candidate
      source_claims: [claim-retrieved-chunk-candidate]
    - id: retrieval_scope_id
      labels:
        zh: 检索范围标识
        en: retrieval scope ID
        ja: retrieval scope ID
      definitions:
        zh: 标识返回此片段候选的检索范围，不是来源片段所有者或访问授权。
        en: Identifies the retrieval scope that returned this chunk candidate and is not the source-chunk owner or an authorization grant.
        ja: この chunk candidate を返した retrieval scope を識別し、source chunk owner や authorization grant ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^scope-[A-Za-z0-9._-]+$'
      example_value: scope-support-42
      source_claims: [claim-retrieved-chunk-scope]
  constraints:
    - id: retrieved-chunk-inherits-candidate-and-artifact-fields
      severity: error
      expression_language: plain
      expression: RetrievedChunk is one RetrievedCandidate and RetrievalArtifact record. retrieved_chunk_id, retrieved_candidate_id, and retrieval_artifact_id must resolve to the same request-scoped candidate; source_artifact_ref must resolve to source_chunk_ref; candidate_digest must cover the same source version and references as content_digest; artifact_kind must be candidate; retrieval_scope_id must resolve to retrieval_scope_ref; and request_ref plus provenance_ref remain facts of that same artifact.
      explanation:
        zh: 已检索片段是已检索候选项和检索工件的真实特化；片段来源、定位和内容摘要细化同一候选对象，而不复制来源或另建父工件。
        en: A retrieved chunk is a real retrieved-candidate and retrieval-artifact specialization; its chunk source, locator, and content digest refine one candidate object without copying the source or creating another parent artifact.
        ja: RetrievedChunk は真の RetrievedCandidate および RetrievalArtifact 特殊化であり、chunk source、locator、content digest は一つの candidate object を細化する。source を複製したり別の親 artifact を作ったりしない。
      source_claims: [claim-retrieved-chunk-candidate, claim-retrieved-chunk-provenance]
    - id: retrieved-chunk-source-request-scope
      severity: error
      expression_language: plain
      expression: source_chunk_ref, request_ref, retrieval_scope_ref, chunk_locator, provenance_ref, and content_digest are required. The source chunk version must be eligible in the declared request and scope when returned.
      explanation:
        zh: 片段候选项必须把固定源版本、请求、范围和生成记录绑定，防止无范围或不可复现的片段引用。
        en: A chunk candidate must bind fixed source version request scope and generating record to avoid unscoped or irreproducible fragment references.
        ja: chunk candidate は固定 source version request scope generating record を結び unscoped または再現不能な fragment reference を避ける。
      source_claims: [claim-retrieved-chunk-candidate, claim-retrieved-chunk-scope]
    - id: retrieved-chunk-not-score-or-context
      severity: error
      expression_language: plain
      expression: RetrievedChunk must not contain candidate score, rank, context-package membership, model-use evidence, answer text, or storage-write outcome.
      explanation:
        zh: 片段候选身份与评分、上下文选择和下游消费必须保持独立。
        en: Chunk-candidate identity must remain distinct from scoring context selection and downstream consumption.
        ja: chunk-candidate identity は scoring context selection downstream consumption と区別して保持する。
      source_claims: [claim-retrieved-chunk-provenance]
  required_relations: []
examples:
  - id: retrieved-chunk-positive-support

    labels:
      zh: 支持文档片段候选项
      en: Support-document chunk candidate
      ja: support-document chunk candidate

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values: {retrieved_chunk_id: retrieved-chunk-support-42, retrieved_candidate_id: candidate-support-42, source_chunk_ref: chunk-support-reset-v3, source_artifact_ref: chunk-support-reset-v3, request_ref: retrieval-request-support-42, retrieval_scope_ref: scope-support-42, retrieval_scope_id: scope-support-42, chunk_locator: support-reset#chunk-3, provenance_ref: candidate-generation-support-42, content_digest: sha256-chunk-support-reset-v3, candidate_digest: sha256-candidate-support-42, retrieval_artifact_id: candidate-support-42, artifact_kind: candidate}
    related_node_ids: [RetrievedChunk, RetrievedCandidate, ChunkArtifact]
    related_relation_ids: [RetrievedChunk-is_a-RetrievedCandidate]

    source_claims: [claim-retrieved-chunk-candidate]
  - id: retrieved-chunk-counterexample-full-document

    labels:
      zh: 完整文档被误称为片段候选项
      en: Full document presented as chunk candidate
      ja: full document を chunk candidate として提示

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values: {document_ref: manual-reset-v1, request_ref: retrieval-request-support-42, retrieval_scope_ref: scope-support-42}
    related_node_ids: [RetrievedChunk, Document, ChunkArtifact]
    related_relation_ids: [RetrievedChunk-is_a-RetrievedCandidate]

    source_claims: [claim-retrieved-chunk-candidate]
  - id: retrieved-chunk-boundary-same-chunk-two-requests

    labels:
      zh: 同一片段的两个请求候选项
      en: Same chunk in two request candidates
      ja: 同じ chunk の二つの request candidate

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values: {retrieved_chunk_id: retrieved-chunk-support-42-request-b, source_chunk_ref: chunk-support-reset-v3, request_ref: retrieval-request-support-b, retrieval_scope_ref: scope-support-b, chunk_locator: support-reset#chunk-3, provenance_ref: candidate-generation-support-b, content_digest: sha256-chunk-support-reset-v3}
    related_node_ids: [RetrievedChunk, RetrievalRequest, ChunkArtifact]
    related_relation_ids: [RetrievedChunk-is_a-RetrievedCandidate]

    source_claims: [claim-retrieved-chunk-scope]
  - id: retrieved-chunk-instance-rag

    labels:
      zh: RAG 片段检索实例
      en: RAG chunk-retrieval instance
      ja: RAG chunk-retrieval の事例

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values: {retrieved_chunk_id: retrieved-chunk-rag-17, retrieved_candidate_id: candidate-rag-knowledge-17, source_chunk_ref: chunk-rag-knowledge-17, source_artifact_ref: chunk-rag-knowledge-17, request_ref: retrieval-request-rag-17, retrieval_scope_ref: scope-rag-knowledge, retrieval_scope_id: scope-rag-knowledge, chunk_locator: knowledge-17#chunk-2, provenance_ref: retrieval-run-rag-17, content_digest: sha256-chunk-rag-knowledge-17, candidate_digest: sha256-candidate-rag-knowledge-17, retrieval_artifact_id: candidate-rag-knowledge-17, artifact_kind: candidate}
    related_node_ids: [RetrievedChunk, RetrievalActivity, RetrievedCandidate]
    related_relation_ids: [RetrievedChunk-is_a-RetrievedCandidate]
    source_claims: [claim-retrieved-chunk-candidate, claim-retrieved-chunk-provenance]
parent_relation:
  id: RetrievedChunk-is_a-RetrievedCandidate
  predicate: is_a
  target: concept:RetrievedCandidate
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是已检索候选项的片段子类
    en: is a chunk subtype of retrieved candidate
    ja: RetrievedCandidate の chunk 下位型である
  definitions:
    zh: RetrievedChunk 是以固定 ChunkArtifact 版本为差异的 RetrievedCandidate。
    en: RetrievedChunk is RetrievedCandidate with the differentia of representing a fixed ChunkArtifact version.
    ja: RetrievedChunk は固定 ChunkArtifact version を表すことを差異とする RetrievedCandidate である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_retrieved_chunk_subtype
    labels:
      zh: 具有已检索片段子类
      en: has retrieved-chunk subtype
      ja: retrieved-chunk 下位型を持つ
  conditions:
    - id: retrieved-chunk-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when a candidate represents a fixed ChunkArtifact version with request scope and retrieval provenance.
      explanation:
        zh: 子类型差异是受请求范围约束的固定片段版本候选表示。
        en: The subtype differentia is a request-scoped candidate representation of a fixed chunk version.
        ja: subtype の differentia は request-scope に束縛された固定 chunk version の candidate representation である。
      source_claims: [claim-retrieved-chunk-candidate]
  temporal_scope: valid-time
  boundary_context: A score or later context selection can reference this chunk candidate without changing its source-version identity.
  constraints: []
  examples: []
  source_claims: [claim-retrieved-chunk-candidate]
  distinct_fact_rationale: This relation classifies chunk-candidate identity and does not express score rank selection or model use.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Documents retrievers returning documents for query-based retrieval workflows.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    source_type: academic-paper
    url: https://arxiv.org/abs/2005.11401
    relevance: Describes retrieved non-parametric memory supplied to downstream generation.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entities separately from activities that generate or use them.
source_claims:
  - id: claim-retrieved-chunk-candidate
    source: langchain-retrieval
