source_claims:
  - id: claim-retrieved-chunk-pinecone
    source: src-pinecone-query
    supports: Pinecone metadata can carry chunk_id for RetrievedChunk.
    locator: metadata
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieved-chunk-chroma
    source: src-chroma-query
    supports: Chroma metadatas can carry chunk_id.
    locator: metadatas
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieved-chunk-boundary
    source: src-memory-retrieval-design
    supports: RetrievedChunk is hit view not canonical Chunk.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-chunk-candidate
    source: src-memory-retrieval-design
    supports: candidate_id inherited from RetrievedCandidate.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-chunk-id
    source: src-memory-retrieval-design
    supports: chunk_id identifies hit chunk.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-chunk-span
    source: src-memory-retrieval-design
    supports: source_span_ref optional boundary ref.
    locator: structure
    evidence_kind: design-inference
    confidence: high
