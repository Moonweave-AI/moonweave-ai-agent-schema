schema: moonweave.ai/ontology-node/v1
id: RetrievedChunk
kind: concept
status: review
labels:
  zh: 已检索块候选
  en: Retrieved chunk candidate
  ja: 取得chunk候補
semantics:
  short_definition:
    zh: 其实际内容引用明确指向 Chunk 的检索候选子类。
    en: A retrieved-candidate subtype whose content referent is explicitly a Chunk.
    ja: actual content referentがChunkであるretrieved-candidate subtypeです。
  definition:
    zh: RetrievedChunk 是 RetrievedCandidate 的严格子类：candidate_id 标识候选记录，chunk_id 指向由分块本体拥有的 Chunk；它继承候选的排名与分数，但不复制 Chunk 内容、上下文槽位或安全发现。
    en: RetrievedChunk is the strict subtype of RetrievedCandidate whose candidate_id identifies the retrieval record and whose chunk_id refers to a Chunk owned by the chunking ontology. It inherits candidate rank and scores but does not duplicate chunk content, context slots, or safety findings.
    ja: RetrievedChunk はRetrievedCandidateのstrict subtypeでcandidate_idがretrieval recordを、chunk_idがchunking ontology所有Chunkを参照します。candidate rank/scoreを継承しますがchunk content・context slot・safety findingを複製しません。
  why_needed:
    zh: 在统一候选身份下保留 Chunk 命中的类型种差，而不再维护 CandidateChunk 平行节点。
    en: Preserves the Chunk-hit differentia under one candidate identity instead of maintaining a parallel CandidateChunk node.
    ja: 一candidate identityの下でChunk-hit differentiaを保持しparallel CandidateChunk nodeを廃止します。
  includes:
    - zh: 纳入 referent 明确为已存在 Chunk 的检索候选。
      en: Includes retrieved candidates whose referent is an existing Chunk.
      ja: referentが既存Chunkであるretrieved candidateを含みます。
  excludes:
    - zh: 排除原始 Chunk 本身、非 Chunk 候选、上下文槽位、安全扫描结果和重复 CandidateChunk 身份。
      en: Excludes the Chunk itself, non-Chunk candidates, context slots, safety scan results, and duplicate CandidateChunk identities.
      ja: Chunk自体・non-Chunk candidate・context slot・safety scan result・duplicate CandidateChunk identityを除外します。
  semantic_kind: information
  aliases: []
