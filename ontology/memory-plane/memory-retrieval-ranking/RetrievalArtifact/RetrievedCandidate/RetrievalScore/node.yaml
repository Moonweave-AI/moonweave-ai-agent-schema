schema: moonweave.ai/ontology-node/v1
id: RetrievalScore
kind: concept
status: accepted
labels:
  zh: 检索分数
  en: Retrieval score
  ja: 検索score
semantics:
  short_definition:
    zh: 由一个声明评分阶段为候选产生、其数值只在声明方法中可解释的分数产物。
    en: A score artifact produced for a candidate by a declared stage and interpretable only under its declared method.
    ja: 指定stageがcandidateに生成し指定method内でのみ解釈できるscore artifactです。
  definition:
    zh: RetrievalScore 是 RetrievedCandidate 的组成信息，以 score_id 标识一次阶段性评分，记录 numeric_value、scoring_stage 与方法语境；不同方法的数值不可在缺少归一化或融合规则时直接比较，它也不等同于排名位置或最终采用决定。
    en: RetrievalScore is an information component of RetrievedCandidate. score_id identifies one stage-specific assessment and records numeric_value, scoring_stage, and method context. Values from different methods are not directly comparable without normalization or fusion rules, and a score is neither rank position nor final admission.
    ja: RetrievalScore はRetrievedCandidateのinformation componentでscore_idがstage-specific assessmentを識別しnumeric_value・scoring_stage・method contextを記録します。異method値はnormalization/fusion ruleなしに直接比較できずrank positionやfinal admissionでもありません。
  why_needed:
    zh: 保留分数的产生阶段和解释语境，防止把词汇、向量和重排分数误当同一量纲。
    en: Preserves score provenance and interpretation context so lexical, vector, and rerank scores are not treated as one scale.
    ja: score provenance/interpretation contextを保持しlexical・vector・rerank scoreを同一scale扱いしません。
  includes:
    - zh: 纳入由候选评分或重排活动实际产生并关联到一个候选的数值评估。
      en: Includes numeric assessments actually produced for a candidate by scoring or reranking activity.
      ja: scoring/reranking activityがcandidateに実際生成したnumeric assessmentを含みます。
  excludes:
    - zh: 排除 CandidateRank、置信等级、业务重要性、索引质量指标和上下文采用分数。
      en: Excludes CandidateRank nodes, confidence categories, business importance, index-quality metrics, and context-admission scores.
      ja: CandidateRank node・confidence category・business importance・index-quality metric・context-admission scoreを除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: score ID
        ja: score ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个候选在一个阶段获得的分数记录。
        en: Stable identifier for one candidate's score record at one stage.
        ja: 一candidateが一stageで得たscore recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: score-427
      source_claims:
        - claim-retrieval-score-002
    - id: numeric_value
      labels:
        zh: 数值
        en: numeric value
        ja: 数値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存评分方法输出的原始或明确归一化数值。
        en: Raw or explicitly normalized numeric value emitted by the scoring method.
        ja: scoring methodが出力したrawまたは明示normalized valueです。
      allowed_values: []
      pattern: null
      example_value: 0.82
      source_claims:
        - claim-retrieval-score-003
    - id: scoring_stage
      labels:
        zh: 评分阶段
        en: scoring stage
        ja: 採点stage
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识产生该分数的检索阶段。
        en: Identifies the retrieval stage that produced the score.
        ja: このscoreを生成したretrieval stageを識別します。
      allowed_values: []
      pattern: null
      example_value: post-rerank
      source_claims:
        - claim-retrieval-score-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalScore-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索分数正例
      en: "Positive case: Retrieval score"
      ja: 検索score正例
    scenario_id: null
    descriptions:
      zh: score-427 记录 candidate-424 在 post-rerank 阶段由声明模型产生的 0.82。
      en: score-427 records value 0.82 produced for candidate-424 by the declared post-rerank stage.
      ja: score-427 はcandidate-424にpost-rerank stageが生成した0.82を記録します。
    field_values:
      score_id: score-427
      numeric_value: 0.82
      scoring_stage: post-rerank
    related_node_ids:
      - RetrievalScore
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalScore。
      en: Classify the object as RetrievalScore.
      ja: RetrievalScore として分類します。
    why_valid_or_invalid:
      zh: 分数身份、候选归属、阶段和方法语境可被完整解释。
      en: Score identity, candidate ownership, stage, and method context are all explainable.
      ja: score identity・candidate ownership・stage・method contextを完全説明できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-score-005
  - id: RetrievalScore-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索分数边界例
      en: "Boundary case: Retrieval score"
      ja: 検索score境界例
    scenario_id: null
    descriptions:
      zh: rank_position=3 只表示候选在列表中的序位。
      en: rank_position=3 only records the candidate's ordinal place in a list.
      ja: rank_position=3 はlist内candidateのordinal positionだけを表します。
    field_values: {}
    related_node_ids:
      - RetrievalScore
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalScore。
      en: Do not classify the object as RetrievalScore.
      ja: RetrievalScore として分類しません。
    why_valid_or_invalid:
      zh: 排名位置是 RetrievedCandidate 字段，不是 RetrievalScore。
      en: Rank position is a RetrievedCandidate field, not RetrievalScore.
      ja: rank positionはRetrievedCandidate fieldでRetrievalScoreではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-score-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RetrievedCandidate-has_score-RetrievalScore
  predicate: has_score
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: has_score RetrievalScore
    en: has_score RetrievalScore
    ja: RetrievalScoreをhas_score
  definitions:
    zh: RetrievedCandidate —has_score→ RetrievalScore 表示该阶段分数属于此候选且必须保留产生方法与阶段语境。
    en: RetrievedCandidate —has_score→ RetrievalScore states that the stage score belongs to this candidate and preserves its producing method and stage context.
    ja: RetrievedCandidate —has_score→ RetrievalScore はstage scoreがこのcandidateに属し生成method/stage contextを保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: inverse_has_score
    labels:
      zh: 反向读取
      en: inverse has_score
      ja: 逆方向読取
  conditions:
    - id: RetrievedCandidate-has_score-RetrievalScore-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalScore is a non-substitutable information component within this RetrievedCandidate's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalScore 是该 RetrievedCandidate 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalScore is a non-substitutable information component within this RetrievedCandidate's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalScoreがこのRetrievedCandidate identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-score-007
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
