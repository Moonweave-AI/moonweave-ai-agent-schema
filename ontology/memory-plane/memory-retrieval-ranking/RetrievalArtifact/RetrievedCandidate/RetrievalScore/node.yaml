        en: "Positive case: has_score RetrievalScore"
        ja: RetrievalScoreをhas_score正例
      scenario_id: null
      descriptions:
        zh: candidate-424 拥有 rerank-score-430 并保留 post-rerank 语境。
        en: candidate-424 owns rerank-score-430 with post-rerank context.
        ja: candidate-424がpost-rerank context付きrerank-score-430を所有します。
      field_values: {}
      related_node_ids:
