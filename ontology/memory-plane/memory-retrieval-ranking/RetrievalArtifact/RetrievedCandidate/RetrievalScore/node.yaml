      expected_result:
        zh: 建立该有向事实，并保留条件与证据。
        en: Assert the directed fact with its condition and evidence retained.
        ja: condition/evidenceを保持してdirected factをassertします。
      why_valid_or_invalid:
        zh: 实例满足端点定义、方向和该关系的显式成立条件。
        en: The case satisfies both endpoint definitions, direction, and the relation's explicit assertion condition.
        ja: endpoint定義・direction・明示assertion conditionを満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
