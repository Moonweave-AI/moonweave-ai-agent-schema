schema: moonweave.ai/ontology-node/v1
id: RetrievalScore
kind: concept
labels:
  zh: 检索分数
  en: Retrieval score
  ja: 検索score
semantics:
  short_definition:
    zh: 单阶段、单方法的候选分数记录。
    en: Single-stage, single-method score record for a candidate.
    ja: 一 stage・一 method の candidate score record。
  definition:
    zh: RetrievalScore 是 RetrievedCandidate 的组成信息，记录 numeric_value、scoring_stage 与 scoring_method；LexicalScore、SimilarityScore、RerankScore 为子类。不同方法分数不可直接比较，也不等于 rank_position。
    en: RetrievalScore is a RetrievedCandidate component recording numeric_value, scoring_stage, and scoring_method. LexicalScore, SimilarityScore, and RerankScore are subtypes. Cross-method scores are not directly comparable and do not equal rank_position.
    ja: RetrievalScore は numeric_value/scoring_stage/scoring_method を記録。LexicalScore/SimilarityScore/RerankScore が subtype。cross-method 比較不可。rank_position でもない。
  why_needed:
    zh: 调试 RAG 时必须知道 0.917 是 Cohere relevance_score 还是 Pinecone cosine，否则 A/B 对比无效。
    en: RAG debugging requires knowing whether 0.917 is Cohere relevance_score or Pinecone cosine; otherwise A/B comparisons are invalid.
    ja: 0.917 が Cohere か Pinecone かを区別しないと A/B 無効。
  includes:
    - zh: 纳入 scoring/reranking 活动为候选产生的数值评估。
      en: Includes numeric assessments produced for candidates by scoring/reranking activities.
      ja: scoring/reranking activity 生成 numeric assessment。
  excludes:
    - zh: 排除 rank_position、ContextPackage 分数与索引质量指标。
      en: Excludes rank_position, ContextPackage scores, and index-quality metrics.
      ja: rank_position/ContextPackage score/index quality metric を除外。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: numeric_value 保留原始 API 值；scoring_stage 区分 lexical/vector/rerank；子类 LexicalScore/SimilarityScore/RerankScore 声明 method。
    en: numeric_value keeps raw API values; scoring_stage separates lexical/vector/rerank; subtypes LexicalScore/SimilarityScore/RerankScore declare method.
    ja: numeric_value は raw API 値。subtype で method 宣言。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: Score identifier
        ja: score 識別子
      definitions:
        zh: 稳定标识一候选一阶段的分数记录。
        en: Stable score record for one candidate at one stage.
        ja: 一 candidate 一 stage score record。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: score-427
      allowed_values: []
      source_claims:
        - claim-retrieval-score-id
    - id: numeric_value
      labels:
        zh: 数值
        en: Numeric value
        ja: 数値
      definitions:
        zh: 评分方法输出的原始或明确归一化数值。
        en: Raw or explicitly normalized value from scoring method.
        ja: scoring method 出力値。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.82
      allowed_values: []
      source_claims:
        - claim-retrieval-score-value
    - id: scoring_stage
      labels:
        zh: 评分阶段
        en: Scoring stage
        ja: 採点 stage
      definitions:
        zh: lexical、vector、rerank、fusion 等阶段标签。
        en: "Stage label: lexical, vector, rerank, fusion, etc."
        ja: lexical/vector/rerank/fusion 等。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: vector
      allowed_values: []
      source_claims:
        - claim-retrieval-score-stage
  constraints:
    - id: heterogeneous-scores
      severity: error
      expression_language: plain
      expression: Scores from different scoring_method values must not be compared without normalization rules.
      explanation:
        zh: BM25、cosine、rerank 量纲不同。
        en: BM25, cosine, and rerank scales differ.
        ja: BM25/cosine/rerank スケール不同。
      source_claims:
        - claim-retrieval-score-heterogeneous
  required_relations: []
examples:
  - id: RetrievalScore-example-multi-stage
    labels:
      zh: 多阶段分数共存
      en: Multi-stage scores coexist
      ja: 多 stage score 共存
    descriptions:
      zh: candidate-424 同时有 lexical 8.73、vector 0.842、rerank 0.917 三条 RetrievalScore，scoring_stage 不同。
      en: candidate-424 has lexical 8.73, vector 0.842, rerank 0.917 RetrievalScore records with different scoring_stage.
      ja: candidate-424 多 stage score 共存。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: multi-stage
    field_values:
      candidate_id: candidate-424
      scores:
        - stage: lexical
          value: 8.73
        - stage: vector
          value: 0.842
        - stage: rerank
          value: 0.917
    related_node_ids:
      - RetrievalScore
      - SimilarityScore
      - RerankScore
    related_relation_ids: []
    source_claims:
      - claim-retrieval-score-multi
  - id: RetrievalScore-example-not-rank
    labels:
      zh: 分数非排名
      en: Score is not rank
      ja: score は rank ではない
    descriptions:
      zh: rank_position=1 不能写入 RetrievalScore.numeric_value。
      en: rank_position=1 must not be written as RetrievalScore.numeric_value.
      ja: rank_position を numeric_value にしない。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievalScore
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieval-score-not-rank
  - id: RetrievalScore-example-pinecone
    labels:
      zh: Pinecone score 映射
      en: Pinecone score mapping
      ja: Pinecone score 映射
    descriptions:
      zh: SimilarityScore numeric_value=0.842 来自 Pinecone ScoredVector.score。
      en: SimilarityScore numeric_value=0.842 from Pinecone ScoredVector.score.
      ja: Pinecone score→SimilarityScore。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: ScoredVector.score
    field_values:
      score_id: similarity-score-429
      numeric_value: 0.842
      scoring_stage: vector
    related_node_ids:
      - RetrievalScore
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-retrieval-score-pinecone
parent_relation:
  id: RetrievedCandidate-has_score-RetrievalScore
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_score RetrievalScore
    en: has_score RetrievalScore
    ja: RetrievalScoreをhas_score
  definitions:
    zh: RetrievedCandidate —has_score→ RetrievalScore 表示该阶段分数属于此候选且必须保留产生方法与阶段语境。
    en: RetrievedCandidate —has_score→ RetrievalScore states that the stage score belongs to this candidate and preserves its producing method and stage context.
    ja: RetrievedCandidate —has_score→ RetrievalScore はstage scoreがこのcandidateに属し生成method/stage contextを保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_score
      ja: 逆方向読取
  conditions:
    - id: RetrievedCandidate-has_score-RetrievalScore-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalScore is a non-substitutable information component within this RetrievedCandidate's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalScore 是该 RetrievedCandidate 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalScore is a non-substitutable information component within this RetrievedCandidate's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalScoreがこのRetrievedCandidate identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-score-id
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievedCandidate-has_score-RetrievalScore-example-positive-manual-001
      labels:
        zh: has_score RetrievalScore正例
        en: "Positive case: has_score RetrievalScore"
        ja: RetrievalScoreをhas_score正例
      descriptions:
        zh: candidate-424 拥有 rerank-score-430 并保留 post-rerank 语境。
        en: candidate-424 owns rerank-score-430 with post-rerank context.
        ja: candidate-424がpost-rerank context付きrerank-score-430を所有します。
      field_values: {}
      related_node_ids:
        - RetrievedCandidate
        - RetrievalScore
      related_relation_ids:
        - RetrievedCandidate-has_score-RetrievalScore
      source_claims:
        - claim-retrieval-score-id
    - id: RetrievedCandidate-has_score-RetrievalScore-example-boundary-manual-001
      labels:
        zh: has_score RetrievalScore边界例
        en: "Boundary case: has_score RetrievalScore"
        ja: RetrievalScoreをhas_score境界例
      descriptions:
        zh: 相邻显示一个数值不能证明它属于该候选。
        en: Displaying a nearby number does not prove that the score belongs to the candidate.
        ja: 近接表示numberだけではscoreのcandidate所属を証明しません。
      field_values: {}
      related_node_ids:
        - RetrievedCandidate
        - RetrievalScore
      related_relation_ids:
        - RetrievedCandidate-has_score-RetrievalScore
      source_claims:
        - claim-retrieval-score-id
  source_claims:
    - claim-retrieval-score-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: QueryResponse.
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: relevance_score.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-retrieval-score-multi
    source: src-memory-retrieval-design
    supports: Multiple stage scores coexist on one candidate.
    locator: multi-stage
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-score-not-rank
    source: src-memory-retrieval-design
    supports: Rank position is not a RetrievalScore.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-score-pinecone
    source: src-pinecone-query
    supports: Pinecone ScoredVector.score maps to RetrievalScore.
    locator: score
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-score-heterogeneous
    source: src-memory-retrieval-design
    supports: Cross-method scores are incomparable.
    locator: constraint
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-score-id
    source: src-memory-retrieval-design
    supports: score_id identifies score record.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-score-value
    source: src-memory-retrieval-design
    supports: numeric_value stores method output.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-score-stage
    source: src-memory-retrieval-design
    supports: scoring_stage tags producing stage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
