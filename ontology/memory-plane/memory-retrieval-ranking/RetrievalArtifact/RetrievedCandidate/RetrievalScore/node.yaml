schema: moonweave.ai/ontology-node/v1
id: RetrievalScore
kind: concept
status: accepted
labels:
  zh: 检索评分
  en: Retrieval score
  ja: 検索スコア
semantics:
  short_definition:
    zh: 关联到一个已检索候选项的可追溯相关性数值。
    en: A traceable relevance value attached to one retrieved candidate.
    ja: 一つの取得済み候補に付与される追跡可能な関連性値。
  definition:
    zh: >-
      RetrievalScore 是 RetrievedCandidate 的组成记录，声明一个评分方法在特定评分运行中为该候选项产生的数值和量表。
      它不表示候选正文、最终排序位置、上下文包成员资格、模型是否读取候选项或生成答案。
    en: >-
      A RetrievalScore is a component record of a RetrievedCandidate that declares the value and scale produced for that
      candidate by one scoring method in one scoring run. It does not represent candidate content, final rank position,
      context-package membership, model consumption, or answer generation.
    ja: >-
      RetrievalScore は RetrievedCandidate の構成記録であり、一つの scoring method が一つの scoring run でその候補に
      生成した値と scale を宣言する。candidate の本文、最終 rank、context package の所属、model による消費、answer の生成は表さない。
  why_needed:
    zh: 将候选身份与评分值分离，可比较词法、向量和重排序方法，同时保留计算来源。
    en: Separating candidate identity from score values permits comparison of lexical vector and rerank methods while retaining computation provenance.
    ja: candidate の識別と score 値を分けることで lexical vector rerank の方法を比較でき、計算の provenance を保持できる。
  includes:
    - zh: 候选引用、数值、评分方法、量表说明和评分运行引用。
      en: Candidate reference value scoring method scale declaration and scoring-run reference.
      ja: candidate 参照 値 scoring method scale 宣言 scoring-run 参照。
  excludes:
    - zh: 候选正文、排序位置、过滤条件、上下文选择、回答文本和持久化结果。
      en: Candidate body rank position filter condition context selection answer text and persistence outcome.
      ja: candidate 本文 rank 位置 filter 条件 context 選択 answer 本文 persistence 結果。
  semantic_kind: entity
  aliases: [relevance score, candidate score, 检索得分]
engineering:
  explanation:
    zh: 评分活动读取候选引用和查询表示，生成独立的分数记录；融合或重排序随后读取这些记录而不修改候选身份。
    en: A scoring activity reads a candidate reference and query representation then emits an independent score record; fusion or reranking later reads that record without changing candidate identity.
    ja: scoring activity は candidate 参照と query representation を読み独立した score record を生成する。fusion または reranking は後でその record を読み candidate identity を変更しない。
  typical_input:
    - description: Candidate and scoring method supplied to a scoring activity.
      format: |
        {
          "candidate_ref": "candidate-support-42",
          "query_ref": "query-support-42",
          "score_method": "similarity",
          "scoring_run_ref": "candidate-scoring-support-42"
        }
  typical_output:
    - description: Immutable score artifact emitted for the candidate.
      format: |
        {
          "retrieval_score_id": "score-support-42-similarity",
          "candidate_ref": "candidate-support-42",
          "score_value": 0.91,
          "score_method": "similarity",
          "score_scale": "cosine-similarity",
          "scoring_run_ref": "candidate-scoring-support-42"
        }
  reference_implementations:
    - name: Elasticsearch script score query
      url: https://www.elastic.co/docs/reference/query-languages/query-dsl/query-dsl-script-score-query
      description: Documents computing and returning a score for each matching document.
    - name: Cohere Rerank
      url: https://docs.cohere.com/docs/reranking
      description: Documents reranking documents for a query and returning relevance scores.
structure:
  identity_keys: [retrieval_score_id]
  fields:
    - id: retrieval_score_id
      labels:
        zh: 评分标识
        en: retrieval score ID
        ja: retrieval score ID
      definitions:
        zh: 在一个候选项和评分运行范围内稳定标识一条评分记录。
        en: Stably identifies one score record within a candidate and scoring-run scope.
        ja: candidate と scoring-run の範囲内で一つの score record を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^score-[A-Za-z0-9._-]+$'
      example_value: score-support-42-similarity
      source_claims: [claim-retrieval-score-record]
    - id: candidate_ref
      labels:
        zh: 候选引用
        en: candidate reference
        ja: candidate 参照
      definitions:
        zh: 指向拥有该评分的 RetrievedCandidate，而不是指向查询或回答。
        en: Points to the RetrievedCandidate that owns this score rather than to a query or answer.
        ja: query や answer ではなくこの score を持つ RetrievedCandidate を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-support-42
      source_claims: [claim-retrieval-score-record]
    - id: score_value
      labels:
        zh: 评分数值
        en: score value
        ja: score 値
      definitions:
        zh: 由声明的评分方法产生的数值，不在未声明量表时比较其绝对大小。
        en: Numeric value emitted by the declared scoring method and not comparable by magnitude without its declared scale.
        ja: 宣言された scoring method が出力する数値であり scale の宣言なしに絶対値を比較しない。
      datatype: decimal
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 0.91
      source_claims: [claim-retrieval-score-record]
    - id: score_method
      labels:
        zh: 评分方法
        en: score method
        ja: score method
      definitions:
        zh: 标识产生数值的方法族，而不是候选项的类型或最终排序策略。
        en: Identifies the method family that produced the value rather than candidate type or final ranking policy.
        ja: 値を生成した method family を識別し candidate type や最終 ranking policy を表さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [lexical, similarity, rerank, fusion]
      pattern: null
      example_value: similarity
      source_claims: [claim-retrieval-score-method]
    - id: score_scale
      labels:
        zh: 评分量表
        en: score scale
        ja: score scale
      definitions:
        zh: 声明数值的比较语义，例如 BM25、余弦相似度或重排序相关性分数。
        en: Declares how the value is interpreted such as BM25 cosine similarity or rerank relevance.
        ja: BM25 cosine similarity rerank relevance など値の解釈を宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: cosine-similarity
      source_claims: [claim-retrieval-score-method]
    - id: scoring_run_ref
      labels:
        zh: 评分运行引用
        en: scoring run reference
        ja: scoring run 参照
      definitions:
        zh: 指向产生评分的活动或运行记录，不声称候选项已被下游模型使用。
        en: Points to the activity or run record that produced the score and does not assert downstream model use.
        ja: score を生成した activity または run record を指し downstream model の使用を主張しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-scoring-support-42
      source_claims: [claim-retrieval-score-provenance]
  constraints:
    - id: retrieval-score-candidate-and-method
      severity: error
      expression_language: plain
      expression: candidate_ref, score_value, score_method, score_scale, and scoring_run_ref are required. score_value may be compared only with scores that declare compatible method and scale.
      explanation:
        zh: 一条评分必须同时绑定候选项、方法、量表和计算来源，避免把不同量表的数值当作同一尺度。
        en: A score must bind candidate method scale and computation source together so values from incompatible scales are not treated as one metric.
        ja: score は candidate method scale computation source を一体で結び、互換性のない scale の値を一つの metric として扱わない。
      source_claims: [claim-retrieval-score-method, claim-retrieval-score-provenance]
    - id: retrieval-score-not-rank-or-selection
      severity: error
      expression_language: plain
      expression: RetrievalScore must not contain a final rank, context-package membership, answer text, model-use evidence, or persistence outcome.
      explanation:
        zh: 评分是候选相关性的中间证据；排序、上下文选择和下游使用必须保持为独立事实。
        en: A score is intermediate evidence about candidate relevance; ranking context selection and downstream use remain separate facts.
        ja: score は candidate relevance の中間 evidence であり ranking context selection downstream use は別の fact に保つ。
      source_claims: [claim-retrieval-score-provenance]
  required_relations: []
examples:
  - id: retrieval-score-positive-similarity

    labels:
      zh: 候选项的余弦评分
      en: Cosine score for a candidate
      ja: candidate の cosine score

    descriptions:
      zh: Generative Agents：score=α·recency+β·importance+γ·relevance 加权检索；ColBERT MaxSim：Σ_i max_j E_qi·E_dj 晚期 token 交互分数。
      en: Generative Agents: score=α·recency+β·importance+γ·relevance weighted retrieval; ColBERT MaxSim: Σ_i max_j E_qi·E_dj late token-interaction score.
      ja: Generative Agents score 公式。ColBERT MaxSim Σ_i max_j E_qi·E_dj。
    field_values: {retrieval_score_id: score-support-42-similarity, candidate_ref: candidate-support-42, score_value: 0.91, score_method: similarity, score_scale: cosine-similarity, scoring_run_ref: candidate-scoring-support-42}
    related_node_ids: [RetrievalScore, RetrievedCandidate, CandidateScoringActivity]
    related_relation_ids: [RetrievalScore-part_of-RetrievedCandidate]

    source_claims: [claim-retrieval-score-record]
  - id: retrieval-score-counterexample-rank

    labels:
      zh: 将排名当作评分
      en: Rank presented as a score
      ja: rank を score として提示

    descriptions:
      zh: 反例：Pinecone cosine similarity 未分解 recency/importance/relevance 分量就标为 Generative Agents RetrievalScore。
      en: Counterexample: Pinecone cosine similarity labeled Generative Agents RetrievalScore without recency/importance/relevance decomposition.
      ja: 反例：Pinecone cosine を Generative Agents RetrievalScore とするが成分分解なし。
    field_values: {retrieval_score_id: score-rank-only-1, candidate_ref: candidate-support-42, final_rank: 1, context_package_ref: context-support-42}
    related_node_ids: [RetrievalScore, TopKSelection, ContextPackage]
    related_relation_ids: [RetrievalScore-part_of-RetrievedCandidate]

    source_claims: [claim-retrieval-score-method]
  - id: retrieval-score-boundary-two-scales

    labels:
      zh: 两种量表的评分
      en: Scores from two scales
      ja: 二つの scale の score

    descriptions:
      zh: SimilarityScore（dense cosine）vs LexicalScore（BM25）vs ColBERT MaxSim（late interaction）不同分数空间；Anthropic Contextual Retrieval rerank 是第三层。
      en: SimilarityScore vs LexicalScore vs ColBERT MaxSim distinct score spaces; Anthropic Contextual Retrieval rerank is third layer.
      ja: SimilarityScore vs LexicalScore vs ColBERT MaxSim 異なる score space。
    field_values: {retrieval_score_id: score-support-42-bm25, candidate_ref: candidate-support-42, score_value: 12.4, score_method: lexical, score_scale: bm25, scoring_run_ref: candidate-scoring-support-42}
    related_node_ids: [RetrievalScore, LexicalScore, SimilarityScore]
    related_relation_ids: [RetrievalScore-part_of-RetrievedCandidate]

    source_claims: [claim-retrieval-score-method]
  - id: retrieval-score-instance-elasticsearch

    labels:
      zh: Elasticsearch 脚本评分实例
      en: Elasticsearch script-score instance
      ja: Elasticsearch script-score の事例

    descriptions:
      zh: ColBERT index.search(query, k=10) 返回 MaxSim 分数；Weaviate hybrid alpha=0.5 融合 vector distance 与 BM25 score。
      en: ColBERT index.search(k=10) returns MaxSim scores; Weaviate hybrid alpha=0.5 fuses vector distance and BM25 score.
      ja: ColBERT MaxSim。Weaviate hybrid alpha=0.5。
    field_values: {retrieval_score_id: score-es-incident-17, candidate_ref: candidate-es-incident-17, score_value: 3.42, score_method: similarity, score_scale: elastic-script-score, scoring_run_ref: scoring-run-es-20260719}
    related_node_ids: [RetrievalScore, RetrievedCandidate, CandidateScoringActivity]
    related_relation_ids: [RetrievalScore-part_of-RetrievedCandidate]
    source_claims: [claim-retrieval-score-record, claim-retrieval-score-provenance]
parent_relation:
  id: RetrievalScore-part_of-RetrievedCandidate
  predicate: part_of
  target: concept:RetrievedCandidate
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是已检索候选项的评分组成部分
    en: is a score component of retrieved candidate
    ja: RetrievedCandidate の score 構成部分である
  definitions:
    zh: RetrievalScore 是某个 RetrievedCandidate 的方法范围评分记录，而不是候选项的子类型。
    en: RetrievalScore is a method-scoped score record of one RetrievedCandidate rather than a subtype of the candidate.
    ja: RetrievalScore は一つの RetrievedCandidate の method 範囲 score record であり candidate の subtype ではない。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_retrieval_score
    labels:
      zh: 具有检索评分
      en: has retrieval score
      ja: retrieval score を持つ
  conditions:
    - id: retrieval-score-composition-condition
      severity: error
      expression_language: plain
      expression: Assert part_of only when the score belongs to exactly one retrieved candidate and includes a method scale and scoring-run reference.
      explanation:
        zh: 组成关系要求评分归属唯一候选项，并携带方法、量表与计算来源。
        en: Composition requires a score to belong to one candidate with method scale and computation provenance.
        ja: composition は score が method scale computation provenance と共に一つの candidate に属することを要求する。
      source_claims: [claim-retrieval-score-provenance]
  temporal_scope: valid-time
  boundary_context: A score can be superseded by another scoring run without changing the candidate source identity.
  constraints: []
  examples: []
  source_claims: [claim-retrieval-score-record]
  distinct_fact_rationale: This relation records score ownership and does not assert rank selection or downstream model use.
  layout_role: primary-backbone
relations: []
sources:
  - id: elastic-script-score
    title: Elasticsearch script score query
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/query-languages/query-dsl/query-dsl-script-score-query
    relevance: Documents computing a score for each matching document in a query.
  - id: cohere-rerank
    title: Cohere Rerank
    source_type: official-documentation
    url: https://docs.cohere.com/docs/reranking
    relevance: Documents query-document reranking with relevance scores.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates generated entities from the activities that produce or use them.
source_claims:
  - id: claim-retrieval-score-record
    source: elastic-script-score
    supports: Elasticsearch computes a score for matching documents. Moonweave records that value as a separate candidate score artifact rather than as candidate content or a query activity.
    locator: "Script score query: score calculation for matching documents"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-score-method
    source: cohere-rerank
    supports: Cohere reranking returns relevance scores for documents relative to a query. Moonweave retains score method and scale so scores from distinct methods are not implicitly comparable.
    locator: "Reranking: query documents and relevance scores"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-score-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity from the activity that generated it. Moonweave keeps the score entity and its scoring-run provenance separate from ranking and downstream use.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
