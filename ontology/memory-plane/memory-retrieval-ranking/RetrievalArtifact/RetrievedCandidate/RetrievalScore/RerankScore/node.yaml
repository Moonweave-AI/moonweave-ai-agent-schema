    related_relation_ids: []
    expected_result:
      zh: 归类为 RerankScore。
      en: Classify the object as RerankScore.
      ja: RerankScore として分類します。
    why_valid_or_invalid:
      zh: 分数明确来自二阶段声明模型，可与初始检索分数区分。
      en: The score explicitly comes from a declared second-stage model and is distinguishable from initial retrieval scores.
      ja: 指定second-stage model由来でinitial retrieval scoreと区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rerank-score-005
  - id: RerankScore-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 重排分数边界例
      en: "Boundary case: Rerank score"
      ja: 再順位付けscore境界例
    scenario_id: null
    descriptions:
      zh: rrf-contribution-430 仅由候选在两个列表中的 rank 代入公式得到。
      en: rrf-contribution-430 is computed only from the candidate's ranks in two lists.
      ja: rrf-contribution-430 は二list内rankだけを式へ代入して得ます。
    field_values: {}
    related_node_ids:
      - RerankScore
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RerankScore。
      en: Do not classify the object as RerankScore.
      ja: RerankScore として分類しません。
    why_valid_or_invalid:
      zh: 它是排名融合贡献，不是模型产生的 RerankScore。
      en: It is a rank-fusion contribution, not a model-produced RerankScore.
      ja: rank-fusion contributionでmodel由来RerankScoreではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rerank-score-006
