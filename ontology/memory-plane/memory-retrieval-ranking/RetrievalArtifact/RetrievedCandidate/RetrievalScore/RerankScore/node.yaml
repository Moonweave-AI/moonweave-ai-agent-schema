schema: moonweave.ai/ontology-node/v1
id: RerankScore
kind: concept
status: accepted
labels:
  zh: 重排分数
  en: Rerank score
  ja: 再順位付けscore
semantics:
  short_definition:
    zh: 由声明版本的重排模型在二阶段检索中为候选重新产生的检索分数。
    en: A retrieval score reassigned to a candidate by a declared reranker-model version in second-stage retrieval.
    ja: second-stage retrievalで指定reranker-model versionがcandidateに再付与するretrieval scoreです。
  definition:
    zh: RerankScore 是 RetrievalScore 的严格子类，由 RerankActivity 的声明模型对查询与候选字段联合评估后产生；它保留 model_version 和数值，但不等同于初始相似度、RRF 累积分或最终 rank_position。
    en: RerankScore is the strict RetrievalScore subtype produced when a RerankActivity's declared model jointly evaluates the query and candidate fields. It preserves model_version and value but is not initial similarity, accumulated RRF value, or final rank_position.
    ja: RerankScore はRerankActivity指定modelがquery/candidate fieldをjointly評価して生成するstrict RetrievalScore subtypeです。model_version/valueを保持しますがinitial similarity・RRF aggregate・final rank_positionではありません。
  why_needed:
    zh: 使二阶段模型分数可以解释、复算并与初始检索信号区分。
    en: Makes second-stage model scores explainable and reproducible while distinguishing them from first-stage retrieval signals.
    ja: second-stage model scoreを説明・再計算可能にしfirst-stage retrieval signalと区別します。
  includes:
    - zh: 纳入交叉编码器或专用 reranker 对候选产生的二阶段相关性数值。
      en: Includes second-stage relevance values produced by cross-encoders or dedicated rerankers.
      ja: cross-encoder/dedicated rerankerがcandidateに生成するsecond-stage relevance valueを含みます。
  excludes:
    - zh: 排除向量相似度、词汇分数、融合排名贡献和最终排名字段。
      en: Excludes vector similarity, lexical scores, fusion-rank contributions, and the final rank field.
      ja: vector similarity・lexical score・fusion-rank contribution・final rank fieldを除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: score ID
        ja: score ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并标识一次重排评分记录。
        en: Inherited identifier for one rerank-score record.
        ja: 一rerank-score recordを継承識別します。
      allowed_values: []
      pattern: null
      example_value: rerank-score-430
      source_claims:
        - claim-rerank-score-002
    - id: model_version
      labels:
        zh: 重排模型版本
        en: reranker model version
        ja: reranker model version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录产生该数值的确切重排模型版本。
        en: Exact reranker model version that produced the value.
        ja: valueを生成したexact reranker model versionです。
      allowed_values: []
      pattern: null
      example_value: bge-reranker-v3
      source_claims:
        - claim-rerank-score-003
    - id: numeric_value
      labels:
        zh: 重排分数值
        en: rerank score value
        ja: rerank score値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存该模型输出的候选相关性数值。
        en: Candidate relevance value emitted by the reranker model.
        ja: reranker modelが出力したcandidate relevance valueです。
      allowed_values: []
      pattern: null
      example_value: 0.82
      source_claims:
        - claim-rerank-score-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RerankScore-example-positive-manual-001
    kind: positive
    labels:
      zh: 重排分数正例
      en: "Positive case: Rerank score"
      ja: 再順位付けscore正例
    scenario_id: null
    descriptions:
      zh: rerank-score-430 记录 bge-reranker-v3 为 candidate-424 产生的 0.82。
      en: rerank-score-430 records value 0.82 produced for candidate-424 by bge-reranker-v3.
      ja: rerank-score-430 はbge-reranker-v3がcandidate-424に生成した0.82を記録します。
    field_values:
      score_id: rerank-score-430
      model_version: bge-reranker-v3
      numeric_value: 0.82
      scoring_stage: rerank
    related_node_ids:
