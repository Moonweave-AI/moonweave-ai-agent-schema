schema: moonweave.ai/ontology-node/v1
id: RerankScore
kind: concept
labels:
  zh: 重排分数
  en: Rerank score
  ja: 再順位付けscore
semantics:
  short_definition:
    zh: 重排模型产生的相关性分数。
    en: Relevance score from reranker model.
    ja: reranker model 生成 relevance score。
  definition:
    zh: RerankScore 是 RetrievalScore 子类，记录 Cohere POST /v2/rerank 响应的 relevance_score 或等效 cross-encoder 输出；scoring_method=cohere-rerank 且 model_version 必填。与 BM25/cosine 不可直接比较。
    en: RerankScore is a RetrievalScore subtype recording Cohere POST /v2/rerank relevance_score or equivalent cross-encoder output with scoring_method=cohere-rerank and required model_version. Not directly comparable to BM25/cosine.
    ja: RerankScore は Cohere relevance_score の subtype。scoring_method=cohere-rerank, model_version 必須。BM25/cosine と比較不可。
  why_needed:
    zh: Cohere relevance_score 决定最终顺序；必须绑定 rerank-v3.5 等 model_version 才能解释分数变化。
    en: Cohere relevance_score drives final order; model_version such as rerank-v3.5 must be bound to explain score changes.
    ja: relevance_score は model_version 绑定が必須。
  includes:
    - zh: 纳入 Cohere rerank 与 cross-encoder 输出的 relevance 分数。
      en: Includes relevance scores from Cohere rerank and cross-encoders.
      ja: Cohere rerank/cross-encoder relevance score。
  excludes:
    - zh: 排除 BM25、cosine 与 rank_position。
      en: Excludes BM25, cosine, and rank_position.
      ja: BM25/cosine/rank_position を除外。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: Cohere results[].relevance_score→numeric_value；model_version←request model；scoring_stage=rerank。
    en: Cohere results[].relevance_score→numeric_value; model_version from request model; scoring_stage=rerank.
    ja: Cohere relevance_score 映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: Score identifier
        ja: score 識別子
      definitions:
        zh: 继承 RetrievalScore.score_id。
        en: Inherits RetrievalScore.score_id.
        ja: RetrievalScore.score_id 継承。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rerank-score-430
      allowed_values: []
      source_claims:
        - claim-rerank-score-id
    - id: numeric_value
      labels:
        zh: 重排分数
        en: Rerank value
        ja: rerank 値
      definitions:
        zh: Cohere relevance_score 或 cross-encoder 输出。
        en: Cohere relevance_score or cross-encoder output.
        ja: Cohere relevance_score。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.917
      allowed_values: []
      source_claims:
        - claim-rerank-score-value
    - id: model_version
      labels:
        zh: 重排模型版本
        en: Rerank model version
        ja: rerank model 版
      definitions:
        zh: 如 rerank-v3.5；与 RerankActivity.model_version 一致。
        en: E.g., rerank-v3.5; must match RerankActivity.model_version.
        ja: rerank-v3.5 等。RerankActivity と一致。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rerank-v3.5
      allowed_values: []
      source_claims:
        - claim-rerank-score-model
  constraints: []
  required_relations: []
examples:
  - id: RerankScore-example-cohere
    labels:
      zh: Cohere relevance_score
      en: Cohere relevance_score
      ja: Cohere relevance_score
    descriptions:
      zh: rerank-score-430 numeric_value=0.917 model_version=rerank-v3.5 for candidate-424 from Cohere rerank-416。
      en: rerank-score-430 numeric_value=0.917 model_version=rerank-v3.5 for candidate-424 from rerank-416.
      ja: Cohere 0.917 for candidate-424。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: relevance_score
    field_values:
      score_id: rerank-score-430
      numeric_value: 0.917
      model_version: rerank-v3.5
    related_node_ids:
      - RerankScore
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-rerank-score-cohere
  - id: RerankScore-example-not-cosine
    labels:
      zh: 非 cosine
      en: Not cosine
      ja: cosine ではない
    descriptions:
      zh: cosine 0.842 是 SimilarityScore；0.917 是 RerankScore，不可直接比大小。
      en: Cosine 0.842 is SimilarityScore; 0.917 is RerankScore; not directly comparable.
      ja: cosine と rerank は別 subtype。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: heterogeneous scores
    field_values: {}
    related_node_ids:
      - RerankScore
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-rerank-score-not-cosine
  - id: RerankScore-example-pinecone-hosted
    labels:
      zh: Pinecone 托管 rerank
      en: Pinecone hosted rerank
      ja: Pinecone hosted rerank
    descriptions:
      zh: Pinecone inference rerank 返回 relevance_score 同样映射 RerankScore。
      en: Pinecone inference rerank relevance_score also maps to RerankScore.
      ja: Pinecone hosted rerank→RerankScore。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/rerank-results
      version: hosted rerank
    field_values:
      numeric_value: 0.891
      model_version: cohere-rerank-3.5
    related_node_ids:
      - RerankScore
    related_relation_ids: []
    source_claims:
      - claim-rerank-score-pinecone
parent_relation:
  id: RerankScore-is_a-RetrievalScore
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalScore
    en: is a RetrievalScore
    ja: RetrievalScoreの一種
  definitions:
    zh: RerankScore —is_a→ RetrievalScore 成立，因为其数值由声明版本的 reranker 对查询与候选字段联合评估后产生。
    en: RerankScore —is_a→ RetrievalScore holds because its value is produced by a declared reranker version jointly evaluating query and candidate fields.
    ja: RerankScore —is_a→ RetrievalScore はvalueが指定reranker versionによるquery/candidate field joint evaluationから生成されるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RerankScore-is_a-RetrievalScore-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is produced by a declared reranker version jointly evaluating query and candidate fields."
      explanations:
        zh: 仅当实例既满足 RetrievalScore 的完整定义，又满足子类种差“其数值由声明版本的 reranker 对查询与候选字段联合评估后产生。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is produced by a declared reranker version jointly evaluating query and candidate fields."
        ja: instanceがRetrievalScore完全定義とchild differentia「valueが指定reranker versionによるquery/candidate field joint evaluationから生成される」を共に満たす時だけassertします。
      source_claims:
        - claim-rerank-score-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RerankScore-is_a-RetrievalScore-example-positive-manual-001
      labels:
        zh: 是一种RetrievalScore正例
        en: "Positive case: is a RetrievalScore"
        ja: RetrievalScoreの一種正例
      descriptions:
        zh: rerank-score-430 记录 bge-reranker-v3=0.82。
        en: rerank-score-430 records bge-reranker-v3=0.82.
        ja: rerank-score-430がbge-reranker-v3=0.82を記録します。
      field_values: {}
      related_node_ids:
        - RerankScore
        - RetrievalScore
      related_relation_ids:
        - RerankScore-is_a-RetrievalScore
      source_claims:
        - claim-rerank-score-id
    - id: RerankScore-is_a-RetrievalScore-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalScore边界例
        en: "Boundary case: is a RetrievalScore"
        ja: RetrievalScoreの一種境界例
      descriptions:
        zh: RRF contribution 只依赖排名位置，不属于 RerankScore。
        en: An RRF contribution depends only on rank positions and is not RerankScore.
        ja: RRF contributionはrank positionだけに依存しRerankScoreではありません。
      field_values: {}
      related_node_ids:
        - RerankScore
        - RetrievalScore
      related_relation_ids:
        - RerankScore-is_a-RetrievalScore
      source_claims:
        - claim-rerank-score-id
  source_claims:
    - claim-rerank-score-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
