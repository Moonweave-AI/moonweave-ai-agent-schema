schema: moonweave.ai/ontology-node/v1
id: LexicalScore
kind: concept
status: accepted
labels:
  zh: 词汇匹配分数
  en: Lexical score
  ja: 語彙一致score
semantics:
  short_definition:
    zh: 由词项、稀疏表示或文本匹配方法为候选产生的检索分数。
    en: A retrieval score produced for a candidate by term, sparse-representation, or textual-matching methods.
    ja: term・sparse representation・text matching methodがcandidateに生成するretrieval scoreです。
  definition:
    zh: LexicalScore 是 RetrievalScore 的严格子类，其数值语义由 BM25、TF-IDF、稀疏向量或其他词汇匹配方法确定；它不是向量相似度、重排模型分数或排名位置。
    en: LexicalScore is the strict RetrievalScore subtype whose numeric meaning is defined by BM25, TF-IDF, sparse-vector, or another lexical-matching method. It is not vector similarity, reranker output, or rank position.
    ja: LexicalScore はBM25・TF-IDF・sparse vector等lexical matching methodが数値意味を決めるstrict RetrievalScore subtypeです。vector similarity・reranker output・rank positionではありません。
  why_needed:
    zh: 保留词汇评分的量纲和方法，使其在融合前不会与相似度或重排分数直接混算。
    en: Preserves lexical scoring scale and method so it is not directly mixed with similarity or rerank scores before fusion.
    ja: lexical scoreのscale/methodを保持しfusion前にsimilarity/rerank scoreと直接混算しません。
  includes:
    - zh: 纳入 BM25、TF-IDF、稀疏文本向量和精确词项匹配产生的候选分数。
      en: Includes candidate scores from BM25, TF-IDF, sparse text vectors, and exact term matching.
      ja: BM25・TF-IDF・sparse text vector・exact term matching由来candidate scoreを含みます。
  excludes:
    - zh: 排除稠密向量相似度、交叉编码器输出、融合得分和 ordinal rank。
      en: Excludes dense-vector similarity, cross-encoder output, fusion scores, and ordinal rank.
      ja: dense-vector similarity・cross-encoder output・fusion score・ordinal rankを除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: score ID
        ja: score ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并标识一次词汇评分记录。
        en: Inherited identifier for one lexical-score record.
        ja: 一lexical-score recordを継承識別します。
      allowed_values: []
      pattern: null
      example_value: lexical-score-428
      source_claims:
        - claim-lexical-score-002
    - id: lexical_method
      labels:
        zh: 词汇方法
        en: lexical method
        ja: 語彙方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明产生数值的词汇匹配算法。
        en: Declares the lexical-matching algorithm producing the value.
        ja: valueを生成するlexical-matching algorithmを宣言します。
      allowed_values: []
      pattern: null
      example_value: bm25
      source_claims:
        - claim-lexical-score-003
    - id: numeric_value
      labels:
        zh: 词汇分数值
        en: lexical score value
        ja: 語彙score値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存该词汇方法输出的原始分数。
        en: Raw score emitted by the declared lexical method.
        ja: 指定lexical methodが出力したraw scoreです。
      allowed_values: []
      pattern: null
      example_value: 11.42
      source_claims:
        - claim-lexical-score-004
  constraints: []
  required_relation_constraints: []
