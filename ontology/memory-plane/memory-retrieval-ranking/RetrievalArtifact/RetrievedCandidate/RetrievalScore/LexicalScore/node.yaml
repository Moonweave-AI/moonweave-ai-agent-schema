schema: moonweave.ai/ontology-node/v1
id: LexicalScore
kind: concept
labels:
  zh: 词汇匹配分数
  en: Lexical score
  ja: 語彙一致score
semantics:
  short_definition:
    zh: 词汇检索阶段产生的分数。
    en: Score from lexical retrieval stage.
    ja: lexical retrieval stage 生成 score。
  definition:
    zh: LexicalScore 是 RetrievalScore 子类，记录 BM25/TF-IDF 等词汇匹配分数；scoring_method=bm25 或 sparse-lexical。与 SimilarityScore、RerankScore 量纲不可直接比较。
    en: LexicalScore is a RetrievalScore subtype recording BM25/TF-IDF lexical match scores with scoring_method=bm25 or sparse-lexical. Not directly comparable to SimilarityScore or RerankScore.
    ja: LexicalScore は BM25/TF-IDF 等 lexical score の subtype。SimilarityScore/RerankScore と直接比較不可。
  why_needed:
    zh: Hybrid 检索中 BM25 分数与向量 cosine 必须分字段保存，否则 RRF 输入无法审计。
    en: In hybrid retrieval, BM25 and vector cosine must be stored separately or RRF inputs cannot be audited.
    ja: hybrid 検索で BM25/cosine 分離保存が RRF audit に必要。
  includes:
    - zh: 纳入 BM25、sparse lexical 等等价词汇分数。
      en: Includes BM25, sparse lexical, and equivalent lexical scores.
      ja: BM25/sparse lexical 等。
  excludes:
    - zh: 排除 cosine/dot-product 与 Cohere relevance_score。
      en: Excludes cosine/dot-product and Cohere relevance_score.
      ja: cosine/dot-product/Cohere relevance_score を除外。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: BM25 输出映射 numeric_value；scoring_stage=lexical；常与 dense 列表一起输入 RRF。
    en: BM25 output maps to numeric_value; scoring_stage=lexical; often feeds RRF with dense list.
    ja: BM25→numeric_value, scoring_stage=lexical, RRF input。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: Score identifier
        ja: score 識別子
      definitions:
        zh: 继承 RetrievalScore.score_id。
        en: Inherits RetrievalScore.score_id.
        ja: RetrievalScore.score_id を継承。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: lexical-score-428
      allowed_values: []
      source_claims:
        - claim-lexical-score-id
    - id: numeric_value
      labels:
        zh: BM25 数值
        en: BM25 value
        ja: BM25 値
      definitions:
        zh: BM25 或等价词汇分数。
        en: BM25 or equivalent lexical score.
        ja: BM25 等 lexical score。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 8.73
      allowed_values: []
      source_claims:
        - claim-lexical-score-value
    - id: scoring_method
      labels:
        zh: 词汇方法
        en: Lexical method
        ja: lexical method
      definitions:
        zh: bm25、tfidf、sparse-lexical 等。
        en: bm25, tfidf, sparse-lexical, etc.
        ja: bm25/tfidf/sparse-lexical。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: bm25
      allowed_values: []
      source_claims:
        - claim-lexical-score-method
  constraints: []
  required_relations: []
examples:
  - id: LexicalScore-example-bm25
    labels:
      zh: BM25 分数
      en: BM25 score
      ja: BM25 score
    descriptions:
      zh: lexical-score-428 numeric_value=8.73 scoring_method=bm25 for candidate-424。
      en: lexical-score-428 numeric_value=8.73 scoring_method=bm25 for candidate-424.
      ja: BM25 8.73 for candidate-424。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/index-modules-similarity.html
      version: BM25
    field_values:
      score_id: lexical-score-428
      numeric_value: 8.73
      scoring_method: bm25
    related_node_ids:
      - LexicalScore
      - RetrievalScore
    related_relation_ids: []
    source_claims:
      - claim-lexical-score-bm25
  - id: LexicalScore-example-hybrid-rrf
    labels:
      zh: Hybrid RRF 输入
      en: Hybrid RRF input
      ja: Hybrid RRF input
    descriptions:
      zh: BM25 top-40 与 dense top-40 各产生 LexicalScore/SimilarityScore 后进入 RRF。
      en: BM25 top-40 and dense top-40 each produce LexicalScore/SimilarityScore before RRF.
      ja: BM25+dense→RRF。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
      version: RRF input
    field_values: {}
    related_node_ids:
      - LexicalScore
      - RankFusion
    related_relation_ids: []
    source_claims:
      - claim-lexical-score-rrf
  - id: LexicalScore-example-not-cosine
    labels:
      zh: 非 cosine 分数
      en: Not cosine score
      ja: cosine score ではない
    descriptions:
      zh: Pinecone ScoredVector.score=0.842 是 SimilarityScore 不是 LexicalScore。
      en: Pinecone ScoredVector.score=0.842 is SimilarityScore not LexicalScore.
      ja: Pinecone cosine は SimilarityScore。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: contrast
    field_values: {}
    related_node_ids:
      - LexicalScore
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-lexical-score-not-cosine
parent_relation:
  id: LexicalScore-is_a-RetrievalScore
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalScore
    en: is a RetrievalScore
    ja: RetrievalScoreの一種
  definitions:
    zh: LexicalScore —is_a→ RetrievalScore 成立，因为其数值由 BM25、TF-IDF、稀疏表示或其他词汇匹配方法决定。
    en: LexicalScore —is_a→ RetrievalScore holds because its value is defined by BM25, TF-IDF, sparse representation, or another lexical-matching method.
    ja: LexicalScore —is_a→ RetrievalScore はvalueがBM25・TF-IDF・sparse representation等lexical matching methodで決まるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: LexicalScore-is_a-RetrievalScore-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is defined by BM25, TF-IDF, sparse representation, or another lexical-matching method."
      explanations:
        zh: 仅当实例既满足 RetrievalScore 的完整定义，又满足子类种差“其数值由 BM25、TF-IDF、稀疏表示或其他词汇匹配方法决定。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is defined by BM25, TF-IDF, sparse representation, or another lexical-matching method."
        ja: instanceがRetrievalScore完全定義とchild differentia「valueがBM25・TF-IDF・sparse representation等lexical matching methodで決まる」を共に満たす時だけassertします。
      source_claims:
        - claim-lexical-score-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: LexicalScore-is_a-RetrievalScore-example-positive-manual-001
      labels:
        zh: 是一种RetrievalScore正例
        en: "Positive case: is a RetrievalScore"
        ja: RetrievalScoreの一種正例
      descriptions:
        zh: lexical-score-428 记录 BM25=11.42。
        en: lexical-score-428 records BM25=11.42.
        ja: lexical-score-428がBM25=11.42を記録します。
      field_values: {}
      related_node_ids:
        - LexicalScore
        - RetrievalScore
      related_relation_ids:
        - LexicalScore-is_a-RetrievalScore
      source_claims:
        - claim-lexical-score-id
    - id: LexicalScore-is_a-RetrievalScore-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalScore边界例
        en: "Boundary case: is a RetrievalScore"
        ja: RetrievalScoreの一種境界例
      descriptions:
        zh: cosine=0.77 属于 SimilarityScore。
        en: cosine=0.77 belongs to SimilarityScore.
        ja: cosine=0.77はSimilarityScoreです。
      field_values: {}
      related_node_ids:
        - LexicalScore
        - RetrievalScore
      related_relation_ids:
        - LexicalScore-is_a-RetrievalScore
