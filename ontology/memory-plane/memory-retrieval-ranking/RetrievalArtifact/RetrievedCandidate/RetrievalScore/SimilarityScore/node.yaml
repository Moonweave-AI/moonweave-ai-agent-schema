schema: moonweave.ai/ontology-node/v1
id: SimilarityScore
kind: concept
status: accepted
labels:
  zh: 相似度评分
  en: Similarity score
  ja: 類似度スコア
semantics:
  short_definition:
    zh: 由已声明向量度量为一个已检索候选项产生的相似度或距离评分。
    en: A similarity or distance score produced for one retrieved candidate by a declared vector metric.
    ja: 宣言された vector metric が一つの取得済み候補に生成する similarity または distance score。
  definition:
    zh: >-
      SimilarityScore 是 RetrievalScore 的子类型，记录查询表示与候选表示按指定向量度量计算得到的值、度量配置和计算运行。
      它不是嵌入向量本身、词法匹配分数、重排序模型分数、最终排名或候选项被选择到上下文中的事实。
    en: >-
      A SimilarityScore is a subtype of RetrievalScore that retains its retrieval_score_id, generic score value, method, and
      scale while recording the value computed between a query representation and candidate representation under a named
      vector metric, metric configuration, and scoring run. It is not the embedding vector itself, a lexical-match score,
      a reranker score, final rank, or evidence that a candidate was selected into context.
    ja: >-
      SimilarityScore は RetrievalScore の下位型であり、query representation と candidate representation の間を指定された vector metric、
      metric configuration、scoring run で計算した値を記録する。embedding vector 自体、lexical-match score、reranker score、最終 rank、
      candidate が context に選択された証拠ではない。
  why_needed:
    zh: 向量检索依赖度量语义；单独保存度量与表示来源可防止把距离、余弦分数和后续评分混为一谈。
    en: Vector retrieval depends on metric semantics; retaining metric and representation provenance prevents distances cosine scores and later scores from being conflated.
    ja: vector retrieval は metric semantics に依存する。metric と representation provenance を保持し distance cosine score 後続 score の混同を防ぐ。
  includes:
    - zh: 候选引用、查询表示引用、候选表示引用、度量、数值、度量配置和计算运行。
      en: Candidate reference query representation reference candidate representation reference metric value configuration and scoring run.
      ja: candidate 参照 query representation 参照 candidate representation 参照 metric 値 configuration scoring run。
  excludes:
    - zh: 原始嵌入数组、BM25 分数、交叉编码器分数、排序位置、上下文选择和答案内容。
      en: Raw embedding array BM25 score cross-encoder score rank position context selection and answer content.
      ja: raw embedding array BM25 score cross-encoder score rank 位置 context selection answer 内容。
  semantic_kind: entity
  aliases: [vector score, cosine score, semantic similarity]
engineering:
  explanation:
    zh: 向量索引活动使用查询向量与候选向量按余弦、内积或距离度量搜索，并把每个返回候选项的数值作为独立评分输出。
    en: A vector-index activity searches query and candidate vectors with cosine, inner-product, or distance metric and emits a separate value for every returned candidate. The output retains the generic RetrievalScore contract so the metric-specific value can participate in a traceable ranking pipeline without being conflated with a rank.
    ja: vector-index activity は query vector と candidate vector を cosine inner-product または distance metric で検索し各 returned candidate に別の値を出力する。
  typical_input:
    - description: Vector representations and metric supplied to a similarity search.
      format: |
        {
          "query_representation_ref": "embedding-query-support-42",
          "index_ref": "support-vector-index-v3",
          "metric": "cosine",
          "score_method": "similarity",
          "scoring_run_ref": "similarity-run-support-42"
        }
  typical_output:
    - description: One similarity score emitted for a returned candidate.
      format: |
        {
          "retrieval_score_id": "score-similarity-support-42",
          "similarity_score_id": "similarity-score-support-42",
          "candidate_ref": "candidate-support-42",
          "query_representation_ref": "embedding-query-support-42",
          "candidate_representation_ref": "embedding-chunk-support-42",
          "metric": "cosine",
          "similarity_value": 0.91,
          "score_value": 0.91,
          "score_method": "similarity",
          "score_scale": "cosine-similarity",
          "metric_configuration_ref": "support-vector-index-v3-cosine",
          "scoring_run_ref": "similarity-run-support-42"
        }
  reference_implementations:
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents vector similarity search and distance operators for PostgreSQL.
    - name: FAISS Index API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents an index search API over numeric vector representations.
structure:
  identity_keys: [retrieval_score_id, similarity_score_id]
  fields:
    - id: retrieval_score_id
      labels:
        zh: 检索评分标识
        en: retrieval score ID
        ja: retrieval score ID
      definitions:
        zh: 保留 RetrievalScore 父类的稳定标识，使向量度量结果可作为通用检索评分记录被审计。
        en: Retains the stable RetrievalScore parent identifier so the vector-metric result can be audited as a general retrieval-score record.
        ja: vector metric の結果を一般的な retrieval-score record として監査できるよう RetrievalScore 親の安定識別子を保持する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^score-[A-Za-z0-9._-]+$'
      example_value: score-similarity-support-42
      source_claims: [claim-similarity-score-search]
    - id: similarity_score_id
      labels:
        zh: 相似度评分标识
        en: similarity score ID
        ja: similarity score ID
      definitions:
        zh: 在候选项、查询表示和计算运行范围内稳定标识一条相似度评分。
        en: Stably identifies one similarity score in a candidate query-representation and scoring-run scope.
        ja: candidate query-representation scoring-run の範囲内で一つの similarity score を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^similarity-score-[A-Za-z0-9._-]+$'
      example_value: similarity-score-support-42
      source_claims: [claim-similarity-score-search]
    - id: candidate_ref
      labels:
        zh: 候选引用
        en: candidate reference
        ja: candidate 参照
      definitions:
        zh: 指向获得该数值的 RetrievedCandidate，不指向整个索引或答案。
        en: Points to the RetrievedCandidate receiving the value rather than whole index or answer.
        ja: index 全体や answer ではなく値を受ける RetrievedCandidate を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-support-42
      source_claims: [claim-similarity-score-search]
    - id: query_representation_ref
      labels:
        zh: 查询表示引用
        en: query representation reference
        ja: query representation 参照
      definitions:
        zh: 指向用于向量比较的查询表示，而不是查询请求或查询文本的副本。
        en: Points to the query representation used in vector comparison rather than a query request or text copy.
        ja: query request や text の複製ではなく vector comparison に使う query representation を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-query-support-42
      source_claims: [claim-similarity-score-representation]
    - id: candidate_representation_ref
      labels:
        zh: 候选表示引用
        en: candidate representation reference
        ja: candidate representation 参照
      definitions:
        zh: 指向候选项对应的固定向量表示，不复制浮点数组。
        en: Points to the fixed vector representation associated with the candidate without copying the float array.
        ja: float array を複製せず candidate に関連する固定 vector representation を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-chunk-support-42
      source_claims: [claim-similarity-score-representation]
    - id: metric
      labels:
        zh: 向量度量
        en: vector metric
        ja: vector metric
      definitions:
        zh: 声明产生数值的比较度量，避免将相似度和距离解释混用。
        en: Declares comparison metric producing the value so similarity and distance interpretations are not mixed.
        ja: 値を生成した comparison metric を宣言し similarity と distance の解釈を混ぜない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [cosine, inner_product, l2_distance]
      pattern: null
      example_value: cosine
      source_claims: [claim-similarity-score-metric]
    - id: similarity_value
      labels:
        zh: 相似度数值
        en: similarity value
        ja: similarity 値
      definitions:
        zh: 在已声明度量和配置下为查询候选表示对计算出的数值。
        en: Numeric result calculated for the query-candidate representation pair under declared metric and configuration.
        ja: 宣言された metric と configuration で query-candidate representation pair に計算した数値。
      datatype: decimal
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 0.91
      source_claims: [claim-similarity-score-search]
    - id: score_value
      labels:
        zh: 父类评分数值
        en: parent score value
        ja: 親 score 値
      definitions:
        zh: 保留 RetrievalScore 的通用数值；在相似度子类型中它必须与 similarity_value 相等。
        en: Retains the generic value required by RetrievalScore; in the similarity subtype it must equal similarity_value.
        ja: RetrievalScore が要求する汎用値を保持し、similarity subtype では similarity_value と等しくなければならない。
      datatype: decimal
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 0.91
      source_claims: [claim-similarity-score-search]
    - id: score_method
      labels:
        zh: 父类评分方法
        en: parent score method
        ja: 親 score method
      definitions:
        zh: 保留 RetrievalScore 的方法分类；相似度子类型固定为 similarity，不表示最终排序策略。
        en: Retains the RetrievalScore method family; the similarity subtype fixes it to similarity and does not express a final ranking policy.
        ja: RetrievalScore の method family を保持し、similarity subtype では similarity に固定して最終 ranking policy を表さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [similarity]
      pattern: null
      example_value: similarity
      source_claims: [claim-similarity-score-metric]
    - id: score_scale
      labels:
        zh: 父类评分量表
        en: parent score scale
        ja: 親 score scale
      definitions:
        zh: 声明父类数值的可比范围，例如 cosine-similarity 或 l2-distance；它不能仅由裸数值推断。
        en: Declares the comparability scale of the parent value, such as cosine-similarity or l2-distance; it cannot be inferred from a bare number.
        ja: cosine-similarity や l2-distance など親値の comparability scale を宣言し、裸の数値から推論できない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: cosine-similarity
      source_claims: [claim-similarity-score-metric]
    - id: metric_configuration_ref
      labels:
        zh: 度量配置引用
        en: metric configuration reference
        ja: metric configuration 参照
      definitions:
        zh: 指向索引和度量配置，包括距离转换或归一化的约定。
        en: References index and metric configuration including distance conversion or normalization convention.
        ja: distance conversion または normalization convention を含む index と metric configuration を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vector-index-v3-cosine
      source_claims: [claim-similarity-score-metric]
    - id: scoring_run_ref
      labels:
        zh: 相似度计算运行引用
        en: similarity scoring run reference
        ja: similarity scoring run 参照
      definitions:
        zh: 指向执行向量比较的活动或运行记录，不证明后续模型消费。
        en: Points to activity or run that executed vector comparison and does not prove downstream model consumption.
        ja: vector comparison を実行した activity または run を指し downstream model の消費を証明しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: similarity-run-support-42
      source_claims: [claim-similarity-score-provenance]
  constraints:
    - id: similarity-score-metric-and-representations
      severity: error
      expression_language: plain
      expression: retrieval_score_id, candidate_ref, query_representation_ref, candidate_representation_ref, metric, similarity_value, score_value, score_method, score_scale, metric_configuration_ref, and scoring_run_ref are required. The referenced representations must be compatible with the declared metric configuration.
      explanation:
        zh: 相似度数值必须保留两端表示、度量和运行来源，才能审计其可比范围。
        en: A similarity value must retain both representations metric and run provenance to audit its comparability boundary.
        ja: similarity 値は両 representation metric run provenance を保持して comparability boundary を監査可能にする。
      source_claims: [claim-similarity-score-metric, claim-similarity-score-provenance]
    - id: similarity-score-parent-contract
      severity: error
      expression_language: plain
      expression: score_value equals similarity_value; score_method is similarity; and score_scale declares the selected metric's value scale. The parent RetrievalScore fields must describe the same candidate and scoring run as the metric-specific fields.
      explanation:
        zh: 父类字段是同一向量比较事实的通用接口，不是能与 similarity_value 脱离的另一份评分。
        en: The parent fields are the generic interface of the same vector-comparison fact, not another score that can diverge from similarity_value.
        ja: 親 field は同じ vector-comparison fact の汎用 interface であり、similarity_value から乖離できる別 score ではない。
      source_claims: [claim-similarity-score-search, claim-similarity-score-metric]
    - id: similarity-score-not-embedding-or-rank
      severity: error
      expression_language: plain
      expression: SimilarityScore must not store raw vector arrays, lexical or rerank values, final rank, context selection, answer text, or persistence outcome.
      explanation:
        zh: 向量表示、不同方法的分数和下游选择是不同实体或活动事实，不能压入一个相似度评分。
        en: Vector representations other score methods and downstream selection are distinct entities or activity facts and cannot be collapsed into one similarity score.
        ja: vector representation 他の score method downstream selection は別 entity または activity fact であり一つの similarity score に畳み込まない。
      source_claims: [claim-similarity-score-provenance]
  required_relations: []
examples:
  - id: similarity-score-positive-cosine

    labels:
      zh: 候选项余弦相似度
      en: Candidate cosine similarity
      ja: candidate の cosine similarity

    descriptions:
      zh: Pinecone index.query 返回 cosine similarity match score；pgvector SELECT ORDER BY embedding <=> query LIMIT 5 的 <=> 距离；ColBERT MaxSim 作为 multi-vector similarity。
      en: Pinecone index.query returns cosine similarity match score; pgvector SELECT ORDER BY embedding <=> query LIMIT 5 distance; ColBERT MaxSim as multi-vector similarity.
      ja: Pinecone cosine match score。pgvector <=> 距離。ColBERT MaxSim multi-vector similarity。
    field_values: {retrieval_score_id: score-similarity-support-42, similarity_score_id: similarity-score-support-42, candidate_ref: candidate-support-42, query_representation_ref: embedding-query-support-42, candidate_representation_ref: embedding-chunk-support-42, metric: cosine, similarity_value: 0.91, score_value: 0.91, score_method: similarity, score_scale: cosine-similarity, metric_configuration_ref: support-vector-index-v3-cosine, scoring_run_ref: similarity-run-support-42}
    related_node_ids: [SimilarityScore, RetrievalScore, RetrievedCandidate]
    related_relation_ids: [SimilarityScore-is_a-RetrievalScore]

    source_claims: [claim-similarity-score-search]
  - id: similarity-score-counterexample-embedding

    labels:
      zh: 将嵌入数组称为评分
      en: Embedding array presented as a score
      ja: embedding array を score として提示

    descriptions:
      zh: 反例：BM25 lexical score 标为 SimilarityScore 而非 LexicalScore。
      en: Counterexample: BM25 lexical score labeled SimilarityScore instead of LexicalScore.
      ja: 反例：BM25 lexical score を SimilarityScore と誤ラベル。
    field_values: {embedding_model: text-embedding-3-small, values: '[0.014, -0.032, ...]'}
    related_node_ids: [SimilarityScore, TextEmbedding, EmbeddingVector]
    related_relation_ids: [SimilarityScore-is_a-RetrievalScore]

    source_claims: [claim-similarity-score-representation]
  - id: similarity-score-boundary-distance

    labels:
      zh: L2 距离与余弦相似度
      en: L2 distance versus cosine similarity
      ja: L2 distance と cosine similarity

    descriptions:
      zh: Dense cosine SimilarityScore vs ColBERT token-level MaxSim vs sparse dot-product 不同度量边界。
      en: Dense cosine SimilarityScore vs ColBERT token-level MaxSim vs sparse dot-product metric boundary.
      ja: Dense cosine vs ColBERT MaxSim vs sparse dot-product metric 境界。
    field_values: {retrieval_score_id: score-similarity-support-42-l2, similarity_score_id: similarity-score-support-42-l2, candidate_ref: candidate-support-42, query_representation_ref: embedding-query-support-42, candidate_representation_ref: embedding-chunk-support-42, metric: l2_distance, similarity_value: 0.42, score_value: 0.42, score_method: similarity, score_scale: l2-distance, metric_configuration_ref: support-vector-index-v3-l2, scoring_run_ref: similarity-run-support-42}
    related_node_ids: [SimilarityScore, RetrievalScore, Index]
    related_relation_ids: [SimilarityScore-is_a-RetrievalScore]

    source_claims: [claim-similarity-score-metric]
  - id: similarity-score-instance-pgvector

    labels:
      zh: pgvector 向量检索实例
      en: pgvector vector-search instance
      ja: pgvector vector-search の事例

    descriptions:
      zh: Qdrant search(query_vector=[...], limit=10) 返回 score 按 cosine；OpenAI embedding cosine 1536-dim 向量对。
      en: Qdrant search(limit=10) returns cosine score; OpenAI embedding cosine 1536-dim vector pair.
      ja: Qdrant search cosine score。OpenAI embedding 1536-dim cosine。
    field_values: {retrieval_score_id: score-similarity-pgvector-17, similarity_score_id: similarity-score-pgvector-17, candidate_ref: candidate-pgvector-17, query_representation_ref: embedding-query-pgvector-17, candidate_representation_ref: embedding-chunk-pgvector-17, metric: l2_distance, similarity_value: 0.37, score_value: 0.37, score_method: similarity, score_scale: l2-distance, metric_configuration_ref: pgvector-index-v1-l2, scoring_run_ref: similarity-run-pgvector-17}
    related_node_ids: [SimilarityScore, RetrievedCandidate, Index]
    related_relation_ids: [SimilarityScore-is_a-RetrievalScore]
    source_claims: [claim-similarity-score-search]
parent_relation:
  id: SimilarityScore-is_a-RetrievalScore
  predicate: is_a
  target: concept:RetrievalScore
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是检索评分的相似度子类
    en: is a similarity subtype of retrieval score
    ja: RetrievalScore の similarity 下位型である
  definitions:
    zh: SimilarityScore 是以查询候选表示对和已声明向量度量为差异的 RetrievalScore。
    en: SimilarityScore is RetrievalScore with the differentia of query-candidate representation pair and declared vector metric.
    ja: SimilarityScore は query-candidate representation pair と宣言済み vector metric を差異とする RetrievalScore である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_similarity_score_subtype
    labels:
      zh: 具有相似度评分子类
      en: has similarity-score subtype
      ja: similarity-score 下位型を持つ
  conditions:
    - id: similarity-score-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when a declared vector metric computes a value between a query representation and candidate representation with configuration and run provenance.
      explanation:
        zh: 子类型差异是对两端表示按声明度量进行的可追溯向量比较。
        en: The subtype differentia is a traceable vector comparison of two representations under declared metric.
        ja: subtype の differentia は宣言済み metric の下で二つの representation を追跡可能に vector 比較することである。
      source_claims: [claim-similarity-score-metric]
  temporal_scope: valid-time
  boundary_context: A later rerank or fusion score does not change the vector metric provenance of this score.
  constraints: []
  examples: []
  source_claims: [claim-similarity-score-search]
  distinct_fact_rationale: This relation classifies vector-metric scoring and does not express index implementation rank or selection.
  layout_role: primary-backbone
relations: []
sources:
  - id: pgvector
    title: pgvector
    source_type: official-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents vector similarity search and distance operators for PostgreSQL.
  - id: faiss-index-api
    title: FAISS Index API
    source_type: official-documentation
    url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
    relevance: Documents an index search API over numeric vector representations.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates generated score entities from activities that perform vector search.
source_claims:
  - id: claim-similarity-score-search
    source: pgvector
    supports: pgvector provides vector search and distance operators. Moonweave records each candidate comparison result as a SimilarityScore with its metric and candidate reference.
    locator: "README: vector distance operators and nearest-neighbor search"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-similarity-score-representation
    source: faiss-index-api
    supports: FAISS Index search operates over numeric vector representations. Moonweave references query and candidate representations instead of treating the score as an embedding array.
    locator: "Index API: search over vector inputs"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-similarity-score-metric
    source: pgvector
    supports: pgvector exposes distinct vector distance operators. Moonweave preserves the declared metric and configuration because numeric values depend on the selected operator.
    locator: "README: L2 inner-product cosine and other vector operators"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-similarity-score-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes generated entities from activities. Moonweave keeps per-candidate similarity values separate from vector-index activity and later ranking or model use.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
