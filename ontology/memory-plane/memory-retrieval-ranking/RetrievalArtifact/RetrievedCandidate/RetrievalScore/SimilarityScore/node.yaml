    related_relation_ids: []
    expected_result:
      zh: 归类为 SimilarityScore。
      en: Classify the object as SimilarityScore.
      ja: SimilarityScore として分類します。
    why_valid_or_invalid:
      zh: 度量、候选、产生阶段与原始数值均明确且可追溯。
      en: Metric, candidate, and raw value are explicit.
      ja: metric・candidate・raw valueが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-similarity-score-005
  - id: SimilarityScore-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 向量相似度分数边界例
      en: "Boundary case: Similarity score"
      ja: vector類似度score境界例
    scenario_id: null
    descriptions:
      zh: rerank-score-429 是交叉编码器联合读取查询与文本后的输出。
      en: rerank-score-429 is output from a cross-encoder jointly reading query and text.
      ja: rerank-score-429 はcross-encoderがquery/textをjointly読んだoutputです。
    field_values: {}
    related_node_ids:
      - SimilarityScore
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 SimilarityScore。
      en: Do not classify the object as SimilarityScore.
      ja: SimilarityScore として分類しません。
    why_valid_or_invalid:
      zh: 它是 RerankScore，不是向量度量产生的 SimilarityScore。
      en: It is RerankScore, not metric-produced SimilarityScore.
      ja: RerankScoreでmetric由来SimilarityScoreではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-similarity-score-006
