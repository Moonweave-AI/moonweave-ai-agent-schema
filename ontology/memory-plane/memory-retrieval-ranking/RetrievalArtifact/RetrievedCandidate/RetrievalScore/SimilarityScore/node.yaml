schema: moonweave.ai/ontology-node/v1
id: SimilarityScore
kind: concept
status: accepted
labels:
  zh: 向量相似度分数
  en: Similarity score
  ja: vector類似度score
semantics:
  short_definition:
    zh: 由声明向量度量比较查询与候选表示而产生的检索分数。
    en: A retrieval score produced by comparing query and candidate representations under a declared vector metric.
    ja: 指定vector metricでquery/candidate representationを比較して生成するretrieval scoreです。
  definition:
    zh: SimilarityScore 是 RetrievalScore 的严格子类，其数值来自查询表示与候选表示在声明 metric 下的相似或距离计算；它不覆盖词汇分数、重排模型判断或融合后的排名。
    en: SimilarityScore is the strict RetrievalScore subtype whose value comes from similarity or distance between query and candidate representations under a declared metric. It does not cover lexical scores, reranker judgments, or fused rank.
    ja: SimilarityScore は指定metric下のquery/candidate representation間similarity/distance由来strict RetrievalScore subtypeです。lexical score・reranker judgment・fused rankを含みません。
  why_needed:
    zh: 显式记录度量语义，避免把 cosine、dot product 与距离值按同一方向解释。
    en: Makes metric semantics explicit so cosine, dot-product, and distance values are not interpreted in one direction.
    ja: metric semanticsを明示しcosine・dot product・distance valueを同方向解釈しません。
  includes:
    - zh: 纳入 cosine、dot product、Euclidean distance 或声明向量度量产生的候选分数。
      en: Includes candidate scores from cosine, dot product, Euclidean distance, or another declared vector metric.
      ja: cosine・dot product・Euclidean distance等指定vector metric由来candidate scoreを含みます。
  excludes:
    - zh: 排除 BM25/TF-IDF、交叉编码器分数、业务相关性等级和排名位置。
      en: Excludes BM25 or TF-IDF, cross-encoder scores, business relevance categories, and rank position.
      ja: BM25/TF-IDF・cross-encoder score・business relevance category・rank positionを除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: score ID
        ja: score ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并标识一次向量相似度评分记录。
        en: Inherited identifier for one vector-similarity score record.
        ja: 一vector-similarity score recordを継承識別します。
      allowed_values: []
      pattern: null
      example_value: similarity-score-429
      source_claims:
        - claim-similarity-score-002
    - id: similarity_metric
      labels:
        zh: 相似度量
        en: similarity metric
        ja: 類似度metric
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明数值的向量相似或距离度量。
        en: Declares the vector similarity or distance metric governing the value.
        ja: valueを規定するvector similarity/distance metricを宣言します。
      allowed_values: []
      pattern: null
      example_value: cosine
      source_claims:
        - claim-similarity-score-003
    - id: numeric_value
      labels:
        zh: 相似度值
        en: similarity value
        ja: 類似度値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存该度量输出的原始数值。
        en: Raw numeric value emitted under the declared metric.
        ja: 指定metricが出力したraw numeric valueです。
      allowed_values: []
      pattern: null
      example_value: 0.77
      source_claims:
        - claim-similarity-score-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SimilarityScore-example-positive-manual-001
    kind: positive
    labels:
      zh: 向量相似度分数正例
      en: "Positive case: Similarity score"
      ja: vector類似度score正例
    scenario_id: null
    descriptions:
      zh: similarity-score-429 记录 cosine 对 candidate-424 产生的 0.77。
      en: similarity-score-429 records cosine value 0.77 for candidate-424.
      ja: similarity-score-429 はcandidate-424のcosine値0.77を記録します。
    field_values:
      score_id: similarity-score-429
      similarity_metric: cosine
      numeric_value: 0.77
      scoring_stage: dense-recall
    related_node_ids:
