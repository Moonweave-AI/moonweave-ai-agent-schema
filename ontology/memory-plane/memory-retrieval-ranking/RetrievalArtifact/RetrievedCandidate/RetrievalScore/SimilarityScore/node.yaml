parent_relation:
  id: SimilarityScore-is_a-RetrievalScore
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalScore
    en: is a RetrievalScore
    ja: RetrievalScoreの一種
  definitions:
    zh: SimilarityScore —is_a→ RetrievalScore 成立，因为其数值由声明的查询-候选向量相似或距离度量决定。
    en: SimilarityScore —is_a→ RetrievalScore holds because its value is defined by a declared query-to-candidate vector similarity or distance metric.
    ja: SimilarityScore —is_a→ RetrievalScore はvalueが指定query-candidate vector similarity/distance metricで決まるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: SimilarityScore-is_a-RetrievalScore-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is defined by a declared query-to-candidate vector similarity or distance metric."
      explanations:
        zh: 仅当实例既满足 RetrievalScore 的完整定义，又满足子类种差“其数值由声明的查询-候选向量相似或距离度量决定。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalScore definition and the child differentia: its value is defined by a declared query-to-candidate vector similarity or distance metric."
        ja: instanceがRetrievalScore完全定義とchild differentia「valueが指定query-candidate vector similarity/distance metricで決まる」を共に満たす時だけassertします。
      source_claims:
        - claim-similarity-score-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SimilarityScore-is_a-RetrievalScore-example-positive-manual-001
      labels:
        zh: 是一种RetrievalScore正例
        en: "Positive case: is a RetrievalScore"
        ja: RetrievalScoreの一種正例
      descriptions:
        zh: similarity-score-429 记录 cosine=0.77。
        en: similarity-score-429 records cosine=0.77.
        ja: similarity-score-429がcosine=0.77を記録します。
      field_values: {}
      related_node_ids:
        - SimilarityScore
        - RetrievalScore
      related_relation_ids:
        - SimilarityScore-is_a-RetrievalScore
      source_claims:
        - claim-similarity-score-id
    - id: SimilarityScore-is_a-RetrievalScore-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalScore边界例
        en: "Boundary case: is a RetrievalScore"
        ja: RetrievalScoreの一種境界例
      descriptions:
        zh: BM25=11.42 属于 LexicalScore。
        en: BM25=11.42 belongs to LexicalScore.
        ja: BM25=11.42はLexicalScoreです。
      field_values: {}
