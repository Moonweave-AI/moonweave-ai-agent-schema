schema: moonweave.ai/ontology-node/v1
id: SimilarityScore
kind: concept
labels:
  zh: 向量相似度分数
  en: Similarity score
  ja: vector類似度score
semantics:
  short_definition:
    zh: 向量相似度阶段分数。
    en: Vector similarity stage score.
    ja: vector similarity stage score。
  definition:
    zh: SimilarityScore 是 RetrievalScore 子类，记录 Pinecone/Chroma 等向量 DB 返回的 cosine、dot-product 或 distance 转换分数；scoring_method=cosine-similarity 或 dot-product。ColBERT MaxSim Late interaction 分数用 scoring_method=colbert-maxsim 也可建模为 SimilarityScore 或独立 stage。
    en: SimilarityScore is a RetrievalScore subtype recording cosine, dot-product, or distance-derived scores from Pinecone/Chroma vector DBs with scoring_method=cosine-similarity or dot-product. ColBERT MaxSim may use scoring_method=colbert-maxsim.
    ja: SimilarityScore は Pinecone/Chroma cosine/dot-product/distance の subtype。ColBERT MaxSim は colbert-maxsim。
  why_needed:
    zh: 向量分数与 Cohere rerank 分数范围不同；必须标注 scoring_method 才能正确解释 0.842 的含义。
    en: Vector scores differ in range from Cohere rerank; scoring_method is required to interpret 0.842 correctly.
    ja: vector score と rerank score 范围不同。scoring_method 必須。
  includes:
    - zh: 纳入 cosine、dot-product 与 distance 转换的 dense/sparse vector 分数。
      en: Includes cosine, dot-product, and distance-derived dense/sparse vector scores.
      ja: cosine/dot-product/distance 変換 vector score。
  excludes:
    - zh: 排除 BM25、Cohere relevance_score 与 rank_position。
      en: Excludes BM25, Cohere relevance_score, and rank_position.
      ja: BM25/Cohere relevance_score/rank_position を除外。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: Pinecone ScoredVector.score→numeric_value；Chroma distance→numeric_value（可转换 similarity）；ColBERT MaxSim→numeric_value scoring_method=colbert-maxsim。
    en: Pinecone ScoredVector.score→numeric_value; Chroma distance→numeric_value; ColBERT MaxSim→numeric_value with scoring_method=colbert-maxsim.
    ja: Pinecone/Chroma/ColBERT API 映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - score_id
  fields:
    - id: score_id
      labels:
        zh: 分数标识
        en: Score identifier
        ja: score 識別子
      definitions:
        zh: 继承 RetrievalScore.score_id。
        en: Inherits RetrievalScore.score_id.
        ja: RetrievalScore.score_id 継承。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: similarity-score-429
      allowed_values: []
      source_claims:
        - claim-similarity-score-id
    - id: numeric_value
      labels:
        zh: 相似度数值
        en: Similarity value
        ja: similarity 値
      definitions:
        zh: cosine/dot-product 或 distance 转换值。
        en: Cosine/dot-product or converted distance value.
        ja: cosine/dot-product/distance 変換値。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.842
      allowed_values: []
      source_claims:
        - claim-similarity-score-value
    - id: scoring_method
      labels:
        zh: 相似度方法
        en: Similarity method
        ja: similarity method
      definitions:
        zh: cosine-similarity、dot-product、cosine-distance、colbert-maxsim。
        en: cosine-similarity, dot-product, cosine-distance, colbert-maxsim.
        ja: cosine-similarity/dot-product/colbert-maxsim 等。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: cosine-similarity
      allowed_values: []
      source_claims:
        - claim-similarity-score-method
  constraints: []
  required_relations: []
