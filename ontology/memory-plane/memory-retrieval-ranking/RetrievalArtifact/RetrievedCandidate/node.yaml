schema: moonweave.ai/ontology-node/v1
id: RetrievedCandidate
kind: concept
status: accepted
labels:
  zh: 检索候选
  en: Retrieved candidate
  ja: 検索候補
semantics:
  short_definition:
    zh: 在一个候选集合中引用实际内容对象并记录阶段排名与分数的候选产物。
    en: A candidate artifact that refers to an actual content object and records stage rank and scores within a candidate set.
    ja: candidate set内でactual content objectを参照しstage rankとscoreを記録するcandidate artifactです。
  definition:
    zh: RetrievedCandidate 是检索域唯一的候选身份：它以 candidate_id 标识一次请求/运行中的候选记录，以 referent_id 指向实际内容，并在字段中记录 rank_position；具体 Chunk 命中作为 RetrievedChunk 子类表达。它不是 CandidateSet、CandidateRank 外部节点或上下文采用结果。
    en: RetrievedCandidate is the retrieval domain's single candidate identity. candidate_id identifies a candidate record within a request or run, referent_id points to the actual content, and rank_position is a field on that record. A chunk hit is refined as RetrievedChunk. It is not a CandidateSet, a separate CandidateRank node, or a context-admission result.
    ja: RetrievedCandidate はretrieval domain唯一のcandidate identityです。candidate_idがrequest/run内recordを識別しreferent_idがactual contentを指しrank_positionはrecord fieldです。chunk hitはRetrievedChunkへ具体化します。CandidateSet・別CandidateRank node・context admission resultではありません。
  why_needed:
    zh: 合并 CandidateChunk、RetrievedContextCandidate 等重叠身份，并把排名还原为候选字段。
    en: Unifies overlapping candidate shadows and restores rank as a field of the candidate record.
    ja: 重複candidate shadowを統合しrankをcandidate record fieldへ戻します。
  includes:
    - zh: 纳入进入 CandidateSet、具有内容引用并可附带一个或多个阶段分数的候选记录。
      en: Includes candidate records that belong to a CandidateSet, refer to content, and may carry one or more stage scores.
      ja: CandidateSetに属しcontentを参照し一つ以上stage scoreを持ち得るcandidate recordを含みます。
  excludes:
    - zh: 排除候选集合、原始内容实体、独立排名节点、上下文槽位和安全发现。
      en: Excludes candidate sets, original content entities, separate rank nodes, context slots, and safety findings.
      ja: candidate set・original content entity・separate rank node・context slot・safety findingを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - candidate_id
  fields:
    - id: candidate_id
      labels:
        zh: 候选标识
        en: candidate ID
        ja: candidate ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属检索运行中稳定标识候选记录。
        en: Stable identifier for the candidate record within its retrieval run.
        ja: owner retrieval run内でcandidate recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: candidate-424
      source_claims:
        - claim-retrieved-candidate-002
    - id: referent_id
      labels:
        zh: 内容引用标识
        en: referent ID
        ja: referent ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被检索到的实际内容实体，而不复制其身份。
        en: Points to the actual retrieved content entity without duplicating its identity.
        ja: 取得actual content entityをidentity複製なしに指します。
      allowed_values: []
      pattern: null
      example_value: chunk-882
      source_claims:
        - claim-retrieved-candidate-003
    - id: rank_position
      labels:
        zh: 排名位置
        en: rank position
        ja: rank position
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选在声明阶段候选集合中的一基排名位置。
        en: One-based rank position of the candidate in a declared stage's CandidateSet.
        ja: 指定stage CandidateSet内のone-based rank positionです。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-retrieved-candidate-004
  constraints: []
  required_relation_constraints: []
