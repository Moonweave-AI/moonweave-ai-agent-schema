schema: moonweave.ai/ontology-node/v1
id: RetrievedCandidate
kind: concept
status: accepted
labels: {zh: 已检索候选, en: Retrieved candidate, ja: 検索済み候補}
semantics:
  short_definition:
    zh: 在一个检索请求范围内被引用为潜在结果的来源工件表示。
    en: A source-artifact representation referenced as a potential result within one retrieval-request scope.
    ja: 一つの retrieval-request scope 内で potential result として参照される source-artifact representation。
  definition:
    zh: >-
      RetrievedCandidate 是一种 RetrievalArtifact，连接一个来源工件版本、检索请求、检索范围和产生来源。
      它表示“此来源可参与当前结果”，而不表示候选已被选入上下文、获得特定分数、被模型阅读、生成答案或写入记忆。
    en: >-
      A RetrievedCandidate is a RetrievalArtifact connecting one source-artifact version, retrieval request, retrieval scope,
      and generating provenance. It means this source may participate in the current result and does not mean it was selected
      into context, received a particular score, was read by a model, generated an answer, or was written to memory.
    ja: >-
      RetrievedCandidate は一つの source-artifact version、retrieval request、retrieval scope、generating provenance を結ぶ
      RetrievalArtifact です。この source が現在の result に参加可能であることを表し、context への選択、特定 score、model の read、
      answer の生成、memory への write は表しません。
  why_needed:
    zh: 把被检索到的来源版本与其后的评分、融合和上下文选择分开，才能保留候选可追溯性。
    en: Separating retrieved source version from later scoring, fusion, and context selection preserves candidate traceability.
    ja: retrieve された source version を後続 scoring、fusion、context selection から分けることで candidate traceability を保持する。
  includes:
    - zh: 来源工件引用、请求引用、范围引用、来源运行引用和候选完整性摘要。
      en: Source-artifact reference, request reference, scope reference, generating-run reference, and candidate integrity digest.
      ja: source-artifact reference、request reference、scope reference、generating-run reference、candidate integrity digest。
  excludes:
    - zh: 候选分数、排序位置、上下文包成员资格、模型使用证据、答案文本和存储写入结果。
      en: Candidate score, rank position, context-package membership, model-use evidence, answer text, and storage-write result.
      ja: candidate score、rank position、context-package membership、model-use evidence、answer text、storage-write result。
  semantic_kind: entity
  aliases: [retrieval candidate, returned item, candidate artifact]
engineering:
  explanation:
    zh: 检索实现把返回文档或片段包装为候选工件；排序活动读取候选引用并另外生成分数或结果。
    en: Retrieval implementation wraps returned documents or chunks as candidate artifacts; ranking activity reads candidate references and separately generates scores or results.
    ja: retrieval implementation は returned document 又は chunk を candidate artifact として wrap し、ranking activity は candidate reference を read して別に score 又は result を生成する。
  typical_input:
    - description: Candidate artifact emitted for a source chunk.
      format: |
        {
          "retrieved_candidate_id": "candidate-support-42",
          "source_artifact_ref": "chunk-support-policy-v3",
          "request_ref": "retrieval-request-support-20260719",
          "retrieval_scope_ref": "scope-support-42",
          "provenance_ref": "candidate-generation-support-42",
          "candidate_digest": "sha256-candidate-support-42"
        }
  typical_output:
    - description: Scoring receives candidate identity separately from its score.
      format: |
        score_candidate(candidate_ref="candidate-support-42")
        # emits RetrievalScore; does not mutate the candidate identity
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents retrievers returning documents for a query in retrieval-augmented applications.
    - name: Retrieval-Augmented Generation paper
      url: https://arxiv.org/abs/2005.11401
      description: Describes retrieving non-parametric memory as separate input to downstream generation.
structure:
  identity_keys: [retrieved_candidate_id]
  fields:
    - id: retrieved_candidate_id
      labels: {zh: 候选标识, en: retrieved candidate ID, ja: retrieved candidate ID}
      definitions:
        zh: 稳定标识一个在给定请求范围内的候选表示，而不是来源工件本身。
        en: Stably identifies one candidate representation in a request scope rather than the source artifact itself.
        ja: source artifact 自体ではなく request scope 内の一つの candidate representation を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-[A-Za-z0-9._-]+$'
      example_value: candidate-support-42
      source_claims: [claim-retrieved-candidate-artifact]
    - id: source_artifact_ref
      labels: {zh: 来源工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向候选所表示的固定来源工件版本，例如 ChunkArtifact，而非复制其正文。
        en: Points to the fixed source-artifact version represented by the candidate, such as ChunkArtifact, without copying its body.
        ja: candidate が表す ChunkArtifact など固定された source-artifact version を指し、その body を複製しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-support-policy-v3
      source_claims: [claim-retrieved-candidate-artifact]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      definitions:
        zh: 指向使该来源成为候选的 RetrievalRequest。
        en: Points to the RetrievalRequest that made the source a candidate.
        ja: source を candidate にした RetrievalRequest を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-request-support-20260719
      source_claims: [claim-retrieved-candidate-artifact]
    - id: retrieval_scope_ref
      labels: {zh: 检索范围引用, en: retrieval scope reference, ja: retrieval scope 参照}
      definitions:
        zh: 标识实际返回此候选的范围，不等同于授权授予或来源所有者。
        en: Identifies the scope that actually returned this candidate and is not authorization grant or source owner.
        ja: この candidate を実際に返した scope を識別し、authorization grant 又は source owner ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: scope-support-42
      source_claims: [claim-retrieved-candidate-scope]
    - id: provenance_ref
      labels: {zh: 产生来源引用, en: generating provenance reference, ja: generating provenance 参照}
      definitions:
        zh: 指向候选生成活动或运行记录，不证明候选已被模型或用户消费。
        en: Points to candidate-generation activity or run record and does not prove that model or user consumed the candidate.
        ja: candidate-generation activity 又は run record を指し、model 又は user が candidate を消費した証明ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-generation-support-42
      source_claims: [claim-retrieved-candidate-provenance]
    - id: candidate_digest
      labels: {zh: 候选摘要, en: candidate digest, ja: candidate digest}
      definitions:
        zh: 用于验证候选所指来源版本及关键引用未变，不是检索相似度分数。
        en: Verifies that represented source version and key references did not change and is not retrieval similarity score.
        ja: 表現された source version と key reference が変更されていないことを検証し、retrieval similarity score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-candidate-support-42
      source_claims: [claim-retrieved-candidate-provenance]
    - id: retrieval_artifact_id
      labels:
        zh: 检索工件标识
        en: retrieval artifact ID
        ja: retrieval artifact ID
      definitions:
        zh: 稳定标识同一请求范围内的候选表示作为检索 I/O 工件，不复用为活动、索引或模型响应标识。
        en: Stably identifies the same request-scoped candidate representation as a retrieval I/O artifact and is not reused as an activity, index, or model-response ID.
        ja: 同じ request-scope 内の candidate representation を retrieval I/O artifact として安定識別し、activity、index、model-response ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:retrieval-request|retrieval-result|candidate|retrieval-trace)-[A-Za-z0-9._-]+$'
      example_value: candidate-support-42
      source_claims: [claim-retrieved-candidate-artifact]
    - id: artifact_kind
      labels:
        zh: 工件种类
        en: artifact kind
        ja: artifact kind
      definitions:
        zh: 将本记录声明为 candidate 工件，不以种类掩盖评分、排序、上下文选择或模型使用事实。
        en: Declares this record to be a candidate artifact and does not use kind to conceal scoring, ranking, context selection, or model-use facts.
        ja: この record を candidate artifact として宣言し、kind で scoring、ranking、context selection、model-use fact を隠さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [request, result, candidate, trace]
      pattern: null
      example_value: candidate
      source_claims: [claim-retrieved-candidate-artifact]
    - id: retrieval_scope_id
      labels:
        zh: 检索范围标识
        en: retrieval scope ID
        ja: retrieval scope ID
      definitions:
        zh: 标识实际返回该候选的检索范围，不等同于来源所有者或访问授权。
        en: Identifies the retrieval scope that actually returned this candidate and is not a source owner or authorization grant.
        ja: この candidate を実際に返した retrieval scope を識別し、source owner や authorization grant ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^scope-[A-Za-z0-9._-]+$'
      example_value: scope-support-42
      source_claims: [claim-retrieved-candidate-scope]
  constraints:
    - id: retrieved-candidate-inherits-retrieval-artifact-fields
      severity: error
      expression_language: plain
      expression: RetrievedCandidate is one RetrievalArtifact record. retrieval_artifact_id and retrieved_candidate_id must resolve to the same candidate representation; artifact_kind must be candidate; retrieval_scope_id must resolve to retrieval_scope_ref; and source_artifact_ref, request_ref, provenance_ref, and candidate_digest remain facts of that same artifact rather than a second parent artifact.
      explanation:
        zh: 已检索候选项是检索工件的真实特化；专用候选、来源和范围字段细化同一 I/O 对象，不能以额外父工件代替。
        en: A retrieved candidate is a real retrieval-artifact specialization; its candidate, source, and scope fields refine one I/O object and cannot be replaced by an additional parent artifact.
        ja: RetrievedCandidate は真の RetrievalArtifact 特殊化であり、candidate、source、scope field は一つの I/O object を細化する。追加の親 artifact で置き換えてはならない。
      source_claims: [claim-retrieved-candidate-artifact, claim-retrieved-candidate-provenance]
    - id: retrieved-candidate-provenance-boundary
      severity: error
      expression_language: plain
      expression: retrieved_candidate_id, source_artifact_ref, request_ref, retrieval_scope_ref, provenance_ref, and candidate_digest are required. The source artifact must be eligible under request_ref and retrieval_scope_ref when generated.
      explanation:
        zh: 候选必须把来源版本、请求、范围和生成记录绑定在一起，避免无范围来源引用。
        en: A candidate must bind source version, request, scope, and generating record together to avoid unscoped source references.
        ja: candidate は source version、request、scope、generating record を結び付け、unscoped source reference を避けなければならない。
      source_claims: [claim-retrieved-candidate-artifact, claim-retrieved-candidate-scope]
    - id: retrieved-candidate-not-score-or-context
      severity: error
      expression_language: plain
      expression: RetrievedCandidate must not contain a score, rank, reranker output, context-package membership, model-use evidence, answer text, or persistence outcome.
      explanation:
        zh: 候选身份与其后的评分、上下文选择和下游使用必须保持独立。
        en: Candidate identity must remain separate from later scoring, context selection, and downstream use.
        ja: candidate identity は後続 scoring、context selection、downstream use から独立していなければならない。
      source_claims: [claim-retrieved-candidate-provenance]
  required_relations: []
examples:
  - id: retrieved-candidate-positive

    labels: {zh: 来自政策片段的候选, en: Candidate from policy chunk, ja: policy chunk からの candidate}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values: {retrieved_candidate_id: candidate-support-42, source_artifact_ref: chunk-support-policy-v3, request_ref: retrieval-request-support-20260719, retrieval_scope_ref: scope-support-42, provenance_ref: candidate-generation-support-42, candidate_digest: sha256-candidate-support-42, retrieval_artifact_id: candidate-support-42, artifact_kind: candidate, retrieval_scope_id: scope-support-42}
    related_node_ids: [RetrievedCandidate, ChunkArtifact, RetrievalRequest]
    related_relation_ids: [RetrievedCandidate-is_a-RetrievalArtifact]

    source_claims: [claim-retrieved-candidate-artifact]
  - id: retrieved-candidate-counterexample-score

    labels: {zh: 将分数当候选, en: Score presented as candidate, ja: score を candidate として提示}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values: {retrieved_candidate_id: candidate-score-only-1, source_artifact_ref: null, request_ref: retrieval-request-support-20260719, retrieval_scope_ref: scope-support-42, provenance_ref: ranking-operation-support-42, candidate_digest: sha256-candidate-score-only-1}
    related_node_ids: [RetrievedCandidate, RetrievalScore, RankingOperation]
    related_relation_ids: [RetrievedCandidate-is_a-RetrievalArtifact]

    source_claims: [claim-retrieved-candidate-provenance]
  - id: retrieved-candidate-boundary-same-source-two-requests

    labels: {zh: 同一来源的两个请求候选, en: Same source in two request candidates, ja: 同一 source の二つの request candidate}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values: {retrieved_candidate_id: candidate-support-42-request-b, source_artifact_ref: chunk-support-policy-v3, request_ref: retrieval-request-support-b, retrieval_scope_ref: scope-support-b, provenance_ref: candidate-generation-support-b, candidate_digest: sha256-candidate-support-42-request-b}
    related_node_ids: [RetrievedCandidate, RetrievalRequest, ChunkArtifact]
    related_relation_ids: [RetrievedCandidate-is_a-RetrievalArtifact]

    source_claims: [claim-retrieved-candidate-scope]
  - id: retrieved-candidate-instance-langchain

    labels: {zh: 实例：retriever 返回文档候选, en: "Instance: retriever-returned document candidate", ja: "事例: retriever が返す document candidate"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values: {retrieved_candidate_id: candidate-langchain-doc-42, source_artifact_ref: document-langchain-42, request_ref: retrieval-request-langchain-42, retrieval_scope_ref: scope-langchain-42, provenance_ref: retrieval-run-langchain-42, candidate_digest: sha256-candidate-langchain-doc-42, retrieval_artifact_id: candidate-langchain-doc-42, artifact_kind: candidate, retrieval_scope_id: scope-langchain-42}
    related_node_ids: [RetrievedCandidate, RetrievalActivity, RetrievalResult]
    related_relation_ids: [RetrievedCandidate-is_a-RetrievalArtifact]
    source_claims: [claim-retrieved-candidate-artifact]
parent_relation:
  id: RetrievedCandidate-is_a-RetrievalArtifact
  predicate: is_a
  target: concept:RetrievalArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是检索产物的候选子类, en: is a candidate subtype of retrieval artifact, ja: RetrievalArtifact の candidate 下位型である}
  definitions:
    zh: RetrievedCandidate 是带有来源、请求和范围边界的 RetrievalArtifact 子类。
    en: A RetrievedCandidate is a RetrievalArtifact subtype with source, request, and scope boundary.
    ja: RetrievedCandidate は source、request、scope boundary を持つ RetrievalArtifact の下位型である。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个来源工件可在多少请求中成为候选。
    en: Classification does not prescribe how many requests may make one source artifact a candidate.
    ja: 分類関係は一つの source artifact が candidate になり得る request 数を規定しない。
  inverse_reading: {predicate: has_retrieved_candidate_subtype, labels: {zh: 具有已检索候选子类, en: has retrieved-candidate subtype, ja: retrieved-candidate 下位型を持つ}}
  conditions:
    - id: retrieved-candidate-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert only when an artifact represents one source version as eligible candidate under a request and retrieval scope with generating provenance; a score, run, or context membership does not satisfy this subtype.
      explanation:
        zh: 子类种差是受请求范围约束的来源候选表示。
        en: The subtype differentia is source-candidate representation bound to request scope.
        ja: subtype の differentia は request scope に束縛された source-candidate representation である。
      source_claims: [claim-retrieved-candidate-artifact]
  temporal_scope: valid-time
  boundary_context: A candidate can be rescored or selected later without changing its source, request, or scope provenance.
  constraints: []
  examples: []
  source_claims: [claim-retrieved-candidate-artifact]
  distinct_fact_rationale: This relation classifies candidate artifact identity and does not express scoring, ranking, or model use.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Documents retrievers that return documents for query-based retrieval workflows.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    source_type: academic-paper
    url: https://arxiv.org/abs/2005.11401
    relevance: Describes retrieved non-parametric memory supplied to downstream generation.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entities separately from activities that use or generate them.
source_claims:
  - id: claim-retrieved-candidate-artifact
    source: langchain-retrieval
    supports: LangChain documents retrievers returning documents for a query. Moonweave represents each returned source version as a RetrievedCandidate artifact rather than the retriever activity or a downstream score.
    locator: "Retrieval: retrievers and returned documents"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieved-candidate-scope
    source: rag-paper
    supports: RAG retrieves non-parametric memory conditioned on an input. Moonweave retains request and scope references on candidate artifacts so a source version is not treated as an unbounded result.
    locator: "Abstract and retrieval-conditioned generation overview"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-retrieved-candidate-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity from the activity that generates or uses it. Moonweave keeps candidate artifact provenance distinct from score computation, context selection, and model use.
    locator: "PROV-O: Entity, Activity, used, and wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
