schema: moonweave.ai/ontology-node/v1
id: RetrievedCandidate
kind: concept
labels:
  zh: 检索候选
  en: Retrieved candidate
  ja: 検索候補
semantics:
  short_definition:
    zh: 检索域的唯一候选身份记录。
    en: Single candidate identity record in retrieval domain.
    ja: retrieval domain 唯一 candidate identity record。
  definition:
    zh: RetrievedCandidate 以 candidate_id 标识一次 run/request 中的候选，referent_id 指向内容实体，rank_position 记录最终序数；映射 Pinecone ScoredVector（id+score+metadata）、Chroma document+distance 与 Mem0 memory 条目。Chunk 命中细化为 RetrievedChunk。
    en: RetrievedCandidate is identified by candidate_id within a run/request, referent_id points to content, rank_position records final ordinal. Maps Pinecone ScoredVector (id+score+metadata), Chroma document+distance, and Mem0 memory entries. Chunk hits refine to RetrievedChunk.
    ja: RetrievedCandidate は candidate_id/referent_id/rank_position を持つ。Pinecone ScoredVector/Chroma document+distance/Mem0 memory を写像。Chunk hit は RetrievedChunk。
  why_needed:
    zh: 必须把“检索命中记录”与“原始 chunk 实体”分开，并保留 rank_position 字段而非另建 Rank 节点。
    en: Retrieval hit records must stay separate from original chunk entities, with rank_position as a field rather than a separate Rank node.
    ja: retrieval hit record と chunk entity を分離し rank_position を field 化。
  includes:
    - zh: 纳入 CandidateSet 中有内容引用并可附阶段分数的候选记录。
      en: Includes candidate records in CandidateSet with content reference and optional stage scores.
      ja: CandidateSet 内 content 参照と optional stage score を持つ record。
  excludes:
    - zh: 排除 CandidateSet、原始内容实体与 ContextPackage 槽位。
      en: Excludes CandidateSet, original content entities, and ContextPackage slots.
      ja: CandidateSet/original content/ContextPackage slot を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone ScoredVector.id→candidate_id, .score→SimilarityScore；Chroma id+distance→candidate_id+SimilarityScore；Mem0 memory id→candidate_id。
    en: Pinecone ScoredVector.id→candidate_id, .score→SimilarityScore; Chroma id+distance→candidate_id+SimilarityScore; Mem0 memory id→candidate_id.
    ja: ScoredVector/Chroma/Mem0 API 字段映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - candidate_id
  fields:
    - id: candidate_id
      labels:
        zh: 候选标识
        en: Candidate identifier
        ja: candidate 識別子
      definitions:
        zh: run 内稳定标识候选记录。
        en: Stable candidate record id within run.
        ja: run 内 candidate record id。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-424
      allowed_values: []
      source_claims:
        - claim-retrieved-candidate-id
    - id: referent_id
      labels:
        zh: 内容引用标识
        en: Referent identifier
        ja: referent 識別子
      definitions:
        zh: 指向被检索内容实体（chunk/memory/index entry）。
        en: Points to retrieved content entity (chunk/memory/index entry).
        ja: chunk/memory/index entry への pointer。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: chunk-882
      allowed_values: []
      source_claims:
        - claim-retrieved-candidate-referent
    - id: rank_position
      labels:
        zh: 排名位置
        en: Rank position
        ja: 順位位置
      definitions:
        zh: 最终结果中的序数位置；不是 RetrievalScore。
        en: Ordinal in final result; not a RetrievalScore.
        ja: 最終結果序数。RetrievalScore ではない。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims:
        - claim-retrieved-candidate-rank
  constraints:
    - id: rank-not-score
      severity: error
      expression_language: plain
      expression: rank_position must not be stored as RetrievalScore.
      explanation:
        zh: 排名位置与阶段分数量纲不同。
        en: Rank position differs from stage scores.
        ja: rank position と stage score は別。
      source_claims:
        - claim-retrieved-candidate-rank-not-score
  required_relations: []
examples:
  - id: RetrievedCandidate-example-pinecone-scoredvector
    labels:
      zh: Pinecone ScoredVector
      en: Pinecone ScoredVector
      ja: Pinecone ScoredVector
    descriptions:
      zh: candidate-424 映射 Pinecone match id=chunk-882 score=0.842 rank_position=1。
      en: candidate-424 maps Pinecone match id=chunk-882 score=0.842 rank_position=1.
      ja: candidate-424←Pinecone ScoredVector。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: ScoredVector
    field_values:
      candidate_id: candidate-424
      referent_id: chunk-882
      rank_position: 1
    related_node_ids:
      - RetrievedCandidate
      - SimilarityScore
    related_relation_ids: []
    source_claims:
      - claim-retrieved-candidate-pinecone
  - id: RetrievedCandidate-example-chroma-document
    labels:
      zh: Chroma document+distance
      en: Chroma document+distance
      ja: Chroma document+distance
    descriptions:
      zh: candidate-425 referent_id=doc-17 rank_position=2 distance=0.18 转 SimilarityScore。
      en: candidate-425 referent_id=doc-17 rank_position=2 with distance=0.18 as SimilarityScore.
      ja: Chroma document+distance 映射。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: QueryResult document
    field_values:
      candidate_id: candidate-425
      referent_id: doc-17
      rank_position: 2
    related_node_ids:
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieved-candidate-chroma
  - id: RetrievedCandidate-example-mem0-memory
    labels:
      zh: Mem0 记忆候选
      en: Mem0 memory candidate
      ja: Mem0 memory candidate
    descriptions:
      zh: candidate-426 referent_id=mem0-8f3c2a1b 来自 Mem0 search 返回记忆。
      en: candidate-426 referent_id=mem0-8f3c2a1b from Mem0 search returned memory.
      ja: Mem0 memory→candidate。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: search memory id
    field_values:
      candidate_id: candidate-426
      referent_id: mem0-8f3c2a1b
      rank_position: 3
    related_node_ids:
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieved-candidate-mem0
parent_relation:
  id: RetrievedCandidate-is_a-RetrievalArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalArtifact
    en: is a RetrievalArtifact
    ja: RetrievalArtifactの一種
  definitions:
    zh: RetrievedCandidate —is_a→ RetrievalArtifact 成立，因为它是一次检索运行中具有内容引用、阶段排名和分数的唯一候选记录。
    en: RetrievedCandidate —is_a→ RetrievalArtifact holds because it is the single candidate record in a retrieval run with content reference, stage rank, and scores.
    ja: RetrievedCandidate —is_a→ RetrievalArtifact はretrieval run内でcontent reference・stage rank・scoreを持つ唯一candidate recordであるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RetrievedCandidate-is_a-RetrievalArtifact-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the single candidate record in a retrieval run with content reference, stage rank, and scores."
      explanations:
        zh: 仅当实例既满足 RetrievalArtifact 的完整定义，又满足子类种差“它是一次检索运行中具有内容引用、阶段排名和分数的唯一候选记录。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the single candidate record in a retrieval run with content reference, stage rank, and scores."
        ja: instanceがRetrievalArtifact完全定義とchild differentia「retrieval run内でcontent reference・stage rank・scoreを持つ唯一candidate recordである」を共に満たす時だけassertします。
      source_claims:
        - claim-retrieved-candidate-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievedCandidate-is_a-RetrievalArtifact-example-positive-manual-001
      labels:
        zh: 是一种RetrievalArtifact正例
        en: "Positive case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種正例
      descriptions:
        zh: candidate-424 指向 chunk-882 并记录 rank_position=3。
        en: candidate-424 refers to chunk-882 and records rank_position=3.
        ja: candidate-424がchunk-882を参照しrank_position=3を記録します。
      field_values: {}
      related_node_ids:
        - RetrievedCandidate
        - RetrievalArtifact
      related_relation_ids:
        - RetrievedCandidate-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieved-candidate-id
    - id: RetrievedCandidate-is_a-RetrievalArtifact-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalArtifact边界例
        en: "Boundary case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種境界例
      descriptions:
        zh: chunk-882 是原始内容实体而没有候选身份。
        en: chunk-882 is the original content entity and has no candidate identity.
        ja: chunk-882はoriginal content entityでcandidate identityがありません。
      field_values: {}
      related_node_ids:
        - RetrievedCandidate
        - RetrievalArtifact
      related_relation_ids:
        - RetrievedCandidate-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieved-candidate-id
  source_claims:
    - claim-retrieved-candidate-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
