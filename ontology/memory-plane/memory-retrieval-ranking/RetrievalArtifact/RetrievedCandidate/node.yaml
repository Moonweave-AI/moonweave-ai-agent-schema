    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: QueryResult.
  - id: src-mem0-search
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Mem0 search API.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-retrieved-candidate-pinecone
    source: src-pinecone-query
    supports: ScoredVector maps to RetrievedCandidate.
    locator: ScoredVector
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieved-candidate-chroma
    source: src-chroma-query
    supports: Chroma document+distance maps to RetrievedCandidate.
    locator: QueryResult
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieved-candidate-mem0
    source: src-mem0-search
    supports: Mem0 memory id maps to RetrievedCandidate.
    locator: memory id
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieved-candidate-rank-not-score
    source: src-memory-retrieval-design
    supports: rank_position is not a score.
    locator: constraint
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-candidate-id
    source: src-memory-retrieval-design
    supports: candidate_id identifies candidate.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-candidate-referent
    source: src-memory-retrieval-design
    supports: referent_id points to content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieved-candidate-rank
    source: src-memory-retrieval-design
    supports: rank_position records ordinal.
    locator: structure
    evidence_kind: design-inference
    confidence: high
