schema: moonweave.ai/ontology-node/v1
id: RetrievalFilter
kind: concept
labels:
  zh: 检索过滤条件
  en: Retrieval filter
  ja: 検索フィルター
semantics:
  short_definition:
    zh: 召回前限制记录范围的约束。
    en: Pre-recall constraint limiting record scope.
    ja: recall 前に record 範囲を制限する constraint。
  definition:
    zh: RetrievalFilter 保存候选生成前求值的约束表达式；映射 Pinecone index.query 的 filter 元数据 dict、Chroma 的 where/where_document、Mem0 search 的 filters 对象。它不表达信息需求，也不是检索后的上下文筛选。
    en: RetrievalFilter stores constraints evaluated before candidate generation. It maps Pinecone index.query metadata filter dict, Chroma where/where_document, and Mem0 search filters object. It neither expresses the information need nor post-retrieval context filtering.
    ja: RetrievalFilter は recall 前 constraint。Pinecone filter dict/Chroma where/where_document/Mem0 filters を写像。information need でも post-retrieval context filter でもない。
  why_needed:
    zh: tenant 过滤与 query 语义是两件不同的事；把 filter dict 写进 request 才能解释为何某条记忆未进入候选池。
    en: Tenant filtering and query semantics are different concerns; recording filter dict on the request explains why a memory never entered the candidate pool.
    ja: tenant filter と query 语义は別。filter dict 記録で candidate pool 除外理由を説明。
  includes:
    - zh: 纳入 namespace、tenant、时间与 metadata 等召回前过滤表达式。
      en: Includes pre-recall filters for namespace, tenant, time, and metadata.
      ja: namespace/tenant/time/metadata 等 pre-recall filter。
  excludes:
    - zh: 排除 query 文本、rerank 阈值、token 预算排除。
      en: Excludes query text, rerank thresholds, and token-budget exclusions.
      ja: query text/rerank threshold/token budget exclusion を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: filter_expression JSON←Pinecone filter；where/where_document←Chroma；filters←Mem0。expression_language 声明 pinecone-metadata/chroma-where/mem0-filters。
    en: filter_expression JSON from Pinecone filter; where/where_document from Chroma; filters from Mem0. expression_language declares pinecone-metadata/chroma-where/mem0-filters.
    ja: Pinecone/Chroma/Mem0 filter API 写像。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - filter_id
  fields:
    - id: filter_id
      labels:
        zh: 过滤标识
        en: Filter identifier
        ja: filter 識別子
      definitions:
        zh: 请求内稳定标识过滤条件。
        en: Stable filter identifier within request.
        ja: request 内 filter 識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: filter-421
      allowed_values: []
      source_claims:
        - claim-retrieval-filter-id
    - id: filter_expression
      labels:
        zh: 过滤表达式
        en: Filter expression
        ja: filter expression
      definitions:
        zh: JSON 或 DSL 约束；Pinecone {"category":{"$eq":"preferences"}}、Chroma where={"user_id":"alice"}。
        en: JSON or DSL constraint; Pinecone metadata filter or Chroma where clause.
        ja: Pinecone metadata filter/Chroma where JSON。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        user_id: alice
      allowed_values: []
      source_claims:
        - claim-retrieval-filter-expr
    - id: expression_language
      labels:
        zh: 表达式语言
        en: Expression language
        ja: expression language
      definitions:
        zh: 声明解析语法：pinecone-metadata、chroma-where、mem0-filters。
        en: "Declares parse syntax: pinecone-metadata, chroma-where, mem0-filters."
        ja: pinecone-metadata/chroma-where/mem0-filters。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: chroma-where
      allowed_values: []
      source_claims:
        - claim-retrieval-filter-lang
  constraints: []
  required_relations: []
examples:
  - id: RetrievalFilter-example-pinecone
    labels:
      zh: Pinecone metadata filter
      en: Pinecone metadata filter
      ja: Pinecone metadata filter
    descriptions:
      zh: filter-421 filter_expression={"category":{"$eq":"preferences"}} expression_language=pinecone-metadata。
      en: filter-421 Pinecone metadata filter for category=preferences.
      ja: filter-421 Pinecone filter dict。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: filter parameter
    field_values:
      filter_id: filter-421
      filter_expression:
        category:
          $eq: preferences
      expression_language: pinecone-metadata
    related_node_ids:
      - RetrievalFilter
    related_relation_ids: []
    source_claims:
      - claim-retrieval-filter-pinecone
  - id: RetrievalFilter-example-chroma-where
    labels:
      zh: Chroma where 子句
      en: Chroma where clause
      ja: Chroma where 句
    descriptions:
      zh: filter-422 where={"user_id":"alice"} 限制 Chroma collection.query 范围。
      en: filter-422 where={"user_id":"alice"} scopes Chroma collection.query.
      ja: filter-422 Chroma where。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: where filter
    field_values:
      filter_id: filter-422
      filter_expression:
        user_id: alice
      expression_language: chroma-where
    related_node_ids:
      - RetrievalFilter
    related_relation_ids: []
    source_claims:
      - claim-retrieval-filter-chroma
  - id: RetrievalFilter-example-mem0
    labels:
      zh: Mem0 filters 对象
      en: Mem0 filters object
      ja: Mem0 filters object
    descriptions:
      zh: filter-423 filters={"category":"preferences"} 映射 Mem0 search filters 字段。
      en: filter-423 maps to Mem0 search filters field.
      ja: filter-423→Mem0 filters。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: search filters
    field_values:
      filter_id: filter-423
      filter_expression:
        category: preferences
      expression_language: mem0-filters
    related_node_ids:
      - RetrievalFilter
    related_relation_ids: []
    source_claims:
      - claim-retrieval-filter-mem0
parent_relation:
  id: RetrievalRequest-has_filter-RetrievalFilter
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_filter RetrievalFilter
    en: has_filter RetrievalFilter
    ja: RetrievalFilterをhas_filter
  definitions:
    zh: RetrievalRequest —has_filter→ RetrievalFilter 表示该过滤表达式是在候选生成前约束请求可见范围的组成规范。
    en: RetrievalRequest —has_filter→ RetrievalFilter states that the filter expression is the request component constraining visibility before candidate generation.
    ja: RetrievalRequest —has_filter→ RetrievalFilter はfilter expressionがcandidate generation前にvisibilityを制限するrequest componentです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_filter
      ja: 逆方向読取
  conditions:
    - id: RetrievalRequest-has_filter-RetrievalFilter-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalFilter is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalFilter 是该 RetrievalRequest 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalFilter is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalFilterがこのRetrievalRequest identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-filter-id
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRequest-has_filter-RetrievalFilter-example-positive-manual-001
      labels:
        zh: has_filter RetrievalFilter正例
        en: "Positive case: has_filter RetrievalFilter"
        ja: RetrievalFilterをhas_filter正例
      descriptions:
        zh: request-419 拥有 filter-421 并在运行前固定它。
        en: request-419 owns filter-421 and fixes it before execution.
        ja: request-419がfilter-421を所有し実行前に固定します。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalFilter
      related_relation_ids:
        - RetrievalRequest-has_filter-RetrievalFilter
      source_claims:
        - claim-retrieval-filter-id
    - id: RetrievalRequest-has_filter-RetrievalFilter-example-boundary-manual-001
      labels:
        zh: has_filter RetrievalFilter边界例
        en: "Boundary case: has_filter RetrievalFilter"
        ja: RetrievalFilterをhas_filter境界例
      descriptions:
        zh: 上下文预算排除不是 RetrievalFilter。
        en: Context-budget exclusion is not a RetrievalFilter.
        ja: context-budget exclusionはRetrievalFilterではありません。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalFilter
      related_relation_ids:
        - RetrievalRequest-has_filter-RetrievalFilter
      source_claims:
        - claim-retrieval-filter-id
  source_claims:
    - claim-retrieval-filter-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
