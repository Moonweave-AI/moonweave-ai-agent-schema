schema: moonweave.ai/ontology-node/v1
id: RetrievalFilter
kind: concept
status: accepted
labels: {zh: 检索过滤器, en: Retrieval filter, ja: 検索フィルター}
semantics:
  short_definition:
    zh: 检索请求中限制候选资格而不计算相关性分数的结构化条件。
    en: A structured condition in a retrieval request that limits candidate eligibility without computing relevance.
    ja: 関連性を計算せず candidate の適格性を制限する retrieval request 内の structured condition。
  definition:
    zh: >-
      RetrievalFilter 是 RetrievalRequest 的一个组成部分，声明对候选的元数据、时间、租户或来源范围约束。
      它在相似度或词法评分之前决定哪些记录可以被考虑，不能表达查询意图、排序方法、候选分数、授权决定或已返回结果。
    en: >-
      A RetrievalFilter is a component of a RetrievalRequest that declares metadata, time, tenant, or source-scope
      constraints on candidates. It determines which records are eligible before similarity or lexical scoring and does
      not express query intent, ranking method, candidate score, authorization decision, or returned result.
    ja: >-
      RetrievalFilter は RetrievalRequest の component であり、candidate に対する metadata、time、tenant、source scope の
      constraint を宣言します。similarity 又は lexical scoring より前に eligible record を決め、query intent、ranking method、
      candidate score、authorization decision、returned result は表しません。
  why_needed:
    zh: 把资格范围与相关性排序分开，才能审计某条记录为何未参与检索而不把过滤误记为低分。
    en: Separating eligibility scope from relevance ranking makes it auditable why a record was excluded without mislabeling it as low-scoring.
    ja: 適格性 scope と relevance ranking を分けることで、record が除外された理由を audit でき、低 score と誤記しない。
  includes:
    - zh: 对 tenant_id、source_kind、created_at 或标签进行的可解析范围条件。
      en: A resolvable scope condition over tenant_id, source_kind, created_at, or labels.
      ja: tenant_id、source_kind、created_at、label に対する解決可能な scope condition。
  excludes:
    - zh: 查询文本、向量嵌入、BM25 或相似度分数、重排序模型、访问授权结论和结果列表。
      en: Query text, vector embedding, BM25 or similarity score, reranker model, access-authorization conclusion, and result list.
      ja: query text、vector embedding、BM25 又は similarity score、reranker model、access-authorization conclusion、result list。
  semantic_kind: information
  aliases: [metadata filter, eligibility predicate, where clause]
engineering:
  explanation:
    zh: Elasticsearch 将 filter context 定义为二元匹配且不计算相关性分数；运行时应将该结构传给搜索实现，并把评分留给后续候选排序。
    en: Elasticsearch defines filter context as binary matching without relevance scoring; runtime passes this structure to search and leaves scoring to later candidate ranking.
    ja: Elasticsearch は filter context を relevance scoring なしの binary match と定義する。runtime はこの structure を search に渡し、scoring は後続 candidate ranking に委ねる。
  typical_input:
    - description: A request-owned filter expressed before retrieval execution.
      format: |
        {
          "retrieval_filter_id": "retrieval-filter-support-20260719",
          "request_ref": "retrieval-request-support-20260719",
          "expression_language": "elasticsearch-query-dsl",
          "expression": {"term": {"tenant_id": "tenant-42"}},
          "evaluation_stage": "pre_scoring"
        }
  typical_output:
    - description: Search receives an eligibility clause separately from query scoring.
      format: |
        {
          "filter": {"term": {"tenant_id": "tenant-42"}},
          "query": {"match": {"body": "refund policy"}}
        }
  reference_implementations:
    - name: Elasticsearch query and filter context
      url: https://www.elastic.co/docs/reference/query-languages/query-dsl/query-filter-context
      description: Documents filter context as binary matching that does not calculate relevance scores.
    - name: LangChain Store search API
      url: https://docs.langchain.com/langsmith/agent-server-api/store/search-or-list-items-within-a-namespace-prefix
      description: Documents search requests that accept query, filter, namespace prefix, and limit.
structure:
  identity_keys: [retrieval_filter_id]
  fields:
    - id: retrieval_filter_id
      labels: {zh: 过滤器标识, en: retrieval filter ID, ja: retrieval filter ID}
      definitions:
        zh: 稳定标识一个可审计过滤器定义，而不是一次搜索运行或其结果。
        en: Stably identifies one auditable filter definition rather than one search run or result.
        ja: 一つの search run 又は result ではなく、一つの audit 可能な filter definition を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-filter-[A-Za-z0-9._-]+$'
      example_value: retrieval-filter-support-20260719
      source_claims: [claim-filter-search-input]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      definitions:
        zh: 指向拥有该过滤器的 RetrievalRequest；不以此引用表示请求已经执行。
        en: Points to the RetrievalRequest that owns this filter and does not imply that the request executed.
        ja: この filter を所有する RetrievalRequest を指し、request が実行済みであることは意味しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-request-support-20260719
      source_claims: [claim-filter-request-composition]
    - id: expression_language
      labels: {zh: 表达式语言, en: expression language, ja: expression language}
      definitions:
        zh: 说明 expression 的可解析语法，例如 elasticsearch-query-dsl；不表示检索或排序模型。
        en: Names a parseable syntax for expression, such as elasticsearch-query-dsl, and does not name a retrieval or ranking model.
        ja: elasticsearch-query-dsl など expression の parse 可能な syntax を示し、retrieval 又は ranking model を示さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [elasticsearch-query-dsl, json-logic]
      pattern: null
      example_value: elasticsearch-query-dsl
      source_claims: [claim-filter-score-boundary]
    - id: expression
      labels: {zh: 过滤表达式, en: filter expression, ja: filter expression}
      definitions:
        zh: 限制候选资格的结构化条件，不得包含排序分数、已选候选或模型回答。
        en: Structured condition limiting candidate eligibility and containing no ranking score, selected candidate, or model answer.
        ja: candidate eligibility を制限する structured condition であり、ranking score、selected candidate、model answer を含まない。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"term":{"tenant_id":"tenant-42"}}'
      source_claims: [claim-filter-score-boundary]
    - id: evaluation_stage
      labels: {zh: 求值阶段, en: evaluation stage, ja: evaluation stage}
      definitions:
        zh: 固定过滤在评分前限制资格，不能用该字段把过滤伪装成重排序。
        en: Fixes the filter as pre-scoring eligibility restriction and cannot use this field to disguise reranking.
        ja: filter を pre-scoring eligibility restriction として固定し、この field で reranking を偽装できない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [pre_scoring]
      pattern: null
      example_value: pre_scoring
      source_claims: [claim-filter-score-boundary]
  constraints:
    - id: retrieval-filter-request-and-scope
      severity: error
      expression_language: plain
      expression: request_ref, expression_language, expression, and evaluation_stage are required. The expression must be parseable in the declared language and constrain candidate eligibility for the referenced request.
      explanation:
        zh: 过滤器必须可解析、可回链到一个请求，并且只限制该请求的候选范围。
        en: A filter must be parseable, traceable to one request, and limited to that request's candidate scope.
        ja: filter は parse 可能で一つの request に trace でき、その request の candidate scope だけを制限しなければならない。
      source_claims: [claim-filter-search-input, claim-filter-request-composition]
    - id: retrieval-filter-not-ranking-or-authorization
      severity: error
      expression_language: plain
      expression: expression must not contain a relevance score, rank position, reranker output, authorization verdict, or returned candidate ID. Such facts belong to ranking, policy enforcement, or RetrievalResult.
      explanation:
        zh: 资格过滤、相关性排序和授权判断是不同事实，不能混在同一过滤对象中。
        en: Eligibility filtering, relevance ranking, and authorization judgment are distinct facts and cannot be mixed in one filter object.
        ja: eligibility filtering、relevance ranking、authorization judgment は別の fact であり、一つの filter object に混在できない。
      source_claims: [claim-filter-score-boundary]
  required_relations: []
examples:
  - id: retrieval-filter-positive

    labels: {zh: 租户范围过滤, en: Tenant-scope filter, ja: tenant scope filter}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values: {retrieval_filter_id: retrieval-filter-support-20260719, request_ref: retrieval-request-support-20260719, expression_language: elasticsearch-query-dsl, expression: '{"term":{"tenant_id":"tenant-42"}}', evaluation_stage: pre_scoring}
    related_node_ids: [RetrievalFilter, RetrievalRequest]
    related_relation_ids: [RetrievalFilter-part_of-RetrievalRequest]

    source_claims: [claim-filter-score-boundary]
  - id: retrieval-filter-counterexample-score

    labels: {zh: 把相关性分数当过滤器, en: Relevance score presented as filter, ja: relevance score を filter として提示}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values: {retrieval_filter_id: retrieval-filter-score-1, request_ref: retrieval-request-support-20260719, expression_language: elasticsearch-query-dsl, expression: '{"score":{"gt":0.8}}', evaluation_stage: pre_scoring}
    related_node_ids: [RetrievalFilter, RetrievalScore, RankingOperation]
    related_relation_ids: [RetrievalFilter-part_of-RetrievalRequest]

    source_claims: [claim-filter-score-boundary]
  - id: retrieval-filter-boundary-empty

    labels: {zh: 无可选过滤条件, en: No optional filter condition, ja: 任意 filter condition なし}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values: {retrieval_filter_id: retrieval-filter-none, request_ref: retrieval-request-support-20260719, expression_language: json-logic, expression: '{"and":[]}', evaluation_stage: pre_scoring}
    related_node_ids: [RetrievalFilter, RetrievalRequest]
    related_relation_ids: [RetrievalFilter-part_of-RetrievalRequest]

    source_claims: [claim-filter-request-composition]
  - id: retrieval-filter-instance-elasticsearch

    labels: {zh: 实例：Elasticsearch 租户过滤, en: "Instance: Elasticsearch tenant filter", ja: "事例: Elasticsearch tenant filter"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values: {retrieval_filter_id: retrieval-filter-es-tenant-42, request_ref: retrieval-request-es-tenant-42, expression_language: elasticsearch-query-dsl, expression: '{"term":{"tenant_id":"tenant-42"}}', evaluation_stage: pre_scoring}
    related_node_ids: [RetrievalFilter, RetrievalRequest, RetrievalQuery]
    related_relation_ids: [RetrievalFilter-part_of-RetrievalRequest]
    source_claims: [claim-filter-score-boundary]
parent_relation:
  id: RetrievalFilter-part_of-RetrievalRequest
  predicate: part_of
  target: concept:RetrievalRequest
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是检索请求的过滤组成部分, en: is a filter component of retrieval request, ja: RetrievalRequest の filter component である}
  definitions:
    zh: RetrievalFilter 是拥有它的 RetrievalRequest 的可选范围限制组成部分，不是请求的同义子类。
    en: A RetrievalFilter is an optional scope-limiting component of its RetrievalRequest, not a synonymous subtype of the request.
    ja: RetrievalFilter は所有する RetrievalRequest の任意 scope-limiting component であり、request の同義 subtype ではない。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_filter, labels: {zh: 有过滤器, en: has filter, ja: filter を持つ}}
  conditions:
    - id: retrieval-filter-part-of-request-condition
      severity: error
      expression_language: plain
      expression: Assert only when request_ref resolves to the parent RetrievalRequest and the filter condition is evaluated as part of that request's candidate-eligibility boundary.
      explanation:
        zh: 组成关系需要请求回链和实际的资格范围语义。
        en: Composition requires a request back-link and actual candidate-eligibility semantics.
        ja: composition には request back-link と実際の candidate-eligibility semantics が必要である。
      source_claims: [claim-filter-request-composition]
  temporal_scope: valid-time
  boundary_context: Reusing identical syntax in another request creates a separately linked filter component and does not merge requests.
  constraints: []
  examples: []
  source_claims: [claim-filter-request-composition]
  distinct_fact_rationale: This relation expresses request composition, not query meaning, relevance ranking, authorization, or search execution.
  layout_role: primary-backbone
relations: []
sources:
  - id: elasticsearch-query-filter-context
    title: Elasticsearch query and filter context
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/query-languages/query-dsl/query-filter-context
    relevance: Documents filter context as a binary non-scoring condition and contrasts it with relevance-scoring query context.
  - id: langchain-store-search
    title: LangChain Store search API
    source_type: official-documentation
    url: https://docs.langchain.com/langsmith/agent-server-api/store/search-or-list-items-within-a-namespace-prefix
    relevance: Documents search request inputs including query, filter, namespace prefix, and limit.
source_claims:
  - id: claim-filter-score-boundary
    source: elasticsearch-query-filter-context
    supports: Elasticsearch defines filter context as binary yes-or-no matching that does not calculate relevance score and distinguishes it from query context. Moonweave therefore models RetrievalFilter as pre-scoring candidate eligibility rather than ranking.
    locator: "Query and filter context: filter context and query context"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-filter-search-input
    source: langchain-store-search
    supports: LangChain documents a search request with filter and query inputs. Moonweave records the filter as a separately identifiable structured request component for audit and replay.
    locator: "Store search request body: filter and query"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-filter-request-composition
    source: langchain-store-search
    supports: A search request groups filter with other search inputs. Moonweave infers the explicit part_of relationship from a RetrievalFilter to the owning RetrievalRequest while keeping filter optional and separately addressable.
    locator: "Store search request body"
    evidence_kind: ontology-design-inference
    confidence: medium
