schema: moonweave.ai/ontology-node/v1
id: RetrievalFilter
kind: concept
status: accepted
labels:
  zh: 检索过滤条件
  en: Retrieval filter
  ja: 検索フィルター
semantics:
  short_definition:
    zh: 在候选生成前限制可参与检索记录范围的请求组成规范。
    en: A request-component specification that limits which records may participate before candidate generation.
    ja: candidate generation前に参加可能record範囲を制限するrequest-component specificationです。
  definition:
    zh: RetrievalFilter 是 RetrievalRequest 中的约束表达式，按声明语言限制候选可见范围，例如命名空间、租户、时间或元数据条件；它不表达信息需求、不计算相关性，也不等同于检索后的上下文筛选。
    en: RetrievalFilter is a constraint expression within RetrievalRequest that limits candidate visibility by namespace, tenant, time, or metadata under a declared language. It neither expresses the information need nor computes relevance, and it is not post-retrieval context filtering.
    ja: RetrievalFilter はRetrievalRequest内のconstraint expressionで指定languageによりnamespace・tenant・time・metadataでcandidate visibilityを制限します。information needやrelevanceを表さずpost-retrieval context filteringでもありません。
  why_needed:
    zh: 把检索前约束与查询语义、排序分数和上下文排除原因分开。
    en: Separates pre-retrieval constraints from query semantics, ranking scores, and context-exclusion reasons.
    ja: pre-retrieval constraintをquery semantics・ranking score・context exclusion reasonから分離します。
  includes:
    - zh: 纳入能在候选生成阶段求值的命名空间、权限、时间与元数据过滤表达式。
      en: Includes namespace, authorization, temporal, and metadata expressions evaluable during candidate generation.
      ja: candidate generation中に評価可能なnamespace・authorization・temporal・metadata expressionを含みます。
  excludes:
    - zh: 排除自然语言查询、模型评分阈值、TopK 数量、上下文预算和安全扫描结论。
      en: Excludes natural-language queries, model-score thresholds, TopK size, context budget, and safety-scan findings.
      ja: natural-language query・model score threshold・TopK size・context budget・safety scan findingを除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - filter_id
  fields:
    - id: filter_id
      labels:
        zh: 过滤条件标识
        en: filter ID
        ja: filter ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属请求内稳定标识一个过滤条件。
        en: Stable identifier for one filter within its request.
        ja: owner request内で一filterを安定識別します。
      allowed_values: []
      pattern: null
      example_value: filter-421
      source_claims:
        - claim-retrieval-filter-002
    - id: expression
      labels:
        zh: 过滤表达式
        en: filter expression
        ja: filter expression
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存实际执行的约束表达式。
        en: Constraint expression actually evaluated by retrieval.
        ja: retrievalで実際に評価するconstraint expressionです。
      allowed_values: []
      pattern: null
      example_value: tenant_id = 'acme' AND created_at >= '2026-01-01'
      source_claims:
        - claim-retrieval-filter-003
    - id: expression_language
      labels:
        zh: 表达式语言
        en: expression language
        ja: expression language
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明表达式的解析与求值语法。
        en: Declares the syntax used to parse and evaluate the expression.
        ja: expressionのparse/evaluate syntaxを宣言します。
      allowed_values: []
      pattern: null
      example_value: qdrant-filter
      source_claims:
        - claim-retrieval-filter-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalFilter-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索过滤条件正例
      en: "Positive case: Retrieval filter"
      ja: 検索フィルター正例
    scenario_id: null
    descriptions:
      zh: filter-421 在候选生成前把检索范围限制为 acme 租户的 2026 年记录。
      en: filter-421 restricts candidate generation to 2026 records for tenant acme.
      ja: filter-421 はcandidate generation前にacme tenantの2026 recordへ範囲を制限します。
    field_values:
      filter_id: filter-421
      expression: tenant_id = 'acme' AND created_at >= '2026-01-01'
      expression_language: qdrant-filter
    related_node_ids:
      - RetrievalFilter
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalFilter。
      en: Classify the object as RetrievalFilter.
      ja: RetrievalFilter として分類します。
    why_valid_or_invalid:
      zh: 约束在召回前求值并改变可参与候选生成的记录范围。
      en: The constraint is evaluated before recall and changes which records may become candidates.
      ja: constraintはrecall前に評価されcandidateになり得るrecord範囲を変えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-filter-005
  - id: RetrievalFilter-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索过滤条件边界例
      en: "Boundary case: Retrieval filter"
      ja: 検索フィルター境界例
    scenario_id: null
    descriptions:
      zh: context-exclusion-421 因剩余 token 不足拒绝一个已检索候选。
      en: context-exclusion-421 rejects an already retrieved candidate because the token budget is insufficient.
      ja: context-exclusion-421 はtoken budget不足で既にretrieved candidateを拒否します。
    field_values: {}
    related_node_ids:
      - RetrievalFilter
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalFilter。
      en: Do not classify the object as RetrievalFilter.
      ja: RetrievalFilter として分類しません。
    why_valid_or_invalid:
      zh: 这是上下文组装的后置排除，不是 RetrievalFilter。
      en: This is downstream context-assembly exclusion, not RetrievalFilter.
      ja: downstream context-assembly exclusionでRetrievalFilterではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-filter-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
