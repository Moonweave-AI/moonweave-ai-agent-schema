schema: moonweave.ai/ontology-node/v1
id: RetrievalQuery
kind: concept
labels:
  zh: 检索查询
  en: Retrieval query
  ja: 検索クエリ
semantics:
  short_definition:
    zh: 表达信息需求的请求组成。
    en: Request component expressing the information need.
    ja: information need を表す request component。
  definition:
    zh: RetrievalQuery 保存规范化 query 文本与可选 query_embeddings/query_vector 引用；映射 Mem0 search 的 query 字符串、Pinecone index.query 的 vector、Chroma collection.query 的 query_texts/query_embeddings、Cohere rerank 的 query 与 LangGraph store.search 的 query 参数。
    en: RetrievalQuery preserves normalized query text and optional query_embeddings/query_vector references. It maps Mem0 search query string, Pinecone index.query vector, Chroma collection.query query_texts/query_embeddings, Cohere rerank query, and LangGraph store.search query parameters.
    ja: RetrievalQuery は normalized query text と query_embeddings/query_vector 参照を保持。Mem0 query/Pinecone vector/Chroma query_texts/Cohere query/LangGraph query を写像。
  why_needed:
    zh: query 文本相同但 embedding 模型不同会产生不同候选；必须单独记录实际提交的 query 与向量引用。
    en: Identical query text with different embedding models yields different candidates; the submitted query and vector reference must be recorded separately.
    ja: query 文本同一でも embedding model 差で candidate が変わるため query/vector 参照を別記録必須。
  includes:
    - zh: 纳入请求中实际提交给检索后端的 query 内容。
      en: Includes query content actually submitted to the retrieval backend.
      ja: retrieval backend へ実際 submit した query content。
  excludes:
    - zh: 排除 filter、执行活动与候选文档。
      en: Excludes filters, execution activities, and candidate documents.
      ja: filter/execution activity/candidate document を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: query_text←Mem0 query/Chroma query_texts/Cohere query；query_vector/query_embeddings←Pinecone vector/Chroma query_embeddings。
    en: query_text from Mem0 query/Chroma query_texts/Cohere query; query_vector/query_embeddings from Pinecone vector/Chroma query_embeddings.
    ja: query_text/query_vector/query_embeddings の API 写像。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - query_id
  fields:
    - id: query_id
      labels:
        zh: 查询标识
        en: Query identifier
        ja: query 識別子
      definitions:
        zh: 请求内稳定标识 query 内容。
        en: Stable query content identifier within request.
        ja: request 内 query content 識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: query-420
      allowed_values: []
      source_claims:
        - claim-retrieval-query-id
    - id: query_text
      labels:
        zh: 查询文本
        en: Query text
        ja: query 文本
      definitions:
        zh: 规范化自然语言或关键词 query。
        en: Normalized natural-language or keyword query.
        ja: normalized natural-language/keyword query。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: What language does Alice prefer for code?
      allowed_values: []
      source_claims:
        - claim-retrieval-query-text
    - id: query_vector_ref
      labels:
        zh: 查询向量引用
        en: Query vector reference
        ja: query vector 参照
      definitions:
        zh: 预计算 query embedding 引用；对应 Pinecone vector 或 Chroma query_embeddings。
        en: Precomputed query embedding reference; maps to Pinecone vector or Chroma query_embeddings.
        ja: Pinecone vector/Chroma query_embeddings 参照。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: embedding-query-420
      allowed_values: []
      source_claims:
        - claim-retrieval-query-vector
  constraints: []
  required_relations: []
examples:
  - id: RetrievalQuery-example-mem0
    labels:
      zh: Mem0 query 字符串
      en: Mem0 query string
      ja: Mem0 query string
    descriptions:
      zh: query-420 normalized_text="Alice code language preference" 映射 Mem0 search query 字段。
      en: query-420 normalized_text maps to Mem0 search query field.
      ja: query-420→Mem0 search query。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: search query
    field_values:
      query_id: query-420
      query_text: What language does Alice prefer for code?
    related_node_ids:
      - RetrievalQuery
    related_relation_ids: []
    source_claims:
      - claim-retrieval-query-mem0
  - id: RetrievalQuery-example-pinecone-vector
    labels:
      zh: Pinecone 向量 query
      en: Pinecone vector query
      ja: Pinecone vector query
    descriptions:
      zh: query-421 query_vector_ref 指向 OpenAI embedding 1536 维向量供 index.query(vector=...)。
      en: query-421 query_vector_ref points to 1536-dim OpenAI embedding for index.query(vector=...).
      ja: query-421 query_vector_ref→Pinecone vector。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: index.query vector
    field_values:
      query_id: query-421
      query_vector_ref: embedding-query-421
    related_node_ids:
      - RetrievalQuery
    related_relation_ids: []
    source_claims:
      - claim-retrieval-query-pinecone
  - id: RetrievalQuery-example-chroma-text
    labels:
      zh: Chroma query_texts
      en: Chroma query_texts
      ja: Chroma query_texts
    descriptions:
      zh: query-422 query_text 映射 Chroma collection.query query_texts=[...]。
      en: query-422 query_text maps to Chroma collection.query query_texts.
      ja: query-422→Chroma query_texts。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: query_texts
    field_values:
      query_id: query-422
      query_text: Alice code language preference
    related_node_ids:
      - RetrievalQuery
    related_relation_ids: []
    source_claims:
      - claim-retrieval-query-chroma
parent_relation:
  id: RetrievalRequest-has_query-RetrievalQuery
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_query RetrievalQuery
    en: has_query RetrievalQuery
    ja: RetrievalQueryをhas_query
  definitions:
    zh: RetrievalRequest —has_query→ RetrievalQuery 表示该查询是请求中表达信息需求且用于重放的不可替代组成信息。
    en: RetrievalRequest —has_query→ RetrievalQuery states that the query is the non-substitutable request component expressing the information need for replay.
    ja: RetrievalRequest —has_query→ RetrievalQuery はqueryがinformation needを表しreplayに使う置換不能request componentです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_query
      ja: 逆方向読取
  conditions:
    - id: RetrievalRequest-has_query-RetrievalQuery-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalQuery is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalQuery 是该 RetrievalRequest 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalQuery is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalQueryがこのRetrievalRequest identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-query-id
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRequest-has_query-RetrievalQuery-example-positive-manual-001
      labels:
        zh: has_query RetrievalQuery正例
        en: "Positive case: has_query RetrievalQuery"
        ja: RetrievalQueryをhas_query正例
      descriptions:
        zh: request-419 以 query-420 表达实际信息需求。
        en: request-419 uses query-420 as its actual information need.
        ja: request-419がquery-420をactual information needとして持ちます。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalQuery
      related_relation_ids:
        - RetrievalRequest-has_query-RetrievalQuery
      source_claims:
        - claim-retrieval-query-id
    - id: RetrievalRequest-has_query-RetrievalQuery-example-boundary-manual-001
      labels:
        zh: has_query RetrievalQuery边界例
        en: "Boundary case: has_query RetrievalQuery"
        ja: RetrievalQueryをhas_query境界例
      descriptions:
        zh: 仅在日志中提到相似文本不能建立组成关系。
        en: Mentioning similar text in a log does not establish composition.
        ja: log内の類似text言及だけではcompositionを成立させません。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalQuery
      related_relation_ids:
        - RetrievalRequest-has_query-RetrievalQuery
      source_claims:
        - claim-retrieval-query-id
  source_claims:
    - claim-retrieval-query-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-mem0-search
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Mem0 search API.
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: collection.query.
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: POST /v2/rerank.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-retrieval-query-mem0
    source: src-mem0-search
    supports: Mem0 search accepts query string.
    locator: query
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-query-pinecone
    source: src-pinecone-query
    supports: Pinecone index.query accepts dense vector.
    locator: vector
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-query-chroma
    source: src-chroma-query
    supports: Chroma accepts query_texts or query_embeddings.
    locator: query_texts
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-query-id
    source: src-memory-retrieval-design
    supports: query_id identifies query within request.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-query-text
    source: src-mem0-search
    supports: query_text stores normalized query.
    locator: query_text
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-query-vector
    source: src-pinecone-query
    supports: query_vector_ref references embedding.
    locator: vector ref
    evidence_kind: design-inference
    confidence: high
