schema: moonweave.ai/ontology-node/v1
id: RetrievalQuery
kind: concept
status: accepted
labels:
  zh: 检索查询
  en: Retrieval query
  ja: 検索クエリ
semantics:
  short_definition:
    zh: 表达检索所需信息并保留规范化文本或表示引用的请求组成信息。
    en: A request component that expresses the information need and preserves normalized text or a representation reference.
    ja: information needを表しnormalized textまたはrepresentation referenceを保持するrequest componentです。
  definition:
    zh: RetrievalQuery 是 RetrievalRequest 中表达信息需求的组成信息，保存规范化查询文本以及必要时的查询表示引用；它没有独立执行生命周期，也不是完整请求、候选或结果。
    en: RetrievalQuery is the information component of a RetrievalRequest that expresses the information need and preserves normalized query text plus an optional query-representation reference. It has no independent execution lifecycle and is not a complete request, candidate, or result.
    ja: RetrievalQuery はRetrievalRequest内でinformation needを表すcomponentでnormalized query textと任意query-representation referenceを保持します。独立execution lifecycleを持たずcomplete request・candidate・resultではありません。
  why_needed:
    zh: 让查询内容可复现、可比较，而不把查询文本误作一次检索运行。
    en: Makes query content reproducible and comparable without treating query text as a retrieval run.
    ja: query contentを再現・比較可能にしquery textをretrieval runと誤認しません。
  includes:
    - zh: 纳入一个请求中实际提交给检索器的规范化查询内容。
      en: Includes the normalized query content actually supplied to a retriever for one request.
      ja: 一requestでretrieverへ実際に渡すnormalized query contentを含みます。
  excludes:
    - zh: 排除用户消息全文、过滤表达式、模型回答、查询执行和候选文档。
      en: Excludes the full user message, filter expressions, model answers, query execution, and candidate documents.
      ja: user message全文・filter expression・model answer・query execution・candidate documentを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - query_id
  fields:
    - id: query_id
      labels:
        zh: 查询标识
        en: query ID
        ja: query ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属请求内稳定标识查询内容。
        en: Stable identifier for the query content within its request.
        ja: owner request内でquery contentを安定識別します。
      allowed_values: []
      pattern: null
      example_value: query-420
      source_claims:
        - claim-retrieval-query-002
    - id: normalized_text
      labels:
        zh: 规范化查询文本
        en: normalized query text
        ja: 正規化query text
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存实际用于检索且保留语义的规范化文本。
        en: Text actually used for retrieval after semantics-preserving normalization.
        ja: 意味を保持した正規化後にretrievalへ実際使用するtextです。
      allowed_values: []
      pattern: null
      example_value: agent memory retention policy
      source_claims:
        - claim-retrieval-query-003
    - id: representation_ref
      labels:
        zh: 查询表示引用
        en: query representation reference
        ja: query representation reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当查询预先向量化时引用其表示，而不复制向量实体。
        en: References a precomputed query representation without duplicating the vector entity.
        ja: precomputed query representationをvector entity複製なしに参照します。
      allowed_values: []
      pattern: null
      example_value: embedding-query-420
      source_claims:
        - claim-retrieval-query-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalQuery-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索查询正例
      en: "Positive case: Retrieval query"
      ja: 検索クエリ正例
    scenario_id: null
    descriptions:
      zh: query-420 保存本次请求实际提交的规范化文本及其向量表示引用。
      en: query-420 preserves the normalized text actually submitted and its vector-representation reference.
      ja: query-420 は実際にsubmitしたnormalized textとvector representation referenceを保持します。
    field_values:
      query_id: query-420
      normalized_text: agent memory retention policy
      representation_ref: embedding-query-420
    related_node_ids:
      - RetrievalQuery
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalQuery。
      en: Classify the object as RetrievalQuery.
      ja: RetrievalQuery として分類します。
    why_valid_or_invalid:
      zh: 内容边界明确且作为请求组成信息可被重放。
      en: Its content boundary is explicit and replayable as a request component.
      ja: content boundaryが明示されrequest componentとして再生できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-query-005
  - id: RetrievalQuery-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索查询边界例
      en: "Boundary case: Retrieval query"
      ja: 検索クエリ境界例
    scenario_id: null
    descriptions:
      zh: filter-420 表达 tenant_id='acme'，不描述信息需求。
      en: filter-420 expresses tenant_id='acme' and does not describe the information need.
      ja: filter-420 はtenant_id='acme'を表しinformation needを記述しません。
    field_values: {}
    related_node_ids:
      - RetrievalQuery
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalQuery。
      en: Do not classify the object as RetrievalQuery.
      ja: RetrievalQuery として分類しません。
    why_valid_or_invalid:
      zh: 它是 RetrievalFilter，而不是 RetrievalQuery。
      en: It is RetrievalFilter, not RetrievalQuery.
      ja: RetrievalFilterでRetrievalQueryではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-query-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RetrievalRequest-has_query-RetrievalQuery
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_query RetrievalQuery
    en: has_query RetrievalQuery
    ja: RetrievalQueryをhas_query
  definitions:
    zh: RetrievalRequest —has_query→ RetrievalQuery 表示该查询是请求中表达信息需求且用于重放的不可替代组成信息。
    en: RetrievalRequest —has_query→ RetrievalQuery states that the query is the non-substitutable request component expressing the information need for replay.
    ja: RetrievalRequest —has_query→ RetrievalQuery はqueryがinformation needを表しreplayに使う置換不能request componentです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_query
      ja: 逆方向読取
  conditions:
    - id: RetrievalRequest-has_query-RetrievalQuery-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the RetrievalQuery is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 RetrievalQuery 是该 RetrievalRequest 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the RetrievalQuery is a non-substitutable information component within this RetrievalRequest's identity boundary and activity identity is not conflated with artifact identity.
        ja: RetrievalQueryがこのRetrievalRequest identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-retrieval-query-007
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRequest-has_query-RetrievalQuery-example-positive-manual-001
      kind: positive
      labels:
        zh: has_query RetrievalQuery正例
        en: "Positive case: has_query RetrievalQuery"
        ja: RetrievalQueryをhas_query正例
      scenario_id: null
      descriptions:
        zh: request-419 以 query-420 表达实际信息需求。
        en: request-419 uses query-420 as its actual information need.
        ja: request-419がquery-420をactual information needとして持ちます。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalQuery
      related_relation_ids:
        - RetrievalRequest-has_query-RetrievalQuery
      expected_result:
