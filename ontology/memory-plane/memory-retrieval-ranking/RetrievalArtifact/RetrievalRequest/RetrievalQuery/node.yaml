schema: moonweave.ai/ontology-node/v1
id: RetrievalQuery
kind: concept
status: accepted
labels:
  zh: 检索查询
  en: Retrieval query
  ja: 検索クエリ
semantics:
  short_definition:
    zh: 表达信息需求、供检索器使用的规范化文本或词项输入。
    en: Normalized text or terms that express an information need for a retriever.
    ja: retriever のために information need を表す normalized text または terms。
  definition:
    zh: >
      RetrievalQuery 是 RetrievalRequest 的内容组成部分，保存实际交给检索器的查询文本、词项或等价的规范化表达。
      检索器可从它派生 TextEmbedding，或用它进行 BM25 等词法匹配，但该查询本身不是浮点向量、过滤条件、完整请求、
      执行活动或已返回候选。
    en: >
      A RetrievalQuery is the content component of a RetrievalRequest that preserves the query text,
      terms, or equivalent normalized expression actually given to a retriever. A retriever may derive
      a TextEmbedding from it or use it for lexical matching such as BM25, but the query itself is not
      a float vector, a filter condition, a complete request, an execution activity, or a returned candidate.
    ja: >
      RetrievalQuery は retriever に実際に渡す query text・term・同等の normalized expression を保存する
      RetrievalRequest の content component です。retriever はそれから TextEmbedding を導出したり BM25 のような
      lexical matching に使えますが、query 自体は float vector・filter condition・完全な request・execution activity・
      returned candidate ではありません。
  why_needed:
    zh: 固定有效查询可使检索可重放，并能将语义或词法输入与范围限制和结果输出分离。
    en: Fixing the effective query makes retrieval replayable and separates semantic or lexical input from scope restrictions and output.
    ja: effective query を固定すると retrieval が replayable になり、semantic・lexical input を scope restriction と output から分離できます。
  includes:
    - zh: 用户问题的规范化文本、关键词列表或查询重写后的有效文本，只要它表达要寻找的信息。
      en: Normalized user-question text, keyword terms, or rewritten effective text that expresses what information is sought.
      ja: 求める情報を表す normalized user-question text・keyword terms・rewritten effective text。
  excludes:
    - zh: tenant_id=acme 等元数据过滤表达式、嵌入浮点数组、检索请求的范围和上限、消息历史和检索结果。
      en: Metadata filters such as tenant_id=acme, embedding float arrays, request scope and limit, message history, and retrieval results.
      ja: tenant_id=acme のような metadata filter、embedding float array、request scope・limit、message history、retrieval result。
  semantic_kind: information
  aliases: [search query, effective query, 检索词]
engineering:
  explanation:
    zh: >
      查询作为文本或词项传给检索器。词法路径可对精确术语执行 BM25；语义路径可将相同文本传给嵌入 API。
      派生的数值数组归类为 TextEmbedding，而 namespace 和 limit 仍属于 RetrievalRequest。
    en: >
      A query is supplied to a retriever as text or terms. A lexical path can run BM25 over exact terms,
      while a semantic path can pass the same text to an embedding API. The derived numeric array is a
      TextEmbedding; namespace and limit remain properties of RetrievalRequest.
    ja: >
      query は text または term として retriever に渡す。lexical path は正確な term に BM25 を適用でき、
      semantic path は同じ text を embedding API に渡せる。得られる数値配列は TextEmbedding であり、
      namespace と limit は RetrievalRequest の属性に保つ。
  typical_input:
    - description: Query content carried by a request
      format: |
        {
          "query_id": "query-ts999",
          "normalized_text": "Error code TS-999",
          "language": "en",
          "retrieval_mode": "hybrid"
        }
  typical_output:
    - description: Optional retrieval representations derived from query content
      format: |
        # lexical path: BM25("Error code TS-999", candidate_text) -> LexicalScore
        # semantic path:
        POST /v1/embeddings
        {"model":"text-embedding-3-small","input":"Error code TS-999"}
        # -> TextEmbedding, not a replacement for RetrievalQuery
  reference_implementations:
    - name: OpenAI Embeddings
      url: https://developers.openai.com/api/docs/guides/embeddings
      description: Documents passing text input to an embeddings endpoint and receiving a separate float vector.
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/engineering/contextual-retrieval
      description: Documents BM25 exact-match and embedding semantic-retrieval paths over query content.
structure:
  identity_keys: [query_id]
  fields:
    - id: query_id
      labels: {zh: 查询标识, en: query ID, ja: query ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个有效查询表达，而不标识运行或结果。
        en: Stably identifies one effective query expression, not a run or result.
        ja: run や result ではなく一つの effective query expression を安定識別します。
      allowed_values: []
      pattern: null
      example_value: query-ts999
      source_claims: [claim-retrieval-query-input]
    - id: normalized_text
      labels: {zh: 规范化文本, en: normalized text, ja: normalized text}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 实际参与检索的、保持信息需求的规范化文本或序列化词项。
        en: Normalized text or serialized terms that preserve the information need and actually participate in retrieval.
        ja: information need を保持し実際に retrieval に参加する normalized text または serialized terms。
      allowed_values: []
      pattern: null
      example_value: Error code TS-999
      source_claims: [claim-retrieval-query-input]
    - id: language
      labels: {zh: 查询语言, en: query language, ja: query language}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 声明查询文本的语言或分析器区域设置，以便选择正确的规范化或词法处理。
        en: Declares the query language or analyzer locale so the appropriate normalization or lexical treatment can be selected.
        ja: 適切な normalization・lexical treatment を選べるよう、query text の language または analyzer locale を宣言します。
      allowed_values: []
      pattern: null
      example_value: en
      source_claims: [claim-retrieval-query-input]
    - id: retrieval_mode
      labels: {zh: 检索模式, en: retrieval mode, ja: retrieval mode}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识查询要用于 lexical、semantic 或 hybrid 检索；它不等于任何一个分数或嵌入对象。
        en: Identifies whether the query is intended for lexical, semantic, or hybrid retrieval; it is not a score or embedding object.
        ja: query を lexical・semantic・hybrid のどれに使うかを識別し、score や embedding object ではありません。
      allowed_values: [lexical, semantic, hybrid]
      pattern: null
      example_value: hybrid
      source_claims: [claim-retrieval-query-representation-boundary]
  constraints:
    - id: retrieval-query-content-boundary
      severity: error
      expression_language: plain
      expression: normalized_text must carry the information need; a metadata predicate alone is a RetrievalFilter, while a float array is a TextEmbedding derived from or associated with the query.
      explanation:
        zh: 查询表达“找什么”；过滤条件表达“在哪个范围找”，向量表达“如何数值编码文本”，三者不能互相替代。
        en: A query expresses what to find, a filter expresses where to look, and a vector expresses how text was numerically encoded; they are not interchangeable.
        ja: query は「何を探すか」、filter は「どこを探すか」、vector は「text をどう数値化したか」を表し、相互に代替できません。
      source_claims: [claim-retrieval-query-representation-boundary]
    - id: retrieval-query-no-result-state
      severity: error
      expression_language: plain
      expression: A RetrievalQuery must not contain candidate IDs, returned scores, result status, or a run duration; those are output or activity data.
      explanation:
        zh: 查询是输入内容，即使被多个策略使用也不应携带一次执行的候选或计时状态。
        en: Query content is input; even if reused by several strategies, it must not carry candidates or timing state from one execution.
        ja: query content は input であり、複数 strategy で再利用しても一 execution の candidate・timing state を持ちません。
      source_claims: [claim-retrieval-query-request-boundary]
  required_relations: []
examples:
  - id: retrieval-query-positive-example

    labels: {zh: 错误码查询, en: Error-code retrieval query, ja: Error-code retrieval query}

    descriptions:
      zh: HyDE (Gao 2022)：LLM 生成假设文档 embedding 做 zero-shot dense retrieval；Generative Agents 用 natural-language query 检索 Memory Stream relevance 分量。
      en: HyDE (Gao 2022): LLM-generated hypothetical document embedding for zero-shot dense retrieval; Generative Agents uses natural-language query for Memory Stream relevance component.
      ja: HyDE (Gao 2022) 仮説 document embedding。Generative Agents natural-language query relevance 検索。
    field_values: {query_id: query-ts999, normalized_text: Error code TS-999, language: en, retrieval_mode: hybrid}
    related_node_ids: [RetrievalQuery, RetrievalRequest, LexicalScore, TextEmbedding]
    related_relation_ids: []

    source_claims: [claim-retrieval-query-input]
  - id: retrieval-query-boundary-example

    labels: {zh: 元数据过滤条件, en: Metadata filter condition, ja: Metadata filter condition}

    descriptions:
      zh: RetrievalQuery 自然语言 vs EmbeddingVector 数值表示；HyDE 假设文档是 query expansion 中间产物而非最终 query。
      en: RetrievalQuery natural language vs EmbeddingVector numeric representation; HyDE hypothetical doc is query-expansion intermediate not final query.
      ja: RetrievalQuery 自然言語 vs EmbeddingVector。HyDE 仮説 doc は query expansion 中間産物。
    field_values: {filter_id: filter-tenant-1, request_ref: retrieval-request-tenant-1, expression: 'tenant_id = "acme"'}
    related_node_ids: [RetrievalQuery, RetrievalFilter, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-retrieval-query-representation-boundary]
  - id: retrieval-query-counterexample-example

    labels: {zh: 把浮点向量称为查询, en: Calling a float vector the query, ja: Calling a float vector the query}

    descriptions:
      zh: 反例：把 embedding 向量直接当作 RetrievalQuery 文本而未记录 query_text 与 expansion 策略。
      en: Counterexample: embedding vector used as RetrievalQuery text without query_text or expansion strategy record.
      ja: 反例：embedding vector を RetrievalQuery 文本として使用。
    field_values: {embedding_model: text-embedding-3-small, values: '[0.014, -0.032, ...]'}
    related_node_ids: [RetrievalQuery, TextEmbedding, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-retrieval-query-representation-boundary]
  - id: retrieval-query-instance-example

    labels: {zh: 实例：支持工单查询, en: "Instance: support-ticket query", ja: "Instance: support-ticket query"}

    descriptions:
      zh: Generative Agents retrieval：query="What is Sam's opinion on art?" → score=α·recency+β·importance+γ·relevance 排序 top-k memories。
      en: Generative Agents retrieval: query="What is Sam's opinion on art?" → score=α·recency+β·importance+γ·relevance ranks top-k memories.
      ja: Generative Agents query→score=α·recency+β·importance+γ·relevance top-k rank。
    field_values: {query_id: support-query-20260718-01, normalized_text: How do I reset an API token?, language: en, retrieval_mode: hybrid}
    related_node_ids: [RetrievalQuery, RetrievalRequest, TextEmbedding]
    related_relation_ids: [RetrievalQuery-part-of-RetrievalRequest]

    source_claims: [claim-retrieval-query-request-boundary]
parent_relation:
  id: RetrievalQuery-part-of-RetrievalRequest
  predicate: part_of
  target: concept:RetrievalRequest
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是检索请求的查询组成部分, en: is query component of retrieval request, ja: RetrievalRequest の query component である}
  definitions:
    zh: RetrievalQuery 是 RetrievalRequest 中表达要寻找信息的组成部分，而不是请求的同义子类。
    en: RetrievalQuery is the component of RetrievalRequest that expresses the sought information, not a synonymous subtype of the request.
    ja: RetrievalQuery は求める情報を表す RetrievalRequest の component であり、request の同義 subtype ではありません。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_query, labels: {zh: 有查询, en: has query, ja: query を持つ}}
  conditions: []
  temporal_scope: valid-time
  boundary_context: A query reused by another request is a separately linked component, not evidence that two requests are the same run.
  constraints: []
  examples: []
  source_claims: [claim-retrieval-query-part-of-request]
  distinct_fact_rationale: Query content conveys what to retrieve; scope, filters, limit, and execution identity are owned by the request or run.
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-embeddings
    title: OpenAI Embeddings
    url: https://developers.openai.com/api/docs/guides/embeddings
    source_type: official-documentation
    relevance: Documents text input to embedding creation and the separate returned float-vector representation.
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    url: https://www.anthropic.com/engineering/contextual-retrieval
    source_type: official-article
    relevance: Documents exact-match BM25 and embedding semantic retrieval as distinct uses of query content.
source_claims:
  - id: claim-retrieval-query-input
    source: openai-embeddings
    supports: The Embeddings API accepts a text input and returns a separate float embedding vector, supporting a query-text input artifact that is distinct from its representation.
    locator: "Vector embeddings guide: embeddings.create input and response data[0].embedding"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-retrieval-query-representation-boundary
    source: anthropic-contextual-retrieval
    supports: Anthropic describes BM25 exact term matching and embeddings semantic similarity as distinct retrieval paths that can operate over the same query content; Moonweave distinguishes query content, filter predicates, vectors, and scores accordingly.
    locator: "Contextual Retrieval: BM25 and embeddings, steps 3 through 5"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-query-request-boundary
    source: openai-embeddings
    supports: Text passed to an embedding endpoint is input, while the endpoint returns representation data; Moonweave separately models request configuration and execution output around that input.
    locator: "Vector embeddings guide: request example and embedding response"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-retrieval-query-part-of-request
    source: anthropic-contextual-retrieval
    supports: Modeling information-need text as a component of a broader retrieval request is a Moonweave composition inference informed by the documented query-to-retrieval pipeline.
    locator: "Contextual Retrieval: BM25 and embeddings retrieval pipeline"
    evidence_kind: ontology-design-inference
    confidence: medium
