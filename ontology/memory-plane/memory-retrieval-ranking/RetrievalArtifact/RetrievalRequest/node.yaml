schema: moonweave.ai/ontology-node/v1
id: RetrievalRequest
kind: concept
labels:
  zh: 检索请求
  en: Retrieval request
  ja: 検索要求
semantics:
  short_definition:
    zh: 声明一次检索需求的规范请求。
    en: Normative request declaring one retrieval need.
    ja: 一 retrieval need を宣言する normative request。
  definition:
    zh: RetrievalRequest 封装 RetrievalQuery、可选 RetrievalFilter、目标 IndexVersion 与 top_k 等 API 参数的稳定声明；Mem0 search body、Pinecone index.query 参数与 Chroma collection.query 参数均映射到此对象，但不等于已开始执行的 RetrievalRun。
    en: RetrievalRequest packages stable declarations of RetrievalQuery, optional RetrievalFilter, target IndexVersion, and API parameters such as top_k. Mem0 search body, Pinecone index.query parameters, and Chroma collection.query parameters map here but it is not a started RetrievalRun.
    ja: RetrievalRequest は RetrievalQuery/RetrievalFilter/IndexVersion/top_k 等 API 参数の stable 宣言。Mem0/Pinecone/Chroma 请求参数を写像するが RetrievalRun ではない。
  why_needed:
    zh: 同一 query 可多次运行读取不同索引；request 必须可复用且与 run 分离。
    en: The same query may run multiple times against different indexes; request must be reusable and separate from run.
    ja: 同一 query の複数 run を許すため request は run と分離必須。
  includes:
    - zh: 纳入含 query、filter、top_k 与 index 目标的规范检索声明。
      en: Includes normative retrieval declarations with query, filter, top_k, and index target.
      ja: query/filter/top_k/index target を含む normative declaration。
  excludes:
    - zh: 排除执行中的 run、结果与候选记录。
      en: Excludes executing runs, results, and candidate records.
      ja: 実行中 run/result/candidate record を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射 Mem0 POST body、Pinecone index.query(vector, top_k, filter)、Chroma collection.query(query_texts, n_results, where)。
    en: Maps Mem0 POST body, Pinecone index.query(vector, top_k, filter), Chroma collection.query(query_texts, n_results, where).
    ja: Mem0 POST/Pinecone query/Chroma query パラメータを写像。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query
    - name: LangGraph Store Search
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.search
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: Request identifier
        ja: request 識別子
      definitions:
        zh: 稳定标识规范检索请求。
        en: Stable identifier for normative retrieval request.
        ja: normative retrieval request を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: request-419
      allowed_values: []
      source_claims:
        - claim-retrieval-request-id
    - id: top_k
      labels:
        zh: Top-K
        en: Top-K
        ja: Top-K
      definitions:
        zh: 声明返回候选上限；对应 Mem0 top_k、Pinecone top_k、Chroma n_results。
        en: Declares candidate return limit; maps to Mem0 top_k, Pinecone top_k, Chroma n_results.
        ja: Mem0 top_k/Pinecone top_k/Chroma n_results に対応。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 10
      allowed_values: []
      source_claims:
        - claim-retrieval-request-topk
    - id: target_index_version_id
      labels:
        zh: 目标索引版本
        en: Target index version
        ja: 対象 index 版
      definitions:
        zh: 计划读取的 IndexVersion；run 可能读取不同 actual 版本。
        en: Planned IndexVersion; run may read different actual version.
        ja: 計画 IndexVersion。run の actual 版は別可。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: index-v19
      allowed_values: []
      source_claims:
        - claim-retrieval-request-index
  constraints: []
  required_relations: []
examples:
  - id: RetrievalRequest-example-mem0
    labels:
      zh: Mem0 搜索请求
      en: Mem0 search request
      ja: Mem0 search request
    descriptions:
      zh: request-419：query="Alice code language", user_id=alice, top_k=5, filters.category=preferences。
      en: "request-419: query, user_id=alice, top_k=5, filters.category=preferences."
      ja: request-419 Mem0 search 参数。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/search/
    field_values:
      request_id: request-419
      top_k: 5
      query: What language does Alice prefer for code?
    related_node_ids:
      - RetrievalRequest
      - RetrievalQuery
    related_relation_ids: []
    source_claims:
      - claim-retrieval-request-mem0
  - id: RetrievalRequest-example-pinecone
    labels:
      zh: Pinecone 查询请求
      en: Pinecone query request
      ja: Pinecone query request
    descriptions:
      zh: request-420：vector query + top_k=10 + namespace + metadata filter。
      en: "request-420: vector query + top_k=10 + namespace + metadata filter."
      ja: request-420 Pinecone query 参数。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: index.query
    field_values:
      request_id: request-420
      top_k: 10
      namespace: tenant-7-user-alice
    related_node_ids:
      - RetrievalRequest
      - RetrievalFilter
    related_relation_ids: []
    source_claims:
      - claim-retrieval-request-pinecone
  - id: RetrievalRequest-example-chroma
    labels:
      zh: Chroma 查询请求
      en: Chroma query request
      ja: Chroma query request
    descriptions:
      zh: request-421：query_texts + n_results=5 + where user_id=alice。
      en: "request-421: query_texts + n_results=5 + where user_id=alice."
      ja: request-421 Chroma query 参数。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: collection.query
    field_values:
      request_id: request-421
      top_k: 5
      where:
        user_id: alice
    related_node_ids:
      - RetrievalRequest
    related_relation_ids: []
    source_claims:
      - claim-retrieval-request-chroma
parent_relation:
  id: RetrievalRequest-is_a-RetrievalArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalArtifact
    en: is a RetrievalArtifact
    ja: RetrievalArtifactの一種
  definitions:
    zh: RetrievalRequest —is_a→ RetrievalArtifact 成立，因为它是在执行前固定查询、过滤条件、目标索引版本和结果上限的持久请求记录。
    en: RetrievalRequest —is_a→ RetrievalArtifact holds because it is the persistent pre-execution record fixing query, filter, target index version, and result limit.
    ja: RetrievalRequest —is_a→ RetrievalArtifact は実行前にquery・filter・target index version・result limitを固定するpersistent request recordであるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RetrievalRequest-is_a-RetrievalArtifact-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the persistent pre-execution record fixing query, filter, target index version, and result limit."
      explanations:
        zh: 仅当实例既满足 RetrievalArtifact 的完整定义，又满足子类种差“它是在执行前固定查询、过滤条件、目标索引版本和结果上限的持久请求记录。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the persistent pre-execution record fixing query, filter, target index version, and result limit."
        ja: instanceがRetrievalArtifact完全定義とchild differentia「実行前にquery・filter・target index version・result limitを固定するpersistent request recordである」を共に満たす時だけassertします。
      source_claims:
        - claim-retrieval-request-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalRequest-is_a-RetrievalArtifact-example-positive-manual-001
      labels:
        zh: 是一种RetrievalArtifact正例
        en: "Positive case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種正例
      descriptions:
        zh: request-419 固定本次检索输入但尚未执行。
        en: request-419 fixes retrieval inputs before execution.
        ja: request-419が実行前retrieval inputを固定します。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalArtifact
      related_relation_ids:
        - RetrievalRequest-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieval-request-id
    - id: RetrievalRequest-is_a-RetrievalArtifact-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalArtifact边界例
        en: "Boundary case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種境界例
      descriptions:
        zh: run-411 已经开始执行并具有活动时间边界。
        en: run-411 has started execution and has an activity boundary.
        ja: run-411は実行開始済みでactivity boundaryがあります。
      field_values: {}
      related_node_ids:
        - RetrievalRequest
        - RetrievalArtifact
      related_relation_ids:
        - RetrievalRequest-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieval-request-id
  source_claims:
    - claim-retrieval-request-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RetrievalRequest-targets-IndexVersion
    predicate: targets
    direction: source-to-target
    relation_kind: information
    labels:
      zh: targets IndexVersion
      en: targets IndexVersion
      ja: IndexVersionをtargets
    definitions:
      zh: RetrievalRequest —targets→ IndexVersion 表示请求在执行前声明希望查询的不可替代索引版本。
      en: RetrievalRequest —targets→ IndexVersion states that the request declares the non-substitutable index version it intends to query before execution.
      ja: RetrievalRequest —targets→ IndexVersion はrequestが実行前にquery予定の置換不能index versionを宣言します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_targets
      labels:
        zh: 反向读取
        en: inverse targets
        ja: 逆方向読取
    conditions:
      - id: RetrievalRequest-targets-IndexVersion-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when request.index_version_id explicitly equals this IndexVersion identifier.
        explanations:
          zh: 仅当 request.index_version_id 明确等于该 IndexVersion 的标识时建立该边。
          en: Assert only when request.index_version_id explicitly equals this IndexVersion identifier.
          ja: request.index_version_idがこのIndexVersion IDと明示一致する時だけassertします。
        source_claims:
          - claim-retrieval-request-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalRequest-targets-IndexVersion-example-positive-manual-001
        labels:
          zh: targets IndexVersion正例
          en: "Positive case: targets IndexVersion"
          ja: IndexVersionをtargets正例
        descriptions:
          zh: request-419 targets index-v19。
          en: request-419 targets index-v19.
          ja: request-419がindex-v19をtargetにします。
        field_values: {}
        related_node_ids:
          - RetrievalRequest
          - IndexVersion
        related_relation_ids:
          - RetrievalRequest-targets-IndexVersion
        source_claims:
          - claim-retrieval-request-id
      - id: RetrievalRequest-targets-IndexVersion-example-boundary-manual-001
        labels:
          zh: targets IndexVersion边界例
          en: "Boundary case: targets IndexVersion"
          ja: IndexVersionをtargets境界例
        descriptions:
          zh: 仅因 index-v19 是最新版本不能建立目标边。
          en: Being the latest version alone does not make index-v19 the request target.
          ja: index-v19がlatestだけではrequest targetになりません。
        field_values: {}
        related_node_ids:
          - RetrievalRequest
          - IndexVersion
        related_relation_ids:
          - RetrievalRequest-targets-IndexVersion
        source_claims:
          - claim-retrieval-request-id
    source_claims:
      - claim-retrieval-request-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:IndexVersion
sources:
  - id: src-mem0-search
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Mem0 search API.
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: index.query.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: collection.query.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-retrieval-request-mem0
    source: src-mem0-search
    supports: Mem0 search body maps to RetrievalRequest.
    locator: search body
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-request-pinecone
    source: src-pinecone-query
    supports: Pinecone query params map to RetrievalRequest.
    locator: index.query
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-request-chroma
    source: src-chroma-query
    supports: Chroma query params map to RetrievalRequest.
    locator: collection.query
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-request-id
    source: src-memory-retrieval-design
    supports: request_id identifies requests.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-request-topk
    source: src-pinecone-query
    supports: top_k maps to API limit parameters.
    locator: top_k
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-request-index
    source: src-memory-retrieval-design
    supports: target_index_version_id declares planned index.
    locator: structure
    evidence_kind: design-inference
    confidence: high
