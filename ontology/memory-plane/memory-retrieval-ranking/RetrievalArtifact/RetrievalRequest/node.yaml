sibling_differentiation:
  - sibling_concept_id: RetrievalResult
    shared_parent_concept_id: RetrievalArtifact
    differentia:
      zh: 已审查兄弟区分：父节点 RetrievalArtifact：RetrievalRequest（semantic kind=information，骨架 RetrievalRequest-is_a-RetrievalArtifact）；RetrievalResult（semantic kind=information，骨架 RetrievalResult-is_a-RetrievalArtifact）。双端条件：RetrievalRequest 条件：“在执行前固定查询、过滤条件、目标索引版本和结果上限的请求产物”；RetrievalResult 条件：“一次检索运行完成后封装候选集合、最终保留候选和完成状态的结果产物”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent RetrievalArtifact: RetrievalRequest (semantic kind=information, backbone RetrievalRequest-is_a-RetrievalArtifact); RetrievalResult (semantic kind=information, backbone RetrievalResult-is_a-RetrievalArtifact). Endpoint conditions: RetrievalRequest condition: “A request artifact that fixes the query, filters, target index version, and result limit before execution”; RetrievalResult condition: “A result artifact that packages the candidate set, retained candidates, and completion state after one retrieval run”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 RetrievalArtifact：RetrievalRequest（semantic kind=information、バックボーン RetrievalRequest-is_a-RetrievalArtifact）；RetrievalResult（semantic kind=information、バックボーン RetrievalResult-is_a-RetrievalArtifact）。両端条件：RetrievalRequest の条件：「実行前にquery・filter・target index version・result limitを固定するrequest artifactです」；RetrievalResult の条件：「一retrieval run完了後にcandidate set・retained candidate・completion stateをまとめるresult artifactです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-retrieval-request-007
  - sibling_concept_id: RetrievedCandidate
    shared_parent_concept_id: RetrievalArtifact
    differentia:
      zh: 端点特定对照：父节点 RetrievalArtifact：RetrievalRequest（semantic kind=information，骨架 RetrievalRequest-is_a-RetrievalArtifact）；RetrievedCandidate（semantic kind=information，骨架 RetrievedCandidate-is_a-RetrievalArtifact）。双端条件：RetrievalRequest 条件：“在执行前固定查询、过滤条件、目标索引版本和结果上限的请求产物”；RetrievedCandidate 条件：“在一个候选集合中引用实际内容对象并记录阶段排名与分数的候选产物”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent RetrievalArtifact: RetrievalRequest (semantic kind=information, backbone RetrievalRequest-is_a-RetrievalArtifact); RetrievedCandidate (semantic kind=information, backbone RetrievedCandidate-is_a-RetrievalArtifact). Endpoint conditions: RetrievalRequest condition: “A request artifact that fixes the query, filters, target index version, and result limit before execution”; RetrievedCandidate condition: “A candidate artifact that refers to an actual content object and records stage rank and scores within a candidate set”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 RetrievalArtifact：RetrievalRequest（semantic kind=information、バックボーン RetrievalRequest-is_a-RetrievalArtifact）；RetrievedCandidate（semantic kind=information、バックボーン RetrievedCandidate-is_a-RetrievalArtifact）。両端条件：RetrievalRequest の条件：「実行前にquery・filter・target index version・result limitを固定するrequest artifactです」；RetrievedCandidate の条件：「candidate set内でactual content objectを参照しstage rankとscoreを記録するcandidate artifactです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-retrieval-request-008
