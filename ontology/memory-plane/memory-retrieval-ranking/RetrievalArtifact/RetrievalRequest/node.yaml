schema: moonweave.ai/ontology-node/v1
id: RetrievalRequest
kind: concept
status: review
labels:
  zh: 检索请求
  en: Retrieval request
  ja: 検索要求
semantics:
  short_definition:
    zh: 在执行前固定查询、过滤条件、目标索引版本和结果上限的请求产物。
    en: A request artifact that fixes the query, filters, target index version, and result limit before execution.
    ja: 実行前にquery・filter・target index version・result limitを固定するrequest artifactです。
  definition:
    zh: RetrievalRequest 是一个可持久引用的检索意图记录，由 RetrievalQuery 与可选 RetrievalFilter 组成，并明确目标 IndexVersion 与请求上限；它不是执行运行，也不表示已经产生候选或结果。
    en: RetrievalRequest is a persistently referencable record of retrieval intent, composed of a RetrievalQuery and optional RetrievalFilter and declaring a target IndexVersion and requested limit. It is neither an execution run nor evidence that candidates or results already exist.
    ja: RetrievalRequest はpersistentに参照できるretrieval intent recordでRetrievalQueryと任意RetrievalFilterから成りtarget IndexVersionとlimitを宣言します。execution runでもcandidate/result生成済み証拠でもありません。
  why_needed:
    zh: 在运行前固定可重放输入，并把请求身份与运行身份分开。
    en: Fixes replayable inputs before execution and separates request identity from run identity.
    ja: 実行前に再生可能inputを固定しrequest identityとrun identityを分離します。
  includes:
    - zh: 纳入具有 request_id、目标索引版本、查询和约束条件的已提交检索意图。
      en: Includes submitted retrieval intent with request_id, target index version, query, and constraints.
      ja: request_id・target index version・query・constraintを持つsubmitted retrieval intentを含みます。
  excludes:
    - zh: 排除自然语言问题本身、正在执行的 RetrievalRun、返回结果和索引配置。
      en: Excludes the natural-language question alone, executing RetrievalRun, returned results, and index configuration.
      ja: 自然言語question単体・実行中RetrievalRun・returned result・index configurationを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: request ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次检索意图记录。
        en: Stable identifier for one retrieval-intent record.
        ja: 一つのretrieval-intent recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-request-419
      source_claims:
        - claim-retrieval-request-002
    - id: index_version_id
      labels:
        zh: 目标索引版本
        en: target index version ID
        ja: target index version ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明请求希望查询的不可替代索引版本。
        en: Declares the non-substitutable index version the request intends to query.
        ja: requestがqueryする置換不能index versionを宣言します。
      allowed_values: []
      pattern: null
      example_value: index-v19
      source_claims:
        - claim-retrieval-request-003
    - id: requested_limit
      labels:
        zh: 请求结果上限
        en: requested result limit
        ja: 要求result上限
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明请求希望返回的最大候选或结果数量。
        en: Maximum number of candidates or results requested.
        ja: 要求するcandidate/resultの最大数です。
      allowed_values: []
      pattern: null
      example_value: 12
      source_claims:
        - claim-retrieval-request-004
  constraints: []
  required_relation_constraints: []
