schema: moonweave.ai/ontology-node/v1
id: CandidateSet
kind: concept
status: accepted
labels:
  zh: 候选集合
  en: Candidate set
  ja: 候補集合
semantics:
  short_definition:
    zh: 在一个声明阶段保留候选成员及其当时顺序状态的结果组成信息。
    en: A result component that preserves candidate membership and ordering state at a declared stage.
    ja: 指定stageでcandidate membershipとその時点のordering stateを保持するresult componentです。
  definition:
    zh: CandidateSet 是 RetrievalResult 中用于承载一组 RetrievedCandidate 的组成信息，以 candidate_set_id 和 stage_name 区分初始召回、融合后、重排后或 TopK 状态；它不是泛化“集合”上位类，也不是单个候选。
    en: CandidateSet is the RetrievalResult component that holds a group of RetrievedCandidate records. Its candidate_set_id and stage_name distinguish initial, fused, reranked, or Top-K state. It is not a generic collection superclass and not an individual candidate.
    ja: CandidateSet はRetrievedCandidate群を保持するRetrievalResult componentでcandidate_set_idとstage_nameによりinitial・fused・reranked・Top-K stateを区別します。generic collection superclassでもindividual candidateでもありません。
  why_needed:
    zh: 保留每个检索阶段的成员和顺序快照，避免把中间列表与最终结果或候选身份混淆。
    en: Preserves stage-specific membership and order snapshots without conflating intermediate lists, final results, or candidate identity.
    ja: stage別membership/order snapshotを保持しintermediate list・final result・candidate identityを混同しません。
  includes:
    - zh: 纳入由候选生成、融合、重排或 TopK 阶段明确产生或消费的候选成员集合。
      en: Includes candidate-member sets explicitly produced or consumed by generation, fusion, reranking, or Top-K stages.
      ja: generation・fusion・reranking・Top-K stageが明示生成/consumeするcandidate member setを含みます。
  excludes:
    - zh: 排除任意 RetrievalCollection 抽象、单个候选、索引分片和上下文包。
      en: Excludes a generic RetrievalCollection abstraction, individual candidates, index shards, and context packages.
      ja: generic RetrievalCollection abstraction・individual candidate・index shard・context packageを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - candidate_set_id
  fields:
    - id: candidate_set_id
      labels:
        zh: 候选集合标识
        en: candidate set ID
        ja: candidate set ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个阶段性的候选集合快照。
        en: Stable identifier for one stage-specific candidate-set snapshot.
        ja: 一つのstage-specific candidate-set snapshotを安定識別します。
      allowed_values: []
      pattern: null
      example_value: candidate-set-423
      source_claims:
        - claim-candidate-set-002
    - id: stage_name
      labels:
        zh: 阶段名称
        en: stage name
        ja: stage name
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该集合处于初始、融合、重排或 TopK 哪个阶段。
        en: Declares whether the set represents initial, fused, reranked, or Top-K state.
        ja: setがinitial・fused・reranked・Top-Kどのstateか宣言します。
      allowed_values: []
      pattern: null
      example_value: post-rerank
      source_claims:
        - claim-candidate-set-003
    - id: ordered
      labels:
        zh: 是否有序
        en: ordered
        ja: 順序あり
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明成员顺序是否具有检索语义。
        en: Declares whether member order carries retrieval semantics.
        ja: member orderがretrieval semanticsを持つか宣言します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-candidate-set-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: CandidateSet-example-positive-manual-001
    kind: positive
    labels:
      zh: 候选集合正例
      en: "Positive case: Candidate set"
      ja: 候補集合正例
    scenario_id: null
    descriptions:
      zh: candidate-set-423 保存重排后 80 个候选的成员与确定顺序。
      en: candidate-set-423 preserves the members and deterministic order of 80 reranked candidates.
      ja: candidate-set-423 はrerank後80 candidateのmemberと決定的orderを保持します。
    field_values:
      candidate_set_id: candidate-set-423
      stage_name: post-rerank
      ordered: true
    related_node_ids:
      - CandidateSet
    related_relation_ids: []
    expected_result:
      zh: 归类为 CandidateSet。
      en: Classify the object as CandidateSet.
      ja: CandidateSet として分類します。
    why_valid_or_invalid:
      zh: 集合身份、阶段与顺序状态都明确。
      en: Set identity, stage, and ordering state are all explicit.
      ja: set identity・stage・ordering stateがすべて明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-set-005
  - id: CandidateSet-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 候选集合边界例
      en: "Boundary case: Candidate set"
      ja: 候補集合境界例
    scenario_id: null
    descriptions:
      zh: candidate-423 只表示一个 chunk 的检索命中与排名。
      en: candidate-423 represents one retrieved chunk and its rank.
      ja: candidate-423 は一chunkのretrieval hitとrankを表します。
    field_values: {}
    related_node_ids:
      - CandidateSet
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 CandidateSet。
      en: Do not classify the object as CandidateSet.
      ja: CandidateSet として分類しません。
    why_valid_or_invalid:
      zh: 它是 RetrievedCandidate 成员，不是 CandidateSet。
      en: It is a RetrievedCandidate member, not CandidateSet.
      ja: RetrievedCandidate memberでCandidateSetではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-set-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RetrievalResult-has_candidate_set-CandidateSet
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_candidate_set CandidateSet
    en: has_candidate_set CandidateSet
    ja: CandidateSetをhas_candidate_set
  definitions:
    zh: RetrievalResult —has_candidate_set→ CandidateSet 表示该阶段性候选集合快照构成结果的成员与顺序边界。
    en: RetrievalResult —has_candidate_set→ CandidateSet states that the stage-specific candidate-set snapshot forms the result's membership and ordering boundary.
    ja: RetrievalResult —has_candidate_set→ CandidateSet はstage-specific candidate-set snapshotがresultのmembership/order boundaryを構成します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_candidate_set
      ja: 逆方向読取
  conditions:
    - id: RetrievalResult-has_candidate_set-CandidateSet-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the CandidateSet is a non-substitutable information component within this RetrievalResult's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 CandidateSet 是该 RetrievalResult 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the CandidateSet is a non-substitutable information component within this RetrievalResult's identity boundary and activity identity is not conflated with artifact identity.
        ja: CandidateSetがこのRetrievalResult identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-candidate-set-007
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalResult-has_candidate_set-CandidateSet-example-positive-manual-001
      kind: positive
      labels:
        zh: has_candidate_set CandidateSet正例
        en: "Positive case: has_candidate_set CandidateSet"
        ja: CandidateSetをhas_candidate_set正例
      scenario_id: null
      descriptions:
        zh: result-422 拥有 candidate-set-423 的最终阶段快照。
        en: result-422 owns the final-stage snapshot candidate-set-423.
        ja: result-422がfinal-stage snapshot candidate-set-423を所有します。
      field_values: {}
      related_node_ids:
        - RetrievalResult
        - CandidateSet
      related_relation_ids:
        - RetrievalResult-has_candidate_set-CandidateSet
      expected_result:
        zh: 建立该有向事实，并保留条件与证据。
        en: Assert the directed fact with its condition and evidence retained.
        ja: condition/evidenceを保持してdirected factをassertします。
      why_valid_or_invalid:
        zh: 实例满足端点定义、方向和该关系的显式成立条件。
        en: The case satisfies both endpoint definitions, direction, and the relation's explicit assertion condition.
        ja: endpoint定義・direction・明示assertion conditionを満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-candidate-set-007
    - id: RetrievalResult-has_candidate_set-CandidateSet-example-boundary-manual-001
      kind: boundary
      labels:
        zh: has_candidate_set CandidateSet边界例
        en: "Boundary case: has_candidate_set CandidateSet"
        ja: CandidateSetをhas_candidate_set境界例
      scenario_id: null
      descriptions:
