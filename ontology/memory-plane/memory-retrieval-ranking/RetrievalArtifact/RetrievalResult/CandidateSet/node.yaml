schema: moonweave.ai/ontology-node/v1
id: CandidateSet
kind: concept
labels:
  zh: 候选集合
  en: Candidate set
  ja: 候補集合
semantics:
  short_definition:
    zh: 某一阶段的候选成员集合快照。
    en: Stage-local snapshot of candidate membership.
    ja: 一 stage の candidate membership snapshot。
  definition:
    zh: CandidateSet 记录某一检索阶段的候选 id 列表、顺序与 stage_name（initial-recall、post-rrf、post-rerank 等）；Pinecone matches 列表、RRF 输出与 Cohere rerank 输出均可建模为不同 stage 的 CandidateSet。
    en: CandidateSet records candidate ids, order, and stage_name (initial-recall, post-rrf, post-rerank, etc.) for one retrieval stage. Pinecone matches lists, RRF output, and Cohere rerank output can each model as CandidateSet at different stages.
    ja: CandidateSet は stage ごとの candidate id 列表・顺序・stage_name を記録。Pinecone matches/RRF output/Cohere rerank output を各 stage CandidateSet として建模。
  why_needed:
    zh: 同一 run 中候选集合会在 RRF 与 rerank 后变化；必须保留每个阶段的成员与顺序才能 debug。
    en: Candidate membership changes after RRF and rerank within one run; each stage membership and order must be preserved for debugging.
    ja: RRF/rerank 後に membership が変わるため各 stage snapshot が debug に必要。
  includes:
    - zh: 纳入含 stage_name 与有序 candidate_id 列表的集合快照。
      en: Includes snapshots with stage_name and ordered candidate_id lists.
      ja: stage_name と ordered candidate_id list を含む snapshot。
  excludes:
    - zh: 排除单个 RetrievedCandidate、RetrievalScore 与 ContextPackage。
      en: Excludes individual RetrievedCandidate, RetrievalScore, and ContextPackage.
      ja: 単 RetrievedCandidate/RetrievalScore/ContextPackage を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: initial-recall←Pinecone matches/Chroma ids；post-rrf←RRF 输出 ordered ids；post-rerank←Cohere rerank results index 顺序。
    en: initial-recall from Pinecone matches/Chroma ids; post-rrf from RRF ordered ids; post-rerank from Cohere rerank result index order.
    ja: stage_name ごとの API 输出映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/query-data
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - candidate_set_id
  fields:
    - id: candidate_set_id
      labels:
        zh: 候选集合标识
        en: Candidate set identifier
        ja: candidate set 識別子
      definitions:
        zh: 稳定标识一个阶段候选集合。
        en: Stable identifier for one stage candidate set.
        ja: 一 stage candidate set を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-set-422
      allowed_values: []
      source_claims:
        - claim-candidate-set-id
    - id: stage_name
      labels:
        zh: 阶段名称
        en: Stage name
        ja: stage 名
      definitions:
        zh: 声明集合所处阶段：initial-recall、post-rrf、post-rerank、final。
        en: "Declares stage: initial-recall, post-rrf, post-rerank, final."
        ja: initial-recall/post-rrf/post-rerank/final。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: post-rrf
      allowed_values: []
      source_claims:
        - claim-candidate-set-stage
    - id: member_count
      labels:
        zh: 成员数量
        en: Member count
        ja: メンバー数
      definitions:
        zh: 集合中有序候选数量。
        en: Ordered candidate count in the set.
        ja: 有序 candidate 数。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 20
      allowed_values: []
      source_claims:
        - claim-candidate-set-count
  constraints: []
  required_relations: []
examples:
  - id: CandidateSet-example-initial-pinecone
    labels:
      zh: Pinecone 初始集合
      en: Pinecone initial set
      ja: Pinecone initial set
    descriptions:
      zh: candidate-set-initial-412 stage_name=initial-recall member_count=40 来自 index.query top_k=40。
      en: candidate-set-initial-412 stage_name=initial-recall member_count=40 from index.query top_k=40.
      ja: initial-recall 40 candidates from Pinecone。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/query-data
      version: matches list
    field_values:
      candidate_set_id: candidate-set-initial-412
      stage_name: initial-recall
      member_count: 40
    related_node_ids:
      - CandidateSet
      - CandidateGenerationActivity
    related_relation_ids: []
    source_claims:
      - claim-candidate-set-pinecone
  - id: CandidateSet-example-post-rrf
    labels:
      zh: RRF 后集合
      en: Post-RRF set
      ja: Post-RRF set
    descriptions:
      zh: candidate-set-fused-415 stage_name=post-rrf 合并 dense+lexical 后 20 成员。
      en: candidate-set-fused-415 stage_name=post-rrf with 20 members after merging dense+lexical.
      ja: post-rrf 20 members after RRF。
    example_source:
      product: Elasticsearch
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/rrf.html
      version: RRF output
    field_values:
      candidate_set_id: candidate-set-fused-415
      stage_name: post-rrf
      member_count: 20
    related_node_ids:
      - CandidateSet
      - RankFusion
    related_relation_ids: []
    source_claims:
      - claim-candidate-set-rrf
  - id: CandidateSet-example-post-rerank
    labels:
      zh: Cohere rerank 后集合
      en: Post-Cohere rerank set
      ja: Post-Cohere rerank set
    descriptions:
      zh: candidate-set-reranked-416 stage_name=post-rerank member_count=10 来自 Cohere top_n=10。
      en: candidate-set-reranked-416 stage_name=post-rerank member_count=10 from Cohere top_n=10.
      ja: post-rerank from Cohere top_n=10。
    example_source:
      product: Cohere
      url: https://docs.cohere.com/reference/rerank
      version: rerank output order
    field_values:
      candidate_set_id: candidate-set-reranked-416
      stage_name: post-rerank
      member_count: 10
    related_node_ids:
      - CandidateSet
      - RerankActivity
    related_relation_ids: []
    source_claims:
      - claim-candidate-set-cohere
parent_relation:
  id: RetrievalResult-has_candidate_set-CandidateSet
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has_candidate_set CandidateSet
    en: has_candidate_set CandidateSet
    ja: CandidateSetをhas_candidate_set
  definitions:
    zh: RetrievalResult —has_candidate_set→ CandidateSet 表示该阶段性候选集合快照构成结果的成员与顺序边界。
    en: RetrievalResult —has_candidate_set→ CandidateSet states that the stage-specific candidate-set snapshot forms the result's membership and ordering boundary.
    ja: RetrievalResult —has_candidate_set→ CandidateSet はstage-specific candidate-set snapshotがresultのmembership/order boundaryを構成します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has_candidate_set
      ja: 逆方向読取
  conditions:
    - id: RetrievalResult-has_candidate_set-CandidateSet-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the CandidateSet is a non-substitutable information component within this RetrievalResult's identity boundary and activity identity is not conflated with artifact identity.
      explanations:
        zh: 仅当 CandidateSet 是该 RetrievalResult 身份边界内不可替代的组成信息，且没有把活动与产物身份合并时建立该边。
        en: Assert only when the CandidateSet is a non-substitutable information component within this RetrievalResult's identity boundary and activity identity is not conflated with artifact identity.
        ja: CandidateSetがこのRetrievalResult identity boundary内の置換不能information componentでactivity/artifact identityを混同しない場合だけassertします。
      source_claims:
        - claim-candidate-set-id
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalResult-has_candidate_set-CandidateSet-example-positive-manual-001
      labels:
        zh: has_candidate_set CandidateSet正例
        en: "Positive case: has_candidate_set CandidateSet"
        ja: CandidateSetをhas_candidate_set正例
      descriptions:
        zh: result-422 拥有 candidate-set-423 的最终阶段快照。
        en: result-422 owns the final-stage snapshot candidate-set-423.
        ja: result-422がfinal-stage snapshot candidate-set-423を所有します。
      field_values: {}
      related_node_ids:
        - RetrievalResult
        - CandidateSet
      related_relation_ids:
        - RetrievalResult-has_candidate_set-CandidateSet
      source_claims:
        - claim-candidate-set-id
    - id: RetrievalResult-has_candidate_set-CandidateSet-example-boundary-manual-001
      labels:
        zh: has_candidate_set CandidateSet边界例
        en: "Boundary case: has_candidate_set CandidateSet"
        ja: CandidateSetをhas_candidate_set境界例
      descriptions:
        zh: 同一候选在日志中的临时列表不自动成为结果组成。
        en: A temporary list in a log does not automatically become a result component.
        ja: log内temporary listは自動でresult componentになりません。
      field_values: {}
      related_node_ids:
        - RetrievalResult
        - CandidateSet
      related_relation_ids:
        - RetrievalResult-has_candidate_set-CandidateSet
      source_claims:
        - claim-candidate-set-id
  source_claims:
    - claim-candidate-set-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: CandidateSet-contains-RetrievedCandidate
    predicate: part_of
    direction: target-to-source
    relation_kind: information
    labels:
      zh: contains RetrievedCandidate
      en: contains RetrievedCandidate
      ja: RetrievedCandidateをcontains
    definitions:
      zh: CandidateSet —contains→ RetrievedCandidate 表示该候选记录是此阶段性集合的明确成员，并在该集合中具有声明顺序。
      en: CandidateSet —contains→ RetrievedCandidate states that the candidate record is an explicit member of this stage-specific set and has its declared order within that set.
      ja: CandidateSet —contains→ RetrievedCandidate はcandidate recordがこのstage-specific setの明示memberでset内orderを持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向读取
        en: inverse contains
        ja: 逆方向読取
    conditions:
      - id: CandidateSet-contains-RetrievedCandidate-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when membership data records both candidate_id and this candidate_set_id.
        explanations:
          zh: 仅当成员表或等价持久事实同时记录 candidate_id 与该 candidate_set_id 时建立。
          en: Assert only when membership data records both candidate_id and this candidate_set_id.
          ja: membership dataがcandidate_idとcandidate_set_idを共に記録する時だけassertします。
        source_claims:
          - claim-candidate-set-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CandidateSet-contains-RetrievedCandidate-example-positive-manual-001
        labels:
          zh: contains RetrievedCandidate正例
          en: "Positive case: contains RetrievedCandidate"
          ja: RetrievedCandidateをcontains正例
        descriptions:
          zh: candidate-set-423 contains candidate-424 at position 3。
          en: candidate-set-423 contains candidate-424 at position 3.
          ja: candidate-set-423がposition 3にcandidate-424を含みます。
        field_values: {}
        related_node_ids:
          - CandidateSet
          - RetrievedCandidate
        related_relation_ids:
          - CandidateSet-contains-RetrievedCandidate
        source_claims:
          - claim-candidate-set-id
      - id: CandidateSet-contains-RetrievedCandidate-example-boundary-manual-001
        labels:
          zh: contains RetrievedCandidate边界例
          en: "Boundary case: contains RetrievedCandidate"
          ja: RetrievedCandidateをcontains境界例
        descriptions:
          zh: 候选仅在另一阶段集合中出现不能建立此边。
          en: Appearance only in another stage's set does not establish this edge.
          ja: 別stage setだけの出現ではこのedgeを成立させません。
        field_values: {}
        related_node_ids:
          - CandidateSet
          - RetrievedCandidate
        related_relation_ids:
          - CandidateSet-contains-RetrievedCandidate
        source_claims:
          - claim-candidate-set-id
    source_claims:
      - claim-candidate-set-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievedCandidate
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/query-data
    source_type: official-doc
    relevance: QueryResponse.
  - id: src-cohere-rerank
    title: Cohere Rerank API
    publisher: Cohere
    url: https://docs.cohere.com/reference/rerank
    source_type: official-doc
    relevance: relevance_score.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-candidate-set-pinecone
    source: src-pinecone-query
    supports: Initial matches form initial-recall CandidateSet.
    locator: matches
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-set-rrf
    source: src-memory-retrieval-design
    supports: RRF output forms post-rrf CandidateSet.
    locator: post-rrf
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-set-cohere
    source: src-cohere-rerank
    supports: Rerank output forms post-rerank CandidateSet.
    locator: rerank
    evidence_kind: primary-api
    confidence: high
  - id: claim-candidate-set-id
    source: src-memory-retrieval-design
    supports: candidate_set_id identifies set.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-set-stage
    source: src-memory-retrieval-design
    supports: stage_name records pipeline position.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-set-count
    source: src-memory-retrieval-design
    supports: member_count records set size.
    locator: structure
    evidence_kind: design-inference
    confidence: high
