      field_values: {}
      related_node_ids:
        - RetrievalResult
        - CandidateSet
      related_relation_ids:
        - RetrievalResult-has_candidate_set-CandidateSet
      expected_result:
        zh: 验证器不得建立该有向关系事实。
        en: Do not assert the directed fact.
        ja: directed factをassertしません。
      why_valid_or_invalid:
        zh: 仅共现、名称相似、反向读取或只满足一个端点不足以建立关系。
