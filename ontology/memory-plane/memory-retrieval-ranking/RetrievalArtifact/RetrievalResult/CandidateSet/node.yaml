schema: moonweave.ai/ontology-node/v1
id: CandidateSet
kind: concept
status: accepted
labels: {zh: 候选集合, en: Candidate set, ja: 候補集合}
semantics:
  short_definition:
    zh: 为一个检索请求发布的一组可追溯候选引用。
    en: A traceable set of candidate references published for one retrieval request.
    ja: 一つの retrieval request に対して publish された traceable な candidate reference の集合。
  definition:
    zh: >-
      CandidateSet 是一种 RetrievalResult，固定在一个请求和检索范围内的一组 RetrievedCandidate 引用及其成员摘要。
      它可以尚未排序，也可以被后续排序活动读取；它不是候选生成活动、单个候选、单个分数、最终上下文包或答案。
    en: >-
      A CandidateSet is a RetrievalResult that fixes a group of RetrievedCandidate references and membership summary
      within one request and retrieval scope. It may be unranked or read by later ranking activity and is not candidate
      generation activity, one candidate, one score, final context package, or answer.
    ja: >-
      CandidateSet は一つの request と retrieval scope 内の RetrievedCandidate reference 群と membership summary を固定する
      RetrievalResult です。unranked でも後続 ranking activity に read されてもよく、candidate generation activity、一つの candidate、
      一つの score、final context package、answer ではありません。
  why_needed:
    zh: 把候选群从生成和排序活动中分离，使同一集合能够被多个评分或融合步骤审计和重用。
    en: Separating the candidate group from generation and ranking activities lets the same set be audited and reused by multiple scoring or fusion steps.
    ja: candidate group を generation と ranking activity から分けることで、同じ set を複数の scoring 又は fusion step で audit・再利用できる。
  includes:
    - zh: 请求引用、检索范围、候选引用清单、成员数量和成员摘要。
      en: Request reference, retrieval scope, candidate-reference manifest, member count, and membership digest.
      ja: request reference、retrieval scope、candidate-reference manifest、member count、membership digest。
  excludes:
    - zh: 运行状态、候选生成方法、单一候选正文、排序分数、最终提示词上下文和模型回答。
      en: Run state, candidate-generation method, single candidate body, ranking score, final prompt context, and model answer.
      ja: run state、candidate-generation method、single candidate body、ranking score、final prompt context、model answer。
  semantic_kind: entity
  aliases: [retrieval candidate list, result candidate group]
engineering:
  explanation:
    zh: 检索阶段把返回文档引用记录为一个候选集合；评分、重排序和融合仅引用该集合而不覆盖其成员清单。
    en: Retrieval records returned document references as one candidate set; scoring, reranking, and fusion reference that set without overwriting its membership manifest.
    ja: retrieval stage は returned document reference を一つの candidate set として記録し、scoring、reranking、fusion は membership manifest を上書きせずその set を参照する。
  typical_input:
    - description: Candidate-set artifact before downstream ranking.
      format: |
        {
          "candidate_set_id": "candidate-set-support-20260719",
          "request_ref": "retrieval-request-support-20260719",
          "retrieval_scope_ref": "scope-support-42",
          "candidate_refs": ["candidate-a", "candidate-b"],
          "member_count": 2,
          "membership_digest": "sha256-candidate-set-support-20260719"
        }
  typical_output:
    - description: Candidate manifest published as the candidate-set specialization of a retrieval result.
      format: |
        {
          "candidate_set_id": "candidate-set-support-20260719",
          "request_ref": "retrieval-request-support-20260719",
          "retrieval_scope_ref": "scope-support-42",
          "candidate_refs": ["candidate-a", "candidate-b"],
          "member_count": 2,
          "membership_digest": "sha256-candidate-set-support-20260719",
          "retrieval_result_id": "retrieval-result-support-20260719",
          "candidate_set_ref": "candidate-set-support-20260719",
          "provenance_ref": "retrieval-run-support-20260719",
          "result_digest": "sha256-result-support-20260719",
          "retrieval_artifact_id": "retrieval-result-support-20260719",
          "artifact_kind": "result",
          "retrieval_scope_id": "scope-support-42"
        }
        # A ranking operation consumes candidate_set_ref and publishes a separate RetrievalResult.
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents retrievers returning documents that can be represented as retrieval candidates.
    - name: BEIR benchmark
      url: https://arxiv.org/abs/2104.08663
      description: Evaluates ranked retrieval results over candidate documents and relevance judgments.
structure:
  identity_keys: [candidate_set_id]
  fields:
    - id: candidate_set_id
      labels: {zh: 候选集合标识, en: candidate set ID, ja: candidate set ID}
      definitions:
        zh: 稳定标识一个已发布候选成员清单，而不是生成或排序该清单的活动。
        en: Stably identifies one published candidate membership manifest rather than the activity that generated or ranked it.
        ja: 生成又は ranking した activity ではなく、一つの published candidate membership manifest を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^candidate-set-[A-Za-z0-9._-]+$'
      example_value: candidate-set-support-20260719
      source_claims: [claim-candidate-set-result]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      definitions:
        zh: 指向候选由其产生边界约束的 RetrievalRequest。
        en: Points to the RetrievalRequest whose boundary constrains candidate production.
        ja: candidate production の boundary を制約する RetrievalRequest を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-request-support-20260719
      source_claims: [claim-candidate-set-result]
    - id: retrieval_scope_ref
      labels: {zh: 检索范围引用, en: retrieval scope reference, ja: retrieval scope 参照}
      definitions:
        zh: 指向本集合成员实际检索的范围，而不是访问授权本身。
        en: Points to the scope in which members were actually retrieved and is not access authorization itself.
        ja: member が実際に retrieval された scope を指し、access authorization 自体ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: scope-support-42
      source_claims: [claim-candidate-set-scope]
    - id: candidate_refs
      labels: {zh: 候选引用清单, en: candidate reference manifest, ja: candidate reference manifest}
      definitions:
        zh: 保持属于此集合的 RetrievedCandidate 引用，不能以原始文本或分数代替候选身份。
        en: Holds RetrievedCandidate references belonging to the set and cannot substitute raw text or scores for candidate identity.
        ja: set に属する RetrievedCandidate reference を保持し、raw text 又は score で candidate identity を置き換えない。
      datatype: array
      required: true
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["candidate-a","candidate-b"]'
      source_claims: [claim-candidate-set-result]
    - id: member_count
      labels: {zh: 成员数量, en: member count, ja: member count}
      definitions:
        zh: 记录候选引用数量，不表示请求的 top-k 配置或某个候选分数。
        en: Records number of candidate references and does not represent request top-k configuration or one candidate score.
        ja: candidate reference 数を記録し、request top-k configuration 又は一つの candidate score を表さない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims: [claim-candidate-set-result]
    - id: membership_digest
      labels: {zh: 成员摘要, en: membership digest, ja: membership digest}
      definitions:
        zh: 用于检测候选成员清单变化的摘要，而不是相关性排名值。
        en: Digest for detecting change in candidate membership manifest rather than relevance ranking value.
        ja: candidate membership manifest の変更を検出する digest であり、relevance ranking value ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-candidate-set-support-20260719
      source_claims: [claim-candidate-set-scope]
    - id: retrieval_result_id
      labels:
        zh: 结果标识
        en: retrieval result ID
        ja: retrieval result ID
      definitions:
        zh: 稳定标识同一候选成员清单作为已发布检索结果，而不是请求、运行、单个候选或上下文包。
        en: Stably identifies the same candidate membership manifest as a published retrieval result rather than a request, run, individual candidate, or context package.
        ja: 同じ candidate membership manifest を公開済み retrieval result として安定識別し、request、run、個別 candidate、context package ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-result-[A-Za-z0-9._-]+$'
      example_value: retrieval-result-candidate-set-support-20260719
      source_claims: [claim-candidate-set-result]
    - id: candidate_set_ref
      labels:
        zh: 候选集合引用
        en: candidate set reference
        ja: candidate set 参照
      definitions:
        zh: 指向构成本结果的候选成员清单；对 CandidateSet 子类，该引用明确标识本记录自身的清单身份。
        en: Points to the candidate membership manifest constituting this result; for CandidateSet, the reference explicitly identifies this record's own manifest identity.
        ja: この result を構成する candidate membership manifest を指す。CandidateSet では、この参照はこの record 自身の manifest identity を明示する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-set-support-20260719
      source_claims: [claim-candidate-set-result]
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: provenance 参照
      definitions:
        zh: 指向发布该候选集合的候选生成、检索运行或排序活动，而不证明模型已使用该集合。
        en: Points to the candidate-generation, retrieval-run, or ranking activity that published this set and is not proof that a model used it.
        ja: この set を公開した candidate-generation、retrieval-run、ranking activity を指し、model が使用した証明ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-generation-support-20260719
      source_claims: [claim-candidate-set-provenance]
    - id: result_digest
      labels:
        zh: 结果摘要
        en: result digest
        ja: result digest
      definitions:
        zh: 验证候选成员引用和结果排序摘要的完整性；对集合结果，它覆盖同一成员清单而非单个候选分数。
        en: Verifies integrity of candidate references and result ordering summary; for a set result it covers the same membership manifest rather than one candidate score.
        ja: candidate reference と result ordering summary の完全性を検証する。set result では一つの candidate score ではなく同じ membership manifest を対象にする。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-result-candidate-set-support-20260719
      source_claims: [claim-candidate-set-provenance]
    - id: retrieval_artifact_id
      labels:
        zh: 检索工件标识
        en: retrieval artifact ID
        ja: retrieval artifact ID
      definitions:
        zh: 稳定标识同一候选集合结果作为检索 I/O 工件，不复用为活动、索引或模型响应标识。
        en: Stably identifies the same candidate-set result as a retrieval I/O artifact and is not reused as an activity, index, or model-response ID.
        ja: 同じ candidate-set result を retrieval I/O artifact として安定識別し、activity、index、model-response ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:retrieval-request|retrieval-result|candidate|retrieval-trace)-[A-Za-z0-9._-]+$'
      example_value: retrieval-result-candidate-set-support-20260719
      source_claims: [claim-candidate-set-result]
    - id: artifact_kind
      labels:
        zh: 工件种类
        en: artifact kind
        ja: artifact kind
      definitions:
        zh: 将本记录声明为 result 工件；候选成员清单不是活动、单个候选或评分方法。
        en: Declares this record to be a result artifact; its candidate manifest is not an activity, individual candidate, or scoring method.
        ja: この record を result artifact として宣言する。candidate manifest は activity、個別 candidate、scoring method ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [request, result, candidate, trace]
      pattern: null
      example_value: result
      source_claims: [claim-candidate-set-result]
    - id: retrieval_scope_id
      labels:
        zh: 检索范围标识
        en: retrieval scope ID
        ja: retrieval scope ID
      definitions:
        zh: 标识发布该候选成员清单的检索范围，不等同于授权或某个候选的来源所有者。
        en: Identifies the retrieval scope in which this candidate membership manifest was published and is not authorization or a candidate's source owner.
        ja: この candidate membership manifest が公開された retrieval scope を識別し、authorization や candidate の source owner ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^scope-[A-Za-z0-9._-]+$'
      example_value: scope-support-20260719
      source_claims: [claim-candidate-set-scope]
  constraints:
    - id: candidate-set-inherits-result-and-artifact-fields
      severity: error
      expression_language: plain
      expression: CandidateSet is one RetrievalResult and RetrievalArtifact record. candidate_set_id, retrieval_result_id, and retrieval_artifact_id must resolve to the same manifest; candidate_set_ref must identify that manifest; membership_digest and result_digest must cover the same candidate_refs; artifact_kind must be result; retrieval_scope_id must resolve to retrieval_scope_ref; and provenance_ref must identify the publishing activity.
      explanation:
        zh: 候选集合是带成员清单种差的检索结果和检索工件；集合字段细化同一对象，显式自引用只标明该对象的结果形态，不创建第二个父记录。
        en: A candidate set is a retrieval result and retrieval artifact with a membership-manifest differentia; its set fields refine one object, and the explicit self-manifest reference identifies that result form without creating a second parent record.
        ja: CandidateSet は membership-manifest という differentia を持つ RetrievalResult かつ RetrievalArtifact である。set field は一つの object を細化し、明示的 self-manifest 参照は第2の親 record を作らず result form を識別する。
      source_claims: [claim-candidate-set-result, claim-candidate-set-provenance]
    - id: candidate-set-membership-integrity
      severity: error
      expression_language: plain
      expression: member_count must equal the number of candidate_refs and membership_digest must describe that same manifest. Every referenced candidate must be traceable to request_ref and retrieval_scope_ref.
      explanation:
        zh: 成员数量、清单、摘要、请求和范围必须一致，防止不同请求或范围的候选被拼接。
        en: Count, manifest, digest, request, and scope must agree to prevent candidates from different requests or scopes from being spliced together.
        ja: count、manifest、digest、request、scope は一致しなければならず、異なる request 又は scope の candidate を splice しない。
      source_claims: [claim-candidate-set-result, claim-candidate-set-scope]
    - id: candidate-set-entity-boundary
      severity: error
      expression_language: plain
      expression: CandidateSet must not contain activity lifecycle fields, a scoring algorithm, per-candidate score values, context-package order, answer text, or memory-write outcome.
      explanation:
        zh: 候选集合表达成员身份；执行、评分、上下文选择和写入是独立事实。
        en: A candidate set expresses membership; execution, scoring, context selection, and writes are separate facts.
        ja: candidate set は membership を表し、execution、scoring、context selection、write は別の fact である。
      source_claims: [claim-candidate-set-provenance]
  required_relations: []
examples:
  - id: candidate-set-positive

    labels: {zh: 两个可追溯候选, en: Two traceable candidates, ja: 二つの traceable candidate}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values: {candidate_set_id: candidate-set-support-20260719, request_ref: retrieval-request-support-20260719, retrieval_scope_ref: scope-support-42, candidate_refs: '["candidate-a","candidate-b"]', member_count: 2, membership_digest: sha256-candidate-set-support-20260719, retrieval_result_id: retrieval-result-support-20260719, candidate_set_ref: candidate-set-support-20260719, provenance_ref: retrieval-run-support-20260719, result_digest: sha256-result-support-20260719, retrieval_artifact_id: retrieval-result-support-20260719, artifact_kind: result, retrieval_scope_id: scope-support-42}
    related_node_ids: [CandidateSet, RetrievedCandidate, RetrievalResult]
    related_relation_ids: [CandidateSet-is_a-RetrievalResult]

    source_claims: [claim-candidate-set-result]
  - id: candidate-set-counterexample-mixed-scope

    labels: {zh: 混合范围候选, en: Mixed-scope candidates, ja: mixed-scope candidate}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values: {candidate_set_id: candidate-set-mixed-1, request_ref: retrieval-request-support-20260719, retrieval_scope_ref: scope-support-42, candidate_refs: '["candidate-tenant42","candidate-tenant99"]', member_count: 2, membership_digest: sha256-candidate-set-mixed-1}
    related_node_ids: [CandidateSet, RetrievalRequest, RetrievedCandidate]
    related_relation_ids: [CandidateSet-is_a-RetrievalResult]

    source_claims: [claim-candidate-set-scope]
  - id: candidate-set-boundary-empty

    labels: {zh: 零成员集合, en: Zero-member set, ja: zero-member set}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values: {candidate_set_id: candidate-set-empty-20260719, request_ref: retrieval-request-empty-20260719, retrieval_scope_ref: scope-empty-42, candidate_refs: '[]', member_count: 0, membership_digest: sha256-candidate-set-empty-20260719}
    related_node_ids: [CandidateSet, RetrievalResult]
    related_relation_ids: [CandidateSet-is_a-RetrievalResult]

    source_claims: [claim-candidate-set-result]
  - id: candidate-set-instance-retriever

    labels: {zh: 实例：retriever 文档集合, en: "Instance: retriever document set", ja: "事例: retriever document set"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values: {candidate_set_id: candidate-set-retriever-42, request_ref: retrieval-request-retriever-42, retrieval_scope_ref: scope-retriever-42, candidate_refs: '["candidate-doc-1","candidate-doc-2"]', member_count: 2, membership_digest: sha256-candidate-set-retriever-42, retrieval_result_id: retrieval-result-retriever-42, candidate_set_ref: candidate-set-retriever-42, provenance_ref: retrieval-run-retriever-42, result_digest: sha256-result-retriever-42, retrieval_artifact_id: retrieval-result-retriever-42, artifact_kind: result, retrieval_scope_id: scope-retriever-42}
    related_node_ids: [CandidateSet, RetrievalActivity, RerankActivity]
    related_relation_ids: [CandidateSet-is_a-RetrievalResult]
    source_claims: [claim-candidate-set-result]
parent_relation:
  id: CandidateSet-is_a-RetrievalResult
  predicate: is_a
  target: concept:RetrievalResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是检索结果的候选集合子类, en: is a candidate-set subtype of retrieval result, ja: RetrievalResult の candidate-set 下位型である}
  definitions:
    zh: CandidateSet 是以候选成员清单为种差的 RetrievalResult。
    en: A CandidateSet is a RetrievalResult whose differentia is a candidate membership manifest.
    ja: CandidateSet は candidate membership manifest を differentia とする RetrievalResult である。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个请求、运行或排序阶段可发布多少个集合版本。
    en: Classification does not prescribe how many set versions a request, run, or ranking stage may publish.
    ja: 分類関係は request、run、ranking stage が publish できる set version 数を規定しない。
  inverse_reading: {predicate: has_candidate_set_subtype, labels: {zh: 具有候选集合子类, en: has candidate-set subtype, ja: candidate-set 下位型を持つ}}
  conditions:
    - id: candidate-set-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert only when a retrieval result fixes a candidate-reference manifest, scope, count, and digest; one candidate, a score, and an activity do not satisfy this subtype.
      explanation:
        zh: 子类种差是完整候选成员清单及其边界。
        en: The subtype differentia is the complete candidate membership manifest and its boundary.
        ja: subtype の differentia は完全な candidate membership manifest とその boundary である。
      source_claims: [claim-candidate-set-result]
  temporal_scope: valid-time
  boundary_context: A later reranked result may reference the set but does not retroactively mutate its membership.
  constraints: []
  examples: []
  source_claims: [claim-candidate-set-result]
  distinct_fact_rationale: This relation classifies a result form and does not state candidate generation, ranking, or context inclusion.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Documents retrieval of documents for a query that may serve as candidate outputs.
  - id: beir-paper
    title: "BEIR: A Heterogeneous Benchmark for Zero-shot Evaluation of Information Retrieval Models"
    source_type: academic-paper
    url: https://arxiv.org/abs/2104.08663
    relevance: Describes information-retrieval result sets and ranking evaluation across datasets.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
