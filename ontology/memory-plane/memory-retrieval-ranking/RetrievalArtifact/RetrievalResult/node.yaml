schema: moonweave.ai/ontology-node/v1
id: RetrievalResult
kind: concept
status: accepted
labels:
  zh: 检索结果
  en: Retrieval result
  ja: 検索結果
semantics:
  short_definition:
    zh: 一次检索运行完成后封装候选集合、最终保留候选和完成状态的结果产物。
    en: A result artifact that packages the candidate set, retained candidates, and completion state after one retrieval run.
    ja: 一retrieval run完了後にcandidate set・retained candidate・completion stateをまとめるresult artifactです。
  definition:
    zh: RetrievalResult 是 RetrievalRun 产生的完成态信息产物，拥有一个 CandidateSet 并明确包含本次结果返回的 RetrievedCandidate；它不等同于某个候选、运行本身或下游 ContextPackage。
    en: RetrievalResult is the completion-state information artifact produced by a RetrievalRun. It owns one CandidateSet and explicitly contains the RetrievedCandidate records returned by this result; it is not a candidate, the run itself, or a downstream ContextPackage.
    ja: RetrievalResult はRetrievalRunが生成するcompletion-state information artifactで一CandidateSetを所有し返却RetrievedCandidateを明示的に含みます。candidate・run自体・downstream ContextPackageではありません。
  why_needed:
    zh: 给一次运行提供稳定结果边界，使中间候选与最终返回集合可区分。
    en: Gives one run a stable result boundary so intermediate candidates and the returned set remain distinguishable.
    ja: 一runにstable result boundaryを与えintermediate candidateとreturned setを区別します。
  includes:
    - zh: 纳入已完成或明确终止的检索运行所形成的候选集合快照与返回候选成员。
      en: Includes the candidate-set snapshot and returned candidate members formed by a completed or explicitly terminated retrieval run.
      ja: 完了または明示終了retrieval runが形成したcandidate-set snapshotとreturned candidate memberを含みます。
  excludes:
    - zh: 排除运行中的阶段、单个分数、未经封装的中间列表和上下文包。
      en: Excludes executing stages, individual scores, unwrapped intermediate lists, and context packages.
      ja: 実行中stage・個別score・未包装intermediate list・context packageを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - result_id
  fields:
    - id: result_id
      labels:
        zh: 结果标识
        en: result ID
        ja: result ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次运行产生的检索结果。
        en: Stable identifier for the retrieval result produced by one run.
        ja: 一runが生成したretrieval resultを安定識別します。
      allowed_values: []
      pattern: null
      example_value: retrieval-result-422
      source_claims:
        - claim-retrieval-result-002
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: request ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录结果所履行的原始检索请求。
        en: Records the original retrieval request fulfilled by the result.
        ja: resultが履行したoriginal retrieval requestを記録します。
      allowed_values: []
      pattern: null
      example_value: retrieval-request-419
      source_claims:
        - claim-retrieval-result-003
    - id: returned_count
      labels:
        zh: 返回数量
        en: returned count
        ja: 返却数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本结果明确包含的候选数量。
        en: Number of candidate records explicitly contained in this result.
        ja: このresultが明示的に含むcandidate record数です。
      allowed_values: []
      pattern: null
      example_value: 12
      source_claims:
        - claim-retrieval-result-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RetrievalResult-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索结果正例
      en: "Positive case: Retrieval result"
      ja: 検索結果正例
    scenario_id: null
    descriptions:
      zh: result-422 封装 candidate-set-422，并明确返回其中排名前 12 的候选记录。
      en: result-422 packages candidate-set-422 and explicitly returns its first 12 candidate records.
      ja: result-422 はcandidate-set-422をまとめ上位12 candidate recordを明示返却します。
    field_values:
      result_id: retrieval-result-422
      request_id: retrieval-request-419
      returned_count: 12
      artifact_id: retrieval-result-422
      created_at: 2026-07-16T12:06:00Z
    related_node_ids:
      - RetrievalResult
    related_relation_ids: []
    expected_result:
      zh: 归类为 RetrievalResult。
      en: Classify the object as RetrievalResult.
      ja: RetrievalResult として分類します。
    why_valid_or_invalid:
      zh: 它具有独立结果身份、所属请求和明确成员边界。
      en: It has independent result identity, request lineage, and an explicit membership boundary.
      ja: 独立result identity・request lineage・明示membership boundaryがあります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-result-005
  - id: RetrievalResult-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索结果边界例
      en: "Boundary case: Retrieval result"
      ja: 検索結果境界例
    scenario_id: null
    descriptions:
      zh: candidate-422 是结果中的一个候选，而不是整个结果封装。
      en: candidate-422 is one candidate in the result, not the result envelope.
      ja: candidate-422 はresult内の一candidateでresult envelope全体ではありません。
    field_values: {}
    related_node_ids:
      - RetrievalResult
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 RetrievalResult。
      en: Do not classify the object as RetrievalResult.
      ja: RetrievalResult として分類しません。
    why_valid_or_invalid:
      zh: 成员身份与集合结果身份不能合并。
      en: Member identity and collection-result identity must not be conflated.
      ja: member identityとcollection-result identityを統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retrieval-result-006
