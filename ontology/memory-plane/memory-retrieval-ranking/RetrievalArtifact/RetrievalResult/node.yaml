schema: moonweave.ai/ontology-node/v1
id: RetrievalResult
kind: concept
labels:
  zh: 检索结果
  en: Retrieval result
  ja: 検索結果
semantics:
  short_definition:
    zh: 一次运行完成后的结果封装。
    en: Post-run envelope of retrieval output.
    ja: run 完了後の結果 envelope。
  definition:
    zh: RetrievalResult 是 RetrievalRun 产生的完成态产物，拥有 CandidateSet 并明确包含返回的 RetrievedCandidate；映射 Pinecone QueryResponse、Chroma QueryResult 与 Mem0 search 响应的整体结果边界，但不等于 ContextPackage 或单个候选。
    en: RetrievalResult is the completion artifact from a RetrievalRun, owning a CandidateSet and explicitly containing returned RetrievedCandidate records. It maps the overall result boundary of Pinecone QueryResponse, Chroma QueryResult, and Mem0 search responses but is not a ContextPackage or a single candidate.
    ja: RetrievalResult は RetrievalRun 完了 artifact。CandidateSet と Returned RetrievedCandidate を含む。Pinecone QueryResponse/Chroma QueryResult/Mem0 响应 envelope。ContextPackage/単 candidate ではない。
  why_needed:
    zh: 需要区分“检索返回了哪些文档”与“最终 prompt 采用了哪些文档”；RetrievalResult 只回答前者。
    en: Teams must distinguish documents returned by retrieval from documents admitted to the final prompt; RetrievalResult answers only the former.
    ja: retrieval 返却 document と prompt 採用 document を分離。RetrievalResult は前者のみ。
  includes:
    - zh: 纳入已完成 run 形成的候选集合快照与返回成员。
      en: Includes candidate-set snapshot and returned members from a completed run.
      ja: 完了 run の candidate set snapshot/returned member。
  excludes:
    - zh: 排除运行中阶段、单分数与 ContextPackage。
      en: Excludes in-flight stages, individual scores, and ContextPackage.
      ja: 実行中 stage/単 score/ContextPackage を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone QueryResponse.matches[]、Chroma QueryResult ids/documents/distances、Mem0 search 返回数组均封装进 RetrievalResult；context_admission_asserted 必须为 false。
    en: Pinecone QueryResponse.matches[], Chroma QueryResult ids/documents/distances, and Mem0 search arrays envelope into RetrievalResult; context_admission_asserted must be false.
    ja: QueryResponse/QueryResult/Mem0 响应→RetrievalResult。context_admission_asserted=false。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Mem0 Search API
      url: https://docs.mem0.ai
      description: POST /v1/memories/search/
    - name: Pinecone Query
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: index.query / QueryResponse
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: collection.query / QueryResult
    - name: Cohere Rerank API
      url: https://docs.cohere.com/reference/rerank
      description: POST /v2/rerank
    - name: ColBERT
      url: https://arxiv.org/abs/2004.12832
      description: MaxSim scoring
structure:
  identity_keys:
    - result_id
  fields:
    - id: result_id
      labels:
        zh: 结果标识
        en: Result identifier
        ja: result 識別子
      definitions:
        zh: 稳定标识一次 run 的检索结果。
        en: Stable identifier for one run retrieval result.
        ja: 一 run retrieval result を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: result-422
      allowed_values: []
      source_claims:
        - claim-retrieval-result-id
    - id: request_id
      labels:
        zh: 请求标识
        en: Request identifier
        ja: request 識別子
      definitions:
        zh: 结果所履行的 RetrievalRequest。
        en: RetrievalRequest fulfilled by this result.
        ja: 履行 RetrievalRequest。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: request-419
      allowed_values: []
      source_claims:
        - claim-retrieval-result-request
    - id: returned_count
      labels:
        zh: 返回数量
        en: Returned count
        ja: 返却数
      definitions:
        zh: 本结果明确包含的 RetrievedCandidate 数量。
        en: Count of RetrievedCandidate records explicitly in this result.
        ja: 含む RetrievedCandidate 数。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 12
      allowed_values: []
      source_claims:
        - claim-retrieval-result-count
  constraints:
    - id: result-not-context-admission
      severity: warning
      expression_language: plain
      expression: RetrievalResult must not assert ContextPackage admission.
      explanation:
        zh: 检索返回不等于模型看见的 prompt。
        en: Retrieval return is not the prompt the model sees.
        ja: retrieval 返却≠model prompt。
      source_claims:
        - claim-retrieval-result-not-context
  required_relations: []
examples:
  - id: RetrievalResult-example-pinecone
    labels:
      zh: Pinecone QueryResponse
      en: Pinecone QueryResponse
      ja: Pinecone QueryResponse
    descriptions:
      zh: result-422 封装 Pinecone QueryResponse 的 12 条 matches 为 RetrievedCandidate，request_id=request-419。
      en: result-422 envelopes 12 Pinecone QueryResponse matches as RetrievedCandidate with request_id=request-419.
      ja: result-422 が QueryResponse matches を封装。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/semantic-search
      version: QueryResponse
    field_values:
      result_id: result-422
      request_id: request-419
      returned_count: 12
    related_node_ids:
      - RetrievalResult
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieval-result-pinecone
  - id: RetrievalResult-example-chroma
    labels:
      zh: Chroma QueryResult
      en: Chroma QueryResult
      ja: Chroma QueryResult
    descriptions:
      zh: result-423 映射 Chroma QueryResult ids/documents/distances，returned_count=5。
      en: result-423 maps Chroma QueryResult ids/documents/distances, returned_count=5.
      ja: result-423 Chroma QueryResult 映射。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      version: QueryResult
    field_values:
      result_id: result-423
      returned_count: 5
    related_node_ids:
      - RetrievalResult
    related_relation_ids: []
    source_claims:
      - claim-retrieval-result-chroma
  - id: RetrievalResult-example-not-candidate
    labels:
      zh: 结果非单候选
      en: Result is not one candidate
      ja: result は単 candidate ではない
    descriptions:
      zh: candidate-424 是 result-422 的成员，不是 RetrievalResult 本身。
      en: candidate-424 is a member of result-422, not the RetrievalResult envelope.
      ja: candidate-424 は member で envelope ではない。
    example_source:
      product: https://moonweave.ai/ontology/agent-system/2.0.0/
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - RetrievalResult
      - RetrievedCandidate
    related_relation_ids: []
    source_claims:
      - claim-retrieval-result-boundary
parent_relation:
  id: RetrievalResult-is_a-RetrievalArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种RetrievalArtifact
    en: is a RetrievalArtifact
    ja: RetrievalArtifactの一種
  definitions:
    zh: RetrievalResult —is_a→ RetrievalArtifact 成立，因为它是运行完成后封装候选集合与返回候选的稳定结果记录。
    en: RetrievalResult —is_a→ RetrievalArtifact holds because it is the stable post-run record packaging a candidate set and returned candidates.
    ja: RetrievalResult —is_a→ RetrievalArtifact はrun後にcandidate setとreturned candidateをまとめるstable result recordであるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: RetrievalResult-is_a-RetrievalArtifact-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the stable post-run record packaging a candidate set and returned candidates."
      explanations:
        zh: 仅当实例既满足 RetrievalArtifact 的完整定义，又满足子类种差“它是运行完成后封装候选集合与返回候选的稳定结果记录。”时建立该边。
        en: "Assert only when the instance satisfies the complete RetrievalArtifact definition and the child differentia: it is the stable post-run record packaging a candidate set and returned candidates."
        ja: instanceがRetrievalArtifact完全定義とchild differentia「run後にcandidate setとreturned candidateをまとめるstable result recordである」を共に満たす時だけassertします。
      source_claims:
        - claim-retrieval-result-id
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RetrievalResult-is_a-RetrievalArtifact-example-positive-manual-001
      labels:
        zh: 是一种RetrievalArtifact正例
        en: "Positive case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種正例
      descriptions:
        zh: result-422 包含 candidate-set-423 与 12 个返回候选。
        en: result-422 contains candidate-set-423 and 12 returned candidates.
        ja: result-422がcandidate-set-423と12 returned candidateを含みます。
      field_values: {}
      related_node_ids:
        - RetrievalResult
        - RetrievalArtifact
      related_relation_ids:
        - RetrievalResult-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieval-result-id
    - id: RetrievalResult-is_a-RetrievalArtifact-example-boundary-manual-001
      labels:
        zh: 是一种RetrievalArtifact边界例
        en: "Boundary case: is a RetrievalArtifact"
        ja: RetrievalArtifactの一種境界例
      descriptions:
        zh: candidate-424 只是结果成员，不是结果封装。
        en: candidate-424 is only a result member, not the result envelope.
        ja: candidate-424はresult memberでresult envelopeではありません。
      field_values: {}
      related_node_ids:
        - RetrievalResult
        - RetrievalArtifact
      related_relation_ids:
        - RetrievalResult-is_a-RetrievalArtifact
      source_claims:
        - claim-retrieval-result-id
  source_claims:
    - claim-retrieval-result-id
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: RetrievalResult-contains-RetrievedCandidate
    predicate: part_of
    direction: target-to-source
    relation_kind: information
    labels:
      zh: contains RetrievedCandidate
      en: contains RetrievedCandidate
      ja: RetrievedCandidateをcontains
    definitions:
      zh: RetrievalResult —contains→ RetrievedCandidate 表示该候选是此结果明确返回的成员，而不只是某个中间阶段的候选。
      en: RetrievalResult —contains→ RetrievedCandidate states that the candidate is an explicitly returned member of this result rather than merely an intermediate-stage candidate.
      ja: RetrievalResult —contains→ RetrievedCandidate はcandidateがintermediate-stageだけでなくこのresultの明示returned memberです。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no universal runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で一律runtime cardinalityを課しません。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向读取
        en: inverse contains
        ja: 逆方向読取
    conditions:
      - id: RetrievalResult-contains-RetrievedCandidate-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when result membership lists candidate_id and the returned_count boundary includes it.
        explanations:
          zh: 仅当 result membership 明确列出 candidate_id 且 returned_count 边界包含它时建立。
          en: Assert only when result membership lists candidate_id and the returned_count boundary includes it.
          ja: result membershipがcandidate_idを列挙しreturned_count boundaryが含む時だけassertします。
        source_claims:
          - claim-retrieval-result-id
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RetrievalResult-contains-RetrievedCandidate-example-positive-manual-001
        labels:
          zh: contains RetrievedCandidate正例
          en: "Positive case: contains RetrievedCandidate"
          ja: RetrievedCandidateをcontains正例
        descriptions:
          zh: result-422 contains candidate-424。
          en: result-422 contains candidate-424.
          ja: result-422がcandidate-424を含みます。
        field_values: {}
        related_node_ids:
          - RetrievalResult
          - RetrievedCandidate
        related_relation_ids:
          - RetrievalResult-contains-RetrievedCandidate
        source_claims:
          - claim-retrieval-result-id
      - id: RetrievalResult-contains-RetrievedCandidate-example-boundary-manual-001
        labels:
          zh: contains RetrievedCandidate边界例
          en: "Boundary case: contains RetrievedCandidate"
          ja: RetrievedCandidateをcontains境界例
        descriptions:
          zh: 初始召回但被重排淘汰的候选不属于最终结果成员。
          en: An initially recalled candidate removed by reranking is not a final-result member.
          ja: initial recall後rerankで除外されたcandidateはfinal-result memberではありません。
        field_values: {}
        related_node_ids:
          - RetrievalResult
          - RetrievedCandidate
        related_relation_ids:
          - RetrievalResult-contains-RetrievedCandidate
        source_claims:
          - claim-retrieval-result-id
    source_claims:
      - claim-retrieval-result-id
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:RetrievedCandidate
sources:
  - id: src-pinecone-query
    title: Pinecone Query Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: QueryResponse.
  - id: src-chroma-query
    title: Chroma Query Documentation
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: QueryResult.
  - id: src-memory-retrieval-design
    title: Moonweave design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Module boundary.
source_claims:
  - id: claim-retrieval-result-pinecone
    source: src-pinecone-query
    supports: QueryResponse maps to RetrievalResult envelope.
    locator: QueryResponse
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-result-chroma
    source: src-chroma-query
    supports: QueryResult maps to RetrievalResult envelope.
    locator: QueryResult
    evidence_kind: primary-api
    confidence: high
  - id: claim-retrieval-result-boundary
    source: src-memory-retrieval-design
    supports: Single candidates are not results.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-result-not-context
    source: src-memory-retrieval-design
    supports: Results must not assert context admission.
    locator: constraint
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-result-id
    source: src-memory-retrieval-design
    supports: result_id identifies result.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-result-request
    source: src-memory-retrieval-design
    supports: request_id links result to request.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-retrieval-result-count
    source: src-memory-retrieval-design
    supports: returned_count records membership size.
    locator: structure
    evidence_kind: design-inference
    confidence: high
