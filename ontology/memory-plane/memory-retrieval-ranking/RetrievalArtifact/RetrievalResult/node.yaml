schema: moonweave.ai/ontology-node/v1
id: RetrievalResult
kind: concept
status: accepted
labels: {zh: 检索结果, en: Retrieval result, ja: 検索結果}
semantics:
  short_definition:
    zh: 对一个检索请求发布的、可独立引用的候选结果工件。
    en: An independently referable candidate-output artifact published for one retrieval request.
    ja: 一つの retrieval request に対して publish された、独立して参照可能な candidate-output artifact。
  definition:
    zh: >-
      RetrievalResult 是一次 RetrievalRun 或 RankingOperation 发布的检索输出工件，引用其请求、候选集合和可追溯来源。
      它可为空结果，但不能包含运行中的状态、执行时间、重排序过程、模型上下文选择、回答文本或持久化写入事实。
    en: >-
      A RetrievalResult is a retrieval-output artifact published by a RetrievalRun or RankingOperation and references its
      request, candidate set, and traceable provenance. It may represent an empty result but cannot contain running state,
      execution timing, reranking process, model-context selection, answer text, or persistence-write fact.
    ja: >-
      RetrievalResult は RetrievalRun 又は RankingOperation が publish する retrieval-output artifact で、request、candidate set、
      traceable provenance を参照します。empty result を表せますが、running state、execution timing、reranking process、model-context
      selection、answer text、persistence-write fact を含めません。
  why_needed:
    zh: 将可重用的读取输出与生成它的活动分离，能够在后续重排序、上下文装配或审计中保留相同结果身份。
    en: Separating reusable read output from its generating activity preserves the same result identity for reranking, context assembly, and audit.
    ja: 再利用可能な read output を generating activity から分けることで、reranking、context assembly、audit で同じ result identity を保持できる。
  includes:
    - zh: 指向一个请求、候选集合、结果摘要和生成来源的已发布结果记录。
      en: A published result record pointing to one request, candidate set, result digest, and generating provenance.
      ja: 一つの request、candidate set、result digest、generating provenance を指す published result record。
  excludes:
    - zh: 检索运行本身、单个候选评分过程、模型输入上下文、最终回答和记忆写入操作。
      en: The retrieval run itself, one candidate-scoring process, model input context, final answer, and memory-write operation.
      ja: retrieval run 自体、一つの candidate-scoring process、model input context、final answer、memory-write operation。
  semantic_kind: entity
  aliases: [search result, retrieval output, candidate result]
engineering:
  explanation:
    zh: 检索器调用返回文档或候选数据；工程实现应把输出封装为独立结果工件，并将运行时间和执行状态保留在 RetrievalRun。
    en: Retriever calls return documents or candidate data; implementation wraps that output as a separate result artifact while retaining timing and execution status in RetrievalRun.
    ja: retriever call は document 又は candidate data を返す。implementation は output を別の result artifact として wrap し、timing と execution status は RetrievalRun に保持する。
  typical_input:
    - description: Published result envelope after retrieval and optional ranking.
      format: |
        {
          "retrieval_result_id": "retrieval-result-support-20260719",
          "request_ref": "retrieval-request-support-20260719",
          "candidate_set_ref": "candidate-set-support-20260719",
          "provenance_ref": "retrieval-run-support-20260719",
          "result_digest": "sha256-result-support-20260719"
        }
  typical_output:
    - description: Immutable result artifact published after a retriever has returned a bounded candidate set.
      format: |
        {
          "retrieval_result_id": "retrieval-result-support-20260719",
          "request_ref": "retrieval-request-support-20260719",
          "candidate_set_ref": "candidate-set-support-20260719",
          "provenance_ref": "retrieval-run-support-20260719",
          "result_digest": "sha256-result-support-20260719",
          "retrieval_artifact_id": "retrieval-result-support-20260719",
          "artifact_kind": "result",
          "retrieval_scope_id": "scope-support-20260719"
        }
        # A context assembler consumes this artifact by reference; it does not mutate the result.
  reference_implementations:
    - name: LangChain retrieval
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents retrievers that return documents for use in a retrieval-augmented workflow.
    - name: BEIR benchmark
      url: https://arxiv.org/abs/2104.08663
      description: Defines information-retrieval evaluation around ranked retrieval results and relevance judgments.
structure:
  identity_keys: [retrieval_result_id]
  fields:
    - id: retrieval_result_id
      labels: {zh: 结果标识, en: retrieval result ID, ja: retrieval result ID}
      definitions:
        zh: 稳定标识一个已发布结果工件，而不是请求、运行、候选或上下文包。
        en: Stably identifies one published result artifact rather than a request, run, candidate, or context package.
        ja: request、run、candidate、context package ではなく、一つの published result artifact を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^retrieval-result-[A-Za-z0-9._-]+$'
      example_value: retrieval-result-support-20260719
      source_claims: [claim-retrieval-result-artifact]
    - id: request_ref
      labels: {zh: 请求引用, en: request reference, ja: request 参照}
      definitions:
        zh: 指向形成此结果的 RetrievalRequest，而不以该引用复制请求的输入字段。
        en: Points to the RetrievalRequest for which this result was formed and does not duplicate request input fields.
        ja: この result が形成された RetrievalRequest を指し、request input field を複製しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-request-support-20260719
      source_claims: [claim-retrieval-result-artifact]
    - id: candidate_set_ref
      labels: {zh: 候选集合引用, en: candidate set reference, ja: candidate set 参照}
      definitions:
        zh: 指向构成本次结果的候选集合，不能将候选内容和分数混写成结果元数据。
        en: Points to the candidate set that constitutes this result and does not mix candidate content and scores into result metadata.
        ja: この result を構成する candidate set を指し、candidate content と score を result metadata に混在させない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: candidate-set-support-20260719
      source_claims: [claim-retrieval-result-output]
    - id: provenance_ref
      labels: {zh: 来源引用, en: provenance reference, ja: provenance 参照}
      definitions:
        zh: 指向生成该结果的运行或排序活动记录，不等同于结果被模型使用的证明。
        en: Points to the run or ranking activity that generated this result and is not proof that a model used the result.
        ja: この result を生成した run 又は ranking activity を指し、model が result を使用した証明ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: retrieval-run-support-20260719
      source_claims: [claim-retrieval-result-provenance]
    - id: result_digest
      labels: {zh: 结果摘要, en: result digest, ja: result digest}
      definitions:
        zh: 标识候选引用和排序摘要的完整性，而非一个候选的相关性分数。
        en: Identifies integrity of candidate references and ordering summary rather than relevance score of one candidate.
        ja: candidate reference と ordering summary の integrity を示し、一つの candidate の relevance score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-result-support-20260719
      source_claims: [claim-retrieval-result-provenance]
    - id: retrieval_artifact_id
      labels:
        zh: 检索工件标识
        en: retrieval artifact ID
        ja: retrieval artifact ID
      definitions:
        zh: 稳定标识同一已发布候选输出作为检索 I/O 工件，不复用为活动、索引或模型响应标识。
        en: Stably identifies the same published candidate output as a retrieval I/O artifact and is not reused as an activity, index, or model-response ID.
        ja: 同じ公開済み candidate output を retrieval I/O artifact として安定識別し、activity、index、model-response ID として再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:retrieval-request|retrieval-result|candidate|retrieval-trace)-[A-Za-z0-9._-]+$'
      example_value: retrieval-result-support-20260719
      source_claims: [claim-retrieval-result-artifact]
    - id: artifact_kind
      labels:
        zh: 工件种类
        en: artifact kind
        ja: artifact kind
      definitions:
        zh: 将本记录声明为 result 工件，不以种类掩盖运行状态、评分方法或模型上下文事实。
        en: Declares this record to be a result artifact and does not use kind to conceal run state, scoring method, or model-context facts.
        ja: この record を result artifact として宣言し、kind で run state、scoring method、model-context fact を隠さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [request, result, candidate, trace]
      pattern: null
      example_value: result
      source_claims: [claim-retrieval-result-artifact]
    - id: retrieval_scope_id
      labels:
        zh: 检索范围标识
        en: retrieval scope ID
        ja: retrieval scope ID
      definitions:
        zh: 标识产生该结果的请求、租户、索引版本或运行边界所限定的检索范围，不是权限授权。
        en: Identifies the retrieval scope bounded by the request, tenant, index revision, or run that produced this result and is not an authorization grant.
        ja: この result を生成した request、tenant、index revision、run が限定する retrieval scope を識別し、authorization grant ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^scope-[A-Za-z0-9._-]+$'
      example_value: scope-support-20260719
      source_claims: [claim-retrieval-result-provenance]
  constraints:
    - id: retrieval-result-inherits-retrieval-artifact-fields
      severity: error
      expression_language: plain
      expression: RetrievalResult is one RetrievalArtifact record. retrieval_artifact_id and retrieval_result_id must resolve to the same published output; artifact_kind must be result; retrieval_scope_id must match the scope of request_ref and candidate_set_ref; and provenance_ref remains the same activity provenance rather than a second parent artifact.
      explanation:
        zh: 检索结果是检索工件的真实特化；结果身份、范围和候选输出在同一对象上满足父契约，不能另建父工件。
        en: A retrieval result is a real retrieval-artifact specialization; its result identity, scope, and candidate output satisfy the parent contract on one object and cannot create another parent artifact.
        ja: RetrievalResult は真の RetrievalArtifact 特殊化であり、result identity、scope、candidate output は一つの object 上で親契約を満たす。別の親 artifact を作ってはならない。
      source_claims: [claim-retrieval-result-artifact, claim-retrieval-result-provenance]
    - id: retrieval-result-request-candidate-provenance
      severity: error
      expression_language: plain
      expression: retrieval_result_id, request_ref, candidate_set_ref, provenance_ref, and result_digest are required. candidate_set_ref must resolve to candidates produced for request_ref under the cited provenance.
      explanation:
        zh: 一个结果必须能回链到请求、候选集合和产生来源，避免跨请求拼接候选。
        en: A result must trace back to its request, candidate set, and generating provenance to avoid cross-request candidate mixing.
        ja: result は request、candidate set、generating provenance に trace できなければならず、cross-request candidate mixing を避ける。
      source_claims: [claim-retrieval-result-output, claim-retrieval-result-provenance]
    - id: retrieval-result-entity-boundary
      severity: error
      expression_language: plain
      expression: A RetrievalResult must not contain activity lifecycle fields, query text, per-candidate score computation, model context selection, answer text, or memory-write status.
      explanation:
        zh: 结果是读取输出工件；执行、评分、上下文和写入分别属于其他活动或工件。
        en: A result is a read-output artifact; execution, scoring, context, and writes belong to other activities or artifacts.
        ja: result は read-output artifact であり、execution、scoring、context、write は他の activity 又は artifact に属する。
      source_claims: [claim-retrieval-result-provenance]
  required_relations: []
examples:
  - id: retrieval-result-positive

    labels: {zh: 已发布候选结果, en: Published candidate result, ja: published candidate result}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values: {retrieval_result_id: retrieval-result-support-20260719, request_ref: retrieval-request-support-20260719, candidate_set_ref: candidate-set-support-20260719, provenance_ref: retrieval-run-support-20260719, result_digest: sha256-result-support-20260719, retrieval_artifact_id: retrieval-result-support-20260719, artifact_kind: result, retrieval_scope_id: scope-support-20260719}
    related_node_ids: [RetrievalResult, RetrievalRequest, CandidateSet, RetrievalRun]
    related_relation_ids: [RetrievalResult-is_a-RetrievalArtifact]

    source_claims: [claim-retrieval-result-output]
  - id: retrieval-result-counterexample-running

    labels: {zh: 运行状态不是结果, en: Running state is not result, ja: running state は result ではない}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values: {retrieval_result_id: retrieval-result-running-1, request_ref: retrieval-request-support-20260719, candidate_set_ref: candidate-set-pending, provenance_ref: retrieval-run-support-20260719, result_digest: sha256-pending}
    related_node_ids: [RetrievalResult, RetrievalRun]
    related_relation_ids: [RetrievalResult-is_a-RetrievalArtifact]

    source_claims: [claim-retrieval-result-provenance]
  - id: retrieval-result-boundary-empty

    labels: {zh: 空候选结果, en: Empty candidate result, ja: empty candidate result}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values: {retrieval_result_id: retrieval-result-empty-20260719, request_ref: retrieval-request-empty-20260719, candidate_set_ref: candidate-set-empty-20260719, provenance_ref: retrieval-run-empty-20260719, result_digest: sha256-result-empty-20260719}
    related_node_ids: [RetrievalResult, CandidateSet, RetrievalRun]
    related_relation_ids: [RetrievalResult-is_a-RetrievalArtifact]

    source_claims: [claim-retrieval-result-output]
  - id: retrieval-result-instance-langchain

    labels: {zh: 实例：检索器返回文档, en: "Instance: retriever-returned documents", ja: "事例: retriever が返す document"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values: {retrieval_result_id: retrieval-result-langchain-42, request_ref: retrieval-request-langchain-42, candidate_set_ref: candidate-set-langchain-42, provenance_ref: retrieval-run-langchain-42, result_digest: sha256-result-langchain-42, retrieval_artifact_id: retrieval-result-langchain-42, artifact_kind: result, retrieval_scope_id: scope-langchain-42}
    related_node_ids: [RetrievalResult, CandidateSet, RetrievalActivity]
    related_relation_ids: [RetrievalResult-is_a-RetrievalArtifact]
    source_claims: [claim-retrieval-result-output]
parent_relation:
  id: RetrievalResult-is_a-RetrievalArtifact
  predicate: is_a
  target: concept:RetrievalArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是检索产物的结果子类, en: is a result subtype of retrieval artifact, ja: RetrievalArtifact の result 下位型である}
  definitions:
    zh: RetrievalResult 是承载候选输出与来源引用的 RetrievalArtifact 子类。
    en: A RetrievalResult is a RetrievalArtifact subtype that carries candidate output and provenance reference.
    ja: RetrievalResult は candidate output と provenance reference を保持する RetrievalArtifact の下位型である。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个请求或运行可产生多少个版本化结果工件。
    en: Classification does not prescribe how many versioned result artifacts a request or run may produce.
    ja: 分類関係は request 又は run が生成できる versioned result artifact 数を規定しない。
  inverse_reading: {predicate: has_retrieval_result_subtype, labels: {zh: 具有检索结果子类, en: has retrieval-result subtype, ja: retrieval-result 下位型を持つ}}
  conditions:
    - id: retrieval-result-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert only when an artifact represents published candidate output with request and provenance references; activity state, ranking execution, and answer text do not satisfy this subtype.
      explanation:
        zh: 子类种差是可引用的候选输出及其来源，而非执行过程。
        en: The subtype differentia is referable candidate output with provenance rather than execution process.
        ja: subtype の differentia は execution process ではなく、provenance を持つ referable candidate output である。
      source_claims: [claim-retrieval-result-artifact]
  temporal_scope: valid-time
  boundary_context: A result can be regenerated for the same request without merging distinct run provenance.
  constraints: []
  examples: []
  source_claims: [claim-retrieval-result-artifact]
  distinct_fact_rationale: This relation classifies a retrieval output artifact and does not state how it was scored, consumed, or persisted.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    relevance: Documents retrievers that return documents for a query in a RAG workflow.
  - id: beir-paper
    title: "BEIR: A Heterogeneous Benchmark for Zero-shot Evaluation of Information Retrieval Models"
    source_type: academic-paper
    url: https://arxiv.org/abs/2104.08663
    relevance: Describes ranked retrieval results and relevance evaluation across information-retrieval tasks.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines Activity and Entity distinctions and generation provenance relations.
source_claims:
  - id: claim-retrieval-result-output
    source: langchain-retrieval
    supports: LangChain documents retrievers returning documents for a query. Moonweave models those returned candidates as a separately referable RetrievalResult rather than the retrieval call itself.
    locator: "Retrieval: retrievers and returned documents"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-result-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities that generate or use them. Moonweave keeps a result artifact and its generating run provenance separate from lifecycle state and downstream model use.
    locator: "PROV-O: Entity, Activity, and wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-result-artifact
    source: beir-paper
    supports: BEIR evaluates ranked retrieval outputs against relevance judgments. Moonweave infers RetrievalResult as a result-artifact subtype that can carry a candidate-set reference without conflating it with ranking execution.
    locator: "Abstract and benchmark task definition"
    evidence_kind: ontology-design-inference
    confidence: medium
