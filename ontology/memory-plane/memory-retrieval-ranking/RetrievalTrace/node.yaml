schema: moonweave.ai/ontology-node/v1
id: RetrievalTrace
kind: concept
status: accepted
labels:
  zh: 检索追踪记录
  en: Retrieval Trace
  ja: 検索トレース記録
semantics:
  short_definition:
    zh: 由一次 RetrievalRun 生成、记录其阶段级输入摘要、输出摘要、状态和时序的可审计信息实体。
    en: An auditable information entity generated by one RetrievalRun that records stage-level input summary, output summary, status, and timing.
    ja: 一回の RetrievalRun により生成され、段階別 input summary、output summary、status、timing を記録する監査可能な情報 entity。
  definition:
    zh: >
      RetrievalTrace 是一次已执行 RetrievalRun 的诊断和审计记录。它将请求引用、每个检索或排序阶段的结构化摘要、
      时延、状态、错误或截断事实绑定到该运行，以便调试、评估和重放时检查发生了什么。它不是执行检索的活动、
      不是 RetrievalResult 或 CandidateSet，也不是将完整原始查询、机密内容或候选正文无条件复制到日志中的数据转储。
    en: >
      RetrievalTrace is a diagnostic and audit record for one executed RetrievalRun. It binds request reference,
      structured summaries of each retrieval or ranking stage, latency, status, error, or truncation facts to that
      run so debugging, evaluation, and replay can inspect what occurred. It is not the activity that executes
      retrieval, not a RetrievalResult or CandidateSet, and not a data dump that unconditionally copies full raw
      query, confidential content, or candidate bodies into logs.
    ja: >
      RetrievalTrace は一回の実行済み RetrievalRun の診断・監査記録です。request reference、各 retrieval または
      ranking stage の構造化 summary、latency、status、error、truncation fact をその run に結び付け、debugging、
      evaluation、replay が発生内容を検査できるようにします。retrieval を実行する activity、RetrievalResult、
      CandidateSet ではなく、完全な raw query、機密内容、candidate body を無条件に log へ複製する data dump でもありません。
  why_needed:
    zh: 检索失败、候选不足和排序变化必须能关联到具体执行与阶段，而不能仅依赖最终答案或全局指标。
    en: Retrieval failure, candidate shortage, and ranking change must be attributable to a concrete execution and stage rather than inferred only from a final answer or global metric.
    ja: retrieval failure、candidate shortage、ranking change は、final answer や global metric だけから推論せず、具体的 execution と stage に帰属させなければなりません。
  includes:
    - zh: 运行与请求引用、阶段标识和摘要、状态、计时、错误或截断事实、可选的隐私处理状态。
      en: Run and request references, stage identifiers and summaries, status, timings, error or truncation facts, and optional privacy-treatment status.
      ja: run と request reference、stage identifier と summary、status、timing、error または truncation fact、任意の privacy-treatment status。
  excludes:
    - zh: RetrievalRun 本身、最终候选集、原始受限内容、无关联运行的指标汇总，以及没有运行引用的通用日志。
      en: RetrievalRun itself, final candidate set, raw restricted content, aggregate metrics unlinked to a run, and a generic log with no run reference.
      ja: RetrievalRun 自体、final candidate set、raw restricted content、run と結び付かない aggregate metric、run reference のない generic log。
  semantic_kind: information
  aliases: [retrieval execution trace, retrieval diagnostic record, 检索诊断日志]
engineering:
  explanation:
    zh: OpenTelemetry 将一次操作建模为含根 span 和子 span 的 trace。Moonweave 采用“运行产生追踪实体”的审计边界，并对检索阶段保留结构化摘要而不是把追踪当作运行本身。
    en: OpenTelemetry models an operation as a trace with a root span and optional sub-spans. Moonweave adopts the audit boundary of a run producing a trace entity and retains structured retrieval-stage summaries instead of treating trace as the run itself.
    ja: OpenTelemetry は operation を root span と任意の sub-span を持つ trace としてモデル化します。Moonweave は run が trace entity を生成する audit boundary を採用し、trace を run 自体と扱わず構造化 retrieval-stage summary を保持します。
  typical_input:
    - description: Completed retrieval-run facts
      format: |
        {
          "retrieval_run_ref": "retrieval-run-18",
          "request_ref": "retrieval-request-support-18",
          "stage_records": [
            {"stage": "candidate_generation", "status": "completed", "latency_ms": 24, "candidate_count": 50},
            {"stage": "rerank", "status": "completed", "latency_ms": 43, "candidate_count": 10}
          ]
        }
  typical_output:
    - description: Retrieval trace record
      format: |
        {
          "retrieval_trace_id": "retrieval-trace-18",
          "retrieval_run_ref": "retrieval-run-18",
          "outcome_status": "completed",
          "started_at": "2026-07-19T01:00:00Z",
          "ended_at": "2026-07-19T01:00:00.067Z",
          "privacy_treatment": "identifiers-and-counts-only"
        }
  reference_implementations:
    - name: OpenTelemetry Trace API
      url: https://opentelemetry.io/docs/specs/otel/trace/api/
      description: Documents traces containing a root span and optional sub-spans for an operation and its sub-operations.
structure:
  identity_keys: [retrieval_trace_id]
  fields:
    - id: retrieval_trace_id
      labels: {zh: 检索追踪标识, en: retrieval trace ID, ja: 検索トレース ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一个针对具体检索运行生成的追踪实体，不能复用为运行、请求或结果标识。
        en: Identifies one trace entity generated for a concrete retrieval run and is not reused as run, request, or result ID.
        ja: 具体的 retrieval run のために生成された一つの trace entity を識別し、run、request、result ID として再利用しません。
      allowed_values: []
      pattern: "^retrieval-trace-[A-Za-z0-9._-]+$"
      example_value: retrieval-trace-18
      source_claims: [claim-retrieval-trace-otel]
    - id: retrieval_run_ref
      labels: {zh: 检索运行引用, en: retrieval run reference, ja: 検索 run 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向实际生成该追踪的 RetrievalRun，不能由相同查询或相同索引位置推断。
        en: Points to the RetrievalRun that actually generated this trace and cannot be inferred from a same query or same index location.
        ja: この trace を実際に生成した RetrievalRun を指し、同じ query や同じ index location から推論することはできません。
      allowed_values: []
      pattern: "^retrieval-run-[A-Za-z0-9._-]+$"
      example_value: retrieval-run-18
      source_claims: [claim-retrieval-trace-provenance]
    - id: request_ref
      labels: {zh: 检索请求引用, en: retrieval request reference, ja: 検索 request 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向该运行消费的 RetrievalRequest，以便将追踪绑定到具体输入契约而非仅文本主题。
        en: Points to RetrievalRequest consumed by the run, binding the trace to concrete input contract rather than only text topic.
        ja: run が消費した RetrievalRequest を指し、trace を text topic だけでなく具体的 input contract に結び付けます。
      allowed_values: []
      pattern: "^retrieval-request-[A-Za-z0-9._-]+$"
      example_value: retrieval-request-support-18
      source_claims: [claim-retrieval-trace-provenance]
    - id: stage_records
      labels: {zh: 阶段记录, en: stage records, ja: ステージ記録}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 按执行顺序记录每个阶段的名称、状态、时延和经许可的计数或摘要，而非无条件记录原始正文。
        en: Records each stage's name, status, latency, and permitted counts or summary in execution order rather than unconditionally recording raw bodies.
        ja: raw body を無条件に記録せず、execution order で各 stage の名前、status、latency、許可済み count または summary を記録します。
      allowed_values: []
      pattern: null
      example_value: [{stage: candidate_generation, status: completed, latency_ms: 24, candidate_count: 50}]
      source_claims: [claim-retrieval-trace-otel]
    - id: outcome_status
      labels: {zh: 追踪结果状态, en: trace outcome status, ja: トレース結果 status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示运行在生成此追踪时完成、失败、取消或部分完成，不等同于检索内容的相关性。
        en: Indicates whether the run completed, failed, was cancelled, or partially completed when this trace was generated and is not content relevance.
        ja: trace 生成時に run が completed、failed、cancelled、partially completed のどれかを示し、内容 relevance ではありません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-retrieval-trace-otel]
    - id: started_at
      labels: {zh: 开始时间, en: started at, ja: 開始時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录该追踪覆盖的运行观察开始时间。
        en: Records start of run observation covered by this trace.
        ja: この trace が対象とする run observation の開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00Z"
      source_claims: [claim-retrieval-trace-otel]
    - id: ended_at
      labels: {zh: 结束时间, en: ended at, ja: 終了時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录运行观察结束或失败被记录的时间，必须不早于 started_at。
        en: Records when run observation ended or failure was recorded and must not precede started_at.
        ja: run observation が終了した時刻または failure が記録された時刻を示し、started_at より前にはできません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00.067Z"
      source_claims: [claim-retrieval-trace-otel]
    - id: privacy_treatment
      labels: {zh: 隐私处理方式, en: privacy treatment, ja: プライバシー処理}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 说明追踪保留标识与计数、已脱敏摘要或受限负载，不能隐含原始内容可访问。
        en: States whether the trace retains identifiers and counts, redacted summaries, or restricted payload and cannot imply raw-content access.
        ja: trace が identifier と count、redacted summary、restricted payload のどれを保持するかを示し、raw-content access を暗示しません。
      allowed_values: [identifiers-and-counts-only, redacted-summary, restricted-payload]
      pattern: null
      example_value: identifiers-and-counts-only
      source_claims: [claim-retrieval-trace-boundary]
  constraints:
    - id: retrieval-trace-run-provenance
      severity: error
      expression_language: plain
      expression: retrieval_run_ref, request_ref, non-empty stage_records, outcome_status, started_at, ended_at, and privacy_treatment are required. ended_at must not precede started_at, and retrieval_run_ref must identify the run that generated the trace.
      explanation:
        zh: 没有具体运行和阶段时序的通用日志无法解释一次检索执行，也不能被误标为追踪。
        en: A generic log with no concrete run and stage timing cannot explain one retrieval execution and must not be mislabeled as a trace.
        ja: 具体的 run と stage timing のない generic log は一回の retrieval execution を説明できず、trace と誤標記してはいけません。
      source_claims: [claim-retrieval-trace-provenance, claim-retrieval-trace-otel]
    - id: retrieval-trace-not-result-or-dump
      severity: error
      expression_language: plain
      expression: RetrievalTrace must not substitute for RetrievalResult, CandidateSet, or content authorization. Stage records must honor privacy_treatment and cannot require unrestricted storage of raw query, candidate body, or source text.
      explanation:
        zh: 诊断记录支持检查执行，不会改变结果语义或绕过数据访问限制。
        en: A diagnostic record supports execution inspection but does not change result semantics or bypass data-access restrictions.
        ja: 診断記録は execution inspection を支援しますが、result semantics を変えたり data-access restriction を回避したりしません。
      source_claims: [claim-retrieval-trace-boundary]
  required_relations: []
examples:
  - id: retrieval-trace-example-positive

    labels: {zh: 有阶段摘要的检索追踪, en: Retrieval trace with stage summaries, ja: ステージ summary を持つ検索トレース}

    descriptions:
      zh: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z)；HyDE 假设文档 embedding；RAPTOR 树检索；Self-RAG [Retrieve] adaptive；Generative Agents score=α·recency+β·importance+γ·relevance。
      en: Lewis RAG p(y|x)=Σ_z p(z|x)·p(y|x,z); HyDE hypothetical doc embedding; RAPTOR tree retrieval; Self-RAG [Retrieve] adaptive; Generative Agents score=α·recency+β·importance+γ·relevance.
      ja: Lewis RAG p(y|x,z)。HyDE 仮説 doc embedding。RAPTOR tree retrieval。Self-RAG [Retrieve]。Generative Agents score 公式。
    field_values:
      retrieval_trace_id: retrieval-trace-18
      retrieval_run_ref: retrieval-run-18
      request_ref: retrieval-request-support-18
      stage_records: [{stage: candidate_generation, status: completed, latency_ms: 24, candidate_count: 50}, {stage: rerank, status: completed, latency_ms: 43, candidate_count: 10}]
      outcome_status: completed
      started_at: "2026-07-19T01:00:00Z"
      ended_at: "2026-07-19T01:00:00.067Z"
      privacy_treatment: identifiers-and-counts-only
    related_node_ids: [RetrievalTrace, RetrievalRun, RetrievalRequest]
    related_relation_ids: [RetrievalTrace-was-generated-by-RetrievalRun]

    source_claims: [claim-retrieval-trace-otel, claim-retrieval-trace-provenance]
  - id: retrieval-trace-example-counterexample-run-itself

    labels: {zh: 将运行本身误作追踪, en: Run itself mistaken for trace, ja: trace と取り違えた run 自体}

    descriptions:
      zh: 反例：RetrievalResult 候选无 TopKSelection/token budget 直接全量进 ContextPackage。
      en: Counterexample: RetrievalResult candidates enter ContextPackage without TopKSelection/token budget.
      ja: 反例：RetrievalResult candidate が TopKSelection/token budget なしで ContextPackage 全量進入。
    field_values:
      retrieval_run_ref: retrieval-run-18
      retrieval_trace_id: null
      stage_records: []
      outcome_status: completed
    related_node_ids: [RetrievalTrace, RetrievalRun]
    related_relation_ids: []

    source_claims: [claim-retrieval-trace-provenance]
  - id: retrieval-trace-example-boundary-metric

    labels: {zh: 无运行引用的聚合指标, en: Aggregate metric without run reference, ja: run reference のない aggregate metric}

    descriptions:
      zh: IndexBuildRun 离线索引 vs RetrievalRun 在线查询；RAG-Sequence vs RAG-Token 变体边界。
      en: IndexBuildRun offline index vs RetrievalRun online query; RAG-Sequence vs RAG-Token variant boundary.
      ja: IndexBuildRun offline vs RetrievalRun online。RAG-Sequence vs RAG-Token 境界。
    field_values:
      metric_id: daily-p95
      aggregation_window: 2026-07-19
      retrieval_run_ref: null
      stage_records: null
    related_node_ids: [RetrievalTrace]
    related_relation_ids: []

    source_claims: [claim-retrieval-trace-otel]
  - id: retrieval-trace-example-instance-failed

    labels: {zh: 实例：失败的重排阶段, en: "Instance: failed rerank stage", ja: "事例：失敗した rerank stage"}

    descriptions:
      zh: pgvector ORDER BY embedding <=> query LIMIT 20；Anthropic Contextual Retrieval top-20 + rerank → top-5 context。
      en: pgvector ORDER BY embedding <=> query LIMIT 20; Anthropic Contextual Retrieval top-20 + rerank → top-5 context.
      ja: pgvector <=> LIMIT 20。Anthropic Contextual Retrieval top-20+rerank→top-5 context。
    field_values:
      retrieval_trace_id: retrieval-trace-19
      retrieval_run_ref: retrieval-run-19
      request_ref: retrieval-request-support-19
      stage_records: [{stage: candidate_generation, status: completed, latency_ms: 20, candidate_count: 50}, {stage: rerank, status: timed_out, latency_ms: 5000, candidate_count: null}]
      outcome_status: failed
      started_at: "2026-07-19T02:00:00Z"
      ended_at: "2026-07-19T02:00:05Z"
      privacy_treatment: redacted-summary
    related_node_ids: [RetrievalTrace, RetrievalRun, RerankActivity]
    related_relation_ids: [RetrievalTrace-was-generated-by-RetrievalRun]
    source_claims: [claim-retrieval-trace-otel, claim-retrieval-trace-boundary]
parent_relation: null
relations:
  - id: RetrievalTrace-was-generated-by-RetrievalRun
    predicate: was_generated_by
    target: concept:RetrievalRun
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由检索运行生成
      en: is generated by retrieval run
      ja: 検索 run により生成される
    definitions:
      zh: 仅当目标 RetrievalRun 实际执行并发出带有该追踪标识的记录时，RetrievalTrace 由其生成。
      en: A RetrievalTrace is generated by target RetrievalRun only when that run actually executed and emitted the record with this trace identifier.
      ja: 対象 RetrievalRun が実際に実行され、この trace identifier を持つ record を発行した場合にだけ、RetrievalTrace はそれにより生成されます。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates_retrieval_trace
      labels: {zh: 生成检索追踪, en: generates retrieval trace, ja: 検索トレースを生成する}
    conditions:
      - id: retrieval-trace-generation-run-match
        severity: error
        expression_language: plain
        expression: Assert only when retrieval_run_ref identifies the target run, request_ref matches that run's request, and started_at and ended_at fall within or immediately after the run's recorded execution interval.
        explanation:
          zh: 同一查询、索引或指标标签不能替代实际运行的生成证据。
          en: Same query, index, or metric label cannot substitute for generation evidence from the actual run.
          ja: 同じ query、index、metric label は、実際の run による generation evidence の代わりにはなりません。
        source_claims: [claim-retrieval-trace-provenance]
    temporal_scope: valid-time
    boundary_context: "The causal relation records a run generating a trace entity; it is neither a hierarchy edge nor a claim that the trace executed retrieval."
    constraints: []
    examples: []
    source_claims: [claim-retrieval-trace-provenance]
    distinct_fact_rationale: "This relation states version-specific trace generation, not subtype membership, retrieval-result production, or access to raw content."
    layout_role: cross-link
sources:
  - id: opentelemetry-trace-api
    title: OpenTelemetry Trace API
    source_type: official-project-documentation
    url: https://opentelemetry.io/docs/specs/otel/trace/api/
    relevance: Documents a trace containing a root span for an operation and optional spans for its sub-operations.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes entities from activities and documents activity generation of an entity.
source_claims:
  - id: claim-retrieval-trace-otel
    source: opentelemetry-trace-api
    supports: OpenTelemetry documents a trace containing a root span for an operation and optional sub-spans for sub-operations. Moonweave maps retrieval-stage summaries and timings into an auditable trace record.
    locator: "Tracing API: trace and root span"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-trace-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from an Activity and defines entity generation by an activity. Moonweave represents RetrievalTrace as a record generated by RetrievalRun rather than as a subtype of the run.
    locator: "PROV-O: Entity, Activity, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-retrieval-trace-boundary
    source: opentelemetry-trace-api
    supports: Trace structure supports observability of operations and sub-operations. Moonweave's privacy treatment, refusal to treat trace as result, and content-redaction boundary are local design constraints.
    locator: "Tracing API: trace and span data model"
    evidence_kind: ontology-design-inference
    confidence: medium
