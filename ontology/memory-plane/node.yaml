source_claims:
  - id: claim-memory-plane-001
    source: eng-fw-langchain-agents
    supports: LangChain Agents distinguishes thread-scoped checkpoint history from per-run context and documents context management through summarization, persistent memory, skills, and prompt caching. This directly supports persistent memory and context assembly as concerns separate from one invocation. The source does not define Moonweave's full ingestion, chunking, embedding, indexing, retrieval/ranking, consolidation, expiry, or validation hierarchy; those are ontology design inferences informed by additional memory sources.
    locator: Agents > Invocation > thread_id and runtime context; Configure the harness > Context management; Memory
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-plane-002
    source: lit-agent-agemem
    supports: AgeMem integrates long-term and short-term memory management into the agent policy and exposes storing, retrieving, updating, summarizing, and discarding information as tool-based actions trained through progressive reinforcement learning. This supports giving memory lifecycle actions explicit, traceable identities instead of assuming an opaque store. AgeMem does not define Moonweave's complete ingestion, chunking, embedding, index, ranking, context-assembly, provenance, expiry, or safety-control hierarchy; that wider memory-plane closure remains a reviewed ontology design.
    locator: Paper > Abstract; Method > tool-based memory operations and three-stage progressive reinforcement learning
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-plane-003
    source: eng-fw-langchain-agents
    supports: LangChain agent documentation separates runtime context, thread-scoped invocation, context management, and memory. Moonweave uses those distinctions for scoped persistence, later retrieval, and active-context assembly.
    locator: Agents > Invocation > thread_id and runtime context; Configure the harness > Context management; Memory
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-plane-004
    source: eng-fw-langchain-agents
    supports: LangChain distinguishes per-invocation runtime context from memory, supporting the rule that one current instruction does not become a persistent memory without an explicit write and scope.
    locator: Agents > Invocation > runtime context; Memory
    evidence_kind: design-inference
    confidence: high
    review_status: pending
