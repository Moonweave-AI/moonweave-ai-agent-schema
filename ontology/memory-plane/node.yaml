schema: moonweave.ai/ontology-node/v1
id: memory-plane
kind: domain
status: accepted
labels:
  zh: 智能体记忆领域
  en: Agent Memory Domain
  ja: エージェント記憶ドメイン
semantics:
  short_definition:
    zh: 管理智能体如何跨模型调用保存、检索、组装和处置可追溯信息的领域。
    en: The domain for persisting, retrieving, assembling, and retiring traceable information across agent model calls.
    ja: エージェントのモデル呼び出しをまたいで、追跡可能な情報を永続化、検索、組み立て、廃棄するためのドメイン。
  definition:
    zh: >-
      智能体记忆领域规定持久信息在智能体系统中的工程边界和生命周期：从可摄取内容、会话历史或已确认事实形成可寻址记录，
      经由作用域受限的存储、分块和表示、索引或查询、候选选择与模型调用前的上下文装配而被再次使用，并在更新、压缩、保留或删除时保持来源和边界。
      它涵盖线程范围的已持久状态和跨线程的长期记录，但不把尚未被持久化的单次推理输入、运行时控制状态或任务计划称作记忆。
    en: >-
      The Agent Memory Domain defines the engineering boundary and lifecycle for durable information in an agent system:
      ingestible content, session history, or confirmed facts become addressable records; scoped storage, chunking and representation,
      indexing or querying, candidate selection, and pre-call context assembly make them reusable; and updates, compaction, retention,
      or deletion preserve provenance and scope. It includes persisted thread-scoped state and cross-thread durable records, but does not
      call an unpersisted one-call inference input, runtime control state, or a task plan “memory.”
    ja: >-
      エージェント記憶ドメインは、エージェントシステムにおける永続情報の工学的な境界とライフサイクルを定めます。取り込み可能な内容、
      セッション履歴、または確認済みの事実はアドレス可能な記録となり、スコープ付きの保存、分割と表現、索引または照会、候補選択、
      モデル呼び出し前のコンテキスト組み立てによって再利用されます。更新、圧縮、保持、削除でも来歴とスコープを保ちます。
      永続化済みのスレッド範囲状態とスレッド横断の記録は含みますが、一回の推論だけの未永続化入力、ランタイム制御状態、タスク計画は記憶ではありません。
  why_needed:
    zh: >-
      模型调用本身不会自动区分“这轮对话暂时可见的内容”和“以后应当安全复用的记录”。明确该边界后，工程师可以让会话连续、
      让用户偏好跨会话生效，并在检索到过期或冲突的信息时知道应更新、压缩还是删除，而不是把所有消息无差别塞入上下文或向量库。
    en: >-
      A model call does not by itself distinguish what is temporarily visible this turn from what may safely be reused later.
      An explicit boundary lets engineers continue sessions, apply user preferences across sessions, and decide whether stale or conflicting
      information should be updated, compacted, or deleted instead of indiscriminately placing every message in context or a vector store.
    ja: >-
      モデル呼び出しだけでは、このターンだけ見える内容と、後で安全に再利用できる記録は区別されません。明示的な境界があれば、
      セッションを継続し、ユーザー設定をセッション横断で適用し、古いまたは矛盾する情報を更新、圧縮、削除すべきか判断できます。
      すべてのメッセージを無差別にコンテキストまたはベクトルストアへ入れる必要はありません。
  includes:
    - zh: 具有作用域、标识、来源和保留规则的持久记录、会话历史、检查点与跨会话存储。
      en: Durable records, session history, checkpoints, and cross-session stores with explicit scope, identity, provenance, and retention rules.
      ja: スコープ、識別子、来歴、保持規則が明示された永続記録、セッション履歴、チェックポイント、セッション横断ストア。
    - zh: 将可摄取内容变为可定位记忆工件的摄取、规范化、分块、表示、索引和查询处理。
      en: Ingestion, normalization, chunking, representation, indexing, and query processing that turn ingestible content into locatable memory artifacts.
      ja: 取り込み可能な内容を位置特定できる記憶アーティファクトにする取り込み、正規化、分割、表現、索引、照会処理。
    - zh: 检索候选、排序、上下文选择与压缩，以及记录的更新、冲突处置、过期和删除。
      en: Retrieval candidates, ranking, context selection and compaction, plus record update, conflict handling, expiration, and deletion.
      ja: 検索候補、順位付け、コンテキスト選択と圧縮、および記録の更新、競合処理、期限切れ、削除。
  excludes:
    - zh: 尚未写入持久介质的单次模型调用输入输出和令牌窗口；它们属于运行时调用，直到被明确保存或装配为记忆工件。
      en: One-call model inputs, outputs, and token-window contents that have not been persisted; they are runtime-call data until explicitly saved or assembled from memory artifacts.
      ja: まだ永続化されていない一回のモデル呼び出しの入力、出力、トークンウィンドウ内容。明示的に保存されるか記憶アーティファクトから組み立てられるまではランタイム呼び出しのデータです。
    - zh: 执行调度、工具调用权限和目标分解；它们可以读写记忆，但其规范边界分别属于运行时、工具和编排领域。
      en: Execution scheduling, tool-call authorization, and goal decomposition; they may read or write memory, but their normative boundaries belong to runtime, tool, and orchestration domains.
      ja: 実行スケジューリング、ツール呼び出し認可、目標分解。これらは記憶を読み書きできますが、規範的な境界はランタイム、ツール、編成ドメインに属します。
    - zh: 未经证据确认而直接从模型内部参数推定出的“记忆”；本体只描述可观察、可治理的外部记录和处理。
      en: “Memories” inferred directly from opaque model parameters without evidence; this ontology describes only observable, governable external records and processing.
      ja: 証拠なしに不透明なモデルパラメータから直接推定した「記憶」。このオントロジーは観測可能で統治可能な外部記録と処理だけを記述します。
  semantic_kind: domain
  aliases: [agent memory, persistent agent memory]
engineering:
  explanation:
    zh: >-
      该领域不规定统一的内存数据库或单一 API，而是规定可互操作的边界。LangGraph 的 checkpointer 持久化单个线程的图状态，
      Store 保存跨线程的应用数据；OpenAI Agents SDK 的 Session 在运行前取回同一会话的历史，并在运行后保存新增项目；
      Letta 将持久状态和可编辑 memory blocks 与上下文窗口联系起来。项目实现应把这些具体接口映射到显式作用域、记录来源、
      检索选择和保留处置，而不能把供应商的对象名称当成通用本体类型。
    en: >-
      This domain does not prescribe one database or API; it makes integration boundaries interoperable. LangGraph checkpointers persist
      graph state for one thread while Stores persist application data across threads. OpenAI Agents SDK Sessions retrieve a session’s
      history before a run and store the new items afterward. Letta connects persisted state and editable memory blocks to the context window.
      An implementation maps those concrete interfaces to explicit scope, record provenance, retrieval selection, and retention disposition;
      it must not treat a vendor object name as a universal ontology type.
    ja: >-
      このドメインは一つのデータベースや API を規定せず、統合境界を相互運用可能にします。LangGraph の checkpointer は一つのスレッドの
      グラフ状態を永続化し、Store はスレッド横断のアプリケーションデータを保存します。OpenAI Agents SDK の Session は実行前に
      セッション履歴を取得し、実行後に新しい項目を保存します。Letta は永続状態と編集可能な memory block をコンテキストウィンドウに結び付けます。
      実装はこれらの具体的なインターフェースを明示的なスコープ、記録来歴、検索選択、保持処置に対応付け、製品固有の名前を汎用型として扱いません。
  typical_input:
    - description: LangGraph-style thread invocation carrying an explicit thread identifier for checkpoint-scoped state.
      format: |
        {
          "messages": [{"role": "user", "content": "Remember my preferred language is Python."}],
          "configurable": {"thread_id": "thread-42"}
        }
    - description: Session-memory write shape corresponding to the OpenAI Agents SDK Session item operations.
      format: |
        {
          "session_id": "conversation_123",
          "new_items": [{"role": "user", "content": "Use Python examples."}]
        }
  typical_output:
    - description: A scoped, provenance-bearing record selected for a subsequent model-input assembly.
      format: |
        {
          "scope": {"kind": "user", "id": "user-42"},
          "retrieved_records": [{"record_id": "mem-pref-17", "source": "conversation_123", "status": "active"}],
          "model_input_additions": ["The user prefers Python examples."]
        }
  reference_implementations:
    - name: LangGraph Persistence
      url: https://docs.langchain.com/oss/python/langgraph/persistence
      description: Documents checkpointers for thread-scoped graph state and Stores for cross-thread application data.
    - name: OpenAI Agents SDK Sessions
      url: https://openai.github.io/openai-agents-python/sessions/
      description: Documents retrieval and persistence of a session’s conversation items before and after agent runs.
    - name: Letta Stateful Agents
      url: https://docs.letta.com/guides/core-concepts/stateful-agents
      description: Documents persisted agent state, editable memory blocks, stored messages, and context-window use.
structure:
  identity_keys: [domain_id]
  fields:
    - id: domain_id
      labels:
        zh: 领域标识
        en: Domain ID
        ja: ドメイン ID
      definitions:
        zh: 稳定标识此记忆领域，不标识一个存储、一次检索或一条具体记忆记录。
        en: Stably identifies this memory domain, not one store, retrieval, or individual memory record.
        ja: この記憶ドメインを安定して識別し、一つのストア、検索、個別記憶記録を識別するものではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]*$'
      example_value: memory-plane
      allowed_values: [memory-plane]
      source_claims: [claim-memory-domain-boundary]
    - id: managed_concerns
      labels:
        zh: 管理范围
        en: Managed concerns
        ja: 管理対象
      definitions:
        zh: 此领域负责的能力边界清单，用于区分存储、摄取、表示、检索、上下文和生命周期工作。
        en: The capability boundaries owned by this domain, distinguishing storage, ingestion, representation, retrieval, context, and lifecycle work.
        ja: 保存、取り込み、表現、検索、コンテキスト、ライフサイクルの作業を区別する、このドメインが担う能力境界の一覧。
      datatype: string[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '["memory-stores-scopes", "memory-ingestion", "memory-retrieval-ranking"]'
      allowed_values: []
      source_claims: [claim-memory-domain-boundary]
    - id: persistence_boundary
      labels:
        zh: 持久化边界
        en: Persistence boundary
        ja: 永続化境界
      definitions:
        zh: 说明哪些信息已被可寻址地保存并可跨调用复用，以及哪些未持久化的调用数据仍属于运行时。
        en: States which information is addressably persisted and reusable across calls, and which unpersisted call data remains runtime-only.
        ja: アドレス可能に永続化され呼び出し横断で再利用できる情報と、未永続化でランタイムだけに属する呼び出しデータを示します。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"durable_record":"MemoryRecord","excluded":"unpersisted model-call token window"}'
      allowed_values: []
      source_claims: [claim-langgraph-persistence, claim-openai-session-history, claim-memory-domain-boundary]
  constraints:
    - id: durable-memory-has-scope-and-provenance
      severity: error
      expression_language: plain
      expression: Every retained memory record must have an addressable scope and a source or producing activity; an unscoped, source-free value cannot be treated as reusable durable memory.
      explanation:
        zh: 作用域限制谁能读取记录，来源或产生活动说明记录从何而来；两者缺失时，系统无法安全地跨调用复用或处置该记录。
        en: Scope limits who may read a record, while a source or producing activity explains where it came from; without both, a system cannot safely reuse or dispose of it across calls.
        ja: スコープは記録を読める主体を制限し、情報源または生成活動は記録の由来を説明します。両方がなければ、システムは呼び出し横断で安全に再利用または処置できません。
      source_claims: [claim-langgraph-persistence, claim-letta-stateful-context, claim-memory-domain-boundary]
    - id: context-assembly-does-not-relabel-runtime-input
      severity: error
      expression_language: plain
      expression: A model-call input becomes memory-domain content only when it is persisted as a scoped record or is assembled from such records; transient input alone is not a durable memory record.
      explanation:
        zh: 上下文窗口与持久记忆可以相互衔接，但不能因为内容暂时出现在提示中就把它错误命名为长期记忆。
        en: A context window and durable memory can connect, but temporarily appearing in a prompt does not by itself make content long-term memory.
        ja: コンテキストウィンドウと永続記憶は接続できますが、プロンプトに一時的に現れただけで長期記憶になるわけではありません。
      source_claims: [claim-openai-session-history, claim-letta-stateful-context, claim-memgpt-context-virtualization, claim-memory-domain-boundary]
examples:
  - id: memory-plane-positive-scoped-preference

    labels:
      zh: 跨会话复用的用户偏好
      en: User preference reused across sessions
      ja: セッション横断で再利用されるユーザー設定

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      domain_id: memory-plane
      managed_concerns: '["memory-stores-scopes", "memory-retrieval-ranking", "memory-context"]'
      persistence_boundary: '{"record_id":"mem-pref-17","scope":"user-42","source":"conversation_123","persisted":true}'
    related_node_ids: [MemoryRecord, MemoryScope, RetrievalRequest, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-langgraph-persistence, claim-openai-session-history, claim-memory-domain-boundary]
  - id: memory-plane-counterexample-unbounded-message-dump

    labels:
      zh: 无差别地保存全部消息
      en: Indiscriminately saving every message
      ja: すべてのメッセージを無差別に保存する

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      domain_id: memory-plane
      managed_concerns: '["memory-ingestion", "memory-embedding-indexes", "memory-lifecycle"]'
      persistence_boundary: '{"global_index":true,"record_scope":null,"source":null,"retention_decision":null}'
    related_node_ids: [MemoryRecord, MemoryScope, EmbeddingVector, MemoryRetentionPolicy]
    related_relation_ids: []

    source_claims: [claim-rag-nonparametric-memory, claim-memory-domain-boundary]
  - id: memory-plane-boundary-session-history-and-token-window

    labels:
      zh: 已持久会话历史与未保存令牌窗口
      en: Persisted session history versus an unsaved token window
      ja: 永続化済みセッション履歴と未保存トークンウィンドウ

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      domain_id: memory-plane
      managed_concerns: '["memory-stores-scopes", "memory-context"]'
      persistence_boundary: '{"session_id":"conversation_123","history_persisted":true,"current_token_window_persisted":false}'
    related_node_ids: [MemoryStore, ContextWindow, VisibleContextWindow, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-openai-session-history, claim-memory-domain-boundary]
  - id: memory-plane-instance-thread-checkpoint-and-cross-thread-store

    labels:
      zh: 线程检查点与跨线程用户记录
      en: Thread checkpoint and cross-thread user record
      ja: スレッドチェックポイントとスレッド横断ユーザー記録

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      domain_id: memory-plane
      managed_concerns: '["memory-stores-scopes", "memory-lifecycle", "memory-retrieval-ranking"]'
      persistence_boundary: '{"checkpoint_scope":"thread-42","durable_record_scope":"user-42","cross_thread_access":"user scoped"}'
    related_node_ids: [MemoryStore, MemoryNamespace, MemoryRecord, MemoryScope]
    related_relation_ids: []

    source_claims: [claim-langgraph-persistence, claim-memory-domain-boundary]
parent_relation: null
relations: []
sources:
  - id: langgraph-persistence-docs
    title: LangGraph Persistence
    url: https://docs.langchain.com/oss/python/langgraph/persistence
    source_type: official-documentation
    relevance: Documents checkpointers for thread-scoped graph state and Stores for cross-thread application data, including their distinct scope and use cases.
  - id: openai-agents-sdk-sessions
    title: OpenAI Agents SDK Sessions
    url: https://openai.github.io/openai-agents-python/sessions/
    source_type: official-documentation
    relevance: Documents session-history retrieval before a run, persistence of new items after a run, history limiting, and session operations.
  - id: letta-stateful-agents
    title: Letta Stateful Agents
    url: https://docs.letta.com/guides/core-concepts/stateful-agents
    source_type: official-documentation
    relevance: Documents persisted agent state, editable memory blocks, stored messages, and their relationship to the context window.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    url: https://arxiv.org/abs/2005.11401
    source_type: academic-paper
    relevance: Establishes a retrieve-then-generate architecture combining parametric models with a non-parametric dense-vector index.
  - id: memgpt-paper
    title: "MemGPT: Towards LLMs as Operating Systems"
    url: https://arxiv.org/abs/2310.08560
    source_type: academic-paper
    relevance: Describes virtual-context management for long-running LLM agents and motivates explicit movement between limited context and external memory.
  - id: moonweave-ontology-design
    title: Moonweave Agent System Ontology source
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    source_type: design-inference
    relevance: Records Moonweave’s local decision to organize durable information work into a memory domain and its named submodules; no external source mandates this taxonomy.
source_claims:
  - id: claim-langgraph-persistence
    source: langgraph-persistence-docs
    supports: >-
      LangGraph documents checkpointers as persistence for a single thread’s graph state and Stores as persistence for application-defined data across threads.
    locator: "Persistence: Checkpointer vs. store"
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-openai-session-history
    source: openai-agents-sdk-sessions
    supports: >-
      The OpenAI Agents SDK documents that a Session retrieves history before each run and persists new run items afterward, with configurable limits on retrieved history.
    locator: "Sessions: Core session behavior and Limiting retrieved history"
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-letta-stateful-context
    source: letta-stateful-agents
    supports: >-
      Letta documents persisted state, agent-editable memory blocks, stored messages, and memories injected into an LLM context window.
    locator: "Introduction to Stateful Agents: Memory and Messages"
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-rag-nonparametric-memory
    source: rag-paper
    supports: >-
      RAG combines a parametric sequence-to-sequence model with a non-parametric dense-vector index accessed by a neural retriever.
    locator: "Abstract"
    evidence_kind: academic-result
    confidence: high
  - id: claim-memgpt-context-virtualization
    source: memgpt-paper
    supports: >-
      MemGPT motivates managing limited LLM context alongside external memory through explicit memory-management operations.
    locator: "Abstract and system overview"
    evidence_kind: academic-proposal
    confidence: medium
  - id: claim-memory-domain-boundary
    source: moonweave-ontology-design
    supports: >-
      Moonweave groups storage and scoping, ingestion, chunking, embedding and indexes, retrieval and ranking, context assembly, and lifecycle operations under memory-plane while keeping runtime execution, tool authorization, and task planning in separate domains.
    locator: ontology/memory-plane/node.yaml and its direct module directories
    evidence_kind: ontology-design-inference
    confidence: high
