schema: moonweave.ai/ontology-node/v1
id: memory-plane
kind: domain
labels:
  en: Memory & Context Persistence Domain
  zh: 记忆与上下文持久化域
  ja: 記憶とコンテキスト永続化ドメイン
semantics:
  short_definition:
    zh: 记忆域描述如何把交互内容持久化、检索并组装，使智能体跨会话保留并复用知识。
    en: The memory domain covers persisting, retrieving, and assembling information so agents retain and reuse knowledge across sessions.
    ja: 記憶ドメインは、対話内容を永続化・検索・組み立てし、エージェントがセッションを越えて知識を保持・再利用する仕組みを扱います。
  definition:
    zh: 记忆与上下文持久化域是智能体系统中负责“写入—组织—检索—纳入上下文”完整闭环的运行域。它把来自对话、文档、工具结果或代码库的内容变成带身份、作用域、来源和保留策略的可寻址记忆，并在后续任务中按相关性召回、排序、更新或淘汰。该域覆盖从内容接入与分块、向量或关键词表示、索引构建，到检索排序、上下文组装和生命周期治理的全链路；但不拥有单次可见的消息包络、运行执行轨迹、编排决策或安全授权本身。边界上，仅影响当前调用的临时上下文属于信息域，而需要跨会话仍可查、可改、可解释来源的持久状态才属于本域。
    en: Memory & Context Persistence Domain is the operational domain that closes the write–organize–retrieve–include loop for agentic systems. It turns conversation, documents, tool outputs, or codebase content into addressable memory with identity, scope, provenance, and retention policy, then recalls, ranks, updates, or retires that memory in later tasks. The domain spans ingestion and chunking, vector or lexical representation, index construction, retrieval and ranking, context assembly, and lifecycle governance. It does not own single-call message envelopes, runtime execution traces, orchestration decisions, or authorization grants. Transient context visible only for the current call belongs to the information domain; durable state that remains queryable, updatable, and provenance-explainable across sessions belongs here.
    ja: 記憶とコンテキスト永続化ドメインは、エージェント系における「書き込み—整理—検索—文脈組み込み」の閉ループを担う運用ドメインです。対話、文書、ツール結果、コードベース内容を、同一性・スコープ・来歴・保持方針を持つアドレス可能な記憶へ変換し、後続タスクで関連性に基づき想起、順位付け、更新、または淘汰します。取り込みと分割、ベクトル/語彙表現、索引構築、検索と順位付け、文脈組み立て、ライフサイクル管理を包含しますが、単発呼び出しのメッセージ包絡、実行トレース、オーケストレーション判断、認可付与そのものは所有しません。現在呼び出しだけで可視な一時文脈は情報ドメイン、セッションを越えて照会・更新・来歴説明可能な永続状態は本ドメインに属します。
  why_needed:
    zh: 没有这一域，智能体每次对话都从零开始，用户偏好、项目上下文和已验证结论无法延续。系统也无法回答“这条记忆从哪来、为何被召回、是否仍有效”，更会把短暂指令误当成长期事实。
    en: Without this domain, every conversation starts from scratch and user preferences, project context, and validated conclusions cannot carry forward. The system also cannot explain where a memory came from, why it was recalled, or whether it is still valid, and may treat transient instructions as long-term facts.
    ja: このドメインがなければ、毎回の対話が白紙から始まり、ユーザー選好、プロジェクト文脈、検証済み結論が引き継がれません。記憶の出所、想起理由、有効性も説明できず、一時的な指示を長期事実と誤認する恐れがあります。
  includes:
    - zh: 把外部或交互内容变成可持久保存、可检索、可纳入后续上下文的记忆对象，以及管理这些对象的存储位置、命名边界和保留期限。
      en: Turning external or interactive content into memory objects that can be stored, retrieved, and included in later context, plus the storage locations, naming boundaries, and retention periods that govern those objects.
      ja: 外部/対話内容を永続保存・検索・後続文脈へ組み込み可能な記憶オブジェクトへ変換し、それらを管理する保存場所、命名境界、保持期間を含みます。
    - zh: 为一次具体任务选择、排序、压缩或摘要最相关记忆，并组装成受预算与窗口约束的可见上下文包。
      en: Selecting, ranking, compressing, or summarizing the most relevant memories for a concrete task and assembling them into a visible context package bounded by budget and window limits.
      ja: 具体タスク向けに最も関連する記憶を選択・順位付け・圧縮・要約し、予算とウィンドウ制約下の可視文脈パッケージへ組み立てます。
    - zh: 记录写入、更新、合并、反思、过期和删除等生命周期活动，使记忆变化可审计、可版本化、可回滚解释。
      en: Recording lifecycle activities such as writes, updates, merges, reflections, expirations, and deletions so memory changes remain auditable, versioned, and explainable.
      ja: 書き込み、更新、統合、内省、失効、削除などのライフサイクル活動を記録し、記憶変化を監査可能・版管理可能・説明可能にします。
  excludes:
    - zh: 仅用于当前一次模型调用的消息、指令和临时窗口内容；它们可以被引用或披露，但不自动成为长期记忆。
      en: Messages, instructions, and temporary window content used only for one model call; they may be referenced or disclosed but do not automatically become long-term memory.
      ja: 一回のモデル呼び出しだけに使うメッセージ、指示、一時ウィンドウ内容。参照・開示は可能ですが、自動的に長期記憶にはなりません。
    - zh: 谁执行了什么、工具返回了什么、任务如何路由等运行与编排事实；记忆域最多保存其摘要或引用，不重新声明执行身份。
      en: Runtime and orchestration facts such as who executed what, what a tool returned, or how a task was routed; this domain may retain summaries or references but does not redeclare execution identity.
      ja: 誰が何を実行したか、ツールが何を返したか、タスクがどう経路づけられたかなどの実行/オーケストレーション事実。要約や参照は保持できますが、実行同一性を再宣言しません。
    - zh: 基于敏感度决定能否展示内容的授权、脱敏和披露策略；记忆域只记录策略应用后的实际保留或召回结果。
      en: Authorization, redaction, and disclosure policies that decide what may be shown based on sensitivity; this domain records only the actual retention or recall outcomes after those policies are applied.
      ja: 機密性に基づき表示可否を決める認可、墨消し、開示方針。方針適用後の実際の保持/想起結果だけを記録します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 主流记忆产品把“写入记忆”“跨会话检索”“线程内状态”和“向量库 RAG”拆成不同 API。本域用这些权威接口形状说明记忆闭环的工程边界，而不复制任一产品的完整载荷到本体中。
    en: Mainstream memory products split memory writes, cross-session retrieval, thread-local state, and vector-store RAG into different APIs. This domain uses those authoritative wire shapes to explain engineering boundaries without copying any one product payload into the ontology.
    ja: 主要な記憶製品は「記憶書き込み」「セッション横断検索」「スレッド内状態」「ベクトルDB RAG」を別 API に分けます。本ドメインはそれらの権威ある配線形状で境界を示し、いずれか一製品の完全ペイロードを本体へ複製しません。
  typical_input:
    - description: Mem0 add-memories request — scoped conversation turns queued for background extraction.
      format: |
        POST https://api.mem0.ai/v3/memories/add/
        {
          "user_id": "alice",
          "messages": [
            {"role": "user", "content": "Prefer TypeScript for all code examples."}
          ],
          "metadata": {"topic": "preferences"},
          "infer": true
        }
      source_claims: [claim-memory-plane-mem0-add]
    - description: Letta core-memory block update — in-context editable working memory for one agent.
      format: |
        PATCH https://api.letta.com/v1/agents/{agent_id}/core-memory/blocks/human
        {
          "value": "Name: Alice. Prefers TypeScript examples and concise answers."
        }
      source_claims: [claim-memory-plane-letta-blocks]
    - description: LangGraph cross-thread Store put — long-term JSON memory under a hierarchical namespace.
      format: |
        store.put(
          ("my-user", "preferences"),
          "language-choice",
          {"rules": ["Prefer TypeScript for code examples"], "updated_at": "2026-07-19"}
        )
      source_claims: [claim-memory-plane-langgraph-store]
    - description: OpenAI thread message append — thread-scoped short-term conversational state (Assistants API shape).
      format: |
        POST https://api.openai.com/v1/threads/{thread_id}/messages
        OpenAI-Beta: assistants=v2
        {
          "role": "user",
          "content": "Summarize the onboarding doc we uploaded yesterday."
        }
      source_claims: [claim-memory-plane-openai-thread]
    - description: OpenAI vector store file attach — durable file chunks for semantic file_search retrieval.
      format: |
        POST https://api.openai.com/v1/vector_stores/{vector_store_id}/files
        OpenAI-Beta: assistants=v2
        {"file_id": "file-abc123"}
      source_claims: [claim-memory-plane-openai-vector-store]
  typical_output:
    - description: Mem0 hybrid search response — ranked memory facts with scope metadata and fused score.
      format: |
        POST https://api.mem0.ai/v3/memories/search/
        {
          "query": "What language does Alice prefer for examples?",
          "filters": {"user_id": "alice"},
          "top_k": 5
        }
        =>
        {
          "results": [
            {
              "id": "mem-uuid",
              "memory": "Prefers TypeScript for code examples.",
              "score": 0.82,
              "metadata": {"topic": "preferences"},
              "created_at": "2026-07-15T10:30:00Z"
            }
          ]
        }
      source_claims: [claim-memory-plane-mem0-search]
    - description: LangGraph checkpointer thread state — short-term graph state persisted per thread_id.
      format: |
        config = {"configurable": {"thread_id": "support-thread-42"}}
        graph.invoke(input_state, config=config)
        snapshot = checkpointer.get(config)
        # snapshot.values holds merged message history and graph fields for this thread only
      source_claims: [claim-memory-plane-langgraph-checkpoint]
    - description: Letta archival memory search — semantically retrieved passages outside the pinned context window.
      format: |
        client.agents.passages.search(
          agent_id="agent-7",
          query="API authentication patterns discussed last month",
          tags=["technical"],
          page=0
        )
      source_claims: [claim-memory-plane-letta-archival]
  reference_implementations:
    - name: Mem0 Platform API
      url: https://docs.mem0.ai
      description: Add and search scoped user/agent memories with hybrid retrieval and async write pipeline.
    - name: Letta Memory Blocks and Archival Memory
      url: https://docs.letta.com
      description: Core in-context blocks plus semantically searchable archival passages with context virtualization.
    - name: LangGraph Memory Overview
      url: https://langchain-ai.github.io/langgraph/concepts/memory/
      description: Thread-scoped checkpointer state versus cross-thread Store namespaces with optional vector search.
    - name: OpenAI Threads and Vector Stores
      url: https://developers.openai.com/api/reference/resources/beta/subresources/threads/
      description: Thread message history and vector-store-backed file search for assistant-style memory.
    - name: Cursor Semantic Search
      url: https://cursor.com/docs/agent/tools/search
      description: Codebase chunk indexing and semantic retrieval as developer-project memory.
structure:
  identity_keys: [memory_scope_ref, memory_record_id, store_ref]
  fields:
    - id: memory_scope_ref
      labels: {zh: 记忆作用域引用, en: Memory scope reference, ja: 記憶スコープ参照}
      definitions:
        zh: 指向用户、智能体、运行、租户或项目等作用域的稳定引用；跨作用域召回必须显式声明此引用。
        en: Stable reference to a scope such as user, agent, run, tenant, or project; cross-scope recall must declare this reference explicitly.
        ja: ユーザー、エージェント、実行、テナント、プロジェクト等のスコープへの安定参照。スコープ横断想起はこれを明示する必要があります。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: scope:user:alice
      allowed_values: []
      source_claims: [claim-memory-plane-mem0-add, claim-memory-plane-langgraph-store]
    - id: memory_record_id
      labels: {zh: 记忆记录标识, en: Memory record identifier, ja: 記憶レコード識別子}
      definitions:
        zh: 在作用域内唯一标识一条可版本化记忆内容的稳定 ID，不得用嵌入向量或临时检索分数代替。
        en: Stable ID that uniquely identifies one versionable memory record within a scope; it must not be replaced by an embedding vector or ephemeral retrieval score.
        ja: スコープ内で版管理可能な一記憶内容を一意に識別する安定 ID。埋め込みベクトルや一時的検索スコアで代用してはなりません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: mem-pref-typescript-001
      allowed_values: []
      source_claims: [claim-memory-plane-mem0-search, claim-memory-plane-park-stream]
    - id: store_ref
      labels: {zh: 存储引用, en: Store reference, ja: ストア参照}
      definitions:
        zh: 指向承载该记忆的后端或命名空间，例如向量库集合、键值命名空间、归档库或线程检查点容器。
        en: Reference to the backend or namespace holding the memory, such as a vector collection, key-value namespace, archival store, or thread checkpoint container.
        ja: 記憶を保持するバックエンド/名前空間（ベクトルコレクション、KV 名前空間、アーカイブ、スレッドチェックポイント容器など）への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: store:mem0:workspace-1
      allowed_values: []
      source_claims: [claim-memory-plane-langgraph-store, claim-memory-plane-openai-vector-store]
    - id: provenance_ref
      labels: {zh: 来源引用, en: Provenance reference, ja: 来歴参照}
      definitions:
        zh: 指向产生或更新该记忆的可审计来源，例如原始消息、上传文件、工具结果或反思活动。
        en: Auditable source that created or updated the memory, such as an originating message, uploaded file, tool result, or reflection activity.
        ja: 記憶を生成/更新した監査可能な出典（元メッセージ、アップロードファイル、ツール結果、内省活動など）への参照。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: message:session-17:msg-042
      allowed_values: []
      source_claims: [claim-memory-plane-park-stream, claim-memory-plane-mem0-add]
    - id: retention_policy_ref
      labels: {zh: 保留策略引用, en: Retention policy reference, ja: 保持方針参照}
      definitions:
        zh: 说明该记忆何时过期、降权或被硬删除的策略引用；无策略时不得假设永久有效。
        en: Policy reference stating when the memory expires, decays, or is hard-deleted; absence of a policy must not imply permanence.
        ja: 記憶の失効、降重、硬削除タイミングを示す方針参照。方針がなければ永久有効と仮定してはなりません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: retention:preference-until-updated
      allowed_values: []
      source_claims: [claim-memory-plane-mem0-add, claim-memory-plane-survey-dynamics]
  constraints:
    - id: memory-requires-explicit-scope
      severity: error
      expression_language: plain
      expression: memory_scope_ref must be present before a memory record can be written, retrieved, or included in context assembly.
      explanation:
        zh: 没有作用域就无法判断记忆属于谁、是否可被当前任务合法召回。
        en: Without a scope, ownership and lawful recall for the current task cannot be determined.
        ja: スコープがなければ、記憶の帰属と現タスクでの lawful recall を判定できません。
      source_claims: [claim-memory-plane-mem0-add, claim-memory-plane-mem0-search]
    - id: memory-is-not-transient-context
      severity: error
      expression_language: plain
      expression: content visible only in the current call window and not written through a memory lifecycle operation must not be registered as a cross-session memory record.
      explanation:
        zh: 把一次性的当前窗口文本自动永久化会把所有提示都变成“长期偏好”。
        en: Auto-persisting one-call window text would incorrectly treat every prompt as a long-term preference.
        ja: 一回限りの現在ウィンドウ文本を自動永続化すると、全プロンプトが長期選好になります。
      source_claims: [claim-memory-plane-survey-forms, claim-memory-plane-langgraph-checkpoint]
    - id: memory-recall-requires-store-or-index
      severity: error
      expression_language: plain
      expression: retrieval and context inclusion must resolve store_ref or an equivalent index location; similarity scores alone are not memory identity.
      explanation:
        zh: 仅有相似度分数而没有可解析的存储或索引位置，无法审计“召回了哪条记忆”。
        en: Similarity scores without a resolvable store or index location cannot audit which memory was recalled.
        ja: 解決可能な store/index 位置がなければ、どの記憶を想起したか監査できません。
      source_claims: [claim-memory-plane-mem0-search, claim-memory-plane-cursor-index]
  required_relations: []
examples:
  - id: memory-plane-example-mem0-preference-persistence
    labels:
      zh: Mem0 用户偏好跨会话持久化
      en: Mem0 user preference persistence across sessions
      ja: Mem0 ユーザー選好のセッション横断永続化
    descriptions:
      zh: 用户在 7 月 15 日会话中明确说“代码示例优先 TypeScript”。Mem0 通过 POST /v3/memories/add/ 将消息入队，后台抽取事实 “Prefers TypeScript for code examples.” 并绑定 user_id=alice。三天后的新会话里，POST /v3/memories/search/ 以 filters.user_id=alice 和 query 召回该偏好，score=0.82，后续回答据此默认使用 TypeScript 示例。
      en: On July 15 the user explicitly says, “Prefer TypeScript for code examples.” Mem0 queues the turn via POST /v3/memories/add/, extracts the fact “Prefers TypeScript for code examples.” scoped to user_id=alice, and persists it asynchronously. Three days later a new session calls POST /v3/memories/search/ with filters.user_id=alice, recalls the preference at score=0.82, and later answers default to TypeScript examples.
      ja: 7月15日のセッションで利用者が「code example は TypeScript 優先」と明示します。Mem0 は POST /v3/memories/add/ でメッセージをキューし、事実 “Prefers TypeScript for code examples.” を user_id=alice に紐づけて非同期保存します。3日後の新セッションで POST /v3/memories/search/ が filters.user_id=alice で選好を score=0.82 で想起し、以降の回答は TypeScript 例を既定にします。
    example_source:
      product: Mem0 Platform
      url: https://docs.mem0.ai
    field_values:
      api_add_endpoint: POST /v3/memories/add/
      api_search_endpoint: POST /v3/memories/search/
      user_id: alice
      extracted_memory: Prefers TypeScript for code examples.
      search_query: What language does Alice prefer for code examples?
      search_score: 0.82
      cross_session_gap_days: 3
      metadata_topic: preferences
    related_node_ids:
      - memory-plane
      - memory-stores-scopes
      - memory-lifecycle
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-plane-mem0-add
      - claim-memory-plane-mem0-search
  - id: memory-plane-example-letta-archival-virtualization
    labels:
      zh: Letta 归档记忆与上下文虚拟化
      en: Letta archival memory with context virtualization
      ja: Letta アーカイブ記憶とコンテキスト仮想化
    descriptions:
      zh: Letta 智能体把始终可见的 human/persona 核心块保留在上下文窗口内，而把大量 API 文档与历史工单写入 archival memory。当用户问到“上个月讨论过的认证方案”时，智能体调用 archival_memory_search(query=..., tags=[\"technical\"]) 语义检索区外内容，再把命中段落注入当前 main context，而不是把整个归档库塞进 prompt。
      en: A Letta agent keeps always-visible human/persona core blocks in the context window while writing large API docs and ticket history into archival memory. When the user asks about “the authentication approach discussed last month,” the agent calls archival_memory_search(query=..., tags=[\"technical\"]) to retrieve out-of-window passages and injects hits into the current main context instead of stuffing the entire archive into the prompt.
      ja: Letta エージェントは常時可視の human/persona core block を context window に保ち、大量の API 文書と履歴チケットを archival memory へ書き込みます。利用者が「先月議論した認証方式」を尋ねると、archival_memory_search(query=..., tags=[\"technical\"]) で window 外内容を意味検索し、命中段落だけを main context へ注入します。
    example_source:
      product: Letta (MemGPT lineage)
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    field_values:
      core_block_labels:
        - human
        - persona
      archival_insert_tool: archival_memory_insert
      archival_search_tool: archival_memory_search
      search_query: authentication approach discussed last month
      search_tags:
        - technical
      retrieval_mode: semantic_out_of_window
      context_strategy: inject_top_passages_only
    related_node_ids:
      - memory-plane
      - memory-stores-scopes
      - memory-retrieval-ranking
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-memory-plane-letta-blocks
      - claim-memory-plane-letta-archival
      - claim-memory-plane-survey-forms
  - id: memory-plane-example-langgraph-cross-thread-store
    labels:
      zh: LangGraph 跨线程语义记忆库
      en: LangGraph cross-thread semantic memory store
      ja: LangGraph スレッド横断セマンティック記憶ストア
    descriptions:
      zh: LangGraph 应用用 checkpointer 保存 thread_id=support-42 的短期对话状态，同时用 BaseStore 在 namespace (user-9, chitchat) 下 put key language-choice。新线程 support-88 启动后，store.search(namespace, query=\"language preferences\") 仍能找到同一 JSON 规则，实现跨线程长期记忆，而 checkpointer 快照只覆盖单个线程历史。
      en: A LangGraph app persists short-term conversation state for thread_id=support-42 via a checkpointer while BaseStore put stores JSON rules at namespace (user-9, chitchat) under key language-choice. When a new thread support-88 starts, store.search(namespace, query=\"language preferences\") still finds the same rules, giving cross-thread long-term memory while the checkpointer snapshot covers only one thread history.
      ja: LangGraph アプリは checkpointer で thread_id=support-42 の短期対話状態を保存し、BaseStore put で namespace (user-9, chitchat) の language-choice に JSON 規則を保存します。新スレッド support-88 開始後も store.search(namespace, query=\"language preferences\") が同一規則を見つけ、checkpointer 快照は単一スレッド履歴のみをカバーします。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/concepts/memory/
    field_values:
      short_term_mechanism: thread-scoped checkpointer
      thread_id_short_term: support-42
      long_term_mechanism: BaseStore put/get/search
      store_namespace:
        - user-9
        - chitchat
      store_key: language-choice
      store_value_rules:
        - User likes short, direct language
        - User only speaks English and Python
      new_thread_id: support-88
      search_query: language preferences
    related_node_ids:
      - memory-plane
      - memory-stores-scopes
      - memory-retrieval-ranking
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-memory-plane-langgraph-checkpoint
      - claim-memory-plane-langgraph-store
  - id: memory-plane-example-park-generative-agents-reflection
    labels:
      zh: Generative Agents 记忆流与反思
      en: Generative Agents memory stream and reflection
      ja: Generative Agents 記憶ストリームと内省
    descriptions:
      zh: Park 等（2023）的生成式智能体把每条观察追加到 memory stream，并用 relevance、recency、importance 加权检索。当累计 importance 超阈值时触发 reflection，把多条低层观察综合成更高层洞察（例如“Sam 对艺术展览很投入”）写回 stream，供后续计划与对话使用，而不是只依赖当前窗口里的最近消息。
      en: Park et al. (2023) append each observation to a memory stream and retrieve with weighted relevance, recency, and importance. When cumulative importance crosses a threshold, reflection synthesizes lower-level observations into higher-level insights such as “Sam is deeply engaged with art exhibitions,” writes them back to the stream, and uses them for later planning and dialogue rather than relying only on recent window messages.
      ja: Park 等（2023）は各観察を memory stream に append し、relevance・recency・importance の重み付き検索を行います。累積 importance が閾値を超えると reflection が低レベル観察を「Sam は芸術展示に深く関心がある」等の高次洞察へ統合し stream へ書き戻して、最近メッセージだけに頼らず計画と対話へ使います。
    example_source:
      product: Generative Agents (Park et al. 2023)
      url: https://arxiv.org/abs/2304.03442
    field_values:
      memory_stream_operation: append_observation
      retrieval_weights:
        relevance: gamma
        recency: alpha
        importance: beta
      reflection_trigger: cumulative_importance_threshold
      reflection_output_example: Sam is deeply engaged with art exhibitions.
      downstream_use: planning_and_dialogue
    related_node_ids:
      - memory-plane
      - memory-lifecycle
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-plane-park-stream
      - claim-memory-plane-park-reflection
  - id: memory-plane-example-cursor-codebase-indexing
    labels:
      zh: Cursor 代码库索引作为开发者记忆
      en: Cursor codebase indexing as developer memory
      ja: Cursor コードベース索引を開発者記憶として
    descriptions:
      zh: Cursor 打开工作区后自动把代码切成函数/类等语义块、生成 embedding 并写入远程向量库；本地 Merkle 树只同步变更文件。开发者问“认证在哪里处理？”时，语义搜索返回 auth/middleware.ts 等候选路径，客户端再按元数据回读本地源码注入 Agent 上下文。这是项目级持久记忆，而不是把整仓库放进一次 prompt。
      en: When Cursor opens a workspace it automatically splits code into semantic chunks such as functions and classes, embeds them, and stores vectors remotely while a local Merkle tree syncs only changed files. When a developer asks, “Where is authentication handled?” semantic search returns candidates like auth/middleware.ts and the client reads local source via metadata to inject agent context. This is project-level persistent memory, not stuffing the whole repository into one prompt.
      ja: Cursor はワークスペースを開くとコードを関数/クラス等の意味块へ分割し embedding を生成してリモート向量 DB へ保存し、ローカル Merkle tree は変更ファイルのみ同期します。開発者が「認証はどこで処理？」と尋ねると、意味検索が auth/middleware.ts 等を返し、クライアントが metadata からローカル源码を読み Agent 文脈へ注入します。全リポジトリを一 prompt に入れるのではなく、プロジェクト級永続記憶です。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
    field_values:
      indexing_trigger: workspace_open
      chunk_granularity: functions_classes_logical_blocks
      change_detection: merkle_tree_file_hashes
      sync_interval_minutes: 5
      semantic_search_query: Where is authentication handled?
      retrieved_candidate: auth/middleware.ts
      code_storage_policy: vectors_remote_source_local_only
    related_node_ids:
      - memory-plane
      - memory-ingestion
      - memory-chunking-situating
      - memory-embedding-indexes
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-plane-cursor-index
      - claim-memory-plane-survey-forms
