source_claims:
  - id: claim-memory-plane-mem0-add
    source: src-mem0-docs
    supports: Mem0 POST /v3/memories/add/ accepts scoped messages and metadata, queues asynchronous extraction, and requires at least one entity ID so memories are not anonymous global text.
    locator: Add Memories > Request body; Required headers; Response event_id
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-plane-mem0-search
    source: src-mem0-docs
    supports: Mem0 POST /v3/memories/search/ performs hybrid ranked retrieval with filters-scoped entity IDs and returns id, memory text, score, and timestamps suitable for auditable recall.
    locator: Search Memories > Request body filters; Response results[]
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-plane-letta-blocks
    source: src-letta-docs
    supports: Letta core-memory blocks are agent-scoped, label-addressable working memory segments updated via PATCH /v1/agents/{agent_id}/core-memory/blocks/{block_label} and kept in the active context window.
    locator: Memory blocks guide; Blocks API retrieve/update/list endpoints
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-plane-letta-archival
    source: src-letta-docs
    supports: Letta archival memory stores unlimited semantically searchable passages outside the pinned context window and is queried on demand via archival_memory_search or agents.passages.search.
    locator: Archival memory guide > Inserting and searching; When to use archival memory
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-plane-langgraph-checkpoint
    source: src-langgraph-memory
    supports: LangGraph short-term memory is thread-scoped state persisted through a checkpointer and read at each step, distinct from cross-thread long-term memory.
    locator: Short-term memory > Manage short-term memory
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-plane-langgraph-store
    source: src-langgraph-memory
    supports: LangGraph long-term memory uses hierarchical Store namespaces with put/get/search over JSON documents, enabling cross-thread recall outside a single thread_id.
    locator: Long-term memory > Memory storage; store.put/get/search example
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-plane-openai-thread
    source: src-openai-threads
    supports: OpenAI thread messages provide session-scoped conversational history appended via POST /v1/threads/{thread_id}/messages and are not themselves unscoped long-term semantic memory.
    locator: Threads API > messages create parameters and thread.message object
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-plane-openai-vector-store
    source: src-openai-vector-stores
    supports: OpenAI vector stores persist attached files with processing status and metadata, backing durable semantic retrieval separate from ephemeral prompt context.
    locator: Vector Stores API > object fields file_counts, status, metadata
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-plane-park-stream
    source: src-park-generative-agents-2023
    supports: Generative Agents maintain a memory stream of natural-language observations retrieved by relevance, recency, and importance rather than by raw recency alone.
    locator: Abstract; Architecture > memory stream retrieval model
    evidence_kind: primary-paper
    confidence: high
  - id: claim-memory-plane-park-reflection
    source: src-park-generative-agents-2023
    supports: Generative Agents reflection synthesizes accumulated stream entries into higher-level inferences written back to memory to guide later planning and behavior.
    locator: Abstract; Architecture > reflection component
    evidence_kind: primary-paper
    confidence: high
  - id: claim-memory-plane-survey-forms
    source: src-arxiv-2512-13564
    supports: Contemporary surveys distinguish agent memory from one-shot RAG and context staging by its forms, functions, and temporal dynamics across sessions.
    locator: Abstract > forms, functions, and dynamics taxonomy
    evidence_kind: survey
    confidence: high
  - id: claim-memory-plane-survey-dynamics
    source: src-arxiv-2603-07670
    supports: Agent memory surveys formalize a write-manage-read loop coupled with perception and action, motivating explicit lifecycle and retention governance in production agents.
