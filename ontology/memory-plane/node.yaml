schema: moonweave.ai/ontology-node/v1
id: memory-plane
kind: domain
status: accepted
labels:
  en: Memory & Context Persistence Domain
  zh: 记忆与上下文持久化域
  ja: 記憶とコンテキスト永続化ドメイン
semantics:
  short_definition:
    en: Memory & Context Persistence Domain is the operational concern domain for agentic memory stores, scoped memory records, context assembly, retrieval pipelines, and memory lifecycle operations. It covers ingestion, memory typology, chunking, embedding, indexing, retrieval, ranking, context inclusion, summarization, preference memory, and the write-update-delete-merge-consolidate-expire-validate loop that lets persistent memory influence future behavior under provenance and safety controls.
    zh: 记忆与上下文持久化域是面向智能体记忆库、作用域化记忆记录、上下文组装、检索管线和记忆生命周期操作的运行关注域。它覆盖摄入、记忆类型、分块、嵌入、索引、检索、排序、上下文纳入、摘要、偏好记忆，以及在来源与安全控制下让持久记忆影响未来行为的写入、更新、删除、合并、巩固、过期和验证循环。
    ja: 記憶とコンテキスト永続化ドメインは、エージェント的な記憶ストア、スコープ付き記憶レコード、コンテキスト組み立て、検索パイプライン、記憶ライフサイクル操作を扱う運用関心ドメインです。取り込み、記憶類型、チャンク化、埋め込み、索引、検索、順位付け、文脈への組み込み、要約、選好記憶、そして来歴と安全制御の下で永続記憶が将来の振る舞いへ影響する書き込み、更新、削除、統合、集約、期限切れ、検証の循環を扱います。
  definition:
    en: Memory & Context Persistence Domain is the operational concern domain for agentic memory stores, scoped memory records, context assembly, retrieval pipelines, and memory lifecycle operations. It covers ingestion, memory typology, chunking, embedding, indexing, retrieval, ranking, context inclusion, summarization, preference memory, and the write-update-delete-merge-consolidate-expire-validate loop that lets persistent memory influence future behavior under provenance and safety controls.
    zh: 记忆与上下文持久化域是面向智能体记忆库、作用域化记忆记录、上下文组装、检索管线和记忆生命周期操作的运行关注域。它覆盖摄入、记忆类型、分块、嵌入、索引、检索、排序、上下文纳入、摘要、偏好记忆，以及在来源与安全控制下让持久记忆影响未来行为的写入、更新、删除、合并、巩固、过期和验证循环。
    ja: 記憶とコンテキスト永続化ドメインは、エージェント的な記憶ストア、スコープ付き記憶レコード、コンテキスト組み立て、検索パイプライン、記憶ライフサイクル操作を扱う運用関心ドメインです。取り込み、記憶類型、チャンク化、埋め込み、索引、検索、順位付け、文脈への組み込み、要約、選好記憶、そして来歴と安全制御の下で永続記憶が将来の振る舞いへ影響する書き込み、更新、削除、統合、集約、期限切れ、検証の循環を扱います。
  why_needed:
    zh: 把内容接入、分块、表示、检索、组装、生命周期和存储组织成持久记忆闭环。
    en: Organizes ingestion, chunking, representation, retrieval, assembly, lifecycle, and storage into a persistent-memory loop.
    ja: 取り込み、チャンク化、表現、検索、組み立て、ライフサイクル、保存を永続記憶ループへ編成します。
  includes:
    - zh: "记忆域负责记忆接入（owner: memory-ingestion）以及表示与索引（owner: memory-embedding-indexes），把候选内容转成具有来源、表示和可检索身份的持久记忆对象。"
      en: "Memory owns Memory ingestion (owner: memory-ingestion) and Representations and indexes (owner: memory-embedding-indexes), turning candidate content into persistent memory objects with provenance, representation, and retrievable identity."
      ja: "記憶ドメインは記憶取り込み（owner: memory-ingestion）および表現と索引（owner: memory-embedding-indexes）を所有し、候補内容を来歴・表現・検索可能な同一性を持つ永続記憶へ変換します。"
    - zh: "记忆域还负责检索与排序（owner: memory-retrieval-ranking）以及记忆生命周期（owner: memory-lifecycle），既选择与当前任务最相关的记忆，也管理保留、更新、压缩和删除。"
      en: "Memory also owns Retrieval and ranking (owner: memory-retrieval-ranking) and Memory lifecycle (owner: memory-lifecycle), selecting memories relevant to the current task while governing retention, update, compaction, and deletion."
      ja: "記憶ドメインは検索と順位付け（owner: memory-retrieval-ranking）および記憶ライフサイクル（owner: memory-lifecycle）も所有し、現タスクに関連する記憶を選択しつつ保持・更新・圧縮・削除を管理します。"
  excludes:
    - zh: "上下文发现（owner: info-indexing）属于信息域，因为它定位可供当前上下文使用的信息证据与访问路径；记忆域提供可检索对象和排序结果，但不拥有通用信息发现界面。"
      en: "Context discovery (owner: info-indexing) belongs to Info because it locates information evidence and access paths for the current context; Memory supplies retrievable objects and rankings without owning the general information-discovery interface."
      ja: "コンテキスト発見（owner: info-indexing）は現在の文脈で使う情報証拠とアクセス経路を特定するため情報ドメインに属します。記憶は検索対象と順位を供給しますが一般的発見インターフェースを所有しません。"
    - zh: "运行产物（owner: runtime-artifacts）属于运行域，因为文件、补丁或构建物的身份来自具体执行和版本；记忆域可以保存其引用或摘要，但不重新声明产物所有权。"
      en: "Runtime artifacts (owner: runtime-artifacts) belongs to Runtime because file, patch, or build identity comes from a concrete execution and version; Memory may retain a reference or summary without redeclaring artifact ownership."
      ja: "実行成果物（owner: runtime-artifacts）はファイル・パッチ・ビルドの同一性が具体的実行と版に由来するため実行ドメインに属します。記憶は参照や要約を保持できますが成果物所有権を再宣言しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 把内容接入、分块、表示、检索、组装、生命周期和存储组织成持久记忆闭环。
  en: Organizes ingestion, chunking, representation, retrieval, assembly, lifecycle, and storage into a persistent-memory loop.
  ja: 取り込み、チャンク化、表現、検索、組み立て、ライフサイクル、保存を永続記憶ループへ編成します。
structure: null
examples:
  - id: memory-plane-example-positive-001
    kind: positive
    labels:
      zh: 带来源的偏好记忆形成并影响后续会话
      en: A sourced preference memory influences a later session
      ja: 出典付き選好記憶が後続セッションへ影響する
    scenario_id: null
    descriptions:
      zh: session-17 中用户明确说“代码示例优先 TypeScript”。ingestion-run-17 从 message-17 创建 preference-memory-17@1，保留 source-ref-message-17 和 user-4 作用域；chunk-17 经 embedding-run-17 生成 vector-17 并写入 vector-index-user-4。三天后的 session-22 中，retrieval-run-22 按作用域检索并排序该记录，ContextAssembly assembly-22 只纳入当前仍有效的版本。用户随后改为 Python，UpdateMemoryOperation update-23 创建 @2 并使 @1 失效而不删除历史。
      en: In session-17 the user explicitly says, “Prefer TypeScript for code examples.” ingestion-run-17 creates preference-memory-17@1 from message-17 with source-ref-message-17 and user-4 scope. chunk-17 is encoded by embedding-run-17 into vector-17 and indexed in vector-index-user-4. Three days later, retrieval-run-22 retrieves and ranks it within scope, and ContextAssembly assembly-22 includes only the still-valid revision. When the user later switches to Python, UpdateMemoryOperation update-23 creates @2 and invalidates @1 without deleting history.
      ja: session-17 で利用者が「code example は TypeScript 優先」と明示します。ingestion-run-17 は message-17 から source-ref-message-17 と user-4 scope を持つ preference-memory-17@1 を作り、chunk-17 を embedding-run-17 が vector-17 に符号化して vector-index-user-4 へ格納します。三日後 retrieval-run-22 が scope 内で検索・順位付けし assembly-22 は有効 revision のみ採用します。後に Python へ変更すると update-23 が @2 を作り @1 を履歴保持したまま無効化します。
    field_values:
      source_message_id: message-17
      memory_record_revisions:
        - preference-memory-17@1
        - preference-memory-17@2
      memory_scope: user-4
      chunk_id: chunk-17
      embedding_run_id: embedding-run-17
      embedding_vector_id: vector-17
      vector_index_id: vector-index-user-4
      retrieval_run_id: retrieval-run-22
      context_assembly_id: assembly-22
      lifecycle_operation_id: update-23
    related_node_ids:
      - memory-plane
    related_relation_ids: []
    expected_result:
      zh: 查询能从当前偏好回溯原消息、分块、表示、索引、检索与上下文纳入，并说明为何 @2 生效、@1 只作为历史保留。
      en: A query traces the current preference back through source message, chunk, representation, index, retrieval, and context inclusion and explains why @2 is effective while @1 remains historical.
      ja: current preference から source message・chunk・representation・index・retrieval・context inclusion を遡り、@2 が有効で @1 が履歴のみの理由を説明します。
    why_valid_or_invalid:
      zh: 该对象具有跨会话持久身份、来源、作用域、检索路径和不可变版本生命周期；它不仅是当前窗口中的一句文本，也没有把嵌入模型捷径当作记忆身份。
      en: The object has cross-session persistent identity, provenance, scope, retrieval path, and immutable revision lifecycle. It is more than text in one current window and does not use an embedding-model shortcut as memory identity.
      ja: cross-session persistent identity・provenance・scope・retrieval path・immutable revision lifecycle を持ち、現在 window の一文以上であり embedding-model shortcut を memory identity にしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-plane-003
  - id: memory-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 仅在当前窗口出现的消息不是持久记忆
      en: A message visible only in the current window is not persistent memory
      ja: 現在 window だけの message は永続記憶ではない
    scenario_id: null
    descriptions:
      zh: message-91 中用户说“这次回答请用表格”。该指令进入 context-window-91 并影响一次模型调用；会话结束后没有 MemoryRecord、作用域、写入活动、存储位置、检索入口或保留期限。
      en: In message-91 the user says, “Use a table for this answer.” The instruction enters context-window-91 and affects one model call. After the session there is no MemoryRecord, scope, write activity, store location, retrieval entry, or retention period.
      ja: message-91 で利用者が「今回の回答は表で」と指示し context-window-91 に入って一回の model call に影響します。session 後に MemoryRecord・scope・write activity・store location・retrieval entry・retention period はありません。
    field_values:
      message_id: message-91
      context_window_id: context-window-91
      instruction_scope: current-response-only
      memory_record_created: false
      retrieval_entry_created: false
      retention_period: null
    related_node_ids:
      - memory-plane
      - info-plane
    related_relation_ids: []
    expected_result:
      zh: 把消息、指令包络和当前窗口可见性归入信息域；不得因为该文本影响了模型行为就自动创建长期偏好记忆。
      en: Assign the message, instruction envelope, and current-window visibility to Info; do not create a long-term preference memory merely because the text influenced model behavior.
      ja: message・instruction envelope・current-window visibility は Info に置き、model behavior に影響しただけで long-term preference memory を作りません。
    why_valid_or_invalid:
      zh: 短暂上下文影响不具备持久记录的身份、作用域、写入证据和未来可检索性；将其记为 MemoryRecord 会把所有提示都错误永久化。
      en: Transient context influence lacks persistent identity, scope, write evidence, and future retrievability. Treating it as a MemoryRecord would incorrectly persist every prompt.
      ja: transient context influence は persistent identity・scope・write evidence・future retrievability を欠き、MemoryRecord とすると全 prompt を誤って永続化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-plane-004
