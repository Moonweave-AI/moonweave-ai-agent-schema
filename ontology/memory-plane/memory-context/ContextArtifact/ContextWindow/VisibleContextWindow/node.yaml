parent_relation:
  id: VisibleContextWindow-specializes-ContextWindow
  predicate: is_a
  target: concept:ContextWindow
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是记录可见投影的上下文窗口
    en: is a context window visible projection
    ja: コンテキストウィンドウの可視投影型である
  definitions:
    zh: VisibleContextWindow 在 ContextWindow 的容量和策略基础上，记录某包在特定状态下的有序可见投影。
    en: VisibleContextWindow records an ordered visible projection of a package in a particular status on top of ContextWindow capacity and policy.
    ja: VisibleContextWindow は ContextWindow の容量・方針の上に、特定状態のパッケージの順序付き可視投影を記録します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 同一容量窗口可产生多个计划或确认投影；分类关系不规定投影次数。
    en: One capacity window can yield multiple planned or confirmed projections; classification does not prescribe their count.
    ja: 一つの容量ウィンドウは複数の planned または confirmed 投影を生み得ます。分類関係はその数を規定しません。
  inverse_reading:
    predicate: has_visible_projection_subtype
    labels:
      zh: 具有可见投影专门化
      en: has visible-projection subtype
      ja: 可視投影の下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-visible-context-provider-truncation
  distinct_fact_rationale:
    zh: 此关系表达窗口投影类型，不表达包内容、实际提供方确认或模型注意力。
    en: This relation expresses a window-projection type, not package content, actual provider confirmation, or model attention.
    ja: この関係はウィンドウ投影型を表し、パッケージ内容、実プロバイダー確認、モデル注意を表しません。
  layout_role: primary-backbone
relations:
  - id: VisibleContextWindow-projects-ContextPackage
    predicate: projects
    direction: source-to-target
    relation_kind: derivation
    labels:
      zh: 投影上下文包
      en: projects context package
      ja: コンテキストパッケージを投影する
    definitions:
      zh: 当可见窗口的 package_ref 指向目标包，且 visible_artifact_refs 是该包在窗口策略后有序存活的子集时，可见窗口投影该包。
      en: A visible window projects a target package when package_ref identifies it and visible_artifact_refs are the ordered surviving subset of that package after window policy.
      ja: package_ref が対象パッケージを識別し、visible_artifact_refs がウィンドウ方針後のそのパッケージの順序付き生存部分集合であるとき、可視ウィンドウは対象パッケージを投影します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个包可产生计划、提供方确认或审计确认等多个投影；每个投影须独立说明状态和溢出效果。
      en: One package can yield multiple projections such as planned, provider confirmed, or audited; each must state status and overflow effect independently.
      ja: 一つのパッケージは planned、provider confirmed、audited など複数投影を生み得ます。各投影は状態とオーバーフロー効果を独立して示す必要があります。
    inverse_reading:
      predicate: is_projected_by_visible_window
      labels:
        zh: 被可见窗口投影
        en: is projected by visible window
        ja: 可視ウィンドウにより投影される
    conditions:
      - id: VisibleContextWindow-projects-ContextPackage-ordered-bounded
        severity: error
        expression_language: plain
        expression: "Assert only when package_ref equals target package ID, visible_artifact_refs are an ordered subset of its artifacts, and visible_input_tokens fit window_ref usable budget; confirmed statuses require visibility_evidence_ref."
        explanation:
          zh: 投影不能凭空添加内容，也不能把计划状态升级成已确认交付。
          en: A projection cannot add content from nowhere or upgrade planned status into confirmed delivery.
          ja: 投影は無から内容を追加したり、planned 状態を確認済み配達へ昇格したりできません。
        source_claims:
          - claim-visible-context-provider-truncation
          - claim-visible-context-local-planning
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-visible-context-provider-truncation
      - claim-visible-context-local-planning
    distinct_fact_rationale:
      zh: 此关系表达包到可见投影的有界派生，不表达包中每项的来源、模型生成、模型注意力或完整历史。
      en: This relation expresses bounded derivation from a package to a visible projection, not item provenance, model generation, model attention, or complete history.
      ja: この関係はパッケージから可視投影への有界導出を表し、項目来歴、モデル生成、モデル注意、完全履歴を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ContextPackage
