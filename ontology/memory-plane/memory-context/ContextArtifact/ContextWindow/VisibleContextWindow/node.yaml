          en: visible-88 removes a restricted slot before crossing from the internal retrieval domain to an external model domain.
          ja: visible-88 は内部検索域から外部model域へ渡る前に restricted slotを除去します。
        field_values: {}
        related_node_ids:
          - VisibleContextWindow
          - TrustBoundary
        related_relation_ids:
          - context_window_crosses_trust_boundary
        expected_result:
          zh: 查询返回边界、消费者和安全处置。
          en: The query returns the boundary, consumer, and safety disposition.
          ja: 照会は境界・consumer・安全処置を返します。
        why_valid_or_invalid:
          zh: 来源域、目标域、跨域传递以及属性授权处置均有独立记录。
          en: Both cross-domain transfer and attribute authorization are recorded.
          ja: 領域間移送と属性認可が共に記録されています。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-visible-context-window-012
      - id: context_window_crosses_trust_boundary-example-boundary-001
        kind: boundary
        labels:
          zh: context window crosses trust boundary边界例
          en: "Boundary case: context window crosses trust boundary"
          ja: context window crosses trust boundaryの境界例
        scenario_id: null
        descriptions:
