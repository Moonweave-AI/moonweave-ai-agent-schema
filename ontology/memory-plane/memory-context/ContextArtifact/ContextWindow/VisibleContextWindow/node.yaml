source_claims:
  - id: claim-visible-context-window-001
    source: eng-proto-mcp-spec
    supports: MCP specifies a host-client-server architecture, capability negotiation, prompt-returned messages, and URI-addressed resources supplied as context. VisibleContextWindow is Moonweave's immutable record of the exact slots and extents a particular model call or audience actually received after policy processing; it is not an MCP type.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-002
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents that runtime context is not model-visible unless added to prompts or messages, while offloading and summarization alter active working context. Moonweave records the final receiver-specific result as VisibleContextWindow, distinct from a candidate ContextPackage or OutputWindow specification.
    locator: Context engineering in Deep Agents > Runtime context and model-visible input; Context compression
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-003
    source: eng-proto-mcp-spec
    supports: MCP defines negotiated client-server boundaries and server-provided prompts and resources that a host may expose to an LLM. The example records Moonweave's post-policy snapshot of what crossed such an application trust boundary; it is not an MCP protocol object.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-004
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents states that runtime context is not automatically visible to the model unless logic adds it to messages or the system prompt, and that compression changes active context. visible-window-call-88 records the resulting actual model-visible snapshot.
    locator: Context engineering in Deep Agents > Runtime context and model-visible input; Context compression
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-005
    source: eng-proto-mcp-spec
    supports: MCP's architecture separates host, client, and server responsibilities and requires negotiated capabilities before feature use. Moonweave represents such a changed-assumption location separately from the context snapshot admitted across it.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-006
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents runtime context propagation, subagent context isolation, and filesystem permission rules as controls over visibility. The rule boundary and the resulting visible content snapshot remain different ontology objects.
    locator: Context engineering in Deep Agents > Runtime context and model-visible input; Context compression
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-007
    source: eng-proto-mcp-spec
    supports: MCP prompt results and resources expose structured content across a negotiated protocol boundary. Moonweave's instance fields bind the exact recipient, call, members, and extents that were actually disclosed; MCP does not mandate this snapshot schema.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-008
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes per-run configuration from information actually injected into messages or prompts. The synthetic recipient and membership fields make the latter verifiable for one Moonweave call.
    locator: Context engineering in Deep Agents > Runtime context and model-visible input; Context compression
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-visible-context-window-009
    source: eng-fw-langchain-context-engineering
    supports: The named call and post-safety fixed slots instantiate the final model context actually visible to that call.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-010
    source: eng-fw-langchain-context-engineering
    supports: A pre-safety draft is not yet the model context that the consumer actually receives.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-011
    source: eng-fw-langchain-context-engineering
    supports: LangChain defines model context as what goes into each model call and distinguishes it from sources and lifecycle processing; Moonweave specializes the final consumer-visible snapshot as VisibleContextWindow.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-012
    source: eng-security-nist-abac
    supports: The internal-to-external transfer and removal of a restricted slot instantiate an attribute-governed access boundary.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-013
    source: eng-security-nist-abac
    supports: Reordering content inside one domain does not constitute access across a subject-object trust boundary.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-014
    source: eng-security-nist-abac
    supports: NIST ABAC evaluates subject, object, operation, and environment attributes at access boundaries; Moonweave binds the post-decision VisibleContextWindow to the TrustBoundary it crosses.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-015
    source: eng-security-nist-abac
    supports: The token ceiling and absence of restricted content make all declared output-window conditions true.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-016
    source: eng-security-nist-abac
    supports: A safe content label does not compensate for violating another mandatory condition such as maximum length.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-visible-context-window-017
    source: eng-security-nist-abac
    supports: NIST ABAC requires evaluating applicable attributes and policy conditions before access is granted; Moonweave applies that conformance discipline to the consumer-visible window and OutputWindow specification.
    locator: NIST SP 800-162 > Section 2 > ABAC subject, object, operation, and environment attributes
    evidence_kind: design-inference
