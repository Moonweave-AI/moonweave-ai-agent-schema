relations:
  - id: context_window_crosses_trust_boundary
    predicate: context_window_crosses_trust_boundary
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: context window crosses trust boundary
      en: context window crosses trust boundary
      ja: context window crosses trust boundary
    definitions:
      zh: context_window_crosses_trust_boundary 表示 VisibleContextWindow 的内容从一个信任域传递到另一个明确调用者域，并已按该边界的主体、对象、操作和环境属性完成授权处理。
      en: context_window_crosses_trust_boundary states that VisibleContextWindow content passes from one trust domain to a named consumer domain after authorization using subject, object, operation, and environment attributes for that boundary.
      ja: context_window_crosses_trust_boundary は VisibleContextWindow 内容が信頼域から特定consumer域へ渡り、その境界の主体・対象・操作・環境属性で認可処理済みであることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_context_window_crosses_trust_boundary
      labels:
        zh: 反向：context window crosses trust boundary
        en: is target of context window crosses trust boundary
        ja: 逆方向：context window crosses trust boundary
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: VisibleContextWindow 仍由 info-plane 拥有，TrustBoundary 仍由 safety-plane 拥有；该 governance 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: VisibleContextWindow remains owned by info-plane and TrustBoundary by safety-plane; this governance fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: VisibleContextWindow は info-plane、TrustBoundary は safety-plane に引き続き所有されます。この governance 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 VisibleContextWindow → TrustBoundary 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical VisibleContextWindow → TrustBoundary assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは VisibleContextWindow → TrustBoundary の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
