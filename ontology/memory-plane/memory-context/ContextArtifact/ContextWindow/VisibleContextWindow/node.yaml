          en: window-internal is only reordered inside one run and crosses no trust domain.
          ja: window-internal は同一実行内で整列されるだけで信頼域を跨ぎません。
        field_values: {}
        related_node_ids:
          - VisibleContextWindow
          - TrustBoundary
        related_relation_ids:
          - context_window_crosses_trust_boundary
        expected_result:
