schema: moonweave.ai/ontology-node/v1
id: VisibleContextWindow
kind: concept
status: accepted
labels:
  zh: 可见上下文窗口
  en: visible context window
  ja: 可視コンテキストウィンドウ
semantics:
  short_definition:
    zh: 选择、排序、容量裁剪和安全处理完成后，特定调用方实际收到的上下文窗口快照。
    en: The context-window snapshot actually received by a caller after selection, ordering, capacity trimming, and safety handling.
    ja: 選択・順序付け・容量裁剪・安全処理後、特定呼出し側が実際に受け取るコンテキスト窓スナップショットです。
  definition:
    zh: 可见上下文窗口是一种 ContextWindow；其种差是：对指定模型调用、智能体或受众，选择、排序、容量裁剪和安全处理已经结束，所含槽位及范围就是该调用方实际可见的最终快照。它不是 OutputWindow 选择规范，也不是处理前的候选 ContextPackage。
    en: A VisibleContextWindow is a ContextWindow for which selection, ordering, capacity trimming, and safety handling are complete for a specified model call, agent, or audience, so its slots and extents are the final snapshot actually visible to that caller. It is neither an OutputWindow specification nor a pre-processing candidate ContextPackage.
    ja: VisibleContextWindow は ContextWindow の一種で、指定モデル呼出し・エージェント・受信者について選択・順序・容量裁剪・安全処理が完了し、そのスロットと範囲が実際に見える最終スナップショットです。OutputWindow 仕様でも処理前 ContextPackage でもありません。
  why_needed:
    zh: 它让系统证明某个接收方实际看到了什么，并把候选输入、窗口规范和跨信任边界后的最终内容分开。
    en: It proves what a recipient actually saw and separates candidate input, window specification, and final content after a trust-boundary transition.
    ja: 受信者が実際に見た内容を証明し、候補入力、窓仕様、信頼境界通過後の最終内容を分離します。
  includes:
    - zh: 纳入绑定 audience=model-call-88、最终槽位清单、实际令牌数和安全处置结果的窗口快照。
      en: Includes window snapshots bound to audience=model-call-88 with final slot list, actual token count, and safety dispositions.
      ja: audience=model-call-88、最終スロット一覧、実トークン数、安全処置結果に結び付く窓スナップショットを含みます。
  excludes:
    - zh: 排除 HeadTailWindow 等选择规范、处理前 ContextPackage、模型容量 ContextBudget，以及仅标识边界的 TrustBoundary。
      en: Excludes HeadTailWindow and other selection specifications, a pre-processing ContextPackage, model-capacity ContextBudget, and a TrustBoundary that merely identifies a boundary.
      ja: HeadTailWindow 等の選択仕様、処理前 ContextPackage、モデル容量 ContextBudget、境界だけを示す TrustBoundary を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: VisibleContextWindow-example-positive-001
    kind: positive
    labels:
      zh: 可见上下文窗口正例
      en: Positive example of visible context window
      ja: 可視コンテキストウィンドウの正例
    scenario_id: null
    descriptions:
      zh: visible-window-call-88 固化模型调用 call-88 在租户信任边界之后实际收到的九个槽位及精确范围；被拒绝的 payroll 证据和被裁去的 evidence-2 均不在快照中。
      en: visible-window-call-88 fixes the nine slots and exact extents actually received by model call call-88 after the tenant trust boundary; rejected payroll evidence and trimmed evidence-2 are absent from the snapshot.
      ja: visible-window-call-88 はテナント信頼境界後にモデル呼出し call-88 が実際に受けた九スロットと正確な範囲を固定し、拒否 payroll 証拠と裁断 evidence-2 は含みません。
    field_values:
      context_artifact_id: visible-window-call-88
      artifact_revision: "1"
      content_digest: sha256:visible-window-call-88-r1
      consumer_ref: call-88
      source_refs:
        - ctx-window-88
        - disclosure-decision:call-88
        - trimming-decision:trim-17
    related_node_ids:
      - VisibleContextWindow
      - TrustBoundary
    related_relation_ids:
      - context_window_crosses_trust_boundary
    expected_result:
      zh: 该运行可查询 VisibleContextWindow 以及方向保持不变的事实 context_window_crosses_trust_boundary。
      en: The run can query VisibleContextWindow together with direction-preserving fact context_window_crosses_trust_boundary.
      ja: この実行では VisibleContextWindow と方向を保持した事実 context_window_crosses_trust_boundary を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、context_window_crosses_trust_boundary 的 canonical 方向、概念定义和可用字段值。
      en: Selection, ordering, trimming, and safety handling are complete, so the recorded membership is the receiver's actual snapshot rather than a candidate package or a window-selection specification.
      ja: このシナリオは実際の運用文脈、context_window_crosses_trust_boundary の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-visible-context-window-003
      - claim-visible-context-window-004
  - id: VisibleContextWindow-example-boundary-001
    kind: boundary
    labels:
      zh: 可见上下文窗口边界例
      en: Boundary case for visible context window
      ja: 可視コンテキストウィンドウの境界例
    scenario_id: null
    descriptions:
      zh: tenant-to-model-boundary 描述身份、权限和可见性假设改变的位置，却不包含任何槽位或调用快照；它约束 visible-window-call-88 的形成，但自身是 TrustBoundary 规范。
      en: tenant-to-model-boundary describes where identity, authority, and visibility assumptions change but contains no slots or call snapshot. It constrains formation of visible-window-call-88 while remaining a TrustBoundary specification.
      ja: tenant-to-model-boundary は識別・権限・可視性の前提が変わる位置を示しますが、スロットや呼出しスナップショットを含みません。visible-window-call-88 の形成を制約する TrustBoundary 仕様です。
    field_values: {}
    related_node_ids:
      - VisibleContextWindow
      - TrustBoundary
    related_relation_ids:
      - context_window_crosses_trust_boundary
    expected_result:
      zh: TrustBoundary 保持其原有类型，验证器不得凭关系共现把它提升为 VisibleContextWindow。
      en: TrustBoundary retains its own type; validation must not promote it to VisibleContextWindow from relation co-occurrence.
      ja: TrustBoundary は元の型を維持し、関係の共起だけで VisibleContextWindow へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 context_window_crosses_trust_boundary 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary is a reusable specification of changed assumptions; the visible window is an immutable information snapshot for one receiver after those rules are applied. Crossing links rather than merges them.
      ja: 境界例は実在する対照ノードを示し、context_window_crosses_trust_boundary の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-visible-context-window-005
      - claim-visible-context-window-006
  - id: VisibleContextWindow-example-instance-001
    kind: instance
    labels:
      zh: 可见上下文窗口结构化实例
      en: Structured instance of visible context window
      ja: 可視コンテキストウィンドウの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: visible-window-call-88 是安全过滤和容量裁剪完成后真正交付给 call-88 的九个有序槽位快照；未授权薪资片段和被裁掉的 evidence-2 均不在其中。
      en: visible-window-call-88 is the ordered nine-slot snapshot actually delivered to call-88 after safety filtering and capacity trimming; the unauthorized payroll chunk and trimmed evidence-2 are absent.
      ja: visible-window-call-88 は安全filterと容量裁断後に call-88 へ実際に渡された9個の順序付きslot snapshotで、未認可給与chunkと裁断済み evidence-2 は含みません。
    field_values: {}
    related_node_ids:
      - VisibleContextWindow
    related_relation_ids: []
    expected_result:
      zh: 该信息实例归入 VisibleContextWindow，并以最终槽位成员关系回答“该调用实际看见了什么”。
      en: The information instance is classified as VisibleContextWindow and answers “what did this call actually see?” through its final slot membership.
      ja: この情報实例は VisibleContextWindow に分類され、最終 slot 成員関係により「この呼出しが実際に何を見たか」に答えます。
    why_valid_or_invalid:
      zh: 实例描述的是指定接收者的最终可见快照，而不是组装规则、候选列表或信任边界；缺席项也由已完成的过滤与裁剪解释。
      en: It describes the final visible snapshot for a named receiver, not an assembly rule, candidate list, or trust boundary, and completed filtering and trimming explain the absent items.
      ja: 特定受信者の最終可視 snapshot を記述し、組立規則・候補一覧・TrustBoundary ではなく、欠落項目も完了済みfilterと裁断で説明されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-visible-context-window-007
      - claim-visible-context-window-008
