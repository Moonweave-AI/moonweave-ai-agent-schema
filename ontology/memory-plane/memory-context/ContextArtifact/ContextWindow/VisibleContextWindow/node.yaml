schema: moonweave.ai/ontology-node/v1
id: VisibleContextWindow
kind: concept
labels:
  zh: 可见上下文窗口
  en: Visible context window
  ja: 可視コンテキスト窓
semantics:
  short_definition:
    zh: 面向调用方或审计者展示的 ContextWindow 可见子集视图。
    en: A visibility-filtered view of ContextWindow exposed to callers or auditors.
    ja: caller/auditor 向けに公開される ContextWindow の visibility-filtered view。
  definition:
    zh: VisibleContextWindow 是一种 ContextWindow；其种差是在完整 ContextWindow 基础上应用可见性策略，隐藏内部推理、敏感字段或未授权槽位，仅暴露允许查看的有序槽位子集。它映射 Claude Code /context 的用户可见 token 分类，但不改变实际送入模型的 ContextPackage。
    en: VisibleContextWindow is a ContextWindow whose differentia applies a visibility policy over the full window, hiding internal reasoning, sensitive fields, or unauthorized slots and exposing only the permitted ordered slot subset. It maps Claude Code /context user-visible token categories without changing the ContextPackage actually sent to the model.
    ja: VisibleContextWindow は full ContextWindow に visibility policy を適用し internal reasoning/敏感 field/未授权 slot を隠し許可 ordered slot subset のみ公開する ContextWindow。Claude /context の user-visible token 分類に写像するが model へ送る ContextPackage は変えない。
  why_needed:
    zh: 输入窗口与可见披露窗口分离后，系统可审计完整输入而不向用户泄露 system prompt 全文或跨租户记忆。
    en: Separating input window from visible disclosure lets systems audit full input without exposing complete system prompts or cross-tenant memory to users.
    ja: input window と visible disclosure を分離し full input を監査しつつ system prompt 全文/cross-tenant memory を user に漏らさない。
  includes:
    - zh: 纳入对完整窗口应用 redaction 或 visibility filter 后的展示视图实例。
      en: Includes display-view instances after redaction or visibility filters on the full window.
      ja: full window に redaction/visibility filter 適用後の display view instance。
  excludes:
    - zh: 排除 OutputWindow（面向最终用户输出的选择规范）与未过滤的完整 ContextWindow（当二者身份相同时仅记录 visibility 差异）。
      en: Excludes OutputWindow (output-selection specification for end users) and unfiltered ContextWindow when identity differs only by visibility metadata.
      ja: OutputWindow（end user 向け output selection 仕様）と visibility metadata のみ異なる unfiltered ContextWindow を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Claude Code /context 展示 system、tools、messages、rules 各类 token 占用但不暴露完整 system prompt 给终端用户；LangChain isolate 策略中 sub-agent scratchpad 对父图不可见；Cursor 开发者可见 @ 引用列表但不一定可见完整 semantic search 评分明细。
    en: Claude Code /context shows token usage by system, tools, messages, and rules without exposing full system prompts to end users; LangChain isolate keeps sub-agent scratchpads invisible to parent graphs; Cursor developers see @ reference lists but not necessarily full semantic search score details.
    ja: Claude /context は system/tools/messages/rules token 使用量を表示するが end user に full system prompt 非公開。LangChain isolate は sub-agent scratchpad を parent から不可視。Cursor developer は @ 参照 list 可視だが semantic search score 詳細は非必須。
  typical_input:
    - description: Claude Code /context visibility breakdown
      format: |
        /context
        # System prompt: 4,096 tokens (details hidden)
        # Tools: 2,400 tokens
        # Messages: 18,200 tokens
        # Rules: 800 tokens
      source_claims: [claim-visible-window-claude]
  typical_output: []
  reference_implementations:
    - name: Claude Code /context
      url: https://code.claude.com/docs/en/context-window
      description: User-visible token category breakdown.
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Isolate strategy hides sub-agent state.
structure:
  identity_keys:
    - context_artifact_id
    - visibility_policy_ref
  fields:
    - id: underlying_window_ref
      labels:
        zh: 底层窗口引用
        en: Underlying window reference
        ja: underlying window 参照
      definitions:
        zh: 引用被过滤前的完整 ContextWindow。
        en: References the full ContextWindow before visibility filtering.
        ja: visibility filtering 前の full ContextWindow を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: context-window:88
      allowed_values: []
      source_claims:
        - claim-visible-window-underlying
    - id: visibility_policy_ref
      labels:
        zh: 可见性策略引用
        en: Visibility policy reference
        ja: visibility policy 参照
      definitions:
        zh: 引用决定哪些槽位角色或字段对当前受众可见的策略或规则集。
        en: References the policy or rule set deciding which slot roles or fields are visible to the current audience.
        ja: 現在 audience にどの slot role/field を可視にするか決める policy/rule set を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: visibility-policy-developer
      allowed_values: []
      source_claims:
        - claim-visible-window-policy
    - id: hidden_slot_ordinals
      labels:
        zh: 隐藏槽位序位
        en: Hidden slot ordinals
        ja: hidden slot ordinals
      definitions:
        zh: 相对底层窗口被 redact 或隐藏的槽位序位列表。
        en: List of slot ordinals redacted or hidden relative to the underlying window.
        ja: underlying window 相対で redact/hidden された slot ordinal list。
      datatype: integer-list
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: [1, 7]
      allowed_values: []
      source_claims:
        - claim-visible-window-hidden
  constraints: []
  required_relations: []
examples:
  - id: VisibleContextWindow-example-claude-context
    labels:
      zh: Claude /context 可见视图
      en: Claude /context visible view
      ja: Claude /context 可視 view
    descriptions:
      zh: visible-window-88 基于 window-88：slot 1（system_instruction 全文）对开发者 redact，仅显示 4,096 token 计数；messages 与 tools 槽位完整可见。
      en: visible-window-88 derives from window-88; slot 1 (full system_instruction) is redacted for developers showing only 4,096 token count; message and tool slots remain fully visible.
      ja: visible-window-88 は window-88 派生。slot 1（full system_instruction）は developer 向け redact し 4,096 token カウントのみ表示。message/tool slot は full 可視。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: /context
    field_values:
      context_artifact_id: visible-window-88
      underlying_window_ref: context-window:88
      hidden_slot_ordinals: [1]
    related_node_ids:
      - VisibleContextWindow
      - ContextWindow
    related_relation_ids: []
    source_claims:
      - claim-visible-window-claude
  - id: VisibleContextWindow-example-langchain-isolate
    labels:
      zh: LangGraph 隔离草稿不可见
      en: LangGraph isolated scratchpad invisible
      ja: LangGraph 分離 scratchpad 不可視
    descriptions:
      zh: 子图 state.scratchpad 占 slot 8–12 对父图 VisibleContextWindow 隐藏；父图仅见子图返回的 1–2k token summary slot。
      en: Subgraph state.scratchpad in slots 8–12 is hidden from parent VisibleContextWindow; parent sees only the 1–2k token summary slot returned by subgraph.
      ja: subgraph state.scratchpad（slot 8–12）は parent VisibleContextWindow から hidden。parent は subgraph 返却 1–2k token summary slot のみ可視。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: isolate strategy
    field_values:
      hidden_slot_ordinals: [8, 9, 10, 11, 12]
    related_node_ids:
      - VisibleContextWindow
    related_relation_ids: []
    source_claims:
      - claim-visible-window-isolate
  - id: VisibleContextWindow-example-cursor-dev-view
    labels:
      zh: Cursor 开发者可见引用
      en: Cursor developer-visible references
      ja: Cursor developer 可視参照
    descriptions:
      zh: Cursor UI 向开发者展示已解析 @ 文件列表与 recent files，但 semantic search 内部 score vector 对 UI 隐藏，对应 hidden_slot_ordinals 为空、metadata-only redaction。
      en: Cursor UI shows developers parsed @ file lists and recent files while hiding internal semantic search score vectors; metadata-only redaction with empty hidden_slot_ordinals.
      ja: Cursor UI は developer に @ file list/recent files 表示。semantic search 内部 score vector は hidden。metadata-only redaction。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: developer context view
    field_values:
      visibility_policy_ref: visibility-policy-developer
    related_node_ids:
      - VisibleContextWindow
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-visible-window-cursor
  - id: VisibleContextWindow-example-not-package
    labels:
      zh: 可见窗口非输入包
      en: Visible window is not input package
      ja: visible window は input package ではない
    descriptions:
      zh: package-88 包含完整 ContextWindow 与 exclusion 审计；visible-window-88 仅是展示视图，不改变送入模型的 ContextPackage content_digest。
      en: package-88 contains full ContextWindow and exclusion audit; visible-window-88 is display-only and does not change ContextPackage content_digest sent to the model.
      ja: package-88 は full ContextWindow/exclusion audit 含む。visible-window-88 は display のみで model へ送る ContextPackage content_digest は変えない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - VisibleContextWindow
      - ContextPackage
    related_relation_ids: []
    source_claims:
      - claim-visible-window-design
parent_relation:
  id: VisibleContextWindow-is_a-ContextWindow
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文窗口
    en: is a context window
    ja: コンテキスト窓の一種
  definitions:
    zh: 每个 VisibleContextWindow 都是 ContextWindow；其种差是应用可见性策略后的展示子集，底层完整窗口仍可审计。
    en: Every VisibleContextWindow is a ContextWindow distinguished as a visibility-filtered display subset while the underlying full window remains auditable.
    ja: すべての VisibleContextWindow は ContextWindow で visibility policy 適用後 display subset という種差。underlying full window は監査可能。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-visible-window-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-claude-code-context
    title: Explore the context window
    publisher: Anthropic
    url: https://code.claude.com/docs/en/context-window
    source_type: official-doc
    relevance: /context user-visible breakdown.
  - id: src-langchain-context-engineering
    title: Context engineering in agents
    publisher: LangChain
    url: https://docs.langchain.com/oss/python/langchain/context-engineering
    source_type: official-doc
    relevance: Isolate hides sub-agent context from parent view.
  - id: src-cursor-context
    title: Cursor Agent Search and Context
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: Developer-visible @ reference list.
  - id: src-memory-context-design
    title: Moonweave memory-context module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Visible window versus input package.
source_claims:
  - id: claim-visible-window-claude
    source: src-claude-code-context
    supports: /context exposes category token counts with redacted system details.
    locator: /context
    evidence_kind: official
    confidence: high
  - id: claim-visible-window-isolate
    source: src-langchain-context-engineering
    supports: Isolate strategy hides sub-agent scratchpad from parent visibility.
    locator: Isolate
    evidence_kind: official
    confidence: high
  - id: claim-visible-window-cursor
    source: src-cursor-context
    supports: Developer UI shows references without internal search score vectors.
    locator: Agent context
    evidence_kind: design-inference
    confidence: medium
  - id: claim-visible-window-design
    source: src-memory-context-design
    supports: VisibleContextWindow is display view, not model input package.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-visible-window-underlying
    source: src-memory-context-design
    supports: underlying_window_ref links to full auditable window.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-visible-window-policy
    source: src-memory-context-design
    supports: visibility_policy_ref governs redaction rules.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-visible-window-hidden
    source: src-claude-code-context
    supports: hidden_slot_ordinals records redacted positions.
    locator: /context
    evidence_kind: design-inference
    confidence: medium
