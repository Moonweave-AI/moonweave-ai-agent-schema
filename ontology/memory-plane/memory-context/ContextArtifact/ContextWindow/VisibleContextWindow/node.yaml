schema: moonweave.ai/ontology-node/v1
id: VisibleContextWindow
kind: concept
status: accepted
labels:
  zh: 可见上下文窗口
  en: Visible context window
  ja: 可視コンテキストウィンドウ
semantics:
  short_definition:
    zh: 记录某次调用在窗口策略后计划或确认可见的有序输入投影。
    en: An ordered input projection recorded as planned or confirmed visible for one call after window policy is applied.
    ja: ウィンドウ方針適用後、一回の呼び出しで計画または確認された可視入力投影を記録します。
  definition:
    zh: >
      VisibleContextWindow 是 ContextWindow 的调用级可见性投影，列出 ContextPackage 中在预算、排序、裁剪和提供方溢出策略之后仍计划或确认可见的 ContextArtifact。它把“容量允许多少”与“该次调用实际或预期看到了哪些项”分开。它不等于完整 ContextPackage，因为提供方或本地策略可能在发送或运行时截断、摘要或移除某些项；它也不等于 Conversation History，因为历史只是一种来源。visibility_status 必须说明此投影是本地计划、提供方确认还是由调用审计确认。只有后两者才可支持关于实际提供给模型的主张，且它们仍不证明模型在生成中利用了每一项。
    en: >
      A VisibleContextWindow is a call-level visibility projection of a ContextWindow. It lists ContextArtifacts from a ContextPackage that remain planned or confirmed visible after budget, ordering, trimming, and provider overflow policy. It separates “how much capacity allows” from “which items this call is expected or known to see.” It is not necessarily the complete ContextPackage because provider or local policy can truncate, summarize, or remove items at send or run time. Nor is it Conversation History, which is only one source type. visibility_status must say whether the projection is locally planned, provider confirmed, or invocation-audited. Only the latter two can support a claim about material actually supplied to the model, and neither proves the model used every item during generation.
    ja: >
      VisibleContextWindow は ContextWindow の呼び出しレベル可視性投影です。予算、順序付け、トリミング、プロバイダーのオーバーフロー方針後に計画または確認して可視のままの ContextPackage 内 ContextArtifact を列挙します。「容量がどれだけ許すか」と「この呼び出しが何を見る予定または既知か」を分けます。送信時または実行時にプロバイダー・ローカル方針が切り詰め、要約、除去できるため、必ずしも完全な ContextPackage ではありません。Conversation History でもなく、それは一つの情報源種別に過ぎません。visibility_status は投影がローカル計画、プロバイダー確認、呼び出し監査確認のどれかを示します。後二者だけがモデルに実際に供給した材料の主張を支えますが、どちらもモデルが生成中に各項目を使ったことを証明しません。
  why_needed:
    zh: 长上下文系统常在客户端包和提供方实际可接受输入之间发生截断；显式可见投影可避免把计划输入、存储历史和模型实际输入混为一谈。
    en: Long-context systems can truncate between a client package and provider-accepted input. An explicit visible projection avoids conflating planned input, stored history, and actual model input.
    ja: 長文脈システムでは、クライアントパッケージとプロバイダー受理入力の間で切り詰めが起こり得ます。明示的な可視投影により、計画入力、保存履歴、実モデル入力を混同しません。
  includes:
    - zh: 关联窗口和包、可见工件顺序、输入 token 数、状态、溢出效果和确认引用。
      en: Linked window and package, visible-artifact order, input tokens, status, overflow effect, and confirmation reference.
      ja: 関連ウィンドウとパッケージ、可視工件順序、入力トークン数、状態、オーバーフロー効果、確認参照。
  excludes:
    - zh: 全部候选、完整历史、窗口容量配置、模型注意力或生成时使用每项的断言。
      en: All candidates, complete history, window-capacity configuration, and assertions about model attention or use of every item during generation.
      ja: 全候補、完全履歴、ウィンドウ容量構成、モデル注意や生成中の各項目利用に関する主張。
  semantic_kind: entity
  aliases:
    - model-visible input view
    - post-truncation context view
engineering:
  explanation:
    zh: >
      可见窗口应在本地包定稿后和提供方响应或审计事件后分别可被记录。OpenAI Realtime 文档说明超限时最旧消息不被包含，并可采用 retention ratio；因此本地发送的包不能总被视为提供方最终可见序列。LangGraph 的裁剪在调用前发生，可产生 planned 投影。实现必须在状态字段中区分 planned 和 confirmed，避免仅根据本地数组宣称模型已收到全部内容。
    en: >
      Record a visible window both after local package finalization and, where available, after provider response or audit events. The OpenAI Realtime reference says oldest messages are not included on overflow and supports retention ratio, so a locally sent package cannot always be regarded as the provider's final visible sequence. LangGraph trimming happens before invocation and can produce a planned projection. Implementations must distinguish planned from confirmed in state rather than claiming full delivery from a local array alone.
    ja: >
      ローカルパッケージ確定後と、利用可能ならプロバイダー応答または監査イベント後の両方で可視ウィンドウを記録します。OpenAI Realtime リファレンスは、超過時に最古メッセージが含まれないことと retention ratio を示しているため、ローカル送信パッケージを常にプロバイダーの最終可視列と見なせません。LangGraph の裁断は呼び出し前に起き、planned 投影を作れます。実装はローカル配列だけから全配達を主張せず、状態で planned と confirmed を区別しなければなりません。
  typical_input:
    - description: Locally finalized package and its calculated window.
      format: |
        {
          "package_ref": "ctx-pkg-support-01",
          "window_ref": "ctx-window-support-01",
          "ordered_artifact_refs": ["ctx-art-system-1", "ctx-art-summary-9", "ctx-art-user-22"],
          "total_input_tokens": 6940
        }
    - description: Provider overflow behavior that can change visibility.
      format: |
        {
          "truncation": {"type": "retention_ratio", "retention_ratio": 0.8}
        }
  typical_output:
    - description: Planned or confirmed view of items that survive into the call context.
      format: |
        {
          "visible_window_id": "ctx-visible-support-01",
          "visibility_status": "planned",
          "visible_artifact_refs": ["ctx-art-system-1", "ctx-art-summary-9", "ctx-art-user-22"],
          "visible_input_tokens": 6940,
          "overflow_effect": "none"
        }
  reference_implementations:
    - name: OpenAI Realtime API truncation configuration
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents dropping oldest messages on input overflow and retention-ratio behavior.
    - name: LangGraph conversation-history management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents trimming and summarizing message state before the model call.
  source_claims:
    - claim-visible-context-provider-truncation
    - claim-visible-context-local-planning
structure:
  identity_keys:
    - artifact_id
    - window_id
    - visible_window_id
  fields:
    - id: visible_window_id
      labels:
        zh: 可见窗口标识
        en: visible window ID
        ja: 可視ウィンドウ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个窗口和包组合在特定可见性状态下的投影，不复用为容量窗口或包的标识。
        en: Identifies one projection of a window-package combination in a particular visibility state and is not reused as the capacity-window or package ID.
        ja: 特定可視性状態におけるウィンドウ・パッケージ組合せの一つの投影を識別し、容量ウィンドウやパッケージの ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-visible-[A-Za-z0-9._-]+$'
      example_value: ctx-visible-support-01
      source_claims:
        - claim-visible-context-local-planning
    - id: window_ref
      labels:
        zh: 容量窗口引用
        en: capacity window reference
        ja: 容量ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向约束此投影的 ContextWindow，提供可用预算和溢出策略。
        en: Points to the ContextWindow constraining this projection and providing usable budget and overflow strategy.
        ja: この投影を制約し、利用可能予算とオーバーフロー方針を提供する ContextWindow を指します。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-visible-context-provider-truncation
    - id: package_ref
      labels:
        zh: 上下文包引用
        en: context package reference
        ja: コンテキストパッケージ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向此投影的来源 ContextPackage；可见项必须能追溯到该包或其明确刷新版本。
        en: Points to the source ContextPackage for this projection. Visible items must trace to that package or its explicitly refreshed version.
        ja: この投影の情報源 ContextPackage を指します。可視項目はそのパッケージまたは明示的に更新された版へ追跡できなければなりません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-01
      source_claims:
        - claim-visible-context-local-planning
    - id: visible_artifact_refs
      labels:
        zh: 可见工件引用
        en: visible artifact references
        ja: 可視工件参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按可见渲染顺序列出包中存活的工件；它不能包含未入包候选或因溢出移除的工件。
        en: Lists in visible rendering order the artifacts surviving from the package. It cannot contain candidates never admitted to the package or artifacts removed by overflow.
        ja: パッケージから生き残る工件を可視描画順で列挙します。パッケージへ入っていない候補やオーバーフローで除去された工件は含められません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
        - ctx-art-user-22
      source_claims:
        - claim-visible-context-provider-truncation
    - id: visible_input_tokens
      labels:
        zh: 可见输入 token 数
        en: visible input tokens
        ja: 可視入力トークン数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该投影中可见工件的 token 总数，必须不超过关联窗口可用预算。
        en: The total tokens of visible artifacts in this projection and must not exceed the linked window's usable budget.
        ja: この投影における可視工件の総トークン数であり、関連ウィンドウの利用可能予算を超えてはなりません。
      allowed_values: []
      pattern: null
      example_value: 6940
      source_claims:
        - claim-visible-context-provider-truncation
    - id: visibility_status
      labels:
        zh: 可见性状态
        en: visibility status
        ja: 可視性状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分本地计划、提供方确认和调用审计确认；仅确认状态支持实际输入的强断言。
        en: Distinguishes local planning, provider confirmation, and invocation-audit confirmation. Only confirmed states support strong claims about actual input.
        ja: ローカル計画、プロバイダー確認、呼び出し監査確認を区別します。確認状態だけが実入力について強い主張を支えます。
      allowed_values:
        - planned
        - provider_confirmed
        - invocation_audited
      pattern: null
      example_value: planned
      source_claims:
        - claim-visible-context-provider-truncation
    - id: overflow_effect
      labels:
        zh: 溢出效果
        en: overflow effect
        ja: オーバーフロー効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明在该投影前是否没有溢出、发生裁剪、发生摘要替换或效果未知；它不说明被丢弃内容不存在。
        en: States whether no overflow occurred, trimming occurred, summary replacement occurred, or effect is unknown before this projection. It does not state that dropped content does not exist.
        ja: この投影前にオーバーフローなし、トリミング、要約置換、効果不明のどれかを示します。落とされた内容が存在しないことは示しません。
      allowed_values:
        - none
        - trimmed
        - summarized_then_trimmed
        - provider_effect_unknown
      pattern: null
      example_value: none
      source_claims:
        - claim-visible-context-provider-truncation
    - id: visibility_evidence_ref
      labels:
        zh: 可见性确认引用
        en: visibility evidence reference
        ja: 可視性確認参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当状态为提供方确认或调用审计时，指向能支持该确认的提供方事件、请求记录或审计记录；计划状态可为空。
        en: When status is provider_confirmed or invocation_audited, points to a provider event, request record, or audit record supporting that confirmation. It may be empty for planned status.
        ja: 状態が provider_confirmed または invocation_audited のとき、確認を支えるプロバイダーイベント、要求記録、監査記録を指します。planned 状態では空にできます。
      allowed_values: []
      pattern: '^(provider-event|request-audit|invocation-audit):[A-Za-z0-9._:-]+$'
      example_value: provider-event:conversation-item-created-01
      source_claims:
        - claim-visible-context-provider-truncation
    - id: artifact_id
      labels:
        zh: 可见窗口工件标识
        en: visible-window artifact ID
        ja: 可視ウィンドウアーティファクト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识承载该可见性投影的 ContextArtifact，而不把投影身份与底层包或窗口身份混为一谈。
        en: Identifies the ContextArtifact carrying this visibility projection without conflating the projection with its package or base-window identity.
        ja: この可視性投影を担う ContextArtifact を識別し、投影をパッケージまたは基底ウィンドウの ID と混同しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-visible-support-01
      source_claims:
        - claim-visible-context-local-planning
    - id: window_id
      labels:
        zh: 基础窗口标识
        en: base window ID
        ja: 基底ウィンドウ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留 ContextWindow 的稳定身份；window_ref 可指向它，但不能替代被继承窗口自身的标识。
        en: Retains the stable identity of the inherited ContextWindow; window_ref may point to it but cannot replace the window's own identifier.
        ja: 継承元 ContextWindow の安定した ID を保持します。window_ref はそれを参照できますが、ウィンドウ自身の ID を置き換えることはできません。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-visible-context-provider-truncation
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出しスコープ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将可见性投影、其容量和其包限定到同一次具体调用，避免跨调用报告可见内容。
        en: Binds the visibility projection, its capacity, and its package to one concrete call, avoiding cross-call visibility claims.
        ja: 可視性投影、その容量、パッケージを一つの具体的な呼び出しに結び付け、呼び出しをまたぐ可視性の主張を避けます。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-visible-context-local-planning
    - id: representation_kind
      labels:
        zh: 工件表示类型
        en: artifact representation kind
        ja: アーティファクト表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定声明 window 表示类型，说明它是容量受限的可见性视图而非原始内容或完整会话。
        en: Declares window as the representation kind, indicating a capacity-bounded visibility view rather than raw content or a complete session.
        ja: 表現種別を window と宣言し、生の内容や完全なセッションではなく容量で制限された可視性ビューであることを示します。
      allowed_values:
        - window
      pattern: null
      example_value: window
      source_claims:
        - claim-visible-context-provider-truncation
    - id: source_refs
      labels:
        zh: 可见窗口依据来源引用
        en: visible-window basis source references
        ja: 可視ウィンドウ根拠の情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出设定窗口容量或解释截断效果所依据的精确提示、记录、文档或工具结果，不以整个历史替代可追溯依据。
        en: Lists exact prompts, records, documents, or tool results that establish capacity or explain the overflow effect, not a whole history as a provenance substitute.
        ja: 容量を設定またはオーバーフローの効果を説明する正確なプロンプト、記録、文書、ツール結果を列挙し、履歴全体を来歴の代用品にしません。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - document:model-profile-support-01
      source_claims:
        - claim-visible-context-provider-truncation
    - id: model_input_limit
      labels:
        zh: 模型输入上限
        en: model input limit
        ja: モデル入力上限
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承基础窗口的模型输入容量上限，用于解释为何该投影不能包含整个包或历史。
        en: Retains the base window's model-input capacity limit used to explain why this projection cannot include the entire package or history.
        ja: この投影がパッケージまたは履歴全体を含められない理由を説明するため、基底ウィンドウのモデル入力容量上限を保持します。
      allowed_values: []
      pattern: null
      example_value: 32768
      source_claims:
        - claim-visible-context-provider-truncation
    - id: output_token_reserve
      labels:
        zh: 输出令牌预留
        en: output token reserve
        ja: 出力トークン予約
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保留基础窗口为模型输出划出的容量，使可见输入投影不会把全部模型上限误报为可用输入。
        en: Retains the base window's reserved output capacity so the projection does not report the entire model limit as usable input.
        ja: 基底ウィンドウの出力予約容量を保持し、投影がモデル上限全体を使用可能な入力として報告しないようにします。
      allowed_values: []
      pattern: null
      example_value: 4096
      source_claims:
        - claim-visible-context-provider-truncation
    - id: usable_input_budget
      labels:
        zh: 可用输入预算
        en: usable input budget
        ja: 利用可能入力予算
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保留基础窗口在输出预留和项目策略后可用于包材料的预算，并可与 visible_input_tokens 对照。
        en: Retains the base window's budget available to package material after output reserve and project policy, for comparison with visible_input_tokens.
        ja: 出力予約とプロジェクト方針の後にパッケージ材料へ使える基底ウィンドウ予算を保持し、visible_input_tokens と比較できるようにします。
      allowed_values: []
      pattern: null
      example_value: 7168
      source_claims:
        - claim-visible-context-local-planning
    - id: counting_method
      labels:
        zh: 计数方法
        en: counting method
        ja: カウント方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留产生该容量判断的令牌计数方法，避免将估算值和提供方计数值混用。
        en: Retains the token-counting method that produced the capacity judgment, avoiding a mix of estimates and provider counts.
        ja: 容量判断を生んだトークン計数方法を保持し、推定値と提供者の計数値を混在させません。
      allowed_values:
        - provider_token_counter
        - approximate_token_counter
      pattern: null
      example_value: provider_token_counter
      source_claims:
        - claim-visible-context-local-planning
    - id: overflow_strategy
      labels:
        zh: 溢出策略
        en: overflow strategy
        ja: オーバーフロー方針
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留基础窗口的溢出处理策略，以解释该投影的 overflow_effect，而不声称策略已删除原始来源。
        en: Retains the base window's overflow handling strategy to explain overflow_effect without claiming that the strategy deleted the raw source.
        ja: overflow_effect を説明するため基底ウィンドウのオーバーフロー処理方針を保持し、その方針が元情報源を削除したと主張しません。
      allowed_values:
        - summarize_then_trim
        - retain_ratio
        - reject_overflow
      pattern: null
      example_value: summarize_then_trim
      source_claims:
        - claim-visible-context-provider-truncation
  constraints:
    - id: visible-context-is-bounded-projection-of-package
      severity: error
      expression_language: plain
      expression: visible_artifact_refs must be an ordered subset of the associated ContextPackage artifacts or a declared refreshed-package projection, and visible_input_tokens must not exceed the associated ContextWindow usable_input_budget.
      explanation:
        zh: 可见窗口是包在容量和溢出规则后的投影，不能凭空加入候选或超出窗口。
        en: A visible window is a package projection after capacity and overflow rules; it cannot add candidates from nowhere or exceed the window.
        ja: 可視ウィンドウは容量・オーバーフロー規則後のパッケージ投影であり、候補を無から追加したり、ウィンドウを超えたりできません。
      source_claims:
        - claim-visible-context-provider-truncation
        - claim-visible-context-local-planning
    - id: visible-context-confirmation-is-evidenced
      severity: error
      expression_language: plain
      expression: visibility_status provider_confirmed or invocation_audited requires nonempty visibility_evidence_ref; planned status must not be used to assert provider delivery or model use.
      explanation:
        zh: 本地计划和外部确认是不同事实，且任何输入确认都不等于模型注意力或推理使用。
        en: Local planning and external confirmation are different facts, and input confirmation never equals model attention or reasoning use.
        ja: ローカル計画と外部確認は別事実です。また入力確認はモデル注意や推論利用と同一ではありません。
      source_claims:
        - claim-visible-context-provider-truncation
