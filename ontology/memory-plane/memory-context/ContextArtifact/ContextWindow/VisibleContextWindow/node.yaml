  - id: VisibleContextWindow-conforms_to-OutputWindow
    predicate: conforms_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: conforms to
      en: conforms to
      ja: conforms to
    definitions:
      zh: VisibleContextWindow-conforms_to-OutputWindow 表示消费者可见窗口满足一份 OutputWindow 规范声明的披露范围、长度和处置条件；符合规范不是属种关系，规范也不是实际窗口。
      en: VisibleContextWindow-conforms_to-OutputWindow states that a consumer-visible window satisfies the disclosure extent, length, and disposition constraints declared by an OutputWindow specification. Conformance is not subtype identity, and the specification is not the actual window.
      ja: VisibleContextWindow-conforms_to-OutputWindow はconsumer可視windowが OutputWindow 仕様の開示範囲・長さ・処置条件を満たすことを表し、適合は下位型でなく仕様は実windowではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_conforms_to
      labels:
        zh: 反向 conforms_to
        en: inverse conforms_to
        ja: 逆 conforms_to
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 可见上下文窗口仍由 memory-context 唯一拥有，输出窗口仍由 info-output-disclosure 唯一拥有；conforms_to 只建立跨域事实，不转移定义权。若该事实触发运行操作，还必须引用适用的 PolicyDecision 或 AuthorizationGrant。
        en: visible context window remains uniquely owned by memory-context and output window by info-output-disclosure; conforms_to establishes a cross-Domain fact without transferring definitional ownership. If the fact triggers a runtime operation, it must also reference an applicable PolicyDecision or AuthorizationGrant.
        ja: 可視コンテキストウィンドウは memory-context、出力ウィンドウは info-output-disclosure に引き続き一意に所有されます。conforms_to は定義所有権を移さずドメイン横断事実だけを確立し、実行操作を起動する場合は適用される PolicyDecision または AuthorizationGrant も参照します。
      protocol_or_resource_context:
