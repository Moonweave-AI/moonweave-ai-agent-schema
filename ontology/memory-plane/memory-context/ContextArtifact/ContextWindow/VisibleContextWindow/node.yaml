source_claims:
  - id: claim-visible-context-provider-truncation
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference states that when conversation tokens exceed the model input limit, oldest messages are not included in model context, and it documents retention-ratio truncation. Moonweave uses VisibleContextWindow to record the resulting planned or evidenced visible subset separately from the full package and history.
    locator: "Realtime truncation configuration: oldest-message exclusion and RetentionRatioTruncation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-visible-context-local-planning
    source: langgraph-memory
    supports: LangGraph documents trimming and summarizing messages before a model invocation. Moonweave treats the post-transformation sequence as a planned visibility projection until provider or invocation evidence confirms what was actually supplied.
    locator: "LangGraph memory guide: message trimming and summarization before model use"
    evidence_kind: ontology-design-inference
    confidence: high