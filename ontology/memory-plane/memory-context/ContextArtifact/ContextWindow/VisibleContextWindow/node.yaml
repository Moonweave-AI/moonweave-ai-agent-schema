    en: is a context window
    ja: コンテキスト窓の一種
  definitions:
    zh: 每个 VisibleContextWindow 都是 ContextWindow；其种差是其选择、排序、容量和安全处理已经针对一个明确调用者完成，槽位就是该调用者实际可见内容。
    en: Every VisibleContextWindow is a ContextWindow distinguished by completed selection, ordering, capacity, and safety handling for a named consumer, so its slots are exactly what that consumer can see.
