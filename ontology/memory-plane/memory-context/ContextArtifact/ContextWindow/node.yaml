schema: moonweave.ai/ontology-node/v1
id: ContextWindow
kind: concept
labels:
  zh: 上下文窗口
  en: Context window
  ja: コンテキスト窓
semantics:
  short_definition:
    zh: 受模型 token 上限约束、由有序 ContextSlot 组成的有界输入投影。
    en: A bounded input projection of ordered ContextSlots under a model token ceiling.
    ja: モデル token 上限下で ordered ContextSlot から成る有界入力投影。
  definition:
    zh: ContextWindow 是一种 ContextArtifact；其种差是从 ContextPackage 投影出的有界、按序模型输入，由 ContextSlot 组成并记录容量单位（通常为 token）、实际消耗与每槽来源。它映射 Anthropic Claude 200K、OpenAI GPT-4 128K 等模型的有效输入窗口，但不包含组装审计或 ContextExclusion 详情。
    en: ContextWindow is a ContextArtifact whose differentia is a bounded ordered model-input projection from a ContextPackage, composed of ContextSlots with capacity unit (usually tokens), actual usage, and per-slot provenance. It maps effective input windows such as Anthropic Claude 200K and OpenAI GPT-4 128K but excludes assembly audit trails and ContextExclusion details.
    ja: ContextWindow は ContextPackage から投影された有界順序モデル入力という種差を持つ ContextArtifact。ContextSlot から成り容量単位（通常 token）・実消費・各 slot 来歴を記録。Anthropic 200K/OpenAI 128K 等の実効入力窓に写像するが assembly audit/ContextExclusion 詳細は含まない。
  why_needed:
    zh: 窗口概念让系统同时查询槽位成员、顺序、token 占用与来源，并区分模型名义容量、检索候选与真正进入 inference 的快照。
    en: The window concept lets systems query slot membership, order, token usage, and provenance while distinguishing nominal model capacity, retrieval candidates, and the snapshot actually entering inference.
    ja: window 概念で slot membership/order/token usage/来歴を同時照会し、名目 model capacity/retrieval candidate/実 inference 入力 snapshot を区別できる。
  includes:
    - zh: 纳入具有 token 上限（如 200K/128K）、已用 token 计数、有序槽位列表的具体窗口实例。
      en: Includes concrete windows with token ceilings (e.g. 200K/128K), used-token counts, and ordered slot lists.
      ja: token ceiling（200K/128K 等）・used token 数・ordered slot list を持つ具体 window instance。
  excludes:
    - zh: 排除 ContextBudget（只声明上限）、ContextSummary（压缩片段）、独立 ContextSlot 与 VisibleContextWindow（可见范围规范）。
      en: Excludes ContextBudget (ceiling only), ContextSummary (compressed fragment), standalone ContextSlot, and VisibleContextWindow (visibility specification).
      ja: ContextBudget（上限のみ）/ContextSummary（圧縮断片）/独立 ContextSlot/VisibleContextWindow（可視範囲仕様）を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Claude 3.5 Sonnet 200K context window、GPT-4o 128K、Cursor 接近 95% 时的 auto-compact 均作用于 ContextWindow 的有效容量；Pichay 将 live window 视为 L1 cache；Context Recycling 的 L0–L1 固定预算工作区是另一窗口实例化。
    en: Claude 3.5 Sonnet 200K, GPT-4o 128K, and Cursor auto-compact near ~95% all govern ContextWindow effective capacity; Pichay treats the live window as L1 cache; Context Recycling L0–L1 fixed-budget workspace is another instantiation.
    ja: Claude 200K/GPT-4o 128K/Cursor 約 95% auto-compact は ContextWindow 実効容量を規定。Pichay は live window を L1 cache、Context Recycling L0–L1 は別 instance 化。
  typical_input:
    - description: Anthropic Claude effective context window with token accounting
      format: |
        {
          "model": "claude-sonnet-4-20250514",
          "context_window_tokens": 200000,
          "system_reservation": 4096,
          "messages_tokens": 87340
        }
      source_claims: [claim-context-window-anthropic]
    - description: OpenAI GPT-4o context window limit
      format: |
        {
          "model": "gpt-4o",
          "context_window_tokens": 128000,
          "max_output_tokens": 16384
        }
      source_claims: [claim-context-window-openai]
  typical_output:
    - description: Moonweave ContextWindow projection with ordered slots
      format: |
        {
          "context_artifact_id": "window-88",
          "capacity_unit": "token",
          "capacity_ceiling": 128000,
          "used_tokens": 87340,
          "slot_count": 7
        }
      source_claims: [claim-context-window-design]
  reference_implementations:
    - name: Anthropic Models
      url: https://docs.anthropic.com/en/docs/about-claude/models
      description: Claude models with up to 200K context windows.
    - name: OpenAI Models
      url: https://platform.openai.com/docs/models
      description: GPT-4o and o-series with 128K context windows.
    - name: Claude Code /context
      url: https://code.claude.com/docs/en/context-window
      description: Live token breakdown by category within the window.
structure:
  identity_keys:
    - context_artifact_id
    - artifact_revision
  fields:
    - id: capacity_unit
      labels:
        zh: 容量单位
        en: Capacity unit
        ja: 容量単位
      definitions:
        zh: 窗口容量与消耗使用的计量单位，通常为 token，也可为 byte 或 item。
        en: Measurement unit for window capacity and usage, usually tokens, optionally bytes or items.
        ja: window capacity/usage の計量単位。通常 token、byte/item も可。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: token
      allowed_values: []
      source_claims:
        - claim-context-window-unit
    - id: capacity_ceiling
      labels:
        zh: 容量上限
        en: Capacity ceiling
        ja: 容量上限
      definitions:
        zh: 该窗口实例允许的最大容量，对应模型 context window 或 effective window 上限。
        en: Maximum capacity for this window instance, mapping to model context window or effective window ceiling.
        ja: この window instance の最大容量。model context window/effective window ceiling に対応。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 200000
      allowed_values: []
      source_claims:
        - claim-context-window-ceiling
    - id: used_tokens
      labels:
        zh: 已用 token
        en: Used tokens
        ja: 使用済み token
      definitions:
        zh: 当前窗口内所有槽位内容按 capacity_unit 计量的实际消耗。
        en: Actual consumption of all slot contents in capacity_unit within the window.
        ja: window 内全 slot 内容の capacity_unit による実消費。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 87340
      allowed_values: []
      source_claims:
        - claim-context-window-used
  constraints:
    - id: context-window-used-not-exceed-ceiling
      severity: error
      expression_language: plain
      expression: used_tokens <= capacity_ceiling
      explanation:
        zh: 已用容量不得超过窗口上限；超出表示组装未完成或计量错误。
        en: Used capacity must not exceed ceiling; overflow indicates incomplete assembly or miscounting.
        ja: used capacity は ceiling 超過不可。超過は assembly 未完了または計量エラー。
      source_claims:
        - claim-context-window-ceiling
  required_relations: []
examples:
  - id: ContextWindow-example-claude-200k
    labels:
      zh: Claude 200K 窗口
      en: Claude 200K window
      ja: Claude 200K window
    descriptions:
      zh: ctx-window-88 映射 Claude Sonnet 200K 有效窗口：6 个槽位（system、tools schema、4 轮 messages、1 个 retrieved chunk），已用 87,340/200,000 tokens，每槽保留 source_ref。
      en: ctx-window-88 maps Claude Sonnet 200K effective window with six slots (system, tools schema, four message turns, one retrieved chunk), 87,340/200,000 tokens used, each slot retaining source_ref.
      ja: ctx-window-88 は Claude Sonnet 200K 実効 window。6 slot（system/tools schema/4 message turns/1 retrieved chunk）、87,340/200,000 tokens 使用、各 slot に source_ref。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/docs/about-claude/models
      version: Claude Sonnet 200K
    field_values:
      context_artifact_id: window-88
      artifact_revision: "1"
      capacity_unit: token
      capacity_ceiling: 200000
      used_tokens: 87340
      slot_count: 6
    related_node_ids:
      - ContextWindow
      - ContextSlot
    related_relation_ids:
      - ContextWindow-has_slot-ContextSlot
    source_claims:
      - claim-context-window-anthropic
  - id: ContextWindow-example-openai-128k
    labels:
      zh: OpenAI 128K 窗口
      en: OpenAI 128K window
      ja: OpenAI 128K window
    descriptions:
      zh: ctx-window-91 映射 GPT-4o 128K 窗口：system prompt 在 slot 1，tool results 在 slot 5–6，user/assistant 交替在 slot 2–4；max_tokens 输出预留不计入 used_tokens。
      en: ctx-window-91 maps GPT-4o 128K with system prompt in slot 1, tool results in slots 5–6, user/assistant alternation in slots 2–4; max_tokens output reservation excluded from used_tokens.
      ja: ctx-window-91 は GPT-4o 128K。slot 1 system、slot 5–6 tool results、slot 2–4 user/assistant 交替。max_tokens 出力予約は used_tokens 外。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/models
      version: GPT-4o 128K
    field_values:
      context_artifact_id: window-91
      capacity_ceiling: 128000
      used_tokens: 62400
    related_node_ids:
      - ContextWindow
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-window-openai
  - id: ContextWindow-example-not-budget
    labels:
      zh: 窗口非预算
      en: Window is not budget
      ja: window は budget ではない
    descriptions:
      zh: budget-32k 只声明 32,000 token 上限与 4,096 system 预留，没有槽位列表或 used_tokens；它是 ContextBudget 规范，不是 ContextWindow。
      en: budget-32k declares a 32,000 token ceiling and 4,096 system reservation without slot list or used_tokens; it is a ContextBudget specification, not ContextWindow.
      ja: budget-32k は 32,000 token ceiling/4,096 system 予約のみで slot list/used_tokens なし。ContextBudget 仕様で ContextWindow ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextWindow
      - ContextBudget
    related_relation_ids: []
    source_claims:
      - claim-context-window-design
  - id: ContextWindow-example-pichay-l1
    labels:
      zh: Pichay L1 窗口
      en: Pichay L1 window
      ja: Pichay L1 window
    descriptions:
      zh: Pichay 将实时 generation window 视为 L1 cache：陈旧 tool output 被 evict 为占位符后 used_tokens 下降；page fault 重新 fault-in 时 window 版本递增。
      en: Pichay treats the live generation window as L1 cache; used_tokens drops after stale tool output is evicted to placeholders; window revision increments on page-fault fault-in.
      ja: Pichay は live generation window を L1 cache 扱い。古い tool output eviction で used_tokens 減少。page fault fault-in で window revision 増分。
    example_source:
      product: Pichay
      url: https://arxiv.org/abs/2603.09023
      version: arXiv:2603.09023
    field_values:
      hierarchy_level: L1
      eviction_marker: "[Paged out: Read file.py …]"
    related_node_ids:
      - ContextWindow
    related_relation_ids: []
    source_claims:
      - claim-context-window-pichay
parent_relation:
  id: ContextWindow-is_a-ContextArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ContextWindow 都是 ContextArtifact；其种差是有界有序模型输入投影，由 ContextSlot 组成并记录容量与实际消耗。
    en: Every ContextWindow is a ContextArtifact distinguished as a bounded ordered model-input projection composed of ContextSlots with capacity and usage records.
    ja: すべての ContextWindow は ContextArtifact で、ContextSlot から成る有界順序モデル入力投影という種差を持つ。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-window-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
