schema: moonweave.ai/ontology-node/v1
id: ContextWindow
kind: concept
status: accepted
labels:
  zh: 上下文窗口
  en: context window
  ja: コンテキスト窓
semantics:
  short_definition:
    zh: 按确定顺序组织 ContextSlot、并受容量上限约束的有界上下文产物。
    en: A bounded context artifact organizing ContextSlots in a determinate order under a capacity limit.
    ja: ContextSlot を確定順序で編成し、容量上限を受ける有界コンテキスト成果物です。
  definition:
    zh: ContextWindow 是一种 ContextArtifact；其种差是：它是从一个 ContextPackage 投影出的有界、按序模型输入，由 ContextSlot 组成并记录容量单位、实际消耗与每槽来源。它不包含组装审计、被排除候选或可重放决策；这些属于 ContextPackage 与 ContextExclusion。
    en: A ContextWindow is a ContextArtifact whose differentia is an ordered model-input projection from one ContextPackage. It is bounded, composed of ContextSlots, and records capacity unit, actual consumption, and per-slot provenance. It does not carry assembly audit, rejected candidates, or replay decisions; those belong to ContextPackage and ContextExclusion.
    ja: ContextWindow は一つの ContextPackage から投影された有界・順序付きモデル入力という種差を持つ ContextArtifact です。ContextSlot から成り、容量単位・実消費・各スロット来歴を記録します。組立監査・除外候補・再現判断は ContextPackage と ContextExclusion に属します。
  why_needed:
    zh: 该概念让系统同时查询窗口成员、顺序、占用与来源，并区分模型容量、候选输入和实际可见快照。
    en: It lets the system query membership, order, usage, and provenance together while distinguishing model capacity, candidate input, and the actually visible snapshot.
    ja: 窓メンバー、順序、使用量、来歴を同時照会し、モデル容量、候補入力、実際可視スナップショットを区別できます。
  includes:
    - zh: 纳入“window-v17：32k-token 上限、28.4k 已用、7 个有序槽位且每槽可追溯”的具体窗口。
      en: "Includes concrete windows such as “window-v17: 32k-token ceiling, 28.4k used, seven ordered slots, each provenance-linked.”"
      ja: 「window-v17：32k-token 上限、28.4k 使用、7順序スロット、各来歴付き」のような具体窓を含みます。
  excludes:
    - zh: 排除仅声明 32k 上限的 ContextBudget、压缩先前内容的 ContextSummary、成员 ContextSlot 和窗口选择规范 OutputWindow。
      en: Excludes a ContextBudget declaring only a 32k ceiling, a ContextSummary compressing prior content, member ContextSlots, and the OutputWindow selection specification.
      ja: 32k 上限だけの ContextBudget、過去内容を圧縮する ContextSummary、構成 ContextSlot、選択仕様 OutputWindow を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextWindow-example-positive-001
    kind: positive
    labels:
      zh: 上下文窗口正例
      en: Positive example of context window
      ja: コンテキスト窓の正例
    scenario_id: null
    descriptions:
      zh: ctx-window-88 按序包含 1 个系统指令槽、4 个消息槽、2 个证据槽、1 个工具结果槽和 summary-v6，容量单位为 token，已用 19,640/20,000，并为每个槽保留来源。
      en: ctx-window-88 contains, in order, one system-instruction slot, four message slots, two evidence slots, one tool-result slot, and summary-v6; its unit is tokens, usage is 19,640/20,000, and every slot retains provenance.
      ja: ctx-window-88 は順にシステム指示1、メッセージ4、証拠2、ツール結果1、summary-v6 の各スロットを含み、単位 token、使用量19,640/20,000、全スロットの来歴を保持します。
    field_values:
      context_artifact_id: ctx-window-88
      artifact_revision: "1"
      content_digest: sha256:ctx-window-88-r1
      consumer_ref: call-88
      source_refs:
        - instruction:system-1
        - message-set:call-88
        - evidence-set:admitted-88
        - tool-result:call-88-1
        - summary-v6
    related_node_ids:
      - ContextWindow
      - ContextSlot
    related_relation_ids:
      - ContextWindow-has_slot-ContextSlot
    expected_result:
      zh: 该运行可查询 ContextWindow 以及方向保持不变的事实 ContextWindow-has_slot-ContextSlot。
      en: The run can query ContextWindow together with direction-preserving fact ContextWindow-has_slot-ContextSlot.
      ja: この実行では ContextWindow と方向を保持した事実 ContextWindow-has_slot-ContextSlot を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextWindow-has_slot-ContextSlot 的 canonical 方向、概念定义和可用字段值。
      en: The artifact has bounded capacity, declared usage, and a deterministic ordered slot collection. It describes concrete window content rather than only a model limit or output-selection rule.
      ja: このシナリオは実際の運用文脈、ContextWindow-has_slot-ContextSlot の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-window-003
      - claim-context-window-004
  - id: ContextWindow-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文窗口边界例
      en: Boundary case for context window
      ja: コンテキスト窓の境界例
    scenario_id: null
    descriptions:
      zh: summary-v6 只替代 turn 1–24 的旧内容并记录其覆盖范围；它没有完整的有序槽位集合或总容量使用，因此可被 ctx-window-88 包含，但不是 ContextWindow。
      en: summary-v6 only replaces prior turns 1–24 and records that coverage. It has no complete ordered slot collection or total capacity usage, so ctx-window-88 may contain it, but it is not ContextWindow.
      ja: summary-v6 は過去 turn 1–24 を置換し対象範囲を記録するだけで、完全な順序付きスロット集合や総容量使用量を持ちません。ctx-window-88 に含まれ得ますが ContextWindow ではありません。
    field_values: {}
    related_node_ids:
      - ContextWindow
      - ContextSlot
      - ContextSummary
    related_relation_ids:
      - ContextWindow-has_slot-ContextSlot
    expected_result:
      zh: ContextSummary 保持其原有类型，验证器不得凭关系共现把它提升为 ContextWindow。
      en: ContextSummary retains its own type; validation must not promote it to ContextWindow from relation co-occurrence.
      ja: ContextSummary は元の型を維持し、関係の共起だけで ContextWindow へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextWindow-has_slot-ContextSlot 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A summary is one compressed contribution with covered-source identity; a window is the bounded ordered container of all contributions. Shared ContextArtifact ancestry does not erase that difference.
      ja: 境界例は実在する対照ノードを示し、ContextWindow-has_slot-ContextSlot の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-window-005
      - claim-context-window-006
external_mappings: []
applicability:
