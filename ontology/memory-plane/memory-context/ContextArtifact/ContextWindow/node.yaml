source_claims:
  - id: claim-context-window-001
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK documents that an agent call combines instructions and input with tools, handoffs, and session-managed history around model execution. ContextWindow is Moonweave's bounded, ordered, provenance-bearing collection of the concrete context contributions prepared for a call; the SDK does not define this ontology class.
    locator: Sessions > Core session behavior > history prepended before each run; Context management > Agent and LLM context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-002
    source: lit-mech-compass
    supports: COMPASS identifies context organization as the central bottleneck in long-horizon reasoning and maintains concise, relevant briefs for distinct reasoning stages. Moonweave models the complete bounded and ordered stage context as ContextWindow, with summaries only one possible slot type.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-003
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK documents agent instructions, model input, tools, handoffs, and session history as inputs coordinated around model calls. The ordered, bounded slot collection in the example is Moonweave's explicit call-window representation, not an SDK class.
    locator: Sessions > Core session behavior > history prepended before each run; Context management > Agent and LLM context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-004
    source: lit-mech-compass
    supports: COMPASS identifies extended histories and irrelevant information as causes of long-horizon failure and maintains concise progress briefs for reasoning stages. The bounded window example concretizes the organized context available to one stage.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-005
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK separates session history and input items from the complete input supplied to a model call. Moonweave similarly treats one summary item as a possible window component, not the window itself.
    locator: Sessions > Core session behavior > history prepended before each run; Context management > Agent and LLM context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-006
    source: lit-mech-compass
    supports: COMPASS's concise progress briefs are compressed context contributions for reasoning stages, while the stage still operates with other instructions and evidence. Moonweave formalizes this as summary component versus complete ContextWindow.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-007
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK separates session history, agent context, and the context ultimately passed to the LLM for a run. Moonweave represents that complete bounded, ordered input as ContextWindow and keeps a compressed ContextSummary as only one possible information component.
    locator: Sessions > Core session behavior > history prepended before each run; Context management > Agent and LLM context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-008
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents uses summarization to compress older messages while retaining recent context and other model inputs. Moonweave models the compressed representation as ContextSummary and the full model-call input as ContextWindow; the source supports their component-versus-whole distinction, not the ontology names.
    locator: Context engineering in Deep Agents > Summarization > older messages summarized and recent context preserved
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-window-009
    source: eng-fw-langchain-context-engineering
    supports: The fixed slot set and measured capacity instantiate the concrete transient model context for one call.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-window-010
    source: eng-fw-langchain-context-engineering
    supports: A token ceiling constrains model context but does not itself contain the call input.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-window-011
    source: eng-fw-langchain-context-engineering
    supports: LangChain defines model context as the transient information supplied to each model call; Moonweave models the bounded ordered projection as a versioned ContextArtifact.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
