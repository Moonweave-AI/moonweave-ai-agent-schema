schema: moonweave.ai/ontology-node/v1
id: ContextWindow
kind: concept
status: accepted
labels:
  zh: 上下文窗口
  en: Context window
  ja: コンテキストウィンドウ
semantics:
  short_definition:
    zh: 描述一次模型调用可容纳输入及输出预留的容量边界工件。
    en: A capacity-boundary artifact describing input admissibility and output reserve for one model invocation.
    ja: 一回のモデル呼び出しにおける入力許容量と出力予約を記述する容量境界工件です。
  definition:
    zh: >
      ContextWindow 是与调用范围和目标模型配置关联的容量工件，记录模型输入上限、输出预留、可用输入预算、计数方法和溢出策略。它不是上下文文本、消息历史、提示词或记忆记录，而是决定哪些已选 ContextArtifact 能够共同出现在模型可见输入中的边界。提供方的模型窗口与项目的实际 ContextBudget 不同：项目可以在更大的模型容量内设置更小的预算以控制成本、延迟或风险。尽管它位于 ContextArtifact 分类下，本节点只把窗口参数及其测量结果作为可追溯工件，不把窗口本身误认为模型看到的内容。
    en: >
      A ContextWindow is a capacity artifact associated with a call scope and target model configuration. It records the model input limit, output reserve, usable input budget, counting method, and overflow strategy. It is not context text, message history, a prompt, or a memory record; it is the boundary that determines which selected ContextArtifacts can jointly appear in model-visible input. A provider model window differs from a project's actual ContextBudget: a project may set a smaller budget within a larger model capacity to control cost, latency, or risk. Although this node specializes ContextArtifact, it treats only window parameters and measured result as traceable artifacts, not the window itself as content seen by the model.
    ja: >
      ContextWindow は呼び出し範囲と対象モデル構成に関連付く容量工件です。モデル入力上限、出力予約、利用可能な入力予算、計数方法、オーバーフロー方針を記録します。コンテキストテキスト、メッセージ履歴、プロンプト、記憶記録ではなく、選択済み ContextArtifact のうちどれが共にモデル可視入力に現れるかを決める境界です。プロバイダーのモデルウィンドウとプロジェクトの実際の ContextBudget は異なります。プロジェクトはコスト、遅延、リスク制御のため、より大きいモデル容量内により小さい予算を置けます。本ノードは ContextArtifact を特化しますが、モデルが見る内容としてのウィンドウではなく、ウィンドウパラメータと測定結果だけを追跡可能な工件として扱います。
  why_needed:
    zh: 不把窗口与内容混淆，才能正确计算输出余量、决定何时裁剪或拒绝调用，并区分提供方限制与项目自己的保守预算。
    en: Separating a window from content enables correct output reservation, trimming-or-rejection decisions, and distinction between provider limits and a project's conservative budget.
    ja: ウィンドウを内容から分離することで、正しい出力予約、トリミングまたは拒否の判断、プロバイダー上限とプロジェクトの保守的予算の区別が可能になります。
  includes:
    - zh: 输入容量、输出预留、可用预算、计数方法和溢出策略。
      en: Input capacity, output reserve, usable budget, counting method, and overflow strategy.
      ja: 入力容量、出力予約、利用可能予算、計数方法、オーバーフロー方針。
  excludes:
    - zh: 窗口内实际消息、摘要文本、完整对话历史和模型输出内容。
      en: The actual messages inside the window, summary text, complete conversation history, and model output content.
      ja: ウィンドウ内の実メッセージ、要約テキスト、完全な会話履歴、モデル出力内容。
  semantic_kind: entity
  aliases:
    - model input capacity
    - call token envelope
engineering:
  explanation:
    zh: >
      实现应以目标模型和请求配置计算可用输入，而不是只复制宣传的上下文长度。OpenAI Realtime 文档说明输入超过限制时可从最旧消息开始截断，`disabled` 策略则返回错误，`retention_ratio` 可保留上限的一部分会话 token；文档还说明最大输出 token 会减少可用上下文。因此窗口记录应明确输出预留、策略和项目限制，装配器再把实际 ContextPackage token 数与它比较。
    en: >
      Compute usable input from target-model and request configuration instead of copying an advertised context length. The OpenAI Realtime reference states that over-limit conversation input can drop oldest messages, `disabled` returns an error, and `retention_ratio` retains a fraction of conversation tokens. It also states that maximum output tokens reduce usable context. A window record should therefore state output reserve, strategy, and project limit before an assembler compares actual ContextPackage tokens against it.
    ja: >
      公称コンテキスト長をコピーするのではなく、対象モデルと要求構成から利用可能入力を計算します。OpenAI Realtime リファレンスでは、上限超過の会話入力は最古メッセージを落とせること、`disabled` はエラーを返すこと、`retention_ratio` は会話トークンの一部を保持することが示されています。最大出力トークンが利用可能コンテキストを減らすことも説明されています。したがって、組立器が実際の ContextPackage トークンと比較する前に、ウィンドウ記録は出力予約、方針、プロジェクト上限を示すべきです。
  typical_input:
    - description: OpenAI Realtime retention-ratio truncation configuration.
      format: |
        {
          "truncation": {
            "type": "retention_ratio",
            "retention_ratio": 0.8,
            "token_limits": {"post_instructions": 5000}
          }
        }
    - description: Project window calculation before package finalization.
      format: |
        {
          "model_input_limit": 32768,
          "output_token_reserve": 4096,
          "project_input_budget": 7168,
          "counting_method": "provider_token_counter"
        }
  typical_output:
    - description: Capacity envelope used by the assembler.
      format: |
        {
          "window_id": "ctx-window-support-01",
          "usable_input_budget": 7168,
          "overflow_strategy": "summarize_then_trim",
          "is_content_payload": false
        }
  reference_implementations:
    - name: OpenAI Realtime API truncation configuration
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents automatic, disabled, and retention-ratio truncation plus input-limit and output-token interaction.
    - name: LangGraph token-aware trimming
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents trim_messages with a token counter and maximum token value before model invocation.
  source_claims:
    - claim-context-window-openai-limit
    - claim-context-window-openai-strategies
    - claim-context-window-langgraph-counting
structure:
  identity_keys:
    - artifact_id
    - window_id
  fields:
    - id: window_id
      labels:
        zh: 窗口标识
        en: window ID
        ja: ウィンドウ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个调用范围和模型配置下的容量快照，不复用为包、消息或模型名称。
        en: Identifies a capacity snapshot for one call scope and model configuration, not a package, message, or model name.
        ja: 一つの呼び出し範囲とモデル構成の容量スナップショットを識別し、パッケージ、メッセージ、モデル名を再利用しません。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-context-window-openai-limit
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将容量边界绑定到具体调用或重放装配，防止把一模型或一请求的限制泛化为所有调用。
        en: Binds the capacity boundary to one invocation or replayable assembly, preventing a model or request limit from being generalized to all calls.
        ja: 容量境界を一つの呼び出しまたは再生可能な組立に結び、あるモデルや要求の上限を全呼び出しへ一般化しないようにします。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-window-openai-limit
    - id: model_input_limit
      labels:
        zh: 模型输入上限
        en: model input limit
        ja: モデル入力上限
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目标模型或提供方为该请求允许的最大输入 token 上限，尚未扣除输出预留或项目预算。
        en: The maximum input tokens allowed by the target model or provider for this request before output reserve or project budget is deducted.
        ja: 出力予約やプロジェクト予算を差し引く前に、対象モデルまたはプロバイダーがこの要求に許可する最大入力トークン上限です。
      allowed_values: []
      pattern: null
      example_value: 32768
      source_claims:
        - claim-context-window-openai-limit
    - id: output_token_reserve
      labels:
        zh: 输出 token 预留
        en: output token reserve
        ja: 出力トークン予約
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 从模型容量中保留给输出或响应生成的 token 数；它不能被输入包消耗。
        en: Tokens reserved from model capacity for output or response generation; an input package cannot consume them.
        ja: 出力または応答生成のためにモデル容量から予約するトークン数です。入力パッケージは消費できません。
      allowed_values: []
      pattern: null
      example_value: 4096
      source_claims:
        - claim-context-window-openai-limit
    - id: usable_input_budget
      labels:
        zh: 可用输入预算
        en: usable input budget
        ja: 利用可能入力予算
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本项目允许 ContextPackage 使用的最大输入 token，必须不超过 model_input_limit 减 output_token_reserve；可因成本或策略比该差值更小。
        en: The maximum input tokens this project permits a ContextPackage to use. It must not exceed model_input_limit minus output_token_reserve and may be smaller for cost or policy.
        ja: このプロジェクトが ContextPackage に許可する最大入力トークン数です。model_input_limit から output_token_reserve を引いた値を超えてはならず、コストや方針によりさらに小さくできます。
      allowed_values: []
      pattern: null
      example_value: 7168
      source_claims:
        - claim-context-window-openai-limit
    - id: counting_method
      labels:
        zh: token 计数方法
        en: token counting method
        ja: トークン計数方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明预算使用的是提供方计数、模型专用 tokenizer 还是近似计数；不同方法产生的估算不能被无声明地互换。
        en: States whether budgeting uses provider counting, a model-specific tokenizer, or approximate counting. Estimates from different methods cannot be silently interchanged.
        ja: 予算化がプロバイダー計数、モデル固有トークナイザー、近似計数のどれを使うかを示します。異なる方法の見積りを無宣言で交換できません。
      allowed_values:
        - provider_token_counter
        - model_specific_tokenizer
        - approximate_token_counter
      pattern: null
      example_value: provider_token_counter
      source_claims:
        - claim-context-window-langgraph-counting
    - id: overflow_strategy
      labels:
        zh: 溢出策略
        en: overflow strategy
        ja: オーバーフロー方針
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定当候选超过可用输入预算时的操作；它是容量行为，不说明被保留的内容本身。
        en: Specifies the action when candidates exceed usable input budget. It is capacity behavior and does not describe the content retained.
        ja: 候補が利用可能入力予算を超えたときの操作を指定します。これは容量動作であり、保持内容そのものを記述しません。
      allowed_values:
        - reject_over_budget
        - truncate_oldest
        - retain_ratio
        - summarize_then_trim
      pattern: null
      example_value: summarize_then_trim
      source_claims:
        - claim-context-window-openai-strategies
    - id: artifact_id
      labels:
        zh: 窗口工件标识
        en: window artifact ID
        ja: ウィンドウアーティファクト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识承载容量边界的 ContextArtifact，与配置窗口的 window_id 保持不同身份。
        en: Identifies the ContextArtifact carrying this capacity boundary, separately from the window_id that identifies the configured window.
        ja: この容量境界を担う ContextArtifact を識別し、構成済みウィンドウを示す window_id と区別します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-window-support-01
      source_claims:
        - claim-context-window-openai-limit
    - id: representation_kind
      labels:
        zh: 工件表示类型
        en: artifact representation kind
        ja: アーティファクト表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定声明 window 表示类型，以免将容量限制及其溢出策略误作包内消息内容。
        en: Declares window as the representation kind so capacity limits and overflow policy are not mistaken for package message content.
        ja: 表現種別を window と宣言し、容量制限とオーバーフロー方針をパッケージ内のメッセージ内容と取り違えないようにします。
      allowed_values:
        - window
      pattern: null
      example_value: window
      source_claims:
        - claim-context-window-openai-strategies
    - id: source_refs
      labels:
        zh: 窗口依据来源引用
        en: window basis source references
        ja: ウィンドウ根拠の情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出用于为这次调用设定容量或计数边界的精确提示、记录、文档或工具结果，而不是把模型提供方整体作为一个内容来源。
        en: Lists exact prompts, records, documents, or tool results used to set this call's capacity or counting boundary, rather than treating a whole model provider as content.
        ja: この呼び出しの容量または計数境界を設定するために使った正確なプロンプト、記録、文書、ツール結果を列挙し、モデル提供者全体を内容の情報源として扱いません。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - document:model-profile-support-01
      source_claims:
        - claim-context-window-langgraph-counting
  constraints:
    - id: context-window-budget-reserves-output
      severity: error
      expression_language: plain
      expression: usable_input_budget must be greater than zero and no greater than model_input_limit minus output_token_reserve; a finalized ContextPackage total_input_tokens must not exceed usable_input_budget.
      explanation:
        zh: 只有把输出预留和项目预算从容量中扣除，窗口才可用于可靠的输入准入判断。
        en: A window can support reliable input admission only after output reserve and project budget are deducted from capacity.
        ja: ウィンドウが信頼できる入力受け入れ判断を支えるには、出力予約とプロジェクト予算を容量から差し引く必要があります。
      source_claims:
        - claim-context-window-openai-limit
    - id: context-window-is-capacity-not-content
      severity: error
      expression_language: plain
      expression: ContextWindow must not contain or be asserted equivalent to prompt text, MessageHistory, a ContextPackage, ContextSummary, or MemoryRecord; those are content or source artifacts constrained by the window.
      explanation:
        zh: 窗口回答“能容纳多少”，包与工件回答“实际包含什么”。
        en: A window answers “how much can fit,” while packages and artifacts answer “what is actually included.”
        ja: ウィンドウは「どれだけ入るか」を答え、パッケージと工件は「何が実際に入るか」を答えます。
      source_claims:
        - claim-context-window-openai-strategies
examples:
  - id: context-window-example-positive-conservative-budget

    labels:
      zh: 在模型容量内设置保守项目预算
      en: Set a conservative project budget inside model capacity
      ja: モデル容量内に保守的なプロジェクト予算を置く

    descriptions:
      zh: Claude 200K context window；MemGPT main_context 工作记忆窗口；Lost in the Middle：LLM 对中间位置信息利用率显著下降（U 型曲线）。
      en: Claude 200K context window; MemGPT main_context working-memory window; Lost in the Middle: LLM utilization drops for middle-position info (U-curve).
      ja: Claude 200K context window。MemGPT main_context。Lost in the Middle U 型 curve。
    field_values:
      artifact_id: ctx-art-window-support-01
      window_id: ctx-window-support-01
      call_scope_id: call-support-20260719-01
      representation_kind: window
      source_refs:
        - document:model-profile-support-01
      model_input_limit: 32768
      output_token_reserve: 4096
      usable_input_budget: 7168
      counting_method: provider_token_counter
      overflow_strategy: summarize_then_trim
    related_node_ids:
      - ContextWindow
      - ContextPackage
      - ContextBudget
    related_relation_ids:
      - ContextWindow-has-ContextSlot

    source_claims:
      - claim-context-window-openai-limit
  - id: context-window-example-counterexample-window-is-prompt

    labels:
      zh: 将提示词文本称为上下文窗口
      en: Call prompt text the context window
      ja: プロンプトテキストをコンテキストウィンドウと呼ぶ

    descriptions:
      zh: 反例：ContextWindow max_tokens 未绑定具体 model window（如 Claude 200K vs GPT-4 128K）。
      en: Counterexample: ContextWindow max_tokens not bound to concrete model window (Claude 200K vs GPT-4 128K).
      ja: 反例：max_tokens が具体 model window に未绑定。
    field_values:
      window_id: ctx-window-invalid-prompt
      call_scope_id: call-support-20260719-01
      model_input_limit: 32768
      output_token_reserve: 4096
      usable_input_budget: 7168
      counting_method: provider_token_counter
      overflow_strategy: reject_over_budget
    related_node_ids:
      - ContextWindow
      - PromptTemplateInstance
    related_relation_ids:
      - ContextWindow-has-ContextSlot

    source_claims:
      - claim-context-window-openai-limit
  - id: context-window-example-boundary-provider-limit-versus-project-budget

    labels:
      zh: 提供方上限与项目预算不同
      en: Provider limit differs from project budget
      ja: プロバイダー上限とプロジェクト予算の違い

    descriptions:
      zh: ContextWindow 容量声明 vs ContextPackage 实际内容；Cursor 部分读取长文件不等于完整 file window。
      en: ContextWindow capacity declaration vs ContextPackage actual content; Cursor partial long-file read is not full file window.
      ja: ContextWindow 容量 vs ContextPackage 実内容。Cursor 部分 read は完全 file window ではない。
    field_values:
      window_id: ctx-window-cost-01
      call_scope_id: call-support-20260719-02
      model_input_limit: 32768
      output_token_reserve: 4096
      usable_input_budget: 4000
      counting_method: approximate_token_counter
      overflow_strategy: summarize_then_trim
    related_node_ids:
      - ContextWindow
      - ContextBudget
      - ContextPackage
    related_relation_ids:
      - ContextWindow-has-ContextSlot

    source_claims:
      - claim-context-window-openai-strategies
  - id: context-window-example-instance-openai-realtime-retention-ratio

    labels:
      zh: 实例：OpenAI Realtime 保留比例截断
      en: "Instance: OpenAI Realtime retention-ratio truncation"
      ja: 実例：OpenAI Realtime の保持比率トランケーション

    descriptions:
      zh: Anthropic messages API 200K input limit；MemGPT main_context 固定 token budget ~8K 超出触发 paging to archival。
      en: Anthropic messages API 200K input limit; MemGPT main_context fixed ~8K token budget overflow triggers paging to archival.
      ja: Anthropic 200K input limit。MemGPT main_context ~8K overflow→archival paging。
    field_values:
      artifact_id: ctx-art-window-realtime-01
      window_id: ctx-window-realtime-01
      call_scope_id: call-realtime-20260719-01
      representation_kind: window
      source_refs:
        - document:realtime-profile-01
      model_input_limit: 32768
      output_token_reserve: 4096
      usable_input_budget: 28224
      counting_method: provider_token_counter
      overflow_strategy: retain_ratio
    related_node_ids:
      - ContextWindow
      - VisibleContextWindow
    related_relation_ids:
      - ContextWindow-has-ContextSlot
    source_claims:
      - claim-context-window-openai-strategies
parent_relation:
  id: ContextWindow-specializes-ContextArtifact
  predicate: is_a
  target: concept:ContextArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是容量边界类型的上下文工件
    en: is a context artifact capacity boundary
    ja: コンテキスト工件の容量境界型である
  definitions:
    zh: ContextWindow 是以调用范围记录容量参数和策略的 ContextArtifact，而不是包内内容。
    en: ContextWindow is a ContextArtifact recording capacity parameters and policy for a call scope, not content inside a package.
    ja: ContextWindow は呼び出し範囲の容量パラメータと方針を記録する ContextArtifact であり、パッケージ内の内容ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不计量窗口拥有的槽位或输入项；这些由具体窗口配置和包决定。
    en: Classification does not count slots or input items held by a window; concrete configuration and package determine them.
    ja: 分類関係はウィンドウが持つスロットや入力項目を数えません。具体的構成とパッケージがそれを決めます。
  inverse_reading:
    predicate: has_capacity_boundary_subtype
    labels:
      zh: 具有容量边界专门化
      en: has capacity-boundary subtype
      ja: 容量境界の下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-window-openai-limit
  distinct_fact_rationale:
