source_claims:
  - id: claim-context-window-openai-limit
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference states that conversation input exceeding the model input limit is truncated and that maximum output tokens reduce the amount of context that fits. Moonweave records input limit, output reserve, and usable project budget as separate capacity facts.
    locator: "Realtime truncation documentation: input token limit and maximum output token interaction"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-window-openai-strategies
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents auto and disabled truncation plus a retention_ratio strategy that retains a fraction of post-instruction conversation tokens. Moonweave represents these as overflow strategies and does not treat them as content or a universal selection policy.
    locator: "Realtime truncation configuration: auto, disabled, and RetentionRatioTruncation"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-context-window-langgraph-counting
    source: langgraph-memory
    supports: LangGraph documents trim_messages with a token counter and max_tokens setting before model invocation. Moonweave records the counting method and constrains slots and packages to a declared usable input budget.
    locator: "LangGraph memory guide: trim_messages token_counter and max_tokens example"
    evidence_kind: ontology-design-inference
    confidence: high
