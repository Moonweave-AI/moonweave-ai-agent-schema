schema: moonweave.ai/ontology-node/v1
id: ContextSourceRole
kind: concept
labels:
  zh: 上下文来源角色
  en: Context source role
  ja: コンテキスト出典役割
semantics:
  short_definition:
    zh: 槽位内标识内容来源语义类别的轻量角色标记。
    en: Lightweight role marker identifying the semantic category of slot content provenance.
    ja: slot content 来歴の semantic category を識別する lightweight role marker。
  definition:
    zh: ContextSourceRole 是 ContextSlot 的组成信息；其种差是在槽位内声明来源的语义类别（如 user_authored、retrieved_rag、tool_output、system_policy、memory_recall），并链接到独立 source_ref。它区分“这条内容从哪类管道来”，而不是内容本身或完整槽位。
    en: ContextSourceRole is slot-component information declaring the semantic category of provenance within a slot (e.g. user_authored, retrieved_rag, tool_output, system_policy, memory_recall) and linking to an independent source_ref. It distinguishes which pipeline supplied the content, not the content itself or the full slot.
    ja: ContextSourceRole は slot 内で来歴 semantic category（user_authored/retrieved_rag/tool_output/system_policy/memory_recall 等）を宣言し独立 source_ref に link する slot component。content 本体でも full slot でもない。
  why_needed:
    zh: 来源角色让裁剪、排序与审计规则能按管道类型决策——例如优先保留 user @ 引用、先摘要 stale tool_output、对 retrieved_rag 应用相关性阈值。
    en: Source roles let trimming, ordering, and audit rules act by pipeline type—e.g. prefer user @ references, summarize stale tool_output first, apply relevance thresholds to retrieved_rag.
    ja: 来歴 role により trim/order/audit rule が pipeline type 別に判断可能。user @ 参照優先/stale tool_output 先要約/retrieved_rag 関連性閾値等。
  includes:
    - zh: 纳入槽位内声明 source_category 与 authority/trust 级别的来源角色实例。
      en: Includes slot-local instances declaring source_category and authority/trust level.
      ja: source_category/authority/trust level を宣言する slot-local instance。
  excludes:
    - zh: 排除完整 ContextSlot、原始 RetrievedChunk、ContextRule 与 ContextAssembly。
      en: Excludes complete ContextSlot, raw RetrievedChunk, ContextRule, and ContextAssembly.
      ja: 完全 ContextSlot/raw RetrievedChunk/ContextRule/ContextAssembly を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain select 策略按 store/RAG/tool 管道分类；Cursor 区分 @ 用户显式引用（高权威）与 semantic search 命中（检索管道）；Claude Code 区分 CLAUDE.md（system_policy）与 path-scoped rules（file-bound）。
    en: LangChain select strategies classify store/RAG/tool pipelines; Cursor distinguishes @ explicit user references (high authority) from semantic search hits (retrieval pipeline); Claude Code separates CLAUDE.md (system_policy) from path-scoped rules (file-bound).
    ja: LangChain select は store/RAG/tool pipeline 分類。Cursor は @ 明示参照（高 authority）と semantic search 命中（retrieval pipeline）を区別。Claude Code は CLAUDE.md（system_policy）と path-scoped rules（file-bound）を分離。
  typical_input:
    - description: Cursor @ reference versus semantic hit role assignment
      format: |
        {
          "slot_ordinal": 3,
          "source_category": "user_explicit_reference",
          "authority": "high",
          "source_ref": "src/auth/middleware.ts@vabc123"
        }
      source_claims: [claim-context-source-role-cursor]
  typical_output: []
  reference_implementations:
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Select strategy by content pipeline type.
    - name: Cursor @ References
      url: https://cursor.com/docs/agent/tools/search
      description: Explicit references versus search hits.
structure:
  identity_keys:
    - context_slot_ref
    - source_category
  fields:
    - id: context_slot_ref
      labels:
        zh: 所属槽位引用
        en: Owning slot reference
        ja: 所属 slot 参照
      definitions:
        zh: 引用承载该来源角色的 ContextSlot。
        en: References the ContextSlot bearing this source role.
        ja: この source role を担う ContextSlot を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: context-window:88/slot:4
      allowed_values: []
      source_claims:
        - claim-context-source-role-slot
    - id: source_category
      labels:
        zh: 来源类别
        en: Source category
        ja: source category
      definitions:
        zh: 来源管道的语义类别，如 user_explicit_reference、retrieved_rag、tool_output、system_policy、memory_recall、recent_edit。
        en: Semantic category of the provenance pipeline, e.g. user_explicit_reference, retrieved_rag, tool_output, system_policy, memory_recall, recent_edit.
        ja: 来歴 pipeline の semantic category。user_explicit_reference/retrieved_rag/tool_output/system_policy/memory_recall/recent_edit 等。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: retrieved_rag
      allowed_values: []
      source_claims:
        - claim-context-source-role-category
    - id: authority_level
      labels:
        zh: 权威级别
        en: Authority level
        ja: authority level
      definitions:
        zh: 该来源在组装决策中的相对优先级或信任级别，如 high、medium、low。
        en: Relative priority or trust level for assembly decisions, e.g. high, medium, low.
        ja: assembly 判断における相対優先度/信頼 level。high/medium/low 等。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: high
      allowed_values: []
      source_claims:
        - claim-context-source-role-authority
  constraints: []
  required_relations: []
examples:
  - id: ContextSourceRole-example-cursor-at-ref
    labels:
      zh: Cursor @ 显式引用角色
      en: Cursor explicit @ reference role
      ja: Cursor @ 明示参照 role
    descriptions:
      zh: slot 3 的 ContextSourceRole 为 user_explicit_reference、authority=high；Cursor 组装时 @ 引用优先于 semantic search 命中，裁剪时最后淘汰。
      en: Slot 3 ContextSourceRole is user_explicit_reference with authority=high; Cursor assembly prioritizes @ references over semantic hits and trims them last.
      ja: slot 3 の ContextSourceRole は user_explicit_reference、authority=high。Cursor assembly で @ 参照は semantic hit より優先、trim では最後に淘汰。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "@ references"
    field_values:
      context_slot_ref: context-window:204/slot:3
      source_category: user_explicit_reference
      authority_level: high
    related_node_ids:
      - ContextSourceRole
      - ContextSlot
    related_relation_ids:
      - ContextSlot-has_source_role-ContextSourceRole
    source_claims:
      - claim-context-source-role-cursor
  - id: ContextSourceRole-example-rag-chunk
    labels:
      zh: RAG 检索块角色
      en: RAG retrieved chunk role
      ja: RAG retrieved chunk role
    descriptions:
      zh: slot 5 的 source_category=retrieved_rag、authority=medium；来自 Pinecone top_k 命中，ContextSelection 按 similarity score 决定是否纳入。
      en: Slot 5 has source_category=retrieved_rag, authority=medium from Pinecone top_k hit; ContextSelection admits based on similarity score.
      ja: slot 5 は source_category=retrieved_rag、authority=medium。Pinecone top_k 命中。ContextSelection が similarity score で採否。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: select strategy
    field_values:
      source_category: retrieved_rag
      authority_level: medium
      source_ref: chunk-policy-003@v7
    related_node_ids:
      - ContextSourceRole
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-source-role-rag
  - id: ContextSourceRole-example-tool-output
    labels:
      zh: Tool output 角色
      en: Tool output role
      ja: tool output role
    descriptions:
      zh: slot 6 的 source_category=tool_output；Pichay 与 Claude auto-compact 对 stale tool_output 优先摘要或逐出，authority 通常低于 user_explicit_reference。
      en: Slot 6 source_category=tool_output; Pichay and Claude auto-compact summarize or evict stale tool_output first; authority typically below user_explicit_reference.
      ja: slot 6 source_category=tool_output。Pichay/Claude auto-compact は stale tool_output を優先要約/evict。authority は通常 user_explicit_reference より低。
    example_source:
      product: Pichay
      url: https://arxiv.org/abs/2603.09023
      version: L1 eviction
    field_values:
      source_category: tool_output
      authority_level: low
    related_node_ids:
      - ContextSourceRole
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-source-role-tool
  - id: ContextSourceRole-example-not-slot
    labels:
      zh: 角色非槽位
      en: Role is not slot
      ja: role は slot ではない
    descriptions:
      zh: ContextSourceRole 只有类别与权威标记，没有 ordinal 或 token_extent；完整槽位信息在 ContextSlot。
      en: ContextSourceRole has only category and authority markers without ordinal or token_extent; full slot data lives in ContextSlot.
      ja: ContextSourceRole は category/authority marker のみで ordinal/token_extent なし。完全 slot 情報は ContextSlot。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextSourceRole
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-source-role-design
parent_relation:
  id: ContextSlot-has_source_role-ContextSourceRole
  predicate: has_source_role
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有来源角色
    en: has source role
    ja: 出典役割を持つ
  definitions:
    zh: ContextSlot —has_source_role→ ContextSourceRole 表示槽位内声明内容来源的语义类别与权威级别。
    en: ContextSlot —has_source_role→ ContextSourceRole declares semantic provenance category and authority within a slot.
    ja: ContextSlot —has_source_role→ ContextSourceRole は slot 内 content 来歴の semantic category/authority を宣言。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 每槽可有零个或多个来源角色，取决于内容复合度。
    en: Zero or more source roles per slot depending on content complexity.
    ja: slot あたり 0 以上の source role。content 複合度に依存。
  inverse_reading:
    predicate: source_role_of
    labels:
      zh: 反向：属于槽位
      en: source role of
      ja: 逆：slot に属する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-source-role-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-cursor-context
    title: Cursor Agent Search and Context
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references versus semantic search provenance."
  - id: src-langchain-context-engineering
    title: Context engineering in agents
    publisher: LangChain
    url: https://docs.langchain.com/oss/python/langchain/context-engineering
    source_type: official-doc
    relevance: Select by pipeline type.
  - id: src-pichay-2026
    title: Demand Paging for LLM Context Windows
    publisher: arXiv
    url: https://arxiv.org/abs/2603.09023
    source_type: arXiv
    relevance: tool_output eviction priority.
  - id: src-memory-context-design
    title: Moonweave memory-context module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Source role versus slot boundary.
source_claims:
  - id: claim-context-source-role-cursor
    source: src-cursor-context
    supports: "Cursor @ references carry high-authority user_explicit_reference role."
    locator: "@ references"
    evidence_kind: official
    confidence: high
  - id: claim-context-source-role-rag
    source: src-langchain-context-engineering
    supports: RAG chunks classified as retrieved_rag pipeline content.
    locator: Select strategy
    evidence_kind: official
    confidence: high
  - id: claim-context-source-role-tool
    source: src-pichay-2026
    supports: tool_output is lower-priority evictable content.
    locator: Eviction policy
    evidence_kind: academic
    confidence: high
  - id: claim-context-source-role-design
    source: src-memory-context-design
    supports: ContextSourceRole is slot-local provenance metadata.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-source-role-slot
    source: src-memory-context-design
    supports: Each source role belongs to one ContextSlot.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-source-role-category
    source: src-langchain-context-engineering
    supports: source_category classifies provenance pipeline.
    locator: Select
    evidence_kind: official
    confidence: high
  - id: claim-context-source-role-authority
    source: src-cursor-context
    supports: authority_level guides trim and ordering priority.
    locator: Assembly
    evidence_kind: design-inference
    confidence: medium
