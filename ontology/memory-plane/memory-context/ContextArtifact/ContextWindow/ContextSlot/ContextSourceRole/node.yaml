schema: moonweave.ai/ontology-node/v1
id: ContextSourceRole
kind: concept
status: accepted
labels:
  zh: 上下文来源角色
  en: context-source role
  ja: コンテキスト出典役割
semantics:
  short_definition:
    zh: 一个来源引用在一个上下文槽位中承担的版本固定参与角色。
    en: The version-pinned participation role borne by a source reference in one context slot.
    ja: 一 context slot で source reference が担う version-pinned participation role。
  definition:
    zh: 上下文来源角色是依赖一个 ContextSlot 而存在的角色记录：它把该槽位连接到实际承担来源职责的 SourceReference，并固定组装时使用的 SourceIdentity。它不是 SourceReference 的子类，也不复制来源内容；同一来源引用可在不同槽位、包版本或组装运行中承担多个不同角色。
    en: ContextSourceRole is a role record existentially dependent on one ContextSlot. It connects that slot to the SourceReference bearing the source responsibility and pins the SourceIdentity used at assembly time. It is not a SourceReference subtype and does not copy source content; one reference may bear different roles in different slots, package versions, or assembly runs.
    ja: ContextSourceRole は一 ContextSlot に existentially dependent な role record です。slot を source responsibility を担う SourceReference へ接続し assembly 時の SourceIdentity を固定します。SourceReference subtype でも content copy でもなく、一 reference は異なる slot/package version/assembly run で複数 role を担えます。
  why_needed:
    zh: 把参与角色与来源身份拆开，可避免把“曾为某槽位提供内容”永久固化成来源对象的本体类型，并能在同一来源被多次引用时分别记录槽位和版本。
    en: Separating participation role from source identity prevents temporary contribution to a slot from becoming a permanent ontology type and records slot and version independently for repeated use of one source.
    ja: participation role と source identity を分離し、一時的 slot contribution を permanent ontology type にせず同一 source の反復利用ごとに slot/version を記録します。
  includes:
    - zh: 明确给出角色 ID、所属槽位、承担角色的来源引用和组装时来源身份的记录。
      en: Records with an explicit role ID, owning slot, bearing source reference, and source identity used during assembly.
      ja: explicit role ID・owning slot・bearing source reference・assembly 時 source identity を持つ record。
  excludes:
    - zh: 尚未被任何槽位采用的通用 SourceReference，以及槽位内复制的正文内容。
      en: A general SourceReference not used by any slot and copied source content inside a slot.
      ja: どの slot にも使われない general SourceReference と slot 内 copied source content。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - context_source_role_id
  fields:
    - id: context_source_role_id
      labels:
        zh: 来源角色标识
        en: context-source-role ID
        ja: context source role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次槽位—来源参与记录。
        en: Stably identifies one slot–source participation record.
        ja: 一 slot-source participation record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: source-role-slot-04-policy-v7
      source_claims:
        - claim-context-source-role-003
    - id: slot_id
      labels:
        zh: 所属槽位标识
        en: owning slot ID
        ja: owning slot ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该角色只在其中成立的 ContextSlot。
        en: Identifies the ContextSlot within which this role exists.
        ja: この role が存在する ContextSlot を識別します。
      allowed_values: []
      pattern: null
      example_value: slot-04
      source_claims:
        - claim-context-source-role-004
    - id: source_reference_id
      labels:
        zh: 承担角色的来源引用
        en: bearing source-reference ID
        ja: bearing source reference ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识实际承担来源角色但保持独立本体身份的 SourceReference。
        en: Identifies the SourceReference that bears the role while retaining independent ontology identity.
        ja: independent ontology identity を保ったまま role を担う SourceReference を識別します。
      allowed_values: []
      pattern: null
      example_value: source-ref-policy
      source_claims:
        - claim-context-source-role-005
    - id: source_identity_id
      labels:
        zh: 采用的来源状态标识
        en: used source-identity ID
        ja: used source identity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定组装该槽位时实际采用的来源版本或摘要状态。
        en: Pins the source version or digest state actually used to assemble the slot.
        ja: slot assembly で実際に使った source version/digest state を固定します。
      allowed_values: []
      pattern: null
      example_value: source-ref-policy-v7
      source_claims:
        - claim-context-source-role-006
  constraints: []
  required_relation_constraints:
    - id: context-source-role-belongs-to-slot
      direction: incoming
      predicate: has_source_role
      target_concept_id: ContextSlot
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个来源角色只属于一个明确的 ContextSlot。
        en: Every context-source role belongs to exactly one ContextSlot.
        ja: 各 context-source role は一 ContextSlot にだけ属します。
      source_claims:
        - claim-context-source-role-007
    - id: context-source-role-has-bearer
      direction: outgoing
      predicate: borne_by
      target_concept_id: SourceReference
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个来源角色必须由一个保持独立身份的 SourceReference 承担。
        en: Every context-source role is borne by exactly one independently identified SourceReference.
        ja: 各 context-source role は一 independently identified SourceReference が担います。
      source_claims:
        - claim-context-source-role-008
examples:
  - id: ContextSourceRole-example-positive-manual-001
    kind: positive
    labels:
      zh: 上下文来源角色正例
      en: context-source role positive case
      ja: context-source role 正例
    scenario_id: null
    descriptions:
      zh: slot-04 在 package-v18 中承载 policy.md 第 120–147 行；source-role-slot-04-policy-v7 把槽位连接到 source-ref-policy，并固定实际组装使用的 source-ref-policy-v7。
      en: slot-04 in package-v18 carries lines 120–147 of policy.md. source-role-slot-04-policy-v7 connects the slot to source-ref-policy and pins source-ref-policy-v7 as the state actually used for assembly.
      ja: package-v18 の slot-04 は policy.md 120–147 行を保持し source-role-slot-04-policy-v7 が slot を source-ref-policy へ接続して assembly 時の source-ref-policy-v7 を固定します。
    field_values:
      context_source_role_id: source-role-slot-04-policy-v7
      slot_id: slot-04
      source_reference_id: source-ref-policy
      source_identity_id: source-ref-policy-v7
    related_node_ids:
      - ContextSlot
      - ContextSourceRole
      - SourceReference
    related_relation_ids:
      - ContextSlot-has_source_role-ContextSourceRole
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 建立槽位拥有角色与角色由来源引用承担的两条事实，并保持来源身份独立。
      en: Assert slot ownership and source-reference bearing as two facts while preserving independent source identity.
      ja: slot ownership と source-reference bearing を二 fact として assertion し source identity を独立保持します。
    why_valid_or_invalid:
      zh: 角色有独立记录 ID、唯一槽位、唯一承担者和固定来源状态，满足临时参与而非永久子类的身份条件。
      en: The role has its own record ID, one slot, one bearer, and a pinned source state, satisfying temporary participation rather than permanent subclass identity.
      ja: role は independent record ID・one slot・one bearer・pinned source state を持ち permanent subclass ではなく temporary participation の条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-context-source-role-009
  - id: ContextSourceRole-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 上下文来源角色边界例
      en: context-source role boundary case
      ja: context-source role 境界例
    scenario_id: null
    descriptions:
      zh: source-ref-policy 可解析到 policy.md/v7，但当前包没有任何槽位采用它，也没有角色记录 ID；来源可用性不等于已经承担 ContextSourceRole。
      en: source-ref-policy resolves to policy.md/v7, but no slot in the current package uses it and no role-record ID exists. Source availability does not mean that it bears a ContextSourceRole.
      ja: source-ref-policy は policy.md/v7 に解決できますが current package の slot は利用せず role-record ID もありません。source availability は ContextSourceRole bearing を意味しません。
    field_values:
      source_reference_id: source-ref-policy
      context_source_role_id: null
      slot_id: null
      source_identity_id: source-ref-policy-v7
    related_node_ids:
      - ContextSourceRole
      - SourceReference
    related_relation_ids:
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 保留通用 SourceReference，不创建缺少槽位作用域的来源角色。
      en: Retain the general SourceReference and do not create a source role without slot scope.
      ja: general SourceReference を保持し slot scope のない source role を作成しません。
    why_valid_or_invalid:
      zh: 承担角色必须由具体槽位采用事实建立；只有可解析来源和来源版本不足以证明一次参与记录。
      en: Role bearing must be established by use in a concrete slot; a resolvable source and version alone do not prove a participation record.
      ja: role bearing は concrete slot use で成立し resolvable source/version だけでは participation record を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-context-source-role-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ContextSlot-has_source_role-ContextSourceRole
  predicate: has_source_role
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有上下文来源角色
    en: has context-source role
    ja: コンテキスト出典役割を持つ
  definitions:
    zh: 一个 ContextSlot 通过 has_source_role 组成零个或多个 ContextSourceRole；每个角色只说明某个独立 SourceReference 及其固定状态如何为该槽位提供来源，不复制来源内容。
    en: A ContextSlot composes zero or more ContextSourceRoles through has_source_role. Each role states how an independent SourceReference at a pinned state supplied that slot without copying source content.
    ja: ContextSlot は has_source_role で zero or more ContextSourceRole を構成し、各 role は independent SourceReference/pinned state が slot に source を提供した方法だけを示し content を copy しません。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: source_role_of_slot
    labels:
      zh: 是槽位的来源角色
      en: is source role of slot
      ja: slot の source role である
  conditions:
    - id: ContextSlot-has_source_role-ContextSourceRole-condition-001
      severity: error
      expression_language: plain
      expression: role.slot_id equals source ContextSlot.slot_id and role identity is unique within the containing ContextPackage version
      explanations:
        zh: 角色必须指回当前槽位，且在同一包版本中具有唯一身份。
        en: The role points back to the current slot and has unique identity within one package version.
        ja: role は current slot を指し一 package version 内で unique identity を持ちます。
      source_claims:
        - claim-context-source-role-011
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: ContextSlot-has_source_role-ContextSourceRole-example-positive-manual-001
      kind: positive
      labels:
        zh: 槽位组成来源角色正例
        en: slot source-role composition positive case
        ja: slot source-role composition 正例
      scenario_id: null
      descriptions:
        zh: package-v18 的 slot-04 为 policy.md/v7 证据组成 source-role-slot-04-policy-v7；角色的 slot_id 与 slot-04 一致，并在该包版本内唯一。
        en: slot-04 in package-v18 composes source-role-slot-04-policy-v7 for policy.md/v7 evidence. The role's slot_id equals slot-04 and is unique within that package version.
        ja: package-v18 の slot-04 は policy.md/v7 evidence の source-role-slot-04-policy-v7 を構成し role.slot_id は slot-04 と一致して package version 内で unique です。
      field_values:
        slot_id: slot-04
        context_source_role_id: source-role-slot-04-policy-v7
        package_version: "18"
      related_node_ids:
        - ContextSlot
        - ContextSourceRole
      related_relation_ids:
        - ContextSlot-has_source_role-ContextSourceRole
      expected_result:
        zh: 建立 ContextSlot —has_source_role→ ContextSourceRole，并把角色显示在槽位下一层。
        en: Assert ContextSlot —has_source_role→ ContextSourceRole and display the role beneath the slot.
        ja: ContextSlot —has_source_role→ ContextSourceRole を assertion し role を slot 下層に表示します。
      why_valid_or_invalid:
        zh: 角色在没有槽位时不能成立，且其身份条件由槽位、来源承担者和固定来源状态共同构成，故 composition 是诚实主骨架。
        en: The role cannot exist without the slot and its identity depends jointly on slot, source bearer, and pinned source state, making composition the honest primary backbone.
        ja: role は slot なしで存在できず identity は slot・source bearer・pinned state に依存するため composition が honest primary backbone です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-source-role-012
    - id: ContextSlot-has_source_role-ContextSourceRole-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 槽位组成来源角色边界例
        en: slot source-role composition boundary case
        ja: slot source-role composition 境界例
      scenario_id: null
      descriptions:
        zh: source-role-slot-09-policy-v7 声明 slot_id=slot-09，却被挂到 slot-04；即使承担者和版本有效，槽位键不一致也不能建立该组成事实。
        en: source-role-slot-09-policy-v7 declares slot_id=slot-09 but is attached to slot-04. Even with a valid bearer and version, the mismatched slot key prevents this composition fact.
        ja: source-role-slot-09-policy-v7 は slot_id=slot-09 を宣言するのに slot-04 へ接続され、valid bearer/version があっても slot key mismatch で composition fact は成立しません。
      field_values:
        source_slot_id: slot-04
        role_slot_id: slot-09
        context_source_role_id: source-role-slot-09-policy-v7
      related_node_ids:
        - ContextSlot
        - ContextSourceRole
      related_relation_ids:
        - ContextSlot-has_source_role-ContextSourceRole
      expected_result:
        zh: 拒绝这条 has_source_role 事实并报告槽位作用域不一致。
        en: Reject the has_source_role fact and report the slot-scope mismatch.
        ja: has_source_role fact を拒否し slot-scope mismatch を報告します。
      why_valid_or_invalid:
        zh: 组成关系的存在依赖由 role.slot_id 明确指向当前父槽位；相邻或同包出现不足以替代该身份条件。
        en: Composition requires role.slot_id to identify the current parent slot; adjacency or co-membership in one package cannot replace that identity condition.
        ja: composition は role.slot_id が current parent slot を示す必要があり adjacency/package co-membership では identity condition を代替できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-source-role-013
  source_claims:
    - claim-context-source-role-014
  distinct_fact_rationale:
    zh: 该边表达槽位对参与角色的存在依赖，不表达来源引用身份或内容复制。
    en: This edge expresses the role's existential dependence on a slot, not source-reference identity or content copying.
    ja: この edge は role の slot への existential dependence を表し source-reference identity/content copy は表しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: ContextSourceRole-borne_by-SourceReference
    predicate: borne_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由来源引用承担
      en: borne by source reference
      ja: 出典参照により担われる
    definitions:
      zh: ContextSourceRole 通过 borne_by 指向在该槽位中承担来源职责的独立 SourceReference；角色可随包版本结束，来源引用身份不因此改变。
      en: ContextSourceRole borne_by SourceReference identifies the independent SourceReference bearing source responsibility in that slot. The role may end with a package version without changing source-reference identity.
      ja: ContextSourceRole borne_by SourceReference は slot で source responsibility を担う independent SourceReference を示し role が package version と共に終了しても source-reference identity は変わりません。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: bears_context_source_role
      labels:
        zh: 承担上下文来源角色
        en: bears context-source role
        ja: context-source role を担う
    conditions:
      - id: ContextSourceRole-borne_by-SourceReference-condition-001
        severity: error
        expression_language: plain
        expression: role.source_reference_id resolves to target SourceReference and role.source_identity_id is a verifiable state of that target
        explanations:
          zh: 角色中的引用与来源状态必须解析到同一个目标来源。
          en: The role's reference and source state resolve to the same target source.
          ja: role の reference/source state は同一 target source に解決されます。
        source_claims:
          - claim-context-source-role-015
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ContextSourceRole-borne_by-SourceReference-example-positive-manual-001
        kind: positive
        labels:
          zh: 来源引用承担角色正例
          en: source-reference bearer positive case
          ja: source-reference bearer 正例
        scenario_id: null
        descriptions:
          zh: source-role-slot-04-policy-v7 的 source_reference_id=source-ref-policy，source_identity_id=source-ref-policy-v7；两个键均解析到 policy.md 同一引用及其 v7 状态。
          en: source-role-slot-04-policy-v7 names source-ref-policy and source-ref-policy-v7. Both keys resolve to the same policy.md reference and its v7 state.
          ja: source-role-slot-04-policy-v7 は source-ref-policy/source-ref-policy-v7 を示し両 key は同一 policy.md reference と v7 state に解決されます。
        field_values:
          context_source_role_id: source-role-slot-04-policy-v7
          source_reference_id: source-ref-policy
          source_identity_id: source-ref-policy-v7
        related_node_ids:
          - ContextSourceRole
          - SourceReference
        related_relation_ids:
          - ContextSourceRole-borne_by-SourceReference
        expected_result:
          zh: 建立 ContextSourceRole —borne_by→ SourceReference，同时保持来源引用原有分类。
          en: Assert ContextSourceRole —borne_by→ SourceReference while preserving the reference's original classification.
          ja: ContextSourceRole —borne_by→ SourceReference を assertion し reference の original classification を保持します。
        why_valid_or_invalid:
          zh: 角色引用键和状态键都指向同一独立来源，说明谁承担角色而不把角色强加为来源的永久子类。
          en: The role's reference and state keys identify one independent source, stating who bears the role without imposing a permanent subtype on that source.
          ja: role reference/state key は一 independent source を示し permanent subtype を source に課さず bearer を表します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-context-source-role-016
      - id: ContextSourceRole-borne_by-SourceReference-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 来源引用承担角色边界例
          en: source-reference bearer boundary case
          ja: source-reference bearer 境界例
        scenario_id: null
        descriptions:
          zh: 角色记录写 source_reference_id=source-ref-policy，却把 source_identity_id 指向 unrelated-report-v3；引用与状态属于不同来源，不能断言 source-ref-policy 承担该完整角色。
          en: The role names source-ref-policy but pins source_identity_id=unrelated-report-v3. Because reference and state belong to different sources, source-ref-policy cannot be asserted as bearer of that complete role.
          ja: role は source-ref-policy を示す一方 source_identity_id=unrelated-report-v3 を固定し reference/state が異なる source に属するため source-ref-policy を complete role bearer と断言できません。
        field_values:
          source_reference_id: source-ref-policy
          source_identity_id: unrelated-report-v3
        related_node_ids:
          - ContextSourceRole
          - SourceReference
        related_relation_ids:
          - ContextSourceRole-borne_by-SourceReference
        expected_result:
          zh: 拒绝 borne_by 事实并报告来源引用与固定状态不一致。
          en: Reject the borne_by fact and report the source-reference/source-state mismatch.
          ja: borne_by fact を拒否し source-reference/source-state mismatch を報告します。
        why_valid_or_invalid:
          zh: 承担者必须同时解释角色中的来源引用和来源状态；仅有名称相近或同包出现不能跨来源拼接身份。
          en: The bearer must explain both source reference and source state in the role; similar names or package co-occurrence cannot splice identity across sources.
          ja: bearer は role の source reference/state の両方を説明する必要があり similar name/package co-occurrence で cross-source identity を接合できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-context-source-role-017
    source_claims:
      - claim-context-source-role-018
    distinct_fact_rationale:
      zh: 该边表达临时角色承担，不是 is_a、slot composition 或来源内容复制。
      en: This edge expresses temporary role bearing, not is_a, slot composition, or source-content copying.
      ja: この edge は temporary role bearing を表し is_a・slot composition・source-content copy ではありません。
    layout_role: cross-link
    review_status: accepted
    target: concept:SourceReference
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-lifecycle-verification
  reviewed_on: 2026-07-17
