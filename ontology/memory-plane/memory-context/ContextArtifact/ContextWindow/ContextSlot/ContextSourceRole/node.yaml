schema: moonweave.ai/ontology-node/v1
id: ContextSourceRole
kind: concept
status: accepted
labels:
  zh: 上下文来源角色
  en: Context source role
  ja: コンテキスト情報源役割
semantics:
  short_definition:
    zh: 声明一个上下文槽位允许或要求何类来源工件的规则实体。
    en: A rule entity declaring what class of source artifact a context slot permits or requires.
    ja: コンテキストスロットが許可または要求する情報源工件クラスを宣言する規則実体です。
  definition:
    zh: >
      ContextSourceRole 将一个具体 ContextSlot 与一种内容来源类别绑定，例如治理指令、当前用户消息、会话历史、提示词实例、记忆记录、检索文档或工具结果。它描述填充资格和来源证明要求，而不是实际内容、实际记录、API message role 或安全授权结果。一个工具结果工件可以符合 tool_result 角色，但仍可能因过期、权限或预算而不被选入；一个用户消息可符合 current_user_message 角色，却不自动覆盖治理指令。来源角色使装配器能在不混淆来源类别和具体内容身份的情况下应用政策。
    en: >
      A ContextSourceRole binds a concrete ContextSlot to a class of content source such as governing instruction, current user message, conversation history, prompt instance, memory record, retrieved document, or tool result. It describes filling eligibility and provenance expectations, not actual content, an actual record, an API message role, or an authorization result. A tool-result artifact can match the tool_result role yet still fail selection because it is stale, unauthorized, or over budget. A user message can match current_user_message without automatically overriding governing instructions. Source roles let an assembler apply policy without conflating source class with concrete content identity.
    ja: >
      ContextSourceRole は、具体的な ContextSlot を統治指示、現在のユーザーメッセージ、会話履歴、プロンプトインスタンス、記憶記録、検索文書、ツール結果などの内容情報源クラスへ結び付けます。充填適格性と来歴要件を記述し、実内容、実記録、API message role、認可結果を記述しません。ツール結果工件は tool_result 役割に一致しても、陳腐化、未認可、予算超過により選択に失敗し得ます。ユーザーメッセージは current_user_message に一致しても、統治指示を自動的に上書きしません。情報源役割により、組立器は情報源クラスと具体的内容 ID を混同せずに方針を適用できます。
  why_needed:
    zh: 同一窗口中的来源具有不同可信度、时效、授权和保留要求；显式角色可避免把“来自哪里”误写成“必然可见”或“已经授权”。
    en: Sources in the same window have different trust, freshness, authorization, and retention requirements. Explicit roles prevent “where it came from” from being miswritten as “must be visible” or “is authorized.”
    ja: 同じウィンドウ内の情報源は、信頼性、鮮度、認可、保持要件が異なります。明示的な役割により、「どこから来たか」を「必ず可視」「認可済み」と誤記しません。
  includes:
    - zh: 关联槽位、来源类别、准入要求和精确来源证明要求。
      en: The linked slot, source category, admission requirement, and exact-provenance expectation.
      ja: 関連スロット、情報源カテゴリ、受け入れ要件、正確な来歴要件。
  excludes:
    - zh: 实际源文本、授权决策、内容真值判断、模型 API role 字符串和最终包成员关系。
      en: Actual source text, authorization decisions, content-truth judgments, model-API role strings, and final package membership.
      ja: 実情報源テキスト、認可決定、内容真偽判断、モデル API role 文字列、最終パッケージ所属。
  semantic_kind: entity
  aliases:
    - context provenance role
    - slot source policy
engineering:
  explanation:
    zh: >
      角色应作为装配策略的显式数据。LangChain 将运行时上下文描述为可包含对话历史、中间结果、工具与 LLM 输出的数据；OpenAI Realtime 把会话项按角色和内容类型表示。项目可从这些真实来源形成 role 分类，但必须在把工件放入包前另行检查授权、时效、重复和预算，不能只按 API role 直接信任。
    en: >
      Store roles as explicit assembler-policy data. LangChain describes runtime context that can contain conversation history, intermediate results, and tool or LLM outputs; OpenAI Realtime represents conversation items with roles and content types. A project may derive role categories from these real sources, but must separately check authorization, freshness, duplication, and budget before placing an artifact in a package rather than trusting an API role alone.
    ja: >
      役割は明示的な組立方針データとして保存します。LangChain は会話履歴、中間結果、ツール・LLM 出力を含み得る実行時コンテキストを説明し、OpenAI Realtime は会話項目を role と内容種別で表現します。プロジェクトはこれら実情報源から役割カテゴリを導けますが、API role だけを信頼せず、工件をパッケージへ入れる前に認可、鮮度、重複、予算を別途検査しなければなりません。
  typical_input:
    - description: Source-class policy used when checking candidate artifacts for a slot.
      format: |
        {
          "slot_ref": "ctx-slot-tool-evidence",
          "content_origin_kind": "tool_result",
          "admission_requirement": "optional",
          "provenance_requirement": "exact_reference_required"
        }
    - description: Realtime item source whose API role is not treated as a complete policy decision.
      format: |
        {
          "type": "message",
          "role": "user",
          "content": [{"type": "input_text", "text": "Can I change my billing cycle?"}]
        }
  typical_output:
    - description: A role rule used to validate an artifact before package inclusion.
      format: |
        {
          "source_role_id": "ctx-source-role-tool",
          "slot_ref": "ctx-slot-tool-evidence",
          "content_origin_kind": "tool_result",
          "provenance_requirement": "exact_reference_required"
        }
  reference_implementations:
    - name: LangChain context overview
      url: https://docs.langchain.com/oss/python/concepts/context
      description: Describes runtime context containing history, intermediate results, and tool or LLM outputs.
    - name: OpenAI Realtime API reference
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents conversation-item roles, content types, and ordered item creation.
  source_claims:
    - claim-context-source-role-runtime-kinds
    - claim-context-source-role-api-role-boundary
structure:
  identity_keys:
    - source_role_id
  fields:
    - id: source_role_id
      labels:
        zh: 来源角色标识
        en: source role ID
        ja: 情報源役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个槽位范围内的来源类别规则，不复用为源记录、工件或消息角色标识。
        en: Identifies a source-class rule within one slot scope and is not reused as a source-record, artifact, or message-role ID.
        ja: 一つのスロット範囲内の情報源クラス規則を識別し、情報源記録、工件、メッセージ役割の ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-source-role-[A-Za-z0-9._-]+$'
      example_value: ctx-source-role-tool
      source_claims:
        - claim-context-source-role-runtime-kinds
    - id: slot_ref
      labels:
        zh: 关联槽位引用
        en: linked slot reference
        ja: 関連スロット参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该角色规范所约束的 ContextSlot；来源角色离开具体槽位没有预算和顺序含义。
        en: Points to the ContextSlot constrained by this role specification. A source role outside a concrete slot has no budget or ordering meaning.
        ja: この役割仕様が制約する ContextSlot を指します。具体的スロットの外にある情報源役割には、予算・順序の意味がありません。
      allowed_values: []
      pattern: '^ctx-slot-[A-Za-z0-9._-]+$'
      example_value: ctx-slot-tool-evidence
      source_claims:
        - claim-context-source-role-runtime-kinds
    - id: content_origin_kind
      labels:
        zh: 内容来源类别
        en: content origin kind
        ja: 内容情報源種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明槽位可接受的来源类别，并与具体来源引用分离；一个类别标签不能替代实际工件来源。
        en: States the source class accepted by a slot and remains separate from concrete source references. A category label cannot substitute for actual artifact provenance.
        ja: スロットが受け入れる情報源クラスを示し、具体的な情報源参照とは分離します。カテゴリラベルは実工件の来歴を代替できません。
      allowed_values:
        - governing_instruction
        - current_user_message
        - conversation_history
        - prompt_instance
        - memory_record
        - retrieved_document
        - tool_result
      pattern: null
      example_value: tool_result
      source_claims:
        - claim-context-source-role-runtime-kinds
    - id: admission_requirement
      labels:
        zh: 准入要求
        en: admission requirement
        ja: 受け入れ要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该来源类别在槽位中是必须、可选还是仅在触发条件成立时要求；这不是授权状态。
        en: States whether this source class is required, optional, or required only under a trigger condition in the slot. It is not an authorization status.
        ja: この情報源クラスがスロット内で必須、任意、またはトリガー条件時のみ必須かを示します。認可状態ではありません。
      allowed_values:
        - required
        - optional
        - conditional
      pattern: null
      example_value: optional
      source_claims:
        - claim-context-source-role-api-role-boundary
    - id: provenance_requirement
      labels:
        zh: 来源证明要求
        en: provenance requirement
        ja: 来歴要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明填充该角色的工件是否必须有精确记录、消息或文档引用，或是否可引用已被摘要的工件范围。
        en: States whether an artifact filling this role needs an exact record, message, or document reference or may refer to an already summarized artifact range.
        ja: この役割を満たす工件が正確な記録、メッセージ、文書参照を必要とするか、既に要約された工件範囲を参照できるかを示します。
      allowed_values:
        - exact_reference_required
        - summarized_artifact_range_allowed
      pattern: null
      example_value: exact_reference_required
      source_claims:
        - claim-context-source-role-runtime-kinds
  constraints:
    - id: context-source-role-is-slot-scoped-class-rule
      severity: error
      expression_language: plain
      expression: A ContextSourceRole must point to one ContextSlot and one content_origin_kind with a declared admission_requirement and provenance_requirement; it cannot be asserted as an actual artifact or source record.
      explanation:
        zh: 角色规定可接受的来源类，而实际内容需要另外的工件、包和可见性事实。
        en: A role specifies an acceptable source class, while actual content requires separate artifact, package, and visibility facts.
        ja: 役割は受け入れ可能な情報源クラスを指定し、実内容には別の工件、パッケージ、可視性事実が必要です。
      source_claims:
        - claim-context-source-role-runtime-kinds
    - id: context-source-role-does-not-grant-authorization
      severity: error
      expression_language: plain
      expression: Matching content_origin_kind to a role does not assert authorization, truth, freshness, final package inclusion, or model delivery. Those require independent policy and assembly facts.
      explanation:
        zh: “工具结果”或“用户消息”是来源标签，不是可信、许可或必然可见的证明。
        en: “Tool result” or “user message” is a source label, not proof of trust, permission, or mandatory visibility.
        ja: 「ツール結果」または「ユーザーメッセージ」は情報源ラベルであり、信頼、許可、必須可視性の証明ではありません。
      source_claims:
        - claim-context-source-role-api-role-boundary
examples:
  - id: context-source-role-example-positive-tool-evidence

    labels:
      zh: 工具证据槽位的工具结果角色
      en: Tool-result role for a tool-evidence slot
      ja: ツール根拠スロットのツール結果役割

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      source_role_id: ctx-source-role-tool
      slot_ref: ctx-slot-tool-evidence
      content_origin_kind: tool_result
      admission_requirement: optional
      provenance_requirement: exact_reference_required
    related_node_ids:
      - ContextSourceRole
      - ContextSlot
      - ContextArtifact
    related_relation_ids: []

    source_claims:
      - claim-context-source-role-runtime-kinds
  - id: context-source-role-example-counterexample-role-is-authorization

    labels:
      zh: 把来源角色当作授权许可
      en: Treat a source role as authorization permission
      ja: 情報源役割を認可許可として扱う

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      source_role_id: ctx-source-role-memory
      slot_ref: ctx-slot-selected-memory
      content_origin_kind: memory_record
      admission_requirement: optional
      provenance_requirement: exact_reference_required
    related_node_ids:
      - ContextSourceRole
      - MemoryRecord
      - ContextPackage
    related_relation_ids: []

    source_claims:
      - claim-context-source-role-api-role-boundary
  - id: context-source-role-example-boundary-summary-history-role

    labels:
      zh: 允许已摘要的历史范围
      en: Allow an already summarized history range
      ja: 既に要約された履歴範囲を許可する

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      source_role_id: ctx-source-role-history-summary
      slot_ref: ctx-slot-history-summary
      content_origin_kind: conversation_history
      admission_requirement: optional
      provenance_requirement: summarized_artifact_range_allowed
    related_node_ids:
      - ContextSourceRole
      - ContextSummary
      - ContextSlot
    related_relation_ids: []

    source_claims:
      - claim-context-source-role-runtime-kinds
  - id: context-source-role-example-instance-realtime-user-role

    labels:
      zh: 实例：Realtime 用户消息角色
      en: "Instance: Realtime user message role"
      ja: 実例：Realtime のユーザーメッセージ役割

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      source_role_id: ctx-source-role-current-user
      slot_ref: ctx-slot-current-request
      content_origin_kind: current_user_message
      admission_requirement: required
      provenance_requirement: exact_reference_required
    related_node_ids:
      - ContextSourceRole
      - ContextSlot
      - ContextIngressEvent
    related_relation_ids: []
    source_claims:
      - claim-context-source-role-api-role-boundary
parent_relation:
  id: ContextSourceRole-part-of-ContextSlot
  predicate: part_of
  target: concept:ContextSlot
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是上下文槽位的来源规则部分
    en: is a source-rule part of context slot
    ja: コンテキストスロットの情報源規則部分である
  definitions:
    zh: ContextSourceRole 作为来源类别和准入规则属于一个具体 ContextSlot，而不是独立的源内容。
    en: ContextSourceRole belongs to a concrete ContextSlot as a source-category and admission rule, not as independent source content.
    ja: ContextSourceRole は情報源カテゴリ・受け入れ規則として具体的 ContextSlot に属し、独立した情報源内容ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个槽位可有多个允许角色，一个角色规则只约束一个具体槽位。
    en: A slot may have multiple allowed roles, while one role rule constrains one concrete slot.
    ja: 一つのスロットは複数の許可役割を持て、一つの役割規則は一つの具体的スロットを制約します。
  inverse_reading:
    predicate: has_context_source_role
    labels:
      zh: 具有上下文来源角色
      en: has context source role
      ja: コンテキスト情報源役割を持つ
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-source-role-runtime-kinds
  distinct_fact_rationale:
    zh: 此关系表达槽位规则组成，不表达任何具体来源记录、授权、包成员或模型可见性。
    en: This relation expresses slot-rule composition, not a concrete source record, authorization, package membership, or model visibility.
    ja: この関係はスロット規則の構成を表し、具体的情報源記録、認可、パッケージ所属、モデル可視性を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-context-overview
    title: LangChain context overview
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/concepts/context
    relevance: Describes dynamic runtime context including conversation history, intermediate results, and tool or LLM outputs.
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents conversation items with roles and content types plus ordered item creation.
source_claims:
  - id: claim-context-source-role-runtime-kinds
    source: langchain-context-overview
    supports: LangChain describes dynamic runtime context that may include conversation history, intermediate results, and tool or LLM outputs. Moonweave uses ContextSourceRole to classify such candidate origins for a particular slot while requiring concrete artifact provenance separately.
    locator: "Context overview: dynamic runtime context"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-source-role-api-role-boundary
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents conversation items with role and content-type fields. Moonweave treats an API role as a possible source-category signal only; authorization, freshness, package admission, and final visibility remain separate decisions.
    locator: "Realtime ConversationItem message role and content fields"
    evidence_kind: ontology-design-inference
    confidence: high