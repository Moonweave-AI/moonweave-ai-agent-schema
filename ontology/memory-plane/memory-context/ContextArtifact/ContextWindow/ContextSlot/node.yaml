schema: moonweave.ai/ontology-node/v1
id: ContextSlot
kind: concept
status: accepted
labels:
  zh: 上下文槽位
  en: context slot
  ja: コンテキストスロット
semantics:
  short_definition:
    zh: 上下文窗口中具有位置、角色和内容范围的一个有序组成槽位。
    en: An ordered component slot in a context window with a position, role, and content extent.
    ja: 位置・役割・内容範囲を持つコンテキスト窓内の順序付き構成スロットです。
  definition:
    zh: 上下文槽位是一种窗口组成信息；其种差是：它属于某个 ContextWindow，具有稳定序位、内容角色、范围或长度，并承载或引用一项系统指令、消息、检索证据、记忆、摘要或工具结果。它不是来源本身，也不是完整窗口。
    en: A ContextSlot is window-component information belonging to a ContextWindow, with stable position, content role, extent or length, and one carried or referenced instruction, message, retrieved evidence item, memory, summary, or tool result. It is neither the source itself nor the whole window.
    ja: ContextSlot は ContextWindow に属する窓構成情報で、安定順位、内容役割、範囲・長さを持ち、指示・メッセージ・検索証拠・記憶・要約・ツール結果の一項を保持または参照します。出典本体でも窓全体でもありません。
  why_needed:
    zh: 槽位让窗口成员的顺序、预算占用、来源和裁剪结果可逐项查询，而不把所有内容压成不可解释的文本串。
    en: Slots make each member's order, budget usage, provenance, and trimming result queryable instead of flattening the window into an opaque string.
    ja: 各メンバーの順序、予算使用、来歴、裁剪結果を照会可能にし、窓を不透明な文字列へ潰しません。
  includes:
    - zh: 纳入“window-v17 的第 4 槽，role=retrieved-evidence，范围 812 tokens，来源 chunk-42”这类窗口成员。
      en: Includes members such as “slot 4 of window-v17, role=retrieved-evidence, extent 812 tokens, source chunk-42.”
      ja: 「window-v17 の第4スロット、role=retrieved-evidence、範囲812 tokens、出典 chunk-42」のような窓メンバーを含みます。
  excludes:
    - zh: 排除 ContextSourceRole、独立 SourceReference、原始 Chunk、ContextBudget 和完整 ContextWindow；它们分别是槽位中的来源角色、该角色所指的独立引用、内容对象、容量约束和整体。
      en: Excludes ContextSourceRole, the independent SourceReference borne by that role, the original Chunk, ContextBudget, and the complete ContextWindow because they are respectively a slot-local provenance role, its reference bearer, a content object, a capacity constraint, and the whole.
      ja: ContextSourceRole、その役割が担う独立 SourceReference、元 Chunk、ContextBudget、完全 ContextWindow は、それぞれ slot-local provenance role・参照担体・内容対象・容量制約・全体なので除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - context_window_ref
    - ordinal
  fields:
    - id: context_window_ref
      labels:
        zh: 所属上下文窗口引用
        en: owning context window reference
        ja: 所属コンテキスト窓参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该槽位作为组成项所属的唯一 ContextWindow；同一序位在另一窗口中是不同槽位。
        en: References the one ContextWindow of which this slot is a component; the same ordinal in another window denotes a different slot.
        ja: slot が構成項として属する唯一の ContextWindow を参照し、別 window の同じ ordinal は別 slot です。
      allowed_values: []
      pattern: null
      example_value: context-window:88
      source_claims:
        - claim-context-slot-003
    - id: ordinal
      labels:
        zh: 窗口内序位
        en: window-local ordinal
        ja: 窓内序位
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录槽位在所属窗口中的零基稳定位置；它只在 context_window_ref 内唯一。
        en: Records the slot's stable zero-based position in its owning window and is unique only within context_window_ref.
        ja: 所属 window 内の安定した zero-based 位置を記録し、context_window_ref 内だけで一意です。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims:
        - claim-context-slot-004
    - id: content_role
      labels:
        zh: 内容角色
        en: content role
        ja: 内容役割
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该槽位中的项在模型输入中作为系统指令、消息、检索证据、记忆、摘要、工具结果或其他审查后角色。
        en: States whether the item serves as a system instruction, message, retrieved evidence, memory, summary, tool result, or another reviewed role in model input.
        ja: model input 内で項目が system instruction・message・retrieved evidence・memory・summary・tool result 等どの審査済み役割を担うか示します。
      allowed_values: []
      pattern: null
      example_value: retrieved-evidence
      source_claims:
        - claim-context-slot-005
    - id: content_ref
      labels:
        zh: 承载内容引用
        en: carried content reference
        ja: 保持内容参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用槽位承载或内联表示的唯一信息对象；槽位身份不得替代该对象自身身份。
        en: References the one information object carried or represented inline by the slot; slot identity does not replace the object's own identity.
        ja: slot が保持・inline 表現する一つの情報対象を参照し、slot identity は対象自身の identity を置換しません。
      allowed_values: []
      pattern: null
      example_value: chunk:policy-12
      source_claims:
        - claim-context-slot-006
    - id: content_extent
      labels:
        zh: 内容范围
        en: content extent
        ja: 内容範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际进入窗口的内容范围与单位，例如完整对象、来源片段、消息部分或摘要表示；不得暗示未纳入的来源部分。
        en: Records the extent and unit actually entering the window, such as a whole object, source span, message part, or summary representation; it does not imply inclusion of omitted source portions.
        ja: window へ実際入る内容範囲・単位（全対象、出典範囲、message 部分、summary 表現等）を記録し、省略出典部分の投入を含意しません。
      allowed_values: []
      pattern: null
      example_value:
        unit: token
        start: 0
        end_exclusive: 380
      source_claims:
        - claim-context-slot-007
    - id: token_count
      labels:
        zh: 令牌计数
        en: token count
        ja: トークン数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选记录在已声明 tokenizer 下该槽位实际占用的非负 token 数；没有 tokenizer 语境时不得伪造跨模型可比性。
        en: Optionally records the slot's non-negative token usage under a declared tokenizer; without tokenizer context it does not assert cross-model comparability.
        ja: 宣言済み tokenizer 下の slot 非負 token 使用量を任意記録し、tokenizer 文脈なしに model 間比較可能性を主張しません。
      allowed_values: []
      pattern: null
      example_value: 380
      source_claims:
        - claim-context-slot-008
  constraints:
    - id: context-slot-position-and-content-boundary
      severity: error
      expression_language: plain
      expression: ordinal is a non-negative integer unique within context_window_ref, content_extent is non-empty and resolves within content_ref, and the slot carries exactly one content_ref; source references and provenance roles remain separate nodes
      explanations:
        zh: 序位必须在所属窗口内非负且唯一，内容范围必须非空并解析到唯一承载对象；来源引用和来源角色保持为独立节点，不能复制成槽位身份。
        en: Ordinal is non-negative and unique in the owning window, and the non-empty extent resolves to exactly one carried object. Source references and provenance roles remain separate nodes rather than copied slot identity.
        ja: ordinal は所属 window 内で非負・一意で、空でない範囲は一つの保持対象へ解決します。出典参照・来歴 role は slot identity へ複製せず別 node のままです。
      source_claims:
        - claim-context-slot-009
  required_relation_constraints: []
examples:
  - id: ContextSlot-example-positive-001
    kind: positive
    labels:
      zh: 上下文槽位正例
      en: Positive example of context slot
      ja: コンテキストスロットの正例
    scenario_id: null
    descriptions:
      zh: 窗口 ctx-window-88 的槽位 slot-04 位于序号 4，承载 chunk-policy-12 的 380-token 证据；其来源角色 source-role-04 由独立 SourceReference ref-policy-12 承担，因此槽位位置、角色绑定与来源身份不会混成一个节点。
      en: In window ctx-window-88, slot-04 has ordinal 4 and carries a 380-token extent of chunk-policy-12. Its provenance role source-role-04 is borne by the independent SourceReference ref-policy-12, so slot position, role binding, and source identity remain distinct nodes.
      ja: 窓 ctx-window-88 の slot-04 は序数4で chunk-policy-12 の380-token証拠を保持します。出典役割 source-role-04 は独立 SourceReference ref-policy-12 が担うため、slot位置・役割結合・出典同一性を別ノードとして保ちます。
    field_values:
      context_window_ref: context-window:88
      ordinal: 4
      content_role: retrieved-evidence
      content_ref: chunk:policy-12
      content_extent:
        unit: token
        start: 0
        end_exclusive: 380
      token_count: 380
    related_node_ids:
      - ContextSlot
      - ContextSourceRole
      - SourceReference
    related_relation_ids:
      - ContextSlot-has_source_role-ContextSourceRole
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 查询先从 slot-04 沿 has_source_role 找到 source-role-04，再沿 borne_by 找到 ref-policy-12；不得跳过角色节点复制来源身份。
      en: The query first follows has_source_role from slot-04 to source-role-04 and then borne_by to ref-policy-12; it must not bypass the role node by copying source identity onto the slot.
      ja: 照会は slot-04 から has_source_role で source-role-04、次に borne_by で ref-policy-12 を得ます。役割ノードを飛ばして出典同一性を slot へ複製してはなりません。
    why_valid_or_invalid:
      zh: ContextSlot 的身份来自一个窗口内的位置和承载内容；ContextSourceRole 的身份来自该槽位中的来源职能；SourceReference 的身份来自可重识别来源。两条边保留了三种不同身份。
      en: The object is identified by its position and role within one window and points to carried content and provenance; it is neither the source target nor the complete window.
      ja: ContextSlot は窓内位置と保持内容、ContextSourceRole はその slot 内の出典機能、SourceReference は再同定可能な出典で識別され、二つの辺が三つの同一性を維持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-slot-010
      - claim-context-slot-011
  - id: ContextSlot-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文槽位边界例
      en: Boundary case for context slot
      ja: コンテキストスロットの境界例
    scenario_id: null
    descriptions:
      zh: ref-policy-12 只标识 policy.md/version 7 的第 120–147 行；若没有 source-role-04 及其对 slot-04 的组成归属，它仍只是 SourceReference，既不是 ContextSourceRole，也不是 ContextSlot。
      en: ref-policy-12 only identifies lines 120–147 of policy.md/version 7. Without source-role-04 and that role's compositional membership in slot-04, it remains a SourceReference and is neither ContextSourceRole nor ContextSlot.
      ja: ref-policy-12 は policy.md/version 7 の120–147行だけを識別します。source-role-04 とその slot-04 への構成所属がなければ SourceReference のままで、ContextSourceRole でも ContextSlot でもありません。
    field_values: {}
    related_node_ids:
      - ContextSlot
      - ContextSourceRole
      - SourceReference
    related_relation_ids:
      - ContextSlot-has_source_role-ContextSourceRole
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 验证器保留 ref-policy-12 的 SourceReference 类型；只有槽位组成的 ContextSourceRole 才能表达“该来源在此槽位中担当来源”。
      en: Validation retains ref-policy-12 as SourceReference; only a ContextSourceRole composed by a slot can express that the reference serves as provenance for that slot.
      ja: 検証器は ref-policy-12 を SourceReference として維持し、slot が構成する ContextSourceRole だけが「この出典がこの slot の来歴を担う」ことを表せます。
    why_valid_or_invalid:
      zh: 可解析来源并不自动成为槽位中的角色；角色必须同时具有槽位归属和来源承担者。该边界阻止 SourceReference 被错误塞进 ContextWindow 的组成层级。
      en: A resolvable source does not automatically become a role in a slot. The role requires both slot membership and a reference bearer, preventing SourceReference from being inserted into the ContextWindow composition hierarchy.
      ja: 解決可能な出典が自動的に slot 内役割になるわけではありません。役割には slot 所属と参照担体の両方が必要で、SourceReference を ContextWindow 構成階層へ誤挿入することを防ぎます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-slot-012
      - claim-context-slot-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ContextWindow-has_slot-ContextSlot
  predicate: has_slot
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: has slot
    en: has slot
    ja: has slot
  definitions:
    zh: ContextWindow-has_slot-ContextSlot 把有界窗口组成到按位置唯一的 ContextSlot；每个槽位在该窗口内有一个 ordinal、角色和内容范围，不能跨窗口复用同一槽位身份。
    en: ContextWindow-has_slot-ContextSlot composes a bounded window from position-unique ContextSlots. Each slot has one ordinal, role, and content extent in that window and its identity is not reused across windows.
    ja: ContextWindow-has_slot-ContextSlot は有界windowを位置一意ContextSlotで構成し、各slotは当該window内のordinal・role・内容範囲を持ち同一slot identityをwindow横断再利用しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: is_target_of_has_slot
    labels:
      zh: 反向：has slot
      en: is target of has slot
      ja: 逆方向：has slot
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContextWindow-has_slot-ContextSlot-example-positive-001
      kind: positive
      labels:
        zh: has slot正例
        en: "Positive case: has slot"
        ja: has slotの正例
      scenario_id: null
      descriptions:
        zh: window-88 包含 slot-0..5，每个 ordinal 唯一且总 token 数为 31.5k。
        en: window-88 contains slot-0..5 with unique ordinals and total consumption 31.5k tokens.
        ja: window-88 はordinal一意の slot-0..5 を含み総消費31.5k tokensです。
      field_values: {}
      related_node_ids:
        - ContextWindow
        - ContextSlot
      related_relation_ids:
        - ContextWindow-has_slot-ContextSlot
      expected_result:
        zh: 窗口查询按 ordinal 返回全部槽位。
        en: The window query returns every slot by ordinal.
        ja: window照会はordinal順に全slotを返します。
      why_valid_or_invalid:
        zh: 槽位是窗口内部组成项而非独立上下文产物。
        en: Slots are internal window components rather than independent context artifacts.
        ja: slotは独立文脈成果物でなくwindow内部構成項です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-slot-014
    - id: ContextWindow-has_slot-ContextSlot-example-boundary-001
      kind: boundary
      labels:
        zh: has slot边界例
        en: "Boundary case: has slot"
        ja: has slotの境界例
      scenario_id: null
      descriptions:
        zh: slot-2@window-87 位置相同但属于另一窗口。
        en: slot-2@window-87 has the same ordinal but belongs to another window.
        ja: slot-2@window-87 は同ordinalですが別window所属です。
      field_values: {}
      related_node_ids:
        - ContextWindow
        - ContextSlot
      related_relation_ids:
        - ContextWindow-has_slot-ContextSlot
      expected_result:
        zh: 不得把另一窗口槽位并入 window-88。
        en: A slot from another window is not composed into window-88.
        ja: 別window slotを window-88 に組込みません。
      why_valid_or_invalid:
        zh: 槽位身份由 window_id 与 ordinal 共同决定。
        en: Slot identity is determined jointly by window ID and ordinal.
        ja: slot同一性はwindow_idとordinalで共同決定します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-slot-015
  source_claims:
    - claim-context-slot-016
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
