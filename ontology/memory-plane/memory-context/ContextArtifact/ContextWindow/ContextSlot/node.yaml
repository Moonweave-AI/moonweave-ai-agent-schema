schema: moonweave.ai/ontology-node/v1
id: ContextSlot
kind: concept
labels:
  zh: 上下文槽位
  en: Context slot
  ja: コンテキストスロット
semantics:
  short_definition:
    zh: 窗口内具有序位、角色与来源引用的单个有序组成单元。
    en: One ordered component unit in a window with ordinal, role, and source reference.
    ja: ordinal/role/source reference を持つ window 内の単一 ordered component unit。
  definition:
    zh: ContextSlot 是 ContextWindow 的组成信息；其种差是稳定序位、内容角色（system/user/assistant/tool/retrieved-evidence 等）、token 范围，并承载或引用一项指令、消息、检索块、记忆、摘要或工具结果。它映射 Cursor @ 引用槽、system prompt 位置、tool results 位置，但不是来源本体或完整窗口。
    en: ContextSlot is window-component information with stable ordinal, content role (system/user/assistant/tool/retrieved-evidence, etc.), token extent, and one carried or referenced instruction, message, chunk, memory, summary, or tool result. It maps Cursor @-reference slots, system prompt position, and tool-result positions but is neither the source itself nor the whole window.
    ja: ContextSlot は stable ordinal/content role（system/user/assistant/tool/retrieved-evidence 等）/token extent を持つ window component。Cursor @ 参照 slot/system prompt 位置/tool result 位置に写像するが出典本体でも window 全体でもない。
  why_needed:
    zh: 槽位让窗口成员的顺序、预算占用、来源与裁剪结果可逐项查询，支持 Claude system→user→assistant 角色排序与 Cursor 多 @ 文件独立计量。
    en: Slots make each member's order, budget usage, provenance, and trim outcome queryable, supporting Claude system→user→assistant ordering and per-file Cursor @ reference accounting.
    ja: 各 member の order/budget usage/来歴/trim outcome を item 単位照会可能。Claude system→user→assistant 順序と Cursor 複数 @ ファイル独立計量を支持。
  includes:
    - zh: 纳入“window-v17 slot 4：role=retrieved-evidence，812 tokens，source=chunk-42@v7”这类窗口成员。
      en: Includes members such as "window-v17 slot 4, role=retrieved-evidence, 812 tokens, source=chunk-42@v7."
      ja: 「window-v17 slot 4、role=retrieved-evidence、812 tokens、source=chunk-42@v7」のような window member。
  excludes:
    - zh: 排除 ContextSourceRole（槽内来源角色）、原始 RetrievedChunk、ContextBudget 与完整 ContextWindow。
      en: Excludes ContextSourceRole, raw RetrievedChunk, ContextBudget, and complete ContextWindow.
      ja: ContextSourceRole/raw RetrievedChunk/ContextBudget/完全 ContextWindow を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor @file/@folder 每个引用通常映射为独立 slot；Claude API messages 数组每条 message 占一 slot；tool_result 块在 assistant 消息之后按 API 约定占后续 slot；Pichay eviction 将 slot 内容替换为占位符但保留 ordinal。
    en: Each Cursor @file/@folder reference maps to a distinct slot; each Claude API messages entry occupies one slot; tool_result blocks follow assistant messages per API convention; Pichay eviction replaces slot content with placeholders while preserving ordinal.
    ja: Cursor @file/@folder 各参照は独立 slot。Claude API messages 各 entry が 1 slot。tool_result は assistant 後に API 規約で slot 占有。Pichay eviction は ordinal 保持し content を placeholder 化。
  typical_input:
    - description: Cursor @ reference resolved to slot content
      format: |
        {
          "ordinal": 3,
          "content_role": "referenced-file",
          "source_ref": "src/auth/middleware.ts@vabc123",
          "token_extent": 4200
        }
      source_claims: [claim-context-slot-cursor]
    - description: Claude messages API slot ordering
      format: |
        [
          {"role": "system", "content": "..."},
          {"role": "user", "content": "..."},
          {"role": "assistant", "content": "...", "tool_use": [...]},
          {"role": "user", "content": [{"type": "tool_result", ...}]}
        ]
      source_claims: [claim-context-slot-anthropic]
  typical_output: []
  reference_implementations:
    - name: Cursor @ References
      url: https://cursor.com/docs/agent/tools/search
      description: Explicit file/folder references become context slots.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Role-ordered message slots with tool results.
structure:
  identity_keys:
    - context_window_ref
    - ordinal
  fields:
    - id: context_window_ref
      labels:
        zh: 所属窗口引用
        en: Owning window reference
        ja: 所属 window 参照
      definitions:
        zh: 引用该槽位所属的唯一 ContextWindow。
        en: References the one ContextWindow owning this slot.
        ja: この slot が属する唯一 ContextWindow を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: context-window:88
      allowed_values: []
      source_claims:
        - claim-context-slot-window-ref
    - id: ordinal
      labels:
        zh: 窗口内序位
        en: Window ordinal
        ja: window 内 ordinal
      definitions:
        zh: 槽位在所属窗口中从 1 开始的唯一顺序位置。
        en: Unique 1-based position of the slot within its owning window.
        ja: 所属 window 内の 1 始まり一意位置。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims:
        - claim-context-slot-ordinal
    - id: content_role
      labels:
        zh: 内容角色
        en: Content role
        ja: content role
      definitions:
        zh: 槽位内容在模型输入中的语义角色，如 system_instruction、user_message、assistant_message、tool_result、retrieved_evidence、referenced_file。
        en: Semantic role of slot content in model input, e.g. system_instruction, user_message, assistant_message, tool_result, retrieved_evidence, referenced_file.
        ja: model input における slot content の semantic role。system_instruction/user_message/assistant_message/tool_result/retrieved_evidence/referenced_file 等。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: retrieved_evidence
      allowed_values: []
      source_claims:
        - claim-context-slot-role
    - id: token_extent
      labels:
        zh: Token 范围
        en: Token extent
        ja: token extent
      definitions:
        zh: 该槽位内容按窗口 capacity_unit 计量的长度。
        en: Length of slot content measured in the window capacity_unit.
        ja: window capacity_unit で測った slot content 長。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 812
      allowed_values: []
      source_claims:
        - claim-context-slot-extent
    - id: source_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: source 参照
      definitions:
        zh: 指向槽位所引用内容的固定版本，如 message、chunk、@ 文件状态或 tool result ID。
        en: Pinned version of content referenced by the slot, such as message, chunk, @ file state, or tool result ID.
        ja: slot が参照する content の固定版。message/chunk/@ file state/tool result ID 等。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: chunk-42@v7
      allowed_values: []
      source_claims:
        - claim-context-slot-source
  constraints:
    - id: context-slot-ordinal-unique-per-window
      severity: error
      expression_language: plain
      expression: ordinal is unique within context_window_ref
      explanation:
        zh: 同一窗口内序位不得重复。
        en: Ordinals must not repeat within one window.
        ja: 同一 window 内で ordinal 重複不可。
      source_claims:
        - claim-context-slot-ordinal
  required_relations: []
examples:
  - id: ContextSlot-example-cursor-at-ref
    labels:
      zh: Cursor @ 引用槽位
      en: Cursor @ reference slot
      ja: Cursor @ 参照 slot
    descriptions:
      zh: 用户在 Cursor 发送 "@src/auth/middleware.ts 会话校验在哪？"；客户端将 middleware.ts 全文解析为 slot 3（role=referenced_file，4,200 tokens，source_ref=middleware.ts@vabc123），排在 system rules 与用户消息之后。
      en: User sends "@src/auth/middleware.ts Where is session validation?" in Cursor; client resolves middleware.ts full text as slot 3 (role=referenced_file, 4,200 tokens, source_ref=middleware.ts@vabc123) after system rules and user message.
      ja: ユーザーが Cursor で「@src/auth/middleware.ts セッション検証はどこ？」送信。クライアントは middleware.ts 全文を slot 3（role=referenced_file、4,200 tokens）に解決。system rules/user message の後。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "@ references"
    field_values:
      context_window_ref: context-window:204
      ordinal: 3
      content_role: referenced_file
      token_extent: 4200
      source_ref: src/auth/middleware.ts@vabc123
    related_node_ids:
      - ContextSlot
      - ContextWindow
    related_relation_ids:
      - ContextWindow-has_slot-ContextSlot
    source_claims:
      - claim-context-slot-cursor
  - id: ContextSlot-example-system-prompt
    labels:
      zh: System prompt 槽位
      en: System prompt slot
      ja: system prompt slot
    descriptions:
      zh: Claude API 调用中 slot 1 固定为 system_instruction，包含 CLAUDE.md、unscoped rules 与 tool schemas 摘要，通常预留 4,096 tokens 且 ordinal 不变。
      en: In Claude API calls slot 1 is system_instruction containing CLAUDE.md, unscoped rules, and tool schema summary, typically reserving ~4,096 tokens with fixed ordinal.
      ja: Claude API 呼び出しで slot 1 は system_instruction（CLAUDE.md/unscoped rules/tool schema 要約）。通常約 4,096 tokens 予約、ordinal 固定。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: system prompt position
    field_values:
      ordinal: 1
      content_role: system_instruction
      token_extent: 4096
    related_node_ids:
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-slot-anthropic
  - id: ContextSlot-example-tool-result
    labels:
      zh: Tool result 槽位
      en: Tool result slot
      ja: tool result slot
    descriptions:
      zh: assistant 发起 tool_use 后，tool_result 作为 role=user 的 content block 占 slot 6–7；大结果可能被 ContextTrimming 摘要或 Pichay 逐出为占位符。
      en: After assistant tool_use, tool_result content blocks occupy slots 6–7 as role=user; large results may be summarized by ContextTrimming or evicted to placeholders by Pichay.
      ja: assistant tool_use 後、tool_result が role=user content block で slot 6–7 占有。大きい result は ContextTrimming 要約または Pichay placeholder eviction。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool_result blocks
    field_values:
      ordinal: 6
      content_role: tool_result
      token_extent: 8192
      source_ref: tool-result:call-88-read-file
    related_node_ids:
      - ContextSlot
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-slot-tool
  - id: ContextSlot-example-not-window
    labels:
      zh: 槽位非窗口
      en: Slot is not window
      ja: slot は window ではない
    descriptions:
      zh: slot-system 只有序位与角色，没有 capacity_ceiling 或完整 slot 集合；它是 ContextSlot 而非 ContextWindow。
      en: slot-system has only ordinal and role without capacity_ceiling or full slot collection; it is ContextSlot, not ContextWindow.
      ja: slot-system は ordinal/role のみで capacity_ceiling/完全 slot 集合なし。ContextSlot で ContextWindow ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextSlot
      - ContextWindow
    related_relation_ids: []
    source_claims:
      - claim-context-slot-design
parent_relation:
  id: ContextWindow-has_slot-ContextSlot
  predicate: has_slot
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有槽位
    en: has slot
    ja: スロットを持つ
  definitions:
    zh: ContextWindow —has_slot→ ContextSlot 表示槽位是窗口的有序组成项，保留 ordinal 与来源。
    en: ContextWindow —has_slot→ ContextSlot states a slot is an ordered component of the window preserving ordinal and provenance.
    ja: ContextWindow —has_slot→ ContextSlot は slot が ordinal/来歴を保持する window の ordered component であることを表す。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 槽位数量随组装结果变化，不在类级固定基数。
    en: Slot count varies per assembly; no fixed class-level cardinality.
    ja: slot 数は assembly 結果で変動。class 級固定基数なし。
  inverse_reading:
    predicate: slot_of
    labels:
      zh: 反向：属于窗口
      en: slot of
      ja: 逆：window に属する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-slot-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-cursor-context
    title: Cursor Agent Search and Context
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ file/folder references as context slots."
  - id: src-anthropic-messages
    title: Messages API
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Role-ordered message and tool_result slots.
  - id: src-pichay-2026
    title: Demand Paging for LLM Context Windows
    publisher: arXiv
    url: https://arxiv.org/abs/2603.09023
    source_type: arXiv
    relevance: Slot content eviction with ordinal preservation.
  - id: src-memory-context-design
    title: Moonweave memory-context module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Slot versus window boundary.
source_claims:
  - id: claim-context-slot-cursor
    source: src-cursor-context
    supports: Each @ reference resolves to an independent context slot.
    locator: "@ references"
    evidence_kind: official
    confidence: high
  - id: claim-context-slot-anthropic
    source: src-anthropic-messages
    supports: Messages API uses role-ordered slots including system first.
    locator: Messages format
    evidence_kind: official
    confidence: high
  - id: claim-context-slot-tool
    source: src-anthropic-messages
    supports: tool_result blocks occupy user-role slots after assistant tool_use.
    locator: Tool use
    evidence_kind: official
    confidence: high
  - id: claim-context-slot-design
    source: src-memory-context-design
    supports: ContextSlot is window component, not the window itself.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-slot-window-ref
    source: src-memory-context-design
    supports: Each slot belongs to exactly one ContextWindow.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-slot-ordinal
    source: src-memory-context-design
    supports: ordinal is unique 1-based position within a window.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-slot-role
    source: src-anthropic-messages
    supports: content_role maps to API message roles and evidence types.
    locator: Roles
    evidence_kind: official
    confidence: high
  - id: claim-context-slot-extent
    source: src-cursor-context
    supports: token_extent enables per-slot budget accounting.
    locator: Context assembly
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-slot-source
    source: src-memory-context-design
    supports: source_ref pins replayable content identity per slot.
    locator: structure
    evidence_kind: design-inference
    confidence: high
