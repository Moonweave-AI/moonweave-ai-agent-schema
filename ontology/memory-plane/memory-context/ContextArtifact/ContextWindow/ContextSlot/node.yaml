schema: moonweave.ai/ontology-node/v1
id: ContextSlot
kind: concept
status: accepted
labels:
  zh: 上下文槽位
  en: Context slot
  ja: コンテキストスロット
semantics:
  short_definition:
    zh: 上下文窗口内按角色、顺序和预算划定的命名区域。
    en: A named region inside a context window defined by role, order, and budget.
    ja: 役割、順序、予算によって定義されるコンテキストウィンドウ内の名前付き領域です。
  definition:
    zh: >
      ContextSlot 是一个 ContextWindow 的结构部分，为某类预期输入分配顺序位置和 token 预算，例如治理指令、当前用户请求、历史摘要、选定记忆或工具证据。它不是其中的文本、消息或来源记录，也不是实际模型 API 的通用字段；它是 Moonweave 用于表达预算分配和排序规则的调用级建模单元。槽位可为空、可选或必填，具体取决于装配策略。一个槽位中的内容必须来自与其 ContextSourceRole 相符的 ContextArtifact，但角色并不证明内容正确、授权或最终可见。
    en: >
      A ContextSlot is a structural part of one ContextWindow that allocates an order position and token budget to an expected input class such as governing instructions, the current user request, history summary, selected memory, or tool evidence. It is not the text, message, or source record placed in it, and it is not a universal field in a model API. It is a call-level Moonweave modeling unit for budget allocation and ordering rules. A slot may be empty, optional, or required according to assembly policy. Content in a slot must come from a ContextArtifact compatible with its ContextSourceRole, but a role does not prove that content is correct, authorized, or finally visible.
    ja: >
      ContextSlot は、一つの ContextWindow の構造部分であり、統治指示、現在のユーザー要求、履歴要約、選択済み記憶、ツール根拠など期待入力クラスに順序位置とトークン予算を配分します。そこに置くテキスト、メッセージ、情報源記録ではなく、モデル API の共通フィールドでもありません。予算配分と順序規則を表す呼び出しレベルの Moonweave モデリング単位です。スロットは組立方針に従って空、任意、必須にできます。スロット内の内容は ContextSourceRole と互換の ContextArtifact から来なければなりませんが、役割は内容の正しさ、認可、最終可視性を証明しません。
  why_needed:
    zh: 明确分槽可防止关键指令、当前请求和辅助材料在预算竞争时被无规则混合，并让每类内容的保留或缩减原因可检查。
    en: Explicit slots prevent governing instructions, the current request, and supporting material from mixing without rules under budget competition and make each class's retention or reduction inspectable.
    ja: 明示的なスロットにより、予算競合下で統治指示、現在の要求、補助材料が無規則に混ざることを防ぎ、各クラスの保持・削減理由を検査可能にします。
  includes:
    - zh: 所属窗口、顺序位置、token 分配、填充要求和来源角色。
      en: The owning window, order position, token allocation, fill requirement, and source role.
      ja: 所属ウィンドウ、順序位置、トークン配分、充填要件、情報源役割。
  excludes:
    - zh: 槽位中实际文本、源记录身份、模型 API 的角色消息和最终可见性证明。
      en: Actual slot text, source-record identity, model-API role messages, and proof of final visibility.
      ja: 実際のスロットテキスト、情報源記録 ID、モデル API の role メッセージ、最終可視性の証明。
  semantic_kind: entity
  aliases:
    - context budget partition
    - input region
engineering:
  explanation:
    zh: >
      槽位是装配器配置，不应伪称为框架 API。LangGraph 的 trim_messages 接收总 max_tokens 而不是槽位对象；OpenAI Realtime 将指令与会话 token 区分，并允许对指令后 token 设置截断上限。Moonweave 据此把“指令、历史、工具材料等如何占用一个总预算”建模为可审计分区，再由渲染器输出真实消息序列。
    en: >
      Slots are assembler configuration and must not be presented as framework APIs. LangGraph trim_messages accepts a total max_tokens rather than slot objects. OpenAI Realtime distinguishes instructions from conversation tokens and permits a post-instruction truncation limit. Moonweave therefore models how instructions, history, and tool material share a total budget as auditable partitions, then lets a renderer emit the real message sequence.
    ja: >
      スロットは組立器構成であり、フレームワーク API として見せかけてはいけません。LangGraph の trim_messages はスロットオブジェクトではなく総 max_tokens を受け取ります。OpenAI Realtime は指示と会話トークンを区別し、指示後の切り詰め上限を許可します。そこで Moonweave は、指示、履歴、ツール材料が総予算をどう共有するかを監査可能な分区としてモデル化し、描画器が実メッセージ列を出力します。
  typical_input:
    - description: Project allocation policy before composing the one total token budget.
      format: |
        [
          {"slot_role": "governing_instruction", "position_index": 0, "allocated_token_budget": 1200},
          {"slot_role": "current_request", "position_index": 4, "allocated_token_budget": 800},
          {"slot_role": "tool_evidence", "position_index": 3, "allocated_token_budget": 1600}
        ]
    - description: LangGraph total-budget call which the slot policy eventually renders into messages.
      format: |
        visible_messages = trim_messages(
            state["messages"], max_tokens=7168, strategy="last", token_counter=count_tokens_approximately
        )
  typical_output:
    - description: A slot allocation that can be checked before rendering a ContextPackage.
      format: |
        {
          "slot_id": "ctx-slot-current-request",
          "window_ref": "ctx-window-support-01",
          "position_index": 4,
          "allocated_token_budget": 800,
          "fill_requirement": "required"
        }
  reference_implementations:
    - name: LangGraph token-aware trimming
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents total token-budget trimming of an ordered message sequence.
    - name: OpenAI Realtime API truncation configuration
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents instruction-aware post-instruction token limits for retention-ratio truncation.
  source_claims:
    - claim-context-slot-total-budget
    - claim-context-slot-instruction-boundary
structure:
  identity_keys:
    - slot_id
  fields:
    - id: slot_id
      labels:
        zh: 槽位标识
        en: slot ID
        ja: スロット ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个窗口内的命名预算和顺序区域，不复用为其中的工件、提示词或消息标识。
        en: Identifies a named budget-and-order region in a window and is not reused as the ID of an artifact, prompt, or message placed there.
        ja: ウィンドウ内の名前付き予算・順序領域を識別し、そこに置く工件、プロンプト、メッセージの ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-slot-[A-Za-z0-9._-]+$'
      example_value: ctx-slot-current-request
      source_claims:
        - claim-context-slot-total-budget
    - id: window_ref
      labels:
        zh: 所属窗口引用
        en: owning window reference
        ja: 所属ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向提供容量和调用范围的 ContextWindow；槽位不能脱离一个具体窗口成为全局角色定义。
        en: Points to the ContextWindow providing capacity and call scope. A slot cannot become a global role definition without a concrete window.
        ja: 容量と呼び出し範囲を提供する ContextWindow を指します。スロットは具体的なウィンドウなしにグローバル役割定義にはなれません。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-context-slot-total-budget
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必须与所属窗口的调用范围相同，防止跨调用复用一个预算分区。
        en: Must match the owning window's call scope, preventing reuse of one budget partition across calls.
        ja: 所属ウィンドウの呼び出し範囲と一致しなければならず、一つの予算分区を呼び出し横断で再利用しません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-slot-total-budget
    - id: slot_role
      labels:
        zh: 槽位角色
        en: slot role
        ja: スロット役割
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识预期容纳的内容类；它与具体 ContextSourceRole 配对，但不替代来源、授权或内容判断。
        en: Identifies the class of content expected in the slot. It pairs with a concrete ContextSourceRole but does not replace provenance, authorization, or content judgment.
        ja: スロットに期待する内容クラスを識別します。具体的 ContextSourceRole と対になりますが、来歴、認可、内容判断を代替しません。
      allowed_values:
        - governing_instruction
        - current_request
        - conversation_history
        - selected_memory
        - retrieval_evidence
        - tool_evidence
      pattern: null
      example_value: current_request
      source_claims:
        - claim-context-slot-instruction-boundary
    - id: position_index
      labels:
        zh: 顺序位置
        en: order position
        ja: 順序位置
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指定槽位在渲染序列中的相对位置；同一窗口中两个必填槽位不能使用相同位置。
        en: Specifies the slot's relative position in rendering order. Two required slots in one window cannot use the same position.
        ja: 描画順におけるスロットの相対位置を指定します。同じウィンドウ内の二つの必須スロットは同じ位置を使えません。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims:
        - claim-context-slot-total-budget
    - id: allocated_token_budget
      labels:
        zh: 分配 token 预算
        en: allocated token budget
        ja: 配分トークン予算
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 为该槽位保留的最大 token 数；所有填充槽位的分配总和不得使窗口超过 usable_input_budget。
        en: Maximum tokens reserved for this slot. The sum allocated to filled slots must not cause the window to exceed usable_input_budget.
        ja: このスロットに予約する最大トークン数です。充填済みスロットへの配分合計は、ウィンドウの usable_input_budget を超えてはなりません。
      allowed_values: []
      pattern: null
      example_value: 800
      source_claims:
        - claim-context-slot-total-budget
    - id: fill_requirement
      labels:
        zh: 填充要求
        en: fill requirement
        ja: 充填要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明槽位在调用前必须有兼容工件、可以为空，或仅在触发条件满足时需要填充。
        en: Declares whether the slot needs a compatible artifact before a call, may be empty, or is required only when a trigger condition holds.
        ja: 呼び出し前に互換工件を必要とするか、空でもよいか、トリガー条件が満たされたときだけ必要かを宣言します。
      allowed_values:
        - required
        - optional
        - conditional
      pattern: null
      example_value: required
      source_claims:
        - claim-context-slot-instruction-boundary
  constraints:
    - id: context-slot-shares-window-scope-and-budget
      severity: error
      expression_language: plain
      expression: ContextSlot call_scope_id must equal its ContextWindow call scope, and allocated_token_budget must be nonnegative and included in the window usable_input_budget accounting.
      explanation:
        zh: 槽位是具体窗口的预算分区，不能跨调用漂移或凭空增加容量。
        en: A slot is a budget partition of a concrete window and cannot drift across calls or create capacity from nothing.
        ja: スロットは具体的ウィンドウの予算分区であり、呼び出しをまたいで漂流したり、無から容量を作ったりできません。
      source_claims:
        - claim-context-slot-total-budget
    - id: context-slot-is-not-filled-content
      severity: error
      expression_language: plain
      expression: A ContextSlot must not be treated as a MessageHistory, PromptTemplateInstance, MemoryRecord, or actual API message. Only compatible ContextArtifacts may fill it through separate package inclusion and visibility facts.
      explanation:
        zh: 槽位表达“预留在哪里和多少”，而不是“里面的原始内容是什么”。
        en: A slot expresses “where and how much is reserved,” not “what raw content is inside.”
        ja: スロットは「どこにどれだけ予約するか」を表し、「中にどの原内容があるか」を表しません。
      source_claims:
        - claim-context-slot-instruction-boundary
examples:
  - id: context-slot-example-positive-current-request

    labels:
      zh: 为当前用户请求保留槽位
      en: Reserve a slot for the current user request
      ja: 現在のユーザー要求用にスロットを予約する

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      slot_id: ctx-slot-current-request
      window_ref: ctx-window-support-01
      call_scope_id: call-support-20260719-01
      slot_role: current_request
      position_index: 4
      allocated_token_budget: 800
      fill_requirement: required
    related_node_ids:
      - ContextSlot
      - ContextWindow
      - ContextSourceRole
    related_relation_ids:
      - ContextSlot-has-ContextSourceRole

    source_claims:
      - claim-context-slot-total-budget
  - id: context-slot-example-counterexample-slot-is-message

    labels:
      zh: 将完整消息历史存入一个槽位
      en: Store complete message history in one slot
      ja: 完全なメッセージ履歴を一つのスロットに入れる

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      slot_id: ctx-slot-history-invalid
      window_ref: ctx-window-support-01
      call_scope_id: call-support-20260719-01
      slot_role: conversation_history
      position_index: 2
      allocated_token_budget: 0
      fill_requirement: optional
    related_node_ids:
      - ContextSlot
      - ContextWindow
      - MessageHistory
    related_relation_ids:
      - ContextSlot-has-ContextSourceRole

    source_claims:
      - claim-context-slot-total-budget
  - id: context-slot-example-boundary-optional-tool-evidence

    labels:
      zh: 可选的工具证据槽位为空
      en: Optional tool-evidence slot is empty
      ja: 任意のツール根拠スロットが空である

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      slot_id: ctx-slot-tool-evidence
      window_ref: ctx-window-support-01
      call_scope_id: call-support-20260719-01
      slot_role: tool_evidence
      position_index: 3
      allocated_token_budget: 1600
      fill_requirement: optional
    related_node_ids:
      - ContextSlot
      - ContextWindow
      - ContextSourceRole
    related_relation_ids:
      - ContextSlot-has-ContextSourceRole

    source_claims:
      - claim-context-slot-instruction-boundary
  - id: context-slot-example-instance-realtime-post-instructions

    labels:
      zh: 实例：Realtime 指令后 token 限制
      en: "Instance: Realtime post-instructions token limit"
      ja: 実例：Realtime の指示後トークン上限

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      slot_id: ctx-slot-governing-instructions
      window_ref: ctx-window-realtime-01
      call_scope_id: call-realtime-20260719-01
      slot_role: governing_instruction
      position_index: 0
      allocated_token_budget: 1200
      fill_requirement: required
    related_node_ids:
      - ContextSlot
      - ContextWindow
      - ContextSourceRole
    related_relation_ids:
      - ContextSlot-has-ContextSourceRole
    source_claims:
      - claim-context-slot-instruction-boundary
parent_relation:
  id: ContextSlot-part-of-ContextWindow
  predicate: part_of
  target: concept:ContextWindow
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是上下文窗口的预算结构部分
    en: is a budget-structure part of context window
    ja: コンテキストウィンドウの予算構造部分である
  definitions:
    zh: ContextSlot 作为容量和顺序分区属于一个具体 ContextWindow，而不是窗口中某条内容的片段。
    en: ContextSlot belongs to one concrete ContextWindow as a capacity-and-order partition, not as a fragment of content inside the window.
    ja: ContextSlot は容量・順序分区として一つの具体的 ContextWindow に属し、ウィンドウ内内容の断片ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 每个槽位属于一个窗口，窗口槽位数量取决于项目装配策略而非类型关系。
    en: Each slot belongs to one window; the number of window slots depends on project assembly policy rather than the type relation.
    ja: 各スロットは一つのウィンドウに属します。ウィンドウのスロット数は型関係ではなくプロジェクト組立方針で決まります。
  inverse_reading:
    predicate: has_context_slot
    labels:
      zh: 具有上下文槽位
      en: has context slot
      ja: コンテキストスロットを持つ
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-slot-total-budget
  distinct_fact_rationale:
    zh: 此关系表达窗口结构组成，不表达槽位填充内容、实际包成员或模型可见性。
    en: This relation expresses window structural composition, not slot-filled content, actual package membership, or model visibility.
    ja: この関係はウィンドウ構造の構成を表し、スロット充填内容、実パッケージ所属、モデル可視性を表しません。
  layout_role: primary-backbone
relations:
  - id: ContextSlot-has-ContextSourceRole
    predicate: has_part
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 具有上下文来源角色
      en: has context source role
      ja: コンテキスト情報源役割を持つ
    definitions:
      zh: 当一个 ContextSourceRole 指定该槽位允许或要求的来源类别并与其 slot_id 相连时，ContextSlot 具有该来源角色。
      en: A ContextSlot has a ContextSourceRole when that role specifies an allowed or required source class for the slot and links back to its slot_id.
      ja: ContextSourceRole がスロットに許可または要求される情報源クラスを指定し、その slot_id へ結び付く場合、ContextSlot はその情報源役割を持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个槽位可允许一个或多个来源角色，但具体填充仍需要独立的工件和包成员事实。
      en: A slot may allow one or more source roles, but concrete filling still needs separate artifact and package-membership facts.
      ja: 一つのスロットは一つ以上の情報源役割を許可できますが、具体的な充填には別の工件・パッケージ所属事実が必要です。
    inverse_reading:
      predicate: is_source_role_of_slot
      labels:
        zh: 是槽位的来源角色
        en: is source role of slot
        ja: スロットの情報源役割である
    conditions:
      - id: ContextSlot-has-ContextSourceRole-compatible-role
        severity: error
        expression_language: plain
        expression: "Assert only when the target role slot_ref equals the source slot ID and content_origin_kind is compatible with source slot_role; role membership alone does not assert a filled artifact."
        explanation:
          zh: 角色定义来源类别，不能替代实际工件入包或可见性证据。
          en: A role defines a source class and cannot replace evidence of actual artifact admission or visibility.
          ja: 役割は情報源クラスを定義し、実際の工件入包や可視性の証拠を代替できません。
        source_claims:
          - claim-context-slot-instruction-boundary
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-context-slot-instruction-boundary
    distinct_fact_rationale:
      zh: 此关系表达槽位允许的来源类别，不表达实际来源记录、包成员、排序位置或模型已见内容。
      en: This relation expresses a source class allowed by a slot, not an actual source record, package membership, ordering position, or model-seen content.
      ja: この関係はスロットが許可する情報源クラスを表し、実際の情報源記録、パッケージ所属、順序位置、モデルが見た内容を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ContextSourceRole
sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents total token-budget trimming of ordered messages before invocation.
  - id: openai-realtime-api
