source_claims:
  - id: claim-context-slot-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' context-engineering documentation lists multiple contributions to model context and describes compression that keeps or replaces specific history portions. ContextSlot is Moonweave's ordered window component for one carried contribution, with role, extent, and provenance; LangChain does not define this class.
    locator: Context engineering in Deep Agents > Context types table; Offloading > large content replaced by references
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-slot-002
    source: lit-agent-memory-as-action
    supports: Memory as Action treats limited context usage as a managed resource and allows retrieved, summarized, or retained information to enter working context. Moonweave models each concrete ordered placement as ContextSlot rather than conflating it with the source content.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-slot-003
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents describes model input as a bounded context assembled from distinct contributions such as system prompt, memory, skills, and compressed history. Moonweave design inference: context_window_ref binds one contribution placement to the exact ContextWindow that contains it."
    locator: Context engineering in Deep Agents > Types of context and Input context > system prompt, memory, skills, and tool prompts
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-slot-004
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents explains that several context contributions are combined into the final prompt and that compression can keep, summarize, or offload portions of history. Moonweave design inference: ordinal records the deterministic placement of one contribution; the documentation does not prescribe slot numbering."
    locator: Context engineering in Deep Agents > Input context > complete system prompt; Context compression > offloading and summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-slot-005
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents distinguishes system prompt, memory, skills, tool prompts, runtime context, compressed history, and other context types. Moonweave design inference: content_role records the semantic function of one concrete window placement without turning those source categories into hierarchy nodes."
    locator: Context engineering in Deep Agents > Types of context and Input context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-slot-006
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents can offload large content to files and replace active content with references while retaining the ability to retrieve relevant fragments. Moonweave design inference: content_ref separates the carried information object's identity from its placement in one context window."
    locator: Context engineering in Deep Agents > Context compression > Offloading
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-slot-007
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents context compression summarizes or offloads portions of long tool output and conversation history to stay within the context-window limit. Moonweave design inference: content_extent states exactly which representation or span occupies the slot; Deep Agents does not define this object schema."
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-slot-008
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents compression keeps working context within a model's context-window limit. Moonweave design inference: token_count records the optional measured contribution of one slot under a named tokenizer and is not a universal cross-model size."
    locator: Context engineering in Deep Agents > Context compression > context-window limit
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-slot-009
    source: eng-fw-deepagents-js-docs
    supports: "Direct source premise: Deep Agents distinguishes multiple input-context contributions and can replace large active content with references through offloading. Moonweave design inference: a ContextSlot has one window-local position and one carried object while provenance references remain separate graph nodes."
    locator: Context engineering in Deep Agents > Input context; Context compression > Offloading
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-slot-010
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents identifies distinct input-context contributions such as system prompt, memory, skills, and compressed history. Moonweave represents a concrete ordered placement of one such contribution as ContextSlot with explicit role and provenance.
    locator: Context engineering in Deep Agents > Context types table; Offloading > large content replaced by references
    evidence_kind: design-inference
    confidence: medium
