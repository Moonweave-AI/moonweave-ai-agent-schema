schema: moonweave.ai/ontology-node/v1
id: ContextPackage
kind: concept
status: accepted
labels:
  zh: 上下文包
  en: Context package
  ja: コンテキストパッケージ
semantics:
  short_definition:
    zh: 为一个具体模型调用定稿的、有序且受预算约束的上下文工件集合。
    en: An ordered, budget-bounded collection of context artifacts finalized for one concrete model invocation.
    ja: 一つの具体的なモデル呼び出しのために確定した、順序付きかつ予算制約付きのコンテキスト工件集合です。
  definition:
    zh: >
      ContextPackage 是 ContextAssembly 输出的调用级工件：它以确定顺序列出将被渲染为模型 API 输入的 ContextArtifact，并保存目标调用、编码方式、token 总量和定稿状态。它可以包含来自 PromptTemplateInstance、Conversation History、MemoryRecord、检索材料或工具结果的已物化项，但并不等于任一来源本身。它也不同于 ContextWindow：窗口描述容量和可见范围，包描述为该范围准备的具体项目和顺序。一个草稿包可以在调用前被刷新；只有定稿包才可作为“此调用应看到什么”的可重放声明，且它并不证明模型已经成功生成响应。
    en: >
      A ContextPackage is the call-level artifact emitted by ContextAssembly. It lists, in deterministic order, the ContextArtifacts to be rendered as model-API input and records the target call, encoding, total tokens, and finalization status. It can contain materialized items sourced from a PromptTemplateInstance, Conversation History, MemoryRecord, retrieval material, or tool results, but is not identical to any source. It also differs from a ContextWindow: a window describes capacity and visibility scope, while a package describes the concrete items and order prepared for that scope. A draft package can be refreshed before a call; only a finalized package is a replayable assertion of what that call should see, and it does not prove that a model response was successfully generated.
    ja: >
      ContextPackage は ContextAssembly が出力する呼び出しレベルの工件です。モデル API 入力に描画する ContextArtifact を決定的な順序で列挙し、対象呼び出し、エンコーディング、総トークン数、確定状態を記録します。PromptTemplateInstance、Conversation History、MemoryRecord、検索材料、ツール結果に由来する物化項目を含められますが、どの情報源そのものでもありません。ContextWindow とも異なります。Window は容量と可視範囲を記述し、Package はその範囲のために準備した具体的項目と順序を記述します。下書きパッケージは呼び出し前に更新できます。確定パッケージだけが、その呼び出しで何を見るべきかの再生可能な宣言であり、モデル応答の生成成功を証明するものではありません。
  why_needed:
    zh: 多来源材料需要一个可重放的最终边界，才能检查指令顺序、预算、摘要替换和来源，而不是在模型调用后猜测传入了什么。
    en: Multi-source material needs a replayable final boundary so instruction order, budget, summary replacement, and provenance can be checked instead of guessing after a model call what was passed in.
    ja: 複数情報源の材料には再生可能な最終境界が必要です。そうすれば、モデル呼び出し後に何が渡されたかを推測せず、指示順序、予算、要約置換、来歴を検査できます。
  includes:
    - zh: 已选工件的顺序、渲染编码、调用范围、token 使用量及定稿状态。
      en: Selected-artifact order, rendering encoding, call scope, token use, and finalization status.
      ja: 選択工件の順序、描画エンコーディング、呼び出し範囲、トークン使用量、確定状態。
  excludes:
    - zh: 未选候选、完整存储历史、抽象提示词模板和模型响应事实。
      en: Unselected candidates, complete stored history, an abstract prompt template, and the fact of a model response.
      ja: 未選択候補、完全な保存履歴、抽象プロンプトテンプレート、モデル応答の事実。
  semantic_kind: entity
  aliases:
    - assembled model input
    - call input package
engineering:
  explanation:
    zh: >
      实现应在调用前冻结一个项目序列，使用与目标客户端匹配的消息编码并计算 token 总量。LangGraph 的模式是在状态转换中裁剪或摘要消息，然后调用 model.invoke(messages)；Semantic Kernel 将 ChatHistory 提供给聊天完成服务。ContextPackage 不要求这些框架提供同名类，而是为其实际传入的有序输入建立可审计实体。
    en: >
      Freeze an item sequence before invocation, encode it in the target client's message form, and compute total tokens. LangGraph's pattern transforms state by trimming or summarizing messages and then calls model.invoke(messages); Semantic Kernel supplies ChatHistory to a chat-completion service. ContextPackage does not require these frameworks to expose a class of that name; it gives their actual ordered invocation input an auditable entity.
    ja: >
      呼び出し前に項目列を固定し、対象クライアントのメッセージ形式でエンコードして総トークン数を計算します。LangGraph のパターンでは状態内のメッセージを裁断または要約してから model.invoke(messages) を呼びます。Semantic Kernel は ChatHistory をチャット完了サービスへ渡します。ContextPackage はこれらのフレームワークに同名クラスを要求せず、実際の順序付き呼び出し入力に監査可能な実体を与えます。
  typical_input:
    - description: Ordered LangChain/LangGraph message input immediately before model invocation.
      format: |
        visible_messages = [system_instruction, developer_instruction, history_summary, user_message]
        response = model.invoke(visible_messages)
    - description: A package record that freezes the same order and provenance.
      format: |
        {
          "package_id": "ctx-pkg-support-01",
          "call_scope_id": "call-support-20260719-01",
          "ordered_artifact_refs": [
            "ctx-art-system-1", "ctx-art-dev-1", "ctx-art-summary-9", "ctx-art-user-22"
          ],
          "rendering_encoding": "chat_messages"
        }
  typical_output:
    - description: Finalized ordered package and its target API-message sequence.
      format: |
        {
          "package_id": "ctx-pkg-support-01",
          "finalization_state": "finalized",
          "total_input_tokens": 6940,
          "rendering_encoding": "chat_messages"
        }
  reference_implementations:
    - name: LangGraph message management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents transforming messages before a model call and invoking the model with the resulting message sequence.
    - name: Semantic Kernel chat history
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents ChatHistory as the message collection supplied to chat-completion services and reducers.
    - name: OpenAI Realtime API reference
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents ordered conversation items and input-token truncation at a configured limit.
  source_claims:
    - claim-context-package-message-sequence
    - claim-context-package-reducer-input
    - claim-context-package-capacity-boundary
structure:
  identity_keys:
    - artifact_id
    - package_id
  fields:
    - id: package_id
      labels:
        zh: 上下文包标识
        en: context package ID
        ja: コンテキストパッケージ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个特定调用范围内的包版本；刷新后必须生成新的包标识或明确版本，而不能静默改写定稿包。
        en: Identifies one package version in a call scope; a refresh must create a new package identity or explicit version rather than silently rewriting a finalized package.
        ja: 呼び出し範囲内の一つのパッケージ版を識別します。更新では新しいパッケージ ID または明示版を作り、確定パッケージを黙って書き換えてはなりません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-01
      source_claims:
        - claim-context-package-message-sequence
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明包为哪一次模型调用准备，避免把一次有序输入错误复用为另一模型、另一用户或另一策略范围的事实。
        en: States the model invocation for which the package was prepared, preventing one ordered input from being misused as a fact for another model, user, or policy scope.
        ja: パッケージを準備したモデル呼び出しを示し、一つの順序付き入力を別モデル、別利用者、別方針範囲の事実として誤用しないようにします。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-package-message-sequence
    - id: ordered_artifact_refs
      labels:
        zh: 有序工件引用
        en: ordered artifact references
        ja: 順序付き工件参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按实际渲染顺序列出进入包的 ContextArtifact；列表顺序是语义数据，不能作为无序集合处理。
        en: Lists ContextArtifacts admitted to the package in their actual rendering order. List order is semantic data and cannot be treated as an unordered set.
        ja: パッケージに入る ContextArtifact を実際の描画順で列挙します。リスト順は意味データであり、順序なし集合として扱えません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
        - ctx-art-user-22
      source_claims:
        - claim-context-package-message-sequence
    - id: rendering_encoding
      labels:
        zh: 渲染编码
        en: rendering encoding
        ja: 描画エンコーディング
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明包如何被转换为目标调用输入，以区分聊天消息、响应输入项和其他已声明的客户端编码。
        en: States how the package is converted into target invocation input, distinguishing chat messages, response input items, and other declared client encodings.
        ja: パッケージを対象呼び出し入力へ変換する方法を示し、チャットメッセージ、応答入力項目、その他の宣言済みクライアントエンコーディングを区別します。
      allowed_values:
        - chat_messages
        - response_input_items
        - provider_conversation_items
      pattern: null
      example_value: chat_messages
      source_claims:
        - claim-context-package-message-sequence
    - id: total_input_tokens
      labels:
        zh: 总输入 token 数
        en: total input tokens
        ja: 総入力トークン数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 根据目标模型或近似计数器估算的包总输入 token，用于与 ContextBudget 和输出预留比较。
        en: The package's total input tokens estimated by the target model or an approximate counter, used to compare against ContextBudget and output reserve.
        ja: 対象モデルまたは近似カウンターで見積もったパッケージ総入力トークン数で、ContextBudget と出力予約との比較に使います。
      allowed_values: []
      pattern: null
      example_value: 6940
      source_claims:
        - claim-context-package-capacity-boundary
    - id: finalization_state
      labels:
        zh: 定稿状态
        en: finalization state
        ja: 確定状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分仍可改变的草稿与可被调用器消费的定稿包；它不表示模型响应已成功产生。
        en: Distinguishes a mutable draft from a package consumable by an invoker; it does not mean a model response has been successfully produced.
        ja: 変更可能な下書きと呼び出し側が消費できる確定パッケージを区別します。モデル応答が正常に生成済みという意味ではありません。
      allowed_values:
        - draft
        - finalized
        - superseded
      pattern: null
      example_value: finalized
      source_claims:
        - claim-context-package-reducer-input
    - id: artifact_id
      labels:
        zh: 上下文包工件标识
        en: context-package artifact ID
        ja: コンテキストパッケージのアーティファクト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识作为 ContextArtifact 形成的有序输入包；它不同于 package_id 的包版本身份。
        en: Identifies the ordered input package as a ContextArtifact, distinct from the package_id used for its package-level identity.
        ja: 順序付けられた入力パッケージを ContextArtifact として識別し、パッケージ固有の package_id と区別します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-package-support-01
      source_claims:
        - claim-context-package-message-sequence
    - id: representation_kind
      labels:
        zh: 工件表示类型
        en: artifact representation kind
        ja: アーティファクト表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定声明 package 表示类型，表明该对象是准备交付的有序输入，而不是候选材料集合。
        en: Declares package as the representation kind, showing that this is ordered input prepared for delivery rather than an unordered candidate set.
        ja: 表現種別を package と宣言し、順序のない候補集合ではなく配信準備済みの順序付き入力であることを示します。
      allowed_values:
        - package
      pattern: null
      example_value: package
      source_claims:
        - claim-context-package-message-sequence
    - id: source_refs
      labels:
        zh: 包内材料来源引用
        en: package material source references
        ja: パッケージ材料の情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出被包中工件物化的精确原始消息、提示、记录、文档或工具结果；ordered_artifact_refs 仍只记录包内工件顺序。
        en: Lists the exact raw messages, prompts, records, documents, or tool results materialized by package artifacts; ordered_artifact_refs still records only artifact order.
        ja: パッケージのアーティファクトが物化した正確な元メッセージ、プロンプト、記録、文書、ツール結果を列挙します。ordered_artifact_refs は引き続きアーティファクトの順序だけを記録します。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - message:system-1
      source_claims:
        - claim-context-package-message-sequence
  constraints:
    - id: context-package-ordered-items-fit-budget
      severity: error
      expression_language: plain
      expression: A finalized ContextPackage must have one nonempty ordered_artifact_refs list, a declared rendering_encoding, and total_input_tokens no greater than the applicable model_input_token_budget.
      explanation:
        zh: 包不是无序内容桶；定稿前必须保留顺序并在实际预算内。
        en: A package is not an unordered content bucket. It must preserve order and fit the actual budget before finalization.
        ja: パッケージは順序なしの内容バケットではありません。確定前に順序を保持し、実際の予算に収める必要があります。
      source_claims:
        - claim-context-package-message-sequence
        - claim-context-package-capacity-boundary
    - id: context-package-is-not-raw-history-or-prompt
      severity: error
      expression_language: plain
      expression: A ContextPackage must not be represented as identical to complete MessageHistory, a PromptTemplateInstance, or a MemoryRecord; it contains only the materialized and selected artifacts for its call scope.
      explanation:
        zh: 历史、提示词和记忆可贡献项，但它们分别具有不同的保存、实例化和生命周期边界。
        en: History, prompts, and memory can contribute items, but they have distinct persistence, instantiation, and lifecycle boundaries.
        ja: 履歴、プロンプト、記憶は項目を提供できますが、それぞれ保存、インスタンス化、ライフサイクルの境界が異なります。
      source_claims:
        - claim-context-package-reducer-input
examples:
  - id: context-package-example-positive-finalized-support-input

    labels:
      zh: 已定稿的支持调用输入包
      en: Finalized support-call input package
      ja: 確定済みサポート呼び出し入力パッケージ

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      artifact_id: ctx-art-package-support-01
      package_id: ctx-pkg-support-01
      call_scope_id: call-support-20260719-01
      representation_kind: package
      source_refs:
        - message:system-1
        - prompt:developer-1
        - message:user-22
      ordered_artifact_refs:
        - ctx-art-system-1
        - ctx-art-dev-1
        - ctx-art-summary-9
        - ctx-art-user-22
      rendering_encoding: chat_messages
      total_input_tokens: 6940
      finalization_state: finalized
    related_node_ids:
      - ContextPackage
      - ContextArtifact
      - ContextSummary
    related_relation_ids:
      - ContextPackage-includes-ContextArtifact

    source_claims:
      - claim-context-package-message-sequence
  - id: context-package-example-counterexample-unordered-source-bag

    labels:
      zh: 无序地合并所有来源
      en: Merge all sources without order
      ja: 全情報源を順序なしで統合する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      package_id: ctx-pkg-unordered-01
      call_scope_id: call-support-20260719-01
      ordered_artifact_refs:
        - ctx-art-placeholder-1
      rendering_encoding: chat_messages
      total_input_tokens: 28000
      finalization_state: finalized
    related_node_ids:
      - ContextPackage
      - MessageHistory
      - MemoryRecord
      - PromptTemplateInstance
    related_relation_ids:
      - ContextPackage-includes-ContextArtifact

    source_claims:
      - claim-context-package-reducer-input
  - id: context-package-example-boundary-draft-refresh

    labels:
      zh: 工具结果到达后刷新草稿包
      en: Refresh a draft package after tool output arrives
      ja: ツール出力到着後に下書きパッケージを更新する

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      package_id: ctx-pkg-support-02
      call_scope_id: call-support-20260719-02
      ordered_artifact_refs:
        - ctx-art-system-1
        - ctx-art-user-23
        - ctx-art-tool-7
      rendering_encoding: chat_messages
      total_input_tokens: 3120
      finalization_state: draft
    related_node_ids:
      - ContextPackage
      - ContextIngressEvent
      - ContextArtifact
    related_relation_ids:
      - ContextPackage-includes-ContextArtifact

    source_claims:
      - claim-context-package-reducer-input
  - id: context-package-example-instance-langgraph-model-invoke

    labels:
      zh: 实例：LangGraph 调用前的消息序列
      en: "Instance: LangGraph message sequence before model.invoke"
      ja: 実例：model.invoke 前の LangGraph メッセージ列

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      artifact_id: ctx-art-package-langgraph-01
      package_id: ctx-pkg-langgraph-01
      call_scope_id: call-support-20260719-03
      representation_kind: package
      source_refs:
        - message:system-2
        - message:user-24
      ordered_artifact_refs:
        - ctx-art-system-2
        - ctx-art-user-24
      rendering_encoding: chat_messages
      total_input_tokens: 1040
      finalization_state: finalized
    related_node_ids:
      - ContextPackage
      - ContextAssembly
      - ContextArtifact
    related_relation_ids:
      - ContextPackage-includes-ContextArtifact
    source_claims:
      - claim-context-package-message-sequence
parent_relation:
  id: ContextPackage-specializes-ContextArtifact
  predicate: is_a
  target: concept:ContextArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是面向调用的上下文包工件
    en: is a context artifact call package
    ja: コンテキスト工件の呼び出しパッケージ型である
  definitions:
    zh: ContextPackage 是记录调用范围内有序已选工件及其定稿状态的 ContextArtifact。
    en: ContextPackage is a ContextArtifact that records ordered selected artifacts and finalization state in a call scope.
    ja: ContextPackage は呼び出し範囲内の順序付き選択工件と確定状態を記録する ContextArtifact です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个包可包含的项目数；项目数由预算和具体装配策略决定。
    en: Classification does not prescribe how many items a package contains; budget and concrete assembly policy determine that number.
    ja: 分類関係はパッケージの項目数を規定しません。項目数は予算と具体的な組立方針で決まります。
  inverse_reading:
    predicate: has_call_package_subtype
    labels:
      zh: 具有调用包专门化
      en: has call-package subtype
      ja: 呼び出しパッケージの下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-package-message-sequence
  distinct_fact_rationale:
    zh: 此关系只表达类型归属，不表达某包已发送、模型已响应、包内项的来源或预算合规。
