source_claims:
  - id: claim-context-package-message-sequence
    source: langgraph-memory
    supports: LangGraph documents trimming or summarizing messages before calling a model with the resulting message sequence. Moonweave records that ordered, call-scoped sequence as a ContextPackage without claiming that LangGraph exposes a class with that name.
    locator: "Memory guide: trim_messages examples and model invocation after message management"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-package-reducer-input
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents ChatHistory and reducers that truncate or summarize it before chat completion. Moonweave distinguishes the resulting ordered call input from full stored history and from abstract prompt or memory sources.
    locator: "Chat history and chat-history reducers"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-package-capacity-boundary
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents conversation input limits and truncation behavior when those limits are exceeded. Moonweave requires a package token total and budget check before finalization instead of treating a package as unbounded source material.
    locator: "Realtime truncation configuration and input-token limit behavior"
    evidence_kind: ontology-design-inference
    confidence: high