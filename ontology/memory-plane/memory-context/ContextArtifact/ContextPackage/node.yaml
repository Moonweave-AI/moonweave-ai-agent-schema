schema: moonweave.ai/ontology-node/v1
id: ContextPackage
kind: concept
labels:
  zh: 上下文包
  en: Context package
  ja: コンテキストパッケージ
semantics:
  short_definition:
    zh: 一次模型调用可重放的版本化组装 prompt 封套。
    en: A versioned, replayable assembled-prompt envelope for one model call.
    ja: 一回 model call 向け versioned replayable assembled-prompt envelope。
  definition:
    zh: ContextPackage 是一种 ContextArtifact；其种差是以 package_id、version 与 content_digest 标识，固定有效指令、消息、证据引用、最终 ContextWindow、ContextExclusion 引用与组装来源，作为 RunAttempt 的 replay envelope。它映射 Cursor 发送给模型的最终 messages 参数、Anthropic Messages API payload 与 OpenAI chat.completions messages 数组；ContextWindow 只是其中按序投影，二者不可互换。
    en: ContextPackage is a ContextArtifact identified by package_id, version, and content_digest, fixing effective instructions, messages, evidence references, final ContextWindow, ContextExclusion references, and assembly provenance as the RunAttempt replay envelope. It maps Cursor's final messages sent to the model, Anthropic Messages API payloads, and OpenAI chat.completions messages arrays; ContextWindow is only the ordered projection within it—they are not interchangeable.
    ja: ContextPackage は package_id/version/content_digest で識別され effective instructions/messages/evidence refs/final ContextWindow/ContextExclusion refs/assembly 来歴を固定する RunAttempt replay envelope という種差の ContextArtifact。Cursor final messages/Anthropic Messages API/OpenAI chat.completions messages に写像。ContextWindow は ordered projection のみで interchangeable 不可。
  why_needed:
    zh: 调用输入必须可复现、可比较、可审计；包记录“为何形成该 prompt”，把候选、活动与最终提交产物分开。
    en: Call input must be reproducible, comparable, and auditable; the package records why that prompt was formed, separating candidates, activities, and submitted artifacts.
    ja: call input は reproducible/comparable/auditable 必須。package は prompt 形成理由を記録し candidate/activity/submitted artifact を分離。
  includes:
    - zh: 纳入具有不可变 package_id、version、content_digest、consumer_ref 与精确成员清单的输入包。
      en: Includes input packages with immutable package_id, version, content_digest, consumer_ref, and exact membership.
      ja: immutable package_id/version/content_digest/consumer_ref/正確 membership を持つ input package。
  excludes:
    - zh: 排除未完成的 ContextAssembly、仅声明容量的 ContextBudget、候选 RetrievedChunk 集合与 VisibleContextWindow。
      en: Excludes in-progress ContextAssembly, ContextBudget capacity specs, candidate RetrievedChunk sets, and VisibleContextWindow.
      ja: 未完了 ContextAssembly/ContextBudget capacity spec/candidate RetrievedChunk set/VisibleContextWindow を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor 在每次 Composer/Agent 模型调用前组装 @ refs + recent files + semantic hits → messages；Claude Code 在 autoCompact 后生成新 package version；Context Recycling proactive load 从 L2–L3 填充 L0–L1 后封装为 package；content_digest 用于重放校验。
    en: Cursor assembles @ refs + recent files + semantic hits → messages before each Composer/Agent call; Claude Code bumps package version after autoCompact; Context Recycling proactive load fills L0–L1 from L2–L3 then wraps as package; content_digest enables replay verification.
    ja: Cursor は各 Composer/Agent call 前に @ refs/recent files/semantic hits→messages 組立。Claude Code は autoCompact 後 package version 更新。Context Recycling は L2–L3 から L0–L1 proactive load 後 package 化。content_digest で replay 検証。
  typical_input:
    - description: Cursor assembled messages payload
      format: |
        {
          "referenced_files": ["src/auth/middleware.ts"],
          "recent_files": ["src/auth/session.ts"],
          "semantic_hits": [{"path": "src/auth/middleware.ts", "score": 0.91}],
          "rules": [".cursor/rules/security.mdc"]
        }
      source_claims: [claim-context-package-cursor]
  typical_output:
    - description: Moonweave ContextPackage projection
      format: |
        {
          "package_id": "package-204",
          "version": 3,
          "content_digest_sha256": "355247694ba49e2a...",
          "context_assembly_id": "assembly-204",
          "ordered_slots": 7,
          "exclusion_count": 2
        }
      source_claims: [claim-context-package-design]
  reference_implementations:
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Final assembled prompt to model.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: messages parameter as call input envelope.
    - name: OpenAI Chat Completions
      url: https://platform.openai.com/docs/api-reference/chat
      description: messages array as call input envelope.
structure:
  identity_keys:
    - package_id
    - version
  fields:
    - id: package_id
      labels:
        zh: 包标识
        en: Package identifier
        ja: package 識別子
      definitions:
        zh: 唯一标识一组版本化上下文包 lineage。
        en: Uniquely identifies a versioned context-package lineage.
        ja: versioned context-package lineage を一意識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: package-204
      allowed_values: []
      source_claims:
        - claim-context-package-id
    - id: version
      labels:
        zh: 版本
        en: Version
        ja: 版
      definitions:
        zh: 同一 lineage 内不可变版本号；压缩、刷新或重选候选后递增。
        en: Immutable version within lineage; increments after compaction, refresh, or re-selection.
        ja: lineage 内 immutable version。compaction/refresh/re-selection 後増分。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims:
        - claim-context-package-version
    - id: content_digest
      labels:
        zh: 内容摘要
        en: Content digest
        ja: content digest
      definitions:
        zh: 对最终有序槽位内容与关键元数据的 SHA-256 摘要，用于重放校验。
        en: SHA-256 digest over final ordered slot contents and metadata for replay verification.
        ja: final ordered slot content/metadata の SHA-256 digest。replay 検証用。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[a-f0-9]{64}$'
      example_value: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
      allowed_values: []
      source_claims:
        - claim-context-package-digest
    - id: context_assembly_id
      labels:
        zh: 组装运行引用
        en: Assembly run reference
        ja: assembly run 参照
      definitions:
        zh: 指向产生该包版本的 ContextAssembly 运行。
        en: References the ContextAssembly run that produced this package version.
        ja: この package version を生成した ContextAssembly run を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: assembly-204
      allowed_values: []
      source_claims:
        - claim-context-package-assembly
  constraints:
    - id: context-package-requires-pinned-sources
      severity: error
      expression_language: plain
      expression: Every admitted slot must reference a pinned source identity
      explanation:
        zh: 没有固定来源，相同 digest 可能对应多条记录，无法审计模型实际读取版本。
        en: Without pinned sources, identical digests can match multiple records and actual read versions cannot be audited.
        ja: pinned source なしでは同一 digest が複数 record に一致し実 read version 監査不可。
      source_claims:
        - claim-context-package-design
  required_relations: []
examples:
  - id: ContextPackage-example-cursor-agent
    labels:
      zh: Cursor Agent 组装包
      en: Cursor Agent context package
      ja: Cursor Agent context package
    descriptions:
      zh: assembly-204 将 @middleware.ts、recent session.ts、semantic hit 与 rules 组装为 package-204@v2；content_digest 固定后送入 Claude；auto-compact 触发后 version 递增为 3。
      en: assembly-204 assembles @middleware.ts, recent session.ts, semantic hit, and rules into package-204@v2; fixed content_digest sent to Claude; auto-compact bumps version to 3.
      ja: assembly-204 が @middleware.ts/recent session.ts/semantic hit/rules を package-204@v2 に組立。content_digest 固定後 Claude へ。auto-compact で version 3。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: Agent assembly
    field_values:
      package_id: package-204
      version: 2
      context_assembly_id: assembly-204
      content_digest: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
    related_node_ids:
      - ContextPackage
      - ContextAssembly
      - ContextWindow
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage
    source_claims:
      - claim-context-package-cursor
  - id: ContextPackage-example-anthropic-messages
    labels:
      zh: Anthropic Messages 包
      en: Anthropic Messages package
      ja: Anthropic Messages package
    descriptions:
      zh: package-88@v1 封装 system + 4 turns + 2 tool_result blocks 为 Messages API payload；max_tokens 输出预算在 ContextBudget 而非 package 内重复计量。
      en: package-88@v1 wraps system + 4 turns + 2 tool_result blocks as Messages API payload; max_tokens output budget lives in ContextBudget, not duplicated in package.
      ja: package-88@v1 は system+4 turns+2 tool_result blocks を Messages API payload に封装。max_tokens 出力予算は ContextBudget にあり package 内重複計量なし。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: Messages API
    field_values:
      package_id: package-88
      version: 1
    related_node_ids:
      - ContextPackage
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-package-anthropic
  - id: ContextPackage-example-recycling-load
    labels:
      zh: Context Recycling  proactive 包
      en: Context Recycling proactive package
      ja: Context Recycling proactive package
    descriptions:
      zh: Context Recycling 从 L2 BM25 + L3 disk  proactive load 当前任务相关 chunk 到 L1（~12K tokens），封装 package-501@v1 后 inference；超预算 chunk 写入 ContextExclusion。
      en: Context Recycling proactively loads task-relevant chunks from L2 BM25 + L3 disk into L1 (~12K tokens), wraps package-501@v1 for inference; over-budget chunks become ContextExclusions.
      ja: Context Recycling が L2 BM25+L3 disk から L1（~12K tokens）へ task 関連 chunk proactive load。package-501@v1 封装後 inference。超 budget chunk は ContextExclusion。
    example_source:
      product: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      version: arXiv:2606.26105
    field_values:
      package_id: package-501
      version: 1
      active_context_budget_tokens: 12000
    related_node_ids:
      - ContextPackage
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-package-recycling
  - id: ContextPackage-example-not-assembly
    labels:
      zh: 包非组装活动
      en: Package is not assembly
      ja: package は assembly ではない
    descriptions:
      zh: assembly-204 是正在运行的活动；package-204@v2 是已形成的 immutable 输入记录。相同 assembly 可产生多个 package version（如 compact 前后）。
      en: assembly-204 is a running activity; package-204@v2 is the formed immutable input record. One assembly can emit multiple package versions (e.g. before/after compact).
      ja: assembly-204 は実行中 activity。package-204@v2 は形成済み immutable input record。同一 assembly から複数 package version（compact 前後等）生成可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextPackage
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-package-design
parent_relation:
  id: ContextPackage-is_a-ContextArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ContextPackage 都是 ContextArtifact；其种差是可重放的调用输入封套。
    en: Every ContextPackage is a ContextArtifact distinguished as a replayable call-input envelope.
    ja: すべての ContextPackage は ContextArtifact で replayable call-input envelope という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-package-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
