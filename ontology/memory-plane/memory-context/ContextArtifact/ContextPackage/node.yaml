schema: moonweave.ai/ontology-node/v1
id: ContextPackage
kind: concept
status: review
labels:
  zh: 上下文包
  en: context package
  ja: コンテキストパッケージ
semantics:
  short_definition:
    zh: 为一次模型调用或智能体步骤固化消息、指令、证据与来源的版本化调用输入包。
    en: A versioned call-input package fixing the messages, instructions, evidence, and provenance for one model call or agent step.
    ja: 一回のモデル呼出し・エージェント段階のメッセージ、指示、証拠、来歴を固定する版管理入力包です。
  definition:
    zh: ContextPackage 是一种 ContextArtifact；其种差是：它以 package_id、版本和内容摘要标识，是一次 RunAttempt 可重放的调用输入包，固定有效指令、消息、证据引用、最终 ContextWindow、排除决策引用与组装来源。它记录“为何形成该输入”，而 ContextWindow 只表达真正按序进入模型输入的有界槽位；二者不得互换。
    en: A ContextPackage is a ContextArtifact identified by package_id, version, and content digest. It is the replay envelope for one RunAttempt, fixing effective instructions, messages, evidence references, the final ContextWindow, exclusion-decision references, and assembly provenance. It records why that input was formed, whereas ContextWindow is only the bounded ordered model-input projection; the two are not interchangeable.
    ja: ContextPackage は package_id・版・内容digestで識別される ContextArtifact です。一回の RunAttempt の再現封筒として、有効指示、メッセージ、証拠参照、最終 ContextWindow、除外判断参照、組立来歴を固定します。「なぜこの入力になったか」を記録し、ContextWindow は実際にモデル入力へ入る有界順序スロットだけを表すため、両者は交換できません。
  why_needed:
    zh: 它让一次调用的真实输入可复现、可比较和可审计，并把候选材料、组装活动与最终提交产物分开。
    en: It makes a call's actual input reproducible, comparable, and auditable while separating candidates, the assembly activity, and the submitted artifact.
    ja: 一回の呼出しの実入力を再現・比較・監査可能にし、候補素材、組立活動、最終提出成果物を分離します。
  includes:
    - zh: 纳入具有不可变 package_id、版本、内容摘要、调用消费者和精确成员清单的输入包。
      en: Includes input packages with immutable package ID, version, content digest, call consumer, and exact membership list.
      ja: 不変 package_id、版、内容ダイジェスト、呼出し消費者、正確な構成一覧を持つ入力包を含みます。
  excludes:
    - zh: 排除尚未定稿的候选集合、执行选择的 ContextAssembly、仅描述容量的 ContextBudget，以及一次调用实际可见范围 VisibleContextWindow。
      en: Excludes an unsettled candidate set, the ContextAssembly that builds it, a ContextBudget describing only capacity, and the VisibleContextWindow representing the actually visible range.
      ja: 未確定候補集合、構築する ContextAssembly、容量だけを記す ContextBudget、実際可視範囲を示す VisibleContextWindow を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - package_id
    - version
  fields:
    - id: package_id
      labels:
        zh: 上下文包 ID
        en: context package ID
        ja: コンテキストパッケージ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在同一系统中唯一标识一组版本化上下文包。
        en: Uniquely identifies a versioned context-package lineage within one system.
        ja: 一つのシステム内で版管理されたコンテキストパッケージ系列を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: context-package-042
      source_claims:
        - claim-context-package-003
        - claim-context-package-004
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识同一上下文包系列中的不可变版本。
        en: Identifies one immutable version within a context-package lineage.
        ja: 同じコンテキストパッケージ系列内の不変版を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-context-package-005
        - claim-context-package-006
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该版本的有序内容与关键元数据计算的完整性摘要。
        en: An integrity digest computed over the ordered content and material metadata of this version.
        ja: この版の順序付き内容と重要メタデータから計算した完全性ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:4c2f...
      source_claims:
        - claim-context-package-007
        - claim-context-package-008
    - id: assembled_at
      labels:
        zh: 组装时间
        en: assembled at
        ja: 組み立て時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该不可变上下文版本完成组装的时间。
        en: Records when this immutable context version finished assembly.
        ja: この不変コンテキスト版の組み立て完了時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T08:30:00Z
      source_claims:
        - claim-context-package-009
        - claim-context-package-010
  constraints:
    - id: context-package-immutable
      severity: error
      expression_language: plain
      expression: once persisted, package_id + version content and content_digest never change; a content change creates a new version
      explanations:
        zh: 上下文包一经持久化不得就地修改；任何内容变化都必须创建新版本并重新计算摘要。
        en: Once persisted, a context package is never modified in place; any content change creates a new version and digest.
        ja: 永続化後のコンテキストパッケージはその場で変更せず、内容変更は新しい版とダイジェストを作成します。
      source_claims:
        - claim-context-package-011
        - claim-context-package-012
  required_relation_constraints: []
examples:
  - id: ContextPackage-example-positive-001
    kind: positive
    labels:
      zh: 上下文包正例
      en: Positive example of context package
      ja: コンテキストパッケージの正例
    scenario_id: null
    descriptions:
      zh: context-package-042/v3 固化调用 call-88 的系统指令、四条消息、两段已采纳证据和一个工具结果，并记录每项来源、内容摘要 sha256:4c2f... 与组装时间。
      en: context-package-042/v3 fixes the system instruction, four messages, two admitted evidence segments, and one tool result for call-88, recording each member's provenance, content digest sha256:4c2f..., and assembly time.
      ja: context-package-042/v3 は call-88 用のシステム指示、四メッセージ、採用済み証拠二片、ツール結果一件を固定し、各構成員の来歴、内容ダイジェスト sha256:4c2f...、組立時刻を記録します。
    field_values:
      context_artifact_id: context-package-042
      artifact_revision: "3"
      consumer_ref: call-88
      source_refs:
        - instruction:system-1
        - message-set:call-88
        - evidence-set:call-88
        - tool-result:call-88-1
      package_id: context-package-042
      version: "3"
      content_digest: sha256:4c2f...
      assembled_at: 2026-07-14T08:30:00Z
    related_node_ids:
      - ContextPackage
      - RetrievedCandidate
    related_relation_ids:
      - ContextPackage-contains_candidate-RetrievedCandidate
    expected_result:
      zh: 该运行可查询 ContextPackage 以及方向保持不变的事实 ContextPackage-contains_candidate-RetrievedCandidate。
      en: The run can query ContextPackage together with direction-preserving fact ContextPackage-contains_candidate-RetrievedCandidate.
      ja: この実行では ContextPackage と方向を保持した事実 ContextPackage-contains_candidate-RetrievedCandidate を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextPackage-contains_candidate-RetrievedCandidate 的 canonical 方向、概念定义和可用字段值。
      en: The immutable ID, version, digest, consumer, and exact admitted membership make this a replayable submitted input rather than an unsettled retrieval candidate set.
      ja: このシナリオは実際の運用文脈、ContextPackage-contains_candidate-RetrievedCandidate の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-package-013
      - claim-context-package-014
  - id: ContextPackage-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文包边界例
      en: Boundary case for context package
      ja: コンテキストパッケージの境界例
    scenario_id: null
    descriptions:
      zh: RetrievedCandidate candidate-91 只有检索得分、来源和候选内容，尚未经过选择、排序和预算裁剪；它可能被拒绝，因此不是 context-package-042/v3 或任何 ContextPackage。
      en: RetrievedCandidate candidate-91 has a retrieval score, provenance, and candidate content but has not passed selection, ordering, or budget trimming. It may be rejected, so it is not context-package-042/v3 or any ContextPackage.
      ja: RetrievedCandidate candidate-91 は検索得点、来歴、候補内容を持ちますが、選択・順序付け・予算裁断を終えていません。拒否され得るため context-package-042/v3 その他の ContextPackage ではありません。
    field_values: {}
    related_node_ids:
      - ContextPackage
      - RetrievedCandidate
    related_relation_ids:
      - ContextPackage-contains_candidate-RetrievedCandidate
    expected_result:
      zh: RetrievedCandidate 保持其原有类型，验证器不得凭关系共现把它提升为 ContextPackage。
      en: RetrievedCandidate retains its own type; validation must not promote it to ContextPackage from relation co-occurrence.
      ja: RetrievedCandidate は元の型を維持し、関係の共起だけで ContextPackage へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextPackage-contains_candidate-RetrievedCandidate 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Candidate identity is determined by one retrieval result, whereas package identity is determined by a finalized call-input membership list, version, and digest; possible inclusion is not package membership.
      ja: 境界例は実在する対照ノードを示し、ContextPackage-contains_candidate-RetrievedCandidate の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-package-015
      - claim-context-package-016
  - id: ContextPackage-example-instance-001
    kind: instance
    labels:
      zh: 上下文包结构化实例
      en: Structured instance of context package
      ja: コンテキストパッケージの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: context-package-042 的第 3 版于 2026-07-14T08:30:00Z 完成组装，以 sha256:4c2f... 固定系统指令、四条消息、最终 ContextWindow 和各项来源引用。
      en: Version 3 of context-package-042 was assembled at 2026-07-14T08:30:00Z and uses digest sha256:4c2f... to fix the system instruction, four messages, the final ContextWindow, and their provenance references.
      ja: context-package-042 の第3版は 2026-07-14T08:30:00Z に組み立てられ、digest sha256:4c2f... により system instruction、4メッセージ、最終 ContextWindow、各来歴参照を固定します。
    field_values:
      package_id: context-package-042
      version: "3"
      content_digest: sha256:4c2f...
      assembled_at: 2026-07-14T08:30:00Z
    related_node_ids:
      - ContextPackage
    related_relation_ids: []
    expected_result:
      zh: 四个身份字段共同标识一个可校验、可重放的 ContextPackage 版本，调用重放必须得到同一内容摘要。
      en: The four identity fields jointly identify one verifiable, replayable ContextPackage version, and replay must reproduce the same content digest.
      ja: 四つの同一性項目が検証・再現可能な一つの ContextPackage 版を識別し、再現時には同じ content digest が得られなければなりません。
    why_valid_or_invalid:
      zh: package_id 与 version 建立逻辑版本边界，content_digest 校验成员内容，assembled_at 固定形成时间；它们描述最终包而不是未决候选集合。
      en: package_id and version establish the logical version boundary, content_digest verifies membership content, and assembled_at fixes formation time; together they describe a final package rather than an unsettled candidate set.
      ja: package_id と version は論理版境界、content_digest は成員内容の検証、assembled_at は形成時刻を固定し、未決候補集合ではなく最終包を記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-package-017
      - claim-context-package-018
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ContextSummary
    shared_parent_concept_id: ContextArtifact
    differentia:
      zh: 共享父节点对照：父节点 ContextArtifact：ContextPackage（semantic kind=information，骨架 ContextPackage-is_a-ContextArtifact）；ContextSummary（semantic kind=information，骨架 ContextSummary-is_a-ContextArtifact）。双端条件：ContextPackage 条件：“为一次模型调用或智能体步骤固化消息、指令、证据与来源的版本化调用输入包”；ContextSummary 条件：“为节省上下文容量而生成、保留来源关联的先前内容压缩表示”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ContextArtifact: ContextPackage (semantic kind=information, backbone ContextPackage-is_a-ContextArtifact); ContextSummary (semantic kind=information, backbone ContextSummary-is_a-ContextArtifact). Endpoint conditions: ContextPackage condition: “A versioned call-input package fixing the messages, instructions, evidence, and provenance for one model call or agent step”; ContextSummary condition: “A provenance-linked compressed representation of prior content produced to reduce context capacity usage”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ContextArtifact：ContextPackage（semantic kind=information、バックボーン ContextPackage-is_a-ContextArtifact）；ContextSummary（semantic kind=information、バックボーン ContextSummary-is_a-ContextArtifact）。両端条件：ContextPackage の条件：「一回のモデル呼出し・エージェント段階のメッセージ、指示、証拠、来歴を固定する版管理入力包です」；ContextSummary の条件：「コンテキスト容量を節約するため生成され、来歴関連を保持する過去内容の圧縮表現です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-context-package-019
      - claim-context-package-020
parent_relation:
  id: ContextPackage-is_a-ContextArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文产物
    en: is a context artifact
    ja: コンテキスト成果物の一種
  definitions:
    zh: 每个 ContextPackage 都是 ContextArtifact；其种差是作为一次 RunAttempt 的版本化可重放封套，保存最终窗口、有效指令、组装依据和来源。
    en: Every ContextPackage is a ContextArtifact distinguished as a versioned replay envelope for one RunAttempt, retaining the final window, effective instructions, assembly rationale, and provenance.
    ja: すべての ContextPackage は ContextArtifact で、一回の RunAttempt の版管理再現封筒として最終窓・有効指示・組立根拠・来歴を保持する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 表达类包含关系，不对运行实例端点施加基数。
    en: is_a expresses class inclusion and does not impose endpoint cardinality on runtime instances.
    ja: is_a はクラス包含を表し、実行インスタンスの端点基数を課しません。
  inverse_reading:
    predicate: has_subtype_ContextPackage
    labels:
      zh: 以上下文包为下位类型
      en: has context package subtype
      ja: コンテキストパッケージを下位型に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContextPackage-is_a-ContextArtifact-example-positive-001
      kind: positive
      labels:
        zh: 是一种上下文产物正例
        en: "Positive case: is a context artifact"
        ja: コンテキスト成果物の一種の正例
      scenario_id: null
      descriptions:
        zh: package-88 固定 digest、window-88、规则版和消费者 run-88。
        en: package-88 fixes its digest, window-88, rule versions, and consumer run-88.
        ja: package-88 はdigest・window-88・規則版・consumer run-88を固定します。
      field_values: {}
      related_node_ids:
        - ContextPackage
        - ContextArtifact
      related_relation_ids:
        - ContextPackage-is_a-ContextArtifact
      expected_result:
        zh: 分类上溯到 ContextArtifact。
        en: Classification ascends to ContextArtifact.
        ja: 分類は ContextArtifact へ上がります。
      why_valid_or_invalid:
        zh: 它是可版本化、可追溯的调用输入信息产物。
        en: It is a versioned and traceable call-input information artifact.
        ja: 版管理・追跡可能な呼出し入力情報成果物です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-package-021
    - id: ContextPackage-is_a-ContextArtifact-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种上下文产物边界例
        en: "Boundary case: is a context artifact"
        ja: コンテキスト成果物の一種の境界例
      scenario_id: null
      descriptions:
        zh: assembly-88 形成 package-88，但有执行区间和阶段，是活动。
        en: assembly-88 forms package-88 but has an execution interval and phases, so it is an activity.
        ja: assembly-88 は package-88 を形成しますが実行区間と段階を持つ活動です。
      field_values: {}
      related_node_ids:
        - ContextPackage
        - ContextArtifact
      related_relation_ids:
        - ContextPackage-is_a-ContextArtifact
      expected_result:
        zh: 活动不归入 ContextArtifact。
        en: The activity is not classified as ContextArtifact.
        ja: 活動を ContextArtifact に分類しません。
      why_valid_or_invalid:
        zh: 输入封套与产生它的活动身份不同。
        en: An input envelope and its producing activity have different identities.
        ja: 入力封筒と生成活動は異なる同一性を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-package-022
  source_claims:
    - claim-context-package-023
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: ContextPackage-contains_message-Message
    predicate: contains_message
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: contains message
      en: contains message
      ja: contains message
    definitions:
      zh: ContextPackage-contains_message-Message 表示可重放包固定一条实际提交或明确保留的 Message 及其序位和版本；候选消息、历史数据库行或摘要来源不会因此自动成为包成员。
      en: ContextPackage-contains_message-Message states that a replay package fixes a Message actually submitted or explicitly retained, including its position and version. Candidate messages, history rows, and summary sources do not automatically become members.
      ja: ContextPackage-contains_message-Message は再現包が実提出または明示保持Messageを位置・版と共に固定することを表し、候補message・履歴row・要約出典を自動memberにしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_contains_message
      labels:
        zh: 反向：contains message
        en: is target of contains message
        ja: 逆方向：contains message
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 上下文包仍由 memory-context 唯一拥有，消息仍由 info-messages-instructions 唯一拥有；contains_message 只建立跨域事实，不转移定义权。若该事实触发运行操作，还必须引用适用的 PolicyDecision 或 AuthorizationGrant。
        en: context package remains uniquely owned by memory-context and message by info-messages-instructions; contains_message establishes a cross-Domain fact without transferring definitional ownership. If the fact triggers a runtime operation, it must also reference an applicable PolicyDecision or AuthorizationGrant.
        ja: コンテキストパッケージは memory-context、メッセージは info-messages-instructions に引き続き一意に所有されます。contains_message は定義所有権を移さずドメイン横断事実だけを確立し、実行操作を起動する場合は適用される PolicyDecision または AuthorizationGrant も参照します。
      protocol_or_resource_context:
        zh: 查询沿 ContextPackage-contains_message-Message 的 source→target 方向、端点 canonical ID 与本关系来源主张执行；协议版本、资源身份和信任判定继续附着在原节点或原关系。
        en: Queries follow the source-to-target direction, endpoint canonical IDs, and source claims of ContextPackage-contains_message-Message; protocol versions, resource identity, and trust decisions remain attached to the original nodes or relation.
        ja: 照会は ContextPackage-contains_message-Message の source→target 方向、端点 canonical ID、当該関係の出典主張に従い、プロトコル版、資源同一性、信頼判断は元のノードまたは関係に保持されます。
    constraints: []
    examples:
      - id: ContextPackage-contains_message-Message-example-positive-001
        kind: positive
        labels:
          zh: contains message正例
          en: "Positive case: contains message"
          ja: contains messageの正例
        scenario_id: null
        descriptions:
