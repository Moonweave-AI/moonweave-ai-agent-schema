    source: eng-proto-mcp-spec
    supports: MCP's Prompts feature returns structured messages after prompt invocation, while Resources exposes URI-addressed contextual data and annotations. ContextPackage is Moonweave's higher-level, versioned bundle of resolved instructions, messages, admitted evidence, tool observations, and provenance submitted to one call; it is not an MCP wire type.
