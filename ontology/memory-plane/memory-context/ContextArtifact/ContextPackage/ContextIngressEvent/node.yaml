source_claims:
  - id: claim-context-ingress-event-001
    source: lit-mech-compass
    supports: COMPASS assigns explicit management of an evolving, concise working context to a context manager. ContextIngressEvent denotes the observable transition in which a selected information object becomes visible in a specific context version or model call. Its owner memory-context, semantic kind event, primary display dependency through ingested_into_context, and cross-link ContextIngressEvent-makes_available-CommandOutputObservation are Moonweave design inferences; the paper does not prescribe those graph placements.
    locator: COMPASS (ACL 2026) > System Architecture > Context Manager and evolving context
    evidence_kind: peer-reviewed
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-002
    source: eng-proto-cloudevents
    supports: "Direct source premise: CloudEvents requires source to identify the context in which an event happened and makes source plus id unique. Moonweave design inference: event_source names the context manager or runtime boundary producing a ContextIngressEvent."
    locator: CloudEvents Core Specification v1.0.2 > Context Attributes > source
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-003
    source: eng-proto-cloudevents
    supports: "Direct source premise: CloudEvents requires a non-empty id unique within the producer scope and permits a retransmitted duplicate to reuse it. Moonweave design inference: event_id distinguishes one context-visibility transition inside event_source."
    locator: CloudEvents Core Specification v1.0.2 > Context Attributes > id
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-004
    source: eng-proto-cloudevents
    supports: "Direct source premise: CloudEvents time denotes when the occurrence happened and, when present, follows RFC 3339. Moonweave design inference: occurred_at is mandatory for auditable context visibility and denotes transition time rather than collection time."
    locator: CloudEvents Core Specification v1.0.2 > Context Attributes > time
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-005
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS assigns a Context Manager to maintain concise, relevant progress briefs for different reasoning stages. Moonweave design inference: admitted_item_ref identifies the exact selected information object entering one versioned context rather than treating the whole brief as one opaque event."
    locator: COMPASS (ACL 2026) > Abstract and System Architecture > Context Manager maintains concise relevant progress briefs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-006
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS's Context Manager maintains stage-relevant briefs consumed during reasoning. Moonweave design inference: context_package_ref gives the exact versioned envelope receiving the admitted item; COMPASS does not define ContextPackage identity."
    locator: COMPASS (ACL 2026) > System Architecture > Context Manager and progress briefs for reasoning stages
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-007
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS maintains evolving context and produces stage-specific progress briefs as task state changes. Moonweave design inference: target_context_version freezes the exact brief state in which an item became visible; the paper does not prescribe a version field."
    locator: COMPASS (ACL 2026) > Abstract and System Architecture > evolving context and stage-specific progress briefs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-008
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS maintains different concise briefs for different reasoning stages. Moonweave design inference: target_step_ref makes that stage dependence an explicit single-consumer reference for each ingress occurrence."
    locator: COMPASS (ACL 2026) > Abstract and System Architecture > progress briefs for different reasoning stages
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-009
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS separates context organization from tactical execution and supplies concise relevant briefs to reasoning stages. Moonweave design inference: selected-to-model-visible names the exact boundary where organized information becomes model input."
    locator: COMPASS (ACL 2026) > Abstract > separation of context organization and tactical execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-010
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS assigns context organization to a Context Manager and tactical use to a Main Agent. Moonweave design inference: visibility_transition distinguishes actual delivery to model reasoning from prior storage, retrieval, or selection."
    locator: COMPASS (ACL 2026) > Abstract and System Architecture > Context Manager versus Main Agent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-011
    source: eng-ont-prov-o
    supports: "Direct source premise: PROV-O represents derivation, generation, and usage links among Entities and Activities. Moonweave design inference: provenance_ref packages the trace from admitted information through selection or transformation into one ContextPackage version."
    locator: PROV-O > Starting Point Terms > prov:wasDerivedFrom, prov:wasGeneratedBy, and prov:used
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ingress-event-012
    source: lit-mech-compass
    supports: "Direct source premise: COMPASS's Context Manager maintains concise and relevant rather than verbatim exhaustive briefs. Moonweave design inference: redaction_applied records one possible content transformation before admission; COMPASS does not define redaction semantics or this flag."
    locator: COMPASS (ACL 2026) > Abstract and System Architecture > concise relevant progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ingress-event-013
