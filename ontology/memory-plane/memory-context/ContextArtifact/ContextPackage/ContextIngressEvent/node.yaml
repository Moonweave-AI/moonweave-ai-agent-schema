schema: moonweave.ai/ontology-node/v1
id: ContextIngressEvent
kind: concept
labels:
  zh: 上下文 ingress 事件
  en: Context ingress event
  ja: コンテキスト ingress イベント
semantics:
  short_definition:
    zh: 外部或上游内容被采纳进入 ContextPackage 的可观测入口事件。
    en: An observable ingress event when external or upstream content is admitted into a ContextPackage.
    ja: external/upstream content が ContextPackage に採用された observable ingress event。
  definition:
    zh: ContextIngressEvent 是可观测事件；其种差是记录某 source_ref（用户 @ 引用、检索块、工具结果、记忆记录或文件变更）在特定时刻被 ContextAssembly 采纳并写入 ContextPackage 的事实，包含 ingress_time、admission_path 与 resulting_slot_ref。它不是 ContextPackage 本身，也不是 ContextAssembly 完整运行。
    en: ContextIngressEvent is an observable event recording that a source_ref (user @ reference, retrieved chunk, tool result, memory record, or file change) was admitted by ContextAssembly into a ContextPackage at a specific time, including ingress_time, admission_path, and resulting_slot_ref. It is neither the ContextPackage itself nor a complete ContextAssembly run.
    ja: ContextIngressEvent は user @ reference/retrieved chunk/tool result/memory record/file change 等 source_ref が特定時刻に ContextAssembly により ContextPackage へ採用された事実を記録する observable event。ingress_time/admission_path/resulting_slot_ref 含む。ContextPackage 本体でも complete ContextAssembly run でもない。
  why_needed:
    zh: Ingress 事件让系统追踪“何时、通过哪条管道、哪条内容进入 prompt”，支持 Cursor @ 引用审计与 Context Recycling proactive load 时序分析。
    en: Ingress events trace when, through which pipeline, and which content entered the prompt, supporting Cursor @ reference audit and Context Recycling proactive load timeline analysis.
    ja: ingress event で「いつ/どの pipeline/どの content が prompt に入ったか」追跡。Cursor @ 参照監査/Context Recycling proactive load 時系列分析を支持。
  includes:
    - zh: 纳入具有 ingress_id、source_ref、target_package_ref、ingress_time 与 admission_path 的入口事件。
      en: Includes ingress events with ingress_id, source_ref, target_package_ref, ingress_time, and admission_path.
      ja: ingress_id/source_ref/target_package_ref/ingress_time/admission_path を持つ ingress event。
  excludes:
    - zh: 排除 ContextExclusion（未纳入记录）、ContextAssembly 完整运行与 ContextPackage 静态快照。
      en: Excludes ContextExclusion (omission records), complete ContextAssembly runs, and static ContextPackage snapshots.
      ja: ContextExclusion（未採用記録）/complete ContextAssembly run/ContextPackage static snapshot を除外。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: Cursor 解析 @file 时产生 user_explicit_reference ingress；semantic codebase search 命中产生 retrieved_rag ingress；recent file edit 产生 recent_edit ingress；Context Recycling proactive load 从 L3 disk fault-in 产生 disk_fault_ingress。
    en: Cursor @file resolution emits user_explicit_reference ingress; semantic codebase search hits emit retrieved_rag ingress; recent file edits emit recent_edit ingress; Context Recycling proactive load fault-in from L3 disk emits disk_fault_ingress.
    ja: Cursor @file 解決→user_explicit_reference ingress。semantic search 命中→retrieved_rag ingress。recent edit→recent_edit ingress。Context Recycling L3 fault-in→disk_fault_ingress。
  typical_input:
    - description: Cursor @ reference ingress
      format: |
        {
          "ingress_time": "2026-07-16T04:00:00.065Z",
          "source_ref": "src/auth/middleware.ts@vabc123",
          "admission_path": "user_explicit_reference",
          "target_package_ref": "package-204@v2"
        }
      source_claims: [claim-context-ingress-cursor]
  typical_output:
    - description: Resulting slot assignment
      format: |
        {
          "resulting_slot_ref": "context-window:204/slot:3",
          "token_extent": 4200
        }
      source_claims: [claim-context-ingress-design]
  reference_implementations:
    - name: Cursor @ References
      url: https://cursor.com/docs/agent/tools/search
      description: Explicit reference resolution ingress.
    - name: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      description: Proactive and fault-in ingress from disk layers.
structure:
  identity_keys:
    - ingress_id
  fields:
    - id: ingress_id
      labels:
        zh: Ingress 标识
        en: Ingress identifier
        ja: ingress 識別子
      definitions:
        zh: 稳定标识一次内容 ingress 事件。
        en: Stable identifier for one content ingress event.
        ja: 一 content ingress event を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ingress-204-middleware
      allowed_values: []
      source_claims:
        - claim-context-ingress-id
    - id: source_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: source ref
      definitions:
        zh: 被采纳进入包的候选内容固定版本引用。
        en: Pinned reference to candidate content admitted into the package.
        ja: package に採用された candidate content 固定版 ref。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src/auth/middleware.ts@vabc123
      allowed_values: []
      source_claims:
        - claim-context-ingress-source
    - id: target_package_ref
      labels:
        zh: 目标包引用
        en: Target package reference
        ja: target package ref
      definitions:
        zh: 引用内容被写入的 ContextPackage 版本。
        en: References the ContextPackage version receiving the content.
        ja: content が書き込まれた ContextPackage version を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: package-204@v2
      allowed_values: []
      source_claims:
        - claim-context-ingress-package
    - id: ingress_time
      labels:
        zh: Ingress 时间
        en: Ingress time
        ja: ingress 時刻
      definitions:
        zh: 内容被采纳写入包的事件时间。
        en: Event time when content was admitted into the package.
        ja: content が package に採用された event time。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:00.065Z
      allowed_values: []
      source_claims:
        - claim-context-ingress-time
    - id: admission_path
      labels:
        zh: 采纳路径
        en: Admission path
        ja: admission path
      definitions:
        zh: 内容进入包的管道类别，如 user_explicit_reference、retrieved_rag、recent_edit、tool_output、disk_fault_in。
        en: Pipeline category admitting content, e.g. user_explicit_reference, retrieved_rag, recent_edit, tool_output, disk_fault_in.
        ja: user_explicit_reference/retrieved_rag/recent_edit/tool_output/disk_fault_in 等 admission path。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: user_explicit_reference
      allowed_values: []
      source_claims:
        - claim-context-ingress-path
    - id: resulting_slot_ref
      labels:
        zh: 结果槽位引用
        en: Resulting slot reference
        ja: resulting slot ref
      definitions:
        zh: 引用 ingress 后在 ContextWindow 中分配的 ContextSlot。
        en: ContextSlot allocated in ContextWindow after this ingress.
        ja: この ingress 後 ContextWindow に割当された ContextSlot ref。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: context-window:204/slot:3
      allowed_values: []
      source_claims:
        - claim-context-ingress-slot
  constraints: []
  required_relations: []
examples:
  - id: ContextIngressEvent-example-cursor-at
    labels:
      zh: Cursor @ 引用 ingress
      en: Cursor @ reference ingress
      ja: Cursor @ 参照 ingress
    descriptions:
      zh: 用户发送 @src/auth/middleware.ts 时 ingress-204-middleware 记录 user_explicit_reference 路径，source_ref=middleware.ts@vabc123，写入 package-204@v2 slot 3。
      en: User sends @src/auth/middleware.ts; ingress-204-middleware records user_explicit_reference path, source_ref=middleware.ts@vabc123, written to package-204@v2 slot 3.
      ja: ユーザー @src/auth/middleware.ts 送信。ingress-204-middleware が user_explicit_reference 記録。package-204@v2 slot 3 へ書込。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "@ references"
    field_values:
      ingress_id: ingress-204-middleware
      source_ref: src/auth/middleware.ts@vabc123
      target_package_ref: package-204@v2
      admission_path: user_explicit_reference
      resulting_slot_ref: context-window:204/slot:3
    related_node_ids:
      - ContextIngressEvent
      - ContextPackage
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-ingress-cursor
  - id: ContextIngressEvent-example-semantic-search
    labels:
      zh: 语义搜索 ingress
      en: Semantic search ingress
      ja: 意味検索 ingress
    descriptions:
      zh: Cursor codebase search 命中 middleware.ts（score=0.91）产生 retrieved_rag ingress，未 @ 显式引用但由 ContextSelection 采纳。
      en: Cursor codebase search hit on middleware.ts (score=0.91) emits retrieved_rag ingress; not @ explicit but admitted by ContextSelection.
      ja: Cursor codebase search が middleware.ts（score=0.91）命中。retrieved_rag ingress。ContextSelection が採用。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: semantic search
    field_values:
      admission_path: retrieved_rag
      source_ref: chunk-middleware-003@v7
    related_node_ids:
      - ContextIngressEvent
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-ingress-cursor
  - id: ContextIngressEvent-example-recycling-fault-in
    labels:
      zh: Context Recycling fault-in
      en: Context Recycling fault-in ingress
      ja: Context Recycling fault-in ingress
    descriptions:
      zh: Context Recycling 从 L3 disk_store proactive load task.md 与 selected_chunks 到 L1，产生 disk_fault_in ingress 事件序列，填充 package-501@v1。
      en: Context Recycling proactively loads task.md and selected_chunks from L3 disk_store to L1, emitting disk_fault_in ingress sequence filling package-501@v1.
      ja: Context Recycling が L3 disk_store から task.md/selected_chunks を L1 へ proactive load。disk_fault_in ingress 系列で package-501@v1 填充。
    example_source:
      product: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      version: proactive load
    field_values:
      admission_path: disk_fault_in
      source_ref: L3://session_store/task.md
    related_node_ids:
      - ContextIngressEvent
      - ContextPackage
    related_relation_ids: []
    source_claims:
      - claim-context-ingress-recycling
  - id: ContextIngressEvent-example-not-exclusion
    labels:
      zh: Ingress 非排除
      en: Ingress is not exclusion
      ja: ingress は exclusion ではない
    descriptions:
      zh: exclusion-88-chunk-42 记录 chunk 未纳入；ingress 记录成功纳入。二者互补，不可互换。
      en: exclusion-88-chunk-42 records chunk omission; ingress records successful admission—they are complementary, not interchangeable.
      ja: exclusion-88-chunk-42 は chunk 未採用。ingress は成功採用記録。互补で interchangeable 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextIngressEvent
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-ingress-design
parent_relation:
  id: ingested_into_context
  predicate: ingested_into
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 被纳入上下文
    en: ingested into context
    ja: コンテキストに取り込まれる
  definitions:
    zh: ContextIngressEvent —ingested_into→ ContextPackage 表示该事件记录的内容被采纳写入目标包版本。
    en: ContextIngressEvent —ingested_into→ ContextPackage records content admitted into the target package version.
    ja: ContextIngressEvent —ingested_into→ ContextPackage は content が target package version に採用されたことを記録。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 每事件对应一次采纳事实，基数由运行时决定。
    en: Each event corresponds to one admission fact; cardinality is runtime-specific.
    ja: 各 event は一 admission fact。基数は runtime 依存。
  inverse_reading:
    predicate: received_ingress
    labels:
      zh: 反向：接收 ingress
      en: received ingress
      ja: 逆：ingress を受信
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-ingress-design
  distinct_fact_rationale: null
  layout_role: cross-link
  endpoint_order: event-to-package
relations: []
sources:
  - id: src-cursor-context
    title: Cursor Agent Search and Context
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ and search admission paths."
  - id: src-context-recycling-2026
    title: Context Recycling for Long-Horizon LLM Inference
    publisher: arXiv
    url: https://arxiv.org/abs/2606.26105
    source_type: arXiv
    relevance: Proactive and fault-in ingress from disk.
  - id: src-pichay-2026
    title: Demand Paging for LLM Context Windows
    publisher: arXiv
    url: https://arxiv.org/abs/2603.09023
    source_type: arXiv
    relevance: Page fault fault-in as ingress analog.
  - id: src-memory-context-design
    title: Moonweave memory-context module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Ingress versus exclusion boundary.
source_claims:
  - id: claim-context-ingress-cursor
    source: src-cursor-context
    supports: "Cursor @ references and search hits produce distinct ingress paths."
    locator: Agent context
    evidence_kind: official
    confidence: high
  - id: claim-context-ingress-recycling
    source: src-context-recycling-2026
    supports: Proactive disk load emits ingress events into active package.
    locator: Proactive load
    evidence_kind: academic
    confidence: high
  - id: claim-context-ingress-design
    source: src-memory-context-design
    supports: ContextIngressEvent records admission, not exclusion or package snapshot.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-id
    source: src-memory-context-design
    supports: ingress_id identifies one ingress event.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-source
    source: src-memory-context-design
    supports: source_ref pins admitted content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-package
    source: src-memory-context-design
    supports: target_package_ref links ingress to package version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-time
    source: src-memory-context-design
    supports: ingress_time records admission event time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-path
    source: src-cursor-context
    supports: admission_path classifies ingress pipeline.
    locator: Assembly paths
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-ingress-slot
    source: src-memory-context-design
    supports: resulting_slot_ref links ingress to allocated slot.
    locator: structure
    evidence_kind: design-inference
    confidence: high
