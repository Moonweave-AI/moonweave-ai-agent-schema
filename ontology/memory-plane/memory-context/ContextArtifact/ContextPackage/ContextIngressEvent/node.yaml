schema: moonweave.ai/ontology-node/v1
id: ContextIngressEvent
kind: concept
status: accepted
labels:
  zh: 上下文进入事件
  en: context ingress event
  ja: コンテキスト流入イベント
semantics:
  short_definition:
    zh: 某项信息被纳入一个确定模型调用或智能体步骤的可见上下文时发生的事件。
    en: An event in which an information item becomes visible to one identified model call or agent step.
    ja: 情報項目が特定のモデル呼出しまたはエージェント段階の可視コンテキストへ入る際の事象。
  definition:
    zh: 上下文进入事件是一种运行事件：在明确的时间点，已选定的消息、指令、来源片段、检索候选、执行观测或摘要被写入某个版本化 ContextPackage，并因此对一个确定的模型调用或智能体步骤可见。它记录可见性边界的变化，而不是该信息对象或上下文组装活动本身。
    en: A ContextIngressEvent is a runtime event at which a selected message, instruction, source span, retrieved candidate, execution observation, or summary is written into a versioned ContextPackage and thereby becomes visible to one identified model call or agent step. It records a change at the visibility boundary, not the information item or the context-assembly activity itself.
    ja: ContextIngressEvent は、選択済みメッセージ、指示、出典範囲、検索候補、実行観測、要約が版管理された ContextPackage に書き込まれ、特定のモデル呼出しまたはエージェント段階から可視になる時点の実行事象です。情報項目やコンテキスト組立活動そのものではなく、可視性境界の変化を記録します。
  why_needed:
    zh: 需要它回答“哪份证据在何时进入了哪次调用的上下文”，从而区分已存储、已选择与真正对模型可见三种状态，并支持重放和上下文污染审计。
    en: It answers which evidence entered which call's context and when, separating stored, selected, and actually visible states for replay and context-contamination audits.
    ja: どの証拠がいつどの呼出しのコンテキストへ入ったかを示し、保存済み・選択済み・実際に可視の状態を分離して再生とコンテキスト汚染監査を可能にします。
  includes:
    - zh: 包含同时标明进入项、目标 ContextPackage 或调用、进入时刻和可追溯来源的事件；同一信息在不同调用中进入上下文应形成不同事件。
      en: Includes events that identify the admitted item, target ContextPackage or call, ingress time, and provenance; admission of the same item into different calls forms different events.
      ja: 投入項目、対象 ContextPackage または呼出し、投入時刻、来歴を識別する事象を含みます。同じ情報でも別呼出しへの投入は別事象です。
  excludes:
    - zh: 不包含被纳入的 CommandOutputObservation、ContextPackage 或 ContextSummary，也不包含决定纳入内容的选择活动；仅写入存储但未对任何调用可见不构成本事件。
      en: Excludes the admitted CommandOutputObservation, ContextPackage, and ContextSummary and the selection activity that chose them; storage without visibility to any call is not a ContextIngressEvent.
      ja: 投入された CommandOutputObservation、ContextPackage、ContextSummary、および投入対象を選んだ活動を含みません。保存だけでどの呼出しにも可視でなければ本事象ではありません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_source
    - event_id
  fields:
    - id: event_source
      labels:
        zh: 事件来源
        en: event source
        ja: イベント出典
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以 URI-reference 或等价稳定名称标识记录该进入事件的上下文管理器或运行边界。
        en: Identifies, as a URI-reference or equivalent stable name, the context manager or runtime boundary that recorded the ingress event.
        ja: 流入イベントを記録した context manager または runtime boundary を URI-reference 等の安定名で識別します。
      allowed_values: []
      pattern: null
      example_value: urn:moonweave:context-manager:primary
      source_claims:
        - claim-context-ingress-event-002
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在 event_source 范围内唯一标识一次独立可见性进入；同一事件的重复传输复用该标识。
        en: Uniquely identifies one visibility-ingress occurrence within event_source; retransmission of the same event reuses the identifier.
        ja: event_source 内で一つの可視性流入事象を一意識別し、同じイベント再送では識別子を再利用します。
      allowed_values: []
      pattern: null
      example_value: ingress-9
      source_claims:
        - claim-context-ingress-event-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录信息从未对目标步骤可见转变为已可见的发生时间，而不是事件稍后被摄入日志的时间。
        en: Records when the item changed from not visible to visible to the target step, not when the event was later ingested into a log.
        ja: 項目が対象 step に非可視から可視へ変化した発生時刻を記録し、後に log へ投入された時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T01:02:05Z
      source_claims:
        - claim-context-ingress-event-004
    - id: admitted_item_ref
      labels:
        zh: 进入项引用
        en: admitted item reference
        ja: 投入項目参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用跨越可见性边界的那一项消息、指令、证据、观测或摘要，不复制其内容。
        en: References the one message, instruction, evidence item, observation, or summary that crossed the visibility boundary without copying its content.
        ja: 可視性境界を越えた一つの message・instruction・evidence・observation・summary を内容複製せず参照します。
      allowed_values: []
      pattern: null
      example_value: command-output-observation:obs-command-001
      source_claims:
        - claim-context-ingress-event-005
    - id: context_package_ref
      labels:
        zh: 上下文包引用
        en: context package reference
        ja: コンテキストパッケージ参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用纳入该信息并交付给目标步骤的确定 ContextPackage，而不是通用缓存或长期存储位置。
        en: References the determinate ContextPackage that admitted the item and was delivered to the target step, not a generic cache or long-term store location.
        ja: 項目を投入し対象 step へ渡した確定 ContextPackage を参照し、汎用 cache・長期 store 位置とは区別します。
      allowed_values: []
      pattern: null
      example_value: context-package:cp-9
      source_claims:
        - claim-context-ingress-event-006
    - id: target_context_version
      labels:
        zh: 目标上下文版本
        en: target context version
        ja: 対象コンテキスト版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明 context_package_ref 中首次包含该进入项、并实际提供给目标步骤的不可变版本。
        en: Identifies the immutable version of context_package_ref that first contains the admitted item and is actually supplied to the target step.
        ja: 投入項目を初めて含み対象 step に実際提供された context_package_ref の不変版を識別します。
      allowed_values: []
      pattern: null
      example_value: "9"
      source_claims:
        - claim-context-ingress-event-007
    - id: target_step_ref
      labels:
        zh: 目标步骤引用
        en: target step reference
        ja: 対象段階参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际接收该上下文版本的一个模型调用或智能体步骤；对其他步骤可见需要独立进入事件。
        en: References the one model call or agent step that actually received the context version; visibility to another step requires a separate ingress event.
        ja: 当該コンテキスト版を実際受け取った一つの model call・agent step を参照し、別 step の可視性には別流入イベントが必要です。
      allowed_values: []
      pattern: null
      example_value: model-call:model-call-9
      source_claims:
        - claim-context-ingress-event-008
    - id: visibility_transition
      labels:
        zh: 可见性转换
        en: visibility transition
        ja: 可視性遷移
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明事件记录的是 selected-to-model-visible，而不是仅 stored、retrieved 或 displayed-to-operator。
        en: Declares that the occurrence is selected-to-model-visible rather than merely stored, retrieved, or displayed-to-operator.
        ja: 事象が selected-to-model-visible であり、単なる stored・retrieved・displayed-to-operator ではないと宣言します。
      allowed_values:
        - id: context-visibility-transition-selected-to-model-visible
          value: selected-to-model-visible
          status: accepted
          labels:
            zh: 从已选择到模型可见
            en: selected to model-visible
            ja: 選択済みからモデル可視
          definitions:
            zh: 已选择项首次成为目标模型调用或智能体步骤输入的一部分。
            en: A selected item first becomes part of the target model call or agent-step input.
            ja: 選択済み項目が初めて対象 model call・agent-step 入力の一部になります。
          source_claims:
            - claim-context-ingress-event-009
      pattern: null
      example_value: selected-to-model-visible
      source_claims:
        - claim-context-ingress-event-010
    - id: provenance_ref
      labels:
        zh: 进入来历引用
        en: ingress provenance reference
        ja: 流入来歴参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用说明进入项从何来源、经过何种选择或变换并形成目标包版本的来历记录。
        en: References the provenance record explaining the item's source, selection or transformation, and inclusion in the target package version.
        ja: 項目の出典、選択・変換、対象 package 版への投入を説明する来歴記録を参照します。
      allowed_values: []
      pattern: null
      example_value: provenance:ingress-9
      source_claims:
        - claim-context-ingress-event-011
    - id: redaction_applied
      labels:
        zh: 是否应用脱敏
        en: redaction applied
        ja: 編集適用有無
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选地说明进入目标上下文的是经过脱敏的表示；该布尔值不替代对实际变换和原始来源的来历引用。
        en: Optionally states that a redacted representation entered the target context; the flag does not replace provenance for the actual transformation and original source.
        ja: 編集済み表現が対象 context へ入ったことを任意で示し、実変換・元出典の来歴参照を置換しません。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-context-ingress-event-012
  constraints:
    - id: context-ingress-visibility-transition
      severity: error
      expression_language: plain
      expression: the admitted item is absent from the predecessor package version, present in target_context_version of context_package_ref, and that exact version is supplied to target_step_ref; storage, retrieval, selection, or operator display alone is insufficient
      explanations:
        zh: 只有该项此前不在前驱版本、随后出现在指定包版本且该版本实际交付给目标步骤时才构成进入。存储、检索、选择或操作员界面可见都不充分。
        en: Ingress requires absence from the predecessor, presence in the named package version, and actual delivery of that version to the target step. Storage, retrieval, selection, or operator display alone is insufficient.
        ja: 前駆版に項目がなく、指定 package 版に存在し、その版が対象 step へ実際渡された場合だけ流入です。保存・検索・選択・operator 表示だけでは不十分です。
      source_claims:
        - claim-context-ingress-event-013
  required_relation_constraints:
    - id: context-ingress-package-binding
      direction: outgoing
      predicate: ingested_into_context
      target_concept_id: ContextPackage
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个进入事件必须通过 ingested_into_context 指向唯一目标 ContextPackage；字段中的版本进一步固定该包的具体状态。
        en: Each ingress event points through ingested_into_context to exactly one target ContextPackage, whose exact state is further pinned by the version field.
        ja: 各流入イベントは ingested_into_context で唯一の対象 ContextPackage を指し、version 項目がその具体状態を固定します。
      source_claims:
        - claim-context-ingress-event-014
examples:
  - id: ContextIngressEvent-example-positive-001
    kind: positive
    labels:
      zh: 上下文进入事件正例
      en: Positive example of context ingress event
      ja: コンテキスト流入イベントの正例
    scenario_id: null
    descriptions:
      zh: 在 model-call-9 开始前，context-manager 将已脱敏的 obs-command-001 写入 ContextPackage cp-9；ingress-9 记录该项从“已选择”变为“对 model-call-9 可见”的时刻与来源。
      en: Before model-call-9 starts, the context manager writes redacted obs-command-001 into ContextPackage cp-9. ingress-9 records when the item changes from selected to visible to model-call-9, together with provenance.
      ja: model-call-9 開始前に context manager が秘匿済み obs-command-001 を ContextPackage cp-9 へ書き込み、ingress-9 がその項目の『選択済み』から『model-call-9 に可視』への変化時刻と来歴を記録します。
    field_values:
      event_source: urn:moonweave:context-manager:primary
      event_id: ingress-9
      occurred_at: 2026-07-13T01:02:05.000Z
      admitted_item_ref: command-output-observation:obs-command-001
      context_package_ref: context-package:cp-9
      target_context_version: "9"
      target_step_ref: model-call:model-call-9
      visibility_transition: selected-to-model-visible
      provenance_ref: provenance:ingress-9
      redaction_applied: true
    related_node_ids:
      - ContextIngressEvent
      - CommandOutputObservation
    related_relation_ids:
      - ContextIngressEvent-makes_available-CommandOutputObservation
    expected_result:
      zh: ingress-9 归为 ContextIngressEvent，并把 obs-command-001 的可见性限定到 cp-9/model-call-9。
      en: ingress-9 is a ContextIngressEvent and scopes visibility of obs-command-001 to cp-9/model-call-9.
      ja: ingress-9 は ContextIngressEvent に分類され、obs-command-001 の可視性を cp-9/model-call-9 に限定します。
    why_valid_or_invalid:
      zh: 它有明确进入项、目标调用/上下文版本和状态变化时刻；观测对象与进入事件保持不同身份。
      en: It identifies the admitted item, target call/context version, and transition time while keeping the observation and ingress event as different identities.
      ja: 投入項目、対象 call/context version、遷移時刻を識別し、観測対象と投入事象を別同一性として保ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ingress-event-015
  - id: ContextIngressEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文进入事件边界例
      en: Boundary case for context ingress event
      ja: コンテキスト流入イベントの境界例
    scenario_id: null
    descriptions:
      zh: obs-command-002 已写入审计存储并显示在运维界面，但上下文选择器因敏感片段将其排除，任何 ContextPackage 都没有引用它；因此没有发生上下文进入。
      en: obs-command-002 is stored for audit and shown in an operator UI, but the context selector excludes it because of a sensitive span and no ContextPackage references it; no context ingress occurs.
      ja: obs-command-002 は監査保存され運用 UI に表示されますが、機微範囲のため context selector が除外し、どの ContextPackage も参照しません。したがって context ingress は発生しません。
    field_values:
      observation_id: obs-command-002
      audit_store_write: true
      operator_ui_visible: true
      context_selector_decision: exclude-sensitive-span
      referencing_context_package_present: false
      target_model_call_present: false
      context_ingress_event_created: false
    related_node_ids:
      - ContextIngressEvent
      - CommandOutputObservation
    related_relation_ids:
      - ContextIngressEvent-makes_available-CommandOutputObservation
    expected_result:
      zh: 保留 CommandOutputObservation 与排除决定，不创建 ContextIngressEvent。
      en: Retain the CommandOutputObservation and exclusion decision, and create no ContextIngressEvent.
      ja: CommandOutputObservation と除外判断を保持し、ContextIngressEvent を作成しません。
    why_valid_or_invalid:
      zh: 存储、界面显示和进入模型上下文是不同可见性边界；只有最后一种变化满足本事件定义。
      en: Storage, operator display, and model-context admission are different visibility boundaries; only the last transition satisfies this event definition.
      ja: 保存、運用表示、model context 投入は異なる可視性境界であり、最後の遷移だけが本事象定義を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ingress-event-016
  - id: ContextIngressEvent-example-instance-001
    kind: instance
    labels:
      zh: 上下文摄入事件结构化实例
      en: Structured instance of context ingress event
      ja: コンテキスト投入事象の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: ingress-9 在 2026-07-13T01:02:05Z 将已脱敏的 obs-command-001 纳入 ContextPackage cp-9，并把 target_context_version 从 8 推进到 9；该观测随后对 model-call-9 可见。
      en: At 2026-07-13T01:02:05Z, ingress-9 admits redacted obs-command-001 into ContextPackage cp-9, advances target_context_version from 8 to 9, and thereby makes the observation visible to model-call-9.
      ja: ingress-9 は 2026-07-13T01:02:05Z に redacted obs-command-001 を ContextPackage cp-9 へ投入し、target_context_version を 8 から 9 へ進め、model-call-9 から観測可能にします。
    field_values:
      event_id: ingress-9
      occurred_at: 2026-07-13T01:02:05.000Z
      context_package_id: cp-9
      target_context_version: 9
      visibility_transition: selected-to-model-visible
    related_node_ids:
      - ContextIngressEvent
      - CommandOutputObservation
    related_relation_ids:
      - ContextIngressEvent-makes_available-CommandOutputObservation
    expected_result:
      zh: 实例被验证为一次 ContextIngressEvent，并使指定 CommandOutputObservation 对目标调用可用。
      en: The instance validates as one ContextIngressEvent that makes the specified CommandOutputObservation available to the target call.
      ja: instance は一回の ContextIngressEvent として検証され、指定 CommandOutputObservation を target call で利用可能にします。
    why_valid_or_invalid:
      zh: 它给出事件时刻、目标上下文版本与从“已选择”到“模型可见”的实际状态变化，而非仅有存储或展示。
      en: It provides an event time, target context version, and an actual selected-to-model-visible transition rather than mere storage or display.
      ja: event time、target context version、selected から model-visible への実変化を持ち、単なる保存・表示ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ingested_into_context
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 接入上下文包
    en: ingested into context package
    ja: コンテキストパッケージへ取込
  definitions:
    zh: 把上下文接入事件指向它实际写入或登记的 ContextPackage 版本，记录本次接入的目标容器，而不是声称其中每条信息都已被模型使用。
    en: Links a context-ingress event to the exact ContextPackage version it populated or registered, identifying the admission target without claiming that every item was consumed by the model.
    ja: コンテキスト取込イベントを、実際に投入または登録した ContextPackage 版へ結び付け、全項目がモデルに消費されたとは主張しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：ingested into context
      en: is target of ingested into context
      ja: 逆方向：ingested into context
  conditions:
    - id: ingested_into_context-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the ingress event records the exact ContextPackage version whose member set changed and the admitted object became visible to the named model call or agent step; temporal co-occurrence or a candidate rejected before assembly is insufficient.
      explanations:
        zh: 仅当进入事件记录成员集合发生变化的确切 ContextPackage 版本，且被接纳对象由此对指定模型调用或智能体步骤可见时成立；时间共现或组装前被拒绝的候选均不足。
        en: Assert only when the ingress event records the exact ContextPackage version whose member set changed and the admitted object became visible to the named model call or agent step; temporal co-occurrence or a candidate rejected before assembly is insufficient.
        ja: ingress event が member set の変化した正確な ContextPackage version を記録し、admitted object が指定 model call または agent step に可視となったときだけ成立します。時間的共起や assembly 前に拒否された candidate は不十分です。
      source_claims:
        - claim-context-ingress-event-017
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ingested_into_context-example-positive-001
      kind: positive
      labels:
        zh: 接入上下文包正例
