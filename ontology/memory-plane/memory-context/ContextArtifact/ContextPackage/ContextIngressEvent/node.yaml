schema: moonweave.ai/ontology-node/v1
id: ContextIngressEvent
kind: concept
status: accepted
labels:
  zh: 上下文入包事件
  en: Context ingress event
  ja: コンテキスト入包イベント
semantics:
  short_definition:
    zh: 记录一个具体上下文工件被提出并加入某个草稿上下文包的事件。
    en: An event recording that a concrete context artifact was proposed and admitted to a draft context package.
    ja: 具体的なコンテキスト工件が提案され、下書きコンテキストパッケージへ入れられたことを記録するイベントです。
  definition:
    zh: >
      ContextIngressEvent 是绑定到一个 ContextPackage 的发生事件，记录一个来自用户消息、系统或开发者指令、工具结果、检索材料或已选记忆的 ContextArtifact 何时以何种入口被加入包。它描述“入包”这一事实，不等同于原始输入、ContextArtifact、选择活动或最终模型调用。只有草稿包可直接接收新项；如果定稿包需要接受新材料，必须先创建或声明一个刷新后的包版本。入包不保证该项最终仍在窗口中，因为后续排序、裁剪或策略排除仍可能移除它。
    en: >
      A ContextIngressEvent is an occurrence bound to one ContextPackage that records when a ContextArtifact sourced from a user message, system or developer instruction, tool result, retrieval material, or selected memory was admitted through a particular ingress path. It describes the fact of entering a package, not the raw input, the ContextArtifact, the selection activity, or the final model call. Only a draft package may directly receive a new item. If a finalized package needs new material, a refreshed package version must first be created or declared. Ingress does not guarantee final window visibility because later ordering, trimming, or policy exclusion can still remove the item.
    ja: >
      ContextIngressEvent は一つの ContextPackage に結び付く発生イベントであり、ユーザーメッセージ、system または developer 指示、ツール結果、検索材料、選択済み記憶に由来する ContextArtifact が、いつどの入口でパッケージに入ったかを記録します。これは入包という事実を表すもので、元入力、ContextArtifact、選択活動、最終モデル呼び出しそのものではありません。新しい項目を直接受け入れられるのは下書きパッケージだけです。確定パッケージに新材料が必要なら、まず更新済みパッケージ版を作成または宣言します。入包は最終ウィンドウ可視性を保証しません。後続の順序付け、トリミング、方針除外で項目が外れることがあるためです。
  why_needed:
    zh: 新材料到达与最终可见输入之间存在多个决策阶段；记录入包事件可追溯包为何变化，而不会把外部输入直接当成已见上下文。
    en: Several decision stages exist between arrival of material and final visible input. Recording ingress explains why a package changed without treating external input as already seen context.
    ja: 材料の到着と最終可視入力の間には複数の決定段階があります。入包を記録すれば、外部入力をすでに見えたコンテキストと扱わずに、パッケージが変わった理由を追跡できます。
  includes:
    - zh: 入包目标、工件引用、入口类型、接收时间和包的前后状态。
      en: The package target, artifact reference, ingress kind, receipt time, and package state before and after admission.
      ja: パッケージ対象、工件参照、入口種別、受信時刻、入包前後のパッケージ状態。
  excludes:
    - zh: 重新排序、最终裁剪、源系统持久化或模型响应生成。
      en: Reordering, final trimming, source-system persistence, or model-response generation.
      ja: 再順序付け、最終トリミング、情報源システムの永続化、モデル応答生成。
  semantic_kind: event
  aliases:
    - package admission event
    - context item arrival
engineering:
  explanation:
    zh: >
      入包应从真实客户端输入或内部检索、工具完成回调产生不可变事件。OpenAI Realtime 使用 conversation.item.create 将一个会话项写入会话；Semantic Kernel 的 ChatHistory 接收新增消息。Moonweave 不把这些 API 事件原样等同于本概念，而是用它们作为入包来源，并要求记录实际加入的 ContextArtifact 和目标草稿包。
    en: >
      Emit immutable ingress events from real client input or internal retrieval and tool-completion callbacks. OpenAI Realtime uses conversation.item.create to add a conversation item, and Semantic Kernel ChatHistory accepts added messages. Moonweave does not equate those API events verbatim with this concept; it uses them as ingress sources and records the actual ContextArtifact admitted to a target draft package.
    ja: >
      実クライアント入力、内部検索、ツール完了コールバックから不変の入包イベントを発行します。OpenAI Realtime は conversation.item.create で会話項目を追加し、Semantic Kernel の ChatHistory は追加メッセージを受け取ります。Moonweave はこれらの API イベントをそのまま本概念と同一視せず、入包情報源として用い、対象下書きパッケージへ実際に入れた ContextArtifact を記録します。
  typical_input:
    - description: OpenAI Realtime client event adding a user conversation item.
      format: |
        {
          "type": "conversation.item.create",
          "item": {
            "type": "message",
            "role": "user",
            "content": [{"type": "input_text", "text": "Can I change my billing cycle?"}]
          }
        }
    - description: Project admission of the resulting artifact into a draft package.
      format: |
        {
          "package_ref": "ctx-pkg-support-02",
          "artifact_ref": "ctx-art-user-23",
          "ingress_kind": "user_message",
          "received_at": "2026-07-19T09:14:00Z"
        }
  typical_output:
    - description: A package-scoped event that can be replayed before final assembly.
      format: |
        {
          "ingress_event_id": "ctx-ingress-user-23",
          "package_ref": "ctx-pkg-support-02",
          "admitted_artifact_ref": "ctx-art-user-23",
          "ingress_kind": "user_message",
          "package_state_before": "draft",
          "package_state_after": "draft"
        }
  reference_implementations:
    - name: OpenAI Realtime API reference
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents conversation items and the conversation.item.create client event.
    - name: Semantic Kernel chat history
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents adding messages to chat history and applying reducers as history grows.
  source_claims:
    - claim-context-ingress-conversation-item
    - claim-context-ingress-history-addition
structure:
  identity_keys:
    - ingress_event_id
  fields:
    - id: ingress_event_id
      labels:
        zh: 入包事件标识
        en: ingress event ID
        ja: 入包イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次把一个工件加入一个包的发生事实，不复用为会话项、工件或包标识。
        en: Identifies one occurrence that admits one artifact to one package and is not reused as a conversation-item, artifact, or package ID.
        ja: 一つの工件を一つのパッケージへ入れる一回の発生を識別し、会話項目、工件、パッケージの ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-ingress-[A-Za-z0-9._-]+$'
      example_value: ctx-ingress-user-23
      source_claims:
        - claim-context-ingress-conversation-item
    - id: package_ref
      labels:
        zh: 目标上下文包引用
        en: target context package reference
        ja: 対象コンテキストパッケージ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向接收工件的草稿 ContextPackage；不能只指向抽象窗口或完整会话。
        en: Points to the draft ContextPackage receiving the artifact and cannot point only to an abstract window or complete session.
        ja: 工件を受け取る下書き ContextPackage を指します。抽象ウィンドウまたは完全な会話だけを指すことはできません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-02
      source_claims:
        - claim-context-ingress-history-addition
    - id: admitted_artifact_ref
      labels:
        zh: 入包工件引用
        en: admitted artifact reference
        ja: 入包工件参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际进入目标包的 ContextArtifact；只记录原始 API 项目 ID 而未建立工件表示不足以满足该字段。
        en: Points to the ContextArtifact actually entering the target package. Recording only a raw API item ID without an artifact representation does not satisfy this field.
        ja: 実際に対象パッケージへ入る ContextArtifact を指します。工件表現なしで生 API 項目 ID だけを記録しても、この項目を満たしません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-user-23
      source_claims:
        - claim-context-ingress-conversation-item
    - id: ingress_kind
      labels:
        zh: 入包入口类型
        en: ingress kind
        ja: 入包入口種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分用户消息、治理指令、工具结果、检索材料和已选记忆，避免将不同来源的授权和时效边界混为一谈。
        en: Distinguishes user messages, governing instructions, tool results, retrieval material, and selected memory so their authorization and freshness boundaries are not conflated.
        ja: ユーザーメッセージ、統治指示、ツール結果、検索材料、選択済み記憶を区別し、認可と鮮度の境界を混同しません。
      allowed_values:
        - user_message
        - governing_instruction
        - tool_result
        - retrieval_material
        - selected_memory
      pattern: null
      example_value: user_message
      source_claims:
        - claim-context-ingress-history-addition
    - id: received_at
      labels:
        zh: 接收时间
        en: received at
        ja: 受信時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录工件被入包系统接收的时间，用于在异步工具和检索结果之间重放发生顺序；不是模型生成时间。
        en: Records when the ingress system received the artifact, enabling replay among asynchronous tool and retrieval results; it is not model-generation time.
        ja: 入包システムが工件を受信した時刻を記録し、非同期ツール・検索結果間の発生順を再生可能にします。モデル生成時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:14:00Z"
      source_claims:
        - claim-context-ingress-conversation-item
    - id: package_state_before
      labels:
        zh: 入包前包状态
        en: package state before ingress
        ja: 入包前パッケージ状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录接收前的包状态，通常必须为 draft；定稿包需要先分叉或刷新。
        en: Records the package state before admission, normally draft; a finalized package must be forked or refreshed first.
        ja: 受け入れ前のパッケージ状態を記録します。通常は draft であり、確定パッケージは先に分岐または更新が必要です。
      allowed_values:
        - draft
        - finalized
      pattern: null
      example_value: draft
      source_claims:
        - claim-context-ingress-history-addition
  constraints:
    - id: context-ingress-admits-one-artifact-to-draft-package
      severity: error
      expression_language: plain
      expression: A ContextIngressEvent must identify one target draft ContextPackage, one ContextArtifact, ingress_kind, and received_at; an admission with package_state_before finalized requires a new refreshed package version rather than mutation in place.
      explanation:
        zh: 入包是一次可重放的发生事实，且不能在不保留版本边界的情况下修改已定稿调用输入。
        en: Ingress is a replayable occurrence and cannot mutate finalized call input without preserving a version boundary.
        ja: 入包は再生可能な発生事実であり、版境界を保存せずに確定済み呼び出し入力を変更できません。
      source_claims:
        - claim-context-ingress-history-addition
    - id: context-ingress-is-not-final-visibility
      severity: warning
      expression_language: plain
      expression: Admission to a draft package does not assert final ContextWindow visibility or model delivery; later selection, ordering, trimming, or exclusion decisions may change the package.
      explanation:
        zh: 将到达、入包和最终可见性分开，避免异步结果到达即被误记为模型已见。
        en: Separate arrival, package admission, and final visibility so an asynchronous result is not mistakenly recorded as already seen by a model.
        ja: 到着、パッケージ入包、最終可視性を分離し、非同期結果をモデルが既に見たものと誤記しません。
      source_claims:
        - claim-context-ingress-conversation-item
examples:
  - id: context-ingress-example-positive-user-message

    labels:
      zh: 用户消息进入草稿支持包
      en: User message enters a draft support package
      ja: ユーザーメッセージが下書きサポートパッケージに入る

    descriptions:
      zh: Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。
      en: Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering.
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      ingress_event_id: ctx-ingress-user-23
      package_ref: ctx-pkg-support-02
      admitted_artifact_ref: ctx-art-user-23
      ingress_kind: user_message
      received_at: "2026-07-19T09:14:00Z"
      package_state_before: draft
    related_node_ids:
      - ContextIngressEvent
      - ContextPackage
      - ContextArtifact
    related_relation_ids:
      - ContextIngressEvent-admits-ContextArtifact

    source_claims:
      - claim-context-ingress-conversation-item
  - id: context-ingress-example-counterexample-mutate-finalized-package

    labels:
      zh: 原地修改已定稿包
      en: Mutate a finalized package in place
      ja: 確定パッケージをその場で変更する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      ingress_event_id: ctx-ingress-tool-7
      package_ref: ctx-pkg-support-01
      admitted_artifact_ref: ctx-art-tool-7
      ingress_kind: tool_result
      received_at: "2026-07-19T09:15:00Z"
      package_state_before: finalized
    related_node_ids:
      - ContextIngressEvent
      - ContextPackage
      - ContextArtifact
    related_relation_ids:
      - ContextIngressEvent-admits-ContextArtifact

    source_claims:
      - claim-context-ingress-history-addition
  - id: context-ingress-example-boundary-tool-result-later-excluded

    labels:
      zh: 已入包的工具结果后来被排除
      en: An admitted tool result is later excluded
      ja: 入包済みツール結果が後で除外される

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      ingress_event_id: ctx-ingress-tool-8
      package_ref: ctx-pkg-support-03
      admitted_artifact_ref: ctx-art-tool-8
      ingress_kind: tool_result
      received_at: "2026-07-19T09:16:00Z"
      package_state_before: draft
    related_node_ids:
      - ContextIngressEvent
      - ContextExclusion
      - ContextArtifact
    related_relation_ids:
      - ContextIngressEvent-admits-ContextArtifact
      - ContextExclusion-excludes-ContextArtifact

    source_claims:
      - claim-context-ingress-history-addition
  - id: context-ingress-example-instance-openai-realtime-item-create

    labels:
      zh: 实例：OpenAI Realtime 创建会话项
      en: "Instance: OpenAI Realtime conversation.item.create"
      ja: 実例：OpenAI Realtime の conversation.item.create

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      ingress_event_id: ctx-ingress-realtime-user-1
      package_ref: ctx-pkg-realtime-01
      admitted_artifact_ref: ctx-art-realtime-user-1
      ingress_kind: user_message
      received_at: "2026-07-19T09:17:00Z"
      package_state_before: draft
    related_node_ids:
      - ContextIngressEvent
      - ContextPackage
      - ContextArtifact
    related_relation_ids:
      - ContextIngressEvent-admits-ContextArtifact
    source_claims:
      - claim-context-ingress-conversation-item
parent_relation:
  id: ContextIngressEvent-part-of-ContextPackage
  predicate: part_of
  target: concept:ContextPackage
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是上下文包的入包事件部分
    en: is an ingress-event part of context package
    ja: コンテキストパッケージの入包イベント部分である
  definitions:
    zh: ContextIngressEvent 作为一个发生事实属于其目标 ContextPackage 的构建历史，而不是包内容项本身。
    en: A ContextIngressEvent belongs to the construction history of its target ContextPackage as an occurrence fact, not as a package content item itself.
    ja: ContextIngressEvent は対象 ContextPackage の構築履歴に発生事実として属し、パッケージ内容項目そのものではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个包可有多个入包事件，而每个事件只记录一个包和一个工件的接收事实。
    en: A package can have many ingress events, while each event records admission to one package of one artifact.
    ja: 一つのパッケージは複数の入包イベントを持てますが、各イベントは一つの工件が一つのパッケージへ入る事実を記録します。
  inverse_reading:
    predicate: has_ingress_event
    labels:
      zh: 具有入包事件
      en: has ingress event
      ja: 入包イベントを持つ
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-ingress-history-addition
  distinct_fact_rationale:
    zh: 此关系表达包构建历史的组成，不表达工件内容成员、最终窗口可见性或模型调用。
    en: This relation expresses composition of package construction history, not artifact content membership, final window visibility, or a model invocation.
    ja: この関係はパッケージ構築履歴の構成を表し、工件内容の所属、最終ウィンドウ可視性、モデル呼び出しを表しません。
  layout_role: primary-backbone
relations:
  - id: ContextIngressEvent-admits-ContextArtifact
    predicate: admits
    direction: source-to-target
    relation_kind: event
    labels:
      zh: 将上下文工件加入包
      en: admits context artifact to package
      ja: コンテキスト工件をパッケージへ入れる
    definitions:
      zh: 当且仅当入包事件的 admitted_artifact_ref 指向目标工件，且 package_ref 指向一个草稿包时，事件准许该工件进入该包的构建过程。
      en: An ingress event admits a target artifact only when admitted_artifact_ref identifies it and package_ref identifies a draft package into whose construction the artifact enters.
      ja: admitted_artifact_ref が対象工件を識別し、package_ref が工件が入る構築過程の下書きパッケージを識別する場合にのみ、入包イベントは対象工件を受け入れます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每个入包事件只接收一个工件；批量到达必须拆分为可排序和可审计的独立事件。
      en: Each ingress event admits one artifact; batch arrival must be split into independently orderable and auditable events.
      ja: 各入包イベントは一つの工件を受け入れます。バッチ到着は独立して順序付け・監査可能なイベントに分割する必要があります。
    inverse_reading:
      predicate: is_admitted_by_ingress_event
      labels:
        zh: 被入包事件接收
        en: is admitted by ingress event
        ja: 入包イベントにより受け入れられる
    conditions:
      - id: ContextIngressEvent-admits-ContextArtifact-draft-only
        severity: error
        expression_language: plain
        expression: "Assert only when admitted_artifact_ref equals the target ID, package_state_before is draft, ingress_kind and received_at are present, and package_ref identifies the associated package."
        explanation:
          zh: 关系必须绑定一个具体草稿包和工件，不能用来描述已定稿包的静默变更。
          en: The relation must bind a concrete draft package and artifact and cannot describe a silent change to a finalized package.
          ja: 関係は具体的な下書きパッケージと工件を結び、確定パッケージへの黙った変更を表してはなりません。
        source_claims:
          - claim-context-ingress-history-addition
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-context-ingress-conversation-item
      - claim-context-ingress-history-addition
    distinct_fact_rationale:
      zh: 此关系表达入包发生，不表达最终包包含、窗口可见、源系统持久化或模型已处理工件。
      en: This relation expresses an ingress occurrence, not final package inclusion, window visibility, source-system persistence, or model processing of the artifact.
      ja: この関係は入包の発生を表し、最終パッケージ包含、ウィンドウ可視性、情報源システムの永続化、モデルによる工件処理を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ContextArtifact
sources:
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents conversation items and client events for adding items to a Realtime conversation.
  - id: semantic-kernel-chat-history
