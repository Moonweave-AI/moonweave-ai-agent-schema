schema: moonweave.ai/ontology-node/v1
id: ContextSummary
kind: concept
status: accepted
labels:
  zh: 上下文摘要
  en: Context summary
  ja: コンテキスト要約
semantics:
  short_definition:
    zh: 由已标识上下文材料派生、用于减少本次调用输入的可读压缩工件。
    en: A readable compression artifact derived from identified context material to reduce input for a call.
    ja: 特定されたコンテキスト材料から導かれ、一回の呼び出し入力を減らすための可読圧縮工件です。
  definition:
    zh: >
      ContextSummary 是一种 ContextArtifact，以较短的文本或结构化叙述表示一个明确来源范围的选定信息，供一个或多个声明的调用范围使用。它是 Context Compression 的一种结果，但不等于全部压缩：裁剪、删除、去重和引用替换也可以减少上下文而不产生摘要。摘要允许遗漏细节、措辞、消息顺序和多模态负载，因此不能声称与原始 MessageHistory、MemoryRecord 或文档内容等价或无损。摘要也不是自动持久化的 MemoryRecord；若要写入长期记忆，必须有单独的记忆生命周期操作、授权和来源事实。
    en: >
      A ContextSummary is a ContextArtifact that represents selected information from an explicit source range in shorter text or structured narration for one or more declared call scopes. It is one result of Context Compression, not compression as a whole: trimming, deletion, deduplication, and reference substitution can also reduce context without producing a summary. A summary may omit detail, wording, message order, and multimodal payload, so it cannot claim equivalence to or lossless recovery of raw MessageHistory, a MemoryRecord, or document content. Nor is a summary an automatic persistent MemoryRecord. A long-term-memory write requires a separate memory-lifecycle operation, authorization, and provenance facts.
    ja: >
      ContextSummary は、明示した情報源範囲から選択情報を短いテキストまたは構造化叙述で表す ContextArtifact であり、一つ以上の宣言済み呼び出し範囲に使います。これは Context Compression の一つの結果であり、圧縮全体ではありません。トリミング、削除、重複除去、参照置換も、要約を生成せずにコンテキストを減らせます。要約は詳細、表現、メッセージ順、多モーダル負荷を落とし得るため、元の MessageHistory、MemoryRecord、文書内容との同値や無損失復元を主張できません。また要約は自動的な永続 MemoryRecord ではありません。長期記憶書き込みには、別の記憶ライフサイクル操作、認可、来歴事実が必要です。
  why_needed:
    zh: 长会话常超出模型输入预算；带来源和损失边界的摘要可在保留关键任务状态的同时减少输入，却不会伪造为完整原文或永久事实。
    en: Long conversations often exceed input budgets. A summary with provenance and a loss boundary can reduce input while retaining key task state without masquerading as complete raw text or a permanent fact.
    ja: 長い会話は入力予算を超えがちです。来歴と損失境界を持つ要約は、重要なタスク状態を残しつつ入力を減らせ、完全な原文や恒久事実に偽装しません。
  includes:
    - zh: 来源工件范围、摘要表示、方法、token 计数及明确的有损声明。
      en: Source-artifact range, summary representation, method, token count, and an explicit lossiness declaration.
      ja: 情報源工件範囲、要約表現、方法、トークン数、明示的な不可逆性宣言。
  excludes:
    - zh: 对原文的无损副本声明、模型隐藏推理、自动记忆写入和纯删除决定。
      en: A claim of lossless raw copying, hidden model reasoning, automatic memory writes, and pure deletion decisions.
      ja: 無損失な原文コピーの主張、モデルの非公開推論、自動記憶書き込み、純粋な削除決定。
  semantic_kind: entity
  aliases:
    - conversation summary
    - compressed context representation
engineering:
  explanation:
    zh: >
      LangChain 的 SummarizationMiddleware 在接近 token 阈值时保留近期消息并用较早文本的摘要替换历史；它明确只压缩文本而不压缩多模态负载。Semantic Kernel 的 ChatHistorySummarizationReducer 也会摘要被移除部分并将摘要作为单条消息放回历史。实现应记录摘要输入的精确工件范围、摘要模型或方法和有损标记，不能把框架返回的摘要消息直接写成永久记忆。
    en: >
      LangChain's SummarizationMiddleware retains recent messages near a token threshold and replaces older text with a summary; it explicitly compresses text rather than multimodal payloads. Semantic Kernel's ChatHistorySummarizationReducer likewise summarizes removed content and adds the summary back as one message. Implementations should record the exact source-artifact range, the summary model or method, and a lossiness flag, rather than writing a framework-returned summary message directly as permanent memory.
    ja: >
      LangChain の SummarizationMiddleware はトークン閾値付近で最近メッセージを残し、古いテキストを要約で置換します。多モーダル負荷ではなくテキストを圧縮すると明示しています。Semantic Kernel の ChatHistorySummarizationReducer も除去内容を要約し、一件のメッセージとして履歴へ戻します。実装は正確な情報源工件範囲、要約モデルまたは方法、不可逆フラグを記録すべきであり、フレームワークが返した要約メッセージを直接恒久記憶に書くべきではありません。
  typical_input:
    - description: LangChain summarization middleware configured to preserve recent messages.
      format: |
        from langchain.agents.middleware import SummarizationMiddleware

        middleware = SummarizationMiddleware(
            model="gpt-5.4-mini",
            trigger=("tokens", 4000),
            keep=("messages", 20),
        )
    - description: Source range captured for a generated summary artifact.
      format: |
        {
          "source_artifact_refs": ["ctx-art-msg-1", "ctx-art-msg-2", "ctx-art-msg-3"],
          "compression_method": "llm_summarization",
          "lossiness_declaration": "may_omit_nonessential_detail"
        }
  typical_output:
    - description: A lossy context summary with provenance and method.
      format: |
        {
          "summary_id": "ctx-summary-thread-9-v1",
          "summary_text": "Customer verified identity and awaits refund decision.",
          "source_artifact_refs": ["ctx-art-msg-1", "ctx-art-msg-2", "ctx-art-msg-3"],
          "compression_method": "llm_summarization",
          "lossiness_declaration": "may_omit_nonessential_detail"
        }
  reference_implementations:
    - name: LangChain SummarizationMiddleware
      url: https://docs.langchain.com/oss/python/langchain/middleware/built-in
      description: Documents threshold-triggered text summarization that retains recent messages and replaces older history.
    - name: Semantic Kernel ChatHistorySummarizationReducer
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents summarizing removed chat-history content and adding the summary as one message.
  source_claims:
    - claim-context-summary-langchain-text-boundary
    - claim-context-summary-semantic-kernel-reducer
structure:
  identity_keys:
    - artifact_id
    - summary_id
  fields:
    - id: summary_id
      labels:
        zh: 摘要标识
        en: summary ID
        ja: 要約 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个特定来源范围和方法生成的摘要版本；来源、方法或摘要内容实质变化时必须产生新版本。
        en: Identifies a summary version generated from a particular source range and method. A material change to source, method, or summary content requires a new version.
        ja: 特定の情報源範囲と方法から生成した要約版を識別します。情報源、方法、要約内容に実質的な変更があれば新しい版が必要です。
      allowed_values: []
      pattern: '^ctx-summary-[A-Za-z0-9._-]+$'
      example_value: ctx-summary-thread-9-v1
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: source_artifact_refs
      labels:
        zh: 来源工件引用
        en: source artifact references
        ja: 情報源工件参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出被摘要器实际读取的连续或明确选择的 ContextArtifact；仅同主题而未读取的材料不能作为摘要来源。
        en: Lists ContextArtifacts actually read by the summarizer, whether contiguous or explicitly selected. Same-topic material not read cannot be a summary source.
        ja: 要約器が実際に読んだ、連続または明示選択された ContextArtifact を列挙します。同じ話題でも未読の材料は要約情報源になれません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-msg-1
        - ctx-art-msg-2
      source_claims:
        - claim-context-summary-semantic-kernel-reducer
    - id: summary_text
      labels:
        zh: 摘要文本
        en: summary text
        ja: 要約テキスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 面向调用的可读压缩表示；它应表达保留内容，但不得包含模型隐藏推理或宣称逐字复制来源。
        en: A readable compressed representation for a call. It should state retained content without including hidden model reasoning or claiming verbatim reproduction of sources.
        ja: 呼び出し用の可読圧縮表現です。保持内容を表すべきですが、モデルの非公開推論を含めたり、情報源の逐語複製を主張したりしてはいけません。
      allowed_values: []
      pattern: null
      example_value: Customer verified identity and awaits refund decision.
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: compression_method
      labels:
        zh: 摘要压缩方法
        en: summary compression method
        ja: 要約圧縮方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分由语言模型、抽取算法或人工编写形成的摘要；纯裁剪或删除不是 ContextSummary 的方法，因为它们没有生成摘要表示。
        en: Distinguishes summaries made by a language model, extractive algorithm, or human author. Pure trimming or deletion is not a ContextSummary method because it generates no summary representation.
        ja: 言語モデル、抽出アルゴリズム、人間作成者による要約を区別します。純粋なトリミングや削除は要約表現を生成しないため ContextSummary の方法ではありません。
      allowed_values:
        - llm_summarization
        - extractive_summary
        - human_authored_summary
      pattern: null
      example_value: llm_summarization
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: lossiness_declaration
      labels:
        zh: 有损声明
        en: lossiness declaration
        ja: 不可逆性宣言
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明摘要可能省略的内容类别；任何摘要都不得标为与来源逐字等价或无损恢复。
        en: Declares categories of content the summary may omit. No summary may be labeled as verbatim-equivalent to or losslessly recoverable from its sources.
        ja: 要約が省略し得る内容カテゴリを宣言します。どの要約も情報源と逐語同値または無損失復元可能と表示してはいけません。
      allowed_values:
        - may_omit_nonessential_detail
        - may_omit_message_wording_and_order
        - text_only_multimodal_references_preserved
      pattern: null
      example_value: may_omit_nonessential_detail
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: summary_token_count
      labels:
        zh: 摘要 token 数
        en: summary token count
        ja: 要約トークン数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按目标模型或近似计数器估算的摘要长度，用于判断它是否真正减少调用输入预算。
        en: The summary length estimated by the target model or an approximate counter, used to determine whether it actually reduces call-input budget.
        ja: 対象モデルまたは近似カウンターで見積もる要約長で、呼び出し入力予算を実際に減らすかを判断します。
      allowed_values: []
      pattern: null
      example_value: 38
      source_claims:
        - claim-context-summary-semantic-kernel-reducer
    - id: artifact_id
      labels:
        zh: 摘要工件标识
        en: summary artifact ID
        ja: 要約アーティファクト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该 ContextSummary 作为单独 ContextArtifact 的身份，避免把生成摘要和原始历史工件混为一体。
        en: Identifies this ContextSummary as its own ContextArtifact so the generated summary is not conflated with the raw-history artifacts.
        ja: この ContextSummary を独立した ContextArtifact として識別し、生成された要約を元履歴のアーティファクトと混同しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-summary-ticket-42-v1
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出しスコープ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明该摘要为哪次调用或可重放装配准备，不把一个调用的压缩结果默认扩展到所有会话。
        en: Names the call or replayable assembly for which this summary is prepared, without generalizing one call's compression result to every session.
        ja: この要約を準備した呼び出しまたは再生可能な組み立てを示し、一回の圧縮結果をすべてのセッションへ一般化しません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-summary-semantic-kernel-reducer
    - id: representation_kind
      labels:
        zh: 工件表示类型
        en: artifact representation kind
        ja: アーティファクト表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定声明 summary 表示类型，明确该对象是可能有损的压缩产物而非原始消息集合。
        en: Declares summary as the representation kind, making clear that it is a potentially lossy compression result rather than the raw message set.
        ja: 表現種別を summary と宣言し、生のメッセージ集合ではなく損失を伴いうる圧縮結果であることを明確にします。
      allowed_values:
        - summary
      pattern: null
      example_value: summary
      source_claims:
        - claim-context-summary-langchain-text-boundary
    - id: source_refs
      labels:
        zh: 原始来源引用
        en: raw source references
        ja: 元情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出形成摘要的精确原始消息、提示、记录、文档或工具结果；source_artifact_refs 则保留中间工件链路。
        en: Lists the exact raw messages, prompts, records, documents, or tool results summarized; source_artifact_refs retains the intermediate artifact lineage.
        ja: 要約した正確な元メッセージ、プロンプト、記録、文書、ツール結果を列挙し、source_artifact_refs には中間アーティファクトの系譜を保持します。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - message:thread-42:1
      source_claims:
        - claim-context-summary-semantic-kernel-reducer
  constraints:
    - id: context-summary-has-provenance-and-loss-boundary
      severity: error
      expression_language: plain
      expression: A ContextSummary must identify nonempty source_artifact_refs, compression_method, summary_text, and lossiness_declaration; it must not claim lossless equivalence to raw history or source records.
      explanation:
        zh: 摘要的可用性来自已知来源和明确不确定性，而不是从简短文本推断完整语义。
        en: A summary is usable because its sources and uncertainty are known, not because a short text is assumed to preserve complete semantics.
        ja: 要約の有用性は、情報源と不確実性が既知であることから来ます。短いテキストが完全な意味を保存すると仮定することからは来ません。
      source_claims:
        - claim-context-summary-langchain-text-boundary
        - claim-context-summary-semantic-kernel-reducer
    - id: context-summary-is-not-automatic-memory-record
      severity: error
      expression_language: plain
      expression: A ContextSummary may enter a ContextPackage but must not be asserted as a persistent MemoryRecord or a memory write without a separate authorized lifecycle operation and provenance record.
      explanation:
        zh: 调用压缩和持久记忆是不同边界；摘要存在本身不产生长期存储事实。
        en: Call compression and persistent memory have different boundaries; the existence of a summary does not itself create a long-term storage fact.
        ja: 呼び出し圧縮と永続記憶は異なる境界を持ちます。要約の存在自体は長期保存事実を作りません。
      source_claims:
        - claim-context-summary-semantic-kernel-reducer
examples:
  - id: context-summary-example-positive-old-ticket-summary

    labels:
      zh: 旧工单消息的有损摘要
      en: Lossy summary of older ticket messages
      ja: 古いチケットメッセージの不可逆要約

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      artifact_id: ctx-art-summary-ticket-42-v1
      summary_id: ctx-summary-ticket-42-v1
      call_scope_id: call-support-20260719-01
      representation_kind: summary
      source_refs:
        - message:thread-42:1
        - message:thread-42:3
      source_artifact_refs:
        - ctx-art-msg-1
        - ctx-art-msg-2
        - ctx-art-msg-3
      summary_text: Customer verified identity and awaits refund decision.
      compression_method: llm_summarization
      lossiness_declaration: may_omit_nonessential_detail
      summary_token_count: 38
    related_node_ids:
      - ContextSummary
      - ContextArtifact
      - ContextPackage
    related_relation_ids:
      - ContextSummary-summarizes-ContextArtifact

    source_claims:
      - claim-context-summary-langchain-text-boundary
  - id: context-summary-example-counterexample-lossless-claim

    labels:
      zh: 宣称摘要与原文无损等价
      en: Claim a summary is losslessly equivalent to raw text
      ja: 要約が原文と無損失同値だと主張する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      summary_id: ctx-summary-invalid-lossless
      source_artifact_refs:
        - ctx-art-msg-1
      summary_text: Customer awaits refund.
      compression_method: llm_summarization
      lossiness_declaration: may_omit_nonessential_detail
      summary_token_count: 5
    related_node_ids:
      - ContextSummary
      - MessageHistory
    related_relation_ids:
      - ContextSummary-summarizes-ContextArtifact

    source_claims:
      - claim-context-summary-langchain-text-boundary
  - id: context-summary-example-boundary-not-memory-write

    labels:
      zh: 仅供下一次调用的摘要
      en: Summary intended only for the next call
      ja: 次の呼び出し専用の要約

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      summary_id: ctx-summary-call-only-1
      source_artifact_refs:
        - ctx-art-msg-10
        - ctx-art-msg-11
      summary_text: Customer chose monthly billing and requested a receipt.
      compression_method: llm_summarization
      lossiness_declaration: may_omit_message_wording_and_order
      summary_token_count: 11
    related_node_ids:
      - ContextSummary
      - ContextPackage
      - MemoryRecord
    related_relation_ids:
      - ContextSummary-summarizes-ContextArtifact

    source_claims:
      - claim-context-summary-semantic-kernel-reducer
  - id: context-summary-example-instance-langchain-middleware

    labels:
      zh: 实例：LangChain SummarizationMiddleware
      en: "Instance: LangChain SummarizationMiddleware"
      ja: 実例：LangChain の SummarizationMiddleware

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      artifact_id: ctx-art-summary-langchain-1
      summary_id: ctx-summary-langchain-1
      call_scope_id: call-support-20260719-03
      representation_kind: summary
      source_refs:
        - message:thread-17:20
        - message:thread-17:21
      source_artifact_refs:
        - ctx-art-msg-20
        - ctx-art-msg-21
      summary_text: Earlier account-verification discussion summarized for follow-up.
      compression_method: llm_summarization
      lossiness_declaration: text_only_multimodal_references_preserved
      summary_token_count: 9
    related_node_ids:
      - ContextSummary
      - ContextArtifact
      - ContextPackage
    related_relation_ids:
      - ContextSummary-summarizes-ContextArtifact
    source_claims:
      - claim-context-summary-langchain-text-boundary
parent_relation:
  id: ContextSummary-specializes-ContextArtifact
  predicate: is_a
  target: concept:ContextArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是压缩表示类型的上下文工件
    en: is a context artifact compressed-summary representation
    ja: コンテキスト工件の圧縮要約表現型である
  definitions:
