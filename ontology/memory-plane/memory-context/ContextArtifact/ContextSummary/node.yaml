sibling_differentiation:
  - sibling_concept_id: ContextWindow
    shared_parent_concept_id: ContextArtifact
    differentia:
      zh: 共享父节点对照：父节点 ContextArtifact：ContextSummary（semantic kind=information，骨架 ContextSummary-is_a-ContextArtifact）；ContextWindow（semantic kind=information，骨架 ContextWindow-is_a-ContextArtifact）。双端条件：ContextSummary 条件：“上下文摘要是以如下事实为区分特征的上下文产物：它是先前状态、证据、会话、检索材料或记忆记录的压缩表示，用于适配上下文预算且不保存隐藏推理”；ContextWindow 条件：“上下文窗口是一种上下文产物（ContextArtifact），表示一次模型调用或智能体步骤可见的有界集合，包括指令、消息、已检索分块、记忆记录、摘要、工具结果和产物”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ContextArtifact: ContextSummary (semantic kind=information, backbone ContextSummary-is_a-ContextArtifact); ContextWindow (semantic kind=information, backbone ContextWindow-is_a-ContextArtifact). Endpoint conditions: ContextSummary condition: “Context summary is a context artifact; its differentiating condition is that it is a compressed representation of prior state, evidence, conversation, retrieved material, or memory records used to fit a context budget without storing hidden reasoning”; ContextWindow condition: “Context window belongs to the context artifact category and differs from broader members in that it is the bounded set of instructions, messages, retrieved chunks, memory records, summaries, tool results, and artifacts visible to one model call or agent step”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ContextArtifact：ContextSummary（semantic kind=information、バックボーン ContextSummary-is_a-ContextArtifact）；ContextWindow（semantic kind=information、バックボーン ContextWindow-is_a-ContextArtifact）。両端条件：ContextSummary の条件：「コンテキスト要約はコンテキスト情報成果物の一種であり、次の条件で区別されます：それは、過去状態、証拠、会話、検索素材、記憶レコードの圧縮表現で、隠れた推論を保存せずにコンテキスト予算へ適合させます」；ContextWindow の条件：「コンテキスト窓はコンテキスト情報成果物（ContextArtifact）の一種で、一回のモデル呼び出しまたはエージェントステップから見える、指示、メッセージ、検索済みチャンク、記憶レコード、要約、ツール結果、成果物の境界付き集合を表します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-context-summary-007
      - claim-context-summary-008
