schema: moonweave.ai/ontology-node/v1
id: ContextSummary
kind: concept
status: review
labels:
  zh: 上下文摘要
  en: context summary
  ja: コンテキスト要約
semantics:
  short_definition:
    zh: 为节省上下文容量而生成、保留来源关联的先前内容压缩表示。
    en: A provenance-linked compressed representation of prior content produced to reduce context capacity usage.
    ja: コンテキスト容量を節約するため生成され、来歴関連を保持する過去内容の圧縮表現です。
  definition:
    zh: 上下文摘要是一种 ContextArtifact；其种差是：它以较短表示替代一组先前消息、证据、状态或记忆，并保留所覆盖范围、来源与摘要版本，使系统能追溯信息损失。它只概括可披露内容，不保存隐藏推理，也不是原始 ContextWindow。
    en: A ContextSummary is a ContextArtifact that replaces a set of prior messages, evidence, state, or memory with a shorter representation while retaining covered extent, provenance, and summary version so information loss can be traced. It summarizes only disclosable content, does not store hidden reasoning, and is not the original ContextWindow.
    ja: ContextSummary は ContextArtifact の一種で、過去メッセージ・証拠・状態・記憶の集合を短い表現へ置換し、対象範囲・来歴・要約版を保持して情報損失を追跡可能にします。開示可能内容だけを要約し、隠れた推論を保存せず、元 ContextWindow でもありません。
  why_needed:
    zh: 摘要允许长会话在容量内继续，同时为压缩前后差异、覆盖范围和来源保留审计线索。
    en: Summaries let long conversations continue within capacity while preserving an audit trail for covered extent, provenance, and pre/post-compression differences.
    ja: 長い会話を容量内で継続しつつ、対象範囲・来歴・圧縮前後差分の監査手掛かりを保ちます。
  includes:
    - zh: 纳入“turn 1–24 被压缩为 480 tokens，保留三项决定与对应消息引用”的版本化摘要。
      en: Includes versioned summaries such as “turns 1–24 compressed to 480 tokens, retaining three decisions and their message references.”
      ja: 「turn 1–24 を480 tokensへ圧縮し、三判断と対応メッセージ参照を保持」のような版管理要約を含みます。
  excludes:
    - zh: 排除原始 ContextWindow、逐字转录、只删除尾部的截断片段，以及包含未披露内部推理的记录。
      en: Excludes the original ContextWindow, verbatim transcripts, tail-only truncation spans, and records containing undisclosed internal reasoning.
      ja: 元 ContextWindow、逐語転記、末尾だけの切詰め範囲、非開示内部推論を含む記録を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextSummary-example-positive-001
    kind: positive
    labels:
      zh: 上下文摘要正例
      en: Positive example of context summary
      ja: コンテキスト要約の正例
    scenario_id: null
    descriptions:
      zh: summary-v6 将会话 turn 1–24 压缩为 480 tokens，保留三项决定、两个未解决问题及其消息引用，并记录覆盖范围、来源包和摘要模型版本。
      en: summary-v6 compresses conversation turns 1–24 into 480 tokens, retaining three decisions, two unresolved questions, and their message references while recording covered extent, source package, and summarizer version.
      ja: summary-v6 は会話 turn 1–24 を480 tokensへ圧縮し、三判断、二未解決質問、対応メッセージ参照を保持し、対象範囲・元パッケージ・要約モデル版を記録します。
    field_values:
      context_artifact_id: summary-v6
      artifact_revision: "6"
      content_digest: sha256:summary-turns-1-24-v6
      consumer_ref: call-88
      source_refs:
        - conversation:turns-1-24
        - context-package:source-v5
    related_node_ids:
      - ContextSummary
      - ContextWindow
    related_relation_ids:
      - ContextSummary-summarizes-ContextWindow
    expected_result:
      zh: 该运行可查询 ContextSummary 以及方向保持不变的事实 ContextSummary-summarizes-ContextWindow。
      en: The run can query ContextSummary together with direction-preserving fact ContextSummary-summarizes-ContextWindow.
      ja: この実行では ContextSummary と方向を保持した事実 ContextSummary-summarizes-ContextWindow を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextSummary-summarizes-ContextWindow 的 canonical 方向、概念定义和可用字段值。
      en: The artifact substitutes a shorter representation for a named prior extent while preserving enough provenance to inspect information loss; it contains no hidden reasoning transcript.
      ja: このシナリオは実際の運用文脈、ContextSummary-summarizes-ContextWindow の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-summary-003
      - claim-context-summary-004
  - id: ContextSummary-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文摘要边界例
      en: Boundary case for context summary
      ja: コンテキスト要約の境界例
    scenario_id: null
    descriptions:
      zh: ctx-window-88 按序包含指令、消息、证据和 summary-v6，并声明总占用；它组织多个槽位而不是替代某段旧内容，因此是 ContextWindow，不是 ContextSummary。
      en: ctx-window-88 contains ordered instruction, message, evidence, and summary-v6 slots and declares total usage. It organizes multiple slots rather than replacing a prior extent, so it is ContextWindow, not ContextSummary.
      ja: ctx-window-88 は指示・メッセージ・証拠・summary-v6 の順序付きスロットと総使用量を持ちます。過去範囲を置換せず複数スロットを組織するため ContextWindow で、ContextSummary ではありません。
    field_values: {}
    related_node_ids:
      - ContextSummary
      - ContextWindow
    related_relation_ids:
      - ContextSummary-summarizes-ContextWindow
    expected_result:
      zh: ContextWindow 保持其原有类型，验证器不得凭关系共现把它提升为 ContextSummary。
      en: ContextWindow retains its own type; validation must not promote it to ContextSummary from relation co-occurrence.
      ja: ContextWindow は元の型を維持し、関係の共起だけで ContextSummary へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextSummary-summarizes-ContextWindow 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A summary is identified by compressed coverage and source provenance; a window is identified by a bounded ordered slot collection. A window may contain a summary without becoming one.
      ja: 境界例は実在する対照ノードを示し、ContextSummary-summarizes-ContextWindow の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-summary-005
      - claim-context-summary-006
