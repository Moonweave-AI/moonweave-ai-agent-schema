    source: src-claude-code-context
    supports: autoCompact and /compact produce ContextSummary artifacts.
    locator: Compaction
    evidence_kind: official
    confidence: high
  - id: claim-context-summary-cursor
    source: src-cursor-self-summarization
    supports: Cursor self-summarization compresses early exploratory context.
    locator: Self-summarization
    evidence_kind: official
    confidence: high
  - id: claim-context-summary-design
    source: src-memory-context-design
    supports: ContextSummary is compressed artifact, not full window.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-summary-covered
    source: src-memory-context-design
    supports: covered_source_refs audit merged content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-summary-strategy
    source: src-claude-code-context
    supports: summary_strategy records compaction mechanism.
    locator: autoCompact
    evidence_kind: official
    confidence: high
  - id: claim-context-summary-focus
    source: src-claude-code-context
    supports: focus_instruction captures /compact user intent.
    locator: /compact
    evidence_kind: official
    confidence: high
