source_claims:
  - id: claim-context-summary-langchain-text-boundary
    source: langchain-context-middleware
    supports: LangChain documents SummarizationMiddleware retaining recent messages while compressing older text and states that it does not compress multimodal payloads. Moonweave models ContextSummary as a provenance-bearing, potentially lossy text-oriented compression result rather than a lossless substitute for all source material.
    locator: "Built-in middleware: Context editing and SummarizationMiddleware"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-summary-semantic-kernel-reducer
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents ChatHistorySummarizationReducer truncating history, summarizing removed content, and adding the summary as one message. Moonweave distinguishes that generated summary from raw history and from a separate persistent-memory write.
    locator: "Chat-history reducers: ChatHistorySummarizationReducer"
    evidence_kind: ontology-design-inference
    confidence: high