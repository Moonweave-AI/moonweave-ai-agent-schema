source_claims:
  - id: claim-context-summary-001
    source: eng-fw-deepagents-js-docs
    supports: "Deep Agents documents automatic summarization when context approaches model limits: an LLM-generated structured summary replaces older working history while original messages remain recoverable from storage. Moonweave models the compressed, provenance-linked result as ContextSummary and excludes hidden reasoning."
    locator: Context engineering in Deep Agents > Summarization > older messages summarized and recent context preserved
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-002
    source: lit-agent-memory-as-action
    supports: Memory as Action exposes summarize as an agent-selectable memory operation alongside store, retrieve, update, and discard. ContextSummary is Moonweave's versioned information artifact produced by summarizing a named prior extent; the paper does not define its schema.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents LLM-generated summaries that replace older conversation history while preserving complete original messages in the filesystem and keeping recent context. The example adds explicit coverage and provenance identifiers for Moonweave auditability.
    locator: Context engineering in Deep Agents > Summarization > older messages summarized and recent context preserved
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-004
    source: lit-agent-memory-as-action
    supports: Memory as Action lists summarization among agent-controlled memory operations used under finite context. summary-v6 is Moonweave's versioned information result of such an operation, with source coverage retained.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents states that a generated summary replaces older history inside working memory while recent context remains alongside it. This supports treating the summary as one context contribution rather than the entire ordered window.
    locator: Context engineering in Deep Agents > Summarization > older messages summarized and recent context preserved
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-006
    source: lit-agent-memory-as-action
    supports: Memory as Action treats summarization as an operation over memory information. Moonweave distinguishes its compressed result from the broader ContextWindow that may combine that result with other material.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents summarization replaces older messages with a compact representation while preserving recent context separately. Moonweave classifies that provenance-linked compressed result as ContextSummary; it is one possible contribution to, not the entirety of, a ContextWindow.
    locator: Context engineering in Deep Agents > Summarization > older messages summarized and recent context preserved
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-008
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK distinguishes session history prepended before a run, local application context, and information visible to the LLM. Moonweave models the complete bounded and ordered LLM-visible artifact as ContextWindow; a summary may occupy one slot but cannot stand for all messages, instructions, evidence, and tool results.
    locator: Sessions > Core session behavior > history prepended before each run; Context management > Agent and LLM context
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-summary-009
    source: eng-fw-deepagents-context-engineering
    supports: The covered turns, reduced token count, and retained decision references instantiate provenance-linked summarization.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-summary-010
    source: eng-fw-deepagents-context-engineering
    supports: A full context window is the uncompressed input structure, not the shorter representation produced by summarization.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-summary-011
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents summarizes older messages into a structured in-context summary while preserving original messages separately; Moonweave classifies the versioned compressed result as ContextSummary.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-summary-012
    source: eng-fw-deepagents-context-engineering
    supports: Explicit slot coverage and retained-decision references link summary-3 to the window it compresses.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
