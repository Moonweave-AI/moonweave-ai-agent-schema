    source_type: official-doc
    relevance: autoCompact and /compact summarization.
  - id: src-cursor-self-summarization
    title: Training Composer for longer horizons
    publisher: Cursor
    url: https://cursor.com/blog/self-summarization
    source_type: official-doc
    relevance: Self-summarization near context limits.
  - id: src-langchain-context-engineering
    title: Context engineering in agents
    publisher: LangChain
    url: https://docs.langchain.com/oss/python/langchain/context-engineering
    source_type: official-doc
