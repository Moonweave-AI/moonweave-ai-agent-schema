schema: moonweave.ai/ontology-node/v1
id: ContextSummary
kind: concept
labels:
  zh: 上下文摘要
  en: Context summary
  ja: コンテキスト要約
semantics:
  short_definition:
    zh: 为适配 token 预算而压缩先前会话或证据的可回放摘要产物。
    en: A replayable summary artifact compressing prior conversation or evidence to fit token budget.
    ja: token 予算適合のため prior conversation/evidence を圧縮した replayable summary artifact。
  definition:
    zh: ContextSummary 是一种 ContextArtifact；其种差是用更短文本替代先前 turn、工具输出或检索材料的压缩表示，记录 covered_source_refs 与摘要策略，不保存隐藏推理链。它映射 Claude /compact 与 autoCompact 输出、Cursor self-summarization、LangChain SummarizationMiddleware 产物，可作为 ContextWindow 中的一个槽位，但不是完整窗口。
    en: ContextSummary is a ContextArtifact whose differentia is a compressed representation replacing prior turns, tool output, or retrieved material with shorter text, recording covered_source_refs and summarization policy without storing hidden reasoning chains. It maps Claude /compact and autoCompact output, Cursor self-summarization, and LangChain SummarizationMiddleware products; it may occupy one ContextWindow slot but is not a complete window.
    ja: ContextSummary は prior turn/tool output/retrieved material を shorter text で置換する compressed representation という種差を持つ ContextArtifact。covered_source_refs/summarization policy を記録し hidden reasoning chain は保存しない。Claude /compact/autoCompact、Cursor self-summarization、LangChain SummarizationMiddleware に写像。ContextWindow の 1 slot になり得るが complete window ではない。
  why_needed:
    zh: 长会话必须在不丢失任务锚点的前提下压缩历史；独立建模摘要可审计“哪些 turn 被合并、保留什么焦点”。
    en: Long sessions must compress history without losing task anchors; modeling summaries separately audits which turns were merged and what focus was preserved.
    ja: 長セッションは task anchor を失わず history 圧縮必須。summary 独立モデル化で「どの turn が merge され何を保持したか」監査可能。
  includes:
    - zh: 纳入具有 covered_source_refs、summary_strategy、content_digest 的压缩摘要实例。
      en: Includes compressed summary instances with covered_source_refs, summary_strategy, and content_digest.
      ja: covered_source_refs/summary_strategy/content_digest を持つ compressed summary instance。
  excludes:
    - zh: 排除完整 ContextWindow、ContextAssembly 活动、ContextRule 与原始 RetrievedChunk。
      en: Excludes complete ContextWindow, ContextAssembly activity, ContextRule, and raw RetrievedChunk.
      ja: 完全 ContextWindow/ContextAssembly activity/ContextRule/raw RetrievedChunk を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Claude Code autoCompact 在约 95% 阈值前 summarization compact_boundary 之前历史；/compact focus on … 允许用户指定保留焦点；Cursor self-summarization 压缩早期探索性读取；Context Recycling L3 compaction 层持久化摘要到 disk。
    en: Claude Code autoCompact summarizes history before compact_boundary near ~95% threshold; /compact focus on … lets users specify retention focus; Cursor self-summarization compresses early exploratory reads; Context Recycling L3 compaction persists summaries to disk.
    ja: Claude autoCompact は約 95% 閾値で compact_boundary 前 history を要約。/compact focus on … で保持 focus 指定。Cursor self-summarization は早期探索 read 圧縮。Context Recycling L3 は summary を disk 永続化。
  typical_input:
    - description: Claude Code /compact with focus instruction
      format: |
        /compact focus on auth middleware changes and open test failures
      source_claims: [claim-context-summary-claude]
    - description: Cursor self-summarization near context limit
      format: |
        {
          "trigger_pct": 95,
          "summarized_turns": [1, 2, 3, 4, 5],
          "preserved": ["@src/auth/middleware.ts", "recent_edits"]
        }
      source_claims: [claim-context-summary-cursor]
  typical_output:
    - description: Summary artifact replacing prior turns
      format: |
        {
          "context_artifact_id": "summary-v6",
          "covered_source_refs": ["message-v1..v24"],
          "summary_strategy": "autoCompact",
          "token_extent": 2400
        }
      source_claims: [claim-context-summary-design]
  reference_implementations:
    - name: Claude Code /compact
      url: https://code.claude.com/docs/en/context-window
      description: Manual and automatic conversation summarization.
    - name: Cursor Self-Summarization
      url: https://cursor.com/blog/self-summarization
      description: Token-efficient compaction for long agent trajectories.
    - name: LangChain SummarizationMiddleware
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Compress middleware on message history.
structure:
  identity_keys:
    - context_artifact_id
    - artifact_revision
  fields:
    - id: covered_source_refs
      labels:
        zh: 覆盖来源引用
        en: Covered source references
        ja: covered source refs
      definitions:
        zh: 列出被该摘要替代或合并的原始消息、工具结果或检索块引用。
        en: Lists original messages, tool results, or retrieved chunks replaced or merged by this summary.
        ja: この summary で置換/merge された original message/tool result/retrieved chunk refs。
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value:
        - message-v1..v24
      allowed_values: []
      source_claims:
        - claim-context-summary-covered
    - id: summary_strategy
      labels:
        zh: 摘要策略
        en: Summary strategy
        ja: summary strategy
      definitions:
        zh: 产生摘要的策略标识，如 autoCompact、manual_compact、self_summarization、summarization_middleware。
        en: Strategy identifier producing the summary, e.g. autoCompact, manual_compact, self_summarization, summarization_middleware.
        ja: summary 生成 strategy id。autoCompact/manual_compact/self_summarization/summarization_middleware 等。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: autoCompact
      allowed_values: []
      source_claims:
        - claim-context-summary-strategy
    - id: focus_instruction
      labels:
        zh: 焦点指令
        en: Focus instruction
        ja: focus instruction
      definitions:
        zh: 可选的用户或策略指定的摘要保留焦点，如 Claude /compact focus on …。
        en: Optional user- or policy-specified retention focus, e.g. Claude /compact focus on ….
        ja: 任意 user/policy 指定 retention focus。Claude /compact focus on … 等。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: auth middleware changes and open test failures
      allowed_values: []
      source_claims:
        - claim-context-summary-focus
  constraints: []
  required_relations: []
examples:
  - id: ContextSummary-example-claude-autocompact
    labels:
      zh: Claude autoCompact 摘要
      en: Claude autoCompact summary
      ja: Claude autoCompact summary
    descriptions:
      zh: 长会话达 effective window 约 95% 时 autoCompact 将 turn 1–24 summarization 为 summary-v6（2,400 tokens），保留 CLAUDE.md 与 compact_boundary 之后消息；covered_source_refs=message-v1..v24。
      en: Near ~95% effective window autoCompact summarizes turns 1–24 into summary-v6 (2,400 tokens), preserving CLAUDE.md and post-compact_boundary messages; covered_source_refs=message-v1..v24.
      ja: 実効 window 約 95% で autoCompact が turn 1–24 を summary-v6（2,400 tokens）に要約。CLAUDE.md/compact_boundary 以降 message 保持。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact
    field_values:
      context_artifact_id: summary-v6
      artifact_revision: "1"
      summary_strategy: autoCompact
      covered_source_refs:
        - message-v1..v24
      token_extent: 2400
    related_node_ids:
      - ContextSummary
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-summary-claude
  - id: ContextSummary-example-claude-manual-compact
    labels:
      zh: Claude 手动 /compact
      en: Claude manual /compact
      ja: Claude manual /compact
    descriptions:
      zh: 用户执行 /compact focus on failing tests；summary-v7 保留测试失败相关 turn 细节，丢弃已解决探索分支；package 版本递增。
      en: User runs /compact focus on failing tests; summary-v7 retains test-failure turns and drops resolved exploration branches; package version increments.
      ja: ユーザーが /compact focus on failing tests 実行。summary-v7 は test failure 関連 turn 保持、解決済み探索 branch 破棄。package version 増分。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: /compact
    field_values:
      summary_strategy: manual_compact
      focus_instruction: failing tests
    related_node_ids:
      - ContextSummary
    related_relation_ids: []
    source_claims:
      - claim-context-summary-claude
  - id: ContextSummary-example-cursor-self-summarize
    labels:
      zh: Cursor 自摘要
      en: Cursor self-summarization
      ja: Cursor self-summarization
    descriptions:
      zh: Cursor Agent 在 token 约 95% 时 self-summarize 早期 codebase search 读取，生成 summary slot 替代 5 个 exploratory tool_result 槽位，@ 引用文件保持完整。
      en: Cursor Agent self-summarizes early codebase search reads near ~95% tokens, producing a summary slot replacing five exploratory tool_result slots while @ referenced files stay intact.
      ja: Cursor Agent が token 約 95% で early codebase search read を self-summarize。summary slot が 5 exploratory tool_result slot 置換。@ 参照 file は intact。
    example_source:
      product: Cursor
      url: https://cursor.com/blog/self-summarization
      version: self-summarization
    field_values:
      summary_strategy: self_summarization
      trigger_pct: 95
    related_node_ids:
      - ContextSummary
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-summary-cursor
  - id: ContextSummary-example-not-window
    labels:
      zh: 摘要非窗口
      en: Summary is not window
      ja: summary は window ではない
    descriptions:
      zh: summary-v6 只替代 turn 1–24，没有完整 slot 集合或 capacity_ceiling；ctx-window-88 可包含 summary-v6 作为一槽，但 summary 本身不是 ContextWindow。
      en: summary-v6 replaces only turns 1–24 without full slot collection or capacity_ceiling; ctx-window-88 may contain summary-v6 as one slot but the summary is not ContextWindow.
      ja: summary-v6 は turn 1–24 のみ置換。full slot collection/capacity_ceiling なし。ctx-window-88 は summary-v6 を 1 slot 含み得るが summary 自体は ContextWindow ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextSummary
      - ContextWindow
    related_relation_ids: []
    source_claims:
      - claim-context-summary-design
parent_relation:
  id: ContextSummary-is_a-ContextArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ContextSummary 都是 ContextArtifact；其种差是压缩表示先前内容以适配预算。
    en: Every ContextSummary is a ContextArtifact distinguished as compressed prior content to fit budget.
    ja: すべての ContextSummary は ContextArtifact で prior content を budget 適合のため圧縮する種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-summary-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
