schema: moonweave.ai/ontology-node/v1
id: ContextExclusion
kind: concept
status: accepted
labels:
  zh: 上下文排除决定
  en: Context exclusion decision
  ja: コンテキスト除外決定
semantics:
  short_definition:
    zh: 记录某个候选工件为何未进入指定模型调用可见输入的决定。
    en: A decision recording why a candidate artifact did not enter the visible input of a specified model call.
    ja: 候補工件が指定モデル呼び出しの可視入力に入らなかった理由を記録する決定です。
  definition:
    zh: >
      ContextExclusion 是一个调用范围内的上下文工件，声明一个可标识候选在何时、因何种规则被排除出 ContextPackage 或 VisibleContextWindow。它保留被排除工件的引用、理由和决定阶段，以便区分“未被选中”与“内容不存在”“内容已被删除”或“访问被永久拒绝”。排除可以来自 token 预算、重复、过期、优先级、策略或当前任务无关性；它不能隐含删除原始 MessageHistory、MemoryRecord 或文档，也不能用来绕过必须保留的指令。
    en: >
      A ContextExclusion is a call-scoped ContextArtifact that states when and by which rule an identifiable candidate was left out of a ContextPackage or VisibleContextWindow. It preserves the excluded artifact reference, reason, and decision stage, distinguishing “not selected” from “does not exist,” “was deleted,” or “is permanently denied.” An exclusion can arise from token budget, duplication, staleness, priority, policy, or current-task irrelevance. It does not imply deletion of the underlying MessageHistory, MemoryRecord, or document, and it cannot bypass instructions that must be retained.
    ja: >
      ContextExclusion は、識別可能な候補がいつどの規則で ContextPackage または VisibleContextWindow から外されたかを示す、呼び出し範囲の ContextArtifact です。除外された工件参照、理由、決定段階を保持し、「未選択」を「存在しない」「削除済み」「恒久的に拒否された」と区別します。除外はトークン予算、重複、陳腐化、優先順位、方針、現在のタスクとの無関係性から生じます。基礎となる MessageHistory、MemoryRecord、文書の削除を意味せず、必須保持の指示を回避する手段にもなりません。
  why_needed:
    zh: 在预算或策略变化时，未入选内容也会影响可解释性、重放和安全审计；只有保留明确排除事实，才能知道模型为何没看到某条材料。
    en: Under changing budgets or policy, material not selected also affects explainability, replay, and safety review. Explicit exclusion facts reveal why the model did not see a piece of material.
    ja: 予算や方針が変化する場合、未選択の材料も説明可能性、再生、安全監査に影響します。明示的な除外事実があって初めて、モデルが材料を見なかった理由を把握できます。
  includes:
    - zh: 被排除候选的精确引用、决定理由、装配阶段和调用范围。
      en: The exact excluded candidate reference, decision reason, assembly stage, and call scope.
      ja: 正確な除外候補参照、決定理由、組立段階、呼び出し範囲。
  excludes:
    - zh: 对源记录的物理删除、永久授权拒绝、或对模型已见内容的追溯性否认。
      en: Physical deletion of the source record, a permanent authorization denial, or retrospective denial of material already seen by a model.
      ja: 情報源記録の物理削除、恒久的な認可拒否、またはモデルが既に見た材料の遡及的否認。
  semantic_kind: entity
  aliases:
    - omitted context item
    - visibility exclusion
engineering:
  explanation:
    zh: >
      实现应在选择或裁剪过程中产生结构化决定，而不是只在日志中写“太长”。LangGraph 可用 RemoveMessage 从状态中移除消息，Semantic Kernel 的截断和摘要归约器会移除或替换历史部分；Moonweave 将这些操作前的选择理由表示为排除决定，使状态修改不被误读为源内容消失。
    en: >
      Implement this as a structured decision emitted during selection or trimming, not merely a log line saying “too long.” LangGraph can remove messages from state with RemoveMessage, while Semantic Kernel truncation and summary reducers remove or replace portions of history. Moonweave records the selection reason before those operations so a state change is not misread as source-content disappearance.
    ja: >
      選択またはトリミング中に「長すぎる」というログだけでなく構造化決定を出します。LangGraph は RemoveMessage で状態からメッセージを除去でき、Semantic Kernel の切り詰め・要約リデューサーは履歴の一部を除去または置換します。Moonweave は操作前の選択理由を除外決定として記録し、状態変化を情報源内容の消滅と誤読させません。
  typical_input:
    - description: A candidate that loses a budget-aware selection decision.
      format: |
        {
          "candidate_artifact_ref": "ctx-art-doc-legacy-4",
          "call_scope_id": "call-support-20260719-01",
          "estimated_tokens": 920,
          "reason": "lower_priority_under_budget"
        }
    - description: LangGraph state deletion after an explicit decision.
      format: |
        from langchain_core.messages import RemoveMessage

        update = {"messages": [RemoveMessage(id=message_id)]}
  typical_output:
    - description: An auditable call-scoped omission decision.
      format: |
        {
          "exclusion_id": "ctx-excl-legacy-4",
          "call_scope_id": "call-support-20260719-01",
          "excluded_artifact_ref": "ctx-art-doc-legacy-4",
          "reason_code": "lower_priority_under_budget",
          "decision_stage": "selection"
        }
  reference_implementations:
    - name: LangGraph message deletion
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents RemoveMessage for removing selected messages from state before model use.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents truncation and summary reducers that remove or replace portions of chat history.
  source_claims:
    - claim-context-exclusion-state-change
    - claim-context-exclusion-reducer-boundary
structure:
  identity_keys:
    - artifact_id
    - exclusion_id
  fields:
    - id: exclusion_id
      labels:
        zh: 排除决定标识
        en: exclusion decision ID
        ja: 除外決定 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次特定调用范围内的排除事实，不复用为候选工件或源记录的标识。
        en: Identifies one exclusion fact within a specific call scope and is not reused as the candidate artifact or source-record ID.
        ja: 特定呼び出し範囲内の一つの除外事実を識別し、候補工件または情報源記録の ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-excl-[A-Za-z0-9._-]+$'
      example_value: ctx-excl-legacy-4
      source_claims:
        - claim-context-exclusion-state-change
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明排除只适用于哪次调用或可重放装配，不能默认扩展为全局黑名单。
        en: States which invocation or replayable assembly the omission applies to; it must not default to a global blacklist.
        ja: 除外がどの呼び出しまたは再生可能な組立に適用されるかを示し、グローバルなブラックリストを既定にしてはなりません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-exclusion-state-change
    - id: excluded_artifact_ref
      labels:
        zh: 被排除工件引用
        en: excluded artifact reference
        ja: 除外工件参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际被评估但未纳入的 ContextArtifact；不能只写抽象来源类别或整个存储命名空间。
        en: Points to the ContextArtifact actually evaluated but not admitted; it cannot be only an abstract source category or a whole storage namespace.
        ja: 実際に評価されたが採用されなかった ContextArtifact を指します。抽象的な情報源カテゴリやストレージ名前空間全体だけでは不十分です。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-doc-legacy-4
      source_claims:
        - claim-context-exclusion-state-change
    - id: reason_code
      labels:
        zh: 排除原因代码
        en: exclusion reason code
        ja: 除外理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将预算、重复、过期、策略或当前任务无关性明确区分，避免将所有未选内容笼统称为“不相关”。
        en: Explicitly distinguishes budget, duplication, staleness, policy, and current-task irrelevance instead of calling every unselected item “irrelevant.”
        ja: 予算、重複、陳腐化、方針、現在タスクとの無関係性を明示的に区別し、未選択項目すべてを「無関係」と呼びません。
      allowed_values:
        - lower_priority_under_budget
        - duplicate_of_selected_artifact
        - stale_for_call_scope
        - disallowed_by_context_policy
        - irrelevant_to_current_request
      pattern: null
      example_value: lower_priority_under_budget
      source_claims:
        - claim-context-exclusion-reducer-boundary
    - id: decision_stage
      labels:
        zh: 决定阶段
        en: decision stage
        ja: 決定段階
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标明排除发生在选择、排序、裁剪还是最终打包阶段，以防混淆候选资格与实际窗口裁断。
        en: Marks whether exclusion occurred during selection, ordering, trimming, or final packaging so candidate eligibility is not confused with actual window cutting.
        ja: 選択、順序付け、トリミング、最終パッケージ化のどこで除外されたかを示し、候補適格性と実際のウィンドウ切断を混同しません。
      allowed_values:
        - selection
        - ordering
        - trimming
        - packaging
      pattern: null
      example_value: selection
      source_claims:
        - claim-context-exclusion-reducer-boundary
    - id: artifact_id
      labels:
        zh: 排除工件标识
        en: exclusion artifact ID
        ja: 除外アーティファクト ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这项排除决定本身所形成的 ContextArtifact；它不同于被排除候选的 excluded_artifact_ref。
        en: Identifies the ContextArtifact that records this exclusion decision, rather than the candidate named by excluded_artifact_ref.
        ja: excluded_artifact_ref が指す候補ではなく、この除外決定を記録する ContextArtifact を識別します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-exclusion-legacy-4
      source_claims:
        - claim-context-exclusion-state-change
    - id: representation_kind
      labels:
        zh: 工件表示类型
        en: artifact representation kind
        ja: アーティファクト表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对排除决定固定声明 exclusion 表示类型，使它不会被误作原始消息、摘要或最终包内容。
        en: Declares exclusion as the representation kind so the decision is not mistaken for raw content, a summary, or a final package member.
        ja: 表現種別を exclusion と宣言し、この決定を生の内容、要約、最終パッケージのメンバーと取り違えないようにします。
      allowed_values:
        - exclusion
      pattern: null
      example_value: exclusion
      source_claims:
        - claim-context-exclusion-state-change
    - id: source_refs
      labels:
        zh: 排除依据来源引用
        en: exclusion evidence source references
        ja: 除外根拠の情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出用于判定该候选应被排除的精确消息、记录、文档或工具结果，而不把整个存储空间当作依据。
        en: Lists the exact messages, records, documents, or tool results used to decide the candidate should be excluded, not an entire store as a proxy.
        ja: 候補を除外すると決めるために使った正確なメッセージ、記録、文書、ツール結果を列挙し、ストア全体を根拠の代用にしません。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - message:thread-42:legacy-4
      source_claims:
        - claim-context-exclusion-state-change
  constraints:
    - id: context-exclusion-identifies-one-evaluated-candidate
      severity: error
      expression_language: plain
      expression: A ContextExclusion must identify one call scope, one evaluated ContextArtifact, a reason_code, and a decision_stage; it cannot refer only to an unspecified class of content.
      explanation:
        zh: 可审计排除是一个具体决定事实，不能用“忽略旧内容”之类的模糊日志替代。
        en: An auditable exclusion is a concrete decision fact and cannot be replaced by a vague log such as “ignore old content.”
        ja: 監査可能な除外は具体的な決定事実であり、「古い内容を無視する」のような曖昧なログで置き換えられません。
      source_claims:
        - claim-context-exclusion-state-change
    - id: context-exclusion-is-not-source-deletion
      severity: error
      expression_language: plain
      expression: An exclusion decision must not assert deletion, permanent access denial, or nonexistence of its source artifact or source record; those require distinct storage, authorization, or lifecycle facts.
      explanation:
        zh: 不把调用可见性决定扩大为存储或授权事实，避免历史和记忆记录被错误销毁或错误否认。
        en: Do not expand a call-visibility decision into a storage or authorization fact, which would wrongly destroy or deny history and memory records.
        ja: 呼び出し可視性の決定を保存または認可の事実へ拡張してはなりません。履歴や記憶記録を誤って破壊・否認することになります。
      source_claims:
        - claim-context-exclusion-reducer-boundary
examples:
  - id: context-exclusion-example-positive-budget-priority

    labels:
      zh: 因预算和优先级排除旧文档
      en: Exclude an older document by budget and priority
      ja: 予算と優先順位で古い文書を除外する

    descriptions:
      zh: Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。
      en: Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering.
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      artifact_id: ctx-art-exclusion-legacy-4
      exclusion_id: ctx-excl-legacy-4
      call_scope_id: call-support-20260719-01
      representation_kind: exclusion
      source_refs:
        - message:thread-42:legacy-4
      excluded_artifact_ref: ctx-art-doc-legacy-4
      reason_code: lower_priority_under_budget
      decision_stage: selection
    related_node_ids:
      - ContextExclusion
      - ContextArtifact
    related_relation_ids:
      - ContextExclusion-excludes-ContextArtifact

    source_claims:
      - claim-context-exclusion-state-change
  - id: context-exclusion-example-counterexample-delete-source

    labels:
      zh: 用排除决定删除原始记录
      en: Delete the source record through an exclusion decision
      ja: 除外決定で情報源記録を削除する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      exclusion_id: ctx-excl-record-77
      call_scope_id: call-support-20260719-01
      excluded_artifact_ref: ctx-art-record-77
      reason_code: lower_priority_under_budget
      decision_stage: trimming
    related_node_ids:
      - ContextExclusion
      - MemoryRecord
    related_relation_ids:
      - ContextExclusion-excludes-ContextArtifact

    source_claims:
      - claim-context-exclusion-reducer-boundary
  - id: context-exclusion-example-boundary-summary-replacement

    labels:
      zh: 由摘要替代的旧消息
      en: Older messages replaced by a summary
      ja: 要約で置換される古いメッセージ

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      exclusion_id: ctx-excl-thread-9-early
      call_scope_id: call-support-20260719-02
      excluded_artifact_ref: ctx-art-thread-9-early
      reason_code: lower_priority_under_budget
      decision_stage: trimming
    related_node_ids:
      - ContextExclusion
      - ContextSummary
      - ContextArtifact
    related_relation_ids:
      - ContextExclusion-excludes-ContextArtifact

    source_claims:
      - claim-context-exclusion-reducer-boundary
  - id: context-exclusion-example-instance-langgraph-remove-message

    labels:
      zh: 实例：LangGraph RemoveMessage
      en: "Instance: LangGraph RemoveMessage"
      ja: 実例：LangGraph の RemoveMessage

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      artifact_id: ctx-art-exclusion-message-88
      exclusion_id: ctx-excl-message-88
      call_scope_id: call-support-20260719-03
      representation_kind: exclusion
      source_refs:
        - message:thread-88:stale
      excluded_artifact_ref: ctx-art-message-88
      reason_code: stale_for_call_scope
      decision_stage: trimming
    related_node_ids:
      - ContextExclusion
      - ContextArtifact
      - MessageHistory
    related_relation_ids:
      - ContextExclusion-excludes-ContextArtifact
    source_claims:
      - claim-context-exclusion-state-change
parent_relation:
  id: ContextExclusion-specializes-ContextArtifact
  predicate: is_a
  target: concept:ContextArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是上下文工件的排除决定类型
    en: is a context artifact exclusion decision
    ja: コンテキスト工件の除外決定型である
  definitions:
    zh: ContextExclusion 是一种具有调用范围、目标工件和理由的 ContextArtifact，而不是源内容删除操作。
    en: ContextExclusion is a ContextArtifact with a call scope, target artifact, and reason, not a source-content deletion operation.
    ja: ContextExclusion は呼び出し範囲、対象工件、理由を持つ ContextArtifact であり、情報源内容の削除操作ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不计量一次决定可排除多少候选；该数量由具体排除事实和装配策略决定。
    en: The classification relation does not count how many candidates one decision may exclude; concrete exclusion facts and assembly policy determine that quantity.
    ja: この分類関係は一つの決定が除外できる候補数を数えません。数量は具体的な除外事実と組立方針で決まります。
  inverse_reading:
    predicate: has_exclusion_decision_subtype
    labels:
      zh: 具有排除决定专门化
      en: has exclusion-decision subtype
      ja: 除外決定の下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-exclusion-state-change
  distinct_fact_rationale:
    zh: 此关系表达分类，不表达对某候选的实际排除、状态删除、存储删除或授权拒绝。
    en: This relation expresses classification, not an actual omission of a candidate, state removal, storage deletion, or authorization denial.
    ja: この関係は分類を表し、候補の実際の除外、状態除去、ストレージ削除、認可拒否を表しません。
  layout_role: primary-backbone
relations:
  - id: ContextExclusion-excludes-ContextArtifact
    predicate: excludes
    direction: source-to-target
    relation_kind: decision
    labels:
      zh: 排除上下文工件
      en: excludes context artifact
      ja: コンテキスト工件を除外する
    definitions:
      zh: 当且仅当一个 ContextExclusion 指向被评估的具体 ContextArtifact，声明调用范围、理由和阶段，并使其不进入该范围内的包或可见窗口时，建立此关系。
      en: Assert this relation only when a ContextExclusion points to one evaluated ContextArtifact, declares call scope, reason, and stage, and prevents it from entering the package or visible window in that scope.
      ja: ContextExclusion が評価済みの具体的 ContextArtifact を指し、呼び出し範囲、理由、段階を宣言し、その範囲のパッケージまたは可視ウィンドウへの入場を防ぐ場合にのみ、この関係を主張します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个排除决定记录一个目标工件；多个候选需要多个可审计决定，而不以聚合关系掩盖各自原因。
      en: One exclusion decision records one target artifact; multiple candidates need multiple auditable decisions rather than an aggregate relation that hides their reasons.
      ja: 一つの除外決定は一つの対象工件を記録します。複数候補には、それぞれの理由を隠す集約関係ではなく、複数の監査可能な決定が必要です。
    inverse_reading:
      predicate: is_excluded_by
      labels:
        zh: 被排除决定排除
        en: is excluded by decision
        ja: 除外決定により除外される
    conditions:
      - id: ContextExclusion-excludes-ContextArtifact-call-scoped-reasoned
