schema: moonweave.ai/ontology-node/v1
id: ContextExclusion
kind: concept
labels:
  zh: 上下文排除
  en: Context exclusion
  ja: コンテキスト除外
semantics:
  short_definition:
    zh: 记录候选内容未进入最终窗口的原因与计量的事实产物。
    en: Factual artifact recording why and how much candidate content failed to enter the final window.
    ja: candidate content が final window に入らなかった理由/計量を記録する factual artifact。
  definition:
    zh: ContextExclusion 是一种 ContextArtifact；其种差是声明某候选 source_ref 在组装中被拒绝或裁剪，并记录 exclusion_reason（如 capacity-insufficient、.cursorignore、relevance-below-threshold、security-policy）、required_tokens 与 available_tokens。它映射 .cursorignore 过滤、token overflow tail-drop 与 RAG 低分丢弃，不是 ContextRule 规范本身。
    en: ContextExclusion is a ContextArtifact declaring that a candidate source_ref was rejected or trimmed during assembly, recording exclusion_reason (e.g. capacity-insufficient, .cursorignore, relevance-below-threshold, security-policy), required_tokens, and available_tokens. It maps .cursorignore filtering, token overflow tail-drop, and low-score RAG drops—not the ContextRule specification itself.
    ja: ContextExclusion は assembly 中 candidate source_ref が reject/trim されたことを宣言し exclusion_reason（capacity-insufficient/.cursorignore/relevance-below-threshold/security-policy 等）/required_tokens/available_tokens を記録する ContextArtifact。.cursorignore 过滤/token overflow tail-drop/低 score RAG drop に写像。ContextRule 仕様自体ではない。
  why_needed:
    zh: 没有排除记录，无法解释“为何相关检索块或 @ 文件没有进入本次调用”；审计与调试依赖 explicit exclusion 而非 silent drop。
    en: Without exclusion records, systems cannot explain why a relevant chunk or @ file never entered the call; audit and debugging require explicit exclusions, not silent drops.
    ja: exclusion record なしでは関連 chunk/@ file が呼び出しに入らなかった理由を説明不可。監査/debug は silent drop ではなく explicit exclusion 必須。
  includes:
    - zh: 纳入具有 excluded_source_ref、exclusion_reason、可选 token 计量与 assembly_id 的排除实例。
      en: Includes exclusion instances with excluded_source_ref, exclusion_reason, optional token accounting, and assembly_id.
      ja: excluded_source_ref/exclusion_reason/optional token 計量/assembly_id を持つ exclusion instance。
  excludes:
    - zh: 排除 ContextRule（声明应排除的条件）、ContextTrimmingActivity（执行裁剪的活动）与已进入窗口的 ContextSlot。
      en: Excludes ContextRule (conditions for exclusion), ContextTrimmingActivity (trimming execution), and admitted ContextSlot.
      ja: ContextRule（exclude 条件宣言）/ContextTrimmingActivity（trim 実行 activity）/採用済み ContextSlot を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: .cursorignore 与 .gitignore 在 Cursor 组装前过滤路径；token 预算不足时 tail-drop 或 summarization 产生 capacity-insufficient exclusion；ContextSelection 对低于阈值的 RAG chunk 生成 relevance-below-threshold；Pichay eviction 产生 paged-out exclusion 类型。
    en: .cursorignore and .gitignore filter paths before Cursor assembly; insufficient token budget triggers tail-drop or summarization with capacity-insufficient exclusions; ContextSelection emits relevance-below-threshold for sub-threshold RAG chunks; Pichay eviction creates paged-out exclusion types.
    ja: .cursorignore/.gitignore は Cursor assembly 前に path 过滤。token 予算不足で tail-drop/summarization→capacity-insufficient exclusion。ContextSelection は閾値未満 RAG chunk で relevance-below-threshold。Pichay eviction は paged-out exclusion type。
  typical_input:
    - description: Cursor .cursorignore path exclusion
      format: |
        {
          "excluded_path": "node_modules/large-lib/index.js",
          "exclusion_reason": "cursorignore",
          "ignore_pattern": "node_modules/**"
        }
      source_claims: [claim-context-exclusion-cursorignore]
    - description: Token overflow exclusion after budget check
      format: |
        {
          "excluded_source_ref": "chunk-42@v7",
          "exclusion_reason": "capacity-insufficient-after-system-reservation",
          "required_tokens": 1200,
          "available_tokens": 400
        }
      source_claims: [claim-context-exclusion-overflow]
  typical_output: []
  reference_implementations:
    - name: Cursor .cursorignore
      url: https://cursor.com/docs/context/ignore-files
      description: Ignore patterns excluding files from context.
    - name: Claude Code auto-compact
      url: https://code.claude.com/docs/en/context-window
      description: Capacity-driven history replacement.
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Select strategy threshold exclusions.
structure:
  identity_keys:
    - exclusion_id
  fields:
    - id: exclusion_id
      labels:
        zh: 排除标识
        en: Exclusion identifier
        ja: exclusion 識別子
      definitions:
        zh: 稳定标识一条排除记录。
        en: Stable identifier for one exclusion record.
        ja: 一 exclusion record を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: exclusion-88-chunk-42
      allowed_values: []
      source_claims:
        - claim-context-exclusion-id
    - id: excluded_source_ref
      labels:
        zh: 被排除来源引用
        en: Excluded source reference
        ja: excluded source ref
      definitions:
        zh: 指向未进入最终窗口的候选内容固定版本。
        en: References pinned candidate content that did not enter the final window.
        ja: final window に入らなかった candidate content 固定版を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: chunk-42@v7
      allowed_values: []
      source_claims:
        - claim-context-exclusion-source
    - id: exclusion_reason
      labels:
        zh: 排除原因
        en: Exclusion reason
        ja: exclusion reason
      definitions:
        zh: 排除原因枚举或策略引用，如 cursorignore、capacity-insufficient、relevance-below-threshold、paged-out、security-policy。
        en: Exclusion reason enum or policy reference, e.g. cursorignore, capacity-insufficient, relevance-below-threshold, paged-out, security-policy.
        ja: cursorignore/capacity-insufficient/relevance-below-threshold/paged-out/security-policy 等 exclusion reason。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capacity-insufficient-after-system-reservation
      allowed_values: []
      source_claims:
        - claim-context-exclusion-reason
    - id: required_tokens
      labels:
        zh: 所需 token
        en: Required tokens
        ja: required tokens
      definitions:
        zh: 纳入该候选所需的 token 数（容量驱动排除时必填）。
        en: Tokens required to admit the candidate (required for capacity-driven exclusions).
        ja: candidate 採用に必要 token 数（capacity-driven exclusion 時必須）。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 1200
      allowed_values: []
      source_claims:
        - claim-context-exclusion-tokens
    - id: available_tokens
      labels:
        zh: 可用 token
        en: Available tokens
        ja: available tokens
      definitions:
        zh: 决策时剩余可分配给该候选的 token 数。
        en: Remaining tokens allocatable to this candidate at decision time.
        ja: 判断時点でこの candidate に割当可能な残 token 数。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 400
      allowed_values: []
      source_claims:
        - claim-context-exclusion-tokens
  constraints:
    - id: context-exclusion-capacity-requires-token-counts
      severity: error
      expression_language: plain
      expression: capacity-driven exclusion_reason requires required_tokens and available_tokens
      explanation:
        zh: 容量驱动排除必须记录所需与可用 token，否则无法审计 overflow。
        en: Capacity-driven exclusions must record required and available tokens for overflow audit.
        ja: capacity-driven exclusion は required/available tokens 必須。overflow 監査不可。
      source_claims:
        - claim-context-exclusion-tokens
  required_relations: []
examples:
  - id: ContextExclusion-example-cursorignore
    labels:
      zh: .cursorignore 排除
      en: .cursorignore exclusion
      ja: .cursorignore exclusion
    descriptions:
      zh: 用户 @node_modules/large-lib 时 Cursor 组装检测到 .cursorignore 匹配 node_modules/**，生成 exclusion_reason=cursorignore，chunk 未进入 ContextPackage。
      en: When user @node_modules/large-lib Cursor assembly detects .cursorignore match node_modules/**, emitting exclusion_reason=cursorignore; chunk never enters ContextPackage.
      ja: ユーザーが @node_modules/large-lib 時 Cursor assembly が .cursorignore node_modules/** 一致検出。exclusion_reason=cursorignore。chunk は ContextPackage 非入。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/ignore-files
      version: .cursorignore
    field_values:
      exclusion_id: exclusion-204-cursorignore
      excluded_source_ref: node_modules/large-lib/index.js
      exclusion_reason: cursorignore
    related_node_ids:
      - ContextExclusion
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-exclusion-cursorignore
  - id: ContextExclusion-example-token-overflow
    labels:
      zh: Token 溢出排除
      en: Token overflow exclusion
      ja: token overflow exclusion
    descriptions:
      zh: assembly-88 在 system 预留 4,096 tokens 后仅剩 400 tokens；chunk-42 需 1,200 tokens，记录 capacity-insufficient-after-system-reservation 并 tail-drop。
      en: assembly-88 has only 400 tokens after 4,096 system reservation; chunk-42 needs 1,200 tokens, recording capacity-insufficient-after-system-reservation with tail-drop.
      ja: assembly-88 は system 4,096 予約後 400 tokens のみ。chunk-42 は 1,200 tokens 必要。capacity-insufficient-after-system-reservation 記録し tail-drop。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: capacity management
    field_values:
      excluded_source_ref: chunk-42@v7
      exclusion_reason: capacity-insufficient-after-system-reservation
      required_tokens: 1200
      available_tokens: 400
    related_node_ids:
      - ContextExclusion
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-exclusion-overflow
  - id: ContextExclusion-example-rag-threshold
    labels:
      zh: RAG 低分排除
      en: Low-score RAG exclusion
      ja: 低 score RAG exclusion
    descriptions:
      zh: ContextSelection 对 Pinecone 命中 chunk-99（score=0.42，阈值 0.65）生成 relevance-below-threshold exclusion；该 chunk 不在 RetrievalResult Top-K 与 ContextWindow 的交集内。
      en: ContextSelection emits relevance-below-threshold for Pinecone hit chunk-99 (score=0.42, threshold 0.65); chunk is outside intersection of RetrievalResult Top-K and ContextWindow.
      ja: ContextSelection が Pinecone hit chunk-99（score=0.42、閾値 0.65）で relevance-below-threshold。RetrievalResult Top-K と ContextWindow 交集外。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: select strategy
    field_values:
      exclusion_reason: relevance-below-threshold
      excluded_source_ref: chunk-99@v3
    related_node_ids:
      - ContextExclusion
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-exclusion-rag
  - id: ContextExclusion-example-pichay-paged-out
    labels:
      zh: Pichay 逐出排除
      en: Pichay paged-out exclusion
      ja: Pichay paged-out exclusion
    descriptions:
      zh: Pichay 将陈旧 Read file.py tool output 逐出为占位符，记录 exclusion_reason=paged-out；re-read 触发 page fault 后可 fault-in 并撤销 exclusion。
      en: Pichay evicts stale Read file.py tool output to placeholder, recording exclusion_reason=paged-out; re-read triggers page fault to fault-in and revoke exclusion.
      ja: Pichay が stale Read file.py tool output を placeholder に evict。exclusion_reason=paged-out。re-read で page fault→fault-in し exclusion 取消可。
    example_source:
      product: Pichay
      url: https://arxiv.org/abs/2603.09023
      version: L1 eviction
    field_values:
      exclusion_reason: paged-out
      excluded_source_ref: tool-result:read-file-py
    related_node_ids:
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-exclusion-pichay
parent_relation:
  id: ContextExclusion-is_a-ContextArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 ContextExclusion 都是 ContextArtifact；其种差是记录未纳入窗口的候选与原因。
    en: Every ContextExclusion is a ContextArtifact distinguished by recording omitted candidates and reasons.
    ja: すべての ContextExclusion は ContextArtifact で window 未採用 candidate/reason を記録する種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-exclusion-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
