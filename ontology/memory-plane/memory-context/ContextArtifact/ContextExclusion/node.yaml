schema: moonweave.ai/ontology-node/v1
id: ContextExclusion
kind: concept
status: review
labels:
  zh: 上下文排除决定
  en: context exclusion decision
  ja: コンテキスト除外判断
semantics:
  short_definition:
    zh: 记录某个候选项未进入特定上下文版本及其理由的一次性决定记录。
    en: A per-instance decision record stating that a candidate did not enter a particular context version and why.
    ja: 候補項目が特定の文脈版へ入らなかった事実と理由を記す一回限りの判断記録です。
  definition:
    zh: 上下文排除决定是一种决定信息记录；其种差是：它绑定一个候选项、目标上下文版本、作出决定的组装运行和明确理由（如权限、信任、安全、相关性、重复或容量），说明该项未被纳入。它是规则应用后的结果，不是可复用 ContextRule，也不是被排除内容本身。
    en: A context exclusion is a decision information record. Its differentia is that it binds a candidate, target context version, deciding assembly run, and explicit reason—such as authorization, trust, safety, relevance, duplication, or capacity—to state that the item was not included. It is the result of applying rules, not a reusable ContextRule or the excluded content itself.
    ja: コンテキスト除外は判断情報記録の一種です。種差は、候補項目、対象文脈版、判断した組立実行、権限・信頼・安全・関連性・重複・容量などの明示理由を結び、未採用を示すことです。規則適用結果であり、再利用 ContextRule でも除外内容本体でもありません。
  why_needed:
    zh: 它让系统能回答“候选已检索到却为何没进入模型上下文”，并区分安全抑制、预算裁剪、去重和低相关性。
    en: It lets the system answer why a retrieved candidate did not reach model context and distinguish safety suppression, budget trimming, deduplication, and low relevance.
    ja: 検索済み候補がなぜモデル文脈へ届かなかったかを説明し、安全抑制・予算裁剪・重複排除・低関連性を区別できます。
  includes:
    - zh: 纳入“chunk-42 因超过剩余 600 令牌而未进入 context-v17”这类绑定候选、目标版本和原因的记录。
      en: Includes records such as “chunk-42 did not enter context-v17 because only 600 tokens remained,” binding candidate, target version, and reason.
      ja: 「残り 600 トークンのため chunk-42 は context-v17 へ入らなかった」のように候補・対象版・理由を結ぶ記録を含みます。
  excludes:
    - zh: 排除通用的“低信任内容不得进入上下文”规则、被排除的 Chunk 本身，以及仅记录文本截断范围的 TruncatedContextSpan。
      en: Excludes the reusable rule “low-trust content may not enter context,” the excluded Chunk itself, and a TruncatedContextSpan that records only a clipped text range.
      ja: 再利用規則「低信頼内容は文脈へ入れない」、除外された Chunk 本体、切詰め範囲だけを記す TruncatedContextSpan を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextExclusion-example-positive-001
    kind: positive
    labels:
      zh: 上下文排除决定正例
      en: Positive example of context exclusion decision
      ja: コンテキスト除外判断の正例
    scenario_id: null
    descriptions:
      zh: 组装运行 ctx-run-42 将 Chunk chunk-payroll-7 排除，记录理由 privacy_scope_mismatch、所依据规则 rule-tenant-boundary、决策时间和作出决定的组件。
      en: Assembly run ctx-run-42 excludes Chunk chunk-payroll-7 and records reason privacy_scope_mismatch, governing rule rule-tenant-boundary, decision time, and deciding component.
      ja: 組立実行 ctx-run-42 は Chunk chunk-payroll-7 を除外し、理由 privacy_scope_mismatch、根拠規則 rule-tenant-boundary、判断時刻、判断構成要素を記録します。
    field_values:
      context_artifact_id: exclusion-chunk-payroll-7
      artifact_revision: "1"
      content_digest: sha256:exclusion-payroll-7
      consumer_ref: call-88
      source_refs:
        - chunk-payroll-7
        - rule-tenant-boundary@4
    related_node_ids:
      - ContextExclusion
      - Chunk
    related_relation_ids:
      - context_exclusion_excludes_chunk
    expected_result:
      zh: 审计可回答哪一项被排除、何时排除、由谁决定以及依据什么规则；原 Chunk 的类型与内容身份保持不变。
      en: Audit can answer what was excluded, when, by which component, and under which rule; the original Chunk retains its type and content identity.
      ja: 監査は何が、いつ、どの構成要素により、どの規則で除外されたかを回答でき、元 Chunk の型と内容同一性は保たれます。
    why_valid_or_invalid:
      zh: 该对象记录一次已经发生的排除决定及其依据，而不是可跨运行复用的隐私规则或被排除的内容本身。
      en: The object records one exclusion decision that occurred and its basis; it is neither the reusable privacy rule nor the excluded content itself.
      ja: この対象は実際に行われた一回の除外判断と根拠を記録し、再利用可能なプライバシー規則でも除外内容自体でもありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-exclusion-003
      - claim-context-exclusion-004
  - id: ContextExclusion-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文排除决定边界例
      en: Boundary case for context exclusion decision
      ja: コンテキスト除外判断の境界例
    scenario_id: null
    descriptions:
      zh: Chunk chunk-payroll-7 是被排除的内容片段，带原文范围和来源；它没有决策者、决定时间或排除理由，不能因为被 ContextExclusion 指向就成为排除决定。
      en: Chunk chunk-payroll-7 is the excluded content segment with source span and provenance. It has no decider, decision time, or exclusion reason, so being referenced by ContextExclusion does not make it the decision.
      ja: Chunk chunk-payroll-7 は原文範囲と来歴を持つ除外対象の内容断片です。判断者・判断時刻・除外理由を持たず、ContextExclusion から参照されても判断にはなりません。
    field_values: {}
    related_node_ids:
      - ContextExclusion
      - Chunk
    related_relation_ids:
      - context_exclusion_excludes_chunk
    expected_result:
      zh: 验证器保留 chunk-payroll-7 的 Chunk 类型，并另外保存指向它的 ContextExclusion 决策记录。
      en: Validation preserves chunk-payroll-7 as Chunk and stores the separate ContextExclusion record that points to it.
      ja: 検証器は chunk-payroll-7 を Chunk として保持し、それを指す別個の ContextExclusion 記録を保存します。
    why_valid_or_invalid:
      zh: 内容对象与关于该内容的一次决定是两个事实：删除决策记录不会删除来源片段，删除片段也不应抹去审计决定。
      en: "The content object and a decision about it are separate facts: deleting the decision record need not delete the source chunk, and deleting the chunk should not erase the audit decision."
      ja: 内容対象とそれに関する一回の判断は別事実です。判断記録の削除は元チャンクを削除せず、チャンク削除も監査判断を消してはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-exclusion-005
      - claim-context-exclusion-006
