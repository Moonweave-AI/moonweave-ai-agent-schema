source_claims:
  - id: claim-context-artifact-001
    source: lit-agent-agemem
    supports: AgeMem's abstract states that finite context windows make memory management critical and models store, retrieve, update, summarize, and discard as distinct actions. Moonweave therefore models the information prepared or derived by those actions separately from the actions themselves; naming their versioned result ContextArtifact is an ontology design inference.
    locator: Paper > Section 3.1 Problem Formulation > Table 1 LTM and STM memory-management tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-002
    source: lit-mech-compass
    supports: COMPASS's abstract attributes long-horizon failures to context management and assigns a Context Manager to maintain concise, relevant progress briefs for reasoning stages. Treating a prepared brief, package, window, or summary as a traceable ContextArtifact unifies those information results without treating the manager activity as the artifact; this classification is Moonweave-specific.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-003
    source: lit-mech-compass
    supports: COMPASS maintains structured progress briefs as context products used by later reasoning stages. context_artifact_id is Moonweave's stable identity for one such prepared-information lineage.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-artifact-004
    source: lit-agent-agemem
    supports: Agentic Memory treats context and memory state as changing through explicit management actions. artifact_revision preserves the exact prepared state produced by one such action.
    locator: Paper > Section 3.1 Problem Formulation > LTM and STM memory-management tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-005
    source: lit-mech-compass
    supports: COMPASS relies on concise stage-specific briefs remaining stable for downstream reasoning. content_digest is Moonweave's integrity control for verifying the exact prepared artifact content.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-006
    source: eng-fw-langchain-context-engineering
    supports: LangChain constructs model context for each model call. consumer_ref makes that per-call scope explicit without treating the call as part of the artifact.
    locator: Context engineering in agents > Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-artifact-007
    source: lit-agent-agemem
    supports: Agentic Memory distinguishes retrieval and summarization actions over memory state. source_refs preserves which inputs contributed to one prepared context artifact.
    locator: Paper > Section 3.1 Problem Formulation > LTM and STM memory-management tools
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-artifact-008
    source: lit-mech-compass
    supports: Stage-specific progress briefs must represent the context supplied to a reasoning stage. Moonweave fixes each revision so later audit does not observe rewritten input.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-artifact-009
    source: lit-agent-agemem
    supports: AgeMem treats short- and long-term memory management as agent actions over finite context, including retrieve, summarize, and discard. The pkg-v3 example instantiates Moonweave's narrower design choice to preserve the resulting call-ready information as a versioned artifact; the paper does not prescribe that class name.
    locator: Paper > Section 3.1 Problem Formulation > Table 1 LTM and STM memory-management tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-010
    source: lit-mech-compass
    supports: COMPASS separates context organization from tactical execution and maintains concise progress briefs for reasoning stages. The example's separately identified pkg-v3 is a Moonweave representation of such prepared context information, with explicit provenance added for auditability.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-011
    source: lit-agent-agemem
    supports: AgeMem distinguishes memory operations such as retrieval, summarization, and discard from the memory content they operate on. Moonweave applies the same activity-versus-information discipline and further distinguishes a complete context artifact from its internal slot.
    locator: Paper > Section 3.1 Problem Formulation > Table 1 LTM and STM memory-management tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-artifact-012
    source: lit-mech-compass
    supports: COMPASS identifies a Context Manager that produces concise progress briefs for reasoning stages. A position inside such a brief is not itself the brief; the slot-versus-artifact boundary in this case is Moonweave's explicit genus/differentia interpretation.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
