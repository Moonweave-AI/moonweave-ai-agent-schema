source_claims:
  - id: claim-context-artifact-cursor
    source: src-cursor-context
    supports: Assembled messages are information artifacts, not assembly activities.
    locator: Agent context
    evidence_kind: official
    confidence: high
  - id: claim-context-artifact-claude
    source: src-claude-code-context
    supports: Compaction output is a retained information artifact.
    locator: autoCompact
    evidence_kind: official
    confidence: high
  - id: claim-context-artifact-boundary
    source: src-memory-context-design
    supports: Artifacts are not activities.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-artifact-id
    source: src-memory-context-design
    supports: context_artifact_id identifies artifact lineages.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-artifact-revision
    source: src-memory-context-design
    supports: artifact_revision pins immutable content versions.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-artifact-digest
    source: src-memory-context-design
    supports: content_digest enables replay verification.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-artifact-consumer
    source: src-langchain-context-engineering
    supports: Model context is scoped to one model call consumer.
    locator: Model context
    evidence_kind: official
    confidence: high
  - id: claim-context-artifact-immutable
    source: src-memory-context-design
    supports: Revisions are immutable after consumption.
    locator: constraints
    evidence_kind: design-inference
    confidence: high
