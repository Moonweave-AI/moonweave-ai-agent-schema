schema: moonweave.ai/ontology-node/v1
id: ContextArtifact
kind: concept
status: review
labels:
  zh: 上下文产物
  en: context artifact
  ja: コンテキスト情報成果物
semantics:
  short_definition:
    zh: 为一次模型调用或智能体步骤准备、保存或派生的版本化上下文信息产物。
    en: A versioned context information artifact prepared, retained, or derived for a model call or agent step.
    ja: モデル呼出しまたはエージェント段階のために準備・保持・派生された版管理付きコンテキスト情報成果物です。
  definition:
    zh: 上下文产物是一种信息产物；其种差是：内容或结构已被准备、保存或派生，用于某次模型调用或智能体步骤，并可携带版本、来源与消费者关联。ContextPackage、ContextWindow 与 ContextSummary 属于该类；ContextSlot 是窗口组成部分，ContextSource 是来源引用，ContextAssembly 是活动，均不因相关而成为其子类。
    en: A context artifact is an information artifact. Its differentia is that its content or structure has been prepared, retained, or derived for a model call or agent step and may carry version, provenance, and consumer links. ContextPackage, ContextWindow, and ContextSummary are subtypes; ContextSlot is a window component, ContextSource is a source reference, and ContextAssembly is an activity, so none becomes a subtype merely by association.
    ja: コンテキスト成果物は情報成果物の一種です。種差は、内容または構造がモデル呼出し・エージェント段階のために準備、保持、派生され、版・来歴・消費者関連を持ち得ることです。ContextPackage・ContextWindow・ContextSummary は下位型ですが、ContextSlot は窓構成要素、ContextSource は出典参照、ContextAssembly は活動であり、関連だけで下位型にはなりません。
  why_needed:
    zh: 该上位概念统一包、窗口和摘要的版本与来源语义，同时避免把槽位、来源、规则和活动硬塞进同一分类层。
    en: This genus unifies version and provenance semantics for packages, windows, and summaries while keeping slots, sources, rules, and activities out of the same taxonomic layer.
    ja: パッケージ・窓・要約の版と来歴の意味を統一しつつ、スロット・出典・規則・活動を同じ分類層へ混在させません。
  includes:
    - zh: 纳入具有明确内容或结构、版本或摘要身份、来源关联，并为具体调用或步骤准备的 ContextPackage、ContextWindow 和 ContextSummary。
      en: Includes ContextPackages, ContextWindows, and ContextSummaries with explicit content or structure, version or summary identity, provenance, and a concrete call or step consumer.
      ja: 明示内容・構造、版または要約同一性、来歴、具体的な呼出し・段階の消費者を持つ ContextPackage、ContextWindow、ContextSummary を含みます。
  excludes:
    - zh: 排除 ContextSlot、ContextSource、ContextRule、ContextBudget、ContextAssembly 与 ContextRefreshEvent；它们分别是组件、引用、规范、约束、活动或事件。
      en: Excludes ContextSlot, ContextSource, ContextRule, ContextBudget, ContextAssembly, and ContextRefreshEvent because they are respectively components, references, specifications, constraints, activities, or events.
      ja: ContextSlot、ContextSource、ContextRule、ContextBudget、ContextAssembly、ContextRefreshEvent はそれぞれ構成要素・参照・仕様・制約・活動・イベントなので除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - context_artifact_id
    - artifact_revision
  fields:
    - id: context_artifact_id
      labels:
        zh: 上下文产物标识
        en: context-artifact ID
        ja: context artifact ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一上下文产物系列，而不标识组装活动。
        en: Stably identifies a context-artifact lineage across revisions without identifying its assembly activity.
        ja: assembly activity ではなく revision をまたぐ同一 context-artifact 系列を安定識別します。
      allowed_values: []
      pattern: null
      example_value: pkg
      source_claims:
        - claim-context-artifact-003
    - id: artifact_revision
      labels:
        zh: 产物修订版
        en: artifact revision
        ja: artifact revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该上下文产物系列中内容不可变的一版。
        en: Identifies one content-immutable revision within the context-artifact lineage.
        ja: context-artifact 系列内の内容不変 revision を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-context-artifact-004
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该版本的有序内容与关键元数据计算的完整性摘要。
        en: An integrity digest computed over the ordered content and material metadata of this version.
        ja: この版の順序付き内容と重要メタデータから計算した完全性ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:4c2f...
      source_claims:
        - claim-context-artifact-005
    - id: consumer_ref
      labels:
        zh: 消费者引用
        en: consumer reference
        ja: consumer 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向使用该上下文产物的具体模型调用或智能体步骤。
        en: References the concrete model call or agent step for which the context artifact was prepared.
        ja: context artifact が準備された具体 model call または agent step を参照します。
      allowed_values: []
      pattern: null
      example_value: call-88
      source_claims:
        - claim-context-artifact-006
    - id: source_refs
      labels:
        zh: 来源引用集合
        en: source references
        ja: 出典参照集合
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出对该产物内容有实质贡献的输入消息、记忆、检索结果或工具结果。
        en: Lists the messages, memories, retrieval results, or tool results that materially contributed content.
        ja: 内容へ実質寄与した message・memory・retrieval result・tool result を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - message:system-1
        - memory:project-architecture-v2
      source_claims:
        - claim-context-artifact-007
  constraints:
    - id: context-artifact-revision-is-immutable
      severity: error
      expression_language: plain
      expression: context_artifact_id + artifact_revision fixes content_digest, consumer_ref, and source_refs
      explanations:
        zh: 同一产物修订版不得在调用后改写内容、消费者或来源；变化必须产生新修订版。
        en: A context-artifact revision cannot rewrite content, consumer, or provenance after use; a change creates a new revision.
        ja: 使用後に同一 artifact revision の内容・consumer・来歴を書き換えず、変更は新 revision を作ります。
      source_claims:
        - claim-context-artifact-008
  required_relation_constraints: []
examples:
  - id: ContextArtifact-example-positive-001
    kind: positive
    labels:
      zh: 上下文产物正例
      en: Positive example of context artifact
      ja: コンテキスト情報成果物の正例
    scenario_id: null
    descriptions:
      zh: 组装运行 ctx-run-42 生成 ContextPackage pkg-v3，并保存其版本、消费者调用 call-88 与来源集合；该包作为可独立追溯的信息产物归入 ContextArtifact。
      en: Assembly run ctx-run-42 produces ContextPackage pkg-v3 and records its version, consumer call-88, and provenance set; the package is classified as a ContextArtifact because it is independently traceable information prepared for that call.
      ja: 組立実行 ctx-run-42 は ContextPackage pkg-v3 を生成し、版、消費者呼出し call-88、来歴集合を記録します。このパッケージは呼出し向けに準備された独立追跡可能な情報なので ContextArtifact に分類されます。
    field_values:
      context_artifact_id: pkg
      artifact_revision: "3"
      content_digest: sha256:4c2f...
      consumer_ref: call-88
      source_refs:
        - message:system-1
        - memory:project-architecture-v2
    related_node_ids:
      - ContextArtifact
      - ContextSummary
    related_relation_ids:
      - ContextSummary-is_a-ContextArtifact
    expected_result:
      zh: 验证器接受 pkg-v3 为 ContextArtifact，并要求保留版本、来源和消费者关联；其具体类型仍为 ContextPackage。
      en: Validation accepts pkg-v3 as a ContextArtifact while requiring its version, provenance, and consumer link; its more specific type remains ContextPackage.
      ja: 検証器は pkg-v3 を ContextArtifact として受理し、版・来歴・消費者関連を要求します。より具体的な型は ContextPackage のままです。
    why_valid_or_invalid:
      zh: 该对象满足种差：它是为具体调用准备且可按版本和来源追溯的信息产物；组装运行本身并未被误判为产物。
      en: "The object satisfies the differentia: it is information prepared for a concrete call and traceable by version and provenance; the assembly run itself is not misclassified as an artifact."
      ja: この対象は、具体的呼出し向けに準備され版と来歴で追跡できる情報という種差を満たします。組立実行自体は成果物に誤分類されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-artifact-009
      - claim-context-artifact-010
  - id: ContextArtifact-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文产物边界例
      en: Boundary case for context artifact
      ja: コンテキスト情報成果物の境界例
    scenario_id: null
    descriptions:
      zh: ContextSlot slot-system 仅表示窗口中的系统指令位置；它有来源和顺序，但没有独立的包、窗口或摘要版本，因此不能仅因位于 ContextWindow 内就归为 ContextArtifact。
      en: ContextSlot slot-system denotes only the system-instruction position in a window. It has provenance and order but no independent package, window, or summary version, so containment in a ContextWindow does not make it a ContextArtifact.
      ja: ContextSlot slot-system は窓内のシステム指示位置だけを表します。来歴と順序はありますが、独立したパッケージ・窓・要約版を持たないため、ContextWindow に含まれるだけでは ContextArtifact になりません。
    field_values: {}
    related_node_ids:
      - ContextArtifact
      - ContextSummary
    related_relation_ids:
      - ContextSummary-is_a-ContextArtifact
    expected_result:
      zh: 验证器拒绝把 slot-system 归为 ContextArtifact，并保留其 ContextSlot 类型和组成关系。
      en: Validation rejects ContextArtifact membership for slot-system and preserves its ContextSlot type and composition relation.
      ja: 検証器は slot-system の ContextArtifact 所属を拒否し、ContextSlot 型と構成関係を保持します。
    why_valid_or_invalid:
      zh: 槽位是产物内部的可定位组成部分，而不是已准备或派生出的完整上下文信息产物；来源字段不能替代产物身份。
      en: A slot is a locatable component inside an artifact, not a complete prepared or derived context-information artifact; provenance fields do not substitute for artifact identity.
      ja: スロットは成果物内の位置特定可能な構成要素であり、準備・派生済みの完全なコンテキスト情報成果物ではありません。来歴項目は成果物同一性の代替になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-artifact-011
      - claim-context-artifact-012
external_mappings: []
