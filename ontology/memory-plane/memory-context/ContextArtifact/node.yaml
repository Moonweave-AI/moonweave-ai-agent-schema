schema: moonweave.ai/ontology-node/v1
id: ContextArtifact
kind: concept
labels:
  zh: 上下文产物
  en: Context artifact
  ja: コンテキスト情報成果物
semantics:
  short_definition:
    zh: 为一次模型调用准备或派生的版本化上下文信息根类。
    en: Root class for versioned context information prepared or derived for one model call.
    ja: 一回のモデル呼び出し向けに準備・派生された版管理コンテキスト情報の root class。
  definition:
    zh: ContextArtifact 是上下文域信息对象根：ContextPackage、ContextWindow、ContextSummary、ContextExclusion 为直接子类；ContextSlot、ContextSourceRole 作为窗口组成展开。它不是 ContextAssemblyActivity、RetrievalResult 内部字段，也不是 ContextRule 规范本身。
    en: ContextArtifact is the root for context-domain information objects. ContextPackage, ContextWindow, ContextSummary, and ContextExclusion are direct subtypes; ContextSlot and ContextSourceRole expand as window components. It is not ContextAssemblyActivity, RetrievalResult internals, or a ContextRule specification.
    ja: ContextArtifact は context domain information root。ContextPackage/ContextWindow/ContextSummary/ContextExclusion が direct subtype。ContextSlot/ContextSourceRole は window component。ContextAssemblyActivity/RetrievalResult 内部/ContextRule ではない。
  why_needed:
    zh: 把“组装活动”和“调用输入包/窗口/摘要/排除记录”分成两棵树，避免把 Cursor 发送的 messages 参数误当作一次 ContextAssembly。
    en: Separating assembly activities from call-input packages, windows, summaries, and exclusion records prevents treating Cursor's messages payload as a ContextAssembly.
    ja: assembly activity と call-input package/window/summary/exclusion record を二 tree に分離し Cursor messages payload を ContextAssembly と誤認しない。
  includes:
    - zh: 纳入有稳定 artifact_id、内容摘要、消费者引用，且由组装或压缩产生的信息对象。
      en: Includes information objects with stable artifact_id, content digest, consumer reference, produced by assembly or compaction.
      ja: stable artifact_id/content digest/consumer reference を持ち assembly/compaction が produce する information object。
  excludes:
    - zh: 排除 ContextAssemblyActivity、ContextRule、ContextBudget、ContextSlot 与原始 RetrievedChunk。
      en: Excludes ContextAssemblyActivity, ContextRule, ContextBudget, ContextSlot, and raw RetrievedChunk.
      ja: ContextAssemblyActivity/ContextRule/ContextBudget/ContextSlot/raw RetrievedChunk を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor 最终 messages 数组、Claude Code /context 视图中的 token 分类、Pichay L1 窗口快照、Context Recycling L0–L1 工作区均映射为 ContextArtifact 子类型，而非活动。
    en: Cursor's final messages array, Claude Code /context token breakdown, Pichay L1 window snapshots, and Context Recycling L0–L1 workspace map to ContextArtifact subtypes, not activities.
    ja: Cursor final messages/Claude /context token breakdown/Pichay L1 window/Context Recycling L0–L1 workspace は ContextArtifact subtype に写像し activity ではない。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Assembled @ references, recent files, and semantic hits as call input.
    - name: Claude Code Context Window
      url: https://code.claude.com/docs/en/context-window
      description: /context breakdown of system, tools, messages, and rules.
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Per-call model context as transient information artifact.
structure:
  identity_keys:
    - context_artifact_id
    - artifact_revision
  fields:
    - id: context_artifact_id
      labels:
        zh: 上下文产物标识
        en: Context artifact identifier
        ja: context artifact 識別子
      definitions:
        zh: 跨修订稳定标识同一上下文产物系列。
        en: Stably identifies one context-artifact lineage across revisions.
        ja: revision をまたぐ同一 context-artifact 系列を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: package-204
      allowed_values: []
      source_claims:
        - claim-context-artifact-id
    - id: artifact_revision
      labels:
        zh: 产物修订版
        en: Artifact revision
        ja: artifact revision
      definitions:
        zh: 标识该系列中内容不可变的一版；压缩或刷新后必须递增。
        en: Identifies one content-immutable revision; must increment after compaction or refresh.
        ja: 内容不変 revision を識別。compaction/refresh 後は増分必須。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "3"
      allowed_values: []
      source_claims:
        - claim-context-artifact-revision
    - id: content_digest
      labels:
        zh: 内容摘要
        en: Content digest
        ja: 内容ダイジェスト
      definitions:
        zh: 对该版本有序内容与关键元数据计算的 SHA-256 完整性摘要。
        en: SHA-256 integrity digest over ordered content and material metadata of this revision.
        ja: この revision の ordered content/material metadata の SHA-256 完全性ダイジェスト。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha256:355247694ba49e2a
      allowed_values: []
      source_claims:
        - claim-context-artifact-digest
    - id: consumer_ref
      labels:
        zh: 消费者引用
        en: Consumer reference
        ja: consumer 参照
      definitions:
        zh: 指向使用该产物的具体模型调用或 RunAttempt。
        en: References the concrete model call or RunAttempt consuming this artifact.
        ja: この artifact を consume する具体 model call/RunAttempt を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: call-88
      allowed_values: []
      source_claims:
        - claim-context-artifact-consumer
  constraints:
    - id: context-artifact-revision-immutable
      severity: error
      expression_language: plain
      expression: context_artifact_id + artifact_revision fixes content_digest and consumer_ref after use
      explanation:
        zh: 同一修订版不得在调用后改写内容或消费者；变化必须产生新修订版。
        en: A revision cannot rewrite content or consumer after use; changes create a new revision.
        ja: 使用後に同一 revision の content/consumer を書き換えず変更は新 revision。
      source_claims:
        - claim-context-artifact-immutable
  required_relations: []
examples:
  - id: ContextArtifact-example-cursor-package
    labels:
      zh: Cursor 组装包产物
      en: Cursor assembled package artifact
      ja: Cursor 組立 package artifact
    descriptions:
      zh: Cursor Agent 在模型调用前将 @ 引用文件、recent files 与 semantic search 命中组装为 messages；该不可变输入包映射为 ContextPackage（ContextArtifact 子类），assembly_id 与 package_id 分离。
      en: Cursor Agent assembles @ references, recent files, and semantic hits into messages before a model call; that immutable input envelope maps to ContextPackage (ContextArtifact subtype) with assembly_id separate from package_id.
      ja: Cursor Agent が @ 参照/recent files/semantic hits を messages に組立。immutable input envelope は ContextPackage（ContextArtifact subtype）に写像し assembly_id と package_id は分離。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: Agent context assembly
    field_values:
      context_artifact_id: package-204
      artifact_revision: "2"
      content_digest: sha256:355247694ba49e2a
      consumer_ref: call-204
    related_node_ids:
      - ContextArtifact
      - ContextPackage
    related_relation_ids: []
    source_claims:
      - claim-context-artifact-cursor
  - id: ContextArtifact-example-claude-summary
    labels:
      zh: Claude 压缩摘要产物
      en: Claude compaction summary artifact
      ja: Claude compaction summary artifact
    descriptions:
      zh: Claude Code autoCompact 在窗口约 95% 时将 compact_boundary 之前的历史 summarization 为一条 ContextSummary，保留 CLAUDE.md；summary 是 ContextArtifact 而非 ContextAssembly。
      en: Claude Code autoCompact summarizes history before compact_boundary near ~95% window usage into a ContextSummary while preserving CLAUDE.md; the summary is a ContextArtifact, not ContextAssembly.
      ja: Claude Code autoCompact が compact_boundary 前履歴を ContextSummary に要約（約 95% 閾値）。summary は ContextArtifact で ContextAssembly ではない。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact
    field_values:
      context_artifact_id: summary-v6
      artifact_revision: "1"
      consumer_ref: call-88
    related_node_ids:
      - ContextArtifact
      - ContextSummary
    related_relation_ids: []
    source_claims:
      - claim-context-artifact-claude
  - id: ContextArtifact-example-not-activity
    labels:
      zh: 产物非活动
      en: Artifact is not activity
      ja: artifact は activity ではない
    descriptions:
      zh: assembly-204 正在执行选择/排序/裁剪；package-204@v2 是已形成的调用输入记录。活动与产物必须分开建模。
      en: assembly-204 executes selection/ordering/trimming; package-204@v2 is the formed call-input record. Activities and artifacts must stay separate.
      ja: assembly-204 は selection/ordering/trimming 実行中。package-204@v2 は形成済み call-input record。activity/artifact は分離モデル化。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextArtifact
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-artifact-boundary
parent_relation: null
relations: []
