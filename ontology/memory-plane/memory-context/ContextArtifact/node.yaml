schema: moonweave.ai/ontology-node/v1
id: ContextArtifact
kind: concept
status: accepted
labels:
  zh: 上下文工件
  en: Context artifact
  ja: コンテキスト工件
semantics:
  short_definition:
    zh: 为模型调用而表示、追踪或控制可见输入的具名数据工件。
    en: A named data artifact that represents, traces, or controls visible input for a model call.
    ja: モデル呼び出しの可視入力を表現、追跡、または制御する名前付きデータ工件です。
  definition:
    zh: >
      ContextArtifact 是与上下文装配有关、可独立标识的数据实体。它可以表示候选或已选内容、一个有界窗口、一个已生成的摘要、一组排除决定，或待调用的打包输入。它记录的是内容在某一调用可见性流程中的表示，而不是内容的唯一业务事实。Conversation History、PromptTemplateInstance 和 MemoryRecord 可成为工件的来源或被物化为其中的项，但它们不因存在就成为 ContextArtifact；反之，ContextArtifact 也不意味着内容已发送给模型。ContextPackage、ContextSummary、ContextWindow 和 ContextExclusion 是此概念的专门化。
    en: >
      A ContextArtifact is an independently identifiable data entity used by context assembly. It can represent candidate or selected material, a bounded window, a generated summary, a set of exclusion decisions, or packaged input awaiting a call. It records a representation of content in one call's visibility workflow, not the content's sole business fact. Conversation History, a PromptTemplateInstance, and a MemoryRecord may source or be materialized into an artifact, but do not become one merely by existing; conversely, an artifact does not prove that its content was sent to a model. ContextPackage, ContextSummary, ContextWindow, and ContextExclusion specialize this concept.
    ja: >
      ContextArtifact はコンテキスト組立に用いる、独立して識別可能なデータ実体です。候補または選択済み材料、有界ウィンドウ、生成済み要約、除外決定の集合、呼び出し待ちのパッケージ入力を表現できます。これは一回の可視性ワークフローにおける内容の表現であり、内容そのものの唯一の業務事実ではありません。Conversation History、PromptTemplateInstance、MemoryRecord は工件の情報源または項目として物化され得ますが、存在するだけで工件になるわけではありません。反対に工件があっても、内容がモデルへ送信済みとは限りません。ContextPackage、ContextSummary、ContextWindow、ContextExclusion はこの概念を特化します。
  why_needed:
    zh: 可见性、来源、预算和压缩决策需要附着在可审计的表示上，不能散落在原始会话、存储记录和模型调用日志之间。
    en: Visibility, provenance, budget, and compression decisions need an auditable representation instead of being scattered across raw sessions, stored records, and model-call logs.
    ja: 可視性、来歴、予算、圧縮の判断は、元会話、保存記録、モデル呼び出しログに分散させず、監査可能な表現に結び付ける必要があります。
  includes:
    - zh: 待发送的上下文包、窗口视图、生成摘要和明确的排除决定。
      en: A pending context package, a window view, a generated summary, and explicit exclusion decisions.
      ja: 送信待ちのコンテキストパッケージ、ウィンドウ表示、生成要約、明示的な除外決定。
  excludes:
    - zh: 未经表示或选择的完整存储命名空间、模型隐藏推理和模型生成的最终回答。
      en: A complete unrepresented storage namespace, hidden model reasoning, and the model's final generated answer.
      ja: 表現・選択されていない完全なストレージ名前空間、モデルの非公開推論、モデルの最終生成回答。
  semantic_kind: entity
  aliases:
    - context representation
    - visible-input artifact
engineering:
  explanation:
    zh: >
      工程上可把它实现为上下文装配状态中的有身份条目：保留来源引用、token 估计、适用调用范围和表示类型，再由装配活动把它转换为 API 消息。LangGraph 文档将运行时状态描述为可包含消息历史、文件、检索文档和工具输出的数据；本体在该运行时数据之上增加可见性与来源边界，而不把状态容器本身误写成模型输入。
    en: >
      In engineering terms, implement it as an identified entry in assembly state with source references, a token estimate, a call scope, and a representation kind, then let an assembly activity convert it to API messages. LangGraph documents runtime state that can hold message history, files, retrieved documents, and tool outputs. This ontology adds visibility and provenance boundaries above that state rather than mistaking the state container for model input.
    ja: >
      実装では、情報源参照、トークン見積り、呼び出し範囲、表現種別を持つ組立状態内の識別済み項目として扱い、組立活動が API メッセージに変換します。LangGraph はメッセージ履歴、ファイル、検索文書、ツール出力を含み得る実行時状態を文書化しています。本体はその状態の上に可視性と来歴の境界を追加し、状態コンテナ自体をモデル入力と取り違えません。
  typical_input:
    - description: LangGraph state material from which an artifact is represented before invocation.
      format: |
        candidate = {
            "artifact_id": "ctx-art-ticket-42",
            "source_refs": ["record:ticket-42", "message:thread-9:18"],
            "representation_kind": "selected_text",
            "estimated_tokens": 184,
        }
        state["context_candidates"].append(candidate)
  typical_output:
    - description: A traceable selected item later rendered into an API message.
      format: |
        {
          "artifact_id": "ctx-art-ticket-42",
          "call_scope_id": "call-support-20260719-01",
          "representation_kind": "selected_text",
          "source_refs": ["record:ticket-42"],
          "estimated_tokens": 184
        }
  reference_implementations:
    - name: LangChain context overview
      url: https://docs.langchain.com/oss/python/concepts/context
      description: Describes runtime context as mutable run data including conversation history, intermediate results, and tool or LLM outputs.
    - name: LangGraph memory guide
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents thread state and transformations of messages before a model call.
  source_claims:
    - claim-context-artifact-runtime-material
    - claim-context-artifact-visible-boundary
structure:
  identity_keys:
    - artifact_id
  fields:
    - id: artifact_id
      labels:
        zh: 工件标识
        en: artifact ID
        ja: 工件 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 为一次可追溯的上下文表示分配的稳定标识，不复用为原始消息、提示词实例或记忆记录的身份。
        en: A stable identifier for one traceable context representation, not reused as the identity of its raw message, prompt instance, or memory record.
        ja: 一つの追跡可能なコンテキスト表現の安定識別子であり、元メッセージ、プロンプトインスタンス、記憶記録の ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: ctx-art-ticket-42
      source_claims:
        - claim-context-artifact-visible-boundary
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识工件服务的具体模型调用或其可重放的装配范围，防止把一次调用的可见性泛化为所有会话。
        en: Identifies the concrete model call or replayable assembly scope served by the artifact, preventing one call's visibility from being generalized to every session.
        ja: 工件が対象とする具体的なモデル呼び出しまたは再生可能な組立範囲を識別し、一回の可視性を全セッションへ一般化することを防ぎます。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-artifact-visible-boundary
    - id: representation_kind
      labels:
        zh: 表示类型
        en: representation kind
        ja: 表現種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该工件是选定文本、消息片段、摘要、窗口、包还是排除决定，而不是用一个未说明的“context”标签掩盖边界。
        en: States whether the artifact is selected text, a message segment, a summary, a window, a package, or an exclusion decision rather than hiding its boundary behind an unspecified “context” label.
        ja: 選択テキスト、メッセージ断片、要約、ウィンドウ、パッケージ、除外決定のいずれかを示し、未指定の「context」ラベルで境界を隠しません。
      allowed_values:
        - selected_text
        - message_segment
        - summary
        - window
        - package
        - exclusion
      pattern: null
      example_value: selected_text
      source_claims:
        - claim-context-artifact-runtime-material
    - id: source_refs
      labels:
        zh: 来源引用
        en: source references
        ja: 情報源参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出被物化、摘要、选择或排除的精确消息、提示词实例、记忆记录、文档或工具结果；相似但未使用的材料不应出现。
        en: Lists exact messages, prompt instances, memory records, documents, or tool results that were materialized, summarized, selected, or excluded; similar but unused material must not appear.
        ja: 物化、要約、選択、除外された正確なメッセージ、プロンプトインスタンス、記憶記録、文書、ツール結果を列挙します。類似していても未使用の材料は含めません。
      allowed_values: []
      pattern: '^(message|prompt|record|document|tool-result):[A-Za-z0-9._:-]+$'
      example_value:
        - record:ticket-42
      source_claims:
        - claim-context-artifact-runtime-material
  constraints:
    - id: context-artifact-has-call-scope-and-source
      severity: error
      expression_language: plain
      expression: Every ContextArtifact must identify its call_scope_id, representation_kind, and at least one exact source reference; a free-floating text copy cannot establish a context artifact.
      explanation:
        zh: 上下文工件是受范围约束的可追溯表示，不是任意字符串或无身份的调试缓存。
        en: A context artifact is a scoped, traceable representation, not an arbitrary string or unidentified debug cache.
        ja: コンテキスト工件は範囲付きで追跡可能な表現であり、任意の文字列や識別不能なデバッグキャッシュではありません。
      source_claims:
        - claim-context-artifact-visible-boundary
    - id: context-artifact-does-not-prove-model-delivery
      severity: warning
      expression_language: plain
      expression: Existence of a ContextArtifact does not assert that the model received it; only a completed ContextPackage or invocation audit may assert final visible delivery.
      explanation:
        zh: 候选、草稿窗口和排除决定都可以在调用前存在，不能以工件存在替代模型调用事实。
        en: Candidates, draft windows, and exclusion decisions can exist before a call, so artifact existence cannot substitute for a model-invocation fact.
        ja: 候補、下書きウィンドウ、除外決定は呼び出し前にも存在するため、工件の存在はモデル呼び出し事実の代わりになりません。
      source_claims:
        - claim-context-artifact-visible-boundary
examples:
  - id: context-artifact-example-positive-selected-billing-fact

    labels:
      zh: 选定的账单事实工件
      en: Selected billing-fact artifact
      ja: 選択済み請求事実工件

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      artifact_id: ctx-art-ticket-42
      call_scope_id: call-support-20260719-01
      representation_kind: selected_text
      source_refs:
        - record:ticket-42
    related_node_ids:
      - ContextArtifact
      - MemoryRecord
    related_relation_ids: []

    source_claims:
      - claim-context-artifact-runtime-material
  - id: context-artifact-example-counterexample-raw-store

    labels:
      zh: 将整个记忆命名空间当作工件
      en: Treat a whole memory namespace as an artifact
      ja: 記憶名前空間全体を工件として扱う

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      artifact_id: ctx-art-unbounded-store
      call_scope_id: call-support-20260719-01
      representation_kind: selected_text
      source_refs:
        - record:namespace-placeholder
    related_node_ids:
      - ContextArtifact
      - MemoryRecord
    related_relation_ids: []

    source_claims:
      - claim-context-artifact-visible-boundary
  - id: context-artifact-example-boundary-draft-summary

    labels:
      zh: 调用前的草稿摘要工件
      en: Draft summary artifact before a call
      ja: 呼び出し前の下書き要約工件

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      artifact_id: ctx-art-summary-draft-7
      call_scope_id: call-support-20260719-02
      representation_kind: summary
      source_refs:
        - message:thread-9:1
        - message:thread-9:17
    related_node_ids:
      - ContextArtifact
      - ContextSummary
      - MessageHistory
    related_relation_ids: []

    source_claims:
      - claim-context-artifact-visible-boundary
  - id: context-artifact-example-instance-langgraph-state-item

    labels:
      zh: 实例：LangGraph 状态中的候选项
      en: "Instance: candidate item in LangGraph state"
      ja: 実例：LangGraph 状態内の候補項目

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      artifact_id: ctx-art-doc-17
      call_scope_id: call-support-20260719-03
      representation_kind: selected_text
      source_refs:
        - document:billing-policy-17
    related_node_ids:
      - ContextArtifact
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-artifact-runtime-material
parent_relation: null
relations: []
sources:
  - id: langchain-context-overview
    title: LangChain context overview
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/concepts/context
    relevance: Describes dynamic runtime context and cross-conversation persistent context as distinct data scopes.
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents thread state and transformations of message history before a model invocation.
source_claims:
  - id: claim-context-artifact-runtime-material
    source: langchain-context-overview
    supports: LangChain describes dynamic runtime context as mutable data during a run, including conversation history, intermediate results, and tool or LLM outputs. Moonweave represents selected or controlled portions of such data as named ContextArtifact entities instead of treating every runtime datum as visible input.
    locator: "Context overview: dynamic runtime context"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-artifact-visible-boundary
    source: langgraph-memory
    supports: LangGraph documents transformations that trim, delete, or summarize thread messages before model use. Moonweave uses a call-scoped ContextArtifact to distinguish a represented candidate or draft from stored history and from final model delivery.
    locator: "Memory guide: Manage short-term memory and conversation-history trimming"
    evidence_kind: ontology-design-inference
    confidence: high