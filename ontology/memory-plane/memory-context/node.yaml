    zh: 本模块从发现或检索模块引用候选及其分数，从来源模块引用出处；消息、运行主体或输出披露需要指出实际使用的输入时，只引用已确定成员的 ContextPackage 版本。
    en: Messages, runtime actors, or output disclosure references ContextPackage or a version when identifying the context actually used without changing its members.
    ja: メッセージ、実行主体、出力開示がメンバーを変えず実際に使用したコンテキストを示すとき、ContextPackage または版を参照します。
