schema: moonweave.ai/ontology-node/v1
id: memory-context
kind: module
status: accepted
labels:
  zh: 模型调用上下文
  en: Model-call context
  ja: モデル呼び出しコンテキスト
semantics:
  short_definition:
    zh: 为一次模型调用选择、压缩、排序并传递可见输入的模块。
    en: A module that selects, compresses, orders, and delivers the visible input for one model invocation.
    ja: 一回のモデル呼び出しに見せる入力を選択、圧縮、順序付け、送達するモジュールです。
  definition:
    zh: >
      本模块把“上下文”限定为一次具体模型调用实际可见的、有序输入集合及其装配过程，而不是系统中所有可用信息。候选材料可来自 Conversation History、当前运行状态、PromptTemplateInstance、MemoryRecord、检索文档和工具结果；它们只有在被选择、表示并放入 ContextPackage 后才成为该次调用的上下文。Context Window 是模型或提供方施加的输入容量上限及其项目预算，不是内容工件；Conversation History 是按时间保存的消息状态，不保证完整可见；PromptTemplateInstance 是可被纳入的指令材料，不等同于整个上下文；MemoryRecord 是跨调用持久化的记录，必须经过选择和物化才会出现在调用中。Context Compression 是在预算压力下把候选内容变成较小表示的操作；ContextSummary 是其可读产物之一，允许丢失细节，既不自动等同于原始历史，也不自动写回为 MemoryRecord。
    en: >
      This module limits context to the ordered input actually visible to one concrete model invocation and to the process that assembles it, not to every item available to a system. Candidate material may come from Conversation History, run state, a PromptTemplateInstance, MemoryRecord, retrieved documents, or tool results; it becomes call context only when selected, represented, and placed in a ContextPackage. A Context Window is a model- or provider-imposed input-capacity limit and project budget, not a content artifact. Conversation History is chronological stored message state and is not guaranteed to be wholly visible. A PromptTemplateInstance is instruction material that may be included, not the complete context. A MemoryRecord is persistent across calls and reaches a call only through selection and materialization. Context Compression transforms candidates into a smaller representation under budget pressure. A ContextSummary is one readable compression output: it may lose detail, is neither automatically the raw history nor automatically a MemoryRecord write.
    ja: >
      このモジュールでいうコンテキストは、一つの具体的なモデル呼び出しに実際に見える順序付き入力と、その組み立て過程です。システム内の全情報を意味しません。候補は Conversation History、実行状態、PromptTemplateInstance、MemoryRecord、検索文書、ツール結果から来ますが、選択され ContextPackage に表現・配置されて初めて呼び出しのコンテキストになります。Context Window はモデルまたはプロバイダーによる入力容量上限とプロジェクト予算であり、内容工件ではありません。Conversation History は時系列に保存されたメッセージ状態で、全体が可視とは限りません。PromptTemplateInstance は含められる指示材料であり、コンテキスト全体ではありません。MemoryRecord は呼び出しをまたいで持続し、選択と物化を経て初めて呼び出しに入ります。Context Compression は予算制約下で候補を小さな表現に変換し、ContextSummary はその読みやすい出力の一つです。要約は詳細を失うことがあり、原履歴や MemoryRecord への書き込みと自動的に同一にはなりません。
  why_needed:
    zh: >
      正确的检索或记忆存储并不能保证模型会看到正确内容。调用前必须明确可见范围、输出预留、来源优先级和压缩损失，才能在有限窗口中保留治理指令、当前请求和可追溯证据，并避免把持久记忆、完整会话或生成摘要误当成同一对象。
    en: >
      Correct retrieval or storage does not ensure that a model sees the right material. A call needs an explicit visible scope, output reserve, source priority, and account of compression loss so that governing instructions, the current request, and traceable evidence survive a finite window without conflating persistent memory, a complete session, and a generated summary.
    ja: >
      正しい検索や保存だけでは、モデルが正しい材料を見る保証になりません。有限のウィンドウで統治指示、現在の要求、追跡可能な根拠を残すには、可視範囲、出力予約、情報源の優先順位、圧縮による損失を明示する必要があります。これにより、永続記憶、完全な会話、生成要約を同一視しません。
  includes:
    - zh: 为单次调用分配输入预算和输出预留，并选择模型实际可见的内容。
      en: Allocating an input budget and output reserve for one call, then selecting what the model will actually see.
      ja: 一回の呼び出しの入力予算と出力予約を配分し、モデルに実際に見せる内容を選ぶこと。
    - zh: 对消息历史进行裁剪、删除、摘要或其他有损压缩，并记录其边界。
      en: Trimming, deleting, summarizing, or otherwise lossily compressing message history while recording the boundary.
      ja: 境界を記録しながら、メッセージ履歴をトリミング、削除、要約、または他の不可逆圧縮すること。
    - zh: 将指令、选定记忆、检索证据和工具结果排序为模型 API 可接收的消息或输入。
      en: Ordering instructions, selected memory, retrieved evidence, and tool results into messages or input accepted by a model API.
      ja: 指示、選定記憶、検索根拠、ツール結果を、モデル API が受け取れるメッセージまたは入力に順序付けること。
  excludes:
    - zh: 候选检索、长期存储写入、模型推理或生成本身。
      en: Candidate retrieval, long-term-store writes, and model inference or generation itself.
      ja: 候補検索、長期ストアへの書き込み、モデル推論または生成そのもの。
    - zh: 将摘要自动提升为持久 MemoryRecord，或假定压缩对原始内容无损。
      en: Automatically promoting a summary to a persistent MemoryRecord or assuming compression is lossless.
      ja: 要約を自動的に永続 MemoryRecord へ昇格すること、または圧縮が無損失だと仮定すること。
  semantic_kind: module
  aliases:
    - context engineering
    - visible-input assembly
engineering:
  explanation:
    zh: >
      实现通常先从模型限制减去输出预留，再保留必须的系统或开发者指令，按策略选取历史、记忆和检索材料，最后输出有序消息。LangGraph 可在调用前用 trim_messages 对 state["messages"] 做 token 预算裁剪；LangChain 的 SummarizationMiddleware 在接近阈值时保留近期消息并把较早文本压缩为摘要；Semantic Kernel 以 IChatHistoryReducer.ReduceAsync 统一截断或摘要归约；OpenAI Realtime 的 truncation 策略会在输入上限处处理最旧会话项。所有这些接口都说明“存有的历史”与“本次送入模型的输入”是不同边界。
    en: >
      An implementation normally subtracts an output reserve from the model limit, retains mandatory system or developer instructions, selects history, memory, and retrieval material by policy, then emits ordered messages. LangGraph can token-trim state["messages"] before invocation with trim_messages. LangChain's SummarizationMiddleware retains recent messages and compresses older text near a threshold. Semantic Kernel exposes truncation or summarization through IChatHistoryReducer.ReduceAsync. OpenAI Realtime applies its truncation policy when conversation input reaches its limit. These interfaces all separate stored history from the input sent on this call.
    ja: >
      実装では通常、モデル上限から出力予約を差し引き、必須の system または developer 指示を保持し、方針に従って履歴、記憶、検索材料を選び、順序付きメッセージを出力します。LangGraph では呼び出し前に trim_messages で state["messages"] をトークン裁断できます。LangChain の SummarizationMiddleware は閾値付近で最近のメッセージを残し、古いテキストを圧縮します。Semantic Kernel は IChatHistoryReducer.ReduceAsync で切り詰めまたは要約を提供し、OpenAI Realtime は会話入力が上限に達したとき truncation 方針を適用します。これらの API はいずれも、保存された履歴と今回送る入力を分離しています。
  typical_input:
    - description: LangGraph token-aware message trimming before a model invocation.
      format: |
        from langchain_core.messages.utils import count_tokens_approximately, trim_messages

        visible_messages = trim_messages(
            state["messages"],
            strategy="last",
            token_counter=count_tokens_approximately,
            max_tokens=7_168,
            start_on="human",
            end_on=("human", "tool"),
        )
        response = model.invoke(visible_messages)
    - description: Semantic Kernel reducer boundary for stored chat messages.
      format: |
        Task<ChatHistory?> ReduceAsync(
            IReadOnlyList<ChatMessageContent> chatHistory,
            CancellationToken cancellationToken = default);
  typical_output:
    - description: Ordered, budgeted model input rather than the complete thread history.
      format: |
        [
          {"role": "system", "content": "Follow the support policy."},
          {"role": "developer", "content": "Use cited account facts only."},
          {"role": "user", "content": "Earlier account facts: …"},
          {"role": "user", "content": "Can I change my billing cycle?"}
        ]
  reference_implementations:
    - name: LangGraph memory and conversation-history management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents token trimming, deletion, and summary replacement of thread messages before model use.
    - name: LangChain built-in context-editing middleware
      url: https://docs.langchain.com/oss/python/langchain/middleware/built-in
      description: Documents SummarizationMiddleware and the distinction between text summaries and multimodal payloads.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents IChatHistoryReducer, truncation reducers, summary reducers, and system-message preservation.
    - name: OpenAI Realtime API reference
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents truncation behavior when conversation input exceeds the model input limit and output-reserve considerations.
  source_claims:
    - claim-memory-context-history-boundary
    - claim-memory-context-compression-boundary
    - claim-memory-context-reducer-interface
    - claim-memory-context-window-limit
    - claim-memory-context-ordering
structure:
  identity_keys:
    - context_assembly_contract_id
  fields:
    - id: context_assembly_contract_id
      labels:
        zh: 上下文装配契约标识
        en: context assembly contract ID
        ja: コンテキスト組立契約 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一套可复用的可见性、预算和排序规则，而非某一次调用或完整会话。
        en: Identifies reusable visibility, budget, and ordering rules rather than one invocation or a complete session.
        ja: 一回の呼び出しや完全な会話ではなく、再利用可能な可視性、予算、順序付け規則を識別します。
      allowed_values: []
      pattern: '^context-assembly-[a-z0-9][a-z0-9-]*$'
      example_value: context-assembly-support-v1
      source_claims:
        - claim-memory-context-history-boundary
    - id: model_input_token_budget
      labels:
        zh: 模型可见输入预算
        en: model-visible input token budget
        ja: モデル可視入力トークン予算
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在输出预留之后，允许放入一次调用的最大输入 token 数；它小于或等于所选模型的可用输入容量。
        en: The maximum input tokens admitted to one invocation after output reservation; it is no greater than the selected model's usable input capacity.
        ja: 出力予約後に一回の呼び出しへ入れられる最大入力トークン数です。選択モデルの利用可能な入力容量を超えません。
      allowed_values: []
      pattern: null
      example_value: 7168
      source_claims:
        - claim-memory-context-window-limit
    - id: required_instruction_refs
      labels:
        zh: 必须保留的指令引用
        en: required instruction references
        ja: 必須指示参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出无论历史或检索候选如何变化都必须进入 ContextPackage 的已解析指令实例引用；它们不是整个提示词或整个会话的别名。
        en: Lists resolved instruction-instance references that must enter the ContextPackage regardless of changing history or retrieval candidates; it is not an alias for the whole prompt or whole session.
        ja: 履歴や検索候補の変動にかかわらず ContextPackage に入れなければならない解決済み指示インスタンス参照を列挙します。プロンプト全体や会話全体の別名ではありません。
      allowed_values: []
      pattern: '^prompt-[A-Za-z0-9._:-]+$'
      example_value:
        - prompt-support-policy-v3
      source_claims:
        - claim-memory-context-history-boundary
    - id: compression_policy
      labels:
        zh: 压缩策略
        en: compression policy
        ja: 圧縮方針
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明超出预算时是裁剪、删除、生成摘要，还是拒绝调用，并声明哪些材料不可被摘要替代。
        en: States whether over-budget material is trimmed, deleted, summarized, or causes rejection, and declares material that a summary may not replace.
        ja: 予算超過時に切り詰め、削除、要約、または呼び出し拒否のいずれを行うかと、要約で置換できない材料を宣言します。
      allowed_values:
        - trim_latest_window
        - summarize_then_trim
        - reject_over_budget
      pattern: null
      example_value: summarize_then_trim
      source_claims:
        - claim-memory-context-compression-boundary
  constraints:
    - id: memory-context-input-is-bounded-visible-subset
      severity: error
      expression_language: plain
      expression: The ContextPackage for one invocation must contain an ordered, budgeted selection or declared compressed representation of candidate material; a complete MessageHistory, Store namespace, or retrieval result set is not automatically visible input.
      explanation:
        zh: 保存范围和可见调用范围不同。装配结果必须能指出每项为何被纳入、摘要或排除，并满足 model_input_token_budget。
        en: Storage scope and call-visible scope differ. The assembled result must account for why each item was included, summarized, or excluded and must fit model_input_token_budget.
        ja: 保存範囲と呼び出し可視範囲は異なります。組立結果は各項目を含めた、要約した、または除外した理由を説明でき、model_input_token_budget に収まらなければなりません。
      source_claims:
        - claim-memory-context-history-boundary
        - claim-memory-context-window-limit
    - id: memory-context-summary-is-not-automatic-memory-write
      severity: error
      expression_language: plain
      expression: A ContextSummary may replace or supplement visible text for a call but must not be represented as lossless source history or as a persistent MemoryRecord unless a separate memory-write operation establishes that record and its provenance.
      explanation:
        zh: 摘要是调用输入的压缩工件；持久记忆写入需要独立的生命周期操作和来源，而不能因摘要存在而推断。
        en: A summary is a compressed call-input artifact. A persistent memory write needs a separate lifecycle operation and provenance; it cannot be inferred from the summary's existence.
        ja: 要約は呼び出し入力の圧縮工件です。永続記憶への書き込みには独立したライフサイクル操作と来歴が必要であり、要約が存在するだけでは推定できません。
      source_claims:
        - claim-memory-context-compression-boundary
        - claim-memory-context-reducer-interface
    - id: memory-context-ordering-is-explicit
      severity: warning
      expression_language: plain
      expression: When multiple eligible items compete for limited input, the assembly contract must record a deterministic source-priority or ordering rule; no claim is made that one universal position is optimal for every model or task.
      explanation:
        zh: 长上下文中的信息位置会影响使用效果，因此需要可审计的排序规则；研究结果不授权把某一位置写成普遍最优法则。
        en: Information position affects long-context use, so an auditable ordering rule is needed; research does not license treating one position as universally optimal.
        ja: 長いコンテキストでは情報位置が利用に影響するため、監査可能な順序付け規則が必要です。研究は、ある位置を全モデル・全タスクで最適とみなす根拠にはなりません。
      source_claims:
        - claim-memory-context-ordering
