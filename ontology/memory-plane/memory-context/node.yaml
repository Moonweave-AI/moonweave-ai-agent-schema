    zh: 当对象的身份取决于某次上下文组装、所产生的包版本、槽位成员与顺序、预算取舍、排除原因或为组装提供的可复用规范时，由本模块拥有。
    en: Own an object when its identity is determined by one context assembly, an admission event binding selected observations to a determinate package version, slot order, source selection, budget trimming, or immutable context version.
    ja: 対象の同一性が一回のコンテキスト組み立て、選択済み観測を特定 package 版へ結び付ける admission event、slot 順序、出典選択、予算裁断、または不変コンテキスト版で決まる場合に所有します。
