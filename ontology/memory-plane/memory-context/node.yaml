    expected_result:
      zh: 报告同一身份被原地覆盖、前序链断裂，以及因缺少刷新事件和生产组装而无法重放。
      en: Report an in-place overwrite, a broken predecessor chain, and a non-replayable refresh because no event or producing assembly is identified.
      ja: 同一 identity の上書き、predecessor chain の断裂、および refresh event と生成 assembly の欠落による再生不能を報告します。
    why_valid_or_invalid:
      zh: 原地覆盖消除了前序身份和产生新内容的活动证据。
      en: In-place overwrite erases predecessor identity and the activity evidence producing new content.
      ja: 上書きは前版同一性と新内容生成活動証拠を消します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
