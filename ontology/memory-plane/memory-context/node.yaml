      en: Without a recorded decision, non-retrieval, filtering, error, and capacity trimming cannot be distinguished.
      ja: 判断記録なしでは未検索・filter・error・容量裁断を区別できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-context-006
  - id: memory-context-cq-refresh-versioning-v3-example-positive
