      sha256_after: 6d9dfc17a5a384587883d65fc16d968959f15b211bc1c102d8de8899996e893f
      same_identity_overwritten: true
      predecessor_id_present: false
      refresh_event_present: false
      new_assembly_id_present: false
      replayable: false
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
      - ContextAssembly
    related_relation_ids:
      - ContextRefreshEvent-identifies_predecessor-ContextPackage
      - ContextRefreshEvent-triggers-ContextAssembly
