    expected_result:
      zh: 不得由缺席反推容量排除；应把预算快照、排除记录和策略原因分别列为未解决的证据缺口。
      en: Do not infer a capacity exclusion from absence; return the missing budget snapshot, exclusion record, and policy reason as unresolved evidence.
      ja: 不在だけから容量除外を推論せず、budget snapshot・exclusion record・policy reason の欠落を未解決証拠として個別に返します。
    why_valid_or_invalid:
