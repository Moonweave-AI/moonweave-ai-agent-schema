source_claims:
  - id: claim-memory-context-001
    source: eng-fw-langchain-context-engineering
    supports: LangChain defines context engineering as controlling the information and tools supplied to an agent, separates transient model context from persistent state and stores, and identifies messages, tools, model, and response format as per-call context components. This directly supports an operational context-assembly concern. LangChain does not define Moonweave's ContextAssembly, ContextPackage version, slot ordering, or module ownership; those are Moonweave design inferences.
    locator: Context engineering in agents > Overview > What you can control; Data sources; Model context; Life-cycle context
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-memory-context-002
    source: lit-agent-memory-as-action
    supports: Source lit-agent-memory-as-action at Paper > Memory as Action; abstract and method or system-architecture sections supports operational notions used in memory-context, including key notion ContextAssembly (context assembly). The source does not define Moonweave Module memory-context, its class or relation placement, or its ownership boundary. Treating objects under owns_when "Own an object when its identity is determined by one context assembly, an admission event binding selected observations to a determinate package version, slot order, source selection, budget trimming, or immutable context version." as owned by memory-context is a Moonweave design inference over the registered evidence.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
