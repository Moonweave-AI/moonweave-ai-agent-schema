      en: window-draft contains a copied-text slot with no ContextSourceRole, independent SourceReference, or pinned SourceIdentity.
      ja: window-draft は copied-text slot を持ちますが ContextSourceRole・independent SourceReference・pinned SourceIdentity がありません。
    field_values:
      context_package_id: package-draft-17
      context_window_id: window-draft
      slot_id: slot-draft-04
      slot_ordinal: 4
      copied_text_sha256: 7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1
