schema: moonweave.ai/ontology-node/v1
id: memory-context
kind: module
labels:
  zh: 上下文组装
  en: Context assembly
  ja: コンテキスト組み立て
semantics:
  short_definition:
    zh: 从候选信息中选择、排序并裁剪，组装成一次模型调用的可见上下文。
    en: Select, order, and trim candidate information into the visible context for one model call.
    ja: 候補情報を選択・整列・裁断し、一回のモデル呼び出し向け可視コンテキストへ組み立てます。
  definition:
    zh: 上下文组装是记忆域中“把已发现或已检索的候选变成一次模型调用实际输入”的闭环。它负责决定哪些消息、记忆片段、工具结果、检索块或用户显式引用进入当前窗口，以什么顺序排列，以及在 token 预算不足时裁剪或摘要哪些内容。组装产物应是可版本化、可重放的输入包，并记录被排除项及原因。该模块不重新评分检索候选、不持久写入长期记忆，也不决定面向最终用户的输出披露范围。
    en: Context assembly closes the memory-domain loop that turns discovered or retrieved candidates into the actual input for one model call. It decides which messages, memory snippets, tool results, retrieved chunks, or user-selected references enter the current window, in what order, and what to trim or summarize when the token budget is exhausted. The result should be a versioned, replayable input package with recorded exclusions and reasons. This module does not rescore retrieval candidates, persist long-term memory, or govern audience-facing output disclosure.
    ja: コンテキスト組み立ては、発見・検索済み候補を一回のモデル呼び出しの実入力へ変換する記憶ドメインの閉ループです。どのメッセージ、記憶断片、ツール結果、検索 chunk、ユーザー明示参照を現在ウィンドウへ、どの順序で入れ、token 予算不足時に何を切詰め・要約するかを決めます。成果物は版管理可能で再現可能な入力パッケージと除外理由記録であるべきです。本モジュールは検索候補の再採点、長期記憶の永続化、最終ユーザー向け出力開示範囲の決定は行いません。
  why_needed:
    zh: 没有上下文组装，系统无法解释“这次模型调用到底看到了什么、为何没看到别的内容”。候选检索结果会整包塞进 prompt，旧工具输出占满窗口，用户 @ 引用的文件可能被遗漏，压缩后也无法重放当时输入。
    en: Without context assembly, the system cannot explain what a model call actually saw or why other material was omitted. Retrieved candidates get dumped wholesale into the prompt, stale tool output fills the window, user @-referenced files may be skipped, and post-compaction inputs become unreplayable.
    ja: コンテキスト組み立てがなければ、モデル呼び出しが実際に何を見、なぜ他を見なかったか説明できません。検索候補が丸ごと prompt に入り、古いツール出力が窓を占有し、ユーザー @ 参照ファイルが漏れ、圧縮後も当時入力を再現できません。
  includes:
    - zh: 为单次调用选择、排序、压缩或摘要最相关信息，并组装成受预算与窗口约束的可见上下文包。
      en: Selecting, ordering, compressing, or summarizing the most relevant information for one call and assembling it into a visible context package bounded by budget and window limits.
      ja: 一回の呼び出し向けに最も関連する情報を選択・順位付け・圧縮・要約し、予算とウィンドウ制約下の可視コンテキストパッケージへ組み立てます。
    - zh: 记录本次组装的 token 预算、系统预留、被排除片段及排除原因，使输入变化可审计、可版本化。
      en: Recording the token budget, system reservation, excluded fragments, and exclusion reasons for one assembly so input changes remain auditable and versioned.
      ja: 一回の組み立てについて token 予算、system 予約、除外断片、除外理由を記録し、入力変化を監査可能・版管理可能にします。
  excludes:
    - zh: 候选的发现、索引构建与相关性评分；组装只消费上游结果，不重写其来源与分数。
      en: Candidate discovery, index construction, and relevance scoring; assembly consumes upstream results without rewriting their provenance or scores.
      ja: 候補の発見、索引構築、関連性採点。組み立ては上流結果を消費するだけで、来歴や得点を書き換えません。
    - zh: 面向受众的输出选择、截断和披露；输入上下文窗口不等于最终展示给用户的输出窗口。
      en: Audience-facing output selection, truncation, and disclosure; an input context window is not the output window shown to the user.
      ja: 受け手向け出力選択、切詰め、開示。入力コンテキスト窓はユーザーへ表示される出力窓ではありません。
    - zh: 跨会话持久记忆写入、向量索引更新与生命周期治理；组装最多引用这些结果，不拥有其持久身份。
      en: Cross-session persistent memory writes, vector index updates, and lifecycle governance; assembly may reference these outcomes but does not own their durable identity.
      ja: セッション横断の永続記憶書き込み、ベクトル索引更新、ライフサイクル管理。組み立ては結果を参照するだけで、永続 identity を所有しません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 主流产品把“写入记忆”“检索候选”和“纳入本次调用”拆成不同层。本模块映射 Cursor 的 @ 引用、最近文件与接近上限时的 auto-compact；Claude Code 的 /context 预算视图与阈值 summarization；Anthropic/LangChain 的 write/select/compress/isolate 策略；Pichay 的 L1–L4 需求分页；以及 Context Recycling 的五层固定预算工作区。规范（预算规则、槽位顺序）与一次组装发生事实（实际包版本、排除记录）必须分开建模。
    en: Mainstream products split memory writes, retrieval candidates, and admission to the current call into different layers. This module maps Cursor @ references, recent files, and auto-compact near capacity; Claude Code /context budget views and threshold summarization; Anthropic/LangChain write/select/compress/isolate strategies; Pichay L1–L4 demand paging; and Context Recycling's five-layer fixed-budget workspace. Specifications (budget rules, slot order) must stay distinct from one assembly occurrence (actual package version, exclusion records).
    ja: 主要製品は記憶書き込み、検索候補、今回呼び出しへの採用を別層に分けます。本モジュールは Cursor の @ 参照・recent files・上限接近時 auto-compact、Claude Code の /context 予算表示と閾値 summarization、Anthropic/LangChain の write/select/compress/isolate、Pichay L1–L4 demand paging、Context Recycling の五層固定予算 workspace を写像します。仕様（予算規則、slot 順序）と一回の assembly 発生事実（実 package 版、除外記録）は分離モデル化します。
  typical_input:
    - description: Cursor agent context — @ file/folder references, recent edits, semantic search hits, and workspace rules assembled before the model call.
      format: |
        # User message with explicit references
        @src/auth/middleware.ts @docs/onboarding.md
        Where is session validation handled?

        # Client-side assembly (conceptual)
        {
          "referenced_files": ["src/auth/middleware.ts", "docs/onboarding.md"],
          "recent_files": ["src/auth/session.ts"],
          "semantic_hits": [{"path": "src/auth/middleware.ts", "score": 0.91}],
          "rules": [".cursor/rules/security.mdc"]
        }
      source_claims: [claim-memory-context-cursor]
    - description: Claude Code pre-compaction context — live token breakdown via /context and auto-compact when usage nears threshold (~83–95% of effective window).
      format: |
        /context
        # => system prompt, tools, messages, rules, memory files by category

        # settings.json env (optional earlier compaction)
        {
          "env": {
            "CLAUDE_AUTOCOMPACT_PCT_OVERRIDE": "70"
          }
        }

        # manual compaction with focus
        /compact focus on auth middleware changes and open test failures
      source_claims: [claim-memory-context-claude-code]
    - description: LangChain context-engineering loop — select retrieved chunks, compress stale tool output, isolate sub-agent scratchpad outside the main window.
      format: |
        # Write: persist outside window
        state["scratchpad"] = {"files_touched": ["auth/middleware.ts"]}

        # Select: pull only relevant store/RAG items this turn
        selected = store.search(("tenant-7", "docs"), query="session validation")

        # Compress: SummarizationMiddleware on message history
        # Isolate: sub-agent returns 1–2k token summary to parent
      source_claims: [claim-memory-context-langchain]
    - description: Pichay demand paging — treat the live context window as L1 cache; evict stale pages and fault-in on re-read.
      format: |
        # Transparent proxy interposes on message stream
        POST /v1/messages
        [
          {"role": "system", "content": "..."},
          {"role": "user", "content": "Re-read src/auth/middleware.ts"},
          {"role": "assistant", "content": "[Paged out: Read src/auth/middleware.ts (8,192 bytes). Re-read if needed.]"}
        ]
        # => page fault detected; fault-in original file content into L1 window
      source_claims: [claim-memory-context-pichay]
    - description: Context Recycling fixed-budget workspace — proactive load of Layers 0–1 (~3–12K tokens) from disk-backed Layers 2–3 before inference.
      format: |
        {
          "active_context_budget_tokens": 12000,
          "layers": {
            "L0_stable_prefix": ["system.md", "tool_schemas"],
            "L1_recyclable_workspace": ["current_task.md", "selected_chunks"],
            "L2_bm25_index": "in_memory_routing",
            "L3_disk_store": "sqlite://session_store"
          },
          "proactive_load_query": "authentication middleware session validation"
        }
      source_claims: [claim-memory-context-recycling]
  typical_output:
    - description: Moonweave-local context package projection — versioned ordered slots, token accounting, and exclusions.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "context_assembly_id": "assembly-204",
          "context_package_id": "package-204",
          "context_package_version": 3,
          "content_digest_sha256": "355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e",
          "token_budget": {
            "ceiling": 32000,
            "system_reservation": 4096,
            "accepted_content": 27304,
            "remaining": 600
          },
          "ordered_slots": [
            {"ordinal": 1, "role": "system_instruction", "source_ref": "instruction-v12"},
            {"ordinal": 2, "role": "user_message", "source_ref": "message-v41"},
            {"ordinal": 3, "role": "retrieved_chunk", "source_ref": "chunk-policy-003"}
          ],
          "exclusions": [
            {"source_ref": "chunk-42", "reason": "capacity-insufficient-after-system-reservation"}
          ]
        }
      source_claims: [claim-memory-context-design]
  reference_implementations:
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references, recent files, semantic codebase search, and self-summarization/auto-compact near context limits."
    - name: Claude Code Context Window
      url: https://code.claude.com/docs/en/context-window
      description: /context token breakdown, automatic compaction, /compact focus instructions, and sub-agent isolation.
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Write, select, compress, and isolate strategies with middleware and LangGraph state.
    - name: LangChain Context Engineering Blog
      url: https://www.langchain.com/blog/context-engineering-for-agents
      description: Canonical write/select/compress/isolate framework for agent context curation.
    - name: Pichay — Demand Paging for Context Windows
      url: https://arxiv.org/abs/2603.09023
      description: L1–L4 memory hierarchy, eviction, page faults, and working-set pinning for LLM context.
    - name: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      description: Five-layer hierarchy and fixed-budget recyclable workspace for long-horizon inference.
    - name: Manus Context Engineering
      url: https://manus.im/en/blog/Context-Engineering-for-AI-Agents-Lessons-from-Building-Manus
      description: Progressive disclosure, filesystem-as-context, and recency-biased plan injection.
structure:
  identity_keys: [context_assembly_id, context_package_id, context_package_version]
  fields:
    - id: context_assembly_id
      labels: {zh: 上下文组装标识, en: Context assembly identifier, ja: コンテキスト組立識別子}
      definitions:
        zh: 唯一标识一次从候选到最终输入包的组装运行，不是包本身或单次模型调用的运行标识。
        en: Uniquely identifies one assembly run from candidates to a final input package, not the package itself or the model-call run identifier.
        ja: 候補から最終入力パッケージまでの一回の組立実行を一意に識別し、パッケージ自体やモデル呼び出し run ID ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: assembly-204
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: context_package_id
      labels: {zh: 上下文包标识, en: Context package identifier, ja: コンテキストパッケージ識別子}
      definitions:
        zh: 标识一组可版本化上下文包 lineage 的稳定 ID；同一 lineage 的不同版本共享此 ID。
        en: Stable ID for a versioned context-package lineage; different versions in one lineage share this ID.
        ja: 版管理可能なコンテキストパッケージ系列の安定 ID。同一系列の異なる版はこれを共有します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: package-204
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: context_package_version
      labels: {zh: 上下文包版本, en: Context package version, ja: コンテキストパッケージ版}
      definitions:
        zh: 标识同一上下文包 lineage 中的不可变版本；压缩、刷新或重新选择候选后必须递增。
        en: Identifies one immutable version within a context-package lineage; must increment after compaction, refresh, or re-selection.
        ja: 同一コンテキストパッケージ系列内の不変版を識別。圧縮、更新、候補再選択後は増分必須です。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: content_digest_sha256
      labels: {zh: 内容摘要, en: Content digest, ja: 内容ダイジェスト}
      definitions:
        zh: 对最终有序槽位内容与元数据的 SHA-256 摘要，用于重放校验；不得用 token 计数代替。
        en: SHA-256 digest over final ordered slot contents and metadata for replay verification; must not be replaced by token counts.
        ja: 最終 ordered slot 内容と metadata の SHA-256 ダイジェスト。再現検証用。token 数で代用不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: token_ceiling
      labels: {zh: Token 上限, en: Token ceiling, ja: Token 上限}
      definitions:
        zh: 本次组装允许进入模型输入的总 token 预算上限，含系统预留前的名义容量。
        en: Nominal total token budget allowed into model input for this assembly, before system reservation accounting.
        ja: 今回の組み立てでモデル入力へ許可される token 予算上限（system 予約前の名目容量）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 32000
      allowed_values: []
      source_claims: [claim-memory-context-claude-code, claim-memory-context-recycling]
    - id: system_reservation
      labels: {zh: 系统预留, en: System reservation, ja: システム予約}
      definitions:
        zh: 为系统指令、工具 schema 或固定前缀保留且不可被候选内容挤占的 token 配额。
        en: Token quota reserved for system instructions, tool schemas, or fixed prefixes that candidate content must not consume.
        ja: system 指示、tool schema、固定 prefix 用に予約され、候補内容が消費してはならない token 枠。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 4096
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: slot_ordinal
      labels: {zh: 槽位序号, en: Slot ordinal, ja: スロット順序}
      definitions:
        zh: 在最终上下文窗口中的从 1 开始的唯一顺序位置；相同序号不得重复。
        en: Unique 1-based position in the final context window; the same ordinal must not repeat.
        ja: 最終コンテキストウィンドウ内の 1 始まり一意位置。同一 ordinal の重複不可。
      datatype: integer
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [claim-memory-context-design]
    - id: source_ref
      labels: {zh: 来源引用, en: Source reference, ja: 出典参照}
      definitions:
        zh: 指向槽位所引用内容的独立来源与固定版本，例如消息、分块、记忆记录或用户 @ 文件状态。
        en: Independent source and pinned version referenced by a slot, such as a message, chunk, memory record, or user @ file state.
        ja: スロットが参照する独立出典と固定版。message、chunk、記憶レコード、ユーザー @ ファイル状態など。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-003@v7
      allowed_values: []
      source_claims: [claim-memory-context-cursor, claim-memory-context-design]
  constraints:
    - id: context-package-requires-pinned-sources
      severity: error
      expression_language: plain
      expression: Every admitted slot must reference a pinned source identity; copied text without source_ref makes the package non-replayable.
      explanation:
        zh: 没有固定来源，相同摘要可能对应多条记录，无法审计模型实际读取了哪一版。
        en: Without a pinned source, identical digests can match multiple records and the model's actual read version cannot be audited.
        ja: 固定出典がなければ同一 digest が複数 record に一致し、モデルが実際に読んだ版を監査できません。
      source_claims: [claim-memory-context-design]
    - id: context-exclusion-requires-reason
      severity: error
      expression_language: plain
      expression: Any candidate omitted from the final window must record exclusion reason and required versus available token counts when capacity-driven.
      explanation:
        zh: 只记录“未纳入”而不说明预算或策略原因，无法解释为何相关检索块没有进入调用。
        en: Recording omission without budget or policy reason cannot explain why a relevant retrieved chunk never entered the call.
        ja: 予算や方針理由なしの「未採用」記録では、関連検索 chunk が呼び出しに入らなかった理由を説明できません。
      source_claims: [claim-memory-context-design, claim-memory-context-recycling]
    - id: top-k-not-equal-to-context-admission
      severity: warning
      expression_language: plain
      expression: Retrieval Top-K membership must not be treated as automatic context admission; assembly must record its own package version.
      explanation:
        zh: 检索返回的候选集合不等于模型最终看见的输入集合。
        en: A retrieval candidate set is not the same as the input set the model ultimately sees.
        ja: 検索候補集合はモデルが最終的に見る入力集合と同一ではありません。
      source_claims: [claim-memory-context-langchain]
  required_relations: []
examples:
  - id: memory-context-example-cursor-assembly
    labels:
      zh: Cursor 上下文组装
      en: Cursor context assembly
      ja: Cursor コンテキスト組み立て
    descriptions:
      zh: 开发者在 Cursor Agent 中发送“@src/auth/middleware.ts 会话校验在哪？”客户端先解析 @ 引用加载 middleware.ts 全文，再合并最近编辑的 session.ts 与语义搜索命中，按系统规则→用户消息→引用文件→recent files 顺序组装；token 接近窗口 95% 时触发 auto-compact，把早期探索性读取摘要化并生成新 package 版本。
      en: In Cursor Agent the developer sends "@src/auth/middleware.ts Where is session validation handled?" The client resolves @ references to load middleware.ts, merges recent edits in session.ts and semantic search hits, and assembles system rules → user message → referenced files → recent files. Near ~95% of the effective window, auto-compact summarizes early exploratory reads and bumps the package version.
      ja: 開発者が Cursor Agent で「@src/auth/middleware.ts セッション検証はどこ？」と送信。クライアントは @ 参照を解決して middleware.ts を読み、recent 編集の session.ts と意味検索命中を統合し、system rules→user message→参照ファイル→recent files の順で組み立てます。実効ウィンドウ約 95% で auto-compact が早期探索読取を要約し package 版を更新します。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "Agent @ references, semantic search, self-summarization"
    field_values:
      user_message: "@src/auth/middleware.ts Where is session validation handled?"
      referenced_files:
        - src/auth/middleware.ts
      recent_files:
        - src/auth/session.ts
      semantic_hits:
        - path: src/auth/middleware.ts
          score: 0.91
      assembly_order:
        - system_rules
        - user_message
        - referenced_files
        - recent_files
      auto_compact_trigger_pct: 95
      post_compact_package_version: 2
    related_node_ids:
      - memory-context
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-context-cursor
      - claim-memory-context-design
  - id: memory-context-example-claude-auto-compact
    labels:
      zh: Claude Code 自动压缩
      en: Claude Code auto-compact
      ja: Claude Code 自動コンパクト
    descriptions:
      zh: 长会话中 Claude Code 通过 /context 显示 system、tools、messages、rules 各类 token 占用。当使用量接近有效窗口阈值（文档约 95%，实现常更早）时 autoCompact 在 compact_boundary 之前的历史上运行 summarization，保留 CLAUDE.md 与未 scoped 规则，而 path-scoped 规则需待再次读文件后重载；用户也可 /compact focus on failing tests 主动压缩。
      en: During a long Claude Code session, /context shows token usage by system, tools, messages, and rules. When usage nears the effective window threshold (documented around 95%, often earlier in practice), autoCompact summarizes history before compact_boundary, preserving CLAUDE.md and unscoped rules while path-scoped rules reload only after matching files are read again. The user may also run /compact focus on failing tests manually.
      ja: 長セッションで Claude Code は /context により system・tools・messages・rules の token 使用量を表示。実効ウィンドウ閾値（文書上約 95%、実装ではより早い）に近づくと autoCompact が compact_boundary より前の履歴を要約し、CLAUDE.md と unscoped rules を保持、path-scoped rules は一致ファイル再読後に再ロード。ユーザーは /compact focus on failing tests も実行可能。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact, /context, /compact
    field_values:
      context_command: /context
      auto_compact_strategy: autoCompact
      documented_threshold_pct: 95
      compact_boundary_present: true
      preserved_after_compact:
        - CLAUDE.md
        - unscoped_rules
      reloaded_on_file_read:
        - path_scoped_rules
      manual_compact: /compact focus on failing tests
    related_node_ids:
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-memory-context-claude-code
      - claim-memory-context-design
  - id: memory-context-example-pichay-demand-paging
    labels:
      zh: Pichay 需求分页
      en: Pichay demand paging
      ja: Pichay デマンドページング
    descriptions:
      zh: "Pichay 作为客户端与推理 API 之间的透明代理，把实时上下文窗口视为 L1 缓存。陈旧工具输出被逐出并替换为“[Paged out: Read file.py … Re-read if needed.]”占位符；当模型再次请求该文件时触发 page fault 并 fault-in 原文。fault 历史驱动 working-set pinning，在 681 轮生产部署中上下文消耗最高降 93%。"
      en: "Pichay acts as a transparent proxy between client and inference API, treating the live context window as L1 cache. Stale tool output is evicted and replaced with \"[Paged out: Read file.py … Re-read if needed.]\" placeholders; when the model re-requests the file, a page fault fault-ins the original content. Fault history drives working-set pinning, reducing context consumption by up to 93% over 681 production turns."
      ja: "Pichay は client と inference API 間の透明 proxy として live context window を L1 cache 扱いします。古いツール出力は追い出され「[Paged out: Read file.py … Re-read if needed.]」プレースホルダーに置換。モデルが再要求すると page fault で原文を fault-in。fault 履歴が working-set pinning を駆動し、681 turn 本番で context 消費を最大 93% 削減。"
    example_source:
      product: Pichay
      url: https://arxiv.org/abs/2603.09023
      version: "arXiv:2603.09023 — L1 eviction, L2 pinning, L3 compaction"
    field_values:
      hierarchy_level: L1_generation_window
      eviction_marker: "[Paged out: Read file.py (8192 bytes). Re-read if needed.]"
      page_fault_trigger: model_re_requests_evicted_content
      pinning_policy: fault_history_working_set
      production_turns: 681
      max_context_reduction_pct: 93
    related_node_ids:
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-memory-context-pichay
  - id: memory-context-example-langgraph-scratchpad
    labels:
      zh: LangGraph 草稿状态组装
      en: LangGraph scratchpad state assembly
      ja: LangGraph スクラッチパッド状態組み立て
    descriptions:
      zh: LangGraph 智能体把跨步观察写入 state.scratchpad（write），每轮只 select 当前任务相关的 store 条目与检索块（select），SummarizationMiddleware 压缩陈旧消息（compress），子图在隔离 state 中运行并返回摘要给父图（isolate）。父图最终把这些字段按固定前缀→动态后缀顺序组装成一次 model call 的 messages 参数。
      en: A LangGraph agent writes cross-step observations to state.scratchpad (write), selects only store entries and retrieved chunks relevant to the current step each turn (select), compresses stale messages via SummarizationMiddleware (compress), and runs a subgraph in isolated state returning a summary to the parent (isolate). The parent assembles these fields into the messages argument for one model call with stable prefix first and dynamic suffix last.
      ja: LangGraph エージェントは跨 step 観察を state.scratchpad へ write し、各 turn で現 step に関連する store 項目と検索 chunk のみ select、SummarizationMiddleware で古い message を compress、subgraph を分離 state で実行して親へ summary を返します（isolate）。親は stable prefix→dynamic suffix の順で一回 model call の messages 引数へ組み立てます。
    example_source:
      product: LangGraph / LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: write/select/compress/isolate with middleware
    field_values:
      strategies:
        - write
        - select
        - compress
        - isolate
      scratchpad_field: state.scratchpad
      middleware:
        - SummarizationMiddleware
      subgraph_return: condensed_summary_only
      assembly_order: stable_prefix_then_dynamic_suffix
    related_node_ids:
      - memory-context
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-memory-context-langchain
      - claim-memory-context-design
  - id: memory-context-example-manus-progressive-disclosure
    labels:
      zh: Manus 渐进式披露
      en: Manus progressive disclosure
      ja: Manus 段階的開示
    descriptions:
      zh: Manus 在启动时只把 Agent Skills 的 Level-1 元数据（name/description，约 100 tokens/skill）装入上下文；触发技能时再加载 Level-2 SKILL.md 指令（<5k tokens）；Level-3 脚本与资源通过沙箱文件系统按需读取。每步重写 todo.md 并把当前目标复述到上下文末尾，使全局计划保持在近期注意力区，而不是一次性把所有技能与历史灌进窗口。
      en: Manus loads only Level-1 Agent Skill metadata (name/description, ~100 tokens per skill) at startup; loads Level-2 SKILL.md instructions (<5k tokens) when a skill triggers; reads Level-3 scripts and resources on demand from the sandbox filesystem. Each step rewrites todo.md and recites current objectives at the context tail so the global plan stays in recent attention instead of stuffing all skills and history into the window at once.
      ja: Manus は起動時に Agent Skills の Level-1 metadata（name/description、約 100 tokens/skill）だけを context へ載せ、skill 発火時に Level-2 SKILL.md 指令（<5k tokens）をロード、Level-3 script/resource は sandbox filesystem から on-demand 読取。各 step で todo.md を書き換え現目標を context 末尾へ復唱し、全 skill と履歴を一度に窓へ詰め込まず global plan を recent attention 域に保ちます。
    example_source:
      product: Manus
      url: https://manus.im/en/blog/Context-Engineering-for-AI-Agents-Lessons-from-Building-Manus
      version: progressive disclosure + filesystem-as-context
    field_values:
      skill_level_1_tokens_per_skill: 100
      skill_level_2_max_tokens: 5000
      skill_level_3_access: on_demand_filesystem
      standing_state_file: todo.md
      recency_injection: rewrite_at_context_tail
      filesystem_as_context: true
    related_node_ids:
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-memory-context-manus
      - claim-memory-context-design
