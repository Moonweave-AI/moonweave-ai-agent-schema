  - id: claim-memory-context-ordering
    source: lost-in-middle
    supports: Liu et al. report that long-context performance depends on the position of relevant information, including weaker performance for relevant information in middle positions. Moonweave requires explicit ordering rules but does not infer a universally optimal placement.
