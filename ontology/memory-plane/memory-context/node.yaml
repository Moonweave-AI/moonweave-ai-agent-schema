      en: Refresh version chain positive case
      ja: 更新版鎖の正例
    scenario_id: null
    descriptions:
      zh: refresh-19 指向 package-18，因工具清单变化触发 assembly-19，后者产生不同 digest 的 package-19。
      en: refresh-19 identifies package-18, triggers assembly-19 because the tool inventory changed, and that assembly produces package-19 with a distinct digest.
      ja: refresh-19 は package-18 を指し tool一覧変更で assembly-19 を起動し、別digestの package-19 を生成します。
    field_values:
      refresh_event_id: refresh-19
      predecessor_package_id: package-18
      predecessor_sha256: 2a3439ca19ce99d6f6e35b62ed68b56585b7a89a92bf4a5d1ce2c73d20b6fd81
      refresh_reason_code: tool-inventory-version-changed
      previous_tool_inventory_version: tools@18
      new_tool_inventory_version: tools@19
      triggered_assembly_id: assembly-19
      successor_package_id: package-19
      successor_sha256: 15eaa6ef948f82b87cc85b3a48d0731d64a3097f7ce85d0fbabfd1bb176b3194
      predecessor_preserved: true
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
      - ContextAssembly
    related_relation_ids:
      - ContextRefreshEvent-identifies_predecessor-ContextPackage
      - ContextRefreshEvent-triggers-ContextAssembly
      - ContextAssembly-produces-ContextPackage
    expected_result:
      zh: 返回前序包、刷新原因、新组装和后继包的有序链。
      en: Return the ordered predecessor, refresh reason, new assembly, and successor chain.
      ja: 前版包・更新理由・新組立・後続包の順序鎖を返します。
    why_valid_or_invalid:
      zh: 不同的包摘要以及 refresh-to-assembly 显式链同时保留旧投影，并说明新投影因何、由哪次组装产生。
      en: Distinct package digests and the explicit refresh-to-assembly chain preserve both the old projection and the cause of the new one.
      ja: 異なる package digest と明示的な refresh-to-assembly chain が旧投影を保持し、新投影の原因と生成 assembly を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-context-007
  - id: memory-context-cq-refresh-versioning-v3-example-counter
