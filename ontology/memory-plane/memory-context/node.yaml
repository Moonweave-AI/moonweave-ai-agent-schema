  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ContextArtifact
      - ContextAssemblyActivity
      - ContextSpecification
    allowed_backbone_predicates:
      - has_source_role
      - has_slot
      - has_visible_window
      - ingested_into_context
      - is_a
      - triggers
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后保留三条诚实根：ContextArtifact 承载可保存和传递的组装信息，ContextAssemblyActivity 承载选择、排序、裁剪与刷新活动，ContextSpecification 承载可跨运行复用的规则与容量预算。ContextRule 与 ContextBudget 通过 is_a 进入规范分支；applies 和 uses_budget 只记录某次活动采用规范的横向事实。
            en: "Point-by-point review retains three honest roots: ContextArtifact carries storable, transferable assembled information; ContextAssemblyActivity carries selection, ordering, trimming, and refresh activities; ContextSpecification carries rules and capacity budgets reusable across runs. ContextRule and ContextBudget enter the specification branch through is_a, while applies and uses_budget record only a particular activity's adoption as cross-link facts."
            ja: 個別審査後は三 honest root を維持します。ContextArtifact は保存・転送可能な assembled information、ContextAssemblyActivity は selection・ordering・trimming・refresh activity、ContextSpecification は run 横断で再利用する rule/capacity budget を担います。ContextRule/ContextBudget は is_a で specification branch に入り applies/uses_budget は一 activity の adoption cross-link のみです。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体审查确认 ContextArtifact、ContextAssemblyActivity 与 ContextSpecification 互不充当全局父。规范分支中 ContextRule 与 ContextBudget 是同属上位规范但种差不同的兄弟：前者声明条件—效力，后者声明计量单位、上限、预留与溢出动作。ContextSlot 组成 ContextSourceRole，而独立 SourceReference 只通过 borne_by 横向连接，避免复制来源身份。
            en: "Ontology review confirms that ContextArtifact, ContextAssemblyActivity, and ContextSpecification do not act as global parents for one another. In the specification branch, ContextRule and ContextBudget are siblings with different differentia: the former declares condition-to-effect behavior, while the latter declares unit, ceiling, reservation, and overflow action. ContextSlot composes ContextSourceRole, and the independent SourceReference is connected only through the borne_by cross-link so source identity is not copied."
            ja: 本体審査は ContextArtifact・ContextAssemblyActivity・ContextSpecification が互いの global parent にならないと確認しました。specification branch で ContextRule と ContextBudget は sibling ですが、前者は condition-to-effect、後者は unit・ceiling・reservation・overflow action を宣言します。ContextSlot は ContextSourceRole を構成し independent SourceReference は borne_by cross-link のみで結び source identity を複製しません。
