module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 上下文组装接收记忆记录、已检索分块、发现结果与跨模块 CommandOutputObservation；前三类由 consumes 事实交接，输出观测只有在 ContextIngressEvent-makes_available-CommandOutputObservation 明确选择后才成为本次包的候选证据。
          en: Context assembly receives memory records, retrieved chunks, discovery results, and cross-module CommandOutputObservations. The first three hand off through consumes facts; an output observation becomes candidate evidence only when ContextIngressEvent-makes_available-CommandOutputObservation explicitly selects it.
          ja: context assembly は memory record・retrieved chunk・discovery result・module 横断 CommandOutputObservation を受け取ります。前三者は consumes fact で受渡し、output observation は ContextIngressEvent-makes_available-CommandOutputObservation が明示選択した場合だけ candidate evidence になります。
        family_concept_ids:
          - MemoryRecord
          - RetrievedChunk
          - DiscoveryResult
          - CommandOutputObservation
        relation_ids:
          - ContextAssembly-consumes-MemoryRecord
          - ContextAssembly-consumes-RetrievedChunk
          - ContextAssembly-consumes-DiscoveryResult
          - ContextIngressEvent-makes_available-CommandOutputObservation
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 上下文组装产生可重放 ContextPackage 与 ContextExclusion；ContextIngressEvent 另以 ingested_into_context 固定每次接纳所写入的确切包版本，包再包含提交给模型的有界有序窗口。
          en: Context assembly produces replayable ContextPackages and ContextExclusions. ContextIngressEvent separately fixes the exact package version populated by each admission through ingested_into_context, and the package contains the bounded ordered model-input window.
          ja: context assembly は再現可能 ContextPackage と ContextExclusion を生成します。ContextIngressEvent は ingested_into_context で各 admission が投入した正確な package version を固定し、package は bounded ordered model-input window を含みます。
        family_concept_ids:
          - ContextPackage
          - ContextWindow
          - ContextExclusion
          - ContextIngressEvent
        relation_ids:
          - ContextAssembly-produces-ContextPackage
          - ContextPackage-has_window-ContextWindow
          - ContextAssembly-records-ContextExclusion
          - ingested_into_context
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。消息、运行主体或输出披露需要指出实际使用了哪份上下文而不改变其成员时，引用 ContextPackage 或版本。
          en: This ontology does not own runtime-failure adjudication. Messages, runtime actors, or output disclosure references ContextPackage or a version when identifying the context actually used without changing its members.
          ja: このオントロジーは実行失敗の判定を所有しません。メッセージ、実行主体、出力開示がメンバーを変えず実際に使用したコンテキストを示すとき、ContextPackage または版を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。消息、运行主体或输出披露需要指出实际使用了哪份上下文而不改变其成员时，引用 ContextPackage 或版本。
