      - ContextPackage-has_window-ContextWindow
      - ContextWindow-has_slot-ContextSlot
      - ContextSlot-has_source_role-ContextSourceRole
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 在 slot-draft-04 停止遍历，逐项报告来源角色、独立引用和固定来源状态缺失，并把 package-draft-17 判为不可重放。
      en: Stop at slot-draft-04, report its missing source role, independent reference, and pinned source state, and classify package-draft-17 as non-replayable.
      ja: slot-draft-04 で traversal を止め source role・independent reference・pinned source state の欠落を報告し package-draft-17 を non-replayable とします。
    why_valid_or_invalid:
      zh: 相同文本摘要可能来自多条记录或多个消息版本，无法说明组装活动实际读取了哪一个实体及其哪个字段。
      en: A copied digest can match several records or message versions; it cannot identify which entity and field the assembly actually read.
      ja: 同じ text digest は複数の record や message version に一致し得るため、assembly が実際に読んだ entity と field を特定できません。
