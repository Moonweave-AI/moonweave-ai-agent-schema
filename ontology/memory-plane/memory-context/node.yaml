      - ContextSlot-has_source_role-ContextSourceRole
      - ContextSourceRole-borne_by-SourceReference
    expected_result:
      zh: 按顺序返回 assembly-88、package-88、window-88、六个唯一序号、六个槽位作用域来源角色及其各自承担者和固定来源状态。
      en: Return assembly-88, package-88, window-88, all six unique ordinals, six slot-scoped source roles, and each role's bearer and pinned source state in order.
      ja: assembly-88・package-88・window-88・六 unique ordinal・六 slot-scoped source role と各 bearer/pinned source state を順に返します。
    why_valid_or_invalid:
      zh: 包摘要、最终窗口身份、唯一槽位序号和版本化来源路径共同固定了这次模型调用所见的准确投影，因此可重放。
