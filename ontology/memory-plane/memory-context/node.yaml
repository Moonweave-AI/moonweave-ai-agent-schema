  - id: memory-context-cq-budget-accounting-v3-example-positive
    kind: positive
    labels:
      zh: 预算排除正例
      en: Budget exclusion positive case
      ja: 予算除外の正例
    scenario_id: null
    descriptions:
      zh: assembly-88 使用 budget-32k 并记录 exclude-42；exclude-42 指向 chunk-42，原因是保留系统指令后仅剩 600 tokens。
      en: assembly-88 uses budget-32k and records exclude-42, which points to chunk-42 because only 600 tokens remained after the system reservation.
      ja: assembly-88 は budget-32k を使い exclude-42 を記録し、system予約後600tokensだけのため chunk-42 を指します。
    field_values:
      context_assembly_id: assembly-88
      context_budget:
        budget_id: budget-32k
        unit: token
        ceiling: 32000
        system_reservation: 4096
        accepted_content: 27304
        remaining: 600
      excluded_chunk:
        chunk_id: chunk-42
        token_count: 912
      context_exclusion:
        exclusion_id: exclude-42
        reason_code: capacity-insufficient-after-system-reservation
        required_tokens: 912
        available_tokens: 600
        policy_id: context-trim-policy@v4
    related_node_ids:
      - ContextAssembly
      - ContextBudget
      - ContextExclusion
      - Chunk
    related_relation_ids:
      - context_assembly_uses_budget
      - ContextAssembly-records-ContextExclusion
      - context_exclusion_excludes_chunk
    expected_result:
      zh: 按 32,000 − 4,096 − 27,304 = 600 tokens 重算，并因 chunk-42 需要 912 tokens 而复现该排除决定。
      en: Recalculate 32,000 − 4,096 − 27,304 = 600 tokens and reproduce the exclusion because chunk-42 requires 912 tokens.
      ja: 32,000 − 4,096 − 27,304 = 600 tokens と再計算し、chunk-42 が 912 tokens を要するため同じ除外判断を再現します。
    why_valid_or_invalid:
      zh: 预算单位、上限、预留、消耗和候选大小均被固定。
      en: Budget unit, ceiling, reservation, consumption, and candidate size are fixed.
      ja: 予算単位・上限・予約・消費・候補sizeが固定されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-context-005
