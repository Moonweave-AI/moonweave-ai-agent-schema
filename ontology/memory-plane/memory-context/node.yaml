  - id: claim-memory-context-window-limit
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents truncation when conversation tokens exceed an input limit, a lower configurable maximum, and the need to reserve output tokens. Moonweave models a Context Window as a capacity constraint and calls for an explicit input budget rather than as a content artifact.
