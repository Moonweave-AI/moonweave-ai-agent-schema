schema: moonweave.ai/ontology-node/v1
id: memory-context
kind: module
status: review
labels:
  zh: 上下文组装
  en: Context assembly
  ja: コンテキスト組み立て
semantics:
  short_definition:
    zh: 上下文组装回答“哪些候选信息以什么顺序和篇幅真正进入某次模型调用”。ContextAssemblyActivity 记录选择、排序、裁剪和完整组装过程；ContextArtifact 记录包、窗口、槽位、摘要与排除结果；ContextSpecification 记录可复用的组装规范与预算。
    en: "Context assembly closes through three genuine branches: ContextAssemblyActivity owns selection, ordering, and trimming processes; ContextArtifact owns packages, windows, slots, and exclusions; ContextSpecification owns reusable rules and capacity budgets. ContextSourceRole records only participation of an independent source reference in a concrete slot."
    ja: context assembly は三 genuine branch で閉じます。ContextAssemblyActivity は selection/ordering/trimming process、ContextArtifact は package/window/slot/exclusion、ContextSpecification は reusable rule/capacity budget を所有し、ContextSourceRole は independent source reference の concrete slot participation だけを記録します。
  definition:
    zh: 上下文组装以活动、产物和规范三条真实分支构成闭环：ContextAssemblyActivity 承载选择、排序与裁剪过程，ContextArtifact 承载包、窗口、槽位与排除记录，ContextSpecification 承载可复用规则和容量预算；ContextSourceRole 只记录一个独立来源引用在具体槽位中的参与。
    en: "Context assembly closes through three genuine branches: ContextAssemblyActivity owns selection, ordering, and trimming processes; ContextArtifact owns packages, windows, slots, and exclusions; ContextSpecification owns reusable rules and capacity budgets. ContextSourceRole records only participation of an independent source reference in a concrete slot."
    ja: context assembly は三 genuine branch で閉じます。ContextAssemblyActivity は selection/ordering/trimming process、ContextArtifact は package/window/slot/exclusion、ContextSpecification は reusable rule/capacity budget を所有し、ContextSourceRole は independent source reference の concrete slot participation だけを記録します。
  why_needed:
    zh: 从发现与检索候选中选择、排序、裁剪和版本化当前运行可用的不可变上下文。
    en: Select, order, trim, and version immutable context available to the current run from discovery and retrieval candidates.
    ja: 発見・検索候補から現在実行で利用できる不変コンテキストを選択、整列、裁断、版管理します。
  includes:
    - zh: ContextArtifact 下的 ContextWindow、ContextSummary 与 ContextPackage；ContextWindow 组成有序 ContextSlot，ContextSlot 再组成由独立 SourceReference 承担的 ContextSourceRole；以及 ContextIngressEvent 和不可变上下文版本。
      en: ContextWindow, ContextSummary, and ContextPackage under ContextArtifact; ordered ContextSlots composed by ContextWindow; ContextSourceRoles composed by slots and borne by independent SourceReferences; plus ContextIngressEvent and immutable context versions.
      ja: ContextArtifact 配下の ContextWindow・ContextSummary・ContextPackage、ContextWindow が構成する ordered ContextSlot、slot が構成し independent SourceReference が担う ContextSourceRole、ContextIngressEvent、不変 context version。
    - zh: ContextAssemblyActivity 下的 ContextAssembly 与 ContextAssemblyPhase→选择/排序/裁剪活动链；ContextSpecification 下的 ContextRule→ContextOrderingRule 与 ContextBudget；以及 ContextExclusion 和 ContextRefreshEvent。
      en: ContextAssembly and the ContextAssemblyPhase-to-selection/ordering/trimming activity chain under ContextAssemblyActivity; ContextRule-to-ContextOrderingRule and ContextBudget under ContextSpecification; plus ContextExclusion and ContextRefreshEvent.
      ja: ContextAssemblyActivity 配下の ContextAssembly と ContextAssemblyPhase→selection/ordering/trimming activity chain、ContextSpecification 配下の ContextRule→ContextOrderingRule と ContextBudget、ContextExclusion、ContextRefreshEvent。
  excludes:
    - zh: 候选的发现与评分归上下文发现或检索与排序；组装不重写候选来源和得分。
      en: Candidate discovery and scoring belong to context discovery or retrieval and ranking; assembly does not rewrite candidate provenance or scores.
      ja: 候補の発見と採点はコンテキスト発見または検索と順位付けに属し、組み立ては候補の来歴や得点を書き換えません。
    - zh: 面向受众的输出选择、截断和披露记录归输出披露；ContextWindow 不是输出窗口。
      en: Audience-facing output selection, truncation, and disclosure records belong to output disclosure; ContextWindow is not an output window.
      ja: 受け手向けの出力選択、切詰め、開示記録は出力開示に属し、ContextWindow は出力窓ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 从发现与检索候选中选择、排序、裁剪和版本化当前运行可用的不可变上下文。
  en: Select, order, trim, and version immutable context available to the current run from discovery and retrieval candidates.
  ja: 発見・検索候補から現在実行で利用できる不変コンテキストを選択、整列、裁断、版管理します。
structure: null
examples:
  - id: memory-context-cq-version-membership-v3-example-positive
