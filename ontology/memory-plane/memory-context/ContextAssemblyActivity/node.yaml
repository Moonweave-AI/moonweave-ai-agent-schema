schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyActivity
kind: concept
status: accepted
labels:
  zh: 上下文组装活动
  en: context assembly activity
  ja: コンテキスト組立活動
semantics:
  short_definition:
    zh: 把候选信息转换成某次调用可用输入的可观察活动上位类。
    en: The activity genus for observable work that turns candidate information into call-ready input.
    ja: 候補情報を呼出し可能入力へ変換する観測可能な活動の上位類です。
  definition:
    zh: ContextAssemblyActivity 是活动上位类；其种差是：它对某次模型调用的候选上下文执行可审计的选择、排序、裁剪或完整组装，并具有运行身份、输入、规则或预算、时间与结果。ContextAssembly 表示完整运行，ContextAssemblyPhase 表示可组合阶段；任何规则、预算、槽位或产物都不是该活动的子类。
    en: ContextAssemblyActivity is the activity genus for auditable selection, ordering, trimming, or complete assembly of candidate context for a model call, with run identity, inputs, applicable rules or budget, interval, and result. ContextAssembly is a complete run and ContextAssemblyPhase is a composable phase; rules, budgets, slots, and artifacts are not activity subtypes.
    ja: ContextAssemblyActivity はモデル呼出し候補文脈の監査可能な選択・整列・裁断・完全組立を表す活動上位類で、実行同一性、入力、適用規則または予算、時間、結果を持ちます。ContextAssembly は完全実行、ContextAssemblyPhase は構成可能段階であり、規則・予算・スロット・成果物は活動下位型ではありません。
  why_needed:
    zh: 该上位层让完整组装与内部阶段共享活动语义，同时避免把阶段错误当成完整组装或把产生关系当父子关系。
    en: This genus lets complete assemblies and their phases share activity semantics without treating a phase as a complete assembly or using production as parenthood.
    ja: 完全組立と内部段階で活動意味を共有しつつ、段階を完全組立と誤認したり生成関係を親子関係にしたりしません。
  includes:
    - zh: 纳入完整 ContextAssembly 运行以及 ContextSelectionActivity、ContextOrderingActivity、ContextTrimmingActivity 所属的 ContextAssemblyPhase。
      en: Includes complete ContextAssembly runs and the ContextAssemblyPhase genus covering ContextSelectionActivity, ContextOrderingActivity, and ContextTrimmingActivity.
      ja: 完全な ContextAssembly 実行と、ContextSelectionActivity・ContextOrderingActivity・ContextTrimmingActivity を含む ContextAssemblyPhase を含みます。
  excludes:
    - zh: 排除 ContextRule、ContextBudget、ContextPackage、ContextWindow 与 ContextSlot，因为它们分别是规范、容量约束、产物或组成部分。
      en: Excludes ContextRule, ContextBudget, ContextPackage, ContextWindow, and ContextSlot because they are specifications, capacity constraints, artifacts, or components.
      ja: ContextRule、ContextBudget、ContextPackage、ContextWindow、ContextSlot は仕様・容量制約・成果物・構成要素なので除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - assembly_id
  fields:
    - id: assembly_id
      labels:
        zh: 上下文组装标识
        en: context-assembly ID
        ja: コンテキスト組み立て ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次上下文选择、排序和预算应用活动。
        en: Stable identifier for one context selection, ordering, and budgeting activity.
        ja: 一回のコンテキスト選択、順序付け、予算適用活動を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: ctx-assemble-88
      source_claims:
        - claim-context-assembly-activity-002
    - id: target_call_ref
      labels:
        zh: 目标调用引用
        en: target-call reference
        ja: 対象 call 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向将消费组装结果的具体模型调用或智能体步骤。
        en: References the concrete model call or agent step that will consume the assembly result.
        ja: assembly 結果を消費する具体 model call または agent step を参照します。
      allowed_values: []
      pattern: null
      example_value: call-88
      source_claims:
        - claim-context-assembly-activity-003
    - id: candidate_set_ref
      labels:
        zh: 候选集合引用
        en: candidate-set reference
        ja: 候補集合参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定进入本次选择、排序或裁剪的候选信息集合。
        en: Pins the candidate-information set entering this selection, ordering, or trimming activity.
        ja: この選択・整列・裁断活動へ入る候補情報集合を固定します。
      allowed_values: []
      pattern: null
      example_value: context-candidates-88@4
      source_claims:
        - claim-context-assembly-activity-004
    - id: context_specification_ref
      labels:
        zh: 上下文规范引用
        en: context-specification reference
        ja: context specification 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次活动采用的规则、预算和顺序策略修订版。
        en: Pins the revision of rules, budgets, and ordering policy applied by the activity.
        ja: 活動が適用した rule・budget・ordering policy の revision を固定します。
      allowed_values: []
      pattern: null
      example_value: context-policy-production@12
      source_claims:
        - claim-context-assembly-activity-005
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动开始处理固定候选集合的 UTC 时间。
        en: UTC instant at which the activity began processing the pinned candidate set.
        ja: 活動が固定候補集合の処理を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:00.000Z
      source_claims:
        - claim-context-assembly-activity-006
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 组装结果固定、活动失败或取消时的 UTC 时间；运行中为空。
        en: UTC instant when the assembly result became fixed, failed, or was cancelled; null while running.
        ja: assembly 結果確定・失敗・取消時の UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:00.190Z
      source_claims:
        - claim-context-assembly-activity-007
    - id: outcome
      labels:
        zh: 组装结果状态
        en: assembly outcome
        ja: assembly 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动仍在运行、成功、失败或取消；只有成功活动可发布最终上下文产物。
        en: Records running, success, failure, or cancellation; only success may publish the final context artifact.
        ja: running・success・failure・cancellation を記録し、success のみ最終 context artifact を公開できます。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-context-assembly-activity-008
  constraints:
    - id: context-assembly-output-is-call-scoped
      severity: error
      expression_language: plain
      expression: outcome = success implies the produced ContextArtifact.consumer_ref equals target_call_ref
      explanations:
        zh: 成功组装生成的上下文产物必须明确绑定同一目标调用。
        en: The context artifact produced by a successful assembly is bound to the same target call.
        ja: 成功 assembly が生成した context artifact は同じ対象 call へ結びます。
      source_claims:
        - claim-context-assembly-activity-009
  required_relation_constraints: []
examples:
  - id: ContextAssemblyActivity-example-positive-001
    kind: positive
    labels:
      zh: 上下文活动正例
      en: Context activity positive case
      ja: 文脈活動の正例
    scenario_id: null
    descriptions:
      zh: ctx-assemble-88 在一次模型调用前记录候选集合、规则版本、阶段时间和输出包；它是可观察的 ContextAssemblyActivity。
      en: Before model call 88, ctx-assemble-88 records its candidate set, rule versions, phase intervals, and output package, making it an observable ContextAssemblyActivity.
      ja: モデル呼出し88の前に ctx-assemble-88 は候補集合・規則版・段階時間・出力包を記録し、観測可能な ContextAssemblyActivity です。
    field_values:
      assembly_id: ctx-assemble-88
      target_call_ref: call-88
      candidate_set_ref: context-candidates-88@4
      context_specification_ref: context-policy-production@12
      started_at: 2026-07-16T04:00:00.000Z
      ended_at: 2026-07-16T04:00:00.190Z
      outcome: success
    related_node_ids:
      - ContextAssemblyActivity
      - ContextAssembly
    related_relation_ids:
      - ContextAssembly-is_a-ContextAssemblyActivity
    expected_result:
      zh: 该运行应按活动身份和阶段轨迹查询。
      en: The run is queried by activity identity and phase trace.
      ja: 実行を活動同一性と段階軌跡で照会します。
    why_valid_or_invalid:
      zh: 它执行并记录了上下文转换，而不是仅声明规则或承载结果。
      en: It performs and records context transformation rather than merely declaring a rule or carrying a result.
      ja: 規則宣言や結果保持ではなく文脈変換を実行・記録します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-assembly-activity-010
  - id: ContextAssemblyActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文产物边界
      en: Context artifact boundary
      ja: 文脈成果物の境界
    scenario_id: null
    descriptions:
      zh: pkg-88 固化了调用输入却没有开始时间、阶段或执行者；它是 ContextPackage，不是 ContextAssemblyActivity。
      en: pkg-88 fixes call input but has no start time, phase, or executor; it is a ContextPackage, not a ContextAssemblyActivity.
      ja: pkg-88 は呼出し入力を固定しますが開始時刻・段階・実行者がなく、ContextPackage であって ContextAssemblyActivity ではありません。
    field_values: {}
    related_node_ids:
      - ContextAssemblyActivity
      - ContextPackage
    related_relation_ids: []
    expected_result:
      zh: 分类器保留产物类型并拒绝活动类型。
      en: Classification preserves the artifact type and rejects the activity type.
      ja: 分類器は成果物型を保持し活動型を拒否します。
    why_valid_or_invalid:
      zh: 持久输入包与形成它的有时间活动具有不同身份条件。
      en: A persistent input envelope and the time-bounded activity that forms it have different identity conditions.
      ja: 永続入力封筒とそれを形成する時間限定活動は異なる同一性条件を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-assembly-activity-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-lifecycle-verification
  reviewed_on: 2026-07-17
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
  - id: claim-context-assembly-activity-001
    source: eng-fw-langchain-context-engineering
    supports: LangChain separates per-call model-context construction and lifecycle transformations from the context data itself; Moonweave names that observable work ContextAssemblyActivity and keeps its phases below the activity genus.
    locator: Context engineering in agents > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-002
    source: eng-fw-langchain-context-engineering
    supports: LangChain can construct and transform model context on each call. assembly_id is Moonweave's stable identity for auditing one such context-building activity.
    locator: Context engineering in agents > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-003
    source: eng-fw-langchain-context-engineering
    supports: LangChain's ModelRequest exposes the context supplied to a particular model call. target_call_ref preserves that call-specific assembly boundary.
    locator: Context engineering in agents > Model context > ModelRequest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-004
    source: eng-fw-langchain-context-engineering
    supports: LangChain context engineering draws from state, store, runtime context, tools, and message history. candidate_set_ref fixes the concrete pre-selection input assembled from those sources.
    locator: Context engineering in agents > What you can control; Data sources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-005
    source: eng-fw-langchain-context-engineering
    supports: LangChain exposes separately configurable model-context and lifecycle mechanisms. context_specification_ref records which reviewed configuration revision governed one assembly.
    locator: Context engineering in agents > What you can control; Model context; Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-006
    source: eng-fw-langchain-context-engineering
    supports: Context preparation occurs in call and lifecycle hooks. started_at records the observable beginning of one such hook execution.
    locator: Context engineering in agents > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-activity-007
    source: eng-fw-langchain-context-engineering
    supports: A model-context hook must complete before the call consumes its output. ended_at records that completion boundary for replay and latency analysis.
    locator: Context engineering in agents > Model context > middleware call flow
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-activity-008
    source: eng-fw-langchain-context-engineering
    supports: Context middleware either returns a ModelRequest context or fails before the model call. outcome represents that activity result without conflating it with the produced context artifact.
    locator: Context engineering in agents > Model context > middleware call flow
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-activity-009
    source: eng-fw-langchain-context-engineering
    supports: LangChain constructs model context for a particular ModelRequest. Moonweave therefore requires the resulting artifact consumer to equal the assembly's target call.
    locator: Context engineering in agents > Model context > ModelRequest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-010
    source: eng-fw-langchain-context-engineering
    supports: LangChain's model-context and lifecycle hooks distinguish work that constructs or changes model input; the case adds explicit run identity and phase tracing.
    locator: Context engineering in agents > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-assembly-activity-011
    source: eng-fw-langchain-context-engineering
    supports: LangChain distinguishes transient model context from lifecycle mechanisms; Moonweave applies that distinction to artifact pkg-88 and its producing activity.
    locator: Context engineering in agents > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
