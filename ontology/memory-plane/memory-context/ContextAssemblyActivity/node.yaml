schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyActivity
kind: concept
labels:
  zh: 上下文组装活动
  en: Context assembly activity
  ja: コンテキスト組立活動
semantics:
  short_definition:
    zh: 把候选信息转换成调用输入的可观察活动根类。
    en: Root activity class for observable work turning candidates into call input.
    ja: candidate を call input に変換する observable work の activity root class。
  definition:
    zh: ContextAssemblyActivity 是活动根类；ContextAssembly 表示完整运行（选择→排序→裁剪→产出 ContextPackage），ContextAssemblyPhase 表示可组合阶段（ContextSelectionActivity、ContextOrderingActivity、ContextTrimmingActivity）。规则、预算、槽位与产物不是活动子类。
    en: ContextAssemblyActivity is the activity root. ContextAssembly is a complete run (select→order→trim→emit ContextPackage); ContextAssemblyPhase covers composable stages (ContextSelectionActivity, ContextOrderingActivity, ContextTrimmingActivity). Rules, budgets, slots, and artifacts are not activity subtypes.
    ja: ContextAssemblyActivity は activity root。ContextAssembly は complete run（select→order→trim→ContextPackage 出力）。ContextAssemblyPhase は composable stage（ContextSelectionActivity/ContextOrderingActivity/ContextTrimmingActivity）。rule/budget/slot/artifact は activity subtype ではない。
  why_needed:
    zh: 活动层与产物层分离后，可追踪 Cursor 上下文组装 pipeline 各阶段而不把 messages 参数误判为活动。
    en: Separating activity from artifact layers traces Cursor context assembly pipeline stages without misclassifying messages payloads as activities.
    ja: activity/artifact 層分離で Cursor context assembly pipeline 各 stage を追跡。messages payload を activity と誤認しない。
  includes:
    - zh: 纳入具有 assembly_id、阶段轨迹、所用预算/规则与输出包引用的完整或阶段组装运行。
      en: Includes complete or phased assembly runs with assembly_id, phase trace, applied budget/rules, and output package reference.
      ja: assembly_id/phase trace/applied budget/rules/output package ref を持つ complete/phased assembly run。
  excludes:
    - zh: 排除 ContextRule、ContextBudget、ContextPackage、ContextWindow 与 ContextSlot。
      en: Excludes ContextRule, ContextBudget, ContextPackage, ContextWindow, and ContextSlot.
      ja: ContextRule/ContextBudget/ContextPackage/ContextWindow/ContextSlot を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Cursor 组装 pipeline：解析 @ refs → semantic search → recent files → 预算检查 → auto-compact；LangChain write/select/compress/isolate 各策略对应不同阶段活动；Pichay 在 inference 边界 interpose eviction/fault-in。
    en: Cursor assembly pipeline parses @ refs → semantic search → recent files → budget check → auto-compact; LangChain write/select/compress/isolate strategies map to stage activities; Pichay interposes eviction/fault-in at inference boundary.
    ja: Cursor assembly pipeline：@ refs 解析→semantic search→recent files→budget check→auto-compact。LangChain write/select/compress/isolate は各 stage activity に対応。Pichay は inference 境界で eviction/fault-in interpose。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Multi-stage context assembly before model call.
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Write, select, compress, isolate as assembly strategies.
structure:
  identity_keys:
    - assembly_id
  fields:
    - id: assembly_id
      labels:
        zh: 组装标识
        en: Assembly identifier
        ja: assembly 識別子
      definitions:
        zh: 稳定标识一次上下文组装活动或阶段运行。
        en: Stable identifier for one context assembly activity or phase run.
        ja: 一 context assembly activity/phase run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: assembly-204
      allowed_values: []
      source_claims:
        - claim-context-assembly-activity-id
  constraints: []
  required_relations: []
examples:
  - id: ContextAssemblyActivity-example-cursor-pipeline
    labels:
      zh: Cursor 组装流水线
      en: Cursor assembly pipeline
      ja: Cursor assembly pipeline
    descriptions:
      zh: assembly-204 完整运行包含 select（@ refs + search）、order（system→user→files）、trim（95% auto-compact）三阶段，产出 package-204@v2。
      en: assembly-204 complete run spans select (@ refs + search), order (system→user→files), trim (~95% auto-compact) phases, emitting package-204@v2.
      ja: assembly-204 complete run は select（@ refs+search）/order（system→user→files）/trim（95% auto-compact）三 phase。package-204@v2 出力。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: Agent pipeline
    field_values:
      assembly_id: assembly-204
    related_node_ids:
      - ContextAssemblyActivity
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-activity-cursor
  - id: ContextAssemblyActivity-example-langchain-strategies
    labels:
      zh: LangChain 策略阶段
      en: LangChain strategy phases
      ja: LangChain strategy phase
    descriptions:
      zh: LangGraph 智能体每轮执行 write（state 外置）→ select（store/RAG）→ compress（SummarizationMiddleware）→ isolate（subgraph）对应不同 ContextAssemblyPhase。
      en: LangGraph agent per turn executes write (externalize state) → select (store/RAG) → compress (SummarizationMiddleware) → isolate (subgraph) mapping to ContextAssemblyPhase types.
      ja: LangGraph agent 各 turn で write（state 外置）→select（store/RAG）→compress（SummarizationMiddleware）→isolate（subgraph）。各 ContextAssemblyPhase に対応。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: four strategies
    field_values: {}
    related_node_ids:
      - ContextAssemblyActivity
      - ContextAssemblyPhase
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-activity-langchain
  - id: ContextAssemblyActivity-example-not-package
    labels:
      zh: 活动非产物
      en: Activity is not artifact
      ja: activity は artifact ではない
    descriptions:
      zh: package-204@v2 是 immutable 输入记录；assembly-204 是形成该包的可观察运行。二者 ID 与生命周期不同。
      en: package-204@v2 is immutable input record; assembly-204 is observable run forming it. IDs and lifecycles differ.
      ja: package-204@v2 は immutable input record。assembly-204 は形成 run。ID/lifecycle 異なる。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextAssemblyActivity
      - ContextPackage
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-activity-design
parent_relation: null
relations: []
