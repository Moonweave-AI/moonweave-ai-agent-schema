schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyActivity
kind: concept
status: accepted
labels:
  zh: 上下文装配活动
  en: Context assembly activity
  ja: コンテキスト組立活動
semantics:
  short_definition:
    zh: 在一次调用范围内把候选材料转为受预算约束的模型输入工件的已执行活动。
    en: An executed activity that turns candidate material into budget-bounded model-input artifacts within one call scope.
    ja: 一つの呼び出し範囲内で候補材料を予算制約付きモデル入力工件へ変換する実行済み活動です。
  definition:
    zh: >
      ContextAssemblyActivity 是一次已发生的调用前准备活动。它读取具名 ContextArtifact 候选、ContextWindow 容量、装配策略和必要指令，执行选择、排序、裁剪、摘要或排除，产出一个或多个 ContextPackage、ContextExclusion、ContextSummary 或可见投影。它只决定“本次调用将尝试暴露什么”，不执行模型推理、不会从头检索候选、也不把原始 MessageHistory 或 MemoryRecord 本身变成模型输入。若活动未执行，只是未来计划或配置，则不应作为 ContextAssemblyActivity 记录。
    en: >
      A ContextAssemblyActivity is an occurrence of pre-invocation preparation. It reads named ContextArtifact candidates, ContextWindow capacity, assembly policy, and mandatory instructions; performs selection, ordering, trimming, summarization, or exclusion; and produces one or more ContextPackage, ContextExclusion, ContextSummary, or visible-projection artifacts. It decides only what this call will attempt to expose. It does not execute model inference, retrieve candidates from scratch, or turn raw MessageHistory or a MemoryRecord itself into model input. If it has not run and is only a future plan or configuration, it must not be recorded as ContextAssemblyActivity.
    ja: >
      ContextAssemblyActivity は呼び出し前準備の実際の発生です。名前付き ContextArtifact 候補、ContextWindow 容量、組立方針、必須指示を読み、選択、順序付け、トリミング、要約、除外を実行し、一つ以上の ContextPackage、ContextExclusion、ContextSummary、可視投影工件を生成します。この活動が決めるのは、この呼び出しが何を公開しようとするかだけです。モデル推論を実行せず、候補をゼロから検索せず、生の MessageHistory や MemoryRecord 自体をモデル入力へ変えません。未実行で将来計画または構成に過ぎない場合、ContextAssemblyActivity として記録してはなりません。
  why_needed:
    zh: 对调用前的选择与压缩建立独立活动身份，才能重放为什么某项被纳入、摘要或排除，并与检索、存储和模型生成保持因果边界。
    en: Giving pre-call selection and compression an independent activity identity enables replay of why an item was included, summarized, or excluded while preserving causal boundaries from retrieval, storage, and model generation.
    ja: 呼び出し前の選択と圧縮に独立した活動 ID を与えることで、項目が含まれた、要約された、除外された理由を再生でき、検索、保存、モデル生成との因果境界を保てます。
  includes:
    - zh: 候选读取、预算应用、选择、排序、裁剪、摘要、排除和包定稿。
      en: Candidate reading, budget application, selection, ordering, trimming, summarization, exclusion, and package finalization.
      ja: 候補読取り、予算適用、選択、順序付け、トリミング、要約、除外、パッケージ確定。
  excludes:
    - zh: 候选检索本身、长期记忆写入、模型生成、未执行计划和隐藏推理。
      en: Candidate retrieval itself, long-term memory writes, model generation, unexecuted plans, and hidden reasoning.
      ja: 候補検索そのもの、長期記憶書き込み、モデル生成、未実行計画、非公開推論。
  semantic_kind: activity
  aliases:
    - pre-invocation context preparation
    - visible-input assembly run
engineering:
  explanation:
    zh: >
      LangGraph 的实际模式是在调用模型前对 state["messages"] 做 trim、delete 或 summarize，并把结果传给模型；Semantic Kernel 通过 IChatHistoryReducer.ReduceAsync 对聊天历史做归约。实现应围绕这些真实输入和输出记录装配活动 ID、读取候选、窗口、应用策略、产出包和排除项，而不是用通用 JSON 伪装成权威 API。
    en: >
      LangGraph's real pattern trims, deletes, or summarizes state["messages"] before invoking a model and passes the result onward. Semantic Kernel reduces chat history through IChatHistoryReducer.ReduceAsync. Implementations should record an assembly activity ID, consumed candidates, window, applied policy, produced package, and exclusions around these real inputs and outputs rather than presenting generic JSON as an authoritative API.
    ja: >
      LangGraph の実パターンは、モデル呼び出し前に state["messages"] を trim、delete、summarize し、結果を渡します。Semantic Kernel は IChatHistoryReducer.ReduceAsync でチャット履歴を縮減します。実装は、汎用 JSON を権威 API と見せかけず、これら実入力・出力の周囲に組立活動 ID、消費候補、ウィンドウ、適用方針、生成パッケージ、除外を記録すべきです。
  typical_input:
    - description: LangGraph message-state transformation before an invocation.
      format: |
        visible_messages = trim_messages(
            state["messages"], strategy="last", token_counter=count_tokens_approximately,
            max_tokens=7168, start_on="human", end_on=("human", "tool")
        )
        response = model.invoke(visible_messages)
    - description: Semantic Kernel history reduction boundary.
      format: |
        Task<ChatHistory?> ReduceAsync(
            IReadOnlyList<ChatMessageContent> chatHistory,
            CancellationToken cancellationToken = default);
  typical_output:
    - description: Assembly audit record for the package later passed to a model client.
      format: |
        {
          "assembly_activity_id": "ctx-assembly-01",
          "call_scope_id": "call-support-20260719-01",
          "consumed_artifact_refs": ["ctx-art-system-1", "ctx-art-user-22"],
          "window_ref": "ctx-window-support-01",
          "result_package_ref": "ctx-pkg-support-01",
          "status": "completed"
        }
  reference_implementations:
    - name: LangGraph memory and message management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents trimming, deleting, and summarizing thread messages before model use.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents IChatHistoryReducer and truncation or summary reduction of chat history.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, entities used by activities, generated entities, and time.
  source_claims:
    - claim-context-assembly-activity-transform
    - claim-context-assembly-activity-reducer
    - claim-context-assembly-activity-provenance
structure:
  identity_keys:
    - assembly_activity_id
  fields:
    - id: assembly_activity_id
      labels:
        zh: 装配活动标识
        en: assembly activity ID
        ja: 組立活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次已执行的上下文装配发生事实，不复用为策略、包、窗口或模型调用标识。
        en: Identifies one executed context-assembly occurrence and is not reused as the ID of a policy, package, window, or model invocation.
        ja: 一つの実行済みコンテキスト組立発生を識別し、方針、パッケージ、ウィンドウ、モデル呼び出しの ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-01
      source_claims:
        - claim-context-assembly-activity-provenance
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 绑定装配活动及其结果到一次模型调用或可重放的调用准备范围。
        en: Binds the assembly occurrence and its results to one model invocation or replayable pre-invocation scope.
        ja: 組立発生と結果を一つのモデル呼び出しまたは再生可能な呼び出し前範囲に結びます。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-assembly-activity-provenance
    - id: consumed_artifact_refs
      labels:
        zh: 已读取工件引用
        en: consumed artifact references
        ja: 消費工件参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出装配活动实际读取以作决策的 ContextArtifact，而不是同主题或同一存储空间中的全部材料。
        en: Lists ContextArtifacts actually read by the assembly activity for decisions rather than all same-topic material or all material in one store.
        ja: 組立活動が判断のために実際に読んだ ContextArtifact を列挙し、同話題材料や一つのストア内の全材料を列挙しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
        - ctx-art-user-22
      source_claims:
        - claim-context-assembly-activity-provenance
    - id: window_ref
      labels:
        zh: 应用窗口引用
        en: applied window reference
        ja: 適用ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次装配遵守的 ContextWindow；没有窗口引用的活动不能证明预算合规。
        en: Points to the ContextWindow obeyed by this assembly. An activity with no window reference cannot establish budget compliance.
        ja: この組立が従う ContextWindow を指します。ウィンドウ参照のない活動は予算適合を証明できません。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-context-assembly-activity-transform
    - id: applied_policy_ref
      labels:
        zh: 应用策略引用
        en: applied policy reference
        ja: 適用方針参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向活动实际应用的 ContextSpecification 或等价版本化策略，包含选择、排序和溢出规则。
        en: Points to the ContextSpecification or equivalent versioned policy actually applied by the activity, including selection, ordering, and overflow rules.
        ja: 選択、順序付け、オーバーフロー規則を含む、活動が実際に適用した ContextSpecification または同等の版管理方針を指します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._-]+$'
      example_value: ctx-spec-support-v1
      source_claims:
        - claim-context-assembly-activity-transform
    - id: activity_status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分正在执行、已完成和失败；只有已完成并有结果包的活动可作为成功装配事实。
        en: Distinguishes running, completed, and failed states. Only a completed activity with a result package can be a successful assembly fact.
        ja: 実行中、完了、失敗を区別します。結果パッケージを持つ完了活動だけが成功組立事実になれます。
      allowed_values:
        - running
        - completed
        - failed
      pattern: null
      example_value: completed
      source_claims:
        - claim-context-assembly-activity-provenance
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录活动完成时刻；activity_status 为 completed 时必须存在，运行或失败活动可为空。
        en: Records completion time. It is required when activity_status is completed and may be empty for running or failed activity.
        ja: 活動完了時刻を記録します。activity_status が completed のとき必須で、running または failed では空にできます。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:00Z"
      source_claims:
        - claim-context-assembly-activity-provenance
  constraints:
    - id: context-assembly-activity-is-executed-and-scoped
      severity: error
      expression_language: plain
      expression: A completed ContextAssemblyActivity must have call_scope_id, nonempty consumed_artifact_refs, window_ref, applied_policy_ref, and completed_at; a plan or static configuration alone cannot satisfy this activity.
      explanation:
        zh: 本节点记录真实发生的装配，不将未来步骤或模块配置误记为执行事实。
        en: This node records assembly that actually happened and does not misrecord a future step or module configuration as an execution fact.
        ja: 本ノードは実際に起きた組立を記録し、将来ステップやモジュール構成を実行事実と誤記しません。
      source_claims:
        - claim-context-assembly-activity-provenance
    - id: context-assembly-activity-does-not-perform-model-inference
      severity: error
      expression_language: plain
      expression: ContextAssemblyActivity may prepare a ContextPackage and visible projection but must not assert that it executed model generation, performed retrieval, or wrote persistent memory unless separate activity facts establish those operations.
      explanation:
        zh: 调用前准备、候选检索、模型推理和长期写入需要独立的操作边界。
        en: Pre-call preparation, candidate retrieval, model inference, and long-term writes require separate operation boundaries.
        ja: 呼び出し前準備、候補検索、モデル推論、長期書き込みには別の操作境界が必要です。
      source_claims:
        - claim-context-assembly-activity-transform
        - claim-context-assembly-activity-reducer
examples:
  - id: context-assembly-activity-example-positive-support-call

    labels:
      zh: 已完成的支持调用装配
      en: Completed support-call assembly
      ja: 完了したサポート呼び出し組立

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      assembly_activity_id: ctx-assembly-01
      call_scope_id: call-support-20260719-01
      consumed_artifact_refs:
        - ctx-art-system-1
        - ctx-art-summary-9
        - ctx-art-user-22
      window_ref: ctx-window-support-01
      applied_policy_ref: ctx-spec-support-v1
      activity_status: completed
      completed_at: "2026-07-19T09:20:00Z"
    related_node_ids:
      - ContextAssemblyActivity
      - ContextPackage
      - ContextWindow
    related_relation_ids: []

    source_claims:
      - claim-context-assembly-activity-transform
  - id: context-assembly-activity-example-counterexample-planned-only

    labels:
      zh: 仅声明未来装配计划
      en: Declare only a future assembly plan
      ja: 将来の組立計画だけを宣言する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      assembly_activity_id: ctx-assembly-planned-01
      call_scope_id: call-support-20260719-02
      consumed_artifact_refs:
        - ctx-art-placeholder-1
      window_ref: ctx-window-support-01
      applied_policy_ref: ctx-spec-support-v1
      activity_status: running
      completed_at: null
    related_node_ids:
      - ContextAssemblyActivity
      - ContextSpecification
    related_relation_ids: []

    source_claims:
      - claim-context-assembly-activity-provenance
  - id: context-assembly-activity-example-boundary-failed-over-budget

    labels:
      zh: 因超预算而失败的装配
      en: Assembly fails because input remains over budget
      ja: 入力が予算超過のまま失敗する組立

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      assembly_activity_id: ctx-assembly-failed-01
      call_scope_id: call-support-20260719-03
      consumed_artifact_refs:
        - ctx-art-system-large
        - ctx-art-user-25
      window_ref: ctx-window-support-02
      applied_policy_ref: ctx-spec-support-v1
      activity_status: failed
      completed_at: null
    related_node_ids:
      - ContextAssemblyActivity
      - ContextWindow
      - ContextPackage
    related_relation_ids: []

    source_claims:
      - claim-context-assembly-activity-reducer
  - id: context-assembly-activity-example-instance-semantic-kernel-reduce

    labels:
      zh: 实例：Semantic Kernel 聊天记录归约
      en: "Instance: Semantic Kernel chat-history reduction"
      ja: 実例：Semantic Kernel のチャット履歴縮減

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      assembly_activity_id: ctx-assembly-sk-01
      call_scope_id: call-support-20260719-04
      consumed_artifact_refs:
        - ctx-art-chat-history-1
      window_ref: ctx-window-support-03
      applied_policy_ref: ctx-spec-support-v2
      activity_status: completed
      completed_at: "2026-07-19T09:22:00Z"
    related_node_ids:
      - ContextAssemblyActivity
      - ContextSummary
      - ContextPackage
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-activity-reducer
parent_relation: null
relations: []
sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents message trimming, deletion, and summarization before model invocation.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents IChatHistoryReducer and concrete truncation and summarization reducers.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, and temporal provenance as distinct facts.
source_claims:
  - id: claim-context-assembly-activity-transform
    source: langgraph-memory
    supports: LangGraph documents trimming, deleting, and summarizing message state before model use. Moonweave records those pre-invocation transformations as ContextAssemblyActivity occurrences distinct from retrieval, storage, and generation.
    locator: "LangGraph memory guide: trim, delete, and summarize messages before model invocation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-assembly-activity-reducer
    source: semantic-kernel-chat-history
    supports: Semantic Kernel exposes IChatHistoryReducer.ReduceAsync and truncation or summarization reducers for chat history. Moonweave uses an assembly activity to bind an actual reducer execution to applied budget and later package artifacts.
    locator: "Chat history reducers: IChatHistoryReducer.ReduceAsync and reducer implementations"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-assembly-activity-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed activity from entities it uses and generates, with temporal facts. Moonweave assigns assembly a separate activity identity, exact consumed artifacts, output artifacts, status, and completion time rather than treating a static policy as an execution event.
    locator: "PROV-O sections on Activity, Entity, prov:used, prov:wasGeneratedBy, and time"
    evidence_kind: ontology-design-inference
    confidence: high