      - ContextOrderingActivity-is_a-ContextAssemblyPhase
    expected_result:
      zh: 查询返回该阶段及其完整组装，不把二者合并。
      en: The query returns the phase and its complete assembly without merging their identities.
      ja: 照会は段階と完全組立を返し同一化しません。
    why_valid_or_invalid:
      zh: 该运行只有一种转换职责，并以 phase_id 与 assembly_id 双重定位。
      en: The run has one transformation responsibility and is located by both phase ID and assembly ID.
      ja: 一つの変換責務を持ち phase_id と assembly_id の両方で位置付けられます。
    synthetic: true
