schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyPhase
kind: concept
labels:
  zh: 上下文组装阶段
  en: Context assembly phase
  ja: コンテキスト組立段階
semantics:
  short_definition:
    zh: 完整组装内部的单一职责可组合阶段上位类。
    en: Composable single-responsibility phase genus within a complete assembly.
    ja: complete assembly 内部の single-responsibility composable phase 上位 class。
  definition:
    zh: ContextAssemblyPhase 是 ContextAssemblyActivity 的子类 genus；ContextSelectionActivity、ContextOrderingActivity、ContextTrimmingActivity 为直接子类。每阶段只承担一种转换（选/排/裁），由 ContextAssembly 按序编排，不是完整组装或 ContextRule。
    en: ContextAssemblyPhase is a subtype genus of ContextAssemblyActivity. ContextSelectionActivity, ContextOrderingActivity, and ContextTrimmingActivity are direct subtypes. Each phase owns one transformation (select/order/trim), orchestrated by ContextAssembly in sequence—not a complete assembly or ContextRule.
    ja: ContextAssemblyPhase は ContextAssemblyActivity subtype genus。ContextSelectionActivity/ContextOrderingActivity/ContextTrimmingActivity が direct subtype。各 phase は一 transformation（select/order/trim）のみ担当。ContextAssembly が順序 orchestrate。complete assembly/ContextRule ではない。
  why_needed:
    zh: 阶段分离让检索排名、最终顺序与容量裁剪可分别审计，避免 Cursor pipeline 各步混为黑盒。
    en: Phase separation lets retrieval ranking, final order, and capacity trimming be audited separately, avoiding a black-box Cursor pipeline.
    ja: phase 分離で retrieval ranking/final order/capacity trimming を個別監査。Cursor pipeline 各 step の black-box 化を回避。
  includes:
    - zh: 纳入 ContextSelectionActivity、ContextOrderingActivity、ContextTrimmingActivity 三类阶段运行。
      en: Includes ContextSelectionActivity, ContextOrderingActivity, and ContextTrimmingActivity phase runs.
      ja: ContextSelectionActivity/ContextOrderingActivity/ContextTrimmingActivity 三 phase run。
  excludes:
    - zh: 排除完整 ContextAssembly、ContextRefreshEvent 触发器与 ContextPackage 产物。
      en: Excludes complete ContextAssembly, ContextRefreshEvent triggers, and ContextPackage artifacts.
      ja: complete ContextAssembly/ContextRefreshEvent trigger/ContextPackage artifact を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 典型顺序：ContextSelection（RAG + @ refs + 权限）→ ContextOrdering（system→user→assistant + recency）→ ContextTrimming（auto-compact/tail-drop/Pichay eviction）。LangChain select/compress 分别映射前两阶段与末阶段。
    en: "Typical order: ContextSelection (RAG + @ refs + auth) → ContextOrdering (system→user→assistant + recency) → ContextTrimming (auto-compact/tail-drop/Pichay eviction). LangChain select/compress map to first and last phases."
    ja: 典型順序：ContextSelection（RAG+@ refs+auth）→ContextOrdering（system→user→assistant+recency）→ContextTrimming（auto-compact/tail-drop/Pichay eviction）。LangChain select/compress は初段と終段に写像。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Select and compress as distinct strategies.
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Multi-step assembly before inference.
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: Phase identifier
        ja: phase 識別子
      definitions:
        zh: 稳定标识一次组装阶段运行。
        en: Stable identifier for one assembly phase run.
        ja: 一 assembly phase run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: phase-select-204
      allowed_values: []
      source_claims:
        - claim-context-assembly-phase-id
    - id: phase_kind
      labels:
        zh: 阶段类型
        en: Phase kind
        ja: phase kind
      definitions:
        zh: 阶段职责枚举：selection、ordering、trimming。
        en: Phase responsibility enum selection, ordering, trimming.
        ja: selection/ordering/trimming の phase 責務 enum。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: selection
      allowed_values: []
      source_claims:
        - claim-context-assembly-phase-kind
  constraints: []
  required_relations: []
examples:
  - id: ContextAssemblyPhase-example-cursor-sequence
    labels:
      zh: Cursor 三阶段序列
      en: Cursor three-phase sequence
      ja: Cursor 三 phase 序列
    descriptions:
      zh: assembly-204 内 phase-select-204 → phase-order-204 → phase-trim-204 依次执行；trim 在 95% 触发 self-summarize。
      en: Within assembly-204, phase-select-204 → phase-order-204 → phase-trim-204 run sequentially; trim triggers self-summarize at 95%.
      ja: assembly-204 内 phase-select-204→phase-order-204→phase-trim-204 順次実行。trim は 95% で self-summarize 発火。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: pipeline phases
    field_values:
      phase_id: phase-select-204
      phase_kind: selection
    related_node_ids:
      - ContextAssemblyPhase
      - ContextSelectionActivity
      - ContextOrderingActivity
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-phase-cursor
  - id: ContextAssemblyPhase-example-langchain
    labels:
      zh: LangChain 策略映射
      en: LangChain strategy mapping
      ja: LangChain strategy 写像
    descriptions:
      zh: select 策略 → ContextSelectionActivity；ordering 由 middleware 默认 role 顺序 → ContextOrderingActivity；SummarizationMiddleware → ContextTrimmingActivity。
      en: select strategy → ContextSelectionActivity; ordering via middleware default role order → ContextOrderingActivity; SummarizationMiddleware → ContextTrimmingActivity.
      ja: select strategy→ContextSelectionActivity。middleware 默认 role order→ContextOrderingActivity。SummarizationMiddleware→ContextTrimmingActivity。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: strategies
    field_values: {}
    related_node_ids:
      - ContextAssemblyPhase
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-phase-langchain
  - id: ContextAssemblyPhase-example-not-complete
    labels:
      zh: 阶段非完整组装
      en: Phase is not complete assembly
      ja: phase は complete assembly ではない
    descriptions:
      zh: phase-trim-88 只执行裁剪，不跨越 select/order；assembly-88 才是完整运行。单阶段不得归类为 ContextAssembly。
      en: phase-trim-88 only trims without spanning select/order; assembly-88 is the complete run. Single phase must not classify as ContextAssembly.
      ja: phase-trim-88 は trim のみで select/order 非跨ぎ。assembly-88 が complete run。single phase を ContextAssembly に分類不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextAssemblyPhase
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-phase-design
parent_relation:
  id: ContextAssemblyPhase-is_a-ContextAssemblyActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文组装活动
    en: is a context assembly activity
    ja: コンテキスト組立活動の一種
  definitions:
    zh: 每个 ContextAssemblyPhase 都是 ContextAssemblyActivity；其种差是单一职责的可组合阶段而非完整运行。
    en: Every ContextAssemblyPhase is a ContextAssemblyActivity distinguished as a single-responsibility composable phase, not a complete run.
    ja: すべての ContextAssemblyPhase は ContextAssemblyActivity で single-responsibility composable phase（complete run ではない）という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
