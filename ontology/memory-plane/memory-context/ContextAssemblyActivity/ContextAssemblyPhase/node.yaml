      en: ctx-assemble-88 performs selection, ordering, and trimming and emits the final package; because it spans the full pipeline, it is not one ContextAssemblyPhase.
      ja: ctx-assemble-88 は選択・整列・裁断を行い最終包を生成して全段階を跨ぐため、一つの ContextAssemblyPhase ではありません。
