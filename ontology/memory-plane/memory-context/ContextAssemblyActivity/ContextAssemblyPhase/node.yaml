    why_valid_or_invalid:
      zh: 完整运行与单一职责阶段具有不同范围和身份键。
      en: A complete run and a single-responsibility phase have different scopes and identity keys.
      ja: 完全実行と単一責務段階は異なる範囲・同一性キーを持ちます。
    synthetic: true
