schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyPhase
kind: concept
status: accepted
labels:
  zh: 上下文装配阶段活动
  en: Context assembly phase activity
  ja: コンテキスト組立段階活動
semantics:
  short_definition:
    zh: 属于一次具体装配、执行一个命名装配步骤的子活动。
    en: A subactivity belonging to one concrete assembly and executing one named assembly step.
    ja: 一つの具体的組立に属し、一つの名前付き組立手順を実行する部分活動です。
  definition:
    zh: >
      ContextAssemblyPhase 是一个已执行的 ContextAssemblyActivity 子类型，表示一次具体 ContextAssembly 内的 selection、ordering、trimming 或 rendering 子步骤。它必须关联父装配、调用范围、阶段种类、顺序索引、状态和时间。阶段不是静态流程图标签，也不是 ContextSpecification 中的规则；它是已发生的子活动。一个阶段可失败或完成，但只有完成阶段的输出才可被下一阶段使用。阶段划分是 Moonweave 的可审计编排层，不声称 LangGraph、Semantic Kernel 或提供方 API 都暴露同名阶段对象。
    en: >
      A ContextAssemblyPhase is an executed ContextAssemblyActivity subtype representing a selection, ordering, trimming, or rendering substep within one concrete ContextAssembly. It must link to parent assembly, call scope, phase kind, order index, status, and time. A phase is not a static flowchart label or a rule in ContextSpecification; it is an occurrence of a subactivity. A phase can fail or complete, but only completed-phase output can feed a later phase. Phase separation is Moonweave's auditable orchestration layer and does not claim that LangGraph, Semantic Kernel, or provider APIs expose objects with these names.
    ja: >
      ContextAssemblyPhase は、具体的 ContextAssembly 内の selection、ordering、trimming、rendering の部分手順を表す実行済み ContextAssemblyActivity 下位型です。親組立、呼び出し範囲、段階種別、順序索引、状態、時刻に結び付かなければなりません。段階は静的フローチャートラベルや ContextSpecification 内の規則ではなく、部分活動の発生です。段階は失敗または完了できますが、後続段階へ渡せるのは完了段階の出力だけです。段階分離は Moonweave の監査可能なオーケストレーション層であり、LangGraph、Semantic Kernel、プロバイダー API が同名オブジェクトを公開すると主張しません。
  why_needed:
    zh: 将装配拆成已执行的阶段，可诊断失败发生在候选选择、顺序、预算裁剪还是渲染，而无需把所有变化压缩成一个不可解释的调用前操作。
    en: Splitting assembly into executed phases diagnoses whether failure occurred in candidate selection, order, budget trimming, or rendering instead of compressing every change into one opaque pre-call operation.
    ja: 組立を実行済み段階に分けることで、すべての変更を不透明な一つの呼び出し前操作へ圧縮せず、候補選択、順序、予算裁断、描画のどこで失敗したかを診断できます。
  includes:
    - zh: 对父装配的关联、阶段种类、阶段顺序、状态、开始与完成事实。
      en: Linkage to parent assembly, phase kind, phase order, status, and start or completion facts.
      ja: 親組立への関連、段階種別、段階順、状態、開始または完了事実。
  excludes:
    - zh: 未执行流程文档、静态策略规则、整个装配活动、模型推理和最终响应。
      en: Unexecuted process documentation, static policy rules, the whole assembly activity, model inference, and final response.
      ja: 未実行プロセス文書、静的方針規則、組立活動全体、モデル推論、最終応答。
  semantic_kind: activity
  aliases:
    - assembly substep
    - context preparation phase
engineering:
  explanation:
    zh: >
      实现中可将 LangGraph 的状态变换或 Semantic Kernel reducer 调用包装为阶段审计：先记录选择的候选，再记录排序，之后记录裁剪或摘要，最后冻结渲染包。真实框架 API 仍是 trim_messages、RemoveMessage 或 ReduceAsync；phase 记录仅提供跨实现的一致可观察顺序，不虚构框架对象。
    en: >
      Implement phases as audit wrappers around LangGraph state transformations or Semantic Kernel reducer calls: record selected candidates, then ordering, then trimming or summary, and finally freeze the rendered package. The real framework APIs remain trim_messages, RemoveMessage, or ReduceAsync. Phase records supply a consistent observable order across implementations without inventing framework objects.
    ja: >
      LangGraph 状態変換または Semantic Kernel リデューサー呼び出しの監査ラッパーとして段階を実装します。選択候補、順序付け、裁断または要約、最後に描画パッケージの固定を記録します。実フレームワーク API は trim_messages、RemoveMessage、ReduceAsync のままです。段階記録はフレームワークオブジェクトを発明せず、実装横断で一貫した観測順を提供します。
  typical_input:
    - description: LangGraph transformations that can be audited as ordered substeps.
      format: |
        messages = trim_messages(
            state["messages"], strategy="last", max_tokens=7168,
            token_counter=count_tokens_approximately
        )
        response = model.invoke(messages)
    - description: Phase audit envelope around a real reducer call.
      format: |
        {
          "assembly_ref": "ctx-assembly-support-01",
          "phase_kind": "trimming",
          "phase_index": 2,
          "reducer": "IChatHistoryReducer.ReduceAsync"
        }
  typical_output:
    - description: Completed phase occurrence used by the next assembly phase.
      format: |
        {
          "phase_activity_id": "ctx-phase-trim-01",
          "assembly_ref": "ctx-assembly-support-01",
          "phase_kind": "trimming",
          "phase_index": 2,
          "phase_status": "completed",
          "completed_at": "2026-07-19T09:20:02Z"
        }
  reference_implementations:
    - name: LangGraph conversation-history management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents ordered message transformations before a model invocation.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents reducer calls that truncate or summarize history before completion.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Supports distinct activities, entities, time, and derivation facts for workflow subactivities.
  source_claims:
    - claim-context-phase-transform-sequence
    - claim-context-phase-reducer
    - claim-context-phase-provenance
structure:
  identity_keys:
    - assembly_activity_id
    - phase_activity_id
  fields:
    - id: phase_activity_id
      labels:
        zh: 阶段活动标识
        en: phase activity ID
        ja: 段階活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次具体执行的装配子活动，不复用为父装配、策略或阶段种类标识。
        en: Identifies one concrete executed assembly subactivity and is not reused as parent assembly, policy, or phase-kind ID.
        ja: 一つの具体的実行済み組立部分活動を識別し、親組立、方針、段階種別の ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-phase-[A-Za-z0-9._-]+$'
      example_value: ctx-phase-trim-01
      source_claims:
        - claim-context-phase-provenance
    - id: assembly_ref
      labels:
        zh: 父装配引用
        en: parent assembly reference
        ja: 親組立参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该阶段所属的具体 ContextAssembly，而不是抽象活动类型或模块。
        en: Points to the concrete ContextAssembly to which this phase belongs, not an abstract activity type or module.
        ja: この段階が属する具体的 ContextAssembly を指し、抽象活動型やモジュールを指しません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-support-01
      source_claims:
        - claim-context-phase-provenance
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必须与父装配及其窗口、包的调用范围一致。
        en: Must match the call scope of parent assembly and its window and package.
        ja: 親組立とそのウィンドウ・パッケージの呼び出し範囲に一致しなければなりません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-phase-provenance
    - id: phase_kind
      labels:
        zh: 阶段种类
        en: phase kind
        ja: 段階種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明此次子活动执行选择、排序、裁剪或渲染；它不是静态工作流建议。
        en: States whether this subactivity executed selection, ordering, trimming, or rendering. It is not a static workflow recommendation.
        ja: この部分活動が selection、ordering、trimming、rendering のどれを実行したかを示します。静的ワークフロー推奨ではありません。
      allowed_values:
        - selection
        - ordering
        - trimming
        - rendering
      pattern: null
      example_value: trimming
      source_claims:
        - claim-context-phase-transform-sequence
    - id: phase_index
      labels:
        zh: 阶段顺序索引
        en: phase order index
        ja: 段階順序索引
      datatype: integer
      required: true
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 标识本阶段在父装配实际发生序列中的位置；同一父装配中已完成阶段不得重用同一索引。
        en: Identifies this phase's position in the parent assembly's actual occurrence sequence. Completed phases in one parent assembly cannot reuse an index.
        ja: 親組立の実際の発生列におけるこの段階の位置を識別します。同一親組立の完了段階は同じ索引を再利用できません。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-context-phase-transform-sequence
    - id: phase_status
      labels:
        zh: 阶段状态
        en: phase status
        ja: 段階状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分运行、完成和失败；失败阶段不能被表示为后续阶段已使用的成功输入。
        en: Distinguishes running, completed, and failed. A failed phase cannot be represented as successful input used by a later phase.
        ja: 実行中、完了、失敗を区別します。失敗段階を後続段階が使用した成功入力として表してはいけません。
      allowed_values:
        - running
        - completed
        - failed
      pattern: null
      example_value: completed
      source_claims:
        - claim-context-phase-provenance
    - id: completed_at
      labels:
        zh: 阶段完成时间
        en: phase completed at
        ja: 段階完了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录阶段完成时刻；phase_status 为 completed 时必须存在。
        en: Records phase completion time and is required when phase_status is completed.
        ja: 段階完了時刻を記録し、phase_status が completed のとき必須です。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:02Z"
      source_claims:
        - claim-context-phase-provenance
    - id: assembly_activity_id
      labels:
        zh: 父装配活动标识
        en: parent assembly activity ID
        ja: 親組み立て活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该阶段所属的已执行 ContextAssemblyActivity，保留活动身份而不以 assembly_ref 的关联代替继承身份。
        en: Identifies the executed ContextAssemblyActivity that owns this phase, retaining activity identity rather than using assembly_ref as a substitute.
        ja: このフェーズを所有する実行済み ContextAssemblyActivity を識別し、assembly_ref を継承した活動 ID の代用にしません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-activity-support-01
      source_claims:
        - claim-context-phase-provenance
    - id: consumed_artifact_refs
      labels:
        zh: 父活动已消费工件引用
        en: parent activity consumed artifact references
        ja: 親活動で消費したアーティファクト参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 保留父装配活动实际消费的工件集合，使阶段的局部输入不会被误认为是整个活动的唯一输入。
        en: Retains the artifacts actually consumed by the parent assembly activity so a phase's local input is not mistaken for the activity's entire input.
        ja: 親組み立て活動が実際に消費したアーティファクトを保持し、フェーズの局所入力を活動全体の唯一の入力と取り違えません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
      source_claims:
        - claim-context-phase-transform-sequence
    - id: window_ref
      labels:
        zh: 父活动窗口引用
        en: parent activity window reference
        ja: 親活動のウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留父活动依据的 ContextWindow，以便阶段结果能在同一容量边界下解释，而不把阶段本身变成窗口。
        en: Retains the ContextWindow used by the parent activity so phase results are interpreted under the same capacity boundary without making the phase itself a window.
        ja: 親活動が使った ContextWindow を保持し、フェーズ結果を同じ容量境界で解釈できるようにします。フェーズ自体をウィンドウにはしません。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-context-phase-transform-sequence
    - id: applied_policy_ref
      labels:
        zh: 父活动已应用策略引用
        en: parent activity applied policy reference
        ja: 親活動の適用済み方針参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录支配父装配执行的版本化策略；阶段可有自己的规则引用，但不能丢失活动层面的策略绑定。
        en: Records the versioned policy governing the parent assembly execution; a phase may have its own rule reference but cannot lose the activity-level policy binding.
        ja: 親組み立て実行を支配する版付き方針を記録します。フェーズは独自の規則参照を持てますが、活動レベルの方針結合を失うことはできません。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._@-]+$'
      example_value: ctx-spec-support-v1
      source_claims:
        - claim-context-phase-reducer
    - id: activity_status
      labels:
        zh: 父活动状态
        en: parent activity status
        ja: 親活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留父装配活动的执行状态，避免把一个完成阶段错误解释为整个装配已经成功完成。
        en: Retains the parent assembly activity's execution status, preventing one completed phase from being read as a successful complete assembly.
        ja: 親組み立て活動の実行状態を保持し、一つの完了フェーズを組み立て全体の成功と誤読しないようにします。
      allowed_values:
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-context-phase-provenance
  constraints:
    - id: context-assembly-phase-is-executed-part-of-one-assembly
      severity: error
      expression_language: plain
      expression: ContextAssemblyPhase must identify assembly_ref, matching call_scope_id, phase_kind, phase_index, and phase_status. Completed phase requires completed_at and cannot duplicate phase_index of another completed phase in that assembly.
      explanation:
        zh: 阶段是实际发生的有序子活动，而不是未绑定父装配的流程标签。
        en: A phase is an actual ordered subactivity, not a process label unbound from parent assembly.
        ja: 段階は実際に起きた順序付き部分活動であり、親組立に結び付かないプロセスラベルではありません。
      source_claims:
        - claim-context-phase-provenance
    - id: context-assembly-phase-does-not-mean-entire-assembly
      severity: error
      expression_language: plain
      expression: A phase must not be asserted as the entire ContextAssembly, the static policy, model invocation, or final response. Its output and successor phase require separate facts.
      explanation:
        zh: 子活动、策略、调用和生成拥有不同粒度和因果边界。
        en: Subactivity, policy, invocation, and generation have different granularity and causal boundaries.
        ja: 部分活動、方針、呼び出し、生成は異なる粒度と因果境界を持ちます。
      source_claims:
        - claim-context-phase-transform-sequence
examples:
  - id: context-assembly-phase-example-positive-trimming-phase

    labels:
      zh: 完成的历史裁剪阶段
      en: Completed history-trimming phase
      ja: 完了した履歴トリミング段階

    descriptions:
      zh: Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。
      en: Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering.
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      assembly_activity_id: ctx-assembly-activity-support-01
      phase_activity_id: ctx-phase-trim-01
      assembly_ref: ctx-assembly-support-01
      call_scope_id: call-support-20260719-01
      consumed_artifact_refs:
        - ctx-art-system-1
        - ctx-art-summary-9
        - ctx-art-user-22
      window_ref: ctx-window-support-01
      applied_policy_ref: ctx-spec-support-v1
      activity_status: completed
      phase_kind: trimming
      phase_index: 2
      phase_status: completed
      completed_at: "2026-07-19T09:20:02Z"
    related_node_ids:
      - ContextAssemblyPhase
      - ContextAssembly
      - ContextTrimmingActivity
    related_relation_ids:
      - ContextAssemblyPhase-part-of-ContextAssembly

    source_claims:
      - claim-context-phase-transform-sequence
  - id: context-assembly-phase-example-counterexample-static-workflow-label

    labels:
      zh: 将流程图中的“选择”当作已执行阶段
      en: Treat a flowchart “selection” label as executed phase
      ja: フローチャートの「selection」ラベルを実行済み段階として扱う

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      phase_activity_id: ctx-phase-static-selection
      assembly_ref: ctx-assembly-placeholder
      call_scope_id: call-support-20260719-02
      phase_kind: selection
      phase_index: 0
      phase_status: running
      completed_at: null
    related_node_ids:
      - ContextAssemblyPhase
      - ContextSpecification
    related_relation_ids:
      - ContextAssemblyPhase-part-of-ContextAssembly

    source_claims:
      - claim-context-phase-provenance
  - id: context-assembly-phase-example-boundary-failed-selection

    labels:
      zh: 失败的候选选择阶段
      en: Failed candidate-selection phase
      ja: 失敗した候補選択段階

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      phase_activity_id: ctx-phase-select-failed-01
      assembly_ref: ctx-assembly-failed-02
      call_scope_id: call-support-20260719-03
      phase_kind: selection
      phase_index: 0
      phase_status: failed
      completed_at: null
    related_node_ids:
      - ContextAssemblyPhase
      - ContextSelectionActivity
      - ContextAssembly
    related_relation_ids:
      - ContextAssemblyPhase-part-of-ContextAssembly

    source_claims:
      - claim-context-phase-provenance
  - id: context-assembly-phase-example-instance-semantic-kernel-reducer

    labels:
      zh: 实例：Semantic Kernel 归约调用作为阶段
      en: "Instance: Semantic Kernel reducer call as phase"
      ja: 実例：段階としての Semantic Kernel リデューサー呼び出し

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      assembly_activity_id: ctx-assembly-activity-sk-01
      phase_activity_id: ctx-phase-sk-trim-01
      assembly_ref: ctx-assembly-sk-01
      call_scope_id: call-support-20260719-04
      consumed_artifact_refs:
        - ctx-art-chat-history-1
      window_ref: ctx-window-support-03
      applied_policy_ref: ctx-spec-support-v2
      activity_status: completed
      phase_kind: trimming
      phase_index: 1
      phase_status: completed
      completed_at: "2026-07-19T09:22:01Z"
    related_node_ids:
      - ContextAssemblyPhase
      - ContextAssembly
      - ContextTrimmingActivity
    related_relation_ids:
      - ContextAssemblyPhase-part-of-ContextAssembly
    source_claims:
      - claim-context-phase-reducer
parent_relation:
  id: ContextAssemblyPhase-specializes-ContextAssemblyActivity
  predicate: is_a
  target: concept:ContextAssemblyActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
