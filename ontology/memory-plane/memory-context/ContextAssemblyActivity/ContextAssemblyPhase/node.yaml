schema: moonweave.ai/ontology-node/v1
id: ContextAssemblyPhase
kind: concept
status: accepted
labels:
  zh: 上下文组装阶段
  en: context assembly phase
  ja: コンテキスト組立段階
semantics:
  short_definition:
    zh: 在完整上下文组装内完成一种可独立追踪转换职责的 ContextAssemblyActivity。
    en: A ContextAssemblyActivity that performs one independently traceable transformation responsibility inside a complete assembly.
    ja: 完全組立内で一つの独立追跡可能な変換責務を行う ContextAssemblyActivity です。
  definition:
    zh: ContextAssemblyPhase 是一种 ContextAssemblyActivity；其种差是：它以 phase_id 标识，作为一个 ContextAssembly 的组成活动，只负责一种可验证转换职责，并具有明确输入输出与前后次序。ContextSelectionActivity、ContextOrderingActivity 与 ContextTrimmingActivity 是其下位类型；阶段不是完整 ContextAssembly。
    en: A ContextAssemblyPhase is a ContextAssemblyActivity identified by phase_id and composed into one ContextAssembly. Its differentia is responsibility for exactly one verifiable transformation, with explicit inputs, outputs, and ordering. ContextSelectionActivity, ContextOrderingActivity, and ContextTrimmingActivity are subtypes; a phase is not the complete ContextAssembly.
    ja: ContextAssemblyPhase は phase_id で識別され一つの ContextAssembly に組み込まれる ContextAssemblyActivity です。一つの検証可能変換責務だけを担い、明示入力・出力・順序を持ちます。選択・整列・裁断活動が下位型で、段階は完全 ContextAssembly ではありません。
  why_needed:
    zh: 该中间层消除三个“A-活动”平铺在完整组装旁边的漏级，并允许阶段共享输入、输出、顺序和运行身份约束。
    en: This intermediate level removes the missing level that flattened three phase activities beside the complete assembly and gives phases shared input, output, ordering, and run-identity constraints.
    ja: 三つの段階活動を完全組立と同列化する欠落階層を解消し、入力・出力・順序・実行同一性制約を共有させます。
  includes:
    - zh: 纳入具有 phase_id、所属 assembly_id、单一阶段职责、输入输出与序位的选择、排序和裁剪阶段。
      en: Includes selection, ordering, and trimming phases with phase ID, owning assembly ID, one phase responsibility, explicit inputs and outputs, and position.
      ja: phase_id、所属 assembly_id、一段階責務、入出力、順序を持つ選択・整列・裁断段階を含みます。
  excludes:
    - zh: 排除覆盖全部阶段的 ContextAssembly、无执行身份的 ContextRule，以及作为结果的 ContextPackage。
      en: Excludes a ContextAssembly covering the complete pipeline, a ContextRule without execution identity, and the resulting ContextPackage.
      ja: 全段階を覆う ContextAssembly、実行同一性のない ContextRule、結果の ContextPackage を除外します。
  semantic_kind: activity
  aliases: []
