sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents ordered transformations of message state before model calls.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents real reducer calls that truncate or summarize histories.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Provides activity/entity and provenance concepts used to model executed subactivities.
source_claims:
  - id: claim-context-phase-transform-sequence
    source: langgraph-memory
    supports: LangGraph documents an ordered pre-invocation message transformation path including trimming, deletion, and summarization. Moonweave records actual selection, ordering, trimming, and rendering substeps as phases without claiming framework-native phase objects.
    locator: "LangGraph memory guide: managing messages before model invocation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-phase-reducer
    source: semantic-kernel-chat-history
    supports: Semantic Kernel exposes reducer calls that truncate or summarize chat history. Moonweave can record one such actual call as a trimming phase inside a larger assembly while retaining the framework's real API surface.
    locator: "Chat history reducers: IChatHistoryReducer and concrete reducers"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-phase-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes activities and temporal provenance facts. Moonweave gives each executed assembly phase an identity, parent assembly, sequence index, status, and time instead of treating an abstract process diagram as execution evidence.
    locator: "PROV-O Activity, Entity, and temporal provenance sections"
    evidence_kind: ontology-design-inference
    confidence: high
