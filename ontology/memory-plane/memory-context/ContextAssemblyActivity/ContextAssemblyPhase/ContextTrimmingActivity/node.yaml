sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents trim_messages with token counters, max tokens, and message-boundary controls.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents truncation reducers, summarization reducers, and system-message preservation.
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents oldest-message truncation, disabled errors, lower token limits, and retention-ratio truncation.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines an executed activity, its used entities, outputs, and temporal provenance as separate facts.
source_claims:
  - id: claim-context-trimming-langgraph-api
    source: langgraph-memory
    supports: LangGraph documents trim_messages with strategy, token_counter, max_tokens, and message-boundary options before model invocation. Moonweave records one actual trim as a budget-bounded activity with retained and excluded representation artifacts.
    locator: "LangGraph memory guide: trim_messages arguments and invocation example"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-trimming-semantic-kernel-api
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents ChatHistoryTruncationReducer and ChatHistorySummarizationReducer, the latter summarizing removed content and adding one summary message while preserving system messages. Moonweave distinguishes pure trim from summary replacement and keeps summary provenance separate from memory persistence.
    locator: "Chat-history reducers: truncation reducer and summarization reducer"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-trimming-openai-overflow
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents dropping oldest messages when conversation input exceeds its limit, optional disabled errors, and retention-ratio behavior. Moonweave treats this as call-scoped visibility reduction rather than source deletion.
    locator: "Realtime truncation configuration and oldest-message exclusion"
    evidence_kind: ontology-design-inference
    confidence: high
