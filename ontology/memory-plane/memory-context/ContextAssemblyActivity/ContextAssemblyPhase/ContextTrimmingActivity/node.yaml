      en: trim-17 receives an ordered set using 22,400 tokens and, under a 20,000-token budget, removes lowest-priority evidence-2 and replaces an older conversation extent with summary-v6 while preserving provenance references.
      ja: trim-17 は22,400 tokensの順序済み集合を受け、20,000-token予算下で最低優先 evidence-2 を除き、旧会話範囲を summary-v6 へ置換し来歴参照を保持します。
