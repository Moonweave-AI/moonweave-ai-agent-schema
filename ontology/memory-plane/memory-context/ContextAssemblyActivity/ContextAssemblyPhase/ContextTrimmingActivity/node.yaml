schema: moonweave.ai/ontology-node/v1
id: ContextTrimmingActivity
kind: concept
labels:
  zh: 上下文裁剪活动
  en: Context trimming activity
  ja: コンテキスト裁断活動
semantics:
  short_definition:
    zh: 使已排序内容满足 token 预算的组装阶段。
    en: Assembly phase making ordered content fit the token budget.
    ja: ordered content を token 予算内に収める assembly phase。
  definition:
    zh: ContextTrimmingActivity 是 ContextAssemblyPhase；在保留 source_ref 与相对顺序前提下，通过 summarization（Claude autoCompact、/compact）、tail-drop（token overflow 从尾部丢弃）或 Pichay eviction（占位符替换 stale tool output）使内容满足 ContextBudget。它产出 ContextSummary 与 ContextExclusion，不重新选择或重排未裁剪项。
    en: ContextTrimmingActivity is a ContextAssemblyPhase that, preserving source_ref and relative order, fits content to ContextBudget via summarization (Claude autoCompact, /compact), tail-drop (token overflow drops from tail), or Pichay eviction (placeholder replacement for stale tool output). It emits ContextSummary and ContextExclusion without re-selecting or reordering uncut items.
    ja: ContextTrimmingActivity は source_ref/相対順序保持のまま summarization（Claude autoCompact//compact）/tail-drop（token overflow 尾部 drop）/Pichay eviction（stale tool output placeholder 化）で ContextBudget 適合させる ContextAssemblyPhase。ContextSummary/ContextExclusion 出力。未裁剪 item の re-select/re-order なし。
  why_needed:
    zh: 裁剪独立后可区分“因 budget 被摘要”与“因相关性未纳入”，并审计 Claude 95% auto-compact 阈值行为。
    en: Separate trimming distinguishes budget-driven summarization from relevance-driven omission and audits Claude ~95% auto-compact threshold behavior.
    ja: trimming 独立で budget  driven summarization と relevance driven omission を区別。Claude 約 95% auto-compact 閾値行動を監査可能。
  includes:
    - zh: 纳入应用 ContextBudget、产生 ContextSummary 或 tail-drop ContextExclusion 的裁剪阶段。
      en: Includes trimming phases applying ContextBudget, producing ContextSummary or tail-drop ContextExclusions.
      ja: ContextBudget 適用し ContextSummary/tail-drop ContextExclusion を生成する trimming phase。
  excludes:
    - zh: 排除候选选择、顺序分配与 ContextBudget 规范本身。
      en: Excludes candidate selection, order assignment, and ContextBudget specification itself.
      ja: candidate selection/order assignment/ContextBudget 仕様自体を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "Claude Code autoCompact 在约 95% effective window（CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 可调整）触发 summarization；tail-drop 从最低 priority ordinal 移除 slot；Pichay 逐出 stale Read 结果为 paged-out 占位符；Context Recycling 超 L1 budget 时 offload 回 L3。"
    en: "Claude Code autoCompact triggers summarization near ~95% effective window (CLAUDE_AUTOCOMPACT_PCT_OVERRIDE adjustable); tail-drop removes lowest-priority ordinals; Pichay evicts stale Read results to paged-out placeholders; Context Recycling offloads to L3 when exceeding L1 budget."
    ja: "Claude autoCompact は約 95% 実効 window（CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 調整可）で summarization 発火。tail-drop は最低 priority ordinal 削除。Pichay は stale Read を paged-out placeholder 化。Context Recycling は L1 超過で L3 offload。"
  typical_input:
    - description: Ordered content exceeding budget
      format: |
        {
          "ordered_tokens": 135000,
          "capacity_ceiling": 128000,
          "system_reservation": 4096,
          "overflow_action": "summarize_then_trim"
        }
      source_claims: [claim-context-trimming-budget]
  typical_output:
    - description: Trim outcomes
      format: |
        {
          "context_summary_ref": "summary-v6",
          "exclusions": [{"reason": "capacity-insufficient", "required_tokens": 1200, "available_tokens": 400}],
          "post_trim_tokens": 127200
        }
      source_claims: [claim-context-trimming-design]
  reference_implementations:
    - name: Claude Code auto-compact
      url: https://code.claude.com/docs/en/context-window
      description: Threshold summarization at ~95%.
    - name: Cursor Self-Summarization
      url: https://cursor.com/blog/self-summarization
      description: Auto-compact near context limits.
    - name: Pichay Demand Paging
      url: https://arxiv.org/abs/2603.09023
      description: Eviction with placeholder replacement.
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: Phase identifier
        ja: phase 識別子
      definitions:
        zh: 稳定标识一次裁剪阶段运行。
        en: Stable identifier for one trimming phase run.
        ja: 一 trimming phase run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: phase-trim-88
      allowed_values: []
      source_claims:
        - claim-context-trimming-id
    - id: trim_strategy
      labels:
        zh: 裁剪策略
        en: Trim strategy
        ja: trim strategy
      definitions:
        zh: 本次裁剪使用的主要机制：summarization、tail_drop、paged_out_eviction、offload_to_disk。
        en: Primary mechanism used summarization, tail_drop, paged_out_eviction, offload_to_disk.
        ja: summarization/tail_drop/paged_out_eviction/offload_to_disk 等 primary mechanism。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: summarization
      allowed_values: []
      source_claims:
        - claim-context-trimming-strategy
    - id: pre_trim_tokens
      labels:
        zh: 裁剪前 token
        en: Pre-trim tokens
        ja: pre-trim tokens
      definitions:
        zh: 裁剪前已排序内容的总 token 消耗。
        en: Total token consumption of ordered content before trimming.
        ja: trimming 前 ordered content の total token 消費。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 135000
      allowed_values: []
      source_claims:
        - claim-context-trimming-tokens
  constraints: []
  required_relations: []
examples:
  - id: ContextTrimmingActivity-example-claude-autocompact
    labels:
      zh: Claude autoCompact 裁剪
      en: Claude autoCompact trimming
      ja: Claude autoCompact trimming
    descriptions:
      zh: phase-trim-88 在 95% 阈值触发 summarization：turn 1–24 → summary-v6，保留 compact_boundary 之后消息；trim_strategy=summarization，package 版本 2→3。
      en: phase-trim-88 triggers summarization at 95% threshold turns 1–24 → summary-v6, preserving post-compact_boundary messages; trim_strategy=summarization, package version 2→3.
      ja: phase-trim-88 が 95% 閾値で summarization 発火。turn 1–24→summary-v6。compact_boundary 以降保持。trim_strategy=summarization。package 2→3。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact
    field_values:
      phase_id: phase-trim-88
      trim_strategy: summarization
      pre_trim_tokens: 190000
    related_node_ids:
      - ContextTrimmingActivity
      - ContextSummary
    related_relation_ids: []
    source_claims:
      - claim-context-trimming-claude
  - id: ContextTrimmingActivity-example-tail-drop
    labels:
      zh: Token overflow tail-drop
      en: Token overflow tail-drop
      ja: token overflow tail-drop
    descriptions:
      zh: phase-trim-204 在 system 预留后 available=400 tokens；最低 priority slot 7–8（semantic hits）tail-drop，记录 capacity-insufficient exclusion。
      en: phase-trim-204 has available=400 tokens after system reservation; lowest-priority slots 7–8 (semantic hits) tail-dropped with capacity-insufficient exclusions.
      ja: phase-trim-204 は system 予約後 available=400 tokens。最低 priority slot 7–8（semantic hits）tail-drop。capacity-insufficient exclusion 記録。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: budget trim
    field_values:
      trim_strategy: tail_drop
      pre_trim_tokens: 132000
    related_node_ids:
      - ContextTrimmingActivity
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-trimming-tail
  - id: ContextTrimmingActivity-example-pichay
    labels:
      zh: Pichay 逐出裁剪
      en: Pichay eviction trimming
      ja: Pichay eviction trimming
    descriptions:
      zh: "phase-trim-pichay 将 slot 5–6 stale Read tool results 替换为 paged-out 占位符；trim_strategy=paged_out_eviction，used_tokens 降 60%。"
      en: "phase-trim-pichay replaces slots 5–6 stale Read tool results with paged-out placeholders; trim_strategy=paged_out_eviction, used_tokens down 60%."
      ja: "phase-trim-pichay が slot 5–6 stale Read tool results を paged-out placeholder 化。trim_strategy=paged_out_eviction。used_tokens 60% 減。"
    example_source:
      product: Pichay
      url: https://arxiv.org/abs/2603.09023
      version: L1 eviction
    field_values:
      trim_strategy: paged_out_eviction
    related_node_ids:
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-trimming-pichay
  - id: ContextTrimmingActivity-example-not-selection
    labels:
      zh: 裁剪非选择
      en: Trimming is not selection
      ja: trimming は selection ではない
    descriptions:
      zh: phase-trim-88 假设 phase-select-88 已确定成员；只缩短或移除已选 slot 内容，不重新评估 RAG 相关性得分。
      en: phase-trim-88 assumes membership fixed by phase-select-88; only shortens or removes selected slot content without re-scoring RAG relevance.
      ja: phase-trim-88 は phase-select-88 で membership 確定前提。選択済み slot content の shorten/remove のみ。RAG relevance 再採点なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextTrimmingActivity
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-trimming-design
