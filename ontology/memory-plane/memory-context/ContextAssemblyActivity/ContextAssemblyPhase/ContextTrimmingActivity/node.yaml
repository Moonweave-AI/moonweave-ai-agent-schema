source_claims:
  - id: claim-context-trimming-activity-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents capacity-triggered offloading, truncation of older tool calls, and LLM summarization that preserves recent messages and stores originals. ContextTrimmingActivity is Moonweave's assembly phase for deletion, shortening, or summary replacement performed to meet a target budget while retaining provenance.
    locator: Context engineering in Deep Agents > Offloading and Summarization > capacity-triggered active-context reduction
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-002
    source: lit-agent-memory-as-action
    supports: Memory as Action makes summarize and discard explicit memory operations motivated by finite context. Moonweave narrows their use during call preparation into ContextTrimmingActivity and distinguishes it from relevance, authorization, or safety selection.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents offloading oversized tool content, truncating older tool calls as context approaches limits, and summarizing older messages when needed. trim-17 combines those capacity-fitting effects as one auditable Moonweave phase.
    locator: Context engineering in Deep Agents > Offloading and Summarization > capacity-triggered active-context reduction
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-004
    source: lit-agent-memory-as-action
    supports: Memory as Action includes summarization and discard among memory-management actions under finite context. The example makes their run-specific capacity effect and provenance preservation explicit as ContextTrimmingActivity.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' context-engineering lifecycle includes several controls—input context, runtime context, compression, isolation, and memory—not compression alone. Moonweave therefore keeps the whole assembly distinct from its trimming component.
    locator: Context engineering in Deep Agents > Offloading and Summarization > capacity-triggered active-context reduction
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-006
    source: lit-agent-memory-as-action
    supports: Memory as Action enumerates multiple memory operations rather than treating every management step as summarization or discard. The whole-versus-phase boundary here follows that operation-specific discipline.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-trimming-activity-007
    source: eng-fw-deepagents-context-engineering
    supports: Token reduction with exclusions and summary replacement directly instantiates documented context-compression mechanisms.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-trimming-activity-008
    source: eng-fw-deepagents-context-engineering
    supports: Authorization rejection is an eligibility decision and is not triggered by the context-window limits described for trimming and summarization.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
