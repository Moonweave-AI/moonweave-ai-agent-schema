schema: moonweave.ai/ontology-node/v1
id: ContextTrimmingActivity
kind: concept
status: review
labels:
  zh: 上下文裁剪活动
  en: Context trimming activity
  ja: コンテキスト裁剪活動
semantics:
  short_definition:
    zh: 在保留来源身份和顺序的前提下，使已排序内容满足目标容量的组装阶段。
    en: An assembly phase making ordered content fit target capacity while preserving provenance and relative order.
    ja: 来歴と相対順序を保ちながら、順序済み内容を対象容量へ収める組立段階です。
  definition:
    zh: 上下文裁剪活动是一种 ContextAssembly 组成阶段；其种差是：它接收已排序集合与 ContextBudget，通过删除低优先项、缩短允许范围或替换为 ContextSummary 使结果满足容量，并保留剩余项的来源身份和相对顺序。它不同于安全抑制，也不重新评估相关性。
    en: A context trimming activity is a ContextAssembly phase receiving an ordered set and ContextBudget, then removing low-priority items, clipping permitted extents, or substituting a ContextSummary to meet capacity while preserving provenance and relative order. It differs from safety suppression and does not reevaluate relevance.
    ja: ContextTrimmingActivity は ContextAssembly 段階で、順序済み集合と ContextBudget を受け、低優先項目削除、許可範囲切詰め、ContextSummary 置換で容量を満たし、来歴と相対順序を保ちます。安全抑制とは異なり、関連性を再評価しません。
  why_needed:
    zh: 该阶段让容量导致的删除或缩短与权限、安全和相关性排除分开解释，并可追溯到原始范围。
    en: This phase separates capacity-driven deletion or clipping from authorization, safety, and relevance exclusion and preserves traceability to original extents.
    ja: 容量による削除・短縮を権限・安全・関連性除外から分け、元範囲へ追跡可能にします。
  includes:
    - zh: 纳入记录裁剪前后令牌数、被删项目、缩短范围、替代摘要和剩余预算的阶段。
      en: Includes phases recording pre/post token counts, removed items, clipped extents, replacement summaries, and remaining budget.
      ja: 裁剪前後トークン数、削除項目、短縮範囲、置換要約、残予算を記録する段階を含みます。
  excludes:
    - zh: 排除基于安全策略的 Suppression、改变选中集合的选择阶段，以及仅声明上限的 ContextBudget。
      en: Excludes safety-policy suppression, selection phases changing the included set, and ContextBudget records that merely declare limits.
      ja: 安全方針による抑制、採用集合を変える選択段階、上限だけを宣言する ContextBudget を除外します。
  semantic_kind: activity
  aliases: []
