schema: moonweave.ai/ontology-node/v1
id: ContextTrimmingActivity
kind: concept
status: accepted
labels:
  zh: 上下文裁剪活动
  en: Context trimming activity
  ja: コンテキスト裁断活動
semantics:
  short_definition:
    zh: 为满足窗口预算而缩减已选上下文表示，并记录保留、排除和摘要结果的完成阶段活动。
    en: A completed phase activity that reduces selected context representation to meet a window budget and records retained, excluded, and summary results.
    ja: ウィンドウ予算に収めるため選択済みコンテキスト表現を縮減し、保持、除外、要約結果を記録する完了段階活動です。
  definition:
    zh: >
      ContextTrimmingActivity 是 ContextAssemblyPhase 的完成子类型，对已选择且通常已排序的 ContextArtifact 应用窗口预算。它可以保留最近项、移除最旧或最低优先项、用 ContextSummary 替换明确来源范围，或在无法满足强制内容需求时拒绝定稿。它必须记录输入、窗口、策略、保留项、排除事实、可选摘要和结果包。裁剪是 Context Compression 的一种方式，但不等于所有压缩；纯裁剪不会自动生成摘要，摘要也不自动成为 MemoryRecord。裁剪只改变当前调用的表示与可见性，不删除原始消息、文档或长期记忆记录。
    en: >
      ContextTrimmingActivity is a completed ContextAssemblyPhase subtype that applies a window budget to selected and normally ordered ContextArtifacts. It can retain recent items, remove oldest or lowest-priority items, replace an explicit source range with ContextSummary, or reject finalization when mandatory content cannot fit. It must record input, window, strategy, retained items, exclusion facts, optional summary, and result package. Trimming is one form of Context Compression but not all compression. Pure trimming does not automatically generate a summary, and a summary does not automatically become a MemoryRecord. Trimming changes representation and visibility for the current call only; it does not delete raw messages, documents, or long-term memory records.
    ja: >
      ContextTrimmingActivity は完了 ContextAssemblyPhase 下位型であり、選択済みかつ通常は順序付け済み ContextArtifact にウィンドウ予算を適用します。最近項目の保持、最古または最低優先項目の除去、明示情報源範囲を ContextSummary で置換、必須内容が収まらない場合の確定拒否ができます。入力、ウィンドウ、方針、保持項目、除外事実、任意要約、結果パッケージを記録しなければなりません。trimming は Context Compression の一形態ですが、全圧縮ではありません。純粋な裁断は自動的に要約を生成せず、要約も自動的に MemoryRecord になりません。裁断は今回呼び出しの表現と可視性だけを変え、生メッセージ、文書、長期記憶記録を削除しません。
  why_needed:
    zh: 即使候选已被授权和选择，仍可能无法全部放入窗口；独立裁剪活动让预算造成的丢弃或摘要有来源、原因和可重放边界。
    en: Even authorized, selected candidates may not all fit a window. An independent trimming activity makes budget-caused dropping or summarization traceable, reasoned, and replayable.
    ja: 認可済みで選択済みの候補でも、すべてがウィンドウに収まるとは限りません。独立した trimming 活動により、予算による除外または要約を追跡可能、理由付き、再生可能にします。
  includes:
    - zh: 预算窗口、输入表示、裁剪策略、保留项、排除决定、可选摘要及结果包。
      en: Budget window, input representation, trimming strategy, retained items, exclusion decisions, optional summary, and result package.
      ja: 予算ウィンドウ、入力表現、裁断方針、保持項目、除外決定、任意要約、結果パッケージ。
  excludes:
    - zh: 候选相关性选择、最终排序、源删除、长期记忆写入、模型生成和未执行裁剪计划。
      en: Candidate relevance selection, final ordering, source deletion, long-term memory write, model generation, and an unexecuted trimming plan.
      ja: 候補関連性選択、最終順序付け、情報源削除、長期記憶書き込み、モデル生成、未実行裁断計画。
  semantic_kind: activity
  aliases:
    - context budget reduction
    - history trimming
engineering:
  explanation:
    zh: >
      LangGraph 的 trim_messages 使用 token_counter、max_tokens 和 strategy 返回裁剪后的消息；Semantic Kernel 的 ChatHistoryTruncationReducer 丢弃超过目标数的项，ChatHistorySummarizationReducer 则摘要被移除内容并加入一条摘要消息。OpenAI Realtime 可在输入超限时从最旧消息开始截断。实现应把这些真实输入输出包装为裁剪活动事实，并明确策略是纯裁剪还是摘要替换。
    en: >
      LangGraph trim_messages uses token_counter, max_tokens, and strategy to return trimmed messages. Semantic Kernel ChatHistoryTruncationReducer discards items beyond target count, while ChatHistorySummarizationReducer summarizes removed content and adds one summary message. OpenAI Realtime can truncate from oldest messages on input overflow. Implementations should wrap these real inputs and outputs as trimming-activity facts and state whether the strategy is pure trimming or summary replacement.
    ja: >
      LangGraph trim_messages は token_counter、max_tokens、strategy を使って裁断済みメッセージを返します。Semantic Kernel の ChatHistoryTruncationReducer は目標件数を超える項目を捨て、ChatHistorySummarizationReducer は除去内容を要約して一件の要約メッセージを追加します。OpenAI Realtime は入力超過時に最古メッセージから切り詰めます。実装はこれら実入出力を trimming 活動事実として包み、方針が純粋裁断か要約置換かを明示すべきです。
  typical_input:
    - description: LangGraph token-aware trimming.
      format: |
        visible_messages = trim_messages(
            state["messages"], strategy="last", token_counter=count_tokens_approximately,
            max_tokens=7168, start_on="human", end_on=("human", "tool")
        )
    - description: Semantic Kernel reducer interface.
      format: |
        Task<ChatHistory?> ReduceAsync(
            IReadOnlyList<ChatMessageContent> chatHistory,
            CancellationToken cancellationToken = default);
  typical_output:
    - description: Budget-compliant retained representation plus loss-aware records.
      format: |
        {
          "trimming_activity_id": "ctx-trim-01",
          "retained_artifact_refs": ["ctx-art-system-1", "ctx-art-summary-9", "ctx-art-user-22"],
          "exclusion_refs": ["ctx-excl-old-msg-range"],
          "summary_ref": "ctx-summary-thread-9-v1",
          "result_package_ref": "ctx-pkg-support-01"
        }
  reference_implementations:
    - name: LangGraph trim_messages
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents strategy, token counter, max tokens, and message-boundary options for trimming.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents truncation and summarization reducers with system-message preservation.
    - name: OpenAI Realtime truncation configuration
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents oldest-message truncation, disabled errors, and retention-ratio behavior on input overflow.
  source_claims:
    - claim-context-trimming-langgraph-api
    - claim-context-trimming-semantic-kernel-api
    - claim-context-trimming-openai-overflow
structure:
  identity_keys:
    - assembly_activity_id
    - phase_activity_id
    - trimming_activity_id
  fields:
    - id: trimming_activity_id
      labels:
        zh: 裁剪活动标识
        en: trimming activity ID
        ja: 裁断活動 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次完成的预算缩减活动，不复用为窗口、摘要、包或排除决定标识。
        en: Identifies one completed budget-reduction activity and is not reused as window, summary, package, or exclusion-decision ID.
        ja: 一つの完了予算縮減活動を識別し、ウィンドウ、要約、パッケージ、除外決定の ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-trim-[A-Za-z0-9._-]+$'
      example_value: ctx-trim-01
      source_claims: [claim-context-trimming-langgraph-api]
    - id: assembly_ref
      labels:
        zh: 父装配引用
        en: parent assembly reference
        ja: 親組立参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向包含此裁剪阶段的具体 ContextAssembly。
        en: Points to the concrete ContextAssembly containing this trimming phase.
        ja: この trimming 段階を含む具体的 ContextAssembly を指します。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-support-01
      source_claims: [claim-context-trimming-langgraph-api]
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 将裁剪表示和排除限制在当前调用准备范围，不扩展为源数据生命周期操作。
        en: Limits trimming representation and exclusions to current call preparation rather than extending them into source-data lifecycle operation.
        ja: 裁断表現と除外を現在の呼び出し準備範囲に限定し、情報源データのライフサイクル操作へ拡張しません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims: [claim-context-trimming-openai-overflow]
    - id: window_ref
      labels:
        zh: 应用窗口引用
        en: applied window reference
        ja: 適用ウィンドウ参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向提供可用输入预算和溢出策略的 ContextWindow。
        en: Points to the ContextWindow providing usable input budget and overflow policy.
        ja: 利用可能入力予算とオーバーフロー方針を提供する ContextWindow を指します。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims: [claim-context-trimming-openai-overflow]
    - id: input_artifact_refs
      labels:
        zh: 输入工件引用
        en: input artifact references
        ja: 入力工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出裁剪前的已选表示工件；它不是所有原始历史或整个持久存储。
        en: Lists selected representation artifacts before trimming, not all raw history or an entire persistent store.
        ja: 裁断前の選択済み表現工件を列挙し、全生履歴や永続ストア全体を列挙しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-msg-early, ctx-art-user-22]
      source_claims: [claim-context-trimming-langgraph-api]
    - id: trimming_strategy
      labels:
        zh: 裁剪策略
        en: trimming strategy
        ja: 裁断方針
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明本次采用保留最近、保留比例、摘要后裁剪或拒绝超预算；纯裁剪和摘要替换必须区分。
        en: Declares whether this run keeps recent items, retains a ratio, summarizes then trims, or rejects over budget. Pure trimming and summary replacement must be distinguished.
        ja: 最近項目保持、比率保持、要約後裁断、予算超過拒否のどれを行うかを宣言します。純粋裁断と要約置換を区別しなければなりません。
      allowed_values: [keep_recent, retain_ratio, summarize_then_trim, reject_over_budget]
      pattern: null
      example_value: summarize_then_trim
      source_claims: [claim-context-trimming-semantic-kernel-api]
    - id: retained_artifact_refs
      labels:
        zh: 保留工件引用
        en: retained artifact references
        ja: 保持工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出裁剪后仍可进入结果包的工件；它们必须来自输入或由明确 summary_ref 表示的替换。
        en: Lists artifacts still eligible for result package after trimming. They must come from input or be an explicitly represented replacement through summary_ref.
        ja: 裁断後も結果パッケージに入れられる工件を列挙します。入力由来か、summary_ref による明示表現の置換でなければなりません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-summary-9, ctx-art-user-22]
      source_claims: [claim-context-trimming-langgraph-api]
    - id: exclusion_refs
      labels:
        zh: 裁剪排除引用
        en: trimming exclusion references
        ja: 裁断除外参照
      datatype: array[string]
      required: true
      cardinality: {min: 0, max: null}
      definitions:
        zh: 列出因本次窗口预算未被保留的输入工件的 ContextExclusion；它们不意味着来源删除。
        en: Lists ContextExclusion records for input artifacts not retained under this window budget. They do not mean source deletion.
        ja: このウィンドウ予算で保持されなかった入力工件の ContextExclusion を列挙します。情報源削除を意味しません。
      allowed_values: []
      pattern: '^ctx-excl-[A-Za-z0-9._-]+$'
      example_value: [ctx-excl-old-msg-range]
      source_claims: [claim-context-trimming-openai-overflow]
    - id: summary_ref
      labels:
        zh: 替换摘要引用
        en: replacement summary reference
        ja: 置換要約参照
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 当策略为 summarize_then_trim 时，指向替换部分输入范围的 ContextSummary；其他纯裁剪策略应为空。
        en: When strategy is summarize_then_trim, points to ContextSummary replacing part of input range. It must be empty for other pure trimming strategies.
        ja: 方針が summarize_then_trim のとき、入力範囲の一部を置換する ContextSummary を指します。他の純粋裁断方針では空でなければなりません。
      allowed_values: []
      pattern: '^ctx-summary-[A-Za-z0-9._-]+$'
      example_value: ctx-summary-thread-9-v1
      source_claims: [claim-context-trimming-semantic-kernel-api]
    - id: result_package_ref
      labels:
        zh: 结果上下文包引用
        en: result context package reference
        ja: 結果コンテキストパッケージ参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向包含保留表示的结果包；当策略为 reject_over_budget 时必须指向被明确标为未定稿的失败输出而非伪造定稿包。
        en: Points to the result package containing retained representation. With reject_over_budget it must point to an explicitly unfinalized failure output rather than a fabricated finalized package.
        ja: 保持表現を含む結果パッケージを指します。reject_over_budget では、捏造した確定パッケージではなく、明示的に未確定の失敗出力を指さなければなりません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-01
      source_claims: [claim-context-trimming-langgraph-api]
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录裁剪完成时间，不是原始消息、摘要或模型响应的创建时间。
        en: Records trimming completion time, not creation time of raw messages, summary, or model response.
        ja: 裁断完了時刻を記録し、生メッセージ、要約、モデル応答の作成時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:02Z"
      source_claims: [claim-context-trimming-langgraph-api]
    - id: assembly_activity_id
      labels: {zh: 父装配活动标识, en: parent assembly activity ID, ja: 親組み立て活動 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识包含本次裁剪的已执行装配活动，避免将裁剪活动单独当作完整装配。
        en: Identifies the executed assembly activity that contains this trimming step, avoiding treatment of trimming alone as the complete assembly.
        ja: このトリミングを含む実行済み組み立て活動を識別し、トリミングだけを完全な組み立てとして扱いません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-activity-support-01
      source_claims: [claim-context-trimming-langgraph-api]
    - id: phase_activity_id
      labels: {zh: 裁剪阶段活动标识, en: trimming phase activity ID, ja: トリミングフェーズ活動 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留 ContextAssemblyPhase 的活动身份，使一次裁剪可被定位在父装配的阶段序列中。
        en: Retains the ContextAssemblyPhase activity identity so one trim can be located in the parent assembly's phase sequence.
        ja: ContextAssemblyPhase の活動 ID を保持し、一回のトリミングを親組み立てのフェーズ列に位置付けられるようにします。
      allowed_values: []
      pattern: '^ctx-phase-[A-Za-z0-9._-]+$'
      example_value: ctx-phase-trimming-01
      source_claims: [claim-context-trimming-semantic-kernel-api]
    - id: consumed_artifact_refs
      labels: {zh: 父活动已消费工件引用, en: parent activity consumed artifact references, ja: 親活動で消費したアーティファクト参照}
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出父装配活动实际消费的工件；input_artifact_refs 仍专门表示送入本裁剪阶段的直接输入。
        en: Lists artifacts actually consumed by the parent assembly; input_artifact_refs still specifically represents direct input to this trimming phase.
        ja: 親組み立てが実際に消費したアーティファクトを列挙します。input_artifact_refs は引き続きこのトリミングフェーズへの直接入力を表します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1]
      source_claims: [claim-context-trimming-langgraph-api]
    - id: applied_policy_ref
      labels: {zh: 父活动已应用策略引用, en: parent activity applied policy reference, ja: 親活動の適用済み方針参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录裁剪所属装配实际采用的上下文策略，区别于 trimming_strategy 这一具体执行方式。
        en: Records the context policy actually applied by the containing assembly, distinct from the concrete trimming_strategy.
        ja: 含まれる組み立てで実際に適用されたコンテキスト方針を記録し、具体的な trimming_strategy と区別します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._@-]+$'
      example_value: ctx-spec-support-v1
      source_claims: [claim-context-trimming-langgraph-api]
    - id: activity_status
      labels: {zh: 父活动状态, en: parent activity status, ja: 親活動状態}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留父装配的完成、失败或取消状态，避免一次成功裁剪被误称为最终包已经完成。
        en: Retains whether the parent assembly completed, failed, or was cancelled, so one successful trim is not reported as a finished final package.
        ja: 親組み立てが完了、失敗、取消のいずれかを保持し、一回の成功したトリミングを最終パッケージの完成として報告しません。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
      source_claims: [claim-context-trimming-langgraph-api]
    - id: phase_kind
      labels: {zh: 阶段类别, en: phase kind, ja: フェーズ種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明本子活动为 trimming 阶段，说明它在预算压力下缩减或替换表示，而不是决定候选资格。
        en: Declares this subactivity as the trimming phase, reducing or replacing representations under budget pressure rather than deciding candidate eligibility.
        ja: この部分活動を trimming フェーズとして宣言し、候補資格を決めるのではなく予算圧力下で表現を縮小または置換します。
      allowed_values: [trimming]
      pattern: null
      example_value: trimming
      source_claims: [claim-context-trimming-langgraph-api]
    - id: phase_index
      labels: {zh: 阶段序号, en: phase index, ja: フェーズ順序番号}
      datatype: integer
      required: true
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 记录裁剪在同一装配活动中的执行次序，而不是被裁剪消息的年龄或优先级。
        en: Records trimming's execution order within the assembly activity, not the age or priority of a trimmed message.
        ja: 組み立て活動内でのトリミングの実行順を記録し、トリミングされたメッセージの年齢や優先度ではありません。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims: [claim-context-trimming-langgraph-api]
    - id: phase_status
      labels: {zh: 阶段状态, en: phase status, ja: フェーズ状態}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录裁剪阶段本身的完成、失败或取消状态，独立于父装配的活动状态。
        en: Records whether trimming itself completed, failed, or was cancelled, independently of the parent assembly's activity status.
        ja: トリミング自体が完了、失敗、取消のいずれかを記録し、親組み立ての活動状態から独立させます。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
