source_claims:
  - id: claim-context-selection-activity-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents focused input context, permission controls, context isolation, and on-demand retrieval rather than unconditional inclusion of all available material. ContextSelectionActivity is Moonweave's observable phase for deciding which candidates are admitted to one assembly.
    locator: Context engineering in Deep Agents > Best practices > focused input context and on-demand filesystem retrieval
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-002
    source: lit-agent-memory-as-action
    supports: Memory as Action treats retrieval, update, summarization, and discard as actions selected by the agent. Moonweave reifies the run-specific admission evaluation over relevance, authorization, trust, and safety as ContextSelectionActivity, distinct from later ordering and trimming.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents describes focused input context, context isolation through subagents, and on-demand retrieval from offloaded material. Moonweave makes the per-run admission of eligible items an explicit ContextSelectionActivity.
    locator: Context engineering in Deep Agents > Best practices > focused input context and on-demand filesystem retrieval
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-004
    source: lit-agent-memory-as-action
    supports: Memory as Action exposes retrieval and discard as policy-controlled choices. The example specializes those choices into auditable admission and exclusion decisions for one context-assembly run.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes what context is included from how long context is compressed and presented. Moonweave uses membership change versus relative-position change as the boundary between selection and ordering.
    locator: Context engineering in Deep Agents > Best practices > focused input context and on-demand filesystem retrieval
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-006
    source: lit-agent-memory-as-action
    supports: Memory as Action motivates distinguishing memory transformations by their action semantics. The boundary case applies that discipline to admission decisions versus permutation of an already admitted set.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-007
    source: lit-agent-memory-as-action
    supports: Memory-as-Action's Prune&Write policy can decide which history spans remain and can rewrite content to control working-memory size. Moonweave separates ContextSelectionActivity, which determines the admitted set, from ContextTrimmingActivity, which makes the ordered admitted content fit capacity while preserving provenance.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-selection-activity-008
    source: eng-fw-langchain-context-engineering
    supports: Authorization and relevance decisions instantiate per-candidate model-context selection.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-009
    source: eng-fw-langchain-context-engineering
    supports: Assigning order after inclusion decisions is a separate transformation and lacks selection differentia.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-010
    source: eng-fw-langchain-context-engineering
    supports: LangChain context engineering explicitly includes selecting messages, tools, and other model-context components; Moonweave isolates the observed inclusion-decision execution as ContextSelectionActivity.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-011
    source: eng-fw-langchain-context-engineering
    supports: LangChain distinguishes available state and store data from the transient model context actually supplied to one call. Moonweave therefore requires run-specific admission evidence before asserting that ContextSelectionActivity selected a RetrievedCandidate; LangChain does not define this ontology relation.
    locator: Context engineering in agents > Overview > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-012
    source: lit-agent-memory-as-action
    supports: Memory as Action models context curation as explicit policy actions that select, integrate, or prune information. Moonweave uses that action boundary to require an observed admission decision rather than inferring selection from candidate availability or score.
    locator: Paper > §1 Introduction (Context Curation); §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-013
    source: eng-fw-langchain-context-engineering
    supports: LangChain documents that model context controls what enters one model call and can draw from state or long-term store. The example's explicit per-run admission record is Moonweave's auditable representation of choosing one retrieved item for that context.
    locator: Context engineering in agents > Overview > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-014
    source: lit-agent-memory-as-action
    supports: Memory as Action defines context curation as strategic selection, integration, and pruning carried out through explicit actions. The example instantiates one such admission action over an identified candidate without claiming the paper defines Moonweave IDs.
    locator: Paper > §1 Introduction (Context Curation); §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-015
    source: eng-fw-langchain-context-engineering
    supports: LangChain separates available data sources from the model context passed to a call. A retrieved and scored item can therefore remain outside the call context; Moonweave requires the explicit admission record before asserting this edge.
    locator: Context engineering in agents > Overview > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-016
    source: lit-agent-memory-as-action
    supports: Memory as Action treats retention and pruning as explicit policy actions rather than consequences of mere presence. The exclusion outcome in this boundary case therefore blocks an inferred selection edge.
    locator: Paper > §1 Introduction (Context Curation); §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-017
    source: eng-fw-langchain-context-engineering
    supports: LangChain's official context-engineering guide distinguishes available state and store data from transient model context and states that model context controls what enters each model call. Moonweave infers an explicit ContextSelectionActivity → RetrievedCandidate admission fact so retrieval availability is not conflated with call-context membership; the documentation does not define this relation or its IDs.
    locator: Context engineering in agents > Overview > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-018
    source: lit-agent-memory-as-action
    supports: Memory as Action defines context curation as strategically selecting, integrating, and pruning information and formalizes memory management as explicit actions within a decision process. Moonweave infers this directed activity-to-candidate fact to record one admission outcome while keeping retrieval identity and final package membership separate.
    locator: Paper > §1 Introduction (Context Curation); §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-019
    source: eng-fw-langchain-context-engineering
    supports: Matching selected-set identity and non-overlapping phase times establish precedence in one assembly.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-selection-activity-020
    source: eng-fw-langchain-context-engineering
    supports: An earlier selection in another call has no data handoff to the current ordering phase.
