source_claims:
  - id: claim-context-selection-precall-filter
    source: langgraph-memory
    supports: LangGraph documents managing message history through filtering, deletion, trimming, and summarization before model invocation. Moonweave treats the decision about which evaluated candidate artifacts proceed as a separate selection activity rather than assuming all history or retrieval output is visible.
    locator: "LangGraph memory guide: manage conversation history before model use"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-selection-reducer-boundary
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents truncation and summary reducers that reduce chat history for completion. Moonweave uses selection to record admission and exclusions before later representation reduction, keeping nonselection distinct from source deletion.
    locator: "Chat-history reducers: truncation and summarization"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-selection-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes activities, used entities, generated entities, and provenance facts. Moonweave records exact evaluated candidates, selected subset, exclusion entities, policy, scope, and time for one selection activity.
    locator: "PROV-O Activity, Entity, use, generation, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high