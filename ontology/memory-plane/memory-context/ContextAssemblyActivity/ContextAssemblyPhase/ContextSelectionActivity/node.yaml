schema: moonweave.ai/ontology-node/v1
id: ContextSelectionActivity
kind: concept
status: accepted
labels:
  zh: 上下文选择活动
  en: Context selection activity
  ja: コンテキスト選択活動
semantics:
  short_definition:
    zh: 从已评估候选工件中按调用策略选择成员并记录未选原因的完成阶段活动。
    en: A completed phase activity that selects membership from evaluated candidate artifacts under call policy and records why others were not selected.
    ja: 呼び出し方針の下で評価済み候補工件から所属を選び、未選択理由を記録する完了段階活動です。
  definition:
    zh: >
      ContextSelectionActivity 是 ContextAssemblyPhase 的完成子类型，在具体调用范围中根据 ContextSpecification、来源角色、授权、相关性、时效和初步预算评估候选 ContextArtifact，并生成选定成员集合以及对应 ContextExclusion。它处理“哪些候选能继续进入装配”，不处理候选从哪里被检索到、选定成员的最终顺序、已选文本如何裁剪或摘要，也不执行模型调用。selected_artifact_refs 必须是 candidate_artifact_refs 的子集；未选候选必须有明确排除事实，不能因为以后可能重试就被静默遗忘。
    en: >
      ContextSelectionActivity is a completed ContextAssemblyPhase subtype that evaluates candidate ContextArtifacts in a concrete call scope using ContextSpecification, source roles, authorization, relevance, freshness, and preliminary budget, then produces selected membership and corresponding ContextExclusion facts. It handles which candidates can proceed into assembly, not where candidates were retrieved, final ordering of selected membership, how selected text is trimmed or summarized, or model invocation. selected_artifact_refs must be a subset of candidate_artifact_refs. Candidates not selected must have explicit exclusion facts and cannot be silently forgotten merely because they might be retried later.
    ja: >
      ContextSelectionActivity は完了 ContextAssemblyPhase 下位型であり、具体的呼び出し範囲で ContextSpecification、情報源役割、認可、関連性、鮮度、初期予算を使って候補 ContextArtifact を評価し、選択所属と対応する ContextExclusion 事実を生成します。候補のどれが組立へ進めるかを扱い、候補の検索元、選択所属の最終順序、選択テキストの裁断・要約、モデル呼び出しは扱いません。selected_artifact_refs は candidate_artifact_refs の部分集合でなければなりません。未選択候補は明示的除外事実を持たねばならず、後で再試行するかもしれないからといって黙って忘れてはいけません。
  why_needed:
    zh: 检索、存储或会话历史中的每一项都不应自动进入模型；选择活动把可见性准入、授权和预算压力明确为可审计决策。
    en: Not every retrieved, stored, or historical item should automatically enter a model. Selection makes visibility admission, authorization, and budget pressure auditable decisions.
    ja: 検索、保存、会話履歴の全項目が自動的にモデルへ入るべきではありません。selection は可視性受け入れ、認可、予算圧力を監査可能な決定にします。
  includes:
    - zh: 候选范围、应用策略、选定子集、排除事实和完成时间。
      en: Candidate scope, applied policy, selected subset, exclusion facts, and completion time.
      ja: 候補範囲、適用方針、選択部分集合、除外事実、完了時刻。
  excludes:
    - zh: 产生候选的检索、选定项排序、裁剪或摘要和模型执行。
      en: Retrieval that produced candidates, ordering selected items, trimming or summarization, and model execution.
      ja: 候補を生んだ検索、選択項目の順序付け、裁断または要約、モデル実行。
  semantic_kind: activity
  aliases:
    - context admission activity
engineering:
  explanation:
    zh: >
      真实实现先从状态、存储或工具获得候选，再把可接受成员形成消息序列。LangGraph 文档表明完整线程历史可在调用前被裁剪、删除或摘要，Semantic Kernel reducer 也在完成调用前缩减聊天记录。选择活动把这些真实 API 的输入候选与项目的准入决策绑定起来，但不声称这些框架拥有同名选择 API。
    en: >
      Real implementations first obtain candidates from state, store, or tools and then form a message sequence from admissible members. LangGraph documents trimming, deleting, or summarizing complete thread history before calls, and Semantic Kernel reducers reduce chat history before completion. Selection activity binds candidate input from these real APIs to project admission decisions without claiming the frameworks expose an identically named selection API.
    ja: >
      実装ではまず状態、ストア、ツールから候補を得て、受け入れ可能な所属からメッセージ列を作ります。LangGraph は呼び出し前に完全スレッド履歴を裁断、削除、要約できることを文書化し、Semantic Kernel リデューサーも完了前にチャット履歴を縮減します。selection 活動は、これら実 API の候補入力をプロジェクト受け入れ決定へ結び付けますが、フレームワークが同名 selection API を公開すると主張しません。
  typical_input:
    - description: Candidate message state subject to pre-invocation filtering.
      format: |
        candidates = state["messages"]
        visible_messages = trim_messages(
            candidates, strategy="last", max_tokens=7168,
            token_counter=count_tokens_approximately
        )
    - description: Selection decision record around candidate artifacts.
      format: |
        {
          "candidate_artifact_refs": ["ctx-art-system-1", "ctx-art-old-policy-4", "ctx-art-user-22"],
          "selection_policy_ref": "ctx-spec-support-v1",
          "selected_artifact_refs": ["ctx-art-system-1", "ctx-art-user-22"]
        }
  typical_output:
    - description: Selected subset plus explicit exclusion references.
      format: |
        {
          "selection_activity_id": "ctx-select-01",
          "selected_artifact_refs": ["ctx-art-system-1", "ctx-art-user-22"],
          "exclusion_refs": ["ctx-excl-old-policy-4"],
          "completed_at": "2026-07-19T09:20:00Z"
        }
  reference_implementations:
    - name: LangGraph memory and conversation-history management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents trimming, deletion, and summarization of message candidates before model use.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents reducing chat history before completion services consume it.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Supports recording exact used and generated entities for a decision activity.
  source_claims:
    - claim-context-selection-precall-filter
    - claim-context-selection-reducer-boundary
    - claim-context-selection-provenance
structure:
  identity_keys:
    - assembly_activity_id
    - phase_activity_id
    - selection_activity_id
  fields:
    - id: selection_activity_id
      labels:
        zh: 选择活动标识
        en: selection activity ID
        ja: 選択活動 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次完成的候选准入决策，不复用为检索、排序、裁剪或包标识。
        en: Identifies one completed candidate-admission decision and is not reused as retrieval, ordering, trimming, or package ID.
        ja: 一つの完了候補受け入れ決定を識別し、検索、順序付け、裁断、パッケージの ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-select-[A-Za-z0-9._-]+$'
      example_value: ctx-select-01
      source_claims: [claim-context-selection-provenance]
    - id: assembly_ref
      labels:
        zh: 父装配引用
        en: parent assembly reference
        ja: 親組立参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向该选择阶段所属的具体 ContextAssembly。
        en: Points to the concrete ContextAssembly containing this selection phase.
        ja: この selection 段階を含む具体的 ContextAssembly を指します。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-support-01
      source_claims: [claim-context-selection-provenance]
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 将候选及准入决策绑定到具体调用范围，不能泛化为永久存储删除或全局黑名单。
        en: Binds candidates and admission decision to a concrete call scope and cannot be generalized into permanent store deletion or global blacklist.
        ja: 候補と受け入れ決定を具体的呼び出し範囲に結び、恒久的ストア削除やグローバルブラックリストへ一般化できません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims: [claim-context-selection-provenance]
    - id: candidate_artifact_refs
      labels:
        zh: 候选工件引用
        en: candidate artifact references
        ja: 候補工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出活动实际评估的工件候选，而非所有可检索材料或未读取存储记录。
        en: Lists artifact candidates actually evaluated by the activity, not all retrievable material or unread stored records.
        ja: 活動が実際に評価した工件候補を列挙し、全検索可能材料や未読保存記録を列挙しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-old-policy-4, ctx-art-user-22]
      source_claims: [claim-context-selection-precall-filter]
    - id: selection_policy_ref
      labels:
        zh: 选择策略引用
        en: selection policy reference
        ja: 選択方針参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向此次实际应用的 ContextSpecification 或选择规则版本，包含来源、授权、时效和预算准入条件。
        en: Points to ContextSpecification or selection-rule version actually applied, including source, authorization, freshness, and budget admission conditions.
        ja: 情報源、認可、鮮度、予算受け入れ条件を含む、実際に適用した ContextSpecification または selection-rule 版を指します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._-]+$'
      example_value: ctx-spec-support-v1
      source_claims: [claim-context-selection-precall-filter]
    - id: selected_artifact_refs
      labels:
        zh: 已选工件引用
        en: selected artifact references
        ja: 選択工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出允许继续进入排序和裁剪的候选子集；该列表尚未表达最终顺序或最终可见性。
        en: Lists the candidate subset allowed to proceed to ordering and trimming. It does not yet express final order or final visibility.
        ja: ordering と trimming へ進める候補部分集合を列挙します。最終順序や最終可視性はまだ表しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-user-22]
      source_claims: [claim-context-selection-precall-filter]
    - id: exclusion_refs
      labels:
        zh: 排除决定引用
        en: exclusion decision references
        ja: 除外決定参照
      datatype: array[string]
      required: true
      cardinality: {min: 0, max: null}
      definitions:
        zh: 列出为每个未选候选记录的 ContextExclusion，说明未纳入当前调用而非源内容被删除。
        en: Lists ContextExclusion records for candidates not selected, explaining nonadmission to this call rather than deletion of source content.
        ja: 未選択候補の ContextExclusion 記録を列挙し、情報源内容の削除ではなく今回呼び出しへの非受け入れを説明します。
      allowed_values: []
      pattern: '^ctx-excl-[A-Za-z0-9._-]+$'
      example_value: [ctx-excl-old-policy-4]
      source_claims: [claim-context-selection-provenance]
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录选择完成时间，不是候选检索时间或模型响应时间。
        en: Records selection completion time, not candidate retrieval time or model response time.
        ja: selection 完了時刻を記録し、候補検索時刻やモデル応答時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:00Z"
      source_claims: [claim-context-selection-provenance]
    - id: assembly_activity_id
      labels:
        zh: 父装配活动标识
        en: parent assembly activity ID
        ja: 親組み立て活動 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识承载本次选择阶段的已执行装配活动，不将 selection_activity_id 误作整个装配的活动身份。
        en: Identifies the executed assembly activity that contains this selection phase, rather than treating selection_activity_id as the whole assembly's activity identity.
        ja: この選択フェーズを含む実行済み組み立て活動を識別し、selection_activity_id を組み立て全体の活動 ID と取り違えません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-activity-support-01
      source_claims: [claim-context-selection-provenance]
    - id: phase_activity_id
      labels:
        zh: 选择阶段活动标识
        en: selection phase activity ID
        ja: 選択フェーズ活動 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留 ContextAssemblyPhase 的活动身份，说明本选择是父装配中的一个阶段而非独立检索操作。
        en: Retains the ContextAssemblyPhase activity identity, showing that selection is one phase of assembly rather than a standalone retrieval operation.
        ja: ContextAssemblyPhase の活動 ID を保持し、選択が独立した検索ではなく組み立ての一段階であることを示します。
      allowed_values: []
      pattern: '^ctx-phase-[A-Za-z0-9._-]+$'
      example_value: ctx-phase-selection-01
      source_claims: [claim-context-selection-provenance]
    - id: consumed_artifact_refs
      labels:
        zh: 父活动已消费工件引用
        en: parent activity consumed artifact references
        ja: 親活動で消費したアーティファクト参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出父装配活动在本轮中实际读取的工件；candidate_artifact_refs 仍描述这个选择阶段评估的候选集合。
        en: Lists artifacts actually read by the parent assembly in this run; candidate_artifact_refs still describes the set evaluated by this selection phase.
        ja: この実行で親組み立てが実際に読んだアーティファクトを列挙します。candidate_artifact_refs は引き続きこの選択フェーズが評価した集合を表します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1]
      source_claims: [claim-context-selection-precall-filter]
    - id: window_ref
      labels:
        zh: 父活动窗口引用
        en: parent activity window reference
        ja: 親活動のウィンドウ参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 关联选择所服务的父装配窗口，使预算驱动的排除能与具体容量边界对应。
        en: Links the selection to the parent assembly window so budget-driven exclusions can be tied to a concrete capacity boundary.
        ja: 選択を親組み立てのウィンドウに結び付け、予算による除外を具体的な容量境界に対応させます。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims: [claim-context-selection-precall-filter]
    - id: applied_policy_ref
      labels:
        zh: 父活动已应用策略引用
        en: parent activity applied policy reference
        ja: 親活動の適用済み方針参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录该选择所属装配实际采用的上下文策略，区别于 selection_policy_ref 所指的局部选择规则。
        en: Records the context policy actually applied by the assembly containing this selection, distinct from selection_policy_ref's local selection rule.
        ja: この選択を含む組み立てで実際に適用されたコンテキスト方針を記録し、selection_policy_ref の局所選択規則と区別します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._@-]+$'
      example_value: ctx-spec-support-v1
      source_claims: [claim-context-selection-provenance]
    - id: activity_status
      labels:
        zh: 父活动状态
        en: parent activity status
        ja: 親活動状態
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录父装配活动的状态，避免将一次完成的候选选择解释为整个上下文包已成功生成。
        en: Records the parent assembly's status so a completed candidate choice is not interpreted as a successfully generated complete package.
        ja: 親組み立ての状態を記録し、候補選択の完了を完全なパッケージ生成の成功と解釈しないようにします。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
      source_claims: [claim-context-selection-provenance]
    - id: phase_kind
      labels:
        zh: 阶段类别
        en: phase kind
        ja: フェーズ種別
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 固定声明本子活动实现 selection 阶段，避免将候选入选与排序、裁剪或渲染混同。
        en: Declares this subactivity as the selection phase, keeping candidate admission distinct from ordering, trimming, or rendering.
        ja: この部分活動を selection フェーズとして宣言し、候補の採用を順序付け、トリミング、レンダリングと区別します。
      allowed_values: [selection]
      pattern: null
      example_value: selection
      source_claims: [claim-context-selection-precall-filter]
    - id: phase_index
      labels:
        zh: 阶段序号
        en: phase index
        ja: フェーズ順序番号
      datatype: integer
      required: true
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 记录选择在同一装配执行中的顺序位置，而非候选工件的优先级或最终消息位置。
        en: Records selection's sequence position within the same assembly execution, not candidate priority or final message position.
        ja: 同じ組み立て実行内での選択の順序位置を記録し、候補優先度や最終メッセージ位置ではありません。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims: [claim-context-selection-provenance]
    - id: phase_status
      labels:
        zh: 阶段状态
        en: phase status
        ja: フェーズ状態
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录选择阶段的完成、失败或取消状态，与父活动状态和最终包状态分开。
        en: Records whether the selection phase completed, failed, or was cancelled, separately from parent activity status and final package state.
        ja: 選択フェーズが完了、失敗、取消のいずれかを記録し、親活動の状態と最終パッケージの状態から分離します。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
      source_claims: [claim-context-selection-provenance]
  constraints:
    - id: context-selection-subset-and-explicit-exclusions
      severity: error
      expression_language: plain
      expression: selected_artifact_refs must be a duplicate-free subset of candidate_artifact_refs. Every candidate absent from selected_artifact_refs must be represented by a ContextExclusion in exclusion_refs for the same call scope.
      explanation:
        zh: 选择活动必须说明成员变化，不能把未选候选悄然丢弃或把新项凭空加入。
        en: Selection must account for membership change and cannot silently drop unselected candidates or add new items from nowhere.
        ja: selection は所属変更を説明しなければならず、未選択候補を黙って落としたり、新項目を無から追加したりできません。
      source_claims: [claim-context-selection-provenance]
    - id: context-selection-is-not-ordering-or-trimming
      severity: error
      expression_language: plain
      expression: ContextSelectionActivity must not claim final ordering, token-level trimming, generated summary, candidate retrieval, or model invocation. Those require separate phase or operation facts.
      explanation:
        zh: 准入决策与位置、表示压缩、候选产生和模型执行具有不同边界。
        en: Admission decision has different boundaries from placement, representation compression, candidate production, and model execution.
        ja: 受け入れ決定は、配置、表現圧縮、候補生成、モデル実行と異なる境界を持ちます。
      source_claims: [claim-context-selection-precall-filter, claim-context-selection-reducer-boundary]
examples:
  - id: context-selection-example-positive-authorized-support-input

    labels: {zh: 选择授权支持输入, en: Select authorized support input, ja: 認可済みサポート入力を選択する}

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      assembly_activity_id: ctx-assembly-activity-support-01
      phase_activity_id: ctx-phase-selection-01
      selection_activity_id: ctx-select-01
