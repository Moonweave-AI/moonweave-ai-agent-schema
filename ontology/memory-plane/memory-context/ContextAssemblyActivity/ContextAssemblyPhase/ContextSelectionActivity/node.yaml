relations:
  - id: ContextSelectionActivity-selects-RetrievedCandidate
    predicate: selects
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 选择检索候选
      en: selects retrieved candidate
      ja: 検索候補を選択する
    definitions:
      zh: ContextSelectionActivity-selects-RetrievedCandidate 表示一次上下文选择阶段在同一 ContextAssembly 运行内，依据任务相关性、受众权限、来源信任和安全约束，明确将某个 RetrievedCandidate 纳入后续排序候选集。该事实不由检索分数、候选共现或 ContextAssembly 对候选的读取自动推出，也不等同于候选最终进入 ContextPackage。
      en: ContextSelectionActivity-selects-RetrievedCandidate states that a context-selection phase in one ContextAssembly run explicitly admits a RetrievedCandidate to the set passed to ordering after evaluating task relevance, audience authority, source trust, and safety constraints. Retrieval score, co-occurrence, or assembly consumption alone does not entail this fact, and selection does not yet prove final ContextPackage membership.
      ja: ContextSelectionActivity-selects-RetrievedCandidate は、同一 ContextAssembly 実行のコンテキスト選択段階が、タスク関連性、受領者権限、出典信頼性、安全制約を評価した後、ある RetrievedCandidate を後続の整列へ渡す候補集合に明示的に採用したことを表します。検索スコア、共起、または組立による読取りだけではこの事実を導けず、選択は最終 ContextPackage への包含もまだ証明しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 候选数量取决于一次组装的输入、策略和预算；本体只要求每条选择事实绑定一项明确候选，不对所有运行施加统一数量。
      en: Candidate counts depend on one assembly's inputs, policy, and budget; the ontology requires each selection fact to identify its candidate but imposes no universal count across runs.
      ja: 候補数は一回の組立の入力、方針、予算に依存します。本体は各選択事実が候補を特定することだけを要求し、全実行に共通の個数を課しません。
    inverse_reading:
      predicate: selected_by_context_activity
      labels:
        zh: 由上下文选择活动选中
        en: selected by context activity
        ja: コンテキスト選択活動により選択される
    conditions:
      - id: ContextSelectionActivity-selects-RetrievedCandidate-condition-001
        severity: error
        expression_language: plain
        expression: Assert only when the same context assembly run records RetrievedCandidate.candidate_id as admitted by ContextSelectionActivity after eligibility evaluation; retrieval, scoring, or consumption alone is insufficient.
        explanations:
          zh: 仅当同一次上下文组装运行留下选择活动对该 candidate_id 完成资格评估并作出纳入结论的记录时建立；仅检索到、评分过或读取过候选均不足以建立。
          en: Assert only when the same context assembly run records the selection activity's eligibility evaluation and admission of that candidate_id; retrieval, scoring, or consumption alone is insufficient.
          ja: 同一コンテキスト組立実行が、選択活動による当該 candidate_id の適格性評価と採用結論を記録した場合にのみ成立させ、検索、採点、読取りだけでは成立させません。
        source_claims:
          - claim-context-selection-activity-011
          - claim-context-selection-activity-012
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ContextSelectionActivity-selects-RetrievedCandidate-example-positive-001
        kind: positive
        labels:
          zh: 上下文选择活动选中检索候选正例
          en: "Positive case: context activity selects retrieved candidate"
          ja: コンテキスト選択活動が検索候補を選択する正例
        scenario_id: null
        descriptions:
          zh: assembly-88 的 selection-17 读取 candidate-42 的查询、来源与评分，核验其适用于当前任务且受众有权接收后，记录 candidate-42 为 admitted；随后 ordering-17 接收该候选。
          en: Within assembly-88, selection-17 reads candidate-42's query, provenance, and score, verifies task relevance and audience authority, records candidate-42 as admitted, and passes it to ordering-17.
          ja: assembly-88 内で selection-17 が candidate-42 の query、来歴、score を読み、タスク関連性と受領者権限を確認して candidate-42 を admitted と記録し、ordering-17 へ渡します。
        field_values: {}
        related_node_ids:
          - ContextSelectionActivity
          - RetrievedCandidate
        related_relation_ids:
          - ContextSelectionActivity-selects-RetrievedCandidate
        expected_result:
          zh: 建立 selection-17 → candidate-42 的 selects 事实，并保留其组装运行、资格依据和有效时间。
          en: Assert selection-17 → candidate-42 as a selects fact with its assembly run, eligibility basis, and valid time retained.
          ja: selection-17 → candidate-42 の selects 事実を成立させ、組立実行、適格性根拠、有効時間を保持します。
        why_valid_or_invalid:
          zh: 该记录同时点名选择活动、候选身份、同一组装运行和明确纳入结论，满足方向与成立条件。
          en: The record names the selection activity, candidate identity, same assembly run, and explicit admission outcome, satisfying both direction and assertion condition.
          ja: 記録が選択活動、候補同一性、同一組立実行、明示的採用結果を示し、方向と成立条件を満たします。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-context-selection-activity-013
          - claim-context-selection-activity-014
      - id: ContextSelectionActivity-selects-RetrievedCandidate-example-boundary-001
        kind: boundary
        labels:
          zh: 上下文选择活动选中检索候选边界例
          en: "Boundary case: retrieved candidate is not selected"
          ja: 検索候補が選択されない境界例
        scenario_id: null
        descriptions:
          zh: assembly-88 读取高分 candidate-43，但 selection-17 因受众无权访问其来源而记录 exclude-43；候选的高分与被读取事实均不能建立 selects 边。
          en: assembly-88 reads high-scoring candidate-43, but selection-17 records exclude-43 because the audience lacks authority for its source. Neither the score nor consumption establishes a selects edge.
          ja: assembly-88 は高得点の candidate-43 を読みますが、受領者に出典アクセス権がないため selection-17 は exclude-43 を記録します。得点や読取りだけでは selects 辺は成立しません。
        field_values: {}
        related_node_ids:
          - ContextSelectionActivity
          - RetrievedCandidate
        related_relation_ids:
          - ContextSelectionActivity-selects-RetrievedCandidate
        expected_result:
          zh: 不得建立 selection-17 → candidate-43 的 selects 事实；排除记录继续证明其未被纳入。
          en: Do not assert selection-17 → candidate-43 as selects; the exclusion record continues to show non-admission.
          ja: selection-17 → candidate-43 の selects 事実を成立させず、除外記録により非採用を示します。
        why_valid_or_invalid:
          zh: 检索域的候选身份与评分只证明可供评估；权限检查后的排除结论直接否定本次纳入。
          en: Retrieval identity and score establish only eligibility for evaluation; the post-authorization exclusion directly refutes admission in this run.
          ja: 検索候補の同一性と得点は評価対象であることだけを示し、権限確認後の除外結論が当該実行での採用を否定します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-context-selection-activity-015
          - claim-context-selection-activity-016
    source_claims:
      - claim-context-selection-activity-017
      - claim-context-selection-activity-018
    distinct_fact_rationale:
      zh: ContextAssembly-consumes-RetrievedChunk 只记录检索项作为 candidate input 被组装读取；本 selects 边记录选择阶段明确准入 RetrievedCandidate；final ContextPackage membership 仍由后续排序、裁剪和组装产出事实决定。
      en: ContextAssembly-consumes-RetrievedChunk records a retrieved item only as candidate input; this selects edge records explicit admission by the selection phase; final ContextPackage membership remains a separate outcome of ordering, trimming, and assembly.
      ja: ContextAssembly-consumes-RetrievedChunk は検索項目を candidate input として読んだ事実だけを記録し、この selects 辺は選択段階による明示的採用を記録します。final ContextPackage membership は後続の整列、裁断、組立結果として別に扱います。
    layout_role: cross-link
    review_status: pending
    target: concept:RetrievedCandidate
  - id: ContextSelectionActivity-precedes-ContextOrderingActivity
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: precedes
      en: precedes
      ja: precedes
    definitions:
      zh: ContextSelectionActivity-precedes-ContextOrderingActivity 表示同一组装中选择阶段的最终成员集合成为排序阶段输入，选择完成不晚于排序开始；跨运行早晚不构成该边。
