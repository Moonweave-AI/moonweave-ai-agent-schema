    supports: .cursorignore excludes paths during selection.
    locator: Ignore patterns
    evidence_kind: official
    confidence: high
  - id: claim-context-selection-rag
    source: src-langchain-context-engineering
    supports: Select strategy filters retrieved chunks by relevance threshold.
    locator: Select
    evidence_kind: official
    confidence: high
  - id: claim-context-selection-design
