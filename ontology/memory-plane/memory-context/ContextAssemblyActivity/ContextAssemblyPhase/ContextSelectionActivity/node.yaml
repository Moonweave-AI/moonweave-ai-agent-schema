    en: Instance cardinality depends on the call, version, or deployment and is not globally closed on the class-level relation.
    ja: インスタンス基数は呼出し・版・配置制約に依存し、クラス関係上で一律に閉じません。
  inverse_reading:
    predicate: has_context_selection_activity_subtype
    labels:
      zh: 以上下文选择活动为下位类型
      en: has ContextSelectionActivity subtype
      ja: ContextSelectionActivity を下位型に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
