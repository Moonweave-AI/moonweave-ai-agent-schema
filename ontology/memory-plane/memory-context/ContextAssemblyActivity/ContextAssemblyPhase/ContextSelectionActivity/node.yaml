schema: moonweave.ai/ontology-node/v1
id: ContextSelectionActivity
kind: concept
labels:
  zh: 上下文选择活动
  en: Context selection activity
  ja: コンテキスト選択活動
semantics:
  short_definition:
    zh: 从候选中按任务与相关性确定纳入集合的组装阶段。
    en: Assembly phase determining admitted set from candidates by task and relevance.
    ja: task/関連性に基づき candidate から採用集合を決める assembly phase。
  definition:
    zh: ContextSelectionActivity 是 ContextAssemblyPhase；评估候选相对任务、权限、信任、安全与相关性（RAG similarity score、Cursor semantic search score），输出已选集合与 ContextExclusion。它映射 LangChain select 策略与 Cursor codebase search + @ refs 采纳，不执行最终排序或长度裁剪。
    en: ContextSelectionActivity is a ContextAssemblyPhase evaluating candidates against task, authorization, trust, safety, and relevance (RAG similarity score, Cursor semantic search score), producing admitted set and ContextExclusions. It maps LangChain select strategy and Cursor codebase search + @ ref admission—not final ordering or length trimming.
    ja: ContextSelectionActivity は task/authorization/trust/safety/関連性（RAG similarity/Cursor semantic score）で candidate 評価し採用集合/ContextExclusion 出力する ContextAssemblyPhase。LangChain select/Cursor codebase search+@ ref 採用に写像。final ordering/length trimming 非実行。
  why_needed:
    zh: 单独记录选择可解释 Pinecone top_k 候选为何仅部分进入 prompt，避免与排序、裁剪混淆。
    en: Recording selection separately explains why only part of Pinecone top_k candidates enter the prompt, avoiding confusion with ordering or trimming.
    ja: selection 独立記録で Pinecone top_k 候補の一部のみ prompt 入り理由を説明。ordering/trimming 混同回避。
  includes:
    - zh: 纳入逐项记录候选 ID、相关性得分、权限结果与纳入/排除结论的选择阶段。
      en: Includes selection phases recording candidate IDs, relevance scores, authorization outcomes, and admit/reject decisions.
      ja: candidate ID/関連性 score/authorization outcome/admit-reject 判断を item 記録する selection phase。
  excludes:
    - zh: 排除候选生成（RetrievalActivity）、已选项排序与容量裁剪。
      en: Excludes candidate generation (RetrievalActivity), ordering of selected items, and capacity trimming.
      ja: candidate generation（RetrievalActivity）/選択済み ordering/capacity trimming を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Cursor semantic codebase search 返回 scored hits；@ 引用自动 high-priority 纳入；LangChain store.search/RAG retriever 按 query 选 chunk；Mem0/Pinecone top_k 结果在此阶段按 threshold 过滤，不等于自动全部进入 ContextPackage。
    en: Cursor semantic codebase search returns scored hits; @ references auto-admit high priority; LangChain store.search/RAG retriever selects chunks by query; Mem0/Pinecone top_k filtered by threshold here—not automatic ContextPackage admission.
    ja: Cursor semantic search は scored hits 返却。@ 参照は high priority 自動採用。LangChain store.search/RAG retriever は query で chunk 選択。Mem0/Pinecone top_k は threshold 过滤。ContextPackage 自動全採用ではない。
  typical_input:
    - description: RAG retrieval candidates with scores
      format: |
        {
          "candidates": [
            {"source_ref": "chunk-42@v7", "similarity_score": 0.91},
            {"source_ref": "chunk-99@v3", "similarity_score": 0.42}
          ],
          "relevance_threshold": 0.65
        }
      source_claims: [claim-context-selection-rag]
    - description: Cursor @ refs and search hits
      format: |
        {
          "referenced_files": ["src/auth/middleware.ts"],
          "semantic_hits": [{"path": "src/auth/session.ts", "score": 0.88}]
        }
      source_claims: [claim-context-selection-cursor]
  typical_output:
    - description: Admitted set and exclusions
      format: |
        {
          "admitted": ["chunk-42@v7", "src/auth/middleware.ts"],
          "exclusions": [{"source_ref": "chunk-99@v3", "reason": "relevance-below-threshold"}]
        }
      source_claims: [claim-context-selection-design]
  reference_implementations:
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Select strategy for relevant context.
    - name: Cursor Semantic Search
      url: https://cursor.com/docs/agent/tools/search
      description: Codebase search with relevance scoring.
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: Phase identifier
        ja: phase 識別子
      definitions:
        zh: 稳定标识一次选择阶段运行。
        en: Stable identifier for one selection phase run.
        ja: 一 selection phase run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: phase-select-204
      allowed_values: []
      source_claims:
        - claim-context-selection-id
    - id: relevance_threshold
      labels:
        zh: 相关性阈值
        en: Relevance threshold
        ja: 関連性閾値
      definitions:
        zh: 可选的最低相关性得分，低于此值的 RAG/search 候选生成 ContextExclusion。
        en: Optional minimum relevance score; sub-threshold RAG/search candidates become ContextExclusions.
        ja: 任意 minimum 関連性 score。未満 RAG/search candidate は ContextExclusion。
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 0.65
      allowed_values: []
      source_claims:
        - claim-context-selection-threshold
  constraints: []
  required_relations: []
examples:
  - id: ContextSelectionActivity-example-cursor
    labels:
      zh: Cursor 选择阶段
      en: Cursor selection phase
      ja: Cursor selection phase
    descriptions:
      zh: phase-select-204 自动纳入 @middleware.ts（user_explicit_reference），semantic hit session.ts（score=0.88>0.65），排除 score=0.41 的 dist 文件命中。
      en: phase-select-204 auto-admits @middleware.ts (user_explicit_reference), semantic hit session.ts (score=0.88>0.65), excludes dist file hit (score=0.41).
      ja: phase-select-204 が @middleware.ts 自動採用、session.ts semantic hit（0.88>0.65）採用、dist file hit（0.41）排除。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: selection
    field_values:
      phase_id: phase-select-204
      relevance_threshold: 0.65
    related_node_ids:
      - ContextSelectionActivity
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-selection-cursor
  - id: ContextSelectionActivity-example-rag
    labels:
      zh: RAG 相关性选择
      en: RAG relevance selection
      ja: RAG 関連性 selection
    descriptions:
      zh: phase-select-88 对 Pinecone top_k=10 候选应用 threshold=0.65，采纳 6 项，chunk-99（0.42）生成 relevance-below-threshold exclusion。
      en: phase-select-88 applies threshold=0.65 to Pinecone top_k=10, admits six, chunk-99 (0.42) gets relevance-below-threshold exclusion.
      ja: phase-select-88 が Pinecone top_k=10 に threshold=0.65 適用。6 件採用。chunk-99（0.42）は relevance-below-threshold exclusion。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: select
    field_values:
      relevance_threshold: 0.65
      admitted_count: 6
    related_node_ids:
      - ContextSelectionActivity
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-context-selection-rag
  - id: ContextSelectionActivity-example-cursorignore
    labels:
      zh: .cursorignore 选择排除
      en: .cursorignore selection exclusion
      ja: .cursorignore selection exclusion
    descriptions:
      zh: phase-select-204 在纳入前检测 .cursorignore 匹配 node_modules/**，直接生成 cursorignore exclusion，不进入后续排序阶段。
      en: phase-select-204 detects .cursorignore match node_modules/** before admission, emitting cursorignore exclusion without entering ordering.
      ja: phase-select-204 が .cursorignore node_modules/** 一致を pre-admission 検出。cursorignore exclusion 出力。ordering 非進入。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/ignore-files
      version: ignore
    field_values:
      exclusion_reason: cursorignore
    related_node_ids:
      - ContextSelectionActivity
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-selection-cursorignore
  - id: ContextSelectionActivity-example-not-ordering
    labels:
      zh: 选择非排序
      en: Selection is not ordering
      ja: selection は ordering ではない
    descriptions:
      zh: phase-order-204 只改变已选候选项相对位置，不新增采纳或拒绝；phase-select-204 才决定成员资格。
      en: phase-order-204 only repositions admitted items without new admit/reject; phase-select-204 decides membership.
      ja: phase-order-204 は採用済み item 位置変更のみ。phase-select-204 が membership 決定。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextSelectionActivity
      - ContextOrderingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-selection-design
parent_relation:
  id: ContextSelectionActivity-is_a-ContextAssemblyPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种组装阶段
    en: is an assembly phase
    ja: 組立段階の一種
  definitions:
    zh: 每个 ContextSelectionActivity 都是 ContextAssemblyPhase；其种差是决定候选纳入或排除，不分配最终顺序或裁剪长度。
    en: Every ContextSelectionActivity is a ContextAssemblyPhase distinguished by deciding candidate admission or exclusion without final ordering or length trimming.
    ja: すべての ContextSelectionActivity は ContextAssemblyPhase で candidate 採否決定（final ordering/length trim なし）という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-selection-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
