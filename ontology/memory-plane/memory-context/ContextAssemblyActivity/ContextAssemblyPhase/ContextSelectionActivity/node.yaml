schema: moonweave.ai/ontology-node/v1
id: ContextSelectionActivity
kind: concept
status: review
labels:
  zh: 上下文选择活动
  en: Context selection activity
  ja: コンテキスト選択活動
semantics:
  short_definition:
    zh: 依据任务、权限、信任和相关性从候选中确定纳入集合的组装阶段。
    en: An assembly phase determining the included set from candidates using task, authorization, trust, and relevance criteria.
    ja: タスク・権限・信頼・関連性に基づき候補から採用集合を決める組立段階です。
  definition:
    zh: 上下文选择活动是一种 ContextAssembly 组成阶段；其种差是：它评估候选相对于当前任务、受众权限、来源信任、安全约束和相关性的纳入资格，输出已选集合与 ContextExclusion。它不负责已选项的最终排序，也不执行长度裁剪。
    en: A context selection activity is a component phase of ContextAssembly. It evaluates candidates against the current task, audience authorization, source trust, safety constraints, and relevance, producing a selected set and ContextExclusions. It does not perform final ordering or length trimming.
    ja: ContextSelectionActivity は ContextAssembly の構成段階で、現在タスク、受信者権限、出典信頼、安全制約、関連性に対して候補資格を評価し、選択集合と ContextExclusion を出力します。最終順序や長さ裁剪は行いません。
  why_needed:
    zh: 单独记录选择阶段可解释候选为何入选或落选，并防止把检索排名、最终排序和窗口裁剪混成一个步骤。
    en: Recording selection separately explains why candidates entered or failed and prevents retrieval ranking, final ordering, and trimming from collapsing into one step.
    ja: 選択段階を分けると採否理由を説明でき、検索順位・最終順序・裁剪を一処理へ混同しません。
  includes:
    - zh: 纳入逐项记录候选 ID、适用规则、权限结果、相关性判定和纳入结论的选择运行阶段。
      en: Includes selection phases recording each candidate ID, applicable rules, authorization outcome, relevance judgment, and inclusion decision.
      ja: 各候補 ID、適用規則、権限結果、関連性判断、採用結論を記録する選択段階を含みます。
  excludes:
    - zh: 排除检索候选生成、已选项排序和容量裁剪；三者分别发生在上游检索、后续排序和后续裁剪阶段。
      en: Excludes candidate generation, ordering of selected items, and capacity trimming; these belong to upstream retrieval and later ordering or trimming phases.
      ja: 候補生成、選択済み項目の順序付け、容量裁剪はそれぞれ上流検索・後続順序・後続裁剪なので除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextSelectionActivity-example-positive-001
    kind: positive
    labels:
      zh: 上下文选择活动正例
      en: Positive example of Context selection activity
      ja: コンテキスト選択活動の正例
    scenario_id: null
    descriptions:
      zh: 选择阶段 select-17 对十个候选逐项检查任务相关性、调用方权限、来源信任和安全约束，采纳六项，并为其余四项生成带原因的 ContextExclusion。
      en: Selection phase select-17 evaluates ten candidates for task relevance, caller authorization, source trust, and safety constraints, admits six, and produces reasoned ContextExclusions for the other four.
      ja: 選択段階 select-17 は十候補をタスク関連度、呼出し元権限、出典信頼、安全制約で評価し、六項を採用し、残り四項へ理由付き ContextExclusion を生成します。
    field_values:
      assembly_id: select-17
      target_call_ref: call-88
      candidate_set_ref: context-candidates-88@4
      context_specification_ref: context-policy-production@12
      started_at: 2026-07-16T04:00:00.000Z
      ended_at: 2026-07-16T04:00:00.065Z
      outcome: success
    related_node_ids:
      - ContextSelectionActivity
      - ContextOrderingActivity
    related_relation_ids:
      - ContextSelectionActivity-precedes-ContextOrderingActivity
    expected_result:
      zh: 该运行可查询 ContextSelectionActivity 以及方向保持不变的事实 ContextSelectionActivity-precedes-ContextOrderingActivity。
      en: The run can query ContextSelectionActivity together with direction-preserving fact ContextSelectionActivity-precedes-ContextOrderingActivity.
      ja: この実行では ContextSelectionActivity と方向を保持した事実 ContextSelectionActivity-precedes-ContextOrderingActivity を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextSelectionActivity-precedes-ContextOrderingActivity 的 canonical 方向、概念定义和可用字段值。
      en: The phase changes candidate membership by explicit admission decisions and records each rejection; it does not yet determine the selected items' relative order or final length.
      ja: このシナリオは実際の運用文脈、ContextSelectionActivity-precedes-ContextOrderingActivity の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-selection-activity-003
      - claim-context-selection-activity-004
  - id: ContextSelectionActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文选择活动边界例
      en: Boundary case for Context selection activity
      ja: コンテキスト選択活動の境界例
    scenario_id: null
    descriptions:
      zh: order-17 接收 select-17 已采纳的六项并只改变它们的相对位置，没有新增采纳或拒绝决定；因此它是 ContextOrderingActivity，而不是 ContextSelectionActivity。
      en: order-17 receives the six items admitted by select-17 and changes only their relative positions, adding no admission or rejection decisions; it is ContextOrderingActivity, not ContextSelectionActivity.
      ja: order-17 は select-17 が採用した六項を受け取り相対位置だけを変え、採用・拒否判断を追加しません。したがって ContextOrderingActivity で、ContextSelectionActivity ではありません。
    field_values: {}
    related_node_ids:
      - ContextSelectionActivity
      - ContextOrderingActivity
    related_relation_ids:
      - ContextSelectionActivity-precedes-ContextOrderingActivity
    expected_result:
      zh: ContextOrderingActivity 保持其原有类型，验证器不得凭关系共现把它提升为 ContextSelectionActivity。
      en: ContextOrderingActivity retains its own type; validation must not promote it to ContextSelectionActivity from relation co-occurrence.
      ja: ContextOrderingActivity は元の型を維持し、関係の共起だけで ContextSelectionActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextSelectionActivity-precedes-ContextOrderingActivity 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Selection determines set membership and reasons for rejection; ordering assumes that membership and determines position. Consecutive phases remain semantically distinct.
      ja: 境界例は実在する対照ノードを示し、ContextSelectionActivity-precedes-ContextOrderingActivity の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-selection-activity-005
      - claim-context-selection-activity-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ContextTrimmingActivity
    shared_parent_concept_id: ContextAssemblyPhase
    differentia:
      zh: 共享父节点对照：父节点 ContextAssemblyPhase：ContextSelectionActivity（semantic kind=activity，骨架 ContextSelectionActivity-is_a-ContextAssemblyPhase）；ContextTrimmingActivity（semantic kind=activity，骨架 ContextTrimmingActivity-is_a-ContextAssemblyPhase）。双端条件：ContextSelectionActivity 条件：“依据任务、权限、信任和相关性从候选中确定纳入集合的组装阶段”；ContextTrimmingActivity 条件：“在保留来源身份和顺序的前提下，使已排序内容满足目标容量的组装阶段”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ContextAssemblyPhase: ContextSelectionActivity (semantic kind=activity, backbone ContextSelectionActivity-is_a-ContextAssemblyPhase); ContextTrimmingActivity (semantic kind=activity, backbone ContextTrimmingActivity-is_a-ContextAssemblyPhase). Endpoint conditions: ContextSelectionActivity condition: “An assembly phase determining the included set from candidates using task, authorization, trust, and relevance criteria”; ContextTrimmingActivity condition: “An assembly phase making ordered content fit target capacity while preserving provenance and relative order”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ContextAssemblyPhase：ContextSelectionActivity（semantic kind=activity、バックボーン ContextSelectionActivity-is_a-ContextAssemblyPhase）；ContextTrimmingActivity（semantic kind=activity、バックボーン ContextTrimmingActivity-is_a-ContextAssemblyPhase）。両端条件：ContextSelectionActivity の条件：「タスク・権限・信頼・関連性に基づき候補から採用集合を決める組立段階です」；ContextTrimmingActivity の条件：「来歴と相対順序を保ちながら、順序済み内容を対象容量へ収める組立段階です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-context-selection-activity-007
parent_relation:
  id: ContextSelectionActivity-is_a-ContextAssemblyPhase
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 选择活动是一种组装阶段
    en: selection activity is an assembly phase
    ja: 選択活動は組立段階の一種
  definitions:
    zh: 每个 ContextSelectionActivity 都是 ContextAssemblyPhase；其种差是对候选逐项作纳入或排除决定，而不确定最终顺序或容量裁剪。
    en: Every ContextSelectionActivity is a ContextAssemblyPhase distinguished by deciding inclusion or exclusion for each candidate without assigning final order or capacity trimming.
    ja: すべての ContextSelectionActivity は ContextAssemblyPhase で、各候補の包含・除外を決め最終順序や容量裁断を行わない種差を持ちます。
