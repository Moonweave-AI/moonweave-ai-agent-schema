      scenario_id: null
      descriptions:
        zh: select-88 根据授权和相关性接受 7 项、排除 3 项。
        en: select-88 accepts seven candidates and excludes three using authorization and relevance.
        ja: select-88 は認可と関連性で7候補を採用し3候補を除外します。
      field_values: {}
