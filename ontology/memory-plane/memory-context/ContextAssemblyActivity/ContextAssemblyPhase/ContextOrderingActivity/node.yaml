schema: moonweave.ai/ontology-node/v1
id: ContextOrderingActivity
kind: concept
status: accepted
labels:
  zh: 上下文排序活动
  en: Context ordering activity
  ja: コンテキスト順序付け活動
semantics:
  short_definition:
    zh: 为已选上下文项确定稳定序列位置和邻接关系的组装阶段。
    en: An assembly phase that assigns stable sequence positions and adjacency to selected context items.
    ja: 選択済みコンテキスト項目へ安定した列位置と隣接関係を割り当てる組立段階です。
  definition:
    zh: 上下文排序活动是一种 ContextAssembly 组成阶段；其种差是：它接收已经完成纳入判定的项目，依据 ContextOrderingRule 生成确定性序列位置与邻接关系，但不新增候选，也不因容量删除项目。
    en: A context ordering activity is a component phase of ContextAssembly. It receives items whose inclusion has already been decided and applies ContextOrderingRules to produce deterministic positions and adjacency, without adding candidates or deleting items for capacity.
    ja: コンテキスト順序付け活動は ContextAssembly の構成段階です。採用判定済み項目を受け、ContextOrderingRule により決定的な位置と隣接を生成しますが、候補追加や容量理由の削除は行いません。
  why_needed:
    zh: 单独记录排序阶段可解释系统指令、最近消息和检索证据为何处于特定位置，并复核裁剪后相对顺序是否保持。
    en: Recording this phase explains why system instructions, recent messages, and retrieved evidence occupy particular positions and verifies that trimming preserved relative order.
    ja: この段階を記録すると、システム指示・最近メッセージ・検索証拠が特定位置にある理由と、裁剪後に相対順序が保たれたかを検証できます。
  includes:
    - zh: 纳入记录输入集合、所用排序规则版本、每项序位和平局处理结果的排序阶段。
      en: Includes ordering phases that record the input set, ordering-rule version, position of every item, and tie-breaking outcome.
      ja: 入力集合、順序規則版、各項目の順位、同順位処理結果を記録する順序付け段階を含みます。
  excludes:
    - zh: 排除决定是否纳入候选的 ContextSelectionActivity，以及为满足容量而删除或缩短内容的 ContextTrimmingActivity。
      en: Excludes ContextSelectionActivity, which decides inclusion, and ContextTrimmingActivity, which removes or shortens content to meet capacity.
      ja: 採用を決める ContextSelectionActivity と、容量を満たすため内容を削除・短縮する ContextTrimmingActivity を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextOrderingActivity-example-positive-001
    kind: positive
    labels:
      zh: 上下文排序活动正例
      en: Positive example of Context ordering activity
      ja: コンテキスト順序付け活動の正例
    scenario_id: null
    descriptions:
      zh: 排序阶段 order-17 接收六个已选项目，依据角色优先、因果依赖和同组内新鲜度，产出固定序列 instruction→task-state→tool-result→evidence-1→evidence-2→summary。
      en: Ordering phase order-17 receives six selected items and, using role precedence, causal dependencies, and freshness within peer groups, emits the stable sequence instruction→task-state→tool-result→evidence-1→evidence-2→summary.
      ja: 順序付け段階 order-17 は選択済み六項目を受け取り、役割優先、因果依存、同群内新鮮度により instruction→task-state→tool-result→evidence-1→evidence-2→summary の安定列を出力します。
    field_values:
      assembly_id: order-17
      target_call_ref: call-88
      candidate_set_ref: selected-context-candidates-88@1
      context_specification_ref: context-policy-production@12
      started_at: 2026-07-16T04:00:00.070Z
      ended_at: 2026-07-16T04:00:00.110Z
      outcome: success
    related_node_ids:
      - ContextOrderingActivity
      - ContextTrimmingActivity
    related_relation_ids:
      - ContextOrderingActivity-precedes-ContextTrimmingActivity
    expected_result:
      zh: 该运行可查询 ContextOrderingActivity 以及方向保持不变的事实 ContextOrderingActivity-precedes-ContextTrimmingActivity。
      en: The run can query ContextOrderingActivity together with direction-preserving fact ContextOrderingActivity-precedes-ContextTrimmingActivity.
      ja: この実行では ContextOrderingActivity と方向を保持した事実 ContextOrderingActivity-precedes-ContextTrimmingActivity を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextOrderingActivity-precedes-ContextTrimmingActivity 的 canonical 方向、概念定义和可用字段值。
      en: This is an executed phase that changes order and adjacency without adding or removing members; capacity trimming occurs only after this ordered result exists.
      ja: このシナリオは実際の運用文脈、ContextOrderingActivity-precedes-ContextTrimmingActivity の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ordering-activity-003
      - claim-context-ordering-activity-004
  - id: ContextOrderingActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文排序活动边界例
      en: Boundary case for Context ordering activity
      ja: コンテキスト順序付け活動の境界例
    scenario_id: null
    descriptions:
      zh: 随后执行的 trim-17 删除 evidence-2 并把 summary 缩短到 300 tokens；它改变成员或范围而不重新计算剩余项顺序，因此属于 ContextTrimmingActivity 而非 ContextOrderingActivity。
      en: The following trim-17 removes evidence-2 and shortens summary to 300 tokens. It changes membership or extent without recomputing the remaining order, so it is ContextTrimmingActivity rather than ContextOrderingActivity.
      ja: 後続 trim-17 は evidence-2 を除き summary を300 tokensへ短縮します。残存順序を再計算せず構成員または範囲を変えるため、ContextOrderingActivity ではなく ContextTrimmingActivity です。
    field_values: {}
    related_node_ids:
      - ContextOrderingActivity
      - ContextTrimmingActivity
    related_relation_ids:
      - ContextOrderingActivity-precedes-ContextTrimmingActivity
    expected_result:
      zh: ContextTrimmingActivity 保持其原有类型，验证器不得凭关系共现把它提升为 ContextOrderingActivity。
      en: ContextTrimmingActivity retains its own type; validation must not promote it to ContextOrderingActivity from relation co-occurrence.
      ja: ContextTrimmingActivity は元の型を維持し、関係の共起だけで ContextOrderingActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextOrderingActivity-precedes-ContextTrimmingActivity 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Ordering determines relative position over a fixed selected set; trimming changes membership or extent to satisfy capacity. Temporal adjacency does not collapse those different effects.
      ja: 境界例は実在する対照ノードを示し、ContextOrderingActivity-precedes-ContextTrimmingActivity の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ordering-activity-005
      - claim-context-ordering-activity-006
