schema: moonweave.ai/ontology-node/v1
id: ContextOrderingActivity
kind: concept
labels:
  zh: 上下文排序活动
  en: Context ordering activity
  ja: コンテキスト整列活動
semantics:
  short_definition:
    zh: 为已选候选项确定最终窗口内顺序的组装阶段。
    en: Assembly phase assigning final in-window order to already-selected items.
    ja: 選択済み item の final in-window 順序を決める assembly phase。
  definition:
    zh: ContextOrderingActivity 是 ContextAssemblyPhase；对已选候选项应用 ContextOrderingRule，确定 system→user→assistant 角色顺序、recency priority（最近消息/文件优先）与 authority tie-break。它不改变成员资格或总 token 长度，只改变相对位置。
    en: ContextOrderingActivity is a ContextAssemblyPhase applying ContextOrderingRule to selected items, determining system→user→assistant role order, recency priority (recent messages/files first), and authority tie-breaks. It changes relative position only—not membership or total token length.
    ja: ContextOrderingActivity は ContextOrderingRule を選択済み item に適用し system→user→assistant role order/recency priority（recent message/file 優先）/authority tie-break を決める ContextAssemblyPhase。membership/total token length は変えず相対位置のみ変更。
  why_needed:
    zh: 排序独立后可解释为何 system prompt 在 slot 1、tool results 紧随 assistant、Cursor recent files 靠近用户消息——这些影响模型注意力分布。
    en: Separate ordering explains why system prompt sits in slot 1, tool results follow assistant, and Cursor recent files sit near user messages—affecting model attention distribution.
    ja: ordering 独立で system prompt slot 1/tool results が assistant 直後/Cursor recent files が user message 近傍の理由説明可能。model attention 分布に影響。
  includes:
    - zh: 纳入对已选集合应用排序规则并输出 ordinal 分配的选择后阶段。
      en: Includes post-selection phases applying ordering rules and emitting ordinal assignments.
      ja: ordering rule 適用と ordinal 割当を出力する post-selection phase。
  excludes:
    - zh: 排除候选选择（ContextSelectionActivity）与容量裁剪（ContextTrimmingActivity）。
      en: Excludes candidate selection (ContextSelectionActivity) and capacity trimming (ContextTrimmingActivity).
      ja: candidate selection（ContextSelectionActivity）/capacity trimming（ContextTrimmingActivity）を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Anthropic Messages API 要求 system 在前、tool_result 作为 user content 跟随 assistant；Cursor 典型顺序 system rules → user message → @ referenced files → recent files → semantic hits；Manus 将 todo.md 复述注入 context tail 以保持 recency；ContextOrderingRule 声明可复用顺序策略。
    en: Anthropic Messages API requires system first, tool_result as user content after assistant; Cursor typical order system rules → user message → @ referenced files → recent files → semantic hits; Manus injects todo.md recitation at context tail for recency; ContextOrderingRule declares reusable ordering policies.
    ja: Anthropic Messages API は system 先、tool_result は assistant 後 user content。Cursor 典型順序 system rules→user message→@ files→recent files→semantic hits。Manus は todo.md 復唱を context tail 注入。ContextOrderingRule は reusable ordering policy 宣言。
  typical_input:
    - description: Selected items before ordering
      format: |
        {
          "selected": [
            {"source_ref": "chunk-42@v7", "role": "retrieved_evidence"},
            {"source_ref": "middleware.ts@vabc", "role": "referenced_file"},
            {"source_ref": "message-v41", "role": "user_message"}
          ]
        }
      source_claims: [claim-context-ordering-input]
  typical_output:
    - description: Ordered slot ordinals
      format: |
        {
          "ordered_slots": [
            {"ordinal": 1, "role": "system_instruction"},
            {"ordinal": 2, "role": "user_message"},
            {"ordinal": 3, "role": "referenced_file"},
            {"ordinal": 4, "role": "retrieved_evidence"}
          ]
        }
      source_claims: [claim-context-ordering-design]
  reference_implementations:
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Role-ordered message slots.
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: system → user → @ refs → recent ordering.
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: Phase identifier
        ja: phase 識別子
      definitions:
        zh: 稳定标识一次排序阶段运行。
        en: Stable identifier for one ordering phase run.
        ja: 一 ordering phase run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: phase-order-204
      allowed_values: []
      source_claims:
        - claim-context-ordering-id
    - id: ordering_rule_ref
      labels:
        zh: 排序规则引用
        en: Ordering rule reference
        ja: ordering rule ref
      definitions:
        zh: 引用本次阶段应用的 ContextOrderingRule 修订版。
        en: References the ContextOrderingRule revision applied in this phase.
        ja: この phase で適用した ContextOrderingRule revision を参照。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: rule-recency@v3
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule
  constraints: []
  required_relations: []
examples:
  - id: ContextOrderingActivity-example-claude-roles
    labels:
      zh: Claude 角色排序
      en: Claude role ordering
      ja: Claude role ordering
    descriptions:
      zh: phase-order-88 按 API 约定：slot 1 system，slot 2–5 user/assistant 交替，slot 6–7 tool_result blocks；不改变已选成员集合。
      en: phase-order-88 per API convention slot 1 system, slots 2–5 user/assistant alternation, slots 6–7 tool_result blocks; selected membership unchanged.
      ja: phase-order-88 は API 規約で slot 1 system、slot 2–5 user/assistant 交替、slot 6–7 tool_result。選択 membership 不変。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: message ordering
    field_values:
      phase_id: phase-order-88
    related_node_ids:
      - ContextOrderingActivity
      - ContextSlot
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-anthropic
  - id: ContextOrderingActivity-example-cursor
    labels:
      zh: Cursor 组装顺序
      en: Cursor assembly order
      ja: Cursor assembly order
    descriptions:
      zh: phase-order-204 顺序：system rules → user message → @ referenced files（高 authority 先）→ recent files（按 mtime desc）→ semantic hits（按 score desc）。
      en: phase-order-204 order system rules → user message → @ referenced files (high authority first) → recent files (mtime desc) → semantic hits (score desc).
      ja: phase-order-204 順序：system rules→user message→@ files（高 authority 先）→recent files（mtime desc）→semantic hits（score desc）。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: assembly order
    field_values:
      phase_id: phase-order-204
      ordering_rule_ref: rule-cursor-default@v2
    related_node_ids:
      - ContextOrderingActivity
      - ContextOrderingRule
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-cursor
  - id: ContextOrderingActivity-example-recency-tail
    labels:
      zh: 近期优先尾部注入
      en: Recency-priority tail injection
      ja: recency priority tail injection
    descriptions:
      zh: Manus 风格 rule-recency 将 todo.md 当前目标复述放在 context tail（最高 recency ordinal），使 global plan 保持在近期注意力区。
      en: Manus-style rule-recency places todo.md current objective recitation at context tail (highest recency ordinal) keeping global plan in recent attention zone.
      ja: Manus 風 rule-recency が todo.md 現目標復唱を context tail（最高 recency ordinal）配置。global plan を recent attention 域に保持。
    example_source:
      product: LangChain
      url: https://www.langchain.com/blog/context-engineering-for-agents
      version: recency patterns
    field_values:
      ordering_rule_ref: rule-recency@v3
    related_node_ids:
      - ContextOrderingActivity
      - ContextOrderingRule
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-recency
  - id: ContextOrderingActivity-example-not-selection
    labels:
      zh: 排序非选择
      en: Ordering is not selection
      ja: ordering は selection ではない
    descriptions:
      zh: phase-order-204 接收 phase-select-204 已采纳六项，只重排 ordinal，不新增 ContextExclusion；成员变更属于 ContextSelectionActivity。
      en: phase-order-204 receives six items from phase-select-204, reorders ordinals only, adds no ContextExclusions; membership changes belong to ContextSelectionActivity.
      ja: phase-order-204 は phase-select-204 採用 6 item 受取、ordinal 再配置のみ。ContextExclusion 追加なし。membership 変更は ContextSelectionActivity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextOrderingActivity
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-design
parent_relation:
  id: ContextOrderingActivity-is_a-ContextAssemblyPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种组装阶段
    en: is an assembly phase
    ja: 組立段階の一種
  definitions:
    zh: 每个 ContextOrderingActivity 都是 ContextAssemblyPhase；其种差是分配已选候选项的最终顺序，不决定纳入或裁剪。
    en: Every ContextOrderingActivity is a ContextAssemblyPhase distinguished by assigning final order to selected items without deciding admission or trimming.
    ja: すべての ContextOrderingActivity は ContextAssemblyPhase で選択済み item の final order 割当（admission/trim 決定なし）という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-ordering-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
