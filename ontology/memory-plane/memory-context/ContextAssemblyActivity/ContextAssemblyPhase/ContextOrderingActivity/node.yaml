source_claims:
  - id: claim-context-ordering-message-order
    source: langgraph-memory
    supports: LangGraph documents transforming and invoking a model with an ordered messages sequence. Moonweave represents an ordering activity as a membership-preserving permutation of selected artifacts before rendering that sequence.
    locator: "LangGraph memory guide: ordered messages passed to model invocation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-ordering-realtime-position
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents previous_item_id for conversation.item.create, allowing a new item to be appended, placed at the beginning, or inserted after an existing item. Moonweave records the local rule and activity that choose placement separately from the provider event.
    locator: "Realtime conversation.item.create previous_item_id semantics"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-ordering-position-effect
    source: lost-in-middle
    supports: Liu et al. report that long-context performance depends on relevant-information position, including weaker use for middle positions in tested settings. Moonweave requires explicit local ordering rules but does not assert a universal order.
    locator: "Abstract and long-context retrieval experiments"
    evidence_kind: academic-result
    confidence: high
