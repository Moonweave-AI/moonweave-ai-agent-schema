schema: moonweave.ai/ontology-node/v1
id: ContextOrderingActivity
kind: concept
status: accepted
labels:
  zh: 上下文排序活动
  en: Context ordering activity
  ja: コンテキスト順序付け活動
semantics:
  short_definition:
    zh: 在不改变已选工件成员的前提下，为一次装配确定其渲染顺序的完成阶段活动。
    en: A completed phase activity that determines rendering order for selected artifacts without changing their membership.
    ja: 選択済み工件の所属を変えずに、一回の組立の描画順を決める完了段階活動です。
  definition:
    zh: >
      ContextOrderingActivity 是 ContextAssemblyPhase 的完成子类型，接收已选 ContextArtifact 的同一成员集合与一个 ContextOrderingRule，产出该集合的确定顺序。它处理位置和相对顺序，不负责是否选择候选、是否裁剪、是否摘要或是否授权。其 ordered_artifact_refs 必须是 input_artifact_refs 的排列，不能添加、删除、压缩或替换项。排序可把治理指令、当前请求、证据和历史放在不同位置，但不能从“位置影响模型表现”的研究结果推断存在对所有模型、任务都最优的普遍顺序。
    en: >
      ContextOrderingActivity is a completed ContextAssemblyPhase subtype that receives the same membership set of selected ContextArtifacts and a ContextOrderingRule, then produces a deterministic order for that set. It handles position and relative order, not whether to select candidates, trim, summarize, or authorize them. ordered_artifact_refs must be a permutation of input_artifact_refs and cannot add, delete, compress, or substitute items. Ordering can place governing instructions, the current request, evidence, and history differently, but research that position affects model performance does not establish one universally optimal order for all models and tasks.
    ja: >
      ContextOrderingActivity は完了 ContextAssemblyPhase 下位型であり、選択済み ContextArtifact の同一所属集合と ContextOrderingRule を受け取り、その集合の決定的順序を生成します。位置と相対順を扱い、候補選択、裁断、要約、認可は扱いません。ordered_artifact_refs は input_artifact_refs の順列でなければならず、項目の追加、削除、圧縮、置換はできません。順序付けは統治指示、現在要求、根拠、履歴を異なる位置に置けますが、位置がモデル性能に影響する研究は、全モデル・全タスクに普遍的に最適な順序を確立しません。
  why_needed:
    zh: 长上下文中信息位置会影响可用性；独立排序活动让位置规则可审计，同时防止选择、裁剪或政策判断被隐藏在“排序”名义下。
    en: Information position affects long-context usability. An independent ordering activity makes placement rules auditable while preventing selection, trimming, or policy judgment from being hidden under “ordering.”
    ja: 情報位置は長いコンテキストの利用可能性に影響します。独立した順序付け活動により配置規則を監査可能にし、選択、裁断、方針判断を「順序付け」の下に隠しません。
  includes:
    - zh: 已选项的输入集合、应用排序规则、排列输出和完成时间。
      en: Selected-item input set, applied ordering rule, permutation output, and completion time.
      ja: 選択項目入力集合、適用順序規則、順列出力、完了時刻。
  excludes:
    - zh: 候选纳入、内容裁剪、摘要生成、来源授权或模型调用。
      en: Candidate admission, content trimming, summary generation, source authorization, or model invocation.
      ja: 候補受け入れ、内容裁断、要約生成、情報源認可、モデル呼び出し。
  semantic_kind: activity
  aliases:
    - context placement activity
engineering:
  explanation:
    zh: >
      实现以有序消息或会话项列表为真实 I/O 表面。LangGraph 最终将消息列表传给模型；OpenAI Realtime 的 conversation.item.create 允许通过 previous_item_id 在会话中插入项目。Moonweave 在这些 API 之上记录排序规则和输入排列，但不假装排序活动是提供方原生 API。
    en: >
      Use ordered message or conversation-item lists as the real I/O surface. LangGraph ultimately passes a message list to a model, and OpenAI Realtime conversation.item.create can insert an item through previous_item_id. Moonweave records ordering rule and input permutation above those APIs without pretending ordering activity is provider-native.
    ja: >
      順序付きメッセージまたは会話項目リストを実 I/O 表面として使います。LangGraph は最終的にメッセージリストをモデルへ渡し、OpenAI Realtime の conversation.item.create は previous_item_id で項目を会話内に挿入できます。Moonweave はこれら API の上に順序規則と入力順列を記録し、順序付け活動がプロバイダー固有 API であるとは見せかけません。
  typical_input:
    - description: Ordered message sequence passed after assembly.
      format: |
        visible_messages = [system_instruction, developer_instruction, history_summary, user_request]
        response = model.invoke(visible_messages)
    - description: OpenAI Realtime item insertion order control.
      format: |
        {
          "type": "conversation.item.create",
          "previous_item_id": "item_123",
          "item": {"type": "message", "role": "user", "content": [{"type": "input_text", "text": "Additional evidence"}]}
        }
  typical_output:
    - description: Deterministic permutation of the same selected artifacts.
      format: |
        {
          "ordering_activity_id": "ctx-order-01",
          "input_artifact_refs": ["ctx-art-user-22", "ctx-art-system-1", "ctx-art-summary-9"],
          "ordered_artifact_refs": ["ctx-art-system-1", "ctx-art-summary-9", "ctx-art-user-22"],
          "ordering_rule_ref": "ctx-rule-support-order-v1"
        }
  reference_implementations:
    - name: LangGraph message invocation pattern
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents preparing and invoking models with an ordered messages sequence.
    - name: OpenAI Realtime API conversation item creation
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents previous_item_id for appending or inserting conversation items in order.
    - name: Lost in the Middle
      url: https://arxiv.org/abs/2307.03172
      description: Reports position-dependent long-context performance.
  source_claims:
    - claim-context-ordering-message-order
    - claim-context-ordering-realtime-position
    - claim-context-ordering-position-effect
structure:
  identity_keys:
    - assembly_activity_id
    - phase_activity_id
    - ordering_activity_id
  fields:
    - id: ordering_activity_id
      labels:
        zh: 排序活动标识
        en: ordering activity ID
        ja: 順序付け活動 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次完成的排序阶段，而非排序规则、包或消息序列标识。
        en: Identifies one completed ordering phase, not an ordering rule, package, or message-sequence ID.
        ja: 一つの完了順序付け段階を識別し、順序規則、パッケージ、メッセージ列 ID ではありません。
      allowed_values: []
      pattern: '^ctx-order-[A-Za-z0-9._-]+$'
      example_value: ctx-order-01
      source_claims: [claim-context-ordering-message-order]
    - id: assembly_ref
      labels:
        zh: 父装配引用
        en: parent assembly reference
        ja: 親組立参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向该排序阶段所属的具体 ContextAssembly。
        en: Points to the concrete ContextAssembly containing this ordering phase.
        ja: この順序付け段階を含む具体的 ContextAssembly を指します。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-support-01
      source_claims: [claim-context-ordering-message-order]
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 必须与父装配和相关包的调用范围一致。
        en: Must match the call scope of parent assembly and related package.
        ja: 親組立と関連パッケージの呼び出し範囲に一致しなければなりません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims: [claim-context-ordering-message-order]
    - id: input_artifact_refs
      labels:
        zh: 输入工件引用
        en: input artifact references
        ja: 入力工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 排序前已选工件的无重复成员集合；它不是所有候选或完整历史。
        en: The duplicate-free membership set of artifacts already selected before ordering, not all candidates or complete history.
        ja: 順序付け前に既に選択された工件の重複なし所属集合であり、全候補や完全履歴ではありません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-summary-9, ctx-art-user-22]
      source_claims: [claim-context-ordering-message-order]
    - id: ordering_rule_ref
      labels:
        zh: 排序规则引用
        en: ordering rule reference
        ja: 順序規則参照
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向此次实际使用的 ContextOrderingRule 版本，而不是一个未应用的建议。
        en: Points to the version of ContextOrderingRule actually used this time, not an unapplied recommendation.
        ja: 今回実際に使用した ContextOrderingRule 版を指し、未適用の推奨を指しません。
      allowed_values: []
      pattern: '^ctx-rule-[A-Za-z0-9._-]+$'
      example_value: ctx-rule-support-order-v1
      source_claims: [claim-context-ordering-position-effect]
    - id: ordered_artifact_refs
      labels:
        zh: 有序工件引用
        en: ordered artifact references
        ja: 順序付き工件参照
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 与输入成员完全相同但按本次渲染顺序排列的列表；它不能承担删除、摘要或选择职责。
        en: A list with exactly the input membership but in this rendering order. It cannot perform deletion, summarization, or selection.
        ja: 入力と完全に同じ所属を今回の描画順で並べたリストです。削除、要約、選択を行えません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1, ctx-art-summary-9, ctx-art-user-22]
      source_claims: [claim-context-ordering-message-order]
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录排序完成时间，不是最终模型响应的生成时间。
        en: Records completion of ordering, not generation time of a final model response.
        ja: 順序付けの完了を記録し、最終モデル応答の生成時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:01Z"
      source_claims: [claim-context-ordering-message-order]
    - id: assembly_activity_id
      labels: {zh: 父装配活动标识, en: parent assembly activity ID, ja: 親組み立て活動 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识包含本次排序的已执行装配活动，不把排序活动本身提升为完整装配。
        en: Identifies the executed assembly activity containing this ordering step without elevating the ordering activity to the complete assembly.
        ja: この順序付けを含む実行済み組み立て活動を識別し、順序付け活動自体を完全な組み立てへ昇格させません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-activity-support-01
      source_claims: [claim-context-ordering-message-order]
    - id: phase_activity_id
      labels: {zh: 排序阶段活动标识, en: ordering phase activity ID, ja: 順序付けフェーズ活動 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留父 ContextAssemblyPhase 的身份，使这次排列成为装配阶段而不是提供方插入事件。
        en: Retains the parent ContextAssemblyPhase identity so this permutation remains an assembly phase rather than a provider insertion event.
        ja: 親 ContextAssemblyPhase の ID を保持し、この並べ替えを提供者の挿入イベントではなく組み立てフェーズに保ちます。
      allowed_values: []
      pattern: '^ctx-phase-[A-Za-z0-9._-]+$'
      example_value: ctx-phase-ordering-01
      source_claims: [claim-context-ordering-message-order]
    - id: consumed_artifact_refs
      labels: {zh: 父活动已消费工件引用, en: parent activity consumed artifact references, ja: 親活動で消費したアーティファクト参照}
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 列出父装配实际消费的工件；对排序阶段而言，该集合保留成员事实，input_artifact_refs 仍表达排列输入。
        en: Lists artifacts actually consumed by the parent assembly; for ordering it preserves membership facts while input_artifact_refs expresses permutation input.
        ja: 親組み立てが実際に消費したアーティファクトを列挙します。順序付けでは所属の事実を保ち、input_artifact_refs が並べ替え入力を表します。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value: [ctx-art-system-1]
      source_claims: [claim-context-ordering-message-order]
    - id: window_ref
      labels: {zh: 父活动窗口引用, en: parent activity window reference, ja: 親活動のウィンドウ参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 关联排序服务的容量窗口，使位置选择仍受同一次调用的输入预算约束。
        en: Links ordering to the capacity window it serves so position choices remain constrained by the same call's input budget.
        ja: 順序付けをそれが利用する容量ウィンドウに結び付け、位置の選択が同じ呼び出しの入力予算に制約されるようにします。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims: [claim-context-ordering-message-order]
    - id: applied_policy_ref
      labels: {zh: 父活动已应用策略引用, en: parent activity applied policy reference, ja: 親活動の適用済み方針参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录装配实际采用的整体上下文策略，区别于 ordering_rule_ref 的具体排列规则。
        en: Records the overall context policy actually applied by the assembly, distinct from ordering_rule_ref's specific permutation rule.
        ja: 組み立てで実際に適用された全体コンテキスト方針を記録し、ordering_rule_ref の具体的な並べ替え規則と区別します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._@-]+$'
      example_value: ctx-spec-support-v1
      source_claims: [claim-context-ordering-message-order]
    - id: activity_status
      labels: {zh: 父活动状态, en: parent activity status, ja: 親活動状態}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录父装配执行的状态，避免将一份已计算的顺序误作成功交付的上下文包。
        en: Records the parent assembly execution status so a computed order is not mistaken for a successfully delivered context package.
        ja: 親組み立ての実行状態を記録し、計算済みの順序を正常に配信されたコンテキストパッケージと取り違えません。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
      source_claims: [claim-context-ordering-message-order]
    - id: phase_kind
      labels: {zh: 阶段类别, en: phase kind, ja: フェーズ種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明该子活动为 ordering 阶段，只变换成员的相对位置而不改变成员资格。
        en: Declares this subactivity as the ordering phase, changing only relative member positions rather than membership.
        ja: この部分活動を ordering フェーズとして宣言し、所属を変えずにメンバーの相対位置だけを変更します。
      allowed_values: [ordering]
      pattern: null
      example_value: ordering
      source_claims: [claim-context-ordering-message-order]
    - id: phase_index
      labels: {zh: 阶段序号, en: phase index, ja: フェーズ順序番号}
      datatype: integer
      required: true
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 记录排序在一次装配活动内的执行次序，而不表示最终消息的槽位位置。
        en: Records ordering's execution sequence within one assembly activity, not the slot position of a final message.
        ja: 一つの組み立て活動内での順序付けの実行順を記録し、最終メッセージのスロット位置を表しません。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims: [claim-context-ordering-message-order]
    - id: phase_status
      labels: {zh: 阶段状态, en: phase status, ja: フェーズ状態}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录排序阶段本身的完成、失败或取消状态，独立于父装配和包最终化状态。
        en: Records whether ordering itself completed, failed, or was cancelled, independently of parent assembly and package finalization state.
        ja: 順序付け自体が完了、失敗、取消のいずれかを記録し、親組み立てとパッケージ最終化の状態から独立させます。
      allowed_values: [completed, failed, cancelled]
      pattern: null
      example_value: completed
      source_claims: [claim-context-ordering-message-order]
  constraints:
    - id: context-ordering-preserves-selected-membership
      severity: error
      expression_language: plain
      expression: ordered_artifact_refs must be a duplicate-free permutation of input_artifact_refs. An ordering activity may not add, remove, summarize, or replace artifacts.
      explanation:
        zh: 成员改变属于选择、裁剪或摘要阶段；排序只改变位置。
        en: Membership change belongs to selection, trimming, or summarization phases; ordering changes only position.
        ja: 所属変更は selection、trimming、summarization 段階に属します。ordering は位置だけを変えます。
      source_claims: [claim-context-ordering-message-order]
    - id: context-ordering-uses-applied-rule-not-universal-claim
      severity: warning
      expression_language: plain
      expression: Ordering must cite an applied ordering_rule_ref. No ordering activity may claim its placement is universally optimal across all models, contexts, or tasks.
      explanation:
        zh: 排序需要可审计的局部规则；研究支持位置敏感性，不支持普遍最优模板。
        en: Ordering needs an auditable local rule. Research supports position sensitivity, not a universally optimal template.
        ja: 順序付けには監査可能な局所規則が必要です。研究は位置感度を支持しますが、普遍的最適テンプレートを支持しません。
      source_claims: [claim-context-ordering-position-effect]
examples:
  - id: context-ordering-example-positive-support-order

    labels: {zh: 支持调用的确定排序, en: Deterministic support-call ordering, ja: 決定的なサポート呼び出し順序付け}

    descriptions:
      zh: Lost in the Middle：高 relevance 检索文档放 prompt 首尾；RAG p(y|x,z) 将检索 z 插入 system/user 边界；Cursor @ 引用按相关性排序。
      en: Lost in the Middle: high-relevance retrieved docs at prompt head/tail; RAG p(y|x,z) inserts retrieved z at system/user boundary; Cursor @ citations sorted by relevance.
      ja: Lost in the Middle 高 relevance doc を prompt 首尾へ。RAG p(y|x,z) system/user 境界 insert。
    field_values:
      assembly_activity_id: ctx-assembly-activity-support-01
      phase_activity_id: ctx-phase-ordering-01
      ordering_activity_id: ctx-order-01
      assembly_ref: ctx-assembly-support-01
      call_scope_id: call-support-20260719-01
      consumed_artifact_refs: [ctx-art-system-1, ctx-art-summary-9, ctx-art-user-22]
      window_ref: ctx-window-support-01
      applied_policy_ref: ctx-spec-support-v1
      activity_status: completed
      phase_kind: ordering
      phase_index: 1
      phase_status: completed
      input_artifact_refs: [ctx-art-user-22, ctx-art-system-1, ctx-art-summary-9]
      ordering_rule_ref: ctx-rule-support-order-v1
      ordered_artifact_refs: [ctx-art-system-1, ctx-art-summary-9, ctx-art-user-22]
      completed_at: "2026-07-19T09:20:01Z"
    related_node_ids: [ContextOrderingActivity, ContextAssembly, ContextOrderingRule]
    related_relation_ids: [ContextAssemblyPhase-part-of-ContextAssembly]

    source_claims: [claim-context-ordering-message-order, claim-context-ordering-position-effect]
  - id: context-ordering-example-counterexample-drop-candidate

    labels: {zh: 用排序名义丢弃候选, en: Drop a candidate under the name of ordering, ja: 順序付けの名目で候補を落とす}

    descriptions:
      zh: 反例：RetrievalResult 候选按 raw similarity 降序全部置于 context 中间段。
      en: Counterexample: RetrievalResult candidates by raw similarity descending all placed in context middle section.
      ja: 反例：RetrievalResult candidate を context 中間段に全配置。
    field_values:
      ordering_activity_id: ctx-order-invalid-drop
      assembly_ref: ctx-assembly-support-02
      call_scope_id: call-support-20260719-02
      input_artifact_refs: [ctx-art-system-1, ctx-art-evidence-1, ctx-art-user-23]
      ordering_rule_ref: ctx-rule-support-order-v1
      ordered_artifact_refs: [ctx-art-system-1, ctx-art-user-23]
      completed_at: "2026-07-19T09:21:01Z"
    related_node_ids: [ContextOrderingActivity, ContextSelectionActivity, ContextTrimmingActivity]
    related_relation_ids: [ContextAssemblyPhase-part-of-ContextAssembly]

