source_claims:
  - id: claim-context-ordering-activity-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents structured model context containing instructions, messages, memory, and compressed material, all of which must be presented to a model call in a concrete sequence. Moonweave reifies the run-specific determination of that sequence as ContextOrderingActivity; the class and its phase placement are design inferences.
    locator: Context engineering in Deep Agents > Summarization > recent messages retained beside compressed history
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-002
    source: lit-agent-memory-as-action
    supports: Memory as Action frames memory management as explicit operations chosen during agent execution. ContextOrderingActivity is Moonweave's run-level operation for fixing relative position and adjacency among already selected items, kept separate from selection and trimming.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents a deterministic context-preparation lifecycle before model calls, including keeping recent messages while compressing older content. Moonweave makes the ordering step observable so the final sequence can be audited independently of trimming.
    locator: Context engineering in Deep Agents > Summarization > recent messages retained beside compressed history
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-004
    source: lit-agent-memory-as-action
    supports: Memory as Action motivates agent-controlled memory operations under limited context. The concrete role/dependency/freshness ordering phase is Moonweave's auditable preparation activity, not an operation name asserted by the paper.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes summarization and offloading, which change active content, from the resulting prompt order. Moonweave uses effect on membership/extent versus effect on order as the boundary test here.
    locator: Context engineering in Deep Agents > Summarization > recent messages retained beside compressed history
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-006
    source: lit-agent-memory-as-action
    supports: Memory as Action distinguishes operations by the memory transformation they perform. Moonweave accordingly separates a permutation of selected items from deletion, shortening, or summary replacement.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-ordering-activity-007
    source: eng-fw-langchain-context-engineering
    supports: Role, timestamp, and stable-ID comparison keys make the selected model-context order replayable.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ordering-activity-008
    source: eng-fw-langchain-context-engineering
    supports: Capacity-driven removal changes which context is present and therefore belongs to trimming rather than ordering.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ordering-activity-009
    source: eng-fw-langchain-context-engineering
    supports: LangChain describes controlling the messages and tools supplied to a model call; Moonweave separates deterministic ordering of the selected components into its own traceable phase.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ordering-activity-010
    source: eng-fw-langchain-context-engineering
    supports: Matching assembly identity, non-overlapping intervals, and explicit handoff establish execution-level precedence.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ordering-activity-011
    source: eng-fw-langchain-context-engineering
    supports: An earlier timestamp in an unrelated run has no workflow or data dependency with trim-3.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-ordering-activity-012
    source: eng-fw-langchain-context-engineering
    supports: Context construction controls both which components enter a call and their final form; Moonweave orders the concrete ordering and capacity phases when one phase's output feeds the next.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
