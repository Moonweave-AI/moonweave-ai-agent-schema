    supports: autoCompact and /compact trigger context refresh at threshold or manually.
    locator: Compaction
    evidence_kind: official
    confidence: high
  - id: claim-context-refresh-cursor
    source: src-cursor-context
    supports: New @ references trigger context re-assembly.
    locator: "@ references"
    evidence_kind: official
    confidence: high
  - id: claim-context-refresh-recycling
    source: src-context-recycling-2026
    supports: Scheduled proactive load triggers periodic refresh.
    locator: Proactive load
    evidence_kind: academic
    confidence: high
  - id: claim-context-refresh-design
    source: src-memory-context-design
    supports: ContextRefreshEvent triggers assembly, not identical to it.
    locator: boundary
