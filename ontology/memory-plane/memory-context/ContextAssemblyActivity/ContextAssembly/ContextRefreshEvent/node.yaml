schema: moonweave.ai/ontology-node/v1
id: ContextRefreshEvent
kind: concept
status: review
labels:
  zh: 上下文刷新事件
  en: context refresh event
  ja: コンテキスト更新イベント
semantics:
  short_definition:
    zh: 新证据、反馈或状态变化使既有上下文版本需要重新组装的可观测事件。
    en: An observable event indicating that new evidence, feedback, or state change requires an existing context version to be reassembled.
    ja: 新証拠・フィードバック・状態変化により既存文脈版の再組立が必要になったことを示す観測可能イベントです。
  definition:
    zh: 上下文刷新事件是一种事件；其种差是：它记录使某个已标识 ContextPackage 或 ContextWindow 失去时效的触发变化，并标明前驱版本与刷新原因，随后可触发新的 ContextAssembly。它不是刷新活动本身，也不是刷新后产生的新包。
    en: A context refresh event is an event that records a triggering change making an identified ContextPackage or ContextWindow stale, identifies the predecessor version and refresh reason, and may trigger a new ContextAssembly. It is neither the refresh activity nor the new package produced afterward.
    ja: コンテキスト更新イベントは、特定 ContextPackage・ContextWindow を陳腐化させる変化、前駆版、更新理由を記録し、新しい ContextAssembly を誘発し得るイベントです。更新活動そのものでも、更新後の新パッケージでもありません。
  why_needed:
    zh: 该事件让系统区分定时刷新、证据变化和反馈驱动更新，并能从新上下文追溯被替换的前驱版本。
    en: The event distinguishes scheduled, evidence-driven, and feedback-driven refreshes and lets a new context be traced to the predecessor it replaced.
    ja: 定時・証拠変化・フィードバック駆動の更新を区別し、新文脈から置換した前駆版へ追跡できます。
  includes:
    - zh: 纳入“source-version 42 到达，使 package-v17 中的 version 41 证据陈旧”这类带触发证据、前驱包和发生时间的事件。
      en: Includes events such as “source version 42 arrived, making version-41 evidence in package-v17 stale,” with trigger evidence, predecessor package, and occurrence time.
      ja: 「source version 42 の到着で package-v17 内 version 41 証拠が陳腐化」のように、誘因証拠・前駆包・発生時刻を持つイベントを含みます。
  excludes:
    - zh: 排除定期刷新规则、执行重新组装的 ContextAssembly，以及刷新前后两个 ContextPackage；它们分别是规范、活动和产物。
      en: Excludes a periodic refresh rule, the ContextAssembly performing reassembly, and the pre- and post-refresh ContextPackages; these are a specification, activity, and artifacts.
      ja: 定期更新規則、再組立を行う ContextAssembly、更新前後の ContextPackage はそれぞれ仕様・活動・成果物なので除外します。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_source
    - event_id
  fields:
    - id: event_source
      labels:
        zh: 事件来源
        en: event source
        ja: イベント出典
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识检测到上下文失效变化并记录刷新事件的上下文管理器或运行边界。
        en: Stably identifies the context manager or runtime boundary that detected the invalidating change and recorded the refresh event.
        ja: 文脈を無効化する変化を検出し更新イベントを記録した context manager・runtime boundary を安定識別します。
      allowed_values: []
      pattern: null
      example_value: urn:moonweave:context-manager:primary
      source_claims:
        - claim-context-refresh-event-003
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在 event_source 范围内唯一标识一次上下文失效发生；重复传输同一刷新事件复用该标识。
        en: Uniquely identifies one context-invalidation occurrence within event_source; retransmission of the same refresh event reuses the identifier.
        ja: event_source 内で一つの文脈無効化事象を一意識別し、同じ更新イベントの再送では識別子を再利用します。
      allowed_values: []
      pattern: null
      example_value: refresh-18
      source_claims:
        - claim-context-refresh-event-004
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录使前驱上下文失效的变化发生时间，而不是后续组装结束时间。
        en: Records when the change invalidating the predecessor context occurred, not when subsequent assembly completed.
        ja: 前駆文脈を無効化した変化の発生時刻を記録し、後続組立の完了時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T02:00:00Z
      source_claims:
        - claim-context-refresh-event-005
    - id: predecessor_context_ref
      labels:
        zh: 前驱上下文引用
        en: predecessor context reference
        ja: 前駆文脈参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用因本次变化而失效的一个确定 ContextPackage 版本；它不是刷新后产生的新包。
        en: References the one determinate ContextPackage version made stale by this change; it is not the new package produced after refresh.
        ja: 本変化で陳腐化した一つの確定 ContextPackage 版を参照し、更新後に生成される新 package とは区別します。
      allowed_values: []
      pattern: null
      example_value: context-package:042@3
      source_claims:
        - claim-context-refresh-event-006
    - id: trigger_kind
      labels:
        zh: 刷新触发种类
        en: refresh trigger kind
        ja: 更新誘因種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分来源更新、反馈到达、状态变化、预算变化或计划调度等使上下文失效的变化种类。
        en: Distinguishes the invalidating change as a source update, feedback arrival, state change, budget change, scheduled refresh, or another reviewed kind.
        ja: 文脈を無効化する変化を source update・feedback arrival・state change・budget change・scheduled refresh 等に区別します。
      allowed_values: []
      pattern: null
      example_value: source-updated
      source_claims:
        - claim-context-refresh-event-007
    - id: trigger_subject_ref
      labels:
        zh: 触发对象引用
        en: trigger subject reference
        ja: 誘因対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用发生变化并构成刷新依据的来源版本、反馈、状态、预算或调度记录。
        en: References the source version, feedback, state, budget, or schedule record whose change is the refresh basis.
        ja: 変化が更新根拠となった source version・feedback・state・budget・schedule 記録を参照します。
      allowed_values: []
      pattern: null
      example_value: source-version:policy-42
      source_claims:
        - claim-context-refresh-event-008
    - id: refresh_reason
      labels:
        zh: 刷新原因
        en: refresh reason
        ja: 更新理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该触发对象为何使前驱上下文不再适合目标推理阶段，必须是可核验原因而非空泛标签。
        en: Explains why the trigger subject makes the predecessor context unsuitable for its target reasoning stage, using a checkable reason rather than a generic label.
        ja: 誘因対象が前駆文脈を対象推論段階に不適合にする理由を、一般ラベルでなく検証可能に説明します。
      allowed_values: []
      pattern: null
      example_value: package references policy source version 41, superseded by version 42
      source_claims:
        - claim-context-refresh-event-009
    - id: successor_assembly_ref
      labels:
        zh: 后续组装引用
        en: successor assembly reference
        ja: 後続組立参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在刷新已被调度时引用由本事件触发的 ContextAssembly；尚未调度不影响事件本身成立。
        en: References the ContextAssembly triggered by this event once refresh is scheduled; absence before scheduling does not invalidate the event itself.
        ja: 更新が schedule された後に本イベントが誘発した ContextAssembly を参照し、未 schedule 時の欠如はイベント自体を無効にしません。
      allowed_values: []
      pattern: null
      example_value: context-assembly:refresh-18
      source_claims:
        - claim-context-refresh-event-010
  constraints:
    - id: context-refresh-predecessor-boundary
      severity: error
      expression_language: plain
      expression: predecessor_context_ref names an existing context version that was suitable before occurred_at, trigger_subject_ref changed or became newly relevant at occurred_at, and refresh_reason explains the resulting staleness; the predecessor artifact and successor assembly are not the event
      explanations:
        zh: 前驱版本必须在事件前存在且曾可用，触发对象在事件时发生变化或变得相关，原因必须解释由此产生的失效；前驱产物和后续组装都不是该事件。
        en: The predecessor existed and was usable before the occurrence, the trigger changed or became newly relevant at occurrence time, and the reason explains resulting staleness. Neither the predecessor artifact nor successor assembly is the event.
        ja: 前駆版は発生前に存在し使用可能で、発生時に誘因が変化・新規関連化し、理由が陳腐化を説明します。前駆成果物・後続組立はイベントではありません。
      source_claims:
        - claim-context-refresh-event-011
  required_relation_constraints:
    - id: context-refresh-predecessor-binding
      direction: outgoing
      predicate: identifies_predecessor
      target_concept_id: ContextPackage
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个刷新事件必须通过 identifies_predecessor 指向唯一失效 ContextPackage，避免把后继包或活动误作前驱。
        en: Each refresh event identifies exactly one stale ContextPackage through identifies_predecessor, preventing a successor package or activity from being mistaken for the predecessor.
        ja: 各更新イベントは identifies_predecessor で唯一の陳腐化 ContextPackage を指し、後継 package・activity を前駆と誤認しません。
      source_claims:
        - claim-context-refresh-event-012
examples:
  - id: ContextRefreshEvent-example-positive-001
    kind: positive
    labels:
      zh: 上下文刷新事件正例
      en: Positive example of context refresh event
      ja: コンテキスト更新イベントの正例
    scenario_id: null
    descriptions:
      zh: source-version 42 到达时，事件 refresh-18 标记 context-package-042/v3 中引用的 version 41 已陈旧，记录原因 source_updated、前驱包和发生时间，并触发新的组装运行。
      en: When source version 42 arrives, event refresh-18 marks version 41 referenced by context-package-042/v3 as stale, records reason source_updated, predecessor package, and occurrence time, and triggers a new assembly run.
      ja: source version 42 の到着時、イベント refresh-18 は context-package-042/v3 が参照する version 41 を陳腐化とし、理由 source_updated、前駆包、発生時刻を記録して新しい組立実行を誘発します。
    field_values:
      event_source: urn:moonweave:context-manager:primary
      event_id: refresh-18
      occurred_at: 2026-07-17T02:00:00Z
      predecessor_context_ref: context-package:042@3
      trigger_kind: source-updated
      trigger_subject_ref: source-version:policy-42
      refresh_reason: package references policy source version 41, superseded by version 42
      successor_assembly_ref: context-assembly:refresh-18
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
    related_relation_ids:
      - ContextRefreshEvent-identifies_predecessor-ContextPackage
    expected_result:
      zh: 该运行可查询 ContextRefreshEvent 以及方向保持不变的事实 ContextRefreshEvent-identifies_predecessor-ContextPackage。
      en: The run can query ContextRefreshEvent together with direction-preserving fact ContextRefreshEvent-identifies_predecessor-ContextPackage.
      ja: この実行では ContextRefreshEvent と方向を保持した事実 ContextRefreshEvent-identifies_predecessor-ContextPackage を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextRefreshEvent-identifies_predecessor-ContextPackage 的 canonical 方向、概念定义和可用字段值。
      en: The record captures the occurrence that invalidated a named predecessor and the reason for refresh; the later assembly and successor package are separate entities.
      ja: このシナリオは実際の運用文脈、ContextRefreshEvent-identifies_predecessor-ContextPackage の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-refresh-event-013
      - claim-context-refresh-event-014
  - id: ContextRefreshEvent-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文刷新事件边界例
      en: Boundary case for context refresh event
      ja: コンテキスト更新イベントの境界例
    scenario_id: null
    descriptions:
      zh: context-package-042/v3 是 refresh-18 指认的前驱产物，包含旧证据但没有发生时间或触发原因；被事件指认并不会使该包本身成为 ContextRefreshEvent。
      en: context-package-042/v3 is the predecessor artifact identified by refresh-18. It contains stale evidence but has no event occurrence time or trigger reason; being identified by the event does not make the package ContextRefreshEvent.
      ja: context-package-042/v3 は refresh-18 が指す前駆成果物で、古い証拠を含みますがイベント発生時刻や誘因理由を持ちません。イベントから指されても ContextRefreshEvent にはなりません。
    field_values: {}
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
    related_relation_ids:
      - ContextRefreshEvent-identifies_predecessor-ContextPackage
    expected_result:
      zh: ContextPackage 保持其原有类型，验证器不得凭关系共现把它提升为 ContextRefreshEvent。
      en: ContextPackage retains its own type; validation must not promote it to ContextRefreshEvent from relation co-occurrence.
      ja: ContextPackage は元の型を維持し、関係の共起だけで ContextRefreshEvent へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextRefreshEvent-identifies_predecessor-ContextPackage 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: An event is identified by a triggering occurrence and time; a package is identified by version and content digest. Predecessor linkage preserves rather than collapses those identities.
      ja: 境界例は実在する対照ノードを示し、ContextRefreshEvent-identifies_predecessor-ContextPackage の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-refresh-event-015
      - claim-context-refresh-event-016
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ContextRefreshEvent-triggers-ContextAssembly
  predicate: triggers
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 触发
    en: triggers
    ja: 起動する
  definitions:
    zh: ContextRefreshEvent-triggers-ContextAssembly 表示刷新事件满足触发条件并因果启动一次新的 ContextAssembly；新组装有独立 assembly_id，事件本身不是组装活动。
    en: ContextRefreshEvent-triggers-ContextAssembly states that a refresh event satisfies its trigger condition and causally starts a new ContextAssembly with an independent assembly ID. The event is not the assembly activity.
    ja: ContextRefreshEvent-triggers-ContextAssembly はrefresh eventが条件を満たし独立assembly_idの新ContextAssemblyを因果開始することを表し、event自体は組立活動ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: triggered_by
    labels:
      zh: 反向：触发
      en: triggered by
      ja: 逆方向：起動する
  conditions:
    - id: ContextRefreshEvent-triggers-ContextAssembly-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the refresh event records the prior context version, trigger reason and time, and a correlation identifier that matches the newly started ContextAssembly; a periodic schedule without a started assembly is insufficient.
      explanations:
        zh: 仅当刷新事件记录前一上下文版本、触发原因与时间，并具有与新启动 ContextAssembly 匹配的关联标识时成立；只有周期计划而没有启动组装不足。
        en: Assert only when the refresh event records the prior context version, trigger reason and time, and a correlation identifier that matches the newly started ContextAssembly; a periodic schedule without a started assembly is insufficient.
        ja: refresh event が prior context version・trigger reason/time・新規開始 ContextAssembly と一致する correlation ID を記録した場合だけ成立します。開始 assembly のない periodic schedule は不十分です。
      source_claims:
        - claim-context-refresh-event-017
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: ContextRefreshEvent-triggers-ContextAssembly-example-positive-001
      kind: positive
      labels:
        zh: 触发正例
        en: "Positive case: triggers"
        ja: 起動するの正例
      scenario_id: null
      descriptions:
        zh: refresh-19 在 10:05:00 发生，随即启动 assembly-19 并传入前驱包 ID。
        en: refresh-19 occurs at 10:05:00 and starts assembly-19 with the predecessor package ID.
        ja: refresh-19 は10:05:00に発生し前駆包IDを渡して assembly-19 を開始します。
      field_values: {}
      related_node_ids:
        - ContextRefreshEvent
        - ContextAssembly
      related_relation_ids:
        - ContextRefreshEvent-triggers-ContextAssembly
      expected_result:
        zh: 因果查询返回事件和新组装。
        en: The causal query returns the event and new assembly.
        ja: 因果照会はeventと新組立を返します。
      why_valid_or_invalid:
        zh: 显式触发记录、刷新原因与新组装输入绑定共同证明因果关系。
        en: The trigger record and input binding establish causality.
        ja: trigger記録と入力bindingが因果を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-refresh-event-018
    - id: ContextRefreshEvent-triggers-ContextAssembly-example-boundary-001
      kind: boundary
      labels:
        zh: 触发边界例
        en: "Boundary case: triggers"
        ja: 起動するの境界例
      scenario_id: null
      descriptions:
        zh: assembly-maintenance-2 同时发生但由定时维护触发。
        en: assembly-maintenance-2 occurs at the same time but was triggered by scheduled maintenance.
        ja: assembly-maintenance-2 は同時発生しますが定時保守でtriggerされました。
      field_values: {}
      related_node_ids:
        - ContextRefreshEvent
        - ContextAssembly
      related_relation_ids:
        - ContextRefreshEvent-triggers-ContextAssembly
      expected_result:
        zh: 时间共现不形成 triggers 边。
        en: Temporal co-occurrence does not create triggers.
        ja: 時間共存で triggers 辺を作りません。
      why_valid_or_invalid:
        zh: 必须存在明确的触发断言，不能仅凭两个事件时间相近推断因果。
        en: An explicit trigger record is required, not temporal correlation.
        ja: 時間相関でなく明示trigger記録が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-refresh-event-019
  source_claims:
    - claim-context-refresh-event-020
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: ContextRefreshEvent-identifies_predecessor-ContextPackage
    predicate: identifies_predecessor
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: identifies predecessor
      en: identifies predecessor
      ja: identifies predecessor
    definitions:
      zh: ContextRefreshEvent-identifies_predecessor-ContextPackage 表示刷新事件明确指出哪一个不可变 ContextPackage 版本因新证据或状态变化而需要后继组装；事件不修改该前驱包。
      en: ContextRefreshEvent-identifies_predecessor-ContextPackage states which immutable ContextPackage version requires successor assembly after new evidence or state change. The event does not mutate that predecessor.
      ja: ContextRefreshEvent-identifies_predecessor-ContextPackage は新証拠・状態変化で後続組立が必要な不変ContextPackage版を指定し、eventは前駆包を変更しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_identifies_predecessor
      labels:
        zh: 反向 identifies_predecessor
        en: inverse identifies_predecessor
        ja: 逆 identifies_predecessor
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ContextRefreshEvent-identifies_predecessor-ContextPackage-example-positive-001
        kind: positive
        labels:
          zh: identifies predecessor正例
          en: "Positive case: identifies predecessor"
          ja: identifies predecessorの正例
        scenario_id: null
        descriptions:
          zh: refresh-19 指定 package-18@v3 因 source-doc@v8 到达而过时。
          en: refresh-19 identifies package-18@v3 as stale after source-doc@v8 arrives.
          ja: refresh-19 は source-doc@v8 到着で package-18@v3 が古くなったと指定します。
        field_values: {}
        related_node_ids:
          - ContextRefreshEvent
          - ContextPackage
        related_relation_ids:
          - ContextRefreshEvent-identifies_predecessor-ContextPackage
        expected_result:
          zh: 查询返回前驱包和失效原因。
          en: The query returns the predecessor package and invalidation cause.
          ja: 照会は前駆包と失効理由を返します。
        why_valid_or_invalid:
          zh: 事件记录了确切版本而不是抽象包名。
          en: The event records an exact version rather than an abstract package name.
          ja: eventは抽象包名でなく正確な版を記録します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-context-refresh-event-021
      - id: ContextRefreshEvent-identifies_predecessor-ContextPackage-example-boundary-001
        kind: boundary
