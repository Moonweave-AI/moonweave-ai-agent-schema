  - id: src-cursor-context
    title: Cursor Agent Search and Context
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: New @ reference re-assembly.
  - id: src-context-recycling-2026
    title: Context Recycling for Long-Horizon LLM Inference
    publisher: arXiv
    url: https://arxiv.org/abs/2606.26105
    source_type: arXiv
    relevance: Scheduled proactive load refresh.
  - id: src-pichay-2026
    title: Demand Paging for LLM Context Windows
    publisher: arXiv
    url: https://arxiv.org/abs/2603.09023
    source_type: arXiv
    relevance: Page fault partial refresh.
  - id: src-memory-context-design
    title: Moonweave memory-context module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Refresh event versus assembly boundary.
source_claims:
