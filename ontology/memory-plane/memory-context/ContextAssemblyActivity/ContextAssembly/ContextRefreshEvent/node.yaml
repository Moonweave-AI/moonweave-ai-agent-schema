    confidence: high
  - id: claim-context-refresh-id
    source: src-memory-context-design
    supports: refresh_id identifies one refresh event.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-refresh-trigger
    source: src-claude-code-context
    supports: trigger_kind classifies refresh cause.
    locator: Triggers
    evidence_kind: official
    confidence: high
  - id: claim-context-refresh-time
    source: src-memory-context-design
    supports: trigger_time records refresh event time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-refresh-assembly
    source: src-memory-context-design
    supports: resulting_assembly_ref links refresh to triggered assembly.
    locator: structure
    evidence_kind: design-inference
