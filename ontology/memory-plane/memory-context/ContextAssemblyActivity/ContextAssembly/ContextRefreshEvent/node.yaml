schema: moonweave.ai/ontology-node/v1
id: ContextRefreshEvent
kind: concept
labels:
  zh: 上下文刷新事件
  en: Context refresh event
  ja: コンテキスト更新イベント
semantics:
  short_definition:
    zh: 触发 ContextAssembly 重新组装的离散可观测事件。
    en: A discrete observable event triggering ContextAssembly to re-assemble context.
    ja: ContextAssembly の re-assemble を trigger する discrete observable event。
  definition:
    zh: ContextRefreshEvent 是可观测事件；其种差是记录导致 ContextAssembly 重新运行的触发条件，如用户新 @ 引用、文件变更、ContextBudget 阈值 crossing（约 95% auto-compact）、ContextRefreshEvent 手动 /compact、或 Context Recycling proactive load 定时器。它不是 ContextAssembly 本身，也不是 ContextPackage 快照。
    en: ContextRefreshEvent is an observable event recording trigger conditions causing ContextAssembly to re-run, such as new user @ reference, file change, ContextBudget threshold crossing (~95% auto-compact), manual /compact, or Context Recycling proactive load timer. It is neither ContextAssembly itself nor a ContextPackage snapshot.
    ja: ContextRefreshEvent は user 新 @ reference/file change/ContextBudget 閾値 crossing（約 95% auto-compact）/manual /compact/Context Recycling proactive load timer 等で ContextAssembly re-run を起こす trigger 条件を記録する observable event。ContextAssembly 本体/ContextPackage snapshot ではない。
  why_needed:
    zh: 刷新事件让系统区分“同一 session 内为何产生新 package version”——是用户主动 @ 新文件还是 auto-compact 阈值触发。
    en: Refresh events distinguish why a new package version appeared within one session—user @ new file versus auto-compact threshold.
    ja: refresh event で同一 session 内新 package version 理由（user @ 新 file か auto-compact 閾値か）を区別。
  includes:
    - zh: 纳入具有 refresh_id、trigger_kind、trigger_time 与 resulting_assembly_ref 的刷新事件。
      en: Includes refresh events with refresh_id, trigger_kind, trigger_time, and resulting_assembly_ref.
      ja: refresh_id/trigger_kind/trigger_time/resulting_assembly_ref を持つ refresh event。
  excludes:
    - zh: 排除 ContextAssembly 完整运行、ContextIngressEvent（单次内容 ingress）与 ContextPackage 静态版本。
      en: Excludes complete ContextAssembly runs, ContextIngressEvent (single-content ingress), and static ContextPackage versions.
      ja: complete ContextAssembly run/ContextIngressEvent（単一 content ingress）/static ContextPackage version を除外。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: Claude Code autoCompact 在 token 使用率 crossing ~95% 时 emit refresh；用户 /compact focus on … 为 manual_refresh；Cursor 新 @ 引用或 watched file change 触发 re-assemble；Pichay page fault 可 trigger 局部 refresh；Context Recycling 定时 proactive load 触发 scheduled_refresh。
    en: Claude Code autoCompact emits refresh when token usage crosses ~95%; user /compact focus on … is manual_refresh; Cursor new @ reference or watched file change triggers re-assemble; Pichay page fault may trigger partial refresh; Context Recycling scheduled proactive load triggers scheduled_refresh.
    ja: Claude autoCompact は token 使用率約 95% crossing で refresh emit。user /compact focus on … は manual_refresh。Cursor 新 @/watched file change で re-assemble。Pichay page fault は partial refresh。Context Recycling scheduled proactive load は scheduled_refresh。
  typical_input:
    - description: Auto-compact threshold crossing
      format: |
        {
          "trigger_kind": "budget_threshold_crossing",
          "usage_pct": 96,
          "threshold_pct": 95
        }
      source_claims: [claim-context-refresh-claude]
  typical_output:
    - description: Triggered assembly reference
      format: |
        {
          "refresh_id": "refresh-88-autocompact",
          "resulting_assembly_ref": "assembly-88-v3"
        }
      source_claims: [claim-context-refresh-design]
  reference_implementations:
    - name: Claude Code auto-compact
      url: https://code.claude.com/docs/en/context-window
      description: Threshold-triggered context refresh.
    - name: Cursor @ References
      url: https://cursor.com/docs/agent/tools/search
      description: New references trigger re-assembly.
structure:
  identity_keys:
    - refresh_id
  fields:
    - id: refresh_id
      labels:
        zh: 刷新标识
        en: Refresh identifier
        ja: refresh 識別子
      definitions:
        zh: 稳定标识一次上下文刷新事件。
        en: Stable identifier for one context refresh event.
        ja: 一 context refresh event を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: refresh-88-autocompact
      allowed_values: []
      source_claims:
        - claim-context-refresh-id
    - id: trigger_kind
      labels:
        zh: 触发类型
        en: Trigger kind
        ja: trigger kind
      definitions:
        zh: 触发类别：budget_threshold_crossing、manual_compact、new_at_reference、file_change、page_fault、scheduled_proactive_load。
        en: Trigger category budget_threshold_crossing, manual_compact, new_at_reference, file_change, page_fault, scheduled_proactive_load.
        ja: budget_threshold_crossing/manual_compact/new_at_reference/file_change/page_fault/scheduled_proactive_load 等 trigger category。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: budget_threshold_crossing
      allowed_values: []
      source_claims:
        - claim-context-refresh-trigger
    - id: trigger_time
      labels:
        zh: 触发时间
        en: Trigger time
        ja: trigger 時刻
      definitions:
        zh: 刷新事件发生的 event time。
        en: Event time when the refresh occurred.
        ja: refresh 発生 event time。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:12:00.000Z
      allowed_values: []
      source_claims:
        - claim-context-refresh-time
    - id: resulting_assembly_ref
      labels:
        zh: 结果组装引用
        en: Resulting assembly reference
        ja: resulting assembly ref
      definitions:
        zh: 引用该刷新触发的 ContextAssembly 运行。
        en: References the ContextAssembly run triggered by this refresh.
        ja: この refresh が trigger した ContextAssembly run を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: assembly-88-v3
      allowed_values: []
      source_claims:
        - claim-context-refresh-assembly
  constraints: []
  required_relations: []
examples:
  - id: ContextRefreshEvent-example-claude-autocompact
    labels:
      zh: Claude autoCompact 刷新
      en: Claude autoCompact refresh
      ja: Claude autoCompact refresh
    descriptions:
      zh: token 使用率达 96% crossing 95% 阈值时 refresh-88-autocompact 触发 assembly-88-v3，执行 autoCompact summarization 产出 package-88@v3。
      en: At 96% token usage crossing 95% threshold refresh-88-autocompact triggers assembly-88-v3 running autoCompact summarization emitting package-88@v3.
      ja: token 96% が 95% 閾値 crossing。refresh-88-autocompact が assembly-88-v3 trigger。autoCompact で package-88@v3。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact
    field_values:
      refresh_id: refresh-88-autocompact
      trigger_kind: budget_threshold_crossing
      usage_pct: 96
      threshold_pct: 95
      resulting_assembly_ref: assembly-88-v3
    related_node_ids:
      - ContextRefreshEvent
      - ContextAssembly
    related_relation_ids:
      - ContextRefreshEvent-triggers-ContextAssembly
    source_claims:
      - claim-context-refresh-claude
  - id: ContextRefreshEvent-example-manual-compact
    labels:
      zh: 手动 /compact 刷新
      en: Manual /compact refresh
      ja: manual /compact refresh
    descriptions:
      zh: 用户执行 /compact focus on failing tests 产生 manual_compact refresh，触发 assembly-88-v4 与 summary-v7。
      en: User runs /compact focus on failing tests producing manual_compact refresh triggering assembly-88-v4 and summary-v7.
      ja: user /compact focus on failing tests→manual_compact refresh。assembly-88-v4/summary-v7 trigger。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: /compact
    field_values:
      trigger_kind: manual_compact
      focus_instruction: failing tests
    related_node_ids:
      - ContextRefreshEvent
      - ContextSummary
    related_relation_ids: []
    source_claims:
      - claim-context-refresh-claude
  - id: ContextRefreshEvent-example-cursor-at
    labels:
      zh: Cursor 新 @ 引用刷新
      en: Cursor new @ reference refresh
      ja: Cursor 新 @ 参照 refresh
    descriptions:
      zh: 用户在 follow-up 消息新增 @docs/onboarding.md 触发 new_at_reference refresh，assembly-204-v2 重新 select/order/trim 产出 package-204@v3。
      en: User adds @docs/onboarding.md in follow-up triggering new_at_reference refresh; assembly-204-v2 re-selects/orders/trims emitting package-204@v3.
      ja: follow-up で @docs/onboarding.md 追加→new_at_reference refresh。assembly-204-v2 が re-select/order/trim→package-204@v3。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "@ references"
    field_values:
      trigger_kind: new_at_reference
      resulting_assembly_ref: assembly-204-v2
    related_node_ids:
      - ContextRefreshEvent
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-refresh-cursor
  - id: ContextRefreshEvent-example-recycling-scheduled
    labels:
      zh: Context Recycling 定时刷新
      en: Context Recycling scheduled refresh
      ja: Context Recycling scheduled refresh
    descriptions:
      zh: Context Recycling 每 N turn 从 L3 proactive load 相关 chunk 到 L1，scheduled_proactive_load refresh 触发 assembly-501-v2。
      en: Context Recycling every N turns proactively loads relevant chunks from L3 to L1; scheduled_proactive_load refresh triggers assembly-501-v2.
      ja: Context Recycling が N turn 毎 L3 から L1 へ proactive load。scheduled_proactive_load refresh→assembly-501-v2。
    example_source:
      product: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      version: scheduled load
    field_values:
      trigger_kind: scheduled_proactive_load
    related_node_ids:
      - ContextRefreshEvent
    related_relation_ids: []
    source_claims:
      - claim-context-refresh-recycling
parent_relation:
  id: ContextRefreshEvent-triggers-ContextAssembly
  predicate: triggers
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 触发上下文组装
    en: triggers context assembly
    ja: コンテキスト組立をトリガー
  definitions:
    zh: ContextRefreshEvent —triggers→ ContextAssembly 表示该事件因果触发一次新的组装运行。
    en: ContextRefreshEvent —triggers→ ContextAssembly states the event causally triggers a new assembly run.
    ja: ContextRefreshEvent —triggers→ ContextAssembly は event が新 assembly run を因果 trigger することを表す。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 每刷新事件通常触发一次组装，基数由运行时决定。
    en: Each refresh typically triggers one assembly; cardinality is runtime-specific.
    ja: 各 refresh は通常 1 assembly trigger。基数 runtime 依存。
  inverse_reading:
    predicate: triggered_by
    labels:
      zh: 反向：被触发
      en: triggered by
      ja: 逆：trigger される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-refresh-design
  distinct_fact_rationale: null
  layout_role: cross-link
  endpoint_order: event-to-assembly
relations: []
