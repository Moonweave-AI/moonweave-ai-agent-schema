  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: context_assembly_uses_budget
    predicate: context_assembly_uses_budget
    direction: source-to-target
    relation_kind: information
    labels:
      zh: context assembly uses budget
      en: context assembly uses budget
      ja: context assembly uses budget
    definitions:
      zh: context_assembly_uses_budget 表示 ContextAssembly 在选择或裁剪时实际读取一份 ContextBudget 的单位、上限和保留量；预算是输入约束，不是活动阶段或输出窗口。
      en: context_assembly_uses_budget states that ContextAssembly actually reads a ContextBudget's unit, ceiling, and reservation during selection or trimming. The budget is an input constraint, not a phase or output window.
      ja: context_assembly_uses_budget は ContextAssembly が選択・裁断時に ContextBudget の単位・上限・予約量を実際に読むことを表し、予算は入力制約で段階や出力窓ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_context_assembly_uses_budget
      labels:
        zh: 反向：context assembly uses budget
        en: is target of context assembly uses budget
        ja: 逆方向：context assembly uses budget
    conditions:
      - id: context_assembly_uses_budget-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the same ContextAssembly run records the exact ContextBudget identity and version, common unit, total limit, reserved amount, and measured consumption; a model-wide default or estimated token count alone is insufficient.
        explanations:
          zh: 仅当同一次 ContextAssembly 运行记录精确 ContextBudget 身份和版本、统一计量单位、总上限、预留量与实测消耗时成立；模型全局默认值或仅估算 token 数不足。
          en: Assert only when the same ContextAssembly run records the exact ContextBudget identity and version, common unit, total limit, reserved amount, and measured consumption; a model-wide default or estimated token count alone is insufficient.
          ja: 同一 ContextAssembly run が正確な ContextBudget ID/version、共通 unit、total limit、reserved amount、measured consumption を記録した場合だけ成立します。model-wide default や estimated token count だけでは不十分です。
        source_claims:
          - claim-context-assembly-022
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: context_assembly_uses_budget-example-positive-001
        kind: positive
        labels:
          zh: context assembly uses budget正例
          en: "Positive case: context assembly uses budget"
          ja: context assembly uses budgetの正例
        scenario_id: null
        descriptions:
          zh: assembly-88 使用 budget-32k，预留 2k 系统指令并将输入限制为 30k。
          en: assembly-88 uses budget-32k, reserves 2k for system instructions, and limits other input to 30k.
          ja: assembly-88 は budget-32k を使い2kをsystem指示に予約し他入力を30kに制限します。
        field_values: {}
        related_node_ids:
