schema: moonweave.ai/ontology-node/v1
id: ContextAssembly
kind: concept
labels:
  zh: 上下文组装
  en: Context assembly
  ja: コンテキスト組立
semantics:
  short_definition:
    zh: 为一次调用执行选择、排序、裁剪并产出 ContextPackage 的完整组装运行。
    en: A complete assembly run selecting, ordering, trimming, and emitting ContextPackage for one call.
    ja: 一回 call 向け select/order/trim 実行し ContextPackage を出力する complete assembly run。
  definition:
    zh: ContextAssembly 是一种完整 ContextAssemblyActivity 运行；以 assembly_id 标识，接受消息、RetrievedChunk、MemoryRecord、@ 文件与工具结果等候选，依次执行 ContextSelectionActivity、ContextOrderingActivity、ContextTrimmingActivity，记录 ContextExclusion，产出可重放 ContextPackage。它映射 Cursor 的 context assembly pipeline（recent files + @refs + codebase search），不是单独阶段或规则/预算。
    en: ContextAssembly is one complete ContextAssemblyActivity run identified by assembly_id. It accepts messages, RetrievedChunks, MemoryRecords, @ files, and tool results, executes ContextSelectionActivity, ContextOrderingActivity, and ContextTrimmingActivity in sequence, records ContextExclusions, and emits a replayable ContextPackage. It maps Cursor's context assembly pipeline (recent files + @refs + codebase search), not a single phase or rule/budget.
    ja: ContextAssembly は assembly_id で識別される complete ContextAssemblyActivity run。message/RetrievedChunk/MemoryRecord/@ file/tool result を候補に ContextSelectionActivity/ContextOrderingActivity/ContextTrimmingActivity を順実行し ContextExclusion 記録、replayable ContextPackage 出力。Cursor context assembly pipeline（recent files+@refs+codebase search）に写像。単一 phase/rule/budget ではない。
  why_needed:
    zh: 完整组装运行可追踪 package 版本如何形成、用了哪些候选与约束、为何某项被保留或排除。
    en: Complete assembly runs trace how package versions formed, which candidates and constraints applied, and why items were retained or excluded.
    ja: complete assembly run で package version 形成過程/使用 candidate/constraint/採否理由を追跡可能。
  includes:
    - zh: 纳入具有 assembly_id、阶段轨迹、所用 ContextBudget/ContextRule、输出 package 版本与 exclusion 记录的完整运行。
      en: Includes complete runs with assembly_id, phase trace, applied ContextBudget/ContextRule, output package version, and exclusion records.
      ja: assembly_id/phase trace/applied ContextBudget/ContextRule/output package version/exclusion record を持つ complete run。
  excludes:
    - zh: 排除单独检索运行、单一排序阶段、ContextRule、ContextBudget 与已完成的 ContextPackage 静态快照。
      en: Excludes standalone retrieval runs, single ordering phases, ContextRule, ContextBudget, and static ContextPackage snapshots.
      ja: standalone retrieval run/単一 ordering phase/ContextRule/ContextBudget/static ContextPackage snapshot を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Cursor：解析用户消息 @ refs → 加载文件 → semantic search 补充 → merge recent edits → 按 rules 排序 → 检查 token 预算 → 必要时 self-summarize/auto-compact → 发送 messages。Claude Code：/context 监控 → 阈值触发 autoCompact → 新 package version。Context Recycling：BM25 route → disk fault-in → L1 组装。
    en: "Cursor: parse user @ refs → load files → semantic search supplement → merge recent edits → order by rules → check token budget → self-summarize/auto-compact if needed → send messages. Claude Code: /context monitor → threshold autoCompact → new package version. Context Recycling: BM25 route → disk fault-in → L1 assembly."
    ja: "Cursor：@ refs 解析→file load→semantic search 補完→recent edits merge→rules 順序→token budget 確認→必要時 self-summarize/auto-compact→messages 送信。Claude Code：/context 監視→閾値 autoCompact→新 package version。Context Recycling：BM25 route→disk fault-in→L1 assembly。"
  typical_input:
    - description: Cursor assembly input candidates
      format: |
        {
          "user_message": "@src/auth/middleware.ts Where is session validation?",
          "referenced_files": ["src/auth/middleware.ts"],
          "retrieval_candidates": [{"path": "...", "score": 0.91}],
          "recent_files": ["src/auth/session.ts"],
          "context_budget_ref": "budget-cursor-agent"
        }
      source_claims: [claim-context-assembly-cursor]
  typical_output:
    - description: ContextPackage output envelope
      format: |
        {
          "assembly_id": "assembly-204",
          "context_package_id": "package-204",
          "context_package_version": 2,
          "exclusion_count": 2
        }
      source_claims: [claim-context-assembly-design]
  reference_implementations:
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Full assembly from @ refs, search, and recent files.
    - name: Claude Code auto-compact
      url: https://code.claude.com/docs/en/context-window
      description: Threshold-triggered re-assembly with compaction.
    - name: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      description: Proactive load and assemble from disk layers.
structure:
  identity_keys:
    - assembly_id
  fields:
    - id: assembly_id
      labels:
        zh: 组装标识
        en: Assembly identifier
        ja: assembly 識別子
      definitions:
        zh: 稳定标识一次完整上下文组装运行。
        en: Stable identifier for one complete context assembly run.
        ja: 一 complete context assembly run を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: assembly-204
      allowed_values: []
      source_claims:
        - claim-context-assembly-id
    - id: context_package_version
      labels:
        zh: 输出包版本
        en: Output package version
        ja: output package version
      definitions:
        zh: 该运行产出的 ContextPackage 不可变版本号。
        en: Immutable ContextPackage version produced by this run.
        ja: この run が produce する ContextPackage immutable version。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims:
        - claim-context-assembly-output
    - id: target_call_ref
      labels:
        zh: 目标调用引用
        en: Target call reference
        ja: target call ref
      definitions:
        zh: 指向本次组装所服务的模型调用或 RunAttempt。
        en: References the model call or RunAttempt served by this assembly.
        ja: この assembly が serve する model call/RunAttempt を参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: call-204
      allowed_values: []
      source_claims:
        - claim-context-assembly-call
  constraints:
    - id: context-assembly-produces-package
      severity: error
      expression_language: plain
      expression: complete ContextAssembly must emit at least one ContextPackage version
      explanation:
        zh: 完整组装必须产出可重放包，否则无法关联模型实际输入。
        en: Complete assembly must emit a replayable package to link model input.
        ja: complete assembly は replayable package 出力必須。model input 関連付け不可。
      source_claims:
        - claim-context-assembly-design
  required_relations: []
examples:
  - id: ContextAssembly-example-cursor-agent
    labels:
      zh: Cursor Agent 完整组装
      en: Cursor Agent full assembly
      ja: Cursor Agent full assembly
    descriptions:
      zh: assembly-204 解析 @middleware.ts，semantic search 补充 session.ts，merge recent edits，按 system rules→user→@files→recent 排序，token 达 95% 触发 self-summarize，产出 package-204@v2 含 2 条 ContextExclusion。
      en: assembly-204 parses @middleware.ts, supplements with semantic search for session.ts, merges recent edits, orders system rules→user→@files→recent, self-summarizes at 95% tokens, emits package-204@v2 with two ContextExclusions.
      ja: assembly-204 が @middleware.ts 解析、semantic search で session.ts 補完、recent edits merge、system rules→user→@files→recent 順序、95% token で self-summarize。package-204@v2 と ContextExclusion 2 件出力。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: Agent assembly
    field_values:
      assembly_id: assembly-204
      context_package_version: 2
      target_call_ref: call-204
    related_node_ids:
      - ContextAssembly
      - ContextPackage
      - ContextSelectionActivity
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage
    source_claims:
      - claim-context-assembly-cursor
  - id: ContextAssembly-example-claude-autocompact
    labels:
      zh: Claude autoCompact 重组装
      en: Claude autoCompact re-assembly
      ja: Claude autoCompact re-assembly
    descriptions:
      zh: 窗口约 95% 时 assembly-88 触发 autoCompact：trim 阶段 summarization turn 1–24，产出 package-88@v3，保留 compact_boundary 之后消息。
      en: Near ~95% window assembly-88 triggers autoCompact; trim phase summarizes turns 1–24, emits package-88@v3 preserving post-compact_boundary messages.
      ja: window 約 95% で assembly-88 が autoCompact 発火。trim phase が turn 1–24 要約。package-88@v3 出力。compact_boundary 以降 message 保持。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: autoCompact
    field_values:
      assembly_id: assembly-88
      context_package_version: 3
    related_node_ids:
      - ContextAssembly
      - ContextTrimmingActivity
      - ContextSummary
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-claude
  - id: ContextAssembly-example-recycling
    labels:
      zh: Context Recycling 组装
      en: Context Recycling assembly
      ja: Context Recycling assembly
    descriptions:
      zh: assembly-501 从 L2 BM25 index route 查询，L3 disk fault-in task.md 与 chunks 到 L1 固定 12K budget，select/order/trim 后产出 package-501@v1。
      en: assembly-501 routes L2 BM25 index query, fault-in task.md and chunks from L3 disk to L1 12K budget, select/order/trim, emits package-501@v1.
      ja: assembly-501 が L2 BM25 route query、L3 disk から task.md/chunks を L1 12K budget へ fault-in。select/order/trim 後 package-501@v1。
    example_source:
      product: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      version: proactive assembly
    field_values:
      assembly_id: assembly-501
      active_context_budget_tokens: 12000
    related_node_ids:
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-recycling
  - id: ContextAssembly-example-not-phase
    labels:
      zh: 完整组装非单阶段
      en: Full assembly is not single phase
      ja: full assembly は single phase ではない
    descriptions:
      zh: phase-select-88 只执行 ContextSelectionActivity；assembly-88 跨越 select、order、trim 三阶段并产出 package。单阶段不满足完整组装种差。
      en: phase-select-88 runs only ContextSelectionActivity; assembly-88 spans select, order, trim and emits package. Single phase lacks complete-assembly differentia.
      ja: phase-select-88 は ContextSelectionActivity のみ。assembly-88 は select/order/trim 三 phase 跨ぎ package 出力。single phase は complete assembly 種差不足。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextAssembly
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-assembly-design
parent_relation:
  id: ContextAssembly-is_a-ContextAssemblyActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文组装活动
    en: is a context assembly activity
    ja: コンテキスト組立活動の一種
  definitions:
    zh: 每个 ContextAssembly 都是 ContextAssemblyActivity；其种差是完整运行跨越选择、排序、裁剪并产出 ContextPackage。
    en: Every ContextAssembly is a ContextAssemblyActivity distinguished as a complete run spanning selection, ordering, trimming, and ContextPackage emission.
    ja: すべての ContextAssembly は ContextAssemblyActivity で select/order/trim 跨ぎ ContextPackage 出力という complete run 種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-assembly-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
