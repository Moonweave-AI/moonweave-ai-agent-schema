      kind: positive
      labels:
        zh: 是一种上下文组装活动正例
        en: "Positive case: is a context assembly activity"
        ja: コンテキスト組立活動の一種の正例
      scenario_id: null
      descriptions:
        zh: assembly-88 依次执行三个阶段并产生 package-88。
        en: assembly-88 executes all three phases in sequence and produces package-88.
        ja: assembly-88 は三段階を順に実行し package-88 を生成します。
      field_values: {}
      related_node_ids:
        - ContextAssembly
        - ContextAssemblyActivity
      related_relation_ids:
        - ContextAssembly-is_a-ContextAssemblyActivity
      expected_result:
        zh: 分类上溯到 ContextAssemblyActivity。
        en: Classification ascends to ContextAssemblyActivity.
        ja: 分類は ContextAssemblyActivity へ上がります。
      why_valid_or_invalid:
        zh: 它有完整运行范围和独立 assembly_id。
        en: It has complete-run scope and an independent assembly ID.
        ja: 完全実行範囲と独立 assembly_id を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-context-assembly-019
    - id: ContextAssembly-is_a-ContextAssemblyActivity-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种上下文组装活动边界例
        en: "Boundary case: is a context assembly activity"
        ja: コンテキスト組立活動の一種の境界例
      scenario_id: null
      descriptions:
        zh: phase-select-88 只决定候选是否纳入，不覆盖排序和裁剪。
        en: phase-select-88 only decides candidate inclusion and does not span ordering or trimming.
        ja: phase-select-88 は候補包含だけを決め整列・裁断を跨ぎません。
      field_values: {}
      related_node_ids:
        - ContextAssembly
        - ContextAssemblyActivity
      related_relation_ids:
        - ContextAssembly-is_a-ContextAssemblyActivity
      expected_result:
        zh: 该对象归入 ContextAssemblyPhase，而非完整组装。
        en: The object is a ContextAssemblyPhase, not a complete assembly.
        ja: ContextAssemblyPhase であり完全組立ではありません。
      why_valid_or_invalid:
