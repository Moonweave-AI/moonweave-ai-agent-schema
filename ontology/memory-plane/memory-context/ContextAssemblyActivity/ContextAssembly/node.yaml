source_claims:
  - id: claim-context-assembly-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents input context, per-run runtime context, and automatic compression as distinct controls over what reaches model calls. Moonweave reifies their coordinated selection, ordering, and capacity handling as ContextAssembly so an individual preparation run can be audited; the documentation does not prescribe this ontology class.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-002
    source: lit-mech-compass
    supports: COMPASS identifies context management as a central long-horizon bottleneck and assigns a Context Manager to maintain concise, relevant progress briefs for different reasoning stages. Modeling one observable preparation process as ContextAssembly captures that function while keeping the produced brief or package as information rather than activity.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents per-run context preparation, including runtime context, offloading, and summarization before model calls. Moonweave assigns assembly_id to one traceable selection, ordering, and budgeting activity; the identifier field is not part of the Deep Agents contract.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-004
    source: lit-mech-compass
    supports: COMPASS assigns context organization to a Context Manager that prepares stage-specific progress briefs. Moonweave makes each preparation execution addressable through assembly_id so inputs and outputs can be audited; COMPASS does not prescribe that identifier.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents prepares model context from input and runtime-managed information and may replace bulky content with offloaded or summarized forms. Moonweave records the resulting immutable snapshot as context_version; immutability and version identity are Moonweave requirements.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-006
    source: lit-mech-compass
    supports: COMPASS maintains concise, relevant progress briefs for different reasoning stages. Moonweave uses context_version to distinguish each prepared brief or complete context snapshot and retain it immutably for replay; the paper does not define version semantics.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-007
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents treats context as an engineered input and uses offloading or summarization when it grows too large. Moonweave's context-assembly-budget-complete constraint requires every included source to have an order and a capacity charge under the applied ContextBudget; Deep Agents does not specify this validation rule.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-008
    source: lit-mech-compass
    supports: COMPASS requires the Context Manager to keep progress briefs concise and relevant rather than reproducing raw history. Moonweave operationalizes that goal by checking that every included source is ordered and counted against a ContextBudget; the numeric accounting is Moonweave-specific.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-009
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' context-engineering flow prepares the information sent to a model call from configurable and runtime sources. Moonweave requires context-assembly-produces-package so the ContextAssembly activity has a separate, versioned ContextPackage result; the relation ID and cardinality are Moonweave choices.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-010
    source: lit-mech-compass
    supports: COMPASS distinguishes the Context Manager component from the progress brief it maintains for a reasoning stage. Moonweave expresses this activity-result boundary with context-assembly-produces-package; COMPASS does not define that ontology relation.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-011
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents model context as composed from input context and runtime-managed information, with automatic offloading and summarization before model calls. The staged context-assembly run is Moonweave's explicit representation of that preparation boundary.
    locator: Context engineering in Deep Agents > Context types table; Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-assembly-012
    source: lit-mech-compass
    supports: COMPASS assigns context organization to a dedicated Context Manager that maintains concise, relevant progress briefs for reasoning stages. The example turns that operational responsibility into one observable assembly run with inputs and a versioned result.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
