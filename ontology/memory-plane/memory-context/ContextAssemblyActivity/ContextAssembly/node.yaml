schema: moonweave.ai/ontology-node/v1
id: ContextAssembly
kind: concept
status: accepted
labels:
  zh: 已完成上下文装配
  en: Completed context assembly
  ja: 完了コンテキスト組立
semantics:
  short_definition:
    zh: 产出一个已定稿上下文包的成功上下文装配活动。
    en: A successful context assembly activity that produces one finalized context package.
    ja: 一つの確定コンテキストパッケージを生成する成功したコンテキスト組立活動です。
  definition:
    zh: >
      ContextAssembly 是已完成的 ContextAssemblyActivity 的专门类型：它在一个调用范围中读取具体候选工件、应用一个窗口和装配策略，并生成一个可重放的、已定稿 ContextPackage。它必须记录读入项、窗口、策略、结果包、完成时间和装配版本。它不同于 ContextAssemblyActivity 的运行或失败实例，也不同于 ContextPackage 本身：前者是活动，后者是活动产生的输入工件。它不等于模型调用、模型响应、检索操作或长期记忆更新。
    en: >
      ContextAssembly is the specialized completed form of ContextAssemblyActivity. In one call scope it reads concrete candidate artifacts, applies a window and assembly policy, and generates one replayable finalized ContextPackage. It records inputs, window, policy, result package, completion time, and assembly version. It differs from running or failed ContextAssemblyActivity instances and from ContextPackage itself: the former is an activity and the latter is the input artifact generated by the activity. It is not a model invocation, model response, retrieval operation, or long-term memory update.
    ja: >
      ContextAssembly は ContextAssemblyActivity の特化された完了形です。一つの呼び出し範囲で具体的候補工件を読み、ウィンドウと組立方針を適用し、再生可能な確定 ContextPackage を一つ生成します。入力、ウィンドウ、方針、結果パッケージ、完了時刻、組立版を記録します。実行中または失敗した ContextAssemblyActivity、ならびに ContextPackage 自体とは異なります。前者は活動で、後者は活動が生成する入力工件です。モデル呼び出し、モデル応答、検索操作、長期記憶更新ではありません。
  why_needed:
    zh: 成功的调用输入需要可追溯的产生活动，才能把定稿包的顺序和预算与具体读取、策略和时间关联起来。
    en: Successful call input needs a traceable producing activity so the finalized package's order and budget can be linked to concrete reads, policy, and time.
    ja: 成功した呼び出し入力には追跡可能な生成活動が必要です。確定パッケージの順序と予算を、具体的読取り、方針、時刻に結び付けられます。
  includes:
    - zh: 完成的候选读取、窗口应用、策略应用、结果包生成和可见投影准备。
      en: Completed candidate reads, window application, policy application, result-package generation, and visible-projection preparation.
      ja: 完了した候補読取り、ウィンドウ適用、方針適用、結果パッケージ生成、可視投影準備。
  excludes:
    - zh: 失败或未完成装配、模型执行、响应生成、检索候选产生和记忆持久化。
      en: Failed or unfinished assembly, model execution, response generation, retrieval-candidate production, and memory persistence.
      ja: 失敗または未完了組立、モデル実行、応答生成、検索候補生成、記憶永続化。
  semantic_kind: activity
  aliases:
    - finalized input assembly
engineering:
  explanation:
    zh: >
      将装配实现为调用前不可变审计记录：在 LangGraph 的消息裁剪或摘要转换完成后，冻结传给 model.invoke(messages) 的顺序；在 Semantic Kernel reducer 返回缩减历史后，建立对应包。该记录不取代框架 API，而是将真实 API 输入映射为具来源和预算的本体活动与输出关系。
    en: >
      Implement assembly as an immutable pre-call audit record. After LangGraph message trimming or summarization completes, freeze the order passed to model.invoke(messages). After a Semantic Kernel reducer returns reduced history, create the corresponding package. The record does not replace framework APIs; it maps real API input to ontology activity and output relations with provenance and budget.
    ja: >
      組立を不変の呼び出し前監査記録として実装します。LangGraph のメッセージ裁断または要約変換が完了したら model.invoke(messages) に渡す順序を固定します。Semantic Kernel リデューサーが縮減履歴を返した後、対応パッケージを作ります。この記録はフレームワーク API を置き換えず、実 API 入力を来歴・予算付きの本体活動と出力関係へ対応付けます。
  typical_input:
    - description: Ordered messages after LangGraph transformation and before model invocation.
      format: |
        visible_messages = trim_messages(
            state["messages"], strategy="last", max_tokens=7168,
            token_counter=count_tokens_approximately
        )
        response = model.invoke(visible_messages)
  typical_output:
    - description: Completed assembly linked to one finalized package.
      format: |
        {
          "assembly_id": "ctx-assembly-support-01",
          "result_package_ref": "ctx-pkg-support-01",
          "visible_window_ref": "ctx-visible-support-01",
          "assembly_version": "support-policy-v1",
          "completed_at": "2026-07-19T09:20:00Z"
        }
  reference_implementations:
    - name: LangGraph memory and conversation history
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents message transformations followed by model invocation.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents history reducers that return reduced input before completion calls.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities used and generated by activities as separate provenance facts.
  source_claims:
    - claim-context-assembly-completed-transform
    - claim-context-assembly-package-generation
    - claim-context-assembly-provenance
structure:
  identity_keys:
    - assembly_activity_id
    - assembly_id
  fields:
    - id: assembly_id
      labels:
        zh: 装配标识
        en: assembly ID
        ja: 組立 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个成功完成且产出定稿包的装配活动，不复用为包、窗口或调用标识。
        en: Identifies one successfully completed assembly that produced a finalized package and is not reused as a package, window, or call ID.
        ja: 確定パッケージを生成した一つの成功完了組立を識別し、パッケージ、ウィンドウ、呼び出し ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-support-01
      source_claims:
        - claim-context-assembly-provenance
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明定稿包为哪一次调用准备，必须与结果包和窗口的范围一致。
        en: States the invocation for which the finalized package was prepared and must match the scopes of its result package and window.
        ja: 確定パッケージを準備した呼び出しを示し、結果パッケージとウィンドウの範囲に一致しなければなりません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-assembly-provenance
    - id: input_artifact_refs
      labels:
        zh: 输入工件引用
        en: input artifact references
        ja: 入力工件参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次成功装配实际读取并据此产出包的 ContextArtifact，不列出未读候选或整个存储空间。
        en: Lists ContextArtifacts actually read by this successful assembly to produce its package, not unread candidates or an entire storage scope.
        ja: この成功組立がパッケージ生成のために実際に読んだ ContextArtifact を列挙し、未読候補やストレージ範囲全体を列挙しません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
        - ctx-art-user-22
      source_claims:
        - claim-context-assembly-provenance
    - id: window_ref
      labels:
        zh: 应用窗口引用
        en: applied window reference
        ja: 適用ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向控制本次包预算和溢出行为的 ContextWindow。
        en: Points to the ContextWindow controlling package budget and overflow behavior for this assembly.
        ja: この組立のパッケージ予算とオーバーフロー動作を制御する ContextWindow を指します。
      allowed_values: []
      pattern: '^ctx-window-[A-Za-z0-9._-]+$'
      example_value: ctx-window-support-01
      source_claims:
        - claim-context-assembly-completed-transform
    - id: policy_ref
      labels:
        zh: 装配策略引用
        en: assembly policy reference
        ja: 組立方針参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际版本化并应用于此次装配的 ContextSpecification，而非仅名称相似的默认配置。
        en: Points to the versioned ContextSpecification actually applied to this assembly rather than a merely similarly named default configuration.
        ja: 単に名前が似た既定構成ではなく、この組立に実際に適用した版管理 ContextSpecification を指します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._-]+$'
      example_value: ctx-spec-support-v1
      source_claims:
        - claim-context-assembly-completed-transform
    - id: result_package_ref
      labels:
        zh: 结果包引用
        en: result package reference
        ja: 結果パッケージ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该装配生成的唯一已定稿 ContextPackage；草稿或失败输出不能充当结果包。
        en: Points to the one finalized ContextPackage generated by this assembly. A draft or failed output cannot serve as result package.
        ja: この組立が生成した一つの確定 ContextPackage を指します。下書きまたは失敗出力は結果パッケージになれません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-01
      source_claims:
        - claim-context-assembly-package-generation
    - id: visible_window_ref
      labels:
        zh: 可见窗口引用
        en: visible window reference
        ja: 可視ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包定稿时产生的 planned VisibleContextWindow；它不是提供方已确认或模型已使用的自动证明。
        en: Points to the planned VisibleContextWindow produced when the package is finalized. It is not automatic proof of provider confirmation or model use.
        ja: パッケージ確定時に生成する planned VisibleContextWindow を指します。プロバイダー確認やモデル利用の自動証明ではありません。
      allowed_values: []
      pattern: '^ctx-visible-[A-Za-z0-9._-]+$'
      example_value: ctx-visible-support-01
      source_claims:
        - claim-context-assembly-package-generation
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录成功装配并定稿包的时刻，而不是后续模型响应完成时刻。
        en: Records when the successful assembly finalized its package, not when a later model response completed.
        ja: 成功組立がパッケージを確定した時刻を記録し、後続モデル応答の完了時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:20:00Z"
      source_claims:
        - claim-context-assembly-provenance
    - id: assembly_activity_id
      labels:
        zh: 装配活动标识
        en: assembly activity ID
        ja: 組み立て活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识 ContextAssembly 作为已执行 ContextAssemblyActivity 的活动事实，不把 assembly_id 的产物身份当作执行身份。
        en: Identifies ContextAssembly as an executed ContextAssemblyActivity fact, rather than using the assembly_id artifact identity as the execution identity.
        ja: ContextAssembly を実行済み ContextAssemblyActivity の事実として識別し、assembly_id の成果物 ID を実行 ID として使いません。
      allowed_values: []
      pattern: '^ctx-assembly-[A-Za-z0-9._-]+$'
      example_value: ctx-assembly-activity-support-01
      source_claims:
        - claim-context-assembly-provenance
    - id: consumed_artifact_refs
      labels:
        zh: 已消费工件引用
        en: consumed artifact references
        ja: 消費したアーティファクト参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该已完成装配活动实际读取的 ContextArtifact；它可比初始 input_artifact_refs 更窄，但不能虚构未读取材料。
        en: Lists the ContextArtifacts actually read by the completed assembly activity; it may be narrower than input_artifact_refs but cannot invent material not consumed.
        ja: 完了した組み立て活動が実際に読んだ ContextArtifact を列挙します。input_artifact_refs より狭くてもよいですが、消費していない材料を作り出してはなりません。
      allowed_values: []
      pattern: '^ctx-art-[A-Za-z0-9._-]+$'
      example_value:
        - ctx-art-system-1
      source_claims:
        - claim-context-assembly-completed-transform
    - id: applied_policy_ref
      labels:
        zh: 已应用策略引用
        en: applied policy reference
        ja: 適用済み方針参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这次实际装配所应用的版本化 ContextSpecification；policy_ref 可表达计划引用，但该字段记录执行时的绑定。
        en: Identifies the versioned ContextSpecification actually applied by this assembly; policy_ref may express a plan, while this field records the execution binding.
        ja: この組み立てで実際に適用した版付き ContextSpecification を識別します。policy_ref は計画参照を表せますが、この項目は実行時の結び付きを記録します。
      allowed_values: []
      pattern: '^ctx-spec-[A-Za-z0-9._@-]+$'
      example_value: ctx-spec-support-v1
      source_claims:
        - claim-context-assembly-package-generation
    - id: activity_status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录已装配活动是完成、失败还是取消；它不等同于最终包的 finalization_state。
        en: Records whether the assembly activity completed, failed, or was cancelled; it is not the finalization_state of the resulting package.
        ja: 組み立て活動が完了、失敗、取消のいずれかを記録し、結果パッケージの finalization_state とは区別します。
      allowed_values:
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-context-assembly-provenance
  constraints:
    - id: context-assembly-completed-produces-one-final-package
      severity: error
      expression_language: plain
      expression: ContextAssembly must have nonempty input_artifact_refs, window_ref, policy_ref, result_package_ref, visible_window_ref, and completed_at; result_package_ref must identify a finalized package in the same call_scope_id.
      explanation:
        zh: 该子类型只表示成功完成的装配，因此需要具体输入、策略、容量、结果和时间。
        en: This subtype represents only successful completed assembly, so it needs concrete input, policy, capacity, result, and time.
        ja: この下位型は成功完了組立だけを表すため、具体的入力、方針、容量、結果、時刻が必要です。
      source_claims:
        - claim-context-assembly-package-generation
        - claim-context-assembly-provenance
    - id: context-assembly-does-not-assert-model-execution
      severity: error
      expression_language: plain
      expression: Producing a ContextPackage or planned VisibleContextWindow does not assert that an LLM invocation occurred, that the provider accepted all items, or that a response used any item; those require separate execution evidence.
      explanation:
        zh: 装配输出是调用前事实，不能被过度扩展为模型运行或注意力结论。
        en: Assembly output is a pre-call fact and cannot be overextended into a model-run or attention conclusion.
        ja: 組立出力は呼び出し前事実であり、モデル実行や注意に関する結論へ過度に拡張できません。
      source_claims:
        - claim-context-assembly-completed-transform
examples:
  - id: context-assembly-example-positive-final-package

    labels:
      zh: 生成定稿支持上下文包
      en: Produce a finalized support context package
      ja: 確定サポートコンテキストパッケージを生成する

    descriptions:
      zh: Lewis RAG：检索文档 z 组装进 prompt p(y|x,z)；MemGPT main_context 合并 recall_memory 检索结果；Lost in the Middle：关键信息放 context 首尾。
      en: Lewis RAG: retrieved docs z assembled into prompt p(y|x,z); MemGPT main_context merges recall_memory results; Lost in the Middle: key info at context head/tail.
      ja: Lewis RAG p(y|x,z) assembly。MemGPT main_context merge recall。Lost in the Middle 首尾配置。
    field_values:
      assembly_activity_id: ctx-assembly-activity-support-01
      assembly_id: ctx-assembly-support-01
      call_scope_id: call-support-20260719-01
      consumed_artifact_refs:
        - ctx-art-system-1
        - ctx-art-summary-9
        - ctx-art-user-22
      input_artifact_refs:
        - ctx-art-system-1
        - ctx-art-summary-9
        - ctx-art-user-22
      window_ref: ctx-window-support-01
      policy_ref: ctx-spec-support-v1
      applied_policy_ref: ctx-spec-support-v1
      activity_status: completed
      result_package_ref: ctx-pkg-support-01
      visible_window_ref: ctx-visible-support-01
      completed_at: "2026-07-19T09:20:00Z"
    related_node_ids:
      - ContextAssembly
      - ContextPackage
      - VisibleContextWindow
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage
      - ContextAssembly-consumes-ContextArtifact

    source_claims:
      - claim-context-assembly-package-generation
  - id: context-assembly-example-counterexample-package-without-activity

    labels:
      zh: 没有产生活动的定稿包
      en: Finalized package without producing activity
      ja: 生成活動のない確定パッケージ

    descriptions:
      zh: 反例：未 trim 就把完整 MessageHistory 发送，违反 Lost in the Middle (Liu et al. 2023) U 型注意力曲线治理。
      en: Counterexample: sending full MessageHistory without trim, violating Lost in the Middle (Liu et al. 2023) U-shaped attention curve governance.
      ja: 反例：trim なし MessageHistory 全量送信。Lost in the Middle U 型 curve 違反。
    field_values:
      assembly_id: ctx-assembly-missing-provenance
      call_scope_id: call-support-20260719-02
      input_artifact_refs:
        - ctx-art-placeholder-1
      window_ref: ctx-window-support-01
      policy_ref: ctx-spec-support-v1
      result_package_ref: ctx-pkg-unexplained-01
      visible_window_ref: ctx-visible-unexplained-01
      completed_at: "2026-07-19T09:21:00Z"
    related_node_ids:
      - ContextAssembly
      - ContextPackage
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage

    source_claims:
      - claim-context-assembly-provenance
  - id: context-assembly-example-boundary-provider-truncation-after-package

    labels:
      zh: 定稿后提供方仍可能截断
      en: Provider may still truncate after finalization
      ja: 確定後もプロバイダーが切り詰め得る

    descriptions:
      zh: ContextAssembly 调用前定稿包 vs 模型实际 attention；Cursor @Files 引用 vs Claude prompt caching cache_control:{type:ephemeral} 边界。
      en: ContextAssembly pre-call finalized package vs model actual attention; Cursor @Files citation vs Claude prompt caching cache_control:{type:ephemeral} boundary.
      ja: ContextAssembly 確定 package vs model attention。Cursor @Files vs Claude prompt caching 境界。
    field_values:
      assembly_id: ctx-assembly-realtime-01
      call_scope_id: call-realtime-20260719-01
      input_artifact_refs:
        - ctx-art-system-4
        - ctx-art-user-40
      window_ref: ctx-window-realtime-01
      policy_ref: ctx-spec-realtime-v1
      result_package_ref: ctx-pkg-realtime-03
      visible_window_ref: ctx-visible-realtime-planned-01
      completed_at: "2026-07-19T09:23:00Z"
    related_node_ids:
      - ContextAssembly
      - VisibleContextWindow
      - ContextPackage
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage
      - VisibleContextWindow-projects-ContextPackage

    source_claims:
      - claim-context-assembly-completed-transform
  - id: context-assembly-example-instance-langgraph-model-invoke

    labels:
      zh: 实例：LangGraph 裁剪后调用模型
      en: "Instance: LangGraph invocation after trimming"
      ja: 実例：トリミング後の LangGraph モデル呼び出し

    descriptions:
      zh: Cursor @file src/auth.ts + codebase indexing 自动裁剪；Claude 200K window + cache_control:{"type":"ephemeral"} 缓存 system prompt 后 assembly。
      en: Cursor @file src/auth.ts + codebase indexing auto-trim; Claude 200K window + cache_control:{"type":"ephemeral"} caches system prompt then assembly.
      ja: Cursor @file + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。
    field_values:
      assembly_activity_id: ctx-assembly-activity-langgraph-01
      assembly_id: ctx-assembly-langgraph-01
      call_scope_id: call-support-20260719-05
      consumed_artifact_refs:
        - ctx-art-message-state-1
      input_artifact_refs:
        - ctx-art-message-state-1
      window_ref: ctx-window-support-04
      policy_ref: ctx-spec-support-v3
      applied_policy_ref: ctx-spec-support-v3
      activity_status: completed
      result_package_ref: ctx-pkg-langgraph-01
      visible_window_ref: ctx-visible-langgraph-01
      completed_at: "2026-07-19T09:24:00Z"
    related_node_ids:
      - ContextAssembly
      - ContextPackage
      - ContextArtifact
    related_relation_ids:
      - ContextAssembly-produces-ContextPackage
      - ContextAssembly-consumes-ContextArtifact
    source_claims:
      - claim-context-assembly-completed-transform
parent_relation:
  id: ContextAssembly-specializes-ContextAssemblyActivity
  predicate: is_a
  target: concept:ContextAssemblyActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是成功完成的上下文装配活动
    en: is a completed context assembly activity
    ja: 完了コンテキスト組立活動である
  definitions:
    zh: ContextAssembly 是具有定稿结果包的成功 ContextAssemblyActivity 子类型；运行、失败或仅计划的活动不属于该子类型。
    en: ContextAssembly is the successful ContextAssemblyActivity subtype with a finalized result package; running, failed, or planned activities are not in this subtype.
    ja: ContextAssembly は確定結果パッケージを持つ成功 ContextAssemblyActivity 下位型です。実行中、失敗、計画のみの活動はこの下位型ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个活动生成多少包；本子类型字段规定每个成功装配记录一个结果包。
    en: Classification does not prescribe how many packages an activity generates; this subtype's fields require one result package per successful assembly record.
    ja: 分類関係は活動が生成するパッケージ数を規定しません。この下位型の項目は成功組立記録ごとに一つの結果パッケージを要求します。
  inverse_reading:
    predicate: has_completed_assembly_subtype
    labels:
      zh: 具有已完成装配子类型
      en: has completed-assembly subtype
      ja: 完了組立下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-assembly-provenance
  distinct_fact_rationale:
    zh: 此关系表达成功装配的类型归属，不表达读取、包生成、模型调用或提供方可见性。
    en: This relation expresses successful-assembly type membership, not consumption, package generation, model invocation, or provider visibility.
    ja: この関係は成功組立の型所属を表し、消費、パッケージ生成、モデル呼び出し、プロバイダー可視性を表しません。
  layout_role: primary-backbone
relations:
  - id: ContextAssembly-consumes-ContextArtifact
    predicate: consumes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 读取上下文工件
      en: consumes context artifact
      ja: コンテキスト工件を消費する
    definitions:
      zh: 当且仅当目标工件出现在 input_artifact_refs 中并被该装配实际读取以形成结果包时，ContextAssembly 消费该工件。
      en: ContextAssembly consumes a target artifact only when it occurs in input_artifact_refs and was actually read to form the result package.
      ja: 対象工件が input_artifact_refs に現れ、結果パッケージ形成のため実際に読まれた場合にのみ、ContextAssembly はその工件を消費します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次装配可读取多个工件，一个工件也可被不同调用范围的装配读取；每个消费事实需具体活动和范围。
      en: One assembly can read many artifacts, and one artifact can be read by assemblies in different call scopes; each consumption fact needs concrete activity and scope.
      ja: 一つの組立は複数工件を読め、一つの工件は異なる呼び出し範囲の組立に読まれ得ます。各消費事実には具体的活動と範囲が必要です。
    inverse_reading:
      predicate: is_consumed_by_context_assembly
      labels:
        zh: 被上下文装配读取
        en: is consumed by context assembly
        ja: コンテキスト組立に消費される
    conditions:
      - id: ContextAssembly-consumes-ContextArtifact-actual-read
        severity: error
        expression_language: plain
        expression: "Assert only when target ID occurs in input_artifact_refs, call_scope_id matches the artifact scope, and result_package_ref exists. Similar, nearby, or unselected artifacts are not consumed."
        explanation:
          zh: 消费关系需要实际读取，不可用主题相似或同一存储空间推断。
          en: Consumption requires actual reading and cannot be inferred from topic similarity or co-location in storage.
          ja: 消費には実読取りが必要で、話題の類似や同一ストレージ内の共存から推定できません。
        source_claims:
          - claim-context-assembly-provenance
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-context-assembly-provenance
    distinct_fact_rationale:
      zh: 此关系表达装配对输入工件的实际读取，不表达工件被包包含、被模型看到、被存储或被摘要。
      en: This relation expresses actual assembly reading of an input artifact, not package inclusion, model visibility, storage, or summarization of the artifact.
      ja: この関係は組立による入力工件の実読取りを表し、パッケージ包含、モデル可視性、保存、要約を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ContextArtifact
  - id: ContextAssembly-produces-ContextPackage
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生定稿上下文包
      en: produces finalized context package
      ja: 確定コンテキストパッケージを生成する
    definitions:
      zh: 当且仅当目标包等于 result_package_ref、处于 finalized 状态并与装配共享调用范围时，ContextAssembly 产生该 ContextPackage。
      en: ContextAssembly produces a target ContextPackage only when it equals result_package_ref, is finalized, and shares the assembly's call scope.
      ja: 対象パッケージが result_package_ref と等しく、finalized 状態で、組立と呼び出し範囲を共有する場合にのみ、ContextAssembly はその ContextPackage を生成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每个成功装配记录一个结果包；同一包不能由不相关装配在同一范围内重复产生。
      en: Each successful assembly record has one result package; the same package cannot be repeatedly produced by unrelated assemblies in the same scope.
      ja: 各成功組立記録には一つの結果パッケージがあります。同じパッケージを同一範囲で無関係な組立が繰り返し生成できません。
    inverse_reading:
      predicate: is_produced_by_context_assembly
      labels:
        zh: 由上下文装配产生
        en: is produced by context assembly
        ja: コンテキスト組立により生成される
    conditions:
      - id: ContextAssembly-produces-ContextPackage-finalized-result
        severity: error
        expression_language: plain
        expression: "Assert only when target package ID equals result_package_ref, target finalization_state is finalized, target call_scope_id equals source call_scope_id, and completed_at is present."
        explanation:
          zh: 草稿、失败输出、不同调用范围的包或仅计划中的包不能成为此产生关系的目标。
          en: A draft, failed output, package from another call scope, or planned package cannot be the target of this production relation.
          ja: 下書き、失敗出力、別の呼び出し範囲のパッケージ、計画中のパッケージは、この生成関係の対象になれません。
        source_claims:
          - claim-context-assembly-package-generation
          - claim-context-assembly-provenance
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-context-assembly-package-generation
      - claim-context-assembly-provenance
    distinct_fact_rationale:
      zh: 此关系表达一次完成装配生成一个调用输入包，不表达包项来源、模型调用、提供方截断或模型响应。
      en: This relation expresses completed assembly generating a call-input package, not item provenance, model invocation, provider truncation, or model response.
      ja: この関係は完了組立による呼び出し入力パッケージ生成を表し、項目来歴、モデル呼び出し、プロバイダー切り詰め、モデル応答を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ContextPackage
sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents transforming an ordered message sequence before model invocation.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents reducer outputs used as reduced chat input.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines provenance distinctions between activities, used entities, and generated entities.
source_claims:
  - id: claim-context-assembly-completed-transform
    source: langgraph-memory
    supports: LangGraph documents transforming message history before model invocation and then invoking a model with the resulting sequence. Moonweave defines ContextAssembly as the completed pre-invocation transformation, not the model invocation itself.
    locator: "LangGraph memory guide: trim_messages and subsequent model invocation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-assembly-package-generation
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents reducers that return reduced chat history for use with completion services. Moonweave records the completed transformation's finalized ordered input as a ContextPackage and planned visible projection.
    locator: "Chat history reducers and reduced chat history output"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-assembly-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an activity, entities it uses, and an entity it generates. Moonweave requires a completed assembly to identify exact input artifacts and a distinct generated package with time and call scope.
    locator: "PROV-O Activity, Entity, prov:used, prov:wasGeneratedBy, and temporal properties"
    evidence_kind: ontology-design-inference
    confidence: high
