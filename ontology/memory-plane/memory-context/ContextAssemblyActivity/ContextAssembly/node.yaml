schema: moonweave.ai/ontology-node/v1
id: ContextAssembly
kind: concept
status: accepted
labels:
  zh: 上下文组装
  en: context assembly
  ja: コンテキスト組立
semantics:
  short_definition:
    zh: 为一次调用执行选择、排序与容量裁剪并产出可重放上下文包的 ContextAssemblyActivity。
    en: A ContextAssemblyActivity that selects, orders, and capacity-trims candidates for one call and emits a replayable ContextPackage.
    ja: 一回の呼出し候補を選択・整列・容量裁断し、再現可能な ContextPackage を生成する ContextAssemblyActivity です。
  definition:
    zh: ContextAssembly 是一种完整的 ContextAssemblyActivity 运行；其种差是：它以 assembly_id 标识，接受消息、RetrievedChunk、MemoryRecord 或工具发现结果等候选，依次执行选择、排序和裁剪阶段，记录 ContextExclusion，并产出包含最终 ContextWindow 的可重放 ContextPackage。它不是任一单独阶段、规则、预算或结果产物。
    en: A ContextAssembly is one complete ContextAssemblyActivity run identified by assembly_id. It accepts candidate messages, RetrievedChunks, MemoryRecords, or tool-discovery results, executes selection, ordering, and trimming phases in sequence, records ContextExclusions, and emits a replayable ContextPackage containing the final ContextWindow. It is not one phase, a rule, a budget, or an output artifact.
    ja: ContextAssembly は assembly_id で識別される完全な ContextAssemblyActivity 実行です。メッセージ、RetrievedChunk、MemoryRecord、tool discovery result を候補として受け、選択・整列・裁断段階を順に実行し、ContextExclusion を記録し、最終 ContextWindow を含む再現可能 ContextPackage を生成します。単一段階・規則・予算・成果物ではありません。
  why_needed:
    zh: 显式建模该活动可追踪某个上下文版本怎样形成、用了哪些候选和约束，以及为何某项被保留、排序或裁剪。
    en: Explicitly modeling the activity makes it possible to trace how a context version was formed, which candidates and constraints were used, and why an item was retained, ordered, or trimmed.
    ja: 活動を明示モデル化することで、文脈版の形成過程、使用候補・制約、項目が保持・順序付け・裁剪された理由を追跡できます。
  includes:
    - zh: 纳入具有 assembly_id、输入候选引用、所用预算或规则、阶段轨迹和输出上下文版本的组装运行。
      en: Includes assembly runs with an assembly_id, input candidate references, applied budgets or rules, phase traces, and an output context version.
      ja: assembly_id、入力候補参照、適用予算・規則、段階軌跡、出力文脈版を持つ組立実行を含みます。
  excludes:
    - zh: 排除单独的检索运行、一次排序阶段、ContextRule、ContextBudget 以及已完成的 ContextPackage；它们分别是上游活动、组成阶段、规范、约束和产物。
      en: "Excludes a standalone retrieval run, an ordering phase, a ContextRule, a ContextBudget, and a completed ContextPackage: these are respectively an upstream activity, component phase, specification, constraint, and artifact."
      ja: 独立検索実行、順序付け段階、ContextRule、ContextBudget、完成 ContextPackage はそれぞれ上流活動・構成段階・仕様・制約・成果物なので除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - assembly_id
  fields:
    - id: assembly_id
      labels:
        zh: 上下文组装标识
        en: context-assembly ID
        ja: コンテキスト組み立て ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次上下文选择、排序和预算应用活动。
        en: Stable identifier for one context selection, ordering, and budgeting activity.
        ja: 一回のコンテキスト選択、順序付け、予算適用活動を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: context-assembly-001
      source_claims:
        - claim-context-assembly-003
        - claim-context-assembly-004
    - id: context_version
      labels:
        zh: 上下文版本
        en: context version
        ja: コンテキストバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该活动产出的不可变上下文快照版本。
        en: Identifies the immutable context-snapshot version produced by this activity.
        ja: この活動が生成した不変コンテキストスナップショットのバージョンです。
      allowed_values: []
      pattern: null
      example_value: ctx-v12
      source_claims:
        - claim-context-assembly-005
        - claim-context-assembly-006
  constraints:
    - id: context-assembly-budget-complete
      severity: error
      expression_language: plain
      expression: every included source is ordered and counted against the applied ContextBudget
      explanations:
        zh: 每个纳入来源都必须有顺序并计入所用上下文预算。
        en: Every included source is ordered and counted against the applied ContextBudget.
        ja: 採用された各出典は順序付けされ、適用された ContextBudget に計上されます。
      source_claims:
        - claim-context-assembly-007
        - claim-context-assembly-008
  required_relation_constraints:
    - id: context-assembly-produces-package
      direction: outgoing
      predicate: produces
      target_concept_id: ContextPackage
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 上下文组装必须产出唯一规范的 ContextPackage，而不复制其定义。
        en: Context assembly produces the uniquely owned ContextPackage without duplicating its definition.
        ja: コンテキスト組み立ては定義を複製せず、唯一所有される ContextPackage を生成します。
      source_claims:
        - claim-context-assembly-009
        - claim-context-assembly-010
examples:
  - id: ContextAssembly-example-positive-001
    kind: positive
    labels:
      zh: 上下文组装正例
      en: Positive example of context assembly
      ja: コンテキスト組立の正例
    scenario_id: null
    descriptions:
      zh: 组装运行 context-assembly-001 接收已授权消息、检索候选和任务状态，依次完成选择、排序与容量裁剪，并产出版本 ctx-v12 的 ContextPackage。
      en: Assembly run context-assembly-001 receives authorized messages, retrieved candidates, and task state; it performs selection, ordering, and capacity trimming in sequence and produces ContextPackage version ctx-v12.
      ja: 組立実行 context-assembly-001 は許可済みメッセージ、検索候補、タスク状態を受け取り、選択・順序付け・容量裁断を順に行い、ContextPackage 版 ctx-v12 を生成します。
    field_values:
      assembly_id: context-assembly-001
      target_call_ref: call-88
      candidate_set_ref: context-candidates-88@4
      context_specification_ref: context-policy-production@12
      started_at: 2026-07-16T04:00:00.000Z
      ended_at: 2026-07-16T04:00:00.190Z
      outcome: success
      context_version: ctx-v12
    related_node_ids:
      - ContextAssembly
      - ContextOrderingRule
    related_relation_ids:
      - context_assembly_applies_ordering_rule
    expected_result:
      zh: 运行被识别为 ContextAssembly，并可追溯其输入集合、三个组成阶段、使用的规则和预算以及唯一输出版本。
      en: The run is identified as ContextAssembly and remains traceable to its input set, three component phases, applied rules and budget, and the resulting version.
      ja: 実行は ContextAssembly と識別され、入力集合、三構成段階、適用規則と予算、生成版へ追跡できます。
    why_valid_or_invalid:
      zh: 它是有起止、输入和产出的实际转换活动，而不是规则、预算或最终包；三个阶段共同决定一次输出版本。
      en: It is an actual transformation with start/end, inputs, and output—not a rule, budget, or final package—and its three phases jointly determine one output version.
      ja: 開始・終了、入力、出力を持つ実変換活動であり、規則・予算・最終パッケージではありません。三段階が一つの出力版を共同決定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-assembly-011
      - claim-context-assembly-012
  - id: ContextAssembly-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文组装边界例
      en: Boundary case for context assembly
      ja: コンテキスト組立の境界例
    scenario_id: null
    descriptions:
      zh: ContextOrderingRule rule-recency 声明“同等权威下优先最近证据”，但没有运行时间、输入集合或输出版本；即使某次组装应用它，该规则也不是 ContextAssembly。
      en: ContextOrderingRule rule-recency states “prefer newer evidence when authority is equal,” but has no execution time, input set, or output version. Its use by an assembly does not turn the rule into ContextAssembly.
      ja: ContextOrderingRule rule-recency は「権威が同等なら新しい証拠を優先」と定めますが、実行時刻・入力集合・出力版を持ちません。組立が適用しても規則は ContextAssembly になりません。
    field_values: {}
    related_node_ids:
      - ContextAssembly
      - ContextOrderingRule
    related_relation_ids:
      - context_assembly_applies_ordering_rule
    expected_result:
      zh: 验证器保留 rule-recency 的 ContextOrderingRule 类型，并仅记录 ContextAssembly 对它的应用关系。
      en: Validation keeps rule-recency typed as ContextOrderingRule and records only that a ContextAssembly applies it.
      ja: 検証器は rule-recency を ContextOrderingRule として保持し、ContextAssembly が適用する関係だけを記録します。
    why_valid_or_invalid:
      zh: 可复用规范与一次执行活动具有不同身份条件：前者可跨运行复用，后者由一次输入—阶段—输出过程确定。
      en: "A reusable specification and a single execution activity have different identity conditions: the former spans runs, while the latter is identified by one input-phase-output process."
      ja: 再利用可能仕様と一回の実行活動は同一性条件が異なります。前者は実行を越えて再利用され、後者は一つの入力・段階・出力過程で識別されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-assembly-013
      - claim-context-assembly-014
  - id: ContextAssembly-example-instance-001
    kind: instance
    labels:
      zh: 上下文组装结构化实例
      en: Structured instance of context assembly
      ja: コンテキスト組立の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: context-assembly-001 把获准消息、检索片段和用户偏好记录作为候选，在 32k-token 预算下依次执行选择、排序和裁剪，并把完成后的结果版本标记为 ctx-v12。
      en: context-assembly-001 takes authorized messages, retrieved chunks, and a user-preference record as candidates, performs selection, ordering, and trimming under a 32k-token budget, and marks the completed result as context version ctx-v12.
      ja: context-assembly-001 は認可済みメッセージ、検索チャンク、ユーザー選好記録を候補とし、32k-token 予算下で選択・整列・裁断を順に実行し、完了結果を文脈版 ctx-v12 として記録します。
    field_values:
      assembly_id: context-assembly-001
      context_version: ctx-v12
    related_node_ids:
      - ContextAssembly
    related_relation_ids: []
    expected_result:
      zh: 该记录实例化一次完整 ContextAssembly；assembly_id 标识活动运行，context_version 标识该运行形成的确定上下文版本。
      en: "The record instantiates one complete ContextAssembly: assembly_id identifies the activity run, while context_version identifies the determinate context version formed by that run."
      ja: この記録は一回の完全な ContextAssembly を具体化し、assembly_id は活動実行、context_version はその実行が形成した確定文脈版を識別します。
    why_valid_or_invalid:
      zh: 两个字段没有把活动误写成产物：前者保持组装运行的同一性，后者把本次选择、排序与裁剪绑定到可复核结果。
      en: "The two fields do not collapse the activity into its artifact: the first preserves run identity and the second binds this selection-ordering-trimming execution to a reviewable result."
      ja: 二項目は活動と成果物を混同せず、前者が実行同一性を保ち、後者が今回の選択・整列・裁断を検証可能な結果へ結びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-assembly-015
      - claim-context-assembly-016
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ContextAssemblyPhase
    shared_parent_concept_id: ContextAssemblyActivity
    differentia:
      zh: 正向身份比较：父节点 ContextAssemblyActivity：ContextAssembly（semantic kind=activity，骨架 ContextAssembly-is_a-ContextAssemblyActivity）；ContextAssemblyPhase（semantic kind=activity，骨架 ContextAssemblyPhase-is_a-ContextAssemblyActivity）。双端条件：ContextAssembly 条件：“为一次调用执行选择、排序与容量裁剪并产出可重放上下文包的 ContextAssemblyActivity”；ContextAssemblyPhase 条件：“在完整上下文组装内完成一种可独立追踪转换职责的 ContextAssemblyActivity”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent ContextAssemblyActivity: ContextAssembly (semantic kind=activity, backbone ContextAssembly-is_a-ContextAssemblyActivity); ContextAssemblyPhase (semantic kind=activity, backbone ContextAssemblyPhase-is_a-ContextAssemblyActivity). Endpoint conditions: ContextAssembly condition: “A ContextAssemblyActivity that selects, orders, and capacity-trims candidates for one call and emits a replayable ContextPackage”; ContextAssemblyPhase condition: “A ContextAssemblyActivity that performs one independently traceable transformation responsibility inside a complete assembly”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 ContextAssemblyActivity：ContextAssembly（semantic kind=activity、バックボーン ContextAssembly-is_a-ContextAssemblyActivity）；ContextAssemblyPhase（semantic kind=activity、バックボーン ContextAssemblyPhase-is_a-ContextAssemblyActivity）。両端条件：ContextAssembly の条件：「一回の呼出し候補を選択・整列・容量裁断し、再現可能な ContextPackage を生成する ContextAssemblyActivity です」；ContextAssemblyPhase の条件：「完全組立内で一つの独立追跡可能な変換責務を行う ContextAssemblyActivity です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-context-assembly-017
      - claim-context-assembly-018
parent_relation:
  id: ContextAssembly-is_a-ContextAssemblyActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文组装活动
    en: is a context assembly activity
    ja: コンテキスト組立活動の一種
  definitions:
    zh: 每个 ContextAssembly 都是 ContextAssemblyActivity；其种差是它覆盖选择、排序和裁剪的完整运行，并产生一个可重放 ContextPackage。
    en: Every ContextAssembly is a ContextAssemblyActivity distinguished by spanning selection, ordering, and trimming as one complete run and producing one replayable ContextPackage.
    ja: すべての ContextAssembly は ContextAssemblyActivity で、選択・整列・裁断を一つの完全実行として跨ぎ一つの再現可能 ContextPackage を生成する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的实例基数由调用、版本或部署约束决定，不在类级关系上统一封闭。
    en: Instance cardinality depends on the call, version, or deployment and is not globally closed on the class-level relation.
    ja: インスタンス基数は呼出し・版・配置制約に依存し、クラス関係上で一律に閉じません。
  inverse_reading:
    predicate: has_context_assembly_subtype
    labels:
      zh: 以上下文组装为下位类型
      en: has ContextAssembly subtype
      ja: ContextAssembly を下位型に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
