  - id: claim-context-refresh-realtime-arrival
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents conversation.item.create and the server conversation.item.created event after a client adds an item. Moonweave treats such arrival as a possible external refresh trigger, not as proof that a new assembled package or model response already exists.
    locator: "Realtime conversation.item.create and conversation.item.created event definitions"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-refresh-state-change
    source: langgraph-memory
    supports: LangGraph documents mutable message state and trimming, deletion, or summary transformations before later model use. Moonweave emits a separate refresh event when such state or policy changes require a new package version rather than silently mutating an audited package.
    locator: "LangGraph memory guide: message state management and pre-invocation transformations"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-refresh-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes activities, entities, generation, use, and time as separate provenance facts. Moonweave separates a refresh occurrence from its emitting assembly, the affected old package, a replacement draft, later reassembly, and any model invocation.
    locator: "PROV-O Activity, Entity, generation, use, and temporal provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
