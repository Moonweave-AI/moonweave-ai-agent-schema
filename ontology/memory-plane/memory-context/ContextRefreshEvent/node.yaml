schema: moonweave.ai/ontology-node/v1
id: ContextRefreshEvent
kind: concept
status: accepted
labels:
  zh: 上下文刷新事件
  en: Context refresh event
  ja: コンテキスト更新イベント
semantics:
  short_definition:
    zh: 记录已准备上下文因新材料、策略或容量变化而需要建立新包版本的发生事件。
    en: An occurrence recording that prepared context needs a new package version because material, policy, or capacity changed.
    ja: 材料、方針、容量の変化により、準備済みコンテキストに新しいパッケージ版が必要になったことを記録する発生イベントです。
  definition:
    zh: >
      ContextRefreshEvent 记录一个具体 ContextPackage 或其 planned VisibleContextWindow 已不再适合继续使用的时刻及原因。触发原因可以是新的用户消息、工具结果或检索材料到达，窗口预算变化，策略版本变化，摘要过期，或提供方确认的截断差异。事件声明受影响的包、触发来源、处理方式和时间；它不直接改写定稿包，也不等于一次新的 ContextAssembly。若需要重新装配，事件应要求创建新的草稿包版本并由独立 ContextAssembly 完成。它也不代表源历史或记忆被删除。
    en: >
      A ContextRefreshEvent records the moment and reason a concrete ContextPackage or its planned VisibleContextWindow is no longer suitable for continued use. Triggers can include arrival of a new user message, tool result, or retrieval material; a window-budget change; a policy-version change; summary staleness; or provider-confirmed truncation difference. The event declares the affected package, trigger source, disposition, and time. It does not rewrite a finalized package directly and is not itself a new ContextAssembly. If reassembly is needed, the event requires a new draft package version that an independent ContextAssembly completes. It also does not mean source history or memory was deleted.
    ja: >
      ContextRefreshEvent は、具体的な ContextPackage またはその planned VisibleContextWindow が継続利用に適さなくなった時点と理由を記録します。トリガーには新しいユーザーメッセージ、ツール結果、検索材料の到着、ウィンドウ予算変更、方針版変更、要約の陳腐化、プロバイダー確認済み切り詰め差分があります。イベントは影響パッケージ、トリガー情報源、処理、時刻を宣言します。確定パッケージを直接書き換えず、それ自体は新しい ContextAssembly ではありません。再組立が必要なら、イベントは独立 ContextAssembly が完了する新しい下書きパッケージ版を要求します。情報源履歴や記憶の削除も意味しません。
  why_needed:
    zh: 异步输入和提供方容量行为会使先前计划的输入过时；显式刷新事件可保留旧包审计身份，并说明为何需重新装配。
    en: Asynchronous input and provider capacity behavior can stale a previously planned input. An explicit refresh event preserves the old package's audit identity and explains why reassembly is needed.
    ja: 非同期入力とプロバイダー容量動作により、以前に計画した入力が陳腐化し得ます。明示的な更新イベントは旧パッケージの監査 ID を保ち、再組立が必要な理由を説明します。
  includes:
    - zh: 受影响包、触发种类和引用、刷新处置、发生时间和可能的替换草稿包。
      en: Affected package, trigger kind and reference, refresh disposition, occurrence time, and possible replacement draft package.
      ja: 影響パッケージ、トリガー種別と参照、更新処理、発生時刻、可能な置換下書きパッケージ。
  excludes:
    - zh: 定稿包原地修改、自动删除来源、模型调用或完成的重新装配本身。
      en: In-place finalized-package mutation, automatic source deletion, a model invocation, or the completed reassembly itself.
      ja: 確定パッケージのその場変更、自動情報源削除、モデル呼び出し、完了した再組立そのもの。
  semantic_kind: event
  aliases:
    - context invalidation event
    - package refresh trigger
engineering:
  explanation:
    zh: >
      刷新应由真实状态变化产生，而不是定时重写。OpenAI Realtime 的 conversation.item.create 和 conversation.item.created 表示会话增加项；LangGraph 文档显示消息状态可在调用前被裁剪、删除或摘要。项目可以将这些输入变化映射为刷新事件，创建新草稿包，再运行新的装配。事件和新装配必须保留不同 ID，避免覆盖已经审计的包。
    en: >
      Emit refreshes from real state change rather than periodic rewrites. OpenAI Realtime conversation.item.create and conversation.item.created represent adding a conversation item, and LangGraph documents message state that can be trimmed, deleted, or summarized before calls. A project can map these input changes to a refresh event, create a new draft package, and then run a new assembly. The event and new assembly must have distinct IDs so an already audited package is not overwritten.
    ja: >
      定期的な書換えではなく実状態変化から更新を発行します。OpenAI Realtime の conversation.item.create と conversation.item.created は会話項目追加を表し、LangGraph は呼び出し前に裁断、削除、要約できるメッセージ状態を文書化しています。プロジェクトはこれら入力変化を更新イベントへ対応付け、新しい下書きパッケージを作成して新組立を実行できます。すでに監査済みのパッケージを上書きしないため、イベントと新組立には別 ID が必要です。
  typical_input:
    - description: Real conversation-item arrival that can trigger refresh.
      format: |
        {
          "type": "conversation.item.create",
          "item": {"type": "message", "role": "user", "content": [{"type": "input_text", "text": "One more detail."}]}
        }
    - description: Refresh decision against a previously finalized package.
      format: |
        {
          "affected_package_ref": "ctx-pkg-support-01",
          "trigger_kind": "new_user_message",
          "trigger_ref": "ctx-art-user-23",
          "refresh_disposition": "create_replacement_draft"
        }
  typical_output:
    - description: Immutable event that requires a new draft rather than mutation.
      format: |
        {
          "refresh_event_id": "ctx-refresh-user-23",
          "affected_package_ref": "ctx-pkg-support-01",
          "replacement_draft_package_ref": "ctx-pkg-support-02",
          "occurred_at": "2026-07-19T09:25:00Z"
        }
  reference_implementations:
    - name: OpenAI Realtime conversation item events
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents client creation and server creation events for conversation items.
    - name: LangGraph memory and message management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents mutable message state and pre-invocation trimming, deletion, and summarization.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes events/activities and generated entities in provenance records.
  source_claims:
    - claim-context-refresh-realtime-arrival
    - claim-context-refresh-state-change
    - claim-context-refresh-provenance
structure:
  identity_keys:
    - refresh_event_id
  fields:
    - id: refresh_event_id
      labels:
        zh: 刷新事件标识
        en: refresh event ID
        ja: 更新イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次具体的上下文刷新触发，不复用为包、工件、装配或调用标识。
        en: Identifies one concrete context-refresh trigger and is not reused as a package, artifact, assembly, or call ID.
        ja: 一つの具体的コンテキスト更新トリガーを識別し、パッケージ、工件、組立、呼び出し ID を再利用しません。
      allowed_values: []
      pattern: '^ctx-refresh-[A-Za-z0-9._-]+$'
      example_value: ctx-refresh-user-23
      source_claims:
        - claim-context-refresh-provenance
    - id: call_scope_id
      labels:
        zh: 调用范围标识
        en: call scope ID
        ja: 呼び出し範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识受刷新影响的调用准备范围，必须与受影响包一致。
        en: Identifies the call-preparation scope affected by refresh and must match the affected package.
        ja: 更新の影響を受ける呼び出し準備範囲を識別し、影響パッケージと一致しなければなりません。
      allowed_values: []
      pattern: '^call-[A-Za-z0-9._-]+$'
      example_value: call-support-20260719-01
      source_claims:
        - claim-context-refresh-provenance
    - id: affected_package_ref
      labels:
        zh: 受影响上下文包引用
        en: affected context package reference
        ja: 影響コンテキストパッケージ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向因该事件不再可继续使用的具体包；它仍保留原有审计身份，不能被原地覆盖。
        en: Points to the concrete package no longer suitable for continued use because of this event. It retains its original audit identity and cannot be overwritten in place.
        ja: このイベントにより継続利用に適さなくなった具体的パッケージを指します。元の監査 ID を保持し、その場で上書きできません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-01
      source_claims:
        - claim-context-refresh-state-change
    - id: trigger_kind
      labels:
        zh: 刷新触发类型
        en: refresh trigger kind
        ja: 更新トリガー種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分新材料、窗口、策略、摘要和提供方截断带来的刷新原因，不能统一模糊称为“上下文改变”。
        en: Distinguishes refresh caused by new material, window, policy, summary, or provider truncation instead of vaguely calling every cause “context changed.”
        ja: 新材料、ウィンドウ、方針、要約、プロバイダー切り詰めによる更新理由を区別し、すべてを曖昧に「コンテキスト変更」と呼びません。
      allowed_values:
        - new_user_message
        - new_tool_result
        - new_retrieval_material
        - window_budget_changed
        - policy_version_changed
        - summary_stale
        - provider_truncation_observed
      pattern: null
      example_value: new_user_message
      source_claims:
        - claim-context-refresh-realtime-arrival
    - id: trigger_ref
      labels:
        zh: 触发来源引用
        en: trigger source reference
        ja: トリガー情報源参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际触发刷新的一项工件、策略版本、窗口版本或提供方事件，而不是仅记录自然语言理由。
        en: Points to the artifact, policy version, window version, or provider event actually triggering refresh rather than recording only a natural-language reason.
        ja: 自然言語理由だけではなく、更新を実際にトリガーした工件、方針版、ウィンドウ版、プロバイダーイベントを指します。
      allowed_values: []
      pattern: '^(ctx-art|ctx-spec|ctx-window|provider-event):[A-Za-z0-9._:-]+$'
      example_value: ctx-art:user-23
      source_claims:
        - claim-context-refresh-realtime-arrival
    - id: refresh_disposition
      labels:
        zh: 刷新处置
        en: refresh disposition
        ja: 更新処理
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明事件要求创建替换草稿、终止当前调用准备或记录无需刷新；它不是实际新装配结果。
        en: States whether the event requires a replacement draft, aborts current call preparation, or records no refresh needed. It is not the actual new assembly result.
        ja: 置換下書きを要求するか、現在の呼び出し準備を中止するか、更新不要を記録するかを示します。実際の新組立結果ではありません。
      allowed_values:
        - create_replacement_draft
        - abort_call_preparation
        - no_refresh_needed
      pattern: null
      example_value: create_replacement_draft
      source_claims:
        - claim-context-refresh-state-change
    - id: replacement_draft_package_ref
      labels:
        zh: 替换草稿包引用
        en: replacement draft package reference
        ja: 置換下書きパッケージ参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当处置为 create_replacement_draft 时，指向新创建的草稿包；它不能等于受影响的定稿包。
        en: When disposition is create_replacement_draft, points to the newly created draft package. It cannot equal the affected finalized package.
        ja: 処理が create_replacement_draft のとき、新規作成の下書きパッケージを指します。影響を受けた確定パッケージと同一にはできません。
      allowed_values: []
      pattern: '^ctx-pkg-[A-Za-z0-9._-]+$'
      example_value: ctx-pkg-support-02
      source_claims:
        - claim-context-refresh-state-change
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录刷新被检测或生成的时间，用于按事件顺序重放包版本变化。
        en: Records when refresh was detected or emitted, enabling replay of package-version changes in event order.
        ja: 更新が検出または発行された時刻を記録し、イベント順にパッケージ版変更を再生可能にします。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:25:00Z"
      source_claims:
        - claim-context-refresh-provenance
  constraints:
    - id: context-refresh-event-preserves-finalized-package-identity
      severity: error
      expression_language: plain
      expression: A ContextRefreshEvent must identify affected_package_ref, trigger_kind, trigger_ref, refresh_disposition, and occurred_at. If refresh_disposition is create_replacement_draft, replacement_draft_package_ref must be present and must differ from affected_package_ref.
      explanation:
        zh: 刷新事件创建新的版本边界，不允许通过原地改写抹去已审计包。
        en: A refresh event creates a new version boundary and cannot erase an audited package by in-place rewrite.
        ja: 更新イベントは新しい版境界を作り、その場書換えで監査済みパッケージを消すことはできません。
      source_claims:
        - claim-context-refresh-state-change
    - id: context-refresh-event-is-not-reassembly-or-deletion
      severity: error
      expression_language: plain
      expression: Refresh event existence does not assert a new ContextAssembly completed, a model invocation occurred, a source artifact was deleted, or a replacement package became finalized. Those require separate activity or lifecycle facts.
      explanation:
        zh: 触发、创建草稿、完成装配、调用模型和删除来源是不同发生事实。
        en: Triggering, creating a draft, completing assembly, invoking a model, and deleting a source are different occurrence facts.
        ja: トリガー、下書き作成、組立完了、モデル呼び出し、情報源削除は別の発生事実です。
      source_claims:
        - claim-context-refresh-provenance
examples:
  - id: context-refresh-event-example-positive-new-user-message

    labels:
      zh: 新用户消息触发替换草稿
      en: New user message triggers replacement draft
      ja: 新ユーザーメッセージが置換下書きをトリガーする

    descriptions:
      zh: Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。
      en: Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering.
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      refresh_event_id: ctx-refresh-user-23
      call_scope_id: call-support-20260719-01
      affected_package_ref: ctx-pkg-support-01
      trigger_kind: new_user_message
      trigger_ref: ctx-art:user-23
      refresh_disposition: create_replacement_draft
      replacement_draft_package_ref: ctx-pkg-support-02
      occurred_at: "2026-07-19T09:25:00Z"
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
      - ContextAssembly
    related_relation_ids:
      - ContextRefreshEvent-generated-by-ContextAssembly

    source_claims:
      - claim-context-refresh-realtime-arrival
  - id: context-refresh-event-example-counterexample-mutate-audited-package

    labels:
      zh: 使用刷新事件原地修改已审计包
      en: Use a refresh event to mutate an audited package in place
      ja: 更新イベントで監査済みパッケージをその場変更する

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      refresh_event_id: ctx-refresh-invalid-mutation
      call_scope_id: call-support-20260719-02
      affected_package_ref: ctx-pkg-support-01
      trigger_kind: new_tool_result
      trigger_ref: ctx-art:tool-7
      refresh_disposition: create_replacement_draft
      replacement_draft_package_ref: ctx-pkg-support-01
      occurred_at: "2026-07-19T09:26:00Z"
    related_node_ids:
      - ContextRefreshEvent
      - ContextPackage
    related_relation_ids:
      - ContextRefreshEvent-generated-by-ContextAssembly

    source_claims:
      - claim-context-refresh-state-change
  - id: context-refresh-event-example-boundary-provider-truncation

    labels:
      zh: 提供方截断差异触发刷新评估
      en: Provider truncation difference triggers refresh evaluation
      ja: プロバイダー切り詰め差分が更新評価をトリガーする

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      refresh_event_id: ctx-refresh-provider-trim-01
      call_scope_id: call-realtime-20260719-01
      affected_package_ref: ctx-pkg-realtime-03
      trigger_kind: provider_truncation_observed
      trigger_ref: provider-event:realtime-truncation-01
      refresh_disposition: create_replacement_draft
      replacement_draft_package_ref: ctx-pkg-realtime-04
      occurred_at: "2026-07-19T09:27:00Z"
    related_node_ids:
      - ContextRefreshEvent
      - VisibleContextWindow
      - ContextPackage
    related_relation_ids:
      - ContextRefreshEvent-generated-by-ContextAssembly

    source_claims:
      - claim-context-refresh-state-change
  - id: context-refresh-event-example-instance-realtime-item-created

    labels:
      zh: 实例：Realtime 会话项创建事件
      en: "Instance: Realtime conversation.item.created"
      ja: 実例：Realtime の conversation.item.created

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      refresh_event_id: ctx-refresh-realtime-item-01
      call_scope_id: call-realtime-20260719-02
      affected_package_ref: ctx-pkg-realtime-draft-01
      trigger_kind: new_user_message
      trigger_ref: provider-event:conversation-item-created-01
      refresh_disposition: create_replacement_draft
      replacement_draft_package_ref: ctx-pkg-realtime-draft-02
      occurred_at: "2026-07-19T09:28:00Z"
    related_node_ids:
      - ContextRefreshEvent
      - ContextIngressEvent
      - ContextPackage
    related_relation_ids:
      - ContextRefreshEvent-generated-by-ContextAssembly
    source_claims:
      - claim-context-refresh-realtime-arrival
parent_relation: null
relations:
  - id: ContextRefreshEvent-generated-by-ContextAssembly
    predicate: generated_by
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由上下文装配生成
      en: is generated by context assembly
      ja: コンテキスト組立により生成される
    definitions:
      zh: 当一个已完成 ContextAssembly 在检查包、窗口或可见投影后检测到需要刷新，并发出具有该事件标识的刷新记录时，ContextRefreshEvent 由该装配生成。
      en: A ContextRefreshEvent is generated by a completed ContextAssembly only when that assembly detects a need to refresh after inspecting package, window, or visible projection and emits the identified event record.
      ja: 完了 ContextAssembly がパッケージ、ウィンドウ、可視投影を検査した後に更新必要を検出し、識別済みイベント記録を発行する場合にのみ、ContextRefreshEvent はその組立により生成されます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个刷新事件记录一个发出装配；多个候选触发应以不同事件或明确聚合规则表示。
      en: One refresh event records one emitting assembly. Multiple candidate triggers require separate events or an explicit aggregation rule.
      ja: 一つの更新イベントは一つの発行組立を記録します。複数候補トリガーには別イベントまたは明示的な集約規則が必要です。
    inverse_reading:
      predicate: generates_context_refresh_event
      labels:
        zh: 生成上下文刷新事件
        en: generates context refresh event
        ja: コンテキスト更新イベントを生成する
    conditions:
      - id: ContextRefreshEvent-generated-by-ContextAssembly-detected-refresh
        severity: error
        expression_language: plain
        expression: "Assert only when the target ContextAssembly is completed, shares call_scope_id, inspected the affected package or visible projection, and event trigger_ref records the observed change. This relation does not assert that the target completed the replacement assembly."
        explanation:
          zh: 生成刷新事件和完成替换装配是不同因果事实，不能合并。
          en: Generating a refresh event and completing replacement assembly are distinct causal facts and cannot be merged.
          ja: 更新イベント生成と置換組立完了は別の因果事実であり、統合できません。
        source_claims:
          - claim-context-refresh-provenance
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-context-refresh-provenance
      - claim-context-refresh-state-change
    distinct_fact_rationale:
      zh: 此关系表达一个已完成装配发出刷新事件，不表达新包已生成、模型调用、源删除或永久策略变化。
