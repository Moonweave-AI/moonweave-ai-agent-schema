source_claims:
  - id: claim-context-specification-001
    source: eng-fw-langchain-context-engineering
    supports: LangChain documents context selection and shaping as separately controllable behavior. Moonweave groups reusable, versioned declarations of that behavior under ContextSpecification.
    locator: Context engineering in agents > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-specification-002
    source: lit-agent-memory-as-action
    supports: Memory as Action treats context management as explicit decisions over working state. Moonweave adds versioned specification identity so decision behavior is auditable across runs.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-specification-003
    source: eng-fw-langchain-context-engineering
    supports: LangChain documents separately controllable model-context mechanisms and per-call context handling. Moonweave assigns a stable ID to the reusable specification governing those choices.
    locator: Context engineering in agents > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-specification-004
    source: lit-agent-memory-as-action
    supports: Memory as Action formalizes context management as state-changing decisions. Moonweave versions the governing specification so those decisions can be replayed against the same policy state.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-specification-005
    source: eng-fw-langchain-context-engineering
    supports: The official guide separates controllable context mechanisms from a particular agent invocation; Moonweave models the reusable declaration as ContextSpecification.
    locator: Context engineering in agents > What you can control; Model context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-specification-006
    source: lit-agent-memory-as-action
    supports: The paper distinguishes context-management decisions from the evolving context state. Moonweave likewise separates a reusable specification from an execution occurrence.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
