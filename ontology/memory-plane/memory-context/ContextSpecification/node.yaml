schema: moonweave.ai/ontology-node/v1
id: ContextSpecification
kind: concept
labels:
  zh: 上下文规范
  en: Context specification
  ja: コンテキスト仕様
semantics:
  short_definition:
    zh: 声明上下文组装可重复行为的版本化规范根类。
    en: Root class for versioned specifications declaring repeatable context-assembly behavior.
    ja: repeatable context-assembly behavior を宣言する versioned specification root class。
  definition:
    zh: ContextSpecification 是规范信息根类；ContextRule（含 ContextOrderingRule）与 ContextBudget 为直接子类。它声明候选如何被判断、排序或容量约束，可被多次 ContextAssembly 引用，但不是一次组装运行、排除结果或 ContextPackage。
    en: ContextSpecification is the specification root. ContextRule (including ContextOrderingRule) and ContextBudget are direct subtypes. It declares how candidates are assessed, ordered, or capacity-constrained, reusable across ContextAssembly runs—not a run, exclusion result, or ContextPackage.
    ja: ContextSpecification は specification root。ContextRule（ContextOrderingRule 含む）/ContextBudget が direct subtype。candidate assessment/ordering/capacity constraint を宣言し複数 ContextAssembly が参照。run/exclusion result/ContextPackage ではない。
  why_needed:
    zh: 规范与执行分离后，同一 budget/rule 修订版可被多次组装引用，并能追踪哪次策略变更导致 prompt 成员变化。
    en: Separating specification from execution lets one budget/rule revision govern many assemblies and trace which policy change altered prompt membership.
    ja: specification/execution 分離で同一 budget/rule revision を複数 assembly が参照。どの policy change が prompt membership を変えたか追跡可能。
  includes:
    - zh: 纳入具有稳定 specification_id、revision 与明确适用范围的规则与预算规范。
      en: Includes rule and budget specifications with stable specification_id, revision, and explicit scope.
      ja: stable specification_id/revision/explicit scope を持つ rule/budget specification。
  excludes:
    - zh: 排除 ContextAssembly、ContextSelectionActivity 与 ContextExclusion 结果记录。
      en: Excludes ContextAssembly, ContextSelectionActivity, and ContextExclusion result records.
      ja: ContextAssembly/ContextSelectionActivity/ContextExclusion result record を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic/LangChain context engineering 将 write/select/compress/isolate 策略外置为可配置规范；Cursor workspace rules 与 .cursorignore 是选择/排除规范；Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 与 max_tokens 是预算规范实例。
    en: Anthropic/LangChain context engineering externalizes write/select/compress/isolate as configurable specs; Cursor workspace rules and .cursorignore are selection/exclusion specs; Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE and max_tokens are budget spec instances.
    ja: Anthropic/LangChain context engineering は write/select/compress/isolate を configurable spec として外置。Cursor workspace rules/.cursorignore は selection/exclusion spec。Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE/max_tokens は budget spec instance。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Configurable context curation strategies.
    - name: Claude Code Context Window
      url: https://code.claude.com/docs/en/context-window
      description: Compaction threshold and budget settings.
structure:
  identity_keys:
    - context_specification_id
    - revision
  fields:
    - id: context_specification_id
      labels:
        zh: 规范标识
        en: Specification identifier
        ja: specification 識別子
      definitions:
        zh: 跨修订稳定标识同一上下文规范 lineage。
        en: Stably identifies one context specification lineage across revisions.
        ja: revision をまたぐ同一 context specification lineage を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: context-policy-production
      allowed_values: []
      source_claims:
        - claim-context-spec-design
    - id: revision
      labels:
        zh: 修订版
        en: Revision
        ja: revision
      definitions:
        zh: 标识不可变规范修订版，供可重放组装引用。
        en: Identifies immutable specification revision for replayable assembly reference.
        ja: replayable assembly 参照用 immutable specification revision。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "12"
      allowed_values: []
      source_claims:
        - claim-context-spec-design
  constraints: []
  required_relations: []
examples:
  - id: ContextSpecification-example-production-policy
    labels:
      zh: 生产环境上下文策略
      en: Production context policy
      ja: production context policy
    descriptions:
      zh: context-policy-production/revision 12 统一声明 ContextBudget（128K ceiling、95% compact threshold）、ContextOrderingRule（system→user→@refs）与 selection threshold=0.65，被三个 assembly 运行引用。
      en: context-policy-production revision 12 declares ContextBudget (128K ceiling, 95% compact threshold), ContextOrderingRule (system→user→@refs), and selection threshold=0.65, referenced by three assembly runs.
      ja: context-policy-production revision 12 が ContextBudget（128K ceiling/95% compact threshold）/ContextOrderingRule（system→user→@refs）/selection threshold=0.65 宣言。三 assembly run が参照。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: policy bundle
    field_values:
      context_specification_id: context-policy-production
      revision: "12"
    related_node_ids:
      - ContextSpecification
      - ContextBudget
      - ContextRule
    related_relation_ids: []
    source_claims:
      - claim-context-spec-design
  - id: ContextSpecification-example-claude-settings
    labels:
      zh: Claude Code 压缩设置
      en: Claude Code compaction settings
      ja: Claude Code compaction settings
    descriptions:
      zh: settings.json 中 CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=70 作为 ContextBudget 修订，降低 auto-compact 触发阈值，可被多次 session assembly 复用。
      en: settings.json CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=70 acts as ContextBudget revision lowering auto-compact threshold, reused across session assemblies.
      ja: settings.json CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=70 が ContextBudget revision として auto-compact 閾値低下。session assembly 横断 reuse。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: settings
    field_values:
      compact_threshold_pct: 70
    related_node_ids:
      - ContextSpecification
      - ContextBudget
    related_relation_ids: []
    source_claims:
      - claim-context-spec-design
  - id: ContextSpecification-example-langchain-middleware
    labels:
      zh: LangChain 中间件规范
      en: LangChain middleware specification
      ja: LangChain middleware specification
    descriptions:
      zh: SummarizationMiddleware 配置（trigger token count、保留 recent 10%）作为 compress 策略规范 revision，独立于单次 LangGraph run。
      en: SummarizationMiddleware config (trigger token count, retain recent 10%) serves as compress strategy spec revision independent of any single LangGraph run.
      ja: SummarizationMiddleware config（trigger token count/recent 10% 保持）が compress strategy spec revision。単一 LangGraph run 独立。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: middleware
    field_values: {}
    related_node_ids:
      - ContextSpecification
      - ContextRule
    related_relation_ids: []
    source_claims:
      - claim-context-spec-design
  - id: ContextSpecification-example-not-assembly
    labels:
      zh: 规范非组装运行
      en: Specification is not assembly run
      ja: specification は assembly run ではない
    descriptions:
      zh: assembly-204 记录一次运行事实；context-policy-production@12 是可复用规范。执行规则不等于成为 ContextSpecification。
      en: assembly-204 records one run occurrence; context-policy-production@12 is reusable spec. Executing rules does not make an object ContextSpecification.
      ja: assembly-204 は一 run occurrence 記録。context-policy-production@12 は reusable spec。rule 実行は ContextSpecification 化を意味しない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextSpecification
      - ContextAssembly
    related_relation_ids: []
    source_claims:
      - claim-context-spec-design
