schema: moonweave.ai/ontology-node/v1
id: ContextSpecification
kind: concept
status: review
labels:
  zh: 上下文规范
  en: context specification
  ja: コンテキスト仕様
semantics:
  short_definition:
    zh: 规定上下文组装可重复行为的版本化规范。
    en: A versioned specification governing repeatable context-assembly behavior.
    ja: repeatable context-assembly behavior を規定する versioned specification。
  definition:
    zh: 上下文规范是一类可独立标识和修订的规范信息，声明上下文候选如何被判断、排序、变换或排除；它为 ContextRule 提供上位层，但不等同于一次 ContextAssembly 运行、某个容量预算或一次排除结果。
    en: ContextSpecification is independently identified and revised specification information declaring how context candidates may be assessed, ordered, transformed, or excluded. It is the genus for ContextRule, not a ContextAssembly run, a capacity budget, or one exclusion result.
    ja: ContextSpecification は context candidate の assessment・ordering・transformation・exclusion を宣言する independently identified/revised specification information です。ContextRule の genus であり ContextAssembly run・capacity budget・one exclusion result ではありません。
  why_needed:
    zh: 把规范身份从执行活动中分离后，同一修订版可以被多次组装运行引用，并能清楚追踪哪次规则变更导致上下文成员或顺序改变。
    en: Separating specification identity from execution lets one revision govern many assembly runs and makes rule revisions that changed context membership or order traceable.
    ja: specification identity を execution から分離すると一 revision を複数 assembly run が利用でき、context membership/order を変えた rule revision を追跡できます。
  includes:
    - zh: 具有稳定规范 ID、修订版和明确适用范围的选择、排序、变换或排除规范。
      en: Selection, ordering, transformation, or exclusion specifications with a stable specification ID, revision, and explicit applicability scope.
      ja: stable specification ID・revision・explicit applicability scope を持つ selection/ordering/transformation/exclusion specification。
  excludes:
    - zh: 一次 ContextAssembly、ContextSelectionActivity 或 ContextExclusion；这些对象分别是活动或活动结果。
      en: A ContextAssembly, ContextSelectionActivity, or ContextExclusion; those are activities or activity results rather than reusable specifications.
      ja: ContextAssembly・ContextSelectionActivity・ContextExclusion。これらは reusable specification ではなく activity/activity result です。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - context_specification_id
    - revision
  fields:
    - id: context_specification_id
      labels:
        zh: 上下文规范标识
        en: context-specification ID
        ja: context specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一上下文规范。
        en: Stably identifies the same context specification across revisions.
        ja: revision をまたいで同一 context specification を安定識別します。
      allowed_values: []
      pattern: null
      example_value: context-policy-production
      source_claims:
        - claim-context-specification-003
    - id: revision
      labels:
        zh: 规范修订版
        en: specification revision
        ja: specification revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识可重放组装所使用的不可变规范修订版。
        en: Identifies the immutable specification revision used for replayable assembly.
        ja: replayable assembly が使用した immutable specification revision を識別します。
      allowed_values: []
      pattern: null
      example_value: "12"
      source_claims:
        - claim-context-specification-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextSpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: 上下文规范正例
      en: context specification positive case
      ja: context specification 正例
    scenario_id: null
    descriptions:
      zh: context-policy-production/revision 12 统一声明候选资格、排序、摘要和排除规则，并被三个独立组装运行按同一修订版引用。
      en: context-policy-production revision 12 declares candidate eligibility, ordering, summarization, and exclusion rules and is referenced unchanged by three independent assembly runs.
      ja: context-policy-production revision 12 は candidate eligibility・ordering・summarization・exclusion rule を宣言し、三 independent assembly run が同一 revision を参照します。
    field_values:
      context_specification_id: context-policy-production
      revision: "12"
    related_node_ids:
      - ContextSpecification
      - ContextRule
      - ContextAssembly
    related_relation_ids:
      - ContextRule-is_a-ContextSpecification
      - ContextAssembly-applies-ContextRule
    expected_result:
      zh: 保留一份可复用规范身份，并让具体规则和运行分别引用它。
      en: Retain one reusable specification identity while rules and runs reference it separately.
      ja: 一 reusable specification identity を保持し rule/run が別々に参照します。
    why_valid_or_invalid:
      zh: 对象具有稳定规范标识和不可变修订版，且其内容声明可重复行为而不是记录一次运行。
      en: The object has a stable specification identity and immutable revision and declares repeatable behavior rather than recording one run.
      ja: object は stable specification identity/immutable revision を持ち one run ではなく repeatable behavior を宣言します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-context-specification-005
  - id: ContextSpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 上下文规范边界例
      en: context specification boundary case
      ja: context specification 境界例
    scenario_id: null
    descriptions:
      zh: ctx-run-804 记录候选、时间、阶段和输出包，但没有独立规范 ID 或修订版；它是 ContextAssembly 活动记录，不能因执行过规则就成为 ContextSpecification。
      en: ctx-run-804 records candidates, time, phases, and an output package but has no independent specification ID or revision. It is a ContextAssembly activity record and does not become ContextSpecification merely because it executed rules.
      ja: ctx-run-804 は candidate・time・phase・output package を記録しますが independent specification ID/revision はありません。rule を実行しただけで ContextSpecification にはなりません。
    field_values:
      assembly_id: ctx-run-804
      context_specification_id: null
      revision: null
    related_node_ids:
      - ContextSpecification
      - ContextAssembly
      - ContextRule
    related_relation_ids:
      - ContextAssembly-applies-ContextRule
    expected_result:
      zh: 保持 ctx-run-804 为活动，不建立规范成员资格。
      en: Keep ctx-run-804 as an activity and do not assert specification membership.
      ja: ctx-run-804 を activity として保持し specification membership を付与しません。
    why_valid_or_invalid:
      zh: 活动发生身份与可复用规范身份的同一性条件不同，应用关系不蕴含 is_a。
      en: Occurrence identity and reusable specification identity have different conditions, and applying a rule does not entail is_a.
      ja: occurrence identity と reusable specification identity は条件が異なり applying relation は is_a を含意しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-context-specification-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
