schema: moonweave.ai/ontology-node/v1
id: ContextSpecification
kind: concept
status: accepted
labels:
  zh: 上下文规约
  en: Context Specification
  ja: コンテキスト仕様
semantics:
  short_definition:
    zh: 为一个调用范围声明上下文装配预算与规则的版本化政策记录。
    en: A versioned policy record declaring context-assembly budgets and rules for a call scope.
    ja: 一つの呼び出し範囲についてコンテキスト組立の予算と規則を宣言する版管理済み方針レコード。
  definition:
    zh: ContextSpecification 是可被装配活动引用的声明式规约；它把适用范围、ContextBudget 引用和 ContextRule 引用固定为一个可审计的版本。它不是已执行的 ContextAssemblyActivity、实际 ContextPackage、提供商 ContextWindow 容量，也不包含完整 Conversation History、PromptTemplateInstance 或持久 MemoryRecord 的内容。
    en: ContextSpecification is a declarative specification that an assembly activity may reference; it fixes applicability, ContextBudget references, and ContextRule references in one auditable revision. It is not an executed ContextAssemblyActivity, an actual ContextPackage, provider ContextWindow capacity, or the content of a full Conversation History, PromptTemplateInstance, or persistent MemoryRecord.
    ja: ContextSpecification は組立活動が参照できる宣言的仕様であり、適用範囲、ContextBudget 参照、ContextRule 参照を一つの監査可能な改訂として固定します。実行済み ContextAssemblyActivity、実際の ContextPackage、プロバイダーの ContextWindow 容量、完全な Conversation History・PromptTemplateInstance・永続 MemoryRecord の内容ではありません。
  why_needed:
    zh: 同一输入在不同预算、保留策略或排序规则下会形成不同可见上下文。将这些选择作为版本化规约记录，才能解释一次调用为何保留、压缩或排除某些工件，并可在不伪造执行事实的前提下复现政策。
    en: The same input can form different visible context under different budgets, retention strategies, or ordering rules. Recording those choices as a versioned specification explains why a call retained, compressed, or excluded artifacts and supports policy replay without fabricating execution facts.
    ja: 同じ入力でも予算、保持戦略、順序規則が異なれば可視コンテキストは変わります。これらを版管理済み仕様として記録すると、呼び出しが工件を保持・圧縮・除外した理由を説明でき、実行事実を捏造せずに方針を再現できます。
  includes:
    - zh: 适用调用范围、已解析的预算引用、规则引用、目标模型或提供商配置档案，以及规约修订。
      en: An applicability scope, resolved budget references, rule references, a target model or provider configuration profile, and a specification revision.
      ja: 適用呼び出し範囲、解決済み予算参照、規則参照、対象モデルまたはプロバイダー設定プロファイル、仕様改訂。
  excludes:
    - zh: 运行中的装配阶段、实际消息列表、实际 token 计数、模型注意力证明、检索结果本身和自动写入的记忆记录。
      en: A running assembly phase, actual message list, actual token count, proof of model attention, retrieval result itself, or an automatically written memory record.
      ja: 実行中の組立段階、実際のメッセージ列、実際の token 数、モデル注意の証明、検索結果そのもの、自動書込みされた記憶レコード。
  semantic_kind: entity
  aliases:
    - context policy
    - assembly specification
    - 上下文配置规约
engineering:
  explanation:
    zh: 工程上，该概念对应被装配器读取的、版本化的政策层。LangChain 的 SummarizationMiddleware 将模型、token 触发阈值和保留消息数作为配置；OpenAI Realtime 会话可用 truncation 配置选择自动截断、禁用截断或保留比例。Moonweave 将这些具体控制及独立预算、规则引用统一记录为规约，而实际执行结果另由 ContextAssembly 和 ContextPackage 记录。
    en: In engineering, this is the versioned policy layer read by an assembler. LangChain SummarizationMiddleware is configured with a model, token trigger, and retained-message count; an OpenAI Realtime session can configure automatic, disabled, or retention-ratio truncation. Moonweave records those concrete controls together with independent budget and rule references as a specification, while ContextAssembly and ContextPackage record actual execution and result separately.
    ja: 工学上は組立器が読む版管理済み方針層です。LangChain の SummarizationMiddleware はモデル、token トリガー、保持メッセージ数で構成され、OpenAI Realtime セッションは自動・無効・保持率の切詰めを設定できます。Moonweave はこれらの具体的制御を独立した予算・規則参照と共に仕様として記録し、実行と結果は別途 ContextAssembly と ContextPackage に記録します。
  typical_input:
    - description: LangChain summarization middleware configuration
      format: |
        SummarizationMiddleware(
          model="gpt-5.4-mini",
          trigger=("tokens", 4000),
          keep=("messages", 20),
        )
    - description: OpenAI Realtime session truncation configuration
      format: |
        {
          "type": "session.update",
          "session": {
            "truncation": {"type": "retention_ratio", "retention_ratio": 0.8}
          }
        }
  typical_output:
    - description: Resolved Moonweave policy record consumed by an assembly
      format: |
        {
          "specification_id": "ctx-spec-support-chat",
          "revision": "v5",
          "applicability_scope": "support-chat",
          "budget_ref": "ctx-budget-support-8k-v3",
          "rule_refs": ["ctx-rule-system-first-v2", "ctx-rule-history-summary-v4"],
          "provider_profile": "realtime-retain-80"
        }
  reference_implementations:
    - name: LangChain built-in middleware
      url: https://docs.langchain.com/oss/python/langchain/middleware/built-in
      description: Documents SummarizationMiddleware token triggers, retained messages, and its text-compression boundary.
    - name: OpenAI Realtime API
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents session truncation modes and retention-ratio configuration.
structure:
  identity_keys: [specification_id, revision]
  fields:
    - id: specification_id
      labels: {zh: 规约标识, en: specification ID, ja: 仕様 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个可被装配活动引用的上下文政策系列，不复用为包、窗口或活动标识。
        en: Stably identifies a context-policy series that an assembly may reference and is not reused as a package, window, or activity ID.
        ja: 組立が参照できるコンテキスト方針系列を安定して識別し、パッケージ、ウィンドウ、活動 ID として再利用しません。
      allowed_values: []
      pattern: "^ctx-spec-[A-Za-z0-9._-]+$"
      example_value: ctx-spec-support-chat
      source_claims: [claim-context-specification-config-apis]
    - id: revision
      labels: {zh: 规约修订, en: specification revision, ja: 仕様改訂}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识同一规约系列中固定的预算、规则和适用范围版本，以使历史装配可解释。
        en: Identifies the fixed budget, rules, and applicability version within one specification series so historical assemblies remain explainable.
        ja: 一つの仕様系列内で固定された予算、規則、適用範囲の版を識別し、過去の組立を説明可能にします。
      allowed_values: []
      pattern: "^v[0-9]+(?:[._-][A-Za-z0-9]+)*$"
      example_value: v5
      source_claims: [claim-context-specification-versioning]
    - id: applicability_scope
      labels: {zh: 适用范围, en: applicability scope, ja: 適用範囲}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明该规约可用于哪些调用、线程类别或模型配置，而不是把它视为所有调用的全局事实。
        en: Declares which calls, thread classes, or model configurations may use the specification rather than treating it as a fact for every call.
        ja: すべての呼び出しの事実として扱うのではなく、どの呼び出し、スレッド類、モデル構成がこの仕様を使用できるかを宣言します。
      allowed_values: []
      pattern: null
      example_value: support-chat
      source_claims: [claim-context-specification-config-apis]
    - id: budget_ref
      labels: {zh: 预算引用, en: budget reference, ja: 予算参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向同一规约版本采用的一个 ContextBudget；它是容量政策引用，不是本次调用实际可见 token 数。
        en: Points to one ContextBudget adopted by this specification revision; it is a capacity-policy reference, not this call's actual visible-token count.
        ja: この仕様改訂が採用する一つの ContextBudget を指し、容量方針の参照であって、この呼び出しの実際の可視 token 数ではありません。
      allowed_values: []
      pattern: "^ctx-budget-[A-Za-z0-9._-]+$"
      example_value: ctx-budget-support-8k-v3
      source_claims: [claim-context-specification-versioning]
    - id: rule_refs
      labels: {zh: 规则引用, en: rule references, ja: 規則参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 指向此版本生效的一个或多个 ContextRule，包括选择、排序或裁剪规则；数组顺序不自动等于结果包中的内容顺序。
        en: Points to one or more ContextRule records active in this revision, including selection, ordering, or trimming rules; array order does not automatically equal content order in the result package.
        ja: 選択、順序付け、裁断の規則を含む、この改訂で有効な一つ以上の ContextRule を指します。配列順は結果パッケージ内の内容順を自動的に意味しません。
      allowed_values: []
      pattern: null
      example_value: [ctx-rule-system-first-v2, ctx-rule-history-summary-v4]
      source_claims: [claim-context-specification-config-apis]
    - id: provider_profile
      labels: {zh: 提供商配置档案, en: provider configuration profile, ja: プロバイダー構成プロファイル}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 记录映射到具体模型或提供商控制的档案名称，例如 Realtime 的 truncation 模式；缺失不表示没有预算或规则。
        en: Records the profile name mapped to a concrete model or provider control, such as a Realtime truncation mode; absence does not mean there is no budget or rule.
        ja: Realtime の truncation モードなど、具体的なモデルまたはプロバイダー制御に対応するプロファイル名を記録します。欠けていても予算または規則がないことを意味しません。
      allowed_values: []
      pattern: null
      example_value: realtime-retain-80
      source_claims: [claim-context-specification-config-apis]
  constraints:
    - id: context-specification-resolved-components
      severity: error
      expression_language: plain
      expression: Every budget_ref must resolve to exactly one ContextBudget whose parent specification is this revision, and every rule_refs member must resolve to a ContextRule under the same ContextSpecification revision before the specification is activated for a call.
      explanation:
        zh: 规约只组合已明确归属的预算和规则；不能把相邻项目、默认值或未来版本隐式混入。
        en: A specification composes only explicitly owned budgets and rules; adjacent projects, defaults, or future revisions cannot be mixed in implicitly.
        ja: 仕様は明示的に所属する予算と規則だけを組み合わせ、近接プロジェクト、既定値、将来改訂を暗黙に混入させてはなりません。
      source_claims: [claim-context-specification-versioning]
    - id: context-specification-declarative-boundary
      severity: error
      expression_language: plain
      expression: ContextSpecification must not assert input_artifact_refs, result_package_ref, actual_token_count, or model-response facts; those require a separate ContextAssembly, ContextPackage, ContextWindow, or invocation audit record.
      explanation:
        zh: 政策记录不能替代执行审计；声明预算和规则不证明其已被某次调用使用。
        en: A policy record cannot replace an execution audit; declaring a budget and rules does not prove that a particular call used them.
        ja: 方針レコードは実行監査を置き換えられません。予算と規則の宣言は、特定の呼び出しがそれらを使用した証明ではありません。
      source_claims: [claim-context-specification-config-apis]
  required_relations: []
examples:
  - id: context-specification-example-positive-versioned-policy

    labels: {zh: 支持对话的版本化政策, en: Versioned support-chat policy, ja: サポート対話の版管理済み方針}

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      specification_id: ctx-spec-support-chat
      revision: v5
      applicability_scope: support-chat
      budget_ref: ctx-budget-support-8k-v3
      rule_refs: [ctx-rule-system-first-v2, ctx-rule-history-summary-v4]
      provider_profile: realtime-retain-80
    related_node_ids: [ContextSpecification, ContextBudget, ContextRule]
    related_relation_ids: []

    source_claims: [claim-context-specification-config-apis, claim-context-specification-versioning]
  - id: context-specification-example-counterexample-runtime-package

    labels: {zh: 实际消息包不是规约, en: Actual message package is not a specification, ja: 実際のメッセージパッケージは仕様ではない}

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      call_id: call-104
      actual_token_count: 7316
      message_count: 12
    related_node_ids: [ContextSpecification, ContextPackage, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-context-specification-config-apis]
  - id: context-specification-example-boundary-provider-fragment

    labels: {zh: 单一提供商参数片段, en: Single provider-parameter fragment, ja: 単一プロバイダー引数片}

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      truncation_type: retention_ratio
      retention_ratio: 0.8
      specification_id: null
    related_node_ids: [ContextSpecification]
    related_relation_ids: []

    source_claims: [claim-context-specification-config-apis]
  - id: context-specification-example-instance-support-chat-v5

    labels: {zh: "实例：支持会话 v5 规约", en: "Instance: support-chat specification v5", ja: "インスタンス：サポート対話仕様 v5"}

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      specification_id: ctx-spec-support-chat
      revision: v5
      applicability_scope: support-chat
      budget_ref: ctx-budget-support-8k-v3
      rule_refs: [ctx-rule-system-first-v2, ctx-rule-history-summary-v4]
      provider_profile: realtime-retain-80
    related_node_ids: [ContextSpecification, ContextBudget, ContextRule]
    related_relation_ids: []

    source_claims: [claim-context-specification-versioning]
parent_relation: null
relations: []
sources:
  - id: langchain-built-in-middleware
    title: LangChain built-in middleware
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langchain/middleware/built-in
    relevance: Documents configuration of SummarizationMiddleware with model, trigger, and retained messages.
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents session truncation modes, disabled overflow behavior, and retention-ratio truncation.
  - id: langchain-context-concepts
    title: LangChain context concepts
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/concepts/context
    relevance: Distinguishes runtime context, conversation history, intermediate results, tools, and cross-conversation store.
source_claims:
  - id: claim-context-specification-config-apis
    source: langchain-built-in-middleware
    supports: LangChain documents SummarizationMiddleware configuration with a model, token trigger, and retained message count, and documents that it compresses text rather than multimodal payloads. OpenAI Realtime documents configurable automatic, disabled, and retention-ratio conversation truncation. Moonweave models a versioned policy record around such controls rather than equating a configuration with a completed assembly.
    locator: "SummarizationMiddleware configuration; Realtime truncation configuration"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-specification-versioning
    source: langchain-context-concepts
    supports: LangChain describes context as runtime information including conversation history, intermediate results, and tool information, while long-term memory is cross-conversation storage. Moonweave infers that a reusable specification should reference bounded budget and rule records and remain distinct from runtime artifacts and persistent memory.
    locator: "Context overview: runtime context and cross-conversation store"
    evidence_kind: ontology-design-inference
    confidence: high