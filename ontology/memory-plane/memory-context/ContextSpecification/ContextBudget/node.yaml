schema: moonweave.ai/ontology-node/v1
id: ContextBudget
kind: concept
status: accepted
labels:
  zh: 上下文预算
  en: Context Budget
  ja: コンテキスト予算
semantics:
  short_definition:
    zh: 规约中为模型可见输入、输出预留和来源配额声明的版本化容量政策。
    en: A versioned capacity policy in a specification that declares model-visible input, output reserve, and source allocations.
    ja: 仕様内でモデル可視入力、出力予約、情報源配分を宣言する版管理済み容量方針。
  definition:
    zh: ContextBudget 是 ContextSpecification 的数量组成部分：它声明在一个适用范围内可用于可见输入的上限、输出预留、计量方法及可选来源配额。它不是提供商实际 ContextWindow、一次调用已消耗的 token、ContextPackage 中的工件列表，也不决定哪个候选应被选择、如何排序或是否生成 Summary。
    en: "ContextBudget is the quantitative component of a ContextSpecification: it declares the visible-input ceiling, output reserve, counting method, and optional source allocations for an applicability scope. It is not the provider's actual ContextWindow, tokens already consumed by one call, the artifact list in a ContextPackage, or a decision about which candidate to select, how to order it, or whether to generate a Summary."
    ja: ContextBudget は ContextSpecification の数量的構成要素であり、適用範囲の可視入力上限、出力予約、計数方式、任意の情報源配分を宣言します。プロバイダーの実際の ContextWindow、一呼び出しで既に消費した token、ContextPackage 内の工件列、候補の選択・順序付け・Summary 生成の決定ではありません。
  why_needed:
    zh: 模型窗口有限，且系统指令、对话历史、检索证据和工具结果会争用同一调用容量。显式预算使装配器能在提交前计算溢出、保留输出空间，并把容量政策与实际选择和裁剪活动区分开来。
    en: Model windows are finite, and system instructions, conversation history, retrieval evidence, and tool results compete for one call's capacity. An explicit budget lets an assembler calculate overflow before submission, reserve output space, and keep capacity policy distinct from actual selection and trimming activity.
    ja: モデルのウィンドウは有限であり、システム指示、会話履歴、検索根拠、ツール結果が一回の呼び出し容量を競合します。明示的な予算により、組立器は送信前に溢れを計算し、出力空間を予約し、容量方針を実際の選択・裁断活動と区別できます。
  includes:
    - zh: 输入预算、输出 token 预留、与提供商容量档案的引用、token 计量方法，以及可选的按来源角色配额。
      en: An input budget, output-token reserve, reference to a provider-capacity profile, token-counting method, and optional quotas by source role.
      ja: 入力予算、出力 token 予約、プロバイダー容量プロファイルへの参照、token 計数方式、任意の情報源役割別割当。
  excludes:
    - zh: 提供商报告的实际窗口、一次运行的实际 token 使用量、排序或选择策略、未引用的默认模型限制，以及源内容删除。
      en: A provider-reported actual window, one run's actual token usage, ordering or selection strategy, an unreferenced default model limit, or deletion of source content.
      ja: プロバイダー報告の実際のウィンドウ、一実行の実際の token 使用量、順序付け・選択戦略、参照されない既定モデル上限、情報源内容の削除。
  semantic_kind: entity
  aliases:
    - token budget
    - context capacity policy
    - token 配额
engineering:
  explanation:
    zh: 预算在装配前被读取，并通过所声明的计量方法核对候选消息。LangGraph 的 trim_messages 接收 token_counter 和 max_tokens，返回适合提交的消息序列；OpenAI Realtime 则记录输入超限时的截断配置。它们说明了真实系统需要预算或溢出政策，但 Moonweave 不把任一框架参数误称为通用的实际窗口或已发生裁剪。
    en: A budget is read before assembly and checks candidate messages with its declared counting method. LangGraph trim_messages accepts token_counter and max_tokens and returns a message sequence suitable for submission; OpenAI Realtime records truncation configuration when conversation input exceeds limits. They show that real systems need budget or overflow policy, but Moonweave does not mistake either framework parameter for a universal actual window or a trim that has already occurred.
    ja: 予算は組立前に読まれ、宣言した計数方式で候補メッセージを検査します。LangGraph の trim_messages は token_counter と max_tokens を受け取り、送信用のメッセージ列を返します。OpenAI Realtime は会話入力が上限を超える場合の切詰め構成を記録します。これらは実システムに予算または溢れ方針が必要であることを示しますが、Moonweave はどちらのフレームワーク引数も汎用の実際のウィンドウや既に起きた裁断とは見なしません。
  typical_input:
    - description: LangGraph token-bounded message trimming call
      format: |
        from langchain_core.messages.utils import count_tokens_approximately, trim_messages

        visible_messages = trim_messages(
          state["messages"],
          strategy="last",
          token_counter=count_tokens_approximately,
          max_tokens=128,
          start_on="human",
          end_on=("human", "tool"),
        )
    - description: OpenAI Realtime overflow policy input
      format: |
        {
          "type": "session.update",
          "session": {"truncation": {"type": "auto"}}
        }
  typical_output:
    - description: Budget check before a Moonweave assembly
      format: |
        {
          "budget_id": "ctx-budget-support-8k",
          "revision": "v3",
          "input_budget_tokens": 7168,
          "output_reserve_tokens": 1024,
          "counting_method": "provider-tokenizer-v1",
          "fits_budget": true
        }
  reference_implementations:
    - name: LangGraph memory management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents trim_messages strategy, token counter, maximum-token parameter, and message-boundary controls before model invocation.
    - name: OpenAI Realtime API
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents automatic or disabled truncation when input exceeds model limits and a retention-ratio option.
structure:
  identity_keys: [budget_id, revision]
  fields:
    - id: budget_id
      labels: {zh: 预算标识, en: budget ID, ja: 予算 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个容量政策系列，不复用为窗口、装配或包标识。
        en: Stably identifies a capacity-policy series and is not reused as a window, assembly, or package ID.
        ja: 容量方針系列を安定して識別し、ウィンドウ、組立、パッケージ ID として再利用しません。
      allowed_values: []
      pattern: "^ctx-budget-[A-Za-z0-9._-]+$"
      example_value: ctx-budget-support-8k
      source_claims: [claim-context-budget-langgraph-trim-api]
    - id: revision
      labels: {zh: 预算修订, en: budget revision, ja: 予算改訂}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分不可变的预算版本，以便在事后解释一个装配适用的上限和预留。
        en: Distinguishes immutable budget versions so the ceiling and reserve applicable to an assembly can be explained later.
        ja: 組立に適用された上限と予約を後から説明できるよう、不変の予算版を区別します。
      allowed_values: []
      pattern: "^v[0-9]+(?:[._-][A-Za-z0-9]+)*$"
      example_value: v3
      source_claims: [claim-context-budget-design-boundary]
    - id: input_budget_tokens
      labels: {zh: 可见输入预算 token, en: visible-input budget tokens, ja: 可視入力予算 token}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 该政策允许计入模型可见输入的最大 token 数；它不是提供商完整窗口或当前使用量。
        en: Maximum tokens that this policy permits to count toward model-visible input; it is not the provider's full window or current usage.
        ja: この方針がモデル可視入力へ計上することを許す最大 token 数であり、プロバイダーの完全なウィンドウや現在使用量ではありません。
      allowed_values: []
      pattern: null
      example_value: 7168
      source_claims: [claim-context-budget-langgraph-trim-api]
    - id: output_reserve_tokens
      labels: {zh: 输出预留 token, en: output reserve tokens, ja: 出力予約 token}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在准入可见输入前保留给生成输出的 token 数；它不能作为输入工件或历史内容被消耗。
        en: Number of tokens held for generated output before visible input is admitted; it cannot be spent as input artifacts or history.
        ja: 可視入力を受け入れる前に生成出力のため保持する token 数であり、入力工件または履歴として消費できません。
      allowed_values: []
      pattern: null
      example_value: 1024
      source_claims: [claim-context-budget-openai-overflow]
    - id: capacity_profile_ref
      labels: {zh: 容量档案引用, en: capacity profile reference, ja: 容量プロファイル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向定义模型或提供商容量限制及单位的档案；不把未记录的默认限制默认为已验证容量。
        en: Points to a profile defining model or provider capacity limits and units; an unrecorded default limit is not assumed to be verified capacity.
        ja: モデルまたはプロバイダーの容量上限と単位を定義するプロファイルを指し、記録されない既定上限を検証済み容量と仮定しません。
      allowed_values: []
      pattern: "^ctx-capacity-[A-Za-z0-9._-]+$"
      example_value: ctx-capacity-realtime-32k
      source_claims: [claim-context-budget-openai-overflow]
    - id: counting_method
      labels: {zh: 计量方法, en: counting method, ja: 計数方式}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识用于将工件计入预算的方法，例如提供商 tokenizer 或明确标记的近似计数器；不同方法的数值不可静默比较。
        en: Identifies the method used to charge artifacts to the budget, such as a provider tokenizer or an explicitly marked approximate counter; values from different methods cannot be silently compared.
        ja: プロバイダー tokenizer や明示的に近似と印付けされたカウンターなど、工件を予算に計上する方法を識別します。異なる方式の値を暗黙に比較できません。
      allowed_values: []
      pattern: null
      example_value: provider-tokenizer-v1
      source_claims: [claim-context-budget-langgraph-trim-api]
    - id: allocation_by_source_role
      labels: {zh: 按来源角色配额, en: allocation by source role, ja: 情報源役割別配分}
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 可选地为指令、历史、检索或工具来源角色声明额度；它是政策上限而非已使用量或排序结果。
        en: Optionally declares caps for instruction, history, retrieval, or tool source roles; it is a policy ceiling rather than usage or ordering result.
        ja: 任意で指示、履歴、検索、ツールの情報源役割に上限を宣言します。使用量や順序結果ではなく方針上限です。
      allowed_values: []
      pattern: null
      example_value: {instructions: 800, history: 2200, retrieval: 3000, tools: 1168}
      source_claims: [claim-context-budget-design-boundary]
  constraints:
    - id: context-budget-capacity-consistency
      severity: error
      expression_language: plain
      expression: input_budget_tokens and output_reserve_tokens must use the unit and counting assumptions declared by capacity_profile_ref, and their combined reservation must not exceed the corresponding provider capacity. If the provider capacity is unknown, this budget cannot certify that an assembly fits.
      explanation:
        zh: 预算不是脱离模型容量的任意数字；单位或容量未知时只能声明政策，不能证明一次调用适配窗口。
        en: A budget is not an arbitrary number detached from model capacity; when units or capacity are unknown it can state policy but cannot prove that a call fits a window.
        ja: 予算はモデル容量から切り離された任意の数値ではありません。単位または容量が不明な場合、方針は述べられても呼び出しがウィンドウに収まるとは証明できません。
      source_claims: [claim-context-budget-openai-overflow]
    - id: context-budget-allocation-consistency
      severity: error
      expression_language: plain
      expression: When allocation_by_source_role is present, every allocation is non-negative and the sum of fixed allocations must not exceed input_budget_tokens. Actual observed usage must be recorded separately from this policy object.
      explanation:
        zh: 配额必须可加且不超过输入预算；观察到的 token 使用量属于活动或窗口审计，而不是预算声明。
        en: Quotas must be additive and not exceed the input budget; observed token use belongs in activity or window audit rather than the budget declaration.
        ja: 割当は加算可能で入力予算を超えてはならず、観測された token 使用量は予算宣言ではなく活動またはウィンドウ監査に属します。
      source_claims: [claim-context-budget-design-boundary]
  required_relations: []
examples:
  - id: context-budget-example-positive-reserved-support-budget

    labels: {zh: 预留输出的支持预算, en: Support budget with output reserve, ja: 出力予約付きサポート予算}

    descriptions:
      zh: Claude 200K token window 分配 input/output reserve；Lost in the Middle 启示：高 priority 内容占首尾 token slot；MemGPT main_context token 上限触发 archival overflow。
      en: Claude 200K token window allocates input/output reserve; Lost in the Middle: high-priority content in head/tail token slots; MemGPT main_context token limit triggers archival overflow.
      ja: Claude 200K input/output reserve。Lost in the Middle 首尾 slot。MemGPT main_context overflow→archival。
    field_values:
      budget_id: ctx-budget-support-8k
      revision: v3
      input_budget_tokens: 7168
      output_reserve_tokens: 1024
      capacity_profile_ref: ctx-capacity-realtime-32k
      counting_method: provider-tokenizer-v1
      allocation_by_source_role: {instructions: 800, history: 2200, retrieval: 3000, tools: 1168}
    related_node_ids: [ContextBudget, ContextSpecification, ContextWindow]
    related_relation_ids: [ContextBudget-part-of-ContextSpecification]

    source_claims: [claim-context-budget-langgraph-trim-api, claim-context-budget-openai-overflow]
  - id: context-budget-example-counterexample-no-output-space

    labels: {zh: 没有输出空间的满额输入, en: Full input with no output space, ja: 出力空間のない満杯入力}

    descriptions:
      zh: 反例：ContextBudget max_tokens=200000 但无 output_reserve 导致 generation 截断。
      en: Counterexample: ContextBudget max_tokens=200000 without output_reserve causing generation truncation.
      ja: 反例：max_tokens=200000 だが output_reserve なし generation 截断。
    field_values:
      budget_id: ctx-budget-invalid-full-input
      revision: v1
      input_budget_tokens: 8192
      output_reserve_tokens: 1024
      capacity_profile_ref: ctx-capacity-8192-total
      counting_method: provider-tokenizer-v1
    related_node_ids: [ContextBudget, ContextWindow]
    related_relation_ids: []

    source_claims: [claim-context-budget-openai-overflow]
  - id: context-budget-example-boundary-actual-token-observation

    labels: {zh: 已观测 token 使用量, en: Observed token usage, ja: 観測済み token 使用量}

    descriptions:
      zh: ContextBudget 计划分配 vs VisibleContextWindow 实际投影；Anthropic prompt caching 缓存 token 不计入 mutable budget。
      en: ContextBudget planned allocation vs VisibleContextWindow actual projection; Anthropic prompt caching cached tokens excluded from mutable budget.
      ja: ContextBudget 計画 vs VisibleContextWindow 実投影。prompt caching token は mutable budget 外。
    field_values:
      call_id: call-129
      visible_input_tokens: 6940
      output_tokens: 287
      budget_id: null
    related_node_ids: [ContextBudget, ContextWindow, ContextAssembly]
    related_relation_ids: []

    source_claims: [claim-context-budget-design-boundary]
  - id: context-budget-example-instance-support-8k-v3

    labels: {zh: "实例：支持 8K 预算 v3", en: "Instance: support 8K budget v3", ja: "インスタンス：サポート 8K 予算 v3"}

    descriptions:
      zh: Cursor context 裁剪：max_context_tokens=128k 保留最近文件引用 + 摘要中间历史；Claude API max_tokens=4096 output reserve。
      en: Cursor context trim: max_context_tokens=128k keeps recent file refs + summarized middle history; Claude API max_tokens=4096 output reserve.
      ja: Cursor max_context_tokens=128k trim。Claude max_tokens=4096 output reserve。
    field_values:
      budget_id: ctx-budget-support-8k
      revision: v3
      input_budget_tokens: 7168
      output_reserve_tokens: 1024
      capacity_profile_ref: ctx-capacity-realtime-32k
      counting_method: provider-tokenizer-v1
      allocation_by_source_role: {instructions: 800, history: 2200, retrieval: 3000, tools: 1168}
    related_node_ids: [ContextBudget, ContextSpecification]
    related_relation_ids: [ContextBudget-part-of-ContextSpecification]

    source_claims: [claim-context-budget-design-boundary]
parent_relation:
  id: ContextBudget-part-of-ContextSpecification
  predicate: part_of
  target: concept:ContextSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是上下文规约的预算组成部分
    en: is a budget component of context specification
    ja: コンテキスト仕様の予算構成要素である
  definitions:
    zh: ContextBudget —part_of→ ContextSpecification 表示预算版本被该规约作为其数量容量政策组件引用；它不表示一次运行已消费预算。
    en: ContextBudget —part_of→ ContextSpecification means the budget revision is referenced by that specification as its quantitative capacity-policy component; it does not mean that one run consumed the budget.
    ja: ContextBudget —part_of→ ContextSpecification は、予算改訂がその仕様に数量的容量方針コンポーネントとして参照されることを表し、一実行が予算を消費したことを表しません。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_budget_component
    labels: {zh: 具有预算组成部分, en: has budget component, ja: 予算構成要素を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-context-budget-part-of-specification]
  distinct_fact_rationale:
    zh: 此关系仅陈述规约包含的数量政策，不陈述实际窗口容量、已计量 token、运行消费或来源工件包含。
    en: This relation states only the quantitative policy contained by a specification, not actual window capacity, metered tokens, run consumption, or source-artifact inclusion.
    ja: この関係は仕様に含まれる数量方針だけを表し、実際のウィンドウ容量、計上 token、実行消費、情報源工件の包含を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents trim_messages with token counters, maximum tokens, and message-boundary controls before model invocation.
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents input-limit overflow behavior, automatic or disabled truncation, and retention-ratio truncation.
  - id: lost-in-the-middle
    title: "Lost in the Middle: How Language Models Use Long Contexts"
    source_type: academic-paper
    url: https://arxiv.org/abs/2307.03172
    relevance: Reports positional effects for information in long contexts and motivates explicit, auditable capacity allocation.
source_claims:
  - id: claim-context-budget-langgraph-trim-api
    source: langgraph-memory
    supports: LangGraph documents trim_messages with strategy, token_counter, max_tokens, and message-boundary parameters before model invocation. Moonweave uses this as evidence that token-bounded admission needs an explicit counting and limit policy, while keeping the policy distinct from an individual trim activity.
    locator: "Memory guide: trim_messages arguments and invocation example"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-budget-openai-overflow
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents input overflow handling by dropping oldest messages in automatic mode, errors when truncation is disabled, and retention-ratio truncation. It supports recording provider capacity and overflow assumptions separately from actual source deletion.
    locator: "Realtime truncation configuration and oldest-message exclusion"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-budget-design-boundary
    source: lost-in-the-middle
    supports: Research reports that information position can affect long-context use. Moonweave infers that capacity allocation should be a separately versioned policy rather than an implicit claim that a selected item was attended to or that an actual window was consumed.
    locator: "Abstract and long-context retrieval results"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-context-budget-part-of-specification
    source: langgraph-memory
    supports: LangGraph exposes token-bound settings as part of pre-invocation context-management configuration. Moonweave models a budget as a composition component of one ContextSpecification, not as a subtype of a provider ContextWindow or a completed assembly.
    locator: "Memory guide: trim_messages configuration"
    evidence_kind: ontology-design-inference
    confidence: high
