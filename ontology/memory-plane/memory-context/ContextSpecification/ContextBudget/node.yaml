schema: moonweave.ai/ontology-node/v1
id: ContextBudget
kind: concept
status: accepted
labels:
  zh: 上下文预算
  en: context budget
  ja: コンテキスト予算
semantics:
  short_definition:
    zh: 一次上下文组装可消耗的容量约束，通常以令牌、字节、项目数、延迟或成本上限表示。
    en: A capacity constraint consumable by one context assembly, typically expressed as token, byte, item-count, latency, or cost limits.
    ja: 一回のコンテキスト組立が消費できる容量制約で、通常はトークン、バイト、項目数、遅延、費用上限で表します。
  definition:
    zh: 上下文预算是一种容量约束；其种差是：它限定一次 ContextAssembly 或一个目标 ContextWindow 可消耗的资源总量，并声明计量单位、上限与可选的预留量。它不表达“条件成立时应采取何种选择”的规范行为，因此不是 ContextRule；规则可以读取预算并据此决策。
    en: A context budget is a capacity constraint. Its differentia is that it limits the total resources consumable by one ContextAssembly or target ContextWindow and declares a unit, ceiling, and optional reservation. It does not specify normative condition-to-action behavior and is therefore not a ContextRule; rules may read the budget when deciding.
    ja: コンテキスト予算は容量制約の一種です。種差は、一回の ContextAssembly または対象 ContextWindow が消費できる総資源を制限し、単位・上限・任意の予約量を宣言することです。条件から行動への規範動作を表さないため ContextRule ではなく、規則が判断時に予算を参照します。
  why_needed:
    zh: 把容量约束独立出来，系统才能区分“最多能放多少”与“在给定容量内优先放什么”，并审计预算消耗和溢出。
    en: Separating capacity makes it possible to distinguish “how much can fit” from “what should be preferred within that capacity” and to audit consumption and overflow.
    ja: 容量を独立させることで、「どれだけ入るか」と「その容量内で何を優先するか」を区別し、消費量と超過を監査できます。
  includes:
    - zh: 纳入“最大 32,000 输入令牌，其中预留 2,000 给系统指令”这类具有单位、上限和适用组装的约束。
      en: Includes constraints such as “at most 32,000 input tokens, with 2,000 reserved for system instructions,” carrying a unit, ceiling, and applicable assembly.
      ja: 「入力最大 32,000 トークン、うち 2,000 をシステム指示用に予約」のように単位・上限・適用組立を持つ制約を含みます。
  excludes:
    - zh: 排除“系统消息先于用户消息”和“低信任来源不得进入窗口”这类 ContextRule；它们规定行为，而不是计量容量。
      en: Excludes ContextRules such as “system messages precede user messages” or “low-trust sources may not enter the window”; they prescribe behavior rather than measure capacity.
      ja: 「システムメッセージをユーザーメッセージより先に置く」「低信頼出典は窓へ入れない」のような ContextRule は、容量計量ではなく動作を規定するため除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - context_budget_id
    - revision
  fields:
    - id: context_budget_id
      labels:
        zh: 上下文预算标识
        en: context-budget ID
        ja: context-budget ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识可被多次 ContextAssembly 引用的预算规范；它不采用某次运行的 activity_id。
        en: Stably identifies a budget specification reusable by multiple ContextAssemblies; it does not use any one run's activity ID.
        ja: 複数 ContextAssembly が再利用できる budget specification を安定識別し、一 run の activity ID は使いません。
      allowed_values: []
      pattern: null
      example_value: context-budget-standard-32k
      source_claims:
        - claim-context-budget-003
    - id: revision
      labels:
        zh: 修订号
        en: revision
        ja: revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识容量上限、预留或溢出动作的不可变修订；运行引用该值以重放当时适用的规范。
        en: Identifies an immutable revision of limits, reservations, and overflow action so a run can replay the specification that applied at the time.
        ja: limit・reservation・overflow action の immutable revision を識別し run が当時の specification を再現できるようにします。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-context-budget-004
    - id: capacity_unit
      labels:
        zh: 容量单位
        en: capacity unit
        ja: capacity unit
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明上限和预留量共同使用的可加计量单位，例如 token、byte 或 item；不同单位不得直接相减。
        en: Declares the additive measurement unit shared by the ceiling and reservation, such as token, byte, or item; quantities in different units cannot be subtracted directly.
        ja: ceiling と reservation が共有する token・byte・item などの additive measurement unit を宣言し、異なる unit を直接減算しません。
      allowed_values: []
      pattern: null
      example_value: token
      source_claims:
        - claim-context-budget-005
    - id: capacity_limit
      labels:
        zh: 容量上限
        en: capacity limit
        ja: capacity limit
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定按 capacity_unit 计算的一次组装最大总容量，必须为有限正数。
        en: Sets the maximum total capacity for one assembly measured in capacity_unit and must be a finite positive number.
        ja: capacity_unit で測る一 assembly の maximum total capacity を定め、finite positive number でなければなりません。
      allowed_values: []
      pattern: null
      example_value: 32000
      source_claims:
        - claim-context-budget-006
    - id: reserved_capacity
      labels:
        zh: 预留容量
        en: reserved capacity
        ja: reserved capacity
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从总上限中预留给系统指令、工具定义或输出空间的同单位容量，必须介于零与容量上限之间。
        en: Reserves capacity, in the same unit, for system instructions, tool definitions, or output headroom and must lie between zero and the capacity limit.
        ja: system instruction・tool definition・output headroom 用に同一 unit の capacity を予約し、zero と capacity limit の間でなければなりません。
      allowed_values: []
      pattern: null
      example_value: 12000
      source_claims:
        - claim-context-budget-007
    - id: overflow_action
      labels:
        zh: 溢出动作
        en: overflow action
        ja: overflow action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定超过可用容量时由组装器触发的策略引用或动作类别，例如拒绝、裁剪、摘要或卸载；具体选择顺序仍由 ContextRule 决定。
        en: Names the policy reference or action class triggered when available capacity is exceeded, such as reject, trim, summarize, or offload; ContextRules still determine selection order.
        ja: available capacity 超過時に reject・trim・summarize・offload などの policy reference/action class を指定し、selection order は ContextRule が決めます。
      allowed_values: []
      pattern: null
      example_value: summarize_then_trim
      source_claims:
        - claim-context-budget-008
  constraints:
    - id: context-budget-positive-limit
      severity: error
      expression_language: plain
      expression: capacity_limit > 0
      explanations:
        zh: 容量上限必须为正数。
        en: The capacity limit must be positive.
        ja: capacity limit は正数でなければなりません。
      source_claims:
        - claim-context-budget-009
    - id: context-budget-reservation-within-limit
      severity: error
      expression_language: plain
      expression: reserved_capacity >= 0 and reserved_capacity <= capacity_limit
      explanations:
        zh: 预留量不得为负，也不得超过总容量上限。
        en: Reserved capacity cannot be negative or exceed the total capacity limit.
        ja: reserved capacity は負数でも total capacity limit 超過でもなりません。
      source_claims:
        - claim-context-budget-010
  required_relation_constraints: []
examples:
  - id: ContextBudget-example-positive-001
    kind: positive
    labels:
      zh: 上下文预算正例
      en: Positive example of context budget
      ja: コンテキスト予算の正例
    scenario_id: null
    descriptions:
      zh: 模型调用 call-88 的 ContextBudget 规定最大输入 32,000 tokens，其中为工具定义预留 4,000、为输出预留 8,000，因此本次组装最多可分配 20,000 tokens 给上下文槽位。
      en: The ContextBudget for model call call-88 caps total input at 32,000 tokens, reserves 4,000 for tool definitions and 8,000 for output, and therefore allocates at most 20,000 tokens to context slots.
      ja: モデル呼出し call-88 の ContextBudget は総入力を32,000 tokensに制限し、ツール定義へ4,000、出力へ8,000を予約するため、コンテキストスロットへ最大20,000 tokensを割り当てます。
    field_values:
      context_budget_id: context-budget-standard-32k
      revision: "3"
      capacity_unit: token
      capacity_limit: 32000
      reserved_capacity: 12000
      overflow_action: summarize_then_trim
      context_specification_id: context-spec-call-88
    related_node_ids:
      - ContextBudget
      - ContextAssembly
    related_relation_ids:
      - context_assembly_uses_budget
    expected_result:
      zh: 预算校验得到可用容量 20,000 tokens，组装活动据此裁剪；预算对象本身不决定哪些候选更相关。
      en: Budget validation yields 20,000 available tokens and assembly trims against that capacity; the budget itself does not decide candidate relevance.
      ja: 予算検証は利用可能容量20,000 tokensを算出し、組立はそれに従って裁断します。予算自体は候補関連度を決めません。
    why_valid_or_invalid:
      zh: 该记录是带单位、上限和预留量的容量约束；它约束一次组装但不是选择或排序规则。
      en: The record is a capacity constraint with units, a ceiling, and reservations; it constrains one assembly but is neither a selection nor an ordering rule.
      ja: この記録は単位・上限・予約量を持つ容量制約です。一回の組立を制約しますが、選択規則や順序規則ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-budget-011
      - claim-context-budget-012
  - id: ContextBudget-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文预算边界例
      en: Boundary case for context budget
      ja: コンテキスト予算の境界例
    scenario_id: null
    descriptions:
      zh: ContextOrderingRule rule-recency 规定同权威证据按新鲜度排序，却没有容量单位、上限或预留量；即使它在预算压力下改变顺序，也不是 ContextBudget。
      en: ContextOrderingRule rule-recency orders equally authoritative evidence by freshness but has no capacity unit, ceiling, or reservation. Responding to budget pressure does not make it a ContextBudget.
      ja: ContextOrderingRule rule-recency は同等権威の証拠を新鮮度順にしますが、容量単位・上限・予約量を持ちません。予算圧へ応答しても ContextBudget ではありません。
    field_values:
      candidate_kind: ContextOrderingRule
      comparison_keys:
        - source_authority
        - freshness
      missing_budget_fields:
        - capacity_unit
        - capacity_limit
        - reserved_capacity
    related_node_ids:
      - ContextBudget
      - ContextAssembly
      - ContextOrderingRule
    related_relation_ids:
      - context_assembly_uses_budget
    expected_result:
      zh: 验证器将 rule-recency 保持为 ContextOrderingRule；只有声明容量单位与数量边界的对象才进入 ContextBudget。
      en: Validation keeps rule-recency as ContextOrderingRule; only an object declaring a capacity unit and quantitative bounds qualifies as ContextBudget.
      ja: 検証器は rule-recency を ContextOrderingRule として保持し、容量単位と数量境界を宣言する対象だけを ContextBudget とします。
    why_valid_or_invalid:
      zh: 排序准则回答“先放谁”，预算回答“总共能放多少”；两者会协同，但身份和可验证字段不同。
      en: An ordering rule answers “which item first,” whereas a budget answers “how much in total.” They interact, but their identities and verifiable fields differ.
      ja: 順序規則は「誰を先に置くか」、予算は「合計どれだけ置けるか」に答えます。両者は協調しますが同一性と検証項目が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-budget-013
      - claim-context-budget-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ContextBudget-is_a-ContextSpecification
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文规范
    en: is a context specification
    ja: コンテキスト仕様の一種である
  definitions:
    zh: 每个 ContextBudget 都是 ContextSpecification；其种差是用同一计量单位声明容量上限、预留量和溢出动作，从而约束多次组装可采用的容量边界，但不包含条件—效力规则。
    en: Every ContextBudget is a ContextSpecification distinguished by declaring a capacity ceiling, reservation, and overflow action in one measurement unit, making the capacity boundary reusable across assemblies without containing condition-to-effect rules.
    ja: すべての ContextBudget は ContextSpecification であり、一 measurement unit の capacity ceiling・reservation・overflow action を宣言して複数 assembly で再利用できる境界を定めますが condition-to-effect rule は含みません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: taxonomic inheritance には instance-relation cardinality を用いません。
  inverse_reading:
    predicate: has_context_budget_subtype
    labels:
      zh: 具有上下文预算下位类
      en: has context-budget subtype
      ja: context-budget subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContextBudget-is_a-ContextSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 预算归入规范正例
        en: context-budget hierarchy positive case
        ja: context-budget hierarchy 正例
      scenario_id: null
      descriptions:
        zh: context-budget-standard-32k/revision 3 具有稳定规范身份，声明 token 单位、32,000 上限、12,000 预留和 summarize_then_trim 溢出动作，可被多个组装运行引用。
        en: context-budget-standard-32k revision 3 has stable specification identity and declares token unit, a 32,000 ceiling, 12,000 reservation, and summarize_then_trim overflow action for reuse by multiple assemblies.
        ja: context-budget-standard-32k revision 3 は stable specification identity と token unit・32000 ceiling・12000 reservation・summarize_then_trim overflow action を持ち複数 assembly が再利用できます。
      field_values:
        context_budget_id: context-budget-standard-32k
        revision: "3"
        capacity_unit: token
        capacity_limit: 32000
        reserved_capacity: 12000
        overflow_action: summarize_then_trim
      related_node_ids:
        - ContextBudget
        - ContextSpecification
      related_relation_ids:
        - ContextBudget-is_a-ContextSpecification
      expected_result:
        zh: 沿 ContextBudget→ContextSpecification 返回容量规范祖先链，运行采用事实另由 context_assembly_uses_budget 表达。
        en: Return the ContextBudget→ContextSpecification ancestry while expressing runtime adoption separately through context_assembly_uses_budget.
        ja: ContextBudget→ContextSpecification ancestry を返し runtime adoption は context_assembly_uses_budget で別に表します。
      why_valid_or_invalid:
        zh: 对象可独立标识与修订，并声明可复用的量化容量边界，满足规范上位类；它没有条件—效力映射，因而不误归为规则。
        en: The object is independently identified and revised and declares a reusable quantitative capacity boundary, satisfying the specification genus without being misclassified as a rule because it has no condition-to-effect mapping.
        ja: object は independently identified/revised で reusable quantitative capacity boundary を宣言し specification genus を満たしますが condition-to-effect mapping がないため rule にはしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-budget-015
    - id: ContextBudget-is_a-ContextSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 单次容量消耗不是预算规范边界例
        en: one assembly's capacity consumption is not a budget specification
        ja: 一 assembly の capacity consumption は budget specification ではない境界例
      scenario_id: null
      descriptions:
        zh: assembly-88 实际使用 19,420 tokens 并裁剪两个槽位；该运行测量没有稳定 budget ID、revision、容量上限或溢出动作，不能分类为 ContextBudget。
        en: assembly-88 actually consumed 19,420 tokens and trimmed two slots. This run measurement has no stable budget ID, revision, capacity ceiling, or overflow action and cannot be classified as ContextBudget.
        ja: assembly-88 は実際に 19420 tokens を消費し two slots を trim しましたが stable budget ID・revision・capacity ceiling・overflow action がなく ContextBudget には分類できません。
      field_values:
        activity_id: assembly-88
        observed_token_usage: 19420
        trimmed_slot_count: 2
        context_budget_id: null
        revision: null
      related_node_ids:
        - ContextBudget
        - ContextSpecification
        - ContextAssembly
      related_relation_ids:
        - ContextBudget-is_a-ContextSpecification
        - context_assembly_uses_budget
      expected_result:
        zh: 把该值保留为组装执行度量，不创建 ContextBudget 实例。
        en: Keep the value as an assembly execution measurement and do not create a ContextBudget instance.
        ja: 値を assembly execution measurement として保持し ContextBudget instance を作成しません。
      why_valid_or_invalid:
        zh: 实际消耗是某次活动的观测事实，预算是可复用、可版本化的事前规范；两者在时间、身份和字段上均不同。
        en: Actual consumption is an observation about one activity, whereas a budget is a reusable, versioned prior specification; they differ in time, identity, and fields.
        ja: actual consumption は一 activity の observation で budget は reusable/versioned prior specification のため time・identity・fields が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-budget-016
  source_claims:
    - claim-context-budget-017
    - claim-context-budget-018
  distinct_fact_rationale:
    zh: 该边只表达预算属于规范的分类事实；某次组装采用预算由 context_assembly_uses_budget 独立表达。
    en: This edge states only that a budget is a specification; context_assembly_uses_budget separately records adoption by a particular assembly.
    ja: この edge は budget が specification である分類だけを表し、一 assembly の adoption は context_assembly_uses_budget が別に記録します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
