schema: moonweave.ai/ontology-node/v1
id: ContextBudget
kind: concept
labels:
  zh: 上下文预算
  en: Context budget
  ja: コンテキスト予算
semantics:
  short_definition:
    zh: 声明一次组装可消耗 token 容量与溢出策略的规范。
    en: Specification declaring token capacity and overflow policy consumable by one assembly.
    ja: 一 assembly が消費可能な token capacity/overflow policy を宣言する specification。
  definition:
    zh: ContextBudget 是一种 ContextSpecification；其种差是用同一计量单位（通常 token）声明 capacity_limit、reserved_capacity（system/tool/output 预留）、auto_compact_threshold_pct（如 95%）与 overflow_action（summarize、tail_drop、reject）。它映射 Anthropic max_tokens、OpenAI max_tokens、Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 与 Context Recycling 固定 L1 budget（~3–12K），不规定“优先放什么”的排序行为。
    en: ContextBudget is a ContextSpecification declaring capacity_limit, reserved_capacity (system/tool/output reservation), auto_compact_threshold_pct (e.g. 95%), and overflow_action (summarize, tail_drop, reject) in one unit (usually tokens). It maps Anthropic max_tokens, OpenAI max_tokens, Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE, and Context Recycling fixed L1 budget (~3–12K)—not ordering preferences.
    ja: ContextBudget は ContextSpecification で capacity_limit/reserved_capacity（system/tool/output 予約）/auto_compact_threshold_pct（95% 等）/overflow_action（summarize/tail_drop/reject）を同一 unit（通常 token）で宣言。Anthropic max_tokens/OpenAI max_tokens/Claude CLAUDE_AUTOCOMPACT_PCT_OVERRIDE/Context Recycling 固定 L1 budget（~3–12K）に写像。ordering preference は規定しない。
  why_needed:
    zh: 容量约束独立后，系统可区分“最多能放多少 token”与“在给定容量内优先放什么”，并审计 95% auto-compact 触发点。
    en: Separating capacity lets systems distinguish maximum token allowance from priority within that allowance and audit 95% auto-compact trigger points.
    ja: capacity 独立で最大 token allowance と allowance 内 priority を区別。95% auto-compact trigger 点を監査可能。
  includes:
    - zh: 纳入具有 capacity_unit、capacity_limit、reserved_capacity 与 overflow_action 的可复用预算规范。
      en: Includes reusable budget specs with capacity_unit, capacity_limit, reserved_capacity, and overflow_action.
      ja: capacity_unit/capacity_limit/reserved_capacity/overflow_action を持つ reusable budget spec。
  excludes:
    - zh: 排除 ContextOrderingRule、一次 assembly 实际 token 消耗观测与 ContextWindow 快照。
      en: Excludes ContextOrderingRule, observed token consumption from one assembly, and ContextWindow snapshots.
      ja: ContextOrderingRule/一 assembly 実 token 消費観測/ContextWindow snapshot を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Claude 200K context window 中 effective window 约 95% 触发 autoCompact（CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 可设为 70 等）；OpenAI max_tokens 限制输出并从输入 budget 预留；Cursor 接近窗口上限 self-summarize；Context Recycling active_context_budget_tokens=12000 固定 L1 workspace。
    en: Claude 200K effective window triggers autoCompact near ~95% (CLAUDE_AUTOCOMPACT_PCT_OVERRIDE can be 70, etc.); OpenAI max_tokens reserves output from input budget; Cursor self-summarizes near window ceiling; Context Recycling active_context_budget_tokens=12000 fixes L1 workspace.
    ja: Claude 200K 実効 window 約 95% で autoCompact（CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=70 等可）。OpenAI max_tokens は output 予約。Cursor は window 上限近く self-summarize。Context Recycling active_context_budget_tokens=12000 で L1 固定。
  typical_input:
    - description: Claude auto-compact threshold override
      format: |
        {
          "env": {"CLAUDE_AUTOCOMPACT_PCT_OVERRIDE": "70"},
          "capacity_limit": 200000,
          "auto_compact_threshold_pct": 70
        }
      source_claims: [claim-context-budget-claude]
    - description: Context Recycling fixed L1 budget
      format: |
        {
          "active_context_budget_tokens": 12000,
          "capacity_limit": 12000,
          "overflow_action": "offload_to_disk"
        }
      source_claims: [claim-context-budget-recycling]
  typical_output:
    - description: Available slot capacity after reservations
      format: |
        {
          "capacity_limit": 128000,
          "reserved_capacity": 20480,
          "available_for_slots": 107520
        }
      source_claims: [claim-context-budget-design]
  reference_implementations:
    - name: Claude Code Context Window
      url: https://code.claude.com/docs/en/context-window
      description: ~95% auto-compact threshold and overrides.
    - name: OpenAI API max_tokens
      url: https://platform.openai.com/docs/api-reference/chat
      description: Output token reservation from context budget.
    - name: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      description: Fixed 3–12K active context budget.
structure:
  identity_keys:
    - context_budget_id
    - revision
  fields:
    - id: context_budget_id
      labels:
        zh: 预算标识
        en: Budget identifier
        ja: budget 識別子
      definitions:
        zh: 稳定标识可被多次 ContextAssembly 引用的预算规范 lineage。
        en: Stably identifies budget specification lineage reusable by multiple assemblies.
        ja: 複数 ContextAssembly が reuse 可能な budget specification lineage を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: context-budget-claude-200k
      allowed_values: []
      source_claims:
        - claim-context-budget-id
    - id: revision
      labels:
        zh: 修订版
        en: Revision
        ja: revision
      definitions:
        zh: 不可变预算修订版，含 limit、reservation、threshold 与 overflow_action。
        en: Immutable budget revision including limit, reservation, threshold, and overflow_action.
        ja: limit/reservation/threshold/overflow_action を含む immutable budget revision。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "3"
      allowed_values: []
      source_claims:
        - claim-context-budget-revision
    - id: capacity_unit
      labels:
        zh: 容量单位
        en: Capacity unit
        ja: capacity unit
      definitions:
        zh: 上限与预留使用的计量单位，通常为 token。
        en: Measurement unit for ceiling and reservation, usually tokens.
        ja: ceiling/reservation の計量 unit。通常 token。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: token
      allowed_values: []
      source_claims:
        - claim-context-budget-unit
    - id: capacity_limit
      labels:
        zh: 容量上限
        en: Capacity limit
        ja: capacity limit
      definitions:
        zh: 一次组装允许的总 token 上限，对应模型 context window 或 effective window。
        en: Total token ceiling for one assembly, mapping model or effective context window.
        ja: 一 assembly 許可 total token ceiling。model/effective context window に対応。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 200000
      allowed_values: []
      source_claims:
        - claim-context-budget-limit
    - id: reserved_capacity
      labels:
        zh: 预留容量
        en: Reserved capacity
        ja: reserved capacity
      definitions:
        zh: 为 system prompt、tool schemas、max_tokens 输出预留的同单位容量。
        en: Same-unit capacity reserved for system prompt, tool schemas, and max_tokens output.
        ja: system prompt/tool schemas/max_tokens output 用 same-unit 予約 capacity。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 20480
      allowed_values: []
      source_claims:
        - claim-context-budget-reserved
    - id: auto_compact_threshold_pct
      labels:
        zh: 自动压缩阈值百分比
        en: Auto-compact threshold percent
        ja: auto-compact threshold percent
      definitions:
        zh: 触发 auto-compact/summarization 的有效窗口使用百分比，文档默认约 95%，可通过 CLAUDE_AUTOCOMPACT_PCT_OVERRIDE 调整。
        en: Effective window usage percent triggering auto-compact/summarization; documented default ~95%, adjustable via CLAUDE_AUTOCOMPACT_PCT_OVERRIDE.
        ja: auto-compact/summarization trigger 実効 window 使用%。文書 default 約 95%。CLAUDE_AUTOCOMPACT_PCT_OVERRIDE で調整可。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 95
      allowed_values: []
      source_claims:
        - claim-context-budget-threshold
    - id: overflow_action
      labels:
        zh: 溢出动作
        en: Overflow action
        ja: overflow action
      definitions:
        zh: 超过可用容量时的策略：summarize_then_trim、tail_drop、reject、offload_to_disk。
        en: Policy when exceeding available capacity summarize_then_trim, tail_drop, reject, offload_to_disk.
        ja: 可用 capacity 超過時 policy。summarize_then_trim/tail_drop/reject/offload_to_disk。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: summarize_then_trim
      allowed_values: []
      source_claims:
        - claim-context-budget-overflow
  constraints:
    - id: context-budget-positive-limit
      severity: error
      expression_language: plain
      expression: capacity_limit > 0
      explanation:
        zh: 容量上限必须为正数。
        en: Capacity limit must be positive.
        ja: capacity limit は正数必須。
      source_claims:
        - claim-context-budget-limit
    - id: context-budget-reservation-within-limit
      severity: error
      expression_language: plain
      expression: reserved_capacity >= 0 and reserved_capacity <= capacity_limit
      explanation:
        zh: 预留量不得为负或超过总上限。
        en: Reserved capacity cannot be negative or exceed total ceiling.
        ja: reserved capacity は負数/total ceiling 超過不可。
      source_claims:
        - claim-context-budget-reserved
  required_relations: []
examples:
  - id: ContextBudget-example-claude-200k
    labels:
      zh: Claude 200K 预算
      en: Claude 200K budget
      ja: Claude 200K budget
    descriptions:
      zh: context-budget-claude-200k/rev3：capacity_limit=200000，reserved=4096 system + 8192 max_tokens output，auto_compact_threshold_pct=95，overflow_action=summarize_then_trim。
      en: context-budget-claude-200k rev3 capacity_limit=200000, reserved=4096 system + 8192 max_tokens output, auto_compact_threshold_pct=95, overflow_action=summarize_then_trim.
      ja: context-budget-claude-200k rev3：capacity_limit=200000、reserved=4096 system+8192 max_tokens output、auto_compact_threshold_pct=95、overflow_action=summarize_then_trim。
    example_source:
      product: Claude Code
      url: https://code.claude.com/docs/en/context-window
      version: 200K window
    field_values:
      context_budget_id: context-budget-claude-200k
      revision: "3"
      capacity_unit: token
      capacity_limit: 200000
      reserved_capacity: 12288
      auto_compact_threshold_pct: 95
      overflow_action: summarize_then_trim
    related_node_ids:
      - ContextBudget
      - ContextTrimmingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-budget-claude
  - id: ContextBudget-example-openai-128k
    labels:
      zh: OpenAI 128K 预算
      en: OpenAI 128K budget
      ja: OpenAI 128K budget
    descriptions:
      zh: context-budget-gpt4o-128k：capacity_limit=128000，max_tokens=16384 从 reserved_capacity 扣除，available_for_slots≈111616 tokens。
      en: context-budget-gpt4o-128k capacity_limit=128000, max_tokens=16384 deducted from reserved_capacity, available_for_slots≈111616 tokens.
      ja: context-budget-gpt4o-128k：capacity_limit=128000、max_tokens=16384 を reserved から控除。available_for_slots≈111616 tokens。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat
      version: max_tokens
    field_values:
      capacity_limit: 128000
      reserved_capacity: 16384
    related_node_ids:
      - ContextBudget
    related_relation_ids: []
    source_claims:
      - claim-context-budget-openai
  - id: ContextBudget-example-recycling-12k
    labels:
      zh: Context Recycling 12K 预算
      en: Context Recycling 12K budget
      ja: Context Recycling 12K budget
    descriptions:
      zh: context-budget-recycling-l1：active_context_budget_tokens=12000，overflow_action=offload_to_disk，超预算 chunk 回写 L3 而非 summarization。
      en: context-budget-recycling-l1 active_context_budget_tokens=12000, overflow_action=offload_to_disk, over-budget chunks offloaded to L3 not summarization.
      ja: context-budget-recycling-l1：active_context_budget_tokens=12000、overflow_action=offload_to_disk。超 budget chunk は L3 offload（summarization 非）。
    example_source:
      product: Context Recycling
      url: https://arxiv.org/abs/2606.26105
      version: L1 budget
    field_values:
      capacity_limit: 12000
      overflow_action: offload_to_disk
    related_node_ids:
      - ContextBudget
    related_relation_ids: []
    source_claims:
      - claim-context-budget-recycling
  - id: ContextBudget-example-not-ordering-rule
    labels:
      zh: 预算非排序规则
      en: Budget is not ordering rule
      ja: budget は ordering rule ではない
    descriptions:
      zh: rule-recency 规定同权威证据按新鲜度排序，无 capacity_unit 或 capacity_limit；即使预算压力改变顺序，也不是 ContextBudget。
      en: rule-recency orders by freshness without capacity_unit or capacity_limit; budget pressure does not make it ContextBudget.
      ja: rule-recency は freshness 順序のみ。capacity_unit/capacity_limit なし。budget 圧でも ContextBudget にならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextBudget
      - ContextOrderingRule
    related_relation_ids: []
    source_claims:
      - claim-context-budget-design
