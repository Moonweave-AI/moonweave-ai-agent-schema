source_claims:
  - id: claim-context-budget-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents' context-compression documentation defines triggers relative to model max_input_tokens and preserves a configured recent-token portion. This directly supports a quantitative capacity constraint; Moonweave represents it as ContextBudget and deliberately does not classify it as a reusable ContextRule.
    locator: Context engineering in Deep Agents > Summarization > 85% max_input_tokens trigger and 10% recent-context retention
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-budget-002
    source: lit-agent-memory-as-action
    supports: Memory as Action frames memory management as action selection under the agent's operating context. Moonweave introduces ContextBudget to make the finite capacity governing those actions explicit and measurable; the paper does not prescribe its fields or taxonomic placement.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-budget-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents stable token-threshold configuration for context compression; Moonweave gives the reusable capacity specification an independent identifier.
    locator: Context engineering in Deep Agents > Summarization > max_input_tokens trigger and recent-context retention
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-budget-004
    source: lit-agent-memory-as-action
    supports: The paper formalizes context management against determinate state; Moonweave versions the reusable budget so the action boundary is auditable.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-budget-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents expresses context-compression thresholds and retained context in token quantities, grounding token as one concrete budget unit.
    locator: Context engineering in Deep Agents > Summarization > token thresholds and retained tokens
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-context-budget-006
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents compression triggers relative to a model's maximum input tokens, supporting an explicit numeric ceiling.
    locator: Context engineering in Deep Agents > Summarization > max_input_tokens trigger
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-context-budget-007
    source: lit-agent-memory-as-action
    supports: Finite working context motivates explicit allocation among competing uses; Moonweave records the amount unavailable to ordinary context slots as a reservation.
    locator: Paper > §2.2–3.1 context-management decision process and memory actions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-budget-008
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents summarization and offloading mechanisms triggered by context pressure; Moonweave records which mechanism a reusable budget selects without turning the budget into an ordering rule.
    locator: Context engineering in Deep Agents > Summarization and offloading
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
