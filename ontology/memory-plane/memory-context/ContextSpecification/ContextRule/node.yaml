schema: moonweave.ai/ontology-node/v1
id: ContextRule
kind: concept
status: accepted
labels:
  zh: 上下文规则
  en: context rule
  ja: コンテキスト規則
semantics:
  short_definition:
    zh: 以条件、结论和优先级规定上下文选择、排序或处理行为的版本化规范。
    en: A versioned specification prescribing context selection, ordering, or handling through conditions, outcomes, and priority.
    ja: 条件・結果・優先度によりコンテキスト選択・順序付け・処理動作を規定する版管理仕様です。
  definition:
    zh: 上下文规则是一种规范；其种差是：它具有稳定身份、版本、适用范围、优先级，以及把可检查条件映射为选择、排序、转换或排除结论的行为。ContextOrderingRule 是其下位类型；ContextBudget 只声明容量，ContextExclusion 只记录一次决定，二者都不是规则。
    en: A ContextRule is a specification with stable identity, version, applicability scope, priority, and behavior mapping checkable conditions to selection, ordering, transformation, or exclusion outcomes. ContextOrderingRule is a subtype; ContextBudget only declares capacity and ContextExclusion records one decision, so neither is a rule.
    ja: ContextRule は、安定同一性、版、適用範囲、優先度を持ち、検査可能条件を選択・順序・変換・除外結果へ対応付ける仕様です。ContextOrderingRule は下位型ですが、ContextBudget は容量宣言、ContextExclusion は一回判断なので規則ではありません。
  why_needed:
    zh: 显式规则使上下文行为能够版本化、复用、冲突排序和审计，而不是把每次运行结果误写成永久策略。
    en: Explicit rules make context behavior versionable, reusable, precedence-aware, and auditable instead of turning each runtime outcome into permanent policy.
    ja: 規則を明示すると、文脈動作を版管理・再利用・競合順序付け・監査でき、一回の実行結果を恒久方針と誤認しません。
  includes:
    - zh: 纳入“来源信任低于 internal 时不纳入”“system 角色始终排在 user 之前”这类带版本、适用范围和可执行结论的规范。
      en: Includes specifications such as “exclude sources below internal trust” or “system role always precedes user,” with version, scope, and executable outcome.
      ja: 「internal 未満の信頼出典を除外」「system 役割は常に user より前」のように版・範囲・実行結果を持つ仕様を含みます。
  excludes:
    - zh: 排除 ContextBudget、ContextExclusion 和 ContextAssembly；它们分别是容量约束、一次决定记录和执行规则的活动。
      en: Excludes ContextBudget, ContextExclusion, and ContextAssembly because they are respectively a capacity constraint, a one-off decision record, and the activity applying rules.
      ja: ContextBudget、ContextExclusion、ContextAssembly はそれぞれ容量制約、一回判断記録、規則適用活動なので除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - context_rule_id
    - revision
  fields:
    - id: context_rule_id
      labels:
        zh: 上下文规则标识
        en: context-rule ID
        ja: context rule ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一条上下文规则。
        en: Stably identifies the same context rule across revisions.
        ja: revision をまたいで同一 context rule を安定識別します。
      allowed_values: []
      pattern: null
      example_value: source-trust
      source_claims:
        - claim-context-rule-003
    - id: revision
      labels:
        zh: 规则修订版
        en: rule revision
        ja: rule revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次可重放组装使用的规则版本。
        en: Pins the rule version used by a replayable assembly.
        ja: replayable assembly が使った rule version を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-context-rule-004
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: applicability scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明规则适用的候选类别、受众、阶段或运行环境。
        en: Declares candidate classes, audiences, phases, or runtime environments to which the rule applies.
        ja: rule が適用される candidate class・audience・phase・runtime environment を宣言します。
      allowed_values: []
      pattern: null
      example_value: external-retrieved-evidence
      source_claims:
        - claim-context-rule-005
    - id: priority
      labels:
        zh: 规则优先级
        en: rule priority
        ja: rule priority
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在多个适用规则冲突时提供显式且可审计的比较值。
        en: Provides an explicit, auditable comparison value when multiple applicable rules conflict.
        ja: 複数 applicable rule が競合する際の explicit/auditable comparison value です。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims:
        - claim-context-rule-006
    - id: condition_expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: condition expression
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可检查的候选或组装状态条件，不以自然语言名称猜测适用性。
        en: Records a checkable candidate or assembly-state condition rather than guessing applicability from a label.
        ja: label から適用性を推測せず checkable candidate/assembly-state condition を記録します。
      allowed_values: []
      pattern: null
      example_value: source_trust < verified
      source_claims:
        - claim-context-rule-007
    - id: rule_effect
      labels:
        zh: 规则效力
        en: rule effect
        ja: rule effect
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明条件成立时执行选择、排序、变换或排除中的哪一项结果。
        en: Declares the selection, ordering, transformation, or exclusion outcome when the condition holds.
        ja: condition 成立時の selection・ordering・transformation・exclusion outcome を宣言します。
      allowed_values: []
      pattern: null
      example_value: exclude
      source_claims:
        - claim-context-rule-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextRule-example-positive-001
    kind: positive
    labels:
      zh: 上下文规则正例
      en: Positive example of context rule
      ja: コンテキスト規則の正例
    scenario_id: null
    descriptions:
      zh: 规则 source-trust-v4 适用于外部检索证据：当来源信任级别低于 verified 时不得进入模型上下文；版本、适用受众、优先级和拒绝结果均被显式声明。
      en: "Rule source-trust-v4 applies to externally retrieved evidence: when source trust is below verified, the item must not enter model context; version, audience scope, priority, and rejection outcome are explicit."
      ja: 規則 source-trust-v4 は外部検索証拠へ適用され、出典信頼が verified 未満ならモデル文脈へ入れません。版、対象受け手、優先度、拒否結果を明示します。
    field_values:
      context_rule_id: source-trust
      revision: "4"
      applicability_scope: external-retrieved-evidence
      priority: 80
      condition_expression: source_trust < verified
      rule_effect: exclude
      context_specification_id: context-spec-external-evidence
    related_node_ids:
      - ContextRule
      - ContextAssembly
    related_relation_ids:
      - ContextAssembly-applies-ContextRule
    expected_result:
      zh: 该运行可查询 ContextRule 以及方向保持不变的事实 ContextAssembly-applies-ContextRule。
      en: The run can query ContextRule together with direction-preserving fact ContextAssembly-applies-ContextRule.
      ja: この実行では ContextRule と方向を保持した事実 ContextAssembly-applies-ContextRule を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ContextAssembly-applies-ContextRule 的 canonical 方向、概念定义和可用字段值。
      en: The object maps a checkable condition to a reusable context-handling outcome and can be applied across assembly runs; it is not a one-run decision record.
      ja: このシナリオは実際の運用文脈、ContextAssembly-applies-ContextRule の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-rule-009
      - claim-context-rule-010
  - id: ContextRule-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文规则边界例
      en: Boundary case for context rule
      ja: コンテキスト規則の境界例
    scenario_id: null
    descriptions:
      zh: ContextAssembly ctx-run-42 在 10:15 应用 source-trust-v4 并排除 candidate-91；它有输入、阶段和输出，是一次活动，不因应用规则而成为 ContextRule。
      en: ContextAssembly ctx-run-42 applies source-trust-v4 at 10:15 and excludes candidate-91. It has inputs, phases, and output and is a one-run activity; applying the rule does not make it ContextRule.
      ja: ContextAssembly ctx-run-42 は10:15に source-trust-v4 を適用して candidate-91 を除外します。入力・段階・出力を持つ一回の活動であり、規則適用により ContextRule にはなりません。
    field_values: {}
    related_node_ids:
      - ContextRule
      - ContextAssembly
    related_relation_ids:
      - ContextAssembly-applies-ContextRule
    expected_result:
      zh: ContextAssembly 保持其原有类型，验证器不得凭关系共现把它提升为 ContextRule。
      en: ContextAssembly retains its own type; validation must not promote it to ContextRule from relation co-occurrence.
      ja: ContextAssembly は元の型を維持し、関係の共起だけで ContextRule へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ContextAssembly-applies-ContextRule 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: A rule is reusable and identified by specification version and scope; an assembly is an occurrence identified by its run and transformations. Application links the two without merging them.
      ja: 境界例は実在する対照ノードを示し、ContextAssembly-applies-ContextRule の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-rule-011
      - claim-context-rule-012
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ContextBudget
    shared_parent_concept_id: ContextSpecification
    differentia:
      zh: ContextRule 与 ContextBudget 同为可跨运行复用的 ContextSpecification，但验证维度不同。ContextRule 必须以 applicability_scope、condition_expression 和 rule_effect 声明“何时对哪些候选产生何种选择、排序、变换或排除效力”；ContextBudget 必须以 capacity_unit、capacity_limit、reserved_capacity 和 overflow_action 声明“容量是多少以及超限时采取哪类处置”。只有数量上限而没有条件—效力映射的对象不得归为 ContextRule；只有排序条件而没有同单位容量边界的对象不得归为 ContextBudget。
      en: ContextRule and ContextBudget are both reusable ContextSpecifications, but they have different validation dimensions. ContextRule must use applicability_scope, condition_expression, and rule_effect to state when a selection, ordering, transformation, or exclusion outcome applies to which candidates. ContextBudget must use capacity_unit, capacity_limit, reserved_capacity, and overflow_action to state how much capacity exists and what class of response applies on overflow. A numeric ceiling without a condition-to-effect mapping is not ContextRule, while an ordering condition without same-unit capacity bounds is not ContextBudget.
      ja: ContextRule と ContextBudget は run 横断で再利用する ContextSpecification ですが検証次元が異なります。ContextRule は applicability_scope・condition_expression・rule_effect で、どの候補へいつ selection・ordering・transformation・exclusion のどの効力を与えるかを宣言します。ContextBudget は capacity_unit・capacity_limit・reserved_capacity・overflow_action で容量と超過時の処置種別を宣言します。条件―効力対応のない数値上限は ContextRule でなく、同一単位の容量境界を持たない順序条件は ContextBudget ではありません。
    source_claims:
      - claim-context-rule-013
      - claim-context-rule-014
parent_relation:
  id: ContextRule-is_a-ContextSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文规范
    en: is a context specification
    ja: コンテキスト仕様の一種である
  definitions:
    zh: 每个 ContextRule 都是 ContextSpecification；其种差是把可检查条件映射为选择、排序、变换或排除效力，并声明适用范围与冲突优先级。
    en: Every ContextRule is a ContextSpecification distinguished by mapping a checkable condition to a selection, ordering, transformation, or exclusion effect and declaring applicability scope and conflict priority.
    ja: すべての ContextRule は ContextSpecification で、checkable condition を selection・ordering・transformation・exclusion effect へ写像し applicability scope/conflict priority を宣言する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: taxonomic inheritance には instance-relation cardinality を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有上下文规则下位类
      en: has context-rule subtype
      ja: context-rule subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContextRule-is_a-ContextSpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 规则归入规范正例
        en: context-rule hierarchy positive case
        ja: context-rule hierarchy 正例
      scenario_id: null
      descriptions:
        zh: source-trust/revision 4 具有稳定规则 ID、外部检索证据适用范围、优先级 80、条件 source_trust < verified 和排除效力；它满足可版本化规范身份并增加条件—效力种差。
        en: source-trust revision 4 has a stable rule ID, external-retrieved-evidence scope, priority 80, condition source_trust < verified, and exclusion effect. It satisfies versioned specification identity and adds condition-to-effect differentia.
        ja: source-trust revision 4 は stable rule ID・external-retrieved-evidence scope・priority 80・condition source_trust < verified・exclusion effect を持ち versioned specification identity と condition-to-effect 種差を満たします。
      field_values:
        context_rule_id: source-trust
        revision: "4"
        applicability_scope: external-retrieved-evidence
        priority: 80
        condition_expression: source_trust < verified
        rule_effect: exclude
      related_node_ids:
        - ContextRule
        - ContextSpecification
      related_relation_ids:
        - ContextRule-is_a-ContextSpecification
      expected_result:
        zh: 沿 ContextRule→ContextSpecification 返回完整规范祖先链，同时保留规则种差。
        en: Return the ContextRule→ContextSpecification ancestry while retaining the rule differentia.
        ja: ContextRule→ContextSpecification ancestry と rule differentia を保持して返します。
      why_valid_or_invalid:
        zh: 对象既可独立标识和修订，又给出条件、适用范围、优先级和效力，故满足上位规范与下位规则的全部身份条件。
        en: The object is independently identified and revised and supplies condition, scope, priority, and effect, satisfying both specification genus and rule differentia.
        ja: object は independently identified/revised で condition・scope・priority・effect を持ち specification genus と rule differentia の両方を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-rule-015
    - id: ContextRule-is_a-ContextSpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 规则归入规范边界例
        en: context-rule hierarchy boundary case
        ja: context-rule hierarchy 境界例
      scenario_id: null
      descriptions:
        zh: budget-32k/revision 7 是可版本化 ContextBudget，声明 32768 token 上限与 4096 token 预留，但没有条件表达式、规则效力或冲突优先级；它可以是 specification，却不是 ContextRule。
        en: budget-32k revision 7 is a versioned ContextBudget declaring a 32,768-token ceiling and 4,096-token reserve but no condition expression, rule effect, or conflict priority. It may be a specification but is not ContextRule.
        ja: budget-32k revision 7 は 32768-token ceiling/4096-token reserve を宣言する versioned ContextBudget ですが condition expression・rule effect・conflict priority がなく specification にはなれても ContextRule ではありません。
      field_values:
        budget_id: budget-32k
        revision: "7"
        max_tokens: 32768
        reserved_tokens: 4096
        condition_expression: null
        rule_effect: null
        priority: null
      related_node_ids:
        - ContextRule
        - ContextSpecification
        - ContextBudget
      related_relation_ids:
        - ContextRule-is_a-ContextSpecification
      expected_result:
        zh: 不建立 ContextBudget→ContextRule 分类，只保留其独立容量规范身份。
        en: Do not classify ContextBudget as ContextRule; retain its independent capacity-specification identity.
        ja: ContextBudget→ContextRule classification を作らず independent capacity-specification identity を保持します。
      why_valid_or_invalid:
        zh: 共享 specification 语义不足以证明规则身份；缺少条件—效力映射与冲突优先级时，ContextRule 的种差不成立。
        en: Shared specification semantics do not prove rule identity; without condition-to-effect mapping and conflict priority, ContextRule differentia are absent.
        ja: shared specification semantics だけでは rule identity を証明せず condition-to-effect mapping/conflict priority がないため ContextRule differentia は成立しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-context-rule-016
  source_claims:
    - claim-context-rule-017
    - claim-context-rule-018
  distinct_fact_rationale:
    zh: 该边只表达规则是规范的分类事实；运行采用规则由 ContextAssembly-applies-ContextRule 独立表达。
    en: This edge states only that a rule is a specification; ContextAssembly-applies-ContextRule separately records runtime adoption.
    ja: この edge は rule が specification である分類だけを表し runtime adoption は ContextAssembly-applies-ContextRule が別に記録します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
