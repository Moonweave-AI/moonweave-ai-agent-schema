schema: moonweave.ai/ontology-node/v1
id: ContextRule
kind: concept
status: accepted
labels:
  zh: 上下文规则
  en: Context Rule
  ja: コンテキスト規則
semantics:
  short_definition:
    zh: 规约中声明何时及如何选择、排序、裁剪或准入上下文候选项的版本化行为政策。
    en: A versioned behavioral policy in a specification that declares when and how context candidates are selected, ordered, trimmed, or admitted.
    ja: コンテキスト候補をいつどのように選択、順序付け、裁断、受入するかを宣言する仕様内の版管理済み行動方針。
  definition:
    zh: ContextRule 是 ContextSpecification 的行为组成部分，它以规则种类、适用条件、动作和优先级声明装配应遵循的政策。它不是 ContextBudget 的数量上限、实际执行的 ContextAssemblyPhase、一个 ContextArtifact、实际 ContextPackage 顺序、检索评分或对 MemoryRecord 的持久化操作。ContextOrderingRule 是其专门处理排列位置的子类型。
    en: "ContextRule is the behavioral component of ContextSpecification: it declares assembly policy through rule kind, applicability condition, action, and precedence. It is not the numeric ceiling of ContextBudget, an executed ContextAssemblyPhase, a ContextArtifact, actual ContextPackage order, retrieval score, or a persistence operation on a MemoryRecord. ContextOrderingRule is its subtype that specifically handles placement order."
    ja: ContextRule は ContextSpecification の行動構成要素であり、規則種別、適用条件、動作、優先順位によって組立方針を宣言します。ContextBudget の数値上限、実行済み ContextAssemblyPhase、ContextArtifact、実際の ContextPackage 順、検索スコア、MemoryRecord の永続化操作ではありません。ContextOrderingRule は配置順を専ら扱う下位型です。
  why_needed:
    zh: 上下文管理会包含选择、裁剪、摘要或顺序等相互独立的决策。把它们声明为可寻址规则，可审计某个政策是否适用于某次装配、解决冲突，而不会将配置误记为已经发生的选择或删除。
    en: Context management includes independent decisions such as selection, trimming, summarization, and ordering. Declaring them as addressable rules makes it possible to audit whether a policy applied to an assembly and resolve conflicts without recording configuration as a selection or deletion that already happened.
    ja: コンテキスト管理には選択、裁断、要約、順序付けなど独立した決定が含まれます。これらをアドレス可能な規則として宣言すると、構成を既に起きた選択や削除として記録せずに、方針が組立に適用されたかを監査し、衝突を解決できます。
  includes:
    - zh: 规则身份和版本、规则种类、适用条件、动作、优先级，以及执行时所需的参数或阈值引用。
      en: Rule identity and revision, rule kind, applicability condition, action, precedence, and parameters or threshold references needed at execution.
      ja: 規則の ID と改訂、規則種別、適用条件、動作、優先順位、実行時に必要なパラメーターまたは閾値参照。
  excludes:
    - zh: 已选或排除的工件、已完成阶段的开始结束时间、实际 token 使用量、全局授权策略、模型响应或记忆写入结果。
      en: Selected or excluded artifacts, a completed phase's timestamps, actual token usage, a global authorization policy, model response, or memory-write result.
      ja: 選択・除外済み工件、完了段階の開始・終了時刻、実際の token 使用量、グローバル認可方針、モデル応答、記憶書込み結果。
  semantic_kind: entity
  aliases:
    - assembly rule
    - context policy rule
    - 上下文策略规则
engineering:
  explanation:
    zh: 真实框架把规则落实为配置或 reducer 行为。LangGraph 在 trim_messages 调用中暴露 strategy、token_counter、max_tokens 及消息边界选项；Semantic Kernel 的 IChatHistoryReducer.ReduceAsync 接收 ChatMessageContent 历史并返回归约后的历史，可由截断或摘要 reducer 实现。Moonweave 将可复用的“何时/如何”政策建模为 ContextRule，而将一次实际归约建模为 ContextTrimmingActivity 或其他装配阶段。
    en: Real frameworks realize rules as configuration or reducer behavior. LangGraph exposes strategy, token_counter, max_tokens, and message-boundary options in trim_messages; Semantic Kernel IChatHistoryReducer.ReduceAsync accepts ChatMessageContent history and returns reduced history through implementations such as truncation or summarization reducers. Moonweave models reusable "when/how" policy as ContextRule and one actual reduction as ContextTrimmingActivity or another assembly phase.
    ja: 実フレームワークでは規則は構成または reducer の振る舞いとして実現されます。LangGraph は trim_messages で strategy、token_counter、max_tokens、メッセージ境界オプションを公開し、Semantic Kernel の IChatHistoryReducer.ReduceAsync は ChatMessageContent 履歴を受け取り、切詰めまたは要約 reducer などで縮約済み履歴を返します。Moonweave は再利用可能な「いつ・どのように」の方針を ContextRule、一回の実際の縮約を ContextTrimmingActivity または別の組立段階としてモデル化します。
  typical_input:
    - description: LangGraph message-trimming policy parameters
      format: |
        trim_messages(
          messages,
          strategy="last",
          token_counter=count_tokens_approximately,
          max_tokens=128,
          start_on="human",
          end_on=("human", "tool"),
        )
    - description: Semantic Kernel reducer interface input
      format: |
        Task<IEnumerable<ChatMessageContent>?> ReduceAsync(
          IReadOnlyList<ChatMessageContent> chatHistory,
          CancellationToken cancellationToken = default)
  typical_output:
    - description: Resolved rule record used by a Moonweave assembler
      format: |
        {
          "rule_id": "ctx-rule-history-trim",
          "revision": "v4",
          "rule_kind": "trimming",
          "applicability_condition": "counted_input_tokens > 7168",
          "action": "trim_to_budget",
          "precedence": 30
        }
  reference_implementations:
    - name: LangGraph memory management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents message trimming and conversation summarization before model invocation.
    - name: Semantic Kernel chat-history reducers
      url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
      description: Documents IChatHistoryReducer, truncation reducers, summarization reducers, and preservation of system messages.
structure:
  identity_keys: [rule_id, revision]
  fields:
    - id: rule_id
      labels: {zh: 规则标识, en: rule ID, ja: 規則 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个行为规则系列，不复用为实际装配、工件或包标识。
        en: Stably identifies a behavioral-rule series and is not reused as an actual assembly, artifact, or package ID.
        ja: 行動規則系列を安定して識別し、実際の組立、工件、パッケージ ID として再利用しません。
      allowed_values: []
      pattern: "^ctx-rule-[A-Za-z0-9._-]+$"
      example_value: ctx-rule-history-trim
      source_claims: [claim-context-rule-langgraph-trim]
    - id: revision
      labels: {zh: 规则修订, en: rule revision, ja: 規則改訂}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分同一规则系列的不可变条件、动作和参数版本。
        en: Distinguishes immutable condition, action, and parameter versions within one rule series.
        ja: 一つの規則系列内の不変な条件、動作、パラメーター版を区別します。
      allowed_values: []
      pattern: "^v[0-9]+(?:[._-][A-Za-z0-9]+)*$"
      example_value: v4
      source_claims: [claim-context-rule-part-of-specification]
    - id: rule_kind
      labels: {zh: 规则种类, en: rule kind, ja: 規則種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明规则影响候选准入、选择、排序、裁剪或摘要替换中的哪一类政策；它不记录实际阶段结果。
        en: Declares whether the rule governs candidate admission, selection, ordering, trimming, or summary replacement; it does not record an actual phase result.
        ja: 規則が候補受入、選択、順序付け、裁断、要約置換のどの方針を扱うかを宣言し、実際の段階結果は記録しません。
      allowed_values: [admission, selection, ordering, trimming, summary_replacement]
      pattern: null
      example_value: trimming
      source_claims: [claim-context-rule-semantic-kernel-reducer]
    - id: applicability_condition
      labels: {zh: 适用条件, en: applicability condition, ja: 適用条件}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 明确说明规则何时可参与一个装配决策；条件为 false 不等于候选被排除。
        en: Explicitly states when the rule may participate in an assembly decision; a false condition does not mean that a candidate was excluded.
        ja: 規則が組立決定に参加できる時を明示し、条件が false であっても候補が除外されたことを意味しません。
      allowed_values: []
      pattern: null
      example_value: counted_input_tokens > 7168
      source_claims: [claim-context-rule-langgraph-trim]
    - id: action
      labels: {zh: 规则动作, en: rule action, ja: 規則動作}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 表示满足条件时装配器应执行的确定性政策动作或应调用的决策器，不应写入已发生的结果包成员。
        en: States the deterministic policy action or decision procedure an assembler should use when the condition holds and must not write actual result-package membership.
        ja: 条件成立時に組立器が用いる決定的な方針動作または決定手順を示し、実際の結果パッケージ所属を書き込みません。
      allowed_values: []
      pattern: null
      example_value: trim_to_budget
      source_claims: [claim-context-rule-semantic-kernel-reducer]
    - id: precedence
      labels: {zh: 优先级, en: precedence, ja: 優先順位}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在同一规约、范围和冲突处理策略内比较规则的数字优先级；跨规约不能隐式比较。
        en: Numeric priority for comparing rules within the same specification, scope, and conflict-resolution policy; it cannot be compared implicitly across specifications.
        ja: 同一仕様、範囲、衝突解決方針内で規則を比較する数値優先順位であり、仕様をまたいで暗黙に比較できません。
      allowed_values: []
      pattern: null
      example_value: 30
      source_claims: [claim-context-rule-part-of-specification]
    - id: parameter_refs
      labels: {zh: 参数引用, en: parameter references, ja: パラメーター参照}
      datatype: array
      required: false
      cardinality: {min: 0, max: null}
      definitions:
        zh: 可选地引用阈值、允许来源角色或摘要模型等规则参数；参数引用本身不是输入工件或持久记忆。
        en: Optionally references rule parameters such as thresholds, permitted source roles, or summary model; parameter references are not input artifacts or persistent memory.
        ja: 閾値、許可された情報源役割、要約モデルなどの規則パラメーターを任意で参照し、パラメーター参照自体は入力工件でも永続記憶でもありません。
      allowed_values: []
      pattern: null
      example_value: [ctx-budget-support-8k-v3]
      source_claims: [claim-context-rule-langgraph-trim]
  constraints:
    - id: context-rule-declarative-no-run-facts
      severity: error
      expression_language: plain
      expression: A ContextRule must provide rule_kind, applicability_condition, action, and precedence, but must not assert input_artifact_refs, exclusion_ids, result_package_ref, started_at, ended_at, or actual token counts. Those facts belong to a ContextAssemblyPhase, ContextExclusion, ContextPackage, or audit record.
      explanation:
        zh: 规则声明政策，不能充当执行日志；实际排除、排序或裁剪必须由具体活动另行证明。
        en: A rule declares policy and cannot act as an execution log; actual exclusion, ordering, or trimming needs proof from a concrete activity.
        ja: 規則は方針を宣言するもので実行ログにはなれません。実際の除外、順序付け、裁断には具体的活動からの証明が必要です。
      source_claims: [claim-context-rule-semantic-kernel-reducer]
    - id: context-rule-conflict-determinism
      severity: error
      expression_language: plain
      expression: Within one ContextSpecification revision and applicability scope, concurrently applicable rules with incompatible actions must have distinct precedence or an explicit conflict-resolution rule. A rule with rule_kind=ordering must not select or trim membership as a side effect.
      explanation:
        zh: 同时适用的规则必须可判定地合并；排序和成员选择是不同阶段，不能由一个未说明的动作混合完成。
        en: Concurrent rules must be merged deterministically; ordering and membership selection are distinct phases and cannot be mixed by an unspecified action.
        ja: 同時に適用される規則は決定的に併合できなければなりません。順序付けと所属選択は別段階であり、未指定の動作で混在できません。
      source_claims: [claim-context-rule-part-of-specification]
  required_relations: []
examples:
  - id: context-rule-example-positive-history-trim

    labels: {zh: 历史超预算时裁剪, en: Trim when history exceeds budget, ja: 履歴が予算超過時に裁断する}

    descriptions:
      zh: "Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。"
      en: "Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering."
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      rule_id: ctx-rule-history-trim
      revision: v4
      rule_kind: trimming
      applicability_condition: counted_input_tokens > 7168
      action: trim_to_budget
      precedence: 30
      parameter_refs: [ctx-budget-support-8k-v3]
    related_node_ids: [ContextRule, ContextBudget, ContextSpecification]
    related_relation_ids: [ContextRule-part-of-ContextSpecification]

    source_claims: [claim-context-rule-langgraph-trim]
  - id: context-rule-example-counterexample-executed-selection

    labels: {zh: 已执行的选择日志, en: Executed selection log, ja: 実行済み選択ログ}

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      selection_activity_id: selection-run-88
      started_at: "2026-07-19T02:15:00Z"
      selected_artifact_ref: artifact-7
      excluded_artifact_ref: artifact-8
      result_package_ref: ctx-package-88
    related_node_ids: [ContextRule, ContextSelectionActivity, ContextPackage]
    related_relation_ids: []

    source_claims: [claim-context-rule-semantic-kernel-reducer]
  - id: context-rule-example-boundary-framework-parameter-fragment

    labels: {zh: 框架参数片段, en: Framework parameter fragment, ja: フレームワーク引数片}

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      max_tokens: 128
      rule_id: null
      applicability_condition: null
      action: null
    related_node_ids: [ContextRule]
    related_relation_ids: []

    source_claims: [claim-context-rule-langgraph-trim]
  - id: context-rule-example-instance-history-trim-v4

    labels: {zh: "实例：历史裁剪规则 v4", en: "Instance: history trim rule v4", ja: "インスタンス：履歴裁断規則 v4"}

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      rule_id: ctx-rule-history-trim
      revision: v4
      rule_kind: trimming
      applicability_condition: counted_input_tokens > 7168
      action: trim_to_budget
      precedence: 30
      parameter_refs: [ctx-budget-support-8k-v3]
    related_node_ids: [ContextRule, ContextSpecification, ContextTrimmingActivity]
    related_relation_ids: [ContextRule-part-of-ContextSpecification]

    source_claims: [claim-context-rule-part-of-specification]
parent_relation:
  id: ContextRule-part-of-ContextSpecification
  predicate: part_of
  target: concept:ContextSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是上下文规约的规则组成部分
    en: is a rule component of context specification
    ja: コンテキスト仕様の規則構成要素である
  definitions:
    zh: ContextRule —part_of→ ContextSpecification 表示该规则版本由该规约纳入其行为政策；它不表示规则已在某个调用中执行。
    en: ContextRule —part_of→ ContextSpecification means that specification includes the rule revision as behavioral policy; it does not mean the rule executed in a call.
    ja: ContextRule —part_of→ ContextSpecification は、その仕様が規則改訂を行動方針として含むことを表し、規則がある呼び出しで実行されたことを表しません。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_rule_component
    labels: {zh: 具有规则组成部分, en: has rule component, ja: 規則構成要素を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-context-rule-part-of-specification]
  distinct_fact_rationale:
    zh: 此关系只表达规约收录的行为政策，不表达选择、排序、裁剪、排除、模型调用或记忆写入已经发生。
    en: This relation expresses only behavioral policy included by a specification, not completed selection, ordering, trimming, exclusion, model call, or memory write.
    ja: この関係は仕様に含まれる行動方針だけを表し、選択、順序付け、裁断、除外、モデル呼び出し、記憶書込みの完了を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents trim_messages and conversation summarization controls before model invocation.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents IChatHistoryReducer ReduceAsync, truncation reducers, summarization reducers, and preservation of system messages.
  - id: langchain-context-concepts
    title: LangChain context concepts
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/concepts/context
    relevance: Distinguishes runtime context, history, intermediate results, and cross-conversation store.
source_claims:
  - id: claim-context-rule-langgraph-trim
    source: langgraph-memory
    supports: LangGraph documents trim_messages with a strategy, token counter, maximum token count, and message-boundary options before model invocation. Moonweave represents a reusable declaration of such choices as a rule and represents actual invocation separately.
    locator: "Memory guide: trim_messages arguments and invocation example"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-rule-semantic-kernel-reducer
    source: semantic-kernel-chat-history
    supports: Semantic Kernel documents IChatHistoryReducer.ReduceAsync over chat history as well as truncation and summarization reducers. Moonweave distinguishes the reducer's configurable policy from a concrete reduction event and does not infer persistent-memory writes from either.
    locator: "Chat-history reducers: IChatHistoryReducer, truncation reducer, and summarization reducer"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-rule-part-of-specification
    source: langchain-context-concepts
    supports: LangChain describes runtime context as including history, intermediate results, and tools, while long-term memory is separate cross-conversation storage. Moonweave infers that declared assembly rules belong compositionally to a context specification and remain distinct from runtime artifacts and memory records.
    locator: "Context overview: runtime context and cross-conversation store"
    evidence_kind: ontology-design-inference
    confidence: high