schema: moonweave.ai/ontology-node/v1
id: ContextRule
kind: concept
labels:
  zh: 上下文规则
  en: Context rule
  ja: コンテキスト規則
semantics:
  short_definition:
    zh: 声明条件到行为的可复用上下文组装规则规范。
    en: Reusable context-assembly rule specification declaring condition-to-behavior mappings.
    ja: condition-to-behavior mapping を宣言する reusable context-assembly rule specification。
  definition:
    zh: ContextRule 是一种 ContextSpecification；其种差是声明当某条件成立时对候选或已选内容应采取的行为（纳入、排除、排序、摘要、隔离），含 rule_id、revision、condition 与 effect。ContextOrderingRule 是排序特化子类。规则可被 ContextAssembly 读取决策，但不是一次运行或 ContextExclusion 结果。
    en: ContextRule is a ContextSpecification declaring behavior when conditions hold for candidates or selected content (admit, exclude, order, summarize, isolate), with rule_id, revision, condition, and effect. ContextOrderingRule is the ordering specialization. Rules inform ContextAssembly decisions but are not a run or ContextExclusion result.
    ja: ContextRule は ContextSpecification で condition 成立時 candidate/選択済み content への behavior（admit/exclude/order/summarize/isolate）を宣言。rule_id/revision/condition/effect 含む。ContextOrderingRule は ordering 特化 subtype。ContextAssembly 判断に供するが run/ContextExclusion result ではない。
  why_needed:
    zh: 规则外置让 Cursor workspace rules、.cursorignore 模式与 LangChain middleware 策略可版本化、可审计，并与单次 overflow 排除记录区分。
    en: Externalized rules version and audit Cursor workspace rules, .cursorignore patterns, and LangChain middleware policies separately from one-off overflow exclusion records.
    ja: rule 外置で Cursor workspace rules/.cursorignore pattern/LangChain middleware policy を version/audit 可能。one-off overflow exclusion record と区別。
  includes:
    - zh: 纳入具有 rule_id、revision、condition 表达式与 effect 动作的规范规则。
      en: Includes normative rules with rule_id, revision, condition expression, and effect action.
      ja: rule_id/revision/condition expression/effect action を持つ normative rule。
  excludes:
    - zh: 排除 ContextBudget（纯容量约束）、ContextAssembly 运行与 ContextExclusion 单次结果。
      en: Excludes ContextBudget (pure capacity), ContextAssembly runs, and one-off ContextExclusion results.
      ja: ContextBudget（pure capacity）/ContextAssembly run/one-off ContextExclusion result を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: LangChain write/select/compress/isolate 各策略可建模为 ContextRule 族；Cursor .cursor/rules/*.mdc 与 .cursorignore 是纳入/排除规则；Claude path-scoped rules 在文件 read 后 reload；Pichay working-set pinning 是 eviction 优先级规则。
    en: LangChain write/select/compress/isolate strategies model as ContextRule families; Cursor .cursor/rules/*.mdc and .cursorignore are admit/exclude rules; Claude path-scoped rules reload after file read; Pichay working-set pinning is eviction priority rule.
    ja: LangChain write/select/compress/isolate は ContextRule 族にモデル化。Cursor .cursor/rules/*.mdc/.cursorignore は admit/exclude rule。Claude path-scoped rules は file read 後 reload。Pichay working-set pinning は eviction priority rule。
  typical_input:
    - description: Cursor workspace rule effect
      format: |
        {
          "rule_id": "security.mdc",
          "condition": "always_apply",
          "effect": "inject_as_system_instruction"
        }
      source_claims: [claim-context-rule-cursor]
  typical_output: []
  reference_implementations:
    - name: LangChain Context Engineering
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      description: Write, select, compress, isolate rule strategies.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Workspace rules as context policies.
structure:
  identity_keys:
    - rule_id
    - revision
  fields:
    - id: rule_id
      labels:
        zh: 规则标识
        en: Rule identifier
        ja: rule 識別子
      definitions:
        zh: 稳定标识一条可复用 ContextRule lineage。
        en: Stably identifies one reusable ContextRule lineage.
        ja: 一 reusable ContextRule lineage を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rule-selection-threshold
      allowed_values: []
      source_claims:
        - claim-context-rule-id
    - id: revision
      labels:
        zh: 修订版
        en: Revision
        ja: revision
      definitions:
        zh: 不可变规则修订版，固定 condition 与 effect。
        en: Immutable rule revision fixing condition and effect.
        ja: condition/effect を固定する immutable rule revision。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "5"
      allowed_values: []
      source_claims:
        - claim-context-rule-revision
    - id: condition
      labels:
        zh: 条件
        en: Condition
        ja: condition
      definitions:
        zh: 规则生效的条件表达式或触发类别，如 similarity_score>=0.65、path_matches_cursorignore、always_apply。
        en: Condition expression or trigger category, e.g. similarity_score>=0.65, path_matches_cursorignore, always_apply.
        ja: similarity_score>=0.65/path_matches_cursorignore/always_apply 等 condition expression/trigger category。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: similarity_score >= 0.65
      allowed_values: []
      source_claims:
        - claim-context-rule-condition
    - id: effect
      labels:
        zh: 效力
        en: Effect
        ja: effect
      definitions:
        zh: 条件成立时采取的行为：admit、exclude、order、summarize、isolate、inject_system。
        en: Behavior when condition holds admit, exclude, order, summarize, isolate, inject_system.
        ja: condition 成立時 behavior。admit/exclude/order/summarize/isolate/inject_system。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: admit
      allowed_values: []
      source_claims:
        - claim-context-rule-effect
  constraints: []
  required_relations: []
examples:
  - id: ContextRule-example-rag-threshold
    labels:
      zh: RAG 相关性阈值规则
      en: RAG relevance threshold rule
      ja: RAG 関連性閾値 rule
    descriptions:
      zh: rule-selection-threshold/rev5：condition similarity_score>=0.65 → effect admit；否则 ContextSelection 生成 relevance-below-threshold exclusion。
      en: rule-selection-threshold rev5 condition similarity_score>=0.65 → effect admit; else ContextSelection emits relevance-below-threshold exclusion.
      ja: rule-selection-threshold rev5：similarity_score>=0.65→admit。否则 ContextSelection が relevance-below-threshold exclusion。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: select
    field_values:
      rule_id: rule-selection-threshold
      revision: "5"
      condition: similarity_score >= 0.65
      effect: admit
    related_node_ids:
      - ContextRule
      - ContextSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-context-rule-rag
  - id: ContextRule-example-cursorignore
    labels:
      zh: .cursorignore 排除规则
      en: .cursorignore exclusion rule
      ja: .cursorignore exclusion rule
    descriptions:
      zh: rule-cursorignore/rev2：condition path_matches_cursorignore → effect exclude；匹配 node_modules/** 等模式。
      en: rule-cursorignore rev2 condition path_matches_cursorignore → effect exclude matching node_modules/** etc.
      ja: rule-cursorignore rev2：path_matches_cursorignore→exclude。node_modules/** 等 pattern 一致。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/ignore-files
      version: ignore
    field_values:
      rule_id: rule-cursorignore
      effect: exclude
    related_node_ids:
      - ContextRule
      - ContextExclusion
    related_relation_ids: []
    source_claims:
      - claim-context-rule-cursorignore
  - id: ContextRule-example-langchain-isolate
    labels:
      zh: LangChain 隔离规则
      en: LangChain isolate rule
      ja: LangChain isolate rule
    descriptions:
      zh: rule-isolate-subgraph/rev1：condition subgraph_state==scratchpad → effect isolate；父图 ContextPackage 不含 scratchpad 全文。
      en: rule-isolate-subgraph rev1 condition subgraph_state==scratchpad → effect isolate; parent ContextPackage excludes full scratchpad.
      ja: rule-isolate-subgraph rev1：subgraph_state==scratchpad→isolate。parent ContextPackage は scratchpad 全文除外。
    example_source:
      product: LangChain
      url: https://docs.langchain.com/oss/python/langchain/context-engineering
      version: isolate
    field_values:
      effect: isolate
    related_node_ids:
      - ContextRule
      - VisibleContextWindow
    related_relation_ids: []
    source_claims:
      - claim-context-rule-isolate
  - id: ContextRule-example-not-budget
    labels:
      zh: 规则非预算
      en: Rule is not budget
      ja: rule は budget ではない
    descriptions:
      zh: context-budget-claude-200k 只声明 capacity_limit 与 threshold，无条件—effect 行为映射；它是 ContextBudget 不是 ContextRule。
      en: context-budget-claude-200k declares capacity_limit and threshold without condition-to-effect mapping; it is ContextBudget not ContextRule.
      ja: context-budget-claude-200k は capacity_limit/threshold のみ。condition-effect mapping なし。ContextBudget で ContextRule ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextRule
      - ContextBudget
    related_relation_ids: []
    source_claims:
      - claim-context-rule-design
parent_relation:
  id: ContextRule-is_a-ContextSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文规范
    en: is a context specification
    ja: コンテキスト仕様の一種
  definitions:
    zh: 每个 ContextRule 都是 ContextSpecification；其种差是条件—效力行为映射。
    en: Every ContextRule is a ContextSpecification distinguished by condition-to-effect behavior mapping.
    ja: すべての ContextRule は ContextSpecification で condition-effect behavior mapping という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-rule-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
