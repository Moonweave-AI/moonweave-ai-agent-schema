source_claims:
  - id: claim-context-rule-001
    source: eng-fw-langgraph-docs
    supports: LangGraph exposes graph behavior, runtime context, state, checkpoints, and interrupt controls as distinct, inspectable mechanisms. Moonweave introduces ContextRule for a versioned, scoped specification mapping checkable conditions to context selection, ordering, transformation, or exclusion outcomes.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-002
    source: lit-mech-compass
    supports: COMPASS identifies relevance-focused context organization as a separate responsibility needed for long-horizon coherence. ContextRule is Moonweave's auditable specification layer for governing that organization; the paper does not define its fields or hierarchy.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-003
    source: eng-fw-langchain-context-engineering
    supports: The official guide separates named context-management strategies. Moonweave gives each reusable governing rule a stable identifier.
    locator: Context engineering in agents > Model context > write, select, compress, isolate
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-rule-004
    source: lit-agent-memory-as-action
    supports: The paper treats context management as state-dependent decisions. Moonweave pins the rule revision so a decision can be reconstructed against the same specification state.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-005
    source: eng-fw-langchain-context-engineering
    supports: LangChain distinguishes model, tool, and lifecycle context surfaces. Moonweave records an explicit scope so a rule cannot silently migrate between them.
    locator: Context engineering in agents > What you can control > model, tool, and life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-rule-006
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines an explicit priority hint for resource inclusion. Moonweave generalizes explicit priority to conflict ordering among applicable context rules.
    locator: Resources > Annotations > priority
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-007
    source: lit-agent-memory-as-action
    supports: The formalization conditions context-management actions on the current state. Moonweave materializes that precondition as an inspectable expression.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-008
    source: eng-fw-langchain-context-engineering
    supports: The official guide identifies distinct context-shaping operations. Moonweave records the selected operation as the rule's explicit effect.
    locator: Context engineering in agents > Model context > write, select, compress, isolate
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-context-rule-009
    source: eng-fw-langgraph-docs
    supports: LangGraph documents runtime state, durable execution, and interrupts as explicit controls over graph behavior. Moonweave generalizes checkable, versioned controls on context handling into ContextRule; the source-trust condition is a project policy example.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-010
    source: lit-mech-compass
    supports: COMPASS attributes failures to irrelevant context and uses a Context Manager to maintain concise, relevant briefs. The reusable trust threshold in the example is Moonweave's explicit rule representation for one class of admission control.
    locator: Paper > COMPASS framework > Context Manager and structured progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-context-rule-011
