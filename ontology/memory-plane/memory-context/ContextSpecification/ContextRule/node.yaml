    supports: .cursorignore patterns are exclude rules.
    locator: Ignore
    evidence_kind: official
    confidence: high
  - id: claim-context-rule-isolate
    source: src-langchain-context-engineering
    supports: Isolate strategy hides subgraph state via rule effect.
    locator: Isolate
    evidence_kind: official
    confidence: high
  - id: claim-context-rule-cursor
    source: src-cursor-rules
    supports: Workspace rules inject system instructions when conditions match.
    locator: Rules
    evidence_kind: official
    confidence: high
  - id: claim-context-rule-design
    source: src-memory-context-design
    supports: ContextRule maps conditions to effects, unlike ContextBudget.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-context-rule-id
    source: src-memory-context-design
    supports: rule_id identifies reusable rule lineages.
    locator: structure
