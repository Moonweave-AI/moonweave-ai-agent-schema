schema: moonweave.ai/ontology-node/v1
id: ContextOrderingRule
kind: concept
labels:
  zh: 上下文排序规则
  en: Context ordering rule
  ja: コンテキスト整列規則
semantics:
  short_definition:
    zh: 声明已选内容最终窗口内顺序的可复用规则。
    en: Reusable rule declaring final in-window order for selected content.
    ja: 選択済み content の final in-window order を宣言する reusable rule。
  definition:
    zh: ContextOrderingRule 是一种 ContextRule；其种差是专用于 ContextOrderingActivity 的顺序策略，声明 role precedence（system→user→assistant→tool_result）、recency priority（recent files/messages 靠近尾部）与 authority tie-break（@ 引用优于 semantic hit）。它不决定纳入或 token 上限。
    en: ContextOrderingRule is a ContextRule specialized for ContextOrderingActivity, declaring role precedence (system→user→assistant→tool_result), recency priority (recent files/messages near tail), and authority tie-breaks (@ references over semantic hits). It does not decide admission or token ceilings.
    ja: ContextOrderingRule は ContextOrderingActivity 専用 ContextRule。role precedence（system→user→assistant→tool_result）/recency priority（recent file/message を tail 近傍）/authority tie-break（@ 参照>semantic hit）を宣言。admission/token ceiling は決定しない。
  why_needed:
    zh: 排序规则独立后可复现 Cursor system rules→user→@refs→recent 顺序与 Anthropic API 角色约束，并与选择/预算规则分开版本管理。
    en: Separate ordering rules reproduce Cursor system rules→user→@refs→recent sequence and Anthropic API role constraints, versioned apart from selection/budget rules.
    ja: ordering rule 独立で Cursor system rules→user→@refs→recent 順序と Anthropic API role constraint を再現。selection/budget rule と別 version 管理。
  includes:
    - zh: 纳入声明 role_order、recency_bias 与 tie_break_keys 的排序规则修订版。
      en: Includes ordering rule revisions declaring role_order, recency_bias, and tie_break_keys.
      ja: role_order/recency_bias/tie_break_keys を宣言する ordering rule revision。
  excludes:
    - zh: 排除 relevance threshold 选择规则、ContextBudget 与 ContextOrderingActivity 单次运行。
      en: Excludes relevance-threshold selection rules, ContextBudget, and one-off ContextOrderingActivity runs.
      ja: relevance threshold selection rule/ContextBudget/one-off ContextOrderingActivity run を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic Messages API 强制 system 在前、tool_result 随 assistant；Cursor default：system rules → user message → @ referenced files（authority desc）→ recent files（mtime desc）→ semantic hits（score desc）；Manus todo.md tail injection 是 recency_bias=high 实例。
    en: Anthropic Messages API mandates system first, tool_result after assistant; Cursor default system rules → user message → @ referenced files (authority desc) → recent files (mtime desc) → semantic hits (score desc); Manus todo.md tail injection is recency_bias=high instance.
    ja: Anthropic Messages API は system 先、tool_result は assistant 後。Cursor default：system rules→user message→@ files（authority desc）→recent files（mtime desc）→semantic hits（score desc）。Manus todo.md tail injection は recency_bias=high instance。
  typical_input:
    - description: Cursor default ordering rule
      format: |
        {
          "rule_id": "rule-cursor-default",
          "role_order": ["system_instruction", "user_message", "referenced_file", "recent_file", "retrieved_evidence"],
          "tie_break_keys": ["authority_level", "mtime_desc", "similarity_score_desc"]
        }
      source_claims: [claim-context-ordering-rule-cursor]
  typical_output: []
  reference_implementations:
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Role precedence constraints.
    - name: Cursor Agent Context
      url: https://cursor.com/docs/agent/tools/search
      description: Default assembly slot ordering.
structure:
  identity_keys:
    - rule_id
    - revision
  fields:
    - id: rule_id
      labels:
        zh: 规则标识
        en: Rule identifier
        ja: rule 識別子
      definitions:
        zh: 稳定标识一条 ContextOrderingRule lineage。
        en: Stably identifies one ContextOrderingRule lineage.
        ja: 一 ContextOrderingRule lineage を安定識別。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rule-cursor-default
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule-id
    - id: revision
      labels:
        zh: 修订版
        en: Revision
        ja: revision
      definitions:
        zh: 不可变排序规则修订版。
        en: Immutable ordering rule revision.
        ja: immutable ordering rule revision。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "2"
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule-revision
    - id: role_order
      labels:
        zh: 角色顺序
        en: Role order
        ja: role order
      definitions:
        zh: 内容角色优先级列表，如 system_instruction、user_message、assistant_message、tool_result、referenced_file、retrieved_evidence。
        en: Ordered list of content role precedence, e.g. system_instruction, user_message, assistant_message, tool_result, referenced_file, retrieved_evidence.
        ja: system_instruction/user_message/assistant_message/tool_result/referenced_file/retrieved_evidence 等 role precedence リスト。
      datatype: string-list
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        - system_instruction
        - user_message
        - referenced_file
        - recent_file
        - retrieved_evidence
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule-role
    - id: recency_bias
      labels:
        zh: 近期偏置
        en: Recency bias
        ja: recency bias
      definitions:
        zh: 近期内容靠近窗口尾部的强度：none、medium、high（如 Manus todo tail injection）。
        en: Strength placing recent content near window tail none, medium, high (e.g. Manus todo tail injection).
        ja: recent content を window tail 近傍へ置く強度。none/medium/high（Manus todo tail injection 等）。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: high
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule-recency
    - id: tie_break_keys
      labels:
        zh: 平局打破键
        en: Tie-break keys
        ja: tie-break keys
      definitions:
        zh: 同角色内次级排序键序列，如 authority_level、mtime_desc、similarity_score_desc。
        en: Secondary sort key sequence within same role, e.g. authority_level, mtime_desc, similarity_score_desc.
        ja: 同一 role 内 secondary sort key 列。authority_level/mtime_desc/similarity_score_desc 等。
      datatype: string-list
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value:
        - authority_level
        - mtime_desc
        - similarity_score_desc
      allowed_values: []
      source_claims:
        - claim-context-ordering-rule-tiebreak
  constraints: []
  required_relations: []
examples:
  - id: ContextOrderingRule-example-anthropic-roles
    labels:
      zh: Anthropic 角色顺序规则
      en: Anthropic role ordering rule
      ja: Anthropic role ordering rule
    descriptions:
      zh: rule-anthropic-api/rev1：role_order=[system_instruction, user_message, assistant_message, tool_result]；API 层强制，ContextOrderingActivity 必须合规。
      en: rule-anthropic-api rev1 role_order=[system_instruction, user_message, assistant_message, tool_result]; API-mandatory, ContextOrderingActivity must comply.
      ja: rule-anthropic-api rev1：role_order=[system_instruction, user_message, assistant_message, tool_result]。API 強制。ContextOrderingActivity 合规必須。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: role order
    field_values:
      rule_id: rule-anthropic-api
      revision: "1"
      role_order:
        - system_instruction
        - user_message
        - assistant_message
        - tool_result
    related_node_ids:
      - ContextOrderingRule
      - ContextOrderingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-rule-anthropic
  - id: ContextOrderingRule-example-cursor-default
    labels:
      zh: Cursor 默认排序规则
      en: Cursor default ordering rule
      ja: Cursor default ordering rule
    descriptions:
      zh: rule-cursor-default/rev2：system rules → user → @ files（authority desc）→ recent（mtime desc）→ semantic hits（score desc）；phase-order-204 引用此修订版。
      en: rule-cursor-default rev2 system rules → user → @ files (authority desc) → recent (mtime desc) → semantic hits (score desc); phase-order-204 references this revision.
      ja: rule-cursor-default rev2：system rules→user→@ files（authority desc）→recent（mtime desc）→semantic hits（score desc）。phase-order-204 がこの revision 参照。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: assembly order
    field_values:
      rule_id: rule-cursor-default
      revision: "2"
      tie_break_keys:
        - authority_level
        - mtime_desc
        - similarity_score_desc
    related_node_ids:
      - ContextOrderingRule
      - ContextOrderingActivity
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-rule-cursor
  - id: ContextOrderingRule-example-recency-tail
    labels:
      zh: 近期尾部偏置规则
      en: Recency tail bias rule
      ja: recency tail bias rule
    descriptions:
      zh: rule-recency/rev3：recency_bias=high，standing_state_file=todo.md 注入 context tail 最高 ordinal，保持 global plan 在近期注意力区。
      en: rule-recency rev3 recency_bias=high, standing_state_file=todo.md injected at context tail highest ordinal keeping global plan in recent attention zone.
      ja: rule-recency rev3：recency_bias=high。standing_state_file=todo.md を context tail 最高 ordinal 注入。global plan を recent attention 域に保持。
    example_source:
      product: LangChain
      url: https://www.langchain.com/blog/context-engineering-for-agents
      version: recency patterns
    field_values:
      rule_id: rule-recency
      recency_bias: high
    related_node_ids:
      - ContextOrderingRule
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-rule-recency
  - id: ContextOrderingRule-example-not-selection
    labels:
      zh: 排序规则非选择规则
      en: Ordering rule is not selection rule
      ja: ordering rule は selection rule ではない
    descriptions:
      zh: rule-selection-threshold 用 similarity_score 决定 admit/exclude；ContextOrderingRule 只分配已选 item 的 ordinal，不改变成员集合。
      en: rule-selection-threshold uses similarity_score for admit/exclude; ContextOrderingRule assigns ordinals to selected items only without changing membership.
      ja: rule-selection-threshold は similarity_score で admit/exclude。ContextOrderingRule は選択済み item の ordinal 割当のみ。membership 不変。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContextOrderingRule
      - ContextRule
    related_relation_ids: []
    source_claims:
      - claim-context-ordering-rule-design
parent_relation:
  id: ContextOrderingRule-is_a-ContextRule
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种上下文规则
    en: is a context rule
    ja: コンテキスト規則の一種
  definitions:
    zh: 每个 ContextOrderingRule 都是 ContextRule；其种差是专用于顺序分配的策略字段。
    en: Every ContextOrderingRule is a ContextRule distinguished by ordering-specific strategy fields.
    ja: すべての ContextOrderingRule は ContextRule で order 分配専用 strategy field という種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims:
    - claim-context-ordering-rule-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
