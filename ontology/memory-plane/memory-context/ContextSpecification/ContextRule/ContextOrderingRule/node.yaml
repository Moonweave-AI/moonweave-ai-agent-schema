schema: moonweave.ai/ontology-node/v1
id: ContextOrderingRule
kind: concept
status: review
labels:
  zh: 上下文排序规则
  en: context ordering rule
  ja: コンテキスト順序規則
semantics:
  short_definition:
    zh: 规定已选上下文项如何比较并形成稳定顺序的 ContextRule。
    en: A ContextRule specifying how selected context items are compared to form a stable order.
    ja: 選択済みコンテキスト項目の比較方法と安定順序を規定する ContextRule です。
  definition:
    zh: 上下文排序规则是一种 ContextRule；其种差是：它定义对两个或多个已选项进行比较的键、优先方向、平局处理与稳定性条件，例如消息角色优先、时间近因性、来源权威或检索排名。它不决定项目是否有资格进入，也不声明容量上限。
    en: A context ordering rule is a ContextRule that defines comparison keys, priority direction, tie-breaking, and stability for selected items, such as message-role precedence, recency, source authority, or retrieval rank. It does not decide eligibility or declare capacity ceilings.
    ja: コンテキスト順序規則は ContextRule の一種で、選択済み項目の比較キー、優先方向、同順位処理、安定性を定義します。例は役割優先、近時性、出典権威、検索順位です。採用資格や容量上限は決めません。
  why_needed:
    zh: 它使同一候选集合在同一规则版本下得到可重现顺序，并把顺序策略与容量预算、纳入条件分离。
    en: It makes ordering reproducible for the same candidate set under the same rule version and separates ordering policy from capacity and inclusion criteria.
    ja: 同じ候補集合と規則版から再現可能な順序を得て、順序方針を容量予算・採用条件から分離できます。
  includes:
    - zh: 纳入“system 角色先于 user；同角色按 created_at 降序；仍相同则按稳定 ID 升序”这类可执行比较规范。
      en: Includes executable comparison specifications such as “system before user; within a role sort created_at descending; then stable ID ascending.”
      ja: 「system を user より先に、同役割は created_at 降順、さらに同じなら安定 ID 昇順」のような実行可能比較仕様を含みます。
  excludes:
    - zh: 排除最大令牌数等 ContextBudget，以及决定某项能否进入的选择规则；前者计量容量，后者判定资格。
      en: Excludes token ceilings and other ContextBudgets, plus selection rules deciding whether an item may enter; those measure capacity or eligibility rather than order.
      ja: 最大トークン数などの ContextBudget と、項目の採用可否を決める選択規則を除外します。前者は容量、後者は資格を扱います。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: comparison_keys
      labels:
        zh: 比较键序列
        en: comparison keys
        ja: comparison keys
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按先后顺序列出用于比较两个已选上下文项的属性。
        en: Lists in precedence order the attributes used to compare two selected context items.
        ja: 二 selected context item を比較する attribute を precedence order で列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - instruction_authority
        - source_authority
        - observed_at
      source_claims:
        - claim-context-ordering-rule-003
    - id: direction
      labels:
        zh: 排序方向
        en: ordering direction
        ja: ordering direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明每个比较键采用升序、降序或显式优先序。
        en: Declares ascending, descending, or an explicit precedence order for each comparison key.
        ja: 各 comparison key の ascending・descending・explicit precedence order を宣言します。
      allowed_values: []
      pattern: null
      example_value: explicit-precedence-then-descending
      source_claims:
        - claim-context-ordering-rule-004
    - id: tie_breaker
      labels:
        zh: 并列决胜键
        en: tie breaker
        ja: tie breaker
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当主要比较键全部相等时给出确定性最终比较属性。
        en: Provides a deterministic final comparison attribute when all primary keys are equal.
        ja: primary key がすべて同値の際の deterministic final comparison attribute です。
      allowed_values: []
      pattern: null
      example_value: candidate_id
      source_claims:
        - claim-context-ordering-rule-005
    - id: stability
      labels:
        zh: 稳定排序要求
        en: stability requirement
        ja: stability requirement
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明比较结果相等时是否保持候选进入当前阶段的相对顺序。
        en: Declares whether equal items preserve their relative order on entry to the current phase.
        ja: comparison result が等しい item の phase entry relative order を保持するか宣言します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-context-ordering-rule-006
    - id: adjacency_constraints
      labels:
        zh: 邻接约束
        en: adjacency constraints
        ja: adjacency constraints
      datatype: array[string]
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 声明排序后仍必须保持相邻的调用—结果、消息—附件或其他成对项。
        en: Declares call–result, message–attachment, or other paired items that must remain adjacent after ordering.
        ja: ordering 後も adjacent に保つ call-result・message-attachment 等の paired item を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - tool_call:tool_result
      source_claims:
        - claim-context-ordering-rule-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContextOrderingRule-example-positive-001
    kind: positive
    labels:
      zh: 上下文排序规则正例
      en: Positive example of context ordering rule
      ja: コンテキスト順序規則の正例
    scenario_id: null
    descriptions:
      zh: 排序规则 order-authority-recency-v2 声明：系统指令先于任务状态；证据先按来源权威分组，同权威组内再按采集时间倒序；工具结果必须紧邻对应工具调用。
      en: "Ordering rule order-authority-recency-v2 states: system instructions precede task state; evidence is grouped by source authority and then sorted newest-first within a group; each tool result stays adjacent to its tool call."
      ja: 順序規則 order-authority-recency-v2 は、システム指示をタスク状態より前、証拠を出典権威で群分けし同群内は新しい順、各ツール結果を対応呼出しに隣接、と定めます。
    field_values:
      comparison_keys:
        - instruction_authority
        - source_authority
        - observed_at
      direction: explicit-precedence-then-descending
      tie_breaker: candidate_id
      stability: true
      adjacency_constraints:
        - tool_call:tool_result
      context_rule_id: order-authority-recency
      revision: "2"
      applicability_scope: assembled-model-input
      priority: 70
      condition_expression: candidate.kind in {instruction,evidence,tool_result}
      rule_effect: order_by_authority_then_recency_preserving_tool_adjacency
      context_specification_id: context-spec-standard-agent-call
    related_node_ids:
      - ContextOrderingRule
      - ContextAssembly
    related_relation_ids:
      - context_assembly_applies_ordering_rule
    expected_result:
      zh: 该运行可查询 ContextOrderingRule 以及方向保持不变的事实 context_assembly_applies_ordering_rule。
      en: The run can query ContextOrderingRule together with direction-preserving fact context_assembly_applies_ordering_rule.
      ja: この実行では ContextOrderingRule と方向を保持した事実 context_assembly_applies_ordering_rule を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、context_assembly_applies_ordering_rule 的 canonical 方向、概念定义和可用字段值。
      en: The specification defines reusable comparison and adjacency criteria without naming one run's final sequence; a ContextOrderingActivity applies it to concrete selected items.
      ja: このシナリオは実際の運用文脈、context_assembly_applies_ordering_rule の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ordering-rule-008
      - claim-context-ordering-rule-009
  - id: ContextOrderingRule-example-boundary-001
    kind: boundary
    labels:
      zh: 上下文排序规则边界例
      en: Boundary case for context ordering rule
      ja: コンテキスト順序規則の境界例
    scenario_id: null
    descriptions:
      zh: ContextBudget budget-32k 只声明输入上限和预留量，没有任意两个候选的比较函数或邻接约束；它限制排序结果可保留多少，但不是 ContextOrderingRule。
      en: ContextBudget budget-32k declares only input ceilings and reservations, with no pairwise comparator or adjacency constraint. It limits how much of an ordered result survives but is not ContextOrderingRule.
      ja: ContextBudget budget-32k は入力上限と予約量だけを宣言し、候補間比較関数や隣接制約を持ちません。順序結果の保持量を制限しますが ContextOrderingRule ではありません。
    field_values: {}
    related_node_ids:
      - ContextOrderingRule
      - ContextAssembly
      - ContextBudget
    related_relation_ids:
      - context_assembly_applies_ordering_rule
    expected_result:
      zh: ContextBudget 保持其原有类型，验证器不得凭关系共现把它提升为 ContextOrderingRule。
      en: ContextBudget retains its own type; validation must not promote it to ContextOrderingRule from relation co-occurrence.
      ja: ContextBudget は元の型を維持し、関係の共起だけで ContextOrderingRule へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 context_assembly_applies_ordering_rule 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: "Capacity and ordering answer different questions: a budget supplies quantitative bounds, while an ordering rule supplies reusable precedence or adjacency semantics."
      ja: 境界例は実在する対照ノードを示し、context_assembly_applies_ordering_rule の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-context-ordering-rule-010
      - claim-context-ordering-rule-011
