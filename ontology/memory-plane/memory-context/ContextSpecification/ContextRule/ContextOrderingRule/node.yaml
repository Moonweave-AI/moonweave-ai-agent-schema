schema: moonweave.ai/ontology-node/v1
id: ContextOrderingRule
kind: concept
status: accepted
labels:
  zh: 上下文排序规则
  en: Context Ordering Rule
  ja: コンテキスト順序規則
semantics:
  short_definition:
    zh: 声明上下文成员或来源角色应以何种稳定顺序排列的 ContextRule 子类型。
    en: A ContextRule subtype that declares a stable order for context members or source roles.
    ja: コンテキスト構成員または情報源役割をどの安定順で配置するかを宣言する ContextRule の下位型。
  definition:
    zh: ContextOrderingRule 是专门规定已准入成员、来源角色或 slot 排列顺序的 ContextRule。它可规定角色优先序和同角色的 tie-breaker，但不选择成员、不裁剪 token、不生成 Summary，也不证明模型注意、事实正确性或更高任务质量。一次实际重排属于 ContextOrderingActivity，并须另行记录输入和输出顺序。
    en: ContextOrderingRule is a ContextRule specialized to prescribe the arrangement of already-admitted members, source roles, or slots. It may prescribe role priority and an intra-role tie-breaker, but it does not select membership, trim tokens, generate a Summary, or prove model attention, factual correctness, or higher task quality. One actual reordering is ContextOrderingActivity and must record input and output order separately.
    ja: ContextOrderingRule は、既に受入済みの構成員、情報源役割、または slot の配置を規定する ContextRule の専門型です。役割優先順位と役割内 tie-breaker を規定できますが、構成員を選択せず、token を裁断せず、Summary を生成せず、モデル注意、事実正確性、タスク品質向上を証明しません。一回の実際の並替えは ContextOrderingActivity であり、入力・出力順を別途記録しなければなりません。
  why_needed:
    zh: 有限窗口中的位置会影响信息使用，但不同模型、任务和内容类型没有被证明存在一个通用最优顺序。显式排序规则使系统能复现其安排、区分排序与成员选择，并避免将某个位置策略误当作模型实际关注或性能保证。
    en: Position in a finite window can affect information use, but no universal optimal order is established across models, tasks, and content types. An explicit ordering rule lets a system reproduce its arrangement, distinguish order from membership selection, and avoid treating a placement strategy as proof of actual model attention or performance.
    ja: 有限ウィンドウ内の位置は情報利用に影響し得ますが、モデル、タスク、内容型を通じた普遍的最適順は確立されていません。明示的な順序規則により、システムは配置を再現し、順序を構成員選択と区別し、配置戦略を実際のモデル注意や性能の証明として扱わずに済みます。
  includes:
    - zh: 规则身份和版本、适用条件、来源角色或 slot 的有序列表、同类 tie-breaker 及优先级。
      en: Rule identity and revision, applicability condition, ordered source-role or slot list, intra-class tie-breaker, and precedence.
      ja: 規則 ID と改訂、適用条件、情報源役割または slot の順序付きリスト、同類内 tie-breaker、優先順位。
  excludes:
    - zh: 候选准入、成员删除、摘要替换、token 预算、对话事实的时间顺序、模型注意证明和提供商项目的实际 ID 链。
      en: Candidate admission, member deletion, summary replacement, token budget, chronological truth of conversation facts, proof of model attention, and actual provider-item ID chains.
      ja: 候補受入、構成員削除、要約置換、token 予算、会話事実の時系列真実、モデル注意の証明、実際のプロバイダー項目 ID 連鎖。
  semantic_kind: entity
  aliases:
    - placement policy
    - ordering policy
    - 上下文位置规则
engineering:
  explanation:
    zh: OpenAI Realtime 的 conversation.item.create 接受 previous_item_id，因此可在会话中追加或插入一个 item，并以 conversation.item.created 事件确认创建。这是提供商的具体序列操作，不是通用排序政策。Moonweave 将可复用的排列约束记录为 ContextOrderingRule，把每次对具体工件列表的重排记录为 ContextOrderingActivity；LangGraph 则将消息序列作为模型调用前可管理的状态。
    en: OpenAI Realtime conversation.item.create accepts previous_item_id, so a client can append or insert an item in a conversation and receive conversation.item.created confirmation. That is a provider-specific sequence operation, not a general ordering policy. Moonweave records reusable arrangement constraints as ContextOrderingRule and each reorder of concrete artifacts as ContextOrderingActivity; LangGraph likewise manages a message sequence as state before model invocation.
    ja: OpenAI Realtime の conversation.item.create は previous_item_id を受け取るため、クライアントは会話内に item を追加または挿入し、conversation.item.created で作成を確認できます。これはプロバイダー固有の順序操作であり、一般的順序方針ではありません。Moonweave は再利用可能な配置制約を ContextOrderingRule、具体的工件の各並替えを ContextOrderingActivity として記録し、LangGraph もモデル呼び出し前のメッセージ列を状態として管理します。
  typical_input:
    - description: OpenAI Realtime conversation item insertion event
      format: |
        {
          "type": "conversation.item.create",
          "previous_item_id": "msg_007",
          "item": {
            "type": "message",
            "role": "user",
            "content": [{"type": "input_text", "text": "Please continue."}]
          }
        }
    - description: Moonweave ordering-rule declaration input
      format: |
        {
          "ordering_rule_id": "ctx-order-rule-support",
          "revision": "v2",
          "ordered_source_roles": ["governing_instruction", "current_request", "retrieved_evidence", "conversation_history"],
          "tie_breaker": "retrieval_score_desc_then_artifact_id"
        }
  typical_output:
    - description: Provider creation confirmation and separate ordering-policy reference
      format: |
        {
          "type": "conversation.item.created",
          "previous_item_id": "msg_007",
          "ordering_rule_ref": "ctx-order-rule-support@v2"
        }
  reference_implementations:
    - name: OpenAI Realtime API
      url: https://developers.openai.com/api/reference/resources/realtime
      description: Documents conversation.item.create, previous_item_id insertion behavior, and conversation.item.created events.
    - name: LangGraph memory management
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents management of thread message state before model calls, including trimming and summarization.
structure:
  identity_keys: [rule_id, ordering_rule_id, revision]
  fields:
    - id: ordering_rule_id
      labels: {zh: 排序规则标识, en: ordering rule ID, ja: 順序規則 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个排序规则系列，不复用为一次排序活动、结果包或提供商 message ID。
        en: Stably identifies an ordering-rule series and is not reused as an ordering activity, result package, or provider message ID.
        ja: 順序規則系列を安定して識別し、順序活動、結果パッケージ、プロバイダーメッセージ ID として再利用しません。
      allowed_values: []
      pattern: "^ctx-order-rule-[A-Za-z0-9._-]+$"
      example_value: ctx-order-rule-support
      source_claims: [claim-context-ordering-realtime-insertion]
    - id: revision
      labels: {zh: 排序规则修订, en: ordering-rule revision, ja: 順序規則改訂}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分同一排序规则的不可变角色顺序、条件和 tie-breaker 版本。
        en: Distinguishes immutable role order, condition, and tie-breaker versions within one ordering-rule series.
        ja: 一つの順序規則系列内の不変な役割順、条件、tie-breaker 版を区別します。
      allowed_values: []
      pattern: "^v[0-9]+(?:[._-][A-Za-z0-9]+)*$"
      example_value: v2
      source_claims: [claim-context-ordering-design-boundary]
    - id: applicability_condition
      labels: {zh: 适用条件, en: applicability condition, ja: 適用条件}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 说明该排序政策在哪些装配范围或候选类型中可用；不表示该规则实际已被应用。
        en: States the assembly scope or candidate type in which this placement policy may be used; it does not say the rule was actually applied.
        ja: この配置方針を使える組立範囲または候補型を示し、規則が実際に適用されたことは述べません。
      allowed_values: []
      pattern: null
      example_value: scope == support-chat
      source_claims: [claim-context-ordering-design-boundary]
    - id: ordered_source_roles
      labels: {zh: 有序来源角色, en: ordered source roles, ja: 順序付き情報源役割}
      datatype: array
      required: true
      cardinality: {min: 1, max: null}
      definitions:
        zh: 定义应先后排列的 ContextSourceRole 名称序列；它不列出本次调用实际被选入的工件。
        en: Defines the sequence of ContextSourceRole names to be placed in order; it does not list artifacts actually selected for one call.
        ja: 順に配置する ContextSourceRole 名の列を定義し、一回の呼び出しで実際に選ばれた工件は列挙しません。
      allowed_values: []
      pattern: null
      example_value: [governing_instruction, current_request, retrieved_evidence, conversation_history]
      source_claims: [claim-context-ordering-realtime-insertion]
    - id: tie_breaker
      labels: {zh: 同类排序规则, en: intra-class tie-breaker, ja: 同類内 tie-breaker}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明同一来源角色内多个已保留成员的稳定排序方式；它不能引入或移除成员。
        en: Declares a stable ordering method for multiple retained members of one source role; it cannot add or remove members.
        ja: 一つの情報源役割に属する複数の保持済み構成員の安定順序方式を宣言し、構成員を追加または削除できません。
      allowed_values: []
      pattern: null
      example_value: retrieval_score_desc_then_artifact_id
      source_claims: [claim-context-ordering-design-boundary]
    - id: precedence
      labels: {zh: 优先级, en: precedence, ja: 優先順位}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 用于在同一规约与范围内解决多个排序规则冲突的数字优先级。
        en: Numeric priority used to resolve conflicts among multiple ordering rules in the same specification and scope.
        ja: 同じ仕様と範囲内の複数順序規則の衝突を解決する数値優先順位です。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims: [claim-context-ordering-design-boundary]
    - id: rule_kind
      labels: {zh: 固定规则种类, en: fixed rule kind, ja: 固定規則種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 必须为 ordering，以明确该子类型只安排位置而不处理成员选择或裁剪。
        en: Must be ordering to make explicit that this subtype arranges placement only and does not handle membership selection or trimming.
        ja: ordering でなければならず、この下位型が配置だけを扱い、構成員選択や裁断を扱わないことを明示します。
      allowed_values: [ordering]
      pattern: null
      example_value: ordering
      source_claims: [claim-context-ordering-design-boundary]
    - id: rule_id
      labels: {zh: 通用规则标识, en: base rule ID, ja: 基底ルール ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留 ContextRule 的可复用规则身份；ordering_rule_id 则标识该身份下的排序专用声明。
        en: Retains the reusable ContextRule identity, while ordering_rule_id identifies the ordering-specific declaration under that identity.
        ja: 再利用可能な ContextRule の ID を保持し、ordering_rule_id はその ID の下にある順序付け専用の宣言を識別します。
      allowed_values: []
      pattern: '^ctx-rule-[A-Za-z0-9._@-]+$'
      example_value: ctx-rule-support-ordering
      source_claims: [claim-context-ordering-design-boundary]
    - id: action
      labels: {zh: 规则动作, en: rule action, ja: ルール操作}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明规则对已入选成员执行 order_by_source_role 操作；它不会选择、删除、压缩或调用模型。
        en: Declares the order_by_source_role action applied to already admitted members; it does not select, delete, compress, or invoke a model.
        ja: すでに採用されたメンバーへ order_by_source_role 操作を適用すると宣言し、選択、削除、圧縮、モデル呼び出しは行いません。
      allowed_values: [order_by_source_role]
      pattern: null
      example_value: order_by_source_role
      source_claims: [claim-context-ordering-design-boundary]
  constraints:
    - id: context-ordering-rule-membership-preservation
      severity: error
      expression_language: plain
      expression: When an execution claims to apply this rule, every output ContextArtifact membership must equal the input membership as a set; additions require ContextIngressEvent or selection facts and removals require ContextExclusion or trimming facts. This rule itself records neither set.
      explanation:
        zh: 排序只改变位置；成员变化必须由准入、选择、排除或裁剪的独立事实解释。
        en: Ordering changes placement only; membership changes need separate admission, selection, exclusion, or trimming facts.
        ja: 順序付けは配置だけを変え、構成員変更には別個の受入、選択、除外、裁断事実が必要です。
      source_claims: [claim-context-ordering-design-boundary]
    - id: context-ordering-rule-no-attention-guarantee
      severity: warning
      expression_language: plain
      expression: A ContextOrderingRule may state a reproducible placement policy but must not assert that the placement guarantees model attention, factual correctness, or superior performance without separate task- and model-specific evaluation evidence.
      explanation:
        zh: 位置影响是经验现象，不是将某项放在某处即可保证被模型使用的通用定理。
        en: Positional effects are empirical, not a universal theorem that placing an item somewhere guarantees model use.
        ja: 位置効果は経験的なものであり、項目をある位置に置けばモデル利用が保証されるという普遍定理ではありません。
      source_claims: [claim-context-ordering-lost-in-the-middle]
  required_relations: []
examples:
  - id: context-ordering-rule-example-positive-role-sequence

    labels: {zh: 角色优先的支持会话顺序, en: Role-prioritized support-chat order, ja: 役割優先のサポート対話順}

    descriptions:
      zh: Cursor @Files/@Code 引用 + codebase indexing 自动裁剪；Claude 200K window + cache_control:{type:ephemeral}；Lost in the Middle 首尾优先排序。
      en: Cursor @Files/@Code citation + codebase indexing auto-trim; Claude 200K window + cache_control:{type:ephemeral}; Lost in the Middle head/tail priority ordering.
      ja: Cursor @Files/@Code + codebase indexing auto-trim。Claude 200K + cache_control ephemeral。Lost in the Middle 首尾優先 ordering。
    field_values:
      rule_id: ctx-rule-support-ordering
      ordering_rule_id: ctx-order-rule-support
      revision: v2
      applicability_condition: scope == support-chat
      action: order_by_source_role
      ordered_source_roles: [governing_instruction, current_request, retrieved_evidence, conversation_history]
      tie_breaker: retrieval_score_desc_then_artifact_id
      precedence: 20
      rule_kind: ordering
    related_node_ids: [ContextOrderingRule, ContextRule, ContextSourceRole]
    related_relation_ids: [ContextOrderingRule-is_a-ContextRule]

    source_claims: [claim-context-ordering-design-boundary]
  - id: context-ordering-rule-example-counterexample-removes-history

    labels: {zh: 排序时删除历史, en: Removing history while ordering, ja: 順序付け中に履歴を削除する}

    descriptions:
      zh: 反例：未 budget/trim 全量 MessageHistory 送入模型，违反 Lost in the Middle (Liu et al. 2023) U 型曲线。
      en: Counterexample: full MessageHistory to model without budget/trim, violating Lost in the Middle (Liu et al. 2023) U-curve.
      ja: 反例：budget/trim なし MessageHistory 全量を model へ。Lost in the Middle U 型 curve 違反。
    field_values:
      ordering_rule_id: ctx-order-rule-drop-history
      revision: v1
      action: place_retrieval_first_and_delete_oldest
      deleted_message_count: 4
      rule_kind: ordering
    related_node_ids: [ContextOrderingRule, ContextTrimmingActivity, ContextExclusion]
    related_relation_ids: []

    source_claims: [claim-context-ordering-design-boundary]
  - id: context-ordering-rule-example-boundary-provider-insertion

    labels: {zh: 提供商项目插入, en: Provider item insertion, ja: プロバイダー項目挿入}

    descriptions:
      zh: Claude prompt caching 缓存 token vs mutable context 边界；Cursor 部分 file read vs 完整 Document 边界。
      en: Claude prompt caching cached tokens vs mutable context boundary; Cursor partial file read vs full Document boundary.
      ja: Claude prompt caching 缓存 token vs mutable context 境界。Cursor 部分 file read vs 完全 Document 境界。
    field_values:
      event_type: conversation.item.create
      previous_item_id: msg_007
      ordering_rule_id: null
      revision: null
    related_node_ids: [ContextOrderingRule]
    related_relation_ids: []

    source_claims: [claim-context-ordering-realtime-insertion]
  - id: context-ordering-rule-example-instance-support-v2

    labels: {zh: "实例：支持会话排序规则 v2", en: "Instance: support-chat ordering rule v2", ja: "インスタンス：サポート対話順序規則 v2"}

    descriptions:
      zh: RAG ContextAssembly：system → retrieved docs (head) → user query → recent messages (tail)；MemGPT main_context merge recall results。
      en: RAG ContextAssembly: system → retrieved docs (head) → user query → recent messages (tail); MemGPT main_context merges recall results.
      ja: RAG ContextAssembly system→retrieved docs(head)→user query→recent messages(tail)。MemGPT main_context merge recall。
    field_values:
      rule_id: ctx-rule-support-ordering
      ordering_rule_id: ctx-order-rule-support
      revision: v2
      applicability_condition: scope == support-chat
      action: order_by_source_role
      ordered_source_roles: [governing_instruction, current_request, retrieved_evidence, conversation_history]
      tie_breaker: retrieval_score_desc_then_artifact_id
      precedence: 20
      rule_kind: ordering
    related_node_ids: [ContextOrderingRule, ContextRule, ContextSpecification]
    related_relation_ids: [ContextOrderingRule-is_a-ContextRule]

    source_claims: [claim-context-ordering-design-boundary, claim-context-ordering-lost-in-the-middle]
parent_relation:
  id: ContextOrderingRule-is_a-ContextRule
  predicate: is_a
  target: concept:ContextRule
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是上下文规则的排序子类型
    en: is an ordering subtype of context rule
    ja: コンテキスト規則の順序下位型である
  definitions:
    zh: ContextOrderingRule —is_a→ ContextRule 表示每个排序规则都是行为规则，但其政策效果仅限于排列位置。
    en: ContextOrderingRule —is_a→ ContextRule means every ordering rule is a behavioral rule whose policy effect is limited to placement order.
    ja: ContextOrderingRule —is_a→ ContextRule は、各順序規則が配置順だけに方針効果を限定した行動規則であることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定规则实例数量；一个上位概念可有多个排序规则子类实例。
    en: Classification does not prescribe rule-instance count; one parent concept can have many ordering-rule instances.
    ja: 分類関係は規則インスタンス数を規定せず、一つの親概念は多くの順序規則インスタンスを持てます。
  inverse_reading:
    predicate: has_ordering_rule_subtype
    labels: {zh: 具有排序规则子类型, en: has ordering-rule subtype, ja: 順序規則下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-context-ordering-design-boundary]
  distinct_fact_rationale:
    zh: 此关系仅陈述类型归属，不陈述具体项目插入、实际重排、成员选择、裁剪或模型关注。
    en: This relation states type membership only, not concrete item insertion, actual reordering, membership selection, trimming, or model attention.
    ja: この関係は型所属だけを表し、具体的項目挿入、実際の並替え、構成員選択、裁断、モデル注意を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-realtime-api
    title: OpenAI Realtime API reference
    source_type: official-documentation
    url: https://developers.openai.com/api/reference/resources/realtime
    relevance: Documents conversation.item.create, previous_item_id placement, and conversation.item.created events.
  - id: langgraph-memory
    title: LangGraph memory and conversation-history management
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents message-state management before model invocation, including trimming and summarization.
  - id: lost-in-the-middle
    title: "Lost in the Middle: How Language Models Use Long Contexts"
    source_type: academic-paper
    url: https://arxiv.org/abs/2307.03172
    relevance: Reports position-dependent long-context performance effects and does not establish one universal optimal ordering policy.
  - id: semantic-kernel-chat-history
    title: Semantic Kernel chat-history reducers
    source_type: official-documentation
    url: https://learn.microsoft.com/en-in/semantic-kernel/concepts/ai-services/chat-completion/chat-history
    relevance: Documents reducer configuration and reduction of chat history before completion services consume it.
  - id: langchain-context-concepts
    title: LangChain context concepts
    source_type: official-documentation
    url: https://docs.langchain.com/oss/python/concepts/context
    relevance: Distinguishes runtime context, message history, and cross-conversation persistent stores.
source_claims:
  - id: claim-context-ordering-realtime-insertion
    source: openai-realtime-api
    supports: The OpenAI Realtime API reference documents conversation.item.create with previous_item_id for placement relative to conversation items and the conversation.item.created confirmation event. Moonweave distinguishes this provider-specific mutation operation from a reusable ordering policy.
    locator: "conversation.item.create event and conversation.item.created event"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-ordering-lost-in-the-middle
    source: lost-in-the-middle
    supports: The paper reports that long-context performance can depend on where relevant information appears. It does not establish that one ordering works universally or that placement proves attention; Moonweave therefore records placement policy without a quality guarantee.
    locator: "Abstract and position-sensitive long-context retrieval results"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-context-ordering-design-boundary
