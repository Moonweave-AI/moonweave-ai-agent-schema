source_claims:
  - id: claim-context-ordering-rule-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents multiple context classes and mechanisms that preserve recent content while compressing older history. ContextOrderingRule is Moonweave's reusable specification for precedence, comparison, and adjacency among such selected items; it is distinct from executing the order.
    locator: Context engineering in Deep Agents > Input context and Summarization > preserved recent messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-002
    source: lit-agent-memory-as-action
    supports: Memory as Action replaces fixed memory heuristics with policy-governed choices over memory operations. Moonweave generalizes that control idea into ContextRule and specializes comparison and adjacency criteria as ContextOrderingRule; the taxonomy is a design inference.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes system-prompt inputs, runtime context, memory, and preserved recent messages. Moonweave makes their reusable ordering dimensions explicit as comparison keys.
    locator: Context engineering in Deep Agents > Input context and Summarization > preserved recent messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-004
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP exposes priority and lastModified hints that clients can use for prioritization and recency sorting. Moonweave records the required direction explicitly.
    locator: Resources > Annotations > priority and lastModified
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-005
    source: lit-agent-memory-as-action
    supports: The paper formalizes context-management choices as actions over state. Moonweave adds a deterministic tie breaker so replay of the same state does not yield an arbitrary order.
    locator: Paper > §2.2 Formalizing Context Management as a Decision Process
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-006
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents preserves a defined recent-message segment during summarization. Moonweave makes relative-order preservation an explicit ordering invariant.
    locator: Context engineering in Deep Agents > Summarization > preserved recent messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-007
    source: eng-fw-langchain-context-engineering
    supports: The official guide treats model context as structured messages rather than an untyped bag. Moonweave records adjacency when a semantic pair must survive reordering.
    locator: Context engineering in agents > Model context > selecting and structuring messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-008
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents distinguishes system-prompt inputs, runtime context, memory, and compressed history, and preserves recent messages during summarization. The example makes their reusable precedence and adjacency constraints explicit as a Moonweave ordering rule.
    locator: Context engineering in Deep Agents > Input context and Summarization > preserved recent messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-009
    source: lit-agent-memory-as-action
    supports: Memory as Action argues for policy-controlled memory operations rather than fixed heuristics. Moonweave represents a selected reusable ordering policy as ContextOrderingRule; the concrete criteria in the example are design choices.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-010
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents token-window thresholds separately from choices about which context remains active. Moonweave preserves that separation between quantitative ContextBudget and comparative ContextOrderingRule.
    locator: Context engineering in Deep Agents > Input context and Summarization > preserved recent messages
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-011
    source: lit-agent-memory-as-action
    supports: Memory as Action distinguishes the policy for choosing memory actions from finite-context limitations. The budget-versus-ordering-rule boundary is Moonweave's explicit ontology interpretation of those different roles.
    locator: Paper > Section 3.1 Overview > Prune&Write memory-action policy
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-context-ordering-rule-012
    source: eng-fw-langchain-context-engineering
    supports: The explicit comparison keys and tie-breaker make rule-order-v3 executable and replayable.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-ordering-rule-013
    source: eng-fw-langchain-context-engineering
    supports: A maximum token count constrains total capacity but provides no ordering behavior.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-context-ordering-rule-014
    source: eng-fw-langchain-context-engineering
    supports: LangChain lets applications control the messages, tools, and other model-context components supplied to each call; Moonweave represents deterministic comparison behavior as a ContextRule specialization.
    locator: Context engineering in agents > What you can control > Model context and Life-cycle context
    evidence_kind: design-inference
    confidence: high
    review_status: pending
