source_claims:
  - id: claim-ingestion-policy-version
    source: open-policy-agent
    supports: Open Policy Agent documents policies as rules evaluated over structured input. Moonweave publishes an ingestion policy as a complete immutable rule version rather than an unversioned advice text or one run's changing log.
    locator: Open Policy Agent policy language overview and rule evaluation model
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce message digests for detecting changes. Moonweave stores a policy digest over complete serialized rules to detect drift behind the same policy version.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes independently identifiable entities and activities. Moonweave identifies a policy specification separately from the runs, resources, documents, and decisions constrained by it.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-applicability
    source: open-policy-agent
    supports: Open Policy Agent evaluates rules against structured input. Moonweave uses explicit applicability scope and frozen run attributes to decide whether one policy version governs a run rather than relying on policy name alone.
    locator: Open Policy Agent policy language data and input model
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-source
    source: open-policy-agent
    supports: Open Policy Agent policy rules can constrain structured input values. Moonweave declares allowed source kinds and maximum resource bytes as normative pre-read constraints rather than facts that a resource was read.
    locator: Open Policy Agent policy language rule and input evaluation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-policy-loader
    source: langchain-document-loaders
    supports: LangChain documents loader interfaces and integrations. Moonweave records explicitly allowed loader versions separately from actual loader invocation by a particular run.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-transformation
    source: w3c-prov-o
    supports: PROV-O keeps activities and generated entities distinct. Moonweave treats normalization and deduplication profile references as policy constraints and preserves actual transform and duplicate outcomes in separate activity and decision facts.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-policy-failure
    source: open-policy-agent
    supports: Policy rules state required responses to evaluated conditions. Moonweave models stop, quarantine, skip, or retry as normative strategy while actual errors and retry events remain runtime facts.
    locator: Open Policy Agent policy language rule evaluation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-policy-runtime-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes activity occurrences and entities used or generated. Moonweave keeps actual run inputs, timestamps, outputs, and errors separate from the policy specification that governs them.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-policy-boundary
    source: nodejs-crypto
    supports: Node.js documents digest generation through createHash. Moonweave requires a versioned policy digest before guidance becomes auditable policy because unversioned text cannot be verified as the rule set applied to a run.
    locator: Node.js crypto createHash API and digest examples
    evidence_kind: ontology-design-inference
    confidence: medium
