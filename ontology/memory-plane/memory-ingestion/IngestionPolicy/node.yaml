schema: moonweave.ai/ontology-node/v1
id: IngestionPolicy
kind: concept
labels:
  zh: 摄入政策
  en: Ingestion policy
  ja: 取込ポリシー
semantics:
  short_definition:
    zh: 规定允许来源、加载方式、速率与失败处理的版本化 ingest 规范。
    en: Versioned ingest specification governing allowed sources, loaders, rate limits, and failure handling.
    ja: 許可 source/loader/レート/failure 処理を定める versioned ingest 仕様。
  definition:
    zh: IngestionPolicy 是由 policy_id+policy_version 标识的可复用规范，约束 IngestionRun 的来源类型、loader 选择、normalization/dedup profile、max document size、rate limits、retry 与 failure_strategy；不是运行活动或 DeduplicationDecision。
    en: IngestionPolicy is a reusable specification identified by policy_id plus policy_version constraining IngestionRun source types, loader selection, normalization/dedup profiles, max document size, rate limits, retry, and failure_strategy; not a run activity or DeduplicationDecision.
    ja: IngestionPolicy は policy_id+policy_version 識別の reusable 仕様。IngestionRun の source type/loader 選択/normalization-dedup profile/max document size/rate limit/retry/failure_strategy を制約。run activity/DeduplicationDecision ではない。
  why_needed:
    zh: 把规范性约束与实际运行和 dedup 决定分开，使多 run 复用同一 policy@version 并可审计越权 ingest。
    en: Separates normative constraints from runs and dedup decisions so multiple runs reuse policy@version with auditable out-of-scope ingest detection.
    ja: normative 制約/run/dedup decision を分離し複数 run が policy@version 再利用、scope 外 ingest 監査可能に。
  includes:
    - zh: 纳入来源白名单、loader 范围、max file size、rate limit、retry/backoff 与 quarantine 策略。
      en: Includes source allowlists, loader ranges, max file size, rate limits, retry/backoff, and quarantine strategy.
      ja: source allowlist/loader 範囲/max file size/rate limit/retry-backoff/quarantine strategy。
  excludes:
    - zh: 排除 IngestionRun、DeduplicationDecision 与 MemoryWrite。
      en: Excludes IngestionRun, DeduplicationDecision, and MemoryWrite.
      ja: IngestionRun/DeduplicationDecision/MemoryWrite を除外。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: IngestionPolicy 映射生产 ingest guardrails：allowed_source_types/loader_refs、normalization_profile_ref、deduplication_strategy_ref、failure_strategy（quarantine_and_continue/stop/retry）；max document size 与 rate limits 在 run 前检查；policy 声明不记录单次错误实例。
    en: "IngestionPolicy maps production ingest guardrails — allowed_source_types/loader_refs, normalization_profile_ref, deduplication_strategy_ref, failure_strategy (quarantine_and_continue/stop/retry); max document size and rate limits checked before run; policy declares rules without recording single error instances."
    ja: IngestionPolicy=production ingest guardrails 写像。allowed_source_types/loader_refs/normalization_profile_ref/deduplication_strategy_ref/failure_strategy。max document size/rate limit は run 前 check。policy は rule 宣言のみ（単一 error instance 非記録）。
  typical_input:
    - description: Policy specification for ingest runs
      format: |
        {
          "policy_id": "ingest-policy",
          "policy_version": "4",
          "max_document_size_bytes": 52428800,
          "rate_limit_rpm": 120,
          "retry_max_attempts": 3
        }
      source_claims: [claim-ingestion-policy-design]
  typical_output:
    - description: Run governance reference
      format: |
        ingest-run-17.governed_by -> ingest-policy@4
      source_claims: [claim-ingestion-policy-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      description: Configurable transformations and dedup behavior governed by policy.
    - name: Mem0 API rate limits
      url: https://docs.mem0.ai
      description: Platform rate limits and retry patterns for memory ingestion.
structure:
  identity_keys: [policy_id, policy_version]
  fields:
    - id: policy_id
      labels: {zh: 政策标识, en: Policy identifier, ja: policy 識別子}
      definitions:
        zh: 稳定标识政策系列。
        en: Stable identifier for policy series.
        ja: policy 系列の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ingest-policy
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: policy_version
      labels: {zh: 政策版本, en: Policy version, ja: policy 版}
      definitions:
        zh: 不可变规范版本号；run 必须引用确切 version。
        en: Immutable specification version; runs must reference exact version.
        ja: immutable 仕様版。run は exact version ref 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "4"
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: applicability_scope
      labels: {zh: 适用范围, en: Applicability scope, ja: applicability scope}
      definitions:
        zh: 声明 policy 适用的 tenant、corpus 或环境。
        en: Declares tenant, corpus, or environment where policy applies.
        ja: policy 適用 tenant/corpus/environment 宣言。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tenant-legal-production
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: allowed_source_types
      labels: {zh: 允许来源类型, en: Allowed source types, ja: 許可 source type}
      definitions:
        zh: 允许读取的 IngestibleResource 子类型列表。
        en: List of allowed IngestibleResource subtype names.
        ja: 許可 IngestibleResource subtype 名リスト。
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [FileResource, DatabaseTable]
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: allowed_loader_refs
      labels: {zh: 允许加载器引用, en: Allowed loader references, ja: 許可 loader ref}
      definitions:
        zh: 许可的 DocumentLoader id/version 范围；source 允许不自动授权所有 loader。
        en: Permitted DocumentLoader id/version ranges; allowed source does not authorize every loader.
        ja: 許可 DocumentLoader id/version 範囲。source 許可≠全 loader 許可。
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [loader-pdf:^3.2, loader-sql:^2.1]
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: normalization_profile_ref
      labels: {zh: 规范化配置引用, en: Normalization profile reference, ja: normalization profile ref}
      definitions:
        zh: 引用 normalization 阶段采用的不可变 profile。
        en: Reference to immutable profile used in normalization phase.
        ja: normalization phase で用いる immutable profile ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: normalization-profile:legal-v5
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: deduplication_strategy_ref
      labels: {zh: 去重策略引用, en: Deduplication strategy reference, ja: dedup strategy ref}
      definitions:
        zh: 引用 dedup 键、算法与阈值规范；实际 outcome 由 DeduplicationDecision 记录。
        en: Reference to dedup key, algorithm, and threshold spec; actual outcome recorded by DeduplicationDecision.
        ja: dedup key/algorithm/threshold 仕様 ref。actual outcome は DeduplicationDecision 記録。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dedupe-strategy:content-digest-v2
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: failure_strategy
      labels: {zh: 失败处置策略, en: Failure strategy, ja: failure strategy}
      definitions:
        zh: stop、skip、quarantine_resource_and_continue 或 retry_with_backoff 策略类。
        en: Strategy class stop, skip, quarantine_resource_and_continue, or retry_with_backoff.
        ja: stop/skip/quarantine_resource_and_continue/retry_with_backoff 策略 class。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: quarantine_resource_and_continue
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: max_document_size_bytes
      labels: {zh: 最大文档大小, en: Max document size bytes, ja: 最大 document size bytes}
      definitions:
        zh: 单次 ingest 允许的最大原始/规范化文档字节数；超限按 failure_strategy 处置。
        en: Maximum raw or normalized document bytes per ingest; overflow handled per failure_strategy.
        ja: 単回 ingest 許容最大 raw/normalized document bytes。超過は failure_strategy 処理。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 52428800
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: rate_limit_rpm
      labels: {zh: 速率限制, en: Rate limit RPM, ja: rate limit RPM}
      definitions:
        zh: 每分钟最大 ingest 运行或 API 调用次数；0 表示无限制。
        en: Maximum ingest runs or API calls per minute; 0 means unlimited.
        ja: 毎分最大 ingest run/API 呼出し回数。0=無制限。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 120
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
    - id: retry_max_attempts
      labels: {zh: 最大重试次数, en: Max retry attempts, ja: max retry attempts}
      definitions:
        zh: 阶段失败时允许的最大重试次数（配合 failure_strategy retry）。
        en: Maximum retry attempts on phase failure when failure_strategy includes retry.
        ja: phase failure 時最大 retry 回数（failure_strategy retry 時）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3
      allowed_values: []
      source_claims: [claim-ingestion-policy-design]
  constraints: []
  required_relations: []
examples:
  - id: IngestionPolicy-example-legal-v4
    labels:
      zh: 法务生产政策 v4
      en: Legal production policy v4
      ja: legal production policy v4
    descriptions:
      zh: ingest-policy@4 允许 FileResource+DatabaseTable、loader-pdf:^3.2、max_document_size=50MB、rate_limit_rpm=120、retry_max_attempts=3、failure_strategy=quarantine_resource_and_continue。
      en: ingest-policy@4 allows FileResource+DatabaseTable, loader-pdf:^3.2, max_document_size=50MB, rate_limit_rpm=120, retry_max_attempts=3, failure_strategy=quarantine_resource_and_continue.
      ja: ingest-policy@4：FileResource+DatabaseTable、loader-pdf:^3.2、max 50MB、120rpm、retry 3、quarantine_resource_and_continue。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: policy spec
    field_values:
      policy_id: ingest-policy
      policy_version: "4"
      applicability_scope: tenant-legal-production
      max_document_size_bytes: 52428800
      rate_limit_rpm: 120
      retry_max_attempts: 3
    related_node_ids: [IngestionPolicy, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-ingestion-policy-design]
  - id: IngestionPolicy-example-mem0-limits
    labels:
      zh: Mem0 速率与重试
      en: Mem0 rate and retry
      ja: Mem0 rate/retry
    descriptions:
      zh: 对接 Mem0 API 时 policy 映射 platform rate limits；retry_max_attempts=3 对应 429/5xx exponential backoff；deduplication_strategy_ref 可指向 Mem0 deduplicate:true。
      en: When integrating Mem0 API, policy maps platform rate limits; retry_max_attempts=3 matches 429/5xx exponential backoff; deduplication_strategy_ref may point to Mem0 deduplicate:true.
      ja: Mem0 API 統合時 policy が platform rate limit 写像。retry_max_attempts=3→429/5xx exponential backoff。deduplication_strategy_ref→Mem0 deduplicate:true 可。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: rate limits
    field_values:
      rate_limit_rpm: 60
      retry_max_attempts: 3
      deduplication_strategy_ref: mem0-deduplicate-v1
    related_node_ids: [IngestionPolicy, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-ingestion-policy-design]
  - id: IngestionPolicy-example-not-run
    labels:
      zh: 政策非运行
      en: Policy is not run
      ja: policy は run ではない
    descriptions:
      zh: ingest-run-17 记录 policy@4 的实际执行与错误；ingest-policy@4 是 immutable 规范——合规运行引用 policy 但不替代 policy 对象。
      en: ingest-run-17 records actual execution and errors of policy@4; ingest-policy@4 is immutable specification—compliant runs reference policy without replacing the policy object.
      ja: ingest-run-17=policy@4 実実行/error 記録。ingest-policy@4=immutable 仕様。compliant run は policy ref するが policy object 置換不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestionPolicy, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-ingestion-policy-design]
parent_relation: null
relations: []
