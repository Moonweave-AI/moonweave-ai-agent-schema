schema: moonweave.ai/ontology-node/v1
id: IngestionPolicy
kind: concept
status: accepted
labels:
  zh: 版本化摄入治理政策
  en: Versioned ingestion-governance policy
  ja: 版付き取込み統治方針
semantics:
  short_definition:
    zh: 在确定适用范围内规定允许来源、加载器、转换、去重和失败处置的不可变版本化规范。
    en: An immutable versioned specification that governs allowed sources, loaders, transformations, deduplication, and failure handling within a determinate scope.
    ja: 確定した適用範囲内で許可ソース、ローダー、変換、重複排除、失敗処理を規定する不変の版付き仕様です。
  definition:
    zh: >-
      IngestionPolicy 是以 policy_id、policy_version、政策摘要和适用范围标识的规范实体。它声明允许来源类别与加载器、
      资源限制、规范化配置、去重策略和失败策略，供 IngestionRun 在开始时冻结并遵守。它不是一次运行、
      某次资源读取、加载器、规范化活动、去重决定、可观测性事件或记忆写入，也不记录某次执行的实际结果。
    en: >-
      IngestionPolicy is a specification entity identified by policy_id, policy_version, policy digest, and applicability
      scope. It declares allowed source kinds and loaders, resource limits, normalization profile, deduplication strategy,
      and failure strategy for an IngestionRun to freeze and follow at start. It is not one run, resource read, loader,
      normalization activity, deduplication decision, observability event, or memory write and records no actual outcome
      of one execution.
    ja: >-
      IngestionPolicy は policy_id、policy_version、方針ダイジェスト、適用範囲で識別される仕様実体です。IngestionRunが開始時に
      固定して従うための許可ソース種別とローダー、資源制限、正規化プロファイル、重複排除戦略、失敗戦略を宣言します。
      一回の実行、資源読取り、ローダー、正規化活動、重複排除決定、可観測性イベント、記憶書込みではなく、一回の実行の
      実際の結果を記録しません。
  why_needed:
    zh: 将应遵守的版本化规则与运行实际发生的读取、阶段、错误和决定分离，使合规性可以逐运行评估而不篡改历史。
    en: Separates versioned rules that ought to be followed from actual reads, phases, errors, and decisions of a run so compliance can be assessed per run without rewriting history.
    ja: 従うべき版付き規則を実行で実際に起きた読取り、フェーズ、エラー、決定から分離し、履歴を書き換えず実行ごとに適合性を評価可能にします。
  includes:
    - zh: 具有明确范围和摘要的来源白名单、加载器版本范围、资源大小限制、规范化与去重配置以及失败隔离或停止策略。
      en: Source allowlists, loader-version ranges, resource-size limits, normalization and deduplication configuration, and failure quarantine or stop strategy with explicit scope and digest.
      ja: 明示的な範囲とダイジェストを持つソース許可リスト、ローダー版範囲、資源サイズ制限、正規化と重複排除設定、失敗隔離または停止戦略を含みます。
  excludes:
    - zh: 实际运行状态、资源或文档输出、一次加载调用、去重结果、访问授权决定、未版本化的建议文本和在运行后临时修改的配置。
      en: Actual run status, resource or Document output, one loader invocation, deduplication outcome, access-authorization decision, unversioned advice text, and configuration modified ad hoc after run start.
      ja: 実際の実行状態、資源またはDocument出力、一回のローダー呼出し、重複排除結果、アクセス認可決定、未版付き助言文、実行開始後に臨時変更された設定を除きます。
  semantic_kind: specification
  aliases:
    - ingestion governance specification
    - run policy version
engineering:
  explanation:
    zh: >-
      政策发布时会序列化全部规则、计算政策摘要并分配不可变版本。运行开始前解析适用范围，选择一个确切政策版本，
      将政策引用和摘要写入运行清单；运行期间的资源、加载器和阶段证据可以据此核验，但失败、重试和输出仍记录在运行及其子活动上。
    en: >-
      At publication, a policy serializes its complete rules, calculates a policy digest, and assigns immutable version.
      Before run start, applicability scope is evaluated, one exact policy version is selected, and reference and digest
      are written into run manifest. Resource, loader, and phase evidence during execution can be checked against it, while
      failures, retries, and outputs remain on the run and its child activities.
    ja: >-
      発行時に方針は完全な規則を直列化し、方針ダイジェストを計算して不変版を割り当てます。実行開始前に適用範囲を評価し、
      一つの正確な方針版を選んで参照とダイジェストを実行マニフェストへ書きます。実行中の資源、ローダー、フェーズ証拠は
      これに対して検証できますが、失敗、再試行、出力は実行とその子活動に残ります。
  typical_input:
    - description: Policy publication definition
      format: |
        {
          "policy_id": "ingestion-policy-42",
          "policy_version": "3",
          "applicability_scope": "tenant:legal/environment:production",
          "allowed_source_kinds": ["file", "object", "database-row"],
          "allowed_loader_refs": ["loader-pdf@3.2.1", "loader-json@2.0.0"],
          "max_resource_bytes": 10485760,
          "failure_strategy": "quarantine-and-continue"
        }
  typical_output:
    - description: Immutable policy reference for a run
      format: |
        {
          "policy_ref": "ingestion-policy-42-v3",
          "policy_digest": "sha256:ingestion-policy-42-v3",
          "normalization_profile_ref": "unicode-nfc-clean-v1",
          "deduplication_strategy_ref": "exact-id-and-digest",
          "published_at": "2026-07-18T08:00:00Z"
        }
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents policy rules evaluated against structured input for authorization and governance decisions.
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for producing a digest over serialized policy rules.
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents versioned loader integrations that a policy can allow or deny for source parsing.
structure:
  identity_keys:
    - policy_id
    - policy_version
    - policy_digest
  fields:
    - id: policy_id
      labels:
        zh: 政策标识
        en: policy ID
        ja: 方針ID
      definitions:
        zh: 稳定标识政策系列，不是某次运行标识、策略结果、加载器标识或动态配置键。
        en: Stably identifies policy series rather than one run ID, strategy outcome, loader ID, or dynamic configuration key.
        ja: 一回の実行ID、戦略結果、ローダーID、動的設定キーではなく、方針系列を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingestion-policy-42
      source_claims:
        - claim-ingestion-policy-identity
    - id: policy_version
      labels:
        zh: 政策版本
        en: policy version
        ja: 方針版
      definitions:
        zh: 固定该政策系列的一版完整规则，不允许运行开始后静默改写同一版本。
        en: Pins one complete rule version of policy series and does not permit silent rewrite of that version after a run starts.
        ja: 方針系列の一つの完全規則版を固定し、実行開始後にその版を黙って書き換えることを許しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-ingestion-policy-version
    - id: policy_digest
      labels:
        zh: 政策摘要
        en: policy digest
        ja: 方針ダイジェスト
      definitions:
        zh: 记录完整序列化规则的带算法标记摘要，以检测同一政策版本引用背后的规则漂移。
        en: Records algorithm-tagged digest of complete serialized rules to detect rule drift behind the same policy-version reference.
        ja: 同じ方針版参照の背後にある規則ドリフトを検出するため、完全に直列化された規則のアルゴリズム付きダイジェストを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:ingestion-policy-42-v3
      source_claims:
        - claim-ingestion-policy-digest
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: 適用範囲
      definitions:
        zh: 声明政策适用的租户、环境、摄入通道或集合类别，使运行能够判断此版本是否应治理自身。
        en: Declares tenant, environment, ingestion channel, or collection class to which policy applies so a run can decide whether this version should govern it.
        ja: 実行がこの版に統治されるべきか判断できるよう、方針が適用されるテナント、環境、取込みチャネル、集合分類を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: tenant:legal/environment:production
      source_claims:
        - claim-ingestion-policy-applicability
    - id: allowed_source_kinds
      labels:
        zh: 允许来源类别
        en: allowed source kinds
        ja: 許可ソース種別
      definitions:
        zh: 声明运行在此政策下可读取的资源类别，而不是本次实际读取的具体资源列表。
        en: Declares resource kinds a run may read under this policy rather than the concrete resources actually read in one run.
        ja: 一回の実行で実際に読んだ具体資源一覧ではなく、この方針下で実行が読める資源種別を宣言します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values:
        - file
        - object
        - directory
        - database-row
        - web-page
        - graph-data
      pattern: null
      example_value:
        - file
        - object
      source_claims:
        - claim-ingestion-policy-source
    - id: allowed_loader_refs
      labels:
        zh: 允许加载器引用
        en: allowed loader references
        ja: 許可ローダー参照
      definitions:
        zh: 列出可以在政策范围内调用的精确 DocumentLoader 版本或允许范围，不等于每个运行均实际使用该加载器。
        en: Lists exact DocumentLoader versions or permitted ranges callable within policy scope and does not mean every run actually uses each loader.
        ja: 方針範囲内で呼び出せる正確なDocumentLoader版または許可範囲を列挙し、すべての実行が各ローダーを実際に使うことを意味しません。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - loader-pdf@3.2.1
        - loader-json@2.0.0
      source_claims:
        - claim-ingestion-policy-loader
    - id: max_resource_bytes
      labels:
        zh: 最大资源字节数
        en: maximum resource bytes
        ja: 最大資源バイト数
      definitions:
        zh: 声明本政策允许读取的单个来源资源字节上限，是开始前输入验证规则而不是实际读取字节统计。
        en: Declares maximum bytes for one source resource allowed to be read under policy, a pre-read validation rule rather than actual byte-read statistic.
        ja: 方針下で読取りを許可する一つのソース資源の最大バイト数を宣言し、実際の読取りバイト統計ではなく読取り前検証規則です。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 10485760
      source_claims:
        - claim-ingestion-policy-source
    - id: normalization_profile_ref
      labels:
        zh: 规范化配置引用
        en: normalization profile reference
        ja: 正規化プロファイル参照
      definitions:
        zh: 引用运行可用于规范化的版本化解析、清洗和字符处理配置，不记录一次实际规范化结果。
        en: References versioned parsing, cleaning, and character-processing profile available for run normalization and does not record one actual normalization result.
        ja: 実行正規化に使える版付き解析、清掃、文字処理プロファイルを参照し、一回の実際の正規化結果を記録しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - unicode-nfc-clean-v1
        - pdf-text-extraction-v3
        - html-text-clean-v2
      pattern: null
      example_value: unicode-nfc-clean-v1
      source_claims:
        - claim-ingestion-policy-transformation
    - id: deduplication_strategy_ref
      labels:
        zh: 去重策略引用
        en: deduplication strategy reference
        ja: 重複排除戦略参照
      definitions:
        zh: 引用候选文档比较的版本化键和规则策略，实际保留、更新或跳过结果仍属于 DeduplicationDecision。
        en: References versioned key and rule strategy for candidate-Document comparison; actual keep, update, or skip outcome remains DeduplicationDecision.
        ja: 候補Document比較の版付きキーと規則戦略を参照し、実際のkeep、update、skip結果はDeduplicationDecisionに残ります。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - exact-id-and-digest
        - exact-digest
        - business-key-and-digest
      pattern: null
      example_value: exact-id-and-digest
      source_claims:
        - claim-ingestion-policy-transformation
    - id: failure_strategy
      labels:
        zh: 失败处置策略
        en: failure strategy
        ja: 失敗処理戦略
      definitions:
        zh: 声明阶段或资源失败时应该停止、隔离并继续、跳过或重试的规范策略，不记录某次已发生错误或重试。
        en: Declares normative response to phase or resource failure, such as stop, quarantine and continue, skip, or retry, without recording a concrete occurred error or retry.
        ja: フェーズまたは資源失敗時にstop、隔離して継続、skip、retryすべきという規範戦略を宣言し、具体的に発生したエラーや再試行は記録しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - stop-run
        - quarantine-and-continue
        - skip-resource
        - retry-with-budget
      pattern: null
      example_value: quarantine-and-continue
      source_claims:
        - claim-ingestion-policy-failure
    - id: published_at
      labels:
        zh: 发布时间
        en: published at
        ja: 発行時刻
      definitions:
        zh: 记录此不变政策版本正式可被运行选择的时间，不是某次运行开始、更新或失败时间。
        en: Records when this immutable policy version became selectable by runs, not start, update, or failure time of one run.
        ja: この不変方針版が実行により選択可能になった時刻を記録し、一回の実行の開始、更新、失敗時刻ではありません。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:00:00Z"
      source_claims:
        - claim-ingestion-policy-version
  constraints:
    - id: ingestion-policy-immutable-version
      expression: policy_id, policy_version, policy_digest, applicability_scope, allowed_source_kinds, allowed_loader_refs, max_resource_bytes, normalization_profile_ref, deduplication_strategy_ref, failure_strategy, and published_at are required; a changed serialized rule set requires a new policy_version and policy_digest.
      explanation:
        zh: 治理政策必须是可重现的不可变规范；变更规则不能在原版本号下静默发生，否则历史运行无法证明遵从了什么。
        en: A governance policy must be reproducible immutable specification; rule changes cannot happen silently under original version or historical runs cannot prove what they followed.
        ja: 統治方針は再現可能な不変仕様である必要があり、規則変更を元の版の下で黙って行うと履歴実行が何に従ったかを証明できません。
    - id: ingestion-policy-applicability
      expression: A run may be governed by this policy only when run policy_ref and manifest policy_digest identify this policy version and run tenant, environment, channel, and input collection satisfy applicability_scope.
      explanation:
        zh: 政策名称或引用不足以证明有效治理；确切版本、摘要和实际运行范围必须匹配，避免把另一租户或环境的规则误套用。
        en: Policy name or reference alone does not prove effective governance; exact version, digest, and actual run scope must match to avoid applying rules from another tenant or environment.
        ja: 方針名または参照だけでは有効な統治を証明せず、正確な版、ダイジェスト、実際の実行範囲が一致し、別テナントや環境の規則を誤適用しない必要があります。
    - id: ingestion-policy-runtime-separation
      expression: Actual resource reads, loader invocations, phase timestamps, decisions, errors, retries, and Document outputs belong to IngestionRun or child facts; policy contains allowed or required rules only.
      explanation:
        zh: 将规范与事实分开可防止运行结果反向改写政策；合规评估应通过关系和证据进行，而不是把日志塞入规则对象。
        en: Separating norm from fact prevents runtime outcomes from rewriting policy; compliance evaluation should use relations and evidence rather than stuffing logs into rule object.
        ja: 規範と事実を分離すると実行結果が方針を書き換えることを防ぎ、適合性評価はログを規則対象へ詰め込むのでなく関係と証拠で行うべきです。
examples:
  - id: ingestion-policy-positive

    labels:
      zh: 生产法律语料摄入政策版本
      en: Production legal-corpus ingestion policy version
      ja: 本番法務コーパス取込み方針版

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      policy_id: ingestion-policy-42
      policy_version: "3"
      policy_digest: sha256:ingestion-policy-42-v3
      applicability_scope: tenant:legal/environment:production
      allowed_source_kinds:
        - file
        - object
        - database-row
      allowed_loader_refs:
        - loader-pdf@3.2.1
        - loader-json@2.0.0
      max_resource_bytes: 10485760
      normalization_profile_ref: unicode-nfc-clean-v1
      deduplication_strategy_ref: exact-id-and-digest
      failure_strategy: quarantine-and-continue
      published_at: "2026-07-18T08:00:00Z"
    related_node_ids:
      - IngestionPolicy
      - IngestionRun
      - DocumentLoader
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-governed_by-IngestionPolicy
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestion-policy-version
      - claim-ingestion-policy-applicability
      - claim-ingestion-policy-loader
  - id: ingestion-policy-counterexample

    labels:
      zh: 实际摄入运行不是治理政策
      en: Actual ingestion run is not governance policy
      ja: 実際の取込み実行は統治方針ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      ingestion_run_id: ingest-policy-directory-42
      policy_ref: ingestion-policy-42-v3
      run_manifest_digest: sha256:ingest-manifest-policy-directory-42-v1
      loader_refs:
        - loader-pdf:3.2.1
      status: completed
      policy_digest: absent
      allowed_source_kinds: absent
    related_node_ids:
      - IngestionPolicy
      - IngestionRun
    related_relation_ids:
      - IngestionRun-governed_by-IngestionPolicy
      - IngestionRun-is_a-IngestionActivity

    source_claims:
      - claim-ingestion-policy-runtime-boundary
  - id: ingestion-policy-boundary

    labels:
      zh: 未发布且未版本化的摄入建议草案
      en: Unpublished unversioned ingestion guidance draft
      ja: 未発行で未版付きの取込み助言草案

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      draft_id: policy-draft-legal
      guidance_text: prefer PDF and retry errors
      policy_id: absent
      policy_version: absent
      policy_digest: absent
      applicability_scope: absent
      allowed_loader_refs: []
    related_node_ids:
      - IngestionPolicy
      - IngestionRun
    related_relation_ids:
      - IngestionRun-governed_by-IngestionPolicy

    source_claims:
      - claim-ingestion-policy-version
      - claim-ingestion-policy-boundary
  - id: ingestion-policy-instance

    labels:
      zh: 归档 PDF 严格停止政策实例
      en: "Instance: strict-stop archive PDF policy"
      ja: "事例: 厳格停止アーカイブPDF方針"

