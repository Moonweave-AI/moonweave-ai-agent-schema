schema: moonweave.ai/ontology-node/v1
id: IngestionPolicy
kind: concept
status: review
labels:
  zh: 摄入政策
  en: Ingestion policy
  ja: 取込policy
semantics:
  short_definition:
    zh: 规定允许来源、加载方式、阶段配置与失败处理的版本化规范。
    en: A versioned specification governing allowed sources, loading, phase configuration, and failure handling.
    ja: 許可source・loading・phase設定・failure処理を定めるversioned specificationです。
  definition:
    zh: IngestionPolicy 是由 policy_id+policy_version 标识的规范，约束 IngestionRun 可读取的来源类型、允许加载器、规范化/去重策略与失败处置；它不是运行活动或运行产生的决定。
    en: IngestionPolicy is a specification identified by policy_id plus policy_version that constrains source types, allowed loaders, normalization/deduplication strategies, and failure handling for IngestionRun; it is not a run activity or a decision produced by a run.
    ja: IngestionPolicy は policy_id+policy_versionで識別し IngestionRun のsource type・許可loader・normalization/deduplication strategy・failure処理を制約するspecificationで、run activityやrun生成decisionではありません。
  why_needed:
    zh: 把规范性约束与实际运行和去重决定分开。
    en: Separates normative constraints from actual run and deduplication decision.
    ja: normative制約をactual run・deduplication decisionから分離します。
  includes:
    - zh: 纳入来源白名单、加载器选择、阶段顺序与错误策略。
      en: Includes source allowlists, loader selection, phase ordering, and error strategy.
      ja: source allowlist・loader選択・phase order・error strategyを含みます。
  excludes:
    - zh: 排除 IngestionRun、DeduplicationDecision 与 AccessDecision。
      en: Excludes IngestionRun, DeduplicationDecision, and AccessDecision.
      ja: IngestionRun・DeduplicationDecision・AccessDecisionを除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - policy_id
    - policy_version
  fields:
    - id: policy_id
      labels:
        zh: 政策标识
        en: policy ID
        ja: policy ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识政策系列。
        en: Stable identifier for the policy series.
        ja: policy系列の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: ingest-policy
      source_claims:
        - claim-ingestion-policy-002
    - id: policy_version
      labels:
        zh: 政策版本
        en: policy version
        ja: policy版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定适用规则版本。
        en: Fixes the applicable rule version.
        ja: 適用rule版を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-ingestion-policy-003
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: applicability scope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该规范适用的租户、语料、环境或接入通道，使多个运行复用政策时仍能判断适用性。
        en: Declares the tenant, corpus, environment, or ingestion channel to which the specification applies so applicability remains decidable across multiple runs.
        ja: specification が適用される tenant・corpus・environment・ingestion channel を宣言し複数 run で applicability を判断可能にします。
      allowed_values: []
      pattern: null
      example_value: tenant-legal-production
      source_claims:
        - claim-ingestion-policy-004
    - id: allowed_source_types
      labels:
        zh: 允许来源类型
        en: allowed source types
        ja: 許可source type
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明运行可读取的资源种类。
        en: Declares resource kinds a run may read.
        ja: runがread可能なresource種別を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - FileResource
        - DatabaseTable
      source_claims:
        - claim-ingestion-policy-005
    - id: allowed_loader_refs
      labels:
        zh: 允许加载器引用
        en: allowed loader references
        ja: allowed loader reference
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出可在该政策下执行读取和解析的 DocumentLoader 身份或版本范围；来源类型允许不自动意味着任意加载器都获准。
        en: Lists DocumentLoader identities or version ranges permitted to read and parse under the policy; an allowed source type does not automatically authorize every loader.
        ja: policy 下で read/parse を実行できる DocumentLoader identity/version range を列挙し、source type 許可だけで全 loader を許可しません。
      allowed_values: []
      pattern: null
      example_value:
        - loader-pdf:^3.2
        - loader-sql:^2.1
      source_claims:
        - claim-ingestion-policy-006
    - id: normalization_profile_ref
      labels:
        zh: 规范化配置引用
        en: normalization-profile reference
        ja: normalization-profile reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用规范化阶段采用的不可变配置，包括编码、文本清理与结构保留选择；它不记录某次阶段的执行结果。
        en: References the immutable normalization configuration for encoding, text cleanup, and structure preservation; it does not record one phase execution's result.
        ja: encoding・text cleanup・structure preservation の immutable normalization configuration を参照し、一 phase execution result は記録しません。
      allowed_values: []
      pattern: null
      example_value: normalization-profile:legal-v5
      source_claims:
        - claim-ingestion-policy-007
    - id: deduplication_strategy_ref
      labels:
        zh: 去重策略引用
        en: deduplication-strategy reference
        ja: deduplication-strategy reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在资源或文档比较中采用的键、算法和阈值规范；实际重复与否仍由 DeduplicationDecision 记录。
        en: References the key, algorithm, and threshold specification used for resource or Document comparison; the actual duplicate outcome remains a DeduplicationDecision.
        ja: resource/Document comparison の key・algorithm・threshold specification を参照し、actual duplicate outcome は DeduplicationDecision が記録します。
      allowed_values: []
      pattern: null
      example_value: dedupe-strategy:content-digest-v2
      source_claims:
        - claim-ingestion-policy-008
    - id: failure_strategy
      labels:
        zh: 失败处置策略
        en: failure strategy
        ja: failure strategy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明阶段失败时采用的停止、跳过、隔离或重试策略类别；具体错误与重试发生事实不写入政策对象。
        en: Declares whether a phase failure stops, skips, quarantines, or retries; concrete errors and retry occurrences are not stored on the policy object.
        ja: phase failure 時の stop・skip・quarantine・retry strategy class を宣言し concrete error/retry occurrence は policy object に保存しません。
      allowed_values: []
      pattern: null
      example_value: quarantine_resource_and_continue
      source_claims:
        - claim-ingestion-policy-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestionPolicy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 摄入政策正例
      en: "Positive case: Ingestion policy"
      ja: 取込policy正例
    scenario_id: null
    descriptions:
      zh: ingest-policy@4 是不可变规范，声明允许的 PDF/数据库来源、最大文件大小、loader 选择、规范化 profile、去重键与错误处理，并带适用范围和版本。
      en: ingest-policy@4 is an immutable specification declaring allowed PDF and database sources, maximum file size, loader selection, normalization profile, deduplication key, and error handling with scope and version.
      ja: ingest-policy@4 は allowed sources、file size、loader selection、normalization profile、dedup key、error handling を scope・version 付きで宣言します。
    field_values:
      policy_id: ingest-policy
      policy_version: "4"
      applicability_scope: tenant-legal-production
      allowed_source_types:
        - FileResource
        - DatabaseTable
      allowed_loader_refs:
        - loader-pdf:^3.2
        - loader-sql:^2.1
      normalization_profile_ref: normalization-profile:legal-v5
      deduplication_strategy_ref: dedupe-strategy:content-digest-v2
      failure_strategy: quarantine_resource_and_continue
    related_node_ids:
      - IngestionPolicy
    related_relation_ids: []
    expected_result:
      zh: 将 policy@4 表示为 IngestionPolicy，并让运行通过 governed_by 引用确切版本。
      en: Represent policy@4 as IngestionPolicy and require runs to reference the exact version through governed_by.
      ja: policy@4 を IngestionPolicy とし run は governed_by で exact version を参照します。
    why_valid_or_invalid:
      zh: 规范具有独立版本、适用条件和应执行的约束，可在多个运行间复用且不记录某次执行状态。
      en: The specification has an independent version, applicability conditions, and normative constraints, is reusable across runs, and records no one run's execution state.
      ja: specification は independent version、applicability conditions、normative constraints を持ち run 横断で再利用されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-policy-010
  - id: IngestionPolicy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 摄入政策边界例
      en: "Boundary case: Ingestion policy"
      ja: 取込policy境界例
    scenario_id: null
    descriptions:
      zh: ingest-run-17 记录 policy@4 的实际执行、资源输入、阶段时间、输出与错误；它不能替代声明规则的 policy 对象。
      en: ingest-run-17 records actual execution of policy@4, resource inputs, phase times, outputs, and errors and cannot replace the policy object that declares the rules.
      ja: ingest-run-17 は policy@4 の actual execution、inputs、times、outputs、errors を記録し rule declaration を代替しません。
    field_values:
      candidate_kind: IngestionRun
      activity_id: ingest-run-17
      applied_policy_ref: ingest-policy@4
      actual_status: completed_with_quarantine
      phase_error_count: 1
    related_node_ids:
      - IngestionPolicy
    related_relation_ids: []
    expected_result:
      zh: 把 ingest-run-17 保持为 IngestionRun，仅通过关系表明其受 policy@4 治理。
      en: Keep ingest-run-17 as IngestionRun and express its governance by policy@4 only through the relation.
      ja: ingest-run-17 は IngestionRun とし policy@4 governance は relation だけで表します。
    why_valid_or_invalid:
      zh: 规范回答应当如何处理，运行回答实际发生了什么；符合策略也不会使一次运行成为策略本身。
      en: A policy answers how processing ought to occur and a run records what actually occurred; compliance does not turn a run into the policy itself.
      ja: policy は処理規範、run は actual occurrence を答え compliance しても run は policy になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-policy-011
