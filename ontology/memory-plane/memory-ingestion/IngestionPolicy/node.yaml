    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-mem0-policy
    supports: Mem0 platform documents rate limits and retry behavior mappable to policy fields.
    locator: API limits
    evidence_kind: official
    confidence: medium
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: policy_id identifies policy series.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: policy_version fixes immutable rule set for runs.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: applicability_scope declares governed tenant or corpus.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: allowed_source_types pre-read source eligibility.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-llamaindex-pipeline
    supports: allowed_loader_refs permits specific loader implementations under policy.
    locator: pipeline configuration
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: normalization_profile_ref pins reusable normalization configuration.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-llamaindex-pipeline
    supports: deduplication_strategy_ref specifies dedup keys separate from DeduplicationDecision outcomes.
    locator: duplicate handling
    evidence_kind: official
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: failure_strategy declares stop/skip/quarantine/retry class without storing error instances.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-policy-design
    source: src-ingestion-policy-design
    supports: max_document_size_bytes guards ingest against oversized documents.
    locator: structure
