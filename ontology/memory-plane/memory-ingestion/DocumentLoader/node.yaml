schema: moonweave.ai/ontology-node/v1
id: DocumentLoader
kind: concept
status: accepted
labels:
  zh: 版本化文档加载器能力
  en: Versioned document-loader capability
  ja: 版付きDocumentローダー能力
semantics:
  short_definition:
    zh: 以稳定实现和版本身份把受支持来源负载读取为信息或文档值的可复用能力。
    en: A reusable capability with stable implementation and version identity that reads supported source payloads into information or Document values.
    ja: 安定した実装と版同一性を持ち、対応するソースペイロードを情報またはDocument値へ読み取る再利用可能な能力です。
  definition:
    zh: >-
      DocumentLoader 是可由 IngestionRun 实际调用的版本化能力，具有 loader_id、实现版本、包或镜像引用、支持的来源类别、
      支持的媒体类型、入口行为和输出契约。它决定如何读取和解析资源，但不是一次加载调用、运行、输入资源、已读取信息、
      规范 Document、Chunk、去重决定或记忆写入。
    en: >-
      DocumentLoader is a versioned capability actually invocable by an IngestionRun, with loader_id, implementation
      version, package or image reference, supported source kinds, supported media types, entry behavior, and output
      contract. It determines how a resource is read and parsed, but is not one load invocation, run, input resource,
      read information, canonical Document, Chunk, deduplication decision, or memory write.
    ja: >-
      DocumentLoader はIngestionRunが実際に呼び出せる版付き能力であり、loader_id、実装版、パッケージまたはイメージ参照、
      対応ソース種別、対応メディア型、入口動作、出力契約を持ちます。資源をどう読取り解析するかを決めますが、一回のロード呼出し、
      実行、入力資源、読取り情報、正規Document、Chunk、重複排除決定、記憶書込みではありません。
  why_needed:
    zh: 将可复用的解析能力与某次实际调用、来源资源和产生的信息实体分离，使运行可解释地记录“用什么版本如何读取”。
    en: Separates reusable parsing capability from one actual invocation, source resource, and produced information entity so a run can explain which version read content and how.
    ja: 再利用可能な解析能力を一回の実際の呼出し、ソース資源、生成情報実体から分離し、実行がどの版でどのように内容を読んだかを説明可能にします。
  includes:
    - zh: 对文件、目录、数据库行、网页或图数据实施明确输入媒体边界和文档输出契约的版本化加载器实现。
      en: Versioned loader implementations for files, directories, database rows, web pages, or graph data with explicit input-media bounds and document-output contract.
      ja: 明示的な入力メディア境界とDocument出力契約を持つ、ファイル、ディレクトリ、データベース行、Webページ、グラフデータ用の版付きローダー実装を含みます。
  excludes:
    - zh: 某次 lazy_load 或 load 调用、加载请求日志、仅安装但没有稳定版本契约的插件、FileResource、IngestibleInformation、Document 和 IngestionRun。
      en: One lazy_load or load invocation, a load-request log, a plugin merely installed without stable version contract, FileResource, IngestibleInformation, Document, and IngestionRun.
      ja: 一回のlazy_loadまたはload呼出し、ロード要求ログ、安定した版契約なしに単に導入されたプラグイン、FileResource、IngestibleInformation、Document、IngestionRunを除きます。
  semantic_kind: capability
  aliases:
    - source parser capability
    - loader implementation
engineering:
  explanation:
    zh: >-
      加载器注册表会为每个实现版本声明支持的来源与媒体类型、入口方法和输出契约。运行必须记录实际调用的 loader_id 加版本，
      并用资源媒体类型和来源类别验证兼容性；注册表中可用但未调用的加载器不属于运行使用事实。
    en: >-
      A loader registry declares supported source and media types, entry methods, and output contract for every
      implementation version. A run records actual loader_id plus version and validates compatibility with resource media
      type and source kind; a loader available in registry but never invoked is not a run-use fact.
    ja: >-
      ローダー登録表は実装版ごとに対応ソース・メディア型、入口メソッド、出力契約を宣言します。実行は実際のloader_idと版を
      記録し、資源メディア型とソース種別との互換性を検証します。登録表で利用可能でも呼び出されないローダーは実行使用事実ではありません。
  typical_input:
    - description: Versioned loader capability declaration
      format: |
        {
          "loader_id": "loader-pdf",
          "implementation_version": "3.2.1",
          "package_ref": "langchain-pypdf@3.2.1",
          "supported_source_kinds": ["file", "object"],
          "supported_media_types": ["application/pdf"],
          "entrypoint": "lazy_load"
        }
  typical_output:
    - description: Loader output contract
      format: |
        {
          "output_contract": "IngestibleInformation stream with source-resource provenance",
          "emits_content_digest": true,
          "emits_media_type": true,
          "emits_source_reference": true
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loader integrations and the BaseLoader load and lazy_load interfaces.
    - name: Apache Tika parser API
      url: https://tika.apache.org/2.9.2/api/org/apache/tika/parser/Parser.html
      description: Defines a parser interface for parsing input streams into content and metadata.
    - name: Node.js fs API
      url: https://nodejs.org/api/fs.html
      description: Documents file-system APIs that loaders use to access file-backed source bytes.
structure:
  identity_keys:
    - loader_id
    - implementation_version
  fields:
    - id: loader_id
      labels:
        zh: 加载器标识
        en: loader ID
        ja: ローダーID
      definitions:
        zh: 稳定标识加载器能力族，不是一次调用记录、资源标识或已产生文档标识。
        en: Stably identifies a loader capability family rather than one invocation record, resource ID, or generated Document ID.
        ja: 一回の呼出し記録、資源ID、生成Document IDではなく、ローダー能力ファミリーを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: loader-pdf
      source_claims:
        - claim-document-loader-identity
    - id: implementation_version
      labels:
        zh: 实现版本
        en: implementation version
        ja: 実装版
      definitions:
        zh: 固定该加载器的代码与解析行为版本，允许同一 loader_id 的不同版本被审计地区分。
        en: Pins code and parsing-behavior version of the loader so different versions of one loader_id remain auditable and distinct.
        ja: ローダーのコードと解析動作版を固定し、一つのloader_idの異なる版を監査可能に区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 3.2.1
      source_claims:
        - claim-document-loader-version
    - id: package_ref
      labels:
        zh: 包或镜像引用
        en: package or image reference
        ja: パッケージまたはイメージ参照
      definitions:
        zh: 引用可获得该实现版本的包、容器镜像或构建制品，而不是运行读取的来源资源。
        en: References a package, container image, or build artifact that yields this implementation version, rather than the source resource read by a run.
        ja: 実行が読むソース資源ではなく、この実装版を得るパッケージ、コンテナイメージ、ビルド成果物を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: langchain-pypdf@3.2.1
      source_claims:
        - claim-document-loader-version
    - id: supported_source_kinds
      labels:
        zh: 支持来源类别
        en: supported source kinds
        ja: 対応ソース種別
      definitions:
        zh: 声明加载器可以直接访问的来源类别，例如文件、对象、目录、数据库行或网页，而不是这次运行实际使用的具体资源。
        en: Declares source kinds directly accessible by the loader, such as file, object, directory, database row, or web page, rather than concrete resources used in one run.
        ja: 一回の実行で使う具体的資源ではなく、ファイル、オブジェクト、ディレクトリ、データベース行、Webページなど、ローダーが直接アクセスできるソース種別を宣言します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values:
        - file
        - object
        - directory
        - database-row
        - web-page
        - graph-data
      pattern: null
      example_value:
        - file
        - object
      source_claims:
        - claim-document-loader-compatibility
    - id: supported_media_types
      labels:
        zh: 支持媒体类型
        en: supported media types
        ja: 対応メディア型
      definitions:
        zh: 声明此实现能够按其契约解析的输入媒体类型，不等于它本次已解析或输出的文档媒体类型。
        en: Declares input media types this implementation can parse under its contract, not media types it has parsed in one run or output Document media type.
        ja: 一回の実行で解析済みまたは出力Documentメディア型ではなく、この実装が契約に従って解析できる入力メディア型を宣言します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - application/pdf
      source_claims:
        - claim-document-loader-compatibility
    - id: entrypoint
      labels:
        zh: 加载入口行为
        en: loading entry behavior
        ja: ロード入口動作
      definitions:
        zh: 声明实现提供的读取入口行为，例如 load 或 lazy_load，而不是一次调用的开始时间或结果。
        en: Declares loading entry behavior exposed by the implementation, such as load or lazy_load, not start time or result of one invocation.
        ja: 一回の呼出しの開始時刻や結果ではなく、loadまたはlazy_loadなど実装が公開するロード入口動作を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - load
        - lazy_load
        - load_and_split
      pattern: null
      example_value: lazy_load
      source_claims:
        - claim-document-loader-interface
    - id: output_contract
      labels:
        zh: 输出契约
        en: output contract
        ja: 出力契約
      definitions:
        zh: 描述加载器如何产生带来源信息的 IngestibleInformation 或 Document 值，不是某次运行已经形成的具体输出列表。
        en: Describes how the loader produces provenance-bearing IngestibleInformation or Document values, not the concrete output list already formed by one run.
        ja: 一回の実行ですでに形成された具体出力一覧ではなく、ローダーが来歴付きIngestibleInformationまたはDocument値をどう生成するかを記述します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: IngestibleInformation stream with source-resource provenance
      source_claims:
        - claim-document-loader-interface
  constraints:
    - id: document-loader-versioned-identity
      expression: loader_id, implementation_version, package_ref, supported_source_kinds, supported_media_types, entrypoint, and output_contract are required; loader_id plus implementation_version must identify one immutable capability contract.
      explanation:
        zh: 可复用能力需要稳定身份和版本化契约；只有名称或安装状态不能确定解析行为，也不能支持重放。
        en: A reusable capability needs stable identity and versioned contract; a name or installation state alone cannot determine parsing behavior or support replay.
        ja: 再利用可能な能力には安定同一性と版付き契約が必要で、名前または導入状態だけでは解析動作を決められず再生を支えられません。
    - id: document-loader-input-compatibility
      expression: A run may use this loader only when actual resource source kind is listed in supported_source_kinds, resource media type is listed in supported_media_types, and the run records the same loader_id and implementation_version.
      explanation:
        zh: 可用或已安装不代表实际使用；实际调用必须同时匹配加载器版本、来源类别和媒体类型，不能由名称相似推断。
        en: Availability or installation does not prove actual use; an invocation must match loader version, source kind, and media type, and cannot be inferred from similar naming.
        ja: 利用可能または導入済みであっても実際の使用を証明せず、呼出しはローダー版、ソース種別、メディア型に一致する必要があり、似た名称から推論できません。
    - id: document-loader-output-boundary
      expression: output_contract must emit a separately identifiable information or Document value with source provenance; loader configuration, invocation log, and raw resource must not be treated as that output value.
      explanation:
        zh: 加载器能力、调用活动、来源资源和产生的信息具有不同身份；输出契约应使运行能记录这些界面而不混合层级。
        en: Loader capability, invocation activity, source resource, and produced information have different identities; output contract must let a run record their interfaces without merging layers.
        ja: ローダー能力、呼出し活動、ソース資源、生成情報は異なる同一性を持ち、出力契約は層を混ぜずに実行がそれらの境界を記録できる必要があります。
examples:
  - id: document-loader-positive

    labels:
      zh: 版本固定的 PDF 加载器能力
      en: Version-pinned PDF loader capability
      ja: 版固定PDFローダー能力

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      loader_id: loader-pdf
      implementation_version: 3.2.1
      package_ref: langchain-pypdf@3.2.1
      supported_source_kinds:
        - file
        - object
      supported_media_types:
        - application/pdf
      entrypoint: lazy_load
      output_contract: IngestibleInformation stream with source-resource provenance
    related_node_ids:
      - DocumentLoader
      - IngestionRun
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-document-loader-interface
      - claim-document-loader-compatibility
  - id: document-loader-counterexample

    labels:
      zh: 单次加载调用不是加载器能力
      en: One load invocation is not loader capability
      ja: 一回のロード呼出しはローダー能力ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      attempt_id: load-attempt-policy-42
      ingestion_run_ref: ingest-policy-directory-42
      loader_id: loader-pdf
      implementation_version: 3.2.1
      resource_ref: file-policy-42.pdf
      started_at: "2026-07-18T08:59:01Z"
      output_contract: absent
    related_node_ids:
      - DocumentLoader
      - IngestionRun
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-document-loader-boundary
  - id: document-loader-boundary

    labels:
      zh: 已安装但不具备稳定加载契约的插件
      en: Installed plugin without stable loading contract
      ja: 安定ロード契約のない導入済みプラグイン

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      plugin_name: plugin-experimental-pdf
      installation_state: installed
      loader_id: absent
      implementation_version: absent
      supported_media_types: []
      entrypoint: absent
      output_contract: absent
    related_node_ids:
      - DocumentLoader
      - IngestionRun
    related_relation_ids:
      - IngestionRun-uses-DocumentLoader

    source_claims:
      - claim-document-loader-version
      - claim-document-loader-boundary
  - id: document-loader-instance

    labels:
      zh: CSV 数据库行加载器实例
      en: "Instance: CSV database-row loader"
      ja: "事例: CSVデータベース行ローダー"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      loader_id: loader-csv-row
      implementation_version: 2.0.0
      package_ref: moonweave-csv-loader@2.0.0
      supported_source_kinds:
        - database-row
      supported_media_types:
        - text/csv
      entrypoint: load
      output_contract: IngestibleInformation stream with row locator and source-resource provenance
    related_node_ids:
      - DocumentLoader
      - IngestionRun
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-document-loader-interface
      - claim-document-loader-compatibility
parent_relation: null
relations: []
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loader integrations and BaseLoader methods that read sources into Document values.
  - id: apache-tika-parser
    title: Apache Tika Parser API
    url: https://tika.apache.org/2.9.2/api/org/apache/tika/parser/Parser.html
    type: official-doc
    source_type: official-doc
    relevance: Defines parser interfaces that consume input streams and produce content and metadata.
  - id: nodejs-fs
    title: Node.js File System API
    url: https://nodejs.org/api/fs.html
    type: official-doc
    source_type: official-doc
    relevance: Documents file-system APIs for accessing file-backed source bytes.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines separate activities and entities and their provenance relations.
source_claims:
  - id: claim-document-loader-interface
    source: langchain-document-loaders
    supports: LangChain documents a standard loader interface with load and lazy_load methods that read diverse sources into Document values. Moonweave models these methods as capability contract rather than one invocation event.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-loader-compatibility
    source: apache-tika-parser
    supports: Apache Tika defines a parser interface that operates on an input stream and metadata. Moonweave declares source-kind and media-type compatibility as explicit capability bounds before a run can invoke a loader.
    locator: Apache Tika Parser API interface methods and parse contract
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-loader-version
    source: nodejs-fs
    supports: Node.js file-system APIs expose concrete file-access behavior but do not identify parser implementation version. Moonweave records loader package and implementation version separately so resource access can be replayed with the same parsing behavior.
    locator: Node.js fs API overview and file access methods
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-document-loader-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes activities from entities used or generated. Moonweave identifies a reusable loader capability separately from one runtime invocation, source resource, and produced information entity.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-loader-usage
    source: w3c-prov-o
    supports: PROV-O states that activities can use entities during their lifetime. Moonweave asserts run use of a loader only with run reference, invocation evidence, and input compatibility rather than installation state.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-loader-boundary
    source: langchain-document-loaders
    supports: Loader integrations distinguish loader classes and their results from execution context. Moonweave keeps a one-time load attempt, merely installed plugin, raw resource, and reusable versioned loader capability as distinct identities.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
