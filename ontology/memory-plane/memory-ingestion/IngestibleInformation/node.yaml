schema: moonweave.ai/ontology-node/v1
id: IngestibleInformation
kind: concept
status: accepted
labels:
  zh: 可摄入信息
  en: Ingestible information
  ja: 取込み可能情報
semantics:
  short_definition:
    zh: 已读取且以内容版本标识、可作为规范化活动输入的信息实体。
    en: Information read from a source, identified by a content version, and eligible as normalization input.
    ja: ソースから読み取られ、内容版で識別され、正規化活動の入力になれる情報実体です。
  definition:
    zh: >-
      IngestibleInformation 是从一个可摄入资源实际读取出的、具有稳定 information_id、内容摘要、媒体类型和来源资源
      引用的信息实体。它可以被 NormalizationActivity 消费，并可被进一步特化为 Document；它不是尚未读取的
      FileResource、Database 或 DirectoryResource，也不是加载器、摄入运行、规范化活动、去重决定或记忆写入。
    en: >-
      IngestibleInformation is an information entity actually read from one ingestible resource and carrying a stable
      information_id, content digest, media type, and source-resource reference. It can be consumed by a
      NormalizationActivity and further specialized as a Document; it is not an unread FileResource, Database, or
      DirectoryResource, nor a loader, ingestion run, normalization activity, deduplication decision, or memory write.
    ja: >-
      IngestibleInformation は、一つの取込み可能資源から実際に読み取られ、安定した information_id、内容ダイジェスト、
      メディア型、ソース資源参照を持つ情報実体です。NormalizationActivity に消費され、さらに Document として特化
      され得ます。未読の FileResource、Database、DirectoryResource、またはローダー、取込み実行、正規化活動、
      重複排除決定、記憶書込みではありません。
  why_needed:
    zh: 将“在哪里取得字节”与“已读到的、可处理的内容版本”分开，使读取证据、内容变化和规范化输入可被独立审计。
    en: Separates where bytes can be obtained from the read, processable content version so read evidence, content change, and normalization input can be audited independently.
    ja: バイトを取得できる場所と、読み取られた処理可能な内容版を分離し、読取り証拠、内容変更、正規化入力を独立して監査可能にします。
  includes:
    - zh: 来自文件、数据库行或图数据的已读取内容快照，具有可验证摘要并可作为声明活动的实际输入。
      en: Read content snapshots from a file, database row, or graph data with a verifiable digest and use as actual input to a declared activity.
      ja: ファイル、データベース行、グラフデータからの読取り済み内容スナップショットで、検証可能なダイジェストを持ち、宣言された活動の実入力に使えるものを含みます。
  excludes:
    - zh: 仅有定位符或对象版本的未读取来源资源、只指向内容的元数据链接、规范化后形成的具体 Document 子类以及执行读取的代码组件。
      en: An unread source resource with only a locator or object version, a metadata link that merely points to content, a concrete normalized Document subtype, or code that performs reading.
      ja: 位置指定子またはオブジェクト版だけを持つ未読ソース資源、内容を指すだけのメタデータリンク、正規化後に形成される具体的なDocumentサブタイプ、読取りを実行するコード部品を除きます。
  semantic_kind: information
  aliases:
    - read information snapshot
    - normalization input information
engineering:
  explanation:
    zh: >-
      采集器或加载器读取资源时，先创建一个信息快照，记录其来源资源引用、媒体类型、内容摘要、读取时间和输入清单。
      规范化活动只引用该快照而不把资源定位符当作内容本身；同一资源版本可被再次读取为另一个有自己摘要和证据的信息事实。
    en: >-
      When an acquirer or loader reads a resource, it creates an information snapshot with source-resource reference,
      media type, content digest, read time, and input manifest. A normalization activity references that snapshot
      instead of treating a resource locator as content; the same resource version can be read again as another
      information fact with its own digest and evidence.
    ja: >-
      収集器またはローダーが資源を読むとき、ソース資源参照、メディア型、内容ダイジェスト、読取り時刻、入力マニフェストを
      持つ情報スナップショットを作ります。正規化活動は資源位置指定子を内容そのものと扱わずこのスナップショットを参照します。
      同じ資源版でも、独自のダイジェストと証拠を持つ別の情報事実として再読取りできます。
  typical_input:
    - description: Read source resource payload
      format: |
        {
          "source_resource_ref": "file-policy-42.pdf",
          "resource_version": "etag:7fa4",
          "media_type": "application/pdf",
          "bytes_read": 38152,
          "acquired_at": "2026-07-18T08:59:02Z"
        }
  typical_output:
    - description: Version-pinned information snapshot
      format: |
        {
          "information_id": "info-policy-42",
          "content_digest": "sha256:info-policy-42-v1",
          "media_type": "application/pdf",
          "source_resource_ref": "file-policy-42.pdf",
          "acquired_at": "2026-07-18T08:59:02Z",
          "read_manifest_digest": "sha256:read-manifest-policy-42-v1"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that read varied external sources into Document values.
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for generating digests with algorithms such as SHA-256.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines separate entities used by activities and provenance relations among them.
structure:
  identity_keys:
    - information_id
    - content_digest
  fields:
    - id: information_id
      labels:
        zh: 信息标识
        en: information ID
        ja: 情報ID
      definitions:
        zh: 稳定标识已读取的信息快照，而不是来源资源定位符、运行标识或规范化后的文档标识。
        en: Stably identifies the read information snapshot rather than a source-resource locator, run ID, or normalized Document ID.
        ja: ソース資源の位置指定子、実行ID、正規化後のDocument IDではなく、読取り済み情報スナップショットを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: info-policy-42
      source_claims:
        - claim-ingestible-information-identity
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      definitions:
        zh: 记录带算法标记的已读取内容摘要，用于识别这个信息版本而不是替代信息标识。
        en: Records an algorithm-tagged digest of read content to identify this information version without replacing the information ID.
        ja: 情報IDを置き換えず、この情報版を識別するために、読み取った内容のアルゴリズム付きダイジェストを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:info-policy-42-v1
      source_claims:
        - claim-ingestible-information-digest
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディア型
      definitions:
        zh: 声明已读取负载的内容媒体类型，为选择相容的解析和清洗 profile 提供证据，而不是来源资源类别。
        en: Declares the content media type of the read payload as evidence for selecting a compatible parsing and cleaning profile, rather than the source resource category.
        ja: ソース資源の分類ではなく、互換性のある解析・清掃プロファイル選択の証拠として、読み取ったペイロードの内容メディア型を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - application/pdf
        - text/html
        - text/plain
        - application/json
        - text/csv
      pattern: null
      example_value: application/pdf
      source_claims:
        - claim-ingestible-information-loader
    - id: source_resource_ref
      labels:
        zh: 来源资源引用
        en: source resource reference
        ja: ソース資源参照
      definitions:
        zh: 引用实际被读取的 IngestibleResource 版本，而不是将来源 URL 或文件路径误作已读取内容。
        en: References the IngestibleResource version actually read, without mistaking its source URL or file path for the read content itself.
        ja: 実際に読み取った IngestibleResource の版を参照し、そのソースURLやファイルパスを読み取った内容そのものと取り違えません。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: file-policy-42.pdf
      source_claims:
        - claim-ingestible-information-derivation
    - id: acquired_at
      labels:
        zh: 读取时间
        en: acquired at
        ja: 取得時刻
      definitions:
        zh: 记录该内容快照被实际读取或取得的时刻，不等同于来源资源创建、修改或上传时间。
        en: Records when this content snapshot was actually read or acquired, not when the source resource was created, modified, or uploaded.
        ja: この内容スナップショットを実際に読取りまたは取得した時刻を記録し、ソース資源の作成、更新、アップロード時刻とは区別します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:02Z"
      source_claims:
        - claim-ingestible-information-temporal
    - id: read_manifest_digest
      labels:
        zh: 读取清单摘要
        en: read manifest digest
        ja: 読取りマニフェストダイジェスト
      definitions:
        zh: 记录声明本次读取的来源版本、内容摘要和读取上下文的清单摘要，以使输入证据可重放。
        en: Records a digest of the manifest declaring source version, content digest, and read context so input evidence can be replayed.
        ja: ソース版、内容ダイジェスト、読取り文脈を宣言するマニフェストのダイジェストを記録し、入力証拠を再生可能にします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:read-manifest-policy-42-v1
      source_claims:
        - claim-ingestible-information-digest
    - id: provenance_locator
      labels:
        zh: 来历定位符
        en: provenance locator
        ja: 来歴位置指定子
      definitions:
        zh: 可选地记录来源内部可重定位到读取范围的路径、行区间或对象版本，不替代来源资源引用或内容摘要。
        en: Optionally records a path, row range, or object version that relocates the read scope inside the source, without replacing source-resource reference or content digest.
        ja: ソース内の読取り範囲を再位置付けするパス、行範囲、オブジェクト版を任意に記録し、ソース資源参照や内容ダイジェストを置き換えません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: pdf-page:1-12
      source_claims:
        - claim-ingestible-information-derivation
  constraints:
    - id: ingestible-information-identity-and-content
      expression: information_id, content_digest, media_type, source_resource_ref, acquired_at, and read_manifest_digest are required; content_digest and read_manifest_digest must be algorithm-tagged digest values.
      explanation:
        zh: 信息身份、读取内容版本、来源、取得时间和读取证据必须一起存在，才能将实际读取的内容与仅可定位的资源区分开。
        en: Information identity, read-content version, source, acquisition time, and read evidence must coexist to distinguish actual read content from a merely addressable resource.
        ja: 情報同一性、読取り内容版、ソース、取得時刻、読取り証拠が共存して初めて、実際に読んだ内容を単に位置指定可能な資源から区別できます。
    - id: ingestible-information-source-separation
      expression: source_resource_ref identifies the resource version read and must not equal information_id; a locator or resource version without a content_digest and read_manifest_digest does not instantiate IngestibleInformation.
      explanation:
        zh: 来源资源和信息快照回答不同问题；仅有路径、URL、对象版本或资源摘要而没有已读取内容证据时，不得创建可摄入信息实例。
        en: The source resource and information snapshot answer different questions; a path, URL, object version, or resource digest alone cannot create an ingestible-information instance without read-content evidence.
        ja: ソース資源と情報スナップショットは別の問いに答えるため、読取り内容証拠なしにパス、URL、オブジェクト版、資源ダイジェストだけで取込み可能情報の実例を作れません。
    - id: ingestible-information-normalization-use
      expression: A NormalizationActivity may consume this information only when its input_information_refs and input_manifest_digest include the same information_id and content_digest.
      explanation:
        zh: 规范化活动必须以显式输入引用和冻结清单摘要证明实际读取，不能从共享来源或元数据相关性推断消费关系。
        en: A normalization activity must prove actual reading with explicit input references and a frozen manifest digest; consumption cannot be inferred from shared source or metadata association.
        ja: 正規化活動は明示的な入力参照と固定マニフェストダイジェストで実際の読取りを証明する必要があり、共有ソースやメタデータ関連から消費を推論できません。
examples:
  - id: ingestible-information-positive

    labels:
      zh: 已读取的策略 PDF 信息快照
      en: Read policy-PDF information snapshot
      ja: 読取り済み方針PDFの情報スナップショット

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      information_id: info-policy-42
      content_digest: sha256:info-policy-42-v1
      media_type: application/pdf
      source_resource_ref: file-policy-42.pdf
      acquired_at: "2026-07-18T08:59:02Z"
      read_manifest_digest: sha256:read-manifest-policy-42-v1
      provenance_locator: pdf-page:1-12
    related_node_ids:
      - IngestibleInformation
      - IngestibleResource
      - NormalizationActivity
    related_relation_ids:
      - IngestibleInformation-is-read-from-IngestibleResource
      - NormalizationActivity-uses-IngestibleInformation

    source_claims:
      - claim-ingestible-information-loader
      - claim-ingestible-information-digest
      - claim-ingestible-information-usage
  - id: ingestible-information-counterexample

    labels:
      zh: 未读取文件资源不是可摄入信息
      en: Unread file resource is not ingestible information
      ja: 未読のファイル資源は取込み可能情報ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      resource_id: file-policy-43
      object_version: etag:182c
      byte_digest: sha256:file-policy-43-bytes
      information_id: absent
      content_digest: absent
      read_manifest_digest: absent
    related_node_ids:
      - IngestibleInformation
      - IngestibleResource
    related_relation_ids:
      - IngestibleInformation-is-read-from-IngestibleResource

    source_claims:
      - claim-ingestible-information-derivation
      - claim-ingestible-information-boundary
  - id: ingestible-information-boundary

    labels:
      zh: 仅在元数据中提及的信息
      en: Information mentioned only in metadata
      ja: メタデータでのみ言及された情報

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      information_id: info-policy-44
      content_digest: sha256:info-policy-44-v1
      source_resource_ref: file-policy-44.pdf
      metadata_reference: related_source
      input_information_refs: []
      input_manifest_digest: absent
    related_node_ids:
      - IngestibleInformation
      - NormalizationActivity
      - Document
    related_relation_ids:
      - NormalizationActivity-uses-IngestibleInformation

    source_claims:
      - claim-ingestible-information-usage
  - id: ingestible-information-instance

    labels:
      zh: 数据库行的读取信息实例
      en: "Instance: read information from a database row"
      ja: "事例: データベース行から読み取った情報"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      information_id: info-customer-723
      content_digest: sha256:info-customer-723-v4
      media_type: application/json
      source_resource_ref: database-customers-row-723
      acquired_at: "2026-07-18T12:13:05Z"
      read_manifest_digest: sha256:read-manifest-customer-723-v4
      provenance_locator: customers/row:723
    related_node_ids:
      - IngestibleInformation
      - IngestibleResource
      - Document
    related_relation_ids:
      - IngestibleInformation-is-read-from-IngestibleResource
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-ingestible-information-loader
      - claim-ingestible-information-boundary
parent_relation: null
relations:
  - id: IngestibleInformation-is-read-from-IngestibleResource
    predicate: derived_from
    target: concept:IngestibleResource
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 从可摄入资源读取
      en: is read from ingestible resource
      ja: 取込み可能資源から読み取られる
    definitions:
      zh: IngestibleInformation 从 IngestibleResource 读取，表示该信息快照的内容和来源定位由该资源的一个版本实际提供。
      en: IngestibleInformation is read from IngestibleResource when one version of that resource actually supplies the snapshot's content and source location.
      ja: IngestibleInformation が IngestibleResource から読み取られるとは、その資源の一つの版がスナップショットの内容とソース位置を実際に提供することです。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: provides_read_information
      labels:
        zh: 提供读取信息
        en: provides read information
        ja: 読取り情報を提供する
    conditions:
      - id: ingestible-information-is-read-from-resource-condition
        severity: error
        expression_language: plain
        expression: Assert only when source_resource_ref identifies the resource version read and read_manifest_digest binds that version to the same information_id and content_digest.
        explanation:
          zh: 来源引用必须定位实际读取的资源版本，读取清单必须将该版本与同一信息标识和内容摘要绑定；仅有相似文件名或 URL 不足以证明派生。
          en: The source reference must identify the resource version actually read and the read manifest must bind it to the same information ID and content digest; a similar filename or URL alone is insufficient.
          ja: ソース参照は実際に読んだ資源版を識別し、読取りマニフェストは同じ情報IDと内容ダイジェストに結び付ける必要があり、似たファイル名やURLだけでは派生を証明できません。
        source_claims:
          - claim-ingestible-information-derivation
    temporal_scope: valid-time
    boundary_context: This relation records provenance of the read snapshot, not ownership of the resource or a claim that every resource byte was consumed by normalization.
    constraints: []
    examples: []
    source_claims:
      - claim-ingestible-information-derivation
    distinct_fact_rationale: This records read provenance separately from later activity use and Document formation.
    layout_role: cross-link
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loaders that read varied source systems into Document values.
  - id: nodejs-crypto
    title: Node.js Crypto API
    url: https://nodejs.org/api/crypto.html
    type: official-doc
    source_type: official-doc
    relevance: Documents createHash and digest generation for algorithms including SHA-256.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies secure-hash algorithms that produce message digests used to detect changed messages.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities, activities, derivation, and use relations for provenance representation.
source_claims:
  - id: claim-ingestible-information-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that read varied sources into Document values. Moonweave models the read result as a separate IngestibleInformation snapshot before it is classified as a normalized Document.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-information-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies hash algorithms that generate message digests for detecting message changes. Moonweave uses algorithm-tagged content and manifest digests to pin a read information version and its evidence boundary.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-information-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities that use them. Moonweave assigns a separate information identity to the read content snapshot rather than reusing the activity or source-resource identity.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
