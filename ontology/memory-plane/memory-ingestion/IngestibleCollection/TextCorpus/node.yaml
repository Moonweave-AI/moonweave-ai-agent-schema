schema: moonweave.ai/ontology-node/v1
id: TextCorpus
kind: concept
status: accepted
labels:
  zh: 版本化文本文档语料
  en: Versioned text-document corpus
  ja: 版付きテキストDocumentコーパス
semantics:
  short_definition:
    zh: 成员全部为固定文本内容版本、可作为批量文本处理输入的可摄入集合。
    en: An ingestible collection whose members are all fixed text-content versions and which can feed batch text processing.
    ja: メンバーがすべて固定されたテキスト内容版であり、バッチテキスト処理の入力になれる取込み可能集合です。
  definition:
    zh: >-
      TextCorpus 是 IngestibleCollection 的特化，以 corpus_id、文本文档成员清单摘要、成员数、语言范围、成员身份基础和选择时间标识。
      它的每个成员必须是一个具体 TextDocument 内容版本，并可提供给批量摄入、词汇统计或索引构建；它不是单一 TextDocument、
      混合媒体集合、TfIdfIndex、EmbeddingVector、检索结果、加载器或一次训练活动。
    en: >-
      TextCorpus is an IngestibleCollection specialization identified by corpus_id, text-document member-manifest digest,
      member count, language scope, membership identity basis, and selection time. Every member must be one concrete
      TextDocument content version, and the corpus can feed batch ingestion, vocabulary statistics, or index building; it
      is not one TextDocument, mixed-media collection, TfIdfIndex, EmbeddingVector, retrieval result, loader, or one
      training activity.
    ja: >-
      TextCorpus はIngestibleCollectionの特化であり、corpus_id、テキストDocumentメンバーマニフェストダイジェスト、
      メンバー数、言語範囲、メンバー同一性基準、選択時刻で識別されます。各メンバーは一つの具体的TextDocument内容版で
      なければならず、バッチ取込み、語彙統計、索引構築に供給できます。一つのTextDocument、混合媒体集合、TfIdfIndex、
      EmbeddingVector、検索結果、ローダー、一回の訓練活動ではありません。
  why_needed:
    zh: 在不将索引或单个文本等同于语料的前提下，为批量文本处理固定一个版本化、纯文本的成员边界。
    en: Fixes a versioned all-text membership boundary for batch text processing without equating the corpus with an index or one text.
    ja: コーパスを索引や一つのテキストと同一視せず、バッチテキスト処理のために版付きの全テキストメンバー境界を固定します。
  includes:
    - zh: 由固定 TextDocument 标识与内容摘要构成的政策语料、知识库文本快照、训练或索引输入批次。
      en: Policy corpora, knowledge-base text snapshots, and training or indexing input batches composed of fixed TextDocument IDs and content digests.
      ja: 固定TextDocument IDと内容ダイジェストで構成される方針コーパス、知識ベーステキストスナップショット、訓練または索引入力バッチを含みます。
  excludes:
    - zh: 一个文本文件或文档、包含 PDF、音频或图像主要负载的混合集合、从语料计算出的词汇或 TF-IDF 索引、嵌入向量和用户检索结果。
      en: One text file or Document, a mixed collection containing PDF, audio, or image primary payloads, vocabulary or TF-IDF index computed from corpus, embedding vector, and user retrieval result.
      ja: 一つのテキストファイルまたはDocument、PDF、音声、画像の主要ペイロードを含む混合集合、コーパスから計算された語彙またはTF-IDF索引、埋込みベクトル、利用者検索結果を除きます。
  semantic_kind: collection
  aliases:
    - text corpus snapshot
    - versioned document corpus
engineering:
  explanation:
    zh: >-
      语料构建会验证每个清单条目是 TextDocument 并记录其内容摘要，再按确定顺序计算语料摘要和语言范围。词汇、TF-IDF 权重或
      嵌入是在该输入快照上计算的独立产物；当文档内容或成员发生变化时，构建新的语料版本和新的下游索引，而不修改原语料。
    en: >-
      Corpus construction validates that every manifest entry is TextDocument and records its content digest, then computes
      corpus digest and language scope in deterministic order. Vocabulary, TF-IDF weights, or embeddings are separate
      artifacts calculated from this input snapshot; when document content or membership changes, create a new corpus
      version and downstream index rather than mutate the original corpus.
    ja: >-
      コーパス構築は各マニフェスト項目がTextDocumentであることを検証し内容ダイジェストを記録してから、決定的順序でコーパス
      ダイジェストと言語範囲を計算します。語彙、TF-IDF重み、埋込みはこの入力スナップショットから計算される別成果物です。
      Document内容またはメンバーが変わる場合、元のコーパスを変更せず新しいコーパス版と下流索引を作ります。
  typical_input:
    - description: TextDocument member manifest
      format: |
        {
          "members": [
            {"document_id": "document-policy-42-v1", "content_digest": "sha256:document-policy-42-v1", "language_tag": "en"},
            {"document_id": "document-customer-terms-51-v3", "content_digest": "sha256:document-customer-terms-51-v3", "language_tag": "zh-Hans"}
          ],
          "selection_time": "2026-07-18T13:10:00Z"
        }
  typical_output:
    - description: Frozen text corpus record
      format: |
        {
          "corpus_id": "corpus-policy-customer-51-v1",
          "member_manifest_digest": "sha256:corpus-policy-customer-51-v1",
          "member_count": 2,
          "language_scope": ["en", "zh-Hans"],
          "membership_identity_basis": "document-id-and-content-digest"
        }
  reference_implementations:
    - name: Hugging Face Datasets
      url: https://huggingface.co/docs/datasets/
      description: Documents versionable datasets and batched access to dataset content.
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for generating integrity digests over corpus manifests.
    - name: scikit-learn TfidfVectorizer
      url: https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.text.TfidfVectorizer.html
      description: Documents a text-vectorization implementation that consumes a corpus and yields a separate learned representation.
structure:
  identity_keys:
    - collection_id
    - corpus_id
    - member_manifest_digest
  fields:
    - id: collection_id
      labels:
        zh: 父集合标识
        en: parent collection ID
        ja: 親集合ID
      definitions:
        zh: 保留 IngestibleCollection 的稳定集合身份；corpus_id 是文本语料的专用标识，不能替代该父级身份。
        en: Retains the stable IngestibleCollection identity; corpus_id is the text-corpus-specific identifier and cannot replace that parent identity.
        ja: 安定したIngestibleCollection同一性を保持し、corpus_id はテキストコーパス専用識別子であって親同一性を置き換えられません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: collection-policy-customer-51-v1
      source_claims:
        - claim-text-corpus-specialization
    - id: collection_kind
      labels:
        zh: 父集合类型
        en: parent collection kind
        ja: 親集合種別
      definitions:
        zh: 保留父集合的封装类型；TextCorpus 必须明确为 text-corpus，而不是仅因成员含文本而推断。
        en: Retains the parent collection's encapsulation kind; TextCorpus must explicitly be text-corpus rather than inferred merely because some members contain text.
        ja: 親集合の包摂種別を保持し、TextCorpus は一部メンバーがテキストを含むだけで推論せず text-corpus と明示しなければなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - text-corpus
      pattern: null
      example_value: text-corpus
      source_claims:
        - claim-text-corpus-specialization
    - id: corpus_id
      labels:
        zh: 语料标识
        en: corpus ID
        ja: コーパスID
      definitions:
        zh: 稳定标识语料身份族，不是一个成员文档、索引、向量或一次处理活动。
        en: Stably identifies corpus identity family rather than one member Document, index, vector, or processing activity.
        ja: 一つのメンバーDocument、索引、ベクトル、処理活動ではなく、コーパス同一性ファミリーを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: corpus-policy-customer-51-v1
      source_claims:
        - claim-text-corpus-identity
    - id: member_manifest_digest
      labels:
        zh: 文本成员清单摘要
        en: text-member manifest digest
        ja: テキストメンバーマニフェストダイジェスト
      definitions:
        zh: 记录以确定顺序列出的 TextDocument 标识与内容摘要的清单摘要，固定语料成员版本边界。
        en: Records digest of deterministically ordered manifest listing TextDocument IDs and content digests, pinning corpus membership version boundary.
        ja: 決定的順序でTextDocument IDと内容ダイジェストを列挙するマニフェストのダイジェストを記録し、コーパスメンバー版境界を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:corpus-policy-customer-51-v1
      source_claims:
        - claim-text-corpus-digest
    - id: member_count
      labels:
        zh: 文本成员数量
        en: text member count
        ja: テキストメンバー数
      definitions:
        zh: 记录冻结清单中 TextDocument 内容版本的数量，用于完整性核验但不替代清单本身。
        en: Records number of TextDocument content versions in frozen manifest for integrity verification but does not replace manifest itself.
        ja: 完全性検証のため固定マニフェスト内のTextDocument内容版数を記録しますが、マニフェスト自体を置き換えません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-text-corpus-manifest
    - id: language_scope
      labels:
        zh: 语言范围
        en: language scope
        ja: 言語範囲
      definitions:
        zh: 记录清单成员中已声明或验证的语言标签集合，用于选择文本处理策略，不作为成员内容身份的替代。
        en: Records set of declared or verified language tags among manifest members for choosing text-processing strategy, not as substitute for member content identity.
        ja: テキスト処理方針を選ぶため、マニフェストメンバー内の宣言済みまたは検証済み言語タグ集合を記録し、メンバー内容同一性の代替にはしません。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - en
        - zh-Hans
      source_claims:
        - claim-text-corpus-language
    - id: membership_identity_basis
      labels:
        zh: 成员身份基础
        en: membership identity basis
        ja: メンバー同一性基準
      definitions:
        zh: 声明语料成员必须以 TextDocument 标识加规范内容摘要识别，避免显示标题、文件路径或语言标签替代具体内容版本。
        en: Declares that corpus members are identified by TextDocument ID plus canonical content digest, preventing display title, file path, or language tag from replacing concrete content version.
        ja: コーパスメンバーがTextDocument IDと正規内容ダイジェストで識別されることを宣言し、表示題名、ファイルパス、言語タグが具体的内容版を置き換えることを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - document-id-and-content-digest
      pattern: null
      example_value: document-id-and-content-digest
      source_claims:
        - claim-text-corpus-manifest
    - id: selection_time
      labels:
        zh: 语料选择时间
        en: corpus selection time
        ja: コーパス選択時刻
      definitions:
        zh: 记录文本成员清单被验证和冻结的时刻，不是语料训练开始、索引构建结束或单个文档生成时间。
        en: Records when text member manifest was validated and frozen, not corpus training start, index-build end, or individual document generation time.
        ja: テキストメンバーマニフェストを検証して固定した時刻を記録し、コーパス訓練開始、索引構築終了、個別Document生成時刻ではありません。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T13:10:00Z"
      source_claims:
        - claim-text-corpus-temporal
    - id: corpus_purpose
      labels:
        zh: 语料用途
        en: corpus purpose
        ja: コーパス用途
      definitions:
        zh: 声明该输入集合预期用于摄入、文本统计、索引构建或评估，不表示已经产生索引或模型。
        en: Declares intended use of input collection for ingestion, text statistics, index build, or evaluation, without asserting that an index or model already exists.
        ja: 索引またはモデルがすでに存在すると主張せず、入力集合の取込み、テキスト統計、索引構築、評価への意図された用途を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - batch-ingestion
        - vocabulary-statistics
        - index-build-input
        - evaluation-input
      pattern: null
      example_value: index-build-input
      source_claims:
        - claim-text-corpus-boundary
  constraints:
    - id: text-corpus-all-text-members
      expression: corpus_id, member_manifest_digest, member_count, language_scope, membership_identity_basis, selection_time, and corpus_purpose are required; every manifest entry must identify one TextDocument and its matching content_digest.
      explanation:
        zh: TextCorpus 的种差是全部成员均为已验证文本内容版本；混合媒体集合即使具有成员清单也只能是一般 IngestibleCollection。
        en: TextCorpus differentia requires every member to be verified text content version; a mixed-media collection remains general IngestibleCollection even with a manifest.
        ja: TextCorpusの種差はすべてのメンバーが検証済みテキスト内容版であることで、マニフェストがあっても混合媒体集合は一般IngestibleCollectionのままです。
    - id: text-corpus-versioned-membership
      expression: Changing any member document_id, content_digest, deterministic order, language_scope derived from members, or membership_identity_basis requires a new member_manifest_digest and corpus version record.
      explanation:
        zh: 语料成员资格是版本化事实；同一个 document_id 的新正文、成员增删或排序变化都不得静默复用旧语料摘要。
        en: Corpus membership is a versioned fact; a new body under same document_id, membership addition or removal, or ordering change cannot silently reuse old corpus digest.
        ja: コーパスメンバー資格は版付き事実であり、同じdocument_idの新本文、メンバー追加または削除、順序変更は古いコーパスダイジェストを黙って再利用できません。
    - id: text-corpus-index-separation
      expression: Any vocabulary, TF-IDF weights, embedding vectors, or index built from this corpus must reference member_manifest_digest and be modeled as a separate artifact or activity rather than a corpus field.
      explanation:
        zh: 语料保存版本化输入成员，索引与向量保存从其计算出的产物；两者必须分开才能在重建时保持输入出处。
        en: Corpus preserves versioned input members while indexes and vectors preserve computed artifacts; separation is required to retain input provenance when rebuilding.
        ja: コーパスは版付き入力メンバーを保存し、索引とベクトルは計算成果物を保存するため、再構築時にも入力来歴を保持するには分離が必要です。
examples:
  - id: text-corpus-positive

    labels:
      zh: 固定双语政策文本语料
      en: Frozen bilingual policy-text corpus
      ja: 固定された二言語方針テキストコーパス

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      collection_id: collection-policy-customer-51-v1
      collection_kind: text-corpus
      corpus_id: corpus-policy-customer-51-v1
      member_manifest_digest: sha256:corpus-policy-customer-51-v1
      member_count: 2
      language_scope:
        - en
        - zh-Hans
      membership_identity_basis: document-id-and-content-digest
      selection_time: "2026-07-18T13:10:00Z"
      corpus_purpose: index-build-input
    related_node_ids:
      - TextCorpus
      - IngestibleCollection
      - TextDocument
      - Index
    related_relation_ids:
      - TextCorpus-is_a-IngestibleCollection
      - TextCorpus-contains-TextDocument

    source_claims:
      - claim-text-corpus-manifest
      - claim-text-corpus-digest
      - claim-text-corpus-membership
  - id: text-corpus-counterexample

    labels:
      zh: 从语料计算的 TF-IDF 索引不是语料
      en: TF-IDF index computed from corpus is not corpus
      ja: コーパスから計算したTF-IDF索引はコーパスではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      index_id: index-policy-customer-51-v1
      corpus_manifest_ref: sha256:corpus-policy-customer-51-v1
      vocabulary_size: 1842
      idf_weights_ref: sha256:idf-policy-customer-51-v1
      corpus_id: absent
      member_manifest_digest: absent
    related_node_ids:
      - TextCorpus
      - Index
      - TextDocument
    related_relation_ids:
      - TextCorpus-contains-TextDocument

    source_claims:
      - claim-text-corpus-boundary
  - id: text-corpus-boundary

    labels:
      zh: 包含非文本成员的混合版本集合
      en: Mixed versioned collection containing non-text member
      ja: 非テキストメンバーを含む混合版付き集合

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      collection_id: collection-media-51-v1
      member_manifest_digest: sha256:collection-media-51-v1
      member_count: 2
      member_types:
        - TextDocument
        - Document(audio/wav)
      language_scope:
        - en
      corpus_id: absent
    related_node_ids:
      - TextCorpus
      - IngestibleCollection
      - TextDocument
      - Document
    related_relation_ids:
      - TextCorpus-is_a-IngestibleCollection
      - TextDocument-is_a-Document

    source_claims:
      - claim-text-corpus-membership
      - claim-text-corpus-boundary
  - id: text-corpus-instance

    labels:
      zh: 中文客户支持文本语料实例
      en: "Instance: Chinese customer-support text corpus"
      ja: "事例: 中国語顧客サポートテキストコーパス"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      collection_id: collection-support-zh-51-v2
      collection_kind: text-corpus
      corpus_id: corpus-support-zh-51-v2
      member_manifest_digest: sha256:corpus-support-zh-51-v2
      member_count: 340
      language_scope:
        - zh-Hans
      membership_identity_basis: document-id-and-content-digest
      selection_time: "2026-07-18T14:00:00Z"
      corpus_purpose: vocabulary-statistics
    related_node_ids:
      - TextCorpus
      - IngestibleCollection
      - TextDocument
    related_relation_ids:
      - TextCorpus-is_a-IngestibleCollection
      - TextCorpus-contains-TextDocument

    source_claims:
      - claim-text-corpus-manifest
      - claim-text-corpus-language
parent_relation:
  id: TextCorpus-is_a-IngestibleCollection
  predicate: is_a
  target: concept:IngestibleCollection
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是可摄入集合的全文本语料特化
    en: is an all-text corpus specialization of ingestible collection
    ja: 取込み可能集合の全テキストコーパス特化である
  definitions:
    zh: TextCorpus 是成员全部为固定 TextDocument 内容版本、具有语料成员清单和语言范围的 IngestibleCollection。
    en: TextCorpus is IngestibleCollection whose members are all fixed TextDocument content versions and which has corpus member manifest and language scope.
    ja: TextCorpus は、メンバーがすべて固定TextDocument内容版であり、コーパスメンバーマニフェストと言語範囲を持つIngestibleCollectionです。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_text_corpus_specialization
    labels:
      zh: 具有文本语料特化
      en: has text corpus specialization
      ja: テキストコーパス特化を持つ
  conditions:
    - id: text-corpus-is-a-ingestible-collection-condition
      severity: error
      expression_language: plain
      expression: Assert the specialization only when the object satisfies IngestibleCollection identity and additionally every manifest member resolves to TextDocument with matching content digest, language scope derives from members, and corpus manifest is frozen.
      explanation:
        zh: 一般集合身份之外，必须证明每个成员是版本匹配的 TextDocument，语言范围来源于成员且清单已经冻结；集合名称或存在文本附件不足以形成语料种差。
        en: Beyond general collection identity, every member must be proven a version-matching TextDocument, language scope must derive from members, and manifest must be frozen; a collection name or text attachment is insufficient differentia.
        ja: 一般集合同一性に加え、各メンバーが版一致するTextDocumentであること、言語範囲がメンバーから導かれること、マニフェストが固定されることを証明する必要があり、集合名やテキスト添付では種差として不十分です。
      source_claims:
        - claim-text-corpus-specialization
