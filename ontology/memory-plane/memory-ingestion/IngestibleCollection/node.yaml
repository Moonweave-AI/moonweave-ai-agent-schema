schema: moonweave.ai/ontology-node/v1
id: IngestibleCollection
kind: concept
status: accepted
labels:
  zh: 版本化可摄入集合
  en: Versioned ingestible collection
  ja: 版付き取込み可能集合
semantics:
  short_definition:
    zh: 以固定成员清单和版本摘要标识、可作为一次摄入运行输入边界的资源或信息集合。
    en: A resource or information collection identified by fixed member manifest and version digest and usable as an ingestion-run input boundary.
    ja: 固定されたメンバーマニフェストと版ダイジェストで識別され、一回の取込み実行の入力境界として使える資源または情報の集合です。
  definition:
    zh: >-
      IngestibleCollection 是具有 collection_id、集合类型、成员清单摘要、成员数、成员身份基础和选择时间的版本化输入集合。
      其成员保留独立身份，可由 IngestionRun 在冻结后实际消费；它不是单个 FileResource、Document、TextDocument、
      未求值动态查询、加载器、摄入运行、索引或处理结果。
    en: >-
      IngestibleCollection is a versioned input collection with collection_id, collection kind, member-manifest digest,
      member count, membership identity basis, and selection time. Its members retain independent identity and can be
      actually consumed by an IngestionRun after freezing; it is not one FileResource, Document, TextDocument, unevaluated
      dynamic query, loader, ingestion run, index, or processing result.
    ja: >-
      IngestibleCollection は collection_id、集合種別、メンバーマニフェストダイジェスト、メンバー数、メンバー同一性基準、
      選択時刻を持つ版付き入力集合です。メンバーは独立同一性を保ち、固定後にIngestionRunが実際に消費できます。
      一つのFileResource、Document、TextDocument、未評価の動的問合せ、ローダー、取込み実行、索引、処理結果ではありません。
  why_needed:
    zh: 固定批量输入边界并将集合身份与成员资源、动态选择规则和运行活动分离，使摄入可重放并可解释成员变更。
    en: Freezes batch input boundary and separates collection identity from member resources, dynamic selection rules, and run activity so ingestion is replayable and membership changes explainable.
    ja: バッチ入力境界を固定し、集合同一性をメンバー資源、動的選択規則、実行活動から分離して、取込みを再生可能にしメンバー変更を説明可能にします。
  includes:
    - zh: 具有版本化文件、对象、数据库行、文档或文本成员清单的目录快照、数据集批次和语料集合。
      en: Directory snapshots, dataset batches, and corpus collections with versioned manifests of files, objects, database rows, Documents, or text members.
      ja: ファイル、オブジェクト、データベース行、Document、テキストメンバーの版付きマニフェストを持つディレクトリスナップショット、データセットバッチ、コーパス集合を含みます。
  excludes:
    - zh: 一个独立成员、只是来源选择规则的动态查询、还未冻结结果的目录、一次运行、资源读取事实、加载器实现和由集合训练出的索引。
      en: One independent member, a dynamic query that is only source-selection rule, a directory whose results are not frozen, one run, a resource-read fact, loader implementation, and an index trained from the collection.
      ja: 一つの独立メンバー、ソース選択規則だけの動的問合せ、結果が固定されていないディレクトリ、一回の実行、資源読取り事実、ローダー実装、集合から訓練された索引を除きます。
  semantic_kind: collection
  aliases:
    - ingestion batch snapshot
    - frozen input collection
engineering:
  explanation:
    zh: >-
      运行在读取前计算成员清单，按成员标识和版本形成摘要，并记录集合类型、成员数和选择时刻。随后运行把该摘要写入运行清单，
      各个资源读取可回溯到同一快照。成员、成员版本或排序规则发生变化时应建立新的集合版本，而不是覆盖旧摘要。
    en: >-
      Before reading, a run computes member manifest, digests member identities and versions, and records collection kind,
      member count, and selection time. It then stores that digest in the run manifest so every resource read traces to
      one snapshot. Changing a member, member version, or ordering rule creates a new collection version rather than
      overwriting old digest.
    ja: >-
      読取り前に実行はメンバーマニフェストを計算し、メンバー同一性と版をダイジェスト化し、集合種別、メンバー数、選択時刻を記録します。
      その後実行マニフェストにダイジェストを保存し、各資源読取りが一つのスナップショットへ追跡できるようにします。メンバー、
      メンバー版、順序規則を変える場合は旧ダイジェストを上書きせず新しい集合版を作ります。
  typical_input:
    - description: Candidate member snapshot
      format: |
        {
          "collection_kind": "directory-snapshot",
          "members": [
            {"resource_ref": "file-policy-42.pdf", "version_ref": "etag:7fa4"},
            {"resource_ref": "file-policy-43.pdf", "version_ref": "etag:9d10"}
          ],
          "selection_time": "2026-07-18T08:58:55Z"
        }
  typical_output:
    - description: Frozen collection record
      format: |
        {
          "collection_id": "collection-policy-directory-42",
          "collection_kind": "directory-snapshot",
          "member_manifest_digest": "sha256:collection-policy-directory-42-v1",
          "member_count": 2,
          "membership_identity_basis": "resource-id-and-version",
          "selection_time": "2026-07-18T08:58:55Z"
        }
  reference_implementations:
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for creating an integrity digest over a member manifest.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
      description: Specifies hash algorithms used to detect changes in messages and manifest content.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities used by activities and provenance facts that remain separate from activities.
structure:
  identity_keys:
    - collection_id
    - member_manifest_digest
  fields:
    - id: collection_id
      labels:
        zh: 集合标识
        en: collection ID
        ja: 集合ID
      definitions:
        zh: 稳定标识集合身份族，不是其中一个成员、运行标识、动态查询文本或生成的索引标识。
        en: Stably identifies collection identity family rather than one member, run ID, dynamic query text, or generated index ID.
        ja: 一つのメンバー、実行ID、動的問合せテキスト、生成索引IDではなく、集合同一性ファミリーを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: collection-policy-directory-42
      source_claims:
        - claim-ingestible-collection-identity
    - id: collection_kind
      labels:
        zh: 集合类型
        en: collection kind
        ja: 集合種別
      definitions:
        zh: 声明成员清单的来源和封装形态，例如目录快照、数据集批次或文本语料，不是运行状态或成员媒体类型。
        en: Declares source and encapsulation form of member manifest, such as directory snapshot, dataset batch, or text corpus, rather than run status or member media type.
        ja: 実行状態やメンバーメディア型ではなく、ディレクトリスナップショット、データセットバッチ、テキストコーパスなど、メンバーマニフェストのソースと包摂形態を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - directory-snapshot
        - dataset-batch
        - database-snapshot
        - text-corpus
        - graph-snapshot
      pattern: null
      example_value: directory-snapshot
      source_claims:
        - claim-ingestible-collection-manifest
    - id: member_manifest_digest
      labels:
        zh: 成员清单摘要
        en: member manifest digest
        ja: メンバーマニフェストダイジェスト
      definitions:
        zh: 记录按确定顺序列出成员标识、版本与可选定位范围的清单摘要，固定集合版本而不是只报告成员数。
        en: Records digest of deterministically ordered manifest listing member identities, versions, and optional locator scopes, pinning collection version rather than reporting only count.
        ja: 決定的順序でメンバー同一性、版、任意の位置範囲を列挙するマニフェストのダイジェストを記録し、数だけを報告せず集合版を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:collection-policy-directory-42-v1
      source_claims:
        - claim-ingestible-collection-digest
    - id: member_count
      labels:
        zh: 成员数量
        en: member count
        ja: メンバー数
      definitions:
        zh: 记录冻结清单中的成员数量，用于完整性检查但不替代成员标识与版本清单。
        en: Records number of members in frozen manifest for integrity checking but does not replace member identity and version manifest.
        ja: 完全性検査のため固定マニフェスト内のメンバー数を記録しますが、メンバー同一性と版マニフェストを置き換えません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-ingestible-collection-manifest
    - id: membership_identity_basis
      labels:
        zh: 成员身份基础
        en: membership identity basis
        ja: メンバー同一性基準
      definitions:
        zh: 声明清单如何识别成员和成员版本，例如资源标识与版本或文档标识与内容摘要，防止以显示名称替代版本身份。
        en: Declares how the manifest identifies members and member versions, such as resource ID plus version or Document ID plus content digest, preventing display names from replacing version identity.
        ja: 表示名で版同一性を置き換えないよう、資源IDと版またはDocument IDと内容ダイジェストなど、マニフェストがメンバーとメンバー版を識別する方法を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - resource-id-and-version
        - document-id-and-content-digest
        - row-id-and-row-version
        - graph-id-and-snapshot-version
      pattern: null
      example_value: resource-id-and-version
      source_claims:
        - claim-ingestible-collection-manifest
    - id: selection_time
      labels:
        zh: 选择时间
        en: selection time
        ja: 選択時刻
      definitions:
        zh: 记录成员清单被求值和冻结的时刻，不是运行开始、成员创建或后续读取时间。
        en: Records when the member manifest was evaluated and frozen, not run start, member creation, or later read time.
        ja: メンバーマニフェストを評価して固定した時刻を記録し、実行開始、メンバー作成、後の読取り時刻ではありません。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:58:55Z"
      source_claims:
        - claim-ingestible-collection-temporal
    - id: manifest_locator
      labels:
        zh: 清单定位符
        en: manifest locator
        ja: マニフェスト位置指定子
      definitions:
        zh: 可选地记录可取得冻结成员清单的定位符，不将其本身作为集合身份或清单内容的替代。
        en: Optionally records a locator from which frozen member manifest can be obtained, without making the locator itself collection identity or substitute for manifest content.
        ja: 固定メンバーマニフェストを取得できる位置指定子を任意に記録し、その位置指定子自体を集合同一性やマニフェスト内容の代替にはしません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: manifests/collection-policy-directory-42-v1.json
      source_claims:
        - claim-ingestible-collection-manifest
  constraints:
    - id: ingestible-collection-frozen-membership
      expression: collection_id, collection_kind, member_manifest_digest, member_count, membership_identity_basis, and selection_time are required; member_manifest_digest must cover a deterministic list of member identities and versions.
      explanation:
        zh: 集合是冻结成员快照而非数量或查询文本；没有确定成员版本清单时，运行无法重放或解释以后成员变化。
        en: A collection is a frozen member snapshot rather than a count or query text; without determinate member-version manifest a run cannot replay or explain later membership changes.
        ja: 集合は数や問合せテキストではなく固定メンバースナップショットであり、確定したメンバー版マニフェストなしには実行を再生したり後のメンバー変更を説明したりできません。
    - id: ingestible-collection-version-change
      expression: Changing any member identity, member version, locator scope, deterministic order, or membership_identity_basis requires a new member_manifest_digest and new collection version record.
      explanation:
        zh: 成员边界的变化必须显式可见；不得通过保持旧摘要而静默增删成员或替换同名资源版本。
        en: A membership-boundary change must be explicit; members cannot be silently added, removed, or replaced by same-named resource version while retaining old digest.
        ja: メンバー境界変更は明示的である必要があり、旧ダイジェストを保ったままメンバーを黙って追加、削除、同名資源版へ置換してはいけません。
    - id: ingestible-collection-run-consumption
      expression: An IngestionRun may consume this collection only when its input_collection_ref and run_manifest_digest bind to this collection_id and member_manifest_digest and at least one manifest member has an actual attempted read.
      explanation:
        zh: 一个运行的计划或动态查询不能证明集合已被消费；运行引用、冻结清单和实际成员读取证据必须同时存在。
        en: A run plan or dynamic query does not prove collection consumption; run reference, frozen manifest, and actual member-read evidence must coexist.
        ja: 実行計画や動的問合せは集合消費を証明せず、実行参照、固定マニフェスト、実際のメンバー読取り証拠が共存する必要があります。
examples:
  - id: ingestible-collection-positive

    labels:
      zh: 固定的策略目录快照集合
      en: Frozen policy-directory snapshot collection
      ja: 固定された方針ディレクトリスナップショット集合

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      collection_id: collection-policy-directory-42
      collection_kind: directory-snapshot
      member_manifest_digest: sha256:collection-policy-directory-42-v1
      member_count: 2
      membership_identity_basis: resource-id-and-version
      selection_time: "2026-07-18T08:58:55Z"
      manifest_locator: manifests/collection-policy-directory-42-v1.json
    related_node_ids:
      - IngestibleCollection
      - IngestionRun
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-uses-IngestibleCollection
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestible-collection-manifest
      - claim-ingestible-collection-digest
      - claim-ingestible-collection-consumption
  - id: ingestible-collection-counterexample

    labels:
      zh: 单个来源文件不是输入集合
      en: One source file is not input collection
      ja: 一つのソースファイルは入力集合ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      resource_ref: file-policy-42.pdf
      resource_version_ref: etag:7fa4
      resource_content_digest: sha256:file-policy-42-bytes
      collection_id: absent
      member_manifest_digest: absent
      member_count: absent
    related_node_ids:
      - IngestibleCollection
      - IngestibleResource
      - IngestionRun
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource
      - IngestionRun-uses-IngestibleCollection

    source_claims:
      - claim-ingestible-collection-boundary
  - id: ingestible-collection-boundary

    labels:
      zh: 尚未冻结结果的动态来源查询
      en: Dynamic source query with unfrozen results
      ja: 結果が未固定の動的ソース問合せ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      query_id: query-policy-recent
      query_expression: updated_at > now()-1d
      source_locator: s3://policy-corpus/legal/
      collection_id: absent
      member_manifest_digest: absent
      member_count: absent
      selection_time: absent
    related_node_ids:
      - IngestibleCollection
      - IngestionRun
    related_relation_ids:
      - IngestionRun-uses-IngestibleCollection

    source_claims:
      - claim-ingestible-collection-boundary
      - claim-ingestible-collection-consumption
  - id: ingestible-collection-instance

    labels:
      zh: 客户数据库行快照批次
      en: "Instance: customer database-row snapshot batch"
      ja: "事例: 顧客データベース行スナップショットバッチ"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      collection_id: collection-customers-51
      collection_kind: database-snapshot
      member_manifest_digest: sha256:collection-customers-51-v3
      member_count: 3
      membership_identity_basis: row-id-and-row-version
      selection_time: "2026-07-18T12:12:59Z"
      manifest_locator: manifests/collection-customers-51-v3.json
    related_node_ids:
      - IngestibleCollection
      - IngestionRun
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-uses-IngestibleCollection
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestible-collection-manifest
      - claim-ingestible-collection-consumption
parent_relation: null
relations: []
sources:
  - id: nodejs-crypto
    title: Node.js Crypto API
    url: https://nodejs.org/api/crypto.html
    type: official-doc
    source_type: official-doc
    relevance: Documents createHash for generating digest values over collection manifests.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies secure-hash algorithms that produce message digests for detecting changes in manifests.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities used by activities and keeps collection input distinct from the consuming activity.
source_claims:
  - id: claim-ingestible-collection-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that generate message digests for detecting changed messages. Moonweave uses an algorithm-tagged digest of a deterministic member manifest to pin one collection version.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-collection-manifest
    source: nodejs-crypto
    supports: Node.js documents createHash for producing a digest from bytes. Moonweave uses a deterministic serialized member manifest with member identity and version as the input to a collection-manifest digest.
    locator: Node.js crypto createHash API and digest examples
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestible-collection-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes independently identifiable entities from activities that use them. Moonweave gives a collection snapshot its own identity apart from each member and the ingestion run consuming it.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-collection-temporal
    source: w3c-prov-o
    supports: PROV-O represents temporal facts for provenance participants. Moonweave records collection selection time separately from run start, member creation, and later resource-read times.
    locator: PROV-O temporal properties and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestible-collection-consumption
    source: w3c-prov-o
    supports: PROV-O states that activities can use entities during their lifetime. Moonweave asserts that a run consumes a collection only when frozen manifest evidence and actual member-read evidence bind that collection to the run.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-collection-boundary
    source: w3c-prov-o
    supports: PROV-O keeps entities and activities distinct and does not make an unevaluated query result a fixed entity. Moonweave keeps dynamic selection rule separate from a frozen ingestible collection snapshot.
    locator: PROV-O Entity Activity identity and usage relations
    evidence_kind: ontology-design-inference
    confidence: medium
