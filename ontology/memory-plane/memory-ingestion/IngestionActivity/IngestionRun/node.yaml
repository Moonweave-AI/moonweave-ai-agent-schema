        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-ingestion-run-009
      - id: IngestionRun-has_phase-DeduplicationActivity-example-boundary-manual-20260716
        kind: boundary
        labels:
