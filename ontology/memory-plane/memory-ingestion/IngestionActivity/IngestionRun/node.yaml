schema: moonweave.ai/ontology-node/v1
id: IngestionRun
kind: concept
status: accepted
labels:
  zh: 摄入运行
  en: Ingestion run
  ja: 取込run
semantics:
  short_definition:
    zh: 按一份政策协调来源读取与有序阶段的完整摄入活动。
    en: A complete ingestion activity coordinating source reading and ordered phases under one policy.
    ja: 一policy下でsource読込と順序phaseを調整する完全取込activityです。
  definition:
    zh: IngestionRun 是一次端到端 IngestionActivity：它由稳定 run_id 标识，在一个 IngestionPolicy 下读取来源、选择 DocumentLoader、编排阶段并交付结果；它不是某一个阶段或存储写入。
    en: IngestionRun is one end-to-end IngestionActivity identified by a stable run_id that reads sources, selects a DocumentLoader, orders phases, and hands off results under one IngestionPolicy; it is not one phase or the storage write itself.
    ja: IngestionRun は安定run_idで識別し一 IngestionPolicy 下でsourceを読み DocumentLoader を選びphaseを順序化して結果をhandoffするend-to-end IngestionActivityで、単一phaseやstorage write自体ではありません。
  why_needed:
    zh: 保留完整运行身份而不把阶段输出直接提升为运行输出。
    en: Preserves complete-run identity without promoting every phase output to a run-level output.
    ja: 完全run同一性を保ち各phase出力をrun-level出力へ引き上げません。
  includes:
    - zh: 纳入有政策、来源、加载器与阶段序列的端到端运行。
      en: Includes end-to-end runs with policy, source, loader, and phase sequence.
      ja: policy・source・loader・phase sequenceを持つend-to-end runを含みます。
  excludes:
    - zh: 排除单个 IngestionPhase、Document 与 MemoryWrite。
      en: Excludes a single IngestionPhase, Document, and MemoryWrite.
      ja: 単一IngestionPhase・Document・MemoryWriteを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - ingestion_run_id
  fields:
    - id: ingestion_run_id
      labels:
        zh: 运行标识
        en: ingestion run ID
        ja: 取込run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识端到端摄入。
        en: Stable identifier for end-to-end ingestion.
        ja: end-to-end取込の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: ingest-run-17
      source_claims:
        - claim-ingestion-run-002
    - id: policy_version
      labels:
        zh: 政策版本
        en: policy version
        ja: policy版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次运行适用政策。
        en: Fixes the policy applied by this run.
        ja: run適用policyを固定します。
      allowed_values: []
      pattern: null
      example_value: ingest-policy@4
      source_claims:
        - claim-ingestion-run-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录完整运行开始。
        en: Records complete-run start time.
        ja: 完全run開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:00Z
      source_claims:
        - claim-ingestion-run-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestionRun-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 摄入运行正例
      en: "Positive case: Ingestion run"
      ja: 取込run正例
    scenario_id: null
    descriptions:
      zh: ingest-run-17 在 policy@4 下选择 loader-pdf-v3，实际读取 file-policy-v7@b7，依次编排 normalize-17 与 dedup-17，并记录最终 Document 和 Decision 引用。
      en: ingest-run-17 selects loader-pdf-v3 under policy@4, actually reads file-policy-v7@b7, orders normalize-17 and dedup-17, and records final Document and Decision references.
      ja: ingest-run-17 は policy@4 下で loader を選び resource を読み normalize-17、dedup-17 を順序化し最終 outputs を記録します。
    field_values:
      ingestion_run_id: ingest-run-17
      policy_version: ingest-policy@4
      started_at: 2026-07-16T10:00:00Z
      activity_id: ingest-run-17
      status: completed
    related_node_ids:
      - IngestionRun
    related_relation_ids: []
    expected_result:
      zh: 将该端到端执行表示为 IngestionRun，并用 run_id 连接策略、加载器、资源、阶段和结果。
      en: Represent the end-to-end execution as IngestionRun and use its run ID to connect policy, loader, resource, phases, and results.
      ja: 当該 end-to-end execution を IngestionRun とし run ID で policy、loader、resource、phases、results を接続します。
    why_valid_or_invalid:
      zh: 运行拥有完整时间边界和跨阶段协调责任，覆盖从实际读取到规范化与去重决定的接入闭环。
      en: The run owns complete temporal boundaries and cross-phase coordination, covering the ingestion loop from actual reading through normalization and deduplication decision.
      ja: run は complete temporal boundary と cross-phase coordination を持ち reading から normalization・dedup decision までを覆います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-run-005
  - id: IngestionRun-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 摄入运行边界例
      en: "Boundary case: Ingestion run"
      ja: 取込run境界例
    scenario_id: null
    descriptions:
      zh: normalize-17 只处理 info-17 并生成 document-policy-v7，不选择来源加载器、不管理 dedup-17，也没有端到端完成状态。
      en: normalize-17 only processes info-17 and generates document-policy-v7; it selects no source loader, manages no dedup-17, and has no end-to-end completion state.
      ja: normalize-17 は info-17 から document を作るだけで source loader 選択、dedup 管理、end-to-end state を持ちません。
    field_values: {}
    related_node_ids:
      - IngestionRun
    related_relation_ids: []
    expected_result:
      zh: 把 normalize-17 保持为 NormalizationActivity，而不是 IngestionRun。
      en: Keep normalize-17 as NormalizationActivity rather than IngestionRun.
      ja: normalize-17 は NormalizationActivity とし IngestionRun にしません。
    why_valid_or_invalid:
      zh: 单一阶段缺少跨阶段的读取、策略执行和最终交接责任，不能因为属于该运行就继承完整运行身份。
      en: A single phase lacks cross-phase reading, policy execution, and final-handoff responsibility and does not inherit complete-run identity merely from membership.
      ja: single phase は cross-phase reading、policy execution、handoff responsibility を欠き membership だけで complete-run identity を継承しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-run-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IngestionRun-is_a-IngestionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: IngestionRun 是 IngestionActivity 的严格子类；种差为：端到端协调来源读取、加载器选择、有序阶段与结果交接。
    en: "IngestionRun is a strict subtype of IngestionActivity; its reviewed differentia is: it coordinates source reading, loader selection, ordered phases, and result handoff end to end."
    ja: IngestionRun は IngestionActivity の厳密なsubtypeで、審査済み種差は「source read・loader選択・順序phase・result handoffをend-to-end調整します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IngestionRun-is_a-IngestionActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestionActivity and also satisfies the differentia: it coordinates source reading, loader selection, ordered phases, and result handoff end to end."
      explanations:
        zh: 仅当对象首先满足 IngestionActivity 定义且满足种差“端到端协调来源读取、加载器选择、有序阶段与结果交接。”时成立。
        en: "Assert only when the object first satisfies IngestionActivity and also satisfies the differentia: it coordinates source reading, loader selection, ordered phases, and result handoff end to end."
        ja: 対象がまず IngestionActivity を満たし、さらに種差「source read・loader選択・順序phase・result handoffをend-to-end調整します。」を満たす時だけ成立します。
      source_claims:
        - claim-ingestion-run-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IngestionRun-is_a-IngestionActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: ingest-run-17 具有完整 start/end、policy@4、实际读取资源、loader 调用、两个有序阶段和最终输出状态，覆盖接入的端到端执行。
        en: ingest-run-17 has complete start and end times, policy@4, an actually read resource, a loader invocation, two ordered phases, and final output state, covering end-to-end ingestion execution.
        ja: ingest-run-17 は complete start/end、policy、read resource、loader call、ordered phases、final state を持ちます。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - IngestionActivity
      related_relation_ids:
        - IngestionRun-is_a-IngestionActivity
      expected_result:
        zh: 确认 ingest-run-17 是 IngestionActivity 的 IngestionRun 特化。
        en: Confirm ingest-run-17 as an IngestionRun specialization of IngestionActivity.
        ja: ingest-run-17 を IngestionActivity の IngestionRun specialization とします。
      why_valid_or_invalid:
        zh: 它满足活动的发生、时间和输入输出条件，并以跨阶段协调及完整运行状态形成种差。
        en: It satisfies occurrence, temporal, input, and output conditions of Activity and adds cross-phase coordination and complete-run state as differentia.
        ja: Activity occurrence・time・input/output 条件を満たし cross-phase coordination・complete-run state を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestion-run-007
    - id: IngestionRun-is_a-IngestionActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: normalize-17 有局部时间和输出，但只承担一种变换，不读取外部资源、不选择 loader，也不管理 dedup-17。
        en: normalize-17 has local time and output but performs one transformation, reads no external resource, selects no loader, and does not manage dedup-17.
        ja: normalize-17 は local time・output を持つが一 transformation だけで external read、loader selection、dedup management がありません。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - IngestionActivity
      related_relation_ids:
        - IngestionRun-is_a-IngestionActivity
      expected_result:
        zh: 不要通过该子类边把单个 NormalizationActivity 归为完整 IngestionRun。
        en: Do not use this subtype edge to classify one NormalizationActivity as a complete IngestionRun.
        ja: この subtype edge で一 NormalizationActivity を complete IngestionRun に分類しません。
      why_valid_or_invalid:
        zh: 局部活动满足上位 Activity 不代表满足完整运行种差；端到端范围与协调责任不可缺失。
        en: A local activity can satisfy the Activity parent without satisfying the complete-run differentia; end-to-end scope and coordination responsibility are required.
        ja: local activity が Activity parent を満たしても complete-run differentia の end-to-end scope・coordination が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestion-run-007
  source_claims:
    - claim-ingestion-run-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: IngestionRun-governed_by-IngestionPolicy
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受摄入政策治理
      en: governed by ingestion policy
      ja: 取込policyに統治される
    definitions:
      zh: IngestionRun —governed_by→ IngestionPolicy 表示运行在开始时固定并遵守该政策版本的来源、加载器、阶段与失败约束。
      en: IngestionRun —governed_by→ IngestionPolicy means that the run fixes and follows that policy version's source, loader, phase, and failure constraints at start.
      ja: IngestionRun —governed_by→ IngestionPolicy はrun開始時にそのpolicy版のsource・loader・phase・failure制約を固定遵守することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_governed_by
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: IngestionRun-governed_by-IngestionPolicy-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when run.policy_version matches the policy's composite identity and execution did not exceed its scope.
        explanations:
          zh: 仅当 run.policy_version 与目标复合政策身份一致且执行记录未越权时成立。
          en: Assert only when run.policy_version matches the policy's composite identity and execution did not exceed its scope.
          ja: run.policy_versionがpolicy複合同一性と一致しexecutionがscopeを越えない時だけ成立します。
        source_claims:
          - claim-ingestion-run-008
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IngestionRun-governed_by-IngestionPolicy-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 受摄入政策治理正例
          en: "Positive case: governed by ingestion policy"
          ja: 取込policyに統治される正例
        scenario_id: null
        descriptions:
          zh: ingest-run-17 的 policy_ref 固定 ingest-policy@4，运行清单显示所读来源、loader、文件大小、规范化 profile 与去重键均满足该版本约束。
          en: ingest-run-17 fixes ingest-policy@4 in policy_ref, and its manifest shows that sources, loader, file size, normalization profile, and deduplication key all satisfy that version's constraints.
          ja: ingest-run-17 policy_ref が ingest-policy@4 を固定し sources、loader、size、profiles が constraints を満たします。
        field_values: {}
        related_node_ids:
          - IngestionRun
          - IngestionPolicy
        related_relation_ids:
          - IngestionRun-governed_by-IngestionPolicy
        expected_result:
          zh: 建立 ingest-run-17 governed_by ingest-policy@4，并保留确切 policy version。
          en: Assert ingest-run-17 governed_by ingest-policy@4 and retain the exact policy version.
          ja: ingest-run-17 governed_by ingest-policy@4 を exact version 付きで確立します。
        why_valid_or_invalid:
          zh: 运行声明、实际执行证据和策略适用范围一致，因此该规范确实约束了本次运行。
          en: The run declaration, actual execution evidence, and policy applicability agree, so this specification genuinely governed the run.
          ja: run declaration、actual execution evidence、policy applicability が一致し governance を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-ingestion-run-008
      - id: IngestionRun-governed_by-IngestionPolicy-example-boundary-manual-20260716
