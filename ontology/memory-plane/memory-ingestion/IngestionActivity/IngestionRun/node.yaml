          en: Do not claim effective governance of ingest-run-18 by policy@4 from policy_ref alone.
          ja: policy_ref だけで ingest-run-18 の effective governance を主張しません。
        why_valid_or_invalid:
          zh: 引用规范与实际遵循规范是不同事实；有效治理边要求适用条件和执行约束同时满足。
          en: Referencing a specification and complying with it are different facts; an effective governance edge requires both applicability and execution constraints to hold.
          ja: specification reference と compliance は別事実で effective governance は applicability・execution constraints の成立を要します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-ingestion-run-008
    source_claims:
      - claim-ingestion-run-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:IngestionPolicy
  - id: IngestionRun-has_phase-DeduplicationActivity
    predicate: has_phase
