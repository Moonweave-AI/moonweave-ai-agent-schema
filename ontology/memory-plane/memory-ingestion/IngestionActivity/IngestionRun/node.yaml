      en: IngestionRun —has_phase→ DeduplicationActivity means that the deduplication phase belongs to this run and executes in its ordered plan.
      ja: IngestionRun —has_phase→ DeduplicationActivity はdeduplication phaseがこのrunに属しordered plan内で実行されることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_has_phase
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: IngestionRun-has_phase-DeduplicationActivity-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when phase.ingestion_run_id matches and sequence follows normalization.
        explanations:
          zh: 仅当 phase.ingestion_run_id 匹配且 sequence 位于规范化之后时成立。
          en: Assert only when phase.ingestion_run_id matches and sequence follows normalization.
