schema: moonweave.ai/ontology-node/v1
id: IngestionRun
kind: concept
labels:
  zh: 摄入运行
  en: Ingestion run
  ja: 取込ラン
semantics:
  short_definition:
    zh: 按一份政策协调来源读取与有序阶段的完整摄入活动。
    en: Complete ingestion activity coordinating source reads and ordered phases under one policy.
    ja: 一 policy 下で source read/順序 phase を調整する complete ingestion activity。
  definition:
    zh: IngestionRun 是由 ingestion_run_id 标识的端到端 IngestionActivity：在 IngestionPolicy 下读取 IngestibleResource、选择 DocumentLoader、编排 NormalizationActivity 与 DeduplicationActivity 并交付 Document 与 DeduplicationDecision；对应 LlamaIndex IngestionPipeline.run() 一次调用；不是单阶段或向量写入。
    en: IngestionRun is an end-to-end IngestionActivity identified by ingestion_run_id that reads IngestibleResource under IngestionPolicy, selects DocumentLoader, orders NormalizationActivity and DeduplicationActivity, and delivers Document and DeduplicationDecision; maps to one LlamaIndex IngestionPipeline.run() invocation; not one phase or vector write.
    ja: IngestionRun は ingestion_run_id で識別する end-to-end IngestionActivity。IngestionPolicy 下で IngestibleResource read/DocumentLoader 選択/NormalizationActivity+DeduplicationActivity orchestration/Document+DeduplicationDecision 交付。LlamaIndex IngestionPipeline.run() 一回呼出しに対応。単 phase/vector write ではない。
  why_needed:
    zh: 保留完整运行身份，连接 policy、loader、resource、phase 与 handoff 产物，支持端到端审计。
    en: Preserves complete-run identity linking policy, loader, resource, phases, and handoff artifacts for end-to-end audit.
    ja: complete run identity で policy/loader/resource/phase/handoff artifact を接続し end-to-end audit を支援。
  includes:
    - zh: 纳入有 policy_ref、实际 reads、loader 调用与 phase 序列的端到端运行。
      en: Includes end-to-end runs with policy_ref, actual reads, loader invocation, and phase sequence.
      ja: policy_ref/actual reads/loader invocation/phase sequence を持つ end-to-end run。
  excludes:
    - zh: 排除单个 IngestionPhase、MemoryWrite 与向量 index upsert 本身。
      en: Excludes single IngestionPhase, MemoryWrite, and vector index upsert itself.
      ja: 単 IngestionPhase/MemoryWrite/vector index upsert 自体を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: pipeline.run(documents=...) 是一次 IngestionRun；运行记录 ingestion_policy_ref、source_resource_ref、loader_ref；discoverable loader 或 indexed 文件不等于 reads；dedup 决定绑定比较时 content_digest。
    en: pipeline.run(documents=...) is one IngestionRun; run records ingestion_policy_ref, source_resource_ref, loader_ref; discoverable loader or indexed file does not equal reads; dedup decisions bind content_digest at comparison time.
    ja: pipeline.run=一 IngestionRun。run は ingestion_policy_ref/source_resource_ref/loader_ref 記録。discoverable loader/indexed file≠reads。dedup decision は比較時 content_digest binding。
  typical_input:
    - description: LlamaIndex IngestionPipeline.run
      format: |
        nodes = pipeline.run(documents=loaded_documents, show_progress=True)
      source_claims: [claim-ingestion-run-llamaindex]
  typical_output:
    - description: Moonweave ingestion run handoff
      format: |
        {
          "ingestion_run_id": "ingest-run-17",
          "ingestion_policy_ref": "policy-pdf-v3@3.2.1",
          "document_id": "document-policy-v7",
          "deduplication_decision": {"outcome": "update"}
        }
      source_claims: [claim-ingestion-run-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: End-to-end pipeline.run with dedup and upsert.
    - name: LangChain Document Loading
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: Loader-driven ingestion runs.
structure:
  identity_keys: [ingestion_run_id]
  fields:
    - id: ingestion_run_id
      labels: {zh: 运行标识, en: Ingestion run identifier, ja: 取込 run 識別子}
      definitions:
        zh: 稳定标识一次端到端摄入运行。
        en: Stable identifier for one end-to-end ingestion run.
        ja: 一 end-to-end ingestion run を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ingest-run-17
      allowed_values: []
      source_claims: [claim-ingestion-run-id]
    - id: policy_version
      labels: {zh: 政策版本, en: Policy version, ja: policy 版}
      definitions:
        zh: 本次运行开始时固定并遵守的 IngestionPolicy 版本引用。
        en: IngestionPolicy version reference fixed and followed at run start.
        ja: run 開始時に固定遵守する IngestionPolicy 版 ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ingest-policy@4
      allowed_values: []
      source_claims: [claim-ingestion-run-policy]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 完整运行开始的 UTC 时间。
        en: UTC time when the complete run started.
        ja: complete run 開始 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T10:00:00Z
      allowed_values: []
      source_claims: [claim-ingestion-run-started]
  constraints: []
  required_relations: []
examples:
  - id: IngestionRun-example-llamaindex-full
    labels:
      zh: LlamaIndex 完整运行
      en: LlamaIndex full run
      ja: LlamaIndex full run
    descriptions:
      zh: ingest-run-17 在 policy@4 下选择 loader-pdf-v3，reads file-policy-v7，顺序执行 normalize-17→dedup-17，产出 document-policy-v7 与 decision-17（outcome=update）。
      en: ingest-run-17 selects loader-pdf-v3 under policy@4, reads file-policy-v7, runs normalize-17→dedup-17, producing document-policy-v7 and decision-17 (outcome=update).
      ja: ingest-run-17 が policy@4 下 loader-pdf-v3 選択、file-policy-v7 read、normalize-17→dedup-17 実行、document-policy-v7/decision-17（update）产出。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: IngestionPipeline.run
    field_values:
      ingestion_run_id: ingest-run-17
      policy_version: ingest-policy@4
      started_at: 2026-07-16T10:00:00Z
    related_node_ids: [IngestionRun, NormalizationActivity, DeduplicationActivity, Document]
    related_relation_ids: []
    source_claims: [claim-ingestion-run-llamaindex]
  - id: IngestionRun-example-policy-governance
    labels:
      zh: 政策治理运行
      en: Policy-governed run
      ja: policy governance run
    descriptions:
      zh: ingest-run-17 policy_ref=ingest-policy@4；manifest 显示来源、loader、max file size 与 dedup 键均满足该版约束；引用 policy 不等于有效治理，需执行证据一致。
      en: ingest-run-17 policy_ref=ingest-policy@4; manifest shows sources, loader, max file size, and dedup key satisfy that version; citing policy does not equal effective governance without matching execution evidence.
      ja: ingest-run-17 policy_ref=ingest-policy@4。manifest が source/loader/max size/dedup key 制約充足。policy 引用≠effective governance（実行 evidence 一致必須）。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: governed_by
    field_values:
      ingestion_run_id: ingest-run-17
      policy_version: ingest-policy@4
    related_node_ids: [IngestionRun, IngestionPolicy]
    related_relation_ids: [IngestionRun-governed_by-IngestionPolicy]
    source_claims: [claim-ingestion-run-design]
  - id: IngestionRun-example-not-phase
    labels:
      zh: 运行非单阶段
      en: Run is not single phase
      ja: run は単 phase ではない
    descriptions:
      zh: normalize-17 只处理 info-17 生成 document-policy-v7，无 loader 选择、dedup 管理与端到端状态——保持为 NormalizationActivity。
      en: normalize-17 only processes info-17 producing document-policy-v7, with no loader selection, dedup management, or end-to-end state—remains NormalizationActivity.
      ja: normalize-17 は info-17→document-policy-v7 のみ。loader 選択/dedup 管理/end-to-end state なし。NormalizationActivity のまま。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestionRun, NormalizationActivity]
    related_relation_ids: []
    source_claims: [claim-ingestion-run-design]
parent_relation:
  id: IngestionRun-is_a-IngestionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种摄入活动, en: is an ingestion activity, ja: 取込アクティビティの一種}
  definitions:
    zh: IngestionRun 种差为端到端协调 source read、loader 选择、有序 phase 与结果 handoff。
    en: IngestionRun differentia is end-to-end coordination of source read, loader selection, ordered phases, and result handoff.
    ja: IngestionRun 種差は source read/loader 選択/ordered phase/result handoff の end-to-end 調整。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-ingestion-run-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: IngestionRun-governed_by-IngestionPolicy
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 受摄入政策治理, en: governed by ingestion policy, ja: 取込 policy に統治される}
    definitions:
      zh: 运行开始时固定并遵守该 IngestionPolicy 版本的来源、loader、phase 与失败约束。
      en: Run fixes and follows that IngestionPolicy version's source, loader, phase, and failure constraints at start.
      ja: run 開始時に当該 IngestionPolicy 版の source/loader/phase/failure 制約を固定遵守。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达。
      en: Relation constrained per fact.
      ja: fact 単位制約。
    inverse_reading:
      predicate: inverse_governed_by
      labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
    conditions:
      - id: IngestionRun-governed_by-IngestionPolicy-condition
        severity: error
        expression_language: plain
        expression: Assert only when run.policy_version matches policy identity and execution did not exceed scope.
        explanation:
          zh: policy_ref 一致且执行未越权才成立有效治理。
          en: Effective governance requires matching policy_ref and in-scope execution.
          ja: policy_ref 一致かつ scope 内実行で effective governance。
        source_claims: [claim-ingestion-run-governance]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-ingestion-run-governance]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:IngestionPolicy
  - id: IngestionRun-reads-IngestibleResource
    predicate: reads
    direction: source-to-target
    relation_kind: information
    labels: {zh: 读取来源资源, en: reads source resource, ja: source resource を read}
    definitions:
      zh: 运行通过 loader 访问 input manifest 中的 resource 并以 content_digest 校验实际读取字节。
      en: Run uses loader to access manifest resource and verifies bytes read against content_digest.
      ja: run が loader で manifest resource にアクセスし read byte を content_digest で検証。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达。
      en: Relation constrained per fact.
      ja: fact 単位制約。
    inverse_reading:
      predicate: inverse_reads
      labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
    conditions:
      - id: IngestionRun-reads-IngestibleResource-condition
        severity: error
        expression_language: plain
        expression: Assert only when input manifest fixes resource identity and observed content verifies against content_digest.
        explanation:
          zh: 索引/共现只表示候选；reads 需实际 I/O 与 digest 证据。
          en: Index co-occurrence is candidate only; reads requires actual I/O and digest evidence.
          ja: index 共起は candidate のみ。reads は actual I/O+digest evidence 必須。
        source_claims: [claim-ingestion-run-reads]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-ingestion-run-reads]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:IngestibleResource
sources:
  - id: src-llamaindex-pipeline
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: IngestionPipeline.run end-to-end run.
  - id: src-langchain-loaders
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: Loader-driven ingestion runs.
  - id: src-ingestion-run-design
    title: Moonweave ingestion run boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Complete run versus phases and reads facts.
source_claims:
  - id: claim-ingestion-run-llamaindex
    source: src-llamaindex-pipeline
    supports: IngestionPipeline.run coordinates one end-to-end ingestion execution.
    locator: IngestionPipeline.run
    evidence_kind: official
    confidence: high
  - id: claim-ingestion-run-design
    source: src-ingestion-run-design
    supports: IngestionRun owns cross-phase coordination distinct from single phases.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-run-id
    source: src-ingestion-run-design
    supports: ingestion_run_id identifies complete ingestion runs.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-run-policy
    source: src-ingestion-run-design
    supports: policy_version records governing policy at run start.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-run-started
    source: src-ingestion-run-design
    supports: started_at records complete-run temporal boundary.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-run-governance
    source: src-ingestion-run-design
    supports: Effective governed_by requires matching policy and in-scope execution.
    locator: governance
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-run-reads
    source: src-langchain-loaders
    supports: reads relation requires actual loader access and digest verification, not discovery.
    locator: BaseLoader
    evidence_kind: official
    confidence: high
