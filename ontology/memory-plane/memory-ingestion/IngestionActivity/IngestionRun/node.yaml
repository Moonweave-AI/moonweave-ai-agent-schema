schema: moonweave.ai/ontology-node/v1
id: IngestionRun
kind: concept
status: accepted
labels:
  zh: 摄入端到端运行
  en: End-to-end ingestion run
  ja: エンドツーエンド取込み実行
semantics:
  short_definition:
    zh: 在固定政策和输入边界下编排读取、加载和有序阶段的完整摄入活动。
    en: A complete ingestion activity that orchestrates reading, loading, and ordered phases under fixed policy and input boundary.
    ja: 固定された方針と入力境界の下で、読取り、ロード、順序付きフェーズを編成する完全な取込み活動です。
  definition:
    zh: >-
      IngestionRun 是 IngestionActivity 的端到端特化，保留 activity_id 和实际 input_resource_refs，并由 ingestion_run_id、政策引用、输入集合引用、运行清单摘要、
      实际加载器和阶段引用、时间边界及状态标识。它协调资源读取、信息规范化和后续交接，但不等同于单一
      IngestionPhase、DocumentLoader、IngestibleCollection、Document、DeduplicationDecision、MemoryWrite 或某个
      ObservabilityEvent。
    en: >-
      IngestionRun is an end-to-end specialization of IngestionActivity identified by ingestion_run_id, policy reference,
      input-collection reference, run-manifest digest, actual loader and phase references, time bounds, and status. It retains activity_id and actual input_resource_refs. It
      coordinates resource reading, information normalization, and later handoff, but is not one IngestionPhase,
      DocumentLoader, IngestibleCollection, Document, DeduplicationDecision, MemoryWrite, or ObservabilityEvent.
    ja: >-
      IngestionRun はIngestionActivityのエンドツーエンド特化であり、ingestion_run_id、方針参照、入力集合参照、
      実行マニフェストダイジェスト、実際のローダーとフェーズ参照、時間境界、状態で識別されます。activity_id と実際の input_resource_refs を保持します。資源読取り、
      情報正規化、後続引渡しを調整しますが、一つのIngestionPhase、DocumentLoader、IngestibleCollection、
      Document、DeduplicationDecision、MemoryWrite、ObservabilityEventではありません。
  why_needed:
    zh: 将完整工作流责任与各局部阶段、资源和输出实体分开，以重放实际输入、解释政策约束并安全处理失败或重试。
    en: Separates complete-workflow responsibility from local phases, resources, and output entities so actual input can be replayed, policy constraints explained, and failure or retry handled safely.
    ja: 完全ワークフローの責任を局所フェーズ、資源、出力実体から分離し、実際の入力の再生、方針制約の説明、失敗または再試行の安全な処理を可能にします。
  includes:
    - zh: 一个固定政策下的输入集合、资源读取证据、实际加载器、顺序阶段清单、时间边界和终态输出或失败交接。
      en: An input collection under one fixed policy, resource-read evidence, actual loader, ordered phase manifest, time bounds, and terminal output or failure handoff.
      ja: 一つの固定方針下の入力集合、資源読取り証拠、実際のローダー、順序付きフェーズマニフェスト、時間境界、終端出力または失敗引渡しを含みます。
  excludes:
    - zh: 只解析一个信息快照的规范化活动、仅表示资源的来源文件、加载器实现、一个去重决定、一次记忆写入或没有端到端协调边界的查询。
      en: A normalization activity that parses only one information snapshot, a source file that merely represents a resource, a loader implementation, one deduplication decision, one memory write, or a query without end-to-end coordination bounds.
      ja: 一つの情報スナップショットだけを解析する正規化活動、資源を表すだけのソースファイル、ローダー実装、一つの重複排除決定、一つの記憶書込み、エンドツーエンド調整境界のない問合せを除きます。
  semantic_kind: activity
  aliases:
    - ingestion job
    - ingestion workflow execution
engineering:
  explanation:
    zh: >-
      运行开始时冻结政策、输入集合和运行清单摘要，选择实际加载器，并记录每个读取的资源版本和每个阶段的局部输出。
      完成时只交接已形成的 Document 与决定引用；失败时保留输入、时间边界和诊断事件引用而不伪造成功输出。重新运行应建立新运行身份，
      即使使用相同政策和输入。
    en: >-
      At start, a run freezes policy, input collection, and run-manifest digest, selects the actual loader, and records
      each resource version read and each phase's local output. On completion it hands off only formed Documents and
      decision references; on failure it retains input, time bounds, and diagnostic-event references without fabricating
      successful output. A rerun receives a new run identity even with same policy and input.
    ja: >-
      実行開始時に方針、入力集合、実行マニフェストダイジェストを固定し、実際のローダーを選び、読んだ各資源版と各フェーズの
      局所出力を記録します。完了時は形成済みDocumentと決定参照だけを引渡し、失敗時は成功出力を捏造せず入力、時間境界、
      診断イベント参照を保持します。同じ方針と入力でも再実行には新しい実行同一性を与えます。
  typical_input:
    - description: Frozen run start request
      format: |
        {
          "ingestion_run_id": "ingest-policy-directory-42",
          "activity_id": "ingest-policy-directory-42",
          "policy_ref": "ingestion-policy-42-v3",
          "input_collection_ref": "collection-policy-directory-42",
          "input_resource_refs": ["dir-policy-2026-07"],
          "run_manifest_digest": "sha256:ingest-manifest-policy-directory-42-v1",
          "loader_refs": ["loader-pdf:3.2.1"],
          "started_at": "2026-07-18T08:58:59Z",
          "status": "running"
        }
  typical_output:
    - description: Terminal completed run handoff
      format: |
        {
          "ingestion_run_id": "ingest-policy-directory-42",
          "phase_refs": ["normalize-policy-42-02", "deduplicate-policy-42-03"],
          "output_document_refs": ["document-policy-42-v1"],
          "decision_refs": ["decision-policy-42-v1"],
          "ended_at": "2026-07-18T08:59:31Z",
          "status": "completed"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that read varied source systems into Document values.
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for generating manifest and content digests with algorithms such as SHA-256.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines time-bounded activities that use entities and generate separate entities.
structure:
  identity_keys:
    - activity_id
    - ingestion_run_id
  fields:
    - id: activity_id
      labels:
        zh: 父活动标识
        en: parent activity ID
        ja: 親アクティビティID
      definitions:
        zh: 保留 IngestionActivity 的实际活动身份；它可与 ingestion_run_id 取同值，但不是政策、集合或阶段标识。
        en: Retains IngestionActivity's actual activity identity; it may equal ingestion_run_id but is not a policy, collection, or phase identifier.
        ja: IngestionActivity の実際の activity ID を保持し、ingestion_run_id と同値でも policy、collection、phase の識別子ではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-ingestion-run-parent-contract
    - id: ingestion_run_id
      labels:
        zh: 摄入运行标识
        en: ingestion run ID
        ja: 取込み実行ID
      definitions:
        zh: 稳定标识一次端到端摄入执行，不是政策版本、阶段标识、加载器版本或产生的文档标识。
        en: Stably identifies one end-to-end ingestion execution, not policy version, phase ID, loader version, or generated Document ID.
        ja: 方針版、フェーズID、ローダー版、生成Document IDではなく、一つのエンドツーエンド取込み実行を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-ingestion-run-identity
    - id: policy_ref
      labels:
        zh: 摄入政策引用
        en: ingestion policy reference
        ja: 取込み方針参照
      definitions:
        zh: 引用本次运行开始时固定并需遵守的 IngestionPolicy 版本，而不是输入资源的标签或加载器配置文件。
        en: References the IngestionPolicy version fixed and required at run start, rather than a label on input resource or a loader configuration file.
        ja: 入力資源のラベルやローダー設定ファイルではなく、実行開始時に固定され遵守が必要なIngestionPolicy版を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingestion-policy-42-v3
      source_claims:
        - claim-ingestion-run-policy
    - id: input_collection_ref
      labels:
        zh: 输入集合引用
        en: input collection reference
        ja: 入力集合参照
      definitions:
        zh: 引用本次运行实际消费的 IngestibleCollection，而不是所有可发现资源或仅被元数据提及的集合。
        en: References the IngestibleCollection actually consumed by this run, rather than every discoverable resource or a collection mentioned only in metadata.
        ja: 発見可能なすべての資源やメタデータで言及されただけの集合ではなく、この実行が実際に消費したIngestibleCollectionを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: collection-policy-directory-42
      source_claims:
        - claim-ingestion-run-input
    - id: input_resource_refs
      labels:
        zh: 输入资源引用
        en: input resource references
        ja: 入力リソース参照
      definitions:
        zh: 保留本运行实际读取的版本化 IngestibleResource，不用输入集合引用或可发现资源清单替代具体来源事实。
        en: Retains versioned IngestibleResources actually read by this run rather than substituting its input-collection reference or a list of discoverable resources for concrete source facts.
        ja: input collection reference や発見可能な resource 一覧で具体的 source fact を置き換えず、この run が実際に読んだ versioned IngestibleResource を保持します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - dir-policy-2026-07
      source_claims:
        - claim-ingestion-run-parent-contract
    - id: run_manifest_digest
      labels:
        zh: 运行清单摘要
        en: run manifest digest
        ja: 実行マニフェストダイジェスト
      definitions:
        zh: 记录输入集合成员、资源版本、策略、加载器与计划阶段的冻结清单摘要，以便重放此运行边界。
        en: Records a digest of frozen manifest covering input members, resource versions, policy, loaders, and planned phases so this run boundary can be replayed.
        ja: 入力メンバー、資源版、方針、ローダー、予定フェーズを含む固定マニフェストのダイジェストを記録し、この実行境界を再生可能にします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:ingest-manifest-policy-directory-42-v1
      source_claims:
        - claim-ingestion-run-digest
    - id: loader_refs
      labels:
        zh: 实际加载器引用
        en: actual loader references
        ja: 実際のローダー参照
      definitions:
        zh: 引用本次运行实际调用的 DocumentLoader 版本，而不是仅在环境中可用或策略中允许的加载器。
        en: References DocumentLoader versions actually invoked by this run, rather than loaders merely available in the environment or allowed by policy.
        ja: 環境で利用可能または方針で許可されただけのローダーではなく、この実行が実際に呼び出したDocumentLoader版を参照します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - loader-pdf:3.2.1
      source_claims:
        - claim-ingestion-run-loader
    - id: phase_refs
      labels:
        zh: 阶段引用
        en: phase references
        ja: フェーズ参照
      definitions:
        zh: 可选地按执行顺序引用该运行内实际发生的 IngestionPhase，而不是将阶段类型或尚未执行的计划步骤作为运行历史。
        en: Optionally references IngestionPhases that actually occurred in this run in execution order, rather than phase types or planned steps that never executed.
        ja: 実行されなかったフェーズ型や予定手順ではなく、この実行で実際に起きたIngestionPhaseを実行順に任意に参照します。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - normalize-policy-42-02
        - deduplicate-policy-42-03
      source_claims:
        - claim-ingestion-run-phase
    - id: output_document_refs
      labels:
        zh: 输出文档引用
        en: output document references
        ja: 出力Document参照
      definitions:
        zh: 可选地引用本运行中已完成规范化并可交接的 Document，不包括中间缓冲区、失败输出或仅被读取的既有文档。
        en: Optionally references Documents completed and handoffable in this run, excluding intermediate buffers, failed outputs, or pre-existing Documents merely read.
        ja: この実行で完了し引渡し可能なDocumentを任意に参照し、中間バッファ、失敗出力、単に読んだ既存Documentを除きます。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-42-v1
      source_claims:
        - claim-ingestion-run-generation
    - id: decision_refs
      labels:
        zh: 去重决定引用
        en: deduplication decision references
        ja: 重複排除決定参照
      definitions:
        zh: 可选地引用运行内由去重活动产生的独立 DeduplicationDecision，不将保留或更新结果混入运行状态。
        en: Optionally references separate DeduplicationDecisions produced by deduplication activity in the run, without folding keep or update outcome into run status.
        ja: 実行内の重複排除活動が生成した独立DeduplicationDecisionを任意に参照し、keepまたはupdate結果を実行状態に混ぜません。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - decision-policy-42-v1
      source_claims:
        - claim-ingestion-run-generation
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录运行开始冻结输入和协调读取的时刻，不等同于某个资源创建时间或局部阶段开始时间。
        en: Records when the run began freezing inputs and coordinating reads, not creation time of a resource or start time of one local phase.
        ja: 実行が入力固定と読取り調整を始めた時刻を記録し、資源作成時刻や一つの局所フェーズ開始時刻とは区別します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:58:59Z"
      source_claims:
        - claim-ingestion-run-temporal
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 可选地记录运行完成、失败或取消的终态时刻；运行中状态不得有结束时间。
        en: Optionally records terminal time of completed, failed, or cancelled run; a running status must not have an end time.
        ja: 完了、失敗、取消された実行の終端時刻を任意に記録し、実行中状態には終了時刻を持たせてはいけません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:31Z"
      source_claims:
        - claim-ingestion-run-temporal
    - id: status
      labels:
        zh: 运行状态
        en: run status
        ja: 実行状態
      definitions:
        zh: 声明端到端运行状态，不使用单个去重结果、资源可用性或附件处理结果作为运行状态。
        en: Declares end-to-end run state without using one deduplication outcome, resource availability, or attachment processing result as run status.
        ja: 一つの重複排除結果、資源可用性、添付処理結果を実行状態に使わず、エンドツーエンド実行状態を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - running
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-ingestion-run-temporal
    - id: observability_event_refs
      labels:
        zh: 可观测性事件引用
        en: observability event references
        ja: 可観測性イベント参照
      definitions:
        zh: 可选地引用此运行或其阶段的命名诊断事件，不把事件本身作为运行或活动输出。
        en: Optionally references named diagnostic events for this run or its phases without treating an event itself as the run or activity output.
        ja: 実行またはそのフェーズの命名診断イベントを任意に参照し、イベント自体を実行または活動出力として扱いません。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - observability-ingest-policy-42-timeout
      source_claims:
        - claim-ingestion-run-observability
  constraints:
    - id: ingestion-run-required-start
      expression: activity_id, ingestion_run_id, policy_ref, input_collection_ref, input_resource_refs, run_manifest_digest, loader_refs, started_at, and status are required; a rerun must use a new ingestion_run_id even when policy and input collection are unchanged.
      explanation:
        zh: 运行身份、适用政策、实际输入边界、加载器和开始时间共同界定一次执行；重试不能覆盖原运行的可审计时间线。
        en: Run identity, applicable policy, actual input boundary, loader, and start time jointly delimit one execution; a retry cannot overwrite the original run's auditable timeline.
        ja: 実行同一性、適用方針、実際の入力境界、ローダー、開始時刻が一回の実行を共同で区切り、再試行は元の実行の監査可能な時間線を上書きできません。
    - id: ingestion-run-terminal-handoff
      expression: When status is completed, ended_at, at least one phase_refs value, and at least one output_document_refs or decision_refs value are required; when status is running, ended_at, output_document_refs, and decision_refs must be absent.
      explanation:
        zh: 完成运行需要有终态边界、实际阶段和可交接结果；运行中记录不能提前把计划或中间状态宣称为完成输出。
        en: A completed run requires a terminal boundary, actual phases, and handoffable results; a running record cannot declare plans or intermediates as completed output early.
        ja: 完了した実行には終端境界、実際のフェーズ、引渡し可能な結果が必要であり、実行中記録は予定や中間状態を完了出力として早期に宣言できません。
    - id: ingestion-run-failure-handoff
      expression: When status is failed or cancelled, ended_at is required; output_document_refs and decision_refs may contain only independently completed facts, and any observability_event_refs must identify this run or one of its phase_refs.
      explanation:
        zh: 失败运行仍可记录已经独立完成的事实，但不得伪造失败后产生的结果；诊断事件必须绑定该运行或其实际阶段。
        en: A failed run may retain independently completed facts but must not fabricate results after failure; diagnostic events must bind this run or its actual phases.
        ja: 失敗実行は独立して完了した事実を保持できますが、失敗後の結果を捏造してはいけず、診断イベントはこの実行または実際のフェーズに結び付く必要があります。
examples:
  - id: ingestion-run-positive

    labels:
      zh: 已完成的策略目录摄入运行
      en: Completed policy-directory ingestion run
      ja: 完了した方針ディレクトリ取込み実行

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      activity_id: ingest-policy-directory-42
      ingestion_run_id: ingest-policy-directory-42
      policy_ref: ingestion-policy-42-v3
      input_collection_ref: collection-policy-directory-42
      input_resource_refs:
        - dir-policy-2026-07
      run_manifest_digest: sha256:ingest-manifest-policy-directory-42-v1
      loader_refs:
        - loader-pdf:3.2.1
      phase_refs:
        - normalize-policy-42-02
        - deduplicate-policy-42-03
      output_document_refs:
        - document-policy-42-v1
      decision_refs:
        - decision-policy-42-v1
      started_at: "2026-07-18T08:58:59Z"
      ended_at: "2026-07-18T08:59:31Z"
      status: completed
    related_node_ids:
      - IngestionRun
      - IngestionActivity
      - IngestionPolicy
      - IngestibleCollection
      - DocumentLoader
      - IngestibleResource
      - IngestionPhase
    related_relation_ids:
      - IngestionRun-is_a-IngestionActivity
      - IngestionRun-governed_by-IngestionPolicy
      - IngestionRun-uses-IngestibleCollection
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-reads-IngestibleResource
      - IngestionPhase-part-of-IngestionRun

    source_claims:
      - claim-ingestion-run-policy
      - claim-ingestion-run-input
      - claim-ingestion-run-loader
      - claim-ingestion-run-phase
  - id: ingestion-run-counterexample

    labels:
