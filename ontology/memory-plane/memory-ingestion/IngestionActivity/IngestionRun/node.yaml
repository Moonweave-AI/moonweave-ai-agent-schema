          en: dedup-17 has run ID ingest-run-17, phase ID deduplicate, and sequence 2, and ingest-run-17's phase manifest lists it after normalize-17.
          ja: dedup-17 の run ID、phase ID、sequence 2 が一致し run phase manifest が normalize 後に列挙します。
        field_values: {}
        related_node_ids:
          - IngestionRun
          - DeduplicationActivity
        related_relation_ids:
          - IngestionRun-has_phase-DeduplicationActivity
        expected_result:
          zh: 建立 ingest-run-17 has_phase dedup-17，并保留 sequence=2 与运行成员身份。
          en: Assert ingest-run-17 has_phase dedup-17 while retaining sequence 2 and run membership.
          ja: ingest-run-17 has_phase dedup-17 を sequence=2・run membership 付きで確立します。
        why_valid_or_invalid:
          zh: 运行清单和阶段内部 run_id 双向一致，且局部时间位于运行边界内，证明组成关系。
          en: The run manifest and phase-internal run ID agree in both directions, and local time lies within run boundaries, proving composition.
