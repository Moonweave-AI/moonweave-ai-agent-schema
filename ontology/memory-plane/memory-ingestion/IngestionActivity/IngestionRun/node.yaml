        scenario_id: null
        descriptions:
          zh: offline-dedup-9 处理同一 document-policy-v7，但 run_id=maintenance-9，未出现在 ingest-run-17 清单中且发生在该运行结束后。
          en: offline-dedup-9 processes the same document-policy-v7 but has run ID maintenance-9, is absent from ingest-run-17's manifest, and occurs after that run ended.
          ja: offline-dedup-9 は同じ document を処理するが run ID が別で manifest 外・run 終了後です。
        field_values: {}
        related_node_ids:
          - IngestionRun
          - DeduplicationActivity
        related_relation_ids:
