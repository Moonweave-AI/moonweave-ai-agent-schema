parent_relation:
  id: IngestionRun-is_a-IngestionActivity
  predicate: is_a
  target: concept:IngestionActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是摄入活动的端到端运行特化
    en: is an end-to-end run specialization of ingestion activity
    ja: 取込み活動のエンドツーエンド実行特化である
  definitions:
    zh: IngestionRun 是在固定政策和输入边界内协调读取、加载器选择、有序阶段和终态交接的 IngestionActivity。
    en: IngestionRun is an IngestionActivity that coordinates reading, loader selection, ordered phases, and terminal handoff within fixed policy and input boundary.
    ja: IngestionRun は固定方針と入力境界内で読取り、ローダー選択、順序付きフェーズ、終端引渡しを調整するIngestionActivityです。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_ingestion_run_specialization
    labels:
      zh: 具有摄入运行特化
      en: has ingestion run specialization
      ja: 取込み実行特化を持つ
  conditions:
    - id: ingestion-run-is-a-ingestion-activity-condition
      severity: error
      expression_language: plain
      expression: Assert the specialization only when an object satisfies IngestionActivity identity and additionally has fixed policy and input collection, run manifest, actual loader, ordered actual phases, and terminal handoff or terminal failure record.
      explanation:
        zh: 除 IngestionActivity 身份外，完整运行还需要固定政策和输入、清单、实际加载器、发生过的阶段以及终态交接或失败记录；单个阶段或加载器不具备这些种差。
        en: Beyond IngestionActivity identity, a complete run needs fixed policy and input, manifest, actual loader, occurred phases, and terminal handoff or failure record; one phase or loader lacks these differentiae.
        ja: IngestionActivity同一性に加え、完全実行には固定方針と入力、マニフェスト、実際のローダー、発生したフェーズ、終端引渡しまたは失敗記録が必要で、一つのフェーズまたはローダーはこれらの種差を欠きます。
      source_claims:
        - claim-ingestion-run-specialization
  temporal_scope: valid-time
  boundary_context: A run is scoped to one execution identity and frozen input manifest; policy reuse or retry does not merge run histories.
  constraints: []
  examples: []
  source_claims:
    - claim-ingestion-run-specialization
  distinct_fact_rationale: This hierarchy captures complete workflow execution while inputs, loaders, phases, Documents, decisions, and diagnostics remain separately identifiable facts.
  layout_role: primary-backbone
relations:
  - id: IngestionRun-uses-DocumentLoader
    predicate: uses
    target: concept:DocumentLoader
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 使用文档加载器
      en: uses document loader
      ja: document loader を使用する
    definitions:
      zh: IngestionRun 使用一个已记录实现版本的 DocumentLoader 来读取与其契约兼容的来源载荷；加载器不是该运行的组成部分。
      en: An IngestionRun uses a DocumentLoader at a recorded implementation version to read source payloads compatible with its contract; the loader is not a structural part of the run.
      ja: IngestionRun はその contract と compatible な source payload を読むため、記録された implementation version の DocumentLoader を使用し、loader は run の structural part ではない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个运行可调用零个或多个加载器版本，具体调用由运行清单和调用证据确定。
      en: One run may invoke zero or more loader versions; manifest and invocation evidence determine the concrete calls.
      ja: 一つの run は zero 又は複数の loader version を invoke でき、manifest と invocation evidence が具体的な call を決める。
    inverse_reading:
      predicate: is_used_by_ingestion_run
      labels:
        zh: 被摄入运行使用
        en: is used by ingestion run
        ja: ingestion run に使用される
    conditions:
      - id: ingestion-run-uses-loader-condition
        severity: error
        expression_language: plain
        expression: Assert only when loader_refs includes the loader ID and implementation version, invocation evidence records its entrypoint, and source kind and media type satisfy the loader contract.
        explanation:
          zh: 运行引用、调用证据和输入兼容性必须同时存在；仅安装、可发现或政策允许不能证明实际使用。
          en: Run reference, invocation evidence, and input compatibility must all exist; installation, discoverability, or policy permission alone does not prove use.
          ja: run reference、invocation evidence、input compatibility がすべて必要で、installation、discoverability、policy permission だけでは use を証明しない。
        source_claims: [claim-ingestion-run-loader]
    temporal_scope: valid-time
    boundary_context: Use is scoped to one run invocation and loader version and does not claim every compatible run invokes the loader.
    constraints: []
    examples: []
    source_claims: [claim-ingestion-run-loader]
    distinct_fact_rationale: This records a runtime capability invocation, not containment of the loader in the run.
    layout_role: cross-link
  - id: IngestionRun-uses-IngestibleCollection
    predicate: uses
    target: concept:IngestibleCollection
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 使用可摄入集合
      en: uses ingestible collection
      ja: ingestible collection を使用する
    definitions:
      zh: IngestionRun 使用一个成员清单和版本摘要已冻结的 IngestibleCollection 作为实际读取边界；该集合独立于运行存在。
      en: An IngestionRun uses an IngestibleCollection with frozen member manifest and version digest as its actual read boundary; the collection exists independently of the run.
      ja: IngestionRun は frozen member manifest と version digest を持つ IngestibleCollection を実際の read boundary として使用し、collection は run から独立して存在する。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个运行通常使用一个输入集合，但合并或重试工作流可有多个可审计集合引用。
      en: A run commonly uses one input collection, while merge or retry workflows may retain multiple auditable collection references.
      ja: 一つの run は通常一つの input collection を使用するが、merge 又は retry workflow は複数の audit 可能な collection reference を保持できる。
    inverse_reading:
      predicate: is_used_by_ingestion_run
      labels:
        zh: 被摄入运行使用
        en: is used by ingestion run
        ja: ingestion run に使用される
    conditions:
      - id: ingestion-run-uses-collection-condition
        severity: error
        expression_language: plain
        expression: Assert only when input_collection_ref identifies the collection, run_manifest_digest binds its member_manifest_digest, selection_time precedes run start, and at least one manifest member is attempted for reading.
        explanation:
          zh: 运行引用、清单摘要、选择时间和实际成员读取共同证明使用；动态查询或共同目录不能替代冻结输入事实。
          en: Run reference, manifest digest, selection time, and actual member read jointly prove use; a dynamic query or shared directory cannot substitute for frozen input.
          ja: run reference、manifest digest、selection time、実際の member read が共同で use を証明し、dynamic query 又は shared directory は frozen input の代わりにならない。
        source_claims: [claim-ingestion-run-input]
    temporal_scope: valid-time
    boundary_context: Use is scoped to one frozen collection version and does not imply that all later versions or discoverable resources were consumed.
    constraints: []
    examples: []
    source_claims: [claim-ingestion-run-input]
    distinct_fact_rationale: This records an activity-to-collection input fact, not a whole-part relationship.
    layout_role: cross-link
  - id: IngestionRun-governed_by-IngestionPolicy
    predicate: governed_by
    target: concept:IngestionPolicy
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受摄入政策治理
      en: is governed by ingestion policy
      ja: 取込み方針に統治される
    definitions:
      zh: IngestionRun 受 IngestionPolicy 治理，表示运行在开始时冻结该政策版本并使实际读取、加载器、阶段与失败处理符合其约束。
      en: IngestionRun is governed by IngestionPolicy when it freezes that policy version at start and makes actual reading, loader, phases, and failure handling conform to its constraints.
      ja: IngestionRun がIngestionPolicyに統治されるとは、開始時にその方針版を固定し、実際の読取り、ローダー、フェーズ、失敗処理をその制約に適合させることです。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: governs_ingestion_run
      labels:
        zh: 治理摄入运行
        en: governs ingestion run
        ja: 取込み実行を統治する
    conditions:
      - id: ingestion-run-governed-by-policy-condition
        severity: error
        expression_language: plain
        expression: Assert only when policy_ref identifies the target policy version, the run manifest is frozen under it, and actual resource, loader, phase, and failure handling evidence stays within policy constraints.
        explanation:
          zh: 政策引用、冻结清单和实际执行证据必须一致；仅写入政策名称、但绕过其允许来源或失败处理约束时不得声称有效治理。
          en: Policy reference, frozen manifest, and actual execution evidence must agree; naming a policy while bypassing its allowed-source or failure-handling constraints is not effective governance.
          ja: 方針参照、固定マニフェスト、実際の実行証拠が一致する必要があり、方針名を書いて許可ソースまたは失敗処理制約を迂回しても有効な統治ではありません。
        source_claims:
          - claim-ingestion-run-policy
    temporal_scope: valid-time
    boundary_context: Governance is scoped to the frozen policy version and one run execution, not to every later run that shares a policy name.
    constraints: []
    examples: []
    source_claims:
      - claim-ingestion-run-policy
    distinct_fact_rationale: This relation records normative control separately from factual resource reads, loader invocation, and phase execution.
    layout_role: cross-link
  - id: IngestionRun-reads-IngestibleResource
    predicate: reads
    target: concept:IngestibleResource
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 读取来源资源
      en: reads source resource
      ja: ソース資源を読む
    definitions:
      zh: IngestionRun 读取 IngestibleResource，表示运行清单与加载器 I/O 共同证明该资源的确切版本和内容摘要被实际访问。
      en: IngestionRun reads IngestibleResource when run manifest and loader I/O jointly prove that exact resource version and content digest were actually accessed.
      ja: IngestionRun がIngestibleResourceを読むとは、実行マニフェストとローダーI/Oが共同で、その正確な資源版と内容ダイジェストが実際にアクセスされたと証明することです。
    cardinality:
      source:
        min: 1
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_read_by_ingestion_run
      labels:
        zh: 被摄入运行读取
        en: is read by ingestion run
        ja: 取込み実行に読まれる
    conditions:
      - id: ingestion-run-reads-resource-condition
        severity: error
        expression_language: plain
        expression: Assert only when run manifest fixes resource identity, canonical locator, version reference, and expected content digest, and loader I/O records actual open or read verified against that digest.
        explanation:
          zh: 发现、列出、计划或共享目录不足以表示读取；必须有清单固定和实际 I/O 与摘要核验的双重证据。
          en: Discovery, listing, planning, or shared directory is not reading; both manifest pinning and actual I/O with digest verification are required.
          ja: 発見、列挙、計画、共有ディレクトリは読取りではなく、マニフェスト固定とダイジェスト検証付き実際I/Oの両方が必要です。
        source_claims:
          - claim-ingestion-run-read
          - claim-ingestion-run-digest
    temporal_scope: valid-time
    boundary_context: Read fact is scoped to one resource version and the run interval; it does not claim all resources in the collection or later versions were read.
    constraints: []
    examples: []
    source_claims:
      - claim-ingestion-run-read
      - claim-ingestion-run-digest
    distinct_fact_rationale: This relation records actual input access separately from collection membership, loader availability, and generated Document provenance.
    layout_role: cross-link
  - id: IngestionRun-may_emit-ObservabilityEvent
    predicate: may_emit
    target: concept:ObservabilityEvent
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 可发出可观测性事件
      en: may emit observability event
      ja: 可観測性イベントを発行し得る
    definitions:
      zh: IngestionRun 可发出 ObservabilityEvent，表示该运行或其阶段产生了具有命名事件、受影响主体、结果代码、诊断证据和发生时间的独立诊断事实。
      en: IngestionRun may emit ObservabilityEvent when the run or one of its phases produces a separate diagnostic fact with named event, affected subject, result code, diagnostic evidence, and occurrence time.
      ja: IngestionRun がObservabilityEventを発行し得るとは、実行またはそのフェーズが、命名イベント、影響対象、結果コード、診断証拠、発生時刻を持つ独立診断事実を生成することです。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_emitted_by_ingestion_run
      labels:
        zh: 由摄入运行发出
        en: is emitted by ingestion run
        ja: 取込み実行により発行される
    conditions:
      - id: ingestion-run-may-emit-observability-event-condition
        severity: error
        expression_language: plain
        expression: Assert only when event subject_ref identifies the run or a listed phase, source_run_ref equals ingestion_run_id, result_code and diagnostic_evidence_ref are present, and occurrence time lies in the run interval.
        explanation:
          zh: 相同事件名或错误代码不构成来源；受影响主体、运行回指、诊断证据和时间必须共同绑定该事件到本次运行。
          en: Matching event name or error code does not establish provenance; affected subject, run back-link, diagnostic evidence, and time must jointly bind the event to this run.
          ja: 一致するイベント名やエラーコードは来歴を確立せず、影響対象、実行逆参照、診断証拠、時刻が共同でイベントをこの実行へ結び付ける必要があります。
        source_claims:
          - claim-ingestion-run-observability
    temporal_scope: valid-time
    boundary_context: This relation identifies a custom diagnostic fact and does not infer an OpenTelemetry signal type or turn a diagnostic event into the run outcome.
    constraints: []
    examples: []
    source_claims:
      - claim-ingestion-run-observability
    distinct_fact_rationale: This relation preserves diagnostic provenance separately from activity failure state and from downstream retry activity.
    layout_role: cross-link
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loader interfaces for reading diverse sources into Document values.
  - id: nodejs-crypto
    title: Node.js Crypto API
    url: https://nodejs.org/api/crypto.html
    type: official-doc
    source_type: official-doc
    relevance: Documents createHash for generating run-manifest and source-content digests.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies secure-hash algorithms that produce message digests for detecting changed messages.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines time-bounded activities that use entities, generate entities, and participate in provenance chains.
source_claims:
  - id: claim-ingestion-run-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that read varied source systems into Document values. Moonweave records only loader versions actually invoked in a run, not every loader merely installed or policy-permitted.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that generate message digests for detecting message changes. Moonweave uses algorithm-tagged run-manifest and source-content digests to freeze execution input evidence.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes independently identifiable activities from entities they use or generate. Moonweave identifies a complete ingestion execution separately from resources, loaders, phases, Documents, decisions, and diagnostic events.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-temporal
    source: w3c-prov-o
    supports: PROV-O states that activities start and end at particular points in time. Moonweave records a run start and terminal end independently from individual phase, resource, or Document times.
    locator: PROV-O section 3.1 on activity start and end times
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-input
    source: w3c-prov-o
    supports: PROV-O states that activities can use entities during their lifetime. Moonweave treats an input collection and its frozen manifest as actual run input rather than inferring use from resource discovery or metadata mention.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-parent-contract
    source: w3c-prov-o
    supports: PROV-O distinguishes an activity's identity from entities it uses. Moonweave retains IngestionActivity's activity ID and concrete versioned source-resource references on an IngestionRun while separately identifying the run's collection, policy, and local phases.
    locator: PROV-O section 3.1 on Activity, Entity, and prov:used
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-read
    source: langchain-document-loaders
    supports: Loader integrations distinguish access to source content from merely listing a source. Moonweave requires loader I/O evidence and version-pinned manifest evidence before asserting that a run reads a resource.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-generation
    source: w3c-prov-o
    supports: PROV-O states that activities can generate separate entities. Moonweave hands off completed Documents and independent deduplication decisions while retaining activity status separately from those output facts.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-run-phase
    source: w3c-prov-o
    supports: PROV-O supports provenance chains among activities and entities but does not prescribe local phase order. Moonweave models actual ingestion phases as ordered members of one run as a local orchestration inference.
    locator: PROV-O Activity relations and provenance chains
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-run-policy
    source: w3c-prov-o
    supports: PROV-O represents provenance participants but does not prescribe ingestion policies. Moonweave models a fixed policy as a separate governing constraint only when manifest and actual execution evidence conform to it.
    locator: PROV-O Entity Activity provenance and activity constraints
