        descriptions:
          zh: ingest-run-18 虽填写 policy_ref=@4，却读取 policy@4 明确禁止的 executable.exe，并绕过要求的 malware filter。
          en: ingest-run-18 names policy@4 but reads prohibited executable.exe and bypasses the required malware filter.
          ja: ingest-run-18 は policy@4 を記載するが prohibited executable を読み required filter を bypass します。
        field_values: {}
        related_node_ids:
