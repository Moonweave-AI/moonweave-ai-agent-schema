schema: moonweave.ai/ontology-node/v1
id: DocumentLoader
kind: concept
status: review
labels:
  zh: 文档加载器
  en: Document loader
  ja: 文書loader
semantics:
  short_definition:
    zh: 按支持的来源与媒体类型把资源读取为 Document 的能力。
    en: A capability reading supported source and media types into Document values.
    ja: 対応source/media typeをreadして Documentへ変換するcapabilityです。
  definition:
    zh: DocumentLoader 是具有稳定实现/版本身份、支持来源类型与 load/lazy_load 行为的能力，供 IngestionRun 读取资源并产生 Document 流；它不是一次加载运行或已加载文档。
    en: DocumentLoader is a capability with stable implementation/version identity, supported source types, and load or lazy_load behavior used by IngestionRun to read resources into a Document stream; it is not one loading run or the loaded document.
    ja: DocumentLoader は安定implementation/版同一性・対応source type・load/lazy_load挙動を持ち IngestionRun がresourceを Document streamへreadするcapabilityで、単一loading runやloaded documentではありません。
  why_needed:
    zh: 区分可复用加载能力、运行活动与输出信息。
    en: Separates reusable loader capability, run activity, and output information.
    ja: 再利用loader capability・run activity・output informationを分離します。
  includes:
    - zh: 纳入文件、目录、数据库、网页等来源专用加载器。
      en: Includes source-specific file, directory, database, and web loaders.
      ja: file・directory・database・web等source-specific loaderを含みます。
  excludes:
    - zh: 排除 IngestionRun、FileResource 与 Document。
      en: Excludes IngestionRun, FileResource, and Document.
      ja: IngestionRun・FileResource・Documentを除外します。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - loader_id
  fields:
    - id: loader_id
      labels:
        zh: 加载器标识
        en: loader ID
        ja: loader ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识加载器实现。
        en: Stable identifier for the loader implementation.
        ja: loader implementationの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: loader-pdf-v3
      source_claims:
        - claim-document-loader-002
    - id: loader_version
      labels:
        zh: 加载器版本
        en: loader version
        ja: loader版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定解析行为版本。
        en: Fixes parsing-behavior version.
        ja: parse挙動版を固定します。
      allowed_values: []
      pattern: null
      example_value: 3.2.1
      source_claims:
        - claim-document-loader-003
    - id: supported_media_types
      labels:
        zh: 支持媒体类型
        en: supported media types
        ja: 対応media type
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可接受资源类型。
        en: Declares accepted resource media types.
        ja: 受理resource media typeを宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - application/pdf
      source_claims:
        - claim-document-loader-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DocumentLoader-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文档加载器正例
      en: "Positive case: Document loader"
      ja: 文書loader正例
    scenario_id: null
    descriptions:
      zh: loader-pdf-v3 是实现 BaseLoader 的可复用能力，固定 package=langchain-pypdf、version=3.2.1、支持 media type 与 load/lazy_load 行为。
      en: loader-pdf-v3 is a reusable BaseLoader implementation fixing package langchain-pypdf, version 3.2.1, supported media types, and load and lazy_load behavior.
      ja: loader-pdf-v3 は BaseLoader 実装で package、version、supported media type、load/lazy_load behavior を固定する再利用 capability です。
    field_values:
      loader_id: loader-pdf-v3
      loader_version: 3.2.1
      supported_media_types:
        - application/pdf
    related_node_ids:
      - DocumentLoader
    related_relation_ids: []
    expected_result:
      zh: 将 loader-pdf-v3 表示为 DocumentLoader，并允许多个 IngestionRun 引用同一实现版本。
      en: Represent loader-pdf-v3 as DocumentLoader and allow multiple IngestionRuns to reference the same implementation version.
      ja: loader-pdf-v3 を DocumentLoader とし複数 IngestionRun が同一 implementation version を参照できます。
    why_valid_or_invalid:
      zh: 实现身份、版本、输入媒体边界和标准输出契约定义了可重复调用的加载能力，而非某一次执行。
      en: Implementation identity, version, input-media boundary, and standard output contract define a repeatable loading capability rather than one execution.
      ja: implementation identity、version、input media boundary、output contract が repeatable loading capability を定義します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-loader-005
  - id: DocumentLoader-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文档加载器边界例
      en: "Boundary case: Document loader"
      ja: 文書loader境界例
    scenario_id: null
    descriptions:
      zh: load-attempt-17 记录 loader-pdf-v3 对 file-policy-v7 的一次开始、结束、读取字节数和错误状态；它没有可复用实现身份。
      en: load-attempt-17 records one invocation of loader-pdf-v3 over file-policy-v7 with start, end, bytes read, and error state and has no reusable implementation identity.
      ja: load-attempt-17 は loader-pdf-v3 の一 invocation で start/end、bytes read、error state を記録し reusable implementation identity を持ちません。
    field_values: {}
    related_node_ids:
      - DocumentLoader
    related_relation_ids: []
    expected_result:
      zh: 把 load-attempt-17 保持为运行活动证据，不把一次调用归为 DocumentLoader。
      en: Keep load-attempt-17 as runtime activity evidence and do not classify the invocation as DocumentLoader.
      ja: load-attempt-17 は runtime activity evidence とし DocumentLoader に分類しません。
    why_valid_or_invalid:
      zh: 能力定义可跨运行复用，一次调用只在特定时间处理特定资源；两者身份键和生命周期不同。
      en: A capability definition is reusable across runs, while an invocation handles one resource at one time; their identity keys and lifecycles differ.
      ja: capability definition は run 横断で再利用され invocation は一時点の一 resource を処理するため identity key・lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-loader-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IngestionRun-uses-DocumentLoader
  predicate: uses
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 使用文档加载器
    en: uses document loader
    ja: document loaderを使用する
  definitions:
    zh: IngestionRun —uses→ DocumentLoader 表示运行调用该加载器实现与版本来读取来源。
    en: IngestionRun —uses→ DocumentLoader means that the run invokes that loader implementation and version to read sources.
    ja: IngestionRun —uses→ DocumentLoader はrunがsource readのためloader implementationと版を呼ぶことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_uses
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IngestionRun-uses-DocumentLoader-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when run loader ID/version matches the target and media type is compatible.
      explanations:
        zh: 仅当 run.loader_id/version 与目标加载器一致且媒体类型兼容时成立。
        en: Assert only when run loader ID/version matches the target and media type is compatible.
        ja: run loader ID/版がtargetと一致しmedia typeがcompatibleな時だけ成立します。
      source_claims:
        - claim-document-loader-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IngestionRun-uses-DocumentLoader-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 使用文档加载器正例
        en: "Positive case: uses document loader"
        ja: document loaderを使用する正例
      scenario_id: null
      descriptions:
        zh: ingest-run-17 的 execution trace 记录调用 loader-pdf-v3@3.2.1 的 lazy_load，输入为 file-policy-v7，返回 info-17，版本与运行配置一致。
        en: ingest-run-17's execution trace records invoking lazy_load on loader-pdf-v3@3.2.1 with file-policy-v7 and returning info-17, matching the run configuration version.
        ja: ingest-run-17 execution trace が loader-pdf-v3@3.2.1 lazy_load invocation、input、output を記録します。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - DocumentLoader
      related_relation_ids:
        - IngestionRun-uses-DocumentLoader
      expected_result:
        zh: 建立 ingest-run-17 uses loader-pdf-v3，并保留实际调用的实现版本。
        en: Assert ingest-run-17 uses loader-pdf-v3 and retain the implementation version actually invoked.
        ja: ingest-run-17 uses loader-pdf-v3 を actual implementation version 付きで確立します。
      why_valid_or_invalid:
        zh: 配置引用与运行时调用事件同时指向同一 loader 版本，证明能力已实际使用。
        en: The configuration reference and runtime invocation event both point to the same loader version, proving actual capability use.
        ja: configuration reference と runtime invocation が同一 loader version を指し actual use を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-loader-007
    - id: IngestionRun-uses-DocumentLoader-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 使用文档加载器边界例
        en: "Boundary case: uses document loader"
        ja: document loaderを使用する境界例
      scenario_id: null
      descriptions:
        zh: loader-html@2.0 安装在同一环境并列入 registry，但 ingest-run-17 没有调用事件，且输入 PDF 不属于其选择结果。
        en: loader-html@2.0 is installed in the same environment and listed in the registry, but ingest-run-17 has no invocation event for it and the PDF was not routed to it.
        ja: loader-html は同環境 registry にあるが ingest-run-17 invocation event がなく PDF routing result でもありません。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - DocumentLoader
      related_relation_ids:
        - IngestionRun-uses-DocumentLoader
      expected_result:
        zh: 不得把仅可用的 loader-html 连接为 ingest-run-17 实际使用的加载器。
        en: Do not connect merely available loader-html as a loader actually used by ingest-run-17.
        ja: available-only loader-html を ingest-run-17 actually-used loader として接続しません。
      why_valid_or_invalid:
        zh: 能力可发现性与一次运行中的调用是不同事实；uses 需要具体调用证据而非安装状态。
        en: Capability discoverability and invocation in one run are different facts; uses requires a concrete call rather than installation state.
        ja: capability discoverability と run invocation は別事実で uses には concrete call が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-loader-007
  source_claims:
    - claim-document-loader-007
