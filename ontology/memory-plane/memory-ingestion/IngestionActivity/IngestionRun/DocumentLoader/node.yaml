schema: moonweave.ai/ontology-node/v1
id: DocumentLoader
kind: concept
labels:
  zh: 文档加载器
  en: Document loader
  ja: ドキュメントローダー
semantics:
  short_definition:
    zh: 按支持媒体类型把资源读取为 Document 流的可复用能力。
    en: Reusable capability reading resources into a Document stream by supported media types.
    ja: 対応 media type ごとに resource を Document stream へ read する reusable capability。
  definition:
    zh: DocumentLoader 是具有 loader_id、loader_version 与 load/lazy_load 行为的能力规范，供 IngestionRun 读取 IngestibleResource；对应 LangChain BaseLoader 与 LlamaIndex readers（PDFReader、DatabaseReader、SimpleWebPageReader）；不是一次加载运行或已加载 Document。
    en: DocumentLoader is a capability specification with loader_id, loader_version, and load/lazy_load behavior used by IngestionRun to read IngestibleResource, mapping to LangChain BaseLoader and LlamaIndex readers (PDFReader, DatabaseReader, SimpleWebPageReader); not one loading run or loaded Document.
    ja: DocumentLoader は loader_id/loader_version/load/lazy_load 挙動を持つ capability 仕様。IngestionRun が IngestibleResource を read。LangChain BaseLoader/LlamaIndex readers（PDFReader/DatabaseReader/SimpleWebPageReader）に対応。単一 loading run/loaded Document ではない。
  why_needed:
    zh: 区分可复用 loader 能力、运行中的 uses 事实与输出 Document，避免“已安装”误报为“已使用”。
    en: Separates reusable loader capability, uses facts in runs, and output Documents, avoiding reporting installation as usage.
    ja: reusable loader capability/run 内 uses 事実/output Document を分離。「install 済み」を「used」と誤報しない。
  includes:
    - zh: 纳入 PDF、目录、数据库、网页等来源专用 loader。
      en: Includes source-specific PDF, directory, database, and web loaders.
      ja: PDF/directory/database/web 等 source-specific loader。
  excludes:
    - zh: 排除 IngestionRun、FileResource 与 Document。
      en: Excludes IngestionRun, FileResource, and Document.
      ja: IngestionRun/FileResource/Document を除外。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: LangChain PyPDFLoader/SQLDatabaseLoader 实现 BaseLoader.load()/lazy_load()；LlamaIndex PDFReader/DatabaseReader 同理；IngestionRun uses 边需 runtime invocation 证据，registry 可见不等于 used。
    en: LangChain PyPDFLoader/SQLDatabaseLoader implement BaseLoader.load()/lazy_load(); LlamaIndex PDFReader/DatabaseReader likewise; IngestionRun uses edge requires runtime invocation evidence—registry visibility is not used.
    ja: LangChain PyPDFLoader/SQLDatabaseLoader が BaseLoader.load()/lazy_load() 実装。LlamaIndex PDFReader/DatabaseReader 同型。IngestionRun uses は runtime invocation evidence 必須。registry visible≠used。
  typical_input:
    - description: LangChain BaseLoader invocation
      format: |
        from langchain_community.document_loaders import PyPDFLoader
        docs = PyPDFLoader("policy.pdf").load()
      source_claims: [claim-document-loader-langchain]
    - description: LlamaIndex PDFReader
      format: |
        from llama_index.readers.file import PDFReader
        documents = PDFReader().load_data(file=Path("policy.pdf"))
      source_claims: [claim-document-loader-llamaindex]
  typical_output:
    - description: Loader capability registration
      format: |
        {
          "loader_id": "loader-pdf-v3",
          "loader_version": "3.2.1",
          "supported_media_types": ["application/pdf"]
        }
      source_claims: [claim-document-loader-design]
  reference_implementations:
    - name: LangChain BaseLoader
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: load() and lazy_load() interface.
    - name: LlamaIndex Data Loaders
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
      description: PDF, web, and database readers.
structure:
  identity_keys: [loader_id]
  fields:
    - id: loader_id
      labels: {zh: 加载器标识, en: Loader identifier, ja: loader 識別子}
      definitions:
        zh: 稳定标识 loader 实现系列。
        en: Stable identifier for loader implementation series.
        ja: loader 実装系列の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: loader-pdf-v3
      allowed_values: []
      source_claims: [claim-document-loader-id]
    - id: loader_version
      labels: {zh: 加载器版本, en: Loader version, ja: loader 版}
      definitions:
        zh: 固定解析/读取行为版本，供 run 引用实际 invoke 版本。
        en: Fixes parsing/read behavior version for runs to reference actually invoked version.
        ja: parse/read 挙動版を固定。run が actual invoke 版を ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3.2.1
      allowed_values: []
      source_claims: [claim-document-loader-version]
    - id: supported_media_types
      labels: {zh: 支持媒体类型, en: Supported media types, ja: 対応 media type}
      definitions:
        zh: 声明可接受 IngestibleResource 媒体类型列表。
        en: Declares accepted IngestibleResource media type list.
        ja: 受理 IngestibleResource media type リスト宣言。
      datatype: array[string]
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [application/pdf]
      allowed_values: []
      source_claims: [claim-document-loader-media]
  constraints: []
  required_relations: []
examples:
  - id: DocumentLoader-example-langchain-pdf
    labels:
      zh: LangChain PDF 加载器
      en: LangChain PDF loader
      ja: LangChain PDF loader
    descriptions:
      zh: loader-pdf-v3（PyPDFLoader@3.2.1）支持 application/pdf；ingest-run-17 execution trace 记录 lazy_load(file-policy-v7) 返回 info-17。
      en: loader-pdf-v3 (PyPDFLoader@3.2.1) supports application/pdf; ingest-run-17 trace records lazy_load(file-policy-v7) returning info-17.
      ja: loader-pdf-v3（PyPDFLoader@3.2.1）が application/pdf 対応。ingest-run-17 trace が lazy_load(file-policy-v7)→info-17 記録。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: PyPDFLoader
    field_values:
      loader_id: loader-pdf-v3
      loader_version: 3.2.1
      supported_media_types: [application/pdf]
    related_node_ids: [DocumentLoader, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-document-loader-langchain]
  - id: DocumentLoader-example-llamaindex-db
    labels:
      zh: LlamaIndex 数据库 reader
      en: LlamaIndex database reader
      ja: LlamaIndex DB reader
    descriptions:
      zh: loader-sql-v2（DatabaseReader@2.1）支持 postgres table 读取；ingest-run-18 uses loader-sql-v2 读取 table-policy-clauses。
      en: loader-sql-v2 (DatabaseReader@2.1) supports postgres table reads; ingest-run-18 uses loader-sql-v2 on table-policy-clauses.
      ja: loader-sql-v2（DatabaseReader@2.1）が postgres table read 対応。ingest-run-18 が table-policy-clauses に uses。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: DatabaseReader
    field_values:
      loader_id: loader-sql-v2
      supported_media_types: [application/sql]
    related_node_ids: [DocumentLoader, DatabaseTable]
    related_relation_ids: []
    source_claims: [claim-document-loader-llamaindex]
  - id: DocumentLoader-example-not-invocation
    labels:
      zh: 能力非调用
      en: Capability is not invocation
      ja: capability は invocation ではない
    descriptions:
      zh: loader-html@2.0 在 registry 可见但 ingest-run-17 无 invocation event 且 PDF 未路由至它——available-only 不能连接 uses 边。
      en: loader-html@2.0 is registry-visible but ingest-run-17 has no invocation and PDF was not routed to it—available-only cannot establish uses edge.
      ja: loader-html@2.0 は registry visible だが ingest-run-17 に invocation なし/PDF 未 routing。available-only では uses edge 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DocumentLoader, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-document-loader-design]
parent_relation:
  id: IngestionRun-uses-DocumentLoader
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 被运行使用, en: used by run, ja: run により使用される}
  definitions:
    zh: IngestionRun uses DocumentLoader 表示运行 invoke 了该 loader 实现与版本来 read source。
    en: IngestionRun uses DocumentLoader means the run invoked that loader implementation and version to read sources.
    ja: IngestionRun uses DocumentLoader は run が当該 loader 実装/版を invoke して source read したことを表す。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-document-loader-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langchain-loaders
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: BaseLoader load and lazy_load.
  - id: src-llamaindex-loaders
    title: LlamaIndex Loading Data
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
    source_type: official-doc
    relevance: PDF, web, and database readers.
  - id: src-document-loader-design
    title: Moonweave loader capability boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Capability versus invocation separation.
source_claims:
  - id: claim-document-loader-langchain
    source: src-langchain-loaders
    supports: LangChain BaseLoader defines load/lazy_load on source-specific implementations.
    locator: Document loaders
    evidence_kind: official
    confidence: high
  - id: claim-document-loader-llamaindex
    source: src-llamaindex-loaders
    supports: LlamaIndex readers load PDF, web, and database sources into Documents.
    locator: Loading guides
    evidence_kind: official
    confidence: high
  - id: claim-document-loader-design
    source: src-document-loader-design
    supports: Loader capability is reusable; invocation is run-scoped activity evidence.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-document-loader-id
    source: src-document-loader-design
    supports: loader_id identifies reusable loader implementation series.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-document-loader-version
    source: src-langchain-loaders
    supports: loader_version fixes reproducible parsing behavior.
    locator: BaseLoader
    evidence_kind: official
    confidence: high
  - id: claim-document-loader-media
    source: src-document-loader-design
    supports: supported_media_types declares loader-resource compatibility.
    locator: structure
    evidence_kind: design-inference
    confidence: high
