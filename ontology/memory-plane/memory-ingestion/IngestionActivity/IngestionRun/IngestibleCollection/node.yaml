schema: moonweave.ai/ontology-node/v1
id: IngestibleCollection
kind: concept
status: accepted
labels:
  zh: 可摄入集合
  en: Ingestible collection
  ja: 取込可能collection
semantics:
  short_definition:
    zh: 以成员清单和版本摘要标识、可作为一批摄入输入的集合。
    en: A collection identified by member manifest and version digest and usable as one ingestion batch.
    ja: member manifestと版digestで識別し一取込batchとして使えるcollectionです。
  definition:
    zh: IngestibleCollection 是以 collection_id 与不可歧义成员清单标识的一批摄入对象上位类，成员可有独立身份且集合版本随成员变化；它不是单个资源或一次运行。
    en: IngestibleCollection is the batch-input collection genus identified by collection_id and an unambiguous member manifest, whose members retain independent identities and whose version changes with membership; it is not one resource or one run.
    ja: IngestibleCollection は collection_id と曖昧でないmember manifestで識別するbatch-input collection上位類で、memberは独立同一性を保ちmembership変化で版が変わり、単一resourceやrunではありません。
  why_needed:
    zh: 区分批次集合、成员资源与处理运行。
    en: Separates batch collection, member resources, and processing run.
    ja: batch collection・member resource・processing runを分離します。
  includes:
    - zh: 纳入 TextCorpus 与有版本清单的数据集批次。
      en: Includes TextCorpus and versioned manifest-based dataset batches.
      ja: TextCorpusとversioned manifest-based dataset batchを含みます。
  excludes:
    - zh: 排除单个 Document、FileResource 和 IngestionRun。
      en: Excludes one Document, FileResource, and IngestionRun.
      ja: 単一Document・FileResource・IngestionRunを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - collection_id
  fields:
    - id: collection_id
      labels:
        zh: 集合标识
        en: collection ID
        ja: collection ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识摄入集合。
        en: Stable identifier for the ingestion collection.
        ja: 取込collectionの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: collection-policy-7
      source_claims:
        - claim-ingestible-collection-002
    - id: member_manifest_digest
      labels:
        zh: 成员清单摘要
        en: member-manifest digest
        ja: member manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定成员集合与顺序。
        en: Fixes collection membership and order.
        ja: collection membershipとorderを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:manifest-policy-7
      source_claims:
        - claim-ingestible-collection-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestibleCollection-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 可摄入集合正例
      en: "Positive case: Ingestible collection"
      ja: 取込可能collection正例
    scenario_id: null
    descriptions:
      zh: collection-policy-7 由 collection_id、manifest digest m7 和 120 个带版本成员的有序清单识别；任一成员版本变化都会形成新的集合版本。
      en: collection-policy-7 is identified by collection ID, manifest digest m7, and an ordered manifest of 120 versioned members; changing any member version creates a new collection version.
      ja: collection-policy-7 は collection ID、manifest digest m7、120 versioned members の ordered manifest で識別され member 変更で新 version になります。
    field_values:
      collection_id: collection-policy-7
      member_manifest_digest: sha256:manifest-policy-7
    related_node_ids:
      - IngestibleCollection
    related_relation_ids: []
    expected_result:
      zh: 将该版本化成员容器表示为 IngestibleCollection，并保留集合清单而非只记录成员数量。
      en: Represent the versioned member container as IngestibleCollection and retain its manifest rather than recording only a member count.
      ja: 当該 versioned member container を IngestibleCollection とし member count だけでなく manifest を保持します。
    why_valid_or_invalid:
      zh: 集合具有独立身份、确定成员边界和版本规则，可由批量加载流程作为一个输入单元处理。
      en: The collection has independent identity, a determinate membership boundary, and version rules and can be handled as one input unit by a batch loader.
      ja: collection は independent identity、determinate membership、version rule を持ち batch loader の一 input unit になります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-collection-004
  - id: IngestibleCollection-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 可摄入集合边界例
      en: "Boundary case: Ingestible collection"
      ja: 取込可能collection境界例
    scenario_id: null
    descriptions:
      zh: file-policy-v7 是集合清单中的一个 FileResource，只有自身路径和摘要，不拥有其他成员或集合版本。
      en: file-policy-v7 is one FileResource in the manifest and has only its own path and digest; it owns neither other members nor the collection version.
      ja: file-policy-v7 は manifest 内の一 FileResource で自身 path・digest だけを持ち collection version を所有しません。
    field_values: {}
    related_node_ids:
      - IngestibleCollection
    related_relation_ids: []
    expected_result:
      zh: 把 file-policy-v7 保持为集合成员，不把单个成员归为 IngestibleCollection。
      en: Keep file-policy-v7 as a collection member and do not classify one member as IngestibleCollection.
      ja: file-policy-v7 は collection member とし IngestibleCollection に分類しません。
    why_valid_or_invalid:
      zh: 成员可独立存在并加入多个集合，而集合身份依赖完整成员清单；两者生命周期不可互换。
      en: A member may exist independently and join several collections, whereas collection identity depends on the full manifest; their lifecycles are not interchangeable.
      ja: member は独立存在し複数 collection に加入でき collection identity は full manifest に依存するため lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-collection-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IngestionRun-consumes-IngestibleCollection
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 消费可摄入集合
    en: consumes
    ja: ingestible collection を消費する
  definitions:
    zh: IngestionRun consumes IngestibleCollection 表示一次完整摄入运行固定并读取一个以成员清单和版本摘要标识的输入批次，随后各阶段都可追溯到同一集合；只列出潜在来源、动态查询结果或未冻结成员的目录不构成该运行消费的集合。
    en: IngestionRun consumes IngestibleCollection means that one complete ingestion run fixes and reads an input batch identified by member manifest and version digest, allowing every later phase to trace to the same collection; a list of possible sources, dynamic query result, or directory with unfrozen membership is not the collection consumed by that run.
    ja: IngestionRun consumes IngestibleCollection は、一回の complete ingestion run が member manifest と version digest で識別された input batch を固定・読取し、後続 phase を同一 collection へ追跡可能にすることを示します。potential source list・dynamic query result・membership 未固定 directory は当該 run の consumed collection ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 运行可失败或分批读取，类级展示不规定所有实例的统一集合数量。
    en: A run may fail or read batches incrementally; the class-level display does not prescribe one collection count for every instance.
    ja: run は failure または incremental batch read の場合があり、class-level 表示は全 instance に一律 collection 数を規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由摄入运行消费
      en: consumed by ingestion run
      ja: ingestion run により消費される
  conditions:
    - id: IngestionRun-consumes-IngestibleCollection-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the run records the same collection identity, immutable member manifest or equivalent version digest, selection time, and at least one attempted member read; a mutable source query or plan reference is insufficient.
      explanations:
        zh: 仅当运行记录同一集合身份、不可变成员清单或等价版本摘要、选择时间，并至少尝试读取一个成员时成立；可变来源查询或计划引用不足。
        en: Assert only when the run records the same collection identity, immutable member manifest or equivalent version digest, selection time, and at least one attempted member read; a mutable source query or plan reference is insufficient.
        ja: run が同一 collection ID、immutable member manifest または等価 version digest、selection time、少なくとも一 member read attempt を記録した場合だけ成立します。mutable source query や plan reference は不十分です。
      source_claims:
        - claim-ingestible-collection-006
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: IngestionRun-consumes-IngestibleCollection-example-positive-001
      kind: positive
      labels:
        zh: 固定清单摄入批次
        en: Manifest-fixed ingestion batch
        ja: manifest-fixed ingestion batch
      scenario_id: null
      descriptions:
        zh: 运行 `ingest/64` 固定集合 `collection/support@sha256:bb2` 的 418 个成员及选择时间，随后读取成员 `ticket/1` 并把各阶段记录绑定到该摘要。
        en: Run `ingest/64` fixes 418 members and selection time for `collection/support@sha256:bb2`, then reads member `ticket/1` and binds phase records to that digest.
        ja: run `ingest/64` は `collection/support@sha256:bb2` の 418 member と selection time を固定し、member `ticket/1` を読み、phase record を digest に結合します。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - IngestibleCollection
      related_relation_ids:
        - IngestionRun-consumes-IngestibleCollection
      expected_result:
        zh: 建立 consumes 边并允许所有阶段追溯到固定批次。
        en: A consumes edge is created and all phases can trace to the fixed batch.
        ja: consumes 辺を作り、全 phase を fixed batch へ追跡できます。
      why_valid_or_invalid:
        zh: 集合身份、成员版本、选择时间与实际读取均可核实。
        en: Collection identity, membership version, selection time, and actual read are verifiable.
        ja: collection identity、membership version、selection time、actual read を検証できます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestible-collection-007
    - id: IngestionRun-consumes-IngestibleCollection-example-boundary-001
      kind: boundary
      labels:
        zh: 未冻结动态查询边界
        en: Unfrozen dynamic-query boundary
        ja: unfrozen dynamic query 境界
      scenario_id: null
      descriptions:
        zh: 计划保存查询 `updated_at > now()-1d`，但运行开始时未固定结果清单，也尚未读取成员。
        en: A plan stores query `updated_at > now()-1d`, but no result manifest is fixed at run start and no member has been read.
        ja: plan は query `updated_at > now()-1d` を保存しますが、run start に result manifest を固定せず member read もありません。
      field_values: {}
      related_node_ids:
        - IngestionRun
        - IngestibleCollection
      related_relation_ids:
        - IngestionRun-consumes-IngestibleCollection
      expected_result:
        zh: 保留来源选择配置，不创建 consumes 集合边。
        en: The source-selection configuration is retained without a collection consumes edge.
        ja: source-selection configuration を保持しますが collection consumes 辺は作りません。
      why_valid_or_invalid:
        zh: 动态查询尚不能标识可重放的集合实例。
        en: The dynamic query does not yet identify a replayable collection instance.
        ja: dynamic query はまだ replayable collection instance を識別しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestible-collection-008
  source_claims:
    - claim-ingestible-collection-009
  distinct_fact_rationale:
    zh: consumes collection 记录本次运行固定的输入批次；reads resource 记录运行读取的单个资源，集合身份不能由任一成员替代。
    en: consumes collection records the input batch fixed for the run; reads resource records an individual resource read by it. Collection identity cannot be replaced by any one member.
    ja: consumes collection は run に固定した input batch、reads resource は個別 resource read を記録し、collection identity を一 member で代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-ingestible-collection-001
    source: eng-fw-unstructured-ingestion
    supports: Unstructured's ordered flow starts with source indexing and filtering, supporting an explicit versioned input collection.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-002
    source: eng-fw-unstructured-ingestion
    supports: IngestibleCollection.collection_id records the batch collection identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-003
    source: eng-fw-unstructured-ingestion
    supports: IngestibleCollection.member_manifest_digest records reproducible collection membership; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-004
    source: eng-fw-unstructured-ingestion
    supports: Unstructured begins ingestion by indexing and filtering source items before downstream processing.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-005
    source: eng-fw-unstructured-ingestion
    supports: Unstructured's index/filter steps distinguish a source item from the enumerated batch.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-006
    source: eng-fw-unstructured-ingestion
    supports: Unstructured documents an ordered ingest flow beginning with indexing, filtering, downloading, and later transformations. Moonweave reifies the manifest-versioned collection and run-to-collection layout as design inference.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-007
    source: eng-fw-unstructured-ingestion
    supports: The case applies Unstructured's ordered flow to a manifest-versioned batch; exact manifest identity is Moonweave provenance design.
    locator: Ingestion overview > index, filter, download, and later phases
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-008
    source: eng-fw-unstructured-ingestion
    supports: The ordered flow distinguishes source indexing/filtering from later reads; manifest freeze is Moonweave replayability design.
    locator: Ingestion overview > index and filter before download
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-collection-009
    source: eng-fw-unstructured-ingestion
    supports: Unstructured directly grounds a staged ingestion flow beginning with source indexing, filtering, and download. It does not define Moonweave IngestibleCollection or consumes; manifest identity, read evidence, direction, and primary layout are reviewed design inferences.
    locator: Ingestion overview > ordered ingest flow
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
