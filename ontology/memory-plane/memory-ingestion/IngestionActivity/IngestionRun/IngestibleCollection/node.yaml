schema: moonweave.ai/ontology-node/v1
id: IngestibleCollection
kind: concept
labels:
  zh: 可摄入集合
  en: Ingestible collection
  ja: 取込可能コレクション
semantics:
  short_definition:
    zh: 以成员清单摘要标识、可作为一批 ingest 输入的集合根类。
    en: Root collection class identified by member-manifest digest and usable as one ingest batch input.
    ja: member manifest digest で識別し一 ingest batch input として使える collection root class。
  definition:
    zh: IngestibleCollection 是以 collection_id 与 member_manifest_digest 标识的一批摄入对象上位类，成员保留独立 resource/document 身份且集合版本随成员变化；IngestionRun consumes 一批 collection 作为输入；不是单个 FileResource 或 IngestionRun 本身。
    en: IngestibleCollection is the batch-input collection root identified by collection_id and member_manifest_digest whose members retain independent resource/document identities and whose version changes with membership; IngestionRun consumes a collection as batch input; not one FileResource or IngestionRun itself.
    ja: IngestibleCollection は collection_id/member_manifest_digest で識別する batch-input collection root。member は独立 resource/document identity を保持し membership 変化で版更新。IngestionRun が batch input として consumes。単 FileResource/IngestionRun 自体ではない。
  why_needed:
    zh: 区分批次集合、成员资源与处理运行，支持 corpus 级 ingest 与 manifest 审计。
    en: Separates batch collection, member resources, and processing runs, supporting corpus-level ingest and manifest audit.
    ja: batch collection/member resource/processing run を分離し corpus 級 ingest/manifest audit を支援。
  includes:
    - zh: 纳入 TextCorpus 与有版本 manifest 的数据集批次。
      en: Includes TextCorpus and versioned manifest-based dataset batches.
      ja: TextCorpus/versioned manifest dataset batch。
  excludes:
    - zh: 排除单个 Document、FileResource 与 IngestionRun。
      en: Excludes single Document, FileResource, and IngestionRun.
      ja: 単 Document/FileResource/IngestionRun を除外。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex SimpleDirectoryReader 对目录下多文件产生 Document 列表可建模为 IngestibleCollection；IngestionPipeline.run(documents=[...]) 接受 batch；member_manifest_digest 固定成员集合与顺序。
    en: LlamaIndex SimpleDirectoryReader Documents from multiple files model as IngestibleCollection; IngestionPipeline.run(documents=[...]) accepts batches; member_manifest_digest fixes member set and order.
    ja: LlamaIndex SimpleDirectoryReader の複数 file Document 列表→IngestibleCollection。IngestionPipeline.run(documents=[...]) が batch 受理。member_manifest_digest が member set/order 固定。
  typical_input:
    - description: Batch documents passed to ingestion pipeline
      format: |
        pipeline.run(documents=[doc_a, doc_b, doc_c])
      source_claims: [claim-ingestible-collection-llamaindex]
  typical_output:
    - description: Moonweave collection identity
      format: |
        {
          "collection_id": "collection-policy-7",
          "member_manifest_digest": "sha256:manifest-policy-7"
        }
      source_claims: [claim-ingestible-collection-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Batch document ingestion via pipeline.run.
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Multi-file directory loads as document batches.
structure:
  identity_keys: [collection_id]
  fields:
    - id: collection_id
      labels: {zh: 集合标识, en: Collection identifier, ja: collection 識別子}
      definitions:
        zh: 稳定标识摄入集合 lineage。
        en: Stable identifier for ingestion collection lineage.
        ja: ingestion collection lineage の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: collection-policy-7
      allowed_values: []
      source_claims: [claim-ingestible-collection-id]
    - id: member_manifest_digest
      labels: {zh: 成员清单摘要, en: Member manifest digest, ja: member manifest digest}
      definitions:
        zh: 对成员 ID 集合与顺序计算的摘要；成员变更则 digest 变更。
        en: Digest over member ID set and order; changes when membership changes.
        ja: member ID set/order の digest。membership 変化で digest 変化。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:manifest-policy-7
      allowed_values: []
      source_claims: [claim-ingestible-collection-manifest]
  constraints: []
  required_relations: []
examples:
  - id: IngestibleCollection-example-directory-batch
    labels:
      zh: 目录批次集合
      en: Directory batch collection
      ja: directory batch collection
    descriptions:
      zh: collection-policy-7 manifest 含 file-policy-v7 与 file-appendix-v3；ingest-run-17 consumes 该集合并对每成员分别 reads 与 normalize。
      en: collection-policy-7 manifest includes file-policy-v7 and file-appendix-v3; ingest-run-17 consumes the collection and reads/normalizes each member separately.
      ja: collection-policy-7 manifest が file-policy-v7/file-appendix-v3 包含。ingest-run-17 が collection consume し各 member を個別 read/normalize。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: multi-file
    field_values:
      collection_id: collection-policy-7
      member_manifest_digest: sha256:manifest-policy-7
    related_node_ids: [IngestibleCollection, FileResource, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-ingestible-collection-llamaindex]
  - id: IngestibleCollection-example-pipeline-batch
    labels:
      zh: Pipeline 批量输入
      en: Pipeline batch input
      ja: pipeline batch input
    descriptions:
      zh: IngestionPipeline.run(documents=loaded_docs) 中 loaded_docs 三 Document 对应 collection-policy-7@manifest-v2；manifest 变更触发新版 collection 身份。
      en: Three Documents in IngestionPipeline.run(documents=loaded_docs) correspond to collection-policy-7@manifest-v2; manifest change triggers new collection identity.
      ja: IngestionPipeline.run(loaded_docs) の三 Document→collection-policy-7@manifest-v2。manifest 変更で新版 collection identity。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: pipeline.run batch
    field_values:
      collection_id: collection-policy-7
      document_count: 3
    related_node_ids: [IngestibleCollection, Document]
    related_relation_ids: []
    source_claims: [claim-ingestible-collection-llamaindex]
  - id: IngestibleCollection-example-not-single-file
    labels:
      zh: 集合非单文件
      en: Collection is not single file
      ja: collection は単 file ではない
    descriptions:
      zh: file-policy-v7 是单 FileResource；collection-policy-7 是成员 manifest 定义的批次——不可把单文件当作完整 IngestibleCollection。
      en: file-policy-v7 is one FileResource; collection-policy-7 is a batch defined by member manifest—a single file is not a complete IngestibleCollection.
      ja: file-policy-v7 は単 FileResource。collection-policy-7 は member manifest 定義 batch。単 file は complete IngestibleCollection ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestibleCollection, FileResource]
    related_relation_ids: []
    source_claims: [claim-ingestible-collection-design]
parent_relation:
  id: IngestionRun-consumes-IngestibleCollection
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 被运行消费, en: consumed by run, ja: run により consume される}
  definitions:
    zh: IngestionRun consumes IngestibleCollection 表示运行 input manifest 明确包含该 collection 版本作为批次输入。
    en: IngestionRun consumes IngestibleCollection means run input manifest explicitly includes that collection version as batch input.
    ja: IngestionRun consumes IngestibleCollection は run input manifest が当該 collection 版を batch input として明示包含。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-ingestible-collection-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-llamaindex-pipeline
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Batch document ingestion.
  - id: src-ingestible-collection-design
    title: Moonweave collection boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Collection versus member resources.
source_claims:
  - id: claim-ingestible-collection-llamaindex
    source: src-llamaindex-pipeline
    supports: IngestionPipeline.run accepts document batches as collection input.
    locator: pipeline.run
    evidence_kind: official
    confidence: high
  - id: claim-ingestible-collection-design
    source: src-ingestible-collection-design
    supports: Collection identity is distinct from individual member resources.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-collection-id
    source: src-ingestible-collection-design
    supports: collection_id identifies collection lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-collection-manifest
    source: src-ingestible-collection-design
    supports: member_manifest_digest binds membership version for audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
