    source: eng-ml-sklearn-tfidf-vectorizer
    supports: TextCorpus.corpus_id records the corpus identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: scikit-learn 1.9 API > TfidfVectorizer > parameters, learned vocabulary, IDF, and transform output
    evidence_kind: design-inference
    confidence: high
